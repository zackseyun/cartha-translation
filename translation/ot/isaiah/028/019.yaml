theological_decisions:
- issue: Referent of the repeated masculine singular verbs ('it passes through ...
    it will seize you')
  chosen_reading: Render with impersonal 'it' referring to the overflowing scourge/judgment
    from the immediate context.
  alternative_readings:
  - Render more explicitly as 'the overwhelming scourge' in the verse itself
  rationale: The antecedent is supplied by the preceding context (Isa 28:18). English
    requires a pronoun here; 'it' preserves the Hebrew's cohesion without importing
    additional wording into this verse.
- issue: Final clause syntax ('sheer terror to understand the report')
  chosen_reading: Retain the difficult Hebrew sense that understanding/hearing the
    report brings terror, rather than smoothing to an interpretive paraphrase.
  alternative_readings:
  - '''It will be sheer terror merely to hear the message'''
  - '''The message alone will bring terror'''
  rationale: The Hebrew is compressed and somewhat abrupt. The chosen rendering preserves
    that tension while remaining intelligible, in keeping with optimal equivalence
    and the instruction not to paraphrase beyond the source.
  doctrine_reference: Translation philosophy §3
