id: ISA.28.19
reference: Isaiah 28:19
source:
  edition: WLC
  text: מִ/דֵּ֤י עָבְר/וֹ֙ יִקַּ֣ח אֶתְ/כֶ֔ם כִּֽי בַ/בֹּ֧קֶר בַּ/בֹּ֛קֶר יַעֲבֹ֖ר
    בַּ/יּ֣וֹם וּ/בַ/לָּ֑יְלָה וְ/הָיָ֥ה רַק זְוָעָ֖ה הָבִ֥ין שְׁמוּעָֽה־־׃
translation:
  text: As often as it passes through, it will seize you; for morning by morning it
    will pass through, by day and by night; and it will be sheer terror to understand
    the report.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Whenever it passes through, it will seize you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'it will be nothing but terror to understand the report'; some render
      'to hear the message,' taking 'understand' in close connection with what is
      heard.
    reason: alternative_reading
lexical_decisions:
- source_word: מִדֵּי
  chosen: As often as
  alternatives:
  - As many times as
  - Whenever
  lexicon: HALOT
  rationale: The idiom מִדֵּי + infinitive/verb expresses repeated occurrence ('as
    often as,' 'whenever'). 'As often as' preserves the iterative force clearly in
    English.
- source_word: עָבְרוֹ
  chosen: it passes through
  alternatives:
  - its passing through
  - it passes by
  lexicon: HALOT
  rationale: From עבר ('pass over/through/by') with 3ms suffix referring back to the
    overflowing scourge/judgment in context. 'Passes through' fits the invasive, sweeping
    image better than the weaker 'passes by.'
- source_word: יִקַּח אֶתְכֶם
  chosen: it will seize you
  alternatives:
  - it will take you
  - it will carry you off
  lexicon: HALOT
  rationale: לקח literally means 'take,' but in this judgment context 'seize you'
    conveys hostile capture without over-paraphrasing. 'Carry you off' is possible
    but more interpretive.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanation for why the scourge will seize them. 'For'
    is concise and natural.
- source_word: בַבֹּקֶר בַבֹּקֶר
  chosen: morning by morning
  alternatives:
  - every morning
  - morning after morning
  lexicon: HALOT
  rationale: The repeated phrase is a Hebrew distributive idiom. 'Morning by morning'
    preserves the repetition and cadence of the source.
- source_word: יַעֲבֹר
  chosen: it will pass through
  alternatives:
  - it will pass by
  lexicon: HALOT
  rationale: Kept consistent with the earlier עבר in the verse. 'Pass through' better
    matches the destructive sweep of the image.
- source_word: בַּיּוֹם וּבַלָּיְלָה
  chosen: by day and by night
  alternatives:
  - in the day and in the night
  - day and night
  lexicon: HALOT
  rationale: This rendering is idiomatic English and preserves the merism indicating
    continual occurrence.
- source_word: וְהָיָה
  chosen: and it will be
  alternatives:
  - and it shall be
  - and there will be
  lexicon: HALOT
  rationale: Simple future/result clause. 'It will be' keeps the singular predicate
    tied to the following infinitive construction.
- source_word: רַק
  chosen: sheer
  alternatives:
  - only
  - nothing but
  lexicon: HALOT
  rationale: 'רַק here intensifies/excludes: the experience amounts to nothing but
    terror. ''Sheer'' is natural modern English and preserves the force.'
- source_word: זְוָעָה
  chosen: terror
  alternatives:
  - horror
  - dread
  - shuddering
  lexicon: HALOT
  rationale: The noun denotes fright/terror. 'Terror' is strong, accessible, and fits
    the judgment context.
- source_word: הָבִין
  chosen: to understand
  alternatives:
  - to comprehend
  - to discern
  lexicon: HALOT
  rationale: Infinitive construct of בין. 'To understand' is the most straightforward
    rendering.
- source_word: שְׁמוּעָה
  chosen: the report
  alternatives:
  - the message
  - the news
  - the announcement
  lexicon: HALOT
  rationale: The noun can mean report/news/tidings. 'The report' best preserves the
    sense of hearing the announced message of judgment without narrowing it to a formal
    proclamation.
