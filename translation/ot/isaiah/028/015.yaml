theological_decisions:
- issue: Rendering שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The Hebrew term does not necessarily map onto later Christian notions
    of hell. Transliteration preserves the conceptual world of the text and avoids
    doctrinal over-interpretation.
  doctrine_reference: Translation philosophy §1, §3
- issue: Personification of death and Sheol
  chosen_reading: Retained as covenant partners in the taunt
  alternative_readings:
  - Pure metaphor without personified force
  rationale: The verse depicts the speakers boasting of security through an alliance
    with death/Sheol. The translation preserves the rhetoric without explaining it
    away.
  doctrine_reference: Translation philosophy §1, §3
