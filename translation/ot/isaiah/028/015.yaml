id: ISA.28.15
reference: Isaiah 28:15
source:
  edition: WLC
  text: כִּ֣י אֲמַרְתֶּ֗ם כָּרַ֤תְנֽוּ בְרִית֙ אֶת מָ֔וֶת וְ/עִם שְׁא֖וֹל עָשִׂ֣ינוּ
    חֹזֶ֑ה שיט שׁוֹטֵ֤ף כִּֽי עבר לֹ֣א יְבוֹאֵ֔/נוּ כִּ֣י שַׂ֧מְנוּ כָזָ֛ב מַחְסֵ֖/נוּ
    וּ/בַ/שֶּׁ֥קֶר נִסְתָּֽרְנוּ־־־׃ס
translation:
  text: Because you have said, “We have made a covenant with death, and with Sheol
    we have made an agreement. When the overwhelming scourge passes through, it will
    not come to us, because we have made falsehood our refuge and have hidden ourselves
    in deceit.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with Sheol we have made a pact/treaty.” The Hebrew term is difficult;
      some have taken it as “vision,” but in this context it most likely means an
      agreement parallel to “covenant.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew Sheol, the realm of the dead; not necessarily identical with later
      notions of hell.
    reason: cultural_note
  - marker: c
    text: Or “the overflowing scourge” or “the flooding whip.” The Hebrew expression
      is difficult and combines imagery of a sweeping flood and a striking scourge.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  lexicon: HALOT
  rationale: Introduces the reason for the coming judgment in the surrounding context.
    'Because' is clearer in modern English than 'for' while preserving causal force.
- source_word: אֲמַרְתֶּם
  chosen: you have said
  alternatives:
  - you said
  lexicon: HALOT
  rationale: Perfect verb rendered with present relevance in English; the speech-act
    grounds the accusation.
- source_word: כָּרַתְנוּ בְרִית
  chosen: we have made a covenant
  alternatives:
  - we have cut a covenant
  - we made a covenant
  lexicon: HALOT
  rationale: Hebrew idiom literally 'cut a covenant'; 'made a covenant' is the natural
    English equivalent and preserves covenantal force without wooden literalism.
- source_word: מָוֶת
  chosen: death
  lexicon: HALOT
  rationale: Straightforward rendering; personified in context as a covenant partner,
    but no capitalization is required in English.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Transliteration preserves the Hebrew concept more precisely than flattening
    it to 'grave' or paraphrasing it. This also avoids importing a more developed
    doctrinal notion of hell not demanded by the text.
- source_word: עָשִׂינוּ חֹזֶה
  chosen: we have made an agreement
  alternatives:
  - we have made a pact
  - we have made a treaty
  - we have made a vision
  lexicon: HALOT
  rationale: חֹזֶה here is widely understood in context as an agreement/pact parallel
    to 'covenant,' not 'vision.' 'Agreement' is readable modern English and avoids
    overstating formal political nuance.
- source_word: שיט שׁוֹטֵף
  chosen: the overwhelming scourge
  alternatives:
  - the flooding whip
  - the rushing scourge
  - the overflowing scourge
  lexicon: HALOT
  rationale: The phrase is textually and lexically difficult. Traditional sense takes
    שׁוֹטֵף with flood/overflow imagery and שיט as scourge/whip. 'Overwhelming scourge'
    captures both destructive force and the likely metaphor without awkward literalism.
- source_word: כִּי עבר
  chosen: passes through
  alternatives:
  - passes by
  - goes through
  lexicon: HALOT
  rationale: Conveys the motion of the destructive force moving through the land;
    idiomatic in English.
- source_word: לֹא יְבוֹאֵנוּ
  chosen: it will not come to us
  alternatives:
  - it will not reach us
  - it will not come upon us
  lexicon: HALOT
  rationale: Retains the directness of the Hebrew while fitting the personified destructive
    agent.
- source_word: כָזָב
  chosen: falsehood
  alternatives:
  - lies
  - deception
  lexicon: HALOT
  rationale: Abstract noun matches the Hebrew and pairs well with 'refuge.' 'Lies'
    is possible but less formal and slightly narrower.
- source_word: מַחְסֵנוּ
  chosen: our refuge
  alternatives:
  - our shelter
  lexicon: HALOT
  rationale: Common biblical metaphor; 'refuge' preserves both literal and theological
    resonance.
- source_word: וּבַשֶּׁקֶר נִסְתָּרְנוּ
  chosen: have hidden ourselves in deceit
  alternatives:
  - have taken shelter in lies
  - have concealed ourselves in falsehood
  lexicon: HALOT
  rationale: Keeps the reflexive/passive nuance of the verb and preserves the parallel
    with 'falsehood.' 'Deceit' provides lexical variation while remaining semantically
    close to שׁקר.
