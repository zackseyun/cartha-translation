id: ISA.28.13
reference: Isaiah 28:13
source:
  edition: WLC
  text: וְ/הָיָ֨ה לָ/הֶ֜ם דְּבַר יְהוָ֗ה צַ֣ו לָ/צָ֞ו צַ֤ו לָ/צָו֙ קַ֤ו לָ/קָו֙ קַ֣ו
    לָ/קָ֔ו זְעֵ֥יר שָׁ֖ם זְעֵ֣יר שָׁ֑ם לְמַ֨עַן יֵלְכ֜וּ וְ/כָשְׁל֤וּ אָחוֹר֙ וְ/נִשְׁבָּ֔רוּ
    וְ/נוֹקְשׁ֖וּ וְ/נִלְכָּֽדוּ־׃פ
translation:
  text: So the word of the LORD will be to them, “Order on order, order on order,
    line on line, line on line, a little here, a little there,” so that they may go,
    and stumble backward, and be broken, and snared, and captured.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “command on command, command on command”; traditionally, “precept upon
      precept, precept upon precept.” The Hebrew is terse and likely mimics mocking
      or childish repetition.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: So ... will be
  alternatives:
  - and it will be
  - therefore ... will become
  lexicon: HALOT
  rationale: The waw + qatal of היה here introduces the resulting state from the prior
    context. 'So ... will be' captures the consequential force in natural English
    without over-paraphrasing.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  - the speech of the LORD
  lexicon: HALOT
  rationale: דבר can mean 'word, matter, message.' 'Word' preserves the prophetic
    idiom and keeps continuity with common biblical usage. יְהוָה is rendered 'the
    LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Required by the doctrine table for the divine name: ''the LORD'' is
    the default rendering.'
- source_word: צַו לָצָו צַו לָצָו
  chosen: Order on order, order on order
  alternatives:
  - command on command, command on command
  - precept upon precept, precept upon precept
  lexicon: HALOT
  rationale: The phrase is notoriously difficult and may imitate mocking, childish,
    or staccato speech. Since the morphology points to the noun from צוה, a sense
    like 'order/command' is plausible. 'Order on order' is more readable than 'precept
    upon precept' while preserving the repetitive, clipped effect. A lexical alternative
    is preserved in a footnote because the phrase is debated.
- source_word: קַו לָקָו קַו לָקָו
  chosen: line on line, line on line
  alternatives:
  - measuring line on measuring line, measuring line on measuring line
  - rule on rule, rule on rule
  lexicon: HALOT
  rationale: קו commonly denotes a measuring line or line. 'Line on line' preserves
    the terse repetition and likely wordplay. 'Rule on rule' is less secure lexically
    here.
- source_word: זְעֵיר שָׁם זְעֵיר שָׁם
  chosen: a little here, a little there
  alternatives:
  - a little there, a little there
  - a little here, a little there and there
  lexicon: HALOT
  rationale: 'זעיר means ''small, little.'' With שׁם in this repetitive construction,
    the idiomatic sense is distributive: ''a little here, a little there.'' This is
    the most natural English equivalent of the taunting cadence.'
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - to the end that
  lexicon: HALOT
  rationale: למען introduces purpose/result. 'So that' is natural modern English and
    leaves intact the judicial force of the clause.
- source_word: יֵלְכוּ
  chosen: they may go
  alternatives:
  - they may walk
  - they may proceed
  lexicon: HALOT
  rationale: הלך is broadly 'go/walk.' 'Go' fits the sequence of ensuing calamities
    and reads naturally in English.
- source_word: וְכָשְׁלוּ אָחוֹר
  chosen: and stumble backward
  alternatives:
  - and fall backward
  - and stagger backward
  lexicon: HALOT
  rationale: כשל denotes stumbling or tottering; with אָחוֹר, the image is specifically
    backward movement. 'Stumble backward' preserves the verbal imagery better than
    the more interpretive 'fall backward,' though the latter is possible.
- source_word: וְנִשְׁבָּרוּ
  chosen: and be broken
  alternatives:
  - and be shattered
  lexicon: HALOT
  rationale: The Niphal of שבר here is passive/reflexive in sense. 'Be broken' is
    straightforward and preserves the metaphorical/judicial force without intensifying
    beyond the Hebrew.
- source_word: וְנוֹקְשׁוּ
  chosen: and snared
  alternatives:
  - and trapped
  - and caught in a trap
  lexicon: HALOT
  rationale: From יקשׁ, the sense is being ensnared or trapped. 'Snared' is concise
    and preserves the metaphor.
- source_word: וְנִלְכָּדוּ
  chosen: and captured
  alternatives:
  - and taken
  - and seized
  lexicon: HALOT
  rationale: לכד commonly means capture/seize. 'Captured' distinguishes it from the
    prior 'snared' while preserving the escalation.
