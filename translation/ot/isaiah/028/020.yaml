id: ISA.28.20
reference: Isaiah 28:20
source:
  edition: WLC
  text: כִּֽי קָצַ֥ר הַ/מַּצָּ֖ע מֵֽ/הִשְׂתָּרֵ֑עַ וְ/הַ/מַּסֵּכָ֥ה צָ֖רָה כְּ/הִתְכַּנֵּֽס־׃
translation:
  text: For the bed is too short to stretch oneself out on, and the covering too narrow
    to wrap oneself in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the blanket'; the Hebrew noun here refers to a bed-covering, though
      elsewhere a related form can refer to a cast image. Context determines the sense
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces an explanatory ground for the preceding statement; 'for' best
    preserves the causal/explanatory force in natural English.
- source_word: קָצַר
  chosen: is too short
  alternatives:
  - is short
  - has become short
  lexicon: HALOT
  rationale: The verb means 'be short' or 'be insufficient.' In context the point
    is inadequacy, so 'is too short' brings out the implied insufficiency without
    over-paraphrasing.
- source_word: הַמַּצָּע
  chosen: the bed
  alternatives:
  - the couch
  - the place of lying down
  lexicon: HALOT
  rationale: Refers to something spread out for lying down. 'Bed' is the most idiomatic
    modern English equivalent and fits the proverb-like imagery.
- source_word: מֵהִשְׂתָּרֵעַ
  chosen: to stretch oneself out on
  alternatives:
  - for stretching out
  - to lie stretched out
  lexicon: HALOT
  rationale: The infinitive expresses the action for which the bed proves inadequate.
    'To stretch oneself out on' preserves the reflexive sense and the relation to
    the bed.
- source_word: וְהַמַּסֵּכָה
  chosen: and the covering
  alternatives:
  - and the blanket
  - and the woven cover
  lexicon: HALOT
  rationale: Here the noun denotes a covering used on a bed, not the more common sense
    'molten image.' Context clearly favors bedding imagery. 'Covering' is broad and
    accurate; 'blanket' is possible but slightly more specific than the Hebrew requires.
- source_word: צָרָה
  chosen: too narrow
  alternatives:
  - is narrow
  - too cramped
  lexicon: HALOT
  rationale: As with 'too short,' the adjective conveys insufficiency for the intended
    use. 'Too narrow' makes the implied inadequacy explicit in idiomatic English.
- source_word: כְּהִתְכַּנֵּס
  chosen: to wrap oneself in
  alternatives:
  - for gathering oneself in
  - to cover oneself
  - to curl oneself up in
  lexicon: HALOT
  rationale: The infinitive likely describes drawing the covering around oneself.
    'To wrap oneself in' is clear, natural, and preserves the reflexive sense better
    than a bare 'to cover oneself.'
