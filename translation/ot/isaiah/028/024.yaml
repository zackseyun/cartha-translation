id: ISA.28.24
reference: Isaiah 28:24
source:
  edition: WLC
  text: הֲ/כֹ֣ל הַ/יּ֔וֹם יַחֲרֹ֥שׁ הַ/חֹרֵ֖שׁ לִ/זְרֹ֑עַ יְפַתַּ֥ח וִֽ/ישַׂדֵּ֖ד
    אַדְמָתֽ/וֹ׃
translation:
  text: Does the plowman plow all day to sow? Does he keep opening and harrowing his
    ground?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Does he keep breaking up and leveling his soil?' The Hebrew agricultural
      verbs can be rendered more generally, but the main text preserves the likely
      sequence of field preparation.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲכֹל הַיּוֹם
  chosen: Does ... all day
  alternatives:
  - the whole day
  - continually all day
  lexicon: HALOT
  rationale: The interrogative הֲ with כֹל הַיּוֹם introduces a rhetorical question.
    'All day' is natural English and preserves the temporal force without over-literal
    awkwardness.
- source_word: יַחֲרֹשׁ / הַחֹרֵשׁ
  chosen: the plowman plow
  alternatives:
  - the farmer plow
  - the one who plows plow
  lexicon: HALOT
  rationale: The verb חרש means 'to plow,' and the participial noun denotes 'the plower/plowman.'
    Rendering both with cognate English terms preserves the Hebrew wordplay and agricultural
    imagery.
- source_word: לִזְרֹעַ
  chosen: to sow
  alternatives:
  - for sowing
  - to plant seed
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: the plowing is done ''to sow.'' ''To
    sow'' is concise and agriculturally precise.'
- source_word: יְפַתַּח
  chosen: keep opening
  alternatives:
  - keep breaking up
  - open up
  lexicon: HALOT
  rationale: פתח literally means 'open.' In this farming context it refers to opening
    up the soil. 'Keep opening' preserves the lexical image while fitting the iterative
    rhetorical question.
- source_word: וִישַׂדֵּד
  chosen: harrowing
  alternatives:
  - leveling
  - breaking clods
  - smoothing
  lexicon: HALOT
  rationale: The verb שדד in this context is an agricultural term often understood
    as harrowing or breaking/leveling the soil after plowing. 'Harrowing' is the most
    specific equivalent, though less common; it best matches the sequence of field
    preparation.
- source_word: אַדְמָתוֹ
  chosen: his ground
  alternatives:
  - his soil
  - his land
  lexicon: HALOT
  rationale: אדמה here refers to cultivated earth/soil. 'Ground' is idiomatic in English
    agricultural context and avoids sounding overly technical.
