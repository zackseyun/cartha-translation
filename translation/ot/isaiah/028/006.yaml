id: ISA.28.6
reference: Isaiah 28:6
source:
  edition: WLC
  text: וּ/לְ/ר֖וּחַ מִשְׁפָּ֑ט לַ/יּוֹשֵׁב֙ עַל הַ/מִּשְׁפָּ֔ט וְ/לִ֨/גְבוּרָ֔ה מְשִׁיבֵ֥י
    מִלְחָמָ֖ה שָֽׁעְרָ/ה־׃ס
translation:
  text: and a spirit of justice to the one who sits in judgment, and strength to those
    who turn back the battle at the gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a spirit of judgment.'
    reason: lexical_alternative
  - marker: b
    text: Or 'on the judgment seat' for 'in judgment.'
    reason: lexical_alternative
  - marker: c
    text: Or 'those who repel the battle/war at the gate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְרוּחַ
  chosen: and a spirit
  alternatives:
  - and for a spirit
  lexicon: HALOT
  rationale: 'The prefixed conjunction and preposition continue the blessings from
    the previous verse (''he will be...''). In English, ''and a spirit'' reads naturally
    while preserving the predicative sense: YHWH becomes/provides a spirit characterized
    by what follows.'
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: Here מִשְׁפָּט describes the quality of the 'spirit.' 'Justice' better
    conveys the abstract governing quality in modern English, while 'judgment' is
    preserved as an alternative because the semantic field includes judicial decision-making.
- source_word: לַיֹּשֵׁב
  chosen: to the one who sits
  alternatives:
  - for the one who sits
  - to him who sits
  lexicon: HALOT
  rationale: The singular participle is rendered with a gender-accurate but natural
    English singular expression. 'The one who sits' preserves the Hebrew participial
    force without unnecessarily specifying gender.
- source_word: עַל הַמִּשְׁפָּט
  chosen: in judgment
  alternatives:
  - on the judgment seat
  - over judgment
  - at the judgment
  lexicon: HALOT
  rationale: The idiom refers to exercising judicial authority. 'In judgment' is concise,
    idiomatic English that captures the function rather than woodenly reproducing
    the preposition 'on.'
- source_word: וְלִגְבוּרָה
  chosen: and strength
  alternatives:
  - and for might
  - and valor
  lexicon: HALOT
  rationale: גְּבוּרָה denotes strength, might, or valor. 'Strength' fits the parallel
    blessing structure and reads naturally in English, while still allowing martial
    connotations in context.
- source_word: מְשִׁיבֵי
  chosen: to those who turn back
  alternatives:
  - to those who repel
  - to those who drive back
  lexicon: HALOT
  rationale: From שוב in the causative/active sense, the participle here refers to
    defenders who cause the battle to retreat. 'Turn back' is a clear and fairly literal
    rendering.
- source_word: מִלְחָמָה
  chosen: the battle
  alternatives:
  - war
  - the fighting
  lexicon: HALOT
  rationale: In this immediate military setting, 'battle' is more concrete and situational
    than the broader 'war.' The article is not explicit in Hebrew, but English idiom
    favors 'the battle' with the following locative phrase.
- source_word: שַׁעְרָה
  chosen: at the gate
  alternatives:
  - to the gate
  lexicon: HALOT
  rationale: The noun with directional/locative ending refers to the gate area. In
    context of repelling attackers, 'at the gate' best conveys the place of conflict
    in natural English; 'to the gate' is possible but less fitting here.
