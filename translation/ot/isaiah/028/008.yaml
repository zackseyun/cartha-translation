id: ISA.28.8
reference: Isaiah 28:8
source:
  edition: WLC
  text: כִּ֚י כָּל שֻׁלְחָנ֔וֹת מָלְא֖וּ קִ֣יא צֹאָ֑ה בְּלִ֖י מָקֽוֹם־׃ס
translation:
  text: For all the tables are full of vomit and filth, with no place left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with no place'; the Hebrew does not explicitly state 'left,' but the
      sense is that no space remains unsoiled.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces an explanation or grounding for the preceding denunciation.
    'For' fits the discourse flow in English without overstating emphasis.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Retains the comprehensive force of the Hebrew quantifier. 'All the tables'
    is idiomatic and preserves the totalizing accusation.
- source_word: שֻׁלְחָנוֹת
  chosen: tables
  alternatives:
  - tabletops
  lexicon: HALOT
  rationale: The ordinary sense is dining or banquet tables. 'Tables' is the natural
    English equivalent and suits the feast/drunkenness context of the surrounding
    passage.
- source_word: מָלְאוּ
  chosen: are full
  alternatives:
  - have been filled
  - are filled
  lexicon: HALOT
  rationale: The perfect verb describes the resulting state. English 'are full' communicates
    the stative sense more naturally than a more wooden perfect.
- source_word: קִיא
  chosen: vomit
  alternatives:
  - vomited matter
  lexicon: HALOT
  rationale: The noun directly denotes vomit. The blunt rendering preserves the shock
    and uncleanness of the image.
- source_word: צֹאָה
  chosen: filth
  alternatives:
  - excrement
  - feces
  lexicon: HALOT
  rationale: The term denotes foul filth/excrement. 'Filth' preserves the uncleanness
    while remaining readable modern English; the more specific alternative is possible
    but harsher than necessary for the verse's force.
- source_word: בְּלִי
  chosen: with no
  alternatives:
  - without
  lexicon: HALOT
  rationale: This preposition expresses absence. 'With no' works smoothly with the
    following noun phrase in English.
- source_word: מָקוֹם
  chosen: place left
  alternatives:
  - place
  - clean place
  - room
  lexicon: HALOT
  rationale: Literally 'place.' In context the sense is that no space remains unsoiled
    on the tables. 'Place left' makes the implied result explicit in natural English
    without adding a new idea beyond the context.
