id: ISA.28.14
reference: Isaiah 28:14
source:
  edition: WLC
  text: לָ/כֵ֛ן שִׁמְע֥וּ דְבַר יְהוָ֖ה אַנְשֵׁ֣י לָצ֑וֹן מֹֽשְׁלֵי֙ הָ/עָ֣ם הַ/זֶּ֔ה אֲשֶׁ֖ר בִּ/ירוּשָׁלִָֽם־׃
translation:
  text: Therefore hear the word of Yahweh, you scoffing men, rulers of this people who are in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scoffing men' or 'mockers.' The Hebrew phrase is literally 'men of mockery/scoffing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Discourse marker drawing an inference from the preceding context; 'Therefore' preserves the prophetic argumentative flow in natural English.
- source_word: שִׁמְעוּ
  chosen: hear
  alternatives:
  - listen to
  - heed
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' is the standard prophetic summons and preserves both auditory and responsive force without over-interpreting as 'obey'.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Established prophetic expression. 'Word' preserves the formal linkage to prophetic revelation better than the more interpretive 'message.' 'the LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אַנְשֵׁי לָצוֹן
  chosen: men of mockery
  alternatives:
  - scoffing men
  - men of scorn
  - mockers
  lexicon: HALOT
  rationale: Construct phrase literally 'men of scoffing/mockery.' 'Men of mockery' keeps the noun-based Hebrew expression and the gendered form אַנְשֵׁי, while remaining readable. 'Mockers' is possible but compresses the construct phrase and loses some rhetorical texture.
- source_word: מֹשְׁלֵי
  chosen: rulers of
  alternatives:
  - those who rule
  - governors of
  lexicon: HALOT
  rationale: Participle from משל in the sense 'to rule.' 'Rulers of' is concise, idiomatic, and fits the construct relation with 'this people.'
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - these people
  - the people
  lexicon: HALOT
  rationale: The singular demonstrative phrase is best represented by 'this people,' a common biblical idiom that preserves the Hebrew form and prophetic tone.
- source_word: אֲשֶׁר בִּירוּשָׁלָם
  chosen: who are in Jerusalem
  alternatives:
  - who are at Jerusalem
  - in Jerusalem
  lexicon: HALOT
  rationale: The relative clause modifies the rulers/people located in Jerusalem. 'Who are in Jerusalem' makes the syntax explicit and natural in English.
