id: ISA.28.7
reference: Isaiah 28:7
source:
  edition: WLC
  text: וְ/גַם אֵ֨לֶּה֙ בַּ/יַּ֣יִן שָׁג֔וּ וּ/בַ/שֵּׁכָ֖ר תָּע֑וּ כֹּהֵ֣ן וְ/נָבִיא֩
    שָׁג֨וּ בַ/שֵּׁכָ֜ר נִבְלְע֣וּ מִן הַ/יַּ֗יִן תָּעוּ֙ מִן הַ/שֵּׁכָ֔ר שָׁגוּ֙
    בָּֽ/רֹאֶ֔ה פָּק֖וּ פְּלִילִיָּֽה־־־׃
translation:
  text: 'And even these reel with wine and stagger from strong drink: priest and prophet
    reel with strong drink, they are swallowed up by wine, they stagger from strong
    drink; they reel in seeing, they totter in judgment.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they err in vision'; the Hebrew may refer specifically to prophetic
      seeing rather than ordinary sight.
    reason: lexical_alternative
  - marker: b
    text: Or 'they stumble in giving judgment' or 'in legal decision.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם אֵלֶּה
  chosen: And even these
  alternatives:
  - And these also
  - Yet even these
  lexicon: HALOT
  rationale: וְגַם adds emphasis ('and/even/also'), and אֵלֶּה points to the group
    now under indictment. 'And even these' preserves the rhetorical force linking
    this verse to the prior context.
- source_word: בַּיַּיִן
  chosen: with wine
  alternatives:
  - by wine
  - in wine
  lexicon: HALOT
  rationale: 'The preposition ב here is best rendered idiomatically in English as
    instrument/association: intoxication ''with wine.'' This reads naturally while
    preserving the causal sense.'
- source_word: שָׁגוּ
  chosen: reel
  alternatives:
  - err
  - go astray
  - stagger
  lexicon: HALOT
  rationale: The verb can denote wandering/erring, but in this immediate context of
    intoxication it carries the concrete sense of reeling or staggering. 'Reel' preserves
    the vivid physical image while allowing the moral undertone of disorientation.
- source_word: שֵּׁכָר
  chosen: strong drink
  alternatives:
  - beer
  - intoxicating drink
  lexicon: HALOT
  rationale: שֵׁכָר denotes an intoxicating beverage other than wine, traditionally
    rendered 'strong drink.' This remains clear and suitably broad.
- source_word: תָּעוּ
  chosen: stagger
  alternatives:
  - wander
  - go astray
  - err
  lexicon: HALOT
  rationale: Like שׁגו, this verb can mean wandering or erring, but here the drunkenness
    context favors a physical manifestation. I varied it as 'stagger' to reflect the
    parallelism without flattening both verbs into identical English.
- source_word: כֹּהֵן וְנָבִיא
  chosen: priest and prophet
  alternatives:
  - the priest and the prophet
  lexicon: HALOT
  rationale: The singular nouns function collectively, indicting these leadership
    classes. English naturally renders them without articles here.
- source_word: נִבְלְעוּ
  chosen: they are swallowed up by wine
  alternatives:
  - they are confused by wine
  - they are engulfed by wine
  - they are overcome by wine
  lexicon: HALOT
  rationale: The Niphal of בלע literally means 'be swallowed up.' Retaining the metaphor
    preserves the force of total overpowering by wine. A smoother interpretive option
    like 'overcome' is possible but less transparent to the Hebrew image.
- source_word: מִן הַיַּיִן / מִן הַשֵּׁכָר
  chosen: by wine / from strong drink
  alternatives:
  - from wine / from strong drink
  - because of wine / because of strong drink
  lexicon: HALOT
  rationale: מִן here marks source/cause. English can express this as 'by' or 'from.'
    I retained both idiomatically in the verse to avoid monotony while preserving
    causation from intoxication.
- source_word: בָּרֹאֶה
  chosen: in seeing
  alternatives:
  - in vision
  - when seeing
  - in the prophetic vision
  lexicon: HALOT
  rationale: The noun רֹאֶה can mean 'seeing' or, by extension, visionary perception.
    In context with priest and prophet, it likely refers to visionary discernment.
    'In seeing' keeps the Hebrew's compactness and ambiguity, while a footnote preserves
    the more explicit alternative 'in vision.'
- source_word: פָּקוּ
  chosen: they totter
  alternatives:
  - they stumble
  - they reel
  lexicon: HALOT
  rationale: The verb conveys unsteadiness/staggering. 'Totter' fits the parallelism
    and avoids overusing 'stagger/reel' while maintaining the image of instability.
- source_word: פְּלִילִיָּה
  chosen: judgment
  alternatives:
  - decision
  - legal decision
  - justice
  lexicon: HALOT
  rationale: The noun refers to judicial decision-making or adjudication. 'Judgment'
    is concise and fits the likely priestly/judicial sphere in context.
