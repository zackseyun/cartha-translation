theological_decisions:
- issue: Whether to make the final clauses explicitly about prophetic vision and judicial
    decision
  chosen_reading: 'Retain somewhat literal wording: ''they reel in seeing, they totter
    in judgment'''
  alternative_readings:
  - they err in vision, they stumble in giving judgment
  - they reel in prophetic vision, they totter in legal decision
  rationale: The verse condemns religious leaders' incapacity in their appointed functions.
    The Hebrew is terse and somewhat ambiguous; preserving that terseness avoids over-interpreting
    while still communicating that intoxication corrupts perception and judgment.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
