id: ISA.28.4
reference: Isaiah 28:4
source:
  edition: WLC
  text: וְֽ/הָ֨יְתָ֜ה צִיצַ֤ת נֹבֵל֙ צְבִ֣י תִפְאַרְתּ֔/וֹ אֲשֶׁ֥ר עַל רֹ֖אשׁ גֵּ֣יא
    שְׁמָנִ֑ים כְּ/בִכּוּרָהּ֙ בְּ/טֶ֣רֶם קַ֔יִץ אֲשֶׁ֨ר יִרְאֶ֤ה הָֽ/רֹאֶה֙ אוֹתָ֔/הּ
    בְּ/עוֹדָ֥/הּ בְּ/כַפּ֖/וֹ יִבְלָעֶֽ/נָּה־׃ס
translation:
  text: 'And the fading flower of his glorious beauty, which is on the head of the
    fertile valley, will be like an early fig before summer: whoever sees it, while
    it is still in his hand, swallows it down.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a first-ripe fig before summer.' The Hebrew בִּכּוּרָה can denote
      first-ripe fruit more generally, though in this context the image is commonly
      understood as an early fig.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the valley of fatnesses,' an idiom for a rich or fertile valley.
    reason: cultural_note
lexical_decisions:
- source_word: צִיצַת נֹבֵל
  chosen: the fading flower
  alternatives:
  - the withering blossom
  - the fading bloom
  lexicon: HALOT
  rationale: צִיצַת denotes a blossom/flower-like ornament, and נֹבֵל is a participle
    meaning fading/wilting. 'Fading flower' preserves the image and the participial
    force in natural English.
- source_word: צְבִי תִפְאַרְתּוֹ
  chosen: his glorious beauty
  alternatives:
  - the beauty of his glory
  - his splendid beauty
  lexicon: HALOT
  rationale: צְבִי often conveys beauty/splendor, and תִפְאֶרֶת glory/beauty/adornment.
    The suffix on תִפְאַרְתּוֹ is rendered 'his.' 'His glorious beauty' is smoother
    English while retaining the doubled aesthetic emphasis.
- source_word: גֵּיא שְׁמָנִים
  chosen: the fertile valley
  alternatives:
  - the valley of rich soil
  - the fat valley
  lexicon: HALOT
  rationale: שְׁמָנִים literally means 'fatnesses/rich things' and idiomatically denotes
    fertility or richness. 'Fertile valley' communicates the Hebrew idiom clearly
    in modern English.
- source_word: כְּבִכּוּרָהּ בְּטֶרֶם קַיִץ
  chosen: like an early fig before summer
  alternatives:
  - like the first-ripe fig before the summer fruit
  - like a first-ripe fig before summer
  lexicon: HALOT
  rationale: בִּכּוּרָה refers to first-ripe fruit, especially an early fig in prophetic
    imagery. 'Early fig before summer' captures the agricultural image succinctly
    and idiomatically.
- source_word: אֲשֶׁר יִרְאֶה הָרֹאֶה אֹתָהּ
  chosen: whoever sees it
  alternatives:
  - which the one seeing it sees
  - when someone sees it
  lexicon: HALOT
  rationale: The Hebrew construction is idiomatic and emphasizes the immediacy of
    seeing. 'Whoever sees it' renders the sense naturally without wooden repetition.
- source_word: בְּעוֹדָהּ בְּכַפּוֹ
  chosen: while it is still in his hand
  alternatives:
  - while it is yet in his palm
  - while it is still in his grasp
  lexicon: HALOT
  rationale: בְּעוֹדָהּ means 'while it is still [there],' and כַּף is palm/hand.
    'In his hand' is idiomatic English and preserves the temporal vividness.
- source_word: יִבְלָעֶנָּה
  chosen: swallows it down
  alternatives:
  - gulps it down
  - devours it
  lexicon: HALOT
  rationale: בלע means swallow, often with the sense of consuming quickly. 'Swallows
    it down' preserves the concrete metaphor of immediate consumption.
- source_word: וְהָיְתָה
  chosen: will be
  alternatives:
  - shall become
  - and it will become
  lexicon: HALOT
  rationale: The verb introduces the result/comparison of the preceding image. 'Will
    be' is the most straightforward future rendering in context.
