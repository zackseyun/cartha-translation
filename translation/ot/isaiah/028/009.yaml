id: ISA.28.9
reference: Isaiah 28:9
source:
  edition: WLC
  text: אֶת מִי֙ יוֹרֶ֣ה דֵעָ֔ה וְ/אֶת מִ֖י יָבִ֣ין שְׁמוּעָ֑ה גְּמוּלֵי֙ מֵֽ/חָלָ֔ב
    עַתִּיקֵ֖י מִ/שָּׁדָֽיִם־־׃
translation:
  text: Whom will he teach knowledge, and to whom will he explain the message? Those
    weaned from milk, those taken from the breasts?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'report' or 'what is heard' for 'the message.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew leaves the subject of 'will he teach' and 'will he explain' implicit;
      context may suggest the speaker is referring mockingly to Isaiah.
    reason: alternative_reading
lexical_decisions:
- source_word: יוֹרֶה
  chosen: will he teach
  alternatives:
  - does he teach
  - will he instruct
  lexicon: HALOT
  rationale: Hiphil of ירה commonly means 'teach/instruct.' Future-like English fits
    the rhetorical question in context. 'Teach' is natural modern English and preserves
    the instructional sense.
- source_word: דֵעָה
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: The noun denotes knowledge or understanding; 'knowledge' is the most
    direct gloss and pairs well with the following clause.
- source_word: יָבִין
  chosen: will he explain
  alternatives:
  - will he make understand
  - does he cause to understand
  lexicon: HALOT
  rationale: Hiphil of בין means to cause someone to understand. 'Explain' is an optimal-equivalence
    rendering that communicates the causative sense in idiomatic English.
- source_word: שְׁמוּעָה
  chosen: the message
  alternatives:
  - report
  - what is heard
  - announcement
  lexicon: HALOT
  rationale: The noun can mean report, message, or tidings. In this instructional
    context, 'the message' best conveys the content being taught without sounding
    overly narrow or archaic.
- source_word: גְּמוּלֵי
  chosen: those weaned
  alternatives:
  - the weaned ones
  lexicon: HALOT
  rationale: Passive/participial form from גמל in the sense of being weaned. Rendering
    with 'those weaned' is idiomatic and preserves the plural reference.
- source_word: מֵחָלָב
  chosen: from milk
  alternatives:
  - away from milk
  lexicon: HALOT
  rationale: The preposition מן marks separation/source; 'from milk' is the standard
    idiomatic expression with 'weaned.'
- source_word: עַתִּיקֵי
  chosen: those taken
  alternatives:
  - those removed
  - those detached
  lexicon: HALOT
  rationale: From עתק, conveying being moved away or removed. 'Taken' is concise and
    natural in parallel with 'weaned,' though 'removed' is possible.
- source_word: מִשָּׁדָיִם
  chosen: from the breasts
  alternatives:
  - from the breast
  lexicon: HALOT
  rationale: Dual/plural form refers literally to breasts. The plural is retained
    because it is present in the Hebrew and is standard English in this idiom.
- source_word: אֶת מִי ... וְאֶת מִי
  chosen: Whom ... and to whom
  alternatives:
  - To whom ... and to whom
  lexicon: Hebrew grammar
  rationale: The repeated object marker with interrogative pronoun structures two
    parallel rhetorical questions. English varies the preposition in the second clause
    to fit 'explain' idiomatically while preserving the parallelism.
