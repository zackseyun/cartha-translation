theological_decisions:
- issue: Speaker reference of the third-person singular verbs
  chosen_reading: Render with generic 'he' without identifying the referent in translation.
  alternative_readings:
  - Isaiah speaking of himself
  - the LORD speaking indirectly through the prophet
  - the drunk priests and prophets speaking mockingly about Isaiah
  rationale: The Hebrew uses third-person singular verbs without an explicit subject
    in this verse. The broader context may suggest mocking speech about Isaiah, but
    the verse itself does not name the referent. To preserve the textual ambiguity
    and avoid importing an interpretive decision, the translation keeps 'he.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
