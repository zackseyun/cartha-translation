id: ISA.28.2
reference: Isaiah 28:2
source:
  edition: WLC
  text: הִנֵּ֨ה חָזָ֤ק וְ/אַמִּץ֙ לַֽ/אדֹנָ֔/י כְּ/זֶ֥רֶם בָּרָ֖ד שַׂ֣עַר קָ֑טֶב כְּ֠/זֶרֶם
    מַ֣יִם כַּבִּירִ֥ים שֹׁטְפִ֛ים הִנִּ֥יחַ לָ/אָ֖רֶץ בְּ/יָֽד׃
translation:
  text: Behold, the Lord has one who is mighty and strong; like a storm of hail, a
    destroying tempest, like a storm of mighty, overflowing waters, he hurls it down
    to the earth with his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the Lord there is one mighty and strong.' The Hebrew phrase may
      emphasize that this agent belongs to the Lord or stands ready for his use.
    reason: lexical_alternative
  - marker: b
    text: Or 'he lays it low to the ground by hand.' The Hebrew verb can be rendered
      less violently, but the storm imagery favors a forceful sense.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Discourse marker introducing a vivid prophetic announcement. 'Behold'
    preserves the elevated, attention-commanding force better than flatter modern
    options.
- source_word: חָזָק וְאַמִּץ
  chosen: mighty and strong
  alternatives:
  - strong and mighty
  - hard and powerful
  lexicon: HALOT
  rationale: The paired adjectives intensify the agent's power. 'Mighty and strong'
    is natural English and preserves the emphatic duplication.
- source_word: לַאדֹנָי
  chosen: the Lord
  alternatives:
  - for the Lord
  - belonging to the Lord
  lexicon: HALOT
  rationale: The phrase indicates that this powerful agent is at the Lord's disposal
    or belongs to him. In English, 'the Lord has one who is mighty and strong' best
    conveys possession/availability in context. 'Lord' follows the doctrine default
    for אֲדֹנָי.
- source_word: כְּזֶרֶם
  chosen: like a storm
  alternatives:
  - like a torrent
  - like a flood
  lexicon: HALOT
  rationale: זֶרֶם denotes a violent downpour or storm-burst. Because the verse immediately
    compares the agent to hail and then to overflowing waters, 'storm' best fits both
    occurrences in idiomatic English while preserving the destructive meteorological
    imagery.
- source_word: בָּרָד
  chosen: hail
  lexicon: HALOT
  rationale: Straightforward weather term; retained literally.
- source_word: שַׂעַר קָטֶב
  chosen: a destroying tempest
  alternatives:
  - a storm of destruction
  - a devastating סער/whirlwind
  lexicon: HALOT
  rationale: The construct-like sequence conveys a tempest characterized by destruction.
    'Destroying tempest' is concise and preserves the force of קָטֶב as destructive
    ruin rather than merely strong wind.
- source_word: מַיִם כַּבִּירִים שֹׁטְפִים
  chosen: mighty, overflowing waters
  alternatives:
  - massive flooding waters
  - great waters flooding over
  lexicon: HALOT
  rationale: כַּבִּירִים conveys powerful/abundant force; שֹׁטְפִים describes sweeping
    overflow. 'Mighty, overflowing waters' preserves both the scale and inundating
    action in natural English.
- source_word: הִנִּיחַ
  chosen: he hurls it down
  alternatives:
  - he lays low
  - he causes to rest
  - he casts down
  lexicon: HALOT
  rationale: In this judgment context, the Hiphil is idiomatically causative with
    the sense of bringing down violently to the ground. 'Hurls it down' captures the
    force of the storm imagery better than the more static 'lays' or 'causes to rest.'
- source_word: לָאָרֶץ
  chosen: to the earth
  alternatives:
  - to the ground
  - to the land
  lexicon: HALOT
  rationale: Could be 'earth,' 'ground,' or 'land.' Here the image is of being thrown
    down from a height, so 'to the earth' preserves the broad, forceful sense. The
    object is implicit from context (the proud crown/city of Ephraim in the surrounding
    verses).
- source_word: בְּיָד
  chosen: with his hand
  alternatives:
  - by hand
  - by his power
  lexicon: HALOT
  rationale: Literal rendering preserves the anthropomorphic image of direct divine
    agency or agency exercised by the Lord's instrument. 'With his hand' is idiomatic
    and vivid.
