theological_decisions:
- issue: Whether שְׁמוֹעַ should be rendered 'hear' or the more interpretive 'obey/heed'
  chosen_reading: to hear
  alternative_readings:
  - to listen
  - to obey
  - to heed
  rationale: The verse condemns refusal of God's offered rest. Since שׁמע can include
    obedient response, an interpretive rendering is possible; however, preserving
    'hear' maintains the lexical form and lets the prophetic context supply the implication
    of heeding. This follows the project's preference to preserve tension rather than
    resolve it unnecessarily.
  doctrine_reference: Translation philosophy §3, §5
