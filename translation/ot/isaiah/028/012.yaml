id: ISA.28.12
reference: Isaiah 28:12
source:
  edition: WLC
  text: אֲשֶׁ֣ר אָמַ֣ר אֲלֵי/הֶ֗ם זֹ֤את הַ/מְּנוּחָה֙ הָנִ֣יחוּ לֶֽ/עָיֵ֔ף וְ/זֹ֖את
    הַ/מַּרְגֵּעָ֑ה וְ/לֹ֥א אָב֖וּא שְׁמֽוֹעַ׀׃
translation:
  text: to whom he said, “This is rest; give rest to the weary, and this is repose,”
    yet they were not willing to hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This is the resting place.' The Hebrew מְנוּחָה can denote both 'rest'
      and a 'resting place.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and this is refreshing.' The Hebrew מַרְגֵּעָה overlaps with 'rest'
      but may emphasize relief or refreshment.
    reason: lexical_alternative
  - marker: c
    text: Or 'but they would not listen/obey.' Hebrew שׁמע ('hear') can also carry
      the sense of heeding or obeying.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: to whom
  alternatives:
  - who
  - that
  lexicon: HALOT
  rationale: Here אֲשֶׁר introduces a relative clause referring back to the people
    addressed in the previous context. In English, 'to whom' best reflects the combination
    of the relative particle with the following אֲלֵיהֶם ('to them') in a natural
    way.
- source_word: אָמַר אֲלֵיהֶם
  chosen: he said ... to whom
  alternatives:
  - he said to them
  lexicon: HALOT
  rationale: The verb אמר with אֶל marks direct address. Because English style is
    smoother with the relative construction fronted, 'to whom he said' preserves the
    sense without loss.
- source_word: זֹאת הַמְּנוּחָה
  chosen: This is rest
  alternatives:
  - This is the resting place
  - This is the rest
  lexicon: HALOT
  rationale: מְנוּחָה denotes rest or resting place. 'This is rest' is concise and
    preserves the abstract noun, fitting the prophetic declaration.
- source_word: הָנִיחוּ
  chosen: give rest
  alternatives:
  - let rest
  - cause to rest
  - set down
  lexicon: HALOT
  rationale: Imperative plural from נוח in the causative stem. In context it functions
    as an exhortation regarding the weary. 'Give rest' is idiomatic English that preserves
    the causative force better than the less natural 'cause to rest.'
- source_word: לֶעָיֵף
  chosen: to the weary
  alternatives:
  - for the weary
  - to the tired one
  lexicon: HALOT
  rationale: עָיֵף means weary, faint, exhausted. The phrase identifies the recipient
    of the offered rest. 'To the weary' is natural and sufficiently literal.
- source_word: וְזֹאת הַמַּרְגֵּעָה
  chosen: and this is repose
  alternatives:
  - and this is refreshing
  - and this is the resting place
  - and this is restfulness
  lexicon: HALOT
  rationale: מַרְגֵּעָה is related to rest, quiet, repose, and may overlap semantically
    with מְנוּחָה while adding the nuance of settled relief. 'Repose' preserves the
    distinction without becoming paraphrastic. 'Refreshing' is possible but more interpretive.
- source_word: וְלֹא אָבוּא
  chosen: yet they were not willing
  alternatives:
  - but they would not
  - and they were unwilling
  lexicon: HALOT
  rationale: אבה expresses willingness/refusal. The idiom means they refused. 'They
    were not willing' closely reflects the lexical sense; 'yet' captures the adversative
    force in context.
- source_word: שְׁמוֹעַ
  chosen: to hear
  alternatives:
  - to listen
  - to obey
  lexicon: HALOT
  rationale: שׁמע fundamentally means hear/listen, and in some contexts implies obedience.
    Here the immediate sense is refusal to heed the message. 'To hear' keeps the Hebrew
    wording, while the broader implication of heeding remains available from context.
