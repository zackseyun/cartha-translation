id: ISA.28.29
reference: Isaiah 28:29
source:
  edition: WLC
  text: גַּם זֹ֕את מֵ/עִ֛ם יְהוָ֥ה צְבָא֖וֹת יָצָ֑אָה הִפְלִ֣יא עֵצָ֔ה הִגְדִּ֖יל תּוּשִׁיָּֽה־׃ס
translation:
  text: This also comes from Yahweh of hosts; he is wonderful in counsel and great in wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sound wisdom' or 'resourcefulness' for 'wisdom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם זֹאת
  chosen: This also
  alternatives:
  - This too
  - Even this
  lexicon: HALOT
  rationale: 'The combination adds this statement to the preceding agricultural analogy: ''this also/too.'' ''This also'' is natural modern English and preserves the connective force.'
- source_word: מֵעִם
  chosen: has come from
  alternatives:
  - is from
  - came from with/from beside
  lexicon: HALOT
  rationale: With יָצָאָה ('has gone out/come forth'), the preposition marks source or origin. 'Has come from' expresses provenance idiomatically in English.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD Almighty
  - Yahweh of hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is kept as 'hosts' rather than flattened to 'Almighty,' preserving the military/heavenly-armies imagery of the title.
- source_word: יָצָאָה
  chosen: has come
  alternatives:
  - came forth
  - has gone out
  lexicon: HALOT
  rationale: The perfect verb presents the matter as having issued from the LORD. 'Has come' fits English style with the preceding source phrase and avoids overly wooden wording.
- source_word: הִפְלִיא
  chosen: is wonderful
  alternatives:
  - has made wonderful
  - shows himself wonderful
  - does wonderfully
  lexicon: HALOT
  rationale: The Hiphil of פלא can mean to do wonderfully or make wonderful. In this compressed poetic line, an adjectival-predicative rendering best conveys the sense of extraordinary excellence attributed to the LORD.
- source_word: עֵצָה
  chosen: counsel
  alternatives:
  - plan
  - advice
  - purpose
  lexicon: HALOT
  rationale: In wisdom and governance contexts, עֵצָה commonly denotes counsel or plan. 'Counsel' pairs well with the following wisdom term and preserves the deliberative nuance.
- source_word: הִגְדִּיל
  chosen: great
  alternatives:
  - has made great
  - magnifies
  - is great
  lexicon: HALOT
  rationale: The Hiphil literally means 'made great,' but in this verbless-like poetic commendation the sense is that the LORD is great in the quality named. 'Great in' is idiomatic and parallel to 'wonderful in counsel.'
- source_word: תּוּשִׁיָּה
  chosen: wisdom
  alternatives:
  - sound wisdom
  - resourcefulness
  - effectiveness
  lexicon: HALOT
  rationale: תּוּשִׁיָּה can denote sound wisdom, practical insight, or effective competence. 'Wisdom' is the clearest concise rendering in English here, while the footnote preserves the fuller nuance of 'sound wisdom' or 'resourcefulness'.
