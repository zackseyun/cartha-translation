theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of the promise imagery
  chosen_reading: material wealth concealed in dark/secret places
  alternative_readings:
  - metaphorical spiritual treasures
  rationale: In context, the address to Cyrus and the surrounding references to opening gates and subduing nations favor actual hidden wealth, though the language also carries theological force about the LORD's sovereignty. The translation keeps the concrete imagery and does not spiritualize it.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
