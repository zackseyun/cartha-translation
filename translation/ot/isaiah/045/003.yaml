theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse explicitly names Israel's covenant God. Following the project's
    stated policy, the Tetragrammaton is rendered 'the LORD' rather than transliterated,
    while alternatives are preserved in documentation rather than the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of the promise imagery
  chosen_reading: material wealth concealed in dark/secret places
  alternative_readings:
  - metaphorical spiritual treasures
  rationale: In context, the address to Cyrus and the surrounding references to opening
    gates and subduing nations favor actual hidden wealth, though the language also
    carries theological force about the LORD's sovereignty. The translation keeps
    the concrete imagery and does not spiritualize it.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
