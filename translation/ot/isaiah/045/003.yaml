id: ISA.45.3
reference: Isaiah 45:3
source:
  edition: WLC
  text: וְ/נָתַתִּ֤י לְ/ךָ֙ אוֹצְר֣וֹת חֹ֔שֶׁךְ וּ/מַטְמֻנֵ֖י מִסְתָּרִ֑ים לְמַ֣עַן תֵּדַ֗ע כִּֽי אֲנִ֧י יְהוָ֛ה הַ/קּוֹרֵ֥א בְ/שִׁמְ/ךָ֖ אֱלֹהֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: And I will give you the treasures of darkness and the hidden riches of secret places, so that you may know that I am Yahweh, the one who calls you by name, the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'treasures hidden in darkness' for 'treasures of darkness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'hidden treasures of secret places.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the LORD' represents the divine name YHWH; alternatively transliterated 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will give
  alternatives:
  - and I have given
  - and I give
  lexicon: HALOT
  rationale: Qal perfect 1cs with prefixed conjunction in prophetic discourse commonly carries a future sense in English. 'Will give' best fits the promise context addressed to Cyrus in the surrounding passage.
- source_word: אוֹצְרוֹת חֹשֶׁךְ
  chosen: treasures of darkness
  alternatives:
  - treasures in darkness
  - treasures hidden in darkness
  lexicon: HALOT
  rationale: A construct chain literally 'treasures of darkness.' This likely refers to wealth concealed in dark or inaccessible places. The more literal rendering preserves the imagery while remaining intelligible.
- source_word: וּמַטְמֻנֵי מִסְתָּרִים
  chosen: hidden riches of secret places
  alternatives:
  - hoards of hidden places
  - treasures of secret places
  - hidden treasures
  lexicon: HALOT
  rationale: מַטְמֻנִים denotes hidden stores or buried treasure; the construct with מִסְתָּרִים intensifies the idea of concealment. 'Hidden riches of secret places' preserves both the material sense and the poetic parallelism without collapsing the phrase into a single generic term.
- source_word: לְמַעַן תֵּדַע
  chosen: so that you may know
  alternatives:
  - in order that you may know
  - that you may know
  lexicon: HALOT
  rationale: This expresses purpose. 'So that you may know' is natural modern English and preserves the purposive force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַקּוֹרֵא בְשִׁמְךָ
  chosen: the one who calls you by your name
  alternatives:
  - who calls you by name
  - who calls your name
  lexicon: HALOT
  rationale: The participial phrase identifies the LORD as the one summoning or naming Cyrus specifically. 'By your name' preserves the personal specificity of בְשִׁמְךָ better than the slightly more idiomatic but less explicit 'by name.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: Standard construct rendering; clear and natural in English while preserving the covenantal identification.
