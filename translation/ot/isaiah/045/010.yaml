id: ISA.45.10
reference: Isaiah 45:10
source:
  edition: WLC
  text: ה֛וֹי אֹמֵ֥ר לְ/אָ֖ב מַה תּוֹלִ֑יד וּ/לְ/אִשָּׁ֖ה מַה תְּחִילִֽי/ן־־׃ס
translation:
  text: Woe to one who says to a father, ‘What are you fathering?’ or to a woman,
    ‘What are you in labor with?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or ‘What are you begetting?’ The Hebrew verb refers specifically to a father's
      begetting.
    reason: lexical_alternative
  - marker: b
    text: Or ‘What are you bringing forth?’ The Hebrew evokes a woman's labor pains
      and childbirth.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Woe to
  - Alas
  lexicon: HALOT
  rationale: Prophetic interjection of denunciation or lament; 'Woe' preserves the
    sharp oracular force better than softer options like 'Alas.'
- source_word: אֹמֵר
  chosen: one who says
  alternatives:
  - him who says
  - the one saying
  lexicon: HALOT
  rationale: The participle functions substantivally. 'One who says' gives natural
    English while retaining the generic singular force.
- source_word: לְאָב
  chosen: to a father
  alternatives:
  - to his father
  lexicon: HALOT
  rationale: The preposition marks indirect address. No possessive suffix is present,
    so 'to a father' is more exact than 'to his father,' though the sense is representative.
- source_word: מַה
  chosen: What
  alternatives:
  - Why
  - What is it that
  lexicon: HALOT
  rationale: Interrogative pronoun introducing the absurd question. 'What' is the
    plain lexical value here.
- source_word: תּוֹלִיד
  chosen: are you fathering
  alternatives:
  - will you beget
  - are you begetting
  - what have you begotten
  lexicon: HALOT
  rationale: Hiphil of ילד addressed to a masculine singular subject means 'beget/father.'
    'Are you fathering' preserves the paternal imagery and present questioning force
    in idiomatic English; 'beget' is more formal but less readable.
- source_word: וּלְאִשָּׁה
  chosen: or to a woman
  alternatives:
  - and to a woman
  - or to his mother
  lexicon: HALOT
  rationale: The conjunction here coordinates the second parallel address. English
    'or' fits the paired construction better than a simple 'and.' No possessive suffix
    is present, so 'a woman' is more textually precise than 'his mother,' though maternal
    reference is implied by context.
- source_word: תְּחִילִין
  chosen: are you in labor with
  alternatives:
  - what are you bringing forth
  - what are you travailing with
  lexicon: HALOT
  rationale: From חול/חיל in the sense of writhing or being in labor. The form points
    to a second feminine singular address with an enclitic nun. 'Are you in labor
    with' captures the maternal image naturally; 'bringing forth' would shift toward
    the result rather than the labor process.
