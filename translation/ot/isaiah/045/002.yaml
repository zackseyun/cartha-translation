id: ISA.45.2
reference: Isaiah 45:2
source:
  edition: WLC
  text: אֲנִי֙ לְ/פָנֶ֣י/ךָ אֵלֵ֔ךְ וַ/הֲדוּרִ֖ים אושר דַּלְת֤וֹת נְחוּשָׁה֙ אֲשַׁבֵּ֔ר
    וּ/בְרִיחֵ֥י בַרְזֶ֖ל אֲגַדֵּֽעַ׃
translation:
  text: I myself will go before you, and I will level the rough places; I will break
    in pieces doors of bronze, and I will cut through bars of iron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and I will make the uneven places level'; the Hebrew phrase is textually
      and lexically difficult, and some translations render it more specifically as
      'mountains' or 'heights.'
    reason: alternative_reading
lexical_decisions:
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - ahead of you
  - in front of you
  lexicon: HALOT
  rationale: Spatial idiom with anticipatory force; 'before you' is natural English
    and preserves the sense of going in advance.
- source_word: אֵלֵךְ
  chosen: I will go
  alternatives:
  - I go
  lexicon: HALOT
  rationale: Imperfect 1cs in prophetic promise context is best rendered as future.
- source_word: וַהֲדוּרִים אושר
  chosen: and I will level the rough places
  alternatives:
  - and I will make the mountains plain
  - and I will straighten the uneven places
  lexicon: HALOT
  rationale: The consonantal text/morphology points to a difficult phrase traditionally
    understood as uneven, elevated, or rugged terrain being made level. 'Rough places'
    is broad enough to reflect the likely sense without overcommitting to 'mountains,'
    while 'level' captures the Hiphil causative idea.
- source_word: דַּלְתוֹת נְחוּשָׁה
  chosen: doors of bronze
  alternatives:
  - gates of bronze
  - bronze doors
  lexicon: HALOT
  rationale: דלתות are literally 'doors,' not the more common שערים 'gates.' 'Bronze'
    is the standard rendering of נְחוּשָׁה in this context.
- source_word: אֲשַׁבֵּר
  chosen: I will break in pieces
  alternatives:
  - I will shatter
  - I will break
  lexicon: HALOT
  rationale: Piel intensifies the action beyond a simple 'break'; 'break in pieces'
    preserves that force in readable English.
- source_word: בְרִיחֵי בַרְזֶל
  chosen: bars of iron
  alternatives:
  - iron bars
  - bolts of iron
  lexicon: HALOT
  rationale: בריח can denote a bar or bolt securing a door/gate. 'Bars of iron' is
    idiomatic and fits the parallel with 'doors of bronze.'
- source_word: אֲגַדֵּעַ
  chosen: I will cut through
  alternatives:
  - I will cut down
  - I will hew off
  lexicon: HALOT
  rationale: The verb conveys cutting or chopping apart. 'Cut through' fits the object
    'bars' naturally in English and communicates decisive removal.
