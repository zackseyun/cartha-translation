theological_decisions:
- issue: Divine self-identification and emphasis
  chosen_reading: I myself will go before you
  alternative_readings:
  - I will go before you
  rationale: The explicit pronoun אֲנִי adds emphasis. Rendering it as 'I myself'
    preserves the force of YHWH's personal commitment without adding theological content
    beyond the text.
