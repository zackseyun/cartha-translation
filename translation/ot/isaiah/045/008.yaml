- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering of צדק / צדקה
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Although the semantic field can include justice, the verse's pairing with salvation and its cosmic-redemptive imagery favor 'righteousness' as the broader theological term. The alternative is preserved in a footnote because the Hebrew can bear that nuance.
