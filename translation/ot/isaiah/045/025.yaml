theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of צדק in this salvation context
  chosen_reading: will be justified
  alternative_readings:
  - will be vindicated
  - will be righteous
  rationale: The verse speaks of what happens to Israel's offspring in relation to the LORD. 'Will be justified' preserves the theological weight of receiving right standing from him without importing a narrower later doctrinal system. Because the Hebrew can also bear 'vindicated,' that alternative is preserved in a footnote rather than excluded.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
