theological_decisions:
- issue: Rendering מְשִׁיחוֹ with reference to Cyrus
  chosen_reading: his anointed
  alternative_readings:
  - his Messiah
  rationale: Although the Hebrew term is the same lexical root later associated with 'Messiah,' here it designates Cyrus as one appointed and empowered by the LORD for a historical purpose. Rendering it 'his anointed' preserves the lexical meaning and theological surprise of the passage without implying that Cyrus is the messianic redeemer in the christological sense.
  doctrine_reference: Translate titles; transliterate names; preserve theological tension rather than resolve it.
