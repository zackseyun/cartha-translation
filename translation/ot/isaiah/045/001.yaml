id: ISA.45.1
reference: Isaiah 45:1
source:
  edition: WLC
  text: כֹּה אָמַ֣ר יְהוָה֮ לִ/מְשִׁיח/וֹ֮ לְ/כ֣וֹרֶשׁ אֲשֶׁר הֶחֱזַ֣קְתִּי בִֽ/ימִינ֗/וֹ לְ/רַד לְ/פָנָי/ו֙ גּוֹיִ֔ם וּ/מָתְנֵ֥י מְלָכִ֖ים אֲפַתֵּ֑חַ לִ/פְתֹּ֤חַ לְ/פָנָי/ו֙ דְּלָתַ֔יִם וּ/שְׁעָרִ֖ים לֹ֥א יִסָּגֵֽרוּ־־־׃
translation:
  text: 'Thus says Yahweh to his anointed, to Cyrus, whose right hand I have grasped, to subdue nations before him and to loosen the loins of kings, to open doors before him, and gates shall not be shut:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'his anointed' uses the same word family later associated with 'Messiah'; here it refers to Cyrus as one appointed by the LORD for this task.
    reason: lexical_alternative
  - marker: b
    text: Or 'to ungird the loins of kings,' an idiom for weakening or disarming them.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'doors' is a dual form, possibly 'double doors.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  lexicon: HALOT
  rationale: Introduces a prophetic declaration formula. 'Thus' preserves the elevated, formulaic tone of prophetic speech in concise English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal force while matching established English Bible convention.
- source_word: לִמְשִׁיחוֹ
  chosen: to his anointed
  alternatives:
  - to his Messiah
  lexicon: HALOT
  rationale: The noun means 'anointed one.' Here it refers to Cyrus, a historical Persian ruler, not the eschatological messianic title in its later specialized sense. Lowercase 'anointed' preserves the lexical meaning without importing christological claims.
- source_word: לְכוֹרֶשׁ
  chosen: to Cyrus
  lexicon: HALOT
  rationale: Standard English transliteration of the Persian royal name כּוֹרֶשׁ.
- source_word: הֶחֱזַקְתִּי בִימִינוֹ
  chosen: whose right hand I have grasped
  alternatives:
  - whose right hand I have taken hold of
  - whom I have strengthened by his right hand
  lexicon: HALOT
  rationale: The idiom most naturally means taking or grasping someone by the right hand in order to support and empower. 'Grasped' is vivid and idiomatic in English while preserving the concrete imagery.
- source_word: לְרַד
  chosen: to subdue
  alternatives:
  - to tread down
  - to bring low
  lexicon: HALOT
  rationale: From רדה, conveying dominion or subjugation. In context of nations before Cyrus, 'subdue' best captures the military-political sense.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentiles
  lexicon: HALOT
  rationale: In this geopolitical context, 'nations' is the most natural rendering.
- source_word: וּמָתְנֵי מְלָכִים אֲפַתֵּחַ
  chosen: and to loosen the belts of kings
  alternatives:
  - and to ungird the loins of kings
  - and to strip kings of strength
  lexicon: HALOT
  rationale: Literally 'the loins of kings I will open/unfasten.' This idiom refers to loosening the belt at the waist, symbolizing disarming, weakening, or causing fear. 'Loosen the belts of kings' preserves the image in readable English.
- source_word: לִפְתֹּחַ לְפָנָיו דְּלָתַיִם
  chosen: to open doors before him
  alternatives:
  - to open double doors before him
  lexicon: HALOT
  rationale: דְּלָתַיִם is a dual form, often referring to a pair of doors or double doors. English 'doors' is natural; the dual nuance is not essential in the main text but worth preserving in a footnote.
- source_word: וּשְׁעָרִים לֹא יִסָּגֵרוּ
  chosen: and gates shall not be shut
  alternatives:
  - and gates will not be closed
  lexicon: HALOT
  rationale: Keeps the passive/resultative sense and the formal prophetic cadence. 'Shut' is slightly more idiomatic for gates than 'closed' in this register.
