theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrinal and translation guidelines explicitly set YHWH
    to 'the LORD' as the default, preserving reverential convention and broad ecclesial
    recognizability.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Concessive force of the final clause
  chosen_reading: I strengthen you, though you have not known me
  alternative_readings:
  - I strengthen you, and you have not known me
  - I gird you, though you did not know me
  rationale: The verse emphasizes divine sovereignty in empowering Cyrus independently
    of Cyrus's prior acknowledgment of the LORD. Rendering the conjunction concessively
    preserves the theological tension in the Hebrew context without adding doctrinal
    claims beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
