id: ISA.45.5
reference: Isaiah 45:5
source:
  edition: WLC
  text: אֲנִ֤י יְהוָה֙ וְ/אֵ֣ין ע֔וֹד זוּלָתִ֖/י אֵ֣ין אֱלֹהִ֑ים אֲאַזֶּרְ/ךָ֖ וְ/לֹ֥א
    יְדַעְתָּֽ/נִי׃
translation:
  text: I am the LORD, and there is no other; besides me there is no God. I strengthen
    you, though you have not known me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I arm you' or 'I gird you.' The Hebrew verb can denote equipping or
      girding for strength.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the Septuagintal pattern. This is a title-like
    covenant name and should be translated rather than transliterated in this project.
- source_word: וְאֵין עוֹד
  chosen: and there is no other
  alternatives:
  - and there is none else
  - and there is no one else
  lexicon: HALOT
  rationale: אֵין with עוֹד forms an exclusivity statement. 'There is no other' is
    idiomatic modern English and preserves the absolute monotheistic force without
    archaic diction.
- source_word: זוּלָתִי
  chosen: besides me
  alternatives:
  - apart from me
  - except for me
  lexicon: HALOT
  rationale: The prepositional form with 1cs suffix marks exclusion relative to the
    speaker. 'Besides me' is concise, natural, and fits the parallelism with the preceding
    exclusivity claim.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - god
  - divine being
  lexicon: HALOT
  rationale: In this context of absolute monotheistic assertion, the singular mass
    sense in English is best represented by 'God,' even though the Hebrew form is
    morphologically plural. Lowercase 'god' could suggest one deity among others rather
    than the denial of any true deity besides the LORD.
- source_word: אֲאַזֶּרְךָ
  chosen: I strengthen you
  alternatives:
  - I arm you
  - I gird you
  - I equip you
  lexicon: HALOT
  rationale: From אזר in the piel, the verb can denote girding, equipping, or strengthening.
    In context addressed to Cyrus, the sense includes empowering for action. 'I strengthen
    you' communicates the empowerment clearly in modern English while remaining close
    to the source. The more literal 'gird' is possible but less transparent to contemporary
    readers.
- source_word: וְלֹא יְדַעְתָּנִי
  chosen: though you have not known me
  alternatives:
  - even though you did not know me
  - while you have not known me
  lexicon: HALOT
  rationale: 'The conjunction here is best taken concessively in context: the LORD
    empowers Cyrus despite Cyrus''s lack of covenantal knowledge of him. ''Though
    you have not known me'' captures that concessive force and the relational sense
    of ידע without overinterpreting it as intimate covenant knowledge only.'
