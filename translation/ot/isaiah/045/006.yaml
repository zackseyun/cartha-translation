theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering of יְהוָה as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern. The
    alternative transliteration is preserved in a footnote rather than used in the
    main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of the geographic expression
  chosen_reading: from the rising of the sun and from its setting
  alternative_readings:
  - from the east to the west
  rationale: The Hebrew uses solar imagery rather than bare compass points. Preserving
    the imagery better reflects the source text while still conveying universal scope.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Monotheistic exclusivity formula
  chosen_reading: there is none besides me ... there is no other
  alternative_readings:
  - there is nothing besides me ... there is none else
  rationale: The verse emphatically asserts the LORD's uniqueness. The chosen wording
    preserves the theological force without importing later doctrinal formulations
    beyond the text itself.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
