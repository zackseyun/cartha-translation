theological_decisions:
- issue: Divine exclusivity / monotheistic claim
  chosen_reading: 'Rendered the final clause as an absolute statement of God''s uniqueness:
    ''there is no other.'''
  alternative_readings:
  - there is none else
  - there is no one besides me
  rationale: The Hebrew asserts exclusive deity as the basis for the universal call
    to salvation. The translation preserves that theological force without expanding
    the text by adding 'me' where the Hebrew leaves it implicit.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
