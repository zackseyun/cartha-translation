id: ISA.45.22
reference: Isaiah 45:22
source:
  edition: WLC
  text: פְּנוּ אֵלַ֥/י וְ/הִוָּשְׁע֖וּ כָּל אַפְסֵי אָ֑רֶץ כִּ֥י אֲנִי אֵ֖ל וְ/אֵ֥ין
    עֽוֹד־־־־׃
translation:
  text: Turn to me and be saved, all the ends of the earth; for I am God, and there
    is no other.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Look to me and be saved.' The Hebrew verb can denote turning toward
      someone, and in context may include the sense of directing one's gaze to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּנוּ
  chosen: Turn
  alternatives:
  - Look
  - Turn yourselves
  lexicon: HALOT
  rationale: The imperative of פנה can mean 'turn' or 'turn toward.' In this context
    with אֵלַי ('to me'), 'Turn to me' best captures the directional call without
    overcommitting to the more interpretive 'look to me.'
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - toward me
  lexicon: HALOT
  rationale: The preposition אֶל with 1cs suffix indicates motion or orientation toward
    the speaker. 'To me' is idiomatic and preserves the direct summons.
- source_word: וְהִוָּשְׁעוּ
  chosen: and be saved
  alternatives:
  - that you may be saved
  - and find salvation
  lexicon: HALOT
  rationale: Niphal imperative plural from ישׁע is most naturally rendered 'be saved.'
    This preserves the passive/reflexive sense of receiving deliverance rather than
    producing it.
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: Straightforward universal quantifier modifying 'the ends of the earth.'
- source_word: אַפְסֵי אָרֶץ
  chosen: the ends of the earth
  alternatives:
  - the remotest parts of the earth
  - the farthest reaches of the earth
  lexicon: HALOT
  rationale: A standard Hebrew expression for the extremities or farthest regions
    of the world. 'Ends of the earth' is both accurate and natural English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the summons. 'For' fits the explanatory force
    in elevated but still readable English.
- source_word: אֲנִי אֵל
  chosen: I am God
  alternatives:
  - I am El
  - I am God alone
  lexicon: HALOT
  rationale: אֵל here is the common noun/title 'God,' not a proper name to be transliterated.
    'I am God' preserves the absolute divine self-identification; 'alone' is implied
    by the following clause and need not be imported here.
- source_word: וְאֵין עוֹד
  chosen: and there is no other
  alternatives:
  - and there is none else
  - and there is no one besides
  lexicon: HALOT
  rationale: This idiom asserts exclusivity. 'There is no other' is clear modern English
    and preserves the monotheistic force without archaic diction.
