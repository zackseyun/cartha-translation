theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: צַדִּיק in relation to God
  chosen_reading: righteous
  alternative_readings:
  - just
  rationale: Both are lexically defensible. 'Righteous' is retained in the main text because it is the broader covenantal-moral descriptor and aligns with the project's default handling of righteousness language, while 'just' is preserved as an alternative nuance.
