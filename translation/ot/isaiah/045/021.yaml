id: ISA.45.21
reference: Isaiah 45:21
source:
  edition: WLC
  text: הַגִּ֣ידוּ וְ/הַגִּ֔ישׁוּ אַ֥ף יִֽוָּעֲצ֖וּ יַחְדָּ֑ו מִ֣י הִשְׁמִיעַ֩ זֹ֨את מִ/קֶּ֜דֶם מֵ/אָ֣ז הִגִּידָ֗/הּ הֲ/ל֨וֹא אֲנִ֤י יְהוָה֙ וְ/אֵֽין ע֤וֹד אֱלֹהִים֙ מִ/בַּלְעָדַ֔/י אֵֽל צַדִּ֣יק וּ/מוֹשִׁ֔יעַ אַ֖יִן זוּלָתִֽ/י־־׃
translation:
  text: Declare it and present your case; indeed, let them consult together. Who announced this from long ago? Who declared it from former times? Was it not I, Yahweh? There is no other God besides me, a righteous God and a Savior; there is none except me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''bring it near'' / ''present it''; the Hebrew likely carries a courtroom sense: ''present your case.'''
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'YHWH'; traditionally rendered 'the LORD.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a just God and a Savior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגִּידוּ
  chosen: Declare it
  alternatives:
  - Tell
  - Announce
  lexicon: HALOT
  rationale: Imperative plural of נגד, calling for a formal public declaration. 'Declare' fits the forensic/challenge setting better than the more casual 'tell'.
- source_word: וְהַגִּישׁוּ
  chosen: present your case
  alternatives:
  - bring near
  - present it
  lexicon: HALOT
  rationale: Hiphil imperative of נגשׁ in a disputation context likely means to bring forward evidence or a case. 'Present your case' makes the implied legal setting clear in natural English.
- source_word: אַף יִוָּעֲצוּ יַחְדָּו
  chosen: indeed, let them consult together
  alternatives:
  - yes, let them take counsel together
  - even let them deliberate together
  lexicon: HALOT
  rationale: The particle plus Niphal imperfect/jussive sense invites collective deliberation. 'Consult together' preserves the challenge for the nations/idols' advocates to confer.
- source_word: מִי הִשְׁמִיעַ זֹאת
  chosen: Who announced this
  alternatives:
  - Who caused this to be heard
  - Who proclaimed this
  lexicon: HALOT
  rationale: The idiom means to make known or proclaim. 'Announced this' is concise and idiomatic.
- source_word: מִקֶּדֶם
  chosen: from long ago
  alternatives:
  - from of old
  - from ancient time
  lexicon: HALOT
  rationale: Temporal expression indicating antiquity. 'From long ago' is readable modern English while preserving the sense.
- source_word: מֵאָז הִגִּידָהּ
  chosen: Who declared it from former times
  alternatives:
  - Who told it from then
  - Who declared it beforehand
  lexicon: HALOT
  rationale: 'Taken with the preceding interrogative by ellipsis: a second parallel question. ''Former times'' captures מאז as a past reference point without archaic tone.'
- source_word: הֲלוֹא אֲנִי יְהוָה
  chosen: Was it not I, the LORD?
  alternatives:
  - Is it not I, the LORD?
  - Was it not I, Yahweh?
  lexicon: HALOT
  rationale: The rhetorical question points to the LORD as the one who foretold events. Per doctrine, יְהוָה is rendered 'the LORD,' with 'Yahweh' preserved only as an alternative, not in the main text.
- source_word: וְאֵין עוֹד אֱלֹהִים מִבַּלְעָדַי
  chosen: There is no other God besides me
  alternatives:
  - and there is no God besides me
  - there is no further God apart from me
  lexicon: HALOT
  rationale: A standard exclusivity formula. 'Other God besides me' is natural English and preserves the monotheistic claim.
- source_word: אֵל צַדִּיק
  chosen: a righteous God
  alternatives:
  - a just God
  lexicon: HALOT
  rationale: צדיק can mean righteous or just. 'Righteous' is chosen as the default theological term in English Bible style, while 'just' remains a viable lexical alternative.
- source_word: וּמוֹשִׁיעַ
  chosen: and a Savior
  alternatives:
  - and one who saves
  - and a deliverer
  lexicon: HALOT
  rationale: The participle denotes one who saves/delivers. 'Savior' is the most idiomatic and theologically weighty English rendering here.
- source_word: אַיִן זוּלָתִי
  chosen: there is none except me
  alternatives:
  - there is none besides me
  - none apart from me
  lexicon: HALOT
  rationale: A second exclusivity statement reinforcing the previous clause. 'Except me' avoids exact repetition while preserving the meaning.
