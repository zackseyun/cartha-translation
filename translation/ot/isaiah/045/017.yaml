theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH.
    This also aligns with the verse's covenantal context without importing a pronunciation
    not present in the consonantal text.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH | Default English:
    the LORD'
- issue: Agency/sphere nuance of ב in ביהוה
  chosen_reading: by the LORD
  alternative_readings:
  - in the LORD
  - through the LORD
  rationale: The Hebrew preposition permits more than one nuance, but with the passive
    verb 'is saved' the agentive sense is strongest in English. The choice avoids
    doctrinal overreading while making the clause idiomatic.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
