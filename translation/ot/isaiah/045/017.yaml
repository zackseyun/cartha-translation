id: ISA.45.17
reference: Isaiah 45:17
source:
  edition: WLC
  text: יִשְׂרָאֵל֙ נוֹשַׁ֣ע בַּ/יהוָ֔ה תְּשׁוּעַ֖ת עוֹלָמִ֑ים לֹא תֵבֹ֥שׁוּ וְ/לֹא
    תִכָּלְמ֖וּ עַד ע֥וֹלְמֵי עַֽד־־־׃פ
translation:
  text: Israel is saved by the LORD with an everlasting salvation; you will not be
    put to shame or disgraced forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the LORD'; the Hebrew preposition can express sphere as well as agency.
    reason: alternative_reading
  - marker: b
    text: Or 'you will not be ashamed or humiliated.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נוֹשַׁע
  chosen: is saved
  alternatives:
  - has been saved
  - shall be saved
  - is victorious
  lexicon: HALOT
  rationale: The Niphal of ישׁע here expresses Israel's deliverance/salvation as effected
    by YHWH. Present English ('is saved') best captures the verbless-prophetic style
    in context without overcommitting to either simple past or future; the following
    imperfects then naturally continue the promise.
- source_word: בַּיהוָה
  chosen: by the LORD
  alternatives:
  - in the LORD
  - through the LORD
  lexicon: HALOT
  rationale: The preposition ב can mark instrumentality or sphere. Here, with a passive
    verb ('is saved'), English 'by the LORD' most naturally conveys YHWH as the effective
    agent of salvation. Per doctrine, יהוה is rendered 'the LORD,' not 'Yahweh'.
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name, preserving
    Jewish reverence tradition and the long-standing convention reflected in many
    English Bibles.
- source_word: תְּשׁוּעַת עוֹלָמִים
  chosen: with an everlasting salvation
  alternatives:
  - an eternal salvation
  - salvation for ages
  lexicon: HALOT
  rationale: The construct phrase literally denotes 'a salvation of ages/everlasting
    salvation.' 'Everlasting salvation' is idiomatic and preserves the durative force
    of עוֹלָמִים.
- source_word: לֹא תֵבֹשׁוּ
  chosen: you will not be put to shame
  alternatives:
  - you will not be ashamed
  - you will not be disappointed
  lexicon: HALOT
  rationale: בושׁ often carries the sense of experiencing shame or being shamed. 'Be
    put to shame' preserves the public/resultative nuance and fits the future promise
    addressed to the people.
- source_word: וְלֹא תִכָּלְמוּ
  chosen: or disgraced
  alternatives:
  - or humiliated
  - or confounded
  lexicon: HALOT
  rationale: The Niphal of כלם overlaps with בושׁ but adds the sense of humiliation/disgrace.
    Rendering it distinctly as 'disgraced' preserves the poetic pairing without flattening
    the parallelism into exact repetition.
- source_word: עַד עוֹלְמֵי עַד
  chosen: forever and ever
  alternatives:
  - to the ages of eternity
  - for everlasting ages
  lexicon: HALOT
  rationale: This idiom intensifies perpetuity. 'Forever and ever' is the most natural
    English equivalent and preserves the emphatic endless duration.
