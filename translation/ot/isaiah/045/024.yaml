id: ISA.45.24
reference: Isaiah 45:24
source:
  edition: WLC
  text: אַ֧ךְ בַּ/יהוָ֛ה לִ֥/י אָמַ֖ר צְדָק֣וֹת וָ/עֹ֑ז עָדָי/ו֙ יָב֣וֹא וְ/יֵבֹ֔שׁוּ
    כֹּ֖ל הַ/נֶּחֱרִ֥ים בּֽ/וֹ׃
translation:
  text: Only in the LORD, it shall be said of me, are righteousness and strength;
    to him they shall come, and all who were enraged against him shall be put to shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Only in the LORD are righteousness and strength,” one shall say.
    reason: alternative_reading
  - marker: b
    text: Hebrew צְדָקוֹת is plural, possibly “righteous acts” or “vindications.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Only
  alternatives:
  - Surely
  - Indeed
  lexicon: HALOT
  rationale: 'אַךְ here marks exclusivity/emphasis. ''Only'' best fits the sense in
    context: exclusive source/location in the LORD.'
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  - with the LORD
  lexicon: HALOT
  rationale: 'Preposition ב marks sphere/source: righteousness and strength are found
    ''in'' the LORD. Per doctrine, יהוה is rendered ''the LORD,'' not ''Yahweh,''
    with the divine name translated rather than transliterated.'
- source_word: לִי
  chosen: of me
  alternatives:
  - for me
  - concerning me
  lexicon: HALOT
  rationale: The phrase לִי אָמַר is idiomatic and difficult. 'It shall be said of
    me' best captures the likely sense that the speaker/testifier says this as his
    confession. 'Of me' preserves the first-person pronominal element without overparaphrasing.
- source_word: אָמַר
  chosen: it shall be said
  alternatives:
  - one says
  - he says
  - I said
  lexicon: HALOT
  rationale: Though morphologically qatal 3ms, in this poetic-prophetic context it
    functions idiomatically in reported speech. English passive 'it shall be said'
    is a natural rendering that matches the sense reflected in many contextual readings
    and avoids forcing an explicit subject absent from the Hebrew.
- source_word: צְדָקוֹת
  chosen: righteousness
  alternatives:
  - righteous acts
  - victories
  - justice
  lexicon: HALOT
  rationale: Plural צְדָקוֹת can denote acts of righteousness/vindications, but in
    this collocation with עֹז and in the confessional statement, singular abstract
    'righteousness' is the most natural English equivalent. The plural nuance is absorbed
    idiomatically.
- source_word: וָעֹז
  chosen: and strength
  alternatives:
  - and might
  lexicon: HALOT
  rationale: עֹז commonly denotes strength/might. 'Strength' pairs well with 'righteousness'
    and is idiomatic modern English.
- source_word: עָדָיו
  chosen: to him
  alternatives:
  - unto him
  lexicon: HALOT
  rationale: The preposition indicates movement toward the LORD. 'To him' is straightforward
    and readable.
- source_word: יָבֹא
  chosen: they shall come
  alternatives:
  - he shall come
  lexicon: HALOT
  rationale: Although singular in form, the verb likely has a collective/distributive
    sense with an indefinite subject, especially followed by plural ויבשו and כל הנחרים
    בו. English plural 'they shall come' best conveys the sense of those turning to
    the LORD.
- source_word: וְיֵבֹשׁוּ
  chosen: shall be put to shame
  alternatives:
  - shall be ashamed
  - shall be disappointed
  lexicon: HALOT
  rationale: בוש in prophetic/judgment contexts often carries the sense of being shamed
    or disgraced. 'Be put to shame' preserves the judicial/resultative force.
- source_word: כֹּל
  chosen: all
  alternatives:
  - every one of
  lexicon: HALOT
  rationale: Standard rendering for comprehensiveness.
- source_word: הַנֶּחֱרִים
  chosen: who were enraged
  alternatives:
  - who were incensed
  - who contended fiercely
  - who were angry
  lexicon: HALOT
  rationale: From חרה, the participle denotes burning with anger. 'Enraged' captures
    the intensity better than merely 'angry'.
- source_word: בּוֹ
  chosen: against him
  alternatives:
  - at him
  - with him
  lexicon: HALOT
  rationale: With חרה, the preposition in English is best expressed as hostility directed
    'against him,' making the adversative sense clear.
