theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD' in continuity with Jewish reverence tradition and the LXX pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of צְדָקוֹת in relation to the LORD
  chosen_reading: righteousness
  alternative_readings:
  - righteous acts
  - vindications
  - justice
  rationale: The verse attributes covenantal rightness and empowering strength to
    the LORD without narrowing the term to forensic justice alone. 'Righteousness'
    preserves theological breadth while remaining idiomatic.
  doctrine_reference: DOCTRINE.md Translation philosophy §5; Contested terms analogy
    on δικαιοσύνη
- issue: Ambiguous speech formula לִי אָמַר
  chosen_reading: it shall be said of me
  alternative_readings:
  - one shall say, 'Only in the LORD are righteousness and strength'
  - he says to me
  - I said
  rationale: The Hebrew is syntactically compressed. The chosen rendering preserves
    the confessional/reportive force without overresolving the speaker identity. Because
    the ambiguity affects interpretation, an alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
