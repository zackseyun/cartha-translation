id: ISA.45.18
reference: Isaiah 45:18
source:
  edition: WLC
  text: כִּ֣י כֹ֣ה אָֽמַר יְ֠הוָה בּוֹרֵ֨א הַ/שָּׁמַ֜יִם ה֣וּא הָ/אֱלֹהִ֗ים יֹצֵ֨ר
    הָ/אָ֤רֶץ וְ/עֹשָׂ/הּ֙ ה֣וּא כֽוֹנְנָ֔/הּ לֹא תֹ֥הוּ בְרָאָ֖/הּ לָ/שֶׁ֣בֶת יְצָרָ֑/הּ
    אֲנִ֥י יְהוָ֖ה וְ/אֵ֥ין עֽוֹד־־׃
translation:
  text: 'For thus says the LORD, who created the heavens—he is God—who formed the
    earth and made it, he established it; he did not create it as a wasteland, but
    formed it to be inhabited: I am the LORD, and there is no other.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he did not create it empty,' 'he did not create it for chaos,' or 'he
      did not create it formless.' The Hebrew tohu can denote emptiness, desolation,
      or wasteness; here the contrast with 'to be inhabited' favors 'wasteland.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: בּוֹרֵא
  chosen: who created
  alternatives:
  - creator of
  - creating
  lexicon: HALOT
  rationale: The participle functions attributively with יְהוָה, describing him as
    the one who created the heavens. Relative-clause English is natural and preserves
    the verbal force.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: Plural 'heavens' reflects the Hebrew form and standard cosmological usage
    in Isaiah better than singular 'heaven' or the narrower 'sky'.
- source_word: הוּא הָאֱלֹהִים
  chosen: he is God
  alternatives:
  - he is the God
  - he is God alone
  lexicon: HALOT
  rationale: The clause is appositional/emphatic, identifying the creator as truly
    God. 'He is God' is idiomatic and preserves the force without adding 'alone,'
    which is implied more explicitly later in the verse.
- source_word: יֹצֵר
  chosen: who formed
  alternatives:
  - fashioned
  - forming
  lexicon: HALOT
  rationale: '''Formed'' is a standard rendering for יצר and preserves the shaping
    nuance, complementing but not duplicating ''created'' for ברא.'
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic creation context, 'earth' is clearly intended rather than
    the more local 'land'.
- source_word: וְעֹשָׂהּ
  chosen: and made it
  alternatives:
  - and completed it
  - and fashioned it
  lexicon: HALOT
  rationale: עשה is broad; 'made it' is the most straightforward complement to 'formed
    the earth' and keeps the sequence of creative acts.
- source_word: כּוֹנְנָהּ
  chosen: he established it
  alternatives:
  - he fixed it firmly
  - he set it in place
  lexicon: HALOT
  rationale: כון in this stem conveys establishing or making firm. 'Established it'
    is idiomatic and preserves the stability nuance.
- source_word: תֹהוּ
  chosen: as a wasteland
  alternatives:
  - empty
  - formless
  - chaos
  lexicon: HALOT
  rationale: 'In this context the point is purposive: God did not create the earth
    to be desolate or uninhabitable. ''As a wasteland'' captures the semantic force
    better in context than the more Genesis-shaped ''formless.'''
- source_word: לֹא תֹהוּ בְרָאָהּ
  chosen: he did not create it as a wasteland
  alternatives:
  - he did not create it empty
  - he did not create it for chaos
  lexicon: HALOT
  rationale: The phrase expresses the negative purpose/result of creation. Rendering
    with 'as a wasteland' gives clear English while preserving the contrast with habitation
    in the next clause.
- source_word: לָשֶׁבֶת
  chosen: to be inhabited
  alternatives:
  - for dwelling
  - to dwell in
  lexicon: HALOT
  rationale: The infinitive from ישב here denotes habitation. 'To be inhabited' expresses
    the earth's intended purpose in natural English.
- source_word: יְצָרָהּ
  chosen: formed it
  alternatives:
  - fashioned it
  lexicon: HALOT
  rationale: Repeating 'formed it' preserves the lexical link with יֹצֵר earlier in
    the verse and highlights intentional design.
- source_word: וְאֵין עוֹד
  chosen: and there is no other
  alternatives:
  - and there is none else
  - and there is no one besides me
  lexicon: HALOT
  rationale: This is a standard Isaianic exclusivity formula. 'There is no other'
    is clear modern English and preserves the monotheistic claim without overexpansion.
