theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by DOCTRINE.md contested terms table for YHWH. This preserves
    covenantal reverence and established English Bible convention while remaining
    transparent in documentation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Meaning of תֹהוּ in creation-purpose statement
  chosen_reading: wasteland/desolation rather than 'formless'
  alternative_readings:
  - formless
  - empty
  - chaos
  rationale: 'In Isaiah 45:18 the contrast is not with a pre-ordered stage of creation
    but with the earth''s intended end: habitation. Therefore a desolation-oriented
    rendering best preserves the verse''s argument and avoids importing Genesis 1:2
    terminology too directly.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy
    over translation tradition
- issue: Force of הוּא הָאֱלֹהִים
  chosen_reading: he is God
  alternative_readings:
  - he is the God
  - he alone is God
  rationale: The Hebrew identifies YHWH as God in emphatic apposition. 'He is God'
    preserves the assertion without adding 'alone' prematurely, since exclusivity
    is stated explicitly at the end of the verse.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological
    tension rather than resolve it
