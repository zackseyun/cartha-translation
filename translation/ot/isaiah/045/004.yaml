id: ISA.45.4
reference: Isaiah 45:4
source:
  edition: WLC
  text: לְמַ֨עַן֙ עַבְדִּ֣/י יַעֲקֹ֔ב וְ/יִשְׂרָאֵ֖ל בְּחִירִ֑/י וָ/אֶקְרָ֤א לְ/ךָ֙
    בִּ/שְׁמֶ֔/ךָ אֲכַנְּ/ךָ֖ וְ/לֹ֥א יְדַעְתָּֽ/נִי׃
translation:
  text: For the sake of my servant Jacob, and Israel my chosen one, I called you by
    your name; I gave you a title of honor, though you did not know me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I surnamed you' or 'I gave you a name/title.' The Hebrew verb can refer
      to assigning a designation or honorific name.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: For the sake of
  alternatives:
  - because of
  - for
  lexicon: HALOT
  rationale: Expresses purpose or motive. 'For the sake of' best captures the causal-purpose
    nuance in natural English.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it is an honorific covenantal
    designation for Jacob in prophetic discourse rather than emphasizing bonded status.
    'My servant' is the most fitting contextual rendering.
- source_word: בְּחִירִי
  chosen: my chosen one
  alternatives:
  - my chosen
  lexicon: HALOT
  rationale: Adjectival substantive describing Israel as the one chosen by God. 'My
    chosen one' is clear, natural, and preserves the personal force.
- source_word: וָאֶקְרָא לְךָ בִּשְׁמֶךָ
  chosen: I called you by your name
  alternatives:
  - I called you by name
  - I summoned you by your name
  lexicon: HALOT
  rationale: The idiom conveys personal designation and summons. Including 'your'
    reflects the suffix explicitly, while remaining idiomatic English.
- source_word: אֲכַנְּךָ
  chosen: I gave you a title of honor
  alternatives:
  - I surnamed you
  - I named you
  - I bestowed an epithet on you
  lexicon: HALOT
  rationale: From כנה in the Piel, likely meaning to give an appellation/title. In
    context with Cyrus, the sense is not merely assigning a second personal name but
    conferring a distinguished designation. 'Title of honor' communicates this clearly
    in modern English while preserving the elevated sense.
- source_word: וְלֹא יְדַעְתָּנִי
  chosen: though you did not know me
  alternatives:
  - even though you have not known me
  - while you did not know me
  lexicon: HALOT
  rationale: 'The clause is concessive in context: God acted for Cyrus despite Cyrus''s
    lack of covenant knowledge of him. ''Though'' captures that relationship naturally.'
