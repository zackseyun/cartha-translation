theological_decisions:
- issue: Identity and status of the addressee's ignorance of God
  chosen_reading: The verse addresses Cyrus and states that God named/called him despite
    his not knowing the LORD.
  alternative_readings:
  - The ignorance could be taken more weakly as lack of full acknowledgment rather
    than total ignorance.
  rationale: In the immediate context of Isaiah 45, the addressee is Cyrus, whom the
    LORD appoints for Israel's sake. The wording should preserve the theological tension
    that God sovereignly commissions a pagan ruler who does not know him, without
    importing later conversion language.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
- issue: Rendering of divine name implication in first person suffix 'me'
  chosen_reading: Translate simply as 'me' rather than expanding to 'the LORD' in
    the clause.
  alternative_readings:
  - though you did not know the LORD
  rationale: The Hebrew has first person object suffix only. Since the speaker is
    already God in context, 'me' is sufficient and more textually precise; expanding
    to 'the LORD' would interpret rather than translate.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation
    tradition
