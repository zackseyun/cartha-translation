id: ISA.45.14
reference: Isaiah 45:14
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה יְגִ֨יעַ מִצְרַ֥יִם וּֽ/סְחַר כּוּשׁ֮ וּ/סְבָאִים֮ אַנְשֵׁ֣י
    מִדָּה֒ עָלַ֤יִ/ךְ יַעֲבֹ֨רוּ֙ וְ/לָ֣/ךְ יִֽהְי֔וּ אַחֲרַ֣יִ/ךְ יֵלֵ֔כוּ בַּ/זִּקִּ֖ים
    יַעֲבֹ֑רוּ וְ/אֵלַ֤יִ/ךְ יִֽשְׁתַּחֲוּוּ֙ אֵלַ֣יִ/ךְ יִתְפַּלָּ֔לוּ אַ֣ךְ בָּ֥/ךְ
    אֵ֛ל וְ/אֵ֥ין ע֖וֹד אֶ֥פֶס אֱלֹהִֽים׀־׃
translation:
  text: 'Thus says the LORD: The wealth of Egypt and the merchandise of Cush, and
    the Sabeans, men of great stature, will pass over to you and will be yours; they
    will walk behind you, they will pass over in chains; they will bow down to you,
    they will pray to you: ‘Surely God is in you, and there is no other; there is
    no other god.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will make supplication to you.' The Hebrew verb can denote prayer
      or earnest entreaty.
    reason: lexical_alternative
  - marker: b
    text: '''Cush'' is the Hebrew place-name, traditionally rendered ''Ethiopia''
      in some English versions.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the covenantal title in standard English small-caps convention.
- source_word: יְגִיעַ
  chosen: wealth
  alternatives:
  - gain
  - produce
  - labor
  lexicon: HALOT
  rationale: In construct with 'Egypt,' the noun denotes what Egypt's labor yields—its
    material resources or wealth. 'Wealth' is idiomatic and fits the parallel with
    'merchandise.'
- source_word: סְחַר
  chosen: merchandise
  alternatives:
  - trade
  - profit
  - wares
  lexicon: HALOT
  rationale: The term refers to commercial goods or trade gain. 'Merchandise' best
    matches the concrete economic sense here and pairs naturally with 'wealth of Egypt.'
- source_word: כּוּשׁ
  chosen: Cush
  alternatives:
  - Ethiopia
  lexicon: HALOT
  rationale: Per translation philosophy, personal and place names are transliterated
    rather than replaced with potentially anachronistic modern equivalents.
- source_word: סְבָאִים
  chosen: the Sabeans
  alternatives:
  - people of Seba
  lexicon: HALOT
  rationale: A conventional ethnonym in English. It preserves the people-group reference
    without overexplaining in the main text.
- source_word: אַנְשֵׁי מִדָּה
  chosen: men of great stature
  alternatives:
  - men of measure
  - tall men
  lexicon: HALOT
  rationale: The idiom refers to impressive physical size. 'Men of great stature'
    is natural English and preserves the masculine form present in the Hebrew.
- source_word: עָלַיִךְ יַעֲבֹרוּ
  chosen: will pass over to you
  alternatives:
  - will come over to you
  - will pass over upon you
  lexicon: HALOT
  rationale: With the following clauses, the sense is movement into Zion/Israel's
    possession or sphere. 'To you' communicates the directional/resultative force
    more clearly than a wooden 'upon you.'
- source_word: וְלָךְ יִהְיוּ
  chosen: will be yours
  alternatives:
  - will belong to you
  - will be for you
  lexicon: HALOT
  rationale: This expresses possession or subjection. 'Will be yours' is concise,
    idiomatic, and faithful.
- source_word: אַחֲרַיִךְ יֵלֵכוּ
  chosen: they will walk behind you
  alternatives:
  - they will follow after you
  lexicon: HALOT
  rationale: The Hebrew is spatially vivid. 'Walk behind you' preserves the imagery
    better than the more interpretive 'follow you.'
- source_word: בַּזִּקִּים
  chosen: in chains
  alternatives:
  - with fetters
  - in shackles
  lexicon: HALOT
  rationale: The noun denotes restraints or fetters. 'In chains' is clear modern English
    and preserves the image of captivity/submission.
- source_word: וְאֵלַיִךְ יִשְׁתַּחֲוּוּ
  chosen: they will bow down to you
  alternatives:
  - they will prostrate themselves before you
  - they will worship you
  lexicon: HALOT
  rationale: The verb can denote bowing or worship depending on context. Here, because
    the object is Zion/Israel (2fs), 'bow down to you' avoids implying divine worship
    offered to a human/city while preserving the act of homage.
- source_word: אֵלַיִךְ יִתְפַּלָּלוּ
  chosen: they will pray to you
  alternatives:
  - they will make supplication to you
  - they will entreat you
  lexicon: HALOT
  rationale: The hitpael of פלל commonly means 'pray.' Here the speech that follows
    is addressed to Zion/Israel as the locus of God's presence. 'Pray to you' is the
    most direct rendering, though the nuance of supplication is worth preserving in
    a footnote.
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Only
  - Indeed
  lexicon: HALOT
  rationale: Introduces an emphatic confession. 'Surely' captures the asseverative
    force naturally in English.
- source_word: בָּךְ אֵל
  chosen: God is in you
  alternatives:
  - God is with you
  - God is among you
  lexicon: HALOT
  rationale: The preposition is literally 'in you' (feminine singular, likely addressed
    to Zion/Israel). 'In you' preserves the Hebrew wording and the theological claim
    of divine presence.
- source_word: וְאֵין עוֹד אֶפֶס אֱלֹהִים
  chosen: there is no other; there is no other god
  alternatives:
  - and there is none else, no God
  - and there is no other besides him
  lexicon: HALOT
  rationale: The Hebrew piles up exclusivity expressions. Rendering both clauses preserves
    the emphatic monotheistic force rather than compressing them into one smoother
    English line.
