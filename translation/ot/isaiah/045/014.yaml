theological_decisions:
- issue: Whether יִשְׁתַּחֲוּוּ should be rendered as 'worship' or 'bow down' toward
    Zion/Israel
  chosen_reading: Rendered as 'bow down to you'
  alternative_readings:
  - worship you
  - prostrate themselves before you
  rationale: Because the addressee is feminine singular Zion/Israel, 'worship you'
    could misleadingly suggest divine worship directed to Zion rather than homage
    paid in recognition of the God present with her. 'Bow down' preserves the physical
    act and leaves the theological confession to the following clause.
  doctrine_reference: Preserve theological tension rather than resolve it; avoid importing
    doctrinal claims the text does not make.
- issue: Whether אֵלַיִךְ יִתְפַּלָּלוּ implies prayer directed to Zion herself or
    supplication made in acknowledgment of the God present in Zion
  chosen_reading: Rendered formally as 'they will pray to you' with explanatory footnote
    preserving 'make supplication to you'
  alternative_readings:
  - they will make supplication to you
  - they will entreat you
  rationale: The direct object suffix is second feminine singular, so the formal sense
    is retained in the main text. A footnote preserves the less potentially misleading
    English alternative 'make supplication to you,' since the content of the prayer
    immediately confesses God's unique presence and deity.
  doctrine_reference: Optimal equivalence with preservation of ambiguity where the
    source is genuinely difficult.
