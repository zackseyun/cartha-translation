id: ISA.45.16
reference: Isaiah 45:16
source:
  edition: WLC
  text: בּ֥וֹשׁוּ וְ/גַֽם נִכְלְמ֖וּ כֻּלָּ֑/ם יַחְדָּו֙ הָלְכ֣וּ בַ/כְּלִמָּ֔ה חָרָשֵׁ֖י
    צִירִֽים־׃
translation:
  text: They are put to shame and even humiliated, all of them together; the makers
    of idols go in disgrace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the makers of images go into disgrace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוֹשׁוּ
  chosen: are put to shame
  alternatives:
  - are ashamed
  - will be ashamed
  lexicon: HALOT
  rationale: The verb בוש conveys shame/disappointment. English passive-like 'are
    put to shame' captures the resultant public disgrace well in context, while remaining
    natural. A simple present in English can represent the prophetic perfect sense.
- source_word: וְגַם
  chosen: and even
  alternatives:
  - and also
  - yes, even
  lexicon: HALOT
  rationale: The combination adds emphasis beyond simple coordination; 'and even'
    reflects the intensifying force.
- source_word: נִכְלְמוּ
  chosen: humiliated
  alternatives:
  - disgraced
  - confounded
  lexicon: HALOT
  rationale: From כלם, the sense overlaps with shame but intensifies it. 'Humiliated'
    preserves the parallel escalation without sounding archaic like 'confounded'.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - all
  - every one of them
  lexicon: HALOT
  rationale: Explicitly renders the pronominal suffix and keeps the collective force.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - altogether
  lexicon: HALOT
  rationale: Straightforward adverbial rendering; paired with 'all of them' it emphasizes
    their shared fate.
- source_word: הָלְכוּ
  chosen: go
  alternatives:
  - have gone
  - walk
  lexicon: HALOT
  rationale: הלך here idiomatically indicates entering into a state ('go into disgrace').
    Present English fits the prophetic declaration and reads naturally.
- source_word: בַכְּלִמָּה
  chosen: in disgrace
  alternatives:
  - into disgrace
  - in humiliation
  - in shame
  lexicon: HALOT
  rationale: The preposition with the noun expresses the state into which they go.
    'In disgrace' is idiomatic and distinct enough from the earlier shame terms to
    avoid awkward repetition while preserving semantic overlap.
- source_word: חָרָשֵׁי
  chosen: makers of
  alternatives:
  - craftsmen of
  - artisans of
  - smiths of
  lexicon: HALOT
  rationale: חָרָשׁ can denote a craftsman/artisan. In construct with צירים, the phrase
    refers to those who manufacture idols, so 'makers of' is the clearest natural
    English.
- source_word: צִירִים
  chosen: idols
  alternatives:
  - images
  - forms
  lexicon: HALOT
  rationale: In this context of anti-idolatry polemic, the noun refers to fashioned
    images/idols. 'Idols' makes the referent explicit for modern readers and matches
    the broader context of Isaiah 45.
