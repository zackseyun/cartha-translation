theological_decisions:
- issue: Referent of חָרָשֵׁי צִירִים
  chosen_reading: the phrase refers to idol-makers
  alternative_readings:
  - makers of images
  rationale: The immediate context in Isaiah 45 contrasts the LORD with false gods
    and those who fashion them. Rendering the object as 'idols' clarifies the polemical
    target without adding doctrinal content beyond the context.
