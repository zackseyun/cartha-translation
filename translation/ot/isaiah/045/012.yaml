theological_decisions:
- issue: Rendering of אָדָם in a generic/collective sense
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The Hebrew singular collective refers to humanity generally, but the
    translation philosophy specifies gender-accurate rendering over gender-neutral
    where the source uses masculine representative language. A footnote preserves
    the inclusive sense for modern readers.
  doctrine_reference: 'DOCTRINE.md: ''Gender-accurate over gender-neutral'' and contested
    terms table for אָדָם'
