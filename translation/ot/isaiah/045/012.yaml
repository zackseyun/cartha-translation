id: ISA.45.12
reference: Isaiah 45:12
source:
  edition: WLC
  text: אָֽנֹכִי֙ עָשִׂ֣יתִי אֶ֔רֶץ וְ/אָדָ֖ם עָלֶ֣י/הָ בָרָ֑אתִי אֲנִ֗י יָדַ/י֙ נָט֣וּ
    שָׁמַ֔יִם וְ/כָל צְבָאָ֖/ם צִוֵּֽיתִי־׃
translation:
  text: I made the earth, and I created man upon it; my own hands stretched out the
    heavens, and I commanded all their host.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind' or 'humanity.' Hebrew 'adam' here is a collective singular
      for the human race.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָֽנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: Independent first-person pronoun used for emphasis. English can preserve
    the emphasis sufficiently by placing 'I' first in the clause without adding heavier
    wording unless needed.
- source_word: עָשִׂיתִי
  chosen: made
  alternatives:
  - did
  - fashioned
  lexicon: HALOT
  rationale: Common verb עשה in creation context is naturally rendered 'made.' This
    preserves the distinction from בראתי later in the verse, which is better rendered
    'created.'
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In parallel with 'the heavens' and in a creation statement, 'earth' is
    the appropriate cosmic sense rather than 'land.'
- source_word: וְאָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: Following the doctrine guideline for אָדָם, the singular collective here
    refers to humanity in general, but the Hebrew uses the masculine singular noun.
    'Man' preserves the source form and representative sense in readable English.
- source_word: עָלֶיהָ
  chosen: upon it
  alternatives:
  - on it
  lexicon: HALOT
  rationale: The preposition על with 3fs suffix refers back to 'earth.' 'Upon it'
    is slightly more formal but fits the elevated style and spatial sense.
- source_word: בָרָאתִי
  chosen: created
  alternatives:
  - formed
  lexicon: HALOT
  rationale: ברא is the standard verb for divine creation and should be rendered distinctly
    as 'created' here.
- source_word: אֲנִי
  chosen: my own
  alternatives:
  - I
  - I myself
  lexicon: HALOT
  rationale: The repeated pronoun adds emphasis before 'hands.' In English, that emphasis
    is idiomatically conveyed by 'my own hands' rather than the awkward 'I, my hands...'.
- source_word: יָדַי
  chosen: my own hands
  alternatives:
  - my hands
  lexicon: HALOT
  rationale: Literal 'my hands' with the preceding emphatic pronoun yields the idiomatic
    English 'my own hands,' preserving the stress on God's personal agency.
- source_word: נָטוּ
  chosen: stretched out
  alternatives:
  - spread out
  - extended
  lexicon: HALOT
  rationale: Common idiom for God's action toward the heavens in prophetic and poetic
    texts. 'Stretched out' is both natural and traditional without being archaic.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: Plural form with cosmic scope is best rendered 'the heavens,' especially
    in parallel with 'earth.'
- source_word: וְכָל צְבָאָם
  chosen: all their host
  alternatives:
  - all their array
  - all their armies
  lexicon: HALOT
  rationale: Refers to the heavenly host, i.e., the totality of the heavens' ordered
    multitude. 'Host' is the most concise and established English equivalent in this
    context.
- source_word: צִוֵּיתִי
  chosen: I commanded
  alternatives:
  - I gave orders to
  - I appointed
  lexicon: HALOT
  rationale: The verb צוה denotes commanding or giving orders. 'I commanded' preserves
    divine sovereignty over the heavenly host without overinterpreting the exact mode
    of ordering.
