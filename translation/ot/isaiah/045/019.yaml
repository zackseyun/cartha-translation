id: ISA.45.19
reference: Isaiah 45:19
source:
  edition: WLC
  text: לֹ֧א בַ/סֵּ֣תֶר דִּבַּ֗רְתִּי בִּ/מְקוֹם֙ אֶ֣רֶץ חֹ֔שֶׁךְ לֹ֥א אָמַ֛רְתִּי
    לְ/זֶ֥רַע יַעֲקֹ֖ב תֹּ֣הוּ בַקְּשׁ֑וּ/נִי אֲנִ֤י יְהוָה֙ דֹּבֵ֣ר צֶ֔דֶק מַגִּ֖יד
    מֵישָׁרִֽים׃
translation:
  text: I did not speak in secret, in a land of darkness; I did not say to the offspring
    of Jacob, ‘Seek me in vain.’ I, the LORD, speak righteousness, declaring what
    is upright.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I did not say to the offspring of Jacob, “Seek me for nothing.”' The
      Hebrew תֹהוּ can denote emptiness, futility, or formlessness; here the sense
      is that seeking the LORD is not pointless.
    reason: lexical_alternative
  - marker: b
    text: Or 'I, the LORD, speak what is right' / 'speak justice.' The Hebrew צֶדֶק
      can carry the sense of righteousness, rightness, or justice.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַסֵּתֶר
  chosen: in secret
  alternatives:
  - in hiding
  - secretly
  lexicon: HALOT
  rationale: סֵתֶר denotes concealment or secrecy. 'In secret' is idiomatic and preserves
    the contrast with YHWH's open self-disclosure.
- source_word: דִּבַּרְתִּי
  chosen: I did speak / I speak
  alternatives:
  - I have spoken
  lexicon: HALOT
  rationale: First occurrence is rendered 'I did not speak' to match the negated past
    statement. The later participle דֹּבֵר is rendered 'speak' in present English
    to express YHWH's characteristic action.
- source_word: בִּמְקוֹם אֶרֶץ חֹשֶׁךְ
  chosen: in a land of darkness
  alternatives:
  - in a dark land
  - in a place of a dark land
  lexicon: HALOT
  rationale: Though literally 'in a place of a land of darkness,' the phrase is best
    represented idiomatically as 'in a land of darkness.' This preserves the imagery
    without awkward English.
- source_word: לְזֶרַע יַעֲקֹב
  chosen: to the offspring of Jacob
  alternatives:
  - to the seed of Jacob
  - to Jacob's descendants
  lexicon: HALOT
  rationale: זֶרַע can mean seed/offspring/descendants. 'Offspring' is natural modern
    English while retaining the collective singular sense.
- source_word: תֹּהוּ
  chosen: in vain
  alternatives:
  - for nothing
  - emptiness
  - chaos
  lexicon: HALOT
  rationale: In this context תֹהוּ modifies the command to seek YHWH and conveys futility
    or emptiness, not primordial chaos. 'In vain' best captures the sense that seeking
    him is not pointless.
- source_word: בַקְּשׁוּנִי
  chosen: Seek me
  alternatives:
  - seek after me
  lexicon: HALOT
  rationale: Direct imperative + suffix. Simple 'Seek me' is faithful and idiomatic.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: דֹּבֵר צֶדֶק
  chosen: speak righteousness
  alternatives:
  - speak what is right
  - speak justice
  lexicon: HALOT
  rationale: צֶדֶק can denote righteousness, rightness, or justice. 'Speak righteousness'
    keeps the noun form and moral-theological weight, while remaining intelligible.
- source_word: מַגִּיד מֵישָׁרִים
  chosen: declaring what is upright
  alternatives:
  - declaring straight things
  - announcing what is right
  - declaring uprightness
  lexicon: HALOT
  rationale: מֵישָׁרִים refers to uprightness/straightness/right things. 'Declaring
    what is upright' is clear English and preserves the ethical sense.
