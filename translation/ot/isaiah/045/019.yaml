theological_decisions:
- issue: Rendering of the divine self-description at the end of the verse
  chosen_reading: I, the LORD, speak righteousness, declaring what is upright.
  alternative_readings:
  - I, the LORD, speak truth, declaring what is right.
  - I, the LORD, speak justice, announcing straight things.
  rationale: The Hebrew emphasizes YHWH's moral reliability and rectitude in contrast
    to hidden or deceptive revelation. 'Righteousness' and 'upright' preserve the
    covenantal-ethical texture without over-specifying a narrower forensic or merely
    propositional sense.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
