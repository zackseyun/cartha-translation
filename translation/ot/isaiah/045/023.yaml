theological_decisions:
- issue: Nature of universal submission in the final clause
  chosen_reading: Render as universal homage/oath to the LORD without specifying whether
    the submission is willing or coerced.
  alternative_readings:
  - every tongue will confess
  - every tongue will swear
  rationale: The Hebrew depicts universal acknowledgment of the LORD's sovereignty.
    The translation should preserve that claim without importing later doctrinal elaborations
    about the inward quality of the submission. 'Swear allegiance' communicates public
    acknowledgment and loyalty while leaving the mode of submission unstated.
  doctrine_reference: Preserve theological tension rather than resolve it.
