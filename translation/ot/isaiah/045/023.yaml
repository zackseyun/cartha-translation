id: ISA.45.23
reference: Isaiah 45:23
source:
  edition: WLC
  text: בִּ֣/י נִשְׁבַּ֔עְתִּי יָצָ֨א מִ/פִּ֧/י צְדָקָ֛ה דָּבָ֖ר וְ/לֹ֣א יָשׁ֑וּב
    כִּי לִ/י֙ תִּכְרַ֣ע כָּל בֶּ֔רֶךְ תִּשָּׁבַ֖ע כָּל לָשֽׁוֹן־־־׃
translation:
  text: 'By myself I have sworn; from my mouth has gone out a righteous word, and
    it will not return: to me every knee will bow, every tongue will swear allegiance.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a word in righteousness'; the Hebrew phrase may emphasize either the
      righteousness of the word or that it is spoken in righteousness.
    reason: lexical_alternative
  - marker: b
    text: Or 'every tongue will swear' or 'will take an oath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּי
  chosen: By myself
  alternatives:
  - By me
  lexicon: HALOT
  rationale: Idiomatic use of the preposition with first-person suffix in oath formulae
    indicates swearing by oneself. 'By myself' is the natural English equivalent and
    preserves the emphatic self-reference.
- source_word: נִשְׁבַּעְתִּי
  chosen: I have sworn
  alternatives:
  - I swore
  lexicon: HALOT
  rationale: The perfect verb in prophetic declaration is well rendered by English
    present perfect here, expressing a completed, binding divine oath with present
    force.
- source_word: יָצָא מִפִּי
  chosen: from my mouth has gone out
  alternatives:
  - has gone forth from my mouth
  - went out from my mouth
  lexicon: HALOT
  rationale: Retains the concrete imagery of speech proceeding from God's mouth. 'Has
    gone out' is readable modern English while staying close to the Hebrew.
- source_word: צְדָקָה דָּבָר
  chosen: a righteous word
  alternatives:
  - a word in righteousness
  - a true word
  - a just decree
  lexicon: HALOT
  rationale: The Hebrew pairing is compressed and somewhat debated. 'A righteous word'
    preserves the lexical sense of צְדָקָה as righteousness/rightness without over-interpreting
    it as specifically 'decree' or flattening it to mere truthfulness. The adjective-like
    force in English is natural.
- source_word: וְלֹא יָשׁוּב
  chosen: and it will not return
  alternatives:
  - and it will not turn back
  - and it will not be revoked
  lexicon: HALOT
  rationale: Keeps the metaphor of the spoken word not returning. 'Be revoked' captures
    an implication but is more interpretive than the Hebrew image.
- source_word: כִּי
  chosen: ':'
  alternatives:
  - for
  - indeed
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the content/result of the irrevocable word. In English,
    a colon best conveys the explanatory/declarative force without forcing a single
    conjunction choice.
- source_word: לִי
  chosen: to me
  alternatives:
  - before me
  lexicon: HALOT
  rationale: The preposition is straightforwardly 'to me.' 'Before me' is interpretive
    and not required by the Hebrew, though the sense of submission is clear from the
    context.
- source_word: תִּכְרַע כָּל בֶּרֶךְ
  chosen: every knee will bow
  alternatives:
  - every knee will bend
  lexicon: HALOT
  rationale: Standard and accurate rendering of the idiom of submission/worship. 'Bow'
    is more idiomatic in English than 'bend' in this context.
- source_word: תִּשָּׁבַע כָּל לָשׁוֹן
  chosen: every tongue will swear allegiance
  alternatives:
  - every tongue will swear
  - every tongue will take an oath
  lexicon: HALOT
  rationale: The Niphal of שבע with 'tongue' implies oath-taking/confession of loyalty.
    'Swear allegiance' makes explicit the idiomatic force in natural English while
    remaining within the semantic range. A more literal 'swear' is preserved in a
    footnote because the phrase can be read more formally as oath-taking.
