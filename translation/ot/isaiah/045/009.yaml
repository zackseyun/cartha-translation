id: ISA.45.9
reference: Isaiah 45:9
source:
  edition: WLC
  text: ה֗וֹי רָ֚ב אֶת יֹ֣צְר֔/וֹ חֶ֖רֶשׂ אֶת חַרְשֵׂ֣י אֲדָמָ֑ה הֲ/יֹאמַ֨ר חֹ֤מֶר
    לְ/יֹֽצְר/וֹ֙ מַֽה תַּעֲשֶׂ֔ה וּ/פָעָלְ/ךָ֖ אֵין יָדַ֥יִם לֽ/וֹ־־־־׃ס
translation:
  text: Woe to the one who contends with his Maker— a potsherd among the potsherds
    of the earth! Shall the clay say to the one who forms it, “What are you making?”
    or your work, “He has no hands”?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, possibly, “It has no handles,” taking the final clause as the product
      criticizing the vessel's form rather than the maker's competence.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Introduces an oracle of denunciation or warning. 'Woe' best preserves
    the prophetic force in natural English.
- source_word: רָב אֶת יֹצְרוֹ
  chosen: the one who contends with his Maker
  alternatives:
  - him who strives with his Maker
  - the one who quarrels with his Former
  lexicon: HALOT
  rationale: רָב here carries the sense of contending/striving in dispute, not merely
    'many' or 'great.' יֹצֵר is a participial noun from יצר, 'one who forms'; 'Maker'
    is idiomatic and fits the creator-creature contrast in context.
- source_word: חֶרֶשׂ
  chosen: a potsherd
  alternatives:
  - an earthenware shard
  - a shard
  lexicon: HALOT
  rationale: Refers to a broken piece of pottery. 'Potsherd' is the standard concise
    English equivalent and suits the potter/clay imagery.
- source_word: אֶת חַרְשֵׂי אֲדָמָה
  chosen: among the potsherds of the earth
  alternatives:
  - with the potsherds of the ground
  - among earthenware shards
  lexicon: HALOT
  rationale: The phrase is elliptical. The sense is that the human disputant is merely
    one potsherd among other earthly potsherds. 'Among' makes the comparison intelligible
    in English without over-paraphrasing; אֲדָמָה is rendered 'earth' to preserve
    the earthy/material contrast with the Maker.
- source_word: הֲיֹאמַר חֹמֶר לְיֹצְרוֹ
  chosen: Shall the clay say to the one who forms it
  alternatives:
  - Does clay say to its potter
  - Shall the material say to its former
  lexicon: HALOT
  rationale: חֹמֶר is 'clay' in potter imagery. יֹצֵר again denotes the one forming.
    'The one who forms it' stays close to the Hebrew while remaining readable.
- source_word: מַה תַּעֲשֶׂה
  chosen: What are you making?
  alternatives:
  - What are you doing?
  - What do you make?
  lexicon: HALOT
  rationale: עשה is broad ('do/make'), but in the potter-clay metaphor 'making' is
    the more contextually precise English choice.
- source_word: וּפָעָלְךָ
  chosen: or your work
  alternatives:
  - or the thing you made
  - or your workmanship
  lexicon: HALOT
  rationale: פֹּעַל denotes deed/work/product. Here it refers to the formed object
    itself speaking in parallel with the clay. 'Your work' is concise and preserves
    the ambiguity between product and workmanship.
- source_word: אֵין יָדַיִם לוֹ
  chosen: He has no hands
  alternatives:
  - It has no handles
  - He has no skillful hands
  lexicon: HALOT
  rationale: 'Literally ''there are no hands for him/to him.'' In context this is
    the creature''s insolent criticism of the maker''s competence: ''He has no hands.''
    Although some take יָדַיִם as ''handles'' of a vessel, the immediate maker/product
    dialogue favors ''hands'' as a metaphor for ability or craftsmanship.'
