theological_decisions:
- issue: Anthropomorphic criticism in the final clause
  chosen_reading: The formed object says of its maker, 'He has no hands'
  alternative_readings:
  - The vessel says, 'It has no handles'
  rationale: The broader context is a rebuke of creatures disputing with their Creator.
    Reading 'hands' keeps the focus on insulting the maker's competence, which fits
    the rhetorical flow better than a comment about the vessel lacking handles. The
    alternative is lexically possible and preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
