id: ISA.45.11
reference: Isaiah 45:11
source:
  edition: WLC
  text: כֹּֽה אָמַ֧ר יְהוָ֛ה קְד֥וֹשׁ יִשְׂרָאֵ֖ל וְ/יֹצְר֑/וֹ הָ/אֹתִיּ֣וֹת שְׁאָל֔וּ/נִי עַל בָּנַ֛/י וְ/עַל פֹּ֥עַל יָדַ֖/י תְּצַוֻּֽ/נִי־־־׃
translation:
  text: 'Thus says Yahweh, the Holy One of Israel and his Maker: Ask me about the things to come concerning my sons, and command me concerning the work of my hands.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'future things' or 'the coming things.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'my sons'; this may refer collectively to Israel as God's people.
    reason: lexical_alternative
  - marker: c
    text: The wording 'command me' is likely intentionally provocative in context; some understand it as rhetorical rebuke rather than straightforward permission.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal force while matching established English Bible convention.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  alternatives:
  - Israel's Holy One
  lexicon: HALOT
  rationale: A standard prophetic title; the construct sense is naturally rendered in English as 'the Holy One of Israel.'
- source_word: וְיֹצְרוֹ
  chosen: and the one who formed him
  alternatives:
  - and his Maker
  - and its Maker
  lexicon: HALOT
  rationale: The suffix is 3ms singular ('him'). A more literal rendering preserves the masculine singular object rather than smoothing to 'Maker.' The referent is likely Israel, matching the immediately preceding title, though English leaves it implicit.
- source_word: הָאֹתִיּוֹת
  chosen: the things to come
  alternatives:
  - the coming things
  - future things
  - signs
  lexicon: HALOT
  rationale: In this context the noun is best taken idiomatically of things that are coming or about to happen, not 'letters' or merely 'signs.' 'The things to come' is natural English and fits the prophetic challenge context.
- source_word: שְׁאָלוּנִי
  chosen: Ask me
  alternatives:
  - Question me
  - Inquire of me
  lexicon: HALOT
  rationale: Imperative plural with 1cs suffix. 'Ask me' is direct and preserves the imperative force without unnecessary stiffness.
- source_word: עַל בָּנַי
  chosen: concerning my sons
  alternatives:
  - about my children
  - regarding my sons
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'sons.' Per project policy, gender-accurate rendering is preferred over neutralizing to 'children,' though the broader covenant people may be in view.
- source_word: פֹּעַל יָדַי
  chosen: the work of my hands
  alternatives:
  - what my hands have made
  - my handiwork
  lexicon: HALOT
  rationale: A common Hebrew expression for God's creative work. 'The work of my hands' preserves the concrete imagery and formal parallelism.
- source_word: תְּצַוֻּנִי
  chosen: command me
  alternatives:
  - give me orders
  - instruct me
  lexicon: HALOT
  rationale: Piel imperfect/jussive-like imperative force in rhetorical context. The verb normally means 'command.' Retaining the stark wording preserves the verse's provocative irony and theological tension rather than softening it.
