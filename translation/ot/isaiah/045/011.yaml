theological_decisions:
- issue: Whether the final clause should be softened to avoid the idea of humans commanding God
  chosen_reading: Retain the direct wording 'command me' in the main text
  alternative_readings:
  - understand as rhetorical rebuke and paraphrase 'do you command me?'
  - soften to 'commit to me' or similar
  rationale: The Hebrew wording is forceful and intentionally jarring. The context may well be ironic or rebuking, but the verse itself uses the language of asking and commanding. Per translation philosophy, theological tension should be preserved rather than resolved by paraphrase.
  doctrine_reference: Translation philosophy §3
- issue: Whether בָּנַי should be rendered gender-neutrally
  chosen_reading: Render as 'my sons'
  alternative_readings:
  - my children
  rationale: The source text is grammatically masculine plural. Even if representative of Israel more broadly, the project prefers gender-accurate rendering unless context clearly demands neutralization.
  doctrine_reference: Translation philosophy §4
