id: ISA.45.13
reference: Isaiah 45:13
source:
  edition: WLC
  text: אָנֹכִי֙ הַעִירֹתִ֣/הֽוּ בְ/צֶ֔דֶק וְ/כָל דְּרָכָ֖י/ו אֲיַשֵּׁ֑ר הֽוּא יִבְנֶ֤ה
    עִירִ/י֙ וְ/גָלוּתִ֣/י יְשַׁלֵּ֔חַ לֹ֤א בִ/מְחִיר֙ וְ/לֹ֣א בְ/שֹׁ֔חַד אָמַ֖ר יְהוָ֥ה
    צְבָאֽוֹת־־׃פ
translation:
  text: I have stirred him up in righteousness, and I will make all his ways straight.
    He will rebuild my city and send out my exiles, not for a price and not for a
    bribe, says the LORD of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have raised him up in righteousness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'He will build my city.' The Hebrew verb is simply 'build'; 'rebuild'
      reflects the historical context of Jerusalem's restoration.
    reason: lexical_alternative
  - marker: c
    text: 'Traditional: ''the LORD of Hosts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעִירֹתִהוּ
  chosen: have stirred him up
  alternatives:
  - have raised him up
  - have aroused him
  lexicon: HALOT
  rationale: Hiphil of עור commonly means to rouse, stir up, or awaken. In context
    of YHWH commissioning Cyrus, 'stirred him up' preserves divine causation without
    over-specifying enthronement language; 'raised him up' is possible and traditional,
    but can imply elevation to office more than activation for purpose.
- source_word: בְצֶדֶק
  chosen: in righteousness
  alternatives:
  - in justice
  - for righteousness
  lexicon: HALOT
  rationale: צדק can denote righteousness or justice. 'In righteousness' is the most
    direct rendering of the prepositional phrase and preserves the moral/juridical
    sense without narrowing it. 'Justice' is a viable contextual alternative, but
    the Hebrew does not require that narrower English choice here.
- source_word: אֲיַשֵּׁר
  chosen: I will make ... straight
  alternatives:
  - I will level
  - I will smooth
  lexicon: HALOT
  rationale: Piel of ישר means to make straight, smooth, or level. 'Make all his ways
    straight' is idiomatic English and preserves the metaphor of providentially preparing
    or directing his course.
- source_word: דְּרָכָיו
  chosen: his ways
  alternatives:
  - his paths
  - his courses
  lexicon: HALOT
  rationale: דרך literally means way/road, often metaphorically conduct or course.
    'Ways' keeps the Hebrew metaphor and matches the verbal image of making straight.
- source_word: יִבְנֶה עִירִי
  chosen: He will rebuild my city
  alternatives:
  - He will build my city
  lexicon: HALOT
  rationale: בנה is simply 'build,' but in the historical context of Jerusalem after
    devastation, English 'rebuild' communicates the intended sense naturally. This
    is a context-driven optimal-equivalence choice rather than a lexical expansion
    beyond the source.
- source_word: גָלוּתִי
  chosen: my exiles
  alternatives:
  - my captivity
  - my deportees
  - those of my exile
  lexicon: HALOT
  rationale: 'גלות can denote exile as a state or the exiled community. With the verb
    ''send out/release,'' the personal sense is most natural here: the people in exile.
    ''My exiles'' is concise and readable.'
- source_word: יְשַׁלֵּחַ
  chosen: send out
  alternatives:
  - release
  - let go
  - send back
  lexicon: HALOT
  rationale: שלח in Piel can mean send away, let go, or release. 'Send out' is formally
    close and leaves room for the sense of releasing the exiles to return. 'Send back'
    would make the destination explicit beyond the Hebrew wording.
- source_word: לֹא בִמְחִיר
  chosen: not for a price
  alternatives:
  - not for payment
  - not for compensation
  lexicon: HALOT
  rationale: מחיר denotes price or payment. 'Not for a price' preserves the concrete
    commercial idiom and pairs well with the following phrase about bribery.
- source_word: וְלֹא בְשֹׁחַד
  chosen: and not for a bribe
  alternatives:
  - nor for a bribe
  lexicon: HALOT
  rationale: שׁחד means bribe. The phrase emphasizes that the release will not be
    purchased or procured by inducement. 'And not for a bribe' mirrors the Hebrew
    coordination closely.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' צבאות is translated rather
    than left in traditional ecclesiastical form; 'of Armies' is transparent modern
    English and preserves the martial/plural force better than the opaque traditional
    'of Hosts.'
