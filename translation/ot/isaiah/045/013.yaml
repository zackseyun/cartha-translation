theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to make Cyrus explicit as the referent of 'him/he'
  chosen_reading: retain the pronouns 'him' and 'he'
  alternative_readings:
  - explicitly identify him as Cyrus in the main text
  rationale: The immediate context identifies the referent, but this verse itself
    uses pronouns. Retaining them respects the source text and avoids importing an
    explanatory gloss into the main line of translation.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
