theological_decisions:
- issue: Nature of the idol polemic in אֵל לֹא יוֹשִׁיעַ
  chosen_reading: Rendered as 'a god that cannot save' to preserve the text's denial
    of saving power to idols without implying they are true gods.
  alternative_readings:
  - '''a god who does not save'''
  - '''an idol that cannot save'''
  rationale: The Hebrew uses אֵל ('god') ironically/polemically for what the nations
    treat as deity. Keeping 'god' preserves the rhetoric of false worship, while 'cannot
    save' emphasizes impotence rather than mere failure to act.
  doctrine_reference: Translation philosophy §§1, 3, 6
