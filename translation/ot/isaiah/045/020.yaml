id: ISA.45.20
reference: Isaiah 45:20
source:
  edition: WLC
  text: הִקָּבְצ֥וּ וָ/בֹ֛אוּ הִֽתְנַגְּשׁ֥וּ יַחְדָּ֖ו פְּלִיטֵ֣י הַ/גּוֹיִ֑ם לֹ֣א
    יָדְע֗וּ הַ/נֹּֽשְׂאִים֙ אֶת עֵ֣ץ פִּסְלָ֔/ם וּ/מִתְפַּלְלִ֔ים אֶל אֵ֖ל לֹ֥א יוֹשִֽׁיעַ־־׃
translation:
  text: Gather yourselves and come; draw near together, you survivors of the nations.
    They have no knowledge, those who carry the wood of their carved image and pray
    to a god that cannot save.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Assemble yourselves and come; approach together.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the wood of their carved image'; that is, a wooden idol.
    reason: lexical_alternative
  - marker: c
    text: Or 'pray to a god who does not save.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִקָּבְצוּ
  chosen: Gather yourselves
  alternatives:
  - Assemble yourselves
  - Gather together
  lexicon: HALOT
  rationale: Niphal imperative plural of קבץ calls the hearers to assemble themselves.
    'Gather yourselves' preserves the reflexive/passive nuance better than a bare
    'gather.'
- source_word: וָבֹאוּ
  chosen: and come
  alternatives:
  - and enter
  - then come
  lexicon: HALOT
  rationale: Common imperative of בוא. 'Come' is the plain contextual sense in a summons.
- source_word: הִתְנַגְּשׁוּ
  chosen: draw near
  alternatives:
  - approach
  - come near together
  lexicon: HALOT
  rationale: Hitpael imperative of נגש in summons language commonly means to approach
    or draw near. 'Draw near' fits the formal challenge scene.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - all together
  lexicon: HALOT
  rationale: Adverb indicating collective action; 'together' is sufficient and natural.
- source_word: פְּלִיטֵי הַגּוֹיִם
  chosen: you survivors of the nations
  alternatives:
  - you fugitives of the nations
  - you escaped ones of the nations
  lexicon: HALOT
  rationale: פְּלִיטִים denotes those who have escaped or survived. In this context
    of the nations after judgment/history, 'survivors' is the clearest idiomatic rendering.
    The vocative force is brought out with 'you.'
- source_word: לֹא יָדְעוּ
  chosen: They have no knowledge
  alternatives:
  - They do not know
  - They know nothing
  lexicon: HALOT
  rationale: Perfect 3cp used as a general characterization. 'They have no knowledge'
    preserves the idiom and the prophetic tone of culpable ignorance.
- source_word: הַנֹּשְׂאִים
  chosen: those who carry
  alternatives:
  - the ones carrying
  - those bearing
  lexicon: HALOT
  rationale: Participle functioning substantivally; 'those who carry' is natural English
    and preserves the ongoing/habitual sense.
- source_word: עֵץ פִּסְלָם
  chosen: the wood of their carved image
  alternatives:
  - their wooden idol
  - the wood of their idol
  lexicon: HALOT
  rationale: Literally 'wood of their carved image.' Retaining both 'wood' and 'carved
    image' preserves the polemical force against idols as man-made wooden objects.
    'Idol' is possible but less textually explicit.
- source_word: וּמִתְפַּלְלִים
  chosen: and pray
  alternatives:
  - and are praying
  lexicon: HALOT
  rationale: Hitpael participle of פלל here denotes prayer directed to a deity. Simple
    present 'pray' is idiomatic for the substantival participle.
- source_word: אֶל אֵל
  chosen: to a god
  alternatives:
  - to a god-object
  - to a deity
  lexicon: HALOT
  rationale: אֵל without the article here is indefinite in sense in English. 'To a
    god' captures the prophetic mockery of a supposed deity that is no true savior.
- source_word: לֹא יוֹשִׁיעַ
  chosen: that cannot save
  alternatives:
  - who cannot save
  - that does not save
  lexicon: HALOT
  rationale: Hiphil of ישׁע means to save/deliver. 'Cannot save' brings out incapacity,
    which is the point of the idol polemic. 'That' fits the impersonal referent 'a
    god' in English.
