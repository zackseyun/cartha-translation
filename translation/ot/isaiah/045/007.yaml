id: ISA.45.7
reference: Isaiah 45:7
source:
  edition: WLC
  text: יוֹצֵ֥ר אוֹר֙ וּ/בוֹרֵ֣א חֹ֔שֶׁךְ עֹשֶׂ֥ה שָׁל֖וֹם וּ/ב֣וֹרֵא רָ֑ע אֲנִ֥י יְהוָ֖ה עֹשֶׂ֥ה כָל אֵֽלֶּה־׃ס
translation:
  text: forming light and creating darkness, making peace and creating calamity; I am Yahweh, who does all these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'creating disaster' or 'creating evil.' Hebrew רָע can mean evil, harm, disaster, or calamity; here, in contrast with 'peace,' it most likely refers to calamity/adversity rather than moral evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹצֵר
  chosen: forming
  alternatives:
  - fashioning
  - forming
  lexicon: HALOT
  rationale: Qal participle of יצר commonly denotes shaping or forming. 'Forming' preserves the participial, ongoing/descriptive force and pairs well with 'creating' for בורא without collapsing the verbs into one gloss.
- source_word: אוֹר
  chosen: light
  lexicon: HALOT
  rationale: Basic lexical sense is literal 'light'; in this poetic pairing with 'darkness' the straightforward rendering is best.
- source_word: וּבֹרֵא
  chosen: and creating
  alternatives:
  - and creating
  lexicon: HALOT
  rationale: Qal participle of ברא, a weighty verb often used of divine creative activity. 'Creating' preserves the verbal aspect and the deliberate parallelism with 'forming' and the second occurrence later in the verse.
- source_word: חֹשֶׁךְ
  chosen: darkness
  lexicon: HALOT
  rationale: Standard lexical equivalent; the antithesis with 'light' should remain explicit.
- source_word: עֹשֶׂה
  chosen: making
  alternatives:
  - doing
  - working
  lexicon: HALOT
  rationale: The participle of עשה is broad, but 'making' fits the poetic sequence and idiomatic English better than 'doing' here.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  - prosperity
  lexicon: HALOT
  rationale: '''Peace'' is the most established and contextually fitting gloss in the contrast with רָע. While shalom can include well-being or wholeness, ''peace'' preserves the concise antithetical structure.'
- source_word: רָע
  chosen: calamity
  alternatives:
  - disaster
  - evil
  lexicon: HALOT
  rationale: In this context רָע stands opposite שָׁלוֹם and refers to adversity, disaster, or calamity rather than moral evil. Rendering it 'evil' in English would strongly suggest that God creates moral evil, which exceeds the lexical force in this prophetic judgment context. 'Calamity' preserves the sense of harmful disaster sent in providence/judgment.
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I, the LORD
  lexicon: HALOT
  rationale: The explicit pronoun plus divine name gives emphatic self-identification. Per doctrine, יְהוָה is rendered 'the LORD.' 'I am the LORD' is natural English and preserves the emphasis.
- source_word: עֹשֶׂה כָל־אֵלֶּה
  chosen: who does all these things
  alternatives:
  - doing all these things
  - maker of all these things
  lexicon: HALOT
  rationale: The final participial clause sums up the preceding pairs. 'Who does all these things' is idiomatic in English while retaining the comprehensive claim of divine agency over the listed realities.
