theological_decisions:
- issue: Rendering רָע in relation to divine agency
  chosen_reading: calamity
  alternative_readings:
  - disaster
  - evil
  rationale: The verse asserts the LORD's sovereignty over both blessing and adversity. In prophetic Hebrew, רָע can denote disaster or calamity, especially in contrast to שָׁלוֹם. To render it 'evil' here would likely be heard as moral evil in modern English and could import a theological claim the text does not require. 'Calamity' preserves the tension of divine sovereignty without attributing moral evil to God as his created product.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
