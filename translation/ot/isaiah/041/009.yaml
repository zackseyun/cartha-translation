id: ISA.41.9
reference: Isaiah 41:9
source:
  edition: WLC
  text: אֲשֶׁ֤ר הֶחֱזַקְתִּ֨י/ךָ֙ מִ/קְצ֣וֹת הָ/אָ֔רֶץ וּ/מֵ/אֲצִילֶ֖י/הָ קְרָאתִ֑י/ךָ
    וָ/אֹ֤מַר לְ/ךָ֙ עַבְדִּ/י אַ֔תָּה בְּחַרְתִּ֖י/ךָ וְ/לֹ֥א מְאַסְתִּֽי/ךָ־׃
translation:
  text: you whom I took hold of from the ends of the earth, and called from its farthest
    corners, and said to you, ‘You are my servant; I have chosen you and not rejected
    you,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'from its extremities'; the Hebrew term is lexically debated.
      Some have understood it as 'from its nobles,' but the geographic sense best
      fits the parallelism with 'from the ends of the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחֱזַקְתִּיךָ
  chosen: I took hold of
  alternatives:
  - I grasped
  - I seized
  - I strengthened
  lexicon: HALOT
  rationale: The Hiphil of חזק can mean 'to seize/grasp' or 'to strengthen.' In this
    context with the source phrase 'from the ends of the earth,' the sense is spatially
    taking hold or bringing, not inward strengthening. 'Took hold of' preserves the
    concrete imagery without overstating force.
- source_word: מִקְצוֹת הָאָרֶץ
  chosen: from the ends of the earth
  alternatives:
  - from the extremities of the earth
  lexicon: HALOT
  rationale: A standard idiom for the remotest regions. 'Ends of the earth' is natural
    English and preserves the geographic breadth.
- source_word: וּמֵאֲצִילֶיהָ
  chosen: from its farthest corners
  alternatives:
  - from its nobles
  - from its sides
  - from its extremities
  lexicon: HALOT
  rationale: אציל can denote extremity/side in this poetic-geographic context, though
    the form has been variously understood. 'Farthest corners' fits the parallelism
    with 'ends of the earth' and communicates remoteness clearly. The alternative
    'nobles' is less likely here contextually and is preserved in a footnote because
    the term is lexically debated.
- source_word: קְרָאתִיךָ
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: '''Called'' is the broad, natural rendering and suits both divine summons
    and election language. ''Summoned'' is possible but slightly narrower and more
    formal.'
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in Isaiah's covenantal and royal-servant
    context 'servant' is the most idiomatic and contextually appropriate English rendering.
    The bonded-status emphasis is not foregrounded here as it is in some NT δοῦλος
    contexts.
- source_word: בְּחַרְתִּיךָ
  chosen: I have chosen you
  alternatives:
  - I chose you
  lexicon: HALOT
  rationale: English present perfect works well in this discourse to express a past
    act with present standing. It also pairs naturally with the following 'have not
    rejected you.'
- source_word: מְאַסְתִּיךָ
  chosen: rejected you
  alternatives:
  - despised you
  - cast you off
  lexicon: HALOT
  rationale: מאס commonly conveys rejection or refusal. 'Rejected' is clear modern
    English and fits the covenantal reassurance. 'Despised' is too emotive here; 'cast
    you off' is interpretive.
