theological_decisions:
- issue: Referent of the second-person singular
  chosen_reading: Retain singular 'you' throughout, reflecting the addressed servant
    Israel/Jacob as a corporate singular.
  alternative_readings:
  - Pluralize for contemporary English sense ('you all')
  rationale: The Hebrew consistently uses second-person masculine singular, addressing
    Israel/Jacob corporately as one servant. Preserving singular 'you' maintains the
    literary and theological force without importing a different addressee structure.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
    and §5 (consistency of key terms)
