theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Aspect of עֲזַרְתִּיךָ in divine reassurance
  chosen_reading: 'future-promissory sense: ''I will help you'''
  alternative_readings:
  - 'present: ''I help you'''
  - 'perfect/past: ''I have helped you'''
  rationale: The Hebrew perfect can be used with present certainty or prophetic assurance. In this context, paired with 'Do not fear,' English future best communicates the promise without implying only past action. The formally past/perfect nuance is preserved in a footnote for auditability.
