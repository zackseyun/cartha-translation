id: ISA.41.13
reference: Isaiah 41:13
source:
  edition: WLC
  text: כִּ֗י אֲנִ֛י יְהוָ֥ה אֱלֹהֶ֖י/ךָ מַחֲזִ֣יק יְמִינֶ֑/ךָ הָ/אֹמֵ֥ר לְ/ךָ֛ אַל תִּירָ֖א אֲנִ֥י עֲזַרְתִּֽי/ךָ־׃ס
translation:
  text: For I am Yahweh your God, who takes hold of your right hand, who says to you, ‘Do not fear; I will help you.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew formally reads 'I have helped you' or 'I helped you'; the perfect form here is rendered 'I will help you' to convey the promissory force in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the reassurance in context. 'For' preserves the connective force in a natural English way.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward covenantal possessive construction; 'your God' preserves both relationship and direct address.
- source_word: מַחֲזִיק
  chosen: who takes hold of
  alternatives:
  - holding
  - who grasps
  - who strengthens
  lexicon: HALOT
  rationale: The Hiphil participle of חזק here most naturally conveys seizing or firmly holding the hand, not merely abstract strengthening. 'Who takes hold of' is idiomatic and preserves the ongoing participial sense.
- source_word: יְמִינֶךָ
  chosen: your right hand
  lexicon: HALOT
  rationale: Literal rendering fits the concrete image of divine support and should not be generalized away.
- source_word: הָאֹמֵר לְךָ
  chosen: who says to you
  alternatives:
  - saying to you
  lexicon: HALOT
  rationale: The article + participle functions appositionally, continuing the description of the LORD. 'Who says to you' is smoother modern English while preserving the participial linkage.
- source_word: אַל תִּירָא
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: A standard negative imperative. 'Do not fear' is slightly more formal and concise, matching prophetic diction while remaining clear.
- source_word: עֲזַרְתִּיךָ
  chosen: I will help you
  alternatives:
  - I have helped you
  - I help you
  lexicon: HALOT
  rationale: Although morphologically a perfect form, in this reassurance formula and immediate discourse context it functions naturally as a present-future promise. English future best conveys the intended sense of divine assurance. The perfect-like alternative is worth preserving in a footnote because the Hebrew form is formally past/perfect.
