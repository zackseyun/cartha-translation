theological_decisions:
- issue: Referent of second-person plural pronouns
  chosen_reading: The 'you' addresses idols/gods denounced in the surrounding context,
    not merely their human makers.
  alternative_readings:
  - The 'you' could be taken as addressing idol-makers by metonymy
  rationale: The immediate context challenges the nations' gods/idols to declare and
    act; the verse concludes by condemning those who choose them. Rendering the pronouns
    straightforwardly preserves the prophetic taunt without importing extra explanation
    into the main text.
