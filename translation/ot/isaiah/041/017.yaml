id: ISA.41.17
reference: Isaiah 41:17
source:
  edition: WLC
  text: הָ/עֲנִיִּ֨ים וְ/הָ/אֶבְיוֹנִ֜ים מְבַקְשִׁ֥ים מַ֨יִם֙ וָ/אַ֔יִן לְשׁוֹנָ֖/ם
    בַּ/צָּמָ֣א נָשָׁ֑תָּה אֲנִ֤י יְהוָה֙ אֶעֱנֵ֔/ם אֱלֹהֵ֥י יִשְׂרָאֵ֖ל לֹ֥א אֶעֶזְבֵֽ/ם׃
translation:
  text: The poor and needy seek water, but there is none; their tongue is parched
    with thirst. I, the LORD, will answer them; I, the God of Israel, will not forsake
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: הָעֲנִיִּים
  chosen: the poor
  alternatives:
  - the afflicted
  - the humble
  lexicon: HALOT
  rationale: עֲנִי often denotes those who are poor, afflicted, or oppressed. In parallel
    with אֶבְיוֹנִים, the socioeconomic sense is foregrounded here, so 'the poor'
    best preserves the pairing without overinterpreting spiritual humility.
- source_word: הָאֶבְיוֹנִים
  chosen: and needy
  alternatives:
  - and the destitute
  lexicon: HALOT
  rationale: אֶבְיוֹן commonly refers to one in want or need. 'Needy' is natural modern
    English and preserves the distinction from 'poor' while keeping the poetic parallelism.
- source_word: מְבַקְשִׁים מַיִם
  chosen: seek water
  alternatives:
  - are seeking water
  - look for water
  lexicon: HALOT
  rationale: 'The participle expresses ongoing action. English simple present in poetic-prophetic
    style communicates the general vivid present adequately: ''seek water.'''
- source_word: וָאַיִן
  chosen: but there is none
  alternatives:
  - and there is none
  - but there is no water
  lexicon: HALOT
  rationale: The idiom states nonexistence of the sought object. 'But there is none'
    makes the adversative sense clear in English and avoids unnecessary repetition
    while preserving the force.
- source_word: לְשׁוֹנָם
  chosen: their tongue
  alternatives:
  - their tongues
  lexicon: HALOT
  rationale: 'Hebrew often uses the singular collective with a plural suffix. English
    can retain the singular idiomatically: ''their tongue,'' matching the poetic image.'
- source_word: בַּצָּמָא
  chosen: with thirst
  alternatives:
  - from thirst
  - because of thirst
  lexicon: HALOT
  rationale: The preposition marks the condition or circumstance. 'With thirst' is
    concise and idiomatic with 'parched,' preserving the vivid bodily image.
- source_word: נָשָׁתָּה
  chosen: is parched
  alternatives:
  - is dried up
  - has become dry
  lexicon: HALOT
  rationale: The verb conveys drying up or withering. 'Is parched' is the most natural
    collocation with 'tongue' in English and captures the severe thirst imagery.
- source_word: אֲנִי יְהוָה
  chosen: I, the LORD
  alternatives:
  - I am the LORD
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis rather than introducing a verbless
    identification clause alone. 'I, the LORD' preserves the emphatic self-declaration.
    Per doctrine, יְהוָה is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: אֶעֱנֵם
  chosen: will answer them
  alternatives:
  - will respond to them
  lexicon: HALOT
  rationale: ענה here means to answer or respond, likely to their desperate seeking.
    'Will answer them' is both direct and covenantally resonant.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: I, the God of Israel
  alternatives:
  - the God of Israel
  lexicon: HALOT
  rationale: 'The phrase stands in apposition to the preceding divine self-reference.
    Repeating ''I'' in English clarifies the parallel emphatic structure: ''I, the
    God of Israel.'''
- source_word: לֹא אֶעֶזְבֵם
  chosen: will not forsake them
  alternatives:
  - will not abandon them
  - will not leave them
  lexicon: HALOT
  rationale: עזב can mean leave, abandon, or forsake. 'Forsake' preserves the covenantal
    and relational weight of divine commitment in a familiar but still accessible
    register.
