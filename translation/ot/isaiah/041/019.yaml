id: ISA.41.19
reference: Isaiah 41:19
source:
  edition: WLC
  text: אֶתֵּ֤ן בַּ/מִּדְבָּר֙ אֶ֣רֶז שִׁטָּ֔ה וַ/הֲדַ֖ס וְ/עֵ֣ץ שָׁ֑מֶן אָשִׂ֣ים
    בָּ/עֲרָבָ֗ה בְּר֛וֹשׁ תִּדְהָ֥ר וּ/תְאַשּׁ֖וּר יַחְדָּֽו׃
translation:
  text: I will put in the wilderness cedar, acacia, myrtle, and olive tree; I will
    set in the desert cypress, plane tree, and pine together,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''oil tree'' for ''olive tree'' (Hebrew: ''tree of oil'').'
    reason: lexical_alternative
  - marker: b
    text: The exact species of 'cypress,' 'plane tree,' and 'pine' are uncertain;
      possible alternatives include 'juniper' or 'fir,' 'elm,' and 'box tree' respectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶתֵּן
  chosen: I will put
  alternatives:
  - I will give
  - I will place
  lexicon: HALOT
  rationale: נתן commonly means 'give,' but with trees placed in a location, 'put'
    is natural modern English and preserves the concrete sense.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר often denotes wilderness/open uncultivated land, not only sandy
    desert. 'Wilderness' preserves the broader sense and fits the poetic parallelism
    with עֲרָבָה later.
- source_word: אֶרֶז
  chosen: cedar
  lexicon: HALOT
  rationale: Standard rendering for the tree name, likely cedar of Lebanon in biblical
    usage.
- source_word: שִׁטָּה
  chosen: acacia
  alternatives:
  - shittah tree
  lexicon: HALOT
  rationale: The Hebrew denotes the acacia; 'acacia' is clear modern English, while
    'shittah' is an unnecessary transliteration.
- source_word: הֲדַס
  chosen: myrtle
  lexicon: HALOT
  rationale: Standard botanical rendering.
- source_word: עֵץ שָׁמֶן
  chosen: olive tree
  alternatives:
  - oil tree
  lexicon: HALOT
  rationale: Literally 'tree of oil/fatness.' In this context the conventional and
    likely referent is the olive tree. Because 'oil tree' is a possible more literal
    rendering, it is preserved in a footnote.
- source_word: אָשִׂים
  chosen: I will set
  alternatives:
  - I will place
  lexicon: HALOT
  rationale: Used here in parallel with אֶתֵּן. 'Set' provides natural variation in
    English while preserving the placement sense.
- source_word: בָּעֲרָבָה
  chosen: in the desert
  alternatives:
  - in the Arabah
  - in the dry land
  lexicon: HALOT
  rationale: עֲרָבָה can denote desert steppe or the Arabah region. Here the poetic
    parallel with 'wilderness' favors the common noun sense 'desert' rather than the
    proper place-name.
- source_word: בְּרוֹשׁ
  chosen: cypress
  alternatives:
  - juniper
  - fir
  lexicon: HALOT
  rationale: The exact species is uncertain; 'cypress' is a common modern rendering
    and fits the broader conifer sense. Alternatives are preserved in a footnote due
    to botanical uncertainty.
- source_word: תִּדְהָר
  chosen: plane tree
  alternatives:
  - elm
  lexicon: HALOT
  rationale: The species is uncertain. 'Plane tree' is a widely adopted rendering
    in modern translations; 'elm' remains possible and is preserved in a footnote.
- source_word: תְאַשּׁוּר
  chosen: pine
  alternatives:
  - box tree
  - ash
  lexicon: HALOT
  rationale: The exact identification is uncertain. 'Pine' is a common translation
    choice in context among named trees; alternatives are preserved in a footnote.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - all together
  lexicon: HALOT
  rationale: Adverb emphasizing the collective planting of the trees; 'together' is
    concise and natural.
