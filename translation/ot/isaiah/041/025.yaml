id: ISA.41.25
reference: Isaiah 41:25
source:
  edition: WLC
  text: הַעִיר֤וֹתִי מִ/צָּפוֹן֙ וַ/יַּ֔את מִ/מִּזְרַח שֶׁ֖מֶשׁ יִקְרָ֣א בִ/שְׁמִ֑/י
    וְ/יָבֹ֤א סְגָנִים֙ כְּמוֹ חֹ֔מֶר וּ/כְמ֥וֹ יוֹצֵ֖ר יִרְמָס טִֽיט־־־׃
translation:
  text: I have stirred up one from the north, and he has come; from the rising of
    the sun he calls on my name. He will come upon rulers as upon clay, and like a
    potter he treads mud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from the east' (literally, 'from the rising of the sun').
    reason: lexical_alternative
  - marker: b
    text: '''Calls on my name'' may also be rendered ''invokes my name'' or ''proclaims
      my name.'''
    reason: lexical_alternative
  - marker: c
    text: The figure stirred up by God is often understood to be Cyrus; the Hebrew
      text here does not name him.
    reason: cross_reference
lexical_decisions:
- source_word: הַעִירוֹתִי
  chosen: I have stirred up
  alternatives:
  - I have roused
  - I have awakened
  lexicon: HALOT
  rationale: Hiphil of עור here means to arouse or stir up someone for action. 'Stirred
    up' is idiomatic modern English and preserves divine agency without overinterpreting
    the manner.
- source_word: מִצָּפוֹן
  chosen: from the north
  lexicon: HALOT
  rationale: Straightforward directional phrase; retained formally.
- source_word: וַיַּאת
  chosen: and he has come
  alternatives:
  - and he came
  - and he comes
  lexicon: HALOT
  rationale: 'The wayyiqtol following the perfect can be rendered as a present-perfect/resultative
    sequence in English: God has stirred him up and he has come. This fits the prophetic
    perfect style while remaining readable.'
- source_word: מִמִּזְרַח שֶׁמֶשׁ
  chosen: from the rising of the sun
  alternatives:
  - from the east
  lexicon: HALOT
  rationale: Literally 'from the rising of the sun.' This preserves the Hebrew imagery
    while naturally indicating the east. Because 'from the east' is a common equivalent,
    it is preserved in a footnote.
- source_word: יִקְרָא בִשְׁמִי
  chosen: he calls on my name
  alternatives:
  - he proclaims my name
  - he invokes my name
  lexicon: HALOT
  rationale: קרא בשם commonly means to call on or invoke a name. 'Calls on my name'
    best reflects the idiom without forcing a stronger confessional sense than the
    Hebrew requires.
- source_word: וְיָבֹא
  chosen: He will come upon
  alternatives:
  - and he will come
  - and he comes against
  lexicon: HALOT
  rationale: With the following object 'rulers,' the sense is hostile advance against
    them. 'Come upon' captures the movement and threat without adding too much.
- source_word: סְגָנִים
  chosen: rulers
  alternatives:
  - deputies
  - officials
  - governors
  lexicon: HALOT
  rationale: The term denotes high officials or rulers. 'Rulers' is broad, clear English
    and fits the military-political context better than the more technical 'deputies.'
- source_word: כְּמוֹ חֹמֶר
  chosen: as upon clay
  alternatives:
  - like clay
  lexicon: HALOT
  rationale: חֹמֶר is clay. The preposition-like comparison describes how easily he
    overcomes rulers; 'as upon clay' keeps the simile linked to his action upon them.
- source_word: וּכְמוֹ יוֹצֵר
  chosen: and like a potter
  alternatives:
  - and like one who forms pottery
  lexicon: HALOT
  rationale: יוֹצֵר is a potter or shaper. 'Potter' is the natural concise rendering
    in this simile.
- source_word: יִרְמָס
  chosen: he treads
  alternatives:
  - he tramples
  lexicon: HALOT
  rationale: The verb means tread down/trample. 'Treads' works well with the potter
    image of working clay, while still implying force.
- source_word: טִיט
  chosen: mud
  alternatives:
  - mire
  - mortar
  lexicon: HALOT
  rationale: טִיט is mud or mire. In the potter simile, 'mud' is the clearest modern
    English choice and pairs naturally with 'clay' and 'potter'.
