theological_decisions:
- issue: Identity and posture of the figure stirred up by God
  chosen_reading: Render the figure generically as 'one'/'he' without naming him or
    specifying whether 'calls on my name' implies true worship.
  alternative_readings:
  - Identify explicitly as Cyrus
  - Render the phrase as merely using or proclaiming God's name rather than calling
    on it devotionally
  rationale: The verse likely points to the conqueror later associated with Cyrus,
    but the Hebrew text here does not name him. Likewise, 'calls on my name' may suggest
    invocation or acknowledgment, but the text does not require a full theological
    judgment about his piety. The translation preserves the wording and tension rather
    than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
