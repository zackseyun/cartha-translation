id: ISA.41.8
reference: Isaiah 41:8
source:
  edition: WLC
  text: וְ/אַתָּה֙ יִשְׂרָאֵ֣ל עַבְדִּ֔/י יַעֲקֹ֖ב אֲשֶׁ֣ר בְּחַרְתִּ֑י/ךָ זֶ֖רַע
    אַבְרָהָ֥ם אֹהֲבִֽ/י׃
translation:
  text: But you, Israel, my servant, Jacob, whom I have chosen, offspring of Abraham,
    my friend—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “the one who loves me.”
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: But you
  alternatives:
  - And you
  - But as for you
  lexicon: HALOT
  rationale: The conjunction with independent pronoun marks a strong contrast with
    the nations/idolaters in the surrounding context. 'But you' captures the adversative
    force naturally in English.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name retained by standard transliteration.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it is a covenantal title
    for Israel in relation to God rather than emphasizing bonded status. 'My servant'
    is the most natural and contextually fitting rendering.
- source_word: יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Proper name retained by standard transliteration; appositional to Israel.
- source_word: אֲשֶׁר בְּחַרְתִּיךָ
  chosen: whom I have chosen
  alternatives:
  - that I chose
  lexicon: HALOT
  rationale: Relative clause referring to Jacob/Israel. The perfect verb is well represented
    by English present perfect, highlighting God's completed and continuing elective
    action.
- source_word: זֶרַע אַבְרָהָם
  chosen: offspring of Abraham
  alternatives:
  - seed of Abraham
  - descendants of Abraham
  lexicon: HALOT
  rationale: זֶרַע is singular collective. 'Offspring' preserves the collective singular
    better than 'descendants' and is more idiomatic in modern English than 'seed,'
    while still allowing corporate reference.
- source_word: אֹהֲבִי
  chosen: my friend
  alternatives:
  - the one who loves me
  - my beloved
  lexicon: HALOT
  rationale: The participle with first-person suffix can mean 'one loving me' or function
    relationally as 'my friend.' In this context modifying Abraham, 'my friend' is
    the established and contextually strong sense, reflecting intimate covenant relationship
    rather than merely describing Abraham's action.
