theological_decisions:
- issue: Meaning of אֹהֲבִי with reference to Abraham
  chosen_reading: my friend
  alternative_readings:
  - the one who loves me
  rationale: The Hebrew participle could be read more literally as 'the one loving
    me,' but in context it idiomatically expresses Abraham's special relationship
    to God. 'My friend' communicates that relational sense in clear English without
    importing extra doctrine. The more literal alternative is preserved in a footnote
    because the ambiguity is genuine.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
