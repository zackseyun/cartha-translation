theological_decisions:
- issue: Rendering the final phrase בִּימִין צִדְקִי
  chosen_reading: with my righteous right hand
  alternative_readings:
  - with the right hand of my righteousness
  rationale: The Hebrew can be rendered more formally as 'with the right hand of my
    righteousness,' but in English this is less clear. 'My righteous right hand' preserves
    the theological sense that God's sustaining power is exercised in righteousness/justice
    without overinterpreting the phrase. This also avoids importing a narrower doctrinal
    nuance not explicit in the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Aspect of the three assurance verbs
  chosen_reading: future promises ('I will strengthen/help/uphold you')
  alternative_readings:
  - present/perfect-like assurances ('I strengthen/have strengthened ...')
  rationale: Although the Hebrew verbal forms are not uniformly simple futures, in
    prophetic discourse they function as assurances of divine action. Rendering them
    as future promises best preserves the pastoral force and parallelism in contemporary
    English without flattening the Hebrew.
  doctrine_reference: Translation philosophy §§1, 6
