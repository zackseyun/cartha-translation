id: ISA.41.10
reference: Isaiah 41:10
source:
  edition: WLC
  text: אַל תִּירָא֙ כִּ֣י עִמְּ/ךָ אָ֔נִי אַל תִּשְׁתָּ֖ע כִּֽי אֲנִ֣י אֱלֹהֶ֑י/ךָ
    אִמַּצְתִּ֨י/ךָ֙ אַף עֲזַרְתִּ֔י/ךָ אַף תְּמַכְתִּ֖י/ךָ בִּ/ימִ֥ין צִדְקִֽ/י־־־־־־׃
translation:
  text: Do not fear, for I am with you; do not look around in dread, for I am your
    God. I will strengthen you; surely I will help you; surely I will uphold you with
    my righteous right hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'do not be dismayed'; the Hebrew verb likely carries the sense of looking
      about anxiously or in alarm.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''with the right hand of my righteousness.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּירָא
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: Imperative prohibition from ירא. 'Do not fear' is concise and preserves
    the directness of the Hebrew; 'be afraid' is a natural alternative but slightly
    more expansive.
- source_word: כִּי עִמְּךָ אָ֔נִי
  chosen: for I am with you
  alternatives:
  - because I am with you
  lexicon: HALOT
  rationale: כִּי here gives the ground for the prohibition. 'For' fits the elevated
    poetic register and keeps the causal force. Word order is normalized in English
    while preserving emphasis.
- source_word: אַל תִּשְׁתָּע
  chosen: do not look around in dread
  alternatives:
  - do not be dismayed
  - do not gaze about anxiously
  lexicon: HALOT
  rationale: The verb שׁעה in this stem can convey looking about anxiously or in alarm.
    Traditional 'be dismayed' captures the sense but obscures the concrete imagery.
    'Look around in dread' preserves both the likely visual nuance and the emotional
    force in readable English.
- source_word: אֲנִי אֱלֹהֶיךָ
  chosen: I am your God
  lexicon: HALOT
  rationale: Straightforward covenantal identification. 'God' is singular in sense
    here despite the plural form אֱלֹהִים.
- source_word: אִמַּצְתִּיךָ
  chosen: I will strengthen you
  alternatives:
  - I have strengthened you
  - I make you strong
  lexicon: HALOT
  rationale: 'Though morphologically pointed as a perfect, in this sequence it functions
    well as a promise alongside the following verbs. English future best reflects
    the discourse flow: a series of divine assurances. ''Strengthen'' is the standard
    and contextually fitting rendering of אמץ.'
- source_word: אַף
  chosen: surely
  alternatives:
  - indeed
  - 'yes'
  - also
  lexicon: HALOT
  rationale: Here אַף intensifies the assurance rather than merely adding another
    item. 'Surely' communicates emphatic reinforcement in natural English. Repeating
    it preserves the Hebrew rhetorical buildup.
- source_word: עֲזַרְתִּיךָ
  chosen: I will help you
  alternatives:
  - I have helped you
  lexicon: HALOT
  rationale: As with the preceding verb, the form is best rendered in English as future/promise
    in this context. 'Help' is the plain sense of עזר.
- source_word: תְּמַכְתִּיךָ
  chosen: I will uphold you
  alternatives:
  - I will sustain you
  - I have upheld you
  lexicon: HALOT
  rationale: תמך conveys support or sustaining. 'Uphold' fits the poetic register
    and pairs well with the following instrumental phrase.
- source_word: בִּימִין
  chosen: with ... right hand
  alternatives:
  - by ... right hand
  lexicon: HALOT
  rationale: The preposition ב can be instrumental here. 'With' is idiomatic in English
    and preserves the image of divine power/support associated with the right hand.
- source_word: צִדְקִי
  chosen: my righteous
  alternatives:
  - my righteousness
  - my just
  lexicon: HALOT
  rationale: Attached to 'right hand,' the adjective-like rendering 'my righteous
    right hand' is the most natural English expression and reflects the Hebrew construct
    relationship. 'My right hand of righteousness' is more formal but less idiomatic.
    The phrase likely conveys a right hand characterized by righteousness, faithfulness,
    and just power.
