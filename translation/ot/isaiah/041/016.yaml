theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of boasting language
  chosen_reading: you will boast
  alternative_readings:
  - you will glory
  rationale: The verse speaks of exultant confidence centered in God after his deliverance, not sinful self-exaltation. 'Boast' preserves the covenantal-theological idea of glorying in the LORD while remaining readable modern English.
  doctrine_reference: DOCTRINE.md Translation philosophy §§5–6
