id: ISA.41.16
reference: Isaiah 41:16
source:
  edition: WLC
  text: תִּזְרֵ/ם֙ וְ/ר֣וּחַ תִּשָּׂאֵ֔/ם וּ/סְעָרָ֖ה תָּפִ֣יץ אוֹתָ֑/ם וְ/אַתָּה֙ תָּגִ֣יל בַּֽ/יהוָ֔ה בִּ/קְד֥וֹשׁ יִשְׂרָאֵ֖ל תִּתְהַלָּֽל׃פ
translation:
  text: You will winnow them, and the wind will carry them away, and the storm will scatter them; but you will rejoice in Yahweh; in the Holy One of Israel you will boast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will scatter them.' The Hebrew verb can denote scattering generally, but 'winnow' is used here to preserve the threshing imagery of the context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: alternative_reading
  - marker: c
    text: Or 'you will glory in the Holy One of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּזְרֵם
  chosen: you will winnow them
  alternatives:
  - you will scatter them
  - you will toss them
  lexicon: HALOT
  rationale: From זרה in the sense of winnowing/scattering grain. 'Winnow' preserves the agricultural threshing imagery in the immediate context better than the more generic 'scatter.'
- source_word: רוּחַ
  chosen: wind
  alternatives:
  - spirit
  - breath
  lexicon: HALOT
  rationale: Here the parallel with 'storm' and the action of carrying away favors the meteorological sense 'wind,' not 'spirit' or 'breath.'
- source_word: תִּשָּׂאֵם
  chosen: will carry them away
  alternatives:
  - will lift them up
  - will bear them
  lexicon: HALOT
  rationale: From נשׂא, literally 'lift/carry.' 'Carry them away' fits the image of chaff being removed by wind and communicates the result clearly in English.
- source_word: סְעָרָה
  chosen: storm
  alternatives:
  - tempest
  - whirlwind
  lexicon: HALOT
  rationale: A violent windstorm is in view. 'Storm' is natural modern English; 'tempest' is archaic, and 'whirlwind' is possible but more specific than the Hebrew requires.
- source_word: תָּפִיץ
  chosen: will scatter
  alternatives:
  - will disperse
  - will drive away
  lexicon: HALOT
  rationale: From פוץ in the Hiphil, 'cause to scatter/disperse.' 'Scatter' is concise and matches the image of enemies reduced to chaff.
- source_word: תָּגִיל
  chosen: you will rejoice
  alternatives:
  - you will exult
  - you will be glad
  lexicon: HALOT
  rationale: From גיל, denoting joyful exultation. 'Rejoice' is idiomatic and sufficiently strong in context.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition marks the LORD as the sphere/object of rejoicing.
- source_word: בִּקְדוֹשׁ יִשְׂרָאֵל
  chosen: in the Holy One of Israel
  alternatives:
  - because of the Holy One of Israel
  lexicon: HALOT
  rationale: The title קדושׁ ישראל is a significant Isaianic divine designation and should be translated fully. The preposition is best kept as 'in' to preserve the parallel with 'in the LORD,' expressing the ground/sphere of boasting.
- source_word: תִּתְהַלָּל
  chosen: you will boast
  alternatives:
  - you will glory
  - you will praise yourself
  lexicon: HALOT
  rationale: In the Hitpael of הלל, the sense is 'boast/glory oneself.' In positive theological contexts with God as object, 'boast' communicates taking one's glory in the LORD without archaic tone.
