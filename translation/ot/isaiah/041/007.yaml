id: ISA.41.7
reference: Isaiah 41:7
source:
  edition: WLC
  text: וַ/יְחַזֵּ֤ק חָרָשׁ֙ אֶת צֹרֵ֔ף מַחֲלִ֥יק פַּטִּ֖ישׁ אֶת ה֣וֹלֶם פָּ֑עַם אֹמֵ֤ר
    לַ/דֶּ֨בֶק֙ ט֣וֹב ה֔וּא וַ/יְחַזְּקֵ֥/הוּ בְ/מַסְמְרִ֖ים לֹ֥א יִמּֽוֹט־־׃ס
translation:
  text: The craftsman strengthens the metalworker; the one who smooths with the hammer
    strengthens the one who strikes the anvil, saying of the soldering, “It is good”;
    then he fastens it with nails so that it will not totter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “of the joining,” “of the solder,” or less likely “of the glue.” The
      Hebrew term refers to the material or process by which the crafted object is
      joined together.
    reason: lexical_alternative
  - marker: b
    text: Or “so that it will not be moved” or “so that it will not topple.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַזֵּק
  chosen: strengthens
  alternatives:
  - encourages
  - makes strong
  lexicon: HALOT
  rationale: The verb חזק in the piel commonly means to strengthen or make firm. In
    this context of idol manufacture, it can describe mutual encouragement or practical
    reinforcement. 'Strengthens' preserves the concrete sense while allowing the ironic
    social cooperation of the craftsmen to remain visible.
- source_word: חָרָשׁ
  chosen: craftsman
  alternatives:
  - artisan
  - smith
  lexicon: HALOT
  rationale: A general term for a skilled worker. Since צֹרֵף specifically identifies
    the next worker as a metalworker/refiner, 'craftsman' best preserves the broader
    role of the first figure without collapsing the distinction.
- source_word: צֹרֵף
  chosen: metalworker
  alternatives:
  - goldsmith
  - refiner
  - smith
  lexicon: HALOT
  rationale: The participle denotes one who smelts or refines metal. 'Metalworker'
    is broad enough for the context of idol fabrication and more natural in modern
    English than 'refiner' here, while avoiding over-specification to gold.
- source_word: מַחֲלִיק פַּטִּישׁ
  chosen: the one who smooths with the hammer
  alternatives:
  - the hammer-smoother
  - he who smooths with a hammer
  lexicon: HALOT
  rationale: The participle from חלק here likely refers to smoothing or polishing
    metalwork. Rendering the phrase verbally in English is clearer than a compressed
    nominal expression.
- source_word: הוֹלֶם פָּעַם
  chosen: the one who strikes the anvil
  alternatives:
  - the striker of the anvil
  - the one who beats time
  - the one who strikes with repeated blows
  lexicon: HALOT
  rationale: הולם means striking or hammering, and פעם can denote an anvil or striking
    surface in this context. 'Strikes the anvil' fits the workshop imagery better
    than a more abstract 'beats' reading.
- source_word: לַדֶּבֶק
  chosen: of the soldering
  alternatives:
  - of the joining
  - of the solder
  - of the glue
  lexicon: HALOT
  rationale: דבק here refers to the joining material or process used in assembling
    the idol. In a metalworking context, 'soldering' best captures the sense more
    naturally than 'glue,' while 'joining' is possible but less vivid.
- source_word: טוֹב הוּא
  chosen: It is good
  alternatives:
  - It is satisfactory
  - That is good
  lexicon: HALOT
  rationale: A simple evaluative statement about the quality of the work. 'It is good'
    is direct and preserves the Hebrew idiom.
- source_word: וַיְחַזְּקֵהוּ בְמַסְמְרִים
  chosen: then he fastens it with nails
  alternatives:
  - secures it with nails
  - makes it firm with nails
  lexicon: HALOT
  rationale: The second use of חזק shifts from interpersonal strengthening to physically
    securing the idol. 'Fastens it with nails' expresses the concrete action clearly
    in English.
- source_word: לֹא יִמּוֹט
  chosen: so that it will not totter
  alternatives:
  - so that it will not be moved
  - so that it will not topple
  lexicon: HALOT
  rationale: מוט in the niphal means to totter, slip, or be shaken. 'Totter' preserves
    the irony of an idol needing stabilization, while 'topple' is slightly stronger
    than the Hebrew requires.
