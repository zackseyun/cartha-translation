theological_decisions:
- issue: Portrayal of idol manufacture in prophetic satire
  chosen_reading: The verse is rendered to emphasize the cooperative fabrication and
    stabilization of an idol without adding interpretive language such as 'idol' into
    the main text.
  alternative_readings:
  - Explicitly inserting 'idol' for clarity
  rationale: The immediate context makes the referent clear, but the Hebrew verse
    itself describes the craftsmen and their actions. Keeping the wording closer to
    the source preserves the prophetic irony without paraphrastic expansion.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source text warrants.'
