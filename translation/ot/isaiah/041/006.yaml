id: ISA.41.6
reference: Isaiah 41:6
source:
  edition: WLC
  text: אִ֥ישׁ אֶת רֵעֵ֖/הוּ יַעְזֹ֑רוּ וּ/לְ/אָחִ֖י/ו יֹאמַ֥ר חֲזָֽק־׃
translation:
  text: Each man helps his neighbor, and says to his brother, “Be strong!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “his companion” or “his friend” for “his neighbor.”
    reason: lexical_alternative
  - marker: b
    text: “Brother” may also carry the broader sense of a fellow member or kinsman
      in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: Each man
  alternatives:
  - A man
  - Each one
  lexicon: HALOT
  rationale: 'אִישׁ is singular ''man,'' but in distributive usage here it functions
    collectively: ''each man.'' This preserves the masculine/generic force in line
    with the gender-accurate policy, rather than flattening to a gender-neutral paraphrase.'
- source_word: אֶת רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his companion
  - his friend
  lexicon: HALOT
  rationale: רֵעַ commonly denotes a companion, associate, or neighbor. 'Neighbor'
    fits natural English and preserves the interpersonal sense without over-specifying
    affection implied by 'friend.'
- source_word: יַעְזֹרוּ
  chosen: helps
  alternatives:
  - will help
  - supports
  - comes to the aid of
  lexicon: HALOT
  rationale: The imperfect here describes the scene vividly/generically rather than
    emphasizing futurity. English present 'helps' renders the action naturally in
    context. Singular English agrees with the distributive subject 'each man,' though
    the Hebrew verb is plural because the collective subject is in view.
- source_word: וּלְאָחִיו
  chosen: and to his brother
  alternatives:
  - and to his kinsman
  lexicon: HALOT
  rationale: אָח can mean literal brother or more broadly a fellow member/kinsman.
    'Brother' is the most direct rendering and suits the parallelism with 'neighbor';
    broader nuance can be inferred from context.
- source_word: יֹאמַר
  chosen: says
  alternatives:
  - will say
  - is saying
  lexicon: HALOT
  rationale: As with יַעְזֹרוּ, the imperfect is best rendered as a vivid present
    in English within this descriptive sequence.
- source_word: חֲזָק
  chosen: Be strong!
  alternatives:
  - Be courageous!
  - Take courage!
  - Be firm!
  lexicon: HALOT
  rationale: The imperative from חזק calls for strength or resolve. 'Be strong!' is
    the most direct and idiomatic rendering, preserving the exhortational force.
