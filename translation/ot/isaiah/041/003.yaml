theological_decisions:
- issue: Interpretation of the final clause אֹרַח בְּרַגְלָיו לֹא יָבוֹא
  chosen_reading: The conqueror advances along a path previously untrodden by his
    feet.
  alternative_readings:
  - He advances on a path his feet do not touch
  - He comes by a path not with his feet
  rationale: The Hebrew is compressed and somewhat difficult. In context (YHWH stirring
    up a conqueror who moves victoriously), the clause most naturally emphasizes unprecedented
    or unhindered advance rather than a non-literal mode of travel. The chosen rendering
    preserves the imagery while making coherent English sense.
