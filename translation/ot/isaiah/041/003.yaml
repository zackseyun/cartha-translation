id: ISA.41.3
reference: Isaiah 41:3
source:
  edition: WLC
  text: יִרְדְּפֵ֖/ם יַעֲב֣וֹר שָׁל֑וֹם אֹ֥רַח בְּ/רַגְלָ֖י/ו לֹ֥א יָבֽוֹא׃
translation:
  text: He pursues them and passes on safely, by a path his feet had not traveled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He pursues them and passes through in peace; by a path his feet had
      not gone.' The Hebrew final clause is difficult and may emphasize either secure
      advance or movement along an untrodden route.
    reason: alternative_reading
lexical_decisions:
- source_word: יִרְדְּפֵם
  chosen: He pursues them
  alternatives:
  - He chased them
  - He will pursue them
  lexicon: HALOT
  rationale: Qal imperfect 3ms with 3mp suffix from רדף, here in prophetic narration
    describing the conqueror's action. English present 'pursues' fits the vivid sequence
    better than a simple future, while retaining the active hostile sense toward the
    objects 'them'.
- source_word: יַעֲבוֹר
  chosen: and passes on
  alternatives:
  - and passes through
  - and goes on
  lexicon: HALOT
  rationale: From עבר, basic sense 'pass over/through/by.' In this military-progress
    context, 'passes on' captures continued advance after pursuit without over-specifying
    the object crossed.
- source_word: שָׁלוֹם
  chosen: safely
  alternatives:
  - in peace
  - unharmed
  - peacefully
  lexicon: HALOT
  rationale: 'Though literally ''peace,'' the adverbial use here describes the manner/result
    of his advance: he proceeds without opposition or injury. ''Safely'' is idiomatic
    modern English and preserves the sense of secure, untroubled progress.'
- source_word: אֹרַח
  chosen: by a path
  alternatives:
  - on a ճանապարհ/path
  - a way
  lexicon: HALOT
  rationale: אֹרַח denotes a path/track/way. Rendered 'by a path' to connect naturally
    with the following phrase about his feet and to preserve the concrete travel imagery.
- source_word: בְּרַגְלָיו
  chosen: his feet
  alternatives:
  - with his feet
  - by his feet
  lexicon: HALOT
  rationale: Literally 'with/by his feet.' In English the instrumental preposition
    is awkward here; 'his feet' within the clause 'his feet had not traveled' conveys
    the bodily-travel image clearly.
- source_word: לֹא יָבוֹא
  chosen: had not traveled
  alternatives:
  - does not come
  - had not come
  - had not gone
  lexicon: HALOT
  rationale: Literally 'does not come,' but in context with 'path' and 'feet' the
    idiom points to not having gone on that path before. English pluperfect 'had not
    traveled' makes explicit the sense of unprecedented advance. This is an optimal-equivalence
    rendering of a difficult Hebrew expression.
