theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Relation between 'has done this' and 'has created it'
  chosen_reading: 'Both clauses are retained distinctly: ''has done this'' ... ''has
    created it.'''
  alternative_readings:
  - Collapsing both into a single English idea such as 'has done/created this'
  rationale: The Hebrew uses two different verbs, עשה and ברא, and the translation
    preserves the rhetorical fullness rather than flattening them. This maintains
    the text's emphasis on the LORD's agency and creative power without importing
    a doctrinal distinction beyond the wording itself.
  doctrine_reference: DOCTRINE.md Translation philosophy 1 and 5
- issue: Cognitive progression of the four verbs
  chosen_reading: see / know / consider / understand
  alternative_readings:
  - see / know / lay to heart / gain insight
  rationale: The verse stacks near-synonymous but distinct verbs to intensify recognition
    of God's work. The chosen sequence preserves the progression in readable English
    without paraphrasing away the multiplicity.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
