  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered language in מְתֵי יִשְׂרָאֵל
  chosen_reading: men of Israel
  alternative_readings:
  - people of Israel
  - mortals of Israel
  rationale: The Hebrew form is grammatically masculine plural and likely representative, but the project directs gender-accurate rendering over gender-neutral smoothing unless context requires otherwise. A footnote preserves the broader sense of frailty conveyed by the term.
