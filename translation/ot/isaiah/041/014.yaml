id: ISA.41.14
reference: Isaiah 41:14
source:
  edition: WLC
  text: אַל תִּֽירְאִי֙ תּוֹלַ֣עַת יַֽעֲקֹ֔ב מְתֵ֖י יִשְׂרָאֵ֑ל אֲנִ֤י עֲזַרְתִּי/ךְ֙ נְאֻם יְהוָ֔ה וְ/גֹאֲלֵ֖/ךְ קְד֥וֹשׁ יִשְׂרָאֵֽל־־׃
translation:
  text: Do not fear, worm Jacob, men of Israel; I myself help you, declares Yahweh, your Redeemer, the Holy One of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mortals of Israel' or 'people of Israel'; the Hebrew literally reads 'men of Israel,' likely emphasizing Israel's frailty.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'worm Jacob,' a metaphor of weakness and lowliness, not a literal description.
    reason: cultural_note
  - marker: c
    text: Or 'I have helped you' / 'I will help you'; the Hebrew verb form can be understood as a prophetic assurance rather than a simple past tense.
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּירְאִי
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: אַל with the imperfect gives a prohibition. 'Do not fear' is concise, idiomatic, and preserves the recurring biblical formula without unnecessary expansion.
- source_word: תּוֹלַעַת יַעֲקֹב
  chosen: worm Jacob
  alternatives:
  - you worm Jacob
  - worm of Jacob
  lexicon: HALOT
  rationale: תּוֹלַעַת literally means 'worm.' The phrase is appositional/vocative, addressing Jacob with imagery of weakness and lowliness. 'Worm Jacob' preserves the stark metaphor more directly than smoothing it into paraphrase.
- source_word: מְתֵי יִשְׂרָאֵל
  chosen: men of Israel
  alternatives:
  - mortals of Israel
  - people of Israel
  - few men of Israel
  lexicon: HALOT
  rationale: מְתֵי is the construct plural of a noun meaning 'men' or 'mortals.' In context it parallels 'worm Jacob' as a designation of frailty. 'Men of Israel' is the most straightforward rendering from the form, while preserving the masculine wording per the project's gender-accurate policy. Alternatives such as 'mortals' capture the nuance of weakness but are less direct here.
- source_word: אֲנִי
  chosen: I myself
  alternatives:
  - I
  - I am
  lexicon: HALOT
  rationale: The explicit pronoun is emphatic. 'I myself' brings out the emphasis in natural English and prepares for the divine assurance that follows.
- source_word: עֲזַרְתִּיךְ
  chosen: help you
  alternatives:
  - have helped you
  - am helping you
  - will help you
  lexicon: HALOT
  rationale: Although formally perfect, the verb here functions in a prophetic assurance context and is commonly rendered with present or future force in English. 'Help you' after emphatic 'I myself' gives a gnomic/present assurance that fits the discourse without overcommitting to a strictly past sense.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic formula best rendered 'declares.' Per doctrine, יְהוָה is rendered 'the LORD' rather than a transliteration.
- source_word: וְגֹאֲלֵךְ
  chosen: your Redeemer
  alternatives:
  - and your redeemer
  - your kinsman-redeemer
  lexicon: HALOT
  rationale: גאל in this theological context denotes one who redeems/delivers with covenantal force. 'Redeemer' is the established and accurate title. The conjunction is naturally absorbed into the appositional sequence in English.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  alternatives:
  - Israel's Holy One
  lexicon: HALOT
  rationale: This is a prominent Isaianic divine title. 'The Holy One of Israel' preserves both the title's form and its theological weight in readable English.
