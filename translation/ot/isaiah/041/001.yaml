theological_decisions:
- issue: Forensic setting of the verse
  chosen_reading: Render the verse as a divine legal summons without expanding it
    into explicit courtroom paraphrase beyond the Hebrew wording.
  alternative_readings:
  - Interpret more generally as a call for the nations to listen
  - Paraphrase explicitly as 'let us meet in court'
  rationale: The sequence 'be silent,' 'renew strength,' 'come near,' 'speak,' and
    'draw near for judgment' strongly suggests a legal disputation scene. The translation
    preserves that setting while avoiding interpretive overreach in the main text.
  doctrine_reference: 'Translation philosophy: preserve what the source text says
    without importing claims it does not make.'
