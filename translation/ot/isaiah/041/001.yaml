id: ISA.41.1
reference: Isaiah 41:1
source:
  edition: WLC
  text: הַחֲרִ֤ישׁוּ אֵלַ/י֙ אִיִּ֔ים וּ/לְאֻמִּ֖ים יַחֲלִ֣יפוּ כֹ֑חַ יִגְּשׁוּ֙ אָ֣ז
    יְדַבֵּ֔רוּ יַחְדָּ֖ו לַ/מִּשְׁפָּ֥ט נִקְרָֽבָה׃
translation:
  text: Be silent before me, coastlands; let the peoples renew their strength. Let
    them come near; then let them speak. Together let us draw near for judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'islands' or 'distant shores'; the Hebrew term often refers broadly to
      maritime lands or far-off coastlands.
    reason: lexical_alternative
  - marker: b
    text: Or 'gain new strength'; the Hebrew idiom literally involves changing or
      renewing strength.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew has 'let us draw near for judgment,' reflecting a legal or courtroom
      setting.
    reason: cultural_note
lexical_decisions:
- source_word: הַחֲרִישׁוּ
  chosen: Be silent
  alternatives:
  - Keep silence
  - Be quiet
  lexicon: HALOT
  rationale: Hiphil imperative plural from חרשׁ in this context is a command to silence
    before divine address or legal summons. 'Be silent' is natural modern English
    and preserves the imperative force better than the more archaic 'keep silence.'
- source_word: אֵלַי
  chosen: before me
  alternatives:
  - to me
  - listen to me
  lexicon: HALOT
  rationale: Literally 'to me,' but with a command to silence in a summons scene,
    English idiom is better conveyed by 'before me.' 'Listen to me' imports an explicit
    hearing nuance not stated by the preposition alone.
- source_word: אִיִּים
  chosen: coastlands
  alternatives:
  - islands
  - distant shores
  lexicon: HALOT
  rationale: Isaiah often uses אִיִּים for maritime lands or distant coastlands, not
    merely literal islands. 'Coastlands' best captures the prophetic geographic scope
    in readable English.
- source_word: וּלְאֻמִּים
  chosen: the peoples
  alternatives:
  - the nations
  - peoples
  lexicon: HALOT
  rationale: לְאֻמִּים denotes peoples/nations in the plural. 'The peoples' fits the
    parallelism with 'coastlands' and avoids flattening both cola into the same English
    term if 'nations' is used elsewhere for גוים.
- source_word: יַחֲלִיפוּ כֹחַ
  chosen: renew their strength
  alternatives:
  - exchange strength
  - gain new strength
  lexicon: HALOT
  rationale: 'The idiom חלף + כח in Isaiah denotes renewal or replacement of strength.
    ''Renew their strength'' is the clearest idiomatic rendering in English and matches
    the legal-challenge setting: let them muster fresh strength.'
- source_word: יִגְּשׁוּ
  chosen: Let them come near
  alternatives:
  - Let them approach
  - They shall come near
  lexicon: HALOT
  rationale: Imperfect used jussively in sequence after the imperative. 'Let them
    come near' preserves the summons tone better than a simple future.
- source_word: אָז
  chosen: then
  alternatives:
  - afterward
  - at that time
  lexicon: HALOT
  rationale: 'Marks the next step in the sequence of legal proceedings: first approach,
    then speak.'
- source_word: יְדַבֵּרוּ
  chosen: let them speak
  alternatives:
  - let them state their case
  - they shall speak
  lexicon: HALOT
  rationale: The verb simply means 'speak.' While the forensic context suggests stating
    a case, that fuller sense is better left implicit rather than paraphrased into
    the main text.
- source_word: יַחְדָּו
  chosen: Together
  alternatives:
  - together
  - as one
  lexicon: HALOT
  rationale: Adverb indicating joint action in the courtroom summons. Capitalized
    at sentence start in English.
- source_word: לַמִּשְׁפָּט
  chosen: for judgment
  alternatives:
  - for justice
  - to the judgment
  - for the legal case
  lexicon: HALOT
  rationale: מִשְׁפָּט here is best read in a forensic sense, given the surrounding
    summons language. 'For judgment' preserves the legal setting without over-specifying
    whether it is trial, verdict, or justice.
- source_word: נִקְרָבָה
  chosen: let us draw near
  alternatives:
  - let us come near
  - we will draw near
  lexicon: HALOT
  rationale: 'First person plural cohortative: the speaker includes himself in the
    movement toward judgment. ''Let us draw near'' preserves the cohortative force
    and the formal courtroom tone.'
