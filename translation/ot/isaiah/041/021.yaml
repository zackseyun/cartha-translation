theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The main text follows the project's stated default for the Tetragrammaton,
    preserving Jewish reverence convention and established English Bible practice
    while remaining transparent about alternatives.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Forensic imagery in the divine challenge
  chosen_reading: courtroom language ('Present your case ... bring forward your arguments')
  alternative_readings:
  - more literal spatial language ('Come near your dispute ... bring near your strong
    things')
  rationale: The verse is part of a legal challenge scene in which the LORD summons
    opposing claimants to state their case. Optimal equivalence favors explicit courtroom
    English where the Hebrew legal idiom would otherwise sound opaque.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    source text''s plain sense'
