id: ISA.41.22
reference: Isaiah 41:22
source:
  edition: WLC
  text: יַגִּ֨ישׁוּ֙ וְ/יַגִּ֣ידוּ לָ֔/נוּ אֵ֖ת אֲשֶׁ֣ר תִּקְרֶ֑ינָה הָ/רִאשֹׁנ֣וֹת
    מָ֣ה הֵ֗נָּה הַגִּ֜ידוּ וְ/נָשִׂ֤ימָה לִבֵּ֨/נוּ֙ וְ/נֵדְעָ֣ה אַחֲרִיתָ֔/ן א֥וֹ
    הַ/בָּא֖וֹת הַשְׁמִיעֻֽ/נוּ׀׃
translation:
  text: Let them bring them forward and tell us what will happen. Tell us the former
    things—what they are—that we may set our heart on them and know their outcome;
    or declare to us the things to come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let them present them and declare to us what will occur.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'set our heart'; the idiom means to apply careful attention or consideration.
    reason: cultural_note
  - marker: c
    text: Or 'know their end.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַגִּישׁוּ
  chosen: Let them bring them forward
  alternatives:
  - Let them present them
  - Let them bring near
  lexicon: HALOT
  rationale: Hiphil of נגשׁ in this context is a summons to present the idols/case
    before the court scene. 'Bring them forward' is idiomatic English that preserves
    the forensic setting better than the more wooden 'bring near.' The implied object
    is supplied from context.
- source_word: וְיַגִּידוּ
  chosen: and tell us
  alternatives:
  - and declare to us
  - and announce to us
  lexicon: HALOT
  rationale: נגד in Hiphil commonly means to tell, declare, or announce. 'Tell us'
    is natural modern English here, while the later imperative הַגִּידוּ is rendered
    'Tell us' as well for consistency of key term unless context suggests stronger
    formality.
- source_word: אֵת אֲשֶׁר תִּקְרֶינָה
  chosen: what will happen
  alternatives:
  - the things that will occur
  - what is going to take place
  lexicon: HALOT
  rationale: קרה refers to events that happen or occur. The feminine plural verb agrees
    with the implied plural 'things.' English idiom prefers the concise 'what will
    happen' rather than a more literal but clumsy plural construction.
- source_word: הָרִאשֹׁנוֹת
  chosen: the former things
  alternatives:
  - the earlier things
  - the first things
  lexicon: HALOT
  rationale: ראשׁון here refers to prior events. 'Former things' is a standard and
    accurate rendering in Isaiah, preserving the contrast with 'things to come.'
- source_word: מָה הֵנָּה
  chosen: what they are
  alternatives:
  - what they were
  - what they mean
  lexicon: HALOT
  rationale: The clause is verbless and literally asks 'what are they?' In context,
    the challenge is to identify/explain the former things. 'What they are' preserves
    the Hebrew form better than interpretive expansions like 'what they mean.'
- source_word: הַגִּידוּ
  chosen: Tell us
  alternatives:
  - Declare
  - Explain
  lexicon: HALOT
  rationale: Imperative of נגד. Repeating 'Tell us' keeps the rhetorical force and
    lexical consistency with the earlier form of the same verb.
- source_word: וְנָשִׂימָה לִבֵּנוּ
  chosen: that we may set our heart on them
  alternatives:
  - and we will set our mind to them
  - that we may pay attention to them
  lexicon: HALOT
  rationale: The idiom 'set the heart' means to apply the mind/attention carefully.
    'Set our heart on them' preserves the Hebrew anthropological language better than
    flattening it to mere attention, while remaining understandable.
- source_word: וְנֵדְעָה אַחֲרִיתָן
  chosen: and know their outcome
  alternatives:
  - and know their end
  - and know how they turn out
  lexicon: HALOT
  rationale: אַחֲרִית denotes end, latter part, or outcome. 'Outcome' communicates
    the sense clearly in modern English without sounding overly abstract or eschatological
    in this immediate context.
- source_word: אוֹ הַבָּאוֹת
  chosen: or ... the things to come
  alternatives:
  - or the coming things
  - or what is coming
  lexicon: HALOT
  rationale: בוא in the participial form refers to things that are coming. 'The things
    to come' is idiomatic and preserves the contrast with 'former things.'
- source_word: הַשְׁמִיעֻנוּ
  chosen: declare to us
  alternatives:
  - make us hear
  - announce to us
  - proclaim to us
  lexicon: HALOT
  rationale: Hiphil of שׁמע literally means 'cause us to hear,' but in context it
    functions as 'announce' or 'declare.' 'Declare to us' gives a slightly more formal
    rhetorical force than 'tell us' and avoids awkward literalism.
