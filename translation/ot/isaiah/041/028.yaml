id: ISA.41.28
reference: Isaiah 41:28
source:
  edition: WLC
  text: וְ/אֵ֨רֶא֙ וְ/אֵ֣ין אִ֔ישׁ וּ/מֵ/אֵ֖לֶּה וְ/אֵ֣ין יוֹעֵ֑ץ וְ/אֶשְׁאָלֵ֖/ם
    וְ/יָשִׁ֥יבוּ דָבָֽר׃
translation:
  text: And I looked, but there was no man; among these there was no counselor, that
    I might ask them and they would answer a word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there was no one.' Hebrew 'no man' uses a masculine singular form that
      can function representatively.
    reason: lexical_alternative
  - marker: b
    text: Or 'and they would answer anything.' Hebrew literally, 'and they would answer
      a word.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵרֶא
  chosen: And I looked
  alternatives:
  - And I saw
  - Then I looked
  lexicon: HALOT
  rationale: Qal imperfect 1cs of ראה in prophetic discourse can function as a past
    narrative or vivid present. 'Looked' fits the retrospective survey of the idols
    and their advocates in context, while preserving the observational force.
- source_word: וְאֵין אִישׁ
  chosen: but there was no man
  alternatives:
  - and there was no one
  - and there was no man
  lexicon: HALOT
  rationale: אִישׁ is singular 'man'/'person.' Following the gender-accurate policy,
    'man' is retained rather than neutralizing to 'one,' while the phrase idiomatically
    means no person was present who could respond.
- source_word: וּמֵאֵלֶּה
  chosen: among these
  alternatives:
  - from these
  - and from these
  lexicon: HALOT
  rationale: 'The preposition מִן with demonstrative אֵלֶּה here is best taken partitively:
    among these ones just surveyed, namely the idols or their spokesmen. ''Among these''
    communicates the partitive sense more naturally than ''from these.'''
- source_word: וְאֵין יוֹעֵץ
  chosen: there was no counselor
  alternatives:
  - there was no adviser
  - there was no one giving counsel
  lexicon: HALOT
  rationale: יוֹעֵץ is a participial noun from יעץ, denoting one who gives counsel.
    'Counselor' is concise and preserves the substantive force.
- source_word: וְאֶשְׁאָלֵם
  chosen: that I might ask them
  alternatives:
  - and I asked them
  - so that I could ask them
  lexicon: HALOT
  rationale: 'The imperfect with vav after the preceding clause can express intended
    or potential action in context: there was no counselor such that the speaker could
    ask them. The 3mp suffix requires ''them.'''
- source_word: וְיָשִׁיבוּ דָבָר
  chosen: and they would answer a word
  alternatives:
  - and they would answer anything
  - and they would return an answer
  - and they would answer a matter
  lexicon: HALOT
  rationale: Hiphil of שוב can mean 'bring back, answer, respond.' דָבָר literally
    means 'word,' though in context it can imply any reply. 'Answer a word' preserves
    the Hebrew terseness and rhetorical emptiness; the smoother idiom 'answer anything'
    is preserved as an alternative.
