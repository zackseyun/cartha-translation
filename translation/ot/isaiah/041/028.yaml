theological_decisions:
- issue: Referent of 'these' and the absent 'counselor'
  chosen_reading: The verse continues the polemic against idols and their representatives,
    stressing that none among them can give counsel or answer.
  alternative_readings:
  - The referent could be the nations or their gods more generally rather than idols
    alone.
  rationale: The immediate context (Isa 41:21–29) is a courtroom challenge to idols
    to declare and explain events. The translation stays textually modest by not specifying
    the referent in the main text beyond 'these.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
- issue: Rendering אִישׁ
  chosen_reading: man
  alternative_readings:
  - one
  - person
  rationale: The Hebrew is grammatically masculine singular and functions representatively
    here. Per the gender-accurate policy, 'man' is retained rather than flattened
    to a neutral term.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
