theological_decisions:
- issue: Gendered expression in אַנְשֵׁי רִיבֶךָ
  chosen_reading: the men who contend with you
  alternative_readings:
  - those who contend with you
  - your adversaries
  rationale: Following the project's gender-accurate policy, the masculine plural
    noun is retained as 'men' rather than neutralized, since the Hebrew uses a gendered
    term and there is no contextual pressure requiring an inclusive paraphrase.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
