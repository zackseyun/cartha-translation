id: ISA.41.11
reference: Isaiah 41:11
source:
  edition: WLC
  text: הֵ֤ן יֵבֹ֨שׁוּ֙ וְ/יִכָּ֣לְמ֔וּ כֹּ֖ל הַ/נֶּחֱרִ֣ים בָּ֑/ךְ יִֽהְי֥וּ כְ/אַ֛יִן
    וְ/יֹאבְד֖וּ אַנְשֵׁ֥י רִיבֶֽ/ךָ׃
translation:
  text: Behold, all who are enraged against you will be put to shame and humiliated;
    they will become as nothing, and the men who contend with you will perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who are angry with you' / 'who are incensed against you.' The Hebrew
      participle is literally 'those burning against you,' an idiom for anger.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Behold
  alternatives:
  - Look
  - Surely
  lexicon: HALOT
  rationale: Discourse particle marking attention and certainty. 'Behold' preserves
    the prophetic force more transparently than a flatter modern equivalent.
- source_word: יֵבֹשׁוּ
  chosen: will be put to shame
  alternatives:
  - will be ashamed
  - will be disappointed
  lexicon: HALOT
  rationale: בוש commonly denotes being shamed/disgraced. Passive-like English 'be
    put to shame' captures the result in context of divine reversal better than the
    more internal 'be ashamed'.
- source_word: וְיִכָּלְמוּ
  chosen: and humiliated
  alternatives:
  - and disgraced
  - and confounded
  lexicon: HALOT
  rationale: From כלם in the Niphal, overlapping with בוש but intensifying it. 'Humiliated'
    preserves the parallelism without sounding archaic; the second verb is not collapsed
    but rendered distinctly.
- source_word: כֹּל
  chosen: all
  lexicon: HALOT
  rationale: Straightforward universal quantifier modifying the following participle
    phrase.
- source_word: הַנֶּחֱרִים בָּךְ
  chosen: who are enraged against you
  alternatives:
  - who burn against you
  - who are incensed against you
  - who are angry with you
  lexicon: HALOT
  rationale: The participle from חרה literally relates to burning, idiomatically anger.
    'Enraged against you' conveys the hostile intensity and fits the preposition ב
    in this adversative sense.
- source_word: יִהְיוּ כְאַיִן
  chosen: they will become as nothing
  alternatives:
  - they will be like nothing
  - they will come to nothing
  lexicon: HALOT
  rationale: אפס/אין language here expresses nonentity or nullity. 'Become as nothing'
    preserves both the future verb and the comparative particle כ.
- source_word: וְיֹאבְדוּ
  chosen: will perish
  alternatives:
  - will be destroyed
  - will vanish
  lexicon: HALOT
  rationale: אבד in the Qal often means perish/be lost. 'Will perish' is concise and
    preserves the intransitive force better than a more causative-sounding 'be destroyed'.
- source_word: אַנְשֵׁי רִיבֶךָ
  chosen: the men who contend with you
  alternatives:
  - the men of your dispute
  - your adversaries in strife
  - those who quarrel with you
  lexicon: HALOT
  rationale: Construct phrase literally 'men of your dispute/contention.' 'The men
    who contend with you' is idiomatic English that preserves the masculine plural
    noun and the legal-conflict nuance of ריב.
