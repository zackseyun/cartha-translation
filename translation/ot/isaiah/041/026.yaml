id: ISA.41.26
reference: Isaiah 41:26
source:
  edition: WLC
  text: מִֽי הִגִּ֤יד מֵ/רֹאשׁ֙ וְ/נֵדָ֔עָה וּ/מִ/לְּ/פָנִ֖ים וְ/נֹאמַ֣ר צַדִּ֑יק
    אַ֣ף אֵין מַגִּ֗יד אַ֚ף אֵ֣ין מַשְׁמִ֔יעַ אַ֥ף אֵין שֹׁמֵ֖עַ אִמְרֵי/כֶֽם־־־׃
translation:
  text: Who declared it from the beginning, so that we might know, and beforehand,
    so that we might say, ‘He is right’? But there was no one declaring it, no one
    making it heard, no one hearing your words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from the first.”
    reason: lexical_alternative
  - marker: b
    text: Or “He is in the right”; traditionally, “He is righteous.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  alternatives:
  - Who is it that
  lexicon: HALOT
  rationale: Interrogative pronoun introducing the challenge question; simple 'Who'
    best preserves the direct rhetorical force.
- source_word: הִגִּיד
  chosen: declared
  alternatives:
  - announced
  - told
  lexicon: HALOT
  rationale: Hiphil of נגד conveys making something known publicly or plainly. 'Declared'
    fits the prophetic/judicial challenge context better than the more casual 'told'.
- source_word: מֵרֹאשׁ
  chosen: from the beginning
  alternatives:
  - from the first
  - at the outset
  lexicon: HALOT
  rationale: The phrase points to prior prediction. 'From the beginning' is idiomatic
    English and preserves the temporal sense of earliest disclosure.
- source_word: וְנֵדָעָה
  chosen: so that we might know
  alternatives:
  - and we would know
  - that we may know
  lexicon: HALOT
  rationale: The cohortative expresses intended result from the prior declaration.
    'So that we might know' captures the purposive/result nuance in natural English.
- source_word: וּמִלְּפָנִים
  chosen: and beforehand
  alternatives:
  - and from former time
  - and in advance
  lexicon: HALOT
  rationale: The expression parallels 'from the beginning' and emphasizes advance
    notice. 'Beforehand' is concise and natural.
- source_word: וְנֹאמַר
  chosen: so that we might say
  alternatives:
  - and we would say
  - that we may say
  lexicon: HALOT
  rationale: Another cohortative of result/purpose parallel to 'so that we might know.'
- source_word: צַדִּיק
  chosen: He is right
  alternatives:
  - He is righteous
  - He is in the right
  lexicon: HALOT
  rationale: Here the adjective functions as an evaluative verdict on the truth of
    the prediction, not primarily a moral description. 'He is right' communicates
    that the speaker's claim is vindicated. The more formal 'He is in the right' is
    possible but less natural.
- source_word: אַף אֵין מַגִּיד
  chosen: But there was no one declaring it
  alternatives:
  - Indeed, there was no one declaring
  - Surely there was no one telling
  lexicon: HALOT
  rationale: אַף with אֵין intensifies the negation. 'But there was no one...' fits
    the adversative turn in English while preserving the force of the denial.
- source_word: מַשְׁמִיעַ
  chosen: making it heard
  alternatives:
  - proclaiming
  - causing it to be heard
  lexicon: HALOT
  rationale: 'Hiphil of שמע is causative: causing others to hear. ''Making it heard''
    preserves that causative nuance more closely than simply ''proclaiming,'' though
    the latter is conceptually similar.'
- source_word: שֹׁמֵעַ
  chosen: hearing
  alternatives:
  - listening to
  - one who heard
  lexicon: HALOT
  rationale: Participle in the final clause denotes anyone who hears. 'No one hearing
    your words' keeps the parallelism with the preceding participles.
- source_word: אִמְרֵיכֶם
  chosen: your words
  alternatives:
  - what you say
  - your sayings
  lexicon: HALOT
  rationale: Plural construct from אמר refers to spoken utterances. 'Your words' is
    the most straightforward rendering in this polemical address to the idols/their
    advocates.
