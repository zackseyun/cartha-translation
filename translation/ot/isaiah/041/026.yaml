theological_decisions:
- issue: Referent of the implied object in the prediction challenge
  chosen_reading: Render without supplying an explicit object ('it') rather than specifying
    a person or event.
  alternative_readings:
  - Who declared him from the beginning
  - Who declared this from the beginning
  rationale: The Hebrew leaves the object implicit. Supplying 'it' in English is minimally
    interpretive and avoids narrowing the referent beyond the text, preserving the
    rhetorical challenge against idols in context.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sense of צַדִּיק in this context
  chosen_reading: Use forensic/vindicatory sense ('He is right') rather than moral
    quality ('He is righteous').
  alternative_readings:
  - He is righteous
  - He is in the right
  rationale: In context the point is whether any alleged deity predicted events truly
    enough to be vindicated. The verse is not making a doctrinal statement about personal
    righteousness but issuing a verdict on predictive credibility.
  doctrine_reference: Translation philosophy §1, §6
