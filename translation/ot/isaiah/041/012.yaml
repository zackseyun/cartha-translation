theological_decisions:
- issue: Degree of literalness in paired expressions for enemy annihilation
  chosen_reading: Render the first clause concretely ('seek...not find') and the second
    with two distinct but related expressions ('like nothing, like nonexistence')
  alternative_readings:
  - Render both nouns identically as 'nothing'
  - Use more interpretive language such as 'they will vanish completely'
  rationale: The verse emphasizes the total disappearance of Israel's enemies. The
    translation preserves the Hebrew poetic parallelism and escalating force without
    paraphrasing beyond the text. No doctrinal controversy is at stake, but the wording
    avoids overstating annihilation in a metaphysical sense while still reflecting
    the rhetoric of judgment.
  doctrine_reference: Translation philosophy §§1, 3, 6
