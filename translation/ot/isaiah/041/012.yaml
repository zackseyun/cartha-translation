id: ISA.41.12
reference: Isaiah 41:12
source:
  edition: WLC
  text: תְּבַקְשֵׁ/ם֙ וְ/לֹ֣א תִמְצָאֵ֔/ם אַנְשֵׁ֖י מַצֻּתֶ֑/ךָ יִהְי֥וּ כְ/אַ֛יִן
    וּ/כְ/אֶ֖פֶס אַנְשֵׁ֥י מִלְחַמְתֶּֽ/ךָ׃
translation:
  text: You will seek them and not find them—those men who contend with you. The men
    who wage war against you will become like nothing, like nonexistence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the men of your strife'; that is, those who contend or quarrel with
      you.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'like nothing and like אפס'; the second term can also be rendered
      'utter nothingness' or 'zero.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּבַקְשֵׁם
  chosen: You will seek them
  alternatives:
  - You will look for them
  - You will search for them
  lexicon: HALOT
  rationale: Piel of בקש commonly means to seek or search for. 'Seek' is concise and
    natural, and fits the parallel with 'not find.'
- source_word: וְלֹא תִמְצָאֵם
  chosen: and not find them
  alternatives:
  - but you will not find them
  - and you will not find them
  lexicon: HALOT
  rationale: מצא in Qal means 'find.' The simple coordination preserves the Hebrew
    sequence; English omits the repeated subject for smoothness.
- source_word: אַנְשֵׁי מַצֻּתֶךָ
  chosen: those men who contend with you
  alternatives:
  - the men of your strife
  - the men who oppose you
  - your adversaries
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' מַצָּה/מַצּוּת here denotes strife, contention,
    or quarrel. Rendering the construct idiomatically as 'men who contend with you'
    preserves the personal reference and the conflict sense without awkward literalism.
- source_word: יִהְיוּ
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: היה can mean 'be' or 'become.' In context of enemies reduced to nothing,
    'will become' better conveys the transition implied by the promise.
- source_word: כְאַיִן
  chosen: like nothing
  alternatives:
  - as nothing
  - like a thing of nothing
  lexicon: HALOT
  rationale: אַיִן denotes nonexistence or nothingness. 'Like nothing' is idiomatic
    and preserves the comparative כ.
- source_word: וּכְאֶפֶס
  chosen: like nonexistence
  alternatives:
  - like nothing at all
  - like zero
  - like utter nothingness
  lexicon: HALOT
  rationale: אֶפֶס can denote nothingness, nonexistence, or utter insignificance.
    To avoid flattening the paired terms into exact repetition, 'nonexistence' preserves
    the intensifying parallelism while remaining readable.
- source_word: אַנְשֵׁי מִלְחַמְתֶּךָ
  chosen: The men who wage war against you
  alternatives:
  - the men of your war
  - those who fight against you
  - your warriors/opponents in battle
  lexicon: HALOT
  rationale: The construct literally means 'men of your war,' i.e., those engaged
    in war against you. 'Wage war against you' makes the adversarial sense explicit
    in natural English.
