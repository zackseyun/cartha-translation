theological_decisions:
- issue: Referent of the plural pronoun in 'here they are'
  chosen_reading: Left implicit as in the Hebrew, without specifying whether it refers
    to returning exiles, announced events, or God's agents.
  alternative_readings:
  - returning exiles
  - the things foretold
  - the messengers/agents of deliverance
  rationale: The Hebrew does not explicitly identify the plural referent. Preserving
    the ambiguity avoids importing a narrower interpretation than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
