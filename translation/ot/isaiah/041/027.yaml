id: ISA.41.27
reference: Isaiah 41:27
source:
  edition: WLC
  text: רִאשׁ֥וֹן לְ/צִיּ֖וֹן הִנֵּ֣ה הִנָּ֑/ם וְ/לִ/ירוּשָׁלִַ֖ם מְבַשֵּׂ֥ר אֶתֵּֽן׃
translation:
  text: 'First to Zion: ‘Look, here they are!’ and to Jerusalem I give a herald of
    good news.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Behold, here they are!'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew does not explicitly identify who 'they' are; the phrase may refer
      to the people or events just announced.
    reason: alternative_reading
  - marker: c
    text: Or, 'I will give Jerusalem a messenger who brings good news.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רִאשׁוֹן
  chosen: First
  alternatives:
  - The first one
  - Formerly
  - First of all
  lexicon: HALOT
  rationale: The adjective/noun can mean 'first' or 'former.' In this compressed poetic
    line, 'First' best preserves the terse force and allows the implied sense that
    God is the first to announce or present the coming ones to Zion.
- source_word: לְצִיּוֹן
  chosen: to Zion
  alternatives:
  - for Zion
  lexicon: HALOT
  rationale: 'The preposition ל is most naturally directional here: the declaration
    is addressed to Zion.'
- source_word: הִנֵּה הִנָּם
  chosen: ‘Look, here they are!’
  alternatives:
  - Behold, here they are!
  - See, here they are!
  lexicon: HALOT
  rationale: The doubled deictic expression is emphatic. 'Look' is readable modern
    English, while 'here they are' captures the plural pronominal suffix in הִנָּם.
- source_word: וְלִירוּשָׁלַם
  chosen: and to Jerusalem
  alternatives:
  - and for Jerusalem
  lexicon: HALOT
  rationale: Parallel to 'to Zion,' the phrase introduces a second recipient of God's
    action or speech.
- source_word: מְבַשֵּׂר
  chosen: a herald of good news
  alternatives:
  - one who brings good news
  - a messenger
  - a herald
  lexicon: HALOT
  rationale: The participle from בשׂר denotes one who announces good news. 'Herald
    of good news' preserves both the agentive sense and the positive content without
    overloading the line with a full relative clause.
- source_word: אֶתֵּן
  chosen: I give
  alternatives:
  - I will give
  - I appoint
  lexicon: HALOT
  rationale: The imperfect 1cs can be rendered present or future in prophetic discourse.
    Present 'I give' fits the vivid, declarative style of the verse and pairs naturally
    with the immediate deictic 'here they are.'
