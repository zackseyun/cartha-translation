id: ISA.41.4
reference: Isaiah 41:4
source:
  edition: WLC
  text: מִֽי פָעַ֣ל וְ/עָשָׂ֔ה קֹרֵ֥א הַ/דֹּר֖וֹת מֵ/רֹ֑אשׁ אֲנִ֤י יְהוָה֙ רִאשׁ֔וֹן וְ/אֶת אַחֲרֹנִ֖ים אֲנִי הֽוּא־־־׃
translation:
  text: Who has acted and done this, calling the generations from the beginning? I, Yahweh, am the first, and with the last ones—I am he.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and with the last, I am he,' traditionally understood as affirming that the LORD is present from the first generation to the last.
    reason: alternative_reading
lexical_decisions:
- source_word: מִי
  chosen: Who
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question.
- source_word: פָעַל וְעָשָׂה
  chosen: has acted and done this
  alternatives:
  - has done and made
  - has worked and accomplished
  lexicon: HALOT
  rationale: The paired verbs intensify the idea of effective action. English keeps both verbs rather than collapsing them. 'This' is supplied idiomatically because the question points to the historical events just described.
- source_word: קֹרֵא
  chosen: calling
  alternatives:
  - summoning
  - proclaiming
  lexicon: HALOT
  rationale: Qal participle gives an ongoing or characteristic action. 'Calling' fits the context of sovereignly summoning successive generations into history.
- source_word: הַדֹּרוֹת
  chosen: the generations
  alternatives:
  - the ages
  - the successive generations
  lexicon: HALOT
  rationale: '''Generations'' is the natural rendering of דּוֹרוֹת and fits the historical sequence in context.'
- source_word: מֵרֹאשׁ
  chosen: from the beginning
  alternatives:
  - from the first
  - from the outset
  lexicon: HALOT
  rationale: 'Temporal sense is primary here: from the start of history or from the first generation.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: רִאשׁוֹן
  chosen: the first
  alternatives:
  - first
  - the one who is first
  lexicon: HALOT
  rationale: Predicate adjective expressing God's primacy and precedence.
- source_word: וְאֶת אַחֲרֹנִים
  chosen: and with the last ones
  alternatives:
  - and with the last
  - and with those who come after
  - and at the end
  lexicon: HALOT
  rationale: The preposition-like use of אֵת after waw is difficult; in context it most naturally means 'with' or 'beside' the last ones, expressing God's continuing presence through the final generations. The plural 'last ones' reflects the Hebrew plural.
- source_word: אֲנִי הוּא
  chosen: I am he
  alternatives:
  - I am the same one
  - it is I
  lexicon: HALOT
  rationale: A compact self-identification formula used in Isaiah for God's unchanging identity. 'I am he' preserves the terseness and theological weight.
