theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of God's relation to 'the last' in וְאֶת אַחֲרֹנִים
  chosen_reading: God is present 'with the last ones'
  alternative_readings:
  - God is 'the last'
  - God is 'with the last generation'
  rationale: The Hebrew construction is elliptical and has been rendered variously in English tradition. The chosen reading preserves the wording of the Hebrew plural and the sense that the same LORD who began history remains present through its final generations, without importing later theological formulations not explicit in the verse.
