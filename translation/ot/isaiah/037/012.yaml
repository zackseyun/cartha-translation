id: ISA.37.12
reference: Isaiah 37:12
source:
  edition: WLC
  text: הַ/הִצִּ֨ילוּ אוֹתָ֜/ם אֱלֹהֵ֤י הַ/גּוֹיִם֙ אֲשֶׁ֣ר הִשְׁחִ֣יתוּ אֲבוֹתַ֔/י
    אֶת גּוֹזָ֖ן וְ/אֶת חָרָ֑ן וְ/רֶ֥צֶף וּ/בְנֵי עֶ֖דֶן אֲשֶׁ֥ר בִּ/תְלַשָּֽׂר־־־׃
translation:
  text: Did the gods of the nations that my fathers destroyed deliver them—Gozan,
    Haran, Rezeph, and the people of Eden who were in Telassar?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Eden,' meaning the people or inhabitants of Eden.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַהִצִּילוּ
  chosen: Did ... deliver
  alternatives:
  - Have ... delivered
  - rescue
  lexicon: HALOT
  rationale: Hiphil perfect of נצל used in an interrogative rhetorical question. English
    simple past fits the historical review and the taunting force. 'Deliver' is idiomatic
    in this context; 'rescue' is possible but less conventional for national gods
    and conquered peoples.
- source_word: אוֹתָם
  chosen: them
  alternatives:
  - those peoples
  lexicon: HALOT
  rationale: Direct object pronoun refers back to the peoples/cities listed or implied
    by the relative clause. 'Them' preserves the Hebrew pronoun succinctly; the appositional
    list then specifies the referents.
- source_word: אֱלֹהֵי הַגּוֹיִם
  chosen: the gods of the nations
  alternatives:
  - the national gods
  - the gods of the peoples
  lexicon: HALOT
  rationale: Plural construct clearly refers to the deities worshiped by the foreign
    nations. 'Nations' is the standard rendering of גוים in this geopolitical context.
- source_word: אֲשֶׁר הִשְׁחִיתוּ אֲבוֹתַי
  chosen: that my fathers destroyed
  alternatives:
  - that my fathers laid waste
  - that my fathers ruined
  lexicon: HALOT
  rationale: שׁחת in the Hiphil can mean destroy, ruin, lay waste. 'Destroyed' best
    matches the military context and keeps the rhetoric sharp. 'My fathers' refers
    to royal predecessors/ancestors, not immediate parents.
- source_word: אֲבוֹתַי
  chosen: my fathers
  alternatives:
  - my ancestors
  - my forefathers
  lexicon: HALOT
  rationale: Literal plural with dynastic sense. 'My fathers' preserves the Hebrew
    wording and common royal idiom; English readers can understand it as predecessors
    in context.
- source_word: אֶת גּוֹזָן וְאֶת חָרָן וְרֶצֶף
  chosen: Gozan, Haran, Rezeph
  lexicon: HALOT
  rationale: These are place names and should be transliterated by standard conventions.
    'Rezeph' reflects the Hebrew vocalization more directly than the traditional 'Rezep'/'Rezeph'
    variants; 'Rezeph' is standard enough and transparent.
- source_word: וּבְנֵי עֶדֶן
  chosen: the people of Eden
  alternatives:
  - the sons of Eden
  - the children of Eden
  lexicon: HALOT
  rationale: בני literally means 'sons of,' but here denotes the inhabitants or people-group
    associated with Eden/Bit-Adini. 'The people of Eden' communicates the collective
    sense in natural English while avoiding an overly literal phrase that could mislead
    modern readers.
- source_word: אֲשֶׁר בִּתְלַשָּׂר
  chosen: who were in Telassar
  alternatives:
  - who were at Telassar
  - who were in Beth-eden/Telassar region
  lexicon: HALOT
  rationale: The relative clause most naturally modifies 'the people of Eden' and
    locates them in Telassar. 'In' is the most straightforward rendering of the prefixed
    ב. Telassar is transliterated as a place name.
