id: ISA.37.37
reference: Isaiah 37:37
source:
  edition: WLC
  text: וַ/יִּסַּ֣ע וַ/יֵּ֔לֶךְ וַ/יָּ֖שָׁב סַנְחֵרִ֣יב מֶֽלֶךְ אַשּׁ֑וּר וַ/יֵּ֖שֶׁב
    בְּ/נִֽינְוֵֽה־׃
translation:
  text: So Sennacherib king of Assyria departed, and went away, and returned, and
    lived in Nineveh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwelt in Nineveh.' The Hebrew verb can denote residing or dwelling.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסַּע
  chosen: departed
  alternatives:
  - set out
  - broke camp
  lexicon: HALOT
  rationale: From נסע, in narrative travel context meaning to pull up and depart/set
    out. 'Departed' is natural modern English and preserves the movement without over-specifying
    camp imagery not explicit in the immediate clause.
- source_word: וַיֵּלֶךְ
  chosen: went away
  alternatives:
  - went
  - left
  lexicon: HALOT
  rationale: הלך is the common verb 'go/walk.' Rendering it separately as 'went away'
    preserves the Hebrew narrative sequence rather than collapsing the chained verbs
    into a single English motion verb.
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: HALOT
  rationale: שׁוב in travel narrative commonly means 'return.' This fits the context
    of Sennacherib withdrawing from Judah and going back to his own realm.
- source_word: סַנְחֵרִיב
  chosen: Sennacherib
  rationale: Standard English transliteration of the Assyrian royal name; per philosophy,
    personal names are transliterated rather than translated.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: king of Assyria
  alternatives:
  - the king of Assyria
  lexicon: HALOT
  rationale: 'Construct chain identifying Sennacherib''s royal office and realm. Omission
    of the article in English is idiomatic apposition after a proper name: ''Sennacherib
    king of Assyria.'''
- source_word: וַיֵּשֶׁב
  chosen: lived
  alternatives:
  - dwelt
  - stayed
  - settled
  lexicon: HALOT
  rationale: ישׁב can mean sit, dwell, remain, or live. In this context, after his
    return to Nineveh, 'lived' communicates ongoing residence more naturally than
    the archaic 'dwelt,' while 'stayed' may sound temporary.
- source_word: בְּנִינְוֵה
  chosen: in Nineveh
  rationale: Straightforward locative prepositional phrase. 'Nineveh' is the standard
    English transliteration of the city name.
