id: ISA.37.3
reference: Isaiah 37:3
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ אֵלָ֗י/ו כֹּ֚ה אָמַ֣ר חִזְקִיָּ֔הוּ יוֹם צָרָ֧ה וְ/תוֹכֵחָ֛ה
    וּ/נְאָצָ֖ה הַ/יּ֣וֹם הַ/זֶּ֑ה כִּ֣י בָ֤אוּ בָנִים֙ עַד מַשְׁבֵּ֔ר וְ/כֹ֥חַ אַ֖יִן
    לְ/לֵדָֽה־־׃
translation:
  text: 'And they said to him, “Thus says Hezekiah: This day is a day of distress,
    rebuke, and disgrace, for children have come to the point of birth, and there
    is no strength to give birth.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a day of distress, reproof, and contempt.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “children have come to the birthstool/breaking point.” The Hebrew
      is a metaphor of labor reaching delivery with no strength left for birth.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמְרוּ אֵלָיו
  chosen: And they said to him
  alternatives:
  - And they said to him, saying
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol with indirect object; concise English narrative
    rendering preserves the sequence without unnecessary redundancy.
- source_word: כֹּה אָמַר חִזְקִיָּהוּ
  chosen: Thus says Hezekiah
  alternatives:
  - This is what Hezekiah says
  - Thus has Hezekiah said
  lexicon: HALOT
  rationale: Prophetic/messenger formula כֹּה אָמַר is idiomatically rendered 'Thus
    says.' Although the Hebrew verb is formally perfect, the formula functions as
    a present speech-introduction in English.
- source_word: יוֹם צָרָה
  chosen: a day of distress
  alternatives:
  - a day of trouble
  - a day of anguish
  lexicon: HALOT
  rationale: צָרָה denotes trouble/distress/adversity. 'Distress' fits the grave national
    crisis and reads naturally in modern English.
- source_word: וְתוֹכֵחָה
  chosen: rebuke
  alternatives:
  - reproof
  - chastisement
  lexicon: HALOT
  rationale: תוֹכֵחָה commonly denotes rebuke or reproof. 'Rebuke' is direct and accessible
    while preserving the sense of humiliating correction.
- source_word: וּנְאָצָה
  chosen: disgrace
  alternatives:
  - contempt
  - blasphemy
  - scorn
  lexicon: HALOT
  rationale: The noun can denote contempt or scorn, and in some contexts reviling/blasphemy.
    Here, in the triad describing the day's character, 'disgrace' best captures the
    public humiliation and dishonor without over-specifying verbal blasphemy.
- source_word: הַיּוֹם הַזֶּה
  chosen: This day
  alternatives:
  - Today
  - this very day
  lexicon: HALOT
  rationale: Fronted demonstrative phrase is preserved with solemn force as 'This
    day,' matching the formal tone of the report.
- source_word: כִּי בָאוּ בָנִים עַד מַשְׁבֵּר
  chosen: for children have come to the point of birth
  alternatives:
  - for sons have come to the mouth of the womb
  - for children have come to the breaking point
  lexicon: HALOT
  rationale: This is a childbirth metaphor. בָנִים literally 'sons/children' here
    refers to babies at delivery; 'children' avoids wrongly restricting the image
    to male infants. מַשְׁבֵּר in this idiom refers to the point/place of delivery,
    not a generic 'breaking point.'
- source_word: וְכֹחַ אַיִן לְלֵדָה
  chosen: and there is no strength to give birth
  alternatives:
  - and there is no strength for childbirth
  - and there is no power to deliver
  lexicon: HALOT
  rationale: 'The clause completes the childbirth metaphor: labor has reached delivery,
    but strength is lacking. ''To give birth'' is the clearest idiomatic English expression.'
