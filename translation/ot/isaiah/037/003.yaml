theological_decisions:
- issue: Metaphorical childbirth image for national crisis
  chosen_reading: Retain the metaphor explicitly rather than flattening it into a
    generalized statement of helplessness.
  alternative_readings:
  - for the children are ready to be born, but there is no strength
  - we have reached the crisis point and have no strength left
  rationale: The Hebrew uses a vivid birth metaphor to describe Judah's desperate
    condition. Preserving the image maintains the rhetorical force and avoids paraphrastic
    interpretation beyond the text.
  doctrine_reference: Translation philosophy §§1, 6
