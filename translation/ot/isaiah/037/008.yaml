id: ISA.37.8
reference: Isaiah 37:8
source:
  edition: WLC
  text: וַ/יָּ֨שָׁב֙ רַב שָׁקֵ֔ה וַ/יִּמְצָא֙ אֶת מֶ֣לֶךְ אַשּׁ֔וּר נִלְחָ֖ם עַל לִבְנָ֑ה
    כִּ֣י שָׁמַ֔ע כִּ֥י נָסַ֖ע מִ/לָּכִֽישׁ־־־׃
translation:
  text: Then the Rabshakeh returned and found the king of Assyria fighting against
    Libnah, for he had heard that he had departed from Lachish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chief cupbearer.' The Hebrew/Assyrian title Rabshakeh is traditionally
      transliterated here because it functions as a court title and as the designation
      of this official in the narrative.
    reason: lexical_alternative
  - marker: b
    text: Or 'fighting at Libnah.' The Hebrew expression can be rendered more locatively,
      but the sense is that the king of Assyria was engaged in battle against the
      city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - went back
  - turned back
  lexicon: HALOT
  rationale: Wayyiqtol of שוב in narrative sequence; 'returned' is the most natural
    concise English rendering in context.
- source_word: רַב שָׁקֵה
  chosen: the Rabshakeh
  alternatives:
  - the chief cupbearer
  - the Rab-shakeh
  lexicon: HALOT
  rationale: This is an Assyrian title used as a designation for the official already
    introduced in context. Retaining the conventional transliterated title avoids
    over-specifying the office and matches its function as a named figure in the narrative.
- source_word: וַיִּמְצָא אֶת
  chosen: found
  alternatives:
  - came upon
  - met
  lexicon: HALOT
  rationale: מצא with direct-object marker straightforwardly means 'found'; this fits
    the narrative report without embellishment.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  lexicon: HALOT
  rationale: Standard construct rendering; clear and idiomatic in English.
- source_word: נִלְחָם עַל
  chosen: fighting against
  alternatives:
  - waging war against
  - fighting at
  lexicon: HALOT
  rationale: The Niphal participle of לחם with על indicates being engaged in battle
    against a place. 'Fighting against' is natural English and preserves the hostile
    sense better than the more locative 'at.'
- source_word: לִבְנָה
  chosen: Libnah
  lexicon: HALOT
  rationale: Place name; transliterated by standard convention per translation philosophy.
- source_word: כִּי שָׁמַע
  chosen: for he had heard
  alternatives:
  - because he had heard
  - for he heard
  lexicon: HALOT
  rationale: כִּי here gives the reason for the king's location/action. Pluperfect
    English ('had heard') best reflects the prior event relative to the main narrative
    sequence.
- source_word: כִּי נָסַע
  chosen: that he had departed
  alternatives:
  - that he had set out
  - that he had pulled away
  lexicon: HALOT
  rationale: נסע commonly means to pull up camp/set out/depart. In this military context,
    'had departed' is idiomatic and communicates movement away from Lachish without
    adding details not explicit in the Hebrew.
- source_word: מִלָּכִישׁ
  chosen: from Lachish
  lexicon: HALOT
  rationale: Place name with prefixed preposition; straightforwardly rendered.
