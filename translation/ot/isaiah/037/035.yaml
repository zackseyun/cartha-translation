theological_decisions:
- issue: Divine motive for deliverance
  chosen_reading: for my own sake and for the sake of David my servant
  rationale: The verse explicitly grounds Jerusalem's deliverance in God's own concern
    and his covenantal commitment to David. The translation preserves both motives
    without expanding them into later doctrinal explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
