id: ISA.37.35
reference: Isaiah 37:35
source:
  edition: WLC
  text: וְ/גַנּוֹתִ֛י עַל הָ/עִ֥יר הַ/זֹּ֖את לְ/הֽוֹשִׁיעָ֑/הּ לְמַֽעֲנִ֔/י וּ/לְמַ֖עַן
    דָּוִ֥ד עַבְדִּֽ/י־׃ס
translation:
  text: For I will defend this city to save it, for my own sake and for the sake of
    David my servant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'protect' or 'shield' this city.
    reason: lexical_alternative
  - marker: b
    text: '''Save'' may also be rendered ''deliver'' or ''rescue.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַנּוֹתִי
  chosen: I will defend
  alternatives:
  - I will protect
  - I will shield
  lexicon: HALOT
  rationale: From גנן in the sense of covering/protecting. 'Defend' fits the military
    context of Jerusalem under threat while remaining natural English. The prefixed
    conjunction is not separately rendered because English style naturally begins
    the divine declaration here without 'and.'
- source_word: עַל
  chosen: this city
  alternatives:
  - over this city
  - concerning this city
  lexicon: HALOT
  rationale: With גנן, עַל conveys protective action directed toward the city. In
    English, 'defend this city' expresses the sense idiomatically without a separate
    preposition.
- source_word: הָעִיר הַזֹּאת
  chosen: this city
  alternatives:
  - the city הזאת
  - this very city
  lexicon: HALOT
  rationale: Definite noun plus demonstrative is naturally rendered 'this city.' 'This
    very city' would add emphasis not required by the Hebrew.
- source_word: לְהוֹשִׁיעָהּ
  chosen: to save it
  alternatives:
  - to deliver it
  - to rescue it
  lexicon: HALOT
  rationale: From ישׁע, a key salvation/deliverance verb. 'Save' preserves the lexical
    connection and theological weight, while 'it' correctly refers to the feminine
    singular 'city.'
- source_word: לְמַעֲנִי
  chosen: for my own sake
  alternatives:
  - for my sake
  lexicon: HALOT
  rationale: The phrase indicates motive grounded in God's own name/honor. 'My own
    sake' brings out the reflexive emphasis more clearly in modern English.
- source_word: וּלְמַעַן
  chosen: and for the sake of
  alternatives:
  - and on account of
  - and because of
  lexicon: HALOT
  rationale: Maintains parallelism with the previous לְמַעַן phrase and clearly introduces
    the second stated motive.
- source_word: דָּוִד עַבְדִּי
  chosen: David my servant
  alternatives:
  - David my slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in royal-covenantal reference
    to David the established and contextually appropriate sense is 'servant,' emphasizing
    David's role under God rather than bonded status as the salient nuance.
