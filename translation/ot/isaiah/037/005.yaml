id: ISA.37.5
reference: Isaiah 37:5
source:
  edition: WLC
  text: וַ/יָּבֹ֗אוּ עַבְדֵ֛י הַ/מֶּ֥לֶךְ חִזְקִיָּ֖הוּ אֶל יְשַׁעְיָֽהוּ־׃
translation:
  text: So the servants of King Hezekiah came to Isaiah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: So ... came
  alternatives:
  - And ... came
  - Then ... came
  lexicon: HALOT
  rationale: Wayyiqtol of בוא advances the narrative with a simple past. 'Came' is
    the plain sense. 'So' reflects the discourse connection naturally in English;
    'and' or 'then' are possible but less idiomatic here.
- source_word: עַבְדֵי
  chosen: servants
  alternatives:
  - officials
  - servants/slaves
  lexicon: HALOT
  rationale: Construct plural of עבד. In this royal court context it commonly refers
    to the king's servants or attendants/officials. 'Servants' preserves the lexical
    link without over-specifying bureaucratic rank. 'Slaves' is possible lexically,
    but the bonded nature is not foregrounded here.
- source_word: הַמֶּלֶךְ
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: Definite noun in construct with the proper name that follows; in English,
    'King Hezekiah' is the most natural rendering.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Standard English transliteration of the personal name, following the
    translation philosophy to transliterate names.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is clear modern English.
- source_word: יְשַׁעְיָהוּ
  chosen: Isaiah
  rationale: Standard English transliteration of the prophet's name.
