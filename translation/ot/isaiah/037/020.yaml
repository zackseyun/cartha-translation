id: ISA.37.20
reference: Isaiah 37:20
source:
  edition: WLC
  text: וְ/עַתָּה֙ יְהוָ֣ה אֱלֹהֵ֔י/נוּ הוֹשִׁיעֵ֖/נוּ מִ/יָד֑/וֹ וְ/יֵֽדְעוּ֙ כָּל מַמְלְכ֣וֹת הָ/אָ֔רֶץ כִּֽי אַתָּ֥ה יְהוָ֖ה לְ/בַדֶּֽ/ךָ־־׃
translation:
  text: And now, Yahweh our God, save us from his hand, so that all the kingdoms of the earth may know that you alone are Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'deliver us from his hand.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'you are the LORD alone'; the sense is that the LORD alone is God over all the kingdoms of the earth.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Temporal-discourse marker introducing the climactic petition. 'And now' preserves the connective ו plus the adverb עתה and reads naturally in English prayer discourse.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward construct with 1cp suffix. 'Our God' preserves covenantal and communal address.
- source_word: הוֹשִׁיעֵנוּ
  chosen: save us
  alternatives:
  - deliver us
  lexicon: HALOT
  rationale: Hiphil imperative/request from ישׁע. 'Save us' is the most direct and idiomatic rendering in prayer; 'deliver us' is possible but slightly less immediate here.
- source_word: מִיָדוֹ
  chosen: from his hand
  alternatives:
  - out of his hand
  - from his power
  lexicon: HALOT
  rationale: The idiom denotes deliverance from the power/control of the Assyrian king. 'From his hand' preserves the Hebrew image while remaining clear in English.
- source_word: וְיֵדְעוּ
  chosen: so that ... may know
  alternatives:
  - and ... will know
  - that ... may know
  lexicon: HALOT
  rationale: The prefixed verb following the imperative expresses purpose/result in context. Rendering with 'so that ... may know' best captures Hezekiah's stated purpose in the petition.
- source_word: כָּל מַמְלְכוֹת הָאָרֶץ
  chosen: all the kingdoms of the earth
  alternatives:
  - all the kingdoms of the land
  lexicon: HALOT
  rationale: Standard universal expression. Although אֶרֶץ can mean 'land,' the scope here is international, so 'earth' best fits the context.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what the nations are to know. 'That' is the most natural complementizer in English.
- source_word: אַתָּה יְהוָה לְבַדֶּךָ
  chosen: you alone are the LORD
  alternatives:
  - you, O LORD, are alone
  - you are the LORD alone
  lexicon: HALOT
  rationale: לבדך emphasizes exclusivity. 'You alone are the LORD' communicates the monotheistic force clearly and idiomatically. 'The LORD alone' is possible but less natural in English word order.
