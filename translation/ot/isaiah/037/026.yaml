id: ISA.37.26
reference: Isaiah 37:26
source:
  edition: WLC
  text: הֲ/לֽוֹא שָׁמַ֤עְתָּ לְ/מֵֽ/רָחוֹק֙ אוֹתָ֣/הּ עָשִׂ֔יתִי מִ֥/ימֵי קֶ֖דֶם וִ/יצַרְתִּ֑י/הָ
    עַתָּ֣ה הֲבֵאתִ֔י/הָ וּ/תְהִ֗י לְ/הַשְׁא֛וֹת גַּלִּ֥ים נִצִּ֖ים עָרִ֥ים בְּצֻרֽוֹת־׃
translation:
  text: Have you not heard? Long ago I made it; from days of old I formed it. Now
    I have brought it to pass, that you should lay waste fortified cities into heaps
    of ruins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to make desolations, heaps, fortified cities.' The Hebrew near
      'heaps' is difficult; the sense is that fortified cities are reduced to ruin-heaps.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Have you not
  alternatives:
  - Did you not
  - Have you not indeed
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Have
    you not' is natural English and preserves the rebuking force.
- source_word: שָׁמַעְתָּ
  chosen: heard
  alternatives:
  - listened
  - come to hear
  lexicon: HALOT
  rationale: The verb שׁמע commonly means 'hear.' In this rhetorical context it refers
    to receiving prior knowledge, so 'heard' is the most direct rendering.
- source_word: לְמֵרָחוֹק
  chosen: Long ago
  alternatives:
  - from afar
  - from long ago
  lexicon: HALOT
  rationale: Literally 'from afar,' but in temporal usage here it refers to remote
    time rather than spatial distance. 'Long ago' best conveys the idiom in clear
    English.
- source_word: אֹתָהּ
  chosen: it
  alternatives:
  - this
  - that
  lexicon: HALOT
  rationale: Feminine singular object pronoun referring to the plan/event God ordained.
    English requires a neuter pronoun in this abstract reference.
- source_word: עָשִׂיתִי
  chosen: I made
  alternatives:
  - I did
  - I accomplished
  lexicon: HALOT
  rationale: A straightforward rendering of עשה. Here it refers to God's bringing
    about or establishing the matter in view; 'made' preserves the concrete verbal
    force.
- source_word: מִימֵי קֶדֶם
  chosen: from days of old
  alternatives:
  - from ancient days
  - from days of antiquity
  lexicon: HALOT
  rationale: A standard Hebrew temporal expression for antiquity. 'From days of old'
    is idiomatic and retains the elevated prophetic tone.
- source_word: וִיצַרְתִּיהָ
  chosen: I formed it
  alternatives:
  - I fashioned it
  - I planned it
  lexicon: HALOT
  rationale: יצר often denotes forming or shaping, sometimes with intentional design.
    'Formed' preserves both the crafting imagery and divine intentionality.
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - But now
  - at this time
  lexicon: HALOT
  rationale: Marks the transition from ancient decree to present execution. 'Now'
    is sufficient and natural.
- source_word: הֲבֵאתִיהָ
  chosen: I have brought it to pass
  alternatives:
  - I have brought it
  - I have caused it to happen
  lexicon: HALOT
  rationale: 'The hiphil of בוא here is causative in effect: God has brought the previously
    formed plan into historical realization. ''Brought it to pass'' communicates that
    sense clearly.'
- source_word: וּתְהִי
  chosen: that you should
  alternatives:
  - and it came to be that you would
  - and you became
  lexicon: HALOT
  rationale: 'The clause is difficult, but in context it introduces the result of
    God''s action in relation to the addressed king: the outcome is that he devastates
    cities. Rendering the sense as result/purpose yields clear English.'
- source_word: לְהַשְׁאוֹת
  chosen: lay waste
  alternatives:
  - devastate
  - make desolate
  lexicon: HALOT
  rationale: From שׁאה, conveying desolation or ruin. 'Lay waste' is vivid, idiomatic,
    and fits military devastation.
- source_word: גַּלִּים
  chosen: heaps of ruins
  alternatives:
  - heaps
  - mounds
  lexicon: HALOT
  rationale: The noun denotes heaps, here specifically rubble-heaps resulting from
    destruction. 'Heaps of ruins' makes the image explicit in English.
- source_word: נִצִּים
  chosen: into
  alternatives:
  - standing
  - guarded
  lexicon: HALOT
  rationale: This form is textually and lexically difficult. In context with 'fortified
    cities' and 'heaps,' the phrase describes the reduction of cities to ruin-heaps.
    English smooths the construction with 'into' to express the resultant state. The
    more literal difficulty is preserved in a footnote.
- source_word: עָרִים בְּצֻרוֹת
  chosen: fortified cities
  alternatives:
  - walled cities
  - defended cities
  lexicon: HALOT
  rationale: A common phrase for strongly defended urban centers. 'Fortified cities'
    is the standard and clearest rendering.
