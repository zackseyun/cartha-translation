id: ISA.37.10
reference: Isaiah 37:10
source:
  edition: WLC
  text: כֹּ֣ה תֹאמְר֗וּ/ן אֶל חִזְקִיָּ֤הוּ מֶֽלֶךְ יְהוּדָה֙ לֵ/אמֹ֔ר אַל יַשִּֽׁאֲ/ךָ֣
    אֱלֹהֶ֔י/ךָ אֲשֶׁ֥ר אַתָּ֛ה בּוֹטֵ֥חַ בּ֖/וֹ לֵ/אמֹ֑ר לֹ֤א תִנָּתֵן֙ יְר֣וּשָׁלִַ֔ם
    בְּ/יַ֖ד מֶ֥לֶךְ אַשּֽׁוּר־־־׃
translation:
  text: 'Thus you shall say to Hezekiah king of Judah: ‘Do not let your God, in whom
    you trust, deceive you by saying, “Jerusalem will not be given into the hand of
    the king of Assyria.”’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “mislead you.” The Hebrew verb can mean “deceive” or “lead astray.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “into the hand of,” an idiom meaning “into the power of.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - So
  - This is what
  lexicon: HALOT
  rationale: Introduces the quoted message with a deictic adverb. 'Thus' is concise
    and natural in prophetic/messenger formulae.
- source_word: תֹאמְרוּן
  chosen: you shall say
  alternatives:
  - you will say
  - say
  lexicon: HALOT
  rationale: Imperfect 2mp with directive force in reported speech. 'You shall say'
    preserves the formal messenger instruction.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Standard preposition of indirect address.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Standard English transliteration of the personal name.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - the king of Judah
  lexicon: HALOT
  rationale: Appositional royal title identifying Hezekiah. Article omitted in English
    for natural style after a proper name.
- source_word: לֵאמֹר
  chosen: ‘
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Rendered by direct quotation punctuation rather than an explicit 'saying'
    for readable modern English; the speech-introducing force is preserved.
- source_word: אַל
  chosen: Do not
  alternatives:
  - Let not
  lexicon: HALOT
  rationale: Standard negative jussive/prohibitive rendering in contemporary English.
- source_word: יַשִּׁאֲךָ
  chosen: let ... deceive you
  alternatives:
  - mislead you
  - beguile you
  lexicon: HALOT
  rationale: From נשׁא in the Hiphil, 'deceive/mislead.' 'Deceive you' best fits the
    taunting accusation that Hezekiah's God is giving false assurance.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Second masculine singular suffix retained; the Assyrian message addresses
    Hezekiah personally.
- source_word: אֲשֶׁר אַתָּה בּוֹטֵחַ בּוֹ
  chosen: in whom you trust
  alternatives:
  - whom you trust in
  - on whom you rely
  lexicon: HALOT
  rationale: Relative clause describing God. 'Trust' is the most direct rendering
    of בטח; 'in whom' is idiomatic English.
- source_word: לֵאמֹר
  chosen: by saying
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Here the infinitive introduces the content by which the deception supposedly
    occurs; 'by saying' makes the syntactic relation clear in English.
- source_word: לֹא תִנָּתֵן
  chosen: will not be given
  alternatives:
  - shall not be given
  - will not be delivered
  lexicon: HALOT
  rationale: Niphal of נתן, passive 'be given.' This preserves the formal sense without
    overinterpreting as 'captured,' though that is the implied result.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard English form of the place name.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - to the hand of
  lexicon: HALOT
  rationale: A common Hebrew idiom for being delivered into someone's power. The more
    literal 'into the hand of' is retained in the main text to preserve the idiom's
    texture.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - Assyria's king
  lexicon: HALOT
  rationale: Standard historical-political designation in English.
