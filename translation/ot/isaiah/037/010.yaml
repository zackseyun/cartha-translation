theological_decisions:
- issue: Representation of the Assyrian taunt against Israel's God
  chosen_reading: Do not let your God ... deceive you
  alternative_readings:
  - Do not let your God ... mislead you
  rationale: The verse reports hostile speech from the Assyrian side and should be
    translated as such without softening the accusation or implying its truth. 'Deceive'
    preserves the blasphemous force of the taunt while leaving the narrative context
    to refute it.
