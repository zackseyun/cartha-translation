theological_decisions:
- issue: Rendering of חרם language in a military judgment context
  chosen_reading: devoting them to destruction
  alternative_readings:
  - utterly destroying them
  - putting them under the ban
  rationale: The Hebrew evokes more than ordinary destruction; it reflects the concept
    of consigning something to total destruction. The chosen wording preserves that
    weight without importing later technical jargon into the main text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Clause-final תִּנָּצֵל as rhetorical question
  chosen_reading: will you be delivered?
  alternative_readings:
  - you will be delivered
  - will you escape?
  rationale: In context, the Assyrian king is mocking Hezekiah's hope of rescue. English
    punctuation as a rhetorical question best conveys the discourse force, though
    Hebrew does not mark questions with punctuation.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
