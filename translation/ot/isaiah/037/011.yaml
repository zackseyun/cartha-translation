id: ISA.37.11
reference: Isaiah 37:11
source:
  edition: WLC
  text: הִנֵּ֣ה אַתָּ֣ה שָׁמַ֗עְתָּ אֲשֶׁ֨ר עָשׂ֜וּ מַלְכֵ֥י אַשּׁ֛וּר לְ/כָל הָ/אֲרָצ֖וֹת
    לְ/הַחֲרִימָ֑/ם וְ/אַתָּ֖ה תִּנָּצֵֽל׀־׃
translation:
  text: Look, you have heard what the kings of Assyria have done to all the lands,
    devoting them to destruction—and will you be delivered?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'utterly destroying them' or 'putting them under the ban.' The Hebrew
      verb carries the idea of consigning something to total destruction.
    reason: lexical_alternative
  - marker: b
    text: Or 'and will you escape?' The line is a taunt and is best understood as
      a rhetorical question.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces emphatic attention-getting. 'Look' is natural modern English
    while preserving the deictic force better than leaving it untranslated.
- source_word: שָׁמַעְתָּ
  chosen: you have heard
  alternatives:
  - you heard
  - you have listened
  lexicon: HALOT
  rationale: Perfect verb addressed to second masculine singular; English present
    perfect fits the rhetorical appeal to information already known.
- source_word: אֲשֶׁר עָשׂוּ
  chosen: what ... have done
  alternatives:
  - that ... did
  - what ... did
  lexicon: HALOT
  rationale: Idiomatic rendering of relative particle plus verb, introducing the content
    of what Hezekiah has heard.
- source_word: מַלְכֵי אַשּׁוּר
  chosen: the kings of Assyria
  alternatives:
  - Assyria's kings
  lexicon: HALOT
  rationale: Standard construct rendering; clear and natural in English.
- source_word: לְכָל הָאֲרָצוֹת
  chosen: to all the lands
  alternatives:
  - to all the countries
  - to all the earths/lands
  lexicon: HALOT
  rationale: אֲרָצוֹת here refers to various lands/nations conquered by Assyria, not
    the whole earth. 'Lands' preserves the plural and geopolitical sense.
- source_word: לְהַחֲרִימָם
  chosen: devoting them to destruction
  alternatives:
  - utterly destroying them
  - putting them under the ban
  lexicon: HALOT
  rationale: Hiphil infinitive of חרם with 3mp suffix. The term carries the sense
    of consigning to total destruction. 'Devoting them to destruction' preserves the
    lexical and theological weight better than the flatter 'destroying them,' while
    remaining readable.
- source_word: וְאַתָּה תִּנָּצֵל
  chosen: and will you be delivered?
  alternatives:
  - and you will be rescued?
  - and shall you escape?
  lexicon: HALOT
  rationale: 'The conjunction plus independent pronoun creates rhetorical contrast:
    ''and you...?'' The Niphal of נצל here is best rendered as passive ''be delivered''
    in a taunting rhetorical question. This captures the force more naturally than
    a flat future statement.'
