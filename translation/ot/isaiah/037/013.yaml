id: ISA.37.13
reference: Isaiah 37:13
source:
  edition: WLC
  text: אַיֵּ֤ה מֶֽלֶךְ חֲמָת֙ וּ/מֶ֣לֶךְ אַרְפָּ֔ד וּ/מֶ֖לֶךְ לָעִ֣יר סְפַרְוָ֑יִם
    הֵנַ֖ע וְ/עִוָּֽה־׃
translation:
  text: Where is the king of Hamath, and the king of Arpad, and the king of the city
    of Sepharvaim, Hena, and Ivvah?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hena may also be rendered 'Henah.'
    reason: lexical_alternative
  - marker: b
    text: Ivvah may also be rendered 'Avva' in some translations.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיֵּה
  chosen: Where is
  alternatives:
  - Where are
  lexicon: HALOT
  rationale: Interrogative adverb meaning 'where?'. Singular English 'Where is' fits
    the immediately following singular noun 'the king,' even though the question ranges
    over multiple kings/cities.
- source_word: מֶלֶךְ
  chosen: king
  alternatives:
  - ruler
  lexicon: HALOT
  rationale: Standard rendering for מלך. Repeated three times in Hebrew, so retained
    three times in English for rhetorical force and formal correspondence.
- source_word: חֲמָת
  chosen: Hamath
  rationale: Proper place name; transliterated per translation philosophy.
- source_word: אַרְפָּד
  chosen: Arpad
  rationale: Proper place name; transliterated.
- source_word: לָעִיר
  chosen: of the city of
  alternatives:
  - of city
  - for the city of
  lexicon: HALOT
  rationale: The prefixed ל on עִיר here is best taken as part of the construct-like
    expression 'the city of Sepharvaim' in this taunt formula, not as a separate dative
    sense. English supplies 'of the city of' for natural syntax while preserving the
    Hebrew relation.
- source_word: סְפַרְוָיִם
  chosen: Sepharvaim
  rationale: Proper place name; transliterated by standard convention.
- source_word: הֵנַע
  chosen: Hena
  alternatives:
  - Henah
  rationale: Proper place name. 'Hena' reflects a straightforward transliteration
    of the consonants; 'Henah' is a common English variant worth preserving in a footnote.
- source_word: עִוָּה
  chosen: Ivvah
  alternatives:
  - Avva
  rationale: Proper place name. The Hebrew points to a form commonly rendered 'Ivvah';
    'Avva' appears in some English traditions and likely reflects a variant transliteration/related
    form, so it is preserved in a footnote.
