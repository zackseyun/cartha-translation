id: ISA.37.7
reference: Isaiah 37:7
source:
  edition: WLC
  text: הִנְ/נִ֨י נוֹתֵ֥ן בּ/וֹ֙ ר֔וּחַ וְ/שָׁמַ֥ע שְׁמוּעָ֖ה וְ/שָׁ֣ב אֶל אַרְצ֑/וֹ
    וְ/הִפַּלְתִּ֥י/ו בַּ/חֶ֖רֶב בְּ/אַרְצֽ/וֹ־׃
translation:
  text: Behold, I am putting a spirit in him, so that he will hear a report and return
    to his own land, and I will cause him to fall by the sword in his own land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a report,' 'news,' or 'a rumor.' The Hebrew שְׁמוּעָה can denote information
      received without specifying whether it is confirmed.
    reason: lexical_alternative
  - marker: b
    text: Or 'I am giving him a spirit.' The Hebrew רוּחַ may refer to an inward impulse,
      disposition, or spirit.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the deictic, attention-getting force of the Hebrew particle plus
    pronoun. 'Behold' is slightly elevated but still transparent and fitting for prophetic
    speech.
- source_word: נוֹתֵן
  chosen: I am putting
  alternatives:
  - I am giving
  - I will put
  lexicon: HALOT
  rationale: The participle after הִנְנִי often conveys imminent action. 'I am putting'
    preserves the verbal aspect and avoids flattening it to a simple future, while
    still reading naturally in English.
- source_word: בּוֹ
  chosen: in him
  alternatives:
  - upon him
  lexicon: HALOT
  rationale: The preposition ב commonly means 'in.' Here it naturally expresses an
    internal influence or disposition placed within Sennacherib.
- source_word: רוּחַ
  chosen: a spirit
  alternatives:
  - a רוח as disposition/impulse
  - a wind
  lexicon: HALOT
  rationale: In this context רוּחַ most plausibly denotes an inner impulse, disposition,
    or spirit influencing the king's response. 'A spirit' preserves the Hebrew term's
    breadth without over-interpreting it as merely psychological or as a specific
    named spirit.
- source_word: וְשָׁמַע
  chosen: so that he will hear
  alternatives:
  - and he will hear
  lexicon: HALOT
  rationale: The waw-consecutive sequence following the divine action expresses resulting
    events. 'So that he will hear' makes the consequential flow clear in idiomatic
    English while staying close to the Hebrew sequence.
- source_word: שְׁמוּעָה
  chosen: a report
  alternatives:
  - news
  - a rumor
  lexicon: HALOT
  rationale: The noun can mean report, news, or rumor. 'Report' is broad and neutral,
    fitting the context without prematurely specifying whether the message is verified
    or merely rumored.
- source_word: וְשָׁב
  chosen: and return
  alternatives:
  - and turn back
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return.' In context it refers to going back to
    his land, so 'return' is the most natural English rendering.
- source_word: אֶל אַרְצוֹ
  chosen: to his own land
  alternatives:
  - to his land
  - to his country
  lexicon: HALOT
  rationale: '''His own land'' brings out the possessive suffix clearly and reads
    naturally in English.'
- source_word: וְהִפַּלְתִּיו
  chosen: I will cause him to fall
  alternatives:
  - I will make him fall
  - I will bring him down
  lexicon: HALOT
  rationale: The Hiphil of נפל is causative. 'Cause him to fall' preserves that causative
    force more explicitly than the idiomatic but less transparent 'bring him down.'
- source_word: בַּחֶרֶב
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for death by violent killing. 'By the
    sword' is the conventional and clear English equivalent.
- source_word: בְּאַרְצוֹ
  chosen: in his own land
  alternatives:
  - in his land
  lexicon: HALOT
  rationale: Repeating 'his own land' mirrors the Hebrew emphasis that his end will
    occur back in the land to which he returns.
