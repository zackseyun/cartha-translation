theological_decisions:
- issue: Meaning of רוּחַ in the divine promise concerning the Assyrian king
  chosen_reading: a spirit/inward impulse placed in him by God
  alternative_readings:
  - a wind
  - a mere mood or courage/fear without spiritual nuance
  rationale: The immediate context concerns God sovereignly directing the king's response
    to a report so that he returns home. Rendering רוּחַ as 'a spirit' preserves the
    Hebrew wording and the theological claim of divine agency without specifying more
    than the text states about the mechanism.
  doctrine_reference: Preserve theological tension rather than resolve it.
