id: ISA.37.33
reference: Isaiah 37:33
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּֽה אָמַ֤ר יְהוָה֙ אֶל מֶ֣לֶךְ אַשּׁ֔וּר לֹ֤א יָבוֹא֙ אֶל הָ/עִ֣יר הַ/זֹּ֔את וְ/לֹֽא יוֹרֶ֥ה שָׁ֖ם חֵ֑ץ וְ/לֹֽא יְקַדְּמֶ֣/נָּה מָגֵ֔ן וְ/לֹֽא יִשְׁפֹּ֥ךְ עֳלֶ֖י/הָ סֹלְלָֽה־־־־־־׃
translation:
  text: 'Therefore thus says Yahweh concerning the king of Assyria: He will not come into this city, or shoot an arrow there, or come before it with a shield, or heap up a siege ramp against it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'advance against it with a shield.' The Hebrew expression pictures assault preparations in siege warfare.
    reason: lexical_alternative
  - marker: b
    text: Or 'build up an embankment against it.' The Hebrew literally says 'pour out a siege mound/ramp against it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks the inferential connection to the preceding divine promise/judgment; 'Therefore' preserves the formal logical force.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; concise and natural in English while remaining close to the Hebrew.
- source_word: אֶל מֶלֶךְ אַשּׁוּר
  chosen: concerning the king of Assyria
  alternatives:
  - to the king of Assyria
  - against the king of Assyria
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' after 'thus says the LORD' in prophetic speech it can introduce the subject matter of the oracle. 'Concerning' fits the English idiom and the content of the announcement.
- source_word: לֹא יָבוֹא אֶל הָעִיר הַזֹּאת
  chosen: He will not come into this city
  alternatives:
  - He will not enter this city
  - He shall not come to this city
  lexicon: HALOT
  rationale: Refers to the king of Assyria as representative of the invading power. 'Come into' is natural English and preserves the movement toward/into the city.
- source_word: יוֹרֶה שָׁם חֵץ
  chosen: shoot an arrow there
  alternatives:
  - cast an arrow there
  - fire an arrow there
  lexicon: HALOT
  rationale: The Hiphil of ירה with חֵץ means to shoot an arrow. 'There' preserves שָׁם, referring to the city.
- source_word: יְקַדְּמֶנָּה מָגֵן
  chosen: confront it with a shield
  alternatives:
  - come before it with a shield
  - advance against it with a shield
  lexicon: HALOT
  rationale: קדם in the Piel can mean to meet, confront, or come before. In this siege context, the sense is approaching the city in assault formation with shield protection. 'Confront it with a shield' is compact and preserves the military image without over-specifying.
- source_word: יִשְׁפֹּךְ עֳלֶיהָ סֹלְלָה
  chosen: heap up a siege ramp against it
  alternatives:
  - pour out a siege mound against it
  - build up an embankment against it
  lexicon: HALOT
  rationale: שׁפך literally means 'pour out,' but with סֹלְלָה in siege contexts it refers idiomatically to piling up an assault ramp/earthwork. 'Siege ramp' is clear modern English and more precise than the less familiar 'mound' or 'bank'.
