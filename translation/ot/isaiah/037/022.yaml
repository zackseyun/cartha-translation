id: ISA.37.22
reference: Isaiah 37:22
source:
  edition: WLC
  text: זֶ֣ה הַ/דָּבָ֔ר אֲשֶׁר דִּבֶּ֥ר יְהוָ֖ה עָלָ֑י/ו בָּזָ֨ה לְ/ךָ֜ לָעֲגָ֣ה לְ/ךָ֗ בְּתוּלַת֙ בַּת צִיּ֔וֹן אַחֲרֶ֨י/ךָ֙ רֹ֣אשׁ הֵנִ֔יעָה בַּ֖ת יְרוּשָׁלִָֽם־־׃
translation:
  text: 'This is the word that Yahweh has spoken concerning him: ‘The virgin daughter of Zion despises you and mocks you; the daughter of Jerusalem shakes her head behind you.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against him' for 'concerning him'; the Hebrew preposition can carry either sense in prophetic speech.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Virgin Daughter Zion,' a poetic personification of Zion/Jerusalem.
    reason: cultural_note
lexical_decisions:
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the message
  - the matter
  lexicon: HALOT
  rationale: דָּבָר commonly means 'word, matter, message.' In prophetic formulae, 'the word' is the most natural and sufficiently formal rendering, preserving the idiom 'this is the word that the LORD has spoken.'
- source_word: דִּבֶּר יְהוָה
  chosen: the LORD has spoken
  alternatives:
  - the LORD spoke
  - the LORD said
  lexicon: HALOT
  rationale: The perfect verb in prophetic reporting is well rendered by English present perfect here ('has spoken'), which fits the introduction to the oracle. יְהוָה is rendered 'the LORD' per doctrine guidelines.
- source_word: עָלָיו
  chosen: concerning him
  alternatives:
  - against him
  - about him
  lexicon: HALOT
  rationale: The preposition עַל with דבר in prophetic contexts can mean 'concerning' or 'against.' Because the following speech is hostile to the Assyrian king, 'against him' is possible, but 'concerning him' is broader and more directly reflects the preposition without over-specifying the nuance.
- source_word: בָּזָה לְךָ
  chosen: despises you
  alternatives:
  - scorns you
  - has despised you
  lexicon: HALOT
  rationale: בזה denotes treating with contempt or scorn. 'Despises you' gives clear modern English and matches the feminine singular subject that follows.
- source_word: לָעֲגָה לְךָ
  chosen: mocks you
  alternatives:
  - derides you
  - scoffs at you
  lexicon: HALOT
  rationale: לעג conveys mocking or derision. 'Mocks you' is readable modern English and pairs naturally with 'despises you' without becoming archaic.
- source_word: בְּתוּלַת בַּת צִיּוֹן
  chosen: Virgin Daughter Zion
  alternatives:
  - the virgin daughter of Zion
  - Maiden Daughter Zion
  lexicon: HALOT
  rationale: This is a personified city formula. 'Virgin Daughter Zion' preserves both nouns and the metaphorical epithet in a compact, recognizable English form. Capitalization signals personification. 'Virgin' is retained rather than softened, since the source term is explicit.
- source_word: אַחֲרֶיךָ
  chosen: behind you
  alternatives:
  - after you
  - at your back
  lexicon: HALOT
  rationale: The spatial sense 'behind you' fits the image of the defeated enemy departing while Jerusalem gestures after him.
- source_word: רֹאשׁ הֵנִיעָה
  chosen: shakes her head
  alternatives:
  - has shaken her head
  - nods her head
  lexicon: HALOT
  rationale: The idiom denotes a gesture of scorn or derision. 'Shakes her head' is the standard English equivalent and best conveys the contemptuous action.
- source_word: בַּת יְרוּשָׁלִָם
  chosen: Daughter Jerusalem
  alternatives:
  - the daughter of Jerusalem
  lexicon: HALOT
  rationale: Like 'Daughter Zion,' this is a personified city title. The appositional form 'Daughter Jerusalem' preserves the Hebrew poetic style and parallelism.
