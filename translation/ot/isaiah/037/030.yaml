id: ISA.37.30
reference: Isaiah 37:30
source:
  edition: WLC
  text: וְ/זֶה לְּ/ךָ֣ הָ/א֔וֹת אָכ֤וֹל הַ/שָּׁנָה֙ סָפִ֔יחַ וּ/בַ/שָּׁנָ֥ה הַ/שֵּׁנִ֖ית
    שָׁחִ֑יס וּ/בַ/שָּׁנָ֣ה הַ/שְּׁלִישִׁ֗ית זִרְע֧וּ וְ/קִצְר֛וּ וְ/נִטְע֥וּ כְרָמִ֖ים
    ו/אכול פִרְיָֽ/ם־׃
translation:
  text: 'And this will be the sign for you: this year eat what grows by itself, and
    in the second year what springs from that; but in the third year sow and reap,
    and plant vineyards and eat their fruit.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in the second year, second growth' or 'aftergrowth.' The Hebrew term
      is rare and refers to produce arising without normal sowing.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאוֹת
  chosen: the sign
  alternatives:
  - a sign
  lexicon: HALOT
  rationale: Definite article in Hebrew supports 'the sign.' In context this is the
    confirming sign given to Hezekiah.
- source_word: אָכוֹל
  chosen: eat
  alternatives:
  - you shall eat
  lexicon: HALOT
  rationale: Infinitive absolute used imperativally/predictively in context; English
    idiom is best conveyed with 'eat.' The sense is instruction/prediction about what
    may be consumed.
- source_word: סָפִיחַ
  chosen: what grows by itself
  alternatives:
  - volunteer growth
  - aftergrowth
  lexicon: HALOT
  rationale: Refers to produce that comes up of itself without sowing. 'What grows
    by itself' is clear modern English and preserves the agricultural sense.
- source_word: שָׁחִיס
  chosen: what springs from that
  alternatives:
  - second growth
  - aftergrowth
  lexicon: HALOT
  rationale: A rare agricultural term, likely denoting the spontaneous growth arising
    in the second year from the previous crop. 'What springs from that' communicates
    dependence on the earlier volunteer growth without overtechnical wording.
- source_word: זִרְעוּ
  chosen: sow
  alternatives:
  - you shall sow
  lexicon: HALOT
  rationale: Second person masculine plural verb addressed to the people collectively.
    English imperative-like sequence fits the Hebrew rhythm and the practical instruction.
- source_word: וְקִצְרוּ
  chosen: reap
  alternatives:
  - harvest
  lexicon: HALOT
  rationale: Basic agricultural verb 'reap' matches the sow/reap pair and keeps the
    formal parallelism.
- source_word: וְנִטְעוּ כְרָמִים
  chosen: plant vineyards
  alternatives:
  - plant vine-gardens
  lexicon: HALOT
  rationale: Standard rendering for the idiom; natural and accurate English.
- source_word: וְאִכְלוּ פִרְיָם
  chosen: eat their fruit
  alternatives:
  - eat the fruit of them
  lexicon: HALOT
  rationale: Straightforward rendering of the clause, with plural suffix referring
    to the vineyards.
- source_word: וְזֶה לְךָ
  chosen: And this will be for you
  alternatives:
  - And this is for you
  - And this shall be for you
  lexicon: HALOT
  rationale: The verbless Hebrew clause is naturally rendered with an implied future/copular
    sense in English because it introduces a forthcoming confirming sign.
