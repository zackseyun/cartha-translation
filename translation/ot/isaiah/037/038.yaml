id: ISA.37.38
reference: Isaiah 37:38
source:
  edition: WLC
  text: וַ/יְהִי֩ ה֨וּא מִֽשְׁתַּחֲוֶ֜ה בֵּ֣ית נִסְרֹ֣ךְ אֱלֹהָ֗י/ו וְֽ/אַדְרַמֶּ֨לֶךְ
    וְ/שַׂרְאֶ֤צֶר בָּנָי/ו֙ הִכֻּ֣/הוּ בַ/חֶ֔רֶב וְ/הֵ֥מָּה נִמְלְט֖וּ אֶ֣רֶץ אֲרָרָ֑ט
    וַ/יִּמְלֹ֛ךְ אֵֽסַר חַדֹּ֥ן בְּנ֖/וֹ תַּחְתָּֽי/ו׀־׃ס
translation:
  text: And it happened that, as he was worshiping in the house of Nisroch his god,
    Adrammelech and Sharezer his sons struck him down with the sword, and they escaped
    to the land of Ararat. And Esar-haddon his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was bowing down' or 'was prostrating himself'; the Hebrew verb can emphasize
      the bodily act of worship.
    reason: lexical_alternative
  - marker: b
    text: Or 'the temple of Nisroch his god'; Hebrew literally, 'the house of Nisroch
      his god.'
    reason: lexical_alternative
  - marker: c
    text: Esar-haddon is more commonly spelled 'Esarhaddon' in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened that
  alternatives:
  - Now it happened that
  - And it came to pass that
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event. 'And it happened
    that' preserves the Hebrew discourse function without archaic 'came to pass.'
- source_word: מִשְׁתַּחֲוֶה
  chosen: was worshiping
  alternatives:
  - was bowing down
  - was prostrating himself
  lexicon: HALOT
  rationale: The hitpael of שׁחה commonly denotes prostration in worship. In this
    cultic setting with 'his god,' 'was worshiping' best conveys the act's religious
    sense in natural English.
- source_word: בֵּית
  chosen: the house of
  alternatives:
  - the temple of
  lexicon: HALOT
  rationale: Hebrew literally says 'house of.' While it refers to a temple/shrine,
    'house of' is retained to stay close to the source and because it is idiomatic
    enough in this context.
- source_word: נִסְרֹךְ אֱלֹהָיו
  chosen: Nisroch his god
  alternatives:
  - Nisroch, his god
  - the house of Nisroch, his god
  lexicon: HALOT
  rationale: נִסְרֹךְ is a proper name; אֱלֹהָיו identifies Nisroch as Sennacherib's
    deity. The appositional phrase is rendered straightforwardly.
- source_word: אַדְרַמֶּלֶךְ
  chosen: Adrammelech
  lexicon: HALOT
  rationale: Proper name transliterated per translation philosophy.
- source_word: שַׂרְאֶצֶר
  chosen: Sharezer
  alternatives:
  - Sar-ezer
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically means 'his sons'; gender-accurate rendering is
    required by the translation philosophy.
- source_word: הִכֻּהוּ
  chosen: struck him down
  alternatives:
  - killed him
  - smote him
  lexicon: HALOT
  rationale: The verb נכה means 'strike, smite.' Because the following phrase 'with
    the sword' specifies the lethal means, 'struck him down' preserves the verbal
    sense without overloading the verb itself; the context still clearly implies assassination.
- source_word: בַּחֶרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: Instrumental beth is naturally rendered 'with.' Singular 'sword' is idiomatic
    collective/instrumental English.
- source_word: נִמְלְטוּ
  chosen: escaped
  alternatives:
  - fled
  - were delivered
  lexicon: HALOT
  rationale: The nifal of מלט here denotes successful escape after the assassination.
    'Escaped' is the clearest contextual rendering.
- source_word: אֶרֶץ אֲרָרָט
  chosen: the land of Ararat
  alternatives:
  - the country of Ararat
  lexicon: HALOT
  rationale: אֶרֶץ plus place name is well rendered 'the land of.' 'Ararat' is the
    conventional transliteration of the region name.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: The wayyiqtol of מלך narrates succession. 'Reigned' is concise and idiomatic;
    the succession is clarified by the following phrase.
- source_word: אֵסַר חַדֹּן
  chosen: Esar-haddon
  alternatives:
  - Esarhaddon
  lexicon: HALOT
  rationale: Proper name transliterated. Hyphenation helps readability and reflects
    the two-part Hebrew form, though the unhyphenated English form is also common.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - after him
  - instead of him
  lexicon: HALOT
  rationale: The idiom indicates royal succession. 'In his place' is the most natural
    English equivalent in this context.
