id: ISA.37.9
reference: Isaiah 37:9
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֗ע עַל תִּרְהָ֤קָה מֶֽלֶךְ כּוּשׁ֙ לֵ/אמֹ֔ר יָצָ֖א לְ/הִלָּחֵ֣ם
    אִתָּ֑/ךְ וַ/יִּשְׁמַע֙ וַ/יִּשְׁלַ֣ח מַלְאָכִ֔ים אֶל חִזְקִיָּ֖הוּ לֵ/אמֹֽר־־־׃
translation:
  text: He heard concerning Tirhakah king of Cush, saying, “He has come out to fight
    against you.” And when he heard, he sent messengers to Hezekiah, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'king of Ethiopia.' The Hebrew name is Cush, which may overlap geographically
      with regions south of Egypt often associated with ancient Nubia/Ethiopia.
    reason: lexical_alternative
  - marker: b
    text: Literally 'with you'; in this military context, 'against you' conveys the
      intended adversarial sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: He heard
  alternatives:
  - he learned
  - he was told
  lexicon: HALOT
  rationale: The verb שׁמע in the qal commonly means 'hear,' and in narrative can
    extend to receiving news. 'He heard' preserves the Hebrew wording while remaining
    natural enough in English.
- source_word: עַל
  chosen: concerning
  alternatives:
  - about
  - regarding
  lexicon: HALOT
  rationale: With שׁמע, עַל introduces the matter heard about. 'Concerning' is slightly
    more formal but fits the narrative register and keeps the relation explicit.
- source_word: תִּרְהָקָה
  chosen: Tirhakah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: מֶלֶךְ כּוּשׁ
  chosen: king of Cush
  alternatives:
  - king of Ethiopia
  lexicon: HALOT
  rationale: כּוּשׁ is best rendered 'Cush,' a geographic ethnonym, rather than the
    interpretive modernization 'Ethiopia.' This follows original-language primacy
    and avoids importing later political geography.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - that
  lexicon: HALOT
  rationale: The infinitive introduces reported speech. 'Saying' preserves the Hebrew
    discourse structure more transparently than flattening it to 'that.'
- source_word: יָצָא
  chosen: He has come out
  alternatives:
  - he has gone out
  - he has set out
  lexicon: HALOT
  rationale: יצא literally means 'go/come out.' In context of military movement, 'has
    come out' is idiomatic from the reporter's perspective and fits the imminent threat.
- source_word: לְהִלָּחֵם
  chosen: to fight
  alternatives:
  - to wage war
  - to battle
  lexicon: HALOT
  rationale: The niphal infinitive of לחם in military context means 'to fight.' This
    is the clearest modern English equivalent.
- source_word: אִתָּךְ
  chosen: against you
  alternatives:
  - with you
  lexicon: HALOT
  rationale: Although the preposition can be rendered 'with,' in combat contexts English
    requires 'against you' to convey adversarial force. The 2fs suffix reflects the
    addressee in the report, likely the city/personified target, but English does
    not need to mark gender here.
- source_word: וַיִּשְׁמַע
  chosen: when he heard
  alternatives:
  - and he heard
  lexicon: HALOT
  rationale: The repeated verb is awkward if rendered identically in English. 'When
    he heard' captures the temporal/sequential force in context and improves readability
    without departing from the narrative sense.
- source_word: וַיִּשְׁלַח
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: HALOT
  rationale: Standard narrative rendering of שלח. 'Sent' is simple and accurate.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  - angels
  lexicon: HALOT
  rationale: In royal-political narrative, מלאכים refers to human emissaries, not
    heavenly beings. 'Messengers' is the broad, accurate choice.
- source_word: אֶל חִזְקִיָּהוּ
  chosen: to Hezekiah
  alternatives:
  - to Hizkiah
  rationale: Standard English transliteration is 'Hezekiah.' The preposition is naturally
    rendered 'to.'
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'with this message:'
  lexicon: HALOT
  rationale: Retaining 'saying' preserves the open-ended introduction to the speech
    that continues in the next verse.
