id: ISA.37.4
reference: Isaiah 37:4
source:
  edition: WLC
  text: אוּלַ֡י יִשְׁמַע֩ יְהוָ֨ה אֱלֹהֶ֜י/ךָ אֵ֣ת דִּבְרֵ֣י רַב שָׁקֵ֗ה אֲשֶׁר֩ שְׁלָח֨/וֹ
    מֶֽלֶךְ אַשּׁ֤וּר אֲדֹנָי/ו֙ לְ/חָרֵף֙ אֱלֹהִ֣ים חַ֔י וְ/הוֹכִ֨יחַ֙ בַּ/דְּבָרִ֔ים
    אֲשֶׁ֥ר שָׁמַ֖ע יְהוָ֣ה אֱלֹהֶ֑י/ךָ וְ/נָשָׂ֣אתָ תְפִלָּ֔ה בְּעַ֥ד הַ/שְּׁאֵרִ֖ית
    הַ/נִּמְצָאָֽה׀־־׀׃
translation:
  text: Perhaps the LORD your God will hear the words of the Rabshakeh, whom the king
    of Assyria his master has sent to reproach the living God, and will rebuke the
    words that the LORD your God has heard. Therefore lift up a prayer for the remnant
    that is found.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chief cupbearer.' 'Rabshakeh' is an Assyrian official title used
      here as a name-like designation.
    reason: cultural_note
  - marker: b
    text: Or 'will reprove/call to account for the words.' The Hebrew may mean that
      God will answer or judge the blasphemous speech he has heard.
    reason: lexical_alternative
  - marker: c
    text: Or 'the remnant that remains' or 'the survivors who are left.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוּלַי
  chosen: Perhaps
  alternatives:
  - It may be that
  - Maybe
  lexicon: HALOT
  rationale: Conveys possibility and hope without overstating certainty; idiomatic
    modern English.
- source_word: יִשְׁמַע
  chosen: will hear
  alternatives:
  - may hear
  - will listen to
  lexicon: HALOT
  rationale: With אוּלַי the sense is potential, but English commonly expresses this
    with 'Perhaps ... will hear.' 'Hear' preserves the Hebrew verb and its covenantal
    nuance of attentive hearing.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Direct second-person possessive addressed to Hezekiah; straightforward
    rendering.
- source_word: דִּבְרֵי
  chosen: the words
  alternatives:
  - the message
  - the speech
  lexicon: HALOT
  rationale: Plural construct is best preserved as 'words'; it keeps the concrete
    verbal focus of the insult.
- source_word: רַב שָׁקֵה
  chosen: the Rabshakeh
  alternatives:
  - the chief cupbearer
  - the Rab-shakeh
  lexicon: HALOT
  rationale: Used here as a title/name for the Assyrian official; transliterated form
    is conventional and recognizable, while the occupational sense is not foregrounded
    in context.
- source_word: אֲשֶׁר שְׁלָחוֹ מֶלֶךְ אַשּׁוּר אֲדֹנָיו
  chosen: whom the king of Assyria his master has sent
  alternatives:
  - whom his master the king of Assyria has sent
  lexicon: HALOT
  rationale: Preserves the relative clause and the appositional relationship that
    the Assyrian king is the Rabshakeh's master.
- source_word: לְחָרֵף
  chosen: to reproach
  alternatives:
  - to mock
  - to defy
  - to taunt
  lexicon: HALOT
  rationale: '''Reproach'' best captures the verbal insult/blasphemous contempt directed
    against God without narrowing to military defiance alone.'
- source_word: אֱלֹהִים חַי
  chosen: the living God
  alternatives:
  - the living God
  lexicon: HALOT
  rationale: Standard and natural rendering of the phrase, preserving its theological
    contrast with idols.
- source_word: וְהוֹכִיחַ
  chosen: and will rebuke
  alternatives:
  - and will reprove
  - and may rebuke
  - and will call to account
  lexicon: HALOT
  rationale: In context this expresses hoped-for divine response to the blasphemous
    words. 'Rebuke' is idiomatic and fits the object 'the words' by metonymy for the
    speaker and his speech.
- source_word: בַּדְּבָרִים
  chosen: the words
  alternatives:
  - for the words
  - concerning the words
  lexicon: HALOT
  rationale: Though the preposition can suggest relation ('for/concerning'), English
    reads more naturally with direct object after 'rebuke'; the sense remains that
    God responds to the reported speech.
- source_word: אֲשֶׁר שָׁמַע יְהוָה אֱלֹהֶיךָ
  chosen: that the LORD your God has heard
  alternatives:
  - which the LORD your God has heard
  lexicon: HALOT
  rationale: Perfect verb rendered as present perfect in English to mark completed
    hearing with present relevance.
- source_word: וְנָשָׂאתָ תְפִלָּה
  chosen: Therefore lift up a prayer
  alternatives:
  - And lift up a prayer
  - So offer a prayer
  lexicon: HALOT
  rationale: נשא תפלה is an idiom for offering prayer. 'Lift up a prayer' preserves
    the metaphor; 'Therefore' makes explicit the inferential force natural in context,
    though the conjunction is simply waw.
- source_word: בְּעַד
  chosen: for
  alternatives:
  - on behalf of
  lexicon: HALOT
  rationale: Simple and natural English for intercessory prayer.
- source_word: הַשְּׁאֵרִית
  chosen: the remnant
  alternatives:
  - the survivors
  - those who remain
  lexicon: HALOT
  rationale: '''Remnant'' preserves the important Isaianic term with both literal
    and theological resonance.'
- source_word: הַנִּמְצָאָה
  chosen: that is found
  alternatives:
  - that remains
  - that is left
  lexicon: HALOT
  rationale: Formal rendering of the participle 'found/present.' It likely means the
    remnant still existing; this more literal choice preserves the Hebrew wording
    while remaining intelligible.
