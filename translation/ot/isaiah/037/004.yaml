theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following Jewish reverence
    tradition and longstanding English Bible convention while preserving distinction
    from 'Lord' as title in other contexts.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering of שְׁאֵרִית
  chosen_reading: the remnant
  alternative_readings:
  - the survivors
  - those who remain
  rationale: In Isaiah, 'remnant' can carry theological significance beyond mere survival.
    The main text preserves that resonance without overinterpreting the verse.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
