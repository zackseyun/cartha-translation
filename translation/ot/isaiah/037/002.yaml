id: ISA.37.2
reference: Isaiah 37:2
source:
  edition: WLC
  text: וַ֠/יִּשְׁלַח אֶת אֶלְיָקִ֨ים אֲשֶׁר עַל הַ/בַּ֜יִת וְ/אֵ֣ת שֶׁבְנָ֣א הַ/סּוֹפֵ֗ר
    וְ/אֵת֙ זִקְנֵ֣י הַ/כֹּהֲנִ֔ים מִתְכַּסִּ֖ים בַּ/שַּׂקִּ֑ים אֶל יְשַֽׁעְיָ֥הוּ
    בֶן אָמ֖וֹץ הַ/נָּבִֽיא־־־׀־־׃
translation:
  text: Then he sent Eliakim, who was over the household, and Shebna the scribe, and
    the elders of the priests, covered with sackcloth, to Isaiah son of Amoz, the
    prophet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clothed in sackcloth' or 'wearing sackcloth.' The Hebrew describes them
      as being in a state of mourning or humiliation.
    reason: lexical_alternative
  - marker: b
    text: '''Who was over the household'' is an official title for the one in charge
      of the royal household.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then he sent
  alternatives:
  - And he sent
  - So he sent
  lexicon: HALOT
  rationale: Wayyiqtol of שׁלח advances the narrative. 'Then he sent' gives natural
    English narrative sequence while preserving the simple verbal action.
- source_word: אֶלְיָקִים
  chosen: Eliakim
  rationale: Personal name transliterated per translation philosophy.
- source_word: אֲשֶׁר עַל הַבַּיִת
  chosen: who was over the household
  alternatives:
  - who was over the palace
  - who was in charge of the house
  lexicon: HALOT
  rationale: This idiom denotes an official in charge of the royal household. 'Over
    the household' preserves the Hebrew structure while remaining intelligible. 'Palace'
    is possible by implication but is more interpretive than the source wording.
- source_word: שֶׁבְנָא
  chosen: Shebna
  rationale: Personal name transliterated per translation philosophy.
- source_word: הַסֹּפֵר
  chosen: the scribe
  alternatives:
  - the secretary
  - the recorder
  lexicon: HALOT
  rationale: סֹפֵר can denote a royal secretary/scribe. 'The scribe' is the more direct
    lexical equivalent and fits the official title without over-specifying bureaucratic
    function.
- source_word: זִקְנֵי הַכֹּהֲנִים
  chosen: the elders of the priests
  alternatives:
  - the senior priests
  - the elders among the priests
  lexicon: HALOT
  rationale: Construct phrase is rendered transparently. It likely refers to leading
    priests, but 'elders of the priests' best preserves the Hebrew wording and leaves
    the exact institutional nuance open.
- source_word: מִתְכַּסִּים בַּשַּׂקִּים
  chosen: covered with sackcloth
  alternatives:
  - clothed in sackcloth
  - wearing sackcloth
  lexicon: HALOT
  rationale: The participle plus prepositional phrase describes their state. 'Covered
    with sackcloth' closely reflects the reflexive/passive nuance of the hitpael while
    sounding natural in English. 'Clothed in sackcloth' is also possible but slightly
    smoother than the Hebrew's more vivid image.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural English equivalent
    here.
- source_word: יְשַׁעְיָהוּ בֶן אָמוֹץ
  chosen: Isaiah son of Amoz
  alternatives:
  - Isaiah, the son of Amoz
  rationale: Personal name and patronymic are rendered straightforwardly; appositional
    comma before the title follows in English.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Definite title rendered directly; it identifies Isaiah's recognized prophetic
    office.
