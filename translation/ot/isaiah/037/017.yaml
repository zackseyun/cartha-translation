theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse directly addresses Israel's covenant God. Following the project's
    doctrine, the Tetragrammaton is rendered 'the LORD' rather than transliterated
    forms.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH | the LORD'
- issue: Anthropomorphic language for God ('ear,' 'eyes')
  chosen_reading: Preserve the anthropomorphic imperatives literally
  alternative_readings:
  - Paraphrase as 'pay attention' and 'take notice'
  rationale: The prayer intentionally uses embodied imagery to plead for God's attentive
    action. Preserving the imagery maintains the rhetoric and theology of personal
    divine engagement without flattening it into abstraction.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
