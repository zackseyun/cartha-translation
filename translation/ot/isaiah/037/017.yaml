id: ISA.37.17
reference: Isaiah 37:17
source:
  edition: WLC
  text: הַטֵּ֨ה יְהוָ֤ה אָזְנְ/ךָ֙ וּֽ/שְׁמָ֔ע פְּקַ֧ח יְהוָ֛ה עֵינֶ֖/ךָ וּ/רְאֵ֑ה
    וּ/שְׁמַ֗ע אֵ֚ת כָּל דִּבְרֵ֣י סַנְחֵרִ֔יב אֲשֶׁ֣ר שָׁלַ֔ח לְ/חָרֵ֖ף אֱלֹהִ֥ים
    חָֽי׀־׃
translation:
  text: Incline your ear, O LORD, and hear; open your eyes, O LORD, and see; and hear
    all the words of Sennacherib, which he has sent to mock the living God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to reproach,' 'to defy,' or 'to taunt' the living God.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַטֵּה
  chosen: Incline
  alternatives:
  - Turn
  - Bend down
  lexicon: HALOT
  rationale: Imperative of נטה used idiomatically with 'ear' for attentive listening.
    'Incline' preserves the metaphor and prayerful tone better than flatter alternatives.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and reverential usage.
- source_word: אָזְנְךָ
  chosen: your ear
  alternatives:
  - your ears
  lexicon: HALOT
  rationale: Singular in Hebrew and part of a conventional anthropomorphic idiom;
    singular is retained in English.
- source_word: וּשְׁמָע
  chosen: and hear
  alternatives:
  - and listen
  lexicon: HALOT
  rationale: Keeps the direct imperative force and parallels the repeated שמע later
    in the verse.
- source_word: פְּקַח
  chosen: open
  alternatives:
  - uncover
  lexicon: HALOT
  rationale: Standard rendering for פקח with 'eyes'; natural English while preserving
    the anthropomorphic appeal.
- source_word: עֵינֶךָ
  chosen: your eyes
  alternatives:
  - your eye
  lexicon: HALOT
  rationale: Though morphologically singular with suffix, the idiom in context is
    naturally rendered 'your eyes' in English, matching the common paired-organ expression
    and the following imperative 'see.'
- source_word: וּרְאֵה
  chosen: and see
  alternatives:
  - and look
  lexicon: HALOT
  rationale: '''See'' fits the parallelism with ''hear'' and preserves the petition
    for divine notice.'
- source_word: וּשְׁמַע
  chosen: and hear
  alternatives:
  - and listen to
  lexicon: HALOT
  rationale: Retained as 'hear' for consistency with the earlier imperative and because
    the object 'all the words' follows directly.
- source_word: כָּל דִּבְרֵי
  chosen: all the words
  alternatives:
  - everything said
  - all the speech
  lexicon: HALOT
  rationale: More formally reflects the Hebrew plural construct while remaining idiomatic.
- source_word: סַנְחֵרִיב
  chosen: Sennacherib
  lexicon: HALOT
  rationale: Standard English transliteration of the Assyrian king's name.
- source_word: אֲשֶׁר שָׁלַח
  chosen: which he has sent
  alternatives:
  - that he sent
  - which he sent
  lexicon: HALOT
  rationale: The perfect can be rendered as a present-result perfect in context, referring
    to the message just delivered; 'has sent' reads naturally in English prayer discourse.
- source_word: לְחָרֵף
  chosen: to mock
  alternatives:
  - to reproach
  - to defy
  - to taunt
  lexicon: HALOT
  rationale: The verb denotes scornful reproach or defiance. 'Mock' is concise and
    accessible, though the sense includes insult/defiance against God.
- source_word: אֱלֹהִים חָי
  chosen: the living God
  alternatives:
  - the living God himself
  lexicon: HALOT
  rationale: A standard biblical expression contrasting Israel's God with lifeless
    idols; the definite article is supplied idiomatically in English.
