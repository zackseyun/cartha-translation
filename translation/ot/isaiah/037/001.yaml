id: ISA.37.1
reference: Isaiah 37:1
source:
  edition: WLC
  text: וַ/יְהִ֗י כִּ/שְׁמֹ֨עַ֙ הַ/מֶּ֣לֶךְ חִזְקִיָּ֔הוּ וַ/יִּקְרַ֖ע אֶת בְּגָדָ֑י/ו
    וַ/יִּתְכַּ֣ס בַּ/שָּׂ֔ק וַ/יָּבֹ֖א בֵּ֥ית יְהוָֽה־׃
translation:
  text: And it happened, when King Hezekiah heard it, that he tore his clothes, covered
    himself with sackcloth, and went into the house of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''when King Hezekiah heard''; the object is implicit from the preceding
      context and is supplied in English as ''it.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event. 'And it happened'
    preserves the Hebrew discourse function without archaic English.
- source_word: כִּשְׁמֹעַ
  chosen: when ... heard it
  alternatives:
  - upon hearing
  - as soon as ... heard
  lexicon: HALOT
  rationale: The preposition כ with infinitive construct of שמע marks temporal circumstance,
    naturally rendered 'when ... heard.' The object 'it' is supplied in English from
    context because Hebrew leaves the object implicit here.
- source_word: הַמֶּלֶךְ חִזְקִיָּהוּ
  chosen: King Hezekiah
  alternatives:
  - the king, Hezekiah
  lexicon: HALOT
  rationale: Appositional title plus personal name. English idiom prefers 'King Hezekiah'
    while preserving both elements.
- source_word: וַיִּקְרַע אֶת בְּגָדָיו
  chosen: he tore his clothes
  alternatives:
  - he tore his garments
  lexicon: HALOT
  rationale: קרע with בגדים is the standard idiom for mourning/distress. 'Clothes'
    is more natural modern English than 'garments' while retaining the literal action.
- source_word: וַיִּתְכַּס בַּשָּׂק
  chosen: covered himself with sackcloth
  alternatives:
  - wrapped himself in sackcloth
  - clothed himself with sackcloth
  lexicon: HALOT
  rationale: Hitpael/reflexive sense of כסה with sackcloth indicates putting on mourning
    attire. 'Covered himself with sackcloth' stays close to the Hebrew wording.
- source_word: וַיָּבֹא בֵּית יְהוָה
  chosen: went into the house of the LORD
  alternatives:
  - entered the house of the LORD
  - went to the house of the LORD
  lexicon: HALOT
  rationale: בוא plus בית indicates entering/going into the temple precincts. 'Went
    into' fits the motion verb and destination. בית יהוה is rendered 'the house of
    the LORD,' the standard temple expression.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    in the main text.
