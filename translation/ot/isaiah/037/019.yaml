id: ISA.37.19
reference: Isaiah 37:19
source:
  edition: WLC
  text: וְ/נָתֹ֥ן אֶת אֱלֹהֵי/הֶ֖ם בָּ/אֵ֑שׁ כִּי֩ לֹ֨א אֱלֹהִ֜ים הֵ֗מָּה כִּ֣י אִם
    מַעֲשֵׂ֧ה יְדֵֽי אָדָ֛ם עֵ֥ץ וָ/אֶ֖בֶן וַֽ/יְאַבְּדֽוּ/ם־־־׃
translation:
  text: and have thrown their gods into the fire, for they were not gods but the work
    of human hands, wood and stone; so they destroyed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their idols.' The Hebrew says 'their gods,' then immediately explains
      that they were not truly gods but human-made objects.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתֹן
  chosen: and have thrown
  alternatives:
  - and gave
  - and put
  - and cast
  lexicon: HALOT
  rationale: From נתן, literally 'gave/put,' but in the idiom with 'into the fire'
    the sense is 'threw/cast into the fire.' The perfect form fits the report of completed
    action in Hezekiah's prayer.
- source_word: אֱלֹהֵיהֶם
  chosen: their gods
  alternatives:
  - their gods/idols
  lexicon: HALOT
  rationale: Plural of אֱלֹהִים with 3mp suffix refers to the deities worshiped by
    the nations. 'Gods' is the direct lexical rendering; the following clause explains
    their non-divine status.
- source_word: בָּאֵשׁ
  chosen: into the fire
  alternatives:
  - in the fire
  lexicon: HALOT
  rationale: The preposition with the article-noun can be rendered 'into the fire'
    in English because the governing verb implies motion toward and disposal in the
    fire.
- source_word: כִּי לֹא אֱלֹהִים הֵמָּה
  chosen: for they were not gods
  alternatives:
  - because they are not gods
  - for they are no gods
  lexicon: HALOT
  rationale: The clause gives the reason the nations could destroy them. English past
    tense fits the narrative-prayer context, though the statement is generally true.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - rather
  - except that
  lexicon: HALOT
  rationale: Idiomatic adversative expression here contrasting true deity with mere
    artifacts; 'but' is the most natural concise English rendering.
- source_word: מַעֲשֵׂה יְדֵי אָדָם
  chosen: the work of human hands
  alternatives:
  - the work of man's hands
  - what human hands made
  lexicon: HALOT
  rationale: Literally 'work of the hands of man.' 'Human hands' preserves the anthropological
    contrast without awkward English. This follows the doctrine's guidance on אָדָם
    as 'man / humankind' according to context.
- source_word: אָדָם
  chosen: human
  alternatives:
  - man
  - humankind
  lexicon: HALOT
  rationale: Here אָדָם is collective/generic, contrasting human manufacture with
    true deity. 'Human' in the phrase 'human hands' is gender-accurate to the source's
    intent.
- source_word: עֵץ וָאֶבֶן
  chosen: wood and stone
  alternatives:
  - of wood and stone
  lexicon: HALOT
  rationale: Appositional specification of the materials composing the idols. English
    can render this tersely as 'wood and stone' after 'the work of human hands.'
- source_word: וַיְאַבְּדוּם
  chosen: so they destroyed them
  alternatives:
  - and they destroyed them
  - and destroyed them
  lexicon: HALOT
  rationale: 'From אבד in the causative sense ''destroy, make perish,'' with 3mp subject
    and 3mp object suffix. ''So'' brings out the logical result: because they were
    mere artifacts, the nations destroyed them.'
