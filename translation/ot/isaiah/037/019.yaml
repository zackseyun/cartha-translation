theological_decisions:
- issue: Status of the nations' deities
  chosen_reading: rendered as 'their gods' followed by the explanatory clause 'for
    they were not gods'
  alternative_readings:
  - their idols ... for they were not gods
  rationale: The Hebrew first uses the nations' own designation ('their gods') and
    then denies their true divinity. Preserving both elements reflects the polemical
    force of the verse without importing extra theological wording into the first
    phrase.
  doctrine_reference: Translation philosophy §§1, 3, 5
