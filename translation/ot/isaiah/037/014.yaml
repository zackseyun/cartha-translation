id: ISA.37.14
reference: Isaiah 37:14
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח חִזְקִיָּ֧הוּ אֶת הַ/סְּפָרִ֛ים מִ/יַּ֥ד הַ/מַּלְאָכִ֖ים וַ/יִּקְרָאֵ֑/הוּ
    וַ/יַּ֨עַל֙ בֵּ֣ית יְהוָ֔ה וַ/יִּפְרְשֵׂ֥/הוּ חִזְקִיָּ֖הוּ לִ/פְנֵ֥י יְהוָֽה־׃
translation:
  text: Then Hezekiah took the letters from the hand of the messengers and read them,
    and he went up to the house of the LORD and spread them before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'from the hand of the messengers,' an idiom for receiving something
      from them.
    reason: cultural_note
  - marker: b
    text: Or 'read it' and 'spread it out'; the Hebrew uses a singular suffix, likely
      referring collectively to the written message contained in the letters.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסְּפָרִים
  chosen: the letters
  alternatives:
  - the documents
  - the scrolls
  - the writings
  lexicon: HALOT
  rationale: סֵפֶר can denote a written document broadly; in this narrative context,
    the plural refers to the written message delivered by the Assyrian envoys. 'Letters'
    is the most natural English rendering for a received written communication, while
    still fitting the historical setting.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from
  - out of the hand of
  lexicon: HALOT
  rationale: The idiom literally reads 'from the hand of.' Retaining 'hand' preserves
    the Hebrew expression while remaining clear in English. It also naturally conveys
    receipt from intermediaries.
- source_word: הַמַּלְאָכִים
  chosen: the messengers
  alternatives:
  - the envoys
  - the angels
  lexicon: HALOT
  rationale: מַלְאָךְ can mean either 'messenger' or 'angel.' In this historical narrative,
    human representatives of the Assyrian king are in view, so 'messengers' is contextually
    required. 'Envoys' is possible but slightly more interpretive.
- source_word: וַיִּקְרָאֵהוּ
  chosen: and read them
  alternatives:
  - and read it
  - and called/proclaimed it
  lexicon: HALOT
  rationale: Though the suffix is singular ('it/him'), the antecedent is the collective
    written message represented by the plural 'letters.' English idiom prefers 'read
    them' to match the plural antecedent. The verb קרא here means 'read,' not 'call,'
    given the object is a written document.
- source_word: וַיַּעַל
  chosen: and he went up
  alternatives:
  - and he ascended
  - and he went
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' 'Went up' preserves both the directional
    sense and the conventional idiom for going to the temple mount.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: The Hebrew is literally 'house of YHWH.' 'House of the LORD' preserves
    the source wording and its covenantal resonance better than the more interpretive
    'temple,' though both refer to the same place.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following longstanding Jewish reverence practice and the Septuagintal
    pattern.
- source_word: וַיִּפְרְשֵׂהוּ
  chosen: and spread them
  alternatives:
  - and spread it out
  - and laid them out
  lexicon: HALOT
  rationale: פרשׂ means 'spread out.' As with 'read them,' the Hebrew singular suffix
    likely refers collectively to the written message. English plural 'them' best
    matches 'letters' and avoids awkwardness. 'Spread' also captures Hezekiah's symbolic
    act of laying the documents before God.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: The phrase literally means 'before the face/presence of YHWH.' 'Before
    the LORD' is idiomatic, concise, and preserves the relational and cultic sense
    of presenting the matter to God.
