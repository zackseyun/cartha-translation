theological_decisions:
- issue: Divine knowledge expressed by the perfect verb
  chosen_reading: Render as present 'I know' to express ongoing, exhaustive divine
    awareness.
  alternative_readings:
  - I knew
  - I have known
  rationale: The verse is part of the LORD's declaration of his full knowledge of
    the Assyrian king's actions and hostility. Present English communicates the force
    naturally without importing extra theological claims beyond the text.
