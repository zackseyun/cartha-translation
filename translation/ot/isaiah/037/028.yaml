id: ISA.37.28
reference: Isaiah 37:28
source:
  edition: WLC
  text: וְ/שִׁבְתְּ/ךָ֛ וְ/צֵאתְ/ךָ֥ וּ/בוֹאֲ/ךָ֖ יָדָ֑עְתִּי וְ/אֵ֖ת הִֽתְרַגֶּזְ/ךָ֥
    אֵלָֽ/י׃
translation:
  text: But I know your sitting down, your going out, your coming in, and your raging
    against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your dwelling ... your departure ... your entrance.' The Hebrew uses
      a conventional sequence for a person's settled life and movements.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁבְתְּךָ
  chosen: your sitting down
  alternatives:
  - your dwelling
  - your sitting
  lexicon: HALOT
  rationale: From ישׁב, here a verbal noun-like infinitive construct with 2ms suffix.
    In this triad with 'going out' and 'coming in,' the idiom refers to one's settled
    position or daily movements. 'Your sitting down' preserves the concrete Hebrew
    imagery better than the more interpretive 'your dwelling.'
- source_word: וְצֵאתְךָ
  chosen: your going out
  alternatives:
  - your departure
  lexicon: HALOT
  rationale: From יצא, paired idiomatically with 'coming in.' 'Going out' is the most
    direct and natural rendering and preserves the movement imagery.
- source_word: וּבוֹאֲךָ
  chosen: your coming in
  alternatives:
  - your entrance
  lexicon: HALOT
  rationale: From בוא, the counterpart to 'going out.' 'Coming in' keeps the Hebrew
    idiom intact and readable in English.
- source_word: יָדָעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I knew
  lexicon: HALOT
  rationale: Qal perfect 1cs of ידע. In context, the perfect expresses God's complete
    and certain knowledge, best rendered with present English 'I know' rather than
    a simple past, since the statement concerns ongoing divine awareness.
- source_word: הִתְרַגֶּזְךָ
  chosen: your raging
  alternatives:
  - your agitation
  - your tumult
  - your insolence
  lexicon: HALOT
  rationale: From רגז in the Hitpael, denoting agitation, rage, or enraged behavior.
    Because it is directed 'against me,' 'your raging' best captures the hostile force
    of the term without overinterpreting it as merely emotional disturbance.
- source_word: אֵלַי
  chosen: against me
  alternatives:
  - toward me
  - at me
  lexicon: HALOT
  rationale: Although אל commonly means 'to/toward,' with a hostile noun such as 'raging'
    English idiom requires 'against me' to express the adversative sense clearly.
- source_word: וְאֵת
  chosen: and
  alternatives:
  - namely
  - also
  lexicon: Hebrew grammar
  rationale: The direct-object marker links the final object to the verb. It is not
    translated independently in English, but its coordination is represented by 'and'
    before the final phrase.
