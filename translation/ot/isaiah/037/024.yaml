id: ISA.37.24
reference: Isaiah 37:24
source:
  edition: WLC
  text: בְּ/יַ֣ד עֲבָדֶי/ךָ֮ חֵרַ֣פְתָּ אֲדֹנָ/י֒ וַ/תֹּ֗אמֶר בְּ/רֹ֥ב רִכְבִּ֛/י
    אֲנִ֥י עָלִ֛יתִי מְר֥וֹם הָרִ֖ים יַרְכְּתֵ֣י לְבָנ֑וֹן וְ/אֶכְרֹ֞ת קוֹמַ֤ת אֲרָזָי/ו֙
    מִבְחַ֣ר בְּרֹשָׁ֔י/ו וְ/אָבוֹא֙ מְר֣וֹם קִצּ֔/וֹ יַ֖עַר כַּרְמִלּֽ/וֹ׀׃
translation:
  text: By your servants you have mocked the Lord, and you have said, ‘With my many
    chariots I myself have gone up to the heights of the mountains, to the remotest
    parts of Lebanon; I will cut down its tall cedars, its choicest cypresses, and
    I will enter its farthest height, its forest orchard.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have reproached' or 'have taunted'; the Hebrew verb carries the sense
      of insulting or defying with contempt.
    reason: lexical_alternative
  - marker: b
    text: The tree named here (Hebrew berosh) is uncertain; it may refer to cypress,
      fir, or another conifer.
    reason: lexical_alternative
  - marker: c
    text: Or 'its luxuriant forest' or 'its fruitful forest'; the Hebrew combines
      the ideas of forest and fertile orchard-land.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיַד עֲבָדֶיךָ
  chosen: By your servants
  alternatives:
  - By the hand of your servants
  - Through your servants
  lexicon: HALOT
  rationale: The idiom בְּיַד literally means 'by the hand of,' but in English this
    is most naturally rendered instrumentally as 'by' or 'through.' 'By your servants'
    preserves the agency/instrument sense without awkwardness.
- source_word: עֲבָדֶיךָ
  chosen: servants
  alternatives:
  - slaves
  lexicon: HALOT
  rationale: In this royal/messenger context, 'servants' is the most natural English
    rendering for עבדים. The bonded-status nuance of 'slaves' is not foregrounded
    here.
- source_word: חֵרַפְתָּ
  chosen: have mocked
  alternatives:
  - have reproached
  - have taunted
  - have reviled
  lexicon: HALOT
  rationale: The verb חרף denotes insulting, defying, or reproaching. 'Mocked' communicates
    the contemptuous force in clear modern English, while fitting the direct object
    'the Lord.' Alternatives are viable, especially 'reproached' or 'taunted.'
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: 'Here אֲדֹנָי refers to God as a title, and the project''s default for
    this title family is ''Lord.'' The article in English is natural after the verb:
    ''mocked the Lord.'''
- source_word: בְּרֹב רִכְבִּי
  chosen: With my many chariots
  alternatives:
  - With the multitude of my chariots
  - By my abundant chariotry
  lexicon: HALOT
  rationale: רֹב means abundance/multitude, and רֶכֶב here denotes chariots/chariot
    force. 'With my many chariots' is idiomatic and preserves the boast of military
    strength.
- source_word: אֲנִי עָלִיתִי
  chosen: I myself have gone up
  alternatives:
  - I have gone up
  - I ascended
  lexicon: HALOT
  rationale: The explicit pronoun אֲנִי adds emphasis. 'I myself' preserves the boastful
    self-assertion. Perfect aspect is rendered idiomatically in English as present
    perfect within quoted speech.
- source_word: מְרוֹם הָרִים
  chosen: to the heights of the mountains
  alternatives:
  - to the mountain heights
  - to the highest mountains
  lexicon: HALOT
  rationale: מְרוֹם denotes height/elevation. The construct-like sequence is best
    rendered straightforwardly as 'the heights of the mountains.'
- source_word: יַרְכְּתֵי לְבָנוֹן
  chosen: to the remotest parts of Lebanon
  alternatives:
  - to the far recesses of Lebanon
  - to the sides of Lebanon
  lexicon: HALOT
  rationale: יַרְכְּתֵי often means remote parts, recesses, or farthest reaches, not
    merely physical 'sides.' 'Remotest parts' captures the idiomatic sense in this
    topographical boast.
- source_word: וְאֶכְרֹת
  chosen: I will cut down
  alternatives:
  - and I cut down
  - I will fell
  lexicon: HALOT
  rationale: The imperfect in this taunting speech can express intended action. 'I
    will cut down' fits the sequence of boasts. 'Fell' is precise but less common
    for general readers.
- source_word: קוֹמַת אֲרָזָיו
  chosen: its tall cedars
  alternatives:
  - the height of its cedars
  - its stately cedars
  lexicon: HALOT
  rationale: קוֹמָה is height/stature. In English, 'its tall cedars' conveys the sense
    more naturally than the more literal but awkward 'the height of its cedars.' The
    suffix refers to Lebanon.
- source_word: מִבְחַר בְּרֹשָׁיו
  chosen: its choicest cypresses
  alternatives:
  - its finest firs
  - its select junipers
  lexicon: HALOT
  rationale: מִבְחַר means choice/best. בְּרוֹשׁ is a conifer variously identified
    (cypress, fir, juniper). 'Cypresses' is a common modern rendering; the botanical
    identification is not certain, so an alternative is preserved in a footnote.
- source_word: וְאָבוֹא
  chosen: and I will enter
  alternatives:
  - and I entered
  - and I will come
  lexicon: HALOT
  rationale: בוא commonly means come/enter. In context of penetrating Lebanon's heights,
    'enter' is the clearest English choice.
- source_word: מְרוֹם קִצּוֹ
  chosen: its farthest height
  alternatives:
  - its highest peak
  - the height of its extremity
  lexicon: HALOT
  rationale: The phrase combines elevation with extremity/end. 'Its farthest height'
    preserves both ideas and matches the rhetoric of reaching the utmost limit.
- source_word: יַעַר כַּרְמִלּוֹ
  chosen: its forest orchard
  alternatives:
  - its luxuriant forest
  - its fruitful forest
  - its garden forest
  lexicon: HALOT
  rationale: כַּרְמִל can denote fruitful land/orchard-land, and in apposition with
    יַעַר likely describes a luxuriant, cultivated-like forest. 'Forest orchard' is
    somewhat unusual but preserves the compact imagery of a forested, fertile place
    better than flattening it to simply 'forest.'
