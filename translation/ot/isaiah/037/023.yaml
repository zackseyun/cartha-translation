theological_decisions:
- issue: Rendering of God-directed insult in parallel verbs חרף and גדף
  chosen_reading: Differentiate the verbs as 'mocked and blasphemed'
  alternative_readings:
  - reproached and blasphemed
  - taunted and reviled
  rationale: The parallelism intensifies the accusation. Using two distinct English
    verbs preserves the rhetorical buildup, with 'blasphemed' making explicit that
    the offense is against God, not merely human insult.
  doctrine_reference: 'Translation philosophy: preserve theological weight without
    flattening lexical distinctions.'
