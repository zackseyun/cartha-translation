id: ISA.37.23
reference: Isaiah 37:23
source:
  edition: WLC
  text: אֶת מִ֤י חֵרַ֨פְתָּ֙ וְ/גִדַּ֔פְתָּ וְ/עַל מִ֖י הֲרִימ֣וֹתָה קּ֑וֹל וַ/תִּשָּׂ֥א
    מָר֛וֹם עֵינֶ֖י/ךָ אֶל קְד֥וֹשׁ יִשְׂרָאֵֽל־־־׃
translation:
  text: Whom have you mocked and blasphemed? Against whom have you raised your voice
    and lifted your eyes on high? Against the Holy One of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reproached and reviled.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'lifted your eyes to the height,' an idiom expressing haughtiness.
    reason: cultural_note
lexical_decisions:
- source_word: חֵרַפְתָּ
  chosen: mocked
  alternatives:
  - reproached
  - taunted
  - defied
  lexicon: HALOT
  rationale: The verb חרף in this context denotes scornful insult directed at God
    through the Assyrian king's words. 'Mocked' is natural modern English and pairs
    well with the following stronger term. 'Reproached' is more traditional but less
    idiomatic for contemporary readers; 'defied' captures implication more than lexical
    sense.
- source_word: גִדַּפְתָּ
  chosen: blasphemed
  alternatives:
  - reviled
  lexicon: HALOT
  rationale: גדף commonly denotes abusive speech, especially against God, so 'blasphemed'
    best preserves the theological gravity of the accusation. 'Reviled' is possible
    but weaker in explicitly God-directed context.
- source_word: הֲרִימֹתָה קּוֹל
  chosen: raised your voice
  alternatives:
  - lifted up your voice
  - exalted your voice
  lexicon: HALOT
  rationale: This idiom refers to speaking loudly or arrogantly. 'Raised your voice'
    is clear modern English and preserves the metaphor without sounding archaic.
- source_word: וַתִּשָּׂא מָרוֹם עֵינֶיךָ
  chosen: lifted your eyes on high
  alternatives:
  - lifted your eyes arrogantly
  - raised your eyes upward
  lexicon: HALOT
  rationale: The Hebrew combines 'lift' with 'height' and 'your eyes,' conveying haughty
    elevation. 'Lifted your eyes on high' preserves the imagery and leaves the arrogance
    implicit in the idiom. A more interpretive rendering like 'arrogantly' is possible
    but less formally transparent.
- source_word: אֶל
  chosen: Against
  alternatives:
  - to
  - toward
  lexicon: HALOT
  rationale: Although אֶל often means 'to/toward,' here the rhetorical question identifies
    the object of hostile speech and pride. Rendering it 'Against' brings out the
    adversative force in context and matches the preceding parallel 'Against whom.'
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  lexicon: HALOT
  rationale: This is a fixed Isaianic divine title and should be rendered consistently
    and transparently.
