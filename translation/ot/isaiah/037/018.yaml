id: ISA.37.18
reference: Isaiah 37:18
source:
  edition: WLC
  text: אָמְנָ֖ם יְהוָ֑ה הֶחֱרִ֜יבוּ מַלְכֵ֥י אַשּׁ֛וּר אֶת כָּל הָ/אֲרָצ֖וֹת וְ/אֶת אַרְצָֽ/ם־־־׃
translation:
  text: Truly, O Yahweh, the kings of Assyria have laid waste all the lands and their own land,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the countries.' The Hebrew word can denote lands, territories, or countries depending on context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their land'; some understand this collectively, while a parallel passage is often rendered 'their lands.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָמְנָם
  chosen: Truly
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces an affirmation of what follows. 'Truly' is natural modern English and preserves the emphatic concessive force in Hezekiah's prayer.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֶחֱרִיבוּ
  chosen: have laid waste
  alternatives:
  - have devastated
  - have destroyed
  lexicon: HALOT
  rationale: The Hiphil of חרב here denotes causing ruin or devastation. 'Have laid waste' captures the military desolation implied, more precisely than the broader 'destroyed.'
- source_word: מַלְכֵי אַשּׁוּר
  chosen: the kings of Assyria
  alternatives:
  - Assyria's kings
  lexicon: HALOT
  rationale: A straightforward construct rendering that preserves the formal relationship and reads naturally in English.
- source_word: אֶת כָּל הָאֲרָצוֹת
  chosen: all the lands
  alternatives:
  - all the countries
  - all the nations
  lexicon: HALOT
  rationale: אֲרָצוֹת is the plural of 'land/earth.' In this military-political context, 'lands' is broad and faithful; 'countries' is possible but slightly more interpretive, and 'nations' shifts from territory to peoples.
- source_word: וְאֶת אַרְצָם
  chosen: and their land
  alternatives:
  - and their lands
  lexicon: HALOT
  rationale: The consonantal text as pointed in the provided source reads singular with a 3mp suffix, 'their land.' Although the sense may strike readers as collective after 'all the lands,' the translation follows the supplied Hebrew form rather than smoothing it away.
