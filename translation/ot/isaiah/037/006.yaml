id: ISA.37.6
reference: Isaiah 37:6
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֲלֵי/הֶם֙ יְשַֽׁעְיָ֔הוּ כֹּ֥ה תֹאמְר֖וּ/ן אֶל אֲדֹנֵי/כֶ֑ם כֹּ֣ה אָמַ֣ר יְהוָ֗ה אַל תִּירָא֙ מִ/פְּנֵ֤י הַ/דְּבָרִים֙ אֲשֶׁ֣ר שָׁמַ֔עְתָּ אֲשֶׁ֧ר גִּדְּפ֛וּ נַעֲרֵ֥י מֶלֶךְ אַשּׁ֖וּר אוֹתִֽ/י־׀־־׃
translation:
  text: 'And Isaiah said to them, “Thus you shall say to your master: Thus says Yahweh, ‘Do not be afraid because of the words that you have heard, with which the servants of the king of Assyria have blasphemed me.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have reviled me' or 'have defied me.' The Hebrew verb can denote abusive or contemptuous speech against God.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And ... said' preserves Hebrew narrative flow without overinterpreting temporal sequence.
- source_word: אֲלֵיהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Directly marks Isaiah's speech as addressed to the messengers present.
- source_word: יְשַׁעְיָהוּ
  chosen: Isaiah
  alternatives:
  - Yeshayahu
  rationale: Personal names are transliterated by standard English convention.
- source_word: כֹּה תֹאמְרוּן
  chosen: Thus you shall say
  alternatives:
  - This is what you are to say
  - So you shall say
  lexicon: HALOT
  rationale: Retains the formal messenger formula while remaining natural in English.
- source_word: אֶל אֲדֹנֵיכֶם
  chosen: to your master
  alternatives:
  - to your lord
  lexicon: HALOT
  rationale: In context this refers to Hezekiah as the officials' human superior, not a divine title; 'master' avoids confusion with 'the LORD' later in the verse.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Conventional prophetic formula. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required default rendering for the divine name per DOCTRINE.md contested terms table.
- source_word: אַל תִּירָא
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  lexicon: HALOT
  rationale: Natural modern English preserving the prohibition and emotional force.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - before
  - on account of
  - in the face of
  lexicon: HALOT
  rationale: Here the preposition introduces the cause or occasion of fear; 'because of' is the clearest idiomatic rendering.
- source_word: הַדְּבָרִים
  chosen: the words
  alternatives:
  - the things
  - the statements
  lexicon: HALOT
  rationale: Concrete reference to the insulting speech just reported; 'words' best matches the Hebrew.
- source_word: אֲשֶׁר שָׁמַעְתָּ
  chosen: that you have heard
  alternatives:
  - which you heard
  lexicon: HALOT
  rationale: English perfect fits the present relevance of the reported words to Hezekiah's fear.
- source_word: אֲשֶׁר גִּדְּפוּ
  chosen: with which ... have blasphemed
  alternatives:
  - by which ... have reviled
  - with which ... have defied
  lexicon: HALOT
  rationale: The verb גדף in this context denotes abusive speech directed against God. 'Blasphemed' makes the object 'me' explicit and preserves the theological gravity better than the broader 'reviled' or 'defied'.
- source_word: נַעֲרֵי
  chosen: the attendants
  alternatives:
  - the servants
  - the young men
  lexicon: HALOT
  rationale: Although literally 'young men,' in royal court context it commonly refers to officials or retainers. 'Attendants' communicates their subordinate court role without implying mere age.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  lexicon: HALOT
  rationale: Straightforward genitival construction identifying whose attendants are in view.
- source_word: אֹתִי
  chosen: me
  lexicon: HALOT
  rationale: The first-person object makes clear that the offense is against the LORD himself, not merely against Judah or Hezekiah.
