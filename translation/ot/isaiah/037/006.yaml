theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of גִּדְּפוּ toward God
  chosen_reading: have blasphemed me
  alternative_readings:
  - have reviled me
  - have defied me
  rationale: Because the speech is explicitly directed against God ('me'), the stronger theological term 'blasphemed' best captures the offense without importing extra doctrine. An alternative is preserved in a footnote because English readers may hear 'blaspheme' as narrower than the Hebrew's broader abusive-defiant sense.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological tension where ambiguity remains'
