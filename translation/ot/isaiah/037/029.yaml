id: ISA.37.29
reference: Isaiah 37:29
source:
  edition: WLC
  text: יַ֚עַן הִתְרַגֶּזְ/ךָ֣ אֵלַ֔/י וְ/שַׁאֲנַנְ/ךָ֖ עָלָ֣ה בְ/אָזְנָ֑/י וְ/שַׂמְתִּ֨י
    חַחִ֜/י בְּ/אַפֶּ֗/ךָ וּ/מִתְגִּ/י֙ בִּ/שְׂפָתֶ֔י/ךָ וַ/הֲשִׁ֣יבֹתִ֔י/ךָ בַּ/דֶּ֖רֶךְ
    אֲשֶׁר בָּ֥אתָ בָּֽ/הּ־׃
translation:
  text: Because your raging against me and your complacency have come up into my ears,
    I will put my hook in your nose and my bit in your lips, and I will turn you back
    by the way by which you came.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your arrogance' for 'your complacency'; the Hebrew term can denote being
      at ease or secure, and in context likely carries the sense of arrogant self-assurance.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - On account of
  lexicon: HALOT
  rationale: Introduces the causal ground for the judgment statement. 'Because' is
    natural modern English and preserves the causal force.
- source_word: הִתְרַגֶּזְךָ
  chosen: your raging against me
  alternatives:
  - your raging
  - your agitation against me
  - your insolence against me
  lexicon: HALOT
  rationale: From רגז in the hitpael/related reflexive sense, denoting agitation or
    rage. In context of Assyria's defiance of God, 'raging against me' best captures
    hostile fury rather than mere emotional disturbance.
- source_word: אֵלַי
  chosen: against me
  alternatives:
  - to me
  - toward me
  lexicon: HALOT
  rationale: Although literally 'to me,' English idiom with a hostile verb requires
    'against me' to express the adversative sense clearly.
- source_word: שַׁאֲנַנְךָ
  chosen: your complacency
  alternatives:
  - your arrogance
  - your self-confidence
  - your ease
  lexicon: HALOT
  rationale: שׁאנן often conveys being at ease, secure, or complacent. In this taunt/judgment
    context it refers to arrogant self-assurance. 'Complacency' preserves the lexical
    core of careless ease while fitting the rebuke.
- source_word: עָלָה בְאָזְנַי
  chosen: have come up into my ears
  alternatives:
  - has risen to my ears
  - has reached my ears
  lexicon: HALOT
  rationale: The idiom is retained in a readable form. Plural subject in Hebrew is
    rendered with English plural agreement ('have'). 'Come up into my ears' preserves
    the vivid anthropomorphic imagery of God hearing the offense.
- source_word: חַחִי
  chosen: my hook
  alternatives:
  - my ring
  - my nose-hook
  lexicon: HALOT
  rationale: חח denotes a hook or ring used to control an animal or captive. 'Hook'
    is the clearest default in English; the nasal placement is supplied by the following
    phrase.
- source_word: בְּאַפֶּךָ
  chosen: in your nose
  alternatives:
  - in your nostrils
  lexicon: HALOT
  rationale: אַף can mean nose/nostril. Singular 'nose' is idiomatic in English and
    suits the image of forced control.
- source_word: מִתְגִּי
  chosen: my bit
  alternatives:
  - my bridle
  - my muzzle
  lexicon: HALOT
  rationale: מתג is a bit or bridle used to control an animal. 'Bit' is more precise
    here because it is placed 'in your lips,' matching the concrete image.
- source_word: בִּשְׂפָתֶיךָ
  chosen: in your lips
  alternatives:
  - between your lips
  - in your mouth
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the physical imagery. 'In your lips'
    is slightly unusual but understandable and closer to the Hebrew than the more
    interpretive 'in your mouth.'
- source_word: וַהֲשִׁיבֹתִיךָ
  chosen: I will turn you back
  alternatives:
  - I will make you return
  - I will bring you back
  lexicon: HALOT
  rationale: 'Hiphil of שוב is causative: God will cause the enemy king to return.
    ''Turn you back'' is vivid and idiomatic in a judgment context.'
- source_word: בַּדֶּרֶךְ אֲשֶׁר בָּאתָ בָּהּ
  chosen: by the way by which you came
  alternatives:
  - by the ճանապարհ you came
  - along the road by which you came
  - the same way you came
  lexicon: HALOT
  rationale: This preserves the formal structure and emphasis on reversal. 'By the
    way by which you came' is slightly elevated but clear and faithful.
