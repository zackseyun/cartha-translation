theological_decisions:
- issue: Anthropomorphic language for God hearing and controlling the enemy
  chosen_reading: Retain the concrete imagery ('into my ears,' 'my hook,' 'my bit')
    without softening it into abstraction.
  alternative_readings:
  - Paraphrase as 'I have heard your arrogance, so I will restrain you and send you
    back'
  rationale: The Hebrew intentionally uses vivid anthropomorphic and animal-control
    imagery to portray divine sovereignty over the Assyrian king. Preserving this
    imagery respects the source text and avoids flattening its rhetorical force.
  doctrine_reference: Translation philosophy §1, §3, §6
