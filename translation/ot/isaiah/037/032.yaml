theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering קִנְאַת in relation to God
  chosen_reading: zeal
  alternative_readings:
  - jealousy
  rationale: The Hebrew term can bear either sense, but in this salvation context the emphasis is on the LORD's energetic commitment to fulfill his promise. 'Zeal' preserves the theological force without importing a narrower emotional nuance.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension rather than resolve it unnecessarily
