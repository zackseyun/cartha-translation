id: ISA.37.32
reference: Isaiah 37:32
source:
  edition: WLC
  text: כִּ֤י מִ/ירֽוּשָׁלִַ֨ם֙ תֵּצֵ֣א שְׁאֵרִ֔ית וּ/פְלֵיטָ֖ה מֵ/הַ֣ר צִיּ֑וֹן קִנְאַ֛ת יְהוָ֥ה צְבָא֖וֹת תַּֽעֲשֶׂה זֹּֽאת־׃ס
translation:
  text: For from Jerusalem a remnant will go out, and survivors from Mount Zion. The zeal of Yahweh of hosts will do this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The jealousy of the LORD of hosts will do this.' The Hebrew noun can mean either 'zeal' or 'jealousy'; here it refers to the LORD's intense covenant commitment to accomplish his promise.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding promise/judgment context. 'For' best preserves the explanatory force in natural English.
- source_word: מִירוּשָׁלִַם
  chosen: from Jerusalem
  lexicon: HALOT
  rationale: Preposition מִן marks source/origin. 'Jerusalem' is transliterated as a place name per translation philosophy.
- source_word: תֵּצֵא
  chosen: will go out
  alternatives:
  - will come out
  - will issue forth
  lexicon: HALOT
  rationale: Qal imperfect of יצא, here future/predictive. 'Go out' is the most straightforward rendering for movement from a place.
- source_word: שְׁאֵרִית
  chosen: a remnant
  alternatives:
  - the remnant
  - those who remain
  lexicon: HALOT
  rationale: Common prophetic term for those left after judgment. 'A remnant' is idiomatic and preserves the theological motif without over-specifying definiteness.
- source_word: וּפְלֵיטָה
  chosen: and survivors
  alternatives:
  - and an escape group
  - and those who escape
  - and deliverance
  lexicon: HALOT
  rationale: Refers to escaped/surviving persons, not abstract 'deliverance,' in this parallelism with 'remnant.' 'Survivors' gives clear modern English while preserving the personal sense.
- source_word: מֵהַר צִיּוֹן
  chosen: from Mount Zion
  alternatives:
  - from the hill of Zion
  lexicon: HALOT
  rationale: Construct phrase with source preposition. 'Mount Zion' is the standard English form and preserves the geographic/theological reference.
- source_word: קִנְאַת
  chosen: The zeal of
  alternatives:
  - The jealousy of
  - The ardor of
  lexicon: HALOT
  rationale: קנאה can denote jealousy or zeal. In this context of YHWH's active commitment to preserve his people, 'zeal' best communicates covenantal fervor without misleading connotations of petty envy.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the fixed divine title יְהוָה צְבָאוֹת, 'the LORD of hosts' is the established and semantically broad rendering, encompassing heavenly armies without reducing the title to merely human warfare.
- source_word: תַּעֲשֶׂה זֹּאת
  chosen: will do this
  alternatives:
  - will accomplish this
  - will bring this about
  lexicon: HALOT
  rationale: Simple verbal clause asserting divine agency. 'Will do this' is direct and faithful; alternatives are possible but slightly more interpretive.
