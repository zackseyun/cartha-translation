id: ISA.37.27
reference: Isaiah 37:27
source:
  edition: WLC
  text: וְ/יֹֽשְׁבֵי/הֶן֙ קִצְרֵי יָ֔ד חַ֖תּוּ וָ/בֹ֑שׁוּ הָי֞וּ עֵ֤שֶׂב שָׂדֶה֙ וִ֣/ירַק
    דֶּ֔שֶׁא חֲצִ֣יר גַּגּ֔וֹת וּ/שְׁדֵמָ֖ה לִ/פְנֵ֥י קָמָֽה־׃
translation:
  text: And their inhabitants were powerless; they were shattered and put to shame.
    They were like the grass of the field, like green growth, like grass on the housetops,
    and like a field scorched before it is grown.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were dismayed and ashamed.' The Hebrew verbs can emphasize inward dismay
      as well as being broken or shattered.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'short of hand,' an idiom meaning lacking power or ability.
    reason: lexical_alternative
  - marker: c
    text: The final phrase is difficult. It likely refers to vegetation or a field
      blighted before the crop stands mature; compare the parallel in 2 Kings 19:26.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשְׁבֵיהֶן
  chosen: their inhabitants
  alternatives:
  - those who lived in them
  - their dwellers
  lexicon: HALOT
  rationale: The participial form from ישׁב with 3fp suffix refers to the people dwelling
    in the cities/lands just mentioned. 'Inhabitants' is natural modern English and
    preserves the collective sense.
- source_word: קִצְרֵי יָד
  chosen: powerless
  alternatives:
  - short of hand
  - weak-handed
  - without strength
  lexicon: HALOT
  rationale: The idiom literally means 'short of hand' and denotes inability or lack
    of power. 'Powerless' communicates the idiomatic sense clearly in readable English.
- source_word: חַתּוּ
  chosen: were shattered
  alternatives:
  - were dismayed
  - were broken
  - were terrified
  lexicon: HALOT
  rationale: From חתת, conveying being broken, dismayed, or shattered. In this context
    of defeated nations, 'were shattered' preserves the vivid force better than the
    more internal 'dismayed,' while still fitting the parallel with shame.
- source_word: וָבֹשׁוּ
  chosen: and put to shame
  alternatives:
  - and ashamed
  - and disgraced
  lexicon: HALOT
  rationale: בוש commonly denotes shame or disgrace. 'Put to shame' reflects the resultative
    force in idiomatic English and pairs well with the passive-like sense of defeat.
- source_word: עֵשֶׂב שָׂדֶה
  chosen: the grass of the field
  alternatives:
  - field grass
  - vegetation of the field
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'The grass of the field' is idiomatic
    and preserves the image of frailty and transience.
- source_word: וִירַק דֶּשֶׁא
  chosen: like green growth
  alternatives:
  - and green herbage
  - and tender green
  - and green grass
  lexicon: HALOT
  rationale: יֶרֶק denotes greenness/green vegetation and דשא fresh sprouting growth.
    'Green growth' avoids flattening the paired imagery into a mere repetition of
    'grass' while remaining accessible.
- source_word: חֲצִיר גַּגּוֹת
  chosen: like grass on the housetops
  alternatives:
  - roof grass
  - grass of the roofs
  lexicon: HALOT
  rationale: This is a known biblical image for shallow, quickly withering growth.
    'Grass on the housetops' is both literal and recognizable.
- source_word: וּשְׁדֵמָה
  chosen: and like a field scorched
  alternatives:
  - and blight
  - and scorched land
  - and a blasted field
  lexicon: HALOT
  rationale: The noun is difficult and has been understood as blighted or scorched
    field-land. Given the agricultural simile sequence and the following phrase, 'a
    field scorched' best captures the likely sense in clear English.
- source_word: לִפְנֵי קָמָה
  chosen: before it is grown
  alternatives:
  - before the standing grain
  - before it stands
  - before stalking up
  lexicon: HALOT
  rationale: קמה refers to standing grain/crop. In context the phrase describes something
    ruined before reaching maturity. 'Before it is grown' expresses the sense naturally,
    though less formally than 'before it becomes standing grain.'
