theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies “the LORD” as the default rendering for
    YHWH. This also fits the prayerful address of the verse and standard English Bible
    convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Expression of divine exclusivity in אַתָּה הוּא הָאֱלֹהִים לְבַדְּךָ
  chosen_reading: you alone are God
  alternative_readings:
  - you are the only God
  - you are God alone
  rationale: The Hebrew strongly emphasizes exclusive deity without requiring a more
    philosophically expanded statement. The chosen wording preserves the monotheistic
    confession while avoiding over-interpretation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
