id: ISA.37.16
reference: Isaiah 37:16
source:
  edition: WLC
  text: יְהוָ֨ה צְבָא֜וֹת אֱלֹהֵ֤י יִשְׂרָאֵל֙ יֹשֵׁ֣ב הַ/כְּרֻבִ֔ים אַתָּה ה֤וּא
    הָֽ/אֱלֹהִים֙ לְ/בַדְּ/ךָ֔ לְ/כֹ֖ל מַמְלְכ֣וֹת הָ/אָ֑רֶץ אַתָּ֣ה עָשִׂ֔יתָ אֶת
    הַ/שָּׁמַ֖יִם וְ/אֶת הָ/אָֽרֶץ־־־׃
translation:
  text: O LORD of hosts, God of Israel, enthroned above the cherubim, you alone are
    God over all the kingdoms of the earth. You made the heavens and the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “dwelling between the cherubim” or “enthroned upon the cherubim.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as “LORD” per doctrine default for the divine name יְהוָה, following
    established small-caps convention in English to signal the covenant name without
    transliteration.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, “hosts” preserves the traditional and semantically
    broad sense of heavenly armies/forces without narrowing the referent.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: God of Israel
  lexicon: HALOT
  rationale: Straightforward construct rendering; singular sense is required by context
    and standard usage despite plural form morphology of אֱלֹהִים.
- source_word: יֹשֵׁב הַכְּרֻבִים
  chosen: enthroned above the cherubim
  alternatives:
  - dwelling between the cherubim
  - sitting enthroned upon the cherubim
  lexicon: HALOT
  rationale: The participle יֹשֵׁב with this cultic expression denotes enthronement.
    “Above the cherubim” communicates the imagery of YHWH’s royal presence associated
    with the ark/temple without implying literal spatial limitation. Chosen over “between”
    because the Hebrew says simply “the cherubim,” not an explicit preposition meaning
    “between,” though that interpretive sense is traditional.
- source_word: אַתָּה הוּא הָאֱלֹהִים
  chosen: you alone are God
  alternatives:
  - you are the God
  - you are God
  lexicon: HALOT
  rationale: The pronoun plus הוּא is emphatic, and the following לְבַדְּךָ makes
    exclusivity explicit. “You alone are God” captures the clause naturally in English
    and preserves the monotheistic emphasis.
- source_word: לְבַדְּךָ
  chosen: alone
  alternatives:
  - by yourself
  lexicon: HALOT
  rationale: Adverbial “alone” is the most idiomatic English expression of exclusivity
    here.
- source_word: לְכֹל מַמְלְכוֹת הָאָרֶץ
  chosen: over all the kingdoms of the earth
  alternatives:
  - for all the kingdoms of the earth
  - among all the kingdoms of the earth
  lexicon: HALOT
  rationale: 'The lamed here is best taken in a relational sense expressing sovereignty
    with the predicate “God”: God with respect to / over all the kingdoms. “Over”
    makes the implied dominion explicit and idiomatic in English.'
- source_word: עָשִׂיתָ
  chosen: made
  alternatives:
  - created
  lexicon: HALOT
  rationale: The verb is עשה, the common verb “make/do,” not ברא specifically. “Made”
    is therefore the more textually precise rendering, while still fitting a creation
    context.
- source_word: הַשָּׁמַיִם וְאֶת הָאָרֶץ
  chosen: the heavens and the earth
  alternatives:
  - heaven and earth
  lexicon: HALOT
  rationale: The Hebrew uses the plural “heavens” and singular “earth.” Retaining
    “the heavens and the earth” preserves the source wording and the stock creation
    formula.
