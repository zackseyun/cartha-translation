id: ISA.37.15
reference: Isaiah 37:15
source:
  edition: WLC
  text: וַ/יִּתְפַּלֵּל֙ חִזְקִיָּ֔הוּ אֶל יְהוָ֖ה לֵ/אמֹֽר־׃
translation:
  text: 'And Hezekiah prayed to the LORD, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפַּלֵּל
  chosen: prayed
  alternatives:
  - interceded
  - made prayer
  lexicon: HALOT
  rationale: Hitpael of פלל here denotes the act of praying. 'Prayed' is the most
    natural modern English rendering and preserves the straightforward narrative sense
    without unnecessary expansion.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks the addressee of prayer. 'To' is idiomatic in English
    for prayer directed toward God.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name יְהוָה is
    'the LORD,' following Jewish reverence tradition and longstanding English Bible
    convention while signaling the covenant name.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: This infinitive introduces the content of Hezekiah's prayer. 'Saying'
    is concise, natural, and preserves the formal linkage to the following speech.
