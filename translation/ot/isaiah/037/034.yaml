id: ISA.37.34
reference: Isaiah 37:34
source:
  edition: WLC
  text: בַּ/דֶּ֥רֶךְ אֲשֶׁר בָּ֖א בָּ֣/הּ יָשׁ֑וּב וְ/אֶל הָ/עִ֥יר הַ/זֹּ֛את לֹ֥א יָב֖וֹא נְאֻם יְהוָֽה־־־׃
translation:
  text: By the way that he came, by it he will return, and he will not come into this city, declares Yahweh.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בַּדֶּרֶךְ
  chosen: By the way
  alternatives:
  - By the road
  - By the path
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means way/road/path. 'Way' is idiomatic in English and fits the repeated travel motif in the verse.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Introduces the relative clause modifying 'way'; 'that' is natural modern English.
- source_word: בָּא בָּהּ
  chosen: he came, by it
  alternatives:
  - he came on it
  - he came by it
  lexicon: HALOT
  rationale: בוא means 'come,' and the preposition plus 3fs suffix refers back to the feminine noun 'way.' Rendering the suffix explicitly as 'by it' preserves the Hebrew repetition and emphasis.
- source_word: יָשׁוּב
  chosen: he will return
  alternatives:
  - he will turn back
  - he will go back
  lexicon: HALOT
  rationale: שׁוּב here denotes returning by the same route. 'Return' is concise and idiomatic.
- source_word: וְאֶל
  chosen: and ... into
  alternatives:
  - and to
  lexicon: HALOT
  rationale: With the verb בוא and destination 'city,' English idiom prefers 'come into' rather than the more wooden 'come to'.
- source_word: הָעִיר הַזֹּאת
  chosen: this city
  alternatives:
  - the city הזאת
  - this town
  lexicon: HALOT
  rationale: Definite noun plus demonstrative is naturally rendered 'this city.' 'City' is the standard gloss for עִיר.
- source_word: לֹא יָבֹוא
  chosen: he will not come
  alternatives:
  - he shall not come
  - he will not enter
  lexicon: HALOT
  rationale: Future negation is straightforward. 'Come' preserves the lexical link with the earlier בוא; 'enter' is interpretive and less consistent.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic formula best rendered 'declares.' Per doctrine, יְהוָה is rendered 'the LORD' rather than 'Yahweh' in the main text.
