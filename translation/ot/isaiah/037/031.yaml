theological_decisions:
- issue: Metaphorical restoration imagery
  chosen_reading: Retain the agricultural metaphor of rooting downward and bearing
    fruit upward as a picture of Judah's renewed stability and flourishing.
  alternative_readings:
  - Interpret more dynamically as 'be firmly established and prosper'
  rationale: The Hebrew uses concrete agricultural imagery. Optimal equivalence favors
    preserving the metaphor rather than flattening it into abstract explanation.
  doctrine_reference: Translation philosophy §1, §6
