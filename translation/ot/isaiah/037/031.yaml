id: ISA.37.31
reference: Isaiah 37:31
source:
  edition: WLC
  text: וְ/יָ֨סְפָ֜ה פְּלֵיטַ֧ת בֵּית יְהוּדָ֛ה הַ/נִּשְׁאָרָ֖ה שֹׁ֣רֶשׁ לְ/מָ֑טָּה
    וְ/עָשָׂ֥ה פְרִ֖י לְ/מָֽעְלָ/ה־׃
translation:
  text: And the surviving remnant of the house of Judah will again take root downward
    and bear fruit upward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the escaped remnant of the house of Judah that remains.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָסְפָה
  chosen: will again
  alternatives:
  - will add
  - will continue
  lexicon: HALOT
  rationale: From יסף, here with the sense of doing something further or anew. In
    idiomatic English, 'will again' best captures the future continuation implied
    before the following infinitives/images, rather than the wooden 'will add.'
- source_word: פְּלֵיטַת
  chosen: the surviving remnant
  alternatives:
  - the escaped remnant
  - the survivors
  lexicon: HALOT
  rationale: פְּלֵיטָה denotes those who have escaped or survived. 'Surviving remnant'
    preserves both the survival/escape nuance and the collective sense in context.
- source_word: בֵּית יְהוּדָה
  chosen: the house of Judah
  alternatives:
  - Judah
  - the household of Judah
  lexicon: HALOT
  rationale: A standard construct phrase for the people/kingdom associated with Judah.
    'House of Judah' preserves the covenantal-national expression better than simply
    'Judah.'
- source_word: הַנִּשְׁאָרָה
  chosen: surviving
  alternatives:
  - that remains
  - left
  lexicon: HALOT
  rationale: The participle from שׁאר further qualifies the remnant as what is left
    after devastation. Rendering it adjectivally with 'surviving' avoids awkward repetition
    while preserving the sense.
- source_word: שֹׁרֶשׁ
  chosen: take root
  alternatives:
  - root
  lexicon: HALOT
  rationale: Although the noun is literally 'root,' English idiom requires a verbal
    expression with the following directional phrase. 'Take root' communicates the
    metaphor naturally without loss of imagery.
- source_word: לְמָטָּה
  chosen: downward
  alternatives:
  - below
  - beneath
  lexicon: HALOT
  rationale: Keeps the vertical agricultural metaphor paired with 'upward' in the
    next clause.
- source_word: וְעָשָׂה
  chosen: and bear
  alternatives:
  - and make
  - and produce
  lexicon: HALOT
  rationale: With פְרִי as object, the idiom means to produce or bear fruit. 'Bear'
    is the most natural English collocation and preserves the metaphor.
- source_word: פְרִי
  chosen: fruit
  alternatives:
  - produce
  lexicon: HALOT
  rationale: Literal agricultural metaphor, often extended to prosperity or increase,
    but here best retained as 'fruit' to preserve the image.
- source_word: לְמָעְלָה
  chosen: upward
  alternatives:
  - above
  - up
  lexicon: HALOT
  rationale: Balances 'downward' and preserves the poetic contrast of root below and
    fruit above.
