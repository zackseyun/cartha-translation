id: ISA.37.25
reference: Isaiah 37:25
source:
  edition: WLC
  text: אֲנִ֥י קַ֖רְתִּי וְ/שָׁתִ֣יתִי מָ֑יִם וְ/אַחְרִב֙ בְּ/כַף פְּעָמַ֔/י כֹּ֖ל
    יְאֹרֵ֥י מָצֽוֹר־׃
translation:
  text: I myself dug and drank water, and with the sole of my feet I dried up all
    the streams of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the canals/branches of the Nile of Egypt.' The Hebrew expression
      is idiomatic and may preserve a more specific reference to Egypt's waterways.
    reason: lexical_alternative
  - marker: b
    text: Hebrew Mazor; here likely a poetic or alternate name for Egypt, not 'siege'
      or 'fortification.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲנִי
  chosen: I myself
  alternatives:
  - I
  lexicon: HALOT
  rationale: The independent pronoun is explicit and emphatic in context, so 'I myself'
    preserves the boastful self-assertion better than a simple 'I.'
- source_word: קַרְתִּי
  chosen: dug
  alternatives:
  - dug out
  - excavated
  lexicon: HALOT
  rationale: From קרה/כור in this context of obtaining water, the sense is digging
    a well or channel. 'Dug' is idiomatic and concise in English.
- source_word: וְשָׁתִיתִי מָיִם
  chosen: and drank water
  alternatives:
  - and I drank waters
  lexicon: HALOT
  rationale: The collocation is straightforward. English prefers the mass noun 'water'
    rather than the formally plural Hebrew noun.
- source_word: וְאַחְרִב
  chosen: and ... I dried up
  alternatives:
  - and ... I laid waste
  - and ... I made dry
  lexicon: HALOT
  rationale: The Hiphil of חרב here takes waterways as object, so 'dried up' best
    matches the concrete image rather than the broader 'laid waste.'
- source_word: בְּכַף פְּעָמַי
  chosen: with the sole of my feet
  alternatives:
  - with the palm of my feet
  - by the tread of my feet
  lexicon: HALOT
  rationale: כַּף with feet denotes the sole or underside. 'With the sole of my feet'
    is the most natural English equivalent and preserves the vivid hyperbole.
- source_word: כֹּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: '''All'' fits the collective object ''streams'' naturally in English.'
- source_word: יְאֹרֵי
  chosen: the streams
  alternatives:
  - the canals
  - the Nile channels
  - the rivers
  lexicon: HALOT
  rationale: יְאֹר often refers to Nile canals/branches in Egyptian contexts. 'Streams'
    is readable and broad enough, while a footnote preserves the more specific 'canals/Nile
    channels' nuance.
- source_word: מָצוֹר
  chosen: Egypt
  alternatives:
  - Mazor
  - siege
  - fortification
  lexicon: HALOT
  rationale: In this context יְאֹרֵי מָצוֹר is a known expression referring to Egypt,
    especially its Nile waterways. Rendering it 'Egypt' communicates the geographic
    reference clearly; the more literal or less certain alternatives are preserved
    in a footnote.
