id: ISA.37.36
reference: Isaiah 37:36
source:
  edition: WLC
  text: וַ/יֵּצֵ֣א מַלְאַ֣ךְ יְהוָ֗ה וַ/יַּכֶּה֙ בְּ/מַחֲנֵ֣ה אַשּׁ֔וּר מֵאָ֛ה וּ/שְׁמֹנִ֥ים וַ/חֲמִשָּׁ֖ה אָ֑לֶף וַ/יַּשְׁכִּ֣ימוּ בַ/בֹּ֔קֶר וְ/הִנֵּ֥ה כֻלָּ֖/ם פְּגָרִ֥ים מֵתִֽים׀׃
translation:
  text: Then the angel of Yahweh went out and struck down 185,000 in the camp of Assyria. When they arose early in the morning, behold, all of them were dead bodies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of the LORD.' The Hebrew word can mean either 'messenger' or 'angel'; here the context favors a heavenly agent of divine judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאָךְ can mean either 'messenger' or 'angel,' but in this narrative of divine judgment the supernatural sense is most natural in English. יְהוָה is rendered 'the LORD' per doctrine for the divine name.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - went forth
  lexicon: HALOT
  rationale: A straightforward rendering of יצא in narrative sequence; 'went out' is natural modern English without unnecessary archaism.
- source_word: וַיַּכֶּה
  chosen: struck down
  alternatives:
  - struck
  - smote
  - killed
  lexicon: HALOT
  rationale: נכה often means 'strike' or 'smite,' but here the result is mass death, so 'struck down' preserves both the act and its lethal effect without over-paraphrasing.
- source_word: בְּמַחֲנֵה אַשּׁוּר
  chosen: in the camp of Assyria
  alternatives:
  - in the Assyrian camp
  lexicon: HALOT
  rationale: The construct phrase literally means 'in the camp of Assyria.' This is retained closely, though 'Assyrian camp' would also be idiomatic English.
- source_word: מֵאָה וּשְׁמֹנִים וַחֲמִשָּׁה אָלֶף
  chosen: 185,000
  alternatives:
  - a hundred and eighty-five thousand
  lexicon: HALOT
  rationale: The Hebrew number is rendered in standard modern English numeral form for readability while preserving exact quantity.
- source_word: וַיַּשְׁכִּימוּ בַבֹּקֶר
  chosen: When they arose early in the morning
  alternatives:
  - And they rose early in the morning
  - When people arose in the morning
  lexicon: HALOT
  rationale: The verb is 3mp with an unspecified subject. English naturally supplies an indefinite plural. 'When they arose early in the morning' preserves the temporal flow and the early-rising nuance of שׁכם.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - and look
  - and there were
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to a startling sight. 'Behold' preserves the dramatic force better than flatter alternatives.
- source_word: כֻלָּם
  chosen: all of them
  alternatives:
  - all
  - every one of them
  lexicon: HALOT
  rationale: The pronominal suffix is explicit in Hebrew; 'all of them' preserves that emphasis.
- source_word: פְּגָרִים מֵתִים
  chosen: dead bodies
  alternatives:
  - corpses
  - dead corpses
  lexicon: HALOT
  rationale: פְּגָרִים already means 'corpses/bodies,' while מֵתִים intensifies or clarifies that they are dead. English 'dead bodies' captures the idiomatic force without the awkward redundancy of 'dead corpses.'
