id: ISA.37.21
reference: Isaiah 37:21
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֙ יְשַֽׁעְיָ֣הוּ בֶן אָמ֔וֹץ אֶל חִזְקִיָּ֖הוּ לֵ/אמֹ֑ר כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל אֲשֶׁר֙ הִתְפַּלַּ֣לְתָּ אֵלַ֔/י אֶל סַנְחֵרִ֖יב מֶ֥לֶךְ אַשּֽׁוּר־־־־׃
translation:
  text: 'Then Isaiah son of Amoz sent to Hezekiah, saying, “Thus says Yahweh, the God of Israel: Because you have prayed to me concerning Sennacherib king of Assyria,”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “What you have prayed to me concerning Sennacherib king of Assyria—” The Hebrew clause is elliptical and continues into the following statement.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “the LORD” represents the divine name YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent word
  - sent a message
  lexicon: HALOT
  rationale: The verb simply means 'sent.' In context the object is implicit, so English can supply the idiomatic sense by 'sent to Hezekiah' without overtranslating to 'sent word' in the main text.
- source_word: יְשַׁעְיָהוּ בֶן אָמוֹץ
  chosen: Isaiah son of Amoz
  alternatives:
  - Isaiah the son of Amoz
  rationale: Personal names are transliterated by standard convention. 'Son of Amoz' is a straightforward patronymic; omitting 'the' keeps the line natural in modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard messenger/report formula. 'Saying' preserves the Hebrew construction concisely.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: This is the conventional prophetic formula. Present-tense 'says' is idiomatic in English for quoted divine speech and preserves the force of the formula.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: Construct chain rendered transparently and naturally in English.
- source_word: אֲשֶׁר
  chosen: Because
  alternatives:
  - that which
  - whom
  - as for what
  lexicon: HALOT
  rationale: Here אֲשֶׁר introduces the content/basis for the following oracle in a way that is elliptical in Hebrew. In English, 'Because' best captures the sense carried by the parallel in 2 Kings 19:20 ('because you have prayed... I have heard'). It makes the sentence coherent without forcing a wooden relative clause.
- source_word: הִתְפַּלַּלְתָּ אֵלַי
  chosen: you have prayed to me
  alternatives:
  - you prayed to me
  - you have interceded with me
  lexicon: HALOT
  rationale: The hitpael of פלל here means 'to pray.' Present perfect in English fits the completed action with present relevance in the divine response.
- source_word: אֶל סַנְחֵרִיב
  chosen: concerning Sennacherib
  alternatives:
  - about Sennacherib
  - against Sennacherib
  - to Sennacherib
  lexicon: HALOT
  rationale: Although the preposition is literally 'to/toward,' with verbs of prayer it can mark the matter prayed about. 'Concerning' is the clearest idiomatic rendering here. 'Against' is interpretive and too strong; 'to Sennacherib' would misconstrue the syntax.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: king of Assyria
  alternatives:
  - the king of Assyria
  lexicon: HALOT
  rationale: Simple construct chain. The article is not required in English apposition after the proper name.
