id: ISA.54.5
reference: Isaiah 54:5
source:
  edition: WLC
  text: כִּ֤י בֹעֲלַ֨יִ/ךְ֙ עֹשַׂ֔יִ/ךְ יְהוָ֥ה צְבָא֖וֹת שְׁמ֑/וֹ וְ/גֹֽאֲלֵ/ךְ֙ קְד֣וֹשׁ יִשְׂרָאֵ֔ל אֱלֹהֵ֥י כָל הָ/אָ֖רֶץ יִקָּרֵֽא־׃
translation:
  text: For your husband is your Maker; Yahweh of Armies is his name. And your Redeemer is the Holy One of Israel; he is called the God of all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'the LORD of Hosts.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he will be called the God of all the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding reassurance. 'For' fits the explanatory force in English and preserves the connection without over-expanding.
- source_word: בֹעֲלַיִךְ
  chosen: your husband
  alternatives:
  - your master
  - your lord
  lexicon: HALOT
  rationale: From בעל in the participial form with 2fs suffix. In this context of Zion as a woman, the marital sense is primary and should be rendered explicitly as 'husband,' not the broader 'master.'
- source_word: עֹשַׂיִךְ
  chosen: your Maker
  alternatives:
  - the one who made you
  lexicon: HALOT
  rationale: Participial form of עשה with 2fs suffix functions as a title. 'Maker' is concise, idiomatic, and preserves the appositional force with 'your husband.' Capitalized as a divine title in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of Hosts
  lexicon: HALOT
  rationale: The underlying sense is military/multitudinous forces. 'Of Armies' is more transparent to modern readers than the traditional but opaque 'of Hosts,' while preserving the title's force.
- source_word: שְׁמוֹ
  chosen: is his name
  alternatives:
  - his name is
  lexicon: HALOT
  rationale: A standard titular formula. 'Is his name' preserves the Hebrew word order naturally enough in English and keeps the solemn cadence.
- source_word: וְגֹאֲלֵךְ
  chosen: your Redeemer
  alternatives:
  - the one who redeems you
  - your kinsman-redeemer
  lexicon: HALOT
  rationale: גאל denotes redemption, often with covenantal and kinship overtones. 'Redeemer' is the most established and readable title here; 'kinsman-redeemer' would over-specify a nuance not explicit in this verse.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  lexicon: HALOT
  rationale: A fixed Isaianic divine title that should be preserved consistently and literally.
- source_word: אֱלֹהֵי כָל הָאָרֶץ
  chosen: the God of all the earth
  alternatives:
  - God of the whole earth
  lexicon: HALOT
  rationale: Construct phrase indicating universal sovereignty. 'Of all the earth' is a natural rendering and preserves the comprehensive scope.
- source_word: יִקָּרֵא
  chosen: he is called
  alternatives:
  - he will be called
  - he is proclaimed
  lexicon: HALOT
  rationale: Niphal imperfect of קרא can be rendered as a present gnomic/passive in English in this titular context. 'He is called' reads naturally and expresses recognized identity rather than a merely future naming event.
