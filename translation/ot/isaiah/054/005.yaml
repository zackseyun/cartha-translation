theological_decisions:
- issue: Metaphorical marital language for Zion/Jerusalem and God
  chosen_reading: 'Retain the explicit marital metaphor: ''your husband is your Maker.'''
  alternative_readings:
  - Soften to 'your lord/master is your maker'
  rationale: The Hebrew uses בעל in a context addressing Zion as a woman. Preserving 'husband' maintains the covenantal and relational imagery without importing later doctrinal claims beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering the divine title יְהוָה צְבָאוֹת
  chosen_reading: Yahweh of Armies
  alternative_readings:
  - the LORD of Hosts
  rationale: The translation philosophy prioritizes source transparency and readable modern English. 'Hosts' is traditional but less clear to modern readers; 'Armies' better conveys the lexical sense while retaining the title's majesty.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה; Translation philosophy §§1, 6'
