theological_decisions:
- issue: Referent of 'your children' in a promise addressed to Zion
  chosen_reading: Rendered generically as 'your children' without specifying ethnic, ecclesial, or exclusively male referents.
  alternative_readings:
  - your sons
  - your citizens/inhabitants
  rationale: The Hebrew addresses Zion/Jerusalem as a woman and speaks of her offspring in a collective poetic sense. The translation preserves that imagery without importing a later theological identification or narrowing the promise to males only.
  doctrine_reference: Gender-accurate over gender-neutral; preserve theological tension rather than resolve it.
