id: ISA.54.13
reference: Isaiah 54:13
source:
  edition: WLC
  text: וְ/כָל בָּנַ֖יִ/ךְ לִמּוּדֵ֣י יְהוָ֑ה וְ/רַ֖ב שְׁל֥וֹם בָּנָֽיִ/ךְ־׃
translation:
  text: And all your children will be taught by Yahweh, and great will be the peace of your children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your sons' at both occurrences; Hebrew בנים can denote sons specifically or children more generally.
    reason: lexical_alternative
  - marker: b
    text: '''Peace'' (shalom) can also carry the sense of wholeness, well-being, or flourishing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  chosen: And all
  alternatives:
  - and every
  - all
  lexicon: HALOT
  rationale: 'The conjunction plus כָּל naturally introduces the clause as a continuation: ''And all.'' ''All'' fits the collective sense better than ''every'' in this poetic context.'
- source_word: בָּנַיִ/ךְ
  chosen: your children
  alternatives:
  - your sons
  lexicon: HALOT
  rationale: בנים can mean 'sons' more narrowly or 'children' more broadly. In this promise to Zion/Jerusalem personified as feminine singular, 'children' best conveys the collective offspring/citizens without unnecessarily restricting the sense to males.
- source_word: לִמּוּדֵי
  chosen: taught
  alternatives:
  - disciples
  - learned ones
  - those taught
  lexicon: HALOT
  rationale: The passive/adjectival form from למד denotes those who are taught/instructed. In English, 'will be taught' expresses the predicative sense smoothly and preserves the divine agency implied by the following divine name.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְ/רַב
  chosen: great will be
  alternatives:
  - abundant will be
  - much
  lexicon: HALOT
  rationale: רַב here functions adjectivally/predicatively with an inverted poetic word order. 'Great will be' preserves the emphasis and reads naturally in English poetry.
- source_word: שְׁלֹום
  chosen: the peace
  alternatives:
  - well-being
  - wholeness
  - prosperity
  lexicon: HALOT
  rationale: שׁלום carries a broad sense of peace, wholeness, and well-being. 'Peace' is the most standard and contextually fitting rendering, while the broader semantic range is worth preserving in a footnote.
- source_word: בָּנָיִ/ךְ
  chosen: your children
  alternatives:
  - your sons
  lexicon: HALOT
  rationale: Repeated for consistency with the first occurrence. The collective sense in context favors 'children' rather than the narrower 'sons.'
