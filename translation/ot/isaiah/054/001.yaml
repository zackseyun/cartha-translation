id: ISA.54.1
reference: Isaiah 54:1
source:
  edition: WLC
  text: רָנִּ֥י עֲקָרָ֖ה לֹ֣א יָלָ֑דָה פִּצְחִ֨י רִנָּ֤ה וְ/צַהֲלִי֙ לֹא חָ֔לָה כִּֽי רַבִּ֧ים בְּֽנֵי שׁוֹמֵמָ֛ה מִ/בְּנֵ֥י בְעוּלָ֖ה אָמַ֥ר יְהוָֽה־־־׃
translation:
  text: Sing, barren woman, you who have not given birth; break forth into singing and shout for joy, you who have not been in labor. For the children of the desolate woman are more than the children of the married woman, says Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of the desolate one are many/more numerous than the children of the married woman.' The Hebrew expresses the comparison compactly.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָנִּי
  chosen: Sing
  alternatives:
  - Cry out in song
  - Rejoice
  lexicon: HALOT
  rationale: Imperative feminine singular from רנן, calling for vocal exultation. 'Sing' is natural English and preserves the poetic summons without overexpanding it.
- source_word: עֲקָרָה
  chosen: barren woman
  alternatives:
  - barren one
  - infertile woman
  lexicon: HALOT
  rationale: The adjective/noun denotes a woman unable to bear children. 'Barren woman' is idiomatic and keeps the feminine singular addressee explicit.
- source_word: לֹא יָלָדָה
  chosen: you who have not given birth
  alternatives:
  - who has not borne
  - who did not bear
  lexicon: HALOT
  rationale: Although formally 3fs, in apposition to the vocative it functions descriptively of the addressed woman. 'Given birth' is clear modern English and accurately conveys ילד in this context.
- source_word: פִּצְחִי
  chosen: break forth
  alternatives:
  - burst out
  - break out
  lexicon: HALOT
  rationale: Imperative from פצח, often used for breaking out into song or cries. 'Break forth' preserves the vivid metaphor and poetic register.
- source_word: רִנָּה
  chosen: into singing
  alternatives:
  - with a ringing cry
  - with rejoicing
  lexicon: HALOT
  rationale: The noun denotes a ringing cry of joy. Combined with פצחי, 'break forth into singing' is a natural English collocation that preserves the joyful vocal sense.
- source_word: וְצַהֲלִי
  chosen: and shout for joy
  alternatives:
  - and cry aloud
  - and exult
  lexicon: HALOT
  rationale: Imperative from צהל, denoting loud joyful crying. 'Shout for joy' captures both volume and celebratory tone better than the more generic 'cry aloud.'
- source_word: לֹא חָלָה
  chosen: you who have not been in labor
  alternatives:
  - you who have not travailed
  - you who have not had labor pains
  lexicon: HALOT
  rationale: From חוּל/חיל in the sense of writhing or laboring in childbirth. 'Been in labor' is accessible modern English and contextually precise.
- source_word: כִּי רַבִּים
  chosen: For ... are more
  alternatives:
  - For many are
  - For more numerous are
  lexicon: HALOT
  rationale: 'The predicate adjective with comparative מן yields a comparative sense in context. English requires supplying the comparison explicitly: ''are more than.'''
- source_word: בְּנֵי שׁוֹמֵמָה
  chosen: the children of the desolate woman
  alternatives:
  - the sons of the desolate one
  - the children of the deserted woman
  lexicon: HALOT
  rationale: בנים can mean children generally; 'children' avoids implying only males. שוממה denotes one laid waste/desolate. Given the feminine imagery, 'desolate woman' makes the metaphor explicit in English.
- source_word: מִבְּנֵי בְעוּלָה
  chosen: than the children of the married woman
  alternatives:
  - than the sons of the married woman
  - than the children of her who has a husband
  lexicon: HALOT
  rationale: בעולה denotes a woman possessed by or joined to a husband, hence married. The prefixed מן marks comparison. 'Married woman' is concise and idiomatic.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - said the LORD
  - declares the LORD
  lexicon: HALOT
  rationale: Prophetic citation formula often functions performatively in English present tense. Per doctrine, יְהוָה is rendered 'the LORD,' not transliterated.
