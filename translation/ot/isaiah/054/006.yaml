- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Marital metaphor for Zion
  chosen_reading: Retain the wife/marriage imagery directly
  alternative_readings:
  - Generalize to 'woman' language throughout
  - Paraphrase as 'people/city'
  rationale: The verse explicitly uses marital imagery to describe Zion's relationship to God. Preserving that metaphor maintains the prophetic and theological force without importing later doctrinal claims.
