id: ISA.54.6
reference: Isaiah 54:6
source:
  edition: WLC
  text: כִּֽי כְ/אִשָּׁ֧ה עֲזוּבָ֛ה וַ/עֲצ֥וּבַת ר֖וּחַ קְרָאָ֣/ךְ יְהוָ֑ה וְ/אֵ֧שֶׁת נְעוּרִ֛ים כִּ֥י תִמָּאֵ֖ס אָמַ֥ר אֱלֹהָֽיִ/ךְ־׃
translation:
  text: For Yahweh has called you like a wife forsaken and grieved in spirit, like a wife of youth when she is rejected, says your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a woman forsaken and grieved in spirit.' The Hebrew אִשָּׁה can mean either 'woman' or 'wife'; the marital context favors 'wife.'
    reason: lexical_alternative
  - marker: b
    text: Or 'like a wife of one's youth when she is rejected/despised.' The Hebrew clause is compact and may be taken with slightly different nuances.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding reassurance; 'For' fits the discourse flow naturally in English.
- source_word: כְאִשָּׁה
  chosen: like a wife
  alternatives:
  - like a woman
  lexicon: HALOT
  rationale: אִשָּׁה can mean 'woman' or 'wife'; in this marital metaphor, 'wife' is contextually specific and clearer.
- source_word: עֲזוּבָה
  chosen: forsaken
  alternatives:
  - abandoned
  - left
  lexicon: HALOT
  rationale: Retains the covenant-relational force of being left behind; 'forsaken' is weightier and suits prophetic diction without becoming archaic.
- source_word: וַעֲצוּבַת רוּחַ
  chosen: and grieved in spirit
  alternatives:
  - and hurt in spirit
  - and distressed in spirit
  lexicon: HALOT
  rationale: The phrase describes inner emotional anguish. 'Grieved in spirit' is idiomatic, readable, and preserves the anthropological language of רוּחַ as the inner life/spirit.
- source_word: קְרָאָךְ
  chosen: has called you
  alternatives:
  - calls you
  - summoned you
  lexicon: HALOT
  rationale: 'The qatal form is best rendered as a completed action with present relevance in context: the LORD has addressed/restored Zion. ''Called you'' preserves the direct verbal image.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְאֵשֶׁת נְעוּרִים
  chosen: like a wife of youth
  alternatives:
  - and a youthful wife
  - like the wife of one's youth
  lexicon: HALOT
  rationale: The construct phrase evokes a woman married in youth. 'Wife of youth' preserves the Hebrew imagery more closely than smoothing it into an interpretive paraphrase.
- source_word: כִּי תִמָּאֵס
  chosen: when she is rejected
  alternatives:
  - though she is rejected
  - if she is rejected
  - when she is despised
  lexicon: HALOT
  rationale: The clause is syntactically difficult, but in context it most naturally describes the condition of the youthful wife. 'Rejected' fits the Niphal sense and the marriage metaphor. 'When' gives a natural temporal/conditional nuance without overcommitting to a more interpretive reading.
- source_word: אָמַר אֱלֹהָיִךְ
  chosen: says your God
  alternatives:
  - says your God to you
  - said your God
  lexicon: HALOT
  rationale: Prophetic speech formulas are commonly rendered with the English present 'says.' 'Your God' preserves the covenantal relationship.
