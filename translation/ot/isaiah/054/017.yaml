id: ISA.54.17
reference: Isaiah 54:17
source:
  edition: WLC
  text: כָּל כְּלִ֞י יוּצַ֤ר עָלַ֨יִ/ךְ֙ לֹ֣א יִצְלָ֔ח וְ/כָל לָשׁ֛וֹן תָּֽקוּם אִתָּ֥/ךְ לַ/מִּשְׁפָּ֖ט תַּרְשִׁ֑יעִי זֹ֡את נַחֲלַת֩ עַבְדֵ֨י יְהוָ֧ה וְ/צִדְקָתָ֛/ם מֵ/אִתִּ֖/י נְאֻם יְהוָֽה־־־־׃ס
translation:
  text: No weapon formed against you will succeed, and every tongue that rises against you in judgment you will condemn. This is the heritage of the servants of Yahweh, and their righteousness is from me, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will prove guilty.' The Hebrew verb means to declare someone guilty or condemn them in a legal sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'their vindication is from me.' The Hebrew can carry a forensic sense in this legal context.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּלִי
  chosen: weapon
  alternatives:
  - tool
  - vessel
  - instrument
  lexicon: HALOT
  rationale: In context with 'formed against you' and 'will not succeed,' the noun refers to an implement fashioned for attack. 'Weapon' captures the hostile sense better than the broader 'tool' or 'vessel'.
- source_word: יוּצַר
  chosen: formed
  alternatives:
  - fashioned
  - forged
  lexicon: HALOT
  rationale: The passive of יצר denotes something shaped or fashioned. 'Formed' is natural English and broad enough to cover any hostile implement without over-specifying metalwork.
- source_word: עָלַיִךְ
  chosen: against you
  alternatives:
  - upon you
  - over you
  lexicon: HALOT
  rationale: With hostile context, על is best rendered idiomatically as 'against you' rather than the more spatial 'upon you.'
- source_word: יִצְלָח
  chosen: will succeed
  alternatives:
  - will prosper
  - will prevail
  lexicon: HALOT
  rationale: The verb often means to prosper or succeed. Here it describes the effectiveness of a weapon; 'will succeed' is clear modern English and fits the military/legal parallelism.
- source_word: לָשׁוֹן
  chosen: tongue
  alternatives:
  - speech
  - accusation
  lexicon: HALOT
  rationale: The Hebrew literally says 'tongue.' Retaining the metaphor preserves the vividness of the source while still being intelligible in English.
- source_word: תָּקוּם
  chosen: rises
  alternatives:
  - stands up
  - arises
  lexicon: HALOT
  rationale: The verb קום here conveys hostile emergence in a legal setting. 'Rises' is idiomatic with 'against you' and preserves the imagery.
- source_word: לַמִּשְׁפָּט
  chosen: in judgment
  alternatives:
  - for judgment
  - at law
  - in court
  lexicon: HALOT
  rationale: The phrase marks a forensic setting. 'In judgment' preserves the legal sense without narrowing it too specifically to a modern courtroom.
- source_word: תַּרְשִׁיעִי
  chosen: you will condemn
  alternatives:
  - you will prove guilty
  - you will declare wicked
  lexicon: HALOT
  rationale: The Hiphil of רשע means to declare guilty or condemn. 'You will condemn' is concise and idiomatic, though the underlying sense of proving guilt is preserved in a footnote alternative.
- source_word: נַחֲלַת
  chosen: heritage
  alternatives:
  - inheritance
  - portion
  lexicon: HALOT
  rationale: The noun denotes an inherited possession or allotted share. 'Heritage' fits the covenantal tone and reads naturally in English.
- source_word: עַבְדֵי
  chosen: servants
  alternatives:
  - slaves
  lexicon: HALOT
  rationale: Although עבד can mean 'slave,' here the phrase 'servants of the LORD' is a covenantal title for the LORD's people rather than emphasizing bonded status. 'Servants' best fits the context and the project's context-dependent policy on bonded terms.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צִדְקָתָם
  chosen: their righteousness
  alternatives:
  - their vindication
  - their justice
  lexicon: HALOT
  rationale: The noun can denote righteousness or vindication in context. Because the verse speaks of the LORD's favorable legal verdict for his servants, 'righteousness' is retained in the main text for consistency with the project's default, while the forensic nuance is preserved in a footnote.
- source_word: מֵאִתִּי
  chosen: from me
  alternatives:
  - comes from me
  - is from me
  lexicon: HALOT
  rationale: The prepositional phrase indicates source. In English, 'is from me' is supplied smoothly with the nominal clause.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is well represented by 'declares the LORD,' which is both readable and weighty.
