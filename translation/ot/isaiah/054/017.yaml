theological_decisions:
- issue: Meaning of צִדְקָתָם in the final clause
  chosen_reading: their righteousness is from me
  alternative_readings:
  - their vindication is from me
  rationale: The Hebrew can denote either moral/legal righteousness or forensic vindication. The main text keeps 'righteousness' for lexical consistency and because the source term is the standard righteousness word, while the legal context makes 'vindication' a meaningful alternative preserved in a footnote. This preserves theological tension rather than collapsing the term into only one nuance.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Contested terms table for δικαιοσύνη/righteousness-justice principle applied analogically to Hebrew צֶדֶק vocabulary.'
