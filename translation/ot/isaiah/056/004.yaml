theological_decisions:
- issue: Meaning of סָרִיסִים in this context
  chosen_reading: literal eunuchs
  alternative_readings:
  - court officials
  rationale: The immediate context (Isa 56:3-5) concerns inclusion of those formerly excluded, especially foreigners and eunuchs. Rendering the term as 'court officials' would obscure the passage's redemptive reversal and its link to Torah exclusion language.
