id: ISA.56.4
reference: Isaiah 56:4
source:
  edition: WLC
  text: כִּי כֹ֣ה אָמַ֣ר יְהוָ֗ה לַ/סָּֽרִיסִים֙ אֲשֶׁ֤ר יִשְׁמְרוּ֙ אֶת שַׁבְּתוֹתַ֔/י וּ/בָֽחֲר֖וּ בַּ/אֲשֶׁ֣ר חָפָ֑צְתִּי וּ/מַחֲזִיקִ֖ים בִּ/בְרִיתִֽ/י־׀־׃
translation:
  text: 'For thus says Yahweh to the eunuchs who keep my Sabbaths, who choose what I delight in, and who hold fast to my covenant:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'court officials,' since the Hebrew term can denote royal officials in some contexts; here the context strongly favors literal 'eunuchs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the divine declaration as grounding what precedes; 'For' fits the discourse connection naturally in English.
- source_word: כֹה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'thus says' preserves the formal prophetic tone without unnecessary paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לַסָּרִיסִים
  chosen: to the eunuchs
  alternatives:
  - to the court officials
  lexicon: HALOT
  rationale: While סָרִיס can in some contexts mean a royal official, Isaiah 56 explicitly addresses those excluded from assembly due to bodily status (cf. Deut 23:1; Isa 56:3), so 'eunuchs' is the contextually specific and theologically important sense.
- source_word: אֲשֶׁר יִשְׁמְרוּ
  chosen: who keep
  alternatives:
  - who observe
  - who guard
  lexicon: HALOT
  rationale: '''Keep'' is idiomatic covenantal language in English and preserves the sense of faithful observance.'
- source_word: שַׁבְּתוֹתַי
  chosen: my Sabbaths
  alternatives:
  - my Sabbath days
  lexicon: HALOT
  rationale: Plural form is explicit in Hebrew; 'my Sabbaths' preserves both the plurality and covenantal ownership signaled by the suffix.
- source_word: וּבָחֲרוּ
  chosen: and choose
  alternatives:
  - and choose deliberately
  - and prefer
  lexicon: HALOT
  rationale: Simple present 'choose' matches the Hebrew verbal sequence and keeps the ethical volition in view.
- source_word: בַּאֲשֶׁר חָפָצְתִּי
  chosen: what I delight in
  alternatives:
  - what pleases me
  - that which I desire
  lexicon: HALOT
  rationale: חפץ conveys pleasure/delight/will. 'What I delight in' is natural English and preserves the personal, affective dimension of God's will.
- source_word: וּמַחֲזִיקִים
  chosen: and hold fast
  alternatives:
  - and cling
  - and take hold
  lexicon: HALOT
  rationale: The participle conveys ongoing adherence. 'Hold fast' is idiomatic for steadfast covenant loyalty and fits the parallelism.
- source_word: בִּבְרִיתִי
  chosen: to my covenant
  alternatives:
  - my covenant
  - in my covenant
  lexicon: HALOT
  rationale: With החזיק plus ב, English idiom is best represented by 'hold fast to my covenant,' expressing firm adherence rather than mere location or possession.
