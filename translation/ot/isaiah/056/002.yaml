id: ISA.56.2
reference: Isaiah 56:2
source:
  edition: WLC
  text: אַשְׁרֵ֤י אֱנוֹשׁ֙ יַעֲשֶׂה זֹּ֔את וּ/בֶן אָדָ֖ם יַחֲזִ֣יק בָּ֑/הּ שֹׁמֵ֤ר
    שַׁבָּת֙ מֵֽ/חַלְּל֔/וֹ וְ/שֹׁמֵ֥ר יָד֖/וֹ מֵ/עֲשׂ֥וֹת כָּל רָֽע־־־׃ס
translation:
  text: 'Blessed is the man who does this, and the son of man who holds fast to it:
    keeping the Sabbath from profaning it, and keeping his hand from doing any evil.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'son of man,' a common idiom here meaning a human being or mortal,
      parallel to 'the man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  - Fortunate is
  lexicon: HALOT
  rationale: The plural-of-intensity interjection introduces a beatitude-like blessing.
    'Blessed is' preserves the elevated covenantal tone better than the more psychological
    'happy is' or the flatter 'fortunate is.'
- source_word: אֱנוֹשׁ
  chosen: the man
  alternatives:
  - the person
  - a man
  lexicon: HALOT
  rationale: אֱנוֹשׁ denotes a human being, often with emphasis on mortal man. Given
    the parallel with 'son of man' and the translation philosophy's gender-accurate
    principle, 'the man' best preserves the representative masculine singular rather
    than neutralizing to 'the person.'
- source_word: וּבֶן אָדָם
  chosen: the son of man
  alternatives:
  - the son of Adam
  - the human being
  lexicon: HALOT
  rationale: The phrase is a common Hebrew idiom for a human being/mortal, here parallel
    to אֱנוֹשׁ. 'The son of man' preserves the Hebrew expression and literary parallelism.
    Because English readers may hear later messianic overtones, the idiomatic sense
    is clarified in a footnote rather than flattening the phrase in the main text.
- source_word: יַחֲזִיק בָּהּ
  chosen: holds fast to it
  alternatives:
  - takes hold of it
  - keeps hold of it
  lexicon: HALOT
  rationale: The Hiphil of חזק with ב conveys firm grasp or adherence. 'Holds fast
    to it' communicates persevering commitment, fitting the ethical exhortation.
- source_word: שֹׁמֵר
  chosen: keeping
  alternatives:
  - guarding
  - observing
  lexicon: HALOT
  rationale: The participle denotes ongoing careful observance. 'Keeping' is idiomatic
    in English for commandments and Sabbath observance while still reflecting the
    guarding nuance.
- source_word: שַׁבָּת
  chosen: the Sabbath
  alternatives:
  - Sabbath
  lexicon: HALOT
  rationale: With English idiom, 'the Sabbath' naturally refers to the covenant day
    of rest and preserves the specific cultic-ethical reference.
- source_word: מֵחַלְּלוֹ
  chosen: from profaning it
  alternatives:
  - from desecrating it
  - so as not to violate it
  lexicon: HALOT
  rationale: חלל in the Piel means to profane or treat as common. 'Profaning it' is
    the most direct and theologically weighty rendering for Sabbath violation.
- source_word: יָדוֹ
  chosen: his hand
  alternatives:
  - his actions
  - himself
  lexicon: HALOT
  rationale: The Hebrew uses 'hand' concretely as a metonym for action. Retaining
    'his hand' preserves the vivid Hebrew imagery while remaining intelligible in
    English.
- source_word: מֵעֲשׂוֹת כָּל רָע
  chosen: from doing any evil
  alternatives:
  - from doing all evil
  - from doing what is evil
  lexicon: HALOT
  rationale: כָּל with a negative-preventive construction is idiomatically rendered
    'any evil' in English. This avoids the misleading sense that the phrase refers
    to 'all kinds' distributively while preserving the comprehensive prohibition.
