theological_decisions:
- issue: Representative masculine language in a beatitude addressed broadly to humanity
  chosen_reading: Retain 'the man' and 'the son of man' in the main text
  alternative_readings:
  - the person ... the human being
  rationale: The Hebrew uses masculine singular forms generically and poetically.
    Per the doctrine's gender-accurate principle, the translation preserves the representative
    masculine rather than neutralizing it. A footnote can clarify the generic human
    sense where helpful.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Potential messianic misunderstanding of 'son of man'
  chosen_reading: Keep the idiom 'the son of man' with explanatory footnote
  alternative_readings:
  - the human being
  rationale: In Isaiah 56:2 the phrase functions as a Hebrew idiom parallel to אֱנוֹשׁ,
    not as an explicit messianic title. Preserving the idiom respects the source text
    and literary texture, while a footnote prevents overreading.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 4
