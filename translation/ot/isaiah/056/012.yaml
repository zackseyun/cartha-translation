id: ISA.56.12
reference: Isaiah 56:12
source:
  edition: WLC
  text: אֵתָ֥יוּ אֶקְחָה יַ֖יִן וְ/נִסְבְּאָ֣ה שֵׁכָ֑ר וְ/הָיָ֤ה כָ/זֶה֙ י֣וֹם מָחָ֔ר
    גָּד֖וֹל יֶ֥תֶר מְאֹֽד־׃
translation:
  text: Come, let me get wine, and let us fill ourselves with strong drink; and tomorrow
    will be like this day, great beyond measure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and let us drink our fill of strong drink'; the Hebrew verb can emphasize
      being filled or satiated, with drunken excess implied by context.
    reason: lexical_alternative
  - marker: b
    text: Or 'and tomorrow will be like today, even greater—much more so.' The final
      Hebrew phrase intensifies the boast about tomorrow's abundance.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵתָיוּ
  chosen: Come
  alternatives:
  - Come on
  - Come here
  lexicon: HALOT
  rationale: An interjection/invitation addressed to a group. 'Come' is the most natural
    concise English equivalent and fits the taunting, convivial tone of the speakers.
- source_word: אֶקְחָה
  chosen: let me get
  alternatives:
  - I will get
  - let me take
  lexicon: HALOT
  rationale: From לקח, here in a cohortative-like first person form expressing volition.
    'Let me get' captures the invitational sense better than the more wooden 'I will
    take'.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering for יין.
- source_word: וְנִסְבְּאָה
  chosen: and let us fill ourselves
  alternatives:
  - and let us drink our fill
  - and let us become drunk
  lexicon: HALOT
  rationale: From סבא, 'to be sated / filled,' often with drink. 'Fill ourselves'
    preserves the underlying image without over-specifying intoxication, though drunken
    excess is implied by context.
- source_word: שֵׁכָר
  chosen: strong drink
  alternatives:
  - beer
  - intoxicating drink
  lexicon: HALOT
  rationale: Traditional but still understandable rendering for an alcoholic beverage
    other than wine. 'Strong drink' is broad enough to cover the Hebrew term without
    anachronistically narrowing it.
- source_word: וְהָיָה
  chosen: and ... will be
  alternatives:
  - and it will be
  - and there will be
  lexicon: HALOT
  rationale: 'Simple future/resultative use of היה. In English the subject is supplied
    by the following phrase: ''tomorrow will be...''.'
- source_word: כָזֶה
  chosen: like this
  alternatives:
  - like this one
  - just like this
  lexicon: HALOT
  rationale: Comparative demonstrative referring to the present day/situation. 'Like
    this' is idiomatic and sufficiently close.
- source_word: יוֹם מָחָר
  chosen: tomorrow
  alternatives:
  - the day tomorrow
  - tomorrow's day
  lexicon: HALOT
  rationale: The phrase is naturally rendered adverbially in English as 'tomorrow'
    rather than more woodenly as 'the day tomorrow'.
- source_word: גָּדוֹל
  chosen: great
  alternatives:
  - big
  - abundant
  lexicon: HALOT
  rationale: Retains the basic adjective and the boastful tone of anticipated abundance.
- source_word: יֶתֶר מְאֹד
  chosen: beyond measure
  alternatives:
  - exceedingly more
  - far more
  - much more
  lexicon: HALOT
  rationale: 'The combination intensifies the comparison: not merely similar, but
    much greater. ''Beyond measure'' communicates strong intensification in natural
    English, while avoiding awkward literalism.'
