theological_decisions:
- issue: Rendering the divine name in the title אֲדֹנָי יְהוָה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - the Sovereign LORD
  rationale: Doctrine specifies YHWH -> 'the LORD.' In the compound Adonai YHWH, English
    convention uses 'Lord GOD' to avoid the awkward 'Lord LORD' while still signaling
    the Tetragrammaton. This is a translation convention rather than a doctrinal expansion.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH -> the LORD'
- issue: Referent of the singular suffixes in עָלָיו / נִקְבָּצָיו
  chosen_reading: singular collective reference to Israel ('to him')
  alternative_readings:
  - 'plural sense smoothed in English: ''to them'''
  - reference to the land/Zion rather than Israel
  rationale: The Hebrew uses singular suffixes after 'the outcasts of Israel.' Retaining
    the singular in English preserves the collective-personified sense and avoids
    prematurely resolving the referent to a plural group. Because the syntax is debated,
    the alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
