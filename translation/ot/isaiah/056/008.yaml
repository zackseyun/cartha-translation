id: ISA.56.8
reference: Isaiah 56:8
source:
  edition: WLC
  text: נְאֻם֙ אֲדֹנָ֣/י יְהוִ֔ה מְקַבֵּ֖ץ נִדְחֵ֣י יִשְׂרָאֵ֑ל ע֛וֹד אֲקַבֵּ֥ץ עָלָ֖י/ו
    לְ/נִקְבָּצָֽי/ו׃
translation:
  text: 'The declaration of the Lord GOD, who gathers the outcasts of Israel: I will
    gather still more to him besides those already gathered to him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will gather yet others to them, besides those already gathered.' The
      Hebrew suffixes are singular, but some understand the sense collectively and
      render the reference in plural English.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the Lord GOD' represents אֲדֹנָי יְהוָה, literally 'Lord YHWH.'
      English convention uses 'GOD' here to signal the divine name without saying
      'Lord LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְאֻם
  chosen: The declaration of
  alternatives:
  - declares
  - utterance of
  lexicon: HALOT
  rationale: Introduces a solemn divine pronouncement. 'The declaration of' preserves
    the noun form more closely than a verbal paraphrase like 'declares,' while remaining
    natural English.
- source_word: אֲדֹנָי יְהוָה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  - the Sovereign LORD
  lexicon: HALOT
  rationale: The compound title combines Adonai with YHWH. Following doctrine, YHWH
    is rendered 'the LORD.' Because English convention often avoids 'Lord LORD,' 'GOD'
    signals the divine name in this pairing. 'Sovereign LORD' is interpretive and
    less formally tied to the Hebrew components.
- source_word: מְקַבֵּץ
  chosen: who gathers
  alternatives:
  - gathering
  - who is gathering
  lexicon: HALOT
  rationale: The participle functions attributively for the divine subject, describing
    him as the one who gathers. 'Who gathers' is clear and idiomatic.
- source_word: נִדְחֵי יִשְׂרָאֵל
  chosen: the outcasts of Israel
  alternatives:
  - the dispersed of Israel
  - the banished of Israel
  lexicon: HALOT
  rationale: The noun from נדח denotes those driven away or scattered. 'Outcasts'
    preserves the sense of being cast out/exiled and matches common prophetic usage
    better than the more neutral 'dispersed.'
- source_word: עוֹד
  chosen: still more
  alternatives:
  - again
  - yet
  - further
  lexicon: HALOT
  rationale: Here the adverb intensifies the promise of additional gathering beyond
    the present group. 'Still more' captures the additive force better than simply
    'again.'
- source_word: אֲקַבֵּץ
  chosen: I will gather
  alternatives:
  - I gather
  - I am about to gather
  lexicon: HALOT
  rationale: Imperfect with divine speech naturally expresses future intention/promise
    in context.
- source_word: עָלָיו
  chosen: to him
  alternatives:
  - upon him
  - to it
  - to them
  lexicon: HALOT
  rationale: The preposition על with suffix here is idiomatic and difficult. In context
    it most naturally refers back to Israel/Jacob as a collective singular, yielding
    'to him,' i.e., to Israel. This preserves the singular suffix rather than smoothing
    to plural in the main text.
- source_word: לְנִקְבָּצָיו
  chosen: besides those already gathered to him
  alternatives:
  - to his gathered ones
  - to those of his who are gathered
  - in addition to his gathered ones
  lexicon: HALOT
  rationale: The phrase marks addition to an existing gathered group. The expanded
    rendering makes explicit the comparative/additive sense of ל and the passive/resultative
    force of the participle, while retaining the 3ms suffix with 'to him.'
