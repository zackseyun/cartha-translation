id: ISA.56.10
reference: Isaiah 56:10
source:
  edition: WLC
  text: צפו עִוְרִ֤ים כֻּלָּ/ם֙ לֹ֣א יָדָ֔עוּ כֻּלָּ/ם֙ כְּלָבִ֣ים אִלְּמִ֔ים לֹ֥א
    יוּכְל֖וּ לִ/נְבֹּ֑חַ הֹזִים֙ שֹֽׁכְבִ֔ים אֹהֲבֵ֖י לָ/נֽוּם׃
translation:
  text: His watchmen are blind, all of them; they know nothing. All of them are mute
    dogs, unable to bark, dreaming, lying down, loving to slumber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'muttering' for 'dreaming' (הֹזִים); the Hebrew term is rare and contextually
      difficult. The main text follows the sense suggested by the surrounding sleep
      imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: צפו
  chosen: His watchmen
  alternatives:
  - watchmen
  - lookouts
  - sentinels
  lexicon: HALOT
  rationale: From צפה in a nominal/participial sense, referring to those appointed
    to keep watch. The suffix sense ('his') is reflected by context and traditional
    parsing of the defective form here. 'Watchmen' is the most natural English equivalent
    in prophetic critique.
- source_word: עִוְרִים
  chosen: blind
  lexicon: HALOT
  rationale: Literal adjective 'blind.' In context it is metaphorical for leaders
    lacking perception, but the translation preserves the concrete image.
- source_word: לֹא יָדָעוּ
  chosen: they know nothing
  alternatives:
  - they do not know
  - they are ignorant
  lexicon: HALOT
  rationale: ידע with negation expresses lack of understanding or discernment. 'Know
    nothing' gives idiomatic force without over-paraphrasing.
- source_word: כְּלָבִים אִלְּמִים
  chosen: mute dogs
  alternatives:
  - silent dogs
  - dumb dogs
  lexicon: HALOT
  rationale: Retains the sharp prophetic insult and imagery. 'Mute' is clear modern
    English and avoids the misleading modern sense of 'dumb.'
- source_word: לֹא יוּכְלוּ לִנְבֹּחַ
  chosen: unable to bark
  alternatives:
  - they cannot bark
  lexicon: HALOT
  rationale: Expresses incapacity plainly and naturally in English while preserving
    the canine metaphor.
- source_word: הֹזִים
  chosen: dreaming
  alternatives:
  - dreamers
  - muttering
  - seeing visions
  lexicon: HALOT
  rationale: This term is difficult. In this context, paired with 'lying down' and
    'loving to slumber,' the sense 'dreaming' best fits the sequence of indolence
    and sleep. Alternatives such as 'muttering' are lexically possible in other contexts
    but fit this verse less well.
- source_word: שֹׁכְבִים
  chosen: lying down
  alternatives:
  - lying around
  - reclining
  lexicon: HALOT
  rationale: Straightforward participle from שכב. 'Lying down' preserves the physical
    image and the progression of laziness.
- source_word: אֹהֲבֵי לָנוּם
  chosen: loving to slumber
  alternatives:
  - loving to sleep
  - fond of dozing
  lexicon: HALOT
  rationale: לנום denotes sleeping/slumbering, often with a nuance of drowsiness.
    'Slumber' fits the prophetic tone and avoids sounding too casual.
