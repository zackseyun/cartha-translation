id: ISA.56.7
reference: Isaiah 56:7
source:
  edition: WLC
  text: וַ/הֲבִיאוֹתִ֞י/ם אֶל הַ֣ר קָדְשִׁ֗/י וְ/שִׂמַּחְתִּי/ם֙ בְּ/בֵ֣ית תְּפִלָּתִ֔/י
    עוֹלֹתֵי/הֶ֧ם וְ/זִבְחֵי/הֶ֛ם לְ/רָצ֖וֹן עַֽל מִזְבְּחִ֑/י כִּ֣י בֵיתִ֔/י בֵּית
    תְּפִלָּ֥ה יִקָּרֵ֖א לְ/כָל הָ/עַמִּֽים־־־־׃
translation:
  text: I will bring them to my holy mountain, and I will make them glad in my house
    of prayer; their burnt offerings and their sacrifices will be accepted on my altar,
    for my house will be called a house of prayer for all peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for all nations.' The Hebrew עַמִּים can denote peoples or nations;
      'peoples' was chosen to preserve the inclusive ethnic scope in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲבִיאוֹתִים
  chosen: I will bring them
  alternatives:
  - I will cause them to come
  - I will bring them in
  lexicon: HALOT
  rationale: Hiphil of בוא with 1cs subject and 3mp object expresses causative movement
    initiated by God. 'I will bring them' is idiomatic English and preserves divine
    agency without overcomplicating the causative nuance.
- source_word: אֶל הַר קָדְשִׁי
  chosen: to my holy mountain
  alternatives:
  - to my sacred mountain
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'Holy mountain' is the established
    and natural English equivalent for the Zion/temple mount imagery and preserves
    the covenantal-sacral sense of קֹדֶשׁ.
- source_word: וְשִׂמַּחְתִּים
  chosen: and I will make them glad
  alternatives:
  - and I will give them joy
  - and I will make them rejoice
  lexicon: HALOT
  rationale: 'Piel of שׂמח is causative/intensive: God causes joy. ''Make them glad''
    is concise, natural, and preserves the causative force better than a weaker stative
    rendering.'
- source_word: בְּבֵית תְּפִלָּתִי
  chosen: in my house of prayer
  alternatives:
  - in my prayer house
  - in my house of worship
  lexicon: HALOT
  rationale: Literally 'in the house of my prayer' or idiomatically 'in my house of
    prayer.' This preserves the temple's characterization specifically as a place
    of prayer, not more generally worship.
- source_word: עוֹלֹתֵיהֶם
  chosen: their burnt offerings
  alternatives:
  - their whole burnt offerings
  lexicon: HALOT
  rationale: עוֹלָה is the standard sacrificial term for a burnt offering. 'Burnt
    offerings' is the clearest conventional rendering in modern English.
- source_word: וְזִבְחֵיהֶם
  chosen: and their sacrifices
  alternatives:
  - and their slaughter offerings
  lexicon: HALOT
  rationale: זֶבַח is a broad sacrificial term. 'Sacrifices' is the best general rendering
    here, especially paired with the more specific 'burnt offerings.'
- source_word: לְרָצוֹן
  chosen: will be accepted
  alternatives:
  - will be acceptable
  - for acceptance
  - favorably
  lexicon: HALOT
  rationale: The noun רָצוֹן with sacrificial language conveys acceptability/favor
    before God. Rendering the clause verbally in English ('will be accepted') communicates
    the sense naturally and clearly.
- source_word: עַל מִזְבְּחִי
  chosen: on my altar
  alternatives:
  - upon my altar
  lexicon: HALOT
  rationale: Simple prepositional phrase. 'On my altar' is idiomatic modern English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason or grounding for the preceding acceptance and joy.
    'For' preserves the explanatory force and fits the elevated style.
- source_word: בֵּיתִי בֵּית תְּפִלָּה
  chosen: my house will be called a house of prayer
  alternatives:
  - my house shall be called a house of prayer
  lexicon: HALOT
  rationale: The repeated בַּיִת creates emphasis. English smooths this into the passive
    clause with predicate nominative while preserving the formal declaration.
- source_word: יִקָּרֵא
  chosen: will be called
  alternatives:
  - shall be called
  - will be proclaimed
  lexicon: HALOT
  rationale: Niphal of קרא here is the standard passive 'be called/named.' 'Will be
    called' is the most direct rendering.
- source_word: לְכָל הָעַמִּים
  chosen: for all peoples
  alternatives:
  - for all nations
  - by all peoples
  lexicon: HALOT
  rationale: עַמִּים commonly means 'peoples' or 'nations.' 'For all peoples' best
    fits the temple's inclusive purpose in context and avoids narrowing the phrase
    to modern nation-states. The preposition ל here is purposive/benefactive rather
    than agentive.
