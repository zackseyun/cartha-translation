theological_decisions:
- issue: Scope of לְכָל הָעַמִּים
  chosen_reading: for all peoples
  alternative_readings:
  - for all nations
  rationale: The verse emphasizes the inclusion of foreigners in worship without flattening
    the covenantal setting. 'Peoples' preserves the broad ethnic/corporate scope of
    עַמִּים and aligns with the immediate context of outsiders joining themselves
    to the LORD. No doctrinal tension is resolved beyond the text's own universal
    horizon.
  doctrine_reference: Translation philosophy §§1, 3, 6
