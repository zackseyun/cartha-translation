theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    for יְהוָה, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relationship between משפט and צדקה
  chosen_reading: Keep justice, and do righteousness
  alternative_readings:
  - Keep judgment, and do justice
  - Observe justice, and practice righteousness
  rationale: The verse uses two closely related but distinct ethical terms. Rendering
    משפט as 'justice' and צדקה as 'righteousness' preserves the semantic distinction
    and theological breadth without collapsing them into synonyms.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
- issue: Meaning of God's צדקה in the second colon
  chosen_reading: my righteousness
  alternative_readings:
  - my justice
  - my vindication
  rationale: In Isaiah, God's צדקה can denote his righteous character, his just action,
    or his saving vindication. 'My righteousness' best preserves this theological
    tension rather than narrowing the sense to only judicial justice or forensic vindication.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
