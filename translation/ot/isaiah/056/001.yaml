id: ISA.56.1
reference: Isaiah 56:1
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה שִׁמְר֥וּ מִשְׁפָּ֖ט וַ/עֲשׂ֣וּ צְדָקָ֑ה כִּֽי קְרוֹבָ֤ה
    יְשֽׁוּעָתִ/י֙ לָ/ב֔וֹא וְ/צִדְקָתִ֖/י לְ/הִגָּלֽוֹת־׃
translation:
  text: 'Thus says the LORD: Keep justice, and do righteousness, for my salvation
    is near to come, and my righteousness to be revealed.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my deliverance is near to come.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my justice' or 'my vindication' to be revealed.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  - So
  lexicon: HALOT
  rationale: Introduces a prophetic declaration formula. 'Thus' preserves the formal
    prophetic tone in natural English.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - said the LORD
  - declares the LORD
  lexicon: HALOT
  rationale: The prophetic formula is idiomatically rendered in present tense in English
    ('says') even with Hebrew qatal, reflecting ongoing authoritative proclamation.
    יְהוָה follows the doctrinal default 'the LORD' rather than 'Yahweh'.
- source_word: שִׁמְרוּ
  chosen: Keep
  alternatives:
  - Observe
  - Guard
  lexicon: HALOT
  rationale: Imperative plural of שמר. 'Keep' is concise and idiomatic with an abstract
    object like משפט, conveying careful observance.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - what is just
  lexicon: HALOT
  rationale: Here the noun denotes just order/right judgment in ethical practice,
    not merely a legal verdict. 'Justice' fits the exhortational context and pairs
    naturally with 'do righteousness.'
- source_word: וַעֲשׂוּ
  chosen: do
  alternatives:
  - practice
  - act with
  lexicon: HALOT
  rationale: A straightforward imperative matching the Hebrew verb עשה. 'Do' preserves
    the compact parallelism of the Hebrew.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: In this pairing with משפט, rendering צדקה as 'righteousness' preserves
    the distinction between the two related ethical terms while retaining their theological
    weight.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the command. 'For' is natural and preserves
    the logical connection.
- source_word: קְרוֹבָה
  chosen: is near
  alternatives:
  - is close
  - draws near
  lexicon: HALOT
  rationale: Predicate adjective agreeing with the feminine noun 'my salvation.' 'Is
    near' is the most idiomatic English rendering.
- source_word: יְשׁוּעָתִי
  chosen: my salvation
  alternatives:
  - my deliverance
  - my victory
  lexicon: HALOT
  rationale: The noun can denote deliverance broadly, but 'salvation' best preserves
    the theological breadth of divine rescue in prophetic context.
- source_word: לָבוֹא
  chosen: to come
  alternatives:
  - to arrive
  lexicon: HALOT
  rationale: Infinitive expressing imminence. 'To come' is the standard and most transparent
    rendering.
- source_word: וְצִדְקָתִי
  chosen: and my righteousness
  alternatives:
  - and my justice
  - and my vindication
  lexicon: HALOT
  rationale: Retains lexical consistency with צדקה above while allowing the phrase
    to carry both God's righteous character and his righteous saving action. Alternatives
    are possible but less broad.
- source_word: לְהִגָּלוֹת
  chosen: to be revealed
  alternatives:
  - to be disclosed
  - to be uncovered
  lexicon: HALOT
  rationale: Niphal infinitive of גלה. 'To be revealed' is idiomatic and preserves
    the theological sense of divine action becoming manifest.
