theological_decisions:
- issue: Rendering of excluded outsider categories in a restoration context
  chosen_reading: Retain both 'foreigner' and 'eunuch' plainly in the main text without
    softening or interpretive expansion.
  alternative_readings:
  - Use broader paraphrases such as 'outsider' or 'official'
  rationale: The verse directly addresses groups who might assume covenantal exclusion.
    Preserving the concrete categories maintains the theological force of inclusion
    without importing later doctrinal conclusions into the verse itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Divine name rendering
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the contested-terms table for יְהוָה.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
