id: ISA.56.3
reference: Isaiah 56:3
source:
  edition: WLC
  text: וְ/אַל יֹאמַ֣ר בֶּן הַ/נֵּכָ֗ר הַ/נִּלְוָ֤ה אֶל יְהוָה֙ לֵ/אמֹ֔ר הַבְדֵּ֧ל
    יַבְדִּילַ֛/נִי יְהוָ֖ה מֵ/עַ֣ל עַמּ֑/וֹ וְ/אַל יֹאמַר֙ הַ/סָּרִ֔יס הֵ֥ן אֲנִ֖י
    עֵ֥ץ יָבֵֽשׁ־־־־׃ס
translation:
  text: Let not the foreigner who has joined himself to the LORD say, “The LORD will
    surely separate me from his people”; and let not the eunuch say, “Look, I am a
    dry tree.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “who joins himself to the LORD.” The Hebrew participle may be rendered
      as ongoing or completed action.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew has an emphatic form: “The LORD will surely separate me from his
      people.”'
    reason: lexical_alternative
  - marker: c
    text: Or “court official” in some contexts; here “eunuch” best fits the context,
      especially the image of being “a dry tree.”
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן הַנֵּכָר
  chosen: the foreigner
  alternatives:
  - the son of a foreign land
  - the foreign son
  - the alien
  lexicon: HALOT
  rationale: Literally 'son of foreignness/foreign land,' an idiom for a foreigner.
    'Foreigner' is natural modern English and preserves the outsider status without
    archaic tone.
- source_word: הַנִּלְוָה אֶל יְהוָה
  chosen: who has joined himself to the LORD
  alternatives:
  - who joins himself to the LORD
  - who has attached himself to the LORD
  lexicon: HALOT
  rationale: The Niphal participle of לוה conveys being joined/attached. 'Has joined
    himself' preserves the reflexive sense and covenantal attachment better than a
    looser 'belongs to.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the stated translation policy.
- source_word: לֵאמֹר
  chosen: say
  alternatives:
  - saying
  lexicon: HALOT
  rationale: In English the infinitive of speech is best absorbed into direct discourse
    rather than rendered woodenly as 'saying.'
- source_word: הַבְדֵּל יַבְדִּילַנִי
  chosen: will surely separate me
  alternatives:
  - will utterly separate me
  - will indeed exclude me
  - has completely separated me
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Will
    surely separate me' captures the emphatic force while keeping the future sense
    of the imperfect.
- source_word: מֵעַל עַמּוֹ
  chosen: from his people
  alternatives:
  - away from his people
  - from among his people
  lexicon: HALOT
  rationale: The preposition plus noun indicates separation from belonging with God's
    people. 'From his people' is idiomatic and sufficiently precise.
- source_word: הַסָּרִיס
  chosen: the eunuch
  alternatives:
  - the court official
  lexicon: HALOT
  rationale: While סָרִיס can in some contexts mean a court official, here the contrast
    with exclusion and the metaphor 'I am a dry tree' strongly favors the physical
    sense 'eunuch,' which is also the traditional and contextually coherent reading.
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  lexicon: HALOT
  rationale: Introduces emphatic self-assessment. 'Look' is readable modern English
    and preserves the deictic force without archaic diction.
- source_word: עֵץ יָבֵשׁ
  chosen: a dry tree
  alternatives:
  - a dried-up tree
  - a barren tree
  lexicon: HALOT
  rationale: The image is literal in wording and metaphorical in force. 'Dry tree'
    preserves the Hebrew metaphor compactly; 'barren tree' would over-interpret the
    image.
