id: ISA.56.5
reference: Isaiah 56:5
source:
  edition: WLC
  text: וְ/נָתַתִּ֨י לָ/הֶ֜ם בְּ/בֵיתִ֤/י וּ/בְ/חֽוֹמֹתַ/י֙ יָ֣ד וָ/שֵׁ֔ם ט֖וֹב מִ/בָּנִ֣ים
    וּ/מִ/בָּנ֑וֹת שֵׁ֤ם עוֹלָם֙ אֶתֶּן ל֔/וֹ אֲשֶׁ֖ר לֹ֥א יִכָּרֵֽת־׃ס
translation:
  text: And I will give them, in my house and within my walls, a monument and a name
    better than sons and daughters; I will give him an everlasting name that will
    not be cut off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a memorial and a name'; Hebrew literally, 'a hand and a name.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew shifts from 'them' to 'him,' likely individualizing the promise
      within the group.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will give
  alternatives:
  - And I will set
  - And I will grant
  lexicon: HALOT
  rationale: נתן commonly means 'give.' 'Grant' is possible, but 'give' is the plain
    and natural rendering here and preserves the repeated verbal emphasis in the verse.
- source_word: לָהֶם
  chosen: them
  lexicon: HALOT
  rationale: The plural pronoun refers back to the group addressed in the preceding
    context. It should remain plural in the first clause.
- source_word: בְּבֵיתִי
  chosen: in my house
  alternatives:
  - within my house
  lexicon: HALOT
  rationale: בית here refers to the LORD's house, likely the temple in immediate context,
    but 'house' should be retained rather than interpreted more narrowly in the main
    text.
- source_word: וּבְחֹמֹתַי
  chosen: within my walls
  alternatives:
  - and within my walls
  - and in my walls
  lexicon: HALOT
  rationale: חומות means 'walls.' 'Within my walls' makes good English with the prefixed
    preposition and conveys location inside the sacred precincts.
- source_word: יָד
  chosen: a monument
  alternatives:
  - a memorial
  - a hand
  lexicon: HALOT
  rationale: Although the literal sense is 'hand,' in this idiom ('a hand and a name')
    it denotes a memorial marker or monument. Rendering it literally as 'hand' would
    obscure the sense in English. 'Monument' best captures a lasting commemorative
    place or memorial within the house/walls.
- source_word: וָשֵׁם
  chosen: and a name
  lexicon: HALOT
  rationale: The idiom pairs 'monument' with 'name,' expressing lasting remembrance
    and honor. 'Name' should be kept literally.
- source_word: טוֹב מִבָּנִים וּמִבָּנוֹת
  chosen: better than sons and daughters
  alternatives:
  - better than sons or daughters
  - better than children
  lexicon: HALOT
  rationale: 'The comparative מן is straightforward: the gift exceeds the value of
    having biological descendants. ''Sons and daughters'' preserves the Hebrew wording
    better than the flattened ''children.'''
- source_word: שֵׁם עוֹלָם
  chosen: an everlasting name
  alternatives:
  - an eternal name
  - a lasting name
  lexicon: HALOT
  rationale: עוֹלָם here denotes enduring perpetuity. 'Everlasting' is idiomatic and
    weighty without being archaic.
- source_word: אֶתֶּן לוֹ
  chosen: I will give him
  alternatives:
  - I will give to him
  - I will give them
  lexicon: HALOT
  rationale: The Masoretic text shifts to singular לוֹ. This is best retained in translation
    rather than harmonized to the earlier plural, likely individualizing the promise
    within the collective address.
- source_word: אֲשֶׁר לֹא יִכָּרֵת
  chosen: that will not be cut off
  alternatives:
  - which shall not be cut off
  - that will never be cut off
  lexicon: HALOT
  rationale: כרת in the Niphal means 'be cut off.' The wording intentionally echoes
    the exclusion of those physically or socially 'cut off' and the threat of lineage
    ending; preserving 'cut off' keeps that resonance.
