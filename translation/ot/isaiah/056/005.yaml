theological_decisions:
- issue: Idiomatic rendering of יָד וָשֵׁם
  chosen_reading: a monument and a name
  alternative_readings:
  - a memorial and a name
  - a hand and a name
  rationale: The phrase is idiomatic for a lasting memorial and honored remembrance.
    Rendering יָד literally as 'hand' would be opaque in English and would fail to
    communicate the promise of enduring remembrance to those without descendants.
    'Monument' preserves the concrete, commemorative force of the image.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
- issue: Number shift from plural לָהֶם to singular לוֹ
  chosen_reading: 'retain the shift: ''them'' ... ''him'''
  alternative_readings:
  - 'harmonize to plural throughout: ''them'''
  - render singular generically as 'each one of them'
  rationale: The Hebrew text itself moves from plural to singular. Retaining the shift
    preserves the source-text form and allows the promise to move from the group to
    the individual member of that group. Harmonizing would smooth away a real textual
    feature.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not paraphrase beyond what the source warrants.'
