theological_decisions:
- issue: Metaphorical identification of 'dogs' and 'shepherds'
  chosen_reading: Retain both metaphors in the main text rather than replacing them
    with explicit institutional labels.
  alternative_readings:
  - the leaders are greedy
  - the watchmen/pastors are corrupt
  rationale: The verse itself uses layered metaphors to condemn Israel's leaders.
    Preserving the imagery avoids importing a narrower doctrinal or institutional
    application than the Hebrew states, while still allowing readers to infer the
    referent from context.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
