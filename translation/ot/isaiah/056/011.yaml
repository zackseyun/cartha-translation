id: ISA.56.11
reference: Isaiah 56:11
source:
  edition: WLC
  text: וְ/הַ/כְּלָבִ֣ים עַזֵּי נֶ֗פֶשׁ לֹ֤א יָֽדְעוּ֙ שָׂבְעָ֔ה וְ/הֵ֣מָּה רֹעִ֔ים
    לֹ֥א יָדְע֖וּ הָבִ֑ין כֻּלָּ/ם֙ לְ/דַרְכָּ֣/ם פָּנ֔וּ אִ֥ישׁ לְ/בִצְע֖/וֹ מִ/קָּצֵֽ/הוּ־׃
translation:
  text: And the dogs are greedy in appetite; they do not know satisfaction. And they
    are shepherds who do not know understanding; all of them have turned to their
    own way, each one to his own unjust gain, every one without exception.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'insatiable'; literally 'strong/fierce of appetite.'
    reason: lexical_alternative
  - marker: b
    text: Or 'do not understand' / 'know nothing of discernment.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from every quarter' for 'every one without exception'; the Hebrew phrase
      is difficult and may emphasize the total extent of their corruption.
    reason: alternative_reading
lexical_decisions:
- source_word: הַכְּלָבִים
  chosen: the dogs
  alternatives:
  - the dogs (metaphor for leaders/watchmen)
  lexicon: HALOT
  rationale: Retains the concrete metaphor from the Hebrew rather than flattening
    it into an interpretive label like 'leaders.' The immediate context identifies
    corrupt leaders/watchmen, but the image should remain in the main text.
- source_word: עַזֵּי נֶפֶשׁ
  chosen: greedy in appetite
  alternatives:
  - strong of appetite
  - mighty of soul
  - insatiable
  lexicon: HALOT
  rationale: The idiom literally combines 'strong/fierce' with 'soul/appetite.' In
    context it describes voracious desire, so 'greedy in appetite' communicates the
    sense naturally while preserving the bodily/desiring nuance better than the more
    interpretive 'insatiable' alone.
- source_word: לֹא יָדְעוּ שָׂבְעָה
  chosen: they do not know satisfaction
  alternatives:
  - they never have enough
  - they do not know fullness
  - they do not know satiety
  lexicon: HALOT
  rationale: A fairly literal rendering of the idiom. 'Know satisfaction' preserves
    the Hebrew use of 'know' with the noun 'satisfaction/fullness' while remaining
    readable English.
- source_word: רֹעִים
  chosen: shepherds
  alternatives:
  - pastors
  - leaders
  lexicon: HALOT
  rationale: The Hebrew term is literally 'shepherds.' Since the verse critiques leaders
    metaphorically as shepherds, the concrete image should be preserved rather than
    replaced with ecclesiastical 'pastors' or generic 'leaders.'
- source_word: לֹא יָדְעוּ הָבִין
  chosen: do not know understanding
  alternatives:
  - lack understanding
  - do not understand
  - know nothing of discernment
  lexicon: HALOT
  rationale: This keeps the Hebrew verbal-nominal construction ('do not know to understand/understanding')
    in a slightly formal but intelligible way. It mirrors the repeated 'do not know'
    from the previous clause and preserves the rhetorical parallelism.
- source_word: כֻּלָּם לְדַרְכָּם פָּנוּ
  chosen: all of them have turned to their own way
  alternatives:
  - all of them turn to their own way
  - every one has turned to his own path
  lexicon: HALOT
  rationale: '''Turned to their own way'' is a standard and transparent rendering
    of the idiom, preserving both the collective indictment and the moral-path metaphor.'
- source_word: אִישׁ
  chosen: each one
  alternatives:
  - each man
  - everyone
  lexicon: HALOT
  rationale: Although אִישׁ is grammatically masculine, here it functions distributively
    for the members of the condemned group. 'Each one' preserves the distributive
    force in natural English without implying a mixed-gender audience issue central
    to the verse.
- source_word: לְבִצְעוֹ
  chosen: to his own unjust gain
  alternatives:
  - to his own gain
  - to his own profit
  - to his own covetous gain
  lexicon: HALOT
  rationale: בֶּצַע often carries the negative sense of dishonest or unjust profit,
    not merely neutral gain. 'Unjust gain' makes the moral force explicit from the
    lexical sense and context of corrupt leadership.
- source_word: מִקָּצֵהוּ
  chosen: every one without exception
  alternatives:
  - from his end
  - from every quarter
  - from the least to the greatest
  - all alike
  lexicon: HALOT
  rationale: The phrase is difficult, but in context it intensifies the universality
    of the accusation. 'Every one without exception' captures the sense that the corruption
    extends through the whole group. A more spatial rendering like 'from every quarter'
    is possible and preserved in a footnote.
