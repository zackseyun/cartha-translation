id: ISA.56.9
reference: Isaiah 56:9
source:
  edition: WLC
  text: כֹּ֖ל חַיְת֣וֹ שָׂדָ֑י אֵתָ֕יוּ לֶ/אֱכֹ֥ל כָּל חַיְת֖וֹ בַּ/יָּֽעַר־׃ס
translation:
  text: All you beasts of the field, come to devour— all you beasts in the forest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to eat' or 'to consume.' The Hebrew verb is the common verb for eating;
      'devour' brings out the predatory force in context.
    reason: lexical_alternative
  - marker: b
    text: The summons to the beasts likely functions as an image of coming judgment;
      some interpreters understand the beasts metaphorically for invading enemies.
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Quantifier introducing the totality of the addressed animals. 'All' is
    the most natural collective English rendering here.
- source_word: חַיְתוֹ
  chosen: beasts
  alternatives:
  - animals
  - wild animals
  - living creatures
  lexicon: HALOT
  rationale: חיה in this construct expression with 'field/forest' refers to wild animals
    rather than living creatures generally. 'Beasts' preserves the prophetic summons'
    force and matches the predatory context of devouring.
- source_word: שָׂדַי
  chosen: of the field
  alternatives:
  - of the open country
  - of the countryside
  lexicon: HALOT
  rationale: Standard rendering of שׂדה in contrast with forest. 'Field' is idiomatic
    in biblical English and clear in modern English.
- source_word: אֵתָיוּ
  chosen: come
  alternatives:
  - approach
  - arrive
  lexicon: HALOT
  rationale: Imperative plural summoning the animals. 'Come' is the direct and natural
    English equivalent in this vocative invitation.
- source_word: לֶאֱכֹל
  chosen: to devour
  alternatives:
  - to eat
  - to consume
  lexicon: HALOT
  rationale: Though literally 'to eat,' in context of summoned wild beasts against
    prey the sense is more forceful. 'Devour' captures the hostile, judgment-laden
    imagery without over-paraphrasing.
- source_word: בַּיָּעַר
  chosen: in the forest
  alternatives:
  - in the woodland
  - of the forest
  lexicon: HALOT
  rationale: יער denotes forest/woodland. With the prefixed preposition and article,
    'in the forest' is the straightforward rendering. English keeps the parallelism
    with 'of the field' while reflecting the Hebrew preposition.
