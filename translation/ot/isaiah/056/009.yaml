theological_decisions:
- issue: Prophetic imagery of summoned animals
  chosen_reading: A literal summons to wild beasts as an image of coming judgment
  alternative_readings:
  - A purely metaphorical address to hostile nations or invaders
  rationale: The verse directly addresses wild beasts and invites them to devour.
    In context this functions as prophetic judgment imagery, likely with human enemies
    in view by implication, but the translation should preserve the literal animal
    imagery rather than interpret it away in the main text.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
