id: ISA.61.9
reference: Isaiah 61:9
source:
  edition: WLC
  text: וְ/נוֹדַ֤ע בַּ/גּוֹיִם֙ זַרְעָ֔/ם וְ/צֶאֱצָאֵי/הֶ֖ם בְּ/ת֣וֹךְ הָ/עַמִּ֑ים
    כָּל רֹֽאֵי/הֶם֙ יַכִּיר֔וּ/ם כִּ֛י הֵ֥ם זֶ֖רַע בֵּרַ֥ךְ יְהוָֽה־׃ס
translation:
  text: Their offspring will be known among the nations, and their descendants in
    the midst of the peoples; all who see them will recognize them, that they are
    offspring blessed by the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the Gentiles' for 'among the nations.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'seed' in both occurrences; rendered 'offspring' for natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנוֹדַע
  chosen: will be known
  alternatives:
  - will be made known
  - will be recognized
  lexicon: HALOT
  rationale: Niphal of ידע commonly carries a passive/reflexive sense, 'be known'
    or 'be recognized.' 'Will be known' is the most natural English here and fits
    the parallel with 'will recognize' later in the verse without over-interpreting
    agency.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  lexicon: HALOT
  rationale: גוים in Isaiah often means 'nations' in the broad international sense.
    'Among the nations' preserves the preposition and avoids importing a narrower
    Jew/Gentile contrast not explicit in this verse.
- source_word: זַרְעָם
  chosen: their offspring
  alternatives:
  - their seed
  - their descendants
  lexicon: HALOT
  rationale: זֶרַע can mean seed, offspring, or descendants. 'Offspring' is idiomatic
    modern English and preserves the collective sense without sounding archaic like
    'seed.'
- source_word: וְצֶאֱצָאֵיהֶם
  chosen: their descendants
  alternatives:
  - their offspring
  - their issue
  lexicon: HALOT
  rationale: This term overlaps with זרע but adds a near-synonymous parallel expression.
    Rendering it 'descendants' preserves the poetic parallelism while avoiding unnecessary
    repetition in English.
- source_word: בְּתוֹךְ הָעַמִּים
  chosen: in the midst of the peoples
  alternatives:
  - among the peoples
  lexicon: HALOT
  rationale: בתוך literally means 'in the midst of.' Retaining that phrase preserves
    the Hebrew imagery and parallelism with 'among the nations.' 'Peoples' reflects
    עמים as distinct groups.
- source_word: כָּל רֹאֵיהֶם
  chosen: all who see them
  alternatives:
  - all their observers
  - everyone seeing them
  lexicon: HALOT
  rationale: The participial construction is naturally rendered as a relative clause
    in English. 'All who see them' is clear and close to the Hebrew.
- source_word: יַכִּירוּם
  chosen: will recognize them
  alternatives:
  - will acknowledge them
  - will know them
  lexicon: HALOT
  rationale: נכר in Hiphil often means to recognize or acknowledge. 'Recognize' best
    fits the context of visible identification by observers.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כי introduces the content of what is recognized: they are a people
    marked by divine blessing. ''That'' best captures this content clause in English.'
- source_word: זֶרַע
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: HALOT
  rationale: Using 'offspring' again keeps the lexical link with the earlier זרע while
    remaining idiomatic. The singular collective sense is preserved.
- source_word: בֵּרַךְ
  chosen: blessed
  alternatives:
  - whom the LORD has blessed
  lexicon: HALOT
  rationale: 'The passive participial form functions adjectivally: ''blessed.'' English
    can express this compactly as ''offspring blessed by the LORD.'' An expanded relative
    clause is possible but less concise.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the translation's
    stated policy.
