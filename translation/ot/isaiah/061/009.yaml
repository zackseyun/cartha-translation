theological_decisions:
- issue: Rendering the covenant name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse identifies the people as blessed by Israel's covenant God.
    Following the project's doctrine, the Tetragrammaton is rendered 'the LORD' rather
    than transliterated forms.
