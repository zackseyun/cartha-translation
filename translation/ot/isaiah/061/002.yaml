theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Maintaining the tension between favor and vengeance in God's mission
  chosen_reading: Retain both 'the year of the LORD’s favor' and 'the day of vengeance of our God' without softening either term
  alternative_readings:
  - Render vengeance more weakly as judgment
  - Omit or subordinate vengeance to emphasize comfort
  rationale: The verse itself juxtaposes divine favor and divine vengeance. The translation preserves that theological tension rather than resolving it, in keeping with the stated philosophy.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
