id: ISA.61.2
reference: Isaiah 61:2
source:
  edition: WLC
  text: לִ/קְרֹ֤א שְׁנַת רָצוֹן֙ לַֽ/יהוָ֔ה וְ/י֥וֹם נָקָ֖ם לֵ/אלֹהֵ֑י/נוּ לְ/נַחֵ֖ם כָּל אֲבֵלִֽים־־׃
translation:
  text: to proclaim the year of Yahweh’s favor and the day of vengeance of our God, to comfort all who mourn,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the acceptable year of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all mourners.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִקְרֹא
  chosen: to proclaim
  alternatives:
  - to call
  - to announce
  lexicon: HALOT
  rationale: The infinitive construct of קרא here introduces purpose/content in the servant's mission. In this context, public heralding is in view, so 'to proclaim' best captures the formal announcement sense better than the more generic 'to call'.
- source_word: שְׁנַת רָצוֹן
  chosen: the year of ... favor
  alternatives:
  - the acceptable year
  - the year of goodwill
  lexicon: HALOT
  rationale: The construct phrase denotes a year characterized by divine favor/acceptance. 'Favor' is clear modern English and preserves the positive disposition implied by רָצוֹן without archaic phrasing like 'acceptable year.'
- source_word: לַיהוָה
  chosen: of the LORD
  alternatives:
  - for the LORD
  - belonging to the LORD
  lexicon: HALOT
  rationale: 'With שְׁנַת רָצוֹן, the preposition ל marks relation/reference: the year associated with the LORD''s favor. Per doctrine, יהוה is rendered ''the LORD'' rather than transliterated.'
- source_word: וְיוֹם נָקָם
  chosen: and the day of vengeance
  alternatives:
  - and a day of vengeance
  - and the day of avenging
  lexicon: HALOT
  rationale: The parallel with 'the year of the LORD’s favor' supports a coordinate phrase. 'Vengeance' is the standard and suitably weighty rendering of נָקָם here, expressing divine retribution/judgment.
- source_word: לֵאלֹהֵינוּ
  chosen: of our God
  alternatives:
  - for our God
  - belonging to our God
  lexicon: HALOT
  rationale: As with לַיהוָה, the preposition expresses relation. 'Of our God' reads naturally in English and preserves the covenantal possessive nuance.
- source_word: לְנַחֵם
  chosen: to comfort
  alternatives:
  - to console
  lexicon: HALOT
  rationale: The infinitive continues the mission statement. 'Comfort' is the most natural and biblically resonant rendering of נחם in this context of restoration.
- source_word: כָּל אֲבֵלִים
  chosen: all who mourn
  alternatives:
  - all mourners
  - all the mourning ones
  lexicon: HALOT
  rationale: Although the Hebrew uses a masculine plural participial/adjectival form, the sense is generic. 'All who mourn' is natural English and preserves the representative force without implying only males, consistent with gender-accurate translation philosophy.
