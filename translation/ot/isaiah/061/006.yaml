id: ISA.61.6
reference: Isaiah 61:6
source:
  edition: WLC
  text: וְ/אַתֶּ֗ם כֹּהֲנֵ֤י יְהוָה֙ תִּקָּרֵ֔אוּ מְשָׁרְתֵ֣י אֱלֹהֵ֔י/נוּ יֵאָמֵ֖ר לָ/כֶ֑ם חֵ֤יל גּוֹיִם֙ תֹּאכֵ֔לוּ וּ/בִ/כְבוֹדָ֖/ם תִּתְיַמָּֽרוּ׃
translation:
  text: But you will be called the priests of Yahweh; they will call you the ministers of our God. You will eat the wealth of nations, and in their glory you will boast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in their splendor you will exult.” The final verb is rare and its nuance is debated; the main text follows the common sense “boast/glory.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּהֲנֵי יְהוָה
  chosen: the priests of the LORD
  alternatives:
  - priests to the LORD
  - the LORD's priests
  lexicon: HALOT
  rationale: Construct phrase with divine name; 'priests of the LORD' is natural English and preserves the covenant name rendering 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows stated default for the divine name in DOCTRINE.md.
- source_word: תִּקָּרֵאוּ
  chosen: will be called
  alternatives:
  - shall be called
  - will be named
  lexicon: HALOT
  rationale: Niphal imperfect of קרא here is passive/reflexive in sense; 'will be called' is the most direct idiomatic rendering.
- source_word: מְשָׁרְתֵי אֱלֹהֵינוּ
  chosen: Ministers of our God
  alternatives:
  - servants of our God
  - attendants of our God
  lexicon: HALOT
  rationale: משרתים denotes those who minister or serve in an official/cultic capacity. 'Ministers' best matches the parallel with 'priests' and preserves the elevated register without importing later ecclesiastical office.
- source_word: יֵאָמֵר לָכֶם
  chosen: they will say of you
  alternatives:
  - it will be said to you
  - one will call you
  lexicon: HALOT
  rationale: Impersonal/passive-like usage of אמר in 3ms can function indefinitely. In English, 'they will say of you' clearly conveys public designation and fits the parallelism with 'you will be called.'
- source_word: חֵיל גּוֹיִם
  chosen: the wealth of nations
  alternatives:
  - the riches of nations
  - the strength of nations
  - the resources of nations
  lexicon: HALOT
  rationale: חיל can denote wealth, resources, or might. In context with 'eat' and the following reference to glory/honor, material abundance from the nations is primary; 'wealth' is the clearest idiomatic choice.
- source_word: תֹּאכֵלוּ
  chosen: will eat
  alternatives:
  - will consume
  - will feed on
  lexicon: HALOT
  rationale: Literal verb 'eat' is retained; in context it metaphorically expresses enjoying or partaking of the nations' wealth, but the Hebrew image should remain visible.
- source_word: וּבִכְבוֹדָם
  chosen: in their glory
  alternatives:
  - in their honor
  - over their splendor
  - in their abundance
  lexicon: HALOT
  rationale: כבוד commonly denotes glory, honor, or splendor. 'Glory' preserves the lexical link and leaves the precise nuance open.
- source_word: תִּתְיַמָּרוּ
  chosen: you will boast
  alternatives:
  - you will exult
  - you will glory yourselves
  - you will be exalted
  lexicon: HALOT
  rationale: The Hitpael of ימר is difficult and has been understood as 'boast oneself/glory.' 'You will boast' is a well-attested contextual rendering and fits the prepositional phrase 'in their glory.' Because the verb is rare and debated, an alternative is preserved in a footnote.
