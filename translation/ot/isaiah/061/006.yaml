theological_decisions:
- issue: Whether the verse should be rendered in a way that spiritualizes Israel's priestly role into a later ecclesial category
  chosen_reading: 'Retain the direct prophetic address: the hearers will be called ''the priests of the LORD'' and ''Ministers of our God.'''
  alternative_readings:
  - Paraphrasing as a generalized statement about spiritual service without priestly terminology
  rationale: The Hebrew explicitly uses priestly/cultic terms. The translation preserves that theological imagery rather than flattening it into a non-cultic abstraction.
  doctrine_reference: Translation philosophy §§1, 3, 5
