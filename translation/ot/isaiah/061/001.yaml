theological_decisions:
- issue: Rendering the divine name יְהוָה in a compound title
  chosen_reading: the Lord GOD / the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.' In the compound
    אֲדֹנָי יְהוִה, English convention 'the Lord GOD' preserves both title and name
    without producing 'Lord LORD.' The second standalone יְהוָה is rendered 'the LORD'
    per the stated default.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Messianic/anointing language
  chosen_reading: has anointed me
  rationale: The Hebrew verb itself should be translated straightforwardly without
    importing later christological conclusions into the wording. 'Anointed' preserves
    the text's messianic resonance while leaving interpretation to context and canonical
    usage.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    preserve theological tension rather than resolve it'
