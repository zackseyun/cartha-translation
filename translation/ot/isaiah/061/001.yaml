id: ISA.61.1
reference: Isaiah 61:1
source:
  edition: WLC
  text: ר֛וּחַ אֲדֹנָ֥/י יְהוִ֖ה עָלָ֑/י יַ֡עַן מָשַׁח֩ יְהוָ֨ה אֹתִ֜/י לְ/בַשֵּׂ֣ר
    עֲנָוִ֗ים שְׁלָחַ֨/נִי֙ לַ/חֲבֹ֣שׁ לְ/נִשְׁבְּרֵי לֵ֔ב לִ/קְרֹ֤א לִ/שְׁבוּיִם֙
    דְּר֔וֹר וְ/לַ/אֲסוּרִ֖ים פְּקַח קֽוֹחַ־־׃
translation:
  text: The Spirit of the Lord GOD is upon me, because the LORD has anointed me to
    bring good news to the humble; he has sent me to bind up the brokenhearted, to
    proclaim liberty to the captives and opening of the prison to the bound.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to bring good news to the poor"; the Hebrew עֲנָוִים can denote the
      humble, meek, afflicted, or poor.
    reason: lexical_alternative
  - marker: b
    text: Hebrew פְּקַח־קוֹחַ is difficult; alternatively, "opening of the eyes" or
      more generally "release/opening" for those bound.
    reason: alternative_reading
lexical_decisions:
- source_word: ר֛וּחַ
  chosen: Spirit
  alternatives:
  - spirit
  - breath
  - wind
  lexicon: HALOT
  rationale: In construct with the divine title and in prophetic commissioning context,
    this denotes the divine Spirit rather than an impersonal wind or mere disposition.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: This compound title is conventionally distinguished in English as 'Lord
    GOD' to reflect אֲדֹנָי plus the divine name. Per doctrine, יְהוָה is rendered
    'the LORD' by default; here 'Lord GOD' avoids the awkward 'Lord LORD' while preserving
    both elements of the Hebrew title.
- source_word: עָלַי
  chosen: is upon me
  alternatives:
  - rests on me
  - is on me
  lexicon: HALOT
  rationale: A natural English rendering of the preposition in prophetic empowerment
    language; 'upon me' preserves the elevated register and commissioning sense.
- source_word: יַעַן
  chosen: because
  alternatives:
  - since
  - for that
  lexicon: HALOT
  rationale: Introduces the reason for the Spirit's presence and mission; 'because'
    is clear modern English.
- source_word: מָשַׁח
  chosen: has anointed
  alternatives:
  - anointed
  lexicon: HALOT
  rationale: The perfect verb is well represented by English present perfect in this
    context, expressing a completed act with present significance. 'Anointed' preserves
    the messianic and commissioning nuance.
- source_word: לְבַשֵּׂר
  chosen: to bring good news
  alternatives:
  - to proclaim good news
  - to preach good news
  lexicon: HALOT
  rationale: The verb means to announce good news. 'Bring good news' is idiomatic
    and accessible while preserving the evangelic sense.
- source_word: עֲנָוִים
  chosen: the humble
  alternatives:
  - the poor
  - the afflicted
  - the meek
  lexicon: HALOT
  rationale: The Hebrew can denote the poor, afflicted, or humble/meek. 'The humble'
    preserves the moral-social breadth without narrowing it to economics alone; the
    common alternative 'poor' is worth preserving in a footnote because of its importance
    in reception history and Luke 4.
- source_word: שְׁלָחַנִי
  chosen: he has sent me
  alternatives:
  - he sent me
  lexicon: HALOT
  rationale: Present perfect fits the Hebrew perfect in a commissioning declaration
    and keeps parallelism with 'has anointed.'
- source_word: לַחֲבֹשׁ
  chosen: to bind up
  alternatives:
  - to bandage
  - to heal
  lexicon: HALOT
  rationale: The verb literally refers to binding/bandaging wounds. 'Bind up' preserves
    the metaphor and avoids overinterpreting as general healing.
- source_word: לְנִשְׁבְּרֵי לֵב
  chosen: the brokenhearted
  alternatives:
  - those broken of heart
  - the broken in heart
  lexicon: HALOT
  rationale: An established and accurate idiomatic rendering of the Hebrew phrase.
- source_word: לִקְרֹא
  chosen: to proclaim
  alternatives:
  - to call out
  - to announce
  lexicon: HALOT
  rationale: In this context of heralding release, 'proclaim' best captures the formal
    public announcement.
- source_word: לִשְׁבוּיִם
  chosen: to the captives
  alternatives:
  - to prisoners
  - to exiles
  lexicon: HALOT
  rationale: Refers to those taken captive; 'captives' fits the paired parallelism
    with the following term for those bound.
- source_word: דְּרוֹר
  chosen: liberty
  alternatives:
  - release
  - freedom
  lexicon: HALOT
  rationale: This noun often denotes emancipation or release, including Jubilee contexts.
    'Liberty' preserves the formal, proclamation-like tone and echoes its covenantal
    resonance.
- source_word: וְלַאֲסוּרִים
  chosen: to the bound
  alternatives:
  - to the prisoners
  - to those who are bound
  lexicon: HALOT
  rationale: The passive participial sense is literally 'bound ones.' Rendering it
    this way preserves the imagery and avoids collapsing it into the previous 'captives.'
- source_word: פְּקַח־קוֹחַ
  chosen: opening of the prison
  alternatives:
  - opening of the eyes
  - opening
  - release from darkness
  lexicon: HALOT
  rationale: This difficult expression is traditionally understood here in relation
    to prisoners, likely denoting opening/unlocking confinement. Given the parallel
    with 'captives' and 'bound,' 'opening of the prison' best fits the immediate context.
    The alternative 'opening of the eyes' is preserved in a footnote because the Hebrew
    expression is debated.
