id: ISA.61.5
reference: Isaiah 61:5
source:
  edition: WLC
  text: וְ/עָמְד֣וּ זָרִ֔ים וְ/רָע֖וּ צֹאנְ/כֶ֑ם וּ/בְנֵ֣י נֵכָ֔ר אִכָּרֵי/כֶ֖ם וְ/כֹרְמֵי/כֶֽם׃
translation:
  text: Foreigners will stand and shepherd your flocks, and sons of foreigners will
    be your farmers and your vinedressers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strangers will stand and pasture your sheep.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of foreigners,' an idiom for people from foreign nations.
    reason: cultural_note
lexical_decisions:
- source_word: זָרִים
  chosen: Foreigners
  alternatives:
  - strangers
  - aliens
  lexicon: HALOT
  rationale: The noun denotes those who are outside the covenant community or ethnically
    other. 'Foreigners' is natural modern English and fits the parallel with 'sons
    of foreigners.' 'Strangers' can suggest unfamiliar persons rather than foreign
    peoples, and 'aliens' is too marked in contemporary English.
- source_word: וְעָמְדוּ
  chosen: will stand
  alternatives:
  - shall stand by
  - will take their stand
  lexicon: HALOT
  rationale: The verb literally means 'stand.' In context it introduces readiness
    for service, but the plain sense should be preserved rather than paraphrased.
    English 'will stand' is idiomatic enough and keeps the formal image.
- source_word: וְרָעוּ
  chosen: shepherd
  alternatives:
  - feed
  - pasture
  - tend
  lexicon: HALOT
  rationale: The verb רעה commonly means to pasture or shepherd. With 'your flocks'
    as object, 'shepherd' best preserves the pastoral sense without flattening it
    to mere feeding. It also avoids the awkward English collocation 'feed your flocks,'
    which can sound redundant or misleading.
- source_word: צֹאנְכֶם
  chosen: your flocks
  alternatives:
  - your sheep
  lexicon: HALOT
  rationale: The collective noun refers to small livestock, often sheep/goats as a
    flock. 'Your flocks' is the most natural collective rendering in English and matches
    the pastoral verb.
- source_word: בְנֵי נֵכָר
  chosen: sons of foreigners
  alternatives:
  - foreigners' sons
  - sons of a foreign land
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew construction and the
    parallelism with the first colon. 'Sons of foreigners' in this context means people
    belonging to foreign nations, not necessarily emphasizing literal offspring only.
- source_word: אִכָּרֵיכֶם
  chosen: your farmers
  alternatives:
  - your plowmen
  - your field workers
  - your husbandmen
  lexicon: HALOT
  rationale: The noun denotes agricultural workers, especially tillers of the soil.
    'Farmers' is clear modern English. 'Plowmen' is more literal in some contexts
    but too narrow here, and 'husbandmen' is archaic.
- source_word: כֹרְמֵיכֶם
  chosen: your vinedressers
  alternatives:
  - your vine-growers
  - your vineyard keepers
  lexicon: HALOT
  rationale: The noun refers specifically to those who work vineyards. 'Vinedressers'
    is a standard biblical-English term that remains understandable and more precise
    than the broader 'farmers.'
