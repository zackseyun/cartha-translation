theological_decisions:
- issue: Social role reversal in Zion's restoration oracle
  chosen_reading: The verse is rendered as a description of foreigners serving restored
    Israel in agricultural and pastoral labor, without softening the asymmetry or
    importing later ecclesiological reinterpretation into the main text.
  alternative_readings:
  - A generalized picture of international cooperation
  - A metaphor for abundance rather than literal service roles
  rationale: The Hebrew plainly depicts foreigners performing pastoral and agricultural
    work for the addressed community. The translation preserves that restoration-oracle
    imagery without expanding it into a doctrinal claim beyond the verse itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
