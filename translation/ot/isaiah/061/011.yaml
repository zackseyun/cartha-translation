  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering צְדָקָה in a prophetic restoration context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The project's default for this semantic field is 'righteousness,' with alternatives preserved where relevant. In Isaiah 61:11 the term can carry both moral-covenantal and public-vindication overtones; the main text keeps 'righteousness' and the footnote preserves 'justice.'
