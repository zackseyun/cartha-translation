id: ISA.61.11
reference: Isaiah 61:11
source:
  edition: WLC
  text: כִּ֤י כָ/אָ֨רֶץ֙ תּוֹצִ֣יא צִמְחָ֔/הּ וּ/כְ/גַנָּ֖ה זֵרוּעֶ֣י/הָ תַצְמִ֑יחַ כֵּ֣ן אֲדֹנָ֣/י יְהוִ֗ה יַצְמִ֤יחַ צְדָקָה֙ וּ/תְהִלָּ֔ה נֶ֖גֶד כָּל הַ/גּוֹיִֽם׀־׃
translation:
  text: For as the earth brings forth its growth, and as a garden causes what is sown in it to spring up, so the Lord GOD will cause righteousness and praise to spring up before all the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "justice" for "righteousness"; the Hebrew term can include the sense of public rightness or vindication.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - For as
  lexicon: HALOT
  rationale: Introduces the explanatory comparison grounding the previous promise; 'For' fits the causal/explanatory force in context.
- source_word: כָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this simile the scope is general and creational rather than specifically territorial, so 'the earth' is preferable to 'the land'.
- source_word: תּוֹצִיא
  chosen: brings forth
  alternatives:
  - causes to come out
  - produces
  lexicon: HALOT
  rationale: A natural English rendering of the Hiphil of יצא in an agricultural image; preserves the vividness of emergence.
- source_word: צִמְחָהּ
  chosen: its growth
  alternatives:
  - its sprout
  - its shoot
  - its vegetation
  lexicon: HALOT
  rationale: The noun denotes what sprouts/grows. 'Its growth' is idiomatic and broad enough to match the agricultural comparison without over-specifying a single shoot.
- source_word: וּכְגַנָּה
  chosen: and as a garden
  alternatives:
  - and like a garden
  lexicon: HALOT
  rationale: Keeps the parallel simile structure with the first clause in smooth English.
- source_word: זֵרוּעֶיהָ
  chosen: what is sown in it
  alternatives:
  - its seeds
  - its sown things
  - its sowings
  lexicon: HALOT
  rationale: The plural passive-participial form refers to things sown rather than merely seed as an abstract mass. 'What is sown in it' best captures the sense in natural English.
- source_word: תַצְמִיחַ
  chosen: causes ... to spring up
  alternatives:
  - makes ... grow
  - causes ... to sprout
  lexicon: HALOT
  rationale: The Hiphil of צמח is causative. 'Causes ... to spring up' preserves both the causative nuance and the agricultural imagery.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Standard marker completing the simile.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following the doctrine default, יְהוָה is rendered 'the LORD.' In the compound title אֲדֹנָי יְהוִה, standard English convention avoids 'Lord LORD' by rendering 'the Lord GOD,' preserving both elements reverently and intelligibly.
- source_word: יַצְמִיחַ
  chosen: will cause ... to spring up
  alternatives:
  - will make ... grow
  - will cause ... to sprout
  lexicon: HALOT
  rationale: Matches the earlier verb for rhetorical consistency and preserves the causative force.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  lexicon: HALOT
  rationale: Default rendering aligns with the project's contested-terms guidance. In this salvation-restoration context, 'righteousness' naturally includes covenantal rightness while preserving theological breadth; 'justice' is a viable contextual alternative preserved in a footnote.
- source_word: וּתְהִלָּה
  chosen: and praise
  alternatives:
  - and renown
  lexicon: HALOT
  rationale: The noun ordinarily means 'praise.' Here it likely denotes praise arising in response to God's saving work, not merely reputation.
- source_word: נֶגֶד כָּל הַגּוֹיִם
  chosen: before all the nations
  alternatives:
  - in the sight of all the nations
  - before all peoples
  lexicon: HALOT
  rationale: נֶגֶד conveys public visibility. 'Before all the nations' is concise and preserves the international scope of גּוֹיִם.
