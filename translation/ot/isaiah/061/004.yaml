id: ISA.61.4
reference: Isaiah 61:4
source:
  edition: WLC
  text: וּ/בָנוּ֙ חָרְב֣וֹת עוֹלָ֔ם שֹׁמְמ֥וֹת רִֽאשֹׁנִ֖ים יְקוֹמֵ֑מוּ וְ/חִדְּשׁוּ֙
    עָ֣רֵי חֹ֔רֶב שֹׁמְמ֖וֹת דּ֥וֹר וָ/דֽוֹר׃
translation:
  text: They will rebuild the ancient ruins; they will raise up the former desolations;
    they will renew the ruined cities, the desolations of generation after generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ruins of old' for 'the ancient ruins'; Hebrew עוֹלָם can denote
      remote antiquity or long duration.
    reason: lexical_alternative
  - marker: b
    text: Or 'the desolations of many generations.' The Hebrew literally speaks of
      desolations spanning 'generation and generation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָנוּ
  chosen: they will rebuild
  alternatives:
  - and they will build
  - they will build
  lexicon: HALOT
  rationale: From בנה, here with prefixed conjunction and perfect form used in prophetic
    sequence. In English, 'they will rebuild' best fits the context of ruined places
    being restored, making explicit the restorative force implied by the objects ('ruins')
    without over-paraphrasing.
- source_word: חָרְבוֹת עוֹלָם
  chosen: the ancient ruins
  alternatives:
  - the everlasting ruins
  - the ruins of old
  lexicon: HALOT
  rationale: חָרְבוֹת denotes ruins/waste places. עוֹלָם can mean long duration, antiquity,
    or perpetuity depending on context. Here 'ancient' or 'of old' fits restoration
    of long-devastated places better than 'everlasting,' which sounds metaphysical
    in English.
- source_word: שֹׁמְמוֹת רִאשֹׁנִים
  chosen: the former desolations
  alternatives:
  - the desolations of former times
  - the first desolations
  lexicon: HALOT
  rationale: שֹׁמְמוֹת refers to desolated places/conditions. רִאשֹׁנִים here is temporal,
    'former/earlier,' not ordinal in a strict numerical sense. 'Former desolations'
    is concise and natural while preserving the Hebrew sense.
- source_word: יְקוֹמֵמוּ
  chosen: they will raise up
  alternatives:
  - they will restore
  - they will set up
  lexicon: HALOT
  rationale: From קום in a causative/restorative sense. 'Raise up' preserves the concrete
    metaphor of lifting ruined places back into standing condition. 'Restore' is possible
    but less texturally close.
- source_word: וְחִדְּשׁוּ
  chosen: they will renew
  alternatives:
  - they will restore
  - they will make new again
  lexicon: HALOT
  rationale: From חדשׁ, 'renew/make new.' 'Renew' is the most direct equivalent and
    keeps the restoration motif distinct from the previous verbs rather than flattening
    all three into 'restore.'
- source_word: עָרֵי חֹרֶב
  chosen: the ruined cities
  alternatives:
  - the cities of devastation
  - the waste cities
  lexicon: HALOT
  rationale: Construct phrase meaning cities characterized by devastation/ruin. 'Ruined
    cities' is idiomatic modern English and accurately conveys the construct relationship.
- source_word: שֹׁמְמוֹת דּוֹר וָדוֹר
  chosen: the desolations of generation after generation
  alternatives:
  - the desolations of many generations
  - the places desolate from generation to generation
  lexicon: HALOT
  rationale: The phrase qualifies the ruined cities as long desolate across successive
    generations. 'Generation after generation' preserves the distributive force of
    דּוֹר וָדוֹר more vividly than the smoother but less literal 'many generations.'
