theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of לְהִתְפָּאֵר at the verse end
  chosen_reading: that he may display his glory
  alternative_readings:
  - that he may be glorified
  - for glory
  rationale: The clause points to the LORD's purpose in establishing his people as his planting. The chosen rendering preserves divine agency and avoids reducing the phrase to an abstract noun.
