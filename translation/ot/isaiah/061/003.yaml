id: ISA.61.3
reference: Isaiah 61:3
source:
  edition: WLC
  text: לָ/שׂ֣וּם לַ/אֲבֵלֵ֣י צִיּ֗וֹן לָ/תֵת֩ לָ/הֶ֨ם פְּאֵ֜ר תַּ֣חַת אֵ֗פֶר שֶׁ֤מֶן שָׂשׂוֹן֙ תַּ֣חַת אֵ֔בֶל מַעֲטֵ֣ה תְהִלָּ֔ה תַּ֖חַת ר֣וּחַ כֵּהָ֑ה וְ/קֹרָ֤א לָ/הֶם֙ אֵילֵ֣י הַ/צֶּ֔דֶק מַטַּ֥ע יְהוָ֖ה לְ/הִתְפָּאֵֽר׀׃
translation:
  text: to appoint for the mourners of Zion, to give them a headdress instead of ashes, oil of gladness instead of mourning, a garment of praise instead of a faint spirit; and they will be called oaks of righteousness, the planting of Yahweh, that he may display his glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beauty' instead of 'ashes'; the Hebrew פְּאֵר can denote adornment or a festive headdress. The concrete image likely refers to headwear replacing the ashes of mourning.
    reason: lexical_alternative
  - marker: b
    text: Or 'terebinths of righteousness.' The Hebrew tree term may refer more specifically to terebinths; 'oaks' is used here as a familiar English equivalent for the poetic image.
    reason: lexical_alternative
  - marker: c
    text: Or 'oaks of justice.' The Hebrew צֶדֶק can denote both righteousness and justice depending on context.
    reason: alternative_reading
  - marker: d
    text: Or 'that he may be glorified.' The final Hebrew verb can be understood as expressing the LORD's glorification through this planting.
    reason: alternative_reading
lexical_decisions:
- source_word: לָשׂוּם
  chosen: to appoint for
  alternatives:
  - to set for
  - to provide for
  lexicon: HALOT
  rationale: The infinitive construct of שׂוּם here introduces purpose/result in parallel with לָתֵת. 'Appoint for' captures the sense of arranging or providing something for the mourners in idiomatic English without flattening the formal structure.
- source_word: לַאֲבֵלֵי צִיּוֹן
  chosen: for the mourners of Zion
  alternatives:
  - for those who mourn in Zion
  - for Zion's mourners
  lexicon: HALOT
  rationale: אֲבֵלִים denotes mourners; the construct with Zion is naturally rendered 'of Zion.' This keeps the covenantal/place reference explicit.
- source_word: לָתֵת לָהֶם
  chosen: to give them
  alternatives:
  - to grant them
  lexicon: HALOT
  rationale: Straightforward infinitive + pronominal object; 'give' is the plain sense and preserves the parallelism.
- source_word: פְּאֵר
  chosen: a headdress
  alternatives:
  - beauty
  - ornament
  - turban
  lexicon: HALOT
  rationale: Though traditionally rendered 'beauty,' the noun more concretely denotes an ornamental headdress or festive headwear. In contrast with ashes placed on the head in mourning, 'headdress' better reflects the image in the Hebrew.
- source_word: תַּחַת אֵפֶר
  chosen: instead of ashes
  alternatives:
  - in place of ashes
  lexicon: HALOT
  rationale: תַּחַת marks substitution here. 'Ashes' evokes mourning practice and pairs naturally with 'headdress.'
- source_word: שֶׁמֶן שָׂשׂוֹן
  chosen: oil of gladness
  alternatives:
  - oil of joy
  lexicon: HALOT
  rationale: 'A genitive construction: anointing oil associated with festivity and rejoicing. ''Gladness'' is slightly more literary but still accessible and fits the poetic register.'
- source_word: תַּחַת אֵבֶל
  chosen: instead of mourning
  alternatives:
  - in place of mourning
  lexicon: HALOT
  rationale: Maintains the repeated substitution pattern and the lexical contrast with gladness.
- source_word: מַעֲטֵה תְהִלָּה
  chosen: a garment of praise
  alternatives:
  - a mantle of praise
  - a wrap of praise
  lexicon: HALOT
  rationale: מַעֲטֶה is an outer covering or cloak. 'Garment' is natural modern English and preserves the clothing metaphor in parallel with headdress and oil.
- source_word: תַּחַת רוּחַ כֵּהָה
  chosen: instead of a faint spirit
  alternatives:
  - instead of a dim spirit
  - instead of a weak spirit
  - instead of a discouraged spirit
  lexicon: HALOT
  rationale: כֵּהָה conveys dimness, dullness, or feebleness. 'Faint spirit' preserves the metaphorical sense of inner depletion without over-interpreting it psychologically.
- source_word: וְקֹרָא לָהֶם
  chosen: and they will be called
  alternatives:
  - and one will call them
  - and he will call them
  lexicon: HALOT
  rationale: The 3ms singular with indefinite/passive-like force is idiomatically rendered in English as a passive. This avoids introducing an explicit unnamed subject while preserving the resultative sense.
- source_word: אֵילֵי הַצֶּדֶק
  chosen: oaks of righteousness
  alternatives:
  - terebinths of righteousness
  - strong ones of righteousness
  lexicon: HALOT
  rationale: אֵילִים can denote large trees, often terebinths/oaks, and by extension strength. In this poetic image paired with 'planting,' an arboreal rendering is required. 'Oaks' is more familiar to modern readers than 'terebinths' while preserving the metaphor. הַצֶּדֶק is rendered 'righteousness' as the default for this term.
- source_word: הַצֶּדֶק
  chosen: righteousness
  alternatives:
  - justice
  lexicon: HALOT
  rationale: The noun can overlap with justice, but in this attributive phrase describing the restored people, 'righteousness' best fits the moral-covenantal sense. The alternative is preserved in a footnote because the semantic field includes justice.
- source_word: מַטַּע יְהוָה
  chosen: the planting of the LORD
  alternatives:
  - a planting of the LORD
  - what the LORD has planted
  lexicon: HALOT
  rationale: Construct phrase indicating divine origin/ownership. The definite sense works well in apposition to 'oaks of righteousness.' YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְהִתְפָּאֵר
  chosen: that he may display his glory
  alternatives:
  - for his beautification
  - to glorify himself
  - that he may be glorified
  lexicon: HALOT
  rationale: The hitpael of פאר here expresses the LORD's showing of splendor/glory through his restored people. 'Display his glory' communicates the reflexive/resultative nuance in clear English. 'That he may be glorified' is possible, but 'display his glory' better preserves the active sense.
