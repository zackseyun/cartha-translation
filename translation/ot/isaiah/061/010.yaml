theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default for YHWH, following
    Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Nuance of צְדָקָה in the clothing metaphor
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Although צְדָקָה can overlap with justice, in this metaphor of divine
    investiture 'righteousness' better preserves the covenantal and moral sense without
    narrowing it to social justice alone. The alternative is preserved in lexical
    decisions rather than elevated as a theological dispute.
  doctrine_reference: DOCTRINE.md translation philosophy §5; contested-terms rationale
    for δικαιοσύνη as analogous theological language
