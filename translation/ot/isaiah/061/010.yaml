id: ISA.61.10
reference: Isaiah 61:10
source:
  edition: WLC
  text: שׂ֧וֹשׂ אָשִׂ֣ישׂ בַּֽ/יהוָ֗ה תָּגֵ֤ל נַפְשִׁ/י֙ בֵּֽ/אלֹהַ֔/י כִּ֤י הִלְבִּישַׁ֨/נִי֙
    בִּגְדֵי יֶ֔שַׁע מְעִ֥יל צְדָקָ֖ה יְעָטָ֑/נִי כֶּֽ/חָתָן֙ יְכַהֵ֣ן פְּאֵ֔ר וְ/כַ/כַּלָּ֖ה
    תַּעְדֶּ֥ה כֵלֶֽי/הָ־׃
translation:
  text: I will greatly rejoice in the LORD; my soul will exult in my God, for he has
    clothed me with garments of salvation; he has wrapped me in a robe of righteousness,
    like a bridegroom who adorns himself with a priestly headdress, and like a bride
    who decks herself with her jewelry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a mantle of righteousness' or 'a robe of justice.'
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew likely evokes priestly adornment: ''like a bridegroom who puts
      on a headdress like a priest.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שׂוֹשׂ אָשִׂישׂ
  chosen: I will greatly rejoice
  alternatives:
  - I will surely rejoice
  - rejoicing I will rejoice
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verbal idea. English
    expresses this naturally with an adverbial intensifier rather than a wooden repetition.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: The preposition ב marks the sphere/object of rejoicing. Per doctrine,
    יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: תָּגֵל נַפְשִׁי
  chosen: my soul will exult
  alternatives:
  - my soul will rejoice
  lexicon: HALOT
  rationale: גיל overlaps with rejoicing but often carries a more exuberant nuance;
    'exult' preserves the poetic intensification alongside the previous clause.
- source_word: בֵּאלֹהַי
  chosen: in my God
  alternatives:
  - because of my God
  lexicon: HALOT
  rationale: 'The beth is best taken in parallel with the previous phrase as the sphere/object
    of exultation: ''in my God.'''
- source_word: הִלְבִּישַׁנִי
  chosen: he has clothed me
  alternatives:
  - he clothed me
  lexicon: HALOT
  rationale: The perfect is rendered with present relevance in English because the
    verse celebrates a completed act with ongoing effect.
- source_word: בִּגְדֵי יֶשַׁע
  chosen: garments of salvation
  alternatives:
  - clothes of deliverance
  lexicon: HALOT
  rationale: '''Salvation'' is the standard and theologically weighty rendering of
    יֶשַׁע here; the plural construct ''garments of salvation'' is idiomatic and preserves
    the metaphor.'
- source_word: מְעִיל צְדָקָה
  chosen: a robe of righteousness
  alternatives:
  - a mantle of righteousness
  - a robe of justice
  lexicon: HALOT
  rationale: מְעִיל denotes an outer garment or robe. 'Righteousness' is preferred
    over 'justice' in this poetic clothing metaphor and aligns with the default rendering
    of cognate theological language.
- source_word: יְעָטָנִי
  chosen: he has wrapped me
  alternatives:
  - he has covered me
  - he has enveloped me
  lexicon: HALOT
  rationale: The verb conveys enveloping or wrapping with a garment; 'wrapped me'
    is vivid and natural in English while preserving the clothing imagery.
- source_word: כֶּחָתָן
  chosen: like a bridegroom
  alternatives:
  - as a bridegroom
  lexicon: HALOT
  rationale: Simple comparative כ is best rendered 'like.'
- source_word: יְכַהֵן פְּאֵר
  chosen: who adorns himself with a priestly headdress
  alternatives:
  - who ministers as a priest with a headdress
  - who decks himself with a turban
  lexicon: HALOT
  rationale: The rare denominative/piel from כהן likely evokes priestly adornment
    rather than ordinary officiating. פְּאֵר in this context refers to an ornamental
    headdress/turban. The rendering preserves both the wedding image and the priestly
    allusion without becoming opaque.
- source_word: וְכַכַּלָּה תַּעְדֶּה כֵלֶיהָ
  chosen: and like a bride who decks herself with her jewelry
  alternatives:
  - and like a bride who adorns herself with her ornaments
  lexicon: HALOT
  rationale: עדה means to adorn oneself. כֵלִים here refers to articles/ornaments
    in bridal context, best rendered 'jewelry' in contemporary English.
