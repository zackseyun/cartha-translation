theological_decisions:
- issue: Pronoun shift from second person ('your shame') to third person plural ('their
    share,' 'their land,' 'they will possess')
  chosen_reading: Preserve the shift in translation rather than harmonize all pronouns
    to one person
  alternative_readings:
  - 'Harmonize to second person throughout: ''you will rejoice in your portion...
    in your land you will possess'''
  rationale: The Masoretic text presents a real shift in person. Preserving it maintains
    transparency to the source text and avoids smoothing away a notable feature. Because
    the shift can sound abrupt in English, the sentence is structured to remain readable
    while retaining the distinction.
  doctrine_reference: Translation philosophy §1, §3, §5
