id: ISA.61.7
reference: Isaiah 61:7
source:
  edition: WLC
  text: תַּ֤חַת בָּשְׁתְּ/כֶם֙ מִשְׁנֶ֔ה וּ/כְלִמָּ֖ה יָרֹ֣נּוּ חֶלְקָ֑/ם לָ/כֵ֤ן
    בְּ/אַרְצָ/ם֙ מִשְׁנֶ֣ה יִירָ֔שׁוּ שִׂמְחַ֥ת עוֹלָ֖ם תִּֽהְיֶ֥ה לָ/הֶֽם׃
translation:
  text: Instead of your shame, there will be a double portion; and instead of disgrace,
    they will shout for joy over their share. Therefore in their land they will possess
    a double portion; everlasting joy will be theirs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew shifts from 'your shame' to 'their share / their land / they will
      possess.' Many translations smooth this to 'you/your' throughout for readability.
    reason: alternative_reading
  - marker: b
    text: Or 'they will sing for joy over their portion.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they will inherit a double portion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  chosen: Instead of
  alternatives:
  - in place of
  - under
  lexicon: HALOT
  rationale: In this context the preposition marks exchange or replacement, not spatial
    position. 'Instead of' best conveys the reversal theme of the verse.
- source_word: בָּשְׁתְּכֶם
  chosen: your shame
  alternatives:
  - your disgrace
  lexicon: HALOT
  rationale: The 2mp suffix is retained as 'your.' 'Shame' is the most direct rendering
    of בֹּשֶׁת and fits the honor-shame reversal in context.
- source_word: מִשְׁנֶה
  chosen: a double portion
  alternatives:
  - double
  - twice as much
  lexicon: HALOT
  rationale: The noun commonly denotes a double amount or double portion, especially
    in inheritance/restoration contexts. 'A double portion' is more idiomatic and
    contextually precise than bare 'double.'
- source_word: וּכְלִמָּה
  chosen: and instead of disgrace
  alternatives:
  - and humiliation
  - and reproach
  lexicon: HALOT
  rationale: כְּלִמָּה overlaps with shame but carries the nuance of public dishonor
    or disgrace. Rendering it as 'disgrace' preserves distinction from the previous
    term while keeping the parallelism.
- source_word: יָרֹנּוּ
  chosen: they will shout for joy
  alternatives:
  - they will rejoice
  - they will sing for joy
  lexicon: HALOT
  rationale: The verb רנן denotes ringing cries of joy, often vocal and exuberant.
    'Shout for joy' captures the intensity better than the flatter 'rejoice.'
- source_word: חֶלְקָם
  chosen: their share
  alternatives:
  - their portion
  lexicon: HALOT
  rationale: The noun means portion/share. 'Their share' reads naturally in English
    while still matching the inheritance motif. 'Portion' is preserved as an alternative
    because of its thematic connection to the later inheritance language.
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - therefore indeed
  - so
  lexicon: HALOT
  rationale: This marks the logical consequence of the reversal just described. 'Therefore'
    is the clearest connective in English.
- source_word: בְּאַרְצָם
  chosen: in their land
  alternatives:
  - in their country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the people's own land in a restoration context.
    'Land' preserves covenantal and territorial resonance better than 'country.'
- source_word: יִירָשׁוּ
  chosen: they will possess
  alternatives:
  - they will inherit
  - they will take possession of
  lexicon: HALOT
  rationale: The verb ירשׁ often means inherit/possess. Because the direct object
    here is 'a double portion' rather than the land itself, 'possess' is smoother
    in English while still preserving the inheritance sense.
- source_word: שִׂמְחַת עוֹלָם
  chosen: everlasting joy
  alternatives:
  - eternal joy
  - joy forever
  lexicon: HALOT
  rationale: The construct phrase straightforwardly means enduring or perpetual joy.
    'Everlasting joy' is idiomatic and preserves the elevated tone.
- source_word: תִּהְיֶה לָהֶם
  chosen: will be theirs
  alternatives:
  - will be for them
  - shall belong to them
  lexicon: HALOT
  rationale: This idiomatic English rendering conveys possession/result naturally
    while preserving the future promise.
