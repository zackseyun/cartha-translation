theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering of יְהוָה as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render פְדוּיֵי as 'redeemed' or 'ransomed'
  chosen_reading: redeemed
  alternative_readings:
  - ransomed
  rationale: Both are lexically possible, but 'redeemed' better fits English biblical
    usage and the broader salvific theme without narrowing the image to payment alone.
    The alternative is preserved in a footnote because Isaiah 35:10 is closely related
    to Isaiah 35:9, where 'ransomed' is also contextually plausible.
