id: ISA.35.10
reference: Isaiah 35:10
source:
  edition: WLC
  text: וּ/פְדוּיֵ֨י יְהוָ֜ה יְשֻׁב֗וּ/ן וּ/בָ֤אוּ צִיּוֹן֙ בְּ/רִנָּ֔ה וְ/שִׂמְחַ֥ת
    עוֹלָ֖ם עַל רֹאשָׁ֑/ם שָׂשׂ֤וֹן וְ/שִׂמְחָה֙ יַשִּׂ֔יגוּ וְ/נָ֖סוּ יָג֥וֹן וַ/אֲנָחָֽה־׃פ
translation:
  text: And the redeemed of the LORD will return and come to Zion with singing; everlasting
    joy will be upon their heads. Gladness and joy will overtake them, and sorrow
    and sighing will flee away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the ransomed of the LORD.' The Hebrew term can denote those reclaimed
      by redemption or ransom.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְדוּיֵי יְהוָה
  chosen: the redeemed of the LORD
  alternatives:
  - those redeemed by the LORD
  - the ransomed of the LORD
  lexicon: HALOT
  rationale: פְדוּיֵי is the passive participial form from פדה, denoting those who
    have been redeemed/ransomed. 'Redeemed' is the most natural English rendering
    here and preserves the covenantal-salvific sense. Per doctrine, יְהוָה is rendered
    'the LORD.' 'Ransomed' is viable and appears in similar contexts, but 'redeemed'
    fits the broader biblical idiom and reads more naturally here.
- source_word: יְשֻׁבוּן
  chosen: will return
  alternatives:
  - shall return
  lexicon: HALOT
  rationale: From שוב, 'return/turn back.' Future 'will return' is clear modern English
    and preserves the movement back implied by the verb.
- source_word: וּבָאוּ צִיּוֹן
  chosen: and come to Zion
  alternatives:
  - and enter Zion
  - and come into Zion
  lexicon: HALOT
  rationale: בוא commonly means 'come' or 'enter.' 'Come to Zion' is idiomatic and
    sufficiently precise without overtranslating the prepositionless object.
- source_word: בְּרִנָּה
  chosen: with singing
  alternatives:
  - with joyful shouting
  - with rejoicing
  lexicon: HALOT
  rationale: רִנָּה denotes a ringing cry of joy, often expressed in song or jubilant
    shouting. 'With singing' is traditional and natural here, though the Hebrew can
    include broader jubilant exultation.
- source_word: וְשִׂמְחַת עוֹלָם
  chosen: everlasting joy
  alternatives:
  - eternal joy
  - joy forever
  lexicon: HALOT
  rationale: Construct phrase literally 'joy of eternity/forever.' 'Everlasting joy'
    is concise, idiomatic, and preserves the durative force of עוֹלָם.
- source_word: עַל רֹאשָׁם
  chosen: upon their heads
  alternatives:
  - on their heads
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the vivid image of joy resting like
    a crown or visible adornment. 'Upon' suits the elevated poetic register.
- source_word: שָׂשׂוֹן וְשִׂמְחָה
  chosen: Gladness and joy
  alternatives:
  - Joy and gladness
  - rejoicing and joy
  lexicon: HALOT
  rationale: Both nouns denote celebratory happiness with slight overlap. Rendering
    them as two distinct English terms preserves the Hebrew pairing. 'Gladness and
    joy' avoids excessive repetition after the earlier use of 'joy,' while still reflecting
    both nouns.
- source_word: יַשִּׂיגוּ
  chosen: will overtake them
  alternatives:
  - will obtain
  - will reach them
  lexicon: HALOT
  rationale: From נשׂג, often 'reach, overtake, attain.' With joy as subject and people
    as object, 'will overtake them' vividly conveys blessing catching up to them,
    matching the poetic force better than the flatter 'obtain.'
- source_word: וְנָסוּ
  chosen: will flee away
  alternatives:
  - will vanish
  - will flee
  lexicon: HALOT
  rationale: From נוס, 'flee.' Since sorrow and sighing are personified, 'will flee
    away' preserves the imagery and gives smooth English cadence.
- source_word: יָגוֹן וַאֲנָחָה
  chosen: sorrow and sighing
  alternatives:
  - grief and groaning
  - sorrow and groaning
  lexicon: HALOT
  rationale: יָגוֹן is sorrow/grief; אֲנָחָה is sighing/groaning. 'Sorrow and sighing'
    is a well-established, accurate pairing that preserves the emotional and audible
    dimensions of distress.
