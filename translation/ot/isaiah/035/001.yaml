id: ISA.35.1
reference: Isaiah 35:1
source:
  edition: WLC
  text: יְשֻׂשׂ֥וּ/ם מִדְבָּ֖ר וְ/צִיָּ֑ה וְ/תָגֵ֧ל עֲרָבָ֛ה וְ/תִפְרַ֖ח כַּ/חֲבַצָּֽלֶת׃
translation:
  text: The wilderness and the dry land will rejoice; the desert plain will be glad
    and blossom like the crocus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lily,' 'asphodel,' or another bulb flower; the exact identification
      of חֲבַצָּלֶת is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְשֻׂשׂוּם
  chosen: will rejoice
  alternatives:
  - shall exult
  - will be joyful
  lexicon: HALOT
  rationale: From שׂוּשׂ, expressing exuberant joy. Future sense fits the prophetic
    context. Although the form includes a 3mp suffix ('them'), the clause is best
    represented idiomatically in English with the inanimate subjects 'the wilderness
    and the dry land' as the ones rejoicing rather than preserving a wooden 'they
    will rejoice over them,' which is syntactically difficult here.
- source_word: מִדְבָּר
  chosen: wilderness
  alternatives:
  - desert
  - pastureland
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard and broad rendering for מִדְבָּר in prophetic
    poetry, covering uncultivated wasteland without forcing a specifically sandy-desert
    image.'
- source_word: צִיָּה
  chosen: dry land
  alternatives:
  - parched land
  - dry place
  lexicon: HALOT
  rationale: Pairs naturally with מִדְבָּר while preserving the nuance of aridity.
    'Dry land' is clear modern English and avoids redundancy if מִדְבָּר is also rendered
    'desert.'
- source_word: תָגֵל
  chosen: will be glad
  alternatives:
  - will rejoice
  - will exult
  lexicon: HALOT
  rationale: From גיל, often denoting gladness or exultation. 'Will be glad' provides
    natural variation alongside 'will rejoice' for יְשֻׂשׂוּם while still reflecting
    the semantic overlap.
- source_word: עֲרָבָה
  chosen: desert plain
  alternatives:
  - Arabah
  - steppe
  - desert
  lexicon: HALOT
  rationale: The term can denote the Arabah specifically or, more generally, desert
    steppe/plain. In this poetic context, a common-noun sense is preferable, and 'desert
    plain' communicates the terrain clearly without implying the proper name.
- source_word: תִפְרַח
  chosen: blossom
  alternatives:
  - flower
  - sprout
  lexicon: HALOT
  rationale: From פרח, used of flowering or blossoming vegetation. 'Blossom' is idiomatic
    and fits the poetic image of barren land becoming fertile.
- source_word: חֲבַצָּלֶת
  chosen: crocus
  alternatives:
  - lily
  - asphodel
  - meadow saffron
  lexicon: HALOT
  rationale: The exact species is uncertain, but 'crocus' is a widely accepted modern
    rendering for a bulb flower in this context. Because the identification is not
    certain, alternatives are preserved in a footnote.
