theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of הֵמָּה ('they')
  chosen_reading: Retain the plural pronoun as 'They,' referring to those inhabiting/associated with the restored land
  alternative_readings:
  - 'Treat the renewed regions poetically as the subject: ''these shall see'''
  - 'Restructure to avoid the pronoun: ''there the glory of the LORD will be seen'''
  rationale: The Hebrew explicitly uses a plural pronoun and plural verb. Preserving 'they' maintains the text's grammar and avoids interpretive over-smoothing, while allowing the poetic shift from land imagery to its human beneficiaries.
