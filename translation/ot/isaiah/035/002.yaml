id: ISA.35.2
reference: Isaiah 35:2
source:
  edition: WLC
  text: פָּרֹ֨חַ תִּפְרַ֜ח וְ/תָגֵ֗ל אַ֚ף גִּילַ֣ת וְ/רַנֵּ֔ן כְּב֤וֹד הַ/לְּבָנוֹן֙ נִתַּן לָ֔/הּ הֲדַ֥ר הַ/כַּרְמֶ֖ל וְ/הַ/שָּׁר֑וֹן הֵ֛מָּה יִרְא֥וּ כְבוֹד יְהוָ֖ה הֲדַ֥ר אֱלֹהֵֽי/נוּ־־׃ס
translation:
  text: It will blossom abundantly and rejoice—yes, with rejoicing and a shout of joy. The glory of Lebanon will be given to it, the majesty of Carmel and Sharon. They will see the glory of Yahweh, the majesty of our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will surely blossom'; the Hebrew uses an infinitive absolute with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Lebanon, Carmel, and Sharon are regions famed for natural beauty and fertility; the imagery depicts the desert receiving their splendor.
    reason: cultural_note
  - marker: c
    text: Hebrew 'YHWH,' traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: פָּרֹחַ תִּפְרַח
  chosen: will blossom abundantly
  alternatives:
  - will surely blossom
  - will blossom and blossom
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verbal idea. 'Will blossom abundantly' captures the emphatic force in natural English better than a wooden repetition while preserving the image of flourishing.
- source_word: וְתָגֵל
  chosen: and rejoice
  alternatives:
  - and exult
  - and be glad
  lexicon: HALOT
  rationale: גיל conveys exuberant joy. 'Rejoice' is clear modern English and fits the poetic parallelism with the following nouns and verb of singing/shouting.
- source_word: אַף
  chosen: 'yes'
  alternatives:
  - indeed
  - even
  lexicon: HALOT
  rationale: Here אַף functions as an emphatic particle heightening the expression. 'Yes' conveys the intensification idiomatically in English poetry.
- source_word: גִּילַת
  chosen: with rejoicing
  alternatives:
  - with exultation
  - joyfully
  lexicon: HALOT
  rationale: The noun is cognate with גיל and reinforces the previous verb. Rendering it as 'with rejoicing' preserves the Hebrew's emphatic cognate construction without flattening it into a single English verb.
- source_word: וְרַנֵּן
  chosen: and a shout of joy
  alternatives:
  - and singing
  - and ringing cries
  lexicon: HALOT
  rationale: רנן can denote ringing cries of joy or jubilant singing. 'A shout of joy' best matches the climactic, audible celebration in context while remaining natural English.
- source_word: כְּבוֹד הַלְּבָנוֹן
  chosen: The glory of Lebanon
  alternatives:
  - the splendor of Lebanon
  lexicon: HALOT
  rationale: כבוד often denotes glory, honor, or splendor. 'Glory' preserves the lexical link with the later 'glory of the LORD,' allowing the poetic comparison to stand.
- source_word: נִתַּן לָהּ
  chosen: will be given to it
  alternatives:
  - has been given to it
  lexicon: HALOT
  rationale: Though morphologically a perfect/passive form, in prophetic poetry it naturally carries a future sense in context. 'Will be given' fits the surrounding future-oriented restoration imagery.
- source_word: הֲדַר
  chosen: majesty
  alternatives:
  - splendor
  - beauty
  lexicon: HALOT
  rationale: הדר denotes majesty or splendor. 'Majesty' distinguishes it from כבוד ('glory') while preserving elevated diction appropriate to both the land's beauty and God's grandeur.
- source_word: הַכַּרְמֶל וְהַשָּׁרוֹן
  chosen: Carmel and Sharon
  alternatives:
  - the Carmel and the Sharon
  lexicon: HALOT
  rationale: These are place names and are best transliterated per project philosophy. Omitting repeated articles yields natural English while preserving the geographic references.
- source_word: הֵמָּה יִרְאוּ
  chosen: They will see
  alternatives:
  - These will see
  - Those ones will see
  lexicon: HALOT
  rationale: The masculine plural pronoun likely refers to the people associated with the renewed land rather than the feminine singular wilderness/land itself. 'They will see' is the most natural rendering of the explicit pronoun plus verb.
- source_word: כְבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the glory of Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' Retaining 'glory' also preserves the lexical echo with 'the glory of Lebanon.'
- source_word: הֲדַר אֱלֹהֵינוּ
  chosen: the majesty of our God
  alternatives:
  - the splendor of our God
  lexicon: HALOT
  rationale: Using 'majesty' consistently for הדר preserves the parallelism with the previous colon and communicates divine grandeur clearly.
