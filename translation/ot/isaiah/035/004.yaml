theological_decisions:
- issue: Relationship between divine vengeance and salvation
  chosen_reading: 'Render both motifs directly: God comes in vengeance/recompense
    against enemies and in salvation for his people.'
  alternative_readings:
  - Soften vengeance into mere justice
  - Interpret salvation only spiritually
  rationale: The Hebrew places vengeance/recompense and saving action side by side.
    The translation preserves this tension rather than resolving it, in keeping with
    the text's own presentation and the project's principle of preserving theological
    tension.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
