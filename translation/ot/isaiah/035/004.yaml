id: ISA.35.4
reference: Isaiah 35:4
source:
  edition: WLC
  text: אִמְרוּ֙ לְ/נִמְהֲרֵי לֵ֔ב חִזְק֖וּ אַל תִּירָ֑אוּ הִנֵּ֤ה אֱלֹֽהֵי/כֶם֙ נָקָ֣ם
    יָב֔וֹא גְּמ֣וּל אֱלֹהִ֔ים ה֥וּא יָב֖וֹא וְ/יֹשַׁעֲ/כֶֽם־־׃
translation:
  text: Say to those with an anxious heart, “Be strong; do not fear. Look, your God
    will come with vengeance, with divine recompense; he himself will come and save
    you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “those of a hasty heart,” that is, those inwardly agitated or panic-stricken.
    reason: lexical_alternative
  - marker: b
    text: Or “with the recompense of God.”
    reason: lexical_alternative
lexical_decisions:
- source_word: נִמְהֲרֵי לֵב
  chosen: those with an anxious heart
  alternatives:
  - those of a hasty heart
  - those with a fearful heart
  lexicon: HALOT
  rationale: The phrase is literally 'hasty of heart,' but in context it refers to
    people inwardly agitated, alarmed, or panic-prone. 'Anxious heart' communicates
    the idiom's sense in natural English without over-paraphrasing. 'Fearful heart'
    is possible from context, but the following prohibition 'do not fear' suggests
    the first phrase describes inner agitation more broadly.
- source_word: חִזְקוּ
  chosen: Be strong
  alternatives:
  - Take courage
  - Strengthen yourselves
  lexicon: HALOT
  rationale: Imperative plural from חזק. 'Be strong' is the most direct and idiomatic
    rendering in English, preserving the exhortational force.
- source_word: אַל תִּירָאוּ
  chosen: do not fear
  alternatives:
  - do not be afraid
  lexicon: HALOT
  rationale: A standard negative imperative from ירא. 'Do not fear' is concise, natural,
    and preserves the biblical register.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces attention to what follows. 'Look' is readable modern English
    and retains the deictic force better than omitting it.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second person plural suffix. 'Your God'
    preserves covenantal and relational force.
- source_word: נָקָם
  chosen: vengeance
  alternatives:
  - vengeance/judgment
  - avenging
  lexicon: HALOT
  rationale: The noun denotes vengeance or avenging. 'Vengeance' is the standard lexical
    equivalent here and fits the parallel with recompense.
- source_word: גְּמוּל אֱלֹהִים
  chosen: divine recompense
  alternatives:
  - the recompense of God
  - God's repayment
  lexicon: HALOT
  rationale: The construct phrase can be rendered woodenly as 'recompense of God,'
    but in English 'divine recompense' is more natural while preserving that the recompense
    belongs to or comes from God. This avoids implying mere human retaliation.
- source_word: הוּא
  chosen: he himself
  alternatives:
  - he
  - he indeed
  lexicon: HALOT
  rationale: The independent pronoun is emphatic alongside the verb. 'He himself'
    preserves the emphasis that God personally comes.
- source_word: וְיֹשַׁעֲכֶם
  chosen: and save you
  alternatives:
  - and deliver you
  lexicon: HALOT
  rationale: From ישׁע in the Hiphil, meaning to save/deliver. 'Save you' is the broadest
    and most theologically resonant rendering, while still fitting the immediate context
    of deliverance.
