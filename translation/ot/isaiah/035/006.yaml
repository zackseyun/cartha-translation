id: ISA.35.6
reference: Isaiah 35:6
source:
  edition: WLC
  text: אָ֣ז יְדַלֵּ֤ג כָּֽ/אַיָּל֙ פִּסֵּ֔חַ וְ/תָרֹ֖ן לְשׁ֣וֹן אִלֵּ֑ם כִּֽי נִבְקְע֤וּ
    בַ/מִּדְבָּר֙ מַ֔יִם וּ/נְחָלִ֖ים בָּ/עֲרָבָֽה־׃
translation:
  text: Then the lame man will leap like a deer, and the tongue of the mute will sing
    for joy; for waters have burst forth in the wilderness, and streams in the desert
    plain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will shout for joy' for 'will sing for joy.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the Arabah,' taking the term as a geographic name rather than the
      common noun 'desert plain.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְדַלֵּג
  chosen: will leap
  alternatives:
  - will skip
  - will spring
  lexicon: HALOT
  rationale: The piel imperfect conveys lively, vigorous jumping. 'Leap' is idiomatic
    and vivid in English, fitting the healing/restoration imagery better than the
    less natural 'skip' or the slightly narrower 'spring.'
- source_word: כָּאַיָּל
  chosen: like a deer
  alternatives:
  - like a stag
  - like a hart
  lexicon: HALOT
  rationale: אַיָּל can denote a deer/stag. 'Deer' is the most accessible modern English
    choice and preserves the simile without archaic diction such as 'hart.'
- source_word: פִּסֵּחַ
  chosen: the lame man
  alternatives:
  - the lame
  - the crippled man
  lexicon: HALOT
  rationale: The adjective functions substantivally for a person with lameness. 'The
    lame man' is gender-accurate singular English and reads naturally; 'the lame'
    is possible but less explicit in English.
- source_word: וְתָרֹן
  chosen: will sing for joy
  alternatives:
  - will shout for joy
  - will cry out
  lexicon: HALOT
  rationale: The verb רנן commonly denotes ringing cries of joy, often in song-like
    praise. 'Sing for joy' captures the celebratory sense and pairs well with 'tongue,'
    while 'shout for joy' remains a viable lexical alternative.
- source_word: לְשׁוֹן אִלֵּם
  chosen: the tongue of the mute
  alternatives:
  - the tongue of the speechless
  - the mute tongue
  lexicon: HALOT
  rationale: The Hebrew literally speaks of the 'tongue' of a mute person, emphasizing
    restored speech. 'Mute' is concise and close to the source; 'speechless' is possible
    but can imply temporary astonishment rather than inability to speak.
- source_word: נִבְקְעוּ
  chosen: have burst forth
  alternatives:
  - have broken open
  - have split open
  lexicon: HALOT
  rationale: The niphal of בקע conveys being split/opened. With 'waters' as subject,
    'have burst forth' gives the natural English result of waters breaking out from
    the ground while preserving the force of sudden emergence.
- source_word: בַמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר often denotes wilderness/desert land. 'Wilderness' preserves
    the broader biblical sense of uncultivated wasteland and avoids flattening the
    distinction from עֲרָבָה later in the verse.
- source_word: מַיִם
  chosen: waters
  alternatives:
  - water
  lexicon: HALOT
  rationale: The plural form is retained as 'waters,' which is idiomatic in elevated
    English and matches the Hebrew plurality.
- source_word: וּנְחָלִים
  chosen: streams
  alternatives:
  - wadis
  - brooks
  - torrent-beds
  lexicon: HALOT
  rationale: נְחָלִים can refer to streams/wadis. 'Streams' is the clearest natural
    English rendering in context, emphasizing flowing water in a formerly barren place.
    'Wadis' is more culturally specific but less accessible.
- source_word: בָּעֲרָבָה
  chosen: in the desert plain
  alternatives:
  - in the Arabah
  - in the dry land
  lexicon: HALOT
  rationale: עֲרָבָה may denote desert steppe/plain and can also function as the proper
    name Arabah. Here the common-noun sense best fits the poetic parallel with 'wilderness.'
    'Desert plain' preserves the terrain nuance better than simply 'desert.'
