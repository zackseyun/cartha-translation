theological_decisions:
- issue: Nature of the restoration imagery
  chosen_reading: Render the verse as describing concrete bodily healing and environmental
    renewal without narrowing it to either purely literal or purely metaphorical fulfillment.
  alternative_readings:
  - purely metaphorical spiritual restoration
  - exclusively eschatological literal healing
  rationale: The Hebrew presents real bodily disabilities reversed and barren land
    made watery. The translation should preserve that full prophetic imagery and not
    pre-decide a theological scheme of fulfillment beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
