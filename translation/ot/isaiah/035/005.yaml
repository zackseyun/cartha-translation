id: ISA.35.5
reference: Isaiah 35:5
source:
  edition: WLC
  text: אָ֥ז תִּפָּקַ֖חְנָה עֵינֵ֣י עִוְרִ֑ים וְ/אָזְנֵ֥י חֵרְשִׁ֖ים תִּפָּתַֽחְנָה׃
translation:
  text: Then the eyes of the blind will be opened, and the ears of the deaf will be
    unstopped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be opened' for 'the ears of the deaf will be unstopped.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb marking the consequent future moment in the prophetic
    sequence. 'Then' is natural, concise English and preserves the forward-looking
    force.
- source_word: תִּפָּקַחְנָה
  chosen: will be opened
  alternatives:
  - will be opened wide
  - will be cleared
  lexicon: HALOT
  rationale: Nifal imperfect 3fp from פקח, here with 'eyes' as subject. The passive/reflexive
    sense is best rendered 'will be opened.' 'Opened wide' is possible but adds emphasis
    not explicit in the Hebrew.
- source_word: עֵינֵי
  chosen: the eyes of
  alternatives:
  - eyes of
  lexicon: HALOT
  rationale: 'Construct form requiring completion by the following noun. English idiom
    naturally supplies the article: ''the eyes of the blind.'''
- source_word: עִוְרִים
  chosen: the blind
  alternatives:
  - blind people
  - blind ones
  lexicon: HALOT
  rationale: Adjectival plural used substantivally. 'The blind' is idiomatic English
    and preserves the concise Hebrew expression without unnecessary expansion.
- source_word: וְ/אָזְנֵי
  chosen: and the ears of
  alternatives:
  - and ears of
  lexicon: HALOT
  rationale: Conjunction plus construct plural of 'ear.' The article is natural in
    English parallelism with the first clause.
- source_word: חֵרְשִׁים
  chosen: the deaf
  alternatives:
  - deaf people
  - deaf ones
  lexicon: HALOT
  rationale: Adjectival plural used substantivally. 'The deaf' is the most direct
    and literary rendering in parallel with 'the blind.'
- source_word: תִּפָּתַחְנָה
  chosen: will be unstopped
  alternatives:
  - will be opened
  lexicon: HALOT
  rationale: Nifal imperfect 3fp from פתח, literally 'will be opened.' Because the
    object is 'ears,' English idiom strongly favors 'will be unstopped,' which communicates
    restored hearing more naturally while remaining faithful to the sense. The more
    literal 'opened' is preserved as an alternative.
