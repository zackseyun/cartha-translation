theological_decisions:
- issue: Nature of the restoration imagery
  chosen_reading: Render as straightforward bodily restoration language without narrowing
    it to either purely literal healing or purely metaphorical spiritual renewal.
  alternative_readings:
  - literal miraculous healing only
  - metaphorical spiritual perception only
  rationale: The verse itself presents prophetic restoration in concrete bodily terms
    ('eyes,' 'ears'). The translation should preserve that imagery and not resolve
    broader interpretive debates about whether the fulfillment is physical, spiritual,
    or both.
  doctrine_reference: Preserve theological tension rather than resolve it.
