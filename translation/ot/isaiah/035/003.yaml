id: ISA.35.3
reference: Isaiah 35:3
source:
  edition: WLC
  text: חַזְּק֖וּ יָדַ֣יִם רָפ֑וֹת וּ/בִרְכַּ֥יִם כֹּשְׁל֖וֹת אַמֵּֽצוּ׃
translation:
  text: Strengthen weak hands, and make firm stumbling knees.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'feeble knees' or 'knees that give way.' The Hebrew participle pictures
      knees that are stumbling or tottering.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַזְּקוּ
  chosen: Strengthen
  alternatives:
  - Be strong
  - Strengthen
  lexicon: HALOT
  rationale: Piel imperative plural of חזק here is causative/exhortative toward the
    following object ('hands'), so 'Strengthen' fits better than the intransitive
    'Be strong.'
- source_word: יָדַיִם
  chosen: hands
  alternatives:
  - hands
  lexicon: HALOT
  rationale: Literal dual/plural form referring concretely to hands; retained literally
    in English.
- source_word: רָפוֹת
  chosen: weak
  alternatives:
  - feeble
  - slack
  - drooping
  lexicon: HALOT
  rationale: Adjective from רפה describes hands lacking strength. 'Weak' is clear
    modern English and matches the physical metaphor without archaism.
- source_word: וּבִרְכַּיִם
  chosen: and ... knees
  alternatives:
  - and knees
  lexicon: HALOT
  rationale: Conjunction plus noun 'knees'; the conjunction is retained explicitly
    in English to preserve the parallel structure.
- source_word: כֹּשְׁלוֹת
  chosen: stumbling
  alternatives:
  - feeble
  - giving way
  - tottering
  lexicon: HALOT
  rationale: Qal participle feminine plural from כשל, literally 'stumbling' or 'giving
    way.' 'Stumbling knees' preserves the vivid Hebrew image better than flattening
    to 'feeble knees.'
- source_word: אַמֵּצוּ
  chosen: make firm
  alternatives:
  - strengthen
  - fortify
  - make strong
  lexicon: HALOT
  rationale: Piel imperative plural of אמץ overlaps with חזק but is not identical;
    rendering it 'make firm' preserves the poetic variation instead of repeating 'strengthen'
    twice.
