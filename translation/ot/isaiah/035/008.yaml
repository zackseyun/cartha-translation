id: ISA.35.8
reference: Isaiah 35:8
source:
  edition: WLC
  text: וְ/הָיָה שָׁ֞ם מַסְל֣וּל וָ/דֶ֗רֶךְ וְ/דֶ֤רֶךְ הַ/קֹּ֨דֶשׁ֙ יִקָּ֣רֵא לָ֔/הּ
    לֹֽא יַעַבְרֶ֥/נּוּ טָמֵ֖א וְ/הוּא לָ֑/מוֹ הֹלֵ֥ךְ דֶּ֛רֶךְ וֶ/אֱוִילִ֖ים לֹ֥א
    יִתְעֽוּ־־־׃
translation:
  text: And there shall be a highway there, and a road, and it shall be called the
    Holy Way. The unclean shall not pass over it, but it shall be for them; whoever
    walks on the way—even fools—shall not go astray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew clause difficult: ''but it shall be for them'' may also be understood
      as ''and he shall be with them'' or ''it shall belong to them.'''
    reason: alternative_reading
  - marker: b
    text: Or 'shall not wander' / 'shall not err.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַסְלוּל
  chosen: highway
  alternatives:
  - raised road
  - causeway
  lexicon: HALOT
  rationale: Refers to a built-up roadway or highway. 'Highway' is idiomatic modern
    English and preserves the image of a prepared route.
- source_word: דֶּרֶךְ
  chosen: road / way
  alternatives:
  - path
  lexicon: HALOT
  rationale: The verse uses דֶּרֶךְ repeatedly with slightly different force. 'Road'
    in the first pairing with מַסְלוּל avoids awkward repetition, while 'Way' in 'Holy
    Way' preserves the naming formula and the thematic sense of a divinely appointed
    route.
- source_word: הַקֹּדֶשׁ
  chosen: Holy
  alternatives:
  - holyness
  - sacred
  lexicon: HALOT
  rationale: In construct with דֶּרֶךְ, the phrase denotes consecration to God. 'Holy
    Way' is natural English and preserves the covenantal-sacral sense.
- source_word: יִקָּרֵא לָהּ
  chosen: it shall be called
  alternatives:
  - one shall call it
  - it shall be named
  lexicon: HALOT
  rationale: Niphal of קרא here is best rendered as a passive naming formula. The
    feminine suffix refers back to the road/way.
- source_word: טָמֵא
  chosen: the unclean
  alternatives:
  - unclean person
  - impure
  lexicon: HALOT
  rationale: The adjective is used substantivally. 'The unclean' preserves the cultic
    and moral resonance without over-specifying one dimension.
- source_word: יַעַבְרֶנּוּ
  chosen: shall not pass over it
  alternatives:
  - shall not travel on it
  - shall not pass through it
  lexicon: HALOT
  rationale: From עבר with 3ms suffix referring to the way. 'Pass over it' is a clear
    rendering that keeps the movement imagery.
- source_word: וְהוּא לָמוֹ
  chosen: but it shall be for them
  alternatives:
  - and he shall be with them
  - and it is for them
  - and he himself is for them
  lexicon: HALOT
  rationale: This clause is syntactically difficult. The most coherent reading in
    context takes הוּא as referring to the way and לָמוֹ as 'for them,' i.e., for
    God's redeemed people. This fits the following clause about those who walk on
    the way. Alternative construals are preserved in a footnote.
- source_word: הֹלֵךְ דֶּרֶךְ
  chosen: whoever walks on the way
  alternatives:
  - one walking the road
  - the one who walks the way
  lexicon: HALOT
  rationale: A participial expression describing travelers on this route. 'Whoever
    walks on the way' is idiomatic and captures the generic force.
- source_word: אֱוִילִים
  chosen: fools
  alternatives:
  - foolish ones
  - simpletons
  lexicon: HALOT
  rationale: The term denotes foolish persons, not merely intellectually limited people.
    'Fools' is the standard concise rendering.
- source_word: לֹא יִתְעוּ
  chosen: shall not go astray
  alternatives:
  - shall not wander
  - shall not err
  lexicon: HALOT
  rationale: From תעה, to wander or stray. 'Go astray' fits both literal and metaphorical
    senses in this pilgrimage context.
