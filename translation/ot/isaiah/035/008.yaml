theological_decisions:
- issue: Nature of uncleanness in 'the unclean shall not pass over it'
  chosen_reading: Retain the broad term 'the unclean' without narrowing it to ritual
    or moral impurity alone.
  alternative_readings:
  - the ritually unclean
  - the morally impure
  rationale: The Hebrew adjective can carry cultic and ethical resonance in prophetic
    literature. Narrowing to one category would resolve a tension the text itself
    leaves open. The translation therefore preserves the broader category.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Interpretation of the difficult clause וְהוּא לָמוֹ
  chosen_reading: 'Refer the pronoun to the road: ''but it shall be for them.'''
  alternative_readings:
  - '''and he shall be with them'''
  - '''and it shall belong to them'''
  rationale: 'The clause is notoriously compressed. In context, taking the pronoun
    as referring to the way best supports the contrast: the unclean are excluded,
    but the way is for God''s people. This reading also flows naturally into the next
    clause about those who walk on it. Alternatives are preserved in a footnote because
    the syntax is genuinely difficult.'
  doctrine_reference: Preserve theological tension rather than resolve it.
