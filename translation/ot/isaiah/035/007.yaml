id: ISA.35.7
reference: Isaiah 35:7
source:
  edition: WLC
  text: וְ/הָיָ֤ה הַ/שָּׁרָב֙ לַ/אֲגַ֔ם וְ/צִמָּא֖וֹן לְ/מַבּ֣וּעֵי מָ֑יִם בִּ/נְוֵ֤ה
    תַנִּים֙ רִבְצָ֔/הּ חָצִ֖יר לְ/קָנֶ֥ה וָ/גֹֽמֶא׃
translation:
  text: The burning sand will become a pool, and the thirsty ground springs of water;
    in the haunt of jackals, where they lie down, there will be grass with reeds and
    rushes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mirage will become a pool.' The Hebrew שָׁרָב can denote parching
      heat or the shimmering, heat-struck desert appearance.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the pasture/dwelling place of jackals, its resting place.' The Hebrew
      syntax in the final clause is compressed and allows slightly different ways
      of relating 'jackals,' 'resting place,' and the new vegetation.
    reason: lexical_alternative
  - marker: c
    text: '''Rushes'' may also be rendered ''papyrus'' for the Hebrew גֹמֶא.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׁרָב
  chosen: the burning sand
  alternatives:
  - the mirage
  - the scorched land
  - the heat
  lexicon: HALOT
  rationale: שָׁרָב denotes parching heat or the sun-scorched, shimmering desert condition.
    In this restoration context, 'burning sand' captures the concrete landscape image
    better than the abstract 'heat,' while avoiding the potentially misleading modern
    sense of 'mirage' as mere illusion.
- source_word: לַאֲגַם
  chosen: a pool
  alternatives:
  - a marsh
  - a pond
  lexicon: HALOT
  rationale: אֲגַם refers to a pool or marshy body of water. 'Pool' is natural English
    and fits the transformation imagery without over-specifying wetland ecology.
- source_word: צִמָּאוֹן
  chosen: the thirsty ground
  alternatives:
  - the thirsty land
  - thirst
  - parched ground
  lexicon: HALOT
  rationale: Though the noun can denote 'thirst' or 'parched place,' the parallelism
    with landscape terms favors a topographical sense. 'Thirsty ground' preserves
    the vivid personified image while making clear that land, not people, is in view.
- source_word: לְמַבּוּעֵי מָיִם
  chosen: springs of water
  alternatives:
  - fountains of water
  - water springs
  lexicon: HALOT
  rationale: מַבּוּעַ denotes a spring or fountain source. 'Springs of water' is idiomatic
    and preserves the plural abundance implied by the construct phrase.
- source_word: בִּנְוֵה תַנִּים
  chosen: in the haunt of jackals
  alternatives:
  - in the pasture of jackals
  - in the dwelling place of jackals
  - in the abode of dragons
  lexicon: HALOT
  rationale: נָוֶה is a habitation or haunt; תַנִּים in prophetic wilderness contexts
    is best rendered 'jackals,' not the archaic/traditional 'dragons.' 'Haunt' suits
    the desolate-animal setting.
- source_word: רִבְצָהּ
  chosen: where they lie down
  alternatives:
  - its resting place
  - her lair
  - their crouching place
  lexicon: HALOT
  rationale: From רבץ, 'to lie down, crouch.' The suffix refers back to the jackal
    haunt/lair context. Rendering it verbally as 'where they lie down' makes the Hebrew
    image clear in English and naturally connects to the plural 'jackals'.
- source_word: חָצִיר
  chosen: grass
  alternatives:
  - herbage
  - green grass
  lexicon: HALOT
  rationale: חָצִיר commonly means grass or herbage. 'Grass' is the plain, natural
    rendering here.
- source_word: לְקָנֶה וָגֹמֶא
  chosen: with reeds and rushes
  alternatives:
  - for reeds and papyrus
  - into reeds and rushes
  lexicon: HALOT
  rationale: קָנֶה is reed; גֹמֶא is rush/papyrus. The prefixed לְ likely marks result
    or transformation. 'With reeds and rushes' communicates the emergence of wetland
    vegetation in readable English; 'papyrus' is possible for גֹמֶא but 'rushes' is
    broader and fits the poetic scene.
