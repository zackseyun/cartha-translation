theological_decisions:
- issue: Redemption terminology in גְּאוּלִים
  chosen_reading: the redeemed
  alternative_readings:
  - the ransomed
  rationale: The verse uses גאל ('redeem'), while the following verse uses פדה ('ransom').
    Rendering גְּאוּלִים as 'the redeemed' preserves the lexical distinction across
    the passage rather than flattening both to 'ransomed.'
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
