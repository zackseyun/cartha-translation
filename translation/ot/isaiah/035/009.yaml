id: ISA.35.9
reference: Isaiah 35:9
source:
  edition: WLC
  text: לֹא יִהְיֶ֨ה שָׁ֜ם אַרְיֵ֗ה וּ/פְרִ֤יץ חַיּוֹת֙ בַּֽל יַעֲלֶ֔/נָּה לֹ֥א תִמָּצֵ֖א
    שָׁ֑ם וְ/הָלְכ֖וּ גְּאוּלִֽים־־׃
translation:
  text: No lion will be there, and no ravenous beast will go up on it; it will not
    be found there, but the redeemed will walk there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'violent beast,' 'ferocious beast,' or 'predatory beast' for the Hebrew
      phrase 'ravenous beast.'
    reason: lexical_alternative
  - marker: b
    text: The pronoun in 'go up on it' likely refers to the highway mentioned in the
      previous verse.
    reason: cross_reference
  - marker: c
    text: Or 'the ransomed'; this verse uses the Hebrew term for 'redeemed,' distinct
      from the term 'ransomed' used in the next verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַרְיֵה
  chosen: lion
  lexicon: HALOT
  rationale: Straightforward animal term; singular used generically in English as
    'lion.'
- source_word: פְרִיץ חַיּוֹת
  chosen: ravenous beast
  alternatives:
  - violent beast
  - ferocious beast
  - predatory beast
  lexicon: HALOT
  rationale: פְרִיץ conveys violent, ruthless, or fierce force; with חַיּוֹת ('wild
    animals/beasts') the phrase denotes a dangerous predatory animal. 'Ravenous beast'
    captures both threat and animal imagery in idiomatic English.
- source_word: בַּל
  chosen: no / not
  alternatives:
  - never
  lexicon: HALOT
  rationale: Poetic negative particle strengthening the denial. In English the force
    is naturally conveyed by 'no'/'not' rather than a wooden retention.
- source_word: יַעֲלֶנָּה
  chosen: will go up on it
  alternatives:
  - will come up on it
  - will ascend it
  lexicon: HALOT
  rationale: עלה means 'go up/ascend.' The 3fs suffix most naturally refers back to
    the raised 'way/highway' of the previous verse, so 'on it' preserves the feminine
    pronominal object without over-specifying 'the highway' in this verse alone.
- source_word: תִמָּצֵא
  chosen: will be found
  alternatives:
  - will be present
  - will be encountered
  lexicon: HALOT
  rationale: Niphal of מצא commonly means 'be found.' The feminine singular likely
    refers to the dangerous beast just mentioned as a collective/implicit referent;
    English keeps the passive idiom.
- source_word: גְּאוּלִים
  chosen: the redeemed
  alternatives:
  - those who are redeemed
  - ransomed ones
  lexicon: HALOT
  rationale: Passive participial form from גאל, denoting those redeemed or reclaimed.
    'The redeemed' is concise, natural, and preserves the theological resonance of
    divine redemption.
- source_word: וְהָלְכוּ
  chosen: will walk there
  alternatives:
  - will travel there
  - will walk on it
  lexicon: HALOT
  rationale: הלך is the ordinary verb 'walk/go.' 'Walk there' fits the immediate contrast
    with dangerous animals absent from that place, while still allowing the implied
    roadway from context.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Repeated adverb emphasizes the safety of the location; 'there' preserves
    the repetition naturally in English.
