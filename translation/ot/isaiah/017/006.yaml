id: ISA.17.6
reference: Isaiah 17:6
source:
  edition: WLC
  text: וְ/נִשְׁאַר בּ֤/וֹ עֽוֹלֵלֹת֙ כְּ/נֹ֣קֶף זַ֔יִת שְׁנַ֧יִם שְׁלֹשָׁ֛ה גַּרְגְּרִ֖ים
    בְּ/רֹ֣אשׁ אָמִ֑יר אַרְבָּעָ֣ה חֲמִשָּׁ֗ה בִּ/סְעִפֶ֨י/הָ֙ פֹּֽרִיָּ֔ה נְאֻם יְהוָ֖ה
    אֱלֹהֵ֥י יִשְׂרָאֵֽל־־׃ס
translation:
  text: 'Yet gleanings will be left in it, as when an olive tree is beaten: two or
    three berries at the top of the highest bough, four or five on its fruitful branches,
    declares the LORD, the God of Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two or three olives ... four or five among its boughs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁאַר
  chosen: Yet ... will be left
  alternatives:
  - And ... will remain
  - But ... will be left
  lexicon: HALOT
  rationale: Nifal of שׁאר conveys remaining or being left over. 'Will be left' is
    natural English; 'Yet' captures the adversative/waw-contextual sense from the
    preceding judgment oracle.
- source_word: בּוֹ
  chosen: in it
  alternatives:
  - on it
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the entity under judgment, likely
    the land/people imagery. 'In it' is the most neutral rendering for בְּ here.
- source_word: עֹלֵלֹת
  chosen: gleanings
  alternatives:
  - gleanings of fruit
  - leftover fruit
  lexicon: HALOT
  rationale: The noun denotes what is left for gleaning after harvest. 'Gleanings'
    preserves the agricultural image and the idea of a small remnant.
- source_word: כְּנֹקֶף זַיִת
  chosen: as when an olive tree is beaten
  alternatives:
  - like the beating of an olive tree
  - as at the striking of an olive tree
  lexicon: HALOT
  rationale: נֹקֶף refers to the beating/shaking process used in olive harvest. Rendering
    as a clause gives idiomatic English while preserving the simile.
- source_word: גַּרְגְּרִים
  chosen: berries
  alternatives:
  - olives
  - fruit
  lexicon: HALOT
  rationale: The word means individual berries/grains. In olive-tree context, 'berries'
    communicates small individual fruits left behind; 'olives' is possible but less
    closely tied to the lexical sense of separate small units.
- source_word: בְּרֹאשׁ אָמִיר
  chosen: at the top of the highest bough
  alternatives:
  - at the top of the branch
  - on the treetop branch
  lexicon: HALOT
  rationale: רֹאשׁ is 'top/head'; אָמִיר denotes the topmost branch or bough. 'Highest
    bough' captures the elevated outer branch where a few fruits remain.
- source_word: בִּסְעִפֶיהָ
  chosen: on its ... branches
  alternatives:
  - in its boughs
  - among its branches
  lexicon: HALOT
  rationale: סְעִפִים are branches/boughs. 'On its branches' is idiomatic with fruit
    imagery; the 3fs suffix refers to the olive tree.
- source_word: פֹּרִיָּה
  chosen: fruitful
  alternatives:
  - fruit-bearing
  - laden with fruit
  lexicon: HALOT
  rationale: The adjective means fruitful or fruit-bearing. 'Fruitful branches' is
    concise and natural English.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. Following doctrine, יְהוָה is rendered 'the
    LORD.' 'Declares' fits prophetic diction in readable modern English.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct chain; retained fully to preserve covenantal
    identification.
