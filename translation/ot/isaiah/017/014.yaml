id: ISA.17.14
reference: Isaiah 17:14
source:
  edition: WLC
  text: לְ/עֵ֥ת עֶ֨רֶב֙ וְ/הִנֵּ֣ה בַלָּהָ֔ה בְּ/טֶ֥רֶם בֹּ֖קֶר אֵינֶ֑/נּוּ זֶ֚ה חֵ֣לֶק
    שׁוֹסֵ֔י/נוּ וְ/גוֹרָ֖ל לְ/בֹזְזֵֽי/נוּ׃ס
translation:
  text: At evening time, look—terror! Before morning, he is no more. This is the portion
    of those who plunder us, and the lot of those who loot us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it is no more.' The Hebrew expression can refer either to the enemy
      as a personified collective or to the threat/army more impersonally.
    reason: alternative_reading
lexical_decisions:
- source_word: לְעֵת עֶרֶב
  chosen: At evening time
  alternatives:
  - At the time of evening
  - In the evening
  lexicon: HALOT
  rationale: The preposition לְ with עֵת gives a temporal sense, and עֶרֶב is 'evening.'
    'At evening time' preserves the Hebrew temporal framing while remaining natural
    English.
- source_word: וְהִנֵּה
  chosen: look—
  alternatives:
  - behold
  - and behold
  lexicon: HALOT
  rationale: הִנֵּה is a deictic/interjection drawing attention. 'Look—' conveys the
    suddenness and vividness in readable modern English better than archaic 'behold.'
- source_word: בַלָּהָה
  chosen: terror
  alternatives:
  - dismay
  - panic
  - horror
  lexicon: HALOT
  rationale: The noun denotes sudden terror or dismay. 'Terror' best matches the force
    of the context of abrupt judgment and calamity.
- source_word: בְּטֶרֶם בֹּקֶר
  chosen: Before morning
  alternatives:
  - Before the morning
  - Before dawn
  lexicon: HALOT
  rationale: בְּטֶרֶם marks 'before' and בֹּקֶר is 'morning.' 'Before morning' is
    concise and idiomatic; 'before dawn' would be slightly more interpretive than
    the Hebrew wording.
- source_word: אֵינֶנּוּ
  chosen: he is no more
  alternatives:
  - it is no more
  - he is gone
  - there is nothing left of him
  lexicon: HALOT
  rationale: The form means 'he/it is not.' In context the referent is the hostile
    enemy just described corporately/personally, and English commonly renders this
    idiom as 'he is no more.' This preserves the abrupt disappearance under judgment.
- source_word: זֶה
  chosen: This is
  alternatives:
  - Such is
  - This
  lexicon: HALOT
  rationale: The demonstrative introduces a summarizing conclusion. 'This is' makes
    the verbless Hebrew clause clear in English.
- source_word: חֵלֶק
  chosen: the portion
  alternatives:
  - the share
  - the fate
  lexicon: HALOT
  rationale: חֵלֶק literally means 'portion/share.' Although the context implies destiny,
    'portion' preserves the lexical image and allows the following parallel 'lot'
    to stand naturally.
- source_word: שׁוֹסֵינוּ
  chosen: those who plunder us
  alternatives:
  - our plunderers
  - those who despoil us
  lexicon: HALOT
  rationale: From שסה, 'to plunder/despoil.' The participial sense is well represented
    by 'those who plunder us.' This is clear and preserves the active, ongoing characterization.
- source_word: וְגוֹרָל
  chosen: and the lot
  alternatives:
  - and the destiny
  - and the fate
  lexicon: HALOT
  rationale: גוֹרָל is literally 'lot,' often by extension one's allotted fate. Retaining
    'lot' preserves the Hebrew metaphor and the poetic parallel with חֵלֶק.
- source_word: לְבֹזְזֵינוּ
  chosen: of those who loot us
  alternatives:
  - for those who loot us
  - our robbers
  - those who seize spoil from us
  lexicon: HALOT
  rationale: The לְ here functions naturally in parallel with the construct relation,
    yielding 'of those who loot us.' בזז refers to taking spoil; 'loot' is vivid,
    modern, and semantically apt.
