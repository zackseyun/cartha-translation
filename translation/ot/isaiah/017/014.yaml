theological_decisions:
- issue: Referent of the singular in אֵינֶנּוּ
  chosen_reading: 'Rendered with singular personal language: ''he is no more,'' referring
    to the enemy power as a collective singular/personified foe.'
  alternative_readings:
  - '''it is no more,'' referring impersonally to the threatening situation or army'
  rationale: The Hebrew singular can point to a collective enemy conceived as a single
    entity. The immediate context personifies the hostile force, and English 'he is
    no more' preserves the dramatic collapse without over-specifying beyond the text.
  doctrine_reference: Preserve theological/interpreive tension rather than resolve
    it where ambiguity remains.
