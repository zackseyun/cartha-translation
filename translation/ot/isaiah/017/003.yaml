id: ISA.17.3
reference: Isaiah 17:3
source:
  edition: WLC
  text: וְ/נִשְׁבַּ֤ת מִבְצָר֙ מֵֽ/אֶפְרַ֔יִם וּ/מַמְלָכָ֥ה מִ/דַּמֶּ֖שֶׂק וּ/שְׁאָ֣ר
    אֲרָ֑ם כִּ/כְב֤וֹד בְּנֵֽי יִשְׂרָאֵל֙ יִֽהְי֔וּ נְאֻ֖ם יְהוָ֥ה צְבָאֽוֹת־׃ס
translation:
  text: And the fortress will cease from Ephraim, and the kingdom from Damascus; and
    the remnant of Aram will be like the glory of the sons of Israel, declares the
    LORD of hosts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the remnant of Aram will be like the splendor of the sons of Israel.'
      The exact nuance of 'glory' may include honor or splendor.
    reason: lexical_alternative
  - marker: b
    text: The comparison may imply that Aram will share the same coming diminution
      as Israel; the Hebrew does not state the point of comparison explicitly.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנִשְׁבַּת
  chosen: will cease
  alternatives:
  - will be cut off
  - will come to an end
  lexicon: HALOT
  rationale: Nifal of שׁבת here denotes cessation or removal. 'Will cease' is concise
    and natural English while preserving the passive/inchoative sense better than
    a more interpretive 'be destroyed.'
- source_word: מִבְצָר
  chosen: the fortress
  alternatives:
  - fortified city
  - stronghold
  lexicon: HALOT
  rationale: The singular noun denotes a fortified place/stronghold. 'The fortress'
    preserves the singular form and the concrete military sense. 'Stronghold' is possible,
    but 'fortress' is more straightforward in modern English.
- source_word: מֵאֶפְרַיִם
  chosen: from Ephraim
  alternatives:
  - from Israel
  lexicon: HALOT
  rationale: Ephraim is retained as the tribal/regional name rather than interpreted
    as the northern kingdom, since the Hebrew names Ephraim explicitly. Readers may
    infer the political reference from context.
- source_word: וּמַמְלָכָה
  chosen: and the kingdom
  alternatives:
  - and kingship
  - and royal power
  lexicon: HALOT
  rationale: The noun refers to the kingdom or realm. 'Kingdom' is the most natural
    political equivalent here.
- source_word: מִדַּמֶּשֶׂק
  chosen: from Damascus
  lexicon: HALOT
  rationale: Straightforward place name with prefixed preposition; transliterated
    by standard convention.
- source_word: וּשְׁאָר אֲרָם
  chosen: and the remnant of Aram
  alternatives:
  - and what remains of Aram
  - and the survivors of Syria
  lexicon: HALOT
  rationale: שְׁאָר means 'remnant/remainder.' 'Aram' is preferred over 'Syria' because
    the Hebrew proper name is Aram and the translation philosophy favors transliterating
    names. 'Remnant' also preserves the prophetic register.
- source_word: כִּכְבוֹד
  chosen: will be like the glory of
  alternatives:
  - will be like the honor of
  - will be like the splendor of
  lexicon: HALOT
  rationale: כָּבוֹד can denote glory, honor, or splendor. 'Glory' best preserves
    the weight of the Hebrew and matches prophetic diction, while leaving the exact
    nuance open.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Israel.' Per the gender-accurate principle,
    the masculine form is retained rather than neutralized. 'Children of Israel' is
    traditional but less literal to בְּנֵי here.
- source_word: יִהְיוּ
  chosen: will be
  alternatives:
  - shall become
  lexicon: HALOT
  rationale: Simple future of היה. 'Will be' is the most direct rendering.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  chosen: declares the LORD of hosts
  alternatives:
  - oracle of the LORD of hosts
  - says the LORD of armies
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula. 'Declares' is idiomatic English.
    For יְהוָה, the doctrinal default is 'the LORD.' 'Hosts' is retained as the conventional
    rendering of צְבָאוֹת in this divine title.
