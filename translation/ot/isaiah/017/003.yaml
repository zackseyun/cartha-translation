theological_decisions:
- issue: Meaning of the comparison 'the remnant of Aram will be like the glory of
    the sons of Israel'
  chosen_reading: The comparison is left formally ambiguous in the main text, without
    specifying whether it implies shared downfall, diminished status, or comparable
    condition.
  alternative_readings:
  - It may imply that Aram's remnant will be reduced just as Israel's glory is about
    to fade in the following context.
  - It may imply that Aram's remnant will resemble Israel's glory in status or fate.
  rationale: The Hebrew comparison does not itself explain the exact point of likeness.
    The surrounding context suggests humiliation or diminution, but the verse alone
    does not state that explicitly. To preserve theological and interpretive tension,
    the translation keeps the comparison literal and lets context inform interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
