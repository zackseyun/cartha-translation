theological_decisions:
- issue: Gendered expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - people of Israel
  - Israelites
  rationale: Per the translation philosophy, gender-accurate renderings are preferred
    where the source uses a masculine form. Here the phrase is the standard Hebrew
    ethnonym, and retaining 'sons of Israel' preserves the form and intertextual resonance.
    A more idiomatic alternative is noted in lexical decisions but not adopted in
    the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
