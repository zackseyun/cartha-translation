id: ISA.17.9
reference: Isaiah 17:9
source:
  edition: WLC
  text: בַּ/יּ֨וֹם הַ/ה֜וּא יִהְי֣וּ עָרֵ֣י מָעֻזּ֗/וֹ כַּ/עֲזוּבַ֤ת הַ/חֹ֨רֶשׁ֙ וְ/הָ֣/אָמִ֔יר
    אֲשֶׁ֣ר עָזְב֔וּ מִ/פְּנֵ֖י בְּנֵ֣י יִשְׂרָאֵ֑ל וְ/הָיְתָ֖ה שְׁמָמָֽה׀׃
translation:
  text: In that day his fortified cities will be like the deserted places of the forest
    and the treetop, which they abandoned before the sons of Israel; and it will become
    a desolation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the upper branch' / 'the summit bough.' The Hebrew term refers to the
      topmost part of a tree.
    reason: lexical_alternative
  - marker: b
    text: Or 'which they abandoned because of the sons of Israel.' The Hebrew expression
      may indicate retreat from before Israel's presence.
    reason: alternative_reading
lexical_decisions:
- source_word: עָרֵי מָעֻזּוֹ
  chosen: his fortified cities
  alternatives:
  - the cities of his stronghold
  - his stronghold cities
  lexicon: HALOT
  rationale: 'עָרֵי is ''cities of,'' and מָעוֹז denotes a place of strength/fortress.
    In context, an adjectival rendering in English is most natural: ''fortified cities.''
    The 3ms suffix is retained as ''his,'' referring back to the singular national
    entity in context (Damascus/Ephraim).'
- source_word: כַּעֲזוּבַת
  chosen: like the deserted places
  alternatives:
  - like an abandoned thing
  - like abandonment
  lexicon: HALOT
  rationale: From עזב 'to leave, forsake.' The feminine singular construct here functions
    idiomatically for a state/place of abandonment. 'Deserted places' gives clear
    English while preserving the image of forsakenness.
- source_word: הַחֹרֶשׁ
  chosen: the forest
  alternatives:
  - the thicket
  - the woodland
  lexicon: HALOT
  rationale: חֹרֶשׁ commonly denotes woodland/forest or dense growth. 'Forest' is
    the most straightforward rendering, though 'thicket' is possible depending on
    how dense the growth is imagined.
- source_word: וְהָאָמִיר
  chosen: and the treetop
  alternatives:
  - and the summit bough
  - and the upper branch
  lexicon: HALOT
  rationale: אָמִיר can denote the top of a tree, uppermost bough, or treetop. 'Treetop'
    is concise and intelligible in modern English while preserving the elevated arboreal
    image. Because the phrase is difficult, a lexical alternative is preserved in
    a footnote.
- source_word: אֲשֶׁר עָזְבוּ
  chosen: which they abandoned
  alternatives:
  - which were abandoned
  - that they left
  lexicon: HALOT
  rationale: The relative clause with plural verb naturally reads 'which they abandoned.'
    The plural subject is left implicit as in Hebrew. This preserves the active verbal
    force better than a passive English rendering.
- source_word: מִפְּנֵי בְּנֵי יִשְׂרָאֵל
  chosen: before the sons of Israel
  alternatives:
  - because of the sons of Israel
  - from before the sons of Israel
  - before the people of Israel
  lexicon: HALOT
  rationale: מִפְּנֵי can mean 'from before,' often with the sense of retreating because
    of someone's presence. 'Before the sons of Israel' keeps the Hebrew idiom relatively
    closely. Because the causal nuance 'because of' is also plausible, that alternative
    is preserved in a footnote. 'Sons of Israel' is retained per gender-accurate policy
    and to reflect the Hebrew expression.
- source_word: וְהָיְתָה שְׁמָמָה
  chosen: and it will become a desolation
  alternatives:
  - and it will be desolation
  - and there will be desolation
  lexicon: HALOT
  rationale: The feminine singular verb plus noun expresses resultant devastation.
    'Become a desolation' communicates the transition/result clearly in idiomatic
    English.
- source_word: בַּיּוֹם הַהוּא
  chosen: In that day
  alternatives:
  - On that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'In that day' is conventional and
    natural in English prophetic discourse.
