theological_decisions:
- issue: Subject reference in the singular verbs after the plural 'peoples'
  chosen_reading: The singular verbs are rendered with a collective singular ('it')
    referring to the peoples as a unified tumult/noise, while the implied rebuker
    is God.
  alternative_readings:
  - Render the suffix and verbs as referring to the nations collectively with 'them'
  - Leave the rebuker implicit without any adversative clarification
  rationale: Hebrew often shifts from plural collectives to singular agreement when
    viewing a group as one mass. In Isaiah's context, the one who rebukes the nations
    is implicitly the Lord, but the text does not name YHWH in this verse, so the
    translation preserves the implicit subject with 'he' rather than importing the
    divine name.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
