id: ISA.17.13
reference: Isaiah 17:13
source:
  edition: WLC
  text: לְאֻמִּ֗ים כִּ/שְׁא֞וֹן מַ֤יִם רַבִּים֙ יִשָּׁא֔וּ/ן וְ/גָ֥עַר בּ֖/וֹ וְ/נָ֣ס
    מִ/מֶּרְחָ֑ק וְ/רֻדַּ֗ף כְּ/מֹ֤ץ הָרִים֙ לִ/פְנֵי ר֔וּחַ וּ/כְ/גַלְגַּ֖ל לִ/פְנֵ֥י
    סוּפָֽה־׃
translation:
  text: The peoples roar like the roaring of many waters, but he rebukes it, and it
    flees far away, chased like chaff on the mountains before the wind, and like whirling
    dust before the storm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the nations roar like the roaring of many waters.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew has singular forms ('he rebukes it ... it flees'), likely treating
      the many peoples as one collective mass or uproar.
    reason: alternative_reading
  - marker: c
    text: Or 'like a whirling thing' or 'like tumbleweed' before the storm.
    reason: lexical_alternative
  - marker: d
    text: '''Storm'' may also be rendered ''whirlwind'' or ''tempest.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאֻמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: Plural noun referring to multiple ethnic/national groups. 'Peoples' preserves
    the collective-human sense and fits the parallel with tumultuous international
    masses; 'nations' is possible but can sound more political than the immediate
    imagery requires.
- source_word: כִּשְׁאוֹן
  chosen: like the roaring of
  alternatives:
  - like the noise of
  - like the din of
  lexicon: HALOT
  rationale: The noun denotes loud crashing or roaring sound. 'Roaring' best matches
    the water imagery that follows and preserves the simile introduced by כ.
- source_word: מַיִם רַבִּים
  chosen: many waters
  alternatives:
  - great waters
  - mighty waters
  lexicon: HALOT
  rationale: A common Hebrew expression for abundant, powerful waters. 'Many waters'
    is a natural and fairly literal rendering that preserves the Hebrew imagery.
- source_word: יִשָּׁאוּן
  chosen: roar
  alternatives:
  - make an uproar
  - surge noisily
  lexicon: HALOT
  rationale: From a verb associated here with loud tumultuous sound rather than simple
    motion. Rendering it as 'roar' keeps the auditory force and aligns with the comparison
    to roaring waters.
- source_word: וְגָעַר בּוֹ
  chosen: but he rebukes it
  alternatives:
  - and he rebukes him
  - and he rebukes them
  lexicon: HALOT
  rationale: The verb means 'rebuke' in the sense of forcefully checking or threatening.
    The singular pronominal suffix likely refers back to the collective uproar/noise
    as a unified mass, so 'it' best reflects the Hebrew singular while preserving
    the collective sense. 'But' brings out the adversative force in English.
- source_word: וְנָס מִמֶּרְחָק
  chosen: and it flees far away
  alternatives:
  - and he flees from afar
  - and it flees from a distance
  lexicon: HALOT
  rationale: The singular verb continues the collective singular treatment. מִמֶּרְחָק
    idiomatically conveys removal to a far distance; 'far away' is smoother English
    than a more wooden 'from afar' in this context.
- source_word: וְרֻדַּף
  chosen: chased
  alternatives:
  - driven
  - pursued
  lexicon: HALOT
  rationale: 'Passive/pual sense: the fleeing mass is acted upon. ''Chased'' is vivid,
    idiomatic, and fits the sequence of divine rebuke followed by rout.'
- source_word: כְּמֹץ
  chosen: like chaff
  alternatives:
  - like stubble
  lexicon: HALOT
  rationale: מוֹץ commonly denotes chaff, a standard biblical image for light, worthless
    material blown away. 'Chaff' is the most recognizable equivalent.
- source_word: הָרִים
  chosen: on the mountains
  alternatives:
  - of the mountains
  - from the mountains
  lexicon: HALOT
  rationale: The construct-like sequence with מֹץ הָרִים is somewhat compressed. 'Chaff
    on the mountains' conveys exposed mountain-top chaff driven by wind, a natural
    image in context. Alternatives are possible, but 'on' best communicates the scene
    in idiomatic English.
- source_word: לִפְנֵי רוּחַ
  chosen: before the wind
  alternatives:
  - before a wind
  - at the face of the wind
  lexicon: HALOT
  rationale: Standard idiom for being driven before an oncoming force. 'Before the
    wind' is both literal and idiomatic.
- source_word: וּכְגַלְגַּל
  chosen: and like whirling dust
  alternatives:
  - and like a tumbleweed
  - and like a wheel-like thing
  - and like stubble whirling
  lexicon: HALOT
  rationale: גַּלְגַּל can denote something wheel-like or rolling/whirling, and in
    poetic contexts often refers to a whirling object of light debris. 'Whirling dust'
    communicates the image clearly in modern English without overcommitting to a specific
    botanical object such as 'tumbleweed,' which may be too interpretive and region-specific.
- source_word: לִפְנֵי סוּפָה
  chosen: before the storm
  alternatives:
  - before the whirlwind
  - before the tempest
  lexicon: HALOT
  rationale: סוּפָה denotes a violent storm, often with whirlwind force. 'Storm' is
    accessible modern English; 'whirlwind' is possible but narrower than the Hebrew
    term in this context.
