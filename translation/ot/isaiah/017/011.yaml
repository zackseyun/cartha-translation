id: ISA.17.11
reference: Isaiah 17:11
source:
  edition: WLC
  text: בְּ/י֤וֹם נִטְעֵ/ךְ֙ תְּשַׂגְשֵׂ֔גִי וּ/בַ/בֹּ֖קֶר זַרְעֵ֣/ךְ תַּפְרִ֑יחִי
    נֵ֥ד קָצִ֛יר בְּ/י֥וֹם נַחֲלָ֖ה וּ/כְאֵ֥ב אָנֽוּשׁ׃ס
translation:
  text: On the day you plant, you make it grow luxuriantly; and in the morning you
    make your seed sprout. But the harvest flees away in a day of grief and incurable
    pain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'a heap of harvest' for 'the harvest flees away.' The
      Hebrew phrase is difficult, and some take נֵד as 'heap' rather than expressing
      disappearance.
    reason: lexical_alternative
  - marker: b
    text: '''In a day of grief'' may also be rendered ''in a day of sickness'' or
      ''in a day of affliction.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּשַׂגְשֵׂגִי
  chosen: you make it grow luxuriantly
  alternatives:
  - you make it flourish
  - you make it thrive
  lexicon: HALOT
  rationale: The verb denotes luxuriant growth or flourishing. Because the subject
    is 2fs and the prior noun is 'your planting,' English supplies the object 'it'
    for clarity. 'Grow luxuriantly' preserves the vivid image better than a flatter
    'grow.'
- source_word: זַרְעֵךְ תַּפְרִיחִי
  chosen: you make your seed sprout
  alternatives:
  - you make your seed blossom
  - you cause your seed to bud
  lexicon: HALOT
  rationale: 'The Hiphil of פרח is causative: ''cause to sprout/blossom.'' ''Sprout''
    fits agricultural seed imagery more naturally in English than ''blossom,'' while
    retaining the sense of rapid growth.'
- source_word: נֵד
  chosen: flees away
  alternatives:
  - is a heap
  - is driven away
  - vanishes
  lexicon: HALOT
  rationale: This word is difficult and contextually debated. In this judgment context,
    many understand it idiomatically as something removed or swept off rather than
    a literal 'heap.' Rendering it verbally as 'flees away' communicates the sudden
    disappearance of the hoped-for harvest in context. The more literal alternative
    is preserved in a footnote.
- source_word: קָצִיר
  chosen: the harvest
  alternatives:
  - harvest
  lexicon: HALOT
  rationale: 'Definite in English by context: the expected crop outcome of the planting
    and seed imagery.'
- source_word: בְּיוֹם נַחֲלָה
  chosen: in a day of grief
  alternatives:
  - in a day of sickness
  - in a day of possession/inheritance
  lexicon: HALOT
  rationale: נַחֲלָה here is commonly taken in the sense of sickness, affliction,
    or grievous calamity rather than the more common 'inheritance.' In parallel with
    'incurable pain,' 'grief' communicates the calamity idiomatically in English without
    over-specifying medical illness.
- source_word: וּכְאֵב אָנושׁ
  chosen: and incurable pain
  alternatives:
  - and desperate pain
  - and grievous pain
  - and mortal pain
  lexicon: HALOT
  rationale: כאב is pain, and אנושׁ often carries the sense of being severe, desperate,
    or incurable. 'Incurable pain' best captures the intensity and hopelessness of
    the phrase in prophetic judgment language.
- source_word: נִטְעֵךְ
  chosen: you plant
  alternatives:
  - your planting
  lexicon: HALOT
  rationale: Although formally a noun with 2fs suffix ('your planting'), English idiom
    is smoother with the verbal expression 'you plant,' especially paired with the
    following finite verbs. This is an optimal-equivalence adjustment that preserves
    the agricultural image.
