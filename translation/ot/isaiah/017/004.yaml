theological_decisions:
- issue: Referent of 'Jacob' in a judgment oracle
  chosen_reading: Retain 'Jacob' as the covenantal/national name without substituting
    an interpretive gloss.
  alternative_readings:
  - Israel
  - the people of Jacob
  rationale: The verse speaks of national humiliation and depletion, but the Hebrew
    uses the name 'Jacob.' Preserving the name maintains the prophetic and covenantal
    resonance without over-interpreting the referent in the main text.
