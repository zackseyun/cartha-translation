id: ISA.17.4
reference: Isaiah 17:4
source:
  edition: WLC
  text: וְ/הָיָה֙ בַּ/יּ֣וֹם הַ/ה֔וּא יִדַּ֖ל כְּב֣וֹד יַעֲקֹ֑ב וּ/מִשְׁמַ֥ן בְּשָׂר֖/וֹ
    יֵרָזֶֽה׃
translation:
  text: And in that day the glory of Jacob will grow thin, and the fatness of his
    flesh will waste away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be diminished.' The Hebrew verb can denote becoming small, weak,
      or thin; the translation 'grow thin' follows the bodily imagery of the next
      line.
    reason: lexical_alternative
  - marker: b
    text: Or 'the richness of his body will become lean.' The Hebrew uses physical
      imagery of fatness and leanness to portray Jacob's loss of strength and prosperity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will
  alternatives:
  - And it will happen
  - And it shall be
  lexicon: HALOT
  rationale: Introduces a future circumstance or event formula. In English, the idiom
    is best carried by 'And in that day ... will' rather than the more wooden 'and
    it shall be.'
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'In that day' preserves the idiomatic
    and eschatological-prophetic feel common in Isaiah.
- source_word: יִדַּל
  chosen: will grow thin
  alternatives:
  - will become small
  - will be brought low
  - will be diminished
  lexicon: HALOT
  rationale: From דלל, conveying becoming thin, weak, or reduced. Because the parallel
    line uses bodily imagery ('fatness of his flesh'), 'will grow thin' preserves
    the metaphorical coherence better than the more abstract 'will be diminished.'
- source_word: כְּבוֹד
  chosen: glory
  alternatives:
  - honor
  - wealth
  - splendor
  lexicon: HALOT
  rationale: '''Glory'' is the broadest and most contextually fitting term, able to
    include status, splendor, and national prominence. The context of judgment implies
    loss of former prominence.'
- source_word: יַעֲקֹב
  chosen: Jacob
  alternatives:
  - Israel
  rationale: The Hebrew text names 'Jacob'; the translation preserves the proper name
    rather than interpreting it as 'Israel,' though the referent is the nation/people
    descended from Jacob.
- source_word: וּמִשְׁמַן
  chosen: and the fatness
  alternatives:
  - and the richness
  - and the stoutness
  lexicon: HALOT
  rationale: Literally 'fatness' or 'richness.' Here it is paired with 'his flesh'
    and a verb of wasting away, so the bodily image should be retained rather than
    abstracted.
- source_word: בְּשָׂרוֹ
  chosen: of his flesh
  alternatives:
  - of his body
  lexicon: HALOT
  rationale: Literal bodily term. 'Flesh' preserves the concrete metaphor and matches
    the Hebrew more closely than 'body.' This is not a theological 'flesh' term in
    the Pauline sense, but a physical image of emaciation.
- source_word: יֵרָזֶה
  chosen: will waste away
  alternatives:
  - will become lean
  - will be made thin
  lexicon: HALOT
  rationale: From רזה, to become lean or emaciated. 'Will waste away' communicates
    the result naturally in English while preserving the image of bodily wasting under
    judgment.
