id: ISA.17.12
reference: Isaiah 17:12
source:
  edition: WLC
  text: ה֗וֹי הֲמוֹן֙ עַמִּ֣ים רַבִּ֔ים כַּ/הֲמ֥וֹת יַמִּ֖ים יֶהֱמָי֑וּ/ן וּ/שְׁא֣וֹן
    לְאֻמִּ֔ים כִּ/שְׁא֛וֹן מַ֥יִם כַּבִּירִ֖ים יִשָּׁאֽוּ/ן׃
translation:
  text: Ah, the roar of many peoples— they roar like the roaring of the seas; and
    the rushing of nations— they rush like the rushing of mighty waters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Woe, the multitude of many peoples …' The opening interjection הוֹי
      can introduce lament, warning, or an exclamation of attention.
    reason: alternative_reading
  - marker: b
    text: Hebrew repeats sound-related terms ('roar/tumult' and 'rushing/noise') to
      intensify the image of chaotic nations like stormy seas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Ah
  alternatives:
  - Woe
  - Alas
  lexicon: HALOT
  rationale: Introduces an exclamatory utterance. In this context it functions more
    as an attention-getting cry over the tumult than a direct denunciation, so 'Ah'
    preserves the interjection without overcommitting to a formal curse sense. 'Woe'
    remains possible and is preserved as an alternative.
- source_word: הֲמוֹן
  chosen: roar
  alternatives:
  - multitude
  - tumult
  lexicon: HALOT
  rationale: Although the noun can denote a multitude or noisy throng, the immediate
    simile with the seas and the cognate verb הָמָה favors an auditory sense. 'Roar'
    captures both the mass and the sound in idiomatic English.
- source_word: עַמִּים רַבִּים
  chosen: many peoples
  alternatives:
  - many nations
  - great peoples
  lexicon: HALOT
  rationale: '''Peoples'' is the more direct rendering of עַמִּים, while רַבִּים marks
    plurality/abundance. ''Many peoples'' preserves the ethnic-collective sense better
    than flattening to ''nations'' in the first colon.'
- source_word: כַּהֲמוֹת יַמִּים
  chosen: like the roaring of the seas
  alternatives:
  - like the roaring of seas
  - like the tumult of the seas
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. The plural יַמִּים is retained as 'seas,'
    which sounds natural in English poetry and preserves the expansive imagery.
- source_word: יֶהֱמָיוּן
  chosen: they roar
  alternatives:
  - they rage
  - they make a noise
  lexicon: HALOT
  rationale: From הָמָה, denoting loud tumultuous sound. 'They roar' matches the sea
    imagery and keeps the parallelism with the noun הֲמוֹן.
- source_word: וּשְׁאוֹן
  chosen: and the rushing
  alternatives:
  - and the roar
  - and the din
  lexicon: HALOT
  rationale: שָׁאוֹן can denote roar, din, or rushing noise. Here, to avoid monotonous
    repetition and to reflect the movement implied by the following verb, 'rushing'
    is chosen while preserving the acoustic force.
- source_word: לְאֻמִּים
  chosen: of nations
  alternatives:
  - of peoples
  lexicon: HALOT
  rationale: לְאֻמִּים commonly denotes nations/peoples in a political or ethnic sense.
    'Nations' provides a useful distinction from עַמִּים in the first colon while
    preserving the parallelism.
- source_word: כִּשְׁאוֹן מַיִם כַּבִּירִים
  chosen: like the rushing of mighty waters
  alternatives:
  - like the roar of mighty waters
  - like the din of great waters
  lexicon: HALOT
  rationale: The phrase evokes overwhelming, forceful waters. 'Mighty waters' is a
    standard, natural rendering of מַיִם כַּבִּירִים, and 'rushing' aligns with the
    chosen sense of שָׁאוֹן in this colon.
- source_word: יִשָּׁאוּן
  chosen: they rush
  alternatives:
  - they roar
  - they crash
  lexicon: HALOT
  rationale: From a verb associated with making a loud noise or uproar. In this parallel
    line, 'they rush' conveys both motion and sound, fitting the image of surging
    waters and the noun שָׁאוֹן.
