id: ISA.17.1
reference: Isaiah 17:1
source:
  edition: WLC
  text: מַשָּׂ֖א דַּמָּ֑שֶׂק הִנֵּ֤ה דַמֶּ֨שֶׂק֙ מוּסָ֣ר מֵ/עִ֔יר וְ/הָיְתָ֖ה מְעִ֥י
    מַפָּלָֽה׃
translation:
  text: 'An oracle concerning Damascus: Behold, Damascus will be removed from being
    a city, and it will become a heap of ruins.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burden concerning Damascus' or 'pronouncement concerning Damascus.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'removed from a city,' that is, it will cease to be a city.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשָּׂא
  chosen: oracle
  alternatives:
  - burden
  - pronouncement
  lexicon: HALOT
  rationale: In prophetic headings, מַשָּׂא commonly introduces a prophetic utterance
    of judgment. 'Oracle' is idiomatic modern English and preserves the formal heading
    sense better than the archaic 'burden,' while 'pronouncement' is possible but
    less established in prophetic superscriptions.
- source_word: דַּמָּשֶׂק
  chosen: Damascus
  rationale: Proper place name; transliterated according to standard English convention
    per translation philosophy.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Marks vivid prophetic announcement. 'Behold' retains the solemn, attention-directing
    force in a concise way; 'Look' would be more colloquial.
- source_word: מוּסָר
  chosen: will be removed
  alternatives:
  - is removed
  - will depart
  - will be taken away
  lexicon: HALOT
  rationale: Passive participial form from סור conveys removal/turning away. In context
    it predicates Damascus's impending loss of city status. English future best reflects
    prophetic announcement after הִנֵּה. 'Removed' is broad enough to cover the city's
    being taken out of the category/status of a city.
- source_word: מֵעִיר
  chosen: from being a city
  alternatives:
  - from a city
  - from cityhood
  lexicon: HALOT
  rationale: The preposition מִן with עִיר expresses separation from the status or
    condition of being a city. 'From being a city' makes the idiom natural in English
    and clarifies that the city will cease to exist as such, not merely be removed
    geographically from another city.
- source_word: וְהָיְתָה
  chosen: and it will become
  alternatives:
  - and it will be
  lexicon: HALOT
  rationale: 'Though היה can mean ''be'' or ''become,'' here the sense is resultative
    after the prior judgment: Damascus will come to be something else, namely a ruin
    heap. ''Become'' better captures the transition.'
- source_word: מְעִי מַפָּלָה
  chosen: a heap of ruins
  alternatives:
  - a fallen heap
  - a ruinous heap
  - a heap of collapse
  lexicon: HALOT
  rationale: The construct phrase denotes a mound/heap characterized by ruin or collapse.
    'A heap of ruins' is natural English and preserves the image of total devastation.
    The singular collective 'heap of ruins' is preferable to a more wooden rendering.
