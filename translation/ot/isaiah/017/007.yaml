id: ISA.17.7
reference: Isaiah 17:7
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֔וּא יִשְׁעֶ֥ה הָ/אָדָ֖ם עַל עֹשֵׂ֑/הוּ וְ/עֵינָ֕י/ו אֶל קְד֥וֹשׁ
    יִשְׂרָאֵ֖ל תִּרְאֶֽינָה־־׃
translation:
  text: In that day man will look to his Maker, and his eyes will look to the Holy
    One of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'On that day.'
    reason: lexical_alternative
  - marker: b
    text: '''Man'' here is a representative singular, meaning humanity in general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: In that day
  alternatives:
  - On that day
  lexicon: HALOT
  rationale: Standard temporal idiom in prophetic discourse. 'In that day' is idiomatic
    English and preserves the eschatological/prophetic force without overinterpreting
    timing.
- source_word: יִשְׁעֶה
  chosen: will look to
  alternatives:
  - will regard
  - will turn to
  - will gaze toward
  lexicon: HALOT
  rationale: The verb שׁעה here conveys directing attention or regard toward someone.
    'Will look to' fits the parallel with the second colon ('his eyes will look')
    and naturally expresses reliance/attention without importing stronger theological
    language such as 'trust' that the verb itself does not require.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - a man
  - humanity
  lexicon: HALOT
  rationale: Per doctrine, gender-accurate over gender-neutral. Here הָאָדָם is generic/singular
    representative, so 'man' preserves the Hebrew form and representative force better
    than the more abstract 'humankind.'
- source_word: עַל
  chosen: to
  alternatives:
  - upon
  - toward
  lexicon: HALOT
  rationale: Although the preposition is literally 'upon/on,' with שׁעה in this construction
    English idiom is better represented by 'look to' rather than 'look upon,' which
    can suggest mere visual perception rather than directed regard.
- source_word: עֹשֵׂהוּ
  chosen: his Maker
  alternatives:
  - the one who made him
  - his creator
  lexicon: HALOT
  rationale: The participle of עשה with 3ms suffix means 'the one who made him.' 'His
    Maker' is concise, natural, and preserves the personal relation. Capitalized as
    a reverential title because the referent in context is God.
- source_word: וְעֵינָיו
  chosen: and his eyes
  lexicon: HALOT
  rationale: Retained literally to preserve the poetic parallelism and embodied imagery
    of the Hebrew.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Simple directional preposition. 'To' works naturally with 'look' in English.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  lexicon: HALOT
  rationale: Established Isaianic divine title. Fully translated per philosophy of
    translating titles rather than transliterating them.
- source_word: תִּרְאֶינָה
  chosen: will look
  alternatives:
  - will see
  - will behold
  lexicon: HALOT
  rationale: Although ראה commonly means 'see,' in this parallel poetic context with
    יִשְׁעֶה it carries the sense of directed looking. Rendering both cola with 'look'
    preserves the synonymous parallelism and avoids a misleading distinction between
    inward regard and mere sight.
