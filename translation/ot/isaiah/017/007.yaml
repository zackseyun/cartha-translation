theological_decisions:
- issue: Rendering of הָאָדָם as representative singular
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The Hebrew is grammatically singular and representative. Following the
    doctrine's gender-accurate principle, 'man' best matches the source while still
    functioning generically in context.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table
    for אָדָם *adam*
- issue: Whether to make the verse explicitly about trust/repentance
  chosen_reading: look to
  alternative_readings:
  - trust in
  - turn back to
  rationale: The verse implies renewed orientation toward God, but the Hebrew verbs
    speak of looking/regarding rather than explicitly naming trust or repentance.
    The translation preserves the theological implication without overstating it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
