theological_decisions:
- issue: Whether the agricultural imagery should be made explicitly idolatrous in
    the main text
  chosen_reading: Retain the imagery as stated without specifying idol gardens or
    cultic rites in the main text.
  alternative_readings:
  - Interpret 'pleasant plants' and 'foreign vine' as allusions to pagan cult plantings
  rationale: The context of forgetting God strongly suggests illicit religious dependence,
    and the imagery may allude to foreign cult practice. However, the Hebrew wording
    itself remains agricultural and somewhat elliptical. To preserve theological tension
    and avoid importing more than the text states, the main text keeps the literal
    imagery while a footnote preserves the interpretive possibility.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
