id: ISA.17.10
reference: Isaiah 17:10
source:
  edition: WLC
  text: כִּ֤י שָׁכַ֨חַתְּ֙ אֱלֹהֵ֣י יִשְׁעֵ֔/ךְ וְ/צ֥וּר מָעֻזֵּ֖/ךְ לֹ֣א זָכָ֑רְתְּ
    עַל כֵּ֗ן תִּטְּעִי֙ נִטְעֵ֣י נַעֲמָנִ֔ים וּ/זְמֹ֥רַת זָ֖ר תִּזְרָעֶֽ/נּוּ־׃
translation:
  text: For you have forgotten the God of your salvation, and you have not remembered
    the Rock of your refuge; therefore you plant pleasant plants and sow it with a
    foreign vine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'choice plantings'; possibly an allusion to cultivated plants used in
      foreign religious practice.
    reason: lexical_alternative
  - marker: b
    text: Or 'a strange cutting' or 'an alien shoot.'
    reason: lexical_alternative
  - marker: c
    text: The agricultural imagery may imply reliance on foreign cults or alliances
      rather than on the LORD, but the Hebrew does not state this explicitly.
    reason: cultural_note
lexical_decisions:
- source_word: שָׁכַחַתְּ
  chosen: have forgotten
  alternatives:
  - forgot
  lexicon: HALOT
  rationale: Qal perfect 2fs; English present perfect fits the causal force with present
    consequence in context while preserving the completed action.
- source_word: אֱלֹהֵי יִשְׁעֵךְ
  chosen: the God of your salvation
  alternatives:
  - your saving God
  - the God who saves you
  lexicon: HALOT
  rationale: Construct chain is most naturally rendered literally. 'Salvation' preserves
    the noun יֵשַׁע and avoids over-paraphrasing.
- source_word: צוּר
  chosen: Rock
  alternatives:
  - crag
  - cliff
  lexicon: HALOT
  rationale: Common metaphor for God as stable protector; 'Rock' preserves the established
    biblical image and the metaphorical force.
- source_word: מָעֻזֵּךְ
  chosen: your refuge
  alternatives:
  - your stronghold
  - your fortress
  lexicon: HALOT
  rationale: The noun denotes a place or source of strength/protection. 'Refuge' reads
    naturally with 'Rock' and preserves the protective sense without over-militarizing
    the image.
- source_word: לֹא זָכָרְתְּ
  chosen: have not remembered
  alternatives:
  - did not remember
  - have not called to mind
  lexicon: HALOT
  rationale: Matches the perfect aspect and parallels 'have forgotten.' 'Remembered'
    is preferable to an interpretive expansion.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: HALOT
  rationale: Standard inferential connector introducing the consequence.
- source_word: תִּטְּעִי
  chosen: you plant
  alternatives:
  - you will plant
  lexicon: HALOT
  rationale: Imperfect 2fs can be rendered as present in a vivid description of consequent
    behavior; English present suits the prophetic portrayal. Future is possible and
    preserved as an alternative.
- source_word: נִטְעֵי נַעֲמָנִים
  chosen: pleasant plants
  alternatives:
  - lovely plantings
  - choice plants
  lexicon: HALOT
  rationale: The phrase likely refers to desirable or delightful plantings. 'Pleasant
    plants' keeps the lexical connection without importing a specific cultic referent
    into the main text.
- source_word: זְמֹרַת זָר
  chosen: a foreign vine
  alternatives:
  - an alien shoot
  - a strange cutting
  lexicon: HALOT
  rationale: זְמֹרָה refers to a vine-shoot/branch; in idiomatic English 'vine' communicates
    the agricultural image clearly. זָר means foreign/strange; 'foreign' is the most
    natural here.
- source_word: תִּזְרָעֶנּוּ
  chosen: sow it with
  alternatives:
  - set it out with
  - plant it with
  lexicon: HALOT
  rationale: The verb is from זרע, 'to sow.' The 3ms suffix is retained by 'it,' referring
    back to the planting/plot in a collective sense. This is somewhat compressed in
    Hebrew, so English supplies a natural object relation.
