id: ISA.17.2
reference: Isaiah 17:2
source:
  edition: WLC
  text: עֲזֻב֖וֹת עָרֵ֣י עֲרֹעֵ֑ר לַ/עֲדָרִ֣ים תִּֽהְיֶ֔ינָה וְ/רָבְצ֖וּ וְ/אֵ֥ין
    מַחֲרִֽיד׃
translation:
  text: The cities of Aroer are abandoned; they will be for flocks, and they will
    lie down with no one to make them afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The cities of Aroer are forsaken' or 'deserted.'
    reason: lexical_alternative
  - marker: b
    text: '''Flocks'' may also be rendered ''herds''; the sense is that abandoned
      settlements become grazing places for animals.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲזֻבוֹת
  chosen: abandoned
  alternatives:
  - forsaken
  - deserted
  lexicon: HALOT
  rationale: Passive participle feminine plural from עזב, describing the cities as
    left behind or deserted. 'Abandoned' is natural modern English and preserves the
    passive state.
- source_word: עָרֵי
  chosen: cities of
  alternatives:
  - towns of
  lexicon: HALOT
  rationale: Construct plural of עִיר. 'Cities of' is the standard and sufficiently
    broad rendering in prophetic judgment oracles.
- source_word: עֲרֹעֵר
  chosen: Aroer
  rationale: Proper place name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: לַעֲדָרִים
  chosen: for flocks
  alternatives:
  - for herds
  lexicon: HALOT
  rationale: עֵדֶר commonly denotes a flock/herd of grazing animals. 'Flocks' fits
    the image of depopulated settlements becoming pastureland; 'herds' is possible
    but less idiomatic here.
- source_word: תִּהְיֶינָה
  chosen: they will be
  alternatives:
  - they shall become
  lexicon: HALOT
  rationale: Simple future of היה. 'They will be' is formally close and reads well
    with the predicate phrase 'for flocks.'
- source_word: וְרָבְצוּ
  chosen: and they will lie down
  alternatives:
  - and they will rest
  lexicon: HALOT
  rationale: רבץ is commonly used of animals lying down. Because the prior phrase
    introduces flocks, the subject here is best understood as the animals, and 'lie
    down' preserves the pastoral image.
- source_word: וְאֵין מַחֲרִיד
  chosen: with no one to make them afraid
  alternatives:
  - and there is none to frighten them
  - with none to terrify them
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for undisturbed security. The English wording
    makes explicit the implied object ('them') and keeps the sense of freedom from
    disturbance.
