id: ISA.17.8
reference: Isaiah 17:8
source:
  edition: WLC
  text: וְ/לֹ֣א יִשְׁעֶ֔ה אֶל הַֽ/מִּזְבְּח֖וֹת מַעֲשֵׂ֣ה יָדָ֑י/ו וַ/אֲשֶׁ֨ר עָשׂ֤וּ
    אֶצְבְּעֹתָי/ו֙ לֹ֣א יִרְאֶ֔ה וְ/הָ/אֲשֵׁרִ֖ים וְ/הָ/חַמָּנִֽים־׃
translation:
  text: And he will not look to the altars, the work of his hands, and he will not
    regard what his fingers have made—the Asherim and the incense altars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Asherah poles.' The Hebrew term refers to cult objects associated with
      Asherah worship.
    reason: lexical_alternative
  - marker: b
    text: Or 'sun-pillars' or 'sun images.' The Hebrew term likely refers to a pagan
      cult object; its precise form is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁעֶה
  chosen: will look to
  alternatives:
  - will gaze at
  - will turn to
  - will pay attention to
  lexicon: HALOT
  rationale: The verb שׁעה in this context carries the sense of turning one's attention
    or regard toward something in reliance or devotion. 'Look to' is idiomatic in
    English and preserves the relational sense better than a merely visual 'gaze at.'
- source_word: הַמִּזְבְּחוֹת
  chosen: the altars
  alternatives:
  - the sacrificial altars
  lexicon: HALOT
  rationale: מִזְבְּחוֹת straightforwardly denotes altars. The simpler 'altars' is
    sufficient, with the following phrase identifying them as human-made cultic objects.
- source_word: מַעֲשֵׂה יָדָיו
  chosen: the work of his hands
  alternatives:
  - what his hands made
  - his handiwork
  lexicon: HALOT
  rationale: This construct phrase is a common idiom for something fashioned by a
    person. 'The work of his hands' preserves the Hebrew imagery and prophetic polemic
    against idols.
- source_word: וַאֲשֶׁר עָשׂוּ אֶצְבְּעֹתָיו
  chosen: what his fingers have made
  alternatives:
  - that which his fingers made
  - what his fingers fashioned
  lexicon: HALOT
  rationale: The relative clause further specifies the handmade nature of the objects.
    Present perfect English ('have made') reads naturally while retaining the completed
    action with present relevance.
- source_word: יִרְאֶה
  chosen: will regard
  alternatives:
  - will look at
  - will see
  lexicon: HALOT
  rationale: Although the verb is literally 'see,' in parallel with יִשְׁעֶה it likely
    means to look with attention or regard. 'Will regard' avoids awkward repetition
    of 'look' while preserving the sense of directed attention.
- source_word: הָאֲשֵׁרִים
  chosen: the Asherim
  alternatives:
  - the Asherah poles
  - the Asherahs
  lexicon: HALOT
  rationale: אֲשֵׁרִים refers to cultic objects associated with Asherah worship. 'The
    Asherim' transliterates the term and avoids prematurely narrowing it to wooden
    poles in every case; an explanatory footnote preserves the common alternative.
- source_word: הַחַמָּנִים
  chosen: the incense altars
  alternatives:
  - the sun-pillars
  - the sun images
  - the incense stands
  lexicon: HALOT
  rationale: חַמָּנִים is a difficult cultic term. In many contexts it refers to cultic
    pillars or stands, possibly associated with sun worship or incense. 'Incense altars'
    is a common contextual rendering in English versions and fits the immediate list
    of man-made worship objects, while a footnote preserves the alternative understanding.
