theological_decisions:
- issue: Rendering of pagan cult objects in prophetic polemic
  chosen_reading: Translate the terms as concrete idol-related objects without importing
    extra theological explanation into the main text.
  alternative_readings:
  - Expand to 'idols' or 'images' in the main text
  - Render אֲשֵׁרִים interpretively as 'Asherah poles'
  rationale: The verse condemns reliance on man-made worship objects. The translation
    keeps the concrete Hebrew terms visible and lets the polemic emerge from the wording
    itself rather than from added interpretive labels.
  doctrine_reference: Translation philosophy §§1, 3, 5
