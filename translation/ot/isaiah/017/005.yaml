id: ISA.17.5
reference: Isaiah 17:5
source:
  edition: WLC
  text: וְ/הָיָ֗ה כֶּֽ/אֱסֹף֙ קָצִ֣יר קָמָ֔ה וּ/זְרֹע֖/וֹ שִׁבֳּלִ֣ים יִקְצ֑וֹר וְ/הָיָ֛ה
    כִּ/מְלַקֵּ֥ט שִׁבֳּלִ֖ים בְּ/עֵ֥מֶק רְפָאִֽים׃
translation:
  text: And it will be as when one gathers standing grain at harvest, and his arm
    reaps the ears; and it will be as when one gleans ears in the Valley of Rephaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heads of grain' for 'ears.'
    reason: lexical_alternative
  - marker: b
    text: Rephaim is a place name; alternatively, the name has been connected with
      'giants.'
    reason: alternative_reading
lexical_decisions:
- source_word: כֶּאֱסֹף
  chosen: as when one gathers
  alternatives:
  - as the gathering of
  - when the reaper gathers
  lexicon: HALOT
  rationale: The infinitive construct with prefixed כ expresses comparison ('as/like
    when gathering'). Rendering with an indefinite subject ('one gathers') gives natural
    English while preserving the generic action.
- source_word: קָצִיר
  chosen: harvest
  alternatives:
  - reaping
  - harvested crop
  lexicon: HALOT
  rationale: Here קָצִיר denotes the harvest context rather than merely the act of
    reaping. 'At harvest' is idiomatic and fits the simile.
- source_word: קָמָה
  chosen: standing grain
  alternatives:
  - standing corn
  - standing stalks
  lexicon: HALOT
  rationale: The noun refers to grain still standing in the field. 'Standing grain'
    is accurate modern English; 'corn' would be misleading in contemporary usage.
- source_word: וּזְרֹעוֹ
  chosen: and his arm
  alternatives:
  - with his arm
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'and his arm.' Keeping the body-part imagery
    preserves the vivid picture of the harvester's action.
- source_word: שִׁבֳּלִים
  chosen: the ears
  alternatives:
  - heads of grain
  - grain stalks
  lexicon: HALOT
  rationale: שִׁבֳּלִים refers to ears/heads of grain. 'Ears' is concise and traditional
    enough to preserve the agricultural image; the article is supplied in English
    for naturalness in the first clause.
- source_word: יִקְצוֹר
  chosen: reaps
  alternatives:
  - cuts down
  - harvests
  lexicon: HALOT
  rationale: The verb is the standard term for reaping/harvesting. 'Reaps' best matches
    the agricultural metaphor and keeps verbal parallelism with the surrounding harvest
    language.
- source_word: כִּמְלַקֵּט
  chosen: as when one gleans
  alternatives:
  - like one gathering leftovers
  - as a gleaner
  lexicon: HALOT
  rationale: The participle from לקט refers specifically to gleaning what remains
    after harvest. 'Gleans' preserves the technical agricultural sense important to
    the image of sparse remainder.
- source_word: בְּעֵמֶק רְפָאִים
  chosen: in the Valley of Rephaim
  alternatives:
  - in the valley of the Rephaim
  - in the Valley of Giants
  lexicon: HALOT
  rationale: As a place name, transliteration is preferred under the translation philosophy.
    'Valley of Rephaim' preserves the toponym without importing an interpretive gloss
    such as 'Giants.'
