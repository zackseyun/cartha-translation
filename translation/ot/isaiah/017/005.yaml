theological_decisions:
- issue: Rendering of רְפָאִים in a place name
  chosen_reading: Rephaim is transliterated as part of the toponym 'Valley of Rephaim.'
  alternative_readings:
  - Giants
  rationale: Because this is a geographic name rather than a direct reference to the
    people group or shades, transliteration best follows the policy to transliterate
    names and avoids over-interpreting the term.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names.'
