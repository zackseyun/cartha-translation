id: ISA.34.1
reference: Isaiah 34:1
source:
  edition: WLC
  text: קִרְב֤וּ גוֹיִם֙ לִ/שְׁמֹ֔עַ וּ/לְאֻמִּ֖ים הַקְשִׁ֑יבוּ תִּשְׁמַ֤ע הָ/אָ֨רֶץ֙
    וּ/מְלֹאָ֔/הּ תֵּבֵ֖ל וְ/כָל צֶאֱצָאֶֽי/הָ־׃
translation:
  text: Come near, nations, to hear; and listen, peoples. Let the earth hear, and
    all that fills it, the world and all its offspring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Draw near, nations, to hear; and peoples, pay attention.'
    reason: lexical_alternative
  - marker: b
    text: '''All its offspring'' may also be rendered ''all that comes from it'' or
      ''all its produce.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: קִרְבוּ
  chosen: Come near
  alternatives:
  - Draw near
  - Approach
  lexicon: HALOT
  rationale: Qal imperative plural of קרב, an invitation/summons to approach. 'Come
    near' is natural modern English and preserves the imperative force.
- source_word: גוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  lexicon: HALOT
  rationale: In prophetic address this refers broadly to the nations/peoples of the
    world, not specifically 'Gentiles' in a later Jewish-Christian contrast.
- source_word: לִשְׁמֹעַ
  chosen: to hear
  alternatives:
  - to listen
  lexicon: HALOT
  rationale: 'Infinitive of שמע after the imperative: the nations are summoned to
    come near for the purpose of hearing. ''Hear'' keeps the verbal link with the
    repeated שמע later in the verse.'
- source_word: לְאֻמִּים
  chosen: peoples
  alternatives:
  - nations
  lexicon: HALOT
  rationale: A near-synonym to גוים. Rendering it as 'peoples' preserves the poetic
    parallelism without flattening both terms into the same English word.
- source_word: הַקְשִׁיבוּ
  chosen: listen
  alternatives:
  - pay attention
  - give heed
  lexicon: HALOT
  rationale: Hiphil imperative of קשׁב means to attend carefully. 'Listen' is concise,
    idiomatic, and suitably parallel to 'hear'.
- source_word: תִּשְׁמַע
  chosen: Let ... hear
  alternatives:
  - May ... hear
  - must hear
  lexicon: HALOT
  rationale: Imperfect 3fs used jussively with feminine singular subjects ('earth,'
    'world'). English 'Let ... hear' best conveys the summons/wish force in context.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Here the scope is universal, reinforced by 'world' and 'all its offspring,'
    so 'earth' is preferable to the more local 'land'.
- source_word: מְלֹאָהּ
  chosen: all that fills it
  alternatives:
  - its fullness
  - all that is in it
  lexicon: HALOT
  rationale: The noun denotes fullness/full content. 'All that fills it' is clear
    modern English and preserves the sense of everything contained in the earth.
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  lexicon: HALOT
  rationale: תבל often denotes the world in its inhabited, ordered sense. 'The world'
    is the most natural English equivalent here.
- source_word: כָל צֶאֱצָאֶיהָ
  chosen: all its offspring
  alternatives:
  - all that comes from it
  - all its produce
  - all its descendants
  lexicon: HALOT
  rationale: צאצאים literally refers to offspring/progeny/that which comes forth.
    In parallel with earth/world, it likely denotes all that springs from the world,
    including its inhabitants. 'All its offspring' preserves the generative imagery
    better than the flatter 'all who come from it.'
