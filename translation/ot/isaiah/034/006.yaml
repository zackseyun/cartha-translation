theological_decisions:
- issue: Rendering the sacrificial imagery in a judgment oracle
  chosen_reading: Retain explicit sacrificial language ('sacrifice,' 'fat,' 'kidneys,'
    'slaughter') as metaphor for the LORD's judgment on Edom.
  alternative_readings:
  - Soften the imagery into general battle language
  rationale: The verse intentionally portrays divine judgment through sacrificial
    categories. Preserving that tension is more faithful than flattening it into mere
    warfare imagery.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
