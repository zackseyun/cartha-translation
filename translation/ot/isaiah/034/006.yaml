id: ISA.34.6
reference: Isaiah 34:6
source:
  edition: WLC
  text: חֶ֣רֶב לַ/יהוָ֞ה מָלְאָ֥ה דָם֙ הֻדַּ֣שְׁנָה מֵ/חֵ֔לֶב מִ/דַּ֤ם כָּרִים֙ וְ/עַתּוּדִ֔ים
    מֵ/חֵ֖לֶב כִּלְי֣וֹת אֵילִ֑ים כִּ֣י זֶ֤בַח לַֽ/יהוָה֙ בְּ/בָצְרָ֔ה וְ/טֶ֥בַח גָּד֖וֹל
    בְּ/אֶ֥רֶץ אֱדֽוֹם׃
translation:
  text: The sword of the LORD is filled with blood; it is made fat with fatness, with
    the blood of lambs and goats, with the fat of the kidneys of rams. For the LORD
    has a sacrifice in Bozrah, and a great slaughter in the land of Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the LORD there is a sacrifice in Bozrah.' The Hebrew clause is verbless
      and can be construed either way.
    reason: alternative_reading
  - marker: b
    text: '''Goats'' translates a term more specifically meaning ''male goats.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶרֶב
  chosen: sword
  alternatives:
  - blade
  lexicon: HALOT
  rationale: Concrete singular noun; 'sword' is the standard and natural rendering
    in prophetic judgment imagery.
- source_word: לַיהוָה
  chosen: of the LORD
  alternatives:
  - for the LORD
  - belonging to the LORD
  lexicon: HALOT
  rationale: 'The lamed here marks relation/possession in context: the sword is identified
    as the LORD''s instrument. ''The LORD'' follows the project''s default for YHWH.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: מָלְאָה דָם
  chosen: is filled with blood
  alternatives:
  - has been filled with blood
  - is full of blood
  lexicon: HALOT
  rationale: Predicate perfect with vivid present force in English; 'is filled with
    blood' preserves the resultative sense and the gruesome imagery.
- source_word: הֻדַּשְׁנָה
  chosen: is made fat
  alternatives:
  - is gorged
  - is covered with fat
  - is anointed with fatness
  lexicon: HALOT
  rationale: Passive of דשׁן conveys becoming rich/fat. In sacrificial imagery, 'made
    fat' preserves the metaphor without over-paraphrasing. More idiomatic expansions
    like 'gorged' are interpretive.
- source_word: מֵחֵלֶב
  chosen: with fatness
  alternatives:
  - with fat
  - from fat
  lexicon: HALOT
  rationale: The preposition here is best rendered instrumentally/source-like in English.
    'With fatness' keeps the poetic, sacrificial register and avoids awkward repetition
    while reflecting the noun חֵלֶב.
- source_word: מִדַּם כָּרִים וְעַתּוּדִים
  chosen: with the blood of lambs and goats
  alternatives:
  - from the blood of lambs and male goats
  - with the blood of rams and goats
  lexicon: HALOT
  rationale: כָּרִים commonly denotes lambs/young rams; paired with עַתּוּדִים ('male
    goats, goats') in sacrificial stock imagery. 'Lambs and goats' is clear modern
    English and fits the sacrificial catalogue.
- source_word: עַתּוּדִים
  chosen: goats
  alternatives:
  - male goats
  - he-goats
  lexicon: HALOT
  rationale: The term specifically refers to male goats, but 'goats' is sufficiently
    accurate in flowing English here; the sacrificial context already signals animal
    categories.
- source_word: מֵחֵלֶב כִּלְיוֹת אֵילִים
  chosen: with the fat of the kidneys of rams
  alternatives:
  - from the fat of rams' kidneys
  - with kidney fat of rams
  lexicon: HALOT
  rationale: This preserves the sacrificial detail and the Hebrew sequence closely
    enough for readability. 'Kidneys' should be retained because it is explicit in
    the source.
- source_word: אֵילִים
  chosen: rams
  alternatives:
  - male sheep
  lexicon: HALOT
  rationale: Standard sacrificial-animal rendering.
- source_word: כִּי זֶבַח לַיהוָה
  chosen: For the LORD has a sacrifice
  alternatives:
  - For there is a sacrifice for the LORD
  - For the LORD has a sacrificial feast
  lexicon: HALOT
  rationale: זֶבַח is 'sacrifice.' English supplies 'has' naturally to express the
    verbless clause. 'For the LORD' could be rendered 'for the LORD,' but 'the LORD
    has' better captures the sense that this slaughter is his appointed sacrificial
    act.
- source_word: בְּבָצְרָה
  chosen: in Bozrah
  alternatives:
  - at Bozrah
  lexicon: HALOT
  rationale: Place name transliterated per project policy for names.
- source_word: וְטֶבַח גָּדוֹל
  chosen: and a great slaughter
  alternatives:
  - and a great butchery
  - and a massive slaughter
  lexicon: HALOT
  rationale: טֶבַח denotes slaughter, often of animals, fitting the sacrificial/judgment
    metaphor. 'Great slaughter' is direct and idiomatic.
- source_word: בְּאֶרֶץ אֱדוֹם
  chosen: in the land of Edom
  alternatives:
  - in Edom's land
  - in the country of Edom
  lexicon: HALOT
  rationale: Straightforward rendering of the geographic phrase; 'Edom' is transliterated
    as a proper name.
