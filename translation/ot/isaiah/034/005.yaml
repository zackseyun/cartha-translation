theological_decisions:
- issue: Meaning of חֵרֶם in divine-war/judgment context
  chosen_reading: Rendered as 'devoted to destruction' rather than a more opaque literalism
    such as 'ban.'
  alternative_readings:
  - under my ban
  - accursed
  rationale: The Hebrew term refers to persons or things set apart for destruction
    under divine judgment. 'Devoted to destruction' best communicates the semantic
    force in accessible English while preserving the severity of the text. 'Accursed'
    risks shifting the sense toward a purely verbal curse rather than judicial destruction.
  doctrine_reference: Translation philosophy §§1, 6
