id: ISA.34.5
reference: Isaiah 34:5
source:
  edition: WLC
  text: כִּֽי רִוְּתָ֥ה בַ/שָּׁמַ֖יִם חַרְבִּ֑/י הִנֵּה֙ עַל אֱד֣וֹם תֵּרֵ֔ד וְ/עַל
    עַ֥ם חֶרְמִ֖/י לְ/מִשְׁפָּֽט־־־׃
translation:
  text: For my sword is drenched in the heavens; look, it will descend on Edom, on
    the people I have devoted to destruction, for judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is sated in the heavens' / 'has drunk its fill in the heavens.' The
      Hebrew image is of Yahweh's sword being saturated before descending in judgment.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the people of my ḥerem,' that is, the people devoted to destruction
      under divine judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or ground for the coming judgment in the surrounding
    context. 'For' preserves the explanatory force without over-specifying whether
    it is causal or asseverative.
- source_word: רִוְּתָה
  chosen: is drenched
  alternatives:
  - is sated
  - is soaked
  - has drunk its fill
  lexicon: HALOT
  rationale: From רוה, 'to be saturated/drunk one's fill.' With 'sword' as subject,
    the image is metaphorical and violent. 'Is drenched' communicates saturation in
    a vivid but natural English idiom, fitting the judgment imagery better than the
    more opaque 'is sated.'
- source_word: בַשָּׁמַיִם
  chosen: in the heavens
  alternatives:
  - in heaven
  - in the sky
  lexicon: HALOT
  rationale: The plural form commonly denotes the heavens. 'In the heavens' preserves
    the Hebrew imagery and cosmic setting better than the singular 'in heaven,' while
    'sky' would flatten the elevated register.
- source_word: חַרְבִּי
  chosen: my sword
  lexicon: HALOT
  rationale: Straightforward possessive construction. The sword is Yahweh's instrument
    of judgment in context.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: A deictic particle drawing attention to the imminent action. 'Look' is
    readable modern English and preserves the force without archaic tone.
- source_word: עַל אֱדוֹם
  chosen: on Edom
  alternatives:
  - against Edom
  lexicon: HALOT
  rationale: עַל with a verb of descent naturally yields 'on/upon.' 'On Edom' keeps
    the concrete image of the sword coming down, while still implying hostile action.
- source_word: תֵּרֵד
  chosen: it will descend
  alternatives:
  - it will come down
  - it will fall
  lexicon: HALOT
  rationale: From ירד, 'to go down/descend.' 'Will descend' preserves the elevated
    register and matches the prior heavenly setting.
- source_word: עַם חֶרְמִי
  chosen: the people I have devoted to destruction
  alternatives:
  - the people of my ban
  - the people under my curse
  - the people I have doomed
  lexicon: HALOT
  rationale: חֵרֶם denotes something devoted to destruction under divine judgment.
    A formally literal rendering like 'the people of my ban' is obscure in modern
    English. 'The people I have devoted to destruction' makes the covenant-judgment
    sense explicit without importing extra theology.
- source_word: לְמִשְׁפָּט
  chosen: for judgment
  alternatives:
  - for justice
  - for sentencing
  lexicon: HALOT
  rationale: מִשְׁפָּט here denotes judicial action/verdict. 'For judgment' is the
    most direct and contextually fitting rendering, preserving the legal dimension
    of divine punishment.
