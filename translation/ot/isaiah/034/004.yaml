id: ISA.34.4
reference: Isaiah 34:4
source:
  edition: WLC
  text: וְ/נָמַ֨קּוּ֙ כָּל צְבָ֣א הַ/שָּׁמַ֔יִם וְ/נָגֹ֥לּוּ כַ/סֵּ֖פֶר הַ/שָּׁמָ֑יִם
    וְ/כָל צְבָאָ֣/ם יִבּ֔וֹל כִּ/נְבֹ֤ל עָלֶה֙ מִ/גֶּ֔פֶן וּ/כְ/נֹבֶ֖לֶת מִ/תְּאֵנָֽה־־׃
translation:
  text: All the host of heaven will rot away, and the skies will be rolled up like
    a scroll; all their host will wither like a leaf withers from the vine, and like
    a withered fig from the fig tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will dissolve' for 'will rot away.' The Hebrew verb can denote wasting
      away, decaying, or dissolving.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the host of heaven,' a phrase that can refer to the heavenly array,
      especially the stars.
    reason: cultural_note
  - marker: c
    text: Or 'the heavens will be rolled up like a scroll.'
    reason: lexical_alternative
  - marker: d
    text: Literally 'all their host,' likely referring to the heavenly bodies belonging
      to the skies/heavens.
    reason: lexical_alternative
  - marker: e
    text: Or 'like a leaf falling from the vine, and like a fig falling from the fig
      tree.' The Hebrew imagery allows either emphasis on withering or on the resulting
      fall.
    reason: alternative_reading
lexical_decisions:
- source_word: נָמַקּוּ
  chosen: will rot away
  alternatives:
  - will dissolve
  - will waste away
  - will decay
  lexicon: HALOT
  rationale: The verb נמק in the Niphal conveys wasting away, rotting, or dissolving.
    In this cosmic-judgment context, 'rot away' preserves the vivid, physical imagery
    better than the more abstract 'dissolve,' while still fitting poetic language.
- source_word: צְבָא הַשָּׁמַיִם
  chosen: the host of heaven
  alternatives:
  - the army of heaven
  - the stars of heaven
  lexicon: HALOT
  rationale: צָבָא commonly means host/army. Here it refers to the heavenly array,
    likely the stars or celestial bodies. 'Host of heaven' preserves the Hebrew idiom
    and its breadth without over-specifying.
- source_word: נָגֹלּוּ
  chosen: will be rolled up
  alternatives:
  - will be rolled together
  - will be folded up
  lexicon: HALOT
  rationale: From גלל, the image is of something being rolled up. 'Rolled up' is idiomatic
    English and matches the scroll simile closely.
- source_word: כַסֵּפֶר
  chosen: like a scroll
  alternatives:
  - like a book
  - like a document
  lexicon: HALOT
  rationale: סֵפֶר can denote a written document or scroll. In ancient context and
    with the rolling imagery, 'scroll' is the most concrete and historically fitting
    rendering.
- source_word: הַשָּׁמַיִם
  chosen: the skies
  alternatives:
  - the heavens
  - the sky
  lexicon: HALOT
  rationale: The term appears twice in the verse. Here, after 'host of heaven,' rendering
    the second occurrence as 'the skies' avoids awkward repetition while still referring
    to the visible heavens/celestial expanse. This is a documented stylistic variation
    within optimal equivalence.
- source_word: וְכָל צְבָאָם
  chosen: all their host
  alternatives:
  - all their army
  - all their stars
  - all their host of stars
  lexicon: HALOT
  rationale: 'The 3mp suffix most naturally refers back to the skies/heavens: their
    host, i.e., the heavenly bodies belonging to the skies. ''All their host'' preserves
    the Hebrew linkage and avoids interpretive overreach.'
- source_word: יִבּוֹל
  chosen: will wither
  alternatives:
  - will fade
  - will shrivel
  - will fall
  lexicon: HALOT
  rationale: The verb נבל is used of vegetation withering or fading. 'Wither' best
    matches the following similes of leaf and fig.
- source_word: כִּנְבֹל עָלֶה מִגֶּפֶן
  chosen: like a leaf withers from the vine
  alternatives:
  - like a leaf falling from a vine
  - like a leaf fading from the vine
  lexicon: HALOT
  rationale: The infinitive construct with comparative כ introduces the simile. The
    image is of a leaf withering/falling off a vine. 'Like a leaf withers from the
    vine' keeps the verbal connection to יִבּוֹל and preserves the agricultural imagery.
- source_word: וּכְנֹבֶלֶת מִתְּאֵנָה
  chosen: and like a withered fig from the fig tree
  alternatives:
  - and like what withers from the fig tree
  - and like a falling fig from the fig tree
  lexicon: HALOT
  rationale: The feminine participial form likely evokes a withered or falling fig.
    Supplying 'fig' in English is necessary for clarity because the source noun is
    implicit from 'fig tree.' 'Withered fig' keeps the lexical tie to נבל and the
    parallelism with the leaf image.
