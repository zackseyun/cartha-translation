theological_decisions:
- issue: Nature of the cosmic imagery
  chosen_reading: Render the language straightforwardly as cosmic de-creation/judgment
    imagery without reducing it to mere metaphor or forcing a specific eschatological
    system.
  alternative_readings:
  - purely metaphorical language for political collapse
  - strictly literal astronomical dissolution
  rationale: The verse uses elevated prophetic poetry describing divine judgment in
    cosmic terms. The translation should preserve the force and ambiguity of the imagery
    rather than resolve whether it is metaphorical, literal, or both.
  doctrine_reference: Preserve theological tension rather than resolve it.
