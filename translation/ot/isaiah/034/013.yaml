id: ISA.34.13
reference: Isaiah 34:13
source:
  edition: WLC
  text: וְ/עָלְתָ֤ה אַרְמְנֹתֶ֨י/הָ֙ סִירִ֔ים קִמּ֥וֹשׂ וָ/ח֖וֹחַ בְּ/מִבְצָרֶ֑י/הָ
    וְ/הָיְתָה֙ נְוֵ֣ה תַנִּ֔ים חָצִ֖יר לִ/בְנ֥וֹת יַעֲנָֽה׃
translation:
  text: Thorns will grow over her palaces, nettles and brambles in her fortresses;
    and she will become a haunt of jackals, a pasture for daughters of the ostrich.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, 'for ostriches.' The Hebrew reads literally, 'for daughters of
      the ostrich,' an idiomatic expression for ostriches.
    reason: lexical_alternative
  - marker: b
    text: '''Jackals'' is the likely sense here; older English versions often have
      ''dragons.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָלְתָה
  chosen: will grow over
  alternatives:
  - will come up
  - will ascend upon
  lexicon: HALOT
  rationale: From עלה, here used of vegetation springing up over ruined structures.
    'Will grow over' captures the idiomatic sense in natural English while preserving
    the image of overgrowth.
- source_word: אַרְמְנֹתֶיהָ
  chosen: her palaces
  alternatives:
  - her citadels
  - her castles
  lexicon: HALOT
  rationale: ארמון commonly denotes palace or fortified residence. 'Palaces' is the
    most standard and fitting rendering in parallel with 'fortresses' later in the
    verse.
- source_word: סִירִים
  chosen: thorns
  alternatives:
  - thornbushes
  - briers
  lexicon: HALOT
  rationale: A general term for thorny growth. 'Thorns' is clear, natural, and preserves
    the desolation imagery without over-specifying the plant.
- source_word: קִמּוֹשׂ
  chosen: nettles
  alternatives:
  - weeds
  - thistles
  lexicon: HALOT
  rationale: The term denotes a noxious wild plant associated with ruin and neglect.
    'Nettles' is a common conventional rendering and pairs well with the surrounding
    vegetation terms.
- source_word: וָחוֹחַ
  chosen: brambles
  alternatives:
  - thorns
  - thistles
  - briers
  lexicon: HALOT
  rationale: A thorny or prickly plant. Since 'thorns' already renders סירים, 'brambles'
    provides differentiation while maintaining the semantic field of invasive, desolating
    growth.
- source_word: בְּמִבְצָרֶיהָ
  chosen: in her fortresses
  alternatives:
  - in her strongholds
  - in her fortified places
  lexicon: HALOT
  rationale: מבצר refers to fortified structures or strongholds. 'Fortresses' is idiomatic
    and matches the urban-ruin context.
- source_word: וְהָיְתָה
  chosen: and she will become
  alternatives:
  - and it will be
  - and she will be
  lexicon: HALOT
  rationale: The feminine singular refers back to the land/city personified. 'She
    will become' preserves the personification and the sense of transformation into
    a desolate habitat.
- source_word: נְוֵה
  chosen: a haunt
  alternatives:
  - a habitation
  - a pasture
  - a dwelling place
  lexicon: HALOT
  rationale: The noun can denote abode or haunt. Because חָצִיר later supplies the
    pasture image, 'haunt' avoids repetition and suits wild animals inhabiting ruins.
- source_word: תַנִּים
  chosen: jackals
  alternatives:
  - dragons
  - wild dogs
  lexicon: HALOT
  rationale: In prophetic desolation contexts, tannim is best rendered 'jackals' in
    modern English. 'Dragons' reflects older tradition but is misleading for contemporary
    readers.
- source_word: חָצִיר
  chosen: a pasture
  alternatives:
  - grass
  - herbage
  - a court
  lexicon: HALOT
  rationale: Here the noun is best taken in the sense of grassy place or pastureland,
    parallel to the preceding animal-habitation phrase. 'A pasture' yields coherent
    imagery of abandoned ruins becoming animal ground.
- source_word: לִבְנוֹת יַעֲנָה
  chosen: for daughters of the ostrich
  alternatives:
  - for ostriches
  - for owl-daughters
  lexicon: HALOT
  rationale: Literally 'for daughters of the ostrich.' The Hebrew idiom likely refers
    to ostriches. The main text preserves the literal expression for auditability
    while remaining intelligible; the simpler zoological equivalent is preserved in
    a footnote.
