theological_decisions:
- issue: Referent of the pronouns in the allotment imagery
  chosen_reading: The verse speaks of God assigning the devastated land to the wild
    creatures named in the immediate context.
  alternative_readings:
  - The pronouns could be generalized more abstractly to desolate inhabitants without
    specifying the creatures.
  rationale: The immediate literary context (vv. 11, 13–15) lists desert animals and
    birds occupying Edom. The feminine and masculine plural pronouns are best understood
    collectively within that imagery. The translation keeps the pronouns rather than
    importing explicit nouns not present in the verse itself.
