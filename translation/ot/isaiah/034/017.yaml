id: ISA.34.17
reference: Isaiah 34:17
source:
  edition: WLC
  text: וְ/הֽוּא הִפִּ֤יל לָ/הֶן֙ גּוֹרָ֔ל וְ/יָד֛/וֹ חִלְּקַ֥תָּ/ה לָ/הֶ֖ם בַּ/קָּ֑ו
    עַד עוֹלָם֙ יִֽירָשׁ֔וּ/הָ לְ/ד֥וֹר וָ/ד֖וֹר יִשְׁכְּנוּ בָֽ/הּ־־־׃ס
translation:
  text: And he himself has cast the lot for them, and his hand has apportioned it
    to them by line; they will possess it forever; from generation to generation they
    will dwell in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the measuring line.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they will inherit it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  chosen: And he himself
  alternatives:
  - And he
  - He
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis; 'he himself' preserves that stress
    better than a simple 'he.'
- source_word: הִפִּיל
  chosen: has cast
  alternatives:
  - cast
  - caused to fall
  lexicon: HALOT
  rationale: From נפל in Hiphil with גּוֹרָל, the idiom means 'cast [the lot].' Present
    perfect English fits the completed divine action with ongoing result.
- source_word: לָהֶן
  chosen: for them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The feminine plural pronoun refers back to the creatures/birds of the
    preceding context; 'for them' suits the idiom of assigning by lot.
- source_word: גּוֹרָל
  chosen: the lot
  alternatives:
  - a lot
  - portion by lot
  lexicon: HALOT
  rationale: Definite in sense within the allotment imagery; 'the lot' is the natural
    English rendering in land-distribution language.
- source_word: וְיָדוֹ
  chosen: and his hand
  alternatives:
  - and with his hand
  lexicon: HALOT
  rationale: Retains the anthropomorphic image of God's active agency in measuring
    and assigning.
- source_word: חִלְּקַתָּה
  chosen: has apportioned it
  alternatives:
  - has divided it
  - divided it up
  lexicon: HALOT
  rationale: From חלק, in context of territorial distribution. 'Apportioned' fits
    measured assignment better than the more generic 'divided.' The 3fs suffix refers
    to the land/territory.
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: Dative of assignment after 'apportioned'; masculine plural likely functions
    generically for the possessors in the collective image.
- source_word: בַּקָּו
  chosen: by line
  alternatives:
  - with the measuring line
  - by measuring line
  - with a cord
  lexicon: HALOT
  rationale: קָו is a measuring line used in surveying land. 'By line' is concise
    and preserves the allotment imagery; the fuller alternative is preserved in a
    footnote.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for perpetuity
  - unto eternity
  lexicon: HALOT
  rationale: Idiomatic English for enduring possession; this keeps the force without
    archaic phrasing.
- source_word: יִירָשׁוּהָ
  chosen: they will possess it
  alternatives:
  - they will inherit it
  - they will take possession of it
  lexicon: HALOT
  rationale: ירשׁ can mean inherit/possess/dispossess depending on context. Here,
    in land-allotment imagery, 'possess it' is the clearest English, while 'inherit
    it' is a viable alternative preserved in a footnote.
- source_word: לְדוֹר וָדוֹר
  chosen: from generation to generation
  alternatives:
  - for generation and generation
  - throughout all generations
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the distributive phrase in natural modern
    English.
- source_word: יִשְׁכְּנוּ בָהּ
  chosen: they will dwell in it
  alternatives:
  - they will live in it
  - they will settle in it
  lexicon: HALOT
  rationale: שׁכן commonly means dwell/settle. 'Dwell' preserves the solemn tone and
    continuity of habitation.
