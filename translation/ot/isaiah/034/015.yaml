id: ISA.34.15
reference: Isaiah 34:15
source:
  edition: WLC
  text: שָׁ֣מָּ/ה קִנְּנָ֤ה קִפּוֹז֙ וַ/תְּמַלֵּ֔ט וּ/בָקְעָ֖ה וְ/דָגְרָ֣ה בְ/צִלָּ֑/הּ
    אַךְ שָׁ֛ם נִקְבְּצ֥וּ דַיּ֖וֹת אִשָּׁ֥ה רְעוּתָֽ/הּ־׃
translation:
  text: There the arrow snake will nest and lay eggs, and hatch them, and gather them
    in her shadow; indeed, there the kites will gather, each with her mate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew קִפּוֹז is uncertain; it has also been rendered 'owl' or another
      desert creature.
    reason: alternative_reading
  - marker: b
    text: Or 'and brood over them in her shade.'
    reason: lexical_alternative
  - marker: c
    text: Or 'vultures' or more generally 'birds of prey.'
    reason: alternative_reading
lexical_decisions:
- source_word: קִפּוֹז
  chosen: arrow snake
  alternatives:
  - darting snake
  - arrow-snake
  - tree snake
  - owl
  lexicon: HALOT, BDB
  rationale: The noun is a hapax and highly uncertain. Traditional versions often
    render it as a bird or owl, but the immediate sequence of feminine singular verbs
    ('nest,' 'lay eggs,' 'hatch') and the broader animal catalog allow a reptile reading.
    'Arrow snake' preserves the probable sense of a darting creature while signaling
    uncertainty better than a falsely precise species identification.
- source_word: קִנְּנָה
  chosen: will nest
  alternatives:
  - has nested
  - nests
  lexicon: HALOT, BDB
  rationale: From קנן, 'to nest.' In prophetic description, English future fits the
    scene of coming desolation populated by wild creatures.
- source_word: וַתְּמַלֵּט
  chosen: and lay eggs
  alternatives:
  - and give birth
  - and bring forth young
  lexicon: HALOT, BDB
  rationale: The verb ילד/מלט in this stem can denote bringing forth. Given the nesting
    context and the following verbs about hatching and brooding, 'lay eggs' best fits
    the zoological imagery in English.
- source_word: וּבָקְעָה
  chosen: and hatch them
  alternatives:
  - and split them open
  - and hatch
  lexicon: HALOT, BDB
  rationale: בקע literally means 'split' or 'break open.' In the context of eggs,
    idiomatic English is 'hatch them,' making explicit the implied object.
- source_word: וְדָגְרָה
  chosen: and gather them
  alternatives:
  - and brood
  - and sit on them
  lexicon: HALOT, BDB
  rationale: The verb refers to brooding/incubating. Because the phrase is followed
    by 'in her shadow,' the image is of collecting or sheltering the young beneath
    her. 'Gather them' communicates the protective action in natural English, while
    the more literal nuance is preserved in a footnote.
- source_word: בְצִלָּהּ
  chosen: in her shadow
  alternatives:
  - under her shade
  lexicon: HALOT, BDB
  rationale: Literal rendering retained; it evokes the mother creature sheltering
    her young.
- source_word: אַךְ
  chosen: indeed
  alternatives:
  - surely
  - 'yes'
  - only
  lexicon: HALOT, BDB
  rationale: Here the particle is asseverative, emphasizing the certainty of the scene
    rather than restricting it.
- source_word: דַיּוֹת
  chosen: kites
  alternatives:
  - birds of prey
  - vultures
  lexicon: HALOT, BDB
  rationale: Usually identified as kites or carrion birds. 'Kites' is the more specific
    and common lexical choice, while broader alternatives remain possible.
- source_word: אִשָּׁה רְעוּתָהּ
  chosen: each with her mate
  alternatives:
  - one with another
  - each with her companion
  lexicon: HALOT, BDB
  rationale: Literally 'a woman with her companion,' an idiom for pairing. Because
    the referent is feminine birds, 'each with her mate' conveys the distributive
    pairing naturally in English while preserving the feminine imagery.
