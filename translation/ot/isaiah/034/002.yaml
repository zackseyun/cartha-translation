id: ISA.34.2
reference: Isaiah 34:2
source:
  edition: WLC
  text: כִּ֣י קֶ֤צֶף לַֽ/יהוָה֙ עַל כָּל הַ/גּוֹיִ֔ם וְ/חֵמָ֖ה עַל כָּל צְבָאָ֑/ם הֶחֱרִימָ֖/ם נְתָנָ֥/ם לַ/טָּֽבַח־־־־׃
translation:
  text: For Yahweh has indignation against all the nations, and wrath against all their host; he has devoted them to destruction; he has given them over to the slaughter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'their host' can also be rendered 'their armies.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he has put them under the ban'; the Hebrew verb carries the sense of devoting something to destruction under divine judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding summons/judgment context. 'For' preserves the explanatory force in natural English.
- source_word: קֶצֶף
  chosen: indignation
  alternatives:
  - wrath
  - anger
  lexicon: HALOT
  rationale: Denotes divine anger in a heightened judicial sense. 'Indignation' differentiates it from the following חֵמָה while preserving solemnity.
- source_word: לַיהוָה
  chosen: the LORD has
  alternatives:
  - belongs to the LORD is
  - the LORD has
  lexicon: HALOT
  rationale: With the predicate noun construction, English idiom requires supplying the verbal idea. YHWH is rendered 'the LORD' per doctrine for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: עַל כָּל הַגּוֹיִם
  chosen: against all the nations
  alternatives:
  - upon all the nations
  - against all the Gentiles
  lexicon: HALOT
  rationale: עַל with wrath language is naturally 'against.' גּוֹיִם here refers broadly to the nations, not specifically 'Gentiles' in contrast to Jews.
- source_word: וְחֵמָה
  chosen: and wrath
  alternatives:
  - and fury
  - and rage
  lexicon: HALOT
  rationale: A strong term for burning anger. 'Wrath' is weighty and readable, and pairs well with 'indignation' without collapsing the two nouns into one English term.
- source_word: עַל כָּל צְבָאָם
  chosen: against all their host
  alternatives:
  - against all their armies
  - against all their multitude
  lexicon: HALOT
  rationale: צָבָא can denote army/host. 'Host' preserves the collective breadth and echoes military array without over-specifying only formal armies; the singular collective also matches the Hebrew form with suffix.
- source_word: הֶחֱרִימָם
  chosen: he has devoted them to destruction
  alternatives:
  - he has utterly destroyed them
  - he has put them under the ban
  lexicon: HALOT
  rationale: The Hiphil of חרם often means to devote to destruction, carrying covenant-judgment force beyond mere killing. 'Devoted them to destruction' preserves that nuance better than simply 'destroyed.'
- source_word: נְתָנָם
  chosen: he has given them over
  alternatives:
  - he has given them
  - he has delivered them
  lexicon: HALOT
  rationale: '''Given them over'' makes explicit the judicial handing-over sense in context, while remaining faithful to נתן.'
- source_word: לַטָּבַח
  chosen: to the slaughter
  alternatives:
  - for slaughter
  - to slaughter
  lexicon: HALOT
  rationale: The noun טֶבַח denotes slaughter/slaying. 'To the slaughter' is idiomatic and preserves the image of being handed over for destruction.
