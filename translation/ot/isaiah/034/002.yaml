theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of הֶחֱרִימָם (חרם in Hiphil)
  chosen_reading: he has devoted them to destruction
  alternative_readings:
  - he has utterly destroyed them
  - he has put them under the ban
  rationale: The verb carries the sense of placing under ḥerem, a consecrated destruction in judgment. The chosen rendering preserves that theological-judicial nuance without using the less accessible idiom 'under the ban.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #6'
