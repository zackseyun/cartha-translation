theological_decisions:
- issue: Allusion to creation-language in תֹהוּ וָבֹהוּ imagery
  chosen_reading: Render with judgment-oriented terms in the main text while preserving
    the creation-chaos echo in documentation/footnote
  alternative_readings:
  - Translate more literally as 'chaos' and 'void' in the main text
  rationale: Isaiah evokes Gen 1:2 language to portray Edom's undoing into uncreation.
    In the main text, 'desolation' and 'emptiness' are more natural in English and
    fit the immediate judgment context; the intertextual echo is important enough
    to preserve in a footnote rather than flatten or over-literalize the line.
  doctrine_reference: 'Translation philosophy #3, #6'
