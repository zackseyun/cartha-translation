id: ISA.34.11
reference: Isaiah 34:11
source:
  edition: WLC
  text: וִ/ירֵשׁ֨וּ/הָ֙ קָאַ֣ת וְ/קִפּ֔וֹד וְ/יַנְשׁ֥וֹף וְ/עֹרֵ֖ב יִשְׁכְּנוּ בָ֑/הּ
    וְ/נָטָ֥ה עָלֶ֛י/הָ קַֽו תֹ֖הוּ וְ/אַבְנֵי בֹֽהוּ־־־׃
translation:
  text: The desert owl and the hedgehog will possess her, and the owl and the raven
    will dwell in her; he will stretch over her the measuring line of desolation and
    the plumb stones of emptiness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The identifications of the animals named here are uncertain. 'Desert owl'
      may also be rendered 'pelican' or 'cormorant,' and 'hedgehog' may also be rendered
      'porcupine' or 'bittern.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the measuring line of tohu and the stones of bohu.' The phrase echoes
      Genesis 1:2 ('formless and empty' / 'waste and void') and portrays the land
      as reduced to uncreation.
    reason: cross_reference
lexical_decisions:
- source_word: וִירֵשׁוּהָ
  chosen: will possess her
  alternatives:
  - will inherit her
  - will take possession of her
  lexicon: HALOT
  rationale: From ירשׁ, commonly 'possess/inherit/take possession.' In this judgment
    context of ruined territory occupied by wild creatures, 'possess' best conveys
    takeover of the land without implying legal inheritance.
- source_word: קָאַת
  chosen: desert owl
  alternatives:
  - pelican
  - cormorant
  lexicon: HALOT
  rationale: The identification of this animal is uncertain. Traditional renderings
    vary widely. 'Desert owl' fits the context of desolation and nocturnal scavenging
    birds, while preserving readable modern English; the uncertainty is preserved
    in a footnote.
- source_word: קִפּוֹד
  chosen: hedgehog
  alternatives:
  - porcupine
  - bittern
  lexicon: HALOT
  rationale: The animal term is disputed. 'Hedgehog' is a common modern rendering
    and fits a creature inhabiting ruins. Alternatives are preserved in a footnote
    because the zoological identification is uncertain.
- source_word: יַנְשׁוֹף
  chosen: owl
  alternatives:
  - great owl
  - screech owl
  lexicon: HALOT
  rationale: A nocturnal bird, generally understood as some kind of owl. A generic
    'owl' avoids false precision while preserving the sense.
- source_word: עֹרֵב
  chosen: raven
  alternatives:
  - crow
  lexicon: HALOT
  rationale: Standard rendering for עֹרֵב; 'raven' is the usual lexical equivalent
    in desolation imagery.
- source_word: יִשְׁכְּנוּ בָהּ
  chosen: will dwell in her
  alternatives:
  - will live in her
  - will settle in her
  lexicon: HALOT
  rationale: שׁכן means to dwell/settle. 'Dwell' preserves the solemn tone and the
    image of enduring habitation in the ruined land/city, represented by the feminine
    pronoun.
- source_word: וְנָטָה עָלֶיהָ
  chosen: he will stretch over her
  alternatives:
  - one will stretch over her
  - it will be stretched over her
  lexicon: HALOT
  rationale: נטה with a measuring line evokes the act of extending a line for surveying
    or demolition. The subject is implicit and best rendered as an indefinite/impersonal
    'he' in English, referring to God as the acting judge by context, without over-explication.
- source_word: קַו תֹהוּ
  chosen: the measuring line of desolation
  alternatives:
  - the line of chaos
  - the measuring cord of emptiness
  lexicon: HALOT
  rationale: קַו is a measuring line/cord. תֹהוּ echoes Gen 1:2 and denotes wasteness,
    emptiness, chaos. 'Desolation' communicates the judgment context clearly in modern
    English, while the alternative more literal nuance is preserved in a footnote.
- source_word: וְאַבְנֵי בֹהוּ
  chosen: and the plumb stones of emptiness
  alternatives:
  - and stones of chaos
  - and plummet stones of void
  lexicon: HALOT
  rationale: אַבְנֵי literally 'stones of.' In parallel with measuring line imagery,
    these are best understood as stones used in construction measurement, hence 'plumb
    stones.' בֹהוּ, paired with תֹהוּ, denotes emptiness/void. The phrase depicts
    measured devastation, reversing creation order.
