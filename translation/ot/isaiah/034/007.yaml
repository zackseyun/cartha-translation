id: ISA.34.7
reference: Isaiah 34:7
source:
  edition: WLC
  text: וְ/יָרְד֤וּ רְאֵמִים֙ עִמָּ֔/ם וּ/פָרִ֖ים עִם אַבִּירִ֑ים וְ/רִוְּתָ֤ה אַרְצָ/ם֙
    מִ/דָּ֔ם וַ/עֲפָרָ֖/ם מֵ/חֵ֥לֶב יְדֻשָּֽׁן־׃
translation:
  text: Wild oxen will fall with them, and young bulls with the mighty ones; their
    land will be drenched with blood, and their dust made rich with fat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'oryxes' for 'wild oxen'; the Hebrew רְאֵמִים refers to a powerful wild
      bovine, though the exact species is uncertain.
    reason: lexical_alternative
  - marker: b
    text: '''The mighty ones'' may refer to powerful warriors or, in the poetic imagery,
      to strong bulls; the Hebrew allows either or both nuances.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְיָרְדוּ
  chosen: will fall
  alternatives:
  - will go down
  - will descend
  lexicon: HALOT
  rationale: The verb literally means 'go down/descend,' but in this violent judgment
    context with animals and warriors being slaughtered, 'fall' conveys the idiomatic
    sense of being struck down while remaining close to the Hebrew imagery.
- source_word: רְאֵמִים
  chosen: wild oxen
  alternatives:
  - oryxes
  - buffalo
  - unicorns
  lexicon: HALOT
  rationale: The identity of רְאֵם is uncertain, but 'wild ox' is the standard modern
    rendering that best fits a large powerful bovine. 'Unicorns' reflects older tradition
    but is not supported in contemporary translation.
- source_word: עִמָּם
  chosen: with them
  lexicon: HALOT
  rationale: Retains the third person plural pronominal reference without over-specifying
    the antecedent; in context it refers to those under judgment.
- source_word: וּפָרִים
  chosen: young bulls
  alternatives:
  - bulls
  - steers
  lexicon: HALOT
  rationale: פָּר commonly denotes a bull, often a young bull. 'Young bulls' preserves
    the lexical nuance and pairs naturally with the larger sacrificial/slaughter imagery
    of the verse.
- source_word: אַבִּירִים
  chosen: the mighty ones
  alternatives:
  - strong ones
  - mighty bulls
  - nobles
  lexicon: HALOT
  rationale: The term can denote mighty ones generally and may metaphorically refer
    to powerful leaders or strong animals. 'The mighty ones' preserves the ambiguity
    and fits the prophetic parallelism without forcing either a purely human or purely
    animal referent.
- source_word: וְרִוְּתָה
  chosen: will be drenched
  alternatives:
  - will be saturated
  - will drink its fill
  lexicon: HALOT
  rationale: From a verb meaning to be saturated or drink one's fill. With 'land'
    as subject and 'blood' as the substance, 'will be drenched' is vivid, natural
    English that preserves the gruesome image.
- source_word: אַרְצָם
  chosen: their land
  alternatives:
  - their earth
  - their country
  lexicon: HALOT
  rationale: '''Land'' is the most natural rendering here, referring to the territory
    of those judged.'
- source_word: מִדָּם
  chosen: with blood
  alternatives:
  - from blood
  lexicon: HALOT
  rationale: 'Although the preposition is literally ''from,'' after a saturation verb
    English idiom prefers ''with'': the land is drenched with blood.'
- source_word: וַעֲפָרָם
  chosen: their dust
  alternatives:
  - their soil
  - their ground
  lexicon: HALOT
  rationale: '''Dust'' preserves the concrete Hebrew image and echoes mortality/judgment
    language common in Scripture.'
- source_word: מֵחֵלֶב
  chosen: with fat
  alternatives:
  - from fat
  lexicon: HALOT
  rationale: As with 'blood,' English idiom after the following verb is best expressed
    with 'with fat,' referring to the fat of slaughtered victims.
- source_word: יְדֻשָּׁן
  chosen: made rich
  alternatives:
  - will be fattened
  - will be enriched
  lexicon: HALOT
  rationale: The verb means to become fat/rich. Applied to dust/soil, 'made rich'
    communicates the image of being enriched by sacrificial fat without sounding awkwardly
    literal.
