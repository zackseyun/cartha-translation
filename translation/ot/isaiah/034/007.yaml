theological_decisions:
- issue: Metaphorical versus literal force of the animal imagery
  chosen_reading: Retain the animal terms in the main text while allowing them to
    function as imagery for the downfall of the powerful in divine judgment.
  alternative_readings:
  - Interpret all animal terms as literal sacrificial animals only
  - Interpret all animal terms as metaphors for human rulers only
  rationale: Isaiah 34 uses sacrificial and battlefield imagery together. The Hebrew
    permits a layered reading in which literal animal language intensifies the portrayal
    of Yahweh's judgment on nations and their mighty ones. The translation preserves
    that tension rather than collapsing it into a single interpretive option.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
