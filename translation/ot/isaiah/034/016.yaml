id: ISA.34.16
reference: Isaiah 34:16
source:
  edition: WLC
  text: דִּרְשׁ֨וּ מֵֽ/עַל סֵ֤פֶר יְהוָה֙ וּֽ/קְרָ֔אוּ אַחַ֤ת מֵ/הֵ֨נָּה֙ לֹ֣א נֶעְדָּ֔רָה אִשָּׁ֥ה רְעוּתָ֖/הּ לֹ֣א פָקָ֑דוּ כִּֽי פִ/י֙ ה֣וּא צִוָּ֔ה וְ/רוּח֖/וֹ ה֥וּא קִבְּצָֽ/ן־־׃
translation:
  text: 'Search in the book of Yahweh and read: not one of these will be missing; none will lack her mate. For his mouth has commanded, and his Spirit has gathered them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew literally, ''For my mouth, it has commanded''; some translations keep the first person here: ''For my mouth has commanded.'''
    reason: alternative_reading
  - marker: b
    text: Or 'and his breath' or 'and his wind has gathered them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּרְשׁוּ
  chosen: Search
  alternatives:
  - Seek
  - Consult
  lexicon: HALOT
  rationale: Imperative plural of דרשׁ. In context it calls the audience to examine or consult the written record, so 'Search' captures active inquiry better than the more general 'seek.'
- source_word: מֵעַל סֵפֶר יְהוָה
  chosen: in the book of the LORD
  alternatives:
  - from the book of the LORD
  - upon the book of the LORD
  lexicon: HALOT
  rationale: The preposition with ספר here idiomatically points to consulting a written source. 'In the book of the LORD' is natural English and preserves the sense of looking within the divine record. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: וּקְרָאוּ
  chosen: and read
  alternatives:
  - and call out
  - and proclaim
  lexicon: HALOT
  rationale: Though קרא can mean 'call,' with a book as object the sense is reading aloud or reading from it. 'Read' fits the immediate literary context.
- source_word: אַחַת מֵהֵנָּה לֹא נֶעְדָּרָה
  chosen: not one of these will be missing
  alternatives:
  - not one of them is missing
  - not one from among them will be absent
  lexicon: HALOT
  rationale: Refers back to the listed creatures in the oracle. The singular feminine 'one' with the plural pronoun is naturally rendered distributively in English.
- source_word: אִשָּׁה רְעוּתָהּ לֹא פָקָדוּ
  chosen: none will lack her mate
  alternatives:
  - not one will miss her companion
  - female with her fellow they are not lacking
  lexicon: HALOT
  rationale: The Hebrew uses feminine singular plus 'companion/mate' to stress pairing among the creatures. 'Mate' best fits the animal context; 'none will lack her mate' gives clear English while preserving the distributive force.
- source_word: פָקָדוּ
  chosen: will lack
  alternatives:
  - are missing
  - have been deprived of
  - are unaccounted for
  lexicon: HALOT
  rationale: פקד has a broad range, but here in parallel with 'missing' and in the context of paired creatures it conveys lacking or being without.
- source_word: כִּי פִי הוּא צִוָּה
  chosen: For his mouth has commanded
  alternatives:
  - For my mouth has commanded
  - For it is his mouth that has commanded
  lexicon: HALOT
  rationale: 'The ketiv/qere-like interpretive issue is syntactic rather than textual: פי is literally ''my mouth,'' but the following הוא and the broader discourse can be rendered as an emphatic divine self-reference. The traditional MT points to first person, but the immediately following third-person suffix in ''his Spirit'' creates a shift. Rendering both as third person in English yields a smooth reference to the LORD as the speaker spoken of. The first-person alternative is preserved in a footnote because it is a significant lexical/syntactic option.'
- source_word: וְרוּחוֹ
  chosen: and his Spirit
  alternatives:
  - and his breath
  - and his wind
  lexicon: HALOT
  rationale: רוּחַ can mean spirit, breath, or wind. In parallel with divine command and gathering agency, 'Spirit' best preserves the personal, active force of the Hebrew without reducing it to mere wind. Alternative senses are worth preserving in a footnote.
- source_word: קִבְּצָן
  chosen: has gathered them
  alternatives:
  - has assembled them
  - will gather them
  lexicon: HALOT
  rationale: The verb means gather/assemble, with 3mp object suffix. Perfect aspect can be rendered as a prophetic perfect, but English present perfect 'has gathered them' works well with the certainty grounded in divine command.
