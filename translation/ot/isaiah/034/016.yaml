theological_decisions:
- issue: Rendering of divine agency in the final clause
  chosen_reading: For his mouth has commanded, and his Spirit has gathered them.
  alternative_readings:
  - For my mouth has commanded, and his Spirit has gathered them.
  - For my mouth has commanded, and my Spirit has gathered them.
  rationale: The Hebrew presents a notable person shift around 'my mouth' and 'his Spirit.' Rather than flattening the clause into a single person without acknowledgment, the main text adopts a coherent third-person reference to the LORD, while preserving the more literal first-person option in a footnote. This avoids importing a doctrinal claim while keeping the verse readable and auditable.
  doctrine_reference: Preserve theological tension rather than resolve it
