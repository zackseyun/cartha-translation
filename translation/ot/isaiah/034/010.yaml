id: ISA.34.10
reference: Isaiah 34:10
source:
  edition: WLC
  text: לַ֤יְלָה וְ/יוֹמָם֙ לֹ֣א תִכְבֶּ֔ה לְ/עוֹלָ֖ם יַעֲלֶ֣ה עֲשָׁנָ֑/הּ מִ/דּ֤וֹר
    לָ/דוֹר֙ תֶּחֱרָ֔ב לְ/נֵ֣צַח נְצָחִ֔ים אֵ֥ין עֹבֵ֖ר בָּֽ/הּ׃
translation:
  text: Night and day it shall not be quenched; its smoke shall go up forever. From
    generation to generation it shall lie waste; forever and ever no one shall pass
    through it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it shall be desolate.' The Hebrew verb can denote being laid waste or
      becoming desolate.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַיְלָה וְיוֹמָם
  chosen: Night and day
  alternatives:
  - By night and by day
  - Day and night
  lexicon: HALOT
  rationale: The pair expresses continual duration. 'Night and day' is idiomatic modern
    English and preserves the merism without unnecessary expansion.
- source_word: לֹא תִכְבֶּה
  chosen: it shall not be quenched
  alternatives:
  - it shall not go out
  - it will not be extinguished
  lexicon: HALOT
  rationale: כבה in the Qal commonly means 'be quenched/go out' of fire. 'Be quenched'
    preserves the passive sense and fits the implied fire from context.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  lexicon: HALOT
  rationale: עוֹלָם here marks enduring duration. 'Forever' is natural contemporary
    English and matches the prophetic rhetoric.
- source_word: יַעֲלֶה עֲשָׁנָהּ
  chosen: its smoke shall go up
  alternatives:
  - its smoke will rise
  - her smoke shall ascend
  lexicon: HALOT
  rationale: עלה with עשן is a standard expression for smoke rising. 'Its' reflects
    the feminine singular referent in idiomatic English for a land/city, avoiding
    awkward personification unless context demands it.
- source_word: מִדּוֹר לָדוֹר
  chosen: From generation to generation
  alternatives:
  - For generation after generation
  - From one generation to another
  lexicon: HALOT
  rationale: This fixed expression denotes continuing duration across successive generations.
    The chosen rendering is standard and clear.
- source_word: תֶּחֱרָב
  chosen: it shall lie waste
  alternatives:
  - it shall be desolate
  - it shall be ruined
  lexicon: HALOT
  rationale: From חרב in this context the sense is becoming desolated/laid waste.
    'Lie waste' captures the resultant state and fits the parallel with the following
    clause about no one passing through.
- source_word: לְנֵצַח נְצָחִים
  chosen: forever and ever
  alternatives:
  - for endless ages
  - for ever and ever
  lexicon: HALOT
  rationale: The doubled expression intensifies perpetuity. 'Forever and ever' conveys
    the emphatic force in natural English.
- source_word: אֵין עֹבֵר בָּהּ
  chosen: no one shall pass through it
  alternatives:
  - none shall pass through it
  - there is no passer-through in it
  lexicon: HALOT
  rationale: The participle עֹבֵר with אֵין expresses the absence of anyone traversing
    the land. 'No one shall pass through it' gives the future/resultative force in
    context.
