theological_decisions:
- issue: Duration language in judgment oracle
  chosen_reading: Render the repeated duration terms straightforwardly as 'forever'
    and 'forever and ever' without softening them.
  alternative_readings:
  - Render as hyperbolic long duration such as 'for ages'
  rationale: The Hebrew stacks עוֹלָם and נֵצַח נְצָחִים for emphatic perpetuity.
    The translation should preserve the force of the prophetic judgment language rather
    than preemptively narrowing it interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
