id: ISA.34.14
reference: Isaiah 34:14
source:
  edition: WLC
  text: וּ/פָגְשׁ֤וּ צִיִּים֙ אֶת אִיִּ֔ים וְ/שָׂעִ֖יר עַל רֵעֵ֣/הוּ יִקְרָ֑א אַךְ
    שָׁם֙ הִרְגִּ֣יעָה לִּילִ֔ית וּ/מָצְאָ֥ה לָ֖/הּ מָנֽוֹחַ־־־׃
translation:
  text: And desert creatures will meet with hyenas, and the goat-demon will call to
    its fellow; indeed, there Lilith will settle down and find a resting place for
    herself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'jackals' for 'hyenas'; the Hebrew animal term is uncertain.
    reason: lexical_alternative
  - marker: b
    text: '''Lilith'' may also be rendered ''night creature'' or ''night monster'';
      some older translations have ''screech owl.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: צִיִּים
  chosen: desert creatures
  alternatives:
  - wild desert animals
  - desert dwellers
  lexicon: HALOT
  rationale: The term denotes creatures associated with wastelands or desert ruins
    rather than a specific species. 'Desert creatures' is natural English and preserves
    the broad, eerie fauna imagery of the judgment oracle.
- source_word: אִיִּים
  chosen: hyenas
  alternatives:
  - jackals
  - howling creatures
  - wild animals of the coastlands/desert
  lexicon: HALOT
  rationale: The exact zoological identification is uncertain. 'Hyenas' is a common
    modern proposal for this desert scavenger term and fits the parallelism with other
    wilderness beings. Because the identification is debated, an alternative is preserved
    in a footnote.
- source_word: שָׂעִיר
  chosen: goat-demon
  alternatives:
  - goat
  - satyr
  lexicon: HALOT
  rationale: In this context of desolation populated by uncanny wilderness beings,
    the word likely carries its cultic/demonic sense rather than merely 'male goat.'
    'Goat-demon' communicates the likely referent without importing Greco-Roman mythology
    as 'satyr' might.
- source_word: עַל רֵעֵהוּ יִקְרָא
  chosen: will call to its fellow
  alternatives:
  - will cry to its companion
  - will call to his mate
  lexicon: HALOT
  rationale: This idiom expresses one creature calling out to another of its kind
    or companion. 'Its fellow' fits the animal/demonic imagery in idiomatic English.
- source_word: אַךְ
  chosen: indeed
  alternatives:
  - surely
  - 'yes'
  lexicon: HALOT
  rationale: Here the particle heightens or marks the statement emphatically. 'Indeed'
    preserves that force in readable modern English.
- source_word: הִרְגִּיעָה
  chosen: will settle down
  alternatives:
  - will repose
  - will rest
  lexicon: HALOT
  rationale: The verb conveys coming to rest or settling. 'Will settle down' reads
    naturally and prepares for the following explicit noun 'resting place.'
- source_word: לִּילִית
  chosen: Lilith
  alternatives:
  - night creature
  - night monster
  - screech owl
  lexicon: HALOT
  rationale: The Hebrew term is rare and contested. Rather than forcing a specific
    zoological identification like 'screech owl,' the transliteration 'Lilith' preserves
    the text's ambiguity and likely mythic resonance. A lexical alternative is preserved
    in a footnote.
- source_word: מָנוֹחַ
  chosen: a resting place
  alternatives:
  - rest
  - a place of repose
  lexicon: HALOT
  rationale: The noun denotes a place or state of rest. 'A resting place' best fits
    the concrete imagery of creatures inhabiting ruins.
