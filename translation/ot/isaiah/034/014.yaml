theological_decisions:
- issue: Whether to demythologize wilderness beings in this judgment oracle
  chosen_reading: Retain the likely supernatural/mythic force in 'goat-demon' and
    transliterated 'Lilith' rather than reducing both to ordinary animals.
  alternative_readings:
  - Render both as ordinary desert animals or birds
  rationale: The verse's imagery intentionally evokes a haunted wasteland populated
    by uncanny beings. Preserving that force best reflects the Hebrew text without
    endorsing a full demonology beyond what the verse states.
  doctrine_reference: Translation philosophy §1, §3
