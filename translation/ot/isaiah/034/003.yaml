theological_decisions:
- issue: Nature of the imagery in divine judgment
  chosen_reading: Retain the graphic, hyperbolic judgment imagery without softening
    it into metaphorical paraphrase.
  alternative_readings:
  - Interpret more dynamically as 'the mountains will be drenched/washed with their
    blood'
  rationale: The Hebrew presents shocking prophetic imagery of slaughter and cosmic-scale
    dissolution. Optimal equivalence here favors preserving the force of the image
    rather than reducing it to a less vivid explanatory paraphrase.
  doctrine_reference: Translation philosophy §1, §3, §6
