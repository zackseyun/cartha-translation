id: ISA.34.3
reference: Isaiah 34:3
source:
  edition: WLC
  text: וְ/חַלְלֵי/הֶ֣ם יֻשְׁלָ֔כוּ וּ/פִגְרֵי/הֶ֖ם יַעֲלֶ֣ה בָאְשָׁ֑/ם וְ/נָמַ֥סּוּ
    הָרִ֖ים מִ/דָּמָֽ/ם׃
translation:
  text: Their slain will be thrown out, and the stench of their corpses will rise;
    the mountains will melt from their blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cast out.' The Hebrew verb can be rendered 'thrown out' or 'cast out.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their foul smell will go up.'
    reason: lexical_alternative
  - marker: c
    text: 'The image is hyperbolic prophetic judgment language: the bloodshed is portrayed
      as so great that even the mountains ''melt'' from their blood.'
    reason: cultural_note
lexical_decisions:
- source_word: חַלְלֵיהֶם
  chosen: their slain
  alternatives:
  - their wounded
  - their dead
  lexicon: HALOT
  rationale: חלל in this nominal form commonly denotes those slain or pierced in battle.
    'Their slain' is concise and preserves the martial/judgment context better than
    the more general 'their dead.'
- source_word: יֻשְׁלָכוּ
  chosen: will be thrown out
  alternatives:
  - will be cast out
  - will be thrown away
  lexicon: HALOT
  rationale: Passive of שלך, 'to throw/cast.' 'Thrown out' captures both the force
    of disposal and the disgrace implied by unburied bodies left exposed.
- source_word: פִגְרֵיהֶם
  chosen: their corpses
  alternatives:
  - their carcasses
  - their bodies
  lexicon: HALOT
  rationale: פגר refers to a dead body/carcass. 'Corpses' is natural modern English
    and preserves the grimness better than the softer 'bodies.'
- source_word: יַעֲלֶה
  chosen: will rise
  alternatives:
  - will go up
  - will ascend
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend.' With the following noun for stench,
    'will rise' is idiomatic English while remaining close to the Hebrew image.
- source_word: בָאְשָׁם
  chosen: the stench of their corpses
  alternatives:
  - their stink
  - their foul smell
  lexicon: HALOT
  rationale: באש denotes bad smell/stench. Rendering it as 'the stench of their corpses'
    makes explicit in English that the odor belongs to the corpses just mentioned,
    matching the Hebrew suffix.
- source_word: וְנָמַסּוּ
  chosen: will melt
  alternatives:
  - will dissolve
  - will flow away
  lexicon: HALOT
  rationale: מסס means melt/dissolve. 'Will melt' preserves the vivid hyperbolic judgment
    imagery without overinterpreting the mechanism.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - the hills
  lexicon: HALOT
  rationale: הרים straightforwardly means 'mountains.' No reason to weaken the scale
    of the image.
- source_word: מִדָּמָם
  chosen: from their blood
  alternatives:
  - because of their blood
  - with their blood
  lexicon: HALOT
  rationale: The preposition מן can denote source or cause. 'From their blood' stays
    formally close while allowing the image that the bloodshed is so great that mountains
    seem to melt from it.
