theological_decisions:
- issue: Interpretation of the first colon's difficult syntax
  chosen_reading: The verse speaks of Edom's nobles in relation to the absence of
    any kingdom to proclaim or establish.
  alternative_readings:
  - Its nobles will call, but there will be no kingdom there.
  - They will call its nobles to the kingdom, but none will be there.
  rationale: The Hebrew is compressed and somewhat difficult, but the broader context
    is the dismantling of Edom's political order. Rendering the line around the absence
    of a kingdom best fits the parallel second colon about princes becoming nothing,
    without importing a more specific political procedure than the text warrants.
  doctrine_reference: Translation philosophy §1, §3, §6
