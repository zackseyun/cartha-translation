id: ISA.34.12
reference: Isaiah 34:12
source:
  edition: WLC
  text: חֹרֶ֥י/הָ וְ/אֵֽין שָׁ֖ם מְלוּכָ֣ה יִקְרָ֑אוּ וְ/כָל שָׂרֶ֖י/הָ יִ֥הְיוּ אָֽפֶס־־׃
translation:
  text: Its nobles—there is no kingdom there to proclaim—and all its princes will
    be nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Its nobles will call, but there will be no kingdom there.' The Hebrew
      of the first line is difficult.
    reason: alternative_reading
lexical_decisions:
- source_word: חֹרֶיהָ
  chosen: its nobles
  alternatives:
  - its noblemen
  - its freeborn ones
  lexicon: HALOT
  rationale: The noun from חֹר likely refers to nobles/freeborn aristocrats rather
    than physical 'holes' or a geographic feature. In context with 'princes' in the
    next colon, a social-political sense fits best. 'Nobles' is natural modern English
    and preserves the class reference.
- source_word: וְאֵין שָׁם
  chosen: there is no ... there
  alternatives:
  - and there is no ... there
  - but there is no ... there
  lexicon: HALOT
  rationale: 'This introduces the reason or circumstance surrounding the nobles''
    action: no kingdom exists there. English smooths the clause while retaining the
    emphatic negation and locative sense.'
- source_word: מְלוּכָה
  chosen: kingdom
  alternatives:
  - royalty
  - kingship
  - monarchy
  lexicon: HALOT
  rationale: The noun denotes royal rule or kingdom. 'Kingdom' works well in context
    because the point is the absence of any functioning realm or monarchy to be established/proclaimed.
- source_word: יִקְרָאוּ
  chosen: to proclaim
  alternatives:
  - they will call
  - they will summon
  - they will name
  lexicon: HALOT
  rationale: קרא commonly means 'call,' but here the object 'kingdom' makes a more
    idiomatic sense of proclaiming or calling for a kingdom/kingly rule. The infinitive-like
    English construction after 'there is no kingdom there' conveys the Hebrew finite
    verb in context.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - and every
  lexicon: HALOT
  rationale: Straightforward distributive/collective conjunction and quantifier.
- source_word: שָׂרֶיהָ
  chosen: its princes
  alternatives:
  - its officials
  - its rulers
  lexicon: HALOT
  rationale: שׂר denotes princes, officials, or rulers. Given the parallel with 'nobles,'
    'princes' preserves the elevated political register of the judgment oracle.
- source_word: יִהְיוּ
  chosen: will be
  alternatives:
  - shall become
  lexicon: HALOT
  rationale: Simple future/copular sense.
- source_word: אָפֶס
  chosen: nothing
  alternatives:
  - nonexistent
  - ended
  - as nothing
  lexicon: HALOT
  rationale: The noun conveys nonexistence or nothingness. 'Will be nothing' is idiomatic
    and captures the total collapse of Edom's ruling class.
