id: ISA.34.8
reference: Isaiah 34:8
source:
  edition: WLC
  text: כִּ֛י י֥וֹם נָקָ֖ם לַֽ/יהוָ֑ה שְׁנַ֥ת שִׁלּוּמִ֖ים לְ/רִ֥יב צִיּֽוֹן׃
translation:
  text: For Yahweh has a day of vengeance, a year of recompense for Zion’s cause.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For there is a day of vengeance for the LORD, a year of recompense for Zion’s lawsuit/case.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding judgment language; 'For' fits the explanatory force in context better than the more ambiguous 'Indeed'.
- source_word: יוֹם
  chosen: day
  lexicon: HALOT
  rationale: Straightforward temporal noun; retained literally as 'day' in the idiom 'day of vengeance.'
- source_word: נָקָם
  chosen: vengeance
  alternatives:
  - avenging
  - retribution
  lexicon: HALOT
  rationale: The noun denotes punitive repayment against wrong; 'vengeance' is the most natural collocation with 'day' in English and preserves the judicial force of the Hebrew.
- source_word: לַיהוָה
  chosen: the LORD has
  alternatives:
  - for the LORD
  - belongs to the LORD
  lexicon: HALOT
  rationale: 'The preposition ל can mark possession or relation here. English idiom is improved by making the possessive sense explicit: ''the LORD has a day of vengeance.'' The divine name is rendered ''the LORD'' per doctrine for יְהוָה.'
- source_word: שְׁנַת
  chosen: a year
  alternatives:
  - the year
  - year
  lexicon: HALOT
  rationale: Construct form of 'year.' Rendered with the indefinite article in English to match the parallel expression with 'a day' and to read naturally.
- source_word: שִׁלּוּמִים
  chosen: recompense
  alternatives:
  - repayments
  - requital
  lexicon: HALOT
  rationale: Plural abstract/intensive noun from the root for repayment or requital. 'Recompense' communicates judicial repayment in idiomatic modern English without sounding overly archaic.
- source_word: לְרִיב
  chosen: for ... cause
  alternatives:
  - for the dispute of
  - for the lawsuit of
  - for the contention of
  lexicon: HALOT
  rationale: רִיב can denote a legal dispute, case, or cause. 'Cause' best captures the forensic sense in accessible English, especially with Zion as the injured party whose case the LORD vindicates.
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Proper name transliterated per translation philosophy. The possessive construction 'Zion’s cause' expresses the Hebrew compactly and naturally.
