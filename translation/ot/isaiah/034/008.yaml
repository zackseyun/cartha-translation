theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of לַיהוָה in the clause
  chosen_reading: 'possessive/relational: ''the LORD has a day of vengeance'''
  alternative_readings:
  - '''for the LORD is a day of vengeance'''
  - '''a day of vengeance belongs to the LORD'''
  rationale: The Hebrew preposition ל allows a possessive or relational nuance. In English, making the possession explicit yields a clear and idiomatic line while preserving the sense that this day is the LORD's appointed time of judgment.
