theological_decisions:
- issue: Personification of the judged land/city by feminine suffixes
  chosen_reading: Retain feminine possessive language as 'her' throughout
  alternative_readings:
  - use 'its' for impersonal land
  rationale: The Hebrew repeatedly uses 3fs suffixes, personifying the land/city/nation
    under judgment. Rendering with 'her' preserves the prophetic personification and
    literary force better than flattening to 'its.'
  doctrine_reference: Translation philosophy §5 (consistency) and §6 (readable modern
    English)
