id: ISA.34.9
reference: Isaiah 34:9
source:
  edition: WLC
  text: וְ/נֶהֶפְכ֤וּ נְחָלֶ֨י/הָ֙ לְ/זֶ֔פֶת וַ/עֲפָרָ֖/הּ לְ/גָפְרִ֑ית וְ/הָיְתָ֣ה
    אַרְצָ֔/הּ לְ/זֶ֖פֶת בֹּעֵרָֽה׃
translation:
  text: Her wadis will be turned into pitch, and her dust into sulfur; her land will
    become burning pitch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'streams.' Hebrew נְחָלִים can refer to wadis, streambeds, or torrents.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional: ''brimstone.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶהֶפְכוּ
  chosen: will be turned
  alternatives:
  - will be changed
  - will be transformed
  lexicon: HALOT
  rationale: 'Niphal perfect of הפך in prophetic discourse commonly has a future/resultative
    sense: ''be turned/changed into.'' ''Will be turned'' is natural English and preserves
    the passive transformation imagery.'
- source_word: נְחָלֶיהָ
  chosen: her wadis
  alternatives:
  - her streams
  - her valleys
  - her riverbeds
  lexicon: HALOT
  rationale: נחל can denote a wadi, torrent-bed, or stream. In an Edom/desert context,
    'wadis' best captures the geographic sense without implying perennial rivers.
    A more familiar alternative is preserved in a footnote.
- source_word: זֶפֶת
  chosen: pitch
  alternatives:
  - bitumen
  - tar
  lexicon: HALOT
  rationale: זפת denotes pitch/bitumen. 'Pitch' is standard, vivid, and accessible
    modern English; 'bitumen' is more technical and 'tar' may be too specific.
- source_word: עֲפָרָהּ
  chosen: her dust
  alternatives:
  - her soil
  - her loose earth
  lexicon: HALOT
  rationale: עפר commonly means dust, dry earth, or loose soil. 'Dust' preserves the
    stark, desolate imagery and parallels the transformation of the land's very substance.
- source_word: גָפְרִית
  chosen: sulfur
  alternatives:
  - brimstone
  lexicon: HALOT
  rationale: גפרית is sulfur/brimstone. 'Sulfur' is clearer in contemporary English,
    while 'brimstone' is traditional but archaic-leaning; the traditional alternative
    is worth preserving in a footnote because of its biblical resonance.
- source_word: אַרְצָהּ
  chosen: her land
  alternatives:
  - her earth
  - her country
  lexicon: HALOT
  rationale: ארץ here refers to the territory/land of the judged nation. 'Her land'
    is the most natural and contextually precise rendering.
- source_word: בֹּעֵרָה
  chosen: burning
  alternatives:
  - ablaze
  - burning up
  lexicon: HALOT
  rationale: 'Qal participle feminine singular modifying זפת: ''burning pitch.'' ''Burning''
    is straightforward and keeps the participial descriptive force without overinterpreting
    duration or intensity.'
