id: ISA.11.6
reference: Isaiah 11:6
source:
  edition: WLC
  text: וְ/גָ֤ר זְאֵב֙ עִם כֶּ֔בֶשׂ וְ/נָמֵ֖ר עִם גְּדִ֣י יִרְבָּ֑ץ וְ/עֵ֨גֶל וּ/כְפִ֤יר
    וּ/מְרִיא֙ יַחְדָּ֔ו וְ/נַ֥עַר קָטֹ֖ן נֹהֵ֥ג בָּֽ/ם־־׃
translation:
  text: And the wolf will dwell with the lamb, and the leopard will lie down with
    the young goat; and the calf and the young lion and the fattened calf will be
    together, and a little boy will lead them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wolf will sojourn with the lamb.'
    reason: lexical_alternative
  - marker: b
    text: Or 'kid' for 'young goat.'
    reason: lexical_alternative
  - marker: c
    text: Or 'lion cub' for 'young lion.'
    reason: lexical_alternative
  - marker: d
    text: Or 'a small child will guide them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגָר
  chosen: will dwell
  alternatives:
  - shall sojourn
  - will live
  lexicon: HALOT
  rationale: From גור in the qal, conveying dwelling/sojourning. 'Will dwell' is natural
    English and preserves the image of peaceful cohabitation better than the more
    temporary-sounding 'sojourn.'
- source_word: זְאֵב
  chosen: wolf
  lexicon: HALOT
  rationale: Standard rendering for the animal term.
- source_word: עִם
  chosen: with
  alternatives:
  - beside
  lexicon: HALOT
  rationale: The preposition marks association/proximity; 'with' is the plain and
    idiomatic choice.
- source_word: כֶּבֶשׂ
  chosen: lamb
  alternatives:
  - sheep
  lexicon: HALOT
  rationale: In this poetic pairing, 'lamb' best captures the vulnerable prey-animal
    contrast traditionally and contextually intended.
- source_word: וְנָמֵר
  chosen: leopard
  lexicon: HALOT
  rationale: Standard rendering of the animal name.
- source_word: גְּדִי
  chosen: young goat
  alternatives:
  - kid
  lexicon: HALOT
  rationale: Refers to a young goat. 'Young goat' is clearer for modern readers than
    'kid,' which can be ambiguous in English.
- source_word: יִרְבָּץ
  chosen: will lie down
  alternatives:
  - will crouch
  lexicon: HALOT
  rationale: From רבץ, often used of animals lying down or resting. 'Will lie down'
    fits the peaceful imagery better than the more predatory-sounding 'crouch.'
- source_word: וְעֵגֶל
  chosen: the calf
  lexicon: HALOT
  rationale: Standard rendering for a young bovine.
- source_word: וּכְפִיר
  chosen: the young lion
  alternatives:
  - lion cub
  lexicon: HALOT
  rationale: כפיר denotes a young lion. 'Young lion' is a conventional and dignified
    rendering in prophetic poetry.
- source_word: וּמְרִיא
  chosen: the fattened calf
  alternatives:
  - stall-fed calf
  - fatling
  lexicon: HALOT
  rationale: The noun denotes a fattened or well-fed animal. 'Fattened calf' is clear
    modern English and preserves the sense of domesticated abundance.
- source_word: יַחְדָּו
  chosen: will be together
  alternatives:
  - together
  lexicon: HALOT
  rationale: Adverb meaning 'together.' Rendering it with 'will be together' makes
    a complete and natural English clause from the verbless Hebrew sequence.
- source_word: וְנַעַר קָטֹן
  chosen: a little boy
  alternatives:
  - a small child
  - a young boy
  lexicon: HALOT
  rationale: נַעַר is a boy/youth, and קָטֹן marks smallness/youngness. 'Little boy'
    preserves the masculine singular and the vivid image better than the more generic
    'child,' in keeping with the gender-accurate philosophy.
- source_word: נֹהֵג
  chosen: will lead
  alternatives:
  - will drive
  - will guide
  lexicon: HALOT
  rationale: From נהג, to lead/drive. In this pastoral-animal context, 'lead' communicates
    direction without implying harshness, fitting the peaceable scene.
- source_word: בָּם
  chosen: them
  alternatives:
  - among them
  lexicon: HALOT
  rationale: The preposition with pronominal suffix can suggest movement among or
    leadership of them; in idiomatic English with נהג, 'lead them' is the most natural
    rendering.
