theological_decisions:
- issue: Nature of the imagery in the peaceable kingdom
  chosen_reading: Render the animal pairings straightforwardly as prophetic-poetic
    imagery without interpreting them in the translation as either purely literal
    zoological transformation or merely symbolic social reconciliation.
  alternative_readings:
  - Strictly literal eschatological animal peace
  - Entirely metaphorical depiction of human political peace
  rationale: The Hebrew presents concrete animal imagery. The translation should preserve
    that imagery and not resolve the interpretive question in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
