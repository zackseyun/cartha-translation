theological_decisions:
- issue: Gendered participle in וּנְפֻצוֹת יְהוּדָה
  chosen_reading: Preserve the feminine grammatical form in English as 'the scattered
    women of Judah.'
  alternative_readings:
  - the dispersed of Judah
  - the scattered of Judah
  - those of Judah who were scattered
  rationale: The translation philosophy calls for gender-accurate rather than gender-neutral
    renderings where the source grammar is gendered. Here the feminine plural form
    is explicit. The phrase likely functions corporately for Judah, but the grammar
    should not be erased without documentation.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
- issue: Scope of הָאָרֶץ
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: In this restoration oracle with nations in view and a worldwide regathering
    image, 'earth' better fits the scope than the more local 'land.' The idiom 'four
    corners of the earth' is also the most natural equivalent in English.
