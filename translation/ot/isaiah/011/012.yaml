id: ISA.11.12
reference: Isaiah 11:12
source:
  edition: WLC
  text: וְ/נָשָׂ֥א נֵס֙ לַ/גּוֹיִ֔ם וְ/אָסַ֖ף נִדְחֵ֣י יִשְׂרָאֵ֑ל וּ/נְפֻצ֤וֹת יְהוּדָה֙
    יְקַבֵּ֔ץ מֵ/אַרְבַּ֖ע כַּנְפ֥וֹת הָ/אָֽרֶץ׃
translation:
  text: He will raise a banner for the nations, and gather the banished of Israel;
    he will assemble the scattered women of Judah from the four corners of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the outcasts of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the scattered women of Judah'; the feminine form may reflect grammatical
      agreement with Judah as a collective, so some translations render more generally,
      'the dispersed of Judah.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'from the four wings of the earth,' an idiom for the earth's farthest
      extremities.
    reason: cultural_note
lexical_decisions:
- source_word: וְנָשָׂא
  chosen: he will raise
  alternatives:
  - he will lift up
  - he will bear
  lexicon: HALOT
  rationale: נשא commonly means 'lift, raise, carry.' With נֵס ('banner/signal'),
    the idiom is to raise or lift up a signal. 'Raise' is natural modern English and
    preserves the public, visible action.
- source_word: נֵס
  chosen: banner
  alternatives:
  - signal
  - standard
  lexicon: HALOT
  rationale: נֵס denotes a raised signal or standard. 'Banner' communicates a visible
    rallying sign in readable English. 'Signal' is possible, but 'banner' better fits
    the gathering imagery in context.
- source_word: לַגּוֹיִם
  chosen: for the nations
  alternatives:
  - to the nations
  - for the peoples
  lexicon: HALOT
  rationale: גּוֹיִם ordinarily means 'nations.' The preposition ל can be rendered
    'for' or 'to'; 'for the nations' fits the sense of a banner set up as a summons
    visible to them.
- source_word: וְאָסַף
  chosen: and gather
  alternatives:
  - and collect
  - and bring in
  lexicon: HALOT
  rationale: אָסַף in restoration contexts commonly means gather in. 'Gather' is idiomatic
    and preserves the regathering motif.
- source_word: נִדְחֵי יִשְׂרָאֵל
  chosen: the banished of Israel
  alternatives:
  - the outcasts of Israel
  - the dispersed of Israel
  lexicon: HALOT
  rationale: The passive participial form from נדח conveys those driven away or banished.
    'Banished' preserves the force of expulsion more clearly than the more traditional
    but slightly vaguer 'outcasts.'
- source_word: וּנְפֻצוֹת יְהוּדָה
  chosen: the scattered women of Judah
  alternatives:
  - the dispersed of Judah
  - those of Judah who were scattered
  lexicon: HALOT
  rationale: נְפֻצוֹת is morphologically feminine plural. Because the paired collective
    names Israel and Judah are grammatically treated differently here, the translation
    preserves the gendered form rather than flattening it. 'Scattered women of Judah'
    is formally accurate, though the referent is the people of Judah corporately.
- source_word: יְקַבֵּץ
  chosen: he will assemble
  alternatives:
  - he will gather
  - he will collect
  lexicon: HALOT
  rationale: קבץ overlaps with אסף but can be varied in English for readability. 'Assemble'
    preserves the sense of bringing together while avoiding awkward repetition; the
    semantic overlap is documented here as a justified exception to strict consistency.
- source_word: מֵאַרְבַּע כַּנְפוֹת הָאָרֶץ
  chosen: from the four corners of the earth
  alternatives:
  - from the four wings of the earth
  - from the four extremities of the land
  lexicon: HALOT
  rationale: כַּנְפוֹת literally means 'wings' or 'edges/corners.' The idiom 'four
    corners of the earth' is well established and accurately conveys the sense of
    the earth's extremities without implying a cosmological claim.
