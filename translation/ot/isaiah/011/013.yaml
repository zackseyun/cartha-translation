id: ISA.11.13
reference: Isaiah 11:13
source:
  edition: WLC
  text: וְ/סָ֨רָה֙ קִנְאַ֣ת אֶפְרַ֔יִם וְ/צֹרְרֵ֥י יְהוּדָ֖ה יִכָּרֵ֑תוּ אֶפְרַ֨יִם֙
    לֹֽא יְקַנֵּ֣א אֶת יְהוּדָ֔ה וִֽ/יהוּדָ֖ה לֹֽא יָצֹ֥ר אֶת אֶפְרָֽיִם־־־־׃
translation:
  text: The jealousy of Ephraim will depart, and the adversaries of Judah will be
    cut off; Ephraim will not be jealous of Judah, and Judah will not harass Ephraim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'envy' for 'jealousy' in both occurrences involving Ephraim; the Hebrew
      קנא/קנאה can denote jealous rivalry or envy in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'Judah will not be hostile to Ephraim' or 'will not oppress Ephraim';
      the Hebrew verb can convey enmity, harassment, or oppression.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָרָה
  chosen: will depart
  alternatives:
  - will turn aside
  - will be removed
  - will cease
  lexicon: HALOT
  rationale: 'From סור, here with קִנְאַת as subject: the jealousy/envious rivalry
    is pictured as departing or turning away. ''Will depart'' is natural English and
    preserves the image better than the more abstract ''will cease.'''
- source_word: קִנְאַת
  chosen: the jealousy
  alternatives:
  - envy
  - zeal
  lexicon: HALOT
  rationale: קִנְאָה can denote zeal or jealousy; in this context of inter-tribal
    rivalry between Ephraim and Judah, 'jealousy' best fits. The construct with Ephraim
    is rendered 'the jealousy of Ephraim,' i.e., Ephraim's jealous rivalry.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  rationale: Proper name transliterated per translation philosophy. In context it
    stands for the northern kingdom/tribal entity, but the text uses the name directly,
    so the transliteration is retained.
- source_word: וְצֹרְרֵי יְהוּדָה
  chosen: the adversaries of Judah
  alternatives:
  - those hostile to Judah
  - Judah's foes
  - the oppressors of Judah
  lexicon: HALOT
  rationale: From צרר, those acting as enemies or hostile opponents. 'Adversaries'
    is broad enough to cover hostility without over-specifying military oppression.
    The construct is preserved as 'of Judah.'
- source_word: יִכָּרֵתוּ
  chosen: will be cut off
  alternatives:
  - will be destroyed
  - will be eliminated
  lexicon: HALOT
  rationale: Nifal of כרת commonly means 'be cut off.' This is a standard and sufficiently
    transparent English rendering that preserves the idiom's force without unnecessary
    paraphrase.
- source_word: לֹא יְקַנֵּא אֶת יְהוּדָה
  chosen: will not be jealous of Judah
  alternatives:
  - will not envy Judah
  - will not be zealous against Judah
  lexicon: HALOT
  rationale: The piel of קנא here continues the idea of jealous rivalry. 'Be jealous
    of' is the most direct and contextually coherent rendering in parallel with the
    opening clause.
- source_word: לֹא יָצֹר אֶת אֶפְרָיִם
  chosen: will not harass Ephraim
  alternatives:
  - will not oppress Ephraim
  - will not be hostile to Ephraim
  - will not attack Ephraim
  lexicon: HALOT
  rationale: From צור/צרר in a verbal form meaning to treat as an enemy, besiege,
    or harass. Because the parallel is about internal hostility rather than necessarily
    formal warfare, 'harass' captures active antagonism without narrowing it to siege
    or battle.
- source_word: וִיהוּדָה
  chosen: and Judah
  rationale: Proper name transliterated. The conjunction is retained to preserve the
    balanced parallelism between Ephraim and Judah.
