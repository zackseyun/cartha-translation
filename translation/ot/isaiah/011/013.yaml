theological_decisions:
- issue: Referent of Ephraim and Judah
  chosen_reading: Retain the tribal/national names 'Ephraim' and 'Judah' rather than
    interpretively expanding them to 'the northern kingdom' and 'the southern kingdom.'
  alternative_readings:
  - the northern kingdom ... the southern kingdom
  - Israel ... Judah
  rationale: The Hebrew text names Ephraim and Judah directly. Keeping the names preserves
    the poetic and historical texture while allowing readers to infer the broader
    corporate referents from context.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    original-language primacy over translation tradition.'
