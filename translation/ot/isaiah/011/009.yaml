theological_decisions:
- issue: Scope of the peace oracle
  chosen_reading: universal scope implied by 'the earth' rather than merely the land of Israel
  alternative_readings:
  - 'localized scope: ''the land'''
  rationale: The verse grounds the cessation of harm in a fullness of knowledge extending to 'the earth,' and the imagery is expansive rather than merely territorial. This is a contextual judgment, not a doctrinal imposition.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
