id: ISA.11.9
reference: Isaiah 11:9
source:
  edition: WLC
  text: לֹֽא יָרֵ֥עוּ וְ/לֹֽא יַשְׁחִ֖יתוּ בְּ/כָל הַ֣ר קָדְשִׁ֑/י כִּֽי מָלְאָ֣ה הָ/אָ֗רֶץ דֵּעָה֙ אֶת יְהוָ֔ה כַּ/מַּ֖יִם לַ/יָּ֥ם מְכַסִּֽים־־־־־׃פ
translation:
  text: They will not do harm or destroy in all my holy mountain, for the earth will be full of the knowledge of Yahweh as the waters cover the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land will be full of the knowledge of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָרֵעוּ
  chosen: do harm
  alternatives:
  - act wickedly
  - hurt
  - do evil
  lexicon: HALOT
  rationale: Hiphil of רעע here is best rendered in the concrete sense of causing harm/injury, especially in parallel with 'bring destruction.' 'Do evil' is possible but too broad in this peace-oracle context.
- source_word: יַשְׁחִיתוּ
  chosen: bring destruction
  alternatives:
  - destroy
  - ruin
  - corrupt
  lexicon: HALOT
  rationale: The Hiphil of שׁחת commonly means to destroy or ruin. 'Bring destruction' preserves the causative nuance and pairs naturally with 'do harm.'
- source_word: בְּכָל הַר קָדְשִׁי
  chosen: on all my holy mountain
  alternatives:
  - in all my holy mountain
  - throughout my holy mountain
  lexicon: HALOT
  rationale: The preposition ב can be rendered 'in/on' depending on English idiom. With 'mountain,' 'on' is the most natural English expression while retaining the locative sense. 'All' is kept to reflect כָל.
- source_word: מָלְאָה
  chosen: will be full
  alternatives:
  - is full
  - will be filled
  lexicon: HALOT
  rationale: The qatal may be rendered futurally in prophetic discourse. 'Will be full' fits the eschatological context and avoids implying a completed present state.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Although ארץ can mean 'land,' the scope here is universal rather than merely local, especially with the cosmic image that follows. 'The earth' best fits the context.
- source_word: דֵּעָה אֶת יְהוָה
  chosen: the knowledge of the LORD
  alternatives:
  - knowledge of Yahweh
  - knowledge about the LORD
  lexicon: HALOT
  rationale: The construct-like phrase denotes knowledge directed toward YHWH, not merely information about him. 'The LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כַּמַּיִם לַיָּם מְכַסִּים
  chosen: as the waters cover the sea
  alternatives:
  - as water covers the sea
  - like the waters covering the sea
  lexicon: HALOT
  rationale: This keeps the familiar simile while remaining close to the Hebrew plural 'waters' and participle 'cover.' The present-tense English idiom works well for the comparative clause.
