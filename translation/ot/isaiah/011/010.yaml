theological_decisions:
- issue: Messianic referent of 'the root of Jesse'
  chosen_reading: Retain the expression as 'the root of Jesse' without making the
    messianic identification explicit in the main text.
  alternative_readings:
  - Interpret explicitly as the Messiah
  - Interpret more narrowly as the Davidic dynasty/personified royal line
  rationale: Within Isaiah 11 and Christian canonical reading, the phrase is strongly
    messianic, but the translation should not import an explicit identification beyond
    the Hebrew wording. The metaphor itself is preserved, allowing the text's theological
    force to stand without paraphrastic expansion.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Sense of מְנֻחָתוֹ כָּבוֹד
  chosen_reading: Render as 'his resting place will be glory.'
  alternative_readings:
  - his rest will be glorious
  - his resting place will be glorious
  rationale: The Hebrew is compressed and can be construed with כבוד as predicate
    noun ('will be glory') or adjectivally in English ('will be glorious'). The chosen
    rendering stays closer to the Hebrew nominal expression and preserves the theological
    richness of כבוד without reducing it to a mere adjective.
  doctrine_reference: 'Translation philosophy #3 and #5'
