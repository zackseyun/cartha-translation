id: ISA.11.10
reference: Isaiah 11:10
source:
  edition: WLC
  text: וְ/הָיָה֙ בַּ/יּ֣וֹם הַ/ה֔וּא שֹׁ֣רֶשׁ יִשַׁ֗י אֲשֶׁ֤ר עֹמֵד֙ לְ/נֵ֣ס עַמִּ֔ים
    אֵלָ֖י/ו גּוֹיִ֣ם יִדְרֹ֑שׁוּ וְ/הָיְתָ֥ה מְנֻחָת֖/וֹ כָּבֽוֹד׃פ
translation:
  text: And in that day the root of Jesse, who stands as a banner for the peoples—to
    him the nations will seek, and his resting place will be glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a signal for the peoples'; Hebrew נֵס refers to a raised standard
      or rallying sign.
    reason: lexical_alternative
  - marker: b
    text: Or 'the nations will inquire of him' or 'consult him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his rest will be glorious' / 'his resting place will be glorious.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will be
  alternatives:
  - And ... shall be
  - And it will happen
  lexicon: HALOT
  rationale: Uses a natural English future/existential opening for the prophetic perfect
    construction, preserving the forward-looking sense without archaic 'shall'.
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula; 'in that day' is idiomatic and preserves
    the eschatological resonance common in Isaiah.
- source_word: שֹׁרֶשׁ יִשַׁי
  chosen: the root of Jesse
  alternatives:
  - the rootstock of Jesse
  - the root from Jesse
  lexicon: HALOT
  rationale: Retains the metaphor and its intertextual force within Isaiah 11. 'Root
    of Jesse' is the most transparent and established rendering of the Hebrew construct.
- source_word: עֹמֵד
  chosen: stands
  alternatives:
  - is standing
  - arises
  lexicon: HALOT
  rationale: Simple present participial sense fits English style and conveys an ongoing,
    stative posture.
- source_word: לְנֵס עַמִּים
  chosen: as a banner for the peoples
  alternatives:
  - as a signal for the peoples
  - as an ensign for the peoples
  lexicon: HALOT
  rationale: נֵס denotes a raised signal/banner. 'Banner' is readable modern English
    and preserves the public rallying image better than the archaic 'ensign.' 'Peoples'
    is kept for עַמִּים to distinguish it from גּוֹיִם later in the verse while still
    reflecting collective human groups.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - for him
  - toward him
  lexicon: HALOT
  rationale: The preposition marks direction toward the figure; 'to him' is the most
    direct and idiomatic rendering with the following verb.
- source_word: גּוֹיִם
  chosen: the nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: In Isaiah this commonly denotes the nations outside Israel as collective
    peoples. 'The nations' is the clearest default in English; 'Gentiles' is possible
    but more interpretive and more at home in NT contexts.
- source_word: יִדְרֹשׁוּ
  chosen: will seek
  alternatives:
  - will inquire of
  - will consult
  - will resort to
  lexicon: HALOT
  rationale: דרשׁ can mean seek, inquire, or consult. Here, with אֵלָיו and the international
    pilgrimage/rallying context, 'will seek' best captures the movement toward and
    appeal to the Davidic figure without over-specifying the manner.
- source_word: וְהָיְתָה
  chosen: and ... will be
  alternatives:
  - and ... shall be
  - and it became
  lexicon: HALOT
  rationale: Continues the prophetic future sense in smooth English.
- source_word: מְנֻחָתוֹ
  chosen: his resting place
  alternatives:
  - his rest
  - his dwelling place
  - his repose
  lexicon: HALOT
  rationale: The noun can denote rest or resting place. Because it is modified by
    'his' and followed by a predicate noun, a locative nuance fits well here, likely
    referring to the place associated with his settled reign/presence. This also avoids
    flattening the image into an abstract state only.
- source_word: כָּבוֹד
  chosen: glory
  alternatives:
  - glorious
  - honor
  lexicon: HALOT
  rationale: As a predicate noun, 'glory' is a close rendering of כבוד. An adjectival
    rendering ('glorious') is possible in English, but the noun better reflects the
    Hebrew form and preserves the weight of the term.
