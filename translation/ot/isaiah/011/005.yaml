theological_decisions:
- issue: Rendering the paired virtues in a messianic prophecy
  chosen_reading: Use 'Righteousness' and 'faithfulness' as qualities characterizing
    the promised ruler without importing later doctrinal formulation into the verse
    itself.
  alternative_readings:
  - Use 'justice' for צֶדֶק
  - Use 'truth' for אֱמוּנָה
  rationale: The verse poetically depicts the Messiah's moral character as clothing.
    The translation should preserve the imagery and ethical force without over-specifying
    christological or systematic implications beyond the Hebrew text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
