id: ISA.11.5
reference: Isaiah 11:5
source:
  edition: WLC
  text: וְ/הָ֥יָה צֶ֖דֶק אֵז֣וֹר מָתְנָ֑י/ו וְ/הָ/אֱמוּנָ֖ה אֵז֥וֹר חֲלָצָֽי/ו׃
translation:
  text: Righteousness will be the belt of his waist, and faithfulness the belt of
    his loins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "justice" for "Righteousness."
    reason: lexical_alternative
  - marker: b
    text: Or "fidelity" for "faithfulness."
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: will be
  alternatives:
  - shall be
  - and will be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly
    carries a future sense in English. The conjunction is not separately represented
    because English reads naturally without repeating 'and' at the head of the clause.
- source_word: צֶדֶק
  chosen: Righteousness
  alternatives:
  - justice
  - rightness
  lexicon: HALOT
  rationale: צֶדֶק can denote righteousness or justice. In this royal-messianic context
    describing the character of the coming ruler, 'righteousness' best captures the
    moral quality while preserving the close conceptual link with the preceding context.
- source_word: אֵזוֹר
  chosen: belt
  alternatives:
  - girdle
  - waistband
  - sash
  lexicon: HALOT
  rationale: A concrete term for something bound around the body. 'Belt' is clear
    modern English and avoids the archaic feel of 'girdle' while remaining more literal
    than a figurative paraphrase.
- source_word: מָתְנָיו
  chosen: his waist
  alternatives:
  - his loins
  - his hips
  lexicon: HALOT
  rationale: מָתְנַיִם refers to the waist/loins region. 'Waist' is chosen here for
    natural English and to allow the second body-term to retain distinct wording.
- source_word: וְהָאֱמוּנָה
  chosen: and faithfulness
  alternatives:
  - and fidelity
  - and steadfastness
  - and truthfulness
  lexicon: HALOT
  rationale: אֱמוּנָה often denotes firmness, faithfulness, or fidelity. Here it describes
    the dependable constancy of the ruler's character, so 'faithfulness' is the most
    idiomatic and semantically fitting choice.
- source_word: אֵזוֹר
  chosen: the belt of
  alternatives:
  - the sash of
  - a belt for
  lexicon: HALOT
  rationale: Repeated to preserve the Hebrew parallelism. The article is supplied
    in English for smoothness in the predicate construction.
- source_word: חֲלָצָיו
  chosen: his loins
  alternatives:
  - his waist
  - his hips
  - his sides
  lexicon: HALOT
  rationale: חֲלָצַיִם refers to the loins/hips. 'Loins' preserves the bodily imagery
    and keeps the poetic parallel distinct from 'waist' in the first colon.
