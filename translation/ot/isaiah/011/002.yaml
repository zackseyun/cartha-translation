id: ISA.11.2
reference: Isaiah 11:2
source:
  edition: WLC
  text: וְ/נָחָ֥ה עָלָ֖י/ו ר֣וּחַ יְהוָ֑ה ר֧וּחַ חָכְמָ֣ה וּ/בִינָ֗ה ר֤וּחַ עֵצָה֙ וּ/גְבוּרָ֔ה ר֥וּחַ דַּ֖עַת וְ/יִרְאַ֥ת יְהוָֽה׃
translation:
  text: 'And the Spirit of Yahweh will rest on him: a spirit of wisdom and understanding, a spirit of counsel and might, a spirit of knowledge and the fear of Yahweh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats ''spirit'' three times after ''the Spirit of the LORD,'' emphasizing the qualities or operations of that one Spirit: wisdom and understanding, counsel and might, knowledge and the fear of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'reverence for the LORD' for 'the fear of the LORD'; the Hebrew expression includes reverent awe, not mere terror.
    reason: lexical_alternative
  - marker: c
    text: '''the LORD'' renders the divine name YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָחָה
  chosen: will rest
  alternatives:
  - shall rest
  - will settle upon
  lexicon: HALOT
  rationale: The verb נוח in this stem conveys coming to rest or settling. Future English ('will rest') fits the prophetic context and is natural modern English. 'Rest' also preserves the durative sense of abiding presence better than a more temporary verb like 'come upon'.
- source_word: עָלָיו
  chosen: on him
  alternatives:
  - upon him
  lexicon: HALOT
  rationale: The preposition עַל with pronominal suffix is straightforwardly locative/directional here. 'On him' is idiomatic modern English; 'upon him' is more formal but not necessary.
- source_word: רוּחַ יְהוָה
  chosen: the Spirit of the LORD
  alternatives:
  - the רוח of the LORD
  - the Spirit of Yahweh
  lexicon: HALOT
  rationale: רוּחַ here denotes God's Spirit, not merely disposition or wind, in a royal-messianic empowerment context. The divine name יְהוָה follows the doctrinal default 'the LORD' rather than 'Yahweh.' Capitalizing 'Spirit' reflects the referent as God's Spirit in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: רוּחַ חָכְמָה וּבִינָה
  chosen: a spirit of wisdom and understanding
  alternatives:
  - the spirit of wisdom and understanding
  - a Spirit of wisdom and understanding
  lexicon: HALOT
  rationale: The repeated רוּחַ phrases are appositional expansions of 'the Spirit of the LORD,' describing the qualities or operations of that Spirit. Lowercase 'spirit' in the repeated phrases helps English readers hear them as descriptive appositions rather than separate spirits, while preserving the Hebrew repetition with 'a spirit of...'.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for practical and godly wisdom; no contextual pressure suggests a different gloss.
- source_word: בִּינָה
  chosen: understanding
  alternatives:
  - discernment
  lexicon: HALOT
  rationale: בינה commonly denotes understanding or discernment. 'Understanding' is the more direct and traditional equivalent here, pairing naturally with 'wisdom'.
- source_word: רוּחַ עֵצָה וּגְבוּרָה
  chosen: a spirit of counsel and might
  alternatives:
  - a spirit of counsel and strength
  - a spirit of strategy and power
  lexicon: HALOT
  rationale: עצה is well rendered 'counsel' in royal/governing contexts. גבורה denotes strength, might, or valor; 'might' is concise and preserves the elevated register of the poetic list.
- source_word: עֵצָה
  chosen: counsel
  alternatives:
  - advice
  - purpose
  lexicon: HALOT
  rationale: In this context of ideal kingship, עצה suggests wise counsel or sound judgment rather than casual advice.
- source_word: גְבוּרָה
  chosen: might
  alternatives:
  - strength
  - power
  - valor
  lexicon: HALOT
  rationale: גבורה can denote strength, might, or heroic power. 'Might' best matches the poetic pairing with 'counsel' and preserves the dignified tone.
- source_word: רוּחַ דַּעַת וְיִרְאַת יְהוָה
  chosen: a spirit of knowledge and the fear of the LORD
  alternatives:
  - a spirit of knowledge and fear of the LORD
  - a spirit of knowledge and reverence for the LORD
  lexicon: HALOT
  rationale: דעת is straightforwardly 'knowledge.' יראת יהוה is a key covenantal phrase often rendered 'the fear of the LORD'; retaining it preserves biblical-theological continuity and avoids flattening reverent awe into mere respect.
- source_word: דַּעַת
  chosen: knowledge
  lexicon: HALOT
  rationale: Standard rendering; in this wisdom context it denotes true knowledge grounded in relation to God.
- source_word: יִרְאַת יְהוָה
  chosen: the fear of the LORD
  alternatives:
  - reverence for the LORD
  - fear of Yahweh
  lexicon: HALOT
  rationale: This is a stock theological expression in Hebrew wisdom and prophecy. 'The fear of the LORD' is the most faithful and recognizable rendering, preserving the tension of reverent awe and covenantal submission rather than reducing it to 'reverence' alone.
