id: ISA.11.15
reference: Isaiah 11:15
source:
  edition: WLC
  text: וְ/הֶחֱרִ֣ים יְהוָ֗ה אֵ֚ת לְשׁ֣וֹן יָם מִצְרַ֔יִם וְ/הֵנִ֥יף יָד֛/וֹ עַל הַ/נָּהָ֖ר בַּ/עְיָ֣ם רוּח֑/וֹ וְ/הִכָּ֨/הוּ֙ לְ/שִׁבְעָ֣ה נְחָלִ֔ים וְ/הִדְרִ֖יךְ בַּ/נְּעָלִֽים־־׃
translation:
  text: And Yahweh will utterly destroy the tongue of the sea of Egypt, and he will wave his hand over the River with the scorching of his wind; he will strike it into seven streams, and make people walk through in sandals.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the gulf of Egypt'; literally 'the tongue of the sea of Egypt.'
    reason: lexical_alternative
  - marker: b
    text: That is, the Euphrates.
    reason: cross_reference
  - marker: c
    text: Or 'with the heat of his wind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶחֱרִים
  chosen: will utterly destroy
  alternatives:
  - will devote to destruction
  - will dry up
  lexicon: HALOT
  rationale: The Hiphil of חרם commonly means to put under the ban/devote to destruction. In this geographic context, the effect is the removal of the sea-tongue as an obstacle, so 'utterly destroy' communicates decisive elimination without over-paraphrasing. 'Dry up' reflects contextual interpretation but is less directly lexical.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְשׁוֹן יָם מִצְרַיִם
  chosen: the tongue of the sea of Egypt
  alternatives:
  - the gulf of Egypt
  - the tongue of the Egyptian sea
  lexicon: HALOT
  rationale: לשון literally means 'tongue' and can denote a tongue-shaped bay or gulf. The literal image is preserved in the main text for transparency; a more interpretive geographical gloss is preserved in a footnote.
- source_word: וְהֵנִיף יָדוֹ
  chosen: he will wave his hand
  alternatives:
  - he will brandish his hand
  - he will raise his hand
  lexicon: HALOT
  rationale: The idiom conveys a forceful divine gesture of power over the waters. 'Wave' is natural English and preserves the image.
- source_word: הַנָּהָר
  chosen: the River
  alternatives:
  - the Euphrates River
  lexicon: HALOT
  rationale: In prophetic usage, 'the River' commonly refers to the Euphrates. The Hebrew uses the definite noun without naming it, so the main text keeps 'the River' and the identification is noted in a footnote.
- source_word: בַּעְיָם רוּחוֹ
  chosen: with the scorching of his wind
  alternatives:
  - with the heat of his wind
  - with the fury of his wind
  - by the might of his רוח
  lexicon: HALOT
  rationale: בעים likely denotes burning heat/scorching. רוּחַ can mean wind, breath, or spirit; here the context of striking waters favors 'wind.' 'Scorching' best captures the drying/judging force.
- source_word: וְהִכָּהוּ
  chosen: he will strike it
  alternatives:
  - he will smite it
  lexicon: HALOT
  rationale: Direct, readable rendering of נכה with 3ms suffix referring back to the River.
- source_word: לְשִׁבְעָה נְחָלִים
  chosen: into seven streams
  alternatives:
  - into seven wadis
  - into seven channels
  lexicon: HALOT
  rationale: נחלים are streambeds/streams. 'Streams' is the clearest modern English. 'Seven' may be literal or symbolic fullness, but the text should remain untranslated as 'seven.'
- source_word: וְהִדְרִיךְ
  chosen: make people walk through
  alternatives:
  - lead through
  - cause to tread through
  lexicon: HALOT
  rationale: The Hiphil means to cause to tread/walk. Since no explicit object is stated in Hebrew, English requires an implied human object; 'make people walk through' expresses the result of the river's division.
- source_word: בַּנְּעָלִים
  chosen: in sandals
  alternatives:
  - with sandals
  - shod
  lexicon: HALOT
  rationale: The phrase indicates easy passage without needing to go barefoot or swim. 'In sandals' is idiomatic and concrete.
