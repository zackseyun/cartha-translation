theological_decisions:
- issue: Nature of the imagery describing the defeat of Egypt's sea and the River
  chosen_reading: Render as a divine act over literal geographic waters using elevated prophetic imagery, without allegorizing in the translation.
  alternative_readings:
  - Purely symbolic removal of political obstacles
  - Exodus typology only
  rationale: The verse evokes exodus-like deliverance, but the translation should preserve the concrete water imagery and let interpretation proceed from the text rather than importing a specific theological scheme.
