theological_decisions:
- issue: Messianic portrayal of the ruler's discernment
  chosen_reading: The verse describes the coming Davidic ruler as characterized by reverent delight in the fear of the LORD and by judgment not limited to outward appearances or reports.
  alternative_readings:
  - The opening clause may emphasize supernatural perceptiveness ('he shall smell out') rather than delight.
  rationale: The immediate literary context is the Spirit-endowed shoot from Jesse. The translation should preserve the ruler's extraordinary discernment without forcing a speculative mechanism. 'His delight shall be in the fear of the LORD' fits the ethical and theological thrust of the passage and avoids an opaque literalism, while the alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §§1, 3, 6; Contested terms: יְהוָה → the LORD'
