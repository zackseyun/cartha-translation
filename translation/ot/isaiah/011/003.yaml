id: ISA.11.3
reference: Isaiah 11:3
source:
  edition: WLC
  text: וַ/הֲרִיח֖/וֹ בְּ/יִרְאַ֣ת יְהוָ֑ה וְ/לֹֽא לְ/מַרְאֵ֤ה עֵינָי/ו֙ יִשְׁפּ֔וֹט וְ/לֹֽא לְ/מִשְׁמַ֥ע אָזְנָ֖י/ו יוֹכִֽיחַ־־׃
translation:
  text: And his delight shall be in the fear of Yahweh, and he shall not judge by what his eyes see, nor decide by what his ears hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'his smelling/perception shall be in the fear of the LORD'; the Hebrew verb is difficult and may suggest keen discernment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲרִיחוֹ
  chosen: his delight shall be
  alternatives:
  - he shall smell
  - his smelling/perception shall be
  lexicon: HALOT
  rationale: From ריח in the Hiphil, the form is notoriously difficult if rendered woodenly as 'make him smell' or 'he shall smell.' In context, paired with 'fear of the LORD' and followed by statements about judging beyond mere sight and hearing, the sense is best taken idiomatically as keen perception taking pleasure in or being attuned to the fear of the LORD. 'His delight shall be' is established by context and yields natural English while preserving the verse's emphasis on disposition and discernment. Because the literal olfactory sense is possible at the lexical level, it is preserved in a footnote.
- source_word: בְּיִרְאַת
  chosen: in the fear of
  alternatives:
  - by the fear of
  - with reverence for
  lexicon: HALOT
  rationale: יִרְאָה commonly denotes fear/reverence in covenantal relation to God. 'In the fear of' preserves the Hebrew construction and the theological weight of reverent awe without reducing it to mere emotion.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְמַרְאֵה עֵינָיו
  chosen: by what his eyes see
  alternatives:
  - according to the sight of his eyes
  - by the appearance before his eyes
  lexicon: HALOT
  rationale: מַרְאֶה refers to sight/appearance. The phrase means judgment not based merely on visible appearance. 'By what his eyes see' is clear modern English and retains the concrete sensory contrast.
- source_word: יִשְׁפּוֹט
  chosen: he shall judge
  alternatives:
  - he will govern
  - he will render judgment
  lexicon: HALOT
  rationale: שׁפט here is judicial/governing judgment. 'Judge' is the most direct rendering and fits the parallel with the following verb.
- source_word: לְמִשְׁמַע אָזְנָיו
  chosen: by what his ears hear
  alternatives:
  - according to the hearing of his ears
  - by hearsay
  lexicon: HALOT
  rationale: The phrase parallels 'what his eyes see' and refers to judgment not based merely on audible report. 'By what his ears hear' preserves the sensory imagery better than the more interpretive 'by hearsay,' though that captures part of the sense.
- source_word: יוֹכִיחַ
  chosen: decide
  alternatives:
  - reprove
  - arbitrate
  - render a verdict
  lexicon: HALOT
  rationale: יכח in the Hiphil can mean decide, arbitrate, reprove, or render judgment depending on context. Here, in parallel with 'judge,' the judicial sense is primary. 'Decide' gives idiomatic English without collapsing the distinction entirely; 'reprove' would sound too narrow and moralistic in this context.
