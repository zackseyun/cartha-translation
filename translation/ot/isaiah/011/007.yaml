theological_decisions:
- issue: Nature of the animal-peace imagery
  chosen_reading: Render the verse as a concrete depiction of reconciled creation
    without specifying whether the fulfillment is literal, symbolic, or both.
  alternative_readings:
  - purely symbolic of human political peace
  - strictly literal zoological transformation
  rationale: The Hebrew presents vivid animal imagery but does not itself resolve
    the broader interpretive question of how the prophecy is fulfilled. To preserve
    theological tension, the translation stays concrete and non-interpretive.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
