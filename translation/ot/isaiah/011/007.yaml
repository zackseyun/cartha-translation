id: ISA.11.7
reference: Isaiah 11:7
source:
  edition: WLC
  text: וּ/פָרָ֤ה וָ/דֹב֙ תִּרְעֶ֔ינָה יַחְדָּ֖ו יִרְבְּצ֣וּ יַלְדֵי/הֶ֑ן וְ/אַרְיֵ֖ה
    כַּ/בָּקָ֥ר יֹֽאכַל תֶּֽבֶן־׃
translation:
  text: The cow and the bear will graze; together their young will lie down, and the
    lion, like the ox, will eat straw.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The cow and the bear will feed.' The Hebrew verb can be rendered more
      generally as 'feed,' though 'graze' fits the animal imagery well.
    reason: lexical_alternative
  - marker: b
    text: Or 'like cattle.' The Hebrew בָּקָר can refer collectively to cattle as
      well as to an individual bovine.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָרָה
  chosen: the cow
  alternatives:
  - the heifer
  - the cattle
  lexicon: HALOT
  rationale: פָּרָה denotes a cow/heifer. 'Cow' is the most natural singular English
    equivalent here and matches the paired animal imagery.
- source_word: וָדֹב
  chosen: the bear
  lexicon: HALOT
  rationale: Straightforward rendering of דֹּב as 'bear.'
- source_word: תִּרְעֶינָה
  chosen: will graze
  alternatives:
  - will feed
  - will pasture
  lexicon: HALOT
  rationale: From רעה in the Qal, here describing animal feeding behavior. 'Will graze'
    is idiomatic for a cow and bear in this peace-oracle context and preserves the
    concrete image better than the more general 'feed.'
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - as one
  lexicon: HALOT
  rationale: Adverb meaning 'together'; concise and natural in English.
- source_word: יִרְבְּצוּ
  chosen: will lie down
  alternatives:
  - will crouch down
  - will rest
  lexicon: HALOT
  rationale: רבץ commonly refers to animals lying down. 'Will lie down' is the standard
    and clearest English rendering in this zoological setting.
- source_word: יַלְדֵיהֶן
  chosen: their young
  alternatives:
  - their offspring
  - their young ones
  lexicon: HALOT
  rationale: Literally 'their young/children.' Since the referents are animals, 'their
    young' is the most idiomatic English choice.
- source_word: וְאַרְיֵה
  chosen: and the lion
  lexicon: HALOT
  rationale: Standard rendering of אַרְיֵה as 'lion.'
- source_word: כַּבָּקָר
  chosen: like the ox
  alternatives:
  - like cattle
  - like the herd animal
  lexicon: HALOT
  rationale: בָּקָר can denote cattle collectively, but with the prefixed comparative
    כ and singular sense in English, 'like the ox' gives a clear individual comparison
    parallel to 'the lion.' It also avoids the awkwardness of 'like cattle will eat.'
- source_word: יֹאכַל
  chosen: will eat
  alternatives:
  - eats
  lexicon: HALOT
  rationale: 'Imperfect verb in this prophetic description is best rendered as future:
    ''will eat.'''
- source_word: תֶּבֶן
  chosen: straw
  alternatives:
  - fodder
  - chopped straw
  lexicon: HALOT
  rationale: תֶּבֶן refers to straw/stubble used as fodder. 'Straw' is the conventional
    and sufficiently precise English term here.
