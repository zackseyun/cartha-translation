id: ISA.11.1
reference: Isaiah 11:1
source:
  edition: WLC
  text: וְ/יָצָ֥א חֹ֖טֶר מִ/גֵּ֣זַע יִשָׁ֑י וְ/נֵ֖צֶר מִ/שָּׁרָשָׁ֥י/ו יִפְרֶֽה׃
translation:
  text: Then a shoot will come out from the stump of Jesse, and a branch from his
    roots will bear fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And a shoot will come out from the stump of Jesse.' The conjunction
      may be rendered simply 'and'; 'then' reflects the verse's movement from prior
      judgment to renewed hope.
    reason: lexical_alternative
  - marker: b
    text: Or 'a rod' or 'a twig' for 'shoot.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a sprout' for 'branch.' Some readers see messianic significance in this
      image, but the translation keeps the ordinary botanical sense in the main text.
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'his roots'; some translations smooth the metaphor as 'its roots.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  chosen: Then ... will come out
  alternatives:
  - And ... will come out
  - And ... will spring forth
  lexicon: HALOT
  rationale: The verb יצא means 'go out/come out.' In English, 'come out' fits the
    image of new growth emerging from a stump. The prefixed conjunction can be rendered
    simply 'and,' but 'then' captures the forward movement from the preceding judgment
    context into renewed hope without over-paraphrasing.
- source_word: חֹטֶר
  chosen: shoot
  alternatives:
  - rod
  - twig
  lexicon: HALOT
  rationale: חֹטֶר denotes a shoot/rod/sprout from a trunk or stump. 'Shoot' best
    fits the botanical metaphor in contemporary English and avoids the misleadingly
    weapon-like sense of 'rod' here.
- source_word: מִגֵּזַע
  chosen: from the stump
  alternatives:
  - from the stock
  - from the trunk
  lexicon: HALOT
  rationale: גֵּזַע refers to the stump or stock of a felled tree. 'Stump' most clearly
    conveys the image of what remains after cutting, which is important in Isaiah's
    judgment-restoration imagery.
- source_word: יִשָׁי
  chosen: Jesse
  rationale: Proper name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: וְנֵצֶר
  chosen: branch
  alternatives:
  - shoot
  - sprout
  lexicon: HALOT
  rationale: נֵצֶר denotes a fresh shoot or branch. 'Branch' provides a natural English
    parallel to the first colon while preserving the poetic distinction from חֹטֶר.
    It also reflects established messianic usage without depending on tradition alone.
- source_word: מִשָּׁרָשָׁיו
  chosen: from his roots
  alternatives:
  - from its roots
  lexicon: HALOT
  rationale: The noun means 'roots,' with a 3ms suffix. Grammatically, the suffix
    refers back to Jesse/the stump image. 'His roots' preserves the masculine suffix
    as given in Hebrew; 'its roots' would smooth the metaphor but lose the source-text
    gendered linkage.
- source_word: יִפְרֶה
  chosen: will bear fruit
  alternatives:
  - will be fruitful
  - will flourish
  lexicon: HALOT
  rationale: The verb פרה means 'be fruitful, bear fruit.' 'Will bear fruit' best
    completes the plant imagery and expresses productive vitality rather than mere
    survival or growth.
