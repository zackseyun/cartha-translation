theological_decisions:
- issue: Messianic resonance of the plant imagery
  chosen_reading: Translate the verse in its immediate botanical and dynastic sense
    without importing an explicit messianic title into the text.
  alternative_readings:
  - Render with more traditional capitalization such as 'Branch' to signal a messianic
    title
  rationale: Within Christian orthodoxy this verse is commonly understood messianically,
    but the Hebrew text itself presents the image as a shoot/branch from Jesse's line.
    Lowercase 'branch' preserves the lexical sense and lets the canonical/theological
    significance arise from context rather than translator insertion.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Masculine suffix in 'his roots'
  chosen_reading: Preserve the masculine possessive in the main text as 'his roots.'
  alternative_readings:
  - Use 'its roots' for smoother botanical English
  rationale: The Hebrew has a masculine singular suffix. Retaining 'his' follows the
    gender-accurate principle and keeps the linkage to Jesse as the dynastic source,
    even within the tree metaphor.
  doctrine_reference: Translation philosophy §4
