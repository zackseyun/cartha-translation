theological_decisions:
- issue: Whether to soften the verse's conquest imagery into merely political influence
  chosen_reading: Retain explicit military/subjugation language ('swoop down,' 'plunder,'
    'obey them')
  alternative_readings:
  - Render more generally as dominance or influence
  rationale: The Hebrew uses forceful verbs and idioms of attack, plunder, and subjection.
    The translation should not mute the text's imagery, even though the verse is part
    of a prophetic restoration context.
  doctrine_reference: Translation philosophy §1, §3
