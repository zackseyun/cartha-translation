id: ISA.11.14
reference: Isaiah 11:14
source:
  edition: WLC
  text: וְ/עָפ֨וּ בְ/כָתֵ֤ף פְּלִשְׁתִּים֙ יָ֔מָּ/ה יַחְדָּ֖ו יָבֹ֣זּוּ אֶת בְּנֵי
    קֶ֑דֶם אֱד֤וֹם וּ/מוֹאָב֙ מִשְׁל֣וֹח יָדָ֔/ם וּ/בְנֵ֥י עַמּ֖וֹן מִשְׁמַעְתָּֽ/ם־־׃
translation:
  text: They will swoop down on the shoulder of the Philistines to the west; together
    they will plunder the sons of the east. Edom and Moab will be the putting forth
    of their hand, and the sons of Ammon will obey them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people of the east' / 'the easterners.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the shoulder of the Philistines,' likely meaning their flank or
      the Philistine region on the west.
    reason: cultural_note
  - marker: c
    text: Or 'Edom and Moab will be under their hand' or 'they will lay their hand
      on Edom and Moab.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the Ammonites will be subject to them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָפוּ
  chosen: they will swoop down
  alternatives:
  - they will fly
  - they will dart/fly upon
  lexicon: HALOT
  rationale: The verb עוּף literally means 'fly,' but in this military context with
    a hostile object it idiomatically conveys rapid attacking movement. 'Swoop down'
    preserves the avian imagery while making the martial sense clear.
- source_word: בְּכָתֵף פְּלִשְׁתִּים
  chosen: on the shoulder of the Philistines
  alternatives:
  - on the flank of the Philistines
  - on the slopes/border of Philistia
  lexicon: HALOT
  rationale: כָּתֵף is literally 'shoulder,' but can denote a side, slope, or flank.
    Retaining 'shoulder' keeps the metaphor close to the Hebrew; the phrase likely
    refers to the Philistine region on Israel's western side.
- source_word: יָמָּה
  chosen: to the west
  alternatives:
  - westward
  - toward the sea
  lexicon: HALOT
  rationale: The directional adverb from 'sea' commonly means 'westward' in biblical
    Hebrew geography. 'To the west' is natural modern English and preserves the geographic
    sense.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - as one
  lexicon: HALOT
  rationale: Straightforward adverb indicating united action.
- source_word: יָבֹזּוּ
  chosen: they will plunder
  alternatives:
  - they will despoil
  - they will spoil
  lexicon: HALOT
  rationale: בזז in military contexts means to plunder or despoil. 'Plunder' is clear,
    contemporary, and suitably forceful.
- source_word: בְּנֵי קֶדֶם
  chosen: the sons of the east
  alternatives:
  - the people of the east
  - the easterners
  lexicon: HALOT
  rationale: Literally 'sons of the east.' Because the Hebrew expression is idiomatic
    for eastern peoples, a more dynamic rendering is possible, but the main text keeps
    the literal form to preserve the source texture; an alternative is worth noting.
- source_word: מִשְׁלוֹחַ יָדָם
  chosen: will be the putting forth of their hand
  alternatives:
  - will be under their hand
  - their hand will reach against
  - they will lay their hand on
  lexicon: HALOT
  rationale: The Hebrew is compressed and idiomatic. מִשְׁלוֹחַ is a noun ('sending
    out/putting forth'), not a finite verb. The phrase denotes the extension of power
    or attack. The chosen rendering stays close to the nominal construction, though
    smoother English alternatives exist.
- source_word: מִשְׁמַעְתָּם
  chosen: will obey them
  alternatives:
  - will be subject to them
  - will be under their obedience
  lexicon: HALOT
  rationale: From שׁמע in a nominal form meaning obedience/heeding. The sense is that
    Ammon comes under their authority. 'Will obey them' is the clearest idiomatic
    English equivalent.
- source_word: אֱדוֹם וּמוֹאָב
  chosen: Edom and Moab
  rationale: Standard transliteration of place/people names per translation philosophy.
- source_word: וּבְנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  lexicon: HALOT
  rationale: Literally 'sons of Ammon.' The literal form is retained for consistency
    with 'sons of the east,' though 'Ammonites' is a natural English equivalent.
