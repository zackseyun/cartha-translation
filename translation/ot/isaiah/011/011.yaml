theological_decisions:
- issue: Whether to render לִקְנוֹת in a more theologically loaded way ('redeem')
    or a more traditional contextual way ('recover')
  chosen_reading: to acquire
  alternative_readings:
  - to recover
  - to redeem
  rationale: The verse speaks of the Lord's renewed action toward the remnant. The
    lexical core of קנה is acquisition/obtaining, and 'acquire' preserves that core
    without importing the soteriological overtones of 'redeem' or the more result-focused
    interpretation 'recover.'
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether to preserve the anthropomorphic idiom of 'hand' or collapse it into
    a smoother English paraphrase
  chosen_reading: will again extend his hand, a second time
  alternative_readings:
  - will recover ... a second time
  - will again put forth his hand
  rationale: The Hebrew explicitly mentions the Lord's hand. Preserving the image
    maintains the text's rhetoric and avoids over-paraphrase, in keeping with optimal
    equivalence.
  doctrine_reference: Translation philosophy §1, §6
