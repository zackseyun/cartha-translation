id: ISA.11.11
reference: Isaiah 11:11
source:
  edition: WLC
  text: וְ/הָיָ֣ה בַּ/יּ֣וֹם הַ/ה֗וּא יוֹסִ֨יף אֲדֹנָ֤/י שֵׁנִית֙ יָד֔/וֹ לִ/קְנ֖וֹת
    אֶת שְׁאָ֣ר עַמּ֑/וֹ אֲשֶׁ֣ר יִשָּׁאֵר֩ מֵ/אַשּׁ֨וּר וּ/מִ/מִּצְרַ֜יִם וּ/מִ/פַּתְר֣וֹס
    וּ/מִ/כּ֗וּשׁ וּ/מֵ/עֵילָ֤ם וּ/מִ/שִּׁנְעָר֙ וּ/מֵ֣/חֲמָ֔ת וּ/מֵ/אִיֵּ֖י הַ/יָּֽם׀׀־׃
translation:
  text: And in that day the Lord will again extend his hand, a second time, to acquire
    the remnant of his people who remain, from Assyria, from Egypt, from Pathros,
    from Cush, from Elam, from Shinar, from Hamath, and from the coastlands of the
    sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will recover ... a second time.' The Hebrew literally says 'will again/add
      to extend his hand ... to acquire,' an idiom many versions render 'recover.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the islands of the sea.' The Hebrew expression can refer to islands
      or maritime coastlands more broadly.
    reason: lexical_alternative
  - marker: c
    text: Cush is the Hebrew place name, often associated with regions south of Egypt;
      some translations use 'Ethiopia.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will
  alternatives:
  - And it will happen
  - And it shall be
  lexicon: HALOT
  rationale: Introduces a future circumstance idiomatically. In English, 'And in that
    day ... will' captures the prophetic transition without woodenly retaining 'it
    will be.'
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'In that day' is natural English
    and preserves the eschatological-prophetic register.
- source_word: יוֹסִיף ... יָדוֹ
  chosen: will again extend his hand
  alternatives:
  - will add his hand
  - will put forth his hand again
  - will recover ... again
  lexicon: HALOT
  rationale: The Hebrew literally combines 'add' with 'his hand' as an idiom for repeating
    an action with power or initiative. 'Extend his hand' preserves the anthropomorphic
    image better than the traditional but more interpretive 'recover.' 'Again' reflects
    יוֹסִיף and is reinforced by שֵׁנִית.
- source_word: שֵׁנִית
  chosen: a second time
  alternatives:
  - again
  lexicon: HALOT
  rationale: Rendered explicitly to preserve the ordinal force. Because יוֹסִיף already
    contributes the sense of repetition, both are represented in English as 'again
    extend his hand, a second time' to avoid losing either element.
- source_word: לִקְנוֹת
  chosen: to acquire
  alternatives:
  - to recover
  - to redeem
  - to regain
  - to purchase
  lexicon: HALOT
  rationale: The verb קנה commonly means 'acquire/get/buy.' In this context many English
    versions use 'recover,' but that imports the result rather than the lexical core.
    'Acquire' preserves the source wording while fitting the context of reclaiming
    a people. 'Redeem' would add theological freight not explicit in this verb alone.
- source_word: שְׁאָר עַמּוֹ
  chosen: the remnant of his people
  alternatives:
  - the remainder of his people
  lexicon: HALOT
  rationale: '''Remnant'' is the established and contextually appropriate rendering
    for שְׁאָר in prophetic literature, carrying both quantitative and theological
    force.'
- source_word: אֲשֶׁר יִשָּׁאֵר
  chosen: who remain
  alternatives:
  - who are left
  - who survive
  lexicon: HALOT
  rationale: A relative clause describing the remnant. 'Who remain' is concise and
    natural while preserving the passive/resultative sense of what is left over.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: This is the title אֲדֹנָי, not the Tetragrammaton. Per translation philosophy,
    titles are translated. 'The Lord' is the natural English rendering here.
- source_word: מֵאַשּׁוּר
  chosen: from Assyria
  lexicon: HALOT
  rationale: Standard transliteration of the place name with the prefixed preposition
    represented.
- source_word: וּמִמִּצְרַיִם
  chosen: from Egypt
  lexicon: HALOT
  rationale: Standard place-name rendering.
- source_word: וּמִפַּתְרוֹס
  chosen: from Pathros
  lexicon: HALOT
  rationale: Transliteration of the regional name in Upper Egypt.
- source_word: וּמִכּוּשׁ
  chosen: from Cush
  alternatives:
  - from Ethiopia
  lexicon: HALOT
  rationale: Per philosophy, names are transliterated rather than replaced with potentially
    misleading modern equivalents. 'Ethiopia' is interpretive and geographically inexact.
- source_word: וּמֵעֵילָם
  chosen: from Elam
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: וּמִשִּׁנְעָר
  chosen: from Shinar
  alternatives:
  - from Babylonia
  lexicon: HALOT
  rationale: Transliteration preserves the Hebrew toponym. 'Babylonia' is a contextual
    identification but not the form used in the text.
- source_word: וּמֵחֲמָת
  chosen: from Hamath
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: וּמֵאִיֵּי הַיָּם
  chosen: from the coastlands of the sea
  alternatives:
  - from the islands of the sea
  - from the distant coastlands
  lexicon: HALOT
  rationale: אִיִּים can denote islands or coastlands; in prophetic geography it often
    refers broadly to maritime lands. 'Coastlands of the sea' preserves the Hebrew
    image while remaining intelligible. The more traditional 'islands of the sea'
    is preserved as an alternative.
