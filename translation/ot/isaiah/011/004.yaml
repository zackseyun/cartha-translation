theological_decisions:
- issue: Scope of אֶרֶץ in this verse
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: The immediate context is messianic and expansive, and the parallelism
    supports a broader scope than merely the territory of Israel. 'Earth' also coheres
    with the cosmic horizon of the surrounding passage while remaining a legitimate
    lexical sense of אֶרֶץ.
- issue: Force of the singular רָשָׁע
  chosen_reading: the wicked (collective/generic)
  alternative_readings:
  - the wicked one (individualized)
  rationale: Hebrew singular can function generically. The verse speaks of the Messiah's
    righteous judgment against wickedness generally, though an individualized reading
    is possible and has been associated with later theological interpretation. The
    main text preserves the broader, textually immediate sense without foreclosing
    the alternative.
  doctrine_reference: Preserve theological tension rather than resolve it
