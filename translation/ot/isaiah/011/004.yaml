id: ISA.11.4
reference: Isaiah 11:4
source:
  edition: WLC
  text: וְ/שָׁפַ֤ט בְּ/צֶ֨דֶק֙ דַּלִּ֔ים וְ/הוֹכִ֥יחַ בְּ/מִישׁ֖וֹר לְ/עַנְוֵי אָ֑רֶץ
    וְ/הִֽכָּה אֶ֨רֶץ֙ בְּ/שֵׁ֣בֶט פִּ֔י/ו וּ/בְ/ר֥וּחַ שְׂפָתָ֖י/ו יָמִ֥ית רָשָֽׁע־־׃
translation:
  text: but he will judge the poor with righteousness, and decide with equity for
    the humble of the earth; he will strike the earth with the rod of his mouth, and
    with the breath of his lips he will put the wicked to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''and he will judge.'' The conjunction may be read simply as ''and,''
      but ''but'' brings out the contrast with the previous verse: he does not judge
      by appearances.'
    reason: lexical_alternative
  - marker: b
    text: '''With righteousness'' could also be rendered ''with justice.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'for the meek of the land.'
    reason: lexical_alternative
  - marker: d
    text: '''Earth'' may also be translated ''land.'''
    reason: lexical_alternative
  - marker: e
    text: Or 'he will slay the wicked one.' The Hebrew singular may be read as a representative
      singular ('the wicked') or as an individual figure.
    reason: alternative_reading
lexical_decisions:
- source_word: וְשָׁפַט
  chosen: but he will judge
  alternatives:
  - and he will judge
  lexicon: HALOT
  rationale: The verb means 'judge/govern.' In this context of royal rule, 'judge'
    preserves the judicial sense. Rendering the initial waw as 'but' reflects the
    contrast with v.3, where he does not judge by appearances; here he judges rightly.
- source_word: בְּצֶדֶק
  chosen: with righteousness
  alternatives:
  - in righteousness
  - with justice
  lexicon: HALOT
  rationale: צֶדֶק commonly denotes righteousness/justice. 'With righteousness' keeps
    the moral-judicial quality without narrowing it to merely forensic justice. This
    also preserves the lexical link with the following verse.
- source_word: דַּלִּים
  chosen: the poor
  alternatives:
  - the weak
  - the needy
  lexicon: HALOT
  rationale: דַּל refers to those who are lowly, poor, or weak in social power. 'The
    poor' is the most natural and common rendering here in a justice context.
- source_word: וְהוֹכִיחַ
  chosen: and decide
  alternatives:
  - and reprove
  - and arbitrate
  - and give judgment
  lexicon: HALOT
  rationale: In judicial contexts יכח in the Hiphil can mean to decide, arbitrate,
    or render judgment, not merely to rebuke. 'Decide' fits the parallel with 'judge'
    and avoids implying only verbal correction.
- source_word: בְּמִישׁוֹר
  chosen: with equity
  alternatives:
  - with uprightness
  - fairly
  - in equity
  lexicon: HALOT
  rationale: מִישׁוֹר conveys straightness, evenness, and thus equity/uprightness.
    'With equity' is idiomatic in English and suits the judicial setting.
- source_word: לְעַנְוֵי אָרֶץ
  chosen: for the humble of the earth
  alternatives:
  - for the meek of the land
  - for the afflicted of the earth
  lexicon: HALOT
  rationale: עָנָו can mean humble, meek, or afflicted. 'Humble' best captures the
    ethical-social nuance without overcommitting to either inward disposition alone
    or socioeconomic suffering alone. 'Earth' is retained rather than 'land' because
    the verse broadens in scope and the second colon also uses אֶרֶץ.
- source_word: וְהִכָּה אֶרֶץ
  chosen: he will strike the earth
  alternatives:
  - he will strike the land
  lexicon: HALOT
  rationale: נכה means strike/smite. 'Strike' is clear modern English. אֶרֶץ may mean
    land or earth; 'earth' fits the expansive, eschatological tone of the passage.
- source_word: בְּשֵׁבֶט פִּיו
  chosen: with the rod of his mouth
  alternatives:
  - with the scepter of his mouth
  lexicon: HALOT
  rationale: שֵׁבֶט can denote rod, staff, or scepter. Here the metaphor of speech
    as an instrument of judgment is best preserved by 'rod,' especially in parallel
    with 'breath of his lips.'
- source_word: וּבְרוּחַ שְׂפָתָיו
  chosen: and with the breath of his lips
  alternatives:
  - and with the spirit of his lips
  - and with the wind of his lips
  lexicon: HALOT
  rationale: רוּחַ can mean breath, wind, or spirit. In parallel with 'mouth' and
    'lips,' 'breath' is the most immediate and concrete sense, preserving the imagery
    of powerful speech.
- source_word: יָמִית רָשָׁע
  chosen: he will put the wicked to death
  alternatives:
  - he will slay the wicked
  - he will kill the wicked one
  lexicon: HALOT
  rationale: The Hiphil of מות means cause to die/put to death. 'Put the wicked to
    death' is forceful but readable. The singular רָשָׁע may be collective or representative;
    English singular with article can function generically, but 'the wicked' reads
    naturally and preserves the class sense.
