id: ISA.11.8
reference: Isaiah 11:8
source:
  edition: WLC
  text: וְ/שִֽׁעֲשַׁ֥ע יוֹנֵ֖ק עַל חֻ֣ר פָּ֑תֶן וְ/עַל֙ מְאוּרַ֣ת צִפְעוֹנִ֔י גָּמ֖וּל
    יָד֥/וֹ הָדָֽה־׃
translation:
  text: The nursing child will play over the cobra’s hole, and the weaned child will
    put his hand on the viper’s den.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'asp' for 'cobra.' The Hebrew term denotes a venomous snake, traditionally
      identified with the asp/cobra.
    reason: lexical_alternative
  - marker: b
    text: Or 'will stretch out his hand' instead of 'will put his hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁעֲשַׁע
  chosen: will play
  alternatives:
  - will delight himself
  - will amuse himself
  lexicon: HALOT
  rationale: In this context of a small child safely interacting with what would normally
    be deadly danger, the verb conveys carefree play rather than inward delight alone.
    'Will play' is idiomatic and fits the scene.
- source_word: יוֹנֵק
  chosen: the nursing child
  alternatives:
  - the suckling
  - the infant
  lexicon: HALOT
  rationale: The participle denotes a child still nursing. 'Nursing child' is clear
    modern English and preserves the developmental contrast with 'weaned child' later
    in the verse.
- source_word: חֻר
  chosen: hole
  alternatives:
  - den
  - opening
  lexicon: HALOT
  rationale: The noun refers to a hole or cavity. 'Hole' is the most natural rendering
    with a snake in English.
- source_word: פָּתֶן
  chosen: cobra
  alternatives:
  - asp
  - adder
  lexicon: HALOT
  rationale: The term refers to a venomous snake, traditionally identified as an asp/cobra.
    'Cobra' is more intelligible to modern readers than 'asp' and more specific than
    'adder.'
- source_word: מְאוּרַת
  chosen: den
  alternatives:
  - lair
  - hole
  lexicon: HALOT
  rationale: The noun denotes a place of light/opening or den; in context it refers
    to the serpent's dwelling place. 'Den' gives a natural English parallel while
    distinguishing it from the earlier 'hole.'
- source_word: צִפְעוֹנִי
  chosen: viper
  alternatives:
  - adder
  - poisonous snake
  lexicon: HALOT
  rationale: The word denotes a venomous serpent. 'Viper' is a clear modern equivalent
    without overcommitting to a precise zoological identification.
- source_word: גָּמוּל
  chosen: the weaned child
  alternatives:
  - the weaned one
  - the toddler
  lexicon: HALOT
  rationale: The adjective/substantive refers to a child who has been weaned. 'Weaned
    child' preserves the lexical sense and the poetic parallel with 'nursing child.'
- source_word: יָדוֹ
  chosen: his hand
  alternatives:
  - its hand
  lexicon: HALOT
  rationale: The Hebrew has a masculine singular pronominal suffix. Following the
    project's gender-accurate policy, 'his hand' preserves the grammatical form in
    representative usage.
- source_word: הָדָה
  chosen: will put
  alternatives:
  - will stretch out
  - will reach out
  lexicon: HALOT
  rationale: The verb here describes extending or placing the hand toward/on the serpent's
    den. 'Will put' is concise and idiomatic in English for this construction with
    'hand on.'
