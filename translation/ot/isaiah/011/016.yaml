theological_decisions:
- issue: Identity of the possessive in 'his people'
  chosen_reading: Retain the text's simple possessive 'his people' without specifying
    whether the referent is the LORD or the root/shoot figure in the surrounding context.
  alternative_readings:
  - the LORD's people
  - the Messiah's people
  rationale: The immediate Hebrew leaves the possessive pronoun implicit in context
    rather than explicitly naming the referent. To preserve theological tension and
    avoid importing a resolution not stated in the verse, the translation keeps 'his
    people.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Exodus typology
  chosen_reading: Render the comparison straightforwardly as a historical analogy
    to Israel's exodus from Egypt, without expanding it into a doctrinal paraphrase
    of a 'second exodus.'
  alternative_readings:
  - a new exodus for the end-time remnant
  rationale: Isaiah clearly evokes the exodus pattern, but the verse itself states
    the comparison rather than an interpretive label. The translation preserves the
    allusion without adding theological terminology absent from the Hebrew.
  doctrine_reference: Original-language primacy over translation tradition.
