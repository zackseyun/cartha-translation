id: ISA.11.16
reference: Isaiah 11:16
source:
  edition: WLC
  text: וְ/הָיְתָ֣ה מְסִלָּ֔ה לִ/שְׁאָ֣ר עַמּ֔/וֹ אֲשֶׁ֥ר יִשָּׁאֵ֖ר מֵֽ/אַשּׁ֑וּר
    כַּ/אֲשֶׁ֤ר הָֽיְתָה֙ לְ/יִשְׂרָאֵ֔ל בְּ/י֥וֹם עֲלֹת֖/וֹ מֵ/אֶ֥רֶץ מִצְרָֽיִם׃
translation:
  text: And there will be a highway for the remnant of his people that remains from
    Assyria, as there was for Israel in the day of his coming up from the land of
    Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that is left from Assyria.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the day of his coming up from the land of Egypt'; that is,
      as in Israel's exodus from Egypt.
    reason: cross_reference
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: And there will be
  alternatives:
  - And it shall be
  - And there shall be
  lexicon: HALOT
  rationale: The waw + qatal of היה here introduces the future result in prophetic
    discourse. 'There will be' is natural modern English while preserving the predictive
    sense.
- source_word: מְסִלָּה
  chosen: a highway
  alternatives:
  - a raised road
  - a causeway
  lexicon: HALOT
  rationale: מסלה commonly denotes a built-up road or highway. 'Highway' is idiomatic
    and preserves the image of a prepared route of return/deliverance.
- source_word: לִשְׁאָר עַמּוֹ
  chosen: for the remnant of his people
  alternatives:
  - for the remainder of his people
  - for the surviving remnant of his people
  lexicon: HALOT
  rationale: שְׁאָר is a key Isaianic term for the surviving remnant. 'Remnant' preserves
    that theological and literary motif better than the more generic 'remainder.'
- source_word: אֲשֶׁר יִשָּׁאֵר
  chosen: that remains
  alternatives:
  - who remain
  - that is left
  lexicon: HALOT
  rationale: The clause further defines the remnant. 'That remains' is concise and
    matches the singular collective sense of שְׁאָר.
- source_word: מֵאַשּׁוּר
  chosen: from Assyria
  alternatives:
  - out of Assyria
  lexicon: HALOT
  rationale: The preposition מן marks source/origin. 'From Assyria' is the most straightforward
    rendering.
- source_word: כַּאֲשֶׁר הָיְתָה
  chosen: as there was
  alternatives:
  - just as there was
  - as it was
  lexicon: HALOT
  rationale: This introduces the comparison with the exodus. Supplying 'there' in
    English clarifies the ellipsis with the earlier 'highway'.
- source_word: לְיִשְׂרָאֵל
  chosen: for Israel
  alternatives:
  - for the Israelites
  lexicon: HALOT
  rationale: The singular collective 'Israel' is the direct equivalent and echoes
    the covenant people as a whole.
- source_word: בְּיוֹם עֲלֹתוֹ
  chosen: in the day of his coming up
  alternatives:
  - when he came up
  - on the day he came up
  lexicon: HALOT
  rationale: The infinitive construct with suffix literally means 'in the day of his
    going up/coming up.' Retaining 'coming up' preserves the exodus/topographical
    idiom and the formal comparison, while remaining readable.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of the land of Egypt
  - from Egypt
  lexicon: HALOT
  rationale: This is the standard exodus phrasing. 'From the land of Egypt' preserves
    the full covenantal resonance better than the shorter 'from Egypt.'
