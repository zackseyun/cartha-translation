theological_decisions:
- issue: Prophetic perfect and divine agency
  chosen_reading: 'Render the perfect verb as a completed act addressed to God: ''you
    have shattered them.'''
  alternative_readings:
  - 'Render as future: ''you will shatter them'''
  rationale: Hebrew prophetic discourse often uses the perfect to portray a future
    saving act as certain. The direct second-person address and completed aspect are
    preserved in English rather than smoothing to a simple future, thus retaining
    the text's rhetorical force without adding doctrinal content.
  doctrine_reference: Translation philosophy §1, §3, §6
