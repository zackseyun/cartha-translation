id: ISA.9.3
reference: Isaiah 9:3
source:
  edition: WLC
  text: כִּ֣י אֶת עֹ֣ל סֻבֳּל֗/וֹ וְ/אֵת֙ מַטֵּ֣ה שִׁכְמ֔/וֹ שֵׁ֖בֶט הַ/נֹּגֵ֣שׂ בּ֑/וֹ
    הַחִתֹּ֖תָ כְּ/י֥וֹם מִדְיָֽן׀־׃
translation:
  text: For the yoke of his burden, and the staff on his shoulder, the rod of his
    oppressor—you have shattered them as on the day of Midian.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the yoke of his load' or 'the yoke of his oppression.'
    reason: lexical_alternative
  - marker: b
    text: '''The day of Midian'' likely recalls the LORD''s defeat of Midian in the
      days of Gideon (Judg 7).'
    reason: cross_reference
  - marker: c
    text: Hebrew has a perfect verb, 'you have shattered,' a prophetic way of speaking
      of God's victory as certain; some translations render it 'you will shatter.'
    reason: alternative_reading
lexical_decisions:
- source_word: עֹל סֻבֳּלוֹ
  chosen: the yoke of his burden
  alternatives:
  - the yoke of his load
  - the yoke of his oppression
  lexicon: HALOT
  rationale: עֹל is literally 'yoke.' סֻבֳּל from סבל denotes a burden/load carried.
    The construct is kept fairly formal as 'yoke of his burden' to preserve the image
    of imposed servitude, rather than collapsing it into a single abstract term.
- source_word: מַטֵּה שִׁכְמוֹ
  chosen: the staff on his shoulder
  alternatives:
  - the bar on his shoulder
  - the rod on his shoulder
  lexicon: HALOT
  rationale: מַטֶּה can mean staff/rod. In this oppression context, 'staff' works
    well and avoids confusion with the following שֵׁבֶט, while שִׁכְמוֹ is rendered
    naturally as 'on his shoulder,' the place where the burdening implement rests.
- source_word: שֵׁבֶט הַנֹּגֵשׂ בּוֹ
  chosen: the rod of his oppressor
  alternatives:
  - the rod of the one driving him
  - the scepter of his taskmaster
  lexicon: HALOT
  rationale: שֵׁבֶט commonly means rod/scepter/tribal staff; here the punitive sense
    fits. נֹגֵשׂ denotes an oppressor, taskmaster, or driver. 'Oppressor' best captures
    the coercive force in readable English.
- source_word: הַחִתֹּתָ
  chosen: you have shattered them
  alternatives:
  - you have broken
  - you have smashed
  lexicon: HALOT
  rationale: The verb from חתת conveys breaking/shattering. The perfect with 2ms subject
    is rendered as a completed divine act, matching the prophetic perfect style. 'Them'
    is supplied in English to gather the three preceding objects under the singular
    verb.
- source_word: כְּיוֹם מִדְיָן
  chosen: as on the day of Midian
  alternatives:
  - as in the day of Midian
  - as on Midian's day
  lexicon: HALOT
  rationale: This alludes to the decisive defeat of Midian, likely evoking Judges
    7. 'As on the day of Midian' is idiomatic and preserves the historical comparison.
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: כִּי here introduces the ground for the preceding joy/salvation statement,
    so 'For' best reflects the discourse connection.
