- issue: Retention of metaphor versus interpretive expansion
  chosen_reading: Preserve 'head and tail, palm branch and reed' in the main text
  alternative_readings:
  - Translate interpretively as 'leaders and followers, the high and the low'
  rationale: The verse itself presents metaphorical imagery that is explicitly explained in the following verse. Preserving the metaphor respects source-language form and avoids importing explanatory interpretation into the translation proper.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
