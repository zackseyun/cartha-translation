id: ISA.9.13
reference: Isaiah 9:13
source:
  edition: WLC
  text: וַ/יַּכְרֵ֨ת יְהוָ֜ה מִ/יִּשְׂרָאֵ֗ל רֹ֧אשׁ וְ/זָנָ֛ב כִּפָּ֥ה וְ/אַגְמ֖וֹן י֥וֹם אֶחָֽד׃
translation:
  text: So Yahweh cut off from Israel head and tail, palm branch and reed, in one day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the whole range of the nation, from the exalted to the lowly; the imagery is explained in the following verse.
    reason: cross_reference
  - marker: b
    text: Or 'rush' for 'reed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכְרֵת
  chosen: cut off
  alternatives:
  - cut down
  - removed
  - destroyed
  lexicon: HALOT
  rationale: From כרת in the Hiphil, here expressing decisive removal/elimination rather than merely physical cutting. 'Cut off' preserves the idiomatic force and matches the judgment context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - out of Israel
  lexicon: HALOT
  rationale: The preposition מן marks separation/removal from within the nation; 'from Israel' is the most natural English rendering.
- source_word: רֹאשׁ וְזָנָב
  chosen: head and tail
  alternatives:
  - leader and follower
  lexicon: HALOT
  rationale: The Hebrew uses concrete body-part imagery. The following verse interprets the metaphor, so the main text preserves the image rather than importing the interpretation here.
- source_word: כִּפָּה
  chosen: palm branch
  alternatives:
  - palm top
  - palm frond
  - branch
  lexicon: HALOT
  rationale: This term denotes the top or branch of a palm, paired metaphorically with אגמון. 'Palm branch' is clear modern English and preserves the elevated image.
- source_word: וְאַגְמוֹן
  chosen: reed
  alternatives:
  - rush
  - bulrush
  lexicon: HALOT
  rationale: אגמון refers to a marsh plant/reed. 'Reed' is concise and idiomatic in English, and preserves the contrast with the lofty palm branch.
- source_word: יוֹם אֶחָד
  chosen: in one day
  alternatives:
  - on a single day
  lexicon: HALOT
  rationale: An idiomatic temporal expression indicating the suddenness/completeness of the judgment.
