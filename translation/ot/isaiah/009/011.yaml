theological_decisions:
- issue: Referent of the pronouns in the refrain
  chosen_reading: The pronouns refer to God, expressing continuing divine judgment
    against Israel.
  alternative_readings:
  - The pronouns could be left more implicit as an unspecified agent in English.
  rationale: Within the repeated refrain in Isaiah 9, the context clearly points to
    the LORD's continuing anger and hand of judgment. Retaining 'his' without replacing
    it with 'the LORD's' preserves the Hebrew form while allowing the contextual referent
    to stand.
