id: ISA.9.2
reference: Isaiah 9:2
source:
  edition: WLC
  text: הִרְבִּ֣יתָ הַ/גּ֔וֹי לא הִגְדַּ֣לְתָּ הַ/שִּׂמְחָ֑ה שָׂמְח֤וּ לְ/פָנֶ֨י/ךָ֙
    כְּ/שִׂמְחַ֣ת בַּ/קָּצִ֔יר כַּ/אֲשֶׁ֥ר יָגִ֖ילוּ בְּ/חַלְּקָ֥/ם שָׁלָֽל׃
translation:
  text: You have multiplied the nation; you have not increased the joy. They rejoice
    before you as with the joy at harvest, as men exult when they divide spoil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some ancient versions and many translations read, 'you have increased its
      joy,' reflecting a Hebrew reading like לוֹ ('to it') instead of לֹא ('not').
    reason: textual_variant
  - marker: b
    text: Or 'they rejoice before you like the joy of harvest, like people rejoicing
      when they divide plunder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִרְבִּיתָ
  chosen: have multiplied
  alternatives:
  - have made great
  - have increased
  lexicon: HALOT
  rationale: Hiphil of רבה commonly means to make many or multiply. 'Have multiplied'
    preserves the causative sense and fits the direct object 'the nation.'
- source_word: הַגּוֹי
  chosen: the nation
  alternatives:
  - the people
  - the Gentile nation
  lexicon: HALOT
  rationale: גוי can mean nation or people. In this context, singular 'the nation'
    best matches the Hebrew form and the prophetic image of a corporate people enlarged.
- source_word: לֹא הִגְדַּלְתָּ הַשִּׂמְחָה
  chosen: you have not increased the joy
  alternatives:
  - you have increased its joy
  - you did not make the joy great
  lexicon: HALOT
  rationale: The consonantal text reads 'not' (לֹא), yielding 'you have not increased
    the joy.' This is the MT reading and should be represented in the main text. Because
    many ancient versions and translations reflect a reading equivalent to 'to it'
    (לוֹ), the alternative is preserved in a footnote as a textual variant of significance.
- source_word: שָׂמְחוּ
  chosen: They rejoice
  alternatives:
  - They have rejoiced
  - They are glad
  lexicon: HALOT
  rationale: Qal perfect 3cp from שמח denotes rejoicing. Present English 'rejoice'
    works well in prophetic discourse to express the vivid result without awkwardness.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  lexicon: HALOT
  rationale: Literally 'before your face/presence.' 'Before you' is natural English
    and preserves the Godward orientation of the joy.
- source_word: כְּשִׂמְחַת בַּקָּצִיר
  chosen: as with the joy at harvest
  alternatives:
  - like the joy of harvest
  - as in harvest rejoicing
  lexicon: HALOT
  rationale: The phrase compares their rejoicing to harvest-time joy. 'At harvest'
    is idiomatic and clear.
- source_word: כַּאֲשֶׁר יָגִילוּ
  chosen: as men exult when
  alternatives:
  - as they rejoice when
  - as one exults when
  lexicon: HALOT
  rationale: The verb גיל conveys exuberant rejoicing or exultation. 'Exult' preserves
    the heightened tone. Supplying 'men' reflects the masculine plural verbal form
    in a generic sense, in keeping with the gender-accurate policy.
- source_word: בְּחַלְּקָם שָׁלָל
  chosen: they divide spoil
  alternatives:
  - they apportion plunder
  - they divide the booty
  lexicon: HALOT
  rationale: The idiom refers to distributing captured goods after victory. 'Spoil'
    is a standard, readable rendering that preserves the martial image.
