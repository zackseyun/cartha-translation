theological_decisions:
- issue: Textual reading of לא ('not') versus לו ('to it/him') in the second colon
  chosen_reading: 'Main text follows the Masoretic Text: ''you have not increased
    the joy.'''
  alternative_readings:
  - '''you have increased its joy'''
  - '''you have made great its joy'''
  rationale: The Hebrew source provided is the MT and plainly reads לֹא ('not'). Although
    the sense is difficult in context and many witnesses/versions support a reading
    equivalent to לו ('to it'), the translation should not silently emend the text.
    The smoother alternative is preserved in a footnote as a textual variant.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; preserve ambiguity/tension rather than resolve it silently.'
