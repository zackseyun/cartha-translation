id: ISA.9.15
reference: Isaiah 9:15
source:
  edition: WLC
  text: וַ/יִּֽהְי֛וּ מְאַשְּׁרֵ֥י הָֽ/עָם הַ/זֶּ֖ה מַתְעִ֑ים וּ/מְאֻשָּׁרָ֖י/ו מְבֻלָּעִֽים־׃
translation:
  text: And the guides of this people have become those who lead them astray, and
    those guided by them are swallowed up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'those who bless this people are leading them astray, and those blessed
      by them are swallowed up.' The Hebrew forms from אשר can be understood in relation
      to pronouncing someone blessed, though the context also supports 'guides' /
      'those guided.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: have become
  alternatives:
  - were
  - became
  lexicon: HALOT
  rationale: 'The waw-consecutive form of היה here introduces the resulting state:
    the leaders came to be in the condition described. ''Have become'' captures the
    transition with natural English; ''became'' would also be possible.'
- source_word: מְאַשְּׁרֵי
  chosen: the guides of
  alternatives:
  - those who lead
  - leaders of
  - those who call blessed
  lexicon: HALOT
  rationale: From אשר in the Piel/participle form, the term can denote those who lead
    straight/prosper or, by extension, leaders/guides. In context, parallel with 'lead
    astray' and followed by 'those guided by them,' it refers to the people's guides/leaders
    rather than 'those who pronounce blessed.' 'Guides' preserves the verbal nuance
    and sets up the irony of failed leadership.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  lexicon: HALOT
  rationale: עם commonly means 'people.' 'This people' is the more direct rendering
    and matches prophetic diction.
- source_word: מַתְעִים
  chosen: those who lead them astray
  alternatives:
  - misleading
  - causing to wander
  - deceiving
  lexicon: HALOT
  rationale: 'From תעה in the Hiphil participle, the sense is causative: causing others
    to wander or go astray. ''Lead them astray'' is idiomatic and preserves the active,
    causative force.'
- source_word: וּמְאֻשָּׁרָיו
  chosen: those guided by them
  alternatives:
  - those led by them
  - those called blessed by them
  lexicon: HALOT
  rationale: The passive participial form with 3ms suffix most naturally refers to
    the people who are being led by these guides. Given the parallelism with מְאַשְּׁרֵי
    and the context of misdirection, 'those guided by them' best fits. A more literal
    but less clear option is 'those led by him/it,' but the collective sense points
    to the leaders of the people.
- source_word: מְבֻלָּעִים
  chosen: are swallowed up
  alternatives:
  - are engulfed
  - are destroyed
  - are confounded
  lexicon: HALOT
  rationale: From בלע in the passive participle, the core image is being swallowed
    or engulfed. 'Are swallowed up' preserves the vivid metaphor and allows the destructive
    sense to remain implicit rather than overinterpreting it as simply 'destroyed.'
