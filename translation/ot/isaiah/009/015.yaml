theological_decisions:
- issue: Interpretation of אשר forms in this verse
  chosen_reading: Render the paired forms as guides/leaders and those guided by them
  alternative_readings:
  - Render as those who bless/congratulate this people and those called blessed by
    them
  rationale: Although the root אשר can relate to pronouncing someone blessed or happy,
    the immediate context and the parallel with מַתְעִים ('leading astray') favor
    a leadership/guidance sense. This avoids importing a narrower idea of flattery
    when the verse emphasizes corrupt guidance and its consequences. The alternative
    is preserved in a footnote because the Hebrew forms permit it and some translation
    traditions reflect it.
  doctrine_reference: Translation philosophy §3, §5
