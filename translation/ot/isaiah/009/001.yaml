theological_decisions:
- issue: Rendering of צַלְמָוֶת in a messianically significant prophetic text
  chosen_reading: deep darkness
  alternative_readings:
  - shadow of death
  - death-shadow
  rationale: The Hebrew likely functions idiomatically for intense gloom rather than
    explicitly naming death in this context. To preserve theological tension and respect
    translation tradition without letting tradition override probable sense, the main
    text uses 'deep darkness' and the traditional alternative is retained in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
