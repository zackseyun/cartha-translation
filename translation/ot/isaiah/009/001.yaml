id: ISA.9.1
reference: Isaiah 9:1
source:
  edition: WLC
  text: הָ/עָם֙ הַ/הֹלְכִ֣ים בַּ/חֹ֔שֶׁךְ רָא֖וּ א֣וֹר גָּד֑וֹל יֹשְׁבֵי֙ בְּ/אֶ֣רֶץ
    צַלְמָ֔וֶת א֖וֹר נָגַ֥הּ עֲלֵי/הֶֽם׃
translation:
  text: The people walking in darkness have seen a great light; on those dwelling
    in a land of deep darkness, light has shone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a land of the shadow of death.' The Hebrew term צַלְמָוֶת is traditionally
      rendered this way, though it can also denote deep darkness or gloom more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעָם
  chosen: The people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עם commonly denotes a people-group or populace. 'The people' fits the
    singular collective noun and is the most natural English rendering here.
- source_word: הַהֹלְכִים
  chosen: walking
  alternatives:
  - who walk
  - going
  lexicon: HALOT
  rationale: The participle conveys an ongoing state or manner of life. 'Walking'
    preserves the Hebrew imagery without over-paraphrasing.
- source_word: בַּחֹשֶׁךְ
  chosen: in darkness
  alternatives:
  - in the darkness
  lexicon: HALOT
  rationale: The phrase is both literal and metaphorical; English idiom prefers 'in
    darkness' here while preserving the image.
- source_word: רָאוּ
  chosen: have seen
  alternatives:
  - saw
  lexicon: HALOT
  rationale: The perfect can be rendered as a completed action with present relevance
    in English. 'Have seen' works well in prophetic proclamation and avoids flattening
    the force to simple past.
- source_word: אוֹר גָּדוֹל
  chosen: a great light
  alternatives:
  - great light
  lexicon: HALOT
  rationale: Indefinite article is natural in English though absent in Hebrew. The
    adjective-noun pairing is preserved straightforwardly.
- source_word: יֹשְׁבֵי
  chosen: those dwelling
  alternatives:
  - those who dwell
  - the inhabitants
  lexicon: HALOT
  rationale: The participle again marks an ongoing condition. 'Those dwelling' is
    readable and keeps the participial force better than the more interpretive 'inhabitants.'
- source_word: בְּאֶרֶץ
  chosen: in a land
  alternatives:
  - in the land
  - in a country
  lexicon: HALOT
  rationale: The construct phrase with צלמות is best rendered as a qualitative description,
    and English idiom favors 'in a land of...' here.
- source_word: צַלְמָוֶת
  chosen: deep darkness
  alternatives:
  - death-shadow
  - the shadow of death
  - gloom
  lexicon: HALOT
  rationale: While traditionally rendered 'shadow of death,' many lexicons recognize
    the term as an idiom for profound darkness or gloom in several contexts. 'Deep
    darkness' best reflects likely sense here without importing death explicitly into
    the main text. Because the traditional rendering is significant, it is preserved
    in a footnote.
- source_word: אוֹר
  chosen: light
  lexicon: HALOT
  rationale: Simple, direct rendering of the repeated noun; repetition is preserved
    for literary effect.
- source_word: נָגַהּ
  chosen: has shone
  alternatives:
  - shone
  - has dawned
  lexicon: HALOT
  rationale: The verb denotes shining or giving light. 'Has shone' is the most direct
    rendering; 'has dawned' is possible but slightly more interpretive.
- source_word: עֲלֵיהֶם
  chosen: on those
  alternatives:
  - upon them
  - on them
  lexicon: HALOT
  rationale: The preposition is literally 'upon them.' In English, fronting the phrase
    as 'on those dwelling...' yields a natural sentence while preserving the sense.
