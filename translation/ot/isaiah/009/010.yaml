id: ISA.9.10
reference: Isaiah 9:10
source:
  edition: WLC
  text: וַ/יְשַׂגֵּ֧ב יְהוָ֛ה אֶת צָרֵ֥י רְצִ֖ין עָלָ֑י/ו וְ/אֶת אֹיְבָ֖י/ו יְסַכְסֵֽךְ־־׃
translation:
  text: And Yahweh raised up the adversaries of Rezin against him, and stirred up his enemies,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made strong' or 'exalted' the adversaries of Rezin against him.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew keeps the singular pronoun ('against him ... his enemies'); the broader context identifies the target as the northern kingdom/Ephraim.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְשַׂגֵּב
  chosen: raised up
  alternatives:
  - set on high
  - exalted
  - made strong
  lexicon: HALOT
  rationale: The verb from שׂגב in the Hiphil can convey making strong, setting securely on high, or exalting. In this judgment context with hostile agents as object, 'raised up' best captures the causative sense that the LORD empowered or brought forward Rezin's adversaries against Israel, without implying honor.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צָרֵי רְצִין
  chosen: the adversaries of Rezin
  alternatives:
  - Rezin's foes
  - the enemies of Rezin
  lexicon: HALOT
  rationale: The construct phrase literally means 'the adversaries/enemies of Rezin.' 'Adversaries' avoids repeating 'enemies' immediately before אֹיְבָיו later in the verse, while preserving the hostile sense. The phrase refers to those opposed to Rezin, whom the LORD uses against 'him'.
- source_word: עָלָיו
  chosen: against him
  alternatives:
  - over him
  - upon him
  lexicon: HALOT
  rationale: With hostile action, עַל commonly carries the sense 'against.' The 3ms suffix is retained as 'him,' preserving the singular referent in context.
- source_word: אֹיְבָיו
  chosen: his enemies
  alternatives:
  - his foes
  lexicon: HALOT
  rationale: A straightforward rendering of the noun with 3ms suffix. 'Enemies' is the most natural modern English equivalent.
- source_word: יְסַכְסֵךְ
  chosen: stirred up
  alternatives:
  - incited
  - spurred on
  - armed against
  lexicon: HALOT
  rationale: The verb סכסך carries the idea of inciting, provoking, or stirring up hostile conflict. 'Stirred up' is idiomatic and preserves the causative sense of the LORD setting enemies in motion against the referent.
