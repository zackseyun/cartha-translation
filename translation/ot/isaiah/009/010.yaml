theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of the singular pronouns in 'against him' and 'his enemies'
  chosen_reading: Retain the Hebrew singular pronoun as 'him/his' without expanding to a named referent in the main text.
  alternative_readings:
  - against Israel
  - against Ephraim
  - against him (unspecified)
  rationale: The Hebrew text uses singular pronominal suffixes. While the broader context points to the northern kingdom/Ephraim as the target of judgment, the verse itself does not explicitly restate the referent. Preserving 'him/his' avoids importing more specificity than the source text states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve ambiguity where the source is genuinely ambiguous'
