theological_decisions:
- issue: Whether to render the divine title אֲדֹנָי as 'Lord' or substitute covenant-name
    conventions
  chosen_reading: The Lord
  alternative_readings:
  - Lord
  rationale: The source text has אֲדֹנָי, not יְהוָה. Therefore the contested-term
    policy for YHWH does not apply directly. The title should be translated as 'Lord'
    in readable modern English.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Force of the preposition בְּ in relation to Jacob/Israel
  chosen_reading: judgment directed against Jacob/Israel
  alternative_readings:
  - locative 'in Jacob/Israel'
  - directional 'to Jacob'
  rationale: The verse introduces a divine word of judgment, and the second colon
    clarifies its effect by saying it 'fell on Israel.' Rendering the first prepositional
    phrase as 'against Jacob' preserves the punitive thrust without adding content
    beyond the parallelism.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; optimal equivalence.'
