id: ISA.9.7
reference: Isaiah 9:7
source:
  edition: WLC
  text: דָּבָ֛ר שָׁלַ֥ח אֲדֹנָ֖/י בְּ/יַעֲקֹ֑ב וְ/נָפַ֖ל בְּ/יִשְׂרָאֵֽל׃
translation:
  text: The Lord sent a word against Jacob, and it fell on Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The Lord sent a message to Jacob, and it fell upon Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּבָר
  chosen: a word
  alternatives:
  - a message
  - a matter
  lexicon: HALOT
  rationale: דָּבָר commonly denotes 'word' or 'message.' In prophetic judgment context,
    'word' preserves the concise force of a divine pronouncement without over-interpreting
    it as merely speech or event.
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - dispatched
  - has sent
  lexicon: HALOT
  rationale: The verb's basic sense is 'send.' 'Sent' is the most natural English
    rendering and fits the prophetic announcement context.
- source_word: אֲדֹנָי
  chosen: The Lord
  alternatives:
  - the Lord
  lexicon: HALOT
  rationale: The form here is אֲדֹנָי, the divine title 'Lord,' not the Tetragrammaton.
    Per translation philosophy, titles are translated. Capitalized 'The Lord' reflects
    reverential divine title usage in English.
- source_word: בְּיַעֲקֹב
  chosen: against Jacob
  alternatives:
  - into Jacob
  - in Jacob
  - to Jacob
  lexicon: HALOT
  rationale: The preposition בְּ with verbs like 'send' can mark direction or target.
    In this judgment oracle, 'against Jacob' best captures the hostile/penal force
    implied by the parallel 'it fell on Israel.'
- source_word: וְנָפַל
  chosen: and it fell
  alternatives:
  - and it has fallen
  - and it came down
  lexicon: HALOT
  rationale: The verb נפל means 'fall.' The subject is the previously mentioned 'word.'
    'It fell' preserves the vivid metaphor of the divine word landing in effective
    judgment.
- source_word: בְּיִשְׂרָאֵל
  chosen: on Israel
  alternatives:
  - against Israel
  - upon Israel
  - in Israel
  lexicon: HALOT
  rationale: With נפל, English idiom favors 'fall on/upon.' 'On Israel' communicates
    impact while preserving the metaphor. It also matches the judgment sense established
    by the parallelism.
