id: ISA.9.6
reference: Isaiah 9:6
source:
  edition: WLC
  text: ל/םרבה הַ/מִּשְׂרָ֜ה וּ/לְ/שָׁל֣וֹם אֵֽין קֵ֗ץ עַל כִּסֵּ֤א דָוִד֙ וְ/עַל
    מַמְלַכְתּ֔/וֹ לְ/הָכִ֤ין אֹתָ/הּ֙ וּֽ/לְ/סַעֲדָ֔/הּ בְּ/מִשְׁפָּ֖ט וּ/בִ/צְדָקָ֑ה
    מֵ/עַתָּה֙ וְ/עַד עוֹלָ֔ם קִנְאַ֛ת יְהוָ֥ה צְבָא֖וֹת תַּעֲשֶׂה זֹּֽאת־־־־־׃ס
translation:
  text: Of the increase of the dominion and of peace there will be no end, on the
    throne of David and over his kingdom, to establish it and to uphold it with justice
    and with righteousness from now on and forever. The zeal of the LORD of Armies
    will do this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the LORD of hosts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: למרבה
  chosen: Of the increase
  alternatives:
  - To the increase
  - For the increase
  lexicon: HALOT
  rationale: 'The prefixed ל with the noun from רבה is best taken idiomatically to
    introduce the clause: ''of the increase'' or ''to the increase.'' English reads
    most naturally with ''Of the increase,'' preserving the Hebrew sense of ongoing
    expansion rather than paraphrasing as ''His government will continually increase.'''
- source_word: הַמשרה
  chosen: the dominion
  alternatives:
  - the government
  - the rule
  lexicon: HALOT
  rationale: מִשְׂרָה denotes rule or governmental dominion. 'Dominion' preserves
    the royal scope and avoids sounding narrowly bureaucratic, while still fitting
    the Davidic kingship context.
- source_word: ולשלום
  chosen: and of peace
  alternatives:
  - and peace
  - and of well-being
  lexicon: HALOT
  rationale: שָׁלוֹם includes peace, wholeness, and well-being. 'Peace' is the standard
    concise rendering and fits the parallel with dominion; broader nuances are implicit
    rather than expanded in the main text.
- source_word: אין קץ
  chosen: there will be no end
  alternatives:
  - there is no end
  - without end
  lexicon: HALOT
  rationale: The verbless clause literally states 'there is no end,' but in context
    it describes the future perpetuity of the promised reign. 'There will be no end'
    makes the temporal force clear in idiomatic English.
- source_word: על כסא דוד
  chosen: on the throne of David
  alternatives:
  - upon the throne of David
  lexicon: HALOT
  rationale: A straightforward royal image. 'On the throne of David' preserves the
    dynastic and messianic frame without embellishment.
- source_word: ועל ממלכתו
  chosen: and over his kingdom
  alternatives:
  - and over his reign
  lexicon: HALOT
  rationale: מַמְלָכָה is best rendered 'kingdom' here, referring to the Davidic realm.
    The 3ms suffix naturally refers back to David in the immediate syntax, though
    in the larger prophecy it also serves the promised royal heir's Davidic rule.
- source_word: להכין אתה
  chosen: to establish it
  alternatives:
  - to make it firm
  - to set it in order
  lexicon: HALOT
  rationale: כון in the Hiphil commonly means establish, make firm, or prepare. 'Establish
    it' fits the kingdom as the feminine antecedent and pairs well with the following
    verb.
- source_word: ולסעדה
  chosen: and to uphold it
  alternatives:
  - and to sustain it
  - and to support it
  lexicon: HALOT
  rationale: סעד conveys supporting or sustaining. 'Uphold it' is idiomatic in royal/governmental
    context and complements 'establish it' without redundancy.
- source_word: במשפט
  chosen: with justice
  alternatives:
  - by justice
  - with judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment or justice. 'Justice' best conveys the ethical
    and governmental sense in modern English.
- source_word: ובצדקה
  chosen: and with righteousness
  alternatives:
  - and with justice
  lexicon: HALOT
  rationale: צְדָקָה is rendered 'righteousness' to preserve distinction from מִשְׁפָּט.
    The pair expresses both just governance and moral rectitude.
- source_word: מעתה ועד עולם
  chosen: from now on and forever
  alternatives:
  - from this time forth and forevermore
  - from now until eternity
  lexicon: HALOT
  rationale: This idiom expresses unending duration beginning in the present horizon
    of the prophecy. 'From now on and forever' is clear modern English without archaic
    phrasing.
- source_word: קנאת
  chosen: The zeal
  alternatives:
  - The jealousy
  - The ardor
  lexicon: HALOT
  rationale: קִנְאָה can denote jealousy or zeal. In reference to YHWH's covenantal
    commitment to accomplish his promise, 'zeal' is the best English choice and avoids
    misleading connotations of petty envy.
- source_word: יהוה צבאות
  chosen: the LORD of Armies
  alternatives:
  - the LORD of hosts
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' צְבָאוֹת is translated rather
    than transliterated; 'of Armies' communicates the meaning accessibly in modern
    English, while the traditional 'of hosts' is preserved in a footnote as a recognizable
    alternative.
- source_word: תעשה זאת
  chosen: will do this
  alternatives:
  - will accomplish this
  - will bring this about
  lexicon: HALOT
  rationale: עשה with זאת is a simple but forceful promise of divine accomplishment.
    'Will do this' is direct and faithful; more interpretive alternatives are possible
    but unnecessary in the main text.
