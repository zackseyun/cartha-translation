theological_decisions:
- issue: Rendering the royal promise in a way that preserves its Davidic-messianic
    scope without importing later doctrinal formulation into the verse itself
  chosen_reading: Retain the dynastic language ('on the throne of David and over his
    kingdom') and the everlasting scope ('there will be no end ... forever') without
    adding explicit christological identifiers in the translation.
  alternative_readings:
  - Translate more explicitly as a direct messianic title statement tied to later
    Christian interpretation
  rationale: 'The verse, in its literary context, is central to messianic expectation
    and is received christologically within historic Christian orthodoxy. However,
    the translation should state what the Hebrew says: an endless Davidic reign established
    by the LORD. This preserves theological significance without over-translating.'
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Rendering יהוה צבאות
  chosen_reading: the LORD of Armies
  alternative_readings:
  - the LORD of hosts
  rationale: The doctrine excerpt specifies יהוה as 'the LORD.' For צבאות, translating
    the title preserves meaning for modern readers. Because 'the LORD of hosts' is
    a longstanding traditional rendering worth preserving, it is included in a footnote
    rather than used in the main text.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD; Translation philosophy
    #6'
