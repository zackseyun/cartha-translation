theological_decisions:
- issue: Rendering divine title אֲדֹנָי
  chosen_reading: the Lord
  alternative_readings:
  - my Lord
  rationale: Although the form historically derives from a plural with first-person
    suffix, in prophetic usage it functions as the standard divine title. Rendering
    it 'the Lord' communicates reference to Israel's God without introducing a misleading
    possessive nuance.
  doctrine_reference: 'Contested terms: κύριος/Kyrios → Lord; analogous title-rendering
    principle'
- issue: Possessive suffixes on 'young men,' 'fatherless,' and 'widows'
  chosen_reading: their young men ... their fatherless ... their widows
  alternative_readings:
  - his young men ... his fatherless ... his widows
  rationale: The Hebrew suffixes are singular, but the referent is the people/nation
    collectively. English commonly shifts to plural possessive to avoid implying a
    single male owner and to reflect the corporate sense in context.
  doctrine_reference: Translation philosophy §1, §6
