id: ISA.9.16
reference: Isaiah 9:16
source:
  edition: WLC
  text: עַל כֵּ֨ן עַל בַּחוּרָ֜י/ו לֹֽא יִשְׂמַ֣ח אֲדֹנָ֗/י וְ/אֶת יְתֹמָ֤י/ו וְ/אֶת
    אַלְמְנֹתָי/ו֙ לֹ֣א יְרַחֵ֔ם כִּ֤י כֻלּ/וֹ֙ חָנֵ֣ף וּ/מֵרַ֔ע וְ/כָל פֶּ֖ה דֹּבֵ֣ר
    נְבָלָ֑ה בְּ/כָל זֹאת֙ לֹא שָׁ֣ב אַפּ֔/וֹ וְ/ע֖וֹד יָד֥/וֹ נְטוּיָֽה־־־׀־־־־־׃
translation:
  text: Therefore the Lord does not rejoice over their young men, and he does not
    have compassion on their fatherless and their widows; for every one of them is
    godless and an evildoer, and every mouth speaks folly. For all this his anger
    has not turned away, and his hand is still stretched out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'his young men ... his fatherless ... his widows'; the
      English uses 'their' to reflect the collective referent, the people as a whole.
    reason: lexical_alternative
  - marker: b
    text: Or 'every mouth speaks vile folly' or 'disgraceful things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Introduces the consequence of the preceding indictment. 'Therefore' is
    natural modern English and preserves the inferential force.
- source_word: בַּחוּרָיו
  chosen: their young men
  alternatives:
  - his young men
  - their chosen men
  lexicon: HALOT
  rationale: בָּחוּר commonly denotes a young man in the prime of life, not 'chosen
    one' in this context. The suffix is 3ms, but English idiom here naturally renders
    the referent corporately as 'their,' matching the people under judgment in context.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  - my Lord
  lexicon: HALOT
  rationale: In Isaiah this title refers to God. Although morphologically it can reflect
    the form 'my Lord,' in usage it functions as the divine title 'the Lord.' The
    article in English is idiomatic and distinguishes title from direct address.
- source_word: יְתֹמָיו
  chosen: their fatherless
  alternatives:
  - his orphans
  - their orphans
  lexicon: HALOT
  rationale: יָתוֹם denotes a fatherless child/orphan. 'Fatherless' preserves the
    social-legal nuance common in prophetic literature. 'Their' again reflects the
    corporate referent in context.
- source_word: אַלְמְנֹתָיו
  chosen: their widows
  alternatives:
  - his widows
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun with contextual corporate
    possessive in English.
- source_word: יְרַחֵם
  chosen: have compassion
  alternatives:
  - show mercy
  - pity
  lexicon: HALOT
  rationale: רִחַם expresses compassionate mercy. 'Have compassion' is readable modern
    English and avoids flattening the emotional force.
- source_word: כֻלּוֹ
  chosen: every one of them
  alternatives:
  - all of them
  - everyone
  lexicon: HALOT
  rationale: The singular collective with suffix is best unpacked idiomatically in
    English to stress totality across the people.
- source_word: חָנֵף
  chosen: godless
  alternatives:
  - profane
  - hypocritical
  lexicon: HALOT
  rationale: In prophetic usage חָנֵף often conveys impiety or godlessness more than
    mere insincerity. 'Godless' best fits the moral-religious indictment here.
- source_word: מֵרַע
  chosen: an evildoer
  alternatives:
  - wicked
  - one who does evil
  lexicon: HALOT
  rationale: The participial/adjectival form denotes one characterized by evil action.
    'Evildoer' is concise and natural.
- source_word: כָל פֶּה דֹּבֵר נְבָלָה
  chosen: every mouth speaks folly
  alternatives:
  - every mouth speaks disgraceful folly
  - every mouth speaks vile things
  lexicon: HALOT
  rationale: נְבָלָה can denote senseless, disgraceful, or vile speech/conduct. 'Folly'
    preserves the moral-spiritual dimension familiar from Hebrew wisdom and prophetic
    diction, while 'every mouth' keeps the concrete Hebrew expression.
- source_word: בְּכָל זֹאת
  chosen: For all this
  alternatives:
  - In all this
  - Despite all this
  lexicon: HALOT
  rationale: This recurring refrain in Isaiah is idiomatically rendered 'For all this,'
    introducing the unchanged divine judgment.
- source_word: לֹא שָׁב אַפּוֹ
  chosen: his anger has not turned away
  alternatives:
  - his anger has not returned
  - his nose/wrath has not turned back
  lexicon: HALOT
  rationale: אַף literally means 'nose' but idiomatically 'anger/wrath.' 'Has not
    turned away' is the established and accurate idiomatic sense of the clause.
- source_word: יָדוֹ נְטוּיָה
  chosen: his hand is still stretched out
  alternatives:
  - his hand remains outstretched
  lexicon: HALOT
  rationale: A vivid image of ongoing judgment. 'Still stretched out' clearly conveys
    continuing action and matches the refrain's force.
