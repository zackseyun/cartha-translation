id: ISA.9.14
reference: Isaiah 9:14
source:
  edition: WLC
  text: זָקֵ֥ן וּ/נְשׂוּא פָנִ֖ים ה֣וּא הָ/רֹ֑אשׁ וְ/נָבִ֥יא מֽוֹרֶה שֶּׁ֖קֶר ה֥וּא
    הַ/זָּנָֽב־־׃
translation:
  text: The elder and the honored man is the head, and the prophet who teaches falsehood
    is the tail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the old man and the man of high rank.' The Hebrew expression literally
      reads 'the elder and one lifted up of face.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the prophet teaching lies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָקֵן
  chosen: elder
  alternatives:
  - old man
  - elderly man
  lexicon: HALOT
  rationale: The adjective/noun denotes an old man or elder. 'Elder' fits the parallel
    with social leadership in this verse and reads naturally in English without over-specifying
    age alone.
- source_word: וּנְשׂוּא פָנִים
  chosen: and the honored man
  alternatives:
  - and one lifted up of face
  - and the man of high rank
  - and the respected man
  lexicon: HALOT
  rationale: The idiom literally means 'lifted of face,' referring to one shown favor
    or holding elevated status. 'Honored man' captures the social prestige implied
    by the Hebrew idiom in clear modern English.
- source_word: הוּא הָרֹאשׁ
  chosen: is the head
  alternatives:
  - he is the head
  lexicon: HALOT
  rationale: The pronoun plus noun identifies the preceding figure(s) with 'the head.'
    English idiom naturally renders this as 'is the head.' The singular works collectively
    for the class represented by the elder/honored man.
- source_word: וְנָבִיא
  chosen: and the prophet
  alternatives:
  - and a prophet
  lexicon: HALOT
  rationale: With the following participial qualifier, the noun points to a representative
    class. 'The prophet' preserves the Hebrew definiteness implied by the construction
    and the metaphorical pairing with 'the head' and 'the tail.'
- source_word: מוֹרֶה שֶּׁקֶר
  chosen: who teaches falsehood
  alternatives:
  - teaching lies
  - who instructs in falsehood
  - who teaches deception
  lexicon: HALOT
  rationale: The participle plus object describes ongoing activity. 'Teaches falsehood'
    is a direct and readable rendering that preserves the moral and epistemic force
    of שקר without paraphrase.
- source_word: הוּא הַזָּנָב
  chosen: is the tail
  alternatives:
  - he is the tail
  lexicon: HALOT
  rationale: The metaphor contrasts leadership and degradation within the people.
    'Is the tail' preserves the image plainly and matches the preceding 'is the head.'
