theological_decisions:
- issue: Metaphorical identification of social and religious leaders as 'head' and
    'tail'
  chosen_reading: Render the metaphors directly without interpretive expansion.
  alternative_readings:
  - The elder and honored man are the leaders, and the false prophet is the follower/base
    part.
  rationale: The Hebrew uses concrete body-part metaphors that are explained further
    in the next verse. Preserving 'head' and 'tail' maintains the prophetic imagery
    and avoids flattening the rhetoric into commentary.
  doctrine_reference: Translation philosophy §1, §3, §6
