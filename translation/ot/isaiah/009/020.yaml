id: ISA.9.20
reference: Isaiah 9:20
source:
  edition: WLC
  text: מְנַשֶּׁ֣ה אֶת אֶפְרַ֗יִם וְ/אֶפְרַ֨יִם֙ אֶת מְנַשֶּׁ֔ה יַחְדָּ֥ו הֵ֖מָּה
    עַל יְהוּדָ֑ה בְּ/כָל זֹאת֙ לֹא שָׁ֣ב אַפּ֔/וֹ וְ/ע֖וֹד יָד֥/וֹ נְטוּיָֽה־־־־־׃ס
translation:
  text: Manasseh devours Ephraim, and Ephraim Manasseh; together they are against
    Judah. For all this his anger has not turned away, and his hand is still stretched
    out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Manasseh [against/devouring] Ephraim, and Ephraim [against/devouring]
      Manasseh.' The Hebrew omits the verb; 'devours' is supplied from the imagery
      of the previous verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  lexicon: HALOT
  rationale: Proper tribal name; transliterated rather than translated per philosophy
    for names.
- source_word: אֶת
  chosen: '[object marker, untranslated]'
  lexicon: HALOT
  rationale: Direct-object marker has no natural English equivalent and is not represented
    directly in the translation.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  lexicon: HALOT
  rationale: Proper tribal name; transliterated rather than translated.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - together as one
  - jointly
  lexicon: HALOT
  rationale: Adverb marking united action after mutual hostility; 'together' is the
    most natural concise rendering.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - they themselves
  lexicon: HALOT
  rationale: Independent pronoun used for emphasis; English can convey the sense adequately
    with 'they' in context without overloading the line.
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: In this hostile military/social context, 'against' best captures adversative
    force.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Proper tribal/kingdom name; transliterated.
- source_word: בְּכָל זֹאת
  chosen: For all this
  alternatives:
  - In all this
  - Despite all this
  lexicon: HALOT
  rationale: This recurring refrain in the surrounding context is idiomatically rendered
    'For all this,' introducing the unchanged divine judgment.
- source_word: לֹא שָׁב אַפּוֹ
  chosen: his anger has not turned away
  alternatives:
  - his anger has not returned
  - his nose/wrath has not turned back
  lexicon: HALOT
  rationale: אף literally means 'nose' but idiomatically 'anger/wrath.' 'Turned away'
    is the established and contextually clear rendering of שוב with anger in this
    refrain.
- source_word: וְעוֹד
  chosen: still
  alternatives:
  - yet
  - and still
  lexicon: HALOT
  rationale: Marks continuation of judgment; 'still' is concise and natural in English.
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: Literal body-part imagery should be preserved; it signifies ongoing power
    in judgment.
- source_word: נְטוּיָה
  chosen: stretched out
  alternatives:
  - extended
  - outstretched
  lexicon: HALOT
  rationale: Passive/stative participial adjective describing the continuing extension
    of God's hand in judgment; 'stretched out' is idiomatic and vivid.
- source_word: מְנַשֶּׁה אֶת אֶפְרַיִם ... וְאֶפְרַיִם אֶת מְנַשֶּׁה
  chosen: Manasseh devours Ephraim, and Ephraim Manasseh
  alternatives:
  - Manasseh consumes Ephraim, and Ephraim Manasseh
  - Manasseh is against Ephraim, and Ephraim against Manasseh
  lexicon: HALOT
  rationale: The verbless clause is elliptical in Hebrew, continuing the cannibalistic/devouring
    imagery from the previous verse. Supplying 'devours' makes the sense explicit
    in natural English while staying anchored in the immediate context rather than
    flattening it to mere opposition.
