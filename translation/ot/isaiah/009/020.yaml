theological_decisions:
- issue: Referent of 'his anger' and 'his hand' in the refrain
  chosen_reading: The pronouns refer to God, left as 'his' rather than expanded to
    'the LORD's' in the main text.
  alternative_readings:
  - Explicitly supplying 'the LORD's anger' and 'his hand'
  rationale: The immediate literary refrain in Isaiah clearly refers to divine judgment.
    Retaining the pronoun preserves the Hebrew form and the rhetorical cadence, while
    the referent remains clear from context.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
