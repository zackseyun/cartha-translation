id: ISA.9.17
reference: Isaiah 9:17
source:
  edition: WLC
  text: כִּֽי בָעֲרָ֤ה כָ/אֵשׁ֙ רִשְׁעָ֔ה שָׁמִ֥יר וָ/שַׁ֖יִת תֹּאכֵ֑ל וַ/תִּצַּת֙
    בְּ/סִֽבְכֵ֣י הַ/יַּ֔עַר וַ/יִּֽתְאַבְּכ֖וּ גֵּא֥וּת עָשָֽׁן־׃
translation:
  text: For wickedness burns like a fire; it devours brier and thorn, and it kindles
    the thickets of the forest, and they roll upward in a column of smoke.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they swirl upward in rising smoke.' The Hebrew of the final clause is
      difficult; the translation reflects the likely sense of smoke billowing upward.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָעֲרָה
  chosen: burns
  alternatives:
  - has burned
  - blazes
  lexicon: HALOT
  rationale: Qal perfect 3fs from בער with רִשְׁעָה as subject. In prophetic discourse
    the perfect can express a vivid present/resultative sense; 'burns' gives natural
    English while preserving the fire imagery.
- source_word: רִשְׁעָה
  chosen: wickedness
  alternatives:
  - evil
  - guilt
  lexicon: HALOT
  rationale: Abstract noun denoting wickedness/evil. 'Wickedness' best matches the
    moral quality in context and preserves the personified abstraction that acts like
    fire.
- source_word: שָׁמִיר וָשַׁיִת
  chosen: brier and thorn
  alternatives:
  - thorns and briars
  - briers and thistles
  lexicon: HALOT
  rationale: A conventional pair for prickly, useless growth. Exact botanical identification
    is uncertain, so a general rendering is preferable. 'Brier and thorn' is idiomatic
    and keeps the paired imagery.
- source_word: תֹּאכֵל
  chosen: it devours
  alternatives:
  - it consumes
  - it eats up
  lexicon: HALOT
  rationale: From אכל, commonly used metaphorically of fire consuming. 'Devours' is
    vivid and natural in English for fire imagery.
- source_word: וַתִּצַּת
  chosen: and it kindles
  alternatives:
  - and it sets ablaze
  - and it burns
  lexicon: HALOT
  rationale: From יצת, to kindle/set on fire. 'Kindles' preserves the causative nuance
    and the progression from devouring undergrowth to igniting the forest thickets.
- source_word: סִבְכֵי הַיַּעַר
  chosen: the thickets of the forest
  alternatives:
  - the tangled growth of the forest
  - the forest underbrush
  lexicon: HALOT
  rationale: סבך denotes dense intertwined growth or thicket. 'Thickets of the forest'
    is clear, fairly formal, and preserves the image of entangled woodland growth.
- source_word: וַיִּתְאַבְּכוּ
  chosen: and they roll upward
  alternatives:
  - and they swirl upward
  - and they rise
  lexicon: HALOT
  rationale: The verb is difficult and likely refers to the billowing/swirling upward
    movement of smoke. The plural subject is best taken from the smoke masses/plumes
    implied by the following genitive construction. 'Roll upward' captures the visual
    motion without overinterpreting.
- source_word: גֵּאוּת עָשָׁן
  chosen: in a column of smoke
  alternatives:
  - in rising smoke
  - in lofty smoke
  - as a mass of smoke
  lexicon: HALOT
  rationale: גֵּאוּת can denote exaltation, swelling, or rising mass. With עָשָׁן
    the phrase likely describes the towering/billowing form of smoke. 'A column of
    smoke' communicates the image in idiomatic English while staying close to the
    sense of rising mass.
