id: ISA.9.9
reference: Isaiah 9:9
source:
  edition: WLC
  text: לְבֵנִ֥ים נָפָ֖לוּ וְ/גָזִ֣ית נִבְנֶ֑ה שִׁקְמִ֣ים גֻּדָּ֔עוּ וַ/אֲרָזִ֖ים
    נַחֲלִֽיף׃
translation:
  text: Bricks have fallen, but we will rebuild with cut stone; sycamores have been
    cut down, but we will replace them with cedars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "hewn stone" for "cut stone."
    reason: lexical_alternative
  - marker: b
    text: '"Sycamores" refers to sycamore-fig trees.'
    reason: cultural_note
lexical_decisions:
- source_word: לְבֵנִים
  chosen: Bricks
  alternatives:
  - Mud bricks
  - bricks
  lexicon: HALOT
  rationale: The plural noun refers to bricks used in ordinary construction, likely
    sun-dried or baked clay bricks in contrast with the more durable stone mentioned
    next. 'Bricks' is clear modern English; 'mud bricks' is possible but slightly
    more specific than the Hebrew requires.
- source_word: נָפָלוּ
  chosen: have fallen
  alternatives:
  - fell
  - are fallen
  lexicon: HALOT
  rationale: 'The qatal 3cp reports a completed event. Present perfect in English
    fits the taunting, responsive sense: the damage has occurred and now prompts the
    speakers'' resolve.'
- source_word: גָזִית
  chosen: cut stone
  alternatives:
  - hewn stone
  - dressed stone
  lexicon: HALOT
  rationale: The noun denotes worked/hewn masonry stone. 'Cut stone' is natural modern
    English and preserves the contrast with common bricks. 'Hewn stone' is more traditional
    but less idiomatic.
- source_word: נִבְנֶה
  chosen: we will rebuild
  alternatives:
  - we will build
  - let us build
  lexicon: HALOT
  rationale: First person plural imperfect expresses intended future action. 'Rebuild'
    brings out the contextual contrast with what has fallen, though the Hebrew verb
    itself is simply 'build'; the prefix re- is contextually warranted by the preceding
    clause.
- source_word: שִׁקְמִים
  chosen: sycamores
  alternatives:
  - sycamore fig trees
  - fig-mulberries
  lexicon: HALOT
  rationale: Refers to the sycamore-fig tree common in the region. 'Sycamores' is
    the standard concise rendering in English Bible tradition; the fuller botanical
    identification is possible but unnecessarily cumbersome in the main text.
- source_word: גֻּדָּעוּ
  chosen: have been cut down
  alternatives:
  - were felled
  - have been chopped down
  lexicon: HALOT
  rationale: The passive form indicates the trees were cut off/felled. 'Have been
    cut down' is idiomatic and preserves the passive sense.
- source_word: אֲרָזִים
  chosen: cedars
  alternatives:
  - cedar trees
  lexicon: HALOT
  rationale: The plural denotes cedars, prized as stronger and more prestigious timber
    than sycamores. 'Cedars' is sufficient in English.
- source_word: נַחֲלִיף
  chosen: we will replace them with
  alternatives:
  - we will substitute
  - we will exchange for
  lexicon: HALOT
  rationale: The Hiphil of חלף here means to replace or substitute one thing for another.
    'We will replace them with' makes the object shift explicit in natural English
    and captures the boastful upgrading from sycamores to cedars.
