theological_decisions:
- issue: Tone of the speakers' declaration
  chosen_reading: Rendered as a proud, defiant resolve to rebuild with better materials
    after judgment.
  alternative_readings:
  - A neutral statement of reconstruction
  rationale: In context this line expresses arrogant self-confidence rather than humble
    repentance. The English wording preserves that tone without adding interpretive
    commentary beyond what the lexical contrasts imply.
  doctrine_reference: Translation philosophy §1, §3
