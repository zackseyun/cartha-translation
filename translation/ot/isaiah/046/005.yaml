theological_decisions:
- issue: Idolatry polemic phrasing
  chosen_reading: Retain the layered sequence of comparison verbs without collapsing
    them into a single English verb.
  alternative_readings:
  - Simplify to one or two verbs for smoother English
  rationale: The Hebrew uses multiple near-synonymous verbs to intensify the challenge
    against comparing God to idols. Preserving that buildup reflects the text's rhetoric
    without importing additional doctrinal claims.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    sense over tradition and document significant variance.'
