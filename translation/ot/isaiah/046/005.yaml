id: ISA.46.5
reference: Isaiah 46:5
source:
  edition: WLC
  text: לְ/מִ֥י תְדַמְי֖וּ/נִי וְ/תַשְׁו֑וּ וְ/תַמְשִׁל֖וּ/נִי וְ/נִדְמֶֽה׃
translation:
  text: To whom will you liken me and make me equal, and compare me, that we should
    be alike?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'To whom will you compare me and make me equal, and liken me, that we
      may be alike?' The Hebrew piles up several closely related verbs for comparison
      to intensify the rhetorical challenge.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמִי
  chosen: To whom
  alternatives:
  - Whom will you compare me to?
  lexicon: HALOT
  rationale: 'Interrogative with prefixed ל expresses the object of comparison: ''to
    whom?'' Fronting preserves the rhetorical force of the Hebrew question.'
- source_word: תְדַמְיוּנִי
  chosen: will you liken me
  alternatives:
  - will you compare me
  - will you make me like
  lexicon: HALOT
  rationale: Piel of דמה commonly means 'liken, compare.' 'Liken me' preserves the
    comparative sense and the direct object suffix '-ni' ('me').
- source_word: וְתַשְׁווּ
  chosen: and make me equal
  alternatives:
  - and equalize
  - and match
  lexicon: HALOT
  rationale: Hiphil of שוה conveys making equal or placing on the same level. English
    requires supplying the implied object 'me' from the parallel structure. 'Make
    me equal' captures the force better than the less idiomatic 'equal me.'
- source_word: וְתַמְשִׁלוּנִי
  chosen: and compare me
  alternatives:
  - and liken me
  - and match me
  lexicon: HALOT
  rationale: Hiphil of משל in this context means to compare or liken. Since the verse
    intentionally stacks near-synonyms, varying the English slightly avoids awkward
    repetition while preserving the rhetorical accumulation.
- source_word: וְנִדְמֶה
  chosen: that we should be alike
  alternatives:
  - so that we may be similar
  - and be alike
  - that we may resemble one another
  lexicon: HALOT
  rationale: 'Qal cohortative/1cp from דמה expresses the result or supposed outcome
    of the comparisons: ''that we should be alike'' or ''that we may be similar.''
    The 1cp includes both parties in the comparison, so ''we'' should be explicit.'
