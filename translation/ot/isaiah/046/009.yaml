theological_decisions:
- issue: Divine self-identification and exclusivity
  chosen_reading: Render both אֵל and אֱלֹהִים as 'God' and preserve the repeated
    assertion of uniqueness in full.
  alternative_readings:
  - Render אֵל as 'God' and leave אֱלֹהִים implicit in the second clause
  - Translate אֵל as 'Mighty God'
  rationale: 'The Hebrew presents a strong monotheistic declaration through parallel
    clauses: ''I am God'' and ''there is no other ... none like me.'' Repeating ''I
    am God'' in English clarifies the appositional structure and preserves the theological
    emphasis without adding doctrinal content beyond the text.'
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
