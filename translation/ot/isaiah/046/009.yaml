id: ISA.46.9
reference: Isaiah 46:9
source:
  edition: WLC
  text: זִכְר֥וּ רִאשֹׁנ֖וֹת מֵ/עוֹלָ֑ם כִּ֣י אָנֹכִ֥י אֵל֙ וְ/אֵ֣ין ע֔וֹד אֱלֹהִ֖ים
    וְ/אֶ֥פֶס כָּמֽוֹ/נִי׃
translation:
  text: Remember the former things from long ago, for I am God, and there is no other;
    I am God, and there is none like me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from ancient times' or 'from of old.' The Hebrew expression refers to
      the distant past here, not necessarily to eternity in the abstract.
    reason: lexical_alternative
lexical_decisions:
- source_word: זִכְרוּ
  chosen: Remember
  alternatives:
  - Call to mind
  - Recall
  lexicon: HALOT
  rationale: Imperative plural of זכר, calling the audience to active recollection.
    'Remember' is the most natural and direct English imperative.
- source_word: רִאשֹׁנוֹת
  chosen: the former things
  alternatives:
  - the first things
  - the things of old
  lexicon: HALOT
  rationale: The feminine plural adjective used substantivally refers to earlier acts/events.
    'Former things' is idiomatic and fits Isaiah's recurring contrast between former
    and coming things.
- source_word: מֵעוֹלָם
  chosen: from long ago
  alternatives:
  - from of old
  - from ancient times
  - from eternity
  lexicon: HALOT
  rationale: עוֹלָם here denotes remote past rather than abstract eternity. 'From
    long ago' is clear modern English and preserves the temporal sense without overstating
    metaphysical eternity.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: Introduces the ground for the command to remember. 'For' preserves the
    explanatory force succinctly.
- source_word: אָנֹכִי אֵל
  chosen: I am God
  alternatives:
  - I am El
  - I am God Almighty
  lexicon: HALOT
  rationale: אֵל here is the common noun/title for God, not a proper name requiring
    transliteration. 'I am God' is the plain sense and best English equivalent.
- source_word: וְאֵין עוֹד
  chosen: and there is no other
  alternatives:
  - and there is none else
  - and there is no one besides
  lexicon: HALOT
  rationale: This idiom expresses exclusivity. 'No other' is concise, natural, and
    preserves the monotheistic claim.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - god
  - divine being
  lexicon: HALOT
  rationale: Although morphologically plural, in this context it refers to the one
    true God. Rendering as singular 'God' reflects Hebrew usage and the verse's explicit
    claim of uniqueness.
- source_word: וְאֶפֶס כָּמוֹנִי
  chosen: and there is none like me
  alternatives:
  - and there is nothing like me
  - and there is no one comparable to me
  lexicon: HALOT
  rationale: אֶפֶס functions here as 'there is none/nothing,' and with כָּמוֹנִי expresses
    incomparability. 'There is none like me' is idiomatic and preserves the force
    of the claim.
