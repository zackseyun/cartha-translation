theological_decisions:
- issue: Identity of the figure called 'a bird of prey' / 'the man of my purpose'
  chosen_reading: Render the imagery directly without identifying the figure in the
    main text.
  alternative_readings:
  - An allusion to Cyrus
  - A more general instrument of God's judgment/purpose
  rationale: The verse likely points to a historical agent, commonly understood as
    Cyrus in context, but the Hebrew text itself uses metaphor and does not name him
    here. To avoid importing an interpretive identification into the translation,
    the main text preserves the imagery and leaves identification to interpretation.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referent of the feminine suffixes in 'I will bring it to pass' and 'I will
    do it'
  chosen_reading: Use impersonal 'it' referring to God's spoken purpose/plan.
  alternative_readings:
  - '''him'' if taken to refer to the man called from afar'
  - '''this'' referring to the announced event'
  rationale: The feminine pronominal suffix most naturally points to an implicit feminine
    noun such as counsel/purpose/word/deed rather than the masculine 'man.' English
    'it' best captures the implied object without over-defining it.
  doctrine_reference: Translation philosophy §3
