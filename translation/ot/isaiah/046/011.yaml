id: ISA.46.11
reference: Isaiah 46:11
source:
  edition: WLC
  text: קֹרֵ֤א מִ/מִּזְרָח֙ עַ֔יִט מֵ/אֶ֥רֶץ מֶרְחָ֖ק אִ֣ישׁ עצת/ו אַף דִּבַּ֨רְתִּי֙
    אַף אֲבִיאֶ֔/נָּה יָצַ֖רְתִּי אַף אֶעֱשֶֽׂ/נָּה־־־׃ס
translation:
  text: calling from the east a bird of prey, from a distant land the man of my purpose.
    Indeed, I have spoken; indeed, I will bring it to pass. I have formed it; indeed,
    I will do it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the man of my counsel.'
    reason: lexical_alternative
  - marker: b
    text: The figure called from the east is often understood to be Cyrus in the larger
      context, but he is not named in this verse.
    reason: cross_reference
lexical_decisions:
- source_word: קֹרֵא
  chosen: calling
  alternatives:
  - who calls
  - I call
  lexicon: HALOT
  rationale: 'Qal participle masculine singular used of God in context, functioning
    verbally/descriptively: ''calling.'' English participial style preserves the Hebrew
    sequence and links with the prior divine self-description.'
- source_word: מִמִּזְרָח
  chosen: from the east
  alternatives:
  - from sunrise
  - from the place of sunrise
  lexicon: HALOT
  rationale: מִזְרָח commonly denotes east/sunrise. 'From the east' is the most natural
    modern English rendering and fits the geopolitical sense.
- source_word: עַיִט
  chosen: a bird of prey
  alternatives:
  - a ravenous bird
  - an eagle
  lexicon: HALOT
  rationale: The noun denotes a bird of prey/rapacious bird generally, not a specific
    species. 'Bird of prey' is accurate and avoids over-specification.
- source_word: מֵאֶרֶץ מֶרְחָק
  chosen: from a distant land
  alternatives:
  - from a far country
  - from a land far away
  lexicon: HALOT
  rationale: The phrase is idiomatic for geographical remoteness. 'Distant land' is
    clear modern English while retaining the spatial emphasis.
- source_word: אִישׁ עֲצָתוֹ
  chosen: the man of my purpose
  alternatives:
  - the man of my counsel
  - the man who carries out my plan
  lexicon: HALOT
  rationale: The ketiv-like consonantal form in the source line reflects 'his counsel,'
    but in context the referent is God's own plan, and standard vocalization/sense
    is 'the man of my counsel/purpose.' 'Purpose' communicates עֵצָה as plan/intention
    in accessible English without losing force.
- source_word: אַף
  chosen: indeed
  alternatives:
  - surely
  - also
  - 'yes'
  lexicon: HALOT
  rationale: Here אַף intensifies and confirms the following clause rather than simply
    adding information. 'Indeed' preserves the emphatic, asseverative force across
    the repeated clauses.
- source_word: דִּבַּרְתִּי
  chosen: I have spoken
  alternatives:
  - I spoke
  lexicon: HALOT
  rationale: The perfect highlights completed divine utterance with present relevance.
    English present perfect captures that force well in this rhetorical sequence.
- source_word: אֲבִיאֶנָּה
  chosen: I will bring it to pass
  alternatives:
  - I will bring it
  - I will cause it to come
  lexicon: HALOT
  rationale: The feminine suffix refers back to the spoken purpose/plan rather than
    a feminine English noun explicitly present. 'Bring it to pass' idiomatically expresses
    causative fulfillment and avoids awkwardness.
- source_word: יָצַרְתִּי
  chosen: I have formed it
  alternatives:
  - I have purposed it
  - I fashioned it
  lexicon: HALOT
  rationale: יָצַר literally means form/fashion. In prophetic context it can shade
    toward purposeful shaping, but 'formed it' preserves the concrete metaphor and
    echoes divine intentionality.
- source_word: אֶעֱשֶׂנָּה
  chosen: I will do it
  alternatives:
  - I will accomplish it
  - I will make it
  lexicon: HALOT
  rationale: עשה is broad, but 'do it' is both faithful and rhetorically strong here,
    matching the terse Hebrew conclusion.
