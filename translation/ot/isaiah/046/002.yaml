id: ISA.46.2
reference: Isaiah 46:2
source:
  edition: WLC
  text: קָרְס֤וּ כָֽרְעוּ֙ יַחְדָּ֔ו לֹ֥א יָכְל֖וּ מַלֵּ֣ט מַשָּׂ֑א וְ/נַפְשָׁ֖/ם
    בַּ/שְּׁבִ֥י הָלָֽכָה׃ס
translation:
  text: They stoop; they bow down together. They are unable to rescue the burden,
    and they themselves go into captivity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they crouch' for 'They stoop'; the Hebrew verb can suggest sinking down
      or collapsing.
    reason: lexical_alternative
  - marker: b
    text: Or 'and their life/soul goes into captivity.' The Hebrew reads literally
      'and their nephesh went into captivity,' where nephesh can mean 'soul,' 'life,'
      or 'self.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְסוּ
  chosen: they stoop
  alternatives:
  - they crouch
  - they collapse
  lexicon: HALOT
  rationale: The verb denotes sinking or stooping down. 'Stoop' fits the parallel
    with כָּרְעוּ and preserves the image of idols/toppled figures bending low without
    overstating total collapse.
- source_word: כָּרְעוּ
  chosen: they bow down
  alternatives:
  - they kneel
  - they bend low
  lexicon: HALOT
  rationale: Commonly used for kneeling or bowing. 'Bow down' preserves the physical
    image and echoes the irony of idols that themselves must bow.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - altogether
  lexicon: HALOT
  rationale: Adverb indicating joint action; 'together' is the most natural modern
    English rendering.
- source_word: לֹא יָכְלוּ
  chosen: they are unable
  alternatives:
  - they could not
  - they were not able
  lexicon: HALOT
  rationale: Expresses incapacity. Present English in context communicates the general
    inability of the idols in this taunt/oracle.
- source_word: מַלֵּט
  chosen: to rescue
  alternatives:
  - to deliver
  - to save
  lexicon: HALOT
  rationale: The infinitive means to cause escape or deliver. 'Rescue' is clear modern
    English and avoids importing broader theological overtones of 'save' in this immediate
    context.
- source_word: מַשָּׂא
  chosen: the burden
  alternatives:
  - the load
  - their burden
  lexicon: HALOT
  rationale: Refers to the load being carried, likely the idol-images or their freight.
    'The burden' is concise and fits the immediate contrast with inability to deliver
    what is being borne.
- source_word: וְנַפְשָׁם
  chosen: they themselves
  alternatives:
  - their life
  - their soul
  lexicon: HALOT
  rationale: 'נֶפֶשׁ can mean soul, life, self. Here, with the following singular
    feminine verb and in context of idols/personified gods, the sense is reflexive/self-referential:
    they themselves go off into captivity. This is more idiomatic in English than
    ''their soul went.'''
- source_word: בַּשְּׁבִי
  chosen: into captivity
  alternatives:
  - into exile
  - as captives
  lexicon: HALOT
  rationale: Denotes captivity or the state of being taken captive. 'Into captivity'
    is the standard and contextually precise rendering.
- source_word: הָלָכָה
  chosen: go
  alternatives:
  - went
  - has gone
  lexicon: HALOT
  rationale: Though formally perfect 3fs agreeing with נֶפֶשׁ, English idiom with
    the chosen rendering 'they themselves' is best expressed as present 'go' in this
    prophetic depiction. This keeps the line vivid and parallel with the preceding
    present-style clauses.
