id: ISA.46.4
reference: Isaiah 46:4
source:
  edition: WLC
  text: וְ/עַד זִקְנָה֙ אֲנִ֣י ה֔וּא וְ/עַד שֵיבָ֖ה אֲנִ֣י אֶסְבֹּ֑ל אֲנִ֤י עָשִׂ֨יתִי֙
    וַ/אֲנִ֣י אֶשָּׂ֔א וַ/אֲנִ֥י אֶסְבֹּ֖ל וַ/אֲמַלֵּֽט־־׃ס
translation:
  text: Even to your old age, I am he, and to gray hairs I will carry you. I have
    made, and I will bear; I will carry, and I will rescue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will sustain you' for 'I will carry you' / 'I will carry'; the Hebrew
      verb can overlap with 'bear' or 'carry' in the sense of supporting a burden.
    reason: lexical_alternative
  - marker: b
    text: Or 'and I will deliver.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַד
  chosen: Even to
  alternatives:
  - And to
  - Until
  lexicon: HALOT
  rationale: Marks continuance up to a point; 'Even to' brings out the emphatic extension
    of God's care through the whole span of life.
- source_word: זִקְנָה
  chosen: old age
  alternatives:
  - old age
  - oldness
  lexicon: HALOT
  rationale: Standard idiomatic rendering for the stage of life indicated by the noun.
- source_word: אֲנִי הוּא
  chosen: I am he
  alternatives:
  - I am the one
  - it is I
  lexicon: HALOT
  rationale: Retains the terse self-identification of the Hebrew. 'I am he' is idiomatic
    enough in English and preserves the solemn divine self-assertion without overinterpreting.
- source_word: שֵׂיבָה
  chosen: gray hairs
  alternatives:
  - gray age
  - hoary head
  lexicon: HALOT
  rationale: Concrete Hebrew image for advanced age. 'Gray hairs' is natural modern
    English and preserves the metaphor rather than flattening it to 'old age' again.
- source_word: אֶסְבֹּל
  chosen: I will carry
  alternatives:
  - I will bear
  - I will sustain
  lexicon: HALOT
  rationale: In the first occurrence, the context parallels God's carrying his people
    through life, and 'carry' fits the imagery established in the surrounding passage.
    'Sustain' is interpretive; 'bear' is possible but less vivid here.
- source_word: עָשִׂיתִי
  chosen: I have made
  alternatives:
  - I made
  - I have acted
  lexicon: HALOT
  rationale: The verb most naturally means 'make/do.' In context it refers to God's
    having made his people, grounding his continued care. Present perfect English
    conveys prior action with continuing relevance.
- source_word: אֶשָּׂא
  chosen: I will bear
  alternatives:
  - I will carry
  - I will lift up
  lexicon: HALOT
  rationale: Using 'bear' here provides a slight distinction from the surrounding
    סבל forms while preserving the semantic overlap. It conveys supportive carrying
    rather than merely lifting.
- source_word: אֶסְבֹּל
  chosen: I will carry
  alternatives:
  - I will bear
  - I will sustain
  lexicon: HALOT
  rationale: For the second occurrence, 'carry' resumes the life-long support imagery
    and creates a balanced sequence with 'I will bear.' The variation is stylistic
    but still within the semantic range; the repeated Hebrew term is documented here
    rather than mechanically flattened.
- source_word: וַאֲמַלֵּט
  chosen: and I will rescue
  alternatives:
  - and I will save
  - and I will deliver
  lexicon: HALOT
  rationale: The piel of מלט commonly means to bring to safety or deliver. 'Rescue'
    is clear modern English and avoids importing fuller soteriological language where
    the immediate sense is deliverance.
