theological_decisions:
- issue: Divine self-identification in אֲנִי הוּא
  chosen_reading: I am he
  alternative_readings:
  - I am the one
  - it is I
  rationale: The phrase is rendered straightforwardly without importing later theological
    formulations, while preserving the solemnity of God's self-declaration. This maintains
    theological weight without overreading the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
