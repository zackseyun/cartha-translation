id: ISA.46.13
reference: Isaiah 46:13
source:
  edition: WLC
  text: קֵרַ֤בְתִּי צִדְקָתִ/י֙ לֹ֣א תִרְחָ֔ק וּ/תְשׁוּעָתִ֖/י לֹ֣א תְאַחֵ֑ר וְ/נָתַתִּ֤י
    בְ/צִיּוֹן֙ תְּשׁוּעָ֔ה לְ/יִשְׂרָאֵ֖ל תִּפְאַרְתִּֽ/י׃ס
translation:
  text: I have brought near my righteousness; it is not far away, and my salvation
    will not delay. I will place salvation in Zion, my splendor for Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my justice' or 'my vindication' for 'my righteousness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my glory' for 'my splendor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קֵרַבְתִּי
  chosen: I have brought near
  alternatives:
  - I bring near
  - I caused to come near
  lexicon: HALOT
  rationale: Qal perfect 1cs of קרב, expressing completed action with present relevance.
    'I have brought near' preserves the perfect aspect and the causative sense in
    context better than a simple present.
- source_word: צִדְקָתִי
  chosen: my righteousness
  alternatives:
  - my justice
  - my vindication
  lexicon: HALOT
  rationale: צדקה commonly denotes righteousness, but in prophetic salvation contexts
    can overlap with justice or vindicating action. 'Righteousness' is the default
    and preserves the theological breadth without narrowing it to forensic vindication
    alone.
- source_word: לֹא תִרְחָק
  chosen: it is not far away
  alternatives:
  - it will not be far off
  - it shall not recede
  lexicon: HALOT
  rationale: The verb רחק in the imperfect 3fs agrees with 'my righteousness.' English
    idiom is smoother with 'it is not far away,' conveying imminent nearness rather
    than physical recession.
- source_word: וּתְשׁוּעָתִי
  chosen: and my salvation
  alternatives:
  - and my deliverance
  - and my victory
  lexicon: HALOT
  rationale: תשועה often means salvation or deliverance. 'Salvation' best fits the
    broader Isaianic theological context and maintains consistency with common biblical
    usage.
- source_word: לֹא תְאַחֵר
  chosen: will not delay
  alternatives:
  - will not tarry
  - will not be late
  lexicon: HALOT
  rationale: Piel imperfect of אחר means to delay or tarry. 'Will not delay' is clear
    modern English and preserves the future/imminent force.
- source_word: וְנָתַתִּי
  chosen: I will place
  alternatives:
  - I will give
  - I will set
  lexicon: HALOT
  rationale: נתן is broad ('give, set, place'). With בְצִיּוֹן and an abstract object,
    'place' communicates the locative sense more naturally than 'give in Zion,' while
    remaining close to the Hebrew.
- source_word: בְצִיּוֹן
  chosen: in Zion
  alternatives:
  - for Zion
  lexicon: HALOT
  rationale: The preposition ב is locative here. 'In Zion' is the most direct rendering.
- source_word: תְּשׁוּעָה
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: HALOT
  rationale: Repeating 'salvation' reflects the Hebrew repetition and preserves the
    thematic emphasis.
- source_word: לְיִשְׂרָאֵל
  chosen: for Israel
  alternatives:
  - to Israel
  lexicon: HALOT
  rationale: The preposition ל can be rendered 'for' or 'to.' 'For Israel' fits the
    sense of salvation bestowed on behalf of Israel.
- source_word: תִּפְאַרְתִּי
  chosen: my splendor
  alternatives:
  - my glory
  - my beauty
  lexicon: HALOT
  rationale: 'תפארת can denote beauty, glory, or splendor. ''My splendor'' preserves
    the sense of majestic honor without importing later technical associations of
    ''glory.'' The appositional construction is retained: salvation in Zion, my splendor
    for Israel.'
