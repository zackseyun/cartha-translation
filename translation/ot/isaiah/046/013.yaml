theological_decisions:
- issue: Meaning of 'my righteousness' in parallel with 'my salvation'
  chosen_reading: Retain 'my righteousness' as a broad theological term closely linked
    with God's saving action, without collapsing it into either moral attribute alone
    or forensic vindication alone.
  alternative_readings:
  - my justice
  - my vindication
  rationale: In Isaiah, God's righteousness often includes his faithful, saving intervention.
    Rendering it simply as 'justice' or 'vindication' would foreground one aspect
    and reduce the productive theological tension of the Hebrew parallelism.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
- issue: Relation of 'my splendor' to Israel
  chosen_reading: Translate the final phrase appositionally as 'my splendor for Israel,'
    leaving the compressed Hebrew relation intact.
  alternative_readings:
  - Israel my glory
  - for Israel, my glory
  - my glory to Israel
  rationale: The Hebrew is terse and can be taken in more than one syntactic way.
    The chosen rendering preserves the ambiguity while still reading naturally in
    English, rather than over-resolving whether Israel is the recipient, manifestation,
    or locus of God's splendor.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
