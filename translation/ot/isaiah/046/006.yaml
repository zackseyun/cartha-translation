id: ISA.46.6
reference: Isaiah 46:6
source:
  edition: WLC
  text: הַ/זָּלִ֤ים זָהָב֙ מִ/כִּ֔יס וְ/כֶ֖סֶף בַּ/קָּנֶ֣ה יִשְׁקֹ֑לוּ יִשְׂכְּר֤וּ
    צוֹרֵף֙ וְ/יַעֲשֵׂ֣/הוּ אֵ֔ל יִסְגְּד֖וּ אַף יִֽשְׁתַּחֲוּֽוּ־׃
translation:
  text: Those who lavish gold from the purse and weigh out silver on the scale hire
    a goldsmith, and he makes it into a god; they bow down, indeed they prostrate
    themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and weigh out silver with the balance-beam'; the Hebrew term literally
      refers to a reed/cane and may denote the measuring beam of a scale.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַזָּלִים
  chosen: Those who lavish
  alternatives:
  - Those who pour out
  - Those who spend freely
  lexicon: HALOT
  rationale: The participle from זלל/זלל-like usage here describes people freely pouring
    out or expending wealth. 'Those who lavish' captures the ongoing participial force
    and the sense of extravagant expenditure in context of idol manufacture.
- source_word: זָהָב מִכִּיס
  chosen: gold from the purse
  alternatives:
  - gold from the bag
  - gold out of the pouch
  lexicon: HALOT
  rationale: כִּיס denotes a purse or bag for money. 'Purse' is natural modern English
    and fits the image of spending wealth.
- source_word: וְכֶסֶף בַּקָּנֶה יִשְׁקֹלוּ
  chosen: and weigh out silver on the scale
  alternatives:
  - and weigh silver with the reed
  - and weigh silver in the balance
  lexicon: HALOT
  rationale: קָנֶה literally means 'reed,' but in this commercial context likely refers
    metonymically to a measuring rod or beam of a balance. English idiom favors 'on
    the scale' to communicate the act of weighing money accurately without obscuring
    the sense.
- source_word: יִשְׂכְּרוּ צוֹרֵף
  chosen: hire a goldsmith
  alternatives:
  - hire a refiner
  - pay a metalworker
  lexicon: HALOT
  rationale: צורף is a metalworker, often specifically a smelter/refiner or goldsmith.
    Since the materials are gold and silver and the object is an idol, 'goldsmith'
    is the most contextually precise rendering.
- source_word: וְיַעֲשֵׂהוּ אֵל
  chosen: and he makes it into a god
  alternatives:
  - and he makes it a god
  - and he fashions it as a god
  lexicon: HALOT
  rationale: The suffix on 'makes' refers to the precious metal just mentioned. 'Makes
    it into a god' clearly expresses the transformation of crafted material into an
    idol regarded as deity.
- source_word: יִסְגְּדוּ
  chosen: they bow down
  alternatives:
  - they fall down
  - they do obeisance
  lexicon: HALOT
  rationale: סגד denotes bowing in homage or worship. 'Bow down' is standard, clear,
    and preserves the worshipful posture.
- source_word: אַף יִשְׁתַּחֲווּ
  chosen: indeed they prostrate themselves
  alternatives:
  - yes, they worship
  - even they bow themselves
  lexicon: HALOT
  rationale: The combination intensifies the previous verb. Rendering אַף as 'indeed'
    preserves emphasis, and 'prostrate themselves' gives a stronger second action
    than merely repeating 'bow down,' reflecting the rhetorical escalation.
