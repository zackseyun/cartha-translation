theological_decisions:
- issue: Rendering idol terminology without implying true deity
  chosen_reading: a god
  alternative_readings:
  - god
  - an idol
  rationale: The Hebrew uses אֵל, literally 'god,' in a polemical context about idol
    manufacture. Rendering 'a god' preserves the source wording while the surrounding
    context makes clear this is a man-made false deity. 'An idol' would interpret
    rather than translate the lexical choice.
  doctrine_reference: Translation philosophy §1, §3
