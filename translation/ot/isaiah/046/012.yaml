id: ISA.46.12
reference: Isaiah 46:12
source:
  edition: WLC
  text: שִׁמְע֥וּ אֵלַ֖/י אַבִּ֣ירֵי לֵ֑ב הָ/רְחוֹקִ֖ים מִ/צְּדָקָֽה׃
translation:
  text: Listen to me, you stubborn of heart, you who are far from righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''mighty of heart'' or ''strong-hearted''; the Hebrew expression is
      rendered here according to its likely negative sense in context: obstinate or
      stubborn in heart.'
    reason: lexical_alternative
  - marker: b
    text: Or 'far from justice' or 'far from vindication.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Listen
  alternatives:
  - Hear
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Listen' is natural modern English and preserves
    the summons to heed, not merely to perceive sound.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Direct prepositional phrase indicating the addressee of the command.
    'To me' is idiomatic contemporary English.
- source_word: אַבִּירֵי לֵב
  chosen: stubborn of heart
  alternatives:
  - mighty of heart
  - strong-hearted
  - hard-hearted
  lexicon: HALOT
  rationale: Literally 'mighty/strong of heart,' but in this prophetic rebuke the
    idiom denotes obstinacy or self-willed inner disposition rather than courage.
    'Stubborn of heart' best conveys the negative force in context while staying close
    to the Hebrew imagery.
- source_word: הָרְחוֹקִים
  chosen: you who are far
  alternatives:
  - the ones far off
  - those who are distant
  lexicon: HALOT
  rationale: Substantival participle with article, describing the addressed group.
    Rendering with a relative clause is clear and natural in English.
- source_word: מִצְּדָקָה
  chosen: from righteousness
  alternatives:
  - from justice
  - from vindication
  lexicon: HALOT
  rationale: צְדָקָה commonly denotes 'righteousness,' and this aligns with the default
    handling of righteousness language in the project. 'Justice' is possible in some
    contexts, but here the contrast with their inner obstinacy favors moral/spiritual
    'righteousness' in the main text.
