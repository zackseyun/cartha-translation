theological_decisions:
- issue: Rendering of צְדָקָה
  chosen_reading: righteousness
  alternative_readings:
  - justice
  - vindication
  rationale: The Hebrew term can overlap with justice or saving vindication, but in
    this rebuke the sense is best taken as being morally/spiritually far from what
    is right. This preserves the prophetic force without narrowing it to forensic
    or social categories alone.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness / justice
    preserved where relevant'
