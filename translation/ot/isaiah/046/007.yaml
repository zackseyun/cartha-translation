theological_decisions:
- issue: Generic masculine singular in the final clause
  chosen_reading: Rendered generically as 'someone ... him ... his distress'
  alternative_readings:
  - Rendered fully formally as 'he cries out ... it does not save him from his distress'
  - Rendered inclusively as 'a person cries out ... it does not save them from their
    distress'
  rationale: The Hebrew singular is grammatically masculine but functions generically.
    Following the project's gender-accurate policy, the translation preserves singular
    reference without flattening the source into plural 'them.' 'Someone' signals
    generic force while retaining the subsequent singular pronouns.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
