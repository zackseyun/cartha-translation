id: ISA.46.7
reference: Isaiah 46:7
source:
  edition: WLC
  text: יִ֠שָּׂאֻ/הוּ עַל כָּתֵ֨ף יִסְבְּלֻ֜/הוּ וְ/יַנִּיחֻ֤/הוּ תַחְתָּי/ו֙ וְ/יַֽעֲמֹ֔ד
    מִ/מְּקוֹמ֖/וֹ לֹ֣א יָמִ֑ישׁ אַף יִצְעַ֤ק אֵלָי/ו֙ וְ/לֹ֣א יַעֲנֶ֔ה מִ/צָּרָת֖/וֹ
    לֹ֥א יוֹשִׁיעֶֽ/נּוּ־־׃ס
translation:
  text: They lift it onto the shoulder, they carry it, and they set it in its place,
    and it stands there; it does not move from its place. Even if someone cries out
    to it, it does not answer; it does not save him from his distress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'they set it under it,' likely meaning they set the idol
      in its place or on its pedestal/base.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׂאֻהוּ
  chosen: they lift it
  alternatives:
  - they carry it
  - they bear it
  lexicon: HALOT
  rationale: From נשׂא, here the initial action of hoisting the idol. 'Lift' distinguishes
    this verb from the following סבל ('carry/bear'), preserving the sequence of actions.
- source_word: עַל כָּתֵף
  chosen: onto the shoulder
  alternatives:
  - on the shoulder
  - upon a shoulder
  lexicon: HALOT
  rationale: The singular 'shoulder' is idiomatic in Hebrew for shoulder-borne transport.
    'Onto the shoulder' fits the motion implied by the preceding verb.
- source_word: יִסְבְּלֻהוּ
  chosen: they carry it
  alternatives:
  - they bear it
  - they haul it
  lexicon: HALOT
  rationale: From סבל, denoting bearing a load. 'Carry' is natural modern English
    and keeps the burden imagery without sounding overly wooden.
- source_word: וְיַנִּיחֻהוּ תַחְתָּיו
  chosen: they set it in its place
  alternatives:
  - they set it down in its place
  - they place it under itself
  lexicon: HALOT
  rationale: The idiom likely means placing the idol on its pedestal/base, i.e., where
    it belongs. A hyper-literal 'under it' is obscure in English; 'in its place' communicates
    the sense clearly while remaining close to the context.
- source_word: וְיַעֲמֹד
  chosen: it stands there
  alternatives:
  - it stands
  - it remains standing
  lexicon: HALOT
  rationale: Refers to the idol once positioned. Adding 'there' makes the English
    flow naturally and reflects the situational sense.
- source_word: מִמְּקוֹמוֹ לֹא יָמִישׁ
  chosen: it does not move from its place
  alternatives:
  - it does not budge from its place
  - it does not depart from its place
  lexicon: HALOT
  rationale: מושׁ/מישׁ here conveys moving away or being displaced. 'Does not move
    from its place' is straightforward and preserves the mockery of the idol's immobility.
- source_word: אַף
  chosen: Even if
  alternatives:
  - even
  - indeed if
  lexicon: HALOT
  rationale: 'Introduces an emphatic concessive idea: even in the event of prayer,
    the idol remains useless. ''Even if'' captures this force in idiomatic English.'
- source_word: יִצְעַק אֵלָיו
  chosen: someone cries out to it
  alternatives:
  - he cries out to it
  - one cries out to it
  lexicon: HALOT
  rationale: The Hebrew uses a 3ms singular with generic force. 'Someone' conveys
    the indefinite subject naturally in modern English without over-specifying.
- source_word: וְלֹא יַעֲנֶה
  chosen: it does not answer
  alternatives:
  - it will not answer
  - it does not respond
  lexicon: HALOT
  rationale: ענה in this context is the standard verb for answering a cry or prayer.
    Present-tense English suits the prophetic taunt's vividness.
- source_word: מִצָּרָתוֹ לֹא יוֹשִׁיעֶנּוּ
  chosen: it does not save him from his distress
  alternatives:
  - it does not deliver him from his trouble
  - it cannot rescue him from his distress
  lexicon: HALOT
  rationale: צָרָה is distress/trouble, and ישׁע in Hiphil is save/deliver. 'Save
    ... from his distress' preserves the theological weight of failed deliverance
    while remaining readable.
