id: ISA.46.3
reference: Isaiah 46:3
source:
  edition: WLC
  text: שִׁמְע֤וּ אֵלַ/י֙ בֵּ֣ית יַעֲקֹ֔ב וְ/כָל שְׁאֵרִ֖ית בֵּ֣ית יִשְׂרָאֵ֑ל הַֽ/עֲמֻסִים֙
    מִנִּי בֶ֔טֶן הַ/נְּשֻׂאִ֖ים מִנִּי רָֽחַם־־־׃
translation:
  text: Listen to me, house of Jacob, and all the remnant of the house of Israel,
    who have been carried by me from the womb, borne by me from the womb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew uses two related expressions: ''from the belly'' and ''from the
      womb,'' a poetic parallel for God''s care from earliest life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Listen
  alternatives:
  - Hear
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Listen' is natural modern English and preserves
    the summons to attentive hearing better than the more archaic-sounding 'Hear'.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Direct object of attention after the imperative; 'to me' is the plain
    modern equivalent.
- source_word: בֵּית יַעֲקֹב
  chosen: house of Jacob
  lexicon: HALOT
  rationale: Standard idiom for the covenant people descended from Jacob; retained
    formally rather than paraphrasing as 'descendants of Jacob'.
- source_word: וְכָל שְׁאֵרִית בֵּית יִשְׂרָאֵל
  chosen: and all the remnant of the house of Israel
  alternatives:
  - and all who remain of the house of Israel
  lexicon: HALOT
  rationale: שְׁאֵרִית commonly denotes a 'remnant,' an important prophetic term.
    Retaining 'remnant' preserves both lexical continuity and theological resonance
    in Isaiah.
- source_word: הָעֲמֻסִים
  chosen: who have been carried
  alternatives:
  - who have been loaded
  - who have been borne
  lexicon: HALOT
  rationale: Passive participle from עמס. In context, contrasted with idols that must
    be carried (vv. 1–2), the sense is that Israel has been carried by God. 'Carried'
    communicates the image clearly in English.
- source_word: מִנִּי
  chosen: by me
  alternatives:
  - from me
  lexicon: HALOT
  rationale: 'Here the preposition marks agency with the passive participles: Israel
    is carried/borne by God. Rendering ''by me'' best fits the syntax and context.'
- source_word: בֶּטֶן
  chosen: from the womb
  alternatives:
  - from the belly
  lexicon: HALOT
  rationale: Idiomatic reference to earliest existence/birth. 'Womb' is the standard
    English equivalent in this context.
- source_word: הַנְּשֻׂאִים
  chosen: borne
  alternatives:
  - lifted up
  - carried
  lexicon: HALOT
  rationale: Passive participle from נשׂא. Using 'borne' for the second participle
    preserves the poetic parallelism while avoiding awkward repetition of 'carried'
    twice in English.
- source_word: רָחַם
  chosen: from the womb
  alternatives:
  - from the uterus
  - from the mother’s womb
  lexicon: HALOT
  rationale: Though distinct from בטן, רָחַם in this context also refers to the womb.
    Rendering both as 'womb' gives natural English while preserving the parallel image;
    the lexical distinction is documented here and preserved in a footnote.
