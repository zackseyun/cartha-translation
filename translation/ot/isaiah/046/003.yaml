theological_decisions:
- issue: Prophetic 'remnant' terminology
  chosen_reading: remnant
  alternative_readings:
  - those who remain
  rationale: The Hebrew שְׁאֵרִית is a loaded Isaianic term. Retaining 'remnant' preserves
    the theological and literary continuity of Isaiah without adding interpretive
    content beyond the text.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms)
- issue: Agency in the passive participles
  chosen_reading: carried by me ... borne by me
  alternative_readings:
  - loaded from the womb ... carried from the womb
  rationale: The immediate context contrasts idols that are carried by humans with
    the LORD carrying his people. Rendering מִנִּי as agency ('by me') best reflects
    the discourse flow and avoids obscuring the theological contrast.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
