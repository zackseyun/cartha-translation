id: ISA.46.1
reference: Isaiah 46:1
source:
  edition: WLC
  text: כָּרַ֥ע בֵּל֙ קֹרֵ֣ס נְב֔וֹ הָיוּ֙ עֲצַבֵּי/הֶ֔ם לַ/חַיָּ֖ה וְ/לַ/בְּהֵמָ֑ה
    נְשֻׂאֹתֵי/כֶ֣ם עֲמוּס֔וֹת מַשָּׂ֖א לַ/עֲיֵפָֽה׃
translation:
  text: Bel bows down; Nebo stoops. Their idols are for the beasts and the cattle.
    Your loads are borne, loaded as a burden for the weary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their images.' The Hebrew term can denote fashioned images, but in this
      prophetic context it refers polemically to idols.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of 'your loads are borne' is difficult; it likely refers to the
      idol-images being carried as cargo in procession or transport.
    reason: lexical_alternative
  - marker: c
    text: Or 'a burden for the exhausted beast.' The final phrase may point specifically
      to the weariness of the animal carrying the idols.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּרַע
  chosen: bows down
  alternatives:
  - has bowed down
  - kneels
  lexicon: HALOT
  rationale: Qal perfect 3ms of כרע, used prophetically to depict collapse/humiliation.
    Present English gives vividness in line with prophetic perfect usage.
- source_word: בֵּל
  chosen: Bel
  rationale: Proper name of the Babylonian deity; transliterated per policy for personal/divine
    names.
- source_word: קֹרֵס
  chosen: stoops
  alternatives:
  - crouches
  - bends low
  lexicon: HALOT
  rationale: Participle of קרס conveying sagging/collapsing. 'Stoops' pairs naturally
    with 'bows down' while preserving the image of humiliation.
- source_word: נְבוֹ
  chosen: Nebo
  rationale: Proper name of the Babylonian deity; transliterated rather than translated.
- source_word: עֲצַבֵּיהֶם
  chosen: their idols
  alternatives:
  - their images
  - their carved images
  lexicon: HALOT
  rationale: עצב in this context refers to idol-images. 'Idols' is the clearest modern
    English rendering and reflects the polemical force of the passage.
- source_word: לַחַיָּה וְלַבְּהֵמָה
  chosen: for the beasts and the cattle
  alternatives:
  - for animals and livestock
  - for wild animals and domestic animals
  lexicon: HALOT
  rationale: The paired nouns distinguish animal kinds broadly. 'Beasts and the cattle'
    preserves the concrete imagery of idols being loaded onto animals.
- source_word: נְשֻׂאֹתֵיכֶם
  chosen: your loads are borne
  alternatives:
  - the things you carry are borne
  - your carried things
  lexicon: HALOT
  rationale: The form is difficult, but in context it refers to the objects carried
    in procession. Rendering it as 'your loads are borne' preserves the carrying imagery
    and the likely address to idolaters.
- source_word: עֲמוּסוֹת
  chosen: loaded
  alternatives:
  - heavily loaded
  - laden
  lexicon: HALOT
  rationale: Passive participle from עמס, describing the burdened state of the carried
    objects/animals. 'Loaded' is concise and natural.
- source_word: מַשָּׂא
  chosen: as a burden
  alternatives:
  - a load
  - a burden
  lexicon: HALOT
  rationale: משא denotes a load/burden. 'As a burden' fits the syntax with the following
    phrase and highlights the irony that the gods become burdens.
- source_word: לַעֲיֵפָה
  chosen: for the weary
  alternatives:
  - for the exhausted animal
  - to the weary
  lexicon: HALOT
  rationale: From עיף, 'weary/exhausted.' The feminine singular likely agrees with
    an implied beast of burden or functions collectively; 'for the weary' preserves
    the sense without over-specifying.
