theological_decisions:
- issue: Rendering of pagan cult images
  chosen_reading: their idols
  alternative_readings:
  - their images
  rationale: The Hebrew term here is polemical in prophetic context, referring not
    neutrally to artistic representations but to false gods embodied in images. 'Idols'
    preserves the theological critique without adding content beyond the text.
  doctrine_reference: Translation philosophy §1, §6
