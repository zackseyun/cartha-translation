id: ISA.30.19
reference: Isaiah 30:19
source:
  edition: WLC
  text: כִּי עַ֛ם בְּ/צִיּ֥וֹן יֵשֵׁ֖ב בִּ/ירֽוּשָׁלִָ֑ם בָּכ֣וֹ לֹֽא תִבְכֶּ֗ה חָנ֤וֹן
    יָחְנְ/ךָ֙ לְ/ק֣וֹל זַעֲקֶ֔/ךָ כְּ/שָׁמְעָת֖/וֹ עָנָֽ/ךְ־־׃
translation:
  text: For a people in Zion will dwell in Jerusalem; you will surely weep no more.
    He will surely be gracious to you at the sound of your cry; when he hears it,
    he will answer you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''weeping, you will not weep''—an emphatic construction meaning
      ''you will surely not weep'' or ''you will weep no more.'''
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''being gracious, he will be gracious to you''—an emphatic construction
      stressing the certainty of the LORD''s favor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the ground for the preceding promise/judgment reversal. 'For'
    fits the discourse connection naturally in English.
- source_word: עַם
  chosen: a people
  alternatives:
  - people
  lexicon: HALOT
  rationale: Indefinite in form but refers collectively to Zion's inhabitants. 'A
    people' preserves the noun's collective sense without over-specifying.
- source_word: בְּצִיּוֹן
  chosen: in Zion
  lexicon: HALOT
  rationale: Retains the covenant-geographic name as a proper noun, not paraphrased
    as merely 'on Mount Zion' or 'among Zion'.
- source_word: יֵשֵׁב
  chosen: will dwell
  alternatives:
  - will live
  - will sit
  lexicon: HALOT
  rationale: ישׁב commonly means 'dwell/live' in settlement contexts. 'Will dwell'
    best matches the restoration setting and pairs well with 'in Jerusalem.'
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard transliteration of the place name; preserves the parallel with
    Zion.
- source_word: בָּכוֹ לֹא תִבְכֶּה
  chosen: you will surely weep no more
  alternatives:
  - you shall not weep at all
  - weeping, you will not weep
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the negation. 'Surely
    weep no more' captures both emphasis and idiomatic English.
- source_word: חָנוֹן יָחְנְךָ
  chosen: He will surely be gracious to you
  alternatives:
  - He will certainly show you favor
  - He will indeed have mercy on you
  lexicon: HALOT
  rationale: Infinitive absolute plus imperfect again gives emphasis. The root חנן
    denotes showing favor/grace. 'Be gracious to you' is a standard, theologically
    transparent rendering.
- source_word: לְקוֹל זַעֲקֶךָ
  chosen: at the sound of your cry
  alternatives:
  - when he hears your cry
  - because of the sound of your outcry
  lexicon: HALOT
  rationale: Literally 'to/at the sound of your cry.' This preserves the auditory
    imagery before the next clause explicitly mentions hearing.
- source_word: כְּשָׁמְעָתוֹ
  chosen: when he hears it
  alternatives:
  - as soon as he hears
  - when he hears
  lexicon: HALOT
  rationale: Temporal sense with כְּ plus infinitive/construct form and pronominal
    suffix. 'It' refers back to the cry and avoids awkward repetition while preserving
    the object.
- source_word: עָנָךְ
  chosen: he will answer you
  alternatives:
  - he has answered you
  - he will respond to you
  lexicon: HALOT
  rationale: From ענה ('answer/respond'). In context of future restoration promises,
    an English future is most natural. The ketiv/qere-like gender irregularity in
    the suffix is not reflected in translation, since the referent is the people/Zion
    collectively.
