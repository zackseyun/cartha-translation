theological_decisions:
- issue: Divine subject implied in the latter clauses
  chosen_reading: Render the subject as 'He' referring to the LORD
  alternative_readings:
  - Leave the subject more implicit in English
  rationale: Hebrew verbal forms imply the subject from context; in this section the
    gracious responder is clearly the LORD. English requires an explicit subject for
    clarity, and 'He' preserves the personal divine action without adding content
    beyond the context.
