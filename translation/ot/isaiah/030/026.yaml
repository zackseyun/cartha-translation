id: ISA.30.26
reference: Isaiah 30:26
source:
  edition: WLC
  text: וְ/הָיָ֤ה אֽוֹר הַ/לְּבָנָה֙ כְּ/א֣וֹר הַֽ/חַמָּ֔ה וְ/א֤וֹר הַֽ/חַמָּה֙ יִהְיֶ֣ה
    שִׁבְעָתַ֔יִם כְּ/א֖וֹר שִׁבְעַ֣ת הַ/יָּמִ֑ים בְּ/י֗וֹם חֲבֹ֤שׁ יְהוָה֙ אֶת שֶׁ֣בֶר
    עַמּ֔/וֹ וּ/מַ֥חַץ מַכָּת֖/וֹ יִרְפָּֽא־־׃ס
translation:
  text: And the light of the moon will be like the light of the sun, and the light
    of the sun will be sevenfold, like the light of seven days, on the day when the
    LORD binds up the fracture of his people and heals the wound from his blow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the bruise/crushing caused by his blow.' The Hebrew can be rendered
      with slightly different injury imagery, but the sense is that the LORD heals
      the damage associated with his striking.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will be
  alternatives:
  - and it shall be
  - then it will happen
  lexicon: HALOT
  rationale: Introduces the future state described in the verse. In English, the existential/resultative
    force is best carried by supplying the future copula in the clause rather than
    a wooden 'and it shall be.'
- source_word: אוֹר
  chosen: light
  alternatives:
  - brightness
  - radiance
  lexicon: HALOT
  rationale: The noun refers to luminous light here, repeated for moon and sun. 'Light'
    is the most direct and natural rendering.
- source_word: הַלְּבָנָה
  chosen: the moon
  alternatives:
  - the white one
  lexicon: HALOT
  rationale: Though etymologically related to whiteness, in context it is the standard
    poetic term for the moon.
- source_word: כְּאוֹר הַחַמָּה
  chosen: like the light of the sun
  alternatives:
  - as the sunlight
  - like the brightness of the sun
  lexicon: HALOT
  rationale: Preserves the explicit comparison and repeated noun structure while remaining
    idiomatic.
- source_word: הַחַמָּה
  chosen: the sun
  alternatives:
  - the heat
  - the solar orb
  lexicon: HALOT
  rationale: In this context the noun clearly denotes the sun, not abstract heat.
- source_word: שִׁבְעָתַיִם
  chosen: sevenfold
  alternatives:
  - seven times
  - seven times as much
  lexicon: HALOT
  rationale: The dual-like adverbial form expresses multiplication by seven. 'Sevenfold'
    is concise and idiomatic in elevated prophetic style.
- source_word: כְּאוֹר שִׁבְעַת הַיָּמִים
  chosen: like the light of seven days
  alternatives:
  - like the light of seven days combined
  - like seven days' light
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the poetic image and avoids over-interpreting
    whether the sense is cumulative or simply intensified. The likely idiom of concentrated
    light can be inferred by readers.
- source_word: בְּיוֹם
  chosen: on the day when
  alternatives:
  - in the day when
  - when
  lexicon: HALOT
  rationale: This temporal construction introduces the occasion of restoration. 'On
    the day when' preserves the prophetic register and temporal specificity.
- source_word: חֲבֹשׁ
  chosen: binds up
  alternatives:
  - bandages
  - wraps up
  lexicon: HALOT
  rationale: Common healing/restoration imagery. 'Binds up' is both literal enough
    and familiar in biblical English.
- source_word: שֶׁבֶר
  chosen: fracture
  alternatives:
  - brokenness
  - breach
  - broken bone
  lexicon: HALOT
  rationale: The term can denote a breaking or fracture. 'Fracture' fits the medical
    metaphor created by 'binds up' and pairs well with the following healing language.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his nation
  lexicon: HALOT
  rationale: Standard covenantal sense of עַם with 3ms suffix. 'His people' is the
    natural English rendering.
- source_word: וּמַחַץ
  chosen: and heals the wound
  alternatives:
  - and the crushing
  - and the bruise
  lexicon: HALOT
  rationale: In construct with the following noun, the phrase denotes the injury/crushing
    effect. English requires an object for 'heals,' and 'wound' captures the resultant
    injury in a readable way.
- source_word: מַכָּתוֹ
  chosen: from his blow
  alternatives:
  - of his striking
  - inflicted by him
  - his wound
  lexicon: HALOT
  rationale: The suffix most naturally refers to the LORD as the one who struck, yielding
    'the wound from his blow.' This preserves the theological tension that the same
    LORD who wounded now heals. Rendering it merely as 'his wound' in English could
    wrongly suggest the wound belongs to the people rather than deriving from God's
    striking.
- source_word: יִרְפָּא
  chosen: heals
  alternatives:
  - will heal
  lexicon: HALOT
  rationale: 'English present in a temporal subordinate clause after future main clauses
    is idiomatic: ''on the day when ... heals.'' The sense remains future relative
    to the prophecy.'
