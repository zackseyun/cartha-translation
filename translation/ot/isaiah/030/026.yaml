theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton and aligns
    with established reverential English convention without obscuring that the covenant
    God is the subject.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Referent of the suffix in מַכָּתוֹ
  chosen_reading: the wound from his blow
  alternative_readings:
  - his wound
  - their wound
  rationale: The most coherent reading in context is that the suffix refers to the
    LORD, so that he heals the injury caused by his own striking. This preserves the
    prophetic theme of divine judgment followed by divine restoration, rather than
    softening the text by obscuring God's agency.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
