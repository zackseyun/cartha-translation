id: ISA.30.11
reference: Isaiah 30:11
source:
  edition: WLC
  text: ס֚וּרוּ מִנֵּי דֶ֔רֶךְ הַטּ֖וּ מִנֵּי אֹ֑רַח הַשְׁבִּ֥יתוּ מִ/פָּנֵ֖י/נוּ
    אֶת קְד֥וֹשׁ יִשְׂרָאֵֽל־־־׃ס
translation:
  text: Turn aside from the way; depart from the path; remove the Holy One of Israel
    from before us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cause the Holy One of Israel to cease from before us,' preserving the
      more literal causative force of the Hebrew verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: סוּרוּ
  chosen: Turn aside
  alternatives:
  - Turn away
  - Leave
  lexicon: HALOT
  rationale: Imperative plural from סור, calling for deviation or withdrawal. 'Turn
    aside' preserves the image of moving off a course and fits the parallel with the
    following command.
- source_word: מִנֵּי דֶרֶךְ
  chosen: from the way
  alternatives:
  - out of the way
  - from the road
  lexicon: HALOT
  rationale: The preposition plus 'way' expresses movement away from a course. 'The
    way' keeps the metaphorical force and matches prophetic usage better than the
    more idiomatic but less literal 'out of the way.'
- source_word: הַטּוּ
  chosen: depart
  alternatives:
  - turn aside
  - deviate
  lexicon: HALOT
  rationale: Imperative plural from נטה, here parallel to סוּרוּ. 'Depart' provides
    natural English variation while preserving the command to move off course.
- source_word: מִנֵּי אֹרַח
  chosen: from the path
  alternatives:
  - out of the path
  - from the track
  lexicon: HALOT
  rationale: אֹרַח is a near-synonym of דֶרֶךְ. 'Path' preserves the poetic parallelism
    without flattening both nouns into the same English word.
- source_word: הַשְׁבִּיתוּ
  chosen: remove
  alternatives:
  - cause to cease
  - put an end to
  - take away
  lexicon: HALOT
  rationale: 'Hiphil imperative of שבת in a causative sense: make something cease
    or be absent. In context the object is ''the Holy One of Israel'' from their presence,
    so ''remove'' communicates the hostile demand clearly in idiomatic English.'
- source_word: מִפָּנֵינוּ
  chosen: from before us
  alternatives:
  - from our presence
  - out of our sight
  lexicon: HALOT
  rationale: Literally 'from our face/presence.' 'From before us' is slightly formal
    but transparent and preserves the spatial-relational sense better than the more
    interpretive 'out of our sight.'
- source_word: אֶת קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  lexicon: HALOT
  rationale: A fixed Isaianic divine title. It should be translated consistently and
    fully, preserving both holiness language and covenantal identification with Israel.
