theological_decisions:
- issue: Referent of 'the Holy One of Israel'
  chosen_reading: A divine title for Israel's God, retained as a title rather than
    paraphrased.
  alternative_readings:
  - A metonymic reference to Isaiah's prophetic message or to God's holiness abstractly
  rationale: In Isaiah this expression functions as a recurring title for the LORD.
    The verse reports the people's rejection of God's confronting presence and word;
    translating the title directly preserves that theological force without interpretive
    paraphrase.
  doctrine_reference: Affirmations; Translation philosophy §§1, 5
