theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of תּוֹרָה in prophetic covenant context
  chosen_reading: the law
  alternative_readings:
  - instruction
  - teaching
  rationale: The verse condemns covenant rebellion against YHWH's authoritative Torah. 'The law' best preserves that covenantal and juridical weight in English, while 'instruction' remains a legitimate lexical alternative worth preserving.
