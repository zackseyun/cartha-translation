theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH. This preserves covenantal significance without adopting a reconstructed
    pronunciation in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering of תּוֹרָה in prophetic covenant context
  chosen_reading: the law
  alternative_readings:
  - instruction
  - teaching
  rationale: The verse condemns covenant rebellion against YHWH's authoritative Torah.
    'The law' best preserves that covenantal and juridical weight in English, while
    'instruction' remains a legitimate lexical alternative worth preserving.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
