id: ISA.30.9
reference: Isaiah 30:9
source:
  edition: WLC
  text: כִּ֣י עַ֤ם מְרִי֙ ה֔וּא בָּנִ֖ים כֶּחָשִׁ֑ים בָּנִ֕ים לֹֽא אָב֥וּ שְׁמ֖וֹעַ תּוֹרַ֥ת יְהוָֽה־׃
translation:
  text: For they are a rebellious people, lying children, children unwilling to hear the law of Yahweh,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deceptive children' or 'children who lie.'
    reason: lexical_alternative
  - marker: b
    text: Or 'children who refuse to hear' or 'children unwilling to listen to the instruction of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the reason/explanation for the preceding prophetic assessment. 'For' preserves the explanatory force in natural English.
- source_word: עַם
  chosen: people
  alternatives:
  - nation
  lexicon: HALOT
  rationale: The singular collective noun refers to the covenant community as a whole. 'People' is the most natural collective rendering here.
- source_word: מְרִי
  chosen: rebellious
  alternatives:
  - rebellion
  - stubbornly rebellious
  lexicon: HALOT
  rationale: 'The noun denotes rebellion or obstinacy; in apposition with ''people'' it is best rendered adjectivally in English: ''a rebellious people.'' This preserves the moral-covenantal sense without overexpansion.'
- source_word: בָּנִים
  chosen: children
  alternatives:
  - sons
  lexicon: HALOT
  rationale: Although literally 'sons/children,' the term here addresses the people metaphorically as offspring. 'Children' fits the representative sense better in modern English and avoids implying only males.
- source_word: כֶּחָשִׁים
  chosen: lying
  alternatives:
  - deceptive
  - 'false'
  - liars
  lexicon: HALOT
  rationale: The adjective/noun describes those characterized by falsehood. 'Lying children' is concise and preserves the sharp prophetic accusation. 'Deceptive' is possible but less direct; 'liars' would be more interpretive than the Hebrew construction requires.
- source_word: לֹא אָבוּ
  chosen: unwilling
  alternatives:
  - not willing
  - refused
  lexicon: HALOT
  rationale: 'The verb expresses volition: they were not willing/they refused. ''Unwilling'' reads smoothly with the infinitive that follows and preserves the emphasis on obstinate refusal.'
- source_word: שְׁמ֖וֹעַ
  chosen: to hear
  alternatives:
  - to listen to
  - to obey
  lexicon: HALOT
  rationale: The basic sense is 'hear/listen.' In covenant contexts it can shade toward obedience, but the immediate wording is auditory-receptive. 'To hear' keeps the lexical form while allowing the implied obedience to remain present without being overtranslated.
- source_word: תּוֹרַת
  chosen: the law
  alternatives:
  - instruction
  - teaching
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction broadly, but in prophetic covenantal context 'the law' remains a strong and recognizable rendering. It preserves the authoritative covenantal sense. 'Instruction' is viable but somewhat flattens the legal-covenantal force here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
