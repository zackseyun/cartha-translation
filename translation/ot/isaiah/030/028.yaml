id: ISA.30.28
reference: Isaiah 30:28
source:
  edition: WLC
  text: וְ/רוּח֞/וֹ כְּ/נַ֤חַל שׁוֹטֵף֙ עַד צַוָּ֣אר יֶֽחֱצֶ֔ה לַ/הֲנָפָ֥ה גוֹיִ֖ם
    בְּ/נָ֣פַת שָׁ֑וְא וְ/רֶ֣סֶן מַתְעֶ֔ה עַ֖ל לְחָיֵ֥י עַמִּֽים־׃
translation:
  text: and his breath is like an overflowing stream; it reaches up to the neck, to
    sift nations with a sieve of emptiness, and a misleading bridle is on the jaws
    of the peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his spirit' or 'his wind' for 'his breath.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with a sieve of vanity,' 'with a sieve of falsehood,' or 'with a worthless
      sieve.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a bridle that leads astray' on the cheeks/jaws of the peoples.
    reason: lexical_alternative
lexical_decisions:
- source_word: רוּחוֹ
  chosen: his breath
  alternatives:
  - his spirit
  - his wind
  lexicon: HALOT
  rationale: רוּחַ can mean breath, wind, or spirit. In this judgment-theophany context,
    paired with imagery of an overflowing torrent and proceeding from YHWH's mouth
    in the surrounding verse, 'breath' best captures the destructive exhalation while
    preserving the concrete metaphor.
- source_word: כְּנַחַל שׁוֹטֵף
  chosen: like an overflowing stream
  alternatives:
  - like a rushing torrent
  - like a flooding wadi
  lexicon: HALOT
  rationale: נחל is a stream/wadi; שוטף adds the sense of overflowing, flooding, or
    sweeping onward. 'Overflowing stream' is natural English and preserves the image
    of forceful inundation.
- source_word: עַד צַוָּאר יֶחֱצֶה
  chosen: it reaches up to the neck
  alternatives:
  - it divides up to the neck
  - it rises to the neck
  lexicon: HALOT
  rationale: The verb חצה literally means divide/split, but in this flood image many
    understand it idiomatically as reaching or sweeping up to neck level. 'Reaches
    up to the neck' communicates the extent of the inundation in clear English without
    forcing an unnatural literalism.
- source_word: לַהֲנָפָה
  chosen: to sift
  alternatives:
  - to shake
  - to winnow
  lexicon: HALOT
  rationale: The noun/infinitival form from נוף here conveys a shaking or tossing
    action associated with sifting/winnowing. Because it is followed by 'with a sieve,'
    'to sift' is the most coherent English rendering.
- source_word: גוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: In Isaiah this term commonly denotes nations in the geopolitical sense.
    'Nations' fits the judgment context better than 'Gentiles' here.
- source_word: בְּנָפַת שָׁוְא
  chosen: with a sieve of emptiness
  alternatives:
  - with a sieve of vanity
  - with a destructive sieve
  - with a worthless sieve
  lexicon: HALOT
  rationale: נפה is a sieve. שוא often means emptiness, vanity, falsehood, or worthlessness.
    'Emptiness' preserves the stark image of futile, annihilating judgment without
    overinterpreting the precise nuance.
- source_word: רֶסֶן
  chosen: bridle
  alternatives:
  - bit
  lexicon: HALOT
  rationale: רסן denotes a bridle or controlling harness for directing an animal.
    'Bridle' best suits the metaphor of forced guidance.
- source_word: מַתְעֶה
  chosen: misleading
  alternatives:
  - causing to wander
  - leading astray
  - deceptive
  lexicon: HALOT
  rationale: From תעה, the participial/adjectival sense is causing to stray or go
    astray. 'Misleading' is concise modern English and preserves the active sense
    of leading off course.
- source_word: עַל לְחָיֵי עַמִּים
  chosen: is on the jaws of the peoples
  alternatives:
  - is in the jaws of the peoples
  - is on the cheeks of the peoples
  lexicon: HALOT
  rationale: לחי can refer to jaw or cheek. In connection with a bridle, 'jaws' is
    the more fitting anatomical term in English, preserving the animal-guidance metaphor.
    'Peoples' reflects עמים as plural groups, distinct from the earlier גוים only
    stylistically.
