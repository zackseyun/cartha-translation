theological_decisions:
- issue: Referent of the pronoun in 'his breath'
  chosen_reading: The pronoun refers to the LORD in the immediate context of divine
    judgment.
  alternative_readings:
  - an impersonal storm-force
  rationale: The surrounding context describes the LORD's coming in wrath and the
    effect of his voice. Rendering the pronoun straightforwardly as 'his' preserves
    the personal divine agency without importing additional doctrinal claims.
