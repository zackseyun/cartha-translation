theological_decisions:
- issue: Rendering the impurity image in relation to idols
  chosen_reading: The verse depicts radical repudiation of idolatry by comparing the
    idols to something ritually unclean and discarded.
  alternative_readings:
  - A softened metaphor such as 'filthy rag' without menstrual reference
  rationale: The Hebrew specifically invokes menstrual impurity, and the translation
    should preserve that concrete cultic image rather than generalize it into mere
    dirtiness. This does not import extra theology; it retains the text's own rhetoric
    of uncleanness and rejection.
  doctrine_reference: Translation philosophy §§1, 6
