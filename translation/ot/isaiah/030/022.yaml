id: ISA.30.22
reference: Isaiah 30:22
source:
  edition: WLC
  text: וְ/טִמֵּאתֶ֗ם אֶת צִפּוּי֙ פְּסִילֵ֣י כַסְפֶּ֔/ךָ וְ/אֶת אֲפֻדַּ֖ת מַסֵּכַ֣ת
    זְהָבֶ֑/ךָ תִּזְרֵ/ם֙ כְּמ֣וֹ דָוָ֔ה צֵ֖א תֹּ֥אמַר לֽ/וֹ־־׃
translation:
  text: And you will defile the silver overlay of your carved idols and the gold plating
    of your cast images. You will scatter them like a menstrual cloth; you will say
    to them, “Go out!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “like a menstruous thing” or “like an unclean menstrual rag.” The Hebrew
      comparison explicitly evokes menstrual impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְטִמֵּאתֶם
  chosen: And you will defile
  alternatives:
  - And you will make unclean
  - And you will treat as unclean
  lexicon: HALOT
  rationale: The verb טמא in the piel commonly means to make unclean/defile. 'Defile'
    is concise and idiomatic in English while preserving the cultic sense that the
    idol coverings are to be treated as polluted.
- source_word: צִפּוּי
  chosen: overlay
  alternatives:
  - covering
  - plating
  lexicon: HALOT
  rationale: The noun denotes a covering or overlay, especially metal plating over
    an object. 'Overlay' fits the first phrase well and distinguishes it from the
    second expression while preserving the idea of a surface layer.
- source_word: פְּסִילֵי כַסְפֶּךָ
  chosen: your carved idols
  alternatives:
  - your carved images of silver
  - your silver idols
  lexicon: HALOT
  rationale: פְּסִילִים are carved images/idols. Because כַסְפֶּךָ is governed by
    צִפּוּי ('overlay of ... silver'), the phrase is best represented as idols whose
    overlay is silver. 'Carved idols' makes the referent explicit and natural in English.
- source_word: אֲפֻדַּת
  chosen: plating
  alternatives:
  - covering
  - ornament
  lexicon: HALOT
  rationale: This rare noun refers to a covering or plated layer. Given the parallel
    with צִפּוּי and the metal material that follows, 'plating' is the clearest English
    choice.
- source_word: מַסֵּכַת זְהָבֶךָ
  chosen: your cast images
  alternatives:
  - your molten images
  - your metal idols
  lexicon: HALOT
  rationale: מַסֵּכָה refers to a cast or molten image, often an idol. 'Cast images'
    is a standard and accurate rendering; 'gold' is represented in the preceding noun
    phrase as the material of the plating.
- source_word: תִּזְרֵם
  chosen: You will scatter them
  alternatives:
  - You will throw them away
  - You will winnow them away
  lexicon: HALOT
  rationale: זרה in the qal can mean scatter/winnow. In context of rejecting idols,
    the sense is discarding them forcefully. 'Scatter them' preserves the literal
    image while still implying disposal.
- source_word: כְּמוֹ דָוָה
  chosen: like a menstrual cloth
  alternatives:
  - like a menstruous thing
  - like an unclean rag
  lexicon: HALOT
  rationale: דָוָה refers to a menstruating woman or menstrual impurity; here it functions
    as a comparison for something ritually unclean and discarded. 'Menstrual cloth'
    makes the image explicit in natural modern English without euphemistic flattening.
- source_word: צֵא
  chosen: Go out!
  alternatives:
  - Get out!
  - Away!
  lexicon: HALOT
  rationale: The imperative יצא addressed to the idols expresses decisive expulsion.
    'Go out!' is direct and preserves the verbal force without adding slangy tone.
- source_word: לוֹ
  chosen: to them
  alternatives:
  - to it
  lexicon: Hebrew grammar
  rationale: Although the suffix is morphologically singular, collective or distributive
    reference after plural idol terms allows idiomatic English plural. 'To them' best
    matches the sense of addressing the discarded idols as a group.
