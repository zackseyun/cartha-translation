id: ISA.30.18
reference: Isaiah 30:18
source:
  edition: WLC
  text: וְ/לָ/כֵ֞ן יְחַכֶּ֤ה יְהוָה֙ לַֽ/חֲנַנְ/כֶ֔ם וְ/לָ/כֵ֥ן יָר֖וּם לְ/רַֽחֶמְ/כֶ֑ם
    כִּֽי אֱלֹהֵ֤י מִשְׁפָּט֙ יְהוָ֔ה אַשְׁרֵ֖י כָּל ח֥וֹכֵי לֽ/וֹ־־׃ס
translation:
  text: Therefore the LORD waits to be gracious to you, and therefore he rises up
    to show you mercy; for the LORD is a God of justice. Blessed are all who wait
    for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'therefore he is exalted to show you mercy' or 'therefore he exalts
      himself to show you mercy.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְלָכֵן
  chosen: Therefore
  alternatives:
  - And therefore
  - So
  lexicon: HALOT
  rationale: Marks an inferential/resultative transition. 'Therefore' preserves the
    rhetorical linkage and is natural English.
- source_word: יְחַכֶּה
  chosen: waits
  alternatives:
  - longs
  - delays
  lexicon: HALOT
  rationale: From חכה, 'to wait.' Here it depicts YHWH's deliberate waiting in relation
    to showing favor. 'Waits' is the plain lexical sense and preserves the tension
    of delayed grace without overinterpreting motive. 'Longs' would import desire
    more strongly than the verb itself requires.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the LXX pattern.
- source_word: לַחֲנַנְכֶם
  chosen: to be gracious to you
  alternatives:
  - to show you favor
  - to have mercy on you
  lexicon: HALOT
  rationale: From חנן, 'to show favor, be gracious.' 'To be gracious to you' best
    preserves the covenantal and theological nuance of undeserved favor. 'Have mercy'
    would blur the distinction from the following רחם term.
- source_word: יָרוּם
  chosen: rises up
  alternatives:
  - is exalted
  - exalts himself
  - stands up
  lexicon: HALOT
  rationale: From רום, Qal, literally 'be high/rise.' In this context, paired with
    an infinitive of compassionate action, it likely conveys active movement into
    intervention. 'Rises up' preserves the verbal imagery and avoids the more abstract
    'is exalted,' though that remains a viable alternative.
- source_word: לְרַחֶמְכֶם
  chosen: to show you mercy
  alternatives:
  - to have compassion on you
  - to pity you
  lexicon: HALOT
  rationale: From רחם, 'to have compassion/show mercy.' 'Show you mercy' is idiomatic
    and keeps a meaningful distinction from the previous 'be gracious.' 'Have compassion'
    is possible but slightly less idiomatic in this construction.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the preceding statement. 'For' fits the explanatory
    force in English biblical style without sounding archaic here.
- source_word: אֱלֹהֵי מִשְׁפָּט
  chosen: a God of justice
  alternatives:
  - the God of justice
  - a God of judgment
  lexicon: HALOT
  rationale: The construct phrase denotes God's character. 'A God of justice' is idiomatic
    English predication after the preceding clause. 'Justice' better captures מִשְׁפָּט
    here than 'judgment,' since the point is God's just governance as the reason his
    timing is trustworthy.
- source_word: אַשְׁרֵי
  chosen: Blessed are
  alternatives:
  - Happy are
  - Fortunate are
  lexicon: HALOT
  rationale: Standard wisdom-style beatitude formula. 'Blessed are' preserves the
    covenantal and theological resonance better than the flatter 'happy are.'
- source_word: כָּל
  chosen: all
  alternatives:
  - everyone
  lexicon: HALOT
  rationale: Straightforward rendering of the universal quantifier; pairs naturally
    with the plural participle.
- source_word: חוֹכֵי
  chosen: who wait
  alternatives:
  - who hope
  - who look eagerly
  lexicon: HALOT
  rationale: 'Participle of חכה, matching the earlier finite verb and creating a deliberate
    wordplay: the LORD waits, and blessed are those who wait for him. ''Wait'' preserves
    that literary echo better than ''hope.'''
- source_word: לוֹ
  chosen: for him
  alternatives:
  - for the LORD
  - on him
  lexicon: HALOT
  rationale: The preposition plus pronoun naturally yields 'for him.' This preserves
    the relational orientation and echoes common biblical idiom of waiting for God.
