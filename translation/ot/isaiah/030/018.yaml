theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This also aligns with the verse's liturgical and covenantal tone.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of יָרוּם in context
  chosen_reading: he rises up
  alternative_readings:
  - he is exalted
  - he exalts himself
  rationale: The Hebrew can be understood either as a movement toward action or as
    exaltation. In this context, parallel to 'waits to be gracious' and followed by
    'to show you mercy,' the active sense 'rises up' best fits the flow. The alternative
    is preserved in a footnote because the ambiguity is genuine and theologically
    relevant to whether the emphasis is on divine action or divine majesty.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
