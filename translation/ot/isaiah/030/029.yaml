id: ISA.30.29
reference: Isaiah 30:29
source:
  edition: WLC
  text: הַ/שִּׁיר֙ יִֽהְיֶ֣ה לָ/כֶ֔ם כְּ/לֵ֖יל הִתְקַדֶּשׁ חָ֑ג וְ/שִׂמְחַ֣ת לֵבָ֗ב
    כַּֽ/הוֹלֵךְ֙ בֶּֽ/חָלִ֔יל לָ/ב֥וֹא בְ/הַר יְהוָ֖ה אֶל צ֥וּר יִשְׂרָאֵֽל־־־׃
translation:
  text: The song will be for you as in the night when a feast is consecrated, and
    gladness of heart as when one goes with the flute to come to the mountain of the
    LORD, to the Rock of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as on the night when a feast is consecrated.' The Hebrew comparison
      may point specifically to a festival night, likely in a pilgrimage setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'with a flute' or 'with pipe music.' The Hebrew noun refers to a wind
      instrument used in festive procession.
    reason: lexical_alternative
  - marker: c
    text: '''The LORD'' renders the divine name YHWH; alternatively, ''Yahweh.'''
    reason: alternative_reading
  - marker: d
    text: Or 'to Israel's Rock.' 'Rock' is a divine title emphasizing strength and
      refuge.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשִּׁיר
  chosen: the song
  alternatives:
  - song
  lexicon: HALOT
  rationale: With the article, the noun is best rendered 'the song,' likely referring
    to celebratory singing in context. English keeps the definiteness.
- source_word: יִהְיֶה לָכֶם
  chosen: will be for you
  alternatives:
  - shall be yours
  - will belong to you
  lexicon: HALOT
  rationale: The idiom expresses what the people will experience or possess. 'Will
    be for you' is natural and preserves the Hebrew structure without over-paraphrase.
- source_word: כְּלֵיל
  chosen: as in the night
  alternatives:
  - like the night of
  - as on the night of
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. Because the following infinitive-like
    construction specifies the kind of night, 'as in the night' preserves the simile
    while reading naturally.
- source_word: הִתְקַדֶּשׁ חָג
  chosen: when a feast is consecrated
  alternatives:
  - when a feast is sanctified
  - of the consecration of a feast
  - when a festival is made holy
  lexicon: HALOT
  rationale: The verb קדשׁ in the hitpael/passive-like usage here refers to a feast
    being set apart as holy. 'Consecrated' communicates cultic sanctification more
    clearly than the broader 'made holy.'
- source_word: חָג
  chosen: feast
  alternatives:
  - festival
  lexicon: HALOT
  rationale: '''Feast'' fits the pilgrimage-festival setting and keeps the celebratory-religious
    sense. ''Festival'' is possible, but ''feast'' better matches the likely liturgical
    context.'
- source_word: וְשִׂמְחַת לֵבָב
  chosen: and gladness of heart
  alternatives:
  - and joy of heart
  - with gladness of heart
  lexicon: HALOT
  rationale: A nominal phrase parallel to the preceding clause. 'Gladness of heart'
    is idiomatic English and preserves the Hebrew anthropological expression.
- source_word: כַּהוֹלֵךְ
  chosen: as when one goes
  alternatives:
  - like one going
  - as a person goes
  lexicon: HALOT
  rationale: The comparative כ plus participle introduces a second simile. 'As when
    one goes' gives smooth English while retaining the generic singular force.
- source_word: בֶּחָלִיל
  chosen: with the flute
  alternatives:
  - with a flute
  - to flute music
  - with pipe
  lexicon: HALOT
  rationale: חליל denotes a flute or pipe. 'The flute' works generically in English
    for instrumental accompaniment; 'pipe' is possible but less natural for modern
    readers.
- source_word: לָבוֹא
  chosen: to come
  alternatives:
  - to enter
  - to go
  lexicon: HALOT
  rationale: The infinitive expresses purpose or direction toward worship at Zion.
    'To come' fits pilgrimage language from the worshiper's perspective and avoids
    flattening the motion.
- source_word: בְהַר יְהוָה
  chosen: to the mountain of the LORD
  alternatives:
  - to the hill of the LORD
  lexicon: HALOT
  rationale: Though ב normally means 'in/on,' with verbs of motion English idiom prefers
    'to.' Per doctrine, יְהוָה is rendered 'the LORD.' 'Mountain' is the standard
    sense of הַר here, likely Zion.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms, the default rendering of the divine
    name is 'the LORD.'
- source_word: אֶל צוּר יִשְׂרָאֵל
  chosen: to the Rock of Israel
  alternatives:
  - to Israel's Rock
  lexicon: HALOT
  rationale: צוּר is a common divine metaphor for stability, strength, and refuge.
    'The Rock of Israel' preserves the title-like force and the prepositional parallelism.
