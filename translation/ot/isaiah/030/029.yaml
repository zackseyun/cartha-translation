theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrine specifies 'the LORD' as the default rendering
    of YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Cultic nuance of הִתְקַדֶּשׁ חָג
  chosen_reading: when a feast is consecrated
  alternative_readings:
  - when a feast is sanctified
  - on the night a feast is kept holy
  rationale: The phrase refers to a festival being set apart as holy, likely evoking
    pilgrimage worship. 'Consecrated' preserves the sacred setting without importing
    later doctrinal claims.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    preserve theological tension rather than resolve it'
