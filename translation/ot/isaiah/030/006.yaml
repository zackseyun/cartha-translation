theological_decisions:
- issue: Nature of the dangerous-creature list in the Negev
  chosen_reading: Render the animal terms straightforwardly as features of the hazardous
    wilderness journey, without allegorizing them.
  alternative_readings:
  - Treat some terms symbolically for political powers
  - Flatten the list into generic 'wild beasts and snakes'
  rationale: The verse's rhetoric emphasizes the peril and futility of Judah's embassy.
    A literal rendering preserves the prophetic imagery without importing symbolic
    identifications the text itself does not state.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
