id: ISA.30.6
reference: Isaiah 30:6
source:
  edition: WLC
  text: מַשָּׂ֖א בַּהֲמ֣וֹת נֶ֑גֶב בְּ/אֶרֶץ֩ צָרָ֨ה וְ/צוּקָ֜ה לָבִ֧יא וָ/לַ֣יִשׁ
    מֵ/הֶ֗ם אֶפְעֶה֙ וְ/שָׂרָ֣ף מְעוֹפֵ֔ף יִשְׂאוּ֩ עַל כֶּ֨תֶף עֲיָרִ֜ים חֵֽילֵ/הֶ֗ם
    וְ/עַל דַּבֶּ֤שֶׁת גְּמַלִּים֙ אֽוֹצְרֹתָ֔/ם עַל עַ֖ם לֹ֥א יוֹעִֽילוּ־־־׃
translation:
  text: 'An oracle concerning the beasts of the Negev: through a land of distress
    and hardship, of lioness and lion, of viper and flying fiery serpent, they carry
    their wealth on the shoulders of donkeys and their treasures on the humps of camels,
    to a people who cannot profit them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A burden concerning the beasts of the South.' The Hebrew heading uses
      a prophetic term often rendered 'oracle' or 'burden,' and 'Negev' can also be
      understood more generally as 'the South.'
    reason: lexical_alternative
  - marker: b
    text: Or 'lion and lion.' The two Hebrew lion terms are distinct, but their precise
      difference in this context is uncertain.
    reason: lexical_alternative
  - marker: c
    text: Or 'to a people that will not help.' The Hebrew verb can mean 'profit' or
      'be of help.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשָּׂא
  chosen: An oracle
  alternatives:
  - A burden
  - A pronouncement
  lexicon: HALOT
  rationale: In prophetic headings מַשָּׂא commonly introduces an utterance or pronouncement.
    'Oracle' is idiomatic modern English and preserves the superscriptional force
    better than the more opaque traditional 'burden,' while 'pronouncement' is possible
    but less established in prophetic context.
- source_word: בַּהֲמוֹת נֶגֶב
  chosen: the beasts of the Negev
  alternatives:
  - the beasts of the South
  - the animals of the Negev
  lexicon: HALOT
  rationale: בַּהֲמוֹת is the plural of 'beast/animal'; here it likely refers to the
    pack animals involved in the journey and functions as the object of the oracle
    heading. נֶגֶב can mean 'south' or specifically the Negev region; 'Negev' best
    fits the geographic setting and avoids flattening the local reference.
- source_word: בְּאֶרֶץ צָרָה וְצוּקָה
  chosen: through a land of distress and hardship
  alternatives:
  - in a land of trouble and anguish
  - through a land of distress and oppression
  lexicon: HALOT
  rationale: The preposition with 'land' is best taken as the route of travel. צָרָה
    and צוּקָה are near-synonyms denoting trouble, distress, straits, and pressure.
    'Distress and hardship' gives a natural English pair without overinterpreting.
- source_word: לָבִיא וָלַיִשׁ
  chosen: lioness and lion
  alternatives:
  - lion and lion
  - great lion and lion
  lexicon: HALOT
  rationale: לָבִיא often denotes a lion, sometimes specifically a lioness or strong
    lion; לַיִשׁ is another lion term. To preserve the two distinct Hebrew terms without
    awkward repetition, 'lioness and lion' is a plausible differentiated rendering,
    though exact zoological distinction is uncertain.
- source_word: אֶפְעֶה
  chosen: viper
  alternatives:
  - adder
  - venomous snake
  lexicon: HALOT
  rationale: The term denotes a poisonous snake. 'Viper' is a clear modern equivalent;
    'adder' is traditional but less transparent to many readers.
- source_word: שָׂרָף מְעוֹפֵף
  chosen: flying fiery serpent
  alternatives:
  - flying serpent
  - fiery flying serpent
  lexicon: HALOT
  rationale: שָׂרָף in such contexts refers to a burning/fiery serpent, likely either
    by appearance or venomous effect; מְעוֹפֵף means flying or darting. The phrase
    is preserved fairly literally because the exact zoological referent is uncertain
    and the imagery is striking.
- source_word: יִשְׂאוּ
  chosen: they carry
  alternatives:
  - they bear
  - they lift
  lexicon: HALOT
  rationale: The verb here describes transporting goods on pack animals. 'Carry' is
    natural English for the action.
- source_word: עַל כֶּתֶף עֲיָרִים
  chosen: on the shoulders of donkeys
  alternatives:
  - on the backs of donkeys
  lexicon: HALOT
  rationale: כֶּתֶף is literally 'shoulder.' For quadrupeds English often says 'back,'
    but retaining 'shoulders' preserves the Hebrew image and parallelism with the
    next phrase. עֲיָרִים are donkeys/young donkeys; 'donkeys' is sufficient here.
- source_word: חֵילֵהֶם
  chosen: their wealth
  alternatives:
  - their riches
  - their goods
  lexicon: HALOT
  rationale: חַיִל can denote strength, wealth, resources, or military force depending
    on context. Here, with transport of valuables to Egypt, 'wealth' best fits.
- source_word: עַל דַּבֶּשֶׁת גְּמַלִּים
  chosen: on the humps of camels
  alternatives:
  - on the backs of camels
  lexicon: HALOT
  rationale: דַּבֶּשֶׁת refers specifically to a camel's hump. Rendering it as 'humps'
    preserves the vivid specificity of the Hebrew better than the generalized 'backs.'
- source_word: אֹצְרֹתָם
  chosen: their treasures
  alternatives:
  - their stores
  - their treasures/valuables
  lexicon: HALOT
  rationale: The noun denotes stored valuables or treasures. In this diplomatic-gift
    context, 'treasures' is the most fitting English choice.
- source_word: עַל עַם לֹא יוֹעִילוּ
  chosen: to a people who cannot profit them
  alternatives:
  - to a people that will not help
  - to a people of no benefit
  lexicon: HALOT
  rationale: The preposition עַל after verbs of motion can indicate direction toward.
    יוֹעִילוּ from יעל means to profit, benefit, or help. The clause describes the
    futility of sending wealth to Egypt; 'who cannot profit them' keeps the economic-benefit
    nuance and the irony of the mission.
