theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of 'the king'
  chosen_reading: for the king
  alternative_readings:
  - for the Assyrian king
  - for the king of Assyria
  - for Molech
  rationale: The Hebrew text says simply 'for the king.' While interpreters debate the referent in context and some connect Topheth with Molech traditions, the translation should not import a specific identification not explicit in the verse.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not import doctrinal claims the text does not make'
