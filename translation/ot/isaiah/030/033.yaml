id: ISA.30.33
reference: Isaiah 30:33
source:
  edition: WLC
  text: כִּֽי עָר֤וּךְ מֵֽ/אֶתְמוּל֙ תָּפְתֶּ֔ה גַּם הוא לַ/מֶּ֥לֶךְ הוּכָ֖ן הֶעְמִ֣יק הִרְחִ֑ב מְדֻרָתָ֗/הּ אֵ֤שׁ וְ/עֵצִים֙ הַרְבֵּ֔ה נִשְׁמַ֤ת יְהוָה֙ כְּ/נַ֣חַל גָּפְרִ֔ית בֹּעֲרָ֖ה בָּֽ/הּ־־׃ס
translation:
  text: For Topheth has long been prepared; indeed, it is made ready for the king. He has made it deep and wide, with a pyre of fire and wood in abundance. The breath of Yahweh, like a stream of sulfur, kindles it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Tophet.' The Hebrew form is a place-name associated with burning and judgment imagery.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from yesterday,' an idiom meaning that it has been prepared beforehand or long ago.
    reason: lexical_alternative
  - marker: c
    text: Traditional English often has 'brimstone' for 'sulfur.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרוּךְ
  chosen: has ... been prepared
  alternatives:
  - is arranged
  - is set in order
  lexicon: HALOT
  rationale: Passive participle from ערך conveys something laid out or prepared. In context of a place of burning/judgment, 'has been prepared' is idiomatic and preserves the stative-resultative sense.
- source_word: מֵאֶתְמוּל
  chosen: long
  alternatives:
  - from yesterday
  - long ago
  - already
  lexicon: HALOT
  rationale: Literally 'from yesterday,' but idiomatically denotes prior time or long-standing preparation. 'Long' in 'has long been prepared' communicates the temporal force in natural English without wooden literalism.
- source_word: תָּפְתֶּה
  chosen: Topheth
  alternatives:
  - Tophet
  lexicon: HALOT
  rationale: A proper place-name associated with burning and judgment imagery; per philosophy, names are transliterated rather than translated. 'Topheth' reflects a standard English transliteration from the Hebrew form here.
- source_word: גַּם הוא
  chosen: indeed, it
  alternatives:
  - also it
  - even it
  lexicon: HALOT
  rationale: The combination adds emphasis. 'Indeed, it' captures the emphatic force in smooth English.
- source_word: לַמֶּלֶךְ
  chosen: for the king
  alternatives:
  - for the king himself
  - for a king
  lexicon: HALOT
  rationale: The definite noun naturally reads 'for the king.' The verse likely points to the Assyrian king in context, but the translation leaves the referent at the textual level rather than specifying beyond the Hebrew.
- source_word: הוּכָן
  chosen: is made ready
  alternatives:
  - has been prepared
  - is established
  lexicon: HALOT
  rationale: Hophal of כון indicates being made ready/prepared. Rendering it distinctly from עָרוּךְ avoids flattening the parallelism while preserving the semantic overlap.
- source_word: הֶעְמִיק הִרְחִב
  chosen: He has made it deep and wide
  alternatives:
  - it is made deep and broad
  - one has made it deep and wide
  lexicon: HALOT
  rationale: The verbs are third masculine singular hiphil forms, naturally rendered with an unspecified masculine subject. English can represent this as 'He has made it deep and wide'; the subject remains implicit and contextually points to divine preparation without overexplaining.
- source_word: מְדֻרָתָהּ
  chosen: a pyre
  alternatives:
  - its firepit
  - its pile for burning
  - its hearth
  lexicon: HALOT
  rationale: The noun denotes a place or pile of burning fuel. 'Pyre' best fits the imagery of a prepared place of fiery destruction.
- source_word: אֵשׁ וְעֵצִים הַרְבֵּה
  chosen: of fire and wood in abundance
  alternatives:
  - with much fire and wood
  - full of fire and wood in plenty
  lexicon: HALOT
  rationale: This phrase describes the pyre's contents. 'Of fire and wood in abundance' is concise and preserves the abundance marker הַרְבֵּה.
- source_word: נִשְׁמַת יְהוָה
  chosen: The breath of the LORD
  alternatives:
  - The breath of Yahweh
  - The blast of the LORD
  lexicon: HALOT
  rationale: נשמה can mean breath/blast. 'Breath' is the more direct lexical rendering, while the simile that follows supplies the destructive force. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: כְּנַחַל גָּפְרִית
  chosen: like a stream of sulfur
  alternatives:
  - like a torrent of brimstone
  - like a wadi of sulfur
  lexicon: HALOT
  rationale: נחל is a stream/torrent/wadi; 'stream' is accessible modern English. גפרית is sulfur; 'brimstone' is traditional but more archaic. 'Sulfur' fits the stated readability goals.
- source_word: בֹּעֲרָה בָּהּ
  chosen: kindles it
  alternatives:
  - sets it ablaze
  - burns in it
  - is burning in it
  lexicon: HALOT
  rationale: The feminine participle agrees with 'breath' and governs the object with בָּהּ referring back to Topheth/its pyre. 'Kindles it' captures the causative-burning sense in idiomatic English; 'sets it ablaze' is possible but slightly more expansive.
