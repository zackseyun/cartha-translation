theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton and aligns with established English Bible convention while preserving covenantal force.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of וְלִנְסֹךְ מַסֵּכָה
  chosen_reading: retain the Masoretic sense 'pour out a libation' in the main text
  alternative_readings:
  - weave a covering
  - make an alliance
  rationale: The Hebrew as pointed in the MT most directly refers to pouring out a libation/poured offering. Because the broader context concerns Judah's alliance with Egypt, some translations adopt an idiomatic or emended political sense. To preserve textual transparency and not over-resolve the ambiguity, the MT-based reading is kept in the main text and the contextual alternatives are preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
