id: ISA.30.1
reference: Isaiah 30:1
source:
  edition: WLC
  text: ה֣וֹי בָּנִ֤ים סֽוֹרְרִים֙ נְאֻם יְהוָ֔ה לַ/עֲשׂ֤וֹת עֵצָה֙ וְ/לֹ֣א מִ/נִּ֔י וְ/לִ/נְסֹ֥ךְ מַסֵּכָ֖ה וְ/לֹ֣א רוּחִ֑/י לְמַ֛עַן סְפ֥וֹת חַטָּ֖את עַל חַטָּֽאת־־׃
translation:
  text: Woe to the rebellious children, declares Yahweh, who carry out a plan, but not from me, and who pour out a libation, but not by my Spirit, so as to add sin to sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and who weave a covering'; some understand the phrase more broadly in context as 'and who make an alliance.' The Hebrew text as pointed most naturally reads 'and who pour out a libation.'
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Introduces an oracle of denunciation or lament. 'Woe' best preserves the prophetic force in natural English.
- source_word: בָּנִים סוֹרְרִים
  chosen: rebellious children
  alternatives:
  - stubborn sons
  - wayward children
  lexicon: HALOT
  rationale: The phrase is relational and covenantal. 'Children' is gender-accurate enough in English for a filial collective, while 'rebellious' captures the participle סוֹרְרִים as stubbornly defiant rather than merely wandering.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares' is idiomatic and weighty. Per doctrine, יְהוָה is rendered 'the LORD' rather than 'Yahweh'.
- source_word: לַעֲשׂוֹת עֵצָה
  chosen: who carry out a plan
  alternatives:
  - who make a plan
  - who execute counsel
  lexicon: HALOT
  rationale: The infinitive plus noun expresses undertaking or effecting a policy/course of action. 'Carry out a plan' fits the context of political scheming better than the more static 'make a plan'.
- source_word: וְלֹא מִנִּי
  chosen: but not from me
  alternatives:
  - but not of me
  - but not from my counsel
  lexicon: HALOT
  rationale: The preposition marks source/origin. The point is that their policy does not originate with the LORD.
- source_word: וְלִנְסֹךְ מַסֵּכָה
  chosen: and who pour out a libation
  alternatives:
  - and who weave a covering
  - and who make an alliance
  lexicon: HALOT
  rationale: The Masoretic vocalization naturally yields 'pour out a libation' or 'pour a drink offering,' with מַסֵּכָה understood as a poured offering. Because the immediate context concerns foreign alliance, some interpret the phrase idiomatically or emend toward 'weave a web/covering' or 'make an alliance,' but the MT is retained in the main text and alternatives preserved in a footnote for auditability.
- source_word: וְלֹא רוּחִי
  chosen: but not by my Spirit
  alternatives:
  - but not from my Spirit
  - but not with my spirit/will
  lexicon: HALOT
  rationale: רוּחַ here most naturally denotes the LORD's own Spirit as the source or agency they lack. 'By my Spirit' is idiomatic English and preserves the theological weight without over-specifying.
- source_word: לְמַעַן סְפוֹת
  chosen: so as to add
  alternatives:
  - in order to heap up
  - so that they may increase
  lexicon: HALOT
  rationale: 'The construction expresses result or purpose: their actions lead to accumulation. ''Add'' is concise and fits the following idiom.'
- source_word: חַטָּאת עַל חַטָּאת
  chosen: sin to sin
  alternatives:
  - sin upon sin
  - one sin to another
  lexicon: HALOT
  rationale: A Hebrew idiom of cumulative guilt. 'Add sin to sin' is clear modern English while preserving the repetition.
