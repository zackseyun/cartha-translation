id: ISA.30.5
reference: Isaiah 30:5
source:
  edition: WLC
  text: כֹּ֣ל הבאיש עַל עַ֖ם לֹא יוֹעִ֣ילוּ לָ֑/מוֹ לֹ֤א לְ/עֵ֨זֶר֙ וְ/לֹ֣א לְ/הוֹעִ֔יל
    כִּ֥י לְ/בֹ֖שֶׁת וְ/גַם לְ/חֶרְפָּֽה־־־׃ס
translation:
  text: Everyone is put to shame because of a people that cannot profit them—who are
    not for help and not for profit, but for shame and also for reproach.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew הבאיש is difficult. It can carry the idea of becoming odious or stinking,
      but in this context of failed alliance and the parallel terms 'shame' and 'reproach,'
      the sense 'is put to shame' is preferred.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  chosen: Everyone
  alternatives:
  - All of them
  - Everyone/everyone
  lexicon: HALOT
  rationale: 'Used distributively with the following verb to express the totality
    of those involved: ''everyone'' rather than a bare ''all'' gives natural English
    while preserving the universal scope.'
- source_word: הבאיש
  chosen: is put to shame
  alternatives:
  - has become odious
  - stinks
  - is ashamed
  lexicon: HALOT
  rationale: The form and context are difficult, but in this verse's parallelism with
    'for shame' and 'for reproach' the sense is best captured by disgrace/shame rather
    than literal bad odor. This also fits the broader context of Judah's humiliating
    alliance with Egypt.
- source_word: עַל
  chosen: because of
  alternatives:
  - over
  - on account of
  - concerning
  lexicon: HALOT
  rationale: 'Here the preposition marks cause or occasion: they are shamed because
    of this people.'
- source_word: עַם
  chosen: a people
  alternatives:
  - people
  - nation
  lexicon: HALOT
  rationale: Indefinite 'a people' reflects the Hebrew singular collective and keeps
    the focus on Egypt as a national entity without over-specifying in the verse itself.
- source_word: לֹא יוֹעִילוּ לָמוֹ
  chosen: cannot profit them
  alternatives:
  - will not help them
  - are of no benefit to them
  - do not profit them
  lexicon: HALOT
  rationale: The verb יעל denotes being of use/benefit. 'Cannot profit them' captures
    incapacity in context and preserves the lexical link with the following infinitive
    לְהוֹעִיל ('for profit').
- source_word: לְעֵזֶר
  chosen: for help
  alternatives:
  - as help
  - for assistance
  lexicon: HALOT
  rationale: A concise rendering that preserves the nominal construction and the parallelism
    with 'for profit.'
- source_word: לְהוֹעִיל
  chosen: for profit
  alternatives:
  - for benefit
  - to profit
  - for usefulness
  lexicon: HALOT
  rationale: Rendered with the same English root as יוֹעִילוּ to preserve the Hebrew
    wordplay and repetition.
- source_word: כִּי
  chosen: but
  alternatives:
  - for
  - indeed
  - rather
  lexicon: HALOT
  rationale: 'Though often ''for,'' here it introduces the contrastive outcome: not
    help or profit, but shame and reproach. ''But'' communicates the adversative force
    clearly in English.'
- source_word: לְבֹשֶׁת
  chosen: for shame
  alternatives:
  - for disgrace
  - for humiliation
  lexicon: HALOT
  rationale: '''Shame'' is the most direct rendering and matches the semantic field
    already activated in the verse.'
- source_word: וְגַם
  chosen: and also
  alternatives:
  - and even
  - also
  lexicon: HALOT
  rationale: Preserves the additive emphasis without sounding archaic.
- source_word: לְחֶרְפָּה
  chosen: for reproach
  alternatives:
  - for scorn
  - for disgrace
  - for contempt
  lexicon: HALOT
  rationale: '''Reproach'' is a standard and accurate rendering for חרפה, conveying
    public disgrace and insult.'
