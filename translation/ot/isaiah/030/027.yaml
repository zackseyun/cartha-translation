theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to preserve 'name' as the acting subject
  chosen_reading: Retain 'the name of the LORD' rather than simplifying to 'the LORD'
  alternative_readings:
  - the LORD comes from afar
  rationale: The Hebrew explicitly says 'the name of YHWH comes.' Preserving 'name' maintains the theological tension between God's transcendent identity and his manifested presence in judgment, rather than resolving it into a simpler paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
