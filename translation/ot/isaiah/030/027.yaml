id: ISA.30.27
reference: Isaiah 30:27
source:
  edition: WLC
  text: הִנֵּ֤ה שֵׁם יְהוָה֙ בָּ֣א מִ/מֶּרְחָ֔ק בֹּעֵ֣ר אַפּ֔/וֹ וְ/כֹ֖בֶד מַשָּׂאָ֑ה שְׂפָתָי/ו֙ מָ֣לְאוּ זַ֔עַם וּ/לְשׁוֹנ֖/וֹ כְּ/אֵ֥שׁ אֹכָֽלֶת־׃
translation:
  text: Look, the name of Yahweh comes from afar, burning with his anger, and with dense smoke; his lips are full of wrath, and his tongue is like a consuming fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and dense smoke'; the Hebrew phrase is difficult and may also be understood more literally as 'and heaviness of lifting up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces the vision with an attention-getting particle. 'Look' is natural modern English while preserving the deictic force better than the more archaic 'Behold.'
- source_word: שֵׁם יְהוָה
  chosen: the name of the LORD
  alternatives:
  - the LORD's name
  lexicon: HALOT
  rationale: Retains the Hebrew expression 'name of YHWH' rather than collapsing it into a simple divine subject. In prophetic diction, 'name' can stand for the manifested presence, reputation, or revealed power of God; preserving 'name' keeps that theological nuance. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and broad English Bible recognizability.
- source_word: בָּא מִמֶּרְחָק
  chosen: comes from afar
  alternatives:
  - is coming from far away
  - comes from a distant place
  lexicon: HALOT
  rationale: A straightforward rendering of the participial/prophetic scene. 'From afar' is idiomatic and preserves the elevated tone.
- source_word: בֹּעֵר אַפּוֹ
  chosen: burning with his anger
  alternatives:
  - his anger burning
  - burning is his anger
  - burning with his nose/nostril
  lexicon: HALOT
  rationale: אַפּוֹ literally refers to 'his nose/nostril' but idiomatically denotes anger/wrath. Rendering the idiom as 'his anger' communicates the sense clearly in English while preserving the fire imagery through 'burning.'
- source_word: וְכֹבֶד מַשָּׂאָה
  chosen: and in heavy rising smoke
  alternatives:
  - and dense smoke
  - and grievous burden
  - and heaviness of lifting up
  lexicon: HALOT
  rationale: This phrase is difficult. מַשָּׂאָה can denote lifting, uprising, or a mass; in this context of fiery theophanic judgment, many understand a heavy cloud or column of smoke rather than an abstract 'burden.' 'Heavy rising smoke' preserves the concrete imagery and fits the immediate context of burning anger, wrath-filled lips, and a tongue like consuming fire.
- source_word: שְׂפָתָיו מָלְאוּ זַעַם
  chosen: his lips are full of wrath
  alternatives:
  - his lips have filled with indignation
  - his speech is full of rage
  lexicon: HALOT
  rationale: A near-formal rendering. The perfect is rendered as a present in English because the verse depicts a vivid prophetic scene. 'Wrath' fits the elevated register and divine-judgment context.
- source_word: וּלְשׁוֹנוֹ כְּאֵשׁ אֹכָלֶת
  chosen: and his tongue is like a consuming fire
  alternatives:
  - and his tongue is like devouring fire
  - and his tongue like fire that consumes
  lexicon: HALOT
  rationale: Preserves the simile and the active destructive force of אֹכָלֶת. 'Consuming fire' is idiomatic, vivid, and biblically resonant without adding content.
