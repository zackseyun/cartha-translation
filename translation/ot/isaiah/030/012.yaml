id: ISA.30.12
reference: Isaiah 30:12
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ קְד֣וֹשׁ יִשְׂרָאֵ֔ל יַ֥עַן מָֽאָסְ/כֶ֖ם בַּ/דָּבָ֣ר
    הַ/זֶּ֑ה וַֽ/תִּבְטְחוּ֙ בְּ/עֹ֣שֶׁק וְ/נָל֔וֹז וַ/תִּֽשָּׁעֲנ֖וּ עָלָֽי/ו׃
translation:
  text: 'Therefore thus says the Holy One of Israel: Because you have rejected this
    word, and have trusted in oppression and crookedness, and have relied on it,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this message' or 'this matter.'
    reason: lexical_alternative
  - marker: b
    text: Or 'extortion' for 'oppression,' and 'deviousness' or 'perversity' for 'crookedness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Standard inferential conjunction introducing the consequence of the preceding
    rebuke; 'Therefore' is natural and preserves the prophetic logic.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula; 'thus says' is both accurate
    and idiomatic in English.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  lexicon: HALOT
  rationale: Established Isaianic title; fully transparent translation of the Hebrew
    construct and preserves its theological force.
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - Inasmuch as
  lexicon: HALOT
  rationale: Introduces the reason clause for the announced judgment; 'Because' is
    the clearest modern equivalent.
- source_word: מָאַס
  chosen: have rejected
  alternatives:
  - have despised
  - have refused
  lexicon: HALOT
  rationale: The verb conveys repudiation or rejection. 'Rejected' is strong without
    sounding archaic; 'despised' is possible but can overemphasize emotional contempt.
- source_word: בַּדָּבָר הַזֶּה
  chosen: this word
  alternatives:
  - this message
  - this matter
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'message,' or 'matter.' In prophetic context, the
    referent is the prophetic word just spoken, so 'this word' best preserves the
    directness while remaining understandable.
- source_word: בָּטַח
  chosen: have trusted
  alternatives:
  - have put your trust
  - have relied
  lexicon: HALOT
  rationale: Core sense is to trust or place confidence in. 'Have trusted' keeps verbal
    parallelism with the following clause.
- source_word: עֹשֶׁק
  chosen: oppression
  alternatives:
  - extortion
  - fraud
  - violence
  lexicon: HALOT
  rationale: The noun often denotes oppression or extortion by unjust power. 'Oppression'
    is broad enough to cover the semantic range and fits the prophetic denunciation.
- source_word: נָלוֹז
  chosen: crookedness
  alternatives:
  - deviousness
  - perversity
  - what is crooked
  lexicon: HALOT
  rationale: The participial/adjectival form denotes what is twisted, perverse, or
    crooked. 'Crookedness' renders the abstract quality naturally in coordination
    with 'oppression.'
- source_word: שָׁעַן
  chosen: have relied on
  alternatives:
  - have leaned on
  - have depended on
  lexicon: HALOT
  rationale: The verb literally means to lean on for support, metaphorically to rely
    on. 'Have relied on' communicates the metaphor's sense clearly in modern English.
- source_word: עָלָיו
  chosen: on it
  alternatives:
  - on them
  - upon it
  lexicon: HALOT
  rationale: The pronoun is singular masculine, most naturally referring back to the
    immediately preceding composite object or especially the last item named. English
    singular 'it' preserves the Hebrew number without forcing an overly specific interpretation.
