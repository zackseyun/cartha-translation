theological_decisions:
- issue: Referent of 'this word'
  chosen_reading: the prophetic word/rebuke just delivered
  alternative_readings:
  - this matter
  - this counsel
  rationale: In context Isaiah is condemning Judah for rejecting the prophetic warning.
    Rendering דבר as 'word' preserves the likely reference to divine speech without
    overinterpreting beyond the immediate context.
  doctrine_reference: Translation philosophy §1, §3
- issue: Moral characterization of the object of trust
  chosen_reading: oppression and crookedness
  alternative_readings:
  - extortion and perversity
  - fraud and deceit
  rationale: The verse condemns reliance on unjust and twisted means rather than naming
    a specific doctrinal category. The translation preserves the ethical force without
    narrowing the terms to one historical mechanism.
  doctrine_reference: Translation philosophy §1, §5
