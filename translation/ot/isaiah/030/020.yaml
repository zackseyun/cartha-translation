theological_decisions:
- issue: Identity of מוֹרֶיךָ ('your teacher')
  chosen_reading: A non-specified 'teacher' in the main text, without capitalizing
    or explicitly identifying the referent as God.
  alternative_readings:
  - '''your teachers'' (human instructors/prophets)'
  - a divine referent implied by context
  rationale: The immediate context allows either a divine or mediated-teaching sense,
    and the Hebrew form itself can be read singular or plural. To preserve theological
    tension rather than resolve it, the main text uses the minimally interpretive
    'your teacher' and avoids capitalization that would force a doctrinal identification.
    Alternatives are preserved in footnotes.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
