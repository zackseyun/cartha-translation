id: ISA.30.20
reference: Isaiah 30:20
source:
  edition: WLC
  text: וְ/נָתַ֨ן לָ/כֶ֧ם אֲדֹנָ֛/י לֶ֥חֶם צָ֖ר וּ/מַ֣יִם לָ֑חַץ וְ/לֹֽא יִכָּנֵ֥ף
    עוֹד֙ מוֹרֶ֔י/ךָ וְ/הָי֥וּ עֵינֶ֖י/ךָ רֹא֥וֹת אֶת מוֹרֶֽי/ךָ־־׃
translation:
  text: And the Lord will give you bread of distress and water of oppression, yet
    your teacher will no longer hide himself, and your eyes will see your teacher.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bread of adversity' and 'water of affliction.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew may also be read 'your teachers will no longer be hidden' or, traditionally,
      'your teacher will no longer be removed into a corner.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: HALOT
  rationale: Standard rendering for the divine title; aligns with the project's default
    for lordship language and readable modern English.
- source_word: לֶחֶם צָר
  chosen: bread of distress
  alternatives:
  - bread of adversity
  - bread of affliction
  lexicon: HALOT
  rationale: צָר here functions adjectivally with לֶחֶם, denoting hardship/distress.
    'Bread of distress' preserves the metaphor of meager, hardship-marked provision
    without over-paraphrasing.
- source_word: מַיִם לָחַץ
  chosen: water of oppression
  alternatives:
  - water of affliction
  - water of adversity
  lexicon: HALOT
  rationale: לָחַץ denotes pressure, oppression, or affliction. 'Water of oppression'
    keeps the parallelism with 'bread of distress' and reflects the noun's force more
    concretely than a generalized paraphrase.
- source_word: יִכָּנֵף
  chosen: will ... hide himself
  alternatives:
  - will be hidden
  - will withdraw into a corner
  lexicon: HALOT
  rationale: The Niphal of כנף here likely carries the sense of being concealed or
    hidden away. Because the subject is 'your teacher,' English idiom is best served
    by 'hide himself,' while preserving the personal sense. The traditional 'be removed
    into a corner' reflects a possible nuance but is less likely in context and less
    natural in modern English.
- source_word: מוֹרֶיךָ
  chosen: your teacher
  alternatives:
  - your teachers
  lexicon: HALOT
  rationale: Though morphologically plural in form, the term can function as an honorific/plural
    of majesty or collective singular, and the singular sense fits the immediate syntax
    ('will no longer hide himself') and the following singular-oriented context. The
    repeated use is rendered consistently as singular in the main text, with the plural
    preserved as an alternative in a footnote because the Hebrew form permits it.
- source_word: עֵינֶיךָ רֹאוֹת
  chosen: your eyes will see
  alternatives:
  - you will see with your own eyes
  lexicon: HALOT
  rationale: A straightforward rendering that preserves the Hebrew emphasis on direct
    perception without adding interpretive expansion.
