theological_decisions:
- issue: Rendering the taunt-name רַהַב הֵם שָׁבֶת
  chosen_reading: 'Treat as a poetic epithet for Egypt: ''Rahab Who Sits Still.'''
  alternative_readings:
  - '''Rahab—they sit still'''
  - '''Arrogance that sits still'''
  - '''The boaster who does nothing'''
  rationale: The verse is not making a doctrinal claim but uses prophetic satire.
    The chosen rendering preserves the poetic force, personification of Egypt, and
    the likely proper-name function of רַהַב, while avoiding over-interpretation.
    Because the Hebrew is compressed and somewhat ambiguous, key alternatives are
    preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
