id: ISA.30.7
reference: Isaiah 30:7
source:
  edition: WLC
  text: וּ/מִצְרַ֕יִם הֶ֥בֶל וָ/רִ֖יק יַעְזֹ֑רוּ לָ/כֵן֙ קָרָ֣אתִי לָ/זֹ֔את רַ֥הַב
    הֵ֖ם שָֽׁבֶת׃
translation:
  text: For Egypt’s help is utterly empty and worthless; therefore I call her, “Rahab
    Who Sits Still.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Rahab, a poetic name or epithet for Egypt; it can also suggest 'arrogance'
      or 'boastfulness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Rahab—they sit still,' or 'the boaster who does nothing.' The Hebrew
      phrase is compressed and likely taunting Egypt as proud yet inactive.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִצְרַיִם
  chosen: For Egypt’s
  alternatives:
  - And Egypt
  - Now Egypt
  lexicon: HALOT
  rationale: The conjunction plus proper noun introduces the reason for the preceding
    warning; in English, 'For Egypt’s' best captures the explanatory force while linking
    naturally to 'help.' 'Egypt' is transliterated as the standard English name for
    מִצְרַיִם.
- source_word: הֶבֶל
  chosen: empty
  alternatives:
  - vanity
  - breath
  - futility
  lexicon: HALOT
  rationale: הֶבֶל often denotes emptiness, vanity, or insubstantiality. Here, paired
    with וָרִיק, it describes the uselessness of Egypt’s assistance. 'Empty' is idiomatic
    and preserves the sense of ineffectiveness without importing Ecclesiastes-style
    overtones too strongly.
- source_word: וָרִיק
  chosen: worthless
  alternatives:
  - vain
  - empty
  - to no purpose
  lexicon: HALOT
  rationale: רִיק conveys emptiness or worthlessness. Because הֶבֶל already covers
    'empty,' rendering this as 'worthless' preserves the Hebrew hendiadys/intensification
    without awkward repetition.
- source_word: יַעְזֹרוּ
  chosen: help
  alternatives:
  - they help
  - they will help
  - give aid
  lexicon: HALOT
  rationale: The verb עזר means 'to help.' In English, converting the clause to 'Egypt’s
    help is...' yields a natural rendering of the Hebrew predicate structure while
    preserving the core meaning. The plural verbal form likely agrees with Egypt as
    a collective or with its agents, but the sense is Egypt's assistance generally.
- source_word: לָכֵן
  chosen: therefore
  alternatives:
  - so
  - thus
  lexicon: HALOT
  rationale: Marks the conclusion drawn from Egypt’s uselessness. 'Therefore' preserves
    the formal inferential force.
- source_word: קָרָאתִי
  chosen: I call
  alternatives:
  - I have called
  - I named
  lexicon: HALOT
  rationale: The qatal can be rendered as a present perfect or simple present in this
    prophetic naming context. 'I call' is idiomatic in English for a standing designation
    and fits the taunt-like force of the line.
- source_word: לָזֹאת
  chosen: her
  alternatives:
  - this
  - this one
  lexicon: HALOT
  rationale: The feminine demonstrative likely refers to Egypt personified as a woman/nation.
    'Her' makes the referent clear in English and preserves the personification.
- source_word: רַהַב
  chosen: Rahab
  alternatives:
  - Arrogance
  - Boaster
  lexicon: HALOT
  rationale: רַהַב here is a poetic epithet for Egypt and also carries connotations
    of pride/boastfulness. Following the philosophy 'translate titles; transliterate
    names,' the proper-name-like taunt is best kept as 'Rahab,' with explanatory alternatives
    preserved in a footnote.
- source_word: הֵם שָׁבֶת
  chosen: Who Sits Still
  alternatives:
  - they are sitting still
  - the inactive one
  - who does nothing
  lexicon: HALOT
  rationale: This difficult phrase is commonly understood as a taunting apposition
    meaning inactive or sitting still. Rendering it as 'Who Sits Still' preserves
    the vivid metaphor and the wordplay of a boastful name undercut by passivity.
    Singular English relative clause fits the personified feminine referent better
    than a literal plural 'they.'
