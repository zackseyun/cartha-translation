id: ISA.30.10
reference: Isaiah 30:10
source:
  edition: WLC
  text: אֲשֶׁ֨ר אָמְר֤וּ לָֽ/רֹאִים֙ לֹ֣א תִרְא֔וּ וְ/לַ֣/חֹזִ֔ים לֹ֥א תֶחֱזוּ לָ֖/נוּ
    נְכֹח֑וֹת דַּבְּרוּ לָ֣/נוּ חֲלָק֔וֹת חֲז֖וּ מַהֲתַלּֽוֹת־־׃
translation:
  text: who say to the seers, “Do not see,” and to the visionaries, “Do not envision
    for us what is right; speak to us smooth things; envision illusions.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what is straightforward' or 'truthful things.' The Hebrew term refers
      to what is straight, upright, or correct.
    reason: lexical_alternative
  - marker: b
    text: Or 'deceptions' or 'delusions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאִים
  chosen: seers
  alternatives:
  - those who see
  lexicon: HALOT
  rationale: Qal participle of ראה used substantivally for prophetic figures. 'Seers'
    is the natural English equivalent in prophetic context and preserves the parallel
    with חֹזִים.
- source_word: תִרְאוּ
  chosen: see
  alternatives:
  - have visions
  lexicon: HALOT
  rationale: Direct imperative-like prohibition addressed to the seers using the ordinary
    verb 'see.' Keeping 'see' preserves the wordplay with רֹאִים.
- source_word: חֹזִים
  chosen: visionaries
  alternatives:
  - seers
  - prophets
  lexicon: HALOT
  rationale: From חזה, a prophetic seeing term distinct from ראה. 'Visionaries' preserves
    the lexical distinction between the two parallel prophetic designations better
    than repeating 'seers.'
- source_word: תֶחֱזוּ
  chosen: envision
  alternatives:
  - see
  - have visions
  lexicon: HALOT
  rationale: From חזה, matching חֹזִים. 'Envision' keeps the cognate force in English
    and distinguishes it from the earlier ראה/see pair.
- source_word: נְכֹחוֹת
  chosen: what is right
  alternatives:
  - straight things
  - truthful things
  - what is straightforward
  lexicon: HALOT
  rationale: The adjective conveys what is straight, upright, or correct. In context
    the people reject honest, morally straight prophetic speech. 'What is right' is
    idiomatic and captures both ethical and factual rectitude.
- source_word: דַּבְּרוּ
  chosen: speak
  alternatives:
  - tell
  lexicon: HALOT
  rationale: Simple imperative plural; 'speak' is the most direct rendering and fits
    the prophetic address.
- source_word: חֲלָקוֹת
  chosen: smooth things
  alternatives:
  - pleasant things
  - flattering things
  lexicon: HALOT
  rationale: Literally 'smooth things,' with connotations of flattering or soothing
    speech. The literal image is vivid and understandable in English, so it is retained.
- source_word: מַהֲתַלּוֹת
  chosen: illusions
  alternatives:
  - deceptions
  - delusions
  - falsehoods
  lexicon: HALOT
  rationale: The noun denotes deceptive or misleading things. 'Illusions' fits the
    visionary context ('envision illusions') and preserves the people's desire for
    unreal, deceptive messages rather than truth.
- source_word: אֲשֶׁר אָמְרוּ
  chosen: who say
  alternatives:
  - who said
  lexicon: HALOT
  rationale: Relative clause describing the rebellious people in the preceding context.
    English present 'who say' works naturally in context and reflects the characterization
    rather than a one-time past event.
