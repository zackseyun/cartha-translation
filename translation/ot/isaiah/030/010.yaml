theological_decisions:
- issue: Nature of the rejected prophetic content
  chosen_reading: Render נְכֹחוֹת as 'what is right' rather than a narrower 'truths'
    or more literal 'straight things.'
  alternative_readings:
  - truthful things
  - straight things
  rationale: The verse condemns a refusal of morally and factually upright revelation.
    'What is right' preserves the ethical dimension without over-specifying a doctrinal
    category.
  doctrine_reference: Translation philosophy §1, §3
- issue: Maintaining lexical distinction between two prophetic terms
  chosen_reading: Differentiate רֹאִים and חֹזִים as 'seers' and 'visionaries.'
  alternative_readings:
  - render both as 'seers'
  - render both as 'prophets'
  rationale: The Hebrew uses two related but distinct prophetic seeing terms in parallel.
    Preserving the distinction increases auditability and respects original-language
    primacy.
  doctrine_reference: Translation philosophy §1, §5
