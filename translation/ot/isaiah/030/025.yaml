id: ISA.30.25
reference: Isaiah 30:25
source:
  edition: WLC
  text: וְ/הָיָ֣ה עַל כָּל הַ֣ר גָּבֹ֗הַ וְ/עַל֙ כָּל גִּבְעָ֣ה נִשָּׂאָ֔ה פְּלָגִ֖ים
    יִבְלֵי מָ֑יִם בְּ/יוֹם֙ הֶ֣רֶג רָ֔ב בִּ/נְפֹ֖ל מִגְדָּלִֽים׀־־־־׃
translation:
  text: And on every high mountain and on every lofty hill there will be streams,
    channels of water, on the day of great slaughter, when the towers fall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'watercourses' for 'channels of water.' The Hebrew term is relatively
      rare, and the exact nuance may be 'rivulets' or 'brooks.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: there will be
  alternatives:
  - and it will happen
  - and there shall be
  lexicon: HALOT
  rationale: Uses an existential future sense in smooth English. The clause introduces
    what will exist on the mountains and hills, so 'there will be' best captures the
    Hebrew idiom without unnecessary stiffness.
- source_word: הַר גָּבֹהַ
  chosen: high mountain
  alternatives:
  - tall mountain
  lexicon: HALOT
  rationale: Standard topographical rendering. 'High' is idiomatic for elevation and
    fits prophetic imagery.
- source_word: גִּבְעָה נִשָּׂאָה
  chosen: lofty hill
  alternatives:
  - raised hill
  - elevated hill
  lexicon: HALOT
  rationale: נִשָּׂאָה literally means 'lifted up/exalted.' In this landscape context,
    'lofty' is natural English and preserves the elevated sense without awkwardness.
- source_word: פְּלָגִים
  chosen: streams
  alternatives:
  - divisions
  - watercourses
  - brooks
  lexicon: HALOT
  rationale: In context of abundant water on heights, the noun refers to flowing divisions
    or channels of water. 'Streams' is clear and natural in the main text.
- source_word: יִבְלֵי מָיִם
  chosen: channels of water
  alternatives:
  - watercourses
  - rivulets of water
  - brooks of water
  lexicon: HALOT
  rationale: The paired expression intensifies the image of abundant flowing water.
    'Channels of water' distinguishes this term from פְּלָגִים while remaining understandable.
    The exact nuance is somewhat uncertain, so a lexical alternative is preserved
    in a footnote.
- source_word: בְּיוֹם הֶרֶג רָב
  chosen: on the day of great slaughter
  alternatives:
  - in the day of great slaughter
  - on the day of much killing
  lexicon: HALOT
  rationale: A formal but readable rendering that preserves the prophetic judgment
    language. 'Great slaughter' is idiomatic and weighty without paraphrase.
- source_word: בִּנְפֹל מִגְדָּלִים
  chosen: when the towers fall
  alternatives:
  - at the falling of towers
  - when towers fall
  lexicon: HALOT
  rationale: Infinitive construct with preposition is rendered temporally. 'The towers'
    is acceptable generically in English for the class of defensive towers envisioned
    in judgment imagery.
