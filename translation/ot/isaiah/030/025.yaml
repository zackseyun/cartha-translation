theological_decisions:
- issue: Relation of abundant waters to judgment imagery
  chosen_reading: Retain both blessing imagery ('streams, channels of water') and
    judgment imagery ('day of great slaughter, when the towers fall') without resolving
    whether the verse emphasizes restoration after judgment or provision amid judgment.
  alternative_readings:
  - Read primarily as eschatological restoration following divine judgment
  - Read primarily as military reversal in which formerly dry heights become watered
  rationale: The Hebrew juxtaposes fertility and destruction without explicit explanation.
    Following the translation philosophy, the English preserves the tension rather
    than importing a specific theological synthesis.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
