id: ISA.30.14
reference: Isaiah 30:14
source:
  edition: WLC
  text: וּ֠/שְׁבָרָ/הּ כְּ/שֵׁ֨בֶר נֵ֧בֶל יוֹצְרִ֛ים כָּת֖וּת לֹ֣א יַחְמֹ֑ל וְ/לֹֽא
    יִמָּצֵ֤א בִ/מְכִתָּת/וֹ֙ חֶ֔רֶשׂ לַ/חְתּ֥וֹת אֵשׁ֙ מִ/יָּק֔וּד וְ/לַ/חְשֹׂ֥ף
    מַ֖יִם מִ/גֶּֽבֶא־׃פ
translation:
  text: and its breaking is like the breaking of a potter’s jar, smashed unsparingly,
    so that among its shattered pieces not a shard is found with which to take fire
    from the hearth or to scoop water from a cistern.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with which to scoop coals/embers from the hearth.' The Hebrew says literally
      'to take fire from the burning place.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from a pool.' The Hebrew term can refer more generally to a gathered
      body of water, but 'cistern' best fits the setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁבָרָהּ
  chosen: and its breaking
  alternatives:
  - and he breaks it
  - and its collapse
  lexicon: HALOT
  rationale: The form is best taken here as a noun-like verbal expression with 3fs
    suffix referring back to the entity/personified object in context; 'its breaking'
    fits the following simile and preserves the image of total ruin.
- source_word: כְּשֵׁבֶר
  chosen: like the breaking of
  alternatives:
  - like a breaking
  - as the fracture of
  lexicon: HALOT
  rationale: Introduces the simile. Repeating 'breaking' in English mirrors the Hebrew
    cognate construction and keeps the rhetorical force.
- source_word: נֵבֶל יוֹצְרִים
  chosen: a potter’s jar
  alternatives:
  - a potter’s vessel
  - a potter’s flask
  lexicon: HALOT
  rationale: נבל is a container/jar; with יוֹצְרִים it denotes earthenware made by
    a potter. 'Jar' is natural modern English and suits the following mention of shards.
- source_word: כָּתוּת
  chosen: smashed
  alternatives:
  - crushed
  - broken to pieces
  lexicon: HALOT
  rationale: Conveys violent shattering. 'Smashed' is vivid and idiomatic without
    over-paraphrasing.
- source_word: לֹא יַחְמֹל
  chosen: unsparingly
  alternatives:
  - without pity
  - he does not spare
  lexicon: HALOT
  rationale: The Hebrew literally means 'he does not spare/have compassion.' In English,
    attached to the smashing image, 'unsparingly' concisely conveys the manner of
    destruction.
- source_word: וְלֹא יִמָּצֵא
  chosen: so that ... not ... is found
  alternatives:
  - and none is found
  - with none found
  lexicon: HALOT
  rationale: 'Expresses result: the destruction is so complete that no usable fragment
    remains.'
- source_word: במכתתו
  chosen: among its shattered pieces
  alternatives:
  - in its crushing
  - in its fragments
  lexicon: HALOT
  rationale: Refers to the state/result of being broken up. 'Among its shattered pieces'
    makes the sense explicit in readable English.
- source_word: חֶרֶשׂ
  chosen: a shard
  alternatives:
  - a potsherd
  - a fragment
  lexicon: HALOT
  rationale: A broken piece of pottery. 'Shard' is more accessible modern English
    than 'potsherd' while preserving the concrete image.
- source_word: לחתות אשׁ
  chosen: to take fire
  alternatives:
  - to scoop coals
  - to carry embers
  lexicon: HALOT
  rationale: The idiom refers to taking burning material/fire with a pottery fragment.
    'Take fire' stays close to the Hebrew; the more specific 'coals/embers' is interpretive
    and preserved as an alternative.
- source_word: מיקוד
  chosen: from the hearth
  alternatives:
  - from the firebox
  - from the burning place
  lexicon: HALOT
  rationale: Denotes a place of burning/fire. 'Hearth' is the most natural contextual
    equivalent in English.
- source_word: ולחשׂף מים
  chosen: to scoop water
  alternatives:
  - to draw water
  - to dip up water
  lexicon: HALOT
  rationale: The verb means to expose/draw out; in this context of using a shard,
    'to scoop water' best matches the physical action.
- source_word: מגבא
  chosen: from a cistern
  alternatives:
  - from a pool
  - from a pit
  lexicon: HALOT
  rationale: Refers to a collected body of water; 'cistern' best fits ancient Near
    Eastern water storage and the practical image.
