id: ISA.30.4
reference: Isaiah 30:4
source:
  edition: WLC
  text: כִּֽי הָי֥וּ בְ/צֹ֖עַן שָׂרָ֑י/ו וּ/מַלְאָכָ֖י/ו חָנֵ֥ס יַגִּֽיעוּ־׃
translation:
  text: For his officials are in Zoan, and his envoys reach Hanes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his princes are in Zoan, and his messengers arrive at Hanes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces an explanatory ground for the preceding denunciation. 'For'
    best preserves the causal/explanatory force in context without overcommitting
    to emphatic senses like 'indeed' or 'surely'.
- source_word: הָיוּ
  chosen: are
  alternatives:
  - were
  - have become
  lexicon: HALOT
  rationale: Although morphologically perfect, Hebrew perfect here can describe a
    present state in prophetic discourse. English present 'are' reads naturally with
    the following locative phrase and fits the immediate context of describing Judah's
    current diplomatic activity.
- source_word: בְצֹעַן
  chosen: in Zoan
  lexicon: HALOT
  rationale: Proper place name, transliterated per translation philosophy. The preposition
    ב is rendered straightforwardly as 'in'.
- source_word: שָׂרָיו
  chosen: his officials
  alternatives:
  - his princes
  - his leaders
  lexicon: HALOT
  rationale: שַׂר can mean prince, ruler, official, or commander. In this context
    of diplomatic representatives sent to Egypt, 'officials' communicates the governmental
    sense clearly in modern English without implying royal sons, which 'princes' might
    suggest.
- source_word: וּמַלְאָכָיו
  chosen: and his envoys
  alternatives:
  - and his messengers
  - and his ambassadors
  lexicon: HALOT
  rationale: מַלְאָךְ broadly means messenger. In a political context involving travel
    to Egyptian cities, 'envoys' best captures official diplomatic messengers. 'Ambassadors'
    may sound too formal and specific; 'messengers' is broader but less contextually
    precise.
- source_word: חָנֵס
  chosen: Hanes
  lexicon: HALOT
  rationale: Proper place name, transliterated. Likely an Egyptian location paired
    with Zoan.
- source_word: יַגִּיעוּ
  chosen: reach
  alternatives:
  - arrive at
  - come to
  lexicon: HALOT
  rationale: The Hiphil of נגע can mean 'reach' or 'arrive.' 'Reach' is concise and
    preserves the motion toward destination implied by the verb.
