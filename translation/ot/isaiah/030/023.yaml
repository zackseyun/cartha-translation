id: ISA.30.23
reference: Isaiah 30:23
source:
  edition: WLC
  text: וְ/נָתַן֩ מְטַ֨ר זַרְעֲ/ךָ֜ אֲשֶׁר תִּזְרַ֣ע אֶת הָ/אֲדָמָ֗ה וְ/לֶ֨חֶם֙ תְּבוּאַ֣ת
    הָֽ/אֲדָמָ֔ה וְ/הָיָ֥ה דָשֵׁ֖ן וְ/שָׁמֵ֑ן יִרְעֶ֥ה מִקְנֶ֛י/ךָ בַּ/יּ֥וֹם הַ/ה֖וּא
    כַּ֥ר נִרְחָֽב־־׃
translation:
  text: And he will give rain for your seed with which you sow the ground, and bread
    from the produce of the ground; and it will be rich and plentiful. On that day
    your livestock will graze in a broad pasture.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bread, the produce of the ground.' The Hebrew may be read appositionally,
      though 'bread from the produce of the ground' best conveys the sense in English.
    reason: lexical_alternative
  - marker: b
    text: Literally 'fat and rich,' an idiom for abundance and fertility.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַן
  chosen: And he will give
  alternatives:
  - and he gives
  - then he will give
  lexicon: HALOT
  rationale: Qal perfect with prefixed waw in prophetic context is naturally rendered
    as a future/resultative statement in English. The implied subject continues from
    the previous context, namely the LORD, so the pronoun is retained rather than
    repeating the divine name.
- source_word: מְטַר
  chosen: rain
  alternatives:
  - rainfall
  - showers
  lexicon: HALOT
  rationale: Standard rendering for precipitation sent by God. 'Rain' is the most
    natural and sufficiently concrete English equivalent.
- source_word: זַרְעֲךָ
  chosen: your seed
  alternatives:
  - your sowing
  - your crop seed
  lexicon: HALOT
  rationale: The noun denotes seed for sowing. 'Your seed' preserves the agricultural
    image and matches the following relative clause about sowing.
- source_word: אֲשֶׁר תִּזְרַע אֶת הָאֲדָמָה
  chosen: with which you sow the ground
  alternatives:
  - which you sow in the ground
  - that you sow the land with
  lexicon: HALOT
  rationale: The Hebrew literally has 'which you sow the ground.' English idiom requires
    a preposition; 'with which' best preserves the instrumental sense without paraphrase.
- source_word: לֶחֶם תְּבוּאַת הָאֲדָמָה
  chosen: bread from the produce of the ground
  alternatives:
  - food from the produce of the land
  - bread, the produce of the ground
  lexicon: HALOT
  rationale: לֶחֶם can mean bread or food, but 'bread' is preferable here because
    it concretely expresses the result of agricultural abundance. The construct phrase
    is represented by 'from the produce of the ground' to make the relationship clear
    in natural English.
- source_word: וְהָיָה דָשֵׁן וְשָׁמֵן
  chosen: and it will be rich and plentiful
  alternatives:
  - and it will be fat and rich
  - and it will be abundant and fertile
  lexicon: HALOT
  rationale: The adjectives literally denote fatness/richness, an idiom for abundance
    and fertility. 'Rich and plentiful' preserves the agricultural sense in readable
    modern English without awkward literalism.
- source_word: יִרְעֶה
  chosen: will graze
  alternatives:
  - will pasture
  - will feed
  lexicon: HALOT
  rationale: The verb can mean to pasture/feed/graze. With livestock as subject, 'will
    graze' is the most idiomatic English rendering.
- source_word: מִקְנֶיךָ
  chosen: your livestock
  alternatives:
  - your cattle
  - your herds
  lexicon: HALOT
  rationale: A broad term for domestic animals/property in livestock. 'Livestock'
    best captures the collective sense without narrowing it to cattle only.
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - in that day
  - at that time
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'On that day' is both natural and
    recognizably formulaic.
- source_word: כַּר נִרְחָב
  chosen: a broad pasture
  alternatives:
  - a wide meadow
  - an open grazing land
  lexicon: HALOT
  rationale: כַּר denotes pastureland/meadow, and נִרְחָב means broad or spacious.
    'A broad pasture' preserves the image of ample grazing land.
