theological_decisions:
- issue: Whether to preserve the parallel nouns with distinct English renderings
  chosen_reading: Use 'shame' for בֹּשֶׁת and 'humiliation' for כְּלִמָּה
  alternative_readings:
  - Use 'shame'/'disgrace' in both cola
  - Use 'disgrace' and 'confusion'
  rationale: The verse uses two related but distinct shame terms in parallel. Preserving
    some distinction in English reflects the Hebrew rhetoric without importing extra
    theology. This follows the consistency-and-documented-exception principle by distinguishing
    terms where context supports it.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
