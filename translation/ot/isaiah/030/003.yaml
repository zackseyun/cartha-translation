id: ISA.30.3
reference: Isaiah 30:3
source:
  edition: WLC
  text: וְ/הָיָ֥ה לָ/כֶ֛ם מָע֥וֹז פַּרְעֹ֖ה לְ/בֹ֑שֶׁת וְ/הֶ/חָס֥וּת בְּ/צֵל מִצְרַ֖יִם
    לִ/כְלִמָּֽה־׃
translation:
  text: Then Pharaoh’s stronghold will become your shame, and refuge in Egypt’s shadow
    your humiliation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then Pharaoh’s refuge will be your shame.' The Hebrew noun מָעוֹז can
      also be rendered 'refuge' or 'fortress.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the shadow of Egypt,' a metaphor for seeking protection from
      Egypt.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  chosen: Then ... will become
  alternatives:
  - and ... will be
  - and it will become
  lexicon: HALOT
  rationale: The waw + qatal here carries a consequential/future sense in context,
    following the prophetic warning. 'Will become' brings out the resultative force
    more naturally than a simple stative 'will be.' 'Then' reflects the discourse
    progression without overtranslating.
- source_word: לָכֶם
  chosen: your
  alternatives:
  - for you
  - to you
  lexicon: HALOT
  rationale: The preposition with pronoun marks disadvantage/interest. In idiomatic
    English, possessive phrasing ('your shame,' implicitly 'for you') best conveys
    the relation.
- source_word: מָעוֹז
  chosen: stronghold
  alternatives:
  - refuge
  - fortress
  - protection
  lexicon: HALOT
  rationale: The noun denotes a place or source of strength/protection. 'Stronghold'
    preserves the concrete metaphor and avoids flattening it into an abstract term.
    Because the next clause uses חָסוּת ('refuge'), varying the English also helps
    reflect the distinct Hebrew terms.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name, in keeping
    with the policy to transliterate names.
- source_word: לְבֹשֶׁת
  chosen: your shame
  alternatives:
  - for shame
  - to shame
  - for disgrace
  lexicon: HALOT
  rationale: בֹּשֶׁת denotes shame/disgrace. 'Your shame' makes explicit the force
    of לָכֶם from earlier in the clause and yields natural English while preserving
    the prophetic rebuke.
- source_word: וְהֶחָסוּת
  chosen: and refuge
  alternatives:
  - and shelter
  - and seeking refuge
  lexicon: HALOT
  rationale: The noun refers to refuge/shelter. 'Refuge' is concise and pairs well
    with the following metaphor 'in Egypt’s shadow.' The prefixed conjunction is retained.
- source_word: בְּצֵל
  chosen: in ... shadow
  alternatives:
  - in the shade of
  - under the shadow of
  lexicon: HALOT
  rationale: The idiom evokes protective shade. 'In Egypt’s shadow' is natural English
    and preserves the metaphor of misplaced protection.
- source_word: מִצְרַיִם
  chosen: Egypt’s
  alternatives:
  - of Egypt
  lexicon: HALOT
  rationale: Rendered in possessive form for idiomatic English while preserving the
    genitival relationship.
- source_word: לִכְלִמָּה
  chosen: your humiliation
  alternatives:
  - for humiliation
  - for disgrace
  - for dishonor
  lexicon: HALOT
  rationale: כְּלִמָּה overlaps with shame/disgrace but is distinct from בֹּשֶׁת.
    'Humiliation' preserves the semantic distinction and heightens the result of trusting
    Egypt.
