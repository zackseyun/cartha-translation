id: ISA.30.32
reference: Isaiah 30:32
source:
  edition: WLC
  text: וְ/הָיָ֗ה כֹּ֤ל מַֽעֲבַר֙ מַטֵּ֣ה מֽוּסָדָ֔ה אֲשֶׁ֨ר יָנִ֤יחַ יְהוָה֙ עָלָ֔י/ו בְּ/תֻפִּ֖ים וּ/בְ/כִנֹּר֑וֹת וּ/בְ/מִלְחֲמ֥וֹת תְּנוּפָ֖ה נִלְחַם ב/ה־׃
translation:
  text: And every stroke of the appointed rod that Yahweh lays on him will be with tambourines and lyres; and with battles of brandishing he will fight against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every passing of the appointed rod'; the Hebrew phrase is difficult, and 'stroke' interprets the image as each blow or sweep of the rod.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will fight against it/him'; the Hebrew has a feminine singular suffix ('against her/it'), but the referent is uncertain in context.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will be
  alternatives:
  - And it will happen
  - And it shall be
  lexicon: HALOT
  rationale: Introduces the result/future scene idiomatically in English. The Hebrew wayyiqtol/qatal sequence here functions as a future-oriented description.
- source_word: כֹּל
  chosen: every
  alternatives:
  - all
  lexicon: HALOT
  rationale: 'Distributive sense fits the singular following construction: each stroke/passage individually.'
- source_word: מַעֲבַר
  chosen: stroke
  alternatives:
  - passing
  - blow
  - sweep
  lexicon: HALOT
  rationale: Though the noun often means 'passage' or 'crossing,' in this difficult context with 'rod' it likely denotes each pass or stroke of the rod in judgment. 'Stroke' communicates the concrete punitive action more clearly in English while preserving the imagery.
- source_word: מַטֵּה
  chosen: rod
  alternatives:
  - staff
  - scepter
  lexicon: HALOT
  rationale: In context of divine striking/judgment, 'rod' best conveys an instrument of chastisement rather than a walking staff or royal scepter.
- source_word: מוּסָדָה
  chosen: appointed
  alternatives:
  - founded
  - established
  - decreed
  lexicon: HALOT
  rationale: The passive/adjectival sense points to something fixed or established beforehand. 'Appointed' fits the context of a divinely determined rod of punishment.
- source_word: אֲשֶׁר יָנִיחַ יְהוָה עָלָיו
  chosen: that the LORD lays on him
  alternatives:
  - that the LORD causes to rest on him
  - that the LORD brings down on him
  lexicon: HALOT
  rationale: The Hiphil of נוח here conveys causing something to rest/settle upon someone. 'Lays on him' is natural English for imposed judgment.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Follows project doctrine for the divine name.
- source_word: בְּתֻפִּים וּבְכִנֹּרוֹת
  chosen: with tambourines and lyres
  alternatives:
  - to tambourines and lyres
  - with timbrels and harps
  lexicon: HALOT
  rationale: These are musical instruments associated with celebratory accompaniment. 'Tambourines and lyres' is readable modern English and reasonably precise.
- source_word: וּבְמִלְחֲמוֹת תְּנוּפָה
  chosen: and in battles of brandishing
  alternatives:
  - with battles of waving
  - in battles of swinging
  - with brandished battles
  lexicon: HALOT
  rationale: תְּנוּפָה literally involves a waving/brandishing motion. In martial context it likely describes forceful, sweeping combat action. 'Battles of brandishing' preserves the vivid but somewhat opaque Hebrew imagery without over-paraphrasing.
- source_word: נִלְחַם בָהּ
  chosen: he will fight against them
  alternatives:
  - he will fight against it
  - he has fought against her
  lexicon: HALOT
  rationale: The subject is best taken as the LORD from context. The feminine singular suffix is syntactically difficult; many understand it collectively or as referring to Assyria/the hostile power. English plural 'them' makes the referent intelligible in context while a footnote preserves the more literal singular possibility.
