theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by project doctrine's contested terms table.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of pronouns in the judgment scene
  chosen_reading: The LORD lays the rod on the Assyrian/him and then fights against them
  alternative_readings:
  - The LORD fights against him/it
  - The subject of נִלְחַם is the rod or an impersonal force
  rationale: The immediate context (vv. 31-33) concerns the LORD's judgment on Assyria. Because the final suffix is difficult, the main text resolves the scene in line with the broader context while preserving the singular alternative in a footnote.
