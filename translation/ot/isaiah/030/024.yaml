id: ISA.30.24
reference: Isaiah 30:24
source:
  edition: WLC
  text: וְ/הָ/אֲלָפִ֣ים וְ/הָ/עֲיָרִ֗ים עֹֽבְדֵי֙ הָֽ/אֲדָמָ֔ה בְּלִ֥יל חָמִ֖יץ יֹאכֵ֑לוּ
    אֲשֶׁר זֹרֶ֥ה בָ/רַ֖חַת וּ/בַ/מִּזְרֶֽה־׃
translation:
  text: And the oxen and the donkeys that work the ground will eat seasoned fodder,
    which has been winnowed with shovel and fork.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'salted fodder'; the Hebrew adjective may refer more specifically to
      fodder improved by salting or seasoning.
    reason: lexical_alternative
  - marker: b
    text: The final phrase names two agricultural tools used for winnowing, traditionally
      rendered 'shovel and fork' or 'shovel and winnowing fork.'
    reason: cultural_note
lexical_decisions:
- source_word: הָאֲלָפִים
  chosen: the oxen
  alternatives:
  - the cattle
  - the young bulls
  lexicon: HALOT
  rationale: אַלּוּף/אֶלֶף in this context refers to bovines used for agricultural
    labor. Because the parallel term is donkeys and the participle describes animals
    working the soil, 'oxen' best captures draft animals rather than generic 'cattle'.
- source_word: הָעֲיָרִים
  chosen: the donkeys
  alternatives:
  - the asses
  lexicon: HALOT
  rationale: Standard rendering for working pack/draft animals. 'Asses' is more traditional
    but less natural in modern English.
- source_word: עֹבְדֵי הָאֲדָמָה
  chosen: that work the ground
  alternatives:
  - that till the soil
  - working the land
  lexicon: HALOT
  rationale: The participial phrase identifies the animals by their agricultural function.
    'Work the ground' is natural modern English and preserves the concrete farming
    image.
- source_word: בְּלִיל
  chosen: fodder
  alternatives:
  - provender
  - mixed feed
  lexicon: HALOT
  rationale: Refers to animal feed, likely a mixture prepared for livestock. 'Fodder'
    is clear and idiomatic; 'provender' is archaic.
- source_word: חָמִיץ
  chosen: seasoned
  alternatives:
  - salted
  - sour
  - fermented
  lexicon: HALOT
  rationale: The adjective denotes feed that is sharpened/improved, commonly understood
    as seasoned or salted fodder. 'Seasoned' communicates enhanced, specially prepared
    feed without overstating a specific process that is lexically debated.
- source_word: יֹאכֵלוּ
  chosen: will eat
  alternatives:
  - shall eat
  lexicon: HALOT
  rationale: Simple future in context of promised agricultural abundance.
- source_word: אֲשֶׁר זֹרֶה
  chosen: which has been winnowed
  alternatives:
  - which one winnows
  - that was scattered
  lexicon: HALOT
  rationale: Though זרה is formally active, English naturally renders the relative
    clause with passive sense because the fodder is the object processed by winnowing.
    This best communicates the intended meaning.
- source_word: בָרַחַת
  chosen: with shovel
  alternatives:
  - with scoop
  - with shovel-fork
  lexicon: HALOT
  rationale: An agricultural implement used in tossing grain/fodder into the air.
    'Shovel' is the most widely recognized equivalent.
- source_word: וּבַמִּזְרֶה
  chosen: and fork
  alternatives:
  - and winnowing fork
  - and pitchfork
  lexicon: HALOT
  rationale: A winnowing implement paired with the previous tool. 'Fork' keeps the
    line concise; the winnowing sense is supplied by the verb and can be clarified
    in a footnote.
