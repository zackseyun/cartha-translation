theological_decisions:
- issue: Anthropomorphic judgment imagery for the LORD's arm and anger
  chosen_reading: Retain the concrete anthropomorphic language as poetic theophany/judgment
    imagery without softening it.
  alternative_readings:
  - Interpret more abstractly as mere manifestations of power
  rationale: The Hebrew text itself uses embodied imagery ('his arm,' 'anger,' 'consuming
    fire'). Preserving this language maintains the prophetic force and does not require
    doctrinal over-interpretation.
  doctrine_reference: Translation philosophy §1, §3
