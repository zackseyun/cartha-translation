id: ISA.30.30
reference: Isaiah 30:30
source:
  edition: WLC
  text: וְ/הִשְׁמִ֨יעַ יְהוָ֜ה אֶת ה֣וֹד קוֹל֗/וֹ וְ/נַ֤חַת זְרוֹע/וֹ֙ יַרְאֶ֔ה בְּ/זַ֣עַף
    אַ֔ף וְ/לַ֖הַב אֵ֣שׁ אוֹכֵלָ֑ה נֶ֥פֶץ וָ/זֶ֖רֶם וְ/אֶ֥בֶן בָּרָֽד־׃
translation:
  text: And the LORD will make the majesty of his voice heard, and will show the descending
    blow of his arm, in furious anger and a flame of consuming fire, with cloudburst
    and storm and hailstones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the descent of his arm'; the Hebrew expression is difficult and may
      emphasize the downward motion of the LORD's arm in judgment rather than the
      impact itself.
    reason: lexical_alternative
  - marker: b
    text: Or 'downpour' for 'cloudburst'; the Hebrew term likely refers to a violent
      bursting storm.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and consistency with the stated doctrine table.
- source_word: הִשְׁמִיעַ
  chosen: will make ... heard
  alternatives:
  - will cause to hear
  - will proclaim
  lexicon: HALOT
  rationale: Hiphil of שׁמע is causative; 'make heard' preserves the causative force
    in natural English better than the more wooden 'cause to hear.'
- source_word: הוֹד קוֹלוֹ
  chosen: the majesty of his voice
  alternatives:
  - the splendor of his voice
  - the glory of his voice
  lexicon: HALOT
  rationale: הוֹד denotes majesty/splendor. 'Majesty' fits the theophanic context
    and collocates well with 'voice' without over-literal awkwardness.
- source_word: נַחַת זְרֹעוֹ
  chosen: the descending blow of his arm
  alternatives:
  - the descent of his arm
  - the striking down of his arm
  - the resting/settling of his arm
  lexicon: HALOT
  rationale: The noun נַחַת here is difficult; in context of divine judgment imagery
    it most likely refers to the downward motion/impact of the arm in striking. 'Descending
    blow' captures both motion and martial force better than the overly vague 'descent.'
- source_word: יַרְאֶה
  chosen: will show
  alternatives:
  - will cause to be seen
  - will display
  lexicon: HALOT
  rationale: Hiphil of ראה can mean 'show/display.' 'Will show' is idiomatic and preserves
    the causative sense.
- source_word: בְּזַעַף אַף
  chosen: in furious anger
  alternatives:
  - with indignation of anger
  - in raging anger
  lexicon: HALOT
  rationale: The phrase intensifies divine wrath. 'Furious anger' is concise, natural
    English that preserves the doubled anger imagery without wooden repetition.
- source_word: לַהַב אֵשׁ אֹכֵלָה
  chosen: a flame of consuming fire
  alternatives:
  - the blaze of a devouring fire
  - a flaming fire that consumes
  lexicon: HALOT
  rationale: This construct chain is vivid judgment imagery. 'A flame of consuming
    fire' preserves the poetic parallelism and the active participial sense of אֹכֵלָה.
- source_word: נֶפֶץ
  chosen: cloudburst
  alternatives:
  - downpour
  - bursting storm
  - crash
  lexicon: HALOT
  rationale: In this weather-judgment sequence with storm and hail, the term likely
    denotes a violent bursting rainstorm rather than a generic 'scattering.' 'Cloudburst'
    is vivid and contextually fitting.
- source_word: זֶרֶם
  chosen: storm
  alternatives:
  - torrent
  - rainstorm
  - flood
  lexicon: HALOT
  rationale: The noun often denotes a rushing storm or torrent. 'Storm' works well
    in sequence with 'cloudburst' and hail, while 'torrent' might suggest only water
    flow.
- source_word: אֶבֶן בָּרָד
  chosen: hailstones
  alternatives:
  - stones of hail
  - hail
  lexicon: HALOT
  rationale: The Hebrew literally means 'stone of hail,' an idiom for hailstones.
    The plural English form is the natural equivalent.
