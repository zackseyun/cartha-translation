theological_decisions:
- issue: Semantic range of עָוֹן
  chosen_reading: Rendered as 'iniquity' in the main text
  alternative_readings:
  - guilt
  - punishment for iniquity
  rationale: The term can denote sin, guilt, or the punishment resulting from sin.
    In this prophetic warning, the moral offense remains foregrounded while the simile
    describes its destructive consequence. The main text preserves that tension rather
    than collapsing the term into either subjective guilt or objective punishment
    alone.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
