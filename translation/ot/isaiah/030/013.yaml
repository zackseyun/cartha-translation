id: ISA.30.13
reference: Isaiah 30:13
source:
  edition: WLC
  text: לָ/כֵ֗ן יִֽהְיֶ֤ה לָ/כֶם֙ הֶ/עָוֺ֣ן הַ/זֶּ֔ה כְּ/פֶ֣רֶץ נֹפֵ֔ל נִבְעֶ֖ה בְּ/חוֹמָ֣ה
    נִשְׂגָּבָ֑ה אֲשֶׁר פִּתְאֹ֥ם לְ/פֶ֖תַע יָב֥וֹא שִׁבְרָֽ/הּ־׃
translation:
  text: Therefore this iniquity will be to you like a falling breach, bulging out
    in a high wall, whose breaking comes suddenly, in an instant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this guilt' or 'this punishment for iniquity'; the Hebrew word can denote
      the sin itself, the guilt it incurs, or its resulting punishment.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Standard inferential particle introducing the consequence of the preceding
    accusation; 'Therefore' preserves prophetic force and logical connection.
- source_word: יִהְיֶה לָכֶם
  chosen: will be to you
  alternatives:
  - will become for you
  - shall be to you
  lexicon: HALOT
  rationale: The idiom marks how 'this iniquity' will function for the audience; 'will
    be to you' is natural and sufficiently formal.
- source_word: הֶעָוֹן הַזֶּה
  chosen: this iniquity
  alternatives:
  - this guilt
  - this punishment for iniquity
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment. Here the verse points
    back to their sinful refusal and describes its disastrous consequence. 'Iniquity'
    best preserves the moral sense in the main text without over-resolving whether
    the focus is sin itself or its culpability.
- source_word: כְּפֶרֶץ
  chosen: like a breach
  alternatives:
  - like a crack
  - like a break
  lexicon: HALOT
  rationale: פֶּרֶץ commonly denotes a breach or break in a wall. 'Breach' fits the
    wall imagery and prepares for the collapse metaphor better than the more modern
    but narrower 'crack'.
- source_word: נֹפֵל
  chosen: falling
  alternatives:
  - about to fall
  - collapsing
  lexicon: HALOT
  rationale: The participle depicts an unstable, collapsing condition. 'Falling' is
    concise and keeps the image vivid without adding interpretive expansion.
- source_word: נִבְעֶה
  chosen: bulging out
  alternatives:
  - swelling out
  - jutting out
  lexicon: HALOT
  rationale: The passive/reflexive participle conveys a wall that has swollen outward
    and is ready to give way. 'Bulging out' is idiomatic modern English and preserves
    the visual force.
- source_word: בְּחוֹמָה נִשְׂגָּבָה
  chosen: in a high wall
  alternatives:
  - in a lofty wall
  - in a fortified wall
  lexicon: HALOT
  rationale: חוֹמָה is 'wall'; נִשְׂגָּבָה denotes height/exaltation. 'High wall'
    is the plain architectural sense here; 'fortified' would import a nuance not explicit
    in the adjective.
- source_word: אֲשֶׁר
  chosen: whose
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: Used to connect the wall/breach image with the ensuing statement about
    its destruction. 'Whose' yields smooth English by referring to the wall's breaking.
- source_word: פִּתְאֹם לְפֶתַע
  chosen: suddenly, in an instant
  alternatives:
  - suddenly, all at once
  - in a moment, abruptly
  lexicon: HALOT
  rationale: The paired adverbial expressions intensify the abruptness. Rendering
    both avoids flattening the Hebrew emphasis.
- source_word: יָבוֹא שִׁבְרָהּ
  chosen: its breaking comes
  alternatives:
  - its collapse comes
  - its ruin comes
  - its breaking will come
  lexicon: HALOT
  rationale: שֶׁבֶר is breaking, fracture, or collapse. 'Its breaking comes' stays
    close to the Hebrew while sounding natural in English; the present tense in English
    after 'whose' conveys the imminent-certainty force of the Hebrew imperfect in
    context.
