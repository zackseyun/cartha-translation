id: ISA.30.16
reference: Isaiah 30:16
source:
  edition: WLC
  text: וַ/תֹּ֨אמְר֥וּ לֹא כִ֛י עַל ס֥וּס נָנ֖וּס עַל כֵּ֣ן תְּנוּס֑וּ/ן וְ/עַל קַ֣ל
    נִרְכָּ֔ב עַל כֵּ֖ן יִקַּ֥לּוּ רֹדְפֵי/כֶֽם־־־־־׃
translation:
  text: But you said, “No, for we will flee on horses”—therefore you will flee; and,
    “We will ride on swift ones”—therefore your pursuers will be swift.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “on swift horses” or “on fast mounts.” The Hebrew reads simply “on swift
      ones,” with the noun implied from context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמְרוּ
  chosen: But you said
  alternatives:
  - And you said
  lexicon: HALOT
  rationale: The waw-consecutive advances the discourse; 'But' captures the adversative
    force in context, contrasting Judah's response with the preceding divine warning,
    while still reflecting the basic verb 'said'.
- source_word: לֹא כִּי
  chosen: No, for
  alternatives:
  - No indeed,
  - No, but
  lexicon: HALOT
  rationale: This combination expresses emphatic rejection followed by explanation
    or correction. 'No, for' preserves both the denial and the reason introduced by
    כִּי.
- source_word: עַל סוּס
  chosen: on horses
  alternatives:
  - upon horses
  - by horse
  lexicon: HALOT
  rationale: Though singular in Hebrew, the phrase is collective/generic. English
    idiom prefers the plural 'on horses' for the sense of mounted flight.
- source_word: נָנוּס
  chosen: we will flee
  alternatives:
  - we will escape
  - we will take flight
  lexicon: HALOT
  rationale: נוּס commonly means 'flee' or 'take flight.' 'Flee' is concise and matches
    the wordplay with the following second-person form.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - so
  - for that reason
  lexicon: HALOT
  rationale: The phrase marks consequence and is repeated for rhetorical effect. 'Therefore'
    preserves the prophetic irony and judgment logic.
- source_word: תְּנוּסוּן
  chosen: you will flee
  alternatives:
  - you will indeed flee
  lexicon: HALOT
  rationale: 'Second masculine plural matches the addressed people. The form answers
    their boast with a judicial reversal: what they propose becomes their fate.'
- source_word: עַל קַל
  chosen: on swift ones
  alternatives:
  - on swift horses
  - on fast mounts
  lexicon: HALOT
  rationale: קַל is an adjective, literally 'light' and by extension 'swift/fast.'
    The noun is not repeated, so 'swift ones' preserves the terseness of the Hebrew
    while allowing the implied mounts/horses to be understood from context.
- source_word: נִרְכָּב
  chosen: we will ride
  alternatives:
  - we will mount
  - we will ride away
  lexicon: HALOT
  rationale: רכב in this context refers to riding mounts. 'We will ride' is natural
    English and keeps the parallel with the previous clause.
- source_word: יִקַּלּוּ
  chosen: will be swift
  alternatives:
  - will be fast
  - will be light/swift
  lexicon: HALOT
  rationale: 'From קלל/קול semantic field of being light, here in context ''swift''
    best fits the ironic response: those they trust for speed will be matched or exceeded
    by their pursuers.'
- source_word: רֹדְפֵיכֶם
  chosen: your pursuers
  alternatives:
  - those pursuing you
  - your pursuers after you
  lexicon: HALOT
  rationale: The participle functions substantivally. 'Your pursuers' is idiomatic
    and preserves the active threat.
