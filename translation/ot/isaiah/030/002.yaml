theological_decisions:
- issue: Rendering the anthropomorphic expression וּפִי
  chosen_reading: but have not asked my mouth
  alternative_readings:
  - but have not asked for my counsel
  - but have not consulted me
  rationale: The verse contrasts political reliance on Egypt with failure to seek
    the LORD's spoken direction. Preserving 'my mouth' keeps the prophetic, personal
    force of divine speech rather than flattening it into abstraction. This follows
    original-language primacy while remaining intelligible in context.
  doctrine_reference: Translation philosophy §1, §3
- issue: Interpreting לָעוֹז in context
  chosen_reading: to seek refuge
  alternative_readings:
  - to strengthen themselves
  - to seek strength
  rationale: The immediate parallelism with 'to take shelter in the shadow of Egypt'
    indicates dependence on Egypt for protection. Rendering the infinitive in a refuge/protection
    sense best preserves the poetic parallel and the rebuke against misplaced trust.
  doctrine_reference: Translation philosophy §1, §5
