id: ISA.30.2
reference: Isaiah 30:2
source:
  edition: WLC
  text: הַ/הֹלְכִים֙ לָ/רֶ֣דֶת מִצְרַ֔יִם וּ/פִ֖/י לֹ֣א שָׁאָ֑לוּ לָ/עוֹז֙ בְּ/מָע֣וֹז
    פַּרְעֹ֔ה וְ/לַ/חְס֖וֹת בְּ/צֵ֥ל מִצְרָֽיִם׃
translation:
  text: who set out to go down to Egypt, but have not asked my mouth, to seek refuge
    in Pharaoh’s stronghold and to take shelter in the shadow of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'but have not asked for my counsel' or 'but have not consulted me'; Hebrew
      literally, 'but my mouth they have not asked.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to strengthen themselves in Pharaoh’s stronghold'; the Hebrew expression
      may emphasize seeking strength as well as refuge.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַהֹלְכִים
  chosen: who set out
  alternatives:
  - who go
  - who are going
  - who walk
  lexicon: HALOT
  rationale: The participle from הלך functions substantivally, continuing the woe-oracle
    description of the rebellious people. 'Set out' captures purposeful movement better
    than the overly literal 'walk' and reads naturally in English while preserving
    the ongoing characterization.
- source_word: לָרֶדֶת
  chosen: to go down
  alternatives:
  - to descend
  lexicon: HALOT
  rationale: ירד literally means 'go down/descend.' 'Go down' preserves the common
    biblical idiom for travel to Egypt, reflecting geography and convention.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: וּפִי
  chosen: my mouth
  alternatives:
  - my counsel
  - my word
  lexicon: HALOT
  rationale: 'The Hebrew is literally ''my mouth.'' Retaining the concrete expression
    preserves the prophetic force: they did not seek direction from the LORD''s own
    utterance. A more interpretive rendering like ''my counsel'' is possible but less
    transparent to the source.'
- source_word: שָׁאָלוּ
  chosen: have not asked
  alternatives:
  - did not inquire
  - have not consulted
  lexicon: HALOT
  rationale: שאל commonly means ask/inquire. 'Have not asked' stays close to the Hebrew
    while fitting the participial description. 'Inquire' is a viable alternative but
    slightly more formal.
- source_word: לָעוֹז
  chosen: to seek refuge
  alternatives:
  - to strengthen themselves
  - to take refuge
  lexicon: HALOT
  rationale: The infinitive from עז/עוּז here is difficult and often understood in
    context as seeking protection/strength from Pharaoh. Given the parallel with 'to
    take shelter in the shadow of Egypt,' 'to seek refuge' best reflects the sense
    in context without over-literal obscurity.
- source_word: בְּמָעוֹז פַּרְעֹה
  chosen: in Pharaoh’s stronghold
  alternatives:
  - in the protection of Pharaoh
  - in Pharaoh's fortress
  lexicon: HALOT
  rationale: מָעוֹז denotes a place or source of strength/protection. 'Stronghold'
    preserves the concrete metaphor and pairs well with the following shelter imagery.
    The phrase expresses reliance on Pharaoh as a defensive refuge.
- source_word: וְלַחְסוֹת
  chosen: and to take shelter
  alternatives:
  - and to seek refuge
  lexicon: HALOT
  rationale: חסה means to seek refuge/take shelter. Since 'seek refuge' was used for
    the prior infinitive, 'take shelter' provides natural English variation while
    preserving the semantic parallel.
- source_word: בְּצֵל מִצְרַיִם
  chosen: in the shadow of Egypt
  alternatives:
  - under the shadow of Egypt
  lexicon: HALOT
  rationale: צל is literally 'shadow,' a common metaphor for protection. 'In the shadow
    of Egypt' is idiomatic and close to the Hebrew; 'under' is also possible but not
    necessary.
