theological_decisions:
- issue: Nature of the guiding 'word'
  chosen_reading: A divinely given guiding word without specifying mechanism
  alternative_readings:
  - the voice of a teacher
  - the inner prompting of conscience
  - prophetic instruction
  rationale: The verse promises guidance but does not explicitly identify the speaker
    in this clause. The translation preserves the text's imagery without importing
    a more specific theological mechanism.
  doctrine_reference: Preserve theological tension rather than resolve it.
