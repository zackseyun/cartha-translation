id: ISA.30.21
reference: Isaiah 30:21
source:
  edition: WLC
  text: וְ/אָזְנֶ֨י/ךָ֙ תִּשְׁמַ֣עְנָה דָבָ֔ר מֵֽ/אַחֲרֶ֖י/ךָ לֵ/אמֹ֑ר זֶ֤ה הַ/דֶּ֨רֶךְ֙
    לְכ֣וּ ב֔/וֹ כִּ֥י תַאֲמִ֖ינוּ וְ/כִ֥י תַשְׂמְאִֽילוּ׃
translation:
  text: And your ears shall hear a word behind you, saying, “This is the way; walk
    in it,” when you turn to the right and when you turn to the left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when you go to the right and when you go to the left.' The Hebrew verbs
      in this final clause are difficult; the sense is that guidance will come whenever
      you are about to turn either way.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָזְנֶיךָ
  chosen: your ears
  alternatives:
  - your ear
  lexicon: HALOT
  rationale: The Hebrew is a plural construct with 2ms suffix, naturally rendered
    'your ears.' Retaining the plural preserves the concrete bodily imagery of hearing
    divine guidance.
- source_word: תִּשְׁמַעְנָה
  chosen: shall hear
  alternatives:
  - will hear
  - hear
  lexicon: HALOT
  rationale: Imperfect 3fp agrees with the feminine plural 'ears.' 'Shall hear' gives
    a slightly elevated but still natural future sense suited to prophetic assurance.
- source_word: דָבָר
  chosen: a word
  alternatives:
  - a message
  - something
  lexicon: HALOT
  rationale: '''Word'' is the most direct rendering and preserves the concise Hebrew
    expression. ''Message'' is possible but slightly more interpretive.'
- source_word: מֵאַחֲרֶיךָ
  chosen: behind you
  alternatives:
  - from behind you
  - at your back
  lexicon: HALOT
  rationale: The preposition and noun together denote position to the rear. 'Behind
    you' is idiomatic and preserves the vivid image of a guiding voice coming from
    behind.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - which says
  - to say
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech.
- source_word: זֶה הַדֶּרֶךְ
  chosen: This is the way
  alternatives:
  - This is the road
  - This is the path
  lexicon: HALOT
  rationale: '''Way'' is the most natural and biblically resonant rendering of דֶּרֶךְ
    here, encompassing both literal route and moral course without over-specifying
    either.'
- source_word: לְכוּ בוֹ
  chosen: walk in it
  alternatives:
  - go in it
  - walk on it
  lexicon: HALOT
  rationale: Although the verb is literally 'go,' English idiom with 'the way' favors
    'walk in it' or 'walk on it.' 'Walk in it' preserves the metaphorical sense of
    conduct while remaining natural.
- source_word: כִּי תַאֲמִינוּ
  chosen: when you turn to the right
  alternatives:
  - if you go to the right
  - when you go right
  lexicon: HALOT
  rationale: The verb from אמן in Hiphil is a known crux here; in context and by longstanding
    lexical understanding it functions idiomatically for turning or inclining to the
    right. Rendering it this way fits the parallel with 'turn to the left' and the
    sense of guidance at moments of directional choice.
- source_word: וְכִי תַשְׂמְאִילוּ
  chosen: and when you turn to the left
  alternatives:
  - or when you go to the left
  - and when you go left
  lexicon: HALOT
  rationale: From שׂמאל in Hiphil, 'turn left' or 'go to the left.' 'Turn to the left'
    matches the parallel structure and the imagery of choosing direction.
