id: ISA.30.15
reference: Isaiah 30:15
source:
  edition: WLC
  text: כִּ֣י כֹֽה אָמַר֩ אֲדֹנָ֨/י יְהוִ֜ה קְד֣וֹשׁ יִשְׂרָאֵ֗ל בְּ/שׁוּבָ֤ה וָ/נַ֨חַת֙
    תִּוָּ֣שֵׁע֔וּ/ן בְּ/הַשְׁקֵט֙ וּ/בְ/בִטְחָ֔ה תִּהְיֶ֖ה גְּבֽוּרַתְ/כֶ֑ם וְ/לֹ֖א
    אֲבִיתֶֽם־׃
translation:
  text: 'For thus says the Lord GOD, the Holy One of Israel: “In returning and rest
    you will be saved; in quietness and trust will be your strength.” But you were
    unwilling.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in repentance”; the Hebrew more literally speaks of returning, which
      may include repentance and turning back to God.
    reason: lexical_alternative
  - marker: b
    text: Or “you will be delivered.”
    reason: alternative_reading
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Represents the compound divine title אֲדֹנָי יְהוִה in conventional English.
    'Lord' translates אֲדֹנָי and 'GOD' signals the following divine name YHWH, following
    the project's default rendering of יְהוָה as 'the LORD' while preserving the distinction
    in this doubled title.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  lexicon: HALOT
  rationale: Standard and precise rendering of Isaiah's recurring title, preserving
    both holiness and covenant relation to Israel.
- source_word: בְּשׁוּבָה
  chosen: in returning
  alternatives:
  - in repentance
  - by returning
  lexicon: HALOT
  rationale: שׁוּבָה here denotes turning back/returning. 'Returning' preserves the
    concrete verbal image and leaves open whether the emphasis is repentance, return
    to God, or both. 'Repentance' is interpretive and therefore left as an alternative.
- source_word: וָנַחַת
  chosen: and rest
  alternatives:
  - and calm
  - and repose
  lexicon: HALOT
  rationale: נַחַת conveys quiet restfulness or settled repose. 'Rest' is natural
    English and pairs well with 'returning' without overinterpreting the nuance.
- source_word: תִּוָּשֵׁעוּן
  chosen: you will be saved
  alternatives:
  - you would be saved
  - you will find salvation
  lexicon: HALOT
  rationale: Nifal of ישׁע naturally means 'be saved/delivered.' 'Will be saved' best
    reflects the form and prophetic assertion. The modal nuance 'would be saved' is
    possible in context but less direct.
- source_word: בְּהַשְׁקֵט
  chosen: in quietness
  alternatives:
  - in quiet
  - in being quiet
  lexicon: HALOT
  rationale: The form denotes quietness or calm. 'In quietness' is idiomatic and matches
    the abstract parallel structure of the verse.
- source_word: וּבְבִטְחָה
  chosen: and trust
  alternatives:
  - and confidence
  - and security
  lexicon: HALOT
  rationale: בִּטְחָה denotes trust/confidence. 'Trust' better preserves the relational
    sense of reliance on God in context, whereas 'security' could sound like a resultant
    state rather than the act/disposition.
- source_word: תִּהְיֶה גְּבוּרַתְכֶם
  chosen: will be your strength
  alternatives:
  - shall be your might
  - will be your power
  lexicon: HALOT
  rationale: גְּבוּרָה can mean strength, might, or power. 'Strength' is the most
    natural and fitting in the context of Judah seeking military security elsewhere;
    true strength is found in quiet trust.
- source_word: וְלֹא אֲבִיתֶם
  chosen: But you were unwilling
  alternatives:
  - but you would not
  - but you refused
  lexicon: HALOT
  rationale: אָבָה means to be willing/consent. 'Were unwilling' captures the disposition
    behind the refusal and fits the contrast with the divine offer. 'Would not' is
    also possible but slightly less explicit.
