theological_decisions:
- issue: Whether בְּשׁוּבָה should be rendered as explicit 'repentance'
  chosen_reading: Rendered more broadly as 'returning'
  alternative_readings:
  - in repentance
  rationale: The Hebrew root שׁוּב can include repentance, but the immediate context
    emphasizes turning back from self-reliant political strategy to restful trust
    in God. 'Returning' preserves that theological and relational breadth without
    narrowing the term to an inward moral act alone.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather
    than resolve it.'
- issue: Soteriological force of תִּוָּשֵׁעוּן
  chosen_reading: Rendered 'you will be saved'
  alternative_readings:
  - you will be delivered
  rationale: The verb ישׁע can denote rescue/deliverance broadly, not only spiritual
    salvation. In prophetic context both national deliverance and covenantal salvation
    may be in view. 'Saved' preserves the theological weight while remaining broad
    enough in English; the more situational alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather
    than resolve it.'
