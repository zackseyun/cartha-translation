theological_decisions:
- issue: Referent of the implicit subject in יַכֶּה
  chosen_reading: 'The subject is the LORD: ''with a rod he will strike.'''
  alternative_readings:
  - The clause could be construed more impersonally, e.g. 'he is struck with a rod'
    or with Assyria as subject/object in different syntactic construals.
  rationale: The Hebrew leaves the explicit subject unstated, but the nearest and
    most natural antecedent is the LORD. This also fits the immediate context of divine
    judgment on Assyria. The translation preserves the straightforward sense without
    importing additional doctrinal claims.
  doctrine_reference: Preserve theological tension rather than resolve it; where ambiguity
    remains, document the decision.
