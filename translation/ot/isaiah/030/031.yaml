id: ISA.30.31
reference: Isaiah 30:31
source:
  edition: WLC
  text: כִּֽי מִ/קּ֥וֹל יְהוָ֖ה יֵחַ֣ת אַשּׁ֑וּר בַּ/שֵּׁ֖בֶט יַכֶּֽה־׃
translation:
  text: For at the voice of the LORD Assyria will be shattered; with a rod he will
    strike.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be dismayed' or 'will be broken'; the Hebrew verb can denote terror,
      collapse, or shattering.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew does not repeat the subject of 'will strike'; it is most naturally
      understood as the LORD from the previous phrase.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding statement; 'For'
    fits the discourse flow in English.
- source_word: מִקּוֹל
  chosen: at the voice of
  alternatives:
  - from the voice of
  - because of the sound of
  lexicon: HALOT
  rationale: 'The preposition מִן with ''voice/sound'' here expresses causation or
    occasion: Assyria is undone at/because of the LORD''s voice. ''At the voice of''
    is idiomatic and preserves the vividness of divine utterance.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: יֵחַת
  chosen: will be shattered
  alternatives:
  - will be dismayed
  - will be terrified
  - will be broken
  lexicon: HALOT
  rationale: From חתת in the Niphal, the verb can denote being shattered, broken,
    or dismayed. In this judgment context against Assyria, 'will be shattered' best
    captures both the psychological and military collapse implied.
- source_word: אַשּׁוּר
  chosen: Assyria
  alternatives:
  - Asshur
  lexicon: HALOT
  rationale: The proper name refers to the nation/empire in context, so the standard
    English form 'Assyria' is preferred.
- source_word: בַּשֵּׁבֶט
  chosen: with a rod
  alternatives:
  - with the rod
  - by a staff
  - with a scepter
  lexicon: HALOT
  rationale: שֵׁבֶט commonly means rod, staff, or scepter. Here it is an instrument
    of striking in judgment, so 'rod' is the clearest choice. The article is rendered
    idiomatically as English often omits it with instrumental phrases.
- source_word: יַכֶּה
  chosen: he will strike
  alternatives:
  - he will smite
  - it will strike
  - one will strike
  lexicon: HALOT
  rationale: 'Hiphil of נכה means ''strike/smite.'' The masculine singular subject
    is best taken as the LORD from the preceding clause, yielding a coherent sense:
    the LORD''s voice shatters Assyria, and he strikes with a rod.'
