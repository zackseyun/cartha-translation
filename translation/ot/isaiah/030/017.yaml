theological_decisions:
- issue: Nature of the closing simile
  chosen_reading: The image depicts extreme isolation and exposed remnant-status after
    defeat.
  alternative_readings:
  - The image emphasizes only visibility as a warning signal.
  - The image emphasizes only smallness or fragility.
  rationale: The paired images of a pole/banner on a height most naturally communicate
    being left alone, exposed, and conspicuous after a rout. The translation preserves
    the metaphor without over-interpreting it in the main text.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
