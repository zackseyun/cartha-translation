id: ISA.30.17
reference: Isaiah 30:17
source:
  edition: WLC
  text: אֶ֣לֶף אֶחָ֗ד מִ/פְּנֵי֙ גַּעֲרַ֣ת אֶחָ֔ד מִ/פְּנֵ֛י גַּעֲרַ֥ת חֲמִשָּׁ֖ה
    תָּנֻ֑סוּ עַ֣ד אִם נוֹתַרְתֶּ֗ם כַּ/תֹּ֨רֶן֙ עַל רֹ֣אשׁ הָ/הָ֔ר וְ/כַ/נֵּ֖ס עַל
    הַ/גִּבְעָֽה־־־׃
translation:
  text: A thousand will flee at the rebuke of one; at the rebuke of five you will
    flee, until you are left like a signal pole on the top of a mountain, and like
    a banner on a hill.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a mast on the top of a mountain.' The Hebrew תֹּרֶן can refer to
      a mast or tall pole.
    reason: lexical_alternative
  - marker: b
    text: Or 'like a signal standard on a hill.' The Hebrew נֵס denotes a raised banner
      or standard used as a signal.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶלֶף אֶחָד
  chosen: A thousand
  alternatives:
  - One thousand
  lexicon: HALOT
  rationale: The Hebrew literally reads 'a thousand, one,' an idiomatic numerical
    expression meaning 'one thousand' or simply 'a thousand.' English idiom prefers
    'A thousand.'
- source_word: מִפְּנֵי
  chosen: at
  alternatives:
  - before
  - from before
  lexicon: HALOT
  rationale: 'Literally ''from before/because of.'' In this context of panic in battle,
    ''at'' idiomatically conveys causation in English: fleeing at someone''s rebuke.'
- source_word: גַּעֲרַת
  chosen: rebuke
  alternatives:
  - threat
  - shout
  lexicon: HALOT
  rationale: The noun commonly denotes a rebuke or threatening reprimand. 'Rebuke'
    preserves the lexical core while fitting the military-terror context; 'threat'
    is interpretive and 'shout' too narrow.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: 'Straightforward numeral; the contrast is rhetorical: many flee before
    one.'
- source_word: חֲמִשָּׁה
  chosen: five
  lexicon: HALOT
  rationale: 'Straightforward numeral, intensifying the disproportion: if one causes
    mass flight, five cause total rout.'
- source_word: תָּנֻסוּ
  chosen: you will flee
  alternatives:
  - you will take flight
  lexicon: HALOT
  rationale: Qal imperfect 2mp of נוס. 'You will flee' is the natural modern English
    rendering and preserves the direct address to the people.
- source_word: עַד אִם
  chosen: until
  alternatives:
  - until indeed
  - until when
  lexicon: HALOT
  rationale: 'The combination introduces the result limit: ''until you are left.''
    English compresses the idiom naturally to ''until.'''
- source_word: נוֹתַרְתֶּם
  chosen: you are left
  alternatives:
  - you remain
  - you are left over
  lexicon: HALOT
  rationale: Niphal of יתר/נותר conveys being left remaining after devastation. 'You
    are left' is idiomatic and suitably stark.
- source_word: כַּתֹּרֶן
  chosen: like a signal pole
  alternatives:
  - like a mast
  - like a pole
  lexicon: HALOT
  rationale: תֹּרֶן can denote a mast or tall pole. In parallel with נֵס ('banner/signal
    standard') and in this elevated-landscape image, 'signal pole' best conveys an
    isolated marker visible from afar.
- source_word: עַל רֹאשׁ הָהָר
  chosen: on the top of a mountain
  alternatives:
  - on the summit of the mountain
  - on a mountaintop
  lexicon: HALOT
  rationale: A natural rendering of the locative phrase. The article on 'mountain'
    is not necessarily specific in English style here; 'a mountain' reads more naturally
    in a proverbial image.
- source_word: וְכַנֵּס
  chosen: and like a banner
  alternatives:
  - and like a signal banner
  - and like a standard
  lexicon: HALOT
  rationale: נֵס is a raised signal standard/banner. 'Banner' is accessible modern
    English; the signaling function is already suggested by the parallel 'signal pole.'
- source_word: עַל הַגִּבְעָה
  chosen: on a hill
  alternatives:
  - upon the hill
  lexicon: HALOT
  rationale: Simple topographical term. As with 'mountain,' English idiom prefers
    the indefinite article in this simile.
