id: ISA.51.14
reference: Isaiah 51:14
source:
  edition: WLC
  text: מִהַ֥ר צֹעֶ֖ה לְ/הִפָּתֵ֑חַ וְ/לֹא יָמ֣וּת לַ/שַּׁ֔חַת וְ/לֹ֥א יֶחְסַ֖ר לַחְמֽ/וֹ־׃
translation:
  text: The one bent low will soon be set free; he will not die in the pit, and his
    bread will not be lacking.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the captive will soon be released.' The Hebrew expression is difficult;
      the wording may evoke someone bowed down under oppression and then freed.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will not die in the dungeon.' The Hebrew 'pit' can refer literally
      to a pit, dungeon, or figuratively to destruction/grave.
    reason: alternative_reading
lexical_decisions:
- source_word: מִהַר
  chosen: will soon
  alternatives:
  - quickly
  - hastens
  lexicon: HALOT
  rationale: The form conveys haste/imminence. In English, 'will soon' naturally expresses
    the prophetic assurance of near action better than the more wooden 'hastens'.
- source_word: צֹעֶה
  chosen: the one bent low
  alternatives:
  - the captive
  - the one stooping
  - the wanderer
  lexicon: HALOT
  rationale: The participle from צעה is difficult and has been understood in context
    as one bowed down or crouching, likely under oppression. 'The one bent low' preserves
    the image of humiliation without over-specifying imprisonment, while still fitting
    the surrounding context of exile and deliverance.
- source_word: לְהִפָּתֵחַ
  chosen: be set free
  alternatives:
  - be opened
  - be released
  lexicon: HALOT
  rationale: Although the Niphal infinitive of פתח is literally 'to be opened,' in
    this context it idiomatically refers to release from confinement. 'Be set free'
    communicates the sense in clear modern English.
- source_word: וְלֹא יָמוּת
  chosen: he will not die
  alternatives:
  - and he will not die
  lexicon: HALOT
  rationale: Straightforward negated imperfect expressing assurance of preservation.
    English omits the conjunction naturally in a flowing sentence while retaining
    the sense.
- source_word: לַשַּׁחַת
  chosen: in the pit
  alternatives:
  - in the dungeon
  - to the pit
  - to corruption
  lexicon: HALOT
  rationale: שחת can denote a pit, grave, or place of destruction. Here, in parallel
    with release and provision, 'the pit' best preserves the concrete image while
    allowing resonance with imprisonment or death.
- source_word: וְלֹא יֶחְסַר לַחְמוֹ
  chosen: his bread will not be lacking
  alternatives:
  - he will not lack bread
  - his food will not fail
  lexicon: HALOT
  rationale: לחם often means bread literally and by extension food. 'His bread will
    not be lacking' stays close to the Hebrew while remaining idiomatic and preserving
    the concrete provision imagery.
