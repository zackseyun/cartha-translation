theological_decisions:
- issue: Interpretation of the oppressed figure
  chosen_reading: A singular oppressed person used representatively for the exiled
    people of God
  alternative_readings:
  - A specific prisoner
  - A more generalized sufferer
  rationale: The singular forms are retained in translation ('he,' 'his'), in keeping
    with the Hebrew grammar and the project's gender-accurate policy, while the wording
    remains broad enough to fit the representative sense in context.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
