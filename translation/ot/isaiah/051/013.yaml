id: ISA.51.13
reference: Isaiah 51:13
source:
  edition: WLC
  text: וַ/תִּשְׁכַּ֞ח יְהוָ֣ה עֹשֶׂ֗/ךָ נוֹטֶ֣ה שָׁמַיִם֮ וְ/יֹסֵ֣ד אָרֶץ֒ וַ/תְּפַחֵ֨ד תָּמִ֜יד כָּל הַ/יּ֗וֹם מִ/פְּנֵי֙ חֲמַ֣ת הַ/מֵּצִ֔יק כַּ/אֲשֶׁ֥ר כּוֹנֵ֖ן לְ/הַשְׁחִ֑ית וְ/אַיֵּ֖ה חֲמַ֥ת הַ/מֵּצִֽיק־׃
translation:
  text: and you forgot Yahweh your Maker, who stretched out the heavens and founded the earth, and you feared continually all day long because of the fury of the oppressor, when he set himself to destroy. But where is the fury of the oppressor?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as if he were ready to destroy' for the clause 'when he set himself to destroy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשְׁכַּח
  chosen: you forgot
  alternatives:
  - you have forgotten
  - you forget
  lexicon: HALOT
  rationale: 'Qal wayyiqtol 2ms of שׁכח. In this prophetic discourse it functions naturally as a past/perfective accusation: ''you forgot.'' English simple past is idiomatic and preserves the rebuke.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֹשֶׂךָ
  chosen: your Maker
  alternatives:
  - the one who made you
  - your creator
  lexicon: HALOT
  rationale: Participle of עשה with 2ms suffix. 'Your Maker' is concise, natural, and preserves the participial/title-like force.
- source_word: נוֹטֶה שָׁמַיִם
  chosen: who stretched out the heavens
  alternatives:
  - stretching out the heavens
  - who spreads out the heavens
  lexicon: HALOT
  rationale: נטה in cosmological contexts commonly means 'stretch out.' Relative clause in English fits the appositional participle after 'your Maker.'
- source_word: וְיֹסֵד אָרֶץ
  chosen: and founded the earth
  alternatives:
  - and laid the foundation of the earth
  - and established the earth
  lexicon: HALOT
  rationale: יסד denotes founding/laying foundations. 'Founded the earth' is compact and idiomatic while retaining the creation imagery.
- source_word: וַתְּפַחֵד
  chosen: and you trembled
  alternatives:
  - and you feared
  - and you were in dread
  lexicon: HALOT
  rationale: פחד can mean fear/dread; 'trembled' captures the experiential force in context of intimidation, without over-paraphrase.
- source_word: תָּמִיד כָּל הַיּוֹם
  chosen: continually all day long
  alternatives:
  - continually, all day long
  - constantly every day
  lexicon: HALOT
  rationale: The combination intensifies duration. 'Continually all day long' preserves both adverbial elements rather than collapsing them.
- source_word: מִפְּנֵי חֲמַת הַמֵּצִיק
  chosen: because of the fury of the oppressor
  alternatives:
  - before the wrath of the oppressor
  - because of the rage of the oppressor
  lexicon: HALOT
  rationale: מִפְּנֵי here is causal in context ('because of/before'). 'Because of' is clearer in English. חֵמָה/חֲמָה is strong anger; 'fury' fits. מֵצִיק is one who oppresses/distresses; 'oppressor' is the most direct nominal rendering.
- source_word: כַּאֲשֶׁר כּוֹנֵן לְהַשְׁחִית
  chosen: when he set himself to destroy
  alternatives:
  - as if he were ready to destroy
  - when he prepared to destroy
  - as he made ready to destroy
  lexicon: HALOT
  rationale: כּוֹנֵן conveys being established/prepared/determined. In this context of threatening hostility, 'set himself to destroy' expresses deliberate readiness without overstating certainty. The clause is best taken temporally/circumstantially with reference to the oppressor.
- source_word: וְאַיֵּה חֲמַת הַמֵּצִיק
  chosen: But where is the fury of the oppressor?
  alternatives:
  - and where is the fury of the oppressor?
  - yet where is the oppressor's fury?
  lexicon: HALOT
  rationale: אַיֵּה introduces a rhetorical question exposing the oppressor's impotence or transience. 'But' brings out the contrast with the prior fear.
