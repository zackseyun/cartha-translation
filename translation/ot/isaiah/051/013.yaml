theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of 'he set himself to destroy'
  chosen_reading: The subject is the oppressor.
  alternative_readings:
  - An indefinite/generic subject
  - 'A more modal sense: ''as if he were ready to destroy'''
  rationale: The nearest and most coherent antecedent is הַמֵּצִיק ('the oppressor'). The rhetorical question that follows about the oppressor's fury supports keeping the focus on him rather than shifting to an indefinite subject.
