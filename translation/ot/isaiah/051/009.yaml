theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretation of Rahab and tannin imagery
  chosen_reading: Retain the poetic imagery as 'Rahab' and 'the dragon' rather than
    flattening both into 'Egypt' or purely mythological language
  alternative_readings:
  - Interpret Rahab directly as Egypt in the main text
  - Render tannin as 'sea monster'
  rationale: The verse intentionally evokes the LORD's past victory using layered
    imagery that likely alludes to Egypt while also drawing on chaos-combat language.
    Preserving the imagery maintains the theological tension and poetic force rather
    than resolving it too narrowly.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension
    rather than resolve it
