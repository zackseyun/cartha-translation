id: ISA.51.9
reference: Isaiah 51:9
source:
  edition: WLC
  text: עוּרִ֨י עוּרִ֤י לִבְשִׁי עֹז֙ זְר֣וֹעַ יְהוָ֔ה ע֚וּרִי כִּ֣/ימֵי קֶ֔דֶם דֹּר֖וֹת
    עוֹלָמִ֑ים הֲ/ל֥וֹא אַתְּ הִ֛יא הַ/מַּחְצֶ֥בֶת רַ֖הַב מְחוֹלֶ֥לֶת תַּנִּֽין־־׃
translation:
  text: Awake, awake, put on strength, arm of the LORD; awake as in days of old, generations
    of long ago. Was it not you who cut Rahab in pieces, who pierced the dragon?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rahab is a poetic name used for a proud enemy power, often understood here
      as Egypt.
    reason: cross_reference
  - marker: b
    text: Or 'the sea monster.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עוּרִי
  chosen: Awake
  alternatives:
  - Rouse yourself
  - Wake up
  lexicon: HALOT
  rationale: Imperative feminine singular addressed to the arm of the LORD, personified
    as a woman. 'Awake' preserves the poetic repetition and elevated tone better than
    the more colloquial 'wake up.'
- source_word: לִבְשִׁי עֹז
  chosen: put on strength
  alternatives:
  - clothe yourself with strength
  - put on might
  lexicon: HALOT
  rationale: The idiom is literally 'put on strength/clothe yourself with strength.'
    'Put on strength' is concise, natural English and preserves the metaphor of donning
    power.
- source_word: זְרֹועַ יְהוָה
  chosen: arm of the LORD
  alternatives:
  - the LORD's arm
  - arm of Yahweh
  lexicon: HALOT
  rationale: A standard Hebrew metaphor for the LORD's power in action. 'Arm of the
    LORD' preserves the vocative force and imagery. Per doctrine, יְהוָה is rendered
    'the LORD,' not 'Yahweh,' in the main text.
- source_word: כִּימֵי קֶדֶם
  chosen: as in days of old
  alternatives:
  - as in ancient days
  - as in former days
  lexicon: HALOT
  rationale: This phrase points to primeval or ancient times. 'Days of old' is idiomatic
    and suitably poetic.
- source_word: דֹּרוֹת עוֹלָמִים
  chosen: generations of long ago
  alternatives:
  - generations of ages past
  - generations of eternity
  lexicon: HALOT
  rationale: The phrase intensifies antiquity rather than teaching metaphysical eternity
    here. 'Generations of long ago' communicates remote antiquity in readable English.
- source_word: הֲלוֹא אַתְּ הִיא
  chosen: Was it not you
  alternatives:
  - Are you not the one
  - Was not it you
  lexicon: HALOT
  rationale: Introduces a rhetorical question addressed to the personified arm. 'Was
    it not you' fits the retrospective appeal to past saving acts.
- source_word: הַמַּחְצֶבֶת
  chosen: who cut ... in pieces
  alternatives:
  - who hewed
  - who chopped down
  lexicon: HALOT
  rationale: From a verb meaning to hew or cut. With Rahab as the object, 'cut in
    pieces' best conveys violent defeat in idiomatic English.
- source_word: רַהַב
  chosen: Rahab
  alternatives:
  - the proud one
  - Egypt
  lexicon: HALOT
  rationale: Here Rahab is best retained as the poetic/mythic name, likely evoking
    Egypt as the chaotic enemy power. Transliteration preserves the literary allusion
    without prematurely collapsing the image into a single interpretation.
- source_word: מְחוֹלֶלֶת
  chosen: who pierced
  alternatives:
  - who wounded
  - who slew
  lexicon: HALOT
  rationale: The participle here denotes a forceful striking or piercing in parallel
    with cutting Rahab. 'Pierced' fits the monster-combat imagery and remains appropriately
    vivid without overinterpreting.
- source_word: תַּנִּין
  chosen: the dragon
  alternatives:
  - the sea monster
  - the serpent
  lexicon: HALOT
  rationale: In this poetic context the term evokes a chaos monster rather than an
    ordinary reptile. 'Dragon' is the most natural English equivalent for the mythic
    imagery, while 'sea monster' remains a viable alternative preserved in a footnote.
