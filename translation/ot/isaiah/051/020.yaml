theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the covenant name as 'the LORD' in keeping
    with the doctrine file's contested terms table and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Identification of תוא in the simile
  chosen_reading: antelope
  alternative_readings:
  - wild ox
  rationale: The exact animal is uncertain and not theologically determinative. A
    modern zoological rendering that preserves the image of a trapped wild animal
    is preferred in the main text, while the traditional alternative is preserved
    in a footnote for auditability.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
