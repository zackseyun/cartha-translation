id: ISA.51.20
reference: Isaiah 51:20
source:
  edition: WLC
  text: בָּנַ֜יִ/ךְ עֻלְּפ֥וּ שָׁכְב֛וּ בְּ/רֹ֥אשׁ כָּל חוּצ֖וֹת כְּ/ת֣וֹא מִכְמָ֑ר
    הַֽ/מְלֵאִ֥ים חֲמַת יְהוָ֖ה גַּעֲרַ֥ת אֱלֹהָֽיִ/ךְ־־׃
translation:
  text: Your sons have fainted; they lie at the head of every street, like an antelope
    in a net, full of the wrath of the LORD, the rebuke of your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “like a wild ox in a net.” The Hebrew animal term is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or “at every street corner.” Literally “at the head of every street.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנַיִךְ
  chosen: Your sons
  alternatives:
  - Your children
  lexicon: HALOT
  rationale: The noun בן in plural with 2fs suffix is literally 'your sons.' While
    it can sometimes function more broadly for children or inhabitants, the immediate
    image is of male offspring/city sons lying in the streets, so the gendered rendering
    is retained per the gender-accurate policy.
- source_word: עֻלְּפוּ
  chosen: have fainted
  alternatives:
  - have become weak
  - have swooned
  lexicon: HALOT
  rationale: The passive/perfect form from עלף denotes fainting or swooning from exhaustion
    or distress. 'Have fainted' is natural modern English and preserves the physical
    collapse implied.
- source_word: שָׁכְבוּ
  chosen: they lie
  alternatives:
  - they have lain
  - they are lying
  lexicon: HALOT
  rationale: The verb means 'lie down/lie.' In English, simple present in vivid description
    works well after the perfect 'have fainted,' conveying their present condition.
- source_word: בְּרֹאשׁ כָּל חוּצוֹת
  chosen: at the head of every street
  alternatives:
  - at every street corner
  - at the entrance of every street
  lexicon: HALOT
  rationale: ראשׁ literally means 'head, top, beginning.' With streets, it likely
    refers to the prominent beginning/endpoints or corners. 'At the head of every
    street' stays close to the Hebrew while remaining intelligible; the more idiomatic
    'at every street corner' is preserved as an alternative.
- source_word: כְּתוֹא
  chosen: like an antelope
  alternatives:
  - like a wild ox
  lexicon: HALOT
  rationale: תוא is a zoological term of uncertain exact identification. Many modern
    lexicons and translations favor a kind of antelope/gazelle-like wild animal rather
    than the older 'wild bull/ox.' 'Antelope' communicates a hunted wild animal without
    overclaiming precision.
- source_word: מִכְמָר
  chosen: in a net
  alternatives:
  - in a snare
  lexicon: HALOT
  rationale: The noun denotes a net used for catching animals. 'Net' is the most direct
    rendering and fits the simile naturally.
- source_word: הַמְלֵאִים
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: The participle 'the ones being full' describes the sons' condition. English
    idiom prefers 'full of' here.
- source_word: חֲמַת יְהוָה
  chosen: the wrath of the LORD
  alternatives:
  - the fury of the LORD
  lexicon: HALOT
  rationale: חמה denotes burning wrath/fury. 'Wrath' preserves the judicial and theological
    force. Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name.
- source_word: גַּעֲרַת אֱלֹהָיִךְ
  chosen: the rebuke of your God
  alternatives:
  - the reproof of your God
  lexicon: HALOT
  rationale: גערה denotes a sharp rebuke or reprimand, often forceful and judicial.
    'Rebuke' is clear and weighty without becoming archaic.
