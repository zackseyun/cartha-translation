id: ISA.51.5
reference: Isaiah 51:5
source:
  edition: WLC
  text: קָר֤וֹב צִדְקִ/י֙ יָצָ֣א יִשְׁעִ֔/י וּ/זְרֹעַ֖/י עַמִּ֣ים יִשְׁפֹּ֑טוּ אֵלַ/י֙
    אִיִּ֣ים יְקַוּ֔וּ וְ/אֶל זְרֹעִ֖/י יְיַחֵלֽוּ/ן־׃
translation:
  text: My righteousness is near, my salvation has gone out, and my arms will judge
    the peoples; the coastlands will wait for me, and for my arm they will hope.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My justice is near.' The Hebrew צדק can mean 'righteousness,' 'justice,'
      or 'vindication' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my arms' here, but 'my arm' later in the verse. The imagery refers
      to the LORD's active power.
    reason: lexical_alternative
  - marker: c
    text: Or 'the islands' or 'the distant shores.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרוֹב
  chosen: is near
  alternatives:
  - is at hand
  - has drawn near
  lexicon: HALOT
  rationale: Predicate adjective expressing nearness. 'Is near' is clear modern English
    and preserves the stative sense without adding aspect beyond the Hebrew.
- source_word: צִדְקִי
  chosen: my righteousness
  alternatives:
  - my justice
  - my vindication
  lexicon: HALOT
  rationale: צדק can denote righteousness or justice. 'Righteousness' is the default
    rendering for this theological term and fits the parallel with 'my salvation.'
    'Justice' is a viable contextual alternative and is preserved in a footnote because
    the verse has public/judicial overtones.
- source_word: יָצָא
  chosen: has gone out
  alternatives:
  - goes out
  - has come forth
  lexicon: HALOT
  rationale: The qatal verb is rendered with an English perfect to reflect a completed
    action with present relevance in context. 'Has gone out' preserves the concrete
    verbal imagery better than a more interpretive rendering.
- source_word: יִשְׁעִי
  chosen: my salvation
  alternatives:
  - my deliverance
  - my victory
  lexicon: HALOT
  rationale: The noun from ישׁע commonly denotes salvation/deliverance. 'My salvation'
    is the most transparent and theologically resonant rendering in this Isaianic
    context.
- source_word: וּזְרֹעַי
  chosen: and my arms
  alternatives:
  - and my arm
  lexicon: HALOT
  rationale: The form is morphologically plural with 1cs suffix, so 'my arms' best
    reflects the Hebrew form. In Isaiah 'arm' often symbolizes divine power; here
    the plural should not be flattened without cause, though the singular idiom remains
    possible in English and is preserved in a footnote because the later occurrence
    is singular.
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - peoples
  - nations
  lexicon: HALOT
  rationale: '''The peoples'' preserves the plural collective sense of multiple nations/groups
    better than the more interpretive ''nations.'' The article is not explicit in
    Hebrew, but English idiom naturally uses it here.'
- source_word: יִשְׁפֹּטוּ
  chosen: will judge
  alternatives:
  - judge
  - will govern
  lexicon: HALOT
  rationale: The verb שׁפט includes judging and governing. 'Will judge' keeps the
    core judicial sense and matches the immediate context of righteousness and peoples.
- source_word: אֵלַי
  chosen: for me
  alternatives:
  - to me
  - in me
  lexicon: HALOT
  rationale: Although the preposition literally means 'to/toward me,' in English with
    'wait' the idiomatic construction is 'wait for me.' This is an optimal-equivalence
    adjustment for natural English.
- source_word: אִיִּים
  chosen: the coastlands
  alternatives:
  - the islands
  - the distant shores
  lexicon: HALOT
  rationale: In Isaiah this term often refers broadly to maritime lands/coastal regions,
    especially distant nations. 'The coastlands' is the standard and least misleading
    rendering; 'islands' is too narrow in some contexts.
- source_word: יְקַוּוּ
  chosen: will wait
  alternatives:
  - will hope
  - will look eagerly
  lexicon: HALOT
  rationale: The verb can mean wait with expectation or hope. Because the next verb
    explicitly carries the sense of hoping, rendering this one as 'will wait' preserves
    the poetic parallelism without collapsing both verbs into the same English gloss.
- source_word: וְאֶל זְרֹעִי
  chosen: and for my arm
  alternatives:
  - and for my power
  - and toward my arm
  lexicon: HALOT
  rationale: The singular 'my arm' is retained here because the Hebrew is singular.
    'Arm' is a common biblical metaphor for active power; translating it literally
    preserves the imagery.
- source_word: יְיַחֵלוּן
  chosen: they will hope
  alternatives:
  - they will wait in hope
  - they will trust
  lexicon: HALOT
  rationale: יחל in the piel conveys hopeful waiting/expectation. 'They will hope'
    gives a natural English distinction from the previous 'will wait' while preserving
    the semantic overlap of the parallel verbs.
