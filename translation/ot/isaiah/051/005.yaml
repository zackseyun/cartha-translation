theological_decisions:
- issue: Rendering צדק in a salvation-oracle context
  chosen_reading: my righteousness
  alternative_readings:
  - my justice
  - my vindication
  rationale: The verse links God's צדק with his saving action and rule over the peoples.
    'Righteousness' preserves the broader covenantal and theological sense without
    reducing it to courtroom justice alone. Because the context also includes judging
    the peoples, 'justice' remains a meaningful alternative and is preserved in a
    footnote rather than resolved away.
  doctrine_reference: 'DOCTRINE.md: Contested terms table notes δικαιοσύνη as ''righteousness''
    by default with ''justice'' preserved in footnotes where relevant; by analogy
    the Hebrew cognate is handled similarly.'
- issue: Anthropomorphic metaphor of God's arm/arms
  chosen_reading: retain literal 'arm/arms' imagery
  alternative_readings:
  - power
  - strength
  rationale: The Hebrew uses the bodily metaphor to depict divine power in action.
    Translating it literally preserves the prophetic imagery and theological texture
    rather than prematurely interpreting it as abstract 'power.'
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; do not paraphrase beyond
    what the source warrants.'
