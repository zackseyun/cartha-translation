theological_decisions:
- issue: Exodus allusion and scope of redemption imagery
  chosen_reading: Retain the historical sea-crossing imagery in direct language without
    making the referent explicit in the main text.
  alternative_readings:
  - Explicitly identify the sea as the Red Sea
  - Generalize the verse into a purely metaphorical statement of deliverance
  rationale: The Hebrew plainly evokes the Exodus while also participating in Isaiah's
    broader redemption theology. Leaving 'the sea' untranslated beyond its lexical
    sense preserves both the historical allusion and the typological breadth without
    importing interpretation into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
