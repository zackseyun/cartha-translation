id: ISA.51.10
reference: Isaiah 51:10
source:
  edition: WLC
  text: הֲ/ל֤וֹא אַתְּ הִיא֙ הַ/מַּחֲרֶ֣בֶת יָ֔ם מֵ֖י תְּה֣וֹם רַבָּ֑ה הַ/שָּׂ֨מָה֙
    מַֽעֲמַקֵּי יָ֔ם דֶּ֖רֶךְ לַ/עֲבֹ֥ר גְּאוּלִֽים־־׃
translation:
  text: Was it not you who dried up the sea, the waters of the great deep, who made
    the depths of the sea a way for the redeemed to cross over?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the waters of the vast deep.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for the ransomed to cross over.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹוא
  chosen: Was it not
  alternatives:
  - Is it not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. English
    past tense is carried by the participles and perfect that follow, so 'Was it not'
    reads naturally and matches the retrospective sense.
- source_word: אַתְּ הִיא
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: The combination is emphatic feminine singular, addressing Zion/the arm
    of the LORD in feminine grammatical form from the context. English does not mark
    feminine in second person, so the emphasis is conveyed simply by 'you' within
    the rhetorical question.
- source_word: הַמַּחֲרֶבֶת
  chosen: who dried up
  alternatives:
  - who laid waste
  - who made dry
  lexicon: HALOT
  rationale: From חרב in the causative/participle sense, here used of the sea. 'Dried
    up' best fits the Exodus allusion and idiomatic English for waters being removed.
- source_word: יָם
  chosen: the sea
  lexicon: HALOT
  rationale: Straightforward rendering; in context it evokes the Red Sea without needing
    to specify it in translation.
- source_word: מֵי תְּהוֹם רַבָּה
  chosen: the waters of the great deep
  alternatives:
  - the waters of the vast deep
  - the waters of the mighty deep
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English. 'Great deep' preserves
    the elevated, cosmic resonance of תְּהוֹם while remaining readable.
- source_word: הַשָּׂמָה
  chosen: who made
  alternatives:
  - who set
  - who placed
  lexicon: HALOT
  rationale: Qal perfect of שׂים, here introducing the second relative-like clause.
    'Made' is idiomatic with the complement 'a way'.
- source_word: מַעֲמַקֵּי יָם
  chosen: the depths of the sea
  alternatives:
  - the deep places of the sea
  lexicon: HALOT
  rationale: Plural construct meaning the deep parts/depths. 'Depths of the sea' is
    natural and preserves the imagery.
- source_word: דֶּרֶךְ
  chosen: a way
  alternatives:
  - a path
  - a road
  lexicon: HALOT
  rationale: Common metaphorical and literal term. 'A way' fits both the physical
    crossing and the broader redemptive motif.
- source_word: לַעֲבֹר
  chosen: to cross over
  alternatives:
  - to pass through
  - to pass over
  lexicon: HALOT
  rationale: Infinitive of עבר. 'Cross over' is clear, idiomatic, and suits the sea-crossing
    context better than the more ambiguous 'pass through'.
- source_word: גְּאוּלִים
  chosen: the redeemed
  alternatives:
  - the ransomed
  lexicon: HALOT
  rationale: Passive participial form from גאל, denoting those redeemed. 'The redeemed'
    is the most standard and contextually fitting rendering in Isaiah's restoration
    language.
