id: ISA.51.1
reference: Isaiah 51:1
source:
  edition: WLC
  text: שִׁמְע֥וּ אֵלַ֛/י רֹ֥דְפֵי צֶ֖דֶק מְבַקְשֵׁ֣י יְהוָ֑ה הַבִּ֨יטוּ֙ אֶל צ֣וּר חֻצַּבְתֶּ֔ם וְ/אֶל מַקֶּ֥בֶת בּ֖וֹר נֻקַּרְתֶּֽם־־׃
translation:
  text: 'Listen to me, you who pursue righteousness, you who seek Yahweh: look to the rock from which you were cut, and to the quarry from which you were dug.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice' for 'righteousness.'
    reason: lexical_alternative
  - marker: b
    text: Verse 2 identifies this imagery with Abraham and Sarah.
    reason: cross_reference
  - marker: c
    text: Or 'from which you were hewn.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Listen
  alternatives:
  - Hear
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Listen' is natural modern English and preserves the summons to attentive hearing better than the more archaic-sounding 'Hear.'
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Straightforward preposition plus 1cs suffix; rendered directly as 'to me.'
- source_word: רֹדְפֵי צֶדֶק
  chosen: you who pursue righteousness
  alternatives:
  - you who pursue justice
  - pursuers of righteousness
  lexicon: HALOT
  rationale: The participial construction addresses a class of people characterized by seeking what is right. 'Pursue righteousness' is idiomatic and preserves the active metaphor of chasing after covenantal rightness. 'Justice' is possible for צֶדֶק, but in this exhortational context 'righteousness' better captures the moral-religious sense.
- source_word: מְבַקְשֵׁי יְהוָה
  chosen: you who seek the LORD
  alternatives:
  - seekers of the LORD
  lexicon: HALOT
  rationale: Another participial phrase parallel to the previous one. 'Seek the LORD' is standard, clear English for covenantal devotion and inquiry.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַבִּיטוּ
  chosen: look
  alternatives:
  - consider
  - gaze
  lexicon: HALOT
  rationale: Imperative plural calling for reflective attention. 'Look' is the most direct and natural rendering; the following metaphors make clear that this is contemplative, not merely visual.
- source_word: אֶל צוּר
  chosen: to the rock
  lexicon: HALOT
  rationale: צוּר is literally 'rock.' The image likely points to ancestral origin, but the metaphor should be preserved rather than interpreted in the main text.
- source_word: חֻצַּבְתֶּם
  chosen: from which you were cut
  alternatives:
  - from which you were hewn
  lexicon: HALOT
  rationale: Passive form from חצב, 'hew/cut out.' 'Cut' is more readable modern English than 'hewn' while preserving the quarrying metaphor. 'From which' is supplied in English to make the relation to 'rock' explicit and idiomatic.
- source_word: מַקֶּבֶת בּוֹר
  chosen: the quarry of the pit
  alternatives:
  - the excavation of the pit
  - the hollow of the quarry
  lexicon: HALOT
  rationale: מַקֶּבֶת denotes a quarrying/excavation context; paired with בּוֹר ('pit'). 'Quarry of the pit' preserves the concrete extraction imagery without overinterpreting the metaphor. The construct-like relation is represented idiomatically in English.
- source_word: נֻקַּרְתֶּם
  chosen: from which you were dug
  alternatives:
  - from which you were quarried
  lexicon: HALOT
  rationale: Passive form with the sense of being excavated/extracted. 'Dug' is plain modern English and matches the pit/quarry imagery. 'Quarried' is possible but less accessible and somewhat redundant after 'quarry' in the previous phrase.
