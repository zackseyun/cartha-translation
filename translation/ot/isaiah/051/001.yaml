theological_decisions:
- issue: Whether to interpret the rock/quarry metaphor explicitly as Abraham and Sarah in the main text
  chosen_reading: Preserve the metaphor without interpretation in the main text
  alternative_readings:
  - Explicitly identify the rock/quarry as Abraham and Sarah
  rationale: Verse 2 explains the metaphor by naming Abraham and Sarah. In verse 1 itself, the Hebrew leaves the image metaphorical. To avoid importing interpretation into the text prematurely, the translation keeps the metaphor and lets the next verse unpack it.
  doctrine_reference: 'Translation philosophy #1 and #3'
- issue: Rendering of צֶדֶק
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The Hebrew term can overlap with both moral righteousness and justice. Here the addressees are defined by covenantal pursuit of what is right before God and by seeking the LORD, so 'righteousness' best fits the immediate parallelism while preserving theological weight.
  doctrine_reference: 'Translation philosophy #5'
