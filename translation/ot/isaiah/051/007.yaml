id: ISA.51.7
reference: Isaiah 51:7
source:
  edition: WLC
  text: שִׁמְע֤וּ אֵלַ/י֙ יֹ֣דְעֵי צֶ֔דֶק עַ֖ם תּוֹרָתִ֣/י בְ/לִבָּ֑/ם אַל תִּֽירְאוּ֙
    חֶרְפַּ֣ת אֱנ֔וֹשׁ וּ/מִ/גִּדֻּפֹתָ֖/ם אַל תֵּחָֽתּוּ־־׃
translation:
  text: 'Listen to me, you who know righteousness, people with my law in their hearts:
    do not fear the reproach of man, and do not be shattered by their insults.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you who know justice.'
    reason: lexical_alternative
  - marker: b
    text: Or 'people with my instruction in their hearts.'
    reason: lexical_alternative
  - marker: c
    text: '''Man'' translates Hebrew אֱנוֹשׁ, a singular term for a human being, often
      with the nuance of mortal frailty; alternatively, ''human'' or ''mortal.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'do not be dismayed' or 'do not be broken.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ אֵלַי
  chosen: Listen to me
  alternatives:
  - Hear me
  lexicon: HALOT
  rationale: Imperative plural of שׁמע with אֶל marks directed listening/heed. 'Listen
    to me' is natural modern English and preserves the summons better than the more
    archaic 'Hearken to me.'
- source_word: יֹדְעֵי צֶדֶק
  chosen: you who know righteousness
  alternatives:
  - you who know justice
  - knowers of righteousness
  lexicon: HALOT
  rationale: צֶדֶק can denote righteousness or justice. In this vocative description,
    'righteousness' best fits the moral-covenantal sense and aligns with the book's
    usage, while 'justice' remains a viable lexical alternative.
- source_word: עַם תּוֹרָתִי בְלִבָּם
  chosen: people with my law in their hearts
  alternatives:
  - a people with my instruction in their heart
  - people in whose heart is my law
  lexicon: HALOT
  rationale: 'תּוֹרָה can mean ''law'' or ''instruction.'' ''Law'' is retained because
    covenantal normativity is prominent here, though ''instruction'' is lexically
    possible. The singular עַם is used collectively; English ''people'' conveys this
    naturally. בְלִבָּם is rendered idiomatically as internalized possession: ''with
    my law in their hearts.'''
- source_word: אַל תִּירְאוּ
  chosen: do not fear
  alternatives:
  - do not be afraid of
  lexicon: HALOT
  rationale: Standard negative jussive/prohibitive. 'Do not fear' is concise and preserves
    the directness of the Hebrew.
- source_word: חֶרְפַּת אֱנוֹשׁ
  chosen: the reproach of man
  alternatives:
  - human reproach
  - the scorn of man
  lexicon: HALOT
  rationale: חֶרְפָּה denotes reproach, taunt, or disgrace. 'Reproach' preserves the
    verbal-abusive sense. אֱנוֹשׁ is singular 'man/mortal human.' Per gender-accurate
    policy, 'man' is retained because the Hebrew singular generic is foregrounded;
    'human' is possible but less idiomatic here.
- source_word: וּמִגִּדֻּפֹתָם
  chosen: by their insults
  alternatives:
  - because of their revilings
  - by their taunts
  - from their blasphemies
  lexicon: HALOT
  rationale: The noun from גדף refers to abusive speech/reviling. In this human-to-human
    context, 'insults' is the clearest modern rendering. 'Blasphemies' would over-specify
    a God-directed sense not required here.
- source_word: אַל תֵּחָתּוּ
  chosen: do not be shattered
  alternatives:
  - do not be dismayed
  - do not be broken
  - do not be terrified
  lexicon: HALOT
  rationale: חתת in the Niphal can mean be shattered, dismayed, or broken down. Given
    the parallel with fearing reproach, the sense is inward collapse under hostile
    speech. 'Do not be shattered' preserves the stronger metaphorical force better
    than the flatter 'do not be dismayed.'
