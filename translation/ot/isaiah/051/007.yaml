theological_decisions:
- issue: Rendering of צֶדֶק
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The term can overlap with justice, but here the address is to those who
    know God's moral rightness and have his Torah internalized. 'Righteousness' better
    preserves that covenantal-ethical sense without excluding just order as a related
    nuance.
  doctrine_reference: Contested terms table notes δικαιοσύνη as usually 'righteousness'
    with 'justice' preserved where relevant; by analogy, Hebrew צֶדֶק is rendered
    here with the same theological caution.
- issue: Rendering of אֱנוֹשׁ
  chosen_reading: man
  alternative_readings:
  - human
  - mortal
  rationale: The Hebrew singular generic highlights frail humanity in contrast to
    God. Following the gender-accurate policy, 'man' is retained in the main text
    as the closest match to the source form and rhetorical effect, while an inclusive
    alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
