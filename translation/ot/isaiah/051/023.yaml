theological_decisions:
- issue: Referent of the feminine suffix in 'I will put it'
  chosen_reading: The pronoun refers to the cup/bowl of divine wrath from the immediate
    preceding context, left as 'it' rather than expanded in the main text.
  alternative_readings:
  - Explicitly render 'the cup' for clarity
  rationale: The antecedent is contextually clear from Isaiah 51:22, and retaining
    'it' respects the Hebrew pronominal linkage without importing extra words into
    the verse itself.
