id: ISA.51.23
reference: Isaiah 51:23
source:
  edition: WLC
  text: וְ/שַׂמְתִּ֨י/הָ֙ בְּ/יַד מוֹגַ֔יִ/ךְ אֲשֶׁר אָמְר֥וּ לְ/נַפְשֵׁ֖/ךְ שְׁחִ֣י
    וְ/נַעֲבֹ֑רָה וַ/תָּשִׂ֤ימִי כָ/אָ֨רֶץ֙ גֵּוֵ֔/ךְ וְ/כַ/ח֖וּץ לַ/עֹבְרִֽים־־׃ס
translation:
  text: And I will put it into the hand of those who afflict you, who said to you,
    ‘Bow down, so that we may pass over’; and you made your back like the ground,
    and like the street for those passing by.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the cup of staggering/judgment mentioned in the previous verse.
    reason: cross_reference
  - marker: b
    text: Or 'your tormentors' / 'those who oppress you.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'to your soul,' an idiom meaning 'to you.'
    reason: lexical_alternative
  - marker: d
    text: Or 'that we may pass by'; the Hebrew likely evokes people stepping over
      her in humiliation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּיהָ
  chosen: And I will put it
  alternatives:
  - And I will place it
  - And I will set it
  lexicon: HALOT
  rationale: שׂים commonly means 'put/place/set.' 'Put' is natural modern English.
    The 3fs suffix refers back to the cup of wrath/judgment from the prior context,
    so 'it' is retained rather than repeated explicitly.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - in the hand of
  - to the hand of
  lexicon: HALOT
  rationale: The idiom 'put into the hand of' conveys handing over into another's
    power or control. 'Into' best captures the transfer sense in English.
- source_word: מוֹגַיִךְ
  chosen: those who afflict you
  alternatives:
  - your tormentors
  - those who oppress you
  - those who make you tremble
  lexicon: HALOT
  rationale: The noun refers to those causing distress or oppression. 'Those who afflict
    you' preserves the causative sense without over-specifying emotional terror. 'Tormentors'
    is possible but slightly more interpretive.
- source_word: אֲשֶׁר אָמְרוּ לְנַפְשֵׁךְ
  chosen: who said to you
  alternatives:
  - who said to your soul
  - who said to your life
  lexicon: HALOT
  rationale: נֶפֶשׁ here functions idiomatically for the person addressed. 'To you'
    is the clearest optimal-equivalence rendering; a more literal 'to your soul' would
    sound unnatural and add little in English.
- source_word: שְׁחִי
  chosen: Bow down
  alternatives:
  - Bend low
  - Crouch down
  - Lie prostrate
  lexicon: HALOT
  rationale: The imperative calls for abasement. 'Bow down' is idiomatic and fits
    the following image of others passing over her. 'Lie prostrate' is possible but
    more specific than the verb itself requires.
- source_word: וְנַעֲבֹרָה
  chosen: so that we may pass over
  alternatives:
  - that we may pass by
  - and let us pass over
  lexicon: HALOT
  rationale: 'The cohortative expresses purpose/result after the command: ''Bow down,
    so that we may pass over.'' ''Pass over'' preserves the verbal imagery of moving
    across her body; ''pass by'' weakens that image.'
- source_word: וַתָּשִׂימִי
  chosen: and you made
  alternatives:
  - and you set
  - and you laid
  lexicon: HALOT
  rationale: Again from שׂים, but here English idiom favors 'made' with the predicate
    complements 'like the ground' and 'like the street.'
- source_word: כָאָרֶץ
  chosen: like the ground
  alternatives:
  - like the earth
  - as the land
  lexicon: HALOT
  rationale: In this humiliation image, 'ground' is the most natural English term
    for something trampled underfoot. 'Earth' is possible but less concrete in context.
- source_word: גֵּוֵךְ
  chosen: your back
  alternatives:
  - your body
  - your back/bow
  lexicon: HALOT
  rationale: The noun denotes the back/body, especially the back as exposed to blows
    or trampling. 'Your back' best fits the imagery of being walked over.
- source_word: וְכַחוּץ
  chosen: and like the street
  alternatives:
  - and like a street
  - and like the open street
  - and like the roadway
  lexicon: HALOT
  rationale: חוּץ can denote street/outside place. 'Street' fits the parallel with
    'ground' and the image of passersby. The article is not explicit in Hebrew, but
    English idiom allows 'the street' generically.
- source_word: לָעֹבְרִים
  chosen: for those passing by
  alternatives:
  - for passersby
  - for those who pass over
  lexicon: HALOT
  rationale: The participle denotes people passing along/over. 'Those passing by'
    is clear and readable. A more literal 'pass over' could suggest the trampling
    image, but in English sounds awkward here; the prior clause already preserves
    that imagery.
