theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Temporal force of נָסוּ in prophetic poetry
  chosen_reading: 'future/resultative: ''will flee away'''
  alternative_readings:
  - 'present/perfect: ''have fled'''
  - 'gnomic present: ''flee away'''
  rationale: Although the Hebrew form is qatal, the clause stands in a future restoration oracle and is best rendered in English as the resulting future state accompanying the return of the redeemed. This preserves the prophetic sequence without forcing a wooden tense match.
