id: ISA.51.11
reference: Isaiah 51:11
source:
  edition: WLC
  text: וּ/פְדוּיֵ֨י יְהוָ֜ה יְשׁוּב֗וּ/ן וּ/בָ֤אוּ צִיּוֹן֙ בְּ/רִנָּ֔ה וְ/שִׂמְחַ֥ת עוֹלָ֖ם עַל רֹאשָׁ֑/ם שָׂשׂ֤וֹן וְ/שִׂמְחָה֙ יַשִּׂיג֔וּ/ן נָ֖סוּ יָג֥וֹן וַ/אֲנָחָֽה־׃ס
translation:
  text: And the redeemed of Yahweh will return and come to Zion with singing; everlasting joy will be upon their heads; gladness and joy will overtake them; sorrow and sighing will flee away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with joyful shouting'; the Hebrew term can denote jubilant cries as well as singing.
    reason: lexical_alternative
  - marker: b
    text: Or 'gladness and joy will obtain/reach them'; the Hebrew verb literally means 'catch up with, overtake,' here portraying joy as pursuing them.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְדוּיֵי
  chosen: the redeemed
  alternatives:
  - those ransomed
  - those redeemed
  lexicon: HALOT
  rationale: Passive participial form from פדה denotes people who have been redeemed/ransomed. 'The redeemed' is idiomatic English and preserves the covenant-deliverance sense without overexpanding.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יְשׁוּבוּן
  chosen: will return
  alternatives:
  - shall return
  - will turn back
  lexicon: HALOT
  rationale: שוב commonly means 'return/turn back.' 'Will return' fits the future restoration context and reads naturally in modern English.
- source_word: וּבָאוּ
  chosen: and come
  alternatives:
  - and will come
  - and enter
  lexicon: HALOT
  rationale: בוא is straightforwardly 'come.' Keeping 'and come' preserves the Hebrew sequence with good English flow.
- source_word: צִיּוֹן
  chosen: Zion
  alternatives:
  - Jerusalem
  lexicon: HALOT
  rationale: Proper name should be transliterated, not interpreted. 'Zion' also preserves the theological-poetic resonance of the Hebrew.
- source_word: בְּרִנָּה
  chosen: with singing
  alternatives:
  - with joyful shouting
  - with rejoicing
  lexicon: HALOT
  rationale: רִנָּה denotes a ringing cry of joy. 'With singing' is traditional and natural here, though the term can include jubilant shouting.
- source_word: שִׂמְחַת עוֹלָם
  chosen: everlasting joy
  alternatives:
  - eternal joy
  - joy forever
  lexicon: HALOT
  rationale: Construct phrase literally 'joy of eternity/forever.' 'Everlasting joy' is concise, idiomatic, and preserves the durative force of עוֹלָם.
- source_word: עַל רֹאשָׁם
  chosen: upon their heads
  alternatives:
  - on their heads
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the image of joy as something crowning or resting upon them.
- source_word: שָׂשׂוֹן
  chosen: gladness
  alternatives:
  - joy
  - exultation
  lexicon: HALOT
  rationale: To avoid flattening the paired near-synonyms שָׂשׂוֹן and שִׂמְחָה into identical English terms, 'gladness' is used for the first and 'joy' for the second.
- source_word: שִׂמְחָה
  chosen: joy
  alternatives:
  - gladness
  - rejoicing
  lexicon: HALOT
  rationale: Rendered 'joy' here to preserve distinction within the poetic pair while keeping natural English.
- source_word: יַשִּׂיגוּן
  chosen: will overtake them
  alternatives:
  - will obtain
  - will reach them
  lexicon: HALOT
  rationale: The Hiphil of נשׂג often conveys catching up with or overtaking. In context, personified gladness and joy pursuing and catching them is vivid and preferable to the flatter 'obtain.'
- source_word: נָסוּ
  chosen: will flee away
  alternatives:
  - have fled
  - will vanish
  lexicon: HALOT
  rationale: Though morphologically a qatal form, in this prophetic-poetic context it functions well as a future/resultative statement parallel to the preceding imperfects. 'Will flee away' preserves the image and the temporal sense in English.
- source_word: יָגוֹן
  chosen: sorrow
  alternatives:
  - grief
  lexicon: HALOT
  rationale: יָגוֹן denotes sorrow/grief. 'Sorrow' pairs well with 'sighing' and matches the poetic register.
- source_word: אֲנָחָה
  chosen: sighing
  alternatives:
  - groaning
  - lamentation
  lexicon: HALOT
  rationale: אֲנָחָה is an audible expression of distress. 'Sighing' is the most natural and established rendering in this collocation.
