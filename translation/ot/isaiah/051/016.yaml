theological_decisions:
- issue: Referent of the second-person singular ('your mouth,' 'covered you')
  chosen_reading: Kept the singular 'you/your' without specifying whether the addressee
    is the servant, the prophet, or personified Israel/Zion.
  alternative_readings:
  - the servant figure
  - the prophet
  - corporate Israel/Zion
  rationale: The Hebrew text itself does not explicitly identify the addressee in
    this verse. The translation preserves the ambiguity rather than resolving it interpretively,
    in keeping with the principle of preserving theological tension where the source
    is genuinely open.
  doctrine_reference: Translation philosophy §3
- issue: Cosmic purpose clauses ('to plant the heavens and to found the earth')
  chosen_reading: Retained creation-language as stated, without reducing it to merely
    metaphorical restoration language in the main text.
  alternative_readings:
  - figurative language for Israel's restoration/new creation
  - literal cosmic creation language
  rationale: Isaiah often intertwines creation and redemption imagery. The Hebrew
    wording uses strong creation verbs and should stand in the main text without interpretive
    narrowing. Readers may understand broader restoration implications, but the translation
    should not collapse the tension.
  doctrine_reference: Translation philosophy §3
