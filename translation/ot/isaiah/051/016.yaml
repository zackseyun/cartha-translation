id: ISA.51.16
reference: Isaiah 51:16
source:
  edition: WLC
  text: וָ/אָשִׂ֤ים דְּבָרַ/י֙ בְּ/פִ֔י/ךָ וּ/בְ/צֵ֥ל יָדִ֖/י כִּסִּיתִ֑י/ךָ לִ/נְטֹ֤עַ
    שָׁמַ֨יִם֙ וְ/לִ/יסֹ֣ד אָ֔רֶץ וְ/לֵ/אמֹ֥ר לְ/צִיּ֖וֹן עַמִּ/י אָֽתָּה־׃ס
translation:
  text: And I have put my words in your mouth, and covered you with the shadow of
    my hand, to plant the heavens and to found the earth, and to say to Zion, ‘You
    are my people.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the shadow of my hand' or 'under the shadow of my hand.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to establish the heavens.' The Hebrew literally says 'to plant the heavens,'
      an unusual image that may evoke creation or new-creation restoration.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָשִׂים
  chosen: And I have put
  alternatives:
  - And I put
  - And I will put
  lexicon: HALOT
  rationale: From שׂים, 'to put/place/set.' The waw-prefixed form can be rendered
    with past/perfective force in context. 'Have put' fits the surrounding reassurance
    and the parallel perfect 'covered.' A future rendering is possible in some discourse
    analyses, but the immediate context supports a completed or assured action.
- source_word: דְּבָרַי
  chosen: my words
  alternatives:
  - my word
  - my sayings
  lexicon: HALOT
  rationale: Plural construct with 1cs suffix; straightforwardly 'my words.' Singular
    would flatten the Hebrew plural.
- source_word: בְּפִיךָ
  chosen: in your mouth
  alternatives:
  - on your lips
  lexicon: HALOT
  rationale: Literal idiom for placing speech in someone's mouth. 'In your mouth'
    preserves the prophetic commissioning language better than the more interpretive
    'on your lips.'
- source_word: וּבְצֵל יָדִי
  chosen: with the shadow of my hand
  alternatives:
  - in the shadow of my hand
  - under the shadow of my hand
  lexicon: HALOT
  rationale: ב plus צל can be rendered instrumentally or locatively. 'With the shadow
    of my hand' works naturally with 'covered you' and preserves the protective metaphor.
    'Under/in the shadow' is also viable and worth preserving.
- source_word: כִּסִּיתִיךָ
  chosen: covered you
  alternatives:
  - hidden you
  - sheltered you
  lexicon: HALOT
  rationale: The verb כסה commonly means 'cover.' In this context it carries protective
    nuance, but 'covered' keeps the lexical link while allowing readers to infer shelter.
- source_word: לִנְטֹעַ שָׁמַיִם
  chosen: to plant the heavens
  alternatives:
  - to stretch out the heavens
  - to establish the heavens
  lexicon: HALOT
  rationale: נטע normally means 'plant.' Though unusual with 'heavens,' the translation
    should preserve the striking metaphor rather than normalize it to a different
    verb such as 'stretch out.' 'Establish' is interpretive and overlaps with the
    next clause's יסד.
- source_word: וְלִיסֹד אָרֶץ
  chosen: and to found the earth
  alternatives:
  - and to establish the earth
  - and to lay the foundation of the earth
  lexicon: HALOT
  rationale: יסד means 'to found/establish/lay a foundation.' 'Found the earth' is
    concise, natural enough in elevated English, and preserves the creation/foundation
    imagery.
- source_word: וְלֵאמֹר לְצִיּוֹן
  chosen: and to say to Zion
  alternatives:
  - and to declare to Zion
  lexicon: HALOT
  rationale: אמר is the common verb 'say.' 'Declare' would heighten the register beyond
    the Hebrew's ordinary verb.
- source_word: עַמִּי אָתָּה
  chosen: You are my people
  alternatives:
  - My people are you
  - You are my own people
  lexicon: HALOT
  rationale: The Hebrew is singular masculine ('you' addressed to Zion personified),
    followed by 'my people.' English naturally renders the covenant formula as 'You
    are my people.' This preserves both the direct address to Zion and the covenantal
    identification.
