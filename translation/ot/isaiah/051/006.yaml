theological_decisions:
- issue: Rendering of צִדְקָתִי
  chosen_reading: my righteousness
  alternative_readings:
  - my justice
  rationale: The Hebrew term can overlap semantically with justice, but in Isaiah
    it often carries covenantal and saving overtones alongside God's faithful rectitude.
    'Righteousness' preserves that theological breadth without collapsing it into
    only judicial action. The alternative is preserved in a footnote for auditability.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη default ''righteousness''
    with ''justice'' preserved in footnotes where relevant by analogy of semantic
    field'
