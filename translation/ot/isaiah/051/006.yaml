id: ISA.51.6
reference: Isaiah 51:6
source:
  edition: WLC
  text: שְׂאוּ֩ לַ/שָּׁמַ֨יִם עֵֽינֵי/כֶ֜ם וְֽ/הַבִּ֧יטוּ אֶל הָ/אָ֣רֶץ מִ/תַּ֗חַת
    כִּֽי שָׁמַ֜יִם כֶּ/עָשָׁ֤ן נִמְלָ֨חוּ֙ וְ/הָ/אָ֨רֶץ֙ כַּ/בֶּ֣גֶד תִּבְלֶ֔ה וְ/יֹשְׁבֶ֖י/הָ
    כְּמוֹ כֵ֣ן יְמוּת֑וּ/ן וִ/ישֽׁוּעָתִ/י֙ לְ/עוֹלָ֣ם תִּֽהְיֶ֔ה וְ/צִדְקָתִ֖/י
    לֹ֥א תֵחָֽת־־־׃ס
translation:
  text: Lift up your eyes to the heavens, and look at the earth beneath; for the heavens
    will vanish like smoke, and the earth will wear out like a garment, and its inhabitants
    will die likewise. But my salvation will be forever, and my righteousness will
    not be shattered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the heavens will dissipate like smoke.' The Hebrew verb is difficult;
      the sense is that the heavens pass away.
    reason: lexical_alternative
  - marker: b
    text: Or, 'my justice.' The Hebrew word can denote both righteousness and justice.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאוּ
  chosen: Lift up
  alternatives:
  - Raise
  lexicon: HALOT
  rationale: Imperative plural of נשׂא with 'your eyes' as object; 'lift up' is idiomatic
    and natural in English while preserving the concrete image.
- source_word: לַשָּׁמַיִם
  chosen: to the heavens
  alternatives:
  - to heaven
  - to the skies
  lexicon: HALOT
  rationale: שׁמים is morphologically plural and often denotes the visible heavens/sky.
    'The heavens' preserves the Hebrew form and cosmic scope better than singular
    'heaven'.
- source_word: עֵינֵיכֶם
  chosen: your eyes
  lexicon: HALOT
  rationale: Literal object of the imperative; no reason to paraphrase.
- source_word: וְהַבִּיטוּ
  chosen: and look
  alternatives:
  - and gaze
  - and behold
  lexicon: HALOT
  rationale: Simple imperative parallel to 'lift up'; 'look' is clear modern English
    without archaic coloring.
- source_word: אֶל הָאָרֶץ מִתַּחַת
  chosen: at the earth beneath
  alternatives:
  - to the earth below
  - at the land beneath
  lexicon: HALOT
  rationale: מִתַּחַת specifies what is below in contrast to the heavens above. 'Earth'
    fits the cosmic pairing with 'heavens' better than 'land'.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the imperatives; 'for' suits the elevated prophetic
    style.
- source_word: נִמְלָחוּ
  chosen: will vanish
  alternatives:
  - will dissipate
  - will be worn away
  - will be salted away
  lexicon: HALOT
  rationale: The verb is difficult and contextually describes the passing away of
    the heavens. In parallel with the earth wearing out and the inhabitants dying,
    'will vanish' best captures the sense in readable English. A more literal but
    obscure rendering would confuse modern readers.
- source_word: כֶּעָשָׁן
  chosen: like smoke
  lexicon: HALOT
  rationale: Straightforward simile; retained literally.
- source_word: תִּבְלֶה
  chosen: will wear out
  alternatives:
  - will decay
  - will grow old
  lexicon: HALOT
  rationale: בלה commonly conveys wearing out like clothing. 'Will wear out' preserves
    the garment metaphor explicitly.
- source_word: כַּבֶּגֶד
  chosen: like a garment
  alternatives:
  - like clothing
  lexicon: HALOT
  rationale: Singular 'garment' matches the Hebrew and keeps the simile vivid.
- source_word: וְיֹשְׁבֶיהָ
  chosen: and its inhabitants
  alternatives:
  - and those who dwell in it
  lexicon: HALOT
  rationale: Participle used substantivally for the people dwelling on the earth;
    'its inhabitants' is concise and natural.
- source_word: כְּמוֹ כֵן
  chosen: likewise
  alternatives:
  - in the same way
  - so too
  lexicon: HALOT
  rationale: The phrase marks correspondence with the preceding images of transience;
    'likewise' is compact and clear.
- source_word: יְמוּתוּן
  chosen: will die
  alternatives:
  - will perish
  lexicon: HALOT
  rationale: מות is the ordinary verb 'die.' 'Perish' is possible but adds interpretive
    weight beyond the basic lexical sense.
- source_word: וִישׁוּעָתִי
  chosen: But my salvation
  alternatives:
  - and my salvation
  - yet my salvation
  lexicon: HALOT
  rationale: The conjunction marks contrast with the perishing creation; English 'but'
    brings out the adversative force naturally.
- source_word: לְעוֹלָם תִּהְיֶה
  chosen: will be forever
  alternatives:
  - will endure forever
  - will be everlasting
  lexicon: HALOT
  rationale: Simple existential clause with durative force. 'Will be forever' is close
    to the Hebrew and readable.
- source_word: וְצִדְקָתִי
  chosen: and my righteousness
  alternatives:
  - and my justice
  lexicon: HALOT
  rationale: צדקה can denote righteousness or justice. Here, in parallel with God's
    enduring salvation, 'righteousness' is the default and best preserves the covenantal/theological
    sense. The alternative 'justice' is worth preserving in a footnote.
- source_word: לֹא תֵחָת
  chosen: will not be shattered
  alternatives:
  - will not be dismayed
  - will not be broken
  - will not fail
  lexicon: HALOT
  rationale: חתת in the Niphal commonly conveys being broken, shattered, or dismayed.
    With an abstract subject ('my righteousness'), 'will not be shattered' best preserves
    the metaphor of something not being broken or undone, in contrast to the collapsing
    creation.
