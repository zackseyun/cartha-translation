id: ISA.51.3
reference: Isaiah 51:3
source:
  edition: WLC
  text: כִּֽי נִחַ֨ם יְהוָ֜ה צִיּ֗וֹן נִחַם֙ כָּל חָרְבֹתֶ֔י/הָ וַ/יָּ֤שֶׂם מִדְבָּרָ/הּ֙
    כְּ/עֵ֔דֶן וְ/עַרְבָתָ֖/הּ כְּ/גַן יְהוָ֑ה שָׂשׂ֤וֹן וְ/שִׂמְחָה֙ יִמָּ֣צֵא בָ֔/הּ
    תּוֹדָ֖ה וְ/ק֥וֹל זִמְרָֽה־־־׃ס
translation:
  text: For the LORD comforts Zion; he comforts all her ruins. He makes her wilderness
    like Eden, and her desert plain like the garden of the LORD. Joy and gladness
    will be found in her, thanksgiving and the sound of song.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all her waste places' or 'all her desolate places.'
    reason: lexical_alternative
  - marker: b
    text: '''Eden'' echoes the garden imagery of Genesis; compare ''the garden of
      the LORD'' in the next line.'
    reason: cross_reference
  - marker: c
    text: Or 'her steppe' or 'her desert.' The Hebrew term refers to an arid plain.
    reason: lexical_alternative
  - marker: d
    text: Or 'and the voice of singing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding exhortation/promise.
    'For' best preserves the causal force in natural English.
- source_word: נִחַם
  chosen: comforts
  alternatives:
  - has comforted
  - will comfort
  - has compassion on
  lexicon: HALOT
  rationale: The verb denotes comforting/relenting/compassion depending on context.
    Here with Zion and her ruins as objects, 'comforts' best captures restorative
    consolation. English present is used for prophetic assurance, avoiding an over-precise
    tense choice between perfect-as-future and present perfect.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Standard transliteration of the place/personified city name.
- source_word: כָּל חָרְבֹתֶיהָ
  chosen: all her ruins
  alternatives:
  - all her waste places
  - all her desolate places
  lexicon: HALOT
  rationale: חָרְבָה/חָרְבוֹת refers to ruined or desolate places. 'Ruins' is concrete
    and idiomatic, while still fitting the city's restoration.
- source_word: וַיָּשֶׂם
  chosen: He makes
  alternatives:
  - and he made
  - and he will make
  - he sets
  lexicon: HALOT
  rationale: The waw-consecutive with prophetic discourse can describe assured future
    action. 'He makes' gives vivid prophetic present and reads smoothly with the surrounding
    promises.
- source_word: מִדְבָּרָהּ
  chosen: her wilderness
  alternatives:
  - her desert
  - her wasteland
  lexicon: HALOT
  rationale: מִדְבָּר commonly means wilderness/desert. 'Wilderness' preserves the
    lexical distinction from the following term עֲרָבָה.
- source_word: כְּעֵדֶן
  chosen: like Eden
  alternatives:
  - like paradise
  lexicon: HALOT
  rationale: Retains the proper name and intertextual echo of Genesis rather than
    interpreting it as a common noun.
- source_word: וְעַרְבָתָהּ
  chosen: her desert plain
  alternatives:
  - her Arabah
  - her desert
  - her steppe
  lexicon: HALOT
  rationale: עֲרָבָה can denote arid steppe/desert plain and sometimes the Arabah
    region. Here a common topographical sense fits the parallelism with 'wilderness';
    'desert plain' preserves distinction without overtechnical wording.
- source_word: כְּגַן יְהוָה
  chosen: like the garden of the LORD
  alternatives:
  - like the LORD's garden
  lexicon: HALOT
  rationale: A transparent rendering that preserves the genitive and the Edenic allusion.
- source_word: שָׂשׂוֹן וְשִׂמְחָה
  chosen: Joy and gladness
  alternatives:
  - gladness and rejoicing
  - exultation and joy
  lexicon: HALOT
  rationale: A common paired expression for festive delight. 'Joy and gladness' is
    natural English and preserves the semantic pairing.
- source_word: יִמָּצֵא בָהּ
  chosen: will be found in her
  alternatives:
  - are found in her
  - shall be found in her
  lexicon: HALOT
  rationale: The Niphal expresses being found/present. Future English fits the restoration
    promise explicitly here.
- source_word: תּוֹדָה
  chosen: thanksgiving
  alternatives:
  - thanks
  - praise
  lexicon: HALOT
  rationale: The noun often denotes thanksgiving or a thank-offering. In this poetic
    list of restored worship, 'thanksgiving' best fits the abstract parallelism.
- source_word: וְקוֹל זִמְרָה
  chosen: and the sound of song
  alternatives:
  - and the voice of singing
  - and the sound of praise
  lexicon: HALOT
  rationale: קוֹל is literally 'sound/voice,' and זִמְרָה is song/music. 'The sound
    of song' is idiomatic, preserves the auditory image, and avoids archaic 'voice
    of singing'.
