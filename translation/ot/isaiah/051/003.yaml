theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH and preserves continuity
    with Jewish reverence practice and longstanding English Bible convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Prophetic verbal aspect in promises of restoration
  chosen_reading: 'Present/future mix: ''comforts'' / ''makes'' with explicit future
    ''will be found'''
  alternative_readings:
  - 'Uniform past: ''has comforted... has made... has been found'''
  - 'Uniform future: ''will comfort... will make... will be found'''
  rationale: Hebrew perfect and wayyiqtol in prophetic discourse often express certain
    future restoration. A mixed English rendering preserves both vividness and promise
    without forcing a strictly temporal scheme the Hebrew does not explicitly mark.
