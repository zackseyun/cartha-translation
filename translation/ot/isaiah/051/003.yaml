theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Prophetic verbal aspect in promises of restoration
  chosen_reading: 'Present/future mix: ''comforts'' / ''makes'' with explicit future ''will be found'''
  alternative_readings:
  - 'Uniform past: ''has comforted... has made... has been found'''
  - 'Uniform future: ''will comfort... will make... will be found'''
  rationale: Hebrew perfect and wayyiqtol in prophetic discourse often express certain future restoration. A mixed English rendering preserves both vividness and promise without forcing a strictly temporal scheme the Hebrew does not explicitly mark.
