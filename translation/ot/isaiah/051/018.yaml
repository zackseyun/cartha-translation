theological_decisions:
- issue: Gendered rendering of בָּנִים
  chosen_reading: sons
  alternative_readings:
  - children
  rationale: The Hebrew uses the masculine plural 'sons' in the maternal metaphor
    for Jerusalem. Following the translation philosophy's gender-accurate principle,
    the masculine form is retained rather than neutralized to 'children.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4
