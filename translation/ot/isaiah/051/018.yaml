id: ISA.51.18
reference: Isaiah 51:18
source:
  edition: WLC
  text: אֵין מְנַהֵ֣ל לָ֔/הּ מִ/כָּל בָּנִ֖ים יָלָ֑דָה וְ/אֵ֤ין מַחֲזִיק֙ בְּ/יָדָ֔/הּ
    מִ/כָּל בָּנִ֖ים גִּדֵּֽלָה־־־׃
translation:
  text: There is no one to guide her among all the sons she has borne, and no one
    to take her by the hand among all the sons she has raised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from all the children she has borne ... from all the children she has
      raised.' The Hebrew specifically says 'sons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְנַהֵל
  chosen: to guide
  alternatives:
  - to lead
  - to conduct
  lexicon: HALOT
  rationale: The participle from נהל denotes leading or guiding. In this context of
    helpless Jerusalem personified as a woman, 'guide' communicates both direction
    and care more naturally in modern English than the more wooden 'lead.'
- source_word: לָהּ
  chosen: her
  lexicon: HALOT
  rationale: The feminine singular pronominal suffix refers to the personified city,
    Zion/Jerusalem, consistently treated as feminine in the surrounding context.
- source_word: מִכָּל בָּנִים
  chosen: among all the sons
  alternatives:
  - from all the sons
  - among all the children
  lexicon: HALOT
  rationale: 'מן with כָּל here expresses selection from a total group: none from
    among all her sons. ''Sons'' is retained rather than ''children'' because בָּנִים
    is explicitly masculine plural and the translation philosophy prefers gender-accurate
    rendering where the source is gendered.'
- source_word: יָלָדָה
  chosen: she has borne
  alternatives:
  - she bore
  - she gave birth to
  lexicon: HALOT
  rationale: The perfect verb refers to sons Jerusalem has brought forth. 'Has borne'
    fits the maternal imagery and reads idiomatically in English while preserving
    the completed action with present relevance.
- source_word: מַחֲזִיק בְּיָדָהּ
  chosen: to take her by the hand
  alternatives:
  - to hold her hand
  - to grasp her hand
  lexicon: HALOT
  rationale: The idiom literally involves strengthening/holding her hand, but in context
    it conveys supportive guidance. 'Take her by the hand' is a natural English equivalent
    that preserves the image of personal support.
- source_word: גִּדֵּלָה
  chosen: she has raised
  alternatives:
  - she reared
  - she brought up
  lexicon: HALOT
  rationale: The piel of גדל here means to bring up or rear children. 'Raised' is
    clear modern English and pairs well with 'borne' in the first colon.
- source_word: אֵין ... וְאֵין
  chosen: There is no one ... and no one
  alternatives:
  - None ... and none
  - There is none ... and none
  lexicon: HALOT
  rationale: The repeated existential negation emphasizes total abandonment. 'There
    is no one ... and no one' preserves the repetition while remaining readable modern
    English.
