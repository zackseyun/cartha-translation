theological_decisions:
- issue: Rendering of צִדְקָה in a prophetic context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Although the Hebrew term can overlap with 'justice,' the verse contrasts
    the perishability of opponents with the enduring moral and covenantal rightness
    of God alongside his salvation. 'Righteousness' best preserves that theological
    breadth; 'justice' is worth preserving as a lexical alternative.
  doctrine_reference: 'DOCTRINE.md: Contested terms table notes δικαιοσύνη default
    ''righteousness'' with ''justice'' preserved in footnotes where relevant; by analogy
    the Hebrew cognate is rendered consistently unless context demands otherwise.'
