id: ISA.51.8
reference: Isaiah 51:8
source:
  edition: WLC
  text: כִּ֤י כַ/בֶּ֨גֶד֙ יֹאכְלֵ֣/ם עָ֔שׁ וְ/כַ/צֶּ֖מֶר יֹאכְלֵ֣/ם סָ֑ס וְ/צִדְקָתִ/י֙
    לְ/עוֹלָ֣ם תִּֽהְיֶ֔ה וִ/ישׁוּעָתִ֖/י לְ/ד֥וֹר דּוֹרִֽים׃ס
translation:
  text: For the moth will eat them like a garment, and the worm will eat them like
    wool; but my righteousness will be forever, and my salvation to generation after
    generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my justice will be forever.' The Hebrew word can carry both moral-right
      and justice-related senses.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding exhortation; 'For'
    preserves the causal connection naturally in English.
- source_word: כַבֶּגֶד
  chosen: like a garment
  alternatives:
  - like clothing
  - as a garment
  lexicon: HALOT
  rationale: בֶּגֶד denotes a garment/clothing item. 'Garment' is slightly more formal
    and matches the poetic comparison.
- source_word: יֹאכְלֵם
  chosen: will eat them
  alternatives:
  - will consume them
  - eats them
  lexicon: HALOT
  rationale: The verb אכל literally means 'eat, consume.' 'Will eat them' keeps the
    vivid metaphor and matches the imperfect's future sense in context.
- source_word: עָשׁ
  chosen: the moth
  alternatives:
  - moth
  lexicon: HALOT
  rationale: Refers to the clothes moth that destroys fabric. The definite article
    is supplied idiomatically in English for the generic class.
- source_word: וְכַצֶּמֶר
  chosen: and ... like wool
  alternatives:
  - and like fleece
  lexicon: HALOT
  rationale: צֶמֶר is 'wool.' 'Like wool' preserves the parallel image with garment/fabric
    decay.
- source_word: סָס
  chosen: the worm
  alternatives:
  - grub
  - maggot
  - cloth-worm
  lexicon: HALOT
  rationale: The term denotes a fabric-destroying larva/worm. 'Worm' is the most transparent
    and conventional English rendering in this poetic parallelism, without over-specifying
    the insect.
- source_word: וְצִדְקָתִי
  chosen: but my righteousness
  alternatives:
  - and my righteousness
  - but my justice
  lexicon: HALOT
  rationale: צְדָקָה commonly means 'righteousness,' and this aligns with the project's
    default handling of cognate theological terms. The conjunction is rendered adversatively
    ('but') because the clause contrasts human transience with God's enduring character
    and action.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - for ever
  lexicon: HALOT
  rationale: עוֹלָם here expresses enduring perpetuity. 'Forever' is clear modern
    English.
- source_word: תִּהְיֶה
  chosen: will be
  alternatives:
  - shall be
  lexicon: HALOT
  rationale: Simple future/existential sense; 'will be' is natural modern English.
- source_word: וִישׁוּעָתִי
  chosen: and my salvation
  alternatives:
  - and my deliverance
  - and my victory
  lexicon: HALOT
  rationale: יְשׁוּעָה can denote salvation/deliverance. 'Salvation' best fits the
    theological and literary context in Isaiah, where God's saving action is in view.
- source_word: לְדֹר דּוֹרִים
  chosen: to generation after generation
  alternatives:
  - for all generations
  - from generation to generation
  lexicon: HALOT
  rationale: The idiom expresses continuing duration across successive generations.
    'Generation after generation' is readable and preserves the iterative force.
