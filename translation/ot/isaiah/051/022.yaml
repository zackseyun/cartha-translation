theological_decisions:
- issue: Rendering the sequence of divine titles
  chosen_reading: Thus says your Lord, the LORD, and your God
  alternative_readings:
  - Thus says the Lord, your LORD and your God
  - Thus says your Sovereign, Yahweh, your God
  rationale: 'The Hebrew stacks titles appositionally: ''your Lord, YHWH, and your
    God.'' The chosen rendering preserves all three titles distinctly without collapsing
    them. ''The LORD'' follows doctrinal policy for YHWH.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Metaphor of the judgment cup
  chosen_reading: Retain the cup imagery literally
  alternative_readings:
  - Interpret dynamically as suffering/punishment
  rationale: The cup of divine wrath is a major biblical-theological image. Preserving
    the metaphor maintains intertextual connections and avoids paraphrase beyond the
    source text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy;
    Preserve theological tension rather than resolve it'
