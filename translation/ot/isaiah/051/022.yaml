id: ISA.51.22
reference: Isaiah 51:22
source:
  edition: WLC
  text: כֹּֽה אָמַ֞ר אֲדֹנַ֣יִ/ךְ יְהוָ֗ה וֵ/אלֹהַ֨יִ/ךְ֙ יָרִ֣יב עַמּ֔/וֹ הִנֵּ֥ה
    לָקַ֛חְתִּי מִ/יָּדֵ֖/ךְ אֶת כּ֣וֹס הַ/תַּרְעֵלָ֑ה אֶת קֻבַּ֨עַת֙ כּ֣וֹס חֲמָתִ֔/י
    לֹא תוֹסִ֥יפִי לִ/שְׁתּוֹתָ֖/הּ עֽוֹד־־־־׃
translation:
  text: 'Thus says your Lord, the LORD, and your God, who pleads the cause of his
    people: Behold, I have taken from your hand the cup of staggering, the bowl of
    the cup of my wrath; you shall never again drink it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the cup of reeling' or 'the cup of trembling.' The Hebrew term refers
      to the stupefying effect of judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'the bowl/goblet of the cup of my wrath.' The Hebrew piles up vessel
      imagery for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנַיִךְ
  chosen: your Lord
  alternatives:
  - your master
  lexicon: HALOT
  rationale: The noun אֲדֹנָי with 2fs suffix is a title of authority. 'Lord' is the
    standard English rendering for this title in biblical context and matches the
    doctrinal default for κύριος analogously, while 'master' would sound overly domestic
    here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, YHWH is rendered 'the LORD' rather than transliterated
    forms, preserving established covenantal/title usage.
- source_word: וֵאלֹהַיִךְ
  chosen: and your God
  alternatives:
  - and your gods
  lexicon: HALOT
  rationale: With 2fs suffix and singular sense in context, אֱלֹהִים/אֱלוֹהַ here
    clearly refers to Israel's God. 'And your God' preserves the appositional piling
    up of divine titles.
- source_word: יָרִיב עַמּוֹ
  chosen: who pleads the cause of his people
  alternatives:
  - who contends for his people
  - who defends his people
  - who takes up the case of his people
  lexicon: HALOT
  rationale: The verb ריב in covenant/legal contexts often means to conduct a case
    or contend judicially. 'Pleads the cause of' best captures the forensic nuance
    without sounding archaic, and the participial/relative sense is natural in English
    after the divine titles.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: '''Behold'' preserves the prophetic deictic force and solemnity. It remains
    readable in this elevated context.'
- source_word: לָקַחְתִּי מִיָּדֵךְ
  chosen: I have taken from your hand
  alternatives:
  - I have removed from your hand
  - I took from your hand
  lexicon: HALOT
  rationale: This is a straightforward perfect verb with source phrase. 'Taken from
    your hand' is idiomatic and preserves the image of removal from possession/control.
- source_word: כּוֹס הַתַּרְעֵלָה
  chosen: the cup of staggering
  alternatives:
  - the cup of reeling
  - the cup of trembling
  lexicon: HALOT
  rationale: The noun תַּרְעֵלָה denotes a state of reeling/stupefaction caused by
    divine judgment. 'Staggering' communicates the effect clearly in modern English.
    'Trembling' is traditional in some versions but can suggest fear rather than intoxicated
    reeling.
- source_word: קֻבַּעַת
  chosen: the bowl
  alternatives:
  - the goblet
  - the chalice
  lexicon: HALOT
  rationale: The noun denotes a bowl-shaped drinking vessel. 'Bowl' is the most direct
    lexical equivalent; 'goblet' or 'chalice' add stylistic associations not demanded
    by the Hebrew.
- source_word: כּוֹס חֲמָתִי
  chosen: the cup of my wrath
  alternatives:
  - the cup of my fury
  - the cup of my anger
  lexicon: HALOT
  rationale: חֵמָה commonly denotes wrath/fury. 'Wrath' fits prophetic judgment language
    and preserves theological gravity.
- source_word: לֹא תוֹסִיפִי לִשְׁתּוֹתָהּ עוֹד
  chosen: you shall never again drink it
  alternatives:
  - you will not continue to drink it anymore
  - you shall not drink it again
  lexicon: HALOT
  rationale: The idiom with יסף + infinitive + עוֹד means cessation from repeated/future
    action. 'You shall never again drink it' is natural English and preserves the
    emphatic finality.
