id: ISA.51.19
reference: Isaiah 51:19
source:
  edition: WLC
  text: שְׁתַּ֤יִם הֵ֨נָּה֙ קֹֽרְאֹתַ֔יִ/ךְ מִ֖י יָנ֣וּד לָ֑/ךְ הַ/שֹּׁ֧ד וְ/הַ/שֶּׁ֛בֶר
    וְ/הָ/רָעָ֥ב וְ/הַ/חֶ֖רֶב מִ֥י אֲנַחֲמֵֽ/ךְ׃
translation:
  text: These two things have come upon you—who will grieve for you?—devastation and
    destruction, famine and sword; who will comfort you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who will bemoan you?' The Hebrew verb can express lamenting or showing
      sympathy.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew says ''two things'' and then names four disasters, likely as
      two paired sets: ''devastation and destruction'' and ''famine and sword.'''
    reason: cultural_note
lexical_decisions:
- source_word: שְׁתַּיִם הֵנָּה
  chosen: These two things
  alternatives:
  - Two things
  - These two
  lexicon: HALOT
  rationale: The phrase is an emphatic feminine plural demonstrative construction
    introducing a numbered set. 'These two things' is natural English and preserves
    the deictic force of הֵנָּה.
- source_word: קֹרְאֹתַיִךְ
  chosen: have come upon you
  alternatives:
  - are calling you
  - befall you
  - meet you
  lexicon: HALOT
  rationale: Although from קרא ('call'), in this idiom with calamities it means 'befall,
    come upon, encounter.' 'Have come upon you' best fits the context of disasters
    overtaking Zion and avoids an overly literal but misleading 'call you.'
- source_word: מִי יָנוּד לָךְ
  chosen: who will grieve for you?
  alternatives:
  - who will bemoan you?
  - who will pity you?
  - who will shake his head over you?
  lexicon: HALOT
  rationale: נוּד can denote lamenting, showing sympathy, or shaking the head in mourning.
    In this context of Jerusalem's desolation, the sense is compassionate lament.
    'Grieve for you' is readable modern English; 'bemoan you' is possible but less
    natural.
- source_word: הַשֹּׁד
  chosen: devastation
  alternatives:
  - violence
  - ruin
  - despoiling
  lexicon: HALOT
  rationale: שֹׁד commonly denotes devastation, spoil, or violent destruction. 'Devastation'
    captures the result of destructive assault in a way that pairs well with the following
    noun.
- source_word: הַשֶּׁבֶר
  chosen: destruction
  alternatives:
  - breaking
  - collapse
  - ruin
  lexicon: HALOT
  rationale: שֶׁבֶר literally involves breaking or fracture, but in prophetic disaster
    language it often means collapse or ruin. 'Destruction' gives clear English while
    preserving the calamity pairing with שֹׁד.
- source_word: הָרָעָב
  chosen: famine
  lexicon: HALOT
  rationale: Standard rendering for רָעָב in judgment contexts.
- source_word: הַחֶרֶב
  chosen: sword
  alternatives:
  - the sword
  lexicon: HALOT
  rationale: A conventional and accurate rendering for חֶרֶב, here representing warfare
    and violent death. Omission of the article in English is idiomatic in a list of
    calamities.
- source_word: מִי אֲנַחֲמֵךְ
  chosen: who will comfort you?
  alternatives:
  - who will console you?
  lexicon: HALOT
  rationale: נחם in the Piel commonly means comfort or console. 'Comfort' is the most
    natural and thematically important choice in Isaiah, where divine comfort is a
    major motif.
