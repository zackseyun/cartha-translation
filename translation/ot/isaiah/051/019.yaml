theological_decisions:
- issue: Enumeration of the disasters as 'two things' despite four calamity terms
  chosen_reading: 'Render the opening as ''These two things have come upon you'' while
    preserving the four following nouns as two paired sets: devastation and destruction;
    famine and sword.'
  alternative_readings:
  - Treat the text as corrupt or emend it
  - Render as 'double calamities' without preserving the number two
  rationale: The Hebrew explicitly says 'two,' then lists four nouns that are naturally
    read as two pairs. This preserves the source text without forcing an unnecessary
    emendation and reflects prophetic parallelism.
  doctrine_reference: 'Translation philosophy #1 and #3: original-language primacy;
    preserve tension rather than resolve it unnecessarily.'
