theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton and aligns
    with reverential English Bible convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of רֹגַע with respect to the sea
  chosen_reading: who stirs up the sea
  alternative_readings:
  - who stills the sea
  - who calms the sea
  rationale: Though some contexts support 'quiet/still,' the immediate continuation
    about roaring waves points here to arousing the sea's turbulence. The translation
    preserves the image of divine sovereignty over chaotic waters without importing
    a broader doctrinal claim.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Person of שְׁמוֹ in direct divine speech
  chosen_reading: is his name
  alternative_readings:
  - is my name
  rationale: The Hebrew text uses third person suffix. The translation preserves this
    textual form rather than smoothing it to first person, since the source text is
    primary.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
