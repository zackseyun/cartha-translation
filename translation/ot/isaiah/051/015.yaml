id: ISA.51.15
reference: Isaiah 51:15
source:
  edition: WLC
  text: וְ/אָֽנֹכִי֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ רֹגַ֣ע הַ/יָּ֔ם וַ/יֶּהֱמ֖וּ גַּלָּ֑י/ו יְהוָ֥ה
    צְבָא֖וֹת שְׁמֽ/וֹ׃
translation:
  text: For I am the LORD your God, who stirs up the sea so that its waves roar— the
    LORD of hosts is his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who stills the sea, so that its waves roar'; the Hebrew participle can
      be understood as 'stir up' or 'still/calm' depending on context, though the
      following clause here favors 'stirs up.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''the LORD of hosts is his name.'' Some English translations smooth
      this to ''is my name,'' but the Hebrew text has third person.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אָֽנֹכִי
  chosen: For I
  alternatives:
  - And I
  - But I
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks emphatic continuation
    from the previous reassurance. 'For I' best captures the explanatory force in
    context while preserving the emphatic first person.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name יְהוָה is rendered 'the LORD' rather than
    transliterated.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with 2ms suffix; covenantal address is preserved
    with 'your God'.
- source_word: רֹגַע
  chosen: who stirs up
  alternatives:
  - who stills
  - who calms
  - who agitates
  lexicon: HALOT
  rationale: The participle can be understood either as quieting or stirring the sea
    depending on context and related usage. Here the following clause, 'so that its
    waves roar,' favors an active disturbance rather than calming. 'Stirs up' fits
    the immediate syntax and parallelism better than 'stills.'
- source_word: הַיָּם
  chosen: the sea
  lexicon: HALOT
  rationale: Direct rendering of the definite noun.
- source_word: וַיֶּהֱמוּ
  chosen: so that ... roar
  alternatives:
  - and ... roared
  - and ... are in tumult
  lexicon: HALOT
  rationale: The waw-consecutive form narrates/resultatively describes the effect
    on the waves. In English, 'so that its waves roar' expresses the natural result
    of stirring the sea and reads idiomatically.
- source_word: גַּלָּיו
  chosen: its waves
  alternatives:
  - his waves
  lexicon: HALOT
  rationale: The 3ms suffix refers back to 'the sea.' English uses 'its' for an inanimate
    antecedent.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD of armies
  lexicon: HALOT
  rationale: Established and accurate rendering of the divine title, preserving both
    majesty and military connotation without over-paraphrase.
- source_word: שְׁמוֹ
  chosen: is his name
  alternatives:
  - is my name
  lexicon: HALOT
  rationale: The Hebrew has 3ms suffix, so the literal form is 'his name.' Although
    English might expect first person in direct speech, the Masoretic text reads third
    person and should be preserved.
