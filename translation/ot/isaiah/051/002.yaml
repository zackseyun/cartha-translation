id: ISA.51.2
reference: Isaiah 51:2
source:
  edition: WLC
  text: הַבִּ֨יטוּ֙ אֶל אַבְרָהָ֣ם אֲבִי/כֶ֔ם וְ/אֶל שָׂרָ֖ה תְּחוֹלֶלְ/כֶ֑ם כִּי
    אֶחָ֣ד קְרָאתִ֔י/ו וַ/אֲבָרְכֵ֖/הוּ וְ/אַרְבֵּֽ/הוּ־־־׃ס
translation:
  text: Look to Abraham your father and to Sarah who gave birth to you; for I called
    him when he was one, and I blessed him and multiplied him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for I called him when he was alone.' The Hebrew literally says 'one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבִּיטוּ
  chosen: Look to
  alternatives:
  - Look at
  - Consider
  lexicon: HALOT
  rationale: Imperative plural of נבט in a figurative exhortation; 'look to' preserves
    both the visual metaphor and the sense of taking Abraham and Sarah as examples.
- source_word: אַבְרָהָם אֲבִיכֶם
  chosen: Abraham your father
  alternatives:
  - Abraham, your ancestor
  lexicon: HALOT
  rationale: Keeps the familial covenantal language of the Hebrew. 'Father' is the
    plain sense and fits the source's representative masculine language.
- source_word: שָׂרָה תְּחוֹלֶלְכֶם
  chosen: Sarah who gave birth to you
  alternatives:
  - Sarah who bore you
  - Sarah who travailed with you
  lexicon: HALOT
  rationale: The verb from חול/חיל in this stem can denote writhing or labor pains
    in childbirth. 'Who gave birth to you' communicates the maternal image naturally
    in English without over-literal awkwardness. 'Who bore you' is possible but slightly
    less explicit for modern readers.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the exhortation; 'for' is concise and natural.
- source_word: אֶחָד
  chosen: when he was one
  alternatives:
  - alone
  - one man
  - only one
  lexicon: HALOT
  rationale: The Hebrew adjective 'one' here highlights Abraham's solitary starting
    point before multiplication. 'When he was one' stays close to the source while
    making sense in English. 'Alone' is a common interpretive rendering and is preserved
    in a footnote.
- source_word: קְרָאתִיו
  chosen: I called him
  alternatives:
  - I summoned him
  lexicon: HALOT
  rationale: Standard rendering of קרא in divine-calling contexts; it preserves covenantal
    resonance without over-specifying the manner of the call.
- source_word: וַאֲבָרְכֵהוּ
  chosen: I blessed him
  lexicon: HALOT
  rationale: Straightforward rendering of ברך with covenantal significance retained.
- source_word: וְאַרְבֵּהוּ
  chosen: multiplied him
  alternatives:
  - made him many
  - increased him greatly
  lexicon: HALOT
  rationale: Hiphil of רבה means to make many/increase. 'Multiplied him' is concise
    and echoes covenant-promise language familiar from Genesis.
