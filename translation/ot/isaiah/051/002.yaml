theological_decisions:
- issue: Interpretation of אֶחָד in relation to Abraham's condition when called
  chosen_reading: when he was one
  alternative_readings:
  - when he was alone
  - as one man
  rationale: 'The Hebrew literally says ''one.'' Rendering it as ''when he was one''
    preserves the text''s compact expression and theological point: God began the
    covenant people from a single individual. More interpretive English such as ''alone''
    is possible but should be preserved as an alternative rather than replacing the
    literal sense in the main text.'
  doctrine_reference: Translation philosophy §§1, 3, 5
