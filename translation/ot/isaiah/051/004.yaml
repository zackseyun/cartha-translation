theological_decisions:
- issue: Scope of תורה and מִשְׁפָּט in relation to the nations
  chosen_reading: The verse speaks of God's authoritative instruction and justice
    going forth universally to the peoples.
  alternative_readings:
  - The verse refers more narrowly to Mosaic law/judgment for Israel alone.
  rationale: The explicit reference to 'the peoples' favors a broader, outward-moving
    sense. The translation avoids importing later doctrinal systems while preserving
    the text's universal horizon.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of מִשְׁפָּט
  chosen_reading: my justice
  alternative_readings:
  - my judgment
  - my ordinance
  rationale: Given the collocation with 'light for the peoples,' 'justice' better
    reflects a positive manifestation of God's righteous order rather than merely
    punitive judgment. This preserves theological tension without over-specifying.
  doctrine_reference: Translation philosophy §§3, 5
