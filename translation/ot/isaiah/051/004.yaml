id: ISA.51.4
reference: Isaiah 51:4
source:
  edition: WLC
  text: הַקְשִׁ֤יבוּ אֵלַ/י֙ עַמִּ֔/י וּ/לְאוּמִּ֖/י אֵלַ֣/י הַאֲזִ֑ינוּ כִּ֤י תוֹרָה֙
    מֵ/אִתִּ֣/י תֵצֵ֔א וּ/מִשְׁפָּטִ֔/י לְ/א֥וֹר עַמִּ֖ים אַרְגִּֽיעַ׃
translation:
  text: Pay attention to me, my people, and give ear to me, my nation; for instruction
    will go out from me, and I will establish my justice as a light for the peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'law' or 'teaching' for 'instruction' (Hebrew תורה).
    reason: lexical_alternative
  - marker: b
    text: Or 'my judgment' for 'my justice' (Hebrew מִשְׁפָּטִי).
    reason: lexical_alternative
  - marker: c
    text: 'The final verb may also be understood as ''I will cause [it] to rest''
      or ''I will set [it],'' yielding: ''I will set my justice as a light for the
      peoples.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְשִׁיבוּ
  chosen: Pay attention
  alternatives:
  - Listen
  - Attend
  lexicon: HALOT
  rationale: Imperative of קשׁב calling for attentive listening. 'Pay attention' is
    natural modern English and preserves the summons' force without sounding archaic.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward covenantal address; singular collective in Hebrew is
    well represented by 'my people'.
- source_word: וּלְאוּמִּי
  chosen: my nation
  alternatives:
  - my people-group
  - my folk
  lexicon: HALOT
  rationale: לְאֹם overlaps with 'people/nation.' Since עַם already appears, 'my nation'
    preserves the parallelism with some lexical distinction in English.
- source_word: הַאֲזִינוּ
  chosen: give ear
  alternatives:
  - listen
  - hear
  lexicon: HALOT
  rationale: A second imperative parallel to הַקְשִׁיבוּ. 'Give ear' preserves the
    heightened poetic diction and avoids flattening both verbs into the same English
    gloss.
- source_word: תּוֹרָה
  chosen: instruction
  alternatives:
  - law
  - teaching
  lexicon: HALOT
  rationale: תורה here likely denotes Yahweh's authoritative teaching going forth
    to the nations, not merely statutory law. 'Instruction' captures the broader semantic
    range while remaining readable. 'Law' is possible but narrower and more tradition-bound
    in this context.
- source_word: תֵצֵא
  chosen: will go out
  alternatives:
  - will proceed
  - will come forth
  lexicon: HALOT
  rationale: Common sense of יצא. 'Will go out' is idiomatic and preserves the outward
    movement from God to the nations.
- source_word: וּמִשְׁפָּטִי
  chosen: my justice
  alternatives:
  - my judgment
  - my ordinance
  - my justice/ruling
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote judgment, justice, or legal decision. In parallel
    with תורה and in relation to 'a light for the peoples,' 'justice' best conveys
    God's righteous order extended to the nations, rather than a single act of condemnation.
- source_word: לְאוֹר עַמִּים
  chosen: as a light for the peoples
  alternatives:
  - for a light to the peoples
  - as light for peoples
  lexicon: HALOT
  rationale: The phrase expresses purpose/result. 'As a light for the peoples' is
    idiomatic and preserves the universal scope of עמים as plural 'peoples/nations.'
- source_word: אַרְגִּיעַ
  chosen: I will establish
  alternatives:
  - I will set
  - I will cause to rest
  - I will bring to rest
  lexicon: HALOT
  rationale: The Hiphil of רגע here is difficult. In context, with 'my justice' and
    'as a light for the peoples,' the sense is best taken as causing God's justice
    to settle firmly or be established. This yields coherent English and fits the
    prophetic theme of God's just order being set before the nations.
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: Plural of עם in an international sense. 'The peoples' preserves the lexical
    link with 'my people' while signaling broader ethnic groups beyond Israel; 'nations'
    is also possible.
