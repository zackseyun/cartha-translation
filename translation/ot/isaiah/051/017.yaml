theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrinal and translation guidelines specify 'the LORD'
    as the default rendering of YHWH, following Jewish reverence tradition and common
    biblical English usage.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Metaphor of the cup of wrath
  chosen_reading: Retained as a metaphor for divine judgment without softening
  alternative_readings:
  - Interpretive paraphrase such as 'punishment' or 'judgment'
  rationale: The verse uses the established prophetic metaphor of drinking the cup
    from the LORD's hand to signify undergoing his wrath. The translation preserves
    the metaphor rather than resolving it into abstraction.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
