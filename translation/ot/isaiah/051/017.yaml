id: ISA.51.17
reference: Isaiah 51:17
source:
  edition: WLC
  text: הִתְעוֹרְרִ֣י הִֽתְעוֹרְרִ֗י ק֚וּמִי יְר֣וּשָׁלִַ֔ם אֲשֶׁ֥ר שָׁתִ֛ית מִ/יַּ֥ד
    יְהוָ֖ה אֶת כּ֣וֹס חֲמָת֑/וֹ אֶת קֻבַּ֜עַת כּ֧וֹס הַ/תַּרְעֵלָ֛ה שָׁתִ֖ית מָצִֽית־־׃
translation:
  text: Wake yourself, wake yourself, rise up, Jerusalem, you who have drunk from
    the hand of the LORD the cup of his wrath; you have drunk the bowl, the cup of
    staggering; you have drained it dry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the cup of reeling'; traditionally 'the cup of trembling.' The Hebrew
      term refers to the staggering effect of the drink.
    reason: lexical_alternative
  - marker: b
    text: Or 'the goblet' for 'the bowl.' The Hebrew word denotes a bowl-shaped drinking
      vessel.
    reason: lexical_alternative
  - marker: c
    text: Literally 'from the hand of the LORD,' an idiom indicating that Jerusalem's
      suffering came from the LORD's judicial action.
    reason: cultural_note
lexical_decisions:
- source_word: הִתְעוֹרְרִי ... הִתְעוֹרְרִי
  chosen: Wake yourself, wake yourself
  alternatives:
  - Rouse yourself, rouse yourself
  - Awake, awake
  lexicon: HALOT
  rationale: Reflexive Hitpael feminine singular imperative repeated for urgency.
    'Wake yourself' preserves the reflexive force better than the traditional but
    less explicit 'Awake.' Repetition is retained.
- source_word: קוּמִי
  chosen: rise up
  alternatives:
  - stand up
  - arise
  lexicon: HALOT
  rationale: Imperative to stand/rise. 'Rise up' fits the poetic summons and pairs
    naturally with the repeated call to awaken.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Proper name transliterated per translation philosophy.
- source_word: אֲשֶׁר
  chosen: you who
  alternatives:
  - who
  - that
  lexicon: HALOT
  rationale: Introduces a relative clause describing Jerusalem. 'You who' makes the
    direct address clear in English.
- source_word: שָׁתִית
  chosen: have drunk / have drunk
  alternatives:
  - drank
  lexicon: HALOT
  rationale: Perfect verb describing completed experience with present relevance.
    English present perfect communicates the endured condition well in this lament-oracle
    context.
- source_word: מִיַּד יְהוָה
  chosen: from the hand of the LORD
  alternatives:
  - from the LORD's hand
  lexicon: HALOT
  rationale: Retains the Hebrew idiom of agency/source. YHWH is rendered 'the LORD'
    per doctrinal default.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Follows the stated default for the divine name in DOCTRINE.md.
- source_word: כּוֹס חֲמָתוֹ
  chosen: the cup of his wrath
  alternatives:
  - the cup of his fury
  - the cup of his anger
  lexicon: HALOT
  rationale: חֵמָה denotes wrath/fury. 'Wrath' best preserves the judicial and theological
    weight of divine anger in prophetic literature.
- source_word: קֻבַּעַת
  chosen: the bowl
  alternatives:
  - the goblet
  lexicon: HALOT
  rationale: Refers to a bowl-shaped drinking vessel. 'Bowl' is the clearest modern
    English equivalent and preserves the image of a large vessel to be emptied.
- source_word: כּוֹס הַתַּרְעֵלָה
  chosen: the cup of staggering
  alternatives:
  - the cup of reeling
  - the cup of trembling
  lexicon: HALOT
  rationale: The noun denotes reeling/staggering, likely the effect of the drink.
    'Staggering' is natural modern English and avoids the archaic/tradition-bound
    'trembling' where the sense is intoxicated disorientation.
- source_word: מָצִית
  chosen: have drained it dry
  alternatives:
  - have drained it
  - have wrung it out
  lexicon: HALOT
  rationale: Conveys draining a vessel to the dregs. 'Drained it dry' idiomatically
    expresses the intensive sense and the totality of Jerusalem's suffering.
