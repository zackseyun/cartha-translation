theological_decisions:
- issue: Personified addressee in feminine singular
  chosen_reading: Retain the feminine-personified address implicitly with 'afflicted
    one' rather than neutralizing to a plural or abstract phrase.
  alternative_readings:
  - O afflicted one
  - you afflicted one
  - afflicted woman
  rationale: The Hebrew addresses Zion/Jerusalem as a feminine singular figure. The
    translation preserves that literary-theological personification without forcing
    an English noun like 'woman' into the main text.
