id: ISA.51.21
reference: Isaiah 51:21
source:
  edition: WLC
  text: לָ/כֵ֛ן שִׁמְעִי נָ֥א זֹ֖את עֲנִיָּ֑ה וּ/שְׁכֻרַ֖ת וְ/לֹ֥א מִ/יָּֽיִן־׃ס
translation:
  text: 'Therefore, please hear this, afflicted one, drunk, but not from wine:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew feminine singular; the addressee is Zion/Jerusalem personified as
      a woman.
    reason: cultural_note
  - marker: b
    text: Or 'drunk, though not with wine.' The image is metaphorical, referring to
      staggering under judgment rather than literal intoxication.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks a consequential transition from the preceding context; 'Therefore'
    is a natural English discourse marker preserving the inferential force.
- source_word: שִׁמְעִי
  chosen: hear
  alternatives:
  - listen
  - hear me
  lexicon: HALOT
  rationale: Imperative 2fs from שׁמע. 'Hear' preserves the direct summons without
    adding an object not present in Hebrew.
- source_word: נָא
  chosen: please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: Adds a particle of entreaty or urgency. 'Please' communicates the exhortatory-softening
    force in clear modern English better than archaic 'I pray' or temporally misleading
    'now'.
- source_word: זֹאת
  chosen: this
  alternatives:
  - these things
  lexicon: HALOT
  rationale: Feminine singular demonstrative, naturally rendered 'this' referring
    to what follows or the present address.
- source_word: עֲנִיָּה
  chosen: afflicted one
  alternatives:
  - afflicted woman
  - wretched one
  - poor one
  lexicon: HALOT
  rationale: Feminine singular adjective/substantive addressing Zion/Jerusalem personified
    as female. 'Afflicted one' preserves the personified singular and the suffering
    sense without overcommitting to economic poverty.
- source_word: וּשְׁכֻרַת
  chosen: drunk
  alternatives:
  - intoxicated
  lexicon: HALOT
  rationale: Predicate adjective coordinated with the prior description. 'Drunk' is
    the plain, idiomatic equivalent and retains the metaphorical force in context.
- source_word: וְלֹא מִיָּיִן
  chosen: but not from wine
  alternatives:
  - yet not with wine
  - though not from wine
  lexicon: HALOT
  rationale: The conjunction with negation introduces a corrective qualification.
    'But not from wine' makes explicit in natural English that the drunkenness is
    metaphorical rather than caused by literal wine.
