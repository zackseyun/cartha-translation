id: ISA.51.12
reference: Isaiah 51:12
source:
  edition: WLC
  text: אָנֹכִ֧י אָנֹכִ֛י ה֖וּא מְנַחֶמְ/כֶ֑ם מִֽי אַ֤תְּ וַ/תִּֽירְאִי֙ מֵ/אֱנ֣וֹשׁ
    יָמ֔וּת וּ/מִ/בֶּן אָדָ֖ם חָצִ֥יר יִנָּתֵֽן־־׃
translation:
  text: I, I am he who comforts you. Who are you that you fear man, who dies, and
    the son of man, who is made like grass?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a human being.' Hebrew 'son of man' here is an idiom for ordinary humanity,
      not necessarily a messianic title.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָנֹכִי אָנֹכִי
  chosen: I, I
  alternatives:
  - I myself
  - I alone
  lexicon: HALOT
  rationale: The repetition is emphatic and should be preserved rather than flattened.
    'I, I' keeps the Hebrew emphasis and rhetorical force in natural English.
- source_word: הוּא
  chosen: he
  alternatives:
  - the one
  lexicon: HALOT
  rationale: 'With the repeated first-person pronoun, הוּא functions idiomatically
    for emphasis: ''I, I am he.'' This is a common biblical self-identification formula
    and is best retained.'
- source_word: מְנַחֶמְכֶם
  chosen: who comforts you
  alternatives:
  - your comforter
  - who is comforting you
  lexicon: HALOT
  rationale: The participle presents ongoing characteristic action. 'Who comforts
    you' is idiomatic English and preserves the durative sense without awkwardness.
- source_word: מִי אַתְּ
  chosen: Who are you
  alternatives:
  - Who then are you
  lexicon: HALOT
  rationale: The feminine singular address should be reflected by context rather than
    forced into English morphology. The phrase is rhetorical and direct.
- source_word: וַתִּירְאִי
  chosen: that you fear
  alternatives:
  - that you are afraid
  - that you should fear
  lexicon: HALOT
  rationale: From ירא, the sense is fear in response to human threat. 'Fear' is more
    direct and formally closer than 'are afraid,' while still natural.
- source_word: אֱנוֹשׁ
  chosen: man
  alternatives:
  - mortal man
  - human being
  lexicon: HALOT
  rationale: אֱנוֹשׁ often highlights frail humanity. 'Man' fits the singular rhetorical
    contrast and aligns with the project's gender-accurate policy; mortality is then
    made explicit by the following participle 'who dies.'
- source_word: יָמוּת
  chosen: who dies
  alternatives:
  - who will die
  - mortal
  lexicon: HALOT
  rationale: The imperfect here expresses the certainty of human mortality. 'Who dies'
    is concise and preserves the characterization; 'mortal' would compress two Hebrew
    elements into one.
- source_word: בֶּן אָדָם
  chosen: the son of man
  alternatives:
  - the son of humankind
  - a human being
  lexicon: HALOT
  rationale: Literally 'son of man.' In this context it is an idiom for a human being,
    parallel to אֱנוֹשׁ. The more literal rendering is retained to preserve the Hebrew
    parallelism and diction, with an explanatory footnote because English readers
    may hear later messianic associations.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: Within the idiom בֶּן אָדָם, a literal rendering is preferable for transparency.
    This follows the doctrine's guidance to be gender-accurate according to source
    intent.
- source_word: חָצִיר
  chosen: grass
  alternatives:
  - hay
  lexicon: HALOT
  rationale: The standard image is grass as a symbol of transience and frailty. 'Grass'
    is the natural English equivalent in prophetic literature.
- source_word: יִנָּתֵן
  chosen: is made like
  alternatives:
  - is given over as
  - is made into
  - is set as
  lexicon: HALOT
  rationale: 'The Niphal of נתן here is idiomatic in a comparative/resultative sense:
    the human is rendered as transient as grass. ''Is made like grass'' communicates
    the sense clearly in English. A more literal ''is given as grass'' would be obscure.'
