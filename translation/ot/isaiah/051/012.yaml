theological_decisions:
- issue: Rendering בֶּן אָדָם in a non-messianic prophetic context
  chosen_reading: the son of man
  alternative_readings:
  - a human being
  - the son of humankind
  rationale: Although English readers may associate 'son of man' with a messianic
    title, in Isaiah 51:12 the phrase functions as a poetic parallel to אֱנוֹשׁ, emphasizing
    ordinary human frailty rather than a title. The literal rendering preserves the
    Hebrew texture, while a footnote clarifies the idiomatic sense.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Gender-accurate over gender-neutral; אָדָם default ''man / humankind (context)'''
