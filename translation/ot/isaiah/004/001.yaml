id: ISA.4.1
reference: Isaiah 4:1
source:
  edition: WLC
  text: וְ/הֶחֱזִיקוּ֩ שֶׁ֨בַע נָשִׁ֜ים בְּ/אִ֣ישׁ אֶחָ֗ד בַּ/יּ֤וֹם הַ/הוּא֙ לֵ/אמֹ֔ר
    לַחְמֵ֣/נוּ נֹאכֵ֔ל וְ/שִׂמְלָתֵ֖/נוּ נִלְבָּ֑שׁ רַ֗ק יִקָּרֵ֤א שִׁמְ/ךָ֙ עָלֵ֔י/נוּ
    אֱסֹ֖ף חֶרְפָּתֵֽ/נוּ׃ס
translation:
  text: And seven women will take hold of one man in that day, saying, “We will eat
    our own bread and wear our own clothing; only let your name be called over us.
    Take away our reproach.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “let us be called by your name,” likely implying marriage or legal/social
      attachment to the man.
    reason: lexical_alternative
  - marker: b
    text: “Reproach” refers to social disgrace or shame; in context, likely the stigma
      of lacking a husband's name and status after the devastation described previously.
    reason: cultural_note
lexical_decisions:
- source_word: וְהֶחֱזִיקוּ
  chosen: will take hold of
  alternatives:
  - will seize
  - will grasp
  lexicon: HALOT
  rationale: The Hiphil of חזק with ב can mean to take hold of firmly or seize. 'Take
    hold of' preserves the physical/direct force without overstating violence; in
    context it conveys urgent initiative by the women.
- source_word: שֶׁבַע נָשִׁים
  chosen: seven women
  lexicon: HALOT
  rationale: Straightforward numeral + noun. 'Women' rather than 'wives' is required
    here because the marital request is only implied later, not yet stated lexically.
- source_word: בְּאִישׁ אֶחָד
  chosen: of one man
  alternatives:
  - one man
  - to one man
  lexicon: HALOT
  rationale: With חזק the preposition ב marks the object grasped. English idiom prefers
    'take hold of one man' rather than a more wooden 'in/with one man.'
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Both are possible; 'in that day' is a natural prophetic formula in English
    and preserves the eschatological/judgment resonance of the Hebrew expression.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and saying
  lexicon: HALOT
  rationale: Standard rendering introducing direct speech.
- source_word: לַחְמֵנוּ נֹאכֵל
  chosen: We will eat our own bread
  alternatives:
  - We will eat our bread
  lexicon: HALOT
  rationale: 'The possessive suffix already marks ''our bread''; adding ''own'' in
    English brings out the emphatic sense in context: they will not require the man''s
    provision.'
- source_word: וְשִׂמְלָתֵנוּ נִלְבָּשׁ
  chosen: and wear our own clothing
  alternatives:
  - and put on our own garment
  - and wear our clothing
  lexicon: HALOT
  rationale: Plural/collective sense in English is best expressed as 'clothing.' 'Own'
    again reflects the contextual emphasis that they will provide for themselves.
- source_word: רַק
  chosen: only
  alternatives:
  - just
  - merely
  lexicon: HALOT
  rationale: 'Marks limitation: despite self-provision, they ask for one thing only.'
- source_word: יִקָּרֵא שִׁמְךָ עָלֵינוּ
  chosen: let your name be called over us
  alternatives:
  - let us be called by your name
  - let your name be named upon us
  lexicon: HALOT
  rationale: The Niphal construction literally speaks of the man's name being called
    over them. This more formal rendering preserves the idiom and its covenantal/social
    force, while a footnote can preserve the smoother English alternative.
- source_word: אֱסֹף
  chosen: Take away
  alternatives:
  - remove
  - gather away
  lexicon: HALOT
  rationale: אָסַף basically means gather/collect, but in idiom can mean remove or
    take away. Here the object is reproach, so 'take away' is the most natural English
    equivalent.
- source_word: חֶרְפָּתֵנוּ
  chosen: our reproach
  alternatives:
  - our disgrace
  - our shame
  lexicon: HALOT
  rationale: '''Reproach'' preserves the social dishonor/shame dimension without narrowing
    it merely to internal feeling. In context it likely refers to the disgrace associated
    with remaining unmarried or childless after societal devastation.'
