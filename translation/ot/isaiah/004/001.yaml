theological_decisions:
- issue: Implied marital/social status in 'let your name be called over us'
  chosen_reading: Retain the Hebrew idiom in the main text rather than making the
    implication explicit as 'marry us.'
  alternative_readings:
  - let us be called by your name
  - marry us
  rationale: The phrase likely implies incorporation under the man's name, probably
    marriage, but the Hebrew does not use the ordinary verb 'to marry.' Preserving
    the idiom maintains the text's social and theological texture and avoids over-interpretation,
    while a footnote can clarify the implication.
  doctrine_reference: Translation philosophy §3, §5
- issue: Meaning of 'reproach'
  chosen_reading: Translate generally as social disgrace without specifying a single
    cause in the main text.
  alternative_readings:
  - the disgrace of being unmarried
  - the shame of childlessness
  rationale: The context strongly suggests removal of the stigma attached to lacking
    a husband's name/protection in a devastated society, but the exact nuance is not
    explicitly narrowed by the verse itself. The translation preserves the broader
    term.
  doctrine_reference: Translation philosophy §3
