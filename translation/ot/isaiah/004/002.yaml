id: ISA.4.2
reference: Isaiah 4:2
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא יִֽהְיֶה֙ צֶ֣מַח יְהוָ֔ה לִ/צְבִ֖י וּ/לְ/כָב֑וֹד וּ/פְרִ֤י
    הָ/אָ֨רֶץ֙ לְ/גָא֣וֹן וּ/לְ/תִפְאֶ֔רֶת לִ/פְלֵיטַ֖ת יִשְׂרָאֵֽל׃
translation:
  text: In that day the branch of the LORD will be for beauty and for glory, and the
    fruit of the land for majesty and for splendor, for the survivors of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the growth of the LORD' or 'what the LORD causes to sprout.' The Hebrew
      may evoke both renewed fertility in the land and the later prophetic image of
      the LORD's 'Branch.'
    reason: alternative_reading
  - marker: b
    text: Or 'the remnant of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: In that day
  alternatives:
  - On that day
  lexicon: HALOT
  rationale: Standard temporal idiom in prophetic discourse. 'In that day' is natural
    English and preserves the eschatological/prophetic force without overinterpreting
    the timeframe.
- source_word: צֶמַח יְהוָה
  chosen: the branch of the LORD
  alternatives:
  - the growth of the LORD
  - the sprout of the LORD
  lexicon: HALOT
  rationale: צֶמַח can denote sprouting/growth or a shoot/branch. 'Branch' preserves
    the concrete metaphor and its recognized prophetic resonance, while the genitive
    'of the LORD' is kept rather than paraphrased as 'from the LORD.' YHWH is rendered
    'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested-terms table for the divine name.
- source_word: לִצְבִי
  chosen: for beauty
  alternatives:
  - for adornment
  - for honor
  - for splendor
  lexicon: HALOT
  rationale: צְבִי often carries the sense of beauty, glory, or attractiveness. 'Beauty'
    fits the paired aesthetic/honor language and avoids redundancy with the following
    כָבוֹד, which is better rendered 'glory.'
- source_word: וּלְכָבוֹד
  chosen: and for glory
  alternatives:
  - and for honor
  lexicon: HALOT
  rationale: כָבוֹד commonly denotes glory, honor, or weightiness. 'Glory' is the
    most natural pairing with 'beauty' here and preserves the elevated register.
- source_word: וּפְרִי הָאָרֶץ
  chosen: and the fruit of the land
  alternatives:
  - and the fruit of the earth
  lexicon: HALOT
  rationale: פְרִי is straightforwardly 'fruit/produce.' הָאָרֶץ can be 'earth' or
    'land'; 'land' better suits the agricultural and Israel-focused context.
- source_word: לְגָאוֹן
  chosen: for majesty
  alternatives:
  - for pride
  - for exaltation
  - for glory
  lexicon: HALOT
  rationale: גָאוֹן can be positive ('majesty, exaltation') or negative ('pride')
    depending on context. Here the positive sense is demanded by the parallel commendatory
    terms. 'Majesty' differentiates it from כָבוֹד while preserving elevated praise.
- source_word: וּלְתִפְאֶרֶת
  chosen: and for splendor
  alternatives:
  - and for beauty
  - and for glory
  lexicon: HALOT
  rationale: תִפְאֶרֶת denotes beauty, glory, splendor, adornment. 'Splendor' avoids
    repetition with earlier 'beauty' and maintains the poetic parallelism.
- source_word: לִפְלֵיטַת יִשְׂרָאֵל
  chosen: for the survivors of Israel
  alternatives:
  - for the remnant of Israel
  - for those of Israel who escape
  lexicon: HALOT
  rationale: פְלֵיטָה refers to escaped ones/survivors. 'Survivors' is more transparent
    modern English than 'remnant' while still conveying those preserved through judgment.
    'Of Israel' is retained as a genitive rather than paraphrased.
