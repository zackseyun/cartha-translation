theological_decisions:
- issue: Whether צֶמַח יְהוָה should be rendered in a way that preserves possible
    messianic resonance
  chosen_reading: the branch of the LORD
  alternative_readings:
  - the growth of the LORD
  - what the LORD causes to sprout
  rationale: The phrase may refer either to luxuriant restoration of the land or to
    a royal/messianic figure in light of later prophetic 'Branch' texts. To preserve
    theological tension rather than resolve it, the main text keeps the concrete metaphor
    'branch' without capitalizing it, allowing both agricultural and messianic resonance.
    A footnote preserves the broader lexical alternative.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Whether לִפְלֵיטַת יִשְׂרָאֵל should use traditional 'remnant' language
  chosen_reading: for the survivors of Israel
  alternative_readings:
  - for the remnant of Israel
  rationale: The Hebrew denotes those who have escaped or survived. 'Survivors' is
    clearer in modern English and does not erase remnant theology; the traditional
    term is preserved in a footnote because of its theological significance in Isaiah.
  doctrine_reference: 'Translation philosophy §6: Readable modern English, not archaic
    or academic.'
