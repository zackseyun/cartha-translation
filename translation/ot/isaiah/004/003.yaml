id: ISA.4.3
reference: Isaiah 4:3
source:
  edition: WLC
  text: וְ/הָיָ֣ה הַ/נִּשְׁאָ֣ר בְּ/צִיּ֗וֹן וְ/הַ/נּוֹתָר֙ בִּ/יר֣וּשָׁלִַ֔ם קָד֖וֹשׁ
    יֵאָ֣מֶר ל֑/וֹ כָּל הַ/כָּת֥וּב לַ/חַיִּ֖ים בִּ/ירוּשָׁלִָֽם׀־׃
translation:
  text: And it shall be that whoever remains in Zion and whoever is left in Jerusalem
    will be called holy—everyone who is recorded for life in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone written among the living in Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'recorded for life' may refer to an official register of those
      spared to live, and it also echoes the broader biblical motif of people being
      written in God's book of life.
    reason: cross_reference
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be that
  alternatives:
  - And it will happen that
  - Then it shall be
  lexicon: HALOT
  rationale: Uses a natural but still formal future-introductory formula for the Hebrew
    narrative-prophetic construction, preserving the forward-looking sense without
    over-paraphrase.
- source_word: הַנִּשְׁאָר
  chosen: whoever remains
  alternatives:
  - the one left
  - the survivor
  - he who remains
  lexicon: HALOT
  rationale: The Niphal participle of שׁאר denotes one who remains or survives. 'Whoever
    remains' captures the representative/generic force in idiomatic English better
    than a wooden singular while preserving the remnant idea.
- source_word: בְּצִיּוֹן
  chosen: in Zion
  lexicon: HALOT
  rationale: Retains the place name as a theological-geographical term, not paraphrased
    as merely 'among God's people' or similar.
- source_word: וְהַנּוֹתָר
  chosen: and whoever is left
  alternatives:
  - and the one left
  - and whoever remains
  lexicon: HALOT
  rationale: From יתר/נותר, parallel to the previous remnant term. 'Is left' gives
    good English variation while preserving the synonymous parallelism.
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative rendering of the proper name.
- source_word: קָדוֹשׁ
  chosen: holy
  alternatives:
  - sacred
  lexicon: HALOT
  rationale: '''Holy'' is the standard and theologically weighty rendering, fitting
    covenantal consecration rather than merely cultic ''sacred.'''
- source_word: יֵאָמֶר לוֹ
  chosen: will be called
  alternatives:
  - will be said of him
  - will be called to him
  lexicon: HALOT
  rationale: 'The Niphal of אמר with לֹו here is idiomatically rendered ''will be
    called.'' English omits the indirect object for naturalness while preserving the
    predicative sense: he will be designated as holy.'
- source_word: כָּל
  chosen: everyone
  alternatives:
  - all
  - everyone who
  lexicon: HALOT
  rationale: 'Introduces the appositional clarification naturally in English: the
    holy remnant consists of everyone meeting the following description.'
- source_word: הַכָּתוּב
  chosen: who is recorded
  alternatives:
  - who is written
  - who is enrolled
  - who is inscribed
  lexicon: HALOT
  rationale: Passive participle of כתב. 'Recorded' is clear modern English and preserves
    the notion of an official written register without forcing a more interpretive
    term in the main text.
- source_word: לַחַיִּים
  chosen: for life
  alternatives:
  - among the living
  - to life
  lexicon: HALOT
  rationale: The phrase likely denotes being entered in a register with reference
    to life, i.e., those marked out for continued life. 'For life' preserves the compact
    Hebrew expression while allowing the theological resonance of a life-register.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Retained as the final locative phrase modifying the recording/register
    language.
