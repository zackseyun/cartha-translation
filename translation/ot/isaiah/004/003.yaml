theological_decisions:
- issue: Whether the verse refers merely to physical survivors or to a sanctified
    remnant marked out by God
  chosen_reading: 'The main text preserves both dimensions: those who remain are survivors,
    and they ''will be called holy'' as those recorded for life.'
  alternative_readings:
  - A purely historical reference to survivors after judgment
  - A more explicitly eschatological 'book of life' reading
  rationale: The Hebrew itself joins remnant-survival language with holiness and written
    registration. The translation should not collapse this into either only historical
    survival or a fully developed later doctrinal category. 'Recorded for life' preserves
    the theological tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
