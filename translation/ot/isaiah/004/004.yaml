theological_decisions:
- issue: Meaning of רוּחַ in the paired phrases בְּרוּחַ מִשְׁפָּט וּבְרוּחַ בָּעֵר
  chosen_reading: instrumental 'by a spirit of justice and by a spirit of burning'
  alternative_readings:
  - '''by the Spirit of judgment and by the Spirit of burning'''
  - '''by a wind of judgment and by a blast of burning'''
  rationale: The Hebrew noun can denote spirit, wind, or breath. Because the text
    does not explicitly identify the Holy Spirit and the paired construction reads
    naturally as instrumental means of divine cleansing, the translation preserves
    the ambiguity without importing a more specific pneumatological claim. The capitalized
    'Spirit' reading is possible and worth preserving in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
