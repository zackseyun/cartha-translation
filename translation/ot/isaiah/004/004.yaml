id: ISA.4.4
reference: Isaiah 4:4
source:
  edition: WLC
  text: אִ֣ם רָחַ֣ץ אֲדֹנָ֗/י אֵ֚ת צֹאַ֣ת בְּנוֹת צִיּ֔וֹן וְ/אֶת דְּמֵ֥י יְרוּשָׁלִַ֖ם
    יָדִ֣יחַ מִ/קִּרְבָּ֑/הּ בְּ/ר֥וּחַ מִשְׁפָּ֖ט וּ/בְ/ר֥וּחַ בָּעֵֽר׀־־׃
translation:
  text: when the Lord has washed away the filth of the daughters of Zion and cleansed
    the bloodshed of Jerusalem from her midst by a spirit of justice and by a spirit
    of burning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the Spirit of judgment and by the Spirit of burning.' The Hebrew
      word can also mean 'wind' or 'breath.'
    reason: alternative_reading
  - marker: b
    text: '''Bloodshed'' could also be rendered ''bloodguilt.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: when
  alternatives:
  - if
  lexicon: HALOT
  rationale: In context this introduces the time/condition upon which the promise
    of the previous verse is realized. English 'when' best conveys the sense here
    without implying uncertainty as strongly as a simple conditional 'if.'
- source_word: רָחַץ
  chosen: has washed away
  alternatives:
  - has washed
  - washes away
  lexicon: HALOT
  rationale: The verb means 'wash.' With the object 'filth,' English idiom favors
    'washed away,' expressing removal through washing while preserving the cleansing
    imagery.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: This is the divine title Adonai, appropriately rendered 'the Lord' in
    English. It is not the Tetragrammaton, so the small-caps convention for YHWH does
    not apply.
- source_word: צֹאַת
  chosen: the filth
  alternatives:
  - the uncleanness
  - the excrement
  lexicon: HALOT
  rationale: The noun is a strong term for filth/uncleanness, even dung-like impurity.
    'Filth' preserves the offensiveness of the image without becoming overly clinical
    or crude.
- source_word: בְּנוֹת צִיּוֹן
  chosen: the daughters of Zion
  alternatives:
  - Zion's daughters
  - the women of Zion
  lexicon: HALOT
  rationale: A literal rendering preserves the prophetic personification and corporate
    imagery. 'Women of Zion' is interpretive and therefore kept as an alternative
    only.
- source_word: דְּמֵי יְרוּשָׁלַםִ
  chosen: the bloodshed of Jerusalem
  alternatives:
  - the bloodguilt of Jerusalem
  - the bloodstains of Jerusalem
  lexicon: HALOT
  rationale: The plural 'bloods' often denotes bloodshed or bloodguilt. 'Bloodshed'
    fits the context of moral purge and remains natural English; 'bloodguilt' is possible
    but slightly more interpretive/legal.
- source_word: יָדִיחַ
  chosen: cleansed
  alternatives:
  - rinsed away
  - washed away
  - purged
  lexicon: HALOT
  rationale: The Hiphil of נדח/דוח here conveys washing or rinsing away. 'Cleansed'
    avoids awkward repetition with the earlier 'washed away' while still expressing
    removal of defilement.
- source_word: מִקִּרְבָּהּ
  chosen: from her midst
  alternatives:
  - from within her
  - out of her midst
  lexicon: HALOT
  rationale: The feminine singular suffix refers to Jerusalem as a city/personified
    woman. 'From her midst' preserves both the spatial sense and the personification.
- source_word: בְּרוּחַ
  chosen: by a spirit
  alternatives:
  - by the Spirit
  - by wind
  - by breath
  lexicon: HALOT
  rationale: רוּחַ can mean spirit, wind, or breath. Here it most naturally denotes
    an agentive force/instrument of divine cleansing. Because the phrase is indefinite
    and paired in parallel expressions, 'by a spirit' is preferred over the more doctrinally
    loaded 'by the Spirit.'
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: The term can mean judgment or justice. In this context of purgation and
    moral rectification, 'justice' communicates the judicial force in accessible English,
    while 'judgment' remains a viable alternative.
- source_word: בְּרוּחַ בָּעֵר
  chosen: by a spirit of burning
  alternatives:
  - by a spirit of fire
  - by a spirit of purging
  lexicon: HALOT
  rationale: The participial form from בער evokes burning/consuming. 'A spirit of
    burning' is the most direct rendering and preserves the metaphor of purifying
    destruction.
