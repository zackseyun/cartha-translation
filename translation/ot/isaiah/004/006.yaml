id: ISA.4.6
reference: Isaiah 4:6
source:
  edition: WLC
  text: וְ/סֻכָּ֛ה תִּהְיֶ֥ה לְ/צֵל יוֹמָ֖ם מֵ/חֹ֑רֶב וּ/לְ/מַחְסֶה֙ וּ/לְ/מִסְתּ֔וֹר
    מִ/זֶּ֖רֶם וּ/מִ/מָּטָֽר־׃פ
translation:
  text: And there will be a shelter for shade by day from heat, and for a refuge and
    a hiding place from storm and from rain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'booth' for 'shelter' (סֻכָּה), emphasizing a temporary covered structure.
    reason: lexical_alternative
  - marker: b
    text: Or 'from scorching heat.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from torrent' or 'from downpour' for 'from storm.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סֻכָּה
  chosen: shelter
  alternatives:
  - booth
  - canopy
  - tabernacle
  lexicon: HALOT
  rationale: The noun denotes a temporary shelter/booth. In this context of protective
    covering from weather, 'shelter' communicates the function naturally in modern
    English without importing the more specific image of a festival booth into the
    main text. 'Booth' remains a viable lexical alternative.
- source_word: תִּהְיֶה
  chosen: there will be
  alternatives:
  - it will be
  lexicon: HALOT
  rationale: The verb is simple future 'will be.' English idiom prefers existential
    'there will be' with an indefinite predicate noun here, yielding a natural sentence
    while preserving the Hebrew sense.
- source_word: לְצֵל
  chosen: for shade
  alternatives:
  - for shadow
  lexicon: HALOT
  rationale: '''Shade'' is the natural English rendering in a context of protection
    from sun/heat. ''Shadow'' is possible but less idiomatic here.'
- source_word: יוֹמָם
  chosen: by day
  alternatives:
  - in the daytime
  - daytime
  lexicon: HALOT
  rationale: The adverb marks the daytime period. 'By day' is concise and idiomatic,
    matching the poetic style.
- source_word: מֵחֹרֶב
  chosen: from heat
  alternatives:
  - from scorching heat
  - from drought
  lexicon: HALOT
  rationale: In this weather-protection context, the noun refers to heat/scorching
    rather than drought in the broader agricultural sense. 'From heat' is accurate
    and readable; 'scorching heat' is slightly more interpretive.
- source_word: מַחְסֶה
  chosen: refuge
  alternatives:
  - shelter
  - place of refuge
  lexicon: HALOT
  rationale: The term denotes a place of protection. 'Refuge' preserves the protective
    nuance and avoids flattening it into the same English term already used for סֻכָּה.
- source_word: מִסְתּוֹר
  chosen: hiding place
  alternatives:
  - shelter
  - cover
  lexicon: HALOT
  rationale: The noun carries the sense of a concealed or protected place. 'Hiding
    place' preserves the distinct nuance from מַחְסֶה while remaining natural English.
- source_word: זֶרֶם
  chosen: storm
  alternatives:
  - downpour
  - torrent
  - flood
  lexicon: HALOT
  rationale: The word can denote a rushing storm, torrent, or violent rain. Because
    it is paired with 'rain,' rendering it as 'storm' best distinguishes the terms
    while preserving the image of violent weather.
- source_word: מָטָר
  chosen: rain
  alternatives:
  - downpour
  lexicon: HALOT
  rationale: The standard sense is 'rain.' Since זֶרֶם already carries the more forceful
    storm/torrent idea, 'rain' is the best complementary rendering here.
