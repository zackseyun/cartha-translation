theological_decisions:
- issue: Nature of the protective imagery
  chosen_reading: Render the verse as describing a concrete protective shelter without
    specifying a later theological referent in the translation itself.
  alternative_readings:
  - Interpret the shelter typologically as Zion, the divine presence, or messianic
    protection
  rationale: The Hebrew presents poetic imagery of protection from heat and storm.
    While broader canonical or theological interpretation may see divine or eschatological
    significance, the verse itself does not require the translator to identify the
    image more specifically in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
