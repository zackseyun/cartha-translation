theological_decisions:
- issue: Prophetic tense/aspect of וּבָרָא
  chosen_reading: future promise ('will create')
  alternative_readings:
  - past narrative ('created')
  rationale: Within Isaiah's forward-looking restoration context, the perfect with
    conjunction functions prophetically. Rendering it as future preserves the promise
    of a new act of divine creation over Zion.
- issue: Possible Exodus/new-creation imagery
  chosen_reading: retain imagery without making typological interpretation explicit
    in the main text
  alternative_readings:
  - expand to 'pillar of cloud'/'pillar of fire'
  - make explicit a messianic or ecclesiological fulfillment
  rationale: The verse strongly echoes wilderness theophany imagery, but the translation
    should preserve the lexical data and let readers infer the typology rather than
    importing a fuller theological interpretation into the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
