id: ISA.4.5
reference: Isaiah 4:5
source:
  edition: WLC
  text: וּ/בָרָ֣א יְהוָ֡ה עַל֩ כָּל מְכ֨וֹן הַר צִיּ֜וֹן וְ/עַל מִקְרָאֶ֗/הָ עָנָ֤ן
    יוֹמָם֙ וְ/עָשָׁ֔ן וְ/נֹ֛גַהּ אֵ֥שׁ לֶהָבָ֖ה לָ֑יְלָה כִּ֥י עַל כָּל כָּב֖וֹד
    חֻפָּֽה־־־׀־־׃
translation:
  text: Then the LORD will create over the whole site of Mount Zion and over her assemblies
    a cloud by day, and smoke, and the brightness of a flaming fire by night; for
    over all the glory there will be a canopy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her convocations.' The Hebrew term can refer to appointed assemblies
      or gatherings called together.
    reason: lexical_alternative
  - marker: b
    text: Or 'the glow of a blazing fire by night.'
    reason: lexical_alternative
  - marker: c
    text: The imagery recalls the LORD's cloud and fire in the wilderness (for example,
      Exodus 13:21–22).
    reason: cross_reference
  - marker: d
    text: Or 'a covering'; the Hebrew can also suggest a wedding canopy.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָרָא
  chosen: Then ... will create
  alternatives:
  - and ... created
  - and ... will create
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse is naturally
    rendered as a future following the preceding promises; 'create' preserves the
    strong verb ברא rather than weakening it to 'make.' 'Then' captures the discourse
    progression of the conjunction.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: מְכוֹן
  chosen: site
  alternatives:
  - dwelling place
  - established place
  - foundation
  lexicon: HALOT
  rationale: The noun refers to a fixed place/location. In context with 'Mount Zion'
    and the following 'assemblies,' 'site' communicates the physical locale without
    overcommitting to 'dwelling place,' which may sound too interpretive here.
- source_word: הַר צִיּוֹן
  chosen: Mount Zion
  alternatives:
  - the mountain of Zion
  lexicon: HALOT
  rationale: Standard English rendering of the place name phrase.
- source_word: מִקְרָאֶיהָ
  chosen: her assemblies
  alternatives:
  - her convocations
  - those called together in her
  - her gathering places
  lexicon: HALOT
  rationale: מִקְרָא often denotes an assembly/convocation. The 3fs suffix refers
    back to Zion. 'Assemblies' is readable modern English and fits the people gathered
    there better than the more technical 'convocations.'
- source_word: עָנָן יוֹמָם
  chosen: a cloud by day
  alternatives:
  - cloud in the daytime
  lexicon: HALOT
  rationale: Straightforward rendering preserving the Exodus allusion.
- source_word: וְעָשָׁן
  chosen: and smoke
  alternatives:
  - even smoke
  lexicon: HALOT
  rationale: Keeps the coordinate noun explicit; the verse stacks visible manifestations
    rather than collapsing them.
- source_word: וְנֹגַהּ אֵשׁ לֶהָבָה לָיְלָה
  chosen: and the brightness of a flaming fire by night
  alternatives:
  - and a shining of flaming fire by night
  - and the glow of a blazing fire by night
  lexicon: HALOT
  rationale: נֹגַהּ is brightness/radiance; לֶהָבָה denotes flame/blaze. 'Brightness
    of a flaming fire' preserves both elements and echoes the pillar-of-fire imagery.
- source_word: כִּי
  chosen: for
  alternatives:
  - indeed
  - because
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the preceding imagery.
- source_word: כָּבוֹד
  chosen: the glory
  alternatives:
  - glory
  - honor
  lexicon: HALOT
  rationale: In this context the term likely refers to the glorious presence/honor
    associated with Zion under divine protection. The article in English helps the
    phrase read naturally.
- source_word: חֻפָּה
  chosen: a canopy
  alternatives:
  - a covering
  - a bridal canopy
  lexicon: HALOT
  rationale: The noun denotes a covering/canopy. 'Canopy' preserves the protective
    image and leaves possible nuptial overtones available without forcing them into
    the main text.
