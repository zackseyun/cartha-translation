id: ISA.19.1
reference: Isaiah 19:1
source:
  edition: WLC
  text: מַשָּׂ֖א מִצְרָ֑יִם הִנֵּ֨ה יְהוָ֜ה רֹכֵ֨ב עַל עָ֥ב קַל֙ וּ/בָ֣א מִצְרַ֔יִם וְ/נָע֞וּ אֱלִילֵ֤י מִצְרַ֨יִם֙ מִ/פָּנָ֔י/ו וּ/לְבַ֥ב מִצְרַ֖יִם יִמַּ֥ס בְּ/קִרְבּֽ/וֹ־׃
translation:
  text: 'An oracle concerning Egypt: Behold, Yahweh is riding on a swift cloud and is coming to Egypt; the idols of Egypt will tremble before him, and the heart of Egypt will melt within it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A burden concerning Egypt' or 'A pronouncement concerning Egypt.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from before him,' that is, at the LORD's presence.
    reason: lexical_alternative
  - marker: c
    text: Or 'within him'; the Hebrew treats Egypt as a singular entity.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשָּׂא
  chosen: oracle
  alternatives:
  - burden
  - pronouncement
  lexicon: HALOT
  rationale: In prophetic headings, מַשָּׂא commonly introduces a weighty prophetic utterance or pronouncement against a nation. 'Oracle' is idiomatic modern English and preserves the superscriptional force better than the archaic 'burden.'
- source_word: מִצְרַיִם / מִצְרָיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard rendering of the place name.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Marks vivid prophetic immediacy. 'Behold' retains the elevated, attention-directing force appropriate to prophetic discourse without adding content.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: רֹכֵב עַל עָב קַל
  chosen: is riding on a swift cloud
  alternatives:
  - rides on a light cloud
  - is mounted on a swift cloud
  lexicon: HALOT
  rationale: The participle רֹכֵב gives a vivid present/imminent action. עָב is 'cloud,' and קַל here means 'light/swift.' 'Swift cloud' communicates speed and theophanic imagery naturally in English.
- source_word: וּבָא
  chosen: and is coming
  alternatives:
  - and comes
  - and will come
  lexicon: HALOT
  rationale: The participial sequence presents imminent action in prophetic vision. 'Is coming' preserves the vividness better than a simple future while remaining natural in English.
- source_word: וְנָעוּ
  chosen: will tremble
  alternatives:
  - will totter
  - will quake
  - will be shaken
  lexicon: HALOT
  rationale: The verb conveys shaking or reeling. For idols confronted by the LORD's presence, 'will tremble' communicates destabilization and fear in a concise, readable way.
- source_word: אֱלִילֵי
  chosen: the idols of
  alternatives:
  - the worthless idols of
  lexicon: HALOT
  rationale: אֱלִילִים often carries a pejorative nuance ('worthless idols'), but the basic sense 'idols' is sufficient here and avoids overloading the line while preserving the referent.
- source_word: מִפָּנָיו
  chosen: before him
  alternatives:
  - at his presence
  - from before him
  lexicon: HALOT
  rationale: Literally 'from before his face/presence.' In this context, 'before him' is natural English and adequately conveys the causal force of the LORD's presence.
- source_word: וּלְבַב מִצְרַיִם
  chosen: and the heart of Egypt
  alternatives:
  - and Egypt's heart
  lexicon: HALOT
  rationale: לֵבָב/לְבַב denotes the inner being, courage, or resolve. 'The heart of Egypt' preserves the metaphor and national personification.
- source_word: יִמַּס
  chosen: will melt
  alternatives:
  - will dissolve
  - will lose courage
  lexicon: HALOT
  rationale: A common metaphor for fear or collapse of courage. 'Will melt' preserves the Hebrew image and is clear in English.
- source_word: בְּקִרְבּוֹ
  chosen: within it
  alternatives:
  - within him
  - in its midst
  lexicon: HALOT
  rationale: The suffix refers back to Egypt as a grammatically masculine singular entity. Since 'Egypt' is a nation/place in English, 'within it' best matches the personified-national sense without implying an individual male referent.
