theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Theophanic imagery of the LORD riding on a cloud
  chosen_reading: Retained as direct theophanic language without demythologizing
  alternative_readings:
  - Metaphorical paraphrase such as 'the LORD swiftly approaches'
  rationale: The Hebrew presents the LORD in vivid storm-theophany imagery. The translation preserves this imagery rather than flattening it into abstract action, in keeping with original-language primacy and avoidance of paraphrase beyond the source text.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
