theological_decisions:
- issue: Divine title יְהוָה צְבָאוֹת
  chosen_reading: the LORD of Armies
  alternative_readings:
  - the LORD of Hosts
  rationale: Retains the covenant name per doctrine ('the LORD') while rendering צְבָאוֹת
    transparently for modern readers. This avoids archaic opacity without reducing
    the martial/cosmic scope of the title.
  doctrine_reference: 'DOCTRINE.md: Contested terms (יְהוָה YHWH → the LORD); Translation
    philosophy #6'
- issue: Application of covenantal designations to Egypt and Assyria
  chosen_reading: Preserve the direct appositional titles 'Egypt my people' and 'Assyria
    the work of my hands' without softening
  alternative_readings:
  - Interpretive paraphrases such as 'Egypt, who are now my people'
  rationale: The Hebrew directly bestows striking covenantal language on foreign nations.
    The translation should preserve that theological tension and surprise rather than
    explain it away.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3'
