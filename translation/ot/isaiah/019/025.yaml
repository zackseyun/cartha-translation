id: ISA.19.25
reference: Isaiah 19:25
source:
  edition: WLC
  text: אֲשֶׁ֧ר בֵּרֲכ֛/וֹ יְהוָ֥ה צְבָא֖וֹת לֵ/אמֹ֑ר בָּר֨וּךְ עַמִּ֜/י מִצְרַ֗יִם
    וּ/מַעֲשֵׂ֤ה יָדַ/י֙ אַשּׁ֔וּר וְ/נַחֲלָתִ֖/י יִשְׂרָאֵֽל׃ס
translation:
  text: whom the LORD of Armies has blessed, saying, “Blessed be Egypt my people,
    and Assyria the work of my hands, and Israel my inheritance.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the LORD of Hosts.”
    reason: lexical_alternative
  - marker: b
    text: The titles “my people” and “the work of my hands,” often associated with
      Israel, are here applied to Egypt and Assyria as well.
    reason: cross_reference
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: Introduces a relative clause referring back to the triad in the previous
    verse. 'Whom' fits the personal referents Egypt, Assyria, and Israel better than
    'which' or the less specific 'that.'
- source_word: בֵּרֲכוֹ
  chosen: has blessed
  alternatives:
  - blessed
  lexicon: HALOT
  rationale: The perfect verb with 3ms suffix refers to the one/ones whom YHWH blesses.
    English present perfect gives natural linkage to the following direct speech while
    preserving completed divine action with present relevance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of Hosts
  lexicon: HALOT
  rationale: '''Armies'' translates the underlying military/plural sense more transparently
    for modern readers, while retaining the established title structure ''the LORD
    of Armies.'' ''Hosts'' is traditional but less immediately clear.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard idiomatic introduction to direct speech in English.
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - Blessed is
  lexicon: HALOT
  rationale: Predicate adjective used in a blessing formula. 'Blessed be' preserves
    the formal benedictory force better than the flatter 'Blessed is.'
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward possessive noun phrase. Its theological force is significant
    because a title often associated with Israel is here applied to Egypt.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard English name for the nation.
- source_word: וּמַעֲשֵׂה יָדַי
  chosen: and Assyria the work of my hands
  alternatives:
  - and the work of my hands, Assyria
  - and Assyria, the work of my hands
  lexicon: HALOT
  rationale: Construct phrase meaning 'work/deed of my hands.' The chosen order is
    idiomatic in English while preserving the appositional blessing formula applied
    to Assyria.
- source_word: אַשּׁוּר
  chosen: Assyria
  lexicon: HALOT
  rationale: Standard English name for the nation/empire.
- source_word: וְנַחֲלָתִי
  chosen: and Israel my inheritance
  alternatives:
  - and Israel my heritage
  - and my inheritance, Israel
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes inheritance/possession allotted. 'Inheritance'
    is the most direct and theologically resonant rendering here.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard English name for the people/nation.
