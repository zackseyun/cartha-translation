id: ISA.19.13
reference: Isaiah 19:13
source:
  edition: WLC
  text: נֽוֹאֲלוּ֙ שָׂ֣רֵי צֹ֔עַן נִשְּׁא֖וּ שָׂ֣רֵי נֹ֑ף הִתְע֥וּ אֶת מִצְרַ֖יִם
    פִּנַּ֥ת שְׁבָטֶֽי/הָ־׃
translation:
  text: The princes of Zoan have become foolish; the princes of Noph are deceived.
    They have led Egypt astray, they who are the cornerstone of her tribes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Noph is the Hebrew name for Memphis.
    reason: alternative_reading
lexical_decisions:
- source_word: נֽוֹאֲלוּ
  chosen: have become foolish
  alternatives:
  - have acted foolishly
  - are foolish
  lexicon: HALOT
  rationale: From יאל in the Niphal, conveying becoming foolish or showing oneself
    foolish. 'Have become foolish' preserves the stative/resultative sense better
    than a simple adjective.
- source_word: שָׂרֵי
  chosen: princes
  alternatives:
  - officials
  - leaders
  lexicon: HALOT
  rationale: שַׂר commonly denotes a ruler, chief, or prince. 'Princes' fits the political
    elite in prophetic diction and is idiomatic in Isaiah.
- source_word: צֹעַן
  chosen: Zoan
  rationale: Proper place name; transliterated per translation philosophy.
- source_word: נִשְּׁאוּ
  chosen: are deceived
  alternatives:
  - are deluded
  - have been led astray
  lexicon: HALOT
  rationale: From נשׁא in the Niphal, here best taken as being deceived/deluded rather
    than exalted. The context is the folly of Egypt's leaders, so 'are deceived' fits
    the parallelism with the following 'have led Egypt astray.'
- source_word: נֹף
  chosen: Noph
  alternatives:
  - Memphis
  rationale: Proper place name. 'Noph' follows the Hebrew form by transliteration;
    'Memphis' is the conventional Greek-derived identification and is worth preserving
    in a footnote.
- source_word: הִתְעוּ
  chosen: have led ... astray
  alternatives:
  - have caused ... to wander
  - have misled
  lexicon: HALOT
  rationale: 'From תעה in the Hiphil, causative: causing someone to wander or go astray.
    ''Have led ... astray'' is natural English and preserves the causative force.'
- source_word: מִצְרַיִם
  chosen: Egypt
  rationale: Standard English rendering of the place/nation name.
- source_word: פִּנַּת
  chosen: cornerstone
  alternatives:
  - corner
  - chief corner
  lexicon: HALOT
  rationale: Literally 'corner' or 'cornerstone.' In construct with 'her tribes,'
    it metaphorically refers to the chief supporting element of the nation. 'Cornerstone'
    best captures the metaphorical force in English.
- source_word: שְׁבָטֶיהָ
  chosen: her tribes
  alternatives:
  - her clans
  lexicon: HALOT
  rationale: שֵׁבֶט can mean tribe, clan, or staff/scepter depending on context. Here
    it refers to the constituent groupings of Egypt. 'Her tribes' is the most direct
    rendering of the Hebrew form with 3fs suffix referring to Egypt.
