id: ISA.19.10
reference: Isaiah 19:10
source:
  edition: WLC
  text: וְ/הָי֥וּ שָׁתֹתֶ֖י/הָ מְדֻכָּאִ֑ים כָּל עֹ֥שֵׂי שֶׂ֖כֶר אַגְמֵי נָֽפֶשׁ־־׃
translation:
  text: And her foundations will be crushed, all who work for wages will be grieved
    in soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew text is difficult. 'Her foundations' may also be understood as 'her
      pillars/supports'; some have proposed 'her weavers.'
    reason: alternative_reading
  - marker: b
    text: The final phrase is obscure in Hebrew. Literally, it reads something like
      'pools of soul' or 'marshes of appetite/life'; many understand it idiomatically
      as inward grief or dejection.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁתֹתֶיהָ
  chosen: her foundations
  alternatives:
  - her pillars
  - her weavers
  - her setters/establishers
  lexicon: HALOT
  rationale: The noun is difficult and much discussed. In context, a sense related
    to 'foundations' or 'supports' best fits the image of Egypt’s social-economic
    structure collapsing. This follows a common understanding of the term from a root
    meaning 'to set/place/found.' Because the form is rare and disputed, major alternatives
    are preserved in a footnote.
- source_word: מְדֻכָּאִים
  chosen: will be crushed
  alternatives:
  - will be broken
  - will be oppressed
  lexicon: HALOT
  rationale: The passive participle from דכא conveys being crushed or broken down.
    'Will be crushed' preserves the force of devastation in the prophecy and fits
    the predicate after 'will be.'
- source_word: כָּל
  chosen: all
  alternatives:
  - all of the
  lexicon: HALOT
  rationale: 'Straightforward distributive sense: the statement extends to the whole
    class that follows.'
- source_word: עֹשֵׂי שֶׂכֶר
  chosen: who work for wages
  alternatives:
  - wage earners
  - those who make hired work
  - those who labor for pay
  lexicon: HALOT
  rationale: Literally 'doers/makers of wages.' The idiomatic sense is people who
    labor for pay. 'Who work for wages' is natural English while staying close to
    the Hebrew.
- source_word: אַגְמֵי נָפֶשׁ
  chosen: grieved in soul
  alternatives:
  - downcast in spirit
  - soul-sick
  - ponds of soul
  lexicon: HALOT
  rationale: This phrase is also difficult. The traditional consonantal text yields
    an obscure expression. In context, it most plausibly describes the inner distress
    of the wage-workers. 'Grieved in soul' communicates the likely sense in readable
    English, while the more literal but obscure alternative is noted in a footnote.
