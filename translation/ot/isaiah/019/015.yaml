id: ISA.19.15
reference: Isaiah 19:15
source:
  edition: WLC
  text: וְ/לֹֽא יִהְיֶ֥ה לְ/מִצְרַ֖יִם מַֽעֲשֶׂ֑ה אֲשֶׁ֧ר יַעֲשֶׂ֛ה רֹ֥אשׁ וְ/זָנָ֖ב
    כִּפָּ֥ה וְ/אַגְמֽוֹן־׃ס
translation:
  text: And there will be no work for Egypt that head or tail, palm branch or reed,
    can do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'head or tail, palm branch or reed' is a figurative expression for
      every level of society, from highest to lowest; compare Isaiah 19:15 with the
      similar imagery in Isaiah 9:14.
    reason: cross_reference
  - marker: b
    text: Or 'head and tail, palm branch and reed.' The Hebrew pairs may be read coordinately,
      but the sense is that no part of Egypt, high or low, will be able to act.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲשֶׂה
  chosen: work
  alternatives:
  - deed
  - thing to do
  - action
  lexicon: HALOT
  rationale: The noun denotes an act, work, or undertaking. 'Work' fits the idiom
    'there will be no work for Egypt' and naturally introduces the following relative
    clause about what can be done.
- source_word: אֲשֶׁר יַעֲשֶׂה
  chosen: that ... can do
  alternatives:
  - which ... will do
  - that ... may do
  lexicon: HALOT
  rationale: The relative clause specifies any task that could be performed. English
    idiom is improved by rendering the imperfect with modal force ('can do') in this
    context of incapacity.
- source_word: רֹאשׁ וְזָנָב
  chosen: head or tail
  alternatives:
  - head and tail
  lexicon: HALOT
  rationale: 'These are metaphorical social extremes, echoed from the previous verse.
    ''Or'' in English better conveys the distributive sense: neither the highest nor
    the lowest can accomplish anything.'
- source_word: כִּפָּה
  chosen: palm branch
  alternatives:
  - branch
  - bough
  lexicon: HALOT
  rationale: In Isaiah 9:14 and 19:15 the pair with 'reed' forms an image of high
    and low. 'Palm branch' preserves the likely botanical image behind the metaphor
    more clearly than the vaguer 'branch'.
- source_word: אַגְמוֹן
  chosen: reed
  alternatives:
  - rush
  lexicon: HALOT
  rationale: The term refers to a marsh plant such as a reed or rush. 'Reed' is common,
    clear modern English and preserves the contrast with 'palm branch'.
- source_word: לְמִצְרַיִם
  chosen: for Egypt
  alternatives:
  - to Egypt
  - in Egypt
  lexicon: HALOT
  rationale: 'The preposition ל marks possession or relation here: no work will exist
    for Egypt, i.e., available to or achievable by Egypt.'
- source_word: וְלֹא יִהְיֶה
  chosen: And there will be no
  alternatives:
  - And there shall not be
  - And no ... will exist
  lexicon: HALOT
  rationale: This is a straightforward future existential clause. 'There will be no'
    is natural modern English without loss of force.
