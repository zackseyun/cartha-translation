id: ISA.19.9
reference: Isaiah 19:9
source:
  edition: WLC
  text: וּ/בֹ֛שׁוּ עֹבְדֵ֥י פִשְׁתִּ֖ים שְׂרִיק֑וֹת וְ/אֹרְגִ֖ים חוֹרָֽי׃
translation:
  text: Those who work with combed flax will be ashamed, and those who weave white
    cloth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fine flax' for 'combed flax.' The Hebrew term likely refers to specially
      prepared high-quality flax.
    reason: lexical_alternative
  - marker: b
    text: Or 'white linen.' The Hebrew likely refers to whitened or bleached textile
      material.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֹשׁוּ
  chosen: will be ashamed
  alternatives:
  - will be disappointed
  - will be confounded
  lexicon: HALOT
  rationale: The verb בוש commonly denotes shame or humiliation resulting from failure
    or ruin. In this economic-judgment context, 'will be ashamed' preserves the direct
    lexical sense better than a weaker rendering like 'disappointed.'
- source_word: עֹבְדֵי
  chosen: those who work with
  alternatives:
  - workers of
  - those who process
  lexicon: HALOT
  rationale: From עבד in a participial form, referring to laborers or those engaged
    in an occupation. 'Those who work with' is natural English and fits the following
    material object.
- source_word: פִשְׁתִּים
  chosen: flax
  alternatives:
  - linen flax
  lexicon: HALOT
  rationale: The noun denotes flax, the plant/material from which linen is made. 'Flax'
    is the most direct rendering; the linen product is implied by context but not
    identical to the lexical form.
- source_word: שְׂרִיקוֹת
  chosen: combed
  alternatives:
  - carded
  - fine
  - choice
  lexicon: HALOT
  rationale: This adjective is difficult and has been understood as referring to specially
    prepared flax, likely combed/carded fine flax. 'Combed' communicates processed
    flax ready for textile work and avoids overcommitting to a purely qualitative
    gloss like 'fine' while preserving the manufacturing context.
- source_word: וְאֹרְגִים
  chosen: and those who weave
  alternatives:
  - and weavers
  lexicon: HALOT
  rationale: The participle from ארג denotes weaving. 'Those who weave' matches the
    parallel occupational structure of the verse and reads smoothly in English.
- source_word: חוֹרָי
  chosen: white cloth
  alternatives:
  - white linen
  - bleached fabric
  - cloth of whiteness
  lexicon: HALOT
  rationale: The noun is traditionally connected with whiteness or white fabric, likely
    fine white linen. 'White cloth' is clear modern English and avoids specifying
    'linen' where the Hebrew term itself points more directly to the whitened product
    than to the raw material.
