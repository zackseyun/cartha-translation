id: ISA.19.5
reference: Isaiah 19:5
source:
  edition: WLC
  text: וְ/נִשְּׁתוּ מַ֖יִם מֵֽ/הַ/יָּ֑ם וְ/נָהָ֖ר יֶחֱרַ֥ב וְ/יָבֵֽשׁ־׃
translation:
  text: And the waters of the sea will be dried up, and the river will be parched
    and dry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the waters will be drained from the sea.' The Hebrew verb can denote
      waters being exhausted or dried up.
    reason: lexical_alternative
  - marker: b
    text: '''The river'' likely refers to the Nile in context, but the Hebrew text
      uses the common noun rather than the proper name.'
    reason: cultural_note
lexical_decisions:
- source_word: נִשְּׁתוּ
  chosen: will be dried up
  alternatives:
  - will be drained
  - will be dried out
  lexicon: HALOT
  rationale: The Niphal form of שתה here is used in the sense of waters being exhausted
    or dried up, not literally 'drunk.' In context of judgment on Egypt's waters,
    'will be dried up' best conveys the passive/resultative sense in natural English.
- source_word: מַיִם
  chosen: the waters
  alternatives:
  - waters
  lexicon: HALOT
  rationale: Plural 'waters' reflects the Hebrew plural form and is idiomatic in English
    for a body of water or its supply.
- source_word: מֵהַיָּם
  chosen: of the sea
  alternatives:
  - from the sea
  lexicon: HALOT
  rationale: Although the preposition is 'from,' English idiom with 'the waters ...
    of the sea' is smoother and captures the source relationship. In Isaiah 19's Egyptian
    context, 'sea' may refer broadly to a major body of water, but the text itself
    says 'sea,' so that is retained.
- source_word: נָהָר
  chosen: the river
  alternatives:
  - a river
  - the Nile
  lexicon: HALOT
  rationale: With no article in Hebrew but clear contextual reference to Egypt's great
    river system, 'the river' is the most natural English rendering. 'The Nile' is
    interpretively likely, but the Hebrew noun itself is not the proper name, so the
    more text-near 'the river' is preferred.
- source_word: יֶחֱרַב
  chosen: will be parched
  alternatives:
  - will dry up
  - will become dry
  lexicon: HALOT
  rationale: From חרב, the verb denotes becoming dry or desolate. 'Will be parched'
    preserves a distinct nuance from the following יָבֵשׁ and avoids flattening the
    paired verbs into a single repeated English expression.
- source_word: יָבֵשׁ
  chosen: dry
  alternatives:
  - dried up
  - be dry
  lexicon: HALOT
  rationale: 'Used with the preceding verb, this creates an intensifying pair: the
    river will be parched and dry. Rendering it simply as ''dry'' preserves the compact
    force of the Hebrew sequence without overexpansion.'
