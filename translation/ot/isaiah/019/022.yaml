id: ISA.19.22
reference: Isaiah 19:22
source:
  edition: WLC
  text: וְ/נָגַ֧ף יְהוָ֛ה אֶת מִצְרַ֖יִם נָגֹ֣ף וְ/רָפ֑וֹא וְ/שָׁ֨בוּ֙ עַד יְהוָ֔ה
    וְ/נֶעְתַּ֥ר לָ/הֶ֖ם וּ/רְפָאָֽ/ם־־׃
translation:
  text: And the LORD will strike Egypt, striking and healing; and they will return
    to the LORD, and he will respond to their pleas and heal them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turn to the LORD.' The Hebrew verb can denote turning or returning,
      often with repentance in prophetic contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will be entreated by them' / 'he will hear their supplication.' The
      Hebrew expression means that the LORD responds favorably to their appeal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָגַף
  chosen: will strike
  alternatives:
  - will smite
  - will afflict
  lexicon: HALOT
  rationale: נגע/נגף in this stem commonly denotes striking with a blow or plague.
    'Will strike' is clear modern English and preserves the force of divine judgment
    without archaic diction.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard English rendering of the place/nation name.
- source_word: נָגֹף וְרָפוֹא
  chosen: striking and healing
  alternatives:
  - with striking and with healing
  - striking, then healing
  lexicon: HALOT
  rationale: The infinitive absolute pair intensifies and balances the two actions.
    'Striking and healing' preserves the Hebrew juxtaposition of judgment and restoration
    without overinterpreting sequence.
- source_word: וְשָׁבוּ עַד יְהוָה
  chosen: and they will return to the LORD
  alternatives:
  - and they will turn to the LORD
  lexicon: HALOT
  rationale: שוב with עַד conveys turning/returning toward the LORD, often with repentance
    overtones. 'Return' preserves the covenantal nuance and common prophetic idiom.
- source_word: וְנֶעְתַּר לָהֶם
  chosen: and he will respond to their pleas
  alternatives:
  - and he will be entreated by them
  - and he will hear their supplication
  lexicon: HALOT
  rationale: The Niphal of עתר can mean to allow oneself to be entreated, i.e., to
    respond favorably to prayer. 'Respond to their pleas' is idiomatic modern English
    and captures the relational sense better than the archaic 'be entreated.'
- source_word: וּרְפָאָם
  chosen: and heal them
  alternatives:
  - and restore them
  lexicon: HALOT
  rationale: רפא is the standard verb 'heal.' In context it may include national restoration,
    but 'heal them' best preserves the lexical link with the earlier 'healing' and
    leaves the metaphorical breadth intact.
