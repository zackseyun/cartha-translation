theological_decisions:
- issue: Relationship between divine judgment and restoration
  chosen_reading: 'The verse presents both actions as the LORD''s work: he strikes
    Egypt and also heals it.'
  alternative_readings:
  - The healing could be read as merely political recovery rather than spiritually
    responsive restoration.
  rationale: The Hebrew explicitly attributes both striking and healing to the LORD
    and links healing with Egypt's return to him and his favorable response. The translation
    preserves this tension without reducing either side.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Repentance nuance in שׁוב
  chosen_reading: return to the LORD
  alternative_readings:
  - turn to the LORD
  rationale: '''Return'' better preserves the prophetic-religious nuance of repentance/restoration
    while not overstating a fully developed doctrinal conversion formula.'
  doctrine_reference: Translation philosophy §1 and §3
