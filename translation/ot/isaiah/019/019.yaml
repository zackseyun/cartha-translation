id: ISA.19.19
reference: Isaiah 19:19
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא יִֽהְיֶ֤ה מִזְבֵּ֨חַ֙ לַֽ/יהוָ֔ה בְּ/ת֖וֹךְ אֶ֣רֶץ מִצְרָ֑יִם
    וּ/מַצֵּבָ֥ה אֵֽצֶל גְּבוּלָ֖/הּ לַֽ/יהוָֽה־׃
translation:
  text: In that day there will be an altar to the LORD in the midst of the land of
    Egypt, and a pillar to the LORD beside its border.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and a standing stone to the LORD near its border.' The Hebrew מַצֵּבָה
      can denote an erected stone or pillar; 'pillar' is used in the main text as
      the most natural concise rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: In that day
  alternatives:
  - On that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'In that day' is idiomatic in English
    and preserves the eschatological/prophetic register without unnecessary stiffness.
- source_word: יִהְיֶה
  chosen: there will be
  alternatives:
  - will be
  lexicon: HALOT
  rationale: Existential use of היה is naturally rendered 'there will be' in English
    because the clause introduces the existence of an altar and pillar.
- source_word: מִזְבֵּחַ
  chosen: altar
  lexicon: HALOT
  rationale: The normal sense is a sacrificial altar. No broader or metaphorical rendering
    is warranted here.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל marks dedication or belonging. 'To the LORD' is concise
    and idiomatic for an altar dedicated to him.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: בְּתוֹךְ
  chosen: in the midst of
  alternatives:
  - in the middle of
  - within
  lexicon: HALOT
  rationale: '''In the midst of'' preserves the sense of something located within
    Egypt, not merely at its edge. It also fits the elevated prophetic style.'
- source_word: אֶרֶץ מִצְרַיִם
  chosen: the land of Egypt
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: The construct phrase explicitly says 'land of Egypt'; retaining 'land
    of' reflects the Hebrew wording more closely than the simpler 'Egypt' alone.
- source_word: וּמַצֵּבָה
  chosen: and a pillar
  alternatives:
  - and a standing stone
  - and a monument
  lexicon: HALOT
  rationale: מַצֵּבָה denotes an erected stone/pillar. 'Pillar' is the most natural
    concise rendering in context, while 'standing stone' is more explanatory and 'monument'
    too broad.
- source_word: אֵצֶל
  chosen: beside
  alternatives:
  - near
  - at
  lexicon: HALOT
  rationale: The preposition indicates proximity. 'Beside' best captures the spatial
    relation in readable English.
- source_word: גְּבוּלָהּ
  chosen: its border
  alternatives:
  - its boundary
  lexicon: HALOT
  rationale: The feminine singular suffix refers back to 'the land of Egypt.' 'Border'
    is the most idiomatic English term for a national boundary in this context.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Repeated to reflect the Hebrew repetition, which emphasizes that both
    the altar and the pillar are dedicated to the LORD.
