theological_decisions:
- issue: Rendering of יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the divine name twice. Following the project's doctrinal
    guidance for the Tetragrammaton, it is rendered 'the LORD' rather than transliterated
    forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering of מַצֵּבָה in a positive prophetic context
  chosen_reading: pillar
  alternative_readings:
  - standing stone
  - monument
  rationale: Although מַצֵּבָה can refer elsewhere to cultic pillars condemned in
    Israelite practice, this verse presents it positively as a marker dedicated to
    the LORD in Egypt. The translation should preserve the lexical sense without importing
    later theological harmonization or softening it into a generic 'monument.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    preserve theological tension rather than resolve it'
