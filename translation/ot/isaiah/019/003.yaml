id: ISA.19.3
reference: Isaiah 19:3
source:
  edition: WLC
  text: וְ/נָבְקָ֤ה רֽוּחַ מִצְרַ֨יִם֙ בְּ/קִרְבּ֔/וֹ וַ/עֲצָת֖/וֹ אֲבַלֵּ֑עַ וְ/דָרְשׁ֤וּ
    אֶל הָֽ/אֱלִילִים֙ וְ/אֶל הָ֣/אִטִּ֔ים וְ/אֶל הָ/אֹב֖וֹת וְ/אֶל הַ/יִּדְּעֹנִֽים־־־־־׃
translation:
  text: And the spirit of Egypt will be emptied out within it, and I will swallow
    up its counsel; and they will seek the idols, the ghosts, the mediums, and the
    spiritists.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the mutterers' or 'the charmers' for the rare Hebrew term translated
      'ghosts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָבְקָה
  chosen: will be emptied out
  alternatives:
  - will be drained
  - will be poured out
  - will be exhausted
  lexicon: HALOT
  rationale: The Niphal of בקק/related form conveys being emptied or drained. 'Will
    be emptied out' preserves the image of inner depletion better than a more interpretive
    'be discouraged.'
- source_word: רוּחַ
  chosen: spirit
  alternatives:
  - breath
  - wind
  - courage
  lexicon: HALOT
  rationale: In context of national inner collapse and failed counsel, 'spirit' best
    captures the internal animating disposition of Egypt. 'Courage' is possible as
    an interpretive gloss, but 'spirit' preserves the metaphorical breadth of the
    Hebrew.
- source_word: בְּקִרְבּוֹ
  chosen: within it
  alternatives:
  - in its midst
  - within him
  lexicon: HALOT
  rationale: The suffix refers back to Egypt as a collective/national entity. 'Within
    it' is natural English for a nation and conveys internal disintegration.
- source_word: עֲצָתוֹ
  chosen: its counsel
  alternatives:
  - its plans
  - its strategy
  lexicon: HALOT
  rationale: עֵצָה commonly denotes counsel, advice, or plan. 'Counsel' keeps the
    connection to deliberation and policy without over-specifying.
- source_word: אֲבַלֵּעַ
  chosen: I will swallow up
  alternatives:
  - I will confound
  - I will destroy
  - I will consume
  lexicon: HALOT
  rationale: The Piel/causative sense from בלע literally means 'swallow up.' Retaining
    the concrete metaphor is preferable to flattening it into the interpretive 'confound,'
    though the effect is the frustration of Egypt's counsel.
- source_word: וְדָרְשׁוּ אֶל
  chosen: they will seek
  alternatives:
  - they will consult
  - they will inquire of
  lexicon: HALOT
  rationale: דרשׁ with אֶל in divinatory contexts means to seek or consult. 'Seek'
    is slightly more literal; the objects that follow make clear this is religious
    consultation.
- source_word: הָאֱלִילִים
  chosen: the idols
  alternatives:
  - the worthless idols
  - the false gods
  lexicon: HALOT
  rationale: אֱלִילִים is the standard pejorative term for idols. 'The idols' is clear
    and sufficiently direct; 'worthless idols' captures nuance but adds emphasis not
    required in the main text.
- source_word: הָאִטִּים
  chosen: the ghosts
  alternatives:
  - the mutterers
  - the charmers
  - the sorcerers
  lexicon: HALOT
  rationale: This rare term is difficult. In this sequence of illicit spiritual practitioners/entities,
    'ghosts' fits the likely sense of departed spirits or occult apparitions consulted
    by the living. Because the term is uncertain, an alternative is preserved in a
    footnote.
- source_word: הָאֹבוֹת
  chosen: the mediums
  alternatives:
  - the spirits of the dead
  - the necromancers
  lexicon: HALOT
  rationale: אוֹבוֹת can denote either the spirit invoked or, by metonymy, the medium
    who consults it. In English, 'mediums' is the clearest idiomatic rendering in
    a list of occult consultations.
- source_word: הַיִּדְּעֹנִים
  chosen: the spiritists
  alternatives:
  - the wizards
  - the familiar spirits
  - the diviners
  lexicon: HALOT
  rationale: יִדְּעֹנִים refers to occult practitioners associated with forbidden
    spirit knowledge. 'Spiritists' is modern, readable English and pairs well with
    'mediums' while avoiding archaic 'wizards.'
