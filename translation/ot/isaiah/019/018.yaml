id: ISA.19.18
reference: Isaiah 19:18
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֡וּא יִהְיוּ֩ חָמֵ֨שׁ עָרִ֜ים בְּ/אֶ֣רֶץ מִצְרַ֗יִם מְדַבְּרוֹת֙
    שְׂפַ֣ת כְּנַ֔עַן וְ/נִשְׁבָּע֖וֹת לַ/יהוָ֣ה צְבָא֑וֹת עִ֣יר הַ/הֶ֔רֶס יֵאָמֵ֖ר
    לְ/אֶחָֽת׃ס
translation:
  text: In that day there will be five cities in the land of Egypt speaking the language
    of Canaan and swearing allegiance to the LORD of Armies. One of them will be called
    the City of Destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, possibly, 'the City of the Sun,' reflecting an ancient alternative reading
      of the final clause.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: In that day
  alternatives:
  - On that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula; 'In that day' is idiomatic in English
    and preserves the eschatological/prophetic register.
- source_word: יִהְיוּ
  chosen: there will be
  alternatives:
  - will be
  lexicon: HALOT
  rationale: Existential use of היה with a following subject; 'there will be' is natural
    English for introducing the existence of five cities.
- source_word: חָמֵשׁ עָרִים
  chosen: five cities
  lexicon: HALOT
  rationale: Direct numerical expression; no reason to expand or paraphrase.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: Retains אֶרֶץ 'land,' which is present in the Hebrew and contributes
    to the formal texture of the line.
- source_word: מְדַבְּרוֹת שְׂפַת כְּנַעַן
  chosen: speaking the language of Canaan
  alternatives:
  - speaking the lip of Canaan
  - speaking the language of the Canaanites
  lexicon: HALOT
  rationale: שָׂפָה literally means 'lip' but idiomatically 'language/speech.' 'Language
    of Canaan' preserves the Hebrew idiom while communicating clearly; it likely refers
    to Hebrew or the speech associated with the covenant people.
- source_word: וְנִשְׁבָּעוֹת לַיהוָה צְבָאוֹת
  chosen: and swearing allegiance to the LORD of Armies
  alternatives:
  - and swearing to the LORD of Armies
  - and swearing an oath to the LORD of Hosts
  lexicon: HALOT
  rationale: The Niphal of שׁבע with ל can denote taking an oath by/to someone, here
    expressing covenantal loyalty. 'Swearing allegiance' makes the sense explicit
    without over-paraphrasing. Per doctrine, יהוה is rendered 'the LORD.' צְבָאוֹת
    is translated rather than transliterated; 'of Armies' is more transparent than
    traditional 'of Hosts.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by doctrine for the divine name, following the stated default
    rendering.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of Hosts
  lexicon: HALOT
  rationale: Title is translated for meaning. 'Armies' is transparent modern English
    and reflects the plural noun more directly than the traditional but less transparent
    'Hosts.'
- source_word: עִיר הַהֶרֶס
  chosen: the City of Destruction
  alternatives:
  - the City of Demolition
  - the City of the Sun
  lexicon: HALOT
  rationale: The MT reads הֶרֶס, naturally yielding 'destruction/demolition.' Because
    this phrase is text-critically contested and some traditions reflect 'sun' (חֶרֶס),
    the main text follows the MT while preserving the alternative in a footnote.
- source_word: יֵאָמֵר לְאֶחָת
  chosen: One of them will be called
  alternatives:
  - it will be said of one
  - one will be called
  lexicon: HALOT
  rationale: Passive יֵאָמֵר with לְאֶחָת idiomatically means that one of the five
    cities will bear this designation. 'One of them will be called' makes the referent
    explicit in natural English.
