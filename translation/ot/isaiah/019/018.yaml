theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering צְבָאוֹת in the divine title
  chosen_reading: the LORD of Armies
  alternative_readings:
  - the LORD of Hosts
  rationale: Titles should be translated rather than transliterated. 'Armies' is clearer
    to modern readers while preserving the martial/plural sense of צְבָאוֹת.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
- issue: Contested reading in עִיר הַהֶרֶס
  chosen_reading: the City of Destruction
  alternative_readings:
  - the City of the Sun
  rationale: The consonantal MT supports 'destruction' (הרס), so the main text follows
    the Hebrew source. Because an ancient alternative reflected in some witnesses/traditions
    points to 'sun' (חרס), the alternative is preserved in a footnote rather than
    silently resolved.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
