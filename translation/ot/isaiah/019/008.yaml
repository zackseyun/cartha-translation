id: ISA.19.8
reference: Isaiah 19:8
source:
  edition: WLC
  text: וְ/אָנוּ֙ הַ/דַּיָּגִ֔ים וְ/אָ֣בְל֔וּ כָּל מַשְׁלִיכֵ֥י בַ/יְא֖וֹר חַכָּ֑ה
    וּ/פֹרְשֵׂ֥י מִכְמֹ֛רֶת עַל פְּנֵי מַ֖יִם אֻמְלָֽלוּ־־־׃
translation:
  text: And the fishermen will lament, and all who cast a hook into the Nile will
    mourn; those who spread a net over the waters will waste away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the river'; in this Egyptian context, the Hebrew term commonly refers
      specifically to the Nile.
    reason: lexical_alternative
  - marker: b
    text: Or 'will languish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָנוּ
  chosen: And ... will lament
  alternatives:
  - and they will groan
  - and they will mourn
  lexicon: HALOT
  rationale: The verb denotes lamenting or sighing in grief. Rendered with future
    'will lament' to fit the prophetic context and paired naturally with the following
    subject in English.
- source_word: הַדַּיָּגִים
  chosen: the fishermen
  alternatives:
  - the fishers
  lexicon: HALOT
  rationale: Refers to those engaged in fishing. 'Fishermen' is idiomatic modern English
    and best matches the occupational sense.
- source_word: וְאָבְלוּ
  chosen: will mourn
  alternatives:
  - will lament
  - will grieve
  lexicon: HALOT
  rationale: The verb אבל commonly expresses mourning. Using 'mourn' here gives slight
    variation from the previous verb while preserving the parallel grief imagery.
- source_word: כָּל מַשְׁלִיכֵי
  chosen: all who cast
  alternatives:
  - all the casters
  - everyone casting
  lexicon: HALOT
  rationale: The participial construction identifies a class of people by their activity.
    'All who cast' is natural English and preserves the ongoing occupational sense.
- source_word: בַיְאֹר
  chosen: into the Nile
  alternatives:
  - into the river
  - into the canal
  lexicon: HALOT
  rationale: In Isaiah's Egypt oracle, יְאֹר refers specifically to the Nile or Nile
    channels. 'The Nile' makes the referent explicit for English readers and fits
    the Egyptian setting.
- source_word: חַכָּה
  chosen: a hook
  alternatives:
  - a fishhook
  - an angle
  lexicon: HALOT
  rationale: The noun denotes a fishing hook. 'A hook' is concise and sufficient in
    context, since fishing is already explicit.
- source_word: וּפֹרְשֵׂי
  chosen: those who spread
  alternatives:
  - those who stretch out
  - those who cast out
  lexicon: HALOT
  rationale: The participle describes people spreading out fishing equipment. 'Those
    who spread' is the most natural English equivalent in this context.
- source_word: מִכְמֹרֶת
  chosen: a net
  alternatives:
  - a dragnet
  - a fishing net
  lexicon: HALOT
  rationale: The noun refers to a net used for catching fish. 'Net' is clear and idiomatic;
    the more specific 'dragnet' is possible but not required by the immediate context.
- source_word: עַל פְּנֵי מַיִם
  chosen: over the waters
  alternatives:
  - upon the surface of the waters
  - on the face of the waters
  lexicon: HALOT
  rationale: The idiom literally means 'upon the face of the waters.' 'Over the waters'
    preserves the image in readable modern English.
- source_word: אֻמְלָלוּ
  chosen: will waste away
  alternatives:
  - will languish
  - will droop
  lexicon: HALOT
  rationale: The passive verb conveys withering, languishing, or becoming feeble.
    'Will waste away' communicates the severity of their collapse, likely economic
    and emotional, in vivid but natural English.
