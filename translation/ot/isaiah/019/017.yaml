id: ISA.19.17
reference: Isaiah 19:17
source:
  edition: WLC
  text: וְ֠/הָיְתָה אַדְמַ֨ת יְהוּדָ֤ה לְ/מִצְרַ֨יִם֙ לְ/חָגָּ֔א כֹּל֩ אֲשֶׁ֨ר יַזְכִּ֥יר
    אֹתָ֛/הּ אֵלָ֖י/ו יִפְחָ֑ד מִ/פְּנֵ֗י עֲצַת֙ יְהוָ֣ה צְבָא֔וֹת אֲשֶׁר ה֖וּא יוֹעֵ֥ץ
    עָלָֽי/ו־׃ס
translation:
  text: And the land of Judah will become a terror to Egypt; everyone to whom it is
    mentioned will fear because of the plan of the LORD of Armies that he is planning
    against it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a dread,' 'a horror,' or according to another interpretive tradition,
      'reeling.' The Hebrew term is rare and difficult.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'everyone to whom it is mentioned'; the wording means that any mention
      of Judah will make an Egyptian afraid.
    reason: lexical_alternative
  - marker: c
    text: 'Traditional rendering: ''the LORD of Hosts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אַדְמַת יְהוּדָה
  chosen: the land of Judah
  alternatives:
  - the soil of Judah
  - the ground of Judah
  lexicon: HALOT
  rationale: אַדְמָה can denote ground/land; in geopolitical context with Egypt and
    Judah, 'land of Judah' is the most natural English rendering.
- source_word: לְמִצְרַיִם
  chosen: to Egypt
  alternatives:
  - for Egypt
  lexicon: HALOT
  rationale: 'The preposition ל marks relation/result here: Judah becomes something
    ''to Egypt,'' i.e., in Egypt''s perception or experience.'
- source_word: לְחָגָּא
  chosen: a terror
  alternatives:
  - a dread
  - a horror
  - reeling
  lexicon: HALOT
  rationale: The noun is difficult and has been rendered variously. In context, the
    following clause emphasizes fear, so 'a terror' best captures the effect on Egypt.
    'Reeling' reflects a different interpretive tradition but is less transparent
    from the immediate context.
- source_word: כֹּל אֲשֶׁר יַזְכִּיר אֹתָהּ אֵלָיו
  chosen: everyone to whom it is mentioned
  alternatives:
  - everyone who mentions it to him
  - everyone to whom one mentions it
  lexicon: HALOT
  rationale: 'The Hebrew construction is somewhat compressed. Given the singular pronominal
    suffix אֵלָיו with generic force after כֹּל, the sense is distributive: any person
    hearing mention of Judah will fear. This English phrasing preserves that sense
    without awkward literalism.'
- source_word: יִפְחָד
  chosen: will fear
  alternatives:
  - will be afraid
  - will tremble
  lexicon: HALOT
  rationale: A straightforward rendering of פחד in this context of dread.
- source_word: מִפְּנֵי עֲצַת
  chosen: because of the plan
  alternatives:
  - because of the counsel
  - before the plan
  lexicon: HALOT
  rationale: מִפְּנֵי here expresses cause ('because of, on account of'). עֵצָה can
    be 'counsel' or 'plan'; 'plan' fits the context of divine intention against Egypt.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather
    than transliterated; 'of Armies' is more transparent in modern English than the
    traditional 'of Hosts,' while preserving the martial/cosmic force.
- source_word: אֲשֶׁר הוּא יוֹעֵץ עָלָיו
  chosen: that he is planning against it
  alternatives:
  - which he has planned against it
  - that he purposes against it
  - that he is counseling against it
  lexicon: HALOT
  rationale: The participle יוֹעֵץ conveys ongoing/intended action. 'Planning against
    it' communicates deliberate hostile intent. The final suffix refers to Egypt,
    so 'it' is appropriate.
