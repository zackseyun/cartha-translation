theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton, preserving
    reverential convention and broad English Bible recognizability.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering צְבָאוֹת
  chosen_reading: of Armies
  alternative_readings:
  - of Hosts
  rationale: This translates the title's meaning into clear modern English while retaining
    its force. 'Hosts' is traditional but less immediately intelligible to contemporary
    readers.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
