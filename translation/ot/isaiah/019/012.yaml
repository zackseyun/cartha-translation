id: ISA.19.12
reference: Isaiah 19:12
source:
  edition: WLC
  text: אַיָּ/ם֙ אֵפ֣וֹא חֲכָמֶ֔י/ךָ וְ/יַגִּ֥ידוּ נָ֖א לָ֑/ךְ וְ/יֵ֣דְע֔וּ מַה יָּעַ֛ץ
    יְהוָ֥ה צְבָא֖וֹת עַל מִצְרָֽיִם־־׃
translation:
  text: Where, then, are your wise men? Let them tell you, please; let them know what
    the LORD of Armies has purposed against Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the LORD of hosts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיָּם
  chosen: Where ... are
  alternatives:
  - Where are they
  - Where indeed are
  lexicon: HALOT
  rationale: Interrogative of location with enclitic plural form functioning idiomatically
    as 'where are ...?' in direct taunt. English smooths the idiom to natural word
    order.
- source_word: אֵפוֹא
  chosen: then
  alternatives:
  - now
  - indeed
  lexicon: HALOT
  rationale: Discourse particle adding emphasis/inference. 'Then' fits the rhetorical
    challenge better than the more archaic 'now' or overly emphatic 'indeed'.
- source_word: חֲכָמֶיךָ
  chosen: your wise men
  alternatives:
  - your sages
  - your wise ones
  lexicon: HALOT
  rationale: Refers to Egypt's counselors/magicians/intellectual elite. 'Wise men'
    is idiomatic and preserves the social role without over-specifying.
- source_word: וְיַגִּידוּ
  chosen: Let them tell
  alternatives:
  - and let them declare
  - let them report
  lexicon: HALOT
  rationale: Jussive/imprecatory nuance in a rhetorical challenge. 'Let them tell'
    is concise, natural English and preserves the force of the cohortative challenge.
- source_word: נָא
  chosen: please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: Particle of entreaty or rhetorical urging. Here it sharpens the taunt;
    'please' best captures the pragmatic force in contemporary English.
- source_word: וְיֵדְעוּ
  chosen: let them know
  alternatives:
  - let them understand
  - let them discern
  lexicon: HALOT
  rationale: Qal jussive of ידע. In context it is parallel to 'let them tell you'
    and introduces comprehension of YHWH's plan. 'Know' is the most direct rendering.
- source_word: מַה יָּעַץ
  chosen: what ... has purposed
  alternatives:
  - what ... has planned
  - what ... has counseled/decreed
  lexicon: HALOT
  rationale: The verb יעץ in this context denotes forming a plan/counsel. Perfect
    aspect is well represented by 'has purposed,' which carries deliberateness and
    suits divine intention.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the stated translation policy.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  lexicon: HALOT
  rationale: The title denotes heavenly/military forces. 'Armies' is more transparent
    in modern English than traditional 'hosts' while preserving the martial sense.
- source_word: עַל מִצְרַיִם
  chosen: against Egypt
  alternatives:
  - concerning Egypt
  - upon Egypt
  lexicon: HALOT
  rationale: With יעץ, על can mean planning concerning or against. In this judgment
    context, 'against Egypt' best reflects the hostile force of the announced divine
    purpose.
