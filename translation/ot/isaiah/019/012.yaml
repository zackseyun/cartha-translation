theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering יְהוָה צְבָאוֹת
  chosen_reading: Yahweh of Armies
  alternative_readings:
  - the LORD of hosts
  rationale: The title is translated rather than transliterated, in keeping with the philosophy of preserving meaning in titles. 'Armies' communicates the sense of צבאות more clearly to modern readers than 'hosts.'
