theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.' This also aligns with the prophetic register and broader translation
    consistency.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering יְהוָה צְבָאוֹת
  chosen_reading: the LORD of Armies
  alternative_readings:
  - the LORD of hosts
  rationale: The title is translated rather than transliterated, in keeping with the
    philosophy of preserving meaning in titles. 'Armies' communicates the sense of
    צבאות more clearly to modern readers than 'hosts.'
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
