theological_decisions:
- issue: Agency of divine judgment through the 'spirit of confusion'
  chosen_reading: The verse is rendered to show that the LORD actively places a disorienting spirit within Egypt as an act of judgment, without specifying a later systematic category such as direct causation versus permission beyond what the Hebrew states.
  alternative_readings:
  - The LORD has permitted confusion to arise within Egypt
  - The LORD has poured out a spirit of dizziness within Egypt
  rationale: The Hebrew explicitly attributes the action to YHWH with the verb 'has mixed.' The translation preserves that strong agency while avoiding theological over-explanation not present in the text.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Referent of the plural verb 'they have led astray'
  chosen_reading: The plural is preserved in English as 'they have led Egypt astray' rather than being smoothed into a singular impersonal construction.
  alternative_readings:
  - it has led Egypt astray
  - Egypt has been led astray
  rationale: The Masoretic text has a 3rd person plural verb. Although the exact subject is somewhat compressed in Hebrew poetry, preserving the plural best reflects the source text and leaves the ambiguity intact.
  doctrine_reference: 'Translation philosophy #3'
