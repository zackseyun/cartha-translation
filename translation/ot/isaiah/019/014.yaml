id: ISA.19.14
reference: Isaiah 19:14
source:
  edition: WLC
  text: יְהוָ֛ה מָסַ֥ךְ בְּ/קִרְבָּ֖/הּ ר֣וּחַ עִוְעִ֑ים וְ/הִתְע֤וּ אֶת מִצְרַ֨יִם֙ בְּ/כָֽל מַעֲשֵׂ֔/הוּ כְּ/הִתָּע֥וֹת שִׁכּ֖וֹר בְּ/קִיאֽ/וֹ־־׃
translation:
  text: Yahweh has mixed within her a spirit of confusion, and they have led Egypt astray in all its work, as a drunkard staggers in his vomit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a spirit of distortion,' 'a spirit of perversity,' or 'a spirit of dizziness.' The Hebrew expression denotes a disorienting, twisting influence sent in judgment.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew verb is plural: ''and they have led Egypt astray.'' The subject is not explicitly identified in English; it may refer to the confusing influences or to Egypt''s leaders under that influence.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מָסַךְ
  chosen: has mixed
  alternatives:
  - has poured out
  - has mingled
  lexicon: HALOT
  rationale: The verb מסך commonly carries the sense of mixing or mingling liquids; here it metaphorically describes YHWH placing a corrupting influence within Egypt. 'Has mixed' preserves the concrete imagery better than the more interpretive 'poured out.'
- source_word: בְּקִרְבָּהּ
  chosen: within her
  alternatives:
  - in her midst
  - within it
  lexicon: HALOT
  rationale: The feminine singular suffix refers back to Egypt as a land/nation, which Hebrew often treats as feminine. 'Within her' is natural English while preserving the feminine pronominal reference.
- source_word: רוּחַ עִוְעִים
  chosen: a spirit of confusion
  alternatives:
  - a spirit of distortion
  - a spirit of perversity
  - a spirit of dizziness
  lexicon: HALOT
  rationale: רוּחַ here denotes an animating disposition or influence. עִוְעִים comes from a root associated with twisting, distortion, or perversion, and in context describes disorienting judgment. 'Confusion' best communicates the resulting state in readable English without over-specifying a moral nuance.
- source_word: וְהִתְעוּ
  chosen: and they have led astray
  alternatives:
  - and they have made wander
  - and they have caused to err
  lexicon: HALOT
  rationale: The plural verb naturally takes the immediately preceding plural idea 'confusions/distortions' or the implied leaders as subject; idiomatic English renders the causative sense as 'have led astray.'
- source_word: אֶת מִצְרַיִם
  chosen: Egypt
  rationale: Direct object of the verb; rendered straightforwardly as the nation name.
- source_word: בְּכָל מַעֲשֵׂהוּ
  chosen: in all its work
  alternatives:
  - in all its deeds
  - in all it does
  - in all his work
  lexicon: HALOT
  rationale: מַעֲשֶׂה can mean work, deed, or activity. Here it refers comprehensively to Egypt's undertakings. The 3ms suffix is most naturally taken collectively of Egypt, rendered as English neuter 'its' for the nation.
- source_word: כְּהִתָּעוֹת
  chosen: as ... staggers
  alternatives:
  - as ... reels
  - like the wandering of
  lexicon: HALOT
  rationale: The infinitive construct with כ compares Egypt's erring to the erratic movement of a drunkard. In English, an explicit finite verb is needed for natural style; 'staggers' captures the simile's motion and loss of control.
- source_word: שִׁכּוֹר
  chosen: a drunkard
  alternatives:
  - a drunken man
  - one who is drunk
  lexicon: HALOT
  rationale: The adjective/substantive denotes a drunk person. 'Drunkard' is concise and idiomatic in a proverbial simile.
- source_word: בְּקִיאוֹ
  chosen: in his vomit
  alternatives:
  - in his vomit-filth
  lexicon: HALOT
  rationale: The noun denotes vomit. The graphic image should be preserved rather than softened, since it intensifies the humiliation and disorientation of the simile.
