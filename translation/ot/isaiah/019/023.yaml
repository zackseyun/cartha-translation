id: ISA.19.23
reference: Isaiah 19:23
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא תִּהְיֶ֨ה מְסִלָּ֤ה מִ/מִּצְרַ֨יִם֙ אַשּׁ֔וּרָ/ה וּ/בָֽא
    אַשּׁ֥וּר בְּ/מִצְרַ֖יִם וּ/מִצְרַ֣יִם בְּ/אַשּׁ֑וּר וְ/עָבְד֥וּ מִצְרַ֖יִם אֶת
    אַשּֽׁוּר־־׃ס
translation:
  text: In that day there will be a highway from Egypt to Assyria, and Assyria will
    come into Egypt, and Egypt into Assyria; and Egypt will worship with Assyria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and Egypt will serve Assyria.' The Hebrew syntax can
      be read this way, though the broader context favors the sense that Egypt joins
      Assyria in worship/service of God.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew is elliptical in the second half of the line: ''and Egypt into Assyria,''
      that is, ''and Egypt will come into Assyria.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מְסִלָּה
  chosen: highway
  alternatives:
  - road
  - causeway
  lexicon: HALOT
  rationale: מְסִלָּה commonly denotes a raised road or highway. 'Highway' is the
    established and natural English equivalent here, preserving the image of open
    connection between nations.
- source_word: מִ/מִּצְרַיִם ... אַשּׁוּרָה
  chosen: from Egypt to Assyria
  alternatives:
  - from Egypt toward Assyria
  - from Egypt into Assyria
  lexicon: HALOT
  rationale: The prepositions mark direction from Egypt toward Assyria. 'From Egypt
    to Assyria' is idiomatic English and fits the image of an international route.
- source_word: וּ/בָא אַשּׁוּר בְּ/מִצְרַיִם
  chosen: and Assyria will come into Egypt
  alternatives:
  - and Assyria will enter Egypt
  lexicon: HALOT
  rationale: בוא with ב marks movement into a place. 'Come into' is slightly more
    literal than 'enter' while remaining natural.
- source_word: וּ/מִצְרַיִם בְּ/אַשּׁוּר
  chosen: and Egypt into Assyria
  alternatives:
  - and Egypt will come into Assyria
  - and Egypt will enter Assyria
  lexicon: HALOT
  rationale: The verb 'will come' is naturally carried over elliptically from the
    previous clause in Hebrew. The shorter English preserves the parallelism, though
    the sense is 'Egypt will come into Assyria.'
- source_word: וְ/עָבְדוּ
  chosen: will worship
  alternatives:
  - will serve
  - will serve in worship
  lexicon: HALOT
  rationale: עבד can mean 'serve' broadly, but in this prophetic context of nations
    turning in relation to God, many understand cultic/religious service. 'Will worship'
    best conveys the likely sense in context, while the alternative is preserved in
    a footnote because the object is Assyria in the immediate syntax.
- source_word: מִצְרַיִם אֶת אַשּׁוּר
  chosen: Egypt will worship with Assyria
  alternatives:
  - Egypt will serve Assyria
  - Egypt will worship Assyria
  lexicon: HALOT
  rationale: Although אֶת normally marks a direct object, the broader context (vv.
    24-25 and the reconciliation theme of the verse) strongly disfavors 'serve Assyria'
    as political subjugation and especially 'worship Assyria.' The phrase is best
    taken in the sense that Egypt joins Assyria in service/worship of God. 'With Assyria'
    makes the contextual sense explicit in readable English, while preserving the
    more literal alternatives in a footnote.
