theological_decisions:
- issue: Meaning of וְעָבְדוּ מִצְרַיִם אֶת אַשּׁוּר
  chosen_reading: Egypt will worship with Assyria
  alternative_readings:
  - Egypt will serve Assyria
  - Egypt will worship Assyria
  rationale: The immediate Hebrew syntax could suggest Assyria as the direct object,
    but the larger oracle envisions Egypt and Assyria jointly blessed by the LORD
    rather than one nation subordinated to or venerating the other. To preserve theological
    tension without importing an implausible meaning, the main text reflects joint
    worship/service, and the more literal syntactic possibilities are preserved in
    a footnote.
  doctrine_reference: Translation philosophy §3; §5
