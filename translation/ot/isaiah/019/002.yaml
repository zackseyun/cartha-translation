theological_decisions:
- issue: Rendering the collective proper noun מִצְרַיִם in a civil-conflict context
  chosen_reading: Egyptians against Egyptians
  alternative_readings:
  - Egypt against Egypt
  rationale: The Hebrew literally repeats the national name, but the context immediately
    describes interpersonal and inter-political conflict within the nation. Rendering
    it as 'Egyptians against Egyptians' makes explicit the internal strife implied
    by the Hebrew collective. This is a translational, not doctrinal, decision.
  doctrine_reference: Translation philosophy §1, §6
- issue: Distributive force of אִישׁ
  chosen_reading: each ... each
  alternative_readings:
  - a man ... and a man
  rationale: The verse depicts widespread internal conflict at the individual level.
    Using 'each' preserves the distributive sense in readable modern English without
    importing gender-neutral ideology beyond the source; the masculine form is not
    semantically focused on maleness in this construction.
  doctrine_reference: Translation philosophy §4, §6
