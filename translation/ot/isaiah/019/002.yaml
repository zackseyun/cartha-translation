id: ISA.19.2
reference: Isaiah 19:2
source:
  edition: WLC
  text: וְ/סִכְסַכְתִּ֤י מִצְרַ֨יִם֙ בְּ/מִצְרַ֔יִם וְ/נִלְחֲמ֥וּ אִישׁ בְּ/אָחִ֖י/ו
    וְ/אִ֣ישׁ בְּ/רֵעֵ֑/הוּ עִ֣יר בְּ/עִ֔יר מַמְלָכָ֖ה בְּ/מַמְלָכָֽה־׃
translation:
  text: I will stir up Egyptians against Egyptians, and each will fight against his
    brother, and each against his neighbor, city against city, kingdom against kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Egypt against Egypt'; the translation makes explicit
      that the sense is Egyptians in internal conflict.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will incite Egypt against Egypt.'
    reason: alternative_reading
lexical_decisions:
- source_word: סִכְסַכְתִּי
  chosen: I will stir up
  alternatives:
  - I will incite
  - I will provoke
  - I will set in conflict
  lexicon: HALOT
  rationale: The verb conveys causing internal strife or setting parties against one
    another. 'Stir up' is idiomatic modern English that preserves the causative sense
    without over-paraphrasing. 'Incite' is possible but can sound narrower or more
    psychologically focused than the broader political-social turmoil in context.
- source_word: מִצְרַיִם
  chosen: Egyptians
  alternatives:
  - Egypt
  - Egyptian
  lexicon: HALOT
  rationale: Although the proper noun is 'Egypt,' the construction 'Egypt against
    Egypt' in English can sound abstract. Given the following plural conflict language
    ('they will fight') and the sense of civil strife among the people, 'Egyptians
    against Egyptians' best communicates the intended referent while remaining faithful
    to the Hebrew collective usage.
- source_word: בְּמִצְרַיִם
  chosen: against Egyptians
  alternatives:
  - against Egypt
  lexicon: HALOT
  rationale: The preposition with the repeated national name marks opposition. Rendering
    the second occurrence also as 'Egyptians' keeps the civil-war sense explicit in
    natural English.
- source_word: וְנִלְחֲמוּ
  chosen: and each will fight
  alternatives:
  - and they will fight
  - and they will wage war
  lexicon: HALOT
  rationale: The verb is plural, 'they will fight,' but the following distributive
    singulars ('a man against his brother ... a man against his neighbor') unpack
    the plural into individual participants. 'Each will fight' brings out that distributive
    force in smooth English.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - a man
  - one
  lexicon: HALOT
  rationale: Hebrew איש here functions distributively rather than emphasizing maleness.
    'Each' is the most natural English equivalent in this construction and avoids
    an awkwardly repetitive 'a man ... and a man ...' while preserving the sense.
- source_word: בְּאָחִיו
  chosen: against his brother
  alternatives:
  - against his kinsman
  lexicon: HALOT
  rationale: '''Brother'' is the plain lexical sense and preserves the familial imagery
    of social breakdown. A broader rendering like ''kinsman'' weakens the force of
    the image.'
- source_word: בְּרֵעֵהוּ
  chosen: against his neighbor
  alternatives:
  - against his companion
  - against his friend
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor depending on context. Here
    the progression from family to wider society is well captured by 'neighbor,' highlighting
    expanding social disintegration.
- source_word: עִיר בְּעִיר
  chosen: city against city
  alternatives:
  - one city against another city
  lexicon: HALOT
  rationale: A concise literal rendering preserves the escalating pattern from individuals
    to civic units.
- source_word: מַמְלָכָה בְּמַמְלָכָה
  chosen: kingdom against kingdom
  alternatives:
  - realm against realm
  lexicon: HALOT
  rationale: '''Kingdom'' is the standard and most transparent rendering for מַמְלָכָה
    here, matching the political escalation in the verse.'
