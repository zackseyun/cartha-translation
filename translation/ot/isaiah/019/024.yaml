id: ISA.19.24
reference: Isaiah 19:24
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא יִהְיֶ֤ה יִשְׂרָאֵל֙ שְׁלִ֣ישִׁיָּ֔ה לְ/מִצְרַ֖יִם וּ/לְ/אַשּׁ֑וּר
    בְּרָכָ֖ה בְּ/קֶ֥רֶב הָ/אָֽרֶץ׃
translation:
  text: In that day Israel will be the third with Egypt and Assyria, a blessing in
    the midst of the earth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a blessing in the midst of the land.' The Hebrew אֶרֶץ can mean either
      'earth' or 'land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: In that day
  alternatives:
  - On that day
  - At that time
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'In that day' is idiomatic, readable,
    and preserves the eschatological/prophetic register without over-paraphrase.
- source_word: יִהְיֶה
  chosen: will be
  alternatives:
  - shall be
  lexicon: HALOT
  rationale: Simple future of היה. 'Will be' is contemporary English and fits the
    translation's readable modern style.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name retained by standard transliteration convention.
- source_word: שְׁלִישִׁיָּה
  chosen: the third
  alternatives:
  - a third
  - third
  lexicon: HALOT
  rationale: The feminine ordinal functions substantivally. In context, with Egypt
    and Assyria named alongside Israel, the sense is that Israel forms a third member
    of a triad. 'The third' best captures this relational sense in English.
- source_word: לְמִצְרַיִם וּלְאַשּׁוּר
  chosen: with Egypt and Assyria
  alternatives:
  - to Egypt and Assyria
  - along with Egypt and Assyria
  lexicon: HALOT
  rationale: Although ל often means 'to/for,' here after 'the third' it marks association
    within a group. 'With Egypt and Assyria' communicates that Israel stands as the
    third party alongside the other two nations.
- source_word: בְּרָכָה
  chosen: a blessing
  alternatives:
  - a source of blessing
  - blessing
  lexicon: HALOT
  rationale: Predicate/appositional noun describing the triad's role or status. 'A
    blessing' is the most direct rendering and preserves the covenantal resonance
    without adding words not in the text.
- source_word: בְּקֶרֶב הָאָרֶץ
  chosen: in the midst of the earth
  alternatives:
  - in the midst of the land
  - within the earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' Here the international scope of Egypt,
    Assyria, and Israel favors the broader 'earth' rather than a local 'land.' 'In
    the midst of' closely reflects בְּקֶרֶב.
