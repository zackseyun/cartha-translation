theological_decisions:
- issue: Scope of הָאָרֶץ
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: The verse envisions a three-nation blessing with broad international
    significance in context, so 'earth' better preserves the universal horizon. The
    alternative 'land' is lexically possible and worth preserving in a footnote.
  doctrine_reference: Translation philosophy §3, §5
