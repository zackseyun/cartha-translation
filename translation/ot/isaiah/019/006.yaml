id: ISA.19.6
reference: Isaiah 19:6
source:
  edition: WLC
  text: וְ/הֶאֶזְנִ֣יחוּ נְהָר֔וֹת דָּלֲל֥וּ וְ/חָרְב֖וּ יְאֹרֵ֣י מָצ֑וֹר קָנֶ֥ה וָ/ס֖וּף
    קָמֵֽלוּ׃
translation:
  text: The rivers will stink; the canals of Egypt will dwindle and dry up; reed and
    rush will wither.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The rivers will become foul.' The Hebrew verb is rare, and the sense
      is that the waterways become putrid or stink.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the canals of Matzor'; here 'Matzor' is best understood as a poetic
      name for Egypt.
    reason: lexical_alternative
  - marker: c
    text: Or 'papyrus' for 'rush.' The Hebrew term refers to marsh vegetation associated
      with riverbanks.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶאֶזְנִיחוּ
  chosen: will stink
  alternatives:
  - will become foul
  - will emit a stench
  lexicon: HALOT
  rationale: The rare Hiphil from זנח/אזנח in this context is commonly understood
    as causing a foul smell or becoming putrid, especially of waterways. 'Will stink'
    is concise, natural English and fits the judgment imagery. The conjunction is
    absorbed into English clause flow.
- source_word: נְהָרוֹת
  chosen: the rivers
  alternatives:
  - streams
  - watercourses
  lexicon: HALOT
  rationale: A straightforward rendering of the plural noun for rivers/streams. 'Rivers'
    best matches normal English usage here and pairs naturally with the following
    more specific term for canals.
- source_word: דָּלֲלוּ
  chosen: will dwindle
  alternatives:
  - will become low
  - will be reduced
  lexicon: HALOT
  rationale: The verb conveys becoming thin, weak, or low. For water levels, 'dwindle'
    idiomatically expresses reduction in volume without over-paraphrasing.
- source_word: וְחָרְבוּ
  chosen: dry up
  alternatives:
  - be dried up
  - become dry
  lexicon: HALOT
  rationale: The verb חרב commonly denotes drying up or becoming desolate. With waterways
    as subject, 'dry up' is the most natural English equivalent.
- source_word: יְאֹרֵי
  chosen: the canals
  alternatives:
  - the Nile channels
  - the streams
  lexicon: HALOT
  rationale: יְאֹר often refers especially to Nile-related channels in Egyptian contexts.
    'Canals' captures the Egyptian river-channel sense better than generic 'streams.'
- source_word: מָצוֹר
  chosen: of Egypt
  alternatives:
  - of Matzor
  - of siege
  lexicon: HALOT
  rationale: In this Isaianic context the term is widely taken as a poetic/rare designation
    for Egypt, not the common noun 'siege.' Rendering it 'of Egypt' makes the geographic
    reference clear in context.
- source_word: קָנֶה
  chosen: reed
  alternatives:
  - cane
  lexicon: HALOT
  rationale: The plant term refers to reed/cane vegetation typical of riverbanks.
    'Reed' is the more familiar and contextually precise English choice.
- source_word: וָסוּף
  chosen: rush
  alternatives:
  - papyrus
  - reeds
  lexicon: HALOT
  rationale: סוּף denotes marsh vegetation such as reeds/rushes; in paired plant imagery
    with קָנֶה, 'rush' preserves distinction between the two terms. 'Papyrus' is possible
    in Egyptian context but more interpretive.
- source_word: קָמֵלוּ
  chosen: will wither
  alternatives:
  - will dry up
  - will shrivel
  lexicon: HALOT
  rationale: The verb denotes withering or fading, especially of vegetation. 'Will
    wither' fits the plant subjects and avoids redundancy with the earlier 'dry up'
    for waterways.
