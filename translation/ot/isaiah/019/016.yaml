theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the Tetragrammaton as 'the LORD,' following
    the stated doctrine and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering צְבָאוֹת
  chosen_reading: of Armies
  alternative_readings:
  - of Hosts
  rationale: This is not a doctrinal dispute but a translation-philosophy choice.
    'Of Armies' makes the Hebrew sense more transparent in contemporary English while
    retaining the title's force in a judgment context.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Preserving the simile 'like women'
  chosen_reading: like women
  alternative_readings:
  - fearful like women
  rationale: The text uses a gendered simile rooted in the ancient context. The translation
    preserves the source wording rather than softening or explaining it in the main
    text. Any cultural sensitivity is better handled in a footnote than by altering
    the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
