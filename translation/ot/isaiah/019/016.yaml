id: ISA.19.16
reference: Isaiah 19:16
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֔וּא יִֽהְיֶ֥ה מִצְרַ֖יִם כַּ/נָּשִׁ֑ים וְ/חָרַ֣ד וּ/פָחַ֗ד
    מִ/פְּנֵי֙ תְּנוּפַת֙ יַד יְהוָ֣ה צְבָא֔וֹת אֲשֶׁר ה֖וּא מֵנִ֥יף עָלָֽי/ו׀־־׃
translation:
  text: In that day Egypt will be like women, trembling and afraid because of the
    waving of the hand of the LORD of Armies, which he waves against it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD of Hosts.'
    reason: lexical_alternative
  - marker: b
    text: The simile 'like women' reflects ancient wartime imagery of vulnerability
      and fear; the Hebrew explicitly uses 'women.'
    reason: cultural_note
  - marker: c
    text: Or 'the brandishing of the hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: In that day
  alternatives:
  - On that day
  lexicon: HALOT
  rationale: Standard temporal prophetic formula. 'In that day' is idiomatic in English
    and preserves the eschatological/prophetic cadence.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: The nation is personified as a singular entity in context, so 'Egypt'
    is the natural rendering.
- source_word: כַּנָּשִׁים
  chosen: like women
  alternatives:
  - like females
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'women.' Per gender-accurate policy, the feminine
    term should be preserved rather than neutralized. The simile reflects ancient
    cultural assumptions about fearfulness in wartime and should not be paraphrased
    away.
- source_word: וְחָרַד וּפָחַד
  chosen: trembling and afraid
  alternatives:
  - and it will tremble and fear
  - and it will shudder and be in dread
  lexicon: HALOT
  rationale: The paired verbs intensify Egypt's fear response. 'Trembling and afraid'
    is readable modern English that preserves the twofold expression without awkward
    repetition.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from before
  - at the presence of
  lexicon: HALOT
  rationale: Here the preposition introduces the cause of fear. 'Because of' communicates
    the causal force clearly in English.
- source_word: תְּנוּפַת יַד
  chosen: the waving of the hand
  alternatives:
  - the brandishing of the hand
  - the shaking of the hand
  lexicon: HALOT
  rationale: The noun from נוף denotes a waving or brandishing motion. 'Waving of
    the hand' keeps the concrete image and matches the following participle from the
    same root.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather
    than merely traditionalized; 'of Armies' is more transparent to modern readers
    than 'of Hosts,' while preserving the martial sense.
- source_word: אֲשֶׁר הוּא מֵנִיף עָלָיו
  chosen: which he waves against it
  alternatives:
  - that he brandishes against it
  - which he is waving over it
  lexicon: HALOT
  rationale: The relative clause resumes the hand-motion image. 'Against it' fits
    the hostile context of judgment better than a neutral 'over it.' The pronoun refers
    back to Egypt as a singular nation, hence 'it.'
