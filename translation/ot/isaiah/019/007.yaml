id: ISA.19.7
reference: Isaiah 19:7
source:
  edition: WLC
  text: עָר֥וֹת עַל יְא֖וֹר עַל פִּ֣י יְא֑וֹר וְ/כֹל֙ מִזְרַ֣ע יְא֔וֹר יִיבַ֥שׁ נִדַּ֖ף
    וְ/אֵינֶֽ/נּוּ־־׃
translation:
  text: The reeds along the Nile, along the bank of the Nile, and every sown field
    of the Nile will dry up, be driven away, and be no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The bare places/meadows along the Nile.' The Hebrew word עָרוֹת is uncertain
      in this context; the translation 'reeds' reflects the riverbank vegetation sense
      suggested by the surrounding phrases.
    reason: lexical_alternative
  - marker: b
    text: Hebrew יְאֹר can mean 'river' or 'canal,' but in this Egypt context it refers
      to the Nile.
    reason: cultural_note
  - marker: c
    text: Or 'all that is sown by the Nile.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרוֹת
  chosen: the reeds
  alternatives:
  - bare places
  - meadows
  - pastures
  - plants by the river
  lexicon: HALOT
  rationale: The noun is difficult and context-bound. In this judgment oracle about
    the Nile drying up, the immediate parallel phrases 'along the Nile' and 'along
    the bank of the Nile' favor vegetation growing by the river rather than abstract
    'bare places.' 'Reeds' captures likely riverbank growth in accessible English,
    while preserving the ecological sense of the verse.
- source_word: יְאֹר
  chosen: the Nile
  alternatives:
  - the river
  - canal
  lexicon: HALOT
  rationale: In Isaiah's Egypt oracle, יְאֹר refers specifically to the Nile system
    rather than a generic river. Rendering it as 'the Nile' makes the referent explicit
    for English readers and fits the Egyptian setting.
- source_word: עַל פִּי יְאֹר
  chosen: along the bank of the Nile
  alternatives:
  - at the mouth of the Nile
  - on the edge of the Nile
  lexicon: HALOT
  rationale: פֶּה literally means 'mouth,' but in spatial idiom with a watercourse
    it commonly denotes the edge or bank. 'Along the bank of the Nile' is the most
    natural English rendering in this context.
- source_word: מִזְרַע יְאֹר
  chosen: every sown field of the Nile
  alternatives:
  - every seed of the Nile
  - every sowing-place by the Nile
  - all that is sown by the Nile
  lexicon: HALOT
  rationale: מִזְרַע can denote seed or what is sown. Here the following verbs describe
    agricultural devastation, so the phrase points to cultivated land/crops associated
    with the Nile. 'Every sown field of the Nile' communicates the agricultural sense
    clearly.
- source_word: יִיבַשׁ
  chosen: will dry up
  alternatives:
  - will wither
  lexicon: HALOT
  rationale: The basic sense is becoming dry. 'Will dry up' fits both vegetation and
    cultivated land in the context of the Nile's failure.
- source_word: נִדַּף
  chosen: be driven away
  alternatives:
  - be blown away
  - be scattered
  lexicon: HALOT
  rationale: The passive/niphal form conveys being driven or blown off. 'Be driven
    away' is broad enough to cover wind-swept vegetation or chaff-like disappearance,
    while preserving the sequence after drying up.
- source_word: וְאֵינֶנּוּ
  chosen: and be no more
  alternatives:
  - and it will not exist
  - and it is gone
  lexicon: HALOT
  rationale: The idiom expresses disappearance/nonexistence. 'Be no more' is idiomatic
    English that preserves the finality of the Hebrew.
