id: ISA.19.4
reference: Isaiah 19:4
source:
  edition: WLC
  text: וְ/סִכַּרְתִּי֙ אֶת מִצְרַ֔יִם בְּ/יַ֖ד אֲדֹנִ֣ים קָשֶׁ֑ה וּ/מֶ֤לֶךְ עַז֙ יִמְשָׁל בָּ֔/ם נְאֻ֥ם הָ/אָד֖וֹן יְהוָ֥ה צְבָאֽוֹת־־׃
translation:
  text: I will give Egypt into the hand of a harsh master, and a fierce king will rule over them, declares the Lord, Yahweh of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will hand Egypt over into the power of a harsh master.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a harsh master'; the noun is morphologically plural ('lords') but likely functions here as a singular of majesty or intensity, as reflected by the following singular 'king.'
    reason: lexical_alternative
  - marker: c
    text: 'Traditional rendering: ''the Lord GOD of Hosts.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְסִכַּרְתִּי
  chosen: I will give
  alternatives:
  - I will deliver
  - I will hand over
  lexicon: HALOT
  rationale: The verb here conveys handing Egypt over into another's power. 'I will give' is a natural English rendering that preserves the causative sense without overinterpreting the mechanism. 'Hand over' is possible but slightly more idiomatic than needed in the main text.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - to the control of
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for being delivered into someone's power. Retaining 'hand' preserves the imagery and remains clear in English.
- source_word: אֲדֹנִים קָשֶׁה
  chosen: a harsh master
  alternatives:
  - hard lord
  - cruel master
  - harsh lords
  lexicon: HALOT
  rationale: Although אֲדֹנִים is morphologically plural, it commonly functions as a singular of majesty or intensity in reference to a single ruler/master in context, especially since the following clause has singular 'king' and singular verb forms. 'Master' fits the human ruler sense better than 'lord' here, avoiding confusion with divine titles. 'Harsh' captures קָשֶׁה well in context.
- source_word: וּמֶלֶךְ עַז
  chosen: and a fierce king
  alternatives:
  - and a strong king
  - and a mighty king
  lexicon: HALOT
  rationale: עַז can denote strength, might, or fierceness. In a judgment context paired with 'harsh master,' 'fierce' best conveys oppressive severity rather than merely political strength.
- source_word: יִמְשָׁל בָּם
  chosen: will rule over them
  alternatives:
  - will govern them
  - will dominate them
  lexicon: HALOT
  rationale: '''Rule over them'' is the most direct and standard rendering of משל with ב. It preserves the political sense without adding interpretive force.'
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: In prophetic formulae, 'declares' is idiomatic modern English and preserves the solemn authority of the speech formula.
- source_word: הָאָדוֹן
  chosen: the Lord
  alternatives:
  - the Master
  - the Sovereign
  lexicon: HALOT
  rationale: With the article and in apposition to the divine name, this title is best rendered 'the Lord.' 'Master' would be possible lexically but is less idiomatic in English prophetic formulae and could blur the distinction from the human 'master' earlier in the verse.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of Hosts
  lexicon: HALOT
  rationale: '''Armies'' translates the underlying military sense more transparently for modern readers than the traditional but opaque ''Hosts.'''
