id: ISA.58.13
reference: Isaiah 58:13
source:
  edition: WLC
  text: אִם תָּשִׁ֤יב מִ/שַּׁבָּת֙ רַגְלֶ֔/ךָ עֲשׂ֥וֹת חֲפָצֶ֖י/ךָ בְּ/י֣וֹם קָדְשִׁ֑/י וְ/קָרָ֨אתָ לַ/שַּׁבָּ֜ת עֹ֗נֶג לִ/קְד֤וֹשׁ יְהוָה֙ מְכֻבָּ֔ד וְ/כִבַּדְתּ/וֹ֙ מֵ/עֲשׂ֣וֹת דְּרָכֶ֔י/ךָ מִ/מְּצ֥וֹא חֶפְצְ/ךָ֖ וְ/דַבֵּ֥ר דָּבָֽר־׃
translation:
  text: If you turn back your foot from the Sabbath, from doing your own pleasure on my holy day, and call the Sabbath a delight, the holy thing of Yahweh honorable, and honor it by not going your own ways, nor seeking your own pleasure, nor speaking a word,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and honor him,' taking the pronoun as referring to the LORD rather than to the Sabbath.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'nor speaking a word'; this may mean refraining from ordinary, self-serving, or idle speech.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'your own pleasure' can also mean 'your own desire' or, in context, 'your own business.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּשִׁיב
  chosen: turn back
  alternatives:
  - hold back
  - turn away
  lexicon: HALOT
  rationale: Hiphil of שוב here has the sense of causing one's foot to turn back/refrain. 'Turn back' preserves the concrete metaphor while remaining natural English.
- source_word: מִשַּׁבָּת רַגְלֶךָ
  chosen: your foot from the Sabbath
  alternatives:
  - your foot on the Sabbath
  - your foot because of the Sabbath
  lexicon: HALOT
  rationale: The idiom likely means refraining from trampling on or violating the Sabbath. Keeping the literal 'foot from the Sabbath' preserves the Hebrew imagery rather than flattening it into an abstract paraphrase.
- source_word: עֲשׂוֹת חֲפָצֶיךָ
  chosen: from doing your own pleasure
  alternatives:
  - from doing what pleases you
  - from pursuing your own business
  lexicon: HALOT
  rationale: חפץ denotes delight, pleasure, desire, or matter/business depending on context. In this verse, repeated use with Sabbath observance suggests personal pursuits or self-chosen pleasure. 'Doing your own pleasure' keeps the lexical link with later חפצך while remaining intelligible.
- source_word: בְּיוֹם קָדְשִׁי
  chosen: on my holy day
  alternatives:
  - on the day holy to me
  lexicon: HALOT
  rationale: Straightforward possessive construction; 'my holy day' is natural and preserves the divine claim over the Sabbath.
- source_word: וְקָרָאתָ לַשַּׁבָּת עֹנֶג
  chosen: call the Sabbath a delight
  alternatives:
  - call the Sabbath delightful
  - proclaim the Sabbath a delight
  lexicon: HALOT
  rationale: עֹנֶג means delight/pleasure. The construction 'call X Y' is well represented by 'call the Sabbath a delight.'
- source_word: לִקְדוֹשׁ יְהוָה מְכֻבָּד
  chosen: the holy day of the LORD honorable
  alternatives:
  - the LORD's holy day honorable
  - the holy thing of the LORD honored
  lexicon: HALOT
  rationale: The phrase is compressed Hebrew. It most naturally apposes the Sabbath as 'the holy day of the LORD' and predicates 'honorable' of it. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְכִבַּדְתּוֹ
  chosen: and honor it
  alternatives:
  - and honor him
  lexicon: HALOT
  rationale: The 3ms suffix could grammatically refer to the Sabbath/holy day rather than directly to the LORD. In context, honoring the Sabbath as the LORD's holy day is the clearest reading. The alternative is worth preserving because the antecedent can be heard as the LORD.
- source_word: מֵעֲשׂוֹת דְּרָכֶיךָ
  chosen: by not going your own ways
  alternatives:
  - from doing your own ways
  - from following your own path
  lexicon: HALOT
  rationale: Hebrew idiom with 'ways' refers to conduct or customary course. 'Going your own ways' is idiomatic English and preserves the metaphor.
- source_word: מִמְּצוֹא חֶפְצְךָ
  chosen: nor seeking your own pleasure
  alternatives:
  - nor pursuing your own desire
  - nor seeking your own business
  lexicon: HALOT
  rationale: מצא with חפץ here likely means pursuing or seeking what one desires. 'Pleasure' maintains lexical continuity with earlier חפצים, though 'business' is a possible contextual nuance.
- source_word: וְדַבֵּר דָּבָר
  chosen: nor speaking a word
  alternatives:
  - nor speaking idle words
  - nor speaking your own word
  - nor talking
  lexicon: HALOT
  rationale: The terse Hebrew literally says 'and speaking a word.' In context it likely means refraining from self-directed or ordinary speech on the Sabbath. The main text keeps the concise literal force; interpretive expansions are preserved as alternatives.
