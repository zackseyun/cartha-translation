theological_decisions:
- issue: Referent of the pronoun in וְכִבַּדְתּוֹ
  chosen_reading: The pronoun refers to the Sabbath/holy day, yielding 'honor it.'
  alternative_readings:
  - The pronoun refers to the LORD, yielding 'honor him.'
  rationale: 'The immediate context repeatedly focuses on the Sabbath as the object being treated rightly: calling it a delight, regarding the LORD''s holy day as honorable, and then honoring it by refraining from self-directed activity. While honoring the LORD is certainly theologically true, the syntax and flow favor the Sabbath as antecedent.'
  doctrine_reference: Preserve theological tension rather than resolve it where ambiguity remains.
