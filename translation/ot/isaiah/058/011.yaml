  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for יְהוָה and aligns with established English Bible convention while preserving reverential function.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Anthropological sense of נֶפֶשׁ
  chosen_reading: your soul
  alternative_readings:
  - your life
  - you
  rationale: The verse speaks poetically of inward satisfaction and outward renewal. 'Soul' preserves the text's theological and poetic depth without collapsing the term into a merely physical or generic pronoun.
