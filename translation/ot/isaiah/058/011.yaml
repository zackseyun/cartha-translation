id: ISA.58.11
reference: Isaiah 58:11
source:
  edition: WLC
  text: וְ/נָחֲ/ךָ֣ יְהוָה֮ תָּמִיד֒ וְ/הִשְׂבִּ֤יעַ בְּ/צַחְצָחוֹת֙ נַפְשֶׁ֔/ךָ וְ/עַצְמֹתֶ֖י/ךָ יַחֲלִ֑יץ וְ/הָיִ֨יתָ֙ כְּ/גַ֣ן רָוֶ֔ה וּ/כְ/מוֹצָ֣א מַ֔יִם אֲשֶׁ֥ר לֹא יְכַזְּב֖וּ מֵימָֽי/ו־׃
translation:
  text: And Yahweh will guide you continually, and satisfy your soul in parched places, and strengthen your bones; and you will be like a well-watered garden, and like a spring of water whose waters do not fail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in parched regions' or 'in dry places.' The Hebrew refers to scorched, arid conditions.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'whose waters do not lie'—that is, waters that do not fail or disappoint.
    reason: lexical_alternative
  - marker: c
    text: Or 'refresh your bones.' The Hebrew verb is uncommon here and may convey strengthening or invigorating.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָחֲךָ
  chosen: will guide you
  alternatives:
  - will lead you
  - will rest you
  lexicon: HALOT
  rationale: From נחה, the common sense is to lead or guide. 'Guide' fits the metaphorical promise of divine direction better than the more wooden 'lead,' while avoiding the less likely reading 'give rest.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - always
  - constantly
  lexicon: HALOT
  rationale: Conveys ongoing, uninterrupted action in natural modern English.
- source_word: וְהִשְׂבִּיעַ
  chosen: satisfy
  alternatives:
  - fill
  - satiate
  lexicon: HALOT
  rationale: The Hiphil of שבע here expresses supplying fully so that need is met. 'Satisfy' is idiomatic with 'soul' and preserves the sense of fullness.
- source_word: בְּצַחְצָחוֹת
  chosen: in scorched places
  alternatives:
  - in droughts
  - in parched regions
  - in dry places
  lexicon: HALOT
  rationale: The noun refers to parched, sun-scorched conditions. 'In scorched places' preserves the plural and the environmental imagery without over-specifying meteorological drought.
- source_word: נַפְשֶׁךָ
  chosen: your soul
  alternatives:
  - your life
  - your appetite
  - you
  lexicon: HALOT
  rationale: נפש can denote life, self, or appetite, but in this poetic promise 'your soul' best preserves the anthropological depth of the Hebrew and pairs naturally with divine satisfaction.
- source_word: וְעַצְמֹתֶיךָ יַחֲלִיץ
  chosen: strengthen your bones
  alternatives:
  - make your bones strong
  - refresh your bones
  - equip your bones
  lexicon: HALOT
  rationale: The verb חלץ in Hiphil here is difficult, but in context it conveys making strong or invigorating. 'Strengthen your bones' communicates bodily renewal in idiomatic English while preserving the concrete Hebrew image.
- source_word: כְּגַן רָוֶה
  chosen: like a well-watered garden
  alternatives:
  - like a watered garden
  - like a saturated garden
  lexicon: HALOT
  rationale: רוה denotes being watered or saturated. 'Well-watered garden' is clear, natural English and preserves the fertility image.
- source_word: וּכְמוֹצָא מַיִם
  chosen: like a spring of water
  alternatives:
  - like a source of water
  - like a fountain of water
  lexicon: HALOT
  rationale: מוֹצָא is literally an outlet or source. 'Spring of water' is the most natural image in English for a naturally issuing water source.
- source_word: אֲשֶׁר לֹא יְכַזְּבוּ מֵימָיו
  chosen: whose waters do not fail
  alternatives:
  - whose waters do not lie
  - whose waters do not disappoint
  - whose waters do not dry up
  lexicon: HALOT
  rationale: כזב literally involves lying or proving false; with waters, the idiom is of a source that does not fail or disappoint by drying up unexpectedly. 'Do not fail' captures the metaphorical force in clear English.
