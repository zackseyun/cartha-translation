id: ISA.58.5
reference: Isaiah 58:5
source:
  edition: WLC
  text: הֲ/כָ/זֶ֗ה יִֽהְיֶה֙ צ֣וֹם אֶבְחָרֵ֔/הוּ י֛וֹם עַנּ֥וֹת אָדָ֖ם נַפְשׁ֑/וֹ הֲ/לָ/כֹ֨ף כְּ/אַגְמֹ֜ן רֹאשׁ֗/וֹ וְ/שַׂ֤ק וָ/אֵ֨פֶר֙ יַצִּ֔יעַ הֲ/לָ/זֶה֙ תִּקְרָא צ֔וֹם וְ/י֥וֹם רָצ֖וֹן לַ/יהוָֽה־׃
translation:
  text: 'Is this the fast that I choose: a day for a person to humble himself? Is it to bow down his head like a reed, and to spread out sackcloth and ashes? Will you call this a fast, and a day acceptable to Yahweh?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a day for a man to afflict himself.' The Hebrew idiom literally speaks of self-affliction, especially in fasting contexts.
    reason: lexical_alternative
  - marker: b
    text: '''Like a reed'' may also be rendered ''like a bulrush'' or ''like a rush.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: צוֹם
  chosen: fast
  alternatives:
  - fasting
  lexicon: HALOT
  rationale: The noun denotes the practice/day of fasting. 'Fast' is the most natural English nominal rendering here and fits both occurrences in the verse.
- source_word: אֶבְחָרֵהוּ
  chosen: that I choose
  alternatives:
  - that I delight in
  - that I select
  lexicon: HALOT
  rationale: בחר commonly means 'choose/select.' In this rhetorical question, 'that I choose' preserves the divine evaluative sense without adding interpretive nuance.
- source_word: עַנּוֹת ... נַפְשׁוֹ
  chosen: to humble himself
  alternatives:
  - to afflict himself
  - to deny himself
  lexicon: HALOT
  rationale: The idiom ענה נפש can mean self-affliction in fasting contexts. 'Humble himself' communicates the intended penitential posture in readable English, while avoiding an overly wooden rendering. The more formal alternative 'afflict himself' is preserved in a footnote because it is lexically plausible and traditional.
- source_word: אָדָם
  chosen: a man
  alternatives:
  - a person
  - humankind
  lexicon: HALOT
  rationale: The singular noun here refers to an individual human in a representative sense. Per doctrine, gender-accurate rendering is preferred where the source is grammatically masculine and representative; thus 'a man' is retained rather than neutralizing to 'a person.'
- source_word: הֲלָכֹף
  chosen: to bow down
  alternatives:
  - to bend
  - to stoop
  lexicon: HALOT
  rationale: The infinitive expresses the external act of bending low. 'Bow down' is idiomatic and suits the rhetorical critique of merely outward fasting gestures.
- source_word: כְּאַגְמֹן
  chosen: like a reed
  alternatives:
  - like a bulrush
  - like a rush
  lexicon: HALOT
  rationale: אגמון denotes a marsh plant such as a reed/rush. 'Reed' is clear modern English; 'bulrush' is more traditional but less accessible.
- source_word: שַׂק
  chosen: sackcloth
  alternatives:
  - coarse cloth
  lexicon: HALOT
  rationale: The term is the standard biblical sign of mourning/humiliation. 'Sackcloth' is established and still understandable in context.
- source_word: אֵפֶר
  chosen: ashes
  alternatives:
  - dust and ashes
  lexicon: HALOT
  rationale: The plain lexical sense is 'ashes.' No expansion is warranted by the Hebrew.
- source_word: יַצִּיעַ
  chosen: to spread out
  alternatives:
  - to lay out
  - to make a bed of
  lexicon: HALOT
  rationale: The Hiphil of יצע here refers to laying out or spreading bedding/material beneath oneself. 'Spread out' is natural with 'sackcloth and ashes' in English.
- source_word: תִּקְרָא
  chosen: will you call
  alternatives:
  - do you call
  - would you proclaim
  lexicon: HALOT
  rationale: The imperfect in rhetorical question form is well represented by 'will you call,' preserving the prophetic challenge addressed to the audience.
- source_word: רָצוֹן
  chosen: acceptable
  alternatives:
  - favorable
  - pleasing
  lexicon: HALOT
  rationale: In the phrase 'a day of favor/acceptance to the LORD,' 'acceptable' best conveys divine approval in idiomatic English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: 'Following doctrine, YHWH is rendered ''the LORD.'' The preposition can be represented as ''to'' here with ''acceptable,'' yielding natural English: ''acceptable to the LORD.'''
