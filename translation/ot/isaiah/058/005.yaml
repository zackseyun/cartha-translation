theological_decisions:
- issue: Rendering the fasting idiom ענה נפש
  chosen_reading: a day for a man to humble himself
  alternative_readings:
  - a day for a man to afflict himself
  rationale: The verse critiques externalized piety. 'Humble himself' captures the idiom's penitential force in contemporary English without denying the stronger literal sense 'afflict himself,' which is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §6
- issue: Gendered representative language in אָדָם
  chosen_reading: a man
  alternative_readings:
  - a person
  - someone
  rationale: The Hebrew is grammatically masculine singular and representative. Per doctrine, gender-accurate rendering is preferred over flattening to gender-neutral English unless context clearly demands otherwise.
  doctrine_reference: Translation philosophy §4
