id: ISA.58.9
reference: Isaiah 58:9
source:
  edition: WLC
  text: אָ֤ז תִּקְרָא֙ וַ/יהוָ֣ה יַעֲנֶ֔ה תְּשַׁוַּ֖ע וְ/יֹאמַ֣ר הִנֵּ֑/נִי אִם תָּסִ֤יר מִ/תּֽוֹכְ/ךָ֙ מוֹטָ֔ה שְׁלַ֥ח אֶצְבַּ֖ע וְ/דַבֶּר אָֽוֶן־־׃
translation:
  text: Then you will call, and Yahweh will answer; you will cry for help, and he will say, ‘Here I am.’ If you remove from your midst the yoke, the pointing of the finger, and speaking wickedness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pointing the finger'; the Hebrew idiom is literally 'sending/stretching out a finger,' likely referring to accusatory or contemptuous gesture.
    reason: lexical_alternative
  - marker: b
    text: '''The yoke'' is a metaphor for oppressive treatment or burdens imposed on others.'
    reason: cultural_note
  - marker: c
    text: Or 'speaking evil' or 'malicious speech.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb marking the result of the preceding conditions; 'Then' is natural and concise in English.
- source_word: תִּקְרָא
  chosen: you will call
  alternatives:
  - you will call out
  lexicon: HALOT
  rationale: Qal imperfect of קרא in prayer context; 'call' fits the parallel with the next clause and keeps the wording broad enough for appeal to God.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: יַעֲנֶה
  chosen: will answer
  alternatives:
  - will respond
  lexicon: HALOT
  rationale: Standard rendering of ענה in a prayer-response context; 'answer' preserves the direct correspondence with calling.
- source_word: תְּשַׁוַּע
  chosen: you will cry for help
  alternatives:
  - you will cry out
  - you will plead for help
  lexicon: HALOT
  rationale: Piel of שוע often denotes an urgent cry for aid; 'cry for help' makes the distress nuance explicit without overparaphrasing.
- source_word: וְיֹאמַר
  chosen: and he will say
  alternatives:
  - and he will declare
  lexicon: HALOT
  rationale: Simple narrative continuation; the subject is the LORD from the previous clause.
- source_word: הִנֵּנִי
  chosen: Here I am
  alternatives:
  - Behold me
  - I am here
  lexicon: HALOT
  rationale: Idiomatic divine response indicating readiness and presence. 'Here I am' is natural modern English and preserves the immediacy of the Hebrew.
- source_word: אִם
  chosen: If
  alternatives:
  - when
  lexicon: HALOT
  rationale: Introduces the condition for the promised response. 'If' best reflects the Hebrew conditional force.
- source_word: תָּסִיר
  chosen: you remove
  alternatives:
  - you take away
  lexicon: HALOT
  rationale: Hiphil of סור in causative/removal sense; 'remove' is idiomatic with the following phrase 'from your midst.'
- source_word: מִתּוֹכְךָ
  chosen: from your midst
  alternatives:
  - from among you
  - from within you
  lexicon: HALOT
  rationale: The phrase points to what exists within the community or personal sphere. 'From your midst' preserves the communal-social nuance and echoes prophetic diction.
- source_word: מוֹטָה
  chosen: the yoke
  alternatives:
  - the bar
  - oppression
  lexicon: HALOT
  rationale: Literally 'yoke-bar/yoke,' used metaphorically in this context for oppressive burdening of others. Main text keeps the concrete metaphor; oppressive sense is carried by context.
- source_word: שְׁלַח אֶצְבַּע
  chosen: the pointing of the finger
  alternatives:
  - pointing the finger
  - the thrusting out of the finger
  lexicon: HALOT
  rationale: The Hebrew is literally 'sending/stretching out a finger,' an idiom for accusatory or contemptuous gesturing. 'The pointing of the finger' is clear and preserves the image.
- source_word: וְדַבֶּר אָוֶן
  chosen: and speaking wickedness
  alternatives:
  - and speaking evil
  - and malicious speech
  - and speaking iniquity
  lexicon: HALOT
  rationale: אָוֶן can denote wickedness, evil, or harmful falsehood. 'Speaking wickedness' is broad enough to include deceitful and injurious speech while remaining close to the Hebrew.
