id: ISA.58.8
reference: Isaiah 58:8
source:
  edition: WLC
  text: אָ֣ז יִבָּקַ֤ע כַּ/שַּׁ֨חַר֙ אוֹרֶ֔/ךָ וַ/אֲרֻכָתְ/ךָ֖ מְהֵרָ֣ה תִצְמָ֑ח וְ/הָלַ֤ךְ לְ/פָנֶ֨י/ךָ֙ צִדְקֶ֔/ךָ כְּב֥וֹד יְהוָ֖ה יַאַסְפֶֽ/ךָ׃
translation:
  text: Then your light will break forth like the dawn, and your healing will spring up quickly; your righteousness will go before you, and the glory of Yahweh will be your rear guard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your recovery' or 'your restoration' for 'your healing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your justice' for 'your righteousness.'
    reason: lexical_alternative
  - marker: c
    text: Traditionally, 'the glory of the LORD will be your rear guard.' The Hebrew verb more literally means 'will gather you' or 'gather you up' from behind.
    reason: alternative_reading
lexical_decisions:
- source_word: יִבָּקַע
  chosen: will break forth
  alternatives:
  - will burst forth
  - will split open
  lexicon: HALOT
  rationale: The Niphal of בקע conveys something breaking open or bursting forth. With 'your light' as subject and 'like the dawn' as comparison, 'will break forth' is idiomatic English that preserves the vivid emergence imagery without over-literal awkwardness.
- source_word: כַּשַּׁחַר
  chosen: like the dawn
  alternatives:
  - like the morning
  - like daybreak
  lexicon: HALOT
  rationale: שׁחר denotes dawn/daybreak. 'Like the dawn' is concise, natural, and preserves the simile's imagery.
- source_word: אוֹרֶךָ
  chosen: your light
  lexicon: HALOT
  rationale: אוֹר is straightforwardly 'light.' The possessive is retained.
- source_word: אֲרֻכָתְךָ
  chosen: your healing
  alternatives:
  - your recovery
  - your restoration
  lexicon: HALOT
  rationale: אֲרֻכָה can denote healing, restoration, or recovery, often in contexts of wounds or national repair. 'Your healing' best fits the immediate metaphorical context and common prophetic usage, while remaining broad enough to include restoration. Because 'recovery' is also plausible, it is preserved in a footnote.
- source_word: מְהֵרָה
  chosen: quickly
  alternatives:
  - speedily
  - soon
  lexicon: HALOT
  rationale: The adverb indicates rapidity. 'Quickly' is modern and natural English.
- source_word: תִצְמָח
  chosen: will spring up
  alternatives:
  - will grow
  - will sprout
  lexicon: HALOT
  rationale: צמח literally denotes sprouting/growing. With 'healing' as subject, 'will spring up' preserves the organic metaphor and reads naturally in English.
- source_word: וְהָלַךְ לְפָנֶיךָ
  chosen: will go before you
  alternatives:
  - will walk before you
  lexicon: HALOT
  rationale: הלך + לפני means to go/walk before someone. 'Will go before you' is the most idiomatic English and preserves the sense of preceding as protection or guidance.
- source_word: צִדְקֶךָ
  chosen: your righteousness
  alternatives:
  - your justice
  - your vindication
  lexicon: HALOT
  rationale: צדק can denote righteousness, justice, or rightness/vindication depending on context. Here 'your righteousness' fits the moral and covenantal context of Isaiah 58 and parallels divine glory as protective accompaniment. 'Justice' is plausible but less fitting as a possessive quality in this line, so it is preserved as a lexical alternative in a footnote.
- source_word: כְּבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: כבוד is 'glory,' and per doctrine YHWH is rendered 'the LORD.' The construct relationship is represented naturally in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יַאַסְפֶךָ
  chosen: will gather you up behind
  alternatives:
  - will be your rear guard
  - will gather you in
  - will bring up your rear
  lexicon: HALOT
  rationale: אסף basically means gather/collect. In this context, with righteousness going before and the glory of the LORD behind, the sense is protective closure from the rear. Rather than importing the interpretive idiom 'rear guard' into the main text, 'will gather you up behind' keeps the lexical core 'gather' while making the spatial sense explicit. The more interpretive traditional rendering is preserved in a footnote.
