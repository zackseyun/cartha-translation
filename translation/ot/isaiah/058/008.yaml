theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render צִדְקֶךָ as moral 'righteousness' or social 'justice'
  chosen_reading: your righteousness
  alternative_readings:
  - your justice
  - your vindication
  rationale: Isaiah 58 strongly features social justice, but the immediate clause personifies the addressee's צדק as going before him, paired with the LORD's glory behind. 'Righteousness' best preserves the broader covenantal and moral sense without narrowing it to one social dimension. The alternative 'justice' is preserved in a footnote to maintain the semantic tension.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3; Contested terms analogy for δικαιοσύνη preserving tension where relevant'
