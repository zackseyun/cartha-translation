id: ISA.58.14
reference: Isaiah 58:14
source:
  edition: WLC
  text: אָ֗ז תִּתְעַנַּג֙ עַל יְהוָ֔ה וְ/הִרְכַּבְתִּ֖י/ךָ עַל בָּ֣מֳותֵי אָ֑רֶץ וְ/הַאֲכַלְתִּ֗י/ךָ נַחֲלַת֙ יַעֲקֹ֣ב אָבִ֔י/ךָ כִּ֛י פִּ֥י יְהוָ֖ה דִּבֵּֽר־־׃ס
translation:
  text: then you will delight yourself in Yahweh, and I will make you ride on the heights of the earth; I will feed you with the inheritance of Jacob your father, for the mouth of Yahweh has spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the high places of the earth' or 'the heights of the land.'
    reason: lexical_alternative
  - marker: b
    text: '''Jacob your father'' uses covenant-family language; that is, Jacob as the forefather/ancestor of the people.'
    reason: cultural_note
lexical_decisions:
- source_word: תִּתְעַנַּג עַל
  chosen: will delight yourself in
  alternatives:
  - will take delight in
  - will find your delight in
  lexicon: HALOT
  rationale: Hitpael of ענג conveys taking exquisite delight or enjoying oneself. With עַל + YHWH, idiomatic English is 'delight yourself in the LORD,' preserving the reflexive nuance and covenantal/personal orientation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְהִרְכַּבְתִּיךָ
  chosen: I will make you ride
  alternatives:
  - I will cause you to ride
  - I will set you riding
  lexicon: HALOT
  rationale: 'Hiphil of רכב is causative: ''cause/make to ride.'' ''Make you ride'' is natural modern English while retaining the causative force.'
- source_word: בָּמוֹתֵי אָרֶץ
  chosen: the heights of the earth
  alternatives:
  - the high places of the earth
  - the heights of the land
  lexicon: HALOT
  rationale: במות often means elevated places/heights. Here the phrase is metaphorical for exalted security/victory/prosperity rather than cultic 'high places,' so 'heights of the earth' preserves the imagery without importing idolatrous associations. 'Earth' is preferred over 'land' because the noun is unqualified and the expression is idiomatic and expansive.
- source_word: וְהַאֲכַלְתִּיךָ
  chosen: I will feed you with
  alternatives:
  - I will nourish you with
  - I will cause you to eat
  lexicon: HALOT
  rationale: Hiphil of אכל can mean 'cause to eat/feed.' 'Feed you with' is idiomatic and fits the object 'the inheritance of Jacob,' expressing bestowed enjoyment of covenant blessing.
- source_word: נַחֲלַת יַעֲקֹב אָבִיךָ
  chosen: the inheritance of Jacob your father
  alternatives:
  - Jacob your ancestor's inheritance
  - the heritage of Jacob your father
  lexicon: HALOT
  rationale: נחלה is 'inheritance/heritage.' 'Inheritance' is chosen for clarity and covenantal resonance. 'Jacob your father' is retained rather than smoothing to 'ancestor' in the main text, preserving the familial covenant idiom; an explanatory alternative is suitable for footnote.
- source_word: כִּי פִּי יְהוָה דִּבֵּר
  chosen: for the mouth of the LORD has spoken
  alternatives:
  - for the LORD has spoken
  - because the mouth of the LORD has spoken
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'the mouth of the LORD,' a solemn prophetic formula underscoring divine authority. It is retained rather than reduced to the smoother 'the LORD has spoken.' Perfect verb rendered as English present perfect for prophetic finality.
