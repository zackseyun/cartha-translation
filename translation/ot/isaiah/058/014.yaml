theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of 'heights of the earth'
  chosen_reading: Retain the metaphor of exaltation/blessing without over-interpreting it as military conquest, purely geographical elevation, or cultic high places.
  alternative_readings:
  - victorious rule over the land
  - prosperity in the land
  - high places of the land
  rationale: The phrase carries rich covenantal imagery echoed elsewhere in Scripture, but the verse itself does not force a single theological nuance. Preserving the metaphor maintains the text's poetic and theological breadth.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it.'
