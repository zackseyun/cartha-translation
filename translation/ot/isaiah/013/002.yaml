id: ISA.13.2
reference: Isaiah 13:2
source:
  edition: WLC
  text: עַ֤ל הַר נִשְׁפֶּה֙ שְֽׂאוּ נֵ֔ס הָרִ֥ימוּ ק֖וֹל לָ/הֶ֑ם הָנִ֣יפוּ יָ֔ד וְ/יָבֹ֖אוּ
    פִּתְחֵ֥י נְדִיבִֽים־־׃
translation:
  text: On a bare mountain raise a signal; lift up the voice to them; wave the hand,
    that they may enter the gates of the nobles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'banner' or 'standard' for 'signal.' The Hebrew נֵס often denotes a raised
      military sign or rallying marker.
    reason: lexical_alternative
  - marker: b
    text: Or 'beckon with the hand.' The gesture likely functions as a summons to
      the attacking force.
    reason: lexical_alternative
  - marker: c
    text: Or 'the gates of the princes.' The Hebrew נְדִיבִים can denote nobles, princes,
      or other prominent leaders.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁפֶּה
  chosen: bare
  alternatives:
  - swept bare
  - bald
  - treeless
  lexicon: HALOT
  rationale: The passive/participle describes a mountain stripped or made bare, likely
    of trees/cover. 'Bare' is concise, natural English and preserves the visual sense
    of an exposed height suitable for a signal.
- source_word: נֵס
  chosen: signal
  alternatives:
  - banner
  - standard
  lexicon: HALOT
  rationale: In prophetic/military contexts this denotes a raised sign for mustering
    or directing troops. 'Signal' communicates function more clearly in modern English
    than the more traditional but potentially misleading 'banner.'
- source_word: הָרִימוּ קוֹל
  chosen: lift up the voice
  alternatives:
  - raise the voice
  - shout
  lexicon: HALOT
  rationale: This keeps the Hebrew idiom fairly closely while remaining intelligible.
    'Shout' is possible, but the Hebrew expression is literally 'raise/lift the voice,'
    and preserving that imagery suits optimal equivalence.
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - against them
  - for them
  lexicon: HALOT
  rationale: 'The preposition ל most naturally marks direction here: the summons is
    directed toward the approaching forces. ''To them'' is the least interpretively
    loaded rendering.'
- source_word: הָנִיפוּ יָד
  chosen: wave the hand
  alternatives:
  - beckon with the hand
  - brandish the hand
  lexicon: HALOT
  rationale: The verb conveys a waving or gesturing motion. 'Wave the hand' preserves
    the concrete image; 'beckon' is interpretive but worth preserving as an alternative
    because the gesture likely functions as a summons.
- source_word: וְיָבֹאוּ
  chosen: that they may enter
  alternatives:
  - and let them come
  - so that they may come
  lexicon: HALOT
  rationale: 'Following the sequence of imperatives, the prefixed verb is best taken
    as purpose/result: the signaling is done so that the summoned army may enter.
    ''Enter'' fits the following object ''gates'' better than the more general ''come.'''
- source_word: פִּתְחֵי
  chosen: gates
  alternatives:
  - entrances
  - doorways
  lexicon: HALOT
  rationale: The construct plural refers to entry points. In context of a city or
    stronghold, 'gates' is the most idiomatic and contextually appropriate English
    rendering.
- source_word: נְדִיבִים
  chosen: the nobles
  alternatives:
  - the princes
  - the willing ones
  lexicon: HALOT
  rationale: In this context the word refers to prominent/high-ranking persons, likely
    rulers or aristocrats. 'Nobles' is broad and natural; 'princes' is possible but
    more specific than the Hebrew requires.
