id: ISA.13.21
reference: Isaiah 13:21
source:
  edition: WLC
  text: וְ/רָבְצוּ שָׁ֣ם צִיִּ֔ים וּ/מָלְא֥וּ בָתֵּי/הֶ֖ם אֹחִ֑ים וְ/שָׁ֤כְנוּ שָׁם֙
    בְּנ֣וֹת יַֽעֲנָ֔ה וּ/שְׂעִירִ֖ים יְרַקְּדוּ שָֽׁם־־׃
translation:
  text: But desert creatures will lie down there, and their houses will be full of
    owls; ostriches will dwell there, and wild goats will dance there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'howling creatures' or 'jackals' for 'owls'; the Hebrew term אֹחִים is
      uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'goat-demons' or 'satyrs'; the Hebrew שְׂעִירִים can denote hairy goats
      and may also carry mythic or demonic associations in some contexts.
    reason: alternative_reading
lexical_decisions:
- source_word: וְרָבְצוּ
  chosen: will lie down
  alternatives:
  - will crouch
  - will rest
  lexicon: HALOT
  rationale: The verb רבץ commonly denotes animals lying down or settling in a place.
    'Will lie down' is natural English and preserves the image of animals occupying
    the ruined site.
- source_word: צִיִּים
  chosen: desert creatures
  alternatives:
  - wild animals of the desert
  - desert dwellers
  lexicon: HALOT
  rationale: The noun refers broadly to creatures associated with arid ruins or desert
    places, not clearly to one identifiable species. 'Desert creatures' preserves
    the generality better than a specific animal label.
- source_word: וּמָלְאוּ בָתֵּיהֶם
  chosen: their houses will be full of
  alternatives:
  - their houses will be filled with
  lexicon: HALOT
  rationale: 'This keeps the straightforward possessive sense of the Hebrew: the houses
    belonging to the city/its inhabitants become filled with creatures.'
- source_word: אֹחִים
  chosen: owls
  alternatives:
  - howling creatures
  - jackals
  lexicon: HALOT
  rationale: The term is uncertain. Traditional English often gives 'owls,' while
    some modern interpreters prefer a more generic or canid-related rendering. 'Owls'
    fits the context of desolation and ruined houses, but the uncertainty is significant
    enough to preserve in a footnote.
- source_word: וְשָׁכְנוּ
  chosen: will dwell
  alternatives:
  - will live
  - will settle
  lexicon: HALOT
  rationale: שׁכן often carries the sense of dwelling or settling in a place. 'Will
    dwell' is slightly more elevated and suits prophetic judgment language.
- source_word: בְּנוֹת יַעֲנָה
  chosen: ostriches
  alternatives:
  - daughters of the ostrich
  - female ostriches
  lexicon: HALOT
  rationale: The Hebrew expression is an idiomatic zoological designation. English
    normally renders the species name rather than preserving the literal construct
    form.
- source_word: וּשְׂעִירִים
  chosen: wild goats
  alternatives:
  - goat-demons
  - satyrs
  lexicon: HALOT
  rationale: The base sense of שׂעירים is 'hairy ones/goats.' In some contexts the
    term may evoke demonic or mythic associations, but here the immediate scene is
    one of ruined desolation populated by uncanny wilderness beings. To avoid importing
    a stronger demonological claim than the text requires, the main text uses 'wild
    goats,' while the alternative is preserved in a footnote.
- source_word: יְרַקְּדוּ
  chosen: will dance
  alternatives:
  - will skip
  - will leap
  lexicon: HALOT
  rationale: The verb רקד denotes dancing, skipping, or leaping. 'Will dance' preserves
    the vivid, eerie poetic image common in English renderings of this judgment oracle.
