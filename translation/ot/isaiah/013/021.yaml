theological_decisions:
- issue: Whether שְׂעִירִים should be rendered as literal animals or demonic beings
  chosen_reading: Rendered as 'wild goats' in the main text
  alternative_readings:
  - goat-demons
  - satyrs
  rationale: The Hebrew term can carry mythic or demonic overtones in some passages,
    but the lexical base is still 'hairy goats.' In this context of ruined Babylon
    inhabited by wilderness creatures, the text does not require a fully demonological
    rendering. Following the translation philosophy, the main text avoids importing
    a doctrinally stronger claim than the Hebrew plainly makes, while preserving the
    alternative in a footnote.
  doctrine_reference: Translation philosophy §1, §3
