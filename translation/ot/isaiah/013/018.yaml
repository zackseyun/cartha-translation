id: ISA.13.18
reference: Isaiah 13:18
source:
  edition: WLC
  text: וּ/קְשָׁת֖וֹת נְעָרִ֣ים תְּרַטַּ֑שְׁנָה וּ/פְרִי בֶ֨טֶן֙ לֹ֣א יְרַחֵ֔מוּ עַל
    בָּנִ֖ים לֹֽא תָח֥וּס עֵינָֽ/ם־־־׃
translation:
  text: And their bows will dash young men to pieces; they will show no compassion
    on the fruit of the womb; their eye will not spare children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their bows will shatter the young men'; some take 'bows' metonymically
      as 'bowmen/archers.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons'; here likely used in the broader sense of 'children.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קְשָׁתוֹת
  chosen: bows
  alternatives:
  - bowmen
  lexicon: HALOT
  rationale: The noun normally means 'bows.' Although some translations take it metonymically
    for archers/bowmen, the feminine plural verb agrees naturally with the feminine
    plural noun, so the image is that their bows are the instruments of slaughter.
- source_word: נְעָרִים
  chosen: young men
  alternatives:
  - boys
  - youths
  lexicon: HALOT
  rationale: נְעָרִים can denote boys, youths, or young men depending on context.
    In a war oracle describing indiscriminate violence, 'young men' best conveys persons
    in the prime of youth without implying only small children.
- source_word: תְּרַטַּשְׁנָה
  chosen: will dash ... to pieces
  alternatives:
  - will shatter
  - will smash
  lexicon: HALOT
  rationale: The Piel of רטש conveys violent smashing or dashing to pieces. The fuller
    English phrase preserves the brutality of the Hebrew rather than softening it
    to a generic 'kill.'
- source_word: פְרִי בֶטֶן
  chosen: the fruit of the womb
  alternatives:
  - offspring
  - children in the womb
  lexicon: HALOT
  rationale: This is a fixed Hebrew expression for offspring/children born from the
    womb. 'Fruit of the womb' preserves the idiom and its stark contrast with the
    attackers' lack of compassion.
- source_word: יְרַחֵמוּ
  chosen: will show no compassion
  alternatives:
  - will not pity
  - will have no mercy
  lexicon: HALOT
  rationale: The verb רחם denotes compassion/mercy with an affective sense. 'Show
    no compassion' is natural modern English and preserves the emotional force.
- source_word: בָּנִים
  chosen: children
  alternatives:
  - sons
  lexicon: HALOT
  rationale: Although בנים is formally 'sons,' in many contexts it functions generically
    for children/offspring. Here the parallel with 'fruit of the womb' points to offspring
    generally, not specifically male children.
- source_word: תָח֥וּס עֵינָם
  chosen: their eye will not spare
  alternatives:
  - their eyes will not pity
  - their eye will have no compassion
  lexicon: HALOT
  rationale: The singular verb with 'eye' as a collective noun is idiomatic Hebrew.
    Rendering it as singular in English ('their eye') preserves the idiom and the
    vivid image of pitiless sight; 'spare' fits חוס well in judgment contexts.
