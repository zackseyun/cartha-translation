theological_decisions:
- issue: Rendering of אָדָם in a generic-humanity context
  chosen_reading: mankind
  alternative_readings:
  - man
  - humankind
  rationale: The verse uses two parallel human terms to describe the scarcity of people
    under judgment. 'Mankind' preserves the collective generic sense without flattening
    the parallelism. This follows the doctrine's instruction to render אָדָם as 'man
    / humankind' according to context and to remain gender-accurate rather than automatically
    gender-neutral.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for אָדָם; Translation philosophy
    §4'
