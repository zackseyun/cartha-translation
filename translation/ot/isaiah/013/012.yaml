id: ISA.13.12
reference: Isaiah 13:12
source:
  edition: WLC
  text: אוֹקִ֥יר אֱנ֖וֹשׁ מִ/פָּ֑ז וְ/אָדָ֖ם מִ/כֶּ֥תֶם אוֹפִֽיר׃
translation:
  text: I will make mortal man rarer than fine gold, and mankind than the gold of
    Ophir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will make man more precious than fine gold.' The Hebrew verb can emphasize
      preciousness/value; in context this likely implies extreme scarcity.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹקִיר
  chosen: I will make rarer
  alternatives:
  - I will make more precious
  - I will esteem
  lexicon: HALOT
  rationale: 'Hiphil of יקר can mean to make precious/valuable. In this judgment context,
    the comparison with gold points to scarcity as the practical sense: humans will
    become more scarce than fine gold. ''Rarer'' communicates the result naturally
    in English while preserving the comparative force.'
- source_word: אֱנוֹשׁ
  chosen: mortal man
  alternatives:
  - man
  - a mortal
  lexicon: HALOT
  rationale: אֱנוֹשׁ often emphasizes human frailty or mortality rather than humanity
    in the abstract. 'Mortal man' preserves both the masculine singular form and the
    nuance of frail humanity.
- source_word: מִפָּז
  chosen: than fine gold
  alternatives:
  - than pure gold
  - than refined gold
  lexicon: HALOT
  rationale: פָּז denotes high-quality refined gold. 'Fine gold' is idiomatic English
    and preserves the sense of exceptional value.
- source_word: וְאָדָם
  chosen: and mankind
  alternatives:
  - and man
  - and a human
  lexicon: HALOT
  rationale: אָדָם here is parallel to אֱנוֹשׁ and functions generically for human
    beings. Per doctrine, the rendering should be gender-accurate to context; here
    the generic collective sense is best conveyed by 'mankind' rather than an individual
    'man.'
- source_word: מִכֶּתֶם אוֹפִיר
  chosen: than the gold of Ophir
  alternatives:
  - than Ophir gold
  - than the pure gold of Ophir
  lexicon: HALOT
  rationale: כֶּתֶם denotes gold, often precious or pure gold; אוֹפִיר is the place-name
    Ophir, famed for high-quality gold. 'The gold of Ophir' is the clearest natural
    English rendering and preserves the geographic allusion.
