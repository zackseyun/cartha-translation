id: ISA.13.15
reference: Isaiah 13:15
source:
  edition: WLC
  text: כָּל הַ/נִּמְצָ֖א יִדָּקֵ֑ר וְ/כָל הַ/נִּסְפֶּ֖ה יִפּ֥וֹל בֶּ/חָֽרֶב־־׃
translation:
  text: Everyone who is found will be pierced through, and everyone who is caught
    will fall by the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone who is swept away' for 'everyone who is caught.' The Hebrew
      participle from ספה can carry a broader sense than simple capture; the main
      text chooses the reading that best fits the immediate military judgment context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: everyone
  alternatives:
  - all
  - whoever
  lexicon: HALOT
  rationale: Used distributively with the following participles, referring to each
    individual person in view rather than an abstract totality. 'Everyone' is natural
    modern English and preserves the universal scope.
- source_word: הַנִּמְצָא
  chosen: who is found
  alternatives:
  - who is discovered
  - who is encountered
  lexicon: HALOT
  rationale: 'Niphal participle of מצא, functioning substantivally: ''the one being
    found.'' ''Who is found'' is the most straightforward English equivalent and fits
    the passive sense.'
- source_word: יִדָּקֵר
  chosen: will be pierced through
  alternatives:
  - will be stabbed
  - will be thrust through
  lexicon: HALOT
  rationale: Niphal imperfect of דקר, denoting being pierced or run through with a
    weapon. 'Pierced through' preserves the violent force without becoming colloquial.
- source_word: וְכָל
  chosen: and everyone
  alternatives:
  - and all
  - and whoever
  lexicon: HALOT
  rationale: Coordinates the second clause with the first and continues the distributive
    sense. 'And everyone' keeps the parallelism clear in English.
- source_word: הַנִּסְפֶּה
  chosen: who is caught
  alternatives:
  - who is swept away
  - who is gathered up
  - who is joined
  lexicon: HALOT
  rationale: Passive participle from ספה. In this judgment context, the sense is best
    taken as being seized/caught up in the city's fall rather than the more general
    'added' or 'swept away.' 'Caught' communicates the likely contextual force in
    clear English while preserving the passive idea.
- source_word: יִפּוֹל
  chosen: will fall
  alternatives:
  - will be struck down
  - will collapse
  lexicon: HALOT
  rationale: Qal imperfect of נפל, here in a battle/judgment setting. 'Will fall'
    is idiomatic and allows the following phrase 'by the sword' to specify the manner.
- source_word: בֶּחָרֶב
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: HALOT
  rationale: Common idiom for death in warfare. 'By the sword' is the standard and
    natural English rendering for instrument or means in this context.
