id: ISA.13.20
reference: Isaiah 13:20
source:
  edition: WLC
  text: לֹֽא תֵשֵׁ֣ב לָ/נֶ֔צַח וְ/לֹ֥א תִשְׁכֹּ֖ן עַד דּ֣וֹר וָ/ד֑וֹר וְ/לֹֽא יַהֵ֥ל
    שָׁם֙ עֲרָבִ֔י וְ/רֹעִ֖ים לֹא יַרְבִּ֥צוּ שָֽׁם־־־־׃
translation:
  text: It will never be inhabited, and it will not be lived in from generation to
    generation; no Arab will pitch his tent there, and shepherds will not make their
    flocks lie down there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no desert nomad will camp there.' The Hebrew term can denote an Arab
      specifically or, more broadly in context, a nomadic desert-dweller.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵשֵׁב
  chosen: will be inhabited
  alternatives:
  - will sit
  - will dwell
  lexicon: HALOT
  rationale: Though the verb יָשַׁב literally means 'sit/dwell,' with a city as subject
    it idiomatically means 'be inhabited.' The passive-like English best conveys the
    sense in context of Babylon's desolation.
- source_word: לָנֶצַח
  chosen: never
  alternatives:
  - forever
  - for perpetuity
  lexicon: HALOT
  rationale: The phrase means 'for ever/perpetually.' In English after negation, 'never'
    is the most natural equivalent and preserves the force of permanent desolation.
- source_word: תִשְׁכֹּן
  chosen: will be lived in
  alternatives:
  - will dwell
  - will be inhabited
  lexicon: HALOT
  rationale: שָׁכַן means 'dwell, settle.' With the city implied as subject, English
    again requires an idiomatic passive expression. 'Be lived in' preserves some distinction
    from the previous verb rather than flattening both into the same English wording.
- source_word: עַד דּוֹר וָדוֹר
  chosen: from generation to generation
  alternatives:
  - for generation and generation
  - through all generations
  lexicon: HALOT
  rationale: This Hebrew idiom denotes continuing duration across successive generations.
    'From generation to generation' is natural modern English and keeps the iterative
    force.
- source_word: יַהֵל
  chosen: will pitch his tent
  alternatives:
  - will encamp
  - will set up camp
  lexicon: HALOT
  rationale: The verb אהל in the piel refers to tenting/encamping. Because the subject
    is 'Arab' in a nomadic setting, 'pitch his tent' makes the image explicit and
    idiomatic.
- source_word: עֲרָבִי
  chosen: Arab
  alternatives:
  - desert-dweller
  - nomad
  lexicon: HALOT
  rationale: The noun normally denotes an Arab/Arabian. 'Arab' is the most direct
    lexical equivalent. Some take it more generally as a desert nomad, but the ethnic
    term is preferable in the main text; the broader nuance is preserved in a footnote.
- source_word: רֹעִים
  chosen: shepherds
  alternatives:
  - pastors
  - herdsmen
  lexicon: HALOT
  rationale: The participle from רעה denotes those who pasture flocks. 'Shepherds'
    is the standard and clearest English rendering here.
- source_word: יַרְבִּצוּ
  chosen: will not make their flocks lie down
  alternatives:
  - will not lie down
  - will not rest their flocks there
  - will not bed down there
  lexicon: HALOT
  rationale: 'The hiphil of רבץ is causative: ''cause to lie down, make rest.'' Since
    the subject is shepherds, the implied object is their animals/flocks. Supplying
    ''their flocks'' is warranted by the pastoral context and avoids the misleading
    sense that the shepherds themselves are lying down.'
