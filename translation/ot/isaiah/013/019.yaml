theological_decisions:
- issue: Sense of גְּאוֹן in a judgment oracle
  chosen_reading: negative 'pride' rather than neutral 'majesty'
  alternative_readings:
  - majesty
  - glory
  rationale: The verse praises Babylon's former eminence only to announce its downfall;
    in Isaiah, גְּאוֹן frequently bears a negative nuance in judgment contexts. Rendering
    it 'pride' preserves the moral edge of the oracle without adding content beyond
    the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence based on context.
