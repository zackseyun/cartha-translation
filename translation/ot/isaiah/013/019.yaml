id: ISA.13.19
reference: Isaiah 13:19
source:
  edition: WLC
  text: וְ/הָיְתָ֤ה בָבֶל֙ צְבִ֣י מַמְלָכ֔וֹת תִּפְאֶ֖רֶת גְּא֣וֹן כַּשְׂדִּ֑ים כְּ/מַהְפֵּכַ֣ת
    אֱלֹהִ֔ים אֶת סְדֹ֖ם וְ/אֶת עֲמֹרָֽה־־׃
translation:
  text: And Babylon, the beauty of kingdoms, the splendor of the Chaldeans’ pride,
    will be like God’s overthrow of Sodom and Gomorrah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the glory of the Chaldeans’ majesty.' The Hebrew phrase can be taken
      more neutrally as Babylon’s magnificence rather than negatively as its pride.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: will be
  alternatives:
  - shall become
  - will become
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions
    futurally here, describing Babylon's coming state under judgment. 'Will be' is
    natural English and preserves the verbless-result sense without overinterpreting
    a process.
- source_word: בָבֶל
  chosen: Babylon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: צְבִי
  chosen: beauty
  alternatives:
  - glory
  - splendor
  lexicon: HALOT
  rationale: The noun denotes beauty or splendor. 'Beauty' works well in apposition
    with 'of kingdoms' and avoids redundancy with the following תִּפְאֶרֶת, which
    is rendered 'splendor.'
- source_word: מַמְלָכוֹת
  chosen: kingdoms
  alternatives:
  - kingdoms of the nations
  - realms
  lexicon: HALOT
  rationale: 'Plural construct after צְבִי: ''the beauty of kingdoms.'' A straightforward
    rendering preserves the superlative/appositional force.'
- source_word: תִּפְאֶרֶת
  chosen: the splendor of
  alternatives:
  - the glory of
  - the beauty of
  lexicon: HALOT
  rationale: Denotes beauty, glory, or splendor. 'Splendor' differentiates it from
    צְבִי while retaining elevated diction suitable to the poetic line.
- source_word: גְּאוֹן
  chosen: pride
  alternatives:
  - majesty
  - arrogance
  - exaltation
  lexicon: HALOT
  rationale: The noun can denote majesty or pride, but in prophetic judgment contexts
    it often carries a negative sense of human arrogance. 'The Chaldeans’ pride' fits
    the denunciatory context while still allowing the phrase to describe Babylon's
    vaunted magnificence.
- source_word: כַּשְׂדִּים
  chosen: the Chaldeans’
  alternatives:
  - Chaldea's
  - the Babylonians’
  lexicon: HALOT
  rationale: The gentilic is best kept as 'Chaldeans' rather than generalized to 'Babylonians,'
    preserving the ethnic-historical term in the Hebrew.
- source_word: כְּמַהְפֵּכַת
  chosen: will be like ... overthrow
  alternatives:
  - will be like ... destruction
  - will be like ... overturning
  lexicon: HALOT
  rationale: 'The prefixed כ marks comparison: Babylon will be like the overthrow
    God brought on Sodom and Gomorrah. ''Overthrow'' is the conventional and semantically
    precise rendering for catastrophic divine destruction.'
- source_word: אֱלֹהִים
  chosen: God’s
  alternatives:
  - the overthrow God made
  - the overthrow by God
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the true God as the agent of the overthrow. The
    possessive construction in English ('God’s overthrow') is concise and natural.
- source_word: אֶת סְדֹם וְאֶת עֲמֹרָה
  chosen: of Sodom and Gomorrah
  alternatives:
  - of Sodom and of Gomorrah
  lexicon: HALOT
  rationale: Direct-object markers are not represented in English. The paired city
    names are conventionally rendered together as 'Sodom and Gomorrah.'
