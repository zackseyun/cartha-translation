id: ISA.13.4
reference: Isaiah 13:4
source:
  edition: WLC
  text: ק֥וֹל הָמ֛וֹן בֶּֽ/הָרִ֖ים דְּמ֣וּת עַם רָ֑ב ק֠וֹל שְׁא֞וֹן מַמְלְכ֤וֹת גּוֹיִם֙ נֶֽאֱסָפִ֔ים יְהוָ֣ה צְבָא֔וֹת מְפַקֵּ֖ד צְבָ֥א מִלְחָמָֽה־׃
translation:
  text: The sound of a multitude in the mountains, like a great people! The sound of an uproar of kingdoms, of nations gathered together! Yahweh of hosts is mustering an army for battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The sound of a multitude on the mountains.'
    reason: lexical_alternative
  - marker: b
    text: Or 'The sound of a tumult of kingdoms, of nations assembling.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֥וֹל
  chosen: The sound of
  alternatives:
  - A sound of
  - The noise of
  - The voice of
  lexicon: HALOT
  rationale: קוֹל commonly denotes sound/noise/voice. In this context of martial tumult, 'sound of' best introduces the auditory scene without implying speech ('voice'). Repeated in parallel clauses for rhetorical effect.
- source_word: הָמ֛וֹן
  chosen: a multitude
  alternatives:
  - tumult
  - crowd
  - roar
  lexicon: HALOT
  rationale: הָמוֹן can denote a multitude or a noisy throng. Here, paired with 'in the mountains' and followed by 'like a great people,' the sense of a large mass of people is primary, while the auditory force is already carried by קוֹל.
- source_word: בֶּהָרִים
  chosen: in the mountains
  alternatives:
  - on the mountains
  - in the hills
  lexicon: HALOT
  rationale: The preposition ב plus הָרִים is most naturally locative, 'in the mountains.' 'Mountains' preserves the elevated terrain imagery better than 'hills.'
- source_word: דְּמוּת
  chosen: like
  alternatives:
  - the likeness of
  - as the appearance of
  lexicon: HALOT
  rationale: 'Though formally ''likeness,'' in context it functions comparatively: the sound is like that of a great people. ''Like'' gives natural English while preserving the simile.'
- source_word: עַם רָב
  chosen: a great people
  alternatives:
  - a vast people
  - a great multitude of people
  - many people
  lexicon: HALOT
  rationale: עַם is 'people' and רַב here means great/numerous. 'A great people' preserves both the collective sense and the elevated register of the oracle.
- source_word: שְׁאוֹן
  chosen: an uproar
  alternatives:
  - a tumult
  - a din
  - a roaring
  lexicon: HALOT
  rationale: שְׁאוֹן denotes loud commotion or tumult. 'Uproar' is vivid, natural English and suits the military gathering context.
- source_word: מַמְלְכוֹת גּוֹיִם
  chosen: of kingdoms, of nations
  alternatives:
  - of kingdoms of nations
  - of royal realms of peoples
  lexicon: HALOT
  rationale: The construct-like sequence is somewhat appositional/intensive. Rendering both nouns explicitly as 'of kingdoms, of nations' preserves the piling up of political entities without over-smoothing.
- source_word: נֶאֱסָפִים
  chosen: gathered together
  alternatives:
  - being gathered
  - assembled
  - gathering
  lexicon: HALOT
  rationale: 'The Niphal participle of אסף is passive/reflexive in sense: ''gathered/assembled.'' ''Gathered together'' is idiomatic and conveys the collective mustering of nations.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the divine title יְהוָה צְבָאוֹת, 'hosts' is the established and concise rendering that preserves the breadth of heavenly/earthly armies. 'Armies' is possible but narrower and less suitable in the title.
- source_word: מְפַקֵּד
  chosen: is mustering
  alternatives:
  - is numbering
  - is appointing
  - is reviewing
  lexicon: HALOT
  rationale: פקד has a broad semantic range including muster, appoint, visit, number. With צְבָא מִלְחָמָה, the military sense 'is mustering' best fits the context of preparing forces for battle.
- source_word: צְבָא
  chosen: an army
  alternatives:
  - a host
  - forces
  lexicon: HALOT
  rationale: Here צָבָא refers to a military force rather than the broader 'host.' 'An army' is the clearest contextual rendering in modern English.
- source_word: מִלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  - of battle
  lexicon: HALOT
  rationale: The phrase צְבָא מִלְחָמָה denotes a military force for warfare. 'For battle' is idiomatic and avoids the slightly abstract 'army of war.'
