theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, with alternatives preserved only as needed. This verse does not require
    deviation from that policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of judgment in כָּל הָאָרֶץ
  chosen_reading: the whole earth
  alternative_readings:
  - the whole land
  rationale: The immediate context uses cosmic imagery ('from the end of the heavens'),
    favoring a universal scope rather than a merely local territorial one. The translation
    preserves the grandeur and severity of the oracle without narrowing it interpretively.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
