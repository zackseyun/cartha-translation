id: ISA.13.5
reference: Isaiah 13:5
source:
  edition: WLC
  text: בָּאִ֛ים מֵ/אֶ֥רֶץ מֶרְחָ֖ק מִ/קְצֵ֣ה הַ/שָּׁמָ֑יִם יְהוָה֙ וּ/כְלֵ֣י זַעְמ֔/וֹ
    לְ/חַבֵּ֖ל כָּל הָ/אָֽרֶץ־׃
translation:
  text: They are coming from a distant land, from the end of the heavens— the LORD
    and the weapons of his indignation— to destroy the whole earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the farthest reaches of the heavens.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and the instruments of his wrath.'
    reason: lexical_alternative
  - marker: c
    text: '''The whole earth'' may also be rendered ''the whole land,'' but the cosmic
      language in the verse favors the broader sense here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּאִים
  chosen: They are coming
  alternatives:
  - Those who come
  - They come
  lexicon: HALOT
  rationale: Masculine plural participle used substantivally; English supplies the
    subject as 'they' from context. Progressive 'are coming' reflects the participial,
    vivid prophetic portrayal better than a simple present.
- source_word: מֵאֶרֶץ מֶרְחָק
  chosen: from a distant land
  alternatives:
  - from a far country
  - from a remote land
  lexicon: HALOT
  rationale: אֶרֶץ commonly means 'land' here rather than 'earth' in contrast with
    the later כָּל הָאָרֶץ. מֶרְחָק denotes distance/remoteness; 'distant' is natural
    modern English.
- source_word: מִקְצֵה הַשָּׁמַיִם
  chosen: from the end of the heavens
  alternatives:
  - from the extremity of heaven
  - from the farthest reaches of the heavens
  lexicon: HALOT
  rationale: קָצֶה is 'end, extremity, edge.' The plural שָּׁמַיִם is best represented
    as 'the heavens' in prophetic diction. This preserves the cosmic scope of the
    expression.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the translation policy.
- source_word: וּכְלֵי זַעְמוֹ
  chosen: and the weapons of his indignation
  alternatives:
  - and the instruments of his wrath
  - and the weapons of his anger
  lexicon: HALOT
  rationale: כְּלִי can denote vessels, implements, or weapons; in a military-judgment
    context 'weapons' is the most specific fit. זַעַם is strong anger/fury, often
    in divine judgment; 'indignation' preserves solemnity without over-paraphrase.
- source_word: לְחַבֵּל
  chosen: to destroy
  alternatives:
  - to ruin
  - to devastate
  lexicon: HALOT
  rationale: The infinitive expresses purpose. The verb carries the sense of ruining
    or destroying; 'destroy' is the clearest and strongest fit in this judgment oracle.
- source_word: כָּל הָאָרֶץ
  chosen: the whole earth
  alternatives:
  - the whole land
  - all the earth
  lexicon: HALOT
  rationale: Given the cosmic language 'from the end of the heavens' and the universal
    scope of the oracle, 'earth' is preferable to 'land.' 'The whole earth' is idiomatic
    and preserves totality.
