  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of judgment in כָּל הָאָרֶץ
  chosen_reading: the whole earth
  alternative_readings:
  - the whole land
  rationale: The immediate context uses cosmic imagery ('from the end of the heavens'), favoring a universal scope rather than a merely local territorial one. The translation preserves the grandeur and severity of the oracle without narrowing it interpretively.
