theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton, preserving reverential convention and alignment with the translation philosophy.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Subject of יַשְׁמִיד
  chosen_reading: explicitly rendered as 'he will destroy,' referring to the LORD
  alternative_readings:
  - impersonal 'it will destroy,' referring to the day of the LORD
  rationale: The Hebrew verb is masculine singular and can naturally refer back to the LORD as the implied agent of the day's judgment. English 'he' makes the agency clear while preserving the theological point that the day is not autonomous but the LORD's act. The alternative is possible because 'day' is the immediate grammatical antecedent, but the personal subject better fits prophetic theology and the syntax of divine judgment.
