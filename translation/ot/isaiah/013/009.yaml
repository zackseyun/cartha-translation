id: ISA.13.9
reference: Isaiah 13:9
source:
  edition: WLC
  text: הִנֵּ֤ה יוֹם יְהוָה֙ בָּ֔א אַכְזָרִ֥י וְ/עֶבְרָ֖ה וַ/חֲר֣וֹן אָ֑ף לָ/שׂ֤וּם הָ/אָ֨רֶץ֙ לְ/שַׁמָּ֔ה וְ/חַטָּאֶ֖י/הָ יַשְׁמִ֥יד מִמֶּֽ/נָּה־׃
translation:
  text: Behold, the day of Yahweh is coming—cruel, with wrath and fierce anger—to make the land a desolation, and he will destroy its sinners from it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the day of Yahweh.' The Hebrew reads 'day of YHWH'; this translation follows the project's standard rendering 'the LORD' for the divine name.
    reason: alternative_reading
  - marker: b
    text: Or, 'and fury and burning anger.' The Hebrew piles up multiple terms for divine anger.
    reason: lexical_alternative
  - marker: c
    text: Or, 'the land' instead of 'the earth.' The Hebrew אֶרֶץ can mean either, but the broader context favors 'earth.'
    reason: lexical_alternative
  - marker: d
    text: The subject could also be understood as 'it'—that is, the day of the LORD will destroy its sinners from it.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the prophetic deictic force and solemnity of the announcement. 'Behold' is slightly elevated but still readable and fits judgment-oracle style better than the more casual 'look.'
- source_word: יוֹם יְהוָה
  chosen: the day of the LORD
  alternatives:
  - the LORD's day
  - the day of Yahweh
  lexicon: HALOT
  rationale: Standard prophetic expression for divine intervention in judgment. 'The LORD' follows the project's default rendering for יְהוָה. 'The LORD's day' is less idiomatic here and may evoke later Christian usage rather than the Hebrew prophetic formula.
- source_word: בָּא
  chosen: is coming
  alternatives:
  - comes
  - has come
  lexicon: HALOT
  rationale: The qatal here functions in prophetic announcement of an imminent/certain future event. English present progressive captures the vividness and certainty without flattening it into simple past.
- source_word: אַכְזָרִי
  chosen: cruel
  alternatives:
  - merciless
  - pitiless
  lexicon: HALOT
  rationale: Direct and natural rendering of the adjective, describing the character of the coming day in terms of unsparing judgment. 'Merciless' is possible but slightly more interpretive.
- source_word: וְעֶבְרָה
  chosen: with wrath
  alternatives:
  - and fury
  - and overflowing rage
  lexicon: HALOT
  rationale: עֶבְרָה commonly denotes wrath/fury. Rendered with 'with' in English to coordinate naturally with the preceding adjective and following phrase, preserving the piling up of judgment terms.
- source_word: וַחֲרוֹן אָף
  chosen: and fierce anger
  alternatives:
  - and burning anger
  - and the heat of anger
  lexicon: HALOT
  rationale: The idiom literally involves the burning/heat of anger. 'Fierce anger' communicates the sense idiomatically in modern English while preserving intensity.
- source_word: לָשׂוּם
  chosen: to make
  alternatives:
  - to set
  - to turn
  lexicon: HALOT
  rationale: 'Infinitive of purpose after the coming of the day: the day comes ''to make'' the earth something. ''Make'' is the most natural English equivalent in this construction.'
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In Isaiah 13, the scope of judgment is cosmic and international, not merely local territory. 'Earth' best fits the broader context, though 'land' is lexically possible.
- source_word: לְשַׁמָּה
  chosen: a desolation
  alternatives:
  - a wasteland
  - an object of horror
  lexicon: HALOT
  rationale: Conveys devastation and ruin. 'Desolation' preserves the prophetic register and broad semantic range better than the more concrete 'wasteland.'
- source_word: וְחַטָּאֶיהָ
  chosen: its sinners
  alternatives:
  - those who sin in it
  - its sinful ones
  lexicon: HALOT
  rationale: The noun with suffix refers to the earth's sinners/inhabitants characterized as sinful. 'Its sinners' is concise and faithful.
- source_word: יַשְׁמִיד
  chosen: he will destroy
  alternatives:
  - he will wipe out
  - he will exterminate
  lexicon: HALOT
  rationale: Hiphil of שׁמד expresses decisive destruction. The implicit subject is the LORD, acting through the day of judgment. 'Destroy' is strong without over-specifying.
- source_word: מִמֶּנָּה
  chosen: from it
  alternatives:
  - out of it
  - from her
  lexicon: HALOT
  rationale: Refers back to the feminine noun 'earth.' 'From it' is idiomatic in English and avoids over-personifying the earth in this context.
