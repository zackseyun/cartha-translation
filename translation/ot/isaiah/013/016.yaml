id: ISA.13.16
reference: Isaiah 13:16
source:
  edition: WLC
  text: וְ/עֹלְלֵי/הֶ֥ם יְרֻטְּשׁ֖וּ לְ/עֵֽינֵי/הֶ֑ם יִשַּׁ֨סּוּ֙ בָּֽתֵּי/הֶ֔ם וּ/נְשֵׁי/הֶ֖ם
    תשגלנה׃
translation:
  text: Their infants will be dashed to pieces before their eyes; their houses will
    be plundered, and their wives raped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their wives violated.' The Hebrew verb is a blunt term for sexual assault;
      'raped' is used in the main text to avoid euphemism.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹלְלֵיהֶם
  chosen: their infants
  alternatives:
  - their little children
  - their children
  lexicon: HALOT
  rationale: עֹלֵל refers to very young children/infants. 'Infants' best conveys the
    vulnerability and age implied, while remaining natural English. 'Little children'
    is possible but slightly broader.
- source_word: יְרֻטְּשׁוּ
  chosen: will be dashed to pieces
  alternatives:
  - will be dashed
  - will be smashed
  lexicon: HALOT
  rationale: The passive of רטש denotes violent smashing or dashing apart, often of
    children in warfare contexts. 'Dashed to pieces' preserves the brutality more
    clearly than the milder 'dashed' alone.
- source_word: לְעֵינֵיהֶם
  chosen: before their eyes
  alternatives:
  - in their sight
  lexicon: HALOT
  rationale: This idiom means the act occurs in full view of them. 'Before their eyes'
    is the most idiomatic modern English equivalent.
- source_word: יִשַּׁסּוּ
  chosen: will be plundered
  alternatives:
  - will be looted
  - will be pillaged
  lexicon: HALOT
  rationale: 'From שסה/שסס, the verb denotes despoiling or plundering. Because the
    subject is ''their houses,'' passive English is the natural rendering: ''their
    houses will be plundered.'' ''Looted'' is possible but slightly more colloquial.'
- source_word: בָּתֵּיהֶם
  chosen: their houses
  alternatives:
  - their homes
  lexicon: HALOT
  rationale: '''Houses'' is the direct lexical equivalent of בית here and fits the
    war-plunder context. ''Homes'' is more emotive but less formally tied to the concrete
    noun.'
- source_word: וּנְשֵׁיהֶם
  chosen: their wives
  alternatives:
  - their women
  lexicon: HALOT
  rationale: אִשָּׁה in this plural construct with 3mp suffix most naturally means
    'their wives.' 'Their women' is less specific and not required by the syntax.
- source_word: תשגלנה
  chosen: raped
  alternatives:
  - violated
  - ravished
  lexicon: HALOT
  rationale: The verb שגל is a coarse term for sexual violation. In this wartime judgment
    context, 'raped' states the sense plainly and accurately. 'Violated' is less explicit
    than the Hebrew warrants, and 'ravished' is archaic and potentially euphemistic.
