id: ISA.13.17
reference: Isaiah 13:17
source:
  edition: WLC
  text: הִנְ/נִ֛י מֵעִ֥יר עֲלֵי/הֶ֖ם אֶת מָדָ֑י אֲשֶׁר כֶּ֨סֶף֙ לֹ֣א יַחְשֹׁ֔בוּ וְ/זָהָ֖ב
    לֹ֥א יַחְפְּצוּ בֽ/וֹ־־־׃
translation:
  text: Behold, I am stirring up the Medes against them, who do not value silver and
    do not delight in gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not regard silver' and 'do not desire gold.' The Hebrew emphasizes
      that the Medes are not motivated by payment or attracted by wealth.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces the divine announcement with an attention-getting particle
    plus pronoun. 'Behold' preserves the prophetic force more formally than 'Look'
    or 'See' while remaining intelligible in modern English.
- source_word: מֵעִיר
  chosen: I am stirring up
  alternatives:
  - I am arousing
  - I am inciting
  - I will stir up
  lexicon: HALOT
  rationale: The Hiphil participle of עור conveys causing to awaken/arise. 'I am stirring
    up' is idiomatic English for raising a nation for action. The participial form
    supports a present-progressive or imminent sense rather than a simple future,
    though English future would also be possible in context.
- source_word: עֲלֵיהֶם
  chosen: against them
  alternatives:
  - upon them
  lexicon: HALOT
  rationale: With a hostile military context, על plus pronoun is best rendered 'against
    them' rather than the more spatially literal 'upon them'.
- source_word: אֶת מָדָי
  chosen: the Medes
  alternatives:
  - Media
  lexicon: HALOT
  rationale: Refers to the people group/nation. 'The Medes' is the standard English
    ethnonym and fits the military context better than the territorial name 'Media'.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces a relative clause describing the Medes as a people. 'Who'
    is appropriate for personal/ethnic referents in English.
- source_word: כֶּסֶף לֹא יַחְשֹׁבוּ
  chosen: do not value silver
  alternatives:
  - do not regard silver
  - do not account silver as anything
  - do not think about silver
  lexicon: HALOT
  rationale: חשב here means to reckon/regard/value, not merely to think mentally.
    In context the point is indifference to bribery or plunder as motivation. 'Do
    not value silver' expresses the idiom naturally.
- source_word: וְזָהָב לֹא יַחְפְּצוּ בוֹ
  chosen: and do not delight in gold
  alternatives:
  - and they do not desire gold
  - and they take no pleasure in gold
  lexicon: HALOT
  rationale: חפץ conveys taking pleasure in, desiring, or delighting in. 'Do not delight
    in gold' preserves the affective nuance, while also communicating lack of attraction
    to wealth. The pronoun בו is represented by 'in gold' in idiomatic English.
