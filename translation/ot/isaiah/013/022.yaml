id: ISA.13.22
reference: Isaiah 13:22
source:
  edition: WLC
  text: וְ/עָנָ֤ה אִיִּים֙ בְּ/אַלְמנוֹתָ֔י/ו וְ/תַנִּ֖ים בְּ/הֵ֣יכְלֵי עֹ֑נֶג וְ/קָר֤וֹב
    לָ/בוֹא֙ עִתָּ֔/הּ וְ/יָמֶ֖י/הָ לֹ֥א יִמָּשֵֽׁכוּ׃
translation:
  text: Hyenas will cry out in her palaces, and jackals in her luxurious halls. Her
    time is near to come, and her days will not be prolonged.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wild animals' or 'jackals' for 'hyenas'; the Hebrew term אִיִּים is
      uncertain in precise zoological reference.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word in 'her palaces' is difficult; some take it more literally
      as 'widows,' but the context strongly favors ruined noble dwellings or palaces.
    reason: lexical_alternative
  - marker: c
    text: Babylon is personified as a woman, hence 'her time' and 'her days.'
    reason: cultural_note
lexical_decisions:
- source_word: וְעָנָה
  chosen: will cry out
  alternatives:
  - will answer
  - will howl
  lexicon: HALOT
  rationale: The verb ענה in this stem can mean 'answer/respond,' but with animal
    subjects in a desolation oracle it idiomatically conveys vocal crying/howling.
    'Cry out' is natural English and leaves room for the eerie sound imagery without
    over-specifying.
- source_word: אִיִּים
  chosen: hyenas
  alternatives:
  - wild animals of the coast/desert
  - jackals
  lexicon: HALOT
  rationale: The precise zoological referent is uncertain in prophetic desolation
    texts. 'Hyenas' is a common modern rendering that fits scavenging animals haunting
    ruins. Because the identification is debated, an alternative is preserved in a
    footnote.
- source_word: בְּאַלְמְנוֹתָיו
  chosen: in her palaces
  alternatives:
  - in his palaces
  - in his/her widows
  - in deserted houses
  lexicon: HALOT
  rationale: The consonantal form is difficult and has generated debate. In context,
    parallel to 'luxurious halls' and referring to Babylon (feminine city), the sense
    is architectural, not literal 'widows.' English 'her palaces' reflects the city's
    personification and the likely contextual meaning of ruined noble dwellings.
- source_word: וְתַנִּים
  chosen: jackals
  alternatives:
  - serpents
  - dragons
  lexicon: HALOT
  rationale: In desolation contexts תנים commonly refers to jackals rather than mythic
    dragons or sea creatures. 'Jackals' is the most contextually plausible and accessible
    rendering.
- source_word: בְּהֵיכְלֵי עֹנֶג
  chosen: in her luxurious halls
  alternatives:
  - in palaces of delight
  - in pleasure temples
  lexicon: HALOT
  rationale: היכל denotes a large palace/temple-like structure; with עֹנֶג ('delight,
    luxury'), the phrase points to opulent royal buildings. 'Luxurious halls' is idiomatic
    modern English and preserves the contrast between former splendor and coming ruin.
- source_word: וְקָרוֹב לָבוֹא עִתָּהּ
  chosen: Her time is near to come
  alternatives:
  - Its time is near to come
  - The time for her coming destruction is near
  lexicon: HALOT
  rationale: The feminine suffix refers to Babylon personified as a woman/city. 'Her
    time' preserves that personification and keeps the Hebrew concise.
- source_word: וְיָמֶיהָ לֹא יִמָּשֵׁכוּ
  chosen: her days will not be prolonged
  alternatives:
  - her days will not be extended
  - her days will not be drawn out
  lexicon: HALOT
  rationale: משך in the Niphal here means 'be prolonged/extended.' 'Will not be prolonged'
    is clear modern English and preserves the sense that Babylon's remaining time
    is short.
