id: ISA.13.8
reference: Isaiah 13:8
source:
  edition: WLC
  text: וְֽ/נִבְהָ֓לוּ צִירִ֤ים וַֽ/חֲבָלִים֙ יֹֽאחֵז֔וּ/ן כַּ/יּוֹלֵדָ֖ה יְחִיל֑וּ/ן
    אִ֤ישׁ אֶל רֵעֵ֨/הוּ֙ יִתְמָ֔הוּ פְּנֵ֥י לְהָבִ֖ים פְּנֵי/הֶֽם׀־׃
translation:
  text: They will be dismayed; pains and labor pangs will seize them. They will writhe
    like a woman giving birth. Each man will stare at his neighbor; their faces will
    be faces of flame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their faces will be aflame.' The Hebrew literally says, 'their faces
      are faces of flames,' a vivid image that may suggest either fiery pallor/redness
      or terror made visible on the face.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִבְהָלוּ
  chosen: they will be dismayed
  alternatives:
  - they will be terrified
  - they will be panic-stricken
  lexicon: HALOT
  rationale: Niphal of בהל conveys sudden alarm, dismay, or panic. 'Be dismayed' preserves
    the passive/inchoative sense without over-intensifying beyond the Hebrew.
- source_word: צִירִים
  chosen: pains
  alternatives:
  - convulsions
  - anguish
  lexicon: HALOT
  rationale: The noun can denote pangs or intense pains, often in contexts of distress.
    Here it pairs with חֲבָלִים, so 'pains' gives a broad term while allowing the
    next noun to sharpen the childbirth imagery.
- source_word: וַחֲבָלִים
  chosen: labor pangs
  alternatives:
  - birth pains
  - writhing pains
  lexicon: HALOT
  rationale: In this context, especially followed by 'like a woman giving birth,'
    the term is best rendered with explicit childbirth language. 'Labor pangs' is
    natural modern English and fits the simile.
- source_word: יֹאחֵזוּן
  chosen: will seize them
  alternatives:
  - will grip them
  - will take hold of them
  lexicon: HALOT
  rationale: From אחז, 'to seize/grasp.' The plural subjects 'pains and labor pangs'
    take hold of the people. 'Seize them' is vivid and idiomatic.
- source_word: כַּיּוֹלֵדָה
  chosen: like a woman giving birth
  alternatives:
  - like a woman in labor
  - like a woman bearing a child
  lexicon: HALOT
  rationale: The participial form from ילד refers to a woman in the act of childbirth.
    'Giving birth' is clear and contemporary.
- source_word: יְחִילוּן
  chosen: they will writhe
  alternatives:
  - they will be in labor
  - they will tremble
  lexicon: HALOT
  rationale: From חול/חיל in contexts of labor-like anguish, the sense is writhing
    or convulsing in pain. 'Writhe' preserves the bodily intensity better than the
    more general 'tremble.'
- source_word: אִישׁ אֶל־רֵעֵהוּ
  chosen: each man ... at his neighbor
  alternatives:
  - one man ... at another
  - each one ... at his companion
  lexicon: HALOT
  rationale: 'The Hebrew is singular distributive: ''a man to his neighbor.'' Following
    the project''s gender-accurate principle, ''each man'' is retained rather than
    neutralizing to ''everyone,'' since the expression is idiomatic but grammatically
    masculine.'
- source_word: יִתְמָהוּ
  chosen: will stare
  alternatives:
  - will look in astonishment
  - will gaze aghast
  lexicon: HALOT
  rationale: The verb conveys looking in stunned astonishment. 'Stare' is concise
    and natural; the surrounding context already supplies the sense of terror.
- source_word: פְּנֵי לְהָבִים פְּנֵיהֶם
  chosen: their faces will be faces of flame
  alternatives:
  - their faces will be aflame
  - their faces will be flushed like flames
  lexicon: HALOT
  rationale: Literally, 'faces of flames are their faces.' The phrase is metaphorical
    and vivid. 'Faces of flame' preserves the Hebrew imagery more closely than smoothing
    it to a purely interpretive expression such as 'flushed with fear.'
