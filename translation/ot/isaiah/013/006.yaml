id: ISA.13.6
reference: Isaiah 13:6
source:
  edition: WLC
  text: הֵילִ֕ילוּ כִּ֥י קָר֖וֹב י֣וֹם יְהוָ֑ה כְּ/שֹׁ֖ד מִ/שַּׁדַּ֥י יָבֽוֹא׃
translation:
  text: Wail, for the day of the LORD is near; it will come like destruction from
    the Almighty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Howl'; the Hebrew imperative calls for a loud cry of grief or terror.
    reason: lexical_alternative
  - marker: b
    text: Hebrew has a wordplay between 'destruction' (shod) and 'the Almighty' (Shaddai).
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵילִילוּ
  chosen: Wail
  alternatives:
  - Howl
  - Lament
  lexicon: HALOT
  rationale: Imperative plural from ילל, a cry of lament/distress. 'Wail' is natural
    modern English and preserves the force of a public cry better than the slightly
    harsher 'howl,' while remaining more vivid than 'lament.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the imperative. 'For' fits concise prophetic
    style in English.
- source_word: קָרוֹב
  chosen: is near
  alternatives:
  - is close
  - draws near
  lexicon: HALOT
  rationale: Predicate adjective expressing imminence. 'Is near' is the standard,
    clear rendering in judgment contexts.
- source_word: יוֹם יְהוָה
  chosen: the day of the LORD
  alternatives:
  - the LORD's day
  lexicon: HALOT
  rationale: 'Established prophetic expression for YHWH''s decisive day of judgment/intervention.
    The divine name follows doctrine default: יְהוָה rendered ''the LORD.'' ''The
    LORD''s day'' is possible but less idiomatic for this OT formula.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: כְּשֹׁד
  chosen: like destruction
  alternatives:
  - like devastation
  - as spoil/plunder
  lexicon: HALOT
  rationale: The noun שֹׁד in prophetic judgment contexts commonly denotes violent
    destruction/devastation rather than 'spoil' as an object. 'Like destruction' best
    fits the simile and the following source phrase.
- source_word: מִשַּׁדַּי
  chosen: from the Almighty
  alternatives:
  - from Shaddai
  lexicon: HALOT
  rationale: 'The preposition מן marks source: the destruction comes ''from'' Shaddai.
    The divine title שַׁדַּי is translated rather than transliterated, in keeping
    with the philosophy of translating titles. ''The Almighty'' is the conventional
    and contextually fitting rendering.'
- source_word: יָבֹוא
  chosen: it will come
  alternatives:
  - he will come
  - comes
  lexicon: HALOT
  rationale: Masculine singular verb with an impersonal or antecedent reference to
    the 'day' or the impending destruction. English idiom favors impersonal 'it will
    come' for the foretold event. Future sense suits the prophetic announcement of
    imminent judgment.
