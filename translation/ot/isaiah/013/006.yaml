theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.' This also aligns with the prophetic formula 'day of the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering שַׁדַּי
  chosen_reading: the Almighty
  alternative_readings:
  - Shaddai
  rationale: As a divine title rather than a personal name, it is translated to preserve
    meaning in English. This also preserves the wordplay/sound association between
    שֹׁד and שַׁדַּי without forcing an unnatural transliteration in the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §2: Translate titles; transliterate
    names'
