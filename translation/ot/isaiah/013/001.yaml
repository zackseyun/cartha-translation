theological_decisions:
- issue: Rendering of prophetic superscription מַשָּׂא
  chosen_reading: The heading is translated as 'oracle concerning Babylon' rather
    than a more literal but opaque 'burden of Babylon.'
  alternative_readings:
  - The burden of Babylon
  - The pronouncement against Babylon
  rationale: 'This reflects optimal equivalence: preserving the prophetic heading''s
    force while using readable modern English. ''Concerning Babylon'' is broad enough
    to cover the genitive relation without prematurely narrowing it, though the chapter''s
    content is judgmental.'
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
