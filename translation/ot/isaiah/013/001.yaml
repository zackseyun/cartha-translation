id: ISA.13.1
reference: Isaiah 13:1
source:
  edition: WLC
  text: מַשָּׂ֖א בָּבֶ֑ל אֲשֶׁ֣ר חָזָ֔ה יְשַׁעְיָ֖הוּ בֶּן אָמֽוֹץ־׃
translation:
  text: The oracle concerning Babylon, which Isaiah son of Amoz saw.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The burden of Babylon' or 'The pronouncement against Babylon.' The Hebrew
      מַשָּׂא is a prophetic heading for a weighty message, often one of judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשָּׂא
  chosen: oracle
  alternatives:
  - burden
  - pronouncement
  lexicon: HALOT
  rationale: In prophetic superscriptions, מַשָּׂא commonly introduces a weighty prophetic
    utterance, often of judgment. 'Oracle' is clear modern English and fits the genre
    better than the more traditional but potentially misleading 'burden.' 'Pronouncement'
    is possible but less idiomatic here.
- source_word: בָּבֶל
  chosen: Babylon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces the relative clause modifying 'oracle.' 'Which' reads naturally
    in English in this formal superscription style.
- source_word: חָזָה
  chosen: saw
  alternatives:
  - beheld
  - received in vision
  lexicon: HALOT
  rationale: The Hebrew verb is the ordinary verb 'to see,' often used for prophetic
    vision. 'Saw' preserves the source wording and leaves the visionary nuance to
    context rather than over-interpreting with 'received in vision.'
- source_word: יְשַׁעְיָהוּ
  chosen: Isaiah
  lexicon: HALOT
  rationale: Standard English transliteration of the prophet's name.
- source_word: בֶּן
  chosen: son of
  lexicon: HALOT
  rationale: Standard genealogical expression in English.
- source_word: אָמֽוֹץ
  chosen: Amoz
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
