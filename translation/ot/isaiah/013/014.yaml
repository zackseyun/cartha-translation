theological_decisions:
- issue: Gendered distributive noun אִישׁ
  chosen_reading: Render first occurrence as 'each man' and second distributively
    as 'each'
  alternative_readings:
  - each person
  - everyone
  rationale: The Hebrew uses masculine singular distributively. Per doctrine, gender-accurate
    rendering is preferred over flattening to gender-neutral. The second clause omits
    repeating 'man' for natural English while retaining the same referent.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
