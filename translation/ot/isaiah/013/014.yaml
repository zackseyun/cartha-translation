id: ISA.13.14
reference: Isaiah 13:14
source:
  edition: WLC
  text: וְ/הָיָה֙ כִּ/צְבִ֣י מֻדָּ֔ח וּ/כְ/צֹ֖אן וְ/אֵ֣ין מְקַבֵּ֑ץ אִ֤ישׁ אֶל עַמּ/וֹ֙
    יִפְנ֔וּ וְ/אִ֥ישׁ אֶל אַרְצ֖/וֹ יָנֽוּסוּ־־׃
translation:
  text: And it will be like a hunted gazelle, and like sheep with no one to gather
    them; each man will turn to his own people, and each will flee to his own land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a gazelle driven away'; the Hebrew participle can mean 'driven
      away' or 'chased off,' not only 'hunted.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each man' in a distributive sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will be
  alternatives:
  - And it shall be
  - And he/it became
  lexicon: HALOT
  rationale: The qatal of היה with prefixed conjunction introduces the resulting state
    in prophetic discourse. Future-oriented English fits the oracle context better
    than a simple past.
- source_word: כִּצְבִי
  chosen: like a hunted gazelle
  alternatives:
  - like a gazelle
  - like a roe/deer
  lexicon: HALOT
  rationale: צְבִי denotes a gazelle/deer-like animal; 'gazelle' is the most natural
    modern rendering. The comparison emphasizes skittish vulnerability. 'Hunted' is
    supplied from the following participle as part of the phrase.
- source_word: מֻדָּח
  chosen: hunted
  alternatives:
  - driven away
  - banished
  - chased
  lexicon: HALOT
  rationale: The passive participle from נדח conveys being driven away or chased off.
    In the simile with a gazelle, 'hunted' captures the image idiomatically without
    over-paraphrasing.
- source_word: וּכְצֹאן
  chosen: and like sheep
  alternatives:
  - and like a flock
  - and like small cattle/sheep
  lexicon: HALOT
  rationale: צֹאן can denote small livestock collectively, but 'sheep' best fits the
    following image of needing a gatherer and is standard, clear English.
- source_word: וְאֵין מְקַבֵּץ
  chosen: with no one to gather them
  alternatives:
  - and there is no one gathering
  - and with no gatherer
  lexicon: HALOT
  rationale: The existential אין plus participle expresses absence of anyone to collect
    the scattered animals. English idiom prefers 'with no one to gather them.' 'Them'
    is implied by the sheep image.
- source_word: אִישׁ אֶל עַמּוֹ
  chosen: each man will turn to his own people
  alternatives:
  - each one will turn to his own people
  - a man to his people will turn
  lexicon: HALOT
  rationale: אִישׁ is grammatically masculine singular used distributively. Per translation
    philosophy, 'each man' preserves the gendered representative form. 'People' is
    the natural sense of עַם here.
- source_word: יִפְנוּ
  chosen: will turn
  alternatives:
  - will look
  - will return
  lexicon: HALOT
  rationale: פנה commonly means turn/turn oneself toward. In context of dispersal,
    'turn to' conveys reorientation toward one's own people.
- source_word: וְאִישׁ אֶל אַרְצוֹ יָנוּסוּ
  chosen: and each will flee to his own land
  alternatives:
  - and each man will flee to his own country
  - and each will escape to his own land
  lexicon: HALOT
  rationale: נוּס means flee. אֶרֶץ here is best rendered 'land' rather than 'earth.'
    I varied from repeating 'man' to avoid stiffness while preserving the distributive
    sense already established in the prior clause.
