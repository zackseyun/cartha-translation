id: ISA.13.7
reference: Isaiah 13:7
source:
  edition: WLC
  text: עַל כֵּ֖ן כָּל יָדַ֣יִם תִּרְפֶּ֑ינָה וְ/כָל לְבַ֥ב אֱנ֖וֹשׁ יִמָּס־־־׃
translation:
  text: Therefore all hands will grow weak, and every human heart will melt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every man's heart' or 'every mortal heart.' The Hebrew אֱנוֹשׁ refers
      generically to a human being, often with an overtone of frailty.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore
  lexicon: HALOT
  rationale: The phrase marks a logical/resultative conclusion from the preceding
    announcement of judgment. 'Therefore' is concise, natural English and preserves
    the inferential force.
- source_word: כָּל יָדַיִם
  chosen: all hands
  alternatives:
  - every hand
  lexicon: HALOT
  rationale: The Hebrew uses the plural 'hands' collectively. Retaining 'all hands'
    preserves the vivid bodily imagery of strength and action failing, rather than
    abstracting it.
- source_word: תִּרְפֶּינָה
  chosen: will grow weak
  alternatives:
  - will become limp
  - will be feeble
  - will slacken
  lexicon: HALOT
  rationale: From רפה, the sense is of becoming slack, weak, or limp. 'Will grow weak'
    communicates the idiom clearly in modern English while preserving the image of
    failing strength.
- source_word: וְכָל לְבַב אֱנוֹשׁ
  chosen: and every human heart
  alternatives:
  - and every man's heart
  - and every mortal heart
  lexicon: HALOT
  rationale: לְבַב is 'heart' in the sense of inner courage or resolve. אֱנוֹשׁ emphasizes
    human/mortal frailty. 'Every human heart' preserves the generic singular and avoids
    importing male-specific reference where the Hebrew is representative of humanity.
- source_word: יִמָּס
  chosen: will melt
  alternatives:
  - will dissolve
  - will lose courage
  lexicon: HALOT
  rationale: The verb literally means 'to melt' and is a common metaphor for fear
    or collapse of courage. Keeping 'will melt' preserves the Hebrew image and allows
    readers to sense the metaphor directly.
