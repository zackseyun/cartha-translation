theological_decisions:
- issue: Rendering of אֱנוֹשׁ in a generic-human expression
  chosen_reading: human
  alternative_readings:
  - man
  - mortal
  rationale: The noun denotes a human being with an overtone of frailty/mortality.
    In this context it is generic rather than male-specific. 'Human' best matches
    the representative force while remaining natural English; 'mortal' is possible
    but slightly more interpretive. This follows the gender-accurate principle without
    flattening the anthropological nuance.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 4; Contested terms
    table on אָדָם by analogy of gender-accurate human reference
