theological_decisions:
- issue: Whether 'my consecrated ones' refers to morally holy people or to agents
    set apart for divine judgment
  chosen_reading: agents consecrated/set apart by God for the purpose of executing
    judgment
  alternative_readings:
  - holy ones in a moral or angelic sense
  rationale: The immediate context is the mustering of forces against Babylon. The
    language of consecration here is functional rather than a statement about the
    moral status of the agents.
  doctrine_reference: Translation philosophy §1, §3
- issue: How to construe עַלִּיזֵי גַּאֲוָתִי
  chosen_reading: a description of the summoned warriors as 'my proudly exulting ones'
  alternative_readings:
  - those who rejoice in my majesty
  - those who exult in my triumph
  rationale: The Hebrew phrase is compressed and admits more than one nuance. The
    main text keeps the wording close to the source while preserving a more interpretive
    alternative in a footnote.
  doctrine_reference: Translation philosophy §3
