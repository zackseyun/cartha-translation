id: ISA.13.3
reference: Isaiah 13:3
source:
  edition: WLC
  text: אֲנִ֥י צִוֵּ֖יתִי לִ/מְקֻדָּשָׁ֑/י גַּ֣ם קָרָ֤אתִי גִבּוֹרַ/י֙ לְ/אַפִּ֔/י
    עַלִּיזֵ֖י גַּאֲוָתִֽ/י׃
translation:
  text: I myself have commanded my consecrated ones; I have also summoned my warriors
    for my anger, my proudly exulting ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'those who rejoice in my majesty' or 'those who exult in my triumph.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  chosen: I myself
  alternatives:
  - I
  lexicon: HALOT
  rationale: The independent pronoun is explicit and emphatic alongside the verb forms;
    'I myself' preserves the emphasis better than a simple 'I'.
- source_word: צִוֵּיתִי
  chosen: have commanded
  alternatives:
  - commanded
  - appointed
  lexicon: HALOT
  rationale: Piel of צוה commonly means 'command, commission.' Present perfect English
    fits the prophetic declaration of completed divine action with present relevance.
- source_word: לִמְקֻדָּשַׁי
  chosen: my consecrated ones
  alternatives:
  - my sanctified ones
  - those set apart for me
  lexicon: HALOT
  rationale: From קדשׁ in the passive participial form with 1cs suffix. 'Consecrated
    ones' preserves the set-apart sense without implying moral holiness; in context
    these are agents set apart for God's purpose of judgment.
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: HALOT
  rationale: Adds a second coordinated divine action after 'have commanded'; 'also'
    is the most natural connective in English.
- source_word: קָרָאתִי
  chosen: have summoned
  alternatives:
  - have called
  - called
  lexicon: HALOT
  rationale: קרא can mean 'call' broadly, but here in a military/judgment context
    'summoned' makes the sense more explicit while remaining faithful.
- source_word: גִּבּוֹרַי
  chosen: my warriors
  alternatives:
  - my mighty ones
  - my heroes
  lexicon: HALOT
  rationale: גבור denotes strength or valor. 'Warriors' fits the martial context of
    mustering forces for judgment better than the more ambiguous 'mighty ones,' though
    that remains a viable alternative.
- source_word: לְאַפִּי
  chosen: for my anger
  alternatives:
  - for my wrath
  - for my nose/anger
  lexicon: HALOT
  rationale: 'אַף literally relates to ''nose'' but idiomatically means anger/wrath.
    ''For my anger'' reflects the lamed of purpose/reference: they are summoned to
    execute God''s anger.'
- source_word: עַלִּיזֵי
  chosen: exulting ones
  alternatives:
  - rejoicing ones
  - triumphant ones
  lexicon: HALOT
  rationale: The adjective conveys jubilant exultation. 'Exulting ones' preserves
    the elevated tone and links naturally with the following genitive-like construction.
- source_word: גַּאֲוָתִי
  chosen: my proudly exulting ones
  alternatives:
  - my majesty
  - my pride
  - my triumph
  lexicon: HALOT
  rationale: גאוה can denote pride, exaltation, or majesty. In this construction with
    עַלִּיזֵי, the phrase is difficult. Rendering it adjectivally as 'my proudly exulting
    ones' captures the likely sense of those who exult in God's exaltation/triumph,
    while avoiding an overly abstract English phrase. The alternative 'those who rejoice
    in my majesty' is preserved in a footnote because the Hebrew can be construed
    that way.
