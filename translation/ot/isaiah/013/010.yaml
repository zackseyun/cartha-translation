id: ISA.13.10
reference: Isaiah 13:10
source:
  edition: WLC
  text: כִּֽי כוֹכְבֵ֤י הַ/שָּׁמַ֨יִם֙ וּ/כְסִ֣ילֵי/הֶ֔ם לֹ֥א יָהֵ֖לּוּ אוֹרָ֑/ם חָשַׁ֤ךְ
    הַ/שֶּׁ֨מֶשׁ֙ בְּ/צֵאת֔/וֹ וְ/יָרֵ֖חַ לֹֽא יַגִּ֥יהַ אוֹרֽ/וֹ־־׃
translation:
  text: For the stars of the heavens and their constellations will not give their
    light; the sun is darkened at its rising, and the moon will not make its light
    shine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and their Orions.' The Hebrew term can refer specifically to Orion,
      but here may function more broadly for the constellations.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding judgment statement.
    'For' fits the discourse flow naturally in English.
- source_word: כוֹכְבֵי הַשָּׁמַיִם
  chosen: the stars of the heavens
  alternatives:
  - the stars of heaven
  - the heavenly stars
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the Hebrew genitive construction
    and the elevated prophetic style.
- source_word: וּכְסִילֵיהֶם
  chosen: and their constellations
  alternatives:
  - and their Orions
  - and their great stars
  lexicon: HALOT
  rationale: כְּסִיל can denote the constellation Orion, but in plural with 3mp suffix
    here it is best rendered more generally as 'constellations.' This preserves the
    cosmic imagery without forcing a single named constellation into an English plural
    expression.
- source_word: לֹא יָהֵלּוּ אוֹרָם
  chosen: will not give their light
  alternatives:
  - will not shine their light
  - will not flash forth their light
  lexicon: HALOT
  rationale: The Hiphil of הלל here conveys emitting or causing light to shine. 'Give
    their light' is idiomatic, clear, and faithful to the sense.
- source_word: חָשַׁךְ
  chosen: is darkened
  alternatives:
  - grows dark
  - is dark
  lexicon: HALOT
  rationale: Though morphologically a perfect, in prophetic description it functions
    well as a vivid present/passive-like statement in English. 'Is darkened' captures
    the eventive force and keeps the poetic solemnity.
- source_word: הַשֶּׁמֶשׁ בְּצֵאתוֹ
  chosen: the sun is darkened at its rising
  alternatives:
  - the sun grows dark when it rises
  - the sun is dark at its rising
  lexicon: HALOT
  rationale: בְּצֵאתוֹ is literally 'at its going out/coming forth,' idiomatically
    referring to sunrise. 'At its rising' is the clearest natural English equivalent.
- source_word: וְיָרֵחַ
  chosen: and the moon
  lexicon: HALOT
  rationale: Direct and standard rendering of the common noun.
- source_word: לֹא יַגִּיהַ אוֹרוֹ
  chosen: will not make its light shine
  alternatives:
  - will not shine its light
  - will not cause its light to gleam
  lexicon: HALOT
  rationale: 'The Hiphil of נגהּ is causative: ''cause to shine.'' ''Make its light
    shine'' preserves that nuance better than the simpler ''shine,'' while remaining
    readable.'
