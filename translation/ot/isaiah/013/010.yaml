theological_decisions:
- issue: Nature of the cosmic-darkening language
  chosen_reading: Render as direct cosmic imagery without interpreting it in the translation
    as either purely literal astronomical collapse or merely metaphorical political
    upheaval.
  alternative_readings:
  - Literal end-time cosmic disturbance
  - Figurative prophetic language for the fall of earthly powers
  rationale: The Hebrew presents cosmic de-creation imagery in a judgment oracle.
    The translation should preserve the imagery and theological weight without resolving
    the interpretive question in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
