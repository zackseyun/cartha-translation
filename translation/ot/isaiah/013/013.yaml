theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering יְהוָה צְבָאוֹת
  chosen_reading: the LORD of Armies
  alternative_readings:
  - the LORD of Hosts
  rationale: The divine title is translated for meaning rather than retained in traditional
    ecclesiastical form. 'Armies' makes the martial sense of צְבָאוֹת transparent
    in contemporary English while preserving the title's force.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, 'Translate titles; transliterate
    names'; Contested terms for יְהוָה
