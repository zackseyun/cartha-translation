id: ISA.13.13
reference: Isaiah 13:13
source:
  edition: WLC
  text: עַל כֵּן֙ שָׁמַ֣יִם אַרְגִּ֔יז וְ/תִרְעַ֥שׁ הָ/אָ֖רֶץ מִ/מְּקוֹמָ֑/הּ בְּ/עֶבְרַת֙
    יְהוָ֣ה צְבָא֔וֹת וּ/בְ/י֖וֹם חֲר֥וֹן אַפּֽ/וֹ־׃
translation:
  text: Therefore I will make the heavens tremble, and the earth will shake from its
    place, at the fury of the LORD of Armies, in the day of his burning anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the LORD of Hosts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore
  lexicon: HALOT
  rationale: A standard inferential connector introducing the consequence of the preceding
    judgment announcement. 'Therefore' is concise and natural in English.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: The Hebrew plural commonly denotes the heavens/sky. 'The heavens' preserves
    the elevated cosmic scope of the judgment oracle better than the flatter 'sky'.
- source_word: אַרְגִּיז
  chosen: I will make ... tremble
  alternatives:
  - I will shake
  - I will make ... quake
  lexicon: HALOT
  rationale: 'Hiphil of רגז is causative: Yahweh causes the heavens to be disturbed.
    ''Make ... tremble'' captures the causative force and pairs well with the following
    verb for the earth.'
- source_word: וְתִרְעַשׁ
  chosen: and ... will shake
  alternatives:
  - and ... will quake
  - and ... will tremble
  lexicon: HALOT
  rationale: Qal of רעשׁ describes seismic shaking. 'Shake' is idiomatic and distinct
    enough from 'tremble' in the first clause to preserve the parallelism without
    sounding repetitive.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic-judgment context, 'earth' is preferable to 'land,' since
    the verse contrasts heavens and earth as the whole created order.
- source_word: מִמְּקוֹמָהּ
  chosen: from its place
  alternatives:
  - out of its place
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase. 'From its place'
    is natural English and conveys displacement.
- source_word: בְּעֶבְרַת
  chosen: at the fury of
  alternatives:
  - in the wrath of
  - because of the rage of
  lexicon: HALOT
  rationale: עֶבְרָה denotes overflowing wrath/fury. 'Fury' communicates intense divine
    anger in accessible modern English.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' For צְבָאוֹת, 'of Armies'
    translates the title rather than preserving the traditional but less transparent
    'of Hosts,' and fits the martial judgment context.
- source_word: וּבְיוֹם
  chosen: in the day of
  alternatives:
  - on the day of
  - in the time of
  lexicon: HALOT
  rationale: A conventional temporal expression. 'In the day of' preserves the prophetic
    idiom without obscuring meaning.
- source_word: חֲרוֹן אַפּוֹ
  chosen: his burning anger
  alternatives:
  - the burning of his anger
  - his fierce anger
  - his wrath
  lexicon: HALOT
  rationale: The construct phrase literally evokes the burning/heat of anger. 'His
    burning anger' preserves the metaphor and reads naturally in English.
