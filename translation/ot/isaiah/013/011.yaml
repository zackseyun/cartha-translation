id: ISA.13.11
reference: Isaiah 13:11
source:
  edition: WLC
  text: וּ/פָקַדְתִּ֤י עַל תֵּבֵל֙ רָעָ֔ה וְ/עַל רְשָׁעִ֖ים עֲוֺנָ֑/ם וְ/הִשְׁבַּתִּי֙
    גְּא֣וֹן זֵדִ֔ים וְ/גַאֲוַ֥ת עָרִיצִ֖ים אַשְׁפִּֽיל־־׃
translation:
  text: And I will punish the world for its evil, and the wicked for their iniquity;
    I will put an end to the pride of the arrogant, and I will humble the haughtiness
    of the ruthless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the inhabited world' for 'the world.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will bring low the pride of the ruthless.' The Hebrew uses two near-synonymous
      expressions for arrogant exaltation in parallel lines.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָקַדְתִּי
  chosen: I will punish
  alternatives:
  - I will visit
  - I will attend to
  - I will call to account
  lexicon: HALOT
  rationale: פָקַד has a broad range including visit, attend to, muster, appoint,
    and punish. With עַל plus objects denoting evil and the wicked, the sense is punitive
    visitation or judgment. 'Punish' makes the judicial force explicit in natural
    English without over-paraphrasing.
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  - the earth
  lexicon: HALOT
  rationale: תֵּבֵל commonly denotes the world in the sense of the inhabited earth.
    'The world' is idiomatic and sufficiently broad here, while still fitting the
    cosmic scope of the oracle.
- source_word: רָעָה
  chosen: its evil
  alternatives:
  - evil
  - wickedness
  - disaster
  lexicon: HALOT
  rationale: Here רָעָה refers to moral evil rather than calamity, since it is paired
    with 'the wicked' and 'their iniquity.' Supplying 'its' in English clarifies the
    relation to 'the world' and reflects the Hebrew construction in context.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evildoers
  lexicon: HALOT
  rationale: A standard rendering for the plural adjective/substantive. 'The wicked'
    preserves the concise, class-denoting force of the Hebrew.
- source_word: עֲוֺנָם
  chosen: their iniquity
  alternatives:
  - their guilt
  - their sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for guilt. Here it is
    the moral offense for which the wicked are punished. 'Iniquity' preserves the
    ethical weight and avoids flattening the term to a generic 'wrongdoing.'
- source_word: וְהִשְׁבַּתִּי
  chosen: I will put an end to
  alternatives:
  - I will cause to cease
  - I will stop
  lexicon: HALOT
  rationale: The Hiphil of שׁבת means to cause to cease. 'Put an end to' is a natural
    English equivalent that preserves the causative force.
- source_word: גְּאוֹן
  chosen: the pride
  alternatives:
  - the exaltation
  - the majesty
  lexicon: HALOT
  rationale: Though גְּאוֹן can be positive in some contexts, here with זֵדִים it
    clearly has a negative sense of proud self-exaltation. 'Pride' best fits the judgment
    context.
- source_word: זֵדִים
  chosen: the arrogant
  alternatives:
  - the presumptuous
  - the insolent
  - the proud
  lexicon: HALOT
  rationale: זֵדִים denotes insolent, presumptuous, arrogant people. 'The arrogant'
    pairs well with 'pride' and preserves the moral character of the group.
- source_word: וְגַאֲוַת
  chosen: the haughtiness
  alternatives:
  - the pride
  - the loftiness
  lexicon: HALOT
  rationale: Using 'haughtiness' here differentiates this near-synonym from the previous
    גְּאוֹן while preserving the semantic field of arrogant elevation.
- source_word: עָרִיצִים
  chosen: the ruthless
  alternatives:
  - the tyrants
  - the terrifying ones
  lexicon: HALOT
  rationale: עָרִיץ often refers to ruthless, violent, oppressive persons. 'The ruthless'
    captures the moral and social force without narrowing the term to formal political
    rulers.
- source_word: אַשְׁפִּיל
  chosen: I will humble
  alternatives:
  - I will bring low
  - I will abase
  lexicon: HALOT
  rationale: The Hiphil of שׁפל means to make low or humble. 'I will humble' is clear,
    idiomatic, and preserves the reversal imagery of divine judgment.
