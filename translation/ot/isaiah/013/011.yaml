theological_decisions:
- issue: Scope of divine judgment in תֵּבֵל
  chosen_reading: the verse speaks of God's judgment on the world in its inhabited,
    human order, not merely on Babylon in isolation
  alternative_readings:
  - the land
  - Babylon alone as a synecdoche for the world
  rationale: Within Isaiah 13 the oracle targets Babylon, yet this verse uses the
    broader term תֵּבֵל and universal moral language ('the wicked,' 'their iniquity').
    The translation preserves that wider scope rather than narrowing it interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
