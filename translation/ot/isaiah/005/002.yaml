theological_decisions:
- issue: Metaphorical vineyard language later interpreted as Israel (vv. 7ff.)
  chosen_reading: Retain the agricultural imagery without importing the interpretation
    into the verse itself.
  alternative_readings:
  - Translate in a way that anticipates the allegorical referent more explicitly
  rationale: The verse itself presents the vineyard song in concrete imagery. The
    translation should preserve the metaphorical tension and allow the later explanation
    in context to interpret it.
  doctrine_reference: Preserve theological tension rather than resolve it.
