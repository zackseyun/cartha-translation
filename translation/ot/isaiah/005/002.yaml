id: ISA.5.2
reference: Isaiah 5:2
source:
  edition: WLC
  text: וַֽ/יְעַזְּקֵ֣/הוּ וַֽ/יְסַקְּלֵ֗/הוּ וַ/יִּטָּעֵ֨/הוּ֙ שֹׂרֵ֔ק וַ/יִּ֤בֶן
    מִגְדָּל֙ בְּ/תוֹכ֔/וֹ וְ/גַם יֶ֖קֶב חָצֵ֣ב בּ֑/וֹ וַ/יְקַ֛ו לַ/עֲשׂ֥וֹת עֲנָבִ֖ים
    וַ/יַּ֥עַשׂ בְּאֻשִֽׁים־׃
translation:
  text: He dug it up, cleared it of stones, and planted it with choice vines; he built
    a tower in its midst, and also hewed out a winepress in it. Then he expected it
    to produce grapes, but it produced wild grapes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worthless grapes' or 'bad fruit'; the Hebrew term refers to poor or
      foul fruit, not the good grapes that were expected.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְעַזְּקֵהוּ
  chosen: dug it up
  alternatives:
  - hoed it
  - spaded it
  - prepared/tilled it
  lexicon: HALOT
  rationale: The verb denotes working or digging the soil of a vineyard. 'Dug it up'
    is natural modern English and fits vineyard preparation better than the less familiar
    'hoed it' while preserving the agricultural image.
- source_word: וַיְסַקְּלֵהוּ
  chosen: cleared it of stones
  alternatives:
  - stoned it
  - removed its stones
  lexicon: HALOT
  rationale: In vineyard context the piel verb means removing stones from the field,
    not throwing stones at it. 'Cleared it of stones' makes the sense explicit and
    idiomatic.
- source_word: שֹׂרֵק
  chosen: choice vines
  alternatives:
  - choice vine
  - red vine
  - select vine
  lexicon: HALOT
  rationale: The noun refers to a high-quality grapevine/choice stock. Because English
    commonly speaks of planting a vineyard with vines, the plural 'choice vines' communicates
    the collective sense more naturally than the singular.
- source_word: מִגְדָּל
  chosen: tower
  alternatives:
  - watchtower
  lexicon: HALOT
  rationale: The basic sense is 'tower.' In vineyard context it likely functions as
    a watchtower, but the Hebrew itself is simply 'tower,' so the more direct rendering
    is preferred.
- source_word: בְּתוֹכוֹ
  chosen: in its midst
  alternatives:
  - in the middle of it
  - within it
  lexicon: HALOT
  rationale: This preserves the spatial imagery and slightly elevated poetic tone
    appropriate to Isaiah while remaining clear.
- source_word: יֶקֶב
  chosen: winepress
  alternatives:
  - wine vat
  lexicon: HALOT
  rationale: The term denotes the winepress/vat installation. 'Winepress' is the most
    familiar general rendering in English.
- source_word: חָצֵב
  chosen: hewed out
  alternatives:
  - cut out
  - dug out
  lexicon: HALOT
  rationale: The verb commonly means hewing or quarrying from rock. 'Hewed out' preserves
    the vividness of carving a press from stone.
- source_word: וַיְקַו
  chosen: he expected
  alternatives:
  - he waited
  - he hoped
  lexicon: HALOT
  rationale: The verb can mean wait for/hope for/look for. In this agricultural setup,
    'expected' best conveys justified anticipation after careful preparation.
- source_word: לַעֲשׂוֹת עֲנָבִים
  chosen: to produce grapes
  alternatives:
  - to yield grapes
  - to make grapes
  lexicon: HALOT
  rationale: Although literally 'to do/make grapes,' English idiom for vines is 'produce'
    or 'yield.' 'Produce grapes' is clear and natural.
- source_word: וַיַּעַשׂ בְּאֻשִׁים
  chosen: it produced wild grapes
  alternatives:
  - it yielded worthless grapes
  - it produced bad fruit
  - it produced stinking things
  lexicon: HALOT
  rationale: בְּאֻשִׁים refers to foul, bad, or worthless grapes in this vineyard
    song. 'Wild grapes' is a well-established and contextually apt rendering that
    preserves the contrast with expected cultivated fruit without over-specifying
    the exact defect.
