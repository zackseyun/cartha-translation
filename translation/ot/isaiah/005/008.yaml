id: ISA.5.8
reference: Isaiah 5:8
source:
  edition: WLC
  text: ה֗וֹי מַגִּיעֵ֥י בַ֨יִת֙ בְּ/בַ֔יִת שָׂדֶ֥ה בְ/שָׂדֶ֖ה יַקְרִ֑יבוּ עַ֚ד אֶ֣פֶס
    מָק֔וֹם וְ/הֽוּשַׁבְתֶּ֥ם לְ/בַדְּ/כֶ֖ם בְּ/קֶ֥רֶב הָ/אָֽרֶץ׃
translation:
  text: Woe to those who join house to house, who bring field near to field until
    there is no place left, and you are made to dwell alone in the midst of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who add field to field' / 'who join field to field.' The Hebrew verb
      is literally 'bring near,' used here for consolidating property.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew shifts to second person ('and you are made to dwell'), directly
      confronting the offenders.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Introduces a prophetic denunciation. 'Woe' best preserves the oracular
    force and warning tone in natural English.
- source_word: מַגִּיעֵי
  chosen: who join
  alternatives:
  - who add
  - who reach
  lexicon: HALOT
  rationale: From נגע in the causative/participle sense of causing one thing to touch
    another. In context of property accumulation, 'join' communicates attaching one
    house to another more idiomatically than the more literal 'cause to touch.'
- source_word: בַיִת בְּבַיִת
  chosen: house to house
  alternatives:
  - house with house
  - one house to another
  lexicon: HALOT
  rationale: A compact distributive expression describing successive accumulation
    of houses. 'House to house' preserves the Hebrew rhythm and sense.
- source_word: שָׂדֶה בְשָׂדֶה יַקְרִיבוּ
  chosen: who bring field near to field
  alternatives:
  - who add field to field
  - who join field to field
  lexicon: HALOT
  rationale: The verb קרב literally means 'bring near.' Here it parallels the previous
    clause and describes consolidating adjacent fields. I retained 'bring near' to
    reflect the distinct Hebrew verb while still being understandable; the more idiomatic
    alternatives are preserved.
- source_word: עַד אֶפֶס מָקוֹם
  chosen: until there is no place left
  alternatives:
  - until there is no room
  - until there is an end of space
  lexicon: HALOT
  rationale: 'Expresses the result of relentless acquisition: no remaining space.
    ''No place left'' is clear modern English and fits the context of land monopolization.'
- source_word: וְהוּשַׁבְתֶּם
  chosen: and you are made to dwell
  alternatives:
  - and you dwell
  - and you are settled
  lexicon: HALOT
  rationale: The form is passive/causative perfect 2mp. 'Are made to dwell' preserves
    the passive nuance better than a simple active 'dwell.' The shift to second person
    is retained as in the Hebrew, heightening the prophetic address.
- source_word: לבדכם
  chosen: alone
  alternatives:
  - by yourselves
  - only you
  lexicon: HALOT
  rationale: 'Conveys exclusivity: the land is occupied by the addressed land-grabbers
    alone.'
- source_word: בקרב הארץ
  chosen: in the midst of the land
  alternatives:
  - within the land
  - in the land
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the image of occupying the
    land's interior/center, not merely being somewhere in it.
