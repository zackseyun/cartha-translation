id: ISA.5.27
reference: Isaiah 5:27
source:
  edition: WLC
  text: אֵין עָיֵ֤ף וְ/אֵין כּוֹשֵׁל֙ בּ֔/וֹ לֹ֥א יָנ֖וּם וְ/לֹ֣א יִישָׁ֑ן וְ/לֹ֤א
    נִפְתַּח֙ אֵז֣וֹר חֲלָצָ֔י/ו וְ/לֹ֥א נִתַּ֖ק שְׂר֥וֹךְ נְעָלָֽי/ו־־׃
translation:
  text: None among them is weary, and none stumbles; none slumbers or sleeps; the
    belt at his waist is not loosened, and the strap of his sandals is not broken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'in him/it'; the Hebrew uses a singular pronoun with a collective
      referent, referring to the invading force as a whole.
    reason: lexical_alternative
  - marker: b
    text: Or 'the belt of his loins is not opened.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָיֵף
  chosen: weary
  alternatives:
  - faint
  - tired
  lexicon: HALOT
  rationale: Conveys physical exhaustion in clear modern English. 'Weary' fits the
    military-march context without sounding overly colloquial.
- source_word: כּוֹשֵׁל
  chosen: stumbles
  alternatives:
  - staggers
  - falters
  lexicon: HALOT
  rationale: The participle denotes stumbling or faltering. 'Stumbles' is the most
    natural English equivalent and pairs well with 'weary' in describing an unstoppable
    force.
- source_word: בּוֹ
  chosen: among them
  alternatives:
  - in him
  - in it
  lexicon: HALOT
  rationale: 'Although morphologically singular, the pronoun refers collectively to
    the summoned nation/army in context. English idiom prefers a distributive collective
    rendering: ''among them.'''
- source_word: יָנוּם
  chosen: slumbers
  alternatives:
  - dozes
  lexicon: HALOT
  rationale: Distinguishes the verb from the following יִישָׁן ('sleeps'). 'Slumbers'
    preserves the poetic near-synonym pair without collapsing them into one term.
- source_word: יִישָׁן
  chosen: sleeps
  alternatives:
  - falls asleep
  lexicon: HALOT
  rationale: Standard rendering for the common verb 'sleep'; paired with 'slumbers'
    to preserve the Hebrew parallelism.
- source_word: נִפְתַּח
  chosen: is not loosened
  alternatives:
  - is not opened
  - is not untied
  lexicon: HALOT
  rationale: In context of a belt, the sense is not merely 'opened' but coming loose
    or being unfastened. 'Loosened' communicates the practical image in idiomatic
    English.
- source_word: אֵזוֹר
  chosen: belt
  alternatives:
  - girdle
  - waistband
  lexicon: HALOT
  rationale: Refers to the belt or sash worn around the waist. 'Belt' is modern and
    clear; 'girdle' is archaic.
- source_word: חֲלָצָיו
  chosen: at his waist
  alternatives:
  - of his loins
  - around his hips
  lexicon: HALOT
  rationale: The Hebrew literally refers to the loins/waist region. 'At his waist'
    is a readable modern rendering that preserves the bodily reference without archaic
    phrasing.
- source_word: נִתַּק
  chosen: is not broken
  alternatives:
  - is not snapped
  - is not torn loose
  lexicon: HALOT
  rationale: Describes something being torn apart or snapped. For a sandal strap,
    'broken' is the most natural general English expression.
- source_word: שְׂרוֹךְ
  chosen: strap
  alternatives:
  - thong
  - lace
  lexicon: HALOT
  rationale: Refers to the fastening of footwear. 'Strap' is the clearest contemporary
    term; 'thong' is dated or potentially distracting in modern English.
- source_word: נְעָלָיו
  chosen: his sandals
  alternatives:
  - his shoes
  lexicon: HALOT
  rationale: Ancient Near Eastern footwear here is better represented by 'sandals'
    than the more generic 'shoes,' preserving historical concreteness.
