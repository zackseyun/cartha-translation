id: ISA.5.7
reference: Isaiah 5:7
source:
  edition: WLC
  text: כִּ֣י כֶ֜רֶם יְהוָ֤ה צְבָאוֹת֙ בֵּ֣ית יִשְׂרָאֵ֔ל וְ/אִ֣ישׁ יְהוּדָ֔ה נְטַ֖ע
    שַׁעֲשׁוּעָ֑י/ו וַ/יְקַ֤ו לְ/מִשְׁפָּט֙ וְ/הִנֵּ֣ה מִשְׂפָּ֔ח לִ/צְדָקָ֖ה וְ/הִנֵּ֥ה
    צְעָקָֽה׃ס
translation:
  text: For the vineyard of the LORD of Armies is the house of Israel, and the men
    of Judah are the planting of his delight. He looked for justice, but behold, bloodshed;
    for righteousness, but behold, an outcry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew plays on similar sounds: ''justice'' (mishpat) / ''bloodshed'' (mispach),
      and ''righteousness'' (tsedaqah) / ''outcry'' (tse''aqah). The wordplay sharpens
      the contrast between what the LORD sought and what he found.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the man of Judah,' with a collective sense; Hebrew singular אִישׁ can
      represent the group.
    reason: alternative_reading
  - marker: c
    text: '''LORD of Armies'' is traditionally rendered ''LORD of Hosts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the explanation of the vineyard song's meaning; 'For' best
    preserves the causal/explanatory force in context.
- source_word: כֶרֶם
  chosen: vineyard
  alternatives:
  - vine
  lexicon: HALOT
  rationale: The noun denotes the cultivated vineyard, matching the preceding parable
    imagery.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of Hosts
  lexicon: HALOT
  rationale: Translated rather than transliterated to preserve meaning in contemporary
    English; 'Armies' clearly conveys צבאות while retaining the title's force.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - the household of Israel
  lexicon: HALOT
  rationale: A standard covenantal collective expression; 'house of Israel' is both
    accurate and idiomatic.
- source_word: וְאִישׁ יְהוּדָה
  chosen: the men of Judah
  alternatives:
  - the man of Judah
  - the people of Judah
  lexicon: HALOT
  rationale: Though singular in form, אִישׁ here is collective. 'The men of Judah'
    preserves the masculine/gender-accurate force better than the more neutral 'people
    of Judah,' while still making the collective sense clear.
- source_word: נְטַע שַׁעֲשׁוּעָיו
  chosen: the planting of his delight
  alternatives:
  - his delightful plant
  - his pleasant planting
  lexicon: HALOT
  rationale: The phrase identifies Judah as what God planted for his delight. 'The
    planting of his delight' preserves both the agricultural metaphor and the possessive
    nuance.
- source_word: וַיְקַו
  chosen: He looked for
  alternatives:
  - He hoped for
  - He expected
  lexicon: HALOT
  rationale: In context of divine expectation from the vineyard, 'looked for' is idiomatic
    and fits the repeated contrast structure.
- source_word: לְמִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: Here משפט refers to social-ethical justice rather than merely judicial
    verdict; 'justice' is the clearest modern rendering.
- source_word: מִשְׂפָּח
  chosen: bloodshed
  alternatives:
  - bloodguilt
  - bloodshed/injustice
  lexicon: HALOT
  rationale: This rare term forms a wordplay with מִשְׁפָּט. 'Bloodshed' best captures
    the violent social evil in view, though the pun cannot be fully reproduced in
    English.
- source_word: לִצְדָקָה
  chosen: for righteousness
  alternatives:
  - for justice
  - for rightness
  lexicon: HALOT
  rationale: צדקה commonly denotes righteousness/right order. 'Righteousness' preserves
    the moral and covenantal dimension, while the paired social sense is evident from
    context.
- source_word: צְעָקָה
  chosen: an outcry
  alternatives:
  - a cry
  - a cry of distress
  lexicon: HALOT
  rationale: The noun denotes a cry raised because of oppression or wrong. 'An outcry'
    is concise and preserves the public, accusatory force, while also echoing the
    sound-play with צדקה.
