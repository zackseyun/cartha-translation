theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render YHWH as 'the LORD,' following the stated
    doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Collective/gendered force of וְאִישׁ יְהוּדָה
  chosen_reading: the men of Judah
  alternative_readings:
  - the man of Judah
  - the people of Judah
  rationale: The Hebrew singular functions collectively. Per the project's gender-accurate
    policy, 'men' better reflects the source form than a neutral collective, while
    still communicating plurality in context.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
