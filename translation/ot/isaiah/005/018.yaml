theological_decisions:
- issue: Metaphorical relation of sinners to sin
  chosen_reading: The verse depicts people actively hauling their guilt and sin along,
    emphasizing deliberate attachment to evil.
  alternative_readings:
  - The verse depicts people drawing punishment upon themselves by means of falsehood.
  rationale: The immediate imagery of dragging עון and חטאה with cords and cart ropes
    most naturally presents a vivid metaphor for persistent, self-chosen entanglement
    in evil. Because עון can include guilt/consequence, the alternative nuance is
    possible, but the main text should preserve the more direct image without interpretive
    expansion.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
