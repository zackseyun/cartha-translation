id: ISA.5.18
reference: Isaiah 5:18
source:
  edition: WLC
  text: ה֛וֹי מֹשְׁכֵ֥י הֶֽ/עָוֺ֖ן בְּ/חַבְלֵ֣י הַ/שָּׁ֑וְא וְ/כַ/עֲב֥וֹת הָ/עֲגָלָ֖ה
    חַטָּאָֽה׃
translation:
  text: Woe to those who drag iniquity with cords of emptiness, and sin as with cart
    ropes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with cords of falsehood' for 'with cords of emptiness'; Hebrew שָׁוְא
      can denote emptiness, vanity, or falsehood.
    reason: lexical_alternative
  - marker: b
    text: The image may also suggest drawing guilt or punishment upon themselves,
      not only dragging sin along.
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Introduces a prophetic denunciation or lament. 'Woe' is the standard
    concise English equivalent that preserves the oracular force better than the softer
    'alas.'
- source_word: מֹשְׁכֵי
  chosen: those who drag
  alternatives:
  - those who draw
  - those who pull
  lexicon: HALOT
  rationale: The participle denotes ongoing action by a group. 'Those who drag' captures
    the vivid, forceful image of hauling something along, fitting the metaphor of
    cords and ropes.
- source_word: עָוֹן
  chosen: iniquity
  alternatives:
  - guilt
  - wickedness
  - sin
  lexicon: HALOT
  rationale: The noun can denote both wrongdoing and guilt. 'Iniquity' preserves the
    moral weight and avoids collapsing it into the later חַטָּאָה, allowing the verse's
    paired terms to remain distinct.
- source_word: בְּחַבְלֵי הַשָּׁוְא
  chosen: with cords of emptiness
  alternatives:
  - with cords of falsehood
  - with ropes of vanity
  lexicon: HALOT
  rationale: חבלים are cords/ropes; שוא commonly denotes emptiness, vanity, or falsehood.
    'Emptiness' preserves the broad semantic range without over-specifying deceit
    alone, and keeps the metaphor stark and memorable.
- source_word: וְכַעֲבֹתוֹת
  chosen: and ... as with ropes
  alternatives:
  - and with thick ropes
  - and like ropes
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('as/like'). עבות refers to thick cords
    or ropes. Rendering the phrase idiomatically as 'and sin as with cart ropes' preserves
    the comparison while keeping readable English.
- source_word: הָעֲגָלָה
  chosen: cart
  alternatives:
  - wagon
  lexicon: HALOT
  rationale: Refers to a cart or wagon. 'Cart' is simpler and more natural in modern
    English while preserving the agricultural image.
- source_word: חַטָּאָה
  chosen: sin
  alternatives:
  - sinfulness
  - offense
  lexicon: HALOT
  rationale: A straightforward rendering that pairs naturally with the preceding metaphor.
    Keeping 'sin' distinct from 'iniquity' reflects the Hebrew's use of two related
    but not identical terms.
