theological_decisions:
- issue: Rendering the paired human terms אָדָם and אִישׁ
  chosen_reading: man ... a man
  alternative_readings:
  - humankind ... a person
  - humanity ... man
  rationale: The verse uses two singular masculine nouns in poetic parallel to depict
    human pride generally and individually. Following the doctrine's gender-accurate
    principle, the translation preserves the masculine representative wording rather
    than neutralizing both terms.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table
    for אָדָם'
- issue: Aspect/tense in prophetic poetry
  chosen_reading: present-like for first two cola, future for final colon
  alternative_readings:
  - simple past throughout
  - future throughout
  rationale: The Hebrew wayyiqtol forms can function in prophetic discourse to express
    vivid certainty rather than straightforward past narrative. Rendering the first
    two clauses as present-like gnomic/judgment statements and the final imperfect
    as future preserves the poetic force and progression without overstating a strict
    temporal sequence.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1 and §6'
