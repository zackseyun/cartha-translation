id: ISA.5.15
reference: Isaiah 5:15
source:
  edition: WLC
  text: וַ/יִּשַּׁ֥ח אָדָ֖ם וַ/יִּשְׁפַּל אִ֑ישׁ וְ/עֵינֵ֥י גְבֹהִ֖ים תִּשְׁפַּֽלְנָה־׃
translation:
  text: And man is brought low, and a man is humbled, and the eyes of the lofty will
    be humbled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bows down ... is brought low'; the Hebrew uses two related but distinct
      verbs for abasement in poetic parallel.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the eyes of the lofty'; that is, the proud or haughty look of exalted
      people.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשַּׁח
  chosen: is brought low
  alternatives:
  - bows down
  - is bowed down
  - is humbled
  lexicon: HALOT
  rationale: From שׁחח/שׁחח-like root meaning to bow low or be brought down. In this
    judgment context, an English passive-like sense communicates abasement better
    than a simple physical 'bows down.' The prefixed waw-consecutive with imperfect
    is rendered in present-like prophetic style in English to match the surrounding
    oracle tone rather than as simple past narrative.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: The singular noun here is paired with אִישׁ in a parallel line. Rendering
    as 'man' preserves the gender-accurate singular representative sense and the poetic
    parallelism, in line with the doctrine guidance on אָדָם.
- source_word: וַיִּשְׁפַּל
  chosen: is humbled
  alternatives:
  - is brought low
  - is abased
  lexicon: HALOT
  rationale: From שׁפל, to be low or become humbled. I varied the English from the
    first colon to preserve the Hebrew poetic intensification between the two verbs
    while keeping the semantic field of abasement.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  - mankind
  lexicon: HALOT
  rationale: Singular 'a man' preserves the individualizing parallel with אָדָם and
    reflects the masculine singular source rather than flattening to a collective.
- source_word: עֵינֵי גְבֹהִים
  chosen: the eyes of the lofty
  alternatives:
  - the proud eyes
  - the eyes of the proud
  - the eyes of the exalted
  lexicon: HALOT
  rationale: Literally 'eyes of high ones.' 'The eyes of the lofty' preserves the
    concrete Hebrew image of proud, elevated eyes while remaining readable. 'Proud
    eyes' is a good idiomatic alternative but is slightly more interpretive than the
    construct phrase.
- source_word: תִּשְׁפַּלְנָה
  chosen: will be humbled
  alternatives:
  - will be brought low
  - will be abased
  lexicon: HALOT
  rationale: Future/imperfect feminine plural agreeing with 'eyes.' 'Will be humbled'
    fits the prophetic announcement of coming judgment and aligns with the semantic
    field of שׁפל.
