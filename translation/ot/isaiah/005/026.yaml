theological_decisions:
- issue: Referent of the singular pronouns/verbs for the summoned force
  chosen_reading: Retain singular verbal/pronominal imagery in the final clause ('he
    comes') while allowing an English plural object earlier ('for them') for the collective
    nations.
  alternative_readings:
  - Make the whole verse strictly singular ('for him ... he comes')
  - Make the whole verse strictly plural ('for them ... they come')
  rationale: 'The Hebrew shifts through collective imagery: the nations are summoned,
    yet the arriving force is expressed with singular grammar. Preserving some of
    that tension is preferable to flattening it entirely. This is a grammatical-literary
    decision, not a doctrinal one.'
  doctrine_reference: Preserve theological tension rather than resolve it (applied
    analogically to genuine textual ambiguity).
