id: ISA.5.26
reference: Isaiah 5:26
source:
  edition: WLC
  text: וְ/נָֽשָׂא נֵ֤ס לַ/גּוֹיִם֙ מֵ/רָח֔וֹק וְ/שָׁ֥רַק ל֖/וֹ מִ/קְצֵ֣ה הָ/אָ֑רֶץ
    וְ/הִנֵּ֥ה מְהֵרָ֖ה קַ֥ל יָבֽוֹא־׃
translation:
  text: He will raise a signal for the nations from far away, and whistle for them
    from the end of the earth; and behold, quickly, swiftly, he comes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a banner' or 'a standard' for נֵס.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb can mean 'whistle' or, in older English renderings, 'hiss'—that
      is, make a sharp summoning sound.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew singular: ''for him ... he comes.'' The singular likely represents
      the invading force as a collective.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָשָׂא
  chosen: He will raise
  alternatives:
  - He lifts up
  - He will lift up
  lexicon: HALOT
  rationale: Though morphologically a qatal form, in prophetic discourse it functions
    with future sense in sequence. 'Raise' fits the idiom with נֵס ('signal/banner')
    in English better than the more literal 'lift up.'
- source_word: נֵס
  chosen: a signal
  alternatives:
  - a banner
  - a standard
  lexicon: HALOT
  rationale: נֵס denotes a raised signal or standard used to summon or mark. 'Signal'
    communicates the function clearly in modern English while preserving the military/summons
    imagery. Traditional 'banner' is possible but can sound too ceremonial; 'standard'
    is more formal.
- source_word: לַגּוֹיִם
  chosen: for the nations
  alternatives:
  - to the nations
  - for the peoples
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations.' With the preceding signal imagery,
    'for the nations' conveys that the signal is raised as a summons directed toward
    them. 'Peoples' is possible but less standard here.
- source_word: מֵרָחוֹק
  chosen: from far away
  alternatives:
  - from afar
  - far off
  lexicon: HALOT
  rationale: The phrase indicates distant origin/location. 'From far away' is natural
    modern English; 'from afar' is more traditional but slightly elevated.
- source_word: וְשָׁרַק
  chosen: and whistle
  alternatives:
  - and hiss
  - and whistle/shrill
  lexicon: HALOT
  rationale: The verb refers to making a sharp whistling sound as a signal or summons.
    Older English 'hiss' can mislead modern readers into hearing hostility rather
    than signaling. 'Whistle' best captures the action.
- source_word: לוֹ
  chosen: for them
  alternatives:
  - for him
  - to it
  lexicon: HALOT
  rationale: Although formally singular masculine pronominal suffix, in context it
    refers collectively to the summoned force represented by 'the nations.' English
    idiom naturally renders the collective referent as plural 'them.' This is a contextual
    smoothing required for intelligibility.
- source_word: מִקְצֵה הָאָרֶץ
  chosen: from the end of the earth
  alternatives:
  - from the extremity of the earth
  - from the farthest part of the land
  lexicon: HALOT
  rationale: The phrase is an idiom for the remotest reaches. 'Earth' is preferable
    to 'land' here because the scope is international and distant, not merely local
    territory.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and see
  lexicon: HALOT
  rationale: This discourse marker heightens vividness and immediacy. 'Behold' preserves
    the prophetic force, though somewhat elevated; it remains understandable and concise.
- source_word: מְהֵרָה
  chosen: quickly
  alternatives:
  - speedily
  - in haste
  lexicon: HALOT
  rationale: The noun/adverbial form conveys rapidity. 'Quickly' is clear modern English.
- source_word: קַל
  chosen: swiftly
  alternatives:
  - speedily
  - lightly
  lexicon: HALOT
  rationale: Here קַל functions adverbially alongside מְהֵרָה to intensify the speed
    of arrival. Rendering the pair as 'quickly, swiftly' preserves the Hebrew's doubled
    emphasis without awkward literalism.
- source_word: יָבֹוא
  chosen: he comes
  alternatives:
  - it comes
  - he will come
  lexicon: HALOT
  rationale: The singular verb likely treats the summoned invading force as a collective
    singular. Present-tense English after 'behold' gives the same vivid imminent effect
    as the Hebrew prophetic style. 'He comes' preserves the singular grammar better
    than pluralizing.
