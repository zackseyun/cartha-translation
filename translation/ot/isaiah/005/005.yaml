id: ISA.5.5
reference: Isaiah 5:5
source:
  edition: WLC
  text: וְ/עַתָּה֙ אוֹדִֽיעָה נָּ֣א אֶתְ/כֶ֔ם אֵ֛ת אֲשֶׁר אֲנִ֥י עֹשֶׂ֖ה לְ/כַרְמִ֑/י
    הָסֵ֤ר מְשׂוּכָּת/וֹ֙ וְ/הָיָ֣ה לְ/בָעֵ֔ר פָּרֹ֥ץ גְּדֵר֖/וֹ וְ/הָיָ֥ה לְ/מִרְמָֽס־־׃
translation:
  text: 'And now, please let me tell you what I will do to my vineyard: I will remove
    its hedge, and it will be burned; I will break down its wall, and it will be trampled
    down.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and it will become fit for burning' / 'and it will be consumed.' The
      Hebrew expression is literally 'and it will be for burning.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and it will become a trampling place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Standard discourse transition introducing the next step in the vineyard
    song; 'And now' preserves the connective force of וְ plus the temporal adverb.
- source_word: אוֹדִיעָה נָּא
  chosen: please let me tell you
  alternatives:
  - let me make known to you, please
  - I will now make known to you
  lexicon: HALOT
  rationale: The Hiphil of ידע means 'make known, inform.' The particle נָא adds an
    entreating or polite force. 'Please let me tell you' is natural English while
    preserving both the causative sense and the appeal.
- source_word: אֶתְכֶם
  chosen: you
  lexicon: HALOT
  rationale: Direct object marker plus 2mp suffix; rendered simply as the English
    object 'you'.
- source_word: אֵת אֲשֶׁר אֲנִי עֹשֶׂה
  chosen: what I will do
  alternatives:
  - that which I am doing
  - what I am about to do
  lexicon: HALOT
  rationale: This construction introduces the content of what will be disclosed. Although
    עֹשֶׂה is formally a participle, in context it points to imminent action, so English
    future is the clearest rendering.
- source_word: לְכַרְמִי
  chosen: to my vineyard
  alternatives:
  - for my vineyard
  lexicon: HALOT
  rationale: The preposition marks relation toward the vineyard as the object affected
    by the coming actions. 'To my vineyard' is idiomatic with 'do' in English and
    preserves the possessive.
- source_word: הָסֵר
  chosen: I will remove
  alternatives:
  - removing
  - to remove
  lexicon: HALOT
  rationale: An infinitive absolute used in sequence with the following clauses to
    express decisive action. Rendering it as a finite future verb gives clear English
    and matches the announced actions.
- source_word: מְשׂוּכָּתוֹ
  chosen: its hedge
  alternatives:
  - its thorn hedge
  - its fence
  lexicon: HALOT
  rationale: Refers to the protective hedge around a vineyard. 'Hedge' is the standard
    and sufficiently concrete rendering.
- source_word: וְהָיָה לְבָעֵר
  chosen: and it will be burned
  alternatives:
  - and it will become for burning
  - and it will be consumed
  lexicon: HALOT
  rationale: The clause expresses resulting exposure to destruction. 'Burned' captures
    the likely sense in vineyard imagery and is idiomatic English for the result of
    removing the hedge.
- source_word: פָּרֹץ
  chosen: I will break down
  alternatives:
  - I will breach
  - breaking down
  lexicon: HALOT
  rationale: The verb means to break through or tear down. With the wall as object,
    'break down' is the most natural English equivalent.
- source_word: גְּדֵרוֹ
  chosen: its wall
  alternatives:
  - its stone wall
  - its fence
  lexicon: HALOT
  rationale: Distinct from the earlier hedge, this term denotes a wall or enclosure.
    'Wall' preserves the distinction between the two protective barriers.
- source_word: וְהָיָה לְמִרְמָס
  chosen: and it will be trampled down
  alternatives:
  - and it will become a trampling place
  - and it will be trodden underfoot
  lexicon: HALOT
  rationale: The noun denotes trampling. English verbal expression 'be trampled down'
    communicates the result clearly and forcefully.
