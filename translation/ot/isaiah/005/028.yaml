id: ISA.5.28
reference: Isaiah 5:28
source:
  edition: WLC
  text: אֲשֶׁ֤ר חִצָּי/ו֙ שְׁנוּנִ֔ים וְ/כָל קַשְּׁתֹתָ֖י/ו דְּרֻכ֑וֹת פַּרְס֤וֹת
    סוּסָי/ו֙ כַּ/צַּ֣ר נֶחְשָׁ֔בוּ וְ/גַלְגִּלָּ֖י/ו כַּ/סּוּפָֽה־׃
translation:
  text: whose arrows are sharpened, and all his bows are bent; the hooves of his horses
    are considered like flint, and his wheels like the whirlwind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are drawn' for 'are bent'; the Hebrew describes bows made ready for
      use.
    reason: lexical_alternative
  - marker: b
    text: Or 'like rock' or 'like a flint stone'; the comparison emphasizes the hardness
      of the horses' hooves.
    reason: lexical_alternative
  - marker: c
    text: Or 'like a storm wind' or 'like the tempest'; the image stresses speed and
      destructive force.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: whose
  alternatives:
  - whose/which
  - for whom
  lexicon: HALOT
  rationale: Introduces a relative clause describing the invading force from the previous
    verse. 'Whose' is the most natural English connective with the following possessive
    forms ('his arrows,' 'his bows').
- source_word: חִצָּיו
  chosen: his arrows
  alternatives:
  - its arrows
  lexicon: HALOT
  rationale: Plural noun with 3ms suffix. English singular collective antecedent ('nation'/'enemy')
    can still take 'his' in a personified military description; this preserves the
    Hebrew singular suffix pattern.
- source_word: שְׁנוּנִים
  chosen: are sharpened
  alternatives:
  - sharp
  - pointed
  lexicon: HALOT
  rationale: Passive/adjectival sense from שׁנן conveys weapons made sharp for battle.
    'Are sharpened' gives a vivid military-preparedness sense in idiomatic English.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - and every
  lexicon: HALOT
  rationale: Retains the comprehensiveness of the Hebrew while reading smoothly with
    the following plural noun.
- source_word: קַשְּׁתֹתָיו
  chosen: his bows
  alternatives:
  - its bows
  lexicon: HALOT
  rationale: Plural noun with 3ms suffix; rendered consistently with the personified
    singular possessor in the verse.
- source_word: דְּרֻכוֹת
  chosen: are bent
  alternatives:
  - are drawn
  - are strung
  lexicon: HALOT
  rationale: From דרך in the sense of treading/bending a bow. 'Bent' is a concise
    rendering that captures bows prepared for shooting. 'Drawn' could imply the moment
    of aiming rather than the state of readiness; 'strung' is possible but less direct
    from this form.
- source_word: פַּרְסוֹת
  chosen: the hooves
  alternatives:
  - the hoofs
  lexicon: HALOT
  rationale: Standard modern English spelling for the plural of hoof.
- source_word: סוּסָיו
  chosen: of his horses
  alternatives:
  - of its horses
  lexicon: HALOT
  rationale: Construct relationship preserved naturally in English. Again keeps the
    singular possessive pattern of the Hebrew.
- source_word: כַּצַּר
  chosen: like flint
  alternatives:
  - like a flint stone
  - like rock
  lexicon: HALOT
  rationale: צַר here denotes hard stone/flint. 'Flint' best conveys hardness and
    striking toughness in concise English.
- source_word: נֶחְשָׁבוּ
  chosen: are considered
  alternatives:
  - are reckoned
  - are counted
  - seem
  lexicon: HALOT
  rationale: Niphal of חשׁב commonly means 'be regarded/reckoned.' 'Are considered'
    is clear modern English and preserves the comparative evaluation.
- source_word: וְגַלְגִּלָּיו
  chosen: and his wheels
  alternatives:
  - and its chariot wheels
  - and his chariot wheels
  lexicon: HALOT
  rationale: The noun can refer to wheels generally; in context these are the wheels
    of the advancing war machinery/chariots. The simpler 'his wheels' stays closer
    to the Hebrew, while the military context makes the referent clear.
- source_word: כַּסּוּפָה
  chosen: like the whirlwind
  alternatives:
  - like a storm wind
  - like the tempest
  lexicon: HALOT
  rationale: סוּפָה denotes a violent storm or whirlwind. 'The whirlwind' is vivid,
    idiomatic, and suits the image of rapid, forceful advance.
