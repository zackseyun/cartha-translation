id: ISA.5.29
reference: Isaiah 5:29
source:
  edition: WLC
  text: שְׁאָגָ֥ה ל֖/וֹ כַּ/לָּבִ֑יא ו/שאג כַּ/כְּפִירִ֤ים וְ/יִנְהֹם֙ וְ/יֹאחֵ֣ז
    טֶ֔רֶף וְ/יַפְלִ֖יט וְ/אֵ֥ין מַצִּֽיל׃
translation:
  text: Its roaring is like a lion, and it roars like young lions; it growls and seizes
    prey, and carries it off, with none to rescue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a lioness' for 'like a lion'; the Hebrew term can be understood
      more specifically in some contexts, though 'lion' fits the parallelism here.
    reason: lexical_alternative
  - marker: b
    text: Or 'drags it away' / 'escapes with it' for 'carries it off'; the Hebrew
      verb suggests taking the prey away beyond recovery.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאָגָה
  chosen: roaring
  alternatives:
  - roar
  lexicon: HALOT
  rationale: The noun denotes a lion's roar. 'Roaring' fits the verbless opening clause
    naturally in English ('Its roaring is like...') while preserving the vivid animal
    imagery.
- source_word: לוֹ
  chosen: its
  alternatives:
  - his
  lexicon: HALOT
  rationale: The pronominal suffix is masculine singular, referring back to the invading
    nation/force personified in the preceding context. English idiom prefers 'its'
    for a collective non-personal referent here.
- source_word: כַּלָּבִיא
  chosen: like a lion
  alternatives:
  - like a lioness
  lexicon: HALOT
  rationale: לָבִיא commonly denotes a lion, often a strong mature lion. Some contexts
    allow 'lioness,' but here the parallel with ככפירים ('young lions') favors the
    generic 'lion' as the clearest English rendering.
- source_word: וְשאג
  chosen: and it roars
  alternatives:
  - and it will roar
  lexicon: HALOT
  rationale: The qatal following the nominal clause functions in a vivid descriptive
    sequence. Present tense in English best conveys the poetic immediacy of the description.
- source_word: כַּכְּפִירִים
  chosen: like young lions
  alternatives:
  - like lion cubs
  lexicon: HALOT
  rationale: כפירים refers to young lions in their strength, not small cubs. 'Young
    lions' preserves the predatory force of the image.
- source_word: וְיִנְהֹם
  chosen: it growls
  alternatives:
  - it snarls
  - it roars
  lexicon: HALOT
  rationale: The verb denotes a low growling or snarling sound distinct from the earlier
    roaring terms. 'Growls' preserves the progression in the lion imagery.
- source_word: וְיֹאחֵז
  chosen: and seizes
  alternatives:
  - and grasps
  - and takes hold of
  lexicon: HALOT
  rationale: The verb means to take hold firmly. 'Seizes' fits the predatory context
    and reads naturally with 'prey.'
- source_word: טֶרֶף
  chosen: prey
  alternatives:
  - plunder
  lexicon: HALOT
  rationale: Though the term can extend metaphorically to torn prey or spoil, the
    lion metaphor here makes 'prey' the most direct rendering.
- source_word: וְיַפְלִיט
  chosen: and carries it off
  alternatives:
  - and drags it away
  - and escapes with it
  - and delivers it
  lexicon: HALOT
  rationale: In this context the Hiphil conveys causing the prey to get away from
    others, i.e., carrying it off beyond rescue. 'Carries it off' is idiomatic and
    matches the following clause about no rescuer.
- source_word: וְאֵין מַצִּיל
  chosen: with none to rescue
  alternatives:
  - and there is no one to deliver
  - and none rescues
  lexicon: HALOT
  rationale: The clause states the absence of any deliverer. 'With none to rescue'
    is concise, natural English and preserves the helplessness of the victim.
