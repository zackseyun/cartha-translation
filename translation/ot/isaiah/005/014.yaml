theological_decisions:
- issue: Rendering of שְּׁאוֹל in a poetic judgment context
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - death
  - the realm of the dead
  rationale: No doctrinally contested term table entry governs שְּׁאוֹל, but preserving
    the Hebrew term avoids collapsing the imagery into mere burial or abstract death.
    The verse personifies Sheol as an insatiable devourer, and transliteration best
    preserves that theological-poetic tension.
  doctrine_reference: Translation philosophy §1, §3
