id: ISA.5.14
reference: Isaiah 5:14
source:
  edition: WLC
  text: לָ/כֵ֗ן הִרְחִ֤יבָה שְּׁאוֹל֙ נַפְשָׁ֔/הּ וּ/פָעֲרָ֥ה פִ֖י/הָ לִ/בְלִי חֹ֑ק
    וְ/יָרַ֨ד הֲדָרָ֧/הּ וַ/הֲמוֹנָ֛/הּ וּ/שְׁאוֹנָ֖/הּ וְ/עָלֵ֥ז בָּֽ/הּ־׃
translation:
  text: Therefore Sheol has enlarged its throat and opened its mouth without measure,
    and her splendor goes down, her multitude, her uproar, and the one who exults
    in her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has enlarged its appetite' (literally, 'has enlarged its nephesh/soul').
    reason: lexical_alternative
  - marker: b
    text: '''Without measure'' may also be rendered ''without limit.'''
    reason: lexical_alternative
  - marker: c
    text: Sheol is the realm of the dead; here it is personified as opening its mouth
      to swallow the city's glory and revelers.
    reason: cultural_note
lexical_decisions:
- source_word: שְּׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  - death
  lexicon: HALOT
  rationale: Kept as 'Sheol' rather than flattening to 'grave' or 'death' because
    the Hebrew denotes the underworld / realm of the dead and is personified here
    as a devouring female figure. Transliteration preserves the Hebrew concept and
    imagery.
- source_word: הִרְחִיבָה ... נַפְשָׁהּ
  chosen: has enlarged its throat
  alternatives:
  - has enlarged its appetite
  - has widened itself
  - has enlarged its soul
  lexicon: HALOT
  rationale: The idiom literally says 'has enlarged her nephesh.' In this context
    of swallowing and parallel 'opened its mouth,' 'throat' best captures the concrete,
    bodily image in natural English without over-paraphrasing. 'Appetite' is interpretive;
    'soul' would mislead modern readers.
- source_word: וּפָעֲרָה פִיהָ
  chosen: and opened its mouth
  alternatives:
  - and gaped with its mouth
  - and opened wide its mouth
  lexicon: HALOT
  rationale: Retains the vivid devouring image. 'Opened its mouth' is clear modern
    English; the widening force of פער is already supported by the context and prior
    clause.
- source_word: לִבְלִי חֹק
  chosen: without measure
  alternatives:
  - without limit
  - without restraint
  - without decree
  lexicon: HALOT
  rationale: חֹק often means statute/decree, but in this idiom it carries the sense
    of bound or limit. 'Without measure' preserves the poetic force and avoids a misleading
    legal sense.
- source_word: וְיָרַד
  chosen: goes down
  alternatives:
  - descends
  - will go down
  - has gone down
  lexicon: HALOT
  rationale: Rendered as present-like prophetic perfect in English narrative-poetic
    style. 'Goes down' is vivid and natural, preserving the certainty of the announced
    judgment without forcing a strictly past tense.
- source_word: הֲדָרָהּ
  chosen: her splendor
  alternatives:
  - her majesty
  - her nobility
  - her pomp
  lexicon: HALOT
  rationale: Refers to Jerusalem/Zion's glory or magnificence. 'Splendor' is broad
    enough to include social grandeur without sounding archaic.
- source_word: הֲמוֹנָהּ
  chosen: her multitude
  alternatives:
  - her crowd
  - her throng
  - her abundance
  lexicon: HALOT
  rationale: Likely the mass of people associated with the city. 'Multitude' preserves
    the collective sense and poetic register.
- source_word: שְׁאוֹנָהּ
  chosen: her uproar
  alternatives:
  - her noise
  - her tumult
  lexicon: HALOT
  rationale: Conveys noisy revelry or tumult. 'Uproar' fits the judgment context and
    the city's boisterous life.
- source_word: וְעָלֵז בָּהּ
  chosen: and the one who exults in her
  alternatives:
  - and he who rejoices in her
  - and her reveler
  - and those who exult in her
  lexicon: HALOT
  rationale: The singular participial/adjectival form is best represented by a singular
    collective-like expression. 'Exults' captures arrogant rejoicing better than the
    flatter 'rejoices.'
