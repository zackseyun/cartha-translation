theological_decisions:
- issue: Rendering the divine title יְהוָה צְבָאוֹת
  chosen_reading: the LORD of Armies
  alternative_readings:
  - the LORD of Hosts
  - Yahweh of Armies
  rationale: This follows the doctrinal default for יְהוָה as 'the LORD' while translating
    צְבָאוֹת for clarity. The verse is a judgment oath, and the martial title underscores
    divine authority without importing extra theology.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (יְהוָה YHWH → the LORD);
    Translation philosophy #2'
