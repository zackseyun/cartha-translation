id: ISA.5.9
reference: Isaiah 5:9
source:
  edition: WLC
  text: בְּ/אָזְנָ֖/י יְהוָ֣ה צְבָא֑וֹת אִם לֹ֞א בָּתִּ֤ים רַבִּים֙ לְ/שַׁמָּ֣ה יִֽהְי֔וּ
    גְּדֹלִ֥ים וְ/טוֹבִ֖ים מֵ/אֵ֥ין יוֹשֵֽׁב־׃
translation:
  text: 'In my ears the LORD of Armies has sworn: Surely many houses will become a
    desolation, great and good houses, without inhabitant.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD of Hosts.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'In my ears,' an idiom meaning that Isaiah heard this directly.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאָזְנַי
  chosen: In my ears
  alternatives:
  - In my hearing
  - In my ears I heard
  lexicon: HALOT
  rationale: A literal idiom meaning something heard directly by the prophet. 'In
    my ears' preserves the Hebrew image and solemn immediacy better than smoothing
    fully to 'I heard.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of Hosts
  - of Heaven's Armies
  lexicon: HALOT
  rationale: The title denotes command over heavenly and earthly forces. 'Armies'
    is clearer modern English than the traditional but less transparent 'Hosts.'
- source_word: אִם לֹא
  chosen: Surely
  alternatives:
  - If not
  - Truly
  - Indeed
  lexicon: HALOT
  rationale: In oath contexts this combination functions idiomatically as a strong
    asseveration, often implying an unspoken curse if the statement fails. 'Surely'
    communicates the force naturally in English.
- source_word: בָּתִּים רַבִּים
  chosen: many houses
  alternatives:
  - many households
  lexicon: HALOT
  rationale: The concrete referent is physical houses in the judgment oracle, not
    primarily family units.
- source_word: לְשַׁמָּה
  chosen: will become a desolation
  alternatives:
  - will be desolate
  - will become a ruin
  lexicon: HALOT
  rationale: The noun denotes devastation/desolation. 'Become a desolation' preserves
    the nominal force and the result of judgment.
- source_word: יִהְיוּ
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: With the predicate noun 'desolation,' English idiom is better served
    by 'become,' expressing resultant state.
- source_word: גְּדֹלִים וְטוֹבִים
  chosen: great and good houses
  alternatives:
  - large and fine houses
  - great and pleasant houses
  lexicon: HALOT
  rationale: These adjectives describe size and quality/prosperity. 'Great and good'
    is slightly more formal but preserves the evaluative force without overinterpreting.
- source_word: מֵאֵין יוֹשֵׁב
  chosen: without inhabitant
  alternatives:
  - with no one living in them
  - without anyone dwelling there
  lexicon: HALOT
  rationale: A compact rendering of the idiom 'from there being no inhabitant,' preserving
    the starkness of depopulation. Singular 'inhabitant' works generically in English.
