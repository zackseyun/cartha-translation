id: ISA.5.6
reference: Isaiah 5:6
source:
  edition: WLC
  text: וַ/אֲשִׁיתֵ֣/הוּ בָתָ֗ה לֹ֤א יִזָּמֵר֙ וְ/לֹ֣א יֵעָדֵ֔ר וְ/עָלָ֥ה שָׁמִ֖יר
    וָ/שָׁ֑יִת וְ/עַ֤ל הֶ/עָבִים֙ אֲצַוֶּ֔ה מֵ/הַמְטִ֥יר עָלָ֖י/ו מָטָֽר׃
translation:
  text: And I will make it a wasteland; it will not be pruned or hoed, and briers
    and thorns will grow up; and I will command the clouds not to rain on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a desolation' or 'uncultivated land.'
    reason: lexical_alternative
  - marker: b
    text: Or 'dug.' The Hebrew refers to cultivating the soil.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew literally says 'from raining rain on it,' an idiom meaning to
      withhold rain from it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲשִׁיתֵהוּ
  chosen: And I will make it
  alternatives:
  - And I will set it
  - And I will appoint it
  lexicon: HALOT
  rationale: From שׂים, a broad verb meaning set/place/make. In this judgment context
    with a predicate noun following, 'make it' is the most natural English rendering.
- source_word: בָתָה
  chosen: a wasteland
  alternatives:
  - waste
  - desolation
  - uncultivated land
  lexicon: HALOT
  rationale: The noun denotes a ruined or uncultivated state/tract. 'Wasteland' communicates
    both devastation and abandonment in readable modern English.
- source_word: לֹא יִזָּמֵר
  chosen: it will not be pruned
  alternatives:
  - it will not be trimmed
  lexicon: HALOT
  rationale: זמר in vineyard/agricultural context refers to pruning vines. Passive
    English best reflects the Niphal and the implied cessation of cultivation.
- source_word: וְלֹא יֵעָדֵר
  chosen: or hoed
  alternatives:
  - or dug
  - or weeded
  lexicon: HALOT
  rationale: עדר in agricultural usage refers to digging/hoeing the soil. 'Hoed' is
    concise and fits vineyard maintenance better than the broader 'dug.'
- source_word: וְעָלָה
  chosen: will grow up
  alternatives:
  - will come up
  - will spring up
  lexicon: HALOT
  rationale: The verb marks the emergence of unwanted growth. 'Will grow up' is idiomatic
    and clear.
- source_word: שָׁמִיר וָשָׁיִת
  chosen: briers and thorns
  alternatives:
  - thorns and briars
  - thornbush and weeds
  lexicon: HALOT
  rationale: This pair is a conventional expression for invasive, desolating growth.
    'Briers and thorns' preserves the image without over-specifying uncertain botany.
- source_word: וְעַל הֶעָבִים אֲצַוֶּה
  chosen: and I will command the clouds
  alternatives:
  - and concerning the clouds I will command
  lexicon: HALOT
  rationale: 'The preposition with ''clouds'' introduces the object affected by the
    command. Smooth English brings the phrase forward as direct object: ''command
    the clouds.'''
- source_word: מֵהַמְטִיר עָלָיו מָטָר
  chosen: not to rain on it
  alternatives:
  - from raining rain on it
  - from sending rain on it
  lexicon: HALOT
  rationale: 'The infinitive with מן after צוה expresses prohibition/restraint: commanding
    the clouds to withhold rain. English idiom requires restructuring to ''not to
    rain on it.'' The cognate accusative ''rain'' is absorbed into the verb in natural
    English.'
