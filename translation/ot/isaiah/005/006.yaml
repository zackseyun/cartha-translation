theological_decisions:
- issue: Speaker's agency in judgment imagery
  chosen_reading: Retain direct first-person divine action ('I will make,' 'I will
    command')
  alternative_readings:
  - Soften to impersonal devastation
  rationale: The Hebrew explicitly presents the speaker as actively imposing covenant
    judgment on the vineyard. The translation preserves this theological force without
    dilution.
