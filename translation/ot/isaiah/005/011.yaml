id: ISA.5.11
reference: Isaiah 5:11
source:
  edition: WLC
  text: ה֛וֹי מַשְׁכִּימֵ֥י בַ/בֹּ֖קֶר שֵׁכָ֣ר יִרְדֹּ֑פוּ מְאַחֲרֵ֣י בַ/נֶּ֔שֶׁף
    יַ֖יִן יַדְלִיקֵֽ/ם׃
translation:
  text: Woe to those who rise early in the morning to chase strong drink, who stay
    up late into the twilight until wine inflames them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until evening'; the Hebrew נֶשֶׁף can denote twilight, especially dusk,
      though its exact nuance varies by context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Introduces a prophetic denunciation or lament. 'Woe' best preserves the
    force of judgment in English prophetic style.
- source_word: מַשְׁכִּימֵי
  chosen: those who rise early
  alternatives:
  - those who get up early
  - early risers
  lexicon: HALOT
  rationale: Participle from שׁכם conveys rising early. 'Those who rise early' is
    natural and keeps the participial sense tied to the following action.
- source_word: בַבֹּקֶר
  chosen: in the morning
  alternatives:
  - at morning
  - at daybreak
  lexicon: HALOT
  rationale: Standard temporal expression. 'In the morning' is idiomatic modern English.
- source_word: שֵׁכָר
  chosen: strong drink
  alternatives:
  - beer
  - intoxicating drink
  lexicon: HALOT
  rationale: Refers broadly to intoxicating liquor other than wine, not specifically
    modern distilled spirits. 'Strong drink' is the most established and sufficiently
    broad rendering.
- source_word: יִרְדֹּפוּ
  chosen: to chase
  alternatives:
  - pursue
  - run after
  lexicon: HALOT
  rationale: The verb literally means 'pursue/chase.' 'Chase' vividly conveys eager,
    habitual pursuit of alcohol in this woe oracle.
- source_word: מְאַחֲרֵי
  chosen: who stay up late
  alternatives:
  - who linger late
  - who delay until late
  lexicon: HALOT
  rationale: The participle from אחר in this context denotes tarrying late into the
    day/night. 'Stay up late' communicates the sense clearly in contemporary English.
- source_word: בַנֶּשֶׁף
  chosen: into the twilight
  alternatives:
  - until evening
  - into the dusk
  lexicon: HALOT
  rationale: נשׁף can denote twilight, often evening dusk, though in some contexts
    dawn. Here the sequence from early morning drinking to late hours favors evening
    twilight/dusk.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Straightforward lexical equivalent.
- source_word: יַדְלִיקֵם
  chosen: inflames them
  alternatives:
  - sets them ablaze
  - excites them
  - burns in them
  lexicon: HALOT
  rationale: Hiphil of דלק literally evokes kindling/burning. In context it describes
    wine's heating, inflaming effect on the drinkers. 'Inflames them' preserves the
    metaphor while sounding natural in English.
