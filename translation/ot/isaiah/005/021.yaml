id: ISA.5.21
reference: Isaiah 5:21
source:
  edition: WLC
  text: ה֖וֹי חֲכָמִ֣ים בְּ/עֵֽינֵי/הֶ֑ם וְ/נֶ֥גֶד פְּנֵי/הֶ֖ם נְבֹנִֽים׃
translation:
  text: Woe to those who are wise in their own eyes and discerning in their own sight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'understanding' for 'discerning.' The Hebrew term denotes perceptive
      intelligence or discernment.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Prophetic interjection of denunciation or lament. 'Woe' is the standard
    and most forceful English equivalent in judgment contexts, preserving the oracle's
    tone.
- source_word: חֲכָמִים
  chosen: wise
  alternatives:
  - wise ones
  lexicon: HALOT
  rationale: Adjectival/noun usage describing those who consider themselves wise.
    Rendered simply as 'wise' in idiomatic English after 'those who are'.
- source_word: בְּעֵינֵיהֶם
  chosen: in their own eyes
  alternatives:
  - in their eyes
  lexicon: HALOT
  rationale: Hebrew idiom for self-assessment or self-perception. 'In their own eyes'
    preserves the idiom and makes explicit the reflexive force carried by the pronominal
    suffix in context.
- source_word: וְנֶגֶד פְּנֵיהֶם
  chosen: in their own sight
  alternatives:
  - before themselves
  - in front of themselves
  - before their own faces
  lexicon: HALOT
  rationale: The phrase literally involves being 'before/in front of their faces,'
    but idiomatically parallels the previous clause's self-evaluation. 'In their own
    sight' gives natural English while preserving the synonymous parallelism.
- source_word: נְבֹנִים
  chosen: discerning
  alternatives:
  - understanding
  - intelligent
  - prudent
  lexicon: HALOT
  rationale: From בין/בון, denoting discernment or understanding. 'Discerning' fits
    the moral-intellectual nuance and pairs well with 'wise' without sounding redundant.
