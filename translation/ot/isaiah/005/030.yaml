id: ISA.5.30
reference: Isaiah 5:30
source:
  edition: WLC
  text: וְ/יִנְהֹ֥ם עָלָ֛י/ו בַּ/יּ֥וֹם הַ/ה֖וּא כְּ/נַהֲמַת יָ֑ם וְ/נִבַּ֤ט לָ/אָ֨רֶץ֙
    וְ/הִנֵּה חֹ֔שֶׁךְ צַ֣ר וָ/א֔וֹר חָשַׁ֖ךְ בַּ/עֲרִיפֶֽי/הָ־־׃פ
translation:
  text: And he will roar over it on that day like the roaring of the sea; and if one
    looks to the land, behold, darkness and distress, and the light is darkened by
    its clouds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against him' / 'over him' for 'over it'; the Hebrew suffix is masculine
      singular and could refer to a personified people, land, or enemy target depending
      on how the preceding context is construed.
    reason: alternative_reading
  - marker: b
    text: Or 'and one looks to the earth'; Hebrew אֶרֶץ can mean 'land' or 'earth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'darkness and anguish'; the Hebrew term צַר conveys distress, trouble,
      or constriction.
    reason: lexical_alternative
  - marker: d
    text: Or 'in its clouds' / 'in its thick clouds'; the final phrase is difficult
      and may refer to the dark cloud-masses by which the light is obscured.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיִנְהֹם
  chosen: he will roar
  alternatives:
  - it will roar
  - he will growl
  lexicon: HALOT
  rationale: The verb נהם denotes a loud growling/roaring sound. 'Roar' is the most
    natural English equivalent in this judgment context. The 3ms form leaves the subject
    implicit; English preserves that with 'he,' likely referring back to the invading
    enemy/nation collectively personified.
- source_word: עָלָיו
  chosen: over it
  alternatives:
  - against him
  - over him
  lexicon: HALOT
  rationale: The preposition על with 3ms suffix can mean 'against/over him/it.' Because
    the immediate context concerns the land/people under attack and English style
    here works better with an impersonal object, 'over it' best captures the threatening
    sound directed toward the object of judgment without over-specifying gender.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal idiom. 'On that day' is idiomatic modern English and
    preserves the prophetic temporal marker.
- source_word: כְּנַהֲמַת יָם
  chosen: like the roaring of the sea
  alternatives:
  - like the rumbling of the sea
  - like the roaring of a sea
  lexicon: HALOT
  rationale: The construct phrase compares the sound to the sea's roar. 'Roaring of
    the sea' is vivid and natural, matching the auditory imagery.
- source_word: וְנִבַּט לָאָרֶץ
  chosen: and if one looks to the land
  alternatives:
  - and he looks to the earth
  - and one looks to the earth
  lexicon: HALOT
  rationale: The form is best taken as an impersonal/passive-like expression, 'one
    looks' or 'someone looks.' 'Land' fits the immediate scene better than the broader
    'earth,' since the gaze is toward the devastated territory. Rendering with 'if
    one looks' brings out the observational force in context.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there is
  lexicon: HALOT
  rationale: '''Behold'' preserves the prophetic deictic force and suddenness of the
    vision. Though somewhat elevated, it remains readable and fitting in poetic judgment
    discourse.'
- source_word: חֹשֶׁךְ
  chosen: darkness
  lexicon: HALOT
  rationale: Straightforward rendering of the noun for darkness.
- source_word: צַר
  chosen: distress
  alternatives:
  - anguish
  - trouble
  lexicon: HALOT
  rationale: The adjective/noun conveys constriction, adversity, or distress. 'Distress'
    pairs well with 'darkness' and communicates both emotional and situational pressure.
- source_word: וָאוֹר חָשַׁךְ
  chosen: and the light is darkened
  alternatives:
  - and light grows dark
  - and the light has become dark
  lexicon: HALOT
  rationale: The clause contrasts expected light with actual darkening. 'The light
    is darkened' is clear, preserves the passive/resultative sense, and fits the poetic
    parallelism.
- source_word: בַּעֲרִיפֶיהָ
  chosen: by its clouds
  alternatives:
  - in its clouds
  - by its storm clouds
  - in its thick clouds
  lexicon: HALOT
  rationale: The noun עריף refers to clouds/cloud-masses, likely dark storm clouds.
    The 3fs suffix most naturally refers to the land/scene. 'By its clouds' communicates
    instrument or circumstance of darkening without over-interpretation; 'storm clouds'
    is possible but slightly more interpretive.
