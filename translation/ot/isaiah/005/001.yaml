theological_decisions:
- issue: Identity of the 'beloved' in the vineyard song
  chosen_reading: Retain the poetic expression 'my beloved' without identifying him
    in the main text.
  alternative_readings:
  - The beloved is the LORD
  - The beloved is the prophet's friend or a literary figure within the song
  rationale: The immediate verse presents a poetic introduction and does not yet explicitly
    identify the beloved. Since the broader context reveals the vineyard as a metaphor
    involving the LORD and Israel, the translation should preserve the literary tension
    here rather than resolve it prematurely.
  doctrine_reference: Preserve theological tension rather than resolve it.
