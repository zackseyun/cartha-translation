id: ISA.5.1
reference: Isaiah 5:1
source:
  edition: WLC
  text: אָשִׁ֤ירָה נָּא֙ לִֽ/ידִידִ֔/י שִׁירַ֥ת דּוֹדִ֖/י לְ/כַרְמ֑/וֹ כֶּ֛רֶם הָיָ֥ה
    לִֽ/ידִידִ֖/י בְּ/קֶ֥רֶן בֶּן שָֽׁמֶן־׃
translation:
  text: 'Let me sing, please, for my beloved a song of my beloved concerning his vineyard:
    my beloved had a vineyard on a fertile hill.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'on a horn, a son of oil,' an idiom for a fertile hill.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָשִׁירָה
  chosen: Let me sing
  alternatives:
  - I will sing
  - I would sing
  lexicon: HALOT
  rationale: 1cs cohortative of שׁיר. In context it functions as an invitation or
    self-exhortation, best conveyed by 'Let me sing' rather than a simple future.
- source_word: נָּא
  chosen: please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: Particle adding entreaty or immediacy. English 'please' captures the
    softening/request nuance, though it is placed after 'Let me sing' for natural
    English style.
- source_word: לִידִידִי
  chosen: for my beloved
  alternatives:
  - to my beloved
  - of my beloved
  lexicon: HALOT
  rationale: The preposition ל with יָדִיד can indicate direction or relation. 'For
    my beloved' fits the sense of singing on behalf of or with reference to the beloved.
    The repeated occurrence later is rendered simply 'my beloved' as possessive relation
    in English.
- source_word: שִׁירַת
  chosen: a song
  alternatives:
  - the song
  - song
  lexicon: HALOT
  rationale: Construct form 'song of' introducing the content. English idiom prefers
    the indefinite 'a song' before the following genitive.
- source_word: דּוֹדִי
  chosen: my beloved
  alternatives:
  - my loved one
  - my friend
  lexicon: HALOT
  rationale: Though דּוֹד can mean 'beloved' or 'lover,' here 'my beloved' preserves
    the poetic and relational force without oversexualizing the metaphor. For consistency
    with יָדִידִי in this verse, the same English term is used, while noting the Hebrew
    words differ.
- source_word: לְכַרְמוֹ
  chosen: concerning his vineyard
  alternatives:
  - for his vineyard
  - about his vineyard
  lexicon: HALOT
  rationale: 'The ל here is best taken as marking reference/topic: the song is about
    the beloved''s vineyard. ''Concerning'' is slightly formal but clear and precise.'
- source_word: כֶּרֶם
  chosen: vineyard
  alternatives:
  - vine-garden
  lexicon: HALOT
  rationale: Standard rendering for כֶּרֶם.
- source_word: הָיָה
  chosen: had
  alternatives:
  - there was
  - came to be
  lexicon: HALOT
  rationale: Though literally 'was,' idiomatic English with a possessive dative ('there
    was to my beloved a vineyard') is best rendered 'my beloved had a vineyard.'
- source_word: בְּקֶרֶן
  chosen: on a hill
  alternatives:
  - on a horn
  - on a ridge
  - on a promontory
  lexicon: HALOT
  rationale: קֶרֶן literally means 'horn,' but in topographical usage it refers metaphorically
    to a projecting hill or ridge. 'Hill' communicates the geographic sense naturally
    in English.
- source_word: בֶּן שָׁמֶן
  chosen: fertile
  alternatives:
  - son of oil
  - rich in oil
  - very fertile
  lexicon: HALOT
  rationale: The idiom literally 'son of oil' denotes richness/fatness, i.e., fertility.
    'Fertile' gives the sense in natural English; the more literal image is worth
    preserving in a footnote.
