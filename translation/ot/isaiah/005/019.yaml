id: ISA.5.19
reference: Isaiah 5:19
source:
  edition: WLC
  text: הָ/אֹמְרִ֗ים יְמַהֵ֧ר יָחִ֛ישָׁ/ה מַעֲשֵׂ֖/הוּ לְמַ֣עַן נִרְאֶ֑ה וְ/תִקְרַ֣ב
    וְ/תָב֗וֹאָ/ה עֲצַ֛ת קְד֥וֹשׁ יִשְׂרָאֵ֖ל וְ/נֵדָֽעָה׀׃ס
translation:
  text: who say, “Let him hurry, let him hasten his work, so that we may see it; let
    the plan of the Holy One of Israel draw near and come, so that we may know it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the counsel of the Holy One of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹמְרִים
  chosen: who say
  alternatives:
  - those who say
  lexicon: HALOT
  rationale: Participial form continuing the woe description from the previous verse;
    'who say' is natural English and preserves the ongoing characterization.
- source_word: יְמַהֵר
  chosen: let him hurry
  alternatives:
  - may he hurry
  - let him act quickly
  lexicon: HALOT
  rationale: Jussive-like force in context of mocking challenge; 'let him hurry' captures
    the taunting imperative directed toward God.
- source_word: יָחִישָׁה
  chosen: let him hasten
  alternatives:
  - let him speed up
  - may he hasten
  lexicon: HALOT
  rationale: Near-synonymous intensification with the previous verb. Rendering both
    separately preserves the Hebrew rhetorical doubling rather than collapsing them
    into one English verb.
- source_word: מַעֲשֵׂהוּ
  chosen: his work
  alternatives:
  - what he is doing
  - his deed
  lexicon: HALOT
  rationale: The noun broadly denotes deed/work/action. 'His work' is concise and
    leaves the referent open, fitting the scoffers' challenge to God's announced judgment.
- source_word: לְמַעַן נִרְאֶה
  chosen: so that we may see it
  alternatives:
  - that we may see
  - so we can see
  lexicon: HALOT
  rationale: Purpose clause with first common plural verb. 'It' is supplied in English
    for clarity, referring back to 'his work.'
- source_word: וְתִקְרַב
  chosen: let ... draw near
  alternatives:
  - let ... come near
  lexicon: HALOT
  rationale: The feminine singular verb agrees with 'plan/counsel.' Rendering as jussive
    in English matches the taunting volitive sequence.
- source_word: וְתָבוֹאָה
  chosen: and come
  alternatives:
  - and arrive
  lexicon: HALOT
  rationale: Paired with 'draw near' for emphasis. Keeping both verbs preserves the
    Hebrew parallelism and intensification.
- source_word: עֲצַת
  chosen: the plan
  alternatives:
  - the counsel
  - the purpose
  lexicon: HALOT
  rationale: The noun can mean counsel, plan, or purpose. 'Plan' is readable modern
    English and fits the context of God's intended action, while avoiding overly abstract
    phrasing.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  lexicon: HALOT
  rationale: Standard prophetic title for God in Isaiah; translated rather than transliterated,
    preserving its theological force and established sense.
- source_word: וְנֵדָעָה
  chosen: so that we may know it
  alternatives:
  - and let us know
  - that we may know
  lexicon: HALOT
  rationale: Final cohortative/volitive-like first plural in sequence. 'Know it' naturally
    completes the mock demand and parallels 'see it'; 'it' is supplied for English
    clarity, referring to the plan/work.
