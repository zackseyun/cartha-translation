theological_decisions:
- issue: Referent of the third-person singular verbs and suffixes
  chosen_reading: The speakers are mockingly challenging God to act quickly.
  alternative_readings:
  - The referent could be left more implicit as an unspecified 'he' in isolation.
  rationale: In context, 'his work' and 'the plan of the Holy One of Israel' identify
    the referent as God. The English keeps 'him/his' rather than replacing with 'God'
    in the quotation, preserving the Hebrew's rhetorical distance and scorn while
    remaining intelligible.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering עֲצַת as 'plan' rather than 'counsel'
  chosen_reading: the plan of the Holy One of Israel
  alternative_readings:
  - the counsel of the Holy One of Israel
  - the purpose of the Holy One of Israel
  rationale: No doctrinal dispute is at stake, but the choice affects tone. 'Plan'
    communicates divine intention in clear modern English without importing a technical
    theological nuance; the more formal 'counsel' is preserved in a footnote as a
    lexical alternative.
  doctrine_reference: Translation philosophy §6
