id: ISA.5.4
reference: Isaiah 5:4
source:
  edition: WLC
  text: מַה לַּ/עֲשׂ֥וֹת עוֹד֙ לְ/כַרְמִ֔/י וְ/לֹ֥א עָשִׂ֖יתִי בּ֑/וֹ מַדּ֧וּעַ קִוֵּ֛יתִי
    לַ/עֲשׂ֥וֹת עֲנָבִ֖ים וַ/יַּ֥עַשׂ בְּאֻשִֽׁים־׃
translation:
  text: What more was there to do for my vineyard that I have not done in it? Why,
    when I expected it to produce grapes, did it produce wild grapes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worthless grapes' or 'foul fruit'; the Hebrew term refers to bad, unusable
      fruit.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה לַּעֲשׂוֹת עוֹד
  chosen: What more was there to do
  alternatives:
  - What more was to be done
  - What else could have been done
  lexicon: HALOT
  rationale: The idiom combines interrogative מַה with infinitive לַעֲשׂוֹת and adverb
    עוֹד to express remaining action or possibility. 'What more was there to do' preserves
    the rhetorical force without over-paraphrasing into pure idiom.
- source_word: לְכַרְמִי
  chosen: for my vineyard
  alternatives:
  - to my vineyard
  lexicon: HALOT
  rationale: The preposition לְ here is best rendered 'for' in context of beneficial
    action done on behalf of the vineyard. 'Vineyard' is the straightforward sense
    of כֶּרֶם.
- source_word: וְלֹא עָשִׂיתִי בוֹ
  chosen: that I have not done in it
  alternatives:
  - which I did not do in it
  - that I have not done for it
  lexicon: HALOT
  rationale: 'The perfect first person with negation states completed action withheld;
    in context it is rhetorical: nothing has been left undone. The preposition בּוֹ
    is literally ''in it,'' referring to work carried out within/on the vineyard.
    ''In it'' stays closer to the Hebrew, though ''for it'' is possible idiomatically.'
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Standard interrogative of reason; 'Why' is natural and sufficiently direct.
- source_word: קִוֵּיתִי
  chosen: I expected
  alternatives:
  - I waited
  - I hoped
  lexicon: HALOT
  rationale: The verb קוה can mean wait/hope/expect. In this agricultural context,
    the sense is not mere waiting but expectation of outcome, so 'I expected' best
    fits the rhetorical complaint.
- source_word: לַעֲשׂוֹת עֲנָבִים
  chosen: it to produce grapes
  alternatives:
  - to yield grapes
  - to make grapes
  lexicon: HALOT
  rationale: Though עשה is literally 'do/make,' with produce of land it commonly means
    'yield/produce.' Supplying 'it' clarifies the vineyard as subject in English.
    'Grapes' is the ordinary sense of עֲנָבִים.
- source_word: וַיַּעַשׂ
  chosen: did it produce
  alternatives:
  - it produced
  - it yielded
  lexicon: HALOT
  rationale: The waw-consecutive advances the rhetorical question. Rendering with
    auxiliary inversion ('did it produce') matches English interrogative structure
    while preserving the verbal sense of עשה as agricultural production.
- source_word: בְּאֻשִׁים
  chosen: wild grapes
  alternatives:
  - stinking things
  - worthless grapes
  - bad fruit
  lexicon: HALOT
  rationale: The noun denotes foul or worthless fruit, traditionally in this context
    'wild grapes.' This is the most established and contextually precise English rendering,
    preserving the contrast with expected grapes. More literal options like 'stinking
    things' are possible but less clear in English.
