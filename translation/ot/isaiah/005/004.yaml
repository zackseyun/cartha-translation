theological_decisions:
- issue: Metaphorical vineyard imagery
  chosen_reading: Retain 'vineyard' literally in the main text without explicating
    its referent.
  alternative_readings:
  - Interpretively expand to 'my people' or 'Israel'
  rationale: The verse is part of Isaiah's vineyard song, where the metaphor is explained
    in the surrounding context. The translation should preserve the poetic image here
    rather than import the interpretation into the verse itself.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source text''s plain sense.'
