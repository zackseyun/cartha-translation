  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering תּוֹרָה in prophetic covenant context
  chosen_reading: the law
  alternative_readings:
  - instruction
  - teaching
  rationale: Although torah can broadly mean instruction, here the context is covenant violation and judicial judgment. 'The law' preserves that covenantal and authoritative force without importing extra doctrinal claims.
