id: ISA.5.24
reference: Isaiah 5:24
source:
  edition: WLC
  text: לָ/כֵן֩ כֶּ/אֱכֹ֨ל קַ֜שׁ לְשׁ֣וֹן אֵ֗שׁ וַ/חֲשַׁ֤שׁ לֶֽהָבָה֙ יִרְפֶּ֔ה שָׁרְשָׁ/ם֙ כַּ/מָּ֣ק יִֽהְיֶ֔ה וּ/פִרְחָ֖/ם כָּ/אָבָ֣ק יַעֲלֶ֑ה כִּ֣י מָאֲס֗וּ אֵ֚ת תּוֹרַת֙ יְהוָ֣ה צְבָא֔וֹת וְ/אֵ֛ת אִמְרַ֥ת קְדֽוֹשׁ יִשְׂרָאֵ֖ל נִאֵֽצוּ־׃
translation:
  text: Therefore, as the tongue of fire devours stubble, and dry grass sinks before the flame, so their root will become rot, and their blossom will go up like dust; for they have rejected the law of Yahweh of hosts, and have despised the word of the Holy One of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dry stubble' or 'chaff' for 'dry grass'; the Hebrew term denotes dry, combustible plant matter.
    reason: lexical_alternative
  - marker: b
    text: Or 'their root will be like rot'; the Hebrew comparison may be understood either as predicate ('will become rot') or as explicit simile.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - Therefore
  lexicon: HALOT
  rationale: Marks a consequential conclusion from the preceding indictment; 'Therefore' preserves the prophetic logic clearly in English.
- source_word: כֶּאֱכֹל
  chosen: as ... devours
  alternatives:
  - when ... consumes
  - as ... eats up
  lexicon: HALOT
  rationale: The prefixed כ plus infinitive construct gives a comparative sense, introducing the simile. 'Devours' is idiomatic and vivid for fire consuming fuel.
- source_word: קַשׁ
  chosen: stubble
  alternatives:
  - chaff
  - straw
  lexicon: HALOT
  rationale: Refers to dry stalk material left after harvest. 'Stubble' fits the agricultural image better than 'chaff,' which is lighter husk material.
- source_word: לְשׁוֹן אֵשׁ
  chosen: the tongue of fire
  alternatives:
  - a tongue of fire
  - flame
  lexicon: HALOT
  rationale: A vivid Hebrew metaphor retained in English. The construct literally means 'tongue of fire'; preserving it keeps the poetic force rather than flattening to simply 'flame.'
- source_word: חֲשַׁשׁ
  chosen: dry grass
  alternatives:
  - chaff
  - straw
  - dry stubble
  lexicon: HALOT
  rationale: The term denotes dry, easily combustible vegetation. 'Dry grass' communicates the sense naturally in modern English without overcommitting to a narrower agricultural referent.
- source_word: לֶהָבָה
  chosen: the flame
  alternatives:
  - flame
  - blaze
  lexicon: HALOT
  rationale: A straightforward rendering of the noun for flame; with the article in English for balance with the prior image.
- source_word: יִרְפֶּה
  chosen: sinks before
  alternatives:
  - becomes weak before
  - collapses before
  - is consumed by
  lexicon: HALOT
  rationale: The verb fundamentally conveys slackening, drooping, or becoming feeble. In this fire simile, 'sinks before the flame' captures the image of withering/collapsing under destructive heat without overstating the lexical sense as direct burning.
- source_word: שָׁרְשָׁם
  chosen: their root
  alternatives:
  - their roots
  lexicon: HALOT
  rationale: The singular collective works well in English and matches the Hebrew singular with plural suffix, portraying the source of life as a unit.
- source_word: כַּמָּק
  chosen: rot
  alternatives:
  - decay
  - rottenness
  lexicon: HALOT
  rationale: Denotes putrefaction/decay. 'Rot' is concise, vivid, and natural in modern English.
- source_word: וּפִרְחָם
  chosen: their blossom
  alternatives:
  - their flower
  - their bloom
  lexicon: HALOT
  rationale: Refers to what sprouts or blooms from the plant. 'Blossom' pairs well with 'root' and preserves the plant metaphor.
- source_word: כָּאָבָק יַעֲלֶה
  chosen: will go up like dust
  alternatives:
  - will rise like dust
  - will fly up like dust
  lexicon: HALOT
  rationale: The verb means 'go up/ascend.' 'Go up like dust' preserves the image of something insubstantial being carried away upward.
- source_word: מָאֲסוּ
  chosen: have rejected
  alternatives:
  - have despised
  - have refused
  lexicon: HALOT
  rationale: Conveys repudiation or refusal. 'Rejected' fits well with 'the law' as its object and avoids redundancy with the later verb rendered 'despised.'
- source_word: תּוֹרַת
  chosen: the law
  alternatives:
  - instruction
  - teaching
  lexicon: HALOT
  rationale: While torah can mean 'instruction,' in this covenantal prophetic context 'the law' is the most recognizable and weighty rendering, preserving the formal force of divine covenant teaching.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD Almighty
  - Yahweh of hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'Of hosts' preserves the traditional and semantically transparent title referring to heavenly armies/forces.
- source_word: אִמְרַת
  chosen: the word
  alternatives:
  - the utterance
  - the saying
  lexicon: HALOT
  rationale: Denotes spoken word/utterance. 'Word' is natural and weighty in English, suitable for prophetic denunciation.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  alternatives:
  - Israel's Holy One
  lexicon: HALOT
  rationale: A fixed Isaianic divine title. The standard rendering preserves both recognizability and theological force.
- source_word: נִאֵצוּ
  chosen: have despised
  alternatives:
  - have spurned
  - have treated with contempt
  lexicon: HALOT
  rationale: The verb is stronger than mere disregard and conveys contemptuous rejection. 'Despised' is forceful and idiomatic.
