id: ISA.5.17
reference: Isaiah 5:17
source:
  edition: WLC
  text: וְ/רָע֥וּ כְבָשִׂ֖ים כְּ/דָבְרָ֑/ם וְ/חָרְב֥וֹת מֵחִ֖ים גָּרִ֥ים יֹאכֵֽלוּ׃
translation:
  text: Then lambs will graze as in their pasture, and strangers will eat among the
    ruins of the well-fed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sheep' instead of 'lambs.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew כדברם is difficult; likely 'as in their pasture' or 'in their own
      grazing place.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the fat ones' or 'the wealthy' for 'the well-fed.'
    reason: lexical_alternative
  - marker: d
    text: Or 'sojourners' for 'strangers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָעוּ
  chosen: Then ... will graze
  alternatives:
  - and ... will graze
  - and ... will feed
  lexicon: HALOT
  rationale: From רעה in the Qal, here intransitive of animals feeding/grazing. The
    prefixed conjunction is rendered 'Then' to reflect consequential flow from the
    preceding judgment context rather than a mere additive 'and.'
- source_word: כְבָשׂים
  chosen: lambs
  alternatives:
  - sheep
  lexicon: HALOT
  rationale: כבשים can denote sheep generally, but 'lambs' preserves the common lexical
    sense and fits the image of vulnerable animals peacefully grazing where the proud
    had been judged.
- source_word: כדברם
  chosen: as in their pasture
  alternatives:
  - according to their word
  - as on their own pasture
  - in their own order
  lexicon: HALOT
  rationale: 'The form is difficult, but in context the traditional sense derived
    from דבר in the sense of pasture/place of driving is most coherent: the lambs
    graze freely as in their proper grazing ground. A literal ''according to their
    word'' is contextually implausible.'
- source_word: וחרבות
  chosen: among the ruins
  alternatives:
  - and ruins
  - waste places
  - desolate places
  lexicon: HALOT
  rationale: From חרבה/חרבות, denoting ruined or desolated places. 'Among the ruins'
    makes the locative force natural in English and suits the image of devastated
    estates.
- source_word: מחים
  chosen: of the well-fed
  alternatives:
  - of the fat ones
  - of the wealthy
  - fatlings
  lexicon: HALOT
  rationale: This rare form is commonly understood as referring to the fat/rich/prosperous.
    'Well-fed' preserves the concrete image while allowing the social nuance of the
    prosperous whose lands are now desolate.
- source_word: גרים
  chosen: strangers
  alternatives:
  - sojourners
  - foreigners
  lexicon: HALOT
  rationale: 'גרים refers to resident outsiders/sojourners. ''Strangers'' is concise
    and idiomatic here, highlighting reversal: outsiders consume what belonged to
    the prosperous.'
- source_word: יאכלו
  chosen: will eat
  alternatives:
  - will feed
  lexicon: HALOT
  rationale: The ordinary sense 'eat' fits the image of consuming produce in ruined
    places. 'Feed' is possible in English but less direct here.
