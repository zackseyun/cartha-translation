id: ISA.5.12
reference: Isaiah 5:12
source:
  edition: WLC
  text: וְ/הָיָ֨ה כִנּ֜וֹר וָ/נֶ֗בֶל תֹּ֧ף וְ/חָלִ֛יל וָ/יַ֖יִן מִשְׁתֵּי/הֶ֑ם וְ/אֵ֨ת פֹּ֤עַל יְהוָה֙ לֹ֣א יַבִּ֔יטוּ וּ/מַעֲשֵׂ֥ה יָדָ֖י/ו לֹ֥א רָאֽוּ׃
translation:
  text: There are lyre and harp, tambourine and flute, and wine at their feasts; but they do not look to the work of Yahweh, and they do not see the work of his hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their banquets' or 'their drinking feasts.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the work of the LORD ... the work of his hands,' a parallel expression emphasizing the LORD's acts that they ignore.
    reason: cross_reference
lexical_decisions:
- source_word: וְהָיָה
  chosen: There are
  alternatives:
  - and it was
  - and there was
  lexicon: HALOT
  rationale: The clause opens with a Qal perfect of היה used idiomatically to introduce the scene. In English, a presentative rendering fits the verse's descriptive force better than a wooden past tense. 'There are' captures the list-like depiction of what characterizes their banquets.
- source_word: כִנּוֹר
  chosen: lyre
  alternatives:
  - harp
  lexicon: HALOT
  rationale: כִּנּוֹר denotes a stringed instrument commonly rendered 'lyre.' 'Lyre' is more precise in modern English than the traditional but broader 'harp.'
- source_word: נֶבֶל
  chosen: harp
  alternatives:
  - lute
  - psaltery
  lexicon: HALOT
  rationale: נֶבֶל is another stringed instrument distinct from כִּנּוֹר. Since 'lyre' is used for כִּנּוֹר, 'harp' provides a natural differentiated rendering in readable English, though exact instrument identification is uncertain.
- source_word: תֹּף
  chosen: tambourine
  alternatives:
  - tambour
  - hand drum
  lexicon: HALOT
  rationale: תֹּף refers to a frame drum or tambourine-like percussion instrument. 'Tambourine' is the most familiar modern equivalent.
- source_word: חָלִיל
  chosen: flute
  alternatives:
  - pipe
  lexicon: HALOT
  rationale: חָלִיל denotes a wind instrument, likely a pipe or flute. 'Flute' is idiomatic and clear; 'pipe' is preserved as an alternative.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering of the Hebrew term for wine; no contextual reason to soften or alter it.
- source_word: מִשְׁתֵּיהֶם
  chosen: their feasts
  alternatives:
  - their banquets
  - their drinking parties
  lexicon: HALOT
  rationale: The noun denotes a drinking feast or banquet. 'Their feasts' is natural English and broad enough to include the drinking context already signaled by 'wine.' 'Banquets' is possible; 'drinking parties' is more interpretive and colloquial.
- source_word: פֹּעַל יְהוָה
  chosen: the work of the LORD
  alternatives:
  - the deed of the LORD
  - what the LORD has done
  lexicon: HALOT
  rationale: פֹּעַל means work, deed, or activity. 'The work of the LORD' preserves the compact Hebrew expression and its theological weight. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יַבִּיטוּ
  chosen: look to
  alternatives:
  - regard
  - look at
  lexicon: HALOT
  rationale: The Hiphil of נבט here conveys directed attention or regard, not merely physical sight. 'Look to' captures the sense of paying heed while remaining idiomatic.
- source_word: מַעֲשֵׂה יָדָיו
  chosen: the work of his hands
  alternatives:
  - what his hands have made
  - the deed of his hands
  lexicon: HALOT
  rationale: This is a common Hebrew expression for what someone has made or done. 'The work of his hands' preserves the concrete imagery and parallelism with 'the work of the LORD.'
- source_word: רָאוּ
  chosen: they do not see
  alternatives:
  - they have not seen
  - they do not perceive
  lexicon: HALOT
  rationale: Though morphologically perfect, in this poetic parallelism it functions as a present characterization. 'They do not see' matches the ongoing indictment and pairs naturally with 'do not look to.'
