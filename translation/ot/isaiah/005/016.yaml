theological_decisions:
- issue: Rendering divine holiness language without implying change in God's nature
  chosen_reading: shows himself holy
  alternative_readings:
  - is sanctified
  - is made holy
  rationale: The Hebrew Niphal can be rendered formally as 'is sanctified,' but in
    English that may wrongly suggest that God is acted upon or becomes holy. The context
    indicates public vindication/display of his holiness through righteous judgment.
  doctrine_reference: Translation philosophy §1, §3
- issue: Maintaining distinction between מִשְׁפָּט and צְדָקָה
  chosen_reading: justice ... righteousness
  alternative_readings:
  - judgment ... justice
  - justice ... justice
  rationale: 'Isaiah pairs related but distinct terms. Rendering them with two different
    English words preserves the poetic and theological nuance: God''s exaltation is
    displayed in justice/judgment, and his holiness is manifested in righteousness.'
  doctrine_reference: Translation philosophy §5
