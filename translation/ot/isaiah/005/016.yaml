id: ISA.5.16
reference: Isaiah 5:16
source:
  edition: WLC
  text: וַ/יִּגְבַּ֛ה יְהוָ֥ה צְבָא֖וֹת בַּ/מִּשְׁפָּ֑ט וְ/הָ/אֵל֙ הַ/קָּד֔וֹשׁ נִקְדָּ֖שׁ
    בִּ/צְדָקָֽה׃
translation:
  text: But the LORD of hosts is exalted in justice, and the Holy God shows himself
    holy in righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in judgment.' The Hebrew מִשְׁפָּט can denote either justice in principle
      or judicial judgment in action.
    reason: lexical_alternative
  - marker: b
    text: Or 'is sanctified' or 'is shown holy.' The sense is that God’s holiness
      is manifested or vindicated.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְבַּה
  chosen: is exalted
  alternatives:
  - is high
  - is lifted up
  - shows himself exalted
  lexicon: HALOT
  rationale: From גבה, 'to be high/exalted.' In context of divine vindication through
    judgment, an English passive-like stative 'is exalted' best captures the sense
    that the LORD's lofty status is displayed.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - of heavenly armies
  lexicon: HALOT
  rationale: Traditional but still transparent rendering of the title; it preserves
    the breadth of צבאות beyond merely human armies.
- source_word: בַּמִּשְׁפָּט
  chosen: in justice
  alternatives:
  - by justice
  - in judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote justice or judgment. Here it describes the sphere/means
    by which the LORD is shown exalted in the preceding context of judicial punishment.
    'In justice' communicates both the judicial and moral dimension in natural English.
- source_word: וְהָאֵל הַקָּדוֹשׁ
  chosen: and the Holy God
  alternatives:
  - and God, the Holy One
  - and the holy God
  lexicon: HALOT
  rationale: Constructing the phrase as 'the Holy God' is idiomatic and preserves
    both the noun אֵל and the attributive adjective הַקָּדוֹשׁ. Capitalizing 'Holy'
    reflects its titular force in Isaiah's style.
- source_word: נִקְדָּשׁ
  chosen: shows himself holy
  alternatives:
  - is sanctified
  - is shown holy
  - is proved holy
  lexicon: HALOT
  rationale: Niphal of קדש here means to be shown/proved holy, not that God becomes
    holy. 'Shows himself holy' is idiomatic English that preserves the manifestation
    sense.
- source_word: בִּצְדָקָה
  chosen: in righteousness
  alternatives:
  - by righteousness
  - through righteousness
  - in justice
  lexicon: HALOT
  rationale: צְדָקָה commonly denotes righteousness, and here parallels מִשְׁפָּט.
    'In righteousness' preserves the lexical distinction while showing the moral basis
    on which God's holiness is manifested.
