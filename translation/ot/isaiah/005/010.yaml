id: ISA.5.10
reference: Isaiah 5:10
source:
  edition: WLC
  text: כִּ֗י עֲשֶׂ֨רֶת֙ צִמְדֵּי כֶ֔רֶם יַעֲשׂ֖וּ בַּ֣ת אֶחָ֑ת וְ/זֶ֥רַע חֹ֖מֶר יַעֲשֶׂ֥ה
    אֵיפָֽה־׃פ
translation:
  text: For ten yoke-pairs of vineyard will yield one bath, and a homer of seed will
    yield an ephah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ten yokes of vineyard'; the Hebrew likely refers to the amount of land
      worked by ten yoke-pairs, not necessarily literal paired animals standing in
      the vineyard.
    reason: lexical_alternative
  - marker: b
    text: 'A bath was a liquid measure; an ephah was a dry measure. The point is severe
      agricultural scarcity: a large vineyard yields very little wine, and a large
      amount of seed yields only a small harvest.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  lexicon: HALOT
  rationale: Introduces an explanation/result flowing from the preceding judgment
    oracle. 'For' best preserves the causal/explanatory force in natural English.
- source_word: עֲשֶׂרֶת
  chosen: ten
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: צִמְדֵּי כֶרֶם
  chosen: yoke-pairs of vineyard
  alternatives:
  - yokes of vineyard
  - ten acres of vineyard
  lexicon: HALOT
  rationale: צֶמֶד refers literally to a pair, especially a yoke/pair of oxen, and
    by extension the amount of land plowed by such a pair. Here, with vineyard, the
    phrase is an agrarian measure. 'Yoke-pairs of vineyard' keeps the concrete Hebrew
    image rather than converting to an approximate modern acreage. The singular 'vineyard'
    after the construct is retained as a collective/genitival expression.
- source_word: יַעֲשׂוּ
  chosen: will yield
  alternatives:
  - will produce
  - will make
  lexicon: HALOT
  rationale: Though עשה is literally 'do/make,' in agricultural contexts with produce
    measures it idiomatically means 'produce' or 'yield.' 'Will yield' is idiomatic
    and clear.
- source_word: בַּת אֶחָת
  chosen: one bath
  lexicon: HALOT
  rationale: Bath is an ancient liquid measure. Retaining the unit preserves the source-text
    specificity better than approximating in gallons/liters in the main text.
- source_word: וְזֶרַע חֹמֶר
  chosen: and a homer of seed
  alternatives:
  - and seed of a homer
  - and a homer-measure of seed
  lexicon: HALOT
  rationale: Construct phrase indicating a homer quantity of seed. 'A homer of seed'
    is the most natural English while preserving the ancient measure.
- source_word: יַעֲשֶׂה
  chosen: will yield
  alternatives:
  - will produce
  - will make
  lexicon: HALOT
  rationale: Same verb as earlier; rendered consistently in this agricultural context.
- source_word: אֵיפָה
  chosen: an ephah
  lexicon: HALOT
  rationale: Ancient dry measure retained in transliteration for precision and transparency.
