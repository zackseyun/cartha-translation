theological_decisions:
- issue: Sense of 'knowledge' in prophetic indictment
  chosen_reading: knowledge
  alternative_readings:
  - understanding
  rationale: The Hebrew דַּעַת can denote knowledge broadly, including covenantal
    and moral knowledge of God. 'Knowledge' preserves that theological breadth without
    narrowing it to mere intellectual understanding.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
