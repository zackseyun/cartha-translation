id: ISA.5.13
reference: Isaiah 5:13
source:
  edition: WLC
  text: לָ/כֵ֛ן גָּלָ֥ה עַמִּ֖/י מִ/בְּלִי דָ֑עַת וּ/כְבוֹד/וֹ֙ מְתֵ֣י רָעָ֔ב וַ/הֲמוֹנ֖/וֹ
    צִחֵ֥ה צָמָֽא־׃
translation:
  text: Therefore my people go into exile for lack of knowledge; their honored men
    are dying of hunger, and their multitude is parched with thirst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their nobles'; Hebrew literally 'his glory, men of hunger,' likely referring
      to the honored or prominent people of the nation.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks a consequential conclusion from the preceding indictment; 'Therefore'
    preserves the prophetic logic clearly in modern English.
- source_word: גָּלָה
  chosen: go into exile
  alternatives:
  - are exiled
  - have gone into exile
  - are carried away
  lexicon: HALOT
  rationale: The verb commonly denotes going into exile or being led away captive.
    'Go into exile' preserves the exile sense without over-specifying agency, which
    the Hebrew does not state explicitly here.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward covenantal expression; the first-person suffix indicates
    YHWH speaking of Israel/Judah as 'my people.'
- source_word: מִבְּלִי דָעַת
  chosen: for lack of knowledge
  alternatives:
  - without knowledge
  - because they have no knowledge
  lexicon: HALOT
  rationale: This idiom expresses absence or deficiency. 'For lack of knowledge' is
    idiomatic English and preserves the causal force in context.
- source_word: כְבוֹדוֹ
  chosen: their honored men
  alternatives:
  - his glory
  - its glory
  - their nobles
  lexicon: HALOT
  rationale: Although literally 'his glory,' in context the singular suffix refers
    collectively to the people, and the following plural-partitive construction points
    to prominent persons within the nation. Rendering it as 'their honored men' best
    captures the sense of the socially distinguished or noble class rather than an
    abstract 'glory.'
- source_word: מְתֵי רָעָב
  chosen: are dying of hunger
  alternatives:
  - men of hunger
  - starved men
  - dead with hunger
  lexicon: HALOT
  rationale: The construct phrase literally means 'men of hunger,' an idiom for people
    afflicted by famine/hunger. 'Are dying of hunger' communicates the condition naturally
    in English while preserving the severity.
- source_word: הֲמוֹנוֹ
  chosen: their multitude
  alternatives:
  - his multitude
  - their crowd
  - their masses
  lexicon: HALOT
  rationale: Refers to the mass of the people. 'Their multitude' is slightly formal
    but clear and preserves the collective sense.
- source_word: צִחֵה
  chosen: is parched
  alternatives:
  - is dried up
  - is scorched
  lexicon: HALOT
  rationale: Adjectival form describing extreme dryness. 'Parched' fits naturally
    with the following 'thirst' and conveys physical depletion.
- source_word: צָמָא
  chosen: with thirst
  alternatives:
  - from thirst
  - thirsty
  lexicon: HALOT
  rationale: The noun intensifies the condition named by 'parched.' 'With thirst'
    preserves the Hebrew pairing and reads naturally in English.
