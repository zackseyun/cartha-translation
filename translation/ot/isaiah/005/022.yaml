id: ISA.5.22
reference: Isaiah 5:22
source:
  edition: WLC
  text: ה֕וֹי גִּבּוֹרִ֖ים לִ/שְׁתּ֣וֹת יָ֑יִן וְ/אַנְשֵׁי חַ֖יִל לִ/מְסֹ֥ךְ שֵׁכָֽר־׃
translation:
  text: Woe to those who are heroes at drinking wine, and men of strength at mixing
    strong drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mighty men' for 'heroes'; the Hebrew term often refers to warriors or
      powerful men, but here it is used ironically of drinking prowess.
    reason: lexical_alternative
  - marker: b
    text: Or 'men of valor.' The phrase commonly denotes capable or valiant men, here
      applied sarcastically to those skilled in preparing intoxicating drink.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Prophetic interjection of denunciation/lament. 'Woe' is the standard
    and most forceful English equivalent in judgment oracles.
- source_word: גִּבּוֹרִים
  chosen: heroes
  alternatives:
  - mighty men
  - warriors
  lexicon: HALOT
  rationale: Literally 'mighty ones/warriors,' but here used ironically for people
    notable only for drinking. 'Heroes' preserves the ironic commendation better than
    the more military 'warriors.'
- source_word: לִשְׁתּוֹת
  chosen: at drinking
  alternatives:
  - to drink
  lexicon: HALOT
  rationale: The infinitive with ל expresses the sphere in which they are considered
    'heroes.' English idiom is smoother with 'at drinking' rather than a wooden 'to
    drink.'
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering for the common Hebrew term for wine.
- source_word: וְאַנְשֵׁי חַיִל
  chosen: men of strength
  alternatives:
  - men of valor
  - capable men
  - strong men
  lexicon: HALOT
  rationale: The phrase often denotes valiant or capable men. Here it is also ironic,
    parallel to גִּבּוֹרִים. 'Men of strength' preserves the masculine form and the
    sense of prowess without importing a military setting too strongly.
- source_word: לִמְסֹךְ
  chosen: at mixing
  alternatives:
  - to mix
  - at preparing
  lexicon: HALOT
  rationale: The verb means to mix, especially wine or drink. 'At mixing' matches
    the parallel structure with 'at drinking' and reflects the infinitive's functional
    sense.
- source_word: שֵׁכָר
  chosen: strong drink
  alternatives:
  - beer
  - intoxicating drink
  lexicon: HALOT
  rationale: A broad term for intoxicating beverage other than or alongside wine.
    'Strong drink' is the conventional and sufficiently clear English rendering without
    over-specifying the beverage type.
