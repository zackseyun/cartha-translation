id: ISA.5.25
reference: Isaiah 5:25
source:
  edition: WLC
  text: עַל כֵּ֡ן חָרָה֩ אַף יְהוָ֨ה בְּ/עַמּ֜/וֹ וַ/יֵּ֣ט יָד֧/וֹ עָלָ֣י/ו וַ/יַּכֵּ֗/הוּ
    וַֽ/יִּרְגְּזוּ֙ הֶֽ/הָרִ֔ים וַ/תְּהִ֧י נִבְלָתָ֛/ם כַּ/סּוּחָ֖ה בְּ/קֶ֣רֶב חוּצ֑וֹת
    בְּ/כָל זֹאת֙ לֹא שָׁ֣ב אַפּ֔/וֹ וְ/ע֖וֹד יָד֥/וֹ נְטוּיָֽה־־־־׃
translation:
  text: Therefore the anger of the LORD burned against his people, and he stretched
    out his hand against them and struck them; the mountains quaked, and their corpses
    became like refuse in the midst of the streets. For all this, his anger has not
    turned away, and his hand is still stretched out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like sweepings'; the Hebrew term refers to something swept away or discarded.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: A standard inferential connector introducing the consequence of the preceding
    indictment. 'Therefore' is natural and preserves the formal causal force.
- source_word: חָרָה אַף יְהוָה
  chosen: the anger of the LORD burned
  alternatives:
  - the LORD's anger burned
  - the LORD became angry
  lexicon: HALOT
  rationale: The idiom חרה אף literally involves the burning of anger/nose. Rendering
    it as 'the anger of the LORD burned' preserves the vivid Hebrew image while remaining
    idiomatic English. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered according to the stated default in DOCTRINE.md.
- source_word: בְּעַמּוֹ
  chosen: against his people
  alternatives:
  - with his people
  - at his people
  lexicon: HALOT
  rationale: Although the preposition is ב, with verbs of anger it can mark the object
    of wrath. In English, 'against his people' best conveys the hostile direction
    of the anger in context.
- source_word: וַיֵּט יָדוֹ עָלָיו
  chosen: he stretched out his hand against them
  alternatives:
  - he extended his hand against them
  - he turned his hand against them
  lexicon: HALOT
  rationale: The idiom of stretching out the hand signals active judgment. The singular
    pronominal suffix on עָלָיו refers collectively to the people; English requires
    plural 'them' for clarity.
- source_word: וַיַּכֵּהוּ
  chosen: and struck them
  alternatives:
  - and smote them
  - and struck it/him
  lexicon: HALOT
  rationale: The singular object suffix again refers to the collective noun 'people.'
    'Struck them' is idiomatic modern English and preserves the judgment action.
- source_word: וַיִּרְגְּזוּ הֶהָרִים
  chosen: the mountains quaked
  alternatives:
  - the mountains trembled
  - the mountains shook
  lexicon: HALOT
  rationale: The verb denotes shaking or quaking. 'Quaked' fits the elevated prophetic
    register and the cosmic effect of divine wrath.
- source_word: נִבְלָתָם
  chosen: their corpses
  alternatives:
  - their carcasses
  - their dead bodies
  lexicon: HALOT
  rationale: The noun refers to dead bodies/carcasses. 'Corpses' is clear, grave,
    and suitably dignified without softening the horror.
- source_word: כַּסּוּחָה
  chosen: like refuse
  alternatives:
  - like sweepings
  - like dung
  - like offscouring
  lexicon: HALOT
  rationale: The term denotes what is swept away or discarded. 'Like refuse' communicates
    the image accessibly; a more specific alternative is preserved in a footnote because
    'sweepings' is also plausible.
- source_word: בְּקֶרֶב חוּצוֹת
  chosen: in the midst of the streets
  alternatives:
  - in the middle of the streets
  - in the public squares
  lexicon: HALOT
  rationale: This phrase places the corpses openly within the city's thoroughfares.
    'In the midst of the streets' preserves the solemn tone and spatial force.
- source_word: בְּכָל זֹאת
  chosen: For all this
  alternatives:
  - In all this
  - Despite all this
  lexicon: HALOT
  rationale: This recurring refrain in Isaiah introduces the insufficiency of prior
    judgment to exhaust divine anger. 'For all this' is the established and contextually
    apt rendering.
- source_word: לֹא שָׁב אַפּוֹ
  chosen: his anger has not turned away
  alternatives:
  - his anger has not returned
  - his nose has not turned back
  lexicon: HALOT
  rationale: The idiom means that divine wrath has not relented. 'Has not turned away'
    is idiomatic and preserves the metaphor of anger not being withdrawn.
- source_word: וְעוֹד יָדוֹ נְטוּיָה
  chosen: and his hand is still stretched out
  alternatives:
  - and his hand remains extended
  - and his hand is yet outstretched
  lexicon: HALOT
  rationale: This is a key Isaianic refrain of ongoing judgment. 'Still stretched
    out' is natural modern English and retains the image of continuing punitive action.
