theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The translation follows the project's stated default for YHWH, preserving
    reverential convention and consistency with the doctrine guidelines.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Anthropomorphic language for divine wrath and action
  chosen_reading: Retain the imagery of burning anger and the outstretched hand
  alternative_readings:
  - Flatten to abstract statements such as 'the LORD was very angry' and 'continued
    to punish'
  rationale: The Hebrew uses embodied imagery to communicate real divine judgment.
    Preserving the anthropomorphic expressions maintains the prophetic force without
    making claims beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
