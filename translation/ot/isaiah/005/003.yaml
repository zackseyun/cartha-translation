theological_decisions:
- issue: Representative singular and gendered address
  chosen_reading: Retain singular forms as 'inhabitant of Jerusalem and man of Judah'
  alternative_readings:
  - inhabitants of Jerusalem and men of Judah
  - people of Jerusalem and Judah
  rationale: The Hebrew addresses the audience corporately through representative
    singular expressions. Following the translation philosophy's gender-accurate principle,
    the masculine singular אִישׁ is rendered 'man' rather than neutralized. This preserves
    the source texture while still clearly functioning as a corporate address.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
