id: ISA.5.3
reference: Isaiah 5:3
source:
  edition: WLC
  text: וְ/עַתָּ֛ה יוֹשֵׁ֥ב יְרוּשָׁלִַ֖ם וְ/אִ֣ישׁ יְהוּדָ֑ה שִׁפְטוּ נָ֕א בֵּינִ֖/י
    וּ/בֵ֥ין כַּרְמִֽ/י־׃
translation:
  text: And now, inhabitant of Jerusalem and man of Judah, judge, please, between
    me and my vineyard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has singular expressions, 'inhabitant of Jerusalem' and 'man of Judah,'
      used as a representative address to the people collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Standard discourse transition; retaining 'And' preserves continuity with
    the preceding song-speech while 'now' marks the rhetorical turn to direct address.
- source_word: יוֹשֵׁב יְרוּשָׁלַם
  chosen: inhabitant of Jerusalem
  alternatives:
  - resident of Jerusalem
  - you who dwell in Jerusalem
  lexicon: HALOT
  rationale: The singular participle with the city name functions collectively, addressing
    the population as a representative singular. 'Inhabitant of Jerusalem' preserves
    the singular form more closely than a plural rendering while remaining natural
    English.
- source_word: וְאִישׁ יְהוּדָה
  chosen: and man of Judah
  alternatives:
  - and men of Judah
  - and people of Judah
  lexicon: HALOT
  rationale: Hebrew uses singular אִישׁ in a representative/generic sense parallel
    to 'inhabitant of Jerusalem.' Per gender-accurate policy, 'man' is retained rather
    than neutralizing to 'person/people'; the phrase addresses Judah corporately through
    a representative singular.
- source_word: שִׁפְטוּ
  chosen: judge
  alternatives:
  - decide
  - render judgment
  lexicon: HALOT
  rationale: Imperative plural from שׁפט calls for an evaluative judgment. 'Judge'
    is the most direct and contextually fitting rendering.
- source_word: נָא
  chosen: please
  alternatives:
  - now
  - I pray you
  lexicon: HALOT
  rationale: Particle of entreaty softening the imperative. 'Please' conveys the rhetorical
    appeal in readable modern English without archaism.
- source_word: בֵּינִי וּבֵין כַּרְמִי
  chosen: between me and my vineyard
  alternatives:
  - between me and my vine-garden
  lexicon: HALOT
  rationale: The repeated preposition marks the two parties in the dispute metaphor.
    'Vineyard' is the standard and natural rendering of כֶּרֶם in this context.
