theological_decisions:
- issue: Personification of Babylon in feminine royal imagery
  chosen_reading: Retain the feminine personification as 'virgin daughter Babylon'
    and 'daughter of the Chaldeans' without flattening to merely 'Babylon.'
  alternative_readings:
  - Babylon, the virgin daughter
  - fair Babylon
  rationale: The verse is a prophetic taunt against Babylon cast as a humiliated royal
    woman. Preserving the personification is important to the literary and theological
    force of the judgment oracle.
