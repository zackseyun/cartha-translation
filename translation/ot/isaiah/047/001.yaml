id: ISA.47.1
reference: Isaiah 47:1
source:
  edition: WLC
  text: רְדִ֣י וּ/שְׁבִ֣י עַל עָפָ֗ר בְּתוּלַת֙ בַּת בָּבֶ֔ל שְׁבִי לָ/אָ֥רֶץ אֵין
    כִּסֵּ֖א בַּת כַּשְׂדִּ֑ים כִּ֣י לֹ֤א תוֹסִ֨יפִי֙ יִקְרְאוּ לָ֔/ךְ רַכָּ֖ה וַ/עֲנֻגָּֽה׀־־־־־־׃
translation:
  text: Come down and sit in the dust, virgin daughter Babylon; sit on the ground
    without a throne, daughter of the Chaldeans. For they will no longer call you
    tender and delicate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Go down and sit in the dust.'
    reason: lexical_alternative
  - marker: b
    text: '''Virgin daughter Babylon'' is a poetic personification of the city/empire
      as a young royal woman.'
    reason: cultural_note
  - marker: c
    text: Or 'there is no throne' or 'with no throne.'
    reason: lexical_alternative
  - marker: d
    text: Or 'soft and pampered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רְדִי
  chosen: Come down
  alternatives:
  - Go down
  - Descend
  lexicon: HALOT
  rationale: Imperative feminine singular from ירד. 'Come down' is idiomatic English
    for a summons to descend from an exalted position and fits the taunt/judgment
    context better than the more wooden 'go down.'
- source_word: וּשְׁבִי / שְׁבִי
  chosen: sit / sit
  alternatives:
  - sit down
  - dwell
  lexicon: HALOT
  rationale: Imperative from ישב. In parallel with 'come down' and then 'on the ground,'
    the sense is to take a lowered seated position, not to dwell. Repeating 'sit'
    preserves the Hebrew rhetoric.
- source_word: עַל עָפָר
  chosen: in the dust
  alternatives:
  - on the dust
  - upon the dust
  lexicon: HALOT
  rationale: Though literally 'on dust,' English idiom strongly prefers 'in the dust'
    for humiliation imagery. This preserves the metaphor of abasement without awkwardness.
- source_word: בְּתוּלַת בַּת בָּבֶל
  chosen: virgin daughter Babylon
  alternatives:
  - Virgin Daughter Babylon
  - maiden daughter Babylon
  lexicon: HALOT
  rationale: A construct chain personifying Babylon as an untouched young woman. 'Virgin
    daughter Babylon' is the most transparent and established English equivalent;
    'maiden' is possible but less precise.
- source_word: לָאָרֶץ
  chosen: on the ground
  alternatives:
  - to the ground
  - to the earth
  lexicon: HALOT
  rationale: With the repeated imperative 'sit,' the phrase denotes the place where
    she is to sit. 'On the ground' is natural English and parallels 'in the dust.'
- source_word: אֵין כִּסֵּא
  chosen: without a throne
  alternatives:
  - there is no throne
  - with no throne
  lexicon: HALOT
  rationale: 'The verbless clause explains the humiliation: she is to sit on the ground
    as one deprived of royal status. ''Without a throne'' communicates the circumstantial
    force smoothly in English.'
- source_word: בַּת כַּשְׂדִּים
  chosen: daughter of the Chaldeans
  alternatives:
  - daughter Chaldea
  - daughter of Chaldea
  lexicon: HALOT
  rationale: Another personifying title for Babylon. 'Of the Chaldeans' follows the
    plural gentilic form in the Hebrew text more closely than the singular territorial
    rendering.
- source_word: כִּי לֹא תוֹסִיפִי
  chosen: For they will no longer
  alternatives:
  - For you will not continue to
  - For no longer will you
  lexicon: HALOT
  rationale: 'The idiom with יסף plus following verb means cessation of a prior state:
    ''you will no longer...'' In English the subject is completed by the following
    impersonal plural verb, yielding ''they will no longer call you.'''
- source_word: יִקְרְאוּ לָךְ
  chosen: they will ... call you
  alternatives:
  - one will call you
  - you will be called
  lexicon: HALOT
  rationale: Third person plural is an impersonal/passive-like construction. 'They
    will call you' is the most direct rendering; English readers naturally understand
    the indefinite subject.
- source_word: רַכָּה
  chosen: tender
  alternatives:
  - soft
  - delicate
  lexicon: HALOT
  rationale: Describes softness or tenderness. 'Tender' pairs well with the following
    adjective and avoids repeating 'delicate' for both terms.
- source_word: וַעֲנֻגָּה
  chosen: delicate
  alternatives:
  - luxurious
  - pampered
  - dainty
  lexicon: HALOT
  rationale: Conveys luxurious delicacy or pampered refinement. 'Delicate' is concise
    and idiomatic in the collocation 'tender and delicate,' while 'pampered' is more
    interpretive.
