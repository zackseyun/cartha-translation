theological_decisions:
- issue: Divine action in 'I profaned my inheritance'
  chosen_reading: Retain the strong first-person statement that God himself 'profaned'
    or treated his inheritance as exposed to judgment.
  alternative_readings:
  - Soften to 'I abandoned my inheritance'
  - 'Interpret as permissive only: ''I allowed my inheritance to be profaned'''
  rationale: The Hebrew verb is active first person and should not be softened to
    avoid theological discomfort. The verse presents God as judicially handing over
    his people while Babylon remains culpable for merciless excess.
  doctrine_reference: Translation philosophy §§1, 3
