id: ISA.47.6
reference: Isaiah 47:6
source:
  edition: WLC
  text: קָצַ֣פְתִּי עַל עַמִּ֗/י חִלַּ֨לְתִּי֙ נַחֲלָתִ֔/י וָ/אֶתְּנֵ֖/ם בְּ/יָדֵ֑/ךְ
    לֹא שַׂ֤מְתְּ לָ/הֶם֙ רַחֲמִ֔ים עַל זָקֵ֕ן הִכְבַּ֥דְתְּ עֻלֵּ֖/ךְ מְאֹֽד־־־׃
translation:
  text: I was angry with my people; I profaned my inheritance and gave them into your
    hand. You showed them no mercy; on the aged you made your yoke very heavy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I defiled my heritage.' The Hebrew verb can also carry the sense 'treated
      as common' or 'profaned.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'you did not set mercies for them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'on the elderly you made your yoke exceedingly heavy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָצַפְתִּי
  chosen: I was angry
  alternatives:
  - I was enraged
  - I was wrathful
  lexicon: HALOT
  rationale: The verb קצף denotes being angry or wrathful. 'I was angry' is natural
    modern English and adequately conveys divine displeasure without overstating beyond
    the Hebrew.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward covenantal language; 'people' preserves the collective
    sense.
- source_word: חִלַּלְתִּי
  chosen: I profaned
  alternatives:
  - I defiled
  - I treated as common
  lexicon: HALOT
  rationale: Piel of חלל commonly means to profane or desecrate. 'I profaned' preserves
    the strong cultic/theological force better than a softer paraphrase.
- source_word: נַחֲלָתִי
  chosen: my inheritance
  alternatives:
  - my heritage
  - my possession
  lexicon: HALOT
  rationale: נחלה often refers to an inheritance or heritage. 'My inheritance' keeps
    the covenantal ownership language and matches the possessive force.
- source_word: וָאֶתְּנֵם בְּיָדֵךְ
  chosen: and gave them into your hand
  alternatives:
  - and delivered them into your hand
  - and handed them over to you
  lexicon: HALOT
  rationale: The idiom 'give into the hand' means to hand over to another's power.
    'Into your hand' preserves the Hebrew imagery while remaining idiomatic in English.
- source_word: לֹא שַׂמְתְּ לָהֶם רַחֲמִים
  chosen: You showed them no mercy
  alternatives:
  - You did not set mercies for them
  - You had no compassion on them
  lexicon: HALOT
  rationale: The Hebrew literally says 'you did not place mercies for them,' an idiom
    best rendered as showing no mercy or compassion. 'Showed them no mercy' is clear
    and faithful.
- source_word: רַחֲמִים
  chosen: mercy
  alternatives:
  - compassion
  lexicon: HALOT
  rationale: רחמים can mean mercy or compassion. 'Mercy' fits the context of harsh
    treatment after conquest.
- source_word: זָקֵן
  chosen: the aged
  alternatives:
  - the old man
  - the elderly
  lexicon: HALOT
  rationale: The singular adjective functions collectively/generically. 'The aged'
    preserves the class reference and avoids an unnecessarily individualized reading.
- source_word: הִכְבַּדְתְּ
  chosen: you made ... heavy
  alternatives:
  - you made ... burdensome
  - you pressed heavily
  lexicon: HALOT
  rationale: Hiphil of כבד means to make heavy. Retaining 'heavy' preserves the metaphor
    used with 'yoke'.
- source_word: עֻלֵּךְ
  chosen: your yoke
  alternatives:
  - your burden
  lexicon: HALOT
  rationale: עֹל is literally a yoke and commonly metaphorical for oppressive domination.
    'Yoke' preserves the image and prophetic rhetoric.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: A standard intensifier; 'very' is the most natural concise rendering
    in modern English.
