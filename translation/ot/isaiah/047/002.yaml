theological_decisions:
- issue: Nature of the humiliation imagery
  chosen_reading: The verse is rendered as a sequence of commands depicting Babylon's
    enforced humiliation and loss of royal dignity, without making the exposure more
    explicitly sexual than the Hebrew requires.
  alternative_readings:
  - A more overtly sexualized exposure reading
  rationale: The commands clearly portray shame and abasement, but the translation
    should not intensify the imagery beyond the lexical data. 'Uncover your veil...
    strip off your train... uncover the leg' preserves the escalating exposure while
    remaining text-bound.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
