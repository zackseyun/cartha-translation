id: ISA.47.2
reference: Isaiah 47:2
source:
  edition: WLC
  text: קְחִ֥י רֵחַ֖יִם וְ/טַ֣חֲנִי קָ֑מַח גַּלִּ֨י צַמָּתֵ֧/ךְ חֶשְׂפִּי שֹׁ֛בֶל
    גַּלִּי שׁ֖וֹק עִבְרִ֥י נְהָרֽוֹת־־׃
translation:
  text: Take the millstones and grind flour; uncover your veil, strip off your train,
    uncover the leg, cross over the rivers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your locks' or 'your hair' for 'your veil.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your skirt' for 'your train.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the thigh' for 'the leg.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קְחִי
  chosen: Take
  alternatives:
  - Seize
  - Pick up
  lexicon: HALOT
  rationale: Qal imperative 2fs of לקח, a direct command to take up the implements
    for menial labor. 'Take' is the most natural English imperative here.
- source_word: רֵחַיִם
  chosen: the millstones
  alternatives:
  - the handmill
  - the mill
  lexicon: HALOT
  rationale: The noun denotes a mill or millstones used for grinding grain. 'Millstones'
    preserves the concrete image and fits the following command to grind flour.
- source_word: וְטַחֲנִי קָמַח
  chosen: and grind flour
  alternatives:
  - and grind meal
  lexicon: HALOT
  rationale: טחן means 'grind'; קמח is 'flour' rather than the broader 'meal' in most
    contemporary English usage. The phrase depicts humiliating domestic slave labor.
- source_word: גַּלִּי
  chosen: uncover
  alternatives:
  - remove
  - lay bare
  lexicon: HALOT
  rationale: Piel imperative of גלה, here used repeatedly for exposing what was covered.
    'Uncover' keeps the repeated verbal pattern in English.
- source_word: צַמָּתֵךְ
  chosen: your veil
  alternatives:
  - your locks
  - your hair
  lexicon: HALOT
  rationale: The term can refer to hair or a covering associated with the head. In
    this context of progressive public exposure and humiliation, 'veil' best fits
    the sequence and traditional understanding, while the hair-related alternative
    is worth preserving in a footnote.
- source_word: חֶשְׂפִּי
  chosen: strip off
  alternatives:
  - bare
  - expose
  lexicon: HALOT
  rationale: Imperative from חשׂף, to strip or make bare. 'Strip off' works well with
    the following object and conveys deliberate removal of clothing.
- source_word: שֹׁבֶל
  chosen: your train
  alternatives:
  - your skirt
  - your flowing robe
  lexicon: HALOT
  rationale: The noun refers to a trailing hem or flowing skirt/robe. 'Train' captures
    the image of a long, dignified garment now removed in humiliation; 'skirt' is
    possible and preserved in a footnote.
- source_word: שׁוֹק
  chosen: the leg
  alternatives:
  - the thigh
  - the lower leg
  lexicon: HALOT
  rationale: The noun can denote the leg, especially the lower leg, though some render
    'thigh.' 'Leg' is the clearest modern English choice in the context of wading
    through water, with 'thigh' preserved as an alternative.
- source_word: עִבְרִי
  chosen: cross over
  alternatives:
  - pass through
  lexicon: HALOT
  rationale: Qal imperative of עבר, here commanding movement through waters. 'Cross
    over' is idiomatic and suits the object 'rivers.'
- source_word: נְהָרוֹת
  chosen: the rivers
  alternatives:
  - the streams
  lexicon: HALOT
  rationale: The plural noun normally means rivers. 'Rivers' preserves the force of
    the image of exile-like displacement and exposure.
