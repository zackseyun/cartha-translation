id: ISA.47.15
reference: Isaiah 47:15
source:
  edition: WLC
  text: כֵּ֥ן הָיוּ לָ֖/ךְ אֲשֶׁ֣ר יָגָ֑עַתְּ סֹחֲרַ֣יִ/ךְ מִ/נְּעוּרַ֗יִ/ךְ אִ֤ישׁ
    לְ/עֶבְר/וֹ֙ תָּע֔וּ אֵ֖ין מוֹשִׁיעֵֽ/ךְ־׃ס
translation:
  text: So have those with whom you labored become to you—your merchants from your
    youth. Each one wanders to his own region; there is no one to save you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'each to his own side,' 'each in his own direction,' or 'each across
      his own way.' The Hebrew expression is concise and may emphasize dispersal rather
      than a specific destination.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  chosen: So
  alternatives:
  - Thus
  - In this way
  lexicon: HALOT
  rationale: Introduces the concluding result of the preceding denunciation. 'So'
    is concise and natural in English while preserving the inferential force.
- source_word: הָיוּ לָךְ
  chosen: have ... become to you
  alternatives:
  - are to you
  - have been for you
  lexicon: HALOT
  rationale: 'The qatal of היה with ל indicates resultant state: ''have become to
    you'' or ''have turned out for you.'' This captures the sense that Babylon''s
    associates have proved useless.'
- source_word: אֲשֶׁר יָגַעַתְּ
  chosen: those with whom you labored
  alternatives:
  - those for whom you toiled
  - those you wearied yourself with
  lexicon: HALOT
  rationale: יגע commonly denotes laboring or toiling. The relative clause refers
    to the people/entities Babylon expended effort on, likely through commerce and
    alliances. 'With whom you labored' fits the relational context better than a strictly
    transitive English rendering.
- source_word: סֹחֲרַיִךְ
  chosen: your merchants
  alternatives:
  - your traders
  - your business partners
  lexicon: HALOT
  rationale: From סחר, referring to traders/merchants. 'Merchants' is the most straightforward
    economic term in context, matching the commercial imagery of Babylon.
- source_word: מִנְּעוּרַיִךְ
  chosen: from your youth
  alternatives:
  - since your youth
  lexicon: HALOT
  rationale: A temporal expression indicating long-standing relationship. 'From your
    youth' preserves the metaphor of Babylon's early history and longstanding commercial
    ties.
- source_word: אִישׁ לְעֶבְרוֹ
  chosen: Each one to his own region
  alternatives:
  - each to his own side
  - each across his own way
  - each in his own direction
  lexicon: HALOT
  rationale: איש distributively means 'each one.' עבר can denote side, region, or
    direction beyond/across. In this context of dispersal, 'to his own region' communicates
    that each merchant goes off separately to his own place. Because the exact nuance
    is somewhat open, alternatives are preserved in a footnote.
- source_word: תָּעוּ
  chosen: wanders
  alternatives:
  - strays
  - has gone astray
  lexicon: HALOT
  rationale: The verb תעה means to wander or stray. With a plural subject distributed
    by איש, English idiom works well with singular 'Each one wanders.' This conveys
    aimless dispersal rather than coordinated departure.
- source_word: אֵין מוֹשִׁיעֵךְ
  chosen: there is no one to save you
  alternatives:
  - none can rescue you
  - there is no savior for you
  lexicon: HALOT
  rationale: The participle of ישׁע here denotes one who delivers/rescues. 'There
    is no one to save you' is clear modern English and preserves the force of total
    helplessness.
