theological_decisions:
- issue: Rendering of מוֹשִׁיעֵךְ
  chosen_reading: save you
  alternative_readings:
  - rescue you
  - deliver you
  rationale: The term can be rendered in several near-synonymous ways. 'Save' is retained
    because it is the most direct lexical equivalent and preserves the broader theological
    resonance of divine deliverance without importing a specifically soteriological
    claim beyond the verse's immediate context.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological weight without paraphrase.'
