id: ISA.47.4
reference: Isaiah 47:4
source:
  edition: WLC
  text: גֹּאֲלֵ֕/נוּ יְהוָ֥ה צְבָא֖וֹת שְׁמ֑/וֹ קְד֖וֹשׁ יִשְׂרָאֵֽל׃
translation:
  text: Our Redeemer—Yahweh of Armies is his name—is the Holy One of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'the LORD of Hosts.'
    reason: lexical_alternative
  - marker: b
    text: '''Redeemer'' could also be rendered ''Kinsman-Redeemer,'' highlighting the covenantal/legal nuance of the Hebrew term.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּאֲלֵנוּ
  chosen: Our Redeemer
  alternatives:
  - Our Kinsman-Redeemer
  - Our rescuer
  lexicon: HALOT
  rationale: 'The participial form from גאל functions substantivally: ''the one who redeems us.'' ''Redeemer'' preserves the covenantal and legal-theological weight better than the more generic ''rescuer.'' ''Kinsman-Redeemer'' is semantically possible in some contexts, but here the kinship nuance is not explicit in the immediate wording, so the broader but still theologically rich ''Redeemer'' is preferred.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of Hosts
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'Armies' communicates the concrete sense of צבאות more transparently to modern readers than the traditional but less immediately clear 'Hosts.'
- source_word: שְׁמוֹ
  chosen: is his name
  alternatives:
  - his name
  lexicon: HALOT
  rationale: 'The nominal clause is naturally rendered in English with an explicit copula: ''is his name.'' This preserves the appositional/title structure of the Hebrew.'
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  alternatives:
  - Israel's Holy One
  lexicon: HALOT
  rationale: This is a fixed Isaianic title. 'The Holy One of Israel' preserves the recognizable formula and its theological resonance in Isaiah.
