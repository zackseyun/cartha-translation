id: ISA.47.5
reference: Isaiah 47:5
source:
  edition: WLC
  text: שְׁבִ֥י דוּמָ֛ם וּ/בֹ֥אִי בַ/חֹ֖שֶׁךְ בַּת כַּשְׂדִּ֑ים כִּ֣י לֹ֤א תוֹסִ֨יפִי֙
    יִקְרְאוּ לָ֔/ךְ גְּבֶ֖רֶת מַמְלָכֽוֹת־־׃
translation:
  text: Sit in silence, and go into darkness, daughter of the Chaldeans; for no longer
    will they call you the mistress of kingdoms.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lady of kingdoms.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁבִי
  chosen: Sit
  alternatives:
  - Dwell
  - Remain seated
  lexicon: HALOT
  rationale: Qal imperative feminine singular of ישׁב, here an address to personified
    Babylon. 'Sit' is the plain imperative and fits the humiliation scene better than
    broader options like 'dwell.'
- source_word: דוּמָם
  chosen: in silence
  alternatives:
  - silently
  - mute
  lexicon: HALOT
  rationale: Adverbial accusative from דּוּמָם conveys silence or stillness. 'In silence'
    is idiomatic English and preserves the force of imposed quietness.
- source_word: וּבֹאִי
  chosen: and go
  alternatives:
  - and enter
  - come
  lexicon: HALOT
  rationale: Imperative feminine singular of בוא with prefixed conjunction. In context
    with 'into darkness,' English 'go into' is more natural than 'come into' and preserves
    the movement into a state of obscurity.
- source_word: בַחֹשֶׁךְ
  chosen: into darkness
  alternatives:
  - into the darkness
  - in darkness
  lexicon: HALOT
  rationale: The preposition with 'darkness' marks entry into darkness/obscurity.
    'Into darkness' best matches the motion implied by בוא and the metaphor of disgrace
    and removal from prominence.
- source_word: בַּת כַּשְׂדִּים
  chosen: daughter of the Chaldeans
  alternatives:
  - virgin daughter of the Chaldeans
  - daughter Babylon of the Chaldeans
  lexicon: HALOT
  rationale: A standard prophetic personification formula for a city/people. 'Daughter
    of the Chaldeans' preserves the metaphor without importing words not present in
    this verse.
- source_word: לֹא תוֹסִיפִי
  chosen: no longer will you continue
  alternatives:
  - you will no longer add
  - never again will you
  lexicon: HALOT
  rationale: 'Hiphil of יסף with negation idiomatically means cessation: ''you will
    no longer continue'' or ''no longer.'' In the final English line this is smoothed
    to ''no longer will they call you'' because English places the cessation naturally
    with the passive-like calling clause.'
- source_word: יִקְרְאוּ לָךְ
  chosen: will they call you
  alternatives:
  - will one call you
  - will people call you
  lexicon: HALOT
  rationale: Third person plural indefinite subject is naturally rendered in English
    as 'they.' This preserves the impersonal sense without awkwardness.
- source_word: גְּבֶרֶת
  chosen: mistress
  alternatives:
  - lady
  - queen
  lexicon: HALOT
  rationale: The noun denotes a female ruler, mistress, or lady. 'Mistress' best conveys
    dominance and status over others in this taunt context; 'queen' would over-specify
    a royal office not explicit in the term.
- source_word: מַמְלָכוֹת
  chosen: of kingdoms
  alternatives:
  - of kingdoms of the earth
  - over kingdoms
  lexicon: HALOT
  rationale: Plural 'kingdoms' indicates imperial supremacy over multiple realms.
    The genitive construction 'mistress of kingdoms' is concise and faithful.
