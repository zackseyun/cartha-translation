theological_decisions:
- issue: Metaphorical darkness as judgment and obscurity
  chosen_reading: Retain 'darkness' literally in the main text while allowing the
    metaphor of humiliation and loss of status to emerge from context.
  alternative_readings:
  - obscurity
  - gloom
  rationale: The Hebrew image is concrete and evocative. Translating it literally
    preserves prophetic imagery and avoids over-interpreting the metaphor in the main
    text.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Personification of Babylon/Chaldea as a female figure
  chosen_reading: Preserve the feminine address with 'daughter of the Chaldeans' and
    feminine social title 'mistress.'
  alternative_readings:
  - Render more abstractly as 'Babylon' without personification
  rationale: The Hebrew directly addresses the nation/city as a woman. Preserving
    the personification maintains the rhetoric of judgment and humiliation without
    doctrinal distortion.
  doctrine_reference: Translation philosophy §1, §6
