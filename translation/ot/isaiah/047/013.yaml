theological_decisions:
- issue: Rendering of Babylon's occult specialists
  chosen_reading: The verse is translated as an ironic challenge to astrologers who
    cannot save Babylon.
  alternative_readings:
  - A more generalized reference to counselors or wise men without explicit astrological
    nuance
  rationale: The surrounding context in Isaiah 47 targets Babylon's sorceries and
    enchantments. The difficult phrase הברו שמים is therefore best read in connection
    with astrologers, and the translation keeps that polemical force without importing
    extra detail beyond the Hebrew.
  doctrine_reference: Translation philosophy §§1, 3, 6
