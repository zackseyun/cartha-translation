id: ISA.47.13
reference: Isaiah 47:13
source:
  edition: WLC
  text: נִלְאֵ֖ית בְּ/רֹ֣ב עֲצָתָ֑יִ/ךְ יַעַמְדוּ נָ֨א וְ/יוֹשִׁיעֻ֜/ךְ הברו שָׁמַ֗יִם
    הַֽ/חֹזִים֙ בַּ/כּ֣וֹכָבִ֔ים מֽוֹדִיעִם֙ לֶ/חֳדָשִׁ֔ים מֵ/אֲשֶׁ֥ר יָבֹ֖אוּ עָלָֽיִ/ךְ־׃
translation:
  text: You are worn out by your many counsels. Let them stand now and save you—those
    who divide the heavens, who gaze at the stars, who make known month by month what
    will come upon you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who parcel out the heavens.' The Hebrew expression is difficult
      and likely refers to astrologers who divide the sky into sectors for interpretation.
    reason: lexical_alternative
  - marker: b
    text: Or 'who announce at the new moons.' The Hebrew may refer specifically to
      predictions tied to the monthly/new-moon cycle.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִלְאֵית
  chosen: you are worn out
  alternatives:
  - you are wearied
  - you have become weary
  lexicon: HALOT
  rationale: The Niphal perfect 2fs of לאה conveys becoming weary/exhausted. 'You
    are worn out' gives natural modern English while preserving the resultative sense
    addressed to Babylon as feminine singular.
- source_word: בְּרֹב עֲצָתַיִךְ
  chosen: by your many counsels
  alternatives:
  - with your many plans
  - in the multitude of your counsels
  lexicon: HALOT
  rationale: עֵצָה commonly means counsel, advice, plan. Here the context is Babylon's
    many advisory/occult resources. 'By your many counsels' preserves the instrumental
    nuance of ב and the plural abundance.
- source_word: יַעַמְדוּ נָא
  chosen: Let them stand now
  alternatives:
  - Let them arise now
  - Let them take their stand now
  lexicon: HALOT
  rationale: The jussive/imperfect with particle נָא is an ironic challenge. 'Stand
    now' is concise and idiomatic, preserving the taunting summons.
- source_word: וְיוֹשִׁיעֻךְ
  chosen: and save you
  alternatives:
  - and deliver you
  - and rescue you
  lexicon: HALOT
  rationale: ישע in Hiphil often means save/deliver. 'Save you' keeps the broader
    theological resonance of inability to provide salvation, while fitting the immediate
    context of rescue from coming judgment.
- source_word: הברו שמים
  chosen: those who divide the heavens
  alternatives:
  - those who parcel out the heavens
  - those who study the heavens
  lexicon: HALOT
  rationale: The consonantal form is difficult, but in context it refers to astrologers.
    A common explanation connects the verb with dividing/segmenting the sky into astrological
    sectors. 'Divide the heavens' preserves the likely concrete image better than
    a generic 'study the heavens.'
- source_word: החזים בכוכבים
  chosen: who gaze at the stars
  alternatives:
  - who look at the stars
  - who see visions by the stars
  lexicon: HALOT
  rationale: חזים are 'seers/visionaries,' but with בכוכבים the phrase points to star-gazers/astrologers.
    'Gaze at the stars' is readable and contextually precise without over-paraphrasing.
- source_word: מודיעים לחדשים
  chosen: who make known month by month
  alternatives:
  - who announce at the new moons
  - who predict by the months
  lexicon: HALOT
  rationale: לחדשים can mean 'for the months' or relate to new moons/monthly prognostications.
    'Month by month' captures the temporal force naturally in English and fits the
    sequence of astrological prediction.
- source_word: מאשר יבאו עליך
  chosen: what will come upon you
  alternatives:
  - from what will come upon you
  - those things that will come upon you
  lexicon: HALOT
  rationale: 'The phrase identifies the content of their predictions: impending events/judgments.
    ''What will come upon you'' is idiomatic and preserves the future threat directed
    at Babylon.'
