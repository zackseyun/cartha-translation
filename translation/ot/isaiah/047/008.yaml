theological_decisions:
- issue: Rendering Babylon's self-exalting claim אֲנִי וְאַפְסִי עוֹד
  chosen_reading: I am, and there is no one besides me
  alternative_readings:
  - I am, and there is nothing else
  rationale: The phrase intentionally echoes language of exclusive supremacy elsewhere
    used of God, here placed on Babylon's lips as arrogant parody. The translation
    preserves that theological tension without overexplaining it in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
