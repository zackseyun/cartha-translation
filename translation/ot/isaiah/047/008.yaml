id: ISA.47.8
reference: Isaiah 47:8
source:
  edition: WLC
  text: וְ/עַתָּ֞ה שִׁמְעִי זֹ֤את עֲדִינָה֙ הַ/יּוֹשֶׁ֣בֶת לָ/בֶ֔טַח הָ/אֹֽמְרָה֙
    בִּ/לְבָ֔בָ/הּ אֲנִ֖י וְ/אַפְסִ֣/י ע֑וֹד לֹ֤א אֵשֵׁב֙ אַלְמָנָ֔ה וְ/לֹ֥א אֵדַ֖ע
    שְׁכֽוֹל־׃
translation:
  text: Now then, hear this, you lover of luxury, who sit securely, who say in your
    heart, ‘I am, and there is no one besides me. I will not sit as a widow, nor will
    I know the loss of children.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “delicate one,” “pampered one,” or “voluptuous one.” The Hebrew describes
      luxurious self-indulgence.
    reason: lexical_alternative
  - marker: b
    text: Or, “I am, and there is nothing else.” The phrase is an arrogant claim of
      unrivaled status.
    reason: alternative_reading
  - marker: c
    text: Hebrew “know bereavement”; that is, experience the loss of children.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲדִינָה
  chosen: lover of luxury
  alternatives:
  - delicate one
  - voluptuous one
  - pampered one
  lexicon: HALOT
  rationale: The adjective denotes softness, delicacy, or luxurious self-indulgence.
    In context, Babylon is being addressed ironically for her self-indulgent ease,
    so 'lover of luxury' brings out the moral-social nuance better than the more literal
    but potentially misleading 'delicate one.'
- source_word: הַיּוֹשֶׁבֶת לָבֶטַח
  chosen: who sit securely
  alternatives:
  - who dwell securely
  - who sit in safety
  - who live carelessly
  lexicon: HALOT
  rationale: The participle plus לָבֶטַח expresses settled security. 'Sit securely'
    preserves the seated imagery while sounding natural in English. 'Carelessly' interprets
    the attitude more than the wording.
- source_word: אֲנִי וְאַפְסִי עוֹד
  chosen: I am, and there is no one besides me
  alternatives:
  - I am, and there is nothing else
  - I am, and none besides me exists
  lexicon: HALOT
  rationale: The idiom expresses exclusive self-assertion. 'There is no one besides
    me' fits the feminine speaker personified as Babylon and echoes the boastful absolutism
    of the phrase. 'Nothing else' is possible but less personal in this context.
- source_word: לֹא אֵשֵׁב אַלְמָנָה
  chosen: I will not sit as a widow
  alternatives:
  - I will never become a widow
  - I will not dwell as a widow
  lexicon: HALOT
  rationale: Retaining 'sit' reflects the Hebrew verb and preserves the parallel with
    the earlier participle 'who sit securely.' 'As a widow' captures the state metaphorically
    applied to the city.
- source_word: שְׁכוֹל
  chosen: the loss of children
  alternatives:
  - bereavement
  - childlessness
  lexicon: HALOT
  rationale: The noun refers to bereavement through loss of children, not mere infertility.
    'The loss of children' is clear modern English and preserves the concrete sense
    better than the more abstract 'bereavement.'
- source_word: אֵדַע
  chosen: will I know
  alternatives:
  - will I experience
  - will I suffer
  lexicon: HALOT
  rationale: Hebrew 'know' often carries experiential force, but 'know' is retained
    in English to stay closer to the source while remaining intelligible in the idiom
    'know the loss of children.'
- source_word: שִׁמְעִי זֹאת
  chosen: hear this
  alternatives:
  - listen to this
  - hear this now
  lexicon: HALOT
  rationale: A direct prophetic summons. 'Hear this' is concise, natural, and suitably
    forceful.
- source_word: וְעַתָּה
  chosen: Now then
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Marks a transition into direct address with rhetorical force. 'Now then'
    conveys the confrontational turn slightly better in English than a bare 'And now.'
