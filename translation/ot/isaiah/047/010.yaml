id: ISA.47.10
reference: Isaiah 47:10
source:
  edition: WLC
  text: וַ/תִּבְטְחִ֣י בְ/רָעָתֵ֗/ךְ אָמַרְתְּ֙ אֵ֣ין רֹאָ֔/נִי חָכְמָתֵ֥/ךְ וְ/דַעְתֵּ֖/ךְ
    הִ֣יא שׁוֹבְבָ֑תֶ/ךְ וַ/תֹּאמְרִ֣י בְ/לִבֵּ֔/ךְ אֲנִ֖י וְ/אַפְסִ֥/י עֽוֹד׃
translation:
  text: You trusted in your wickedness; you said, ‘No one sees me.’ Your wisdom and
    your knowledge led you astray, and you said in your heart, ‘I am, and there is
    no one besides me.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I am, and there is nothing else.' The Hebrew expression can be rendered
      more abstractly, but here it likely voices Babylon's claim of unrivaled status.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּבְטְחִי
  chosen: you trusted
  alternatives:
  - you were confident
  - you relied
  lexicon: HALOT
  rationale: בטח commonly denotes trusting or relying on something. 'You trusted'
    is direct and idiomatic, preserving the accusation's force.
- source_word: בְרָעָתֵךְ
  chosen: in your wickedness
  alternatives:
  - in your evil
  - in your calamity
  lexicon: HALOT
  rationale: רָעָה can mean evil/wickedness or disaster depending on context. Here
    the addressee's moral arrogance is in view, so 'wickedness' best fits the context
    better than 'calamity.'
- source_word: אֵין רֹאָנִי
  chosen: No one sees me
  alternatives:
  - There is none who sees me
  lexicon: HALOT
  rationale: A natural English rendering of the existential negation plus participle
    with pronominal suffix. It expresses presumed secrecy.
- source_word: חָכְמָתֵךְ וְדַעְתֵּךְ
  chosen: Your wisdom and your knowledge
  alternatives:
  - your skill and your knowledge
  lexicon: HALOT
  rationale: The pair is retained distinctly. 'Wisdom' and 'knowledge' are standard
    equivalents and preserve the rhetorical parallelism.
- source_word: הִיא שׁוֹבְבָתֶךְ
  chosen: led you astray
  alternatives:
  - turned you back
  - misled you
  - perverted you
  lexicon: HALOT
  rationale: From שובב/שׁוֹבֵב in a causative/descriptive sense of turning away or
    leading astray. In context, Babylon's wisdom and knowledge have caused moral and
    spiritual delusion. 'Led you astray' communicates this clearly in modern English.
- source_word: בְלִבֵּךְ
  chosen: in your heart
  alternatives:
  - to yourself
  lexicon: HALOT
  rationale: A standard Hebrew idiom for inward thought. 'In your heart' preserves
    the metaphor and remains clear in English.
- source_word: אֲנִי וְאַפְסִי עוֹד
  chosen: I am, and there is no one besides me
  alternatives:
  - I am, and nothing else
  - I am, and none besides
  lexicon: HALOT
  rationale: The phrase expresses exclusive self-exaltation. 'There is no one besides
    me' makes explicit the personal sense in context and echoes the boastful absolutism
    of the Hebrew. The initial 'I am' is retained rather than paraphrased to preserve
    the stark, self-assertive form.
