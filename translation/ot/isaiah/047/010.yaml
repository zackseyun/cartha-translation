theological_decisions:
- issue: Rendering the boast אֲנִי וְאַפְסִי עוֹד in a way that preserves its rhetorical
    resemblance to exclusive divine self-declarations elsewhere in Isaiah without
    overstating identity
  chosen_reading: I am, and there is no one besides me
  alternative_readings:
  - I am, and there is nothing else
  - I am, and none besides me
  rationale: The wording should preserve Babylon's blasphemous self-exaltation and
    its echo of language used of the Lord elsewhere in Isaiah. 'No one besides me'
    fits the immediate personified-city context better than the more abstract 'nothing
    else,' while retaining the theological irony.
  doctrine_reference: Preserve theological tension rather than resolve it
