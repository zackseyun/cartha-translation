theological_decisions:
- issue: Personification of Babylon as feminine singular
  chosen_reading: Retain feminine reference in 'her end'
  alternative_readings:
  - its end
  rationale: The verse addresses Babylon as a woman throughout the oracle. Preserving
    the feminine suffix in English maintains the literary and prophetic personification
    rather than flattening it to an impersonal 'it.'
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
