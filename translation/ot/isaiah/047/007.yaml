id: ISA.47.7
reference: Isaiah 47:7
source:
  edition: WLC
  text: וַ/תֹּ֣אמְרִ֔י לְ/עוֹלָ֖ם אֶהְיֶ֣ה גְבָ֑רֶת עַ֣ד לֹא שַׂ֥מְתְּ אֵ֨לֶּה֙ עַל
    לִבֵּ֔/ךְ לֹ֥א זָכַ֖רְתְּ אַחֲרִיתָֽ/הּ־־׃ס
translation:
  text: You said, ‘I will be a mistress forever,’ so that you did not take these things
    to heart; you did not remember her end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lady forever.' The Hebrew גְבָרֶת denotes a woman in a position of dominance
      or rank; 'mistress' is chosen to preserve that sense without over-translating
      it as 'queen.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you did not set these things on your heart.'
    reason: lexical_alternative
  - marker: c
    text: Or 'its end.' The Hebrew has a feminine singular suffix, likely reflecting
      Babylon personified as a woman.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתֹּאמְרִי
  chosen: You said
  alternatives:
  - And you said
  lexicon: HALOT
  rationale: The waw-consecutive advances the discourse, but in English the simple
    past 'You said' is natural and sufficient without forcing an initial 'And.'
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  lexicon: HALOT
  rationale: עוֹלָם here expresses an unending future claim. 'Forever' is idiomatic
    modern English.
- source_word: אֶהְיֶה
  chosen: I will be
  alternatives:
  - I shall be
  lexicon: HALOT
  rationale: Simple future sense fits the speaker's boast.
- source_word: גְבָרֶת
  chosen: a mistress
  alternatives:
  - lady
  - queen
  lexicon: HALOT
  rationale: גברת denotes a female ruler or mistress/lady. 'Mistress' best preserves
    the sense of dominant female status in context, while 'queen' would over-specify
    a royal title not present in the Hebrew.
- source_word: עַד לֹא
  chosen: so that
  alternatives:
  - until
  - to the point that
  lexicon: HALOT
  rationale: 'In this idiom the phrase introduces consequence/result: her arrogant
    claim led to her failure to reflect. ''So that'' communicates the resulting state
    more clearly than a wooden ''until not.'''
- source_word: שַׂמְתְּ אֵלֶּה עַל לִבֵּךְ
  chosen: you did not take these things to heart
  alternatives:
  - you did not set these things on your heart
  - you did not lay these things to heart
  lexicon: HALOT
  rationale: The Hebrew idiom literally means placing something on the heart, that
    is, taking it seriously or considering it. The chosen rendering is idiomatic while
    preserving the metaphorical force.
- source_word: אֵלֶּה
  chosen: these things
  alternatives:
  - this
  lexicon: HALOT
  rationale: The plural demonstrative is retained. The referent is the preceding warnings/judgments
    in context.
- source_word: לֹא זָכַרְתְּ
  chosen: you did not remember
  alternatives:
  - you did not consider
  - you did not keep in mind
  lexicon: HALOT
  rationale: זכר retains the cognitive sense 'remember'; this also pairs well with
    the prior idiom about taking to heart.
- source_word: אַחֲרִיתָהּ
  chosen: her end
  alternatives:
  - its end
  - her latter end
  - the outcome of it
  lexicon: HALOT
  rationale: The suffix is feminine singular, matching personified Babylon as a woman
    in the context. 'Her end' preserves the personification and the sense of eventual
    outcome/destiny.
