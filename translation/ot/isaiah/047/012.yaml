theological_decisions:
- issue: Tone of the divine address to Babylon
  chosen_reading: Render the imperatives and 'perhaps' clauses as ironic taunt rather
    than sincere counsel, without adding interpretive wording to the main text.
  alternative_readings:
  - A more neutral exhortation without explicit irony in translation
  rationale: The broader context is a judgment oracle mocking Babylon's reliance on
    occult practices. The English wording preserves the literal exhortation while
    allowing the irony to emerge from context rather than inserting commentary into
    the verse itself.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing claims beyond it.'
