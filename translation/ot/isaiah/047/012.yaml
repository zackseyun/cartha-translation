id: ISA.47.12
reference: Isaiah 47:12
source:
  edition: WLC
  text: עִמְדִי נָ֤א בַ/חֲבָרַ֨יִ/ךְ֙ וּ/בְ/רֹ֣ב כְּשָׁפַ֔יִ/ךְ בַּ/אֲשֶׁ֥ר יָגַ֖עַתְּ
    מִ/נְּעוּרָ֑יִ/ךְ אוּלַ֛י תּוּכְלִ֥י הוֹעִ֖יל אוּלַ֥י תַּעֲרֽוֹצִי־׃
translation:
  text: Stand now with your spells and with your many sorceries, in which you have
    labored from your youth; perhaps you may be able to profit, perhaps you may inspire
    terror.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with your enchantments' for 'with your spells.'
    reason: lexical_alternative
  - marker: b
    text: Or 'perhaps you may prevail'; the Hebrew verb can carry the sense of causing
      terror or overawing an opponent.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִמְדִי נָא
  chosen: Stand now
  alternatives:
  - Persist now
  - Take your stand now
  lexicon: HALOT
  rationale: Imperative feminine singular of עמד with particle נָא gives an urgent
    exhortation, here likely ironic in context. 'Stand now' preserves the concrete
    verbal image and the taunting force without over-paraphrasing.
- source_word: בַחֲבָרַיִךְ
  chosen: with your spells
  alternatives:
  - with your enchantments
  - with your charms
  lexicon: HALOT
  rationale: חֲבָרִים in this context refers to magical bindings or incantatory practices.
    'Spells' is clear modern English and fits the parallel with sorceries. 'Enchantments'
    is possible but slightly more archaic/literary.
- source_word: וּבְרֹב כְּשָׁפַיִךְ
  chosen: and with your many sorceries
  alternatives:
  - and with the multitude of your sorceries
  - and with your abundant witchcrafts
  lexicon: HALOT
  rationale: רֹב denotes abundance/multitude; כְּשָׁפִים are acts of sorcery. 'Many
    sorceries' is readable modern English while retaining the plural sense of repeated
    magical practices.
- source_word: בַּאֲשֶׁר יָגַעַתְּ
  chosen: in which you have labored
  alternatives:
  - with which you have wearied yourself
  - at which you have toiled
  lexicon: HALOT
  rationale: יגע conveys laboring to the point of weariness. 'Have labored' preserves
    the effortful sense and works smoothly with the relative phrase referring back
    to the occult practices.
- source_word: מִנְּעוּרַיִךְ
  chosen: from your youth
  alternatives:
  - since your youth
  lexicon: HALOT
  rationale: Standard temporal expression indicating long-standing practice. 'From
    your youth' is idiomatic and close to the Hebrew.
- source_word: אוּלַי תּוּכְלִי הוֹעִיל
  chosen: perhaps you may be able to profit
  alternatives:
  - perhaps you may succeed
  - perhaps you may gain advantage
  - perhaps you may be able to help yourself
  lexicon: HALOT
  rationale: יָכֹל + הועיל expresses ability to gain benefit or produce advantage.
    'Profit' here means derive benefit/advantage, matching the taunt that Babylon's
    occult arts might somehow help her. 'Succeed' is possible but less tied to הועיל.
- source_word: אוּלַי תַּעֲרוֹצִי
  chosen: perhaps you may inspire terror
  alternatives:
  - perhaps you may prevail
  - perhaps you may strike fear
  - perhaps you may cause trembling
  lexicon: HALOT
  rationale: The verb ערץ can denote causing dread/terror. In context, the sense is
    likely that Babylon might overawe or frighten off the coming threat. 'Inspire
    terror' is natural English and preserves the causative/resultative nuance better
    than the vaguer 'prevail'.
