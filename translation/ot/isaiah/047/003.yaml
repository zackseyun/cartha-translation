theological_decisions:
- issue: Interpretation of וְלֹא אֶפְגַּע אָדָם
  chosen_reading: I will spare no man
  alternative_readings:
  - I will meet no man
  - I will let no one intervene
  - I will not confront a man
  rationale: 'The Hebrew expression is syntactically compressed and has been interpreted
    in several ways. In context of divine judgment on Babylon, the sense of unsparing
    vengeance best fits the flow: YHWH''s judgment will not be softened by human appeal
    or intervention. This preserves the severity of the oracle without importing extra
    doctrinal claims. Alternative construals are preserved in a footnote due to genuine
    ambiguity.'
  doctrine_reference: Translation philosophy §3; Gender-accurate over gender-neutral;
