id: ISA.47.3
reference: Isaiah 47:3
source:
  edition: WLC
  text: תִּגָּל֙ עֶרְוָתֵ֔/ךְ גַּ֥ם תֵּרָאֶ֖ה חֶרְפָּתֵ֑/ךְ נָקָ֣ם אֶקָּ֔ח וְ/לֹ֥א
    אֶפְגַּ֖ע אָדָֽם׃ס
translation:
  text: Your nakedness will be uncovered; indeed, your disgrace will be seen. I will
    take vengeance, and I will spare no man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will meet no man,' 'I will let no one intervene,' or similarly, 'I
      will not spare anyone.' The Hebrew of the final clause is difficult and admits
      several close renderings.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew ''man'' (אָדָם), here likely with generic human force: no human
      being will avert the judgment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּגָּל
  chosen: will be uncovered
  alternatives:
  - will be revealed
  - will be exposed
  lexicon: HALOT
  rationale: Nifal imperfect of גלה conveys passive exposure/uncovering. 'Will be
    uncovered' is natural English and preserves the shame/exposure imagery.
- source_word: עֶרְוָתֵךְ
  chosen: your nakedness
  alternatives:
  - your shame
  - your private parts
  lexicon: HALOT
  rationale: עֶרְוָה commonly denotes nakedness, often with connotations of shame
    and exposure. 'Your nakedness' keeps the concrete metaphor rather than reducing
    it to abstract shame.
- source_word: גַּם
  chosen: indeed
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: Here גַּם intensifies the parallel clause more than simply adding another
    item. 'Indeed' fits the emphatic progression in English.
- source_word: תֵּרָאֶה
  chosen: will be seen
  alternatives:
  - will appear
  - will be visible
  lexicon: HALOT
  rationale: Nifal imperfect of ראה is passive/reflexive in sense here. 'Will be seen'
    straightforwardly renders the public visibility of Babylon's humiliation.
- source_word: חֶרְפָּתֵךְ
  chosen: your disgrace
  alternatives:
  - your reproach
  - your shame
  lexicon: HALOT
  rationale: חֶרְפָּה denotes reproach/disgrace. 'Disgrace' communicates both the
    social and shame dimensions in contemporary English.
- source_word: נָקָם
  chosen: vengeance
  alternatives:
  - revenge
  - avenging justice
  lexicon: HALOT
  rationale: In divine-judgment context, 'vengeance' is the standard and weighty rendering
    for נָקָם, preserving judicial force without colloquial overtones.
- source_word: אֶקָּח
  chosen: I will take
  alternatives:
  - I will exact
  lexicon: HALOT
  rationale: With נָקָם as object, the idiom is 'take vengeance.' This is established
    English and reflects the Hebrew collocation.
- source_word: אֶפְגַּע
  chosen: I will spare
  alternatives:
  - I will meet
  - I will intercede
  - I will attack
  lexicon: HALOT
  rationale: פגע has a broad semantic range, but in this context the clause is idiomatic
    and difficult. Many understand it as 'spare' or 'show mercy to' in the sense of
    not relenting before anyone. This best fits the judgment context and parallelism.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - anyone
  lexicon: HALOT
  rationale: Per doctrine, gender-accurate rendering is preferred. Here אָדָם is singular
    with generic force, and the idiom likely means no human person will avert or soften
    the judgment. 'No man' preserves the source form and solemnity; a footnote preserves
    the more inclusive alternative sense.
