id: ISA.26.12
reference: Isaiah 26:12
source:
  edition: WLC
  text: יְהוָ֕ה תִּשְׁפֹּ֥ת שָׁל֖וֹם לָ֑/נוּ כִּ֛י גַּ֥ם כָּֽל מַעֲשֵׂ֖י/נוּ פָּעַ֥לְתָּ
    לָּֽ/נוּ־׃
translation:
  text: O LORD, you will establish peace for us, for indeed you have accomplished
    all our works for us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you have worked all our works in us'; the Hebrew may be understood as
      emphasizing God's action within his people, though 'for us' more directly reflects
      the preposition here.
    reason: alternative_reading
  - marker: b
    text: '''Peace'' (shalom) can also carry the sense of well-being or wholeness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  - LORD
  lexicon: HALOT
  rationale: Rendered with the covenant name as 'LORD' per doctrine guidelines for
    יְהוָה; the prefixed 'O' reflects direct address in English prayer style, though
    not separately marked in Hebrew.
- source_word: תִּשְׁפֹּת
  chosen: you will establish
  alternatives:
  - you will set
  - you will appoint
  - you will ordain
  lexicon: HALOT
  rationale: 'From שׁפת/שׁית in this form, the sense is causative/appointive: God
    sets or establishes peace for his people. ''Establish'' is idiomatic and preserves
    the future assurance better than the less natural ''set'' or more theologically
    loaded ''ordain''.'
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: '''Peace'' is the standard and contextually fitting rendering, while
    carrying the broader Hebrew sense of well-being. The broader nuance is real but
    does not require expansion in the main text.'
- source_word: לָנוּ
  chosen: for us
  alternatives:
  - to us
  lexicon: HALOT
  rationale: The preposition ל here is best rendered 'for us' in English with 'establish
    peace,' expressing benefit rather than mere direction.
- source_word: כִּי גַּם
  chosen: for indeed
  alternatives:
  - for also
  - because even
  - for even
  lexicon: HALOT
  rationale: The combination introduces the ground for the preceding statement with
    mild emphasis. 'For indeed' communicates both causation and emphasis in natural
    English.
- source_word: כָּל מַעֲשֵׂינוּ
  chosen: all our works
  alternatives:
  - all our deeds
  - all that we have done
  lexicon: HALOT
  rationale: A formally transparent rendering is preferable here. 'Works' preserves
    the lexical link to מעשה without overinterpreting whether these are deeds, undertakings,
    or achievements.
- source_word: פָּעַלְתָּ
  chosen: you have accomplished
  alternatives:
  - you have done
  - you have worked
  - you have performed
  lexicon: HALOT
  rationale: The verb פעל emphasizes effecting or bringing about. 'Accomplished' captures
    completed divine agency more clearly than the generic 'done'.
- source_word: לָּנוּ
  chosen: for us
  alternatives:
  - in us
  - on our behalf
  lexicon: HALOT
  rationale: 'The final לָנוּ most naturally indicates benefit: God has accomplished
    their works ''for us'' or ''on our behalf.'' ''For us'' is concise and preserves
    the sense without narrowing it to inward transformation (''in us'').'
