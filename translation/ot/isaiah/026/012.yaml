theological_decisions:
- issue: Agency in 'all our works you have accomplished for us'
  chosen_reading: The verse attributes the people's accomplished works ultimately
    to God's agency on their behalf.
  alternative_readings:
  - God has prospered the people's undertakings.
  - God has done all things for the people.
  - God has worked all our works in us.
  rationale: 'The Hebrew straightforwardly grounds Israel''s peace in divine action:
    even the people''s works are something God has effected for them. The translation
    preserves this theological tension of human works and divine agency without resolving
    it into a stronger doctrinal formula such as monergistic inward causation. ''For
    us'' reflects the preposition ל better than ''in us,'' while a footnote preserves
    that alternative interpretive possibility.'
  doctrine_reference: Preserve theological tension rather than resolve it.
