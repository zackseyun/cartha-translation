id: ISA.26.10
reference: Isaiah 26:10
source:
  edition: WLC
  text: יֻחַ֤ן רָשָׁע֙ בַּל לָמַ֣ד צֶ֔דֶק בְּ/אֶ֥רֶץ נְכֹח֖וֹת יְעַוֵּ֑ל וּ/בַל יִרְאֶ֖ה
    גֵּא֥וּת יְהוָֽה־־׃ס
translation:
  text: Though favor is shown to the wicked, he does not learn righteousness; in a
    land of uprightness he acts unjustly, and he does not see the majesty of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If favor is shown to the wicked.' The Hebrew opening may be read conditionally
      rather than concessively.
    reason: alternative_reading
  - marker: b
    text: '''Righteousness'' may also be rendered ''justice.'''
    reason: lexical_alternative
  - marker: c
    text: Or, 'in an upright land' or 'in a land of fairness.'
    reason: lexical_alternative
  - marker: d
    text: '''See'' here carries the sense of perceiving or recognizing.'
    reason: lexical_alternative
  - marker: e
    text: Or, 'the loftiness' or 'the exaltation' of the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֻחַן
  chosen: Though favor is shown
  alternatives:
  - If favor is shown
  - The wicked is shown grace
  - Though the wicked is treated kindly
  lexicon: HALOT
  rationale: Hophal of חנן conveys being shown favor/grace. English idiom works best
    with an impersonal passive clause. 'Though' captures the concessive force of the
    clause in context, while preserving the passive sense.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - the wicked man
  - a wicked person
  lexicon: HALOT
  rationale: Singular adjective used substantivally. 'The wicked' preserves the representative
    singular without over-specifying gender, fitting the Hebrew's generic force.
- source_word: בַּל
  chosen: does not
  alternatives:
  - will not
  - not
  lexicon: HALOT
  rationale: Negative particle here marks straightforward negation. Present English
    fits the gnomic/proverbial sense of the verse better than a future.
- source_word: לָמַד
  chosen: learn
  alternatives:
  - be taught
  - come to know
  lexicon: HALOT
  rationale: Qal of למד normally means 'learn.' The point is not merely exposure to
    instruction but failure to internalize moral truth.
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: צדק can denote righteousness or justice. Here the moral quality to be
    learned is broader than judicial justice alone, so 'righteousness' best fits,
    while 'justice' remains a viable lexical alternative.
- source_word: בְּאֶרֶץ נְכֹחוֹת
  chosen: in a land of uprightness
  alternatives:
  - in a land of fairness
  - in an upright land
  - in a level land
  lexicon: HALOT
  rationale: נכחות carries the sense of straightness/uprightness/right order. 'Land
    of uprightness' preserves the metaphor and moral atmosphere better than flattening
    it to mere geography.
- source_word: יְעַוֵּל
  chosen: he acts unjustly
  alternatives:
  - he deals perversely
  - he does wrong
  - he acts wickedly
  lexicon: HALOT
  rationale: Piel of עול denotes acting unjustly or wrongfully. 'Acts unjustly' keeps
    the ethical/juridical nuance and pairs well with the preceding 'righteousness'.
- source_word: וּבַל יִרְאֶה
  chosen: and he does not see
  alternatives:
  - and he will not see
  - and he does not regard
  lexicon: HALOT
  rationale: ראה is literally 'see,' but can imply perception/recognition. 'See' is
    retained in the main text for transparency, with the implied sense of moral perception
    carried by context.
- source_word: גֵּאוּת
  chosen: the majesty
  alternatives:
  - the exaltation
  - the loftiness
  - the glory
  lexicon: HALOT
  rationale: גאות denotes exaltedness, majesty, or loftiness. 'Majesty' is idiomatic
    in English and suits the divine referent without importing a more specific term
    like 'glory' that would overlap with other Hebrew words.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the LXX/English Bible
    pattern.
