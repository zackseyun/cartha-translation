theological_decisions:
- issue: Concessive vs. conditional force of the opening clause
  chosen_reading: 'Concessive: ''Though favor is shown to the wicked'''
  alternative_readings:
  - 'Conditional: ''If favor is shown to the wicked'''
  rationale: 'The verse contrasts divine favor with the wicked person''s persistent
    refusal to learn righteousness. The concessive rendering best captures the rhetorical
    force in context: even when shown favor, the wicked remains unchanged.'
