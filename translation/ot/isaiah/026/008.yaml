id: ISA.26.8
reference: Isaiah 26:8
source:
  edition: WLC
  text: אַ֣ף אֹ֧רַח מִשְׁפָּטֶ֛י/ךָ יְהוָ֖ה קִוִּינ֑וּ/ךָ לְ/שִׁמְ/ךָ֥ וּֽ/לְ/זִכְרְ/ךָ֖
    תַּאֲוַת נָֽפֶשׁ־׃
translation:
  text: Indeed, in the path of your judgments, O LORD, we have waited for you; your
    name and your remembrance are the desire of the soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your justice' or 'your ordinances' for 'your judgments.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the memory of you' for 'your remembrance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  chosen: Indeed
  alternatives:
  - also
  - even
  - surely
  lexicon: HALOT
  rationale: Here אַף functions as an asseverative/additive particle introducing the
    statement with emphasis. 'Indeed' fits the poetic flow better than the more wooden
    'also' while preserving the force.
- source_word: אֹרַח
  chosen: path
  alternatives:
  - way
  - course
  lexicon: HALOT
  rationale: אֹרַח commonly denotes a path or way. 'Path' preserves the metaphorical
    image and reads naturally with 'judgments.'
- source_word: מִשְׁפָּטֶיךָ
  chosen: your judgments
  alternatives:
  - your justice
  - your ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote judgment, justice, or ordinance depending on context.
    In Isaiah 26, God's judicial acts are prominent, so 'judgments' best preserves
    both the concrete and moral sense without over-interpreting as merely abstract
    'justice.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in many English translations.
- source_word: קִוִּינוּךָ
  chosen: we have waited for you
  alternatives:
  - we waited for you
  - we hoped in you
  - we looked for you
  lexicon: HALOT
  rationale: קוה conveys waiting with expectant hope. 'We have waited for you' captures
    the completed-yet-relevant perfect in context and keeps the relational object
    explicit. 'Hoped in you' is possible but less direct in this poetic line.
- source_word: לשמך
  chosen: your name
  lexicon: HALOT
  rationale: שֵׁם here signifies God's revealed name and reputation. The literal 'your
    name' is both accurate and theologically rich, requiring no expansion in the main
    text.
- source_word: ולזכרך
  chosen: your remembrance
  alternatives:
  - your memorial
  - the memory of you
  lexicon: HALOT
  rationale: זֵכֶר can mean remembrance, memorial, or renown. 'Your remembrance' preserves
    the compact Hebrew parallelism with 'your name' and allows the phrase to denote
    the remembered reality of God among his people.
- source_word: תאוות נפש
  chosen: the desire of the soul
  alternatives:
  - the soul's desire
  - our soul's longing
  lexicon: HALOT
  rationale: The construct phrase literally means 'desire of soul.' 'The desire of
    the soul' is a clear, dignified English rendering that preserves the singular
    נֶפֶשׁ as a poetic collective rather than making it explicitly plural or possessive.
