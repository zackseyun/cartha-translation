theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse directly addresses Israel's covenant God. Following the project's
    doctrine, the tetragrammaton is rendered 'the LORD' rather than transliterated
    forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of מִשְׁפָּטֶיךָ in context
  chosen_reading: your judgments
  alternative_readings:
  - your justice
  - your ordinances
  rationale: The context of Isaiah 26 emphasizes God's judicial dealings in history.
    'Judgments' preserves the tension between God's just order and his acts of judgment
    without collapsing the term into only abstract justice or legal statutes.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
