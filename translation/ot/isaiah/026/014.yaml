theological_decisions:
- issue: Meaning of רְפָאִים in this verse
  chosen_reading: the underworld dead ('the shades')
  alternative_readings:
  - the Rephaim as an ancient people group
  rationale: The immediate parallelism with 'the dead' and the verbs 'live'/'rise'
    indicates deceased beings, not a historical ethnic group. This is a lexical-contextual
    decision rather than a doctrinal one, but it affects interpretation of the verse's
    imagery of irreversible judgment.
- issue: Implication of 'do not rise'
  chosen_reading: a statement of these judged oppressors' irreversible downfall within
    the poem
  alternative_readings:
  - a universal denial of any resurrection
  rationale: The verse speaks of specific hostile powers/persons under divine judgment
    in poetic context. Rendering it straightforwardly as 'do not rise' preserves the
    text without importing a doctrinal denial of resurrection elsewhere in Scripture.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
