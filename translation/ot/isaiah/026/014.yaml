id: ISA.26.14
reference: Isaiah 26:14
source:
  edition: WLC
  text: מֵתִים֙ בַּל יִחְי֔וּ רְפָאִ֖ים בַּל יָקֻ֑מוּ לָ/כֵ֤ן פָּקַ֨דְתָּ֙ וַ/תַּשְׁמִידֵ֔/ם
    וַ/תְּאַבֵּ֥ד כָּל זֵ֖כֶר לָֽ/מוֹ־־־׃
translation:
  text: The dead do not live; the shades do not rise. Therefore you have punished
    them and destroyed them, and you have made all memory of them perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the departed spirits'; Hebrew רְפָאִים refers here to the dead in the
      underworld, not the ancient people called Rephaim.
    reason: lexical_alternative
  - marker: b
    text: Or 'you have called them to account'; the Hebrew verb can mean 'visit' in
      either mercy or judgment, but here the context favors punishment.
    reason: lexical_alternative
  - marker: c
    text: Literally 'you have destroyed all memory of them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵתִים
  chosen: the dead
  alternatives:
  - dead ones
  lexicon: HALOT
  rationale: Plural adjective/substantive from מות used substantivally. 'The dead'
    is idiomatic English and preserves the collective sense better than the wooden
    'dead ones.'
- source_word: בַּל יִחְיוּ
  chosen: do not live
  alternatives:
  - will not live
  - shall not live
  lexicon: HALOT
  rationale: בַּל is a poetic negator. With the imperfect, the clause states their
    non-living status/future impossibility. Present English 'do not live' fits the
    poetic, gnomic force in context without overcommitting to a strictly future nuance.
- source_word: רְפָאִים
  chosen: the shades
  alternatives:
  - the departed spirits
  - the Rephaim
  - ghosts
  lexicon: HALOT
  rationale: In this context the term refers to the dead in Sheol, not the ethnic
    Rephaim. 'The shades' is a concise, established English rendering for the underworld
    dead and avoids misleading readers into thinking of a people group.
- source_word: בַּל יָקֻמוּ
  chosen: do not rise
  alternatives:
  - will not rise
  - do not arise
  lexicon: HALOT
  rationale: From קום, here in parallel with 'do not live.' 'Rise' is the most natural
    English equivalent and preserves possible resonance with standing up or rising
    from death.
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks consequence/result from the preceding assertion. 'Therefore' preserves
    the formal logical connection.
- source_word: פָּקַדְתָּ
  chosen: have punished
  alternatives:
  - visited
  - attended to
  - called to account
  lexicon: HALOT
  rationale: פקד has a broad semantic range, but in judgment contexts it commonly
    means to visit with punishment or call to account. Here the following destruction
    clauses make a punitive sense explicit.
- source_word: וַתַּשְׁמִידֵם
  chosen: destroyed them
  alternatives:
  - annihilated them
  - wiped them out
  lexicon: HALOT
  rationale: From שׁמד, a strong verb of destruction. 'Destroyed them' is forceful
    and natural without importing philosophical claims about absolute annihilation.
- source_word: וַתְּאַבֵּד כָּל זֵכֶר לָמוֹ
  chosen: you have made all memory of them perish
  alternatives:
  - you have wiped out all remembrance of them
  - you have destroyed every memory of them
  lexicon: HALOT
  rationale: אבד means perish/be lost/destroy. With 'all memory of them' as object,
    the idiom expresses eradication of remembrance. The chosen wording preserves the
    verbal force while remaining readable.
