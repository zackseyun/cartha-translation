theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the covenant name as 'the LORD' rather
    than transliterating it. This preserves continuity with Jewish reverence practice
    and the Septuagintal/English Bible tradition without making a sectarian claim.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of הָאָרֶץ
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: Although ארץ can mean either 'land' or 'earth,' the surrounding imagery
    of universal exposure and judgment supports the broader cosmic sense here. This
    is a contextual lexical-theological decision, not a doctrinally loaded one.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy
    and contextual sense
