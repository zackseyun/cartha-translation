id: ISA.26.21
reference: Isaiah 26:21
source:
  edition: WLC
  text: כִּֽי הִנֵּ֤ה יְהוָה֙ יֹצֵ֣א מִ/מְּקוֹמ֔/וֹ לִ/פְקֹ֛ד עֲוֺ֥ן יֹֽשֵׁב הָ/אָ֖רֶץ
    עָלָ֑י/ו וְ/גִלְּתָ֤ה הָ/אָ֨רֶץ֙ אֶת דָּמֶ֔י/הָ וְ/לֹֽא תְכַסֶּ֥ה ע֖וֹד עַל הֲרוּגֶֽי/הָ־־־־־׃ס
translation:
  text: For look, the LORD is coming out from his place to punish the iniquity of
    the inhabitant of the earth upon him, and the earth will uncover her blood and
    will no longer cover her slain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to call to account the iniquity of the inhabitant of the earth against
      him.' The Hebrew expression is compact and can be rendered more formally than
      the main text.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'her bloods,' a plural form that can denote bloodshed or bloodguilt.
    reason: lexical_alternative
  - marker: c
    text: '''Earth'' may also be rendered ''land'' in Hebrew, but the broader judgment
      context favors ''earth'' here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding exhortation; 'For'
    best preserves the connective force in context.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: A deictic particle drawing attention. 'Look' is readable modern English
    and preserves the vividness without archaic tone.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal sense while matching established English Bible convention.
- source_word: יֹצֵא מִמְּקוֹמוֹ
  chosen: is coming out from his place
  alternatives:
  - goes out from his place
  - comes forth from his place
  lexicon: HALOT
  rationale: The participle with prepositional phrase presents YHWH as emerging to
    act in judgment. 'Is coming out' gives the imminent, vivid sense in natural English.
- source_word: לִפְקֹד
  chosen: to punish
  alternatives:
  - to visit
  - to call to account
  lexicon: HALOT
  rationale: In judgment contexts פקד commonly means to visit with punishment or call
    to account. 'Punish' makes the judicial force explicit in contemporary English.
- source_word: עֲוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - sin
  lexicon: HALOT
  rationale: עון can denote both wrongdoing and its culpability. 'Iniquity' preserves
    the moral gravity and traditional judicial nuance better than the flatter 'sin'
    here.
- source_word: יֹשֵׁב הָאָרֶץ
  chosen: the inhabitant of the earth
  alternatives:
  - the one dwelling in the land
  - the inhabitants of the earth
  lexicon: HALOT
  rationale: The singular participle is retained as singular. 'Earth' is preferable
    to 'land' here because the context is cosmic judgment, not merely local territory.
- source_word: עָלָיו
  chosen: upon him
  alternatives:
  - against him
  - for him
  lexicon: HALOT
  rationale: The preposition על with פקד can mark the object against whom punishment
    falls. Retaining 'upon him' closely reflects the Hebrew syntax, though idiomatic
    English could also use 'against him'.
- source_word: וְגִלְּתָה הָאָרֶץ
  chosen: and the earth will uncover
  alternatives:
  - and the earth will reveal
  - and the land will disclose
  lexicon: HALOT
  rationale: The verb גלה here means to uncover or lay bare. 'Uncover' preserves the
    concrete imagery of hidden bloodshed being exposed.
- source_word: אֶת דָּמֶיהָ
  chosen: her blood
  alternatives:
  - the blood shed in her
  - her bloodguilt
  lexicon: HALOT
  rationale: The plural form 'bloods' in Hebrew often refers to bloodshed or bloodguilt,
    but English idiom normally uses singular 'blood.' The possessive feminine matches
    'earth' as grammatically feminine.
- source_word: וְלֹא תְכַסֶּה עוֹד
  chosen: and will no longer cover
  alternatives:
  - and will not again conceal
  - and will no more hide
  lexicon: HALOT
  rationale: The imperfect with עוד expresses cessation of prior concealment. 'Will
    no longer cover' is both literal and clear.
- source_word: עַל הֲרוּגֶיהָ
  chosen: her slain
  alternatives:
  - those slain in her
  - her murdered ones
  lexicon: HALOT
  rationale: The passive participle denotes those killed. 'Her slain' is concise and
    preserves the poetic force; the preceding על is absorbed idiomatically into the
    English expression rather than rendered woodenly.
