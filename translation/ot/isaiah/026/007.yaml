id: ISA.26.7
reference: Isaiah 26:7
source:
  edition: WLC
  text: אֹ֥רַח לַ/צַּדִּ֖יק מֵֽישָׁרִ֑ים יָשָׁ֕ר מַעְגַּ֥ל צַדִּ֖יק תְּפַלֵּֽס׃
translation:
  text: The path of the righteous is level; O Upright One, you make the way of the
    righteous smooth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The path of the righteous is straight; straight is the path of the
      righteous that you make level.' The Hebrew allows יָשָׁר to be read adjectivally
      rather than as a direct address, though the second-person verb favors the vocative
      reading.
    reason: alternative_reading
lexical_decisions:
- source_word: אֹרַח
  chosen: path
  alternatives:
  - way
  - road
  lexicon: HALOT
  rationale: Denotes a path or way of life. 'Path' fits the poetic parallelism with
    מַעְגַּל and is natural modern English.
- source_word: לַצַּדִּיק
  chosen: of the righteous
  alternatives:
  - for the righteous
  - for the just
  lexicon: HALOT
  rationale: The lamed can mark relation ('belonging to, pertaining to') as well as
    advantage. In English, 'the path of the righteous' reads idiomatically and preserves
    the sense.
- source_word: מֵישָׁרִים
  chosen: level
  alternatives:
  - uprightness
  - straightness
  - equity
  lexicon: HALOT
  rationale: Though formally a plural noun, in context it functions predicatively
    to describe the path as even or level. 'Level' best captures the concrete image
    in parallel with 'make ... smooth.'
- source_word: יָשָׁר
  chosen: O Upright One
  alternatives:
  - upright
  - straight
  lexicon: HALOT
  rationale: 'Taken vocatively and addressed to God, as in many major translations,
    because the following verb is second masculine singular (''you make level'').
    This yields coherent syntax: first colon states the condition of the righteous
    path; second colon addresses God as the Upright One who smooths it.'
- source_word: מַעְגַּל
  chosen: way
  alternatives:
  - track
  - path
  lexicon: HALOT
  rationale: Refers to a track or course. 'Way' avoids awkward repetition of 'path'
    while preserving the travel metaphor.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the just
  - the righteous man
  lexicon: HALOT
  rationale: Collective/generic singular in Hebrew poetry. 'The righteous' is natural
    English and preserves the representative force without unnecessarily specifying
    gender.
- source_word: תְּפַלֵּס
  chosen: you make ... smooth
  alternatives:
  - you level
  - you weigh out
  - you make straight
  lexicon: HALOT
  rationale: Piel of פלס can mean to level or make smooth, especially of a path. 'Make
    smooth' fits the road imagery and complements 'level' in the first colon.
