theological_decisions:
- issue: Whether יָשָׁר is an adjective describing the path or a vocative title/address
    to God
  chosen_reading: 'Vocative: ''O Upright One'''
  alternative_readings:
  - 'Adjectival/predicative: ''the path of the righteous is straight'''
  rationale: Because תְּפַלֵּס is second masculine singular, the verse naturally shifts
    to direct address. Rendering יָשָׁר as a vocative preserves the poetic appeal
    to God without importing extra theology beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    genuine ambiguity.
