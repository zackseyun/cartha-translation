id: ISA.26.11
reference: Isaiah 26:11
source:
  edition: WLC
  text: יְהוָ֛ה רָ֥מָה יָדְ/ךָ֖ בַּל יֶחֱזָי֑וּ/ן יֶחֱז֤וּ וְ/יֵבֹ֨שׁוּ֙ קִנְאַת עָ֔ם אַף אֵ֖שׁ צָרֶ֥י/ךָ תֹאכְלֵֽ/ם־־־׃ס
translation:
  text: O Yahweh, your hand is lifted up, but they do not see. They will see and be put to shame at the zeal for the people; indeed, fire will consume your enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the zeal of the people.' The Hebrew phrase is compact and may be understood in more than one way.
    reason: alternative_reading
  - marker: b
    text: Or 'the fire of your enemies.' The Hebrew wording allows a different construal, though 'the fire for your enemies will consume them' best fits the context of divine judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  - LORD
  lexicon: HALOT
  rationale: Rendered with 'LORD' per project doctrine for the divine name YHWH. The vocative force in context is naturally conveyed in English with 'O LORD.'
- source_word: רָמָה יָדְךָ
  chosen: your hand is lifted up
  alternatives:
  - your hand has been raised
  - your hand is high
  lexicon: HALOT
  rationale: The phrase combines the verb 'to be high/raised' with 'your hand.' 'Is lifted up' preserves the image of an elevated hand, likely signaling divine action or readiness to act, without over-interpreting.
- source_word: בַּל יֶחֱזָיוּן
  chosen: they do not see
  alternatives:
  - they do not perceive
  - they fail to see
  lexicon: HALOT
  rationale: 'בַּל negates the following verb. Although the form is somewhat unusual orthographically, the sense is straightforward: they do not see/perceive God''s raised hand. ''See'' keeps the Hebrew''s simplicity.'
- source_word: יֶחֱזוּ
  chosen: They will see
  alternatives:
  - Let them see
  - they shall see
  lexicon: HALOT
  rationale: 'Taken as an imperfect with future force following the prior negated clause: though they do not now see, they will see. This creates the verse''s rhetorical reversal.'
- source_word: וְיֵבֹשׁוּ
  chosen: and be put to shame
  alternatives:
  - and be ashamed
  - and be disgraced
  lexicon: HALOT
  rationale: The Niphal/Qal sense here denotes experiencing shame. 'Be put to shame' fits the judicial tone and the sequence of divine vindication.
- source_word: קִנְאַת עָם
  chosen: by the zeal for your people
  alternatives:
  - the zeal of the people
  - zeal for a people
  - jealousy for the people
  lexicon: HALOT
  rationale: קִנְאָה can mean zeal or jealousy. In context of divine vindication, 'zeal' is preferable. Although the Hebrew literally reads 'zeal of people,' the following 'your enemies' strongly supports understanding the people as belonging to the LORD; thus 'for your people' makes the implied relationship explicit without changing the sense.
- source_word: אַף
  chosen: indeed
  alternatives:
  - also
  - even
  - 'yes'
  lexicon: HALOT
  rationale: Here אַף intensifies the statement that follows. 'Indeed' captures the emphatic progression into the final clause.
- source_word: אֵשׁ
  chosen: the fire
  alternatives:
  - fire
  lexicon: HALOT
  rationale: Rendered literally. In context it is likely metaphorical for divine judgment, but the translation preserves the image rather than interpreting it away.
- source_word: צָרֶיךָ
  chosen: your enemies
  alternatives:
  - your adversaries
  - those hostile to you
  lexicon: HALOT
  rationale: The noun denotes foes/adversaries. 'Your enemies' is the most natural and direct rendering in this judgment context.
- source_word: תֹאכְלֵם
  chosen: will consume them
  alternatives:
  - will devour them
  - shall eat them up
  lexicon: HALOT
  rationale: With 'fire' as subject, 'consume' is idiomatic English and preserves the destructive force of the Hebrew verb 'eat/devour.'
