theological_decisions:
- issue: Interpretation of קִנְאַת עָם
  chosen_reading: divine zeal for the LORD's people
  alternative_readings:
  - the zeal of the people
  - envy of a people
  rationale: The syntax is compressed and could be construed in more than one way. In context, the verse contrasts the wicked's failure to perceive the LORD's action with their eventual shame and destruction, and the mention of 'your enemies' favors reading the zeal as the LORD's zealous concern for his people rather than the people's own zeal. This preserves the likely sense without importing a denominational claim.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
