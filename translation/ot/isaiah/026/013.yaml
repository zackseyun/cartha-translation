theological_decisions:
- issue: Contrast between the LORD and 'other lords'
  chosen_reading: The verse contrasts Israel's covenant God with human or foreign rulers who had exercised dominion over them.
  alternative_readings:
  - The 'other lords' could be idols or false gods personified as rulers.
  rationale: The Hebrew naturally allows oppressive rulers, and the verbal idea 'ruled over us' strongly suits political masters. The text need not be narrowed to either human rulers or idols in the main translation, so 'other lords' is retained without interpretive expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of בך לבד
  chosen_reading: Rendered as 'through you alone' in the main text, with 'in you alone' preserved as an alternative.
  alternative_readings:
  - in you alone
  - by you alone
  rationale: The preposition ב is semantically flexible. The clause likely means that only in relation to the LORD do the people rightly invoke his name. Because the Hebrew permits more than one nuance, the main text chooses a readable rendering and the footnote preserves the alternative.
  doctrine_reference: Preserve theological tension rather than resolve it.
