id: ISA.26.13
reference: Isaiah 26:13
source:
  edition: WLC
  text: יְהוָ֣ה אֱלֹהֵ֔י/נוּ בְּעָל֥וּ/נוּ אֲדֹנִ֖ים זֽוּלָתֶ֑/ךָ לְ/בַד בְּ/ךָ֖ נַזְכִּ֥יר שְׁמֶֽ/ךָ־׃
translation:
  text: O Yahweh our God, other lords besides you have ruled over us, but through you alone we make mention of your name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in you alone we make mention of your name.' The Hebrew preposition in 'through/in you alone' can be understood in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  - LORD
  lexicon: HALOT
  rationale: Rendered as 'LORD' per doctrine default for the divine name יְהוָה, with 'O' reflecting direct address in prayer-like speech.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  alternatives:
  - our gods
  lexicon: HALOT
  rationale: With יְהוָה in direct address, the plural form functions as the singular title 'God'; the 1cp suffix gives 'our.'
- source_word: בְּעָלוּנוּ
  chosen: have ruled over us
  alternatives:
  - have mastered us
  - have been lords over us
  - have possessed us
  lexicon: HALOT
  rationale: From בעל in the sense of exercising lordship/mastery. 'Have ruled over us' is idiomatic and fits the parallel with 'lords,' while preserving the oppressive sense of domination.
- source_word: אֲדֹנִים
  chosen: lords
  alternatives:
  - masters
  lexicon: HALOT
  rationale: Plural noun referring to foreign or rival rulers. 'Lords' preserves the lexical parallel with the preceding verb and the contrast with the LORD.
- source_word: זוּלָתֶךָ
  chosen: besides you
  alternatives:
  - other than you
  - apart from you
  lexicon: HALOT
  rationale: 'Expresses exclusion/exception: these lords are ''other than'' or ''besides'' the LORD. ''Besides you'' reads naturally in English.'
- source_word: לבד
  chosen: alone
  alternatives:
  - only
  - by itself
  lexicon: HALOT
  rationale: Adverbial intensifier stressing exclusivity. Combined with בך to yield 'through you alone' / 'in you alone' depending on construal.
- source_word: בך
  chosen: through you
  alternatives:
  - by you
  - in you
  lexicon: HALOT
  rationale: The preposition ב can mark instrumentality or sphere. Here 'through you' best fits the clause 'we make mention of your name,' conveying that acknowledgment of God's name is possible only by reference to him. The alternative 'in you alone' is viable and preserved in a footnote because the Hebrew is compact and somewhat ambiguous.
- source_word: נזכיר
  chosen: we make mention of
  alternatives:
  - we remember
  - we proclaim
  - we confess
  lexicon: HALOT
  rationale: Hiphil of זכר commonly means 'cause to remember, mention, commemorate.' 'Make mention of' is a close and natural rendering in this worship context.
- source_word: שמך
  chosen: your name
  lexicon: HALOT
  rationale: Standard rendering; in context 'name' carries covenantal and worship significance without needing expansion in the main text.
