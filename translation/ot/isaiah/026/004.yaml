theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies יְהוָה should normally be rendered 'the
    LORD' following Jewish reverence tradition and the Septuagintal pattern. That
    default is followed here for the full form of the name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering of the shortened divine name יָהּ alongside יְהוָה
  chosen_reading: Yah, the LORD
  alternative_readings:
  - the LORD, the LORD
  - Yahweh the LORD
  rationale: Because the Hebrew intentionally uses the short form יָהּ followed by
    the full name יְהוָה, preserving some distinction in English best reflects the
    source text's poetic emphasis. Using 'Yah' for the short form while keeping 'the
    LORD' for יְהוָה avoids collapsing the repetition into a single undifferentiated
    phrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy
    over translation tradition; Contested terms for יְהוָה'
- issue: Metaphorical predicate for God
  chosen_reading: an everlasting rock
  alternative_readings:
  - the Rock of Ages
  - an eternal Rock
  rationale: The Hebrew says literally 'rock of ages/everlasting rock.' 'Rock of Ages'
    is traditional and evocative, but it can sound like a fixed liturgical title in
    English. 'An everlasting rock' preserves the metaphor in readable modern English
    without importing later hymnological associations.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern English,
    not archaic or academic'
