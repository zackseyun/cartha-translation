theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of the shortened divine name יָהּ alongside יְהוָה
  chosen_reading: Yah, Yahweh
  alternative_readings:
  - the LORD, the LORD
  - Yahweh the LORD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition; Contested terms for יְהוָה'
- issue: Metaphorical predicate for God
  chosen_reading: an everlasting rock
  alternative_readings:
  - the Rock of Ages
  - an eternal Rock
  rationale: The Hebrew says literally 'rock of ages/everlasting rock.' 'Rock of Ages' is traditional and evocative, but it can sound like a fixed liturgical title in English. 'An everlasting rock' preserves the metaphor in readable modern English without importing later hymnological associations.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern English, not archaic or academic'
