id: ISA.26.4
reference: Isaiah 26:4
source:
  edition: WLC
  text: בִּטְח֥וּ בַֽ/יהוָ֖ה עֲדֵי עַ֑ד כִּ֚י בְּ/יָ֣הּ יְהוָ֔ה צ֖וּר עוֹלָמִֽים־׃
translation:
  text: Trust in the LORD forever, for in Yah, the LORD, is an everlasting rock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in Yah, the LORD''—the first name is the shortened poetic form
      of the divine name (יָהּ, Yah), followed by the full form (יְהוָה).'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Rock of Ages.'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּטְחוּ
  chosen: Trust
  alternatives:
  - Put your trust
  lexicon: HALOT
  rationale: Qal imperative plural of בטח, calling the audience to rely confidently
    on God. 'Trust' is the most natural imperative in modern English and preserves
    the direct exhortation.
- source_word: בַיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: The preposition ב marks the object of trust. Per doctrine, יְהוָה is
    rendered 'the LORD' in the main text rather than transliterated.
- source_word: עֲדֵי עַד
  chosen: forever
  alternatives:
  - for ever
  - unto perpetuity
  - for all time
  lexicon: HALOT
  rationale: This idiom expresses enduring continuance. 'Forever' is idiomatic modern
    English and captures the force without archaism.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the exhortation. 'For' fits English biblical
    style and smoothly connects command and rationale.
- source_word: בְּיָהּ
  chosen: in Yah
  alternatives:
  - in the LORD
  lexicon: HALOT
  rationale: יָהּ is the shortened poetic form of the divine name, distinct from the
    following יְהוָה. Rendering it as 'Yah' preserves the marked repetition and poetic
    emphasis rather than flattening both names into the same English form.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: The full divine name follows יָהּ appositionally/emphatically. Per doctrine,
    the default rendering is 'the LORD' in the main text.
- source_word: צוּר
  chosen: rock
  alternatives:
  - strength
  - refuge
  lexicon: HALOT
  rationale: Literally 'rock,' a common metaphor for stability, protection, and reliability
    when used of God. The concrete image should be preserved rather than interpreted
    away.
- source_word: עוֹלָמִים
  chosen: everlasting
  alternatives:
  - of ages
  - eternal
  lexicon: HALOT
  rationale: Plural of intensity/duration modifying 'rock.' 'Everlasting' naturally
    conveys enduring permanence in English while retaining the temporal force.
