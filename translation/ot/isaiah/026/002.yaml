id: ISA.26.2
reference: Isaiah 26:2
source:
  edition: WLC
  text: פִּתְח֖וּ שְׁעָרִ֑ים וְ/יָבֹ֥א גוֹי צַדִּ֖יק שֹׁמֵ֥ר אֱמֻנִֽים־׃
translation:
  text: Open the gates, so that a righteous nation may enter, one that keeps faithfulness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that keeps truth' or 'that keeps faith.' The Hebrew אֱמֻנִים can denote
      faithfulness, trustworthiness, or truth depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּתְחוּ
  chosen: Open
  alternatives:
  - Open up
  lexicon: HALOT
  rationale: Qal imperative plural of פתח, a direct command to open. 'Open' is the
    natural concise English imperative.
- source_word: שְׁעָרִים
  chosen: the gates
  alternatives:
  - gates
  lexicon: HALOT
  rationale: Plural noun 'gates.' The article is not explicit in Hebrew, but English
    idiom in this summons naturally takes 'the gates,' referring to the city gates
    in context.
- source_word: וְיָבֹא
  chosen: so that ... may enter
  alternatives:
  - and let ... enter
  - that ... may come in
  lexicon: HALOT
  rationale: 'The conjunction plus imperfect expresses purpose/result after the imperative:
    ''Open ... so that/may.'' ''Enter'' fits the gate imagery better than the more
    general ''come.'''
- source_word: גוֹי
  chosen: nation
  alternatives:
  - people
  lexicon: HALOT
  rationale: גוֹי commonly denotes a nation/people-group. 'Nation' best preserves
    the collective political-covenantal sense here.
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: Adjective describing the nation. 'Righteous' is the standard biblical
    rendering and preserves the moral-covenantal sense better than 'just' in this
    context.
- source_word: שֹׁמֵר
  chosen: one that keeps
  alternatives:
  - keeping
  - guarding
  - observing
  lexicon: HALOT
  rationale: Qal participle functioning attributively to describe the nation. English
    smoothness is improved by rendering the collective singular with an appositional
    phrase, 'one that keeps.'
- source_word: אֱמֻנִים
  chosen: faithfulness
  alternatives:
  - faith
  - truth
  - trustworthiness
  lexicon: HALOT
  rationale: Plural abstract/intensive form from אמן. In this context it denotes steadfast
    fidelity or faithfulness rather than merely subjective belief. 'Faithfulness'
    best captures covenant reliability; 'truth' is possible but narrower.
