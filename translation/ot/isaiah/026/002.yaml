theological_decisions:
- issue: Meaning of אֱמֻנִים in relation to the righteous nation
  chosen_reading: faithfulness
  alternative_readings:
  - truth
  - faith
  rationale: The verse characterizes the righteous nation by steadfast covenant fidelity.
    Rendering as 'faithfulness' preserves the ethical-theological force without importing
    later doctrinal notions of 'faith' alone. Because the Hebrew can also suggest
    'truth' or 'trustworthiness,' those are preserved as alternatives.
  doctrine_reference: Translation philosophy §3, §5
