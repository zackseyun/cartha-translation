theological_decisions:
- issue: Referent of the feminine suffix in 'tramples it'
  chosen_reading: The suffix refers to the humbled lofty city in the immediate context.
  alternative_readings:
  - A generic feminine object left unspecified in English
  rationale: Verse 5 speaks of the exalted city being brought low; verse 6 continues
    that image. Supplying 'it' in English makes the object explicit and coherent with
    the context without adding doctrinal content.
