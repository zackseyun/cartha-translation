id: ISA.26.17
reference: Isaiah 26:17
source:
  edition: WLC
  text: כְּמ֤וֹ הָרָה֙ תַּקְרִ֣יב לָ/לֶ֔דֶת תָּחִ֥יל תִּזְעַ֖ק בַּ/חֲבָלֶ֑י/הָ כֵּ֛ן
    הָיִ֥ינוּ מִ/פָּנֶ֖י/ךָ יְהוָֽה׃
translation:
  text: Like a pregnant woman who is about to give birth writhes and cries out in
    her labor pains, so were we before you, O LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your presence'; the Hebrew phrase literally refers to being before
      the face/presence of the LORD. Some take it as 'because of you.'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּמוֹ
  chosen: Like
  alternatives:
  - As
  lexicon: HALOT
  rationale: Introduces a simile. 'Like' is natural modern English and preserves the
    comparative force.
- source_word: הָרָה
  chosen: a pregnant woman
  alternatives:
  - a woman with child
  - a pregnant one
  lexicon: HALOT
  rationale: Refers to a pregnant female. 'A pregnant woman' is clear, idiomatic,
    and specific.
- source_word: תַּקְרִיב לָלֶדֶת
  chosen: who is about to give birth
  alternatives:
  - draws near to giving birth
  - comes near to bearing
  lexicon: HALOT
  rationale: The Hiphil of קרב with the infinitive 'to give birth' expresses approaching
    the time of delivery. 'Is about to give birth' conveys the sense naturally in
    English.
- source_word: תָּחִיל
  chosen: writhes
  alternatives:
  - is in labor
  - travails
  - trembles
  lexicon: HALOT
  rationale: From חול in labor imagery, denoting writhing or laboring. 'Writhes' preserves
    the vivid bodily image better than the more abstract 'is in labor,' while fitting
    the parallel with crying out.
- source_word: תִּזְעַק
  chosen: cries out
  alternatives:
  - shouts
  - screams
  lexicon: HALOT
  rationale: Conveys a loud cry. 'Cries out' is strong without overstating the register.
- source_word: בַּחֲבָלֶיהָ
  chosen: in her labor pains
  alternatives:
  - in her pangs
  - in her birth pains
  lexicon: HALOT
  rationale: חבל in this context refers to birth pangs. 'Labor pains' is idiomatic
    modern English and matches the childbirth metaphor.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Marks the comparison's conclusion. 'So' is concise and natural.
- source_word: הָיִינוּ
  chosen: were we
  alternatives:
  - we were
  - have we been
  lexicon: HALOT
  rationale: Qal perfect 1cp, describing the people's condition. Inverted order after
    'so' gives good English rhythm while preserving the comparison.
- source_word: מִפָּנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  - because of you
  lexicon: HALOT
  rationale: Literally 'from/before your face.' In this context it most naturally
    denotes being in the LORD's presence rather than explicit causation. 'Before you'
    preserves the relational and reverential sense while remaining idiomatic.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    Because direct address follows 'O,' the English text uses 'O LORD,' which preserves
    the covenant name convention in idiomatic vocative form.
