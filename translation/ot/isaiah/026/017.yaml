theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - O Yahweh
  - O Jehovah
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD.' In direct address, 'O LORD' is the natural English equivalent and preserves
    the reverential convention without transliterating the name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of מִפָּנֶיךָ in the simile
  chosen_reading: before you
  alternative_readings:
  - because of you
  - from before you / in your presence
  rationale: The phrase can sometimes shade toward causation, but here the comparison
    emphasizes Israel's condition in relation to the LORD. 'Before you' preserves
    the theological tension of divine presence and distress without over-interpreting
    the cause.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
