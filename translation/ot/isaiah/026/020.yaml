id: ISA.26.20
reference: Isaiah 26:20
source:
  edition: WLC
  text: לֵ֤ךְ עַמִּ/י֙ בֹּ֣א בַ/חֲדָרֶ֔י/ךָ וּֽ/סְגֹ֥ר דלתי/ך בַּעֲדֶ֑/ךָ חֲבִ֥י כִ/מְעַט
    רֶ֖גַע עַד יעבור זָֽעַם־־־׃
translation:
  text: Go, my people, enter your rooms, and shut your doors behind you; hide yourselves
    for a little moment until the wrath has passed by.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your chambers.' The Hebrew term can refer to inner rooms or private
      chambers.
    reason: lexical_alternative
  - marker: b
    text: Or 'hide yourself.' The Hebrew addresses 'my people' as a collective, so
      the English plural 'yourselves' brings out the collective sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'until the indignation has passed by.'
    reason: alternative_reading
lexical_decisions:
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Come away
  - Depart
  lexicon: HALOT
  rationale: Qal imperative 2ms of הלך, functioning as a direct summons. 'Go' is the
    plain imperative and fits the sequence of commands.
- source_word: עַמִּי
  chosen: my people
  alternatives:
  - my nation
  lexicon: HALOT
  rationale: עם with 1cs suffix is the covenantal address 'my people,' a common prophetic
    form of address. 'Nation' is possible in some contexts but is less personal here.
- source_word: בֹּא
  chosen: enter
  alternatives:
  - come
  - go in
  lexicon: HALOT
  rationale: Qal imperative of בוא. In English, 'enter' works naturally with 'your
    rooms' and preserves the movement into an enclosed space.
- source_word: בַחֲדָרֶיךָ
  chosen: your rooms
  alternatives:
  - your chambers
  - your inner rooms
  lexicon: HALOT
  rationale: חדר commonly denotes an inner room or chamber. 'Rooms' is readable modern
    English; 'chambers' is more traditional and is preserved as an alternative.
- source_word: וּסְגֹר
  chosen: and shut
  alternatives:
  - and close
  lexicon: HALOT
  rationale: Qal imperative of סגר, used of shutting or closing. 'Shut' is slightly
    more idiomatic with 'doors' in English.
- source_word: דלתיך
  chosen: your doors
  lexicon: HALOT
  rationale: Straightforward plural noun with 2ms suffix.
- source_word: בַּעֲדֶךָ
  chosen: behind you
  alternatives:
  - about you
  - upon yourself
  lexicon: HALOT
  rationale: בעד in this idiom with shutting doors conveys closure on one's behalf/behind
    one. 'Behind you' is the most natural English expression for the action commanded.
- source_word: חֲבִי
  chosen: hide yourselves
  alternatives:
  - hide yourself
  - take cover
  lexicon: HALOT
  rationale: Imperative from חבא 'hide.' Although the form is morphologically feminine
    singular in the table, the addressee is 'my people,' a collective, so idiomatic
    English uses the plural-reflexive 'yourselves.' This reflects the collective sense
    rather than forcing a singular English command.
- source_word: כמעט רגע
  chosen: for a little moment
  alternatives:
  - for a brief moment
  - for a little while
  lexicon: HALOT
  rationale: The phrase combines מעט ('little') and רגע ('moment') to indicate a short
    duration. 'For a little moment' preserves the compactness and solemn tone of the
    Hebrew.
- source_word: עַד יַעֲבוֹר
  chosen: until ... has passed by
  alternatives:
  - until ... passes
  - until ... is over
  lexicon: HALOT
  rationale: עד with imperfect of עבר marks the endpoint of the hiding. English present
    perfect 'has passed by' conveys completed movement past the addressee and reads
    naturally after 'until'.
- source_word: זָעַם
  chosen: the wrath
  alternatives:
  - the indignation
  - the fury
  lexicon: HALOT
  rationale: זעם denotes divine anger/indignation in prophetic contexts. 'Wrath' best
    preserves the theological weight and likely reference to God's judicial anger;
    'indignation' is a viable more formal alternative.
