theological_decisions:
- issue: Referent and force of זָעַם
  chosen_reading: Rendered as 'the wrath,' leaving the agent implicit but allowing
    the prophetic context to suggest divine judgment.
  alternative_readings:
  - the indignation
  - the fury
  rationale: The Hebrew does not explicitly state whose wrath, so the translation
    preserves the noun without adding 'of the LORD' or another interpretive expansion.
    This maintains the text's theological tension and avoids importing a claim not
    overtly stated in the verse, while still using a term weighty enough for prophetic
    judgment.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
