theological_decisions:
- issue: Subject reference and anthropological wording
  chosen_reading: the verse speaks of the person's inner disposition ('the mind')
    rather than explicitly 'him whose mind'
  alternative_readings:
  - You keep him in perfect peace, whose mind is stayed on you
  rationale: The Hebrew subject is יֵצֶר ('mind/inclination'), not an explicit personal
    pronoun. Rendering the inner disposition directly is closer to the source text
    while still conveying the personal sense. This also aligns with the translation
    philosophy of original-language primacy over inherited English tradition.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering the doubled שָׁלוֹם
  chosen_reading: perfect peace
  alternative_readings:
  - peace, peace
  - complete peace
  rationale: The Hebrew repetition is an intensifier. 'Perfect peace' communicates
    the force naturally in English without flattening the emphasis; a more literal
    alternative is preserved in a footnote to maintain auditability and the poetic
    texture.
  doctrine_reference: Translation philosophy §6
