id: ISA.26.3
reference: Isaiah 26:3
source:
  edition: WLC
  text: יֵ֣צֶר סָמ֔וּךְ תִּצֹּ֖ר שָׁל֣וֹם שָׁל֑וֹם כִּ֥י בְ/ךָ֖ בָּטֽוּחַ׀׃
translation:
  text: You keep in perfect peace the mind that is stayed on you, because it trusts
    in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''peace, peace'' — the repetition intensifies the idea of full
      or complete peace.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the inclination' or 'the frame of mind' for 'the mind.'
    reason: lexical_alternative
  - marker: c
    text: 'Traditional English: ''You keep him in perfect peace, whose mind is stayed
      on you.'' The Hebrew more directly says ''the mind'' as the subject.'
    reason: alternative_reading
lexical_decisions:
- source_word: יֵצֶר
  chosen: the mind
  alternatives:
  - the inclination
  - the purpose
  - the frame of mind
  lexicon: HALOT
  rationale: יֵצֶר can denote formation, inclination, or disposition of mind. In this
    context, paired with 'stayed' and 'trusts,' it refers to the inner disposition
    or mindset rather than a physical formation. 'Mind' is natural English and fits
    the parallelism.
- source_word: סָמוּךְ
  chosen: that is stayed on you
  alternatives:
  - steadfast
  - supported
  - leaning on you
  lexicon: HALOT
  rationale: The passive participle from סמך conveys being supported, upheld, or firmly
    fixed. Because the object of reliance is made explicit by בך later in the verse,
    rendering it as 'stayed on you' captures both firmness and dependence, while preserving
    the relational sense.
- source_word: תִּצֹּר
  chosen: You keep
  alternatives:
  - You guard
  - You preserve
  - You watch over
  lexicon: HALOT
  rationale: נצר commonly means keep, guard, or preserve. 'You keep' is idiomatic
    with 'in peace' in English and preserves the subject as God addressing or describing
    his action toward the faithful.
- source_word: שָׁלוֹם שָׁלוֹם
  chosen: perfect peace
  alternatives:
  - peace, peace
  - complete peace
  - peace upon peace
  lexicon: HALOT
  rationale: The repetition intensifies the noun, expressing fullness or completeness
    of peace. 'Perfect peace' is a well-established and accurate English rendering
    of the Hebrew intensification, though the more literal 'peace, peace' is worth
    preserving in a footnote.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces the reason for the preceding statement: God keeps
    such a person in peace because of trust in him. ''Because'' makes the causal relation
    explicit in contemporary English.'
- source_word: בְךָ
  chosen: in you
  alternatives:
  - on you
  lexicon: HALOT
  rationale: The preposition ב here marks the object of trust. 'Trust in you' is standard
    English usage and best communicates the Hebrew construction.
- source_word: בָּטוּחַ
  chosen: it trusts
  alternatives:
  - he trusts
  - is trusting
  - is secure
  lexicon: HALOT
  rationale: The adjective/participle from בטח denotes one who trusts or is secure.
    Given the subject יֵצֶר ('mind'), 'it trusts' matches the grammatical antecedent.
    This avoids importing a masculine personal subject not present in the Hebrew.
