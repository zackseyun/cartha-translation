id: ISA.26.15
reference: Isaiah 26:15
source:
  edition: WLC
  text: יָסַ֤פְתָּ לַ/גּוֹי֙ יְהוָ֔ה יָסַ֥פְתָּ לַ/גּ֖וֹי נִכְבָּ֑דְתָּ רִחַ֖קְתָּ כָּל קַצְוֵי אָֽרֶץ־־׃
translation:
  text: You have increased the nation, O Yahweh; you have increased the nation; you have gained glory; you have extended all the borders of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you are glorified,' 'you have been honored,' or 'you have made yourself glorious.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all the ends of the earth.' The Hebrew can mean 'ends/edges,' but in context it likely refers to the borders of the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָסַפְתָּ
  chosen: you have increased
  alternatives:
  - you have added to
  - you have enlarged
  lexicon: HALOT
  rationale: The verb יסף with ל plus a collective noun naturally conveys increase or enlargement. 'Increased' is idiomatic in English and fits the parallel repetition.
- source_word: לַגּוֹי
  chosen: the nation
  alternatives:
  - the people
  - the nation-state
  lexicon: HALOT
  rationale: גּוֹי commonly means 'nation.' The singular with article is retained as singular in English. 'People' is possible but less precise lexically.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נִכְבָּדְתָּ
  chosen: you have gained glory
  alternatives:
  - you are glorified
  - you have been honored
  - you have made yourself glorious
  lexicon: HALOT
  rationale: 'The Niphal of כבד here is best taken as a stative/resultative passive-reflexive sense: God is shown glorious/honored as a result of his action. ''You have gained glory'' communicates the result in clear English without overinterpreting agency. Because the form allows other nuances, alternatives are preserved in a footnote.'
- source_word: רִחַקְתָּ
  chosen: you have extended
  alternatives:
  - you have enlarged
  - you have pushed far out
  - you have removed far away
  lexicon: HALOT
  rationale: The root רחק usually means 'be far' or 'make far.' In this context with 'all the borders of the land,' the sense is that the boundaries have been made far, i.e., extended/enlarged. This fits the parallel with national increase better than a sense of removal.
- source_word: כָּל קַצְוֵי אָרֶץ
  chosen: all the borders of the land
  alternatives:
  - all the ends of the earth
  - all the extremities of the land
  lexicon: HALOT
  rationale: קצה can denote end, edge, or border. Given the preceding theme of national increase, 'borders of the land' is contextually strongest. 'Ends of the earth' is a possible more global rendering, but here likely overstates the territorial image and is preserved in a footnote.
