theological_decisions:
- issue: Scope of אָרֶץ
  chosen_reading: land
  alternative_readings:
  - earth
  rationale: The verse speaks of increasing the nation and making its boundaries far, which favors a territorial sense ('land') rather than the whole world ('earth'). This is a contextual, not doctrinal, decision; the broader alternative is preserved in a footnote because English tradition often renders the phrase more globally.
