theological_decisions:
- issue: Nature of מוּסָר in relation to God
  chosen_reading: your discipline
  alternative_readings:
  - your instruction
  - your chastening
  rationale: The verse depicts suffering leading the people to seek the LORD. Rendering מוּסָר as 'discipline' preserves the corrective dimension without over-specifying either purely pedagogical instruction or severe punitive chastisement.
  doctrine_reference: Translation philosophy §3, §6
- issue: Sense of לַחַשׁ
  chosen_reading: a whispered prayer
  alternative_readings:
  - a whisper
  - an incantation
  rationale: Because the context is covenantal appeal to the LORD, a prayerful sense is preferable. The more occult sense 'incantation' would import a notion the context does not require. The quieter, subdued tone of suffering is retained by 'whispered.'
  doctrine_reference: Translation philosophy §1, §6
