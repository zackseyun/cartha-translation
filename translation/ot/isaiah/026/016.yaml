id: ISA.26.16
reference: Isaiah 26:16
source:
  edition: WLC
  text: יְהוָ֖ה בַּ/צַּ֣ר פְּקָד֑וּ/ךָ צָק֣וּ/ן לַ֔חַשׁ מוּסָרְ/ךָ֖ לָֽ/מוֹ׃
translation:
  text: O Yahweh, in distress they sought you; they poured out a whispered prayer when your discipline was upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they turned to you' or 'they visited you'; the Hebrew verb can carry the sense of attending to or seeking someone.
    reason: lexical_alternative
  - marker: b
    text: Or 'they poured out a whisper' or 'they uttered a murmur'; the Hebrew is compact and may describe hushed supplication under affliction.
    reason: lexical_alternative
  - marker: c
    text: '''Your discipline'' may also be rendered ''your chastening'' or ''your instruction.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  - LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּצַּר
  chosen: in distress
  alternatives:
  - in trouble
  - in anguish
  - in the narrow place
  lexicon: HALOT
  rationale: צַר here denotes a state of distress/adversity rather than a literal narrow place. 'In distress' is natural modern English and preserves the affliction context.
- source_word: פְּקָדוּךָ
  chosen: they sought you
  alternatives:
  - they visited you
  - they attended to you
  - they turned to you
  lexicon: HALOT
  rationale: פקד has a broad semantic range including visit, attend, seek. In this prayer/distress context, the sense is that the people turned to or sought the LORD in affliction. 'Sought you' best captures the idiomatic force in English.
- source_word: צָקוּן
  chosen: they poured out
  alternatives:
  - they poured forth
  - they pressed out
  - they melted out
  lexicon: HALOT
  rationale: The verb likely conveys pouring out or effusing, especially of prayer or speech. 'They poured out' fits the following noun and yields a coherent idiom in English.
- source_word: לַחַשׁ
  chosen: a whispered prayer
  alternatives:
  - a whisper
  - a murmur
  - an incantation
  lexicon: HALOT
  rationale: לחש can denote whispering, murmuring, or a hushed utterance. In parallel with seeking God under discipline, 'whispered prayer' best reflects a subdued supplication rather than magical incantation.
- source_word: מוּסָרְךָ
  chosen: your discipline
  alternatives:
  - your chastening
  - your correction
  - your instruction
  lexicon: HALOT
  rationale: מוּסָר can mean discipline, correction, or instruction. In the context of distress leading to prayer, the punitive-corrective nuance is prominent. 'Discipline' is accessible modern English and preserves the theological sense of corrective chastening.
- source_word: לָמוֹ
  chosen: upon them
  alternatives:
  - to them
  - for them
  lexicon: HALOT
  rationale: 'The preposition with pronominal suffix here is best taken in relation to the preceding clause: God''s discipline coming upon them. ''Upon them'' makes the relation explicit and idiomatic in English.'
