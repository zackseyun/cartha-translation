id: ISA.42.10
reference: Isaiah 42:10
source:
  edition: WLC
  text: שִׁ֤ירוּ לַֽ/יהוָה֙ שִׁ֣יר חָדָ֔שׁ תְּהִלָּת֖/וֹ מִ/קְצֵ֣ה הָ/אָ֑רֶץ יוֹרְדֵ֤י הַ/יָּם֙ וּ/מְלֹא֔/וֹ אִיִּ֖ים וְ/יֹשְׁבֵי/הֶֽם׃
translation:
  text: Sing to Yahweh a new song, his praise from the end of the earth, you who go down to the sea, and all that fills it, the coastlands and those who dwell in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the end of the earth''; many English versions render the idiom as ''from the ends of the earth.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'the islands'; the Hebrew term can refer broadly to islands or distant coastlands.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁירוּ
  chosen: Sing
  alternatives:
  - Sing out
  lexicon: HALOT
  rationale: Imperative plural of שׁיר, a direct summons to praise. 'Sing' is the plain and natural English imperative.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered by the project default 'the LORD' per DOCTRINE.md, following established reverential convention and the pattern reflected in the LXX's κύριος.
- source_word: שִׁיר חָדָשׁ
  chosen: a new song
  lexicon: HALOT
  rationale: A common Hebrew collocation for fresh praise in response to God's saving acts. Formal rendering is clear and idiomatic in English.
- source_word: תְּהִלָּתוֹ
  chosen: his praise
  alternatives:
  - his praise-song
  lexicon: HALOT
  rationale: The noun denotes praise directed toward or belonging to him. 'His praise' preserves the compact Hebrew expression without overinterpreting.
- source_word: מִקְצֵה הָאָרֶץ
  chosen: from the end of the earth
  alternatives:
  - from the ends of the earth
  - from earth's farthest edge
  lexicon: HALOT
  rationale: The singular construct literally reads 'from the end of the earth.' Although English often uses the plural idiom 'ends of the earth,' the singular better reflects the Hebrew here while still sounding natural.
- source_word: יוֹרְדֵי הַיָּם
  chosen: you who go down to the sea
  alternatives:
  - you who descend to the sea
  - seafarers
  lexicon: HALOT
  rationale: The participial phrase literally means 'those going down to the sea.' 'You who go down to the sea' preserves the vivid Hebrew address and links syntactically to the summons to praise.
- source_word: וּמְלֹאוֹ
  chosen: and all that fills it
  alternatives:
  - and its fullness
  - and all that is in it
  lexicon: HALOT
  rationale: מְלֹא often means fullness or that which fills something. Here it refers to all that fills the sea. 'All that fills it' is both faithful and readable.
- source_word: אִיִּים
  chosen: the coastlands
  alternatives:
  - the islands
  lexicon: HALOT
  rationale: In prophetic literature אִיִּים often denotes maritime lands/coastlands broadly, not only literal islands. 'Coastlands' best captures the geographic scope in context.
- source_word: וְיֹשְׁבֵיהֶם
  chosen: and those who dwell in them
  alternatives:
  - and their inhabitants
  lexicon: HALOT
  rationale: The participial form with pronominal suffix is literally 'and their dwellers/inhabitants.' 'Those who dwell in them' preserves the verbal nuance and parallelism.
