id: ISA.42.6
reference: Isaiah 42:6
source:
  edition: WLC
  text: אֲנִ֧י יְהוָ֛ה קְרָאתִ֥י/ךָֽ בְ/צֶ֖דֶק וְ/אַחְזֵ֣ק בְּ/יָדֶ֑/ךָ וְ/אֶצָּרְ/ךָ֗ וְ/אֶתֶּנְ/ךָ֛ לִ/בְרִ֥ית עָ֖ם לְ/א֥וֹר גּוֹיִֽם׃
translation:
  text: I am Yahweh; I have called you in righteousness, and I will take hold of your hand; I will keep you and give you as a covenant for the people, as a light for the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in justice.' The Hebrew צֶדֶק can denote righteousness or justice.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will keep you' or 'I will guard you.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for a light to the nations'; 'nations' may also be rendered 'Gentiles' in some contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: קְרָאתִיךָ
  chosen: I have called you
  alternatives:
  - I called you
  lexicon: HALOT
  rationale: The Hebrew perfect can be rendered as a completed action with present relevance. 'I have called you' fits the commissioning context and reads naturally in English while preserving the completed divine act.
- source_word: בְצֶדֶק
  chosen: in righteousness
  alternatives:
  - in justice
  - righteously
  lexicon: HALOT
  rationale: צֶדֶק commonly denotes righteousness or justice. 'In righteousness' preserves the noun form and leaves the semantic range broad, avoiding over-narrowing to either moral rectitude or judicial justice alone.
- source_word: וְאַחְזֵק בְּיָדֶךָ
  chosen: and I will take hold of your hand
  alternatives:
  - and I will hold your hand
  - and I will strengthen your hand
  lexicon: HALOT
  rationale: The Hiphil of חזק with 'hand' naturally conveys grasping/strengthening by taking hold. 'Take hold of your hand' best reflects the concrete imagery and divine support without becoming overly idiomatic.
- source_word: וְאֶצָּרְךָ
  chosen: I will watch over you
  alternatives:
  - I will keep you
  - I will guard you
  - I will preserve you
  lexicon: HALOT
  rationale: נצר carries the sense of guarding, keeping, or watching over. 'Watch over you' is clear modern English and preserves the protective nuance. 'Keep you' is possible but can sound archaic or underspecified in contemporary English.
- source_word: וְאֶתֶּנְךָ
  chosen: and give you
  alternatives:
  - and appoint you
  - and make you
  lexicon: HALOT
  rationale: נתן is broadly 'give.' Here it introduces the servant's role or function. Retaining 'give you' stays close to the Hebrew while allowing the following predicates to define the role.
- source_word: לִבְרִית עָם
  chosen: as a covenant for the people
  alternatives:
  - for a covenant of the people
  - as a covenant to the people
  lexicon: HALOT
  rationale: The preposition ל with ברית here marks purpose/result. 'As a covenant for the people' is idiomatic and preserves the striking identification of the servant as covenant-mediating, without flattening it into merely 'mediator of a covenant.' 'The people' likely refers to Israel in contrast with 'the nations' in the next phrase.
- source_word: עָם
  chosen: the people
  alternatives:
  - a people
  - his people
  - the nation
  lexicon: HALOT
  rationale: Although the Hebrew lacks the article, in this poetic parallelism 'people' functions as a collective counterpart to 'nations' and is naturally rendered definitively in English. 'The people' also fits the likely reference to Israel.
- source_word: לְאוֹר גּוֹיִם
  chosen: as a light for the nations
  alternatives:
  - for a light to the nations
  - as a light to the Gentiles
  lexicon: HALOT
  rationale: אוֹר is literally 'light.' גּוֹיִם can mean nations or Gentiles; in Isaiah's broader horizon, 'nations' is the less theologically loaded and more contextually expansive rendering. 'As a light for the nations' parallels the prior phrase smoothly in English.
