theological_decisions:
- issue: Identity and function of the servant as 'a covenant for the people'
  chosen_reading: Retain the direct wording that the addressed figure is given 'as a covenant for the people' rather than interpretively expanding it to 'mediator of a covenant.'
  alternative_readings:
  - as mediator of a covenant for the people
  rationale: The Hebrew text presents the servant himself as covenantal in role/significance. Preserving this wording maintains the theological richness and allows both immediate Isaianic and christological readings without importing a narrower doctrinal interpretation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Scope contrast between 'the people' and 'the nations'
  chosen_reading: Render עָם as 'the people' and גּוֹיִם as 'the nations,' preserving the likely Israel/nations contrast.
  alternative_readings:
  - a people ... nations
  - the people ... Gentiles
  rationale: This keeps the poetic and theological contrast intact without forcing a later doctrinal scheme. 'Nations' avoids prematurely narrowing גּוֹיִם to 'Gentiles' in a way that may sound more technical than the Hebrew requires.
  doctrine_reference: Original-language primacy over translation tradition.
