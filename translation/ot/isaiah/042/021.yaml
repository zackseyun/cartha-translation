id: ISA.42.21
reference: Isaiah 42:21
source:
  edition: WLC
  text: יְהוָ֥ה חָפֵ֖ץ לְמַ֣עַן צִדְק֑/וֹ יַגְדִּ֥יל תּוֹרָ֖ה וְ/יַאְדִּֽיר׃
translation:
  text: Yahweh was pleased, for the sake of his righteousness, to make the law great and glorious.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the sake of his justice.'
    reason: alternative_reading
  - marker: b
    text: Hebrew torah; also 'instruction' or 'teaching.'
    reason: lexical_alternative
  - marker: c
    text: More formally, 'to make the law great and to make it glorious.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: חָפֵץ
  chosen: was pleased
  alternatives:
  - delighted
  - desired
  - willed
  lexicon: HALOT
  rationale: The qatal form states YHWH's favorable disposition or will. 'Was pleased' is idiomatic English and fits the prophetic summary style better than the more affective 'delighted' or the more volitional 'desired.'
- source_word: לְמַעַן
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  - in order that
  lexicon: HALOT
  rationale: לְמַעַן commonly marks purpose or motive. Here it introduces the ground/motive connected with God's righteousness, and 'for the sake of' preserves that nuance without over-specifying either pure purpose or pure causation.
- source_word: צִדְקוֹ
  chosen: his righteousness
  alternatives:
  - his justice
  - his rightness
  lexicon: HALOT
  rationale: The noun from צדק can denote righteousness or justice. 'Righteousness' is the default and best preserves the covenantal-moral sense here, while 'justice' remains a viable contextual alternative and is preserved in a footnote.
- source_word: יַגְדִּיל
  chosen: to make great
  alternatives:
  - to magnify
  - to enlarge
  - to exalt
  lexicon: HALOT
  rationale: 'The Hiphil of גדל is causative: ''make great'' or ''magnify.'' ''Make great'' is clear modern English and pairs naturally with the following object ''the law.'''
- source_word: תּוֹרָה
  chosen: the law
  alternatives:
  - instruction
  - teaching
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction broadly, but in Isaiah this often carries covenantal/legal force. 'The law' preserves the weight and recognizability of the term, while 'instruction' is preserved as a lexical alternative in a footnote.
- source_word: וְיַאְדִּיר
  chosen: and glorious
  alternatives:
  - and make it glorious
  - and honor it
  - and make it majestic
  lexicon: HALOT
  rationale: The Hiphil of אדר is causative, 'make glorious/magnificent.' In English, after 'to make the law great,' the compressed predicate 'and glorious' avoids awkward repetition while still conveying the causative result. The fuller alternative 'and make it glorious' is preserved in a footnote as a more formally explicit rendering.
