theological_decisions:
- issue: Meaning of צִדְקוֹ in relation to YHWH's action
  chosen_reading: his righteousness
  alternative_readings:
  - his justice
  rationale: The verse grounds YHWH's exaltation of the Torah in his own righteous character. Rendering with 'righteousness' preserves the broader covenantal and moral sense without narrowing it to judicial justice alone. Because the Hebrew term can include justice, that alternative is preserved in a footnote rather than resolved away.
