theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Distinguishing נְשָׁמָה and רוּחַ
  chosen_reading: breath ... spirit
  alternative_readings:
  - breath ... breath
  - life-breath ... breath
  rationale: The verse uses two related but distinct anthropological terms. Rendering them differently preserves the lexical tension rather than collapsing them into one English gloss.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
