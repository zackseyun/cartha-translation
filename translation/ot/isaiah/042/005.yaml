id: ISA.42.5
reference: Isaiah 42:5
source:
  edition: WLC
  text: כֹּֽה אָמַ֞ר הָ/אֵ֣ל יְהוָ֗ה בּוֹרֵ֤א הַ/שָּׁמַ֨יִם֙ וְ/נ֣וֹטֵי/הֶ֔ם רֹקַ֥ע הָ/אָ֖רֶץ וְ/צֶאֱצָאֶ֑י/הָ נֹתֵ֤ן נְשָׁמָה֙ לָ/עָ֣ם עָלֶ֔י/הָ וְ/ר֖וּחַ לַ/הֹלְכִ֥ים בָּֽ/הּ־׀׃
translation:
  text: 'Thus says God, Yahweh, who created the heavens and stretched them out, who spread out the earth and its offspring, who gives breath to the people on it and spirit to those who walk in it:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hammered out the earth.' The Hebrew verb can evoke the idea of beating or spreading something out.
    reason: lexical_alternative
  - marker: b
    text: Or 'its offspring' or 'its produce' for 'what comes from it.'
    reason: lexical_alternative
  - marker: c
    text: Or 'breath' for 'spirit.' The Hebrew word can mean 'spirit,' 'breath,' or 'wind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵל יְהוָה
  chosen: God, the LORD
  alternatives:
  - the God, the LORD
  - God the LORD
  lexicon: HALOT
  rationale: הָאֵל is the common noun/title 'God,' followed by the divine name יְהוָה. Per doctrine, יְהוָה is rendered 'the LORD.' The appositional English 'God, the LORD' preserves both titles naturally.
- source_word: בּוֹרֵא
  chosen: created
  alternatives:
  - creator of
  - creating
  lexicon: HALOT
  rationale: The participle functions attributively of the LORD, describing him as the one who created. English finite relative clause 'who created' is more natural than a bare participle while preserving the sense.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - the heavens/sky
  lexicon: HALOT
  rationale: In creation context, 'the heavens' best preserves the elevated cosmic sense rather than the narrower 'sky.'
- source_word: וְנֹטֵיהֶם
  chosen: stretched them out
  alternatives:
  - spread them out
  - extended them
  lexicon: HALOT
  rationale: The verb נָטָה commonly describes stretching out the heavens. 'Stretched them out' is idiomatic and keeps the creation imagery.
- source_word: רֹקַע
  chosen: spread out
  alternatives:
  - hammered out
  - beat out
  - expanding
  lexicon: HALOT
  rationale: רָקַע can carry the idea of beating/hammering out, but in English creation contexts 'spread out' communicates the spatial result without importing overly technical imagery. The stronger lexical alternative is preserved in a footnote.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Cosmic parallelism with 'the heavens' favors 'the earth' rather than 'the land.'
- source_word: וְצֶאֱצָאֶיהָ
  chosen: what comes from it
  alternatives:
  - its offspring
  - its produce
  - its vegetation
  lexicon: HALOT
  rationale: The noun denotes that which springs out from the earth. 'What comes from it' is broad enough to preserve the Hebrew's scope, which may include produce and living things, without narrowing it prematurely.
- source_word: נֹתֵן נְשָׁמָה
  chosen: gives breath
  alternatives:
  - gives life-breath
  - gives a soul
  lexicon: HALOT
  rationale: נְשָׁמָה refers to breath/life-breath, not 'soul.' 'Gives breath' is clear modern English and fits the creation motif.
- source_word: לָעָם עָלֶיהָ
  chosen: to the people on it
  alternatives:
  - to the people upon it
  - to the people on her
  lexicon: HALOT
  rationale: עָם here is collective 'people,' and עָלֶיהָ refers to the earth. 'On it' is natural English for inhabitants of the earth.
- source_word: וְרוּחַ
  chosen: and spirit
  alternatives:
  - and breath
  - and wind
  lexicon: HALOT
  rationale: רוּחַ overlaps semantically with breath/spirit/wind. Here, paired with נְשָׁמָה and applied to living walkers on the earth, 'spirit' preserves the distinction between the two Hebrew terms while retaining anthropological depth. The alternative 'breath' is worth preserving in a footnote.
- source_word: לַהֹלְכִים בָּהּ
  chosen: to those who walk in it
  alternatives:
  - to those who walk on it
  - to those who live in it
  lexicon: HALOT
  rationale: The participle is literally 'those walking,' an idiom for human inhabitants. 'Walk in it' follows the Hebrew preposition and is acceptable English, though 'on it' is also possible. Retaining 'walk' preserves the concrete imagery.
