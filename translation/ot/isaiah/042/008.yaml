theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make explicit that 'my praise' means praise owed to God
  chosen_reading: Retain the concise phrase 'my praise'
  alternative_readings:
  - the praise due to me
  rationale: The Hebrew is compact and poetic. Expanding it in the main text would add interpretation beyond what the source explicitly states. The possessive already implies exclusivity of worship without importing extra doctrinal wording.
  doctrine_reference: 'DOCTRINE.md — Translation philosophy: optimal equivalence; Never paraphrase beyond what the source text warrants.'
