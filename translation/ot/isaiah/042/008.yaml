id: ISA.42.8
reference: Isaiah 42:8
source:
  edition: WLC
  text: אֲנִ֥י יְהוָ֖ה ה֣וּא שְׁמִ֑/י וּ/כְבוֹדִ/י֙ לְ/אַחֵ֣ר לֹֽא אֶתֵּ֔ן וּ/תְהִלָּתִ֖/י לַ/פְּסִילִֽים־׃
translation:
  text: I am Yahweh; that is my name. I will not give my glory to another, nor my praise to idols.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nor my praise to carved images.' The Hebrew term refers specifically to images that are carved or fashioned, hence 'idols' by implication.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הוּא
  chosen: that is
  alternatives:
  - he is
  - it is
  lexicon: HALOT
  rationale: In the clause 'I am the LORD; he/that is my name,' the pronoun functions idiomatically to identify and emphasize the divine name. 'That is my name' is natural English and preserves the identificational force better than the more awkward 'he is my name.'
- source_word: שְׁמִי
  chosen: my name
  lexicon: HALOT
  rationale: Straightforward possessive noun; retained formally because the verse emphasizes YHWH's unique identity.
- source_word: כְבוֹדִי
  chosen: my glory
  alternatives:
  - my honor
  lexicon: HALOT
  rationale: כָּבוֹד commonly denotes glory, honor, or weightiness. 'Glory' best fits the theological context of divine uniqueness and is the most established equivalent in English Bible usage without being misleading.
- source_word: לְאַחֵר
  chosen: to another
  alternatives:
  - to another one
  - to a stranger
  lexicon: HALOT
  rationale: אַחֵר here denotes another in contrast to YHWH. 'To another' is concise and idiomatic, preserving the exclusivity claim without over-specifying the referent.
- source_word: אֶתֵּן
  chosen: I will not give
  alternatives:
  - I do not give
  lexicon: HALOT
  rationale: The imperfect here expresses YHWH's resolve or future commitment. 'I will not give' is the most natural English rendering in this declarative context.
- source_word: תְהִלָּתִי
  chosen: my praise
  alternatives:
  - the praise due to me
  - my renown
  lexicon: HALOT
  rationale: The noun denotes praise. 'My praise' is formally close and contextually means the praise belonging to or directed toward YHWH. A more interpretive expansion ('the praise due to me') is possible but unnecessary in the main text.
- source_word: לַפְּסִילִים
  chosen: to idols
  alternatives:
  - to carved images
  - to graven images
  lexicon: HALOT
  rationale: פְּסִילִים refers specifically to carved images, often idols. 'Idols' communicates the referent clearly in modern English; the more literal 'carved images' is preserved as an alternative because the physical-manufactured aspect is present in the Hebrew.
