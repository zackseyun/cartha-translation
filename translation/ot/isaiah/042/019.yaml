id: ISA.42.19
reference: Isaiah 42:19
source:
  edition: WLC
  text: מִ֤י עִוֵּר֙ כִּ֣י אִם עַבְדִּ֔/י וְ/חֵרֵ֖שׁ כְּ/מַלְאָכִ֣/י אֶשְׁלָ֑ח מִ֤י עִוֵּר֙ כִּ/מְשֻׁלָּ֔ם וְ/עִוֵּ֖ר כְּ/עֶ֥בֶד יְהוָֽה־׃
translation:
  text: Who is blind but my servant, and deaf like my messenger whom I send? Who is blind like the one who is at peace, and blind like the servant of Yahweh?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the one who is perfect/blameless'; Hebrew מְשֻׁלָּם is difficult and may carry the sense of being complete, whole, or in right relationship.
    reason: alternative_reading
lexical_decisions:
- source_word: עִוֵּר
  chosen: blind
  alternatives:
  - unseeing
  lexicon: HALOT
  rationale: Standard adjective meaning 'blind.' Repeated three times in the verse; retained consistently for rhetorical force.
- source_word: חֵרֵשׁ
  chosen: deaf
  alternatives:
  - hard of hearing
  lexicon: HALOT
  rationale: Direct antonymic pairing with 'blind' in prophetic accusation; 'deaf' is the plain and forceful rendering.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave/servant, in Isaiah's servant context 'servant' is the established and contextually appropriate rendering; the bonded-status nuance is not foregrounded here as in some NT δοῦλος contexts.
- source_word: מַלְאָכִי
  chosen: my messenger
  alternatives:
  - my angel
  lexicon: HALOT
  rationale: מלאך can mean either 'messenger' or 'angel'; here the parallel with 'my servant' and the clause 'whom I send' favors a human/commissioned-agent sense, so 'messenger' best fits the context.
- source_word: אֶשְׁלָח
  chosen: whom I send
  alternatives:
  - I send
  - whom I have sent
  lexicon: HALOT
  rationale: Rendered as a relative clause in natural English attached to 'my messenger.' The imperfect first-person singular expresses the sender's action without requiring a tense shift.
- source_word: מְשֻׁלָּם
  chosen: the one at peace with me
  alternatives:
  - the one made whole
  - the one recompensed
  - the one in covenant friendship
  lexicon: HALOT
  rationale: This passive/adjec­tival form from שלם is difficult and contextually debated. 'At peace with me' preserves the semantic field of wholeness/completion/peace and fits the irony of one who should be in right relation yet is blind. Because the term is contested, a major alternative is preserved in a footnote.
- source_word: עֶבֶד יְהוָה
  chosen: the servant of the LORD
  alternatives:
  - the slave of the LORD
  lexicon: HALOT
  rationale: Construct phrase rendered straightforwardly. Per doctrine, יְהוָה is rendered 'the LORD.' 'Servant' is retained for consistency with Isaiah's servant language.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - except
  - if not
  lexicon: HALOT
  rationale: In this rhetorical question, the idiom means 'who ... but/except ...?' 'But' gives idiomatic English while preserving the exclusivizing force.
