theological_decisions:
- issue: Identity and force of 'my servant / my messenger' in a prophetic rebuke
  chosen_reading: Retained the direct address as a rebuke of the LORD's own commissioned servant/messenger without specifying a narrower referent in translation.
  alternative_readings:
  - Israel collectively
  - the prophet
  - an idealized servant figure
  rationale: The verse itself uses covenantal/commission language but does not explicitly identify the referent beyond 'my servant' and 'my messenger.' The translation preserves that tension rather than resolving it interpretively.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Rendering of מְשֻׁלָּם
  chosen_reading: Translated as relational 'the one at peace with me' in the main text.
  alternative_readings:
  - the one who is perfect
  - the one who is requited/repaid
  rationale: The Hebrew form is lexically difficult and has generated multiple renderings. A relational rendering best fits the irony and parallelism, but alternatives are preserved in a footnote rather than being suppressed.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
