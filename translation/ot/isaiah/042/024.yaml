theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Shift from first person in 'we have sinned' to third person plural in 'they were not willing... they did not listen'
  chosen_reading: Preserve the Hebrew as written
  alternative_readings:
  - Harmonize all clauses to 'we' for smoother English
  rationale: The verse moves from communal confession ('we have sinned') to description of the people in the third person ('they were not willing... they did not listen'). This tension should be preserved rather than smoothed out, since the source text itself contains the shift.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
