id: ISA.42.24
reference: Isaiah 42:24
source:
  edition: WLC
  text: מִֽי נָתַ֨ן ל/משוסה יַעֲקֹ֛ב וְ/יִשְׂרָאֵ֥ל לְ/בֹזְזִ֖ים הֲ/ל֣וֹא יְהוָ֑ה ז֚וּ חָטָ֣אנוּ ל֔/וֹ וְ/לֹֽא אָב֤וּ בִ/דְרָכָי/ו֙ הָל֔וֹךְ וְ/לֹ֥א שָׁמְע֖וּ בְּ/תוֹרָתֽ/וֹ־־׃
translation:
  text: Who gave Jacob over to plunder, and Israel to looters? Was it not Yahweh, he against whom we have sinned? They were not willing to walk in his ways, and they did not listen to his law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to spoil/plunder' and 'to plunderers/looters'; the line pictures Jacob and Israel as handed over to be despoiled.
    reason: lexical_alternative
  - marker: b
    text: Or 'to his instruction' for 'to his law' (Hebrew torah).
    reason: lexical_alternative
lexical_decisions:
- source_word: ל/משוסה
  chosen: to plunder
  alternatives:
  - to spoil
  - to devastation
  lexicon: HALOT
  rationale: The noun מְשׁוֹסָה denotes being given over as spoil/plunder. 'To plunder' gives natural English after 'gave ... over to' while preserving the sense of being handed over for despoiling.
- source_word: לְ/בֹזְזִים
  chosen: to looters
  alternatives:
  - to plunderers
  - to spoilers
  lexicon: HALOT
  rationale: The participial form from בזז refers to those who seize spoil. 'Looters' is readable modern English and matches the hostile-agent sense.
- source_word: הֲ/לֹא יְהוָה
  chosen: Was it not the LORD
  alternatives:
  - Was it not Yahweh
  lexicon: HALOT
  rationale: The interrogative expects an affirmative answer. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: זוּ
  chosen: against whom
  alternatives:
  - he
  - the one whom
  lexicon: HALOT
  rationale: זוּ functions here as a relative particle introducing the clause about sin. In English, 'against whom' makes explicit the idiomatic force of חטא ל, 'to sin against' someone.
- source_word: חָטָאנוּ לּוֹ
  chosen: we have sinned against
  alternatives:
  - we sinned against
  - we offended
  lexicon: HALOT
  rationale: The perfect can be rendered with present relevance in English. The preposition ל with חטא is idiomatically 'sin against,' not merely 'sin to'.
- source_word: וְלֹא אָבוּ
  chosen: They were not willing
  alternatives:
  - They refused
  - They were unwilling
  lexicon: HALOT
  rationale: אבה expresses willingness/refusal. 'They were not willing' preserves the verbal nuance without overstating as a more active 'refused,' though that is a close alternative.
- source_word: בִדְרָכָיו הָלוֹךְ
  chosen: to walk in his ways
  alternatives:
  - to go in his ways
  - to live according to his ways
  lexicon: HALOT
  rationale: The infinitive with 'in his ways' is a standard Hebrew idiom for conduct. 'Walk in his ways' is both literal enough and idiomatic in English.
- source_word: בְּתוֹרָתוֹ
  chosen: to his law
  alternatives:
  - to his instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction' broadly, but in prophetic covenantal context 'law' remains a strong and recognizable rendering. The possessive is retained.
- source_word: שָׁמְעוּ
  chosen: did not listen
  alternatives:
  - did not obey
  - did not hear
  lexicon: HALOT
  rationale: שׁמע can include obedience, but the direct object with ב plus תּוֹרָה supports 'listen to' as the primary sense, leaving the implied disobedience to context rather than importing it into the gloss.
- source_word: יַעֲקֹב / יִשְׂרָאֵל
  chosen: Jacob ... Israel
  lexicon: HALOT
  rationale: The paired names are retained as in the Hebrew, preserving the poetic parallelism and covenant identity of the people.
