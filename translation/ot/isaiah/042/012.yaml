id: ISA.42.12
reference: Isaiah 42:12
source:
  edition: WLC
  text: יָשִׂ֥ימוּ לַֽ/יהוָ֖ה כָּב֑וֹד וּ/תְהִלָּת֖/וֹ בָּ/אִיִּ֥ים יַגִּֽידוּ׃
translation:
  text: Let them give glory to Yahweh, and let them declare his praise in the coastlands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in the islands''; ''coastlands'' reflects Isaiah''s frequent use of the term for distant maritime lands more broadly, not only literal islands.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Let them ascribe glory to the LORD.' The Hebrew verb is literally 'put/set,' used idiomatically here for giving or ascribing glory.
    reason: lexical_alternative
  - marker: c
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: יָשִׂימוּ
  chosen: let them give
  alternatives:
  - let them put
  - let them ascribe
  lexicon: HALOT
  rationale: The verb שׂים literally means 'put/set,' but with כָּבוֹד as its object and לַיהוָה as indirect object, idiomatic English is better expressed as 'give glory' or 'ascribe glory.' 'Give' is natural modern English and preserves the exhortative/jussive force without over-paraphrase.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object, 'to/for.' Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated, following the project's default for the divine name.
- source_word: כָּבוֹד
  chosen: glory
  alternatives:
  - honor
  lexicon: HALOT
  rationale: כָּבוֹד commonly denotes 'glory' or 'honor.' 'Glory' is the standard and strongest fit in worship context, especially paired with praise and directed to the LORD.
- source_word: וּתְהִלָּתוֹ
  chosen: and ... his praise
  alternatives:
  - and his renown
  - and his song of praise
  lexicon: HALOT
  rationale: תְּהִלָּה means 'praise'; with the 3ms suffix it is 'his praise,' that is, praise belonging or due to him. Rendering it straightforwardly preserves the parallelism with כָּבוֹד.
- source_word: בָּאִיִּים
  chosen: in the coastlands
  alternatives:
  - in the islands
  - among the coastlands
  lexicon: HALOT
  rationale: אִיִּים in Isaiah often refers broadly to distant maritime lands/coastlands, not merely literal islands. 'Coastlands' best captures the prophetic geographic sense in readable English. 'In' follows the prefixed ב preposition.
- source_word: יַגִּידוּ
  chosen: let them declare
  alternatives:
  - let them proclaim
  - let them tell
  lexicon: HALOT
  rationale: The Hiphil of נגד means 'declare, make known, tell.' 'Declare' fits the elevated poetic register and parallels the public, proclamatory sense of the verse.
