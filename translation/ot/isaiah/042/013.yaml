id: ISA.42.13
reference: Isaiah 42:13
source:
  edition: WLC
  text: יְהוָה֙ כַּ/גִּבּ֣וֹר יֵצֵ֔א כְּ/אִ֥ישׁ מִלְחָמ֖וֹת יָעִ֣יר קִנְאָ֑ה יָרִ֨יעַ֙ אַף יַצְרִ֔יחַ עַל אֹיְבָ֖י/ו יִתְגַּבָּֽר־־׃ס
translation:
  text: Yahweh goes out like a mighty warrior; like a man of war he stirs up zeal. He shouts, yes, he raises a battle cry; over his enemies he shows himself mighty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he arouses jealousy' for 'he stirs up zeal.' The Hebrew קִנְאָה can denote either zeal or jealousy, especially in covenantal contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'against his enemies he prevails.' The final clause may be rendered more dynamically to emphasize victory.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'like a man of wars'; that is, a warrior experienced in battle.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כַּגִּבּוֹר
  chosen: like a mighty warrior
  alternatives:
  - like a mighty man
  - like a hero
  lexicon: HALOT
  rationale: גִּבּוֹר denotes a strong man, warrior, or hero. In this martial context, 'mighty warrior' best captures the military force of the simile in natural English.
- source_word: יֵצֵא
  chosen: goes out
  alternatives:
  - comes forth
  - marches out
  lexicon: HALOT
  rationale: The verb literally means 'go out.' 'Goes out' preserves the Hebrew image while remaining idiomatic; 'marches out' would add military specificity not explicit in the verb itself.
- source_word: כְּאִישׁ מִלְחָמוֹת
  chosen: like a man of wars
  alternatives:
  - like a warrior
  - like a man of battle
  lexicon: HALOT
  rationale: The phrase is literally 'like a man of wars.' Retaining 'man' reflects the Hebrew wording and preserves the parallelism with גִּבּוֹר, while 'of wars' keeps the plural nuance better than flattening to singular 'battle.'
- source_word: יָעִיר קִנְאָה
  chosen: he stirs up zeal
  alternatives:
  - he arouses jealousy
  - he rouses ardor
  lexicon: HALOT
  rationale: קִנְאָה can denote zeal or jealousy. In reference to the LORD in a warfare/judgment setting, 'zeal' best conveys intense, active divine ardor without importing the narrower English sense of petty jealousy.
- source_word: יָרִיעַ
  chosen: He shouts
  alternatives:
  - he raises a shout
  - he gives a war cry
  lexicon: HALOT
  rationale: The verb denotes raising a cry or shout. 'He shouts' is concise and natural, while the following verb supplies the more explicit battle-cry nuance.
- source_word: אַף
  chosen: 'yes'
  alternatives:
  - indeed
  - even
  lexicon: HALOT
  rationale: Here אַף functions as an intensifier linking the two verbs. 'Yes' gives a natural emphatic progression in English without sounding overly formal.
- source_word: יַצְרִיחַ
  chosen: he raises a battle cry
  alternatives:
  - he cries aloud
  - he shrieks
  lexicon: HALOT
  rationale: The verb means to cry out loudly. In this military context, 'raises a battle cry' makes explicit the martial force implied by the surrounding imagery and avoids the misleading connotation of 'shriek.'
- source_word: עַל אֹיְבָיו
  chosen: over his enemies
  alternatives:
  - against his enemies
  lexicon: HALOT
  rationale: עַל can mean 'against' or 'over.' With the following reflexive verb of prevailing, 'over his enemies' best fits the sense of triumph rather than merely opposition.
- source_word: יִתְגַּבָּר
  chosen: he shows himself mighty
  alternatives:
  - he prevails
  - he proves himself strong
  lexicon: HALOT
  rationale: The hitpael of גבר conveys showing oneself strong or prevailing. 'Shows himself mighty' preserves the reflexive nuance and echoes the earlier גִּבּוֹר, strengthening the verse's internal wordplay.
