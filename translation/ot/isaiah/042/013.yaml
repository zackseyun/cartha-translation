theological_decisions:
- issue: Rendering divine martial imagery without softening it
  chosen_reading: Retain strong warfare language for the LORD
  alternative_readings:
  - Soften to more general strength imagery
  rationale: 'The Hebrew explicitly portrays the LORD in warrior imagery: mighty warrior, man of wars, shouting, battle cry, and prevailing over enemies. The translation preserves this imagery rather than diluting it, while avoiding embellishment beyond the text.'
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering קִנְאָה for God
  chosen_reading: zeal
  alternative_readings:
  - jealousy
  rationale: Because English 'jealousy' can suggest sinful envy, 'zeal' better communicates covenantal ardor in this context while preserving the intensity of the Hebrew. The alternative remains lexically possible.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Gender-accurate rendering of אִישׁ
  chosen_reading: man of wars
  alternative_readings:
  - warrior
  rationale: The Hebrew uses the masculine noun אִישׁ. Per doctrine, gender-accurate rendering is preferred where it matches source intent. Here 'man of wars' preserves the Hebrew form and poetic parallelism, though 'warrior' is a viable smoothing alternative.
  doctrine_reference: Translation philosophy §4
