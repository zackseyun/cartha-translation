id: ISA.18.3
reference: Isaiah 18:3
source:
  edition: WLC
  text: כָּל יֹשְׁבֵ֥י תֵבֵ֖ל וְ/שֹׁ֣כְנֵי אָ֑רֶץ כִּ/נְשֹׂא נֵ֤ס הָרִים֙ תִּרְא֔וּ
    וְ/כִ/תְקֹ֥עַ שׁוֹפָ֖ר תִּשְׁמָֽעוּ־־׃ס
translation:
  text: 'All you inhabitants of the world, and you dwellers on the earth: when a banner
    is raised on the mountains, you will see it; and when a trumpet is blown, you
    will hear it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'signal' or 'standard' for 'banner' (Hebrew נֵס), a raised sign visible
      from afar.
    reason: lexical_alternative
  - marker: b
    text: Or 'horn' or 'ram's horn' for 'trumpet' (Hebrew שׁוֹפָר).
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: Introduces the universal address. 'All' is the most natural English equivalent
    here and fits the collective summons.
- source_word: יֹשְׁבֵי תֵבֵל
  chosen: inhabitants of the world
  alternatives:
  - those who dwell in the world
  lexicon: HALOT
  rationale: The construct phrase denotes those living in the inhabited world. 'World'
    for תֵבֵל preserves the broad, universal scope better than a narrower regional
    sense.
- source_word: וְשֹׁכְנֵי אָרֶץ
  chosen: and you dwellers on the earth
  alternatives:
  - and inhabitants of the earth
  - and those who dwell on the earth
  lexicon: HALOT
  rationale: This second phrase is near-synonymous and heightens the global summons
    by parallelism. 'Dwellers on the earth' preserves the poetic variation rather
    than collapsing both phrases into identical English.
- source_word: כִּנְשֹׂא
  chosen: when a banner is raised
  alternatives:
  - as a banner is lifted up
  - when one lifts a signal
  lexicon: HALOT
  rationale: The prefixed כִּי here is temporal in context, introducing the circumstance
    under which the audience is to respond. The infinitive construct of נשׂא with
    נֵס is naturally rendered with a passive English expression, since the actor is
    unspecified.
- source_word: נֵס
  chosen: banner
  alternatives:
  - signal
  - standard
  lexicon: HALOT
  rationale: נֵס refers to a raised signal visible from afar. 'Banner' is readable
    modern English and preserves the military/public-sign sense; 'signal' and 'standard'
    are viable but less idiomatic here.
- source_word: הָרִים
  chosen: on the mountains
  alternatives:
  - upon the mountains
  - in the mountains
  lexicon: HALOT
  rationale: The plural 'mountains' is retained formally; the raised banner is positioned
    for visibility.
- source_word: תִּרְאוּ
  chosen: you will see it
  alternatives:
  - you will look
  - you will see
  lexicon: HALOT
  rationale: Second person plural matches the addressed audience. English supplies
    'it' for the object implied by the context, namely the raised banner.
- source_word: וְכִתְקֹעַ שׁוֹפָר
  chosen: and when a trumpet is blown
  alternatives:
  - and when a horn is blown
  - and at the blowing of a ram's horn
  lexicon: HALOT
  rationale: The parallel temporal clause mirrors the previous one. שׁוֹפָר is literally
    a horn, often a ram's horn, but 'trumpet' is the clearest idiomatic English in
    this signaling context; the more specific alternatives are preserved in a footnote.
- source_word: תִּשְׁמָעוּ
  chosen: you will hear it
  alternatives:
  - you will hear
  - you will listen
  lexicon: HALOT
  rationale: Second person plural continues the direct address. English again supplies
    'it' for the sounded signal, making the sentence natural without altering the
    sense.
