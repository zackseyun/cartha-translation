id: ISA.18.1
reference: Isaiah 18:1
source:
  edition: WLC
  text: ה֥וֹי אֶ֖רֶץ צִלְצַ֣ל כְּנָפָ֑יִם אֲשֶׁ֥ר מֵ/עֵ֖בֶר לְ/נַֽהֲרֵי כֽוּשׁ־׃
translation:
  text: Ah, land of whirring wings, which is beyond the rivers of Cush,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Woe, land of buzzing wings' or 'Ah, land of rustling wings.' The Hebrew
      expression is difficult and may evoke the sound of wings, insects, or something
      wing-like in motion.
    reason: lexical_alternative
  - marker: b
    text: Cush refers to the region south of Egypt, often associated with Nubia or
      ancient Ethiopia.
    reason: cultural_note
lexical_decisions:
- source_word: הוֹי
  chosen: Ah
  alternatives:
  - Woe
  - Alas
  lexicon: HALOT
  rationale: הוֹי is an interjection that can introduce lament, threat, or summons.
    In this context the verse opens an oracle addressing a distant land, and the tone
    is not yet explicitly condemnatory; 'Ah' preserves the exclamatory force without
    overcommitting to 'Woe.'
- source_word: אֶרֶץ
  chosen: land
  alternatives:
  - earth
  - country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to a geographical region rather than the whole earth.
    'Land' is the most natural and sufficiently broad rendering.
- source_word: צִלְצַל
  chosen: whirring
  alternatives:
  - buzzing
  - clashing
  - rustling
  lexicon: HALOT
  rationale: The noun suggests a ringing, buzzing, or whirring sound. Because it modifies
    'wings,' 'whirring' best captures the audible motion without forcing a specific
    image such as insects or weaponry.
- source_word: כְּנָפָיִם
  chosen: wings
  alternatives:
  - winged things
  lexicon: HALOT
  rationale: The dual/plural form literally means 'wings.' The phrase צִלְצַל כְּנָפָיִם
    is idiomatic and difficult, but 'whirring wings' preserves the concrete imagery
    of the Hebrew.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: A relative particle introducing the description of the land. 'Which'
    fits smooth modern English after a comma.
- source_word: מֵעֵבֶר
  chosen: beyond
  alternatives:
  - from beyond
  - on the far side of
  lexicon: HALOT
  rationale: The preposition with עֵבֶר denotes location on the other side. 'Beyond'
    is concise and idiomatic in English.
- source_word: לְנַהֲרֵי
  chosen: the rivers of
  alternatives:
  - the streams of
  lexicon: HALOT
  rationale: נָהָר normally denotes a river. The prefixed ל is part of the fixed expression
    with מֵעֵבֶר ('beyond/to the other side of'), so idiomatic English is simply 'beyond
    the rivers of.'
- source_word: כּוּשׁ
  chosen: Cush
  alternatives:
  - Ethiopia
  - Nubia
  lexicon: HALOT
  rationale: Per translation philosophy, personal and place names are transliterated
    rather than replaced with potentially interpretive modern equivalents. 'Cush'
    preserves the Hebrew toponym; 'Ethiopia' is a traditional but potentially misleading
    modernization.
