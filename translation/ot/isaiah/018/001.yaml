theological_decisions:
- issue: Identification of כּוּשׁ
  chosen_reading: Render as the place name 'Cush' without specifying a modern nation-state.
  alternative_readings:
  - Ethiopia
  - Nubia
  rationale: The verse names a historical region known from the Hebrew Bible. Transliteration
    avoids importing a precise modern geopolitical identification not stated by the
    text.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names.'
