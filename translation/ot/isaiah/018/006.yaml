id: ISA.18.6
reference: Isaiah 18:6
source:
  edition: WLC
  text: יֵעָזְב֤וּ יַחְדָּו֙ לְ/עֵ֣יט הָרִ֔ים וּֽ/לְ/בֶהֱמַ֖ת הָ/אָ֑רֶץ וְ/קָ֤ץ עָלָי/ו֙
    הָ/עַ֔יִט וְ/כָל בֶּהֱמַ֥ת הָ/אָ֖רֶץ עָלָ֥י/ו תֶּחֱרָֽף־׃
translation:
  text: They will all be left to the birds of prey of the mountains and to the beasts
    of the earth; and the birds of prey will summer on them, and every beast of the
    earth will winter on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''together'': ''They will be left together to the birds of prey of the
      mountains and to the beasts of the earth.'''
    reason: lexical_alternative
  - marker: b
    text: Hebrew uses singular nouns ('bird of prey,' 'upon him') with collective
      force; the translation renders them as plurals in English for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵעָזְבוּ
  chosen: will be left
  alternatives:
  - will be abandoned
  - they will leave
  lexicon: HALOT
  rationale: 'Niphal imperfect of עזב is best taken as passive/reflexive here: the
    slain are left exposed. ''Will be left'' is natural English and fits the context
    of corpses abandoned to scavengers.'
- source_word: יַחְדָּו
  chosen: all
  alternatives:
  - together
  - altogether
  lexicon: HALOT
  rationale: The adverb literally means 'together,' but in English 'they will all
    be left' better conveys the collective force in context than a wooden 'left together.'
- source_word: לְעֵיט
  chosen: to the birds of prey
  alternatives:
  - to the carrion birds
  - to the ravenous bird
  lexicon: HALOT
  rationale: עַיִט denotes a bird of prey/scavenging bird. Because the following clause
    uses the singular with collective force, rendering both occurrences as 'birds
    of prey' preserves the species/class sense in idiomatic English.
- source_word: הָרִים
  chosen: of the mountains
  alternatives:
  - of the hills
  lexicon: HALOT
  rationale: The plural noun normally means 'mountains.' 'Of the mountains' keeps
    the geographic imagery of highland scavengers.
- source_word: וּלְבֶהֱמַת הָאָרֶץ
  chosen: and to the beasts of the earth
  alternatives:
  - and to the animals of the land
  - and to the wild animals of the earth
  lexicon: HALOT
  rationale: בְּהֵמָה/בֶּהֱמַת can denote beasts/animals broadly. 'Beasts of the earth'
    is a clear, dignified rendering that matches the predatory/scavenging context.
- source_word: וְקָץ
  chosen: will summer
  alternatives:
  - will spend the summer
  - will feed through the summer
  lexicon: HALOT
  rationale: The verb קוץ here refers to passing the summer. 'Will summer' is concise,
    preserves the seasonal image, and is understandable in modern English.
- source_word: הָעַיִט
  chosen: the birds of prey
  alternatives:
  - the bird of prey
  - the carrion birds
  lexicon: HALOT
  rationale: Though singular in form, the noun functions collectively. English plural
    better communicates the collective sense and aligns with the first colon.
- source_word: תֶּחֱרָף
  chosen: will winter
  alternatives:
  - will spend the winter
  - will remain through the winter
  lexicon: HALOT
  rationale: From חרף in this context, the sense is to pass the winter. 'Will winter'
    preserves the parallelism with 'will summer' and the stark image of prolonged
    exposure.
- source_word: עָלָיו
  chosen: on them
  alternatives:
  - upon him
  - over them
  lexicon: HALOT
  rationale: The singular pronominal suffix likely refers collectively to the abandoned
    slain or heap of corpses. English plural 'them' makes the collective reference
    clear.
