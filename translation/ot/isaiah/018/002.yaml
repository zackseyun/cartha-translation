id: ISA.18.2
reference: Isaiah 18:2
source:
  edition: WLC
  text: הַ/שֹּׁלֵ֨חַ בַּ/יָּ֜ם צִירִ֗ים וּ/בִ/כְלֵי גֹמֶא֮ עַל פְּנֵי מַיִם֒ לְכ֣וּ
    מַלְאָכִ֣ים קַלִּ֗ים אֶל גּוֹי֙ מְמֻשָּׁ֣ךְ וּ/מוֹרָ֔ט אֶל עַ֥ם נוֹרָ֖א מִן ה֣וּא
    וָ/הָ֑לְאָה גּ֚וֹי קַו קָ֣ו וּ/מְבוּסָ֔ה אֲשֶׁר בָּזְא֥וּ נְהָרִ֖ים אַרְצֽ/וֹ־־־׀־־־־־׃
translation:
  text: 'sending envoys by sea, even in papyrus vessels over the surface of the waters:
    Go, swift messengers, to a nation tall and smooth-skinned, to a people feared
    far and wide, a nation mighty and trampling down, whose land the rivers divide.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "and in boats of reeds/papyrus."
    reason: lexical_alternative
  - marker: b
    text: Hebrew "a nation stretched out and polished"; the phrase likely describes
      physical appearance.
    reason: lexical_alternative
  - marker: c
    text: Hebrew "a nation of line upon line" or similar; the expression is obscure.
    reason: lexical_alternative
  - marker: d
    text: Or "whose land rivers plunder/spoil."
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֹּׁלֵחַ
  chosen: sending
  alternatives:
  - that sends
  - who sends
  lexicon: HALOT
  rationale: Rendered as a participial descriptor continuing the address from v.1.
    English participle 'sending' fits the Hebrew article + participle construction
    in context better than a finite clause.
- source_word: צִירִים
  chosen: envoys
  alternatives:
  - messengers
  - ambassadors
  lexicon: HALOT
  rationale: The term commonly denotes diplomatic messengers or envoys, especially
    in international contexts. 'Envoys' captures the political sense better than the
    more generic 'messengers' in the first colon.
- source_word: בַּיָּם
  chosen: by sea
  alternatives:
  - on the sea
  - into the sea
  lexicon: HALOT
  rationale: Idiomatic English for travel by water. The preposition with 'sea' here
    indicates the route or medium of sending.
- source_word: וּבִכְלֵי גֹמֶא
  chosen: even in papyrus vessels
  alternatives:
  - and in vessels of papyrus
  - and in boats of reeds
  lexicon: HALOT
  rationale: גֹמֶא refers to papyrus/reed material, and כְלֵי here denotes crafted
    containers or vessels, likely boats. 'Papyrus vessels' preserves the material
    image while remaining natural English; the footnote preserves 'boats of reeds'
    as a more explicit alternative.
- source_word: עַל פְּנֵי מַיִם
  chosen: over the surface of the waters
  alternatives:
  - on the face of the waters
  - upon the waters
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom. 'Over the surface of the waters' is
    clear modern English while preserving the imagery.
- source_word: לְכוּ
  chosen: Go
  alternatives:
  - Depart
  - Proceed
  lexicon: HALOT
  rationale: Straightforward imperative plural addressed to the messengers.
- source_word: מַלְאָכִים קַלִּים
  chosen: swift messengers
  alternatives:
  - speedy messengers
  - light messengers
  lexicon: HALOT
  rationale: קַלִּים here denotes speed or swiftness, not lightness in weight. 'Swift
    messengers' is natural and precise.
- source_word: גּוֹי מְמֻשָּׁךְ וּמוֹרָט
  chosen: a nation tall and smooth-skinned
  alternatives:
  - a nation stretched out and polished
  - a nation drawn out and shaven
  lexicon: HALOT
  rationale: This difficult phrase likely describes the physical appearance of the
    people, traditionally identified with Cushites. 'Tall and smooth-skinned' reflects
    a common contextual understanding of מְמֻשָּׁךְ ('drawn out, extended') and מוֹרָט
    ('polished, smooth'), avoiding archaic 'terrible' style renderings while preserving
    the descriptive force.
- source_word: עַם נוֹרָא מִן הוּא וָהָלְאָה
  chosen: a people feared far and wide
  alternatives:
  - a people feared from here onward
  - a people awesome beyond all others
  lexicon: HALOT
  rationale: The phrase is idiomatic and difficult. The sense is of a people inspiring
    fear over a broad extent or over time. 'Feared far and wide' communicates the
    scope naturally without overcommitting to a single technical nuance.
- source_word: גּוֹי קַו קָו
  chosen: a nation mighty
  alternatives:
  - a nation of command upon command
  - a nation of line upon line
  - a nation of strength
  lexicon: HALOT
  rationale: The expression is notoriously obscure. In this context many understand
    it as denoting power, order, or measured domination. 'Mighty' gives a coherent
    sense in parallel with the following term while avoiding a wooden rendering that
    would be opaque in English; the more literal alternative is preserved in a footnote.
- source_word: וּמְבוּסָה
  chosen: and trampling down
  alternatives:
  - and trodden down
  - and subduing
  lexicon: HALOT
  rationale: From a root associated with trampling. In context it more likely describes
    the nation's action or character than its victimization, so 'trampling down' fits
    the sequence of descriptors.
- source_word: אֲשֶׁר בָּזְאוּ נְהָרִים אַרְצוֹ
  chosen: whose land the rivers divide
  alternatives:
  - whose land rivers plunder
  - whose land rivers spoil
  lexicon: HALOT
  rationale: The verb is difficult here. Given the Cush/Egyptian setting and the Nile
    tributaries, many understand the sense as rivers cutting through or dividing the
    land. This yields a coherent geographical description; the more literal 'plunder/spoil'
    is preserved in a footnote because it remains a viable lexical possibility.
