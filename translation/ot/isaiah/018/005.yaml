id: ISA.18.5
reference: Isaiah 18:5
source:
  edition: WLC
  text: כִּֽי לִ/פְנֵ֤י קָצִיר֙ כְּ/תָם פֶּ֔רַח וּ/בֹ֥סֶר גֹּמֵ֖ל יִֽהְיֶ֣ה נִצָּ֑ה
    וְ/כָרַ֤ת הַ/זַּלְזַלִּים֙ בַּ/מַּזְמֵר֔וֹת וְ/אֶת הַ/נְּטִישׁ֖וֹת הֵסִ֥יר הֵתַֽז־־־׃
translation:
  text: For before the harvest, when the blossom is finished and the flower becomes
    a ripening grape, he will cut off the shoots with pruning knives, and he will
    remove and lop off the spreading branches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when the blossom is complete, and the flower becomes an unripe grape.'
      The Hebrew imagery moves from blossom to developing fruit before harvest.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew terms for the vine growth here are rare and may also be rendered
      'sprigs,' 'tendrils,' or 'trailing branches.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation of the preceding imagery; 'For' fits the causal/explanatory
    force in context.
- source_word: לִפְנֵי קָצִיר
  chosen: before the harvest
  alternatives:
  - before harvest
  lexicon: HALOT
  rationale: Straightforward temporal phrase; the article is not required in English,
    but 'the harvest' reads naturally and preserves the specific agricultural scene.
- source_word: כְּתָם פֶּרַח
  chosen: when the blossom is finished
  alternatives:
  - as the blossom comes to an end
  - when the flowering is complete
  lexicon: HALOT
  rationale: The infinitive/verb from תם with 'blossom' indicates the blossom stage
    reaching completion. 'Finished' is idiomatic and preserves the temporal progression.
- source_word: וּבֹסֶר גֹּמֵל יִהְיֶה נִצָּה
  chosen: and the flower becomes a ripening grape
  alternatives:
  - and the blossom becomes a ripening grape
  - and the sour grape ripens from the flower
  lexicon: HALOT
  rationale: בֹסֶר denotes an unripe grape; גֹּמֵל conveys developing/ripening; נִצָּה
    refers to blossom/flower. The clause describes transition from blossom to developing
    grape. 'Flower becomes a ripening grape' communicates the agricultural image clearly
    in modern English.
- source_word: וְכָרַת
  chosen: he will cut off
  alternatives:
  - then he cuts off
  - and he cut off
  lexicon: HALOT
  rationale: Prophetic perfect after temporal setup is well rendered as future in
    English because it describes what will happen in the envisioned scene.
- source_word: הַזַּלְזַלִּים
  chosen: the shoots
  alternatives:
  - the sprigs
  - the tendrils
  - the branches
  lexicon: HALOT
  rationale: The noun refers to luxuriant shoots/twigs of the vine. 'Shoots' best
    matches the viticultural context and avoids overgeneralizing to larger branches.
- source_word: בַּמַּזְמֵרוֹת
  chosen: with pruning knives
  alternatives:
  - with pruning hooks
  - with pruning shears
  lexicon: HALOT
  rationale: The instrument is a pruning implement used on vines. 'Pruning knives'
    is a standard, concrete rendering; 'shears' risks anachronistic specificity.
- source_word: הַנְּטִישׁוֹת
  chosen: the spreading branches
  alternatives:
  - the tendrils
  - the trailing branches
  - the shoots left hanging
  lexicon: HALOT
  rationale: A rare term likely denoting extended or spreading vine growth. 'Spreading
    branches' captures the sense without overclaiming precision.
- source_word: הֵסִיר הֵתַז
  chosen: he will remove and lop off
  alternatives:
  - he will take away and cut down
  - he will remove and strip away
  lexicon: HALOT
  rationale: 'The paired verbs intensify the action: first removal, then cutting/stripping
    away. Rendering both preserves the Hebrew''s emphatic two-step pruning image.'
