id: ISA.18.4
reference: Isaiah 18:4
source:
  edition: WLC
  text: כִּי֩ כֹ֨ה אָמַ֤ר יְהוָה֙ אֵלַ֔/י אשקוטה וְ/אַבִּ֣יטָה בִ/מְכוֹנִ֑/י כְּ/חֹ֥ם צַח֙ עֲלֵי א֔וֹר כְּ/עָ֥ב טַ֖ל בְּ/חֹ֥ם קָצִֽיר־׃
translation:
  text: 'For this is what Yahweh said to me: “I will remain quiet and look on from my dwelling place, like clear heat in sunshine, like a cloud of dew in the heat of harvest.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I will be still and watch from my fixed place.”
    reason: lexical_alternative
  - marker: b
    text: Literally “like clear heat upon light.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name in traditional small-caps English form rather than transliteration.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - concerning me
  lexicon: HALOT
  rationale: The preposition אֶל with 1cs suffix most naturally means 'to me' after 'said.' Some translations smooth the phrase away, but the Hebrew explicitly includes the indirect object.
- source_word: אשקוטה
  chosen: I will remain quiet
  alternatives:
  - I will be still
  - I will rest
  lexicon: HALOT
  rationale: From שׁקט, conveying quietness or undisturbed stillness. 'Remain quiet' captures deliberate non-intervention in context better than 'rest,' while staying close to the Hebrew.
- source_word: וְאַבִּיטָה
  chosen: and look on
  alternatives:
  - and watch
  - and gaze
  lexicon: HALOT
  rationale: From נבט, 'to look, regard.' 'Look on' fits the sense of observant watching from a distance and pairs naturally with the preceding divine stillness.
- source_word: במכוני
  chosen: from my dwelling place
  alternatives:
  - from my fixed place
  - from my resting place
  - in my dwelling place
  lexicon: HALOT
  rationale: מָכוֹן denotes an established place, often a dwelling or fixed habitation. Because the verbs imply divine observation from that location, 'from my dwelling place' is idiomatic and contextually clear. The preposition ב can be rendered more dynamically here as the vantage point from which he watches.
- source_word: כחם צח
  chosen: like clear heat
  alternatives:
  - like glowing heat
  - like bright heat
  lexicon: HALOT
  rationale: חֹם is 'heat'; צַח conveys brightness/clearness. 'Clear heat' preserves the unusual image without overinterpreting it.
- source_word: עלי אור
  chosen: in sunshine
  alternatives:
  - upon light
  - under bright light
  lexicon: HALOT
  rationale: Literally 'upon light.' In English the idiomatic sense is heat associated with bright sunlight; 'in sunshine' communicates the image naturally while preserving the meteorological comparison.
- source_word: כעב טל
  chosen: like a cloud of dew
  alternatives:
  - like a dew-cloud
  - like a mist of dew
  lexicon: HALOT
  rationale: עָב is 'cloud' and טַל is 'dew.' 'Cloud of dew' is the most transparent rendering, preserving the concrete imagery.
- source_word: בחם קציר
  chosen: in the heat of harvest
  alternatives:
  - in harvest heat
  - in the heat at harvest
  lexicon: HALOT
  rationale: The phrase is temporal/circumstantial. 'In the heat of harvest' is natural English and keeps the agricultural setting explicit.
