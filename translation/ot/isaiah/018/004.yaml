theological_decisions:
- issue: Divine posture of stillness and observation
  chosen_reading: Render the verbs straightforwardly as the LORD's deliberate quietness and watching, without importing either indifference or immediate judgment into the wording.
  alternative_readings:
  - Interpret as 'I will rest' emphasizing calm repose
  - Interpret as covert preparation for judgment
  rationale: The verse presents YHWH as still and observant by means of similes from nature. The translation preserves that tension rather than resolving the imagery into a doctrinal paraphrase.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
