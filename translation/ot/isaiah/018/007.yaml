theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's doctrinal default for YHWH and aligns with longstanding reverential convention while remaining transparent in English.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of the ethnographic descriptors in the verse
  chosen_reading: The people described are rendered descriptively without identifying them beyond the text itself.
  alternative_readings:
  - Specific identification with Cush/Ethiopia is inferred from context but not inserted into the verse
  rationale: The verse itself uses descriptive appositions rather than naming the people here; the translation preserves the text's wording and avoids importing a historical identification into the main line.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
