id: ISA.18.7
reference: Isaiah 18:7
source:
  edition: WLC
  text: בָּ/עֵת֩ הַ/הִ֨יא יֽוּבַל שַׁ֜י לַ/יהוָ֣ה צְבָא֗וֹת עַ֚ם מְמֻשָּׁ֣ךְ וּ/מוֹרָ֔ט וּ/מֵ/עַ֥ם נוֹרָ֖א מִן ה֣וּא וָ/הָ֑לְאָה גּ֣וֹי קַו קָ֣ו וּ/מְבוּסָ֗ה אֲשֶׁ֨ר בָּזְא֤וּ נְהָרִים֙ אַרְצ֔/וֹ אֶל מְק֛וֹם שֵׁם יְהוָ֥ה צְבָא֖וֹת הַר צִיּֽוֹן־־׀־־־־׃ס
translation:
  text: At that time tribute will be brought to Yahweh of Armies from a people tall and smooth-skinned, from a people feared far and wide, a nation of command upon command and trampling, whose land rivers divide, to the place of the name of Yahweh of Armies, Mount Zion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tribute' for 'gift.' The Hebrew term can denote a present offered to an honored ruler.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'line upon line' or 'measuring line upon measuring line'; the phrase is difficult and may refer to repeated measuring, command, or domination.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֽוּבַל
  chosen: will be brought
  alternatives:
  - will be led
  - will be carried
  lexicon: HALOT
  rationale: Hophal of יבל denotes being brought/carried along. With שַׁי ('gift/tribute') as subject, idiomatic English is 'a gift will be brought' rather than the more wooden 'will be led.'
- source_word: שַׁי
  chosen: gift
  alternatives:
  - tribute
  - present
  lexicon: HALOT
  rationale: The noun can denote a gift or tribute presented to a superior. 'Gift' is the broadest natural rendering in English; the context of presentation to the LORD retains the honorific sense. 'Tribute' is possible and preserved in a footnote because the political nuance may be intended.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than transliterated; 'Armies' is more transparent to modern readers than traditional 'Hosts' while preserving the martial/cosmic force of the title.
- source_word: עַם
  chosen: people
  alternatives:
  - nation
  lexicon: HALOT
  rationale: עַם commonly means 'people.' Here it introduces the descriptive apposition of the group bringing the gift.
- source_word: מְמֻשָּׁךְ
  chosen: tall
  alternatives:
  - drawn out
  - stretched out
  lexicon: HALOT
  rationale: The passive participle literally suggests something drawn out or extended. In this ethnographic context, many interpreters understand it as describing physical stature; 'tall' communicates the likely sense in readable English.
- source_word: מוֹרָט
  chosen: smooth-skinned
  alternatives:
  - polished
  - shaven
  lexicon: HALOT
  rationale: The term is rare and likely describes a smooth or hairless appearance. 'Smooth-skinned' is clearer in contemporary English than 'polished' and less interpretively narrow than 'shaven.'
- source_word: נוֹרָא
  chosen: feared
  alternatives:
  - awesome
  - dreaded
  lexicon: HALOT
  rationale: In context of a people among nations, the sense is that they inspire fear or dread. 'Feared' fits the political-ethnographic description better than the modern religiously softened 'awesome.'
- source_word: מִן הוּא וָהָלְאָה
  chosen: far and wide
  alternatives:
  - from then onward
  - beyond it
  lexicon: HALOT
  rationale: This idiom is difficult. In context it likely means the people are feared over a wide extent, often rendered 'from there onward' or 'far beyond.' 'Far and wide' captures the distributive scope in natural English without overcommitting to a spatially technical reading.
- source_word: גּוֹי
  chosen: nation
  alternatives:
  - people
  lexicon: HALOT
  rationale: Using 'nation' here provides a useful distinction from the preceding עַם while preserving the collective-political sense.
- source_word: קַו קָו
  chosen: command upon command
  alternatives:
  - line by line
  - measuring line upon measuring line
  lexicon: HALOT
  rationale: The phrase is notoriously difficult. While קו can mean 'line' or 'measuring line,' in this context many understand a figurative sense of imposed order or domination. 'Command upon command' conveys a repeated, forceful structuring and avoids a misleadingly concrete image. The more literal alternative is preserved in a footnote.
- source_word: מְבוּסָה
  chosen: trampling
  alternatives:
  - treading down
  - subjugation
  lexicon: HALOT
  rationale: The noun derives from trampling/treading down. 'Trampling' is concise and vivid, matching the compressed descriptive style of the verse.
- source_word: בָּזְאוּ
  chosen: divide
  alternatives:
  - spoil
  - plunder
  lexicon: HALOT
  rationale: Though the verb elsewhere often means 'plunder/despoil,' with 'rivers' as subject and 'land' as object the sense is that the rivers cut up or divide the land. 'Divide' best fits the immediate syntax and geography.
- source_word: מְקוֹם שֵׁם יְהוָה צְבָאוֹת
  chosen: the place of the name of the LORD of Armies
  alternatives:
  - the place where the LORD of Armies has set his name
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the Hebrew genitival construction and its theological resonance with the sanctuary as the place associated with God's name.
- source_word: הַר צִיּוֹן
  chosen: Mount Zion
  alternatives:
  - the mountain of Zion
  lexicon: HALOT
  rationale: Standard English proper-name rendering.
