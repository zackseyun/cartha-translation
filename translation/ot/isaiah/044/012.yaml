theological_decisions:
- issue: Portrayal of idol manufacture in prophetic satire
  chosen_reading: Render the verse concretely as a description of the smith's exhausting
    labor, without importing interpretive commentary into the main text.
  alternative_readings:
  - A more interpretive rendering emphasizing the futility of idolatry in the main
    text
  rationale: The broader context mocks idol-making, but this verse itself describes
    the craftsman's labor and weakness. The translation preserves the concrete imagery
    and lets the theological force arise from context rather than added wording.
  doctrine_reference: Translation philosophy §§1, 3, 6
