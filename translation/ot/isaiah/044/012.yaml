id: ISA.44.12
reference: Isaiah 44:12
source:
  edition: WLC
  text: חָרַ֤שׁ בַּרְזֶל֙ מַֽעֲצָ֔ד וּ/פָעַל֙ בַּ/פֶּחָ֔ם וּ/בַ/מַּקָּב֖וֹת יִצְּרֵ֑/הוּ
    וַ/יִּפְעָלֵ֨/הוּ֙ בִּ/זְר֣וֹעַ כֹּח֔/וֹ גַּם רָעֵב֙ וְ/אֵ֣ין כֹּ֔חַ לֹא שָׁ֥תָה
    מַ֖יִם וַ/יִּיעָֽף־־׃
translation:
  text: The ironsmith works with a cutting tool and works over the coals; with hammers
    he shapes it and works it with his strong arm. He also becomes hungry, and there
    is no strength; he has not drunk water, and he grows faint.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an adze,' 'a graving tool,' or 'a chisel' for the specific implement
      named here.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָרַשׁ בַּרְזֶל
  chosen: The ironsmith
  alternatives:
  - The smith
  - The metalworker
  - The craftsman in iron
  lexicon: HALOT
  rationale: The construct-like sequence is best taken as a worker characterized by
    iron, i.e., an ironsmith/blacksmith. 'Ironsmith' is specific and natural in English,
    matching the idol-making context.
- source_word: מַעֲצָד
  chosen: a cutting tool
  alternatives:
  - an adze
  - a graving tool
  - a chisel
  lexicon: HALOT
  rationale: The noun denotes a tool used in shaping material. Because the exact implement
    is uncertain in context, 'cutting tool' preserves the sense without overcommitting
    to a specific modern tool name. A more specific alternative is preserved in a
    footnote.
- source_word: וּפָעַל
  chosen: works
  alternatives:
  - does his work
  - labors
  - makes
  lexicon: HALOT
  rationale: The verb is a general term for doing or working. 'Works' keeps the repetitive
    labor emphasis of the verse and matches the parallel later use of the same root.
- source_word: בַּפֶּחָם
  chosen: over the coals
  alternatives:
  - with charcoal
  - in the fire
  lexicon: HALOT
  rationale: The term refers to charcoal/coals used in metalworking. 'Over the coals'
    fits the blacksmithing scene idiomatically in English.
- source_word: וּבַמַּקָּבוֹת
  chosen: with hammers
  alternatives:
  - with a hammer
  - with mallets
  lexicon: HALOT
  rationale: The plural form is explicit. 'Hammers' is the most straightforward rendering
    for the shaping tools used by the smith.
- source_word: יִצְּרֵהוּ
  chosen: he shapes it
  alternatives:
  - he forms it
  - he fashions it
  lexicon: HALOT
  rationale: The verb יצר commonly means to form or shape. 'Shapes it' fits the immediate
    workshop imagery and avoids overly elevated diction.
- source_word: וַיִּפְעָלֵהוּ
  chosen: works it
  alternatives:
  - labors over it
  - makes it
  lexicon: HALOT
  rationale: Using 'works it' preserves the repetition of the same root פעל from earlier
    in the verse, reflecting the sustained effort of manufacture.
- source_word: בִּזְרֹעַ כֹּחוֹ
  chosen: with his strong arm
  alternatives:
  - with the arm of his strength
  - with his powerful arm
  lexicon: HALOT
  rationale: Literally 'with the arm of his strength.' 'With his strong arm' is a
    natural English rendering that preserves the emphasis on physical exertion.
- source_word: גַּם רָעֵב
  chosen: He also becomes hungry
  alternatives:
  - He is also hungry
  - Even he grows hungry
  lexicon: HALOT
  rationale: The clause marks the craftsman's physical depletion. 'Becomes hungry'
    reflects the verbal form and the progression of exhaustion.
- source_word: וְאֵין כֹּחַ
  chosen: and there is no strength
  alternatives:
  - and he has no strength
  - and his strength is gone
  lexicon: HALOT
  rationale: The verbless clause states lack of strength. 'There is no strength' stays
    close to the Hebrew while remaining readable.
- source_word: לֹא שָׁתָה מַיִם
  chosen: he has not drunk water
  alternatives:
  - he does not drink water
  - he drank no water
  lexicon: HALOT
  rationale: 'The perfect is best rendered here as a present-result state in the sequence
    of fatigue: he has not drunk water, so he is weakened.'
- source_word: וַיִּיעָף
  chosen: and he grows faint
  alternatives:
  - and he is weary
  - and he becomes exhausted
  lexicon: HALOT
  rationale: The verb denotes weariness/faintness. 'Grows faint' captures the culmination
    of hunger and thirst in the satire of idol manufacture.
