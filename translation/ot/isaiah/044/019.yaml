id: ISA.44.19
reference: Isaiah 44:19
source:
  edition: WLC
  text: וְ/לֹא יָשִׁ֣יב אֶל לִבּ֗/וֹ וְ/לֹ֨א דַ֥עַת וְ/לֹֽא תְבוּנָה֮ לֵ/אמֹר֒ חֶצְי֞/וֹ
    שָׂרַ֣פְתִּי בְמוֹ אֵ֗שׁ וְ֠/אַף אָפִ֤יתִי עַל גֶּחָלָי/ו֙ לֶ֔חֶם אֶצְלֶ֥ה בָשָׂ֖ר
    וְ/אֹכֵ֑ל וְ/יִתְר/וֹ֙ לְ/תוֹעֵבָ֣ה אֶעֱשֶׂ֔ה לְ/ב֥וּל עֵ֖ץ אֶסְגּֽוֹד־־־־־׃
translation:
  text: And he does not take it to heart, and there is no knowledge or understanding
    to say, “I burned half of it in the fire; I also baked bread on its coals; I roasted
    meat and ate. Shall I make the rest of it into an abomination? Shall I bow down
    to a block of wood?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a piece of wood' or 'a log'; the Hebrew phrase is contemptuous, stressing
      that the idol is nothing more than wood.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשִׁיב אֶל לִבּוֹ
  chosen: take it to heart
  alternatives:
  - bring back to his heart
  - consider in his heart
  lexicon: HALOT
  rationale: The Hiphil of שוב with אֶל־לֵב idiomatically means to bring something
    to mind or consider it inwardly. 'Take it to heart' is natural modern English
    and preserves the reflective sense better than a wooden 'bring back to his heart.'
- source_word: דַעַת
  chosen: knowledge
  alternatives:
  - discernment
  lexicon: HALOT
  rationale: דַעַת commonly denotes knowledge. Here it pairs with תְבוּנָה, so retaining
    'knowledge' allows the second term to carry the nuance of understanding/discernment.
- source_word: תְבוּנָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: תְבוּנָה often denotes understanding or discernment. 'Understanding'
    is the most straightforward pairing with 'knowledge' in English.
- source_word: חֶצְיוֹ
  chosen: half of it
  alternatives:
  - its half
  - half
  lexicon: HALOT
  rationale: The suffix refers to the piece of wood just described. 'Half of it' is
    idiomatic and clear.
- source_word: שָׂרַפְתִּי בְמוֹ אֵשׁ
  chosen: I burned half of it in the fire
  alternatives:
  - I burned half of it with fire
  lexicon: HALOT
  rationale: בְמוֹ אֵשׁ is an idiomatic prepositional expression. 'In the fire' is
    more natural English than 'with fire' here and fits the domestic scene.
- source_word: וְאַף אָפִיתִי
  chosen: I also baked
  alternatives:
  - indeed I baked
  - yes, I baked
  lexicon: HALOT
  rationale: אַף adds an emphatic/additive sense. 'Also' captures the cumulative irony
    of the speaker's reasoning.
- source_word: עַל גֶּחָלָיו
  chosen: on its coals
  alternatives:
  - over its coals
  - on the coals from it
  lexicon: HALOT
  rationale: 'The suffix most naturally refers back to the burned wood: its coals.
    This preserves the logic that the same wood served ordinary cooking purposes.'
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: The concrete 'bread' should be retained rather than generalized.
- source_word: אֶצְלֶה בָשָׂר
  chosen: I roasted meat
  alternatives:
  - I broiled meat
  lexicon: HALOT
  rationale: צלה refers to roasting/broiling over fire. 'Roasted meat' is clear and
    natural.
- source_word: וְיִתְרוֹ
  chosen: the rest of it
  alternatives:
  - what is left of it
  - its remainder
  lexicon: HALOT
  rationale: The noun means remainder or surplus. 'The rest of it' is idiomatic and
    clearly contrasts with 'half of it.'
- source_word: לְתוֹעֵבָה
  chosen: into an abomination
  alternatives:
  - as an abomination
  - into something detestable
  lexicon: HALOT
  rationale: תוֹעֵבָה is a strong term for something detestable, often religiously
    abhorrent. 'Abomination' preserves the prophetic force and cultic overtones.
- source_word: לְבוּל עֵץ
  chosen: a block of wood
  alternatives:
  - a piece of wood
  - the trunk of a tree
  - a log
  lexicon: HALOT
  rationale: The phrase is contemptuous, emphasizing the idol's material as mere wood.
    'Block of wood' communicates the derisive force better than the more neutral 'piece
    of wood.'
- source_word: אֶסְגּוֹד
  chosen: shall I bow down
  alternatives:
  - shall I prostrate myself
  - shall I worship
  lexicon: HALOT
  rationale: סגד denotes bowing/prostration in worship. 'Bow down' keeps the physical
    act explicit while allowing the idolatrous worship sense to remain evident from
    context.
