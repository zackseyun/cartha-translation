theological_decisions:
- issue: Rendering the idol-material phrase with prophetic derision intact
  chosen_reading: '''a block of wood'''
  alternative_readings:
  - a piece of wood
  - a log
  rationale: The verse mocks idolatry by contrasting ordinary use of wood for fuel
    and cooking with worship of the leftover material. A slightly sharper English
    phrase preserves the prophetic ridicule without adding content beyond the Hebrew.
