theological_decisions:
- issue: Meaning of עַם עוֹלָם
  chosen_reading: historical 'an ancient people' rather than doctrinal 'an everlasting
    people'
  alternative_readings:
  - an everlasting people
  - the people of old
  rationale: The context is YHWH's challenge to idols based on his unique ability
    to order history and declare the future. Reading עוֹלָם temporally as antiquity
    better fits the argument and avoids importing a theological claim about Israel's
    everlasting status that the phrase here does not require.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; do not import doctrinal claims the text does not make.'
- issue: Referent of וְאֹתִיּוֹת
  chosen_reading: future events/things rather than miraculous signs
  alternative_readings:
  - signs
  - tokens
  rationale: The immediate parallel with 'the things that will come' favors a broader
    future-oriented sense. This keeps the verse focused on foretelling history, the
    main polemic of the passage.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition.'
