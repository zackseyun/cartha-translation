id: ISA.44.7
reference: Isaiah 44:7
source:
  edition: WLC
  text: וּ/מִֽי כָמ֣וֹ/נִי יִקְרָ֗א וְ/יַגִּידֶ֤/הָ וְ/יַעְרְכֶ֨/הָ֙ לִ֔/י מִ/שּׂוּמִ֖/י
    עַם עוֹלָ֑ם וְ/אֹתִיּ֛וֹת וַ/אֲשֶׁ֥ר תָּבֹ֖אנָה יַגִּ֥ידוּ לָֽ/מוֹ־־׃
translation:
  text: And who is like me? Let him call and declare it, and set it in order for me,
    since I established an ancient people. And let them declare to them the things
    that are coming, and the things that will come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the time I established the people of old.' The Hebrew phrase may
      be read temporally, and 'ancient people' could also be rendered 'the people
      of old.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the signs and the things that will come.' The Hebrew word can also be
      understood as 'signs' or 'tokens,' though here the context favors future events.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִי כָמוֹנִי
  chosen: And who is like me?
  alternatives:
  - Who then is like me?
  - And who is like me
  lexicon: HALOT
  rationale: Idiomatic rhetorical challenge. The conjunction ו is retained as 'And'
    to preserve discourse continuity, while the phrase כָמוֹנִי is rendered straightforwardly
    as 'like me.'
- source_word: יִקְרָא
  chosen: let him call
  alternatives:
  - will call
  - can call
  - proclaim
  lexicon: HALOT
  rationale: 'In this taunting challenge context, the imperfect is best rendered jussively:
    ''let him call,'' inviting any supposed rival deity to step forward.'
- source_word: וְיַגִּידֶהָ
  chosen: and declare it
  alternatives:
  - and tell it
  - and announce it
  lexicon: HALOT
  rationale: נגד in Hiphil commonly means to make known or declare. 'It' refers to
    the matter under challenge, left implicit in Hebrew and represented by the feminine
    suffix.
- source_word: וְיַעְרְכֶהָ לִי
  chosen: and set it in order for me
  alternatives:
  - and arrange it before me
  - and present it to me in order
  lexicon: HALOT
  rationale: ערך commonly carries the sense of arranging or setting in order. 'For
    me' preserves לִי without overinterpreting it as merely 'before me,' though that
    nuance is possible.
- source_word: מִשּׂוּמִי עַם עוֹלָם
  chosen: since I established an ancient people
  alternatives:
  - since I appointed the everlasting people
  - from the time I established the people of old
  lexicon: HALOT
  rationale: 'The infinitive construct with מן is temporal/causal: ''since/from the
    time of my establishing.'' עַם עוֹלָם here is best taken as ''an ancient people''
    or ''the people of old,'' referring to God''s long-standing ordering of history,
    not necessarily ''everlasting people'' in a doctrinal sense.'
- source_word: עַם עוֹלָם
  chosen: an ancient people
  alternatives:
  - the people of old
  - an everlasting people
  lexicon: HALOT
  rationale: עוֹלָם can denote antiquity or perpetuity depending on context. In this
    historical challenge setting, antiquity/'of old' fits better than metaphysical
    everlastingness.
- source_word: וְאֹתִיּוֹת
  chosen: the things that are coming
  alternatives:
  - the signs
  - future things
  lexicon: HALOT
  rationale: Although the consonantal form can suggest 'signs,' in context parallel
    to 'what will come' it refers to future events or coming things. This avoids an
    overly narrow miraculous-sign sense.
- source_word: וַאֲשֶׁר תָּבֹאנָה
  chosen: and the things that will come
  alternatives:
  - and what is to come
  - and what will happen
  lexicon: HALOT
  rationale: The relative clause with feminine plural verb points to future events.
    Rendering as 'the things that will come' preserves the parallelism with the previous
    phrase.
- source_word: יַגִּידוּ לָמוֹ
  chosen: let them declare to them
  alternatives:
  - let them declare them
  - let them declare to those people
  lexicon: HALOT
  rationale: The 3mp forms are difficult, but the plain sense is a challenge for rival
    claimants to announce future things to their hearers. The pronouns are preserved
    rather than smoothed away, though the Hebrew is somewhat compressed.
