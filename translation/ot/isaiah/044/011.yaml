revisions:
- timestamp: '2026-04-21T12:34:42Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/isaiah/044/011.json
  category: awkward_english
  tier: 1
  from: Let all of them gather themselves
  to: Let them all gather
  rationale: The current rendering 'gather themselves' is a very literal translation of the Hebrew Hithpael stem (יִתְקַבְּצוּ). While not incorrect, it is slightly stiff and less idiomatic in modern English. Using the intransitive 'gather' (as in 'Let them all gather' or 'Let them all assemble') achieves the same meaning with a more natural flow, which is preferable under an 'optimal-equivalence' philosophy.
