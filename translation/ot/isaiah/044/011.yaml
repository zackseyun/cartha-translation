theological_decisions:
- issue: Rendering of אָדָם in a representative human sense
  chosen_reading: men
  alternative_readings:
  - humankind
  - human beings
  rationale: The doctrine excerpt specifies 'man / humankind (context)' for אָדָם and a gender-accurate approach. Here the point is the craftsmen's merely human status over against deity, so 'men' preserves the representative human contrast without flattening the Hebrew.
