id: ISA.44.11
reference: Isaiah 44:11
source:
  edition: WLC
  text: הֵ֤ן כָּל חֲבֵרָי/ו֙ יֵבֹ֔שׁוּ וְ/חָרָשִׁ֥ים הֵ֖מָּה מֵֽ/אָדָ֑ם יִֽתְקַבְּצ֤וּ כֻלָּ/ם֙ יַֽעֲמֹ֔דוּ יִפְחֲד֖וּ יֵבֹ֥שׁוּ יָֽחַד־׃
translation:
  text: Look, all his companions will be put to shame, and the craftsmen are only men. Let them all gather and stand up; they will be terrified, they will be put to shame together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''are merely human beings.'' Hebrew: ''are from man'' / ''are of mankind,'' emphasizing that the idol-makers are only human, not divine.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Let all of them gather themselves'.
    reason: previous_rendering
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Surely
  lexicon: HALOT
  rationale: Introduces an emphatic attention-getting statement. 'Look' is readable modern English and preserves the deictic force better than the more archaic 'Behold.'
- source_word: חֲבֵרָיו
  chosen: his companions
  alternatives:
  - his associates
  - his fellows
  lexicon: HALOT
  rationale: Refers to those associated with the idol-maker/idol in context. 'Companions' captures association without over-specifying guild membership.
- source_word: יֵבֹשׁוּ
  chosen: will be put to shame
  alternatives:
  - will be ashamed
  - will be disgraced
  lexicon: HALOT
  rationale: The Niphal/Qal shame language here is best rendered with a passive/resultative sense in English. 'Put to shame' preserves the prophetic/judicial tone and matches the repeated use later in the verse.
- source_word: וְחָרָשִׁים
  chosen: and the craftsmen
  alternatives:
  - and the artisans
  - and the smiths
  lexicon: HALOT
  rationale: חָרָשִׁים is a broad term for skilled makers/workmen, not only metalworkers. 'Craftsmen' fits the idol-making context while remaining sufficiently broad.
- source_word: הֵמָּה מֵאָדָם
  chosen: are only men
  alternatives:
  - are from man
  - are human
  - are merely human beings
  lexicon: HALOT
  rationale: The phrase stresses the merely human status of the makers in contrast to deity. Because אָדָם here refers to human beings in a representative sense, 'men' follows the project's gender-accurate policy and suits the contrastive force; 'only' brings out the limiting emphasis.
- source_word: מֵאָדָם
  chosen: men
  alternatives:
  - humankind
  - human beings
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered by context. Here it contrasts the craftsmen's humanity with divine claims, and the plural predicate context supports 'men' as a representative human term.
- source_word: יִתְקַבְּצוּ כֻלָּם
  chosen: Let all of them gather themselves
  alternatives:
  - Let them all assemble
  - They will all gather together
  lexicon: HALOT
  rationale: The imperfect here functions jussively in context, issuing a challenge. 'Let all of them gather themselves' preserves the summons/challenge force better than a simple future.
- source_word: יַעֲמֹדוּ
  chosen: stand up
  alternatives:
  - take their stand
  - stand
  lexicon: HALOT
  rationale: In this challenge scene, the verb suggests presenting themselves or taking position. 'Stand up' is natural English and keeps the confrontational setting.
- source_word: יִפְחֲדוּ
  chosen: they will be terrified
  alternatives:
  - they will fear
  - they will tremble
  lexicon: HALOT
  rationale: The verb denotes fear in response to the challenge/judgment scene. 'Will be terrified' brings out the strong emotional result in idiomatic English.
- source_word: יָחַד
  chosen: together
  alternatives:
  - all together
  - as one
  lexicon: HALOT
  rationale: Adverbial summary of their shared fate. 'Together' is concise and natural.
