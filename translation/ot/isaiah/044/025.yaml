theological_decisions:
- issue: Rendering of masculine חֲכָמִים
  chosen_reading: wise men
  alternative_readings:
  - the wise
  - wise ones
  rationale: The Hebrew form is grammatically masculine plural. Per the translation
    philosophy, gender-accurate rendering is preferred unless context clearly demands
    a generic abstraction. Here the text depicts actual human claimants to wisdom,
    so 'wise men' is retained.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Interpretation of God's action toward pagan/false revelatory practices
  chosen_reading: God actively frustrates and exposes them as foolish
  alternative_readings:
  - God merely permits their failure
  - God proves them false
  rationale: The participles and finite verbs present direct divine action. The translation
    preserves that active portrayal without softening it into mere permission or expanding
    it into a broader theological statement.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
