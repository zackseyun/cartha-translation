id: ISA.44.25
reference: Isaiah 44:25
source:
  edition: WLC
  text: מֵפֵר֙ אֹת֣וֹת בַּדִּ֔ים וְ/קֹסְמִ֖ים יְהוֹלֵ֑ל מֵשִׁ֧יב חֲכָמִ֛ים אָח֖וֹר
    וְ/דַעְתָּ֥/ם יְשַׂכֵּֽל׃
translation:
  text: who frustrates the signs of liars and makes diviners act like fools, who turns
    wise men back and makes their knowledge foolish,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'omens' for 'signs.' The Hebrew can refer to purported validating signs
      used by deceptive practitioners.
    reason: lexical_alternative
  - marker: b
    text: Or 'drives diviners mad' / 'makes diviners foolish.' The Hebrew verb conveys
      making them act irrationally or exposing them as fools.
    reason: lexical_alternative
  - marker: c
    text: Or 'turns the wise backward.' The phrase pictures reversal and humiliation
      of those reputed to be wise.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵפֵר
  chosen: frustrates
  alternatives:
  - nullifies
  - breaks
  - thwarts
  lexicon: HALOT
  rationale: The Hiphil participle of פרר here describes causing something to fail
    or be invalidated. 'Frustrates' is idiomatic modern English and fits the context
    of God overturning deceptive signs.
- source_word: אֹתוֹת
  chosen: signs
  alternatives:
  - omens
  - tokens
  lexicon: HALOT
  rationale: The noun commonly means 'signs.' In this polemical context it refers
    to purported validating signs used by false prognosticators. 'Signs' is broad
    and preserves the Hebrew without over-specifying.
- source_word: בַּדִּים
  chosen: liars
  alternatives:
  - boasters
  - false prophets
  - empty talkers
  lexicon: HALOT
  rationale: In context בדים refers to deceptive or false speakers, not merely isolated
    lies. 'Liars' is the most concise and natural rendering, matching the denunciatory
    tone.
- source_word: קֹסְמִים
  chosen: diviners
  alternatives:
  - soothsayers
  - fortune-tellers
  lexicon: HALOT
  rationale: קסם denotes divination. 'Diviners' is the standard, sufficiently formal
    English equivalent and avoids the colloquial feel of 'fortune-tellers.'
- source_word: יְהוֹלֵל
  chosen: makes ... act like fools
  alternatives:
  - drives mad
  - makes foolish
  - makes into fools
  lexicon: HALOT
  rationale: From הלל in the Polel/Piel-like stem, the sense here is to make irrational
    or foolish. 'Makes diviners act like fools' captures the verbal force in readable
    English without implying clinical madness.
- source_word: מֵשִׁיב
  chosen: turns
  alternatives:
  - drives back
  - causes to turn back
  lexicon: HALOT
  rationale: The Hiphil participle of שוב means to turn back or reverse. 'Turns ...
    back' is a natural rendering and preserves the image of reversal.
- source_word: חֲכָמִים
  chosen: wise men
  alternatives:
  - the wise
  - wise ones
  lexicon: HALOT
  rationale: The masculine plural is retained in line with the project's gender-accurate
    policy. In context it refers to reputed sages or counselors. 'Wise men' is straightforward
    and idiomatic.
- source_word: אָחוֹר
  chosen: back
  alternatives:
  - backward
  - to the rear
  lexicon: HALOT
  rationale: The adverbial noun indicates reversal or retreat. 'Back' works naturally
    with 'turns' in English.
- source_word: דַעְתָּם
  chosen: their knowledge
  alternatives:
  - their understanding
  - their counsel
  lexicon: HALOT
  rationale: דעת is 'knowledge' or 'understanding.' 'Their knowledge' preserves the
    lexical sense and pairs well with the following verb that depicts it as exposed
    as folly.
- source_word: יְשַׂכֵּל
  chosen: makes ... foolish
  alternatives:
  - turns into folly
  - shows to be foolish
  lexicon: HALOT
  rationale: The verb here means to make foolish or render as folly. 'Makes their
    knowledge foolish' is slightly compressed but communicates the causative force
    and parallelism with the previous clause.
