theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file explicitly sets YHWH's default English rendering as
    'the LORD.' This preserves covenantal significance while following the project's
    stated policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Final clause emphasizing God's sole agency in creation
  chosen_reading: Main text renders the clause as 'by myself' to express that YHWH
    created without assistance.
  alternative_readings:
  - who was with me?
  - from me
  rationale: 'The Hebrew ending is notoriously difficult, but the verse''s rhetorical
    and theological thrust is unmistakable: YHWH alone created the heavens and the
    earth. The translation preserves that emphasis in the main text while noting the
    alternative construal in a footnote rather than over-resolving the textual difficulty.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
