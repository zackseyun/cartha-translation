theological_decisions:
- issue: Implicit subject of טַח
  chosen_reading: he has smeared
  alternative_readings:
  - it is smeared
  - their eyes are smeared over
  rationale: The Hebrew verb is 3ms with no explicit subject. In context, the subject
    is left implicit; English requires one. 'He' preserves the grammatical singular
    without importing a specific named subject into the text. This avoids over-resolving
    whether the agent is God, the craftsman, or an impersonal statement, while still
    reflecting the Hebrew verbal form.
  doctrine_reference: Preserve theological tension rather than resolve it.
