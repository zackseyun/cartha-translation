id: ISA.44.18
reference: Isaiah 44:18
source:
  edition: WLC
  text: לֹ֥א יָדְע֖וּ וְ/לֹ֣א יָבִ֑ינוּ כִּ֣י טַ֤ח מֵֽ/רְאוֹת֙ עֵֽינֵי/הֶ֔ם מֵ/הַשְׂכִּ֖יל
    לִבֹּתָֽ/ם׃
translation:
  text: They do not know, nor do they understand, because he has smeared their eyes
    from seeing, their hearts from understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has plastered over their eyes so they cannot see.' The Hebrew verb is
      a concrete image of smearing or coating over, often rendered more interpretively
      as 'blinded.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'their hearts,' using 'heart' as the seat of thought and
      understanding, not merely emotion.
    reason: cultural_note
  - marker: c
    text: The subject of 'has smeared' is implicit in Hebrew; the text does not explicitly
      name the agent here.
    reason: alternative_reading
lexical_decisions:
- source_word: יָדְעוּ
  chosen: do not know
  alternatives:
  - have not known
  lexicon: HALOT
  rationale: Qal perfect with negation functions as a present/general statement in
    context. 'Know' is the plain sense and fits the denunciation of idolaters' spiritual
    ignorance.
- source_word: יָבִינוּ
  chosen: do they understand
  alternatives:
  - do they discern
  - do they have insight
  lexicon: HALOT
  rationale: בין commonly denotes understanding/discernment. 'Understand' is natural
    English and pairs well with 'know' without overinterpreting.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for their ignorance. 'Because' is clearer in modern
    English than the more formal 'for'.
- source_word: טַח
  chosen: has smeared
  alternatives:
  - has plastered over
  - has shut
  - has blinded
  lexicon: HALOT
  rationale: טח literally conveys smearing/plastering over. 'Has smeared' preserves
    the concrete metaphor better than the interpretive 'has blinded,' while still
    reading naturally.
- source_word: מֵרְאוֹת עֵינֵיהֶם
  chosen: their eyes from seeing
  alternatives:
  - their eyes so that they cannot see
  - their eyes from sight
  lexicon: HALOT
  rationale: 'The preposition מִן with infinitive expresses prevention: their eyes
    are obstructed from seeing. This keeps the Hebrew structure visible in English.'
- source_word: מֵהַשְׂכִּיל לִבֹּתָם
  chosen: their hearts from understanding
  alternatives:
  - their minds from comprehending
  - their hearts from having insight
  lexicon: HALOT
  rationale: השׂכיל denotes acting with insight/understanding. 'Hearts' reflects לִבּוֹתָם
    as the Hebrew seat of thought and perception; replacing it with 'minds' would
    flatten the Hebrew anthropology.
- source_word: לִבֹּתָם
  chosen: their hearts
  alternatives:
  - their minds
  - their inner selves
  lexicon: HALOT
  rationale: Hebrew לֵב/לֵבָב often includes intellect and volition. 'Hearts' is retained
    for source-language fidelity, with the cognitive sense carried by 'understanding'.
