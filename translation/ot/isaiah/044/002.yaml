id: ISA.44.2
reference: Isaiah 44:2
source:
  edition: WLC
  text: כֹּה אָמַ֨ר יְהוָ֥ה עֹשֶׂ֛/ךָ וְ/יֹצֶרְ/ךָ֥ מִ/בֶּ֖טֶן יַעְזְרֶ֑/ךָּ אַל תִּירָא֙ עַבְדִּ֣/י יַֽעֲקֹ֔ב וִ/ישֻׁר֖וּן בָּחַ֥רְתִּי בֽ/וֹ־־׃
translation:
  text: 'Thus says Yahweh, your Maker and the one who formed you from the womb, who will help you: Do not fear, my servant Jacob, Jeshurun, whom I have chosen.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jeshurun is a poetic name for Israel, likely carrying the sense 'upright one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal sense while matching established English Bible convention.
- source_word: עֹשֶׂךָ
  chosen: your Maker
  alternatives:
  - the one who made you
  - your doer
  lexicon: HALOT
  rationale: From עשה, here functioning substantivally/participially. 'Your Maker' is natural English and preserves the personal, covenantal force of God's creative action toward Israel.
- source_word: וְיֹצֶרְךָ
  chosen: and the one who formed you
  alternatives:
  - and your Former
  - and who shaped you
  lexicon: HALOT
  rationale: From יצר, often used of a potter shaping. 'Formed' preserves the intentional, fashioned nuance distinct from the broader 'made' of עשה.
- source_word: מִבֶּטֶן
  chosen: from the womb
  alternatives:
  - from birth
  - from the belly
  lexicon: HALOT
  rationale: A literal rendering that can denote origin from the womb/birth onward. 'From the womb' preserves the metaphor and covenantal election language.
- source_word: יַעְזְרֶךָּ
  chosen: who will help you
  alternatives:
  - he helps you
  - your helper
  lexicon: HALOT
  rationale: Imperfect verb with YHWH as subject continuing the description. 'Who will help you' fits the prophetic reassurance context and reads smoothly in English.
- source_word: אַל תִּירָא
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the prohibition; concise and faithful.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in this covenantal designation for Israel the emphasis is belonging and service to God rather than bonded-status imagery, so 'servant' is the better contextual rendering.
- source_word: יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Standard transliteration of the personal/name-for-Israel designation.
- source_word: וִישֻׁרוּן
  chosen: Jeshurun
  alternatives:
  - upright one
  lexicon: HALOT
  rationale: A poetic proper name/title for Israel. Per project philosophy, names are transliterated rather than translated; the lexical sense 'upright one' is worth preserving in a footnote.
- source_word: בָּחַרְתִּי בוֹ
  chosen: whom I have chosen
  alternatives:
  - in whom I have chosen
  - I chose him
  lexicon: HALOT
  rationale: English relative clause best conveys the Hebrew perfect plus pronominal object in apposition to Jeshurun/Jacob. 'Whom I have chosen' preserves divine election language without overcomplicating the syntax.
