theological_decisions:
- issue: Referent of the singular pronouns in a corporate address to Israel
  chosen_reading: Render the singular pronouns directly ('you') while keeping the named addressees 'Jacob' and 'Jeshurun' in apposition.
  alternative_readings:
  - 'Pluralize for English sense: ''you all''/''Israel'''
  - Restructure as separate vocatives
  rationale: The Hebrew uses singular forms while addressing Israel corporately through the representative names Jacob/Jeshurun. Preserving the singular maintains the prophetic style and covenantal personification without forcing an interpretive expansion.
  doctrine_reference: Translation philosophy §5
- issue: Rendering of יְשֻׁרוּן
  chosen_reading: Keep 'Jeshurun' in the main text and preserve the lexical sense in a footnote.
  alternative_readings:
  - Translate as 'upright one'
  rationale: Because this functions as a poetic name for Israel, transliteration best follows the project's policy to transliterate names while preserving meaning through annotation.
  doctrine_reference: Translation philosophy §2
