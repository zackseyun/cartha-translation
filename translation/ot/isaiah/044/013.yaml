theological_decisions:
- issue: אָדָם rendering
  chosen_reading: a human
  alternative_readings:
  - man
  - humankind
  rationale: The term here refers to human appearance in contrast to deity, not to
    humanity collectively. Following the project's gender-accurate principle, 'a human'
    best conveys the generic singular sense in contemporary English while preserving
    the contrast with אִישׁ.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default
    man / humankind (context)'
