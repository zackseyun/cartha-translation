id: ISA.44.13
reference: Isaiah 44:13
source:
  edition: WLC
  text: חָרַ֣שׁ עֵצִים֮ נָ֣טָה קָו֒ יְתָאֲרֵ֣/הוּ בַ/שֶּׂ֔רֶד יַעֲשֵׂ֨/הוּ֙ בַּ/מַּקְצֻע֔וֹת
    וּ/בַ/מְּחוּגָ֖ה יְתָאֳרֵ֑/הוּ וַֽ/יַּעֲשֵׂ֨/הוּ֙ כְּ/תַבְנִ֣ית אִ֔ישׁ כְּ/תִפְאֶ֥רֶת
    אָדָ֖ם לָ/שֶׁ֥בֶת בָּֽיִת׃
translation:
  text: The woodworker stretches out a line; he marks it out with a stylus; he shapes
    it with planes, and marks it out with a compass. He makes it like the form of
    a man, like the beauty of a human, to dwell in a house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a marking tool' or possibly 'with red chalk'; the Hebrew term refers
      to a tool used to mark out the figure.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָרַשׁ עֵצִים
  chosen: the woodworker
  alternatives:
  - the carpenter
  - the craftsman in wood
  lexicon: HALOT
  rationale: The construct phrase literally denotes an artisan of wood. 'Woodworker'
    is natural modern English and keeps the material explicit better than the more
    traditional 'carpenter,' which can suggest a narrower trade specialization.
- source_word: נָטָה קָו
  chosen: stretches out a line
  alternatives:
  - extends a measuring line
  - stretches a cord
  lexicon: HALOT
  rationale: The idiom refers to laying out measurements with a line. 'Stretches out
    a line' is clear and preserves the physical action.
- source_word: יְתָאֲרֵהוּ
  chosen: marks it out
  alternatives:
  - outlines it
  - draws it
  lexicon: HALOT
  rationale: The verb here concerns sketching or delineating the object. 'Marks it
    out' fits the workshop sequence and avoids over-specifying artistic drawing.
- source_word: בַשֶּׂרֶד
  chosen: with a stylus
  alternatives:
  - with a marking tool
  - with red chalk
  lexicon: HALOT
  rationale: The noun denotes an engraving or marking instrument; some take it as
    red chalk or a scribing tool. 'Stylus' captures a pointed marking implement without
    forcing a specific material. Because the exact tool is uncertain, an alternative
    is preserved in a footnote.
- source_word: יַעֲשֵׂהוּ בַּמַּקְצֻעוֹת
  chosen: he shapes it with planes
  alternatives:
  - he works it with chisels
  - he fashions it with tools
  lexicon: HALOT
  rationale: The noun likely refers to woodworking tools, commonly understood as planes
    or cutting implements. 'Shapes it with planes' fits the context of carving an
    idol from wood and gives a concrete workshop image.
- source_word: וּבַמְּחוּגָה
  chosen: with a compass
  alternatives:
  - with a circle-marker
  - with a measuring instrument
  lexicon: HALOT
  rationale: The term denotes an instrument for inscribing circles or arcs. 'Compass'
    is the most idiomatic English equivalent.
- source_word: כְּתַבְנִית אִישׁ
  chosen: like the form of a man
  alternatives:
  - according to the pattern of a man
  - like a man's figure
  lexicon: HALOT
  rationale: תבנית is pattern/form/model. 'Form of a man' is idiomatic and preserves
    the comparison.
- source_word: כְּתִפְאֶרֶת אָדָם
  chosen: like the beauty of a human
  alternatives:
  - with human splendor
  - like the glory of man
  lexicon: HALOT
  rationale: תפארת can mean beauty, splendor, or adornment. 'Beauty' fits the idol-maker's
    aesthetic aim. אָדָם here is generic human rather than the personal name Adam,
    so 'a human' best reflects the sense.
- source_word: לָשֶׁבֶת בָּיִת
  chosen: to dwell in a house
  alternatives:
  - to sit in a house
  - to remain in a shrine
  lexicon: HALOT
  rationale: The infinitive of ישׁב can mean sit, dwell, or remain. In context the
    finished idol is intended for placement in a house or shrine. 'To dwell in a house'
    is idiomatic and reflects the irony of a man-made god installed indoors.
