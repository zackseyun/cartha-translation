id: ISA.44.10
reference: Isaiah 44:10
source:
  edition: WLC
  text: מִֽי יָצַ֥ר אֵ֖ל וּ/פֶ֣סֶל נָסָ֑ךְ לְ/בִלְתִּ֖י הוֹעִֽיל־׃
translation:
  text: Who fashions a god or casts an idol that is profitable for nothing?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who forms a god and casts an idol, to no profit?'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  alternatives:
  - Who is it that
  - Who has
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question. Simple 'Who'
    best preserves the sharp prophetic challenge.
- source_word: יָצַר
  chosen: fashions
  alternatives:
  - forms
  - shapes
  lexicon: HALOT
  rationale: The verb commonly denotes forming or shaping, especially by a craftsman.
    'Fashions' fits the artisanal context and reads naturally in English.
- source_word: אֵל
  chosen: a god
  alternatives:
  - God
  - a deity
  lexicon: HALOT
  rationale: Here the noun is indefinite and refers to a manufactured false god, not
    the true God of Israel. Lowercase 'god' is required by context.
- source_word: וּפֶסֶל
  chosen: or casts an idol
  alternatives:
  - and an idol
  - or an idol
  lexicon: HALOT
  rationale: The conjunction links a parallel expression, and English idiom is improved
    by supplying the verbal sense with the following verb. 'Idol' is the standard
    rendering of פֶסֶל in this polemical context.
- source_word: נָסָךְ
  chosen: casts
  alternatives:
  - pours
  - molten-images
  - casts in metal
  lexicon: HALOT
  rationale: In idol-making contexts this verb refers to casting an image, likely
    in metal. 'Casts' is concise and idiomatic with 'idol.'
- source_word: לְבִלְתִּי
  chosen: for nothing
  alternatives:
  - to no purpose
  - so as not to
  lexicon: HALOT
  rationale: This construction introduces result/purpose with negation. In context
    it expresses uselessness; 'for nothing' communicates the rhetorical force naturally
    in English.
- source_word: הוֹעִיל
  chosen: is profitable
  alternatives:
  - profits
  - benefits
  - is of use
  lexicon: HALOT
  rationale: The verb means to profit, benefit, or be of use. 'Is profitable' preserves
    the predicate sense and pairs well with 'for nothing' to express total uselessness.
