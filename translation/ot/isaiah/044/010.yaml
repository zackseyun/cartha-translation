theological_decisions:
- issue: Rendering אֵל in a context of idol polemic
  chosen_reading: a god
  alternative_readings:
  - God
  - a deity
  rationale: The verse mocks the making of false gods and idols; capitalizing as 'God'
    would wrongly suggest the true God is in view. Lowercase preserves the theological
    contrast central to the passage.
