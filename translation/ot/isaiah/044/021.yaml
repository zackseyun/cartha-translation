id: ISA.44.21
reference: Isaiah 44:21
source:
  edition: WLC
  text: זְכָר אֵ֣לֶּה יַעֲקֹ֔ב וְ/יִשְׂרָאֵ֖ל כִּ֣י עַבְדִּ/י אָ֑תָּה יְצַרְתִּ֤י/ךָ
    עֶֽבֶד לִ/י֙ אַ֔תָּה יִשְׂרָאֵ֖ל לֹ֥א תִנָּשֵֽׁ/נִי־־־׃
translation:
  text: Remember these things, Jacob, and Israel, for you are my servant; I formed
    you as a servant for myself. Israel, you will not be forgotten by me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Israel, you shall not forget me.' The Hebrew form can be understood
      this way, and some interpreters take it as an exhortation rather than a reassurance.
    reason: alternative_reading
lexical_decisions:
- source_word: זְכָר
  chosen: Remember
  alternatives:
  - Call to mind
  - Recall
  lexicon: HALOT
  rationale: Qal imperative 2ms of זכר, a direct command to remember. 'Remember' is
    the most natural and standard imperative in English.
- source_word: אֵלֶּה
  chosen: these things
  alternatives:
  - these
  lexicon: HALOT
  rationale: The demonstrative is plural and refers back to the preceding matters;
    'these things' makes the object explicit in idiomatic English.
- source_word: יַעֲקֹב וְיִשְׂרָאֵל
  chosen: Jacob, and Israel
  alternatives:
  - Jacob and Israel
  lexicon: HALOT
  rationale: Both names address the covenant people in parallel apposition. The vocative
    force is preserved by direct address.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the command. 'For' fits the explanatory sense
    smoothly in English.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here the covenantal relationship
    of Israel to God is foregrounded rather than bonded-status imagery. 'My servant'
    is the best contextual rendering.
- source_word: יְצַרְתִּיךָ
  chosen: I formed you
  alternatives:
  - I fashioned you
  lexicon: HALOT
  rationale: יצר commonly denotes forming or shaping, often with creator imagery.
    'Formed' preserves the creation/craftsman nuance and is natural English.
- source_word: עֶבֶד לִי
  chosen: as a servant for myself
  alternatives:
  - to be my servant
  - a servant for me
  lexicon: HALOT
  rationale: The phrase states purpose/result of God's forming Israel. 'As a servant
    for myself' preserves both the predicate noun and the לִי without over-paraphrasing.
- source_word: לֹא תִנָּשֵׁנִי
  chosen: you will not be forgotten by me
  alternatives:
  - 'you will not be forgotten by me, or read: you must not forget me'
  - you will not be neglected by me
  lexicon: HALOT
  rationale: 'The Niphal of נשה with 1cs suffix is most naturally read as passive/reflexive
    in sense: ''you will not be forgotten by me.'' This fits the immediate reassurance
    context and parallels several ancient versions. Because the consonantal text also
    permits the sense ''you shall not forget me,'' the alternative is preserved in
    a footnote.'
