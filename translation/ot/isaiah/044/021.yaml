theological_decisions:
- issue: Subject-object sense of לֹא תִנָּשֵׁנִי
  chosen_reading: 'A divine reassurance: ''you will not be forgotten by me'''
  alternative_readings:
  - 'A command/prediction directed to Israel: ''you shall not forget me'''
  rationale: The verse emphasizes Israel's identity as God's formed servant and climaxes
    naturally in God's assurance of covenant remembrance. This preserves the theological
    thrust of divine faithfulness without denying the grammatical ambiguity; the alternative
    is footnoted rather than suppressed.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
