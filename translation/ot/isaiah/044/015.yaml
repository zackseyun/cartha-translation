theological_decisions:
- issue: Rendering of idol-manufacture language without importing polemical terminology
    beyond the Hebrew
  chosen_reading: makes a god ... makes it a carved image
  alternative_readings:
  - makes an idol ... makes it a carved idol
  rationale: 'The Hebrew uses אֵל (''god'') and then פֶסֶל (''carved image''). Preserving
    both terms maintains the prophetic irony: the craftsman treats the object as a
    god, yet it is in fact a carved image. Flattening both to ''idol'' would reduce
    the rhetorical force.'
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Generic masculine אדם
  chosen_reading: a man
  alternative_readings:
  - humanity
  - a person
  rationale: The doctrine specifies gender-accurate over gender-neutral where the
    source has masculine representative force. Here singular generic 'a man' best
    matches the Hebrew while remaining natural enough in context.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
