id: ISA.44.15
reference: Isaiah 44:15
source:
  edition: WLC
  text: וְ/הָיָ֤ה לְ/אָדָם֙ לְ/בָעֵ֔ר וַ/יִּקַּ֤ח מֵ/הֶם֙ וַ/יָּ֔חָם אַף יַשִּׂ֖יק
    וְ/אָ֣פָה לָ֑חֶם אַף יִפְעַל אֵל֙ וַ/יִּשְׁתָּ֔חוּ עָשָׂ֥/הוּ פֶ֖סֶל וַ/יִּסְגָּד
    לָֽ/מוֹ־־־־׃
translation:
  text: Then it becomes fuel for a man, and he takes some of them and warms himself;
    he also kindles a fire and bakes bread. He also makes a god and bows down; he
    makes it a carved image and prostrates himself before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and bows down to it.' The Hebrew has a plural pronominal form ('to them/before
      them') where English might expect a singular, likely reflecting poetic usage
      or reference to the material/pieces collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאָדָם
  chosen: for a man
  alternatives:
  - for humanity
  - for people
  lexicon: HALOT
  rationale: The noun אָדָם here is singular and generic. Per doctrine, gender-accurate
    rendering is preferred where the source uses masculine/generic force. 'For a man'
    preserves the singular representative sense better than a pluralized paraphrase.
- source_word: לְבָעֵר
  chosen: fuel
  alternatives:
  - for burning
  - to burn
  lexicon: HALOT
  rationale: 'The infinitive construct with ל expresses purpose/result: the wood becomes
    something used for burning. ''Fuel'' is idiomatic English that captures the function
    without awkwardness.'
- source_word: מֵהֶם
  chosen: some of them
  alternatives:
  - from them
  lexicon: HALOT
  rationale: The plural pronoun refers back to the pieces/parts of the wood from the
    prior context. 'Some of them' makes explicit the partitive sense natural in English.
- source_word: וַיָּחָם
  chosen: warms himself
  alternatives:
  - is warmed
  - gets warm
  lexicon: HALOT
  rationale: The verb means to be/become warm; in context the man uses the wood to
    warm himself. Reflexive English best conveys the practical action.
- source_word: אַף יַשִּׂיק
  chosen: he also kindles a fire
  alternatives:
  - indeed he kindles
  - he also burns
  lexicon: HALOT
  rationale: The particle אַף adds 'also/even.' The Hiphil of נשק/נשׂק here is understood
    in context as kindling/igniting. Supplying 'a fire' is idiomatic and contextually
    implied by the sequence of warming and baking.
- source_word: וְאָפָה לָחֶם
  chosen: and bakes bread
  alternatives:
  - and he bakes bread
  lexicon: HALOT
  rationale: Straightforward rendering of the verb-object pair; concise modern English
    preserves the action sequence.
- source_word: אַף יִפְעַל אֵל
  chosen: He also makes a god
  alternatives:
  - He even makes a god
  - He fashions a god
  lexicon: HALOT
  rationale: פעל in this context means make/do/fashion. 'Makes a god' preserves the
    irony of manufacturing an object of worship from the same material used as fuel.
- source_word: וַיִּשְׁתָּחוּ
  chosen: and bows down
  alternatives:
  - and worships
  - and prostrates himself
  lexicon: HALOT
  rationale: The verb fundamentally denotes bowing down/prostration. 'Bows down' keeps
    the physical act explicit; worship is implied but not substituted here.
- source_word: פֶסֶל
  chosen: a carved image
  alternatives:
  - an idol
  - a graven image
  lexicon: HALOT
  rationale: פסל denotes an idol/image, especially something carved. 'Carved image'
    is accurate and readable; 'graven image' is traditional but archaic, while 'idol'
    loses the crafted aspect already emphasized in the verse.
- source_word: וַיִּסְגָּד לָמוֹ
  chosen: and prostrates himself before them
  alternatives:
  - and bows down to it
  - and worships them
  lexicon: HALOT
  rationale: סגד denotes prostration/obeisance. The pronominal form לָמוֹ is morphologically
    plural, so 'before them' preserves the Hebrew form. Because the immediate referent
    is singular in English ('a carved image'), this awkwardness likely reflects collective/material
    reference or poetic usage; the plural is therefore preserved in the main text
    and the smoother singular alternative is noted in a footnote.
- source_word: וְהָיָה
  chosen: Then it becomes
  alternatives:
  - And it is
  - And it becomes
  lexicon: HALOT
  rationale: The verb introduces the result of the wood's use. 'Then it becomes' fits
    the discourse flow in English and signals consequence from the preceding description.
