id: ISA.44.22
reference: Isaiah 44:22
source:
  edition: WLC
  text: מָחִ֤יתִי כָ/עָב֙ פְּשָׁעֶ֔י/ךָ וְ/כֶ/עָנָ֖ן חַטֹּאותֶ֑י/ךָ שׁוּבָ֥/ה אֵלַ֖/י
    כִּ֥י גְאַלְתִּֽי/ךָ׃
translation:
  text: I have wiped away your transgressions like a cloud, and your sins like a mist.
    Return to me, for I have redeemed you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have blotted out your transgressions like a cloud, and your sins like
      a cloud/mist.' The Hebrew uses two related cloud terms in poetic parallelism.
    reason: lexical_alternative
  - marker: b
    text: '''Return to me'' can also be rendered ''Turn back to me,'' carrying covenantal
      and repentant overtones.'
    reason: lexical_alternative
  - marker: c
    text: Or possibly, in prophetic idiom, 'I will wipe away ... I will redeem you.'
    reason: alternative_reading
lexical_decisions:
- source_word: מָחִיתִי
  chosen: I have wiped away
  alternatives:
  - I have blotted out
  - I have erased
  lexicon: HALOT
  rationale: The verb מחה commonly conveys wiping out, blotting out, or erasing. 'Wiped
    away' is natural modern English and preserves the image of removal, fitting the
    following cloud imagery. 'Blotted out' is traditional and viable, but sounds more
    idiomatic to written records than to the meteorological similes in this verse.
- source_word: כָעָב
  chosen: like a cloud
  alternatives:
  - as a cloud
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. עָב denotes a cloud, often a thick cloud.
    'Like a cloud' is the most natural English simile here.
- source_word: פְּשָׁעֶיךָ
  chosen: your transgressions
  alternatives:
  - your rebellions
  - your offenses
  lexicon: HALOT
  rationale: פשע often carries the sense of rebellion or transgression rather than
    generic wrongdoing. 'Transgressions' preserves the moral-legal force without overinterpreting
    as overt political rebellion.
- source_word: וְכֶעָנָן
  chosen: and ... like a mist
  alternatives:
  - and like a cloud
  - and like a rain cloud
  lexicon: HALOT
  rationale: עָנָן can mean cloud, but in parallel with עָב many translators distinguish
    the terms to preserve the poetic variation. 'Mist' communicates something vapor-like
    and fleeting, matching the image of disappearance. The conjunction is carried
    into the clause structure in English.
- source_word: חַטֹּאותֶיךָ
  chosen: your sins
  alternatives:
  - your sin-offenses
  lexicon: HALOT
  rationale: The common and contextually appropriate rendering of חטאות is 'sins.'
    It pairs naturally with 'transgressions' in the parallel line.
- source_word: שׁוּבָה אֵלַי
  chosen: Return to me
  alternatives:
  - Turn back to me
  - Come back to me
  lexicon: HALOT
  rationale: שוב in the imperative commonly means return/turn back, often with covenantal
    overtones of repentance and restoration. 'Return to me' is concise and preserves
    both relational and covenantal force.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'כִּי here introduces the ground for the imperative: Israel should return
    because God has already acted redemptively. ''For'' preserves that explanatory
    force in a compact way.'
- source_word: גְאַלְתִּיךָ
  chosen: I have redeemed you
  alternatives:
  - I have ransomed you
  - I have reclaimed you
  lexicon: HALOT
  rationale: גאל is a key covenant-redemption term, often involving a kinsman-redeemer
    or deliverance claim. 'Redeemed' best preserves the theological weight and broad
    biblical resonance without narrowing the mechanism.
