theological_decisions:
- issue: Aspect and sequencing of the perfect verbs
  chosen_reading: Render both perfects as present-result perfects ('I have wiped away
    ... I have redeemed you')
  alternative_readings:
  - Simple past ('I wiped away ... I redeemed you')
  - Prophetic perfect with future sense ('I will wipe away ... I will redeem you')
  rationale: In context, the verse grounds the call to return in Yahweh's accomplished
    or assured redemptive action. English present perfect captures completed action
    with present relevance. A future rendering is possible in prophetic discourse,
    but the immediate exhortation is stronger if based on an already-declared divine
    act.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
