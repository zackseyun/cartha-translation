id: ISA.44.28
reference: Isaiah 44:28
source:
  edition: WLC
  text: הָ/אֹמֵ֤ר לְ/כ֨וֹרֶשׁ֙ רֹעִ֔/י וְ/כָל חֶפְצִ֖/י יַשְׁלִ֑ם וְ/לֵ/אמֹ֤ר לִ/ירוּשָׁלִַ֨ם֙
    תִּבָּנֶ֔ה וְ/הֵיכָ֖ל תִּוָּסֵֽד־׃ס
translation:
  text: who says of Cyrus, ‘He is my shepherd, and he will fulfill all my purpose,’
    saying of Jerusalem, ‘She will be rebuilt,’ and of the temple, ‘Its foundation
    will be laid.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Cyrus'; the Hebrew preposition can be understood as introducing either
      the one spoken about or the one addressed.
    reason: lexical_alternative
  - marker: b
    text: Or 'It will be rebuilt.' The Hebrew uses a feminine singular verb with 'Jerusalem,'
      allowing the city to be personified as 'she.'
    reason: lexical_alternative
  - marker: c
    text: Or 'it will be founded' / 'it will be established.' The Hebrew verb refers
      to laying a foundation.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹמֵר
  chosen: who says
  alternatives:
  - the one saying
  - who is saying
  lexicon: HALOT
  rationale: Articular participle of אמר functioning relative to the preceding reference
    to the LORD; English relative clause 'who says' is natural and preserves the participial
    force without awkwardness.
- source_word: לְכוֹרֶשׁ
  chosen: of Cyrus
  alternatives:
  - to Cyrus
  - concerning Cyrus
  lexicon: HALOT
  rationale: The preposition ל with אמר can introduce the person addressed or the
    one spoken of. Here the following predicate 'my shepherd' and the broader syntax
    favor 'of Cyrus'/'concerning Cyrus' rather than direct address.
- source_word: רֹעִי
  chosen: my shepherd
  alternatives:
  - my shepherd-ruler
  - my pastor
  lexicon: HALOT
  rationale: Literal rendering of רעה imagery. 'Shepherd' preserves the royal/governing
    metaphor common in the Hebrew Bible without over-interpreting it as merely political
    or pastoral.
- source_word: וְכָל חֶפְצִי
  chosen: all my purpose
  alternatives:
  - all my pleasure
  - all my desire
  - all that I delight in
  lexicon: HALOT
  rationale: חפץ here denotes what God wills or intends. 'Purpose' communicates divine
    intention in clear modern English better than the more archaic 'pleasure,' while
    remaining close to the Hebrew sense.
- source_word: יַשְׁלִם
  chosen: he will fulfill
  alternatives:
  - he will complete
  - he will accomplish
  lexicon: HALOT
  rationale: Hiphil of שלם conveys causing something to be complete or carried out.
    'Fulfill' fits the object 'all my purpose' and preserves the sense of bringing
    God's intention to completion.
- source_word: וְלֵאמֹר
  chosen: saying
  alternatives:
  - and saying
  - namely, saying
  lexicon: HALOT
  rationale: Infinitive construct of אמר after conjunction introduces the content
    of the divine declaration. 'Saying' keeps the Hebrew structure and links the following
    clauses smoothly.
- source_word: לִירוּשָׁלַם תִּבָּנֶה
  chosen: of Jerusalem, ‘She will be rebuilt,’
  alternatives:
  - to Jerusalem, 'You will be rebuilt'
  - concerning Jerusalem, 'It will be rebuilt'
  lexicon: HALOT
  rationale: Because Jerusalem is grammatically feminine and the verb is 3fs Niphal,
    English can reflect this with 'She will be rebuilt.' This preserves the personified-city
    nuance better than impersonal 'it,' though 'it' is possible.
- source_word: וְהֵיכָל
  chosen: and of the temple
  alternatives:
  - and of the palace-temple
  - and of the sanctuary
  lexicon: HALOT
  rationale: היכל in Isaiah commonly refers to the temple sanctuary. 'Temple' is the
    clearest contextual rendering here, since the rebuilding of Jerusalem and its
    cultic center is in view.
- source_word: תִּוָּסֵד
  chosen: its foundation will be laid
  alternatives:
  - it will be founded
  - it will be established on foundations
  lexicon: HALOT
  rationale: Niphal of יסד refers to founding/laying a foundation. In English, with
    'temple' as antecedent, 'its foundation will be laid' is idiomatic and makes explicit
    the architectural sense implicit in the Hebrew passive.
