theological_decisions:
- issue: Rendering Cyrus as 'my shepherd'
  chosen_reading: 'Retain the metaphor directly: ''He is my shepherd'''
  alternative_readings:
  - my appointed ruler
  - my instrument
  rationale: The verse applies a shepherd metaphor to Cyrus without implying covenant
    membership or messianic status. Preserving the metaphor maintains the theological
    force that God can designate a foreign ruler as his instrument for caring for
    his people and accomplishing his purpose.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
