id: ISA.44.4
reference: Isaiah 44:4
source:
  edition: WLC
  text: וְ/צָמְח֖וּ בְּ/בֵ֣ין חָצִ֑יר כַּ/עֲרָבִ֖ים עַל יִבְלֵי מָֽיִם־־׃
translation:
  text: And they will spring up among the grass like willows by streams of water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like poplars by watercourses.' The Hebrew עֲרָבִים is commonly rendered
      'willows,' though some take it more broadly as a poplar-like waterside tree.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצָמְחוּ
  chosen: And they will spring up
  alternatives:
  - and they will grow
  - and they will sprout
  lexicon: HALOT
  rationale: צמח in the Qal commonly denotes sprouting or growing forth, especially
    of vegetation. 'Spring up' captures the vivid, fresh emergence implied by the
    imagery better than the flatter 'grow,' while preserving the future sense.
- source_word: בְּבֵין
  chosen: among
  alternatives:
  - between
  - in the midst of
  lexicon: HALOT
  rationale: Although literally 'between,' English idiom with a plural or mass setting
    here is better expressed as 'among.' This preserves the spatial sense without
    awkwardness.
- source_word: חָצִיר
  chosen: the grass
  alternatives:
  - grass
  - green grass
  - herbage
  lexicon: HALOT
  rationale: חָצִיר ordinarily refers to grass or herbage. 'The grass' gives a natural
    English rendering for the collective vegetation in the scene; the article is not
    separately marked in Hebrew but is idiomatic in English.
- source_word: כַּעֲרָבִים
  chosen: like willows
  alternatives:
  - like poplars
  - like desert poplars
  lexicon: HALOT
  rationale: עֲרָבִים is traditionally understood as willows, especially in contexts
    associated with watercourses. Some lexicographical discussion allows poplar-like
    trees, but 'willows' best fits both common usage and the immediate watery setting.
    Because the identification is not absolutely certain, the alternative is preserved
    in a footnote.
- source_word: עַל
  chosen: by
  alternatives:
  - upon
  - beside
  - along
  lexicon: HALOT
  rationale: With a locative image of trees and watercourses, עַל can be rendered
    idiomatically as 'by' or 'beside.' 'By' is concise and natural in English.
- source_word: יִבְלֵי מָיִם
  chosen: streams of water
  alternatives:
  - watercourses
  - flowing channels
  - brooks
  lexicon: HALOT
  rationale: The construct phrase denotes flowing channels or courses of water rather
    than water in the abstract. 'Streams of water' is clear, natural, and preserves
    the plural image of multiple channels. 'Watercourses' is more formal and is preserved
    as an alternative.
