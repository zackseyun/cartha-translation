theological_decisions:
- issue: Rendering of Israel's designation עַבְדִּי
  chosen_reading: my servant
  alternative_readings:
  - my slave
  rationale: The verse identifies Jacob/Israel with the covenantal role of the LORD's
    servant. In this context the relational and vocational sense is primary, so 'servant'
    is preferable to the harsher 'slave,' which could overemphasize bondage beyond
    what the immediate context highlights.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of the opening conjunction וְ in וְעַתָּה
  chosen_reading: But now
  alternative_readings:
  - And now
  - Now
  rationale: The broader discourse turns from denunciation of idolatry and blindness
    toward reassurance for Israel. Rendering the conjunction adversatively preserves
    that theological and rhetorical shift without adding content.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
