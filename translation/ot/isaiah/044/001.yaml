id: ISA.44.1
reference: Isaiah 44:1
source:
  edition: WLC
  text: וְ/עַתָּ֥ה שְׁמַ֖ע יַעֲקֹ֣ב עַבְדִּ֑/י וְ/יִשְׂרָאֵ֖ל בָּחַ֥רְתִּי בֽ/וֹ׃
translation:
  text: But now hear, Jacob my servant, and Israel, whom I have chosen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “And now hear, Jacob my servant, and Israel, whom I chose.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: The conjunction plus temporal adverb marks a transition from the preceding
    rebuke/judgment context to a renewed address of consolation. 'But now' best captures
    the discourse contrast in natural English.
- source_word: שְׁמַע
  chosen: hear
  alternatives:
  - listen
  - hear me
  lexicon: HALOT
  rationale: Imperative of שׁמע commonly means 'hear/listen.' 'Hear' preserves the
    prophetic register and directness without adding an object not present in the
    Hebrew.
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Proper name, transliterated according to standard English convention.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave/servant, in prophetic covenantal address
    for Israel 'servant' is the most natural and established rendering, and the bonded-status
    nuance is not theologically foregrounded here as it can be with Greek doulos in
    some NT contexts.
- source_word: וְיִשְׂרָאֵל
  chosen: and Israel
  alternatives:
  - even Israel
  rationale: Coordinates a parallel covenant name for the same people/personified
    nation. 'And Israel' preserves the appositional parallelism straightforwardly.
- source_word: בָּחַרְתִּי בוֹ
  chosen: whom I have chosen
  alternatives:
  - in whom I have chosen
  - I chose
  lexicon: HALOT
  rationale: 'The preposition ב with בחר is idiomatic (''choose in/choose''), and
    English normally renders the sense as a direct object: ''choose.'' Relative clause
    ''whom I have chosen'' fits the Hebrew syntax after ''Israel'' and reads naturally.
    The perfect is rendered ''have chosen'' to reflect a completed act with present
    covenant significance.'
