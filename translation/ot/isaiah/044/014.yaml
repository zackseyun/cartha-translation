theological_decisions:
- issue: Rendering a difficult and compressed description of tree selection and growth
    in an anti-idolatry context
  chosen_reading: 'Translate the verse as a sequence of ordinary actions by the idol-maker:
    cutting or taking timber, allowing/selecting a strong tree among forest trees,
    planting another tree, and rain causing growth.'
  alternative_readings:
  - Read וַיְאַמֶּץ לּוֹ as 'he selects for himself among the trees of the forest
    the strongest one'
  - Render the whole verse more woodenly with consecutive pasts
  rationale: 'The verse is descriptive rather than doctrinally contested. The chosen
    rendering preserves the satire of the context: the idol''s material comes from
    common trees that grow by ordinary rain. Because one clause is syntactically difficult,
    the translation aims for clear English while preserving the basic sense and noting
    alternatives.'
  doctrine_reference: Translation philosophy §1, §3, §6
