id: ISA.44.14
reference: Isaiah 44:14
source:
  edition: WLC
  text: לִ/כְרָת ל֣/וֹ אֲרָזִ֔ים וַ/יִּקַּ֤ח תִּרְזָה֙ וְ/אַלּ֔וֹן וַ/יְאַמֶּץ ל֖/וֹ
    בַּ/עֲצֵי יָ֑עַר נָטַ֥ע אֹ֖רֶ וְ/גֶ֥שֶׁם יְגַדֵּֽל־־־׃
translation:
  text: He cuts down cedars for himself, or he takes a cypress tree or an oak and
    lets it grow strong among the trees of the forest. He plants a pine, and the rain
    makes it grow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew תִּרְזָה refers to a tree species with uncertain identification;
      possible renderings include cypress, holm oak, terebinth, or elm.
    reason: lexical_alternative
  - marker: b
    text: Or 'and strengthens it for himself among the trees of the forest'; the Hebrew
      clause is difficult and may describe either cultivating the tree or selecting
      a strong tree from the forest.
    reason: alternative_reading
  - marker: c
    text: Hebrew אֹרֶ refers to a tree species with uncertain identification; possible
      renderings include pine, fir, ash, or laurel.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִכְרָת
  chosen: He cuts down
  alternatives:
  - to cut down
  - for cutting down
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ל continues the description of
    the idol-maker''s activity from the surrounding context. In English, a finite
    verbal clause is the most natural way to represent the sequence: ''He cuts down.'''
- source_word: לּוֹ
  chosen: for himself
  alternatives:
  - for him
  - for his use
  lexicon: HALOT
  rationale: The dative pronoun indicates personal benefit or purpose; 'for himself'
    brings out that the wood is procured for the craftsman's own project.
- source_word: אֲרָזִים
  chosen: cedars
  alternatives:
  - cedar trees
  lexicon: HALOT
  rationale: Standard rendering of the plural noun for cedar trees; concise plural
    'cedars' is natural in English.
- source_word: וַיִּקַּח
  chosen: or he takes
  alternatives:
  - and he takes
  - then he takes
  lexicon: HALOT
  rationale: In this list-like description, waw can be represented idiomatically as
    'or' to reflect alternative kinds of wood selected by the craftsman rather than
    strict temporal sequence.
- source_word: תִּרְזָה
  chosen: a cypress tree
  alternatives:
  - holm oak
  - terebinth
  - elm
  lexicon: HALOT
  rationale: The species identification is uncertain. 'Cypress' is a common modern
    rendering and fits the context of timber suitable for carving. Because the exact
    botanical referent is debated, alternatives are preserved in a footnote.
- source_word: וְאַלּוֹן
  chosen: or an oak
  alternatives:
  - and an oak
  lexicon: HALOT
  rationale: אַלּוֹן is well rendered 'oak.' As with the previous item, 'or' suits
    the sense of selecting one tree type or another.
- source_word: וַיְאַמֶּץ לּוֹ
  chosen: and lets it grow strong
  alternatives:
  - and strengthens it for himself
  - and makes it firm for himself
  - and chooses for himself from among the strong trees
  lexicon: HALOT
  rationale: The verb אמץ commonly means 'make strong/firm.' In context, the sense
    is that he allows or selects the tree as one that becomes strong among forest
    trees. English smoothness favors 'lets it grow strong,' though the Hebrew is somewhat
    compressed and difficult.
- source_word: בַּעֲצֵי יָעַר
  chosen: among the trees of the forest
  alternatives:
  - with the trees of the forest
  - among forest trees
  lexicon: HALOT
  rationale: The phrase locates the tree within the larger stand of forest growth.
    'Among the trees of the forest' is clear and close to the Hebrew.
- source_word: נָטַע
  chosen: He plants
  alternatives:
  - One plants
  - He planted
  lexicon: HALOT
  rationale: The verb introduces another possible source of wood in the general present-like
    description of the craftsman's practice. Present tense fits the discourse in English.
- source_word: אֹרֶ
  chosen: a pine
  alternatives:
  - a laurel
  - an ash tree
  - a fir
  lexicon: HALOT
  rationale: The exact tree species is uncertain. 'Pine' is a common and plausible
    rendering in context, but the uncertainty should be preserved in a footnote.
- source_word: וְגֶשֶׁם יְגַדֵּל
  chosen: and the rain makes it grow
  alternatives:
  - and rain nourishes it
  - and the rain makes it great
  lexicon: HALOT
  rationale: The clause emphasizes ordinary providential growth of the tree before
    it is turned into an idol. 'Makes it grow' captures the causative sense naturally
    in English.
