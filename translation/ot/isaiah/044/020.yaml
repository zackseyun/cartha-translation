id: ISA.44.20
reference: Isaiah 44:20
source:
  edition: WLC
  text: רֹעֶ֣ה אֵ֔פֶר לֵ֥ב הוּתַ֖ל הִטָּ֑/הוּ וְ/לֹֽא יַצִּ֤יל אֶת נַפְשׁ/וֹ֙ וְ/לֹ֣א
    יֹאמַ֔ר הֲ/ל֥וֹא שֶׁ֖קֶר בִּ/ימִינִֽ/י־־׃ס
translation:
  text: He feeds on ashes; a deceived heart has led him astray, and he cannot deliver
    himself or say, “Is there not a lie in my right hand?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he grazes on ashes.' The Hebrew keeps the feeding/pasturing metaphor
      vivid.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'deliver his נפשׁ'; this can mean 'himself,' 'his life,' or 'his
      soul' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹעֶה
  chosen: feeds on
  alternatives:
  - shepherds
  - grazes on
  lexicon: HALOT
  rationale: Qal participle of רעה literally denotes pasturing/grazing. In this metaphorical
    context of idol-folly, 'feeds on' communicates the image naturally in English
    without losing the concrete sense of consuming what is worthless.
- source_word: אֵפֶר
  chosen: ashes
  alternatives:
  - dust
  lexicon: HALOT
  rationale: The noun normally means 'ashes.' This fits the immediate satire of idol-making
    from burned wood and conveys worthlessness and emptiness.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  lexicon: HALOT
  rationale: Hebrew לֵב includes intellect and will as well as emotion. 'Heart' preserves
    the Hebrew anthropological term and its moral-spiritual force.
- source_word: הוּתַל
  chosen: deceived
  alternatives:
  - deluded
  - misled
  lexicon: HALOT
  rationale: Passive form indicating the heart is in a state of deception/delusion.
    'Deceived' is idiomatic and preserves the passive sense.
- source_word: הִטָּהוּ
  chosen: has led him astray
  alternatives:
  - has turned him aside
  - has misled him
  lexicon: HALOT
  rationale: 'From נטה, ''to turn/stretch out,'' here causative with object suffix:
    the deceived heart has diverted him from truth. ''Led him astray'' captures the
    moral-religious deviation clearly.'
- source_word: וְלֹא יַצִּיל אֶת נַפְשׁוֹ
  chosen: and he cannot deliver himself
  alternatives:
  - and he does not save his soul
  - and he cannot rescue his life
  lexicon: HALOT
  rationale: נפש here refers to the person/life/self rather than an abstract immaterial
    soul alone. 'Deliver himself' is natural English and preserves the reflexive force
    of rescuing his own life/person.
- source_word: וְלֹא יֹאמַר
  chosen: or say
  alternatives:
  - and he does not say
  lexicon: HALOT
  rationale: The conjunction links another consequence of delusion. 'Or say' reads
    smoothly in English after the prior negative clause while preserving the sense.
- source_word: הֲלוֹא
  chosen: Is there not
  alternatives:
  - Surely there is
  - Is it not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Is
    there not' preserves the interrogative form and self-confronting tone.
- source_word: שֶׁקֶר
  chosen: a lie
  alternatives:
  - falsehood
  - deception
  lexicon: HALOT
  rationale: The noun denotes falsehood or something deceptive. 'A lie' is concise
    and forceful in the rhetorical question about the idol held in hand.
- source_word: בִּימִינִי
  chosen: in my right hand
  alternatives:
  - in my right side
  - at my right hand
  lexicon: HALOT
  rationale: Literal rendering best preserves the vivid image of the worshiper physically
    holding the idol. The first-person suffix is retained because it belongs to the
    quoted self-question.
