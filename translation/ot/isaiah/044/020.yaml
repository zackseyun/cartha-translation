theological_decisions:
- issue: Anthropological sense of נֶפֶשׁ
  chosen_reading: Rendered as 'himself' rather than 'his soul' in the main text
  alternative_readings:
  - his soul
  - his life
  rationale: The context concerns the idolater's inability to rescue his own person
    from delusion, not a technical statement about the immaterial soul. 'Himself'
    communicates the Hebrew idiom naturally while avoiding importing later doctrinal
    precision the text does not explicitly foreground.
  doctrine_reference: Translation philosophy §1, §3, §6
