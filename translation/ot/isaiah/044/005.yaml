id: ISA.44.5
reference: Isaiah 44:5
source:
  edition: WLC
  text: זֶ֤ה יֹאמַר֙ לַֽ/יהוָ֣ה אָ֔נִי וְ/זֶ֖ה יִקְרָ֣א בְ/שֵֽׁם יַעֲקֹ֑ב וְ/זֶ֗ה יִכְתֹּ֤ב יָד/וֹ֙ לַֽ/יהוָ֔ה וּ/בְ/שֵׁ֥ם יִשְׂרָאֵ֖ל יְכַנֶּֽה־׃פ
translation:
  text: This one will say, ‘I am Yahweh’s’; another will call himself by the name of Jacob; and another will write on his hand, ‘Belonging to Yahweh,’ and will name himself by the name of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “This one will say, ‘To the LORD, I’; another will call by the name of Jacob.” The Hebrew is elliptical and idiomatic.
    reason: lexical_alternative
  - marker: b
    text: “Will write on his hand” likely refers to inscribing or marking the hand as a sign of belonging to the LORD.
    reason: cultural_note
  - marker: c
    text: Or “will surname himself by the name of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה ... וְזֶה ... וְזֶה
  chosen: This one ... another ... and another
  alternatives:
  - one ... another ... another
  - this one ... this one ... this one
  lexicon: HALOT
  rationale: The repeated demonstrative structures mark successive individuals. English varies the repetition slightly for naturalness while preserving the distributive sense.
- source_word: יֹאמַר
  chosen: will say
  alternatives:
  - says
  - shall say
  lexicon: HALOT
  rationale: Imperfect verb in prophetic context is naturally rendered as future here.
- source_word: לַיהוָה
  chosen: the LORD’s
  alternatives:
  - to the LORD
  - for the LORD
  - belonging to the LORD
  lexicon: HALOT
  rationale: 'With the following pronoun אֲנִי, the sense is elliptical: ''I am the LORD''s'' or ''I belong to the LORD.'' English possessive best captures the idiom. The divine name follows doctrine default as ''the LORD.'''
- source_word: אָ֔נִי
  chosen: I am
  alternatives:
  - I
  - I belong
  lexicon: HALOT
  rationale: The independent pronoun completes the verbless sense in English as 'I am,' yielding the idiomatic confession 'I am the LORD’s.'
- source_word: יִקְרָא בְשֵׁם יַעֲקֹב
  chosen: will call himself by the name of Jacob
  alternatives:
  - will call on the name of Jacob
  - will be called by the name of Jacob
  - will invoke the name Jacob
  lexicon: HALOT
  rationale: The idiom קרא בשם can mean to call by a name or proclaim/invoke a name depending on context. Here, in parallel with personal self-identification and inscription, it most likely means adopting/identifying with the covenant people under the name Jacob.
- source_word: יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Proper name transliterated per translation philosophy. In context it stands metonymically for the covenant people, but the name itself is retained.
- source_word: יִכְתֹּב יָדוֹ לַיהוָה
  chosen: will write on his hand, ‘Belonging to the LORD,’
  alternatives:
  - will write his hand to the LORD
  - will inscribe his hand for the LORD
  - will mark his hand as the LORD's
  lexicon: HALOT
  rationale: The Hebrew literally reads 'will write his hand to the LORD,' an idiom commonly understood as inscribing the hand with a mark of belonging. Rendering it as writing on the hand makes the sense clear in English while preserving the concrete imagery. 'Belonging to the LORD' expresses the implied content of the inscription.
- source_word: יָדוֹ
  chosen: his hand
  alternatives:
  - his arm
  lexicon: HALOT
  rationale: Literal body-part term; 'hand' is the straightforward rendering.
- source_word: וּבְשֵׁם יִשְׂרָאֵל יְכַנֶּה
  chosen: and will name himself by the name of Israel
  alternatives:
  - and will surname himself Israel
  - and will be honored by the name of Israel
  - and will give himself the name Israel
  lexicon: HALOT
  rationale: The verb כנה in the piel here refers to designating oneself by a name/title. 'Name himself by the name of Israel' is clear modern English and preserves the reflexive sense of self-identification.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name transliterated. As with Jacob, it denotes covenant identity, but the name itself should remain.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  - LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
