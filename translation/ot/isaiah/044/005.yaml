theological_decisions:
- issue: Nature of the verse's confessional language
  chosen_reading: The verse describes individuals openly identifying themselves as belonging to the LORD and to his covenant people.
  alternative_readings:
  - The verse could be read more loosely as social affiliation with Israel without explicit covenantal confession.
  rationale: The three parallel clauses move from verbal confession to naming to bodily inscription, all signaling deliberate allegiance. The translation preserves that covenantal force without importing later ecclesial categories.
  doctrine_reference: 'Translation philosophy §1, §3; Contested terms: יְהוָה → the LORD'
