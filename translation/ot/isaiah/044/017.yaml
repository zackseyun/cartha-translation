theological_decisions:
- issue: Referent pronoun for the idol
  chosen_reading: Use 'it' for the idol/image in English
  alternative_readings:
  - Use 'him' to mirror the masculine singular Hebrew pronouns
  rationale: The Hebrew uses masculine grammatical agreement for פֶסֶל/אֵל, but English
    naturally refers to an idol as 'it.' This avoids implying actual personhood while
    preserving the satire of idolatry.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §1 (original-language
    primacy without translation-tradition inertia)
