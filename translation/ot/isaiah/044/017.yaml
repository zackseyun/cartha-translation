id: ISA.44.17
reference: Isaiah 44:17
source:
  edition: WLC
  text: וּ/שְׁאֵ֣רִית֔/וֹ לְ/אֵ֥ל עָשָׂ֖ה לְ/פִסְל֑/וֹ יסגוד ל֤/וֹ וְ/יִשְׁתַּ֨חוּ֙
    וְ/יִתְפַּלֵּ֣ל אֵלָ֔י/ו וְ/יֹאמַר֙ הַצִּילֵ֔/נִי כִּ֥י אֵלִ֖/י אָֽתָּה־׃
translation:
  text: And with the rest of it he makes a god—his carved image; he bows down to it
    and worships, and prays to it and says, “Deliver me, for you are my god.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “his idol” for “his carved image.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew uses masculine pronouns for the idol; English renders the referent
      as “it” because the object is an image.
    reason: cultural_note
lexical_decisions:
- source_word: וּשְׁאֵרִיתוֹ
  chosen: And with the rest of it
  alternatives:
  - And the remainder of it
  - And what is left of it
  lexicon: HALOT
  rationale: שְׁאֵרִית means remainder/rest. The prefixed conjunction and 3ms suffix
    point back to the leftover wood from the previous context. 'With the rest of it'
    makes the instrumental sense explicit in natural English.
- source_word: לְאֵל
  chosen: a god
  alternatives:
  - for a god
  - into a god
  lexicon: HALOT
  rationale: אֵל here refers to a deity/object treated as divine, not the true God.
    The preposition ל marks result/purpose with עשה, so 'makes a god' is idiomatic
    English.
- source_word: עָשָׂה
  chosen: he makes
  alternatives:
  - he made
  - he fashions
  lexicon: HALOT
  rationale: The qatal can be rendered with present sense in this prophetic description
    of habitual action. 'Makes' fits the sequence of vivid present/future-like verbs
    describing idol manufacture and worship.
- source_word: לְפִסְלוֹ
  chosen: his carved image
  alternatives:
  - his idol
  - his graven image
  lexicon: HALOT
  rationale: פֶסֶל denotes an idol/image, especially a carved one. 'Carved image'
    preserves the concrete sense better than the more interpretive 'idol,' while remaining
    readable.
- source_word: יִסְגּוֹד לוֹ
  chosen: he bows down to it
  alternatives:
  - he prostrates himself before it
  lexicon: HALOT
  rationale: סגד denotes bowing in homage/worship. 'Bows down' is natural modern English
    and distinguishes it from the following verb enough to preserve the rhetorical
    piling up of worship actions.
- source_word: וְיִשְׁתַּחוּ
  chosen: and worships
  alternatives:
  - and bows himself
  - and prostrates himself
  lexicon: HALOT
  rationale: While שׁחה literally involves bowing/prostration, in worship contexts
    it commonly carries the sense 'worship.' Rendering it 'worships' avoids awkward
    repetition while preserving the cultic force.
- source_word: וְיִתְפַּלֵּל אֵלָיו
  chosen: and prays to it
  alternatives:
  - and prays to him
  lexicon: HALOT
  rationale: התפלל אל means to pray to. Because the referent is an inanimate idol/image,
    'it' is preferable in English, even though Hebrew uses masculine grammatical forms.
- source_word: הַצִּילֵנִי
  chosen: Deliver me
  alternatives:
  - Save me
  - Rescue me
  lexicon: HALOT
  rationale: נצל in the imperative asks for deliverance/rescue. 'Deliver me' fits
    prophetic diction and preserves the irony of asking an idol for salvation.
- source_word: כִּי אֵלִי אָתָּה
  chosen: for you are my god
  alternatives:
  - because you are my god
  lexicon: HALOT
  rationale: כִּי here gives the reason for the plea. אֵלִי is best rendered 'my god,'
    matching the idolatrous claim in context.
