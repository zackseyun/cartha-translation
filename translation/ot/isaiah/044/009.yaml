theological_decisions:
- issue: Referent of 'their witnesses'
  chosen_reading: The phrase refers to the idolaters/testifiers on behalf of the idols,
    not the idols themselves as literal witnesses.
  alternative_readings:
  - The idols themselves are ironically called witnesses
  rationale: The following plural verbs 'do not see' and 'do not know' can describe
    either the idolaters or, ironically, the idols. Rendering 'Their witnesses' without
    further specification preserves the Hebrew's rhetorical ambiguity while allowing
    the immediate context to indict those attached to idols.
- issue: Force of תֹּהוּ
  chosen_reading: A statement of worthlessness/emptiness rather than metaphysical
    nonexistence.
  alternative_readings:
  - chaos
  - formlessness
  rationale: The verse condemns idol-makers and their products as futile and useless.
    Translating תֹּהוּ as 'nothing' communicates practical worthlessness in context
    without making a philosophical claim beyond the text.
