id: ISA.44.9
reference: Isaiah 44:9
source:
  edition: WLC
  text: יֹֽצְרֵי פֶ֤סֶל כֻּלָּ/ם֙ תֹּ֔הוּ וַ/חֲמוּדֵי/הֶ֖ם בַּל יוֹעִ֑ילוּ וְ/עֵדֵי/הֶ֣ם
    הֵׄ֗מָּׄהׄ בַּל יִרְא֛וּ וּ/בַל יֵדְע֖וּ לְמַ֥עַן יֵבֹֽשׁוּ־־־־׃
translation:
  text: All who fashion an idol are nothing, and the things they delight in do not
    profit. Their witnesses neither see nor know, so that they will be put to shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'All idol-makers are emptiness' or 'All who form a carved image are vanity.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their precious things' or 'their desirable things.'
    reason: lexical_alternative
  - marker: c
    text: '''Their witnesses'' may refer to the worshipers who testify for the idols,
      or ironically to the idols themselves.'
    reason: alternative_reading
  - marker: d
    text: Or 'that they may be ashamed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹצְרֵי פֶסֶל
  chosen: who fashion an idol
  alternatives:
  - who form a carved image
  - idol-makers
  lexicon: HALOT
  rationale: יֹצְרֵי is a participial form from יצר, 'to form/fashion,' and פֶסֶל
    denotes an idol/image, often carved. 'Fashion an idol' is natural English while
    preserving the concrete act of making an idol.
- source_word: כֻּלָּם
  chosen: All who
  alternatives:
  - all of them
  lexicon: HALOT
  rationale: With the participial phrase, כֻּלָּם is best brought forward idiomatically
    as 'All who...' rather than the more wooden 'the makers of an idol, all of them.'
- source_word: תֹּהוּ
  chosen: nothing
  alternatives:
  - vanity
  - emptiness
  - chaos
  lexicon: HALOT
  rationale: תֹּהוּ here expresses worthlessness/emptiness rather than primordial
    chaos. 'Nothing' communicates the polemical force clearly in modern English; 'vanity'
    is traditional but less transparent.
- source_word: וַחֲמוּדֵיהֶם
  chosen: the things they delight in
  alternatives:
  - their precious things
  - their desirable things
  - their cherished idols
  lexicon: HALOT
  rationale: From חמד, the noun refers to desirable/precious things. In context it
    points to the idols or idol-objects prized by their makers. 'The things they delight
    in' preserves the affective sense without over-specifying beyond the Hebrew.
- source_word: בַּל יוֹעִילוּ
  chosen: do not profit
  alternatives:
  - are of no use
  - do not benefit
  lexicon: HALOT
  rationale: יבל/יעל in Hiphil commonly means 'to profit, benefit.' 'Do not profit'
    is concise and close to the Hebrew idiom.
- source_word: וְעֵדֵיהֶם
  chosen: Their witnesses
  alternatives:
  - their witnesses are they
  - those who testify for them
  lexicon: HALOT
  rationale: The suffix most naturally refers to witnesses associated with the idols,
    likely the idolaters themselves as those who would attest to them. 'Their witnesses'
    preserves the ambiguity and the possessive relation.
- source_word: הֵמָּה
  chosen: neither see nor know
  alternatives:
  - they themselves
  - as for them
  lexicon: HALOT
  rationale: הֵמָּה is an emphatic pronoun. In English the emphasis can be absorbed
    into the clause without awkwardness; the sense is that these witnesses themselves
    lack perception and knowledge.
- source_word: בַּל יִרְאוּ וּבַל יֵדְעוּ
  chosen: neither see nor know
  alternatives:
  - do not see and do not know
  lexicon: HALOT
  rationale: The paired negatives form a compact accusation of blindness and ignorance.
    'Neither...nor...' is idiomatic and preserves both verbs.
- source_word: לְמַעַן יֵבֹשׁוּ
  chosen: so that they will be put to shame
  alternatives:
  - that they may be ashamed
  - with the result that they are ashamed
  lexicon: HALOT
  rationale: 'לְמַעַן can mark purpose or result. In this prophetic denunciation,
    a result nuance fits well: their blindness leads to shame. ''Will be put to shame''
    captures the passive-like force of בוש in context and reads naturally.'
