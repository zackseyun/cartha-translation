id: ISA.44.27
reference: Isaiah 44:27
source:
  edition: WLC
  text: הָ/אֹמֵ֥ר לַ/צּוּלָ֖ה חֳרָ֑בִי וְ/נַהֲרֹתַ֖יִ/ךְ אוֹבִֽישׁ׃
translation:
  text: who says to the deep, ‘Be dry, and I will dry up your rivers,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the depths.' The Hebrew term refers to the watery deep.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹמֵר
  chosen: who says
  alternatives:
  - the one saying
  - who said
  lexicon: HALOT
  rationale: 'The participle with article functions substantivally and continues the
    description from the preceding context: ''the one/who says.'' Present ''who says''
    is natural English and preserves the participial force better than a simple past.'
- source_word: לַצּוּלָה
  chosen: to the deep
  alternatives:
  - to the depths
  - to the deep sea
  lexicon: HALOT
  rationale: צּוּלָה denotes the deep or depths, especially watery depth. 'The deep'
    is idiomatic, concise, and fits the imagery of commanding waters.
- source_word: חֳרָבִי
  chosen: Be dry
  alternatives:
  - Dry up
  - Become dry
  lexicon: HALOT
  rationale: Imperative feminine singular addressed to the feminine noun 'deep.' 'Be
    dry' is a natural imperative in English and avoids over-interpreting aspect, while
    still conveying the command.
- source_word: וְנַהֲרֹתַיִךְ
  chosen: and your rivers
  alternatives:
  - and your streams
  lexicon: HALOT
  rationale: נְהָרוֹת is the plural of 'river.' The 2fs suffix matches the feminine
    addressee ('the deep'). 'Rivers' is the most direct rendering.
- source_word: אוֹבִישׁ
  chosen: I will dry up
  alternatives:
  - I dry up
  - I will make dry
  lexicon: HALOT
  rationale: 'Hiphil imperfect 1cs of יבש expresses causative future sense in context:
    God declares what he will do. ''I will dry up'' is the clearest idiomatic English
    rendering.'
