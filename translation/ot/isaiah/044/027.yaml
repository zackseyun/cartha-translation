theological_decisions:
- issue: Identity of the speaker and relation to surrounding context
  chosen_reading: Retain the relative clause 'who says...' without supplying 'the
    LORD' in this verse.
  alternative_readings:
  - Expand to 'who says' with an explicit subject supplied from context
  rationale: The Hebrew verse is syntactically dependent on the preceding description
    of God. Supplying the subject in the main text would add words not present here.
    The translation preserves the literary flow and lets the context identify the
    speaker.
  doctrine_reference: Translation philosophy §1, §3
