id: ISA.44.6
reference: Isaiah 44:6
source:
  edition: WLC
  text: כֹּֽה אָמַ֨ר יְהוָ֧ה מֶֽלֶךְ יִשְׂרָאֵ֛ל וְ/גֹאֲל֖/וֹ יְהוָ֣ה צְבָא֑וֹת אֲנִ֤י רִאשׁוֹן֙ וַ/אֲנִ֣י אַחֲר֔וֹן וּ/מִ/בַּלְעָדַ֖/י אֵ֥ין אֱלֹהִֽים־־׃
translation:
  text: 'Thus says Yahweh, the King of Israel and his Redeemer, Yahweh of Armies: I am the first, and I am the last; apart from me there is no God.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the LORD of Hosts.'
    reason: lexical_alternative
  - marker: b
    text: Or 'besides me there is no god.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the King of Israel
  alternatives:
  - Israel's King
  lexicon: HALOT
  rationale: A straightforward construct rendering. 'The King of Israel' preserves the formal title and the appositional structure following 'the LORD'.
- source_word: גֹאֲלוֹ
  chosen: his Redeemer
  alternatives:
  - his Kinsman-Redeemer
  - the one who redeems him
  lexicon: HALOT
  rationale: גאל in this nominal participial form denotes one who redeems/delivers, often with kinship overtones. 'Redeemer' is the most natural and theologically established English equivalent here; 'Kinsman-Redeemer' would over-specify a nuance not explicit in the immediate wording.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  - the LORD Almighty
  lexicon: HALOT
  rationale: צְבָאוֹת literally refers to armies/hosts. 'The LORD of Armies' translates the title rather than preserving traditional ecclesial wording 'hosts,' in keeping with source-language primacy and readable modern English. 'Almighty' is interpretive rather than lexical.
- source_word: אֲנִי רִאשׁוֹן
  chosen: I am the first
  alternatives:
  - I am first
  lexicon: HALOT
  rationale: The predicate adjective with explicit pronoun is naturally rendered with the copula in English. The wording preserves the emphatic self-identification.
- source_word: וַאֲנִי אַחֲרוֹן
  chosen: and I am the last
  alternatives:
  - and I am last
  lexicon: HALOT
  rationale: Parallel to the previous clause; retaining 'I am' reflects the Hebrew pronoun and preserves the balanced, solemn cadence.
- source_word: וּמִבַּלְעָדַי
  chosen: apart from me
  alternatives:
  - besides me
  - except for me
  lexicon: HALOT
  rationale: The prepositional expression means 'besides/apart from me.' 'Apart from me' is idiomatic modern English and clearly conveys exclusivity.
- source_word: אֵין אֱלֹהִים
  chosen: there is no God
  alternatives:
  - there is no god
  lexicon: HALOT
  rationale: Although אֱלֹהִים can be rendered generically as 'god,' the singular existential statement in this monotheistic declaration is best rendered 'God' in English to reflect the absolute claim about deity, not merely the absence of rival lesser gods.
