theological_decisions:
- issue: Rendering the divine title יְהוָה צְבָאוֹת
  chosen_reading: Yahweh of Armies
  alternative_readings:
  - the LORD of Hosts
  - the LORD Almighty
  rationale: The chosen rendering is the most transparent lexical translation of the Hebrew while remaining readable. It avoids the traditional but less transparent 'Hosts' and the more interpretive 'Almighty.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 2, 6; Contested terms table for יְהוָה'
- issue: Monotheistic force of אֵין אֱלֹהִים
  chosen_reading: there is no God
  alternative_readings:
  - there is no god
  rationale: The verse asserts YHWH's unique deity in an absolute sense. Capitalizing 'God' in English reflects that absolute monotheistic claim without adding content beyond the Hebrew.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; here the context is not genuinely ambiguous'
