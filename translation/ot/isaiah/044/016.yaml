id: ISA.44.16
reference: Isaiah 44:16
source:
  edition: WLC
  text: חֶצְי/וֹ֙ שָׂרַ֣ף בְּמוֹ אֵ֔שׁ עַל חֶצְי/וֹ֙ בָּשָׂ֣ר יֹאכֵ֔ל יִצְלֶ֥ה צָלִ֖י
    וְ/יִשְׂבָּ֑ע אַף יָחֹם֙ וְ/יֹאמַ֣ר הֶאָ֔ח חַמּוֹתִ֖י רָאִ֥יתִי אֽוּר־־־׃
translation:
  text: 'Half of it he burns in the fire; over the other half he eats meat: he roasts
    a roast and is satisfied. He also warms himself and says, “Aha! I am warm; I have
    seen the fire.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “he roasts meat”; Hebrew literally uses a cognate expression, “he roasts
      a roast.”
    reason: lexical_alternative
  - marker: b
    text: Or “I have seen the flame.” The Hebrew noun can denote fire, flame, or glowing
      light.
    reason: lexical_alternative
  - marker: c
    text: Or 'he eats meat, he roasts a roast'.
    reason: previous_rendering
lexical_decisions:
- source_word: חֶצְיוֹ
  chosen: half of it
  alternatives:
  - its half
  - half
  lexicon: HALOT
  rationale: The noun means 'half' with a 3ms suffix referring back to the piece of
    wood/idol material in context. 'Half of it' is idiomatic English and preserves
    the partitive sense.
- source_word: שָׂרַף
  chosen: he burns
  alternatives:
  - he burned
  lexicon: HALOT
  rationale: 'Although morphologically perfect, in this descriptive sequence it functions
    naturally as present in English narrative: the craftsman''s habitual action is
    being described. Present tense keeps the satire vivid and aligns with the following
    imperfects.'
- source_word: בְּמוֹ אֵשׁ
  chosen: in the fire
  alternatives:
  - with fire
  - by fire
  lexicon: HALOT
  rationale: The prepositional phrase indicates the medium/instrument. 'In the fire'
    is the most natural English rendering in this context of burning fuel.
- source_word: עַל חֶצְיוֹ
  chosen: over the other half
  alternatives:
  - on the other half
  - from the other half
  lexicon: HALOT
  rationale: The phrase introduces what he does with the remaining portion. 'Over
    the other half' reflects the Hebrew preposition while making sense in English
    as the sphere/topic of action; 'other' is supplied for clarity from the contrastive
    context.
- source_word: בָּשָׂר יֹאכֵל
  chosen: he eats meat
  alternatives:
  - he eats flesh
  lexicon: HALOT
  rationale: בָּשָׂר here refers to animal flesh as food, so 'meat' is the natural
    modern English equivalent.
- source_word: יִצְלֶה צָלִי
  chosen: he roasts a roast
  alternatives:
  - he roasts meat
  - he roasts it
  lexicon: HALOT
  rationale: The verb-noun cognate intensifies the action. 'He roasts a roast' preserves
    the Hebrew wordplay and concreteness better than flattening it to 'he roasts meat.'
- source_word: וְיִשְׂבָּע
  chosen: and is satisfied
  alternatives:
  - and is full
  - and has his fill
  lexicon: HALOT
  rationale: The verb denotes being sated or satisfied after eating. 'Is satisfied'
    is clear, natural, and preserves the resultative sense.
- source_word: אַף
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: HALOT
  rationale: Here the particle adds another action in the sequence. 'Also' fits the
    cumulative satire.
- source_word: יָחֹם
  chosen: he warms himself
  alternatives:
  - he becomes warm
  - he is warm
  lexicon: HALOT
  rationale: In context the man uses the fire for personal warmth. 'He warms himself'
    makes the reflexive sense explicit in idiomatic English.
- source_word: הֶאָח
  chosen: Aha!
  alternatives:
  - Ah!
  - Ha!
  lexicon: HALOT
  rationale: An interjection of pleased exclamation. 'Aha!' captures the self-satisfied
    tone of the idol-maker's remark.
- source_word: חַמּוֹתִי
  chosen: I am warm
  alternatives:
  - I have become warm
  - I am warmed
  lexicon: HALOT
  rationale: The perfect expresses the attained state. 'I am warm' is the most natural
    English expression of the result.
- source_word: רָאִיתִי אוּר
  chosen: I have seen the fire
  alternatives:
  - I have seen the flame
  - I see the blaze
  lexicon: HALOT
  rationale: 'אוּר denotes fire/light/flame. ''Fire'' best matches the immediate context
    and keeps the irony: he delights in the very fire made from the same material
    later fashioned into an idol.'
