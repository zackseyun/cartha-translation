id: ISA.44.26
reference: Isaiah 44:26
source:
  edition: WLC
  text: מֵקִים֙ דְּבַ֣ר עַבְדּ֔/וֹ וַ/עֲצַ֥ת מַלְאָכָ֖י/ו יַשְׁלִ֑ים הָ/אֹמֵ֨ר לִ/ירוּשָׁלִַ֜ם
    תּוּשָׁ֗ב וּ/לְ/עָרֵ֤י יְהוּדָה֙ תִּבָּנֶ֔ינָה וְ/חָרְבוֹתֶ֖י/הָ אֲקוֹמֵֽם׃
translation:
  text: who confirms the word of his servant and fulfills the counsel of his messengers,
    who says of Jerusalem, ‘She will be inhabited,’ and of the cities of Judah, ‘They
    will be rebuilt,’ and ‘I will raise up her ruins.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “his angels”; the Hebrew word can mean either human messengers or heavenly
      messengers, but here likely refers to prophetic agents.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵקִים
  chosen: confirms
  alternatives:
  - establishes
  - raises up
  lexicon: HALOT
  rationale: The Hiphil participle of קום here governs 'the word' and idiomatically
    means causing it to stand, hence 'confirms' or 'establishes.' 'Confirms' fits
    English idiom well with 'word' while preserving the sense of validating and bringing
    to pass.
- source_word: דְּבַר עַבְדּוֹ
  chosen: the word of his servant
  alternatives:
  - the message of his servant
  lexicon: HALOT
  rationale: דבר can mean 'word' or 'matter/message.' 'Word' preserves the formal
    link and suits the prophetic context, while 'his servant' is singular in the Hebrew
    and should remain singular.
- source_word: וַעֲצַת
  chosen: and the counsel
  alternatives:
  - and the plan
  - and the purpose
  lexicon: HALOT
  rationale: עצה denotes counsel, plan, or purpose. 'Counsel' preserves the deliberative
    nuance and pairs naturally with 'fulfills.'
- source_word: מַלְאָכָיו
  chosen: his messengers
  alternatives:
  - his angels
  lexicon: HALOT
  rationale: מלאך can denote either human messengers or angels. In this prophetic
    context, parallel to 'his servant' and to the proclamation about Jerusalem and
    Judah, 'messengers' best fits prophetic agents. The alternative 'angels' is worth
    preserving in a footnote because the Hebrew term can bear that sense in other
    contexts.
- source_word: יַשְׁלִים
  chosen: fulfills
  alternatives:
  - completes
  - brings to completion
  lexicon: HALOT
  rationale: The Hiphil of שלם here means to complete or carry out. 'Fulfills' is
    idiomatic with 'counsel' in English and conveys effective accomplishment.
- source_word: הָאֹמֵר
  chosen: who says
  alternatives:
  - the one who says
  lexicon: HALOT
  rationale: The article with participle functions substantivally, referring back
    to God descriptively. 'Who says' keeps the relative flow in English.
- source_word: לִירוּשָׁלִַם
  chosen: of Jerusalem
  alternatives:
  - to Jerusalem
  lexicon: HALOT
  rationale: Although the preposition is literally 'to,' English idiom with verbs
    of speaking often uses 'of' when introducing the content spoken concerning a city.
    This avoids awkwardness while preserving the referential sense.
- source_word: תּוּשָׁב
  chosen: She will be inhabited
  alternatives:
  - She will be settled
  - She will be lived in
  lexicon: HALOT
  rationale: The form is best taken as a passive/resultative sense from ישב with Jerusalem
    as feminine singular. 'She will be inhabited' preserves the city-as-feminine personification
    and the restoration sense.
- source_word: וּלְעָרֵי יְהוּדָה
  chosen: and of the cities of Judah
  alternatives:
  - and to the cities of Judah
  lexicon: HALOT
  rationale: As with Jerusalem, English idiom prefers 'of' when introducing what is
    declared concerning them.
- source_word: תִּבָּנֶינָה
  chosen: They will be rebuilt
  alternatives:
  - They will be built
  lexicon: HALOT
  rationale: The Niphal can be rendered 'be built,' but in a restoration oracle after
    devastation, 'rebuilt' makes explicit the restorative force already implied by
    context without overstepping the sense.
- source_word: וְחָרְבוֹתֶיהָ
  chosen: her ruins
  alternatives:
  - her waste places
  - her devastated places
  lexicon: HALOT
  rationale: חרבות refers to ruins or devastated places. 'Her ruins' is concise, natural,
    and preserves the feminine singular reference back to Jerusalem/Judah's cities
    collectively in context.
- source_word: אֲקוֹמֵם
  chosen: I will raise up
  alternatives:
  - I will restore
  - I will set up
  lexicon: HALOT
  rationale: The first-person verb from קום returns to the restoration motif. 'Raise
    up' is a vivid, fairly literal rendering that works well with 'ruins'; 'restore'
    is interpretive and therefore left as an alternative.
