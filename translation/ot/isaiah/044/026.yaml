theological_decisions:
- issue: Referent of 'his servant' and 'his messengers'
  chosen_reading: Generic prophetic agents through whom God announces restoration
  alternative_readings:
  - A specific servant such as Isaiah
  - A broader collective of prophetic spokesmen
  rationale: The verse itself does not identify the servant by name. The translation
    therefore preserves the singular/plural forms without specifying identity, avoiding
    doctrinal overreach while allowing the immediate prophetic context to stand.
  doctrine_reference: Preserve theological tension rather than resolve it.
