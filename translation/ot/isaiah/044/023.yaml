id: ISA.44.23
reference: Isaiah 44:23
source:
  edition: WLC
  text: רָנּ֨וּ שָׁמַ֜יִם כִּֽי עָשָׂ֣ה יְהוָ֗ה הָרִ֨יעוּ֙ תַּחְתִּיּ֣וֹת אָ֔רֶץ פִּצְח֤וּ
    הָרִים֙ רִנָּ֔ה יַ֖עַר וְ/כָל עֵ֣ץ בּ֑/וֹ כִּֽי גָאַ֤ל יְהוָה֙ יַֽעֲקֹ֔ב וּ/בְ/יִשְׂרָאֵ֖ל
    יִתְפָּאָֽר־־־׃פ
translation:
  text: Sing for joy, O heavens, for the LORD has done it; shout aloud, depths of
    the earth. Break forth into singing, O mountains, forest, and every tree in it;
    for the LORD has redeemed Jacob, and in Israel he displays his glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for the LORD has acted' or 'for the LORD has done this.' The Hebrew
      leaves the object of 'has done' unstated.
    reason: lexical_alternative
  - marker: b
    text: Or, 'lowest parts of the earth.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'and in Israel he glorifies himself' or 'shows himself glorious.'
    reason: alternative_reading
lexical_decisions:
- source_word: רָנּוּ
  chosen: Sing for joy
  alternatives:
  - Shout for joy
  - Sing
  lexicon: HALOT
  rationale: Imperative plural from רנן, commonly expressing jubilant vocal praise.
    'Sing for joy' captures both the musical and exultant sense in natural English.
- source_word: שָׁמַיִם
  chosen: O heavens
  alternatives:
  - heavens
  - sky
  lexicon: HALOT
  rationale: Vocative address to the heavens in poetic personification. 'O heavens'
    preserves the elevated prophetic style.
- source_word: כִּי עָשָׂה יְהוָה
  chosen: for the LORD has done it
  alternatives:
  - for the LORD has acted
  - for the LORD has done this
  lexicon: HALOT
  rationale: עשה is broad ('do, make, act'). In this celebratory context, 'has done
    it' is idiomatic and preserves the absolute use without over-specifying the object.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and broad English readability.
- source_word: הָרִיעוּ
  chosen: shout aloud
  alternatives:
  - raise a shout
  - give a joyful shout
  lexicon: HALOT
  rationale: Hiphil imperative of רוע in a jubilant acclamatory sense. 'Shout aloud'
    is concise and natural, matching the poetic summons.
- source_word: תַּחְתִּיּוֹת אָרֶץ
  chosen: depths of the earth
  alternatives:
  - lowest parts of the earth
  - underparts of the earth
  lexicon: HALOT
  rationale: A poetic expression for the earth's lower regions. 'Depths of the earth'
    is idiomatic English and preserves the cosmic scope of the summons.
- source_word: פִּצְחוּ
  chosen: Break forth
  alternatives:
  - burst out
  - break out
  lexicon: HALOT
  rationale: Imperative conveying sudden exuberant outburst. 'Break forth' fits prophetic
    poetry and pairs well with the following noun of joyful song.
- source_word: רִנָּה
  chosen: into singing
  alternatives:
  - into joyful song
  - with a ringing cry
  lexicon: HALOT
  rationale: The noun denotes a cry of joy or ringing song. 'Into singing' yields
    smooth English after 'Break forth' while preserving the praise context.
- source_word: הָרִים
  chosen: O mountains
  alternatives:
  - mountains
  lexicon: HALOT
  rationale: Vocative continuation of the cosmic summons; 'O' marks direct address
    in poetic style.
- source_word: יַעַר וְכָל עֵץ בּוֹ
  chosen: forest, and every tree in it
  alternatives:
  - forest and all its trees
  - woodland and every tree in it
  lexicon: HALOT
  rationale: The singular 'forest' functions collectively. 'Every tree in it' closely
    reflects the Hebrew while remaining readable.
- source_word: גָאַל
  chosen: has redeemed
  alternatives:
  - has ransomed
  - has reclaimed
  lexicon: HALOT
  rationale: גאל often carries covenantal-redemptive force. 'Redeemed' best preserves
    the theological weight without unnecessary expansion.
- source_word: יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Proper name retained by standard transliteration; here it stands metonymically
    for the covenant people.
- source_word: וּבְיִשְׂרָאֵל יִתְפָּאָר
  chosen: and in Israel he displays his glory
  alternatives:
  - and in Israel he glorifies himself
  - and in Israel he shows himself glorious
  lexicon: HALOT
  rationale: Hitpael of פאר can mean 'show oneself glorious/glorify oneself.' 'Displays
    his glory' communicates the reflexive sense in clear modern English without awkwardness.
