theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This preserves continuity
    with Jewish reverence practice and common English Bible convention while avoiding
    a speculative vocalization in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of יִתְפָּאָר in the final clause
  chosen_reading: he displays his glory
  alternative_readings:
  - he glorifies himself
  - he shows himself glorious
  rationale: The Hebrew presents God as manifesting his glory in/through Israel. The
    chosen rendering preserves that theological sense while using natural English.
    It avoids implying that Israel glorifies God as the grammatical subject, which
    the Hebrew morphology does not support.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
