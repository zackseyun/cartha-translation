theological_decisions:
- issue: Meaning of רוּחִי in a promise context
  chosen_reading: my Spirit
  alternative_readings:
  - my breath
  - my wind
  rationale: The verse uses water imagery metaphorically for divine life and blessing,
    then interprets that imagery with the parallel 'my Spirit' and 'my blessing.'
    Rendering רוּחִי as 'my Spirit' preserves the theological force of God's personal
    empowering presence rather than reducing it to an impersonal natural image.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referent of צָמֵא
  chosen_reading: thirsty land
  alternative_readings:
  - the thirsty person/people
  rationale: 'The immediate poetic parallel is environmental: ''streams on the dry
    ground.'' Reading the adjective substantivally of land best preserves the synonymous
    parallelism before the metaphor shifts to offspring and descendants in the second
    half of the verse.'
  doctrine_reference: Translation philosophy §1, §6
