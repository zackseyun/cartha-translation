id: ISA.44.3
reference: Isaiah 44:3
source:
  edition: WLC
  text: כִּ֤י אֶצָּק מַ֨יִם֙ עַל צָמֵ֔א וְ/נֹזְלִ֖ים עַל יַבָּשָׁ֑ה אֶצֹּ֤ק רוּחִ/י֙
    עַל זַרְעֶ֔/ךָ וּ/בִרְכָתִ֖/י עַל צֶאֱצָאֶֽי/ךָ־־־־־׃
translation:
  text: For I will pour water on the thirsty land, and streams on the dry ground;
    I will pour out my Spirit on your offspring, and my blessing on your descendants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the thirsty'; the Hebrew adjective can stand substantivally, but the
      parallel with 'dry ground' favors understanding the image as thirsty land.
    reason: alternative_reading
  - marker: b
    text: Or 'flowing waters' for 'streams'; the Hebrew term is literally 'things
      flowing.'
    reason: lexical_alternative
  - marker: c
    text: '''My Spirit'' could also be rendered ''my breath'' or ''my wind,'' but
      here the context of divine blessing on future generations favors ''Spirit.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding promise. 'For'
    fits the discourse flow in English and preserves the causal/explanatory force.
- source_word: אֶצָּק / אֶצֹּק (יצק)
  chosen: I will pour / I will pour out
  alternatives:
  - I will cast
  - I will pour forth
  lexicon: HALOT
  rationale: The verb denotes pouring out liquid. In the first clause 'pour' works
    naturally with water; in the second, 'pour out' is idiomatic in English with 'my
    Spirit' and preserves the metaphorical extension without over-paraphrase.
- source_word: מַיִם
  chosen: water
  lexicon: HALOT
  rationale: Basic literal sense; singular mass noun is standard English rendering.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Simple preposition of direction/placement. 'On' is natural modern English;
    'upon' would be more formal without adding meaning.
- source_word: צָמֵא
  chosen: the thirsty land
  alternatives:
  - the thirsty
  - the thirsty one
  - the thirsty ground
  lexicon: HALOT
  rationale: Although formally an adjective meaning 'thirsty,' the parallel with 'dry
    ground' indicates a landscape image rather than a thirsty person. Supplying 'land'
    makes the metaphor explicit in idiomatic English and preserves the parallelism.
- source_word: וְנֹזְלִים
  chosen: and streams
  alternatives:
  - and flowing waters
  - and rivulets
  - and floods
  lexicon: HALOT
  rationale: Literally the participle means 'things flowing.' In parallel with 'water'
    and 'dry ground,' it refers to flowing watercourses. 'Streams' is concise, natural,
    and image-preserving. 'Floods' is traditional in some versions but overstates
    the lexical sense here.
- source_word: יַבָּשָׁה
  chosen: the dry ground
  alternatives:
  - dry land
  - parched land
  lexicon: HALOT
  rationale: Denotes dry ground/land. 'Dry ground' pairs well with the supplied 'thirsty
    land' and keeps the physical imagery clear.
- source_word: רוּחִי
  chosen: my Spirit
  alternatives:
  - my רוח
  - my breath
  - my wind
  lexicon: HALOT
  rationale: רוּחַ can mean spirit, wind, or breath, but in this promise of divine
    blessing on descendants, 'my Spirit' is the most contextually fitting and theologically
    established sense. Capitalization reflects reference to God's Spirit in English
    style, not an added doctrinal claim beyond the possessive 'my'.
- source_word: זַרְעֶךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: Though literally 'seed,' 'offspring' is the most natural singular collective
    in modern English and preserves the generational sense.
- source_word: וּבִרְכָתִי
  chosen: and my blessing
  alternatives:
  - and my favor
  lexicon: HALOT
  rationale: Standard rendering of the noun; preserves covenantal and benefactive
    sense without narrowing it.
- source_word: צֶאֱצָאֶיךָ
  chosen: your descendants
  alternatives:
  - those who come from you
  - your offspring
  lexicon: HALOT
  rationale: Refers to one's issue/progeny. Rendering it differently from זַרְעֶךָ
    avoids awkward repetition while preserving the synonymous parallelism.
