id: ISA.44.8
reference: Isaiah 44:8
source:
  edition: WLC
  text: אַֽל תִּפְחֲדוּ֙ וְ/אַל תִּרְה֔וּ הֲ/לֹ֥א מֵ/אָ֛ז הִשְׁמַעְתִּ֥י/ךָ וְ/הִגַּ֖דְתִּי
    וְ/אַתֶּ֣ם עֵדָ֑/י הֲ/יֵ֤שׁ אֱל֨וֹהַּ֙ מִ/בַּלְעָדַ֔/י וְ/אֵ֥ין צ֖וּר בַּל יָדָֽעְתִּי־־־׃
translation:
  text: Do not fear, and do not tremble. Have I not long ago made you hear and declared
    it? And you are my witnesses. Is there a God besides me? There is no Rock; I know
    of none.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not fear, and do not be terrified.' The second verb is rare and may
      intensify the first prohibition.
    reason: lexical_alternative
  - marker: b
    text: Or 'Have I not from of old made you hear and declared it?'
    reason: lexical_alternative
  - marker: c
    text: '''Rock'' is a title for God, emphasizing his stability and reliability;
      alternatively, ''rock.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפְחֲדוּ
  chosen: fear
  alternatives:
  - be afraid
  lexicon: HALOT
  rationale: From פחד, denoting fear or dread. 'Fear' is concise and natural in the
    prohibition; 'be afraid' is possible but less direct.
- source_word: תִּרְהוּ
  chosen: tremble
  alternatives:
  - be terrified
  - be anxious
  lexicon: HALOT
  rationale: From רהה/רהו in this rare form, commonly understood in context as a parallel
    prohibition intensifying fear. 'Tremble' preserves the poetic parallelism and
    emotional force without overinterpreting.
- source_word: מֵאָז
  chosen: long ago
  alternatives:
  - from then
  - from of old
  lexicon: HALOT
  rationale: Temporal adverb indicating prior time. 'Long ago' gives clear modern
    English while preserving the retrospective appeal to earlier revelation.
- source_word: הִשְׁמַעְתִּיךָ
  chosen: made you hear
  alternatives:
  - caused you to hear
  - announced to you
  lexicon: HALOT
  rationale: Hiphil of שמע with 2ms suffix. The causative sense is significant, so
    'made you hear' better reflects the Hebrew than the smoother but less transparent
    'announced to you.'
- source_word: וְהִגַּדְתִּי
  chosen: declared it
  alternatives:
  - told
  - announced
  lexicon: HALOT
  rationale: From נגד, to declare or make known. 'Declared it' matches the formal,
    proclamatory tone and pairs well with the previous verb.
- source_word: עֵדַי
  chosen: my witnesses
  alternatives:
  - my witness
  lexicon: HALOT
  rationale: Plural noun with 1cs suffix. The plural matches the addressed community
    and the legal-testimonial motif in Isaiah.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - god
  - deity
  lexicon: HALOT
  rationale: In this rhetorical question about unique deity, capitalized 'God' best
    conveys the referent in English, while the Hebrew singular noun asks whether any
    true deity exists besides YHWH.
- source_word: מִבַּלְעָדַי
  chosen: besides me
  alternatives:
  - apart from me
  - outside me
  lexicon: HALOT
  rationale: The prepositional expression denotes exclusion. 'Besides me' is idiomatic
    and preserves the exclusivity claim.
- source_word: צוּר
  chosen: Rock
  alternatives:
  - rock
  lexicon: HALOT
  rationale: A divine title in Isaiah emphasizing stability, refuge, and covenantal
    reliability. Capitalized 'Rock' signals titular use rather than a mere object.
- source_word: בַּל יָדָעְתִּי
  chosen: I know of none
  alternatives:
  - I know none
  - I do not know any
  lexicon: HALOT
  rationale: An emphatic negated expression. 'I know of none' is idiomatic English
    that preserves the force of total denial.
