theological_decisions:
- issue: Divine exclusivity in rhetorical questions
  chosen_reading: 'Render the verse as an absolute denial of any deity besides the
    God of Israel: ''Is there a God besides me? There is no Rock; I know of none.'''
  alternative_readings:
  - Render אֱלוֹהַּ as 'god' in lower case throughout to stress category rather than
    identity
  rationale: The context is a polemic against idols and a declaration of YHWH's uniqueness.
    English capitalization of 'God' in the rhetorical question best communicates the
    referent without adding doctrine beyond the text. The second clause confirms absolute
    exclusivity.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §1, §6
- issue: Rendering צוּר as a divine title
  chosen_reading: Capitalize 'Rock' as a title for God.
  alternative_readings:
  - Use lower-case 'rock'
  rationale: In this context צוּר functions as a recognized metaphorical title for
    God, not merely a common noun. Capitalization helps modern readers perceive the
    titular force while preserving the metaphor.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
