id: ISA.48.18
reference: Isaiah 48:18
source:
  edition: WLC
  text: ל֥וּא הִקְשַׁ֖בְתָּ לְ/מִצְוֺתָ֑/י וַ/יְהִ֤י כַ/נָּהָר֙ שְׁלוֹמֶ֔/ךָ וְ/צִדְקָתְ/ךָ֖
    כְּ/גַלֵּ֥י הַ/יָּֽם׃
translation:
  text: If only you had paid attention to my commandments! Then your peace would have
    been like a river, and your righteousness like the waves of the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you had listened to' or 'you had heeded' my commandments.
    reason: lexical_alternative
  - marker: b
    text: Or 'your justice' like the waves of the sea.
    reason: lexical_alternative
lexical_decisions:
- source_word: ל֥וּא
  chosen: If only
  alternatives:
  - Oh that
  - Would that
  lexicon: HALOT
  rationale: Introduces an unrealized wish or lament. 'If only' is idiomatic modern
    English that preserves the emotive force without archaic tone.
- source_word: הִקְשַׁ֖בְתָּ
  chosen: you had paid attention
  alternatives:
  - you had listened
  - you had heeded
  lexicon: HALOT
  rationale: The verb conveys attentive listening with responsive regard, not mere
    auditory reception. 'Paid attention' captures the sense naturally in English;
    the pluperfect fits the contrary-to-fact wish.
- source_word: לְמִצְוֺתָי
  chosen: to my commandments
  alternatives:
  - to my commands
  lexicon: HALOT
  rationale: מִצְוָה is well represented by 'commandment'; the plural with first-person
    suffix is retained. 'Commandments' preserves covenantal and moral weight better
    than the lighter 'commands'.
- source_word: וַיְהִי
  chosen: Then ... would have been
  alternatives:
  - and ... was
  - so ... became
  lexicon: HALOT
  rationale: Though formally a waw-consecutive imperfect, in this context following
    לוּא it expresses the result that would have followed from the unrealized condition.
    English counterfactual 'would have been' best reflects the syntax and sense.
- source_word: כַנָּהָר
  chosen: like a river
  alternatives:
  - as a river
  lexicon: HALOT
  rationale: The simile is straightforward. 'Like a river' is natural modern English
    and preserves the image of steady, abundant flow.
- source_word: שְׁלוֹמֶךָ
  chosen: your peace
  alternatives:
  - your well-being
  - your wholeness
  lexicon: HALOT
  rationale: שָׁלוֹם includes peace, welfare, and wholeness. 'Peace' is the standard
    concise rendering and fits the river simile well; broader nuances are inherent
    but need not be expanded in the main text.
- source_word: וְצִדְקָתְךָ
  chosen: your righteousness
  alternatives:
  - your justice
  - your vindication
  lexicon: HALOT
  rationale: צְדָקָה can denote righteousness, justice, or right order. Here 'righteousness'
    best matches the moral-covenantal sense in parallel with obedience to commandments,
    while preserving the broader semantic field.
- source_word: כְּגַלֵּי הַיָּם
  chosen: like the waves of the sea
  alternatives:
  - like sea waves
  - like the breakers of the sea
  lexicon: HALOT
  rationale: Retains the vivid poetic image of abundance and continuity. 'Waves of
    the sea' is clear, idiomatic, and close to the Hebrew construct phrase.
