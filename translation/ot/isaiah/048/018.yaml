theological_decisions:
- issue: Sense of צִדְקָה in context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  - vindication
  rationale: The verse links attentive obedience to God's commandments with the resulting
    moral-covenantal state of the people. 'Righteousness' best preserves that connection
    in English, while 'justice' remains a viable lexical alternative and is preserved
    in a footnote.
  doctrine_reference: Translation philosophy §5; Contested terms table notes righteousness/justice
    tension for cognate concepts
