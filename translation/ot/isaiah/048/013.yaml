theological_decisions:
- issue: Anthropomorphic language for God's creative action
  chosen_reading: Preserve the concrete imagery of God's 'hand' and 'right hand' without
    paraphrasing into abstract power-language.
  alternative_readings:
  - My power founded the earth, and my strength spread out the heavens
  rationale: The Hebrew explicitly uses bodily imagery. Per translation philosophy,
    the draft should not flatten vivid source-language imagery into interpretation.
    The verse emphasizes God's direct sovereign agency in creation.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
