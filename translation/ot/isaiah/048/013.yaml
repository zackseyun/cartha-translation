id: ISA.48.13
reference: Isaiah 48:13
source:
  edition: WLC
  text: אַף יָדִ/י֙ יָ֣סְדָה אֶ֔רֶץ וִֽ/ימִינִ֖/י טִפְּחָ֣ה שָׁמָ֑יִם קֹרֵ֥א אֲנִ֛י
    אֲלֵי/הֶ֖ם יַעַמְד֥וּ יַחְדָּֽו־׃
translation:
  text: Indeed, my hand founded the earth, and my right hand spread out the heavens;
    when I call to them, they stand together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spanned the heavens' or 'stretched out the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  chosen: Indeed
  alternatives:
  - Also
  - Even
  - Surely
  lexicon: HALOT
  rationale: Here אַף functions as an emphatic particle introducing a solemn assertion.
    'Indeed' conveys the emphasis naturally in modern English without adding content.
- source_word: יָדִי
  chosen: my hand
  lexicon: HALOT
  rationale: A literal rendering preserves the anthropomorphic imagery of divine creative
    action present in the Hebrew.
- source_word: יָסְדָה
  chosen: founded
  alternatives:
  - laid the foundation of
  - established
  lexicon: HALOT
  rationale: From יסד, the sense is laying a foundation. 'Founded' is concise and
    idiomatic with 'the earth,' while retaining the creation/foundation imagery.
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic creation context, 'earth' is clearly intended rather than
    a particular land.
- source_word: וִימִינִי
  chosen: and my right hand
  lexicon: HALOT
  rationale: Literal rendering preserves the parallelism with 'my hand' and the imagery
    of power and agency.
- source_word: טִפְּחָה
  chosen: spread out
  alternatives:
  - spanned
  - stretched out
  lexicon: HALOT
  rationale: The verb טפח in this context refers to extending or spreading out the
    heavens. 'Spread out' is clear modern English and fits common biblical creation
    imagery. 'Spanned' is possible, but can suggest measurement more than extension.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the skies
  lexicon: HALOT
  rationale: The Hebrew plural is best represented by 'the heavens' in elevated but
    still readable English, especially in a creation context.
- source_word: קֹרֵא אֲנִי אֲלֵיהֶם
  chosen: when I call to them
  alternatives:
  - I call to them
  - at my call to them
  lexicon: HALOT
  rationale: The participle plus pronoun expresses a vivid, present action. Rendering
    it temporally as 'when I call to them' makes the relation to the following imperfect
    natural in English while preserving the sense.
- source_word: יַעַמְדוּ
  chosen: they stand
  alternatives:
  - they present themselves
  - they take their stand
  lexicon: HALOT
  rationale: The verb עמד means 'stand.' In context it depicts the earth and heavens
    responding immediately to God's summons. 'They stand' is the most direct rendering.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - as one
  - at once
  lexicon: HALOT
  rationale: '''Together'' preserves the adverb''s basic sense and fits the image
    of the created order appearing in unified obedience to God''s call.'
