theological_decisions:
- issue: Rendering the idol terms distinctly
  chosen_reading: 'Use three differentiated expressions: ''idol,'' ''carved image,''
    and ''cast image.'''
  alternative_readings:
  - Collapse all three into repeated 'idol' language
  - Use traditional 'graven image' and 'molten image'
  rationale: The Hebrew uses three related but distinct idol terms, heightening the
    polemic against false gods. Preserving the distinctions reflects the source text's
    rhetoric without importing extra theology.
  doctrine_reference: 'Translation philosophy #5 (consistency of key terms, or documented
    exception)'
