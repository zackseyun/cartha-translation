id: ISA.48.5
reference: Isaiah 48:5
source:
  edition: WLC
  text: וָ/אַגִּ֤יד לְ/ךָ֙ מֵ/אָ֔ז בְּ/טֶ֥רֶם תָּב֖וֹא הִשְׁמַעְתִּ֑י/ךָ פֶּן תֹּאמַר֙
    עָצְבִּ֣/י עָשָׂ֔/ם וּ/פִסְלִ֥/י וְ/נִסְכִּ֖/י צִוָּֽ/ם־׃
translation:
  text: I declared it to you long ago; before it came to pass I made you hear it,
    lest you say, ‘My idol did them, and my carved image and my cast image commanded
    them.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before it happened.' The Hebrew is literally 'before it came.'
    reason: lexical_alternative
  - marker: b
    text: '''Cast image'' may also be rendered ''molten image.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאַגִּיד
  chosen: I declared
  alternatives:
  - I told
  - I announced
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means to declare or make known. 'Declared' preserves
    the formal, prophetic tone better than the more colloquial 'told.'
- source_word: מֵאָז
  chosen: long ago
  alternatives:
  - from then
  - from of old
  - beforehand
  lexicon: HALOT
  rationale: In context this points to prior time extending back before fulfillment.
    'Long ago' is idiomatic modern English and captures the temporal force without
    sounding archaic.
- source_word: בְּטֶרֶם תָּבוֹא
  chosen: before it came to pass
  alternatives:
  - before it came
  - before it happened
  lexicon: HALOT
  rationale: The feminine singular verb likely refers to the foretold event or word.
    English idiom requires an explicit sense of occurrence; 'came to pass' preserves
    the eventive force and echoes prophetic fulfillment language.
- source_word: הִשְׁמַעְתִּיךָ
  chosen: I made you hear it
  alternatives:
  - I caused you to hear it
  - I let you hear it
  - I proclaimed it to you
  lexicon: HALOT
  rationale: Hiphil of שמע is causative, literally 'I caused you to hear.' 'I made
    you hear it' keeps the causative nuance while remaining readable. The object 'it'
    is supplied from context in English.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - so that you would not
  - otherwise
  lexicon: HALOT
  rationale: Introduces a preventative purpose clause. 'Lest' is concise and natural
    in elevated modern Bible English.
- source_word: עָצְבִּי
  chosen: my idol
  alternatives:
  - my image
  - my fashioned idol
  lexicon: HALOT
  rationale: עצב in this nominal form refers to an idol. 'Idol' is the clearest English
    equivalent and distinguishes it from the more specific terms that follow.
- source_word: עָשָׂם
  chosen: did them
  alternatives:
  - made them
  - accomplished them
  lexicon: HALOT
  rationale: The plural suffix refers to the foretold things/events. 'Did them' is
    slightly more natural here than 'made them' because the point is bringing events
    about, not manufacturing objects.
- source_word: פִסְלִי
  chosen: my carved image
  alternatives:
  - my graven image
  - my idol
  lexicon: HALOT
  rationale: פסל denotes an idol shaped by carving. 'Carved image' is accurate and
    understandable; 'graven image' is traditional but archaic.
- source_word: נִסְכִּי
  chosen: my cast image
  alternatives:
  - my molten image
  - my metal image
  lexicon: HALOT
  rationale: נסך/related nominal usage here denotes an image formed by casting. 'Cast
    image' is clear modern English; 'molten image' is a viable traditional alternative
    worth preserving.
- source_word: צִוָּם
  chosen: commanded them
  alternatives:
  - ordained them
  - appointed them
  lexicon: HALOT
  rationale: The verb צוה normally means command. In context the irony is that idols
    are falsely credited with directing events. 'Commanded them' preserves that force.
