id: ISA.48.22
reference: Isaiah 48:22
source:
  edition: WLC
  text: אֵ֣ין שָׁל֔וֹם אָמַ֥ר יְהוָ֖ה לָ/רְשָׁעִֽים׃ס
translation:
  text: There is no peace," says the LORD, "for the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There is no well-being' or 'There is no wholeness.' The Hebrew shalom
      can include peace, welfare, and wholeness.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  chosen: There is no
  alternatives:
  - There is not
  - No ... exists
  lexicon: HALOT
  rationale: Uses natural English existential negation to reflect the Hebrew particle
    of nonexistence.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: '''Peace'' is the standard concise rendering and fits the prophetic declaration;
    broader senses such as well-being or wholeness are semantically present but would
    overexpand the brief Hebrew here.'
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  - declares
  lexicon: HALOT
  rationale: Although morphologically perfect, prophetic speech formulas often function
    performatively or as a present quotation frame in English. 'Says' is idiomatic
    in English Bible style for introducing a standing divine pronouncement.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md,
    preserving covenantal reference while matching established reverential convention.
- source_word: לָרְשָׁעִים
  chosen: for the wicked
  alternatives:
  - to the wicked
  - for the guilty
  lexicon: HALOT
  rationale: The preposition ל marks the party to whom the statement applies; 'for
    the wicked' is idiomatic in English. 'The wicked' accurately renders the plural
    adjective used substantivally for morally evil persons.
