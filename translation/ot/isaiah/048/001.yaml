id: ISA.48.1
reference: Isaiah 48:1
source:
  edition: WLC
  text: שִׁמְעוּ זֹ֣את בֵּֽית יַעֲקֹ֗ב הַ/נִּקְרָאִים֙ בְּ/שֵׁ֣ם יִשְׂרָאֵ֔ל וּ/מִ/מֵּ֥י
    יְהוּדָ֖ה יָצָ֑אוּ הַֽ/נִּשְׁבָּעִ֣ים בְּ/שֵׁ֣ם יְהוָ֗ה וּ/בֵ/אלֹהֵ֤י יִשְׂרָאֵל֙
    יַזְכִּ֔ירוּ לֹ֥א בֶ/אֱמֶ֖ת וְ/לֹ֥א בִ/צְדָקָֽה־־׀׃
translation:
  text: Hear this, house of Jacob, you who are called by the name of Israel and who
    came out from the waters of Judah, who swear by the name of the LORD and invoke
    the God of Israel, but not in truth or in righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'from the waters of Judah,' likely meaning 'from the offspring' or
      'from the loins of Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ זֹאת
  chosen: Hear this
  alternatives:
  - Listen to this
  lexicon: HALOT
  rationale: Imperative plural of שׁמע with demonstrative זֹאת is naturally rendered
    as a direct summons, 'Hear this.' 'Listen to this' is possible but slightly more
    dynamic.
- source_word: בֵּית יַעֲקֹב
  chosen: house of Jacob
  alternatives:
  - household of Jacob
  lexicon: HALOT
  rationale: A standard prophetic address to the covenant people. 'House of Jacob'
    preserves the formal idiom and intertextual resonance better than the more interpretive
    'household of Jacob.'
- source_word: הַנִּקְרָאִים בְּשֵׁם יִשְׂרָאֵל
  chosen: you who are called by the name of Israel
  alternatives:
  - who are called Israel
  - who bear the name Israel
  lexicon: HALOT
  rationale: The passive participle with בְּשֵׁם indicates designation by a name.
    'Called by the name of Israel' preserves the Hebrew construction and its covenantal
    nuance.
- source_word: וּמִמֵּי יְהוּדָה יָצָאוּ
  chosen: and who came out from the waters of Judah
  alternatives:
  - and who sprang from Judah
  - and who came from the loins of Judah
  lexicon: HALOT
  rationale: Literally 'from the waters of Judah they came out.' In Hebrew, 'waters'
    can function idiomatically for bodily issue/offspring. The main text keeps the
    literal image for transparency; a footnote preserves the idiomatic sense.
- source_word: הַנִּשְׁבָּעִים בְּשֵׁם יְהוָה
  chosen: who swear by the name of the LORD
  alternatives:
  - who take oaths in the name of the LORD
  lexicon: HALOT
  rationale: The Niphal participle of שׁבע with בְּשֵׁם denotes oath-taking by invoking
    the divine name. 'Swear by the name of the LORD' is both natural and close to
    the source.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: וּבֵאלֹהֵי יִשְׂרָאֵל יַזְכִּירוּ
  chosen: and invoke the God of Israel
  alternatives:
  - and mention the God of Israel
  - and make mention of the God of Israel
  lexicon: HALOT
  rationale: Hiphil of זכר here means to call upon or invoke in worship/oath context,
    not merely to remember mentally. 'Invoke' best captures the performative religious
    sense in contemporary English.
- source_word: לֹא בֶאֱמֶת
  chosen: but not in truth
  alternatives:
  - not truthfully
  - not in faithfulness
  lexicon: HALOT
  rationale: אֱמֶת can denote truth, reliability, or faithfulness. Here it characterizes
    the insincerity of their oath and invocation. 'In truth' preserves the compact
    Hebrew expression.
- source_word: וְלֹא בִצְדָקָה
  chosen: or in righteousness
  alternatives:
  - or in justice
  - or rightly
  lexicon: HALOT
  rationale: צְדָקָה can mean righteousness or justice. In this prophetic denunciation
    of hypocritical covenant speech, 'righteousness' best matches the moral-religious
    sense while remaining readable.
