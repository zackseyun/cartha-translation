theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Following the project's
    stated default for יְהוָה, the main text uses 'the LORD' rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to interpret מִמֵּי יְהוּדָה idiomatically in the main text
  chosen_reading: Preserve the literal image 'from the waters of Judah' in the main
    text and explain the idiomatic offspring sense in a footnote.
  alternative_readings:
  - from the loins of Judah
  - from the offspring of Judah
  - sprung from Judah
  rationale: The Hebrew likely uses 'waters' as a euphemistic/poetic expression for
    descent or issue. To maintain transparency to the source while still aiding comprehension,
    the main text keeps the literal wording and the footnote supplies the idiomatic
    sense.
  doctrine_reference: DOCTRINE.md Translation philosophy 1, 3, 5
