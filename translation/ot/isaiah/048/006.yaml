theological_decisions:
- issue: Pronoun/number shift in address
  chosen_reading: Retain generic English 'you' without marking the Hebrew shift from
    singular to plural and back
  alternative_readings:
  - Explicitly mark the shift with 'you all' in the middle clause
  rationale: The Hebrew moves from 2ms to 2mp to 2ms, likely shifting from the representative
    individual to the people collectively. English 'you' can preserve the sense without
    introducing dialectal or interpretive wording. The shift is lexical/grammatical
    rather than doctrinal, but documenting it preserves auditability.
  doctrine_reference: Translation philosophy §5 (documented exception/consistency)
    and §6 (readable modern English)
