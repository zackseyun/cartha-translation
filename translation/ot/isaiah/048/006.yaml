id: ISA.48.6
reference: Isaiah 48:6
source:
  edition: WLC
  text: שָׁמַ֤עְתָּֽ חֲזֵה֙ כֻּלָּ֔/הּ וְ/אַתֶּ֖ם הֲ/ל֣וֹא תַגִּ֑ידוּ הִשְׁמַעְתִּ֤י/ךָ
    חֲדָשׁוֹת֙ מֵ/עַ֔תָּה וּ/נְצֻר֖וֹת וְ/לֹ֥א יְדַעְתָּֽ/ם׃
translation:
  text: You have heard; now see all this. And will you not declare it? From now on
    I make you hear new things, hidden things that you have not known.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'things kept in reserve' / 'guarded things.' The Hebrew term suggests
      matters previously kept back until the proper time for disclosure.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתָּ
  chosen: You have heard
  alternatives:
  - You heard
  lexicon: HALOT
  rationale: 'Qal perfect 2ms of שׁמע. Rendered as present-result perfect in English
    (''have heard'') to match the discourse: Israel has already received prior revelation.'
- source_word: חֲזֵה
  chosen: now see
  alternatives:
  - see
  - behold
  lexicon: HALOT
  rationale: Imperative of חזה. 'See' is the plain sense; 'now' is supplied for natural
    English transition after 'You have heard.' 'Behold' is possible but too archaic
    for the stated philosophy.
- source_word: כֻּלָּהּ
  chosen: all this
  alternatives:
  - all of it
  - it all
  lexicon: HALOT
  rationale: The feminine singular pronominal suffix likely refers collectively to
    the matters just spoken. 'All this' is idiomatic and points to the totality of
    what has been revealed.
- source_word: הֲלוֹא תַגִּידוּ
  chosen: will you not declare it?
  alternatives:
  - do you not declare it?
  - will you not tell it?
  lexicon: HALOT
  rationale: Hiphil of נגד, 'tell, declare, make known.' The interrogative particle
    with negation is best rendered rhetorically. Although the verb is 2mp while surrounding
    forms are 2ms, the shift can be represented by English 'you' without awkwardness;
    'declare' preserves the formal force better than 'tell'.
- source_word: הִשְׁמַעְתִּיךָ
  chosen: I make you hear
  alternatives:
  - I have made you hear
  - I announce to you
  lexicon: HALOT
  rationale: 'Hiphil perfect 1cs + 2ms suffix of שׁמע, causative: ''I caused you to
    hear.'' In context with מֵעַתָּה (''from now on''), an English present ''I make
    you hear'' conveys the inaugurated action naturally while preserving the causative
    sense.'
- source_word: חֲדָשׁוֹת
  chosen: new things
  alternatives:
  - new matters
  lexicon: HALOT
  rationale: Adjectival/substantival feminine plural from חדשׁ. 'New things' is the
    standard and clear rendering in prophetic discourse.
- source_word: מֵעַתָּה
  chosen: From now on
  alternatives:
  - from this time
  - henceforth
  lexicon: HALOT
  rationale: Temporal phrase marking a new stage of revelation. 'From now on' is idiomatic
    modern English.
- source_word: נְצֻרוֹת
  chosen: hidden things
  alternatives:
  - guarded things
  - kept secret things
  - things kept in reserve
  lexicon: HALOT
  rationale: Passive participial/adjectival form from נצר. In context it refers to
    matters kept back until now, hence 'hidden things.' Because the root can carry
    the sense of 'guard/keep,' an alternative is worth preserving in a footnote.
- source_word: וְלֹא יְדַעְתָּם
  chosen: that you have not known
  alternatives:
  - which you did not know
  - and you have not known them
  lexicon: HALOT
  rationale: Qal perfect 2ms + 3mp suffix of ידע. Relative sense is brought out smoothly
    in English after 'new things, hidden things.' 'Have not known' matches the perfective
    perspective and prior ignorance.
