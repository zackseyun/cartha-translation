theological_decisions:
- issue: Rendering the divine self-identification אֲנִי הוּא
  chosen_reading: I am he
  alternative_readings:
  - I am the one
  - I am
  rationale: The phrase is a weighty Isaianic formula of divine self-declaration.
    'I am he' preserves the wording without overinterpreting it, while still allowing
    readers to perceive its theological resonance. It avoids importing later doctrinal
    conclusions directly into the translation while remaining fully compatible with
    historic Christian orthodoxy.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering God's temporal/ontological uniqueness in רִאשׁוֹן ... אַחֲרוֹן
  chosen_reading: the first ... the last
  alternative_readings:
  - first ... last
  rationale: The articular English form best communicates the absolute, title-like
    force of the Hebrew in context. This preserves the text's strong claim about God's
    primacy and ultimacy without expanding it into a paraphrase.
