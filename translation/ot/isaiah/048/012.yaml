id: ISA.48.12
reference: Isaiah 48:12
source:
  edition: WLC
  text: שְׁמַ֤ע אֵלַ/י֙ יַֽעֲקֹ֔ב וְ/יִשְׂרָאֵ֖ל מְקֹרָאִ֑/י אֲנִי הוּא֙ אֲנִ֣י רִאשׁ֔וֹן
    אַ֖ף אֲנִ֥י אַחֲרֽוֹן־׃
translation:
  text: 'Listen to me, Jacob, and Israel, whom I called: I am he; I am the first,
    and I am the last.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Israel, my called one.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I am the one.' The Hebrew expression is a compact formula of divine
      self-identification used repeatedly in Isaiah.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  chosen: Listen
  alternatives:
  - Hear
  lexicon: HALOT
  rationale: Imperative 2ms from שׁמע. 'Listen' gives the command force in natural
    modern English while preserving the call to attentive hearing; 'Hear' is possible
    but sounds more traditional/archaic in this context.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Preposition אֶל with 1cs suffix. 'To me' is the plain modern equivalent.
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Proper name, transliterated according to standard English convention.
- source_word: וְיִשְׂרָאֵל
  chosen: and Israel
  rationale: Proper name with conjunction. Retains the parallel vocatives addressing
    the covenant people under both names.
- source_word: מְקֹרָאִי
  chosen: whom I called
  alternatives:
  - my called one
  - my called
  lexicon: HALOT
  rationale: From קרא in a passive/resultative participial form with 1cs suffix. In
    context it refers to Israel as the one called by God. 'Whom I called' communicates
    the sense clearly in idiomatic English; more formally literal options like 'my
    called one' are awkward and less transparent.
- source_word: אֲנִי הוּא
  chosen: I am he
  alternatives:
  - I am the one
  - I am
  lexicon: HALOT
  rationale: This self-identification formula is common in Isaiah. 'I am he' preserves
    the terseness and theological weight of the Hebrew better than the more interpretive
    'I am the one.' Rendering simply 'I am' would omit הוּא.
- source_word: רִאשׁוֹן
  chosen: the first
  alternatives:
  - first
  lexicon: HALOT
  rationale: Predicate adjective functioning substantivally in parallel with 'the
    last.' English idiom normally supplies the article here.
- source_word: אַף
  chosen: and
  alternatives:
  - also
  - indeed
  - even
  lexicon: HALOT
  rationale: 'אַף here intensifies/adds the parallel clause: ''also/even I am the
    last.'' In smooth English, ''and'' best carries the additive force within the
    balanced expression ''I am the first, and I am the last.'''
- source_word: אַחֲרוֹן
  chosen: the last
  alternatives:
  - last
  lexicon: HALOT
  rationale: Predicate adjective functioning substantivally. 'The last' preserves
    the formal parallel with 'the first' and the theological force of God's uniqueness
    across all time.
