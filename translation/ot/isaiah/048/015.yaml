theological_decisions:
- issue: Referent of the masculine singular pronouns ("him," "his")
  chosen_reading: Retained as an unspecified masculine singular referent in the translation,
    referring contextually to the agent God has called and brought, commonly understood
    here as Cyrus.
  alternative_readings:
  - Explicitly identifying the referent as Cyrus in the main text
  - Reading the referent more generically as God's chosen instrument
  rationale: The Hebrew text itself uses only pronouns in this verse. Since the immediate
    context points to the figure previously named, but the verse does not repeat the
    name, the translation preserves the pronouns rather than importing an explicit
    identification into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
