id: ISA.48.15
reference: Isaiah 48:15
source:
  edition: WLC
  text: אֲנִ֥י אֲנִ֛י דִּבַּ֖רְתִּי אַף קְרָאתִ֑י/ו הֲבִיאֹתִ֖י/ו וְ/הִצְלִ֥יחַ דַּרְכּֽ/וֹ־׃
translation:
  text: I, I have spoken; indeed, I have called him; I have brought him, and he will
    make his way prosper.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The pronouns "him" and "his" refer to the one God has called and brought;
      in context, this is commonly understood to be Cyrus (see Isa 48:14).
    reason: cross_reference
  - marker: b
    text: Or "he will prosper in his way" / "his way will prosper." The Hebrew verb
      is causative, literally "he will make his way prosper."
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי אֲנִי
  chosen: I, I
  alternatives:
  - I alone
  - I myself
  lexicon: HALOT
  rationale: The doubled pronoun is emphatic. Rendering it as "I, I" preserves the
    Hebrew repetition and rhetorical force better than smoothing it into a single
    pronoun.
- source_word: דִּבַּרְתִּי
  chosen: have spoken
  alternatives:
  - spoke
  - have said
  lexicon: HALOT
  rationale: The perfect here states a completed divine declaration. "Have spoken"
    fits natural English while retaining the solemn force of a completed utterance.
- source_word: אַף
  chosen: indeed
  alternatives:
  - also
  - even
  - 'yes'
  lexicon: HALOT
  rationale: Here אַף intensifies and advances the statement rather than simply adding
    another item. "Indeed" captures the emphatic-confirmatory sense in context.
- source_word: קְרָאתִיו
  chosen: have called him
  alternatives:
  - called him
  - summoned him
  lexicon: HALOT
  rationale: The verb commonly means "call" or "summon." "Have called him" preserves
    the verbal link with divine commissioning language without over-specifying the
    nuance.
- source_word: הֲבִיאֹתִיו
  chosen: have brought him
  alternatives:
  - have led him
  - have caused him to come
  lexicon: HALOT
  rationale: The Hiphil of בוא is causative, "bring" or "cause to come." "Have brought
    him" is concise, natural, and adequately reflects the causative force.
- source_word: וְהִצְלִיחַ
  chosen: he will make prosper
  alternatives:
  - he will prosper
  - he will succeed
  lexicon: HALOT
  rationale: The Hiphil of צלח is causative. Rather than the intransitive "he will
    prosper," "he will make prosper" better reflects the stem and allows the following
    object "his way" to remain explicit.
- source_word: דַּרְכּוֹ
  chosen: his way
  alternatives:
  - his course
  - his path
  lexicon: HALOT
  rationale: '"Way" is the most direct rendering and can denote one''s course or undertaking.
    In combination with the causative verb, "make his way prosper" is idiomatic enough
    in English while staying close to the Hebrew.'
