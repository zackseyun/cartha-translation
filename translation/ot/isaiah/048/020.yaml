theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. No contextual factor here requires deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of גָּאַל in a salvation context
  chosen_reading: has redeemed
  alternative_readings:
  - has ransomed
  - has delivered
  rationale: The verse announces covenantal deliverance from exile. 'Redeemed' preserves
    the theological resonance of YHWH as kinsman-redeemer without importing later
    doctrinal specifics beyond the Hebrew text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #5'
