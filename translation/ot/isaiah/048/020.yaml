id: ISA.48.20
reference: Isaiah 48:20
source:
  edition: WLC
  text: צְא֣וּ מִ/בָּבֶל֮ בִּרְח֣וּ מִ/כַּשְׂדִּים֒ בְּ/ק֣וֹל רִנָּ֗ה הַגִּ֤ידוּ הַשְׁמִ֨יעוּ֙
    זֹ֔את הוֹצִיא֖וּ/הָ עַד קְצֵ֣ה הָ/אָ֑רֶץ אִמְר֕וּ גָּאַ֥ל יְהוָ֖ה עַבְדּ֥/וֹ יַעֲקֹֽב־׃
translation:
  text: Go out from Babylon; flee from the Chaldeans! Declare this with a shout of
    joy; make it heard; send it out to the end of the earth. Say, “The LORD has redeemed
    his servant Jacob.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from Chaldea”; the Hebrew names the people, “the Chaldeans.”
    reason: lexical_alternative
  - marker: b
    text: Or “to the ends of the earth.”
    reason: lexical_alternative
lexical_decisions:
- source_word: צְאוּ
  chosen: Go out
  alternatives:
  - Come out
  - Depart
  lexicon: HALOT
  rationale: Imperative plural of יצא, calling for departure from Babylon. 'Go out'
    is natural modern English and preserves the directional force without adding nuance.
- source_word: מִבָּבֶל
  chosen: from Babylon
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating the place of departure.
- source_word: בִּרְחוּ
  chosen: flee
  alternatives:
  - escape
  - run away
  lexicon: HALOT
  rationale: ברח commonly means to flee. 'Flee' preserves the urgency and imperative
    force better than the softer 'leave' or more interpretive 'escape'.
- source_word: מִכַּשְׂדִּים
  chosen: from the Chaldeans
  alternatives:
  - from Chaldea
  lexicon: HALOT
  rationale: The form is the people-group plural, not the land name. 'From the Chaldeans'
    reflects the Hebrew more precisely than 'from Chaldea,' though the latter is a
    possible contextual smoothing.
- source_word: בְּקוֹל רִנָּה
  chosen: with a shout of joy
  alternatives:
  - with a voice of singing
  - with joyful shouting
  lexicon: HALOT
  rationale: The phrase denotes audible jubilant proclamation. 'With a shout of joy'
    is idiomatic modern English that preserves both the vocal and celebratory sense.
- source_word: הַגִּידוּ
  chosen: Declare
  alternatives:
  - Tell
  - Announce
  lexicon: HALOT
  rationale: The imperative calls for public proclamation. 'Declare' fits the elevated
    prophetic register.
- source_word: הַשְׁמִיעוּ
  chosen: make it heard
  alternatives:
  - proclaim it
  - cause it to be heard
  lexicon: HALOT
  rationale: The Hiphil of שמע is causative. 'Make it heard' preserves that causative
    nuance more clearly than simply repeating 'declare'.
- source_word: זֹאת
  chosen: this
  lexicon: HALOT
  rationale: Direct object of the proclamation verbs; simple demonstrative retained.
- source_word: הוֹצִיאוּהָ
  chosen: send it out
  alternatives:
  - bring it out
  - publish it
  lexicon: HALOT
  rationale: Hiphil imperative of יצא with feminine suffix referring to the message.
    'Send it out' communicates dissemination broadly and fits the parallel with worldwide
    proclamation. 'Publish it' is possible but more interpretive.
- source_word: עַד קְצֵה הָאָרֶץ
  chosen: to the end of the earth
  alternatives:
  - to the ends of the earth
  lexicon: HALOT
  rationale: The Hebrew is singular 'end/edge of the earth,' but English idiom often
    uses the plural. The singular was retained for closer formal correspondence while
    remaining natural.
- source_word: אִמְרוּ
  chosen: Say
  alternatives:
  - Declare
  lexicon: HALOT
  rationale: A fresh imperative introducing the content of the proclamation. 'Say'
    is simple and accurate.
- source_word: גָּאַל
  chosen: has redeemed
  alternatives:
  - has ransomed
  - has reclaimed
  lexicon: HALOT
  rationale: גאל carries covenantal deliverance/redemption language. 'Has redeemed'
    best preserves that theological and lexical weight in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: עַבְדּוֹ יַעֲקֹב
  chosen: his servant Jacob
  alternatives:
  - Jacob his servant
  lexicon: HALOT
  rationale: Construct phrase with pronominal suffix. 'His servant Jacob' is clear
    modern English and preserves the covenant identity of Jacob/Israel as the LORD's
    servant.
