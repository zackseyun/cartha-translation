theological_decisions:
- issue: Metaphorical description of Israel's rebellion
  chosen_reading: Retain the bodily-metal metaphors ('iron sinew,' 'forehead bronze')
    rather than flattening them into abstract interpretation.
  alternative_readings:
  - your neck is like iron and your forehead like bronze
  - you are unyielding and shameless
  rationale: The Hebrew uses concrete prophetic imagery to describe obstinacy and
    shamelessness. Preserving the metaphors maintains the force of the rebuke without
    importing additional doctrinal interpretation.
  doctrine_reference: Translation philosophy §§1, 3, 6
