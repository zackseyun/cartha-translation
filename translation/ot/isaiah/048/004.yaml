id: ISA.48.4
reference: Isaiah 48:4
source:
  edition: WLC
  text: מִ/דַּעְתִּ֕/י כִּ֥י קָשֶׁ֖ה אָ֑תָּה וְ/גִ֤יד בַּרְזֶל֙ עָרְפֶּ֔/ךָ וּ/מִצְחֲ/ךָ֖
    נְחוּשָֽׁה׃
translation:
  text: Because I knew that you are stubborn, and your neck is an iron sinew, and
    your forehead bronze,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hard' or 'obstinate' for 'stubborn.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'your neck is an iron sinew.' The image conveys stubborn resistance.
    reason: cultural_note
  - marker: c
    text: Or 'your forehead is bronze.' The metaphor suggests shameless hardness.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדַּעְתִּי
  chosen: Because I knew
  alternatives:
  - From my knowing
  - Since I knew
  lexicon: HALOT
  rationale: מן prefixed to ידע in this construction introduces the ground or reason
    for the preceding statement; idiomatic English is causal, 'because/since I knew,'
    rather than a wooden 'from my knowing.'
- source_word: כִּי
  chosen: Because
  alternatives:
  - that
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the content/reason of the knowing. In English, fronting
    it as 'Because' yields natural syntax and preserves the causal force of the Hebrew
    clause.
- source_word: קָשֶׁה
  chosen: stubborn
  alternatives:
  - hard
  - obstinate
  - stiff
  lexicon: HALOT
  rationale: The adjective literally means 'hard,' but in reference to a person in
    prophetic rebuke it denotes obstinacy. 'Stubborn' communicates the moral sense
    clearly in modern English without over-paraphrasing.
- source_word: וְגִיד בַּרְזֶל
  chosen: an iron sinew
  alternatives:
  - an iron tendon
  - an iron nerve
  lexicon: HALOT
  rationale: גיד denotes sinew/tendon. 'Iron sinew' preserves the vivid metaphor and
    the concrete imagery better than a more interpretive rendering.
- source_word: עָרְפְּךָ
  chosen: your neck
  alternatives:
  - your nape
  lexicon: HALOT
  rationale: Though the noun can refer specifically to the back of the neck/nape,
    'neck' is the established and natural English equivalent in this idiom and fits
    the metaphor of stubborn resistance.
- source_word: וּמִצְחֲךָ
  chosen: and your forehead
  alternatives:
  - and your brow
  lexicon: HALOT
  rationale: מֵצַח refers to the forehead/brow. 'Forehead' is more transparent for
    modern readers and preserves the bodily metaphor of shameless hardness.
- source_word: נְחוּשָׁה
  chosen: bronze
  alternatives:
  - copper
  - brass
  lexicon: HALOT
  rationale: נחושה refers to copper/bronze metal; 'bronze' is the standard contextual
    rendering in biblical English for hardness imagery. 'Brass' is less precise and
    more traditional than lexical.
