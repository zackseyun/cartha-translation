theological_decisions:
- issue: Implicit object/subject in 'for how can it be profaned?'
  chosen_reading: Retain the clause without supplying 'my name' in the main text.
  alternative_readings:
  - for how should my name be profaned?
  - for how can I be profaned?
  rationale: The Hebrew leaves the referent implicit. Supplying 'my name' is interpretively
    plausible and common in translation, but leaving it unstated better preserves
    the source-text ambiguity and rhetorical terseness. A footnote preserves the likely
    explicit alternative.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
