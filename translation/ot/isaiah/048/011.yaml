id: ISA.48.11
reference: Isaiah 48:11
source:
  edition: WLC
  text: לְמַעֲנִ֧/י לְמַעֲנִ֛/י אֶעֱשֶׂ֖ה כִּ֣י אֵ֣יךְ יֵחָ֑ל וּ/כְבוֹדִ֖/י לְ/אַחֵ֥ר
    לֹֽא אֶתֵּֽן־׃ס
translation:
  text: For my own sake, for my own sake, I will act; for how can it be profaned?
    And my glory I will not give to another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for how should my name be profaned?' The Hebrew leaves the object implicit.
    reason: alternative_reading
lexical_decisions:
- source_word: לְמַעֲנִי
  chosen: for my own sake
  alternatives:
  - for my sake
  - for the sake of myself
  lexicon: HALOT
  rationale: The preposition ל plus מַעַן expresses purpose or motive, here intensified
    by repetition. 'For my own sake' captures both the reflexive force and the emphatic
    repetition in natural English.
- source_word: אֶעֱשֶׂה
  chosen: I will act
  alternatives:
  - I will do
  - I will accomplish
  lexicon: HALOT
  rationale: עשה is broad ('do/make'). In context, with no explicit object, 'I will
    act' is idiomatic English and preserves the sense of decisive divine intervention
    without adding content.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the preceding declaration. 'For'
    best fits the explanatory force in elevated but readable English.
- source_word: אֵיךְ
  chosen: how can
  alternatives:
  - how
  - in what way
  lexicon: HALOT
  rationale: The interrogative introduces a rhetorical question. 'How can' brings
    out the incredulous rhetorical force in English.
- source_word: יֵחָל
  chosen: it be profaned
  alternatives:
  - he be profaned
  - it be defiled
  - my name be profaned
  lexicon: HALOT
  rationale: The Niphal of חלל commonly means 'be profaned.' The subject is left implicit
    in Hebrew; many understand God's name or honor. Rendering it impersonally as 'it'
    preserves the Hebrew's terseness without importing an explicit object into the
    main text.
- source_word: וּכְבוֹדִי
  chosen: And my glory
  alternatives:
  - and my honor
  lexicon: HALOT
  rationale: כָּבוֹד can denote glory or honor. 'Glory' is the more theologically
    resonant and contextually fitting choice in a divine self-declaration.
- source_word: לְאַחֵר
  chosen: to another
  alternatives:
  - to another one
  - to someone else
  lexicon: HALOT
  rationale: אַחֵר here denotes another party distinct from YHWH. 'To another' is
    concise and preserves the likely polemical force against idols or rival claimants
    without over-specifying.
- source_word: אֶתֵּן
  chosen: I will not give
  alternatives:
  - I will not hand over
  - I will not yield
  lexicon: HALOT
  rationale: נתן is the standard verb 'give.' 'I will not give' is straightforward
    and preserves the formal parallelism with 'my glory.'
