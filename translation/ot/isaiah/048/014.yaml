theological_decisions:
- issue: Referent of the singular pronouns in 'The LORD loves him; he will carry out
    his purpose ... and his arm ...'
  chosen_reading: The singular refers to the human agent raised up by the LORD (contextually
    Cyrus), who carries out the LORD's purpose against Babylon.
  alternative_readings:
  - The LORD himself is the subject of 'he will carry out his purpose' and 'his arm'
    refers to the LORD's own arm
  rationale: The immediate context in Isaiah 48:14-15 points to a distinct individual
    whom the LORD has loved/called to act against Babylon. Rendering the clause this
    way preserves the likely discourse flow while not naming Cyrus explicitly where
    the verse itself does not. Because the Hebrew pronouns can be read differently,
    the alternative is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it
