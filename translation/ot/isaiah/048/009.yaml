id: ISA.48.9
reference: Isaiah 48:9
source:
  edition: WLC
  text: לְמַ֤עַן שְׁמִ/י֙ אַאֲרִ֣יךְ אַפִּ֔/י וּ/תְהִלָּתִ֖/י אֶחֱטָם לָ֑/ךְ לְ/בִלְתִּ֖י
    הַכְרִיתֶֽ/ךָ־׃
translation:
  text: For the sake of my name I delay my anger, and for my praise I restrain it
    for you, so as not to cut you off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'I lengthen my nose,' an idiom meaning 'I delay my anger'
      or 'I am slow to anger.'
    reason: cultural_note
  - marker: b
    text: Or 'I hold it back'; the Hebrew verb can evoke the image of muzzling or
      bridling.
    reason: lexical_alternative
  - marker: c
    text: Or 'destroy you' or 'wipe you out'; Hebrew 'cut you off' preserves the more
      literal covenantal/judicial wording.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: For the sake of
  alternatives:
  - for
  - because of
  lexicon: HALOT
  rationale: Expresses purpose/motivation more fully than a bare 'for'; idiomatic
    in English while preserving the causal-purpose force.
- source_word: שְׁמִי
  chosen: my name
  lexicon: HALOT
  rationale: Retains the Hebrew idiom in which 'name' signifies reputation, honor,
    and revealed character; no need to paraphrase as 'reputation' in the main text.
- source_word: אַאֲרִיךְ אַפִּי
  chosen: I delay my anger
  alternatives:
  - I prolong my anger
  - I defer my wrath
  - I am slow to anger
  lexicon: HALOT
  rationale: Literally 'I lengthen my nose/anger,' a Hebrew idiom for delaying anger.
    'Delay my anger' preserves the temporal sense of ארך while communicating the idiom
    naturally. 'I am slow to anger' is possible but sounds more proverbial/general
    than the first-person volitional action here.
- source_word: וּתְהִלָּתִי
  chosen: and for my praise
  alternatives:
  - and for my renown
  - and for the sake of my praise
  lexicon: HALOT
  rationale: Keeps the noun 'praise' rather than interpreting it more abstractly.
    In context it refers to the praise due to God / his praiseworthy renown, but the
    Hebrew wording is preserved.
- source_word: אֶחֱטָם
  chosen: I restrain it
  alternatives:
  - I hold it back
  - I muzzle it
  - I bridle it
  lexicon: HALOT
  rationale: The verb literally suggests muzzling or restraining. Because the direct
    object is implicit from the prior clause ('my anger'), English supplies 'it.'
    'Restrain' is clear modern English and fits the metaphor without over-literal
    awkwardness.
- source_word: לָךְ
  chosen: for you
  alternatives:
  - on your account
  - toward you
  lexicon: HALOT
  rationale: The preposition marks relation/benefaction toward the addressee. 'For
    you' is concise and natural, though contextually it means with reference to Israel/Jacob.
- source_word: לְבִלְתִּי
  chosen: so as not to
  alternatives:
  - in order not to
  - lest
  lexicon: HALOT
  rationale: Expresses purpose/result clearly in contemporary English.
- source_word: הַכְרִיתֶךָ
  chosen: cut you off
  alternatives:
  - destroy you
  - wipe you out
  lexicon: HALOT
  rationale: From כרת in the causative, 'cut off' is the standard and suitably formal
    rendering. It preserves the covenantal/judicial nuance better than the more generalized
    'destroy.'
