theological_decisions:
- issue: Divine motivation in judgment restraint
  chosen_reading: God restrains anger for the sake of his own name and praise, with
    the addressee's preservation as the stated result.
  alternative_readings:
  - God acts primarily for Israel's benefit
  - God's 'praise' should be paraphrased as 'glory' or 'renown' in the main text
  rationale: The verse explicitly grounds divine restraint in God's name and praise,
    not in human merit. The translation preserves that theological emphasis without
    importing a broader doctrinal system. 'Praise' is retained rather than replaced
    by a theological abstraction.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Implicit object of 'I restrain'
  chosen_reading: The object is understood as God's anger from the previous clause
    and rendered as 'it.'
  alternative_readings:
  - Leave the object unstated in English
  - Supply 'my wrath' explicitly
  rationale: English normally requires an object here. Supplying 'it' preserves the
    Hebrew ellipsis without over-specifying beyond the immediate context.
  doctrine_reference: Translation philosophy §6
