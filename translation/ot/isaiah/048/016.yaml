theological_decisions:
- issue: Speaker identity and the force of 'his Spirit' in a theologically significant passage
  chosen_reading: Retain the Hebrew's first-person speech without identifying the speaker in the translation, and render וְרוּחוֹ as 'and his Spirit.'
  alternative_readings:
  - Interpret the speaker explicitly as the Servant/Messiah
  - Interpret the final phrase adverbially, e.g. 'with his Spirit'
  - Render וְרוּחוֹ as lowercase 'and his spirit'
  rationale: The verse is theologically significant because Christian readers often hear a triadic pattern here, but the Hebrew text itself does not explicitly identify the speaker. Per translation philosophy, theological tension should be preserved rather than resolved. The main text therefore leaves the speaker unspecified and translates the final clause in a straightforward way. Because the phrase can be construed in more than one way, alternatives are preserved in footnotes rather than imported into the main text.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Rendering of the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord YHWH
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
