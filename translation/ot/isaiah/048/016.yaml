id: ISA.48.16
reference: Isaiah 48:16
source:
  edition: WLC
  text: קִרְב֧וּ אֵלַ֣/י שִׁמְעוּ זֹ֗את לֹ֤א מֵ/רֹאשׁ֙ בַּ/סֵּ֣תֶר דִּבַּ֔רְתִּי מֵ/עֵ֥ת הֱיוֹתָ֖/הּ שָׁ֣ם אָ֑נִי וְ/עַתָּ֗ה אֲדֹנָ֧/י יְהוִ֛ה שְׁלָחַ֖/נִי וְ/רוּחֽ/וֹ־׃פ
translation:
  text: 'Come near to me; hear this: From the beginning I have not spoken in secret; from the time it came to be, I was there. And now the Lord GOD has sent me, and his Spirit.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from the time it happened' or 'from the time it existed'; the Hebrew says literally, 'from the time of its being.'
    reason: lexical_alternative
  - marker: b
    text: The speaker is not explicitly identified in the Hebrew. Christian readers have often understood this as the Servant/Messiah speaking, but the text itself leaves the identification implicit.
    reason: alternative_reading
  - marker: c
    text: Or, 'and his spirit.' The Hebrew phrase may be read as a distinct accompanying subject ('and his Spirit') or understood less specifically.
    reason: alternative_reading
lexical_decisions:
- source_word: קִרְבוּ
  chosen: Come near
  alternatives:
  - Draw near
  - Come close
  lexicon: HALOT
  rationale: Qal imperative plural of קרב, a direct summons to approach. 'Come near' is natural modern English and preserves the imperative force.
- source_word: שִׁמְעוּ זֹאת
  chosen: hear this
  alternatives:
  - listen to this
  lexicon: HALOT
  rationale: Imperative plural plus demonstrative. 'Hear this' is concise and idiomatic while retaining the prophetic address.
- source_word: לֹא מֵרֹאשׁ
  chosen: From the beginning ... not
  alternatives:
  - Not from the start
  - Not from the beginning
  lexicon: HALOT
  rationale: 'מֵרֹאשׁ denotes the outset or beginning. In English the phrase is best fronted with the following clause: ''From the beginning I have not spoken...''.'
- source_word: בַּסֵּתֶר
  chosen: in secret
  alternatives:
  - in hiding
  - secretly
  lexicon: HALOT
  rationale: סֵתֶר refers to concealment or secrecy. 'In secret' is the most direct idiomatic rendering in this context.
- source_word: דִּבַּרְתִּי
  chosen: I have not spoken
  alternatives:
  - I did not speak
  lexicon: HALOT
  rationale: Perfect 1cs. English present perfect fits the discourse well, linking past speech with its present accessibility.
- source_word: מֵעֵת הֱיוֹתָהּ
  chosen: from the time it came to be
  alternatives:
  - from the time it happened
  - from the time it existed
  lexicon: HALOT
  rationale: Literally 'from the time of its being.' The feminine suffix likely refers to the matter/event just mentioned. 'Came to be' preserves the verbal sense without over-specifying the referent.
- source_word: שָׁם אָנִי
  chosen: I was there
  alternatives:
  - there I am
  - I am there
  lexicon: HALOT
  rationale: Though literally 'there I,' the context is retrospective. 'I was there' best conveys presence at the time in view in natural English.
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Marks a transition from prior testimony to present commission. 'And now' preserves the connective force.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following project doctrine, יְהוָה is rendered 'the LORD.' In the compound אֲדֹנָי יְהוִה, standard English convention avoids 'Lord LORD' by rendering 'the Lord GOD,' which preserves the title distinction and readability.
- source_word: שְׁלָחַנִי
  chosen: has sent me
  alternatives:
  - sent me
  lexicon: HALOT
  rationale: Perfect 3ms + 1cs suffix. Present perfect works well in English for a present commission grounded in a completed act.
- source_word: וְרוּחוֹ
  chosen: and his Spirit
  alternatives:
  - and his spirit
  lexicon: HALOT
  rationale: רוּחַ with 3ms suffix can mean 'spirit,' 'breath,' or 'wind.' In this commissioning context, capitalized 'Spirit' is the most likely sense in Christian canonical reading, while still matching the Hebrew lexeme. The conjunction is retained straightforwardly as 'and' rather than paraphrased.
