id: ISA.48.3
reference: Isaiah 48:3
source:
  edition: WLC
  text: הָ/רִֽאשֹׁנוֹת֙ מֵ/אָ֣ז הִגַּ֔דְתִּי וּ/מִ/פִּ֥/י יָצְא֖וּ וְ/אַשְׁמִיעֵ֑/ם
    פִּתְאֹ֥ם עָשִׂ֖יתִי וַ/תָּבֹֽאנָה׃
translation:
  text: I declared the former things long ago; they went out from my mouth, and I
    made them heard. Suddenly I acted, and they came to pass.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''I proclaimed them'' for ''I made them heard.'' The Hebrew verb is
      causative: ''I caused them to be heard.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'I did it' for 'I acted.' The Hebrew verb is the common verb 'do/make,'
      here in a context of God bringing declared events about.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִאשֹׁנוֹת
  chosen: the former things
  alternatives:
  - the earlier things
  - the things of old
  lexicon: HALOT
  rationale: The feminine plural adjective used substantivally refers to prior events
    or predictions. 'Former things' is idiomatic in Isaiah and preserves the prophetic
    contrast with later/new things elsewhere in the book.
- source_word: מֵאָז
  chosen: long ago
  alternatives:
  - from then
  - from of old
  - since then
  lexicon: HALOT
  rationale: In context it points to a remote prior time of declaration, not merely
    sequence from a recent point. 'Long ago' gives natural English while preserving
    temporal distance.
- source_word: הִגַּדְתִּי
  chosen: I declared
  alternatives:
  - I told
  - I announced
  lexicon: HALOT
  rationale: The Hiphil of נגד here is a formal act of making known, especially prophetic
    declaration. 'Declared' fits the solemn divine speech better than the more colloquial
    'told'.
- source_word: וּמִפִּי יָצְאוּ
  chosen: they went out from my mouth
  alternatives:
  - they came out of my mouth
  - they proceeded from my mouth
  lexicon: HALOT
  rationale: This preserves the concrete metaphor of spoken words issuing from God's
    mouth. 'Went out from my mouth' is slightly more natural than a hyper-literal
    rendering while retaining the imagery.
- source_word: וְאַשְׁמִיעֵם
  chosen: and I made them heard
  alternatives:
  - and I proclaimed them
  - and I caused them to be heard
  - and I made them known
  lexicon: HALOT
  rationale: 'The Hiphil of שמע is causative: God caused these declarations to be
    heard. ''Made them heard'' preserves that causative force more closely than simply
    ''proclaimed,'' though the latter is a viable interpretive gloss.'
- source_word: פִּתְאֹם
  chosen: Suddenly
  alternatives:
  - all at once
  - unexpectedly
  lexicon: HALOT
  rationale: The adverb marks abrupt divine action. 'Suddenly' is the most direct
    and natural equivalent.
- source_word: עָשִׂיתִי
  chosen: I acted
  alternatives:
  - I did it
  - I brought it about
  - I accomplished it
  lexicon: HALOT
  rationale: Although the verb is simply 'I did/made,' in this context of fulfilled
    prediction the sense is divine intervention bringing events about. 'I acted' is
    concise and idiomatic, while avoiding over-interpretation.
- source_word: וַתָּבֹאנָה
  chosen: and they came to pass
  alternatives:
  - and they came
  - and they happened
  lexicon: HALOT
  rationale: The feminine plural verb refers back to 'the former things.' In English,
    for events or predictions becoming reality, 'came to pass' is the clearest idiom,
    even if slightly traditional; it accurately conveys fulfillment.
