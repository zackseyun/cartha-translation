theological_decisions:
- issue: Rendering of collective אָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  - people
  rationale: The verse speaks of the removal of the human population in judgment. 'Man' preserves the singular collective form and aligns with the project's gender-accurate policy for representative humanity, without narrowing the reference to males.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested terms table for אָדָם'
- issue: Interpretation of הָעֲזוּבָה
  chosen_reading: the forsaken places
  alternative_readings:
  - the abandonment
  - desolation
  rationale: The Hebrew can be taken abstractly ('abandonment') or concretely as the condition/areas left deserted. The concrete rendering better fits natural English and the phrase 'in the midst of the land,' while still reflecting the judgment theme without overinterpreting it.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve source sense without paraphrase'
