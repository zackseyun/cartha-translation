id: ISA.6.12
reference: Isaiah 6:12
source:
  edition: WLC
  text: וְ/רִחַ֥ק יְהוָ֖ה אֶת הָ/אָדָ֑ם וְ/רַבָּ֥ה הָ/עֲזוּבָ֖ה בְּ/קֶ֥רֶב הָ/אָֽרֶץ־׃
translation:
  text: And Yahweh will remove people far away, and the forsaken places will be many in the midst of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind' for 'man'; the Hebrew אָדָם is a collective singular referring to the human population.
    reason: lexical_alternative
  - marker: b
    text: Or 'the abandonment will be great' or 'desolation will be great in the midst of the land.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְרִחַק
  chosen: will remove far away
  alternatives:
  - will send far away
  - will make distant
  lexicon: HALOT
  rationale: Hiphil/qal-like perfect with vav in prophetic context is naturally rendered as a future in English. The verb רחק carries the sense of causing distance or removing. 'Remove far away' preserves both the causative/resultative force and the adverbial idea of distance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: אָדָם here is collective/generic, referring to human inhabitants generally. 'Man' follows the project's gender-accurate policy for representative humanity, while preserving the singular collective force better than 'people.'
- source_word: וְרַבָּה
  chosen: will be many
  alternatives:
  - will become great
  - will increase
  lexicon: HALOT
  rationale: From רבה, feminine singular agreeing with the following feminine subject עזובה. In context it predicates abundance, so 'will be many' is the most natural English rendering.
- source_word: הָעֲזוּבָה
  chosen: the forsaken places
  alternatives:
  - the abandonment
  - the desolation
  lexicon: HALOT
  rationale: The noun/participle-like form denotes that which is left behind, abandoned, or desolate. Because English requires a more concrete expression in this context, 'the forsaken places' captures the result in the land after deportation/judgment. 'Abandonment' is possible but less idiomatic with 'in the midst of the land.'
- source_word: בְּקֶרֶב הָאָרֶץ
  chosen: in the midst of the land
  alternatives:
  - within the land
  - in the heart of the land
  lexicon: HALOT
  rationale: A fairly literal rendering of the prepositional phrase that preserves the spatial imagery of widespread desolation throughout the land.
