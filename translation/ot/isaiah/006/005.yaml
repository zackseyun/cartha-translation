id: ISA.6.5
reference: Isaiah 6:5
source:
  edition: WLC
  text: וָ/אֹמַ֞ר אֽוֹי לִ֣/י כִֽי נִדְמֵ֗יתִי כִּ֣י אִ֤ישׁ טְמֵֽא שְׂפָתַ֨יִם֙ אָנֹ֔כִי
    וּ/בְ/תוֹךְ֙ עַם טְמֵ֣א שְׂפָתַ֔יִם אָנֹכִ֖י יוֹשֵׁ֑ב כִּ֗י אֶת הַ/מֶּ֛לֶךְ יְהוָ֥ה
    צְבָא֖וֹת רָא֥וּ עֵינָֽ/י־־־־־׃
translation:
  text: And I said, “Woe is me, for I am ruined; for I am a man of unclean lips, and
    I dwell among a people of unclean lips; for my eyes have seen the King, the LORD
    of Armies.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh of Armies''; traditionally, ''the LORD of Hosts.'''
    reason: alternative_reading
  - marker: b
    text: Or 'I am undone' / 'I am destroyed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֽוֹי לִי
  chosen: Woe is me
  alternatives:
  - Woe to me
  - Alas for me
  lexicon: HALOT
  rationale: An exclamation of lament and doom. 'Woe is me' is idiomatic, weighty
    English that preserves the prophetic cry better than the flatter 'alas for me.'
- source_word: נִדְמֵיתִי
  chosen: I am ruined
  alternatives:
  - I am undone
  - I am destroyed
  - I am cut off
  - I am silenced
  lexicon: HALOT
  rationale: The Niphal of דמה here expresses Isaiah's sense of being brought to ruin
    in the divine presence. 'I am ruined' is clear modern English and preserves the
    existential threat. 'Undone' is traditional but less transparent to modern readers;
    'destroyed/cut off' are possible but too specific for the context.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and self-referential to
    Isaiah himself, so 'a man' is the gender-accurate rendering required by the source.
- source_word: טְמֵא שְׂפָתַיִם
  chosen: of unclean lips
  alternatives:
  - with unclean lips
  lexicon: HALOT
  rationale: This construct phrase is naturally rendered 'of unclean lips' in English,
    preserving the Hebrew's characterization of Isaiah and his people by impurity
    located in speech.
- source_word: וּבְתוֹךְ
  chosen: among
  alternatives:
  - in the midst of
  lexicon: HALOT
  rationale: '''Among'' gives the plain sense in readable modern English. ''In the
    midst of'' is more formal but unnecessarily stiff here.'
- source_word: עַם
  chosen: a people
  alternatives:
  - the people
  - a nation
  lexicon: HALOT
  rationale: The noun is indefinite here and refers collectively to Isaiah's community.
    'A people' preserves the collective sense without over-specifying political nationhood.
- source_word: יוֹשֵׁב
  chosen: I dwell
  alternatives:
  - I live
  - I sit
  lexicon: HALOT
  rationale: Although the participle of ישב can literally mean 'sit,' in this context
    it denotes settled habitation. 'I dwell' preserves the elevated register and durative
    sense.
- source_word: הַמֶּלֶךְ
  chosen: the King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: The definite title is prominent and reverential in context. Capitalizing
    'King' in English reflects titular force in direct reference to God without altering
    meaning.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  - Yahweh of Armies
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather
    than transliterated to preserve meaning; 'Armies' is more transparent to modern
    readers than the traditional but opaque 'Hosts.' The covenant name alternative
    'Yahweh' is preserved in a footnote because doctrine specifies 'the LORD' as default.
- source_word: רָאוּ עֵינַי
  chosen: my eyes have seen
  alternatives:
  - my eyes saw
  lexicon: HALOT
  rationale: English present perfect captures the completed experience with present
    consequence, fitting Isaiah's immediate reaction to the vision.
