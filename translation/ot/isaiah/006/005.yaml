theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    יְהוָה, following Jewish reverence tradition and the Septuagintal pattern. The
    alternative 'Yahweh' is preserved in a footnote rather than used in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering צְבָאוֹת with יְהוָה
  chosen_reading: the LORD of Armies
  alternative_readings:
  - the LORD of Hosts
  rationale: The phrase denotes YHWH as sovereign over heavenly armies. 'Armies' communicates
    the meaning more transparently in contemporary English, while 'Hosts' is preserved
    in a footnote as a familiar traditional alternative.
  doctrine_reference: DOCTRINE.md Translation philosophy §6; Contested terms for יְהוָה
