theological_decisions:
- issue: Rendering of sacrificial-cleansing language in the final clause
  chosen_reading: your sin is atoned for
  alternative_readings:
  - your sin is purged
  - your sin is expiated
  rationale: The verse uses temple-purification imagery and the verb כפר, which carries
    sacrificial/expiatory force. 'Atoned for' preserves that theological weight without
    importing a narrower doctrinal theory of atonement. 'Purged' is possible but less
    transparent to modern readers; 'forgiven' would undertranslate the cultic dimension.
  doctrine_reference: Translation philosophy §§1, 3, 6
