id: ISA.6.7
reference: Isaiah 6:7
source:
  edition: WLC
  text: וַ/יַּגַּ֣ע עַל פִּ֔/י וַ/יֹּ֕אמֶר הִנֵּ֛ה נָגַ֥ע זֶ֖ה עַל שְׂפָתֶ֑י/ךָ וְ/סָ֣ר
    עֲוֺנֶ֔/ךָ וְ/חַטָּאתְ/ךָ֖ תְּכֻפָּֽר־־׃
translation:
  text: And he touched my mouth and said, “Look, this has touched your lips; your
    guilt is removed, and your sin is atoned for.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your sin is purged” or “your sin is expiated.” The Hebrew verb carries
      sacrificial-cleansing force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגַּע
  chosen: he touched
  alternatives:
  - he caused to touch
  - he reached
  lexicon: HALOT
  rationale: נגע commonly means 'touch' or 'reach.' In context the live coal is being
    applied to Isaiah's mouth by the seraph, so 'he touched' is the most natural English
    rendering.
- source_word: עַל פִּי
  chosen: my mouth
  alternatives:
  - upon my mouth
  lexicon: HALOT
  rationale: Though literally 'upon my mouth,' idiomatic English prefers 'my mouth'
    after 'touched.' Retaining 'mouth' here reflects the singular noun in the Hebrew.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention. 'Look' is readable modern
    English and preserves the deictic force without archaic tone.
- source_word: נָגַע זֶה
  chosen: this has touched
  alternatives:
  - this touched
  - this has reached
  lexicon: HALOT
  rationale: The perfect verb with demonstrative points to the just-completed action
    of the coal. English present perfect captures the immediate result now in view.
- source_word: עַל שְׂפָתֶיךָ
  chosen: your lips
  alternatives:
  - upon your lips
  lexicon: HALOT
  rationale: Hebrew uses the dual/plural form 'lips,' which should be preserved. 'Your
    lips' is idiomatic after 'has touched.'
- source_word: וְסָר
  chosen: is removed
  alternatives:
  - has departed
  - has turned aside
  - is taken away
  lexicon: HALOT
  rationale: 'סור denotes removal or turning away. A passive-like English expression
    best conveys the result on Isaiah''s condition: his guilt is no longer present.'
- source_word: עֲוֺנֶךָ
  chosen: your guilt
  alternatives:
  - your iniquity
  lexicon: HALOT
  rationale: עָוֹן can denote both iniquity and the guilt/liability arising from it.
    Here, paired with 'your sin' in the next clause and followed by expiation language,
    'your guilt' best distinguishes the terms in natural English.
- source_word: וְחַטָּאתְךָ
  chosen: your sin
  alternatives:
  - your sin offering
  lexicon: HALOT
  rationale: חטאת usually means 'sin' in this kind of moral-cleansing context. 'Sin
    offering' is not likely here because the object is Isaiah's own moral condition,
    not a sacrificial item.
- source_word: תְּכֻפָּר
  chosen: is atoned for
  alternatives:
  - is purged
  - is expiated
  - is forgiven
  lexicon: HALOT
  rationale: The pual of כפר denotes being covered/purged/atoned for. 'Is atoned for'
    preserves the cultic-theological force better than the flatter 'is forgiven,'
    while remaining accessible English.
