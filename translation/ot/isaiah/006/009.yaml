theological_decisions:
- issue: Whether the verse should be rendered as direct imperatives or as an ironic/judicial
    prediction
  chosen_reading: 'Direct imperatives with rhetorical force: ''Keep hearing ... keep
    seeing ... do not understand ... do not know.'''
  alternative_readings:
  - 'Predictive sense: ''You will indeed hear ... but not understand; you will indeed
    see ... but not know/perceive.'''
  rationale: The Hebrew forms שִׁמְעוּ and רְאוּ are imperatives, and the following
    negatives with imperfects naturally continue the command-like force. In context,
    the commands function as a prophetic/judicial commission and thus carry ironic
    force, but the translation should not flatten the grammar into mere prediction.
    The predictive nuance is worth preserving in a footnote because later biblical
    citations often reflect that sense in translation tradition.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
