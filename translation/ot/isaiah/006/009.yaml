id: ISA.6.9
reference: Isaiah 6:9
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר לֵ֥ךְ וְ/אָמַרְתָּ֖ לָ/עָ֣ם הַ/זֶּ֑ה שִׁמְע֤וּ שָׁמ֨וֹעַ֙ וְ/אַל
    תָּבִ֔ינוּ וּ/רְא֥וּ רָא֖וֹ וְ/אַל תֵּדָֽעוּ־־׃
translation:
  text: 'And he said, “Go, and say to this people: ‘Keep hearing, but do not understand;
    keep seeing, but do not know.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, “Hear indeed, but do not understand; see indeed, but do not know,”
      preserving the Hebrew intensification more formally. The line can also be understood
      with a predictive force: “You will indeed hear ... you will indeed see ...”'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר introducing direct speech. 'And he
    said' preserves Hebrew narrative flow without overinterpreting temporal sequence.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Go on
  lexicon: HALOT
  rationale: Imperative of הלך addressed to Isaiah. Simple 'Go' is the plain sense
    and fits the commission context.
- source_word: וְאָמַרְתָּ
  chosen: and say
  alternatives:
  - and you shall say
  - and tell
  lexicon: HALOT
  rationale: Sequential command following 'Go.' 'And say' is natural English while
    remaining close to the Hebrew.
- source_word: לָעָם הַזֶּה
  chosen: to this people
  alternatives:
  - to this nation
  - to these people
  lexicon: HALOT
  rationale: עָם commonly means 'people.' Singular with demonstrative is best preserved
    as 'this people,' which also retains the distancing tone of the Hebrew.
- source_word: שִׁמְעוּ שָׁמוֹעַ
  chosen: Keep hearing
  alternatives:
  - Hear indeed
  - Listen carefully
  - You will surely hear
  lexicon: HALOT
  rationale: Imperative + infinitive absolute intensifies the verbal idea. 'Keep hearing'
    captures the durative/intensive force in idiomatic English better than the traditional
    but opaque 'hear indeed.'
- source_word: וְאַל תָּבִינוּ
  chosen: but do not understand
  alternatives:
  - yet do not understand
  - and do not perceive
  lexicon: HALOT
  rationale: בין denotes understanding/discernment. 'But' brings out the adversative
    force naturally in English, though the Hebrew conjunction is simply waw plus negative
    particle.
- source_word: וּרְאוּ רָאוֹ
  chosen: keep seeing
  alternatives:
  - see indeed
  - look carefully
  - you will surely see
  lexicon: HALOT
  rationale: Like the previous clause, imperative + infinitive absolute intensifies
    the action. 'Keep seeing' preserves the repeated/continued force in clear modern
    English.
- source_word: וְאַל תֵּדָעוּ
  chosen: but do not know
  alternatives:
  - yet do not know
  - but do not perceive
  lexicon: HALOT
  rationale: ידע here is broader than mere cognition but overlaps with recognition/perception.
    'Know' is the most direct lexical equivalent; 'perceive' is possible but would
    blur the distinction from בין in the previous clause.
