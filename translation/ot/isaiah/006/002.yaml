theological_decisions:
- issue: Whether to translate שְׂרָפִים literally or as a recognized heavenly-being
    term
  chosen_reading: Seraphim
  alternative_readings:
  - burning ones
  - seraphs
  rationale: The context is a throne-room vision featuring a specific class of heavenly
    beings. Transliteration preserves the textual distinctiveness without overcommitting
    to an etymological interpretation that may suggest more than the verse explicitly
    states.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition, balanced with readable modern English.'
- issue: Referent of לוֹ ('him')
  chosen_reading: above him
  alternative_readings:
  - above it
  rationale: The immediate context is the Lord seated on the throne, so the masculine
    singular suffix is best taken personally. This avoids depersonalizing the vision's
    central figure.
  doctrine_reference: 'Affirmations: historic Christian orthodoxy; preserve what the
    text states without importing extra claims.'
- issue: Rendering singular distributive verbs/pronouns for the seraphim
  chosen_reading: 'Each had six wings: with two he covered...'
  alternative_readings:
  - 'Each had six wings: with two it covered...'
  - 'They each had six wings: with two they covered...'
  rationale: Hebrew shifts to distributive singular. English 'he' best matches the
    grammatical singular while remaining natural; 'it' is unsuitable for personal
    heavenly beings, and pluralizing throughout would flatten the Hebrew's distributive
    force.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral.'
