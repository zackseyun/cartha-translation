id: ISA.6.2
reference: Isaiah 6:2
source:
  edition: WLC
  text: שְׂרָפִ֨ים עֹמְדִ֤ים מִ/מַּ֨עַל֙ ל֔/וֹ שֵׁ֧שׁ כְּנָפַ֛יִם שֵׁ֥שׁ כְּנָפַ֖יִם
    לְ/אֶחָ֑ד בִּ/שְׁתַּ֣יִם יְכַסֶּ֣ה פָנָ֗י/ו וּ/בִ/שְׁתַּ֛יִם יְכַסֶּ֥ה רַגְלָ֖י/ו
    וּ/בִ/שְׁתַּ֥יִם יְעוֹפֵֽף׀׀׃
translation:
  text: 'Seraphim were standing above him. Each had six wings: with two he covered
    his face, and with two he covered his feet, and with two he flew.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seraphs'; the term may be related to a root meaning 'burning ones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂרָפִים
  chosen: Seraphim
  alternatives:
  - burning ones
  - seraphs
  lexicon: HALOT
  rationale: Kept as the conventional transliterated name for this heavenly class
    of beings in Isaiah 6, since a literal rendering like 'burning ones' is possible
    etymologically but less certain and less natural in English for this vision context.
- source_word: עֹמְדִים
  chosen: were standing
  alternatives:
  - stood
  - standing
  lexicon: HALOT
  rationale: 'Rendered as past progressive to reflect the participial form in narrative
    vision description: they are depicted as in a standing position rather than performing
    a simple punctiliar act.'
- source_word: מִמַּעַל לוֹ
  chosen: above him
  alternatives:
  - over him
  - from above him
  lexicon: HALOT
  rationale: The phrase indicates position relative to the enthroned Lord in the vision.
    'Above him' is the most natural English expression of spatial relation here.
- source_word: שֵׁשׁ כְּנָפַיִם ... שֵׁשׁ כְּנָפַיִם לְאֶחָד
  chosen: Each had six wings
  alternatives:
  - six wings, six wings to each one
  - each one had six wings
  lexicon: HALOT
  rationale: The Hebrew repeats 'six wings' and then specifies 'to one,' meaning each
    individual seraph had six wings. English idiom is clearer with the distributive
    'Each had six wings.'
- source_word: בִּשְׁתַּיִם
  chosen: with two
  alternatives:
  - by two
  - with two of them
  lexicon: HALOT
  rationale: Instrumental beth is naturally rendered 'with two,' referring to two
    wings used for each action.
- source_word: יְכַסֶּה
  chosen: he covered
  alternatives:
  - would cover
  - covered
  lexicon: HALOT
  rationale: Singular verb matches the distributive singular sense of 'each.' English
    uses 'he' generically for each seraph in sequence. Past tense fits the visionary
    narration.
- source_word: פָנָיו
  chosen: his face
  lexicon: HALOT
  rationale: Straightforward possessive rendering; singular aligns with the distributive
    singular verb.
- source_word: רַגְלָיו
  chosen: his feet
  alternatives:
  - his legs
  lexicon: HALOT
  rationale: The Hebrew dual/plural form in context refers to feet. 'Feet' is the
    standard and contextually appropriate rendering.
- source_word: יְעוֹפֵף
  chosen: he flew
  alternatives:
  - he would fly
  - he was flying
  lexicon: HALOT
  rationale: Rendered as simple past in coordination with the preceding verbs. The
    imperfect here describes the action performed with two wings in the vision.
