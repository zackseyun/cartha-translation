theological_decisions:
- issue: Identity of 'the holy seed'
  chosen_reading: Rendered as 'The holy seed is its stump' without specifying whether
    this refers to a faithful remnant, Israel's future continuation, or a messianic
    line.
  alternative_readings:
  - the faithful remnant within Israel
  - the surviving covenant people
  - a messianic seed
  rationale: The Hebrew metaphor points to a consecrated surviving core after judgment,
    but the verse itself does not explicitly define the referent more narrowly. To
    preserve theological tension and avoid importing a later doctrinal conclusion,
    the translation keeps the phrase literal and leaves fuller interpretation to readers
    and notes.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
