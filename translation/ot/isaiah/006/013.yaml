id: ISA.6.13
reference: Isaiah 6:13
source:
  edition: WLC
  text: וְ/ע֥וֹד בָּ/הּ֙ עֲשִׂ֣רִיָּ֔ה וְ/שָׁ֖בָה וְ/הָיְתָ֣ה לְ/בָעֵ֑ר כָּ/אֵלָ֣ה
    וְ/כָ/אַלּ֗וֹן אֲשֶׁ֤ר בְּ/שַׁלֶּ֨כֶת֙ מַצֶּ֣בֶת בָּ֔/ם זֶ֥רַע קֹ֖דֶשׁ מַצַּבְתָּֽ/הּ׃פ
translation:
  text: And though a tenth remains in it, it will again be burned away—like a terebinth
    or like an oak whose stump remains when it is felled. The holy seed is its stump.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at leaf-fall' / 'when its leaves fall.' The Hebrew term בְּשַׁלֶּכֶת
      is difficult; the main text follows the sense that fits the stump imagery of
      a tree after cutting.
    reason: lexical_alternative
lexical_decisions:
- source_word: ע֥וֹד
  chosen: though ... remains
  alternatives:
  - still
  - yet
  - again
  lexicon: HALOT
  rationale: 'Here עוֹד introduces a concessive/continuative idea in context: even
    if something remains. Rendering with ''though'' captures the force in smooth English
    while preserving the sense of continued remainder.'
- source_word: בָּהּ
  chosen: in it
  alternatives:
  - within her
  - in her
  lexicon: HALOT
  rationale: The pronoun is feminine singular, referring back to the land/city understood
    as feminine. English idiom prefers 'it' for the land in this context.
- source_word: עֲשִׂרִיָּה
  chosen: a tenth
  alternatives:
  - a tenth part
  - one-tenth
  lexicon: HALOT
  rationale: The noun denotes a tenth portion. 'A tenth' is concise and natural while
    preserving the quantitative image.
- source_word: וְשָׁבָה
  chosen: will again
  alternatives:
  - will return
  - shall return
  lexicon: HALOT
  rationale: 'From שוב, literally ''return,'' but in this construction it introduces
    recurrence of the following judgment. ''Will again'' best fits the idiom in English:
    the remnant will once more undergo the stated fate.'
- source_word: וְהָיְתָה לְבָעֵר
  chosen: it will again be burned away
  alternatives:
  - it will be for burning
  - it will be for consuming
  - it will become fuel
  lexicon: HALOT
  rationale: לְבָעֵר can mean 'for burning/consuming.' The phrase describes renewed
    devastation of the remaining tenth. 'Be burned away' communicates the result clearly
    in modern English without over-paraphrasing.
- source_word: כָּאֵלָה
  chosen: like a terebinth
  alternatives:
  - like a great tree
  lexicon: HALOT
  rationale: אֵלָה specifically denotes the terebinth tree. The specific botanical
    term should be preserved rather than generalized.
- source_word: וְכָאַלּוֹן
  chosen: or like an oak
  alternatives:
  - and like an oak
  lexicon: HALOT
  rationale: אַלּוֹן denotes an oak. The prefixed conjunction with repeated comparative
    כ is naturally rendered 'or like an oak' in the paired simile.
- source_word: בְּשַׁלֶּכֶת
  chosen: when it is felled
  alternatives:
  - at leaf-fall
  - when leaves fall
  - in felling
  lexicon: HALOT
  rationale: This term is difficult and debated. While it can be associated with leaf-fall,
    in this context with 'stump remains in them' many interpreters understand the
    image of a tree cut down. The rendering 'when it is felled' best fits the immediate
    syntax and the stump imagery, while the alternative is preserved in a footnote.
- source_word: מַצֶּבֶת בָּם
  chosen: whose stump remains
  alternatives:
  - in which there is a stump
  - whose trunk remains in them
  - a standing stump is in them
  lexicon: HALOT
  rationale: מַצֶּבֶת denotes something standing/set up; in tree imagery it refers
    to the standing stump or stock left after cutting. 'Whose stump remains' gives
    idiomatic English and preserves the metaphor.
- source_word: זֶרַע קֹדֶשׁ
  chosen: The holy seed
  alternatives:
  - a holy seed
  - holy offspring
  lexicon: HALOT
  rationale: The phrase is definite in sense here and functions as the interpretive
    conclusion of the metaphor. 'Holy seed' preserves the covenantal and remnant connotations
    without importing later doctrinal specificity.
- source_word: מַצַּבְתָּהּ
  chosen: is its stump
  alternatives:
  - is its stock
  - is its standing stump
  lexicon: HALOT
  rationale: Same root/image as מַצֶּבֶת above. 'Stump' is the clearest English equivalent
    in this arboreal metaphor and links the final clause to the preceding simile.
