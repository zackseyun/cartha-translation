theological_decisions:
- issue: First person plural in divine speech ('for us')
  chosen_reading: Retain the plural 'for us' in the main text without resolving its
    referent.
  alternative_readings:
  - A heavenly council setting
  - A plural of majesty/deliberation
  - An adumbration read canonically by Christians in light of Trinitarian doctrine
  rationale: The Hebrew text plainly has a first person plural suffix. The translation
    should preserve this theological tension rather than collapse it into a singular
    or specify the referent. This respects both the immediate literary context and
    the doctrine guideline not to import doctrinal claims the text does not explicitly
    make.
  doctrine_reference: Preserve theological tension rather than resolve it.
