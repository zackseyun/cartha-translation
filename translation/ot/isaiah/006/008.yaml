id: ISA.6.8
reference: Isaiah 6:8
source:
  edition: WLC
  text: וָ/אֶשְׁמַ֞ע אֶת ק֤וֹל אֲדֹנָ/י֙ אֹמֵ֔ר אֶת מִ֥י אֶשְׁלַ֖ח וּ/מִ֣י יֵֽלֶךְ
    לָ֑/נוּ וָ/אֹמַ֖ר הִנְ/נִ֥י שְׁלָחֵֽ/נִי־־־׃
translation:
  text: Then I heard the voice of the Lord saying, “Whom shall I send, and who will
    go for us?” And I said, “Here am I. Send me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'for us.' The plural may reflect the heavenly council context; some
      Christian readers also see a canonical resonance with later Trinitarian revelation.
      The text itself does not specify the referent.
    reason: alternative_reading
  - marker: b
    text: Or 'Here I am.' The Hebrew idiom expresses readiness and availability.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁמַע
  chosen: Then I heard
  alternatives:
  - And I heard
  - So I heard
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'Then' captures the sequential force
    in natural English, while 'heard' straightforwardly renders שׁמע.
- source_word: קוֹל
  chosen: voice
  alternatives:
  - sound
  lexicon: HALOT
  rationale: In context of articulated speech ('saying'), 'voice' is the most natural
    and specific rendering.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - the Lord GOD
  - the Master
  lexicon: HALOT
  rationale: The title אֲדֹנָי here refers to God. Per doctrine, the default rendering
    for the divine title equivalent is 'Lord.' 'Master' is possible lexically but
    less idiomatic here and weaker in established theological usage.
- source_word: אֹמֵר
  chosen: saying
  alternatives:
  - who said
  lexicon: HALOT
  rationale: The participle following 'heard the voice' is naturally rendered 'saying'
    in English and preserves the ongoing speech sense.
- source_word: מִי אֶשְׁלַח
  chosen: Whom shall I send
  alternatives:
  - Who shall I send
  lexicon: HALOT
  rationale: English formal object case after 'send' favors 'whom.' The Hebrew interrogative
    marks the object of sending.
- source_word: וּמִי יֵלֶךְ לָנוּ
  chosen: and who will go for us
  alternatives:
  - and who will go on our behalf
  - and who will go for me
  lexicon: HALOT
  rationale: לָנוּ is first person plural, so 'for us' should be preserved. 'On our
    behalf' is a possible expansion but less direct. The singular alternative reflects
    interpretation, not the Hebrew form.
- source_word: הִנְנִי
  chosen: Here am I
  alternatives:
  - Here I am
  - Behold me
  lexicon: HALOT
  rationale: The idiom expresses readiness and self-presentation. 'Here am I' preserves
    the solemn register of the prophetic call scene better than the more casual 'Here
    I am.'
- source_word: שְׁלָחֵנִי
  chosen: Send me
  alternatives:
  - You send me
  lexicon: HALOT
  rationale: 'Imperative + 1cs suffix is best rendered as a direct request/offer:
    ''Send me.'''
