theological_decisions:
- issue: Rendering of אֲדֹנָי in a divine-vision context
  chosen_reading: the Lord
  alternative_readings:
  - the master
  rationale: The term is the divine title אֲדֹנָי, not YHWH. Following the doctrine's
    contested-terms guidance, the title is translated 'Lord.' This also preserves
    the text's theological force without importing the covenant name where it is not
    written.
  doctrine_reference: 'Contested terms: κύριος / Lord; Translation philosophy §2'
- issue: Sense of הֵיכָל
  chosen_reading: temple
  alternative_readings:
  - palace
  rationale: The Hebrew term can denote either a palace or a temple, but in Isaiah's
    throne-room vision with seraphim and holiness acclamation in the following context,
    'temple' best communicates the sanctuary setting. The royal connotations remain
    present through the throne imagery.
  doctrine_reference: Translation philosophy §1, §6
