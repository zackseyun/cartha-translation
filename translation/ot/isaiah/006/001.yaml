id: ISA.6.1
reference: Isaiah 6:1
source:
  edition: WLC
  text: בִּ/שְׁנַת מוֹת֙ הַ/מֶּ֣לֶךְ עֻזִּיָּ֔הוּ וָ/אֶרְאֶ֧ה אֶת אֲדֹנָ֛/י יֹשֵׁ֥ב
    עַל כִּסֵּ֖א רָ֣ם וְ/נִשָּׂ֑א וְ/שׁוּלָ֖י/ו מְלֵאִ֥ים אֶת הַ/הֵיכָֽל־־־־׃
translation:
  text: In the year of King Uzziah’s death, I saw the Lord seated on a throne, high
    and lifted up, and the hem of his robe filled the temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his train filled the temple.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew hekal can mean 'palace' or 'temple'; here 'temple' fits the heavenly
      sanctuary vision.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁנַת
  chosen: In the year of
  alternatives:
  - In the year when
  lexicon: HALOT
  rationale: Temporal prepositional phrase marking the time of the vision. 'In the
    year of' is natural English and preserves the construct relationship with the
    following noun.
- source_word: מוֹת
  chosen: death
  alternatives:
  - dying
  lexicon: HALOT
  rationale: The construct noun denotes the event of death, not a process. 'Death'
    is the standard and most natural rendering in this temporal expression.
- source_word: הַמֶּלֶךְ עֻזִּיָּהוּ
  chosen: King Uzziah
  alternatives:
  - the king, Uzziah
  lexicon: HALOT
  rationale: Title plus personal name is best rendered idiomatically in English as
    'King Uzziah.' The name is transliterated per project policy.
- source_word: וָאֶרְאֶה
  chosen: I saw
  alternatives:
  - then I saw
  - and I saw
  lexicon: HALOT
  rationale: Wayyiqtol first person singular narrates the prophet's experience. English
    typically omits the conjunction here for smoothness while retaining the simple
    past sense.
- source_word: אֶת אֲדֹנָי
  chosen: the Lord
  alternatives:
  - the master
  lexicon: HALOT
  rationale: 'אֲדֹנָי here is the divine title, not the Tetragrammaton. Per doctrine,
    the default rendering for this title is ''Lord.'' The definite article in English
    is appropriate in this visionary context: ''I saw the Lord.'''
- source_word: יֹשֵׁב
  chosen: seated
  alternatives:
  - sitting
  lexicon: HALOT
  rationale: The participle describes the Lord's enthroned posture. 'Seated' is idiomatic
    in English for royal enthronement and carries the stative force well.
- source_word: עַל כִּסֵּא
  chosen: on a throne
  alternatives:
  - upon a throne
  lexicon: HALOT
  rationale: Standard rendering of enthronement imagery. 'On a throne' is contemporary
    and clear.
- source_word: רָם וְנִשָּׂא
  chosen: high and lifted up
  alternatives:
  - exalted and lifted up
  - high and exalted
  lexicon: HALOT
  rationale: This pair is a weighty Isaianic expression of exaltation. 'High and lifted
    up' preserves the imagery and cadence of the Hebrew better than flattening both
    terms into a single abstract gloss.
- source_word: שׁוּלָיו
  chosen: the hem of his robe
  alternatives:
  - his train
  - the skirts of his robe
  lexicon: HALOT
  rationale: The noun refers to the lower edges or trailing hem of a garment. 'Train'
    is traditional and possible, but 'the hem of his robe' is clearer for modern readers
    while preserving the concrete image.
- source_word: מְלֵאִים אֶת הַהֵיכָל
  chosen: filled the temple
  alternatives:
  - were filling the temple
  - filled the palace
  lexicon: HALOT
  rationale: The plural participle agrees with 'hem' in a collective sense and describes
    the effect of the robe's extremities occupying the sanctuary. 'Filled the temple'
    is natural English. הֵיכָל can mean palace or temple, but in this vision of divine
    worship the sanctuary sense is primary.
