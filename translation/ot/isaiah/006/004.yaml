theological_decisions:
- issue: Temple terminology in prophetic vision
  chosen_reading: the house
  alternative_readings:
  - the temple
  rationale: The Hebrew says 'the house,' a common designation for the temple. Retaining
    'house' preserves the source wording and avoids importing an interpretive gloss
    into the main text, while the temple sense remains clear from context.
  doctrine_reference: Translation philosophy §1, §5
