id: ISA.6.4
reference: Isaiah 6:4
source:
  edition: WLC
  text: וַ/יָּנֻ֨עוּ֙ אַמּ֣וֹת הַ/סִּפִּ֔ים מִ/קּ֖וֹל הַ/קּוֹרֵ֑א וְ/הַ/בַּ֖יִת יִמָּלֵ֥א
    עָשָֽׁן׃
translation:
  text: The foundations of the thresholds shook at the sound of the one calling, and
    the house was filled with smoke.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple.' Hebrew 'the house,' a common term for the temple sanctuary.
    reason: lexical_alternative
  - marker: b
    text: Or 'posts of the thresholds' or 'supports of the thresholds.' The Hebrew
      expression refers to structural parts of the doorway/threshold area.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּנֻעוּ
  chosen: shook
  alternatives:
  - quaked
  - trembled
  - were shaken
  lexicon: HALOT
  rationale: From נוּעַ, indicating movement or shaking. 'Shook' is natural modern
    English and preserves the vivid physical disturbance without overinterpreting
    intensity.
- source_word: אַמּוֹת
  chosen: foundations
  alternatives:
  - posts
  - supports
  - pivots
  lexicon: HALOT
  rationale: Although the noun can denote structural supports or doorposts, in this
    collocation with הַסִּפִּים it most naturally refers to the supporting bases/foundations
    of the thresholds. 'Foundations' best conveys the architectural effect in idiomatic
    English.
- source_word: הַסִּפִּים
  chosen: the thresholds
  alternatives:
  - the doorways
  - the sills
  - the doorposts
  lexicon: HALOT
  rationale: סַף commonly refers to threshold/sill. 'Thresholds' is the most direct
    and contextually fitting rendering here, especially in temple imagery.
- source_word: מִקּוֹל
  chosen: at the sound of
  alternatives:
  - from the sound of
  - because of the voice of
  lexicon: HALOT
  rationale: Literally 'from the sound/voice of,' expressing cause. 'At the sound
    of' is idiomatic English that preserves the causal sense.
- source_word: הַקּוֹרֵא
  chosen: the one calling
  alternatives:
  - the caller
  - the one who called
  - him who called
  lexicon: HALOT
  rationale: 'The participle is substantival: ''the one calling.'' This preserves
    the ongoing verbal force better than the more static ''caller.'' The immediate
    context points to the seraph whose cry triggers the shaking, but the translation
    leaves the referent as stated in the Hebrew.'
- source_word: וְהַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  - the palace
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In context it refers to the temple sanctuary
    of Isaiah's vision, but 'house' preserves the Hebrew wording while still being
    understandable in context.
- source_word: יִמָּלֵא
  chosen: was filled
  alternatives:
  - filled
  - became full of
  lexicon: HALOT
  rationale: 'The Niphal imperfect here is naturally rendered as a passive past in
    English narrative sequence: ''was filled.'''
- source_word: עָשָׁן
  chosen: smoke
  lexicon: HALOT
  rationale: Straightforward lexical equivalent; no compelling reason to vary.
