id: ISA.6.10
reference: Isaiah 6:10
source:
  edition: WLC
  text: הַשְׁמֵן֙ לֵב הָ/עָ֣ם הַ/זֶּ֔ה וְ/אָזְנָ֥י/ו הַכְבֵּ֖ד וְ/עֵינָ֣י/ו הָשַׁ֑ע
    פֶּן יִרְאֶ֨ה בְ/עֵינָ֜י/ו וּ/בְ/אָזְנָ֣י/ו יִשְׁמָ֗ע וּ/לְבָב֥/וֹ יָבִ֛ין וָ/שָׁ֖ב
    וְ/רָ֥פָא לֽ/וֹ־־׃
translation:
  text: Make the heart of this people dull, and make their ears heavy, and blind their
    eyes, lest they see with their eyes, and hear with their ears, and understand
    with their heart, and turn back, and be healed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shut their eyes' or 'smear over their eyes'; the Hebrew verb conveys
      making the eyes unresponsive.
    reason: lexical_alternative
  - marker: b
    text: Or 'return'; the verb can denote turning back generally, and in context
      may include repentance.
    reason: lexical_alternative
  - marker: c
    text: Hebrew has a collective singular ('this people') with singular verbs in
      the latter clause; English renders the sense with plural pronouns.
    reason: cultural_note
lexical_decisions:
- source_word: הַשְׁמֵן
  chosen: Make ... dull
  alternatives:
  - make fat
  - make insensitive
  lexicon: HALOT
  rationale: Hiphil imperative of שׁמן literally means 'make fat,' but in idiom with
    'heart' it denotes making the inner faculty unresponsive or dull. 'Dull' preserves
    the metaphorical sense in natural English without over-paraphrasing.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: Hebrew לֵב commonly denotes the inner person including thought and will.
    'Heart' preserves the Hebrew anthropological term and its biblical resonance.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: The singular collective 'this people' closely reflects the Hebrew and
    matches prophetic diction better than the more idiomatic plural 'these people.'
- source_word: הַכְבֵּד
  chosen: make ... heavy
  alternatives:
  - dull
  - harden
  lexicon: HALOT
  rationale: Hiphil imperative of כבד with 'ears' is idiomatically 'make heavy,' conveying
    impaired receptivity. Retaining 'heavy' preserves the metaphor and avoids importing
    the stronger theological term 'harden' where the Hebrew here uses a different
    image.
- source_word: הָשַׁע
  chosen: blind
  alternatives:
  - shut
  - smear over
  lexicon: HALOT
  rationale: With 'eyes' the verb denotes causing them to be unresponsive/closed over.
    'Blind' communicates the effect clearly in English, though the underlying image
    may be of shutting or smearing over.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that not
  lexicon: HALOT
  rationale: '''Lest'' best captures the preventative force of פֶּן in a compact and
    suitably solemn way for prophetic discourse.'
- source_word: יִרְאֶה ... יִשְׁמַע ... יָבִין
  chosen: they see ... hear ... understand
  alternatives:
  - he sees ... hears ... understands
  lexicon: HALOT
  rationale: 'Although the verbs are morphologically singular, they refer back to
    the collective singular ''this people.'' English idiom naturally renders the sense
    with plural pronouns: ''their ... they.'''
- source_word: וּלְבָבוֹ
  chosen: their heart
  alternatives:
  - his heart
  lexicon: HALOT
  rationale: The singular noun with singular suffix agrees with the collective singular
    'people,' but English again naturally expresses the collective with plural possessive
    while retaining 'heart' as the anthropological center.
- source_word: וָשָׁב
  chosen: turn back
  alternatives:
  - return
  - repent
  lexicon: HALOT
  rationale: שׁוב fundamentally means 'turn/return.' 'Turn back' preserves the verbal
    image without prematurely specifying 'repent,' which would narrow the semantic
    range beyond the immediate wording.
- source_word: וְרָפָא לוֹ
  chosen: be healed
  alternatives:
  - I heal him
  - he is healed
  lexicon: HALOT
  rationale: 'The Hebrew is terse and somewhat elliptical: literally ''and it is healed
    for him'' or ''and healing comes to him.'' ''Be healed'' gives the natural English
    result sense without adding an explicit subject not present in the Hebrew text.'
