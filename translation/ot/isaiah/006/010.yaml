theological_decisions:
- issue: Divine agency in judicial hardening
  chosen_reading: 'Render the imperatives directly as a commission from God to Isaiah:
    ''Make... make... blind...'' while preserving the purpose clause ''lest...'' without
    softening it.'
  alternative_readings:
  - Render as permissive ('Let the heart... become dull')
  - Render as resultative rather than imperative
  rationale: The Hebrew uses second masculine singular Hiphil imperatives addressed
    to the prophet. The translation should preserve the stark force of divine judicial
    hardening rather than resolve the theological tension by weakening the commands.
    This aligns with the stated principle of preserving theological tension where
    the source is difficult.
  doctrine_reference: Translation philosophy §3
- issue: Collective singular vs. English natural number
  chosen_reading: Use singular 'this people' with plural pronouns thereafter.
  alternative_readings:
  - Maintain singular pronouns throughout ('his eyes... he hear...')
  rationale: This preserves the Hebrew collective singular while producing readable
    modern English. It does not alter theology, only reflects normal English agreement
    for collective referents.
  doctrine_reference: Translation philosophy §6
