id: ISA.6.6
reference: Isaiah 6:6
source:
  edition: WLC
  text: וַ/יָּ֣עָף אֵלַ֗/י אֶחָד֙ מִן הַ/שְּׂרָפִ֔ים וּ/בְ/יָד֖/וֹ רִצְפָּ֑ה בְּ/מֶ֨לְקַחַ֔יִם
    לָקַ֖ח מֵ/עַ֥ל הַ/מִּזְבֵּֽחַ־׃
translation:
  text: Then one of the seraphim flew to me, and in his hand was a glowing coal that
    he had taken from the altar with tongs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a live coal.' The Hebrew term can denote a hot stone or burning coal
      taken from the altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּעָף
  chosen: flew
  alternatives:
  - came flying
  lexicon: HALOT
  rationale: The verb from עוּף denotes flying. English 'flew' is the plain sense;
    'came flying' is possible but less direct since the motion toward Isaiah is already
    expressed by אֵלַי.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - toward me
  lexicon: HALOT
  rationale: The preposition אֶל with 1cs suffix indicates movement directed toward
    the speaker. 'To me' is idiomatic and precise.
- source_word: אֶחָד מִן־הַשְּׂרָפִים
  chosen: one of the seraphim
  alternatives:
  - one of the burning ones
  lexicon: HALOT
  rationale: שְׂרָפִים is best retained as the established heavenly-being term 'seraphim'
    in this vision context. A more etymological rendering like 'burning ones' is possible
    but would sound interpretive and less natural in English.
- source_word: וּבְיָדוֹ
  chosen: and in his hand was
  alternatives:
  - with in his hand
  - carrying in his hand
  lexicon: HALOT
  rationale: The phrase is nominal and describes what the seraph had in hand. Supplying
    'was' is required in English. 'In his hand' preserves the concrete imagery better
    than a more paraphrastic 'carrying.'
- source_word: רִצְפָּה
  chosen: a glowing coal
  alternatives:
  - a live coal
  - a hot stone
  lexicon: HALOT
  rationale: רִצְפָּה refers to a hot stone/ember/coal from the altar. 'Glowing coal'
    communicates the heat and cultic setting in accessible modern English. 'Live coal'
    is traditional and viable; 'hot stone' is lexically possible but less idiomatic
    here.
- source_word: בְּמֶלְקַחַיִם
  chosen: with tongs
  alternatives:
  - in tongs
  - with a pair of tongs
  lexicon: HALOT
  rationale: The noun denotes tongs or snuffers. 'With tongs' is natural English for
    the instrument used to take the coal.
- source_word: לָקַח
  chosen: he had taken
  alternatives:
  - he took
  lexicon: HALOT
  rationale: 'The qatal following the noun phrase most naturally describes prior action
    relative to the seraph''s flight: the coal was one that he had taken from the
    altar. English past perfect clarifies the sequence without adding content.'
- source_word: מֵעַל הַמִּזְבֵּחַ
  chosen: from the altar
  alternatives:
  - from upon the altar
  - off the altar
  lexicon: HALOT
  rationale: מֵעַל literally means 'from upon/off of.' 'From the altar' is smoother
    English while preserving the source sense in context.
