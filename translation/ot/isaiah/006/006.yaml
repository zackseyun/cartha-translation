theological_decisions:
- issue: Rendering of שְׂרָפִים in a heavenly throne-room vision
  chosen_reading: seraphim
  alternative_readings:
  - burning ones
  rationale: The term names a class of heavenly beings in Isaiah 6. Retaining 'seraphim'
    preserves the literary and theological specificity of the vision rather than reducing
    it to an etymological gloss.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of רִצְפָּה in the altar-purification scene
  chosen_reading: glowing coal
  alternative_readings:
  - live coal
  - hot stone
  rationale: The scene concerns a heated object taken from the altar for purification.
    'Glowing coal' communicates the object clearly in modern English without importing
    later doctrinal language. The traditional 'live coal' is preserved in a footnote
    as a lexical alternative.
  doctrine_reference: Translation philosophy §6
