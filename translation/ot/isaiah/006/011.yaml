theological_decisions:
- issue: Rendering of אָדָם in a generic-human sense
  chosen_reading: man
  alternative_readings:
  - anyone
  - person
  rationale: The Hebrew uses אָדָם generically for a human being, not specifically
    a male individual. Following the doctrine's gender-accurate principle, 'man' is
    retained in the main text because it matches the source's representative force
    and preserves the terseness of the judgment oracle. An inclusive alternative is
    preserved in a footnote for readers who may otherwise misread it as male-exclusive.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
