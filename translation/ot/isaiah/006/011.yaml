id: ISA.6.11
reference: Isaiah 6:11
source:
  edition: WLC
  text: וָ/אֹמַ֕ר עַד מָתַ֖י אֲדֹנָ֑/י וַ/יֹּ֡אמֶר עַ֣ד אֲשֶׁר֩ אִם שָׁא֨וּ עָרִ֜ים
    מֵ/אֵ֣ין יוֹשֵׁ֗ב וּ/בָתִּים֙ מֵ/אֵ֣ין אָדָ֔ם וְ/הָ/אֲדָמָ֖ה תִּשָּׁאֶ֥ה שְׁמָמָֽה־־׃
translation:
  text: Then I said, “Until when, Lord?” And he said, “Until cities lie ruined, without
    inhabitant, and houses without man, and the land is laid waste into desolation.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “How long, Lord?”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “houses without man”; that is, without anyone in them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: Then I said
  alternatives:
  - And I said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then I said' gives natural
    English sequence while preserving the simple verbal sense.
- source_word: עַד מָתַי
  chosen: Until when
  alternatives:
  - How long
  lexicon: HALOT
  rationale: Literally 'until when.' 'How long' is idiomatic English and possible,
    but 'Until when' better matches the reply's repeated עַד אֲשֶׁר structure and
    preserves the verbal linkage.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  lexicon: HALOT
  rationale: This is the divine title addressed by Isaiah. 'Lord' is the standard
    rendering for אֲדֹנָי and aligns with the doctrine's default for κύριος/Lord-type
    titles. The 1cs suffix is lexicalized in the title and not normally brought out
    as 'my Lord' here.
- source_word: עַד אֲשֶׁר אִם
  chosen: Until
  alternatives:
  - Until when
  - Until such time as
  - Until if/indeed
  lexicon: HALOT
  rationale: The combination introduces the limit of the hardening judgment. In English,
    'Until' best captures the force without awkward literalism. The particle אִם here
    is idiomatic/intensive in this construction rather than conditional in normal
    English sense.
- source_word: שָׁאוּ
  chosen: lie ruined
  alternatives:
  - are devastated
  - are desolate
  lexicon: HALOT
  rationale: From שׁאה, denoting devastation/desolation. 'Lie ruined' is vivid, natural
    English for cities after judgment, while preserving the resultative sense.
- source_word: עָרִים
  chosen: cities
  lexicon: HALOT
  rationale: Straightforward plural of 'city.'
- source_word: מֵאֵין יוֹשֵׁב
  chosen: without inhabitant
  alternatives:
  - with no one living there
  - without anyone dwelling there
  lexicon: HALOT
  rationale: The phrase literally means 'from there being no inhabitant.' 'Without
    inhabitant' is concise and close to the Hebrew. Singular collective 'inhabitant'
    works idiomatically after plural 'cities.'
- source_word: וּבָתִּים מֵאֵין אָדָם
  chosen: and houses without man
  alternatives:
  - and houses without anyone
  - and houses with no person
  lexicon: HALOT
  rationale: אָדָם here refers to a human being generically. Per doctrine, gender-accurate
    rendering is preferred; 'man' can carry representative force. The phrase is stark
    and parallel to the previous colon. An inclusive alternative is worth preserving
    in a footnote because modern readers may hear 'man' narrowly.
- source_word: וְהָאֲדָמָה
  chosen: and the land
  alternatives:
  - and the ground
  lexicon: HALOT
  rationale: In this judgment context אֲדָמָה refers to the country/land rather than
    soil as such. 'Land' fits the scope of national devastation.
- source_word: תִּשָּׁאֶה
  chosen: is laid waste
  alternatives:
  - is devastated
  - becomes desolate
  lexicon: HALOT
  rationale: Niphal of the same root as שָׁאוּ, expressing the land's becoming desolated.
    'Is laid waste' gives a strong passive/resultative sense and avoids awkward repetition
    of 'ruined/desolate' in every clause.
- source_word: שְׁמָמָה
  chosen: into desolation
  alternatives:
  - a desolation
  - utterly desolate
  lexicon: HALOT
  rationale: The noun intensifies the previous verb. 'Into desolation' preserves the
    Hebrew's piling up of devastation language, though slightly idiomatic in English.
    It communicates the final state of the land.
