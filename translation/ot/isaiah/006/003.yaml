- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering יְהוָה צְבָאוֹת
  chosen_reading: Yahweh of hosts
  alternative_readings:
  - the LORD of armies
  - Yahweh of hosts
  rationale: The title is retained in a form familiar to English readers and close to the Hebrew. 'Hosts' preserves the title's theological breadth and liturgical resonance without over-specifying the referent.
