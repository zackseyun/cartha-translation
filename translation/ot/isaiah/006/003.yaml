id: ISA.6.3
reference: Isaiah 6:3
source:
  edition: WLC
  text: וְ/קָרָ֨א זֶ֤ה אֶל זֶה֙ וְ/אָמַ֔ר קָד֧וֹשׁ קָד֛וֹשׁ קָד֖וֹשׁ יְהוָ֣ה צְבָא֑וֹת מְלֹ֥א כָל הָ/אָ֖רֶץ כְּבוֹדֽ/וֹ־׀־׃
translation:
  text: 'And one called to another and said: “Holy, holy, holy is Yahweh of hosts; the whole earth is full of his glory.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the LORD of armies.” The Hebrew title 'the LORD of hosts' refers to the heavenly and earthly forces under his command.
    reason: lexical_alternative
  - marker: b
    text: Hebrew YHWH, traditionally rendered “the LORD.”
    reason: alternative_reading
lexical_decisions:
- source_word: וְקָרָא
  chosen: called
  alternatives:
  - cried out
  - called out
  lexicon: HALOT
  rationale: Qal wayyiqtol of קרא commonly means 'call' or 'cry out.' 'Called' fits the antiphonal setting with the following 'to another,' while remaining natural English.
- source_word: זֶה אֶל זֶה
  chosen: one to another
  alternatives:
  - this one to this one
  - to one another
  lexicon: HALOT
  rationale: Idiomatic reciprocal expression. Rendered as 'one to another' to preserve the Hebrew sense of mutual calling while sounding natural in English.
- source_word: וְאָמַר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Standard narrative continuation after wayyiqtol; 'and said' is the most straightforward English rendering.
- source_word: קָדוֹשׁ קָדוֹשׁ קָדוֹשׁ
  chosen: Holy, holy, holy
  lexicon: HALOT
  rationale: The thrice-repeated adjective is preserved exactly for emphasis and liturgical force; no expansion is warranted.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - of heavenly armies
  lexicon: HALOT
  rationale: In the divine title יְהוָה צְבָאוֹת, 'hosts' is the established and sufficiently transparent rendering, preserving the breadth of heavenly and earthly forces under God's command better than the narrower 'armies.'
- source_word: מְלֹא כָל הָאָרֶץ
  chosen: the whole earth is full
  alternatives:
  - all the earth is his fullness
  - the fullness of all the earth
  lexicon: HALOT
  rationale: 'The nominal construction is most naturally expressed in English with a predicate: ''the whole earth is full.'' This captures the sense without wooden awkwardness.'
- source_word: כְּבוֹדוֹ
  chosen: of his glory
  alternatives:
  - with his glory
  - his glory
  lexicon: HALOT
  rationale: Attached to the fullness expression, the sense is that the earth is full of God's glory. English idiom prefers 'full of his glory'; 'with his glory' is possible but less natural here.
