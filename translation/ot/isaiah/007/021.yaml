id: ISA.7.21
reference: Isaiah 7:21
source:
  edition: WLC
  text: וְ/הָיָ֖ה בַּ/יּ֣וֹם הַ/ה֑וּא יְחַיֶּה אִ֛ישׁ עֶגְלַ֥ת בָּקָ֖ר וּ/שְׁתֵּי
    צֹֽאן־־׃
translation:
  text: And in that day a man will keep alive a young cow and two sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a heifer.' The Hebrew phrase refers to a young female from the cattle
      herd.
    reason: lexical_alternative
  - marker: b
    text: Hebrew צֹאן is a collective term for small livestock, often including sheep
      and goats.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will
  alternatives:
  - And it will happen
  - And it shall be
  lexicon: HALOT
  rationale: The clause-opening וְהָיָה is a common narrative/prophetic formula meaning
    'and it will be/happen.' In idiomatic English, its force is naturally carried
    by 'And ... will' together with the temporal phrase 'in that day,' avoiding wooden
    repetition while preserving future reference.
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: A standard prophetic temporal expression. 'In that day' is a conventional
    and natural English rendering that preserves the eschatological/prophetic cadence.
- source_word: יְחַיֶּה
  chosen: will keep alive
  alternatives:
  - will sustain
  - will preserve alive
  - will raise
  lexicon: HALOT
  rationale: 'Piel of חיה here most naturally means to keep an animal alive, sustain,
    or maintain. ''Keep alive'' best reflects the concrete sense in context: a man
    will have only a very small number of animals and will maintain them. ''Raise''
    is possible in English for livestock but can suggest breeding rather than simple
    survival; ''keep alive'' stays closer to the Hebrew verb.'
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: HALOT
  rationale: The Hebrew is singular masculine אִישׁ. Per the translation philosophy's
    gender-accurate principle, 'a man' is preferred over a gender-neutral substitute,
    especially since the verse presents a representative individual rather than abstract
    humanity.
- source_word: עֶגְלַת בָּקָר
  chosen: a young cow
  alternatives:
  - a heifer
  - a young cow of the herd
  lexicon: HALOT
  rationale: The construct phrase denotes a female calf/young cow from cattle. 'Heifer'
    is precise but less accessible for modern readers; 'young cow' preserves the sense
    in readable English. The singular is maintained.
- source_word: וּשְׁתֵּי צֹאן
  chosen: and two sheep
  alternatives:
  - and two head of sheep
  - and two goats/sheep
  lexicon: HALOT
  rationale: צֹאן is a collective term for small livestock, often sheep and goats.
    In this context, 'two sheep' is the most natural concise rendering, though the
    broader sense could include goats. The numeral requires a small count of animals,
    and English idiom favors 'two sheep' over more technical livestock phrasing.
