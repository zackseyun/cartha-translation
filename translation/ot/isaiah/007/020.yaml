theological_decisions:
- issue: Interpretation of the shaving metaphor
  chosen_reading: The verse depicts the Lord using Assyria as his instrument of humiliating
    judgment against Judah.
  alternative_readings:
  - A merely descriptive military image without emphasis on humiliation
  rationale: The imagery of shaving head, lower-body hair, and beard strongly suggests
    disgrace and total stripping, not merely defeat. The syntax identifies the king
    of Assyria as the 'hired razor' wielded by the Lord.
