id: ISA.7.20
reference: Isaiah 7:20
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֡וּא יְגַלַּ֣ח אֲדֹנָ/י֩ בְּ/תַ֨עַר הַ/שְּׂכִירָ֜ה בְּ/עֶבְרֵ֤י
    נָהָר֙ בְּ/מֶ֣לֶךְ אַשּׁ֔וּר אֶת הָ/רֹ֖אשׁ וְ/שַׂ֣עַר הָ/רַגְלָ֑יִם וְ/גַ֥ם אֶת
    הַ/זָּקָ֖ן תִּסְפֶּֽה־־׃ס
translation:
  text: In that day the Lord will shave with a hired razor from beyond the River—with
    the king of Assyria—the head and the hair of the feet, and it will also sweep
    away the beard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the hair of the legs'; 'the feet' may also function as a euphemism
      for the genitals, emphasizing complete humiliation.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְגַלַּח
  chosen: will shave
  alternatives:
  - will shave off
  lexicon: HALOT
  rationale: Piel of גלח denotes shaving/cutting hair. 'Will shave' is the plain image;
    the objects that follow make clear what is shaved.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: This is the divine title אֲדֹנָי, appropriately rendered 'the Lord' in
    English prose. It is not the Tetragrammaton here, but the standard title still
    takes 'Lord' per translation philosophy.
- source_word: בְּתַעַר הַשְּׂכִירָה
  chosen: with a hired razor
  alternatives:
  - with the hired razor
  - with a razor that is hired
  lexicon: HALOT
  rationale: תער is 'razor.' The adjective שׂכירה means 'hired' or 'leased.' The phrase
    is metaphorical, describing Assyria as an instrument employed by God. 'With a
    hired razor' preserves the metaphor naturally.
- source_word: בְּעֶבְרֵי נָהָר
  chosen: from beyond the River
  alternatives:
  - in the regions beyond the River
  - on the other side of the River
  lexicon: HALOT
  rationale: Literally 'in/from the regions of beyond the River.' In Isaiah this commonly
    refers to the Euphrates region. 'From beyond the River' is concise and idiomatic
    while preserving the geographic designation.
- source_word: בְּמֶלֶךְ אַשּׁוּר
  chosen: with the king of Assyria
  alternatives:
  - by means of the king of Assyria
  - namely, the king of Assyria
  lexicon: HALOT
  rationale: 'The beth marks instrumentality/apposition: the hired razor is identified
    as the king of Assyria, the means by which the Lord shaves. ''With the king of
    Assyria'' keeps the instrumental force and the metaphor.'
- source_word: הָרֹאשׁ
  chosen: the head
  lexicon: HALOT
  rationale: Straightforward anatomical term; part of the shaving image.
- source_word: שַׂעַר הָרַגְלָיִם
  chosen: the hair of the feet
  alternatives:
  - the hair of the legs
  - the pubic hair
  lexicon: HALOT
  rationale: Literally 'the hair of the feet.' In Hebrew 'feet' can function euphemistically
    for the genital area, and many interpreters understand a humiliating total shaving
    here. The main text keeps the literal wording for transparency, while a footnote
    preserves the euphemistic alternative.
- source_word: וְגַם אֶת הַזָּקָן
  chosen: and also the beard
  alternatives:
  - and even the beard
  lexicon: HALOT
  rationale: גם adds emphasis ('also/even'). 'And also the beard' fits the escalating
    image of complete humiliation.
- source_word: תִּסְפֶּה
  chosen: it will also sweep away
  alternatives:
  - it will remove
  - it will consume
  lexicon: HALOT
  rationale: From ספה, 'to sweep away, make an end of, remove.' The feminine singular
    verb agrees with the feminine subject 'razor.' 'Sweep away' preserves the vividness
    and totality of the action.
