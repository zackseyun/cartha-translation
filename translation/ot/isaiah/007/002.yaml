id: ISA.7.2
reference: Isaiah 7:2
source:
  edition: WLC
  text: וַ/יֻּגַּ֗ד לְ/בֵ֤ית דָּוִד֙ לֵ/אמֹ֔ר נָ֥חָֽה אֲרָ֖ם עַל אֶפְרָ֑יִם וַ/יָּ֤נַע
    לְבָב/וֹ֙ וּ/לְבַ֣ב עַמּ֔/וֹ כְּ/נ֥וֹעַ עֲצֵי יַ֖עַר מִ/פְּנֵי רֽוּחַ־־־׃
translation:
  text: And it was reported to the house of David, saying, “Aram has settled on Ephraim.”
    And his heart and the heart of his people shook, as the trees of the forest shake
    before the wind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Aram has allied itself with Ephraim'; the Hebrew literally says 'has
      settled/rested on Ephraim,' a phrase that may describe military positioning
      or political alignment.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֻּגַּד
  chosen: it was reported
  alternatives:
  - it was told
  - word was brought
  lexicon: HALOT
  rationale: Passive/impersonal Hophal of נגד; English impersonal passive best matches
    the Hebrew narrative style without supplying an explicit subject.
- source_word: לְבֵית דָּוִד
  chosen: to the house of David
  alternatives:
  - to David's house
  - to the royal house of David
  lexicon: HALOT
  rationale: Retains the dynastic designation rather than reducing it to an individual
    king; this is the plain sense and preserves the covenantal-political nuance.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - that
  - with the message
  lexicon: HALOT
  rationale: Standard rendering introducing reported speech; keeps the formal narrative
    linkage.
- source_word: נָחָה
  chosen: has settled on
  alternatives:
  - has come to rest on
  - has allied with
  - has encamped against
  lexicon: HALOT
  rationale: The verb literally denotes coming to rest/settling. In context of Aram
    and Ephraim, it likely refers to Aram's positioning/support with Ephraim. 'Has
    settled on' preserves the concrete image while allowing the political-military
    sense. More interpretive options are preserved in a footnote.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - Syria
  lexicon: HALOT
  rationale: Transliterates the proper name in keeping with the philosophy to transliterate
    names rather than substitute later geopolitical labels.
- source_word: עַל אֶפְרָיִם
  chosen: on Ephraim
  alternatives:
  - against Ephraim
  - with Ephraim
  - upon Ephraim
  lexicon: HALOT
  rationale: The preposition על with נוח yields a somewhat compressed idiom. 'On Ephraim'
    is the most literal, but in English 'settled on Ephraim' communicates attachment/alignment.
    Alternative contextual construals are footnoted.
- source_word: וַיָּנַע
  chosen: shook
  alternatives:
  - trembled
  - quaked
  - was shaken
  lexicon: HALOT
  rationale: The verb נוע conveys shaking or swaying. 'Shook' fits both the singular
    heart and the simile of trees in wind, preserving the image.
- source_word: לְבָבוֹ
  chosen: his heart
  alternatives:
  - his mind
  lexicon: HALOT
  rationale: Hebrew לבב commonly denotes the inner self, including thought and emotion.
    'Heart' is the standard and preserves the metaphor.
- source_word: וּלְבַב עַמּוֹ
  chosen: and the heart of his people
  alternatives:
  - and his people's heart
  lexicon: HALOT
  rationale: Maintains the parallel structure with 'his heart' while using natural
    English syntax.
- source_word: כְּנוֹעַ
  chosen: as ... shake
  alternatives:
  - as ... sway
  - like the shaking of
  lexicon: HALOT
  rationale: Infinitive construct used in simile; rendered with a finite English verb
    for natural comparison while preserving the repeated root with וַיָּנַע.
- source_word: עֲצֵי יַעַר
  chosen: the trees of the forest
  alternatives:
  - forest trees
  - trees of a forest
  lexicon: HALOT
  rationale: Natural English rendering of the construct phrase, preserving the vivid
    image.
- source_word: מִפְּנֵי רוּחַ
  chosen: before the wind
  alternatives:
  - from the wind
  - at the presence of the wind
  lexicon: HALOT
  rationale: מִפְּנֵי often means 'because of' or 'before/in the face of.' 'Before
    the wind' is idiomatic in this simile and evokes the force confronting the trees.
