theological_decisions:
- issue: Referent of 'house of David'
  chosen_reading: Retained as 'the house of David' rather than identifying only Ahaz.
  alternative_readings:
  - Ahaz
  - the royal court
  rationale: The Hebrew names the Davidic house, not merely the individual king. Preserving
    the dynastic term maintains the broader covenantal and political significance
    without importing extra theology.
  doctrine_reference: Translation philosophy §1, §2
- issue: Political sense of Aram's relation to Ephraim
  chosen_reading: Rendered with the more literal 'has settled on Ephraim' and preserved
    interpretive alternatives in a footnote.
  alternative_readings:
  - has allied with Ephraim
  - has encamped against Ephraim
  rationale: The phrase is contextually compressed and can be understood in military-political
    terms. To preserve tension rather than over-resolve it, the main text stays close
    to the Hebrew image while the footnote records likely contextual senses.
  doctrine_reference: Translation philosophy §3
