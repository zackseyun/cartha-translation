theological_decisions:
- issue: Rendering of הָעַלְמָה in a christologically significant prophecy
  chosen_reading: the young woman
  alternative_readings:
  - the virgin
  rationale: The Hebrew noun עלמה by itself most directly denotes a young woman, not
    explicitly virginity. To avoid importing later interpretive tradition into the
    Hebrew main text, 'the young woman' is used. Because the Septuagint renders it
    with a term commonly understood as 'virgin' and Matthew 1:23 cites the verse in
    relation to Jesus' birth, the alternative is preserved in a footnote to maintain
    theological transparency and canonical connection without collapsing the Hebrew
    into the later citation.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Temporal/aspectual force of הָרָה וְיֹלֶדֶת
  chosen_reading: is pregnant and is bearing
  alternative_readings:
  - shall conceive and bear
  - is with child and will bear
  rationale: The Hebrew uses a predicate adjective plus participle, which most naturally
    describes an ongoing or imminent state rather than a simple future. The traditional
    English 'shall conceive and bear' is influenced by later reception history and
    Greek citation. The chosen rendering follows the Hebrew form more closely while
    preserving readability.
  doctrine_reference: Translation philosophy §1
- issue: Who names the child in וְקָרָאת
  chosen_reading: she will call his name
  alternative_readings:
  - you will call his name
  - his name shall be called
  rationale: The Masoretic Text as given is best represented by a feminine singular
    reading, yielding 'she will call.' Because ancient versions and Matthew 1:23 reflect
    a different form ('they/you shall call' or passive-like English tradition 'shall
    be called'), the alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §3
