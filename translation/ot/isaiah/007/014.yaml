id: ISA.7.14
reference: Isaiah 7:14
source:
  edition: WLC
  text: לָ֠/כֵן יִתֵּ֨ן אֲדֹנָ֥/י ה֛וּא לָ/כֶ֖ם א֑וֹת הִנֵּ֣ה הָ/עַלְמָ֗ה הָרָה֙ וְ/יֹלֶ֣דֶת
    בֵּ֔ן וְ/קָרָ֥את שְׁמ֖/וֹ עִמָּ֥נוּ אֵֽל׃
translation:
  text: 'Therefore the Lord himself will give you a sign: behold, the young woman
    is pregnant and is bearing a son, and she will call his name Immanuel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the virgin.' The Hebrew word here is עַלְמָה ('young woman'); the Greek
      Septuagint renders it with a word often understood as 'virgin,' and Matthew
      1:23 cites the verse in that form.
    reason: alternative_reading
  - marker: b
    text: 'Traditional rendering: ''shall conceive and bear a son.'' The Hebrew more
      literally describes the woman as already pregnant and bearing.'
    reason: lexical_alternative
  - marker: c
    text: Or 'you shall call his name,' reflected in some ancient versional traditions;
      Matthew 1:23 has 'they shall call his name.'
    reason: textual_variant
  - marker: d
    text: Immanuel means 'God with us.'
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Discourse marker introducing the consequence of Ahaz's refusal; 'Therefore'
    is the most natural formal-modern rendering.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: This is not the Tetragrammaton but אֲדֹנָי, conventionally and accurately
    rendered 'the Lord.' Lowercase article reflects normal English syntax.
- source_word: הוּא
  chosen: himself
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The independent pronoun is emphatic; 'himself' brings out the emphasis
    that the Lord personally gives the sign.
- source_word: לָכֶם
  chosen: you
  alternatives:
  - to you
  - for you
  lexicon: HALOT
  rationale: Second person plural in Hebrew, addressed to the house of David/Ahaz
    and his people. English 'you' preserves the form, with plurality noted in rationale
    rather than awkwardly marked in the main text.
- source_word: אוֹת
  chosen: a sign
  alternatives:
  - sign
  lexicon: HALOT
  rationale: Standard rendering for a portent or confirming token from God.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Retained because the verse is solemn and prophetic; 'behold' preserves
    the deictic force without paraphrase.
- source_word: הָעַלְמָה
  chosen: the young woman
  alternatives:
  - the virgin
  - the maiden
  lexicon: HALOT
  rationale: עלמה denotes a young woman of marriageable age and does not itself lexically
    require virginity. In keeping with original-language primacy, the main text uses
    'young woman.' Because of the verse's christological significance and the longstanding
    rendering 'virgin' reflected in the Greek tradition and Matthew 1:23, that alternative
    is preserved in a footnote rather than imported into the main text.
- source_word: הָרָה
  chosen: is pregnant
  alternatives:
  - is with child
  - has conceived
  lexicon: HALOT
  rationale: Predicate adjective describing present pregnancy. 'Is pregnant' is clear
    modern English and better reflects the adjectival form than the more interpretive
    'shall conceive.'
- source_word: וְיֹלֶדֶת
  chosen: is bearing
  alternatives:
  - is about to bear
  - will bear
  - and bears
  lexicon: HALOT
  rationale: Qal participle feminine singular. The participial sequence with הָרָה
    naturally presents the woman as pregnant and bearing. 'Is bearing' preserves the
    aspect without over-resolving whether the sense is immediate present or near future.
- source_word: בֵּן
  chosen: a son
  alternatives:
  - son
  lexicon: HALOT
  rationale: Indefinite object in English idiom after 'bearing'.
- source_word: וְקָרָאת
  chosen: she will call
  alternatives:
  - and she calls
  - you will call
  - one will call
  lexicon: HALOT
  rationale: Given the feminine singular verbal form, the most straightforward reading
    is 'she will call.' Some textual/interpretive traditions render 'you shall call'
    or passive-like 'his name shall be called,' but the MT points to a 3fs/2ms-form
    issue often discussed in versions. The Masoretic pointing here is best represented
    as 'she will call,' with alternatives preserved in a footnote.
- source_word: שְׁמוֹ
  chosen: his name
  alternatives:
  - him
  lexicon: HALOT
  rationale: Hebrew idiom 'call his name X' is preserved in lightly naturalized English.
- source_word: עִמָּנוּ אֵל
  chosen: Immanuel
  alternatives:
  - God is with us
  - God-with-us
  lexicon: HALOT
  rationale: Per translation philosophy, personal names are transliterated by standard
    conventions. The meaning of the name is important and can be supplied in a footnote.
