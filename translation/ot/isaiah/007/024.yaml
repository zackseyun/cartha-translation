id: ISA.7.24
reference: Isaiah 7:24
source:
  edition: WLC
  text: בַּ/חִצִּ֥ים וּ/בַ/קֶּ֖שֶׁת יָ֣בוֹא שָׁ֑מָּ/ה כִּי שָׁמִ֥יר וָ/שַׁ֖יִת תִּֽהְיֶ֥ה
    כָל הָ/אָֽרֶץ־־׃
translation:
  text: One will come there with arrows and with a bow, because all the land will
    become briers and thorns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will come there with arrows and with a bow'; the Hebrew verb is singular
      and may be understood generically.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the land will be briers and thorns.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּ/חִצִּים
  chosen: with arrows
  alternatives:
  - with the arrows
  lexicon: HALOT
  rationale: The preposition ב plus the article and plural noun literally yields 'with
    the arrows,' but in English the instrumental sense is best conveyed as 'with arrows.'
    The phrase describes coming equipped for hunting or protection in a depopulated,
    overgrown land.
- source_word: וּ/בַ/קֶּשֶׁת
  chosen: and with a bow
  alternatives:
  - and with the bow
  lexicon: HALOT
  rationale: Instrumental ב is rendered naturally in English as 'with a bow.' The
    singular 'bow' pairs idiomatically with plural 'arrows' as standard hunting weaponry.
- source_word: יָבֹא
  chosen: One will come
  alternatives:
  - he will come
  - people will come
  lexicon: HALOT
  rationale: The verb is 3ms singular. Hebrew often uses a singular verb generically.
    'One will come' preserves the singular while avoiding an overly specific male
    referent. 'People will come' would smooth the sense but loses the grammatical
    singular.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - to that place
  lexicon: HALOT
  rationale: Standard adverbial rendering. 'There' is concise and fits the prophetic
    description of the devastated region.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: 'Here כִּי gives the reason for coming armed: the land has become overgrown
    and dangerous. ''Because'' is clearer in modern English than the more formal ''for.'''
- source_word: שָׁמִיר וָשַׁיִת
  chosen: briers and thorns
  alternatives:
  - thorns and briars
  - thornbush and weeds
  lexicon: HALOT
  rationale: This fixed pair in Isaiah denotes uncultivated overgrowth and desolation.
    'Briers and thorns' is a natural English equivalent that preserves the image of
    invasive, thorny vegetation. The order follows the Hebrew pair.
- source_word: תִּהְיֶה
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: 'Although the verb is simply ''will be,'' English ''will become'' better
    conveys the resulting state in context: formerly cultivated land turning into
    wasteland. This is an optimal-equivalence choice driven by the larger oracle.'
- source_word: כָל הָאָרֶץ
  chosen: all the land
  alternatives:
  - the whole land
  - all the הארץ
  lexicon: HALOT
  rationale: In context this refers to the land/region under judgment rather than
    the entire globe. 'All the land' preserves the comprehensiveness within the local
    setting.
