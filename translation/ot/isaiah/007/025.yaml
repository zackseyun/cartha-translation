id: ISA.7.25
reference: Isaiah 7:25
source:
  edition: WLC
  text: וְ/כֹ֣ל הֶ/הָרִ֗ים אֲשֶׁ֤ר בַּ/מַּעְדֵּר֙ יֵעָ֣דֵר֔וּ/ן לֹֽא תָב֣וֹא שָׁ֔מָּ/ה
    יִרְאַ֖ת שָׁמִ֣יר וָ/שָׁ֑יִת וְ/הָיָה֙ לְ/מִשְׁלַ֣ח שׁ֔וֹר וּ/לְ/מִרְמַ֖ס שֶֽׂה־׃פ
translation:
  text: And as for all the hills that used to be hoed with a hoe, you will not go
    there for fear of briers and thorns; they will become a place for the sending
    out of oxen and for the trampling of sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that are dug/cultivated with the hoe.' The Hebrew uses a cognate noun
      and verb for hoeing.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew ''you will not go there'' may function generically: ''one will not
      go there.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'a place where oxen are let loose' or more interpretively 'pasture for
      oxen.'
    reason: lexical_alternative
  - marker: d
    text: '''Sheep'' translates Hebrew שֶׂה, which can also refer more broadly to
      small livestock.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  chosen: And as for all
  alternatives:
  - And all
  - As for all
  lexicon: HALOT
  rationale: The conjunction plus כֹּל introduces a new element within the description
    of the land's devastation. 'And as for all' captures the slight topical shift
    better than a bare 'and all,' while remaining natural English.
- source_word: הֶהָרִים
  chosen: the hills
  alternatives:
  - the mountains
  lexicon: HALOT
  rationale: הַר can mean 'mountain' or 'hill.' In this agricultural context—terrain
    worked with a hoe and later used for grazing—'hills' better fits idiomatic English
    and the likely scale in view.
- source_word: אֲשֶׁר בַּמַּעְדֵּר יֵעָדֵרוּן
  chosen: that used to be hoed with a hoe
  alternatives:
  - that are dug with the hoe
  - that are cultivated with a hoe
  lexicon: HALOT
  rationale: The noun מַעְדֵּר is 'hoe/mattock,' and the Niphal/related passive-like
    verbal form from עדר here denotes being worked/hoed. 'Used to be hoed with a hoe'
    brings out the former cultivated state in contrast with the coming desolation.
    The repetition of cognate noun and verb is preserved in English as much as possible.
- source_word: לֹא תָבוֹא שָׁמָּה
  chosen: you will not go there
  alternatives:
  - one will not go there
  - you will not come there
  lexicon: HALOT
  rationale: The 2ms verb can function generically. English often uses 'you' generically
    in such cases. 'Go there' is more natural than 'come there' in this context of
    describing avoidance.
- source_word: יִרְאַת
  chosen: for fear of
  alternatives:
  - because of fear of
  - the fear of
  lexicon: HALOT
  rationale: The construct noun 'fear of' governs the following pair 'briers and thorns.'
    In English, 'for fear of' idiomatically expresses the reason for avoiding the
    place.
- source_word: שָׁמִיר וָשַׁיִת
  chosen: briers and thorns
  alternatives:
  - thorns and briars
  - thornbush and brier
  lexicon: HALOT
  rationale: This pair regularly denotes invasive thorny growth in judgment/desolation
    contexts. 'Briers and thorns' is a clear, conventional English rendering that
    preserves the imagery.
- source_word: וְהָיָה
  chosen: they will become
  alternatives:
  - it will become
  - and it will be
  lexicon: HALOT
  rationale: Although grammatically singular, the verb resumes the collective sense
    of the hills/terrain. Rendering with plural English ('they will become') matches
    the antecedent 'all the hills' and reads naturally.
- source_word: לְמִשְׁלַח שׁוֹר
  chosen: a place for the sending out of oxen
  alternatives:
  - a place where oxen are let loose
  - pasture for oxen
  lexicon: HALOT
  rationale: מִשְׁלַח literally involves sending out/letting loose. Rather than flattening
    immediately to 'pasture,' the translation keeps the concrete image of animals
    being turned loose there.
- source_word: וּלְמִרְמַס שֶׂה
  chosen: for the trampling of sheep
  alternatives:
  - for sheep to trample
  - for the treading of sheep/goats
  lexicon: HALOT
  rationale: מִרְמַס denotes trampling/treading. שֶׂה can refer broadly to small livestock,
    but 'sheep' is the most common and accessible rendering unless context requires
    broader specificity.
