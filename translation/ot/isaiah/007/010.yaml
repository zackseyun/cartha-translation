id: ISA.7.10
reference: Isaiah 7:10
source:
  edition: WLC
  text: וַ/יּ֣וֹסֶף יְהוָ֔ה דַּבֵּ֥ר אֶל אָחָ֖ז לֵ/אמֹֽר־׃
translation:
  text: And Yahweh continued to speak to Ahaz, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''And the LORD added to speak to Ahaz,'' meaning ''the LORD continued speaking to Ahaz'' or ''the LORD spoke again to Ahaz.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹסֶף
  chosen: continued
  alternatives:
  - added
  - again
  lexicon: HALOT
  rationale: The idiom יָסַף + infinitive commonly means 'to continue' or 'to do again.' Here, with דַּבֵּר, it introduces renewed speech by God. 'Continued' is natural English and captures the iterative sense better than the more wooden 'added.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: דַּבֵּר
  chosen: to speak
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: 'Following וַיּוֹסֶף, the infinitive construct functions idiomatically: ''continued to speak.'' This preserves the Hebrew verbal construction in clear English.'
- source_word: אֶל
  chosen: to
  alternatives:
  - with
  lexicon: HALOT
  rationale: The preposition אֶל regularly marks direction toward a person; 'to Ahaz' is the standard and contextually appropriate rendering for speech addressed to someone.
- source_word: אָחָז
  chosen: Ahaz
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The infinitive לֵאמֹר introduces the content of speech in standard Hebrew narrative style. 'Saying' preserves the discourse marker without over-paraphrasing.
