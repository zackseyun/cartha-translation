id: ISA.7.10
reference: Isaiah 7:10
source:
  edition: WLC
  text: וַ/יּ֣וֹסֶף יְהוָ֔ה דַּבֵּ֥ר אֶל אָחָ֖ז לֵ/אמֹֽר־׃
translation:
  text: And the LORD continued to speak to Ahaz, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''And the LORD added to speak to Ahaz,'' meaning ''the LORD
      continued speaking to Ahaz'' or ''the LORD spoke again to Ahaz.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹסֶף
  chosen: continued
  alternatives:
  - added
  - again
  lexicon: HALOT
  rationale: The idiom יָסַף + infinitive commonly means 'to continue' or 'to do again.'
    Here, with דַּבֵּר, it introduces renewed speech by God. 'Continued' is natural
    English and captures the iterative sense better than the more wooden 'added.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following Jewish reverence tradition and common English Bible convention.
- source_word: דַּבֵּר
  chosen: to speak
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: 'Following וַיּוֹסֶף, the infinitive construct functions idiomatically:
    ''continued to speak.'' This preserves the Hebrew verbal construction in clear
    English.'
- source_word: אֶל
  chosen: to
  alternatives:
  - with
  lexicon: HALOT
  rationale: The preposition אֶל regularly marks direction toward a person; 'to Ahaz'
    is the standard and contextually appropriate rendering for speech addressed to
    someone.
- source_word: אָחָז
  chosen: Ahaz
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The infinitive לֵאמֹר introduces the content of speech in standard Hebrew
    narrative style. 'Saying' preserves the discourse marker without over-paraphrasing.
