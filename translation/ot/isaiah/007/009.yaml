id: ISA.7.9
reference: Isaiah 7:9
source:
  edition: WLC
  text: וְ/רֹ֤אשׁ אֶפְרַ֨יִם֙ שֹׁמְר֔וֹן וְ/רֹ֥אשׁ שֹׁמְר֖וֹן בֶּן רְמַלְיָ֑הוּ אִ֚ם
    לֹ֣א תַאֲמִ֔ינוּ כִּ֖י לֹ֥א תֵאָמֵֽנוּ־׃ס
translation:
  text: And the head of Ephraim is Samaria, and the head of Samaria is the son of
    Remaliah. If you do not believe, surely you will not be established.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew wordplay: the two verbs come from the same root (אמן), linking ''believe/trust''
      with ''be established/stand firm.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'If you do not trust, you will not stand firm.'
    reason: alternative_reading
lexical_decisions:
- source_word: רֹאשׁ
  chosen: head
  alternatives:
  - chief
  - capital
  lexicon: HALOT
  rationale: Retained the metaphorical/political term 'head' to mirror the Hebrew
    parallelism ('head of Ephraim... head of Samaria'). 'Capital' would smooth the
    first clause but would not fit the second clause as naturally, where a person
    is in view.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  alternatives:
  - the kingdom of Ephraim
  - Israel
  lexicon: HALOT
  rationale: Transliterated the tribal/regional name as a proper name. In context
    it refers to the northern kingdom, but the Hebrew says 'Ephraim,' and the translation
    preserves that designation rather than interpreting it in the main text.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  lexicon: HALOT
  rationale: Standard English transliteration of the place name; here it functions
    as the capital city of Ephraim.
- source_word: בֶּן רְמַלְיָהוּ
  chosen: the son of Remaliah
  alternatives:
  - Remaliah's son
  - Pekah son of Remaliah
  lexicon: HALOT
  rationale: Translated literally. Isaiah's use of the dynastic/patronymic label rather
    than the king's personal name is rhetorically significant and should be preserved.
- source_word: אִם לֹא
  chosen: If you do not
  alternatives:
  - Surely not
  - Indeed, if not
  lexicon: HALOT
  rationale: Taken as the protasis introducing a conditional statement. This preserves
    the wordplay and syntax of the verse better than collapsing it into an asseverative
    particle.
- source_word: תַאֲמִינוּ
  chosen: believe
  alternatives:
  - trust
  - have faith
  lexicon: HALOT
  rationale: From אמן in the Hiphil, here meaning to believe/trust. 'Believe' is concise
    and idiomatic, while preserving the verbal link with the following Niphal form
    from the same root.
- source_word: כִּי
  chosen: surely
  alternatives:
  - then
  - for
  - indeed
  lexicon: HALOT
  rationale: Rendered idiomatically to bring out the emphatic/apodotic force in English.
    A more wooden 'for' would be misleading in this conditional saying.
- source_word: תֵאָמֵנוּ
  chosen: be established
  alternatives:
  - stand firm
  - be confirmed
  lexicon: HALOT
  rationale: From אמן in the Niphal, likely carrying the sense of being firm/established.
    'Be established' preserves the lexical relationship to 'believe' while remaining
    natural English. The verse's rhetorical force depends on the wordplay between
    believing and being established.
