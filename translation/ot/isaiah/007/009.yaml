theological_decisions:
- issue: Rendering the אמן wordplay in the closing clause
  chosen_reading: If you do not believe, surely you will not be established.
  alternative_readings:
  - If you do not stand firm in faith, you will not stand at all.
  - If you do not trust, you will not be confirmed.
  rationale: 'The Hebrew intentionally uses two forms of the same root (אמן): Hiphil
    ''believe/trust'' and Niphal ''be established/stand firm.'' The chosen rendering
    preserves both the semantic distinction and the audible conceptual link without
    over-paraphrasing. It avoids importing later doctrinal categories while keeping
    the prophetic warning clear.'
  doctrine_reference: Translation philosophy §§1, 3, 5
