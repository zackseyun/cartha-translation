id: ISA.7.13
reference: Isaiah 7:13
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר שִׁמְעוּ נָ֖א בֵּ֣ית דָּוִ֑ד הַ/מְעַ֤ט מִ/כֶּם֙ הַלְא֣וֹת אֲנָשִׁ֔ים
    כִּ֥י תַלְא֖וּ גַּ֥ם אֶת אֱלֹהָֽ/י־־׃
translation:
  text: And he said, “Listen, please, house of David! Is it too little for you to
    weary men, that you also weary my God?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Is it a small thing for you to weary men, that you also weary my God?”
    reason: lexical_alternative
  - marker: b
    text: “Men” renders the masculine plural Hebrew and contrasts human beings with
      God; alternatively, “people.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing Isaiah's speech. 'And he said'
    preserves the Hebrew discourse flow without overinterpreting sequence.
- source_word: שִׁמְעוּ נָא
  chosen: Listen, please
  alternatives:
  - Hear now
  - Please listen
  lexicon: HALOT
  rationale: Imperative plural with particle נָא adds urgency/politeness. 'Listen,
    please' is natural modern English while preserving the appeal force better than
    the more archaic 'Hear now.'
- source_word: בֵּית דָּוִד
  chosen: house of David
  alternatives:
  - House of David
  lexicon: HALOT
  rationale: A dynastic/corporate address, not merely a physical household. Lowercase
    in running text is standard English unless used as a formal title.
- source_word: הַמְעַט מִכֶּם
  chosen: Is it too little for you
  alternatives:
  - Is it a small thing for you
  - Is it too small a thing for you
  lexicon: HALOT
  rationale: Idiomatic rhetorical formula meaning 'do you consider this a trivial
    matter?' 'Is it too little for you' preserves the Hebrew idiom with readable English.
- source_word: הַלְאוֹת
  chosen: to weary
  alternatives:
  - to exhaust
  - to try the patience of
  lexicon: HALOT
  rationale: Infinitive construct of לאה, 'to be weary / make weary.' 'Weary' preserves
    the lexical repetition with תַלְאוּ later in the verse.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  - human beings
  lexicon: HALOT
  rationale: The Hebrew is masculine plural and here likely contrasts human recipients
    with God. Per translation philosophy, gender-accurate rendering is preferred over
    neutralizing to 'people.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the result/content of the rhetorical question:
    ''that you also weary...'' ''That'' fits the English construction best.'
- source_word: תַלְאוּ גַּם
  chosen: you also weary
  alternatives:
  - you weary also
  - you even weary
  lexicon: HALOT
  rationale: Maintains the repetition of לאה and the additive force of גַּם, showing
    escalation from wearying humans to wearying God.
- source_word: אֶת אֱלֹהָי
  chosen: my God
  alternatives:
  - God of mine
  lexicon: HALOT
  rationale: First-person singular suffix is explicit. 'My God' preserves Isaiah's
    personal/confessional wording and should not be flattened to simply 'God.'
