theological_decisions:
- issue: Rendering אֲנָשִׁים with gender-accurate language
  chosen_reading: men
  alternative_readings:
  - people
  - human beings
  rationale: The Hebrew masculine plural is retained because the verse contrasts wearying
    human beings with wearying God, and the translation philosophy prefers gender-accurate
    renderings where the source is grammatically masculine. A more inclusive alternative
    is possible in English but would soften the lexical contrast and move away from
    the source form.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering אֱלֹהָי as 'my God'
  chosen_reading: my God
  alternative_readings:
  - God
  rationale: The possessive suffix is part of the inspired wording and may reflect
    Isaiah's prophetic stance over against the house of David. The translation preserves
    this theological and rhetorical nuance rather than generalizing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
