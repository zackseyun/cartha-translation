id: ISA.7.6
reference: Isaiah 7:6
source:
  edition: WLC
  text: נַעֲלֶ֤ה בִֽ/יהוּדָה֙ וּ/נְקִיצֶ֔/נָּה וְ/נַבְקִעֶ֖/נָּה אֵלֵ֑י/נוּ וְ/נַמְלִ֥יךְ
    מֶ֨לֶךְ֙ בְּ/תוֹכָ֔/הּ אֵ֖ת בֶּן טָֽבְאַֽל־׃ס
translation:
  text: Let us go up against Judah, and terrify her, and break her open for ourselves,
    and make the son of Tabeel king in her midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and make her dread,' 'and vex her,' or 'and harass her.' The Hebrew
      verb is difficult; the main text takes it in the sense of causing fear or panic.
    reason: lexical_alternative
  - marker: b
    text: Or 'and breach her for ourselves' or 'and split her apart for us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲלֶה
  chosen: Let us go up against
  alternatives:
  - Let us march up against
  - Let us attack
  lexicon: HALOT
  rationale: עלה in military contexts commonly means to go up or march up against
    a place. 'Go up against' preserves the Hebrew idiom while remaining natural English;
    'attack' is possible but less formally transparent.
- source_word: בִּיהוּדָה
  chosen: against Judah
  alternatives:
  - into Judah
  lexicon: HALOT
  rationale: With עלה in a hostile military setting, the preposition here is best
    represented idiomatically as 'against Judah' rather than the more wooden 'in/into
    Judah.' This reflects the sense of invasion.
- source_word: וּנְקִיצֶנָּה
  chosen: and terrify her
  alternatives:
  - and make her dread
  - and vex her
  - and harass her
  lexicon: HALOT
  rationale: The Hiphil of קוץ here is difficult and has been rendered variously.
    In context of military intimidation, 'terrify her' best captures the causative
    sense of inducing dread or panic. Alternatives such as 'vex' are too weak in modern
    English.
- source_word: וְנַבְקִעֶנָּה
  chosen: and break her open for ourselves
  alternatives:
  - and split her apart
  - and breach her for ourselves
  lexicon: HALOT
  rationale: בקע means to split, cleave, or break open. In context it refers to forcing
    a breach in Judah for the invaders' advantage. 'Break her open for ourselves'
    preserves both the violent imagery and the following אֵלֵינוּ.
- source_word: אֵלֵינוּ
  chosen: for ourselves
  alternatives:
  - to ourselves
  - for us
  lexicon: HALOT
  rationale: The phrase indicates advantage or appropriation by the attacking coalition.
    'For ourselves' communicates that they intend to seize Judah for their own purposes.
- source_word: וְנַמְלִיךְ מֶלֶךְ
  chosen: and make ... king
  alternatives:
  - and set up ... as king
  - and cause ... to reign
  lexicon: HALOT
  rationale: 'The Hiphil of מלך is causative: to make someone king or install him
    as king. ''Make ... king'' is concise and natural.'
- source_word: בְּתוֹכָהּ
  chosen: in her midst
  alternatives:
  - within her
  - in it
  lexicon: HALOT
  rationale: The feminine suffix refers to Judah/city as a feminine entity. 'In her
    midst' preserves the personified feminine reference better than the impersonal
    'in it.'
- source_word: בֶּן טָבְאַל
  chosen: the son of Tabeel
  alternatives:
  - Ben-tabeel
  lexicon: HALOT
  rationale: בֶּן is the common noun 'son of,' not necessarily a fused proper name
    here. Following the translation philosophy, personal names are transliterated,
    so טָבְאַל becomes 'Tabeel.'
