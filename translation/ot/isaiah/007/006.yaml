theological_decisions:
- issue: Personification and feminine suffixes for Judah
  chosen_reading: Render Judah with feminine pronouns ('her')
  alternative_readings:
  - Render with neuter ('it')
  rationale: The Hebrew repeatedly uses feminine suffixes referring to Judah/city.
    Preserving 'her' reflects the source text's grammar and personification without
    adding theological content.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
