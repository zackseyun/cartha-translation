id: ISA.7.17
reference: Isaiah 7:17
source:
  edition: WLC
  text: יָבִ֨יא יְהוָ֜ה עָלֶ֗י/ךָ וְ/עַֽל עַמְּ/ךָ֮ וְ/עַל בֵּ֣ית אָבִי/ךָ֒ יָמִים֙
    אֲשֶׁ֣ר לֹא בָ֔אוּ לְ/מִ/יּ֥וֹם סוּר אֶפְרַ֖יִם מֵ/עַ֣ל יְהוּדָ֑ה אֵ֖ת מֶ֥לֶךְ
    אַשּֽׁוּר־־־־׃פ
translation:
  text: The LORD will bring upon you, upon your people, and upon your father's house
    days unlike any that have not come since the day Ephraim turned away from Judah—namely,
    the king of Assyria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'days such as have not come since the day Ephraim departed from Judah.'
    reason: lexical_alternative
  - marker: b
    text: '''Your father''s house'' can refer more specifically to your ancestral
      or royal house.'
    reason: cultural_note
lexical_decisions:
- source_word: יָבִיא
  chosen: will bring
  alternatives:
  - will cause to come
  lexicon: HALOT
  rationale: Hiphil of בוא commonly means 'bring' or 'cause to come.' 'Will bring'
    is idiomatic modern English and preserves the causative force without awkwardness.
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of YHWH is 'the LORD,' following
    Jewish reverence tradition and longstanding English convention.
- source_word: עָלֶיךָ ... וְעַל עַמְּךָ ... וְעַל בֵּית אָבִיךָ
  chosen: upon you, upon your people, and upon your father's house
  alternatives:
  - against you, against your people, and against your father's house
  lexicon: HALOT
  rationale: The repeated עַל is retained with 'upon' to preserve the solemn cadence
    and the sense of something being brought onto these parties. 'Father's house'
    is kept as a standard Hebrew familial/social expression rather than generalized
    to 'dynasty' in the main text.
- source_word: יָמִים
  chosen: days
  alternatives:
  - times
  lexicon: HALOT
  rationale: Literal 'days' is natural in English prophetic diction and preserves
    the temporal idiom.
- source_word: אֲשֶׁר לֹא בָאוּ
  chosen: unlike any that have not come
  alternatives:
  - such as have not come
  - the like of which have not come
  lexicon: HALOT
  rationale: The clause expresses unprecedented days. The chosen wording is slightly
    smoothed for readability while preserving the negative comparison. A more traditional
    idiom is preserved in a footnote.
- source_word: לְמִיּוֹם סוּר אֶפְרַיִם מֵעַל יְהוּדָה
  chosen: since the day Ephraim turned away from Judah
  alternatives:
  - since the day Ephraim departed from Judah
  - from the day Ephraim broke away from Judah
  lexicon: HALOT
  rationale: סוּר means 'turn aside/away, depart.' In this historical context it refers
    to the schism of the northern kingdom from Judah. 'Turned away from Judah' is
    a close rendering; 'broke away' is interpretive and therefore kept as an alternative
    rather than the main text.
- source_word: אֵת מֶלֶךְ אַשּׁוּר
  chosen: namely, the king of Assyria
  alternatives:
  - even the king of Assyria
  - that is, the king of Assyria
  lexicon: HALOT
  rationale: 'The accusative marker אֵת here introduces an appositional specification
    of the unprecedented days: they come in the form of the Assyrian king. ''Namely''
    makes the apposition explicit in clear English. ''Even'' is possible but can sound
    archaic or ambiguous.'
- source_word: בֵּית אָבִיךָ
  chosen: your father's house
  alternatives:
  - your ancestral house
  - your dynasty
  lexicon: HALOT
  rationale: The Hebrew literally refers to the paternal household/line. 'Your father's
    house' preserves the idiom and can encompass the royal house in context without
    over-specifying in the main text.
