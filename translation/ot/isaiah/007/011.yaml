theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of the depth/height merism
  chosen_reading: make it as deep as Sheol or as high as heaven
  alternative_readings:
  - make it deep as Sheol or high upward
  - ask it either in the depth or in the height above
  rationale: The Hebrew presents two extreme dimensions for the requested sign. Rendering the pair as 'Sheol ... heaven' communicates the full merism in clear English while preserving the sense that no limit is placed on the sign's scope. Because 'heaven' is not explicit in the final word, the more literal 'on high/upward' is preserved in a footnote.
