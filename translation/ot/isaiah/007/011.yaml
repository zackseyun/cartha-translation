id: ISA.7.11
reference: Isaiah 7:11
source:
  edition: WLC
  text: שְׁאַל לְ/ךָ֣ א֔וֹת מֵ/עִ֖ם יְהוָ֣ה אֱלֹהֶ֑י/ךָ הַעְמֵ֣ק שְׁאָ֔לָה א֖וֹ הַגְבֵּ֥הַּ לְ/מָֽעְלָ/ה־׃
translation:
  text: 'Ask for yourself a sign from Yahweh your God: make it as deep as Sheol or as high as heaven.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'make it deep ... or make it high upward'; 'heaven' makes explicit the implied upper extreme in the contrast with Sheol.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאַל
  chosen: Ask
  alternatives:
  - Request
  lexicon: HALOT
  rationale: Imperative 2ms of שאל, a direct command to Ahaz. 'Ask' is the plain and natural English imperative.
- source_word: לְךָ
  chosen: for yourself
  alternatives:
  - for you
  - yourself
  lexicon: HALOT
  rationale: The dative pronoun adds personal force. 'For yourself' preserves the reflexive/personal nuance better than omitting it.
- source_word: אוֹת
  chosen: a sign
  alternatives:
  - an omen
  - a token
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign or confirming token from God. 'Sign' is the standard and clearest rendering in prophetic context.
- source_word: מֵעִם
  chosen: from
  alternatives:
  - from with
  - from the presence of
  lexicon: HALOT
  rationale: The preposition indicates source in relation to YHWH. In idiomatic English, 'from' best conveys the sense without awkwardness.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct with 2ms suffix; straightforwardly rendered 'your God.'
- source_word: הַעְמֵק שְׁאָלָה
  chosen: make it as deep as Sheol
  alternatives:
  - make it deep, to Sheol
  - ask it in the depth
  - make it deep as the grave
  lexicon: HALOT
  rationale: 'The Hiphil imperative of עמק with the cognate accusative-like infinitive/verb form intensifies the command: make the requested sign very deep. ''Sheol'' is supplied from the traditional and contextual understanding of שאלה here as a directional/depth expression rather than the verb ''ask'' repeated. This yields a coherent merism with the following height expression.'
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Simple disjunctive conjunction linking the two extremes.
- source_word: הַגְבֵּהַּ
  chosen: as high as
  alternatives:
  - make it high
  - raise it high
  lexicon: HALOT
  rationale: Hiphil imperative of גבה in parallel with 'make it as deep as.' English idiom prefers 'as high as' when paired with the depth expression.
- source_word: למעלה
  chosen: heaven
  alternatives:
  - upward
  - on high
  - to the heights
  lexicon: HALOT
  rationale: Literally 'upward/on high.' In this merism contrasting the deepest depth and highest height, 'heaven' makes explicit the implied upper extreme and produces natural English. The more literal alternative is preserved in a footnote because the noun 'heaven' is interpretive rather than explicit.
