id: ISA.7.3
reference: Isaiah 7:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָה֮ אֶֽל יְשַׁעְיָהוּ֒ צֵא נָא֙ לִ/קְרַ֣את אָחָ֔ז אַתָּ֕ה וּ/שְׁאָ֖ר יָשׁ֣וּב בְּנֶ֑/ךָ אֶל קְצֵ֗ה תְּעָלַת֙ הַ/בְּרֵכָ֣ה הָ/עֶלְיוֹנָ֔ה אֶל מְסִלַּ֖ת שְׂדֵ֥ה כוֹבֵֽס־־־־׃
translation:
  text: Then Yahweh said to Isaiah, “Go out now to meet Ahaz, you and Shear-jashub your son, at the end of the conduit of the upper pool, on the road to the launderer’s field.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Shear-jashub means “A remnant shall return.”
    reason: lexical_alternative
  - marker: b
    text: Or “the fuller’s field.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צֵא נָא
  chosen: Go out now
  alternatives:
  - Please go out
  - Go out, I pray
  lexicon: HALOT
  rationale: צֵא is a direct imperative 'go out'; נָא adds urgency/politeness. 'Go out now' communicates the discourse force in natural modern English without archaic phrasing.
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - to encounter
  - to go to meet
  lexicon: HALOT
  rationale: 'The infinitive with ל expresses purpose: Isaiah is to go out for the purpose of meeting Ahaz. ''To meet'' is the most natural and sufficiently precise rendering.'
- source_word: אַתָּה וּשְׁאָר יָשׁוּב בְּנֶךָ
  chosen: you and Shear-jashub your son
  alternatives:
  - you, and your son Shear-jashub
  - you and a remnant shall return, your son
  lexicon: HALOT
  rationale: The syntax identifies Shear-jashub as Isaiah's son by name. Because this is a proper name, it is transliterated rather than translated in the main text, though its meaning is significant in Isaiah. The appositional order is smoothed into natural English.
- source_word: שְׁאָר יָשׁוּב
  chosen: Shear-jashub
  alternatives:
  - A Remnant Shall Return
  lexicon: HALOT
  rationale: As a personal name, it should be transliterated per project policy. Its lexical meaning is worth preserving in a footnote because Isaiah's children's names are thematically important.
- source_word: קְצֵה
  chosen: at the end of
  alternatives:
  - to the end of
  - at the edge of
  lexicon: HALOT
  rationale: With אֶל in this locative context, the phrase points to a destination/location. 'At the end of' is idiomatic English and fits the topographical description.
- source_word: תְּעָלַת
  chosen: conduit
  alternatives:
  - channel
  - canal
  - watercourse
  lexicon: HALOT
  rationale: The term denotes an artificial water channel. 'Conduit' is a clear English equivalent that fits the urban-waterworks setting of Jerusalem.
- source_word: הַבְּרֵכָה הָעֶלְיוֹנָה
  chosen: the upper pool
  alternatives:
  - the upper reservoir
  lexicon: HALOT
  rationale: בְּרֵכָה here refers to a pool/reservoir. 'Pool' is the standard and more readable rendering; 'upper' preserves the topographical adjective.
- source_word: מְסִלַּת
  chosen: on the road to
  alternatives:
  - on the highway to
  - at the causeway of
  lexicon: HALOT
  rationale: The noun denotes a raised road/highway. In this setting, 'road' is natural English; 'on' captures the locative sense with the preceding אֶל as part of the destination description.
- source_word: שְׂדֵה כוֹבֵס
  chosen: the launderer’s field
  alternatives:
  - the fuller’s field
  - the washerman’s field
  lexicon: HALOT
  rationale: כּוֹבֵס is one who washes/cleans cloth. 'Launderer' is more accessible modern English than the traditional 'fuller,' while preserving the occupational sense.
