id: ISA.7.18
reference: Isaiah 7:18
source:
  edition: WLC
  text: וְ/הָיָ֣ה בַּ/יּ֣וֹם הַ/ה֗וּא יִשְׁרֹ֤ק יְהוָה֙ לַ/זְּב֔וּב אֲשֶׁ֥ר בִּ/קְצֵ֖ה
    יְאֹרֵ֣י מִצְרָ֑יִם וְ/לַ֨/דְּבוֹרָ֔ה אֲשֶׁ֖ר בְּ/אֶ֥רֶץ אַשּֽׁוּר׀׃
translation:
  text: And in that day the LORD will whistle for the fly that is at the far end of
    the streams of Egypt, and for the bee that is in the land of Assyria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will hiss for.' The Hebrew verb refers to making a sharp sound to summon
      or signal.
    reason: lexical_alternative
  - marker: b
    text: '''Streams of Egypt'' may refer specifically to the Nile branches or canals
      of Egypt.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will be / And ...
  alternatives:
  - And it will happen
  - And it shall come to pass
  lexicon: HALOT
  rationale: Introduces a future scene with standard prophetic narrative framing.
    In English, the idiom is best carried by 'And in that day' plus the future verb
    that follows, rather than a wooden 'it shall come to pass.'
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'In that day' is idiomatic and preserves
    the eschatological/prophetic register without unnecessary archaism.
- source_word: יִשְׁרֹק
  chosen: will whistle for
  alternatives:
  - will hiss for
  - will whistle to
  - will signal for
  lexicon: HALOT
  rationale: The verb denotes a sharp sound used to summon or signal. 'Whistle for'
    communicates the summoning force in natural English. 'Hiss' reflects older tradition
    but is misleading in contemporary English because it suggests hostility rather
    than a summons.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: לַזְּבוּב
  chosen: the fly
  alternatives:
  - the insect fly
  lexicon: HALOT
  rationale: Singular collective/image language is retained. The image likely personifies
    or symbolizes Egypt's forces as a fly; the singular is preserved because it matches
    the Hebrew and the paired imagery with 'the bee.'
- source_word: אֲשֶׁר בִּקְצֵה יְאֹרֵי מִצְרָיִם
  chosen: that is at the far end of the streams of Egypt
  alternatives:
  - that is in the remotest part of the canals of Egypt
  - that is at the end of the Nile channels of Egypt
  lexicon: HALOT
  rationale: קָצֶה conveys extremity/remoteness. יְאֹרִים refers to Nile streams/canals/watercourses
    in Egyptian context. 'Streams of Egypt' is readable and sufficiently precise without
    over-specifying canal engineering.
- source_word: וְלַדְּבוֹרָה
  chosen: and for the bee
  alternatives:
  - and for the bees
  lexicon: HALOT
  rationale: Singular is retained to mirror the Hebrew and the parallel singular 'the
    fly.' The phrase functions as emblematic imagery, not necessarily numerical singularity.
- source_word: אֲשֶׁר בְּאֶרֶץ אַשּׁוּר
  chosen: that is in the land of Assyria
  alternatives:
  - that is in Assyria
  lexicon: HALOT
  rationale: '''Land of Assyria'' preserves the concrete territorial expression אֶרֶץ
    while remaining natural English.'
