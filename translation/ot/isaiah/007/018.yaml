theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH, preserving reverential
    convention and broad Christian readability.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nature of the fly/bee imagery
  chosen_reading: Retain the metaphor as political-military imagery without making
    the referents explicit in the main text.
  alternative_readings:
  - Explicitly identify the fly as Egypt and the bee as Assyria in translation
  rationale: The verse uses figurative summons imagery. While the broader context
    points to foreign powers, the Hebrew text itself presents the image rather than
    an explanatory gloss, so the translation preserves that tension.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
