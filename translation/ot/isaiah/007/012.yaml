theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: DOCTRINE.md specifies 'the LORD' as the default rendering for YHWH, while
    preserving alternatives only as needed. No doctrinal ambiguity is introduced by
    following the stated house style here.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering אֲנַסֶּה in relation to God
  chosen_reading: test
  alternative_readings:
  - tempt
  - put to the test
  rationale: The Hebrew verb נסה here denotes testing God, echoing the biblical prohibition
    against putting the LORD to the test. 'Test' preserves the lexical sense without
    importing a stronger moral sense of enticement to evil that English 'tempt' can
    suggest.
