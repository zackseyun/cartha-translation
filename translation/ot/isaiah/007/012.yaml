id: ISA.7.12
reference: Isaiah 7:12
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר אָחָ֑ז לֹא אֶשְׁאַ֥ל וְ/לֹֽא אֲנַסֶּ֖ה אֶת יְהוָֽה־־־׃
translation:
  text: But Ahaz said, “I will not ask, and I will not test the LORD.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I will not put the LORD to the test.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew has the divine name YHWH, traditionally rendered “the LORD”; alternatively,
      “Yahweh.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But ... said
  alternatives:
  - And ... said
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive on אמר advances the narrative. English idiom can
    render this as 'and,' 'then,' or 'but.' 'But' best captures the adversative force
    in context, since Ahaz is refusing the invitation just given in the preceding
    verse.
- source_word: אָחָז
  chosen: Ahaz
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: לֹא אֶשְׁאַל
  chosen: I will not ask
  alternatives:
  - I will not request
  lexicon: HALOT
  rationale: שׁאל commonly means 'ask' or 'request.' In context of being invited to
    request a sign from God, 'ask' is the most natural and sufficiently precise rendering.
- source_word: וְלֹא אֲנַסֶּה
  chosen: and I will not test
  alternatives:
  - nor will I test
  - and I will not put ... to the test
  - and I will not tempt
  lexicon: HALOT
  rationale: נסה in the piel means 'to test, try, put to the test.' 'Test' is the
    clearest modern English rendering. 'Tempt' reflects some traditional English versions
    but is less precise here. The simple conjunction is retained as 'and,' though
    English could also use 'nor' stylistically.
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The direct-object marker אֶת is untranslated in English. The divine name
    יְהוָה is rendered 'the LORD' per the doctrinal default for YHWH.
