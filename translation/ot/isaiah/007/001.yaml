id: ISA.7.1
reference: Isaiah 7:1
source:
  edition: WLC
  text: וַ/יְהִ֡י בִּ/ימֵ֣י אָ֠חָז בֶּן יוֹתָ֨ם בֶּן עֻזִּיָּ֜הוּ מֶ֣לֶךְ יְהוּדָ֗ה
    עָלָ֣ה רְצִ֣ין מֶֽלֶךְ אֲ֠רָם וּ/פֶ֨קַח בֶּן רְמַלְיָ֤הוּ מֶֽלֶךְ יִשְׂרָאֵל֙
    יְר֣וּשָׁלִַ֔ם לַ/מִּלְחָמָ֖ה עָלֶ֑י/הָ וְ/לֹ֥א יָכֹ֖ל לְ/הִלָּחֵ֥ם עָלֶֽי/הָ־־־־־׃
translation:
  text: And it happened in the days of Ahaz son of Jotham, son of Uzziah, king of
    Judah, that Rezin king of Aram and Pekah son of Remaliah, king of Israel, went
    up against Jerusalem for war against it, but he was not able to fight against
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Aram'; traditionally 'Syria.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew verb is singular ('he was not able'), though the preceding subjects
      are Rezin and Pekah together; some translations smooth this to 'they were not
      able.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a historical episode. 'And it
    happened' preserves the Hebrew narrative onset without archaic English.
- source_word: בִּימֵי
  chosen: in the days of
  alternatives:
  - during the reign of
  - in the time of
  lexicon: HALOT
  rationale: Literal temporal idiom; 'in the days of' is natural English and preserves
    the Hebrew expression.
- source_word: אָחָז ... יוֹתָם ... עֻזִּיָּהוּ
  chosen: Ahaz son of Jotham, son of Uzziah
  rationale: Personal names are transliterated by standard convention per project
    philosophy; filial chain retained formally.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Straightforward royal title and territorial designation.
- source_word: עָלָה
  chosen: went up against
  alternatives:
  - came up against
  - marched up against
  lexicon: HALOT
  rationale: עלה with hostile יעד/על object in military context commonly means to
    go up in attack. 'Went up against' preserves the idiom and the directional/military
    nuance.
- source_word: רְצִין מֶלֶךְ אֲרָם
  chosen: Rezin king of Aram
  alternatives:
  - Rezin king of Syria
  lexicon: HALOT
  rationale: אֲרָם is best rendered 'Aram' rather than the traditional 'Syria' to
    reflect the Hebrew ethnogeographic term more directly.
- source_word: וּפֶקַח בֶּן רְמַלְיָהוּ מֶלֶךְ יִשְׂרָאֵל
  chosen: and Pekah son of Remaliah, king of Israel
  rationale: Names transliterated; appositional royal title retained.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: לַמִּלְחָמָה
  chosen: for war
  alternatives:
  - to wage war
  - for battle
  lexicon: HALOT
  rationale: Purpose phrase indicating military intent. 'For war' is concise and close
    to the Hebrew, though somewhat idiomatic in English.
- source_word: עָלֶיהָ
  chosen: against it
  alternatives:
  - against her
  lexicon: HALOT
  rationale: Jerusalem is grammatically feminine in Hebrew, but English normally refers
    to a city as 'it' in straightforward narrative. The adversative relation marked
    by על is preserved as 'against.'
- source_word: וְלֹא יָכֹל
  chosen: but he was not able
  alternatives:
  - but they were not able
  - but he could not
  lexicon: HALOT
  rationale: The verb is singular in the Hebrew. The singular is retained in translation
    rather than smoothing to the expected plural, even though the subject is compound.
    English 'he was not able' reflects the Masoretic form most directly.
- source_word: לְהִלָּחֵם
  chosen: to fight
  alternatives:
  - to wage war
  - to make war
  lexicon: HALOT
  rationale: Nifal infinitive of לחם in military sense. 'To fight' is clear modern
    English and fits the immediate context.
