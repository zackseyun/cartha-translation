id: ISA.7.8
reference: Isaiah 7:8
source:
  edition: WLC
  text: כִּ֣י רֹ֤אשׁ אֲרָם֙ דַּמֶּ֔שֶׂק וְ/רֹ֥אשׁ דַּמֶּ֖שֶׂק רְצִ֑ין וּ/בְ/ע֗וֹד
    שִׁשִּׁ֤ים וְ/חָמֵשׁ֙ שָׁנָ֔ה יֵחַ֥ת אֶפְרַ֖יִם מֵ/עָֽם׃
translation:
  text: For the head of Aram is Damascus, and the head of Damascus is Rezin; and within
    sixty-five years Ephraim will be shattered from being a people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Ephraim will be shattered so as not to be a people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the explanation of the preceding warning, so 'For'
    best preserves the logical connection in natural English.
- source_word: רֹאשׁ
  chosen: head
  alternatives:
  - chief city
  - capital
  lexicon: HALOT
  rationale: 'The noun literally means ''head'' and is used metaphorically for the
    leading city or ruler. Retaining ''head'' preserves the parallel structure: ''the
    head of Aram is Damascus, and the head of Damascus is Rezin.'' More interpretive
    options like ''capital'' flatten the metaphor and obscure the second clause, where
    a person rather than a city is in view.'
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - Syria
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than replaced
    with later geopolitical equivalents. 'Aram' is the Hebrew name and avoids anachronistic
    associations with modern Syria.
- source_word: דַּמֶּשֶׂק
  chosen: Damascus
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: רְצִין
  chosen: Rezin
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: וּבְעוֹד
  chosen: within
  alternatives:
  - in yet
  - before there are still
  lexicon: HALOT
  rationale: The phrase conveys a time span still remaining before an event occurs.
    'Within' gives idiomatic English while preserving the temporal force.
- source_word: שִׁשִּׁים וְחָמֵשׁ שָׁנָה
  chosen: sixty-five years
  alternatives:
  - sixty and five years
  lexicon: HALOT
  rationale: Standard contemporary English rendering of the number phrase.
- source_word: יֵחַת
  chosen: will be shattered
  alternatives:
  - will be broken
  - will be dismayed
  lexicon: HALOT
  rationale: The Niphal of חתת here refers to being broken or crushed as a national
    entity. 'Will be shattered' communicates decisive collapse and fits the following
    phrase 'from being a people.'
- source_word: אֶפְרַיִם
  chosen: Ephraim
  alternatives:
  - the northern kingdom
  - Israel
  lexicon: HALOT
  rationale: The text names Ephraim specifically; retaining the tribal/national name
    preserves the prophetic diction. Broader interpretive glosses are possible but
    should not replace the source term in the main text.
- source_word: מֵעָם
  chosen: from being a people
  alternatives:
  - so as not to be a people
  - from a people
  lexicon: HALOT
  rationale: The preposition מִן with עַם expresses separation from national status.
    'From being a people' is idiomatic and conveys the loss of identity as a distinct
    people. The alternative 'so as not to be a people' is also possible and worth
    preserving in a footnote because it makes the result clause more explicit.
