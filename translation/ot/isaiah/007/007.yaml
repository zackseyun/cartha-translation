theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - the Lord GOD (with small caps indicating YHWH)
  rationale: The doctrine excerpt sets the default rendering of יְהוָה as 'the LORD.'
    In the fixed Hebrew expression אֲדֹנָי יְהוִה, English translations commonly avoid
    'Lord LORD' by rendering the second element as 'GOD.' This preserves reverential
    convention and distinguishes the underlying divine name without importing a denominational
    preference.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
