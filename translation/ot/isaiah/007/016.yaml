theological_decisions:
- issue: Identity and function of 'the boy' in context
  chosen_reading: Render neutrally as 'the boy' without specifying whether this refers
    immediately to Maher-shalal-hash-baz, the child of Isaiah 7:14, or typological/messianic
    fulfillment.
  alternative_readings:
  - the child is solely a near-term historical sign-child
  - the child directly refers to Immanuel with messianic significance
  rationale: The verse itself does not identify the boy beyond the common noun הַנַּעַר.
    To preserve theological tension and avoid importing a disputed interpretation
    into the translation, the main text remains non-interpretive.
  doctrine_reference: Preserve theological tension rather than resolve it.
