id: ISA.7.16
reference: Isaiah 7:16
source:
  edition: WLC
  text: כִּ֠י בְּ/טֶ֨רֶם יֵדַ֥ע הַ/נַּ֛עַר מָאֹ֥ס בָּ/רָ֖ע וּ/בָחֹ֣ר בַּ/טּ֑וֹב תֵּעָזֵ֤ב
    הָ/אֲדָמָה֙ אֲשֶׁ֣ר אַתָּ֣ה קָ֔ץ מִ/פְּנֵ֖י שְׁנֵ֥י מְלָכֶֽי/הָ׃
translation:
  text: For before the boy knows to refuse the evil and choose the good, the land
    whose two kings you dread will be forsaken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be abandoned' or 'will be deserted.' The Hebrew passive can denote
      the land being left empty or forsaken.
    reason: lexical_alternative
  - marker: b
    text: Or 'whose two kings you loathe because of fear' / 'before whose two kings
      you are filled with dread.' The Hebrew verb carries a sense of revulsion that
      in this context likely reflects dread of the two kings.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטֶרֶם
  chosen: before
  alternatives:
  - before that
  - ere
  lexicon: HALOT
  rationale: Temporal marker introducing what will happen prior to the boy's moral
    discernment. 'Before' is the natural modern English equivalent.
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the child
  - the young man
  lexicon: HALOT
  rationale: נַעַר can range from child to youth, but in this context of not yet knowing
    to refuse evil and choose good, 'boy' best fits the developmental sense and keeps
    the masculine singular of the Hebrew.
- source_word: יֵדַע ... מָאֹס ... וּבָחֹר
  chosen: knows to refuse ... and choose
  alternatives:
  - knows how to reject ... and choose
  - is able to refuse ... and choose
  lexicon: HALOT
  rationale: The construction expresses attained discernment or capacity. 'Knows to
    refuse ... and choose' preserves the Hebrew sequence while remaining idiomatic
    English.
- source_word: מָאֹס
  chosen: refuse
  alternatives:
  - reject
  - despise
  lexicon: HALOT
  rationale: Here the verb concerns moral discrimination rather than emotional contempt.
    'Refuse' fits the paired contrast with 'choose' and reads naturally in English.
- source_word: בָּרָע
  chosen: the evil
  alternatives:
  - evil
  - what is evil
  - the bad
  lexicon: HALOT
  rationale: With the article, the phrase is generic but definite in Hebrew style.
    'The evil' preserves the formal contrast with 'the good' without over-paraphrasing.
- source_word: וּבָחֹר
  chosen: choose
  alternatives:
  - select
  - prefer
  lexicon: HALOT
  rationale: Standard rendering for בחר; paired antithetically with 'refuse' in a
    moral context.
- source_word: בַּטּוֹב
  chosen: the good
  alternatives:
  - good
  - what is good
  lexicon: HALOT
  rationale: Balances 'the evil' and preserves the Hebrew article and moral contrast.
- source_word: תֵּעָזֵב
  chosen: will be forsaken
  alternatives:
  - will be abandoned
  - will be deserted
  lexicon: HALOT
  rationale: Niphal imperfect of עזב is best rendered as a passive. 'Will be forsaken'
    is slightly more formal and suits prophetic diction; it may imply depopulation
    or abandonment without specifying the agent.
- source_word: הָאֲדָמָה
  chosen: the land
  alternatives:
  - the ground
  - the territory
  lexicon: HALOT
  rationale: In context of kings and geopolitical threat, 'land' is the appropriate
    sense rather than literal soil.
- source_word: אֲשֶׁר אַתָּה קָץ מִפְּנֵי
  chosen: whose ... you dread
  alternatives:
  - because of whose ... you are sick with dread
  - before whose ... you loathe
  lexicon: HALOT
  rationale: קוץ can convey abhorrence or dread depending on context. Here, because
    the referents are threatening kings in the Syro-Ephraimite crisis, 'you dread'
    best captures the sense of fearful revulsion in idiomatic English. The relative
    clause is smoothed to 'whose two kings you dread' for readability while preserving
    meaning.
- source_word: שְׁנֵי מְלָכֶיהָ
  chosen: whose two kings
  alternatives:
  - its two kings
  - the two kings of it
  lexicon: HALOT
  rationale: The feminine singular suffix refers back to 'the land.' 'Whose two kings'
    is idiomatic English for the construct chain plus relative clause.
