id: ISA.7.15
reference: Isaiah 7:15
source:
  edition: WLC
  text: חֶמְאָ֥ה וּ/דְבַ֖שׁ יֹאכֵ֑ל לְ/דַעְתּ֛/וֹ מָא֥וֹס בָּ/רָ֖ע וּ/בָח֥וֹר בַּ/טּֽוֹב׃
translation:
  text: He will eat curds and honey when he knows to refuse the evil and choose the
    good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the time he knows to refuse evil and choose good.' The Hebrew expression
      may mark the time up to which this applies.
    reason: alternative_reading
  - marker: b
    text: '''Curds'' may also be rendered ''butter'' or ''cream,'' referring broadly
      to a milk product.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶמְאָה
  chosen: curds
  alternatives:
  - butter
  - cream
  lexicon: HALOT
  rationale: The noun denotes a milk product, likely curdled milk rather than modern
    butter. 'Curds' is the most natural modern English equivalent in this context
    and fits the collocation with honey.
- source_word: וּדְבַשׁ
  chosen: and honey
  lexicon: HALOT
  rationale: Standard rendering of דבש. The conjunction is retained straightforwardly.
- source_word: יֹאכֵל
  chosen: he will eat
  alternatives:
  - he eats
  lexicon: HALOT
  rationale: The yiqtol form is best rendered here as future, matching the predictive
    context of the sign concerning the child.
- source_word: לְדַעְתּוֹ
  chosen: when he knows
  alternatives:
  - by the time he knows
  - at his knowing
  - for his knowing
  lexicon: HALOT
  rationale: The preposition ל with the infinitive construct plus suffix expresses
    a temporal sense here. 'When he knows' is idiomatic English and preserves the
    sense without over-specifying the timing.
- source_word: מָאוֹס
  chosen: to refuse
  alternatives:
  - to reject
  - to despise
  lexicon: HALOT
  rationale: In this moral contrast with choosing the good, the sense is practical
    repudiation rather than emotional contempt. 'Refuse' best matches the ethical
    discernment in view.
- source_word: בָּרָע
  chosen: the evil
  alternatives:
  - evil
  - what is evil
  lexicon: HALOT
  rationale: The article gives specificity/generic definiteness. 'The evil' preserves
    the Hebrew form and the paired contrast with 'the good.'
- source_word: וּבָחוֹר
  chosen: and choose
  alternatives:
  - and select
  lexicon: HALOT
  rationale: A simple infinitive in parallel with 'to refuse'; 'choose' is the natural
    English equivalent in a moral contrast.
- source_word: בַּטּוֹב
  chosen: the good
  alternatives:
  - good
  - what is good
  lexicon: HALOT
  rationale: The article is retained as in Hebrew, balancing 'the evil' and preserving
    the moral polarity of the phrase.
