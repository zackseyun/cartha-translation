id: ISA.7.5
reference: Isaiah 7:5
source:
  edition: WLC
  text: יַ֗עַן כִּֽי יָעַ֥ץ עָלֶ֛י/ךָ אֲרָ֖ם רָעָ֑ה אֶפְרַ֥יִם וּ/בֶן רְמַלְיָ֖הוּ
    לֵ/אמֹֽר־־׃
translation:
  text: Because Aram has planned evil against you, along with Ephraim and the son
    of Remaliah, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has plotted evil against you.' The Hebrew verb can carry the sense of
      devising or plotting, especially in a hostile political context.
    reason: lexical_alternative
  - marker: b
    text: '''The son of Remaliah'' refers to Pekah, king of Israel. The Hebrew uses
      the patronymic rather than his personal name, likely with a dismissive effect.'
    reason: cultural_note
lexical_decisions:
- source_word: יַעַן כִּי
  chosen: Because
  alternatives:
  - Since
  - Inasmuch as
  lexicon: HALOT
  rationale: The compound introduces the reason for the following divine response.
    'Because' is natural modern English and preserves the causal force without unnecessary
    formality.
- source_word: יָעַץ
  chosen: has planned
  alternatives:
  - has counseled
  - has devised
  - has plotted
  lexicon: HALOT
  rationale: The verb denotes taking counsel or devising a plan. In context of hostile
    political action, 'has planned' is idiomatic and clear; 'plotted' is possible
    but slightly more interpretive in tone.
- source_word: עָלֶיךָ
  chosen: against you
  alternatives:
  - concerning you
  - upon you
  lexicon: HALOT
  rationale: With hostile intent and the noun 'evil,' the preposition is best rendered
    'against you' in English.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - Syria
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than replaced
    with later geopolitical equivalents. 'Aram' reflects the Hebrew proper name more
    directly than 'Syria.'
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harm
  - disaster
  lexicon: HALOT
  rationale: The noun can denote evil, harm, or calamity. Here it refers to hostile
    intent against Judah's king, so 'evil' preserves both moral and harmful force
    without over-specifying the outcome.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  alternatives:
  - the northern kingdom
  - Israel
  lexicon: HALOT
  rationale: The Hebrew uses the tribal/regional name 'Ephraim' metonymically for
    the northern kingdom. The transliteration preserves the source wording; readers
    can infer the political referent from context.
- source_word: וּבֶן רְמַלְיָהוּ
  chosen: along with Ephraim and the son of Remaliah
  alternatives:
  - Ephraim and Remaliah's son
  - together with Ephraim and the son of Remaliah
  lexicon: HALOT
  rationale: The conjunction links additional conspirators with Aram. 'The son of
    Remaliah' preserves the Hebrew's intentionally non-royal designation for Pekah,
    which carries a dismissive tone in Isaiah.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'as follows:'
  lexicon: HALOT
  rationale: Standard introduction to direct speech in the next verse. 'Saying,' is
    the most transparent and formally appropriate rendering.
