theological_decisions:
- issue: Whether הָרָעָה should be rendered as moral 'evil' or circumstantial 'calamity/disaster'
  chosen_reading: evil
  alternative_readings:
  - calamity
  - disaster
  rationale: The Hebrew רָעָה can denote either moral evil or disastrous trouble.
    The immediate sense is likely that the righteous are removed before coming judgment/disaster,
    but the text itself does not force a narrow choice. 'Evil' preserves the broader
    semantic range in the main text, while the alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
