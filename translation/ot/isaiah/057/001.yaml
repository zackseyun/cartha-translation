id: ISA.57.1
reference: Isaiah 57:1
source:
  edition: WLC
  text: הַ/צַּדִּ֣יק אָבָ֔ד וְ/אֵ֥ין אִ֖ישׁ שָׂ֣ם עַל לֵ֑ב וְ/אַנְשֵׁי חֶ֤סֶד נֶֽאֱסָפִים֙
    בְּ/אֵ֣ין מֵבִ֔ין כִּֽי מִ/פְּנֵ֥י הָ/רָעָ֖ה נֶאֱסַ֥ף הַ/צַּדִּֽיק־־־׃
translation:
  text: The righteous man perishes, and no one takes it to heart; men of faithful
    love are gathered away, with no one understanding that the righteous man is gathered
    away from the presence of evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from calamity' or 'from the coming disaster.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַצַּדִּיק
  chosen: the righteous man
  alternatives:
  - the righteous
  - the just man
  lexicon: HALOT
  rationale: Singular adjective used substantivally with the article. Rendered with
    'man' to reflect the masculine singular form and representative force, in keeping
    with the gender-accurate policy. 'Righteous' best matches the moral/covenantal
    sense here.
- source_word: אָבָד
  chosen: perishes
  alternatives:
  - has perished
  - is lost
  lexicon: HALOT
  rationale: Qal perfect of אבד can denote perishing or disappearing. 'Perishes' preserves
    the prophetic lament's force and allows the sense of death/removal without over-specifying
    beyond the Hebrew.
- source_word: שָׂם עַל לֵב
  chosen: takes it to heart
  alternatives:
  - lays it to heart
  - considers
  lexicon: HALOT
  rationale: This idiom means to pay serious attention inwardly. 'Takes it to heart'
    is natural modern English and preserves the emotional-moral weight better than
    the more wooden 'lays on the heart.'
- source_word: אַנְשֵׁי חֶסֶד
  chosen: men of faithful love
  alternatives:
  - merciful men
  - godly men
  - men of kindness
  - faithful men
  lexicon: HALOT
  rationale: חסד carries covenantal loyalty, steadfast kindness, and faithful love.
    'Men of faithful love' preserves more of that covenant-rich sense than merely
    'merciful men.' Masculine plural 'men' is retained per gender-accurate policy.
- source_word: נֶאֱסָפִים / נֶאֱסַף
  chosen: are gathered away / is gathered away
  alternatives:
  - are taken away / is taken away
  - are gathered / is gathered
  lexicon: HALOT
  rationale: The Niphal of אסף in contexts of death often means being gathered, sometimes
    euphemistically for dying. 'Gathered away' communicates removal by death while
    preserving the Hebrew metaphor and the repetition between plural and singular
    clauses.
- source_word: בְּאֵין מֵבִין
  chosen: with no one understanding
  alternatives:
  - and no one understands
  - without anyone discerning
  lexicon: HALOT
  rationale: 'The preposition plus אין gives a circumstantial sense: this happens
    while no one understands. ''With no one understanding'' captures that attendant
    circumstance smoothly.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what no one understands. 'That' fits the explanatory
    clause in English better than a more causal 'for' in contemporary style.
- source_word: מִפְּנֵי הָרָעָה
  chosen: from the presence of evil
  alternatives:
  - from evil
  - from calamity
  - because of the evil
  lexicon: HALOT
  rationale: Literally 'from before/from the face of the evil.' The phrase can mean
    removal away from impending evil or calamity. 'From the presence of evil' preserves
    the spatial nuance of מִפְּנֵי and leaves open whether moral evil or disastrous
    evil is in view, though the context likely includes coming calamity.
