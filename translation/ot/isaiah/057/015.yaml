theological_decisions:
- issue: Divine transcendence and immanence in the same verse
  chosen_reading: Render both God's exalted dwelling and his presence with the crushed
    without softening either tension.
  alternative_readings:
  - Emphasize transcendence at the expense of immanence
  - Interpret 'with the crushed' metaphorically rather than as real divine presence
  rationale: The Hebrew explicitly juxtaposes God's dwelling in the high and holy
    place with his dwelling with the crushed and lowly in spirit. Per translation
    philosophy, the tension should be preserved rather than resolved.
  doctrine_reference: Translation philosophy §3
- issue: Rendering דַּכָּא / נִדְכָּאִים
  chosen_reading: Use 'crushed' in the main text rather than the traditional 'contrite.'
  alternative_readings:
  - contrite
  - broken
  rationale: The lexical core is being crushed or broken. 'Contrite' foregrounds repentance,
    which may be contextually related but is not the direct lexical sense of the term
    itself in this verse. The translation avoids importing a narrower doctrinal or
    devotional nuance than the Hebrew warrants.
  doctrine_reference: Translation philosophy §1
