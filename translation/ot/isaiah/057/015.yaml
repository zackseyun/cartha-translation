id: ISA.57.15
reference: Isaiah 57:15
source:
  edition: WLC
  text: כִּי֩ כֹ֨ה אָמַ֜ר רָ֣ם וְ/נִשָּׂ֗א שֹׁכֵ֥ן עַד֙ וְ/קָד֣וֹשׁ שְׁמ֔/וֹ מָר֥וֹם
    וְ/קָד֖וֹשׁ אֶשְׁכּ֑וֹן וְ/אֶת דַּכָּא֙ וּ/שְׁפַל ר֔וּחַ לְ/הַחֲיוֹת֙ ר֣וּחַ שְׁפָלִ֔ים
    וּֽ/לְ/הַחֲי֖וֹת לֵ֥ב נִדְכָּאִֽים־־׃
translation:
  text: 'For thus says the One who is high and lifted up, who inhabits eternity, whose
    name is Holy: “I dwell in the high and holy place, and also with the crushed and
    lowly in spirit, to revive the spirit of the lowly and to revive the heart of
    the crushed.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who dwells forever.' The Hebrew expression can emphasize either eternal
      duration or dwelling in eternity.
    reason: lexical_alternative
  - marker: b
    text: Traditionally, 'with the contrite and lowly in spirit' ... 'to revive the
      heart of the contrite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָם וְנִשָּׂא
  chosen: high and lifted up
  alternatives:
  - exalted and lifted up
  - high and exalted
  lexicon: HALOT
  rationale: A paired description of transcendence/exaltation. 'High and lifted up'
    preserves the familiar Isaianic idiom and the vertical imagery of the Hebrew without
    unnecessary paraphrase.
- source_word: שֹׁכֵן עַד
  chosen: who inhabits eternity
  alternatives:
  - who dwells forever
  - who dwells in eternity
  lexicon: HALOT
  rationale: The participle plus עַד can denote enduring perpetuity or eternal realm.
    'Inhabits eternity' best captures the compact, elevated expression and parallels
    the following dwelling language.
- source_word: קָדוֹשׁ שְׁמוֹ
  chosen: whose name is Holy
  alternatives:
  - Holy is his name
  lexicon: HALOT
  rationale: A natural English rendering of the verbless clause that preserves the
    predicative force of 'Holy' as describing his name.
- source_word: מָרוֹם וְקָדוֹשׁ אֶשְׁכּוֹן
  chosen: I dwell in the high and holy place
  alternatives:
  - I dwell on a high and holy place
  - I dwell in the height and holiness
  lexicon: HALOT
  rationale: מָרוֹם denotes height/high place. Supplying 'place' makes idiomatic English
    sense while preserving the locative idea. 'Dwell' keeps the verbal link with שֹׁכֵן
    earlier in the verse.
- source_word: דַּכָּא
  chosen: the crushed
  alternatives:
  - the contrite
  - the broken
  lexicon: HALOT
  rationale: The adjective denotes one who is crushed or broken. 'Contrite' is interpretive
    and traditional, but 'crushed' more directly reflects the lexical image and matches
    the later נִדְכָּאִים.
- source_word: שְׁפַל רוּחַ
  chosen: lowly in spirit
  alternatives:
  - humble in spirit
  - of a lowly spirit
  lexicon: HALOT
  rationale: This phrase describes inner lowliness/humility. 'Lowly in spirit' is
    both natural and close to the Hebrew construction.
- source_word: לְהַחֲיוֹת
  chosen: to revive
  alternatives:
  - to give life to
  - to make live
  lexicon: HALOT
  rationale: The Hiphil of חיה means to cause to live, restore life, or revive. 'Revive'
    fits the context of restoring the downtrodden without overextending to resurrection
    language.
- source_word: רוּחַ שְׁפָלִים
  chosen: the spirit of the lowly
  alternatives:
  - the spirit of lowly ones
  - the spirit of the humble
  lexicon: HALOT
  rationale: Retains the anthropological term 'spirit' and the plural adjective functioning
    substantivally. 'Lowly' maintains lexical consistency with שְׁפַל.
- source_word: לֵב נִדְכָּאִים
  chosen: the heart of the crushed
  alternatives:
  - the heart of the contrite
  - the heart of crushed ones
  lexicon: HALOT
  rationale: נִדְכָּאִים is cognate with דַּכָּא and should be rendered consistently.
    'Heart' is retained rather than paraphrased as 'inner being' to preserve biblical
    anthropology.
