id: ISA.57.19
reference: Isaiah 57:19
source:
  edition: WLC
  text: בּוֹרֵ֖א נוב שְׂפָתָ֑יִם שָׁל֨וֹם שָׁל֜וֹם לָ/רָח֧וֹק וְ/לַ/קָּר֛וֹב אָמַ֥ר
    יְהוָ֖ה וּ/רְפָאתִֽי/ו׀׃
translation:
  text: 'Creating the fruit of the lips: Peace, peace to the one far off and to the
    one near, says the LORD, and I will heal him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the produce of the lips'; the phrase refers to what the lips bring forth,
      likely speech of praise or confession.
    reason: lexical_alternative
  - marker: b
    text: '''Peace, peace'' preserves the Hebrew repetition for emphasis.'
    reason: lexical_alternative
  - marker: c
    text: The expression 'far off and near' may refer immediately to dispersed and
      nearby members of God's people; later Scripture echoes it more broadly.
    reason: cross_reference
lexical_decisions:
- source_word: בּוֹרֵא
  chosen: Creating
  alternatives:
  - I create
  - the one creating
  lexicon: HALOT
  rationale: Qal participle of ברא used predicatively/appositionally, continuing the
    divine speech. Rendering as an English participial clause preserves the Hebrew's
    compressed style better than forcing a finite verb, while still conveying YHWH
    as the subject.
- source_word: נוב שְׂפָתָיִם
  chosen: the fruit of the lips
  alternatives:
  - the produce of the lips
  - praise from the lips
  lexicon: HALOT
  rationale: The noun ניב/נוב with 'lips' is an idiom for what the lips produce. 'Fruit
    of the lips' is both natural English and close to the Hebrew image. 'Praise' is
    too interpretive here, since the phrase can denote spoken response more broadly.
- source_word: שָׁלוֹם שָׁלוֹם
  chosen: Peace, peace
  alternatives:
  - complete peace
  - well-being, well-being
  lexicon: HALOT
  rationale: The repetition is emphatic and should be preserved rather than collapsed.
    'Peace' is the standard gloss and retains the theological breadth of shalom better
    than narrowing to mere inner calm or prosperity.
- source_word: לָרָחוֹק וְלַקָּרוֹב
  chosen: to the one far off and to the one near
  alternatives:
  - to the far and to the near
  - for the distant and the near
  lexicon: HALOT
  rationale: The preposition ל marks the recipients of the proclaimed peace. Supplying
    'the one' makes the English idiomatic while preserving the singular adjectival
    forms used substantivally in Hebrew.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - said the LORD
  - declares the LORD
  lexicon: HALOT
  rationale: Although the Hebrew form is qatal ('said'), prophetic speech formulas
    are often rendered with present force in English when introducing an ongoing divine
    declaration. 'The LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, יְהוָה is rendered 'the LORD'
    in the main text.
- source_word: וּרְפָאתִיו
  chosen: and I will heal him
  alternatives:
  - and I have healed him
  - and I will restore him
  lexicon: HALOT
  rationale: The verb רפא commonly means 'heal'; in this context of restoration after
    divine comfort, 'heal' preserves both physical and spiritual-restorative resonance.
    The waw + qatal here is best taken with future/resultative sense in context, matching
    the preceding promise.
