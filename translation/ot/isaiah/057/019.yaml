theological_decisions:
- issue: Identity of 'the one far off and the one near'
  chosen_reading: Retained as a general description of recipients without specifying
    whether this refers to exiled Israelites only or more broadly to all who are distant
    and near.
  alternative_readings:
  - exiled and local Israelites
  - a broader horizon later applied to Gentiles and Jews together
  rationale: The immediate Isaianic context supports restoration language for God's
    people, but the Hebrew itself does not explicitly define the groups. The translation
    preserves the textual openness rather than importing a narrower or broader theological
    identification into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
