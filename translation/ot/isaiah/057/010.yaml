theological_decisions:
- issue: Interpretation of the verse's final clause in a context of idolatrous persistence
  chosen_reading: The verse describes stubborn perseverance in sinful pursuit rather
    than commendable endurance.
  alternative_readings:
  - The verse could be read more neutrally as simple persistence in a difficult course.
  rationale: The broader context of Isaiah 57 rebukes Judah's idolatry and unfaithfulness.
    The translation therefore preserves the negative force of the statement without
    importing extra theological commentary into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
