id: ISA.57.20
reference: Isaiah 57:20
source:
  edition: WLC
  text: וְ/הָ/רְשָׁעִ֖ים כַּ/יָּ֣ם נִגְרָ֑שׁ כִּ֤י הַשְׁקֵט֙ לֹ֣א יוּכָ֔ל וַ/יִּגְרְשׁ֥וּ
    מֵימָ֖י/ו רֶ֥פֶשׁ וָ/טִֽיט׃
translation:
  text: But the wicked are like the driven sea, for it cannot be quiet, and its waters
    drive up mire and mud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the troubled sea.' The Hebrew verb can be rendered more interpretively
      as 'troubled' or 'tossed,' but the more literal image is of the sea being driven.
    reason: lexical_alternative
  - marker: b
    text: Or 'cast up mire and mud.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָרְשָׁעִים
  chosen: But the wicked
  alternatives:
  - And the wicked
  lexicon: HALOT
  rationale: רְשָׁעִים denotes wicked people, not abstract wickedness. The prefixed
    conjunction can be rendered 'and' or, in context following the contrast with the
    peace of the righteous in the previous verse, 'but' to bring out the adversative
    force in natural English.
- source_word: כַּיָּם
  chosen: like the ... sea
  alternatives:
  - like the sea
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Sea' is the straightforward sense of
    יָם. English idiom allows omission of the article, but retaining 'the' works well
    with the following descriptive participle-like adjective.
- source_word: נִגְרָשׁ
  chosen: driven
  alternatives:
  - tossed
  - driven out
  - restless
  lexicon: HALOT
  rationale: From גרשׁ, 'to drive out/away.' In this simile the sea is pictured as
    being driven or churned, not merely internally restless. 'Driven' preserves the
    verbal imagery better than the traditional but more interpretive 'troubled' or
    'tossed.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Introduces the explanation for the comparison: the sea is like this
    because it cannot become calm. ''For'' is concise and natural.'
- source_word: הַשְׁקֵט
  chosen: be quiet
  alternatives:
  - be still
  - be at rest
  - be calm
  lexicon: HALOT
  rationale: Infinitive/verb from שׁקט, denoting quietness or undisturbed calm. 'Be
    quiet' is clear modern English and pairs naturally with 'cannot.'
- source_word: לֹא יוּכָל
  chosen: cannot
  alternatives:
  - is not able to
  lexicon: HALOT
  rationale: Simple modal rendering of ability in idiomatic English.
- source_word: וַיִּגְרְשׁוּ
  chosen: drive up
  alternatives:
  - cast up
  - throw up
  - churn up
  lexicon: HALOT
  rationale: Again from גרשׁ. With waters as subject and mire/mud as object, the sense
    is that the waters expel or cast material upward. 'Drive up' preserves lexical
    consistency with the earlier 'driven' while remaining intelligible. 'Cast up'
    is traditional and possible, but slightly less current.
- source_word: מֵימָיו
  chosen: its waters
  alternatives:
  - his waters
  lexicon: HALOT
  rationale: The suffix refers back to the sea, an inanimate antecedent in English,
    so 'its' is appropriate.
- source_word: רֶפֶשׁ
  chosen: mire
  alternatives:
  - filth
  - refuse
  - foam
  lexicon: HALOT
  rationale: Refers to muddy filth or mire stirred up from below. 'Mire' fits the
    parallel with טִיט and preserves the image of uncleanness without overinterpreting.
- source_word: וָטִיט
  chosen: and mud
  alternatives:
  - and slime
  - and clay
  lexicon: HALOT
  rationale: טִיט commonly denotes mud or clay. 'Mud' is the most natural pairing
    with 'mire' in contemporary English and suits the sea image.
