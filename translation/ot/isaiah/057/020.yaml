theological_decisions:
- issue: Adversative force of the opening conjunction in context
  chosen_reading: But the wicked
  alternative_readings:
  - And the wicked
  rationale: The verse contrasts the wicked with the peace promised to the righteous
    in the preceding context. Rendering the conjunction adversatively clarifies the
    discourse contrast without adding theological content beyond the text's flow.
  doctrine_reference: Translation philosophy §1, §6
- issue: Image of the sea's condition
  chosen_reading: the driven sea
  alternative_readings:
  - the troubled sea
  - the tossing sea
  rationale: The Hebrew verb גרשׁ fundamentally conveys being driven or expelled.
    'Driven sea' preserves the metaphor's force more directly than the traditional
    'troubled sea,' which is interpretive. This keeps the imagery vivid while avoiding
    paraphrase.
  doctrine_reference: Translation philosophy §1, §5
