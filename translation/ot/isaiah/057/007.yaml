id: ISA.57.7
reference: Isaiah 57:7
source:
  edition: WLC
  text: עַ֤ל הַר גָּבֹ֨הַּ֙ וְ/נִשָּׂ֔א שַׂ֖מְתְּ מִשְׁכָּבֵ֑/ךְ גַּם שָׁ֥ם עָלִ֖ית
    לִ/זְבֹּ֥חַ זָֽבַח־־׃
translation:
  text: On a high and lofty mountain you set your bed; there too you went up to offer
    sacrifice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'even there.'
    reason: lexical_alternative
  - marker: b
    text: '''Your bed'' likely carries overtones of illicit sexual imagery used metaphorically
      for idolatrous worship in this context.'
    reason: cultural_note
lexical_decisions:
- source_word: עַל
  chosen: 'On'
  alternatives:
  - Upon
  lexicon: HALOT
  rationale: Locative preposition introducing the place where the action occurs. 'On'
    is natural modern English and preserves the spatial sense.
- source_word: הַר
  chosen: mountain
  alternatives:
  - hill
  lexicon: HALOT
  rationale: The standard sense is 'mountain.' Although high places can sometimes
    be rendered 'hill,' the noun itself is הַר, so 'mountain' best reflects the source.
- source_word: גָּבֹהַּ וְנִשָּׂא
  chosen: high and lofty
  alternatives:
  - high and exalted
  - elevated and raised
  lexicon: HALOT
  rationale: The paired adjectives intensify elevation. 'High and lofty' is idiomatic
    English and preserves the rhetorical force without importing theological overtones
    from other contexts where 'exalted' may be used.
- source_word: שַׂמְתְּ
  chosen: you set
  alternatives:
  - you placed
  - you put
  lexicon: HALOT
  rationale: Qal perfect 2fs of שׂים. 'You set' is concise and natural, matching the
    direct object construction.
- source_word: מִשְׁכָּבֵךְ
  chosen: your bed
  alternatives:
  - your couch
  - your lying place
  lexicon: HALOT
  rationale: מִשְׁכָּב can denote a bed or place of lying down, and in this prophetic
    context it carries sexual/idolatrous connotations. 'Your bed' preserves both the
    literal image and the metaphorical force without over-paraphrasing.
- source_word: גַּם שָׁם
  chosen: there too
  alternatives:
  - even there
  - there also
  lexicon: HALOT
  rationale: The phrase adds emphasis that the same illicit activity occurred in that
    place. 'There too' is compact and idiomatic.
- source_word: עָלִית
  chosen: you went up
  alternatives:
  - you ascended
  lexicon: HALOT
  rationale: The verb literally means 'go up/ascend.' 'You went up' is the most natural
    English rendering and fits the mountain setting.
- source_word: לִזְבֹּחַ זָבַח
  chosen: to offer sacrifice
  alternatives:
  - to sacrifice a sacrifice
  - to slaughter a sacrifice
  lexicon: HALOT
  rationale: The infinitive plus cognate noun intensifies the sacrificial act. English
    normally avoids the cognate repetition, so 'to offer sacrifice' preserves the
    meaning in readable form. 'Slaughter' would overemphasize the physical act over
    the cultic sense in this context.
