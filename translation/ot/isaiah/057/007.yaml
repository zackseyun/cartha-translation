theological_decisions:
- issue: Metaphorical force of 'bed' in a context of idolatry and spiritual adultery
  chosen_reading: Retain the concrete image 'your bed' without explicating the metaphor
    in the main text.
  alternative_readings:
  - your shrine-bed
  - your place of illicit worship
  rationale: Isaiah 57 uses sexual imagery for idolatry. The Hebrew itself states
    'your bed' and lets the metaphor carry the accusation. Explicating it in the main
    text would move beyond translation into interpretation.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cultic language of זבח
  chosen_reading: 'Render with sacrificial terminology: ''offer sacrifice.'''
  alternative_readings:
  - make offerings
  - slaughter a sacrifice
  rationale: The verse indicts illicit worship at high places. 'Offer sacrifice' preserves
    the formal cultic sense without unnecessary archaism or awkward literalism.
  doctrine_reference: Translation philosophy §§1, 6
