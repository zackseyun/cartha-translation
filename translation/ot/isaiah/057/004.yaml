theological_decisions:
- issue: Moral-lineage language in prophetic accusation
  chosen_reading: The verse describes the people's character metaphorically as deriving
    from transgression and deceit, not making a biological or metaphysical claim.
  alternative_readings:
  - A more literal but potentially misleading reading could suggest physical descent
    from wicked ancestors.
  rationale: Hebrew expressions like 'children of X' and 'seed/offspring of Y' often
    denote moral quality or covenantal identity. Rendering them straightforwardly
    while noting the metaphor avoids importing deterministic or ethnic claims the
    text does not make.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
