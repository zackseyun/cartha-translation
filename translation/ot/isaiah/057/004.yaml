id: ISA.57.4
reference: Isaiah 57:4
source:
  edition: WLC
  text: עַל מִי֙ תִּתְעַנָּ֔גוּ עַל מִ֛י תַּרְחִ֥יבוּ פֶ֖ה תַּאֲרִ֣יכוּ לָשׁ֑וֹן הֲ/לֽוֹא
    אַתֶּ֥ם יִלְדֵי פֶ֖שַׁע זֶ֥רַע שָֽׁקֶר־־־־׃
translation:
  text: Whom are you mocking? Against whom do you open your mouth wide and stick out
    your tongue? Are you not children of transgression, offspring of deceit?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Whom do you delight yourselves over?' The Hebrew likely
      carries the sense of gloating or mocking in context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'make your tongue long'; that is, 'stick out your tongue' as
      a gesture of mockery.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'children of transgression, seed of deceit' uses family language
      metaphorically for people characterized by rebellion and falsehood.
    reason: cultural_note
lexical_decisions:
- source_word: תִּתְעַנָּגוּ
  chosen: are you mocking
  alternatives:
  - do you delight yourselves
  - do you sport yourselves
  - do you make yourselves a pleasure
  lexicon: HALOT
  rationale: In this context of hostile speech and derision, the Hitpael of ענג is
    best rendered idiomatically as taunting or mocking rather than the more literal
    'delight yourselves.' The following parallel clauses about opening the mouth and
    extending the tongue show scornful behavior, so 'mocking' captures the contextual
    force in natural English.
- source_word: תַּרְחִיבוּ פֶה
  chosen: do you open your mouth wide
  alternatives:
  - do you widen the mouth
  - do you make the mouth broad
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the vivid Hebrew idiom of insolent
    or derisive speech. 'Open your mouth wide' is natural English and keeps the image
    intact.
- source_word: תַּאֲרִיכוּ לָשׁוֹן
  chosen: stick out your tongue
  alternatives:
  - make your tongue long
  - extend your tongue
  lexicon: HALOT
  rationale: The Hebrew idiom refers to a mocking gesture. 'Stick out your tongue'
    communicates the concrete image and social meaning more clearly than a woodenly
    literal rendering.
- source_word: הֲלוֹא
  chosen: Are you not
  alternatives:
  - Is it not that you are
  - Surely you are
  lexicon: HALOT
  rationale: This particle introduces a rhetorical question expecting agreement. 'Are
    you not' is the most straightforward English equivalent.
- source_word: יִלְדֵי פֶשַׁע
  chosen: children of transgression
  alternatives:
  - children of rebellion
  - sons of transgression
  lexicon: HALOT
  rationale: '''Children of transgression'' preserves the Hebrew genitival expression
    and its moral characterization. ''Children'' is preferred over ''sons'' because
    the phrase denotes class/character rather than male offspring specifically.'
- source_word: זֶרַע שָׁקֶר
  chosen: offspring of deceit
  alternatives:
  - seed of falsehood
  - offspring of lies
  lexicon: HALOT
  rationale: '''Offspring'' renders זרע naturally in English while preserving the
    metaphor of lineage. שקר here denotes falsehood/deceit; ''deceit'' fits the accusatory
    tone and reads more idiomatically than ''falsehood'' in this collocation.'
