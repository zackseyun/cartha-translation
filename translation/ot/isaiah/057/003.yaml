id: ISA.57.3
reference: Isaiah 57:3
source:
  edition: WLC
  text: וְ/אַתֶּ֥ם קִרְבוּ הֵ֖נָּה בְּנֵ֣י עֹנְנָ֑ה זֶ֥רַע מְנָאֵ֖ף וַ/תִּזְנֶֽה־׃
translation:
  text: But you—come here, sons of a sorceress, offspring of an adulterer and a prostitute.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of a diviner/soothsayer woman.' The Hebrew term refers to illicit
      divinatory practice.
    reason: lexical_alternative
  - marker: b
    text: The line may function as prophetic metaphor for spiritual adultery and idolatry,
      not necessarily a literal claim about ancestry.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַתֶּם
  chosen: But you
  alternatives:
  - And you
  - As for you
  lexicon: HALOT
  rationale: The conjunction with the pronoun marks a sharp contrast with the preceding
    context; 'But you' brings out the adversative force naturally in English.
- source_word: קִרְבוּ
  chosen: come
  alternatives:
  - draw near
  - approach
  lexicon: HALOT
  rationale: Imperative plural of קרב. 'Come' is idiomatic modern English here, while
    still preserving the summons/challenge force.
- source_word: הֵנָּה
  chosen: here
  alternatives:
  - here!
  - to this place
  lexicon: HALOT
  rationale: Deictic adverb indicating proximity. 'Here' is the most natural concise
    rendering after the imperative.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - sons
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural construct. Per gender-accurate
    policy, 'sons of' is retained rather than neutralizing to 'children of.' It also
    functions as an idiomatic label of belonging/characterization.
- source_word: עֹנְנָה
  chosen: a sorceress
  alternatives:
  - a soothsayer woman
  - an auguress
  - one who practices divination
  lexicon: HALOT
  rationale: From ענן in a feminine participial/verbal form, referring to occult/divinatory
    practice. 'Sorceress' is concise and intelligible, capturing illicit magical/divinatory
    connotations better than the less familiar 'auguress.'
- source_word: זֶרַע
  chosen: offspring of
  alternatives:
  - seed of
  - descendants of
  lexicon: HALOT
  rationale: In invective genealogy language, 'offspring of' communicates the metaphorical-descendant
    sense in natural English better than the more wooden 'seed of.'
- source_word: מְנָאֵף
  chosen: an adulterer
  alternatives:
  - one who commits adultery
  lexicon: HALOT
  rationale: The participle denotes a male adulterer. 'An adulterer' is direct and
    preserves the singular masculine form.
- source_word: וַ/תִּזְנֶה
  chosen: and a prostitute
  alternatives:
  - and she who prostitutes herself
  - and a whore
  - and an immoral woman
  lexicon: HALOT
  rationale: The form is 3fs from זנה, 'to commit prostitution/fornication.' In this
    genealogical insult sequence, an English nominal rendering is smoother and preserves
    the feminine singular referent. 'Prostitute' is clear modern English without archaic
    harshness.
