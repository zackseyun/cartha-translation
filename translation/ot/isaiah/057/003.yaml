theological_decisions:
- issue: Nature of the denunciation imagery
  chosen_reading: The verse uses prophetic invective describing the audience as offspring
    of occult and sexually unfaithful figures, likely metaphorical for covenant unfaithfulness
    rather than a literal statement of parentage.
  alternative_readings:
  - Literal denunciation of actual immoral ancestry
  rationale: The immediate prophetic context uses charged familial and sexual imagery
    to condemn idolatry and apostasy. The translation keeps the imagery without over-interpreting
    it in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
