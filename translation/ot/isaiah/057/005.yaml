theological_decisions:
- issue: Whether to make the cultic-sexual force of the opening participle explicit
  chosen_reading: Render the participle as 'burn with lust'
  alternative_readings:
  - inflame yourselves
  - are heated among the terebinths
  rationale: The verse condemns idolatrous practices involving sacred trees and child
    sacrifice. Making the erotic/cultic force explicit reflects the prophetic accusation
    without importing extra doctrine. This is a lexical-contextual decision rather
    than a sectarian theological one.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
