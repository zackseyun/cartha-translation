id: ISA.57.5
reference: Isaiah 57:5
source:
  edition: WLC
  text: הַ/נֵּֽחָמִים֙ בָּֽ/אֵלִ֔ים תַּ֖חַת כָּל עֵ֣ץ רַעֲנָ֑ן שֹׁחֲטֵ֤י הַ/יְלָדִים֙
    בַּ/נְּחָלִ֔ים תַּ֖חַת סְעִפֵ֥י הַ/סְּלָעִֽים־׃
translation:
  text: you who burn with lust among the terebinths, under every green tree, who slaughter
    the children in the wadis, under the clefts of the rocks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the oaks.' The Hebrew may refer to sacred trees generally; 'terebinths'
      is chosen here as the more specific likely sense in this cultic context.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the valleys.' The Hebrew refers to wadis or ravines, often seasonal
      streambeds.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנֵּחָמִים
  chosen: you who burn with lust
  alternatives:
  - you who inflame yourselves
  - you who are heated
  - you who comfort yourselves
  lexicon: HALOT
  rationale: From the root חם/נחם as pointed here in a reflexive/passive participial
    form, in context of idolatrous fertility rites it most naturally conveys being
    inflamed or aroused. 'Burn with lust' makes the sexual/idolatrous force clear
    in modern English. 'Comfort yourselves' would follow a different semantic line
    and does not fit the immediate context as well.
- source_word: בָּאֵלִים
  chosen: among the terebinths
  alternatives:
  - among the oaks
  - with the gods
  lexicon: HALOT
  rationale: אֵלִים can denote large trees, especially terebinths/oaks, and the parallel
    'under every green tree' strongly favors sacred trees rather than 'gods' here.
    'Terebinths' is more specific and reflects common prophetic usage for cultic trees;
    'oaks' is possible and worth preserving in a footnote as a lexical alternative.
- source_word: תַּחַת כָּל עֵץ רַעֲנָן
  chosen: under every green tree
  alternatives:
  - under every leafy tree
  - under every luxuriant tree
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for sites of illicit worship. 'Green tree'
    is the standard, transparent rendering and preserves the imagery without paraphrase.
- source_word: שֹׁחֲטֵי
  chosen: who slaughter
  alternatives:
  - who kill
  - who sacrifice by slaughter
  lexicon: HALOT
  rationale: The participle denotes slaughtering, often in sacrificial contexts. 'Slaughter'
    preserves both the violence and likely cultic overtones better than the more generic
    'kill'.
- source_word: הַיְלָדִים
  chosen: the children
  alternatives:
  - the sons
  - the little ones
  lexicon: HALOT
  rationale: יְלָדִים broadly means children/offspring. 'Children' is the most natural
    and accurate English rendering here, without over-specifying sex or age.
- source_word: בַּנְּחָלִים
  chosen: in the wadis
  alternatives:
  - in the valleys
  - by the streams
  lexicon: HALOT
  rationale: נחלים are streambeds/ravines, often seasonal watercourses. 'Wadis' is
    geographically precise, though less traditional than 'valleys.' A footnote preserves
    'valleys' as a familiar alternative.
- source_word: תַּחַת סְעִפֵי הַסְּלָעִים
  chosen: under the clefts of the rocks
  alternatives:
  - under the branches of the rocks
  - under the overhangs of the crags
  lexicon: HALOT
  rationale: סְעִפִים literally refers to branches/divisions, but with rocks it likely
    denotes clefts, fissures, or projecting crags. 'Clefts of the rocks' gives idiomatic
    English while preserving the image of hidden rocky places associated with illicit
    rites.
