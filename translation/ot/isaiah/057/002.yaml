id: ISA.57.2
reference: Isaiah 57:2
source:
  edition: WLC
  text: יָב֣וֹא שָׁל֔וֹם יָנ֖וּחוּ עַל מִשְׁכְּבוֹתָ֑/ם הֹלֵ֖ךְ נְכֹחֽ/וֹ־׃
translation:
  text: He enters into peace; they rest on their beds, each one who walked in his
    uprightness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He comes into peace.' The Hebrew verb can be rendered either way in
      context.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew shifts between singular and plural: ''he enters ... they rest
      ... who walked in his uprightness.'''
    reason: alternative_reading
  - marker: c
    text: Or 'who walked straight before him' or 'who walked uprightly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָב֣וֹא
  chosen: enters
  alternatives:
  - comes
  - shall enter
  lexicon: HALOT
  rationale: Qal imperfect 3ms of בוא. In this poetic context it expresses the righteous
    person's transition into a state of peace. 'Enters' is idiomatic in English and
    fits the singular subject implied from the previous verse.
- source_word: שָׁל֔וֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: שָׁלוֹם commonly denotes peace, well-being, or wholeness. 'Peace' is
    the most natural concise rendering here, while still allowing the fuller Hebrew
    sense to resonate.
- source_word: יָנ֖וּחוּ
  chosen: they rest
  alternatives:
  - they find rest
  - they lie down
  lexicon: HALOT
  rationale: Qal imperfect 3mp of נוח, referring to the plural righteous as a class.
    'They rest' preserves the repose/death imagery without over-paraphrasing.
- source_word: עַל מִשְׁכְּבוֹתָ֑ם
  chosen: on their beds
  alternatives:
  - upon their couches
  - on their resting places
  lexicon: HALOT
  rationale: Literally 'on their beds/places of lying down.' In context this is a
    poetic image for repose in death. 'Beds' is the straightforward lexical equivalent
    and preserves the metaphor.
- source_word: הֹלֵ֖ךְ
  chosen: who walked
  alternatives:
  - walking
  - the one going
  lexicon: HALOT
  rationale: Qal participle masculine singular of הלך. Although formally participial,
    English relative clause 'who walked' reads naturally and reflects the person's
    characteristic conduct, likely viewed from the standpoint of completed earthly
    life.
- source_word: נְכֹחֽוֹ
  chosen: in his uprightness
  alternatives:
  - straight before him
  - straightforwardly
  - in what is straight before him
  lexicon: HALOT
  rationale: From נכח, conveying straightness/uprightness. With the 3ms suffix, the
    phrase is somewhat compressed and has been variously understood. 'In his uprightness'
    best captures the ethical sense in context and links naturally with the righteous
    person of v.1.
