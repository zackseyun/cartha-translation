theological_decisions:
- issue: Number shift from singular to plural within the verse
  chosen_reading: Render the first clause with singular ('He enters into peace') and
    the second with plural ('they rest on their beds'), then clarify the final participial
    phrase distributively ('each one who walked in his uprightness').
  alternative_readings:
  - 'Regularize everything to singular: ''He enters... he rests...'''
  - 'Regularize everything to plural: ''They enter... they rest...'''
  rationale: The Hebrew itself shifts from singular verbs/participle to plural verb
    and plural noun with suffix. Preserving the tension is preferable to smoothing
    it away, while 'each one' helps English readers follow the distributive sense
    without erasing the Hebrew texture.
  doctrine_reference: Translation philosophy §3, preserve theological/interpretive
    tension rather than resolve it
- issue: Sense of death imagery
  chosen_reading: Retain the metaphor of resting on beds without making an explicit
    doctrinal statement about the intermediate state.
  alternative_readings:
  - Interpret explicitly as burial in the grave
  - Interpret explicitly as heavenly rest
  rationale: The verse speaks of peace and rest for the righteous in death, but does
    not specify the full metaphysical details. The translation should preserve the
    text's comfort and imagery without importing a more developed doctrinal claim.
  doctrine_reference: Affirmations and Translation philosophy §1, §3
