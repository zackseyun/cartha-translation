theological_decisions:
- issue: Sexual/idolatrous metaphor for Judah's apostasy
  chosen_reading: Retain the sexual imagery in the main text as metaphorically describing
    idolatry and illicit alliances, without flattening it into a purely abstract statement
    about unfaithfulness.
  alternative_readings:
  - Render the whole verse dynamically as explicit idol worship
  - Render the whole verse as political alliances only
  rationale: Isaiah uses sexualized language to portray covenant infidelity. The translation
    should preserve that tension rather than resolve the imagery into a single explanatory
    category. This follows the stated philosophy of preserving theological tension
    and original-language primacy.
  doctrine_reference: Translation philosophy §§1, 3
