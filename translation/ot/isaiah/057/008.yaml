id: ISA.57.8
reference: Isaiah 57:8
source:
  edition: WLC
  text: וְ/אַחַ֤ר הַ/דֶּ֨לֶת֙ וְ/הַ/מְּזוּזָ֔ה שַׂ֖מְתְּ זִכְרוֹנֵ֑/ךְ כִּ֣י מֵ/אִתִּ֞/י
    גִּלִּ֣ית וַֽ/תַּעֲלִ֗י הִרְחַ֤בְתְּ מִשְׁכָּבֵ/ךְ֙ וַ/תִּכְרָת לָ֣/ךְ מֵ/הֶ֔ם
    אָהַ֥בְתְּ מִשְׁכָּבָ֖/ם יָ֥ד חָזִֽית־׃
translation:
  text: Behind the door and the doorpost you set up your memorial; for away from me
    you uncovered yourself and went up; you made your bed wide, and you made a covenant
    for yourself with them; you loved their bed; you looked on a hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you placed your symbol/remembrance.' The Hebrew 'memorial' may refer
      to an idolatrous token set up in secret.
    reason: lexical_alternative
  - marker: b
    text: Or 'you cut a covenant for yourself with them.' The Hebrew uses covenant-making
      language, though the noun 'covenant' is not stated explicitly.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'you looked on a hand.' The phrase is obscure; possible senses include
      'you looked on a monument/marker' or a sexual euphemism.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאַחַר הַדֶּלֶת וְהַמְּזוּזָה
  chosen: Behind the door and the doorpost
  alternatives:
  - Behind the door and the threshold
  lexicon: HALOT
  rationale: אַחַר with the article-marked nouns gives a spatial sense, 'behind' or
    'at the back of.' מְזוּזָה is the doorpost/doorframe sidepost, not the threshold.
    The phrase evokes hidden placement of an idolatrous token in a domestic setting.
- source_word: שַׂמְתְּ זִכְרוֹנֵךְ
  chosen: you set up your memorial
  alternatives:
  - you placed your remembrance
  - you set up your symbol
  lexicon: HALOT
  rationale: זִכָּרוֹן commonly denotes a memorial/remembrance token. In this context
    it likely refers to an idolatrous emblem or reminder placed secretly. 'Memorial'
    preserves the concrete yet somewhat ambiguous force better than over-interpreting
    as 'idol' in the main text.
- source_word: כִּי מֵאִתִּי גִּלִּית
  chosen: for away from me you uncovered yourself
  alternatives:
  - for from me you uncovered yourself
  - for you uncovered yourself, departing from me
  lexicon: HALOT
  rationale: 'גלה in this stem can mean uncover oneself, often with sexual/shame connotations.
    מֵאִתִּי marks separation from YHWH: the act is one of apostasy. ''Away from me''
    makes the separative force natural in English.'
- source_word: וַתַּעֲלִי
  chosen: and went up
  alternatives:
  - and climbed up
  lexicon: HALOT
  rationale: עלה is literally 'go up.' In Isaiah's idolatry polemic it may allude
    to ascent to high places, but the verb itself should remain broad in the main
    text.
- source_word: הִרְחַבְתְּ מִשְׁכָּבֵךְ
  chosen: you made your bed wide
  alternatives:
  - you enlarged your bed
  - you spread out your bed
  lexicon: HALOT
  rationale: The hiphil of רחב means make wide/enlarge. מִשְׁכָּב is bed/lying place,
    here with sexual metaphor. 'Made your bed wide' preserves the image without paraphrasing.
- source_word: וַתִּכְרָת לָךְ מֵהֶם
  chosen: you made a covenant for yourself with them
  alternatives:
  - you cut a covenant for yourself with them
  - you bargained for yourself with them
  lexicon: HALOT
  rationale: כרת with covenantal sense is the standard idiom 'cut/make a covenant.'
    Although no explicit noun בְּרִית appears, the idiom is widely recognized from
    context and ancient usage. 'Made a covenant' is idiomatic English; 'for yourself'
    reflects לָךְ.
- source_word: אָהַבְתְּ מִשְׁכָּבָם
  chosen: you loved their bed
  alternatives:
  - you loved to share their bed
  - you loved their couch
  lexicon: HALOT
  rationale: The phrase is sexually charged and metaphorical for illicit alliances/idolatry.
    Retaining 'their bed' keeps the metaphor vivid and close to the Hebrew.
- source_word: יָד חָזִית
  chosen: you looked on a hand
  alternatives:
  - you saw a monument
  - you gazed on a phallus
  - you looked on power
  lexicon: HALOT
  rationale: This is the verse's hardest phrase. יָד literally means 'hand,' but in
    some contexts can denote a monument, marker, or euphemistic object. חזה is 'see/look
    upon.' To avoid importing a speculative interpretation into the main text, the
    draft keeps the literal rendering and preserves likely alternatives in a footnote.
