id: ISA.57.12
reference: Isaiah 57:12
source:
  edition: WLC
  text: אֲנִ֥י אַגִּ֖יד צִדְקָתֵ֑/ךְ וְ/אֶֽת מַעֲשַׂ֖יִ/ךְ וְ/לֹ֥א יוֹעִילֽוּ/ךְ־׃
translation:
  text: I myself will declare your righteousness and your works, but they will not
    profit you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your justice' for 'your righteousness'; the Hebrew צדקה can carry either
      sense depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'and they will not help you.' The Hebrew verb can mean 'profit, benefit,
      help.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  chosen: I myself
  alternatives:
  - I
  - I am the one who
  lexicon: HALOT
  rationale: The independent pronoun is explicit and emphatic before the verb. 'I
    myself' preserves the emphasis better than a bare 'I' in English.
- source_word: אַגִּיד
  chosen: will declare
  alternatives:
  - will tell
  - will announce
  - will expose
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means 'declare, make known, announce.' 'Will declare'
    is a natural formal-equivalent rendering. In context the declaration is likely
    ironic or exposing, but that nuance comes from the clause as a whole rather than
    requiring a stronger lexical gloss like 'expose' in the main text.
- source_word: צִדְקָתֵךְ
  chosen: your righteousness
  alternatives:
  - your justice
  - your righteous acts
  lexicon: HALOT
  rationale: The noun צדקה most basically denotes 'righteousness,' and that is the
    default rendering for this lexical family in the project unless context clearly
    demands otherwise. Here the address is ironic or accusatory, referring to the
    addressee's supposed righteousness; 'justice' is possible but less likely in this
    immediate pairing with 'your works.' 'Righteous acts' is interpretive and therefore
    kept as an alternative only.
- source_word: וְאֶת מַעֲשַׂיִךְ
  chosen: and your works
  alternatives:
  - and your deeds
  - and what you have done
  lexicon: HALOT
  rationale: מעשים is a common term for deeds/works. 'Works' preserves the lexical
    connection and the likely negative evaluation in context without over-paraphrasing.
- source_word: וְלֹא יוֹעִילוּךְ
  chosen: but they will not profit you
  alternatives:
  - and they will not profit you
  - but they will not help you
  - and they will not benefit you
  lexicon: HALOT
  rationale: The verb יעל in Hiphil means 'to profit, benefit, help.' 'Profit' is
    a concise and idiomatic rendering. Although the conjunction is formally 'and,'
    English style and the sense of contrast favor 'but' here, since the second clause
    overturns any presumed value in the addressee's righteousness and works.
