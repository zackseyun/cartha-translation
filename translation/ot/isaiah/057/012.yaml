theological_decisions:
- issue: Tone of 'your righteousness' in context
  chosen_reading: Retained as 'your righteousness' without scare quotes or interpretive
    expansion, allowing the context to convey irony/exposure.
  alternative_readings:
  - your so-called righteousness
  - your righteous acts
  rationale: The verse likely speaks ironically against false piety or self-justifying
    deeds. However, adding 'so-called' would import interpretation into the text.
    Preserving the plain lexical form while letting the surrounding context communicate
    the rebuke best fits optimal equivalence and the instruction not to paraphrase
    beyond the source text.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
