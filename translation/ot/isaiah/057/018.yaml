id: ISA.57.18
reference: Isaiah 57:18
source:
  edition: WLC
  text: דְּרָכָ֥י/ו רָאִ֖יתִי וְ/אֶרְפָּאֵ֑/הוּ וְ/אַנְחֵ֕/הוּ וַ/אֲשַׁלֵּ֧ם נִֽחֻמִ֛ים
    ל֖/וֹ וְ/לַ/אֲבֵלָֽי/ו׃
translation:
  text: I have seen his ways, and I will heal him; I will lead him and restore comfort
    to him and to his mourners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'restore comforts to him'; the Hebrew noun is plural, 'comforts' or 'consolations,'
      but English commonly uses the singular mass noun 'comfort.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּרָכָיו
  chosen: his ways
  alternatives:
  - his conduct
  - his path
  lexicon: HALOT
  rationale: דֶּרֶךְ in the plural commonly denotes one's manner of life or conduct.
    'His ways' preserves the Hebrew idiom while remaining natural English and leaves
    intact the moral nuance in context.
- source_word: רָאִיתִי
  chosen: I have seen
  alternatives:
  - I saw
  - I have looked upon
  lexicon: HALOT
  rationale: The perfect verb is rendered with present relevance in English ('I have
    seen'), fitting the sequence in which God's observation grounds the following
    promises.
- source_word: וְאֶרְפָּאֵהוּ
  chosen: and I will heal him
  alternatives:
  - and I will restore him
  - and I will make him whole
  lexicon: HALOT
  rationale: רפא normally means 'heal.' In this context of divine restoration after
    sin and affliction, 'heal' preserves both literal and metaphorical resonance without
    over-interpreting.
- source_word: וְאַנְחֵהוּ
  chosen: I will lead him
  alternatives:
  - I will guide him
  lexicon: HALOT
  rationale: The Hiphil of נחה means to lead or guide. 'Lead' is slightly more concrete
    and matches the restoration imagery of God personally directing the repentant
    one.
- source_word: וַאֲשַׁלֵּם
  chosen: and restore
  alternatives:
  - and repay
  - and make whole
  - and recompense
  lexicon: HALOT
  rationale: שׁלם in the Piel can mean repay, requite, or make good/restore. Here
    the object is 'comforts,' so 'restore' best conveys the sense of granting back
    well-being rather than paying a debt.
- source_word: נִחֻמִים
  chosen: comfort
  alternatives:
  - consolation
  - comforts
  lexicon: HALOT
  rationale: The plural noun can be rendered woodenly as 'comforts,' but idiomatic
    English prefers the mass noun 'comfort.' The restorative sense is preserved without
    awkwardness.
- source_word: לּוֹ
  chosen: to him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The preposition ל marks the recipient of the restored comfort. 'To him'
    is the most straightforward rendering in this sequence.
- source_word: וְלַאֲבֵלָיו
  chosen: and to his mourners
  alternatives:
  - and to those who mourn for him
  - and to his grieving ones
  lexicon: HALOT
  rationale: אֲבֵלִים are mourners or grieving persons. With the pronominal suffix,
    'his mourners' is the most concise and natural rendering, preserving the relational
    sense.
