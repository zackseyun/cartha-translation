id: ISA.57.17
reference: Isaiah 57:17
source:
  edition: WLC
  text: בַּ/עֲוֺ֥ן בִּצְע֛/וֹ קָצַ֥פְתִּי וְ/אַכֵּ֖/הוּ הַסְתֵּ֣ר וְ/אֶקְצֹ֑ף וַ/יֵּ֥לֶךְ
    שׁוֹבָ֖ב בְּ/דֶ֥רֶךְ לִבּֽ/וֹ׃
translation:
  text: Because of the iniquity of his unjust gain I was angry, and I struck him;
    I hid myself and was angry, but he went on backsliding in the way of his heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his covetousness.' The Hebrew term can refer either to greedy desire
      or to profit gained by greed.
    reason: lexical_alternative
  - marker: b
    text: Or 'I hid my face and was angry.' 'Hid my face' reflects a common biblical
      idiom, though 'face' is not explicit in the Hebrew here.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּעֲוֺן
  chosen: Because of the iniquity of
  alternatives:
  - For the iniquity of
  - In the iniquity of
  lexicon: HALOT
  rationale: The preposition ב with עָוֺן here is causal in context, introducing the
    reason for divine anger. 'Because of the iniquity of' makes the causal force clear
    in natural English while preserving the noun 'iniquity.'
- source_word: בִּצְעוֹ
  chosen: his unjust gain
  alternatives:
  - his covetousness
  - his greedy gain
  - his plunder
  lexicon: HALOT
  rationale: בֶּצַע commonly denotes gain acquired by greed or unjust profit. 'Unjust
    gain' preserves both the economic and moral sense better than the more inward
    'covetousness,' though that remains a viable contextual alternative.
- source_word: קָצַפְתִּי
  chosen: I was angry
  alternatives:
  - I was wrathful
  - I was enraged
  lexicon: HALOT
  rationale: The verb קצף denotes anger/wrath. 'I was angry' is idiomatic modern English
    and fits the balanced style; stronger options risk overstating the register.
- source_word: וְאַכֵּהוּ
  chosen: and I struck him
  alternatives:
  - and I smote him
  - and I afflicted him
  lexicon: HALOT
  rationale: נכה in the Hiphil commonly means to strike or smite. 'Struck' is clear
    modern English and preserves the concrete punitive action.
- source_word: הַסְתֵּר
  chosen: I hid myself
  alternatives:
  - hiding
  - I hid my face
  lexicon: HALOT
  rationale: The infinitive absolute from סתר functions adverbially or elliptically
    here. Given the context of divine displeasure and the common biblical idiom of
    God hiding himself/his face, 'I hid myself' gives a coherent English clause without
    importing 'face,' which is not explicit in the Hebrew.
- source_word: וְאֶקְצֹף
  chosen: and was angry
  alternatives:
  - and I was wrathful
  - while I was angry
  lexicon: HALOT
  rationale: A second occurrence of קצף is retained with similar wording for consistency.
    Rendering it as 'and was angry' avoids awkward repetition of 'I was' while preserving
    the sequence.
- source_word: וַיֵּלֶךְ
  chosen: he went on
  alternatives:
  - he went
  - he kept going
  lexicon: HALOT
  rationale: הלך with the following adjective/participle-like term conveys continued
    conduct, not merely locomotion. 'Went on' captures the durative sense in idiomatic
    English.
- source_word: שׁוֹבָב
  chosen: backsliding
  alternatives:
  - turning away
  - stubbornly apostate
  - rebellious
  lexicon: HALOT
  rationale: שׁוֹבָב carries the sense of turning away, apostasy, or backsliding.
    'Backsliding' is a traditional but still understandable rendering that captures
    covenantal defection; alternatives are possible but either flatten the metaphor
    or over-specify the tone.
- source_word: בְּדֶרֶךְ לִבּוֹ
  chosen: in the way of his heart
  alternatives:
  - according to the way of his own heart
  - in the path of his heart
  lexicon: HALOT
  rationale: The phrase is metaphorical for conduct directed by one's inner disposition/will.
    'In the way of his heart' preserves the Hebrew imagery and avoids over-interpretation.
