theological_decisions:
- issue: Divine hiddenness expression in הַסְתֵּר
  chosen_reading: I hid myself
  alternative_readings:
  - I hid my face
  rationale: The Hebrew does not explicitly include 'face,' though that fuller idiom
    is common elsewhere. To avoid importing a noun not present in the text, the main
    text keeps the shorter expression, while the more traditional idiomatic alternative
    is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §3
- issue: Moral object of judgment in בִּצְעוֹ
  chosen_reading: his unjust gain
  alternative_readings:
  - his covetousness
  rationale: The term can denote greed as an inner vice or gain obtained through greed.
    The context of punishment allows either, but 'unjust gain' better preserves the
    lexical concreteness of the noun while leaving the moral dimension explicit.
  doctrine_reference: Translation philosophy §3, §5
