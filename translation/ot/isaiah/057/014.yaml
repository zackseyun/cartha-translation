theological_decisions:
- issue: Speaker identification in the opening formula
  chosen_reading: An impersonal announcement ('it will be said') without specifying
    the speaker
  alternative_readings:
  - A direct divine speech introduction ('he said,' with God as subject)
  - An indefinite human speaker ('one will say')
  rationale: The Hebrew form does not explicitly identify the subject, and the immediate
    context allows an announcement formula. Preserving that ambiguity avoids importing
    a more specific speaker than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
