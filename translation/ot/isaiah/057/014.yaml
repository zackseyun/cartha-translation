id: ISA.57.14
reference: Isaiah 57:14
source:
  edition: WLC
  text: וְ/אָמַ֥ר סֹֽלּוּ סֹ֖לּוּ פַּנּוּ דָ֑רֶךְ הָרִ֥ימוּ מִכְשׁ֖וֹל מִ/דֶּ֥רֶךְ
    עַמִּֽ/י־־׃ס
translation:
  text: And it will be said, “Build up, build up; clear the way; lift the stumbling
    block out of the way of my people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “Cast up, cast up; prepare the way.” The Hebrew
      uses road-building imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַר
  chosen: And it will be said
  alternatives:
  - And he said
  - Then one will say
  lexicon: HALOT
  rationale: The form is a qatal 3ms of אמר with prefixed conjunction. In context
    it functions idiomatically as an impersonal or passive-like announcement formula
    rather than requiring an explicit male subject in English. 'And it will be said'
    preserves the Hebrew's terseness and avoids supplying an unwarranted speaker.
- source_word: סֹלּוּ סֹלּוּ
  chosen: Build up, build up
  alternatives:
  - Cast up, cast up
  - Prepare, prepare
  lexicon: HALOT
  rationale: From סלל, commonly used for building up or heaping up a road/highway.
    The repetition is emphatic and should be preserved. 'Build up' reflects the road-building
    imagery more concretely than the traditional but less transparent 'cast up.'
- source_word: פַּנּוּ דָרֶךְ
  chosen: clear the way
  alternatives:
  - prepare the way
  - clear a road
  lexicon: HALOT
  rationale: פנה in the imperative means to clear away or make room; with דרך it yields
    the idiom of clearing/preparing a route. 'Clear the way' is natural modern English
    and keeps the removal imagery.
- source_word: הָרִימוּ
  chosen: lift
  alternatives:
  - raise
  - remove
  lexicon: HALOT
  rationale: The Hiphil imperative of רום literally means 'lift up' or 'raise.' Here
    it governs 'stumbling block' and implies removal by lifting away. 'Lift' keeps
    the concrete verbal image while fitting the context.
- source_word: מִכְשׁוֹל
  chosen: stumbling block
  alternatives:
  - obstacle
  - offense
  lexicon: HALOT
  rationale: מכשול denotes something that causes stumbling, literally or figuratively.
    'Stumbling block' preserves the metaphor and its theological resonance better
    than the flatter 'obstacle.'
- source_word: מִדֶּרֶךְ עַמִּי
  chosen: out of the way of my people
  alternatives:
  - from the road of my people
  - from my people's path
  lexicon: HALOT
  rationale: The preposition מן marks removal away from the path/way belonging to
    God's people. 'Out of the way of my people' is idiomatic English that preserves
    both the spatial sense and the possessive relation.
