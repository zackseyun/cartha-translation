theological_decisions:
- issue: Referent of 'your gathered ones'
  chosen_reading: understood as gathered idols/objects of false trust
  alternative_readings:
  - gathered allies
  - religious assemblage
  rationale: The immediate context in Isaiah 57 denounces idolatry and false refuges.
    Making the referent explicit as 'idols' clarifies the prophetic contrast with
    taking refuge in the LORD, while remaining within the contextual sense of the
    Hebrew.
- issue: Meaning of אֶרֶץ
  chosen_reading: the land
  alternative_readings:
  - the earth
  rationale: The covenantal and Zion-centered context favors 'land' rather than a
    universalized 'earth.' This avoids importing a broader theological claim not demanded
    by the verse while preserving the concrete inheritance motif.
