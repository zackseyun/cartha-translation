id: ISA.57.13
reference: Isaiah 57:13
source:
  edition: WLC
  text: בְּ/זַֽעֲקֵ/ךְ֙ יַצִּילֻ֣/ךְ קִבּוּצַ֔יִ/ךְ וְ/אֶת כֻּלָּ֥/ם יִשָּׂא ר֖וּחַ
    יִקַּח הָ֑בֶל וְ/הַ/חוֹסֶ֥ה בִ/י֙ יִנְחַל אֶ֔רֶץ וְ/יִירַ֖שׁ הַר קָדְשִֽׁ/י־־־־־׃
translation:
  text: When you cry out, let your gathered idols rescue you! But the wind will carry
    all of them off; a breath will take them away. But whoever takes refuge in me
    will inherit the land and possess my holy mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your gathered ones,' possibly referring to idols, allies, or other objects
      of false trust.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'wind' and 'breath/vapor' form a poetic pair emphasizing how easily
      these things vanish.
    reason: cultural_note
  - marker: c
    text: Or 'inherit the earth'; the Hebrew can mean either 'land' or 'earth,' though
      'land' fits the Zion context well.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּזַעֲקֵךְ
  chosen: When you cry out
  alternatives:
  - At your cry
  - When you call out
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive/verb form gives a temporal sense here:
    ''when you cry out.'' This fits the prophetic taunt context better than a more
    wooden ''in your crying.'''
- source_word: יַצִּילֻךְ
  chosen: let ... rescue you
  alternatives:
  - will rescue you
  - deliver you
  lexicon: HALOT
  rationale: 'Although morphologically imperfect, in context it functions rhetorically/ironically
    as a challenge: ''let ... rescue you!'' This captures the taunting force of the
    line better than a flat predictive future.'
- source_word: קִבּוּצַיִךְ
  chosen: your gathered idols
  alternatives:
  - your collections
  - your gatherings
  - those you have gathered
  lexicon: HALOT
  rationale: The noun literally refers to things gathered together. In context of
    Isaiah's polemic against idolatry, it most naturally refers to the collection
    of idols/allies she has assembled. 'Gathered idols' makes the implied referent
    explicit in English without excessive paraphrase.
- source_word: וְאֶת־כֻּלָּם
  chosen: all of them
  alternatives:
  - them all
  lexicon: HALOT
  rationale: Straightforward object phrase referring back to the gathered objects
    of trust.
- source_word: יִשָּׂא רוּחַ
  chosen: the wind will carry ... off
  alternatives:
  - a wind will lift
  - the רוח will bear away
  lexicon: HALOT
  rationale: רוּחַ can mean wind, breath, or spirit. Here the parallel with הָבֶל
    ('breath/vapor') and the image of insubstantiality favors 'wind.' 'Carry off'
    idiomatically renders נשׂא in this context.
- source_word: יִקַּח הָבֶל
  chosen: a breath will take them away
  alternatives:
  - a puff of air will take them
  - vanity will take them away
  lexicon: HALOT
  rationale: 'הָבֶל often means breath, vapor, or vanity. In this poetic parallel
    with רוּחַ, the concrete image ''a breath'' best fits: even the slightest breath
    removes these powerless objects.'
- source_word: וְהַחֹסֶה בִי
  chosen: But whoever takes refuge in me
  alternatives:
  - But he who takes refuge in me
  - the one seeking shelter in me
  lexicon: HALOT
  rationale: The participle denotes an ongoing stance of trust/protection-seeking.
    'Whoever takes refuge in me' is natural modern English and preserves the representative
    singular force.
- source_word: יִנְחַל אֶרֶץ
  chosen: will inherit the land
  alternatives:
  - will inherit the earth
  - will receive the land as an inheritance
  lexicon: HALOT
  rationale: נחל commonly means inherit/receive as possession. In Isaiah, אֶרֶץ here
    most likely refers to the land in covenantal sense rather than the whole earth,
    especially with the following reference to Zion.
- source_word: וְיִירַשׁ הַר קָדְשִׁי
  chosen: and possess my holy mountain
  alternatives:
  - and inherit my holy mountain
  - and take possession of my holy mountain
  lexicon: HALOT
  rationale: ירשׁ overlaps with inherit/possess. To avoid awkward repetition after
    'inherit the land,' 'possess' preserves the semantic force while maintaining readable
    English. 'My holy mountain' refers to Zion, God's dwelling place.
