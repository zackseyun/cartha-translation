id: ISA.57.6
reference: Isaiah 57:6
source:
  edition: WLC
  text: בְּ/חַלְּקֵי נַ֣חַל חֶלְקֵ֔/ךְ הֵ֥ם הֵ֖ם גּוֹרָלֵ֑/ךְ גַּם לָ/הֶ֞ם שָׁפַ֥כְתְּ
    נֶ֨סֶךְ֙ הֶעֱלִ֣ית מִנְחָ֔ה הַ֥/עַל אֵ֖לֶּה אֶנָּחֵֽם־־׃
translation:
  text: Among the smooth stones of the valley is your portion; they, they are your
    lot. Even to them you have poured out a drink offering; you have brought up a
    grain offering. Shall I relent because of these things?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Among the portions of the valley'; the Hebrew likely refers to the smooth
      stones of a wadi bed, fitting the idolatrous context.
    reason: lexical_alternative
  - marker: b
    text: Or 'Shall I be comforted over these things?' The Hebrew verb can also carry
      the sense of being comforted or appeased.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּחַלְּקֵי נַחַל
  chosen: Among the smooth stones of the valley
  alternatives:
  - Among the portions of the valley
  - With the slippery places of the wadi
  lexicon: HALOT
  rationale: חַלְּקֵי can derive from the idea of smoothness/slipperiness and in this
    context likely refers to smooth stones in a wadi bed, fitting the idolatrous setting
    and the following pronouns ('they, they'). 'Valley' is smoother English for נחל
    here, though 'wadi' is possible.
- source_word: חֶלְקֵךְ
  chosen: your portion
  alternatives:
  - your share
  lexicon: HALOT
  rationale: חלק commonly denotes one's allotted portion or share. 'Portion' preserves
    the wordplay with גּוֹרָלֵךְ ('your lot').
- source_word: הֵם הֵם
  chosen: they, they
  alternatives:
  - they themselves
  - those indeed
  lexicon: HALOT
  rationale: The repetition is emphatic. Rendering it explicitly preserves the Hebrew
    emphasis and rhetorical force.
- source_word: גּוֹרָלֵךְ
  chosen: your lot
  alternatives:
  - your destiny
  - your allotted share
  lexicon: HALOT
  rationale: גורל is literally 'lot' or allotted portion. 'Lot' keeps the concrete
    allotment language and parallels 'portion'.
- source_word: נֶסֶךְ
  chosen: a drink offering
  alternatives:
  - libation
  lexicon: HALOT
  rationale: This is the standard sacrificial term for a poured offering. 'Drink offering'
    is clear modern English; 'libation' is possible but less accessible.
- source_word: הֶעֱלִית
  chosen: you have brought up
  alternatives:
  - you have offered
  - you have presented
  lexicon: HALOT
  rationale: The Hiphil of עלה in sacrificial contexts often means to offer or bring
    up. 'Brought up' preserves the verbal imagery while remaining intelligible in
    context.
- source_word: מִנְחָה
  chosen: a grain offering
  alternatives:
  - an offering
  - a tribute offering
  lexicon: HALOT
  rationale: מנחה in cultic context commonly denotes a grain offering. This is more
    precise than the generic 'offering.'
- source_word: הַעַל אֵלֶּה אֶנָּחֵם
  chosen: Shall I relent because of these things?
  alternatives:
  - Should I be comforted over these things?
  - Shall I change my mind concerning these things?
  lexicon: HALOT
  rationale: נחם in the Niphal can mean relent, be sorry, or be comforted. In this
    context of divine indictment, a rhetorical question about relenting or withholding
    judgment best fits. 'Because of these things' captures על אלה idiomatically.
