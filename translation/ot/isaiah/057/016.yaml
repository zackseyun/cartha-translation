id: ISA.57.16
reference: Isaiah 57:16
source:
  edition: WLC
  text: כִּ֣י לֹ֤א לְ/עוֹלָם֙ אָרִ֔יב וְ/לֹ֥א לָ/נֶ֖צַח אֶקְּצ֑וֹף כִּי ר֨וּחַ֙ מִ/לְּ/פָנַ֣/י
    יַֽעֲט֔וֹף וּ/נְשָׁמ֖וֹת אֲנִ֥י עָשִֽׂיתִי־׃
translation:
  text: For I will not contend forever, nor will I be angry without end, for the spirit
    would grow faint before me— the breaths that I myself have made.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the breath would faint before me.' Hebrew רוּחַ can mean 'spirit' or
      'breath.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the souls that I have made.' Hebrew נְשָׁמוֹת literally means 'breaths,'
      but can be rendered more interpretively as 'souls' or 'lives.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - perpetually
  lexicon: HALOT
  rationale: In parallel with לָנֶצַח, the term denotes unending duration in idiomatic
    negated form. 'Forever' is natural English and preserves the temporal force without
    sounding wooden.
- source_word: אָרִיב
  chosen: contend
  alternatives:
  - accuse
  - strive
  - bring a case
  lexicon: HALOT
  rationale: From ריב, often used for contending or bringing a case. Here God speaks
    of sustained opposition/judgment. 'Contend' preserves the legal-relational nuance
    better than the more generic 'strive'.
- source_word: לָנֶצַח
  chosen: without end
  alternatives:
  - forever
  - continually
  lexicon: HALOT
  rationale: Used in poetic parallelism with לְעוֹלָם. Rendering it slightly differently
    in English avoids awkward repetition while preserving synonymous emphasis.
- source_word: אֶקְּצֹף
  chosen: be angry
  alternatives:
  - be wrathful
  - be enraged
  lexicon: HALOT
  rationale: The verb קצף denotes anger/wrath. 'Be angry' is clear modern English
    and fits the balanced style; 'be wrathful' is weightier but less natural.
- source_word: רוּחַ
  chosen: the spirit
  alternatives:
  - the breath
  - the wind
  lexicon: HALOT
  rationale: In this context of human frailty and in parallel with נְשָׁמוֹת, רוּחַ
    refers to the animating spirit/breath of life in creatures. 'Spirit' best preserves
    the anthropological sense while allowing the parallel to 'breaths' to stand.
- source_word: מִלְּפָנַי
  chosen: before me
  alternatives:
  - from before me
  - in my presence
  lexicon: HALOT
  rationale: Literally 'from before me,' but idiomatically the sense is that the spirit
    fails in God's presence or before him. 'Before me' is concise and natural.
- source_word: יַעֲטוֹף
  chosen: would grow faint
  alternatives:
  - would faint
  - would be overwhelmed
  - would fail
  lexicon: HALOT
  rationale: The verb עטף can denote fainting or growing weak/overwhelmed. Given the
    causal clause explaining why God does not remain angry forever, 'would grow faint'
    captures the progressive collapse of creaturely life.
- source_word: נְשָׁמוֹת
  chosen: the breaths
  alternatives:
  - the souls
  - the lives
  - the breathings
  lexicon: HALOT
  rationale: Plural of נשמה, often 'breath' or 'breathing being.' 'Breaths' keeps
    the concrete life-breath imagery and aligns with the creation motif in the next
    clause. 'Souls' would import later anthropological associations not required by
    the Hebrew.
- source_word: אֲנִי עָשִׂיתִי
  chosen: that I myself have made
  alternatives:
  - which I made
  - I created
  lexicon: HALOT
  rationale: The explicit pronoun אֲנִי is emphatic. 'I myself have made' preserves
    that emphasis and the perfect verb's completed action. 'Created' is possible contextually
    but 'made' is closer to עשה.
