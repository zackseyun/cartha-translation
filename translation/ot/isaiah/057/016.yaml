theological_decisions:
- issue: Anthropological language in רוּחַ / נְשָׁמוֹת
  chosen_reading: Render with life-breath/spirit language referring to human creatureliness,
    not the Holy Spirit.
  alternative_readings:
  - Render רוּחַ as 'breath' in the main text
  - Render נְשָׁמוֹת as 'souls'
  rationale: The verse explains divine restraint in judgment on the grounds that the
    life God gave to humans would fail under unrelieved wrath. The context favors
    creaturely spirit/breath rather than a reference to God's Spirit. 'Souls' is avoided
    because it can suggest a more technical anthropology than the Hebrew requires.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
