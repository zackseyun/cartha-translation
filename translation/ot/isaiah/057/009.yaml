theological_decisions:
- issue: Possible identification of 'the king' as Molech rather than an ordinary king
  chosen_reading: Retain 'the king' in the main text
  alternative_readings:
  - Molech
  rationale: The Hebrew text reads 'the king,' and the immediate imagery can describe
    either political alliance or idolatrous infidelity without requiring emendation
    or reinterpretation. Because the Molech reading is a longstanding interpretive
    possibility, it is preserved in a footnote rather than resolved in the main text.
  doctrine_reference: Translation philosophy §1, §3
