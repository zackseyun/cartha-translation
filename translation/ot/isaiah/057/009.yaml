id: ISA.57.9
reference: Isaiah 57:9
source:
  edition: WLC
  text: וַ/תָּשֻׁ֤רִי לַ/מֶּ֨לֶךְ֙ בַּ/שֶּׁ֔מֶן וַ/תַּרְבִּ֖י רִקֻּחָ֑יִ/ךְ וַ/תְּשַׁלְּחִ֤י
    צִרַ֨יִ/ךְ֙ עַד מֵ֣/רָחֹ֔ק וַ/תַּשְׁפִּ֖ילִי עַד שְׁאֽוֹל־־׃
translation:
  text: You went to the king with oil, and multiplied your perfumes; you sent your
    envoys far away, and debased yourself even to Sheol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'to Molech,' if 'the king' is understood as an allusive title
      for that deity.
    reason: alternative_reading
  - marker: b
    text: Sheol is the realm of the dead.
    reason: cultural_note
lexical_decisions:
- source_word: וַתָּשֻׁרִי
  chosen: you went
  alternatives:
  - you journeyed
  - you looked
  - you sought audience with
  lexicon: HALOT
  rationale: The verb is difficult and has been variously understood. In context with
    'to the king,' 'with oil,' and diplomatic/seductive imagery, it most naturally
    conveys going/approaching rather than literal seeing. 'You went' is concise and
    fits the prophetic accusation.
- source_word: לַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - to Molech
  - to the ruler
  lexicon: HALOT
  rationale: The plain sense is 'to the king.' Some interpreters understand a wordplay
    or allusion to Molech, but the consonantal text reads 'the king.' The possible
    allusive interpretation is preserved in a footnote rather than adopted in the
    main text.
- source_word: בַּשֶּׁמֶן
  chosen: with oil
  alternatives:
  - with ointment
  lexicon: HALOT
  rationale: שמן commonly means oil, here likely perfumed oil used in courting or
    diplomatic gift imagery. 'With oil' keeps the concrete Hebrew while allowing the
    connotation to emerge from context.
- source_word: וַתַּרְבִּי
  chosen: multiplied
  alternatives:
  - increased
  - made abundant
  lexicon: HALOT
  rationale: A straightforward rendering of רבה. 'Multiplied' preserves the force
    of lavish increase in the preparations or offerings.
- source_word: רִקֻּחָיִךְ
  chosen: your perfumes
  alternatives:
  - your ointments
  - your mixed spices
  - your aromatic oils
  lexicon: HALOT
  rationale: The noun refers to compounded aromatic mixtures. 'Perfumes' is natural
    modern English and suits the imagery of seductive or cultic preparation, while
    remaining close to the semantic range.
- source_word: וַתְּשַׁלְּחִי
  chosen: you sent
  alternatives:
  - you dispatched
  lexicon: HALOT
  rationale: Standard rendering of שלח. The object clarifies that emissaries are in
    view.
- source_word: צִרַיִךְ
  chosen: your envoys
  alternatives:
  - your messengers
  - your ambassadors
  lexicon: HALOT
  rationale: The term denotes messengers or envoys. 'Envoys' fits the political/diplomatic
    tone of seeking foreign alliances or illicit overtures.
- source_word: עַד מֵרָחֹק
  chosen: far away
  alternatives:
  - to a distant place
  - as far as afar
  lexicon: HALOT
  rationale: This idiom expresses great distance. 'Far away' is idiomatic English
    and preserves the sense of extensive outreach.
- source_word: וַתַּשְׁפִּילִי
  chosen: debased yourself
  alternatives:
  - humbled yourself
  - lowered yourself
  lexicon: HALOT
  rationale: Although the verb can mean 'humble,' here the context is negative self-abasement
    in idolatry/political prostitution. 'Debased yourself' better captures the moral
    degradation implied.
- source_word: עַד שְׁאוֹל
  chosen: even to Sheol
  alternatives:
  - down to Sheol
  - even to the grave
  - even to the realm of the dead
  lexicon: HALOT
  rationale: Sheol is best retained as a transliterated term because it refers to
    the Hebrew underworld/realm of the dead, not simply a grave. 'Even to Sheol' preserves
    the vivid extremity of the accusation.
