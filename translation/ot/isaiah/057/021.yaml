id: ISA.57.21
reference: Isaiah 57:21
source:
  edition: WLC
  text: אֵ֣ין שָׁל֔וֹם אָמַ֥ר אֱלֹהַ֖/י לָ/רְשָׁעִֽים׃ס
translation:
  text: There is no peace," says my God, "for the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Isaiah 48:22 has the closely parallel wording, "There is no peace," says
      the LORD, "for the wicked." Here the Hebrew reads "my God."
    reason: cross_reference
  - marker: b
    text: Or "well-being" or "wholeness" for "peace" (Hebrew shalom).
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  chosen: There is no
  alternatives:
  - 'No'
  - There is not
  lexicon: HALOT
  rationale: Existential negation introducing the clause; 'There is no' is natural
    modern English and preserves the absolute denial.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: '''Peace'' is the standard and contextually fitting rendering, while
    still carrying the broader Hebrew sense of well-being. The concise form suits
    the prophetic declaration.'
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  - declares
  lexicon: HALOT
  rationale: Although morphologically perfect, Hebrew prophetic speech often uses
    the perfect for a present performative quotation frame. 'Says' is idiomatic in
    English prophetic formulae and fits the immediate divine pronouncement.
- source_word: אֱלֹהַי
  chosen: my God
  alternatives:
  - God of me
  lexicon: HALOT
  rationale: The noun with 1cs suffix is straightforwardly possessive. 'My God' preserves
    the prophet's/reporter's first-person attribution of the divine speech.
- source_word: לָרְשָׁעִים
  chosen: for the wicked
  alternatives:
  - to the wicked
  - for the guilty
  - for the ungodly
  lexicon: HALOT
  rationale: 'The preposition ל here marks reference/beneficiary: peace does not belong
    to or exist for them. ''The wicked'' is the standard rendering of רשעים and best
    preserves the moral category without overinterpretation.'
