theological_decisions:
- issue: Speaker attribution in the divine saying
  chosen_reading: '"my God" retained as the MT first-person possessive'
  alternative_readings:
  - '"the LORD" by assimilation to Isaiah 48:22'
  - '"God" without the possessive for smoother English'
  rationale: The Masoretic Text here reads אֱלֹהַי, 'my God,' and the translation
    should preserve that wording rather than harmonize to a parallel passage or smooth
    away the first-person suffix. This does not add doctrinal content; it simply reflects
    the received Hebrew text.
  doctrine_reference: Translation philosophy §1, §5
