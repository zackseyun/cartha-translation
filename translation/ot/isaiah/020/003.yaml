theological_decisions:
- issue: Degree of nakedness in Isaiah's sign-act
  chosen_reading: Render עָרוֹם as 'naked' in the main text while preserving the possibility of partial undress in a footnote.
  alternative_readings:
  - stripped down to undergarments
  - bare/chiefly uncovered rather than fully nude
  rationale: The Hebrew adjective's plain lexical sense is 'naked,' and the translation should not soften it in the main text beyond what the source warrants. At the same time, in prophetic sign-act contexts and in light of ancient dress conventions, the term may refer to removal of the outer garment rather than total nudity; this nuance is worth preserving without overriding the base meaning.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve ambiguity/tension where genuine.'
