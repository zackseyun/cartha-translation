id: ISA.20.3
reference: Isaiah 20:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֔ה כַּ/אֲשֶׁ֥ר הָלַ֛ךְ עַבְדִּ֥/י יְשַׁעְיָ֖הוּ עָר֣וֹם וְ/יָחֵ֑ף שָׁלֹ֤שׁ שָׁנִים֙ א֣וֹת וּ/מוֹפֵ֔ת עַל מִצְרַ֖יִם וְ/עַל כּֽוּשׁ־־׃
translation:
  text: Then Yahweh said, “Just as my servant Isaiah has walked naked and barefoot for three years as a sign and a portent against Egypt and Cush,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'stripped'—that is, wearing only a loincloth or undergarment rather than being completely nude.
    reason: lexical_alternative
  - marker: b
    text: Cush refers to the region south of Egypt, often associated with Nubia; some English versions render it 'Ethiopia.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional small-caps covenantal substitute in English.
- source_word: כַּאֲשֶׁר
  chosen: Just as
  alternatives:
  - As
  - According as
  lexicon: HALOT
  rationale: Introduces the comparison that grounds the sign-act; 'Just as' is natural modern English and preserves the comparative force.
- source_word: הָלַךְ
  chosen: has walked
  alternatives:
  - walked
  - went about
  lexicon: HALOT
  rationale: The verb is literally 'walked/went.' 'Has walked' works idiomatically in English with the duration phrase 'for three years,' expressing the continuing state over that period.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave/servant, in prophetic and royal service contexts 'servant' is the established and contextually appropriate rendering, referring to Isaiah's commissioned status before God rather than emphasizing chattel bondage.
- source_word: יְשַׁעְיָהוּ
  chosen: Isaiah
  rationale: Standard English transliteration of the prophet's name.
- source_word: עָרוֹם
  chosen: naked
  alternatives:
  - stripped
  - bare
  lexicon: HALOT
  rationale: The adjective ordinarily means 'naked.' In this context it may denote stripped of outer garments rather than absolute nudity, but the lexical value should be preserved in the main text, with nuance noted in a footnote.
- source_word: וְיָחֵף
  chosen: and barefoot
  alternatives:
  - and bare of foot
  lexicon: HALOT
  rationale: Straightforward rendering of the adjective; paired with 'naked' to describe Isaiah's sign-act.
- source_word: שָׁלֹשׁ שָׁנִים
  chosen: for three years
  alternatives:
  - three years
  lexicon: HALOT
  rationale: English requires 'for' to express duration naturally. This most likely indicates the period of the sign-act rather than three separate symbolic years.
- source_word: אוֹת
  chosen: sign
  alternatives:
  - token
  lexicon: HALOT
  rationale: Standard rendering for a symbolic act that points beyond itself.
- source_word: וּמוֹפֵת
  chosen: and a portent
  alternatives:
  - and a wonder
  - and an omen
  lexicon: HALOT
  rationale: Distinguishes מופת from אות while keeping the pair's prophetic force. 'Portent' fits a sign-act that foreshadows judgment.
- source_word: עַל
  chosen: against
  alternatives:
  - concerning
  - upon
  lexicon: HALOT
  rationale: In this judgment context, 'against' best conveys the adversative force of the preposition with Egypt and Cush as the objects of the sign.
- source_word: מִצְרַיִם
  chosen: Egypt
  rationale: Standard English name for the nation.
- source_word: כּוּשׁ
  chosen: Cush
  alternatives:
  - Ethiopia
  lexicon: HALOT
  rationale: '''Cush'' is the more precise historical-geographical term and avoids anachronistically collapsing the ancient region into the modern nation-state ''Ethiopia.'''
