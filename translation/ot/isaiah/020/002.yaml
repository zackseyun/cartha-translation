id: ISA.20.2
reference: Isaiah 20:2
source:
  edition: WLC
  text: בָּ/עֵ֣ת הַ/הִ֗יא דִּבֶּ֣ר יְהוָה֮ בְּ/יַ֣ד יְשַׁעְיָ֣הוּ בֶן אָמוֹץ֮ לֵ/אמֹר֒ לֵ֗ךְ וּ/פִתַּחְתָּ֤ הַ/שַּׂק֙ מֵ/עַ֣ל מָתְנֶ֔י/ךָ וְ/נַעַלְ/ךָ֥ תַחֲלֹ֖ץ מֵ/עַ֣ל רַגְלֶ֑י/ךָ וַ/יַּ֣עַשׂ כֵּ֔ן הָלֹ֖ךְ עָר֥וֹם וְ/יָחֵֽף־׃ס
translation:
  text: At that time Yahweh spoke by the hand of Isaiah son of Amoz, saying, “Go, loosen the sackcloth from your waist, and remove your sandals from your feet.” And he did so, walking naked and barefoot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stripped' or 'bare'; the Hebrew can denote being inadequately clothed rather than completely nude in some contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בָּעֵת הַהִיא
  chosen: At that time
  alternatives:
  - In that time
  - At that moment
  lexicon: HALOT
  rationale: A natural temporal expression in English that preserves the Hebrew demonstrative force without sounding wooden.
- source_word: דִּבֶּר ... בְּיַד
  chosen: spoke by the hand of
  alternatives:
  - spoke through
  - spoke by means of
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'by the hand of.' Retaining it in English preserves the prophetic mediation formula while remaining intelligible. 'Through' is possible but less transparent to the source wording.
- source_word: יְשַׁעְיָהוּ בֶן אָמוֹץ
  chosen: Isaiah son of Amoz
  alternatives:
  - Isaiah the son of Amoz
  lexicon: HALOT
  rationale: Names are transliterated by standard convention, and 'son of' is the straightforward rendering of the filial construction.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard English rendering of the Hebrew quotative infinitive introducing direct speech.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Walk
  lexicon: HALOT
  rationale: Imperative of הלך here introduces the commanded action; 'Go' is the normal English equivalent in this construction.
- source_word: וּפִתַּחְתָּ
  chosen: loosen
  alternatives:
  - untie
  - open
  - remove
  lexicon: HALOT
  rationale: פתח in this context refers to undoing or loosening what is worn, not merely 'opening.' 'Loosen' fits the action of removing sackcloth from the waist while staying close to the lexical sense.
- source_word: הַשַּׂק
  chosen: the sackcloth
  alternatives:
  - the sackcloth garment
  - the rough cloth
  lexicon: HALOT
  rationale: שׂק commonly denotes sackcloth, often worn as a garment of mourning or prophetic sign. The article is retained.
- source_word: מֵעַל מָתְנֶיךָ
  chosen: from your waist
  alternatives:
  - from upon your loins
  - from your hips
  lexicon: HALOT
  rationale: מָתְנַיִם literally refers to the loins/waist region. 'Waist' is readable modern English and accurately reflects the body area without archaic diction.
- source_word: וְנַעַלְךָ תַחֲלֹץ מֵעַל רַגְלֶיךָ
  chosen: take your sandals off your feet
  alternatives:
  - remove your sandal from your foot
  - draw off your sandals from your feet
  lexicon: HALOT
  rationale: Though נַעַל can be singular collectively, English idiom prefers plural 'sandals' here. חלץ conveys removing or taking off.
- source_word: וַיַּעַשׂ כֵּן
  chosen: And he did so
  alternatives:
  - And he did thus
  - And he obeyed
  lexicon: HALOT
  rationale: A concise rendering of the Hebrew compliance formula, preserving the narrative sequence without adding interpretive material.
- source_word: הָלֹךְ
  chosen: walking
  alternatives:
  - going about
  - continually walking
  lexicon: HALOT
  rationale: The infinitive absolute here functions adverbially/predicatively with the following adjectives, describing Isaiah's manner/state. 'Walking' is the most natural English expression.
- source_word: עָרוֹם
  chosen: naked
  alternatives:
  - stripped
  - bare
  lexicon: HALOT
  rationale: The primary lexical sense is 'naked.' In prophetic sign-act contexts it can denote stripped down rather than absolute nudity, but the main text should preserve the direct lexical force; nuance can be noted in a footnote.
- source_word: יָחֵף
  chosen: barefoot
  alternatives:
  - with bare feet
  - unshod
  lexicon: HALOT
  rationale: Standard English equivalent for the adjective describing one without footwear.
