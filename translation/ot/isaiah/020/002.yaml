theological_decisions:
- issue: Degree of exposure implied by עָרוֹם in Isaiah's sign-act
  chosen_reading: Render as 'naked' in the main text while preserving the possibility of partial undress in a footnote.
  alternative_readings:
  - stripped
  - bare
  - wearing only an undergarment
  rationale: The Hebrew adjective ordinarily means 'naked,' and the translation should not soften the prophetic sign-act in the main text. At the same time, in context the removal of sackcloth from the waist may imply stripped-down attire rather than total nudity, so the alternative is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
