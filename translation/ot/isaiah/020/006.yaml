id: ISA.20.6
reference: Isaiah 20:6
source:
  edition: WLC
  text: וְ֠/אָמַר יֹשֵׁ֨ב הָ/אִ֣י הַ/זֶּה֮ בַּ/יּ֣וֹם הַ/הוּא֒ הִנֵּה כֹ֣ה מַבָּטֵ֗/נוּ
    אֲשֶׁר נַ֤סְנוּ שָׁם֙ לְ/עֶזְרָ֔ה לְ/הִ֨נָּצֵ֔ל מִ/פְּנֵ֖י מֶ֣לֶךְ אַשּׁ֑וּר וְ/אֵ֖יךְ
    נִמָּלֵ֥ט אֲנָֽחְנוּ־־׃ס
translation:
  text: And the inhabitant of this coastland will say in that day, ‘Look, this is
    what has become of our hope, where we fled for help to be delivered from the king
    of Assyria. And how shall we escape?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'this is our expectation' or 'this is what we looked to.' The Hebrew
      expression refers to the object in which they placed their hope.
    reason: lexical_alternative
  - marker: b
    text: '''Coastland'' may also be rendered ''island.'' In Isaiah, the term often
      refers more broadly to maritime lands or coastal regions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשֵׁב הָאִי הַזֶּה
  chosen: the inhabitant of this coastland
  alternatives:
  - the resident of this island
  - the one dwelling in this coastland
  lexicon: HALOT
  rationale: יֹשֵׁב is a singular participle used collectively for the population;
    'inhabitant' is idiomatic singular collective in English. אִי in Isaiah often
    refers not strictly to an island but to a coastland/maritime region, so 'coastland'
    better fits prophetic usage and likely reference.
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula; 'in that day' is natural and preserves
    the idiom.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces vivid attention-getting speech. 'Look' preserves force in
    readable modern English without archaic tone.
- source_word: כֹּה מַבָּטֵנוּ
  chosen: this is what has become of our hope
  alternatives:
  - such is our expectation
  - thus is our object of trust
  - this was what we looked to
  lexicon: HALOT
  rationale: מַבָּט literally relates to that toward which one looks, hence object
    of expectation or hope. In context Judah had looked to Cush/Egypt for security;
    'what has become of our hope' captures the rhetorical disillusionment more clearly
    than a wooden 'our expectation.'
- source_word: אֲשֶׁר נַסְנוּ שָׁם
  chosen: where we fled
  alternatives:
  - to which we fled there
  - where we sought refuge
  lexicon: HALOT
  rationale: נוּס means to flee. With שָׁם, the sense is movement toward that place
    for refuge. English omits 'there' as redundant.
- source_word: לְעֶזְרָה
  chosen: for help
  alternatives:
  - for assistance
  lexicon: HALOT
  rationale: Simple and direct rendering of the noun עֶזְרָה.
- source_word: לְהִנָּצֵל
  chosen: to be delivered
  alternatives:
  - to escape
  - to be rescued
  lexicon: HALOT
  rationale: Niphal infinitive of נצל conveys being delivered/rescued. 'To be delivered'
    avoids repeating 'escape' immediately before the final clause and preserves passive
    nuance.
- source_word: מִפְּנֵי מֶלֶךְ אַשּׁוּר
  chosen: from the king of Assyria
  alternatives:
  - from before the king of Assyria
  lexicon: HALOT
  rationale: מִפְּנֵי here idiomatically means 'from' in the sense of away from the
    threat/presence of.
- source_word: וְאֵיךְ נִמָּלֵט אֲנָחְנוּ
  chosen: And how shall we escape?
  alternatives:
  - And how can we escape?
  - So how will we escape?
  lexicon: HALOT
  rationale: Rhetorical question expressing hopelessness. 'Shall we escape' preserves
    the future nuance and solemn tone.
