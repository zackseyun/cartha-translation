id: ISA.20.1
reference: Isaiah 20:1
source:
  edition: WLC
  text: בִּ/שְׁנַ֨ת בֹּ֤א תַרְתָּן֙ אַשְׁדּ֔וֹדָ/ה בִּ/שְׁלֹ֣ח אֹת֔/וֹ סַֽרְג֖וֹן
    מֶ֣לֶךְ אַשּׁ֑וּר וַ/יִּלָּ֥חֶם בְּ/אַשְׁדּ֖וֹד וַֽ/יִּלְכְּדָֽ/הּ׃
translation:
  text: In the year that the Tartan came to Ashdod, when Sargon king of Assyria sent
    him, and he fought against Ashdod and captured it,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Tartan'' is likely an Assyrian official title, possibly equivalent to
      ''commander-in-chief,'' rather than a personal name.'
    reason: cultural_note
lexical_decisions:
- source_word: בִּ/שְׁנַת
  chosen: In the year that
  alternatives:
  - In the year when
  - In the year of
  lexicon: HALOT
  rationale: Temporal preposition ב plus שְׁנַת introduces a time clause. 'In the
    year that' is natural English and preserves the chronological framing.
- source_word: תַרְתָּן
  chosen: the Tartan
  alternatives:
  - Tartan
  - the commander-in-chief
  lexicon: HALOT
  rationale: This is best taken as an Assyrian title rather than a personal name.
    Rendering it with the article reflects the role-like force in context while preserving
    the conventional transliteration of the title.
- source_word: אַשְׁדּוֹדָ/ה
  chosen: to Ashdod
  alternatives:
  - toward Ashdod
  lexicon: HALOT
  rationale: The directional he indicates motion toward Ashdod. 'To Ashdod' is the
    most idiomatic English rendering.
- source_word: בִּ/שְׁלֹח אֹת/וֹ
  chosen: when Sargon king of Assyria sent him
  alternatives:
  - at the sending of him by Sargon king of Assyria
  - when he was sent by Sargon king of Assyria
  lexicon: HALOT
  rationale: 'The infinitive construct with ב marks contemporaneous circumstance:
    ''when ... sent him.'' Making Sargon the explicit subject in English clarifies
    the Hebrew syntax without adding content.'
- source_word: סַֽרְג֖וֹן
  chosen: Sargon
  lexicon: HALOT
  rationale: Standard English transliteration of the royal name.
- source_word: מֶ֣לֶךְ אַשּׁ֑וּר
  chosen: king of Assyria
  alternatives:
  - the king of Assyria
  lexicon: HALOT
  rationale: Construct chain identifying Sargon. The anarthrous English apposition
    'Sargon king of Assyria' is concise and natural.
- source_word: וַ/יִּלָּחֶם בְּ/אַשְׁדּוֹד
  chosen: and he fought against Ashdod
  alternatives:
  - and he made war against Ashdod
  - and he attacked Ashdod
  lexicon: HALOT
  rationale: לחם with ב commonly means to fight against. 'Fought against' is a clear,
    direct rendering that preserves the military sense without overinterpreting.
- source_word: וַֽ/יִּלְכְּדָֽ/הּ
  chosen: and captured it
  alternatives:
  - and took it
  - and seized it
  lexicon: HALOT
  rationale: לכד in military context means to capture a city. 'Captured it' is the
    most precise modern English equivalent, with the feminine suffix referring back
    to Ashdod.
