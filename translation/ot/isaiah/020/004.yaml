id: ISA.20.4
reference: Isaiah 20:4
source:
  edition: WLC
  text: כֵּ֣ן יִנְהַ֣ג מֶֽלֶךְ אַ֠שּׁוּר אֶת שְׁבִ֨י מִצְרַ֜יִם וְ/אֶת גָּל֥וּת כּ֛וּשׁ
    נְעָרִ֥ים וּ/זְקֵנִ֖ים עָר֣וֹם וְ/יָחֵ֑ף וַ/חֲשׂוּפַ֥י שֵׁ֖ת עֶרְוַ֥ת מִצְרָֽיִם־־־׃
translation:
  text: so the king of Assyria will lead away the captives of Egypt and the exiles
    of Cush, young and old, naked and barefoot, with buttocks uncovered—the nakedness
    of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with buttocks bared.' The Hebrew expression is deliberately graphic,
      portraying the humiliation of Egypt and Cush in exile.
    reason: lexical_alternative
  - marker: b
    text: Or 'Egypt's shame.' The Hebrew literally says 'the nakedness of Egypt,'
      preserving the imagery of public exposure and disgrace.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִנְהַג
  chosen: will lead away
  alternatives:
  - will drive
  - will conduct
  lexicon: HALOT
  rationale: The verb נהג commonly means to lead, drive, or conduct. In the context
    of deportation of captives, 'lead away' best captures both movement under compulsion
    and readable English.
- source_word: שְׁבִי
  chosen: captives
  alternatives:
  - captivity
  - prisoners of war
  lexicon: HALOT
  rationale: Although the noun can denote captivity as a state, with the direct object
    marker and parallel to 'exiles' it refers to the people taken captive. 'Captives'
    is the most natural rendering here.
- source_word: גָּלוּת
  chosen: exiles
  alternatives:
  - captivity
  - deportees
  lexicon: HALOT
  rationale: The term can denote exile or the exiled community. Here it parallels
    'captives' and refers to persons, so 'exiles' is preferable to the abstract 'captivity.'
- source_word: כּוּשׁ
  chosen: Cush
  alternatives:
  - Ethiopia
  lexicon: HALOT
  rationale: Following the translation philosophy to transliterate names rather than
    replace them with potentially misleading modern geopolitical labels, 'Cush' is
    retained rather than 'Ethiopia.'
- source_word: נְעָרִים וּזְקֵנִים
  chosen: young and old
  alternatives:
  - boys and old men
  - the young and the elderly
  lexicon: HALOT
  rationale: This idiomatic pair expresses the full age range of the deported population.
    'Young and old' is concise and natural, without over-specifying gender beyond
    what the Hebrew requires in context.
- source_word: עָרוֹם וְיָחֵף
  chosen: naked and barefoot
  alternatives:
  - stripped and barefoot
  - bare and barefoot
  lexicon: HALOT
  rationale: This reproduces the plain sense and echoes the sign-act language of the
    surrounding passage. 'Naked and barefoot' is the standard, transparent rendering.
- source_word: חֲשׂוּפַי שֵׁת
  chosen: with buttocks uncovered
  alternatives:
  - with buttocks bared
  - with exposed buttocks
  lexicon: HALOT
  rationale: The phrase is graphic and shame-oriented. שֵׁת refers to the buttocks/rear,
    and the passive participial form indicates exposure. 'With buttocks uncovered'
    is accurate, readable, and preserves the humiliation imagery.
- source_word: עֶרְוַת מִצְרָיִם
  chosen: the nakedness of Egypt
  alternatives:
  - Egypt's shame
  - the shame of Egypt
  lexicon: HALOT
  rationale: עֶרְוָה literally denotes nakedness, often with connotations of shame
    or exposure. Retaining 'nakedness' preserves the lexical link to the preceding
    imagery; the shame sense is implicit in context.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: This links the enacted sign to its fulfillment. 'So' is concise modern
    English and adequately carries the inferential force.
