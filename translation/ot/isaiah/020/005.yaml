id: ISA.20.5
reference: Isaiah 20:5
source:
  edition: WLC
  text: וְ/חַתּ֖וּ וָ/בֹ֑שׁוּ מִ/כּוּשׁ֙ מַבָּטָ֔/ם וּ/מִן מִצְרַ֖יִם תִּפְאַרְתָּֽ/ם־׃
translation:
  text: And they will be dismayed and ashamed because of Cush, their hope, and because
    of Egypt, their boast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Cush is the ancient region south of Egypt, often associated with Nubia;
      older English versions sometimes render it 'Ethiopia.'
    reason: cultural_note
  - marker: b
    text: Or 'their expectation' for 'their hope.'
    reason: lexical_alternative
  - marker: c
    text: Or 'their glory' for 'their boast.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחַתּוּ
  chosen: they will be dismayed
  alternatives:
  - they will be shattered
  - they will be terrified
  lexicon: HALOT
  rationale: From חתת in the Qal perfect with prefixed conjunction in prophetic sequence,
    expressing the future result. 'Be dismayed' fits the emotional collapse in context
    better than a more literal but less idiomatic 'be shattered.'
- source_word: וָבֹשׁוּ
  chosen: and ashamed
  alternatives:
  - and put to shame
  - and disappointed
  lexicon: HALOT
  rationale: From בושׁ, denoting shame or humiliation. 'Ashamed' is natural English
    and pairs well with 'dismayed'; 'put to shame' is possible but slightly more passive
    than the Hebrew here.
- source_word: מִכּוּשׁ
  chosen: because of Cush
  alternatives:
  - from Cush
  - concerning Cush
  - because of Ethiopia
  lexicon: HALOT
  rationale: 'The preposition מן here is causal in sense in parallel with the following
    phrase: their shame arises on account of Cush. ''Cush'' is preferred as a transliterated
    place-name rather than the traditional but potentially misleading ''Ethiopia.'''
- source_word: מַבָּטָם
  chosen: their hope
  alternatives:
  - their expectation
  - their object of trust
  - that to which they looked
  lexicon: HALOT
  rationale: From מַבָּט, literally 'looking' or 'that which is looked to'; in context
    it denotes the nation in which they placed expectation. 'Hope' is concise and
    idiomatic while preserving the sense of reliance.
- source_word: וּמִן מִצְרַיִם
  chosen: and because of Egypt
  alternatives:
  - and from Egypt
  - and concerning Egypt
  lexicon: HALOT
  rationale: As with the previous מן-phrase, the sense is causal rather than separative.
    The parallelism supports 'because of Egypt.'
- source_word: תִּפְאַרְתָּם
  chosen: their boast
  alternatives:
  - their glory
  - their pride
  lexicon: HALOT
  rationale: תפארת can mean 'beauty,' 'glory,' or 'boast.' Here it refers to Egypt
    as the object in which they gloried or boasted. 'Their boast' best captures the
    relational sense in context.
