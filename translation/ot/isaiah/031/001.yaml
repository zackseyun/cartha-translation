id: ISA.31.1
reference: Isaiah 31:1
source:
  edition: WLC
  text: ה֣וֹי הַ/יֹּרְדִ֤ים מִצְרַ֨יִם֙ לְ/עֶזְרָ֔ה עַל סוּסִ֖ים יִשָּׁעֵ֑נוּ וַ/יִּבְטְח֨וּ עַל רֶ֜כֶב כִּ֣י רָ֗ב וְ/עַ֤ל פָּֽרָשִׁים֙ כִּֽי עָצְמ֣וּ מְאֹ֔ד וְ/לֹ֤א שָׁעוּ֙ עַל קְד֣וֹשׁ יִשְׂרָאֵ֔ל וְ/אֶת יְהוָ֖ה לֹ֥א דָרָֽשׁוּ־־־־־׃
translation:
  text: Woe to those who go down to Egypt for help, who rely on horses and trust in chariots because they are many, and in horsemen because they are very strong, but do not look to the Holy One of Israel and do not seek Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lean on horses' for 'rely on horses'; the Hebrew verb pictures support sought from something one leans upon.
    reason: lexical_alternative
  - marker: b
    text: Or 'cavalry' for 'horsemen.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Prophetic interjection introducing denunciation/judgment. 'Woe' best preserves the oracular force in English.
- source_word: הַיֹּרְדִים
  chosen: those who go down
  alternatives:
  - those going down
  - those who descend
  lexicon: HALOT
  rationale: Participial form functions substantivally. 'Go down' preserves both the idiomatic movement to Egypt and the ongoing class of people addressed.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard place-name rendering.
- source_word: לְעֶזְרָה
  chosen: for help
  alternatives:
  - for assistance
  lexicon: HALOT
  rationale: Purpose/result nuance after motion verb; 'for help' is natural and direct.
- source_word: עַל סוּסִים יִשָּׁעֵנוּ
  chosen: who rely on horses
  alternatives:
  - who lean on horses
  - who depend on horses
  lexicon: HALOT
  rationale: The Niphal of שׁען conveys leaning/relying for support. 'Rely on' communicates figurative dependence clearly in modern English.
- source_word: וַיִּבְטְחוּ
  chosen: and trust
  alternatives:
  - and put their trust
  lexicon: HALOT
  rationale: בטח is a key trust verb; 'trust' is concise and idiomatic.
- source_word: עַל רֶכֶב
  chosen: in chariots
  alternatives:
  - on chariots
  - in chariotry
  lexicon: HALOT
  rationale: Although the preposition is literally 'on/upon,' English idiom with military equipment is better as 'trust in chariots.' Singular רכב is collective here, naturally rendered plural 'chariots'.
- source_word: כִּי רָב
  chosen: because they are many
  alternatives:
  - because it is abundant
  - for they are numerous
  lexicon: HALOT
  rationale: Refers to the abundance of Egypt's chariot force. Plural English matches the collective sense of רכב.
- source_word: וְעַל פָּרָשִׁים
  chosen: and in horsemen
  alternatives:
  - and in cavalry
  - and on horsemen
  lexicon: HALOT
  rationale: פָּרָשִׁים are mounted warriors. 'Horsemen' is transparent and preserves the concrete image better than the more interpretive 'cavalry'.
- source_word: כִּי עָצְמוּ מְאֹד
  chosen: because they are very strong
  alternatives:
  - because they are exceedingly mighty
  - because they are very numerous/powerful
  lexicon: HALOT
  rationale: עָצַם can denote strength/power and sometimes numerical might. In parallel with military assets, 'very strong' best captures martial power without over-specifying.
- source_word: וְלֹא שָׁעוּ אֶל/עַל קְדוֹשׁ יִשְׂרָאֵל
  chosen: but do not look to the Holy One of Israel
  alternatives:
  - but do not regard the Holy One of Israel
  - but do not turn their gaze to the Holy One of Israel
  lexicon: HALOT
  rationale: שׁעה here conveys looking with regard/attention. 'Look to' idiomatically expresses directed dependence and contrasts with reliance on Egypt.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  lexicon: HALOT
  rationale: Established Isaianic divine title; translated literally.
- source_word: וְאֶת יְהוָה לֹא דָרָשׁוּ
  chosen: and do not seek the LORD
  alternatives:
  - and have not sought the LORD
  - and do not inquire of the LORD
  lexicon: HALOT
  rationale: דרשׁ with God commonly means seeking him in dependence/worship. Present 'do not seek' fits the generic participial denunciation. YHWH follows doctrine default 'the LORD'.
