theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Temporal/aspectual smoothing from Hebrew forms into English
  chosen_reading: generic present forms ('go down,' 'rely,' 'trust,' 'do not look,' 'do not seek')
  alternative_readings:
  - past narrative-like sequence ('went down... relied... trusted... did not look... did not seek')
  rationale: The verse is a prophetic woe against a class of people characterized by these actions. English present tense better reflects the substantival participle and the gnomic force of the qatal/wayyiqtol sequence in this denunciatory context.
