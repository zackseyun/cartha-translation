id: ISA.31.3
reference: Isaiah 31:3
source:
  edition: WLC
  text: וּ/מִצְרַ֤יִם אָדָם֙ וְֽ/לֹא אֵ֔ל וְ/סוּסֵי/הֶ֥ם בָּשָׂ֖ר וְ/לֹא ר֑וּחַ וַֽ/יהוָ֞ה
    יַטֶּ֣ה יָד֗/וֹ וְ/כָשַׁ֤ל עוֹזֵר֙ וְ/נָפַ֣ל עָזֻ֔ר וְ/יַחְדָּ֖ו כֻּלָּ֥/ם יִכְלָיֽוּ/ן־־׃ס
translation:
  text: Egypt is man and not God, and their horses are flesh and not spirit. When
    the LORD stretches out his hand, the helper will stumble and the one helped will
    fall, and together all of them will come to an end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Egypt is human and not God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their horses are flesh and not spirit'; 'spirit' may also be understood
      more broadly as life-force or immaterial power, not necessarily a direct reference
      to the Holy Spirit.
    reason: lexical_alternative
  - marker: c
    text: Or 'all of them will perish' / 'all of them will be consumed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard rendering of the nation name; singular in form but representing
    the nation collectively.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - human
  lexicon: HALOT
  rationale: Here the contrast is between Egypt and God, emphasizing creaturely human
    status over against deity. 'Man' preserves the terseness and rhetorical force
    of the Hebrew and aligns with the doctrine note on אָדָם as 'man / humankind'
    by context.
- source_word: אֵל
  chosen: God
  alternatives:
  - god
  lexicon: HALOT
  rationale: In this contrastive statement, the reference is to true deity over against
    merely human Egypt, so capitalized 'God' is appropriate in English.
- source_word: סוּסֵיהֶם
  chosen: their horses
  lexicon: HALOT
  rationale: Direct, literal rendering of the construct with 3mp suffix.
- source_word: בָּשָׂר
  chosen: flesh
  alternatives:
  - mere flesh
  - mortal flesh
  lexicon: HALOT
  rationale: Literal 'flesh' best preserves the contrast with 'spirit' and the weakness/mortality
    implied, without over-interpreting.
- source_word: רוּחַ
  chosen: spirit
  alternatives:
  - breath
  - Spirit
  lexicon: HALOT
  rationale: Lowercase 'spirit' fits the human/creaturely contrast with 'flesh' and
    avoids importing a specific reference to the Holy Spirit that the text does not
    explicitly make.
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: יַטֶּה יָדוֹ
  chosen: stretches out his hand
  alternatives:
  - turns his hand
  - extends his hand
  lexicon: HALOT
  rationale: Idiomatic English for the Hebrew expression of decisive divine action
    or judgment. Present tense in English gives a vivid, proverbial force to the conditional-temporal
    clause.
- source_word: עוֹזֵר
  chosen: the helper
  alternatives:
  - helper
  - one who helps
  lexicon: HALOT
  rationale: Substantival participle referring here to Egypt as the assisting party;
    'the helper' preserves the role-based contrast with the next term.
- source_word: עָזֻר
  chosen: the one helped
  alternatives:
  - the helped one
  - the one who is helped
  lexicon: HALOT
  rationale: Passive participial form; this rendering clearly distinguishes the recipient
    of aid from the helper.
- source_word: כָּשַׁל
  chosen: will stumble
  alternatives:
  - will totter
  - will fail
  lexicon: HALOT
  rationale: '''Stumble'' preserves the concrete metaphor of collapse beginning.'
- source_word: נָפַל
  chosen: will fall
  alternatives:
  - will collapse
  lexicon: HALOT
  rationale: Natural and direct rendering, paired effectively with 'stumble'.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - all together
  lexicon: HALOT
  rationale: Maintains the emphasis that both parties share the same fate.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - they all
  lexicon: HALOT
  rationale: Explicitly renders the plural totality after 'together' for emphasis.
- source_word: יִכְלָיוּן
  chosen: will come to an end
  alternatives:
  - will perish
  - will be consumed
  lexicon: HALOT
  rationale: This rendering communicates total ruin in clear modern English without
    narrowing the image to death alone; it suits the collective downfall of both helper
    and helped.
