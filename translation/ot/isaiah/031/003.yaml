theological_decisions:
- issue: Whether רוּחַ should be rendered as 'Spirit' implying the Holy Spirit or
    as 'spirit' in contrast with flesh
  chosen_reading: spirit
  alternative_readings:
  - Spirit
  - breath
  rationale: The verse contrasts Egypt's horses as merely material and creaturely
    ('flesh') rather than possessing divine, life-giving, or transcendent power. Lowercase
    'spirit' preserves the contrast without importing a more developed pneumatological
    claim not explicit in the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
- issue: Rendering of אָדָם in the contrast 'Egypt is אדם and not God'
  chosen_reading: man
  alternative_readings:
  - human
  - humankind
  rationale: The singular predicate highlights Egypt's merely human status over against
    God. 'Man' is gender-accurate to the source and rhetorically sharp in English,
    while not suggesting maleness as the point of the contrast.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default
    ''man / humankind'' depending on context.'
