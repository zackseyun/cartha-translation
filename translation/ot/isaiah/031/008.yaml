id: ISA.31.8
reference: Isaiah 31:8
source:
  edition: WLC
  text: וְ/נָפַ֤ל אַשּׁוּר֙ בְּ/חֶ֣רֶב לֹא אִ֔ישׁ וְ/חֶ֥רֶב לֹֽא אָדָ֖ם תֹּֽאכֲלֶ֑/נּוּ
    וְ/נָ֥ס ל/וֹ֙ מִ/פְּנֵי חֶ֔רֶב וּ/בַחוּרָ֖י/ו לָ/מַ֥ס יִהְיֽוּ־־־׃
translation:
  text: And Assyria will fall by a sword not of man, and a sword not of humankind
    will devour him; and he will flee from before the sword, and his young men will
    become forced labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and a sword not of man.' The Hebrew contrasts אִישׁ ('man') and אָדָם
      ('humankind/man') in parallel.
    reason: lexical_alternative
  - marker: b
    text: That is, by a sword not wielded by human power; the text leaves the exact
      means of the LORD's judgment unspecified.
    reason: alternative_reading
  - marker: c
    text: Or 'his chosen men'; the Hebrew term can refer to young men in their prime,
      often in a military setting.
    reason: lexical_alternative
  - marker: d
    text: Or 'will be put to corvée/tribute labor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָפַל
  chosen: And ... will fall
  alternatives:
  - and ... shall fall
  - and ... has fallen
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse is naturally
    rendered as a future in English ('will fall'), reflecting the predictive force
    rather than a simple past.
- source_word: אַשּׁוּר
  chosen: Assyria
  alternatives:
  - Asshur
  lexicon: HALOT
  rationale: The proper noun here denotes the Assyrian power collectively; 'Assyria'
    is standard modern English and fits the national sense in context.
- source_word: בְּחֶרֶב
  chosen: by a sword
  alternatives:
  - with a sword
  lexicon: HALOT
  rationale: The preposition beth here marks instrumentality. 'By a sword' is idiomatic
    and preserves the instrumental sense.
- source_word: לֹא אִישׁ
  chosen: not of man
  alternatives:
  - not of a man
  - not by man
  lexicon: HALOT
  rationale: The phrase qualifies the sword as non-human in origin or agency. 'Not
    of man' preserves the terse Hebrew contrast and keeps the wording close to the
    source.
- source_word: וְחֶרֶב לֹא אָדָם
  chosen: and a sword not of humankind
  alternatives:
  - and a sword not of man
  - and no human sword
  lexicon: HALOT
  rationale: Because אִישׁ and אָדָם are juxtaposed, varying the English helps preserve
    the distinction. Following the doctrine note on אָדָם, 'humankind' fits the generic
    human sense here better than repeating 'man' identically.
- source_word: תֹּאכֲלֶנּוּ
  chosen: will devour him
  alternatives:
  - will consume him
  - will eat him
  lexicon: HALOT
  rationale: The feminine singular verb agrees with 'sword.' 'Devour' is a conventional
    and vivid English rendering for the metaphorical use of אכל with sword imagery,
    more natural than the overly literal 'eat him.'
- source_word: וְנָס לוֹ מִפְּנֵי חֶרֶב
  chosen: and he will flee from before the sword
  alternatives:
  - and he will flee from the sword
  - and it will flee before the sword
  lexicon: HALOT
  rationale: The subject is best taken as Assyria/its king in collective-singular
    continuation. 'From before the sword' preserves the Hebrew idiom מִפְּנֵי while
    remaining understandable.
- source_word: בַחוּרָיו
  chosen: his young men
  alternatives:
  - his chosen men
  - his warriors
  lexicon: HALOT
  rationale: בָּחוּר commonly denotes young men in their prime, often with military
    implication from context. 'Young men' keeps the lexical sense without importing
    'warriors' too strongly.
- source_word: לָמַס
  chosen: forced labor
  alternatives:
  - tribute labor
  - corvée
  - tribute
  lexicon: HALOT
  rationale: מַס often refers to compulsory labor or labor-tribute imposed by a conqueror.
    'Forced labor' is clear modern English and captures the coercive sense better
    than the less transparent 'corvée' or the narrower 'tribute'.
- source_word: יִהְיוּ
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: 'While היה can mean simply ''be,'' in this context ''become'' better
    conveys the resulting state after defeat: the young men come to be subjected to
    forced labor.'
