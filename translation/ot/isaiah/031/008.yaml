theological_decisions:
- issue: Nature of the defeating sword
  chosen_reading: a non-human sword/instrument of judgment
  alternative_readings:
  - a literal sword wielded by no human warrior
  - a metaphor for divine intervention such as plague or angelic judgment
  rationale: The Hebrew explicitly negates human agency twice ('not of man ... not
    of humankind') without specifying the exact means. The translation preserves that
    theological tension rather than resolving it into a single mechanism of judgment.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
