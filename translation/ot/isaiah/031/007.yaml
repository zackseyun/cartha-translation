theological_decisions:
- issue: Gendered distributive noun אִישׁ
  chosen_reading: each man
  alternative_readings:
  - each one
  - everyone
  rationale: The Hebrew uses masculine singular distributively. Following the stated
    gender-accurate policy, the translation keeps 'man' rather than flattening to
    a gender-neutral term, while the distributive sense is preserved with 'each.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Interpretation of חֵטְא at verse end
  chosen_reading: as sin
  alternative_readings:
  - for sin
  - a sin
  rationale: The verse condemns the idols as sinful products of human hands. 'As sin'
    preserves the terse force without importing sacrificial overtones that 'sin offering'
    could suggest elsewhere for חטא. The rendering avoids doctrinal overreach while
    keeping the prophetic denunciation sharp.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
