id: ISA.31.7
reference: Isaiah 31:7
source:
  edition: WLC
  text: כִּ֚י בַּ/יּ֣וֹם הַ/ה֔וּא יִמְאָס֗וּ/ן אִ֚ישׁ אֱלִילֵ֣י כַסְפּ֔/וֹ וֶ/אֱלִילֵ֖י
    זְהָב֑/וֹ אֲשֶׁ֨ר עָשׂ֥וּ לָ/כֶ֛ם יְדֵי/כֶ֖ם חֵֽטְא׃
translation:
  text: For on that day each man will reject his idols of silver and his idols of
    gold, which your hands have made for you as sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will cast away' or 'will despise.' The Hebrew verb can express strong
      rejection or contempt.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each man'; the singular is distributive, meaning each person individually.
    reason: lexical_alternative
  - marker: c
    text: Or 'which your own hands made for yourselves.'
    reason: lexical_alternative
  - marker: d
    text: 'The final Hebrew word is simply ''sin,'' likely functioning appositionally:
      the idols are treated as sinful things. Or ''for sin'' / ''a sin.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding warning/promise;
    'For' preserves the connective force naturally in English.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal expression in prophetic literature. 'On that day' is
    idiomatic modern English while retaining the prophetic-escalatory sense.
- source_word: יִמְאָסוּן
  chosen: will reject
  alternatives:
  - will cast away
  - will despise
  - will refuse
  lexicon: HALOT
  rationale: The verb מאס conveys rejection/disdain. 'Reject' best captures the volitional
    repudiation of idols here without over-specifying the physical action.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - every man
  lexicon: HALOT
  rationale: The singular distributive use after a plural verb indicates individual
    action by each person. Per gender-accurate policy, 'man' is retained rather than
    neutralized, while 'each' conveys the distributive sense.
- source_word: אֱלִילֵי
  chosen: idols
  alternatives:
  - worthless idols
  lexicon: HALOT
  rationale: אֱלִילִים often carries the nuance of worthlessness, but 'idols' is the
    clear core sense in context. The pejorative force is already implied by the prophetic
    denunciation.
- source_word: כַסְפּוֹ
  chosen: his silver
  alternatives:
  - his silver idols
  - his idols of silver
  lexicon: HALOT
  rationale: In construct with אֱלִילֵי, the phrase means 'idols of his silver' or
    idiomatically 'his idols of silver.' The full phrase is represented in the final
    English as 'his idols of silver' for clarity.
- source_word: וֶאֱלִילֵי זְהָבוֹ
  chosen: and his idols of gold
  alternatives:
  - and the idols of his gold
  lexicon: HALOT
  rationale: Mirrors the previous construct phrase and preserves the parallelism between
    silver and gold idols.
- source_word: אֲשֶׁר עָשׂוּ לָכֶם יְדֵיכֶם
  chosen: which your hands have made for you
  alternatives:
  - which your own hands made for yourselves
  - that your hands made for you
  lexicon: HALOT
  rationale: The relative clause points back to the idols and emphasizes human manufacture.
    'Your hands' preserves the concrete Hebrew idiom; 'for you' reflects לָכֶם without
    forcing a reflexive expansion into the main text.
- source_word: חֵטְא
  chosen: as sin
  alternatives:
  - for sin
  - a sin
  lexicon: HALOT
  rationale: The final accusative is terse and appositional/resultative. 'As sin'
    communicates that these handmade idols are characterized as sinful objects or
    embodiments of sin. This is more natural in English than the bare 'sin' while
    preserving the Hebrew's sharp condemnation.
