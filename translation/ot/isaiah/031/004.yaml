id: ISA.31.4
reference: Isaiah 31:4
source:
  edition: WLC
  text: כִּ֣י כֹ֣ה אָֽמַר יְהוָ֣ה אֵלַ֡/י כַּ/אֲשֶׁ֣ר יֶהְגֶּה֩ הָ/אַרְיֵ֨ה וְ/הַ/כְּפִ֜יר
    עַל טַרְפּ֗/וֹ אֲשֶׁ֨ר יִקָּרֵ֤א עָלָי/ו֙ מְלֹ֣א רֹעִ֔ים מִ/קּוֹלָ/ם֙ לֹ֣א יֵחָ֔ת
    וּ/מֵֽ/הֲמוֹנָ֖/ם לֹ֣א יַֽעֲנֶ֑ה כֵּ֗ן יֵרֵד֙ יְהוָ֣ה צְבָא֔וֹת לִ/צְבֹּ֥א עַל
    הַר צִיּ֖וֹן וְ/עַל גִּבְעָתָֽ/הּ־׀־־־־׃
translation:
  text: 'For thus the LORD said to me: As the lion or the young lion growls over its
    prey, and when a band of shepherds is called out against it, it is not terrified
    by their voice or cowed by their noise, so the LORD of hosts will come down to
    wage war on Mount Zion and on its hill.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lion and the young lion'; the Hebrew pairing may be read as a poetic
      doublet rather than a strict alternative.
    reason: lexical_alternative
  - marker: b
    text: Or 'nor does it answer to their noise'; the Hebrew verb can be understood
      more literally as 'answer/respond,' though in context it likely means being
      subdued or intimidated.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional English convention for YHWH.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - concerning me
  lexicon: HALOT
  rationale: 'In prophetic report formulae, אֶל + pronominal suffix naturally means
    direct address: ''said to me.'''
- source_word: יֶהְגֶּה
  chosen: growls
  alternatives:
  - growls low
  - moans
  - roars
  lexicon: HALOT
  rationale: The verb הגה here describes the low, intent sound of a lion over prey,
    not a full roar. 'Growls' best captures the predatory image in natural English.
- source_word: הָאַרְיֵה וְהַכְּפִיר
  chosen: the lion or the young lion
  alternatives:
  - the lion and the young lion
  - the lion, even the young lion
  lexicon: HALOT
  rationale: The pair likely functions appositionally or as a poetic pairing of mature/young
    predator. 'Or' gives idiomatic English for a representative comparison without
    implying two separate animals acting together.
- source_word: טַרְפּוֹ
  chosen: its prey
  alternatives:
  - his prey
  lexicon: HALOT
  rationale: Refers to the animal's torn catch. 'Its' is idiomatic for an animal in
    English.
- source_word: מְלֹא רֹעִים
  chosen: a band of shepherds
  alternatives:
  - a multitude of shepherds
  - the fullness of shepherds
  lexicon: HALOT
  rationale: מְלֹא literally denotes fullness/full number; in context it means a whole
    group assembled against the lion. 'A band of shepherds' is clear and natural.
- source_word: יִקָּרֵא עָלָיו
  chosen: is called out against it
  alternatives:
  - is summoned against it
  - is called together against it
  lexicon: HALOT
  rationale: 'The Niphal of קרא here is passive/reflexive: shepherds are summoned
    or called together against the lion. ''Called out against it'' preserves the adversative
    sense.'
- source_word: לֹא יֵחָת
  chosen: it is not terrified
  alternatives:
  - it is not dismayed
  - it is not shattered
  - it does not cower
  lexicon: HALOT
  rationale: חתת in the Niphal conveys being dismayed or terrified. 'Not terrified'
    fits the lion image and parallelism with the next clause.
- source_word: לֹא יַעֲנֶה
  chosen: or cowed by their noise
  alternatives:
  - nor does it answer to their noise
  - nor is it humbled by their noise
  - nor does it submit because of their noise
  lexicon: HALOT
  rationale: ענה has a debated sense here. In context, parallel to 'is not terrified,'
    it conveys being subdued, humbled, or intimidated rather than verbal response.
    'Cowed' captures the effect in idiomatic English.
- source_word: הֲמוֹנָם
  chosen: their noise
  alternatives:
  - their tumult
  - their uproar
  lexicon: HALOT
  rationale: Refers to the loud commotion of the shepherds. 'Noise' is accessible;
    the predatory scene supplies the force.
- source_word: יֵרֵד
  chosen: will come down
  alternatives:
  - will descend
  lexicon: HALOT
  rationale: Standard rendering of ירד; also preserves the imagery of divine intervention
    from above.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD of armies
  lexicon: HALOT
  rationale: Traditional but still transparent rendering of the title, preserving
    its martial force in context.
- source_word: לִצְבֹּא
  chosen: to wage war
  alternatives:
  - to fight
  - to do battle
  - to serve in battle
  lexicon: HALOT
  rationale: From צבא in a military sense. Here YHWH descends in martial defense of
    Zion; 'to wage war' makes the military nuance explicit and fits the context.
- source_word: גִּבְעָתָהּ
  chosen: its hill
  alternatives:
  - her hill
  lexicon: HALOT
  rationale: The suffix refers back to Zion, grammatically feminine in Hebrew. English
    commonly uses 'its' for a city/topographical referent unless personification is
    foregrounded.
