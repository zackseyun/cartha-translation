theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of לֹא יַעֲנֶה in the lion simile
  chosen_reading: the lion is not cowed by the shepherds' noise
  alternative_readings:
  - the lion does not answer their noise
  - the lion is not humbled by their noise
  rationale: The immediate parallel with לֹא יֵחָת favors a semantic field of intimidation/subdual
    rather than verbal response. This avoids importing a theological interpretation
    and follows the poetic logic of the simile.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve tension rather
    than resolve it'
