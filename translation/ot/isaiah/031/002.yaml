theological_decisions:
- issue: Rendering רָע with reference to divine action
  chosen_reading: disaster
  alternative_readings:
  - evil
  - calamity
  rationale: To preserve the prophetic sense of judicial calamity without suggesting
    that God performs moral evil. This reflects contextual semantics rather than doctrinal
    softening.
  doctrine_reference: Translation philosophy §1, §3
- issue: Subject reference of the pronoun 'he'
  chosen_reading: the LORD
  alternative_readings:
  - an unspecified wise agent
  rationale: In context the pronoun refers to the LORD, contrasting his true wisdom
    and judgment with Judah's reliance on Egypt. The English keeps the pronoun because
    the antecedent is contextually clear.
