id: ISA.31.2
reference: Isaiah 31:2
source:
  edition: WLC
  text: וְ/גַם ה֤וּא חָכָם֙ וַ/יָּ֣בֵא רָ֔ע וְ/אֶת דְּבָרָ֖י/ו לֹ֣א הֵסִ֑יר וְ/קָם֙
    עַל בֵּ֣ית מְרֵעִ֔ים וְ/עַל עֶזְרַ֖ת פֹּ֥עֲלֵי אָֽוֶן־־־־׃
translation:
  text: Yet he too is wise and brings disaster; he does not take back his words, but
    rises against the house of evildoers and against the help of workers of iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brings calamity'; Hebrew 'brings evil/disaster,' with 'evil' here meaning
      judgment or calamity rather than moral evil.
    reason: lexical_alternative
  - marker: b
    text: Or 'does not withdraw his words.'
    reason: lexical_alternative
  - marker: c
    text: Or 'against the assistance of workers of iniquity.' The Hebrew uses an abstract
      noun, 'help,' not the personal noun 'helpers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: Yet
  alternatives:
  - And also
  - Moreover
  lexicon: HALOT
  rationale: 'Introduces a contrastive/additive point in context. ''Yet'' captures
    the ironic force: despite Judah''s appeal to Egypt''s supposed wisdom, the LORD
    also is wise.'
- source_word: הוּא
  chosen: he too
  alternatives:
  - he
  - he also
  lexicon: HALOT
  rationale: The pronoun is explicit and emphatic; 'too' preserves the comparative
    emphasis with Egypt's claimed wisdom in the surrounding context.
- source_word: חָכָם
  chosen: wise
  alternatives:
  - skillful
  lexicon: HALOT
  rationale: 'Standard adjectival sense. Here it carries ironic and judicial force:
    the LORD''s wisdom is real and effective, unlike human political calculation.'
- source_word: וַיָּבֵא רָע
  chosen: brings disaster
  alternatives:
  - brings evil
  - has brought calamity
  lexicon: HALOT
  rationale: רָע in prophetic judgment contexts commonly denotes calamity/disaster
    rather than moral evil. 'Brings disaster' avoids implying that God commits moral
    evil while preserving the active causation in the Hebrew.
- source_word: דְּבָרָיו
  chosen: his words
  alternatives:
  - his word
  - what he has said
  lexicon: HALOT
  rationale: Plural form with 3ms suffix. 'His words' is formally closer, while still
    natural in English.
- source_word: לֹא הֵסִיר
  chosen: does not take back
  alternatives:
  - does not remove
  - does not withdraw
  - does not revoke
  lexicon: HALOT
  rationale: The idiom refers to not withdrawing what has been spoken. 'Take back'
    is idiomatic modern English and fits the object 'his words.'
- source_word: וְקָם עַל
  chosen: but rises against
  alternatives:
  - and rises against
  - stands up against
  lexicon: HALOT
  rationale: Qal of קום with עַל conveys hostile action or intervention against. 'But'
    reflects the adversative progression in English style, though the Hebrew conjunction
    is simple waw.
- source_word: בֵּית מְרֵעִים
  chosen: the house of evildoers
  alternatives:
  - the house of those who do evil
  - the household of evildoers
  lexicon: HALOT
  rationale: בֵּית can denote house/household. 'House of evildoers' preserves the
    Hebrew construct and may refer collectively to the camp or polity of those acting
    wickedly.
- source_word: עֶזְרַת
  chosen: the help
  alternatives:
  - the helpers
  - the assistance
  lexicon: HALOT
  rationale: The noun is abstract ('help, assistance'), not the personal noun 'helpers.'
    Rendering it as 'the help' preserves the Hebrew form and likely refers to the
    support supplied by Egypt.
- source_word: פֹּעֲלֵי אָוֶן
  chosen: workers of iniquity
  alternatives:
  - doers of wickedness
  - workers of evil
  - evildoers
  lexicon: HALOT
  rationale: A common Hebrew expression for those who practice wickedness. 'Workers
    of iniquity' preserves the verbal imagery and the weight of אָוֶן.
- source_word: אָוֶן
  chosen: iniquity
  alternatives:
  - wickedness
  - trouble
  - evil
  lexicon: HALOT
  rationale: אָוֶן can denote wickedness, trouble, or deceitful wrongdoing. 'Iniquity'
    best fits the moral context here and distinguishes it from רָע earlier in the
    verse.
