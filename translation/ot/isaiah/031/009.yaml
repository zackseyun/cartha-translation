theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretation of the final fire/furnace imagery
  chosen_reading: Retain the imagery as a description of the LORD's presence and judgment
    centered in Zion/Jerusalem without over-specifying sacrificial or eschatological
    meaning.
  alternative_readings:
  - Explicitly interpret as altar fire
  - Explicitly interpret as eschatological judgment
  rationale: The Hebrew presents vivid metaphorical imagery but does not force a single
    theological explanation. Preserving the image maintains theological tension rather
    than resolving it beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
