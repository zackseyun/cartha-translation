id: ISA.31.9
reference: Isaiah 31:9
source:
  edition: WLC
  text: וְ/סַלְע/וֹ֙ מִ/מָּג֣וֹר יַֽעֲב֔וֹר וְ/חַתּ֥וּ מִ/נֵּ֖ס שָׂרָ֑י/ו נְאֻם יְהוָ֗ה
    אֲשֶׁר א֥וּר ל/וֹ֙ בְּ/צִיּ֔וֹן וְ/תַנּ֥וּר ל֖/וֹ בִּ/ירוּשָׁלִָֽם־־׃ס
translation:
  text: His rock will pass away because of terror, and his princes will be terrified
    at the signal, declares the LORD, whose fire is in Zion and whose furnace is in
    Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his stronghold will pass away in terror.' The Hebrew 'rock' may be a
      metaphor for Assyria's refuge or ruler.
    reason: lexical_alternative
  - marker: b
    text: Or 'his princes will be dismayed at the banner/standard.'
    reason: alternative_reading
  - marker: c
    text: The imagery of the LORD's 'fire' and 'furnace' in Zion and Jerusalem likely
      evokes his consuming presence in judgment, though the text does not specify
      the image more narrowly.
    reason: cultural_note
lexical_decisions:
- source_word: וְסַלְעוֹ
  chosen: his rock
  alternatives:
  - his crag
  - his stronghold
  lexicon: HALOT
  rationale: סֶלַע literally denotes a rock/crag. In context it likely functions metaphorically
    for Assyria's strong refuge or king, but the Hebrew image is retained in the main
    text as 'his rock' to preserve the metaphor and avoid over-interpreting.
- source_word: מִמָּגוֹר
  chosen: because of terror
  alternatives:
  - from terror
  - in terror
  lexicon: HALOT
  rationale: 'The preposition מִן with מָגוֹר can indicate cause or source. ''Because
    of terror'' gives the likely sense in idiomatic English: the rock/stronghold collapses
    or passes away due to panic.'
- source_word: יַעֲבוֹר
  chosen: will pass away
  alternatives:
  - will pass over
  - will disappear
  lexicon: HALOT
  rationale: עבר commonly means 'pass over/by,' but in this context of collapse before
    divine judgment, 'pass away' best captures the sense of vanishing or being removed.
- source_word: וְחַתּוּ
  chosen: will be terrified
  alternatives:
  - will be shattered
  - will be dismayed
  lexicon: HALOT
  rationale: חתת in the Qal can express being shattered or dismayed. With human subjects
    ('his princes'), the experiential sense 'will be terrified' fits the parallel
    with terror and the military context.
- source_word: מִנֵּס
  chosen: at the signal
  alternatives:
  - from the banner
  - at the banner
  - because of the standard
  lexicon: HALOT
  rationale: נֵס often means a signal-pole, standard, or banner. Here the sense is
    likely the sight of the battle signal or rallying standard that causes panic.
    'At the signal' communicates the function in natural English while staying close
    to the Hebrew image.
- source_word: שָׂרָיו
  chosen: his princes
  alternatives:
  - his commanders
  - his officials
  lexicon: HALOT
  rationale: שַׂר can denote prince, ruler, or military commander. 'Princes' is the
    broad and traditional rendering; the military nuance is already suggested by the
    context.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is idiomatically rendered 'declares the LORD.'
    Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: אֲשֶׁר אוּר לוֹ בְצִיּוֹן
  chosen: whose fire is in Zion
  alternatives:
  - who has a fire in Zion
  - whose light is in Zion
  lexicon: HALOT
  rationale: אוּר here is best taken as 'fire,' not 'light,' especially in parallel
    with 'furnace.' The pronoun לוֹ is rendered possessively in English ('whose')
    for natural style and to preserve the image of YHWH's consuming/judging presence
    centered in Zion.
- source_word: וְתַנּוּר לוֹ בִּירוּשָׁלִָם
  chosen: and whose furnace is in Jerusalem
  alternatives:
  - and an oven belongs to him in Jerusalem
  - and whose oven is in Jerusalem
  lexicon: HALOT
  rationale: תַּנּוּר denotes an oven or furnace. In parallel with 'fire,' 'furnace'
    better conveys the intensity and likely judgment imagery. The possessive rendering
    of לוֹ is idiomatic in English.
