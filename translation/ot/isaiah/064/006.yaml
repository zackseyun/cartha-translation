id: ISA.64.6
reference: Isaiah 64:6
source:
  edition: WLC
  text: וְ/אֵין קוֹרֵ֣א בְ/שִׁמְ/ךָ֔ מִתְעוֹרֵ֖ר לְ/הַחֲזִ֣יק בָּ֑/ךְ כִּֽי הִסְתַּ֤רְתָּ
    פָנֶ֨י/ךָ֙ מִמֶּ֔/נּוּ וַ/תְּמוּגֵ֖/נוּ בְּ/יַד עֲוֺנֵֽ/נוּ־־־׃
translation:
  text: And there is no one who calls on your name, who stirs himself up to take hold
    of you; for you have hidden your face from us and have given us over into the
    hand of our iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and have melted us in the hand of our iniquity.' The
      Hebrew verb carries imagery of dissolving or wasting away.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵין
  chosen: And there is no one
  alternatives:
  - and there is none
  - yet no one
  lexicon: HALOT
  rationale: Combines the conjunction and existential negation naturally in English
    while preserving the force of total absence.
- source_word: קוֹרֵא בְשִׁמְךָ
  chosen: who calls on your name
  alternatives:
  - who calls on you by name
  - who invokes your name
  lexicon: HALOT
  rationale: The idiom 'call on your name' is standard biblical language for invocation/prayer
    and should be preserved rather than flattened.
- source_word: מִתְעוֹרֵר
  chosen: who stirs himself up
  alternatives:
  - who rouses himself
  - who awakens himself
  lexicon: HALOT
  rationale: 'The reflexive nuance of the Hitpael is significant: the person actively
    rouses himself toward God. ''Stirs himself up'' is idiomatic and retains the reflexive
    force.'
- source_word: לְהַחֲזִיק בָּךְ
  chosen: to take hold of you
  alternatives:
  - to grasp you
  - to hold fast to you
  lexicon: HALOT
  rationale: חזק with ב can denote seizing or holding fast. 'Take hold of you' preserves
    the vivid metaphor and works well with the preceding reflexive awakening.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding condition. 'For' is concise and
    natural in English.
- source_word: הִסְתַּרְתָּ פָנֶיךָ
  chosen: you have hidden your face
  alternatives:
  - you hid your face
  - you have concealed your face
  lexicon: HALOT
  rationale: A common Hebrew idiom for divine withdrawal or disfavor. Preserving 'face'
    maintains the theological and literary imagery.
- source_word: מִמֶּנּוּ
  chosen: from us
  alternatives:
  - away from us
  lexicon: HALOT
  rationale: The pronominal suffix is first person plural; 'from us' is the direct
    and natural rendering.
- source_word: וַתְּמוּגֵנוּ
  chosen: have given us over
  alternatives:
  - have melted us
  - have made us waste away
  - have dissolved us
  lexicon: HALOT
  rationale: The verb מוג literally involves melting/dissolving, but in this context
    with 'into the hand of our iniquity' the sense is that God has let the people
    collapse under or be handed over to the power of their sin. 'Given us over' best
    captures the contextual force in readable English, while the more literal imagery
    is preserved in a footnote.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - by the hand of
  - under the power of
  lexicon: HALOT
  rationale: The idiom denotes being delivered into the control or power of something.
    'Into the hand of' preserves the Hebrew image while remaining intelligible.
- source_word: עֲוֺנֵנוּ
  chosen: our iniquity
  alternatives:
  - our guilt
  - our sin
  lexicon: HALOT
  rationale: עון can denote iniquity, guilt, or the consequences of guilt. 'Iniquity'
    preserves the moral weight and matches the singular collective sense here.
