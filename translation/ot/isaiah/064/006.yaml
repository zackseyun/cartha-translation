theological_decisions:
- issue: Rendering the final clause with divine agency and human sin
  chosen_reading: God is described as giving the people over into the power of their
    own iniquity, without specifying a deterministic metaphysical mechanism.
  alternative_readings:
  - God caused them to melt away because of their sins
  - God abandoned them to the consequences of guilt
  rationale: The Hebrew imagery is strong and can be rendered woodenly as 'melted
    us.' In context, however, the clause expresses judicial abandonment under sin's
    power after God hides his face. The translation preserves divine judgment and
    human culpability without importing a sectarian doctrine of causation.
  doctrine_reference: Preserve theological tension rather than resolve it.
