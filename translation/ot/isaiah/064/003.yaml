theological_decisions:
- issue: Whether the verse states absolute incomparability of God or merely unprecedented
    divine action
  chosen_reading: The translation preserves both by rendering 'no eye has seen a God
    besides you, who acts for the one who waits for him,' attaching the relative clause
    to 'God besides you.'
  alternative_readings:
  - '''No one has heard... what he will do for the one who waits for him'''
  - '''No eye has seen, O God, besides you, one who acts for the one who waits for
    him'''
  rationale: The Hebrew syntax is compressed and allows different construals, reflected
    in ancient and modern translations and echoed in later citation traditions. The
    chosen reading follows the plain Masoretic sequence most closely while preserving
    the theological claim of God's uniqueness and his action for those who wait for
    him, without importing more than the text warrants.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather
    than resolve it'
