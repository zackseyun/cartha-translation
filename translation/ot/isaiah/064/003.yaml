id: ISA.64.3
reference: Isaiah 64:3
source:
  edition: WLC
  text: וּ/מֵ/עוֹלָ֥ם לֹא שָׁמְע֖וּ לֹ֣א הֶאֱזִ֑ינוּ עַ֣יִן לֹֽא רָאָ֗תָה אֱלֹהִים֙
    זוּלָ֣תְ/ךָ֔ יַעֲשֶׂ֖ה לִ/מְחַכֵּה לֽ/וֹ־־־׃
translation:
  text: From of old no one has heard, no ear has listened, no eye has seen a God besides
    you, who acts for the one who waits for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'From ancient times no one has heard, no ear has perceived, no eye has
      seen any god except you, who works for those who wait for him.' The Hebrew syntax
      is compressed and allows several closely related renderings.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמֵעוֹלָם
  chosen: From of old
  alternatives:
  - From ancient times
  - Never before
  lexicon: HALOT
  rationale: The preposition plus עוֹלָם marks time extending back into the distant
    past. 'From of old' preserves the temporal sense without over-paraphrasing. 'Never
    before' is possible idiomatically but interprets more freely.
- source_word: שָׁמְעוּ
  chosen: has heard
  alternatives:
  - have heard
  lexicon: HALOT
  rationale: Rendered with English singular 'no one has heard' to match idiomatic
    negated indefinite sense, though the Hebrew verb is 3cp. This preserves meaning
    naturally in English.
- source_word: הֶאֱזִינוּ
  chosen: has listened
  alternatives:
  - has given ear
  - has perceived
  lexicon: HALOT
  rationale: The Hiphil of אזן conveys attentive hearing. 'Has listened' is clear
    modern English and preserves the intensification beyond mere hearing. 'Given ear'
    is more literal but less natural.
- source_word: עַיִן לֹא רָאָתָה
  chosen: no eye has seen
  alternatives:
  - eye has not seen
  lexicon: HALOT
  rationale: A straightforward formal rendering of the singular collective expression.
    'No eye has seen' is idiomatic and preserves the poetic parallelism.
- source_word: אֱלֹהִים זוּלָתְךָ
  chosen: a God besides you
  alternatives:
  - God besides you
  - any god except you
  lexicon: HALOT
  rationale: 'The phrase expresses exclusivity: no deity other than the addressed
    God. Using ''a God besides you'' fits the syntax after ''seen'' and avoids implying
    a proper name where the Hebrew uses the common noun. Capitalized ''God'' is retained
    because the referent is the true God in contrast to any supposed rival.'
- source_word: יַעֲשֶׂה
  chosen: who acts
  alternatives:
  - who works
  - who does
  lexicon: HALOT
  rationale: The verb עשה is broad, but here in context of divine intervention 'acts'
    is natural and suitably weighty. 'Works' is possible and reflected in some traditions,
    but 'acts' reads more clearly in contemporary English.
- source_word: לִמְחַכֵּה לוֹ
  chosen: for the one who waits for him
  alternatives:
  - for those who wait for him
  - for him who waits for him
  lexicon: HALOT
  rationale: 'The participle is singular masculine, best rendered generically as ''the
    one who waits for him'' in keeping with gender-accurate policy. The preposition
    ל marks benefit: God acts on behalf of the one waiting for him. Pluralizing to
    ''those'' would smooth the English but lose the singular form.'
