id: ISA.64.8
reference: Isaiah 64:8
source:
  edition: WLC
  text: אַל תִּקְצֹ֤ף יְהוָה֙ עַד מְאֹ֔ד וְ/אַל לָ/עַ֖ד תִּזְכֹּ֣ר עָוֺ֑ן הֵ֥ן הַבֶּט נָ֖א עַמְּ/ךָ֥ כֻלָּֽ/נוּ־־־־׃
translation:
  text: 'Do not be exceedingly angry, O Yahweh, and do not remember iniquity forever. Look, please: we are all your people.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not remember guilt forever'; Hebrew עָוֹן can denote both wrongdoing and the guilt that results from it.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּקְצֹף
  chosen: Do not be ... angry
  alternatives:
  - Do not be wrathful
  - Do not be enraged
  lexicon: HALOT
  rationale: קצף in the Qal commonly denotes being angry or wrathful. 'Be angry' is natural modern English and preserves the petitionary force of אַל with the imperfect/jussive nuance.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַד מְאֹד
  chosen: exceedingly
  alternatives:
  - very much
  - too greatly
  lexicon: HALOT
  rationale: 'The combination intensifies the prohibition: not merely ''do not be angry'' but ''do not be angry to an extreme degree.'' ''Exceedingly'' captures the adverbial force compactly.'
- source_word: וְאַל לָעַד תִּזְכֹּר עָוֹן
  chosen: and do not remember iniquity forever
  alternatives:
  - and do not remember guilt forever
  - and do not keep in mind sin forever
  lexicon: HALOT
  rationale: זכר with עון here means to keep guilt in remembrance for judgment. 'Remember iniquity forever' is a close, idiomatic rendering that preserves the covenant-judicial sense. 'Iniquity' is retained rather than flattened to 'wrong' because עון often carries the sense of guilt/culpability as well as wrongdoing.
- source_word: עָוֹן
  chosen: iniquity
  alternatives:
  - guilt
  - sin
  lexicon: HALOT
  rationale: עון is semantically rich, referring to iniquity and often the guilt resulting from it. 'Iniquity' preserves that moral-theological weight better than the broader 'sin,' while 'guilt' is a viable contextual alternative.
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הן is a deictic/interjection drawing attention. 'Look' is readable modern English and preserves the urgent appeal better than the more archaic 'Behold.'
- source_word: הַבֶּט נָא
  chosen: please
  alternatives:
  - please look
  - look now
  lexicon: HALOT
  rationale: The imperative הבט means 'look,' and נא adds entreaty ('please'). In English the deictic הן already supplies 'Look,' so rendering נא as 'please' after a colon preserves both elements without awkward repetition.
- source_word: עַמְּךָ כֻלָּנוּ
  chosen: we are all your people
  alternatives:
  - all of us are your people
  - we all are your people
  lexicon: HALOT
  rationale: 'The Hebrew is verbless: ''your people, all of us.'' Supplying ''are'' is required in English. Fronting ''we are all your people'' communicates the collective covenant appeal naturally and faithfully.'
