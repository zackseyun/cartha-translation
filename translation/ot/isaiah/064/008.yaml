theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of עָוֹן in a penitential prayer
  chosen_reading: iniquity
  alternative_readings:
  - guilt
  - sin
  rationale: The verse asks God not to hold the people's moral culpability against them perpetually. 'Iniquity' preserves both wrongdoing and its culpable weight without over-interpreting atonement theology.
