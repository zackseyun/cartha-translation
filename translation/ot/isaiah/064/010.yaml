id: ISA.64.10
reference: Isaiah 64:10
source:
  edition: WLC
  text: בֵּ֧ית קָדְשֵׁ֣/נוּ וְ/תִפְאַרְתֵּ֗/נוּ אֲשֶׁ֤ר הִֽלְל֨וּ/ךָ֙ אֲבֹתֵ֔י/נוּ
    הָיָ֖ה לִ/שְׂרֵ֣פַת אֵ֑שׁ וְ/כָל מַחֲמַדֵּ֖י/נוּ הָיָ֥ה לְ/חָרְבָּֽה־׃
translation:
  text: Our holy and beautiful house, where our fathers praised you, has become a
    burning of fire, and all our precious things have become a ruin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'has been burned with fire.'
    reason: lexical_alternative
  - marker: b
    text: '''Our fathers'' may also be rendered ''our ancestors,'' but the Hebrew
      is explicitly ''fathers.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית קָדְשֵׁנוּ וְתִפְאַרְתֵּנוּ
  chosen: our holy and beautiful house
  alternatives:
  - our holy and glorious house
  - the house of our holiness and our beauty/glory
  lexicon: HALOT
  rationale: The construct chain literally reads 'house of our holiness and our beauty/glory.'
    In idiomatic English, 'our holy and beautiful house' best preserves both attributes
    while remaining natural. 'Beautiful' is preferred over 'glorious' here because
    the phrase describes the temple as cherished and splendid in appearance, though
    'glorious' remains possible.
- source_word: אֲשֶׁר הִלְלוּךָ אֲבֹתֵינוּ
  chosen: where our fathers praised you
  alternatives:
  - in which our fathers praised you
  - where our ancestors praised you
  lexicon: HALOT
  rationale: אֲשֶׁר introduces the relative clause referring back to the house. 'Where'
    is a natural English rendering for a locative relative clause. 'Fathers' is retained
    rather than 'ancestors' to match the Hebrew more closely and to follow the gender-accurate
    principle where the source is masculine.
- source_word: הִלְלוּךָ
  chosen: praised you
  alternatives:
  - celebrated you
  lexicon: HALOT
  rationale: From הלל in the piel, the standard sense is 'praise.' This is the most
    direct and contextually fitting rendering for worship offered in the temple.
- source_word: הָיָה לִשְׂרֵפַת אֵשׁ
  chosen: has become a burning of fire
  alternatives:
  - has become burned with fire
  - has become a place burned by fire
  - has been burned with fire
  lexicon: HALOT
  rationale: The Hebrew is literally 'has become to a burning of fire.' Rather than
    smoothing it fully to a passive, this rendering preserves the noun-based expression
    and the force of devastation. The phrase is somewhat stark in Hebrew, and the
    English keeps some of that weight. A more idiomatic alternative is preserved in
    the footnote.
- source_word: מַחֲמַדֵּינוּ
  chosen: our precious things
  alternatives:
  - our pleasant things
  - our treasured things
  - all that we treasured
  lexicon: HALOT
  rationale: The noun denotes desirable, precious, or treasured objects. 'Precious
    things' captures both value and affection without over-specifying whether the
    referents are temple furnishings, beloved places, or treasured possessions.
- source_word: לְחָרְבָּה
  chosen: a ruin
  alternatives:
  - desolation
  - waste
  lexicon: HALOT
  rationale: The term denotes devastation or desolation. 'A ruin' is clear modern
    English and fits the singular predicate after 'has become.' 'Desolation' is possible
    but slightly less concrete in English.
