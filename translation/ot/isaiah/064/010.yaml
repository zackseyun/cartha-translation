theological_decisions:
- issue: Reference of 'our holy and beautiful house'
  chosen_reading: The phrase refers primarily to the temple in Jerusalem.
  alternative_readings:
  - A broader reference including Jerusalem or the land's sacred places
  rationale: The immediate language of a house where the fathers praised God strongly
    points to the temple. The broader lament context includes Zion and Jerusalem,
    but this verse most directly names the sanctuary itself.
- issue: Rendering of אֲבֹתֵינוּ
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The Hebrew is explicitly masculine plural with covenant-historical force.
    Per the translation philosophy's gender-accurate principle, the main text keeps
    'fathers,' while a more inclusive alternative is preserved in a footnote as a
    lexical option rather than replacing the source-shaped wording.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
