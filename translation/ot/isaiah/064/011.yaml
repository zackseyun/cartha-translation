  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse is a lament addressed directly to Israel's covenant God. Following
    the project's stated policy, the Tetragrammaton is rendered 'the LORD' rather
    than transliterated.
