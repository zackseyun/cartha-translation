id: ISA.64.11
reference: Isaiah 64:11
source:
  edition: WLC
  text: הַ/עַל אֵ֥לֶּה תִתְאַפַּ֖ק יְהוָ֑ה תֶּחֱשֶׁ֥ה וּ/תְעַנֵּ֖/נוּ עַד מְאֹֽד־־׃ס
translation:
  text: Will you restrain yourself over these things, O Yahweh? Will you keep silent and afflict us so very severely?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Will you hold yourself back because of these things, O LORD?'
    reason: lexical_alternative
  - marker: b
    text: Or 'and humble us exceedingly.' The Hebrew verb can carry the sense of afflicting or humbling.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ/עַל
  chosen: Will ... over
  alternatives:
  - Because of
  - Concerning
  - At
  lexicon: HALOT
  rationale: The interrogative הַ with עַל introduces a rhetorical question, literally 'Will [it be] over/upon these things...?' In English, 'over these things' best preserves the sense of occasion or basis for the divine response without awkwardness.
- source_word: אֵלֶּה
  chosen: these things
  alternatives:
  - these
  - such things
  lexicon: HALOT
  rationale: The demonstrative is plural and refers back to the devastation just described. 'These things' makes the referent explicit in natural English.
- source_word: תִתְאַפַּק
  chosen: restrain yourself
  alternatives:
  - hold yourself back
  - contain yourself
  - forbear
  lexicon: HALOT
  rationale: The Hitpael of אפק conveys self-restraint or holding oneself in. In context, the speaker asks whether the LORD will continue to hold back action or compassion. 'Restrain yourself' is clear modern English and preserves the reflexive nuance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  - LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תֶּחֱשֶׁה
  chosen: keep silent
  alternatives:
  - be silent
  - remain silent
  lexicon: HALOT
  rationale: From חרשׁ, 'to be silent.' 'Keep silent' fits the future/rhetorical force and pairs naturally with the following verb.
- source_word: וּ/תְעַנֵּ/נוּ
  chosen: and afflict us
  alternatives:
  - and humble us
  - and oppress us
  - and answer us
  lexicon: HALOT
  rationale: From ענה II/III in the Piel, the likely sense here is 'afflict/humble.' In this lament context, 'afflict us' best matches the complaint of severe ongoing suffering. 'Answer us' would derive from a different root and does not fit the parallelism with silence and severity.
- source_word: עַד מְאֹד
  chosen: so very severely
  alternatives:
  - exceedingly
  - to the utmost
  - very much
  lexicon: HALOT
  rationale: The idiom intensifies the degree of affliction. 'So very severely' communicates the adverbial force in idiomatic modern English while making explicit that the intensity modifies the affliction.
