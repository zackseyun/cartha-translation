theological_decisions:
- issue: Interpretation of the final clause וְנִוָּשֵׁעַ
  chosen_reading: 'rendered as a rhetorical question: ''and shall we be saved?'''
  alternative_readings:
  - 'render as statement: ''and we shall be saved'''
  - render with different construal of the preceding clause, e.g. 'in them is continuance,
    and we shall be saved'
  rationale: The Hebrew of Isaiah 64:4 is notoriously difficult. To preserve the lament's
    tension and avoid importing unwarranted assurance, the main text takes the final
    verb as a rhetorical question. This best reflects the broken syntax and penitential
    context while acknowledging that a declarative reading is possible.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
