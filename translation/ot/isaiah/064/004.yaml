id: ISA.64.4
reference: Isaiah 64:4
source:
  edition: WLC
  text: פָּגַ֤עְתָּ אֶת שָׂשׂ֙ וְ/עֹ֣שֵׂה צֶ֔דֶק בִּ/דְרָכֶ֖י/ךָ יִזְכְּר֑וּ/ךָ הֵן
    אַתָּ֤ה קָצַ֨פְתָּ֙ וַֽ/נֶּחֱטָ֔א בָּ/הֶ֥ם עוֹלָ֖ם וְ/נִוָּשֵֽׁעַ־־׃
translation:
  text: You meet the one who gladly does righteousness, those who remember you in
    your ways. Look, you were angry, and we sinned; in them for a long time—and shall
    we be saved?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You meet the one who rejoices and does righteousness.' The Hebrew participles
      can be taken together as describing the person God receives favorably.
    reason: lexical_alternative
  - marker: b
    text: The clause 'in them for a long time—and shall we be saved?' is textually
      and syntactically difficult. Alternatives include 'in them is continuance, and
      we shall be saved' or 'we have been in them a long time, and shall we be saved?'
    reason: alternative_reading
lexical_decisions:
- source_word: פָּגַעְתָּ
  chosen: you meet
  alternatives:
  - you came to meet
  - you encountered
  - you interceded for
  lexicon: HALOT
  rationale: The verb פגע commonly means 'meet, encounter,' and in context addresses
    God as the one who comes to or receives favorably the righteous worshiper. 'Meet'
    is concise and preserves the relational sense without overinterpreting it as hostile
    encounter or intercession.
- source_word: שָׂשׂ
  chosen: the one who gladly
  alternatives:
  - the rejoicing one
  - him who rejoices
  lexicon: HALOT
  rationale: The participle denotes one who rejoices. Rendering adverbially with 'gladly'
    produces natural English while preserving the idea that joy characterizes the
    person described.
- source_word: וְעֹשֵׂה צֶדֶק
  chosen: does righteousness
  alternatives:
  - works righteousness
  - does what is right
  - practices justice
  lexicon: HALOT
  rationale: צֶדֶק can denote righteousness or justice. 'Does righteousness' keeps
    the Hebrew collocation and moral-theological sense. 'Justice' is possible but
    narrower here.
- source_word: בִּדְרָכֶיךָ
  chosen: in your ways
  alternatives:
  - in your paths
  - by your ways
  lexicon: HALOT
  rationale: A straightforward rendering of the plural noun with second masculine
    singular suffix. 'In your ways' preserves the covenantal-ethical sense of walking
    according to God's ways.
- source_word: יִזְכְּרוּךָ
  chosen: those who remember you
  alternatives:
  - who remember you
  - they remember you
  lexicon: HALOT
  rationale: The Hebrew form is 3mp with object suffix, naturally continuing the description
    of the righteous. English supplies 'those who' to make the clause idiomatic.
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Surely
  - Indeed
  lexicon: HALOT
  rationale: הֵן is a discourse particle drawing attention. 'Look' is readable modern
    English and preserves the rhetorical force without archaic tone.
- source_word: קָצַפְתָּ
  chosen: you were angry
  alternatives:
  - you were wrathful
  - you became angry
  lexicon: HALOT
  rationale: The verb expresses divine anger. 'You were angry' is natural and sufficiently
    weighty without importing a more technical theological term.
- source_word: וַנֶּחֱטָא
  chosen: and we sinned
  alternatives:
  - then we sinned
  - while we sinned
  lexicon: HALOT
  rationale: The waw-consecutive with first common plural is best rendered simply
    in sequence here. It states Israel's sin plainly without forcing a tighter temporal
    nuance than the Hebrew requires.
- source_word: בָּהֶם
  chosen: in them
  alternatives:
  - in these ways
  - in those things
  - because of them
  lexicon: HALOT
  rationale: The pronominal reference is ambiguous in Hebrew, likely referring back
    to God's ways or possibly the conditions just mentioned. 'In them' preserves the
    ambiguity rather than resolving it interpretively.
- source_word: עוֹלָם
  chosen: for a long time
  alternatives:
  - forever
  - of old
  - continually
  lexicon: HALOT
  rationale: עוֹלָם can denote long duration, antiquity, or perpetuity. In this difficult
    clause, 'for a long time' best captures extended duration without overstating
    absolute eternity.
- source_word: וְנִוָּשֵׁעַ
  chosen: and shall we be saved?
  alternatives:
  - and we shall be saved
  - that we might be saved
  - and can we be saved?
  lexicon: HALOT
  rationale: The Niphal of ישׁע means 'be saved.' Given the verse's difficult syntax
    and lament context, an interrogative sense fits the rhetorical force well in English,
    expressing astonishment or doubt. The Hebrew does not mark the question explicitly,
    so this remains an interpretive choice preserved with alternatives.
