id: ISA.64.1
reference: Isaiah 64:1
source:
  edition: WLC
  text: כִּ/קְדֹ֧חַ אֵ֣שׁ הֲמָסִ֗ים מַ֚יִם תִּבְעֶה אֵ֔שׁ לְ/הוֹדִ֥יעַ שִׁמְ/ךָ֖ לְ/צָרֶ֑י/ךָ
    מִ/פָּנֶ֖י/ךָ גּוֹיִ֥ם יִרְגָּֽזוּ־׃
translation:
  text: As when fire kindles brushwood, and fire causes water to boil, to make your
    name known to your adversaries, so that nations tremble at your presence—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stubble' or 'dry twigs' for 'brushwood.' The Hebrew term is rare and
      denotes easily ignited material.
    reason: lexical_alternative
  - marker: b
    text: Or 'makes water bubble.'
    reason: lexical_alternative
  - marker: c
    text: In some English versifications, this line is numbered as Isaiah 63:19b.
    reason: textual_variant
lexical_decisions:
- source_word: כִּ/קְדֹחַ
  chosen: As when ... kindles
  alternatives:
  - When ... burns
  - As fire kindles
  lexicon: HALOT
  rationale: The prefixed כ introduces comparison ('as/like when'), and the infinitive
    construct of קדח conveys kindling/burning. Rendering 'As when ... kindles' preserves
    the simile and the verbal force without over-literal awkwardness.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: הֲמָסִים
  chosen: brushwood
  alternatives:
  - stubble
  - dry twigs
  - kindling
  lexicon: HALOT
  rationale: The noun is difficult and variously understood; in context it denotes
    combustible material quickly ignited by fire. 'Brushwood' is natural modern English
    and fits the imagery better than the more archaic 'stubble,' while preserving
    the sense of easily consumed fuel.
- source_word: מַיִם
  chosen: water
  lexicon: HALOT
  rationale: Standard rendering.
- source_word: תִּבְעֶה
  chosen: causes ... to boil
  alternatives:
  - makes ... bubble
  - kindles
  lexicon: HALOT
  rationale: From בעה in this context, the sense is that fire makes water boil or
    bubble. 'Causes water to boil' is idiomatic and communicates the effect clearly.
    The subject is the second occurrence of 'fire.'
- source_word: לְ/הוֹדִיעַ
  chosen: to make known
  alternatives:
  - to cause to know
  - to reveal
  lexicon: HALOT
  rationale: Hiphil infinitive of ידע commonly means 'make known.' This preserves
    the causative nuance.
- source_word: שִׁמְ/ךָ
  chosen: your name
  lexicon: HALOT
  rationale: Retains the biblical idiom of 'name' as reputation/identity without paraphrasing
    it away.
- source_word: לְ/צָרֶיךָ
  chosen: to your adversaries
  alternatives:
  - to your enemies
  - against your foes
  lexicon: HALOT
  rationale: צר can denote adversaries or enemies. 'Adversaries' is slightly broader
    and preserves the relational opposition without importing a more militarized nuance
    than necessary.
- source_word: מִ/פָּנֶיךָ
  chosen: at your presence
  alternatives:
  - before you
  - from before your face
  lexicon: HALOT
  rationale: The idiom literally means 'from before your face/presence.' 'At your
    presence' is idiomatic English and preserves the theophanic force.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentiles
  lexicon: HALOT
  rationale: In Isaiah this commonly refers to the nations broadly. 'Nations' is the
    most contextually fitting and least misleading here.
- source_word: יִרְגָּזוּ
  chosen: tremble
  alternatives:
  - quake
  - be agitated
  - shake
  lexicon: HALOT
  rationale: The verb denotes quaking, trembling, or agitation. 'Tremble' fits the
    context of divine manifestation and reads naturally in English.
