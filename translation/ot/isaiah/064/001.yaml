theological_decisions:
- issue: Verse division and relation to preceding plea
  chosen_reading: Translate the verse as a continuation of the prophet's plea using
    comparative imagery ('As when...'), without importing the preceding verse's wording
    into the main text.
  alternative_readings:
  - Some English traditions number this as 63:19b and connect it directly to 'Oh that
    you would rend the heavens and come down' from the preceding line.
  rationale: The Hebrew text here begins with comparative imagery rather than repeating
    the plea itself. The translation should reflect the wording of this verse alone
    while allowing the reader to sense its dependence on the prior petition.
- issue: Imagery of divine manifestation
  chosen_reading: Retain the simile of fire and boiling water as poetic imagery of
    God's powerful self-disclosure and judgment, without narrowing it to a single
    doctrinal category.
  alternative_readings:
  - Interpret the imagery specifically as judgment only
  - Interpret it specifically as purification only
  rationale: The verse evokes both overwhelming manifestation and the effect on God's
    adversaries and the nations. Preserving the imagery avoids over-resolving its
    theological force.
  doctrine_reference: Preserve theological tension rather than resolve it.
