theological_decisions:
- issue: Nature of uncleanness in the confession
  chosen_reading: Render the imagery as 'unclean' and 'filthy garment' without narrowing
    it to exclusively ritual impurity or exclusively moral depravity.
  alternative_readings:
  - Treat the language as purely ceremonial impurity imagery
  - Treat the language as a direct doctrinal statement of total depravity in systematic
    terms
  rationale: The verse uses impurity imagery in a penitential confession. The translation
    should preserve the metaphor's force without importing a later doctrinal formulation
    not explicitly stated by the text.
  doctrine_reference: Preserve theological tension rather than resolve it; Original-language
    primacy over translation tradition.
