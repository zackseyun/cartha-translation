id: ISA.64.5
reference: Isaiah 64:5
source:
  edition: WLC
  text: וַ/נְּהִ֤י כַ/טָּמֵא֙ כֻּלָּ֔/נוּ וּ/כְ/בֶ֥גֶד עִדִּ֖ים כָּל צִדְקֹתֵ֑י/נוּ
    וַ/נָּ֤בֶל כֶּֽ/עָלֶה֙ כֻּלָּ֔/נוּ וַ/עֲוֺנֵ֖/נוּ כָּ/ר֥וּחַ יִשָּׂאֻֽ/נוּ־׃
translation:
  text: We all became like one who is unclean, and all our righteous deeds are like
    a filthy garment; we all wither like a leaf, and our iniquities carry us away
    like the wind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more specifically, 'like a garment of menstrual impurity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנְּהִי
  chosen: we all became
  alternatives:
  - we have become
  - we were
  lexicon: HALOT
  rationale: Qal wayyiqtol of היה with first person plural indicates a past/state-transition
    sense. 'Became' captures the movement into the condition; 'we all' reflects the
    following כֻּלָּנוּ naturally in English.
- source_word: כַטָּמֵא
  chosen: like one who is unclean
  alternatives:
  - like an unclean thing
  - as unclean
  lexicon: HALOT
  rationale: טָמֵא denotes ritual/moral uncleanness. The singular adjective after
    כ functions comparably to 'like an unclean person/thing.' 'One who is unclean'
    preserves the personal force without overcommitting to either purely ritual or
    purely metaphorical impurity.
- source_word: כֻּלָּנוּ
  chosen: we all
  alternatives:
  - all of us
  lexicon: HALOT
  rationale: Placed prominently for emphasis; rendered idiomatically as 'we all' in
    both occurrences.
- source_word: וּכְבֶגֶד עִדִּים
  chosen: like a filthy garment
  alternatives:
  - like a polluted garment
  - like a menstrual cloth
  lexicon: HALOT
  rationale: The phrase refers to a garment associated with menstrual impurity or
    uncleanness. 'Filthy garment' is readable modern English and preserves the defiling
    sense without becoming clinically explicit in the main text. The more specific
    alternative is preserved in a footnote because it is lexically significant.
- source_word: כָּל צִדְקֹתֵינוּ
  chosen: all our righteous deeds
  alternatives:
  - all our righteousnesses
  - all our acts of righteousness
  lexicon: HALOT
  rationale: Plural צִדְקוֹת refers to concrete righteous acts/deeds rather than abstract
    righteousness in this context. 'Righteous deeds' communicates the plural and avoids
    an awkward literalism.
- source_word: וַנָּבֶל
  chosen: we all wither
  alternatives:
  - we fade
  - we shrivel
  lexicon: HALOT
  rationale: נבל here evokes fading/wilting like vegetation. 'Wither' fits the simile
    with 'leaf' and conveys decay more strongly than 'fade.'
- source_word: כֶּעָלֶה
  chosen: like a leaf
  lexicon: HALOT
  rationale: Straightforward simile; singular collective image works naturally in
    English.
- source_word: וַעֲוֺנֵינוּ
  chosen: our iniquities
  alternatives:
  - our sins
  - our guilt
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the consequences of guilt. 'Iniquities'
    preserves the moral weight and traditional distinction from more general 'sins.'
- source_word: כָרוּחַ
  chosen: like the wind
  alternatives:
  - as the wind
  lexicon: HALOT
  rationale: Simple comparative phrase; 'like the wind' is idiomatic and preserves
    the image of irresistible removal.
- source_word: יִשָּׂאֻנוּ
  chosen: carry us away
  alternatives:
  - lift us up
  - sweep us away
  lexicon: HALOT
  rationale: נשא commonly means carry/lift. In context with leaf and wind, the sense
    is removal/driving away. 'Carry us away' is faithful and vivid without adding
    interpretive intensity beyond the Hebrew.
