theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse is a prayerful address to Israel's covenant God. Following
    the project's doctrine, the tetragrammaton is rendered 'the LORD' rather than
    transliterated.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
- issue: Paternal language for God
  chosen_reading: our Father
  alternative_readings:
  - our parent
  rationale: The Hebrew explicitly uses the masculine familial noun 'Father.' Per
    translation philosophy, gender-accurate rendering is preferred over gender-neutral
    substitution, especially in direct address to God.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 (Gender-accurate over
    gender-neutral)'
