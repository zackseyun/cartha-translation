theological_decisions:
- issue: Theophanic imagery of mountains reacting to God's descent
  chosen_reading: Retain the concrete poetic image 'the mountains flowed down before
    you' rather than smoothing it into a generalized statement of trembling.
  alternative_readings:
  - the mountains quaked at your presence
  - the mountains melted before you
  rationale: The Hebrew uses vivid poetic language that should be preserved where
    intelligible. This maintains the text's theological portrayal of creation undone
    before God's presence without over-interpreting the exact physical metaphor.
  doctrine_reference: Translation philosophy §3, §6
