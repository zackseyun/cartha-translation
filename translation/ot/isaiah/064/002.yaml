id: ISA.64.2
reference: Isaiah 64:2
source:
  edition: WLC
  text: בַּ/עֲשׂוֹתְ/ךָ֥ נוֹרָא֖וֹת לֹ֣א נְקַוֶּ֑ה יָרַ֕דְתָּ מִ/פָּנֶ֖י/ךָ הָרִ֥ים
    נָזֹֽלּוּ׃
translation:
  text: When you did awesome things that we did not expect, you came down; the mountains
    flowed down before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at your presence'; literally 'from before your face/presence.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the mountains quaked' or 'melted'; the Hebrew verb evokes the image
      of flowing or dissolving before God.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲשׂוֹתְךָ
  chosen: When you did
  alternatives:
  - In your doing
  - As you did
  lexicon: HALOT
  rationale: 'The preposition ב with the infinitive construct of עשה plus 2ms suffix
    is best rendered temporally here: ''when you did.'' This gives natural English
    while preserving the clause linkage.'
- source_word: נוֹרָאוֹת
  chosen: awesome things
  alternatives:
  - fearsome things
  - terrible things
  lexicon: HALOT
  rationale: From the root ירא in the nifal participial/adjectival form, the sense
    is deeds that inspire awe. 'Awesome things' communicates the positive, majestic
    force better in modern English than 'terrible things,' which can mislead.
- source_word: לֹא נְקַוֶּה
  chosen: that we did not expect
  alternatives:
  - which we did not hope for
  - beyond our expectation
  lexicon: HALOT
  rationale: קוה commonly carries the sense of hoping or waiting expectantly. In this
    context, with 'awesome things,' the idiomatic English sense is that these acts
    were beyond expectation. 'Did not expect' is clearer than the more wooden 'did
    not hope for.'
- source_word: יָרַדְתָּ
  chosen: you came down
  alternatives:
  - you descended
  lexicon: HALOT
  rationale: ירד literally means 'go down/come down.' 'Came down' is natural English
    and fits the theophanic context.
- source_word: מִפָּנֶיךָ
  chosen: before you
  alternatives:
  - from before you
  - at your presence
  lexicon: HALOT
  rationale: Literally 'from your face/presence.' In context it marks the mountains'
    reaction to God's appearing. 'Before you' is concise and natural, while a footnote
    preserves the more explicit 'at your presence' nuance.
- source_word: הָרִים
  chosen: the mountains
  lexicon: HALOT
  rationale: Straightforward lexical rendering of הרים.
- source_word: נָזֹלּוּ
  chosen: flowed down
  alternatives:
  - quaked
  - melted
  - shook loose
  lexicon: HALOT
  rationale: From זלל/נזל-related imagery of flowing or streaming, the most direct
    sense is that the mountains 'flowed down' or 'ran down,' a vivid poetic image
    of dissolution before God. Some versions interpret the effect more generally as
    quaking or melting; these are interpretive and worth preserving in a footnote
    rather than the main text.
