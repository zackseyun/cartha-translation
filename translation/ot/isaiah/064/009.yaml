id: ISA.64.9
reference: Isaiah 64:9
source:
  edition: WLC
  text: עָרֵ֥י קָדְשְׁ/ךָ֖ הָי֣וּ מִדְבָּ֑ר צִיּוֹן֙ מִדְבָּ֣ר הָיָ֔תָה יְרוּשָׁלִַ֖ם
    שְׁמָמָֽה׃
translation:
  text: Your holy cities have become a wilderness; Zion has become a wilderness, Jerusalem
    a desolation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'desert' for 'wilderness' in both occurrences of מִדְבָּר.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרֵי קָדְשְׁךָ
  chosen: Your holy cities
  alternatives:
  - the cities of your holiness
  - your sacred cities
  lexicon: HALOT
  rationale: Construct phrase literally means 'cities of your holiness.' In idiomatic
    English, 'Your holy cities' best preserves both possession and sanctity without
    awkwardness.
- source_word: הָיוּ
  chosen: have become
  alternatives:
  - were
  - became
  lexicon: HALOT
  rationale: Qal perfect of היה can denote resultant state from prior change. 'Have
    become' captures the lament's sense that the cities now stand in this ruined condition.
- source_word: מִדְבָּר
  chosen: a wilderness
  alternatives:
  - desert
  - wasteland
  lexicon: HALOT
  rationale: מִדבר commonly denotes wilderness/desert region. 'Wilderness' is the
    most established and flexible English equivalent here, conveying devastation without
    over-specifying aridity.
- source_word: צִיּוֹן
  chosen: Zion
  rationale: Proper name is transliterated per translation philosophy.
- source_word: הָיָתָה
  chosen: has become
  alternatives:
  - was
  - became
  lexicon: HALOT
  rationale: As with the earlier היה, the perfect is rendered with present-result
    force in English to reflect the current devastated state being lamented.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Proper name is transliterated per translation philosophy.
- source_word: שְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolate
  - a ruin
  - waste
  lexicon: HALOT
  rationale: Noun denotes devastation/desolation. 'A desolation' preserves the nominal
    force and parallels the preceding predicate structure better than the adjective
    'desolate'.
