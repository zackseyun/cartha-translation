id: ISA.33.9
reference: Isaiah 33:9
source:
  edition: WLC
  text: אָבַ֤ל אֻמְלְלָה֙ אָ֔רֶץ הֶחְפִּ֥יר לְבָנ֖וֹן קָמַ֑ל הָיָ֤ה הַ/שָּׁרוֹן֙ כָּֽ/עֲרָבָ֔ה
    וְ/נֹעֵ֥ר בָּשָׁ֖ן וְ/כַרְמֶֽל׃
translation:
  text: The land mourns and withers; Lebanon is ashamed and withers away. Sharon has
    become like the Arabah, and Bashan and Carmel shake off their leaves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the desert plain' or 'like the wilderness' for 'like the Arabah.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'Bashan and Carmel shake off'; the sense is that they are stripped
      of their foliage.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבַל
  chosen: mourns
  alternatives:
  - dries up
  - laments
  lexicon: HALOT
  rationale: The verb commonly denotes mourning or lamenting. In parallel with the
    following vegetation imagery it also evokes desolation, but 'mourns' preserves
    the personification of the land better than a purely physical gloss.
- source_word: אֻמְלְלָה
  chosen: withers
  alternatives:
  - languishes
  - fades
  lexicon: HALOT
  rationale: Used of becoming weak, dried up, or withered. 'Withers' fits the agricultural
    imagery and pairs naturally with 'mourns'.
- source_word: אֶרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In this prophetic judgment context, 'land' best captures the devastated
    territory rather than the whole globe.
- source_word: הֶחְפִּיר
  chosen: is ashamed
  alternatives:
  - is confounded
  - is disgraced
  lexicon: HALOT
  rationale: The verb often means to be ashamed or humiliated. Applied to Lebanon,
    it continues the poetic personification of the landscape.
- source_word: לְבָנוֹן
  chosen: Lebanon
  lexicon: HALOT
  rationale: Standard transliteration of the place name, in keeping with the policy
    to transliterate names.
- source_word: קָמַל
  chosen: withers away
  alternatives:
  - dries up
  - fades
  lexicon: HALOT
  rationale: A vegetation term for shriveling or fading. 'Withers away' distinguishes
    it slightly from the earlier 'withers' while preserving the parallelism.
- source_word: הַשָּׁרוֹן
  chosen: Sharon
  alternatives:
  - the Sharon plain
  lexicon: HALOT
  rationale: Proper regional name; transliterated rather than translated. The article
    is absorbed idiomatically in English.
- source_word: כָּעֲרָבָה
  chosen: like the Arabah
  alternatives:
  - like the desert plain
  - like the wilderness
  lexicon: HALOT
  rationale: The term can denote the Jordan rift/desert plain and by extension arid
    steppe. 'Arabah' preserves the geographic allusion; an explanatory alternative
    is worth preserving in a footnote.
- source_word: נֹעֵר
  chosen: shake off their leaves
  alternatives:
  - are stripped bare
  - shake themselves
  lexicon: HALOT
  rationale: From a verb meaning to shake out/off. In context of Bashan and Carmel,
    the sense is that their foliage is shaken off, i.e., they are denuded. The supplied
    object 'their leaves' makes the image clear in English while staying close to
    the implied sense.
- source_word: בָּשָׁן
  chosen: Bashan
  lexicon: HALOT
  rationale: Standard transliteration of the region name.
- source_word: כַּרְמֶל
  chosen: Carmel
  alternatives:
  - Mount Carmel
  lexicon: HALOT
  rationale: Standard transliteration of the place name; 'Mount' is not explicit in
    the Hebrew here.
