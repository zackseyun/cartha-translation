id: ISA.33.14
reference: Isaiah 33:14
source:
  edition: WLC
  text: פָּחֲד֤וּ בְ/צִיּוֹן֙ חַטָּאִ֔ים אָחֲזָ֥ה רְעָדָ֖ה חֲנֵפִ֑ים מִ֣י יָג֣וּר
    לָ֗/נוּ אֵ֚שׁ אוֹכֵלָ֔ה מִי יָג֥וּר לָ֖/נוּ מוֹקְדֵ֥י עוֹלָֽם׀־׃
translation:
  text: 'Sinners in Zion are afraid; trembling has seized the godless: “Who among
    us can dwell with a consuming fire? Who among us can dwell with everlasting burnings?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the hypocrites.” The Hebrew term can denote those who are impious or
      irreligious, not only those who are insincere.
    reason: lexical_alternative
  - marker: b
    text: Or “Who among us can sojourn.” The Hebrew verb can mean “sojourn” or “dwell/remain.”
    reason: lexical_alternative
  - marker: c
    text: “A consuming fire” echoes biblical language for God's holy and judging presence;
      compare Deut 4:24; Heb 12:29.
    reason: cross_reference
  - marker: d
    text: Or “eternal burnings” or “perpetual flames.”
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּחֲדוּ
  chosen: are afraid
  alternatives:
  - fear
  - have become afraid
  lexicon: HALOT
  rationale: Qal perfect 3cp of פחד expresses fear that has come upon them; present
    English 'are afraid' best conveys the stative result in context.
- source_word: בְצִיּוֹן
  chosen: in Zion
  alternatives:
  - at Zion
  lexicon: HALOT
  rationale: Locative beth is most naturally rendered 'in Zion,' identifying the place
    where these sinners are found.
- source_word: חַטָּאִים
  chosen: sinners
  alternatives:
  - sinful ones
  lexicon: HALOT
  rationale: Standard plural noun for those characterized by sin; 'sinners' is natural
    and sufficiently direct.
- source_word: אָחֲזָה רְעָדָה
  chosen: trembling has seized
  alternatives:
  - shaking has taken hold of
  - terror has seized
  lexicon: HALOT
  rationale: The verb 'seized' with the noun 'trembling' forms an idiomatic expression
    meaning that trembling has gripped them. Preserving the concrete imagery is preferable
    to flattening it into a single abstract noun.
- source_word: חֲנֵפִים
  chosen: the godless
  alternatives:
  - the hypocrites
  - the profane
  lexicon: HALOT
  rationale: Though often rendered 'hypocrites,' the Hebrew term can denote the irreligious
    or godless, not merely those who are insincere. In this judgment context, 'the
    godless' better captures the broader moral-religious sense.
- source_word: מִי יָגוּר לָנוּ
  chosen: Who among us can dwell
  alternatives:
  - Who among us can sojourn
  - Who can remain with us
  lexicon: HALOT
  rationale: גור can mean sojourn or dwell. In this poetic parallelism with divine
    fire imagery, the sense is who can remain/live in the presence of such holiness.
    'Among us' makes the dative pronoun idiomatic in English while preserving the
    communal self-reference.
- source_word: אֵשׁ אוֹכֵלָה
  chosen: a consuming fire
  alternatives:
  - devouring fire
  lexicon: HALOT
  rationale: A well-established biblical collocation for destructive holiness/judgment.
    'Consuming fire' is idiomatic, accurate, and preserves the participial force.
- source_word: מוֹקְדֵי עוֹלָם
  chosen: everlasting burnings
  alternatives:
  - eternal burnings
  - perpetual flames
  lexicon: HALOT
  rationale: The plural construct with עולם denotes enduring burning places/flames.
    'Everlasting burnings' preserves the vivid plural imagery and the weight of עולם
    without overinterpreting it.
