theological_decisions:
- issue: Referent of the consuming fire and everlasting burnings
  chosen_reading: The imagery refers to the terrifying holiness and judgment-presence
    of God, expressed metaphorically as fire.
  alternative_readings:
  - The imagery refers more narrowly to the fire of divine judgment on the wicked.
  - The imagery refers to Zion's altar/fire symbolism.
  rationale: The immediate context in Isaiah presents YHWH's presence as dangerous
    to the wicked, and the following verse answers who may dwell there by describing
    the righteous. The translation preserves the metaphor without importing later
    doctrinal categories into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
