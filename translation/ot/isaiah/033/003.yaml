id: ISA.33.3
reference: Isaiah 33:3
source:
  edition: WLC
  text: מִ/קּ֣וֹל הָמ֔וֹן נָדְד֖וּ עַמִּ֑ים מֵ/ר֣וֹמְמֻתֶ֔/ךָ נָפְצ֖וּ גּוֹיִֽם׃
translation:
  text: At the sound of the tumult, peoples fled; at your rising up, nations were
    scattered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'At the noise of the uproar, peoples fled.'
    reason: lexical_alternative
  - marker: b
    text: Or 'at your exaltation'; the Hebrew may emphasize either God's rising to
      act or his exalted majesty.
    reason: alternative_reading
lexical_decisions:
- source_word: מִקּוֹל
  chosen: At the sound of
  alternatives:
  - From the sound of
  - At the noise of
  lexicon: HALOT
  rationale: The preposition מִן with קוֹל can mark cause or occasion. In idiomatic
    English here, 'At the sound of' best conveys the triggering force without sounding
    wooden.
- source_word: הָמוֹן
  chosen: the tumult
  alternatives:
  - the noise
  - the uproar
  - the multitude
  lexicon: HALOT
  rationale: הָמוֹן often denotes a loud commotion or roaring crowd/noise. In this
    context of peoples and nations reacting in fear, 'tumult' captures the audible
    disturbance better than the more ambiguous 'multitude'.
- source_word: נָדְדוּ
  chosen: fled
  alternatives:
  - wandered away
  - moved off
  - were driven away
  lexicon: HALOT
  rationale: Though the verb can mean 'wander' or 'move about,' in this military/judgment
    context it denotes retreat or flight. 'Fled' gives the likely sense in natural
    English.
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  - peoples groups
  lexicon: HALOT
  rationale: עַמִּים is best rendered 'peoples' to preserve the distinction from גּוֹיִם
    later in the verse, even though the semantic fields overlap.
- source_word: מֵרֹמְמֻתֶךָ
  chosen: at your rising up
  alternatives:
  - from your exaltation
  - because of your lifting yourself up
  - at your exalted majesty
  lexicon: HALOT
  rationale: The noun from רום with 2ms suffix can denote exaltation or rising. In
    context, likely referring to God's active self-exaltation in judgment, 'at your
    rising up' is both vivid and contextually fitting. It also echoes common biblical
    imagery of God arising to act.
- source_word: נָפְצוּ
  chosen: were scattered
  alternatives:
  - were dispersed
  - were shattered
  lexicon: HALOT
  rationale: The verb can carry senses of scattering or shattering. With גּוֹיִם as
    subject, 'were scattered' is the clearest and most contextually probable rendering.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: In Isaiah, גּוֹיִם commonly refers to nations. 'Gentiles' would import
    a later Jewish/Christian contrast not required here.
