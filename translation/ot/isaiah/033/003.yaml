theological_decisions:
- issue: Referent of the second person suffix in 'your rising up'
  chosen_reading: Addressed to God, describing his arising/exaltation in judgment
  alternative_readings:
  - Addressed more generally to Zion/Jerusalem personified
  rationale: The immediate context of Isaiah 33 includes direct address to the LORD
    and divine intervention against hostile nations. Rendering the phrase straightforwardly
    as 'your rising up' preserves the address without over-interpreting, while the
    translation choice assumes the most likely referent is God.
  doctrine_reference: Preserve theological tension rather than resolve it
