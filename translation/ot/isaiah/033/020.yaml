theological_decisions:
- issue: Nature of Zion/Jerusalem imagery
  chosen_reading: Render the verse as a promise of Jerusalem's secure, peaceful stability
    using literal tent imagery without over-allegorizing it ecclesiologically or eschatologically.
  alternative_readings:
  - Read the tent language as primarily symbolic of the eschatological people of God
  - Read the verse as exclusively historical-political restoration
  rationale: The Hebrew presents Jerusalem/Zion as a secure dwelling through the metaphor
    of an unshaken tent. The translation should preserve that image and not resolve
    broader interpretive questions in the wording itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
