id: ISA.33.20
reference: Isaiah 33:20
source:
  edition: WLC
  text: חֲזֵ֣ה צִיּ֔וֹן קִרְיַ֖ת מֽוֹעֲדֵ֑/נוּ עֵינֶי/ךָ֩ תִרְאֶ֨ינָה יְרוּשָׁלִַ֜ם
    נָוֶ֣ה שַׁאֲנָ֗ן אֹ֤הֶל בַּל יִצְעָן֙ בַּל יִסַּ֤ע יְתֵֽדֹתָי/ו֙ לָ/נֶ֔צַח וְ/כָל
    חֲבָלָ֖י/ו בַּל יִנָּתֵֽקוּ־־־־׃
translation:
  text: Look upon Zion, the city of our appointed feasts; your eyes will see Jerusalem,
    a quiet habitation, a tent that will not be moved; its stakes will never be pulled
    up, and none of its ropes will be torn apart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the city of our appointed assemblies' or 'the city of our festivals.'
      The Hebrew מוֹעֲדֵנוּ can refer to appointed times or gatherings, especially
      in worship contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'a secure habitation.' The adjective can denote being at ease, undisturbed,
      or secure.
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew uses tent imagery for Jerusalem''s permanence: its stakes will
      not be pulled up and its ropes will not be broken.'
    reason: cultural_note
lexical_decisions:
- source_word: חֲזֵה
  chosen: Look upon
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Imperative 2ms of חזה/ראה-family usage here calls for a direct summons
    to observe. 'Look upon' is vivid and natural English while preserving the imperative
    force better than a flatter 'see.'
- source_word: קִרְיַת מוֹעֲדֵנוּ
  chosen: the city of our appointed feasts
  alternatives:
  - the city of our appointed times
  - the city of our assemblies
  - the city of our festivals
  lexicon: HALOT
  rationale: מוֹעֵד commonly denotes an appointed time/meeting, often in cultic-festival
    contexts. In Zion/Jerusalem context, 'appointed feasts' best captures the communal
    worship sense without over-paraphrasing. 'Assemblies' is possible but less clearly
    tied to the festal calendar.
- source_word: עֵינֶיךָ תִרְאֶינָה
  chosen: your eyes will see
  alternatives:
  - you will see
  lexicon: HALOT
  rationale: The Hebrew explicitly uses 'your eyes' as subject, so the translation
    preserves the embodied emphasis rather than reducing it to the simpler 'you will
    see.'
- source_word: נָוֶה
  chosen: habitation
  alternatives:
  - dwelling place
  - pasture-abode
  lexicon: HALOT
  rationale: נָוֶה can denote abode/dwelling, sometimes with pastoral nuance. Here,
    in parallel with 'tent,' 'habitation' preserves the settled-dwelling sense without
    importing unnecessary pastoral imagery.
- source_word: שַׁאֲנָן
  chosen: quiet
  alternatives:
  - secure
  - undisturbed
  - at ease
  lexicon: HALOT
  rationale: The adjective conveys tranquility and freedom from disturbance. 'Quiet'
    fits the immediate imagery of peaceful stability; 'secure' is also possible but
    slightly more interpretive.
- source_word: אֹהֶל
  chosen: a tent
  alternatives:
  - a tabernacle
  lexicon: HALOT
  rationale: The ordinary sense is 'tent.' Although Zion/Jerusalem has cultic associations,
    nothing in this phrase requires the specialized 'tabernacle,' and the following
    references to stakes and ropes support the literal tent metaphor.
- source_word: בַּל יִצְעָן
  chosen: will not be moved
  alternatives:
  - will not wander
  - will not be shifted
  lexicon: HALOT
  rationale: The rare verb likely conveys being displaced or made to wander. In context
    of a tent contrasted with instability, 'will not be moved' communicates the intended
    permanence in idiomatic English.
- source_word: בַּל יִסַּע יְתֵדֹתָיו
  chosen: its stakes will never be pulled up
  alternatives:
  - its pegs will never be removed
  - its tent-pins will never be uprooted
  lexicon: HALOT
  rationale: נסע with tent stakes naturally refers to pulling up/removing in breaking
    camp. 'Pulled up' is clear modern English and preserves the tent imagery.
- source_word: לָנֶצַח
  chosen: never
  alternatives:
  - forever
  - for eternity
  lexicon: HALOT
  rationale: In this clause the adverbial force is best rendered idiomatically as
    'never,' expressing enduring permanence in natural English.
- source_word: וְכָל חֲבָלָיו בַּל יִנָּתֵקוּ
  chosen: and none of its ropes will be torn apart
  alternatives:
  - and none of its cords will be broken
  - and all its ropes will not be snapped
  lexicon: HALOT
  rationale: חבלים here are tent cords/ropes. English prefers 'none of its ropes'
    over the more wooden 'all its ropes ... not.' נתק in the Niphal conveys being
    torn loose/broken; 'torn apart' preserves the physical imagery.
