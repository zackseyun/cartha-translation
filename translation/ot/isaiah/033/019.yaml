id: ISA.33.19
reference: Isaiah 33:19
source:
  edition: WLC
  text: אֶת עַ֥ם נוֹעָ֖ז לֹ֣א תִרְאֶ֑ה עַ֣ם עִמְקֵ֤י שָׂפָה֙ מִ/שְּׁמ֔וֹעַ נִלְעַ֥ג
    לָשׁ֖וֹן אֵ֥ין בִּינָֽה־׃
translation:
  text: You will no longer see the insolent people, a people of speech too deep to
    understand, of a stammering tongue that has no comprehension.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a fierce people' or 'a defiant people.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'a people deep of lip from hearing,' that is, a people whose speech
      is too obscure to understand.
    reason: lexical_alternative
  - marker: c
    text: Or 'a mocking tongue' or 'a strange/barbarous tongue.' The Hebrew expression
      is difficult and likely refers to foreign speech that is unintelligible to the
      hearer.
    reason: lexical_alternative
lexical_decisions:
- source_word: נוֹעָז
  chosen: insolent
  alternatives:
  - fierce
  - defiant
  - bold
  lexicon: HALOT
  rationale: The participial/adjectival form describes a people marked by arrogant
    or intimidating boldness. 'Insolent' captures both the threatening and disdainful
    nuance better than the more neutral 'bold' or purely martial 'fierce'.
- source_word: תִרְאֶה
  chosen: you will ... see
  alternatives:
  - you will look upon
  - you will behold
  lexicon: HALOT
  rationale: The verb ראה normally means 'see.' In context it refers to no longer
    encountering or having to face this foreign oppressor. 'See' is retained as the
    base sense, with 'no longer' supplied in English for natural linkage with the
    negative.
- source_word: עִמְקֵי שָׂפָה
  chosen: of speech too deep to understand
  alternatives:
  - of deep lip
  - of obscure speech
  - of unintelligible speech
  lexicon: HALOT
  rationale: Literally 'deep of lip,' an idiom for speech that is inaccessible or
    incomprehensible to the hearer. A more idiomatic English rendering is needed to
    communicate the sense rather than preserve the opaque Hebrew image woodenly.
- source_word: מִשְּׁמוֹעַ
  chosen: to understand
  alternatives:
  - from hearing
  - to hear
  lexicon: HALOT
  rationale: Literally 'from hearing,' but in this construction it expresses inability
    to make sense of what is heard. 'To understand' brings out the functional meaning
    in English while remaining close to the Hebrew idea of hearing-comprehension.
- source_word: נִלְעַג לָשׁוֹן
  chosen: of a stammering tongue
  alternatives:
  - of a mocking tongue
  - of a barbarous tongue
  - of a strange tongue
  lexicon: HALOT
  rationale: The phrase is difficult. In context, paired with 'speech too deep to
    understand,' it refers to foreign speech experienced as unintelligible. 'Stammering
    tongue' follows a well-established contextual sense for speech that sounds broken
    or incomprehensible to the hearer, without implying a literal speech impediment
    as the speaker's defect.
- source_word: אֵין בִּינָה
  chosen: that has no comprehension
  alternatives:
  - that cannot be understood
  - without understanding
  lexicon: HALOT
  rationale: The phrase denotes absence of intelligibility/comprehension in relation
    to the hearer. 'That has no comprehension' preserves the nominal form while fitting
    the preceding description of unintelligible foreign language.
- source_word: עַם ... עַם
  chosen: people ... a people
  alternatives:
  - nation ... a nation
  lexicon: HALOT
  rationale: The repetition is retained in English to mirror the Hebrew emphasis.
    'People' is more natural here than 'nation' and suits the immediate description
    of a foreign populace.
