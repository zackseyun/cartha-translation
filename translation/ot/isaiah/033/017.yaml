id: ISA.33.17
reference: Isaiah 33:17
source:
  edition: WLC
  text: מֶ֥לֶךְ בְּ/יָפְי֖/וֹ תֶּחֱזֶ֣ינָה עֵינֶ֑י/ךָ תִּרְאֶ֖ינָה אֶ֥רֶץ מַרְחַקִּֽים׃
translation:
  text: Your eyes will behold the king in his beauty; they will see a land that stretches
    far away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a remote land,' or more literally, 'a land of far distances.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: the king
  alternatives:
  - a king
  lexicon: HALOT
  rationale: The noun means 'king.' The absence of the article in Hebrew does not
    prevent a definite sense here; the context points to a specific royal figure,
    so English idiom favors 'the king.'
- source_word: בְּיָפְיוֹ
  chosen: in his beauty
  alternatives:
  - in his splendor
  - in his fairness
  lexicon: HALOT
  rationale: The preposition ב plus יֹפִי/יָפְי denotes appearance or beauty. 'In
    his beauty' preserves the Hebrew construction and leaves open whether the emphasis
    is physical splendor, royal majesty, or restored dignity.
- source_word: תֶּחֱזֶינָה
  chosen: will behold
  alternatives:
  - will see
  - will gaze upon
  lexicon: HALOT
  rationale: חזה often carries the nuance of seeing with attention or beholding, stronger
    than a bare 'see.' 'Will behold' reflects that nuance while remaining natural
    English.
- source_word: עֵינֶיךָ
  chosen: your eyes
  alternatives:
  - you
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'your eyes,' and retaining it preserves the
    vividness and the agreement with the feminine plural verbs.
- source_word: תִּרְאֶינָה
  chosen: they will see
  alternatives:
  - will see
  lexicon: HALOT
  rationale: The feminine plural verb agrees with 'eyes.' Rendering it as 'they will
    see' makes the Hebrew syntax clear in English and preserves the parallelism with
    the first clause.
- source_word: אֶרֶץ
  chosen: a land
  alternatives:
  - the land
  - country
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'country.' 'Land' is broad and fits the poetic
    context. The anarthrous form is naturally rendered 'a land' here, though some
    take it more definitely.
- source_word: מַרְחַקִּים
  chosen: that stretches far away
  alternatives:
  - of far distances
  - far-reaching
  - remote
  lexicon: HALOT
  rationale: 'The plural noun from the root ''to be far'' expresses distance or far
    expanses. Rather than the wooden ''a land of distances,'' this rendering communicates
    the sense idiomatically: an expansive land extending far away.'
