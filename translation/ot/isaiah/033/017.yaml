theological_decisions:
- issue: Identity of 'the king'
  chosen_reading: Rendered generically as 'the king' without specifying Hezekiah,
    the Messianic king, or the LORD.
  alternative_readings:
  - Hezekiah in restored royal splendor
  - the LORD as divine king
  - a messianic/eschatological king
  rationale: The Hebrew text itself names only 'the king' and does not explicitly
    identify him in this verse. To preserve theological tension and avoid importing
    a specific interpretive tradition, the translation leaves the referent unspecified.
  doctrine_reference: Preserve theological tension rather than resolve it.
