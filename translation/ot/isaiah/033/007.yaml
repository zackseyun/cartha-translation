id: ISA.33.7
reference: Isaiah 33:7
source:
  edition: WLC
  text: הֵ֚ן אֶרְאֶלָּ֔ם צָעֲק֖וּ חֻ֑צָ/ה מַלְאֲכֵ֣י שָׁל֔וֹם מַ֖ר יִבְכָּיֽוּ/ן׃
translation:
  text: Look, their heroes cry out in the streets; the messengers of peace weep bitterly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew אֶרְאֶלָּם is uncertain; it may mean 'their valiant ones/heroes,'
      or more literally something like 'their Ariel-men' or 'their lions of God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'ambassadors of peace' / 'envoys of peace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection introducing an emphatic observation. 'Look' is natural
    modern English while preserving the force of attention-getting announcement.
- source_word: אֶרְאֶלָּם
  chosen: their heroes
  alternatives:
  - their valiant ones
  - their Ariel-men
  - their lions of God
  lexicon: HALOT
  rationale: The noun is difficult and debated. In context of national collapse and
    failed diplomacy, it most plausibly refers to mighty men/warriors or notable champions.
    The pronominal ending yields 'their ...'. 'Heroes' is concise, idiomatic, and
    fits the lament context. More literal but obscure possibilities are preserved
    in a footnote.
- source_word: צָעֲקוּ
  chosen: cry out
  alternatives:
  - have cried out
  - shout
  lexicon: HALOT
  rationale: Qal perfect 3cp from צעק, denoting a cry of distress. English present
    'cry out' works well in prophetic vivid style.
- source_word: חֻצָה
  chosen: in the streets
  alternatives:
  - outside
  - in the open
  lexicon: HALOT
  rationale: The noun/adverb denotes the outside, especially the street or open places
    of a city. 'In the streets' best fits the urban scene.
- source_word: מַלְאֲכֵי שָׁלוֹם
  chosen: the messengers of peace
  alternatives:
  - the ambassadors of peace
  - the envoys of peace
  lexicon: HALOT
  rationale: מלאך can mean messenger, envoy, or angel depending on context. Here the
    political context of broken treaties favors human envoys/ambassadors. 'Messengers
    of peace' is transparent and broad enough to include diplomatic envoys.
- source_word: מַר
  chosen: bitterly
  alternatives:
  - bitter
  - with bitterness
  lexicon: HALOT
  rationale: Adverbial use of the adjective 'bitter' modifying the weeping. English
    idiom prefers 'weep bitterly'.
- source_word: יִבְכָּיוּן
  chosen: weep
  alternatives:
  - will weep
  - are weeping
  lexicon: HALOT
  rationale: Imperfect 3mp from בכה. In prophetic poetry the imperfect can express
    vivid present/future. 'Weep' in English poetic present pairs naturally with the
    preceding clause.
