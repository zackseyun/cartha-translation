theological_decisions:
- issue: Identity of אֶרְאֶלָּם
  chosen_reading: human heroes/valiant men rather than a title for angels or a place-name
  alternative_readings:
  - their Ariel-men
  - their altar-hearths/people of Ariel
  - their lions of God
  rationale: The immediate context concerns devastation, failed negotiations, and
    public lament. Reading the term as human champions or notable warriors best coheres
    with 'messengers of peace' in the next colon. No doctrinal issue is at stake,
    but the ambiguity should remain auditable.
