id: ISA.33.8
reference: Isaiah 33:8
source:
  edition: WLC
  text: נָשַׁ֣מּוּ מְסִלּ֔וֹת שָׁבַ֖ת עֹבֵ֣ר אֹ֑רַח הֵפֵ֤ר בְּרִית֙ מָאַ֣ס עָרִ֔ים
    לֹ֥א חָשַׁ֖ב אֱנֽוֹשׁ׃
translation:
  text: The highways lie desolate; the traveler has ceased from the road. He has broken
    the covenant, despised the cities, and regarded no man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following some ancient versions, 'despised witnesses' instead of 'despised
      the cities.' The Masoretic Text reads 'cities.'
    reason: textual_variant
  - marker: b
    text: Hebrew 'man' (ʾenosh), a singular term for a human being or mortal man;
      here it has generic force.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשַׁמּוּ
  chosen: lie desolate
  alternatives:
  - are desolate
  - are laid waste
  lexicon: HALOT
  rationale: The verb conveys becoming desolate or devastated. 'Lie desolate' is idiomatic
    in English and preserves the stative-result sense better than a simple present
    'are desolate.'
- source_word: מְסִלּוֹת
  chosen: highways
  alternatives:
  - roads
  - raised roads
  lexicon: HALOT
  rationale: The noun often refers to major roads or highways rather than a mere path.
    'Highways' fits the plural and the public-travel setting.
- source_word: שָׁבַת
  chosen: has ceased
  alternatives:
  - has stopped
  - ceased
  lexicon: HALOT
  rationale: The perfect verb marks cessation. 'Has ceased' is a natural English rendering
    and keeps the completed-action nuance.
- source_word: עֹבֵר אֹרַח
  chosen: the traveler ... from the road
  alternatives:
  - the one passing along the path
  - the wayfarer ... from the path
  lexicon: HALOT
  rationale: The participle plus noun literally describes one passing along a road/path.
    'The traveler' is concise modern English; 'road' is chosen over 'path' to match
    the larger-scale travel imagery of 'highways.'
- source_word: הֵפֵר בְּרִית
  chosen: He has broken the covenant
  alternatives:
  - he has violated the treaty
  - he has annulled the covenant
  lexicon: HALOT
  rationale: The phrase commonly means to break or violate a covenant. 'Covenant'
    is retained rather than 'treaty' because בְּרִית is a key biblical term and the
    text does not require reducing it to merely political language, though the immediate
    context may involve an international pact.
- source_word: מָאַס עָרִים
  chosen: despised the cities
  alternatives:
  - rejected the cities
  - despised witnesses
  lexicon: HALOT
  rationale: The MT reads 'cities' (עָרִים), yielding a straightforward sense of contempt
    shown toward urban centers. Some ancient versions support a different reading
    such as 'witnesses,' but the consonantal Hebrew here supports 'cities,' so that
    is kept in the main text.
- source_word: לֹא חָשַׁב אֱנוֹשׁ
  chosen: regarded no man
  alternatives:
  - he does not esteem man
  - he has no regard for anyone
  - he did not consider mortal man
  lexicon: HALOT
  rationale: The idiom expresses lack of regard for human beings. 'Regarded no man'
    preserves the singular אֱנוֹשׁ and follows the project's gender-accurate policy
    for generic masculine terms, while remaining understandable in context.
