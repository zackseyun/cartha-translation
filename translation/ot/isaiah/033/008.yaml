theological_decisions:
- issue: Rendering of אֱנוֹשׁ as generic masculine
  chosen_reading: man
  alternative_readings:
  - anyone
  - humanity
  - people
  rationale: The Hebrew singular generic masculine is preserved as 'man' in keeping
    with the project's gender-accurate-over-gender-neutral policy. The phrase means
    lack of regard for human beings generally, but the source form is singular masculine.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Reference of the third-person singular verbs in the second half of the verse
  chosen_reading: left as an unspecified singular 'he'
  alternative_readings:
  - the enemy/treacherous one
  - the treaty-breaker
  - impersonal/general subject
  rationale: The Hebrew uses singular verbs without explicitly naming the subject
    in this verse. English can preserve that ambiguity with 'he,' avoiding over-interpretation
    from the wider context while still producing readable syntax.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
