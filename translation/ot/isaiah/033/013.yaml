id: ISA.33.13
reference: Isaiah 33:13
source:
  edition: WLC
  text: שִׁמְע֥וּ רְחוֹקִ֖ים אֲשֶׁ֣ר עָשִׂ֑יתִי וּ/דְע֥וּ קְרוֹבִ֖ים גְּבֻרָתִֽ/י׃
translation:
  text: Hear, you who are far away, what I have done; and know, you who are near,
    my might.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those far off' / 'those near.' The Hebrew uses plural adjectives substantivally
      for groups addressed from afar and nearby.
    reason: lexical_alternative
  - marker: b
    text: Or 'my strength' or 'my power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' preserves the direct summons and prophetic
    tone more formally than 'listen,' while remaining natural English.
- source_word: רְחוֹקִים
  chosen: you who are far away
  alternatives:
  - distant ones
  - those far off
  lexicon: HALOT
  rationale: Adjectival plural used substantivally. Rendering with 'you who are far
    away' makes the vocative force clear in idiomatic English and preserves the contrast
    with 'near.'
- source_word: אֲשֶׁר עָשִׂיתִי
  chosen: what I have done
  alternatives:
  - that which I did
  - what I did
  lexicon: HALOT
  rationale: Relative particle plus perfect 1cs. 'What I have done' is natural English
    and can reflect the completed action with present relevance in prophetic discourse.
- source_word: וּדְעוּ
  chosen: and know
  alternatives:
  - and acknowledge
  - and understand
  lexicon: HALOT
  rationale: Imperative plural of ידע. 'Know' is the most direct equivalent and fits
    the parallelism with 'hear.' 'Acknowledge' is interpretive and stronger than the
    Hebrew requires.
- source_word: קְרוֹבִים
  chosen: you who are near
  alternatives:
  - near ones
  - those nearby
  lexicon: HALOT
  rationale: Adjectival plural used substantivally in vocative parallel to רְחוֹקִים.
    'You who are near' preserves the rhetorical contrast and reads naturally.
- source_word: גְּבֻרָתִי
  chosen: my might
  alternatives:
  - my strength
  - my power
  - my mighty deed
  lexicon: HALOT
  rationale: גְּבוּרָה commonly denotes strength, might, or mighty power. 'My might'
    best captures the abstract noun here and suits the context of YHWH's demonstrated
    powerful action. 'My mighty deed' is possible contextually but is more interpretive
    than the noun itself.
