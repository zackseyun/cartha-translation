theological_decisions:
- issue: Identity of the speaker implied by first-person verbs and suffixes
  chosen_reading: The speaker is the LORD, continuing the divine speech context, but
    the verse is translated without adding the divine name not present in the Hebrew
    line.
  rationale: The first-person forms ('I have done,' 'my might') refer contextually
    to YHWH, yet the translation should not import an explicit subject where the verse
    itself leaves it implicit.
  doctrine_reference: Translation philosophy §1, §3
