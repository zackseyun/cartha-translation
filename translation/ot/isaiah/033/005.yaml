id: ISA.33.5
reference: Isaiah 33:5
source:
  edition: WLC
  text: נִשְׂגָּ֣ב יְהוָ֔ה כִּ֥י שֹׁכֵ֖ן מָר֑וֹם מִלֵּ֣א צִיּ֔וֹן מִשְׁפָּ֖ט וּ/צְדָקָֽה׃
translation:
  text: Yahweh is exalted, for he dwells on high; he has filled Zion with justice and righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwells in the heights.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׂגָּב
  chosen: is exalted
  alternatives:
  - is lofty
  - is raised high
  lexicon: HALOT
  rationale: The passive/stative sense conveys YHWH's supreme elevation or exalted status. 'Is exalted' is idiomatic modern English and preserves both the vertical imagery and honorific force better than the less natural 'is set on high.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces the ground for the preceding assertion: the LORD is exalted because/for he dwells on high. ''For'' is concise and natural in elevated English style.'
- source_word: שֹׁכֵן מָרוֹם
  chosen: he dwells on high
  alternatives:
  - he inhabits the height
  - he dwells in the heights
  lexicon: HALOT
  rationale: The participle plus noun expresses ongoing residence in the exalted realm. 'Dwells on high' is a natural English rendering that preserves the spatial imagery without sounding wooden.
- source_word: מִלֵּא
  chosen: he has filled
  alternatives:
  - he fills
  - he filled
  lexicon: HALOT
  rationale: 'The perfect verb is best rendered here as a completed action with present result: Zion stands filled by the LORD with justice and righteousness. Present ''fills'' is possible as a gnomic rendering, but the perfective sense is better retained by ''has filled.'''
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Standard transliteration of the place name preserves the covenantal and poetic resonance of the Hebrew.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: In this pairing with צְדָקָה, the sense is ethical and societal right order rather than merely judicial verdict. 'Justice' is the clearest modern English equivalent.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - right order
  lexicon: HALOT
  rationale: In the common Hebrew pairing משפט וצדקה, the two terms are related but not identical. Rendering צְדָקָה as 'righteousness' preserves the moral rectitude dimension and avoids collapsing both nouns into the same English term.
