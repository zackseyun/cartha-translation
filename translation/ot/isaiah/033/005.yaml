theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves reverential convention without importing additional theological
    claims.
  doctrine_reference: 'DOCTRINE.md — Contested terms: יְהוָה YHWH'
- issue: Pairing of מִשְׁפָּט וּצְדָקָה
  chosen_reading: justice and righteousness
  alternative_readings:
  - judgment and righteousness
  - justice and justice
  rationale: The verse presents a classic covenantal pair describing the LORD's moral
    governance. Translating the terms distinctly preserves the theological breadth
    of both social justice and moral righteousness rather than flattening them into
    near-synonyms.
  doctrine_reference: 'DOCTRINE.md — Translation philosophy #5 (consistency of key
    terms, or documented exception)'
