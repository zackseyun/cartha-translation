  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md — Contested terms: יְהוָה YHWH'
- issue: Pairing of מִשְׁפָּט וּצְדָקָה
  chosen_reading: justice and righteousness
  alternative_readings:
  - judgment and righteousness
  - justice and justice
  rationale: The verse presents a classic covenantal pair describing the LORD's moral governance. Translating the terms distinctly preserves the theological breadth of both social justice and moral righteousness rather than flattening them into near-synonyms.
