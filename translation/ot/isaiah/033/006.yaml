id: ISA.33.6
reference: Isaiah 33:6
source:
  edition: WLC
  text: וְ/הָיָה֙ אֱמוּנַ֣ת עִתֶּ֔י/ךָ חֹ֥סֶן יְשׁוּעֹ֖ת חָכְמַ֣ת וָ/דָ֑עַת יִרְאַ֥ת יְהוָ֖ה הִ֥יא אוֹצָרֽ/וֹ׃ס
translation:
  text: And he will be the stability of your times, a wealth of salvation, wisdom, and knowledge; the fear of Yahweh is his treasure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'There will be stability in your times'; the Hebrew verb can be read impersonally rather than with 'he' as the subject.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'salvations,' likely an intensive plural meaning abundant salvation or many deliverances.
    reason: lexical_alternative
  - marker: c
    text: Or, 'the fear of the LORD is your treasure' or 'its treasure'; the referent of the final suffix is debated.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: And he will be
  alternatives:
  - And it will be
  - And there will be
  lexicon: HALOT
  rationale: The verb is singular masculine ('and he/it will be'). Given the immediate context in Isaiah 33, the masculine singular most naturally refers back to the LORD rather than functioning as an impersonal 'there will be.' Rendering 'he will be' preserves the personal subject implied by the Hebrew.
- source_word: אֱמוּנַת
  chosen: the stability of
  alternatives:
  - faithfulness of
  - steadfastness of
  lexicon: HALOT
  rationale: The noun can denote firmness, faithfulness, or reliability. In construct with 'your times,' the sense is not subjective faith but objective stability/reliability characterizing the times. 'Stability' communicates the contextual sense in natural English.
- source_word: עִתֶּיךָ
  chosen: your times
  alternatives:
  - your seasons
  - your days
  lexicon: HALOT
  rationale: The plural of 'time/season' with second masculine singular suffix is best rendered 'your times.' This preserves the temporal breadth of the Hebrew better than the narrower 'days.'
- source_word: חֹסֶן
  chosen: an abundance of
  alternatives:
  - wealth of
  - riches of
  - strength of
  lexicon: HALOT
  rationale: The noun can denote wealth, treasure, or abundance, and in this collocation it introduces the rich supply of what follows. 'An abundance of' fits the appositional list 'salvation, wisdom, and knowledge' better than the more concrete 'wealth' or the less fitting 'strength.'
- source_word: יְשׁוּעוֹת
  chosen: salvation
  alternatives:
  - victories
  - deliverances
  lexicon: HALOT
  rationale: Though plural in Hebrew, the plural often functions abstractly/intensively. 'Salvation' is the most idiomatic English rendering here, while preserving the theological sense of divine deliverance. 'Deliverances' is possible but less natural in this summary list.
- source_word: חָכְמַת
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering of the construct form; part of the coordinated list of blessings.
- source_word: וָדָעַת
  chosen: and knowledge
  lexicon: HALOT
  rationale: Straightforward rendering of the coordinated noun with conjunction.
- source_word: יִרְאַת יְהוָה
  chosen: the fear of the LORD
  alternatives:
  - fear of Yahweh
  lexicon: HALOT
  rationale: This is a standard covenantal expression denoting reverent fear toward God. Per doctrine guidelines, יְהוָה is rendered 'the LORD,' not transliterated.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: הִיא אוֹצָרוֹ
  chosen: is his treasure
  alternatives:
  - is its treasure
  - is his storehouse
  lexicon: HALOT
  rationale: The feminine pronoun refers back to 'the fear of the LORD'; אוֹצָר commonly means treasure/store. The 3ms suffix is best taken as 'his,' likely referring to the same masculine singular subject as earlier in the verse or to the person addressed in context. 'His treasure' is the most natural and traditional construal, while 'its treasure' is grammatically possible but less likely in context.
