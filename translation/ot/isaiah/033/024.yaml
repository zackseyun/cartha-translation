theological_decisions:
- issue: Relation between physical healing and forgiveness in the verse
  chosen_reading: The verse presents both the absence of sickness and the forgiveness/removal
    of iniquity for Zion's people, without forcing a systematic claim that all sickness
    is directly caused by personal sin.
  alternative_readings:
  - The healing language is purely metaphorical for spiritual restoration
  - The verse teaches a one-to-one causal link between individual sickness and individual
    sin
  rationale: The Hebrew places the two blessings side by side in a restoration context.
    The translation preserves both dimensions without importing a stricter doctrinal
    conclusion than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
