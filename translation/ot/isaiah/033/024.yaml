id: ISA.33.24
reference: Isaiah 33:24
source:
  edition: WLC
  text: וּ/בַל יֹאמַ֥ר שָׁכֵ֖ן חָלִ֑יתִי הָ/עָ֛ם הַ/יֹּשֵׁ֥ב בָּ֖/הּ נְשֻׂ֥א עָוֺֽן־׃
translation:
  text: And no inhabitant will say, “I am sick”; the people who dwell there are forgiven
    their iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'their guilt is borne away' or 'their sin is lifted.' The Hebrew idiom
      literally speaks of iniquity being carried/removed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַל
  chosen: And no
  alternatives:
  - and not
  - and none
  lexicon: HALOT
  rationale: בל with prefixed conjunction introduces a negated future statement. 'And
    no' idiomatically sets up the clause in English while preserving the conjunction
    and strong negation.
- source_word: יֹאמַר
  chosen: will say
  alternatives:
  - shall say
  - says
  lexicon: HALOT
  rationale: Imperfect 3ms here has future sense in prophetic discourse. 'Will say'
    is natural modern English.
- source_word: שָׁכֵן
  chosen: inhabitant
  alternatives:
  - one dwelling
  - resident
  lexicon: HALOT
  rationale: The singular participial/adjectival form refers generically to a person
    dwelling in the city. 'Inhabitant' is concise and idiomatic.
- source_word: חָלִיתִי
  chosen: I am sick
  alternatives:
  - I am ill
  - I have become weak
  lexicon: HALOT
  rationale: From חלה, denoting sickness/weakness. In direct speech, present English
    'I am sick' best conveys the resulting state, not merely a past event.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עם commonly means 'people.' Here it refers to the collective population
    rather than emphasizing nationhood as a political entity.
- source_word: הַיֹּשֵׁב בָּהּ
  chosen: who dwell there
  alternatives:
  - who live in her
  - who sit in her
  lexicon: HALOT
  rationale: The singular participle with collective subject functions distributively.
    'There' avoids awkward personification in English while preserving location. 'Dwell'
    retains the settled-residence nuance of ישב.
- source_word: נְשֻׂא
  chosen: are forgiven
  alternatives:
  - is borne away
  - is lifted
  - is carried
  lexicon: HALOT
  rationale: Passive participle of נשׂא with עון is an idiom for guilt/iniquity being
    borne away or forgiven. 'Are forgiven' communicates the idiomatic sense clearly
    in English.
- source_word: עָוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - sin
  lexicon: HALOT
  rationale: עון can denote iniquity, guilt, or punishment for guilt. Here, with נשׂא,
    it points to moral guilt being removed. 'Iniquity' preserves the moral-theological
    weight; 'guilt' is a viable nuance but less traditional in this idiom.
