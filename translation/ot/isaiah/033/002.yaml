theological_decisions:
- issue: Pronoun in זְרֹעָם
  chosen_reading: their arm
  alternative_readings:
  - our arm
  rationale: The consonantal text with 3mp suffix most naturally yields 'their arm.' This likely refers to the people's arm/strength collectively, creating a shift from 'us' to 'their' within the communal prayer. Because some interpreters and versions smooth the line to 'our arm' for contextual consistency, that alternative is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
