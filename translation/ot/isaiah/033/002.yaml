id: ISA.33.2
reference: Isaiah 33:2
source:
  edition: WLC
  text: יְהוָ֥ה חָנֵּ֖/נוּ לְ/ךָ֣ קִוִּ֑ינוּ הֱיֵ֤ה זְרֹעָ/ם֙ לַ/בְּקָרִ֔ים אַף יְשׁוּעָתֵ֖/נוּ בְּ/עֵ֥ת צָרָֽה־׃
translation:
  text: O Yahweh, be gracious to us; we wait for you. Be our arm every morning, also our salvation in the time of distress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our arm every morning.' The Hebrew text reads 'their arm,' but some understand it as a collective reference to the praying people and render it with 'our' for smoother English.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  - O Jehovah
  lexicon: HALOT
  rationale: Rendered as 'LORD' per doctrine default for the divine name יְהוָה, with 'O' reflecting direct address in prayer.
- source_word: חָנֵּנוּ
  chosen: be gracious to us
  alternatives:
  - show us favor
  - have mercy on us
  lexicon: HALOT
  rationale: Imperative of חנן with 1cp suffix asks for favor/grace. 'Be gracious to us' is idiomatic, prayerful, and preserves the covenantal appeal better than the more interpretive 'have mercy on us'.
- source_word: לְךָ קִוִּינוּ
  chosen: we wait for you
  alternatives:
  - we hope in you
  - we have waited for you
  lexicon: HALOT
  rationale: קוה commonly carries the sense of waiting with hope/trust. 'Wait for you' preserves the verbal image and avoids over-resolving into purely emotional 'hope in you.' Present English is used for a gnomic/prayer context, though a perfect nuance ('have waited') is possible.
- source_word: הֱיֵה
  chosen: Be
  alternatives:
  - become
  lexicon: HALOT
  rationale: Imperative of היה in a petition; simple 'Be' best fits the predicative request.
- source_word: זְרֹעָם
  chosen: their arm
  alternatives:
  - their strength
  - their power
  lexicon: HALOT
  rationale: זְרוֹעַ literally means 'arm' and often metaphorically denotes strength or saving power. The literal image is retained in the main text to preserve Hebrew metaphor; functional alternatives are noted.
- source_word: לַבְּקָרִים
  chosen: every morning
  alternatives:
  - in the mornings
  - morning by morning
  lexicon: HALOT
  rationale: Plural 'mornings' with prefixed preposition/article expresses repeated daily action. 'Every morning' is natural modern English and preserves the iterative sense.
- source_word: אַף
  chosen: also
  alternatives:
  - indeed
  - even
  lexicon: HALOT
  rationale: אַף here adds an intensifying/additive element linking the second petition to the first. 'Also' is the clearest connective in English.
- source_word: יְשׁוּעָתֵנוּ
  chosen: our salvation
  alternatives:
  - our deliverance
  - our rescue
  lexicon: HALOT
  rationale: יְשׁוּעָה can denote salvation/deliverance. 'Salvation' preserves the broader theological and existential scope, while still fitting the immediate context of rescue from trouble.
- source_word: בְּעֵת צָרָה
  chosen: in the time of distress
  alternatives:
  - at the time of trouble
  - in time of trouble
  lexicon: HALOT
  rationale: צָרָה denotes distress, trouble, or adversity. 'In the time of distress' is natural and weighty without sounding archaic.
