theological_decisions:
- issue: Ethical participles introduced without explicit relative pronoun in Hebrew
  chosen_reading: He who ...
  alternative_readings:
  - The one walking ...
  - Whoever walks ...
  rationale: English requires a subject for the chain of participles. 'He who' preserves
    the singular masculine representative force of the Hebrew participles in keeping
    with the gender-accurate policy, without flattening the verse into abstract qualities.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of צְדָקוֹת
  chosen_reading: righteousness
  alternative_readings:
  - justice
  - righteous deeds
  rationale: Although the Hebrew root can overlap with justice, this verse catalogs
    the character of the person fit to dwell with God. 'Righteousness' best preserves
    the broader moral scope; 'justice' is preserved as a lexical alternative rather
    than elevated as the main theological reading.
  doctrine_reference: DOCTRINE.md §Contested terms (δικαιοσύνη analogy on righteousness/justice
    tension)
