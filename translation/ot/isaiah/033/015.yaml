id: ISA.33.15
reference: Isaiah 33:15
source:
  edition: WLC
  text: הֹלֵ֣ךְ צְדָק֔וֹת וְ/דֹבֵ֖ר מֵֽישָׁרִ֑ים מֹאֵ֞ס בְּ/בֶ֣צַע מַעֲשַׁקּ֗וֹת נֹעֵ֤ר
    כַּפָּי/ו֙ מִ/תְּמֹ֣ךְ בַּ/שֹּׁ֔חַד אֹטֵ֤ם אָזְנ/וֹ֙ מִ/שְּׁמֹ֣עַ דָּמִ֔ים וְ/עֹצֵ֥ם
    עֵינָ֖י/ו מֵ/רְא֥וֹת בְּ/רָֽע׃
translation:
  text: He who walks in righteousness and speaks what is upright, who despises gain
    from extortions, who shakes his hands free from taking a bribe, who stops his
    ear from hearing of bloodshed, and shuts his eyes from looking on evil—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'walks in righteous deeds' or 'walks in justice.'
    reason: lexical_alternative
  - marker: b
    text: Or 'profit from oppression.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'bloods,' an idiom for bloodshed or bloodguilt.
    reason: cultural_note
lexical_decisions:
- source_word: הֹלֵךְ
  chosen: walks
  alternatives:
  - lives
  - conducts himself
  lexicon: HALOT
  rationale: הלך in participial ethical contexts commonly denotes one's manner of
    life or conduct. 'Walks' preserves the Hebrew metaphor and remains natural in
    English.
- source_word: צְדָקוֹת
  chosen: righteousness
  alternatives:
  - righteous deeds
  - justice
  lexicon: HALOT
  rationale: Plural abstract/qualitative usage after 'walks' is best rendered as the
    English abstract 'righteousness.' 'Justice' is possible in some contexts, but
    here the verse lists personal ethical traits broadly, not only judicial equity.
- source_word: דֹבֵר מֵישָׁרִים
  chosen: speaks what is upright
  alternatives:
  - speaks upright things
  - speaks honestly
  - speaks straightness
  lexicon: HALOT
  rationale: מֵישָׁרִים denotes uprightness/straightness/equity. 'Speaks what is upright'
    preserves the moral sense while reading naturally in English.
- source_word: מֹאֵס
  chosen: despises
  alternatives:
  - rejects
  - spurns
  lexicon: HALOT
  rationale: The participle conveys strong moral revulsion, stronger than mere refusal.
    'Despises' captures that evaluative force.
- source_word: בֶּצַע מַעֲשַׁקּוֹת
  chosen: gain from extortions
  alternatives:
  - profit from oppression
  - dishonest gain from acts of oppression
  lexicon: HALOT
  rationale: בצע is unjust gain/profit; מעשקות refers to acts of oppression or extortion.
    'Gain from extortions' is concise and preserves the plural sense of repeated oppressive
    acts better than a flatter 'dishonest gain.'
- source_word: נֹעֵר כַּפָּיו
  chosen: shakes his hands free
  alternatives:
  - shakes his hands
  - gestures refusal with his hands
  lexicon: HALOT
  rationale: The idiom suggests a physical sign of refusing involvement or clearing
    oneself from illicit receipt. 'Shakes his hands free' makes the implied separation
    explicit in idiomatic English without over-paraphrasing.
- source_word: מִתְּמֹךְ בַּשֹּׁחַד
  chosen: from taking a bribe
  alternatives:
  - from grasping a bribe
  - from accepting a bribe
  lexicon: HALOT
  rationale: The infinitive with תמך literally involves taking/holding, but in context
    refers to receiving a bribe. 'Taking a bribe' is the clearest modern equivalent.
- source_word: אֹטֵם אָזְנוֹ
  chosen: stops his ear
  alternatives:
  - shuts his ear
  - closes his ear
  lexicon: HALOT
  rationale: The singular 'ear' is retained to reflect the Hebrew idiom. 'Stops' fits
    the verb's sense of shutting up or blocking.
- source_word: מִשְּׁמֹעַ דָּמִים
  chosen: from hearing of bloodshed
  alternatives:
  - from hearing bloodshed
  - from listening to plans of bloodshed
  - from hearing about bloodguilt
  lexicon: HALOT
  rationale: דמים often denotes bloodshed or bloodguilt. Here, in a vice-avoidance
    list, 'hearing of bloodshed' naturally conveys refusing complicity in violent
    schemes or reports of murderous wrongdoing.
- source_word: עֹצֵם עֵינָיו
  chosen: shuts his eyes
  alternatives:
  - closes his eyes
  lexicon: HALOT
  rationale: A straightforward rendering of the participial phrase; 'shuts' pairs
    well with 'stops his ear' and preserves the active refusal.
- source_word: מֵרְאוֹת בְּרָע
  chosen: from looking on evil
  alternatives:
  - from seeing evil
  - from gazing at evil
  - from looking upon evil
  lexicon: HALOT
  rationale: The construction expresses deliberate avoidance. 'Looking on evil' is
    idiomatic and broad enough to include both participation in and indulgent attention
    to evil.
