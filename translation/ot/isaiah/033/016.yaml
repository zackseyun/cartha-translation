id: ISA.33.16
reference: Isaiah 33:16
source:
  edition: WLC
  text: ה֚וּא מְרוֹמִ֣ים יִשְׁכֹּ֔ן מְצָד֥וֹת סְלָעִ֖ים מִשְׂגַּבּ֑/וֹ לַחְמ֣/וֹ נִתָּ֔ן
    מֵימָ֖י/ו נֶאֱמָנִֽים׃
translation:
  text: He will dwell on the heights; rocky fortresses will be his refuge; his bread
    will be given, his water will be sure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his stronghold' for 'his refuge'; the Hebrew term denotes a secure,
      elevated place of protection.
    reason: lexical_alternative
  - marker: b
    text: Or 'his water will not fail.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְרוֹמִים
  chosen: on the heights
  alternatives:
  - in high places
  - in the heights
  lexicon: HALOT
  rationale: Plural noun from מרום denotes elevated places/heights. 'On the heights'
    is idiomatic in English and preserves the spatial imagery of security and exalted
    elevation.
- source_word: יִשְׁכֹּן
  chosen: will dwell
  alternatives:
  - will live
  - will abide
  lexicon: HALOT
  rationale: Qal imperfect of שכן commonly means 'dwell' or 'settle.' 'Will dwell'
    preserves the durative sense and fits the security motif better than the more
    generic 'live.'
- source_word: מְצָדוֹת סְלָעִים
  chosen: rocky fortresses
  alternatives:
  - fortresses of rocks
  - mountain strongholds
  - rock fortresses
  lexicon: HALOT
  rationale: Construct phrase literally 'fortresses of rocks.' 'Rocky fortresses'
    gives natural English while retaining the image of inaccessible, defensible crags.
- source_word: מִשְׂגַּבּוֹ
  chosen: his refuge
  alternatives:
  - his high refuge
  - his stronghold
  - his secure height
  lexicon: HALOT
  rationale: The noun denotes a high, secure place of protection. 'Refuge' communicates
    the protective function clearly; the preceding 'rocky fortresses' already carries
    the height/stronghold imagery, so this avoids awkward repetition while preserving
    sense.
- source_word: לַחְמוֹ
  chosen: his bread
  alternatives:
  - his food
  lexicon: HALOT
  rationale: Literal 'his bread' is retained rather than generalized to 'food,' since
    the Hebrew uses the concrete term and it works naturally in English as a metonym
    for provision.
- source_word: נִתָּן
  chosen: will be given
  alternatives:
  - is given
  - has been given
  lexicon: HALOT
  rationale: Niphal participle/passive can function predicatively. In this future-oriented
    context with surrounding imperfect/predicative promises, 'will be given' best
    reflects the promise of provision.
- source_word: מֵימָיו
  chosen: his water
  alternatives:
  - his waters
  lexicon: HALOT
  rationale: Though morphologically plural, מים is commonly rendered as the mass noun
    'water' in English. Singular English is more natural while preserving the sense
    of necessary provision.
- source_word: נֶאֱמָנִים
  chosen: will be sure
  alternatives:
  - will be reliable
  - will not fail
  - are sure
  lexicon: HALOT
  rationale: The adjective/participle conveys firmness, reliability, trustworthiness.
    'Will be sure' is concise, idiomatic, and fits the promise that his water supply
    is dependable.
- source_word: הוּא
  chosen: He
  alternatives:
  - That man
  - He himself
  lexicon: HALOT
  rationale: The pronoun refers back to the righteous person described in the previous
    verse. 'He' preserves the masculine singular reference in keeping with the gender-accurate
    policy and the immediate context.
