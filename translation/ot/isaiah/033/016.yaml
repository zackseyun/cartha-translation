theological_decisions:
- issue: Referent of the masculine singular pronoun
  chosen_reading: The verse speaks of the righteous man described in the preceding
    context, not directly of God or the Messiah.
  alternative_readings:
  - A more generalized statement about the righteous person
  - A typological application to the faithful remnant
  rationale: The immediate context (Isa 33:15) lists the traits of the one who walks
    righteously; verse 16 then states the blessings promised to that person. The translation
    therefore keeps the singular masculine pronoun without importing a more specific
    messianic referent not demanded by the text.
  doctrine_reference: 'Translation philosophy §4 (Gender-accurate over gender-neutral);
    Affirmations: do not import doctrinal claims the text does not make.'
