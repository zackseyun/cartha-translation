id: ISA.33.18
reference: Isaiah 33:18
source:
  edition: WLC
  text: לִבְּ/ךָ֖ יֶהְגֶּ֣ה אֵימָ֑ה אַיֵּ֤ה סֹפֵר֙ אַיֵּ֣ה שֹׁקֵ֔ל אַיֵּ֖ה סֹפֵ֥ר
    אֶת הַ/מִּגְדָּלִֽים־׃
translation:
  text: 'Your heart will meditate on terror: “Where is the scribe? Where is the one
    who weighs? Where is the one who counts the towers?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will ponder terror' or 'will muse on terror.' The Hebrew verb can denote
      inward musing or low utterance.
    reason: lexical_alternative
  - marker: b
    text: '''The scribe ... the one who weighs ... the one who counts the towers''
      likely refers to foreign officials involved in assessment, tribute, or siege
      calculations.'
    reason: cultural_note
lexical_decisions:
- source_word: לִבְּךָ
  chosen: your heart
  alternatives:
  - your mind
  lexicon: HALOT
  rationale: לֵב/לֵבָב commonly denotes the inner person, including thought and reflection.
    'Heart' preserves the Hebrew anthropological term, while the following verb of
    musing shows cognitive activity.
- source_word: יֶהְגֶּה
  chosen: will meditate on
  alternatives:
  - will muse on
  - will mutter about
  - will ponder
  lexicon: HALOT
  rationale: הגה can denote low utterance, musing, or meditation. In this context
    of inward recollection after crisis, 'will meditate on' or 'will ponder' fits
    better than a vocal sense. 'Meditate on' is idiomatic and preserves the reflective
    nuance.
- source_word: אֵימָה
  chosen: terror
  alternatives:
  - dread
  - fright
  lexicon: HALOT
  rationale: The noun denotes terror or dread. 'Terror' best captures the intensity
    and matches the context of recalling a former threat.
- source_word: אַיֵּה
  chosen: Where is
  alternatives:
  - Where are
  lexicon: HALOT
  rationale: The repeated interrogative is singular in each clause because each participle
    is singular. Rendering each occurrence as 'Where is' preserves the rhetorical
    taunt.
- source_word: סֹפֵר
  chosen: the scribe
  alternatives:
  - the recorder
  - the secretary
  - the counter
  lexicon: HALOT
  rationale: ספר as a participial noun can mean one who writes, records, or counts.
    In this military-administrative context, 'scribe' is the most established and
    plausible role, likely an official who recorded tribute or military data.
- source_word: שֹׁקֵל
  chosen: the one who weighs
  alternatives:
  - the weigher
  lexicon: HALOT
  rationale: The participle from שקל literally means 'weighing.' It likely refers
    to weighing tribute silver or assessed payment. A transparent verbal rendering
    avoids over-specifying the office.
- source_word: סֹפֵר אֶת הַמִּגְדָּלִים
  chosen: the one who counts the towers
  alternatives:
  - the one who records the towers
  - the one who surveys the towers
  lexicon: HALOT
  rationale: Here ספר most naturally means 'count' in relation to towers. The phrase
    likely evokes an enemy or assessor counting defensive structures. 'Counts the
    towers' is the plainest rendering.
- source_word: הַמִּגְדָּלִים
  chosen: the towers
  alternatives:
  - the watchtowers
  - the fortifications
  lexicon: HALOT
  rationale: מגדלים are towers. While military towers or fortifications are in view,
    the simple 'towers' preserves the concrete image without interpretive expansion.
