id: ISA.33.12
reference: Isaiah 33:12
source:
  edition: WLC
  text: וְ/הָי֥וּ עַמִּ֖ים מִשְׂרְפ֣וֹת שִׂ֑יד קוֹצִ֥ים כְּסוּחִ֖ים בָּ/אֵ֥שׁ יִצַּֽתּוּ׃ס
translation:
  text: And the peoples will become burnings of lime; like cut thornbushes, they will
    be burned in the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will ignite' / 'they will be kindled.' The Hebrew verb can emphasize
      catching fire as well as being consumed by it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  chosen: And ... will become
  alternatives:
  - and ... will be
  lexicon: HALOT
  rationale: The verb היה with a predicate noun commonly carries the sense 'become'
    in contexts of transformation. Here it introduces the result of judgment, so 'will
    become' better reflects the movement into a new state than a flat 'will be.'
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - peoples
  - nations
  lexicon: HALOT
  rationale: The plural of עם often refers to peoples or nations collectively. 'The
    peoples' preserves the plural and the broad corporate scope better than the more
    interpretive 'nations.'
- source_word: מִשְׂרְפוֹת
  chosen: burnings
  alternatives:
  - burning places
  - things burned
  lexicon: HALOT
  rationale: The noun denotes burnings or burning-products. Retaining the concrete
    plural 'burnings' preserves the compressed poetic image rather than expanding
    it interpretively.
- source_word: שִׂיד
  chosen: lime
  alternatives:
  - plaster
  - whitewash
  lexicon: HALOT
  rationale: In this context the word refers to lime produced by burning limestone,
    fitting the image of intense destruction. 'Plaster' or 'whitewash' would obscure
    the combustion imagery.
- source_word: מִשְׂרְפוֹת שִׂיד
  chosen: burnings of lime
  alternatives:
  - lime burnings
  - as when lime is burned
  lexicon: HALOT
  rationale: The construct chain is terse and metaphorical. 'Burnings of lime' keeps
    the Hebrew imagery and allows readers to hear the comparison without over-paraphrasing
    it into a full simile.
- source_word: קוֹצִים
  chosen: thornbushes
  alternatives:
  - thorns
  lexicon: HALOT
  rationale: Although literally 'thorns,' in English the plural here naturally evokes
    thorny brush gathered for burning. 'Thornbushes' communicates the combustible
    vegetation image more clearly.
- source_word: כְּסוּחִים
  chosen: cut
  alternatives:
  - cut down
  - hewn
  lexicon: HALOT
  rationale: 'The passive participle means cut off/down. ''Cut'' is concise and natural
    in English, while the following clause supplies the result: they are burned in
    the fire.'
- source_word: בָּאֵשׁ
  chosen: in the fire
  alternatives:
  - with fire
  - by fire
  lexicon: HALOT
  rationale: The preposition with the article is most naturally rendered locatively
    here. 'In the fire' matches the image of brush thrown into flames.
- source_word: יִצַּתּוּ
  chosen: they will be burned
  alternatives:
  - they will be kindled
  - they will ignite
  lexicon: HALOT
  rationale: The verb can mean kindle or set on fire, but with thornbushes as subject
    in a judgment image, the passive-result sense 'will be burned' is the clearest
    idiomatic English rendering. The alternative is preserved in a footnote because
    the Hebrew image may also suggest ignition.
