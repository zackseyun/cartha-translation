theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Metaphorical force of the LORD as protective waterways
  chosen_reading: the LORD in majesty will be for us a place of rivers, of broad streams
  alternative_readings:
  - there the majestic LORD will be for us like broad rivers and streams
  rationale: The Hebrew identifies the LORD himself as the protective 'place' characterized by inaccessible waterways. The translation preserves the metaphor without flattening it into a mere simile, while still making the image intelligible.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve the source text''s plain sense; do not paraphrase beyond what the source warrants'
