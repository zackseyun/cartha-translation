id: ISA.33.21
reference: Isaiah 33:21
source:
  edition: WLC
  text: כִּ֣י אִם שָׁ֞ם אַדִּ֤יר יְהוָה֙ לָ֔/נוּ מְקוֹם נְהָרִ֥ים יְאֹרִ֖ים רַחֲבֵ֣י יָדָ֑יִם בַּל תֵּ֤לֶךְ בּ/וֹ֙ אֳנִי שַׁ֔יִט וְ/צִ֥י אַדִּ֖יר לֹ֥א יַעַבְרֶֽ/נּוּ־־־־׃
translation:
  text: But there the majestic Yahweh will be for us a place of rivers, of broad streams, where no rowing ship can go, and no mighty vessel can pass through.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the majestic LORD will be there for us, a place of rivers and streams.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'broad of hands,' an idiom for very wide waterways.
    reason: cultural_note
  - marker: c
    text: Or 'oared ship'; the Hebrew refers to a vessel used in active navigation.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: But
  alternatives:
  - Indeed
  - Surely
  - Rather
  lexicon: HALOT
  rationale: In this context the compound introduces a strong contrast/resumption from the preceding threat, best carried by 'But' in natural English rather than a more wooden 'for if' or 'indeed.'
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Retains the locative emphasis pointing to Zion's secure location.
- source_word: אַדִּיר יְהוָה
  chosen: the LORD in majesty
  alternatives:
  - the majestic LORD
  - the LORD, majestic
  lexicon: HALOT
  rationale: אַדִּיר denotes majesty, might, nobility. Rendering it adverbially/predicatively with 'in majesty' preserves both the descriptive force and readable English. YHWH follows doctrine default as 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָנוּ
  chosen: for us
  alternatives:
  - to us
  lexicon: HALOT
  rationale: 'The preposition marks benefit/advantage here: the LORD will be for his people such a place of protection.'
- source_word: מְקוֹם
  chosen: a place
  alternatives:
  - a place like
  - a region of
  lexicon: HALOT
  rationale: The noun is retained rather than paraphrased away; the verse presents the LORD himself as the protective 'place' characterized by waterways.
- source_word: נְהָרִים יְאֹרִים
  chosen: of rivers, of broad streams
  alternatives:
  - of rivers and canals
  - of streams and channels
  lexicon: HALOT
  rationale: The paired water terms intensify the image of abundant, defensive waterways. 'Streams' is more idiomatic than 'canals,' while still allowing the second term to be distinguished from the first.
- source_word: רַחֲבֵי יָדָיִם
  chosen: broad streams
  alternatives:
  - wide on both sides
  - broad expanses
  - wide channels
  lexicon: HALOT
  rationale: Literally 'broad of hands/sides,' an idiom for great width. In English it naturally modifies the waterways as 'broad streams.'
- source_word: בַּל תֵּלֶךְ בּוֹ
  chosen: where no ... can go
  alternatives:
  - in which no ... goes
  - through which no ... travels
  lexicon: HALOT
  rationale: בַּל gives negation; the feminine verb likely agrees with the understood waterway/place. English idiom is best served by a relative clause, 'where no ... can go.'
- source_word: אֳנִי שַׁיִט
  chosen: rowing ship
  alternatives:
  - oared ship
  - galley
  - sailing ship
  lexicon: HALOT
  rationale: The phrase denotes a vessel propelled in active navigation, likely by oars. 'Rowing ship' is transparent modern English; 'galley' may be too specific historically, and 'sailing ship' misses the nuance of שַׁיִט.
- source_word: וְצִי אַדִּיר
  chosen: and no mighty vessel
  alternatives:
  - and no majestic ship
  - and no large fleet-ship
  lexicon: HALOT
  rationale: 'צִי is a ship/vessel; אַדִּיר again conveys might or impressiveness. ''Mighty vessel'' fits the military-imperial contrast: even powerful ships cannot traverse these waters.'
- source_word: לֹא יַעַבְרֶנּוּ
  chosen: can pass through
  alternatives:
  - will pass through it
  - can cross it
  lexicon: HALOT
  rationale: The suffix refers back to the watery place. 'Pass through' captures traversal of waterways and reads naturally in English.
