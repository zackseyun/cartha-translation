id: ISA.33.22
reference: Isaiah 33:22
source:
  edition: WLC
  text: כִּ֤י יְהוָה֙ שֹׁפְטֵ֔/נוּ יְהוָ֖ה מְחֹקְקֵ֑/נוּ יְהוָ֥ה מַלְכֵּ֖/נוּ ה֥וּא יוֹשִׁיעֵֽ/נוּ׃
translation:
  text: For Yahweh is our judge; Yahweh is our lawgiver; Yahweh is our king; he will save us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'our lawgiver' can also be rendered 'our legislator' or, in some contexts, 'our ruler.'
    reason: lexical_alternative
  - marker: b
    text: The divine name YHWH is rendered 'the LORD' here; alternatively, it could be transliterated 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding context. 'For' best preserves the connective force in natural English without over-specifying causation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שֹׁפְטֵנוּ
  chosen: our judge
  alternatives:
  - the one who judges us
  - our ruler
  lexicon: HALOT
  rationale: The participial/noun-like form denotes YHWH as judge. 'Our judge' is concise, natural, and preserves the judicial title.
- source_word: מְחֹקְקֵנוּ
  chosen: our lawgiver
  alternatives:
  - our legislator
  - our ruler
  lexicon: HALOT
  rationale: From a root associated with decreeing/inscribing statutes. 'Lawgiver' best captures the governing-legal sense in established but still readable English. 'Legislator' is possible but sounds more modern-political than the Hebrew register.
- source_word: מַלְכֵּנוּ
  chosen: our king
  alternatives:
  - our ruler
  lexicon: HALOT
  rationale: Straightforward royal title; 'king' preserves the monarchical imagery central to the verse.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The pronoun is explicit for emphasis. English can convey this adequately with 'he' in this climactic position; 'he himself' would be more emphatic but slightly heavier than the Hebrew requires in context.
- source_word: יוֹשִׁיעֵנוּ
  chosen: will save us
  alternatives:
  - will deliver us
  - is the one who saves us
  lexicon: HALOT
  rationale: Hiphil imperfect of ישׁע expresses future/resultative saving action. 'Will save us' is the most direct rendering and preserves the theological resonance of salvation language; 'deliver' is a viable contextual alternative but narrower.
