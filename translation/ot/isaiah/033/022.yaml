theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH.
    This also matches the elevated liturgical tone of the verse while preserving covenantal
    reference.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of מְחֹקְקֵנוּ
  chosen_reading: our lawgiver
  alternative_readings:
  - our legislator
  - our ruler
  rationale: 'The verse presents the LORD in a threefold civic-royal pattern: judge,
    lawgiver, king. ''Lawgiver'' preserves that theological-political triad without
    collapsing the middle term into a generic ''ruler.'''
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms,
    or documented exception)
