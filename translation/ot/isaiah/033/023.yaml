id: ISA.33.23
reference: Isaiah 33:23
source:
  edition: WLC
  text: נִטְּשׁ֖וּ חֲבָלָ֑יִ/ךְ בַּל יְחַזְּק֤וּ כֵן תָּרְנָ/ם֙ בַּל פָּ֣רְשׂוּ נֵ֔ס
    אָ֣ז חֻלַּ֤ק עַֽד שָׁלָל֙ מַרְבֶּ֔ה פִּסְחִ֖ים בָּ֥זְזוּ בַֽז־־־־׃
translation:
  text: Your ropes hang loose; they cannot hold firm the base of their mast; they
    cannot spread the sail. Then abundant plunder will be divided; even the lame will
    carry off the spoil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they cannot spread the banner/ensign.' The Hebrew word often means 'banner'
      or 'signal standard,' but 'sail' fits the ship imagery of the verse.
    reason: lexical_alternative
  - marker: b
    text: The verse continues the metaphor of a disabled ship to depict the downfall
      of the enemy and the ease with which spoil is taken.
    reason: cultural_note
lexical_decisions:
- source_word: נִטְּשׁוּ
  chosen: hang loose
  alternatives:
  - are loosed
  - are abandoned
  - are slack
  lexicon: HALOT
  rationale: The passive/perfect form conveys that the ropes are let loose or slackened.
    'Hang loose' gives a vivid nautical image in natural English without overparaphrasing.
- source_word: חֲבָלָיִךְ
  chosen: your ropes
  alternatives:
  - your cords
  lexicon: HALOT
  rationale: In the ship metaphor of the verse, 'ropes' is more contextually precise
    than the broader 'cords.' The 2fs suffix is preserved as 'your.'
- source_word: בַּל
  chosen: cannot
  alternatives:
  - do not
  - will not
  lexicon: HALOT
  rationale: Here בַּל functions as a strong negation with the following verbs. 'Cannot'
    best reflects incapacity in the broken-ship image rather than mere refusal.
- source_word: יְחַזְּקוּ
  chosen: hold firm
  alternatives:
  - strengthen
  - make fast
  lexicon: HALOT
  rationale: The verb means to make strong/firm. In nautical context, 'hold firm'
    communicates securing the mast structure in idiomatic English.
- source_word: כֵן
  chosen: base
  alternatives:
  - stand
  - socket
  - support
  lexicon: HALOT
  rationale: The noun is difficult and likely refers to a fixed support or stand.
    'Base' is a concise rendering that fits the mast imagery without claiming more
    precision than the Hebrew allows.
- source_word: תָּרְנָם
  chosen: their mast
  alternatives:
  - their mastpole
  lexicon: HALOT
  rationale: The noun denotes a mast. The 3mp suffix is retained as 'their,' though
    the antecedent is the metaphorical ship's equipment.
- source_word: פָּרְשׂוּ
  chosen: spread
  alternatives:
  - unfurl
  - stretch out
  lexicon: HALOT
  rationale: A common verb for spreading out. 'Spread' is simple and natural in English.
- source_word: נֵס
  chosen: the sail
  alternatives:
  - banner
  - ensign
  - signal flag
  lexicon: HALOT
  rationale: Although נֵס often means 'banner/standard,' in this nautical context
    many understand it as the sail-like thing spread from the mast. Main text uses
    'sail' to preserve the ship metaphor; the more literal alternative is preserved
    in a footnote.
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Marks the result that follows the collapse of the enemy's power.
- source_word: חֻלַּק
  chosen: will be divided
  alternatives:
  - was divided
  - is divided
  lexicon: HALOT
  rationale: The passive verb states the apportioning of spoil. English future fits
    the prophetic sequence in context.
- source_word: עַד שָׁלָל מַרְבֶּה
  chosen: abundant plunder
  alternatives:
  - great spoil
  - much booty
  lexicon: HALOT
  rationale: The phrase denotes a large quantity of spoil. 'Abundant plunder' is readable
    modern English and preserves the sense.
- source_word: פִּסְחִים
  chosen: the lame
  alternatives:
  - cripples
  lexicon: HALOT
  rationale: The adjective/noun refers to lame persons. 'The lame' is accurate and
    dignified modern English.
- source_word: בָּזְזוּ בַז
  chosen: will carry off the spoil
  alternatives:
  - plunder plunder
  - take booty
  lexicon: HALOT
  rationale: The verb-object combination intensifies the act of taking spoil. English
    idiom prefers 'carry off the spoil' rather than a wooden repetition.
