theological_decisions:
- issue: Meaning of רוּחֲכֶם in prophetic judgment imagery
  chosen_reading: your breath
  alternative_readings:
  - your spirit
  - your wind
  rationale: The verse depicts the people's own inner output as the means of their
    destruction. Rendering רוּחַ as 'breath' preserves the vivid metaphor and avoids
    prematurely psychologizing it as purely 'spirit,' while still allowing readers
    to sense the figurative extension to disposition or speech.
  doctrine_reference: Preserve theological tension rather than resolve it.
