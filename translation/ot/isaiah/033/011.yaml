id: ISA.33.11
reference: Isaiah 33:11
source:
  edition: WLC
  text: תַּהֲר֥וּ חֲשַׁ֖שׁ תֵּ֣לְדוּ קַ֑שׁ רוּחֲ/כֶ֕ם אֵ֖שׁ תֹּאכַלְ/כֶֽם׃
translation:
  text: You conceive chaff; you give birth to stubble. Your breath is a fire that
    will consume you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your spirit is a fire that will consume you.' Hebrew רוּחַ can mean
      'breath,' 'wind,' or 'spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּהֲרוּ
  chosen: you conceive
  alternatives:
  - you are pregnant with
  - you become pregnant with
  lexicon: HALOT
  rationale: From הרה in Qal imperfect 2mp, literally 'you conceive/are pregnant.'
    In this taunt/judgment context, 'conceive' preserves the metaphor of pregnancy
    leading to a worthless outcome without over-paraphrasing.
- source_word: חֲשַׁשׁ
  chosen: chaff
  alternatives:
  - dry grass
  - straw
  lexicon: HALOT
  rationale: The noun denotes light, dry, easily burned material. 'Chaff' is the most
    idiomatic and traditional equivalent in prophetic judgment imagery and pairs well
    with the following 'stubble.'
- source_word: תֵּלְדוּ
  chosen: you give birth to
  alternatives:
  - you bear
  lexicon: HALOT
  rationale: From ילד in Qal imperfect 2mp. 'Give birth to' keeps the childbirth metaphor
    explicit and natural in English.
- source_word: קַשׁ
  chosen: stubble
  alternatives:
  - straw
  lexicon: HALOT
  rationale: קשׁ commonly refers to straw/stubble, dry plant refuse. 'Stubble' fits
    the parallelism with 'chaff' and the imagery of worthlessness and combustibility.
- source_word: רוּחֲכֶם
  chosen: your breath
  alternatives:
  - your spirit
  - your wind
  lexicon: HALOT
  rationale: רוּחַ can mean breath, wind, or spirit. Here, with the following 'fire
    will consume you,' the sense is likely the exhalation or inner impulse of the
    addressed people that turns destructively back on them. 'Breath' best preserves
    the concrete metaphor while allowing the figurative sense of their own rage/plans.
- source_word: אֵשׁ
  chosen: a fire
  alternatives:
  - fire
  lexicon: HALOT
  rationale: 'אשׁ is straightforwardly ''fire.'' The indefinite article in English
    yields natural syntax: ''Your breath is a fire...''.'
- source_word: תֹּאכַלְכֶם
  chosen: will consume you
  alternatives:
  - will devour you
  - will eat you up
  lexicon: HALOT
  rationale: From אכל 'to eat/devour.' With fire as subject, 'consume' is the most
    natural English equivalent and preserves the destructive force of the image.
