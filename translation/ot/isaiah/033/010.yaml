theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Distinguishing the final two exaltation verbs
  chosen_reading: Render אֵרוֹמָם as 'I will lift myself up' and אֶנָּשֵׂא as 'I will be exalted'
  alternative_readings:
  - Render both generally as 'I will be exalted'
  - Render both with active language such as 'I will lift myself up' / 'I will raise myself'
  rationale: The Hebrew uses two different verbs and stems in close succession. Preserving a distinction avoids flattening the poetic escalation and better reflects the source text's rhetoric without importing extra theology.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
