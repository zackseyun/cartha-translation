id: ISA.33.10
reference: Isaiah 33:10
source:
  edition: WLC
  text: עַתָּ֥ה אָק֖וּם יֹאמַ֣ר יְהוָ֑ה עַתָּה֙ אֵֽרוֹמָ֔ם עַתָּ֖ה אֶנָּשֵֽׂא׃
translation:
  text: Now I will arise, says Yahweh; now I will be exalted; now I will lift myself up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'now I will be exalted; now I will lift myself up.' The two final Hebrew verbs are closely related in meaning, and English renderings may vary in how they distinguish them.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At this time
  lexicon: HALOT
  rationale: Temporal adverb marking immediate divine action. Repetition is preserved all three times for rhetorical force and escalation.
- source_word: אָקוּם
  chosen: I will arise
  alternatives:
  - I will rise
  - I will stand up
  lexicon: HALOT
  rationale: Qal imperfect 1cs of קום. 'Arise' preserves the elevated, decisive tone of divine intervention better than the more ordinary 'stand up.'
- source_word: יֹאמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - the LORD says
  - declares the LORD
  lexicon: HALOT
  rationale: Standard prophetic speech formula. Present-tense 'says' is idiomatic in English for direct divine speech. יְהוָה is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  - LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵרוֹמָם
  chosen: I will lift myself up
  alternatives:
  - I will be exalted
  - I will rise up
  lexicon: HALOT
  rationale: Polel/Hithpolel-like nuance from רום here is best represented as God's self-exaltation in response to the situation. Rendering it reflexively distinguishes it from the following passive-like 'I will be exalted' and preserves the progression of the Hebrew verbs.
- source_word: אֶנָּשֵׂא
  chosen: I will be exalted
  alternatives:
  - I will lift myself up
  - I will be lifted up
  lexicon: HALOT
  rationale: Niphal imperfect 1cs of נשׂא naturally carries a passive/reflexive sense. 'I will be exalted' fits the context of divine vindication and avoids awkward English. It also preserves a climactic distinction from the previous verb.
