id: ISA.33.4
reference: Isaiah 33:4
source:
  edition: WLC
  text: וְ/אֻסַּ֣ף שְׁלַלְ/כֶ֔ם אֹ֖סֶף הֶֽ/חָסִ֑יל כְּ/מַשַּׁ֥ק גֵּבִ֖ים שׁוֹקֵ֥ק
    בּֽ/וֹ׃
translation:
  text: And your spoil will be gathered like the gathering of locusts; like the rushing
    of swarms, men rush upon it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the gathering of the devouring locust'; the Hebrew term חָסִיל
      can denote a particular kind or stage of locust.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew in the second comparison is difficult. 'Like the rushing of swarms'
      could also be rendered 'like an attack of locusts' or 'like locusts rushing
      about.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֻסַּף
  chosen: And ... will be gathered
  alternatives:
  - and is gathered
  - then ... will be gathered
  lexicon: HALOT
  rationale: 'Passive of אסף, here best rendered as a future/passive in context: the
    enemy''s spoil is to be collected up. The prefixed conjunction is carried as simple
    ''And''.'
- source_word: שְׁלַלְכֶם
  chosen: your spoil
  alternatives:
  - your plunder
  lexicon: HALOT
  rationale: שׁלל commonly denotes spoil/plunder taken in war. 'Spoil' fits the martial
    context and idiomatic English.
- source_word: אֹסֶף
  chosen: the gathering
  alternatives:
  - a gathering
  - the collecting
  lexicon: HALOT
  rationale: 'Cognate noun from אסף used for emphasis with the preceding verb. Rendering
    it explicitly as ''the gathering'' preserves the Hebrew intensification: ''gathered
    like the gathering of...''.'
- source_word: הֶחָסִיל
  chosen: locusts
  alternatives:
  - the devouring locust
  - caterpillar
  lexicon: HALOT
  rationale: חָסִיל denotes a locust/grasshopper stage or kind, traditionally sometimes
    'caterpillar' in older English, but in prophetic usage 'locusts' is clearer and
    more likely for modern readers.
- source_word: כְּמַשַּׁק
  chosen: like the rushing
  alternatives:
  - like the attack
  - like the onrush
  lexicon: HALOT
  rationale: A rare noun likely denoting rushing/onset/assault. In parallel with the
    following participle, 'rushing' best captures the image of a sudden swarming movement.
- source_word: גֵּבִים
  chosen: swarms
  alternatives:
  - locust swarms
  - gobs/hosts
  lexicon: HALOT
  rationale: The noun is difficult and rare. In context it most plausibly refers to
    swarming creatures/masses, fitting the locust imagery and the simile of rapid
    stripping. 'Swarms' gives a clear English sense without overcommitting to a more
    obscure gloss.
- source_word: שׁוֹקֵק
  chosen: rush
  alternatives:
  - leap
  - run to and fro
  - swarm
  lexicon: HALOT
  rationale: The participle conveys eager, repeated rushing movement. With an indefinite
    subject in English, 'men rush' makes the action intelligible while preserving
    the vividness of the Hebrew.
- source_word: בּוֹ
  chosen: upon it
  alternatives:
  - on it
  - in it
  lexicon: HALOT
  rationale: The preposition with pronominal suffix points to the spoil as the object
    of the rushing action. 'Upon it' fits the image of attackers or gatherers descending
    on plunder.
