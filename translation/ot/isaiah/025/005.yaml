theological_decisions:
- issue: Addressee shift and implied subject
  chosen_reading: The verse continues to address God directly with 'you subdue,' while
    the final colon is rendered passively in English ('is brought low') to reflect
    the Hebrew without forcing an explicit subject.
  alternative_readings:
  - 'Render both cola with explicit divine subject: ''you subdue ... you humble'''
  - Render the final verb as 'answers/responds'
  rationale: The surrounding context addresses God, supporting second-person 'you
    subdue.' The last verb is more difficult; a passive English rendering preserves
    the poetic effect and avoids over-specifying a debated nuance while still reflecting
    the parallelism of divine humbling.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
