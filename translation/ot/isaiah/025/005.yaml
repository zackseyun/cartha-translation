id: ISA.25.5
reference: Isaiah 25:5
source:
  edition: WLC
  text: כְּ/חֹ֣רֶב בְּ/צָי֔וֹן שְׁא֥וֹן זָרִ֖ים תַּכְנִ֑יעַ חֹ֚רֶב בְּ/צֵ֣ל עָ֔ב זְמִ֥יר
    עָֽרִיצִ֖ים יַעֲנֶֽה׃פ
translation:
  text: Like heat in a dry land, you subdue the uproar of strangers; like heat by
    the shadow of a cloud, the song of the ruthless is brought low.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'foreigners' for 'strangers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the song of the ruthless is silenced/humbled'; the Hebrew verb can also
      mean 'answers,' but the context favors the sense of being subdued.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּחֹרֶב
  chosen: Like heat
  alternatives:
  - Like drought
  - Like scorching heat
  lexicon: HALOT
  rationale: חֹרֶב commonly denotes heat or drought/dryness. In this poetic comparison,
    'heat' best fits the parallel with 'shadow of a cloud' in the second colon, where
    the cloud mitigates oppressive heat.
- source_word: בְּצָיוֹן
  chosen: in a dry land
  alternatives:
  - in drought
  - in a parched place
  lexicon: HALOT
  rationale: צָיוֹן denotes dryness, aridity, or a parched region. 'In a dry land'
    is idiomatic English and preserves the environmental imagery.
- source_word: שְׁאוֹן
  chosen: uproar
  alternatives:
  - noise
  - tumult
  lexicon: HALOT
  rationale: The noun refers to loud commotion or tumult. 'Uproar' captures both the
    audible and hostile sense in context.
- source_word: זָרִים
  chosen: strangers
  alternatives:
  - foreigners
  - aliens
  lexicon: HALOT
  rationale: זָרִים can mean strangers or foreigners. 'Strangers' preserves the lexical
    form while still fitting the hostile outsiders in context.
- source_word: תַּכְנִיעַ
  chosen: you subdue
  alternatives:
  - you humble
  - you bring low
  lexicon: HALOT
  rationale: Hiphil of כנע means to humble, subdue, or bring into submission. The
    second masculine singular addresses God directly in the surrounding context, so
    'you subdue' is both accurate and natural.
- source_word: חֹרֶב
  chosen: like heat
  alternatives:
  - like drought
  - like scorching heat
  lexicon: HALOT
  rationale: The repeated noun resumes the heat imagery. Rendering it consistently
    as 'heat' preserves the poetic parallelism.
- source_word: בְּצֵל עָב
  chosen: by the shadow of a cloud
  alternatives:
  - under the shadow of a cloud
  - in the shade of a cloud
  lexicon: HALOT
  rationale: צֵל is shade/shadow and עָב is a thick cloud. 'By the shadow of a cloud'
    keeps the simile compact and reflects the instrumental or comparative force in
    context.
- source_word: זְמִיר
  chosen: song
  alternatives:
  - song of triumph
  - chant
  lexicon: HALOT
  rationale: זְמִיר can denote song, often in a poetic sense. Here it likely refers
    to the boastful singing or triumph-song of the oppressors. 'Song' is the most
    transparent base rendering.
- source_word: עָרִיצִים
  chosen: the ruthless
  alternatives:
  - the tyrants
  - the violent
  lexicon: HALOT
  rationale: עָרִיץ refers to the ruthless, violent, or tyrannical. 'The ruthless'
    is a standard and natural rendering in Isaiah.
- source_word: יַעֲנֶה
  chosen: is brought low
  alternatives:
  - is humbled
  - is subdued
  - is answered
  lexicon: HALOT
  rationale: Although the verb can mean 'answer,' in this context and poetic parallelism
    it carries the sense of being subdued or humbled. 'Is brought low' communicates
    the result clearly in English and matches the first colon's idea.
