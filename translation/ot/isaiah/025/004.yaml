id: ISA.25.4
reference: Isaiah 25:4
source:
  edition: WLC
  text: כִּֽי הָיִ֨יתָ מָע֥וֹז לַ/דָּ֛ל מָע֥וֹז לָ/אֶבְי֖וֹן בַּ/צַּר ל֑/וֹ מַחְסֶ֤ה
    מִ/זֶּ֨רֶם֙ צֵ֣ל מֵ/חֹ֔רֶב כִּ֛י ר֥וּחַ עָרִיצִ֖ים כְּ/זֶ֥רֶם קִֽיר־־׃
translation:
  text: For you have been a stronghold to the poor, a stronghold to the needy in his
    distress, a refuge from the storm, a shade from the heat; for the breath of the
    ruthless is like a storm against a wall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the blast of the ruthless'; Hebrew רוּחַ can mean 'breath,' 'wind,'
      or 'blast' in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'like a downpour against a wall' or 'like a storm beating on a wall.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָעוֹז
  chosen: stronghold
  alternatives:
  - refuge
  - fortress
  lexicon: HALOT
  rationale: Conveys a place of protection/defense more strongly than the broader
    'refuge.' Repetition is preserved for emphasis in the Hebrew parallelism.
- source_word: דָּל
  chosen: poor
  alternatives:
  - weak
  - lowly
  lexicon: HALOT
  rationale: In context of social vulnerability paired with אֶבְיוֹן, 'poor' is the
    most natural English rendering.
- source_word: אֶבְיוֹן
  chosen: needy
  alternatives:
  - poor
  - destitute
  lexicon: HALOT
  rationale: Keeps a distinction from דָּל while preserving the semantic overlap of
    the pair.
- source_word: בַּצַּר לוֹ
  chosen: in his distress
  alternatives:
  - in trouble for him
  - in his time of trouble
  lexicon: HALOT
  rationale: The phrase denotes the needy person's condition of distress/trouble.
    'In his distress' is idiomatic and preserves the 3ms suffix.
- source_word: מַחְסֶה
  chosen: refuge
  alternatives:
  - shelter
  lexicon: HALOT
  rationale: '''Refuge'' fits the protective imagery and varies appropriately from
    the repeated מָעוֹז without losing meaning.'
- source_word: זֶרֶם
  chosen: storm
  alternatives:
  - downpour
  - torrent
  lexicon: HALOT
  rationale: In this poetic context of destructive weather imagery, 'storm' is the
    most natural umbrella term in English and works in both occurrences.
- source_word: צֵל
  chosen: shade
  alternatives:
  - shadow
  lexicon: HALOT
  rationale: '''Shade'' better communicates beneficial protection from heat in contemporary
    English.'
- source_word: חֹרֶב
  chosen: heat
  alternatives:
  - scorching heat
  - drought
  lexicon: HALOT
  rationale: Here the contrast with 'shade' favors the sense of burning heat rather
    than drought as such.
- source_word: רוּחַ
  chosen: breath
  alternatives:
  - blast
  - spirit
  - wind
  lexicon: HALOT
  rationale: In the clause about the ruthless, the term likely denotes their violent
    exhalation/blast, metaphorically their forceful assault. 'Breath' preserves the
    lexical sense while fitting the simile.
- source_word: עָרִיצִים
  chosen: the ruthless
  alternatives:
  - the tyrants
  - the violent
  lexicon: HALOT
  rationale: Captures oppressive, overbearing aggressors without over-specifying a
    political sense.
- source_word: קִיר
  chosen: wall
  alternatives:
  - barrier
  lexicon: HALOT
  rationale: The plain sense is a wall; the image is of storm beating against a wall.
