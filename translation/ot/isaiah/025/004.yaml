theological_decisions:
- issue: Metaphorical portrayal of God's protection
  chosen_reading: Retain the concrete protective metaphors ('stronghold,' 'refuge,'
    'shade') without allegorical expansion.
  alternative_readings:
  - Interpretive paraphrases emphasizing spiritual comfort or salvation
  rationale: The verse poetically depicts God's care for the vulnerable through physical-protection
    imagery. Expanding this into a more doctrinal paraphrase would import claims beyond
    the Hebrew text.
  doctrine_reference: 'Translation philosophy: Original-language primacy; Never import
    doctrinal claims the text does not make.'
