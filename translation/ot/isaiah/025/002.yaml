id: ISA.25.2
reference: Isaiah 25:2
source:
  edition: WLC
  text: כִּ֣י שַׂ֤מְתָּ מֵ/עִיר֙ לַ/גָּ֔ל קִרְיָ֥ה בְצוּרָ֖ה לְ/מַפֵּלָ֑ה אַרְמ֤וֹן
    זָרִים֙ מֵ/עִ֔יר לְ/עוֹלָ֖ם לֹ֥א יִבָּנֶֽה׃
translation:
  text: For you have made the city a heap, the fortified town a ruin; the foreigners’
    palace is no city, it will never be rebuilt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the palace of foreigners is no longer a city.' The Hebrew phrase is
      compressed and may mean that the foreigners’ stronghold has ceased to have city-status.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'for eternity it will not be built'; the sense in context is 'it
      will never be rebuilt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂמְתָּ
  chosen: have made
  alternatives:
  - have set
  - have turned
  lexicon: HALOT
  rationale: The verb שׂוּם literally means 'set/place,' but in this construction
    with result complements it idiomatically means 'make/turn into.' 'Have made' is
    natural English and preserves the causative force.
- source_word: מֵעִיר
  chosen: the city
  alternatives:
  - from a city
  lexicon: HALOT
  rationale: The prefixed מִן here is partitive/resultative in an idiom meaning 'make
    from a city into…' In English, 'made the city a heap' best conveys the sense without
    woodenly retaining 'from.'
- source_word: לַגָּל
  chosen: a heap
  alternatives:
  - a mound
  - a pile of rubble
  lexicon: HALOT
  rationale: גַּל commonly denotes a heap or mound, often of stones or ruins. 'A heap'
    is concise and preserves the image of devastation.
- source_word: קִרְיָה בְצוּרָה
  chosen: the fortified town
  alternatives:
  - the fortified city
  lexicon: HALOT
  rationale: קִרְיָה and עִיר are near-synonyms; varying the English slightly avoids
    awkward repetition while preserving the parallelism. בְצוּרָה clearly means 'fortified'
    or 'inaccessible.'
- source_word: לְמַפֵּלָה
  chosen: a ruin
  alternatives:
  - a downfall
  - a collapse
  - a heap of ruins
  lexicon: HALOT
  rationale: The noun denotes ruin or collapse. 'A ruin' fits the parallel with 'a
    heap' and reads naturally in English.
- source_word: אַרְמוֹן
  chosen: palace
  alternatives:
  - citadel
  - fortress
  lexicon: HALOT
  rationale: אַרְמוֹן often refers to a palace or fortified residence. 'Palace' best
    fits the construct with 'foreigners' and the urban-destruction imagery.
- source_word: זָרִים
  chosen: foreigners’
  alternatives:
  - strangers'
  - aliens'
  lexicon: HALOT
  rationale: זָרִים means foreigners/strangers. 'Foreigners’' is clear modern English
    and avoids archaic connotations.
- source_word: מֵעִיר
  chosen: is no city
  alternatives:
  - away from being a city
  - out of the city
  lexicon: HALOT
  rationale: Again the מִן participates in the idiom of transformation or removal
    of status. The sense is that the palace of foreigners has ceased to be a city.
    'Is no city' is the most idiomatic rendering.
- source_word: לְעוֹלָם לֹא יִבָּנֶה
  chosen: it will never be rebuilt
  alternatives:
  - it shall not be built forever
  - for eternity it will not be rebuilt
  lexicon: HALOT
  rationale: The Niphal of בנה is passive/reflexive, 'be built/rebuilt.' Given the
    context of destruction, 'rebuilt' is the natural English implication. לְעוֹלָם
    with negation is idiomatically 'never.'
