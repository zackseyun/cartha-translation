id: ISA.25.12
reference: Isaiah 25:12
source:
  edition: WLC
  text: וּ/מִבְצַ֞ר מִשְׂגַּ֣ב חוֹמֹתֶ֗י/ךָ הֵשַׁ֥ח הִשְׁפִּ֛יל הִגִּ֥יעַ לָ/אָ֖רֶץ
    עַד עָפָֽר־׃ס
translation:
  text: And the fortified height of your walls he has brought down, laid low, and
    cast to the ground, to the dust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the fortress, the high place of your walls, he has brought down.'
      The Hebrew construct chain is compressed and may be rendered more formally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבְצַר
  chosen: And the fortified
  alternatives:
  - And the fortress of
  - And the stronghold of
  lexicon: HALOT
  rationale: מִבְצָר denotes a fortification, fortress, or stronghold. In construct
    with the following noun, it modifies the whole phrase. Rendering with 'fortified'
    keeps the construct relation natural in English while preserving the military/defensive
    sense.
- source_word: מִשְׂגַּב
  chosen: height
  alternatives:
  - stronghold
  - secure height
  - refuge
  lexicon: HALOT
  rationale: מִשְׂגָּב often refers to a high, inaccessible place of security. Here,
    because מִבְצַר already carries the fortress idea, 'height' avoids redundancy
    while preserving the elevated, defensive nuance.
- source_word: חוֹמֹתֶיךָ
  chosen: your walls
  alternatives:
  - your city walls
  lexicon: HALOT
  rationale: חוֹמוֹת is the plural of 'wall.' The 2ms suffix is retained as 'your.'
    'City walls' is possible contextually, but the Hebrew simply says 'your walls,'
    so the more direct rendering is preferred.
- source_word: הֵשַׁח
  chosen: has brought down
  alternatives:
  - has bowed down
  - has abased
  lexicon: HALOT
  rationale: This Hiphil verb conveys causing something lofty to sink or be brought
    low. 'Has brought down' is idiomatic and fits the sequence of humiliation/destruction.
- source_word: הִשְׁפִּיל
  chosen: laid low
  alternatives:
  - made low
  - humbled
  lexicon: HALOT
  rationale: The verb means to make low or abase. 'Laid low' is vivid, natural English
    and preserves the downward/destructive imagery in parallel with the surrounding
    verbs.
- source_word: הִגִּיעַ לָאָרֶץ
  chosen: cast to the ground
  alternatives:
  - brought to the earth
  - made reach the ground
  lexicon: HALOT
  rationale: Literally, the verb means 'caused to reach' or 'made come' to the earth.
    In context of demolishing walls, 'cast to the ground' expresses the result clearly
    in natural English without over-paraphrasing.
- source_word: עַד עָפָר
  chosen: to the dust
  alternatives:
  - down to the dust
  - as far as the dust
  lexicon: HALOT
  rationale: The phrase intensifies the totality of the downfall from earth/ground
    to dust. 'To the dust' is concise and idiomatic; the sense of complete humiliation
    and ruin is preserved.
