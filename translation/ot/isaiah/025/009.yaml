id: ISA.25.9
reference: Isaiah 25:9
source:
  edition: WLC
  text: וְ/אָמַר֙ בַּ/יּ֣וֹם הַ/ה֔וּא הִנֵּ֨ה אֱלֹהֵ֥י/נוּ זֶ֛ה קִוִּ֥ינוּ ל֖/וֹ וְ/יֽוֹשִׁיעֵ֑/נוּ זֶ֤ה יְהוָה֙ קִוִּ֣ינוּ ל֔/וֹ נָגִ֥ילָה וְ/נִשְׂמְחָ֖ה בִּ/ישׁוּעָתֽ/וֹ׃
translation:
  text: And it will be said on that day, “Behold, this is our God; we have waited for him, that he might save us. This is Yahweh; we have waited for him. Let us rejoice and be glad in his salvation.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text renders the divine name as ''the LORD'' in keeping with the project''s standard practice.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָמַר
  chosen: And it will be said
  alternatives:
  - And one will say
  - And they will say
  - And he will say
  lexicon: HALOT
  rationale: The Hebrew form is 3ms qatal with prefixed conjunction, but in prophetic discourse this commonly functions impersonally/futuristically in context ('it will be said'). This avoids forcing an explicit subject not present in the Hebrew while fitting the eschatological frame marked by 'on that day'.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal prophetic formula. 'On that day' is idiomatic modern English and preserves the eschatological force.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: '''Behold'' preserves the deictic and heightened rhetorical force of the particle better than flatter alternatives, while remaining understandable in elevated biblical style.'
- source_word: אֱלֹהֵינוּ זֶה
  chosen: this is our God
  alternatives:
  - behold our God
  - this, our God
  lexicon: HALOT
  rationale: The demonstrative plus noun expresses identification and recognition. 'This is our God' is the most natural English equivalent and preserves the emphatic deictic sense.
- source_word: קִוִּינוּ לוֹ
  chosen: we have waited for him
  alternatives:
  - we waited for him
  - we hoped in him
  - we looked eagerly for him
  lexicon: HALOT
  rationale: קוה carries the sense of waiting with hope/expectation. 'Have waited' captures the completed-yet-relevant action in context; 'for him' preserves the personal object. 'Hoped' is possible but loses the waiting nuance.
- source_word: וְיוֹשִׁיעֵנוּ
  chosen: and he will save us
  alternatives:
  - that he might save us
  - and let him save us
  - and he has saved us
  lexicon: HALOT
  rationale: Hiphil of ישׁע with 1cp suffix naturally means 'he will save us.' The conjunction is taken coordinately. This best fits the sequence of expectation followed by deliverance.
- source_word: זֶה יְהוָה
  chosen: This is the LORD
  alternatives:
  - This is Yahweh
  lexicon: HALOT
  rationale: The demonstrative again marks recognition. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: נָגִילָה וְנִשְׂמְחָה
  chosen: Let us rejoice and be glad
  alternatives:
  - We will rejoice and be glad
  - let us exult and rejoice
  lexicon: HALOT
  rationale: These cohortative forms express volition/exhortation. 'Let us rejoice and be glad' best reflects the hortatory force in natural English.
- source_word: בִּישׁוּעָתוֹ
  chosen: in his salvation
  alternatives:
  - because of his salvation
  - in his victory
  - in the salvation he gives
  lexicon: HALOT
  rationale: The noun ישׁוּעָה denotes salvation/deliverance. 'In his salvation' preserves the preposition and the theological resonance of divine rescue. 'Victory' is too narrow here.
