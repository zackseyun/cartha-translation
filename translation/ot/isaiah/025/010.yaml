id: ISA.25.10
reference: Isaiah 25:10
source:
  edition: WLC
  text: כִּֽי תָנ֥וּחַ יַד יְהוָ֖ה בָּ/הָ֣ר הַ/זֶּ֑ה וְ/נָ֤דוֹשׁ מוֹאָב֙ תַּחְתָּ֔י/ו
    כְּ/הִדּ֥וּשׁ מַתְבֵּ֖ן ב/מי מַדְמֵנָֽה־־׃
translation:
  text: For the hand of the LORD will rest on this mountain, and Moab will be trampled
    down in its place, as straw is trampled down in the water of a dung pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Moab will be trampled under him/beneath it'; the Hebrew
      pronoun's antecedent is uncertain.
    reason: alternative_reading
  - marker: b
    text: '''Dung pit'' may also be rendered ''manure heap'' or ''dunghill''; the
      Hebrew term likely refers to a foul place associated with manure.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding promise/judgment
    context. 'For' best preserves the explanatory force in natural English.
- source_word: תָנ֥וּחַ
  chosen: will rest
  alternatives:
  - will settle
  - will remain
  lexicon: HALOT
  rationale: From נוח, here of YHWH's hand coming to rest upon the mountain. 'Will
    rest' preserves both the concrete image and the sense of abiding favor/power without
    overinterpreting.
- source_word: יַד יְהוָה
  chosen: the hand of the LORD
  alternatives:
  - the LORD's hand
  lexicon: HALOT
  rationale: A common Hebrew idiom for divine power or action. Kept relatively formal
    to preserve the metaphor. YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and broad English Bible recognizability.
- source_word: בָּהָר הַזֶּה
  chosen: on this mountain
  alternatives:
  - upon this mountain
  - in this mountain
  lexicon: HALOT
  rationale: Locative phrase referring to Zion/the mountain in context. 'On this mountain'
    is idiomatic and sufficiently formal.
- source_word: וְנָדוֹשׁ
  chosen: and ... will be trampled down
  alternatives:
  - and ... will be threshed
  - and ... will be trodden down
  lexicon: HALOT
  rationale: From דושׁ, to tread/thresh. Because the simile later repeats the same
    root with straw in a filthy liquid, 'trampled down' communicates the humiliating
    crushing image better than the more technical 'threshed,' while preserving the
    physicality.
- source_word: מוֹאָב
  chosen: Moab
  lexicon: HALOT
  rationale: Standard transliteration of the nation name.
- source_word: תַּחְתָּיו
  chosen: in its place
  alternatives:
  - under him
  - beneath him
  - where it stands
  lexicon: HALOT
  rationale: The suffix reference is difficult. 'In its place' best captures the likely
    sense that Moab is trampled where it is, avoiding an overconfident specification
    of the pronoun's antecedent. A more literal alternative is preserved in a footnote.
- source_word: כְּהִדּוּשׁ
  chosen: as ... is trampled down
  alternatives:
  - as ... is threshed
  - like the treading of
  lexicon: HALOT
  rationale: Cognate with the earlier verb; the simile compares Moab's humiliation
    to the trampling of straw. Rendering with the same English root preserves the
    Hebrew wordplay and imagery.
- source_word: מַתְבֵּן
  chosen: straw
  alternatives:
  - straw fodder
  - chopped straw
  lexicon: HALOT
  rationale: Refers to straw/fodder. 'Straw' is the clearest concise rendering in
    the simile.
- source_word: בְּמֵי
  chosen: in the water of
  alternatives:
  - in the waters of
  - into the water of
  lexicon: HALOT
  rationale: Construct phrase introducing the medium/location of trampling. Singular
    'water' is more idiomatic in English for a pit or slurry.
- source_word: מַדְמֵנָה
  chosen: a dung pit
  alternatives:
  - manure heap
  - dunghill
  - sewage pit
  lexicon: HALOT
  rationale: Likely denotes a dung/manure place, probably a cesspool or manure pit
    in this context. 'Dung pit' preserves the offensiveness of the image without becoming
    colloquial. Because the exact nuance is uncertain, alternatives are footnoted.
