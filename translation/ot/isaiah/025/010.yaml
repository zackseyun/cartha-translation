theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This is a translation-policy
    decision rather than a contextual theological claim.
  doctrine_reference: 'Contested terms: יְהוָה YHWH | Default English: the LORD'
- issue: Interpretation of the pronoun in תַּחְתָּיו
  chosen_reading: Moab will be trampled down in its place
  alternative_readings:
  - Moab will be trampled under him
  - Moab will be trampled beneath it
  rationale: The antecedent of the suffix is syntactically debated. The translation
    preserves the judgment image without forcing a specific antecedent beyond what
    the Hebrew clearly yields; a more literal option is preserved in a footnote.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it'
