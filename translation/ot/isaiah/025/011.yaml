id: ISA.25.11
reference: Isaiah 25:11
source:
  edition: WLC
  text: וּ/פֵרַ֤שׂ יָדָי/ו֙ בְּ/קִרְבּ֔/וֹ כַּ/אֲשֶׁ֛ר יְפָרֵ֥שׂ הַ/שֹּׂחֶ֖ה לִ/שְׂח֑וֹת
    וְ/הִשְׁפִּיל֙ גַּֽאֲוָת֔/וֹ עִ֖ם אָרְבּ֥וֹת יָדָֽי/ו׃
translation:
  text: And he will spread out his hands in its midst as a swimmer spreads them out
    to swim, and he will bring down his pride together with the skill of his hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the cunning of his hands' or 'the tricks/devices of his hands.' The
      Hebrew expression is difficult and may refer to crafty devices rather than neutral
      skill.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפֵרַשׂ
  chosen: will spread out
  alternatives:
  - will stretch out
  - will spread
  lexicon: HALOT
  rationale: The verb פרשׂ commonly means to spread out or stretch out. 'Spread out'
    fits the simile of swimming and preserves the physical imagery.
- source_word: יָדָיו
  chosen: his hands
  alternatives:
  - his arms
  lexicon: HALOT
  rationale: Literally 'his hands.' In English, 'hands' can stand for the upper limbs
    in such imagery; retaining 'hands' stays closer to the Hebrew while remaining
    natural enough in context.
- source_word: בקרבו
  chosen: in its midst
  alternatives:
  - within it
  - in the middle of it
  lexicon: HALOT
  rationale: The suffix is masculine singular and most naturally refers back to Moab
    in the preceding context. 'In its midst' preserves the spatial sense without over-specifying
    the antecedent in the verse itself.
- source_word: כאשר יפרשׂ השחה לשחות
  chosen: as a swimmer spreads them out to swim
  alternatives:
  - as one who swims spreads them out to swim
  - as the swimmer spreads out his hands in swimming
  lexicon: HALOT
  rationale: השחה is a participial substantive, 'the swimmer' or 'one swimming.' The
    infinitive לשחות expresses purpose/activity. This rendering keeps the vivid simile
    and readable modern English.
- source_word: והשפיל
  chosen: he will bring down
  alternatives:
  - he will humble
  - he will abase
  lexicon: HALOT
  rationale: The Hiphil of שׁפל means to make low, bring down, humble. 'Bring down'
    fits the concrete judgment imagery and avoids importing an inward moral sense
    alone.
- source_word: גאותו
  chosen: his pride
  alternatives:
  - his haughtiness
  - his arrogance
  - his majesty
  lexicon: HALOT
  rationale: In this judgment context, the noun denotes exaltation in the negative
    sense of pride or arrogance. 'Pride' is the clearest idiomatic English choice.
- source_word: עם
  chosen: together with
  alternatives:
  - along with
  - with
  lexicon: HALOT
  rationale: עם here joins what is brought down to what accompanies it. 'Together
    with' makes the coordination explicit.
- source_word: ארבות ידיו
  chosen: the skill of his hands
  alternatives:
  - the cunning of his hands
  - the tricks of his hands
  - the ambushes of his hands
  lexicon: HALOT
  rationale: ארבות is difficult and likely carries the sense of devices, stratagems,
    or skillful contrivances. In context of pride being brought low, 'the skill of
    his hands' communicates human resourcefulness without forcing the more obscure
    literal imagery. The more negative alternatives are preserved in a footnote because
    the Hebrew is debated.
