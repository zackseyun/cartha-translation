theological_decisions:
- issue: Referent of the pronouns in the verse
  chosen_reading: The subject and possessive pronouns are rendered generically as
    'he/his,' referring to Moab personified in the immediate context.
  alternative_readings:
  - The subject could be understood more collectively as Moab's people rather than
    a singular personification.
  rationale: The Hebrew uses singular forms, and prophetic poetry commonly personifies
    a nation as a singular figure. Retaining the singular preserves the source-text
    imagery and avoids interpretive expansion.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Nuance of ארבות ידיו
  chosen_reading: Rendered as 'the skill of his hands' in the main text, with more
    negative possibilities preserved in a footnote.
  alternative_readings:
  - the cunning of his hands
  - the tricks/devices of his hands
  rationale: The term is lexically uncertain. The main text chooses a readable rendering
    that fits the context of human capability being humbled, while the footnote preserves
    the sharper interpretive options rather than overstating certainty.
  doctrine_reference: Translation philosophy §3, §5
