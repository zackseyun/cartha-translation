id: ISA.25.3
reference: Isaiah 25:3
source:
  edition: WLC
  text: עַל כֵּ֖ן יְכַבְּד֣וּ/ךָ עַם עָ֑ז קִרְיַ֛ת גּוֹיִ֥ם עָרִיצִ֖ים יִירָאֽוּ/ךָ־־׃
translation:
  text: Therefore a strong people will honor you; a city of ruthless nations will
    fear you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a mighty people.' The Hebrew adjective can denote strength, might, or
      fierceness.
    reason: lexical_alternative
  - marker: b
    text: Or 'a city of ruthless peoples.' The Hebrew construct phrase is compressed
      and may describe a city belonging to or characterized by ruthless nations.
    reason: lexical_alternative
  - marker: c
    text: Or 'stand in awe of you.' The verb can express fear, reverence, or awe depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore
  lexicon: HALOT
  rationale: The phrase marks a logical/resultative conclusion from the preceding
    description of God's acts. 'Therefore' is concise and natural in English while
    preserving the inferential force.
- source_word: יְכַבְּדוּךָ
  chosen: will honor you
  alternatives:
  - will glorify you
  - will give you honor
  lexicon: HALOT
  rationale: From כבד in the Piel, the sense is to honor or glorify. 'Honor' fits
    the parallel with 'fear you' and avoids importing a more explicitly liturgical
    sense than the context requires.
- source_word: עַם עָז
  chosen: a strong people
  alternatives:
  - a mighty people
  - a fierce people
  lexicon: HALOT
  rationale: עַז denotes strength, might, or fierceness. 'Strong' is the broadest
    and least interpretively loaded choice, preserving the idea of power without overstating
    violence.
- source_word: קִרְיַת גּוֹיִם עָרִיצִים
  chosen: a city of ruthless nations
  alternatives:
  - the city of ruthless nations
  - a city of ruthless peoples
  - the city of terrifying nations
  lexicon: HALOT
  rationale: קִרְיָה/קִרְיַת means 'city.' The construct chain with גּוֹיִם עָרִיצִים
    is somewhat compressed; it can denote a city characterized by or belonging to
    ruthless nations/peoples. 'A city of ruthless nations' preserves the Hebrew imagery
    and parallelism without over-resolving whether one city or a representative city
    is intended. 'Ruthless' is a fitting rendering of עָרִיצִים in Isaiah for oppressive,
    violent powers.
- source_word: יִירָאוּךָ
  chosen: will fear you
  alternatives:
  - will stand in awe of you
  - will revere you
  lexicon: HALOT
  rationale: ירא commonly means 'fear' or 'revere.' In parallel with divine judgment
    and acknowledgment by powerful oppressors, 'fear you' best preserves the direct
    force of the Hebrew while allowing reverential nuance.
