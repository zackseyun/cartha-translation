theological_decisions:
- issue: Nuance of response to God by hostile powers
  chosen_reading: The verse states that powerful peoples and ruthless nations/cities
    will honor and fear God, without specifying whether this is willing worship, coerced
    submission, or a mix of both.
  alternative_readings:
  - The nations are converted to genuine worship.
  - The nations merely submit in dread after judgment.
  rationale: The Hebrew verbs 'honor' and 'fear' can encompass reverence arising from
    recognition of God's power, but the verse itself does not explicitly define the
    inner disposition. The translation preserves this theological tension rather than
    resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
