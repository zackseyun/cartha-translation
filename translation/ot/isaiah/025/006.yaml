id: ISA.25.6
reference: Isaiah 25:6
source:
  edition: WLC
  text: וְ/עָשָׂה֩ יְהוָ֨ה צְבָא֜וֹת לְ/כָל הָֽ/עַמִּים֙ בָּ/הָ֣ר הַ/זֶּ֔ה מִשְׁתֵּ֥ה שְׁמָנִ֖ים מִשְׁתֵּ֣ה שְׁמָרִ֑ים שְׁמָנִים֙ מְמֻ֣חָיִ֔ם שְׁמָרִ֖ים מְזֻקָּקִֽים־׃
translation:
  text: And Yahweh of Armies will make on this mountain for all the peoples a feast of rich food, a feast of aged wine—rich food full of marrow, aged wine well refined.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a feast of fat things ... a feast of wine on the lees.' The Hebrew imagery emphasizes abundance and luxury.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  chosen: will make
  alternatives:
  - will prepare
  - will provide
  lexicon: HALOT
  rationale: The verb עשה literally means 'do/make.' In this banquet context, 'will make' is natural English and preserves the concrete sense without over-interpreting as merely 'provide.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  - of Heaven's Armies
  lexicon: HALOT
  rationale: צְבָאוֹת denotes armies/hosts. 'Of Armies' translates the title rather than preserving the traditional but less transparent 'hosts.'
- source_word: לְכָל הָעַמִּים
  chosen: for all the peoples
  alternatives:
  - for all peoples
  - for all the nations
  lexicon: HALOT
  rationale: עמים here is plural and points to distinct peoples collectively, not merely an abstract humanity. 'The peoples' preserves the plural nuance better than 'nations' in this context.
- source_word: בָּהָר הַזֶּה
  chosen: on this mountain
  alternatives:
  - in this mountain
  - upon this mountain
  lexicon: HALOT
  rationale: Idiomatic English for בהר is 'on this mountain.' The demonstrative is retained.
- source_word: מִשְׁתֵּה
  chosen: a feast
  alternatives:
  - a banquet
  - a drinking feast
  lexicon: HALOT
  rationale: מִשְׁתֵּה denotes a feast/banquet, often with drinking. 'Feast' is broad enough to cover both paired elements here.
- source_word: שְׁמָנִים
  chosen: rich food
  alternatives:
  - fat things
  - fatty foods
  - choice portions
  lexicon: HALOT
  rationale: Literally 'fat things,' an idiom for rich, luxurious food. 'Rich food' communicates the sense in readable modern English without flattening the imagery.
- source_word: שְׁמָרִים
  chosen: aged wine
  alternatives:
  - wine on the lees
  - well-aged wine
  lexicon: HALOT
  rationale: Literally 'lees/dregs,' but in feast imagery this refers to wine left to age on the lees, hence matured wine. 'Aged wine' gives the intended positive sense in English; the more literal expression is preserved in a footnote.
- source_word: מְמֻחָיִם
  chosen: full of marrow
  alternatives:
  - well-marrowed
  - filled with marrow
  lexicon: HALOT
  rationale: This participle modifies the rich foods and evokes the choicest, marrow-filled portions. 'Full of marrow' is vivid and understandable.
- source_word: מְזֻקָּקִים
  chosen: well refined
  alternatives:
  - strained clear
  - purified
  - filtered
  lexicon: HALOT
  rationale: The participle conveys something refined/clarified. With wine, 'well refined' communicates careful preparation and quality.
