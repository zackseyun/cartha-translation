theological_decisions:
- issue: Universal scope of the banquet invitation
  chosen_reading: for all the peoples
  alternative_readings:
  - for all peoples
  - for all the nations
  rationale: The Hebrew plural עמים is retained to preserve the text's vision of YHWH's eschatological feast extending beyond Israel to the nations/peoples collectively, without importing a more developed theological system than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
