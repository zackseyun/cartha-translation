id: ISA.25.1
reference: Isaiah 25:1
source:
  edition: WLC
  text: יְהוָ֤ה אֱלֹהַ/י֙ אַתָּ֔ה אֲרֽוֹמִמְ/ךָ֙ אוֹדֶ֣ה שִׁמְ/ךָ֔ כִּ֥י עָשִׂ֖יתָ פֶּ֑לֶא עֵצ֥וֹת מֵֽ/רָח֖וֹק אֱמ֥וּנָה אֹֽמֶן׃
translation:
  text: O Yahweh, you are my God; I will exalt you; I will praise your name, for you have done wonderful things, plans formed long ago, faithful and sure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for you have done a wonder; plans from long ago, faithfulness and surety.' The Hebrew is compact and poetic, and the final phrase may also be understood as emphasizing the firmness of God's ancient plans.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as 'LORD' per the project's default for the divine name, following established English convention for YHWH and the doctrine table's stated preference.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: Construct form with 1cs suffix; straightforward possessive rendering.
- source_word: אֲרוֹמִמְךָ
  chosen: I will exalt you
  alternatives:
  - I will lift you high
  - I will extol you
  lexicon: HALOT
  rationale: Root רום in the polel/causative-like stem here conveys exalting or lifting high in praise. 'Exalt' is idiomatic, reverent, and fits parallel praise language.
- source_word: אוֹדֶה שִׁמְךָ
  chosen: I will praise your name
  alternatives:
  - I will give thanks to your name
  - I will confess your name
  lexicon: HALOT
  rationale: ידה in the Hiphil often means give thanks/praise. In parallel with 'I will exalt you,' 'I will praise your name' best captures the worship sense in natural English. 'Your name' is retained rather than reduced to 'you' because the Hebrew explicitly mentions the name.
- source_word: כִּי עָשִׂיתָ פֶּלֶא
  chosen: for you have done wonderful things
  alternatives:
  - for you have done a wonder
  - for you have done wonders
  lexicon: HALOT
  rationale: The singular noun פֶּלֶא can function collectively or qualitatively. English plural 'wonderful things' communicates the sense naturally while preserving the idea of marvelous divine acts.
- source_word: עֵצוֹת
  chosen: plans
  alternatives:
  - counsels
  - purposes
  lexicon: HALOT
  rationale: Though the noun can mean 'counsels,' in this context of divine action and longstanding intent, 'plans' is the clearest modern English rendering.
- source_word: מֵרָחוֹק
  chosen: formed long ago
  alternatives:
  - from afar
  - from long ago
  lexicon: HALOT
  rationale: Literally 'from afar,' but in temporal contexts the phrase commonly denotes remoteness in time. Because it modifies God's plans, 'formed long ago' makes the temporal sense explicit in idiomatic English.
- source_word: אֱמוּנָה
  chosen: faithfulness
  alternatives:
  - steadfastness
  - trustworthiness
  lexicon: HALOT
  rationale: The noun denotes reliability or faithfulness. Here it characterizes God's ancient plans as dependable and sure.
- source_word: אֹמֶן
  chosen: truth
  alternatives:
  - surety
  - firmness
  - faithfulness
  lexicon: HALOT
  rationale: This rare noun conveys firmness, stability, or dependability. Paired with אֱמוּנָה, an English hendiadys-like rendering 'faithfulness and truth' preserves two distinct but related qualities without awkward repetition such as 'faithfulness and faithfulness'.
