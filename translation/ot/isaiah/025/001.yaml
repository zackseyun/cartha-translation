theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Understanding מֵרָחוֹק with עֵצוֹת
  chosen_reading: temporal sense ('plans formed long ago')
  alternative_readings:
  - spatial sense ('plans from afar')
  rationale: In context the verse praises God's marvelous acts as the outworking of prior divine counsel. A temporal sense best fits the syntax and the following pair 'faithfulness and truth/firmness,' which describe the reliability of those longstanding plans.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: How to render the closing pair אֱמוּנָה אֹמֶן
  chosen_reading: 'two coordinated qualities: ''faithfulness and truth'''
  alternative_readings:
  - 'adverbial/intensive sense: ''perfect faithfulness'''
  - '''faithfulness, sure and certain'''
  rationale: The Hebrew juxtaposes two near-synonymous nouns. Rendering both preserves the poetic fullness and avoids collapsing the phrase into a single abstract quality. 'Truth' here carries the sense of firmness/reliability rather than mere factual correctness.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
