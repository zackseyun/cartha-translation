id: ISA.25.7
reference: Isaiah 25:7
source:
  edition: WLC
  text: וּ/בִלַּע֙ בָּ/הָ֣ר הַ/זֶּ֔ה פְּנֵֽי הַ/לּ֥וֹט הַ/לּ֖וֹט עַל כָּל הָֽ/עַמִּ֑ים
    וְ/הַ/מַּסֵּכָ֥ה הַ/נְּסוּכָ֖ה עַל כָּל הַ/גּוֹיִֽם־׀־־־־׃
translation:
  text: And on this mountain he will swallow up the covering that covers all peoples,
    and the veil that is spread over all nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the shroud that shrouds all peoples.' The Hebrew uses repeated cognate
      terms for a covering wrapped over humanity.
    reason: lexical_alternative
  - marker: b
    text: The 'veil' or 'covering' likely anticipates the swallowing up of death in
      the next verse, though the image may also suggest a broader removal of what
      lies over the nations.
    reason: cross_reference
lexical_decisions:
- source_word: וּבִלַּע
  chosen: he will swallow up
  alternatives:
  - he will destroy
  - he will engulf
  lexicon: HALOT
  rationale: בלע literally means 'swallow' or 'swallow up.' In this context of removing
    a shroud-like obstacle from the nations, 'swallow up' preserves the vivid metaphor
    and also anticipates the same verb in the next verse for swallowing up death.
    'Destroy' is interpretive and less textually transparent.
- source_word: בָּהָר הַזֶּה
  chosen: on this mountain
  alternatives:
  - in this mountain
  - on this hill
  lexicon: HALOT
  rationale: The preposition ב with הַר in locative contexts is naturally rendered
    'on' in English for a mountain setting. 'Mountain' is the standard sense of הַר
    here, referring back to Zion in context.
- source_word: פְּנֵי
  chosen: the covering
  alternatives:
  - the face of
  - the surface of
  lexicon: HALOT
  rationale: פְּנֵי normally means 'face/surface of,' but in the idiom פְּנֵי הַלּוֹט
    it points to the visible surface or front of the covering. Rendering it separately
    as 'face of' would be awkward in English and obscure the sense; 'the covering'
    captures the phrase as a whole.
- source_word: הַלּוֹט
  chosen: the covering
  alternatives:
  - the shroud
  - the wrapping
  lexicon: HALOT
  rationale: From לוט, 'to wrap/envelop.' 'Covering' is broad and readable, while
    still conveying something laid over people. 'Shroud' is possible and evocative,
    but slightly more interpretive in this verse apart from the explicit mention of
    death in v. 8.
- source_word: הַלּוֹט
  chosen: that covers
  alternatives:
  - that is wrapped
  - that envelops
  lexicon: HALOT
  rationale: 'The repeated cognate form creates emphasis. Rendering the second occurrence
    verbally as ''that covers'' preserves the Hebrew wordplay in natural English:
    ''the covering that covers.'''
- source_word: עַל כָּל הָעַמִּים
  chosen: all peoples
  alternatives:
  - all the peoples
  - all the nations
  lexicon: HALOT
  rationale: עַמִּים is best rendered 'peoples,' distinguishing it from the later
    גּוֹיִם. The preposition עַל with a covering naturally becomes 'over' or is absorbed
    into the English relative clause 'that covers all peoples.'
- source_word: וְהַמַּסֵּכָה
  chosen: and the veil
  alternatives:
  - and the covering
  - and the cast metal image
  lexicon: HALOT
  rationale: Though מַסֵּכָה can elsewhere mean 'molten image,' here the parallelism
    with הַלּוֹט and the participle 'spread' requires a textile-like or covering sense.
    'Veil' gives a distinct but parallel image and fits the context of something lying
    over the nations.
- source_word: הַנְּסוּכָה
  chosen: that is spread
  alternatives:
  - that is woven
  - that is poured out
  lexicon: HALOT
  rationale: The passive participle likely describes something spread out or laid
    over. 'Spread' fits the imagery of a veil over nations. More literal options tied
    to pouring are less natural here and obscure the metaphor.
- source_word: עַל כָּל הַגּוֹיִם
  chosen: over all nations
  alternatives:
  - over all the nations
  - over all peoples
  lexicon: HALOT
  rationale: גּוֹיִם is naturally 'nations.' Keeping 'nations' here preserves the
    poetic parallel with 'peoples' in the previous colon rather than flattening both
    to the same English term.
