theological_decisions:
- issue: Nature of the removed object
  chosen_reading: A metaphorical covering/veil over the nations
  alternative_readings:
  - A funerary shroud specifically anticipating death
  - A symbol of spiritual blindness or disgrace
  rationale: The Hebrew imagery is metaphorical and intentionally broad. The immediate
    context, especially v. 8, supports an association with death, but v. 7 itself
    speaks of a covering and veil over all peoples and nations. The translation preserves
    the image without narrowing it to one theological interpretation in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
