id: ISA.25.8
reference: Isaiah 25:8
source:
  edition: WLC
  text: בִּלַּ֤ע הַ/מָּ֨וֶת֙ לָ/נֶ֔צַח וּ/מָחָ֨ה אֲדֹנָ֧/י יְהוִ֛ה דִּמְעָ֖ה מֵ/עַ֣ל
    כָּל פָּנִ֑ים וְ/חֶרְפַּ֣ת עַמּ֗/וֹ יָסִיר֙ מֵ/עַ֣ל כָּל הָ/אָ֔רֶץ כִּ֥י יְהוָ֖ה
    דִּבֵּֽר־־׃פ
translation:
  text: He will swallow up death forever, and the Lord GOD will wipe away tears from
    every face, and he will remove the reproach of his people from all the earth,
    for the LORD has spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He has swallowed up death forever.' The Hebrew perfect can be rendered
      as a prophetic perfect, expressing a future act as certain.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Lord GOD' represents אֲדֹנָי יְהוִה, literally 'Lord YHWH.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the disgrace of his people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּלַּע
  chosen: He will swallow up
  alternatives:
  - He has swallowed up
  - He will destroy
  lexicon: HALOT
  rationale: The form is morphologically perfect 3ms, but in prophetic discourse the
    perfect commonly has future force ('prophetic perfect'). Given the surrounding
    promises, an English future best conveys the sense. 'Swallow up' preserves the
    concrete metaphor of בלע better than the more interpretive 'destroy'.
- source_word: הַמָּוֶת
  chosen: death
  lexicon: HALOT
  rationale: Straightforward rendering of the noun with the article not normally represented
    in English.
- source_word: לָנֶצַח
  chosen: forever
  alternatives:
  - for ever
  - permanently
  lexicon: HALOT
  rationale: נצח here expresses enduring perpetuity. 'Forever' is idiomatic modern
    English and fits the promise that death's power is ended decisively.
- source_word: וּמָחָה
  chosen: and ... will wipe away
  alternatives:
  - and ... will blot out
  lexicon: HALOT
  rationale: The verb מחה can mean wipe, wipe away, or blot out. With 'tear' as object,
    'wipe away' is the natural English collocation and preserves the image.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: This compound divine title is conventionally rendered 'Lord GOD' in English
    to reflect אֲדֹנָי plus the divine name. This also avoids the awkward 'Lord LORD.'
    'GOD' in small caps would idealize print styling, but plain text here uses 'GOD'
    to signal the underlying YHWH.
- source_word: דִּמְעָה
  chosen: tears
  alternatives:
  - every tear
  - the tear
  lexicon: HALOT
  rationale: Although singular in Hebrew, English idiom prefers the plural in this
    distributive expression with 'from every face.' This is an optimal-equivalence
    adjustment for naturalness without loss of meaning.
- source_word: מֵעַל כָּל פָּנִים
  chosen: from every face
  alternatives:
  - from all faces
  - off every face
  lexicon: HALOT
  rationale: The phrase is distributive. 'From every face' is more natural in English
    than the formally closer 'from all faces' and preserves the personal, embodied
    image.
- source_word: וְחֶרְפַּת עַמּוֹ
  chosen: the reproach of his people
  alternatives:
  - the disgrace of his people
  - the shame of his people
  lexicon: HALOT
  rationale: חרפה denotes reproach, disgrace, or taunt-bearing shame. 'Reproach' preserves
    both the shame and the public dishonor dimension better than the more purely internal
    'shame.'
- source_word: יָסִיר
  chosen: he will remove
  alternatives:
  - he will take away
  - he will turn aside
  lexicon: HALOT
  rationale: Hiphil of סור here means to remove or take away. 'Remove' is concise
    and fits the formal tone of the promise.
- source_word: מֵעַל כָּל הָאָרֶץ
  chosen: from all the earth
  alternatives:
  - from all the land
  lexicon: HALOT
  rationale: ארץ can mean land or earth. In this universal eschatological context,
    'earth' best fits the scope of the promise and parallels 'every face.'
- source_word: כִּי יְהוָה דִּבֵּר
  chosen: for the LORD has spoken
  alternatives:
  - for the LORD has said
  - because the LORD has spoken
  lexicon: HALOT
  rationale: The clause grounds the certainty of the promise in YHWH's utterance.
    Per doctrine, YHWH is rendered 'the LORD.' 'Has spoken' is the standard solemn
    formula in English prophetic style.
