theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD / GOD within 'the Lord GOD' for אֲדֹנָי יְהוִה
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD.' In the compound title אֲדֹנָי יְהוִה, English convention uses 'the Lord
    GOD' to preserve both elements without producing 'Lord LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Temporal force of prophetic perfects
  chosen_reading: future-oriented promises ('He will swallow up ... will wipe away
    ... will remove')
  alternative_readings:
  - past/perfective renderings
  rationale: Although some verbs are morphologically perfect, the verse is a prophetic
    declaration of future salvation. Rendering them as futures preserves the discourse
    function without importing extra theology.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
