id: ISA.32.15
reference: Isaiah 32:15
source:
  edition: WLC
  text: עַד יֵ֨עָרֶ֥ה עָלֵ֛י/נוּ ר֖וּחַ מִ/מָּר֑וֹם וְ/הָיָ֤ה מִדְבָּר֙ לַ/כַּרְמֶ֔ל
    ו/כרמל לַ/יַּ֥עַר יֵחָשֵֽׁב־׃
translation:
  text: until a spirit from on high is poured out on us, and the wilderness becomes
    a fruitful field, and the fruitful field is regarded as a forest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Spirit from on high"; the Hebrew רוּחַ can denote "spirit," and
      in context may refer specifically to God's Spirit.
    reason: alternative_reading
  - marker: b
    text: '"Fruitful field" renders Hebrew karmel, meaning fertile or cultivated land;
      it is likely not the place name Carmel here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד
  chosen: until
  alternatives:
  - before
  - up to the point when
  lexicon: HALOT
  rationale: Marks the temporal limit of the preceding condition; 'until' is the natural
    English equivalent.
- source_word: יֵעָרֶה
  chosen: is poured out
  alternatives:
  - is emptied out
  - is poured
  lexicon: HALOT
  rationale: Niphal of ערה conveys being poured out. Passive English best reflects
    the Hebrew stem and the imagery of effusion.
- source_word: עָלֵינוּ
  chosen: on us
  alternatives:
  - upon us
  - over us
  lexicon: HALOT
  rationale: The preposition עַל with this verb naturally yields 'on/upon us'; 'on
    us' is idiomatic modern English.
- source_word: רוּחַ
  chosen: a spirit
  alternatives:
  - the Spirit
  - wind
  - breath
  lexicon: HALOT
  rationale: The noun can mean spirit, wind, or breath. In this context of transformative
    renewal from above, 'spirit' best fits. The absence of the article in Hebrew argues
    against making it explicitly 'the Spirit' in the main text, while still allowing
    readers to hear the theological resonance.
- source_word: מִמָּרוֹם
  chosen: from on high
  alternatives:
  - from above
  - from the height
  lexicon: HALOT
  rationale: מָרוֹם denotes height/exalted place; 'from on high' is a natural English
    rendering that preserves the elevated, heavenly sense.
- source_word: וְהָיָה
  chosen: and ... becomes
  alternatives:
  - and ... will be
  - then ... shall become
  lexicon: HALOT
  rationale: Though formally 'and it will be,' the clause introduces resulting transformation.
    Rendering with 'becomes' gives clear English while preserving the future/resultative
    sense.
- source_word: מִדְבָּר
  chosen: the wilderness
  alternatives:
  - the desert
  - the wasteland
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard and suitably broad rendering; it preserves
    the contrast with cultivated land without over-specifying aridity.'
- source_word: לַכַּרְמֶל
  chosen: a fruitful field
  alternatives:
  - a garden land
  - Carmel
  lexicon: HALOT
  rationale: כַּרְמֶל here is a common noun denoting fertile/cultivated land, not
    necessarily the place name Carmel. 'Fruitful field' captures the agricultural
    contrast and is a well-established English equivalent.
- source_word: וְכַרְמֶל
  chosen: and the fruitful field
  alternatives:
  - and Carmel
  - and the fertile land
  lexicon: HALOT
  rationale: For consistency with the previous occurrence, the same common-noun sense
    is retained here.
- source_word: לַיַּעַר
  chosen: as a forest
  alternatives:
  - for a forest
  - like a forest
  lexicon: HALOT
  rationale: יַעַר means forest/woodland. With יֵחָשֵׁב, the sense is being reckoned
    or regarded as a forest.
- source_word: יֵחָשֵׁב
  chosen: is regarded
  alternatives:
  - is counted
  - is considered
  - is reckoned
  lexicon: HALOT
  rationale: The Niphal of חשב often means 'be considered/regarded.' 'Is regarded'
    is clear modern English and fits the comparative transformation imagery.
