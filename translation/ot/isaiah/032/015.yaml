theological_decisions:
- issue: Whether רוּחַ should be rendered as the Holy Spirit explicitly
  chosen_reading: a spirit from on high
  alternative_readings:
  - the Spirit from on high
  - the Holy Spirit from on high
  rationale: The context strongly suggests divine life-giving agency, and Christian
    readers may rightly hear an allusion to God's Spirit. However, the Hebrew lacks
    the article and does not explicitly say 'Holy Spirit.' To avoid importing a doctrinally
    stronger claim than the text states, the main text keeps the anarthrous 'a spirit,'
    while preserving the more specific alternative in a footnote.
  doctrine_reference: 'Translation philosophy items 1 and 3: original-language primacy;
    preserve theological tension rather than resolve it.'
