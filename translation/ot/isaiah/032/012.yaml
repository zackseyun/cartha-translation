id: ISA.32.12
reference: Isaiah 32:12
source:
  edition: WLC
  text: עַל שָׁדַ֖יִם סֹֽפְדִ֑ים עַל שְׂדֵי חֶ֕מֶד עַל גֶּ֖פֶן פֹּרִיָּֽה־־־־׃
translation:
  text: Beating their breasts in mourning over the delightful fields, over the fruitful
    vine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lamenting over the breasts'; the Hebrew is compressed, and many understand
      it as an idiom for beating the breasts in grief.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁדַיִם
  chosen: their breasts
  alternatives:
  - breasts
  lexicon: HALOT
  rationale: The noun literally denotes 'breasts.' In this lament context, with the
    following participle 'mourning/lamenting,' the idiom refers to striking or beating
    the breasts as an act of grief. English needs the implied possessive and action
    for natural sense; 'their breasts' captures the body part while fitting the plural
    participle.
- source_word: סֹפְדִים
  chosen: Beating their breasts in mourning
  alternatives:
  - lamenting
  - mourning
  - wailing
  lexicon: HALOT
  rationale: 'The participle from ספד means to lament or mourn. Because the Hebrew
    sequence ''over breasts, lamenting'' is elliptical, the translation makes explicit
    the likely gesture signaled by ''breasts'' in context: mourning expressed by beating
    the breasts. This preserves the sense rather than leaving an opaque literalism.'
- source_word: שְׂדֵי חֶמֶד
  chosen: the delightful fields
  alternatives:
  - the pleasant fields
  - the desirable fields
  lexicon: HALOT
  rationale: חֶמֶד conveys desirability, delight, or pleasantness. 'Delightful fields'
    is natural modern English and preserves the sense of valued, fertile land being
    mourned.
- source_word: גֶּפֶן פֹּרִיָּה
  chosen: the fruitful vine
  alternatives:
  - the fruit-bearing vine
  - the fertile vine
  lexicon: HALOT
  rationale: גֶּפֶן is 'vine' and פֹּרִיָּה means fruitful/fruit-bearing. 'Fruitful
    vine' is concise, idiomatic, and faithful to the agricultural image.
- source_word: עַל
  chosen: over
  alternatives:
  - for
  - because of
  lexicon: HALOT
  rationale: Repeated עַל here marks the object/cause of lament. 'Over' is the most
    natural English preposition for mourning in this context and preserves the repeated
    structure.
