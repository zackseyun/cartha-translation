  from: Beating their breasts in mourning
  to: They will beat their breasts in mourning
  rationale: The current rendering with a gerund phrase is formally close to the Hebrew
    participle but is abrupt at the start of the verse and slightly obscures the connection
    to the preceding imperatives. Translating the participle as a future indicative
    ('They will...') presents the mourning as a direct consequence of the impending
    judgment, creating a smoother flow. Using the third-person 'They' also subtly
    reflects the grammatical shift in the Hebrew from feminine plural commands to
    a masculine plural participle, while still clearly referring to the people addressed.
