id: ISA.32.3
reference: Isaiah 32:3
source:
  edition: WLC
  text: וְ/לֹ֥א תִשְׁעֶ֖ינָה עֵינֵ֣י רֹאִ֑ים וְ/אָזְנֵ֥י שֹׁמְעִ֖ים תִּקְשַֽׁבְנָה׃
translation:
  text: Then the eyes of those who see will not be blind, and the ears of those who
    hear will listen attentively.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will not be dim.' The Hebrew verb may denote eyes no longer being impaired
      or obscured.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation; governs the following verb and is best rendered directly
    as 'not'.
- source_word: תִשְׁעֶינָה
  chosen: will be blind
  alternatives:
  - will be dim
  - will look away
  - will be closed
  lexicon: HALOT
  rationale: From שעה in this context, the sense is that the eyes will no longer be
    impaired or obscured. English 'will be blind' communicates the antithetical parallel
    with attentive hearing in the next colon better than the more wooden 'will not
    be dim' or the contextually less likely 'look away.' The future sense fits the
    prophetic context.
- source_word: עֵינֵי
  chosen: the eyes of
  alternatives:
  - eyes
  lexicon: HALOT
  rationale: Construct form requiring linkage to the following participle; 'the eyes
    of' is natural English and preserves the Hebrew syntax.
- source_word: רֹאִים
  chosen: those who see
  alternatives:
  - seers
  - the seeing ones
  lexicon: HALOT
  rationale: Qal participle used substantivally. 'Those who see' is idiomatic modern
    English and avoids implying technical prophetic 'seers' where the context more
    broadly concerns perception.
- source_word: אָזְנֵי
  chosen: the ears of
  alternatives:
  - ears
  lexicon: HALOT
  rationale: Construct form parallel to 'the eyes of'; preserving the parallelism
    is important.
- source_word: שֹׁמְעִים
  chosen: those who hear
  alternatives:
  - hearers
  - the hearing ones
  lexicon: HALOT
  rationale: Substantival participle parallel to רֹאִים. 'Those who hear' is clear,
    natural, and preserves the representative sense.
- source_word: תִּקְשַׁבְנָה
  chosen: will listen attentively
  alternatives:
  - will pay attention
  - will attend
  - will listen
  lexicon: HALOT
  rationale: קשׁב conveys attentive listening, not mere auditory reception. 'Will
    listen attentively' captures the intensification and balances the first colon's
    restoration of sight.
- source_word: וְ
  chosen: Then / and
  alternatives:
  - and
  lexicon: HALOT
  rationale: The conjunction links this verse to the preceding prophetic context of
    transformed rule and understanding. Rendering the first waw as 'Then' brings out
    the consequential flow, while the second waw is naturally 'and' in English.
