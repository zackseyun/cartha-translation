theological_decisions:
- issue: Nature of the restored perception in the verse
  chosen_reading: A general promise of restored moral/spiritual and social discernment,
    expressed through physical-sensory imagery
  alternative_readings:
  - A strictly literal healing of blindness and deafness
  - A reference specifically to prophetic leaders
  rationale: The immediate context (Isa 32:1–4) concerns righteous rule and renewed
    understanding. The language of eyes and ears likely functions metaphorically for
    discernment and receptivity, though without excluding broader restoration imagery.
    The translation keeps the sensory language literal enough to preserve the metaphorical-theological
    tension rather than resolving it into either purely physical healing or a narrowly
    technical reference.
  doctrine_reference: Preserve theological tension rather than resolve it
