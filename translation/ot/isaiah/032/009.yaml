id: ISA.32.9
reference: Isaiah 32:9
source:
  edition: WLC
  text: נָשִׁים֙ שַֽׁאֲנַנּ֔וֹת קֹ֖מְנָה שְׁמַ֣עְנָה קוֹלִ֑/י בָּנוֹת֙ בֹּֽטח֔וֹת
    הַאְזֵ֖נָּה אִמְרָתִֽ/י׃
translation:
  text: You complacent women, rise up; hear my voice. You confident daughters, listen
    to my word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at ease' for 'complacent'; the Hebrew can denote those living undisturbed
      or carelessly secure.
    reason: lexical_alternative
  - marker: b
    text: Literally 'daughters.' The term is retained to preserve the Hebrew form
      of address.
    reason: cultural_note
  - marker: c
    text: Or 'secure' for 'confident'; the Hebrew emphasizes a sense of safety or
      self-assurance.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשִׁים
  chosen: women
  alternatives:
  - wives
  lexicon: HALOT
  rationale: The plural noun straightforwardly denotes women. 'Wives' is possible
    in some contexts, but here the address is broad and parallel to 'daughters,' so
    'women' best fits.
- source_word: שַׁאֲנַנּוֹת
  chosen: complacent
  alternatives:
  - at ease
  - carefree
  - secure
  lexicon: HALOT
  rationale: The adjective describes a self-assured, undisturbed state that in prophetic
    rebuke carries a negative nuance. 'Complacent' captures both ease and the implied
    culpable unconcern better than the more neutral 'at ease' or 'carefree'.
- source_word: קֹמְנָה
  chosen: rise up
  alternatives:
  - stand up
  - get up
  lexicon: HALOT
  rationale: Imperative plural from קום. 'Rise up' is idiomatic in prophetic summons
    and preserves the force of an urgent call to attention.
- source_word: שְׁמַעְנָה
  chosen: hear
  alternatives:
  - listen
  lexicon: HALOT
  rationale: The imperative means to hear/listen. 'Hear' works well in parallel with
    the following clause's 'listen,' preserving some variation in English while keeping
    the imperative force.
- source_word: קוֹלִי
  chosen: my voice
  alternatives:
  - my sound
  - what I say
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice' in direct address contexts. 'My voice' is
    the natural and literal rendering here.
- source_word: בָּנוֹת
  chosen: daughters
  alternatives:
  - women
  - girls
  lexicon: HALOT
  rationale: Literally 'daughters.' In prophetic address it can function vocatively
    for a class of women. Retaining 'daughters' preserves the Hebrew imagery and parallelism
    rather than flattening it to another 'women'.
- source_word: בֹּטְחוֹת
  chosen: confident
  alternatives:
  - secure
  - trusting
  - carefree
  lexicon: HALOT
  rationale: The participle denotes those feeling secure. 'Confident' communicates
    subjective security in a natural modern English way and pairs well with the rebuking
    tone. 'Trusting' could imply proper faith, which is not the point here.
- source_word: הַאְזֵנָּה
  chosen: listen
  alternatives:
  - give ear
  - pay attention
  lexicon: HALOT
  rationale: Hiphil imperative of אזן means to give ear attentively. 'Listen' is clear
    modern English; 'give ear' is more formal but less natural.
- source_word: אִמְרָתִי
  chosen: my word
  alternatives:
  - my speech
  - my saying
  lexicon: HALOT
  rationale: The noun refers to an utterance or spoken word. 'My word' is concise,
    idiomatic, and suitably parallel to 'my voice' without sounding archaic.
