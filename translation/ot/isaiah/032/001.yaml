id: ISA.32.1
reference: Isaiah 32:1
source:
  edition: WLC
  text: הֵ֥ן לְ/צֶ֖דֶק יִמְלָךְ מֶ֑לֶךְ וּ/לְ/שָׂרִ֖ים לְ/מִשְׁפָּ֥ט יָשֹֽׂרוּ־׃
translation:
  text: Behold, a king will reign in righteousness, and princes will rule with justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Look' or 'See' for the opening interjection.
    reason: lexical_alternative
  - marker: b
    text: Or 'a king will reign justly'; Hebrew 'in righteousness.'
    reason: lexical_alternative
  - marker: c
    text: '''Princes'' may also be rendered ''rulers'' or ''officials.'''
    reason: lexical_alternative
  - marker: d
    text: Many Christian readers understand this king messianically in the broader
      context, but the Hebrew here simply says 'a king.'
    reason: cross_reference
lexical_decisions:
- source_word: הֵן
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces an emphatic or attention-getting declaration. 'Behold' preserves
    the prophetic force more transparently than the flatter 'look' or 'see,' while
    remaining idiomatic in elevated modern English.
- source_word: לְצֶדֶק
  chosen: in righteousness
  alternatives:
  - for righteousness
  - with righteousness
  - justly
  lexicon: HALOT
  rationale: The preposition ל with צֶדֶק here expresses the manner or norm of the
    king's reign. 'In righteousness' is a natural English rendering that preserves
    the noun and its moral-judicial weight better than the adverbial 'justly.'
- source_word: יִמְלָךְ מֶלֶךְ
  chosen: a king will reign
  alternatives:
  - the king will reign
  - a king shall reign
  lexicon: HALOT
  rationale: The Hebrew lacks the article on מֶלֶךְ, so 'a king' is the most direct
    rendering. The yiqtol is rendered as future, 'will reign.' 'Shall reign' is possible
    but sounds more archaic. The phrase is left indefinite in translation rather than
    specifying a messianic referent not explicit in the grammar.
- source_word: וּלְשָׂרִים
  chosen: and princes
  alternatives:
  - and rulers
  - and officials
  lexicon: HALOT
  rationale: שָׂרִים commonly denotes princes, leaders, or officials. 'Princes' best
    matches the likely courtly/governing context alongside 'king,' preserving the
    parallelism of royal and subordinate rulers.
- source_word: לְמִשְׁפָּט
  chosen: with justice
  alternatives:
  - for justice
  - according to justice
  - with judgment
  lexicon: HALOT
  rationale: The phrase indicates the standard or manner of rule. 'With justice' is
    idiomatic and preserves the judicial-ethical sense of מִשְׁפָּט. 'Judgment' in
    modern English can sound narrower or more punitive than the Hebrew here.
- source_word: יָשֹׂרוּ
  chosen: will rule
  alternatives:
  - will govern
  - will act uprightly
  lexicon: HALOT
  rationale: From the verb שׂרר, the sense is exercising rule or authority. 'Will
    rule' is the clearest and most direct equivalent in this political context. 'Act
    uprightly' would import the idea of moral rectitude from context rather than from
    the verb itself.
