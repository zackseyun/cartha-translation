theological_decisions:
- issue: Whether to make the king explicitly messianic in the main text
  chosen_reading: Retain the indefinite expression 'a king' without identifying him
    as the Messiah in translation.
  alternative_readings:
  - Translate more definitely as 'the king' to suggest a specific expected ruler
  - Interpret explicitly as a messianic prophecy in the wording
  rationale: While Christian interpretation may read this verse messianically in context,
    the Hebrew syntax itself uses an anarthrous noun and does not explicitly identify
    the king. Following the translation philosophy, the draft preserves the source
    wording and does not import a doctrinal conclusion into the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
