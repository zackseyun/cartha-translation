id: ISA.32.13
reference: Isaiah 32:13
source:
  edition: WLC
  text: עַ֚ל אַדְמַ֣ת עַמִּ֔/י ק֥וֹץ שָׁמִ֖יר תַּֽעֲלֶ֑ה כִּ֚י עַל כָּל בָּתֵּ֣י מָשׂ֔וֹשׂ
    קִרְיָ֖ה עַלִּיזָֽה־־׃
translation:
  text: On the land of my people, thorn and brier will come up—indeed, over all the
    houses of joy in the exultant city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will spring up' for 'will come up.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the jubilant city'; the Hebrew describes a city marked by rejoicing
      or merriment.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַדְמַת עַמִּי
  chosen: the land of my people
  alternatives:
  - the soil of my people
  - my people's ground
  lexicon: HALOT
  rationale: אַדְמָה denotes ground/land/soil. 'Land' is the most natural English
    in this prophetic judgment context, while preserving the concrete sense of the
    territory belonging to the people.
- source_word: קוֹץ
  chosen: thorn
  alternatives:
  - thornbush
  - thistle
  lexicon: HALOT
  rationale: A standard rendering for a thorny growth. Paired with שָׁמִיר, it contributes
    to the image of desolation overtaking cultivated land.
- source_word: שָׁמִיר
  chosen: brier
  alternatives:
  - thistle
  - bramble
  lexicon: HALOT
  rationale: Often paired with קוֹץ in judgment or desolation formulas. 'Brier' preserves
    the sense of prickly overgrowth without over-specifying the botany.
- source_word: תַּעֲלֶה
  chosen: will come up
  alternatives:
  - will grow up
  - will spring up
  lexicon: HALOT
  rationale: The verb עלה in this context describes vegetation arising from the ground.
    'Will come up' is idiomatic and keeps the image vivid.
- source_word: כִּי
  chosen: indeed
  alternatives:
  - 'yes'
  - for
  lexicon: HALOT
  rationale: Here כִּי is best taken as emphatic/explanatory, intensifying the scope
    of the devastation rather than introducing a strict causal clause. 'Indeed' fits
    the flow in English.
- source_word: בָּתֵּי מָשׂוֹשׂ
  chosen: the houses of joy
  alternatives:
  - the joyful houses
  - the houses of revelry
  lexicon: HALOT
  rationale: A construct phrase literally meaning 'houses of joy.' This likely refers
    to festive or pleasure-filled dwellings; the more literal rendering preserves
    the Hebrew imagery and leaves the nuance open.
- source_word: קִרְיָה עַלִּיזָה
  chosen: the exultant city
  alternatives:
  - the jubilant city
  - the carefree city
  lexicon: HALOT
  rationale: עַלִּיזָה conveys rejoicing/exultation, though in context it may also
    imply complacent merriment. 'Exultant' preserves the overt lexical sense without
    importing a stronger interpretive judgment than the text states.
