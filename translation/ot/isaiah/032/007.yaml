theological_decisions:
- issue: Representative masculine singular in אֶבְיוֹן
  chosen_reading: the poor man
  alternative_readings:
  - the poor person
  - the needy
  rationale: The Hebrew is grammatically masculine singular and likely representative.
    Per the translation philosophy, gender-accurate rendering is preferred over neutralization
    unless context demands otherwise. The phrase still functions generically in context.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
