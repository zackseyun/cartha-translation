id: ISA.32.7
reference: Isaiah 32:7
source:
  edition: WLC
  text: וְ/כֵלַ֖י כֵּלָ֣י/ו רָעִ֑ים ה֚וּא זִמּ֣וֹת יָעָ֔ץ לְ/חַבֵּ֤ל ענוים בְּ/אִמְרֵי
    שֶׁ֔קֶר וּ/בְ/דַבֵּ֥ר אֶבְי֖וֹן מִשְׁפָּֽט־׃
translation:
  text: And the rogue’s devices are evil; he devises schemes to ruin the humble with
    lying words, even when the poor man speaks what is just.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tools,' 'instruments,' or 'weapons' for 'devices'; the Hebrew term can
      denote implements literally and methods metaphorically.
    reason: lexical_alternative
  - marker: b
    text: Or 'the afflicted' or 'the meek' for 'the humble.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''and when the poor man speaks justice/judgment''; the sense may
      be that the rogue opposes the poor even when the poor person’s case is just.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵלַי / כֵּלָיו
  chosen: devices
  alternatives:
  - tools
  - instruments
  - weapons
  - methods
  lexicon: HALOT
  rationale: 'The noun כלי literally denotes vessels, implements, or instruments.
    In this context of moral character and plotting, a metaphorical sense fits best:
    the rogue''s ''devices'' or ''methods.'' ''Devices'' preserves the concrete-to-metaphorical
    force and matches the parallel with ''schemes'' (זִמּוֹת) without over-specifying
    physical weapons.'
- source_word: רָעִים
  chosen: evil
  alternatives:
  - bad
  - wicked
  - harmful
  lexicon: HALOT
  rationale: Predicate adjective describing the character of his devices. 'Evil' best
    preserves the moral weight of the Hebrew in prophetic denunciation.
- source_word: הוּא
  chosen: the rogue’s
  alternatives:
  - he
  - that man’s
  lexicon: HALOT
  rationale: The pronoun itself is simply 'he,' but English style benefits from making
    explicit the subject carried over from the previous verse's contrast between the
    noble and the scoundrel/rogue. Rendering the clause as 'the rogue’s devices are
    evil' makes the sense clear while retaining the pronoun's referent.
- source_word: זִמּוֹת
  chosen: schemes
  alternatives:
  - plans
  - devices
  - plots
  lexicon: HALOT
  rationale: זִמּוֹת can denote plans or schemes, often with a negative nuance in
    context. 'Schemes' captures the malicious intentionality here.
- source_word: יָעָץ
  chosen: he devises
  alternatives:
  - he counsels
  - he plans
  - he advises
  lexicon: HALOT
  rationale: Though the verb can mean 'to counsel' or 'to advise,' in context with
    זִמּוֹת it refers to forming plans. 'He devises' gives idiomatic English and preserves
    the deliberative sense.
- source_word: לְחַבֵּל
  chosen: to ruin
  alternatives:
  - to destroy
  - to wreck
  - to act corruptly toward
  lexicon: HALOT
  rationale: The infinitive expresses harmful intent toward vulnerable people. 'To
    ruin' communicates destructive social and moral harm without implying total annihilation.
- source_word: ענוים
  chosen: the humble
  alternatives:
  - the afflicted
  - the meek
  - the poor
  lexicon: HALOT
  rationale: ענוים often denotes the humble, meek, or afflicted. 'The humble' fits
    the ethical contrast of the passage and avoids collapsing this term into economic
    poverty, since אֶבְיוֹן later explicitly names the poor/needy.
- source_word: בְּאִמְרֵי שֶׁקֶר
  chosen: with lying words
  alternatives:
  - by words of falsehood
  - with false speech
  lexicon: HALOT
  rationale: The beth marks means or instrument. 'With lying words' is natural English
    and preserves the plural construct phrase.
- source_word: אֶבְיוֹן
  chosen: the poor man
  alternatives:
  - the needy
  - the poor
  - the destitute
  lexicon: HALOT
  rationale: אֶבְיוֹן denotes a poor or needy person. Singular 'poor man' reflects
    the singular Hebrew and the translation philosophy's gender-accurate principle,
    while still functioning representatively.
- source_word: וּבְדַבֵּר אֶבְיוֹן מִשְׁפָּט
  chosen: even when the poor man speaks what is just
  alternatives:
  - even when the needy speaks justice
  - and when the poor pleads his case justly
  - while the poor speaks justice
  lexicon: HALOT
  rationale: 'The infinitive construct with beth is best taken temporally/circumstantially:
    the rogue acts this way even in the face of a just claim by the poor. מִשְׁפָּט
    here is rendered ''what is just'' rather than the more wooden ''justice/judgment''
    to produce clear English while preserving the legal-ethical sense.'
