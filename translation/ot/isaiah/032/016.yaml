theological_decisions:
- issue: Rendering of צְדָקָה in a non-Pauline Hebrew prophetic context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The verse pairs מִשְׁפָּט and צְדָקָה as related but distinct concepts.
    Rendering the second as 'righteousness' preserves the theological and poetic tension
    between just order and rightness/uprightness, rather than collapsing both into
    'justice.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Contested terms table notes righteousness/justice tension for δικαιοσύνη,
    analogous here in preserving distinction.'
