id: ISA.32.16
reference: Isaiah 32:16
source:
  edition: WLC
  text: וְ/שָׁכַ֥ן בַּ/מִּדְבָּ֖ר מִשְׁפָּ֑ט וּ/צְדָקָ֖ה בַּ/כַּרְמֶ֥ל תֵּשֵֽׁב׃
translation:
  text: Then justice will dwell in the wilderness, and righteousness will sit in the
    fruitful field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in Carmel.' The Hebrew karmel can refer either to fertile cultivated
      land or, in some contexts, the region/name Carmel.
    reason: lexical_alternative
  - marker: b
    text: Or 'righteousness will dwell/remain.' The verb literally means 'sit,' but
      in context it conveys settled residence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁכַן
  chosen: Then ... will dwell
  alternatives:
  - and ... dwelt
  - and ... will settle
  lexicon: HALOT
  rationale: Qal perfect 3ms of שׁכן can function prophetically/futuristically in
    context; English future fits the surrounding prophetic outlook. The conjunction
    is rendered 'Then' rather than a bare 'and' to reflect sequential development
    from the preceding context.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert land. 'Wilderness' is preferred
    in Isaiah for broader uncultivated land imagery and to preserve the contrast with
    the cultivated field.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: Here the noun denotes the establishment of just order rather than an
    act of sentencing. 'Justice' is the most natural English rendering in this restoration
    context.
- source_word: וּצְדָקָה
  chosen: and righteousness
  alternatives:
  - and justice
  - and what is right
  lexicon: HALOT
  rationale: צְדָקָה is rendered 'righteousness' to preserve the distinct pairing
    with מִשְׁפָּט ('justice'). Using 'justice' for both would flatten the Hebrew
    parallelism. This also aligns with the project's default handling of cognate theological
    terms where applicable.
- source_word: בַּכַּרְמֶל
  chosen: in the fruitful field
  alternatives:
  - in Carmel
  - in the orchard
  - in the garden land
  lexicon: HALOT
  rationale: כַּרְמֶל can denote fertile/cultivated land, not necessarily the proper
    name Carmel here. Because the verse contrasts wilderness with productive land,
    'fruitful field' best conveys the common noun sense in context.
- source_word: תֵּשֵׁב
  chosen: will sit
  alternatives:
  - will dwell
  - will remain
  lexicon: HALOT
  rationale: Qal imperfect 3fs of ישׁב literally means 'sit' and personifies righteousness
    as taking its seat/residence. 'Will sit' preserves the vivid parallelism with
    'will dwell,' though the sense includes settled abiding.
