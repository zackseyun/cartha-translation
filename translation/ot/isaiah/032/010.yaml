id: ISA.32.10
reference: Isaiah 32:10
source:
  edition: WLC
  text: יָמִים֙ עַל שָׁנָ֔ה תִּרְגַּ֖זְנָה בֹּֽטְח֑וֹת כִּ֚י כָּלָ֣ה בָצִ֔יר אֹ֖סֶף
    בְּלִ֥י יָבֽוֹא־׃
translation:
  text: In a little more than a year you will tremble, you complacent women, because
    the grape harvest will fail; the fruit harvest will not come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''days upon a year,'' an idiom meaning a little more than a year.'
    reason: lexical_alternative
  - marker: b
    text: Or 'confident women' or 'secure women.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the ingathering will not come.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמִים עַל שָׁנָה
  chosen: In a little more than a year
  alternatives:
  - In days beyond a year
  - Within a year and days
  - After a year and days
  lexicon: HALOT
  rationale: The idiom literally reads 'days upon a year.' In context it marks a short
    time beyond a full year rather than an indefinite period. 'In a little more than
    a year' communicates the Hebrew temporal idiom in natural English while preserving
    the sense of imminence.
- source_word: תִּרְגַּזְנָה
  chosen: you will tremble
  alternatives:
  - you will quake
  - you will be disturbed
  - you will shudder
  lexicon: HALOT
  rationale: From רגז, denoting agitation, trembling, or being disturbed. 'Tremble'
    fits the prophetic warning context and pairs naturally with the direct address.
- source_word: בֹּטְחוֹת
  chosen: you complacent women
  alternatives:
  - you confident women
  - you secure women
  lexicon: HALOT
  rationale: The participle from בטח means those who feel secure or confident. In
    this context, where the women are being rebuked for false ease (cf. surrounding
    verses), 'complacent women' brings out the negative nuance better than the more
    neutral 'confident women.' The feminine plural should be represented explicitly.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the coming trembling. 'Because' is clearer
    in modern English than 'for' while preserving the causal force.
- source_word: כָּלָה
  chosen: will fail
  alternatives:
  - has come to an end
  - is finished
  - will be gone
  lexicon: HALOT
  rationale: 'Though morphologically a perfect, in prophetic discourse it can describe
    a future certainty. Rendering with English future fits the warning context: the
    harvest is as good as ended. ''Will fail'' is idiomatic with ''harvest'' and conveys
    loss rather than mere completion.'
- source_word: בָצִיר
  chosen: the grape harvest
  alternatives:
  - the vintage
  - the harvest
  lexicon: HALOT
  rationale: בציר specifically refers to grape gathering/vintage, not harvest in general.
    'Grape harvest' is more transparent to modern readers than 'vintage.'
- source_word: אֹסֶף
  chosen: the fruit harvest
  alternatives:
  - the ingathering
  - the gathering
  lexicon: HALOT
  rationale: אסף here is a noun meaning ingathering, likely the later produce collection.
    'Fruit harvest' makes the agricultural reference clear in contemporary English,
    though 'ingathering' is more formal.
- source_word: בְּלִי יָבֹא
  chosen: will not come
  alternatives:
  - will not arrive
  - there will be none
  lexicon: HALOT
  rationale: The phrase literally means 'without it coming.' 'Will not come' is a
    straightforward English rendering that preserves the concrete verbal imagery of
    the expected harvest failing to arrive.
