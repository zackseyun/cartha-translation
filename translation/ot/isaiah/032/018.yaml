theological_decisions:
- issue: Nature of the promised conditions
  chosen_reading: Render the verse as describing concrete, communal conditions of
    peace and security for God's people without specifying whether the fulfillment
    is immediate historical, eschatological, or typological.
  alternative_readings:
  - Primarily historical restoration for Judah
  - Primarily eschatological messianic peace
  rationale: The Hebrew text itself states the promise of peaceful dwelling but does
    not explicitly delimit the horizon of fulfillment in this verse alone. To preserve
    theological tension, the translation remains text-centered and does not import
    a narrower interpretive framework.
  doctrine_reference: Preserve theological tension rather than resolve it.
