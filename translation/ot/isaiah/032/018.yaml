id: ISA.32.18
reference: Isaiah 32:18
source:
  edition: WLC
  text: וְ/יָשַׁ֥ב עַמִּ֖/י בִּ/נְוֵ֣ה שָׁל֑וֹם וּֽ/בְ/מִשְׁכְּנוֹת֙ מִבְטַחִ֔ים וּ/בִ/מְנוּחֹ֖ת
    שַׁאֲנַנּֽוֹת׃
translation:
  text: And my people will dwell in a peaceful habitation, in secure dwellings, and
    in quiet resting places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a habitation of peace.'
    reason: lexical_alternative
  - marker: b
    text: Or 'quiet places of rest,' or 'resting places at ease.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשַׁב
  chosen: And ... will dwell
  alternatives:
  - will sit
  - will live
  lexicon: HALOT
  rationale: The verb ישב commonly means 'sit, dwell, live.' In this prophetic context
    of settled security, 'dwell' best captures continued habitation rather than the
    more literal but less idiomatic 'sit' or the broader 'live.' The prefixed conjunction
    is carried as 'And.'
- source_word: עַמִּי
  chosen: my people
  alternatives:
  - my nation
  lexicon: HALOT
  rationale: עם with 1cs suffix is the standard covenantal expression 'my people.'
    'Nation' is possible lexically but is less relational and less fitting in this
    context.
- source_word: בִּנְוֵה
  chosen: in a ... habitation
  alternatives:
  - in a pasture
  - in a homestead
  - in an abode
  lexicon: HALOT
  rationale: נוה can denote a habitation, abode, or pasture-dwelling. Here, paired
    with peace and followed by parallel terms for dwellings/resting places, the sense
    is residential rather than pastoral. 'Habitation' preserves the concrete locale
    without sounding overly technical.
- source_word: שָׁלוֹם
  chosen: peaceful
  alternatives:
  - of peace
  - in peace
  - well-being
  lexicon: HALOT
  rationale: שלום denotes peace, wholeness, and well-being. Because it modifies נוה
    in construct-like relation, 'peaceful habitation' is natural English while retaining
    the semantic force. 'Habitation of peace' is more formal but less idiomatic.
- source_word: וּבְמִשְׁכְּנוֹת
  chosen: and in ... dwellings
  alternatives:
  - and in tabernacles
  - and in habitations
  lexicon: HALOT
  rationale: משכנות refers to dwelling places. 'Dwellings' is clear modern English.
    'Tabernacles' would import cultic associations not required here.
- source_word: מִבְטַחִים
  chosen: secure
  alternatives:
  - trusting
  - safe
  - secure places
  lexicon: HALOT
  rationale: מבטחים conveys security/safety. Used adjectivally with 'dwellings,' 'secure'
    is concise and idiomatic. 'Trusting' would misdirect toward subjective confidence
    rather than objective safety.
- source_word: וּבִמְנוּחוֹת
  chosen: and in ... resting places
  alternatives:
  - and in resting places
  - and in places of rest
  - and in repose
  lexicon: HALOT
  rationale: מנוחות denotes resting places or places of repose. 'Resting places' preserves
    the plural concrete sense and fits the parallel structure.
- source_word: שַׁאֲנַנּוֹת
  chosen: quiet
  alternatives:
  - undisturbed
  - at ease
  - tranquil
  lexicon: HALOT
  rationale: שאנן carries the sense of being at ease, undisturbed, secure. With 'resting
    places,' 'quiet' gives natural English and conveys calm security without overstating
    complacency, which the term can imply elsewhere.
