id: ISA.32.19
reference: Isaiah 32:19
source:
  edition: WLC
  text: וּ/בָרַ֖ד בְּ/רֶ֣דֶת הַ/יָּ֑עַר וּ/בַ/שִּׁפְלָ֖ה תִּשְׁפַּ֥ל הָ/עִֽיר׃
translation:
  text: And it will hail when the forest falls, and the city will be utterly laid
    low in the lowland.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And hail will fall when the forest comes down.' The Hebrew allows a
      more formally literal rendering with 'hail' as the subject and 'the forest'
      as descending/falling.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָרַד
  chosen: And it will hail
  alternatives:
  - And hail will fall
  - Though it hails
  lexicon: HALOT
  rationale: From the verb/noun root ברד ('hail'). The form is commonly understood
    in context as an impersonal/weather expression, best rendered in natural English
    as 'it will hail.' The prefixed conjunction is carried as 'And.'
- source_word: בְּרֶדֶת
  chosen: when ... falls
  alternatives:
  - in the falling of
  - at the descending of
  lexicon: HALOT
  rationale: 'Infinitive construct of ירד (''to go down, descend''). With the prefixed
    ב, it functions temporally: ''when ... falls/comes down.'' Because the following
    subject is ''the forest,'' idiomatic English prefers ''when the forest falls''
    rather than a wooden ''in the descending of the forest.'''
- source_word: הַיָּעַר
  chosen: the forest
  alternatives:
  - the woodland
  lexicon: HALOT
  rationale: יער denotes a forest/wooded area. 'Forest' is the most straightforward
    modern English equivalent.
- source_word: וּבַשִּׁפְלָה
  chosen: and in the lowland
  alternatives:
  - and in the plain
  - and in the low place
  lexicon: HALOT
  rationale: שפלה denotes a low-lying region or lowland. 'Lowland' preserves the topographical
    sense better than the more generic 'plain.' The conjunction is retained.
- source_word: תִּשְׁפַּל
  chosen: will be utterly laid low
  alternatives:
  - will be brought low
  - will be humbled
  - will sink low
  lexicon: HALOT
  rationale: From שׁפל ('to be low, become low, be abased'). With 'the city' as subject,
    the sense is not moral humility but catastrophic lowering/abasement. 'Be utterly
    laid low' captures the force in context.
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: עיר is the ordinary term for 'city.' The definite article is preserved.
