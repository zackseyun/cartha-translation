id: ISA.32.6
reference: Isaiah 32:6
source:
  edition: WLC
  text: כִּ֤י נָבָל֙ נְבָלָ֣ה יְדַבֵּ֔ר וְ/לִבּ֖/וֹ יַעֲשֶׂה אָ֑וֶן לַ/עֲשׂ֣וֹת חֹ֗נֶף
    וּ/לְ/דַבֵּ֤ר אֶל יְהוָה֙ תּוֹעָ֔ה לְ/הָרִיק֙ נֶ֣פֶשׁ רָעֵ֔ב וּ/מַשְׁקֶ֥ה צָמֵ֖א
    יַחְסִֽיר־־׃
translation:
  text: 'For a fool speaks folly, and his heart works iniquity: to practice godlessness
    and to speak error against the LORD, to leave the hungry person empty and to withhold
    drink from the thirsty.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hypocrisy' for 'godlessness' (חֹנֶף); the Hebrew term can denote impiety
      expressed as irreligion or as hypocritical wickedness.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the hungry נפשׁ'; that is, the hungry person/life, not necessarily
      'soul' in a narrow English sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'to speak falsehood concerning the LORD' for 'to speak error against
      the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: נָבָל
  chosen: fool
  alternatives:
  - worthless man
  - scoundrel
  lexicon: HALOT
  rationale: נָבָל denotes a morally senseless or base person, not merely someone
    lacking intelligence. 'Fool' preserves the biblical ethical sense and matches
    the parallel with 'folly.'
- source_word: נְבָלָה
  chosen: folly
  alternatives:
  - outrage
  - vileness
  - senselessness
  lexicon: HALOT
  rationale: The noun can denote disgraceful folly or vile conduct. 'Folly' keeps
    the wordplay with נָבָל while still conveying moral perversity in context.
- source_word: וְלִבּוֹ יַעֲשֶׂה אָוֶן
  chosen: and his heart works iniquity
  alternatives:
  - and his mind devises wickedness
  - and his heart does evil
  lexicon: HALOT
  rationale: לֵב in Hebrew often denotes the inner will/thought center; 'heart' preserves
    the Hebrew image. אָוֶן commonly refers to wickedness, trouble, or iniquity; 'works
    iniquity' reflects deliberate inward production of evil.
- source_word: חֹנֶף
  chosen: godlessness
  alternatives:
  - hypocrisy
  - profane wickedness
  lexicon: HALOT
  rationale: Though often rendered 'hypocrisy,' the term in Isaiah regularly carries
    the broader sense of impiety or godlessness. 'Godlessness' better fits the following
    clause about speaking error against the LORD.
- source_word: אֶל יְהוָה תּוֹעָה
  chosen: to speak error against the LORD
  alternatives:
  - to utter falsehood against the LORD
  - to speak perversity concerning the LORD
  lexicon: HALOT
  rationale: תּוֹעָה denotes wandering, error, or misleading falsehood. With אֶל יְהוָה,
    the sense is speech directed against or concerning the LORD that is false and
    perverse. 'Against' best captures the hostile force in context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: לְהָרִיק נֶפֶשׁ רָעֵב
  chosen: to leave the hungry person empty
  alternatives:
  - to empty the appetite of the hungry
  - to deprive the hungry soul
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the person/life/appetite, not an abstract immaterial
    soul. 'Leave the hungry person empty' communicates deprivation in natural English
    while preserving the concrete social sense.
- source_word: וּמַשְׁקֶה צָמֵא יַחְסִיר
  chosen: and to withhold drink from the thirsty
  alternatives:
  - and he makes the drink of the thirsty fail
  - and he deprives the thirsty of drink
  lexicon: HALOT
  rationale: מַשְׁקֶה is 'drink' or 'that which is drunk'; יַחְסִיר means to make
    lacking, withhold, or deprive. The clause describes denying needed refreshment
    to the thirsty.
