theological_decisions:
- issue: Rendering of חֹנֶף in an ethical-religious context
  chosen_reading: godlessness
  alternative_readings:
  - hypocrisy
  rationale: The verse links the term with speaking falsehood against the LORD and
    oppressing the needy, so the broader category of impiety/godlessness fits better
    than the narrower English 'hypocrisy.' This avoids reducing the sin to mere insincerity.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of נֶפֶשׁ
  chosen_reading: person
  alternative_readings:
  - soul
  - appetite
  rationale: Here נֶפֶשׁ refers to the hungry individual in embodied need. Translating
    'soul' in English could suggest a dualistic meaning not intended by the Hebrew
    context.
  doctrine_reference: Translation philosophy §1, §6
