id: ISA.32.4
reference: Isaiah 32:4
source:
  edition: WLC
  text: וּ/לְבַ֥ב נִמְהָרִ֖ים יָבִ֣ין לָ/דָ֑עַת וּ/לְשׁ֣וֹן עִלְּגִ֔ים תְּמַהֵ֖ר לְ/דַבֵּ֥ר
    צָחֽוֹת׃
translation:
  text: The heart of the hasty will understand knowledge, and the tongue of stammerers
    will hurry to speak clearly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rash' instead of 'the hasty.' The Hebrew describes those who are
      impulsive or quick in judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be quick to speak plainly/distinctly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבַב
  chosen: heart
  alternatives:
  - mind
  lexicon: HALOT
  rationale: Hebrew לֵבָב/לֵב commonly denotes the inner faculty of thought and understanding,
    not merely emotion. 'Heart' preserves the Hebrew anthropological term while allowing
    the cognitive sense to be carried by the context ('will understand').
- source_word: נִמְהָרִים
  chosen: the hasty
  alternatives:
  - rash
  - impetuous
  - hurried
  lexicon: HALOT
  rationale: From מהר, describing those who are quick, rash, or impulsive. 'The hasty'
    is concise and natural in English, matching the plural adjective used substantivally.
- source_word: יָבִין
  chosen: will understand
  alternatives:
  - will discern
  - will gain understanding
  lexicon: HALOT
  rationale: From בין, 'to understand, discern.' 'Will understand' is the most direct
    and idiomatic rendering here.
- source_word: לָדַעַת
  chosen: knowledge
  alternatives:
  - to know
  - understanding
  lexicon: HALOT
  rationale: Although formally an infinitive ('to know'), in this construction it
    functions as the object/complement of understanding. Rendering it as 'knowledge'
    gives clear English while preserving the cognitive emphasis.
- source_word: לְשׁוֹן
  chosen: tongue
  alternatives:
  - speech
  - language
  lexicon: HALOT
  rationale: '''Tongue'' is the literal term and fits the poetic parallelism with
    ''heart.'' It also naturally introduces the speech clause that follows.'
- source_word: עִלְּגִים
  chosen: stammerers
  alternatives:
  - those who stutter
  - the tongue-tied
  lexicon: HALOT
  rationale: The adjective denotes impeded or halting speech. 'Stammerers' is a natural
    plural substantive in English and preserves the concrete image.
- source_word: תְּמַהֵר
  chosen: will hurry
  alternatives:
  - will be quick
  - will hasten
  lexicon: HALOT
  rationale: From מהר in the Piel, expressing promptness. 'Will hurry' keeps the verbal
    link with the earlier 'hasty' while remaining idiomatic.
- source_word: לְדַבֵּר
  chosen: to speak
  alternatives:
  - to talk
  lexicon: HALOT
  rationale: Standard rendering of דבר in this infinitive construction after 'will
    hurry.'
- source_word: צָחוֹת
  chosen: clearly
  alternatives:
  - plainly
  - distinctly
  lexicon: HALOT
  rationale: The term conveys clarity, plainness, or distinctness of speech. 'Clearly'
    is the most natural adverbial rendering in contemporary English. 'Plainly' is
    possible, but 'clearly' better matches the contrast with stammering.
