id: ISA.32.17
reference: Isaiah 32:17
source:
  edition: WLC
  text: וְ/הָיָ֛ה מַעֲשֵׂ֥ה הַ/צְּדָקָ֖ה שָׁל֑וֹם וַֽ/עֲבֹדַת֙ הַ/צְּדָקָ֔ה הַשְׁקֵ֥ט
    וָ/בֶ֖טַח עַד עוֹלָֽם־׃
translation:
  text: And the work of righteousness will be peace, and the service of righteousness,
    quietness and security forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the effect/result of righteousness will be peace.' The Hebrew מַעֲשֵׂה
      can denote both the work itself and what it produces.
    reason: lexical_alternative
  - marker: b
    text: '''Righteousness'' may also be rendered ''justice'' here, since צדקה in
      prophetic contexts can include social rightness as well as moral righteousness.'
    reason: alternative_reading
  - marker: c
    text: '''Peace'' (shalom) carries the broader sense of wholeness and well-being,
      not merely the absence of conflict.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will be
  alternatives:
  - And ... shall be
  - Then ... will become
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly
    carries a future/resultative sense. 'Will be' gives natural modern English while
    preserving the predictive force.
- source_word: מַעֲשֵׂה
  chosen: work
  alternatives:
  - deed
  - effect
  - result
  lexicon: HALOT
  rationale: The noun can denote deed, work, or product/result. Here, paired with
    a following predicate ('peace'), it could be understood as either the practice
    or the outcome of righteousness. 'Work' preserves the lexical link to action while
    remaining broad enough to include its produced effect.
- source_word: הַצְּדָקָה
  chosen: righteousness
  alternatives:
  - justice
  lexicon: HALOT
  rationale: The default rendering for צדקה in the doctrine excerpt is 'righteousness,'
    with 'justice' as an alternative. In this context the term likely includes social
    and moral rightness, but 'righteousness' best preserves the Hebrew wording and
    the theological breadth. The alternative is preserved in a footnote.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: '''Peace'' is the standard and sufficiently broad rendering, while still
    allowing the fuller Hebrew sense of wholeness and flourishing to be heard. More
    expansive glosses would risk paraphrase in the main text.'
- source_word: וַעֲבֹדַת
  chosen: service
  alternatives:
  - labor
  - cultivation
  - effect
  lexicon: HALOT
  rationale: The noun עבודה can denote work, service, or labor. Since it parallels
    'work' yet is not identical, 'service' preserves the distinction between the two
    cola without overinterpreting the nuance.
- source_word: הַשְׁקֵט
  chosen: quietness
  alternatives:
  - quiet
  - restfulness
  - tranquility
  lexicon: HALOT
  rationale: The term denotes quietness or undisturbed calm. 'Quietness' matches the
    nominal style of the Hebrew and pairs well with the following noun.
- source_word: וָבֶטַח
  chosen: security
  alternatives:
  - confidence
  - safety
  lexicon: HALOT
  rationale: בטח can denote security, safety, or confidence. Here the context emphasizes
    settled safety as the fruit of righteousness, so 'security' best captures the
    objective state rather than merely subjective feeling.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - unto eternity
  - for an age
  lexicon: HALOT
  rationale: The phrase idiomatically expresses enduring perpetuity. 'Forever' is
    clear modern English and fits the prophetic promise without unnecessary archaism.
