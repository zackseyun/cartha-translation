- issue: Rendering of צדקה
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Following the doctrine table, the default rendering is 'righteousness,'
    while acknowledging that the Hebrew can also carry the sense of justice in prophetic
    contexts. The main text preserves the broader theological and moral sense; the
    alternative is footnoted for auditability.
