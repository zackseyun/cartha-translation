id: ISA.32.14
reference: Isaiah 32:14
source:
  edition: WLC
  text: כִּֽי אַרְמ֣וֹן נֻטָּ֔שׁ הֲמ֥וֹן עִ֖יר עֻזָּ֑ב עֹ֣פֶל וָ/בַ֜חַן הָיָ֨ה בְעַ֤ד
    מְעָרוֹת֙ עַד עוֹלָ֔ם מְשׂ֥וֹשׂ פְּרָאִ֖ים מִרְעֵ֥ה עֲדָרִֽים־־׃
translation:
  text: For the palace is abandoned, the crowded city is forsaken; Ophel and the watchtower
    have become caves forever, a joy for wild donkeys, a pasture for flocks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bustling city' for 'the crowded city'; the Hebrew phrase literally
      involves the city's 'multitude' or 'noise.'
    reason: lexical_alternative
  - marker: b
    text: '''Ophel'' is a place-name, likely the fortified hill or mound area of Jerusalem.'
    reason: cultural_note
  - marker: c
    text: Or 'have become dens forever'; the Hebrew may emphasize ruined fortifications
      turned into animal haunts.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַרְמוֹן
  chosen: palace
  alternatives:
  - citadel
  lexicon: HALOT
  rationale: Refers to a prominent royal or fortified building. 'Palace' is the most
    natural English equivalent here and fits the urban-judgment context.
- source_word: נֻטָּשׁ
  chosen: is abandoned
  alternatives:
  - is deserted
  - is forsaken
  lexicon: HALOT
  rationale: Passive participial sense indicating something left behind or deserted.
    'Abandoned' is idiomatic and suits the image of urban desolation.
- source_word: הֲמוֹן עִיר
  chosen: the crowded city
  alternatives:
  - the bustling city
  - the city's multitude
  lexicon: HALOT
  rationale: The construct phrase literally involves the 'multitude/noise' of a city.
    In context it denotes the populous, busy urban center. 'Crowded city' preserves
    the concrete urban sense without over-paraphrasing.
- source_word: עֻזָּב
  chosen: is forsaken
  alternatives:
  - is abandoned
  - is left
  lexicon: HALOT
  rationale: Passive form from עזב, parallel to נֻטָּשׁ. Using 'forsaken' gives slight
    variation while preserving the parallel judgment imagery.
- source_word: עֹפֶל
  chosen: Ophel
  alternatives:
  - the mound
  - the fortified hill
  lexicon: HALOT
  rationale: Best taken as the proper place-name/topographical term associated with
    Jerusalem. Per translation philosophy, names are transliterated rather than translated
    when functioning as names.
- source_word: בַּחַן
  chosen: the watchtower
  alternatives:
  - the tower
  - the lookout tower
  lexicon: HALOT
  rationale: Likely denotes a lookout or watchtower. 'Watchtower' is specific and
    fits the paired urban-fortification imagery with Ophel.
- source_word: הָיָה בְעַד מְעָרוֹת
  chosen: have become caves
  alternatives:
  - have become dens
  - have become holes/caverns
  lexicon: HALOT
  rationale: The singular verb with compound subject is naturally rendered in English
    with plural agreement. בְעַד here is taken in the sense of 'into/for' with מְעָרוֹת,
    yielding the idea that these structures become cave-like ruins or dens.
- source_word: מְעָרוֹת
  chosen: caves
  alternatives:
  - dens
  - caverns
  lexicon: HALOT
  rationale: Basic sense is caves or dens. 'Caves' is the more literal rendering;
    the ruin imagery implies habitation by animals.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for a long age
  lexicon: HALOT
  rationale: Standard idiom for enduring duration. In prophetic judgment language,
    'forever' is the conventional and sufficiently transparent rendering.
- source_word: מְשׂוֹשׂ פְּרָאִים
  chosen: a joy for wild donkeys
  alternatives:
  - a delight for wild donkeys
  lexicon: HALOT
  rationale: Construct phrase indicating what brings delight to wild donkeys. 'Wild
    donkeys' is the normal rendering of פראים.
- source_word: מִרְעֵה עֲדָרִים
  chosen: a pasture for flocks
  alternatives:
  - grazing land for herds
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'Flocks' fits the likely small-stock
    pastoral image and is idiomatic in English.
