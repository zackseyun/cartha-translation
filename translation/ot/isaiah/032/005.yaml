theological_decisions:
- issue: Nature of the verse's contrast
  chosen_reading: A social-moral reversal in which people are no longer misidentified
    with honorable titles.
  alternative_readings:
  - A primarily eschatological statement about the messianic age
  - A general proverb about truthful speech
  rationale: The Hebrew directly concerns the naming or public designation of morally
    corrupt people with honorable labels. The broader context may be eschatological,
    but this verse itself states the reversal without requiring an explicitly messianic
    expansion in translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
