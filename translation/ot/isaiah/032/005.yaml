id: ISA.32.5
reference: Isaiah 32:5
source:
  edition: WLC
  text: לֹֽא יִקָּרֵ֥א ע֛וֹד לְ/נָבָ֖ל נָדִ֑יב וּ/לְ/כִילַ֕י לֹ֥א יֵֽאָמֵ֖ר שֽׁוֹעַ־׃
translation:
  text: No longer will the fool be called noble, nor will the scoundrel be spoken
    of as generous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the worthless man' for 'the fool'; the Hebrew term stresses moral baseness
      as well as folly.
    reason: lexical_alternative
  - marker: b
    text: Or 'princely' or 'generous' for 'noble.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the miser' or 'the stingy man' for 'the scoundrel.'
    reason: lexical_alternative
  - marker: d
    text: Or 'noble,' 'rich,' or 'important' for 'generous.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָבָל
  chosen: the fool
  alternatives:
  - the worthless man
  - the vile person
  lexicon: HALOT
  rationale: נָבָל commonly denotes a morally senseless or base person, not merely
    someone lacking intelligence. 'The fool' is concise, idiomatic, and preserves
    the ethical force familiar from wisdom literature, while alternatives are possible
    in context.
- source_word: נָדִיב
  chosen: noble
  alternatives:
  - princely
  - generous
  lexicon: HALOT
  rationale: נָדִיב can denote one who is noble, willing, or generous. In this social-reversal
    context, 'noble' best matches public status or honorable designation, fitting
    the passive 'be called' and pairing well with the second colon's social title
    language.
- source_word: כִּילַי
  chosen: the scoundrel
  alternatives:
  - the stingy man
  - the miser
  - the knave
  lexicon: HALOT
  rationale: כִּילַי refers to a mean, miserly, or morally shabby person. Because
    the verse contrasts false social labeling rather than only economic behavior,
    'the scoundrel' captures the broader pejorative sense better than the narrower
    'miser,' while still allowing the greed-related nuance to be noted.
- source_word: שׁוֹעַ
  chosen: generous
  alternatives:
  - noble
  - rich
  - important
  lexicon: HALOT
  rationale: שׁוֹעַ can refer to a person of standing, wealth, or nobility. Here,
    since the immediate contrast is with כִּילַי, a miserly/base person, 'generous'
    brings out the ethical-social contrast in natural English. The semantic overlap
    with status terms is preserved in the footnote alternatives.
- source_word: יִקָּרֵא
  chosen: will be called
  alternatives:
  - will be proclaimed
  - will be named
  lexicon: HALOT
  rationale: The Niphal of קרא here is a standard passive, indicating how a person
    is designated by others. 'Will be called' is the most natural and direct rendering.
- source_word: יֵאָמֵר
  chosen: will be spoken of as
  alternatives:
  - will be said to be
  - will be called
  lexicon: HALOT
  rationale: The Niphal of אמר is passive/impersonal speech language. Rendering it
    as 'will be spoken of as' preserves the distinction from the first colon's קרא
    while remaining idiomatic in English.
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - any more
  - again
  lexicon: HALOT
  rationale: With the negation, עוֹד marks cessation of a prior or present condition.
    'No longer' is the clearest idiomatic English expression.
