id: ISA.32.11
reference: Isaiah 32:11
source:
  edition: WLC
  text: חִרְדוּ֙ שַֽׁאֲנַנּ֔וֹת רְגָ֖זָה בֹּֽטְח֑וֹת פְּשֹׁ֣טָֽה וְ/עֹ֔רָה וַ/חֲג֖וֹרָה עַל חֲלָצָֽיִם־׃
translation:
  text: Tremble, you complacent women; shudder, you confident ones. Strip, make yourselves bare, and tie sackcloth around your waist.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'around the loins.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew does not explicitly state 'sackcloth' in this verse, but the command to gird something around the waist in this prophetic mourning context is commonly understood as sackcloth.
    reason: cultural_note
  - marker: c
    text: Or 'Strip yourselves bare, and make yourselves naked'.
    reason: previous_rendering
lexical_decisions:
- source_word: חִרְדוּ
  chosen: Tremble
  alternatives:
  - Shudder
  - Be terrified
  lexicon: HALOT
  rationale: Imperative plural from חרד, calling for fearful trembling. 'Tremble' is direct and idiomatic in English.
- source_word: שַׁאֲנַנּוֹת
  chosen: you complacent women
  alternatives:
  - you at-ease women
  - you carefree women
  lexicon: HALOT
  rationale: Feminine plural adjective/substantive addressing women characterized by ease or complacency. 'Complacent' fits the prophetic rebuke better than the softer 'carefree.' Gender is preserved per translation philosophy.
- source_word: רְגָזָה
  chosen: shudder
  alternatives:
  - quake
  - be agitated
  lexicon: HALOT
  rationale: Imperative feminine plural from רגז, parallel to the first command but with a nuance of agitation or quaking. 'Shudder' gives a natural English parallel distinct from 'tremble.'
- source_word: בֹּטְחוֹת
  chosen: you confident ones
  alternatives:
  - you trusting women
  - you secure ones
  lexicon: HALOT
  rationale: Feminine plural participle from בטח, describing those feeling secure/confident. 'Confident ones' preserves the substantive force and the ironic prophetic address.
- source_word: פְּשֹׁטָה
  chosen: Strip yourselves bare
  alternatives:
  - Strip off your clothes
  - Undress
  lexicon: HALOT
  rationale: Imperative feminine plural from פשט, here in context of removing garments as a sign of mourning or humiliation. 'Strip yourselves bare' is vivid without over-paraphrasing.
- source_word: וְעֹרָה
  chosen: and make yourselves naked
  alternatives:
  - and lay yourselves bare
  - and uncover yourselves
  lexicon: HALOT
  rationale: Imperative feminine plural, likely from עור/ערה in the sense of laying bare or making naked. In sequence with פשטה it intensifies the command. 'Make yourselves naked' reflects the exposed state more clearly than a redundant second 'strip.'
- source_word: וַחֲגֹרָה
  chosen: and tie sackcloth
  alternatives:
  - and gird yourselves with sackcloth
  - and bind sackcloth on yourselves
  lexicon: HALOT
  rationale: Imperative feminine plural from חגר, to gird or tie on. Although 'sackcloth' is not explicit in the consonantal text of this verse, the idiom with 'around the waist/loins' in mourning contexts strongly implies it; many translations supply it. Supplying 'sackcloth' makes the sense clear in modern English while staying close to the idiom.
- source_word: עַל חֲלָצָיִם
  chosen: around your waist
  alternatives:
  - around your loins
  - on your hips
  lexicon: HALOT
  rationale: Literally 'upon the loins/waist.' 'Around your waist' is natural modern English; 'loins' is more formal/literal but less idiomatic for contemporary readers.
