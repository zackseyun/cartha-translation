id: ISA.32.20
reference: Isaiah 32:20
source:
  edition: WLC
  text: אַשְׁרֵי/כֶ֕ם זֹרְעֵ֖י עַל כָּל מָ֑יִם מְשַׁלְּחֵ֥י רֶֽגֶל הַ/שּׁ֖וֹר וְ/הַ/חֲמֽוֹר־־־׃ס
translation:
  text: Blessed are you who sow beside all waters, who let the ox and the donkey range
    free.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'who send out the foot of the ox and the donkey,' an idiom for
      letting them roam or graze freely.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵיכֶם
  chosen: Blessed are you
  alternatives:
  - Happy are you
  - How blessed you are
  lexicon: HALOT
  rationale: The plural construct interjection expresses a state of blessedness or
    enviable flourishing. 'Blessed are you' preserves the beatitude-like force better
    than the flatter 'happy.'
- source_word: זֹרְעֵי
  chosen: who sow
  alternatives:
  - sowers
  - those who sow
  lexicon: HALOT
  rationale: The participle identifies the addressees by ongoing action. Rendering
    with a relative clause gives natural English while preserving the participial
    sense.
- source_word: עַל כָּל מָיִם
  chosen: beside all waters
  alternatives:
  - upon all waters
  - by every water
  lexicon: HALOT
  rationale: The preposition with 'all waters' likely evokes abundant, well-watered
    places suitable for sowing. 'Beside all waters' is idiomatic and fits the agricultural
    image better than the more wooden 'upon all waters.'
- source_word: מְשַׁלְּחֵי רֶגֶל
  chosen: who let ... range free
  alternatives:
  - who send out the foot of
  - who turn loose the feet of
  - who let ... roam
  lexicon: HALOT
  rationale: Literally 'sending forth foot,' an idiom for turning animals loose to
    graze or move freely. The idiomatic English 'let ... range free' communicates
    the agricultural practice without obscuring the sense.
- source_word: הַשּׁוֹר
  chosen: the ox
  alternatives:
  - the cattle
  - the bull
  lexicon: HALOT
  rationale: '''Ox'' is the standard singular rendering for bovine draft animal in
    this kind of agrarian context and pairs naturally with ''donkey.'''
- source_word: וְהַחֲמוֹר
  chosen: the donkey
  alternatives:
  - the ass
  lexicon: HALOT
  rationale: '''Donkey'' is clear modern English and avoids archaic or potentially
    distracting wording.'
