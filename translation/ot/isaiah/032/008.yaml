id: ISA.32.8
reference: Isaiah 32:8
source:
  edition: WLC
  text: וְ/נָדִ֖יב נְדִיב֣וֹת יָעָ֑ץ וְ/ה֖וּא עַל נְדִיב֥וֹת יָקֽוּם־׃פ
translation:
  text: But a noble man plans noble things, and on noble things he stands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plans generous things' / 'on generous things he stands.' The Hebrew
      נָדִיב / נְדִיבוֹת can carry the sense of nobility or generosity.
    reason: lexical_alternative
  - marker: b
    text: Or 'and by noble things he stands' or 'and he is established in noble things.'
      The Hebrew expression with עַל ... יָקוּם is concise and allows more than one
      closely related nuance.
    reason: alternative_reading
lexical_decisions:
- source_word: נָדִיב
  chosen: a noble man
  alternatives:
  - a noble person
  - the generous man
  - the prince
  lexicon: HALOT
  rationale: The adjective/substantive נָדִיב denotes one who is noble, princely,
    or generous. In this context, contrasted with the worthless person in the surrounding
    verses, 'noble man' best preserves both the masculine singular form and the moral-social
    sense without over-specifying political rank. 'Man' follows the gender-accurate
    policy for a grammatically masculine singular representative figure.
- source_word: נְדִיבוֹת
  chosen: noble things
  alternatives:
  - generous things
  - noble deeds
  lexicon: HALOT
  rationale: The plural abstract noun can denote noble or generous acts/plans. 'Noble
    things' keeps the repetition with נָדִיב and preserves the broader scope, including
    intentions and actions. 'Generous things' is possible, but the immediate literary
    contrast emphasizes character and worth, not merely liberality.
- source_word: יָעָץ
  chosen: plans
  alternatives:
  - counsels
  - devises
  - purposes
  lexicon: HALOT
  rationale: The verb יעץ commonly means to advise, counsel, or plan. Here the subject
    is forming intentions rather than giving advice to others, so 'plans' is the most
    natural modern English rendering.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - by
  - upon
  - because of
  lexicon: HALOT
  rationale: The preposition עַל here is somewhat idiomatic with קום. Rendering it
    as 'on' preserves the Hebrew image of standing upon or being established on noble
    things, while remaining intelligible in English.
- source_word: יָקוּם
  chosen: he stands
  alternatives:
  - he rises
  - he is established
  - he remains firm
  lexicon: HALOT
  rationale: קום literally means 'rise/stand.' In this context it likely conveys persistence
    or firm establishment in noble purposes. 'He stands' preserves the concrete Hebrew
    verb while allowing the ethical sense to emerge from context.
