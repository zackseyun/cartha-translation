theological_decisions:
- issue: Referent of 'a man' in context
  chosen_reading: Rendered generically as 'a man' without specifying messianic or
    merely collective reference.
  alternative_readings:
  - the king of the preceding verse individually
  - each ruler under the king collectively
  - a typological pointer to the Messiah
  rationale: The immediate context (32:1) mentions a king and princes, so the singular
    may function representatively. The translation preserves the Hebrew wording and
    leaves the interpretive scope open rather than importing a more specific doctrinal
    identification into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; gender-accurate
    over gender-neutral.
