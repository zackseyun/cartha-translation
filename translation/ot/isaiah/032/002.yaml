id: ISA.32.2
reference: Isaiah 32:2
source:
  edition: WLC
  text: וְ/הָיָה אִ֥ישׁ כְּ/מַֽחֲבֵא ר֖וּחַ וְ/סֵ֣תֶר זָ֑רֶם כְּ/פַלְגֵי מַ֣יִם בְּ/צָי֔וֹן
    כְּ/צֵ֥ל סֶֽלַע כָּבֵ֖ד בְּ/אֶ֥רֶץ עֲיֵפָֽה־־־־׃
translation:
  text: And a man will be like a hiding place from the wind, and a shelter from the
    storm, like streams of water in a dry place, like the shade of a massive rock
    in a weary land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a refuge from the wind.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a shelter from the downpour' or 'from the tempest.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'a man' may refer representatively to the ideal ruler of the
      previous verse, to each just ruler, or typologically beyond them.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will be
  alternatives:
  - and he will be
  - then ... will be
  lexicon: HALOT
  rationale: Qal perfect with prefixed waw in prophetic discourse is naturally rendered
    as a future/resultative statement in English. The conjunction is retained as 'And'
    to preserve the verse's linkage with the preceding context.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - each man
  - a person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine 'man.' In context it likely refers to
    the ideal ruler/leader of the preceding verse, but the lexical form is singular
    and gendered, so 'a man' best matches the source while preserving the representative
    force.
- source_word: מַחֲבֵא רוּחַ
  chosen: a hiding place from the wind
  alternatives:
  - a refuge from the wind
  - a shelter from the wind
  lexicon: HALOT
  rationale: מַחֲבֵא denotes a place of concealment or refuge. 'Hiding place' preserves
    the concrete imagery; 'from the wind' reflects the protective sense of the construct
    relationship in context.
- source_word: סֵתֶר זָרֶם
  chosen: a shelter from the storm
  alternatives:
  - a cover from the downpour
  - a hiding place from the tempest
  lexicon: HALOT
  rationale: סֵתֶר is 'cover, shelter, hiding place.' זָרֶם refers to a storm-rain,
    torrent, or downpour. 'Storm' is idiomatic and broad enough to convey the threatening
    weather image without over-specifying rain alone.
- source_word: פַלְגֵי מַיִם
  chosen: streams of water
  alternatives:
  - channels of water
  - divisions of water
  lexicon: HALOT
  rationale: The phrase commonly denotes flowing watercourses or streams. 'Streams
    of water' is natural English and preserves the life-giving image.
- source_word: בְּצָיוֹן
  chosen: in a dry place
  alternatives:
  - in drought
  - in a parched land
  lexicon: HALOT
  rationale: The noun denotes dryness, aridity, or a dry region. 'In a dry place'
    fits the parallel imagery and avoids over-interpretation.
- source_word: צֵל סֶלַע כָּבֵד
  chosen: the shade of a massive rock
  alternatives:
  - the shadow of a great rock
  - the shade of a heavy rock
  lexicon: HALOT
  rationale: צֵל is 'shade/shadow.' סֶלַע is a crag or rock. כָּבֵד literally means
    'heavy,' but in this descriptive context 'massive' better conveys the sense of
    imposing size and substantial protection in idiomatic English.
- source_word: בְּאֶרֶץ עֲיֵפָה
  chosen: in a weary land
  alternatives:
  - in an exhausted land
  - in a faint land
  lexicon: HALOT
  rationale: עֲיֵפָה means weary, faint, exhausted. Applied to land, it is metaphorical,
    describing a place that wears people down through heat and barrenness. 'Weary
    land' preserves the metaphor and traditional force.
