id: ISA.12.1
reference: Isaiah 12:1
source:
  edition: WLC
  text: וְ/אָֽמַרְתָּ֙ בַּ/יּ֣וֹם הַ/ה֔וּא אוֹדְ/ךָ֣ יְהוָ֔ה כִּ֥י אָנַ֖פְתָּ בִּ֑/י
    יָשֹׁ֥ב אַפְּ/ךָ֖ וּֽ/תְנַחֲמֵֽ/נִי׃
translation:
  text: And you will say in that day, “I will praise you, O LORD, for though you were
    angry with me, your anger has turned away, and you comfort me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I will thank you, O LORD,” since the Hebrew verb can mean either giving
      thanks or praising in worship.
    reason: lexical_alternative
  - marker: b
    text: Literally, “your anger turned back.” Hebrew 'nose' or 'anger' is an idiom
      for wrath.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: And you will say
  alternatives:
  - And you shall say
  - Then you will say
  lexicon: HALOT
  rationale: 'Qal perfect 2ms with prefixed conjunction in prophetic discourse functions
    as a future-like statement: ''and you will say.'' ''Shall'' is possible but less
    natural in modern English.'
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: A standard prophetic temporal expression. 'In that day' preserves the
    idiomatic eschatological/prophetic flavor better than the more ordinary 'on that
    day.'
- source_word: אוֹדְךָ
  chosen: I will praise you
  alternatives:
  - I will thank you
  - I will give thanks to you
  lexicon: HALOT
  rationale: ידה in the Hiphil commonly means confess/praise/give thanks. Here the
    context is worship after deliverance, so 'praise' best captures the doxological
    force in natural English. 'Thank' is possible, but narrower.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD.' The vocative 'O LORD' reflects direct address.
- source_word: כִּי
  chosen: for though
  alternatives:
  - for
  - because
  - although
  lexicon: HALOT
  rationale: 'כִּי introduces the reason for praise, while the clause as a whole carries
    a concessive sense in context: the speaker praises because, although God had been
    angry, that anger has turned away. English idiom is best served by making the
    concessive nuance explicit.'
- source_word: אָנַפְתָּ בִּי
  chosen: you were angry with me
  alternatives:
  - you were angry at me
  - you raged against me
  lexicon: HALOT
  rationale: The verb אָנף denotes being angry. 'Angry with me' is idiomatic and appropriately
    personal; 'raged against me' overstates the intensity.
- source_word: יָשֹׁב אַפְּךָ
  chosen: your anger has turned away
  alternatives:
  - your anger turned back
  - your wrath has turned away
  lexicon: HALOT
  rationale: Literally, 'your nose/anger will turn back.' Since אַף is an idiom for
    anger, 'your anger has turned away' communicates the sense clearly. Present perfect
    in English fits the resulting state within the praise formula. 'Wrath' is possible
    but somewhat more elevated than needed.
- source_word: וּתְנַחֲמֵנִי
  chosen: and you comfort me
  alternatives:
  - and you have comforted me
  - and you console me
  lexicon: HALOT
  rationale: נחם in the Piel means comfort/console. 'Comfort' is the standard rendering.
    The English present reflects the ongoing result of divine favor after anger has
    ceased; this reads naturally in parallel with the preceding clause.
