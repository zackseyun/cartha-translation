theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Concessive force in the clause introduced by כִּי
  chosen_reading: for though you were angry with me
  alternative_readings:
  - for you were angry with me
  - because you were angry with me
  rationale: The Hebrew does not use a separate concessive particle, but the sequence
    'you were angry... your anger turned away... and you comfort me' strongly implies
    concession. Making that nuance explicit preserves the sense without importing
    extra theology.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    source sense without paraphrase'
