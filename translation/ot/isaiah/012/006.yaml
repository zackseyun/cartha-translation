id: ISA.12.6
reference: Isaiah 12:6
source:
  edition: WLC
  text: צַהֲלִ֥י וָ/רֹ֖נִּי יוֹשֶׁ֣בֶת צִיּ֑וֹן כִּֽי גָד֥וֹל בְּ/קִרְבֵּ֖/ךְ קְד֥וֹשׁ
    יִשְׂרָאֵֽל־׃פ
translation:
  text: Cry aloud and shout for joy, inhabitant of Zion, for great in your midst is
    the Holy One of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Shout and sing for joy.' The second imperative can carry the sense of
      jubilant singing as well as joyful shouting.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'inhabitant of Zion,' feminine singular, personifying Zion as a woman
      addressed directly.
    reason: cultural_note
lexical_decisions:
- source_word: צַהֲלִי
  chosen: Cry aloud
  alternatives:
  - Shout
  - Exult
  lexicon: HALOT
  rationale: Imperative 2fs from צהל, denoting a loud cry or exultant shout. 'Cry
    aloud' preserves the vocal, forceful sense without collapsing it into the following
    imperative.
- source_word: וָרֹנִּי
  chosen: and shout for joy
  alternatives:
  - and sing
  - and rejoice
  lexicon: HALOT
  rationale: Imperative 2fs from רנן, often expressing ringing cries of joy, sometimes
    song. 'Shout for joy' best captures the jubilant vocal expression in parallel
    with the first imperative; 'sing' is possible but narrower than the Hebrew.
- source_word: יוֹשֶׁבֶת צִיּוֹן
  chosen: inhabitant of Zion
  alternatives:
  - daughter of Zion
  - O Zion who dwellest
  lexicon: HALOT
  rationale: The feminine singular participle 'inhabiting/dwelling' addresses Zion
    personified as a female resident. 'Inhabitant of Zion' is a natural English singular
    vocative that preserves the personification without importing the more idiomatic
    but different expression 'daughter of Zion,' which is not the wording here.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the imperatives. 'For' is concise and idiomatic
    in elevated English.
- source_word: גָדוֹל
  chosen: great
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: Predicate adjective describing the Holy One of Israel. 'Great' is the
    plain lexical sense and avoids over-specifying the nuance as power alone.
- source_word: בְּקִרְבֵּךְ
  chosen: in your midst
  alternatives:
  - within you
  - among you
  lexicon: HALOT
  rationale: Second feminine singular suffix matches the personified Zion. 'In your
    midst' preserves both the locative sense and the direct address.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  alternatives:
  - Israel's Holy One
  lexicon: HALOT
  rationale: A fixed Isaianic divine title. The traditional and transparent rendering
    'the Holy One of Israel' preserves the title's theological weight and recognizability.
