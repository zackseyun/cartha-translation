theological_decisions:
- issue: Personification of Zion as feminine singular addressee
  chosen_reading: Retain singular direct address with 'inhabitant of Zion' and 'your
    midst'
  alternative_readings:
  - Address the community more collectively as 'people of Zion' or 'inhabitants of
    Zion'
  rationale: The Hebrew consistently uses feminine singular forms, personifying Zion.
    Preserving the singular maintains the poetic imagery and avoids flattening the
    text into a generic plural.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4 and #6'
- issue: Divine title in Isaianic theology
  chosen_reading: Render קְדוֹשׁ יִשְׂרָאֵל as 'the Holy One of Israel'
  alternative_readings:
  - Israel's Holy One
  rationale: This title emphasizes YHWH's holiness in covenant relation to Israel.
    The chosen rendering is both literal and theologically transparent without adding
    interpretive content.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
