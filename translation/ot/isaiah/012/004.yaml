theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies the default rendering of יהוה as 'the
    LORD,' following Jewish reverence tradition and the LXX pattern, while preserving
    alternatives in documentation rather than the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of כִּי after הַזְכִּירוּ
  chosen_reading: 'content/result nuance: ''proclaim that his name is exalted'''
  alternative_readings:
  - 'causal nuance: ''proclaim, for his name is exalted'''
  rationale: Both are grammatically possible. The content clause works smoothly with
    the preceding imperative and preserves the poetic sequence of commands. The causal
    reading is preserved in a footnote to maintain the text's interpretive openness.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
