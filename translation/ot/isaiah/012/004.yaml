id: ISA.12.4
reference: Isaiah 12:4
source:
  edition: WLC
  text: וַ/אֲמַרְתֶּ֞ם בַּ/יּ֣וֹם הַ/ה֗וּא הוֹד֤וּ לַֽ/יהוָה֙ קִרְא֣וּ בִ/שְׁמ֔/וֹ
    הוֹדִ֥יעוּ בָֽ/עַמִּ֖ים עֲלִֽילֹתָ֑י/ו הַזְכִּ֕ירוּ כִּ֥י נִשְׂגָּ֖ב שְׁמֽ/וֹ׃
translation:
  text: 'And you will say on that day: “Give thanks to the LORD; call on his name.
    Make his deeds known among the peoples; proclaim that his name is exalted.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'proclaim, for his name is exalted.' The Hebrew conjunction can be read
      causally ('for') rather than as introducing the content of the proclamation
      ('that').
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the LORD' represents the divine name YHWH; alternatively, 'Yahweh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲמַרְתֶּם
  chosen: And you will say
  alternatives:
  - And you shall say
  - Then you will say
  lexicon: HALOT
  rationale: Wayyiqtol 2mp of אמר in prophetic discourse naturally carries future
    sense in English. 'And you will say' preserves the sequential force from the previous
    verse without sounding archaic.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal idiom in prophetic literature. 'On that day' is idiomatic
    modern English and preserves the eschatological/prophetic marker.
- source_word: הוֹדוּ לַיהוָה
  chosen: Give thanks to the LORD
  alternatives:
  - Praise the LORD
  - Confess thanks to the LORD
  lexicon: HALOT
  rationale: Hiphil imperative plural of ידה with ל marks thanksgiving/praise directed
    to YHWH. 'Give thanks' best matches the common cultic sense here. Per doctrine,
    יהוה is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'The divine name יהוה follows the project''s contested-terms policy:
    default rendering ''the LORD'' in the main text.'
- source_word: קִרְאוּ בִשְׁמוֹ
  chosen: call on his name
  alternatives:
  - call upon his name
  - proclaim his name
  lexicon: HALOT
  rationale: קרא + בְּשֵׁם commonly means invocation/appeal to someone by name, especially
    in worship contexts. 'Call on his name' preserves the idiom better than flattening
    it to mere proclamation.
- source_word: הוֹדִיעוּ
  chosen: Make known
  alternatives:
  - Declare
  - Cause to know
  lexicon: HALOT
  rationale: Hiphil imperative of ידע means to make something known. 'Make known'
    is both accurate and natural.
- source_word: בָעַמִּים
  chosen: among the peoples
  alternatives:
  - among the nations
  - to the peoples
  lexicon: HALOT
  rationale: עמים often means peoples/nations. 'Among the peoples' fits the preposition
    ב and preserves the plural ethnic scope without overloading the term with later
    geopolitical connotations.
- source_word: עֲלִילֹתָיו
  chosen: his deeds
  alternatives:
  - his acts
  - his mighty acts
  lexicon: HALOT
  rationale: The noun denotes deeds/actions, often notable acts of God. 'His deeds'
    is broad and accurate; 'mighty acts' is interpretive and adds emphasis not explicit
    in the word itself.
- source_word: הַזְכִּירוּ
  chosen: proclaim
  alternatives:
  - make mention
  - cause to remember
  - remind
  lexicon: HALOT
  rationale: Hiphil imperative of זכר literally means cause to remember/mention. In
    this poetic parallelism, the sense is public verbal declaration. 'Proclaim' communicates
    the force in natural English while fitting the worship context.
- source_word: כִּי נִשְׂגָּב שְׁמוֹ
  chosen: that his name is exalted
  alternatives:
  - for his name is exalted
  - that his name is high
  - for his name is lifted high
  lexicon: HALOT
  rationale: נשגב conveys being high, exalted, inaccessible in majesty. 'Exalted'
    is the most natural theological-English equivalent. כִּי here can introduce content
    ('that') or reason ('for'); 'that' fits well after 'proclaim,' though the causal
    nuance remains possible.
