id: ISA.12.3
reference: Isaiah 12:3
source:
  edition: WLC
  text: וּ/שְׁאַבְתֶּם מַ֖יִם בְּ/שָׂשׂ֑וֹן מִ/מַּעַיְנֵ֖י הַ/יְשׁוּעָֽה־׃
translation:
  text: With joy you will draw water from the springs of salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the wells of salvation' or 'from the fountains of salvation.'
    reason: lexical_alternative
  - marker: b
    text: '''Salvation'' may also be rendered ''deliverance'' in this context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁאַבְתֶּם
  chosen: you will draw
  alternatives:
  - and you will draw
  - you shall draw
  lexicon: HALOT
  rationale: Qal perfect 2mp with prefixed conjunction in prophetic discourse functions
    naturally as a future in English. The conjunction is not separately rendered as
    'and' because English style does not require it at the head of this verse, but
    the future sense should be preserved.
- source_word: מַיִם
  chosen: water
  lexicon: HALOT
  rationale: Standard rendering of the plural form used as a mass noun in English.
- source_word: בְּ/שָׂשׂוֹן
  chosen: with joy
  alternatives:
  - in joy
  - joyfully
  lexicon: HALOT
  rationale: The preposition ב plus noun is best rendered instrumentally/circumstantially
    as 'with joy.' This preserves the concrete nominal expression better than the
    adverb 'joyfully,' while remaining natural English.
- source_word: מִ/מַּעַיְנֵי
  chosen: from the springs
  alternatives:
  - from the wells
  - from the fountains
  lexicon: HALOT
  rationale: מַעְיָן commonly denotes a spring or fountain, a natural water source.
    'Springs' fits the imagery well and avoids the more constructed sense of 'wells.'
    'Fountains' is possible but less natural in contemporary English.
- source_word: הַ/יְשׁוּעָה
  chosen: of salvation
  alternatives:
  - of deliverance
  - of victory
  lexicon: HALOT
  rationale: יְשׁוּעָה most often denotes salvation/deliverance. 'Salvation' best
    preserves both the immediate sense of rescue and the broader theological resonance
    in Isaiah. The construct chain is naturally rendered 'springs of salvation.'
