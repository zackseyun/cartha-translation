theological_decisions:
- issue: Whether to render יְשׁוּעָה in a narrowly temporal sense ('deliverance')
    or with broader theological force ('salvation')
  chosen_reading: salvation
  alternative_readings:
  - deliverance
  rationale: In Isaiah 12, the surrounding context celebrates God's saving action
    in language that carries both historical and theological depth. 'Salvation' preserves
    that canonical and theological resonance without importing later doctrinal specifics
    beyond the Hebrew text.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Readable modern English, not archaic or academic.'
