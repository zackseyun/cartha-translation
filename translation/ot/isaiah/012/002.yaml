theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Echo of Exodus 15:2 in the phrase עָזִּי וְזִמְרָת יָהּ יְהוָה
  chosen_reading: Retain 'my strength and song' and repeated 'my salvation'
  alternative_readings:
  - Use more interpretive renderings such as 'my strength and my praise'
  rationale: The verse intentionally echoes Israel's song of deliverance. Preserving the lexical parallels maintains canonical resonance without over-interpreting the phrase.
