id: ISA.12.2
reference: Isaiah 12:2
source:
  edition: WLC
  text: הִנֵּ֨ה אֵ֧ל יְשׁוּעָתִ֛/י אֶבְטַ֖ח וְ/לֹ֣א אֶפְחָ֑ד כִּֽי עָזִּ֤/י וְ/זִמְרָת֙ יָ֣הּ יְהוָ֔ה וַֽ/יְהִי לִ֖/י לִֽ/ישׁוּעָֽה־־׃
translation:
  text: Behold, God is my salvation; I will trust and not be afraid, for Yah, Yahweh, is my strength and song, and he has become my salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yah, the LORD'' (יָהּ יְהוָה), a poetic double divine name; the main text renders the emphasis without using the transliterated form.'
    reason: alternative_reading
  - marker: b
    text: This line echoes Exodus 15:2 almost verbatim.
    reason: cross_reference
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Deictic/interjection marking emphatic attention. 'Behold' preserves the elevated poetic force better than flatter modern options, while remaining intelligible in context.
- source_word: אֵל
  chosen: God
  alternatives:
  - God Mighty One
  lexicon: HALOT
  rationale: Common poetic divine designation. 'God' is the natural English equivalent here; 'Mighty God' would import emphasis not explicit in this standalone use.
- source_word: יְשׁוּעָתִי
  chosen: my salvation
  alternatives:
  - my deliverance
  - my victory
  lexicon: HALOT
  rationale: The noun denotes salvation/deliverance. 'Salvation' best fits the theological and literary context of Isaiah 12 and preserves the lexical link with the final לִישׁוּעָה.
- source_word: אֶבְטַח
  chosen: I will trust
  alternatives:
  - I trust
  - I will be confident
  lexicon: HALOT
  rationale: Imperfect first person singular here expresses resolve/future confidence. 'I will trust' captures the volitional sense in the poetic confession.
- source_word: וְלֹא אֶפְחָד
  chosen: and will not be afraid
  alternatives:
  - and I will not fear
  lexicon: HALOT
  rationale: Straightforward negated imperfect. 'Be afraid' is idiomatic modern English; 'fear' remains a viable formal alternative.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the preceding confidence. 'For' best preserves the explanatory connection in English biblical style.
- source_word: עָזִּי
  chosen: my strength
  alternatives:
  - my refuge
  - my stronghold
  lexicon: HALOT
  rationale: From עֹז/עָז, denoting strength. 'My strength' is the direct lexical sense and matches the Exodus 15:2 allusion.
- source_word: וְזִמְרָת
  chosen: and song
  alternatives:
  - and praise
  - and melody
  lexicon: HALOT
  rationale: The noun is traditionally understood as 'song' here, especially in the formula echoed from Exodus 15:2. This preserves the poetic pairing 'strength and song.'
- source_word: יָהּ יְהוָה
  chosen: the LORD, the LORD himself
  alternatives:
  - Yah, the LORD
  - the LORD Yahweh
  lexicon: HALOT
  rationale: The Hebrew places the short divine name יָהּ before יְהוָה for emphatic poetic effect. Per doctrine, YHWH is rendered 'the LORD.' Because the short form is not normally transliterated in the main text under the stated policy, the repetition is represented as 'the LORD, the LORD himself' to preserve emphasis without introducing 'Yahweh' into the main line. Alternative preserved in footnote.
- source_word: וַיְהִי לִי לִישׁוּעָה
  chosen: and he has become my salvation
  alternatives:
  - and he became my salvation
  - and he was for me salvation
  lexicon: HALOT
  rationale: Wayyiqtol of היה in poetic retrospective/resultative sense. 'Has become' reads naturally in English and reflects the experiential result. Repeating 'my salvation' preserves the Hebrew inclusio with earlier יְשׁוּעָתִי.
