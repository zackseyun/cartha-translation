theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves reverential convention without obscuring that the covenant
    God of Israel is the speaker.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered filial term בָּנִים
  chosen_reading: children
  alternative_readings:
  - sons
  rationale: The Hebrew masculine plural here refers corporately to Israel rather
    than specifically to male offspring. Rendering it 'children' is gender-accurate
    to the referent while preserving the filial metaphor.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
