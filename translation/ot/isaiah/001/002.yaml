id: ISA.1.2
reference: Isaiah 1:2
source:
  edition: WLC
  text: שִׁמְע֤וּ שָׁמַ֨יִם֙ וְ/הַאֲזִ֣ינִי אֶ֔רֶץ כִּ֥י יְהוָ֖ה דִּבֵּ֑ר בָּנִים֙
    גִּדַּ֣לְתִּי וְ/רוֹמַ֔מְתִּי וְ/הֵ֖ם פָּ֥שְׁעוּ בִֽ/י׃
translation:
  text: 'Hear, O heavens, and give ear, O earth, for the LORD has spoken: “I have
    raised children and exalted them, but they have rebelled against me.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “sons.” The Hebrew is masculine plural, but here it refers corporately
      to the people as the LORD’s offspring.
    reason: lexical_alternative
  - marker: b
    text: Or “I reared children and brought them up.” The second verb can also be
      rendered more generally as “lifted up” or “made great”; here it is translated
      to preserve the sense of honor or elevation in addition to upbringing.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Imperative plural of שׁמע, a common summons to hear attentively. 'Hear'
    preserves the formal prophetic register and pairs well with the following parallel
    imperative.
- source_word: שָׁמַיִם
  chosen: O heavens
  alternatives:
  - heavens
  - sky
  lexicon: HALOT
  rationale: Vocative address to the heavens in a covenant-lawsuit setting. 'Heavens'
    is the standard plural sense; adding 'O' reflects direct address in elevated style.
- source_word: הַאֲזִינִי
  chosen: give ear
  alternatives:
  - listen attentively
  - pay attention
  lexicon: HALOT
  rationale: Imperative of אזן, stronger and more poetic than simple 'hear.' 'Give
    ear' preserves the parallelism with שׁמע and the solemn tone.
- source_word: אֶרֶץ
  chosen: O earth
  alternatives:
  - land
  - earth
  lexicon: HALOT
  rationale: In parallel with 'heavens,' the cosmic witness formula favors 'earth'
    rather than 'land.' 'O' marks the vocative force.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Introduces the ground for the summons: the LORD is speaking. ''For''
    is the most natural connective in English here.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagint tradition.
- source_word: דִּבֵּר
  chosen: has spoken
  alternatives:
  - speaks
  - has said
  lexicon: HALOT
  rationale: Perfect verb presented as a solemn declaration with present force in
    context. 'Has spoken' conveys the authoritative completed utterance introducing
    the quotation.
- source_word: בָּנִים
  chosen: children
  alternatives:
  - sons
  lexicon: HALOT
  rationale: Although formally masculine plural, the referent is the people as a whole.
    'Children' best captures the collective filial relationship without implying only
    males.
- source_word: גִּדַּלְתִּי
  chosen: I have raised
  alternatives:
  - I reared
  - I made great
  lexicon: HALOT
  rationale: In context of parenting imagery, 'raised' naturally conveys bringing
    up children. 'Reared' is possible but less natural in contemporary English.
- source_word: רוֹמַמְתִּי
  chosen: exalted
  alternatives:
  - brought up
  - made great
  - lifted up
  lexicon: HALOT
  rationale: The verb רומם adds the idea of elevating or honoring beyond mere upbringing.
    'Exalted' preserves that semantic distinction better than flattening it into another
    parenting verb.
- source_word: פָּשְׁעוּ
  chosen: have rebelled
  alternatives:
  - have transgressed
  - have revolted
  lexicon: HALOT
  rationale: פשׁע often denotes rebellion, especially covenantal revolt against rightful
    authority. 'Have rebelled' captures both the relational and legal dimensions.
- source_word: בִי
  chosen: against me
  alternatives:
  - in me
  - with me
  lexicon: HALOT
  rationale: With פשע, the preposition conveys rebellion directed against someone.
    'Against me' is the idiomatic and contextually correct English rendering.
