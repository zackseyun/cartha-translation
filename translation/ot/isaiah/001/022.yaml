id: ISA.1.22
reference: Isaiah 1:22
source:
  edition: WLC
  text: כַּסְפֵּ֖/ךְ הָיָ֣ה לְ/סִיגִ֑ים סָבְאֵ֖/ךְ מָה֥וּל בַּ/מָּֽיִם׃
translation:
  text: Your silver has become dross; your drink is diluted with water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your wine is mixed with water.' The Hebrew term can refer more specifically
      to wine or strong drink.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּסְפֵּךְ
  chosen: your silver
  alternatives:
  - your money
  lexicon: HALOT
  rationale: כֶּסֶף commonly denotes silver, and in prophetic imagery here the literal
    metal best preserves the metaphor of corruption. 'Money' is possible in some contexts
    but would weaken the parallel with 'dross.' The 2fs suffix is retained as 'your,'
    addressing Zion/Jerusalem as feminine singular in context.
- source_word: הָיָה
  chosen: has become
  alternatives:
  - became
  - has turned into
  lexicon: HALOT
  rationale: The qatal form marks a completed state. In English, 'has become' naturally
    conveys the resultant condition in a prophetic accusation.
- source_word: לְסִיגִים
  chosen: dross
  alternatives:
  - impurities
  - slag
  lexicon: HALOT
  rationale: סִיגִים refers to the waste or impurities separated from metal in smelting.
    'Dross' is the standard concise English equivalent and preserves the prophetic
    metaphor better than the more technical 'slag' or the broader 'impurities.'
- source_word: סָבְאֵךְ
  chosen: your drink
  alternatives:
  - your wine
  - your beer
  - your strong drink
  lexicon: HALOT
  rationale: סֹבֶא can denote drink, especially intoxicating drink, and often points
    to wine or strong drink. Here 'your drink' preserves the broader lexical range
    while fitting the parallel accusation of adulteration. Because the exact beverage
    is not specified with certainty in English, a more general rendering avoids over-narrowing
    the term.
- source_word: מָהוּל
  chosen: diluted
  alternatives:
  - mixed
  - adulterated
  lexicon: HALOT
  rationale: 'The passive participial/adjectival form means mixed or diluted. ''Diluted''
    best captures the negative sense in context: the drink has been watered down and
    debased.'
- source_word: במים
  chosen: with water
  alternatives:
  - by water
  - in water
  lexicon: HALOT
  rationale: 'The preposition ב here is instrumental/associative: the drink is mixed
    ''with water.'' This is the most idiomatic and contextually precise English rendering.'
