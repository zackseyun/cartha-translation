theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Distinguishing divine relief from divine vengeance
  chosen_reading: I will get relief from my foes and avenge myself on my enemies
  alternative_readings:
  - I will be comforted over my adversaries and avenge myself on my enemies
  - I will ease myself of my adversaries and avenge myself of my enemies
  rationale: 'The verse contains two related but distinct verbs. The translation preserves the tension: God gains relief by judgment and also executes vengeance. It does not soften the judicial force nor merge the two actions into one.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
