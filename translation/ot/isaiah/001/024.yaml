id: ISA.1.24
reference: Isaiah 1:24
source:
  edition: WLC
  text: לָ/כֵ֗ן נְאֻ֤ם הָֽ/אָדוֹן֙ יְהוָ֣ה צְבָא֔וֹת אֲבִ֖יר יִשְׂרָאֵ֑ל ה֚וֹי אֶנָּחֵ֣ם מִ/צָּרַ֔/י וְ/אִנָּקְמָ֖ה מֵ/אוֹיְבָֽ/י׃
translation:
  text: 'Therefore the declaration of the Lord, Yahweh of Armies, the Mighty One of Israel: “Ah, I will get relief from my foes and avenge myself on my enemies.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “oracle of the Lord.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the LORD of hosts”; rendered “of Armies” for clarity.
    reason: lexical_alternative
  - marker: c
    text: Or “I will be comforted over my adversaries” or “I will ease myself of my foes.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks a consequential transition from the preceding indictment; 'Therefore' preserves the formal inferential force in natural English.
- source_word: נְאֻם
  chosen: the declaration of
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: A prophetic formula introducing a solemn divine pronouncement. 'The declaration of' is clear modern English and preserves the formal weight better than the more technical 'oracle of'.
- source_word: הָאָדוֹן
  chosen: the Lord
  alternatives:
  - the Master
  - the Sovereign
  lexicon: HALOT
  rationale: With the article, this title emphasizes God's lordship. 'The Lord' is the most natural English equivalent here and avoids importing a narrower social sense from 'Master'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  - of heavenly armies
  lexicon: HALOT
  rationale: '''Armies'' communicates the concrete military sense of צבאות in accessible modern English better than the traditional but less transparent ''hosts''.'
- source_word: אֲבִיר יִשְׂרָאֵל
  chosen: the Mighty One of Israel
  alternatives:
  - the Strong One of Israel
  lexicon: HALOT
  rationale: A divine title stressing strength and power. 'Mighty One' is the established and accurate English rendering.
- source_word: הוֹי
  chosen: Ah
  alternatives:
  - Ha!
  - Alas
  - Aha
  lexicon: HALOT
  rationale: Here the interjection introduces divine resolve with emotional force. 'Ah' preserves the exclamatory tone without over-specifying mockery or lament.
- source_word: אֶנָּחֵם
  chosen: I will get relief
  alternatives:
  - I will be comforted
  - I will ease myself
  - I will be avenged
  lexicon: HALOT
  rationale: From נחם in the Niphal, the sense here is that God will find relief or satisfaction by acting against his adversaries. 'Get relief' best captures the idiom in contemporary English without collapsing it into the following vengeance verb.
- source_word: מִצָּרַי
  chosen: from my foes
  alternatives:
  - from my adversaries
  - of my enemies
  lexicon: HALOT
  rationale: The preposition מן after נחם naturally yields 'from' in the sense of relief gained by dealing with opponents. 'Foes' is concise and suitably elevated.
- source_word: וְאִנָּקְמָה
  chosen: and avenge myself
  alternatives:
  - and take vengeance
  - and be avenged
  lexicon: HALOT
  rationale: The cohortative-like form expresses determined divine action. 'Avenge myself' preserves the reflexive force and parallels the first-person resolve.
- source_word: מֵאוֹיְבָי
  chosen: on my enemies
  alternatives:
  - against my enemies
  - from my enemies
  lexicon: HALOT
  rationale: With נקם, English idiom commonly uses 'on' or 'against'; 'on my enemies' is direct and natural.
