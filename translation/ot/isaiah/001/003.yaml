theological_decisions:
- issue: Implied object of Israel's failure to know
  chosen_reading: Leave the object unstated in the main text
  alternative_readings:
  - Interpret as "Israel does not know me/God"
  rationale: The Hebrew does not explicitly state the object after "Israel does not
    know." The context strongly implies God, but the translation preserves the Hebrew's
    terseness and rhetorical force rather than supplying the object in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
