id: ISA.1.3
reference: Isaiah 1:3
source:
  edition: WLC
  text: יָדַ֥ע שׁוֹר֙ קֹנֵ֔/הוּ וַ/חֲמ֖וֹר אֵב֣וּס בְּעָלָ֑י/ו יִשְׂרָאֵל֙ לֹ֣א יָדַ֔ע
    עַמִּ֖/י לֹ֥א הִתְבּוֹנָֽן׃
translation:
  text: An ox knows its owner, and a donkey its master's feeding trough; Israel does
    not know; my people do not understand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "manger" for "feeding trough."
    reason: lexical_alternative
  - marker: b
    text: The implied sense is that Israel does not know the LORD, though the Hebrew
      leaves the object unstated.
    reason: alternative_reading
lexical_decisions:
- source_word: יָדַע
  chosen: knows
  alternatives:
  - recognizes
  lexicon: HALOT
  rationale: Rendered as "knows" to preserve the straightforward cognitive/relational
    sense and the repetition with the later יָדַע applied to Israel. "Recognizes"
    is possible in context, but "knows" better preserves the lexical repetition and
    rhetorical contrast.
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - cattle
  - bull
  lexicon: HALOT
  rationale: '"Ox" is the standard singular rendering for domesticated bovine in this
    proverbial comparison. It fits the image of a working animal better than the broader
    "cattle" or the more specific male "bull."'
- source_word: קֹנֵהוּ
  chosen: its owner
  alternatives:
  - its possessor
  - the one who acquired it
  lexicon: HALOT
  rationale: The participle from קנה can denote one who acquires or possesses, but
    in this domestic-animal context "owner" is the most natural and accurate English
    equivalent.
- source_word: חֲמוֹר
  chosen: donkey
  alternatives:
  - ass
  lexicon: HALOT
  rationale: '"Donkey" is clear modern English and avoids archaic or potentially distracting
    connotations of "ass."'
- source_word: אֵבוּס
  chosen: feeding trough
  alternatives:
  - manger
  - crib
  lexicon: HALOT
  rationale: Rendered as "feeding trough" for accessible modern English. "Manger"
    is traditional and possible, but can sound archaic or evoke later nativity associations
    not present here.
- source_word: בְּעָלָיו
  chosen: its master's
  alternatives:
  - its owner's
  lexicon: HALOT
  rationale: בעל often denotes owner/master. Here "master's" varies the English naturally
    after "owner" in the first colon while preserving the sense of human authority
    over the animal. The possessive construction in English is completed by "feeding
    trough."
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Retained as the covenant people/nation name in direct contrast with the
    animals.
- source_word: לֹא יָדַע
  chosen: does not know
  alternatives:
  - does not recognize
  lexicon: HALOT
  rationale: 'Kept as "does not know" to mirror the opening "knows" and preserve the
    rhetorical force: even animals know their human source of care, but Israel does
    not know God.'
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward covenantal expression; the first-person suffix indicates
    divine speech and heightens the pathos of the accusation.
- source_word: הִתְבּוֹנָן
  chosen: do not understand
  alternatives:
  - do not consider
  - have no insight
  lexicon: HALOT
  rationale: The hitpolel of בין conveys reflective understanding or discernment.
    "Do not understand" is natural English and fits the parallelism with "does not
    know," while still implying a failure of moral perception.
