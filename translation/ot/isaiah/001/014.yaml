theological_decisions:
- issue: Divine revulsion toward Israel's worship practices
  chosen_reading: The verse is rendered as God's rejection of hypocritical covenant
    observances, not as a denial that the appointed feasts were originally instituted
    by him.
  alternative_readings:
  - A reading that could imply God rejects the feasts in themselves
  rationale: The possessive 'your' before 'new moons' and 'appointed feasts' in context
    signals alienated, corrupted observance rather than a contradiction of God's prior
    commands. The translation preserves the text's force without importing a theological
    claim that God repudiates his own institutions as such.
  doctrine_reference: Translation philosophy §1, §3
