id: ISA.1.14
reference: Isaiah 1:14
source:
  edition: WLC
  text: חָדְשֵׁי/כֶ֤ם וּ/מוֹעֲדֵי/כֶם֙ שָׂנְאָ֣ה נַפְשִׁ֔/י הָי֥וּ עָלַ֖/י לָ/טֹ֑רַח
    נִלְאֵ֖יתִי נְשֹֽׂא׃
translation:
  text: Your new moons and your appointed feasts my soul hates; they have become a
    burden to me; I am weary of bearing them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your appointed times' or 'your festivals.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָדְשֵׁיכֶם
  chosen: your new moons
  alternatives:
  - your new moon festivals
  lexicon: HALOT
  rationale: חֹדֶשׁ literally denotes 'new moon' and by extension the monthly observance
    associated with it. 'Your new moons' preserves the Hebrew expression and its cultic
    force without over-paraphrasing.
- source_word: וּמוֹעֲדֵיכֶם
  chosen: and your appointed feasts
  alternatives:
  - and your appointed times
  - and your festivals
  lexicon: HALOT
  rationale: מוֹעֵד can mean appointed time/meeting, but in this cultic context it
    refers to Israel's set religious observances. 'Appointed feasts' keeps the formal
    link to divinely set times while remaining natural English.
- source_word: שָׂנְאָה נַפְשִׁי
  chosen: my soul hates
  alternatives:
  - I hate
  - my very being hates
  lexicon: HALOT
  rationale: 'The Hebrew idiom places נֶפֶשׁ as the subject: literally, ''my soul
    hates.'' Retaining ''my soul'' preserves the emphatic personal revulsion expressed
    in the source, rather than flattening it to simply ''I hate.'''
- source_word: הָיוּ עָלַי לָטֹרַח
  chosen: they have become a burden to me
  alternatives:
  - they are a burden to me
  - they have been a trouble to me
  lexicon: HALOT
  rationale: 'The clause expresses resultant state: the observances have come to be
    a burden. ''Have become a burden to me'' captures the perfect''s sense well in
    idiomatic English.'
- source_word: טֹרַח
  chosen: burden
  alternatives:
  - trouble
  - weariness
  lexicon: HALOT
  rationale: טֹרַח denotes burden, trouble, or toil. 'Burden' fits the metaphor and
    pairs naturally with the following image of bearing/carrying.
- source_word: נִלְאֵיתִי
  chosen: I am weary
  alternatives:
  - I am tired
  - I have grown weary
  lexicon: HALOT
  rationale: The verb conveys weariness/exhaustion. 'I am weary' is concise, dignified,
    and matches the prophetic tone.
- source_word: נְשֹׂא
  chosen: of bearing them
  alternatives:
  - of carrying them
  - to bear
  lexicon: HALOT
  rationale: From נָשָׂא, 'to bear/carry.' Supplying 'them' is required in English
    from the context of the festivals. 'Bearing' preserves the metaphorical image
    of carrying an oppressive load.
