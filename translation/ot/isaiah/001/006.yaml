id: ISA.1.6
reference: Isaiah 1:6
source:
  edition: WLC
  text: מִ/כַּף רֶ֤גֶל וְ/עַד רֹאשׁ֙ אֵֽין בּ֣/וֹ מְתֹ֔ם פֶּ֥צַע וְ/חַבּוּרָ֖ה וּ/מַכָּ֣ה
    טְרִיָּ֑ה לֹא זֹ֨רוּ֙ וְ/לֹ֣א חֻבָּ֔שׁוּ וְ/לֹ֥א רֻכְּכָ֖ה בַּ/שָּֽׁמֶן־־־־׃
translation:
  text: From the sole of the foot even to the head, there is no soundness in it—only
    wounds and bruises and fresh blows; they have not been pressed out, or bandaged,
    or softened with oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there is no soundness in him.' The Hebrew personifies the nation as
      a wounded body.
    reason: alternative_reading
  - marker: b
    text: Or 'fresh wounds.' The phrase can denote recent, raw injuries.
    reason: lexical_alternative
  - marker: c
    text: The verb may refer to pressing or squeezing wounds to expel matter before
      treatment.
    reason: cultural_note
  - marker: d
    text: Or 'bound up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכַּף רֶגֶל
  chosen: From the sole of the foot
  alternatives:
  - From the bottom of the foot
  - From the sole of the feet
  lexicon: HALOT
  rationale: כַּף with רֶגֶל refers to the sole/palm-like underside; singular 'foot'
    matches the Hebrew singular collective expression in this body-from-bottom-to-top
    idiom.
- source_word: וְעַד רֹאשׁ
  chosen: even to the head
  alternatives:
  - and to the head
  - up to the head
  lexicon: HALOT
  rationale: This completes a merism expressing total bodily extent. 'Even to' gives
    natural English emphasis without over-paraphrasing.
- source_word: אֵין בּוֹ מְתֹם
  chosen: there is no soundness in it
  alternatives:
  - there is no wholeness in him
  - there is nothing healthy in it
  lexicon: HALOT
  rationale: מְתֹם denotes soundness, wholeness, or unimpaired condition. 'Soundness'
    preserves the bodily/medical metaphor. 'In it' follows the feminine/collective
    reference to the nation as a body rather than an individual male.
- source_word: פֶּצַע
  chosen: wounds
  alternatives:
  - injury
  - wound
  lexicon: HALOT
  rationale: A general term for wound/injury. Pluralized in English for natural coordination
    with the following plural-like series, though the Hebrew singulars function collectively.
- source_word: חַבּוּרָה
  chosen: bruises
  alternatives:
  - welts
  - stripes
  lexicon: HALOT
  rationale: Refers to stripe/bruise from blows. 'Bruises' is clear modern English
    and fits the injury catalogue.
- source_word: מַכָּה טְרִיָּה
  chosen: fresh blows
  alternatives:
  - fresh wounds
  - festering wounds
  lexicon: HALOT
  rationale: מַכָּה is a blow/wound; טְרִיָּה means fresh/raw, not necessarily festering.
    'Fresh blows' preserves the likely sense of recent, untreated injuries while keeping
    the assault imagery.
- source_word: לֹא זֹרוּ
  chosen: they have not been pressed out
  alternatives:
  - they have not been drained
  - they have not been cleansed
  lexicon: HALOT
  rationale: The verb זור in this medical context is commonly understood of squeezing/pressing
    wounds to expel matter. 'Pressed out' is more textually grounded than the broader
    'cleansed.'
- source_word: וְלֹא חֻבָּשׁוּ
  chosen: or bandaged
  alternatives:
  - or bound up
  - or dressed
  lexicon: HALOT
  rationale: חבשׁ in wound care means to bind up or bandage. 'Bandaged' is accessible
    modern English; 'bound up' is a viable more formal alternative.
- source_word: וְלֹא רֻכְּכָה בַּשָּׁמֶן
  chosen: or softened with oil
  alternatives:
  - or soothed with oil
  - or mollified with oil
  lexicon: HALOT
  rationale: רכך means to make soft/tender. In context of wound treatment with oil,
    'softened with oil' is a direct and comprehensible rendering.
