theological_decisions:
- issue: Referent of the body metaphor
  chosen_reading: Use impersonal 'it' for the diseased body
  alternative_readings:
  - Use personal 'him' for Israel/Judah personified
  rationale: The verse continues the corporate-body metaphor for the nation. English
    'it' best matches the metaphorical body as a collective entity and avoids implying
    an individual male person, while still preserving the prophetic personification.
  doctrine_reference: Translation philosophy §1, §3
