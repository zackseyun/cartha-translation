id: ISA.1.4
reference: Isaiah 1:4
source:
  edition: WLC
  text: ה֣וֹי גּ֣וֹי חֹטֵ֗א עַ֚ם כֶּ֣בֶד עָוֺ֔ן זֶ֣רַע מְרֵעִ֔ים בָּנִ֖ים מַשְׁחִיתִ֑ים
    עָזְב֣וּ אֶת יְהוָ֗ה נִֽאֲצ֛וּ אֶת קְד֥וֹשׁ יִשְׂרָאֵ֖ל נָזֹ֥רוּ אָחֽוֹר׀־־׃
translation:
  text: Ah, sinful nation, a people heavy with iniquity, offspring of evildoers, children
    who act corruptly! They have forsaken the LORD; they have despised the Holy One
    of Israel; they have turned away backward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Woe, sinful nation' or 'Alas, sinful nation.' The Hebrew interjection
      can express both lament and denunciation.
    reason: lexical_alternative
  - marker: b
    text: Or 'a people laden with iniquity.'
    reason: lexical_alternative
  - marker: c
    text: Or 'children who deal corruptly.'
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: alternative_reading
  - marker: e
    text: Or 'they have turned their backs' or 'they have become estranged and gone
      backward.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Ah
  alternatives:
  - Woe
  - Alas
  lexicon: HALOT
  rationale: An interjection of lament and denunciation. 'Ah' preserves the exclamatory
    force without prematurely narrowing it to either pure lament ('alas') or pure
    doom-oracle ('woe').
- source_word: גּוֹי חֹטֵא
  chosen: sinful nation
  alternatives:
  - sinning nation
  - guilty nation
  lexicon: HALOT
  rationale: The participle חֹטֵא functions adjectivally. 'Sinful nation' is idiomatic
    English and preserves the moral characterization of the people as a corporate
    body.
- source_word: עַם כֶּבֶד עָוֺן
  chosen: a people heavy with iniquity
  alternatives:
  - a people laden with iniquity
  - a people burdened with guilt
  lexicon: HALOT
  rationale: כֶּבֶד literally means 'heavy'; in context it conveys being weighed down
    by wrongdoing. 'Heavy with iniquity' keeps the metaphor more transparently than
    'burdened with guilt' while remaining readable.
- source_word: עָוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - wickedness
  lexicon: HALOT
  rationale: עָוֺן can denote both wrongdoing and its culpability. 'Iniquity' preserves
    the moral-theological weight and avoids flattening it to merely subjective guilt.
- source_word: זֶרַע מְרֵעִים
  chosen: offspring of evildoers
  alternatives:
  - seed of evildoers
  - offspring of those who do evil
  lexicon: HALOT
  rationale: זֶרַע is collective 'offspring/seed.' 'Offspring of evildoers' is natural
    English and preserves the familial/corporate indictment.
- source_word: בָּנִים מַשְׁחִיתִים
  chosen: children who act corruptly
  alternatives:
  - children who deal corruptly
  - corrupt children
  - children who destroy
  lexicon: HALOT
  rationale: The Hiphil participle from שׁחת here describes corrupt behavior rather
    than literal destruction. 'Children who act corruptly' captures the ethical sense
    and avoids implying they are merely victims of corruption.
- source_word: עָזְבוּ אֶת יְהוָה
  chosen: They have forsaken the LORD
  alternatives:
  - They have abandoned the LORD
  lexicon: HALOT
  rationale: עָזַב commonly means 'forsake, abandon.' 'Forsaken' fits prophetic covenant
    language well. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: נִאֲצוּ
  chosen: despised
  alternatives:
  - spurned
  - treated with contempt
  - provoked
  lexicon: HALOT
  rationale: The verb conveys contemptuous rejection. 'Despised' is concise, idiomatic,
    and strong enough for the covenantal offense in context.
- source_word: קְדֹושׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  lexicon: HALOT
  rationale: A fixed Isaianic divine title. It should be translated straightforwardly
    to preserve its theological significance.
- source_word: נָזֹרוּ אָחוֹר
  chosen: they have turned away backward
  alternatives:
  - they have turned their backs
  - they have become estranged and gone backward
  - they have turned away behind
  lexicon: HALOT
  rationale: The Niphal of זוּר/נזר here conveys alienation or turning aside, and
    אָחוֹר adds the sense 'backward/back.' 'Turned away backward' preserves the Hebrew
    image more closely than the smoother idiom 'turned their backs,' though the latter
    is a viable interpretive alternative.
