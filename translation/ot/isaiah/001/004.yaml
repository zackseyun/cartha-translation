theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine explicitly sets 'the LORD' as the default rendering
    for YHWH. This also fits the prophetic register in English.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Corporate/familial indictment language
  chosen_reading: Retain both collective ('nation,' 'people') and familial ('offspring,'
    'children') imagery
  alternative_readings:
  - Flatten to only collective political language
  - Flatten to only genealogical language
  rationale: The verse layers national and familial metaphors to intensify covenant
    accusation. Preserving both avoids reducing the theological force of Israel's
    identity and rebellion.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
