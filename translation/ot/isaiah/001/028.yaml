id: ISA.1.28
reference: Isaiah 1:28
source:
  edition: WLC
  text: וְ/שֶׁ֧בֶר פֹּשְׁעִ֛ים וְ/חַטָּאִ֖ים יַחְדָּ֑ו וְ/עֹזְבֵ֥י יְהוָ֖ה יִכְלֽוּ׃
translation:
  text: But rebels and sinners will be broken together, and those who forsake Yahweh will come to an end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'destruction of rebels and sinners together'; the Hebrew noun 'breaking/destruction' can be rendered more nominally.
    reason: lexical_alternative
  - marker: b
    text: Or 'will perish' or 'will be consumed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁבֶר
  chosen: will be broken
  alternatives:
  - destruction
  - ruin
  - breaking
  lexicon: HALOT
  rationale: The noun denotes breaking, fracture, or ruin. In this clause it functions predicatively with the following plural subjects, expressing their collapse/destruction. 'Will be broken' preserves the concrete force of the Hebrew while remaining natural English. 'Destruction' is possible, but the verbal rendering better reflects the clause structure in English.
- source_word: פֹּשְׁעִים
  chosen: rebels
  alternatives:
  - transgressors
  - rebellious ones
  lexicon: HALOT
  rationale: From פשע, referring to those in rebellion or willful revolt. 'Rebels' is more idiomatic and forceful in modern English than 'transgressors,' while preserving the covenantal sense of defiance.
- source_word: חַטָּאִים
  chosen: sinners
  alternatives:
  - offenders
  lexicon: HALOT
  rationale: Standard rendering for those characterized by sin. Paired with 'rebels,' it preserves the distinction between revolt (פֹּשְׁעִים) and sinful guilt (חַטָּאִים).
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - altogether
  lexicon: HALOT
  rationale: The adverb indicates joint or simultaneous fate. 'Together' is the clearest natural equivalent.
- source_word: עֹזְבֵי יְהוָה
  chosen: those who forsake the LORD
  alternatives:
  - those who abandon the LORD
  - the LORD's forsakers
  lexicon: HALOT
  rationale: The participle of עזב denotes abandoning or forsaking. 'Those who forsake the LORD' is natural English and preserves the covenantal seriousness. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יִכְלוּ
  chosen: will come to an end
  alternatives:
  - will perish
  - will be consumed
  lexicon: HALOT
  rationale: From כלה, meaning to be finished, completed, consumed, or come to an end. 'Will come to an end' captures the broad semantic force without over-specifying the mode of judgment. 'Will perish' is possible but slightly more interpretive; 'will be consumed' may suggest a narrower image than the context requires.
