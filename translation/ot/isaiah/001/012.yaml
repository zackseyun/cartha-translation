id: ISA.1.12
reference: Isaiah 1:12
source:
  edition: WLC
  text: כִּ֣י תָבֹ֔אוּ לֵ/רָא֖וֹת פָּנָ֑/י מִי בִקֵּ֥שׁ זֹ֛את מִ/יֶּדְ/כֶ֖ם רְמֹ֥ס
    חֲצֵרָֽ/י־׃
translation:
  text: When you come to appear before me, who has required this from your hand—this
    trampling of my courts?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to see my face,' an idiom for appearing in the presence of God.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - For
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the circumstance under which the rebuke applies
    rather than a direct causal clause. 'When' fits the flow into the rhetorical question
    better in English.
- source_word: תָבֹאוּ
  chosen: you come
  alternatives:
  - you enter
  - you arrive
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come/enter.' 'Come' is the most natural
    English pairing with the following infinitive phrase 'to appear before me.'
- source_word: לֵרָאוֹת פָּנַי
  chosen: to appear before me
  alternatives:
  - to see my face
  - to appear before my face
  lexicon: HALOT
  rationale: Literally 'to see my face,' but in cultic context this idiom means presenting
    oneself in God's presence. 'Appear before me' preserves the idiomatic force without
    wooden literalism.
- source_word: מִי
  chosen: who
  lexicon: HALOT
  rationale: Straightforward interrogative introducing the rhetorical challenge.
- source_word: בִקֵּשׁ
  chosen: has required
  alternatives:
  - has asked for
  - has sought
  lexicon: HALOT
  rationale: In this context of demanded worship practice, 'required' best captures
    the sense of seeking as an obligation or demand, not mere desire.
- source_word: זֹאת
  chosen: this
  alternatives:
  - such a thing
  lexicon: HALOT
  rationale: Demonstrative pointing to the objectionable practice just named; 'this'
    is concise and natural.
- source_word: מִיֶּדְכֶם
  chosen: from your hand
  alternatives:
  - at your hand
  - from you
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'hand.' Retaining 'from your hand' preserves
    the concrete idiom and the sense of accountability, while remaining intelligible
    in English.
- source_word: רְמֹס
  chosen: trampling
  alternatives:
  - trample
  - the trampling
  lexicon: HALOT
  rationale: The infinitive construct functions as the substance of what was supposedly
    required. 'This trampling' makes the rhetorical accusation explicit and idiomatic.
- source_word: חֲצֵרָי
  chosen: my courts
  alternatives:
  - my courtyards
  lexicon: HALOT
  rationale: In temple context, 'courts' is the standard and clearest rendering for
    the sacred precincts.
