theological_decisions:
- issue: Rendering the cultic idiom לֵרָאוֹת פָּנַי
  chosen_reading: to appear before me
  alternative_readings:
  - to see my face
  rationale: The verse addresses worshipers coming into God's presence at the sanctuary.
    A literal rendering could mislead modern readers into thinking of physical sight
    rather than formal presentation before God. The chosen wording preserves the temple-worship
    sense without diminishing divine transcendence.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
