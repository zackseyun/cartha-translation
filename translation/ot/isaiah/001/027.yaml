id: ISA.1.27
reference: Isaiah 1:27
source:
  edition: WLC
  text: צִיּ֖וֹן בְּ/מִשְׁפָּ֣ט תִּפָּדֶ֑ה וְ/שָׁבֶ֖י/הָ בִּ/צְדָקָֽה׃
translation:
  text: Zion will be redeemed by justice, and her repentant ones by righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and those of her who return,' or 'her returnees.' The Hebrew participle
      from 'return/turn' can denote either repentance or return.
    reason: alternative_reading
lexical_decisions:
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Proper place/name is transliterated per project philosophy rather than
    translated.
- source_word: בְּמִשְׁפָּט
  chosen: by justice
  alternatives:
  - with justice
  - through justice
  - by judgment
  lexicon: HALOT
  rationale: 'מִשְׁפָּט commonly denotes justice/judgment. Here the preposition ב
    marks means or instrument: Zion''s redemption occurs by means of justice. ''Justice''
    fits the restorative context better than ''judgment'' while preserving the legal-ethical
    force.'
- source_word: תִּפָּדֶה
  chosen: will be redeemed
  alternatives:
  - will be ransomed
  - will be delivered
  lexicon: HALOT
  rationale: Niphal of פדה conveys being redeemed/ransomed. 'Redeemed' preserves the
    covenantal and theological resonance without over-paraphrasing.
- source_word: וְשָׁבֶיהָ
  chosen: and her repentant ones
  alternatives:
  - and her returnees
  - and those of her who return
  - and her converts
  lexicon: HALOT
  rationale: From שוב, the participial form with 3fs suffix most naturally means 'her
    returners/those who return to her or in her.' In prophetic moral context, this
    refers to those in Zion who turn back to God, so 'her repentant ones' brings out
    the ethical-religious sense of repentance rather than mere physical return. The
    more literal alternative is preserved in a footnote because the Hebrew can also
    be heard as 'those who return to her.'
- source_word: בִּצְדָקָה
  chosen: by righteousness
  alternatives:
  - with righteousness
  - through righteousness
  - by justice
  lexicon: HALOT
  rationale: צְדָקָה often denotes righteousness in an ethical/juridical sense. 'By
    righteousness' preserves the parallel with 'by justice' while distinguishing the
    paired Hebrew terms rather than flattening both into 'justice'.
