theological_decisions:
- issue: Sense of וְשָׁבֶיהָ in prophetic context
  chosen_reading: moral-spiritual return ('her repentant ones')
  alternative_readings:
  - those who return to her
  - her returnees
  rationale: The immediate context in Isaiah 1 emphasizes repentance, cleansing, and
    restoration after judgment. Rendering the participle as 'repentant ones' reflects
    that prophetic summons while remaining within the semantic range of שוב ('turn/return').
    Because the Hebrew can also be read more spatially, the alternative is preserved
    in a footnote rather than excluded.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
