id: ISA.1.18
reference: Isaiah 1:18
source:
  edition: WLC
  text: לְכוּ נָ֛א וְ/נִוָּֽכְחָ֖ה יֹאמַ֣ר יְהוָ֑ה אִם יִֽהְי֨וּ חֲטָאֵי/כֶ֤ם כַּ/שָּׁנִים֙ כַּ/שֶּׁ֣לֶג יַלְבִּ֔ינוּ אִם יַאְדִּ֥ימוּ כַ/תּוֹלָ֖ע כַּ/צֶּ֥מֶר יִהְיֽוּ־־־׃
translation:
  text: 'Come now, and let us reason together, says Yahweh: though your sins are like scarlet, they will become white like snow; though they are red like crimson, they will become like wool.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and let us argue it out,' 'and let us settle the matter,' or 'and let us dispute together.' The Hebrew verb carries legal and dialogical overtones.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'like worm-scarlet' or 'like scarlet dye'; the term refers by association to the crimson color produced from the insect.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכוּ נָא
  chosen: Come now
  alternatives:
  - Come, please
  - Come now, please
  lexicon: HALOT
  rationale: לְכוּ is a 2mp imperative of הלך used idiomatically as an invitation or summons; נָא softens/urges the appeal. 'Come now' is natural modern English and preserves the exhortatory force without sounding archaic.
- source_word: וְנִוָּכְחָה
  chosen: and let us reason together
  alternatives:
  - and let us argue it out
  - and let us settle the matter
  - and let us dispute together
  lexicon: HALOT
  rationale: From יכח in the Niphal/cohortative, the sense is mutual entering into a case, reasoning, or adjudication. 'Let us reason together' preserves the dialogical and forensic nuance and matches the context of covenant lawsuit in Isaiah 1, while remaining readable. Alternatives are viable and preserved in a footnote because the phrase is interpretively significant.
- source_word: יֹאמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - says Yahweh
  - the LORD says
  lexicon: HALOT
  rationale: English prophetic style commonly uses the present 'says' for the Hebrew speech formula. Per doctrine, יְהוָה is rendered 'the LORD,' not 'Yahweh' in the main text.
- source_word: אִם יִהְיוּ חֲטָאֵיכֶם
  chosen: though your sins are
  alternatives:
  - if your sins are
  - even if your sins are
  lexicon: HALOT
  rationale: אִם here introduces a concessive condition in parallel clauses. In English, 'though' best conveys the rhetorical force in this promise context better than a bare 'if,' which can sound more uncertain or merely hypothetical.
- source_word: כַּשָּׁנִים
  chosen: like scarlet
  alternatives:
  - like scarlet cloth
  - like double-dyed scarlet
  lexicon: HALOT
  rationale: שָׁנִים refers to scarlet/crimson dye material, often associated with vivid red coloration. 'Scarlet' is the standard concise rendering and fits the parallel with snow.
- source_word: כַּשֶּׁלֶג יַלְבִּינוּ
  chosen: they will become white like snow
  alternatives:
  - they will be white as snow
  - they will whiten like snow
  lexicon: HALOT
  rationale: The Hiphil of לבן means to become white/whiten. Rendering with future/resultative force ('will become white like snow') makes explicit the transformation implied by the verb and fits the promise context.
- source_word: אִם יַאְדִּימוּ
  chosen: though they are red
  alternatives:
  - though they become red
  - if they are red
  lexicon: HALOT
  rationale: The Hiphil of אדם here describes redness. In parallel with the first clause, an adjectival/resultative English rendering is most natural.
- source_word: כַּתּוֹלָע
  chosen: like crimson
  alternatives:
  - like worm-scarlet
  - like scarlet dye
  lexicon: HALOT
  rationale: תּוֹלָע literally denotes the worm/insect associated with crimson dye, but in this poetic color parallel the metonymic sense 'crimson' is clearest in English. A more literal alternative is worth preserving in a footnote.
- source_word: כַּצֶּמֶר יִהְיוּ
  chosen: they will become like wool
  alternatives:
  - they will be like wool
  - they will become white like wool
  lexicon: HALOT
  rationale: The clause parallels 'white like snow.' 'Become like wool' preserves the Hebrew comparison without adding 'white' explicitly, since the whiteness is implied by the image and parallelism.
