id: ISA.1.16
reference: Isaiah 1:16
source:
  edition: WLC
  text: רַחֲצוּ֙ הִזַּכּ֔וּ הָסִ֛ירוּ רֹ֥עַ מַעַלְלֵי/כֶ֖ם מִ/נֶּ֣גֶד עֵינָ֑/י חִדְל֖וּ
    הָרֵֽעַ׃
translation:
  text: Wash yourselves; make yourselves clean. Remove the evil of your deeds from
    before my eyes. Stop doing evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purify yourselves.' The Hebrew verb can carry the sense of becoming
      clean or pure.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from before my eyes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַחֲצוּ
  chosen: Wash yourselves
  alternatives:
  - Wash
  - Bathe yourselves
  lexicon: HALOT
  rationale: Qal imperative plural of רחץ, here used reflexively in a moral exhortation.
    'Wash yourselves' preserves the imperative force and the implied reflexive sense
    in context.
- source_word: הִזַּכּוּ
  chosen: make yourselves clean
  alternatives:
  - purify yourselves
  - be clean
  lexicon: HALOT
  rationale: Hitpael imperative plural of זכה/זקך conveys becoming or showing oneself
    clean/pure. 'Make yourselves clean' pairs naturally with 'Wash yourselves' and
    preserves the reflexive nuance without over-sacralizing the term.
- source_word: הָסִירוּ
  chosen: Remove
  alternatives:
  - Take away
  - Put away
  lexicon: HALOT
  rationale: 'Hiphil imperative plural of סור/סיר in causative sense: remove or take
    away. ''Remove'' is concise and fits the direct object that follows.'
- source_word: רֹעַ
  chosen: the evil
  alternatives:
  - evil
  - wickedness
  lexicon: HALOT
  rationale: Noun denoting evil or badness. The article-like definiteness is supplied
    by context with the following construct phrase, so 'the evil of your deeds' is
    idiomatic English.
- source_word: מַעַלְלֵיכֶם
  chosen: your deeds
  alternatives:
  - your actions
  - your practices
  lexicon: HALOT
  rationale: Plural noun meaning deeds, acts, practices. 'Deeds' is a natural moral
    term in English and fits the prophetic accusation context.
- source_word: מִנֶּגֶד עֵינַי
  chosen: from before my eyes
  alternatives:
  - from my sight
  - out of my sight
  lexicon: HALOT
  rationale: Literally 'from in front of my eyes.' 'From before my eyes' preserves
    the vivid anthropomorphic expression more closely than the more idiomatic 'out
    of my sight.'
- source_word: חִדְלוּ
  chosen: Stop
  alternatives:
  - Cease
  - Desist
  lexicon: HALOT
  rationale: Qal imperative plural of חדל, 'cease, stop.' 'Stop' is clear modern English
    and suits the imperative sequence.
- source_word: הָרֵעַ
  chosen: doing evil
  alternatives:
  - doing harm
  - acting wickedly
  lexicon: HALOT
  rationale: 'Infinitive construct/functioning verbal noun from רעע after חדל: ''cease
    to do evil.'' Rendering as ''doing evil'' makes the Hebrew verbal sense explicit
    in natural English.'
