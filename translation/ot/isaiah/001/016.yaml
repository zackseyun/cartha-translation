theological_decisions:
- issue: Moral cleansing language
  chosen_reading: Retained the imperative imagery of washing and cleansing as ethical
    repentance language, not as a sacramental or ritual technical term.
  alternative_readings:
  - More ritualized wording such as 'purify yourselves'
  rationale: In context Isaiah rebukes Judah's sinful conduct and calls for moral
    reformation. The translation preserves the metaphor without importing later doctrinal
    or liturgical associations the verse itself does not specify.
  doctrine_reference: Translation philosophy §§1, 3, 6
