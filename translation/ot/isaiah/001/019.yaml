id: ISA.1.19
reference: Isaiah 1:19
source:
  edition: WLC
  text: אִם תֹּאב֖וּ וּ/שְׁמַעְתֶּ֑ם ט֥וּב הָ/אָ֖רֶץ תֹּאכֵֽלוּ־׃
translation:
  text: If you are willing and obedient, you will eat the good of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If you are willing and listen,' with 'listen' carrying the sense of
      obedient response.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  lexicon: HALOT
  rationale: Standard conditional particle introducing the protasis.
- source_word: תֹּאבוּ
  chosen: you are willing
  alternatives:
  - you consent
  - you are willing to
  lexicon: HALOT
  rationale: From אבה, 'to be willing/consent.' Rendered as a predicate adjective
    in natural English while preserving the volitional sense.
- source_word: וּשְׁמַעְתֶּם
  chosen: and obedient
  alternatives:
  - and listen
  - and obey
  lexicon: HALOT
  rationale: From שׁמע, which can mean hear, listen, or obey depending on context.
    In this covenantal exhortation, the sense is not mere auditory hearing but responsive
    obedience. 'Obedient' pairs naturally with 'willing' in English and captures the
    resultative force.
- source_word: טוּב
  chosen: the good
  alternatives:
  - the best
  - good things
  - produce
  lexicon: HALOT
  rationale: The noun denotes goodness/good thing. In construct with 'the land,' it
    refers to the land's good yield or bounty. 'The good of the land' preserves the
    Hebrew expression while remaining intelligible.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In Isaiah's covenantal setting, 'land' is the natural sense, referring
    to the territory and its produce rather than the whole earth.
- source_word: תֹּאכֵלוּ
  chosen: you will eat
  alternatives:
  - you shall eat
  - you will consume
  lexicon: HALOT
  rationale: Straightforward future/imperfect of אכל. 'You will eat' is idiomatic
    and preserves the concrete image of enjoying the land's bounty.
