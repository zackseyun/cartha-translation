theological_decisions:
- issue: Sense of שׁמע in covenantal exhortation
  chosen_reading: obedient
  alternative_readings:
  - listen
  - hear
  rationale: The verse contrasts covenant response and refusal in the immediate context
    (vv. 19–20). Rendering שׁמע as 'obedient' communicates the Hebrew idiom of hearing
    with responsive compliance, without importing extra doctrinal content.
  doctrine_reference: Translation philosophy §1, §3, §6
