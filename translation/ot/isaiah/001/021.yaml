id: ISA.1.21
reference: Isaiah 1:21
source:
  edition: WLC
  text: אֵיכָה֙ הָיְתָ֣ה לְ/זוֹנָ֔ה קִרְיָ֖ה נֶאֱמָנָ֑ה מְלֵאֲתִ֣י מִשְׁפָּ֗ט צֶ֛דֶק
    יָלִ֥ין בָּ֖/הּ וְ/עַתָּ֥ה מְרַצְּחִֽים׃
translation:
  text: How the faithful city has become a prostitute! She was full of justice; righteousness
    lodged in her, but now murderers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'harlot.' The Hebrew term refers to a prostitute; the image is metaphorical
      for the city's unfaithfulness and corruption.
    reason: lexical_alternative
  - marker: b
    text: Or 'justice' for 'righteousness.' The Hebrew צֶדֶק overlaps semantically
      with justice, especially in parallel with 'justice' earlier in the verse.
    reason: lexical_alternative
  - marker: c
    text: Literally 'righteousness lodged in her'; the verb evokes spending the night
      or residing there.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיכָה
  chosen: How
  alternatives:
  - How could it be
  - Alas, how
  lexicon: HALOT
  rationale: Introduces an exclamatory lament over shocking reversal, not a request
    for information. 'How' preserves the prophetic lament idiom in natural English.
- source_word: הָיְתָה
  chosen: has become
  alternatives:
  - became
  - has come to be
  lexicon: HALOT
  rationale: The perfect marks a completed change of state. 'Has become' communicates
    the resulting condition in idiomatic English.
- source_word: לְזוֹנָה
  chosen: a prostitute
  alternatives:
  - a harlot
  - a whore
  lexicon: HALOT
  rationale: The noun denotes a prostitute. 'Prostitute' is the clearest modern English
    equivalent; 'harlot' is traditional but archaic, and the cruder alternative is
    unnecessarily harsh for the register.
- source_word: קִרְיָה נֶאֱמָנָה
  chosen: the faithful city
  alternatives:
  - the trustworthy city
  - the loyal city
  lexicon: HALOT
  rationale: The phrase identifies Jerusalem metaphorically as once reliable/covenantally
    faithful. 'Faithful city' is concise, natural, and preserves the moral contrast
    with her present corruption.
- source_word: מְלֵאֲתִי מִשְׁפָּט
  chosen: She was full of justice
  alternatives:
  - full of justice
  - filled with justice
  lexicon: HALOT
  rationale: Though formally an adjective phrase, English idiom benefits from supplying
    'she was' to continue the personified-city description. 'Justice' best renders
    מִשְׁפָּט here as social/judicial right order.
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: צֶדֶק can overlap with justice, but here paired with מִשְׁפָּט it is
    best distinguished as 'righteousness,' preserving the ethical dimension alongside
    judicial order.
- source_word: יָלִין בָּהּ
  chosen: lodged in her
  alternatives:
  - dwelt in her
  - spent the night in her
  lexicon: HALOT
  rationale: The verb literally refers to spending the night or lodging. In context
    it metaphorically depicts righteousness as habitually resident in the city. 'Lodged
    in her' preserves the vivid image better than the flatter 'dwelt in her.'
- source_word: וְעַתָּה
  chosen: but now
  alternatives:
  - and now
  - now
  lexicon: HALOT
  rationale: The conjunction marks sharp contrast between former and present state.
    'But now' makes the adversative force explicit in English.
- source_word: מְרַצְּחִים
  chosen: murderers
  alternatives:
  - murderers dwell there
  - killers
  lexicon: HALOT
  rationale: 'The participle functions elliptically after the prior clause: where
    righteousness once lodged, now there are murderers. ''Murderers'' preserves the
    terse prophetic punch; English can leave the implied verb understood.'
