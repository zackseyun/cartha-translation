theological_decisions:
- issue: Metaphorical sexual language for Jerusalem's covenant unfaithfulness
  chosen_reading: Retain the metaphor explicitly as 'has become a prostitute'
  alternative_readings:
  - has become unfaithful
  - has become like a harlot
  rationale: The Hebrew uses stark sexualized imagery to portray moral and covenantal
    corruption. Softening it to a generalized abstraction would undertranslate the
    prophetic force. The city remains personified as feminine throughout the verse.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the source text plainly says.'
