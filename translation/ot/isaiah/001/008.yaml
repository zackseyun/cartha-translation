theological_decisions:
- issue: Personification of Zion
  chosen_reading: Render the phrase as the poetic personification 'daughter Zion'
    rather than interpretively substituting 'Jerusalem' in the main text.
  alternative_readings:
  - Jerusalem
  - the people of Zion
  rationale: The Hebrew text uses a conventional prophetic personification. Preserving
    it maintains the literary and theological texture without importing a narrower
    interpretive gloss.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the source text says without paraphrastic expansion.'
