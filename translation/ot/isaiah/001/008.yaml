id: ISA.1.8
reference: Isaiah 1:8
source:
  edition: WLC
  text: וְ/נוֹתְרָ֥ה בַת צִיּ֖וֹן כְּ/סֻכָּ֣ה בְ/כָ֑רֶם כִּ/מְלוּנָ֥ה בְ/מִקְשָׁ֖ה
    כְּ/עִ֥יר נְצוּרָֽה־׃
translation:
  text: And daughter Zion is left like a shelter in a vineyard, like a hut in a cucumber
    field, like a besieged city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'melon field' or 'field of gourds'; the Hebrew term may refer more broadly
      to a cultivated patch of cucumbers or similar vine crops.
    reason: lexical_alternative
  - marker: b
    text: Or 'the daughter of Zion.' The Hebrew expression personifies Zion/Jerusalem
      as a daughter.
    reason: lexical_alternative
  - marker: c
    text: Or possibly 'like a guarded city,' though 'besieged city' best fits the
      context.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנוֹתְרָה
  chosen: And ... is left
  alternatives:
  - And ... remains
  - And ... is left over
  lexicon: HALOT
  rationale: From יתר/נותר in the Niphal, expressing being left behind or remaining
    after devastation. 'Is left' is idiomatic modern English and fits the context
    of survival amid judgment.
- source_word: בַת צִיּוֹן
  chosen: daughter Zion
  alternatives:
  - the daughter of Zion
  - Daughter Zion
  lexicon: HALOT
  rationale: A personified designation for Zion/Jerusalem. 'daughter Zion' preserves
    the Hebrew construct compactly and keeps the poetic personification. Capitalization
    is avoided in running text except for the proper name itself.
- source_word: כְּסֻכָּה
  chosen: like a shelter
  alternatives:
  - like a booth
  - like a hut
  lexicon: HALOT
  rationale: סֻכָּה denotes a temporary booth/shelter. 'Shelter' communicates the
    function clearly in modern English, while the temporary, fragile sense is supported
    by the parallel images.
- source_word: בְכָרֶם
  chosen: in a vineyard
  alternatives:
  - among the vineyards
  lexicon: HALOT
  rationale: Straightforward locative phrase. Singular 'vineyard' matches the Hebrew
    singular and the image of an isolated watch-shelter.
- source_word: כִּמְלוּנָה
  chosen: like a hut
  alternatives:
  - like a lodging place
  - like a temporary shelter
  lexicon: HALOT
  rationale: מְלוּנָה refers to a temporary lodging place or hut used in fields. 'Hut'
    gives a natural English parallel to the previous image while preserving the sense
    of frailty and impermanence.
- source_word: בְמִקְשָׁה
  chosen: in a cucumber field
  alternatives:
  - in a melon field
  - in a garden of cucumbers
  lexicon: HALOT
  rationale: מִקְשָׁה denotes a field of cucumbers/gourds/melons. 'Cucumber field'
    follows a common and plausible specific rendering in English tradition and evokes
    the agricultural watch-hut setting. Because the exact crop category may be broader,
    an alternative is preserved in a footnote.
- source_word: כְּעִיר נְצוּרָה
  chosen: like a besieged city
  alternatives:
  - like a guarded city
  - like a watched city
  lexicon: HALOT
  rationale: From צור in the passive/participle sense, most naturally 'besieged' in
    this context of judgment and isolation. While the root can relate to watching/guarding
    in some understandings, 'besieged city' best fits the progression from vulnerable
    field shelters to urban distress.
