id: ISA.1.20
reference: Isaiah 1:20
source:
  edition: WLC
  text: וְ/אִם תְּמָאֲנ֖וּ וּ/מְרִיתֶ֑ם חֶ֣רֶב תְּאֻכְּל֔וּ כִּ֛י פִּ֥י יְהוָ֖ה דִּבֵּֽר־׃ס
translation:
  text: But if you refuse and rebel, you will be devoured by the sword; for the mouth of Yahweh has spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''you will be eaten by the sword.'' The wording forms a deliberate contrast with the previous verse, where the obedient ''eat the good of the land.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction links this verse adversatively with the prior promise in v. 19; 'But if' best captures the contrast in natural English while preserving the conditional force of אִם.
- source_word: תְּמָאֲנוּ
  chosen: you refuse
  alternatives:
  - you are unwilling
  - you decline
  lexicon: HALOT
  rationale: From מאן, denoting refusal or unwillingness. 'Refuse' is concise and forceful, fitting the covenantal warning context.
- source_word: וּמְרִיתֶם
  chosen: and rebel
  alternatives:
  - and are rebellious
  - and resist
  lexicon: HALOT
  rationale: From מרה, to be rebellious or defiant. 'Rebel' preserves the active covenant-breaking sense better than the softer 'resist.'
- source_word: חֶרֶב
  chosen: the sword
  alternatives:
  - a sword
  - war
  lexicon: HALOT
  rationale: The singular noun commonly functions as a collective/metonymic image for violent judgment. 'The sword' preserves the idiomatic and prophetic force better than an abstract rendering like 'war.'
- source_word: תְּאֻכְּלוּ
  chosen: you will be devoured
  alternatives:
  - you will be eaten
  - you will be consumed
  lexicon: HALOT
  rationale: Passive of אכל creates a wordplay with v. 19 ('you shall eat the good of the land'). Here the people are the object rather than the subject. 'Be devoured' is idiomatic in English for destruction by the sword and preserves the reversal.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground or solemn confirmation of the warning. 'For' fits prophetic declaration style.
- source_word: פִּי יְהוָה
  chosen: the mouth of the LORD
  alternatives:
  - the LORD himself
  - the LORD's mouth
  lexicon: HALOT
  rationale: The Hebrew idiom emphasizes divine utterance. Retaining 'mouth' preserves the vivid anthropomorphic expression and the solemnity of prophetic speech. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, in keeping with the doctrine's contested terms table.
- source_word: דִּבֵּר
  chosen: has spoken
  alternatives:
  - has said
  - spoke
  lexicon: HALOT
  rationale: The perfect verb marks the certainty and authority of the declaration. 'Has spoken' is a standard, natural English rendering in prophetic formulae and pairs well with 'the mouth of the LORD.'
