id: ISA.1.30
reference: Isaiah 1:30
source:
  edition: WLC
  text: כִּ֣י תִֽהְי֔וּ כְּ/אֵלָ֖ה נֹבֶ֣לֶת עָלֶ֑/הָ וּֽ/כְ/גַנָּ֔ה אֲשֶׁר מַ֖יִם
    אֵ֥ין לָֽ/הּ־׃
translation:
  text: For you will be like an oak whose leaf withers, and like a garden that has
    no water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a terebinth.' The Hebrew אֵלָה can refer to a terebinth or an oak;
      the exact species is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason or result flowing from the prior judgment context.
    'For' fits the explanatory force in English.
- source_word: תִהְיוּ
  chosen: you will be
  alternatives:
  - you shall be
  - you become
  lexicon: HALOT
  rationale: Qal imperfect 2mp of היה indicates future/resultative sense in context.
    'You will be' is natural modern English.
- source_word: כְאֵלָה
  chosen: like an oak
  alternatives:
  - like a terebinth
  lexicon: HALOT
  rationale: אֵלָה can denote terebinth or oak. 'Oak' is chosen for readability and
    because the simile emphasizes a broad, recognizable tree whose foliage fails;
    the alternative is preserved in a footnote because the species identification
    is lexically debated.
- source_word: נֹבֶלֶת
  chosen: withers
  alternatives:
  - fading
  - drooping
  lexicon: HALOT
  rationale: The participle from נבל describes withering or fading. Rendered verbally
    in English to produce a natural relative clause with the following noun.
- source_word: עָלֶהָ
  chosen: whose leaf
  alternatives:
  - its leafage
  - its leaves
  lexicon: HALOT
  rationale: Singular noun with 3fs suffix, literally 'her/its leaf.' English idiom
    prefers 'whose leaf' in this simile; singular is retained rather than generalized
    to plural.
- source_word: וּכְגַנָּה
  chosen: and like a garden
  alternatives:
  - and like an orchard
  lexicon: HALOT
  rationale: גַּנָּה denotes a garden or enclosed cultivated area. 'Garden' is the
    most straightforward equivalent.
- source_word: אֲשֶׁר מַיִם אֵין לָהּ
  chosen: that has no water
  alternatives:
  - which has no water
  - without water
  lexicon: HALOT
  rationale: The clause literally states 'for which there is no water.' 'That has
    no water' is clear, idiomatic, and preserves the image of deprivation rather than
    merely dryness.
- source_word: מַיִם
  chosen: water
  alternatives:
  - waters
  lexicon: HALOT
  rationale: Though morphologically plural, מַיִם is a standard plural-form noun meaning
    'water' in English.
