theological_decisions:
- issue: Nature of the divine action
  chosen_reading: Judgment expressed as purifying discipline
  alternative_readings:
  - Purely destructive judgment
  - Purely restorative action
  rationale: The verse combines adversative action ('turn my hand against you') with
    refining/removal imagery. The translation preserves both severity and purification
    without collapsing the tension into either destruction alone or gentle restoration
    alone.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
