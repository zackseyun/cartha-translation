id: ISA.1.25
reference: Isaiah 1:25
source:
  edition: WLC
  text: וְ/אָשִׁ֤יבָה יָדִ/י֙ עָלַ֔יִ/ךְ וְ/אֶצְרֹ֥ף כַּ/בֹּ֖ר סִיגָ֑יִ/ךְ וְ/אָסִ֖ירָה
    כָּל בְּדִילָֽיִ/ךְ־׃
translation:
  text: I will turn my hand against you, and I will smelt away your dross as with
    lye, and remove all your alloy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'upon you'; the Hebrew idiom 'turn my hand upon/against' can introduce
      either punitive action or purifying intervention. Here the refining imagery
      suggests judgment with a cleansing purpose.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'lye' refers to an alkali used in cleansing or
      refining; some render 'with alkali' or 'like soap.'
    reason: lexical_alternative
  - marker: c
    text: Or 'your tin' or 'your base metals'; the Hebrew may refer specifically to
      tin or more generally to inferior metal mixed into an alloy.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָשִׁיבָה
  chosen: I will turn
  alternatives:
  - I will restore
  - I will bring back
  lexicon: HALOT
  rationale: From שוב in Hiphil, here with 'my hand against you' it idiomatically
    means to turn or bring one's hand against someone, not restore. The hostile/judicial
    sense fits the context of purifying judgment.
- source_word: יָדִי
  chosen: my hand
  lexicon: HALOT
  rationale: Retains the Hebrew anthropomorphic idiom for divine action and power
    rather than paraphrasing as 'my power' or 'my judgment.'
- source_word: עָלַיִךְ
  chosen: against you
  alternatives:
  - upon you
  - toward you
  lexicon: HALOT
  rationale: Although על often means 'upon,' with the idiom 'turn my hand upon/against'
    in a judgment context, 'against you' best conveys the adversative force in natural
    English.
- source_word: וְאֶצְרֹף
  chosen: I will smelt away
  alternatives:
  - I will refine
  - I will purge
  lexicon: HALOT
  rationale: צרף is metallurgical language for smelting/refining. 'Smelt away' captures
    both the refining process and the removal of impurities more concretely than the
    broader 'refine.'
- source_word: כַּבֹּר
  chosen: as with lye
  alternatives:
  - with alkali
  - like soap
  lexicon: HALOT
  rationale: בֹּר refers to an alkali/lye used in cleansing or refining. 'As with
    lye' preserves the comparative כ and gives a readable modern equivalent without
    flattening the image.
- source_word: סִיגָיִךְ
  chosen: your dross
  alternatives:
  - your impurities
  - your slag
  lexicon: HALOT
  rationale: סיגים is the standard term for metallic dross/impurities. 'Dross' preserves
    the prophetic refining metaphor and is established, still understandable English.
- source_word: וְאָסִירָה
  chosen: and remove
  alternatives:
  - and take away
  - and purge away
  lexicon: HALOT
  rationale: סור in Hiphil means to remove or take away. 'Remove' is concise and natural
    in parallel with the refining imagery.
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: Retained straightforwardly for totality.
- source_word: בְּדִילָיִךְ
  chosen: your alloy
  alternatives:
  - your tin
  - your base metals
  lexicon: HALOT
  rationale: בדיל can denote tin, but in this refining context it likely refers more
    broadly to inferior alloying material mixed into precious metal. 'Alloy' communicates
    adulterating metal in idiomatic English and fits the parallel with 'dross.'
