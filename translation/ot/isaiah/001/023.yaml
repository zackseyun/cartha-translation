id: ISA.1.23
reference: Isaiah 1:23
source:
  edition: WLC
  text: שָׂרַ֣יִ/ךְ סוֹרְרִ֗ים וְ/חַבְרֵי֙ גַּנָּבִ֔ים כֻּלּ/וֹ֙ אֹהֵ֣ב שֹׁ֔חַד וְ/רֹדֵ֖ף
    שַׁלְמֹנִ֑ים יָתוֹם֙ לֹ֣א יִשְׁפֹּ֔טוּ וְ/רִ֥יב אַלְמָנָ֖ה לֹֽא יָב֥וֹא אֲלֵי/הֶֽם־׃פ
translation:
  text: Your rulers are rebels and companions of thieves; every one of them loves
    a bribe and runs after payments. They do not defend the orphan, and the widow’s
    case does not come before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your princes are rebellious.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and pursue rewards/gifts'; the Hebrew term may refer to payments or
      recompense, likely in a corrupt context.
    reason: lexical_alternative
  - marker: c
    text: Or 'They do not give justice to the orphan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרַיִךְ
  chosen: your rulers
  alternatives:
  - your princes
  - your officials
  lexicon: HALOT
  rationale: The noun שַׂר commonly denotes a leader, ruler, or official. 'Rulers'
    is clear modern English and fits the civic context better than the more archaic
    'princes,' while preserving the governing role.
- source_word: סוֹרְרִים
  chosen: rebels
  alternatives:
  - stubborn
  - rebellious ones
  lexicon: HALOT
  rationale: From סרר, conveying stubborn rebellion or defiance. 'Rebels' captures
    the moral-political force in concise English better than the adjectival 'stubborn'
    alone.
- source_word: וְחַבְרֵי גַּנָּבִים
  chosen: and companions of thieves
  alternatives:
  - and associates of thieves
  - and partners with thieves
  lexicon: HALOT
  rationale: The construct phrase literally means 'companions/associates of thieves.'
    'Companions of thieves' is natural and preserves the accusatory force of corrupt
    alliance.
- source_word: כֻּלּוֹ
  chosen: every one of them
  alternatives:
  - all of them
  - every one
  lexicon: HALOT
  rationale: Though morphologically singular with suffix, in context it distributively
    describes the whole group. 'Every one of them' brings out the distributive sense
    more clearly than a simple 'all of them.'
- source_word: אֹהֵב שֹׁחַד
  chosen: loves a bribe
  alternatives:
  - loves bribery
  - loves bribes
  lexicon: HALOT
  rationale: שֹׁחַד denotes a bribe. The singular after a distributive subject works
    well in English as 'loves a bribe,' though the sense is generic.
- source_word: וְרֹדֵף שַׁלְמֹנִים
  chosen: and runs after payments
  alternatives:
  - and pursues rewards
  - and chases gifts
  lexicon: HALOT
  rationale: The verb רדף is literally 'pursue/chase.' שַׁלְמֹנִים likely refers to
    payments, recompense, or illicit rewards. 'Runs after payments' is idiomatic and
    conveys eager pursuit of gain without over-specifying the exact kind of reward.
- source_word: יָתוֹם
  chosen: the orphan
  alternatives:
  - the fatherless
  lexicon: HALOT
  rationale: The term denotes a child deprived of a father and, by extension, a socially
    vulnerable orphan. 'The orphan' is clear modern English; 'the fatherless' is more
    traditional but less natural today.
- source_word: לֹא יִשְׁפֹּטוּ
  chosen: do not defend
  alternatives:
  - do not judge
  - do not give justice to
  lexicon: HALOT
  rationale: In judicial contexts שׁפט can mean to judge, govern, or secure justice
    for. Here the object is the vulnerable orphan, so 'do not defend' expresses the
    failure to render justice, not merely the absence of legal procedure.
- source_word: וְרִיב אַלְמָנָה
  chosen: and the widow’s case
  alternatives:
  - and the widow's dispute
  - and the widow's plea
  lexicon: HALOT
  rationale: רִיב can denote a legal dispute, case, or complaint. 'The widow’s case'
    best fits the courtroom/governance setting and reads naturally in English.
- source_word: לֹא יָבֹא אֲלֵיהֶם
  chosen: does not come before them
  alternatives:
  - does not reach them
  - does not come to them
  lexicon: HALOT
  rationale: The idiom literally says the widow's case 'does not come to them.' 'Come
    before them' makes the judicial setting explicit in idiomatic English without
    adding foreign content.
