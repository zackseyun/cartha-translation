theological_decisions:
- issue: Nature of the opening question
  chosen_reading: A rhetorical question about the futility of further chastisement
    because the people persist in rebellion
  alternative_readings:
  - A question asking where on the body they can still be struck
  rationale: The Hebrew עַל־מֶה most naturally means 'why/for what reason' here, especially
    with the following clause about continued rebellion. The alternative sense ('on
    what part') is possible in light of the body imagery in the next colon, but the
    syntax and flow favor a causal rhetorical question rather than a locative one.
