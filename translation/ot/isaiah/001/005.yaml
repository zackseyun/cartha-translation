id: ISA.1.5
reference: Isaiah 1:5
source:
  edition: WLC
  text: עַ֣ל מֶ֥ה תֻכּ֛וּ ע֖וֹד תּוֹסִ֣יפוּ סָרָ֑ה כָּל רֹ֣אשׁ לָ/חֳלִ֔י וְ/כָל לֵבָ֖ב
    דַּוָּֽי־־׃
translation:
  text: Why should you be struck again? You continue in rebellion; the whole head
    is sick, and the whole heart is faint.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'On what part will you be struck again?' The Hebrew can be taken as
      asking where further blows could fall, given the body's total sickness.
    reason: alternative_reading
lexical_decisions:
- source_word: עַל מֶה
  chosen: Why
  alternatives:
  - For what
  - On account of what
  lexicon: HALOT
  rationale: Idiomatic interrogative introducing a rhetorical question. In English,
    'Why' best captures the force naturally without over-literal awkwardness.
- source_word: תֻכּוּ
  chosen: should you be struck
  alternatives:
  - will you be struck
  - are you to be beaten
  lexicon: HALOT
  rationale: 'Hophal of נכה is passive/causative-passive, ''be struck/beaten.'' ''Should
    you be struck'' fits the rhetorical sense: why undergo further blows/chastisement?'
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - any longer
  - further
  lexicon: HALOT
  rationale: In context of repeated punishment, 'again' communicates recurrence clearly;
    'further' is possible but less idiomatic with the preceding clause.
- source_word: תּוֹסִיפוּ
  chosen: You continue
  alternatives:
  - You add
  - You go on
  lexicon: HALOT
  rationale: Hiphil of יסף literally means 'add/increase,' but with the following
    noun it idiomatically means continuing or persisting in an action/state. 'You
    continue' is natural modern English and preserves the ongoing force.
- source_word: סָרָה
  chosen: in rebellion
  alternatives:
  - rebellion
  - turning away
  - apostasy
  lexicon: HALOT
  rationale: The noun denotes defection/rebellion/stubborn turning aside. Rendering
    with the preposition 'in' after 'continue' yields clear English while preserving
    the covenantal sense of rebellious revolt.
- source_word: כָּל רֹאשׁ
  chosen: the whole head
  alternatives:
  - every head
  lexicon: HALOT
  rationale: Collective singular imagery for the nation as a body. 'The whole head'
    preserves the metaphor rather than flattening it into distributive individuals.
- source_word: לָחֳלִי
  chosen: is sick
  alternatives:
  - is for sickness
  - is diseased
  lexicon: HALOT
  rationale: 'The lamed with noun expresses condition/result: ''for sickness,'' i.e.,
    afflicted/sick. ''Is sick'' is the most natural English expression of the metaphor.'
- source_word: וְכָל לֵבָב
  chosen: and the whole heart
  alternatives:
  - and every heart
  lexicon: HALOT
  rationale: Parallel to 'the whole head'; singular collective body imagery should
    be retained.
- source_word: דַּוָּי
  chosen: is faint
  alternatives:
  - is sick
  - is weak
  - is diseased
  lexicon: HALOT
  rationale: The adjective can denote sickness, weakness, or languishing. 'Faint'
    differentiates it from the previous 'sick' while preserving the image of inner
    collapse and matching common English idiom for the heart.
