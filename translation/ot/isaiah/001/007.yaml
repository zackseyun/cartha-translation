id: ISA.1.7
reference: Isaiah 1:7
source:
  edition: WLC
  text: אַרְצְ/כֶ֣ם שְׁמָמָ֔ה עָרֵי/כֶ֖ם שְׂרֻפ֣וֹת אֵ֑שׁ אַדְמַתְ/כֶ֗ם לְ/נֶגְדְּ/כֶם֙
    זָרִים֙ אֹכְלִ֣ים אֹתָ֔/הּ וּ/שְׁמָמָ֖ה כְּ/מַהְפֵּכַ֥ת זָרִֽים׃
translation:
  text: Your land is a desolation; your cities are burned with fire. Your soil—before
    your very eyes—strangers are devouring it, and it is a desolation, like an overthrow
    by strangers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'foreigners are consuming it'; the repeated Hebrew term can be rendered
      'strangers' or 'foreigners.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'like an overthrow by strangers'; the phrase may also be understood
      as 'like the overthrow of foreigners' or, by some, as an allusion to the overthrow
      of Sodom.
    reason: alternative_reading
lexical_decisions:
- source_word: אַרְצְכֶם
  chosen: your land
  alternatives:
  - your country
  lexicon: HALOT
  rationale: אֶרֶץ commonly denotes land/territory. 'Your land' is the most natural
    and sufficiently broad rendering in this judgment context.
- source_word: שְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolate
  - wasteland
  - ruin
  lexicon: HALOT
  rationale: The noun denotes a state of devastation/desolation. Rendering as the
    noun phrase 'a desolation' preserves the Hebrew nominal style and the force of
    judgment.
- source_word: עָרֵיכֶם
  chosen: your cities
  lexicon: HALOT
  rationale: Straightforward plural construct with 2mp suffix.
- source_word: שְׂרֻפוֹת אֵשׁ
  chosen: burned with fire
  alternatives:
  - burned up
  - consumed by fire
  lexicon: HALOT
  rationale: Passive participle plus noun 'fire' is idiomatically rendered 'burned
    with fire.' This keeps the vividness without over-paraphrasing.
- source_word: אַדְמַתְכֶם
  chosen: your soil
  alternatives:
  - your ground
  - your farmland
  - your land
  lexicon: HALOT
  rationale: אֲדָמָה here is more concrete than אֶרֶץ earlier in the verse, referring
    to the productive ground being consumed. 'Soil' preserves that distinction in
    English.
- source_word: לְנֶגְדְּכֶם
  chosen: before your very eyes
  alternatives:
  - before you
  - in front of you
  lexicon: HALOT
  rationale: The phrase indicates direct, visible occurrence. 'Before your very eyes'
    captures the rhetorical force of helpless witness.
- source_word: זָרִים
  chosen: strangers
  alternatives:
  - foreigners
  - aliens
  lexicon: HALOT
  rationale: זָרִים denotes outsiders/foreign intruders. 'Strangers' is a natural
    rendering and also allows the repeated term later in the verse to remain consistent.
- source_word: אֹכְלִים אֹתָהּ
  chosen: are devouring it
  alternatives:
  - are eating it
  - consume it
  lexicon: HALOT
  rationale: '''Devouring'' conveys the metaphorical sense of consuming the land''s
    produce/resources by hostile outsiders more idiomatically than the overly literal
    ''eating it.'''
- source_word: וּשְׁמָמָה
  chosen: and it is a desolation
  alternatives:
  - and desolate
  - and it is desolate
  lexicon: HALOT
  rationale: The conjunction plus noun resumes and intensifies the earlier description.
    Supplying 'it is' makes the English grammatical while preserving the verbless
    Hebrew sense.
- source_word: כְּמַהְפֵּכַת
  chosen: like an overthrow
  alternatives:
  - like an overthrowing
  - like a destruction
  - like the overthrow of Sodom
  lexicon: HALOT
  rationale: מַהְפֵּכָה denotes an overthrow/catastrophic overturning. 'Overthrow'
    is concise and preserves the likely echo of divine judgment language without importing
    a specific referent absent from the text.
- source_word: זָרִים
  chosen: by strangers
  alternatives:
  - by foreigners
  lexicon: HALOT
  rationale: The repeated noun is kept consistent. The construction after כְּמַהְפֵּכַת
    is difficult; 'by strangers' is a defensible construal that matches the MT as
    given and preserves the parallel with the earlier clause.
