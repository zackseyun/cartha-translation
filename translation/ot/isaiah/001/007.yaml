theological_decisions:
- issue: Interpretation of כְּמַהְפֵּכַת זָרִים
  chosen_reading: like an overthrow by strangers
  alternative_readings:
  - like the overthrow of foreigners
  - like Sodom's overthrow
  - like a desolation overthrown by foreigners
  rationale: The Hebrew phrase is syntactically compressed and has received multiple
    interpretations. The main text follows the MT straightforwardly, taking זָרִים
    as the genitival/complement element associated with the overthrow and preserving
    the parallel with the earlier 'strangers.' Because the phrase is genuinely ambiguous,
    alternatives are preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
