theological_decisions:
- issue: Relationship between sinful conduct and worship in the final clause
  chosen_reading: I cannot endure iniquity and solemn assembly
  alternative_readings:
  - I cannot endure iniquity with solemn assembly
  - I cannot endure trouble and assembly
  rationale: The Hebrew juxtaposes אָוֶן and עֲצָרָה without an explicit preposition.
    Rendering the phrase coordinately preserves the terseness and tension of the original
    rather than over-resolving it. A footnote preserves the interpretive alternative
    'with solemn assembly,' which many understand as the sense.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
