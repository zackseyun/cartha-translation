id: ISA.1.13
reference: Isaiah 1:13
source:
  edition: WLC
  text: לֹ֣א תוֹסִ֗יפוּ הָבִיא֙ מִנְחַת שָׁ֔וְא קְטֹ֧רֶת תּוֹעֵבָ֛ה הִ֖יא לִ֑/י חֹ֤דֶשׁ
    וְ/שַׁבָּת֙ קְרֹ֣א מִקְרָ֔א לֹא אוּכַ֥ל אָ֖וֶן וַ/עֲצָרָֽה־־׃
translation:
  text: Do not continue bringing worthless grain offerings; incense is an abomination
    to me. New moon and Sabbath, the calling of an assembly—I cannot endure iniquity
    and solemn assembly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I cannot endure iniquity with solemn assembly.' The Hebrew is terse
      and may imply the incompatibility of evil and worship gathering.
    reason: alternative_reading
  - marker: b
    text: '''Worthless grain offerings'' renders a phrase that could also be translated
      ''vain offering'' or ''empty offering.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: תוֹסִיפוּ הָבִיא
  chosen: continue bringing
  alternatives:
  - add to bring
  - go on bringing
  - bring again
  lexicon: HALOT
  rationale: The Hiphil of יסף with an infinitive commonly means 'continue' or 'go
    on' doing something. 'Do not continue bringing' captures the prohibition idiom
    naturally in English without losing the iterative force.
- source_word: מִנְחַת שָׁוְא
  chosen: worthless grain offerings
  alternatives:
  - vain offering
  - empty offering
  - false offering
  lexicon: HALOT
  rationale: מִנְחָה often denotes a grain offering in cultic contexts, not merely
    any generic gift. שָׁוְא conveys emptiness, vanity, or worthlessness. 'Worthless
    grain offerings' preserves both the sacrificial specificity and the prophetic
    denunciation.
- source_word: קְטֹרֶת
  chosen: incense
  alternatives:
  - incense offering
  lexicon: HALOT
  rationale: The noun straightforwardly refers to incense. The shorter 'incense' is
    sufficient because the sacrificial context is already explicit.
- source_word: תּוֹעֵבָה הִיא לִי
  chosen: is an abomination to me
  alternatives:
  - is detestable to me
  - is abhorrent to me
  lexicon: HALOT
  rationale: תּוֹעֵבָה is a strong term for something detestable or abominable before
    God. 'Abomination' preserves the severity and familiar biblical register while
    remaining understandable.
- source_word: חֹדֶשׁ
  chosen: New moon
  alternatives:
  - new moon festival
  lexicon: HALOT
  rationale: In this cultic calendar context, חֹדֶשׁ refers to the new moon observance.
    Capitalizing 'New moon' is unnecessary, but the phrase itself signals the festal
    day.
- source_word: שַׁבָּת
  chosen: Sabbath
  alternatives:
  - the Sabbath
  lexicon: HALOT
  rationale: The term refers to the covenantal day of rest and worship. 'Sabbath'
    is the standard and clearest rendering.
- source_word: קְרֹא מִקְרָא
  chosen: the calling of an assembly
  alternatives:
  - proclaiming a convocation
  - calling a sacred assembly
  - summoning an assembly
  lexicon: HALOT
  rationale: The infinitive plus cognate noun intensifies the act of convening. 'The
    calling of an assembly' preserves the Hebrew verbal-nominal pairing more transparently
    than a fully smoothed idiom, while remaining readable.
- source_word: לֹא אוּכַל
  chosen: I cannot endure
  alternatives:
  - I cannot bear
  - I am not able to tolerate
  lexicon: HALOT
  rationale: While the verb literally means 'be able,' in context it expresses intolerability.
    'I cannot endure' communicates the idiomatic force in natural English.
- source_word: אָוֶן
  chosen: iniquity
  alternatives:
  - wickedness
  - evil
  - trouble
  lexicon: HALOT
  rationale: אָוֶן can denote wickedness, trouble, or iniquity. Here it names moral
    evil associated with worship. 'Iniquity' preserves the ethical weight and fits
    the prophetic indictment.
- source_word: וַעֲצָרָה
  chosen: and solemn assembly
  alternatives:
  - and festival assembly
  - and sacred assembly
  lexicon: HALOT
  rationale: עֲצָרָה refers to a solemn religious gathering, often a festal assembly.
    'Solemn assembly' is a well-established and accurate rendering in this cultic
    setting.
