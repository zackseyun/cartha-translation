theological_decisions:
- issue: Referent of the singular possessive in 'his work'
  chosen_reading: The possessive refers to the strong man, so the verse judges both
    the powerful person and what he has done or produced.
  alternative_readings:
  - The possessive could be taken more collectively, referring to the works of the
    strong/powerful class.
  rationale: 'The Hebrew singular suffix most naturally points back to the singular
    subject הֶחָסֹן. This keeps the poetic parallel tight: person and work are both
    combustible under divine judgment.'
