id: ISA.1.31
reference: Isaiah 1:31
source:
  edition: WLC
  text: וְ/הָיָ֤ה הֶ/חָסֹן֙ לִ/נְעֹ֔רֶת וּ/פֹעֲל֖/וֹ לְ/נִיצ֑וֹץ וּ/בָעֲר֧וּ שְׁנֵי/הֶ֛ם
    יַחְדָּ֖ו וְ/אֵ֥ין מְכַבֶּֽה׃ס
translation:
  text: The strong man will become tinder, and his work a spark; both of them will
    burn together, with no one to quench them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tow'—that is, loose flax fiber that ignites easily.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחָסֹן
  chosen: the strong man
  alternatives:
  - the strong one
  - the mighty man
  - the wealthy man
  lexicon: HALOT
  rationale: The adjective/noun denotes one who is strong or mighty. In context of
    judgment on the powerful, 'the strong man' gives a natural English singular and
    preserves the personal force better than an abstract 'strength.' 'Wealthy man'
    is a possible contextual extension in some traditions, but the core lexical sense
    is strength/might.
- source_word: לִנְעֹרֶת
  chosen: tinder
  alternatives:
  - tow
  - flax tow
  lexicon: HALOT
  rationale: The noun refers to shaken-off fiber, especially tow/flax refuse, which
    burns easily. 'Tinder' communicates the function clearly in modern English while
    staying close to the image. The more technical 'tow' is preserved in a footnote
    as a lexical alternative.
- source_word: וּפֹעֲלוֹ
  chosen: and his work
  alternatives:
  - and his deed
  - and what he has made
  lexicon: HALOT
  rationale: The noun from פעל can denote work, deed, or product. 'His work' is broad
    enough to include both his actions and what he has produced, fitting the judgment
    context without over-specifying.
- source_word: לְנִיצוֹץ
  chosen: a spark
  alternatives:
  - a flame
  - a spark of fire
  lexicon: HALOT
  rationale: The noun denotes a spark or glowing particle that ignites combustion.
    'A spark' is the most direct and idiomatic rendering and pairs well with 'tinder.'
- source_word: וּבָעֲרוּ
  chosen: will burn
  alternatives:
  - will blaze
  - will be consumed by fire
  lexicon: HALOT
  rationale: The verb means to burn or consume by fire. 'Will burn' is sufficiently
    vivid and avoids adding intensity not explicit in the form.
- source_word: שְׁנֵיהֶם יַחְדָּו
  chosen: both of them ... together
  alternatives:
  - the two of them together
  - both together
  lexicon: HALOT
  rationale: The doubled expression emphasizes joint destruction of the strong man
    and his work. English idiom is best served by 'both of them ... together.'
- source_word: וְאֵין מְכַבֶּה
  chosen: with no one to quench them
  alternatives:
  - and there will be none to quench
  - and no one will extinguish them
  lexicon: HALOT
  rationale: The participle with אין expresses the absence of anyone able to extinguish
    the fire. 'With no one to quench them' is natural English and preserves the finality
    of judgment. The plural object 'them' is supplied from the preceding dual/plural
    sense in English.
