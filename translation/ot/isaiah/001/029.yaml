id: ISA.1.29
reference: Isaiah 1:29
source:
  edition: WLC
  text: כִּ֣י יֵבֹ֔שׁוּ מֵ/אֵילִ֖ים אֲשֶׁ֣ר חֲמַדְתֶּ֑ם וְ/תַ֨חְפְּר֔וּ מֵ/הַ/גַּנּ֖וֹת
    אֲשֶׁ֥ר בְּחַרְתֶּֽם׃
translation:
  text: For you will be ashamed of the oaks that you desired, and you will be disgraced
    because of the gardens that you chose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'terebinths'; the Hebrew may refer to large sacred trees associated with
      illicit worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the reason or result flowing from the prior accusation/judgment
    context. 'For' best preserves the explanatory force in natural English.
- source_word: יֵבֹשׁוּ
  chosen: you will be ashamed
  alternatives:
  - they will be ashamed
  - you will be put to shame
  lexicon: HALOT
  rationale: The verb בוש denotes shame/disappointment. Although the form is 3mp,
    in context it addresses the same audience as the surrounding 2mp verbs, so English
    'you will be ashamed' best reflects the discourse sense. 'Put to shame' is possible
    but more passive than the Hebrew here.
- source_word: מֵאֵילִים
  chosen: of the oaks
  alternatives:
  - because of the terebinths
  - from the mighty ones
  lexicon: HALOT
  rationale: אֵילִים here most naturally refers to sacred trees in an idolatrous setting,
    parallel to 'gardens.' 'Oaks' is a common and accessible rendering. 'Terebinths'
    is lexically possible and preserved in a footnote because the exact species is
    uncertain. 'Mighty ones' does not fit the parallelism or context as well.
- source_word: אֲשֶׁר חֲמַדְתֶּם
  chosen: that you desired
  alternatives:
  - that you delighted in
  - that you coveted
  lexicon: HALOT
  rationale: חמד conveys strong desire or delight. 'Desired' is broad and natural,
    fitting the context of illicit attraction to cultic sites without over-specifying
    covetousness.
- source_word: וְתַחְפְּרוּ
  chosen: and you will be disgraced
  alternatives:
  - and you will blush
  - and you will be humiliated
  lexicon: HALOT
  rationale: חפר in this stem can denote being abashed, humiliated, or disgraced.
    'Be disgraced' gives the shame sense clearly in contemporary English and pairs
    well with 'ashamed' without collapsing the verbs into exact synonyms.
- source_word: מֵהַגַּנּוֹת
  chosen: because of the gardens
  alternatives:
  - of the gardens
  - from the gardens
  lexicon: HALOT
  rationale: The preposition מִן after shame verbs marks the object/cause of shame.
    'Because of the gardens' makes that relation explicit in idiomatic English. The
    'gardens' likely refers to cultic groves or garden sanctuaries.
- source_word: אֲשֶׁר בְּחַרְתֶּם
  chosen: that you chose
  alternatives:
  - that you selected
  lexicon: HALOT
  rationale: בחר is straightforwardly 'choose.' The wording preserves the deliberate
    agency of the audience in selecting these forbidden worship sites.
