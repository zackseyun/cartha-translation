theological_decisions:
- issue: Nature of 'oaks' and 'gardens'
  chosen_reading: Treat both as references to idolatrous worship sites or cultic settings.
  alternative_readings:
  - Treat them as merely luxurious natural places without explicit cultic significance
  rationale: The immediate context in Isaiah 1 condemns apostasy and the use of trees/gardens
    is a common prophetic image for illicit worship locations. The translation itself
    remains lexically plain ('oaks,' 'gardens') and does not over-interpret in the
    main text, but the rationale recognizes the likely cultic background.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the text says without importing extra doctrinal claims.'
