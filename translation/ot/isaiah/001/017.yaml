theological_decisions:
- issue: Rendering of the difficult phrase אַשְּׁרוּ חָמוֹץ
  chosen_reading: correct the oppressor
  alternative_readings:
  - correct oppression
  - help the oppressed
  - set right the oppressed
  rationale: The Hebrew is lexically contested. The draft follows the active sense
    of חָמוֹץ ('oppressor' / wrongdoer) and takes אַשְּׁרוּ as 'set right, correct.'
    This avoids paraphrase while preserving the prophetic demand to rectify injustice.
    Because the alternative passive reading is plausible and common in English versions,
    it is preserved in a footnote rather than silently excluded, in keeping with the
    project's commitment to preserve genuine ambiguity.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
