id: ISA.1.17
reference: Isaiah 1:17
source:
  edition: WLC
  text: לִמְד֥וּ הֵיטֵ֛ב דִּרְשׁ֥וּ מִשְׁפָּ֖ט אַשְּׁר֣וּ חָמ֑וֹץ שִׁפְט֣וּ יָת֔וֹם
    רִ֖יבוּ אַלְמָנָֽה׃ס
translation:
  text: Learn to do good; seek justice, correct the oppressor; judge for the fatherless,
    plead for the widow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'help the oppressed' or 'set right the oppressed.' The Hebrew phrase
      is difficult, and חָמוֹץ may be understood differently.
    reason: alternative_reading
lexical_decisions:
- source_word: לִמְדוּ
  chosen: Learn
  alternatives:
  - Learn how
  lexicon: HALOT
  rationale: Imperative plural of למד, calling for acquired practice or instruction.
    Simple 'Learn' preserves the direct imperative force.
- source_word: הֵיטֵב
  chosen: to do good
  alternatives:
  - well
  - what is good
  lexicon: HALOT
  rationale: 'Adverb from יטב modifying the imperative sequence. In context, English
    idiom is best conveyed by supplying the implied ethical object: ''to do good,''
    matching the moral exhortation of the surrounding commands.'
- source_word: דִּרְשׁוּ
  chosen: seek
  alternatives:
  - pursue
  - strive for
  lexicon: HALOT
  rationale: דרש often means seek, inquire, or pursue. 'Seek' is both natural and
    sufficiently broad, preserving the active moral pursuit commanded.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - what is right
  lexicon: HALOT
  rationale: In prophetic ethical contexts, משפט commonly denotes justice in the social
    and legal sense. 'Justice' best fits the verse's concern for the vulnerable.
- source_word: אַשְּׁרוּ
  chosen: correct
  alternatives:
  - set right
  - make straight
  - guide
  lexicon: HALOT
  rationale: From אשר in the Piel, likely 'set right' or 'make straight.' Here it
    governs חָמוֹץ and calls for rectifying a wrong social situation. 'Correct' is
    concise and readable.
- source_word: חָמוֹץ
  chosen: the oppressor
  alternatives:
  - the oppressed
  - the ruthless one
  - the wrongdoer
  lexicon: HALOT
  rationale: This noun is lexically difficult and has been understood either actively
    ('oppressor') or passively ('oppressed'). The active sense fits the immediate
    legal-ethical sequence and yields the coherent command 'correct the oppressor.'
    Because the alternative is significant and longstanding in translation tradition,
    it is preserved in a footnote.
- source_word: שִׁפְטוּ
  chosen: judge for
  alternatives:
  - defend
  - give justice to
  lexicon: HALOT
  rationale: שפט in context means to render judgment on behalf of someone. 'Judge
    for' keeps the legal flavor more formally than 'defend,' while still making the
    beneficiary clear in English.
- source_word: יָתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: יתום denotes a child without a father, often socially vulnerable. 'The
    fatherless' is slightly more literal than 'the orphan' and preserves the covenantal-social
    nuance.
- source_word: רִיבוּ
  chosen: plead for
  alternatives:
  - contend for
  - take up the case of
  lexicon: HALOT
  rationale: ריב in the imperative here has legal advocacy force. 'Plead for' is natural
    modern English and preserves the courtroom/register nuance.
- source_word: אַלְמָנָה
  chosen: the widow
  lexicon: HALOT
  rationale: Standard rendering of אלמנה, a key category of the socially vulnerable
    in the Hebrew Bible.
