id: ISA.1.9
reference: Isaiah 1:9
source:
  edition: WLC
  text: לוּלֵי֙ יְהוָ֣ה צְבָא֔וֹת הוֹתִ֥יר לָ֛/נוּ שָׂרִ֖יד כִּ/מְעָ֑ט כִּ/סְדֹ֣ם הָיִ֔ינוּ לַ/עֲמֹרָ֖ה דָּמִֽינוּ׃ס
translation:
  text: If Yahweh of hosts had not left us a very small remnant, we would have become like Sodom; we would have resembled Gomorrah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If the LORD of hosts had not preserved for us a few survivors.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לוּלֵי
  chosen: If ... had not
  alternatives:
  - Unless
  lexicon: HALOT
  rationale: Introduces a contrary-to-fact condition. In English, 'If ... had not' most naturally conveys the unreal past conditional structure of the verse.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: The traditional but still intelligible title 'the LORD of hosts' preserves the breadth of the Hebrew, which can denote heavenly armies/hosts, without narrowing it to merely human military forces.
- source_word: הוֹתִיר
  chosen: had not left
  alternatives:
  - had not preserved
  - had not caused to remain
  lexicon: HALOT
  rationale: The Hiphil of יתר here means to leave over or preserve as a remainder. 'Left' is concise and idiomatic in English while still preserving the remnant idea when paired with שָׂרִיד.
- source_word: שָׂרִיד
  chosen: remnant
  alternatives:
  - survivor
  - surviving few
  lexicon: HALOT
  rationale: Although singular in form, it functions collectively here for those left over. 'Remnant' is the most natural English rendering in prophetic context and preserves the theological-literary motif of a surviving remainder.
- source_word: כִּמְעָט
  chosen: a very small
  alternatives:
  - a little
  - few
  lexicon: HALOT
  rationale: With 'remnant,' the phrase conveys smallness in degree/number. 'A very small remnant' is idiomatic and reflects the sense of only a tiny remainder.
- source_word: כִּסְדֹם
  chosen: like Sodom
  alternatives:
  - as Sodom
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like Sodom' is natural modern English.
- source_word: הָיִינוּ
  chosen: we would have become
  alternatives:
  - we would have been
  lexicon: HALOT
  rationale: In this counterfactual comparison, 'become' better captures the resultant state implied in English after the conditional, rather than a static 'been.'
- source_word: לַעֲמֹרָה
  chosen: Gomorrah
  alternatives: []
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: דָּמִינוּ
  chosen: we would have resembled
  alternatives:
  - we would have been like
  - we would have become like
  lexicon: HALOT
  rationale: The verb means to be like or resemble. Rendering it distinctly from הָיִינוּ avoids flattening the Hebrew parallelism while preserving the synonymous force.
