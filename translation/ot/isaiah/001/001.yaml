id: ISA.1.1
reference: Isaiah 1:1
source:
  edition: WLC
  text: חֲזוֹן֙ יְשַֽׁעְיָ֣הוּ בֶן אָמ֔וֹץ אֲשֶׁ֣ר חָזָ֔ה עַל יְהוּדָ֖ה וִ/ירוּשָׁלִָ֑ם
    בִּ/ימֵ֨י עֻזִּיָּ֧הוּ יוֹתָ֛ם אָחָ֥ז יְחִזְקִיָּ֖הוּ מַלְכֵ֥י יְהוּדָֽה־־׃
translation:
  text: The vision of Isaiah son of Amoz, which he saw concerning Judah and Jerusalem
    in the days of Uzziah, Jotham, Ahaz, and Hezekiah, kings of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against Judah and Jerusalem.' The Hebrew preposition can introduce either
      the subject matter or, in some contexts, an adversative message.
    reason: alternative_reading
lexical_decisions:
- source_word: חֲזוֹן
  chosen: vision
  alternatives:
  - oracle
  - revelation
  lexicon: HALOT
  rationale: חזון commonly denotes a prophetic vision or revelatory sight. 'Vision'
    is the most direct and conventional rendering here, fitting both the noun and
    the following verb חָזָה ('saw'). 'Oracle' is too narrow, and 'revelation' is
    broader than the immediate imagery.
- source_word: יְשַׁעְיָהוּ
  chosen: Isaiah
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: בֶן
  chosen: son of
  alternatives:
  - ben
  lexicon: HALOT
  rationale: The construct indicates direct filiation. 'Son of' is the natural English
    equivalent.
- source_word: אָמ֔וֹץ
  chosen: Amoz
  rationale: Personal name transliterated by standard English convention.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative particle introducing the clause modifying 'vision.' 'Which'
    reads smoothly in English with an inanimate antecedent.
- source_word: חָזָה
  chosen: saw
  alternatives:
  - beheld
  - received in vision
  lexicon: HALOT
  rationale: The verb literally means 'saw' in prophetic contexts. Retaining 'saw'
    preserves the wordplay/cognate linkage with חֲזוֹן ('vision') and avoids interpretive
    expansion.
- source_word: עַל
  chosen: concerning
  alternatives:
  - against
  - about
  lexicon: HALOT
  rationale: In prophetic superscriptions עַל can mark the subject matter of the vision.
    'Concerning' is broad and contextually appropriate. 'Against' would over-specify
    judgment, though judgment is present later in the book.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Standard transliteration of the place/kingdom name.
- source_word: וִירוּשָׁלִַם
  chosen: and Jerusalem
  rationale: Conjunction plus proper place name, rendered straightforwardly.
- source_word: בִּימֵי
  chosen: in the days of
  alternatives:
  - during the reigns of
  lexicon: HALOT
  rationale: Literal temporal expression. 'During the reigns of' is interpretive;
    'in the days of' preserves the Hebrew wording while remaining idiomatic.
- source_word: עֻזִּיָּהוּ
  chosen: Uzziah
  alternatives:
  - Azariah
  rationale: Standard English form for this king in Isaiah. 'Azariah' is an alternate
    biblical name for the same king but is not the form used here.
- source_word: יוֹתָם
  chosen: Jotham
  rationale: Standard transliteration of the royal name.
- source_word: אָחָז
  chosen: Ahaz
  rationale: Standard transliteration of the royal name.
- source_word: יְחִזְקִיָּהוּ
  chosen: Hezekiah
  alternatives:
  - Hizkiah
  rationale: Standard English form of the royal name.
- source_word: מַלְכֵי יְהוּדָה
  chosen: kings of Judah
  alternatives:
  - the kings of Judah
  lexicon: HALOT
  rationale: Construct phrase identifying the listed rulers. Omission of the article
    in English is acceptable after apposition, but the sense remains definite.
