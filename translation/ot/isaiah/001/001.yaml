theological_decisions:
- issue: Scope of עַל in the superscription
  chosen_reading: concerning Judah and Jerusalem
  alternative_readings:
  - against Judah and Jerusalem
  rationale: The preposition can introduce the subject matter of a prophetic vision
    and need not itself signal condemnation. Since the book contains both judgment
    and hope, 'concerning' preserves the broader scope without importing a narrower
    theological stance.
  doctrine_reference: Preserve theological tension rather than resolve it.
