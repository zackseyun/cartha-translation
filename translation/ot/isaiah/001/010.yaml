id: ISA.1.10
reference: Isaiah 1:10
source:
  edition: WLC
  text: שִׁמְע֥וּ דְבַר יְהוָ֖ה קְצִינֵ֣י סְדֹ֑ם הַאֲזִ֛ינוּ תּוֹרַ֥ת אֱלֹהֵ֖י/נוּ
    עַ֥ם עֲמֹרָֽה־׃
translation:
  text: Hear the word of the LORD, rulers of Sodom; give ear to the instruction of
    our God, people of Gomorrah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Isaiah addresses Judah's leaders and people with the names 'Sodom' and 'Gomorrah'
      as a prophetic comparison, not as a literal identification.
    reason: cultural_note
  - marker: b
    text: Or 'law' or 'teaching' for 'instruction' (Hebrew torah).
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen
  - Hearken
  lexicon: HALOT
  rationale: Qal imperative plural of שׁמע, a direct summons to hear/heed. 'Hear'
    is concise, natural, and preserves the prophetic force better than the more archaic
    'hearken.'
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: דבר can mean 'word' or 'message'; 'word' preserves the standard prophetic
    formula and matches the source closely. יְהוָה follows the doctrinal default rendering
    'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, YHWH is rendered 'the LORD' rather
    than transliterated forms.
- source_word: קְצִינֵי
  chosen: rulers
  alternatives:
  - chiefs
  - leaders
  - officials
  lexicon: HALOT
  rationale: The noun denotes leaders or officials. 'Rulers' fits the prophetic denunciation
    and pairs well with the vocative address.
- source_word: סְדֹם
  chosen: Sodom
  lexicon: HALOT
  rationale: Proper place name, transliterated by standard English convention.
- source_word: הַאֲזִינוּ
  chosen: give ear
  alternatives:
  - listen
  - pay attention
  lexicon: HALOT
  rationale: Hiphil imperative plural of אזן, more pointed than simple 'hear.' 'Give
    ear' preserves the parallelism with שׁמע while reflecting the distinct verb.
- source_word: תּוֹרַת
  chosen: instruction
  alternatives:
  - law
  - teaching
  lexicon: HALOT
  rationale: תורה can mean law, instruction, or teaching. Here, in prophetic address,
    'instruction' best captures the broader sense of divine teaching without narrowing
    it to legal code only.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  alternatives:
  - God
  lexicon: HALOT
  rationale: The 1cp suffix is explicit and should be retained. 'Our God' reflects
    Isaiah's identification with the covenant people even while rebuking them.
- source_word: עַם
  chosen: people of
  alternatives:
  - people,
  - O people of
  lexicon: HALOT
  rationale: 'In construct with עֲמֹרָה, the phrase is a vocative: ''people of Gomorrah.''
    This is the most natural English rendering.'
- source_word: עֲמֹרָה
  chosen: Gomorrah
  lexicon: HALOT
  rationale: Proper place name, transliterated by standard English convention.
