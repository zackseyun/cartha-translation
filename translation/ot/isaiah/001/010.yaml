theological_decisions:
- issue: Prophetic identification of Judah/Jerusalem with Sodom and Gomorrah
  chosen_reading: Retain the literal vocatives 'rulers of Sodom' and 'people of Gomorrah'
    in the main text as metaphorical denunciation.
  alternative_readings:
  - Paraphrase as 'you rulers who are like Sodom' and 'you people who are like Gomorrah'
  rationale: The Hebrew directly addresses the audience with these city names, invoking
    the comparison without inserting explanatory wording. Preserving the literal vocative
    keeps the prophetic shock and allusive force; the metaphor can be clarified in
    interpretation rather than translation.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source text warrants.'
