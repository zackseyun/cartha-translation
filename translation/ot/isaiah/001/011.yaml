id: ISA.1.11
reference: Isaiah 1:11
source:
  edition: WLC
  text: לָ/מָּה לִּ֤/י רֹב זִבְחֵי/כֶם֙ יֹאמַ֣ר יְהוָ֔ה שָׂבַ֛עְתִּי עֹל֥וֹת אֵילִ֖ים וְ/חֵ֣לֶב מְרִיאִ֑ים וְ/דַ֨ם פָּרִ֧ים וּ/כְבָשִׂ֛ים וְ/עַתּוּדִ֖ים לֹ֥א חָפָֽצְתִּי־־׃
translation:
  text: Why are your many sacrifices to me? says Yahweh. I have had enough of burnt offerings of rams and the fat of fattened animals; and in the blood of bulls and lambs and goats I do not delight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'What use are your many sacrifices to me?' The Hebrew idiom is literally, 'Why to me the multitude of your sacrifices?'
    reason: lexical_alternative
  - marker: b
    text: '''Goats'' translates a term more specifically meaning ''male goats'' or ''he-goats.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה לִּי
  chosen: What are ... to me?
  alternatives:
  - Why do I need ...?
  - What use are ... to me?
  lexicon: HALOT
  rationale: The idiom literally combines 'why?' with 'to me,' but in context it functions rhetorically to question the value or purpose of the sacrifices from YHWH's perspective. 'What are ... to me?' preserves the rhetorical force without over-paraphrasing.
- source_word: רֹב זִבְחֵיכֶם
  chosen: your many sacrifices
  alternatives:
  - the multitude of your sacrifices
  - your abundant sacrifices
  lexicon: HALOT
  rationale: רֹב denotes abundance/multitude, and זִבְחֵיכֶם refers broadly to sacrificial offerings. 'Your many sacrifices' is natural modern English while retaining the quantitative emphasis.
- source_word: יֹאמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - declares the LORD
  lexicon: HALOT
  rationale: The prophetic speech formula is most naturally rendered 'says the LORD.' Per doctrine, יְהוָה is rendered 'the LORD' rather than a transliteration.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving the conventional covenantal rendering in English.
- source_word: שָׂבַעְתִּי
  chosen: I have had enough
  alternatives:
  - I am full of
  - I am sated with
  lexicon: HALOT
  rationale: The verb means to be sated or filled to excess. 'I have had enough' communicates revulsion/satiation in idiomatic English and fits the prophetic rebuke.
- source_word: עֹלוֹת אֵילִים
  chosen: burnt offerings of rams
  alternatives:
  - whole burnt offerings of rams
  lexicon: HALOT
  rationale: עֹלוֹת is the standard sacrificial term 'burnt offerings'; אֵילִים are 'rams.' The more technical 'whole burnt offerings' is possible but unnecessary in the main text.
- source_word: חֵלֶב מְרִיאִים
  chosen: the fat of fattened animals
  alternatives:
  - the fat of fed beasts
  - the fat of fatlings
  lexicon: HALOT
  rationale: חֵלֶב is 'fat'; מְרִיאִים refers to well-fed/fattened livestock. 'Fattened animals' is clear modern English and avoids archaic 'fatlings.'
- source_word: דַם פָּרִים וּכְבָשִׂים וְעַתּוּדִים
  chosen: the blood of bulls and lambs and goats
  alternatives:
  - the blood of bulls, sheep, and male goats
  - the blood of bulls and sheep and he-goats
  lexicon: HALOT
  rationale: פָּרִים are bulls; כְבָשִׂים can denote lambs/sheep; עַתּוּדִים are he-goats or goats. 'Lambs' fits common sacrificial usage and keeps the list concrete and vivid. 'Goats' is sufficient in English without specifying sex in the main text.
- source_word: לֹא חָפָצְתִּי
  chosen: I do not delight
  alternatives:
  - I take no pleasure
  - I do not desire
  lexicon: HALOT
  rationale: The verb expresses pleasure, desire, or delight. 'I do not delight' preserves the evaluative sense and matches the prophetic denunciation without sounding overly wooden.
