theological_decisions:
- issue: Rendering of צדק in a civic-restoration context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine file notes that righteousness/justice can both be viable
    for cognate terms. In this verse, the restored city is characterized not only
    by fair governance but by broader moral and covenantal rectitude. 'Righteousness'
    best preserves that fuller sense, while 'justice' is worth preserving as a lexical
    alternative.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness / justice
    principle applied analogically to Hebrew צדק'
