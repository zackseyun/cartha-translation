id: ISA.1.26
reference: Isaiah 1:26
source:
  edition: WLC
  text: וְ/אָשִׁ֤יבָה שֹׁפְטַ֨יִ/ךְ֙ כְּ/בָ/רִ֣אשֹׁנָ֔ה וְ/יֹעֲצַ֖יִ/ךְ כְּ/בַ/תְּחִלָּ֑ה
    אַחֲרֵי כֵ֗ן יִקָּ֤רֵא לָ/ךְ֙ עִ֣יר הַ/צֶּ֔דֶק קִרְיָ֖ה נֶאֱמָנָֽה־׃
translation:
  text: And I will restore your judges as at the first, and your counselors as at
    the beginning. Afterward you will be called the city of righteousness, a faithful
    city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the city of justice."
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָשִׁיבָה
  chosen: And I will restore
  alternatives:
  - And I will bring back
  - And I will return
  lexicon: HALOT
  rationale: 'From שוב in the Hiphil, with causative sense: ''cause to return/restore.''
    ''Restore'' fits the context of reestablishing proper leadership better than the
    more wooden ''bring back.'''
- source_word: שֹׁפְטַיִךְ
  chosen: your judges
  alternatives:
  - your rulers
  lexicon: HALOT
  rationale: The noun שֹׁפֵט ordinarily means 'judge.' In context it may include governing
    officials, but 'judges' preserves the lexical sense while still fitting the restoration
    theme.
- source_word: כְּבָרִאשֹׁנָה
  chosen: as at the first
  alternatives:
  - as formerly
  - as in the beginning
  lexicon: HALOT
  rationale: This comparative phrase points back to an earlier ideal state. 'As at
    the first' is natural English and preserves the temporal comparison without overinterpreting
    which historical period is meant.
- source_word: וְיֹעֲצַיִךְ
  chosen: your counselors
  alternatives:
  - your advisers
  lexicon: HALOT
  rationale: From יעץ, here substantival/participial in sense. 'Counselors' is a standard
    and clear rendering, matching the civic leadership context and pairing well with
    'judges.'
- source_word: כְּבַתְּחִלָּה
  chosen: as at the beginning
  alternatives:
  - as formerly
  - as at first
  lexicon: HALOT
  rationale: Parallel to the previous temporal comparison, emphasizing restoration
    to an original condition. 'As at the beginning' preserves the parallelism while
    remaining readable.
- source_word: אַחֲרֵי כֵן
  chosen: Afterward
  alternatives:
  - After that
  - Then afterward
  lexicon: HALOT
  rationale: A temporal transition marking the result following restoration. 'Afterward'
    is concise and idiomatic.
- source_word: יִקָּרֵא לָךְ
  chosen: you will be called
  alternatives:
  - it will be said of you
  - you will be named
  lexicon: HALOT
  rationale: Niphal of קרא commonly expresses being called/named. Because the addressee
    is the city personified as feminine singular, 'you will be called' preserves the
    direct address and avoids flattening the personification.
- source_word: עִיר הַצֶּדֶק
  chosen: the city of righteousness
  alternatives:
  - the righteous city
  - the city of justice
  lexicon: HALOT
  rationale: Construct phrase literally 'city of the righteousness.' 'City of righteousness'
    preserves the noun-based expression. 'Righteousness' is preferred over 'justice'
    here because צדק in this restoration context includes moral rectitude and covenantal
    rightness, not merely judicial fairness.
- source_word: קִרְיָה נֶאֱמָנָה
  chosen: a faithful city
  alternatives:
  - a trustworthy city
  - a faithful town
  lexicon: HALOT
  rationale: קִרְיָה is a poetic synonym for 'city,' and נֶאֱמָנָה conveys faithfulness/reliability.
    'A faithful city' is idiomatic, preserves the poetic apposition, and echoes the
    contrast with 1:21.
