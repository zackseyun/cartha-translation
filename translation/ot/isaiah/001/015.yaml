id: ISA.1.15
reference: Isaiah 1:15
source:
  edition: WLC
  text: וּ/בְ/פָרִשְׂ/כֶ֣ם כַּפֵּי/כֶ֗ם אַעְלִ֤ים עֵינַ/י֙ מִ/כֶּ֔ם גַּ֛ם כִּֽי תַרְבּ֥וּ
    תְפִלָּ֖ה אֵינֶ֣/נִּי שֹׁמֵ֑עַ יְדֵי/כֶ֖ם דָּמִ֥ים מָלֵֽאוּ־׃
translation:
  text: And when you spread out your palms, I hide my eyes from you; even though you
    multiply prayer, I am not listening. Your hands are full of blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your hands.' The Hebrew specifically says 'your palms,' evoking the
      gesture of uplifted hands in prayer.
    reason: lexical_alternative
  - marker: b
    text: Or 'I do not hear' / 'I will not listen.' The Hebrew expression can be rendered
      more formally, but here it conveys God's ongoing refusal to receive their prayers.
    reason: lexical_alternative
  - marker: c
    text: '''Blood'' may also be understood as ''bloodshed'' or ''bloodguilt.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְפָרִשְׂכֶם
  chosen: And when you spread out
  alternatives:
  - And as you spread out
  - And when you stretch out
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with the infinitive construct
    of פרשׂ gives a temporal sense, 'and when/in your spreading out.' 'Spread out'
    is idiomatic and fits the gesture of prayer.
- source_word: כַּפֵּיכֶם
  chosen: your palms
  alternatives:
  - your hands
  lexicon: HALOT
  rationale: כַּף refers specifically to the palm or hollow of the hand, not merely
    'hands' in general. 'Palms' preserves the concrete image of uplifted hands in
    prayer.
- source_word: אַעְלִים עֵינַי מִכֶּם
  chosen: I hide my eyes from you
  alternatives:
  - I will hide my eyes from you
  - I avert my eyes from you
  lexicon: HALOT
  rationale: The Hiphil of עלם here means to conceal/hide. With 'my eyes from you,'
    the idiom expresses deliberate refusal to regard them. Present tense suits the
    prophetic discourse in English.
- source_word: גַּם כִּי
  chosen: even though
  alternatives:
  - yes, even if
  - although
  lexicon: HALOT
  rationale: 'The combination introduces concession: despite their multiplying prayer,
    God will not hear.'
- source_word: תַרְבּוּ תְפִלָּה
  chosen: you multiply prayer
  alternatives:
  - you make many prayers
  - you pray much
  lexicon: HALOT
  rationale: The Hiphil of רבה with תְפִלָּה is literally 'make prayer many/much.'
    'Multiply prayer' preserves the Hebrew emphasis while remaining understandable.
- source_word: אֵינֶנִּי שֹׁמֵעַ
  chosen: I am not listening
  alternatives:
  - I do not hear
  - I will not listen
  lexicon: HALOT
  rationale: The participle שֹׁמֵעַ with the negative expresses ongoing refusal. 'I
    am not listening' captures the durative force and the relational rejection implied
    in context.
- source_word: יְדֵיכֶם
  chosen: Your hands
  lexicon: HALOT
  rationale: Here the ordinary term for hands is used, distinct from 'palms' earlier.
    Keeping 'hands' preserves the shift from prayer gesture to moral culpability.
- source_word: דָּמִים
  chosen: blood
  alternatives:
  - bloodshed
  - bloodguilt
  lexicon: HALOT
  rationale: The plural often denotes bloodshed or bloodguilt, but English singular
    'blood' in the idiom 'full of blood' is natural and forceful while leaving the
    exact nuance broad.
- source_word: מָלֵאוּ
  chosen: are full of
  alternatives:
  - have become full of
  - are filled with
  lexicon: HALOT
  rationale: The perfect verb states a present condition resulting from prior action.
    'Are full of' is the most idiomatic English rendering in this accusation.
