theological_decisions:
- issue: Anthropomorphic language for God refusing worship
  chosen_reading: Retain the concrete anthropomorphic expressions 'I hide my eyes'
    and 'I am not listening' without softening them.
  alternative_readings:
  - I ignore you
  - I refuse to pay attention to you
  rationale: The Hebrew uses bodily imagery to communicate covenantal rejection of
    hypocritical worship. Preserving the imagery maintains the prophetic force and
    does not require doctrinal qualification.
  doctrine_reference: 'Translation philosophy #1, #3, #6'
