id: ISA.23.7
reference: Isaiah 23:7
source:
  edition: WLC
  text: הֲ/זֹ֥את לָ/כֶ֖ם עַלִּיזָ֑ה מִֽ/ימֵי קֶ֤דֶם קַדְמָתָ/הּ֙ יֹבִל֣וּ/הָ רַגְלֶ֔י/הָ
    מֵֽ/רָח֖וֹק לָ/גֽוּר־׃
translation:
  text: Is this your exultant city, whose origin is from days of old, whose feet carried
    her far away to sojourn?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose antiquity is from days of old; her feet led her afar to settle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲזֹאת
  chosen: Is this
  alternatives:
  - Is this one
  - Was this
  lexicon: HALOT
  rationale: Interrogative particle plus demonstrative feminine singular introduces
    a rhetorical question about Tyre. Present-tense English best matches the vivid
    prophetic taunt.
- source_word: לָכֶם
  chosen: your
  alternatives:
  - for you
  - to you
  lexicon: HALOT
  rationale: 'The preposition with 2mp pronoun is idiomatically rendered possessively
    in English in this rhetorical question: ''Is this your...?'' rather than the less
    natural ''Is this for you...?'''
- source_word: עַלִּיזָה
  chosen: exultant city
  alternatives:
  - joyous city
  - jubilant one
  - reveling city
  lexicon: HALOT
  rationale: The adjective denotes jubilant, exultant rejoicing. 'Exultant city' makes
    explicit the feminine referent as Tyre/city in context and preserves the tone
    of proud celebration.
- source_word: מִימֵי קֶדֶם
  chosen: from days of old
  alternatives:
  - from ancient days
  - from of old
  lexicon: HALOT
  rationale: A standard Hebrew idiom for antiquity. 'From days of old' is natural
    modern English while retaining the temporal depth.
- source_word: קַדְמָתָהּ
  chosen: whose origin
  alternatives:
  - whose antiquity
  - whose beginnings
  lexicon: HALOT
  rationale: The noun refers to former state/antiquity/origin. In this context of
    Tyre's ancient establishment, 'origin' communicates that her beginnings reach
    back to antiquity.
- source_word: יֹבִלוּהָ
  chosen: carried her
  alternatives:
  - led her
  - brought her
  lexicon: HALOT
  rationale: Hiphil of יבל commonly means bring/lead/carry along. With 'feet' as subject,
    'carried her' is idiomatic in English and preserves the personification.
- source_word: רַגְלֶיהָ
  chosen: whose feet
  alternatives:
  - her feet
  lexicon: HALOT
  rationale: The construct with suffix is incorporated into a relative clause in English
    for readability while preserving the image of the city personified as a woman
    traveling.
- source_word: מֵרָחוֹק
  chosen: far away
  alternatives:
  - from afar
  - to a distant place
  lexicon: HALOT
  rationale: The phrase marks distance. 'Far away' reads naturally with the motion
    verb and infinitive that follows.
- source_word: לָגוּר
  chosen: to sojourn
  alternatives:
  - to reside
  - to settle temporarily
  - to dwell as an alien
  lexicon: HALOT
  rationale: גור often denotes residing as a foreigner or temporary resident. 'Sojourn'
    preserves that nuance better than the flatter 'live' or 'settle.'
