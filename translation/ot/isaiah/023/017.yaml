theological_decisions:
- issue: Semantic force of divine visitation in יִפְקֹד
  chosen_reading: neutral divine intervention ('the LORD will attend to Tyre')
  alternative_readings:
  - the LORD will punish Tyre
  - the LORD will restore Tyre
  - the LORD will visit Tyre
  rationale: The context shows YHWH's decisive action toward Tyre after seventy years,
    but the verb itself does not require the translator to resolve whether the emphasis
    is punitive, restorative, or simply interventive. A neutral rendering preserves
    the tension in line with the translation philosophy.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
