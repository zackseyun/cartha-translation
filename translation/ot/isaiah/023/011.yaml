id: ISA.23.11
reference: Isaiah 23:11
source:
  edition: WLC
  text: יָד/וֹ֙ נָטָ֣ה עַל הַ/יָּ֔ם הִרְגִּ֖יז מַמְלָכ֑וֹת יְהוָה֙ צִוָּ֣ה אֶל כְּנַ֔עַן
    לַ/שְׁמִ֖ד מָעֻזְנֶֽי/הָ־־׃
translation:
  text: He has stretched out his hand over the sea; he has made kingdoms tremble.
    The LORD has commanded concerning Canaan, to destroy her strongholds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "against Canaan." The Hebrew preposition can be understood in more than
      one way here.
    reason: alternative_reading
  - marker: b
    text: '"Canaan" here likely refers to the Phoenician region associated with Tyre.'
    reason: cultural_note
  - marker: c
    text: Or "its fortresses." The Hebrew uses a feminine singular suffix, consistent
      with personifying the land or city.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדוֹ
  chosen: his hand
  alternatives:
  - his power
  lexicon: HALOT
  rationale: Literal 'his hand' is retained, preserving the anthropomorphic image
    of active power/judgment rather than abstracting it to 'power' in the main text.
- source_word: נָטָה
  chosen: has stretched out
  alternatives:
  - has extended
  - stretched out
  lexicon: HALOT
  rationale: The verb commonly means to stretch out or extend. 'Has stretched out'
    is idiomatic and preserves the concrete image of deliberate action.
- source_word: עַל הַיָּם
  chosen: over the sea
  alternatives:
  - against the sea
  - upon the sea
  lexicon: HALOT
  rationale: עַל can mean 'over,' 'upon,' or sometimes 'against.' 'Over the sea' best
    fits the image of sovereign reach while remaining natural English; the hostile
    nuance is conveyed by the context of judgment.
- source_word: הִרְגִּיז
  chosen: has made tremble
  alternatives:
  - has shaken
  - has stirred up
  - has agitated
  lexicon: HALOT
  rationale: The Hiphil of רגז conveys causing disturbance, trembling, or agitation.
    'Has made tremble' captures the effect on kingdoms in a judgment context more
    clearly than the broader 'shaken' or 'stirred up.'
- source_word: מַמְלָכוֹת
  chosen: kingdoms
  alternatives:
  - realms
  lexicon: HALOT
  rationale: Standard rendering for political entities; 'kingdoms' is the most direct
    and transparent gloss.
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: צִוָּה
  chosen: has commanded
  alternatives:
  - has given command
  - has ordained
  lexicon: HALOT
  rationale: The verb denotes issuing a command. 'Has commanded' is the most straightforward
    rendering.
- source_word: אֶל כְּנַעַן
  chosen: concerning Canaan
  alternatives:
  - against Canaan
  - to Canaan
  lexicon: HALOT
  rationale: The preposition אֶל after צוה is somewhat unusual here. In context it
    likely marks the object/target of the command rather than the recipient. 'Concerning
    Canaan' preserves that breadth without overcommitting to a hostile preposition
    in the main text.
- source_word: כְּנַעַן
  chosen: Canaan
  alternatives:
  - Phoenicia
  lexicon: HALOT
  rationale: The Hebrew reads 'Canaan.' In Isaiah 23 the term likely refers to the
    Phoenician trading region, but the translation keeps the source term in the main
    text and preserves the contextual identification in a footnote.
- source_word: לַשְׁמִיד
  chosen: to destroy
  alternatives:
  - to annihilate
  - to wipe out
  lexicon: HALOT
  rationale: The infinitive of שׁמד denotes destruction. 'To destroy' is strong and
    accurate without importing a more absolute nuance than the context requires.
- source_word: מָעֻזְנֶיהָ
  chosen: her strongholds
  alternatives:
  - its fortresses
  - her defenses
  lexicon: HALOT
  rationale: From מָעוֹז, meaning place of strength, refuge, or fortress. 'Strongholds'
    fits the plural construct form and the military-political context. The feminine
    suffix is represented as 'her,' matching the personified land/city style common
    in prophetic poetry.
