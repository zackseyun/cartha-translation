theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering of
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to interpret כנען as the historical-geographical name or as the contextual
    referent Phoenicia
  chosen_reading: Canaan in the main text, with Phoenicia preserved in a footnote
  alternative_readings:
  - Phoenicia
  rationale: Original-language primacy favors retaining the Hebrew proper noun 'Canaan.'
    Because Isaiah 23 concerns Tyre and the Phoenician sphere, the contextual identification
    is worth preserving in a footnote rather than replacing the source term in the
    main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy
    over translation tradition; Preserve theological tension rather than resolve it'
