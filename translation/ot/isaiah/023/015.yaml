theological_decisions:
- issue: Metaphorical portrayal of Tyre as a prostitute
  chosen_reading: Retain the metaphor directly as 'the prostitute' without softening
    it.
  alternative_readings:
  - the harlot
  - a promiscuous woman
  rationale: The prophetic text uses sexualized commercial imagery for Tyre's restoration
    to trade and influence. Softening the metaphor would mute the rhetorical force
    and obscure the intertextual link to the following quoted song.
  doctrine_reference: Translation philosophy §1, §6
