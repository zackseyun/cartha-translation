id: ISA.23.15
reference: Isaiah 23:15
source:
  edition: WLC
  text: וְ/הָיָה֙ בַּ/יּ֣וֹם הַ/ה֔וּא וְ/נִשְׁכַּ֤חַת צֹר֙ שִׁבְעִ֣ים שָׁנָ֔ה כִּ/ימֵ֖י
    מֶ֣לֶךְ אֶחָ֑ד מִ/קֵּ֞ץ שִׁבְעִ֤ים שָׁנָה֙ יִהְיֶ֣ה לְ/צֹ֔ר כְּ/שִׁירַ֖ת הַ/זּוֹנָֽה׃
translation:
  text: 'And in that day Tyre will be forgotten for seventy years, like the days of
    one king. At the end of seventy years, it will happen to Tyre as in the song of
    the prostitute:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for the lifetime of one king.' The Hebrew literally says 'like the
      days of one king.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'like the song of the prostitute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will be
  alternatives:
  - And it will happen
  - And it shall be
  lexicon: HALOT
  rationale: Introduces a future circumstance in prophetic narrative. Rendered idiomatically
    with future sense rather than a wooden 'and it was.'
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula; 'in that day' preserves the idiom
    and eschatological/prophetic register.
- source_word: וְנִשְׁכַּחַת
  chosen: will be forgotten
  alternatives:
  - will be neglected
  - will be lost from memory
  lexicon: HALOT
  rationale: Niphal of שׁכח naturally conveys passive/resultative sense. 'Forgotten'
    best matches the image of Tyre falling from prominence.
- source_word: צֹר
  chosen: Tyre
  rationale: Standard English transliteration of the city name.
- source_word: שִׁבְעִים שָׁנָה
  chosen: for seventy years
  alternatives:
  - seventy years
  lexicon: HALOT
  rationale: Duration is most naturally expressed in English with 'for' after 'will
    be forgotten.'
- source_word: כִּימֵי מֶלֶךְ אֶחָד
  chosen: like the days of one king
  alternatives:
  - according to the days of one king
  - for the lifetime of one king
  lexicon: HALOT
  rationale: The Hebrew comparison particle כ and plural 'days' favor a simile. 'Like
    the days of one king' preserves the wording while allowing readers to infer a
    single royal span; 'lifetime of one king' is interpretive and therefore kept as
    an alternative only.
- source_word: מִקֵּץ
  chosen: At the end of
  alternatives:
  - From the end of
  - After
  lexicon: HALOT
  rationale: Temporal marker introducing what follows the seventy-year period. 'At
    the end of' is the most natural and precise English equivalent.
- source_word: יִהְיֶה לְצֹר
  chosen: it will happen to Tyre
  alternatives:
  - it will be for Tyre
  - Tyre will become
  lexicon: HALOT
  rationale: The idiom היה ל often means 'it will be for/to.' Here an event or condition
    is in view, so 'it will happen to Tyre' communicates the sense clearly without
    overinterpreting.
- source_word: כְּשִׁירַת
  chosen: as in the song of
  alternatives:
  - like the song of
  - according to the song of
  lexicon: HALOT
  rationale: Introduces comparison to the taunt/song quoted in the next verse. 'As
    in the song of' smoothly anticipates the citation.
- source_word: הַזּוֹנָה
  chosen: the prostitute
  alternatives:
  - the harlot
  - the whore
  lexicon: HALOT
  rationale: זונה denotes a prostitute. 'Prostitute' is accurate, modern, and avoids
    archaic ('harlot') or overly coarse ('whore') diction while preserving the metaphor's
    force.
