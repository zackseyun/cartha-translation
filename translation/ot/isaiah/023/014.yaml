id: ISA.23.14
reference: Isaiah 23:14
source:
  edition: WLC
  text: הֵילִ֖ילוּ אֳנִיּ֣וֹת תַּרְשִׁ֑ישׁ כִּ֥י שֻׁדַּ֖ד מָעֻזְּ/כֶֽן׃ס
translation:
  text: Wail, ships of Tarshish, for your stronghold has been destroyed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Howl, ships of Tarshish'; the Hebrew verb denotes a loud cry of grief
      or distress.
    reason: lexical_alternative
  - marker: b
    text: Or 'your fortress' or 'your refuge.' The Hebrew likely refers to Tyre as
      the ships' place of security.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵילִילוּ
  chosen: Wail
  alternatives:
  - Howl
  - Lament
  lexicon: HALOT
  rationale: Imperative plural from ילל, a cry of lament/distress. 'Wail' is natural
    modern English and preserves the force of a public cry of grief better than the
    somewhat harsher 'howl.'
- source_word: אֳנִיּוֹת
  chosen: ships
  alternatives:
  - merchant ships
  - fleets
  lexicon: HALOT
  rationale: Basic plural noun meaning 'ships.' No modifier in the Hebrew itself requires
    expansion to 'merchant ships,' though the broader Tyre/Tarshish context involves
    trade.
- source_word: תַּרְשִׁישׁ
  chosen: Tarshish
  lexicon: HALOT
  rationale: Proper name, so transliterated per translation philosophy. In context
    it likely denotes the destination/origin associated with these ships, conventionally
    rendered 'ships of Tarshish.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the lament. 'For' fits the elevated prophetic
    style while remaining clear.
- source_word: שֻׁדַּד
  chosen: has been destroyed
  alternatives:
  - has been devastated
  - has been laid waste
  lexicon: HALOT
  rationale: Passive perfect from שדד, conveying violent ruin/devastation. 'Has been
    destroyed' is clear and strong without overinterpreting the exact mode of ruin.
- source_word: מָעֻזְּכֶן
  chosen: your stronghold
  alternatives:
  - your fortress
  - your harbor refuge
  lexicon: HALOT
  rationale: 'From מָעוֹז/מָעֹז, ''stronghold, fortress, refuge,'' with 2nd feminine
    plural suffix matching ''ships.'' ''Stronghold'' best preserves the metaphorical
    breadth: the place of security/support for the ships, likely Tyre as their secure
    base. ''Harbor'' would be too specific for the Hebrew term.'
