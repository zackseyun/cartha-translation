id: ISA.23.12
reference: Isaiah 23:12
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר לֹֽא תוֹסִ֥יפִי ע֖וֹד לַ/עְל֑וֹז הַֽ/מְעֻשָּׁקָ֞ה בְּתוּלַ֣ת בַּת
    צִיד֗וֹן כתיים ק֣וּמִי עֲבֹ֔רִי גַּם שָׁ֖ם לֹא יָנ֥וּחַֽ לָֽ/ךְ־־־־׃
translation:
  text: He said, “You will exult no more, oppressed virgin daughter of Sidon. Arise,
    cross over to Kittim; even there you will find no rest.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kittim likely refers to Cyprus, and by extension may evoke western maritime
      territories.
    reason: cultural_note
  - marker: b
    text: Or “You shall rejoice no more.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: He said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר. English can omit the conjunction
    for natural style without loss of meaning.
- source_word: לֹא תוֹסִיפִי עוֹד
  chosen: You will exult no more
  alternatives:
  - You will not continue any longer to exult
  - You shall rejoice no more
  lexicon: HALOT
  rationale: 'The negated Hiphil of יסף with עוֹד expresses cessation: ''you will
    no longer continue.'' In English this is best carried by ''no more'' attached
    to the following infinitive idea.'
- source_word: לַעְלֹז
  chosen: exult
  alternatives:
  - rejoice
  - be jubilant
  lexicon: HALOT
  rationale: עלז conveys exuberant rejoicing or exultation. 'Exult' preserves the
    elevated, taunting-prophetic tone better than the flatter 'rejoice.'
- source_word: הַמְעֻשָּׁקָה
  chosen: oppressed
  alternatives:
  - crushed
  - wronged
  lexicon: HALOT
  rationale: Passive participial/adjectival form from עשׁק, describing one subjected
    to oppression. 'Oppressed' is the most direct and idiomatic rendering.
- source_word: בְּתוּלַת בַּת צִידוֹן
  chosen: virgin daughter of Sidon
  alternatives:
  - virgin daughter, Sidon
  - maiden daughter of Sidon
  lexicon: HALOT
  rationale: A common prophetic personification for a city or people. 'Virgin daughter
    of Sidon' preserves both the metaphor and the construct relationship without paraphrase.
- source_word: כתיים / כִּתִּים
  chosen: Kittim
  alternatives:
  - Cyprus
  lexicon: HALOT
  rationale: Proper name traditionally referring to Kittim/Cyprus or western maritime
    lands. Per translation philosophy, names are transliterated in the main text;
    the geographic identification is suitable for a footnote.
- source_word: קוּמִי עֲבֹרִי
  chosen: Arise, cross over
  alternatives:
  - Get up, pass over
  - Rise, go across
  lexicon: HALOT
  rationale: Two feminine singular imperatives addressed to personified Sidon. 'Arise,
    cross over' is concise and preserves the urgent command.
- source_word: גַּם שָׁם
  chosen: even there
  alternatives:
  - there also
  - also there
  lexicon: HALOT
  rationale: 'Emphatic extension: not even in the place of flight will relief be found.
    ''Even there'' captures the force naturally in English.'
- source_word: לֹא יָנוּחַ לָךְ
  chosen: you will find no rest
  alternatives:
  - there will be no rest for you
  - you will not have rest
  lexicon: HALOT
  rationale: Though the Hebrew verb is third masculine singular ('it/he will rest'),
    the idiom with לָךְ means rest will not settle for you / be available to you.
    'You will find no rest' communicates the sense idiomatically in modern English.
