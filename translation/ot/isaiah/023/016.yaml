id: ISA.23.16
reference: Isaiah 23:16
source:
  edition: WLC
  text: קְחִ֥י כִנּ֛וֹר סֹ֥בִּי עִ֖יר זוֹנָ֣ה נִשְׁכָּחָ֑ה הֵיטִ֤יבִי נַגֵּן֙ הַרְבִּי
    שִׁ֔יר לְמַ֖עַן תִּזָּכֵֽרִי־׃
translation:
  text: Take a lyre, go about the city, forgotten prostitute; play skillfully, sing
    many songs, so that you may be remembered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'harp' for 'lyre.' The Hebrew names an ancient stringed instrument (kinnor).
    reason: lexical_alternative
lexical_decisions:
- source_word: קְחִי
  chosen: Take
  alternatives:
  - Pick up
  lexicon: HALOT
  rationale: Qal imperative 2fs of לקח, a direct command to take up an instrument.
    'Take' is the most natural concise English imperative here.
- source_word: כִנּוֹר
  chosen: a lyre
  alternatives:
  - harp
  lexicon: HALOT
  rationale: כִּנּוֹר denotes a stringed instrument, commonly rendered 'lyre.' 'Harp'
    is traditional but less precise for the ancient Near Eastern instrument.
- source_word: סֹבִּי
  chosen: go about
  alternatives:
  - go around
  - wander around
  lexicon: HALOT
  rationale: Qal imperative 2fs of סבב, here with the city as object, conveying movement
    through or around the city. 'Go about' preserves the idiomatic sense without over-specifying.
- source_word: עִיר
  chosen: the city
  alternatives:
  - through the city
  - around the city
  lexicon: HALOT
  rationale: The noun itself is 'city'; the preposition is not explicit, so the movement
    nuance is carried by 'go about' rather than expanded in the noun phrase.
- source_word: זוֹנָה
  chosen: prostitute
  alternatives:
  - harlot
  - whore
  lexicon: HALOT
  rationale: זוֹנָה literally denotes a prostitute. 'Harlot' is archaic; 'whore' is
    too harsh/register-marked for the translation style. The metaphor refers to Tyre
    personified, but the lexical force should remain clear.
- source_word: נִשְׁכָּחָה
  chosen: forgotten
  alternatives:
  - who has been forgotten
  lexicon: HALOT
  rationale: Niphal participle/passive sense from שכח, functioning adjectivally with
    'prostitute.' 'Forgotten' is compact and natural in English.
- source_word: הֵיטִיבִי
  chosen: play skillfully
  alternatives:
  - play well
  lexicon: HALOT
  rationale: 'Hiphil imperative of יטב used adverbially with the following infinitive/verb
    of playing: literally ''make good at playing.'' ''Play skillfully'' captures the
    exhortation better than the flatter ''play well.'''
- source_word: נַגֵּן
  chosen: play
  alternatives:
  - make music
  lexicon: HALOT
  rationale: From נגן, to play a stringed instrument. Since כִּנּוֹר has already specified
    the instrument, 'play' is sufficient and idiomatic.
- source_word: הַרְבִּי
  chosen: sing many songs
  alternatives:
  - multiply song
  - sing much
  lexicon: HALOT
  rationale: Hiphil imperative of רבה plus שיר yields the sense of increasing or multiplying
    song. In idiomatic English, 'sing many songs' best conveys the command.
- source_word: שִׁיר
  chosen: songs
  alternatives:
  - song
  lexicon: HALOT
  rationale: Although singular in Hebrew, it functions collectively after 'multiply.'
    English plural communicates the distributive sense naturally.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: Standard purposive conjunction. 'So that' is readable modern English.
- source_word: תִּזָּכֵרִי
  chosen: you may be remembered
  alternatives:
  - you may be brought to remembrance
  - you may be recalled
  lexicon: HALOT
  rationale: Niphal imperfect 2fs of זכר, passive/reflexive sense. 'Be remembered'
    is the clearest idiomatic rendering in context.
