theological_decisions:
- issue: Metaphorical designation of Tyre as a prostitute
  chosen_reading: Retain the explicit metaphor 'forgotten prostitute' in the main
    text
  alternative_readings:
  - forgotten harlot
  rationale: Isaiah 23 personifies Tyre as a prostitute seeking renewed attention.
    The translation preserves the prophetic metaphor without softening it or importing
    additional theological interpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
