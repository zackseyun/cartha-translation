id: ISA.23.9
reference: Isaiah 23:9
source:
  edition: WLC
  text: יְהוָ֥ה צְבָא֖וֹת יְעָצָ֑/הּ לְ/חַלֵּל֙ גְּא֣וֹן כָּל צְבִ֔י לְ/הָקֵ֖ל כָּל
    נִכְבַּדֵּי אָֽרֶץ־־־׃
translation:
  text: 'The LORD of hosts has purposed it: to defile the pride of all glory, to humble
    all the honored ones of the earth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has planned this against her,' with the suffix referring specifically
      to Tyre.
    reason: alternative_reading
  - marker: b
    text: '''All glory'' may also be rendered ''all beauty'' or ''all splendor.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'to abase' or 'to bring low' all the honored ones of the earth.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name YHWH, rendered 'the LORD' rather
    than transliteration.
- source_word: צְבָא֖וֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: Traditional but still transparent rendering of the divine title; 'hosts'
    preserves the breadth of heavenly/earthly armies without over-specifying.
- source_word: יְעָצָהּ
  chosen: has purposed it
  alternatives:
  - has planned it
  - has counseled it
  - has determined it
  lexicon: HALOT
  rationale: The verb יעץ here means to plan/purpose, with 3fs suffix referring back
    to Tyre/the announced judgment. 'Has purposed it' is idiomatic and suitably weighty.
- source_word: לְחַלֵּל
  chosen: to defile
  alternatives:
  - to profane
  - to dishonor
  lexicon: HALOT
  rationale: חלל in the piel commonly means to profane/defile. 'Defile' communicates
    the act of bringing what is exalted into dishonor; 'profane' is possible but can
    sound overly cultic in English here.
- source_word: גְּאוֹן
  chosen: the pride
  alternatives:
  - the majesty
  - the exaltation
  lexicon: HALOT
  rationale: גאון often denotes pride, exaltation, or majesty. In this judgment context,
    'pride' best fits the humbling theme of the verse.
- source_word: כָּל צְבִי
  chosen: of all glory
  alternatives:
  - of all beauty
  - of all splendor
  - of every glorious thing
  lexicon: HALOT
  rationale: צבי can denote beauty, splendor, or glory. 'All glory' keeps the compact
    Hebrew expression and pairs well with 'pride,' though the sense includes beauty/splendor.
- source_word: לְהָקֵל
  chosen: to humble
  alternatives:
  - to abase
  - to bring low
  - to treat lightly
  lexicon: HALOT
  rationale: The hiphil of קלל can mean to make light, abase, or dishonor. In parallel
    with the first infinitive and in context of divine judgment on the exalted, 'to
    humble' best captures the result in natural English.
- source_word: כָּל נִכְבַּדֵּי אָרֶץ
  chosen: all the honored ones of the earth
  alternatives:
  - all the honored of the land
  - all the nobles of the earth
  - all the glorious of the earth
  lexicon: HALOT
  rationale: נכבדי are those who are weighty/honored. 'Honored ones' is broad enough
    to include nobles and other eminent persons. 'Earth' is retained rather than 'land'
    because the scope appears intentionally expansive.
