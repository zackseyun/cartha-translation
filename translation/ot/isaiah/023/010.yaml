id: ISA.23.10
reference: Isaiah 23:10
source:
  edition: WLC
  text: עִבְרִ֥י אַרְצֵ֖/ךְ כַּ/יְאֹ֑ר בַּת תַּרְשִׁ֕ישׁ אֵ֖ין מֵ֥זַח עֽוֹד־׃
translation:
  text: Pass through your land like the Nile, daughter of Tarshish; there is no restraint anymore.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Pass through your land like the Nile' or 'Spread out over your land like the Nile.' The Hebrew verb can denote crossing or passing through, but the Nile simile suggests overflowing expansion.
    reason: lexical_alternative
  - marker: b
    text: The rare Hebrew word translated 'restraint' may also be understood as 'harbor,' 'barrier,' or 'mooring.' The sense is that Tarshish is no longer held in check.
    reason: lexical_alternative
  - marker: c
    text: Or 'Overflow your land like the Nile'.
    reason: previous_rendering
lexical_decisions:
- source_word: עִבְרִי
  chosen: Overflow
  alternatives:
  - Pass through
  - Cross over
  - Spread out
  lexicon: HALOT
  rationale: Imperative feminine singular from עבר. In this context, addressed to 'daughter of Tarshish,' the sense is not simple travel but unrestrained spreading across the land. 'Overflow' best fits the following simile 'like the Nile' and conveys the image of inundation.
- source_word: אַרְצֵךְ
  chosen: your land
  alternatives:
  - your country
  lexicon: HALOT
  rationale: ארץ with 2fs suffix naturally means 'your land.' 'Land' is the broad and standard rendering and fits the poetic address.
- source_word: כיאור
  chosen: like the Nile
  alternatives:
  - like a river
  - like the Nile River
  lexicon: HALOT
  rationale: יאר commonly refers to the Nile or Nile-channel in biblical Hebrew. Because the term often specifically evokes the Nile and the image is one of flooding, 'like the Nile' is preferable to the more generic 'like a river.'
- source_word: בת תרשיש
  chosen: daughter of Tarshish
  alternatives:
  - daughter Tarshish
  - people of Tarshish
  lexicon: HALOT
  rationale: The construct phrase is a common prophetic personification for a city or people. 'Daughter of Tarshish' preserves the metaphor and poetic force better than flattening it to 'people of Tarshish.'
- source_word: אין
  chosen: there is no
  alternatives:
  - there is not
  lexicon: HALOT
  rationale: Standard existential negation.
- source_word: מזח
  chosen: restraint
  alternatives:
  - harbor
  - girdle
  - barrier
  - mooring
  lexicon: HALOT
  rationale: מזח is rare and difficult. Proposed senses include something that binds, restrains, or secures. In context—Tarshish now free from Tyre's control or confinement—the broader sense 'restraint' best captures the line. More concrete options such as 'harbor' or 'mooring' are possible but less certain and more interpretively narrow.
- source_word: עוד
  chosen: anymore
  alternatives:
  - still
  - again
  lexicon: HALOT
  rationale: With the negation, עוד idiomatically means 'any longer/anymore,' indicating the cessation of prior restraint.
