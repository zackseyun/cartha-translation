  from: Overflow your land like the Nile
  to: Pass through your land like the Nile
  rationale: The Hebrew verb is `ʿābar` ('pass through/cross'), which is then modified by the simile 'like the Nile.' The draft's choice to render `ʿābar` as 'Overflow' makes the verb itself synonymous with the simile that follows, creating a slight redundancy ('Overflow... like the Nile'). This flattens the Hebrew construction of 'action + modifier.' A more formally accurate rendering like 'Pass through your land like the Nile' preserves the original's structure, where the simile explains the *manner* of the action, and avoids the awkwardness. This is also the primary alternative listed in the draft's own footnote.
