id: ISA.23.5
reference: Isaiah 23:5
source:
  edition: WLC
  text: כַּֽ/אֲשֶׁר שֵׁ֖מַע לְ/מִצְרָ֑יִם יָחִ֖ילוּ כְּ/שֵׁ֥מַע צֹֽר־׃
translation:
  text: When the report comes to Egypt, they will writhe at the report about Tyre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will be in anguish,' 'they will tremble,' or 'they will be pained'
      at the report about Tyre.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: When
  alternatives:
  - As
  - Just as
  lexicon: HALOT
  rationale: 'Introduces a temporal clause here: ''when'' the news is heard. ''As''
    is possible, but in context the sense is temporal rather than comparative.'
- source_word: שֵׁמַע
  chosen: the report comes
  alternatives:
  - the report is heard
  - the news comes
  lexicon: HALOT
  rationale: The noun means 'report, news, hearing.' English idiom favors expressing
    the arrival of news as 'the report comes' rather than the more wooden 'the hearing.'
    This also prepares for the implied ellipsis of a verb in the Hebrew clause.
- source_word: לְמִצְרַיִם
  chosen: to Egypt
  alternatives:
  - concerning Egypt
  lexicon: HALOT
  rationale: 'The preposition ל here is best taken as directional, indicating the
    destination of the report: it reaches Egypt. This fits the broader context of
    nations reacting to Tyre''s downfall.'
- source_word: יָחִילוּ
  chosen: they will writhe
  alternatives:
  - they will be in anguish
  - they will tremble
  - they will be pained
  lexicon: HALOT
  rationale: From חול in the Qal, conveying writhing, trembling, or being in labor-like
    anguish. 'Writhe' preserves the vivid bodily distress better than the flatter
    'be grieved' or 'be in pain,' while remaining natural English.
- source_word: כְּשֵׁמַע
  chosen: at the report
  alternatives:
  - when they hear
  - at the news
  lexicon: HALOT
  rationale: 'The preposition כ here introduces the occasion or trigger of the anguish:
    ''at/upon the report.'' Repeating ''report'' preserves the Hebrew parallelism
    with the first שֵׁמַע.'
- source_word: צֹר
  chosen: Tyre
  lexicon: HALOT
  rationale: Standard English transliteration of the place name צֹר.
