id: ISA.23.6
reference: Isaiah 23:6
source:
  edition: WLC
  text: עִבְר֖וּ תַּרְשִׁ֑ישָׁ/ה הֵילִ֖ילוּ יֹ֥שְׁבֵי אִֽי׃
translation:
  text: Cross over to Tarshish; wail, inhabitants of the coastland.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'island' for 'coastland'; the Hebrew term can refer to an island or a
      maritime coastland/region.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִבְרוּ
  chosen: Cross over
  alternatives:
  - Pass over
  - Cross
  lexicon: HALOT
  rationale: Imperative plural from עבר, here a command to go across/over, likely
    by sea or into exile/refuge. 'Cross over' preserves the movement sense without
    over-specifying destination mechanics.
- source_word: תַּרְשִׁישָׁה
  chosen: to Tarshish
  alternatives:
  - Tarshish-ward
  - toward Tarshish
  lexicon: HALOT
  rationale: Proper name with directional he, indicating motion toward Tarshish. English
    idiom is best captured by 'to Tarshish' rather than the more wooden 'Tarshish-ward.'
- source_word: הֵילִילוּ
  chosen: wail
  alternatives:
  - Howl
  - lament
  lexicon: HALOT
  rationale: Imperative plural from ילל, a cry of grief or distress. 'Wail' is natural
    modern English and retains the intensity of lament better than the more archaic
    'howl' in this prophetic context.
- source_word: יֹשְׁבֵי
  chosen: inhabitants of
  alternatives:
  - those who dwell in
  - dwellers of
  lexicon: HALOT
  rationale: Participle construct from ישב functioning substantivally. 'Inhabitants
    of' is idiomatic and clear in English.
- source_word: אִי
  chosen: the coastland
  alternatives:
  - the island
  - the coast
  lexicon: HALOT
  rationale: אִי can denote island or coastland/maritime region. In Isaiah's oracles
    it often refers broadly to coastal lands or maritime territories, not necessarily
    a single island. 'The coastland' best fits the Tyre/Tarshish maritime setting
    while preserving the singular collective sense.
