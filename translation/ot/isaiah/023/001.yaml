id: ISA.23.1
reference: Isaiah 23:1
source:
  edition: WLC
  text: מַשָּׂ֖א צֹ֑ר הֵילִ֣ילוּ אֳנִיּ֣וֹת תַּרְשִׁ֗ישׁ כִּֽי שֻׁדַּ֤ד מִ/בַּ֨יִת֙
    מִ/בּ֔וֹא מֵ/אֶ֥רֶץ כִּתִּ֖ים נִגְלָה לָֽ/מוֹ׀־־׃
translation:
  text: 'An oracle concerning Tyre: Wail, ships of Tarshish, for Tyre is destroyed,
    without house or harbor. From the land of Kittim it is revealed to them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without house or entry'; the Hebrew likely means that Tyre is so devastated
      that there is no house and no harbor/access left.
    reason: lexical_alternative
  - marker: b
    text: Kittim likely refers to Cyprus or nearby western coastlands.
    reason: cultural_note
lexical_decisions:
- source_word: מַשָּׂא
  chosen: oracle
  alternatives:
  - burden
  - pronouncement
  lexicon: HALOT
  rationale: In prophetic headings מַשָּׂא commonly introduces a prophetic utterance
    of judgment. 'Oracle' is standard, clear modern English and avoids the misleadingly
    literal 'burden' where the genre sense is primary.
- source_word: צֹר
  chosen: Tyre
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention per
    translation philosophy.
- source_word: הֵילִילוּ
  chosen: Wail
  alternatives:
  - Howl
  - Lament
  lexicon: HALOT
  rationale: Imperative plural calling for loud mourning. 'Wail' is vivid, natural
    English and fits the prophetic lament context better than the harsher 'Howl' for
    contemporary readers.
- source_word: אֳנִיּוֹת תַּרְשִׁישׁ
  chosen: ships of Tarshish
  alternatives:
  - ships to Tarshish
  - Tarshish ships
  lexicon: HALOT
  rationale: This expression can denote seagoing merchant ships associated with Tarshish,
    whether by destination, origin, or class. 'Ships of Tarshish' preserves the Hebrew
    construction and traditional geographic association without over-specifying.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the commanded wailing.
- source_word: שֻׁדַּד
  chosen: is destroyed
  alternatives:
  - is devastated
  - is laid waste
  lexicon: HALOT
  rationale: The passive conveys ruin by plunder/devastation. 'Is destroyed' is concise
    and idiomatic in English, while the following phrase supplies detail.
- source_word: מִבַּיִת
  chosen: without house
  alternatives:
  - from house
  - so that there is no house
  - from having a house
  lexicon: HALOT
  rationale: 'The preposition מִן here is best taken privatively in context: the city
    is ruined so that there is no house/home. This matches the parallel privative
    sense with the next term and yields coherent English.'
- source_word: מִבּוֹא
  chosen: or harbor
  alternatives:
  - or entrance
  - or entry
  - from entering
  lexicon: HALOT
  rationale: בּוֹא as a noun/infinitive in maritime context likely refers to a place
    or possibility of entry, i.e., harbor/access. 'Harbor' makes the sense explicit
    for modern readers in a verse about ships, while preserving the practical meaning
    of 'entry'.
- source_word: מֵאֶרֶץ כִּתִּים
  chosen: From the land of Kittim
  alternatives:
  - From the land of Cyprus
  - From Kittim
  lexicon: HALOT
  rationale: כִּתִּים refers historically to Kittim/Cyprus or western coastlands.
    The transliteration preserves the Hebrew ethnogeographic term without prematurely
    narrowing it; a footnote preserves 'Cyprus' as a likely referent.
- source_word: נִגְלָה לָמוֹ
  chosen: it is revealed to them
  alternatives:
  - the news is disclosed to them
  - it is made known to them
  lexicon: HALOT
  rationale: The passive of גלה here indicates that the report becomes known to the
    ships/merchants. 'It is revealed to them' is close to the Hebrew and sufficiently
    natural.
