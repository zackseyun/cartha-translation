id: ISA.23.2
reference: Isaiah 23:2
source:
  edition: WLC
  text: דֹּ֖מּוּ יֹ֣שְׁבֵי אִ֑י סֹחֵ֥ר צִיד֛וֹן עֹבֵ֥ר יָ֖ם מִלְאֽוּ/ךְ׃
translation:
  text: Be silent, inhabitants of the coastland; the merchant of Sidon, crossing the
    sea, has filled you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'island'; Hebrew אִי can refer to an island or a coastal region.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew may also be understood more economically: ''the merchant of Sidon,
      crossing the sea, supplied you'' or ''was your revenue.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: דֹּמּוּ
  chosen: Be silent
  alternatives:
  - Mourn silently
  - Be still
  lexicon: HALOT
  rationale: Qal imperative plural from דמם, here an address commanding stunned silence
    in response to judgment. 'Be silent' best captures the imperative force without
    overinterpreting it as mourning, though the context implies shock and lament.
- source_word: יֹשְׁבֵי
  chosen: inhabitants of
  alternatives:
  - those who dwell in
  - dwellers of
  lexicon: HALOT
  rationale: Construct participle of ישׁב used substantivally. 'Inhabitants of' is
    natural English and preserves the collective sense.
- source_word: אִי
  chosen: the coastland
  alternatives:
  - the island
  - the coast
  lexicon: HALOT
  rationale: אִי can denote island or coastland. In prophetic usage it often refers
    broadly to maritime/coastal regions rather than a literal island only. Singular
    with article-like force in English is rendered 'the coastland' to fit the Phoenician
    maritime setting.
- source_word: סֹחֵר
  chosen: the merchant
  alternatives:
  - trader
  - commerce of
  lexicon: HALOT
  rationale: Singular participle from סחר, functioning collectively or representatively.
    'Merchant' preserves the singular form and commercial nuance better than the more
    abstract 'commerce.'
- source_word: צִידוֹן
  chosen: Sidon
  rationale: Standard English transliteration of the place name.
- source_word: עֹבֵר יָם
  chosen: crossing the sea
  alternatives:
  - who crosses the sea
  - seafaring
  lexicon: HALOT
  rationale: Participle + object describing Sidon's merchant activity. 'Crossing the
    sea' keeps the participial, ongoing sense and maritime imagery.
- source_word: מִלְאֻךְ
  chosen: has filled you
  alternatives:
  - they filled you
  - was your revenue
  lexicon: HALOT
  rationale: From מלא with 2fs suffix, most naturally 'they/it filled you.' Given
    the singular collective subject 'merchant of Sidon,' English idiom allows 'has
    filled you.' The object 'you' is feminine singular, referring to the addressed
    coastland/city. Some interpreters take the sense economically ('was your supply/revenue'),
    but the verbal reading is more straightforward from the form.
