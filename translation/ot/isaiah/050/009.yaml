id: ISA.50.9
reference: Isaiah 50:9
source:
  edition: WLC
  text: הֵ֣ן אֲדֹנָ֤/י יְהוִה֙ יַֽעֲזָר לִ֔/י מִי ה֖וּא יַרְשִׁיעֵ֑/נִי הֵ֤ן כֻּלָּ/ם֙
    כַּ/בֶּ֣גֶד יִבְל֔וּ עָ֖שׁ יֹאכְלֵֽ/ם־־׃
translation:
  text: Behold, the Lord GOD helps me; who is he who will declare me guilty? Behold,
    all of them will wear out like a garment; a moth will eat them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who will condemn me?' The Hebrew verb is forensic, meaning to declare
      someone guilty or condemn in judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Behold
  alternatives:
  - See
  - Look
  lexicon: HALOT
  rationale: Discourse particle marking emphatic attention. 'Behold' preserves the
    prophetic, solemn force better than flatter modern options, while remaining intelligible.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound title combines אֲדֹנָי with the divine name YHWH. Per doctrine,
    יְהוָה is rendered 'the LORD'; in the conventional English handling of the compound,
    'Lord GOD' avoids 'Lord LORD' and preserves both elements of the title.
- source_word: יַעֲזָר לִי
  chosen: helps me
  alternatives:
  - will help me
  - comes to my aid
  lexicon: HALOT
  rationale: Qal imperfect of עזר can be rendered present or future in context. Here
    a present sense fits the servant's confident declaration of ongoing divine support,
    while still carrying a near-future force in English.
- source_word: מִי הוּא
  chosen: who is he
  alternatives:
  - who
  - who then is he
  lexicon: HALOT
  rationale: Retains the explicit pronoun for rhetorical emphasis rather than smoothing
    it away entirely.
- source_word: יַרְשִׁיעֵנִי
  chosen: will declare me guilty
  alternatives:
  - will condemn me
  - will pronounce me wicked
  lexicon: HALOT
  rationale: Hiphil of רשע means to declare someone guilty or condemn in a forensic
    sense. 'Declare me guilty' makes the judicial nuance explicit; 'condemn me' is
    a valid alternative but slightly broader in English.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - they all
  - all of them
  lexicon: HALOT
  rationale: Preserves the comprehensive scope of the opponents addressed in the rhetorical
    challenge.
- source_word: כַּבֶּגֶד
  chosen: like a garment
  alternatives:
  - like clothing
  - like a worn garment
  lexicon: HALOT
  rationale: Straightforward simile; 'garment' is natural and preserves the singular
    Hebrew image.
- source_word: יִבְלוּ
  chosen: will wear out
  alternatives:
  - will become worn out
  - will decay
  lexicon: HALOT
  rationale: Conveys the image of gradual deterioration appropriate to clothing. 'Wear
    out' is idiomatic and concrete.
- source_word: עָשׁ
  chosen: a moth
  alternatives:
  - moth
  lexicon: HALOT
  rationale: The singular noun functions generically; English idiom naturally uses
    the article here.
- source_word: יֹאכְלֵם
  chosen: will eat them
  alternatives:
  - will consume them
  - will devour them
  lexicon: HALOT
  rationale: Keeps the vivid, literal image tied to the garment metaphor. 'Consume'
    is possible but less concrete.
