theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine specifies the default rendering of יְהוָה as 'the LORD.'
    In the fixed compound אֲדֹנָי יְהוִה, English convention renders the title as
    'Lord GOD' to preserve both components without the awkward 'Lord LORD.' This is
    a translation convention rooted in the source expression, not a theological reinterpretation.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → ''the LORD'''
