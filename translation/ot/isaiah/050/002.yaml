theological_decisions:
- issue: Anthropomorphic expression of divine ability in 'my hand'
  chosen_reading: Retained the metaphor 'my hand' rather than interpreting it abstractly
    as mere 'power' in the first clause.
  alternative_readings:
  - Is my power too limited to redeem
  rationale: The Hebrew uses embodied imagery for God's effective power. Preserving
    the metaphor maintains the rhetorical force and canonical resonance, while the
    following clause already explicates the sense in terms of power.
  doctrine_reference: Translation philosophy §1, §3
- issue: Gendered term אִישׁ
  chosen_reading: Rendered as 'man' in 'was there no man?'
  alternative_readings:
  - was there no one?
  rationale: The source uses the masculine singular noun אִישׁ. Per the gender-accurate
    policy, the translation keeps 'man' rather than neutralizing it, while the next
    clause naturally broadens to 'no one answering.'
  doctrine_reference: Translation philosophy §4
