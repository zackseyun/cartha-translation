id: ISA.50.2
reference: Isaiah 50:2
source:
  edition: WLC
  text: מַדּ֨וּעַ בָּ֜אתִי וְ/אֵ֣ין אִ֗ישׁ קָרָֽאתִי֮ וְ/אֵ֣ין עוֹנֶה֒ הֲ/קָצ֨וֹר
    קָצְרָ֤ה יָדִ/י֙ מִ/פְּד֔וּת וְ/אִם אֵֽין בִּ֥/י כֹ֖חַ לְ/הַצִּ֑יל הֵ֣ן בְּ/גַעֲרָתִ֞/י
    אַחֲרִ֣יב יָ֗ם אָשִׂ֤ים נְהָרוֹת֙ מִדְבָּ֔ר תִּבְאַ֤שׁ דְּגָתָ/ם֙ מֵ/אֵ֣ין מַ֔יִם
    וְ/תָמֹ֖ת בַּ/צָּמָֽא־־׃
translation:
  text: Why, when I came, was there no man? When I called, was there no one answering?
    Is my hand really too short to redeem, or is there no power in me to deliver?
    Look, by my rebuke I dry up the sea; I make rivers a wilderness; their fish stink
    for lack of water and die of thirst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was there no one?' Hebrew 'no man' (אִישׁ), a masculine singular form
      used here in a representative sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'Has my hand become too short for redemption?' The Hebrew preserves the
      metaphor of a 'shortened hand' for inability.
    reason: lexical_alternative
  - marker: c
    text: '''Deliver'' could also be rendered ''save'' or ''rescue.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - Why is it that
  - For what reason
  lexicon: HALOT
  rationale: Introduces a rhetorical question of complaint/inquiry. Simple 'Why' preserves
    the force without over-expanding.
- source_word: בָּאתִי
  chosen: I came
  alternatives:
  - I arrived
  lexicon: HALOT
  rationale: Qal perfect 1cs of בוא, straightforward past action. 'Came' is idiomatic
    and fits the rhetorical sequence.
- source_word: וְאֵין אִישׁ
  chosen: was there no man
  alternatives:
  - there was no one
  - there was no person
  lexicon: HALOT
  rationale: Retains the singular אִישׁ with gender-accurate 'man' per translation
    philosophy. The phrase is existential, so English supplies 'was there.'
- source_word: קָרָאתִי
  chosen: I called
  alternatives:
  - I summoned
  - I cried out
  lexicon: HALOT
  rationale: Common verb for calling out/summoning. 'Called' is broad enough to preserve
    the ambiguity of appeal and summons.
- source_word: וְאֵין עוֹנֶה
  chosen: was there no one answering
  alternatives:
  - and no one answered
  - and there was no answerer
  lexicon: HALOT
  rationale: The participle עוֹנֶה denotes an answering respondent. Rendering with
    progressive 'answering' reflects the participial nuance better than a simple finite
    past, while remaining natural English.
- source_word: הֲקָצוֹר קָצְרָה יָדִי
  chosen: Is my hand really too short
  alternatives:
  - Has my hand become too short
  - Is my hand shortened
  lexicon: HALOT
  rationale: Hebrew idiom for inability or insufficiency. 'Too short' preserves the
    metaphor; 'really' reflects the interrogative's emphatic/rhetorical force without
    adding content.
- source_word: מִפְּדוּת
  chosen: to redeem
  alternatives:
  - for redemption
  - to ransom
  lexicon: HALOT
  rationale: The noun פדות denotes redemption/ransom. In English, after 'too short,'
    an infinitival sense ('to redeem') is the most natural equivalent and preserves
    the salvific nuance.
- source_word: וְאִם אֵין בִּי כֹחַ לְהַצִּיל
  chosen: or is there no power in me to deliver
  alternatives:
  - or do I have no strength to save
  - or is there no power in me to rescue
  lexicon: HALOT
  rationale: כֹחַ is 'power/strength'; הציל is 'deliver/rescue/save.' 'Deliver' avoids
    flattening the term into exclusively spiritual 'save' while preserving broad rescue
    language.
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Surely
  lexicon: HALOT
  rationale: Deictic particle drawing attention to proof of divine power. 'Look' is
    readable modern English; 'Behold' would be overly archaic.
- source_word: בְּגַעֲרָתִי
  chosen: by my rebuke
  alternatives:
  - with my rebuke
  - at my rebuke
  lexicon: HALOT
  rationale: גערה is a forceful rebuke/reproof. 'By my rebuke' expresses instrumentality
    and matches the following acts of judgment.
- source_word: אַחֲרִיב יָם
  chosen: I dry up the sea
  alternatives:
  - I lay waste the sea
  - I make the sea desolate
  lexicon: HALOT
  rationale: Hiphil of חרב can mean make dry/lay waste. In context with rivers becoming
    wilderness and fish dying for lack of water, 'dry up' best captures the hydrological
    image.
- source_word: אָשִׂים נְהָרוֹת מִדְבָּר
  chosen: I make rivers a wilderness
  alternatives:
  - I turn rivers into a desert
  - I make rivers into wasteland
  lexicon: HALOT
  rationale: שים plus double accusative expresses transformation. 'Make rivers a wilderness'
    is concise and close to the Hebrew image.
- source_word: תִּבְאַשׁ דְּגָתָם
  chosen: their fish stink
  alternatives:
  - their fish become foul
  - their fish rot
  lexicon: HALOT
  rationale: באש means stink/smell bad. 'Stink' is vivid and direct, matching prophetic
    diction.
- source_word: מֵאֵין מַיִם
  chosen: for lack of water
  alternatives:
  - because there is no water
  - from there being no water
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the privative construction, preserving
    causal sense.
- source_word: וְתָמֹת בַּצָּמָא
  chosen: and die of thirst
  alternatives:
  - and perish in thirst
  - and die from thirst
  lexicon: HALOT
  rationale: Natural English rendering of the verb plus prepositional phrase; preserves
    the concrete image of death caused by drought.
