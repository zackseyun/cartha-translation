id: ISA.50.8
reference: Isaiah 50:8
source:
  edition: WLC
  text: קָרוֹב֙ מַצְדִּיקִ֔/י מִֽי יָרִ֥יב אִתִּ֖/י נַ֣עַמְדָה יָּ֑חַד מִֽי בַ֥עַל
    מִשְׁפָּטִ֖/י יִגַּ֥שׁ אֵלָֽ/י־־׃
translation:
  text: Near is the one who vindicates me; who will contend with me? Let us stand
    together. Who is the master of my case? Let him come near to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who justifies me' or 'the one who declares me righteous.' The
      Hebrew verb is forensic in this context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the master/owner of my case,' that is, the one pressing a legal
      claim against me.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרוֹב
  chosen: Near is
  alternatives:
  - He is near
  - The one ... is near
  lexicon: HALOT
  rationale: Predicate adjective placed first for emphasis. Rendering it as 'Near
    is' preserves the Hebrew fronting and the terse courtroom tone better than smoothing
    immediately to 'He is near.'
- source_word: מַצְדִּיקִי
  chosen: the one who vindicates me
  alternatives:
  - he who justifies me
  - the one who declares me righteous
  lexicon: HALOT
  rationale: From צדק in the Hiphil, here in a forensic context. 'Vindicates' communicates
    legal acquittal/public rightness in natural English. 'Justifies' is possible but
    in contemporary English can sound overly technical or Pauline in a way not required
    by this Hebrew context.
- source_word: יָרִיב אִתִּי
  chosen: will contend with me
  alternatives:
  - will dispute with me
  - will bring a case against me
  lexicon: HALOT
  rationale: ריב commonly carries legal-dispute nuance. 'Contend with me' preserves
    both adversarial and juridical force without over-specifying procedure.
- source_word: נַעַמְדָה יָּחַד
  chosen: Let us stand together
  alternatives:
  - Let us take our stand together
  - Let us stand up together
  lexicon: HALOT
  rationale: Cohortative first person plural invites a joint appearance, likely in
    court. 'Stand together' is concise and preserves the challenge tone.
- source_word: בַעַל מִשְׁפָּטִי
  chosen: the master of my case
  alternatives:
  - my accuser
  - the owner of my cause
  - the adversary in my lawsuit
  lexicon: HALOT
  rationale: Literally 'owner/master of my משפט.' The phrase denotes the party possessing
    or pressing a legal claim. 'Master of my case' keeps the Hebrew metaphor more
    transparently than the interpretive 'accuser,' while still signaling legal context
    through 'case.'
- source_word: יִגַּשׁ אֵלַי
  chosen: Let him come near to me
  alternatives:
  - Let him approach me
  - Let him draw near to me
  lexicon: HALOT
  rationale: A jussive-like challenge following the rhetorical question. 'Come near'
    echoes the opening קָרוֹב and preserves the confrontational courtroom summons.
