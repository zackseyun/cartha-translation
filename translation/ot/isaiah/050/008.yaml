theological_decisions:
- issue: Forensic versus moral rendering of מַצְדִּיקִי
  chosen_reading: forensic 'vindicates me'
  alternative_readings:
  - moral 'makes me righteous'
  - technical 'justifies me'
  rationale: 'The surrounding language is explicitly juridical: contending, standing
    together, and a legal case. Therefore the verb is best rendered in legal-forensic
    terms rather than as inward moral transformation. This preserves the text''s courtroom
    imagery without importing later doctrinal formulations.'
  doctrine_reference: Translation philosophy items 1, 3, and 6
