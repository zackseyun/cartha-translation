id: ISA.50.6
reference: Isaiah 50:6
source:
  edition: WLC
  text: גֵּוִ/י֙ נָתַ֣תִּי לְ/מַכִּ֔ים וּ/לְחָיַ֖/י לְ/מֹֽרְטִ֑ים פָּנַ/י֙ לֹ֣א הִסְתַּ֔רְתִּי
    מִ/כְּלִמּ֖וֹת וָ/רֹֽק׃
translation:
  text: I gave my back to those who strike, and my cheeks to those who pull out the
    beard; I did not hide my face from disgrace and spitting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to those who pluck out hair'; the Hebrew does not explicitly state 'the
      beard,' though that is the most likely implied object in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֵּוִי
  chosen: my back
  alternatives:
  - my body
  - my torso
  lexicon: HALOT
  rationale: גֵּו can denote the back/body. In this context of beating, 'my back'
    is the most natural and specific English rendering.
- source_word: נָתַתִּי
  chosen: I gave
  alternatives:
  - I offered
  - I yielded
  lexicon: HALOT
  rationale: נתן is the standard verb 'give.' 'I gave' preserves the directness of
    the Hebrew and the voluntary nuance in context without over-interpreting.
- source_word: לְמַכִּים
  chosen: to those who strike
  alternatives:
  - to strikers
  - to those who beat
  lexicon: HALOT
  rationale: From נכה in a participial form, referring to people inflicting blows.
    'Those who strike' is clear, natural, and close to the Hebrew.
- source_word: וּלְחָיַי
  chosen: and my cheeks
  alternatives:
  - and my jaw
  - and my face
  lexicon: HALOT
  rationale: לְחִי refers specifically to the cheek/jaw area. 'Cheeks' fits the plural-like
    possessive sense in English and matches the humiliation imagery.
- source_word: לְמֹרְטִים
  chosen: to those who pull out the beard
  alternatives:
  - to those who pluck
  - to those who tear out hair
  lexicon: HALOT
  rationale: מרט means to pull out/pluck off, often hair. Because the object is implicit
    after 'my cheeks,' English benefits from making explicit the likely sense 'the
    beard,' a common idiomatic understanding of the gesture of abuse.
- source_word: פָּנַי
  chosen: my face
  lexicon: HALOT
  rationale: Straightforward rendering of פנים with first-person suffix.
- source_word: לֹא הִסְתַּרְתִּי
  chosen: I did not hide
  alternatives:
  - I did not conceal
  - I did not turn away
  lexicon: HALOT
  rationale: סתר in the hiphil means to hide/conceal. 'I did not hide' preserves the
    verbal parallel with the physical abuse described.
- source_word: מִכְּלִמּוֹת
  chosen: from disgrace
  alternatives:
  - from humiliation
  - from insults
  lexicon: HALOT
  rationale: כלמה denotes shame, humiliation, disgrace. 'Disgrace' captures both the
    social shame and abusive treatment in a concise way.
- source_word: וָרֹק
  chosen: and spitting
  alternatives:
  - and spit
  lexicon: HALOT
  rationale: רֹק is 'spittle/spit.' In the construction 'from disgrace and spitting,'
    the verbal noun 'spitting' reads more naturally in English while preserving the
    concrete insult.
