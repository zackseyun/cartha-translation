theological_decisions:
- issue: Whether to make the messianic/servant-Christological application explicit
    in the translation
  chosen_reading: Keep the wording at the level of the Hebrew speaker without importing
    an explicit reference to the Messiah or to Jesus.
  alternative_readings:
  - Translate in a way that foregrounds Jesus' passion fulfillment
  rationale: Isaiah 50:6 is used christologically in the New Testament and Christian
    tradition, but the verse itself speaks in the first person as the servant. Per
    translation philosophy, doctrinal interpretation should not be imported into the
    main text beyond what the Hebrew states.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
