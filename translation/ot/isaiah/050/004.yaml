id: ISA.50.4
reference: Isaiah 50:4
source:
  edition: WLC
  text: אֲדֹנָ֣/י יְהֹוִ֗ה נָ֤תַן לִ/י֙ לְשׁ֣וֹן לִמּוּדִ֔ים לָ/דַ֛עַת לָ/ע֥וּת אֶת יָעֵ֖ף דָּבָ֑ר יָעִ֣יר בַּ/בֹּ֣קֶר בַּ/בֹּ֗קֶר יָעִ֥יר לִ/י֙ אֹ֔זֶן לִ/שְׁמֹ֖עַ כַּ/לִּמּוּדִֽים־׀׃
translation:
  text: The Lord GOD has given me the tongue of those who are taught, that I may know how to sustain the weary with a word. Morning by morning he awakens; he awakens my ear to hear like those who are taught.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tongue of disciples' / 'the tongue of the instructed.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb rendered 'sustain' is difficult; it may also be understood as 'help' or, less likely, 'answer' the weary with a word.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'Lord GOD' represents the title אֲדֹנָי together with the divine name YHWH.
    reason: cultural_note
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: The Lord GOD
  alternatives:
  - the Lord GOD
  - Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound title combines אֲדֹנָי with the divine name YHWH. Per doctrine, יְהוָה is rendered 'the LORD'; in the fixed Hebrew expression אֲדֹנָי יְהוִה, standard English convention avoids 'Lord LORD' by rendering 'Lord GOD,' preserving both elements while remaining readable.
- source_word: לְשׁוֹן
  chosen: tongue
  alternatives:
  - speech
  - language
  lexicon: HALOT
  rationale: Literal 'tongue' is retained because the Hebrew metaphor naturally refers to the faculty of speech and is idiomatic in English.
- source_word: לִמּוּדִים
  chosen: those who are taught
  alternatives:
  - disciples
  - learned ones
  - the instructed
  lexicon: HALOT
  rationale: The passive/adjectival sense points to people who have been taught or instructed. 'Those who are taught' preserves the participial nuance better than the more interpretive 'disciples' or the potentially misleading 'learned'.
- source_word: לָדַעַת
  chosen: that I may know
  alternatives:
  - to know
  lexicon: HALOT
  rationale: The infinitive expresses purpose following 'has given me'; English idiom is best captured with 'that I may know' rather than a bare infinitive.
- source_word: לָעוּת
  chosen: how to sustain
  alternatives:
  - how to help
  - how to answer
  - how to encourage
  lexicon: HALOT
  rationale: The verb here is difficult, but in context it most plausibly conveys giving effective support or aid to the weary. 'Sustain' fits the servant-song context and the object 'the weary' better than 'answer,' while avoiding over-paraphrase.
- source_word: יָעֵף
  chosen: the weary
  alternatives:
  - the exhausted
  - the faint
  lexicon: HALOT
  rationale: A straightforward rendering of the adjective as a substantive. 'The weary' is natural English and preserves the broad sense of fatigue or discouragement.
- source_word: דָּבָר
  chosen: with a word
  alternatives:
  - a word
  - by a word
  - a message
  lexicon: HALOT
  rationale: 'The noun commonly means ''word'' or ''matter.'' Here ''with a word'' best expresses the instrumental sense in context: sustaining the weary through speech.'
- source_word: יָעִיר
  chosen: awakens
  alternatives:
  - rouses
  - stirs up
  lexicon: HALOT
  rationale: The Hiphil of עור means to awaken or rouse. 'Awakens' is simple, vivid, and fits both repeated clauses.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  chosen: Morning by morning
  alternatives:
  - every morning
  - morning after morning
  lexicon: HALOT
  rationale: The repetition conveys regularity and ongoing action. 'Morning by morning' preserves the Hebrew rhythm and emphasis.
- source_word: אֹזֶן
  chosen: my ear
  alternatives:
  - an ear
  lexicon: HALOT
  rationale: Although Hebrew lacks the explicit possessive on 'ear,' the dative 'to me' and context strongly imply 'my ear.' English requires the possessive for natural sense.
- source_word: לִשְׁמֹעַ
  chosen: to hear
  alternatives:
  - to listen
  lexicon: HALOT
  rationale: The basic sense is 'to hear.' 'Listen' would add a nuance of attentiveness not explicit in the verb itself, though context implies receptivity.
- source_word: כַּלִּמּוּדִים
  chosen: like those who are taught
  alternatives:
  - like disciples
  - as the instructed
  lexicon: HALOT
  rationale: 'The comparison resumes the earlier לִמּוּדִים. Rendering both consistently preserves the verse''s parallelism: the servant speaks and hears as one taught by God.'
