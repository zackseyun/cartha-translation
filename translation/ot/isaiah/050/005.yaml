id: ISA.50.5
reference: Isaiah 50:5
source:
  edition: WLC
  text: אֲדֹנָ֤/י יְהוִה֙ פָּתַֽח לִ֣/י אֹ֔זֶן וְ/אָנֹכִ֖י לֹ֣א מָרִ֑יתִי אָח֖וֹר
    לֹ֥א נְסוּגֹֽתִי־׃
translation:
  text: The Lord GOD has opened my ear, and I was not rebellious; I did not turn back.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I did not draw back.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: The Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound title אֲדֹנָי יְהוִה is conventionally distinguished in
    English as 'Lord GOD' to avoid 'Lord LORD' when יְהוָה is rendered 'the LORD'
    per doctrine. This preserves both elements of the Hebrew title while following
    the project's default rendering of YHWH as 'the LORD' in a form natural for this
    compound.
- source_word: פָּתַח
  chosen: has opened
  alternatives:
  - opened
  lexicon: HALOT
  rationale: Qal perfect 3ms, 'opened.' English present perfect is natural here in
    context, expressing a completed act with present relevance in the servant's testimony.
- source_word: לִי אֹזֶן
  chosen: my ear
  alternatives:
  - an ear for me
  - my ear
  lexicon: HALOT
  rationale: Literally 'for me an ear.' English idiom prefers 'my ear.' Singular is
    retained, matching the Hebrew and preserving the concrete image rather than abstracting
    to 'he has made me listen.'
- source_word: מָרִיתִי
  chosen: was not rebellious
  alternatives:
  - did not rebel
  - did not resist
  lexicon: HALOT
  rationale: From מרה, 'to be rebellious/rebel.' 'Was not rebellious' captures the
    stative/adjectival force naturally in English and fits the contrast with the following
    clause. 'Did not rebel' is possible but slightly less reflective of the Hebrew
    nuance.
- source_word: אָחוֹר
  chosen: back
  alternatives:
  - backward
  - to the rear
  lexicon: HALOT
  rationale: The noun/adverb means 'back/backward.' In idiomatic English with the
    following verb, 'turn back' best conveys the sense.
- source_word: נְסוּגֹתִי
  chosen: did not turn back
  alternatives:
  - did not draw back
  - did not retreat
  lexicon: HALOT
  rationale: From סוג, 'to move back, turn back, retreat.' 'Turn back' fits the collocation
    with אָחוֹר and preserves the metaphor of refusing to shrink away from the commission.
    'Draw back' is a viable lexical alternative worth preserving in a footnote.
