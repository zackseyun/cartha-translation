theological_decisions:
- issue: Rendering the divine name within the compound title אֲדֹנָי יְהוִה
  chosen_reading: The Lord GOD
  alternative_readings:
  - the Lord Yahweh
  rationale: The doctrine excerpt specifies יְהוָה → 'the LORD.' In the compound אֲדֹנָי
    יְהוִה, standard English practice uses 'Lord GOD' to represent both title and
    divine name without the awkward 'Lord LORD.' This is a translation-form decision,
    not a theological reinterpretation.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → ''the LORD'''
