id: ISA.50.3
reference: Isaiah 50:3
source:
  edition: WLC
  text: אַלְבִּ֥ישׁ שָׁמַ֖יִם קַדְר֑וּת וְ/שַׂ֖ק אָשִׂ֥ים כְּסוּתָֽ/ם׃ס
translation:
  text: I clothe the heavens with darkness, and I make sackcloth their covering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blackness' or 'gloom' for 'darkness.'
    reason: lexical_alternative
  - marker: b
    text: Sackcloth was a coarse fabric associated with mourning and lament.
    reason: cultural_note
lexical_decisions:
- source_word: אַלְבִּישׁ
  chosen: I clothe
  alternatives:
  - I dress
  lexicon: HALOT
  rationale: Hiphil of לבשׁ means to cause to be clothed or to clothe. 'I clothe'
    is natural English and preserves the causative sense better than the slightly
    less idiomatic 'I dress' in this context.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: The plural form commonly denotes the heavens/sky. 'The heavens' preserves
    the Hebrew plural and the elevated poetic register of Isaiah better than the flatter
    'the sky.'
- source_word: קַדְרוּת
  chosen: darkness
  alternatives:
  - blackness
  - gloom
  lexicon: HALOT
  rationale: The noun denotes darkening, gloom, or blackness. 'Darkness' is clear
    modern English and fits the image of cosmic judgment or mourning; 'blackness'
    is possible but less idiomatic here.
- source_word: וְשַׂק
  chosen: and sackcloth
  alternatives:
  - and coarse cloth
  lexicon: HALOT
  rationale: שַׂק is the standard term for sackcloth, often associated with mourning.
    Retaining 'sackcloth' preserves the cultural and biblical resonance of the image.
- source_word: אָשִׂים
  chosen: I make
  alternatives:
  - I set
  - I place
  lexicon: HALOT
  rationale: The verb שׂים broadly means to put, set, or make. In the construction
    with 'their covering,' 'I make' yields the most natural English while preserving
    the sense that sackcloth becomes the heavens' covering.
- source_word: כְּסוּתָם
  chosen: their covering
  alternatives:
  - their garment
  - their cloak
  lexicon: HALOT
  rationale: The noun means covering or garment. 'Their covering' best matches the
    poetic parallelism with 'I clothe the heavens' and avoids over-specifying the
    metaphor.
