theological_decisions:
- issue: Cosmic imagery of judgment/mourning
  chosen_reading: Render the verse as a divine declaration of power to darken the
    heavens and cover them with sackcloth, preserving the poetic imagery without over-interpreting
    it as exclusively literal or metaphorical.
  alternative_readings:
  - Primarily literal cosmic darkening
  - Primarily metaphorical language of mourning/judgment
  rationale: The Hebrew presents vivid poetic imagery that can evoke both cosmic disturbance
    and mourning symbolism. The translation should preserve that tension rather than
    narrow it to one interpretive option.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
