id: ISA.50.11
reference: Isaiah 50:11
source:
  edition: WLC
  text: הֵ֧ן כֻּלְּ/כֶ֛ם קֹ֥דְחֵי אֵ֖שׁ מְאַזְּרֵ֣י זִיק֑וֹת לְכ֣וּ בְּ/א֣וּר אֶשְׁ/כֶ֗ם
    וּ/בְ/זִיקוֹת֙ בִּֽעַרְתֶּ֔ם מִ/יָּדִ/י֙ הָיְתָה זֹּ֣את לָ/כֶ֔ם לְ/מַעֲצֵבָ֖ה
    תִּשְׁכָּבֽוּ/ן׀־׃פ
translation:
  text: 'Look, all of you who kindle a fire, who gird yourselves with burning arrows:
    walk in the light of your fire and among the arrows you have set ablaze. This
    has come to you from my hand: you will lie down in torment.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sparks' (also possibly 'firebrands' or 'flaming darts') for 'burning
      arrows.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you will lie down in sorrow' or 'in anguish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection introducing a pointed declaration. 'Look' is natural
    modern English and preserves the force better than archaic 'Behold.'
- source_word: קֹדְחֵי אֵשׁ
  chosen: who kindle a fire
  alternatives:
  - who ignite fire
  - who burn with fire
  lexicon: HALOT
  rationale: The participle from קדח here is best taken actively of kindling/igniting,
    parallel to the next participle. Singular 'a fire' is retained from the Hebrew.
- source_word: מְאַזְּרֵי
  chosen: who gird yourselves with
  alternatives:
  - who equip yourselves with
  - who surround yourselves with
  lexicon: HALOT
  rationale: 'From אזר, ''to gird.'' The reflexive sense fits the participial construction:
    they arm or belt themselves with what follows. ''Gird yourselves with'' preserves
    the metaphor while remaining understandable.'
- source_word: זִיקוֹת
  chosen: burning arrows
  alternatives:
  - sparks
  - firebrands
  - flaming darts
  lexicon: HALOT
  rationale: זיקות can denote sparks, but in this context with 'gird yourselves with'
    and later 'among the זיקות you have set ablaze,' a more weapon-like image is plausible
    and coherent. 'Burning arrows' captures the hostile/self-made instruments imagery.
    Because 'sparks' is a major alternative in translation tradition, it is preserved
    in a footnote.
- source_word: לְכוּ
  chosen: walk
  alternatives:
  - go
  lexicon: HALOT
  rationale: Imperative of הלך. 'Walk' works idiomatically with 'in the light of your
    fire' and preserves the taunting/judicial force better than the more neutral 'go.'
- source_word: בְּאוּר אֶשְׁכֶם
  chosen: in the light of your fire
  alternatives:
  - by the light of your fire
  - in the blaze of your fire
  lexicon: HALOT
  rationale: אוּר is 'light/flame.' 'In the light of your fire' is the most straightforward
    rendering and preserves the irony of relying on self-made illumination.
- source_word: וּבְזִיקוֹת בִּעַרְתֶּם
  chosen: and among the arrows you have set ablaze
  alternatives:
  - and among the sparks you have kindled
  - and in the firebrands you have ignited
  lexicon: HALOT
  rationale: בִּעַרְתֶּם clearly means 'you burned/kindled/set ablaze.' Rendering
    the preposition with 'among' gives a natural sense of moving within what they
    themselves have ignited. The lexical choice follows the earlier decision on זיקות
    while preserving 'sparks' as an alternative in a footnote.
- source_word: מִיָּדִי
  chosen: from my hand
  alternatives:
  - from me
  lexicon: HALOT
  rationale: The idiom 'from my hand' should be retained because it conveys direct
    divine agency/judgment more vividly than a flattened 'from me.'
- source_word: לְמַעֲצֵבָה
  chosen: in torment
  alternatives:
  - in pain
  - in sorrow
  - in anguish
  lexicon: HALOT
  rationale: The noun denotes pain/distress. In context of judicial consequence ('you
    will lie down...'), 'in torment' best conveys severe suffering without over-paraphrasing.
    Because 'sorrow/anguish' are viable alternatives, they are preserved in a footnote.
- source_word: תִּשְׁכָּבוּן
  chosen: you will lie down
  alternatives:
  - you shall lie down
  lexicon: HALOT
  rationale: Simple future sense of שכב. 'Lie down' is literal and preserves the image
    of ending in a state of imposed suffering.
