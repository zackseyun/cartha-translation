theological_decisions:
- issue: Tone of the imperatives 'walk in the light of your fire'
  chosen_reading: A judicial/ironic challenge announcing divine judgment on self-reliance
    and hostile schemes
  alternative_readings:
  - A neutral invitation to continue in their chosen course
  rationale: The surrounding clause 'This has come to you from my hand' and the concluding
    threat 'you will lie down in torment' show that the imperative is not commendation
    but irony under judgment.
- issue: Speaker implied by 'my hand'
  chosen_reading: The speaker is God, whose hand brings the announced consequence
  rationale: Within Isaiah's prophetic discourse, 'from my hand' identifies the consequence
    as divine judgment. The translation preserves this without expanding beyond the
    text.
