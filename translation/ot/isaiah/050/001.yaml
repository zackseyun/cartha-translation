id: ISA.50.1
reference: Isaiah 50:1
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה אֵ֣י זֶ֠ה סֵ֣פֶר כְּרִית֤וּת אִמְּ/כֶם֙ אֲשֶׁ֣ר שִׁלַּחְתִּ֔י/הָ
    א֚וֹ מִ֣י מִ/נּוֹשַׁ֔/י אֲשֶׁר מָכַ֥רְתִּי אֶתְ/כֶ֖ם ל֑/וֹ הֵ֤ן בַּ/עֲוֺנֹֽתֵי/כֶם֙
    נִמְכַּרְתֶּ֔ם וּ/בְ/פִשְׁעֵי/כֶ֖ם שֻׁלְּחָ֥ה אִמְּ/כֶֽם׀־׃
translation:
  text: 'Thus says the LORD: Where is your mother''s certificate of divorce, with
    which I sent her away? Or which of my creditors is it to whom I sold you? Look,
    you were sold because of your iniquities, and your mother was sent away because
    of your transgressions.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bill of divorce.' The Hebrew refers to a formal legal document of divorce.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'your mother' is a corporate metaphor for Zion/Jerusalem or the
      covenant people represented as a mother.
    reason: cultural_note
  - marker: c
    text: Or 'your mother was divorced.' The Hebrew verb is literally 'was sent away,'
      matching the divorce imagery of the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal sense while matching established English Bible convention.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' is concise, natural,
    and preserves the formal prophetic register.
- source_word: אֵי זֶה
  chosen: Where is
  alternatives:
  - What is this
  - Where then is
  lexicon: HALOT
  rationale: 'Idiomatic interrogative introducing a challenge: the speaker asks for
    the supposed document if such a divorce had actually occurred.'
- source_word: סֵפֶר כְּרִיתוּת
  chosen: certificate of divorce
  alternatives:
  - bill of divorce
  - scroll of cutting off
  lexicon: HALOT
  rationale: Refers to a formal divorce document. 'Certificate of divorce' is clear
    modern English and preserves the legal sense better than the archaic 'bill of
    divorce.'
- source_word: אִמְּכֶם
  chosen: your mother
  lexicon: HALOT
  rationale: Literal rendering. In context this is a corporate metaphor for Zion/Jerusalem
    or the covenant people represented as a mother.
- source_word: אֲשֶׁר שִׁלַּחְתִּיהָ
  chosen: with which I sent her away
  alternatives:
  - whom I divorced
  - that I used to send her away
  lexicon: HALOT
  rationale: The verb שׁלח in divorce contexts can mean 'send away.' Rendering it
    this way preserves the legal-marital imagery already established by 'certificate
    of divorce' without over-translating the verb itself as 'divorced.'
- source_word: מִנּוֹשַׁי
  chosen: my creditors
  alternatives:
  - those to whom I owe
  - my lenders
  lexicon: HALOT
  rationale: The noun denotes a creditor or one to whom a debt is owed. Plural with
    first-person suffix is best rendered 'my creditors.'
- source_word: אֲשֶׁר מָכַרְתִּי אֶתְכֶם לוֹ
  chosen: is it to whom I sold you
  alternatives:
  - did I sell you to him
  - to whom I have sold you
  lexicon: HALOT
  rationale: 'The clause is rhetorical: God denies having sold Israel to satisfy a
    debt. The chosen wording keeps the interrogative force and the singular referent
    after the plural collective ''creditors'' (''which of my creditors is it to whom...'').'
- source_word: הֵן
  chosen: Look,
  alternatives:
  - Behold,
  - Indeed,
  lexicon: HALOT
  rationale: Introduces the divine explanation emphatically. 'Look' is readable modern
    English while retaining the discourse force.
- source_word: בַּעֲוֺנֹתֵיכֶם
  chosen: because of your iniquities
  alternatives:
  - for your iniquities
  - by your iniquities
  - because of your guilt
  lexicon: HALOT
  rationale: עָוֹן often carries the sense of guilt/iniquity. 'Because of' best expresses
    the causal force of the preposition here.
- source_word: נִמְכַּרְתֶּם
  chosen: you were sold
  alternatives:
  - you sold yourselves
  - you were handed over
  lexicon: HALOT
  rationale: Niphal is passive/reflexive in form; passive 'were sold' fits the parallelism
    and avoids adding the reflexive 'yourselves,' which is interpretive though contextually
    possible.
- source_word: וּבְפִשְׁעֵיכֶם
  chosen: because of your transgressions
  alternatives:
  - for your rebellions
  - because of your offenses
  lexicon: HALOT
  rationale: פֶּשַׁע emphasizes rebellion/transgression. 'Transgressions' is a clear
    and weighty English equivalent, and varying from 'iniquities' preserves the Hebrew
    distinction between the paired terms.
- source_word: שֻׁלְּחָה אִמְּכֶם
  chosen: your mother was sent away
  alternatives:
  - your mother was divorced
  - your mother was dismissed
  lexicon: HALOT
  rationale: Passive Pual of שׁלח. 'Sent away' preserves the lexical link with the
    earlier clause and maintains the metaphor without making the second verb identical
    in English to the legal noun 'certificate of divorce.'
