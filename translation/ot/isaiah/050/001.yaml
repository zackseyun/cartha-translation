theological_decisions:
- issue: Marital and commercial metaphors for Zion/Israel's judgment
  chosen_reading: 'Retain both metaphors literally: divorce imagery (''your mother'')
    and debt-slavery imagery (''sold you'') as rhetorical denials followed by explanation
    of exile as caused by the people''s sins.'
  alternative_readings:
  - Flatten the metaphors into a generalized statement about punishment
  - Interpret 'your mother' explicitly as Zion/Jerusalem in the main text
  rationale: 'The Hebrew uses vivid covenantal metaphors without explicitly naming
    Zion in this verse. Preserving the imagery maintains the prophetic force and theological
    tension: the LORD denies arbitrary abandonment or indebtedness, locating the cause
    in Israel''s own sin.'
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of sin terms עֲוֺנוֹת and פִשְׁעֵי
  chosen_reading: Differentiate them as 'iniquities' and 'transgressions.'
  alternative_readings:
  - Render both simply as 'sins'
  rationale: The verse intentionally pairs two related but distinct terms for wrongdoing.
    Preserving the distinction avoids flattening the rhetoric and reflects the source
    text more transparently.
  doctrine_reference: Translation philosophy §5
