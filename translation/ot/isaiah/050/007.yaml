id: ISA.50.7
reference: Isaiah 50:7
source:
  edition: WLC
  text: וַ/אדֹנָ֤/י יְהוִה֙ יַֽעֲזָר לִ֔/י עַל כֵּ֖ן לֹ֣א נִכְלָ֑מְתִּי עַל כֵּ֞ן שַׂ֤מְתִּי פָנַ/י֙ כַּֽ/חַלָּמִ֔ישׁ וָ/אֵדַ֖ע כִּי לֹ֥א אֵבֽוֹשׁ־־־־׃
translation:
  text: But the Lord GOD helps me; therefore I have not been disgraced. Therefore I have set my face like flint, and I know that I will not be put to shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Lord GOD'' represents אֲדֹנָי יְהוִה, literally ''Lord YHWH''; English custom avoids ''Lord LORD'' by rendering the divine name here as ''GOD.'''
    reason: alternative_reading
  - marker: b
    text: Or 'I have not been humiliated' for 'I have not been disgraced.'
    reason: lexical_alternative
  - marker: c
    text: '''Set my face like flint'' is an idiom of firm resolve in the face of opposition.'
    reason: cultural_note
  - marker: d
    text: Or 'I will not be ashamed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound title combines אֲדֹנָי with the divine name YHWH. Following the doctrine default for יְהוָה, the covenant name is not transliterated but rendered reverentially. Because 'Lord LORD' is awkward in English, 'the Lord GOD' is the established meaning-preserving equivalent for this combination.
- source_word: יַעֲזָר לִי
  chosen: helps me
  alternatives:
  - will help me
  - comes to my aid
  lexicon: HALOT
  rationale: The imperfect here expresses present-future confidence. 'Helps me' gives a natural English sense while preserving the ongoing/supportive force of עזר without over-specifying tense.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for that reason
  - so
  lexicon: HALOT
  rationale: The phrase occurs twice and marks logical consequence. 'Therefore' preserves the formal rhetorical linkage and repetition.
- source_word: נִכְלָמְתִּי
  chosen: I have not been disgraced
  alternatives:
  - I have not been humiliated
  - I have not been confounded
  lexicon: HALOT
  rationale: The verb כלם in the Niphal conveys being shamed, humiliated, or disgraced. 'Disgraced' fits the passive/resultative sense and avoids archaic diction.
- source_word: שַׂמְתִּי פָנַי
  chosen: I have set my face
  alternatives:
  - I have made my face
  - I have fixed my face
  lexicon: HALOT
  rationale: This idiom expresses determined resolve. The literal rendering 'set my face' is clear in modern English and preserves the Hebrew imagery.
- source_word: כַּחַלָּמִישׁ
  chosen: like flint
  alternatives:
  - like hard stone
  - like a flint stone
  lexicon: HALOT
  rationale: חַלָּמִישׁ denotes very hard stone, commonly flint. 'Like flint' is concise, idiomatic, and preserves the metaphor of hardness and resolve.
- source_word: וָאֵדַע
  chosen: and I know
  alternatives:
  - and I have known
  - so I know
  lexicon: HALOT
  rationale: The waw-consecutive form advances the statement with confident certainty. In English, simple present 'I know' best conveys the speaker's settled assurance.
- source_word: לֹא אֵבוֹשׁ
  chosen: I will not be put to shame
  alternatives:
  - I will not be ashamed
  - I will not be disappointed
  lexicon: HALOT
  rationale: בוש often denotes being shamed or proved shamefully wrong. 'Be put to shame' preserves the passive/resultative nuance better than the more internal 'be ashamed.' It also echoes the earlier shame/disgrace language while allowing a slight distinction from נכלמתי.
