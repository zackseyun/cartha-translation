id: ISA.22.10
reference: Isaiah 22:10
source:
  edition: WLC
  text: וְ/אֶת בָּתֵּ֥י יְרוּשָׁלִַ֖ם סְפַרְתֶּ֑ם וַ/תִּתְֿצוּ֙ הַ/בָּ֣תִּ֔ים לְ/בַצֵּ֖ר
    הַ/חוֹמָֽה־׃
translation:
  text: And you counted the houses of Jerusalem, and you tore down the houses to fortify
    the wall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you numbered the houses of Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you broke down the houses to strengthen the wall.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  chosen: And
  alternatives:
  - Also
  - Now
  lexicon: HALOT
  rationale: Here אֵת functions unusually at the head of the clause, likely marking
    the object fronted for emphasis after the conjunction. In English, a simple connective
    'And' best carries the discourse flow without forcing an awkward object marker
    translation.
- source_word: בָּתֵּי יְרוּשָׁלִַם
  chosen: the houses of Jerusalem
  alternatives:
  - Jerusalem's houses
  lexicon: HALOT
  rationale: Construct chain meaning 'houses of Jerusalem.' The definite sense is
    natural in context, referring to the city's houses as a known set under siege
    preparations.
- source_word: סְפַרְתֶּם
  chosen: you counted
  alternatives:
  - you numbered
  - you took stock of
  lexicon: HALOT
  rationale: ספר in the Qal commonly means 'count, number.' 'Counted' is the most
    direct rendering; 'took stock of' is interpretive and less formally transparent.
- source_word: וַ/תִּתְֿצוּ
  chosen: and you tore down
  alternatives:
  - and you broke down
  - and you demolished
  lexicon: HALOT
  rationale: נתץ conveys pulling down or demolishing structures. 'Tore down' is vivid,
    idiomatic, and fits the military-engineering context.
- source_word: הַ/בָּתִּים
  chosen: the houses
  alternatives:
  - houses
  lexicon: HALOT
  rationale: The article is present and should be represented. Repetition of 'the
    houses' mirrors the Hebrew and highlights that the same urban dwellings just counted
    are then dismantled.
- source_word: לְ/בַצֵּר
  chosen: to fortify
  alternatives:
  - to strengthen
  - to make inaccessible
  lexicon: HALOT
  rationale: From בצר in the sense of making secure/fortified. In context of dismantling
    houses for defensive works, 'to fortify' best captures the military purpose.
- source_word: הַ/חוֹמָה
  chosen: the wall
  alternatives:
  - the city wall
  lexicon: HALOT
  rationale: חוֹמָה means 'wall,' here clearly the defensive wall of Jerusalem. 'The
    wall' preserves the Hebrew wording; 'city wall' is a possible explanatory alternative
    but not necessary in the main text.
