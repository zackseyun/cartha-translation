theological_decisions:
- issue: Whether the revelry should be rendered neutrally or with explicit moral condemnation
    in the translation itself
  chosen_reading: Render the activities descriptively without adding condemnatory
    adjectives
  alternative_readings:
  - Add interpretive wording such as 'sinful revelry' or 'hedonistic celebration'
  rationale: The verse itself presents the people's response as a scene of festivity
    and fatalistic indulgence; the surrounding context supplies the prophetic condemnation.
    The translation should not import evaluative language beyond what the Hebrew states.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source text''s plain sense.'
