id: ISA.22.13
reference: Isaiah 22:13
source:
  edition: WLC
  text: וְ/הִנֵּ֣ה שָׂשׂ֣וֹן וְ/שִׂמְחָ֗ה הָרֹ֤ג בָּקָר֙ וְ/שָׁחֹ֣ט צֹ֔אן אָכֹ֥ל בָּשָׂ֖ר
    וְ/שָׁת֣וֹת יָ֑יִן אָכ֣וֹל וְ/שָׁת֔וֹ כִּ֥י מָחָ֖ר נָמֽוּת׀׀׃
translation:
  text: 'And look—joy and gladness, killing cattle and slaughtering sheep, eating
    meat and drinking wine: “Let us eat and drink, for tomorrow we die.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Eat and drink,” preserving the terse slogan-like force
      of the Hebrew.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And look—
  alternatives:
  - And behold
  - But look
  lexicon: HALOT
  rationale: Introduces an attention-getting, vivid scene. 'Look' preserves the deictic
    force in readable modern English; the conjunction is retained with 'And' to reflect
    continuity.
- source_word: שָׂשׂוֹן
  chosen: joy
  alternatives:
  - mirth
  - rejoicing
  lexicon: HALOT
  rationale: A standard rendering for exuberant joy; paired with שִׂמְחָה for a hendiadys-like
    expression of festivity.
- source_word: שִׂמְחָה
  chosen: gladness
  alternatives:
  - rejoicing
  - merriment
  lexicon: HALOT
  rationale: Chosen to distinguish it slightly from שָׂשׂוֹן while preserving the
    semantic overlap of celebratory happiness.
- source_word: הָרֹג בָּקָר
  chosen: killing cattle
  alternatives:
  - slaying oxen
  - butchering cattle
  lexicon: HALOT
  rationale: The infinitive/participial verbal sequence depicts ongoing festive activity.
    'Cattle' is broader and more natural than 'oxen' here, while still fitting בָּקָר.
- source_word: וְשָׁחֹט צֹאן
  chosen: slaughtering sheep
  alternatives:
  - slaughtering flock animals
  - killing sheep
  lexicon: HALOT
  rationale: Pairs naturally with the previous clause and reflects the sacrificial/butchering
    nuance of שחט without over-specifying ritual sacrifice.
- source_word: אָכֹל בָּשָׂר
  chosen: eating meat
  alternatives:
  - eating flesh
  lexicon: HALOT
  rationale: In contemporary English, 'meat' is the natural equivalent for בָּשָׂר
    in a food context; 'flesh' would sound overly literal and potentially misleading.
- source_word: וְשָׁתוֹת יָיִן
  chosen: drinking wine
  alternatives:
  - and to drink wine
  lexicon: HALOT
  rationale: Continues the sequence of revelry activities in smooth English while
    preserving the concrete object 'wine'.
- source_word: אָכוֹל וְשָׁתוֹ
  chosen: Let us eat and drink
  alternatives:
  - Eating and drinking
  - Eat and drink
  lexicon: HALOT
  rationale: Though formally infinitive absolute forms, in context they function as
    a quoted slogan/exhortation. 'Let us eat and drink' best captures the idiomatic
    force and matches the following first-person plural 'for tomorrow we die.'
- source_word: כִּי מָחָר נָמוּת
  chosen: for tomorrow we die
  alternatives:
  - because tomorrow we will die
  - for tomorrow we shall die
  lexicon: HALOT
  rationale: A concise, proverbial line. Present 'we die' in English preserves the
    gnomic, slogan-like force better than a more explicit future.
