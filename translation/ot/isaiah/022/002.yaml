id: ISA.22.2
reference: Isaiah 22:2
source:
  edition: WLC
  text: תְּשֻׁא֣וֹת מְלֵאָ֗ה עִ֚יר הֽוֹמִיָּ֔ה קִרְיָ֖ה עַלִּיזָ֑ה חֲלָלַ֨יִ/ךְ֙ לֹ֣א
    חַלְלֵי חֶ֔רֶב וְ/לֹ֖א מֵתֵ֥י מִלְחָמָֽה׀־׃
translation:
  text: O city full of shouting, tumultuous city, exultant town—your slain are not
    slain by the sword, nor dead in battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'full of uproar ... noisy city ... joyous town.' The Hebrew piles up
      near-synonyms to portray a city marked by loud, festive commotion.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּשֻׁאוֹת
  chosen: shouting
  alternatives:
  - uproar
  - tumult
  lexicon: HALOT
  rationale: The noun denotes loud noise or uproar. 'Shouting' fits the immediate
    parallel with the noisy, celebratory city while remaining natural English. The
    broader sense 'uproar' is preserved as an alternative.
- source_word: מְלֵאָה
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: Predicate adjective with the preceding noun phrase; 'full of' is idiomatic
    in English and preserves the image of the city characterized by noise.
- source_word: עִיר
  chosen: city
  alternatives:
  - town
  lexicon: HALOT
  rationale: Standard rendering for עיר. Here the first occurrence is kept as 'city'
    for the main address.
- source_word: הוֹמִיָּה
  chosen: tumultuous
  alternatives:
  - noisy
  - roaring
  lexicon: HALOT
  rationale: From a root associated with roaring, murmuring, or tumult. 'Tumultuous'
    captures civic commotion better than the more literal but less idiomatic 'roaring'
    in this context.
- source_word: קִרְיָה
  chosen: town
  alternatives:
  - city
  lexicon: HALOT
  rationale: A near-synonym of עיר. Rendering it 'town' preserves the poetic parallelism
    without awkward repetition, while still denoting an urban settlement.
- source_word: עַלִּיזָה
  chosen: exultant
  alternatives:
  - joyous
  - jubilant
  lexicon: HALOT
  rationale: The adjective conveys rejoicing or exuberance. 'Exultant' preserves the
    elevated prophetic tone and the sense of celebratory self-confidence.
- source_word: חֲלָלַיִךְ
  chosen: your slain
  alternatives:
  - your wounded
  - your pierced
  lexicon: HALOT
  rationale: In context, the noun refers to those struck down, not merely wounded.
    'Your slain' also sets up the wordplay with the following חַלְלֵי ('slain of').
- source_word: חַלְלֵי חֶרֶב
  chosen: slain by the sword
  alternatives:
  - killed by the sword
  - the sword-slain
  lexicon: HALOT
  rationale: A standard Hebrew expression for death in violent combat. 'Slain by the
    sword' is both idiomatic and formally close to the source.
- source_word: מֵתֵי מִלְחָמָה
  chosen: dead in battle
  alternatives:
  - those dead in war
  - war dead
  lexicon: HALOT
  rationale: The phrase denotes those who died as casualties of warfare. 'Dead in
    battle' is concise, natural, and preserves the military setting.
