id: ISA.22.4
reference: Isaiah 22:4
source:
  edition: WLC
  text: עַל כֵּ֥ן אָמַ֛רְתִּי שְׁע֥וּ מִ/נִּ֖י אֲמָרֵ֣ר בַּ/בֶּ֑כִי אַל תָּאִ֣יצוּ
    לְ/נַֽחֲמֵ֔/נִי עַל שֹׁ֖ד בַּת עַמִּֽ/י־־־־׃
translation:
  text: Therefore I said, “Look away from me; let me weep bitterly. Do not press on
    to comfort me over the destruction of the daughter of my people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Turn away from me; I will weep bitterly.' The Hebrew can be rendered
      more literally, 'be bitter in weeping.'
    reason: lexical_alternative
  - marker: b
    text: '''The daughter of my people'' is a prophetic poetic expression for my people,
      personified as a daughter.'
    reason: cultural_note
lexical_decisions:
- source_word: שְׁעוּ
  chosen: Look away
  alternatives:
  - Turn away
  - Look away
  lexicon: HALOT
  rationale: From שעה in the imperative plural, here likely meaning to turn one's
    gaze away or leave one alone. 'Look away from me' fits the context of grief and
    the following request to be left to bitter weeping. 'Turn away from me' is possible,
    but 'look away' preserves the visual nuance often associated with the verb.
- source_word: מִנִּי
  chosen: from me
  lexicon: HALOT
  rationale: Straightforward preposition + 1cs suffix; paired with שְׁעוּ to form
    'look away from me.'
- source_word: אֲמָרֵר
  chosen: let me weep bitterly
  alternatives:
  - I will weep bitterly
  - let me be bitter in weeping
  lexicon: HALOT
  rationale: Piel imperfect/cohortative-like form from מרר, 'to be bitter / make bitter.'
    In context with בַּבֶּכִי, the sense is intensive grief expressed in weeping.
    'Let me weep bitterly' gives idiomatic English while preserving the bitterness
    element. A more literal 'let me be bitter in weeping' is less natural.
- source_word: בַּבֶּכִי
  chosen: weep
  alternatives:
  - with weeping
  - in weeping
  lexicon: HALOT
  rationale: The noun 'weeping' with prefixed ב is absorbed idiomatically into the
    English verbal phrase 'weep bitterly.' This avoids wooden English while retaining
    the sense of grief.
- source_word: תָּאִיצוּ
  chosen: press on
  alternatives:
  - hasten
  - insist
  - urge
  lexicon: HALOT
  rationale: Hiphil of אוץ can mean to press, urge, or hasten. In this context the
    speaker resists others' attempts to console her, so 'do not press on to comfort
    me' captures the force of unwanted insistence better than the simpler 'do not
    hasten.'
- source_word: לְנַחֲמֵנִי
  chosen: to comfort me
  alternatives:
  - to console me
  lexicon: HALOT
  rationale: Standard rendering of נחם in the consolation sense. 'Comfort' is natural
    modern English and fits the lament context.
- source_word: שֹׁד
  chosen: destruction
  alternatives:
  - ruin
  - devastation
  - plundering
  lexicon: HALOT
  rationale: The noun denotes violent devastation or ruin. 'Destruction' is broad
    enough to cover the calamity in view and is idiomatic in English. 'Plundering'
    is possible but too narrow if the verse laments the overall catastrophe.
- source_word: בַּת עַמִּי
  chosen: the daughter of my people
  alternatives:
  - my people's daughter
  - the daughter of my people
  lexicon: HALOT
  rationale: A prophetic idiom personifying the people/community, often Jerusalem
    or Judah, as a daughter. The traditional phrase is retained because it is both
    accurate and theologically/literarily significant. A more interpretive rendering
    would flatten the metaphor.
