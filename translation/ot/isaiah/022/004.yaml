theological_decisions:
- issue: Whether to preserve the prophetic idiom בַּת עַמִּי literally or interpret
    it as the people/Jerusalem directly
  chosen_reading: Retain 'the daughter of my people' in the main text
  alternative_readings:
  - my people
  - daughter Zion / Jerusalem (interpretive contextualization)
  rationale: The Hebrew text itself says 'daughter of my people,' a poetic personification
    common in prophetic literature. Preserving the idiom maintains the literary and
    emotional force without importing a narrower identification not explicit in the
    verse.
  doctrine_reference: Translation philosophy §§1, 3, 6
