id: ISA.22.8
reference: Isaiah 22:8
source:
  edition: WLC
  text: וַ/יְגַ֕ל אֵ֖ת מָסַ֣ךְ יְהוּדָ֑ה וַ/תַּבֵּט֙ בַּ/יּ֣וֹם הַ/ה֔וּא אֶל נֶ֖שֶׁק
    בֵּ֥ית הַ/יָּֽעַר־׃
translation:
  text: And he removed the covering of Judah, and on that day you looked to the weapons
    of the House of the Forest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the defense/protection of Judah.' The Hebrew literally says 'the covering
      of Judah,' using a metaphor for what sheltered or protected Judah.
    reason: lexical_alternative
  - marker: b
    text: '''The House of the Forest'' likely refers to the royal armory or palace
      elsewhere called ''the House of the Forest of Lebanon.'''
    reason: cross_reference
lexical_decisions:
- source_word: וַיְגַל
  chosen: he removed
  alternatives:
  - he uncovered
  - one removed
  lexicon: HALOT
  rationale: 'From גלה in the Hiphil, here with an object (''the covering of Judah''),
    the sense is causative: ''remove/uncover.'' ''He removed'' preserves the straightforward
    verbal action and leaves the subject implicit as in Hebrew. ''Uncovered'' is possible,
    but ''removed'' reads more naturally with ''covering'' in English while still
    preserving the image.'
- source_word: מָסַךְ
  chosen: covering
  alternatives:
  - screen
  - veil
  - defense
  lexicon: HALOT
  rationale: The noun denotes a covering, screen, or veil. In this context it is metaphorical
    for Judah's protective covering/defense. 'Covering' best preserves the concrete
    metaphor without prematurely interpreting it as purely military 'defense.' The
    interpretive sense is preserved in a footnote.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard transliteration of the place/people name.
- source_word: וַתַּבֵּט
  chosen: you looked
  alternatives:
  - you looked toward
  - you turned your gaze
  lexicon: HALOT
  rationale: בטנ/נבט with אֶל means to look toward. The 2ms form is retained as singular
    'you,' matching the prophetic address to Jerusalem/Judah personified. This preserves
    the rhetorical force better than pluralizing.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Idiomatic temporal expression; 'on that day' is natural modern English
    and preserves the prophetic time reference.
- source_word: נֶשֶׁק
  chosen: weapons
  alternatives:
  - arms
  - armor
  lexicon: HALOT
  rationale: The noun commonly refers to weaponry/arms. 'Weapons' is the clearest
    modern English rendering. 'Armor' is too narrow, and 'arms' is less immediately
    clear to contemporary readers.
- source_word: בֵּית הַיָּעַר
  chosen: the House of the Forest
  alternatives:
  - the palace of the Forest
  - the House of the Forest of Lebanon
  lexicon: HALOT
  rationale: Literally 'house of the forest,' likely referring to the royal armory/palace
    known elsewhere as the House of the Forest of Lebanon. The main text keeps the
    literal title, while a footnote preserves the more explicit identification.
