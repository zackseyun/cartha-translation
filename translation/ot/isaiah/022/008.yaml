theological_decisions:
- issue: Metaphorical force of 'the covering of Judah'
  chosen_reading: Retain the metaphor as 'the covering of Judah' rather than interpret
    directly as 'defenses of Judah.'
  alternative_readings:
  - the defenses of Judah
  - the protection of Judah
  rationale: The Hebrew image is concrete and evocative. Preserving it avoids over-interpreting
    the metaphor while still allowing readers to infer the military/protective sense
    from context. An explanatory footnote preserves the interpretive alternative.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Addressee of the second-person verb
  chosen_reading: Singular 'you' addressed to Jerusalem/Judah personified.
  alternative_readings:
  - impersonal/passive-like English rendering
  - plural 'you'
  rationale: The Hebrew form is 2ms. Retaining singular 'you' preserves the prophetic
    rhetoric and personification without importing a different subject.
  doctrine_reference: Translation philosophy §1, §5
