theological_decisions:
- issue: Rendering the divine name YHWH in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - the Lord GOD
  rationale: The doctrine specifies YHWH is normally rendered 'the LORD.' In the compound
    אֲדֹנָי יְהוִה, English convention uses 'Lord GOD' to avoid 'Lord LORD' while
    still signaling the underlying divine name. This is a translation convention,
    not a theological reinterpretation.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → ''the LORD'''
