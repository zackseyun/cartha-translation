id: ISA.22.15
reference: Isaiah 22:15
source:
  edition: WLC
  text: כֹּ֥ה אָמַ֛ר אֲדֹנָ֥/י יְהוִ֖ה צְבָא֑וֹת לֶךְ בֹּא֙ אֶל הַ/סֹּכֵ֣ן הַ/זֶּ֔ה
    עַל שֶׁבְנָ֖א אֲשֶׁ֥ר עַל הַ/בָּֽיִת־־־־׃
translation:
  text: 'Thus says the Lord GOD of hosts: Go, come to this steward, to Shebna, who
    is over the house:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Go in to this official, Shebna.' The Hebrew has two imperatives, 'Go,
      come,' which may function together idiomatically.
    reason: lexical_alternative
  - marker: b
    text: '''Who is over the house'' refers to a chief palace administrator or steward.'
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  lexicon: HALOT
  rationale: Introduces a prophetic messenger formula. 'Thus' preserves the formal
    force and cadence of prophetic speech better than the more expansive 'This is
    what.'
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title is conventionally distinguished in English
    as 'Lord GOD' to reflect אֲדֹנָי + YHWH. Per doctrine, YHWH is rendered 'the LORD';
    in this compound, 'GOD' signals the underlying divine name without producing the
    awkward 'Lord LORD.'
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: '''Hosts'' is the standard concise rendering for the divine title and
    preserves its breadth, encompassing heavenly and earthly armies. ''Armies'' is
    possible but narrower and less idiomatic in this title.'
- source_word: לֶךְ בֹּא
  chosen: Go, come
  alternatives:
  - Go in
  - Go, enter
  lexicon: HALOT
  rationale: The paired imperatives are both retained rather than collapsed, preserving
    the Hebrew emphasis. 'Go, come' sounds abrupt in English but reflects the source's
    force; the following preposition clarifies the movement toward the official.
- source_word: הַסֹּכֵן
  chosen: steward
  alternatives:
  - official
  - administrator
  lexicon: HALOT
  rationale: The term denotes an official in charge of administration. 'Steward' fits
    the immediate context, especially with the following phrase 'over the house,'
    and preserves the sense of entrusted oversight.
- source_word: הַזֶּה
  chosen: this
  alternatives:
  - that
  lexicon: HALOT
  rationale: The demonstrative is proximal in Hebrew and is naturally rendered 'this,'
    carrying a slightly dismissive tone in context.
- source_word: עַל שֶׁבְנָא
  chosen: to Shebna
  alternatives:
  - against Shebna
  - concerning Shebna
  lexicon: HALOT
  rationale: Here עַל introduces apposition identifying 'this steward' as Shebna rather
    than expressing hostility. 'To Shebna' in apposition is the most natural English
    equivalent in this construction.
- source_word: אֲשֶׁר עַל הַבָּיִת
  chosen: who is over the house
  alternatives:
  - who is in charge of the palace
  - who is over the household
  lexicon: HALOT
  rationale: Literally 'who is over the house,' an idiom for a high-ranking palace
    administrator. The translation keeps the idiom while remaining understandable.
    'Palace' is interpretive and may be preserved as an alternative.
