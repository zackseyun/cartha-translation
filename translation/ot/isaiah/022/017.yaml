id: ISA.22.17
reference: Isaiah 22:17
source:
  edition: WLC
  text: הִנֵּ֤ה יְהוָה֙ מְטַלְטֶלְ/ךָ֔ טַלְטֵלָ֖ה גָּ֑בֶר וְ/עֹטְ/ךָ֖ עָטֹֽה׃
translation:
  text: Look, Yahweh is about to hurl you away violently, O man, and wrap you up tightly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will surely toss you with a violent tossing, O strong man'; the Hebrew is compact and difficult, and גָּבֶר may be taken as 'man/strong man' rather than direct address.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces an emphatic announcement. 'Look' preserves the deictic force in readable modern English better than the more archaic 'Behold.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְטַלְטֶלְךָ
  chosen: is about to hurl you away violently
  alternatives:
  - will surely toss you
  - will shake you violently
  - will carry you away with a mighty tossing
  lexicon: HALOT
  rationale: The pilpel form from טלטל conveys forceful tossing/shaking. English needs an expanded rendering to communicate both motion and violence. 'Is about to' reflects the imminent prophetic declaration introduced by הִנֵּה.
- source_word: טַלְטֵלָה
  chosen: hurl
  alternatives:
  - tossing
  - violent tossing
  lexicon: HALOT
  rationale: This cognate accusative intensifies the verbal idea. Rather than a wooden repetition ('tossing a tossing'), the force is absorbed into the adverbial sense 'violently' and the strong verb 'hurl.'
- source_word: גָּבֶר
  chosen: O man
  alternatives:
  - like a man
  - strong man
  - mighty man
  lexicon: HALOT
  rationale: The noun likely functions appositionally/exclamatorily here, addressing Shebna as a man. 'O man' preserves the masculine singular force without importing the idea of strength too strongly. Because the syntax is difficult, alternatives are preserved in a footnote.
- source_word: וְעֹטְךָ עָטֹה
  chosen: and wrap you up tightly
  alternatives:
  - and surely wrap you up
  - and enfold you completely
  - and seize you firmly
  lexicon: HALOT
  rationale: The verb עטה commonly means to wrap or envelop. The infinitive absolute with finite verb intensifies the action; 'tightly' conveys that emphasis in natural English.
