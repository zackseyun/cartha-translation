id: ISA.22.3
reference: Isaiah 22:3
source:
  edition: WLC
  text: כָּל קְצִינַ֥יִ/ךְ נָֽדְדוּ יַ֖חַד מִ/קֶּ֣שֶׁת אֻסָּ֑רוּ כָּל נִמְצָאַ֨יִ/ךְ֙
    אֻסְּר֣וּ יַחְדָּ֔ו מֵ/רָח֖וֹק בָּרָֽחוּ־־־׃
translation:
  text: All your rulers have fled together; they were captured without the bow. All
    of your men who were found were captured together, though they had fled far away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'were bound from/without the bow.' The sense may be that
      they were captured without needing archery or without having a bow in hand.
    reason: lexical_alternative
  - marker: b
    text: Or 'all of yours who were found were bound together; they fled from afar.'
      The Hebrew syntax of the final clause is compressed and allows slightly different
      construals.
    reason: alternative_reading
lexical_decisions:
- source_word: קְצִינַיִךְ
  chosen: your rulers
  alternatives:
  - your officers
  - your commanders
  - your leaders
  lexicon: HALOT
  rationale: קָצִין denotes an official, ruler, or commander. 'Rulers' fits the civic-military
    context of Jerusalem's leadership in this oracle and is broad enough to include
    military officers without over-specifying rank.
- source_word: נָדְדוּ
  chosen: have fled
  alternatives:
  - have wandered away
  - have fled away
  lexicon: HALOT
  rationale: The verb נדד can mean wander or flee, but in this siege-and-capture context
    'fled' best matches the attempted escape of the city's leaders.
- source_word: יַחַד
  chosen: together
  alternatives:
  - all together
  lexicon: HALOT
  rationale: Adverb indicating collective action; 'together' is the natural English
    equivalent.
- source_word: מִקֶּשֶׁת
  chosen: without the bow
  alternatives:
  - from the bow
  - without a bow
  - by the bow
  lexicon: HALOT
  rationale: 'The preposition מִן here is best taken privatively or in the sense of
    separation: they were captured apart from bow-use, i.e., without battle by archery.
    This yields a coherent sense in context: the leaders fled but were captured without
    effective armed resistance. The more literal ''from the bow'' is possible but
    less idiomatic in English and more obscure.'
- source_word: אֻסָּרוּ
  chosen: were captured
  alternatives:
  - were bound
  - were taken prisoner
  lexicon: HALOT
  rationale: אָסַר literally means bind, but in military context passive forms commonly
    imply being bound as prisoners. 'Were captured' communicates the event clearly
    in modern English while preserving the underlying sense.
- source_word: נִמְצָאַיִךְ
  chosen: your men who were found
  alternatives:
  - your fugitives who were found
  - those of yours who were found
  - your people who were found
  lexicon: HALOT
  rationale: As a Niphal participle from מצא, the form means 'those of yours who were
    found.' Because the referent in context is the city's defenders/inhabitants, 'your
    men who were found' gives a natural English expression while keeping the passive
    sense. A more literal rendering is possible but less readable.
- source_word: אֻסְּרוּ
  chosen: were captured
  alternatives:
  - were bound
  - were taken prisoner
  lexicon: HALOT
  rationale: Same verb and contextual force as the earlier occurrence; consistency
    favors the same rendering.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - all together
  lexicon: HALOT
  rationale: Near-synonymous adverbial form with יחד; rendered consistently as 'together.'
- source_word: מֵרָחוֹק
  chosen: far away
  alternatives:
  - from afar
  - from far away
  - to a distant place
  lexicon: HALOT
  rationale: 'The phrase can indicate distance of flight or origin. In context it
    modifies their fleeing: they had fled to a distant place / far away. ''Far away''
    is idiomatic modern English.'
- source_word: בָּרָחוּ
  chosen: had fled
  alternatives:
  - fled
  - had run away
  lexicon: HALOT
  rationale: 'ברח means flee. English pluperfect (''had fled'') clarifies the sequence:
    they fled, yet were later found and captured.'
