id: ISA.22.9
reference: Isaiah 22:9
source:
  edition: WLC
  text: וְ/אֵ֨ת בְּקִיעֵ֧י עִיר דָּוִ֛ד רְאִיתֶ֖ם כִּי רָ֑בּוּ וַֽ/תְּקַבְּצ֔וּ אֶת
    מֵ֥י הַ/בְּרֵכָ֖ה הַ/תַּחְתּוֹנָֽה־־־׃
translation:
  text: You saw that the breaches of the city of David were many, and you collected
    the waters of the lower pool.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you gathered the water of the lower reservoir.' The Hebrew term for
      'pool' can also denote a reservoir.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּקִיעֵי
  chosen: breaches
  alternatives:
  - breaks
  - gaps
  - cracks
  lexicon: HALOT
  rationale: The noun refers to breaks or openings in a wall or structure. In the
    military/urban-defense context of Jerusalem, 'breaches' best conveys damaged openings
    in the city's defenses.
- source_word: עִיר דָּוִד
  chosen: the city of David
  alternatives:
  - David's city
  lexicon: HALOT
  rationale: A standard construct chain meaning the city associated with David. 'The
    city of David' is the natural English rendering and preserves the historical designation.
- source_word: רְאִיתֶם
  chosen: you saw
  alternatives:
  - you looked at
  - you inspected
  lexicon: HALOT
  rationale: The Qal perfect of ראה ordinarily means 'see.' In context it includes
    noticing or observing the condition of the walls, but 'you saw' is the most direct
    and sufficiently natural rendering.
- source_word: כִּי רָבּוּ
  chosen: that ... were many
  alternatives:
  - that ... had multiplied
  - for ... were many
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what was seen, and רָבּוּ indicates
    increase or abundance. 'That ... were many' is idiomatic English and fits the
    report of numerous breaches.
- source_word: וַתְּקַבְּצוּ
  chosen: you collected
  alternatives:
  - you gathered
  - you pooled together
  lexicon: HALOT
  rationale: The verb קבץ means to gather or collect. With מים as the object, 'collected'
    is slightly more idiomatic in English for water-management while remaining close
    to the Hebrew.
- source_word: מֵי הַבְּרֵכָה
  chosen: the waters of the pool
  alternatives:
  - the water of the reservoir
  lexicon: HALOT
  rationale: בְּרֵכָה can denote a pool or reservoir. 'Pool' is the more straightforward
    rendering here, while 'waters' preserves the Hebrew plural construct מֵי.
- source_word: הַתַּחְתּוֹנָה
  chosen: the lower
  alternatives:
  - the lower one
  - the lower reservoir
  lexicon: HALOT
  rationale: The adjective specifies the pool's position. 'The lower pool' is the
    natural English expression when combined with the preceding noun.
