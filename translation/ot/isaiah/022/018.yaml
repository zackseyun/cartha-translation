id: ISA.22.18
reference: Isaiah 22:18
source:
  edition: WLC
  text: צָנ֤וֹף יִצְנָפְ/ךָ֙ צְנֵפָ֔ה כַּדּ֕וּר אֶל אֶ֖רֶץ רַחֲבַ֣ת יָדָ֑יִם שָׁ֣מָּ/ה
    תָמ֗וּת וְ/שָׁ֨מָּ/ה֙ מַרְכְּב֣וֹת כְּבוֹדֶ֔/ךָ קְל֖וֹן בֵּ֥ית אֲדֹנֶֽי/ךָ־׃
translation:
  text: He will surely wrap you up tightly, like a ball, and throw you into a broad
    land. There you will die, and there will be the chariots of your glory, O shame
    of your master's house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He will surely wind you up tightly' or 'He will surely roll you up tightly.'
      The Hebrew uses an intensified form of the same root together with a cognate
      noun for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to a land broad of hands,' an idiom for a wide or spacious land.
    reason: cultural_note
  - marker: c
    text: Or 'your glorious chariots' / 'the chariots that were your glory.' The Hebrew
      expression may refer to the chariots in which he took pride.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָנוֹף יִצְנָפְךָ צְנֵפָה
  chosen: He will surely wrap you up tightly
  alternatives:
  - He will surely wind you up
  - He will surely roll you up tightly
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect of צנף intensifies the verbal
    idea. The root conveys wrapping or winding, especially in a tight, bundled way.
    'Wrap you up tightly' preserves the force without overcommitting to a specific
    object like a garment or turban. The cognate noun צְנֵפָה reinforces the bundled/wrapped
    sense.
- source_word: כַּדּוּר
  chosen: like a ball
  alternatives:
  - like a sphere
  lexicon: HALOT
  rationale: The simile compares the person to a ball-shaped object. 'Ball' is natural
    modern English and fits the image of being tightly wrapped and hurled.
- source_word: אֶל אֶרֶץ רַחֲבַת יָדָיִם
  chosen: into a broad land
  alternatives:
  - into a wide land
  - into a spacious country
  lexicon: HALOT
  rationale: Literally 'to a land broad of hands.' The idiom denotes breadth or spaciousness.
    'Broad land' is concise and preserves the metaphorical sense of expanse better
    than a more interpretive paraphrase.
- source_word: שָׁמָּה
  chosen: There
  lexicon: HALOT
  rationale: The adverb is repeated for emphasis and location. Rendering both occurrences
    as 'there' preserves the Hebrew repetition and rhetorical force.
- source_word: תָמוּת
  chosen: you will die
  alternatives:
  - you shall die
  lexicon: HALOT
  rationale: Simple future is the most natural rendering here in English while preserving
    the direct prophetic address.
- source_word: מַרְכְּבוֹת כְּבוֹדֶךָ
  chosen: the chariots of your glory
  alternatives:
  - your glorious chariots
  - the chariots that were your glory
  lexicon: HALOT
  rationale: The construct chain is somewhat compressed. A formally closer rendering
    is preferable in the main text. It likely refers to the splendid chariots in which
    Shebna gloried, but 'the chariots of your glory' preserves the Hebrew wording
    and leaves the nuance open.
- source_word: קְלוֹן בֵּית אֲדֹנֶיךָ
  chosen: O shame of your master's house
  alternatives:
  - you shame of your master's house
  - disgrace of your master's house
  lexicon: HALOT
  rationale: This is best taken as an appositional/vocative denunciation addressed
    to the official. 'O shame of your master's house' captures the prophetic taunt.
    'Master' fits אֲדֹן here as a human superior, not a divine title.
