id: ISA.22.20
reference: Isaiah 22:20
source:
  edition: WLC
  text: וְ/הָיָ֖ה בַּ/יּ֣וֹם הַ/ה֑וּא וְ/קָרָ֣אתִי לְ/עַבְדִּ֔/י לְ/אֶלְיָקִ֖ים בֶּן
    חִלְקִיָּֽהוּ־׃
translation:
  text: And it shall happen on that day that I will call my servant Eliakim son of
    Hilkiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will summon.' The Hebrew verb can carry the sense of calling someone
      for appointment or commission.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall happen
  alternatives:
  - And it will be
  - And it shall come to pass
  lexicon: HALOT
  rationale: The Hebrew wayyiqtol of היה here introduces a future event formula. 'And
    it shall happen' preserves the prophetic temporal framing without using the more
    archaic 'come to pass.'
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal idiom in prophetic literature. 'On that day' is natural
    modern English and preserves the eschatological/prophetic formula.
- source_word: וְקָרָאתִי
  chosen: I will call
  alternatives:
  - I will summon
  lexicon: HALOT
  rationale: קרא with ל can mean to call to or summon. 'I will call' is the most direct
    rendering and leaves the nuance broad enough to include appointment without overtranslating.
- source_word: לְעַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, in this royal/prophetic designation
    for Eliakim the bonded-status nuance is not foregrounded. 'My servant' fits both
    the courtly context and the common biblical designation for one commissioned by
    God.
- source_word: אֶלְיָקִים
  chosen: Eliakim
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: בֶּן חִלְקִיָּהוּ
  chosen: son of Hilkiah
  alternatives:
  - the son of Hilkiah
  rationale: Standard Hebrew patronymic. The anarthrous English 'son of Hilkiah' is
    natural in apposition to the name.
