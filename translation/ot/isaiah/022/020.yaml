theological_decisions:
- issue: Rendering of divine designation for Eliakim
  chosen_reading: my servant
  alternative_readings:
  - my slave
  rationale: The phrase marks Eliakim as one appointed by God. The text does not require
    importing later messianic or typological claims into the translation itself, though
    such associations may be drawn in interpretation. 'My servant' preserves the commissioning
    language without overstating the social bondage nuance.
  doctrine_reference: Translation philosophy §§1, 3, 5
