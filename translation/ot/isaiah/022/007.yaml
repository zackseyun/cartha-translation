id: ISA.22.7
reference: Isaiah 22:7
source:
  edition: WLC
  text: וַ/יְהִ֥י מִבְחַר עֲמָקַ֖יִ/ךְ מָ֣לְאוּ רָ֑כֶב וְ/הַ/פָּ֣רָשִׁ֔ים שֹׁ֖ת שָׁ֥תוּ
    הַ/שָּֽׁעְרָ/ה־׃
translation:
  text: And your choicest valleys were filled with chariots, and the horsemen took
    their positions at the gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stationed themselves at the gate'; the Hebrew uses an infinitive absolute
      with a finite verb for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבְחַר
  chosen: choicest
  alternatives:
  - best
  - choice
  lexicon: HALOT
  rationale: The noun denotes what is selected or choice/best. In construct with 'your
    valleys,' it describes the most select or finest valleys. 'Choicest' preserves
    the superlative nuance in natural English.
- source_word: עֲמָקַיִךְ
  chosen: your valleys
  alternatives:
  - your vales
  lexicon: HALOT
  rationale: Plural of 'valley' with 2fs suffix, addressed to the city/personified
    Jerusalem. 'Valleys' is standard and clear.
- source_word: מָלְאוּ רָכֶב
  chosen: were filled with chariots
  alternatives:
  - filled with chariotry
  - were full of chariots
  lexicon: HALOT
  rationale: The verb 'were filled' plus collective singular רָכֶב refers to chariot
    forces. English idiom prefers the plural 'chariots' here, though 'chariotry' is
    possible.
- source_word: הַפָּרָשִׁים
  chosen: the horsemen
  alternatives:
  - the cavalry
  - the riders
  lexicon: HALOT
  rationale: The term refers to mounted troops. 'Horsemen' is a transparent, moderately
    formal rendering that fits the military scene.
- source_word: שֹׁת שָׁתוּ
  chosen: took their positions
  alternatives:
  - set themselves
  - were surely stationed
  - stationed themselves
  lexicon: HALOT
  rationale: This infinitive absolute + finite verb from שׁית intensifies the verbal
    idea. In context with 'at the gate,' it conveys deliberate emplacement or deployment.
    'Took their positions' captures both the military sense and the emphasis in idiomatic
    English.
- source_word: הַשָּׁעְרָה
  chosen: at the gate
  alternatives:
  - toward the gate
  - to the gate
  lexicon: HALOT
  rationale: The directional he can indicate motion toward, but in this military context
    after an emphatic form of שׁית, the sense is best rendered as positioning at the
    gate rather than mere movement toward it.
