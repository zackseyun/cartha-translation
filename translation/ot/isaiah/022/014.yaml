theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the oath formula אִם יְכֻפַּר
  chosen_reading: 'strong negation: ''Surely this iniquity will not be atoned for you'''
  alternative_readings:
  - literal 'if this iniquity will be atoned for you' with implied curse left unstated
  rationale: Hebrew oath formulas with אִם often express emphatic denial by ellipsis. Making the negation explicit in English preserves the actual sense rather than obscuring it with a formally literal but misleading conditional.
