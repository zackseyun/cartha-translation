id: ISA.22.14
reference: Isaiah 22:14
source:
  edition: WLC
  text: וְ/נִגְלָ֥ה בְ/אָזְנָ֖/י יְהוָ֣ה צְבָא֑וֹת אִם יְ֠כֻפַּר הֶ/עָוֺ֨ן הַ/זֶּ֤ה לָ/כֶם֙ עַד תְּמֻת֔וּ/ן אָמַ֛ר אֲדֹנָ֥/י יְהוִ֖ה צְבָאֽוֹת־־׃פ
translation:
  text: 'And Yahweh of Armies has revealed in my ears: “Surely this iniquity will not be atoned for until you die,” says the Lord GOD of Armies.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew oath formula: literally, ''if this iniquity will be atoned for you,'' an idiom expressing emphatic denial: ''surely it will not be atoned for.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD of Hosts' / 'the Lord GOD of Hosts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִגְלָה
  chosen: has revealed
  alternatives:
  - was revealed
  - has been revealed
  lexicon: HALOT
  rationale: Niphal of גלה here is best rendered as a passive/divine disclosure idiom, but in English the active sense with God as subject is clearer once יְהוָה צְבָאוֹת follows. Present perfect captures the prophetic report of a revelation just received with present force.
- source_word: בְאָזְנַי
  chosen: in my ears
  alternatives:
  - in my hearing
  - to my ears
  lexicon: HALOT
  rationale: A Hebrew idiom for direct hearing of revelation. 'In my ears' preserves the concrete imagery and solemnity better than the more flattened 'in my hearing.'
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  lexicon: HALOT
  rationale: יְהוָה follows the doctrinal default 'the LORD.' צְבָאוֹת is translated rather than retained traditionally as 'Hosts' to preserve meaning in modern English; 'Armies' conveys the martial/cosmic force of the title accessibly.
- source_word: אִם
  chosen: Surely
  alternatives:
  - if
  - indeed
  lexicon: HALOT
  rationale: 'In oath contexts אִם can function elliptically with an implied imprecation, yielding a strong negation: ''surely not'' or ''never.'' English idiom requires an explicit force marker rather than a literal ''if.'''
- source_word: יְכֻפַּר
  chosen: will not be atoned for
  alternatives:
  - will not be forgiven
  - will not be expiated
  lexicon: HALOT
  rationale: Pual of כפר denotes making atonement/expiation. 'Atoned for' preserves sacrificial-theological language without importing a narrower idea of subjective forgiveness alone. The negation is supplied from the oath-force of אִם.
- source_word: הֶעָוֹן הַזֶּה
  chosen: this iniquity
  alternatives:
  - this guilt
  - this sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for guilt. Here it refers to the people's culpable offense; 'iniquity' preserves the moral weight better than the broader 'sin,' while avoiding over-specifying the consequence sense.
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: With כפר, English commonly uses 'atone for' plus the offense or person. 'For you' communicates the beneficiaries in idiomatic English.
- source_word: עַד תְּמֻתוּן
  chosen: until you die
  alternatives:
  - until you die off
  - before you die
  lexicon: HALOT
  rationale: Direct and idiomatic rendering of the temporal clause. The 2mp form addresses the people collectively.
- source_word: אֲדֹנָי יְהוִה צְבָאוֹת
  chosen: the Lord GOD of Armies
  alternatives:
  - the Lord GOD of Hosts
  lexicon: HALOT
  rationale: אֲדֹנָי + יְהוִה is conventionally rendered 'Lord GOD' to avoid 'Lord LORD' and to reflect the distinct Hebrew forms. צְבָאוֹת again is translated 'of Armies' for transparency and consistency.
