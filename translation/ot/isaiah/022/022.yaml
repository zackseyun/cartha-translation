theological_decisions:
- issue: Whether to make the messianic or New Testament allusion explicit in the main
    text
  chosen_reading: Keep the verse at its immediate historical-literary level without
    inserting explicit messianic interpretation.
  alternative_readings:
  - Render with wording that foregrounds its later use in Revelation 3:7
  - Expand 'house of David' to 'royal house of David' to stress messianic significance
  rationale: The verse in Isaiah speaks directly of delegated authority associated
    with the Davidic house. While later biblical texts echo it, the translation should
    not import that later theological development into the main text. Any canonical
    resonance is better preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
