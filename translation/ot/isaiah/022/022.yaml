id: ISA.22.22
reference: Isaiah 22:22
source:
  edition: WLC
  text: וְ/נָתַתִּ֛י מַפְתֵּ֥חַ בֵּית דָּוִ֖ד עַל שִׁכְמ֑/וֹ וּ/פָתַח֙ וְ/אֵ֣ין סֹגֵ֔ר
    וְ/סָגַ֖ר וְ/אֵ֥ין פֹּתֵֽחַ־־׃
translation:
  text: And I will place the key of the house of David on his shoulder; he will open,
    and no one will shut; he will shut, and no one will open.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This imagery of opening and shutting as unchallengeable authority is echoed
      in Revelation 3:7.
    reason: cross_reference
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will place
  alternatives:
  - And I will give
  - And I will set
  lexicon: HALOT
  rationale: The verb נתן broadly means 'give, put, set.' In this context with 'on
    his shoulder,' 'place' best reflects the concrete act of assigning authority symbolized
    by the key, while remaining natural English.
- source_word: מַפְתֵּחַ
  chosen: the key
  alternatives:
  - a key
  lexicon: HALOT
  rationale: 'The noun means ''key.'' English idiom prefers the definite form here
    because the following genitive phrase specifies a particular office-symbol: ''the
    key of the house of David.'''
- source_word: בֵּית דָּוִד
  chosen: the house of David
  alternatives:
  - David's house
  - the royal house of David
  lexicon: HALOT
  rationale: A formally close rendering preserves the dynastic and administrative
    sense without importing explanatory wording into the main text.
- source_word: עַל שִׁכְמוֹ
  chosen: on his shoulder
  alternatives:
  - upon his shoulder
  lexicon: HALOT
  rationale: This is the plain sense of the Hebrew. It likely evokes the carrying
    of an emblem of office or authority, but that symbolism should not be expanded
    in the translation itself.
- source_word: וּפָתַח
  chosen: he will open
  alternatives:
  - and he shall open
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction continues the future/result sequence
    after the divine promise. 'He will open' is clear modern English and preserves
    the subject's effective authority.
- source_word: וְאֵין סֹגֵר
  chosen: and no one will shut
  alternatives:
  - and none will shut
  - and there will be no one shutting
  lexicon: HALOT
  rationale: The construction expresses the absence of anyone able to reverse his
    action. 'No one will shut' is idiomatic and captures the force of unopposable
    authority.
- source_word: וְסָגַר
  chosen: he will shut
  alternatives:
  - and he shall shut
  lexicon: HALOT
  rationale: Parallel with 'he will open'; maintaining the same English structure
    preserves the Hebrew balance and rhetorical force.
- source_word: וְאֵין פֹּתֵחַ
  chosen: and no one will open
  alternatives:
  - and none will open
  - and there will be no one opening
  lexicon: HALOT
  rationale: This mirrors the previous clause and communicates that his shutting cannot
    be overturned. The simple future phrasing is both accurate and readable.
