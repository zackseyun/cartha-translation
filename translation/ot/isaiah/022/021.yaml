id: ISA.22.21
reference: Isaiah 22:21
source:
  edition: WLC
  text: וְ/הִלְבַּשְׁתִּ֣י/ו כֻּתָּנְתֶּ֗/ךָ וְ/אַבְנֵֽטְ/ךָ֙ אֲחַזְּקֶ֔/נּוּ וּ/מֶֽמְשֶׁלְתְּ/ךָ֖
    אֶתֵּ֣ן בְּ/יָד֑/וֹ וְ/הָיָ֥ה לְ/אָ֛ב לְ/יוֹשֵׁ֥ב יְרוּשָׁלִַ֖ם וּ/לְ/בֵ֥ית יְהוּדָֽה׃
translation:
  text: I will clothe him with your tunic, and I will fasten your sash on him; I will
    place your authority into his hand, and he will become a father to the inhabitants
    of Jerusalem and to the house of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will be a father'; the Hebrew metaphor denotes protective, responsible
      leadership, not biological paternity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִלְבַּשְׁתִּיו
  chosen: I will clothe him
  alternatives:
  - I will dress him
  lexicon: HALOT
  rationale: Hiphil of לבש with 3ms suffix means to cause someone to be clothed. 'Clothe'
    is slightly more formal and fits the investiture context better than 'dress.'
- source_word: כֻּתָּנְתֶּךָ
  chosen: your tunic
  alternatives:
  - your robe
  - your coat
  lexicon: HALOT
  rationale: כֻּתֹּנֶת denotes a tunic-like garment worn next to the body. 'Tunic'
    is the most precise accessible English equivalent; 'robe' is less specific.
- source_word: וְאַבְנֵטְךָ
  chosen: your sash
  alternatives:
  - your belt
  - your waistband
  lexicon: HALOT
  rationale: אַבְנֵט refers to a girding band or sash, often part of official attire.
    'Sash' preserves the ceremonial nuance better than the more utilitarian 'belt.'
- source_word: אֲחַזְּקֶנּוּ
  chosen: I will fasten ... on him
  alternatives:
  - I will strengthen him with
  - I will bind ... on him
  lexicon: HALOT
  rationale: Piel of חזק commonly means 'make strong/firm.' In context with the sash,
    the sense is securing or fastening the sash firmly on him, not abstract strengthening.
- source_word: וּמֶמְשֶׁלְתְּךָ
  chosen: your authority
  alternatives:
  - your rule
  - your dominion
  - your government
  lexicon: HALOT
  rationale: מֶמְשָׁלָה denotes rule, dominion, or governing authority. Here it refers
    to official power transferred from one steward to another; 'authority' is natural
    English and fits the administrative context.
- source_word: אֶתֵּן בְּיָדוֹ
  chosen: I will place ... into his hand
  alternatives:
  - I will give ... into his hand
  - I will commit ... to his hand
  lexicon: HALOT
  rationale: The idiom 'give into the hand' conveys entrusting power or responsibility.
    'Place into his hand' preserves the concrete imagery while reading naturally in
    English.
- source_word: וְהָיָה לְאָב
  chosen: he will become a father
  alternatives:
  - he will be a father
  lexicon: HALOT
  rationale: The construction indicates resulting status. 'Become a father' captures
    the transition implied by the context of appointment, while still conveying the
    metaphor of protective leadership rather than biological paternity.
- source_word: לְיוֹשֵׁב יְרוּשָׁלִַם
  chosen: to the inhabitants of Jerusalem
  alternatives:
  - to the one dwelling in Jerusalem
  - to those who live in Jerusalem
  lexicon: HALOT
  rationale: The singular participle after ל often has a collective sense. 'Inhabitants
    of Jerusalem' expresses the collective reference idiomatically in English.
- source_word: וּלְבֵית יְהוּדָה
  chosen: to the house of Judah
  alternatives:
  - to Judah
  - to the household of Judah
  lexicon: HALOT
  rationale: '''House of Judah'' is a standard biblical expression that can denote
    the people or kingdom of Judah. Retaining ''house'' preserves the covenantal-national
    idiom.'
