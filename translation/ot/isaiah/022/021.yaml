theological_decisions:
- issue: Metaphorical use of 'father' for a political official
  chosen_reading: Rendered as 'he will become a father' in the main text, preserving
    the metaphor of benevolent, protective leadership.
  alternative_readings:
  - he will be like a father
  - he will be a patron
  rationale: The Hebrew uses the direct metaphor לְאָב. The translation preserves
    the familial image without flattening it into an explanatory paraphrase. This
    avoids importing later doctrinal or ecclesiastical meanings while retaining the
    text's own portrayal of covenantal care and authority.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not paraphrase.
