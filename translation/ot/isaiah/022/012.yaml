id: ISA.22.12
reference: Isaiah 22:12
source:
  edition: WLC
  text: וַ/יִּקְרָ֗א אֲדֹנָ֧/י יְהוִ֛ה צְבָא֖וֹת בַּ/יּ֣וֹם הַ/ה֑וּא לִ/בְכִי֙ וּ/לְ/מִסְפֵּ֔ד וּ/לְ/קָרְחָ֖ה וְ/לַ/חֲגֹ֥ר שָֽׂק׃
translation:
  text: In that day the Lord GOD of hosts called for weeping, for mourning, for baldness, and for putting on sackcloth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for shaving the head' or 'for making oneself bald'—a mourning practice signified by the Hebrew term rendered 'baldness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called for
  alternatives:
  - called
  - summoned
  lexicon: HALOT
  rationale: The verb קרא here introduces a demand or summons to specific acts of lament. 'Called for' captures the idiomatic sense in English better than the more wooden 'called,' while remaining close to the Hebrew.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title is conventionally rendered 'Lord GOD' in English when אֲדֹנָי precedes YHWH, avoiding the awkward 'Lord LORD.' This preserves both elements of the Hebrew title. Per doctrine, YHWH is rendered 'the LORD'; in this compound construction, 'GOD' is the standard equivalent signaling the divine name.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: '''Hosts'' is the established and sufficiently transparent rendering for צְבָאוֹת in the divine title, encompassing heavenly and earthly armies without over-specifying one domain.'
- source_word: בַּיּוֹם הַהוּא
  chosen: In that day
  alternatives:
  - On that day
  lexicon: HALOT
  rationale: A standard temporal formula in prophetic literature. 'In that day' preserves the prophetic register and idiom naturally in English.
- source_word: לִבְכִי
  chosen: for weeping
  alternatives:
  - to weeping
  lexicon: HALOT
  rationale: The prefixed ל marks the content or purpose of the call. 'For weeping' coordinates naturally with the following infinitive-like nouns in English.
- source_word: וּלְמִסְפֵּד
  chosen: for mourning
  alternatives:
  - for lamentation
  - for wailing
  lexicon: HALOT
  rationale: מִסְפֵּד denotes lamentation associated with grief, often public mourning. 'Mourning' is clear modern English and fits the sequence of grief expressions.
- source_word: וּלְקָרְחָה
  chosen: for baldness
  alternatives:
  - for shaving the head
  - for making oneself bald
  lexicon: HALOT
  rationale: The noun refers to baldness as a mourning sign. 'For baldness' is formally close to the Hebrew; the more explicit alternatives interpret the ritual action behind the result.
- source_word: וְלַחֲגֹר שָׂק
  chosen: for putting on sackcloth
  alternatives:
  - for girding on sackcloth
  - for wearing sackcloth
  lexicon: HALOT
  rationale: The infinitive חגר means to gird on or fasten around oneself. 'Putting on sackcloth' communicates the mourning practice in natural modern English without losing the concrete action.
- source_word: שָׂק
  chosen: sackcloth
  alternatives:
  - coarse cloth
  lexicon: HALOT
  rationale: The standard biblical term for rough mourning attire. 'Sackcloth' remains understandable and preserves the cultural-religious resonance of the Hebrew.
