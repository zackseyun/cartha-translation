theological_decisions:
- issue: Pronoun shift in the participial clauses
  chosen_reading: Retain the Hebrew shift to third person ('his tomb ... for himself')
    rather than harmonizing all pronouns to second person.
  alternative_readings:
  - '''cutting your tomb on the height, carving a dwelling for yourself in the rock'''
  rationale: The Masoretic text moves from direct second-person address to third-person
    suffixes in the descriptive participles. Since this is not a doctrinally contested
    issue but a textual/translation one, preserving the shift best reflects original-language
    primacy and avoids silently smoothing the text. The smoother second-person rendering
    is preserved in a footnote as a plausible translation choice.
  doctrine_reference: Translation philosophy §1, §5
