id: ISA.22.16
reference: Isaiah 22:16
source:
  edition: WLC
  text: מַה לְּ/ךָ֥ פֹה֙ וּ/מִ֣י לְ/ךָ֣ פֹ֔ה כִּֽי חָצַ֧בְתָּ לְּ/ךָ֛ פֹּ֖ה קָ֑בֶר
    חֹצְבִ֤י מָרוֹם֙ קִבְר֔/וֹ חֹקְקִ֥י בַ/סֶּ֖לַע מִשְׁכָּ֥ן לֽ/וֹ־־׃
translation:
  text: What do you have here, and whom do you have here, that you have cut out a
    tomb for yourself here—cutting his tomb on the height, carving a dwelling for
    himself in the rock?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more smoothly: ''cutting your tomb on the height, carving a dwelling
      for yourself in the rock.'' The Hebrew shifts from second person to third person
      in these clauses.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַה לְּךָ פֹה
  chosen: What do you have here
  alternatives:
  - What is there for you here
  - What right do you have here
  lexicon: HALOT
  rationale: The idiom מַה לְךָ with פֹה is a confrontational question about one's
    claim or business in a place. 'What do you have here' preserves the terse challenge
    while remaining natural English; stronger interpretive expansions like 'What right
    do you have here' are possible but go beyond the bare wording.
- source_word: וּמִי לְךָ פֹה
  chosen: and whom do you have here
  alternatives:
  - and who do you have here
  - and who belongs to you here
  lexicon: HALOT
  rationale: The parallel question likely asks about family or social ties in Jerusalem.
    'Whom do you have here' keeps the personal-object sense and mirrors the Hebrew
    structure.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or result of the rebuke. In English,
    'that' after the rhetorical questions smoothly introduces the accusation without
    over-specifying the logical relation.
- source_word: חָצַבְתָּ לְּךָ פֹּה קָבֶר
  chosen: you have cut out a tomb for yourself here
  alternatives:
  - you have hewn out a tomb for yourself here
  lexicon: HALOT
  rationale: חצב commonly refers to hewing or cutting stone. 'Cut out' is more accessible
    modern English than 'hewn out' while preserving the stone-cutting image.
- source_word: חֹצְבִי
  chosen: cutting
  alternatives:
  - hewing out
  - who cuts out
  lexicon: HALOT
  rationale: The participle resumes and intensifies the accusation. Rendering it as
    'cutting' in apposition preserves the vivid ongoing action without forcing a relative
    clause.
- source_word: מָרוֹם
  chosen: on the height
  alternatives:
  - on high
  - in a high place
  lexicon: HALOT
  rationale: The noun denotes an elevated place. 'On the height' preserves the singular
    concrete image and the sense of an exalted burial location.
- source_word: קִבְרוֹ
  chosen: his tomb
  alternatives:
  - his grave
  lexicon: HALOT
  rationale: The 3ms suffix is retained as written. Although the broader context addresses
    Shebna in the second person, the shift to third person is part of the Hebrew wording
    and may reflect a vivid or slightly distancing description. It should not be harmonized
    away in translation.
- source_word: חֹקְקִי
  chosen: carving
  alternatives:
  - engraving
  - cutting
  lexicon: HALOT
  rationale: חקק here refers to inscribing or carving out of rock. 'Carving' fits
    the tomb-construction context better than the more text-oriented 'engraving.'
- source_word: בַסֶּלַע
  chosen: in the rock
  alternatives:
  - from the rock
  - into the rock
  lexicon: HALOT
  rationale: The preposition ב with סלע naturally indicates location/material in this
    context. 'In the rock' is idiomatic for a rock-cut tomb.
- source_word: מִשְׁכָּן לוֹ
  chosen: a dwelling for himself
  alternatives:
  - a resting place for himself
  - a habitation for himself
  lexicon: HALOT
  rationale: מִשְׁכָּן literally means dwelling place. In funerary context it refers
    ironically to a permanent resting place. 'Dwelling' preserves the lexical force
    and the irony better than flattening it to 'grave' again.
