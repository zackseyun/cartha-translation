theological_decisions:
- issue: Metaphorical force of the verse
  chosen_reading: The verse depicts Eliakim as the support on whom the entire prestige
    and dependent members of his family will be hung, using the image of household
    vessels hung on a peg.
  alternative_readings:
  - A purely literal description of objects hung on a peg without family metaphor
  - A negative image emphasizing burdensome nepotism alone
  rationale: The immediate context (vv. 23–25) uses the peg metaphor explicitly. This
    verse blends family lineage language with vessel imagery, so the translation preserves
    the metaphor without forcing either a wholly positive or wholly negative interpretation
    in the main text.
