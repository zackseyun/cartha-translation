id: ISA.22.24
reference: Isaiah 22:24
source:
  edition: WLC
  text: וְ/תָל֨וּ עָלָ֜י/ו כֹּ֣ל כְּב֣וֹד בֵּית אָבִ֗י/ו הַ/צֶּֽאֱצָאִים֙ וְ/הַ/צְּפִע֔וֹת
    כֹּ֖ל כְּלֵ֣י הַ/קָּטָ֑ן מִ/כְּלֵי֙ הָֽ/אַגָּנ֔וֹת וְ/עַ֖ד כָּל כְּלֵ֥י הַ/נְּבָלִֽים׀־־׃
translation:
  text: 'And they will hang on him all the honor of his father’s house: the offspring
    and the offshoots, every small vessel, from the bowls to all the jars.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all the glory of his father’s house.”
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew likely distinguishes main descendants and lesser family branches:
      “the offspring and the offshoots.”'
    reason: cultural_note
  - marker: c
    text: Or “from the basins to all the skin-bottles.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתָלוּ
  chosen: And they will hang
  alternatives:
  - and they will hang up
  - and they will depend
  lexicon: HALOT
  rationale: The verb תלה literally means 'to hang.' In context, with objects/vessels
    listed afterward and 'on him,' the concrete image of hanging is primary, though
    it also carries the metaphor of dependence/support. 'Hang' preserves both the
    literal and figurative force.
- source_word: עָלָיו
  chosen: on him
  alternatives:
  - upon him
  lexicon: HALOT
  rationale: Straightforward preposition plus pronominal suffix. 'On him' is natural
    modern English and preserves the image of weight/support resting on Eliakim.
- source_word: כָּל כְּבוֹד בֵּית אָבִיו
  chosen: all the honor of his father’s house
  alternatives:
  - all the glory of his father’s house
  - the whole weight of his father’s house's glory
  lexicon: HALOT
  rationale: כָּבוֹד can mean 'glory,' 'honor,' or 'weightiness.' Here it refers to
    the full prestige and dependent significance of the family line attached to him.
    'Honor' communicates social standing clearly in English, while avoiding overreading
    purely visual 'glory.'
- source_word: הַצֶּאֱצָאִים
  chosen: the offspring
  alternatives:
  - the descendants
  - the issue
  lexicon: HALOT
  rationale: This noun refers to what comes forth, i.e., descendants/offspring. 'Offspring'
    is concise and natural, and pairs well with the following term as a merism for
    the family line.
- source_word: וְהַצְּפִעוֹת
  chosen: the offshoots
  alternatives:
  - the sprouts
  - the branches
  - the descendants
  lexicon: HALOT
  rationale: A rare term, likely denoting shoots/sprouts metaphorically for lesser
    branches of the family. 'Offshoots' preserves the botanical metaphor and the sense
    of secondary family branches.
- source_word: כֹּל כְּלֵי הַקָּטָן
  chosen: every small vessel
  alternatives:
  - all the little vessels
  - every minor utensil
  lexicon: HALOT
  rationale: כְּלִי is a broad term for vessel/container/article. הַקָּטָן here is
    best taken adjectivally, describing the vessels as small/lesser. The phrase extends
    the metaphor from family members to household items hanging on a peg.
- source_word: מִכְּלֵי הָאַגָּנוֹת
  chosen: from the bowls
  alternatives:
  - from the basins
  lexicon: HALOT
  rationale: אַגָּנוֹת denotes bowls or basins. 'Bowls' is more idiomatic in a list
    contrasting smaller and larger vessels, though 'basins' is possible.
- source_word: וְעַד כָּל כְּלֵי הַנְּבָלִים
  chosen: to all the jars
  alternatives:
  - to all the skin-bottles
  - to all the harps
  lexicon: HALOT
  rationale: In this context of containers/vessels, נְבָלִים is best understood as
    jars/large containers or skin-bottles, not musical instruments ('harps'). 'Jars'
    gives a clear modern equivalent and fits the progression of household vessels.
