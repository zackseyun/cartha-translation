theological_decisions:
- issue: Metaphorical portrayal of Eliakim's role
  chosen_reading: Retain the concrete imagery of a peg and a throne rather than interpretively
    paraphrasing it as political stability or honor.
  alternative_readings:
  - Paraphrase as a secure leader who brings honor to his family
  rationale: The verse uses layered metaphor to describe establishment and honor.
    Preserving the imagery maintains the literary and theological texture of the prophecy
    without importing a narrower interpretive conclusion.
  doctrine_reference: Translation philosophy §§1, 3, 6
