id: ISA.22.23
reference: Isaiah 22:23
source:
  edition: WLC
  text: וּ/תְקַעְתִּ֥י/ו יָתֵ֖ד בְּ/מָק֣וֹם נֶאֱמָ֑ן וְ/הָיָ֛ה לְ/כִסֵּ֥א כָב֖וֹד
    לְ/בֵ֥ית אָבִֽי/ו׃
translation:
  text: And I will drive him in like a peg into a secure place, and he will become
    a throne of honor to his father's house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fasten him like a peg in a firm place.'
    reason: lexical_alternative
  - marker: b
    text: '''Throne of honor'' may also be rendered ''glorious throne'' or ''seat
      of honor.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּתְקַעְתִּיו
  chosen: I will drive him in
  alternatives:
  - I will fasten him
  - I will fix him
  lexicon: HALOT
  rationale: The verb תקע in this context of a יתד ('peg') conveys driving or fastening
    something into place. 'Drive him in' preserves the concrete image more vividly
    than the more traditional but slightly abstract 'fasten him,' while still fitting
    natural English.
- source_word: יָתֵד
  chosen: peg
  alternatives:
  - stake
  - nail
  lexicon: HALOT
  rationale: '''Peg'' best matches the image of something driven into a wall or firm
    place to support weight. ''Nail'' is possible in some English traditions, but
    ''peg'' better reflects the larger support image in context.'
- source_word: בְּמָקוֹם נֶאֱמָן
  chosen: into a secure place
  alternatives:
  - in a firm place
  - in a faithful place
  lexicon: HALOT
  rationale: מָקוֹם is 'place,' and נֶאֱמָן here describes reliability, firmness,
    or security. 'Secure place' communicates the sense idiomatically in modern English.
    'Faithful place' would be too literal and unnatural here.
- source_word: וְהָיָה
  chosen: he will become
  alternatives:
  - he will be
  lexicon: HALOT
  rationale: The verb היה can mean either 'be' or 'become' depending on context. Here
    the future result of YHWH's action is in view, so 'become' slightly clarifies
    the consequential sense without overtranslating.
- source_word: לְכִסֵּא כָבוֹד
  chosen: a throne of honor
  alternatives:
  - a glorious throne
  - a seat of honor
  lexicon: HALOT
  rationale: כִּסֵּא is literally 'throne' or 'seat,' and כָבוֹד denotes honor/glory.
    'Throne of honor' preserves the metaphor and avoids flattening it to merely 'seat
    of honor.' 'Glorious throne' is possible but shifts the nuance from bestowed honor
    to status-bearing dignity.
- source_word: לְבֵית אָבִיו
  chosen: to his father's house
  alternatives:
  - for his father's house
  - for the house of his father
  lexicon: HALOT
  rationale: The phrase indicates benefit or relation to his ancestral household.
    'To his father's house' is a natural rendering of the lamed here, though 'for'
    is also possible. The chosen wording keeps the Hebrew structure relatively close
    while remaining readable.
