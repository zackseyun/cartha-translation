id: ISA.22.11
reference: Isaiah 22:11
source:
  edition: WLC
  text: וּ/מִקְוָ֣ה עֲשִׂיתֶ֗ם בֵּ֚ין הַ/חֹ֣מֹתַ֔יִם לְ/מֵ֖י הַ/בְּרֵכָ֣ה הַ/יְשָׁנָ֑ה
    וְ/לֹ֤א הִבַּטְתֶּם֙ אֶל עֹשֶׂ֔י/הָ וְ/יֹצְרָ֥/הּ מֵֽ/רָח֖וֹק לֹ֥א רְאִיתֶֽם׀־׃
translation:
  text: You made a reservoir between the two walls for the waters of the old pool,
    but you did not look to its Maker, nor did you see the one who formed it long
    ago.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from afar.' The Hebrew phrase may denote spatial distance, but here
      likely means 'long ago,' referring to God's prior planning or forming.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְוָה
  chosen: reservoir
  alternatives:
  - collection
  - pool
  lexicon: HALOT
  rationale: In this context of waterworks and fortification, the noun refers to a
    constructed gathering place for water rather than abstract 'hope.' 'Reservoir'
    best conveys an engineered water-collection structure.
- source_word: בֵּין הַחֹמֹתַיִם
  chosen: between the two walls
  alternatives:
  - between the walls
  lexicon: HALOT
  rationale: The dual form explicitly indicates two walls, likely an inner and outer
    defensive structure. The translation preserves the dual nuance.
- source_word: לְמֵי הַבְּרֵכָה הַיְשָׁנָה
  chosen: for the waters of the old pool
  alternatives:
  - for the water of the old pool
  - for the waters of the old reservoir
  lexicon: HALOT
  rationale: מֵי is a plural construct commonly rendered 'waters of.' בְּרֵכָה denotes
    a pool/reservoir; here 'pool' distinguishes it from מִקְוָה and fits the likely
    reference to an existing water source.
- source_word: הִבַּטְתֶּם אֶל
  chosen: look to
  alternatives:
  - looked toward
  - regarded
  lexicon: HALOT
  rationale: The idiom means more than physical sight; it conveys directing attention
    or regard toward someone. 'Look to' preserves both literal and relational force
    in context.
- source_word: עֹשֶׂיהָ
  chosen: its Maker
  alternatives:
  - the one who made it
  - its maker
  lexicon: HALOT
  rationale: The participle with 3fs suffix refers to the one who made 'it,' most
    naturally the city/waterworks situation under divine sovereignty. Capitalizing
    'Maker' signals reference to God in English without adding content beyond the
    context.
- source_word: יֹצְרָהּ
  chosen: the one who formed it
  alternatives:
  - its Former
  - the one who fashioned it
  lexicon: HALOT
  rationale: יצר often carries the sense of shaping or forming with intentionality.
    'Formed' preserves the verbal imagery and echoes prophetic diction about God's
    purposeful ordering.
- source_word: מֵרָחוֹק
  chosen: long ago
  alternatives:
  - from afar
  - from long ago
  lexicon: HALOT
  rationale: In prophetic usage this phrase can denote temporal remoteness, especially
    in reference to God's long-established purpose, not merely spatial distance. 'Long
    ago' best fits the parallel with divine making/forming here.
- source_word: לֹא רְאִיתֶם
  chosen: nor did you see
  alternatives:
  - you did not perceive
  - you did not regard
  lexicon: HALOT
  rationale: Retaining 'see' preserves the parallelism with 'look to' while allowing
    the context to imply failure of spiritual perception.
