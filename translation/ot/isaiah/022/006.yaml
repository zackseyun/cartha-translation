id: ISA.22.6
reference: Isaiah 22:6
source:
  edition: WLC
  text: וְ/עֵילָם֙ נָשָׂ֣א אַשְׁפָּ֔ה בְּ/רֶ֥כֶב אָדָ֖ם פָּֽרָשִׁ֑ים וְ/קִ֥יר עֵרָ֖ה
    מָגֵֽן׃
translation:
  text: And Elam bore the quiver with chariots, men, and horsemen, and Kir uncovered
    the shield.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with chariots of men and horsemen' or 'in chariots with men and horsemen.'
      The Hebrew troop listing is compressed, and the exact relation among 'chariots,'
      'men,' and 'horsemen' is difficult to express neatly in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'laid bare the shield' or 'bared the shield,' likely meaning prepared
      the shield for battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵילָם
  chosen: Elam
  lexicon: HALOT
  rationale: Proper place/people name; transliterated per philosophy for names.
- source_word: נָשָׂא
  chosen: bore
  alternatives:
  - carried
  - lifted
  lexicon: HALOT
  rationale: Common military idiom here for taking up or carrying equipment into battle.
    'Bore' is concise and fits the martial context better than the more generic 'carried'.
- source_word: אַשְׁפָּה
  chosen: the quiver
  alternatives:
  - quiver
  lexicon: HALOT
  rationale: Refers to an arrow-case/quiver. English idiom prefers the definite article
    here in a military description.
- source_word: בְּרֶכֶב אָדָם פָּרָשִׁים
  chosen: with chariots, men, and horsemen
  alternatives:
  - in chariots with men and horsemen
  - with chariots of men and horsemen
  lexicon: HALOT
  rationale: The preposition ב can be rendered instrumentally/associatively. The sequence
    is compressed Hebrew military listing. 'With chariots, men, and horsemen' preserves
    the catalog-like force without over-resolving the syntax. אָדָם is taken in its
    ordinary sense 'men' rather than a proper name or abstract 'humankind' because
    it appears in a troop enumeration.
- source_word: אָדָם
  chosen: men
  alternatives:
  - man
  - humankind
  lexicon: HALOT
  rationale: In this context of military forces, the noun most naturally denotes human
    troops. This follows the doctrine's default of rendering אָדָם according to context.
- source_word: פָּרָשִׁים
  chosen: horsemen
  alternatives:
  - cavalry
  lexicon: HALOT
  rationale: More formally corresponds to mounted riders; 'cavalry' is possible but
    slightly more interpretive and collective.
- source_word: קִיר
  chosen: Kir
  lexicon: HALOT
  rationale: Proper place/people name; transliterated.
- source_word: עֵרָה
  chosen: uncovered
  alternatives:
  - laid bare
  - bared
  lexicon: HALOT
  rationale: The verb means to make bare/uncover. In military context it likely refers
    to preparing the shield for battle, but 'uncovered' preserves the lexical image
    without importing too much interpretation.
- source_word: מָגֵן
  chosen: the shield
  alternatives:
  - shield
  lexicon: HALOT
  rationale: Singular collective or representative singular is natural in Hebrew military
    description. English can retain 'the shield' to preserve the image.
