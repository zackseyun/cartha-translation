id: ISA.22.5
reference: Isaiah 22:5
source:
  edition: WLC
  text: כִּ֣י יוֹם֩ מְהוּמָ֨ה וּ/מְבוּסָ֜ה וּ/מְבוּכָ֗ה לַֽ/אדֹנָ֧/י יְהוִ֛ה צְבָא֖וֹת בְּ/גֵ֣יא חִזָּי֑וֹן מְקַרְקַ֥ר קִ֖ר וְ/שׁ֥וֹעַ אֶל הָ/הָֽר־׃
translation:
  text: For it is a day of tumult and trampling and confusion from the Lord GOD of Armies in the Valley of Vision, a battering down of the wall and a cry to the mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the Lord GOD of Armies' or 'belonging to the Lord GOD of Armies'; the Hebrew preposition can mark relation/possession as well as source.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a battering down of the wall'; the verb form is difficult and may also be understood as 'breaking down' or 'demolishing.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and shouting toward the mountain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding lament/oracle. 'For' fits the discourse flow naturally in English.
- source_word: יוֹם
  chosen: day
  lexicon: HALOT
  rationale: Straightforward temporal noun; retained literally.
- source_word: מְהוּמָה
  chosen: tumult
  alternatives:
  - panic
  - uproar
  lexicon: HALOT
  rationale: Conveys noisy disorder and public upheaval. 'Tumult' preserves the prophetic tone better than the more psychological 'panic'.
- source_word: מְבוּסָה
  chosen: trampling
  alternatives:
  - treading down
  - subjugation
  lexicon: HALOT
  rationale: From a root associated with trampling/treading down. 'Trampling' keeps the vivid physical image and matches the series of disaster nouns.
- source_word: מְבוּכָה
  chosen: confusion
  alternatives:
  - perplexity
  - disorder
  lexicon: HALOT
  rationale: Best captures the state of disorientation in judgment context; also preserves the assonant triad of calamities without overinterpreting.
- source_word: לַאדֹנָי יְהוִה צְבָאוֹת
  chosen: from the Lord GOD of Armies
  alternatives:
  - for the Lord GOD of Armies
  - belonging to the Lord GOD of Armies
  lexicon: HALOT
  rationale: The prefixed ל can indicate possession or relation ('a day belonging to'), but in context of judgment 'from' communicates source/agency clearly in English. 'Lord GOD' renders אֲדֹנָי יְהוִה conventionally, and צְבָאוֹת is translated as 'of Armies' rather than transliterated to preserve meaning.
- source_word: בְּגֵיא חִזָּיוֹן
  chosen: in the Valley of Vision
  lexicon: HALOT
  rationale: Proper/place designation retained literally. Capitalization reflects a title-like place name in context.
- source_word: מְקַרְקַר
  chosen: a battering down
  alternatives:
  - breaking down
  - demolishing
  lexicon: HALOT
  rationale: The form is difficult, but in context it denotes destructive action. 'A battering down' preserves the verbal force while fitting the nominal sequence of the verse.
- source_word: קִיר
  chosen: the wall
  alternatives:
  - wall
  lexicon: HALOT
  rationale: Singular collective/definite sense works best in English for a city's fortification under assault.
- source_word: וְשׁוֹעַ
  chosen: and a cry
  alternatives:
  - and shouting
  - and an outcry
  lexicon: HALOT
  rationale: Noun denoting a cry/outcry. 'A cry' is concise and suits the parallelism with the preceding devastation.
- source_word: אֶל הָהָר
  chosen: to the mountain
  alternatives:
  - toward the mountain
  - to the hill country
  lexicon: HALOT
  rationale: Retains the directional phrase literally. The exact nuance is debated, so a simple rendering avoids overinterpretation while preserving the image.
