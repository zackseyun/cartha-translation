id: ISA.22.25
reference: Isaiah 22:25
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא נְאֻם֙ יְהוָ֣ה צְבָא֔וֹת תָּמוּשׁ֙ הַ/יָּתֵ֔ד הַ/תְּקוּעָ֖ה
    בְּ/מָק֣וֹם נֶאֱמָ֑ן וְ/נִגְדְּעָ֣ה וְ/נָפְלָ֗ה וְ/נִכְרַת֙ הַ/מַּשָּׂ֣א אֲשֶׁר
    עָלֶ֔י/הָ כִּ֥י יְהוָ֖ה דִּבֵּֽר־׃ס
translation:
  text: On that day, declares the LORD of hosts, the peg fastened in a secure place
    will give way, and it will be cut down and fall, and the load that was on it will
    be cut off, for the LORD has spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the nail fastened in a firm place.'
    reason: lexical_alternative
  - marker: b
    text: '''Load'' could also be rendered ''burden''; the Hebrew refers to what was
      hanging on the peg.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְאֻם יְהוָה צְבָאוֹת
  chosen: declares the LORD of hosts
  alternatives:
  - oracle of the LORD of hosts
  - utterance of the LORD of hosts
  lexicon: HALOT
  rationale: נְאֻם is a prophetic speech formula best rendered idiomatically in English
    as 'declares.' יְהוָה follows the doctrinal default 'the LORD.' צְבָאוֹת is retained
    as 'of hosts,' the established and semantically broad title referring to heavenly
    armies/forces.
- source_word: תָּמוּשׁ
  chosen: will give way
  alternatives:
  - will move
  - will depart
  - will be removed
  lexicon: HALOT
  rationale: The verb from מוּשׁ conveys slipping away, moving, or giving way. In
    context of a peg fixed in a wall, 'will give way' communicates instability and
    impending failure more naturally than the more wooden 'will move.'
- source_word: הַיָּתֵד
  chosen: the peg
  alternatives:
  - the nail
  - the tent peg
  lexicon: HALOT
  rationale: יָתֵד can denote a peg or nail. Given the imagery in the immediate context
    of something fixed in a secure place and bearing weight, 'peg' is the most natural
    English choice and preserves the metaphor without over-specifying tent imagery.
- source_word: הַתְּקוּעָה
  chosen: fastened
  alternatives:
  - driven in
  - fixed
  lexicon: HALOT
  rationale: 'Passive participial sense: the peg is one that has been driven/fixed
    into place. ''Fastened'' is idiomatic and fits the image of a peg bearing a load.'
- source_word: בְּמָקוֹם נֶאֱמָן
  chosen: in a secure place
  alternatives:
  - in a firm place
  - in a faithful place
  lexicon: HALOT
  rationale: נֶאֱמָן here describes reliability/firmness rather than covenant faithfulness.
    'Secure place' communicates the metaphorical point in clear modern English.
- source_word: וְנִגְדְּעָה
  chosen: it will be cut down
  alternatives:
  - it will be chopped off
  - it will be hewn down
  lexicon: HALOT
  rationale: גדע commonly denotes cutting down or lopping off. 'Cut down' is clear
    and preserves the violent removal imagery.
- source_word: וְנָפְלָה
  chosen: and fall
  alternatives:
  - and it will fall
  lexicon: HALOT
  rationale: Simple continuation of the sequence of judgment. English style allows
    omission of the repeated pronoun after 'it will be cut down' while preserving
    the sense.
- source_word: וְנִכְרַת הַמַּשָּׂא אֲשֶׁר עָלֶיהָ
  chosen: and the load that was on it will be cut off
  alternatives:
  - and the burden that was on it will be cut off
  - and what hung on it will be destroyed
  lexicon: HALOT
  rationale: מַשָּׂא literally means load/burden. In the peg metaphor, 'load' is more
    concrete and contextually fitting than 'burden.' נִכְרַת is rendered 'will be
    cut off' to preserve the imagery of severance/destruction. The suffix on עָלֶיהָ
    refers back to the feminine noun 'peg.'
- source_word: כִּי יְהוָה דִּבֵּר
  chosen: for the LORD has spoken
  alternatives:
  - for the LORD has said
  - because the LORD has spoken
  lexicon: HALOT
  rationale: Standard prophetic closure affirming the certainty of the pronouncement.
    'Has spoken' is idiomatic and weighty in English.
