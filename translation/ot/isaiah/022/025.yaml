theological_decisions:
- issue: Referent of the peg imagery
  chosen_reading: Retain the metaphor without identifying the peg explicitly in the
    translation.
  alternative_readings:
  - The peg refers specifically to Eliakim despite the positive promises in the previous
    verses.
  - The peg refers more broadly to the house or dynasty supported by Eliakim.
  - The verse may signal reversal of the prior oracle's stability imagery.
  rationale: The Hebrew text itself does not explicitly name the referent in this
    verse. To avoid importing an interpretive resolution the text does not state,
    the translation preserves the metaphor and leaves identification to interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
