theological_decisions:
- issue: Subject shift in the second colon
  chosen_reading: Retain the Hebrew shift from first person ('I will thrust') to third
    masculine singular ('he will pull you down').
  alternative_readings:
  - 'Smooth both clauses to first person: ''I will thrust you ... and I will pull
    you down'''
  - 'Use an impersonal passive: ''you will be pulled down'''
  rationale: The Masoretic text presents a notable shift in person. Preserving it
    is more transparent to the source text and avoids silently harmonizing the clause.
    The likely referent of 'he' is God speaking of himself in shifted person or an
    indefinite agent under divine action, but the text does not explicitly resolve
    this, so the translation preserves the tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
