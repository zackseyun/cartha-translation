id: ISA.22.19
reference: Isaiah 22:19
source:
  edition: WLC
  text: וַ/הֲדַפְתִּ֖י/ךָ מִ/מַּצָּבֶ֑/ךָ וּ/מִ/מַּעֲמָֽדְ/ךָ֖ יֶהֶרְסֶֽ/ךָ׃
translation:
  text: And I will thrust you from your office, and he will pull you down from your
    station.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew shifts from 'I will thrust you' to 'he will pull you down.' Some
      translations smooth the second clause to 'I will pull you down.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַהֲדַפְתִּיךָ
  chosen: I will thrust you
  alternatives:
  - I will drive you away
  - I will push you out
  lexicon: HALOT
  rationale: The verb הדף conveys forceful pushing or thrusting away. 'Thrust you'
    preserves the physical metaphor of forcible removal while remaining natural English.
    The prefixed waw with qatal functions here with future sense in prophetic discourse,
    hence 'I will thrust.'
- source_word: מִמַּצָּבֶךָ
  chosen: from your office
  alternatives:
  - from your post
  - from your position
  lexicon: HALOT
  rationale: מַצָּב denotes a standing place, post, or official position. In context
    of Shebna's removal from authority, 'office' best captures an official role rather
    than merely a physical location.
- source_word: וּמִמַּעֲמָדְךָ
  chosen: from your station
  alternatives:
  - from your standing
  - from your position
  lexicon: HALOT
  rationale: מַעֲמָד refers to standing, station, or place of service. Rendering it
    as 'station' preserves the parallelism with מַצָּב while avoiding an overly repetitive
    'position ... position.'
- source_word: יֶהֶרְסֶךָ
  chosen: he will pull you down
  alternatives:
  - he will tear you down
  - he will cast you down
  lexicon: HALOT
  rationale: The verb הרס commonly means 'tear down' or 'demolish.' With a personal
    object in this context, the sense is metaphorical overthrow from status. 'Pull
    you down' communicates personal humiliation/removal more idiomatically in English
    while retaining the downward-force imagery. The 3ms subject is left as 'he,' reflecting
    the Hebrew form rather than smoothing to a passive.
