theological_decisions:
- issue: Referent of 'the Valley of Vision'
  chosen_reading: Retained as a literal title without identifying it in the main text
  alternative_readings:
  - A poetic designation for Jerusalem
  - A specific valley associated with Jerusalem
  rationale: The Hebrew gives the title but does not explicitly identify the referent
    in this verse. To avoid importing an interpretive conclusion into the translation,
    the phrase is translated directly and any likely identification is left to a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
