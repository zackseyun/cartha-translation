id: ISA.22.1
reference: Isaiah 22:1
source:
  edition: WLC
  text: מַשָּׂ֖א גֵּ֣יא חִזָּי֑וֹן מַה לָּ֣/ךְ אֵפ֔וֹא כִּֽי עָלִ֥ית כֻּלָּ֖/ךְ לַ/גַּגּֽוֹת־־׃
translation:
  text: 'An oracle concerning the Valley of Vision: What is the matter with you now,
    that all of you have gone up to the rooftops?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''The Valley of Vision'' is likely a poetic designation for Jerusalem,
      though the verse itself does not explicitly identify it.'
    reason: cross_reference
lexical_decisions:
- source_word: מַשָּׂא
  chosen: oracle
  alternatives:
  - burden
  - pronouncement
  lexicon: HALOT
  rationale: In prophetic headings מַשָּׂא commonly introduces a prophetic utterance
    or pronouncement. 'Oracle' is idiomatic modern English and preserves the superscriptional
    force better than the archaic-sounding 'burden.'
- source_word: גֵּיא חִזָּיוֹן
  chosen: the Valley of Vision
  alternatives:
  - Vision Valley
  - the valley of vision
  lexicon: HALOT
  rationale: 'A construct chain: ''valley of vision.'' Capitalized as a title/designation
    in this heading. ''Vision'' is retained rather than interpreted, since the phrase
    functions as a poetic place-name or epithet and may allude to Jerusalem.'
- source_word: מַה לָּךְ
  chosen: What is the matter with you
  alternatives:
  - What troubles you
  - What do you mean
  lexicon: HALOT
  rationale: This idiom asks what has happened or what is wrong. 'What is the matter
    with you' conveys the rhetorical force naturally in English without over-paraphrasing.
- source_word: אֵפוֹא
  chosen: now
  alternatives:
  - then
  - therefore
  lexicon: HALOT
  rationale: Here אֵפוֹא adds an adverbial nuance of immediacy or rhetorical emphasis.
    'Now' fits the interrogative context better than a more inferential 'therefore.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'After the rhetorical question, כִּי introduces the content/explanation
    of the question: ''that all of you have gone up...'' English ''that'' best captures
    this explanatory use.'
- source_word: עָלִית
  chosen: have gone up
  alternatives:
  - have ascended
  - went up
  lexicon: HALOT
  rationale: The verb means 'go up/ascend.' Present perfect English suits the immediate
    observed situation. 'Gone up' is natural and preserves the upward movement.
- source_word: כֻּלָּךְ
  chosen: all of you
  alternatives:
  - you all
  - your whole population
  lexicon: HALOT
  rationale: The 2nd feminine singular suffix likely addresses the city personified,
    while the sense encompasses its inhabitants collectively. 'All of you' preserves
    the collective force in natural English.
- source_word: לַגַּגּוֹת
  chosen: to the rooftops
  alternatives:
  - to the roofs
  lexicon: HALOT
  rationale: Plural 'roofs/rooftops' refers to flat house roofs used as accessible
    spaces. 'Rooftops' is the most natural modern English rendering.
