theological_decisions:
- issue: Referent of 'your brothers'
  chosen_reading: The phrase refers primarily to dispersed Israelites/kinsmen being brought from the nations, while the wording may also resonate more broadly with eschatological ingathering.
  alternative_readings:
  - It refers to converted Gentiles as the offering
  - It refers inclusively to all worshipers from the nations
  rationale: The immediate wording 'your brothers' most naturally points to Israel's own people, and the comparison with 'the sons of Israel' supports an Israel-centered ingathering image. The translation therefore preserves the familial term without resolving broader theological debates about Gentile inclusion beyond what the verse states.
  doctrine_reference: Preserve theological tension rather than resolve it.
