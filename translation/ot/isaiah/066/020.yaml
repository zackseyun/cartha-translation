id: ISA.66.20
reference: Isaiah 66:20
source:
  edition: WLC
  text: וְ/הֵבִ֣יאוּ אֶת כָּל אֲחֵי/כֶ֣ם מִ/כָּל הַ/גּוֹיִ֣ם מִנְחָ֣ה לַֽ/יהוָ֡ה בַּ/סּוּסִ֡ים וּ֠/בָ/רֶכֶב וּ/בַ/צַּבִּ֨ים וּ/בַ/פְּרָדִ֜ים וּ/בַ/כִּרְכָּר֗וֹת עַ֣ל הַ֥ר קָדְשִׁ֛/י יְרוּשָׁלִַ֖ם אָמַ֣ר יְהוָ֑ה כַּ/אֲשֶׁ֣ר יָבִיאוּ֩ בְנֵ֨י יִשְׂרָאֵ֧ל אֶת הַ/מִּנְחָ֛ה בִּ/כְלִ֥י טָה֖וֹר בֵּ֥ית יְהוָֽה־־־׀׀־׃
translation:
  text: And they will bring all your brothers from all the nations as an offering to Yahweh, on horses and in chariots and in litters and on mules and on camels, to my holy mountain Jerusalem, says Yahweh, just as the sons of Israel bring the offering in a clean vessel to the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'covered wagons' for the rare term translated 'litters.'
    reason: lexical_alternative
  - marker: b
    text: Or 'swift camels' for the rare term translated 'dromedaries.'
    reason: lexical_alternative
  - marker: c
    text: '''Brothers'' may carry a broader kinship sense here, not only male siblings.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהֵבִיאוּ
  chosen: And they will bring
  alternatives:
  - And they shall bring
  - Then they will bring
  lexicon: HALOT
  rationale: Hiphil perfect with prefixed conjunction in prophetic discourse functions futurally; 'will bring' gives natural English while preserving the causative sense of bringing.
- source_word: כָּל אֲחֵיכֶם
  chosen: all your brothers
  alternatives:
  - all your kindred
  - all your brethren
  lexicon: HALOT
  rationale: אָח commonly means 'brother(s)' and can extend to kin/fellow Israelites. Per gender-accurate policy, the masculine plural is retained as 'brothers' rather than neutralizing to 'siblings,' while the broader representative sense may be inferred from context.
- source_word: מִכָּל הַגּוֹיִם
  chosen: from all the nations
  alternatives:
  - from among all the nations
  - out of all the nations
  lexicon: HALOT
  rationale: גּוֹיִם here denotes the nations/Gentile peoples among whom the dispersed are found. 'From all the nations' is straightforward and idiomatic.
- source_word: מִנְחָה
  chosen: an offering
  alternatives:
  - a grain offering
  - a tribute offering
  - a gift offering
  lexicon: HALOT
  rationale: מִנְחָה can denote a gift, tribute, or cultic offering. Here the comparison to bringing the offering to the house of the LORD gives it a sacrificial/cultic sense, but not necessarily the technical cereal offering in a narrow sense; 'offering' best preserves the broader cultic imagery.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Follows the project's default rendering of YHWH as 'the LORD.' The preposition ל marks direction/dedication; 'to the LORD' fits the offering context.
- source_word: בַּסּוּסִים
  chosen: on horses
  alternatives:
  - by horses
  lexicon: HALOT
  rationale: Instrumental/locative beth with transport animals is naturally rendered 'on horses.'
- source_word: וּבָרֶכֶב
  chosen: in chariots
  alternatives:
  - and in wagons
  - and in chariots/vehicles
  lexicon: HALOT
  rationale: רֶכֶב commonly denotes chariotry or chariots. 'In chariots' is the standard and most likely sense in this transport list.
- source_word: וּבַצַּבִּים
  chosen: in litters
  alternatives:
  - in covered wagons
  - in palanquins
  lexicon: HALOT
  rationale: This rare term denotes some kind of conveyance. 'Litters' best fits a people-transport context and avoids overprecision; an alternative is preserved in a footnote because the exact vehicle is uncertain.
- source_word: וּבַפְּרָדִים
  chosen: on mules
  alternatives:
  - by mules
  lexicon: HALOT
  rationale: פֶּרֶד means 'mule.' 'On mules' matches the transport sequence.
- source_word: וּבַכִּרְכָּרוֹת
  chosen: on dromedaries
  alternatives:
  - in carriages
  - on swift camels
  lexicon: HALOT
  rationale: Another difficult term, often understood as swift riding animals, likely dromedaries/camels. 'Dromedaries' preserves the probable zoological sense while signaling a specific kind of camel; an alternative is footnoted due to lexical uncertainty.
- source_word: עַל הַר קָדְשִׁי יְרוּשָׁלִַם
  chosen: to my holy mountain Jerusalem
  alternatives:
  - to Jerusalem, my holy mountain
  - upon my holy mountain, Jerusalem
  lexicon: HALOT
  rationale: The phrase apposes Jerusalem to 'my holy mountain.' English smoothness favors 'to my holy mountain Jerusalem,' preserving destination and apposition without adding punctuation-heavy structure.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - declares the LORD
  - said the LORD
  lexicon: HALOT
  rationale: Prophetic messenger formula is idiomatically rendered in present tense in English. YHWH follows project default 'the LORD.'
- source_word: כַּאֲשֶׁר יָבִיאוּ
  chosen: just as ... bring
  alternatives:
  - as ... bring
  - just as ... would bring
  lexicon: HALOT
  rationale: Introduces comparison between the nations' bringing and Israel's cultic practice. 'Just as' makes the analogy explicit.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per gender-accurate policy, the masculine plural construct is retained as 'sons of Israel' rather than neutralized. This also preserves the formal, covenantal expression.
- source_word: אֶת הַמִּנְחָה
  chosen: the offering
  alternatives:
  - the grain offering
  - the gift offering
  lexicon: HALOT
  rationale: With the article, this refers generically to the cultic offering in the comparison. 'The offering' keeps consistency with the earlier מִנְחָה while fitting the temple context.
- source_word: בִּכְלִי טָהוֹר
  chosen: in a clean vessel
  alternatives:
  - in a pure vessel
  - in a ceremonially clean vessel
  lexicon: HALOT
  rationale: כְּלִי is a container/utensil/vessel; טָהוֹר denotes ritual cleanness. 'Clean vessel' is concise and readable, with ritual nuance inferable from temple context.
- source_word: בֵּית יְהוָה
  chosen: to the house of the LORD
  alternatives:
  - into the house of the LORD
  - to the temple of the LORD
  lexicon: HALOT
  rationale: '''House of the LORD'' preserves the Hebrew idiom and temple reference without interpretive expansion.'
