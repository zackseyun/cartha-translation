theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Handling the obscure cultic phrase אַחַר אחד בַּתָּוֶךְ
  chosen_reading: following one in the midst
  alternative_readings:
  - following one in the center
  - behind the one in the midst
  - following one after another
  rationale: The Hebrew is genuinely difficult and likely alludes to illicit ritual
    practice. To preserve interpretive tension rather than resolve it, the main text
    keeps the phrase relatively literal and a footnote preserves alternatives rather
    than identifying the 'one' dogmatically.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
