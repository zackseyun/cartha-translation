id: ISA.66.17
reference: Isaiah 66:17
source:
  edition: WLC
  text: הַ/מִּתְקַדְּשִׁ֨ים וְ/הַ/מִּֽטַּהֲרִ֜ים אֶל הַ/גַּנּ֗וֹת אַחַ֤ר אחד בַּ/תָּ֔וֶךְ
    אֹֽכְלֵי֙ בְּשַׂ֣ר הַ/חֲזִ֔יר וְ/הַ/שֶּׁ֖קֶץ וְ/הָ/עַכְבָּ֑ר יַחְדָּ֥ו יָסֻ֖פוּ
    נְאֻם יְהוָֽה־־׃
translation:
  text: Those who sanctify themselves and purify themselves to go into the gardens,
    following one in the midst, eating the flesh of pigs and detestable things and
    mice, shall come to an end together, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''following one in the midst.'' The phrase is difficult; it may
      refer to following a ritual leader, following one into the center, or proceeding
      one after another in a cultic rite.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַמִּתְקַדְּשִׁים
  chosen: those who sanctify themselves
  alternatives:
  - those who consecrate themselves
  - those who make themselves holy
  lexicon: HALOT
  rationale: Hitpael participle of קדשׁ denotes reflexive self-consecration/self-sanctification.
    'Sanctify themselves' preserves the reflexive and the irony that they are engaging
    in self-directed ritual preparation.
- source_word: וְהַמִּטַּהֲרִים
  chosen: and purify themselves
  alternatives:
  - and cleanse themselves
  lexicon: HALOT
  rationale: Hitpael participle of טהר is reflexive. 'Purify themselves' fits ritual
    context and pairs naturally with 'sanctify themselves.'
- source_word: אֶל הַגַּנּוֹת
  chosen: to go into the gardens
  alternatives:
  - to the gardens
  - toward the gardens
  lexicon: HALOT
  rationale: The preposition אֶל marks motion toward. In English, 'to go into the
    gardens' makes the implied movement explicit and suits the cultic setting alluded
    to in Isaiah's polemic against illicit worship in gardens.
- source_word: אַחַר אחד
  chosen: following one
  alternatives:
  - after one
  - behind one
  lexicon: HALOT
  rationale: The phrase is syntactically difficult. The most straightforward rendering
    is 'following one,' leaving the referent unspecified rather than over-interpreting
    it as a priest, leader, or idol.
- source_word: בַּתָּוֶךְ
  chosen: in the midst
  alternatives:
  - in the center
  - among them
  lexicon: HALOT
  rationale: Literally 'in the midst/middle.' Retained in a relatively formal way
    because the phrase is part of the verse's difficult cultic description and should
    not be overly smoothed.
- source_word: אֹכְלֵי
  chosen: eating
  alternatives:
  - who eat
  lexicon: HALOT
  rationale: Participle continuing the description of the group. 'Eating' links smoothly
    to the preceding participial chain in English.
- source_word: בְּשַׂר הַחֲזִיר
  chosen: the flesh of pigs
  alternatives:
  - pig's flesh
  - the flesh of swine
  lexicon: HALOT
  rationale: '''Pigs'' is clear modern English; ''flesh'' preserves the concrete Hebrew
    noun בשר.'
- source_word: הַשֶּׁקֶץ
  chosen: detestable things
  alternatives:
  - abominations
  - unclean things
  lexicon: HALOT
  rationale: שׁקץ refers to something detestable, especially ritually abhorrent. 'Detestable
    things' is accessible modern English and avoids importing a broader moral category
    than the context requires.
- source_word: הָעַכְבָּר
  chosen: mice
  alternatives:
  - rats
  lexicon: HALOT
  rationale: The Hebrew term commonly denotes mouse/mice. 'Mice' is the safer lexical
    choice; 'rats' is possible in some contexts but less certain.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - all together
  lexicon: HALOT
  rationale: Adverb emphasizing the collective fate of the offenders.
- source_word: יָסֻפוּ
  chosen: shall come to an end
  alternatives:
  - shall perish
  - shall be consumed
  lexicon: HALOT
  rationale: From סוף, here indicating being brought to an end/destroyed. 'Shall come
    to an end' preserves the lexical sense without over-specifying the mode of judgment.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. Per doctrine, יְהוָה is rendered 'the LORD.'
    'Declares' is idiomatic and suitably weighty in English.
