theological_decisions:
- issue: Nature of divine response in judgment
  chosen_reading: God judicially chooses punitive treatment corresponding to the people's
    prior choices.
  alternative_readings:
  - God chooses their own delusions/depraved acts as a form of handing them over
  rationale: The immediate context and the pairing with 'I will bring their fears
    upon them' favor a judgment/recompense sense rather than attributing moral evil
    to God as his chosen object. This preserves the text's retributive irony without
    importing a stronger theological system than the verse states.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
