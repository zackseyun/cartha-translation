id: ISA.66.4
reference: Isaiah 66:4
source:
  edition: WLC
  text: גַּם אֲנִ֞י אֶבְחַ֣ר בְּ/תַעֲלֻלֵי/הֶ֗ם וּ/מְגֽוּרֹתָ/ם֙ אָבִ֣יא לָ/הֶ֔ם יַ֤עַן
    קָרָ֨אתִי֙ וְ/אֵ֣ין עוֹנֶ֔ה דִּבַּ֖רְתִּי וְ/לֹ֣א שָׁמֵ֑עוּ וַ/יַּעֲשׂ֤וּ הָ/רַע֙
    בְּ/עֵינַ֔/י וּ/בַ/אֲשֶׁ֥ר לֹֽא חָפַ֖צְתִּי בָּחָֽרוּ־־׃ס
translation:
  text: So I also will choose harsh treatment for them, and I will bring their fears
    upon them, because I called and no one answered, I spoke and they did not listen;
    but they did what was evil in my eyes, and chose what I did not delight in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mockeries,' 'delusions,' or 'abusive dealings' for 'harsh treatment'
      (Heb. תַעֲלֻלֵיהֶם). The Hebrew term is difficult and may denote severe or mocking
      treatment as judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'what they dread' for 'their fears.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם אֲנִי
  chosen: So I also
  alternatives:
  - I also
  - Even I
  lexicon: HALOT
  rationale: 'גַּם with the independent pronoun adds emphatic correspondence: as they
    chose what God did not desire, so God also chooses their recompense. ''So I also''
    brings out the responsive force in context better than a bare ''I also.'''
- source_word: אֶבְחַר
  chosen: will choose
  alternatives:
  - choose
  - select
  lexicon: HALOT
  rationale: 'Qal of בחר is straightforwardly ''choose.'' Retaining the same English
    verb later for בָּחָרוּ preserves the deliberate irony: they chose what God did
    not desire, so he chooses their punishment.'
- source_word: בְּתַעֲלֻלֵיהֶם
  chosen: harsh treatment
  alternatives:
  - mockeries
  - delusions
  - abusive dealings
  - calamities
  lexicon: HALOT
  rationale: תַּעֲלוּלִים/תַּעֲלֻלִים can denote wanton acts, capricious dealings,
    or harsh/mocking treatment. In this judgment context, with God as subject of 'choose,'
    the sense is not that God chooses their sins but that he chooses punitive treatment
    corresponding to them. 'Harsh treatment' communicates the judicial sense in readable
    English without overcommitting to 'mockery.'
- source_word: וּמְגוּרֹתָם
  chosen: their fears
  alternatives:
  - what they dread
  - their terrors
  lexicon: HALOT
  rationale: From גור/מגור, the noun denotes dread or the object of dread. 'Their
    fears' is concise and idiomatic, while the following 'bring ... upon them' makes
    clear that what they fear becomes their experienced judgment.
- source_word: אָבִיא לָהֶם
  chosen: I will bring ... upon them
  alternatives:
  - I will bring to them
  - I will cause to come upon them
  lexicon: HALOT
  rationale: The idiom in judgment contexts is naturally rendered in English with
    'upon them,' making the adverse force explicit though still faithful to the Hebrew
    construction.
- source_word: יַעַן
  chosen: because
  alternatives:
  - since
  - on account of the fact that
  lexicon: HALOT
  rationale: Causal conjunction introducing the grounds for judgment; 'because' is
    the clearest modern English equivalent.
- source_word: קָרָאתִי וְאֵין עוֹנֶה
  chosen: I called and no one answered
  alternatives:
  - I called and there was no answer
  lexicon: HALOT
  rationale: The participle עוֹנֶה after אֵין yields the idiomatic sense that no one
    responded. 'No one answered' is natural and preserves the personal refusal.
- source_word: דִּבַּרְתִּי וְלֹא שָׁמֵעוּ
  chosen: I spoke and they did not listen
  alternatives:
  - I spoke and they did not hear
  lexicon: HALOT
  rationale: While שׁמע can be 'hear,' in prophetic rebuke it commonly carries the
    sense of heeding/listening. 'Did not listen' better conveys culpable refusal rather
    than mere auditory failure.
- source_word: וַיַּעֲשׂוּ הָרַע בְּעֵינַי
  chosen: they did what was evil in my eyes
  alternatives:
  - they did evil in my sight
  - they did the evil in my eyes
  lexicon: HALOT
  rationale: This is a standard Hebrew evaluative formula. 'What was evil in my eyes'
    preserves the idiom while remaining understandable; 'in my sight' would also work,
    but 'eyes' keeps the Hebrew imagery.
- source_word: וּבַאֲשֶׁר לֹא חָפַצְתִּי בָּחָרוּ
  chosen: and chose what I did not delight in
  alternatives:
  - and chose that in which I took no pleasure
  - and chose what I did not desire
  lexicon: HALOT
  rationale: חפץ denotes taking pleasure in, desiring, or delighting in. 'Did not
    delight in' preserves the volitional-affective nuance and forms a deliberate contrast
    with their 'choosing.'
