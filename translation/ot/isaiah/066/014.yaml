theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of the final clause וְזָעַם אֶת אֹיְבָיו
  chosen_reading: but he will be indignant against his enemies
  alternative_readings:
  - and he will be indignant against his enemies
  rationale: The conjunction can be rendered simply 'and,' but in English the clause
    sets a clear contrast between favor toward servants and wrath toward enemies.
    'But' makes that contrast explicit without changing the underlying sense.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
