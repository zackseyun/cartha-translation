id: ISA.66.14
reference: Isaiah 66:14
source:
  edition: WLC
  text: וּ/רְאִיתֶם֙ וְ/שָׂ֣שׂ לִבְּ/כֶ֔ם וְ/עַצְמוֹתֵי/כֶ֖ם כַּ/דֶּ֣שֶׁא תִפְרַ֑חְנָה
    וְ/נוֹדְעָ֤ה יַד יְהוָה֙ אֶת עֲבָדָ֔י/ו וְ/זָעַ֖ם אֶת אֹיְבָֽי/ו־־־׃
translation:
  text: You will see, and your heart will rejoice; your bones will flourish like the
    grass. The hand of the LORD will be made known to his servants, but he will be
    indignant against his enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he will be indignant against his enemies.' The Hebrew conjunction
      can be read simply as 'and'; 'but' in the main text brings out the contrast
      with the previous clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּרְאִיתֶם
  chosen: You will see
  alternatives:
  - And you will see
  - When you see
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions
    naturally as a future/resultative statement. 'You will see' is the most straightforward
    English rendering.
- source_word: וְשָׂשׂ לִבְּכֶם
  chosen: your heart will rejoice
  alternatives:
  - your heart shall be glad
  - your heart will exult
  lexicon: HALOT
  rationale: The singular verb with singular collective subject 'heart' is idiomatic.
    'Rejoice' is clear modern English and preserves the emotional force without overstating
    it.
- source_word: וְעַצְמוֹתֵיכֶם
  chosen: your bones
  alternatives:
  - your very bones
  lexicon: HALOT
  rationale: Literal 'bones' is retained because the Hebrew image conveys deep, embodied
    renewal rather than merely physical anatomy; no paraphrase is needed.
- source_word: כַּדֶּשֶׁא תִפְרַחְנָה
  chosen: will flourish like the grass
  alternatives:
  - will sprout like fresh grass
  - will bloom like the grass
  lexicon: HALOT
  rationale: דשא denotes grass/green growth, and פרח conveys budding/flourishing.
    'Flourish like the grass' preserves the simile and reads naturally in English.
- source_word: וְנוֹדְעָה יַד יְהוָה
  chosen: The hand of the LORD will be made known
  alternatives:
  - the hand of the LORD will be known
  - the LORD's hand will become evident
  lexicon: HALOT
  rationale: 'The Niphal of ידע is best rendered as passive/resultative: God''s hand
    becomes manifest or recognized. ''Hand'' is retained as a biblical idiom for active
    power/intervention. Per doctrine, יְהוָה is rendered ''the LORD.'''
- source_word: אֶת עֲבָדָיו
  chosen: to his servants
  alternatives:
  - for his servants
  - among his servants
  lexicon: HALOT
  rationale: With נודעה, the relation can be expressed in English as manifestation
    directed toward or on behalf of the servants. 'To his servants' best matches the
    sense of disclosure/manifestation without overinterpreting. 'Servants' is preferred
    here over 'slaves' because bonded status is not the salient point in this context.
- source_word: וְזָעַם
  chosen: he will be indignant
  alternatives:
  - he will show indignation
  - he will be enraged
  - he will rebuke angrily
  lexicon: HALOT
  rationale: The verb conveys wrath/indignation. 'Be indignant' preserves divine anger
    without importing a more specific action than the Hebrew states.
- source_word: אֶת אֹיְבָיו
  chosen: against his enemies
  alternatives:
  - toward his enemies
  - with his enemies
  lexicon: HALOT
  rationale: English idiom requires 'against' with this sense of hostile indignation.
    The object marks those who are the target of divine wrath.
