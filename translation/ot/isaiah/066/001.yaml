id: ISA.66.1
reference: Isaiah 66:1
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה הַ/שָּׁמַ֣יִם כִּסְאִ֔/י וְ/הָ/אָ֖רֶץ הֲדֹ֣ם רַגְלָ֑/י
    אֵי זֶ֥ה בַ֨יִת֙ אֲשֶׁ֣ר תִּבְנוּ לִ֔/י וְ/אֵי זֶ֥ה מָק֖וֹם מְנוּחָתִֽ/י־־־׃
translation:
  text: 'Thus says the LORD: Heaven is my throne, and the earth is my footstool. What
    kind of house would you build for me, and what place would be my resting place?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What house could you build for me?' The Hebrew question is rhetorical
      and may emphasize the inadequacy of any house humans might build for God.
    reason: lexical_alternative
  - marker: b
    text: '''House'' likely alludes to the temple, but the Hebrew word itself is ''house.'''
    reason: cultural_note
  - marker: c
    text: Or 'my place of rest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal
    prophetic cadence without sounding archaic beyond normal biblical English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for YHWH, following Jewish reverence tradition and
    longstanding English Bible convention.
- source_word: הַשָּׁמַיִם
  chosen: Heaven
  alternatives:
  - The heavens
  - sky
  lexicon: HALOT
  rationale: Although morphologically plural, the referent here is the cosmic realm
    contrasted with 'the earth.' Singular 'Heaven' is idiomatic in English and fits
    the throne imagery. 'The heavens' is possible but less natural here.
- source_word: כִּסְאִי
  chosen: my throne
  lexicon: HALOT
  rationale: Direct, literal rendering of the royal metaphor.
- source_word: וְהָאָרֶץ
  chosen: and the earth
  lexicon: HALOT
  rationale: Straightforward coordinate contrast with 'Heaven.'
- source_word: הֲדֹם רַגְלָי
  chosen: my footstool
  alternatives:
  - the stool for my feet
  lexicon: HALOT
  rationale: Established and accurate English equivalent for the idiom; concise and
    natural.
- source_word: אֵי זֶה
  chosen: What kind of
  alternatives:
  - Where is the
  - What is this
  lexicon: HALOT
  rationale: The interrogative phrase here asks not for location but for the sort
    or adequacy of a house/place humans could provide for God. 'What kind of' brings
    out the rhetorical force better than a wooden 'Where is this house' or overly
    literal 'What is this house.'
- source_word: בַיִת
  chosen: house
  alternatives:
  - temple
  lexicon: HALOT
  rationale: Literal 'house' is retained because the Hebrew does not explicitly say
    'temple,' though the temple is clearly in view by implication. Using 'temple'
    in the main text would over-specify.
- source_word: אֲשֶׁר תִּבְנוּ לִי
  chosen: would you build for me
  alternatives:
  - you build for me
  - could you build for me
  lexicon: HALOT
  rationale: English conditional 'would you build' best conveys the rhetorical challenge
    implied by the Hebrew imperfect in context.
- source_word: מָקוֹם
  chosen: place
  alternatives:
  - site
  lexicon: HALOT
  rationale: Simple and natural rendering.
- source_word: מְנוּחָתִי
  chosen: my resting place
  alternatives:
  - my rest
  - my place of rest
  lexicon: HALOT
  rationale: '''Resting place'' is idiomatic and preserves the noun''s sense of a
    place associated with rest, fitting the parallel with ''house.'''
