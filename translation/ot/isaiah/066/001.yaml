theological_decisions:
- issue: Whether to render בַיִת as 'house' or explicitly as 'temple'
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: The verse critiques any human attempt to contain God, with the temple
    concept implied but not lexically stated. Retaining 'house' preserves the Hebrew
    wording and the broader theological force, while allowing readers to infer the
    temple context.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; do not import claims the text does not make.'
