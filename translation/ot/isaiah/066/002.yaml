id: ISA.66.2
reference: Isaiah 66:2
source:
  edition: WLC
  text: וְ/אֶת כָּל אֵ֨לֶּה֙ יָדִ֣/י עָשָׂ֔תָה וַ/יִּהְי֥וּ כָל אֵ֖לֶּה נְאֻם יְהוָ֑ה וְ/אֶל זֶ֣ה אַבִּ֔יט אֶל עָנִי֙ וּ/נְכֵה ר֔וּחַ וְ/חָרֵ֖ד עַל דְּבָרִֽ/י־־־־־־־־׃
translation:
  text: 'My hand made all these things, and so all these things came to be, declares Yahweh. But to this one I will look: to the poor and contrite in spirit, and the one who trembles at my word.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the afflicted and broken in spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדִי עָשָׂתָה
  chosen: My hand made
  alternatives:
  - my hand has made
  - my hand did/made
  lexicon: HALOT
  rationale: A straightforward rendering preserves the anthropomorphic expression and the perfect verb's completed action. 'Made' is idiomatic and fits the creation context.
- source_word: כָּל אֵלֶּה
  chosen: all these things
  alternatives:
  - all these
  - all this
  lexicon: HALOT
  rationale: The demonstrative plural refers back to the heavens and earth in the previous verse; 'things' is supplied in English for clarity.
- source_word: וַיִּהְיוּ
  chosen: came to be
  alternatives:
  - were
  - existed
  - came into being
  lexicon: HALOT
  rationale: The verb היה here expresses resultant existence. 'Came to be' captures the sense that these things exist because God made them, avoiding the flatter English 'were'.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - utterance of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Declares the LORD' is natural modern English and preserves prophetic solemnity. YHWH is rendered 'the LORD' per doctrine.
- source_word: וְאֶל זֶה אַבִּיט
  chosen: But to this one I will look
  alternatives:
  - Yet to this one I will look
  - to this one I will pay attention
  - to this one I will regard
  lexicon: HALOT
  rationale: The construction marks contrast with God's universal creatorship and identifies the person who receives his favorable regard. 'But' makes the contrast explicit in English; 'look' preserves the Hebrew idiom better than a more interpretive gloss.
- source_word: עָנִי
  chosen: the poor
  alternatives:
  - the afflicted
  - the humble
  - the needy
  lexicon: HALOT
  rationale: The adjective often denotes one who is poor, afflicted, or humble. Here 'poor' preserves the lexical core while allowing the spiritual-moral nuance to be carried by the surrounding phrase.
- source_word: נְכֵה רוּחַ
  chosen: contrite in spirit
  alternatives:
  - stricken in spirit
  - broken in spirit
  - smitten in spirit
  lexicon: HALOT
  rationale: The phrase denotes one whose spirit is crushed or wounded. 'Contrite in spirit' is idiomatic English that conveys humbled brokenness without sounding overly wooden.
- source_word: חָרֵד עַל דְּבָרִי
  chosen: the one who trembles at my word
  alternatives:
  - who trembles at my words
  - who is in dread at my word
  - who trembles because of my word
  lexicon: HALOT
  rationale: This expression conveys reverent fear before God's spoken word. Singular 'word' matches the Hebrew suffix form and works idiomatically in English.
