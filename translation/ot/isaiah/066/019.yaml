id: ISA.66.19
reference: Isaiah 66:19
source:
  edition: WLC
  text: וְ/שַׂמְתִּ֨י בָ/הֶ֜ם א֗וֹת וְ/שִׁלַּחְתִּ֣י מֵ/הֶ֣ם פְּ֠לֵיטִים אֶֽל הַ/גּוֹיִ֞ם
    תַּרְשִׁ֨ישׁ פּ֥וּל וְ/ל֛וּד מֹ֥שְׁכֵי קֶ֖שֶׁת תֻּבַ֣ל וְ/יָוָ֑ן הָ/אִיִּ֣ים הָ/רְחֹקִ֗ים
    אֲשֶׁ֨ר לֹא שָׁמְע֤וּ אֶת שִׁמְעִ/י֙ וְ/לֹא רָא֣וּ אֶת כְּבוֹדִ֔/י וְ/הִגִּ֥ידוּ
    אֶת כְּבוֹדִ֖/י בַּ/גּוֹיִֽם׀־־־־־־׃
translation:
  text: And I will set a sign among them, and from them I will send survivors to the
    nations—to Tarshish, Pul, and Lud, who draw the bow; to Tubal and Javan; to the
    distant coastlands that have not heard of my fame and have not seen my glory—and
    they will declare my glory among the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in them' or 'on them' for 'among them'; the Hebrew preposition allows
      more than one nuance.
    reason: lexical_alternative
  - marker: b
    text: '''Who draw the bow'' may be taken as describing Lud specifically; some
      render more generally ''archers.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'the faraway islands'; the Hebrew term can refer to islands or coastlands,
      especially distant maritime regions.
    reason: lexical_alternative
  - marker: d
    text: Or 'have not heard my report/renown.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  chosen: And I will set
  alternatives:
  - And I will place
  - And I will put
  lexicon: HALOT
  rationale: שׂים commonly means 'set/put/place.' 'Set' is idiomatic with 'sign' in
    English and preserves the deliberate divine action.
- source_word: בָהֶם
  chosen: among them
  alternatives:
  - in them
  - on them
  lexicon: HALOT
  rationale: The preposition ב can mean 'in/on/among.' Here 'among them' best fits
    the collective referent and avoids over-specifying whether the sign is internal
    or physically upon individuals.
- source_word: אוֹת
  chosen: a sign
  alternatives:
  - a mark
  - a signal
  lexicon: HALOT
  rationale: אוֹת often denotes a sign, token, or distinguishing mark. 'Sign' is the
    broadest and most biblically natural rendering, preserving ambiguity about its
    exact nature.
- source_word: וְשִׁלַּחְתִּי
  chosen: and ... I will send
  alternatives:
  - and ... I will dispatch
  lexicon: HALOT
  rationale: שׁלח in the piel/qal domain commonly means 'send.' 'Dispatch' is possible
    but less natural in modern Bible English.
- source_word: מֵהֶם
  chosen: from them
  alternatives:
  - out of them
  lexicon: HALOT
  rationale: The phrase indicates the survivors are sent out from the previously mentioned
    group. 'From them' is concise and accurate.
- source_word: פְּלֵיטִים
  chosen: survivors
  alternatives:
  - escapees
  - those who escape
  - refugees
  lexicon: HALOT
  rationale: פְּלֵיטִים denotes those who have escaped or survived. 'Survivors' is
    natural English and fits the prophetic context of remnant after judgment.
- source_word: אֶל הַגּוֹיִם
  chosen: to the nations
  alternatives:
  - to the Gentiles
  - to the peoples
  lexicon: HALOT
  rationale: גּוֹיִם here refers to foreign nations generally, not specifically a
    Jew/Gentile theological contrast. 'Nations' is the most contextually appropriate
    rendering.
- source_word: תַּרְשִׁישׁ פּוּל וְלוּד ... תֻּבַל וְיָוָן
  chosen: Tarshish, Pul, and Lud ... Tubal and Javan
  lexicon: HALOT
  rationale: 'These are place/people names and are transliterated per project philosophy:
    translate titles, transliterate names.'
- source_word: מֹשְׁכֵי קֶשֶׁת
  chosen: who draw the bow
  alternatives:
  - archers
  - drawers of the bow
  lexicon: HALOT
  rationale: Literally 'drawers of the bow.' 'Who draw the bow' preserves the Hebrew
    image more closely than the compressed 'archers,' while remaining readable. It
    most naturally modifies Lud in apposition.
- source_word: הָאִיִּים הָרְחֹקִים
  chosen: the distant coastlands
  alternatives:
  - the faraway islands
  - the distant shores
  lexicon: HALOT
  rationale: אִיִּים can denote islands/coastlands, especially distant maritime lands
    in prophetic diction. 'Coastlands' is a standard and contextually broad rendering;
    'distant' captures הָרְחֹקִים.
- source_word: אֲשֶׁר לֹא שָׁמְעוּ אֶת שִׁמְעִי
  chosen: that have not heard of my fame
  alternatives:
  - that have not heard my report
  - that have not heard my renown
  lexicon: HALOT
  rationale: שֵׁמַע/שִׁמְעִי here is not merely the act of hearing but what is heard
    about God—his report, renown, or fame. 'Heard of my fame' communicates that sense
    naturally in English.
- source_word: וְלֹא רָאוּ אֶת כְּבוֹדִי
  chosen: and have not seen my glory
  lexicon: HALOT
  rationale: כָּבוֹד is consistently rendered 'glory' in divine contexts. The perfects
    describe nations not yet exposed to YHWH's manifested glory.
- source_word: וְהִגִּידוּ
  chosen: and they will declare
  alternatives:
  - and they will proclaim
  - and they will tell
  lexicon: HALOT
  rationale: נגד in the hifil means to tell, declare, announce. 'Declare' fits the
    solemn missionary-prophetic tone.
- source_word: אֶת כְּבוֹדִי בַּגּוֹיִם
  chosen: my glory among the nations
  alternatives:
  - my glory to the nations
  - my glory among the Gentiles
  lexicon: HALOT
  rationale: ב here is best rendered 'among,' indicating proclamation within the nations.
    Repeating 'nations' maintains consistency with earlier גּוֹיִם.
