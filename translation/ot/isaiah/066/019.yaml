theological_decisions:
- issue: Nature of the divine 'sign' placed 'among them'
  chosen_reading: Retain the generic 'a sign' without specifying whether it is a miraculous
    token, a mark on persons, or a banner-like sign.
  alternative_readings:
  - a mark on them
  - a banner among them
  rationale: The Hebrew does not define the sign's exact form. Preserving the ambiguity
    avoids importing a doctrinal or interpretive conclusion not explicit in the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Referent of 'them' and 'from them'
  chosen_reading: Translate neutrally without identifying the group beyond the pronoun.
  alternative_readings:
  - the survivors from Israel/Judah specifically
  - the worshipers just mentioned
  rationale: The immediate context may suggest a particular group, but this verse
    itself uses pronouns without explicit restatement. The translation should not
    narrow the referent beyond the Hebrew wording.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    ambiguity where genuine.'
