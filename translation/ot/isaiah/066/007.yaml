theological_decisions:
- issue: Referent of the woman
  chosen_reading: Kept as an untranslated feminine singular pronoun ('she') without
    specifying Zion/Jerusalem in the main text.
  alternative_readings:
  - Zion
  - Jerusalem
  - the people of God
  rationale: The immediate literary context points to Zion/Jerusalem, but the verse
    itself uses only a feminine singular verb/pronoun sequence. To preserve the text's
    imagery and avoid importing an interpretive gloss into the translation, the referent
    remains implicit.
  doctrine_reference: Preserve theological tension rather than resolve it.
