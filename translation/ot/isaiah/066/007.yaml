id: ISA.66.7
reference: Isaiah 66:7
source:
  edition: WLC
  text: בְּ/טֶ֥רֶם תָּחִ֖יל יָלָ֑דָה בְּ/טֶ֨רֶם יָב֥וֹא חֵ֛בֶל לָ֖/הּ וְ/הִמְלִ֥יטָה
    זָכָֽר׃
translation:
  text: Before she was in labor, she gave birth; before pain came upon her, she delivered
    a son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before birth pangs came upon her.'
    reason: lexical_alternative
  - marker: b
    text: The 'she' refers to Zion/Jerusalem in the surrounding context.
    reason: cross_reference
lexical_decisions:
- source_word: בְּטֶרֶם
  chosen: Before
  alternatives:
  - Before ever
  - Prior to
  lexicon: HALOT
  rationale: Temporal particle meaning 'before' or 'not yet when.' Simple 'Before'
    is natural modern English and preserves the repeated temporal emphasis.
- source_word: תָּחִיל
  chosen: she was in labor
  alternatives:
  - she travailed
  - she writhed
  lexicon: HALOT
  rationale: From חול in the sense of writhing/laboring. In this childbirth context,
    'was in labor' communicates the idiom clearly in contemporary English better than
    archaic 'travailed,' while retaining the onset of birth pains.
- source_word: יָלָדָה
  chosen: she gave birth
  alternatives:
  - she bore
  - she delivered
  lexicon: HALOT
  rationale: Standard verb for bearing/giving birth. 'She gave birth' is the clearest
    modern equivalent.
- source_word: יָבֹא
  chosen: came upon
  alternatives:
  - came
  - befell
  lexicon: HALOT
  rationale: With חֵבֶל + לָהּ, the sense is that labor pain comes to her. 'Came upon
    her' makes the dative explicit in idiomatic English.
- source_word: חֵבֶל
  chosen: pain
  alternatives:
  - labor pain
  - birth pang
  - travail
  lexicon: HALOT
  rationale: In this context חבל refers to labor pains/birth pangs. Because the verse
    already mentions labor in the first clause, 'pain' avoids awkward repetition while
    still conveying childbirth pain. The fuller alternative 'birth pang' is preserved
    in a footnote.
- source_word: וְהִמְלִיטָה
  chosen: she delivered
  alternatives:
  - she brought forth
  - she gave birth to
  lexicon: HALOT
  rationale: Hiphil of מלט here idiomatically means to bring forth/deliver a child.
    'She delivered' varies the English naturally while matching the childbirth sense.
- source_word: זָכָר
  chosen: a son
  alternatives:
  - a male child
  - a male
  lexicon: HALOT
  rationale: Literally 'male.' In an immediate birth context, idiomatic English is
    'a son.' This preserves the masculine specificity required by the source rather
    than neutralizing it.
