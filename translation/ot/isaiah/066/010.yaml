id: ISA.66.10
reference: Isaiah 66:10
source:
  edition: WLC
  text: שִׂמְח֧וּ אֶת יְרוּשָׁלִַ֛ם וְ/גִ֥ילוּ בָ֖/הּ כָּל אֹהֲבֶ֑י/הָ שִׂ֤ישׂוּ אִתָּ/הּ֙
    מָשׂ֔וֹשׂ כָּל הַ/מִּֽתְאַבְּלִ֖ים עָלֶֽי/הָ־־־׃
translation:
  text: Rejoice with Jerusalem and be glad in her, all you who love her; exult with
    her in exultation, all you who mourn over her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Rejoice over Jerusalem.' The Hebrew construction with אֶת after 'rejoice'
      can be understood as marking Jerusalem as the object of rejoicing, though the
      parallel phrases 'in her' and 'with her' favor the sense of shared joy.
    reason: lexical_alternative
  - marker: b
    text: Or 'exult with her with joy' / 'rejoice with her greatly.' The Hebrew uses
      a cognate noun after the verb for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂמְחוּ
  chosen: Rejoice
  alternatives:
  - Be glad
  lexicon: HALOT
  rationale: Imperative plural from שׂמח, a common verb for rejoicing. 'Rejoice' fits
    the imperative force and pairs well with the following distinct verb for gladness/exultation.
- source_word: אֶת יְרוּשָׁלַםִ
  chosen: with Jerusalem
  alternatives:
  - over Jerusalem
  - for Jerusalem
  lexicon: HALOT
  rationale: Although אֵת often marks the direct object, with verbs of rejoicing it
    can introduce the one with whom or over whom joy is expressed. 'With Jerusalem'
    best fits the parallel בָהּ and אִתָּהּ later in the verse, emphasizing shared
    joy rather than merely Jerusalem as object.
- source_word: וְגִילוּ
  chosen: be glad
  alternatives:
  - rejoice
  - exult
  lexicon: HALOT
  rationale: גיל conveys jubilant gladness or exultation. 'Be glad' provides natural
    English variation while preserving the intensification across the sequence of
    joy verbs.
- source_word: בָהּ
  chosen: in her
  alternatives:
  - over her
  - with her
  lexicon: HALOT
  rationale: The preposition ב normally means 'in.' Here it likely expresses rejoicing
    in relation to Jerusalem. 'In her' is formally closer to the Hebrew and preserves
    the personified-city imagery.
- source_word: כָּל אֹהֲבֶיהָ
  chosen: all you who love her
  alternatives:
  - all her lovers
  lexicon: HALOT
  rationale: The participial construction addresses those characterized by love for
    Jerusalem. 'All you who love her' is idiomatic and preserves the direct address.
- source_word: שִׂישׂוּ
  chosen: exult
  alternatives:
  - rejoice
  - be joyful
  lexicon: HALOT
  rationale: A second imperative of joy, likely stronger or more vivid. 'Exult' distinguishes
    it from the earlier שׂמח and reflects heightened celebratory force.
- source_word: אִתָּהּ
  chosen: with her
  alternatives:
  - together with her
  lexicon: HALOT
  rationale: The preposition clearly indicates accompaniment. 'With her' reinforces
    Jerusalem's personification and the communal nature of the joy.
- source_word: מָשׂוֹשׂ
  chosen: in exultation
  alternatives:
  - with joy
  - greatly
  lexicon: HALOT
  rationale: The noun denotes joy, gladness, or exultation. Rendering it as 'in exultation'
    preserves the cognate emphasis with שׂישׂוּ rather than flattening it into a generic
    adverb.
- source_word: כָּל הַמִּתְאַבְּלִים
  chosen: all you who mourn
  alternatives:
  - all the mourners
  - all who grieve
  lexicon: HALOT
  rationale: Hitpael participle from אבל, 'to mourn.' The direct-address form matches
    the verse's imperatives and vocative style.
- source_word: עָלֶיהָ
  chosen: over her
  alternatives:
  - for her
  - because of her
  lexicon: HALOT
  rationale: עַל with mourning commonly marks the object or occasion of grief. 'Over
    her' is natural English and suits lament for Jerusalem.
