id: ISA.66.18
reference: Isaiah 66:18
source:
  edition: WLC
  text: וְ/אָנֹכִ֗י מַעֲשֵׂי/הֶם֙ וּ/מַחְשְׁבֹ֣תֵי/הֶ֔ם בָּאָ֕ה לְ/קַבֵּ֥ץ אֶת כָּל
    הַ/גּוֹיִ֖ם וְ/הַ/לְּשֹׁנ֑וֹת וּ/בָ֖אוּ וְ/רָא֥וּ אֶת כְּבוֹדִֽ/י־־־׃
translation:
  text: And I—their works and their thoughts—am coming to gather all the nations and
    tongues, and they will come and see my glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is abrupt and difficult: literally, ''And I, their works and their
      thoughts, coming to gather all the nations and the tongues.'' Many understand
      the sense as ''For I know their works and their thoughts'' or ''The time is
      coming to gather all nations and tongues.'''
    reason: alternative_reading
  - marker: b
    text: Or 'languages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָנֹכִי
  chosen: And I
  alternatives:
  - For I
  - But I
  lexicon: HALOT
  rationale: Retains the emphatic independent pronoun אָנֹכִי. The prefixed conjunction
    is rendered simply as 'And' to preserve discourse flow without overinterpreting
    the connection.
- source_word: מַעֲשֵׂיהֶם
  chosen: their works
  alternatives:
  - their deeds
  lexicon: HALOT
  rationale: The noun from מעשה commonly denotes deeds/works. 'Works' preserves the
    concrete moral sense and pairs naturally with 'thoughts' in the Hebrew construction.
- source_word: וּמַחְשְׁבֹתֵיהֶם
  chosen: their thoughts
  alternatives:
  - their plans
  - their intentions
  lexicon: HALOT
  rationale: מחשבות can mean thoughts, plans, or intentions. 'Thoughts' is chosen
    because it is the broadest and most direct rendering, matching the likely divine
    knowledge/judgment context alongside 'works.'
- source_word: בָּאָה
  chosen: am coming
  alternatives:
  - has come
  - is coming
  lexicon: HALOT
  rationale: The feminine singular perfect is syntactically difficult in this verse
    and is often understood in a present/future-oriented sense in context. 'Am coming'
    gives idiomatic English that fits the following infinitive 'to gather' and the
    eschatological sequence. The unusual Hebrew form is reflected in a footnote.
- source_word: לְקַבֵּץ
  chosen: to gather
  alternatives:
  - to assemble
  lexicon: HALOT
  rationale: A straightforward rendering of קבץ. 'Gather' is idiomatic and preserves
    the image of bringing peoples together.
- source_word: כָּל־הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the Gentiles
  - all the peoples
  lexicon: HALOT
  rationale: גוים here refers to the nations collectively, not specifically 'Gentiles'
    in contrast to Jews within a narrower NT framework. 'Nations' best preserves the
    international scope.
- source_word: וְהַלְּשֹׁנוֹת
  chosen: and tongues
  alternatives:
  - and languages
  lexicon: HALOT
  rationale: Literally 'tongues'; in context it denotes language groups. 'Tongues'
    preserves the vivid Hebrew expression and its traditional pairing with 'nations,'
    while remaining understandable in modern English.
- source_word: וּבָאוּ
  chosen: they will come
  alternatives:
  - and they shall come
  - and they came
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction in this prophetic sequence is rendered
    futurally in English to match the eschatological context and the following verb.
- source_word: וְרָאוּ
  chosen: and see
  alternatives:
  - and they will see
  - and behold
  lexicon: HALOT
  rationale: Rendered as part of the coordinated future sequence after 'they will
    come.' 'See' is the plain sense of ראה; 'behold' would sound archaic here.
- source_word: כְּבוֹדִי
  chosen: my glory
  alternatives:
  - my splendor
  - my honor
  lexicon: HALOT
  rationale: כבוד in Isaiah often carries the sense of manifest divine glory. 'My
    glory' preserves the theological weight and intertextual resonance.
