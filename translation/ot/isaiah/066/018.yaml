theological_decisions:
- issue: How to represent the difficult clause opening the verse
  chosen_reading: The speaker (God) declares awareness of or relation to 'their works
    and their thoughts' and then announces, 'I ... am coming to gather all the nations
    and tongues.'
  alternative_readings:
  - '''For I know their works and their thoughts; the time is coming to gather all
    nations and tongues'''
  - '''As for me, because of their works and their thoughts, I am coming to gather
    all nations and tongues'''
  rationale: The Hebrew text is elliptical and syntactically compressed. The translation
    preserves the MT's abruptness rather than importing 'know' or 'the time' into
    the main text, since those are interpretive expansions found in some translations.
    A footnote preserves the major alternative ways of smoothing the clause.
  doctrine_reference: Preserve theological tension rather than resolve it
