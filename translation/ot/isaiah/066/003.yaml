theological_decisions:
- issue: Nature of the comparisons between accepted sacrifices and abhorrent acts
  chosen_reading: Render the clauses as moral equivalences by supplying 'is like'
    in English rather than flattening them into simple apposition.
  alternative_readings:
  - Render as direct equations without 'like'
  - Interpret as describing hypocritical worshipers whose sacrifices are counted as
    these crimes before God
  rationale: 'The Hebrew strings participles and nouns without an explicit comparative
    particle, but the prophetic sense is clearly one of shocking equivalence: outwardly
    proper worship, when offered by the rebellious, is as offensive as forbidden or
    violent acts. Supplying ''is like'' communicates this in natural English without
    over-interpreting the mechanism of divine rejection.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; optimal equivalence'
- issue: Rendering of אָוֶן
  chosen_reading: wickedness
  alternative_readings:
  - idol
  - iniquity
  - evil
  rationale: The term can shade toward idolatry in some contexts, but the verse already
    names abominations broadly. 'Wickedness' preserves the moral-theological condemnation
    without narrowing the referent beyond what the Hebrew requires.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition'
