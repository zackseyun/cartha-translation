id: ISA.66.3
reference: Isaiah 66:3
source:
  edition: WLC
  text: שׁוֹחֵ֨ט הַ/שּׁ֜וֹר מַכֵּה אִ֗ישׁ זוֹבֵ֤חַ הַ/שֶּׂה֙ עֹ֣רֵֽף כֶּ֔לֶב מַעֲלֵ֤ה
    מִנְחָה֙ דַּם חֲזִ֔יר מַזְכִּ֥יר לְבֹנָ֖ה מְבָ֣רֵֽךְ אָ֑וֶן גַּם הֵ֗מָּה בָּֽחֲרוּ֙
    בְּ/דַרְכֵי/הֶ֔ם וּ/בְ/שִׁקּוּצֵי/הֶ֖ם נַפְשָׁ֥/ם חָפֵֽצָה־־־׃
translation:
  text: The one who slaughters an ox is like one who strikes down a man; the one who
    sacrifices a lamb, like one who breaks a dog’s neck; the one who offers a grain
    offering, like one who offers pig’s blood; the one who brings a memorial of frankincense,
    like one who blesses wickedness. They too have chosen their own ways, and their
    soul delights in their abominations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like one who blesses an idol' for 'like one who blesses wickedness';
      the Hebrew word can denote evil, iniquity, or idolatrous wickedness.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'their soul delights,' with a singular noun and verb used
      collectively for the people.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹחֵט הַשּׁוֹר
  chosen: the one who slaughters an ox
  alternatives:
  - he who kills the bull
  - one slaughtering the ox
  lexicon: HALOT
  rationale: Rendered with a participial English construction ('the one who...') to
    preserve the Hebrew participle's generic, characterizing force. שׁוֹר is best
    rendered 'ox' here as a sacrificial bovine, more natural than 'bull' without over-specifying
    sex.
- source_word: מַכֵּה אִישׁ
  chosen: is like one who strikes down a man
  alternatives:
  - kills a man
  - strikes a man
  lexicon: HALOT
  rationale: The verbless comparison is supplied idiomatically in English with 'is
    like.' מַכֵּה can mean strike/smite/kill; 'strikes down' preserves the violent
    force without making the result more explicit than the Hebrew does.
- source_word: זוֹבֵחַ הַשֶּׂה
  chosen: the one who sacrifices a lamb
  alternatives:
  - he who sacrifices the sheep
  - one sacrificing the lamb
  lexicon: HALOT
  rationale: שֶׂה can denote a sheep or goat from the flock, often a lamb/kid in sacrificial
    contexts. 'Lamb' is the most idiomatic and contextually fitting English rendering
    here.
- source_word: עֹרֵף כֶּלֶב
  chosen: like one who breaks a dog’s neck
  alternatives:
  - like one who beheads a dog
  - like one who snaps a dog's neck
  lexicon: HALOT
  rationale: The participle from ערף refers to breaking the neck, especially by a
    ritual neck-breaking action, not ordinary decapitation. 'Breaks a dog's neck'
    is the clearest natural English equivalent.
- source_word: מַעֲלֵה מִנְחָה
  chosen: the one who offers a grain offering
  alternatives:
  - he who brings an offering
  - one who offers a tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in cultic context is best rendered 'grain offering,' preserving
    the sacrificial sense rather than the broader 'gift/tribute.' מַעֲלֵה is rendered
    'offers' as standard sacrificial idiom.
- source_word: דַּם חֲזִיר
  chosen: like one who offers pig’s blood
  alternatives:
  - like swine's blood
  - like the blood of a pig
  lexicon: HALOT
  rationale: The Hebrew is a terse nominal expression in apposition/comparison. 'Pig's
    blood' is clear modern English and preserves the impurity/shock value of the image.
- source_word: מַזְכִּיר לְבֹנָה
  chosen: the one who brings a memorial of frankincense
  alternatives:
  - the one who makes a memorial offering of frankincense
  - the one who burns frankincense as a memorial
  lexicon: HALOT
  rationale: The Hiphil of זכר in sacrificial usage can denote causing remembrance,
    i.e., presenting the memorial portion. 'Brings a memorial of frankincense' preserves
    the cultic nuance without over-paraphrasing.
- source_word: מְבָרֵךְ אָוֶן
  chosen: like one who blesses wickedness
  alternatives:
  - like one who blesses an idol
  - like one who blesses iniquity
  - like one who invokes evil
  lexicon: HALOT
  rationale: אָוֶן commonly denotes wickedness, trouble, or idolatrous evil depending
    on context. Here the parallel with abhorrent worship favors a morally charged
    rendering. 'Blesses wickedness' preserves the starkness and avoids importing a
    specific idol term not present in the consonantal text.
- source_word: גַּם הֵמָּה בָּחֲרוּ בְּדַרְכֵיהֶם
  chosen: They too have chosen their own ways
  alternatives:
  - Even they have chosen their ways
  - They also chose their own paths
  lexicon: HALOT
  rationale: 'גַּם הֵמָּה adds emphasis: these worshipers themselves are implicated.
    ''Their own ways'' captures the self-directed, rebellious nuance in context.'
- source_word: וּבְשִׁקּוּצֵיהֶם נַפְשָׁם חָפֵצָה
  chosen: and their soul delights in their abominations
  alternatives:
  - and they delight in their detestable things
  - and their inner being takes pleasure in their abominations
  lexicon: HALOT
  rationale: שִׁקּוּצִים are detestable/abominable things, often idolatrous objects
    or practices. 'Abominations' preserves the prophetic register. The singular נַפְשָׁם
    with 3fs verb is a collective construction; 'their soul delights' is formally
    close while still intelligible.
