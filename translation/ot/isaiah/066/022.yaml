id: ISA.66.22
reference: Isaiah 66:22
source:
  edition: WLC
  text: כִּ֣י כַ/אֲשֶׁ֣ר הַ/שָּׁמַ֣יִם הַ֠/חֳדָשִׁים וְ/הָ/אָ֨רֶץ הַ/חֲדָשָׁ֜ה אֲשֶׁ֨ר
    אֲנִ֥י עֹשֶׂ֛ה עֹמְדִ֥ים לְ/פָנַ֖/י נְאֻם יְהוָ֑ה כֵּ֛ן יַעֲמֹ֥ד זַרְעֲ/כֶ֖ם וְ/שִׁמְ/כֶֽם־׃
translation:
  text: For just as the new heavens and the new earth that I am making shall remain
    before me, declares the LORD, so your offspring and your name shall remain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stand' / 'endure' for both occurrences of the verb עמד ('stand, remain').
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement; 'For'
    fits the discourse connection naturally in English.
- source_word: כַאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Marks a comparison that is completed by כֵּן later in the verse; 'just
    as ... so' preserves the correlative structure.
- source_word: הַשָּׁמַיִם הַחֳדָשִׁים וְהָאָרֶץ הַחֲדָשָׁה
  chosen: the new heavens and the new earth
  alternatives:
  - new heavens and a new earth
  lexicon: HALOT
  rationale: 'Definite articles are present on both nouns and adjectives in Hebrew.
    English idiom commonly renders this expression with definiteness on both elements:
    ''the new heavens and the new earth.'''
- source_word: עֹשֶׂה
  chosen: am making
  alternatives:
  - make
  - will make
  lexicon: HALOT
  rationale: The participle expresses ongoing or imminent divine action. 'Am making'
    preserves the participial aspect better than a simple future while remaining natural
    English.
- source_word: עֹמְדִים
  chosen: shall remain
  alternatives:
  - stand
  - are standing
  - endure
  lexicon: HALOT
  rationale: With inanimate subjects ('heavens' and 'earth') and the phrase 'before
    me,' the sense is continuance or enduring existence rather than literal posture.
    'Shall remain' communicates this clearly in modern English.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in my presence
  lexicon: HALOT
  rationale: A standard rendering that preserves the relational and spatial sense
    without overinterpreting.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A conventional prophetic formula. 'Declares the LORD' is readable modern
    English and preserves prophetic solemnity. 'the LORD' follows the doctrinal default
    for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering for the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Completes the comparison begun by כַאֲשֶׁר; 'so' is the most natural
    concise equivalent in English.
- source_word: יַעֲמֹד
  chosen: shall remain
  alternatives:
  - shall stand
  - shall endure
  lexicon: HALOT
  rationale: Uses the same English verb as עֹמְדִים earlier in the verse to preserve
    lexical consistency and the comparison's force. Singular Hebrew verb likely agrees
    with the compound sense collectively.
- source_word: זַרְעֲכֶם
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: '''Offspring'' is natural modern English and preserves the collective
    singular sense of זֶרַע better than ''descendants,'' while avoiding the archaic
    feel of ''seed'' in this context.'
- source_word: וְשִׁמְכֶם
  chosen: and your name
  alternatives:
  - and your renown
  lexicon: HALOT
  rationale: The Hebrew is literally 'your name.' While it can imply enduring identity
    or renown, the text itself uses the concrete term, which should be preserved in
    the main text.
