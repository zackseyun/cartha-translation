theological_decisions:
- issue: Eschatological expression 'new heavens and new earth'
  chosen_reading: Retained as a direct cosmic-renewal expression without narrowing
    it to either purely literal cosmology or merely metaphorical restoration.
  alternative_readings:
  - A strictly literal description of future creation
  - A figurative description of restored covenant order
  rationale: The Hebrew phrase is programmatic and later echoed in biblical eschatological
    contexts. The translation preserves the wording and theological breadth rather
    than resolving the interpretive question.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of the endurance promised to 'your offspring and your name'
  chosen_reading: Rendered as enduring continuance of the people's offspring and name
    before the LORD, without specifying whether this refers primarily to ethnic Israel
    alone, the faithful remnant, or the eschatological people of God more broadly.
  alternative_readings:
  - Ethnic-national perpetuity of Israel
  - Perpetuity of the faithful remnant
  - Extension to the eschatological people of God
  rationale: The verse itself promises enduring continuity but does not explicitly
    define the full theological scope. The translation therefore stays close to the
    Hebrew and avoids importing a denominational conclusion.
  doctrine_reference: The translation does not advocate for a particular denominational
    distinctive unless the Hebrew unambiguously supports one reading over another.
