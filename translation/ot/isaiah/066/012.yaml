id: ISA.66.12
reference: Isaiah 66:12
source:
  edition: WLC
  text: כִּֽי כֹ֣ה אָמַ֣ר יְהוָ֗ה הִנְ/נִ֣י נֹטֶֽה אֵ֠לֶי/הָ כְּ/נָהָ֨ר שָׁל֜וֹם וּ/כְ/נַ֧חַל
    שׁוֹטֵ֛ף כְּב֥וֹד גּוֹיִ֖ם וִֽ/ינַקְתֶּ֑ם עַל צַד֙ תִּנָּשֵׂ֔אוּ וְ/עַל בִּרְכַּ֖יִם
    תְּשָׁעֳשָֽׁעוּ־׀־־־׃
translation:
  text: 'For thus says the LORD: Behold, I am extending peace to her like a river,
    and the glory of the nations like an overflowing stream; and you will nurse, you
    will be carried on the hip, and you will be bounced on the knees.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wealth/abundance of the nations.' The Hebrew 'glory' can include
      the nations' splendor and riches.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will be dandled on the knees.' The Hebrew depicts affectionate,
      childlike care.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md,
    preserving the traditional English substitute for the Tetragrammaton.
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - See, I am
  - Look, I am
  lexicon: HALOT
  rationale: Retains the deictic and emphatic force of the Hebrew particle plus pronoun,
    introducing the divine action with prophetic vividness.
- source_word: נֹטֶה אֵלֶיהָ
  chosen: I am extending peace to her
  alternatives:
  - I am stretching out to her peace
  - I am turning toward her peace
  lexicon: HALOT
  rationale: The participle נֹטֶה with אֶל conveys an ongoing act of extending or
    spreading toward Zion/Jerusalem (feminine singular 'her'). 'Extending' is idiomatic
    in English while preserving the image of something being stretched out toward
    her.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  - prosperity
  lexicon: HALOT
  rationale: '''Peace'' is the standard and most recognizable rendering, while still
    allowing the fuller Hebrew sense of well-being in context.'
- source_word: כְּנָהָר
  chosen: like a river
  alternatives:
  - as a river
  lexicon: HALOT
  rationale: A straightforward simile preserving the image of abundant, steady flow.
- source_word: וּכְנַחַל שׁוֹטֵף
  chosen: like an overflowing stream
  alternatives:
  - like a flooding wadi
  - like a torrenting stream
  lexicon: HALOT
  rationale: נחל can denote a wadi/streambed, but 'stream' is more natural in English
    here; שׁוֹטֵף adds the sense of overflowing or flooding force.
- source_word: כְּבוֹד גּוֹיִם
  chosen: the glory of the nations
  alternatives:
  - the wealth of the nations
  - the abundance of the nations
  - the honor of the nations
  lexicon: HALOT
  rationale: כָּבוֹד can denote glory, honor, or material abundance. 'Glory' is the
    most direct lexical rendering and preserves the broader sense, while the context
    may include the nations' wealth and splendor. The alternative is worth preserving
    in a footnote because some translations make the implicit economic nuance explicit.
- source_word: וִינַקְתֶּם
  chosen: you will nurse
  alternatives:
  - you will suck
  - you will be nursed
  lexicon: HALOT
  rationale: The Qal form is active second masculine plural, literally 'you will suck/nurse.'
    'You will nurse' is idiomatic and keeps the maternal imagery without introducing
    a passive not present in the form.
- source_word: עַל צַד תִּנָּשֵׂאוּ
  chosen: you will be carried on the hip
  alternatives:
  - you will be carried at the side
  - you will be borne on the side
  lexicon: HALOT
  rationale: The Niphal of נשׂא is passive/reflexive here, 'be carried.' צַד in this
    maternal context refers to the side/hip where a child is carried; 'on the hip'
    communicates the image naturally in English.
- source_word: וְעַל בִּרְכַּיִם תְּשָׁעֳשָׁעוּ
  chosen: you will be bounced on the knees
  alternatives:
  - you will be dandled on the knees
  - you will be fondled on the knees
  - you will be played with on the knees
  lexicon: HALOT
  rationale: The verb conveys being treated with delight, caressed, or dandled. 'Bounced
    on the knees' is vivid, natural modern English that preserves the affectionate
    parental image better than the archaic 'dandled,' while avoiding overly vague
    wording.
