theological_decisions:
- issue: Referent of the feminine singular pronoun אֵלֶיהָ ('to her')
  chosen_reading: Retained as 'her,' referring to Zion/Jerusalem in the immediate
    context.
  alternative_readings:
  - Made explicit as 'to Jerusalem'
  - Made explicit as 'to Zion'
  rationale: The Hebrew uses a feminine singular pronominal suffix, and the immediate
    literary context identifies the maternal city. Keeping 'her' preserves the source-text
    cohesion and imagery without over-specifying beyond the verse itself.
