theological_decisions:
- issue: Nature of the judgment imagery
  chosen_reading: The verse describes the visible aftermath of divine judgment in
    terms of corpses, unending worm, and unquenched fire, without specifying in this
    verse alone a full doctrine of final punishment beyond the imagery stated.
  alternative_readings:
  - The language is purely metaphorical for shame and defeat
  - The language directly defines the mechanics of eternal conscious punishment
  rationale: The translation preserves the concrete imagery of the Hebrew text and
    does not flatten it into either a merely symbolic reading or a more systematized
    doctrinal statement than the verse itself makes. This follows the policy of preserving
    theological tension rather than resolving it beyond the text.
  doctrine_reference: Translation philosophy §3
- issue: Gender rendering of הָאֲנָשִׁים
  chosen_reading: the men
  alternative_readings:
  - the people
  - the humans
  rationale: The source uses a masculine plural noun, and the translation policy prefers
    gender-accurate renderings over neutralization unless context clearly demands
    a generic abstraction. Here the referent is a concrete group of rebels whose corpses
    are seen.
  doctrine_reference: Translation philosophy §4
