id: ISA.66.24
reference: Isaiah 66:24
source:
  edition: WLC
  text: וְ/יָצְא֣וּ וְ/רָא֔וּ בְּ/פִגְרֵי֙ הָ/אֲנָשִׁ֔ים הַ/פֹּשְׁעִ֖ים בִּ֑/י כִּ֣י
    תוֹלַעְתָּ֞/ם לֹ֣א תָמ֗וּת וְ/אִשָּׁ/ם֙ לֹ֣א תִכְבֶּ֔ה וְ/הָי֥וּ דֵרָא֖וֹן לְ/כָל
    בָּשָֽׂר־׃
translation:
  text: And they will go out and look on the corpses of the men who rebelled against
    me. For their worm will not die, and their fire will not be quenched, and they
    will be an abhorrence to all flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their maggot'; the Hebrew term can refer to a worm, grub, or maggot.
    reason: lexical_alternative
  - marker: b
    text: Or 'a horror' or 'something loathsome.'
    reason: lexical_alternative
  - marker: c
    text: '''All flesh'' is a Hebrew expression meaning all people or all humanity.'
    reason: cultural_note
lexical_decisions:
- source_word: וְיָצְאוּ
  chosen: And they will go out
  alternatives:
  - And they shall go out
  lexicon: HALOT
  rationale: Qal wayyiqtol 3cp of יצא, continuing the future-sequence sense in context.
    'Will go out' is natural modern English while preserving the movement outward.
- source_word: וְרָאוּ
  chosen: and look on
  alternatives:
  - and see
  - and look at
  lexicon: HALOT
  rationale: ראה commonly means 'see,' but with ב plus an object here it carries the
    sense of gazing upon or looking on. 'Look on' preserves the deliberate visual
    force better than the flatter 'see.'
- source_word: בְּפִגְרֵי
  chosen: the corpses of
  alternatives:
  - the dead bodies of
  - the carcasses of
  lexicon: HALOT
  rationale: פגר denotes a corpse/carcass. 'Corpses' is clear, dignified, and suitably
    stark; 'carcasses' can sound more animal-like in English.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  - the humans
  lexicon: HALOT
  rationale: אֲנָשִׁים is the masculine plural of אישׁ. Per gender-accurate policy,
    'men' is retained rather than neutralizing to 'people,' especially since the phrase
    is concrete rather than generically anthropological.
- source_word: הַפֹּשְׁעִים בִּי
  chosen: who rebelled against me
  alternatives:
  - who transgressed against me
  - who sinned against me
  lexicon: HALOT
  rationale: פשׁע conveys rebellion/transgression, often with covenantal overtones.
    'Rebelled against me' best captures the active defiance toward God expressed by
    בִּי.
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding spectacle. 'For' is concise
    and preserves the explanatory connection.
- source_word: תוֹלַעְתָּם
  chosen: their worm
  alternatives:
  - their maggot
  - the worm that feeds on them
  lexicon: HALOT
  rationale: תוֹלַעַת can denote worm/grub/maggot. 'Worm' preserves the traditional
    and intertextually significant wording, especially given later reception in Mark
    9, while remaining lexically defensible.
- source_word: לֹא תָמוּת
  chosen: will not die
  alternatives:
  - does not die
  lexicon: HALOT
  rationale: Imperfect 3fs matching the feminine singular subject 'worm.' Future English
    fits the prophetic sequence and mirrors the Hebrew verbal aspect in context.
- source_word: וְאִשָּׁם
  chosen: and their fire
  alternatives:
  - and the fire for them
  - and their burning
  lexicon: HALOT
  rationale: אשׁ with 3mp suffix is most naturally 'their fire.' The possessive need
    not imply ownership but association with their judgment.
- source_word: לֹא תִכְבֶּה
  chosen: will not be quenched
  alternatives:
  - will not go out
  - is not quenched
  lexicon: HALOT
  rationale: כבה in the Niphal/Qal passive sense is idiomatically rendered 'be quenched'
    for fire. This is standard, precise English.
- source_word: וְהָיוּ
  chosen: and they will be
  alternatives:
  - and they shall become
  lexicon: HALOT
  rationale: Simple copular/resultative sense from היה in sequence.
- source_word: דֵרָאוֹן
  chosen: an abhorrence
  alternatives:
  - a horror
  - loathsome
  lexicon: HALOT
  rationale: A rare noun denoting abhorrence or repulsive object. 'An abhorrence'
    best matches the noun form and preserves the revulsion conveyed.
- source_word: לְכָל בָּשָׂר
  chosen: to all flesh
  alternatives:
  - to all humanity
  - to everyone
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh' and in this idiom refers to all living
    people. The literal rendering preserves the Hebrew texture and broad scope; the
    idiomatic sense is still understandable in English.
