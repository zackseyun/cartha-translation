theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of כָּל בָּשָׂר
  chosen_reading: all flesh
  alternative_readings:
  - all humanity
  - all people
  rationale: The Hebrew idiom is intentionally broad and corporeal, emphasizing universal human scope without reducing the phrase to a purely abstract category. Preserving 'flesh' maintains the prophetic texture and theological weight of creaturely mortality under judgment.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #5'
