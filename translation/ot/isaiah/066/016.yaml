theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This also aligns with the verse's prophetic register and English Bible convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of כָּל בָּשָׂר
  chosen_reading: all flesh
  alternative_readings:
  - all humanity
  - all people
  rationale: The Hebrew idiom is intentionally broad and corporeal, emphasizing universal
    human scope without reducing the phrase to a purely abstract category. Preserving
    'flesh' maintains the prophetic texture and theological weight of creaturely mortality
    under judgment.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #5'
