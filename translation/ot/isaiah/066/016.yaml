id: ISA.66.16
reference: Isaiah 66:16
source:
  edition: WLC
  text: כִּ֤י בָ/אֵשׁ֙ יְהוָ֣ה נִשְׁפָּ֔ט וּ/בְ/חַרְבּ֖/וֹ אֶת כָּל בָּשָׂ֑ר וְ/רַבּ֖וּ חַֽלְלֵ֥י יְהוָֽה־־׃
translation:
  text: For by fire Yahweh will execute judgment, and by his sword, against all flesh; and many will be those slain by Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD will judge all flesh by fire and by his sword.' The Hebrew verb can be rendered more compactly as 'will judge' or more explicitly as 'will enter into judgment.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all flesh,' a prophetic idiom for all humanity in its creaturely mortality.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding context; 'For' preserves the connective force naturally in English.
- source_word: בָאֵשׁ
  chosen: by fire
  alternatives:
  - with fire
  - in fire
  lexicon: HALOT
  rationale: The preposition ב here is instrumental in context, indicating the means by which the LORD executes judgment. 'By fire' is concise and idiomatic.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נִשְׁפָּט
  chosen: will enter into judgment
  alternatives:
  - will judge
  - will execute judgment
  - will contend in judgment
  lexicon: HALOT
  rationale: The Niphal form of שׁפט here is commonly understood in context as engaging in judicial action. 'Will enter into judgment' preserves the judicial nuance more fully than the flatter 'will judge,' while remaining readable.
- source_word: וּבְחַרְבּוֹ
  chosen: and by his sword
  alternatives:
  - and with his sword
  lexicon: HALOT
  rationale: Instrumental ב again marks means. 'Sword' may be literal or metaphorical for divine warfare/judgment; the translation preserves that imagery without over-interpreting.
- source_word: אֶת כָּל בָּשָׂר
  chosen: against all flesh
  alternatives:
  - with all flesh
  - all humanity
  - all people
  lexicon: HALOT
  rationale: 'Although אֶת often marks the direct object, with נִשׁפט in this construction the sense is adversative/judicial: the LORD enters into judgment ''with/against'' all flesh. ''All flesh'' preserves the Hebrew idiom and its broad scope better than interpretive expansions like ''all humanity.'''
- source_word: וְרַבּוּ
  chosen: and many will be
  alternatives:
  - and they will be many
  - and numerous will be
  lexicon: HALOT
  rationale: 'The verb conveys becoming/multiplicity. The clause is existential in effect: the slain of the LORD will be many. This rendering is natural English while preserving emphasis on abundance.'
- source_word: חַלְלֵי יְהוָה
  chosen: those slain by the LORD
  alternatives:
  - the slain of the LORD
  - the LORD's slain
  lexicon: HALOT
  rationale: The construct phrase denotes people slain by the LORD. 'Those slain by the LORD' makes the relationship explicit for modern readers while retaining the solemn force of the Hebrew.
