theological_decisions:
- issue: Personification of Zion in birth imagery
  chosen_reading: Retain Zion as a personified mother who gives birth to her people
  alternative_readings:
  - Interpret the imagery more abstractly as restoration without explicit maternal
    personification
  rationale: The Hebrew explicitly presents Zion as a woman in labor who gives birth
    to her offspring. The translation preserves this metaphor rather than flattening
    it into a generalized statement about national restoration.
  doctrine_reference: Translation philosophy §3
- issue: Gender rendering of בָּנֶיהָ
  chosen_reading: Render collectively as 'her children' in the main text
  alternative_readings:
  - her sons
  rationale: The source form is masculine plural, but the referent is corporate offspring
    rather than specifically male descendants. Per the gender-accurate principle,
    English should match intended sense rather than mechanically preserve grammatical
    gender. The literal alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §4
