id: ISA.66.8
reference: Isaiah 66:8
source:
  edition: WLC
  text: מִֽי שָׁמַ֣ע כָּ/זֹ֗את מִ֤י רָאָה֙ כָּ/אֵ֔לֶּה הֲ/י֤וּחַל אֶ֨רֶץ֙ בְּ/י֣וֹם
    אֶחָ֔ד אִם יִוָּ֥לֵֽד גּ֖וֹי פַּ֣עַם אֶחָ֑ת כִּֽי חָ֛לָה גַּם יָלְדָ֥ה צִיּ֖וֹן
    אֶת בָּנֶֽי/הָ־־־־־׃
translation:
  text: Who has heard such a thing? Who has seen things like these? Can a land be
    brought forth in one day? Can a nation be born all at once? For as soon as Zion
    was in labor, she also gave birth to her children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'her sons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּזֹאת
  chosen: such a thing
  alternatives:
  - this
  - such
  lexicon: HALOT
  rationale: Idiomatic English after 'Who has heard' favors singular 'such a thing,'
    preserving the demonstrative force without wooden literalism.
- source_word: כָּאֵלֶּה
  chosen: things like these
  alternatives:
  - such things
  - like these
  lexicon: HALOT
  rationale: Plural demonstrative is retained; 'things like these' mirrors the Hebrew
    plural and pairs naturally with 'Who has seen.'
- source_word: הֲיּוּחַל אֶרֶץ
  chosen: Can a land be brought forth
  alternatives:
  - Can a land be born
  - Can the earth be brought forth
  lexicon: HALOT
  rationale: The verb is from חול in a passive/Hophal-like form, here in childbirth
    imagery. 'Brought forth' preserves the birth metaphor while avoiding the awkwardness
    of saying a land itself is literally 'born.' 'Land' is preferred over 'earth'
    because the parallel with 'nation' suggests a geopolitical entity rather than
    the whole world.
- source_word: אֶרֶץ
  chosen: land
  alternatives:
  - earth
  - country
  lexicon: HALOT
  rationale: In this context, parallel to 'nation' and Zion's children, 'land' best
    conveys a people-in-place reality. 'Country' is possible but slightly more modern-political
    than the Hebrew requires.
- source_word: בְּיוֹם אֶחָד
  chosen: in one day
  alternatives:
  - in a single day
  lexicon: HALOT
  rationale: Straightforward temporal expression; 'in one day' is clear and natural.
- source_word: אִם יִוָּלֵד גּוֹי
  chosen: Can a nation be born
  alternatives:
  - Shall a nation be born
  - Is a nation born
  lexicon: HALOT
  rationale: Although אִם can introduce a question in this rhetorical sequence, English
    idiom is best served by repeating 'Can' from the prior clause to make the parallelism
    explicit.
- source_word: גּוֹי
  chosen: nation
  alternatives:
  - people
  lexicon: HALOT
  rationale: '''Nation'' is the standard gloss and fits the rhetorical pairing with
    ''land.'' ''People'' would weaken the political-corporate sense.'
- source_word: פַּעַם אֶחָת
  chosen: all at once
  alternatives:
  - at one time
  - in one moment
  lexicon: HALOT
  rationale: This idiomatic rendering communicates simultaneity naturally in English
    and matches the rhetorical force of the Hebrew.
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Yet
  lexicon: HALOT
  rationale: Introduces the explanation/ground for the rhetorical questions. 'For'
    best preserves the logical connection.
- source_word: חָלָה
  chosen: was in labor
  alternatives:
  - travailed
  - went into labor
  - writhed
  lexicon: HALOT
  rationale: From חול in the sense of labor pains. 'Was in labor' is readable modern
    English and preserves the childbirth imagery without archaic diction.
- source_word: גַּם יָלְדָה
  chosen: she also gave birth
  alternatives:
  - she gave birth at once
  - she even gave birth
  lexicon: HALOT
  rationale: גַּם adds the sense 'also/even.' 'She also gave birth' keeps the Hebrew
    coordination and the surprising immediacy of the event without over-interpreting
    the timing adverbially.
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Standard transliteration of the place/personified city name, preserving
    the prophetic personification.
- source_word: בָּנֶיהָ
  chosen: her children
  alternatives:
  - her sons
  lexicon: HALOT
  rationale: Although the Hebrew form is formally masculine plural ('sons'), in context
    it functions collectively for Zion's offspring/inhabitants. 'Her children' communicates
    the representative sense in natural English while preserving the maternal imagery.
    The more literal 'sons' is preserved in a footnote for auditability.
