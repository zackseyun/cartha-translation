id: ISA.66.21
reference: Isaiah 66:21
source:
  edition: WLC
  text: וְ/גַם מֵ/הֶ֥ם אֶקַּ֛ח לַ/כֹּהֲנִ֥ים לַ/לְוִיִּ֖ם אָמַ֥ר יְהוָֽה־׃
translation:
  text: And even from them I will take some for priests and for Levites, says Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among them'; the Hebrew leaves the antecedent implicit from the previous context.
    reason: lexical_alternative
  - marker: b
    text: That is, 'for priests and for Levites' may also be rendered 'as priests and as Levites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: And even
  alternatives:
  - And also
  - Even
  lexicon: HALOT
  rationale: The conjunction plus adverb adds emphasis and continuation from the previous context. 'And even' preserves both the connective force and the surprising emphasis.
- source_word: מֵהֶם
  chosen: from them
  alternatives:
  - some of them
  - from among them
  lexicon: HALOT
  rationale: The preposition מן with pronoun indicates selection out of a group. 'From them' is formally close; the partitive sense is made explicit in English by adding 'some' with the verb phrase.
- source_word: אֶקַּח
  chosen: I will take some
  alternatives:
  - I will take
  - I will choose
  lexicon: HALOT
  rationale: לקח literally means 'take,' but in this context it denotes selecting persons for a role. 'I will take some' preserves the verbal image while making the partitive sense natural in English.
- source_word: לַכֹּהֲנִים
  chosen: for priests
  alternatives:
  - as priests
  - to be priests
  lexicon: HALOT
  rationale: The prefixed ל marks appointment or designation. 'For priests' is concise and preserves the Hebrew structure; English readers will understand the sense of appointment.
- source_word: לַלְוִיִּם
  chosen: for Levites
  alternatives:
  - as Levites
  - to be Levites
  lexicon: HALOT
  rationale: As with 'for priests,' the ל indicates designation. 'Levites' is transliterated as the standard English form for the Levitical class.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - said the LORD
  - declares the LORD
  lexicon: HALOT
  rationale: The prophetic formula often uses the perfect אמר in a present performative sense in English. 'Says the LORD' is natural and idiomatic in prophetic discourse. Per doctrine, יְהוָה is rendered 'the LORD' rather than 'Yahweh'.
