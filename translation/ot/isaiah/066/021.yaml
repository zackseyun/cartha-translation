theological_decisions:
- issue: Identity of 'them' and the scope of priestly/Levitical inclusion
  chosen_reading: The verse is translated without specifying the antecedent beyond 'them,' allowing the broader context to indicate that people from the nations are in view.
  alternative_readings:
  - The referent could be restricted more narrowly to returning Israelites among the nations.
  rationale: The Hebrew text itself does not restate the antecedent, so the translation should not import an interpretive restriction. The wording preserves the striking theological claim without resolving debates about how literally 'priests' and 'Levites' are to be understood.
  doctrine_reference: Preserve theological tension rather than resolve it.
