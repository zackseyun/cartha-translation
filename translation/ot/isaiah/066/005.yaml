id: ISA.66.5
reference: Isaiah 66:5
source:
  edition: WLC
  text: שִׁמְעוּ֙ דְּבַר יְהוָ֔ה הַ/חֲרֵדִ֖ים אֶל דְּבָר֑/וֹ אָמְרוּ֩ אֲחֵי/כֶ֨ם שֹׂנְאֵי/כֶ֜ם
    מְנַדֵּי/כֶ֗ם לְמַ֤עַן שְׁמִ/י֙ יִכְבַּ֣ד יְהוָ֔ה וְ/נִרְאֶ֥ה בְ/שִׂמְחַתְ/כֶ֖ם
    וְ/הֵ֥ם יֵבֹֽשׁוּ־־׃
translation:
  text: 'Hear the word of the LORD, you who tremble at his word: Your brothers who
    hate you, who cast you out for my name’s sake, have said, “Let the LORD be glorified,
    that we may see your joy”; but they will be put to shame.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “who exclude you” or “who banish you.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew, “Let the LORD be glorified, that we may see your joy.” The speakers
      are likely mocking the faithful; alternatively, the line may be rendered, “May
      the LORD be honored, and let us see your joy.”
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: Imperative plural of שׁמע, a standard summons to attend. 'Hear' preserves
    the prophetic register and directness.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Common prophetic expression. 'Word' preserves the established biblical
    idiom and the covenantal force of divine speech.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: הַחֲרֵדִים אֶל דְּבָרוֹ
  chosen: you who tremble at his word
  alternatives:
  - you who quake at his word
  - you who revere his word
  lexicon: HALOT
  rationale: חרד conveys trembling, often from reverent fear. 'At his word' is the
    most natural English equivalent for אֶל here while preserving the sense of response
    to divine speech.
- source_word: אָמְרוּ
  chosen: have said
  alternatives:
  - say
  - said
  lexicon: HALOT
  rationale: The qatal introduces the content of what the hostile brothers say. English
    present perfect works naturally after the vocative setup, though simple past would
    also be possible.
- source_word: אֲחֵיכֶם
  chosen: Your brothers
  alternatives:
  - Your kin
  - Your brethren
  lexicon: HALOT
  rationale: Literal familial term retained. In context it likely refers to fellow
    Israelites rather than biological siblings; 'brothers' preserves the source wording
    and social sting.
- source_word: שֹׂנְאֵיכֶם
  chosen: who hate you
  alternatives:
  - your haters
  lexicon: HALOT
  rationale: Participial form used attributively; relative clause is the clearest
    English rendering.
- source_word: מְנַדֵּיכֶם
  chosen: who cast you out
  alternatives:
  - who exclude you
  - who banish you
  - who reject you
  lexicon: HALOT
  rationale: The verb נדה in this stem can denote driving away or excluding. 'Cast
    you out' preserves the force and fits the likely social/religious exclusion in
    context.
- source_word: לְמַעַן שְׁמִי
  chosen: for my name’s sake
  alternatives:
  - because of my name
  - on account of my name
  lexicon: HALOT
  rationale: Idiomatic expression indicating the stated ground or pretext connected
    with God's name. 'For my name’s sake' is natural and preserves the theological
    weight of divine-name language.
- source_word: יִכְבַּד יְהוָה
  chosen: Let the LORD be glorified
  alternatives:
  - May the LORD be honored
  - Let the LORD show his glory
  lexicon: HALOT
  rationale: The imperfect here functions jussively in quoted speech. Passive English
    'be glorified' best captures the idiomatic force and the likely mocking or self-justifying
    tone of the speakers.
- source_word: וְנִרְאֶה בְשִׂמְחַתְכֶם
  chosen: that we may see your joy
  alternatives:
  - and let us see your joy
  - that he may appear in your joy
  lexicon: HALOT
  rationale: 'The 1cp verb נִרְאֶה is best taken as ''we may see/let us see,'' with
    ב marking the sphere/object ''in your joy'' idiomatically rendered ''your joy.''
    This yields coherent quoted speech: the mockers challenge the faithful to produce
    visible vindication. An alternative construal takes the verb as passive/reflexive
    or emends the sense toward divine appearing, but the MT morphology favors first
    person plural.'
- source_word: יֵבֹשׁוּ
  chosen: they will be put to shame
  alternatives:
  - they will be ashamed
  - they will be disgraced
  lexicon: HALOT
  rationale: בוש commonly denotes shame/disgrace. 'Be put to shame' captures the future
    reversal pronounced by the prophet.
