theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by project doctrine for the Tetragrammaton, following Jewish
    reverence tradition and common biblical English usage.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of the quoted taunt in the second colon
  chosen_reading: The hostile brothers mockingly say, 'Let the LORD be glorified,
    that we may see your joy,' after which the prophet answers, 'but they will be
    put to shame.'
  alternative_readings:
  - The line could be read less sarcastically, as a pious-sounding statement later
    overturned by the final clause.
  - Some construe וְנִרְאֶה as involving divine appearance rather than 'we may see'.
  rationale: The immediate context contrasts those who tremble at God's word with
    persecuting 'brothers' who hate and exclude them. The final clause 'but they will
    be put to shame' strongly supports reading the preceding quotation as the speech
    of the persecutors, likely ironic or taunting rather than sincere.
