theological_decisions:
- issue: Rendering the childbirth metaphor without over-literalizing or flattening it
  chosen_reading: Retain the metaphor as God's rhetorical assurance that he will not begin Zion's birth and then prevent its completion.
  alternative_readings:
  - Render more literally as 'Shall I break open and not cause to bring forth?'
  - Render more dynamically as 'Would I start the delivery and not finish it?'
  rationale: The verse uses divine childbirth imagery to affirm God's faithfulness to complete what he initiates for Zion. The chosen wording preserves the metaphor and rhetorical force without importing doctrinal conclusions beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Supplying the implied object with 'shut the womb'
  chosen_reading: Make the implied object explicit in English.
  alternative_readings:
  - '''restrain'' with no object'
  - '''hold back birth'''
  rationale: Hebrew poetry can leave the object implicit, but English requires clarification for readability. 'Shut the womb' is a natural and contextually controlled explicitation, not an added theological claim.
  doctrine_reference: Translation philosophy §§1, 6
