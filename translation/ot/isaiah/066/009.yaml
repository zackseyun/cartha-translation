id: ISA.66.9
reference: Isaiah 66:9
source:
  edition: WLC
  text: הַ/אֲנִ֥י אַשְׁבִּ֛יר וְ/לֹ֥א אוֹלִ֖יד יֹאמַ֣ר יְהוָ֑ה אִם אֲנִ֧י הַ/מּוֹלִ֛יד
    וְ/עָצַ֖רְתִּי אָמַ֥ר אֱלֹהָֽיִ/ךְ־׃ס
translation:
  text: Shall I bring to the point of birth and not cause to give birth? says the
    LORD. Or shall I, who cause to give birth, shut the womb? says your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bring to the breaking point'; the Hebrew uses childbirth imagery for
      bringing to the moment of delivery.
    reason: lexical_alternative
  - marker: b
    text: Literally 'restrain' or 'shut up'; 'shut the womb' makes the implied childbirth
      image explicit in English.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'your God' with a feminine singular 'your,' addressing Zion/Jerusalem
      as a woman in the surrounding context.
    reason: cultural_note
lexical_decisions:
- source_word: אַשְׁבִּיר
  chosen: bring to the point of birth
  alternatives:
  - bring to the breaking point
  - open the womb
  - bring to labor
  lexicon: HALOT
  rationale: The Hiphil of שׁבר here is idiomatic in childbirth imagery, referring
    to bringing a pregnancy to the crisis/point of delivery rather than literal breaking.
    'Bring to the point of birth' preserves the metaphor and makes the sense clear
    in modern English.
- source_word: אוֹלִיד
  chosen: cause to give birth
  alternatives:
  - bring forth
  - deliver
  lexicon: HALOT
  rationale: The Hiphil of ילד is causative. 'Cause to give birth' keeps the causative
    force clearer than the more traditional but less explicit 'bring forth.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention
    rooted in the LXX pattern.
- source_word: אִם
  chosen: Or shall I
  alternatives:
  - If I
  - Shall I
  lexicon: HALOT
  rationale: In this rhetorical parallelism, אִם introduces the second rhetorical
    question. Rendering it as 'Or shall I' best captures the adversative/continuative
    force in English and matches the poetic structure.
- source_word: הַמּוֹלִיד
  chosen: who cause to give birth
  alternatives:
  - who bring forth
  - the one causing birth
  lexicon: HALOT
  rationale: The article plus participle identifies God as the one who causes birth.
    'Who cause to give birth' preserves the participial force and the causative nuance.
- source_word: וְעָצַרְתִּי
  chosen: shut the womb
  alternatives:
  - restrain
  - close up
  - hold back birth
  lexicon: HALOT
  rationale: The verb עצר means to restrain or shut up. In this childbirth context,
    English idiom naturally supplies the object 'the womb,' which is implied by the
    metaphor and clarifies what is being shut.
- source_word: אֱלֹהָיִךְ
  chosen: your God
  lexicon: HALOT
  rationale: The 2nd feminine singular suffix is retained as 'your God.' English cannot
    naturally mark the feminine singular addressee in the main text, but the covenantal
    direct address is preserved.
