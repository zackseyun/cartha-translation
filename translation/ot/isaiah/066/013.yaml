id: ISA.66.13
reference: Isaiah 66:13
source:
  edition: WLC
  text: כְּ/אִ֕ישׁ אֲשֶׁ֥ר אִמּ֖/וֹ תְּנַחֲמֶ֑/נּוּ כֵּ֤ן אָֽנֹכִי֙ אֲנַ֣חֶמְ/כֶ֔ם
    וּ/בִ/ירֽוּשָׁלִַ֖ם תְּנֻחָֽמוּ׃
translation:
  text: As a man whom his mother comforts, so I will comfort you; and in Jerusalem
    you will be comforted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'As one whom his mother comforts.' The Hebrew reads 'man' (אִישׁ), using
      masculine representative language.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּאִישׁ
  chosen: As a man
  alternatives:
  - Like a man
  - As one
  lexicon: HALOT
  rationale: אִישׁ is grammatically masculine singular and here introduces the comparison.
    Following the gender-accurate principle, 'man' is retained rather than neutralizing
    to 'someone' or 'one,' since the Hebrew explicitly uses the masculine singular
    in a representative simile.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - that
  lexicon: HALOT
  rationale: The relative particle links 'man' with the following clause. In idiomatic
    English, 'whom' best fits the object relationship with 'comforts him.'
- source_word: אִמּוֹ
  chosen: his mother
  alternatives:
  - the mother
  lexicon: HALOT
  rationale: 'The noun with 3ms suffix is straightforwardly possessive: ''his mother.''
    This preserves the personal, familial image of maternal consolation.'
- source_word: תְּנַחֲמֶנּוּ
  chosen: comforts
  alternatives:
  - consoles
  lexicon: HALOT
  rationale: From נחם in the Piel, the sense is active consolation/comfort. 'Comforts'
    is the most natural and consistent rendering here, and it aligns with the repeated
    use of the same root throughout the verse.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: This marks the apodosis of the simile. 'So' is concise, natural English
    and preserves the comparison.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, but English can convey this adequately
    with normal subject position in context. An overly emphatic 'I myself' is possible
    but not necessary.
- source_word: אֲנַחֶמְכֶם
  chosen: will comfort you
  alternatives:
  - will console you
  lexicon: HALOT
  rationale: The same root נחם appears again, now with God as subject and 2mp object.
    'Will comfort you' preserves the lexical repetition and the future sense.
- source_word: וּבִירוּשָׁלַם
  chosen: and in Jerusalem
  alternatives:
  - and at Jerusalem
  lexicon: HALOT
  rationale: The prefixed preposition ב marks location. 'In Jerusalem' is the normal
    English rendering and preserves the local setting of the promised comfort.
- source_word: תְּנֻחָמוּ
  chosen: you will be comforted
  alternatives:
  - you will find comfort
  - you will be consoled
  lexicon: HALOT
  rationale: This is the passive/reflexive counterpart of the same root נחם. 'You
    will be comforted' preserves both the repeated key term and the passive sense
    better than the more interpretive 'find comfort.'
