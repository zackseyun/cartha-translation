theological_decisions:
- issue: Gendered representative language in the simile
  chosen_reading: Retain 'man' in the main text
  alternative_readings:
  - As one whom his mother comforts
  - Like someone his mother comforts
  rationale: The Hebrew uses אִישׁ, a grammatically masculine singular noun. Per the
    translation philosophy's gender-accurate principle, the English should reflect
    the source's form and representative force rather than flatten it into gender-neutral
    language. Because English readers may hear the simile generically, an inclusive
    alternative is worth preserving in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
