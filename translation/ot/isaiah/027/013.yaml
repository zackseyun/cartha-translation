theological_decisions:
- issue: Eschatological gathering imagery
  chosen_reading: Retain the prophetic image of a future regathering from Assyria and Egypt without specifying whether it is exclusively historical return, typological restoration, or final eschatological ingathering.
  alternative_readings:
  - A historical return of exiles only
  - A final eschatological ingathering only
  rationale: The verse uses prophetic 'in that day' language and restoration imagery that can encompass both historical and eschatological horizons. The translation preserves this tension rather than narrowing the referent.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Rendering of YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יְהוָה is 'the LORD.' This preserves covenantal reference in standard English Bible style and follows the doctrine table.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD'
