id: ISA.27.13
reference: Isaiah 27:13
source:
  edition: WLC
  text: וְ/הָיָ֣ה בַּ/יּ֣וֹם הַ/ה֗וּא יִתָּקַע֮ בְּ/שׁוֹפָ֣ר גָּדוֹל֒ וּ/בָ֗אוּ הָ/אֹֽבְדִים֙ בְּ/אֶ֣רֶץ אַשּׁ֔וּר וְ/הַ/נִּדָּחִ֖ים בְּ/אֶ֣רֶץ מִצְרָ֑יִם וְ/הִשְׁתַּחֲו֧וּ לַ/יהוָ֛ה בְּ/הַ֥ר הַ/קֹּ֖דֶשׁ בִּ/ירוּשָׁלִָֽם׀׃
translation:
  text: And in that day a great trumpet will be blown, and those who were perishing in the land of Assyria and those who were driven away in the land of Egypt will come and worship Yahweh on the holy mountain in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who were lost' for 'those perishing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'those banished' or 'the outcasts' for 'those driven away.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'bow down' or 'prostrate themselves' before the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will be
  alternatives:
  - And it will happen
  - And it shall come to pass
  lexicon: HALOT
  rationale: Introduces a future event formula. Rendered idiomatically as 'And in that day ... will be' rather than the archaic 'it shall come to pass,' preserving the prophetic temporal frame without unnecessary formality.
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard prophetic expression marking an eschatological or decisive future time. 'In that day' is a natural English equivalent and preserves the formulaic resonance.
- source_word: יִתָּקַע בְּשׁוֹפָר גָּדוֹל
  chosen: a great trumpet will be blown
  alternatives:
  - a great ram's horn will be blown
  - the great trumpet will be sounded
  lexicon: HALOT
  rationale: The Niphal verb indicates the trumpet is sounded/blown. 'Shofar' can be transliterated, but 'trumpet' communicates the function clearly in modern English; 'ram's horn' is more specific but less idiomatic here. The adjective גָּדוֹל is retained as 'great,' preserving both size and significance.
- source_word: וּבָאוּ
  chosen: will come
  alternatives:
  - will arrive
  lexicon: HALOT
  rationale: Simple motion verb; 'will come' is the most direct and natural rendering in context.
- source_word: הָאֹבְדִים
  chosen: those perishing
  alternatives:
  - those who were lost
  - the lost ones
  - those who are perishing
  lexicon: HALOT
  rationale: The participle from אבד can denote perishing, being lost, or being on the verge of destruction. 'Those perishing' preserves the verbal force and avoids prematurely resolving whether the emphasis is existential ruin or lostness. An alternative is preserved in a footnote because 'lost' is also plausible.
- source_word: בְּאֶרֶץ אַשּׁוּר
  chosen: in the land of Assyria
  alternatives:
  - in Assyria
  lexicon: HALOT
  rationale: Retains the explicit noun 'land,' which is present in Hebrew and contributes to the geographic concreteness.
- source_word: וְהַנִּדָּחִים
  chosen: those driven away
  alternatives:
  - those banished
  - the outcasts
  - those scattered
  lexicon: HALOT
  rationale: The passive participle from נדח conveys being driven away or banished. 'Those driven away' preserves the passive force and exile imagery without importing a narrower legal sense. 'Outcasts' is traditional but slightly interpretive; preserved in a footnote as a lexical alternative.
- source_word: בְּאֶרֶץ מִצְרָיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: As with Assyria, the explicit 'land' is retained for consistency and concreteness.
- source_word: וְהִשְׁתַּחֲווּ
  chosen: will ... worship
  alternatives:
  - will bow down
  - will prostrate themselves
  lexicon: HALOT
  rationale: The verb literally denotes bowing down/prostration, often in worship. Because the object is the LORD, 'worship' best conveys the act's religious significance in natural English, while a footnote preserves the more physical alternative.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD,' following the project's default and longstanding reverential convention.
- source_word: בְּהַר הַקֹּדֶשׁ
  chosen: on the holy mountain
  alternatives:
  - at the holy mountain
  - on the mountain of holiness
  lexicon: HALOT
  rationale: The phrase refers to Zion as the sacred mountain. 'On the holy mountain' is idiomatic and preserves the definite, cultic sense.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard transliteration of the place name; the preposition is naturally rendered 'in' with the city name.
