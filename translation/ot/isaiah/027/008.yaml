theological_decisions:
- issue: Referent of the feminine suffixes ('her')
  chosen_reading: Retain the feminine pronouns without specifying the referent in
    the main text.
  alternative_readings:
  - Israel
  - Zion
  - the vineyard/people of God personified
  rationale: The immediate literary context personifies the covenant people in feminine
    imagery, but the verse itself does not explicitly identify the referent. Preserving
    'her' maintains the Hebrew's personification and avoids importing a narrower interpretive
    decision than the text requires.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Subject shift between second person and third person
  chosen_reading: Preserve the Hebrew's shift with 'you contended' and 'he drove her
    out.'
  alternative_readings:
  - Smooth both clauses to 'you'
  - Interpret the third person as an impersonal or poetic restatement
  rationale: The Hebrew presents a noticeable shift in person. Retaining it respects
    the source text's poetic texture and avoids harmonizing what may be intentionally
    abrupt.
  doctrine_reference: Original-language primacy over translation tradition.
