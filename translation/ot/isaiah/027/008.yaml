id: ISA.27.8
reference: Isaiah 27:8
source:
  edition: WLC
  text: בְּ/סַּאסְּאָ֖ה בְּ/שַׁלְחָ֣/הּ תְּרִיבֶ֑/נָּה הָגָ֛ה בְּ/רוּח֥/וֹ הַ/קָּשָׁ֖ה
    בְּ/י֥וֹם קָדִֽים׃
translation:
  text: By measure, when you sent her away, you contended with her; he drove her out
    with his fierce wind on the day of the east wind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'With restraint' or 'In exact measure'; the Hebrew term is rare and likely
      conveys that the judgment was limited rather than annihilating.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew keeps the feminine pronoun 'her,' likely personifying Zion/Israel/the
      people as a woman.
    reason: alternative_reading
  - marker: c
    text: The 'east wind' is a stock image for a scorching, destructive wind from
      the desert.
    reason: cultural_note
lexical_decisions:
- source_word: בְּסַּאסְּאָה
  chosen: By measure
  alternatives:
  - With restraint
  - In exact measure
  lexicon: HALOT
  rationale: The rare form is commonly understood adverbially to express measured
    or limited action rather than total destruction. 'By measure' preserves the compactness
    and metaphorical force of the Hebrew while allowing the sense of restraint. Because
    the term is difficult and uncommon, alternatives worth preserving are noted.
- source_word: בְּשַׁלְחָהּ
  chosen: when you sent her away
  alternatives:
  - when you expelled her
  - in sending her away
  lexicon: HALOT
  rationale: From שלח with 3fs suffix, referring to the feminine entity previously
    in context (likely Zion/Jacob's people personified). 'Sent her away' is a natural
    English rendering that preserves the exile/judgment nuance without overinterpreting
    as divorce or annihilation.
- source_word: תְּרִיבֶנָּה
  chosen: you contended with her
  alternatives:
  - you disputed with her
  - you judged her
  lexicon: HALOT
  rationale: From ריב, often used for contending, bringing a case, or entering into
    dispute. 'Contended with her' best preserves the covenant-lawsuit/judicial flavor
    without forcing a strictly courtroom English expression.
- source_word: הָגָה
  chosen: he drove her out
  alternatives:
  - he removed her
  - he expelled her
  lexicon: HALOT
  rationale: Given the context of judgment and the following instrumental phrase 'with
    his fierce wind,' the verb is best taken as forceful removal. 'Drove her out'
    communicates decisive action and fits the imagery of scattering by wind.
- source_word: בְּרוּחוֹ
  chosen: with his wind
  alternatives:
  - with his breath
  - by his wind
  lexicon: HALOT
  rationale: רוּחַ can mean wind, breath, or spirit. Here the collocation with 'east
    wind' and the adjective 'fierce' strongly favors literal 'wind.' 'With his wind'
    keeps the imagery coherent and allows the possessive to stand.
- source_word: הַקָּשָׁה
  chosen: fierce
  alternatives:
  - harsh
  - hard
  lexicon: HALOT
  rationale: The adjective denotes severity or hardness. 'Fierce' is idiomatic with
    'wind' in English and conveys destructive intensity.
- source_word: בְּיוֹם קָדִים
  chosen: on the day of the east wind
  alternatives:
  - in the day of the east wind
  - on the day of the scorching east wind
  lexicon: HALOT
  rationale: קדים is the east wind, often associated with scorching, destructive force
    in the Hebrew Bible. The simpler 'east wind' keeps the image close to the source;
    the destructive connotation can be preserved in a footnote rather than expanded
    in the main text.
