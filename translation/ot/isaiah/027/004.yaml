id: ISA.27.4
reference: Isaiah 27:4
source:
  edition: WLC
  text: חֵמָ֖ה אֵ֣ין לִ֑/י מִֽי יִתְּנֵ֜/נִי שָׁמִ֥יר שַׁ֨יִת֙ בַּ/מִּלְחָמָ֔ה אֶפְשְׂעָ֥ה
    בָ֖/הּ אֲצִיתֶ֥/נָּה יָּֽחַד־׃
translation:
  text: I have no wrath. Who would set briers and thorns against me in battle? I would
    march against them; I would burn them up together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Who will give me briers and thorns in battle?'—an idiom expressing
      a challenge or wish for hostile opponents to be set before him.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew suffixes in 'I would march against it' and 'I would burn it'
      are singular feminine, referring collectively to 'briers and thorns.' English
      renders the sense with plural 'them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵמָה
  chosen: wrath
  alternatives:
  - fury
  - anger
  - heat
  lexicon: HALOT
  rationale: The noun denotes burning anger or wrath. 'Wrath' best preserves the intensity
    without sounding overly idiomatic. In context YHWH declares the absence of such
    anger toward his vineyard.
- source_word: אֵין לִי
  chosen: I have no
  alternatives:
  - there is not for me
  - I do not have
  lexicon: HALOT
  rationale: 'The existential construction with pronominal suffix is naturally rendered
    in English as possession: ''I have no.'' This is clearer and idiomatic while remaining
    close to the Hebrew sense.'
- source_word: מִי יִתְּנֵנִי
  chosen: Who would set ... against me
  alternatives:
  - Who will give me
  - Who would give me
  - If only someone would give me
  lexicon: HALOT
  rationale: Literally 'Who will give me,' but in this idiom the sense is a challenge
    or wish for an opponent to be put before the speaker. Rendering it as 'Who would
    set ... against me' conveys the idiomatic force in context. The more literal alternative
    is preserved in a footnote.
- source_word: שָׁמִיר שַׁיִת
  chosen: briers and thorns
  alternatives:
  - thorns and briars
  - thornbush and weed
  lexicon: HALOT
  rationale: The pair refers to thorny growth, often symbolizing what is hostile,
    useless, or fit for burning. 'Briers and thorns' is a natural English collocation
    and preserves the metaphorical force.
- source_word: בַּמִּלְחָמָה
  chosen: in battle
  alternatives:
  - in war
  - for battle
  lexicon: HALOT
  rationale: The phrase marks the hostile setting in which such briers and thorns
    would be set against YHWH. 'In battle' is concise and idiomatic.
- source_word: אֶפְשְׂעָה בָהּ
  chosen: I would march against them
  alternatives:
  - I would step through it
  - I would attack it
  - I would trample through it
  lexicon: HALOT
  rationale: The verb can denote stepping or striding through, and in this martial
    context it carries the sense of advancing against an enemy. Because the antecedent
    is the collective pair 'briers and thorns,' English shifts from singular feminine
    suffix to plural 'them.'
- source_word: אֲצִיתֶנָּה
  chosen: I would burn them up
  alternatives:
  - I would set it ablaze
  - I would kindle it
  - I would consume it by fire
  lexicon: HALOT
  rationale: The Hiphil of יצת means to set on fire or kindle. Given the collective
    antecedent, plural English is appropriate. 'Burn them up' communicates both ignition
    and destruction.
- source_word: יָּחַד
  chosen: together
  alternatives:
  - all at once
  - altogether
  lexicon: HALOT
  rationale: The adverb emphasizes comprehensive destruction in a single sweep. 'Together'
    is simple and sufficiently forceful.
