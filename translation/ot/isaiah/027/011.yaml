theological_decisions:
- issue: Referent and number in the vegetation imagery
  chosen_reading: Render the opening image collectively and smoothly in English ('When
    its harvest dries up, it is broken; women come and make a fire with it') while
    preserving the feminine singular entity and the practical sense of dried growth
    used as fuel.
  alternative_readings:
  - When its branches dry up, they are broken off; women come and burn them
  - When her harvest withers, they are broken
  rationale: The Hebrew shifts between a feminine singular possessive/object and a
    feminine plural verb, likely due to collective vegetation imagery tied to the
    broader vineyard/city/personified people context. The chosen rendering preserves
    the judgment image without over-resolving the grammar. An alternative with 'branches'
    is worth preserving because it may better reflect the immediate physical picture.
  doctrine_reference: Translation philosophy §3, §5
- issue: Divine judgment language
  chosen_reading: Retain both 'Maker' and 'the one who formed it' as parallel divine
    descriptions and render the result as withheld compassion/favor.
  alternative_readings:
  - collapse both into a single phrase such as 'God will not have mercy on them'
  rationale: 'The Hebrew intentionally uses two creation terms (עשה / יצר). Preserving
    both maintains the theological irony: the Creator of this people withholds compassion
    because of their lack of understanding. This follows optimal equivalence without
    importing denominational claims.'
  doctrine_reference: Translation philosophy §1, §5
