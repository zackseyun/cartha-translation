id: ISA.27.11
reference: Isaiah 27:11
source:
  edition: WLC
  text: בִּ/יבֹ֤שׁ קְצִירָ/הּ֙ תִּשָּׁבַ֔רְנָה נָשִׁ֕ים בָּא֖וֹת מְאִיר֣וֹת אוֹתָ֑/הּ
    כִּ֣י לֹ֤א עַם בִּינוֹת֙ ה֔וּא עַל כֵּן֙ לֹֽא יְרַחֲמֶ֣/נּוּ עֹשֵׂ֔/הוּ וְ/יֹצְר֖/וֹ
    לֹ֥א יְחֻנֶּֽ/נּוּ־־־׃ס
translation:
  text: When its harvest dries up, it is broken; women come and make a fire with it.
    For this is not a people of understanding; therefore its Maker will not have compassion
    on it, and the one who formed it will show it no favor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its branches' or 'its boughs' for 'its harvest'; the Hebrew term normally
      means 'harvest,' but here likely refers to the vine's cut growth that dries
      out and is used as fuel.
    reason: lexical_alternative
  - marker: b
    text: Or 'women come and burn it' / 'set it alight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּיבֹשׁ
  chosen: when ... dries up
  alternatives:
  - in drying up
  - when ... withers
  lexicon: HALOT
  rationale: 'The prefixed ב plus infinitive/verb form is taken temporally: ''when
    it dries up'' or ''when it withers.'' ''Dries up'' fits the agricultural image
    with קְצִירָהּ (''its harvest/branches cut for harvest'') and leads naturally
    into the breaking of dry material.'
- source_word: קְצִירָהּ
  chosen: its harvest
  alternatives:
  - its branches
  - its boughs
  - what is cut from it
  lexicon: HALOT
  rationale: קָצִיר normally denotes 'harvest,' but in this context of vegetation
    later broken and burned, many understand it metonymically of the cut growth/branches.
    I retained 'harvest' in the main text to stay close to the Hebrew while allowing
    the following pronouns to refer to the vine/city imagery as a feminine entity.
    The branch nuance is preserved in a footnote.
- source_word: תִּשָּׁבַרְנָה
  chosen: it is broken
  alternatives:
  - they are broken
  - they break off
  lexicon: HALOT
  rationale: The feminine plural verb formally agrees with a plural sense latent in
    the vegetation ('branches/shoots'), but English can naturally render the image
    collectively as 'it is broken' with the feminine singular object that follows.
    This avoids awkwardness while preserving the sense of brittle, dried growth being
    snapped.
- source_word: נָשִׁים בָּאוֹת
  chosen: women come
  alternatives:
  - women are coming
  lexicon: HALOT
  rationale: A straightforward rendering of the participial/sequential action. The
    image is of ordinary women gathering the dried growth, underscoring worthlessness
    and judgment.
- source_word: מְאִירוֹת אוֹתָהּ
  chosen: make a fire with it
  alternatives:
  - set it alight
  - burn it
  - kindle it
  lexicon: HALOT
  rationale: The Hiphil of אור here carries the sense of causing to burn/give light,
    i.e., using it as fuel. 'Make a fire with it' communicates the idiomatic force
    in natural English better than the wooden 'light it up,' while staying close to
    the concrete image.
- source_word: לֹא עַם בִּינוֹת הוּא
  chosen: this is not a people of understanding
  alternatives:
  - it is not a people of understanding
  - this people has no understanding
  lexicon: HALOT
  rationale: בִּינוֹת denotes understanding/discernment. 'A people of understanding'
    is a natural English equivalent for the Hebrew genitive-like construction and
    preserves the corporate indictment.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for that reason
  - so
  lexicon: HALOT
  rationale: Standard inferential connective linking the people's lack of understanding
    to the announced absence of mercy.
- source_word: לֹא יְרַחֲמֶנּוּ
  chosen: will not have compassion on it
  alternatives:
  - will not show mercy to him/it
  - will not pity it
  lexicon: HALOT
  rationale: רחם expresses compassion/mercy. The pronominal object is masculine singular,
    likely referring back to the people as a collective. English 'it' fits the collective
    noun 'people' used in the preceding clause.
- source_word: עֹשֵׂהוּ
  chosen: its Maker
  alternatives:
  - the one who made it
  lexicon: HALOT
  rationale: A participial divine designation. 'Maker' is concise, idiomatic, and
    preserves the theological force of God as creator of the people.
- source_word: וְיֹצְרוֹ
  chosen: the one who formed it
  alternatives:
  - its Former
  - the one who fashioned it
  lexicon: HALOT
  rationale: יצר often evokes shaping/forming, especially with covenantal-creation
    overtones. 'The one who formed it' preserves the verbal imagery and parallels
    'Maker' without flattening the distinction.
- source_word: לֹא יְחֻנֶּנּוּ
  chosen: will show it no favor
  alternatives:
  - will not be gracious to it
  - will not show it grace
  lexicon: HALOT
  rationale: חנן denotes showing favor/grace. 'Show it no favor' is clear modern English
    and avoids importing later theological jargon while preserving the sense of withheld
    graciousness.
