id: ISA.27.2
reference: Isaiah 27:2
source:
  edition: WLC
  text: בַּ/יּ֖וֹם הַ/ה֑וּא כֶּ֥רֶם חֶ֖מֶד עַנּוּ לָֽ/הּ־׃
translation:
  text: 'In that day: “A pleasant vineyard”—sing of it!'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A vineyard of delight'; the Hebrew phrase may be rendered more literally,
      though 'pleasant vineyard' is more natural English.
    reason: lexical_alternative
  - marker: b
    text: Or 'sing to it,' 'sing about it,' or 'respond concerning her'; the Hebrew
      verb can carry the sense of answering in song, and the feminine pronoun refers
      to the vineyard.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: In that day
  alternatives:
  - On that day
  lexicon: HALOT
  rationale: Standard temporal prophetic formula. 'In that day' is idiomatic in English
    and preserves the eschatological/prophetic cadence better than the more wooden
    'On that day.'
- source_word: כֶּרֶם
  chosen: vineyard
  alternatives:
  - vine
  lexicon: HALOT
  rationale: The noun denotes a vineyard rather than a single vine. This fits the
    broader vineyard imagery in the immediate context.
- source_word: חֶמֶד
  chosen: pleasant
  alternatives:
  - delightful
  - lovely
  - of delight
  lexicon: HALOT
  rationale: The noun conveys desirability, delight, or pleasantness. 'Pleasant' gives
    natural modern English in apposition to 'vineyard' while retaining the positive
    evaluative sense. A more literal 'vineyard of delight' is possible but less idiomatic
    here.
- source_word: עַנּוּ
  chosen: sing
  alternatives:
  - sing responsively
  - answer
  - respond
  lexicon: HALOT
  rationale: 'From ענה in a musical/liturgical sense, likely an imperative plural:
    ''sing'' or ''respond in song.'' Given the poetic context and the object marked
    by לָהּ, the sense is an exhortation to sing about/to the vineyard. ''Sing'' is
    the clearest concise rendering in English.'
- source_word: לָהּ
  chosen: of it
  alternatives:
  - to it
  - about it
  - for her
  lexicon: HALOT
  rationale: The pronominal suffix is feminine singular, referring back to 'vineyard'
    (a feminine noun in Hebrew). English does not naturally personify the vineyard
    here, so 'of it' communicates the referent smoothly. Because the preposition can
    support slightly different nuances, alternatives are preserved in a footnote.
