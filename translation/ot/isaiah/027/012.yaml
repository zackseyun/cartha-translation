id: ISA.27.12
reference: Isaiah 27:12
source:
  edition: WLC
  text: וְ/הָיָה֙ בַּ/יּ֣וֹם הַ/ה֔וּא יַחְבֹּ֧ט יְהוָ֛ה מִ/שִּׁבֹּ֥לֶת הַ/נָּהָ֖ר
    עַד נַ֣חַל מִצְרָ֑יִם וְ/אַתֶּ֧ם תְּלֻקְּט֛וּ לְ/אַחַ֥ד אֶחָ֖ד בְּנֵ֥י יִשְׂרָאֵֽל־׃ס
translation:
  text: And in that day the LORD will thresh from the channel of the River to the
    Wadi of Egypt, and you will be gathered one by one, O sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Euphrates'; 'the River' is a common designation for the Euphrates.
    reason: cross_reference
  - marker: b
    text: Or, 'Brook of Egypt.' The Hebrew refers to a wadi or seasonal watercourse,
      not necessarily the Nile.
    reason: lexical_alternative
  - marker: c
    text: The verb evokes gleaning or collecting individually after threshing.
    reason: cultural_note
  - marker: d
    text: Or, 'children of Israel.' The Hebrew is literally 'sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה בַּיּוֹם הַהוּא
  chosen: And in that day
  alternatives:
  - And it shall happen in that day
  - And it will be in that day
  lexicon: HALOT
  rationale: This is a standard prophetic temporal formula. 'And in that day' is idiomatic
    modern English that preserves the eschatological/time-marker force without woodenly
    reproducing the Hebrew copular construction.
- source_word: יַחְבֹּט
  chosen: will thresh
  alternatives:
  - will beat out
  - will knock off
  lexicon: HALOT
  rationale: The verb חבט refers to beating or threshing, especially knocking olives/grain
    loose. 'Thresh' preserves the agricultural metaphor and the image of separating/collecting,
    which fits the following promise that Israel will be gathered individually.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: מִשִּׁבֹּלֶת הַנָּהָר
  chosen: from the channel of the River
  alternatives:
  - from the flowing stream of the River
  - from the Euphrates' channel
  lexicon: HALOT
  rationale: שִׁבֹּלֶת can denote a flowing stream, current, or ear of grain depending
    on context. Here, with 'the River' and a territorial range, it most naturally
    refers to the channel/current of the great river, likely the Euphrates. 'The River'
    is left as a title-like geographical designation in the main text, while the likely
    identification can be inferred from context.
- source_word: הַנָּהָר
  chosen: the River
  alternatives:
  - the Euphrates
  lexicon: HALOT
  rationale: In prophetic/geographical usage, 'the River' commonly refers to the Euphrates.
    Retaining 'the River' follows the Hebrew wording more closely while allowing a
    footnote to preserve the likely identification.
- source_word: עַד נַחַל מִצְרָיִם
  chosen: to the Wadi of Egypt
  alternatives:
  - to the Brook of Egypt
  - to the torrent valley of Egypt
  lexicon: HALOT
  rationale: נחל commonly denotes a wadi or seasonal watercourse rather than a major
    perennial river. 'Wadi of Egypt' is more geographically precise than traditional
    'Brook of Egypt' and avoids confusion with the Nile.
- source_word: תְּלֻקְּטוּ
  chosen: will be gathered
  alternatives:
  - will be gleaned
  - will be picked up
  lexicon: HALOT
  rationale: The passive of לקט literally evokes gleaning/collecting piece by piece.
    'Will be gathered' communicates the result clearly in English, while the surrounding
    wording 'one by one' preserves the distributive nuance.
- source_word: לְאַחַד אֶחָד
  chosen: one by one
  alternatives:
  - each one individually
  - one at a time
  lexicon: HALOT
  rationale: This distributive expression emphasizes individual collection/restoration.
    'One by one' is concise, natural, and faithful.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: O sons of Israel
  alternatives:
  - people of Israel
  - children of Israel
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural construct, literally 'sons
    of Israel.' Per the gender-accurate guideline, the masculine form is retained
    rather than neutralized. The vocative force is brought out with 'O' because the
    second-person pronoun directly addresses them.
