theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gender rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - children of Israel
  - people of Israel
  rationale: The source is grammatically masculine plural and here functions as an
    ethnic covenant designation. Following the gender-accurate policy, the masculine
    form is preserved in the main text rather than replaced with a neutral collective.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
