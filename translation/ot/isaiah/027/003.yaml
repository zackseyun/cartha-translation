id: ISA.27.3
reference: Isaiah 27:3
source:
  edition: WLC
  text: אֲנִ֤י יְהוָה֙ נֹֽצְרָ֔/הּ לִ/רְגָעִ֖ים אַשְׁקֶ֑/נָּה פֶּ֚ן יִפְקֹ֣ד עָלֶ֔י/הָ
    לַ֥יְלָה וָ/י֖וֹם אֶצֳּרֶֽ/נָּה׃
translation:
  text: I, the LORD, am its keeper; I water it continually. Lest anyone punish it,
    I guard it night and day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I water it every moment' or 'from moment to moment.'
    reason: lexical_alternative
  - marker: b
    text: Or 'lest anyone attack it' or 'lest anyone visit punishment upon it.' The
      Hebrew verb can carry the sense of hostile intervention or punitive visitation.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH per
    DOCTRINE.md, preserving Jewish reverence tradition and established English convention.
- source_word: נֹצְרָהּ
  chosen: am its keeper
  alternatives:
  - guard it
  - watch over it
  - preserve it
  lexicon: HALOT
  rationale: From נצר, conveying guarding/keeping/watchful preservation. 'Am its keeper'
    fits the verbless-identificational force after 'I, the LORD' and avoids redundancy
    with the later אֶצֳּרֶנָּה, which is rendered 'I guard it.' The feminine suffix
    refers to the vineyard/vine established in context.
- source_word: לִרְגָעִים
  chosen: continually
  alternatives:
  - every moment
  - from moment to moment
  - at intervals
  lexicon: HALOT
  rationale: Literally 'for moments' or 'at moments.' In context it expresses repeated,
    ongoing action. 'Continually' gives natural English while preserving the sense
    of constant attentiveness; a more literal alternative is preserved in a footnote.
- source_word: אַשְׁקֶנָּה
  chosen: I water it
  alternatives:
  - I give it drink
  - I irrigate it
  lexicon: HALOT
  rationale: Hiphil of שקה means to give drink/water. Since the referent is a vineyard,
    'I water it' is the most idiomatic and contextually precise English rendering.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - so that not
  - otherwise
  lexicon: HALOT
  rationale: Introduces a preventive clause. 'Lest' is concise and accurately conveys
    the purpose/prevention nuance.
- source_word: יִפְקֹד עָלֶיהָ
  chosen: anyone punish it
  alternatives:
  - anyone attack it
  - anyone visit it
  - anyone harm it
  lexicon: HALOT
  rationale: פקד with על can denote acting against, visiting upon, or punishing. In
    this vineyard-protection context, the sense is hostile intervention. 'Punish it'
    preserves the judicial nuance of פקד better than the more generic 'harm,' while
    'anyone' supplies an indefinite subject natural in English.
- source_word: לַיְלָה וָיוֹם
  chosen: night and day
  alternatives:
  - by night and by day
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the merism indicating unceasing duration.
- source_word: אֶצֳּרֶנָּה
  chosen: I guard it
  alternatives:
  - I keep it
  - I watch over it
  - I preserve it
  lexicon: HALOT
  rationale: 'Again from נצר. Here a finite verb is best rendered actively: ''I guard
    it.'' Using ''guard'' distinguishes it slightly from the earlier nominal-like
    ''keeper'' while preserving lexical consistency.'
