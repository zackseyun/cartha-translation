theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Per project doctrine, the default
    English rendering is 'the LORD' rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Subject of יִפְקֹד
  chosen_reading: indefinite 'anyone'
  alternative_readings:
  - he
  - an enemy
  - one who would visit/punish
  rationale: The Hebrew verb is 3ms with no explicit subject. In English, an indefinite
    subject best conveys the open-ended warning that no hostile agent be allowed to
    come against the vineyard.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
