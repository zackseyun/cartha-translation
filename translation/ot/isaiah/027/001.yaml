id: ISA.27.1
reference: Isaiah 27:1
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֡וּא יִפְקֹ֣ד יְהוָה֩ בְּ/חַרְב֨/וֹ הַ/קָּשָׁ֜ה וְ/הַ/גְּדוֹלָ֣ה
    וְ/הַֽ/חֲזָקָ֗ה עַ֤ל לִוְיָתָן֙ נָחָ֣שׁ בָּרִ֔חַ וְ/עַל֙ לִוְיָתָ֔ן נָחָ֖שׁ עֲקַלָּת֑וֹן
    וְ/הָרַ֥ג אֶת הַ/תַּנִּ֖ין אֲשֶׁ֥ר בַּ/יָּֽם־׃ס
translation:
  text: In that day the LORD will punish Leviathan the fleeing serpent, with his fierce
    and great and strong sword, and Leviathan the twisting serpent; and he will kill
    the dragon that is in the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Leviathan the swift serpent' for 'the fleeing serpent.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Leviathan the crooked serpent' for 'the twisting serpent.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the sea monster' for 'the dragon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: In that day
  alternatives:
  - On that day
  lexicon: HALOT
  rationale: Standard temporal prophetic formula. 'In that day' is idiomatic in English
    prophetic discourse and preserves the eschatological/literary force.
- source_word: יִפְקֹד
  chosen: will punish
  alternatives:
  - will visit
  - will attend to
  - will bring judgment on
  lexicon: HALOT
  rationale: The verb פקד has a broad semantic range, but with עַל and hostile objects
    in judgment context it commonly means to punish or visit with judgment. 'Will
    punish' makes the judicial sense clear in modern English without over-paraphrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: בְּחַרְבוֹ
  chosen: with his ... sword
  alternatives:
  - by his ... sword
  lexicon: HALOT
  rationale: Instrumental beth is naturally rendered 'with.' Retaining 'his sword'
    preserves the concrete martial imagery.
- source_word: הַקָּשָׁה וְהַגְּדוֹלָה וְהַחֲזָקָה
  chosen: fierce and great and strong
  alternatives:
  - hard and great and strong
  - harsh and great and mighty
  lexicon: HALOT
  rationale: The three adjectives are piled up for emphasis. 'Fierce' best captures
    קָשֶׁה in a weapon/judgment context; 'great' and 'strong' preserve the sequence
    closely. The repeated 'and' reflects the Hebrew accumulation.
- source_word: לִוְיָתָן
  chosen: Leviathan
  lexicon: HALOT
  rationale: Proper/mythic name is transliterated in keeping with the translation
    philosophy for names.
- source_word: נָחָשׁ בָּרִחַ
  chosen: the fleeing serpent
  alternatives:
  - the fleeing snake
  - the swift serpent
  lexicon: HALOT
  rationale: נָחָשׁ is 'serpent/snake'; 'serpent' better suits elevated poetic diction.
    בָּרִחַ likely means 'fleeing' or 'slippery/gliding'; 'fleeing' is the more direct
    lexical rendering and fits the parallelism.
- source_word: נָחָשׁ עֲקַלָּתוֹן
  chosen: the twisting serpent
  alternatives:
  - the crooked serpent
  - the coiling serpent
  - the tortuous serpent
  lexicon: HALOT
  rationale: The adjective denotes something twisted/crooked/winding. 'Twisting' is
    vivid, readable modern English and matches the serpent imagery.
- source_word: וְהָרַג
  chosen: and he will kill
  alternatives:
  - and he will slay
  lexicon: HALOT
  rationale: Though formally a waw + qatal, in this prophetic sequence it continues
    the future sense. 'Kill' is straightforward modern English; 'slay' is possible
    but more archaic/literary.
- source_word: הַתַּנִּין
  chosen: the dragon
  alternatives:
  - the sea monster
  - the serpent
  - the monster
  lexicon: HALOT
  rationale: תַּנִּין can denote a dragon/sea monster/serpentine monster. In this
    mythic-poetic context, 'dragon' best preserves the elevated imagery and its relation
    to Leviathan, while the following clause locates it in the sea.
- source_word: אֲשֶׁר בַּיָּם
  chosen: that is in the sea
  alternatives:
  - that is in the Sea
  - that is in the ocean
  lexicon: HALOT
  rationale: A simple relative clause. Lowercase 'sea' is preferred since no specific
    named sea is indicated in the Hebrew.
