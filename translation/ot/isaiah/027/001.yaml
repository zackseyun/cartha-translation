theological_decisions:
- issue: Mythic imagery of Leviathan and tannin
  chosen_reading: Retain the mythic-poetic creatures as literary realities within
    the prophetic image without identifying them explicitly with Satan or a specific
    historical empire in the main text.
  alternative_readings:
  - Interpret Leviathan as a symbol of chaotic evil
  - Interpret Leviathan as a symbol of hostile nations/empires
  - Interpret Leviathan as Satan
  rationale: The verse uses established ancient Near Eastern and biblical chaos-creature
    imagery. The Hebrew text itself names Leviathan and the dragon in the sea but
    does not explicitly resolve the symbol's referent here. To preserve theological
    tension and avoid importing a narrower doctrinal interpretation, the translation
    keeps the imagery literal-poetic in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
