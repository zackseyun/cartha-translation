theological_decisions:
- issue: Nature of Jacob's cleansing
  chosen_reading: The verse links atonement for Jacob's guilt with the concrete destruction
    of idolatrous worship objects, without specifying a later doctrinal mechanism
    of atonement.
  alternative_readings:
  - The destruction of idols is itself the means of atonement
  - The destruction of idols is the evidence or fruit of prior atonement
  rationale: The Hebrew presents both atonement and the 'fruit' of sin's removal in
    close relation, then describes idol destruction. The translation preserves this
    relationship without over-resolving whether the destruction is means, evidence,
    or both.
  doctrine_reference: Preserve theological tension rather than resolve it.
