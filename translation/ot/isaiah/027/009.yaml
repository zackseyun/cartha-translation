id: ISA.27.9
reference: Isaiah 27:9
source:
  edition: WLC
  text: לָ/כֵ֗ן בְּ/זֹאת֙ יְכֻפַּ֣ר עֲוֺֽן יַעֲקֹ֔ב וְ/זֶ֕ה כָּל פְּרִ֖י הָסִ֣ר חַטָּאת֑/וֹ
    בְּ/שׂוּמ֣/וֹ כָּל אַבְנֵ֣י מִזְבֵּ֗חַ כְּ/אַבְנֵי גִר֙ מְנֻפָּצ֔וֹת לֹֽא יָקֻ֥מוּ
    אֲשֵׁרִ֖ים וְ/חַמָּנִֽים־־׀־־־׃
translation:
  text: 'Therefore by this the guilt of Jacob will be atoned for, and this will be
    the full fruit of the removal of his sin: when he makes all the stones of the
    altar like crushed chalkstones, the Asherah poles and incense altars will not
    stand.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''this is all the fruit: the removal of his sin.'' The Hebrew syntax
      may be read more compactly, with ''fruit'' meaning ''result.'''
    reason: lexical_alternative
  - marker: b
    text: '''Chalkstones'' may also be rendered ''limestone'' or ''lime stones'';
      the image is of altar stones smashed into friable pieces.'
    reason: lexical_alternative
  - marker: c
    text: Or 'sun pillars' for 'incense altars'; the Hebrew term likely refers to
      a cultic object associated with idolatrous worship, possibly solar worship.
    reason: alternative_reading
lexical_decisions:
- source_word: יְכֻפַּר
  chosen: will be atoned for
  alternatives:
  - will be purged
  - will be expiated
  lexicon: HALOT
  rationale: Pual of כפר here denotes the covering/removal of guilt in a cultic-reconciliatory
    sense. 'Will be atoned for' preserves the passive sense and theological weight
    without importing a specific mechanism beyond the text.
- source_word: עֲוֺן
  chosen: guilt
  alternatives:
  - iniquity
  - punishment for iniquity
  lexicon: HALOT
  rationale: עָוֹן can denote both sin/iniquity and the guilt/liability resulting
    from it. In context with יְכֻפַּר and the later explicit חַטָּאתוֹ ('his sin'),
    rendering this first term as 'guilt' helps preserve the semantic distinction between
    culpability and sin itself.
- source_word: וְזֶה כָּל פְּרִי
  chosen: and this will be the full fruit
  alternatives:
  - and this is all the fruit
  - and this is the whole result
  lexicon: HALOT
  rationale: The phrase points to the total outcome/result. 'Full fruit' keeps the
    metaphor of fruit/result while sounding natural in English. Future sense is supplied
    from the prophetic context and the preceding imperfect.
- source_word: הָסִר
  chosen: the removal of
  alternatives:
  - removing
  - to remove
  lexicon: HALOT
  rationale: The infinitive construct of סור functions substantivally here. 'The removal
    of' fits the syntax after 'fruit of' and preserves the sense of sin being taken
    away.
- source_word: חַטָּאתוֹ
  chosen: his sin
  alternatives:
  - his sin offering
  - his offense
  lexicon: HALOT
  rationale: Although חטאת can sometimes mean 'sin offering,' the context here is
    moral/covenantal cleansing and idol destruction, so 'his sin' is the best fit.
- source_word: בְּשׂוּמוֹ
  chosen: when he makes
  alternatives:
  - in his making
  - when he sets
  lexicon: HALOT
  rationale: The preposition plus infinitive construct introduces the circumstance
    by which the stated result is realized. 'When he makes' gives clear English while
    preserving the temporal/instrumental force.
- source_word: אַבְנֵי מִזְבֵּחַ
  chosen: the stones of the altar
  alternatives:
  - altar stones
  lexicon: HALOT
  rationale: A straightforward construct chain. 'The altar' is singular in Hebrew
    and likely refers generically or representatively to idolatrous altar structures
    being dismantled.
- source_word: כְּאַבְנֵי גִר מְנֻפָּצוֹת
  chosen: like crushed chalkstones
  alternatives:
  - like pulverized limestone
  - like shattered lime stones
  lexicon: HALOT
  rationale: גִּיר refers to lime/chalk/plaster material. The image is of friable
    stones smashed to pieces. 'Crushed chalkstones' preserves the concrete imagery
    in accessible English, though the exact mineral nuance is difficult.
- source_word: לֹא יָקֻמוּ
  chosen: will not stand
  alternatives:
  - will not rise up
  - will not remain standing
  lexicon: HALOT
  rationale: קום here refers to standing/remaining in place. In context of cult objects
    after destruction, 'will not stand' is idiomatic and concise.
- source_word: אֲשֵׁרִים
  chosen: the Asherah poles
  alternatives:
  - the Asherim
  - the sacred poles
  lexicon: HALOT
  rationale: אֲשֵׁרִים refers to cultic objects associated with Asherah worship, often
    wooden poles or trees. 'Asherah poles' translates the referent while retaining
    the proper-name connection.
- source_word: חַמָּנִים
  chosen: incense altars
  alternatives:
  - sun pillars
  - sun-images
  - incense stands
  lexicon: HALOT
  rationale: The term likely denotes cultic pillars or altars associated with solar
    worship/incense rites. Because the exact referent is debated, 'incense altars'
    gives a plausible cultic sense in context, while an alternative is preserved in
    a footnote.
