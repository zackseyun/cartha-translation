theological_decisions:
- issue: Referent of the pronouns in the rhetorical comparison
  chosen_reading: The verse contrasts the LORD's striking of Israel/Jacob with his
    judgment on the nation(s) that struck Israel; the English preserves the pronouns
    rather than replacing them with explicit nouns.
  alternative_readings:
  - Explicitly identifying the objects as Israel and its attacker in the main text
  rationale: The Hebrew uses pronouns and participles without naming the referents
    in the verse itself. Preserving that form avoids importing interpretation into
    the translation while still allowing the likely contextual sense to be noted in
    documentation.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
