id: ISA.27.7
reference: Isaiah 27:7
source:
  edition: WLC
  text: הַ/כְּ/מַכַּ֥ת מַכֵּ֖/הוּ הִכָּ֑/הוּ אִם כְּ/הֶ֥רֶג הֲרֻגָ֖י/ו הֹרָֽג־׃
translation:
  text: Has he struck him as he struck the one who struck him? Or has he been killed
    as his slain were killed?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Has he struck him according to the blow of his striker?'
    reason: lexical_alternative
  - marker: b
    text: That is, the one addressed in context is not destroyed in the same way as
      those he (or his enemy) slew; the Hebrew keeps the pronoun reference compressed
      and somewhat implicit.
    reason: alternative_reading
lexical_decisions:
- source_word: הַכְּמַכַּת
  chosen: Has ... as the striking of
  alternatives:
  - According to the blow of
  - Like the striking of
  lexicon: HALOT
  rationale: 'The prefixed ה interrogative with כְּ yields a rhetorical question/comparison:
    ''Has ... as/like...?'' Rendering as ''Has ... as'' preserves both the interrogative
    force and the comparative construction without wooden English.'
- source_word: מַכֵּהוּ
  chosen: the one who struck him
  alternatives:
  - his striker
  - the smiter of him
  lexicon: HALOT
  rationale: The Hifil participle of נכה with 3ms suffix denotes the agent who struck
    him. 'The one who struck him' is natural modern English and preserves the personal
    agent.
- source_word: הִכָּהוּ
  chosen: has he struck him
  alternatives:
  - did he strike him
  - he struck him
  lexicon: HALOT
  rationale: 'The perfect is rendered with English present perfect in this rhetorical
    question to fit the discourse flow: the prophet asks whether God''s striking of
    Israel matches his striking of Israel''s attacker.'
- source_word: אִם
  chosen: Or
  alternatives:
  - If
  - whether
  lexicon: HALOT
  rationale: In this parallel rhetorical structure, אִם introduces the second alternative
    question. 'Or' best conveys the disjunctive parallelism in English.
- source_word: כְּהֶרֶג
  chosen: as ... were killed
  alternatives:
  - according to the slaughter of
  - like the killing of
  lexicon: HALOT
  rationale: The noun הֶרֶג refers to killing/slaughter. In idiomatic English within
    the comparison, 'as ... were killed' communicates the sense more naturally than
    a nominal form while preserving the comparison.
- source_word: הֲרֻגָיו
  chosen: his slain
  alternatives:
  - those slain by him
  - his killed ones
  lexicon: HALOT
  rationale: The passive participial form with suffix most naturally means 'his slain,'
    i.e., those slain by him. This compact rendering preserves the ambiguity of possession/agency
    better than an overexplicit paraphrase.
- source_word: הֹרָג
  chosen: has he been killed
  alternatives:
  - was he killed
  - has one killed him
  lexicon: HALOT
  rationale: The Hophal/passive sense in context is best represented as 'has he been
    killed.' This matches the passive comparison with 'his slain' and preserves the
    rhetorical contrast between measured striking and annihilating slaughter.
