theological_decisions:
- issue: Referent of the speaker's first-person pronouns
  chosen_reading: The speaker is God, and the verse offers an alternative of refuge
    and reconciliation with him.
  alternative_readings:
  - A more impersonal reading that minimizes the divine self-reference
  rationale: In the immediate context of Isaiah 27, the first-person speech is divine.
    The translation preserves the directness of God's invitation without importing
    further doctrinal conclusions beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
