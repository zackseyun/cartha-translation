id: ISA.27.5
reference: Isaiah 27:5
source:
  edition: WLC
  text: א֚וֹ יַחֲזֵ֣ק בְּ/מָעוּזִּ֔/י יַעֲשֶׂ֥ה שָׁל֖וֹם לִ֑/י שָׁל֖וֹם יַֽעֲשֶׂה
    לִּֽ/י־׃
translation:
  text: Or let him take hold of my stronghold; let him make peace with me; let him
    make peace with me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my refuge' or 'my protection' for 'my stronghold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: א֚וֹ
  chosen: Or
  alternatives:
  - Else
  - Or else
  lexicon: HALOT
  rationale: 'Introduces an alternative to the preceding judgment imagery: either
    face destruction or seek refuge/reconciliation. ''Or'' is the most natural concise
    English equivalent.'
- source_word: יַחֲזֵק
  chosen: let him take hold of
  alternatives:
  - let him seize
  - let him grasp
  - let him hold fast to
  lexicon: HALOT
  rationale: Hiphil of חזק here conveys actively grasping or taking hold of something
    for protection or appeal. 'Take hold of' preserves the concrete metaphor and fits
    the jussive-like force in context.
- source_word: בְּמָעוּזִּי
  chosen: my stronghold
  alternatives:
  - my refuge
  - my protection
  - my strength
  lexicon: HALOT
  rationale: מָעוֹז commonly denotes a place or source of refuge/strength. 'Stronghold'
    preserves the fortress imagery and suits the immediate context of divine protection
    and threat. The prefixed ב is absorbed idiomatically into 'take hold of' rather
    than rendered woodenly as 'in/by'.
- source_word: יַעֲשֶׂה
  chosen: let him make
  alternatives:
  - let him establish
  - let him effect
  lexicon: HALOT
  rationale: עשה with שָׁלוֹם is a standard idiom for making or establishing peace.
    'Make' is the most natural English rendering.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: While שָׁלוֹם can include wholeness and well-being, in this relational
    construction with לִי it most directly means peace/reconciliation with God. 'Peace'
    is the clearest and most idiomatic rendering.
- source_word: לִי
  chosen: with me
  alternatives:
  - for me
  - to me
  lexicon: HALOT
  rationale: 'Although literally ''to/for me,'' in the idiom ''make peace לְ'' the
    sense is relational: ''make peace with me.'' This is required by natural English
    and the covenantal-reconciliatory sense.'
- source_word: שָׁלוֹם יַעֲשֶׂה לִּי
  chosen: let him make peace with me
  alternatives:
  - peace he shall make with me
  lexicon: HALOT
  rationale: The repetition is retained rather than smoothed out, since it adds emphasis
    and urgency. English preserves this by repeating the full clause.
