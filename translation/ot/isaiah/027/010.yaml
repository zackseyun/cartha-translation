id: ISA.27.10
reference: Isaiah 27:10
source:
  edition: WLC
  text: כִּ֣י עִ֤יר בְּצוּרָה֙ בָּדָ֔ד נָוֶ֕ה מְשֻׁלָּ֥ח וְ/נֶעֱזָ֖ב כַּ/מִּדְבָּ֑ר
    שָׁ֣ם יִרְעֶ֥ה עֵ֛גֶל וְ/שָׁ֥ם יִרְבָּ֖ץ וְ/כִלָּ֥ה סְעִפֶֽי/הָ׃
translation:
  text: For the fortified city is solitary, a habitation deserted and abandoned like
    the wilderness; there a calf grazes, and there it lies down and strips its branches
    bare.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a pasture' or 'a dwelling place' for 'a habitation.' The Hebrew נָוֶה
      can carry either residential or pastoral nuance.
    reason: lexical_alternative
  - marker: b
    text: Or 'consumes its boughs.' The Hebrew verb conveys complete consumption;
      'strips its branches bare' makes the image explicit in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation or ground for the preceding statement. 'For'
    best preserves the causal/explanatory force in context without overcommitting
    to emphatic senses like 'indeed'.
- source_word: עִיר בְּצוּרָה
  chosen: the fortified city
  alternatives:
  - a fortified city
  - the strong city
  lexicon: HALOT
  rationale: The phrase denotes a defended/fortified urban center. 'Fortified city'
    is the most natural modern English equivalent. The article is not explicit on
    עִיר, but English idiom and the likely contextual reference favor 'the fortified
    city' rather than an indefinite expression.
- source_word: בָּדָד
  chosen: solitary
  alternatives:
  - alone
  - isolated
  lexicon: HALOT
  rationale: '''Solitary'' captures the desolate, abandoned state of the city in elevated
    but still readable English. It fits the poetic register better than the plainer
    ''alone''.'
- source_word: נָוֶה
  chosen: a habitation
  alternatives:
  - a pasture
  - a dwelling place
  - a homestead
  lexicon: HALOT
  rationale: נָוֶה can denote a dwelling place or habitation, sometimes with pastoral
    nuance. Here it stands in apposition to the city and describes it as a settled
    place now emptied. 'Habitation' preserves that sense without narrowing it to literal
    pastureland.
- source_word: מְשֻׁלָּח
  chosen: deserted
  alternatives:
  - sent away
  - cast off
  - forsaken
  lexicon: HALOT
  rationale: From שלח in the passive, the sense here is that the place has been let
    go or left behind. 'Deserted' communicates the resulting state in idiomatic English
    better than a wooden 'sent away'.
- source_word: וְנֶעֱזָב
  chosen: and abandoned
  alternatives:
  - and forsaken
  - and left
  lexicon: HALOT
  rationale: Pairs naturally with מְשֻׁלָּח to intensify the image of desolation.
    'Abandoned' is clear modern English and distinct enough from 'deserted' to preserve
    the Hebrew parallelism.
- source_word: כַּמִּדְבָּר
  chosen: like the wilderness
  alternatives:
  - like a wilderness
  - like the desert
  lexicon: HALOT
  rationale: 'The comparison is qualitative: the city has become like uncultivated
    wasteland. ''Wilderness'' better preserves the broader biblical sense than the
    more geographically specific ''desert''.'
- source_word: שָׁם יִרְעֶה עֵגֶל
  chosen: there a calf grazes
  alternatives:
  - there a calf feeds
  - there a calf pastures
  lexicon: HALOT
  rationale: The singular עֵגֶל is retained as 'a calf.' 'Grazes' is the most natural
    rendering of רעה in this pastoral image.
- source_word: וְשָׁם יִרְבָּץ
  chosen: and there it lies down
  alternatives:
  - and there it crouches
  - and there it rests
  lexicon: HALOT
  rationale: The verb refers to an animal lying down or settling. The pronoun 'it'
    naturally refers back to the calf and keeps the line cohesive.
- source_word: וְכִלָּה
  chosen: and strips ... bare
  alternatives:
  - and consumes
  - and finishes off
  - and devours
  lexicon: HALOT
  rationale: כלה here conveys complete consumption. Because the object is branches,
    'strips ... bare' expresses the effect vividly and idiomatically while preserving
    the idea of total eating/consumption.
- source_word: סְעִפֶיהָ
  chosen: its branches
  alternatives:
  - its boughs
  - its twigs
  lexicon: HALOT
  rationale: The noun denotes branches/boughs. 'Branches' is the clearest general
    English term. The feminine suffix is rendered by 'its,' referring back to the
    city/habitation as a feminine noun in Hebrew, likely personifying the ruined site
    or its vegetation.
