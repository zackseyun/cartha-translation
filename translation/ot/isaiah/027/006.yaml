theological_decisions:
- issue: Corporate identity of Jacob/Israel in agricultural metaphor
  chosen_reading: Jacob/Israel are rendered as the covenant people personified, without
    making the corporate sense explicit in the main text.
  alternative_readings:
  - Jacob/Israel as strictly the patriarchal names
  - Expanding to 'the descendants of Jacob/Israel'
  rationale: The Hebrew poetic parallelism uses the names directly. Preserving them
    maintains the literary and theological force of the prophetic promise while avoiding
    interpretive expansion beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
