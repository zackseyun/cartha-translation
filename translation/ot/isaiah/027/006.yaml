id: ISA.27.6
reference: Isaiah 27:6
source:
  edition: WLC
  text: הַ/בָּאִים֙ יַשְׁרֵ֣שׁ יַֽעֲקֹ֔ב יָצִ֥יץ וּ/פָרַ֖ח יִשְׂרָאֵ֑ל וּ/מָלְא֥וּ
    פְנֵי תֵבֵ֖ל תְּנוּבָֽה־׃ס
translation:
  text: In days to come Jacob will take root; Israel will blossom and flower, and
    they will fill the face of the world with fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''Those who come: Jacob will take root.'' The Hebrew opening may be
      read more literally as ''the coming ones,'' but in context it likely functions
      idiomatically as a temporal expression: ''in days to come.'''
    reason: alternative_reading
  - marker: b
    text: '''Fruit'' may also be rendered ''produce'' or ''yield.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבָּאִים
  chosen: In days to come
  alternatives:
  - Those who come
  - The coming ones
  - In the coming days
  lexicon: HALOT
  rationale: The participle with article is elliptical and idiomatic in context, introducing
    a future time reference rather than identifying a group of people. English idiom
    is best served by a temporal rendering. 'In days to come' captures the prophetic
    forward-looking sense while remaining close to the Hebrew.
- source_word: יַשְׁרֵשׁ
  chosen: will take root
  alternatives:
  - will cause to take root
  - will root
  lexicon: HALOT
  rationale: From שׁרשׁ in Hiphil, the verb can be causative ('cause to root') or
    effectively intransitive in context ('take root'). With Jacob as the subject in
    a growth metaphor parallel to 'blossom and flower,' 'will take root' is the most
    natural English rendering.
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Proper name retained by standard transliteration. In parallel with 'Israel,'
    it functions corporately for the covenant people, but the name itself should remain
    untranslated.
- source_word: יָצִיץ
  chosen: will blossom
  alternatives:
  - will bud
  - will sprout
  lexicon: HALOT
  rationale: The verb denotes budding or blossoming. 'Will blossom' fits the agricultural
    imagery and pairs well with the following 'flower' without sounding overly technical.
- source_word: וּפָרַח
  chosen: and flower
  alternatives:
  - and flourish
  - and bloom
  lexicon: HALOT
  rationale: פרח commonly denotes flowering/blooming. 'Flower' preserves the concrete
    botanical image. 'Flourish' is possible but slightly more interpretive and abstract.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name retained by standard transliteration. Parallel to 'Jacob,'
    it refers to the people as a whole.
- source_word: וּמָלְאוּ
  chosen: and they will fill
  alternatives:
  - and will fill
  - and they filled
  lexicon: HALOT
  rationale: The plural verb shifts from the singular collective expressions to the
    people viewed as a plurality. Rendering the subject explicitly as 'they' makes
    the number shift clear in English and avoids awkwardness.
- source_word: פְנֵי תֵבֵל
  chosen: the face of the world
  alternatives:
  - the surface of the world
  - the whole world
  lexicon: HALOT
  rationale: פני literally means 'face/surface of,' and תבל denotes the world/inhabited
    world. 'The face of the world' preserves the Hebrew image while remaining intelligible
    in English.
- source_word: תְּנוּבָה
  chosen: fruit
  alternatives:
  - produce
  - harvest
  - yield
  lexicon: HALOT
  rationale: The noun denotes produce or yield. 'Fruit' works well in English both
    agriculturally and metaphorically, matching the surrounding plant imagery. 'Produce'
    is possible but less literary; 'harvest' is too specific.
