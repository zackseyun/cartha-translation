id: ISA.63.15
reference: Isaiah 63:15
source:
  edition: WLC
  text: הַבֵּ֤ט מִ/שָּׁמַ֨יִם֙ וּ/רְאֵ֔ה מִ/זְּבֻ֥ל קָדְשְׁ/ךָ֖ וְ/תִפְאַרְתֶּ֑/ךָ
    אַיֵּ֤ה קִנְאָֽתְ/ךָ֙ וּ/גְב֣וּרֹתֶ֔/ךָ הֲמ֥וֹן מֵעֶ֛י/ךָ וְֽ/רַחֲמֶ֖י/ךָ אֵלַ֥/י
    הִתְאַפָּֽקוּ׃
translation:
  text: Look down from heaven and see, from your holy and glorious dwelling. Where
    are your zeal and your mighty acts? The stirring of your inward parts and your
    compassions are withheld from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the stirring of your inward parts'; an idiom for deep
      inner emotion or compassion.
    reason: cultural_note
  - marker: b
    text: Or 'your jealousy' for 'your zeal.'
    reason: lexical_alternative
  - marker: c
    text: Or 'hold themselves back from me' for 'are withheld from me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבֵּט
  chosen: Look down
  alternatives:
  - Look
  - Gaze
  lexicon: HALOT
  rationale: Imperative of נבט in context of appeal from earth to heaven naturally
    takes the sense 'look down,' making explicit the vertical perspective already
    implied by 'from heaven.'
- source_word: מִשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  lexicon: HALOT
  rationale: English singular 'heaven' is the most natural idiomatic equivalent here,
    though Hebrew is morphologically plural.
- source_word: וּרְאֵה
  chosen: and see
  alternatives:
  - and behold
  lexicon: HALOT
  rationale: Keeps the paired imperatives with straightforward modern English.
- source_word: מִזְּבֻל קָדְשְׁךָ וְתִפְאַרְתֶּךָ
  chosen: from your holy and glorious dwelling
  alternatives:
  - from the habitation of your holiness and your glory
  - from your exalted holy dwelling
  lexicon: HALOT
  rationale: זְבֻל denotes an elevated dwelling/place of abode; 'dwelling' is clear
    modern English. The construct chain with 'your holiness and your glory' is rendered
    adjectivally for readability without loss of sense.
- source_word: אַיֵּה
  chosen: Where are
  alternatives:
  - Where is
  lexicon: HALOT
  rationale: Introduces the lamenting question. Plural agreement in English fits the
    following paired subjects ('zeal' and 'mighty acts').
- source_word: קִנְאָתְךָ
  chosen: your zeal
  alternatives:
  - your jealousy
  - your ardor
  lexicon: HALOT
  rationale: In reference to God, קנאה can mean jealous zeal. 'Zeal' best fits this
    plea for covenantal intervention without importing misleading connotations of
    petty jealousy.
- source_word: גְבוּרוֹתֶיךָ
  chosen: your mighty acts
  alternatives:
  - your mighty deeds
  - your powers
  lexicon: HALOT
  rationale: Plural noun commonly refers to manifestations of strength in action,
    not merely abstract power.
- source_word: הֲמוֹן
  chosen: The stirring
  alternatives:
  - The abundance
  - The tumult
  - The sound
  lexicon: HALOT
  rationale: With 'your inward parts' the noun points to inner emotional agitation
    or stirring, an idiom of deep feeling rather than numerical abundance.
- source_word: מֵעֶיךָ
  chosen: your inward parts
  alternatives:
  - your bowels
  - your inner being
  - your heart
  lexicon: HALOT
  rationale: Hebrew idiom locates deep compassion in the entrails. 'Inward parts'
    preserves the bodily metaphor more transparently than interpretive 'heart,' while
    avoiding archaic 'bowels' in the main text.
- source_word: רַחֲמֶיךָ
  chosen: your compassions
  alternatives:
  - your mercies
  - your compassion
  lexicon: HALOT
  rationale: Plural form is retained with an English plural to reflect the Hebrew
    intensity/abundance of compassionate mercies.
- source_word: אֵלַי
  chosen: from me
  alternatives:
  - toward me
  lexicon: HALOT
  rationale: With the following verb 'are withheld,' English idiom requires 'from
    me,' though the preposition literally is 'to/toward me.'
- source_word: הִתְאַפָּקוּ
  chosen: are withheld
  alternatives:
  - restrain themselves
  - hold themselves back
  - are restrained
  lexicon: HALOT
  rationale: The hitpael conveys holding back/restraint. Passive English 'are withheld'
    communicates the result in natural style while preserving the lament that divine
    compassion seems restrained.
