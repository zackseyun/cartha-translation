theological_decisions:
- issue: Anthropopathic language for God's emotions
  chosen_reading: Retain bodily-emotional imagery ('inward parts') rather than flattening
    to an abstract phrase like 'heart' or 'feelings.'
  alternative_readings:
  - your heart
  - your tender feelings
  - your compassion
  rationale: The verse intentionally uses embodied language for divine compassion.
    Preserving the metaphor maintains the text's emotional force without making a
    doctrinal claim about God's corporeality.
  doctrine_reference: Translation philosophy §3, §6
- issue: Rendering divine קִנְאָה
  chosen_reading: Translate as 'zeal' in the main text.
  alternative_readings:
  - jealousy
  rationale: In this context the plea concerns God's covenant passion and intervention,
    so 'zeal' communicates the intended sense more clearly in modern English while
    avoiding misunderstanding.
  doctrine_reference: Translation philosophy §6
