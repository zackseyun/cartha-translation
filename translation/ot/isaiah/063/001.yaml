id: ISA.63.1
reference: Isaiah 63:1
source:
  edition: WLC
  text: מִי זֶ֣ה בָּ֣א מֵ/אֱד֗וֹם חֲמ֤וּץ בְּגָדִים֙ מִ/בָּצְרָ֔ה זֶ֚ה הָד֣וּר בִּ/לְבוּשׁ֔/וֹ
    צֹעֶ֖ה בְּ/רֹ֣ב כֹּח֑/וֹ אֲנִ֛י מְדַבֵּ֥ר בִּ/צְדָקָ֖ה רַ֥ב לְ/הוֹשִֽׁיעַ־׀׃
translation:
  text: Who is this coming from Edom, with crimsoned garments from Bozrah—this one
    splendid in his clothing, marching in the greatness of his strength? It is I,
    speaking in righteousness, mighty to save.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'with garments stained red.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'striding' in the greatness of his strength.
    reason: lexical_alternative
  - marker: c
    text: Or, 'speaking in justice.'
    reason: alternative_reading
lexical_decisions:
- source_word: חֲמוּץ
  chosen: crimsoned
  alternatives:
  - stained red
  - dyed red
  - reddened
  lexicon: HALOT
  rationale: The adjective describes garments marked by a red color. In context with
    the following verse's winepress imagery, the sense is not merely colorful clothing
    but garments made red. 'Crimsoned' is vivid and concise, preserving the color
    nuance without over-specifying the cause in this verse alone.
- source_word: בְּגָדִים
  chosen: garments
  alternatives:
  - clothes
  - raiment
  lexicon: HALOT
  rationale: '''Garments'' is natural modern literary English and fits the elevated
    prophetic register better than ''clothes,'' while avoiding archaic ''raiment.'''
- source_word: הָדוּר
  chosen: splendid
  alternatives:
  - glorious
  - majestic
  - honored
  lexicon: HALOT
  rationale: The term conveys stately magnificence or adornment. 'Splendid' communicates
    visible magnificence in attire without importing a stronger theological overtone
    than the Hebrew itself requires.
- source_word: לְבוּשׁוֹ
  chosen: his clothing
  alternatives:
  - his apparel
  - his garments
  lexicon: HALOT
  rationale: A straightforward rendering of the noun for attire. 'Clothing' reads
    naturally in modern English and avoids unnecessary repetition with the earlier
    'garments' while preserving the semantic overlap.
- source_word: צֹעֶה
  chosen: marching
  alternatives:
  - striding
  - bending forward
  - moving proudly
  lexicon: HALOT
  rationale: The verb is difficult and has been understood as striding or marching
    with imposing movement. 'Marching' fits the warrior-like context and the parallel
    with great strength, while remaining intelligible.
- source_word: בְּרֹב כֹּחוֹ
  chosen: in the greatness of his strength
  alternatives:
  - in the abundance of his power
  - in his great strength
  lexicon: HALOT
  rationale: This preserves both רֹב ('abundance/greatness') and כֹּחַ ('strength/power').
    The phrase aims to retain the Hebrew's elevated style rather than flattening it
    to a simpler idiom.
- source_word: מְדַבֵּר בִּצְדָקָה
  chosen: speaking in righteousness
  alternatives:
  - speaking righteousness
  - speaking justly
  - declaring what is right
  lexicon: HALOT
  rationale: The preposition ב plus צְדָקָה is best retained with 'in righteousness.'
    This keeps the moral/judicial sense broad and avoids narrowing the phrase to mere
    truthfulness or legal justice alone.
- source_word: רַב לְהוֹשִׁיעַ
  chosen: mighty to save
  alternatives:
  - great in saving
  - abundant in salvation
  - powerful to deliver
  lexicon: HALOT
  rationale: 'An idiomatic but faithful rendering: רַב conveys greatness/abundance,
    and the infinitive expresses capability or readiness. ''Mighty to save'' is concise,
    natural, and preserves the force of the Hebrew.'
- source_word: מֵאֱדוֹם
  chosen: from Edom
  lexicon: HALOT
  rationale: Proper name transliterated per philosophy. Edom is retained as the geographic
    and symbolic source location.
- source_word: מִבָּצְרָה
  chosen: from Bozrah
  lexicon: HALOT
  rationale: Proper name transliterated. Bozrah is the Edomite city named in the text
    and should not be translated.
