theological_decisions:
- issue: Identity of the speaker/respondent in the verse
  chosen_reading: The translation leaves the speaker's identity implicit and does
    not identify him in the text.
  alternative_readings:
  - The LORD as divine warrior
  - A messianic figure
  - A prophetic personification
  rationale: The Hebrew presents a dramatic dialogue without naming the respondent.
    In keeping with the doctrine of preserving theological tension rather than resolving
    it, the English reproduces the first-person reply without importing an interpretive
    identification into the main text.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Rendering of צְדָקָה
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Although the contested-terms table specifically discusses Greek δικαιοσύνη,
    the same semantic tension exists here in Hebrew צְדָקָה. 'Righteousness' is chosen
    for the main text because the speaker's moral rectitude and covenantal rightness
    are foregrounded, while 'justice' is preserved in a footnote as a viable contextual
    nuance.
  doctrine_reference: 'Contested terms table: δικαιοσύνη → righteousness; justice
    preserved in footnotes where relevant.'
