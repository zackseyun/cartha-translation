theological_decisions:
- issue: Divine warrior judgment imagery
  chosen_reading: Retain the first-person divine speech and violent winepress metaphor
    without softening it.
  alternative_readings:
  - Interpret more abstractly as mere victory imagery
  - Reduce wrath language to less personal judicial action
  rationale: The Hebrew presents YHWH's solitary judgment in vivid, personal terms.
    The translation preserves the theological tension of divine wrath and justice
    rather than muting it. No christological or denominational overlay is imported
    here, though later canonical connections may be noted separately.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Gendered singular אִישׁ
  chosen_reading: Render as 'no man was with me' in the main text.
  alternative_readings:
  - no one was with me
  rationale: The source uses grammatically masculine singular אִישׁ. Following the
    gender-accurate principle, the main text keeps 'man,' while a footnote preserves
    the more idiomatic inclusive alternative for readers.
  doctrine_reference: Gender-accurate over gender-neutral.
