id: ISA.63.3
reference: Isaiah 63:3
source:
  edition: WLC
  text: פּוּרָ֣ה דָּרַ֣כְתִּי לְ/בַדִּ֗/י וּ/מֵֽ/עַמִּים֙ אֵֽין אִ֣ישׁ אִתִּ֔/י וְ/אֶדְרְכֵ֣/ם
    בְּ/אַפִּ֔/י וְ/אֶרְמְסֵ֖/ם בַּ/חֲמָתִ֑/י וְ/יֵ֤ז נִצְחָ/ם֙ עַל בְּגָדַ֔/י וְ/כָל
    מַלְבּוּשַׁ֖/י אֶגְאָֽלְתִּי׀־־־׃
translation:
  text: I have trodden the winepress alone, and from the peoples no man was with me;
    I trod them in my anger and trampled them in my wrath; their lifeblood spattered
    on my garments, and I stained all my clothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no one was with me.' The Hebrew reads 'no man was with me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their blood.' The Hebrew term may evoke the flow of grape juice in the
      winepress image while referring to the blood of those judged.
    reason: lexical_alternative
lexical_decisions:
- source_word: פּוּרָה
  chosen: the winepress
  alternatives:
  - the press
  - the wine vat
  lexicon: HALOT
  rationale: The noun denotes a winepress/vat used for treading grapes. In context
    with דָּרַכְתִּי ('I trod'), 'winepress' is the clearest natural English rendering
    and preserves the metaphor of judgment.
- source_word: דָּרַכְתִּי
  chosen: I have trodden
  alternatives:
  - I trod
  - I trampled
  lexicon: HALOT
  rationale: The perfect can be rendered as a present perfect in English to convey
    a completed action with vivid immediacy in prophetic speech. 'Trodden' matches
    the winepress imagery better than the more general 'trampled'.
- source_word: לְבַדִּי
  chosen: alone
  alternatives:
  - by myself
  lexicon: HALOT
  rationale: Concise and idiomatic; it emphasizes solitary action without adding nuance
    beyond the Hebrew.
- source_word: וּמֵעַמִּים
  chosen: from the peoples
  alternatives:
  - from the nations
  - among the peoples
  lexicon: HALOT
  rationale: The preposition מִן with עַמִּים is most naturally 'from the peoples.'
    'Peoples' preserves the plural collective sense better than flattening to singular,
    while still allowing the broader international scope of the judgment scene.
- source_word: אֵין אִישׁ אִתִּי
  chosen: no man was with me
  alternatives:
  - there was no one with me
  - not a man was with me
  lexicon: HALOT
  rationale: This keeps the singular אִישׁ ('man') and follows the gender-accurate
    principle. It also preserves the force of total solitude. A more idiomatic inclusive
    alternative is preserved in a footnote.
- source_word: וְאֶדְרְכֵם
  chosen: I trod them
  alternatives:
  - I trampled them
  lexicon: HALOT
  rationale: Using the same root gloss as earlier maintains the wordplay between treading
    the winepress and treading the peoples. The object suffix requires 'them.'
- source_word: בְּאַפִּי
  chosen: in my anger
  alternatives:
  - in my nose/nostrils
  - in my fury
  lexicon: HALOT
  rationale: אַף literally relates to nose/nostril but idiomatically means anger.
    'In my anger' is clear modern English and preserves the anthropopathic expression's
    sense without wooden literalism.
- source_word: וְאֶרְמְסֵם
  chosen: and trampled them
  alternatives:
  - and crushed them
  - and tread them down
  lexicon: HALOT
  rationale: רמס intensifies the action beyond simple treading. 'Trampled' is vivid,
    natural, and distinct enough from the previous verb to reflect the parallel escalation.
- source_word: בַּחֲמָתִי
  chosen: in my wrath
  alternatives:
  - in my fury
  - in my heat
  lexicon: HALOT
  rationale: חֵמָה often denotes burning wrath. 'Wrath' preserves the elevated judicial
    tone and distinguishes it slightly from the earlier 'anger' for אַף.
- source_word: וְיֵז
  chosen: spattered
  alternatives:
  - sprinkled
  - splashed
  - spurted
  lexicon: HALOT
  rationale: The verb conveys liquid spurting/splashing outward. 'Spattered' fits
    the violent image and reads naturally with garments.
- source_word: נִצְחָם
  chosen: their lifeblood
  alternatives:
  - their juice
  - their blood
  lexicon: HALOT
  rationale: In this winepress metaphor the term can denote juice/flow, but in context
    of judgment against peoples it points metaphorically to blood. 'Lifeblood' preserves
    the metaphorical overlap between grape juice and blood better than a flat 'blood,'
    while remaining intelligible.
- source_word: בְּגָדַי
  chosen: my garments
  alternatives:
  - my clothes
  - my robes
  lexicon: HALOT
  rationale: '''Garments'' suits the elevated poetic register and pairs well with
    the following clothing term without becoming archaic.'
- source_word: וְכָל מַלְבּוּשַׁי
  chosen: all my clothing
  alternatives:
  - all my garments
  - all my raiment
  lexicon: HALOT
  rationale: A slight variation avoids awkward repetition while preserving the comprehensive
    force of כָל. 'Clothing' is readable modern English.
- source_word: אֶגְאָֽלְתִּי
  chosen: I stained
  alternatives:
  - I defiled
  - I polluted
  - I reddened
  lexicon: HALOT
  rationale: The verb can mean defile/pollute/stain. In this immediate context of
    spattered garments, 'I stained' is the most concrete and idiomatic English rendering,
    preserving the visual result without importing extra ceremonial connotations.
