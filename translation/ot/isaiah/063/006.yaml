theological_decisions:
- issue: Rendering the violent judgment imagery without softening or over-literalizing
    the metaphor
  chosen_reading: 'The verse is translated as divine judgment using winepress imagery:
    ''I made them drunk ... I poured their lifeblood out on the earth.'''
  alternative_readings:
  - '''I made them drunk with my wrath'' as a more explicit instrumental sense'
  - '''I brought their juice down to the earth'' preserving the winepress metaphor
    more literally'
  rationale: The Hebrew combines trampling, intoxication, and liquid poured to the
    earth. The chosen rendering preserves the severity of divine judgment and the
    metaphorical linkage between crushed grapes and blood, without importing extra
    doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 3, 6
