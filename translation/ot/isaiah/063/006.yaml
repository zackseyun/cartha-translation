id: ISA.63.6
reference: Isaiah 63:6
source:
  edition: WLC
  text: וְ/אָב֤וּס עַמִּים֙ בְּ/אַפִּ֔/י וַ/אֲשַׁכְּרֵ֖/ם בַּ/חֲמָתִ֑/י וְ/אוֹרִ֥יד
    לָ/אָ֖רֶץ נִצְחָֽ/ם׃ס
translation:
  text: I trampled peoples in my anger; I made them drunk in my wrath, and I poured
    their lifeblood out on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nations.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their nitscham'; possibly 'their juice' or 'their blood.' The translation
      'lifeblood' preserves the judgment imagery in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבוּס
  chosen: I trampled
  alternatives:
  - I trod down
  - I crushed
  lexicon: HALOT
  rationale: The verb from בוס denotes treading down or trampling underfoot. 'I trampled'
    is natural modern English and preserves the violent imagery without over-paraphrase.
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  lexicon: HALOT
  rationale: The plural of עַם often means peoples or nations. 'Peoples' is slightly
    more literal and avoids implying modern nation-states, while still fitting the
    judgment context.
- source_word: בְּאַפִּי
  chosen: in my anger
  alternatives:
  - in my nose
  - in my anger/nostril-flaring
  lexicon: HALOT
  rationale: אַף literally relates to nose/nostril and idiomatically means anger.
    English should render the idiomatic sense here.
- source_word: וַאֲשַׁכְּרֵם
  chosen: I made them drunk
  alternatives:
  - I intoxicated them
  - I made them stagger
  lexicon: HALOT
  rationale: The piel of שׁכר means to make drunk. This likely continues the winepress/judgment
    imagery. 'I made them drunk' is the most direct rendering.
- source_word: בַּחֲמָתִי
  chosen: in my wrath
  alternatives:
  - in my fury
  - in my heat
  lexicon: HALOT
  rationale: חֵמָה/חֲמָה denotes wrath, fury, or heat. 'Wrath' preserves the elevated
    judicial tone and distinguishes it slightly from 'anger' used for אַף.
- source_word: וְאוֹרִיד
  chosen: I poured ... out
  alternatives:
  - I brought down
  - I cast down
  lexicon: HALOT
  rationale: The hiphil of ירד is literally 'cause to go down.' In context with the
    object נִצְחָם and destination 'to the earth,' idiomatic English is 'I poured
    ... out,' expressing liquid being brought down to the ground.
- source_word: לָאָרֶץ
  chosen: on the earth
  alternatives:
  - to the earth
  - to the ground
  lexicon: HALOT
  rationale: אָרֶץ can mean earth, land, or ground. Because the image is of liquid
    being brought down and spilled, 'on the earth' is natural and sufficiently literal;
    'ground' is possible but less consistent with broader usage.
- source_word: נִצְחָם
  chosen: their lifeblood
  alternatives:
  - their juice
  - their blood
  - their strength
  - their splendor
  lexicon: HALOT
  rationale: נֵצַח here is difficult and has been understood variously. In this winepress-judgment
    context, many take it as the liquid that flows from the crushed, hence 'lifeblood.'
    This preserves the metaphorical overlap between winepress juice and bloodshed
    better than the opaque 'juice' alone, while avoiding an unsupported abstraction
    like 'strength.'
