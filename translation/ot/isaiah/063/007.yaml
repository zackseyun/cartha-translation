theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse repeatedly invokes the covenant name. Following the project's
    doctrinal guidance, 'the LORD' is used in the main text rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Translation of חסד
  chosen_reading: steadfast love
  alternative_readings:
  - lovingkindness
  - covenant faithfulness
  - mercy
  rationale: The term is theologically rich and covenantal. 'Steadfast love' best
    preserves the relational and enduring dimensions without importing a narrower
    doctrinal claim.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms,
    or documented exception)
