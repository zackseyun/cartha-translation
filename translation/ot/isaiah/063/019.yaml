id: ISA.63.19
reference: Isaiah 63:19
source:
  edition: WLC
  text: הָיִ֗ינוּ מֵֽ/עוֹלָם֙ לֹֽא מָשַׁ֣לְתָּ בָּ֔/ם לֹֽא נִקְרָ֥א שִׁמְ/ךָ֖ עֲלֵי/הֶ֑ם
    לוּא קָרַ֤עְתָּ שָׁמַ֨יִם֙ יָרַ֔דְתָּ מִ/פָּנֶ֖י/ךָ הָרִ֥ים נָזֹֽלּוּ־־־׃
translation:
  text: We have become like those over whom you have never ruled, those who were never
    called by your name. If only you would tear open the heavens and come down, so
    that the mountains would quake before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'at your presence' (lit. 'from before your face/presence').
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'the mountains would flow down' or 'melt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָיִינוּ
  chosen: We have become
  alternatives:
  - We were
  - We have been
  lexicon: HALOT
  rationale: Qal perfect 1cp of היה can denote a present state resulting from prior
    circumstances. In context, the lament describes Israel's present condition, so
    'have become' better conveys resultant state than a simple past 'were'.
- source_word: מֵעוֹלָם
  chosen: like those ... never
  alternatives:
  - from of old
  - for a long time
  - from ancient time
  lexicon: HALOT
  rationale: The phrase is difficult in this compressed clause. Rather than woodenly
    rendering 'from of old,' the sense in context is that Israel has come to resemble
    people long outside God's rule/coven claim. This is reflected idiomatically in
    the full clause. The temporal nuance is preserved by 'never' with the following
    verbs.
- source_word: לֹא מָשַׁלְתָּ בָּם
  chosen: over whom you have never ruled
  alternatives:
  - whom you did not rule
  - over whom you have not reigned
  lexicon: HALOT
  rationale: משל with ב marks exercising rule over persons. 'Ruled' is the most natural
    English equivalent here; 'reigned' is possible but can sound more narrowly royal
    than the broader governance sense.
- source_word: לֹא נִקְרָא שִׁמְךָ עֲלֵיהֶם
  chosen: those who were never called by your name
  alternatives:
  - upon whom your name was not called
  - over whom your name was not invoked
  lexicon: HALOT
  rationale: The passive idiom 'your name was called upon them' denotes belonging/identification
    with God. 'Were never called by your name' communicates the covenantal sense in
    clear English while staying close to the Hebrew idiom.
- source_word: לוּא
  chosen: If only
  alternatives:
  - Oh that
  - Would that
  lexicon: HALOT
  rationale: לוּא introduces a strong wish. 'If only' is idiomatic modern English
    and preserves the lament's urgency without archaic tone.
- source_word: קָרַעְתָּ שָׁמַיִם
  chosen: you would tear open the heavens
  alternatives:
  - you tore the heavens
  - you would rend the heavens
  lexicon: HALOT
  rationale: קרע means 'tear, rend.' 'Tear open' is vivid and accessible; 'rend' is
    traditional but archaic. The optative force comes from לוּא.
- source_word: יָרַדְתָּ
  chosen: come down
  alternatives:
  - descend
  - came down
  lexicon: HALOT
  rationale: With the optative particle, the perfect carries wish-force. 'Come down'
    is natural English in prayer language; 'descend' is more formal.
- source_word: מִפָּנֶיךָ
  chosen: before you
  alternatives:
  - at your presence
  - from before you
  lexicon: HALOT
  rationale: Literally 'from your face/presence.' In this context it marks the effect
    of God's appearing on creation. 'Before you' is concise and natural; the more
    explicit 'at your presence' is preserved in a footnote as a lexical alternative.
- source_word: הָרִים נָזֹלּוּ
  chosen: the mountains would quake
  alternatives:
  - the mountains would flow down
  - the mountains would melt
  lexicon: HALOT
  rationale: נזל literally means 'flow' and in poetic theophany contexts can describe
    mountains dissolving or shaking as if melting. 'Quake' captures the theophanic
    effect in idiomatic English, but because 'flow down/melt' is a significant lexical
    alternative, it is preserved in a footnote.
