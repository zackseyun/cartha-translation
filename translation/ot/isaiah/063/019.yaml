theological_decisions:
- issue: Covenantal identity in 'your name was called upon them'
  chosen_reading: 'Render as belonging/identification: ''those who were never called
    by your name'''
  alternative_readings:
  - those over whom your name was not invoked
  rationale: The Hebrew idiom commonly signals covenant ownership or identification
    rather than merely verbal invocation. The chosen rendering preserves that theological
    sense without overexplaining it.
  doctrine_reference: Translation philosophy §1, §3
- issue: Theophany imagery of mountains responding to God's presence
  chosen_reading: Use idiomatic 'quake' in the main text with more literal alternatives
    footnoted
  alternative_readings:
  - flow down
  - melt
  rationale: The verse depicts a dramatic divine descent. 'Quake' communicates the
    effect clearly in modern English, while the more literal imagery is important
    enough to preserve in a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §6
