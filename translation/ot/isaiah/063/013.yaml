theological_decisions:
- issue: Imagery of the exodus route through the sea
  chosen_reading: Render תְּהֹמוֹת as 'the depths' without over-interpreting it as
    a proper name or explicitly inserting 'sea.'
  alternative_readings:
  - through the sea
  - through the deep waters
  rationale: The immediate context clearly evokes the exodus, but the Hebrew term
    itself is broader than a direct lexical equivalent of 'sea.' The translation preserves
    the imagery while allowing the context to supply the exodus reference.
  doctrine_reference: Translation philosophy §1, §3
