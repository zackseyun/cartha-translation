id: ISA.63.13
reference: Isaiah 63:13
source:
  edition: WLC
  text: מוֹלִיכָ֖/ם בַּ/תְּהֹמ֑וֹת כַּ/סּ֥וּס בַּ/מִּדְבָּ֖ר לֹ֥א יִכָּשֵֽׁלוּ׃
translation:
  text: leading them through the depths like a horse in the wilderness, so that they
    did not stumble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the deep waters.' The Hebrew says 'through the depths,' echoing
      the exodus crossing.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹלִיכָם
  chosen: leading them
  alternatives:
  - who led them
  - causing them to go
  lexicon: HALOT
  rationale: Hiphil participle of הלך with 3mp suffix, functioning in context as a
    descriptive participial clause continuing the depiction of the LORD's past guidance.
    'Leading them' preserves the participial flow while remaining natural English.
- source_word: בַּתְּהֹמוֹת
  chosen: through the depths
  alternatives:
  - in the depths
  - through the deep places
  - through the sea-depths
  lexicon: HALOT
  rationale: תְּהֹמוֹת is the plural of 'deep/depths,' often used for watery depths.
    Given the exodus context in the surrounding verses, 'through the depths' best
    captures movement within or across the deep waters rather than mere location.
- source_word: כַּסּוּס
  chosen: like a horse
  alternatives:
  - like the horse
  - like horses
  lexicon: HALOT
  rationale: 'Singular noun with comparative כ. English idiom prefers the indefinite
    singular in a simile: ''like a horse.'''
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  - on the plain
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert terrain. 'Wilderness' fits
    biblical usage and avoids over-specifying aridity while preserving the exodus
    resonance.
- source_word: לֹא יִכָּשֵׁלוּ
  chosen: so that they did not stumble
  alternatives:
  - they did not stumble
  - they did not falter
  lexicon: HALOT
  rationale: 'Nifal imperfect of כשל means ''stumble, totter, falter.'' In English,
    adding ''so that'' makes explicit the result implied by the simile and the preceding
    guidance: the LORD led them in such a way that they did not stumble.'
