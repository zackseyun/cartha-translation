id: ISA.63.12
reference: Isaiah 63:12
source:
  edition: WLC
  text: מוֹלִיךְ֙ לִ/ימִ֣ין מֹשֶׁ֔ה זְר֖וֹעַ תִּפְאַרְתּ֑/וֹ בּ֤וֹקֵֽעַ מַ֨יִם֙ מִ/פְּנֵי/הֶ֔ם
    לַ/עֲשׂ֥וֹת ל֖/וֹ שֵׁ֥ם עוֹלָֽם׃
translation:
  text: who led his glorious arm at the right hand of Moses, who split the waters
    before them to make for himself an everlasting name,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the right of Moses' or 'by Moses’ right hand.' The Hebrew phrase
      may describe either the position of the LORD's arm in relation to Moses or the
      means by which he led Moses.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹלִיךְ
  chosen: who led
  alternatives:
  - leading
  - causing to go
  lexicon: HALOT
  rationale: Hiphil participle of הלך used relative to the prior clause, describing
    YHWH as the one who caused/guided. English finite past ('who led') fits the retrospective
    context better than a bare participle.
- source_word: לִימִין מֹשֶׁה
  chosen: at the right hand of Moses
  alternatives:
  - to the right of Moses
  - by Moses' right hand
  lexicon: HALOT
  rationale: 'The preposition ל with ימין here is best taken locatively in context:
    God''s glorious arm was present/active at Moses'' right hand. This preserves the
    Hebrew image without over-paraphrasing.'
- source_word: זְרוֹעַ תִּפְאַרְתּוֹ
  chosen: his glorious arm
  alternatives:
  - the arm of his glory
  - his majestic arm
  lexicon: HALOT
  rationale: Construct chain meaning literally 'arm of his glory/splendor.' 'His glorious
    arm' is natural English and preserves the anthropomorphic metaphor for divine
    power.
- source_word: בּוֹקֵעַ מַיִם
  chosen: who split the waters
  alternatives:
  - splitting the waters
  - dividing the waters
  - cleaving the waters
  lexicon: HALOT
  rationale: בקע commonly denotes splitting or cleaving. 'Split' is vivid, idiomatic,
    and suits the exodus allusion.
- source_word: מִפְּנֵיהֶם
  chosen: before them
  alternatives:
  - from before them
  - in front of them
  lexicon: HALOT
  rationale: Literally 'from before their face,' but in this context the idiomatic
    sense is that the waters were split in front of Israel as they advanced.
- source_word: לַעֲשׂוֹת לוֹ
  chosen: to make for himself
  alternatives:
  - to make for him
  - so as to make himself
  lexicon: HALOT
  rationale: The dative pronoun refers back to YHWH. 'For himself' makes the reflexive
    sense clear in English without implying selfishness beyond the Hebrew idiom of
    acting for one's own name.
- source_word: שֵׁם עוֹלָם
  chosen: an everlasting name
  alternatives:
  - an eternal name
  - a lasting name
  lexicon: HALOT
  rationale: עוֹלָם here denotes enduring perpetuity. 'Everlasting name' is a standard,
    clear rendering that preserves the covenantal/theological weight of divine renown.
