theological_decisions:
- issue: Referent and syntax of the opening participial clauses
  chosen_reading: 'The verse continues the description of the LORD as the one who
    acted in the exodus: he led his glorious arm at Moses'' right hand and split the
    waters before Israel.'
  alternative_readings:
  - He led Moses by the right hand with his glorious arm
  - His glorious arm was led at Moses' right hand
  rationale: The broader context (vv. 11–14) recalls the LORD's saving acts in the
    exodus. Rendering the clauses with YHWH as subject best fits the syntax and discourse
    flow while preserving the imagery of divine power accompanying Moses.
  doctrine_reference: Translation philosophy §1, §3
- issue: Anthropomorphic language for God
  chosen_reading: Retain 'his glorious arm' as metaphorical language for divine power.
  alternative_readings:
  - his power
  - his mighty strength
  rationale: The Hebrew explicitly uses bodily imagery. Per translation philosophy,
    the metaphor should be preserved rather than flattened into abstraction unless
    clarity demands otherwise; here it does not.
  doctrine_reference: Translation philosophy §1, §6
