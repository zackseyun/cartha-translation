theological_decisions:
- issue: Rendering רוּחַ קָדְשׁוֹ
  chosen_reading: his Holy Spirit
  alternative_readings:
  - his holy spirit
  - the spirit of his holiness
  rationale: The phrase can be rendered more literally, but in this context the Spirit
    is the object of rebellion and grief in a way that supports a personal referent.
    Rendering it 'his Holy Spirit' preserves the theological weight present in the
    text without importing claims beyond it. The more literal alternatives are preserved
    in a footnote for auditability.
  doctrine_reference: Affirmations; Translation philosophy §3
