id: ISA.63.10
reference: Isaiah 63:10
source:
  edition: WLC
  text: וְ/הֵ֛מָּה מָר֥וּ וְ/עִצְּב֖וּ אֶת ר֣וּחַ קָדְשׁ֑/וֹ וַ/יֵּהָפֵ֥ךְ לָ/הֶ֛ם
    לְ/אוֹיֵ֖ב ה֥וּא נִלְחַם בָּֽ/ם־־׃
translation:
  text: But they rebelled and grieved his Holy Spirit; so he turned to become their
    enemy; he himself fought against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his holy spirit' or more literally 'the spirit of his holiness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵמָּה
  chosen: But they
  alternatives:
  - And they
  - Yet they
  lexicon: HALOT
  rationale: The conjunction with independent pronoun marks a contrast with the preceding
    divine saving acts; 'But they' brings out the adversative force naturally in English
    while retaining the explicit subject.
- source_word: מָרוּ
  chosen: rebelled
  alternatives:
  - were rebellious
  - defied
  lexicon: HALOT
  rationale: The verb מרה commonly denotes rebellion or defiance against God. 'Rebelled'
    is the most direct and idiomatic rendering here.
- source_word: וְעִצְּבוּ
  chosen: grieved
  alternatives:
  - pained
  - offended
  lexicon: HALOT
  rationale: The piel of עצב can mean to cause pain or grief. In context with 'his
    Holy Spirit,' 'grieved' is the clearest English equivalent and matches the emotional-relational
    force of the Hebrew without over-paraphrase.
- source_word: אֶת רוּחַ קָדְשׁוֹ
  chosen: his Holy Spirit
  alternatives:
  - his holy spirit
  lexicon: HALOT
  rationale: The construct phrase literally means 'the spirit of his holiness' or
    'his holy spirit.' Given the established biblical usage and the personal language
    of being grieved, 'his Holy Spirit' is the best rendering in readable English.
    Capitalization reflects the referential sense in context, not an added lexical
    element.
- source_word: וַיֵּהָפֵךְ
  chosen: so he turned
  alternatives:
  - and he was turned
  - then he changed
  lexicon: HALOT
  rationale: The niphal/waw-consecutive form conveys a change of stance. 'So he turned'
    preserves the resultative movement in idiomatic English and connects it to their
    rebellion.
- source_word: לָהֶם לְאוֹיֵב
  chosen: to become their enemy
  alternatives:
  - against them as an enemy
  - into an enemy to them
  lexicon: HALOT
  rationale: Literally 'to them for an enemy.' 'To become their enemy' expresses the
    relational reversal clearly in modern English while preserving the force of the
    lamed construction.
- source_word: הוּא
  chosen: he himself
  alternatives:
  - he
  - he indeed
  lexicon: HALOT
  rationale: The explicit pronoun is emphatic after the prior clause. 'He himself'
    preserves the emphasis that God personally acted in judgment.
- source_word: נִלְחַם בָּם
  chosen: fought against them
  alternatives:
  - waged war against them
  - fought with them
  lexicon: HALOT
  rationale: The verb לחם with ב commonly means to fight against. 'Fought against
    them' is the most straightforward rendering; 'with them' in English could be misunderstood
    as alongside them.
