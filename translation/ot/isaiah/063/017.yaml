theological_decisions:
- issue: Divine causation in the lament ('do you make us wander' / 'harden our heart')
  chosen_reading: Retain the direct attribution to the LORD in the main text
  alternative_readings:
  - Soften to permissive language such as 'let us wander' or 'allow our heart to harden'
  rationale: The Hebrew uses direct causative Hiphil verbs addressed to the LORD.
    To soften them would resolve the theological tension rather than preserve it.
    The verse is a lament prayer that speaks boldly of God's sovereignty without explaining
    the mystery.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
- issue: Corporate singular 'our heart'
  chosen_reading: Use singular 'our heart'
  alternative_readings:
  - our hearts
  rationale: The singular better reflects the Hebrew and presents the people corporately.
    This is stylistically marked but understandable in English and preserves the communal
    voice of the prayer.
