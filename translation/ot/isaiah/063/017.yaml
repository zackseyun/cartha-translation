id: ISA.63.17
reference: Isaiah 63:17
source:
  edition: WLC
  text: לָ֣/מָּה תַתְעֵ֤/נוּ יְהוָה֙ מִ/דְּרָכֶ֔י/ךָ תַּקְשִׁ֥יחַ לִבֵּ֖/נוּ מִ/יִּרְאָתֶ֑/ךָ
    שׁ֚וּב לְמַ֣עַן עֲבָדֶ֔י/ךָ שִׁבְטֵ֖י נַחֲלָתֶֽ/ךָ׃
translation:
  text: Why, LORD, do you make us wander from your ways and harden our heart from
    fearing you? Return for the sake of your servants, the tribes of your inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do you lead us astray' or 'do you let us wander.' The Hebrew verb is
      causative ('make/cause to wander'), and the prayer voices the tension of God's
      sovereignty in Israel's straying.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'our heart' (singular), a collective expression for the people as
      one.
    reason: lexical_alternative
  - marker: c
    text: Or 'Turn back.' The plea asks God to turn again toward his people in covenant
      favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - Why do
  lexicon: HALOT
  rationale: Introduces a direct lament/question. Simple 'Why' best reflects the interrogative
    force without adding emphasis not present in the Hebrew.
- source_word: תַתְעֵנוּ
  chosen: do you make us wander
  alternatives:
  - do you lead us astray
  - do you let us wander
  lexicon: HALOT
  rationale: 'Hiphil of תעה is causative: ''cause to wander/go astray.'' ''Make us
    wander'' preserves the strong causative sense better than the softer permissive
    ''let us wander.'' ''Lead us astray'' is possible but can imply direct moral deception
    more sharply than the lament context requires.'
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    In direct address without the article, English idiom naturally uses 'LORD' as
    a vocative.
- source_word: מִדְּרָכֶיךָ
  chosen: from your ways
  alternatives:
  - away from your ways
  lexicon: HALOT
  rationale: 'The preposition מִן marks separation: the people are wandering away
    from the LORD''s ways. ''From your ways'' is concise and faithful; the sense of
    movement away is already conveyed by ''wander.'''
- source_word: תַּקְשִׁיחַ
  chosen: harden
  alternatives:
  - make stubborn
  - make hard
  lexicon: HALOT
  rationale: Hiphil of קשׁח means to make hard/harden. 'Harden' is the established
    and accurate English equivalent, especially in theological contexts involving
    the heart.
- source_word: לִבֵּנוּ
  chosen: our heart
  alternatives:
  - our hearts
  lexicon: HALOT
  rationale: Hebrew often uses the singular collective 'heart' with a plural possessive.
    Retaining singular reflects the source form and the corporate solidarity of the
    people. English can bear this naturally in poetic/liturgical style.
- source_word: מִיִּרְאָתֶךָ
  chosen: from fearing you
  alternatives:
  - so that we do not fear you
  - from your fear
  lexicon: HALOT
  rationale: The preposition מִן after 'harden' expresses resulting separation from
    reverence/fear of God. 'From fearing you' renders the verbal sense naturally in
    English and avoids the awkward literalism of 'from your fear.'
- source_word: שׁוּב
  chosen: Return
  alternatives:
  - Turn back
  lexicon: HALOT
  rationale: In prayer addressed to God, שוב commonly means 'return' in the sense
    of turning back in favor or presence. 'Return' is idiomatic and preserves the
    covenantal plea.
- source_word: לְמַעַן
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  lexicon: HALOT
  rationale: This preposition expresses motive or benefit. 'For the sake of' best
    captures the intercessory appeal grounded in God's relationship to his people.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it refers to God's covenant
    people in a devotional context rather than emphasizing bonded status. 'Servants'
    is the most natural and contextually fitting rendering.
- source_word: שִׁבְטֵי
  chosen: the tribes of
  alternatives:
  - the scepters of
  lexicon: HALOT
  rationale: In this context with 'your inheritance,' שׁבטים clearly refers to tribal
    divisions of Israel, not rods/scepters. 'The tribes of' makes the appositional
    phrase explicit in English.
- source_word: נַחֲלָתֶךָ
  chosen: your inheritance
  alternatives:
  - your heritage
  - your possession
  lexicon: HALOT
  rationale: '''Inheritance'' is the standard covenantal term and preserves the theological
    resonance of Israel as the LORD''s allotted possession.'
