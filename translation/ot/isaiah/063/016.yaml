theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Temporal force of מֵעוֹלָם
  chosen_reading: from of old
  alternative_readings:
  - from everlasting
  rationale: The phrase can be heard either as ancient duration or everlastingness. To preserve theological tension and avoid importing a stronger metaphysical claim than the phrase alone requires here, the main text uses 'from of old,' with the more traditional 'from everlasting' preserved in a footnote.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
