theological_decisions:
- issue: Divine designation in לְמוֹשִׁיעַ
  chosen_reading: Savior
  alternative_readings:
  - deliverer
  rationale: The verse speaks of God acting as the one who saves his people. 'Savior'
    preserves the theological force of the title without importing later doctrinal
    claims beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
- issue: Gender rendering of בָּנִים
  chosen_reading: children
  alternative_readings:
  - sons
  rationale: Per the gender-accurate principle, the masculine plural here functions
    representatively for the people as a whole. 'Children' better matches the source
    intent in context while avoiding an unnecessarily male-specific reading.
  doctrine_reference: Translation philosophy §4
