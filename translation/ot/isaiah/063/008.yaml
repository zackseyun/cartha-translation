id: ISA.63.8
reference: Isaiah 63:8
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ אַךְ עַמִּ֣/י הֵ֔מָּה בָּנִ֖ים לֹ֣א יְשַׁקֵּ֑רוּ וַ/יְהִ֥י לָ/הֶ֖ם
    לְ/מוֹשִֽׁיעַ־׃
translation:
  text: For he said, “Surely they are my people, children who will not deal falsely”;
    so he became their Savior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “sons who will not lie” / “sons who will not prove false.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: For he said
  alternatives:
  - And he said
  - Then he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'For' fits the explanatory
    connection to the preceding context in English while preserving the speech introduction.
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Indeed
  - Only
  - Truly
  lexicon: HALOT
  rationale: Here אַךְ marks strong affirmation rather than restriction; 'Surely'
    best conveys the emphatic evaluative force in context.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Standard covenantal expression; 'people' preserves the collective sense
    without paraphrase.
- source_word: הֵמָּה
  chosen: they are
  alternatives:
  - they
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. English naturally expresses this
    with the explicit copular phrase 'they are' in the quotation.
- source_word: בָּנִים
  chosen: children
  alternatives:
  - sons
  lexicon: HALOT
  rationale: Although grammatically masculine plural, the sense here is filial membership
    in relation to God, not specifically male offspring. 'Children' communicates the
    representative sense accurately in natural English.
- source_word: לֹא יְשַׁקֵּרוּ
  chosen: will not deal falsely
  alternatives:
  - will not lie
  - will not prove false
  lexicon: HALOT
  rationale: The piel of שׁקר can denote acting falsely or deceitfully, broader than
    merely speaking an untruth. 'Deal falsely' preserves that ethical breadth and
    suits covenantal context.
- source_word: וַיְהִי לָהֶם
  chosen: so he became their
  alternatives:
  - and he became their
  - and he was for them
  lexicon: HALOT
  rationale: The clause states the resulting relation. 'So he became their' captures
    the narrative consequence in idiomatic English.
- source_word: לְמוֹשִׁיעַ
  chosen: Savior
  alternatives:
  - deliverer
  - one who saves
  lexicon: HALOT
  rationale: The participial noun from ישׁע denotes one who saves/delivers. 'Savior'
    is the most natural and theologically weighty English equivalent here, while remaining
    faithful to the Hebrew.
