id: ISA.63.4
reference: Isaiah 63:4
source:
  edition: WLC
  text: כִּ֛י י֥וֹם נָקָ֖ם בְּ/לִבִּ֑/י וּ/שְׁנַ֥ת גְּאוּלַ֖/י בָּֽאָה׃
translation:
  text: For the day of vengeance was in my heart, and the year of my redemption had
    come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the year of my redeemed ones had come.' The Hebrew may be understood
      either as the time of the speaker's redeeming action or as the time concerning
      those he redeems.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding action. 'For' fits the explanatory
    force in English and preserves the discourse connection more naturally in this
    context than 'Because.'
- source_word: יוֹם
  chosen: day
  lexicon: HALOT
  rationale: Standard rendering of יוֹם. Here it denotes a decisive time of judgment,
    but the literal 'day' should be retained rather than paraphrased as 'time.'
- source_word: נָקָם
  chosen: vengeance
  alternatives:
  - avenging
  - retribution
  lexicon: HALOT
  rationale: '''Vengeance'' is the most direct nominal equivalent and preserves the
    judicial, punitive sense of divine recompense. ''Retribution'' is possible but
    less idiomatic here.'
- source_word: בְּלִבִּי
  chosen: in my heart
  alternatives:
  - on my heart
  - in my mind
  lexicon: HALOT
  rationale: A literal rendering best preserves the Hebrew anthropological expression
    of inward intention or resolve. 'In my mind' interprets the idiom too narrowly.
- source_word: וּשְׁנַת
  chosen: and the year of
  alternatives:
  - and a year of
  lexicon: HALOT
  rationale: Construct form with the following noun requires 'year of.' The conjunction
    is retained explicitly.
- source_word: גְּאוּלַי
  chosen: my redemption
  alternatives:
  - my redeemed ones
  - my act of redemption
  lexicon: HALOT
  rationale: The form can be understood as relating to redemption/deliverance accomplished
    by the speaker. In context, parallel to 'day of vengeance,' an abstract sense
    ('my redemption' = my redeeming action) fits the paired divine acts of judgment
    and deliverance. 'My redeemed ones' is possible conceptually but less likely here
    because the parallelism favors an event/time rather than a people group.
- source_word: בָּאָה
  chosen: had come
  alternatives:
  - came
  - has come
  lexicon: HALOT
  rationale: 'The qatal verb is rendered with English past perfect to reflect a state
    already reached from the speaker''s perspective within the discourse: the appointed
    year had arrived. Simple past is possible, but ''had come'' better conveys the
    sense in context.'
