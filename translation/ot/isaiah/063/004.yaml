theological_decisions:
- issue: Meaning of גְּאוּלַי in relation to divine judgment and salvation
  chosen_reading: my redemption
  alternative_readings:
  - my redeemed ones
  - my act of redeeming
  rationale: The verse pairs judgment ('day of vengeance') with deliverance ('year
    of ...'). Rendering גְּאוּלַי as an abstract noun preserves the theological tension
    of God both judging and redeeming, without over-specifying whether the focus is
    the act itself or those redeemed. The possessive 'my' is retained as in the Hebrew.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
