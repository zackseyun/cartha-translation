id: ISA.63.2
reference: Isaiah 63:2
source:
  edition: WLC
  text: מַדּ֥וּעַ אָדֹ֖ם לִ/לְבוּשֶׁ֑/ךָ וּ/בְגָדֶ֖י/ךָ כְּ/דֹרֵ֥ךְ בְּ/גַֽת׃
translation:
  text: Why is your clothing red, and your garments like one who treads in the winepress?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reddened' or 'crimson'; the Hebrew simply says 'red,' leaving the cause
      to be clarified by the context.
    reason: lexical_alternative
  - marker: b
    text: The comparison is to a person treading grapes in a winepress, whose garments
      are stained red by the juice.
    reason: cultural_note
lexical_decisions:
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - Why is it that
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative adverb introducing the question. 'Why' is the most
    natural and sufficiently formal English equivalent.
- source_word: אָדֹם
  chosen: red
  alternatives:
  - reddened
  - crimson
  lexicon: HALOT
  rationale: The adjective denotes the color red. 'Red' preserves the plain visual
    description without overinterpreting the cause; 'reddened' would import a result
    nuance not explicit in the single adjective.
- source_word: לִלְבוּשֶׁךָ
  chosen: your clothing
  alternatives:
  - your apparel
  - your robe
  lexicon: HALOT
  rationale: The noun לְבוּשׁ refers broadly to clothing or attire. 'Your clothing'
    is natural modern English and avoids narrowing the reference to a single garment
    such as 'robe'.
- source_word: וּבְגָדֶיךָ
  chosen: and your garments
  alternatives:
  - and your clothes
  - and your raiment
  lexicon: HALOT
  rationale: בֶּגֶד commonly means garment/clothing. Rendering it as 'garments' preserves
    the poetic parallelism with 'clothing' while maintaining readable modern diction.
- source_word: כְּדֹרֵךְ
  chosen: like one who treads
  alternatives:
  - like one treading
  - as a treader
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, and the participle דֹרֵךְ denotes one
    engaged in treading. 'Like one who treads' is idiomatic and preserves the ongoing/actional
    sense of the participle.
- source_word: בְּגַת
  chosen: in the winepress
  alternatives:
  - in a winepress
  - the wine vat
  lexicon: HALOT
  rationale: גַּת is a winepress. 'The winepress' fits the idiomatic image in English
    and reflects the definite, vivid poetic scene, even though Hebrew lacks the article
    here.
