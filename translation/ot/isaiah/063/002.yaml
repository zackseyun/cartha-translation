theological_decisions:
- issue: Whether to make explicit the blood/judgment imagery behind the red garments
  chosen_reading: Retain the literal visual description 'red' without adding interpretive
    language such as 'bloodstained.'
  alternative_readings:
  - Why are your clothes bloodstained...
  - Why is your apparel crimson...
  rationale: The immediate Hebrew text asks about red clothing and compares it to
    a winepress-treader; the blood/judgment interpretation becomes clearer in the
    following verse. To preserve theological tension and avoid importing interpretation
    prematurely, the main text keeps the literal imagery.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
