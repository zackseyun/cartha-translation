theological_decisions:
- issue: Rendering of divine self-deliverance in anthropomorphic language
  chosen_reading: So my own arm brought me salvation
  alternative_readings:
  - So my arm saved for me
  - So my arm won victory for me
  rationale: The Hebrew depicts the speaker's arm as the means of his own deliverance/victory,
    an anthropomorphic image of divine power acting without human assistance. 'Brought
    me salvation' preserves the lexical connection to ישׁע without importing a narrower
    doctrinal claim beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Force of חֵמָה as sustaining motive/power
  chosen_reading: and my wrath—it upheld me
  alternative_readings:
  - and my fury sustained me
  rationale: The text presents divine wrath as that which supported/upheld the speaker
    in judgment. The translation preserves this tension and does not soften the judgment
    imagery.
  doctrine_reference: Translation philosophy §3
