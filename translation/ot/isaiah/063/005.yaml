id: ISA.63.5
reference: Isaiah 63:5
source:
  edition: WLC
  text: וְ/אַבִּיט֙ וְ/אֵ֣ין עֹזֵ֔ר וְ/אֶשְׁתּוֹמֵ֖ם וְ/אֵ֣ין סוֹמֵ֑ךְ וַ/תּ֤וֹשַֽׁע
    לִ/י֙ זְרֹעִ֔/י וַ/חֲמָתִ֖/י הִ֥יא סְמָכָֽתְ/נִי׃
translation:
  text: I looked, but there was no one to help; I was appalled, but there was no one
    to support. So my own arm brought me salvation, and my wrath—it upheld me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I was astonished.' The Hebrew verb can denote stunned astonishment or
      appalled desolation.
    reason: lexical_alternative
  - marker: b
    text: Or 'my arm brought me victory.' The Hebrew verb is from the root often rendered
      'save' or 'deliver.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַבִּיט
  chosen: I looked
  alternatives:
  - I looked around
  - I considered
  lexicon: HALOT
  rationale: From נבט in the Hifil, expressing directed looking/inspection. 'I looked'
    is the most natural and sufficiently formal rendering in context.
- source_word: עֹזֵר
  chosen: to help
  alternatives:
  - helper
  lexicon: HALOT
  rationale: The participle of עזר denotes one who helps. Rendering with an infinitive
    after 'there was no one' gives idiomatic English while preserving the sense.
- source_word: וְ/אֶשְׁתּוֹמֵם
  chosen: I was appalled
  alternatives:
  - I was astonished
  - I was horrified
  lexicon: HALOT
  rationale: From שמם in a reflexive stem, conveying stunned astonishment/desolation.
    'I was appalled' captures the emotional shock in context better than the weaker
    'astonished.'
- source_word: סוֹמֵךְ
  chosen: to support
  alternatives:
  - to uphold
  - supporter
  lexicon: HALOT
  rationale: The participle of סמך means to support/uphold. 'Support' fits the parallel
    with 'help' and avoids premature repetition of 'uphold,' which is used later for
    the finite verb from the same root.
- source_word: וַ/תּוֹשַׁע לִ/י זְרֹעִ/י
  chosen: my own arm brought me salvation
  alternatives:
  - my arm saved for me
  - my arm brought me victory
  lexicon: HALOT
  rationale: The verb from ישׁע with dative לִי is idiomatically rendered as the speaker's
    arm effecting deliverance for himself. 'Brought me salvation' preserves the lexical
    link to salvation/deliverance while remaining natural English. 'My own arm' brings
    out the emphatic force of the possessive in context.
- source_word: חֲמָתִ/י
  chosen: my wrath
  alternatives:
  - my fury
  lexicon: HALOT
  rationale: חֵמָה denotes burning wrath/fury. 'Wrath' is weighty and idiomatic in
    prophetic judgment contexts.
- source_word: הִיא סְמָכָתְ/נִי
  chosen: it upheld me
  alternatives:
  - it supported me
  - she upheld me
  lexicon: HALOT
  rationale: The feminine pronoun refers back to the feminine noun 'my wrath.' English
    uses 'it' for the abstract noun. 'Upheld' is chosen here to reflect סמך and to
    vary appropriately from the earlier participial construction while preserving
    the lexical connection.
