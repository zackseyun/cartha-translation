id: ISA.63.9
reference: Isaiah 63:9
source:
  edition: WLC
  text: בְּֽ/כָל צָרָתָ֣/ם לא צָ֗ר וּ/מַלְאַ֤ךְ פָּנָי/ו֙ הֽוֹשִׁיעָ֔/ם בְּ/אַהֲבָת֥/וֹ
    וּ/בְ/חֶמְלָת֖/וֹ ה֣וּא גְאָלָ֑/ם וַֽ/יְנַטְּלֵ֥/ם וַֽ/יְנַשְּׂאֵ֖/ם כָּל יְמֵ֥י
    עוֹלָֽם־׀־׃
translation:
  text: In all their distress, he was not distressed, and the angel of his presence
    saved them; in his love and in his compassion he redeemed them, and he lifted
    them up and carried them all the days of old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following an ancient alternative reading: ''In all their distress,
      he was distressed.'''
    reason: alternative_reading
lexical_decisions:
- source_word: בְּכָל
  chosen: In all
  alternatives:
  - Through all
  - In every
  lexicon: HALOT
  rationale: 'The preposition ב with כָּל introduces the circumstance comprehensively:
    ''in all'' their distress. This is natural English and preserves the scope.'
- source_word: צָרָתָם
  chosen: their distress
  alternatives:
  - their affliction
  - their trouble
  lexicon: HALOT
  rationale: צָרָה commonly denotes distress, trouble, or affliction. 'Distress' fits
    the emotional and situational sense here and pairs well with the following clause.
- source_word: לֹא צָר
  chosen: he was not distressed
  alternatives:
  - there was no distress to him
  - he was not an adversary
  - it was not a messenger in distress
  lexicon: HALOT
  rationale: 'The MT reads לֹא צָר, literally ''not distressed/adversary.'' In context,
    the most straightforward reading is that God identified with Israel''s plight
    yet was not overcome by it: ''he was not distressed.'' Other construals are text-critically
    and syntactically possible, but this rendering stays close to the consonantal
    text while yielding coherent English.'
- source_word: וּמַלְאַךְ פָּנָיו
  chosen: and the angel of his presence
  alternatives:
  - and the messenger of his presence
  - and the angel before him
  lexicon: HALOT
  rationale: מַלְאָךְ is ordinarily 'angel' or 'messenger'; 'angel' is the more established
    and contextually fitting rendering in this theophanic-redemptive setting. פָּנָיו
    literally 'his face/presence' is best rendered 'his presence' in English.
- source_word: הוֹשִׁיעָם
  chosen: saved them
  alternatives:
  - delivered them
  lexicon: HALOT
  rationale: The Hiphil of יָשַׁע means to save/deliver. 'Saved' is concise and preserves
    the theological weight of divine rescue.
- source_word: בְּאַהֲבָתוֹ
  chosen: in his love
  alternatives:
  - because of his love
  - by his love
  lexicon: HALOT
  rationale: The preposition ב here can express attendant basis or motive. 'In his
    love' preserves the Hebrew form while remaining idiomatic, especially in parallel
    with the next phrase.
- source_word: וּבְחֶמְלָתוֹ
  chosen: and in his compassion
  alternatives:
  - and in his pity
  - and in his mercy
  lexicon: HALOT
  rationale: חֶמְלָה denotes compassion, pity, or mercy. 'Compassion' is readable
    modern English and avoids flattening the emotional force.
- source_word: הוּא גְאָלָם
  chosen: he redeemed them
  alternatives:
  - he ransomed them
  - he reclaimed them
  lexicon: HALOT
  rationale: גָּאַל is a key covenant-redemption term. 'Redeemed' preserves that theological
    resonance better than looser alternatives.
- source_word: וַיְנַטְּלֵם
  chosen: he lifted them up
  alternatives:
  - he took them up
  - he bore them up
  lexicon: HALOT
  rationale: The verb conveys lifting or taking up. 'Lifted them up' works well in
    sequence with 'carried them' without collapsing the two verbs into one.
- source_word: וַיְנַשְּׂאֵם
  chosen: carried them
  alternatives:
  - bore them
  lexicon: HALOT
  rationale: נָשָׂא often means carry, bear, or lift. 'Carried them' is idiomatic
    and preserves the nurturing imagery.
- source_word: כָּל יְמֵי עוֹלָם
  chosen: all the days of old
  alternatives:
  - all the days of eternity
  - all their ancient days
  lexicon: HALOT
  rationale: עוֹלָם can denote remote time past or future depending on context. Here
    the retrospective historical setting favors 'of old' rather than 'forever' or
    'eternity.'
