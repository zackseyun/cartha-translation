theological_decisions:
- issue: Interpretation of לֹא צָר in the first clause
  chosen_reading: Render the Masoretic Text as 'he was not distressed' rather than
    emending or following an alternative textual tradition.
  alternative_readings:
  - '''in all their distress, he was distressed'' (reflecting an alternate reading
    preserved in ancient versions and common English tradition)'
  - '''in all their distress, there was no messenger/adversary'''
  rationale: The Hebrew consonantal text as given is לֹא ('not'), not לוֹ ('to him')
    or a form meaning 'he was distressed.' Because the translation philosophy prioritizes
    original-language primacy over translation tradition, the main text follows the
    MT. However, the alternative reading is ancient, well known, and interpretively
    significant, so it is preserved in a footnote rather than silently ignored.
  doctrine_reference: Translation philosophy §§1, 3
