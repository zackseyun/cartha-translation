theological_decisions:
- issue: Implicit object of 'possessed'
  chosen_reading: Supply 'it' in English, referring contextually to the land/inheritance
    associated with the holy people.
  alternative_readings:
  - 'Leave the object unstated: ''Your holy people possessed for a little while'''
  - Specify 'your sanctuary' as the object
  rationale: The Hebrew leaves the object implicit, but English normally requires
    one. The following clause separately mentions 'your sanctuary,' so making that
    the object would blur the verse's parallelism. Supplying a neutral 'it' best reflects
    the Hebrew while preserving the lament's flow.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sense of לַמִּצְעָר
  chosen_reading: 'Temporal/adverbial: ''only for a little while.'''
  alternative_readings:
  - 'Quantitative: ''in small measure'''
  - Text-critically influenced readings tied to alternate vocalization
  rationale: In context the complaint is that God's people held their inheritance
    only briefly before enemies desecrated the sanctuary. The temporal sense best
    fits the parallel lament and yields coherent English.
  doctrine_reference: Translation philosophy §1, §6
