id: ISA.63.18
reference: Isaiah 63:18
source:
  edition: WLC
  text: לַ/מִּצְעָ֕ר יָרְשׁ֖וּ עַם קָדְשֶׁ֑/ךָ צָרֵ֕י/נוּ בּוֹסְס֖וּ מִקְדָּשֶֽׁ/ךָ־׃
translation:
  text: Your holy people possessed it only for a little while; our adversaries have
    trampled your sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a little while' or 'briefly.' The Hebrew phrase may express brevity
      or small extent.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'possessed' leaves the object unstated; context implies the land
      or inheritance, not necessarily the sanctuary itself.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמִּצְעָר
  chosen: only for a little while
  alternatives:
  - for a little while
  - briefly
  - for a small measure
  lexicon: HALOT
  rationale: 'The noun מִצְעָר denotes smallness or brevity. With prefixed ל, the
    phrase functions adverbially, expressing duration or extent: the possession lasted
    only a short time. ''Only for a little while'' makes the lament force clear in
    natural English.'
- source_word: יָרְשׁוּ
  chosen: possessed it
  alternatives:
  - inherited
  - took possession of
  - possessed
  lexicon: HALOT
  rationale: ירשׁ commonly means inherit, possess, or take possession. Here the object
    is implicit from context (the land/holy place), so English supplies 'it.' 'Possessed'
    fits the lament over temporary tenure better than the more formal 'inherited.'
- source_word: עַם קָדְשֶׁךָ
  chosen: your holy people
  alternatives:
  - the people of your holiness
  - your holy nation
  - your consecrated people
  lexicon: HALOT
  rationale: The construct phrase literally means 'the people of your holiness,' an
    idiom naturally rendered 'your holy people.' This preserves both covenant belonging
    ('your') and consecrated status ('holy').
- source_word: צָרֵינוּ
  chosen: our adversaries
  alternatives:
  - our enemies
  - our foes
  lexicon: HALOT
  rationale: צר can denote one who is hostile, an adversary or enemy. 'Adversaries'
    is slightly broader and fits the elevated lament style without overstating beyond
    the Hebrew.
- source_word: בּוֹסְסוּ
  chosen: have trampled
  alternatives:
  - trampled down
  - trodden underfoot
  - stamped on
  lexicon: HALOT
  rationale: בוסס conveys trampling or treading down. 'Have trampled' is clear modern
    English and preserves the desecrating force of the verb.
- source_word: מִקְדָּשֶׁךָ
  chosen: your sanctuary
  alternatives:
  - your holy place
  - your temple
  - your sacred place
  lexicon: HALOT
  rationale: מקדש refers to a holy place or sanctuary. 'Sanctuary' is the best general
    rendering here because it preserves sacred-space language without narrowing too
    quickly to one architectural term, though the Jerusalem temple is likely in view.
