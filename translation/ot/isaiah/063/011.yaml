theological_decisions:
- issue: Referent of the subject in 'he remembered'
  chosen_reading: God/the LORD is the implied subject
  alternative_readings:
  - the people remembered
  rationale: The immediate context has the LORD as the principal actor, and the singular
    verbal form naturally continues that line. Some versions construe the people as
    subject, but the Hebrew here does not require that shift. The translation leaves
    the pronoun implicit except in English necessity and does not overstate beyond
    context.
- issue: Referent of 'within him' in relation to the Holy Spirit
  chosen_reading: Retain the singular as 'within him' in the main text
  alternative_readings:
  - within them
  - in the midst of them
  rationale: The Hebrew suffix is singular, and optimal equivalence favors preserving
    that form in the main text. Because the referent is genuinely ambiguous and theologically
    significant, alternatives are preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
