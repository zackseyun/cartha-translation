id: ISA.63.11
reference: Isaiah 63:11
source:
  edition: WLC
  text: וַ/יִּזְכֹּ֥ר יְמֵֽי עוֹלָ֖ם מֹשֶׁ֣ה עַמּ֑/וֹ אַיֵּ֣ה הַֽ/מַּעֲלֵ֣/ם מִ/יָּ֗ם
    אֵ֚ת רֹעֵ֣י צֹאנ֔/וֹ אַיֵּ֛ה הַ/שָּׂ֥ם בְּ/קִרְבּ֖/וֹ אֶת ר֥וּחַ קָדְשֽׁ/וֹ־׀־׃
translation:
  text: 'Then he remembered the ancient days, Moses and his people: “Where is the
    one who brought them up out of the sea with the shepherds of his flock? Where
    is the one who put his Holy Spirit within him?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'with the shepherds of his flock'; some read 'with the shepherd of
      his flock,' likely referring to Moses.
    reason: alternative_reading
  - marker: b
    text: Or 'within them' or 'in the midst of them.' The Hebrew has a singular suffix
      ('within him'), but its referent is debated.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּזְכֹּר
  chosen: Then he remembered
  alternatives:
  - But he remembered
  - And he remembered
  lexicon: HALOT
  rationale: Wayyiqtol of זכר normally advances the narrative with 'and/then he remembered.'
    'Then' gives natural English flow while preserving sequence.
- source_word: יְמֵי עוֹלָם
  chosen: the ancient days
  alternatives:
  - the days of old
  - days of antiquity
  - everlasting days
  lexicon: HALOT
  rationale: The phrase idiomatically refers to former times, especially the foundational
    saving acts of God. 'Ancient days' is readable modern English and preserves the
    backward-looking sense.
- source_word: מֹשֶׁה עַמּוֹ
  chosen: Moses and his people
  alternatives:
  - Moses his people
  - his people Moses
  - the days of Moses, his people
  lexicon: HALOT
  rationale: The Hebrew sequence is compressed and syntactically difficult. This rendering
    takes Moses and his people together as the remembered generation associated with
    the exodus. It avoids over-parsing while yielding coherent English.
- source_word: אַיֵּה
  chosen: Where is
  alternatives:
  - Where was
  lexicon: HALOT
  rationale: The repeated interrogative is best preserved as a rhetorical present
    in English, matching the lamenting tone.
- source_word: הַמַּעֲלֵם
  chosen: the one who brought them up
  alternatives:
  - the one bringing them up
  - the one who led them up
  lexicon: HALOT
  rationale: עלה in exodus contexts commonly means 'bring up' from Egypt/sea. The
    pronominal suffix is plural, so 'them' is explicit in English.
- source_word: מִיָּם
  chosen: out of the sea
  alternatives:
  - from the sea
  lexicon: HALOT
  rationale: The exodus setting favors 'out of the sea,' making the deliverance imagery
    explicit without adding content.
- source_word: אֵת רֹעֵי צֹאנוֹ
  chosen: with the shepherds of his flock
  alternatives:
  - with the shepherd of his flock
  - along with the shepherds of his flock
  lexicon: HALOT
  rationale: The Masoretic pointing is plural ('shepherds'). Although some understand
    a singular reference to Moses, the consonantal/pointed text is plural, so the
    main text preserves it. The singular sense is worth noting in a footnote because
    of contextual plausibility.
- source_word: הַשָּׂם
  chosen: the one who put
  alternatives:
  - the one placing
  - the one who set
  lexicon: HALOT
  rationale: שים commonly means 'put/set.' The participial form parallels 'the one
    who brought up,' so 'the one who put' preserves the structure.
- source_word: בְּקִרְבּוֹ
  chosen: within him
  alternatives:
  - within them
  - in his midst
  - among them
  lexicon: HALOT
  rationale: 'The suffix is singular in the MT, but its referent is debated: Moses,
    the people collectively, or the midst of the people. The main text keeps the singular
    form with a literal rendering, and alternatives are preserved in a footnote due
    to genuine ambiguity.'
- source_word: רוּחַ קָדְשׁוֹ
  chosen: his Holy Spirit
  alternatives:
  - his holy Spirit
  - his sacred spirit
  lexicon: HALOT
  rationale: The phrase is a marked expression in Isaiah (cf. 63:10) and is appropriately
    rendered 'his Holy Spirit.' Capitalization reflects standard English treatment
    of the divine Spirit in this context.
