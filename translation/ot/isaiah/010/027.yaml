theological_decisions:
- issue: Interpretation of מִפְּנֵי שָׁמֶן
  chosen_reading: because of fatness
  alternative_readings:
  - because of oil
  - because of anointing
  rationale: The phrase is lexically difficult and has been interpreted in later tradition
    as 'because of the anointing.' The Hebrew שָׁמֶן normally means 'fatness/oil,'
    and the immediate context does not explicitly introduce an anointing figure or
    rite. To avoid importing a doctrinally loaded interpretation not demanded by the
    text, the main text preserves the more literal causal image, while alternatives
    are footnoted.
  doctrine_reference: Translation philosophy §§1, 3, 5
