id: ISA.10.27
reference: Isaiah 10:27
source:
  edition: WLC
  text: וְ/הָיָ֣ה בַּ/יּ֣וֹם הַ/ה֗וּא יָס֤וּר סֻבֳּל/וֹ֙ מֵ/עַ֣ל שִׁכְמֶ֔/ךָ וְ/עֻלּ֖/וֹ
    מֵ/עַ֣ל צַוָּארֶ֑/ךָ וְ/חֻבַּ֥ל עֹ֖ל מִ/פְּנֵי שָֽׁמֶן׀־׃
translation:
  text: And in that day his burden will depart from upon your shoulder, and his yoke
    from upon your neck; and the yoke will be broken because of fatness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of oil'; traditionally also rendered 'because of the anointing.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will be
  alternatives:
  - And it shall happen
  - And it will come to pass
  lexicon: HALOT
  rationale: Introduces a future circumstance in prophetic discourse. 'And in that
    day' captures the idiomatic temporal transition without archaic English.
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'In that day' is idiomatic and preserves
    the eschatological/prophetic register.
- source_word: יָסוּר
  chosen: will depart
  alternatives:
  - will turn aside
  - will be removed
  lexicon: HALOT
  rationale: The verb means to turn aside/remove. 'Will depart' fits the intransitive
    syntax with the burden as subject while conveying removal from the hearer's body.
- source_word: סֻבֳּלוֹ
  chosen: his burden
  alternatives:
  - his load
  lexicon: HALOT
  rationale: Refers to the oppressive load imposed by the Assyrian. 'Burden' is the
    most natural English equivalent in this context and pairs well with 'yoke.'
- source_word: מֵעַל שִׁכְמֶךָ
  chosen: from upon your shoulder
  alternatives:
  - off your shoulder
  - from your shoulder
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew prepositional imagery.
    'Shoulder' is singular in the Hebrew and is retained.
- source_word: וְעֻלּוֹ
  chosen: and his yoke
  alternatives:
  - and his harness
  lexicon: HALOT
  rationale: The agricultural metaphor of domination is standard and should be preserved
    literally as 'yoke.' The suffix refers to the oppressor's yoke laid on Judah.
- source_word: מֵעַל צַוָּארֶךָ
  chosen: from upon your neck
  alternatives:
  - off your neck
  - from your neck
  lexicon: HALOT
  rationale: Keeps the bodily image parallel to 'from upon your shoulder.' 'Neck'
    is the natural gloss for צַוָּאר.
- source_word: וְחֻבַּל
  chosen: will be broken
  alternatives:
  - will be destroyed
  - will be ruined
  lexicon: HALOT
  rationale: The passive verb here conveys the yoke's being damaged to the point of
    uselessness. 'Will be broken' is concrete and fits the yoke metaphor better than
    more abstract options.
- source_word: עֹל
  chosen: the yoke
  alternatives:
  - a yoke
  lexicon: HALOT
  rationale: Although anarthrous in Hebrew, English idiom favors 'the yoke' here,
    referring back to the previously mentioned yoke and maintaining cohesion.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from before
  - on account of
  lexicon: HALOT
  rationale: In this context the preposition indicates cause or occasion. 'Because
    of' is the clearest idiomatic rendering.
- source_word: שָׁמֶן
  chosen: fatness
  alternatives:
  - oil
  - anointing
  - richness
  lexicon: HALOT
  rationale: The Hebrew noun ordinarily denotes fat/oil-richness. The phrase is notoriously
    difficult; 'fatness' best preserves the literal image without importing a later
    theological interpretation such as 'anointing.' The causal sense is that the yoke
    is broken because of fullness/fatness, likely an image of growth or prosperity.
