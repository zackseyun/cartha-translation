id: ISA.10.19
reference: Isaiah 10:19
source:
  edition: WLC
  text: וּ/שְׁאָ֥ר עֵ֛ץ יַעְר֖/וֹ מִסְפָּ֣ר יִֽהְי֑וּ וְ/נַ֖עַר יִכְתְּבֵֽ/ם׃פ
translation:
  text: And the remaining trees of his forest will be so few that a boy can write
    them down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the remnant of the trees of his forest will be a number, and a boy will
      write them.' The Hebrew uses 'number' idiomatically for 'few enough to count.'
    reason: lexical_alternative
  - marker: b
    text: '''Boy'' translates a masculine singular Hebrew term (naʿar), which can
      also mean ''youth'' or ''young man'' depending on context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁאָר
  chosen: And the remaining
  alternatives:
  - And the remnant
  - And what is left
  lexicon: HALOT
  rationale: שְׁאָר denotes what remains or is left over. 'Remaining' fits the immediate
    image of survivors after devastation. 'Remnant' is possible, but here the referent
    is trees rather than a theological people-remnant, so 'remaining' avoids importing
    technical overtones.
- source_word: עֵץ
  chosen: trees
  alternatives:
  - wood
  - tree
  lexicon: HALOT
  rationale: 'Although morphologically singular in construct with ''forest,'' עֵץ
    here functions collectively: the surviving tree-growth of the forest. English
    idiom requires the plural ''trees'' in this context.'
- source_word: יַעְרוֹ
  chosen: his forest
  alternatives:
  - its forest
  lexicon: HALOT
  rationale: The 3ms suffix most naturally refers back to Assyria/the felled oppressor
    in the surrounding context. 'His forest' preserves the masculine singular suffix
    formally; 'its forest' would be smoother in English but less transparent to the
    Hebrew form.
- source_word: מִסְפָּר
  chosen: so few
  alternatives:
  - a number
  - few in number
  - countable
  lexicon: HALOT
  rationale: Literally 'number,' used idiomatically with יהיהו to mean they will be
    few enough to count. 'So few' expresses the Hebrew sense naturally in English
    while preserving the emphasis on smallness/countability.
- source_word: יִהְיוּ
  chosen: will be
  lexicon: HALOT
  rationale: Simple future/copular sense from היה. Combined with מִסְפָּר it yields
    the idiom 'will be few/numbered.'
- source_word: וְ/נַעַר
  chosen: that a boy
  alternatives:
  - and a youth
  - and a young man
  lexicon: HALOT
  rationale: נַעַר denotes a boy or youth. 'Boy' best fits the image of someone young
    enough that the surviving trees are astonishingly few if even he can record them.
    This also preserves the gender-accurate masculine singular in line with the translation
    philosophy.
- source_word: יִכְתְּבֵם
  chosen: can write them down
  alternatives:
  - will write them
  - can record them
  lexicon: HALOT
  rationale: 'Literally ''will write them,'' but in context the sense is ability/ease:
    the number is small enough to be listed. ''Write them down'' is idiomatic English
    and preserves the concrete image of counting by writing.'
