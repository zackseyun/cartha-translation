theological_decisions:
- issue: Rendering vulnerable social categories in prophetic indictment
  chosen_reading: Retained concrete categories 'widows' and 'the fatherless' rather
    than generalizing to 'the vulnerable.'
  alternative_readings:
  - widows and orphans
  - the vulnerable
  rationale: The Hebrew names specific covenantally protected groups. Preserving them
    maintains the text's ethical force without importing broader abstraction.
  doctrine_reference: Translation philosophy §§1, 6
- issue: First-person suffix in עַמִּי
  chosen_reading: Rendered as 'my people.'
  alternative_readings:
  - his people
  rationale: The Hebrew suffix is first person singular, reflecting the divine speaker's
    perspective in context. This should be preserved rather than flattened.
  doctrine_reference: Translation philosophy §1
