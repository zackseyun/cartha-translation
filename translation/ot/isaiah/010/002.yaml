id: ISA.10.2
reference: Isaiah 10:2
source:
  edition: WLC
  text: לְ/הַטּ֤וֹת מִ/דִּין֙ דַּלִּ֔ים וְ/לִ/גְזֹ֕ל מִשְׁפַּ֖ט עֲנִיֵּ֣י עַמִּ֑/י
    לִ/הְי֤וֹת אַלְמָנוֹת֙ שְׁלָלָ֔/ם וְ/אֶת יְתוֹמִ֖ים יָבֹֽזּוּ־׃
translation:
  text: to turn aside the poor from justice, and to rob the afflicted of my people
    of their right, so that widows may become their spoil, and they may plunder the
    fatherless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the poor of my people.' The Hebrew term can denote poverty, affliction,
      or oppression.
    reason: lexical_alternative
  - marker: b
    text: Or 'orphans.' Literally 'the fatherless.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַטּוֹת
  chosen: to turn aside
  alternatives:
  - to bend
  - to pervert
  lexicon: HALOT
  rationale: Hiphil infinitive of נטה here carries the sense of causing justice to
    be diverted or denied. 'Turn aside' is idiomatic and preserves the metaphor without
    overinterpreting as the more explicit 'pervert.'
- source_word: מִדִּין
  chosen: from justice
  alternatives:
  - from judgment
  - from legal claim
  lexicon: HALOT
  rationale: דִּין can denote legal process, judgment, or justice. In context of judicial
    oppression, 'justice' communicates the deprivation of rightful legal protection
    in natural English.
- source_word: דַּלִּים
  chosen: the poor
  alternatives:
  - the weak
  - the needy
  lexicon: HALOT
  rationale: דַּל commonly denotes the poor or socially weak. 'The poor' is the most
    direct and common rendering in this social-justice context.
- source_word: וְלִגְזֹל
  chosen: and to rob
  alternatives:
  - and to seize
  - and to plunder
  lexicon: HALOT
  rationale: גזל means to take by force or unjustly. 'Rob' fits the legal-oppression
    context and pairs well with the following object of rights/justice.
- source_word: מִשְׁפַּט
  chosen: their right
  alternatives:
  - justice
  - legal due
  lexicon: HALOT
  rationale: Here מִשְׁפָּט refers not merely to abstract justice but to what is legally
    due to the afflicted. Rendering it 'their right' avoids awkward repetition with
    the earlier דִּין while preserving juridical force.
- source_word: עֲנִיֵּי עַמִּי
  chosen: the afflicted of my people
  alternatives:
  - the poor of my people
  - my people's needy
  lexicon: HALOT
  rationale: עָנִי often denotes the afflicted, oppressed, or poor. 'The afflicted
    of my people' captures both economic vulnerability and oppression, fitting the
    prophetic denunciation.
- source_word: לִהְיוֹת
  chosen: so that ... may become
  alternatives:
  - to become
  - with the result that
  lexicon: HALOT
  rationale: The infinitive expresses result/purpose in context. 'So that ... may
    become' makes the relationship clear in contemporary English.
- source_word: אַלְמָנוֹת
  chosen: widows
  lexicon: HALOT
  rationale: Standard rendering; socially vulnerable women bereft of husbands are
    in view.
- source_word: שְׁלָלָם
  chosen: their spoil
  alternatives:
  - their prey
  - their plunder
  lexicon: HALOT
  rationale: שָׁלָל is spoil/plunder taken by victors or raiders. 'Spoil' preserves
    the predatory, exploitative image and distinguishes it from the following verb.
- source_word: יְתוֹמִים
  chosen: the fatherless
  alternatives:
  - orphans
  lexicon: HALOT
  rationale: יָתוֹם literally denotes one bereft of a father. 'The fatherless' is
    a traditional but still understandable rendering that preserves the Hebrew social
    category more precisely than the broader 'orphans.'
- source_word: יָבֹזּוּ
  chosen: they may plunder
  alternatives:
  - they may despoil
  - they may prey upon
  lexicon: HALOT
  rationale: בזז means to plunder or despoil. 'Plunder' is vivid, natural English
    and maintains the violent exploitation imagery.
