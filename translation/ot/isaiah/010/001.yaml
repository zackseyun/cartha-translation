id: ISA.10.1
reference: Isaiah 10:1
source:
  edition: WLC
  text: ה֥וֹי הַ/חֹֽקְקִ֖ים חִקְקֵי אָ֑וֶן וּֽ/מְכַתְּבִ֥ים עָמָ֖ל כִּתֵּֽבוּ־׃
translation:
  text: Woe to those who decree decrees of wickedness, and the writers who keep writing
    oppression,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who write trouble' or 'who record misery'; the Hebrew term can denote
      harmful trouble or burdensome injustice. 'Oppression' fits the legal context
      best.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew uses a wordplay: literally, ''those who decree decrees of wickedness.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Prophetic interjection announcing judgment; 'Woe' is the standard and
    most forceful English equivalent in this context.
- source_word: הַחֹקְקִים
  chosen: those who decree
  alternatives:
  - those who enact
  - those who legislate
  lexicon: HALOT
  rationale: From חקק in a governing/legal sense. The participle denotes the people
    issuing binding rulings. 'Decree' preserves the juridical force without over-specifying
    a modern legislative setting.
- source_word: חִקְקֵי
  chosen: decrees
  alternatives:
  - statutes
  - ordinances
  lexicon: HALOT
  rationale: Cognate noun with the preceding participle, creating a rhetorical repetition.
    'Decree decrees' preserves the Hebrew emphasis better than smoothing to a single
    legal term.
- source_word: אָוֶן
  chosen: wickedness
  alternatives:
  - iniquity
  - trouble
  - evil
  lexicon: HALOT
  rationale: Here the term characterizes the decrees as morally corrupt, not merely
    harmful. 'Wickedness' communicates ethical evil in readable modern English.
- source_word: וּמְכַתְּבִים
  chosen: and the writers who keep writing
  alternatives:
  - and those who write
  - and the scribes who write
  lexicon: HALOT
  rationale: The participle parallels the previous participle and refers to those
    producing written rulings. 'Writers' is broad enough to avoid importing a technical
    office, while 'keep writing' reflects the ongoing participial sense.
- source_word: עָמָל
  chosen: oppression
  alternatives:
  - trouble
  - toil
  - misery
  lexicon: HALOT
  rationale: In this legal-judicial context the word points to burdensome injustice
    inflicted on others. 'Oppression' best captures the social harm intended by the
    written rulings.
- source_word: כִּתֵּבוּ
  chosen: who keep writing
  alternatives:
  - they have written
  - they write down
  lexicon: HALOT
  rationale: Though morphologically a perfect, in this construction after the participle
    it functions to complete and intensify the idea of ongoing written production.
    Rendering it with 'keep writing' yields natural English while preserving the sense
    of persistent action.
