theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of Assyria's 'glory' and 'fat ones'
  chosen_reading: The verse depicts judgment on Assyria's elite strength and splendor, using bodily and fire imagery metaphorically.
  alternative_readings:
  - A more literal reading focused on physical fatness and literal glory
  - A broader national rather than military reference
  rationale: The immediate context concerns the downfall of Assyria's proud power. The translation preserves the metaphor while making clear that the target is the empire's powerful elite and magnificence, not merely physical condition.
