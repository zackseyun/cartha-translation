id: ISA.10.16
reference: Isaiah 10:16
source:
  edition: WLC
  text: לָ֠/כֵן יְשַׁלַּ֨ח הָ/אָד֜וֹן יְהוָ֧ה צְבָא֛וֹת בְּ/מִשְׁמַנָּ֖י/ו רָז֑וֹן וְ/תַ֧חַת כְּבֹד֛/וֹ יֵקַ֥ד יְקֹ֖ד כִּ/יק֥וֹד אֵֽשׁ׃
translation:
  text: Therefore the Lord, Yahweh of Armies, will send leanness among his fat ones, and under his glory a burning will be kindled like the burning of fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against his well-fed ones' or 'among his fat ones'; the Hebrew uses an image of fatness for strength, prosperity, or robust elites.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''instead of his glory,'' taking ''under'' in a substitutional sense: what replaces his splendor is burning.'
    reason: alternative_reading
  - marker: c
    text: '''His glory'' may also mean ''his splendor'' or ''his pomp.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential particle introducing the consequence of the preceding oracle.
- source_word: יְשַׁלַּח
  chosen: will send
  alternatives:
  - will dispatch
  - will let loose
  lexicon: HALOT
  rationale: Piel of שלח here conveys causative sending of judgment; 'will send' is the most natural and sufficiently formal rendering.
- source_word: הָאָדוֹן יְהוָה צְבָאוֹת
  chosen: the Lord, the LORD of Armies
  alternatives:
  - the Lord GOD of hosts
  - the Lord, Yahweh of Armies
  lexicon: HALOT
  rationale: אָדוֹן with article is a title, rendered 'the Lord.' יְהוָה follows the doctrinal default 'the LORD.' צְבָאוֹת is translated, not transliterated, as 'of Armies' to preserve meaning in contemporary English while avoiding the traditional but less transparent 'hosts.'
- source_word: בְּמִשְׁמַנָּיו
  chosen: among his stout warriors
  alternatives:
  - among his fat ones
  - among his robust men
  - against his well-fed ones
  lexicon: HALOT
  rationale: Literally 'among his fat/rich ones,' but in context of Assyria's elite military strength the term is metaphorical for the robust, powerful, or well-nourished troops. 'Stout warriors' preserves the image of strength without woodenly implying obesity.
- source_word: רָזוֹן
  chosen: wasting sickness
  alternatives:
  - leanness
  - emaciation
  - wasting
  lexicon: HALOT
  rationale: The noun denotes wasting away or leanness. Because it is something the Lord 'sends' as judgment upon the strong, 'wasting sickness' makes the punitive force clear in idiomatic English while preserving the sense of emaciating affliction.
- source_word: וְתַחַת כְּבֹדוֹ
  chosen: and under his glory
  alternatives:
  - and beneath his glory
  - and instead of his glory
  lexicon: HALOT
  rationale: תחת can mean 'under, beneath' spatially or 'instead of' in substitution. Here the imagery is of destructive fire beneath Assyria's outward splendor, so 'under his glory' best preserves the metaphor. The substitutional nuance is worth preserving in a footnote.
- source_word: כְּבֹדוֹ
  chosen: his glory
  alternatives:
  - his splendor
  - his wealth
  - his pomp
  lexicon: HALOT
  rationale: כבוד often denotes glory, honor, or splendor. In this judgment context it refers to the king/empire's magnificence and pomp; 'glory' keeps the Hebrew term's weight, with the more specific nuance preserved as an alternative.
- source_word: יֵקַד יְקֹד
  chosen: a burning will be kindled
  alternatives:
  - it will burn with a burning
  - a blaze will be ignited
  lexicon: HALOT
  rationale: The verb-noun pairing intensifies the image. English cannot reproduce the exact cognate force naturally, so 'a burning will be kindled' preserves both the event and the emphatic repetition.
- source_word: כִּיקוֹד אֵשׁ
  chosen: like the burning of fire
  alternatives:
  - like a fire's burning
  - like a blazing fire
  lexicon: HALOT
  rationale: Comparative phrase reinforcing the intensity of the judgment. 'Like the burning of fire' stays close to the Hebrew while remaining readable.
