theological_decisions:
- issue: Whether אַדִּיר should be rendered as an explicit divine title
  chosen_reading: by a mighty one
  alternative_readings:
  - by the Mighty One
  rationale: The immediate context strongly implies the LORD's judgment, and many
    interpreters understand 'the Mighty One' as a reference to God. However, the Hebrew
    expression itself does not explicitly include the divine name or an unambiguous
    title marker requiring capitalization in English. The translation therefore preserves
    the poetic ambiguity in the main text and notes the possible divine-title reading
    in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
