id: ISA.10.34
reference: Isaiah 10:34
source:
  edition: WLC
  text: וְ/נִקַּ֛ף סִֽבְכֵ֥י הַ/יַּ֖עַר בַּ/בַּרְזֶ֑ל וְ/הַ/לְּבָנ֖וֹן בְּ/אַדִּ֥יר
    יִפּֽוֹל׃ס
translation:
  text: And the thickets of the forest will be cut down with iron, and Lebanon will
    fall by a mighty one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Lebanon will fall by the Mighty One,' taking 'mighty one' as a title
      referring to God.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנִקַּף
  chosen: will be cut down
  alternatives:
  - will be lopped off
  - will be struck down
  - will be hewn down
  lexicon: HALOT
  rationale: The Niphal form of נקף here is passive/reflexive in sense, describing
    the forest being felled. 'Cut down' is natural English and fits the imagery of
    trees being chopped. 'Lopped off' is possible, but 'cut down' better suits the
    collective object and the parallel with falling Lebanon.
- source_word: סִבְכֵי
  chosen: the thickets of
  alternatives:
  - the tangled growth of
  - the boughs of
  - the dense branches of
  lexicon: HALOT
  rationale: סבך denotes thicket, tangled growth, or interwoven branches. In construct
    with 'the forest,' it points to the dense, tangled parts of the woodland. 'Thickets'
    preserves the image without overinterpreting as only upper branches.
- source_word: הַיַּעַר
  chosen: the forest
  alternatives:
  - the woodland
  lexicon: HALOT
  rationale: יער straightforwardly means 'forest' or 'woodland.' 'Forest' is the standard,
    clear rendering in English.
- source_word: בַּבַּרְזֶל
  chosen: with iron
  alternatives:
  - with an iron tool
  - with the axe
  lexicon: HALOT
  rationale: Literally 'with the iron.' The phrase likely uses 'iron' metonymically
    for an iron implement or axe. Rendering it as 'with iron' preserves the Hebrew
    image and avoids adding a specific tool not stated in the text.
- source_word: וְהַלְּבָנוֹן
  chosen: and Lebanon
  alternatives:
  - and the Lebanon forest
  lexicon: HALOT
  rationale: Lebanon can function literally as the region/mountain range and symbolically
    for its famed forest grandeur. Retaining 'Lebanon' preserves the prophetic imagery
    and possible personification.
- source_word: בְּאַדִּיר
  chosen: by a mighty one
  alternatives:
  - by the Mighty One
  - by a majestic one
  - with majesty
  lexicon: HALOT
  rationale: 'אַדִּיר as an adjective/substantive means mighty, majestic, powerful.
    The preposition ב here is best taken instrumentally/agentively: Lebanon falls
    ''by a mighty one.'' Capitalizing as a divine title is possible in context, but
    the Hebrew lacks an explicit divine name here, so the lower-case rendering preserves
    the ambiguity while allowing the broader context to suggest divine agency.'
- source_word: יִפּוֹל
  chosen: will fall
  alternatives:
  - will be felled
  lexicon: HALOT
  rationale: נפל means 'fall.' Although in context it implies being felled like trees,
    'will fall' preserves the direct lexical sense and the poetic force.
