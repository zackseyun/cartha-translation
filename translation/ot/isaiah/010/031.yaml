id: ISA.10.31
reference: Isaiah 10:31
source:
  edition: WLC
  text: נָדְדָ֖ה מַדְמֵנָ֑ה יֹשְׁבֵ֥י הַ/גֵּבִ֖ים הֵעִֽיזוּ׃
translation:
  text: Madmenah has fled; the inhabitants of Gebim seek refuge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the inhabitants of Gebim have taken shelter' or 'have fled for safety.'
      The Hebrew verb here is difficult and may convey hurried action for protection.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָדְדָה
  chosen: has fled
  alternatives:
  - has wandered away
  - has moved on
  lexicon: HALOT
  rationale: Qal perfect 3fs from נדד, used of fleeing or wandering. With Madmenah
    as a feminine place name, 'has fled' gives the most natural English personification
    in this invasion context.
- source_word: מַדְמֵנָה
  chosen: Madmenah
  rationale: Proper place name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: יֹשְׁבֵי
  chosen: the inhabitants of
  alternatives:
  - those who dwell in
  - the residents of
  lexicon: HALOT
  rationale: Construct participle of ישב functioning substantivally. 'Inhabitants
    of' is idiomatic and preserves the collective sense.
- source_word: הַגֵּבִים
  chosen: Gebim
  rationale: Proper place name with article in Hebrew. The article likely reflects
    the Hebrew form of the toponym or local usage; in English the place name is best
    left simply as 'Gebim.'
- source_word: הֵעִיזוּ
  chosen: seek refuge
  alternatives:
  - have taken shelter
  - have fled for safety
  lexicon: HALOT
  rationale: Hiphil perfect 3cp from עוז/עזז in this context is commonly understood
    idiomatically as making haste to find safety or gathering oneself to flee. 'Seek
    refuge' fits the military-panic sequence of nearby towns reacting to the Assyrian
    advance and avoids the misleadingly literal sense 'show strength'.
