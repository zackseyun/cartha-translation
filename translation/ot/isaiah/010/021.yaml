id: ISA.10.21
reference: Isaiah 10:21
source:
  edition: WLC
  text: שְׁאָ֥ר יָשׁ֖וּב שְׁאָ֣ר יַעֲקֹ֑ב אֶל אֵ֖ל גִּבּֽוֹר־׃
translation:
  text: A remnant will return, the remnant of Jacob, to the Mighty God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to God the Mighty One'; less likely, 'to a mighty god' or 'to a mighty
      hero.' The Hebrew title אֵל גִּבּוֹר is also used in Isaiah 9:6.
    reason: lexical_alternative
  - marker: b
    text: The wording echoes the name Shear-jashub ('a remnant will return') in Isaiah
      7:3.
    reason: cross_reference
lexical_decisions:
- source_word: שְׁאָר
  chosen: remnant
  alternatives:
  - survivor(s)
  - remainder
  lexicon: HALOT
  rationale: The noun denotes what is left over after judgment or catastrophe. 'Remnant'
    is the established and contextually apt rendering in Isaiah, carrying both numerical
    and theological force without over-paraphrase.
- source_word: יָשׁוּב
  chosen: will return
  alternatives:
  - shall turn back
  - will come back
  lexicon: HALOT
  rationale: Qal imperfect of שוב commonly means 'return/turn back.' 'Will return'
    is natural modern English and preserves the prophetic future sense. It also allows
    the wordplay with Shear-jashub ('a remnant shall return') to remain audible.
- source_word: שְׁאָר יַעֲקֹב
  chosen: the remnant of Jacob
  alternatives:
  - the remainder of Jacob
  - Jacob's remnant
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered 'the remnant of Jacob.'
    Adding the article in English improves idiomatic clarity and reflects the definite
    sense of the phrase in context.
- source_word: יַעֲקֹב
  chosen: Jacob
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The Hebrew explicitly names Jacob. It should be transliterated as the
    personal/collective covenant name rather than interpreted as 'Israel' in translation.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  - toward
  lexicon: HALOT
  rationale: The preposition marks movement or turning toward a person. 'To' is the
    clearest modern equivalent.
- source_word: אֵל גִּבּוֹר
  chosen: the Mighty God
  alternatives:
  - God the Mighty One
  - mighty God
  lexicon: HALOT
  rationale: The phrase is a divine title. In Isaiah it naturally bears its full theological
    weight as a designation of God, not merely 'mighty hero.' Capitalization signals
    titular use in English. The article is supplied for idiomatic English with a recognized
    title.
