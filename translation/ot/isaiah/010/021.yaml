theological_decisions:
- issue: Rendering of אֵל גִּבּוֹר in a context linked with Isaiah's theology and
    its reuse in Isa 9:6
  chosen_reading: the Mighty God
  alternative_readings:
  - mighty god
  - God the Mighty One
  - mighty hero
  rationale: The immediate context says the remnant returns 'to' this figure, strongly
    favoring a divine referent rather than a merely human warrior. Within Isaiah,
    אֵל גִּבּוֹר functions as a weighty divine title; rendering it 'the Mighty God'
    preserves that force and avoids flattening the text into a generic heroic description.
    The lower-case alternative is preserved in a footnote as a lexical possibility,
    but the main text should reflect the most contextually and theologically coherent
    reading.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 5
