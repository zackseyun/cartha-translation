id: ISA.10.17
reference: Isaiah 10:17
source:
  edition: WLC
  text: וְ/הָיָ֤ה אֽוֹר יִשְׂרָאֵל֙ לְ/אֵ֔שׁ וּ/קְדוֹשׁ֖/וֹ לְ/לֶהָבָ֑ה וּ/בָעֲרָ֗ה
    וְ/אָֽכְלָ֛ה שִׁית֥/וֹ וּ/שְׁמִיר֖/וֹ בְּ/י֥וֹם אֶחָֽד־׃
translation:
  text: And the light of Israel will become a fire, and his Holy One a flame; it will
    burn and consume his thorns and his briers in a single day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be a fire ... a flame'; the Hebrew construction can be rendered
      more formally, but here likely carries the sense of becoming.
    reason: lexical_alternative
  - marker: b
    text: '''His Holy One'' is likely a divine title, referring to the LORD, a frequent
      theme in Isaiah.'
    reason: cross_reference
  - marker: c
    text: The Hebrew terms rendered 'thorns' and 'briers' refer to thorny growth;
      the first term is relatively rare and may also be understood more broadly as
      undergrowth.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: The verb היה with לְ following ('to/for fire') naturally carries a sense
    of becoming or turning into, not merely static existence. 'Will become' best reflects
    the transformation imagery.
- source_word: אוֹר יִשְׂרָאֵל
  chosen: the light of Israel
  alternatives:
  - Israel's light
  lexicon: HALOT
  rationale: A close, natural rendering of the construct phrase. The imagery is metaphorical
    and should be preserved rather than interpreted in the main text.
- source_word: לְאֵשׁ
  chosen: a fire
  alternatives:
  - fire
  lexicon: HALOT
  rationale: 'The preposition לְ after היה indicates result/state: ''become a fire.''
    The indefinite article is natural in English.'
- source_word: וּקְדוֹשׁוֹ
  chosen: his Holy One
  alternatives:
  - his holy one
  lexicon: HALOT
  rationale: The title likely refers to the Holy One associated with Israel, a common
    Isaianic divine designation. Capitalization signals titular usage in English without
    overtranslating.
- source_word: לְלֶהָבָה
  chosen: a flame
  alternatives:
  - flame
  lexicon: HALOT
  rationale: A straightforward rendering that preserves the poetic parallel with 'fire.'
- source_word: וּבָעֲרָה
  chosen: it will burn
  alternatives:
  - and she/it burned
  - and it will blaze
  lexicon: HALOT
  rationale: Though formally a qatal form, in this prophetic sequence it functions
    futuristically. Singular feminine agrees with the fire/flame imagery; English
    uses impersonal 'it.' 'Burn' fits the parallel with the next verb.
- source_word: וְאָכְלָה
  chosen: and consume
  alternatives:
  - and devour
  - and eat up
  lexicon: HALOT
  rationale: The verb אכל is commonly used metaphorically of fire consuming. 'Consume'
    is idiomatic and preserves the destructive force without sounding overly wooden.
- source_word: שִׁיתוֹ
  chosen: his thorns
  alternatives:
  - his undergrowth
  - his thornbushes
  lexicon: HALOT
  rationale: The noun is difficult and somewhat rare in this sense; in context with
    the following term and the fire imagery, it refers to thorny growth. 'Thorns'
    gives a clear and traditional sense while preserving the metaphor.
- source_word: וּשְׁמִירוֹ
  chosen: his briers
  alternatives:
  - his briars
  - his thornbushes
  lexicon: HALOT
  rationale: A common pairing with thorn imagery in judgment texts. 'Briers' preserves
    the distinct parallel term rather than collapsing both nouns into one gloss.
- source_word: בְּיוֹם אֶחָד
  chosen: in a single day
  alternatives:
  - in one day
  lexicon: HALOT
  rationale: This is a natural English rendering that preserves the emphasis on suddenness
    and completeness.
