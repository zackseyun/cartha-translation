theological_decisions:
- issue: Referent of 'the light of Israel' and 'his Holy One'
  chosen_reading: Retain the metaphorical/titular language without explicitly identifying
    the referent in the main text.
  alternative_readings:
  - A direct reference to the LORD as Israel's light and Holy One
  - A more general personification of Israel's divine protection
  rationale: In Isaiah, 'the Holy One' strongly evokes God, and likely 'the light
    of Israel' does as well. However, the verse itself presents these as poetic titles/metaphors.
    The translation preserves the theological force without importing an interpretive
    gloss into the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
