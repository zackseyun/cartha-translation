id: ISA.10.9
reference: Isaiah 10:9
source:
  edition: WLC
  text: הֲ/לֹ֥א כְּ/כַרְכְּמִ֖ישׁ כַּלְנ֑וֹ אִם לֹ֤א כְ/אַרְפַּד֙ חֲמָ֔ת אִם לֹ֥א
    כְ/דַמֶּ֖שֶׂק שֹׁמְרֽוֹן־־׃
translation:
  text: Is not Calno like Carchemish? Is not Hamath like Arpad? Is not Samaria like
    Damascus?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Calno is also rendered 'Calneh' in some English translations, reflecting
      a traditional variant form of the place name.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Is not
  alternatives:
  - Is it not
  - Surely
  lexicon: HALOT
  rationale: The interrogative particle with negation introduces a rhetorical question
    expecting agreement. 'Is not' preserves the concise rhetorical force better than
    the more interpretive 'Surely.'
- source_word: כְּ/כַרְכְּמִישׁ ... כַּלְנוֹ
  chosen: Calno like Carchemish
  alternatives:
  - Calno as Carchemish
  - Calno no different from Carchemish
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. In English, the natural order is to
    state the subject first ('Calno') and the comparator second ('like Carchemish').
    This preserves the Assyrian king's boast that one conquered city is equivalent
    to another.
- source_word: כַּלְנוֹ
  chosen: Calno
  alternatives:
  - Calneh
  lexicon: HALOT
  rationale: The Hebrew proper name is best transliterated 'Calno,' matching the consonantal
    form here. 'Calneh' reflects a variant/traditional form but is less directly tied
    to this spelling.
- source_word: כַּרְכְּמִישׁ
  chosen: Carchemish
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: אִם לֹא
  chosen: Is not
  alternatives:
  - If not
  - Surely
  lexicon: HALOT
  rationale: In this poetic taunt, אִם לֹא functions idiomatically like a rhetorical
    'is not?' rather than a conditional 'if not.' Rendering it consistently as 'Is
    not' communicates the parallel structure and sense.
- source_word: כְ/אַרְפַּד חֲמָת
  chosen: Hamath like Arpad
  alternatives:
  - Hamath as Arpad
  lexicon: HALOT
  rationale: 'Again the comparative כ is rendered with ''like.'' English idiom places
    the unmarked city first: ''Hamath like Arpad.'''
- source_word: חֲמָת
  chosen: Hamath
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: אַרְפַּד
  chosen: Arpad
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: כְ/דַמֶּשֶׂק שֹׁמְרוֹן
  chosen: Samaria like Damascus
  alternatives:
  - Samaria as Damascus
  lexicon: HALOT
  rationale: The Hebrew presents a final comparison between Samaria and Damascus.
    English idiom again reverses the comparator phrase into 'Samaria like Damascus'
    to make the rhetorical question clear and natural.
- source_word: דַּמֶּשֶׂק
  chosen: Damascus
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  lexicon: HALOT
  rationale: Standard English transliteration of the place name; refers to the capital
    city and by extension the northern kingdom.
