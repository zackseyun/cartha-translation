theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD of hosts
  alternative_readings:
  - the Lord Yahweh of hosts
  - Lord GOD of Armies
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Historical allusion in בְּדֶרֶךְ מִצְרָיִם
  chosen_reading: in the manner of Egypt
  alternative_readings:
  - as on the road to Egypt
  rationale: The phrase most plausibly evokes Assyria's oppression as analogous to Egypt's earlier oppression of Israel. Rendering it as 'in the manner of Egypt' preserves the historical-theological echo without overexplaining it in the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological tension rather than resolve it'
