id: ISA.10.24
reference: Isaiah 10:24
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּֽה אָמַ֞ר אֲדֹנָ֤/י יְהוִה֙ צְבָא֔וֹת אַל תִּירָ֥א עַמִּ֛/י יֹשֵׁ֥ב צִיּ֖וֹן מֵֽ/אַשּׁ֑וּר בַּ/שֵּׁ֣בֶט יַכֶּ֔/כָּה וּ/מַטֵּ֥/הוּ יִשָּֽׂא עָלֶ֖י/ךָ בְּ/דֶ֥רֶךְ מִצְרָֽיִם־־־׃
translation:
  text: 'Therefore thus says the Lord GOD of hosts: Do not fear, my people who dwell in Zion, because of Assyria. He will strike you with the rod, and he will lift up his staff against you in the manner of Egypt.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the way of Egypt'—likely an allusion to Egypt's former oppression of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore
  lexicon: HALOT
  rationale: Discourse marker introducing an inference from the preceding context; 'Therefore' is natural and preserves the logical connection.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - thus said
  - this is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; present-tense English idiom best reflects the formulaic force in context.
- source_word: אֲדֹנָי יְהוִה צְבָאוֹת
  chosen: the Lord GOD of hosts
  alternatives:
  - the Lord Yahweh of hosts
  - the Lord GOD Almighty
  lexicon: HALOT
  rationale: Renders אֲדֹנָי as 'Lord,' preserves the contested divine name יְהוָה as 'GOD' in small-caps style within the compound title, and translates צְבָאוֹת as 'of hosts.' This follows the doctrine default for YHWH as 'the LORD' while distinguishing the Adonai + YHWH combination in readable English.
- source_word: אַל תִּירָא
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: Direct prohibition with common pastoral force; 'Do not fear' is concise and close to the Hebrew.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward covenantal address; preserves possessive relationship.
- source_word: יֹשֵׁב צִיּוֹן
  chosen: who dwell in Zion
  alternatives:
  - inhabitant of Zion
  - who sits in Zion
  lexicon: HALOT
  rationale: Although the participle is singular in form, it functions collectively with 'my people.' Plural English yields natural sense without losing the collective address.
- source_word: מֵאַשּׁוּר
  chosen: because of Assyria
  alternatives:
  - from Assyria
  - at Assyria
  lexicon: HALOT
  rationale: With the fear verb, the preposition marks the object/source of fear. 'Because of Assyria' communicates the idiomatic sense better than a wooden 'from Assyria.'
- source_word: בַּשֵּׁבֶט
  chosen: with the rod
  alternatives:
  - with a rod
  - by the rod
  lexicon: HALOT
  rationale: Instrumental beth; 'rod' here is a striking implement and symbol of oppression. The article is retained.
- source_word: יַכֶּכָּה
  chosen: He will strike you
  alternatives:
  - he strikes you
  - he will beat you
  lexicon: HALOT
  rationale: Imperfect in prophetic discourse naturally renders as future. 'Strike' is broad enough to preserve both literal and figurative force.
- source_word: וּמַטֵּהוּ יִשָּׂא עָלֶיךָ
  chosen: and he will lift up his staff against you
  alternatives:
  - and his staff he will raise against you
  - and he will carry his staff over you
  lexicon: HALOT
  rationale: מַטֶּה is 'staff/rod'; נָשָׂא with עַל in this context conveys raising or brandishing against someone. 'Lift up his staff against you' is idiomatic and vivid.
- source_word: בְּדֶרֶךְ מִצְרָיִם
  chosen: in the manner of Egypt
  alternatives:
  - as on the way to Egypt
  - in the way of Egypt
  - after the manner of Egypt
  lexicon: HALOT
  rationale: דֶּרֶךְ here is best taken idiomatically as 'manner/way,' alluding to Egypt's former oppression of Israel rather than geographic travel.
