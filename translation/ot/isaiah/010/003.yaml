theological_decisions:
- issue: Concrete vs. abstract sense of כְּבוֹדְכֶם in a judgment oracle
  chosen_reading: your wealth
  alternative_readings:
  - your glory
  - your honor
  rationale: The verse addresses leaders facing invading judgment and asks where they
    will flee and what they will do with what they value. Rendering כבוד concretely
    as 'wealth' best captures the likely referent in context without importing extra
    theology. The more literal rendering is preserved in a footnote because it remains
    lexically possible and rhetorically meaningful.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
