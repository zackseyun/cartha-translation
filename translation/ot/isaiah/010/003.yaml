id: ISA.10.3
reference: Isaiah 10:3
source:
  edition: WLC
  text: וּ/מַֽה תַּעֲשׂוּ֙ לְ/י֣וֹם פְּקֻדָּ֔ה וּ/לְ/שׁוֹאָ֖ה מִ/מֶּרְחָ֣ק תָּב֑וֹא
    עַל מִי֙ תָּנ֣וּסוּ לְ/עֶזְרָ֔ה וְ/אָ֥נָה תַעַזְב֖וּ כְּבוֹדְ/כֶֽם־־׃
translation:
  text: What will you do on the day of punishment, and in the devastation that comes
    from far away? To whom will you flee for help, and where will you leave your wealth?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your glory' or 'your honor.' The Hebrew can refer either to honor/glory
      or, in context, to valued possessions or wealth.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקֻדָּה
  chosen: punishment
  alternatives:
  - visitation
  - reckoning
  lexicon: HALOT
  rationale: In prophetic judgment context, פקדה refers to a punitive visitation or
    reckoning. 'Punishment' communicates the sense clearly in modern English, while
    'visitation' is more traditional but less transparent.
- source_word: שׁוֹאָה
  chosen: devastation
  alternatives:
  - destruction
  - ruin
  lexicon: HALOT
  rationale: The noun denotes destructive ruin or catastrophe. 'Devastation' preserves
    the force without sounding overly abstract.
- source_word: מִמֶּרְחָק
  chosen: from far away
  alternatives:
  - from afar
  - from a distant place
  lexicon: HALOT
  rationale: The phrase indicates origin at a distance, likely an invading judgment.
    'From far away' is idiomatic modern English and preserves the spatial sense.
- source_word: תָּבֹוא
  chosen: comes
  alternatives:
  - will come
  lexicon: HALOT
  rationale: Although formally imperfect, in English the relative clause after 'the
    devastation' reads naturally as 'that comes from far away.' The future sense remains
    in context through the verse's rhetorical questions.
- source_word: תָּנוּסוּ
  chosen: will you flee
  alternatives:
  - will you run
  lexicon: HALOT
  rationale: The verb means to flee or seek escape. 'Flee' fits the judgment setting
    and pairs naturally with 'for help.'
- source_word: לְעֶזְרָה
  chosen: for help
  alternatives:
  - for assistance
  lexicon: HALOT
  rationale: The noun means help or aid. 'For help' is the most natural English collocation
    after 'flee to whom.'
- source_word: אָנָה
  chosen: where
  alternatives:
  - to where
  - whither
  lexicon: HALOT
  rationale: An interrogative of place. 'Where' is clear modern English; 'whither'
    is archaic.
- source_word: תַעַזְבוּ
  chosen: will you leave
  alternatives:
  - will you abandon
  - will you deposit
  lexicon: HALOT
  rationale: The basic sense is leave/abandon. In context the question concerns what
    they will do with what they value when judgment comes. 'Leave' is broad enough
    to preserve the ambiguity.
- source_word: כְּבוֹדְכֶם
  chosen: your wealth
  alternatives:
  - your glory
  - your honor
  lexicon: HALOT
  rationale: Although כבוד often means 'glory' or 'honor,' in this context many understand
    it concretely as possessions or wealth—what the powerful prize and would try to
    preserve in disaster. 'Your wealth' best fits the rhetorical question in context,
    while the more literal 'your glory' is preserved in a footnote.
