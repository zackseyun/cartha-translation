theological_decisions:
- issue: Whether to make God's action against Zion/Jerusalem explicit in the main
    clause
  chosen_reading: Rendered locatively as 'on Mount Zion and in Jerusalem' without
    specifying 'against'
  alternative_readings:
  - against Mount Zion and Jerusalem
  rationale: 'The Hebrew preposition is locative, and the verse states that the Lord
    finishes his work in that sphere before turning to punish Assyria. This preserves
    the text''s tension: God is at work in Zion/Jerusalem in judgment and restoration,
    but the preposition itself should not be overread as adversative.'
  doctrine_reference: Preserve theological tension rather than resolve it.
