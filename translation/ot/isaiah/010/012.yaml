id: ISA.10.12
reference: Isaiah 10:12
source:
  edition: WLC
  text: וְ/הָיָ֗ה כִּֽי יְבַצַּ֤ע אֲדֹנָ/י֙ אֶת כָּל מַֽעֲשֵׂ֔/הוּ בְּ/הַ֥ר צִיּ֖וֹן
    וּ/בִ/ירוּשָׁלִָ֑ם אֶפְקֹ֗ד עַל פְּרִי גֹ֨דֶל֙ לְבַ֣ב מֶֽלֶךְ אַשּׁ֔וּר וְ/עַל
    תִּפְאֶ֖רֶת ר֥וּם עֵינָֽי/ו־־־־־־־׃
translation:
  text: And it will happen that when the Lord has finished all his work on Mount Zion
    and in Jerusalem, I will punish the fruit of the greatness of the heart of the
    king of Assyria, and the splendor of his haughty eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will call to account' for 'I will punish.' The Hebrew verb can denote
      divine visitation for judgment.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the fruit of the greatness of the heart of the king of Assyria.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'the splendor of the height of his eyes,' that is, the proud look
      in his eyes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will happen
  alternatives:
  - And it shall come to pass
  - And it will be
  lexicon: HALOT
  rationale: Introduces a future circumstance with narrative transition. 'And it will
    happen' preserves the Hebrew discourse marker while using readable modern English.
- source_word: כִּי
  chosen: when
  alternatives:
  - that
  - for
  lexicon: HALOT
  rationale: In this construction with וְהָיָה, כִּי introduces the time clause; 'when'
    best fits the syntax and sense.
- source_word: יְבַצַּע
  chosen: has finished
  alternatives:
  - completes
  - cuts off
  - executes fully
  lexicon: HALOT
  rationale: The piel of בצע here conveys bringing an action to completion. 'Has finished'
    gives the temporal sense naturally in English within the 'when' clause.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  - the Master
  lexicon: HALOT
  rationale: This is the divine title אֲדֹנָי, not the Tetragrammaton. Per doctrine,
    titles are translated; 'the Lord' is the natural English rendering here.
- source_word: כָּל מַעֲשֵׂהוּ
  chosen: all his work
  alternatives:
  - all his deed
  - all his action
  - all that he is doing
  lexicon: HALOT
  rationale: מַעֲשֶׂה is a broad term for deed/work. Singular collective with כָּל
    is well represented by 'all his work,' referring to the totality of God's action
    in judgment.
- source_word: בְּהַר צִיּוֹן וּבִירוּשָׁלָם
  chosen: on Mount Zion and in Jerusalem
  alternatives:
  - against Mount Zion and Jerusalem
  - at Mount Zion and in Jerusalem
  lexicon: HALOT
  rationale: The preposition בְּ is locative here. 'On Mount Zion and in Jerusalem'
    preserves the geographic distinction and avoids importing an adversative sense.
- source_word: אֶפְקֹד עַל
  chosen: I will punish
  alternatives:
  - I will attend to
  - I will call to account
  - I will visit upon
  lexicon: HALOT
  rationale: In judgment contexts פקד על commonly means to punish or call to account.
    'I will punish' makes the judicial sense explicit in clear English.
- source_word: פְּרִי
  chosen: the fruit
  alternatives:
  - the result
  - the outcome
  lexicon: HALOT
  rationale: The metaphor 'fruit' is common and transparent in English, preserving
    the Hebrew image of what the king's inner pride has produced.
- source_word: גֹדֶל לְבַב
  chosen: the greatness of the heart
  alternatives:
  - the proud greatness of the heart
  - the arrogance of the heart
  lexicon: HALOT
  rationale: Literally 'greatness of heart.' Retaining 'greatness' preserves the Hebrew
    expression, while the context of judgment makes its negative sense clear. A more
    interpretive 'arrogance' is possible but less formally transparent.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - Assyria's king
  lexicon: HALOT
  rationale: Standard English rendering of the construct chain with the proper name
    transliterated.
- source_word: תִּפְאֶרֶת
  chosen: the splendor
  alternatives:
  - the glory
  - the boasting
  lexicon: HALOT
  rationale: The noun denotes beauty, glory, or splendor. Here it refers ironically
    to what the king glories in; 'splendor' preserves the lexical sense without overinterpreting.
- source_word: רוּם עֵינָיו
  chosen: his haughty eyes
  alternatives:
  - his lofty eyes
  - the height of his eyes
  lexicon: HALOT
  rationale: Literally 'the height of his eyes,' an idiom for arrogance. 'His haughty
    eyes' communicates the idiomatic sense in natural English while preserving the
    eye imagery.
