id: ISA.10.8
reference: Isaiah 10:8
source:
  edition: WLC
  text: כִּ֖י יֹאמַ֑ר הֲ/לֹ֥א שָׂרַ֛/י יַחְדָּ֖ו מְלָכִֽים׃
translation:
  text: For he says, “Are not my commanders all kings?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “my princes”; the Hebrew שָׂרַי can denote princes, rulers, officials,
      or commanders.
    reason: lexical_alternative
  - marker: b
    text: Literally “together”; here it carries the sense that they are all alike
      kings.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding statement. 'For'
    fits the discourse flow in English and preserves the explanatory force without
    over-specifying causation.
- source_word: יֹאמַר
  chosen: he says
  alternatives:
  - he will say
  - he has said
  lexicon: HALOT
  rationale: The imperfect here functions naturally as a present/future in prophetic
    discourse. English present 'he says' is idiomatic in context, introducing the
    Assyrian king's boast. 'Will say' is possible, but the present better matches
    common English rendering of quoted speech in prophetic taunt/oracle contexts.
- source_word: הֲלֹא
  chosen: Are not
  alternatives:
  - Is it not true that
  - Surely
  lexicon: HALOT
  rationale: This interrogative particle with negation introduces a rhetorical question
    expecting a positive answer. 'Are not' preserves the rhetorical form directly
    and naturally before the plural predicate.
- source_word: שָׂרַי
  chosen: my commanders
  alternatives:
  - my princes
  - my officials
  - my rulers
  lexicon: HALOT
  rationale: שַׂר can mean prince, ruler, official, or commander. In the Assyrian
    imperial context, the speaker is boasting that his subordinate leaders are as
    powerful as kings. 'Commanders' best conveys high-ranking military-political officers
    in context, whereas 'princes' could misleadingly suggest royal sons or hereditary
    nobility.
- source_word: יַחְדָּו
  chosen: all
  alternatives:
  - together
  - altogether
  lexicon: HALOT
  rationale: 'Literally ''together,'' but in this construction it idiomatically emphasizes
    the collective scope of the claim: all of them alike are kings. Rendering it as
    ''all'' communicates the sense in natural English without wooden awkwardness.'
- source_word: מְלָכִים
  chosen: kings
  alternatives:
  - royal rulers
  lexicon: HALOT
  rationale: The noun straightforwardly means 'kings.' The boast is that the Assyrian
    king's subordinate commanders have status equivalent to kings.
