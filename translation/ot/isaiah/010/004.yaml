theological_decisions:
- issue: Anthropomorphic language for divine judgment
  chosen_reading: Retain the anthropomorphic expressions 'his anger' and 'his hand
    is still stretched out' without softening them.
  alternative_readings:
  - Paraphrase as 'his judgment continues'
  rationale: The Hebrew uses embodied imagery to communicate the persistence of divine
    judgment. Per translation philosophy, the tension and imagery should be preserved
    rather than resolved into abstraction.
  doctrine_reference: Translation philosophy §3, §6
