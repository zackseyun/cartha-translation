id: ISA.10.4
reference: Isaiah 10:4
source:
  edition: WLC
  text: בִּלְתִּ֤י כָרַע֙ תַּ֣חַת אַסִּ֔יר וְ/תַ֥חַת הֲרוּגִ֖ים יִפֹּ֑לוּ בְּ/כָל
    זֹאת֙ לֹא שָׁ֣ב אַפּ֔/וֹ וְ/ע֖וֹד יָד֥/וֹ נְטוּיָֽה־־׃ס
translation:
  text: Nothing remains but to crouch among the prisoners or to fall among the slain.
    For all this his anger has not turned away, and his hand is still stretched out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'except to bow down under the prisoners, and they will fall under the
      slain.' The Hebrew is highly compressed, and the exact relation of the verbs
      and prepositions is debated.
    reason: alternative_reading
lexical_decisions:
- source_word: בִּלְתִּי
  chosen: Nothing remains but
  alternatives:
  - except
  - without
  - there is nothing but
  lexicon: HALOT
  rationale: 'In this compressed clause, בִּלְתִּי introduces what is left as the
    only outcome. A wooden ''except'' is possible, but idiomatic English requires
    an existential sense carried over from context: ''Nothing remains but...'' This
    preserves the force of unavoidable judgment without adding content beyond the
    Hebrew ellipsis.'
- source_word: כָרַע
  chosen: to crouch
  alternatives:
  - to bow down
  - to kneel
  - to collapse
  lexicon: HALOT
  rationale: The verb commonly means to bend low, kneel, or crouch. Here, with תַּחַת
    אַסִּיר, 'crouch' best conveys forced abasement under captivity rather than voluntary
    worship. 'Bow down' could sound cultic; 'kneel' is narrower.
- source_word: תַּחַת
  chosen: among
  alternatives:
  - under
  - beneath
  - in place of
  lexicon: HALOT
  rationale: Though literally 'under/beneath,' in this judgment context the preposition
    idiomatically means being counted with or placed among a class ('among the prisoners
    ... among the slain'). Rendering it literally as 'under' is obscure in English.
    The same contextual sense is carried in both occurrences.
- source_word: אַסִּיר
  chosen: the prisoners
  alternatives:
  - the captive
  - the bound ones
  - the exiles
  lexicon: HALOT
  rationale: The noun denotes a prisoner/captive, one bound. The plural sense in English
    fits the collective force after תַּחַת. 'Prisoners' is natural and clear; 'captive'
    singular would sound awkward in English.
- source_word: הֲרוּגִים
  chosen: the slain
  alternatives:
  - those killed
  - the dead
  lexicon: HALOT
  rationale: Passive participle from הרג, referring specifically to those killed violently.
    'The slain' preserves the judicial-war context better than the broader 'dead.'
- source_word: יִפֹּלוּ
  chosen: to fall
  alternatives:
  - they will fall
  lexicon: HALOT
  rationale: 'Although morphologically finite (''they will fall''), English smoothness
    after the elliptical opening is better served by an infinitival parallel: ''to
    crouch ... or to fall.'' This reflects the sense of the Hebrew sequence without
    forcing a jarring subject shift.'
- source_word: בְּכָל זֹאת
  chosen: For all this
  alternatives:
  - In all this
  - Despite all this
  - With all this
  lexicon: HALOT
  rationale: This recurring refrain in Isaiah introduces the conclusion that judgment
    is not exhausted. 'For all this' is a well-established and accurate rendering
    that preserves the rhetorical cadence.
- source_word: לֹא שָׁב אַפּוֹ
  chosen: his anger has not turned away
  alternatives:
  - his anger has not returned
  - his nose/wrath has not turned back
  lexicon: HALOT
  rationale: אַף literally means 'nose' but idiomatically 'anger/wrath.' 'Anger' is
    the natural English equivalent. שׁוּב with anger means to turn back/away, i.e.,
    to subside. 'Has not turned away' preserves the idiom and matches the refrain's
    sense.
- source_word: יָדוֹ נְטוּיָה
  chosen: his hand is still stretched out
  alternatives:
  - his hand is still extended
  - his hand remains outstretched
  lexicon: HALOT
  rationale: The phrase is a repeated Isaianic image of ongoing active judgment. 'Stretched
    out' is the most idiomatic and preserves the metaphor clearly.
