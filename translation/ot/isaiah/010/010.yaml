theological_decisions:
- issue: Whether to make explicit the implied comparison in the final phrase
  chosen_reading: Render the comparative sense as 'whose carved images were greater
    than those of Jerusalem and Samaria'
  alternative_readings:
  - Render more literally as 'and their carved images from Jerusalem and from Samaria'
  rationale: 'The Hebrew is elliptical, but the sense in context is comparative: the
    Assyrian king boasts that the idol-kingdoms he conquered had more impressive images
    than Jerusalem and Samaria. Making the comparison explicit best reflects the plain
    sense while remaining faithful to the syntax and the argument continued in the
    next verse.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; optimal equivalence; preserve the source text''s plain sense'
