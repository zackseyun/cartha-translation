id: ISA.10.10
reference: Isaiah 10:10
source:
  edition: WLC
  text: כַּ/אֲשֶׁר֙ מָצְאָ֣ה יָדִ֔/י לְ/מַמְלְכֹ֖ת הָ/אֱלִ֑יל וּ/פְסִ֣ילֵי/הֶ֔ם מִ/ירֽוּשָׁלִַ֖ם
    וּ/מִ/שֹּׁמְרֽוֹן׃
translation:
  text: As my hand has reached the kingdoms of the idols, whose carved images were
    greater than those of Jerusalem and Samaria,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'As my hand found the kingdoms of the idols, and their
      carved images from Jerusalem and from Samaria.' The Hebrew is elliptical; the
      sense is comparative.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: As
  alternatives:
  - Just as
  - Inasmuch as
  lexicon: HALOT
  rationale: Introduces a comparison or basis for the boast in context. 'As' is concise
    and natural in English, while preserving the comparative force that continues
    into the next verse.
- source_word: מָצְאָה יָדִי
  chosen: my hand has reached
  alternatives:
  - my hand found
  - my hand attained
  - my hand seized
  lexicon: HALOT
  rationale: The idiom literally says 'my hand found,' but in context of imperial
    conquest it means coming upon and gaining power over. 'Has reached' preserves
    the metaphor of the hand while communicating successful advance without over-specifying
    seizure in this verse alone.
- source_word: לְמַמְלְכוֹת
  chosen: the kingdoms of
  alternatives:
  - to the kingdoms of
  - against the kingdoms of
  lexicon: HALOT
  rationale: 'The preposition with ''kingdoms'' is governed idiomatically by the preceding
    verb. English expresses the sense more naturally as the object reached: ''the
    kingdoms of.'''
- source_word: הָאֱלִיל
  chosen: the idols
  alternatives:
  - the worthless idols
  - the false gods
  lexicon: HALOT
  rationale: אֱלִיל often carries the nuance of worthlessness or nonentity, but 'idols'
    is the clearest direct rendering here. The pejorative force is inherent in the
    Hebrew term and context.
- source_word: וּפְסִילֵיהֶם
  chosen: whose carved images
  alternatives:
  - and their carved images
  - and their idols
  - and their graven images
  lexicon: HALOT
  rationale: The following comparison with Jerusalem and Samaria implies the images
    belonging to those kingdoms. Rendering with 'whose' makes the English syntax clear
    while preserving the possessive relationship. 'Carved images' is a transparent
    modern equivalent of פְסִילִים.
- source_word: מִירוּשָׁלַם וּמִשֹּׁמְרוֹן
  chosen: than those of Jerusalem and Samaria
  alternatives:
  - from Jerusalem and from Samaria
  - than Jerusalem and Samaria
  lexicon: HALOT
  rationale: 'The prefixed מִן after a comparative sense is best rendered ''than.''
    The comparison is elliptical: the carved images of those kingdoms were greater
    than the images associated with Jerusalem and Samaria. Supplying ''those of''
    makes the comparison intelligible in English without adding new content.'
