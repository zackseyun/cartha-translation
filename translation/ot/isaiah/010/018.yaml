id: ISA.10.18
reference: Isaiah 10:18
source:
  edition: WLC
  text: וּ/כְב֤וֹד יַעְר/וֹ֙ וְ/כַרְמִלּ֔/וֹ מִ/נֶּ֥פֶשׁ וְ/עַד בָּשָׂ֖ר יְכַלֶּ֑ה
    וְ/הָיָ֖ה כִּ/מְסֹ֥ס נֹסֵֽס־׃
translation:
  text: And the glory of his forest and of his fruitful land he will consume, from
    soul to flesh, and it will be like the wasting away of a sick man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and it will be like one wasting away'; the final Hebrew phrase is difficult,
      and some take the last word differently.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְבוֹד
  chosen: the glory
  alternatives:
  - the splendor
  - the wealth
  lexicon: HALOT
  rationale: כָּבוֹד commonly denotes glory, honor, or splendor. Here it refers to
    the impressive abundance/majesty of Assyria's resources, so 'glory' preserves
    the metaphorical weight while remaining natural in English.
- source_word: יַעְרוֹ
  chosen: his forest
  lexicon: HALOT
  rationale: יַעַר means 'forest' or 'woodland.' In context it is part of the imagery
    for Assyria's might and multitude; 'forest' is the straightforward rendering.
- source_word: וְכַרְמִלּוֹ
  chosen: and of his fruitful land
  alternatives:
  - and of his orchard
  - and of his garden land
  - and of his Carmel
  lexicon: HALOT
  rationale: כַּרְמֶל can denote fertile land, orchard-land, or garden-like productive
    terrain, not necessarily the proper name Carmel here. 'Fruitful land' best captures
    the common noun sense in parallel with 'forest,' expressing the full range of
    Assyria's cultivated abundance.
- source_word: מִנֶּפֶשׁ וְעַד בָּשָׂר
  chosen: from soul to flesh
  alternatives:
  - from life to body
  - from soul to body
  - utterly
  lexicon: HALOT
  rationale: The idiom literally spans 'from soul to flesh,' expressing totality.
    Retaining the concrete terms preserves the Hebrew vividness and the anthropological
    tension, while the sense of comprehensive destruction is left for readers to infer.
- source_word: יְכַלֶּה
  chosen: he will consume
  alternatives:
  - he will destroy
  - he will bring to an end
  lexicon: HALOT
  rationale: כלה in the Piel commonly means to finish, consume, or destroy. 'Consume'
    fits the fire/judgment imagery in the surrounding context and works well with
    the objects named.
- source_word: וְהָיָה
  chosen: and it will be
  alternatives:
  - and he will become
  lexicon: HALOT
  rationale: The verb introduces the resulting state after the destruction. The impersonal
    'it' refers to the devastated glory/forest-land complex as a whole.
- source_word: כִּמְסֹס
  chosen: like the wasting away
  alternatives:
  - like the melting
  - like the dissolution
  lexicon: HALOT
  rationale: The rare form is commonly understood from a root meaning to melt away,
    waste away, or dissolve. 'Wasting away' communicates progressive collapse in idiomatic
    English.
- source_word: נֹסֵס
  chosen: of a sick man
  alternatives:
  - of one wasting away
  - of a standard-bearer
  lexicon: HALOT
  rationale: This difficult word is traditionally taken here in connection with sickness/fading,
    yielding the sense of a person wasting away. Because the phrase is obscure, the
    translation adopts the widely accepted contextual sense while preserving a lexical
    alternative in a footnote.
