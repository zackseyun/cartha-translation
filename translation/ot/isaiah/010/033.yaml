theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Metaphorical versus explicit moral interpretation of arboreal imagery
  chosen_reading: Retain tree-cutting imagery while allowing implied judgment on the proud
  alternative_readings:
  - Explicitly interpret as judgment on the proud/arrogant in the main text
  rationale: The Hebrew uses arboreal imagery for divine judgment. The second colon suggests the lofty/proud are in view, but the translation preserves the metaphor rather than resolving it into a paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
