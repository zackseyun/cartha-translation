id: ISA.10.33
reference: Isaiah 10:33
source:
  edition: WLC
  text: הִנֵּ֤ה הָ/אָדוֹן֙ יְהוָ֣ה צְבָא֔וֹת מְסָעֵ֥ף פֻּארָ֖ה בְּ/מַעֲרָצָ֑ה וְ/רָמֵ֤י הַ/קּוֹמָה֙ גְּדוּעִ֔ים וְ/הַ/גְּבֹהִ֖ים יִשְׁפָּֽלוּ׃
translation:
  text: Behold, the Lord, Yahweh of Armies, is lopping off the boughs with terrifying power; the tall in stature are cut down, and the lofty are brought low.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a crash,' 'with violence,' or 'in terror'; the Hebrew term conveys fearsome, violent force.
    reason: lexical_alternative
  - marker: b
    text: The imagery is of cutting down branches and tall trees, symbolizing the downfall of the exalted.
    reason: cultural_note
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Deictic particle marking vivid attention. 'Behold' preserves the prophetic, elevated force better than the more colloquial 'look' or 'see'.
- source_word: הָאָדוֹן יְהוָה צְבָאוֹת
  chosen: the Lord, the LORD of Armies
  alternatives:
  - the Lord GOD of hosts
  - the Lord Yahweh of Armies
  lexicon: HALOT
  rationale: אָדוֹן with article functions as title, rendered 'the Lord.' יְהוָה follows the project default 'the LORD.' צְבָאוֹת is translated, not transliterated, as 'of Armies' for clarity and source transparency; 'hosts' is traditional but less transparent in modern English.
- source_word: מְסָעֵף
  chosen: is lopping off
  alternatives:
  - is cutting off
  - is pruning
  lexicon: HALOT
  rationale: Participial form gives vivid ongoing/imminent action. The verb evokes cutting branches; 'lopping off' captures the arboreal imagery more concretely than the generic 'cutting off.'
- source_word: פֻּארָה
  chosen: the boughs
  alternatives:
  - the branches
  - the thicket
  lexicon: HALOT
  rationale: The noun refers to luxuriant branch-growth/foliage in a tree metaphor. 'Boughs' fits the elevated style and pairs naturally with 'lopping off.'
- source_word: בְמַעֲרָצָה
  chosen: with terrifying power
  alternatives:
  - with a crash
  - with violence
  - in terror
  lexicon: HALOT
  rationale: The noun conveys violent, fearsome force or crashing terror. 'With terrifying power' communicates both the manner and the dreadfulness of the action in idiomatic English.
- source_word: רָמֵי הַקּוֹמָה
  chosen: the tall in stature
  alternatives:
  - the high of stature
  - the lofty in height
  lexicon: HALOT
  rationale: Literally 'the high ones of stature/height.' The phrase is likely metaphorical for the exalted/proud, but retains height imagery. 'The tall in stature' preserves the metaphor without over-interpreting.
- source_word: גְּדוּעִים
  chosen: are cut down
  alternatives:
  - are hewn down
  - are chopped off
  lexicon: HALOT
  rationale: Passive/resultative sense from a verb meaning to cut off or hew down. 'Are cut down' is natural English and keeps the tree-felling imagery.
- source_word: הַגְּבֹהִים
  chosen: the lofty
  alternatives:
  - the high ones
  - the exalted
  lexicon: HALOT
  rationale: Adjective can denote literal height or figurative loftiness. 'The lofty' preserves the ambiguity and the likely metaphor of pride/exaltation.
- source_word: יִשְׁפָּלוּ
  chosen: are brought low
  alternatives:
  - will be humbled
  - will be made low
  lexicon: HALOT
  rationale: The verb means to be/become low or be abased. 'Are brought low' preserves both the passive sense and the figurative humbling without making the interpretation overly explicit.
