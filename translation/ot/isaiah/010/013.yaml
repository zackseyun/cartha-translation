id: ISA.10.13
reference: Isaiah 10:13
source:
  edition: WLC
  text: כִּ֣י אָמַ֗ר בְּ/כֹ֤חַ יָדִ/י֙ עָשִׂ֔יתִי וּ/בְ/חָכְמָתִ֖/י כִּ֣י נְבֻנ֑וֹתִי
    וְ/אָסִ֣יר גְּבוּלֹ֣ת עַמִּ֗ים ו/עתידתי/הם שׁוֹשֵׂ֔תִי וְ/אוֹרִ֥יד כַּ/אבִּ֖יר
    יוֹשְׁבִֽים׀׃
translation:
  text: For he says, “By the strength of my hand I have done it, and by my wisdom,
    for I have understanding. I remove the boundaries of peoples, and I plunder their
    treasures; like a mighty man I bring down those who sit enthroned.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “their stores,” “their possessions,” or “their wealth laid up.” The Hebrew
      term is rare and likely refers to accumulated riches.
    reason: lexical_alternative
  - marker: b
    text: Or “the inhabitants.” The Hebrew participle can mean those who dwell, but
      in context it may refer more specifically to those seated in power.
    reason: lexical_alternative
  - marker: c
    text: Or “like a mighty one.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding divine assessment of Assyria's
    arrogance; 'For' fits the discourse connection naturally in English.
- source_word: אָמַר
  chosen: he says
  alternatives:
  - he said
  lexicon: HALOT
  rationale: Although morphologically perfect, Hebrew narrative and quoted speech
    often use the perfect with present force in reporting characteristic speech. 'He
    says' presents the boast as representative and vivid.
- source_word: בְּכֹחַ יָדִי
  chosen: By the strength of my hand
  alternatives:
  - By the power of my hand
  lexicon: HALOT
  rationale: כֹּחַ denotes strength/power; 'strength' pairs well with the idiom 'my
    hand' and preserves the concrete self-attribution of military capability.
- source_word: עָשִׂיתִי
  chosen: I have done it
  alternatives:
  - I did
  - I accomplished it
  lexicon: HALOT
  rationale: The verb is broad ('do, make'). 'I have done it' is idiomatic and keeps
    the boast concise; 'it' is supplied in English for completeness from context.
- source_word: וּבְחָכְמָתִי
  chosen: and by my wisdom
  alternatives:
  - and by my skill
  lexicon: HALOT
  rationale: חָכְמָה commonly means wisdom, including strategic wisdom. 'Wisdom' preserves
    the self-congratulatory tone without narrowing it merely to technical skill.
- source_word: כִּי נְבֻנוֹתִי
  chosen: for I have understanding
  alternatives:
  - for I am discerning
  - because I am intelligent
  lexicon: HALOT
  rationale: From בין/נבון, expressing discernment or understanding. 'I have understanding'
    mirrors the Hebrew predicate naturally and avoids sounding overly modern.
- source_word: וַאֲסִיר גְּבוּלוֹת עַמִּים
  chosen: I remove the boundaries of peoples
  alternatives:
  - I moved the borders of peoples
  - I take away the borders of nations
  lexicon: HALOT
  rationale: אָסִיר from סור in Hiphil means remove/turn aside. גְּבוּלוֹת are boundaries/borders.
    'Peoples' reflects עַמִּים and avoids over-specifying modern nation-states.
- source_word: וַעֲתִידֹתֵיהֶם
  chosen: their treasures
  alternatives:
  - their stores
  - their possessions
  - their prepared wealth
  lexicon: HALOT
  rationale: The noun is difficult and relatively rare; in context it refers to what
    has been laid up or made ready, hence stored wealth. 'Treasures' best fits the
    parallel with plundering and the boast of conquest.
- source_word: שׁוֹשֵׂתִי
  chosen: I plunder
  alternatives:
  - I loot
  - I despoil
  lexicon: HALOT
  rationale: The verb conveys plundering/spoiling. 'I plunder' is clear, dignified,
    and matches the military-conquest context.
- source_word: וְאוֹרִיד
  chosen: I bring down
  alternatives:
  - I cast down
  - I lower
  lexicon: HALOT
  rationale: Hiphil of ירד means cause to go down, hence bring down/cast down. 'Bring
    down' is idiomatic and preserves the metaphor of humiliating the exalted.
- source_word: כַּאַבִּיר
  chosen: like a mighty man
  alternatives:
  - like a mighty one
  - as a bull
  lexicon: HALOT
  rationale: אַבִּיר commonly denotes a mighty one/strong one. The prefixed כ marks
    comparison. 'Like a mighty man' gives a natural English simile; some lexical traditions
    connect the term with a strong animal such as a bull, but the human-warrior sense
    fits the context better.
- source_word: יוֹשְׁבִים
  chosen: those who sit enthroned
  alternatives:
  - the inhabitants
  - those who dwell
  - those seated
  lexicon: HALOT
  rationale: While ישב can mean dwell, in this context of imperial boasting and being
    'brought down,' the sense of seated rulers or enthroned ones is more coherent
    than generic inhabitants. The participle is rendered substantivally as 'those
    who sit enthroned.'
