theological_decisions:
- issue: Referent of the speaker's boast
  chosen_reading: The verse quotes the arrogant king of Assyria as representative
    of Assyria's pride.
  alternative_readings:
  - The verse personifies Assyria as a whole speaking collectively.
  rationale: The immediate context (Isa 10:12-15) targets the king of Assyria's proud
    heart while also speaking of Assyria corporately. English singular pronouns preserve
    the Hebrew singular without forcing a narrower interpretation than the context
    warrants.
