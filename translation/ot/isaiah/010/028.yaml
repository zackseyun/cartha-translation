id: ISA.10.28
reference: Isaiah 10:28
source:
  edition: WLC
  text: בָּ֥א עַל עַיַּ֖ת עָבַ֣ר בְּ/מִגְר֑וֹן לְ/מִכְמָ֖שׂ יַפְקִ֥יד כֵּלָֽי/ו־׃
translation:
  text: He has come against Aiath; he has passed through Migron. At Michmash he stores
    his baggage.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'At Michmash he deposits his equipment,' with 'equipment' possibly including
      military gear or weapons.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּא
  chosen: has come
  alternatives:
  - came
  - comes
  lexicon: HALOT
  rationale: Qal perfect 3ms of בוא, narrating the advance as a vivid completed action.
    English present perfect preserves the prophetic, report-like sequence better than
    a simple present while remaining natural.
- source_word: עַל
  chosen: against
  alternatives:
  - to
  - upon
  lexicon: HALOT
  rationale: With a place in a military advance context, עַל can indicate movement
    directed toward or against a location. 'Against' better conveys the hostile campaign
    setting in this oracle.
- source_word: עַיַּת
  chosen: Aiath
  alternatives:
  - Ai
  lexicon: HALOT
  rationale: Proper place name; transliterated in keeping with the philosophy to transliterate
    names. 'Aiath' reflects the Hebrew form here rather than harmonizing to the shorter
    'Ai'.
- source_word: עָבַר
  chosen: has passed through
  alternatives:
  - passed
  - crossed through
  lexicon: HALOT
  rationale: Qal perfect 3ms of עבר in route narration. 'Passed through' naturally
    expresses movement through a location and fits the sequence of military march
    notices.
- source_word: בְּמִגְרוֹן
  chosen: through Migron
  alternatives:
  - at Migron
  - in Migron
  lexicon: HALOT
  rationale: The preposition ב can be locative ('in/at'), but with עבר in travel narration
    it is idiomatically rendered 'through,' bringing out the sense of traversing the
    place.
- source_word: לְמִכְמָשׂ
  chosen: At Michmash
  alternatives:
  - to Michmash
  - for Michmash
  lexicon: HALOT
  rationale: Although ל often means 'to,' the clause is elliptical and introduces
    the next stopping point in the march. Rendering the full clause as 'At Michmash'
    gives idiomatic English for the staging location before the next verb.
- source_word: יַפְקִיד
  chosen: stores
  alternatives:
  - deposits
  - musters
  - appoints
  lexicon: HALOT
  rationale: Hiphil of פקד has a broad semantic range. In context with 'his baggage/weapons'
    and a military march, it most plausibly means to deposit or leave equipment at
    a staging point. 'Stores' is clear modern English without over-specifying.
- source_word: כֵּלָיו
  chosen: his baggage
  alternatives:
  - his gear
  - his equipment
  - his weapons
  lexicon: HALOT
  rationale: כְּלִי can mean vessels, articles, equipment, or weapons. In a marching-army
    context it likely refers broadly to gear/baggage rather than only weapons. 'Baggage'
    fits the likely sense of depositing supplies at Michmash while preserving the
    military setting.
