id: ISA.10.29
reference: Isaiah 10:29
source:
  edition: WLC
  text: עָֽבְרוּ֙ מַעְבָּרָ֔ה גֶּ֖בַע מָל֣וֹן לָ֑/נוּ חָֽרְדָה֙ הָֽ/רָמָ֔ה גִּבְעַ֥ת
    שָׁא֖וּל נָֽסָה׃
translation:
  text: They have crossed over the pass; Geba is our lodging place. Ramah trembles;
    Gibeah of Saul has fled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the crossing' or 'the ford.' The Hebrew מַעְבָּרָה can denote a place
      of crossing more generally; 'the pass' best fits the military route context
      here.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Gibeah of Saul'; alternatively, 'Saul's Gibeah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָבְרוּ
  chosen: They have crossed over
  alternatives:
  - They crossed over
  - They have passed through
  lexicon: HALOT
  rationale: Qal perfect 3cp of עבר, here narrating the invaders' advance. English
    present perfect captures the vivid report of completed movement with present relevance;
    'crossed over' preserves the motion sense.
- source_word: מַעְבָּרָה
  chosen: the pass
  alternatives:
  - the crossing
  - the ford
  - Migron pass
  lexicon: HALOT
  rationale: Common noun from עבר meaning a crossing place or pass. In this military
    itinerary context, 'the pass' is the most natural English rendering. 'Ford' is
    possible but too specific without clear water context.
- source_word: גֶּבַע
  chosen: Geba
  rationale: Proper place name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: מָלוֹן
  chosen: lodging place
  alternatives:
  - lodging
  - night quarters
  - camping place
  lexicon: HALOT
  rationale: Noun meaning lodging place or overnight stop. 'Lodging place' is clear
    modern English and preserves the concrete sense of a stopping point.
- source_word: לָנוּ
  chosen: our
  alternatives:
  - for us
  lexicon: HALOT
  rationale: Preposition ל plus 1cp suffix, literally 'for us.' In idiomatic English
    with a verbless clause, 'is our lodging place' best conveys the sense.
- source_word: חָרְדָה
  chosen: trembles
  alternatives:
  - has trembled
  - is terrified
  lexicon: HALOT
  rationale: Qal perfect 3fs of חרד, 'to tremble/be terrified.' With Ramah as subject,
    'trembles' gives vivid present force in English poetry while retaining the fear
    motif.
- source_word: הָרָמָה
  chosen: Ramah
  rationale: Proper place name, transliterated.
- source_word: גִּבְעַת שָׁאוּל
  chosen: Gibeah of Saul
  alternatives:
  - Saul's Gibeah
  lexicon: HALOT
  rationale: Construct chain naming the town associated with Saul. 'Gibeah of Saul'
    is slightly more formal and preserves the Hebrew structure.
- source_word: נָסָה
  chosen: has fled
  alternatives:
  - flees
  - has taken flight
  lexicon: HALOT
  rationale: Qal perfect 3fs of נוס, 'to flee.' 'Has fled' fits the sequence of rapid
    military progress and the resulting panic of the towns.
