theological_decisions:
- issue: Identity of the one on whom Israel had leaned
  chosen_reading: Kept implicit as 'the one who struck them' rather than naming Assyria
    in the translation.
  alternative_readings:
  - Explicitly interpret as 'Assyria' or 'the king of Assyria'
  rationale: The immediate context points to Assyria as the oppressor, but the Hebrew
    text itself uses a descriptive expression rather than the proper name here. Preserving
    the description avoids importing more specificity than the verse states while
    allowing the context to inform interpretation.
- issue: Nuance of בֶּאֱמֶת
  chosen_reading: Rendered 'in truth' in the main text.
  alternative_readings:
  - truly
  - in faithfulness
  rationale: The phrase can express sincerity, reliability, or faithfulness. 'In truth'
    best preserves the lexical breadth and theological tension without collapsing
    it into a narrower interpretive choice.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
