id: ISA.10.20
reference: Isaiah 10:20
source:
  edition: WLC
  text: וְ/הָיָ֣ה בַּ/יּ֣וֹם הַ/ה֗וּא לֹֽא יוֹסִ֨יף ע֜וֹד שְׁאָ֤ר יִשְׂרָאֵל֙ וּ/פְלֵיטַ֣ת
    בֵּֽית יַעֲקֹ֔ב לְ/הִשָּׁעֵ֖ן עַל מַכֵּ֑/הוּ וְ/נִשְׁעַ֗ן עַל יְהוָ֛ה קְד֥וֹשׁ
    יִשְׂרָאֵ֖ל בֶּ/אֱמֶֽת׀־־־־׃
translation:
  text: And in that day the remnant of Israel and the survivors of the house of Jacob
    will no longer continue to lean on the one who struck them, but will lean on the
    LORD, the Holy One of Israel, in truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'truly' or 'in faithfulness.' The Hebrew phrase carries the sense of
      genuine, reliable, or faithful dependence on the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will
  alternatives:
  - And it shall come to pass
  - And it will happen
  lexicon: HALOT
  rationale: Introduces a future circumstance. Rendered idiomatically with the following
    temporal phrase rather than preserving a wooden 'it shall come to pass.'
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula; 'in that day' is natural and preserves
    the eschatological/prophetic resonance.
- source_word: לֹא יוֹסִיף עוֹד
  chosen: will no longer continue
  alternatives:
  - will no more again
  - will no longer
  lexicon: HALOT
  rationale: 'The combination intensifies cessation: they will not add/continue any
    longer. ''Will no longer continue'' preserves the durative force before the infinitive
    ''to lean.'''
- source_word: שְׁאָר יִשְׂרָאֵל
  chosen: the remnant of Israel
  alternatives:
  - the remainder of Israel
  lexicon: HALOT
  rationale: '''Remnant'' is the established and contextually important prophetic
    term for the surviving faithful/reduced people.'
- source_word: וּפְלֵיטַת בֵּית יַעֲקֹב
  chosen: and the survivors of the house of Jacob
  alternatives:
  - and the escaped ones of the house of Jacob
  - and the fugitives of the house of Jacob
  lexicon: HALOT
  rationale: פְלֵיטָה denotes those who escape or survive. 'Survivors' is clear modern
    English and fits the parallel with 'remnant.'
- source_word: לְהִשָּׁעֵן
  chosen: to lean on
  alternatives:
  - to rely on
  - to depend on
  lexicon: HALOT
  rationale: The verb literally means 'to lean/support oneself on' and the metaphor
    is important because it is repeated in contrast with leaning on the LORD.
- source_word: מַכֵּהוּ
  chosen: the one who struck them
  alternatives:
  - their striker
  - the one striking them
  lexicon: HALOT
  rationale: The singular participial form with 3ms suffix is best rendered as a representative
    singular agent. English shifts the object to 'them' to match the collective subject
    and avoid awkwardness. In context this refers to the oppressor/Assyria, but the
    translation leaves the referent implicit as in Hebrew.
- source_word: וְנִשְׁעַן
  chosen: but will lean on
  alternatives:
  - and will rely on
  - and will support themselves on
  lexicon: HALOT
  rationale: Same root as earlier לְהִשָּׁעֵן; rendered consistently as 'lean on.'
    'But' brings out the adversative contrast implied by the sentence structure in
    English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  alternatives:
  - Israel's Holy One
  lexicon: HALOT
  rationale: Standard title in Isaiah; preserves both the title's solemnity and recognizability.
- source_word: בֶּאֱמֶת
  chosen: in truth
  alternatives:
  - truly
  - faithfully
  lexicon: HALOT
  rationale: אֱמֶת can denote truth, faithfulness, or reliability. 'In truth' preserves
    the Hebrew idiom and leaves the semantic richness intact without over-specifying
    whether the emphasis is sincerity or faithfulness.
