theological_decisions:
- issue: Referent of the pronouns in the second colon
  chosen_reading: The suffixes refer to the LORD's staff, which he lifts in an Exodus-like act of judgment/deliverance.
  alternative_readings:
  - The suffixes refer to the Assyrian's staff/rod, now turned back against him.
  rationale: The immediate context includes imagery of Assyria's rod, but the comparison to the sea and Egypt strongly evokes the LORD's action at the Red Sea. Rendering 'his staff ... he will lift it' preserves the likely divine referent without adding interpretive material beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Historical allusion
  chosen_reading: The verse intentionally recalls both the defeat of Midian (Judg 7) and the Exodus at the sea.
  rationale: These allusions shape the translation choices 'rock of Oreb' and 'sea ... Egypt.' The verse presents future deliverance/judgment in continuity with prior saving acts of the LORD.
