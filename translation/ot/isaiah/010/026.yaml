id: ISA.10.26
reference: Isaiah 10:26
source:
  edition: WLC
  text: וְ/עוֹרֵ֨ר עָלָ֜י/ו יְהוָ֤ה צְבָאוֹת֙ שׁ֔וֹט כְּ/מַכַּ֥ת מִדְיָ֖ן בְּ/צ֣וּר עוֹרֵ֑ב וּ/מַטֵּ֨/הוּ֙ עַל הַ/יָּ֔ם וּ/נְשָׂא֖/וֹ בְּ/דֶ֥רֶךְ מִצְרָֽיִם־׃
translation:
  text: And Yahweh of hosts will stir up a whip against him, as at the slaughter of Midian at the rock of Oreb; and his staff will be over the sea, and he will lift it as in Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the blow against Midian.' The Hebrew phrase compares the coming judgment to the LORD's striking of Midian.
    reason: lexical_alternative
  - marker: b
    text: '''At the rock of Oreb'' recalls Judges 7:25, where Oreb, a Midianite leader, was killed.'
    reason: cross_reference
  - marker: c
    text: Or 'in the manner of Egypt,' likely an allusion to the LORD's lifting the staff over the sea in the Exodus.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעוֹרֵר
  chosen: will stir up
  alternatives:
  - will rouse
  - will awaken
  lexicon: HALOT
  rationale: Hiphil of עור here conveys causing something to arise or be aroused. 'Will stir up' is idiomatic in English for raising an instrument of judgment and fits the future sense in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'hosts' is the established and sufficiently transparent rendering, preserving the breadth of heavenly and earthly forces under God's command.
- source_word: שׁוֹט
  chosen: a whip
  alternatives:
  - a scourge
  - a lash
  lexicon: HALOT
  rationale: The noun denotes an instrument of striking. 'Whip' is concrete and readable, while still preserving the metaphor of punitive judgment.
- source_word: כְּמַכַּת
  chosen: as at the striking down of
  alternatives:
  - like the blow against
  - as the defeat of
  lexicon: HALOT
  rationale: The comparison is to a historical act of smiting. 'Striking down of' preserves the verbal force behind the noun better than the more abstract 'defeat'.
- source_word: מִדְיָן
  chosen: Midian
  lexicon: HALOT
  rationale: Standard transliteration of the people/place name.
- source_word: בְּצוּר עוֹרֵב
  chosen: at the rock of Oreb
  alternatives:
  - by the rock of Oreb
  lexicon: HALOT
  rationale: This alludes to Judges 7:25. 'At the rock of Oreb' is the most natural English rendering of the prepositional phrase while preserving the historical reference.
- source_word: וּמַטֵּהוּ
  chosen: and his staff
  alternatives:
  - and his rod
  lexicon: HALOT
  rationale: מַטֶּה can be 'staff' or 'rod.' 'Staff' fits the Exodus allusion that follows and avoids confusion with the earlier punitive 'whip,' while the suffix is best taken as referring to the LORD's staff.
- source_word: עַל הַיָּם
  chosen: will be over the sea
  alternatives:
  - will be against the sea
  - will be upon the sea
  lexicon: HALOT
  rationale: The phrase recalls the LORD's action at the Red Sea. 'Over the sea' preserves the spatial imagery without overinterpreting the exact motion.
- source_word: וּנְשָׂאוֹ
  chosen: and he will lift it
  alternatives:
  - and he will raise it
  - and he will brandish it
  lexicon: HALOT
  rationale: The verb נשׂא means 'lift, raise, carry.' With the staff as antecedent, 'lift it' is the clearest rendering and matches the Exodus imagery of Moses' raised staff under divine direction.
- source_word: בְּדֶרֶךְ מִצְרַיִם
  chosen: as in the way of Egypt
  alternatives:
  - in the manner of Egypt
  - on the road to Egypt
  lexicon: HALOT
  rationale: The phrase is idiomatic and allusive, pointing to the manner of God's action in the Exodus rather than a literal road. 'As in the way of Egypt' keeps the Hebrew imagery while remaining understandable.
