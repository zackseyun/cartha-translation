id: ISA.10.5
reference: Isaiah 10:5
source:
  edition: WLC
  text: ה֥וֹי אַשּׁ֖וּר שֵׁ֣בֶט אַפִּ֑/י וּ/מַטֶּה ה֥וּא בְ/יָדָ֖/ם זַעְמִֽ/י־׃
translation:
  text: Woe to Assyria, the rod of my anger; the staff in their hand is my wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in their hand.'' Some translations render the phrase with a singular
      pronoun (''in his hand'' or ''in its hand'') to smooth the imagery, but the
      Masoretic Text here reads plural.'
    reason: textual_variant
  - marker: b
    text: Or 'in their hand'.
    reason: previous_rendering
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: An interjection of lament/threat introducing an oracle of judgment. 'Woe'
    is the standard concise English equivalent and preserves the prophetic force better
    than the softer 'Ah' or 'Alas'.
- source_word: אַשּׁוּר
  chosen: Assyria
  lexicon: HALOT
  rationale: Proper national name; transliterated by standard English convention as
    the nation addressed in the oracle.
- source_word: שֵׁבֶט
  chosen: rod
  alternatives:
  - scepter
  - club
  lexicon: HALOT
  rationale: Here the image is an instrument used for striking in parallel with 'staff.'
    'Rod' best preserves the metaphor of Assyria as the instrument of divine anger;
    'scepter' would overemphasize royal authority.
- source_word: אַפִּי
  chosen: my anger
  alternatives:
  - my nose
  - my wrath
  lexicon: HALOT
  rationale: Though literally 'my nose,' the Hebrew idiom denotes anger. 'My anger'
    is clear modern English and fits the poetic parallelism with 'my wrath.'
- source_word: וּמַטֶּה
  chosen: the staff
  alternatives:
  - and the staff
  - and a staff
  lexicon: HALOT
  rationale: Rendered with the article in English for natural parallelism with 'the
    rod.' The conjunction is retained in sense through the semicolon-linked second
    line.
- source_word: הוּא
  chosen: is
  alternatives:
  - it is
  - he is
  lexicon: HALOT
  rationale: The pronoun functions as a copular element in the clause. English expresses
    this most naturally with 'is' rather than an explicit pronoun.
- source_word: בְיָדָם
  chosen: in their hand
  alternatives:
  - in his hand
  - in its hand
  lexicon: HALOT
  rationale: The Masoretic form is 3mp ('their hand'), and the translation follows
    the provided Hebrew text directly. Because the singular imagery might suggest
    'his hand' in some renderings or textual discussions, the plural should be preserved
    in the main text as the source reading.
- source_word: זַעְמִי
  chosen: my wrath
  alternatives:
  - my indignation
  - my fury
  lexicon: HALOT
  rationale: A strong term for divine anger. 'Wrath' preserves the theological weight
    and poetic intensification alongside 'my anger' in the first colon.
