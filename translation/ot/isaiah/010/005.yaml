theological_decisions:
- issue: Divine agency and Assyria as instrument of judgment
  chosen_reading: Assyria is presented as the instrument of God's anger and wrath,
    without softening the metaphor.
  alternative_readings:
  - Assyria as merely coincidental agent of judgment
  - Assyria as independent actor only
  rationale: The verse explicitly identifies Assyria as 'the rod of my anger' and
    the staff as 'my wrath.' The translation preserves the tension that God uses a
    pagan empire as an instrument of judgment without importing further doctrinal
    explanation.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
revisions:
- timestamp: '2026-04-21T19:59:24Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/random_sample/ot/isaiah/010/005.job-19029.json
  category: awkward_english
  tier: 1
  from: in their hand
  to: in their hands
  rationale: The Hebrew phrase בְיָדָם (bəyādām) uses a singular noun for 'hand' (יָד)
    with a plural suffix (-ָם). While 'in their hand' is a literal rendering of the
    form, the sense is plural ('in the hands of them'). The current rendering creates
    a slight grammatical awkwardness in English by pairing a plural possessive ('their')
    with a singular noun ('hand'), which can be distracting. Changing to 'in their
    hands' is more idiomatic English, is supported by other major translations (e.g.,
    NIV, NRSV), and remains a faithful rendering of the Hebrew sense.
