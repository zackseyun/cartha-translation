theological_decisions:
- issue: Relationship between divine intention and Assyria's intention in context
  chosen_reading: Render the verse to preserve the contrast between God's purpose
    and the king of Assyria's own destructive intent without adding explanatory theology.
  alternative_readings:
  - A more interpretive rendering that explicitly states he does not understand God's
    purpose
  rationale: The immediate context contrasts divine commission with human arrogance,
    but this verse itself states only that 'he does not think so' and that his heart
    aims at destruction. The translation preserves that tension rather than importing
    a fuller doctrinal explanation into the verse.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
