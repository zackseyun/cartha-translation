id: ISA.10.7
reference: Isaiah 10:7
source:
  edition: WLC
  text: וְ/הוּא֙ לֹא כֵ֣ן יְדַמֶּ֔ה וּ/לְבָב֖/וֹ לֹא כֵ֣ן יַחְשֹׁ֑ב כִּ֚י לְ/הַשְׁמִ֣יד
    בִּ/לְבָב֔/וֹ וּ/לְ/הַכְרִ֥ית גּוֹיִ֖ם לֹ֥א מְעָֽט־־׃
translation:
  text: But he does not think so, and his heart does not reckon so; for it is in his
    heart to destroy, and to cut off not a few nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does not intend so' for 'does not think so'; the Hebrew verb can carry
      the sense of conceiving or purposing.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'not a few,' a litotes meaning a large number.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְדַמֶּה
  chosen: think
  alternatives:
  - intend
  - imagine
  lexicon: HALOT
  rationale: The piel of דמה here refers to what the Assyrian king supposes or conceives.
    'Think' is natural English and pairs well with the following יַחְשֹׁב, while preserving
    the sense that his perception does not align with God's purpose stated in the
    context.
- source_word: לְבָבוֹ
  chosen: his heart
  alternatives:
  - his mind
  - his inner self
  lexicon: HALOT
  rationale: Hebrew לֵבָב commonly denotes the inner thought-will center, not merely
    emotion. 'His heart' preserves the Hebrew anthropological idiom; the cognitive
    force is clarified by the verb 'reckon'.
- source_word: יַחְשֹׁב
  chosen: reckon
  alternatives:
  - think
  - plan
  - consider
  lexicon: HALOT
  rationale: חשב often means to think, account, or devise. Since 'think' already renders
    יְדַמֶּה, 'reckon' provides slight differentiation while still conveying mental
    assessment. It also keeps the parallelism without flattening both verbs into identical
    English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - rather
  lexicon: HALOT
  rationale: Here כִּי introduces the explanation of the Assyrian's actual intention.
    'For' fits the explanatory relation in concise English.
- source_word: לְהַשְׁמִיד
  chosen: to destroy
  alternatives:
  - to annihilate
  - to devastate
  lexicon: HALOT
  rationale: The hiphil infinitive of שׁמד conveys causing destruction. 'To destroy'
    is the broad, standard rendering and avoids overstating total annihilation where
    the context emphasizes aggressive conquest.
- source_word: בִּלְבָבוֹ
  chosen: in his heart
  alternatives:
  - in his mind
  - within him
  lexicon: HALOT
  rationale: Repeating 'in his heart' preserves the Hebrew emphasis on inward intention.
    The phrase marks motive and settled purpose.
- source_word: לְהַכְרִית
  chosen: to cut off
  alternatives:
  - to wipe out
  - to exterminate
  lexicon: HALOT
  rationale: The hiphil of כרת often means to cut off, remove, or eliminate. 'Cut
    off' is more formally tied to the Hebrew and leaves the exact mode of removal
    open.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentile nations
  lexicon: HALOT
  rationale: In this geopolitical context, גּוֹיִם refers to nations or peoples as
    political entities. 'Nations' is the most idiomatic and contextually precise rendering.
- source_word: לֹא מְעָט
  chosen: not a few
  alternatives:
  - many
  - no small number of
  lexicon: HALOT
  rationale: The Hebrew litotes literally means 'not few.' Preserving it as 'not a
    few' retains the rhetorical force and avoids over-paraphrasing to simply 'many'.
- source_word: וְהוּא
  chosen: But he
  alternatives:
  - And he
  - Yet he
  lexicon: HALOT
  rationale: Given the contrast with the previous verse, the conjunction is adversative
    in sense. 'But he' best signals that the Assyrian's own intention differs from
    God's use of him.
