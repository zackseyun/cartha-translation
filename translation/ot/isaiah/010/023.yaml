theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  rationale: Per doctrine, YHWH defaults to 'the LORD.' In the fixed combination with
    אֲדֹנָי, English customarily uses 'the Lord GOD' to avoid the awkward 'Lord LORD'
    while still signaling the covenant name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of הָאָרֶץ
  chosen_reading: all the earth
  alternative_readings:
  - the whole land
  rationale: The Hebrew term can denote either the earth generally or a specific land.
    The broader rendering was chosen because the phrase 'in the midst of all the earth'
    naturally reads universally, but the narrower alternative is preserved in a footnote
    because the immediate prophetic context concerns historical judgment in and around
    Israel.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
