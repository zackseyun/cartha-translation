id: ISA.10.23
reference: Isaiah 10:23
source:
  edition: WLC
  text: כִּ֥י כָלָ֖ה וְ/נֶחֱרָצָ֑ה אֲדֹנָ֤/י יְהוִה֙ צְבָא֔וֹת עֹשֶׂ֖ה בְּ/קֶ֥רֶב
    כָּל הָ/אָֽרֶץ־׃ס
translation:
  text: For the Lord GOD of hosts is carrying out a complete destruction, one that
    has been decreed, in the midst of all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole land.' Hebrew אֶרֶץ can mean either 'earth' or 'land' depending
      on context.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - For/because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement; 'For'
    best preserves the connective force in context.
- source_word: כָלָה
  chosen: complete destruction
  alternatives:
  - full end
  - consumption
  - annihilation
  lexicon: HALOT
  rationale: The noun denotes a finishing/end that in judgment contexts carries the
    sense of destruction or consumption. 'Complete destruction' preserves both the
    idea of finality and the judgment setting without sounding archaic like 'full
    end'.
- source_word: וְנֶחֱרָצָה
  chosen: one that has been decreed
  alternatives:
  - and decreed
  - decisive
  - determined
  lexicon: HALOT
  rationale: 'From חרץ in the Niphal, the term conveys something decided/determined.
    Because it agrees with the preceding feminine noun, English expresses the relation
    appositionally: ''a complete destruction, one that has been decreed.'' This preserves
    both elements without awkwardness.'
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title is conventionally rendered 'the Lord GOD' in
    English to distinguish אֲדֹנָי + YHWH and avoid 'Lord LORD.' This also aligns
    with the doctrine default of rendering YHWH as 'the LORD,' adapted here because
    of the preceding אֲדֹנָי.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: '''Hosts'' is the established and still intelligible rendering for the
    divine title, preserving its breadth beyond merely human armies.'
- source_word: עֹשֶׂה
  chosen: is carrying out
  alternatives:
  - is making
  - is doing
  - will execute
  lexicon: HALOT
  rationale: The participle presents the action as active or imminent. 'Is carrying
    out' communicates execution of the decreed judgment more naturally in English
    than the overly broad 'is doing'.
- source_word: בְּקֶרֶב
  chosen: in the midst of
  alternatives:
  - within
  - in
  lexicon: HALOT
  rationale: The phrase indicates occurrence within the sphere of the whole land/earth.
    'In the midst of' preserves the spatial force more fully than a bare 'in'.
- source_word: כָּל הָאָרֶץ
  chosen: all the earth
  alternatives:
  - the whole land
  - all the land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth.' In Isaiah this phrase can be broader
    than Judah alone, and 'all the earth' fits the universal-sounding expression while
    preserving the Hebrew wording. The alternative 'the whole land' is worth preserving
    because some read the judgment as focused on the land of Israel/Assyria's sphere.
