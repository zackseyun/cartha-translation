theological_decisions:
- issue: Referent of the pronoun suffixes ('him')
  chosen_reading: The 'him' refers to the Assyrian king/agent whom God commissions
    as an instrument of judgment.
  alternative_readings:
  - The pronoun could be taken more generally as Assyria personified.
  rationale: The immediate context (Isa 10:5) identifies Assyria/the rod of God's
    anger as the commissioned instrument. Rendering the suffixes as 'him' follows
    the masculine singular Hebrew while leaving the broader corporate association
    to context.
  doctrine_reference: Preserve theological tension rather than resolve it; gender-accurate
    over gender-neutral.
- issue: Nature of divine wrath language
  chosen_reading: Retain direct first-person divine wrath language ('my wrath') without
    softening.
  alternative_readings:
  - Paraphrastic renderings such as 'the people I am angry with'
  rationale: The Hebrew explicitly attributes wrath to God in judicial context. The
    translation should preserve, not dilute, the theological force of divine judgment.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
