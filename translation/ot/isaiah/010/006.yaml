id: ISA.10.6
reference: Isaiah 10:6
source:
  edition: WLC
  text: בְּ/ג֤וֹי חָנֵף֙ אֲשַׁלְּחֶ֔/נּוּ וְ/עַל עַ֥ם עֶבְרָתִ֖/י אֲצַוֶּ֑/נּוּ לִ/שְׁלֹ֤ל
    שָׁלָל֙ וְ/לָ/בֹ֣ז בַּ֔ז ו/ל/שימ/ו מִרְמָ֖ס כְּ/חֹ֥מֶר חוּצֽוֹת־׃
translation:
  text: Against a godless nation I send him, and against the people of my wrath I
    command him, to seize spoil and to carry off plunder, and to make it a trampling
    place like the mud of the streets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against an impious nation.' The Hebrew adjective can denote godlessness,
      profanity, or impiety.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'to spoil spoil and to plunder plunder,' an idiom intensifying
      the acts of looting.
    reason: lexical_alternative
  - marker: c
    text: Or 'to make him something trampled underfoot.' The Hebrew suffix is masculine
      singular, referring to the targeted nation/people as a collective.
    reason: alternative_reading
lexical_decisions:
- source_word: גּוֹי
  chosen: nation
  alternatives:
  - people
  lexicon: HALOT
  rationale: גּוֹי commonly denotes a nation or people-group. 'Nation' fits the political/corporate
    sense here, especially in parallel with עַם.
- source_word: חָנֵף
  chosen: godless
  alternatives:
  - profane
  - hypocritical
  - impious
  lexicon: HALOT
  rationale: In prophetic usage חָנֵף describes impiety or godlessness rather than
    mere insincerity. 'Godless' best captures the moral-religious indictment in accessible
    English.
- source_word: אֲשַׁלְּחֶנּוּ
  chosen: I send him
  alternatives:
  - I will send him
  - I dispatch him
  lexicon: HALOT
  rationale: The imperfect with prophetic discourse can be rendered as present/future
    in English. 'I send him' gives vividness and fits the immediate divine commissioning
    context.
- source_word: עַם
  chosen: people
  alternatives:
  - nation
  lexicon: HALOT
  rationale: עַם often emphasizes a people as a collective body. Rendering it 'people'
    preserves the parallelism with גּוֹי without flattening both terms into the same
    English word.
- source_word: עֶבְרָתִי
  chosen: my wrath
  alternatives:
  - my fury
  - my overflowing anger
  lexicon: HALOT
  rationale: עֶבְרָה denotes wrath/fury. 'My wrath' is concise, natural, and preserves
    the divine-judgment force.
- source_word: אֲצַוֶּנּוּ
  chosen: I command him
  alternatives:
  - I commission him
  - I give him orders
  lexicon: HALOT
  rationale: The verb צוה is straightforwardly 'command.' This keeps the divine sovereignty
    explicit.
- source_word: לִשְׁלֹל שָׁלָל
  chosen: to seize spoil
  alternatives:
  - to plunder spoil
  - to strip away booty
  lexicon: HALOT
  rationale: The infinitive plus cognate noun intensifies the action. 'To seize spoil'
    preserves the Hebrew idiom in readable English without awkward redundancy.
- source_word: וְלָבֹז בַּז
  chosen: to carry off plunder
  alternatives:
  - to loot loot
  - to take booty
  lexicon: HALOT
  rationale: Like the previous phrase, this infinitive plus cognate noun is idiomatic.
    Using 'carry off plunder' preserves the second, near-synonymous action while avoiding
    clumsy repetition.
- source_word: וּלְשִׂימוֹ
  chosen: to make it
  alternatives:
  - to set him
  - to turn it
  lexicon: HALOT
  rationale: The suffix most naturally refers back to the targeted nation/people as
    a collective entity. English idiom prefers 'it' for the nation as an object of
    devastation.
- source_word: מִרְמָס
  chosen: a trampling place
  alternatives:
  - something trampled
  - a thing to be trodden down
  lexicon: HALOT
  rationale: מִרְמָס denotes something trampled underfoot. 'A trampling place' is
    idiomatic and conveys the result of conquest.
- source_word: כְּחֹמֶר חוּצוֹת
  chosen: like the mud of the streets
  alternatives:
  - like street mire
  - like clay of the open places
  lexicon: HALOT
  rationale: חֹמֶר here is mire/mud rather than neutral 'clay,' and חוּצוֹת refers
    to streets/open city places. 'Like the mud of the streets' is vivid and natural.
