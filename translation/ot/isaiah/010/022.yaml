id: ISA.10.22
reference: Isaiah 10:22
source:
  edition: WLC
  text: כִּ֣י אִם יִהְיֶ֞ה עַמְּ/ךָ֤ יִשְׂרָאֵל֙ כְּ/ח֣וֹל הַ/יָּ֔ם שְׁאָ֖ר יָשׁ֣וּב
    בּ֑/וֹ כִּלָּי֥וֹן חָר֖וּץ שׁוֹטֵ֥ף צְדָקָֽה־׃
translation:
  text: For though your people, Israel, are like the sand of the sea, only a remnant
    of them will return. A destruction is decreed, overflowing with righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'only a remnant in it will return'; the Hebrew pronoun is singular, referring
      to the people as a collective.
    reason: lexical_alternative
  - marker: b
    text: Or 'A destruction is decreed, overflowing with justice.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי אִם
  chosen: For though
  alternatives:
  - For if
  - Though indeed
  lexicon: HALOT
  rationale: 'The combination introduces a concessive sense here rather than a simple
    conditional: despite Israel''s vast numbers, only a remnant returns. ''For though''
    captures the discourse flow and contrast.'
- source_word: עַמְּךָ יִשְׂרָאֵל
  chosen: your people, Israel
  alternatives:
  - your people Israel
  lexicon: HALOT
  rationale: Directly renders the construct with second masculine singular suffix
    and appositional proper name. Comma added for natural English apposition.
- source_word: כְּחוֹל הַיָּם
  chosen: like the sand of the sea
  alternatives:
  - as the sand of the sea
  lexicon: HALOT
  rationale: Standard simile for innumerable multitude; 'like' is natural modern English
    while preserving the image.
- source_word: שְׁאָר
  chosen: a remnant
  alternatives:
  - the remnant
  - only a remnant
  lexicon: HALOT
  rationale: 'Indefinite in form but contextually qualitative: not the whole people,
    but a surviving remainder. The exclusivity is reinforced in English by ''only''
    in the clause rather than built into the noun itself.'
- source_word: יָשׁוּב
  chosen: will return
  alternatives:
  - will turn back
  - will repent
  lexicon: HALOT
  rationale: The verb שוב can mean return/turn back and sometimes repent, but in this
    Isaiah context with the remnant motif and the following pronoun, 'return' best
    preserves both literal and thematic force without overinterpreting as inward repentance.
- source_word: בּוֹ
  chosen: of them
  alternatives:
  - in it
  - in him
  - among it
  lexicon: HALOT
  rationale: 'Though formally singular, the pronoun refers back to the collective
    noun ''people''/''Israel.'' English idiom requires a partitive rendering: ''of
    them.'' This yields the sense that only a remnant out of the people will return.'
- source_word: כִּלָּיוֹן
  chosen: destruction
  alternatives:
  - complete destruction
  - consumption
  - annihilation
  lexicon: HALOT
  rationale: The noun denotes destruction/consumption. 'Destruction' is clear modern
    English and avoids overstating total annihilation, since the verse simultaneously
    preserves a remnant.
- source_word: חָרוּץ
  chosen: is decreed
  alternatives:
  - determined
  - decided
  lexicon: HALOT
  rationale: 'Passive-participial sense: something decided or firmly determined. ''Is
    decreed'' conveys the fixed, judicial character of the announced destruction.'
- source_word: שׁוֹטֵף
  chosen: overflowing
  alternatives:
  - overflowing over
  - sweeping through
  lexicon: HALOT
  rationale: The participle literally evokes flooding/overflow. 'Overflowing' preserves
    the metaphor and works predicatively with the following noun.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  lexicon: HALOT
  rationale: The noun can denote righteousness or justice. 'Righteousness' is retained
    in the main text because the phrase describes the morally right character of God's
    decreed judgment; 'justice' is preserved in a footnote as a viable contextual
    alternative.
