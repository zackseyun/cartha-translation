theological_decisions:
- issue: Meaning of the remnant's 'return'
  chosen_reading: physical/national return with theological resonance, rendered simply
    as 'will return'
  alternative_readings:
  - spiritual repentance
  - return from exile specifically
  rationale: The Hebrew permits a broad 'return' that resonates with Isaiah's remnant
    theology and the name Shear-jashub (Isa 7:3). Rendering it simply as 'return'
    preserves the prophetic tension without narrowing it to either repentance alone
    or one historical return event.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sense of צְדָקָה in the final clause
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Both are lexically defensible. 'Righteousness' better preserves the moral
    quality of the decreed judgment in this prophetic context, while 'justice' remains
    a strong alternative and is preserved in a footnote.
  doctrine_reference: 'Contested terms table: analogous principle of preserving alternatives
    where the source supports more than one theologically weighty rendering.'
