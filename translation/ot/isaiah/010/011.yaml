id: ISA.10.11
reference: Isaiah 10:11
source:
  edition: WLC
  text: הֲ/לֹ֗א כַּ/אֲשֶׁ֥ר עָשִׂ֛יתִי לְ/שֹׁמְר֖וֹן וְ/לֶ/אֱלִילֶ֑י/הָ כֵּ֛ן אֶעֱשֶׂ֥ה
    לִ/ירוּשָׁלִַ֖ם וְ/לַ/עֲצַבֶּֽי/הָ׃ס
translation:
  text: shall I not do to Jerusalem and her idols just as I did to Samaria and her
    idols?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew uses two different words: for Samaria, ''idols'' (אֱלִילִים), and
      for Jerusalem, ''images/idols'' (עֲצַבִּים).'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: shall I not
  alternatives:
  - will I not
  - have I not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. In
    English, 'shall I not' preserves the rhetorical force and fits the first-person
    future sense of the clause.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Marks comparison between what was done to Samaria and what will be done
    to Jerusalem. 'Just as' clearly signals the parallel.
- source_word: עָשִׂיתִי
  chosen: I did
  alternatives:
  - I have done
  - I acted against
  lexicon: HALOT
  rationale: Simple past best fits the completed action toward Samaria in the Assyrian
    king's boast. 'Did' is concise and natural in English.
- source_word: לְשֹׁמְרוֹן
  chosen: to Samaria
  alternatives:
  - against Samaria
  - for Samaria
  lexicon: HALOT
  rationale: The preposition ל with עשה in this context indicates the object affected
    by the action. 'To Samaria' is idiomatic and preserves the sense without overinterpreting.
- source_word: אֱלִילֶיהָ
  chosen: her idols
  alternatives:
  - her worthless idols
  - her images
  lexicon: HALOT
  rationale: אֱלִילִים commonly denotes idols, often with a pejorative nuance of worthlessness.
    'Idols' is the standard clear rendering; the pejorative force is inherent in the
    Hebrew term but need not be expanded in the main text.
- source_word: כֵּן
  chosen: just as
  alternatives:
  - so
  - in the same way
  lexicon: HALOT
  rationale: Together with the preceding comparative phrase, this supports the English
    structure 'just as ... so ...'. In the final English order, the comparison is
    expressed smoothly without a separate 'so'.
- source_word: אֶעֱשֶׂה
  chosen: shall I ... do
  alternatives:
  - will I ... do
  - am I going to do
  lexicon: HALOT
  rationale: Imperfect first person expresses future/intended action in the rhetorical
    question. 'Shall I ... do' matches the elevated prophetic style and the rhetorical
    form.
- source_word: לִירוּשָׁלַםִ
  chosen: to Jerusalem
  alternatives:
  - against Jerusalem
  lexicon: HALOT
  rationale: As with Samaria, 'to Jerusalem' preserves the Hebrew construction and
    leaves the hostile sense to be inferred from context.
- source_word: עֲצַבֶּיהָ
  chosen: her idols
  alternatives:
  - her images
  - her carved images
  lexicon: HALOT
  rationale: Though a different Hebrew term from אֱלִילֶיהָ, it also refers to idols/images.
    Rendering both as 'idols' preserves the rhetorical parallel in English. The lexical
    distinction is worth preserving in a footnote.
