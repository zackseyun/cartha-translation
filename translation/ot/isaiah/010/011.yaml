theological_decisions:
- issue: Rendering two different Hebrew idol-terms (אֱלִילִים and עֲצַבִּים)
  chosen_reading: Render both as 'idols' in the main text
  alternative_readings:
  - Render the second as 'images' or 'carved images' to preserve lexical distinction
  rationale: The verse's rhetoric emphasizes equivalence between Samaria and Jerusalem.
    Using 'idols' for both clauses keeps the comparison forceful and readable in modern
    English, while a footnote preserves the lexical variation for auditability.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
