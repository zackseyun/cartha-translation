id: ISA.10.14
reference: Isaiah 10:14
source:
  edition: WLC
  text: וַ/תִּמְצָ֨א כַ/קֵּ֤ן יָדִ/י֙ לְ/חֵ֣יל הָֽ/עַמִּ֔ים וְ/כֶ/אֱסֹף֙ בֵּיצִ֣ים
    עֲזֻב֔וֹת כָּל הָ/אָ֖רֶץ אֲנִ֣י אָסָ֑פְתִּי וְ/לֹ֤א הָיָה֙ נֹדֵ֣ד כָּנָ֔ף וּ/פֹצֶ֥ה
    פֶ֖ה וּ/מְצַפְצֵֽף׀־׃
translation:
  text: My hand found the wealth of the peoples as one finds a nest; and as one gathers
    abandoned eggs, I gathered all the earth, and there was none that fluttered a
    wing, or opened a mouth, or chirped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the riches of the nations.' The Hebrew חַיִל can denote wealth, resources,
      strength, or military force; here the context favors spoil or wealth taken easily.
    reason: lexical_alternative
  - marker: b
    text: Or 'the whole land.' Hebrew אֶרֶץ can mean 'earth' or 'land'; 'earth' is
      retained here because the speaker's boast is deliberately universal in scope.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּמְצָא
  chosen: found
  alternatives:
  - reached
  - seized
  lexicon: HALOT
  rationale: From מצא, literally 'found.' In context of boastful conquest, 'found'
    preserves the metaphor of easy acquisition better than a more interpretive 'seized.'
- source_word: כַקֵּן
  chosen: as one finds a nest
  alternatives:
  - like a nest
  - as a nest
  lexicon: HALOT
  rationale: The phrase compares the ease of taking spoil to finding a nest. Expanded
    slightly in English with 'as one finds' to make the simile natural while preserving
    the image.
- source_word: יָדִי
  chosen: my hand
  lexicon: HALOT
  rationale: Literal rendering preserves the idiom of personal power and agency in
    the speaker's boast.
- source_word: לְחֵיל הָעַמִּים
  chosen: the wealth of the peoples
  alternatives:
  - the riches of the nations
  - the resources of the peoples
  - the army of the peoples
  lexicon: HALOT
  rationale: חַיִל can mean strength, army, or wealth. Here the nest/eggs metaphor
    and the following 'I gathered' favor movable possessions or resources taken in
    conquest, so 'wealth' best fits context. 'Peoples' reflects עמים rather than narrowing
    to political 'nations.'
- source_word: וְכֶאֱסֹף בֵּיצִים עֲזֻבוֹת
  chosen: and as one gathers abandoned eggs
  alternatives:
  - and like gathering forsaken eggs
  - and as eggs left behind are gathered
  lexicon: HALOT
  rationale: עֲזֻבוֹת means left, forsaken, abandoned. 'Abandoned eggs' is idiomatic
    and preserves the image of defenseless ease.
- source_word: כָּל הָאָרֶץ
  chosen: all the earth
  alternatives:
  - the whole earth
  - all the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean land or earth. In Assyria's hyperbolic imperial boast,
    'all the earth' best reflects the universalizing rhetoric.
- source_word: אָסַפְתִּי
  chosen: I gathered
  alternatives:
  - I collected
  - I swept up
  lexicon: HALOT
  rationale: Literal sense of אסף fits the egg-gathering metaphor and the accumulation
    of conquered wealth.
- source_word: וְלֹא הָיָה נֹדֵד כָּנָף
  chosen: and there was none that fluttered a wing
  alternatives:
  - and no one moved a wing
  - and there was none that shook a wing
  lexicon: HALOT
  rationale: נֹדֵד conveys moving to and fro, fluttering, wandering. With 'wing' in
    the bird imagery, 'fluttered a wing' is vivid and natural English.
- source_word: וּפֹצֶה פֶה
  chosen: or opened a mouth
  alternatives:
  - or parted the mouth
  - or uttered a protest
  lexicon: HALOT
  rationale: Literally 'opening a mouth.' Kept literal to preserve the sequence of
    birdlike resistance imagery without over-interpreting it as verbal protest.
- source_word: וּמְצַפְצֵף
  chosen: or chirped
  alternatives:
  - or peeped
  - or twittered
  lexicon: HALOT
  rationale: The verb denotes chirping or peeping like a bird. 'Chirped' is clear
    modern English and matches the nest/egg/wing imagery.
