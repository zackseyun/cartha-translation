id: ISA.10.15
reference: Isaiah 10:15
source:
  edition: WLC
  text: הֲ/יִתְפָּאֵר֙ הַ/גַּרְזֶ֔ן עַ֖ל הַ/חֹצֵ֣ב בּ֑/וֹ אִם יִתְגַּדֵּ֤ל הַ/מַּשּׂוֹר֙
    עַל מְנִיפ֔/וֹ כְּ/הָנִ֥יף שֵׁ֨בֶט֙ וְ/אֶת מְרִימָ֔י/ו כְּ/הָרִ֥ים מַטֶּ֖ה לֹא
    עֵֽץ־־־־׃
translation:
  text: Does the axe boast over the one who chops with it? Or does the saw magnify
    itself over the one who wields it? As if a rod were to wield the one who lifts
    it up, or as if a staff were to lift up one who is not wood!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''or as if a staff were to lift up not-wood.'' The final phrase
      is elliptical and may also be understood as ''what is not wood.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יִתְפָּאֵר
  chosen: boast
  alternatives:
  - glorify itself
  - vaunt itself
  lexicon: HALOT
  rationale: In the hitpael, the verb conveys self-exaltation or boasting. 'Boast'
    is idiomatic modern English and fits the rhetorical question about an instrument
    exalting itself over its user.
- source_word: הַגַּרְזֶן
  chosen: the axe
  alternatives:
  - the ax
  lexicon: HALOT
  rationale: Standard rendering for the cutting tool; 'axe' chosen as the more common
    literary spelling in Bible translation.
- source_word: הַחֹצֵב בּוֹ
  chosen: the one who chops with it
  alternatives:
  - the one who hews with it
  - its cutter
  lexicon: HALOT
  rationale: The participle denotes the person cutting/hewing by means of the axe.
    'The one who chops with it' preserves the instrumental sense of בּוֹ and is natural
    English.
- source_word: יִתְגַּדֵּל
  chosen: magnify itself
  alternatives:
  - make itself great
  - exalt itself
  lexicon: HALOT
  rationale: The hitpael-like reflexive sense here is self-aggrandizement parallel
    to 'boast.' 'Magnify itself' preserves the imagery of making oneself great without
    flattening the poetic parallelism.
- source_word: הַמַּשּׂוֹר
  chosen: the saw
  lexicon: HALOT
  rationale: Straightforward lexical equivalent for the tool in parallel with 'axe.'
- source_word: מְנִיפוֹ
  chosen: the one who wields it
  alternatives:
  - the one who brandishes it
  - the one who swings it
  lexicon: HALOT
  rationale: From נוף/הניף, the sense is to wave, brandish, or wield. 'Wields it'
    is the most natural English for handling a saw as an instrument.
- source_word: כְּהָנִיף שֵׁבֶט
  chosen: As if a rod were to wield
  alternatives:
  - As if a rod should brandish
  - Like a rod's wielding
  lexicon: HALOT
  rationale: 'The clause is elliptical and difficult, but the comparison clearly reverses
    agency: the instrument acts upon the user. Rendering with an explicit finite English
    clause communicates the absurdity while preserving the simile introduced by כְּ.'
- source_word: שֵׁבֶט
  chosen: a rod
  alternatives:
  - a club
  - a staff
  lexicon: HALOT
  rationale: Here it is a striking implement in parallel with מַטֶּה. 'Rod' keeps
    the distinction between the two Hebrew terms.
- source_word: מְרִימָיו
  chosen: the one who lifts it up
  alternatives:
  - those who lift it up
  - its lifter
  lexicon: HALOT
  rationale: Although morphologically plural in form, the sense in context is the
    wielder/lifter of the instrument. Singular English matches the surrounding singular
    imagery and avoids awkwardness.
- source_word: כְּהָרִים מַטֶּה
  chosen: or as if a staff were to lift up
  alternatives:
  - or as if a staff should raise
  - like a staff's lifting
  lexicon: HALOT
  rationale: Again the image is of reversed agency. 'Staff were to lift up' preserves
    the absurd comparison and parallels the previous clause.
- source_word: מַטֶּה
  chosen: a staff
  alternatives:
  - a stick
  - a rod
  lexicon: HALOT
  rationale: Rendered 'staff' to distinguish it from שֵׁבֶט ('rod') while keeping
    the close semantic field.
- source_word: לֹא עֵץ
  chosen: one who is not wood
  alternatives:
  - what is not wood
  - not wood
  lexicon: HALOT
  rationale: The Hebrew is terse and somewhat elliptical. 'One who is not wood' makes
    explicit the implied human object contrasted with the wooden instrument, preserving
    the irony that an inanimate wooden tool cannot control a living agent.
