theological_decisions:
- issue: Interpretation of the final elliptical clause לֹא עֵץ
  chosen_reading: 'The clause contrasts the human wielder with the wooden instrument:
    ''one who is not wood.'''
  alternative_readings:
  - '''as if a staff should lift what is not wood'''
  - '''as if one lifted a staff that is not wood'''
  rationale: The verse's argument is about the absurdity of an instrument exalting
    itself over its user (in context, Assyria over God). The chosen reading best preserves
    that rhetorical force in English by making the implied human referent explicit
    without importing extra theology.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it; ambiguity preserved in footnote.'
