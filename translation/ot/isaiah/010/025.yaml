theological_decisions:
- issue: Referent of 'their' in 'their destruction'
  chosen_reading: The pronoun refers to the enemies/oppressors, especially Assyria
    in the immediate context, not to Judah.
  alternative_readings:
  - The phrase could be taken more abstractly as 'for destruction' without a strongly
    specified personal referent.
  rationale: The surrounding context concerns the end of the LORD's anger toward his
    people and its turning against Assyria/the oppressor. Rendering 'their destruction'
    preserves the pronominal suffix while aligning with the contextual target of divine
    anger.
