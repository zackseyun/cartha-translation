id: ISA.10.25
reference: Isaiah 10:25
source:
  edition: WLC
  text: כִּי ע֖וֹד מְעַ֣ט מִזְעָ֑ר וְ/כָ֣לָה זַ֔עַם וְ/אַפִּ֖/י עַל תַּבְלִיתָֽ/ם־־׃
translation:
  text: For in just a very little while, indignation will come to an end, and my anger
    will be directed to their destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their annihilation,' 'their consumption,' or 'their end.' The Hebrew
      noun is rare, and its precise nuance is debated, though the context clearly
      points to the downfall of the oppressor(s).
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or assurance for the preceding promise; 'For' fits
    the discourse connection naturally in English.
- source_word: עוֹד
  chosen: in just
  alternatives:
  - yet
  - still
  - again
  lexicon: HALOT
  rationale: With the following time expressions, עוֹד contributes the sense of a
    remaining short duration; 'in just' captures imminent timing idiomatically.
- source_word: מְעַט מִזְעָר
  chosen: a very little while
  alternatives:
  - a little, a tiny bit
  - a very short time
  lexicon: HALOT
  rationale: The paired near-synonyms intensify brevity. Rendering as 'a very little
    while' preserves both the temporal sense and the emphatic doubling without sounding
    wooden.
- source_word: וְכָלָה
  chosen: will come to an end
  alternatives:
  - will be finished
  - will cease
  - will be completed
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions
    futurally here. 'Will come to an end' is natural English and fits the cessation
    of wrath.
- source_word: זַעַם
  chosen: indignation
  alternatives:
  - wrath
  - rage
  lexicon: HALOT
  rationale: זַעַם often denotes divine indignation. 'Indignation' preserves the elevated
    register and distinguishes it slightly from the following 'my anger' (אַפִּי),
    avoiding flattening two related but distinct terms into the same English word.
- source_word: וְאַפִּי
  chosen: and my anger
  alternatives:
  - and my wrath
  lexicon: HALOT
  rationale: אַפִּי literally 'my nose' idiomatically means 'my anger.' 'Anger' is
    the standard clear rendering and preserves the first-person possessive.
- source_word: עַל
  chosen: will be directed to
  alternatives:
  - against
  - upon
  - toward
  lexicon: HALOT
  rationale: The preposition marks the object/target of the anger. 'Will be directed
    to' makes explicit in idiomatic English how the anger relates to the following
    noun.
- source_word: תַּבְלִיתָם
  chosen: their destruction
  alternatives:
  - their annihilation
  - their consumption
  - their end
  lexicon: HALOT
  rationale: A rare noun from a root associated with completion/destruction. In context,
    referring to the fate of the oppressor(s), 'their destruction' best conveys the
    sense. Because the term is rare and somewhat uncertain, alternatives are preserved
    in a footnote.
