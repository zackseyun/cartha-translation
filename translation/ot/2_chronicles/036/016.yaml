theological_decisions:
- issue: Referent of 'messengers of God'
  chosen_reading: human prophetic messengers, not angels
  alternative_readings:
  - angels of God
  rationale: The immediate parallelism with 'his prophets' indicates that מַלְאֲכֵי
    הָאֱלֹהִים refers to God's human envoys. Rendering 'angels' would misdirect the
    reader toward heavenly beings and weaken the historical-prophetic context.
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default requires 'the LORD' for YHWH, preserving established
    reverential convention while remaining transparent in documentation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
