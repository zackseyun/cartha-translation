id: 2CH.36.16
reference: 2 Chronicles 36:16
source:
  edition: WLC
  text: וַ/יִּֽהְי֤וּ מַלְעִבִים֙ בְּ/מַלְאֲכֵ֣י הָ/אֱלֹהִ֔ים וּ/בוֹזִ֣ים דְּבָרָ֔י/ו
    וּ/מִֽתַּעְתְּעִ֖ים בִּ/נְבִאָ֑י/ו עַ֠ד עֲל֧וֹת חֲמַת יְהוָ֛ה בְּ/עַמּ֖/וֹ עַד
    לְ/אֵ֥ין מַרְפֵּֽא־־׃
translation:
  text: But they kept mocking the messengers of God, despising his words, and scoffing
    at his prophets, until the wrath of the LORD rose against his people, until there
    was no remedy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the angels of God'; here the context strongly favors 'messengers,' that
      is, God's human envoys, because the next clause speaks of 'his prophets.'
    reason: lexical_alternative
  - marker: b
    text: Or 'until there was no healing' or 'until it was beyond cure.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: they kept
  alternatives:
  - they were
  - they became
  lexicon: HALOT
  rationale: With following participles, the verb functions periphrastically to express
    ongoing or habitual action in past narrative. 'They kept' captures the durative
    force better than a simple copula.
- source_word: מַלְעִבִים
  chosen: mocking
  alternatives:
  - deriding
  - ridiculing
  lexicon: HALOT
  rationale: The participle denotes treating with contempt or mockery. 'Mocking' is
    natural modern English and fits the escalating triad of offenses.
- source_word: בְּמַלְאֲכֵי הָאֱלֹהִים
  chosen: the messengers of God
  alternatives:
  - the angels of God
  lexicon: HALOT
  rationale: מַלְאָךְ can mean either 'messenger' or 'angel,' but in this context
    it refers to human envoys parallel to 'his prophets.' 'Messengers' avoids importing
    celestial beings where the context points to prophetic representatives.
- source_word: וּבוֹזִים
  chosen: despising
  alternatives:
  - scorning
  - treating with contempt
  lexicon: HALOT
  rationale: בזה conveys contemptuous rejection. 'Despising' preserves both the emotional
    and evaluative force and pairs well with 'his words.'
- source_word: דְּבָרָיו
  chosen: his words
  alternatives:
  - his word
  - his messages
  lexicon: HALOT
  rationale: The plural with 3ms suffix is best rendered straightforwardly as 'his
    words,' referring to God's communicated utterances through his messengers.
- source_word: וּמִתַּעְתְּעִים
  chosen: scoffing at
  alternatives:
  - mocking
  - jeering at
  lexicon: HALOT
  rationale: The verb conveys derisive treatment or mocking behavior. Because 'mocking'
    already renders the first participle, 'scoffing at' provides a distinct but related
    English equivalent that preserves the rhetorical progression.
- source_word: בִּנְבִיאָיו
  chosen: his prophets
  lexicon: HALOT
  rationale: Straightforward rendering of the noun with 3ms suffix; the referent is
    God, consistent with the surrounding suffixes.
- source_word: עַד עֲלוֹת
  chosen: until ... rose
  alternatives:
  - until ... came up
  - until the rising of
  lexicon: HALOT
  rationale: The infinitive construct of עלה after עַד marks the point at which the
    situation culminated. In idiomatic English, 'until ... rose' best conveys the
    onset of divine wrath.
- source_word: חֲמַת יְהוָה
  chosen: the wrath of the LORD
  alternatives:
  - the fury of the LORD
  - the anger of the LORD
  lexicon: HALOT
  rationale: חֵמָה/חֲמָה denotes burning anger or wrath. 'Wrath' preserves the gravity
    of divine judgment. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: בְּעַמּוֹ
  chosen: against his people
  alternatives:
  - among his people
  - upon his people
  lexicon: HALOT
  rationale: With wrath, the preposition ב can indicate direction or object in context.
    'Against his people' best fits the sense of judgment falling on them.
- source_word: עַד לְאֵין מַרְפֵּא
  chosen: until there was no remedy
  alternatives:
  - until there was no healing
  - until it was beyond cure
  lexicon: HALOT
  rationale: מַרְפֵּא can denote healing or remedy. In this judgment context, 'no
    remedy' is idiomatic and preserves the finality without over-paraphrasing.
