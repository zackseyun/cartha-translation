id: 2CH.36.10
reference: 2 Chronicles 36:10
source:
  edition: WLC
  text: וְ/לִ/תְשׁוּבַ֣ת הַ/שָּׁנָ֗ה שָׁלַח֙ הַ/מֶּ֣לֶךְ נְבֽוּכַדְנֶאצַּ֔ר וַ/יְבִאֵ֣/הוּ בָבֶ֔לָ/ה עִם כְּלֵ֖י חֶמְדַּ֣ת בֵּית יְהוָ֑ה וַ/יַּמְלֵךְ֙ אֶת צִדְקִיָּ֣הוּ אָחִ֔י/ו עַל יְהוּדָ֖ה וִֽ/ירוּשָׁלִָֽם־־־־׃פ
translation:
  text: At the turn of the year, King Nebuchadnezzar sent and brought him to Babylon, along with the precious vessels of the house of Yahweh, and made his brother Zedekiah king over Judah and Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''at the return/turn of the year,'' an idiom for when the year came around.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the valuable/treasured vessels of the house of the LORD.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'his brother'; Zedekiah was Jehoiachin's close royal relative, more specifically his uncle.
    reason: cultural_note
lexical_decisions:
- source_word: וְלִתְשׁוּבַת הַשָּׁנָה
  chosen: At the turn of the year
  alternatives:
  - At the return of the year
  - When the year came around
  - In the spring of the year
  lexicon: HALOT
  rationale: The idiom literally refers to the year's turning/return. 'At the turn of the year' preserves the temporal idiom in natural English without over-specifying a season such as spring, which some contexts may imply but this wording does not require.
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard rendering of the verb. Here it introduces Nebuchadnezzar's action in having Jehoiachin seized and transported.
- source_word: וַיְבִאֵהוּ
  chosen: brought him
  alternatives:
  - brought him in
  - caused him to be brought
  lexicon: HALOT
  rationale: The Hiphil of בוא commonly means 'bring.' 'Brought him' is straightforward and idiomatic; the causative nuance is adequately conveyed by the sequence 'sent and brought him.' The pronoun refers to Jehoiachin from the previous verse.
- source_word: בָבֶלָה
  chosen: to Babylon
  alternatives:
  - Babylonward
  lexicon: HALOT
  rationale: Directional he indicates motion toward Babylon. English naturally renders this as 'to Babylon.'
- source_word: כְּלֵי חֶמְדַּת
  chosen: the precious vessels
  alternatives:
  - the desirable articles
  - the valuable vessels
  - the treasured objects
  lexicon: HALOT
  rationale: כְּלֵי are articles/vessels; חֶמְדַּת denotes desirability or preciousness. 'Precious vessels' fits temple furnishings well and preserves the sense of valued sacred objects.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' Following doctrine, יְהוָה is rendered 'the LORD.' 'House of the LORD' preserves the Hebrew expression, though 'temple' would also be understandable.
- source_word: וַיַּמְלֵךְ
  chosen: made ... king
  alternatives:
  - appointed ... king
  - set ... on the throne
  lexicon: HALOT
  rationale: The Hiphil means to cause to reign or make king. 'Made ... king' is both literal and idiomatic.
- source_word: אָחִיו
  chosen: his brother
  alternatives:
  - his kinsman
  lexicon: HALOT
  rationale: The Hebrew says 'his brother.' Although Zedekiah was Jehoiachin's uncle in a broader genealogical sense, Hebrew kinship terms can be used more broadly. The translation keeps the source wording and preserves the genealogical clarification in a footnote rather than replacing it with an interpretive gloss.
- source_word: עַל יְהוּדָה וִירוּשָׁלָם
  chosen: over Judah and Jerusalem
  alternatives:
  - over Judah and over Jerusalem
  lexicon: HALOT
  rationale: עַל marks rule over a domain. 'Judah and Jerusalem' reflects the kingdom and its capital as the sphere of Zedekiah's rule.
