id: 2CH.36.13
reference: 2 Chronicles 36:13
source:
  edition: WLC
  text: וְ֠/גַם בַּ/מֶּ֤לֶךְ נְבֽוּכַדְנֶאצַּר֙ מָרָ֔ד אֲשֶׁ֥ר הִשְׁבִּיע֖/וֹ בֵּֽ/אלֹהִ֑ים
    וַ/יֶּ֤קֶשׁ אֶת עָרְפּ/וֹ֙ וַ/יְאַמֵּ֣ץ אֶת לְבָב֔/וֹ מִ/שּׁ֕וּב אֶל יְהוָ֖ה אֱלֹהֵ֥י
    יִשְׂרָאֵֽל־־־׃
translation:
  text: He also rebelled against King Nebuchadnezzar, who had made him swear by God;
    he stiffened his neck and hardened his heart against turning to the LORD, the
    God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who had bound him by an oath before God.' The Hebrew can emphasize
      either the act of making him swear or the solemn setting of the oath in relation
      to God.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''stiffened his neck,'' a figure for stubborn resistance.'
    reason: cultural_note
lexical_decisions:
- source_word: וְגַם
  chosen: He also
  alternatives:
  - And also
  - Also
  lexicon: HALOT
  rationale: Carries forward the narrative with an additive sense. Rendering with
    explicit subject in English produces natural readability while preserving the
    additive force.
- source_word: בַּמֶּלֶךְ נְבוּכַדְנֶאצַּר
  chosen: against King Nebuchadnezzar
  alternatives:
  - against the king, Nebuchadnezzar
  - against Nebuchadnezzar the king
  lexicon: HALOT
  rationale: With מָרַד, the preposition ב marks the ruler against whom rebellion
    is directed. 'King Nebuchadnezzar' is idiomatic English and preserves the political
    sense.
- source_word: מָרָד
  chosen: rebelled
  alternatives:
  - revolted
  lexicon: HALOT
  rationale: Standard rendering for political rebellion; 'rebelled' is the clearest
    modern equivalent.
- source_word: אֲשֶׁר הִשְׁבִּיעוֹ בֵאלֹהִים
  chosen: who had made him swear by God
  alternatives:
  - whom he had put under oath by God
  - who had bound him by an oath before God
  lexicon: HALOT
  rationale: The Hiphil of שׁבע means to cause someone to swear, administer an oath.
    The subject is Nebuchadnezzar, matching the relative clause. 'By God' reflects
    בֵאלֹהִים straightforwardly without overinterpreting as 'before God,' though that
    nuance is possible.
- source_word: וַיֶּקֶשׁ אֶת עָרְפּוֹ
  chosen: he stiffened his neck
  alternatives:
  - he made his neck stiff
  - he became stiff-necked
  lexicon: HALOT
  rationale: This is a Hebrew idiom for obstinacy. A relatively literal rendering
    preserves the metaphor and its biblical resonance.
- source_word: וַיְאַמֵּץ אֶת לְבָבוֹ
  chosen: hardened his heart
  alternatives:
  - strengthened his heart
  - made his heart stubborn
  lexicon: HALOT
  rationale: Although the verb can mean 'strengthen,' in this context of refusal to
    repent it denotes obstinate hardening. 'Hardened his heart' communicates the moral-spiritual
    sense in natural English.
- source_word: מִשּׁוּב
  chosen: against turning
  alternatives:
  - from turning
  - so that he would not turn
  - instead of turning back
  lexicon: HALOT
  rationale: The preposition מִן with infinitive can express prevention or separation.
    In context, his hardened heart is set in resistance to repentance, so 'against
    turning' captures the sense well in English.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'To' preserves the directional
    sense of repentance/return.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard construct rendering, preserving covenantal identification.
