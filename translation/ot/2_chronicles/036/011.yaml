id: 2CH.36.11
reference: 2 Chronicles 36:11
source:
  edition: WLC
  text: בֶּן עֶשְׂרִ֧ים וְ/אַחַ֛ת שָׁנָ֖ה צִדְקִיָּ֣הוּ בְ/מָלְכ֑/וֹ וְ/אַחַ֤ת עֶשְׂרֵה֙
    שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָֽם־׃
translation:
  text: Zedekiah was twenty-one years old when he became king, and he reigned eleven
    years in Jerusalem.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן
  chosen: was ... years old
  alternatives:
  - son of
  lexicon: HALOT
  rationale: In age formulas, בֶּן + number idiomatically means 'X years old,' not
    literal filiation. English requires restructuring to express the idiom naturally.
- source_word: עֶשְׂרִים וְאַחַת שָׁנָה
  chosen: twenty-one years old
  alternatives:
  - a son of twenty-one years
  lexicon: HALOT
  rationale: This is the standard Hebrew age expression. 'Twenty-one years old' is
    the clear and idiomatic English equivalent.
- source_word: צִדְקִיָּהוּ
  chosen: Zedekiah
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: בְמָלְכוֹ
  chosen: when he became king
  alternatives:
  - in his reigning
  - when he began to reign
  lexicon: HALOT
  rationale: The preposition ב plus infinitive/verb-noun construction marks the time
    of accession. 'When he became king' is natural modern English and accurately conveys
    the temporal sense.
- source_word: וְאַחַת עֶשְׂרֵה שָׁנָה
  chosen: eleven years
  lexicon: HALOT
  rationale: Straightforward cardinal number plus 'years' indicating the duration
    of his reign.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  - he ruled as king
  lexicon: HALOT
  rationale: The verb specifically denotes royal reign. 'He reigned' is the standard
    concise English equivalent.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  rationale: Locative preposition with place name; standard rendering.
