id: 2CH.36.22
reference: 2 Chronicles 36:22
source:
  edition: WLC
  text: וּ/בִ/שְׁנַ֣ת אַחַ֗ת לְ/כ֨וֹרֶשׁ֙ מֶ֣לֶךְ פָּרַ֔ס לִ/כְל֥וֹת דְּבַר יְהוָ֖ה
    בְּ/פִ֣י יִרְמְיָ֑הוּ הֵעִ֣יר יְהוָ֗ה אֶת ר֨וּחַ֙ כּ֣וֹרֶשׁ מֶֽלֶךְ פָּרַ֔ס וַ/יַּֽעֲבֶר
    קוֹל֙ בְּ/כָל מַלְכוּת֔/וֹ וְ/גַם בְּ/מִכְתָּ֖ב לֵ/אמֹֽר־־־־־־׃ס
translation:
  text: 'Now in the first year of Cyrus king of Persia, so that the word of the LORD
    by the mouth of Jeremiah might be fulfilled, the LORD stirred up the spirit of
    Cyrus king of Persia, and he sent a proclamation throughout all his kingdom, and
    also in writing, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through Jeremiah'; Hebrew literally, 'by the mouth of Jeremiah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בִ/שְׁנַת אַחַת
  chosen: Now in the first year
  alternatives:
  - And in the first year
  - In the first year
  lexicon: HALOT
  rationale: The phrase is temporal. Rendering the prefixed conjunction with 'Now'
    gives natural English narrative transition while preserving the sequential force
    of waw.
- source_word: לְ/כ֨וֹרֶשׁ מֶ֣לֶךְ פָּרַ֔ס
  chosen: of Cyrus king of Persia
  alternatives:
  - of Cyrus, king of Persia
  lexicon: HALOT
  rationale: Standard genitival dating formula with appositional royal title; transliterates
    the personal name and translates the title.
- source_word: לִ/כְל֥וֹת
  chosen: so that ... might be fulfilled
  alternatives:
  - to complete
  - to bring to an end
  lexicon: HALOT
  rationale: In context with 'the word of the LORD,' the infinitive expresses purpose/result
    tied to fulfillment of prophecy, not mere termination. 'Fulfilled' best captures
    idiomatic prophetic completion in English.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Conventional and accurate rendering for prophetic speech; 'word' preserves
    the theological weight of divine utterance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's mandated default for the divine name.
- source_word: בְּ/פִי יִרְמְיָהוּ
  chosen: by the mouth of Jeremiah
  alternatives:
  - through Jeremiah
  - by Jeremiah
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'by the mouth of.' Retaining 'by the mouth
    of' preserves the prophetic mediation imagery while remaining intelligible in
    English.
- source_word: הֵעִיר
  chosen: stirred up
  alternatives:
  - awakened
  - roused
  lexicon: HALOT
  rationale: This verb commonly denotes arousing or inciting. 'Stirred up' is idiomatic
    in English and fits divine prompting of a ruler's inner disposition.
- source_word: אֶת רוּחַ כּוֹרֶשׁ
  chosen: the spirit of Cyrus
  alternatives:
  - the mind of Cyrus
  - the inner spirit of Cyrus
  lexicon: HALOT
  rationale: רוּחַ here refers to Cyrus's inner disposition or motivating spirit.
    'Spirit' preserves the lexical form and theological resonance without over-interpreting
    as merely psychological.
- source_word: וַ/יַּֽעֲבֶר קוֹל
  chosen: he sent a proclamation
  alternatives:
  - he caused a voice to pass
  - he made a proclamation
  lexicon: HALOT
  rationale: The idiom literally means causing a voice/proclamation to circulate.
    'Sent a proclamation' is natural modern English that preserves the public heralding
    sense.
- source_word: בְּ/כָל מַלְכוּת/וֹ
  chosen: throughout all his kingdom
  alternatives:
  - through all his kingdom
  - in all his kingdom
  lexicon: HALOT
  rationale: Captures the distributive scope of the proclamation across the realm.
- source_word: וְ/גַם בְּ/מִכְתָּב
  chosen: and also in writing
  alternatives:
  - and also by letter
  - and in a written document as well
  lexicon: HALOT
  rationale: מִכְתָּב denotes written form/document. 'In writing' is concise and idiomatic,
    preserving the contrast with oral proclamation.
- source_word: לֵ/אמֹר
  chosen: 'saying:'
  alternatives:
  - 'as follows:'
  lexicon: HALOT
  rationale: Standard introduction to direct discourse; a colon prepares for the quoted
    decree in the next verse.
