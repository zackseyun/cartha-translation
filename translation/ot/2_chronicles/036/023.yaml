  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/weighted_vocab/ot/2_chronicles/036/023.job-11347.json
  category: awkward_english
  tier: 1
  from: Whoever among you is from all his people
  to: Whoever is among you of all his people
  rationale: The current rendering of the Hebrew phrase 'מִי בָכֶם מִכָּל עַמּוֹ' is unidiomatic. The preposition 'from' combined with 'all his people' creates an awkward sense of originating from the entire collective. The Hebrew 'מִן' is partitive here, better rendered as 'of' or 'from among'. The suggested rewrite, 'Whoever is among you of all his people,' correctly parses the Hebrew syntax ('Who is among you' + 'of all his people') and uses more natural English to convey membership in the group, aligning with the rendering in most major English versions.
