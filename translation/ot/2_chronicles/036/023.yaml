theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to render בַיִת as 'house' or 'temple'
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: The Hebrew says 'house,' and the translation philosophy prefers preserving source-language wording unless context plainly demands a more interpretive rendering. Since readers can understand 'house' as temple in this context, the more literal term is retained.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Force of יְהוָה אֱלֹהָיו עִמּוֹ
  chosen_reading: 'benedictory/jussive: ''may Yahweh his God be with him'''
  alternative_readings:
  - 'indicative: ''the LORD his God is with him'''
  rationale: In the closing invitation formula, the phrase functions naturally as a blessing or wish accompanying the call to return. English expresses this best with 'may ... be with him.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
