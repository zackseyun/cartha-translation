id: 2CH.36.23
reference: 2 Chronicles 36:23
source:
  edition: WLC
  text: כֹּה אָמַ֞ר כּ֣וֹרֶשׁ מֶ֣לֶךְ פָּרַ֗ס כָּל מַמְלְכ֤וֹת הָ/אָ֨רֶץ֙ נָ֣תַן לִ֗/י יְהוָה֙ אֱלֹהֵ֣י הַ/שָּׁמַ֔יִם וְ/הֽוּא פָקַ֤ד עָלַ/י֙ לִ/בְנֽוֹת ל֣/וֹ בַ֔יִת בִּ/ירוּשָׁלִַ֖ם אֲשֶׁ֣ר בִּֽ/יהוּדָ֑ה מִֽי בָ/כֶ֣ם מִ/כָּל עַמּ֗/וֹ יְהוָ֧ה אֱלֹהָ֛י/ו עִמּ֖/וֹ וְ/יָֽעַל־׀־־־־־׃
translation:
  text: 'Thus says Cyrus king of Persia: Yahweh, the God of heaven, has given me all the kingdoms of the earth, and he has charged me to build for him a house in Jerusalem, which is in Judah. Whoever is among you of all his people, may Yahweh his God be with him, and let him go up.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, 'Whoever among you belongs to any of his people.' The Hebrew expression is compressed and can be represented in more than one close English form.
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD his God is with him.' The Hebrew can be read as an indicative statement, though the context favors a benedictory sense.
    reason: alternative_reading
  - marker: c
    text: That is, go up to Jerusalem; 'go up' is the conventional biblical idiom for ascent to the holy city.
    reason: cultural_note
  - marker: d
    text: Or 'Whoever among you is from all his people'.
    reason: previous_rendering
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Standard prophetic/messenger formula. Present-tense English ('says') is idiomatic for royal proclamation formulas, even with Hebrew qatal אָמַר.
- source_word: כּוֹרֶשׁ מֶלֶךְ פָּרַס
  chosen: Cyrus king of Persia
  alternatives:
  - Koresh king of Persia
  - Cyrus, king of Persia
  lexicon: HALOT
  rationale: Personal name is transliterated by standard English convention; appositional royal title is kept straightforwardly.
- source_word: כָּל מַמְלְכוֹת הָאָרֶץ
  chosen: all the kingdoms of the earth
  alternatives:
  - all the kingdoms of the land
  - all the kingdoms of the world
  lexicon: HALOT
  rationale: אָרֶץ here is best taken in the broad geopolitical sense, not merely 'land' of Judah. 'World' would be more idiomatic but slightly more interpretive than the Hebrew.
- source_word: נָתַן לִי
  chosen: has given me
  alternatives:
  - gave me
  - has granted me
  lexicon: HALOT
  rationale: 'Present perfect fits the proclamation context: Cyrus speaks of a present possession resulting from prior divine action.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: אֱלֹהֵי הַשָּׁמַיִם
  chosen: the God of heaven
  alternatives:
  - God of the heavens
  - the heavenly God
  lexicon: HALOT
  rationale: Conventional and accurate rendering of the construct phrase; singular 'heaven' is standard English for the Hebrew plural in this idiom.
- source_word: וְהוּא פָקַד עָלַי
  chosen: and he has charged me
  alternatives:
  - and he has appointed me
  - and he has commanded me
  - and he has commissioned me
  lexicon: HALOT
  rationale: פָקַד in this context conveys entrusting/commissioning a task. 'Charged' preserves both authority and assignment without over-specifying office.
- source_word: לִבְנוֹת לוֹ בַיִת
  chosen: to build for him a house
  alternatives:
  - to build him a house
  - to build for him a temple
  lexicon: HALOT
  rationale: בַיִת literally means 'house.' Since this refers to the temple, 'temple' is a viable dynamic option, but 'house' better preserves the Hebrew wording and theological resonance of God's house.
- source_word: בִּירוּשָׁלִַם אֲשֶׁר בִּיהוּדָה
  chosen: in Jerusalem, which is in Judah
  alternatives:
  - in Jerusalem that is in Judah
  - in Jerusalem in Judah
  lexicon: HALOT
  rationale: Retains the relative clause explicitly present in Hebrew rather than compressing it away.
- source_word: מִי בָכֶם מִכָּל עַמּוֹ
  chosen: Whoever among you is from all his people
  alternatives:
  - Who among you from all his people
  - Whoever among you belongs to all his people
  - Any of you from among all his people
  lexicon: HALOT
  rationale: The Hebrew is somewhat compressed. 'Whoever among you is from all his people' preserves the sense that any member of the LORD's people present may respond. A smoother English alternative is possible, but this wording stays close to the source.
- source_word: יְהוָה אֱלֹהָיו עִמּוֹ
  chosen: may the LORD his God be with him
  alternatives:
  - the LORD his God is with him
  - the LORD his God be with him
  lexicon: HALOT
  rationale: This is best taken as a benedictory wish in context, not a flat indicative statement. 'May ... be with him' reflects the volitional force naturally carried into English.
- source_word: וְיָעַל
  chosen: and let him go up
  alternatives:
  - and may he go up
  - and he shall go up
  lexicon: HALOT
  rationale: עלה is the standard verb for ascending to Jerusalem. Jussive-like force in context is well represented by 'let him go up.'
