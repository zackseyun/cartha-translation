id: 2CH.36.18
reference: 2 Chronicles 36:18
source:
  edition: WLC
  text: וְ֠/כֹל כְּלֵ֞י בֵּ֤ית הָ/אֱלֹהִים֙ הַ/גְּדֹלִ֣ים וְ/הַ/קְּטַנִּ֔ים וְ/אֹֽצְרוֹת֙
    בֵּ֣ית יְהוָ֔ה וְ/אֹצְר֥וֹת הַ/מֶּ֖לֶךְ וְ/שָׂרָ֑י/ו הַ/כֹּ֖ל הֵבִ֥יא בָבֶֽל׃
translation:
  text: And all the vessels of the house of God, great and small, and the treasures
    of the house of the LORD, and the treasures of the king and of his officials—all
    this he brought to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the treasures''; the term can also mean ''treasuries'' or ''storehouses.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'the treasures of the king and his princes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  chosen: And all
  alternatives:
  - And every
  lexicon: HALOT
  rationale: Introduces the sentence and marks comprehensiveness. 'All' fits the collective
    sense better in this inventory context than 'every.'
- source_word: כְּלֵי
  chosen: vessels
  alternatives:
  - articles
  - utensils
  - objects
  lexicon: HALOT
  rationale: In temple-plunder contexts, כְּלִי commonly refers to cultic implements
    or items. 'Vessels' is natural biblical English and broad enough to include various
    temple objects without over-specifying.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew idiom. 'Temple of
    God' would be interpretive; 'house of God' stays closer to the source while remaining
    clear.
- source_word: הַגְּדֹלִים וְהַקְּטַנִּים
  chosen: great and small
  alternatives:
  - large and small
  lexicon: HALOT
  rationale: This idiomatic pair denotes items of every size or importance. 'Great
    and small' preserves the cadence and breadth of the Hebrew expression.
- source_word: וְאֹצְרוֹת
  chosen: and the treasures
  alternatives:
  - and the treasuries
  lexicon: HALOT
  rationale: The noun can denote storehouses or the valuables stored in them. Here,
    because these are items carried away to Babylon, 'treasures' better fits the transported
    contents rather than the physical chambers.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the house of Yahweh
  - the temple of the LORD
  lexicon: HALOT
  rationale: '''House of the LORD'' closely reflects the Hebrew. Per doctrine, יְהוָה
    is rendered ''the LORD'' rather than ''Yahweh'' in the main text.'
- source_word: וְאֹצְרוֹת הַמֶּלֶךְ וְשָׂרָיו
  chosen: and the treasures of the king and of his officials
  alternatives:
  - and the treasures of the king and his princes
  - and the treasuries of the king and his officials
  lexicon: HALOT
  rationale: שָׂרִים refers broadly to rulers, officers, or officials. 'Officials'
    is clear modern English and avoids the narrower or more aristocratic nuance of
    'princes.' Repeating 'of' in English improves readability.
- source_word: הַכֹּל
  chosen: all this
  alternatives:
  - all of it
  - the whole of it
  lexicon: HALOT
  rationale: This resumptive expression gathers the preceding list into a single totality.
    'All this' is idiomatic and points back to the enumerated items.
- source_word: הֵבִיא
  chosen: he brought
  alternatives:
  - he carried
  - he took
  lexicon: HALOT
  rationale: The singular verb likely has Nebuchadnezzar as the implied subject from
    the context. 'Brought' is the standard sense of the verb and works naturally with
    the destination 'to Babylon.'
- source_word: בָבֶל
  chosen: Babylon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
