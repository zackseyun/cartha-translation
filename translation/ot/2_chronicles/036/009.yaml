id: 2CH.36.9
reference: 2 Chronicles 36:9
source:
  edition: WLC
  text: בֶּן שְׁמוֹנֶ֤ה שָׁנִים֙ יְהוֹיָכִ֣ין בְּ/מָלְכ֔/וֹ וּ/שְׁלֹשָׁ֤ה חֳדָשִׁים֙ וַ/עֲשֶׂ֣רֶת יָמִ֔ים מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֥י יְהוָֽה־׃
translation:
  text: Jehoiachin was eight years old when he began to reign, and he reigned three months and ten days in Jerusalem. He did what was evil in the sight of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 2 Kings 24:8 reads 'eighteen years old' instead of 'eight years old.'
    reason: textual_variant
lexical_decisions:
- source_word: בֶּן שְׁמוֹנֶה שָׁנִים
  chosen: was eight years old
  alternatives:
  - was a son of eight years
  lexicon: HALOT
  rationale: Hebrew age idiom literally 'a son of eight years'; idiomatic English is 'was eight years old.'
- source_word: יְהוֹיָכִין
  chosen: Jehoiachin
  rationale: Personal names are transliterated by standard English convention.
- source_word: בְּמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - when he became king
  - in his reigning
  lexicon: HALOT
  rationale: The infinitive/verb construction with ב marks the time of accession; 'when he began to reign' is natural English and fits the regnal formula.
- source_word: וּשְׁלֹשָׁה חֳדָשִׁים וַעֲשֶׂרֶת יָמִים
  chosen: three months and ten days
  alternatives:
  - three months, and ten days
  lexicon: HALOT
  rationale: Straightforward rendering of the duration of reign; English omits unnecessary repetition.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: Standard rendering of מלך in regnal notices.
- source_word: בִּירוּשָׁלָם
  chosen: in Jerusalem
  rationale: Locative preposition rendered directly.
- source_word: וַיַּעַשׂ הָרַע
  chosen: He did what was evil
  alternatives:
  - He did evil
  - He acted wickedly
  lexicon: HALOT
  rationale: Common Deuteronomistic/Chronistic idiom. 'Did what was evil' preserves the Hebrew article and idiomatic force in readable English.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the sight of the LORD
  alternatives:
  - in the eyes of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: Idiomatic expression for divine evaluation. 'In the sight of' is natural English and preserves the metaphor.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
