theological_decisions:
- issue: Chronological tension with 2 Kings 24:8, which states Jehoiachin was eighteen years old at accession
  chosen_reading: Retain the Masoretic wording 'eight years old' in the main text
  alternative_readings:
  - eighteen years old
  rationale: The provided source text reads 'eight years.' Translation should reflect the source text rather than harmonize with a parallel passage. Because the discrepancy is significant and a well-known textual issue, the alternative is preserved in a footnote rather than silently resolved.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition) and §3 (Preserve theological tension rather than resolve it)
