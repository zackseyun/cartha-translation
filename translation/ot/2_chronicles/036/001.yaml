id: 2CH.36.1
reference: 2 Chronicles 36:1
source:
  edition: WLC
  text: וַ/יִּקְחוּ֙ עַם הָ/אָ֔רֶץ אֶת יְהוֹאָחָ֖ז בֶּן יֹאשִׁיָּ֑הוּ וַ/יַּמְלִיכֻ֥/הוּ
    תַֽחַת אָבִ֖י/ו בִּ/ירוּשָׁלִָֽם־־־־׃
translation:
  text: Then the people of the land took Jehoahaz son of Josiah and made him king
    in Jerusalem in place of his father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the common people.' The Hebrew expression 'the people of the land' can
      denote the populace of the land and, in some contexts, a particular social group
      within it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: took
  alternatives:
  - seized
  - took up
  lexicon: HALOT
  rationale: The verb לקח in this narrative context most naturally means 'took' in
    the sense of selecting or taking hold of a person for an action. 'Seized' would
    overstate coercion, which the verse itself does not specify.
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the common people
  - the people of the country
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew expression and avoids
    prematurely narrowing it to a social class. In context it refers to the populace
    of the land, but 'the people of the land' is both natural and transparent.
- source_word: יְהוֹאָחָז
  chosen: Jehoahaz
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: בֶּן יֹאשִׁיָּהוּ
  chosen: son of Josiah
  rationale: A direct genealogical rendering is straightforward and idiomatic in English.
- source_word: וַיַּמְלִיכֻהוּ
  chosen: made him king
  alternatives:
  - crowned him king
  - caused him to reign
  lexicon: HALOT
  rationale: The Hiphil of מלך means to make someone king or cause him to reign. 'Made
    him king' is clear modern English and closely reflects the causative sense. 'Crowned
    him' adds ceremonial detail not stated in the Hebrew.
- source_word: תַּחַת אָבִיו
  chosen: in place of his father
  alternatives:
  - instead of his father
  - under his father
  lexicon: HALOT
  rationale: תחת here marks succession or replacement, not spatial subordination.
    'In place of his father' best conveys royal succession after Josiah.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  rationale: The preposition ב plus place name is naturally rendered 'in Jerusalem.'
    Its placement in English is adjusted for readability while preserving the sense.
