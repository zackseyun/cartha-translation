id: 2CH.36.6
reference: 2 Chronicles 36:6
source:
  edition: WLC
  text: עָלָ֣י/ו עָלָ֔ה נְבוּכַדְנֶאצַּ֖ר מֶ֣לֶךְ בָּבֶ֑ל וַ/יַּֽאַסְרֵ֨/הוּ֙ בַּֽ/נְחֻשְׁתַּ֔יִם
    לְ/הֹלִיכ֖/וֹ בָּבֶֽלָ/ה׃
translation:
  text: Nebuchadnezzar king of Babylon came up against him and bound him with bronze
    chains to take him to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with bronze fetters' or 'with bronze shackles.' The Hebrew refers to
      bronze restraints placed on him.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָיו עָלָה
  chosen: came up against him
  alternatives:
  - came up on him
  - marched against him
  - attacked him
  lexicon: HALOT
  rationale: The idiom עָלָה עַל in military contexts commonly means to advance against
    or come up against an opponent. 'Came up against him' preserves the directional
    imagery while communicating hostile action without overstating it as a full attack.
- source_word: נְבוּכַדְנֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  rationale: Personal names are transliterated by standard English convention. 'Nebuchadnezzar'
    is the familiar and widely recognized English form for this king's name.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  alternatives:
  - the king of Babylon
  rationale: The construct phrase identifies Nebuchadnezzar's royal title. The article
    is not required in English apposition after the proper name, so 'Nebuchadnezzar
    king of Babylon' is natural and sufficiently formal.
- source_word: וַיַּאַסְרֵהוּ
  chosen: bound him
  alternatives:
  - imprisoned him
  - fettered him
  lexicon: HALOT
  rationale: אָסַר means to bind or tie, often of prisoners. 'Bound him' is the most
    direct rendering and fits the following instrument phrase about bronze restraints.
- source_word: בַּנְחֻשְׁתַּיִם
  chosen: with bronze chains
  alternatives:
  - with bronze fetters
  - with bronze shackles
  - in bronze chains
  lexicon: HALOT
  rationale: The dual/plural form refers to bronze restraints. 'Bronze chains' is
    clear modern English and avoids the archaic feel of 'fetters' while still conveying
    physical restraint. 'Bronze' is preferred over 'brass' as the more accurate ancient
    metal term.
- source_word: לְהֹלִיכוֹ
  chosen: to take him
  alternatives:
  - to bring him
  - to lead him away
  lexicon: HALOT
  rationale: The Hiphil of הלך here expresses causing someone to go, in context as
    deportation. 'To take him' is idiomatic English for transporting a captive and
    reads naturally with the destination phrase.
- source_word: בָּבֶלָה
  chosen: to Babylon
  alternatives:
  - toward Babylon
  - into Babylon
  rationale: The directional he indicates movement toward Babylon. 'To Babylon' is
    the standard concise English rendering of the destination.
