id: 2CH.36.17
reference: 2 Chronicles 36:17
source:
  edition: WLC
  text: וַ/יַּ֨עַל עֲלֵי/הֶ֜ם אֶת מֶ֣לֶךְ כשדיים וַ/יַּהֲרֹ֨ג בַּחוּרֵי/הֶ֤ם בַּ/חֶ֨רֶב֙
    בְּ/בֵ֣ית מִקְדָּשָׁ֔/ם וְ/לֹ֥א חָמַ֛ל עַל בָּח֥וּר וּ/בְתוּלָ֖ה זָקֵ֣ן וְ/יָשֵׁ֑שׁ
    הַ/כֹּ֖ל נָתַ֥ן בְּ/יָדֽ/וֹ־־׃
translation:
  text: So he brought up against them the king of the Chaldeans, who killed their
    young men with the sword in the house of their sanctuary, and had no compassion
    on young man or virgin, old man or aged man. He gave all of them into his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king of the Babylonians'; Hebrew 'Chaldeans.'
    reason: lexical_alternative
  - marker: b
    text: Or 'did not spare.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'virgin,' specifically a young unmarried woman.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: he brought up against
  alternatives:
  - he brought against
  - he caused to come up against
  lexicon: HALOT
  rationale: The Hiphil of עלה with עַל can mean to bring up or cause to come against
    in military context. 'Brought up against' preserves the causative nuance while
    remaining natural English. The subject is God from the prior context, so 'he'
    refers back to him.
- source_word: מֶלֶךְ כשדיים
  chosen: the king of the Chaldeans
  alternatives:
  - the king of the Babylonians
  lexicon: HALOT
  rationale: כשדים is literally 'Chaldeans.' Although it can refer to Babylonians
    more broadly, the Hebrew term here is best represented directly as 'Chaldeans,'
    with 'Babylonians' preserved as an understandable alternative.
- source_word: וַיַּהֲרֹג
  chosen: who killed
  alternatives:
  - and he killed
  - slaughtered
  lexicon: HALOT
  rationale: The verb means 'killed/slain.' Rendering with a relative clause in English
    links naturally to 'the king of the Chaldeans' without changing the sense.
- source_word: בַּחוּרֵיהֶם
  chosen: their young men
  alternatives:
  - their choice young men
  - their youths
  lexicon: HALOT
  rationale: בחור commonly denotes a young man in the prime of life. 'Young men' is
    clear and natural.
- source_word: בַּחֶרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: Standard idiom for death by weapon; 'with the sword' is slightly more
    concrete while preserving the Hebrew instrumental phrase.
- source_word: בְּבֵית מִקְדָּשָׁם
  chosen: in the house of their sanctuary
  alternatives:
  - in their sanctuary house
  - in their temple
  lexicon: HALOT
  rationale: Literally 'in the house of their sanctuary.' This preserves the Hebrew
    wording and the sacrilege of the location. 'Temple' is possible but less formally
    tied to the source expression.
- source_word: וְלֹא חָמַל
  chosen: had no compassion
  alternatives:
  - did not spare
  - showed no pity
  lexicon: HALOT
  rationale: חמל conveys sparing out of pity or compassion. 'Had no compassion' captures
    the emotional and moral force; 'did not spare' is a viable alternative.
- source_word: בָּחוּר וּבְתוּלָה
  chosen: young man or virgin
  alternatives:
  - young man or young woman
  lexicon: HALOT
  rationale: בחור is 'young man'; בתולה is specifically 'virgin,' not merely 'young
    woman.' Gender-accurate translation is preferred by the project philosophy.
- source_word: זָקֵן וְיָשֵׁשׁ
  chosen: old man or aged man
  alternatives:
  - elder or very old man
  - old or infirm
  lexicon: HALOT
  rationale: The pair likely intensifies age categories. Rendering both terms distinctly
    preserves the Hebrew's rhetorical fullness, even if English overlap remains.
- source_word: הַכֹּל נָתַן בְּיָדוֹ
  chosen: He gave all of them into his hand
  alternatives:
  - He gave everything into his hand
  - He delivered them all into his hand
  lexicon: HALOT
  rationale: The phrase means to hand over into someone's power. Given the immediate
    human objects in context, 'all of them' best conveys the referent, while 'into
    his hand' preserves the idiom.
