id: 2CH.36.8
reference: 2 Chronicles 36:8
source:
  edition: WLC
  text: וְ/יֶתֶר֩ דִּבְרֵ֨י יְהֽוֹיָקִ֜ים וְ/תֹֽעֲבֹתָ֤י/ו אֲשֶׁר עָשָׂה֙ וְ/הַ/נִּמְצָ֣א
    עָלָ֔י/ו הִנָּ֣/ם כְּתוּבִ֗ים עַל סֵ֛פֶר מַלְכֵ֥י יִשְׂרָאֵ֖ל וִֽ/יהוּדָ֑ה וַ/יִּמְלֹ֛ךְ
    יְהוֹיָכִ֥ין בְּנ֖/וֹ תַּחְתָּֽי/ו־־׃פ
translation:
  text: Now the rest of the acts of Jehoiakim, and his abominations that he did, and
    what was found against him—behold, they are written in the Book of the Kings of
    Israel and Judah. And Jehoiachin his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what was found concerning him.' The Hebrew expression may refer generally
      to matters discovered about Jehoiakim, though 'against him' best fits the negative
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר introduces the remaining matters concerning a person or reign.
    'Now the rest of' is idiomatic in English historiographic style and preserves
    the transitional force of the prefixed conjunction.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: Though literally 'words/matters,' in royal-summary formulas דִּבְרֵי
    commonly refers broadly to the events or acts of a reign. 'Acts' fits the chronicler's
    source-citation formula in natural English.
- source_word: תֹּעֲבֹתָיו
  chosen: his abominations
  alternatives:
  - his detestable acts
  - his abominable deeds
  lexicon: HALOT
  rationale: The noun denotes things that are abhorrent or detestable, often with
    moral or cultic weight. 'Abominations' preserves that strong evaluative force
    and matches biblical usage.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he did
  alternatives:
  - which he committed
  - that he performed
  lexicon: HALOT
  rationale: A straightforward relative clause modifying 'abominations.' 'That he
    did' is simple and close to the Hebrew.
- source_word: וְהַנִּמְצָא עָלָיו
  chosen: and what was found against him
  alternatives:
  - and what was found concerning him
  - and the charges found against him
  lexicon: HALOT
  rationale: The passive participle with עַל likely refers to incriminating matters
    discovered regarding Jehoiakim. 'Against him' best conveys the adverse sense without
    over-specifying legal terminology.
- source_word: הִנָּם
  chosen: behold, they are
  alternatives:
  - indeed they are
  - see, they are
  lexicon: HALOT
  rationale: The particle draws attention to the written source. 'Behold' preserves
    the deictic emphasis, though slightly formal; it suits the elevated narrative
    register.
- source_word: כְּתוּבִים
  chosen: written
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: The passive participle means 'written' and introduces the source reference.
    'Written' is the most direct rendering.
- source_word: סֵפֶר מַלְכֵי יִשְׂרָאֵל וִיהוּדָה
  chosen: the Book of the Kings of Israel and Judah
  alternatives:
  - the book of the kings of Israel and Judah
  lexicon: HALOT
  rationale: This is a title-like source citation. Capitalizing 'Book' reflects its
    function as a named record, while preserving the Hebrew wording.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: The wayyiqtol advances the narrative with the accession notice. 'Reigned'
    is concise and standard in English royal formulas.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - in place of him
  lexicon: HALOT
  rationale: The preposition indicates succession. 'In his place' is idiomatic English
    for royal replacement and avoids ambiguity.
