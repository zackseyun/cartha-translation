id: 2CH.36.5
reference: 2 Chronicles 36:5
source:
  edition: WLC
  text: בֶּן עֶשְׂרִ֨ים וְ/חָמֵ֤שׁ שָׁנָה֙ יְהוֹיָקִ֣ים בְּ/מָלְכ֔/וֹ וְ/אַחַ֤ת עֶשְׂרֵה֙ שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וַ/יַּ֣עַשׂ הָ/רַ֔ע בְּ/עֵינֵ֖י יְהוָ֥ה אֱלֹהָֽי/ו־׃
translation:
  text: Jehoiakim was twenty-five years old when he became king, and he reigned eleven years in Jerusalem. He did what was evil in the eyes of Yahweh his God.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְחָמֵשׁ שָׁנָה
  chosen: was twenty-five years old
  alternatives:
  - was a son of twenty-five years
  lexicon: HALOT
  rationale: This is the standard Hebrew age idiom. A natural English rendering communicates the sense without woodenly preserving 'son of.'
- source_word: יְהוֹיָקִים
  chosen: Jehoiakim
  rationale: Personal names are transliterated by standard English convention per project philosophy.
- source_word: בְּמָלְכוֹ
  chosen: when he became king
  alternatives:
  - at his becoming king
  - when he began to reign
  lexicon: HALOT
  rationale: The infinitive/construct-like expression with prefixed ב marks the time of accession. 'When he became king' is idiomatic modern English and fits the accession formula.
- source_word: וְאַחַת עֶשְׂרֵה שָׁנָה מָלַךְ
  chosen: and he reigned eleven years
  alternatives:
  - and he was king eleven years
  lexicon: HALOT
  rationale: מָלַךְ means 'to reign, be king.' 'Reigned' is the standard and clearest English rendering in regnal notices.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  rationale: Straightforward locative phrase indicating the place of his reign.
- source_word: וַיַּעַשׂ הָרַע
  chosen: He did what was evil
  alternatives:
  - He did evil
  - He did the evil
  lexicon: HALOT
  rationale: The idiom means to act wickedly. 'Did what was evil' preserves the verbal force and the evaluative sense in natural English.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This common Hebrew idiom expresses evaluation from someone's perspective. 'In the eyes of' is transparent and close to the source.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהָיו
  chosen: his God
  lexicon: HALOT
  rationale: 'The suffix is third masculine singular, referring to Jehoiakim. The phrase underscores covenant accountability: the LORD, his God.'
