id: 2CH.36.12
reference: 2 Chronicles 36:12
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ הָ/רַ֔ע בְּ/עֵינֵ֖י יְהוָ֣ה אֱלֹהָ֑י/ו לֹ֣א נִכְנַ֗ע מִ/לִּ/פְנֵ֛י
    יִרְמְיָ֥הוּ הַ/נָּבִ֖יא מִ/פִּ֥י יְהוָֽה׃
translation:
  text: He did what was evil in the eyes of the LORD his God, and he did not humble
    himself before Jeremiah the prophet, who spoke from the mouth of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from the mouth of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. English normally omits repeated
    initial 'and' for readability, while 'he did' preserves the verbal action straightforwardly.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - the evil
  - evil
  lexicon: HALOT
  rationale: The idiom עשה הרע commonly means 'do what is evil' rather than the more
    wooden 'do the evil.' This preserves the established Hebrew evaluative formula
    in natural English.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for evaluation from someone's perspective.
    'In the eyes of' is transparent and close to the source.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: אֱלֹהָיו
  chosen: his God
  lexicon: HALOT
  rationale: 'The pronominal suffix is significant: the text identifies the LORD specifically
    as his God, heightening covenant accountability.'
- source_word: לֹא נִכְנַע
  chosen: he did not humble himself
  alternatives:
  - he was not humbled
  - he did not submit himself
  lexicon: HALOT
  rationale: 'The Niphal of כנע here is best taken reflexively/middle in context:
    Zedekiah refused humility/submission. ''Humble himself'' fits the chronicler''s
    moral-religious emphasis better than the more passive ''was not humbled.'''
- source_word: מִלִּפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - from before
  lexicon: HALOT
  rationale: In this context the preposition marks relation to Jeremiah as the one
    before whom humility should have been shown. 'Before' is the most natural concise
    rendering.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  rationale: Standard English transliteration of the personal name.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: The appositional title identifies Jeremiah's authoritative role and should
    be retained explicitly.
- source_word: מִפִּי יְהוָה
  chosen: who spoke from the mouth of the LORD
  alternatives:
  - at the command of the LORD
  - from the LORD
  - by the word of the LORD
  lexicon: HALOT
  rationale: Literally 'from the mouth of the LORD.' Retaining the mouth-language
    preserves the vivid prophetic mediation formula. To make the syntax clear in English,
    it is expressed as a relative clause modifying Jeremiah.
