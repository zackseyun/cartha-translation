theological_decisions:
- issue: Referent of 'his messengers'
  chosen_reading: human prophetic messengers
  alternative_readings:
  - heavenly angels
  rationale: The surrounding context concerns the LORD's repeated warnings before judgment, which in Chronicles are delivered through prophetic agents. Rendering מַלְאָכָיו as 'messengers' avoids importing an angelic reading not required by the text.
- issue: Rendering of divine compassion toward 'his dwelling place'
  chosen_reading: retain the anthropomorphic/covenantal expression 'his dwelling place'
  alternative_readings:
  - explicitly identify it as 'his temple'
  rationale: The Hebrew speaks of God's compassion for both his people and his dwelling place. Keeping 'dwelling place' preserves the theological link between temple and divine presence without flattening it into a mere building reference.
