id: 2CH.36.15
reference: 2 Chronicles 36:15
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֡ח יְהוָה֩ אֱלֹהֵ֨י אֲבוֹתֵי/הֶ֧ם עֲלֵי/הֶ֛ם בְּ/יַ֥ד מַלְאָכָ֖י/ו הַשְׁכֵּ֣ם וְ/שָׁל֑וֹחַ כִּֽי חָמַ֥ל עַל עַמּ֖/וֹ וְ/עַל מְעוֹנֽ/וֹ־־־׃
translation:
  text: And Yahweh, the God of their fathers, sent word to them by the hand of his messengers, rising early and sending, because he had compassion on his people and on his dwelling place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew ''rising early and sending,'' an idiom expressing persistent, eager repetition: ''again and again sending.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'through his messengers.'
    reason: lexical_alternative
  - marker: c
    text: That is, the temple, viewed as the place of God's dwelling among his people.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH per DOCTRINE.md.
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  chosen: the God of their fathers
  alternatives:
  - their ancestral God
  lexicon: HALOT
  rationale: A formally close rendering that preserves the covenantal/historical reference to the ancestors without paraphrase.
- source_word: וַיִּשְׁלַח ... עֲלֵיהֶם
  chosen: sent word to them
  alternatives:
  - sent to them
  - kept sending to them
  lexicon: HALOT
  rationale: The verb שׁלח means 'send'; in this context with 'by the hand of his messengers' the object is implicit, namely a message/word. 'Sent word to them' is idiomatic English that preserves the communicative force without overtranslating repetition into the main finite verb.
- source_word: בְּיַד מַלְאָכָיו
  chosen: by the hand of his messengers
  alternatives:
  - through his messengers
  - by his messengers
  lexicon: HALOT
  rationale: '''By the hand of'' is a common Hebrew idiom for agency/instrumentality. Retaining it preserves the Hebrew texture while remaining understandable. ''Messengers'' is preferred because מַלְאָךְ denotes one sent with a message; the context is prophetic envoys, not necessarily heavenly angels.'
- source_word: מַלְאָכָיו
  chosen: messengers
  alternatives:
  - angels
  - envoys
  lexicon: HALOT
  rationale: In context of repeated warnings to Judah, human prophetic messengers are in view. 'Angels' could mislead readers toward heavenly beings.
- source_word: הַשְׁכֵּם וְשָׁלוֹחַ
  chosen: rising early and sending
  alternatives:
  - again and again sending
  - persistently sending
  - rising early to send
  lexicon: HALOT
  rationale: This Hebrew idiom conveys eagerness and persistence. The chosen rendering stays relatively formal and preserves the metaphor, while English readers can still grasp the sense. The more interpretive sense of repeated urgency is preserved in a footnote alternative.
- source_word: כִּי חָמַל
  chosen: because he had compassion
  alternatives:
  - for he spared
  - because he pitied
  lexicon: HALOT
  rationale: חמל expresses pity/compassion that moves one to spare. 'Had compassion' is natural modern English and fits the causal clause; 'spared' is too narrow here because the verse emphasizes motive before judgment falls.
- source_word: עַל עַמּוֹ
  chosen: on his people
  alternatives:
  - for his people
  lexicon: HALOT
  rationale: The preposition עַל after חמל is naturally rendered 'on' in English with 'have compassion on,' preserving the idiom.
- source_word: מְעוֹנוֹ
  chosen: his dwelling place
  alternatives:
  - his habitation
  - his temple
  lexicon: HALOT
  rationale: מָעוֹן denotes a dwelling/habitation. In this context it refers to the temple in Jerusalem as God's dwelling place. 'Dwelling place' preserves the lexical sense while allowing readers to infer the temple reference; 'temple' is interpretive and therefore better suited as a footnote alternative if needed.
