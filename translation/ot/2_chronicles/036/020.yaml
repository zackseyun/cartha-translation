id: 2CH.36.20
reference: 2 Chronicles 36:20
source:
  edition: WLC
  text: וַ/יֶּ֛גֶל הַ/שְּׁאֵרִ֥ית מִן הַ/חֶ֖רֶב אֶל בָּבֶ֑ל וַֽ/יִּהְיוּ ל֤/וֹ וּ/לְ/בָנָי/ו֙
    לַ/עֲבָדִ֔ים עַד מְלֹ֖ךְ מַלְכ֥וּת פָּרָֽס־־־־׃
translation:
  text: He carried into exile to Babylon the remnant who had escaped the sword, and
    they became slaves to him and to his sons until the reign of the kingdom of Persia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants.' The Hebrew term can denote either servants or slaves, but
      here the context of conquest and exile favors 'slaves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּגֶל
  chosen: He carried into exile
  alternatives:
  - He exiled
  - He deported
  lexicon: HALOT
  rationale: From גלה in the Hiphil/causative sense, referring to taking people away
    into exile. 'Carried into exile' is natural English and preserves the forced-deportation
    sense better than a bare 'removed.' The subject is the Babylonian king from the
    previous verse, so 'He' is appropriate.
- source_word: הַשְּׁאֵרִית
  chosen: the remnant
  alternatives:
  - the survivors
  - those who remained
  lexicon: HALOT
  rationale: The noun denotes what remains. 'Remnant' preserves the lexical and biblical
    resonance of a surviving remainder, while the following phrase specifies that
    these are those spared from the sword.
- source_word: מִן הַחֶרֶב
  chosen: who had escaped the sword
  alternatives:
  - from the sword
  - from the slaughter of the sword
  lexicon: HALOT
  rationale: Literally 'from the sword,' but in English the idiom is clearer as survival
    from warfare. This makes explicit the sense already implied by the Hebrew construction
    without adding new content.
- source_word: אֶל בָּבֶל
  chosen: to Babylon
  alternatives:
  - into Babylon
  lexicon: HALOT
  rationale: Straightforward directional phrase; 'to Babylon' is idiomatic and sufficient.
- source_word: וַיִּהְיוּ לוֹ וּלְבָנָיו לַעֲבָדִים
  chosen: and they became slaves to him and to his sons
  alternatives:
  - and they became servants to him and to his sons
  - and they were his servants and his sons' servants
  lexicon: HALOT
  rationale: עֲבָדִים can mean servants or slaves depending on context. Here the context
    is conquest, deportation, and subjugation by an imperial ruler, so the bonded
    nature is salient; therefore 'slaves' best fits the translation philosophy's handling
    of servile terms.
- source_word: עַד
  chosen: until
  alternatives:
  - up to the time of
  lexicon: HALOT
  rationale: Standard temporal marker.
- source_word: מְלֹךְ
  chosen: the reign of
  alternatives:
  - the ruling of
  - the accession of
  lexicon: HALOT
  rationale: The infinitive construct of מלך here marks the commencement/period of
    rule. 'The reign of' is idiomatic in English and fits the temporal sense.
- source_word: מַלְכוּת פָּרָס
  chosen: the kingdom of Persia
  alternatives:
  - the Persian kingdom
  - the rule of Persia
  lexicon: HALOT
  rationale: A genitive construction referring to the Persian imperial realm. 'The
    kingdom of Persia' is a transparent rendering that preserves the Hebrew structure.
