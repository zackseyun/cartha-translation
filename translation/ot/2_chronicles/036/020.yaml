theological_decisions:
- issue: Rendering of servile status in a conquest/exile context
  chosen_reading: slaves
  alternative_readings:
  - servants
  rationale: Although עבד can be rendered either 'servant' or 'slave' depending on
    context, this verse describes deported war survivors subjected to the Babylonian
    king and his sons. The coercive, subjugated setting makes 'slaves' the more accurate
    rendering under the project's stated philosophy.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    on δοῦλος/servant-slave context principle
