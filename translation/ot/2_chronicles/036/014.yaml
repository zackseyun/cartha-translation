id: 2CH.36.14
reference: 2 Chronicles 36:14
source:
  edition: WLC
  text: גַּ֠ם כָּל שָׂרֵ֨י הַ/כֹּהֲנִ֤ים וְ/הָ/עָם֙ הִרְבּ֣וּ לִ/מְעָול מַ֔עַל כְּ/כֹ֖ל
    תֹּעֲב֣וֹת הַ/גּוֹיִ֑ם וַֽ/יְטַמְּאוּ֙ אֶת בֵּ֣ית יְהוָ֔ה אֲשֶׁ֥ר הִקְדִּ֖ישׁ
    בִּ/ירוּשָׁלִָֽם־־־׃
translation:
  text: Also all the leaders of the priests and the people multiplied their unfaithfulness,
    according to all the abominations of the nations, and they defiled the house of
    the LORD, which he had consecrated in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like all the abominations of the nations' or 'in keeping with all the
      detestable practices of the nations.'
    reason: lexical_alternative
  - marker: b
    text: '''The LORD'' renders the divine name YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: גַּם
  chosen: Also
  alternatives:
  - Even
  - Moreover
  lexicon: HALOT
  rationale: Adds the sense of continuation/intensification from the preceding context;
    'also' is natural and sufficiently connective.
- source_word: כָּל שָׂרֵי הַכֹּהֲנִים וְהָעָם
  chosen: all the leaders of the priests and the people
  alternatives:
  - all the chief priests and the people
  - all the officials of the priests and the people
  lexicon: HALOT
  rationale: שָׂרֵי denotes leaders/officials, not the priests themselves as a class.
    The construct with הַכֹּהֲנִים is best taken as 'leaders of the priests.' This
    avoids collapsing the phrase into the later NT-sounding technical term 'chief
    priests,' while preserving the Hebrew structure.
- source_word: הִרְבּוּ
  chosen: multiplied
  alternatives:
  - increased
  - became more and more
  lexicon: HALOT
  rationale: The Hiphil of רבה here conveys making something abundant/increasing.
    'Multiplied' preserves the concrete force and pairs well with the following cognate
    expression.
- source_word: לִמְעָול מַעַל
  chosen: their unfaithfulness
  alternatives:
  - to act very treacherously
  - to commit unfaithfulness
  - to increase in trespass
  lexicon: HALOT
  rationale: The infinitive plus cognate noun intensifies the idea of acting unfaithfully/committing
    trespass, often in covenantal or cultic contexts. 'Multiplied their unfaithfulness'
    captures both the verbal increase and the covenantal breach in readable English.
- source_word: כְּכֹל תֹּעֲבוֹת הַגּוֹיִם
  chosen: according to all the abominations of the nations
  alternatives:
  - like all the abominations of the nations
  - in keeping with all the detestable practices of the nations
  lexicon: HALOT
  rationale: כְּכֹל marks conformity/comparison. 'According to' preserves the sense
    that their conduct matched the pagan nations' abominable practices. 'Abominations'
    retains the moral-religious weight of תֹּעֲבוֹת.
- source_word: וַיְטַמְּאוּ
  chosen: they defiled
  alternatives:
  - they made unclean
  - they polluted
  lexicon: HALOT
  rationale: In temple context, the verb denotes ritual/moral defilement. 'Defiled'
    is the most idiomatic and weighty English equivalent.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: בֵּית is literally 'house.' 'House of the LORD' preserves the Hebrew
    expression while remaining clear; 'the LORD' follows the project's default rendering
    for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following established reverential convention and the LXX pattern.
- source_word: אֲשֶׁר הִקְדִּישׁ בִּירוּשָׁלִָם
  chosen: which he had consecrated in Jerusalem
  alternatives:
  - which he had made holy in Jerusalem
  - which he had sanctified in Jerusalem
  lexicon: HALOT
  rationale: The relative clause most naturally refers to the house and states that
    the LORD had set it apart as holy in Jerusalem. 'Consecrated' communicates cultic
    dedication clearly in modern English.
