theological_decisions:
- issue: Rendering the covenantal/cultic breach expressed by מָעַל
  chosen_reading: unfaithfulness
  alternative_readings:
  - trespass
  - treachery
  rationale: The context is both covenantal and temple-centered. 'Unfaithfulness'
    best captures breach of loyalty to God without narrowing the term to a merely
    legal offense; alternatives are possible but less natural in this sentence.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the divine name is 'the LORD'; no contextual
    factor here requires deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
