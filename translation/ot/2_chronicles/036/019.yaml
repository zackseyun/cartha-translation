id: 2CH.36.19
reference: 2 Chronicles 36:19
source:
  edition: WLC
  text: וַֽ/יִּשְׂרְפוּ֙ אֶת בֵּ֣ית הָ/אֱלֹהִ֔ים וַֽ/יְנַתְּצ֔וּ אֵ֖ת חוֹמַ֣ת יְרוּשָׁלִָ֑ם
    וְ/כָל אַרְמְנוֹתֶ֨י/הָ֙ שָׂרְפ֣וּ בָ/אֵ֔שׁ וְ/כָל כְּלֵ֥י מַחֲמַדֶּ֖י/הָ לְ/הַשְׁחִֽית־־־׃ס
translation:
  text: They burned the house of God, tore down the wall of Jerusalem, burned all
    its palaces with fire, and destroyed all its precious vessels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of God.' The Hebrew reads literally 'the house of God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all its treasured objects' or 'all its desirable articles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂרְפוּ
  chosen: They burned
  alternatives:
  - And they burned
  - They set fire to
  lexicon: HALOT
  rationale: Qal wayyiqtol of שׂרף, straightforwardly 'burn.' English simple past
    fits the narrative sequence. 'They' is supplied from the 3mp verb.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: Literally 'house of God.' While this refers to the temple, retaining
    'house' preserves the Hebrew expression and avoids over-paraphrase; the referent
    remains clear in context.
- source_word: וַיְנַתְּצוּ
  chosen: tore down
  alternatives:
  - broke down
  - demolished
  lexicon: HALOT
  rationale: נתץ commonly means to pull down or tear down structures. 'Tore down'
    is vivid, natural English and suits the object 'wall.'
- source_word: חוֹמַת יְרוּשָׁלִָם
  chosen: the wall of Jerusalem
  alternatives:
  - Jerusalem's wall
  lexicon: HALOT
  rationale: Construct phrase rendered transparently. Singular 'wall' matches the
    Hebrew collective/structural singular.
- source_word: אַרְמְנוֹתֶיהָ
  chosen: its palaces
  alternatives:
  - its citadels
  - its fortified buildings
  lexicon: HALOT
  rationale: אַרְמוֹן often denotes palace or fortified residence. In the context
    of urban destruction, 'palaces' is the most standard and likely sense, referring
    to Jerusalem's grand buildings.
- source_word: שָׂרְפוּ בָאֵשׁ
  chosen: burned all its palaces with fire
  alternatives:
  - burned all its palaces
  - set all its palaces on fire
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'with/in the fire.' In English, 'burned
    ... with fire' preserves the emphasis without sounding unnatural. The repetition
    of burning is retained rather than collapsed.
- source_word: כְּלֵי מַחֲמַדֶּיהָ
  chosen: its precious vessels
  alternatives:
  - its desirable articles
  - all its treasured objects
  - all its beautiful vessels
  lexicon: HALOT
  rationale: כְּלִי is a broad term for articles, implements, or vessels; in temple/palace
    contexts 'vessels' is idiomatic. מַחֲמַד denotes something desirable, precious,
    or treasured. 'Precious vessels' captures both value and likely cultic/royal objects.
- source_word: לְהַשְׁחִית
  chosen: destroyed
  alternatives:
  - for destruction
  - to destroy
  lexicon: HALOT
  rationale: 'The infinitive expresses result or purpose after the previous clauses.
    Idiomatic English renders the sense as a finite verb coordinated with the sequence:
    they destroyed all its precious vessels. This is an optimal-equivalence smoothing
    of Hebrew syntax while preserving meaning.'
