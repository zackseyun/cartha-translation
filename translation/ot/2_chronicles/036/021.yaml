theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: How explicitly to preserve the sabbatical theology in שַׁבְּתוֹתֶיהָ / שָׁבָתָה
  chosen_reading: its Sabbaths ... it kept Sabbath
  alternative_readings:
  - its rests ... it rested
  rationale: The verse intentionally links the exile to covenantal sabbath-rest for the land, likely echoing Leviticus 26. Preserving the Sabbath terminology keeps that theological connection visible rather than flattening it into generic 'rest.'
