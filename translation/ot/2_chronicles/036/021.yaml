id: 2CH.36.21
reference: 2 Chronicles 36:21
source:
  edition: WLC
  text: לְ/מַלֹּ֤אות דְּבַר יְהוָה֙ בְּ/פִ֣י יִרְמְיָ֔הוּ עַד רָצְתָ֥ה הָ/אָ֖רֶץ אֶת שַׁבְּתוֹתֶ֑י/הָ כָּל יְמֵ֤י הָשַּׁמָּ/ה֙ שָׁבָ֔תָה לְ/מַלֹּ֖אות שִׁבְעִ֥ים שָׁנָֽה־־־־׃פ
translation:
  text: to fulfill the word of Yahweh by the mouth of Yirmeyahu, until the land had enjoyed its Sabbaths. All the days of its desolation it kept Sabbath, to fulfill seventy years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through Jeremiah.' Literally, 'by the mouth of Yirmeyahu.'
    reason: lexical_alternative
  - marker: b
    text: Or 'had accepted' or 'had made up for' its Sabbaths; the sense is that the land received the sabbatical rest it had been denied.
    reason: lexical_alternative
  - marker: c
    text: This wording echoes the covenant warnings about the land enjoying its sabbaths during exile (see Lev 26:34–35).
    reason: cross_reference
  - marker: d
    text: 'Or ''it rested.'' The Hebrew keeps the Sabbath/rest wordplay: ''its Sabbaths ... it kept Sabbath.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַלֹּאות
  chosen: to fulfill
  alternatives:
  - to complete
  - to bring to fullness
  lexicon: HALOT
  rationale: 'Infinitive construct of מלא with prefixed ל expresses purpose/result here: the exile happened ''to fulfill'' the word of the LORD. ''Fulfill'' is idiomatic in English for bringing a spoken word to realization.'
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: דבר can mean 'word, matter, message.' In prophetic-fulfillment context, 'word' best preserves the intertextual force. YHWH is rendered 'the LORD' per doctrine default.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּפִי יִרְמְיָהוּ
  chosen: by the mouth of Yirmeyahu
  alternatives:
  - through Jeremiah
  - by Jeremiah
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'by the mouth of.' Retaining 'by the mouth of' preserves the prophetic-speech imagery while remaining understandable. The personal name is transliterated rather than anglicized, following project philosophy.
- source_word: עַד
  chosen: until
  alternatives:
  - up to the point that
  lexicon: HALOT
  rationale: Marks the temporal extent of the fulfillment process.
- source_word: רָצְתָה
  chosen: had enjoyed
  alternatives:
  - had accepted
  - had been pleased with
  - had made up for
  lexicon: HALOT
  rationale: From רצה, here with the land as subject and 'its Sabbaths' as object, the sense is that the land received or enjoyed the sabbatical rest due to it. 'Had enjoyed' is the most natural English expression in this context and reflects the allusion to Lev 26:34-35.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: In context this refers specifically to the land of Judah, not the whole earth.
- source_word: אֶת שַׁבְּתוֹתֶיהָ
  chosen: its Sabbaths
  alternatives:
  - its sabbath rests
  - its sabbath years
  lexicon: HALOT
  rationale: Plural 'Sabbaths' is retained to mirror the Hebrew and preserve the connection to covenantal sabbatical observance. 'Its' refers to the land.
- source_word: כָּל יְמֵי הַשַּׁמָּה
  chosen: All the days of its desolation
  alternatives:
  - All the days of the desolation
  - Throughout the time it lay desolate
  lexicon: HALOT
  rationale: The phrase denotes the entire period in which the land was desolated. Rendering the suffix in English as 'its desolation' makes the referent explicit and reads naturally.
- source_word: שָׁבָתָה
  chosen: it kept Sabbath
  alternatives:
  - it rested
  - it ceased
  lexicon: HALOT
  rationale: Although the verb can broadly mean 'rested/ceased,' 'kept Sabbath' preserves the lexical link with the preceding noun 'Sabbaths' and the theological motif of sabbatical rest.
- source_word: לְמַלֹּאות שִׁבְעִים שָׁנָה
  chosen: to fulfill seventy years
  alternatives:
  - until seventy years were completed
  - to complete seventy years
  lexicon: HALOT
  rationale: The repeated infinitive again signals fulfillment/completion. 'To fulfill seventy years' preserves the verbal repetition with the opening clause and echoes the prophetic timeframe associated with Jeremiah.
