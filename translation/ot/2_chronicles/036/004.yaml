id: 2CH.36.4
reference: 2 Chronicles 36:4
source:
  edition: WLC
  text: וַ/יַּמְלֵ֨ךְ מֶֽלֶךְ מִצְרַ֜יִם אֶת אֶלְיָקִ֣ים אָחִ֗י/ו עַל יְהוּדָה֙ וִ/יר֣וּשָׁלִַ֔ם
    וַ/יַּסֵּ֥ב אֶת שְׁמ֖/וֹ יְהוֹיָקִ֑ים וְ/אֶת יוֹאָחָ֤ז אָחִי/ו֙ לָקַ֣ח נְכ֔וֹ
    וַ/יְבִיאֵ֖/הוּ מִצְרָֽיְמָ/ה־־־־־׃פ
translation:
  text: And the king of Egypt made Eliakim his brother king over Judah and Jerusalem,
    and changed his name to Jehoiakim. But Neco took his brother Jehoahaz and brought
    him to Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Necho,'' commonly rendered ''Necho'' in English translations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּמְלֵךְ
  chosen: made ... king
  alternatives:
  - caused ... to reign
  - appointed ... king
  lexicon: HALOT
  rationale: 'Hiphil of מלך here is causative: the king of Egypt installed Eliakim
    as king, not merely that Eliakim began to reign on his own.'
- source_word: מֶלֶךְ מִצְרַיִם
  chosen: the king of Egypt
  alternatives:
  - Egypt's king
  lexicon: HALOT
  rationale: A straightforward construct phrase identifying the subject; the definite
    English form is natural because a specific ruler is in view.
- source_word: אֶלְיָקִים אָחִיו
  chosen: Eliakim his brother
  alternatives:
  - his brother Eliakim
  lexicon: HALOT
  rationale: אָחִיו refers to Jehoahaz, indicating Eliakim was Jehoahaz's brother.
    English word order is adjusted slightly for readability while preserving the relationship.
- source_word: עַל יְהוּדָה וִירוּשָׁלַם
  chosen: over Judah and Jerusalem
  alternatives:
  - over Judah and Jerusalem alike
  lexicon: HALOT
  rationale: עַל with royal appointment indicates rule over a territory. Both the
    kingdom and its capital are named, and both are retained.
- source_word: וַיַּסֵּב אֶת־שְׁמוֹ יְהוֹיָקִים
  chosen: changed his name to Jehoiakim
  alternatives:
  - renamed him Jehoiakim
  - turned his name into Jehoiakim
  lexicon: HALOT
  rationale: The idiom means to alter or rename. 'Changed his name to' is clear modern
    English and preserves the act of imposed renaming.
- source_word: וְאֶת יוֹאָחָז אָחִיו לָקַח נְכוֹ
  chosen: But Neco took his brother Jehoahaz
  alternatives:
  - And Neco took Jehoahaz his brother
  - Neco seized his brother Jehoahaz
  lexicon: HALOT
  rationale: The clause shifts focus to what Neco did with Jehoahaz. 'Took' is the
    plain sense of לקח; 'But' brings out the contrast in English between enthroning
    one brother and removing the other.
- source_word: וַיְבִיאֵהוּ מִצְרָיְמָה
  chosen: and brought him to Egypt
  alternatives:
  - and brought him into Egypt
  lexicon: HALOT
  rationale: The directional ending on מִצְרַיִם indicates motion toward Egypt. 'Brought
    him to Egypt' is idiomatic and accurate.
- source_word: נְכוֹ
  chosen: Neco
  alternatives:
  - Necho
  lexicon: HALOT
  rationale: A standard English transliteration of the personal name. 'Necho' is also
    common in English tradition; the shorter form more directly reflects the Hebrew
    vocalization.
