id: 2CH.36.2
reference: 2 Chronicles 36:2
source:
  edition: WLC
  text: בֶּן שָׁל֧וֹשׁ וְ/עֶשְׂרִ֛ים שָׁנָ֖ה יוֹאָחָ֣ז בְּ/מָלְכ֑/וֹ וּ/שְׁלֹשָׁ֣ה
    חֳדָשִׁ֔ים מָלַ֖ךְ בִּ/ירוּשָׁלִָֽם־׃
translation:
  text: Jehoahaz was twenty-three years old when he became king, and he reigned three
    months in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a son of twenty-three years'—a standard Hebrew idiom for age.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן שָׁל֧וֹשׁ וְעֶשְׂרִים שָׁנָה
  chosen: was twenty-three years old
  alternatives:
  - was a son of twenty-three years
  - was twenty-three years old at his becoming king
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'son of ... years' for age. Natural modern
    English expresses this as 'was twenty-three years old' while preserving the sense
    exactly.
- source_word: יוֹאָחָז
  chosen: Jehoahaz
  alternatives:
  - Joahaz
  rationale: Personal names are transliterated by standard English biblical convention.
    'Jehoahaz' is the established and recognizable rendering of יוֹאָחָז.
- source_word: בְּמָלְכוֹ
  chosen: when he became king
  alternatives:
  - in his reigning
  - when he began to reign
  - at his accession
  lexicon: HALOT
  rationale: The preposition plus infinitive/verb form here marks the time of accession.
    'When he became king' is clear modern English and fits the standard regnal formula.
- source_word: וּשְׁלֹשָׁה חֳדָשִׁים
  chosen: three months
  alternatives:
  - and three months
  lexicon: HALOT
  rationale: 'Straightforward numeral plus noun. In English the conjunction is naturally
    absorbed into the larger clause: ''and he reigned three months.'''
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  - he ruled as king
  lexicon: HALOT
  rationale: In regnal notices, מלך is best rendered 'reigned,' the standard concise
    English equivalent.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  rationale: The preposition ב marks location. 'In Jerusalem' is the direct and natural
    rendering.
