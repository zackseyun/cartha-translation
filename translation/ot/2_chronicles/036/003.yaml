id: 2CH.36.3
reference: 2 Chronicles 36:3
source:
  edition: WLC
  text: וַ/יְסִירֵ֥/הוּ מֶֽלֶךְ מִצְרַ֖יִם בִּֽ/ירוּשָׁלִָ֑ם וַֽ/יַּעֲנֹשׁ֙ אֶת הָ/אָ֔רֶץ
    מֵאָ֥ה כִכַּר כֶּ֖סֶף וְ/כִכַּ֥ר זָהָֽב־־־׃
translation:
  text: And the king of Egypt removed him in Jerusalem and imposed on the land a tribute
    of a hundred talents of silver and a talent of gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deposed him'; the Hebrew verb can mean to remove someone from position
      or to take him away.
    reason: alternative_reading
  - marker: b
    text: Or 'imposed a fine on the land'; the verb refers to levying a monetary penalty.
    reason: lexical_alternative
  - marker: c
    text: A talent was a large unit of weight; the text preserves the ancient measure
      rather than converting it.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְסִירֵהוּ
  chosen: removed him
  alternatives:
  - deposed him
  - took him away
  lexicon: HALOT
  rationale: From סוּר in the causative sense, 'remove' or 'take away.' In this royal
    context it refers to removing Jehoahaz from office/custody. 'Removed him' is broad
    enough to preserve the Hebrew while fitting the political context; 'deposed him'
    is interpretive and 'took him away' underplays the royal action.
- source_word: מֶלֶךְ מִצְרַיִם
  chosen: the king of Egypt
  alternatives:
  - Egypt's king
  lexicon: HALOT
  rationale: Standard construct rendering. This identifies Pharaoh Neco without importing
    his name where the Hebrew here uses the title.
- source_word: בִּירוּשָׁלָם
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: HALOT
  rationale: The preposition ב commonly marks location. 'In Jerusalem' is the natural
    modern English rendering.
- source_word: וַיַּעֲנֹשׁ
  chosen: imposed ... a tribute
  alternatives:
  - fined
  - punished
  - mulcted
  lexicon: HALOT
  rationale: The verb ענשׁ can denote imposing a penalty or fine. Because the object
    and amount follow, the sense is specifically financial exaction. 'Imposed ...
    a tribute' communicates the monetary levy clearly in idiomatic English. 'Punished'
    is too vague, and 'fined' may sound overly judicial.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: אָרֶץ here refers to the territory/kingdom of Judah rather than the earth
    in general. 'The land' preserves the Hebrew term and remains natural in historical
    narrative.
- source_word: מֵאָה כִכַּר כֶּסֶף
  chosen: a hundred talents of silver
  alternatives:
  - one hundred talents of silver
  lexicon: HALOT
  rationale: כִּכָּר is a weight measure conventionally rendered 'talent.' Keeping
    the ancient unit is more transparent than converting to modern weights in the
    main text.
- source_word: וְכִכַּר זָהָב
  chosen: and a talent of gold
  alternatives:
  - and one talent of gold
  lexicon: HALOT
  rationale: Same measure term as above. The singular is explicit and should be preserved.
