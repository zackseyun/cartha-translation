id: 2CH.36.7
reference: 2 Chronicles 36:7
source:
  edition: WLC
  text: וּ/מִ/כְּלֵי֙ בֵּ֣ית יְהוָ֔ה הֵבִ֥יא נְבוּכַדְנֶאצַּ֖ר לְ/בָבֶ֑ל וַ/יִּתְּנֵ֥/ם
    בְּ/הֵיכָל֖/וֹ בְּ/בָבֶֽל׃
translation:
  text: Nebuchadnezzar also brought some of the vessels of the house of the LORD to
    Babylon, and put them in his temple in Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his palace,' since the Hebrew word can refer to either a temple or a
      palace depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/כְּלֵי
  chosen: also brought some of the vessels
  alternatives:
  - and from the vessels
  - and some of the articles
  - and some of the utensils
  lexicon: HALOT
  rationale: 'The prefixed וּ plus מִן with כְּלֵי indicates addition plus a partitive
    sense: ''and/some from the vessels.'' English idiom is best represented by ''also
    brought some of the vessels,'' making the partitive force explicit and connecting
    with the surrounding narrative.'
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew expression
    while remaining natural English. Per doctrine, יְהוָה is rendered 'the LORD.'
    'Temple' is possible but less formally aligned here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה.
- source_word: הֵבִיא
  chosen: brought
  alternatives:
  - carried
  - took
  lexicon: HALOT
  rationale: The Hiphil of בוא commonly means 'bring' or 'cause to come.' 'Brought'
    fits the movement of temple vessels to Babylon and is standard, clear English.
- source_word: נְבוּכַדְנֶאצַּר
  chosen: Nebuchadnezzar
  rationale: Personal names are transliterated by standard English convention.
- source_word: לְ/בָבֶל
  chosen: to Babylon
  rationale: Directional ל marks destination.
- source_word: וַ/יִּתְּנֵם
  chosen: and put them
  alternatives:
  - and placed them
  - and set them
  lexicon: HALOT
  rationale: נתן here means to place or deposit the vessels in a location. 'Put them'
    is natural modern English; 'placed them' is slightly more formal but not necessary.
- source_word: בְּ/הֵיכָל/וֹ
  chosen: in his temple
  alternatives:
  - in his palace
  - in his shrine
  lexicon: HALOT
  rationale: הֵיכָל can denote temple/palace, but in this context of sacred vessels
    and parallel accounts, a cultic building is most likely. The 3ms suffix refers
    to Nebuchadnezzar, so 'his temple' is the most contextually fitting rendering.
- source_word: בְּ/בָבֶל
  chosen: in Babylon
  rationale: Locative ב marks the place where he deposited them.
