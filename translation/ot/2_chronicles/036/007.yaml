theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the Tetragrammaton as 'the LORD' rather
    than transliteration, following the stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of הֵיכָל in reference to Nebuchadnezzar's building
  chosen_reading: his temple
  alternative_readings:
  - his palace
  rationale: Although הֵיכָל can refer to a palace, the immediate context concerns
    vessels taken from the house of the LORD and deposited in a sacred Babylonian
    setting. 'Temple' best preserves the likely cultic sense without importing further
    theological claims.
