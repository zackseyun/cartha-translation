id: 2CH.8.10
reference: 2 Chronicles 8:10
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה שָׂרֵ֤י ה/נציבים אֲשֶׁר לַ/מֶּ֥לֶךְ שְׁלֹמֹ֖ה חֲמִשִּׁ֣ים וּ/מָאתָ֑יִם
    הָ/רֹדִ֖ים בָּ/עָֽם־׃
translation:
  text: 'These were the chiefs of King Solomon’s deputies: two hundred and fifty,
    who ruled over the people.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “overseers” for “deputies”; the Hebrew term refers to appointed officials
      under royal authority.
    reason: lexical_alternative
  - marker: b
    text: Or “who supervised the people” or “who were in charge of the people”; the
      verb can denote exercising authority in an administrative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: These were
  alternatives:
  - And these were
  - These are
  lexicon: HALOT
  rationale: Introduces the list/result in narrative style. English past tense fits
    the surrounding historical narration better than a present-tense literalism.
- source_word: שָׂרֵי
  chosen: chiefs
  alternatives:
  - officials
  - captains
  - princes
  lexicon: HALOT
  rationale: The construct with הַנְּצִיבִים indicates leading officers over other
    functionaries. 'Chiefs' preserves rank without implying military command too narrowly.
- source_word: הַנְּצִיבִים
  chosen: deputies
  alternatives:
  - overseers
  - officers
  - governors
  lexicon: HALOT
  rationale: נְצִיבִים here refers to appointed officials under royal authority. 'Deputies'
    fits the administrative context and avoids the more labor-specific nuance of 'overseers'
    in this clause.
- source_word: אֲשֶׁר לַמֶּלֶךְ שְׁלֹמֹה
  chosen: of King Solomon
  alternatives:
  - who belonged to King Solomon
  - who were for King Solomon
  lexicon: HALOT
  rationale: The phrase marks possession/association with the king. 'Of King Solomon'
    is concise, natural English and preserves the genitival relationship.
- source_word: חֲמִשִּׁים וּמָאתָיִם
  chosen: two hundred and fifty
  alternatives:
  - two hundred fifty
  lexicon: HALOT
  rationale: Standard English rendering of the Hebrew number sequence.
- source_word: הָרֹדִים
  chosen: who ruled
  alternatives:
  - who had authority
  - who supervised
  - who were in charge
  lexicon: HALOT
  rationale: From רדה, denoting exercising rule or dominion. 'Ruled' is the most direct
    lexical equivalent, though in this administrative context it likely refers to
    official authority rather than harsh domination.
- source_word: בָּעָם
  chosen: over the people
  alternatives:
  - among the people
  - over the workforce
  lexicon: HALOT
  rationale: With רדה, ב commonly marks the sphere/object over which authority is
    exercised. 'Over the people' is the most straightforward sense. 'Workforce' is
    possible in context but is not explicit in the Hebrew of this verse.
