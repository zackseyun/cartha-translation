id: 2CH.8.7
reference: 2 Chronicles 8:7
source:
  edition: WLC
  text: כָּל הָ֠/עָם הַ/נּוֹתָ֨ר מִן הַ/חִתִּ֜י וְ/הָ/אֱמֹרִ֤י וְ/הַ/פְּרִזִּי֙ וְ/הַ/חִוִּ֣י
    וְ/הַ/יְבוּסִ֔י אֲשֶׁ֛ר לֹ֥א מִ/יִּשְׂרָאֵ֖ל הֵֽמָּה־־׃
translation:
  text: As for all the people who were left from the Hittites, the Amorites, the Perizzites,
    the Hivites, and the Jebusites, who were not from Israel—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who were not Israelites.' The Hebrew more literally says, 'who were
      not from Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the population
  - all the people group
  lexicon: HALOT
  rationale: כָּל with הָעָם denotes the entirety of the remaining non-Israelite population
    in view. 'People' is the most natural collective rendering in English here.
- source_word: הַנּוֹתָר
  chosen: who were left
  alternatives:
  - who remained
  - who were remaining
  lexicon: HALOT
  rationale: The Niphal participle of יתר/נותר indicates those left over or remaining.
    'Who were left' reads naturally in English and fits the retrospective historical
    context.
- source_word: מִן
  chosen: from
  alternatives:
  - among
  - out of
  lexicon: HALOT
  rationale: Here מִן marks source/origin from the listed peoples. 'From' is the clearest
    straightforward rendering.
- source_word: הַחִתִּי וְהָאֱמֹרִי וְהַפְּרִזִּי וְהַחִוִּי וְהַיְבוּסִי
  chosen: the Hittites, the Amorites, the Perizzites, the Hivites, and the Jebusites
  lexicon: HALOT
  rationale: These are standard English transliterations of the ethnonyms. The singular
    Hebrew forms function collectively for each people group, so English plurals are
    idiomatic and accurate.
- source_word: אֲשֶׁר לֹא מִיִּשְׂרָאֵל הֵמָּה
  chosen: who were not from Israel
  alternatives:
  - who were not of Israel
  - who were not Israelites
  lexicon: HALOT
  rationale: The clause identifies these peoples as non-Israelite in origin. 'Who
    were not from Israel' preserves the preposition מִן and avoids over-specifying
    ethnicity beyond the Hebrew wording, while remaining natural English.
