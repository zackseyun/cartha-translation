id: 2CH.8.12
reference: 2 Chronicles 8:12
source:
  edition: WLC
  text: אָ֣ז הֶעֱלָ֧ה שְׁלֹמֹ֛ה עֹל֖וֹת לַ/יהוָ֑ה עַ֚ל מִזְבַּ֣ח יְהוָ֔ה אֲשֶׁ֥ר בָּנָ֖ה
    לִ/פְנֵ֥י הָ/אוּלָֽם׃
translation:
  text: Then Solomon offered up burnt offerings to the LORD on the altar of the LORD
    that he had built before the vestibule.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the portico' or 'the porch.' The Hebrew refers to the temple's entrance
      hall.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal discourse marker introducing the next action in sequence; 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: הֶעֱלָה
  chosen: offered up
  alternatives:
  - offered
  - caused to ascend
  lexicon: HALOT
  rationale: Hiphil of עלה with sacrificial object commonly means to offer a sacrifice,
    especially a burnt offering that goes up on the altar. 'Offered up' preserves
    the sacrificial nuance better than the flatter 'offered' while remaining idiomatic.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Standard English transliteration of the personal name.
- source_word: עֹלֹות
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: Established and accurate rendering of עֹלָה in sacrificial contexts.
    'Burnt offerings' is clear and idiomatic; 'whole burnt offerings' is more explicit
    but less natural here.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל marks direction/dedication of the sacrifice. 'To the
    LORD' is the most straightforward English rendering in this cultic context. Per
    doctrine, יהוה is rendered 'the LORD'.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Standard spatial preposition for sacrifices placed on an altar; 'on'
    is idiomatic modern English.
- source_word: מִזְבַּח יְהוָה
  chosen: the altar of the LORD
  alternatives:
  - the LORD's altar
  lexicon: HALOT
  rationale: Construct chain rendered transparently. 'The altar of the LORD' preserves
    the formal relation and echoes biblical altar language.
- source_word: אֲשֶׁר בָּנָה
  chosen: that he had built
  alternatives:
  - which he built
  lexicon: HALOT
  rationale: Relative clause referring back to the altar. English past perfect clarifies
    prior action relative to Solomon's offering in the narrative sequence.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  lexicon: HALOT
  rationale: Standard locative rendering; 'before' fits both spatially and stylistically
    in temple description.
- source_word: הָאוּלָם
  chosen: the vestibule
  alternatives:
  - the portico
  - the porch
  lexicon: HALOT
  rationale: אוּלָם denotes the temple's entrance hall/portico. 'Vestibule' is precise
    architectural English; alternatives are viable, with 'portico' perhaps more familiar
    and 'porch' more traditional but less exact.
