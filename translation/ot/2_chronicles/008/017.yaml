id: 2CH.8.17
reference: 2 Chronicles 8:17
source:
  edition: WLC
  text: אָז֩ הָלַ֨ךְ שְׁלֹמֹ֜ה לְ/עֶצְיֽוֹן גֶּ֧בֶר וְ/אֶל אֵיל֛וֹת עַל שְׂפַ֥ת הַ/יָּ֖ם
    בְּ/אֶ֥רֶץ אֱדֽוֹם־־־׃
translation:
  text: Then Solomon went to Ezion-geber and to Eloth, on the shore of the sea in
    the land of Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Eloth is also spelled 'Elath' or 'Elat' in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal discourse marker introducing the next event in sequence. 'Then'
    is natural modern English and preserves the narrative flow.
- source_word: הָלַךְ
  chosen: went
  alternatives:
  - traveled
  - walked
  lexicon: HALOT
  rationale: הלך commonly denotes going or traveling. 'Went' is the most straightforward
    narrative rendering here; 'walked' would be overly literal and potentially misleading.
- source_word: לְעֶצְיוֹן גֶּבֶר
  chosen: to Ezion-geber
  alternatives:
  - to Ezion Geber
  lexicon: HALOT
  rationale: Place name transliterated per translation philosophy. Hyphenation reflects
    the conventional English form of the compound toponym.
- source_word: וְאֶל אֵילוֹת
  chosen: and to Eloth
  alternatives:
  - and to Elat
  - and to Elath
  lexicon: HALOT
  rationale: The conjunction plus preposition is best represented as 'and to.' The
    place name is transliterated; 'Eloth' closely reflects the Hebrew form אֵילוֹת,
    while alternative English spellings are worth preserving.
- source_word: עַל שְׂפַת הַיָּם
  chosen: on the shore of the sea
  alternatives:
  - by the seashore
  - on the coast of the sea
  lexicon: HALOT
  rationale: שְׂפָה in this construction refers to the edge or shore. 'On the shore
    of the sea' is clear and moderately formal, preserving the concrete spatial sense.
- source_word: בְּאֶרֶץ אֱדוֹם
  chosen: in the land of Edom
  alternatives:
  - in Edom
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'land,' so the fuller phrase should be
    retained rather than reduced to simply 'in Edom.' 'Edom' is a standard transliteration
    of the place/people name.
