theological_decisions:
- issue: Royal-filial language in 'David his father'
  chosen_reading: Retain 'father' rather than interpretively expanding to 'ancestor.'
  alternative_readings:
  - David his ancestor
  - David his forefather
  rationale: The Hebrew idiom often uses 'father' for a royal predecessor, but there
    is no doctrinal pressure here to resolve the idiom away from the source wording.
    Retaining 'father' preserves the text's form while remaining intelligible.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source''s plain sense unless context demands otherwise.'
