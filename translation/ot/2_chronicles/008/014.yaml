id: 2CH.8.14
reference: 2 Chronicles 8:14
source:
  edition: WLC
  text: וַ/יַּעֲמֵ֣ד כְּ/מִשְׁפַּ֣ט דָּֽוִיד אָ֠בִי/ו אֶת מַחְלְק֨וֹת הַ/כֹּהֲנִ֜ים
    עַל עֲבֹדָתָ֗/ם וְ/הַ/לְוִיִּ֣ם עַל מִ֠שְׁמְרוֹתָ/ם לְ/הַלֵּ֨ל וּ/לְ/שָׁרֵ֜ת נֶ֤גֶד
    הַ/כֹּֽהֲנִים֙ לִ/דְבַר י֣וֹם בְּ/יוֹמ֔/וֹ וְ/הַ/שּׁוֹעֲרִ֥ים בְּ/מַחְלְקוֹתָ֖/ם
    לְ/שַׁ֣עַר וָ/שָׁ֑עַר כִּ֣י כֵ֔ן מִצְוַ֖ת דָּוִ֥יד אִישׁ הָ/אֱלֹהִֽים־־־־־־׃
translation:
  text: And according to the ordinance of David his father, he appointed the divisions
    of the priests for their service, and the Levites for their duties, to praise
    and to minister before the priests, as each day required, and the gatekeepers
    in their divisions for each gate; for so was the commandment of David, the man
    of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'David his ancestor'; 'father' here reflects common royal/genealogical
      Hebrew usage for a forefather.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'according to the matter of a day on its day,' that is, according
      to each day's prescribed requirement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֵד
  chosen: he appointed
  alternatives:
  - he stationed
  - he established
  lexicon: HALOT
  rationale: The Hiphil of עמד here means to set in place or appoint people to roles.
    'Appointed' fits the administrative context of organizing temple personnel better
    than the more physical 'stationed,' while still preserving the causative sense.
- source_word: כְּמִשְׁפַּט
  chosen: according to the ordinance
  alternatives:
  - according to the rule
  - according to the custom
  - according to the judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, legal decision, ordinance, or prescribed
    rule. In this cultic-administrative setting, 'ordinance' best conveys an established
    prescribed arrangement inherited from David.
- source_word: דָּוִיד אָבִיו
  chosen: David his father
  alternatives:
  - David his ancestor
  lexicon: HALOT
  rationale: Although 'father' can denote an ancestor or forefather in royal genealogical
    usage, the Hebrew literally says 'his father.' English can preserve this idiom
    naturally enough here.
- source_word: מַחְלְקוֹת
  chosen: divisions
  alternatives:
  - courses
  - groups
  lexicon: HALOT
  rationale: The term refers to organized priestly and Levitical divisions. 'Divisions'
    is clear modern English and avoids the more traditional but less transparent 'courses.'
- source_word: עַל עֲבֹדָתָם
  chosen: for their service
  alternatives:
  - over their service
  - for their work
  lexicon: HALOT
  rationale: The preposition plus noun indicates assignment to their sphere of service.
    'For their service' is idiomatic and preserves the cultic sense of temple work.
- source_word: מִשְׁמְרוֹתָם
  chosen: their duties
  alternatives:
  - their charges
  - their watches
  - their responsibilities
  lexicon: HALOT
  rationale: The noun can denote charges, watches, or assigned responsibilities. Because
    the Levites' functions are then specified, 'duties' communicates the sense clearly
    in modern English.
- source_word: לְהַלֵּל וּלְשָׁרֵת
  chosen: to praise and to minister
  alternatives:
  - to give praise and to serve
  - to praise and to serve
  lexicon: HALOT
  rationale: הלל is straightforwardly 'praise.' שרת in cultic contexts often means
    minister/attend in sacred service. 'Minister' preserves the temple-service nuance
    better than the broader 'serve.'
- source_word: נֶגֶד הַכֹּהֲנִים
  chosen: before the priests
  alternatives:
  - in the presence of the priests
  - alongside the priests
  lexicon: HALOT
  rationale: נֶגֶד commonly means before, in front of, or in the presence of. Here
    it likely indicates the Levites' service in relation to the priests. 'Before the
    priests' is concise and sufficiently literal.
- source_word: לִדְבַר יוֹם בְּיוֹמוֹ
  chosen: as each day required
  alternatives:
  - according to the matter of each day on its day
  - day by day as required
  lexicon: HALOT
  rationale: This idiom means according to each day's requirement or prescribed matter.
    A more literal rendering would sound wooden in English; 'as each day required'
    captures the sense accurately and readably.
- source_word: הַשּׁוֹעֲרִים
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  - the porters
  lexicon: HALOT
  rationale: This refers to those assigned to guard or attend the temple gates. 'Gatekeepers'
    is the clearest contemporary equivalent.
- source_word: לְשַׁעַר וָשָׁעַר
  chosen: for each gate
  alternatives:
  - for gate by gate
  - for every gate
  lexicon: HALOT
  rationale: The distributive expression means each gate individually. 'For each gate'
    is natural English and preserves the distributive force.
- source_word: מִצְוַת
  chosen: the commandment
  alternatives:
  - the command
  - the instruction
  lexicon: HALOT
  rationale: The noun denotes an authoritative command. 'Commandment' preserves the
    formal, authoritative tone and echoes biblical diction without becoming archaic
    in this context.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - God's man
  lexicon: HALOT
  rationale: This is a recognized biblical title for one specially commissioned by
    God. 'The man of God' is the standard and most transparent rendering.
