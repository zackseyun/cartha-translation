id: 2CH.8.2
reference: 2 Chronicles 8:2
source:
  edition: WLC
  text: וְ/הֶ/עָרִ֗ים אֲשֶׁ֨ר נָתַ֤ן חוּרָם֙ לִ/שְׁלֹמֹ֔ה בָּנָ֥ה שְׁלֹמֹ֖ה אֹתָ֑/ם
    וַ/יּ֥וֹשֶׁב שָׁ֖ם אֶת בְּנֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: As for the cities that Huram had given to Solomon, Solomon rebuilt them and
    settled the people of Israel there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Huram; traditionally Hiram.
    reason: alternative_reading
  - marker: b
    text: Or 'built them.' The Hebrew verb can mean either 'built' or, in context,
      'rebuilt/restored.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעָרִים
  chosen: As for the cities
  alternatives:
  - And the cities
  - Now the cities
  lexicon: HALOT
  rationale: The prefixed conjunction with the definite noun can be rendered simply
    'and the cities,' but in context it introduces a new item in the narrative summary.
    'As for the cities' gives natural English discourse flow without losing the referential
    force of the Hebrew.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Standard relative pronoun introducing the clause modifying 'cities.'
    'That' is the most natural modern English rendering.
- source_word: נָתַן
  chosen: had given
  alternatives:
  - gave
  lexicon: HALOT
  rationale: The qatal verb in this retrospective relative clause is well represented
    by the English past perfect, marking the giving as prior to Solomon's rebuilding.
- source_word: חוּרָם
  chosen: Huram
  alternatives:
  - Hiram
  lexicon: HALOT
  rationale: The Hebrew form here is חוּרָם, best transliterated 'Huram.' This follows
    the stated principle to transliterate names from the source text rather than conforming
    to familiar traditional English forms.
- source_word: לִשְׁלֹמֹה
  chosen: to Solomon
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object/recipient of the gift.
- source_word: בָּנָה
  chosen: rebuilt
  alternatives:
  - built
  lexicon: HALOT
  rationale: Although the verb basically means 'build,' in the context of already
    existing cities that were given over, English 'rebuilt' best conveys that Solomon
    restored or fortified them rather than founding entirely new cities.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct-object pronoun referring back to the cities.
- source_word: וַיּוֹשֶׁב
  chosen: settled
  alternatives:
  - caused to dwell
  - made to live
  lexicon: HALOT
  rationale: 'Hiphil of ישׁב is causative: Solomon caused people to dwell there. ''Settled''
    is concise, natural English that preserves the causative sense.'
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Locative adverb referring to the rebuilt cities.
- source_word: אֶת בְּנֵי יִשְׂרָאֵל
  chosen: the people of Israel
  alternatives:
  - the sons of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'the sons of Israel.' In this context it denotes Israelites
    generally, not specifically male descendants. 'The people of Israel' is gender-accurate
    to the referent while preserving the corporate sense.
