theological_decisions:
- issue: Implicit plural referent in Solomon's holiness rationale
  chosen_reading: The plural pronoun refers to the places/areas in David's house to
    which the ark had come, not to David's house in an abstract dynastic sense.
  alternative_readings:
  - The statement refers generally to David's house as holy because the ark came there
  - The text is slightly irregular and should be rendered more literally without supplying
    'places'
  rationale: The Hebrew says literally 'for holy are they, to which the ark of the
    LORD came.' Because the pronoun is plural, English needs either a supplied plural
    referent or an awkwardly literal rendering. Supplying 'the places' best accounts
    for the grammar and context without importing extra theology.
  doctrine_reference: 'Translation philosophy #3 and #6'
- issue: Meaning of אִשָּׁה in Solomon's statement
  chosen_reading: '''wife'' rather than the broader ''woman'''
  alternative_readings:
  - woman
  rationale: Although אִשָּׁה can be either 'woman' or 'wife,' Solomon is speaking
    of Pharaoh's daughter and his own domestic arrangements. 'Wife' is the contextually
    specific sense and avoids implying a broader ban on all women.
  doctrine_reference: 'Translation philosophy #1 and #6'
