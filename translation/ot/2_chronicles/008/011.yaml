id: 2CH.8.11
reference: 2 Chronicles 8:11
source:
  edition: WLC
  text: וְ/אֶת בַּת פַּרְעֹ֗ה הֶעֱלָ֤ה שְׁלֹמֹה֙ מֵ/עִ֣יר דָּוִ֔יד לַ/בַּ֖יִת אֲשֶׁ֣ר
    בָּֽנָה לָ֑/הּ כִּ֣י אָמַ֗ר לֹא תֵשֵׁ֨ב אִשָּׁ֥ה לִ/י֙ בְּ/בֵית֙ דָּוִ֣יד מֶֽלֶךְ
    יִשְׂרָאֵ֔ל כִּי קֹ֣דֶשׁ הֵ֔מָּה אֲשֶׁר בָּֽאָ֥ה אֲלֵי/הֶ֖ם אֲר֥וֹן יְהוָֽה־־־־־־־׃פ
translation:
  text: And Solomon brought Pharaoh’s daughter up from the city of David to the house
    that he had built for her, for he said, “No wife of mine shall live in the house
    of David king of Israel, because the places to which the ark of the LORD has come
    are holy.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'for holy are they to which the ark of the LORD has come';
      the translation makes the implied plural referent explicit as 'the places.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעֱלָה
  chosen: brought ... up
  alternatives:
  - brought
  - caused to go up
  - moved up
  lexicon: HALOT
  rationale: The Hiphil of עלה commonly means 'bring up' or 'cause to go up.' Since
    the movement is from the lower city area to another residence, 'brought ... up'
    preserves the directional nuance without sounding wooden.
- source_word: מֵעִיר דָּוִיד
  chosen: from the city of David
  alternatives:
  - out of the city of David
  lexicon: HALOT
  rationale: A straightforward geographical expression; 'city of David' is the standard
    and transparent rendering.
- source_word: לַבַּיִת אֲשֶׁר בָּנָה לָהּ
  chosen: to the house that he had built for her
  alternatives:
  - to the house he built for her
  - to the palace he had built for her
  lexicon: HALOT
  rationale: בַּיִת can mean 'house' or 'palace.' Here 'house' is retained as the
    more direct gloss, while context already implies a royal residence. The pluperfect-like
    English 'had built' fits the sequence naturally.
- source_word: לֹא תֵשֵׁב אִשָּׁה לִי
  chosen: No wife of mine shall live
  alternatives:
  - A woman shall not live for me
  - My wife shall not dwell
  - No woman shall dwell for me
  lexicon: HALOT
  rationale: אִשָּׁה can mean 'woman' or 'wife.' In context Solomon is speaking specifically
    of his own marital household, so 'wife' is the idiomatic and contextually precise
    choice. תֵשֵׁב from ישׁב is rendered 'shall live' rather than 'sit' or 'dwell'
    for natural English while preserving residential sense.
- source_word: בְּבֵית דָּוִיד מֶלֶךְ יִשְׂרָאֵל
  chosen: in the house of David king of Israel
  alternatives:
  - in David king of Israel's house
  - in the palace of David king of Israel
  lexicon: HALOT
  rationale: '''House'' is kept rather than ''palace'' for lexical transparency, though
    the referent is a royal residence associated with David.'
- source_word: קֹדֶשׁ הֵמָּה
  chosen: are holy
  alternatives:
  - are sacred
  - are a holy place
  lexicon: HALOT
  rationale: The predicate is plural ('they are holy'). 'Are holy' preserves the holiness
    language central to the rationale Solomon gives.
- source_word: אֲשֶׁר בָּאָה אֲלֵיהֶם אֲרוֹן יְהוָה
  chosen: the places to which the ark of the LORD has come
  alternatives:
  - because they are holy, where the ark of the LORD came
  - for those places are holy into which the ark of the LORD came
  lexicon: HALOT
  rationale: The plural pronoun הֵמָּה requires a plural referent, best understood
    elliptically as 'the places/areas' associated with David's house. Rendering the
    ellipsis explicitly in English avoids confusion and preserves the sense of the
    Hebrew. 'The LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
