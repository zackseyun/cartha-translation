id: 2CH.8.3
reference: 2 Chronicles 8:3
source:
  edition: WLC
  text: וַ/יֵּ֤לֶךְ שְׁלֹמֹה֙ חֲמָ֣ת צוֹבָ֔ה וַ/יֶּחֱזַ֖ק עָלֶֽי/הָ׃
translation:
  text: Then Solomon went to Hamath-zobah and subdued it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "prevailed over it" or "took control of it." The Hebrew idiom is literally
      "was strong over it."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - went against
  - marched to
  lexicon: HALOT
  rationale: The verb הלך in the waw-consecutive narrative form most basically means
    'went.' In this military-political context, English could expand to 'went against'
    or 'marched to,' but the Hebrew itself does not explicitly encode hostility in
    this verb, so the simpler 'went' best preserves the source while allowing the
    following verb to carry the conquest sense.
- source_word: חֲמָת צוֹבָה
  chosen: Hamath-zobah
  alternatives:
  - Hamath of Zobah
  - Hamath-zoba
  lexicon: HALOT
  rationale: The two place names function together as a compound toponym in this context.
    Rendering as 'Hamath-zobah' preserves the Hebrew naming structure in readable
    English. 'Hamath of Zobah' is possible, but the construct relationship is not
    explicit enough to require that expansion.
- source_word: וַיֶּחֱזַק עָלֶיהָ
  chosen: subdued it
  alternatives:
  - prevailed over it
  - took control of it
  - strengthened himself against it
  lexicon: HALOT
  rationale: The idiom חזק על commonly conveys gaining strength over, prevailing against,
    or establishing control over someone or something. In this royal campaign context,
    'subdued it' communicates the political-military result naturally in English.
    A more literal rendering such as 'strengthened himself over it' would be obscure,
    while 'prevailed over it' is possible but less idiomatic for a city or region.
