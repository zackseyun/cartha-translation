id: 2CH.8.18
reference: 2 Chronicles 8:18
source:
  edition: WLC
  text: וַ/יִּֽשְׁלַֽח ל/וֹ֩ חוּרָ֨ם בְּ/יַד עֲבָדָ֜י/ו אוניות וַ/עֲבָדִים֮ י֣וֹדְעֵי
    יָם֒ וַ/יָּבֹ֜אוּ עִם עַבְדֵ֤י שְׁלֹמֹה֙ אוֹפִ֔ירָ/ה וַ/יִּקְח֣וּ מִ/שָּׁ֔ם אַרְבַּע
    מֵא֥וֹת וַ/חֲמִשִּׁ֖ים כִּכַּ֣ר זָהָ֑ב וַ/יָּבִ֖יאוּ אֶל הַ/מֶּ֥לֶךְ שְׁלֹמֹֽה־־־־־׃פ
translation:
  text: And Huram sent him, by the hand of his servants, ships and servants knowledgeable
    about the sea. They went with Solomon’s servants to Ophir, took from there four
    hundred and fifty talents of gold, and brought them to King Solomon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'by the hand of his servants,' an idiom meaning 'through his servants.'
    reason: cultural_note
  - marker: b
    text: Or 'servants experienced at sea' or simply 'sailors.' The Hebrew reads literally
      'servants knowing the sea.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew has 'brought them'; English could also render 'brought it,' referring
      collectively to the gold.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard rendering of שלח in narrative prose. 'Sent' is natural and sufficiently
    formal.
- source_word: חוּרָם
  chosen: Huram
  alternatives:
  - Hiram
  rationale: Personal names are transliterated. 'Huram' follows the Hebrew form here,
    though 'Hiram' is a familiar conventional variant.
- source_word: בְּיַד עֲבָדָיו
  chosen: by the hand of his servants
  alternatives:
  - through his servants
  - by his servants
  lexicon: HALOT
  rationale: The idiom literally means agency mediated through persons. 'By the hand
    of' preserves the Hebrew flavor while remaining understandable.
- source_word: אֳנִיּוֹת
  chosen: ships
  alternatives:
  - boats
  - vessels
  lexicon: HALOT
  rationale: Refers to seagoing craft in this context; 'ships' best fits the maritime
    expedition to Ophir.
- source_word: וַעֲבָדִים יֹדְעֵי יָם
  chosen: servants knowledgeable about the sea
  alternatives:
  - sailors
  - servants experienced at sea
  - men who knew the sea
  lexicon: HALOT
  rationale: Literally 'servants knowing the sea.' I retained both their status as
    servants and their maritime expertise. 'Sailors' is possible but would omit the
    explicit עבדים.
- source_word: עִם עַבְדֵי שְׁלֹמֹה
  chosen: with Solomon’s servants
  alternatives:
  - with the servants of Solomon
  rationale: Straightforward construct relationship; possessive form is natural English.
- source_word: אוֹפִירָה
  chosen: to Ophir
  alternatives:
  - Ophirward
  rationale: The directional he indicates motion toward Ophir. English idiom is simply
    'to Ophir.'
- source_word: וַיִּקְחוּ מִשָּׁם
  chosen: took from there
  alternatives:
  - obtained from there
  lexicon: HALOT
  rationale: Common narrative verb לקח. 'Took' is direct and does not overinterpret
    the manner of acquisition.
- source_word: אַרְבַּע מֵאוֹת וַחֲמִשִּׁים כִּכַּר זָהָב
  chosen: four hundred and fifty talents of gold
  alternatives:
  - 450 talents of gold
  lexicon: HALOT
  rationale: Keeps the ancient unit 'talents' rather than converting to modern weight,
    preserving historical specificity.
- source_word: וַיָּבִיאוּ אֶל הַמֶּלֶךְ שְׁלֹמֹה
  chosen: and brought them to King Solomon
  alternatives:
  - and brought it to King Solomon
  lexicon: HALOT
  rationale: The object is the gold just mentioned. English may treat 'gold' as mass
    singular ('it'), but 'them' can refer to the talents/amount taken. I chose 'them'
    to reflect the plural verbal flow of the narrative and the countable unit 'talents.'
