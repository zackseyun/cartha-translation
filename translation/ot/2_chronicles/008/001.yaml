id: 2CH.8.1
reference: 2 Chronicles 8:1
source:
  edition: WLC
  text: וַ/יְהִ֞י מִ/קֵּ֣ץ עֶשְׂרִ֣ים שָׁנָ֗ה אֲשֶׁ֨ר בָּנָ֧ה שְׁלֹמֹ֛ה אֶת בֵּ֥ית
    יְהוָ֖ה וְ/אֶת בֵּיתֽ/וֹ׀־־׃
translation:
  text: And it came about at the end of twenty years, during which Solomon had built
    the house of the LORD and his own house,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his palace.' The Hebrew reads literally 'his house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it came about
  alternatives:
  - And it happened
  - Now it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive form of היה introduces a new narrative development.
    'And it came about' preserves the narrative transition in readable modern English
    without the archaic feel of 'it came to pass.'
- source_word: מִקֵּץ
  chosen: at the end of
  alternatives:
  - after
  - from the end of
  lexicon: HALOT
  rationale: The preposition מִ with קֵץ marks the point reached after a span of time.
    'At the end of' is the most natural and sufficiently formal rendering.
- source_word: עֶשְׂרִים שָׁנָה
  chosen: twenty years
  alternatives:
  - twenty year period
  lexicon: HALOT
  rationale: A straightforward temporal expression; 'twenty years' is idiomatic English.
- source_word: אֲשֶׁר
  chosen: during which
  alternatives:
  - when
  - that
  lexicon: HALOT
  rationale: Here אֲשֶׁר links the twenty-year period with Solomon's building activity.
    'During which' makes the temporal relationship explicit in natural English better
    than the more wooden 'which' or potentially ambiguous 'when.'
- source_word: בָּנָה
  chosen: had built
  alternatives:
  - built
  - was building
  lexicon: HALOT
  rationale: English past perfect best conveys that the building activity was completed
    by the end of the twenty-year period referenced in the clause.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  - the house of Yahweh
  lexicon: HALOT
  rationale: בַּיִת literally means 'house,' and retaining 'house' preserves the Hebrew
    expression. 'Temple' is interpretive though contextually true. Per doctrine, יְהוָה
    is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's mandated default for the divine name.
- source_word: בֵּיתוֹ
  chosen: his own house
  alternatives:
  - his house
  - his palace
  lexicon: HALOT
  rationale: The suffix marks possession by Solomon. 'His own house' clarifies the
    contrast with the LORD's house. 'Palace' is contextually plausible but not the
    lexical form here, so it is preserved as an alternative rather than used in the
    main text.
