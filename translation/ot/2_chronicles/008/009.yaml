id: 2CH.8.9
reference: 2 Chronicles 8:9
source:
  edition: WLC
  text: וּ/מִן בְּנֵי֙ יִשְׂרָאֵ֔ל אֲ֠שֶׁר לֹא נָתַ֧ן שְׁלֹמֹ֛ה לַ/עֲבָדִ֖ים לִ/מְלַאכְתּ֑/וֹ
    כִּי הֵ֜מָּה אַנְשֵׁ֤י מִלְחָמָה֙ וְ/שָׂרֵ֣י שָׁלִישָׁ֔י/ו וְ/שָׂרֵ֥י רִכְבּ֖/וֹ
    וּ/פָרָשָֽׁי/ו־־־׃פ
translation:
  text: But from the sons of Israel, Solomon did not make any slaves for his work,
    for they were men of war, and his officers, and the commanders of his chariots
    and his horsemen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'did not assign any of them as slaves for his labor.' The Hebrew expression
      refers to placing them in slave labor.
    reason: lexical_alternative
  - marker: c
    text: The term rendered 'officers' likely refers to elite military officials or
      aides; more specific renderings such as 'captains' are possible.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִן
  chosen: But from
  alternatives:
  - And from
  - But among
  lexicon: HALOT
  rationale: The conjunction plus preposition marks contrast with the previous verse,
    where non-Israelites were made forced laborers. 'But from' preserves both the
    connective and the adversative sense in context.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew expression and its ethnic-national
    force. 'Israelites' is possible, but 'sons of Israel' keeps the source texture
    and remains understandable.
- source_word: לֹא נָתַן ... לַעֲבָדִים
  chosen: did not make any slaves
  alternatives:
  - did not make them servants
  - did not assign them as slaves
  lexicon: HALOT
  rationale: The construction 'give to/for slaves' means to place into slave status
    or slave labor. In light of the translation philosophy on bonded labor terms,
    'slaves' better reflects the force of עֲבָדִים here than the softer 'servants.'
    'Make any slaves' is idiomatic English and fits the context of corvée labor in
    the surrounding verses.
- source_word: לִמְלַאכְתּוֹ
  chosen: for his work
  alternatives:
  - for his labor
  - for his service
  lexicon: HALOT
  rationale: מְלָאכָה here refers to labor/work assigned by Solomon. 'For his work'
    is natural English and broad enough to cover state labor obligations.
- source_word: כִּי הֵמָּה
  chosen: for they were
  alternatives:
  - because they were
  - for they themselves were
  lexicon: HALOT
  rationale: Introduces the reason Solomon did not enslave Israelites. 'For they were'
    is concise and preserves the explanatory force.
- source_word: אַנְשֵׁי מִלְחָמָה
  chosen: men of war
  alternatives:
  - warriors
  - fighting men
  lexicon: HALOT
  rationale: A fairly literal rendering that communicates military role. 'Warriors'
    is smoother, but 'men of war' preserves the Hebrew idiom and suits the register
    of historical narrative.
- source_word: שָׂרֵי שָׁלִישָׁיו
  chosen: his officers
  alternatives:
  - his captains
  - his adjutants
  - his commanders
  lexicon: HALOT
  rationale: שָׁלִישׁ is a difficult military-administrative term, often associated
    with elite officers or aides. 'His officers' is the clearest broad rendering in
    context, avoiding false precision while preserving rank.
- source_word: שָׂרֵי רִכְבּוֹ
  chosen: the commanders of his chariots
  alternatives:
  - the captains of his chariots
  - the officers over his chariots
  lexicon: HALOT
  rationale: The phrase denotes officials in charge of the chariot corps. 'Commanders
    of his chariots' is clear modern English and reflects the governing sense of שָׂרֵי.
- source_word: וּפָרָשָׁיו
  chosen: his horsemen
  alternatives:
  - his cavalrymen
  - his horse soldiers
  lexicon: HALOT
  rationale: פָרָשִׁים are horsemen/cavalry. 'Horsemen' is the standard and sufficiently
    transparent rendering, matching the military list.
