id: 2CH.8.4
reference: 2 Chronicles 8:4
source:
  edition: WLC
  text: וַ/יִּ֥בֶן אֶת תַּדְמֹ֖ר בַּ/מִּדְבָּ֑ר וְ/אֵת֙ כָּל עָרֵ֣י הַֽ/מִּסְכְּנ֔וֹת
    אֲשֶׁ֥ר בָּנָ֖ה בַּ/חֲמָֽת־־׃
translation:
  text: He built Tadmor in the wilderness, and all the storage cities that he built
    in Hamath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tadmor is traditionally identified with Palmyra.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: He built
  alternatives:
  - Then he built
  - And he built
  lexicon: HALOT
  rationale: Wayyiqtol of בנה narrates a past action in sequence. English simple past
    is the most natural rendering here; the conjunction nuance can be absorbed into
    the flow without forcing 'then' or 'and' into the main text.
- source_word: תַּדְמֹר
  chosen: Tadmor
  alternatives:
  - Palmyra
  lexicon: HALOT
  rationale: This is a proper place name, so by translation philosophy names are transliterated
    rather than translated. 'Palmyra' is a later Greek/Latin form and is better preserved,
    if at all, in a note rather than substituted into the text.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert terrain. 'Wilderness' is
    chosen because it is a standard biblical rendering and need not imply only sandy
    desert; it fits the geographic sense well.
- source_word: כָּל עָרֵי הַמִּסְכְּנוֹת
  chosen: all the storage cities
  alternatives:
  - all the store cities
  - all the supply cities
  - all the treasure cities
  lexicon: HALOT
  rationale: The construct phrase refers to cities used for storage/supplies. 'Storage
    cities' is clear modern English and reflects the administrative function better
    than the archaic 'store cities.'
- source_word: אֲשֶׁר בָּנָה
  chosen: that he built
  alternatives:
  - which he built
  lexicon: HALOT
  rationale: A straightforward relative clause referring back to the storage cities.
    'That' is idiomatic modern English.
- source_word: בַּחֲמָת
  chosen: in Hamath
  alternatives:
  - at Hamath
  - in the region of Hamath
  lexicon: HALOT
  rationale: Hamath is a place name. The preposition ב commonly corresponds to 'in'
    here. 'In Hamath' is sufficiently natural while leaving the exact territorial
    scope open.
