id: 2CH.8.5
reference: 2 Chronicles 8:5
source:
  edition: WLC
  text: וַ/יִּ֜בֶן אֶת בֵּ֤ית חוֹרוֹן֙ הָֽ/עֶלְי֔וֹן וְ/אֶת בֵּ֥ית חוֹר֖וֹן הַ/תַּחְתּ֑וֹן
    עָרֵ֣י מָצ֔וֹר חוֹמ֖וֹת דְּלָתַ֥יִם וּ/בְרִֽיחַ־־׃
translation:
  text: And he built Upper Beth-horon and Lower Beth-horon, fortified cities with
    walls, doors, and bars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fortress cities.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'doors'; this likely refers to the gate-doors of the fortified cities.
    reason: lexical_alternative
  - marker: c
    text: Or 'bars' could be rendered 'bolts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: And he built
  alternatives:
  - And he rebuilt
  lexicon: HALOT
  rationale: The waw-consecutive with בנה straightforwardly narrates a past action,
    'and he built.' While in some contexts בנה can imply rebuilding or fortifying
    existing sites, the verb itself does not require 'rebuilt' here; the fortification
    details are supplied later in the verse.
- source_word: בֵּית חוֹרוֹן הָעֶלְיוֹן
  chosen: Upper Beth-horon
  alternatives:
  - Beth-horon the upper
  lexicon: HALOT
  rationale: A place name, so transliterated rather than translated, with the adjective
    rendered idiomatically in English as 'Upper.' This distinguishes the paired towns
    by elevation.
- source_word: בֵּית חוֹרוֹן הַתַּחְתּוֹן
  chosen: Lower Beth-horon
  alternatives:
  - Beth-horon the lower
  lexicon: HALOT
  rationale: Parallel to the previous toponym; 'Lower' is the natural English rendering
    of the adjective in this geographic pairing.
- source_word: עָרֵי מָצוֹר
  chosen: fortified cities
  alternatives:
  - fortress cities
  - cities of fortification
  lexicon: HALOT
  rationale: The construct phrase denotes cities characterized by defensive strength.
    'Fortified cities' is clear modern English and preserves the military sense without
    awkward literalism.
- source_word: חוֹמוֹת
  chosen: with walls
  alternatives:
  - having walls
  lexicon: HALOT
  rationale: Rendered as part of an appositional/descriptive phrase explaining what
    made them fortified. 'With walls' is idiomatic and concise.
- source_word: דְּלָתַיִם
  chosen: doors
  alternatives:
  - gates
  lexicon: HALOT
  rationale: The noun normally means 'doors' or 'double doors.' Although city defenses
    involve gates, the Hebrew term here is not the common word for city gate (שׁער).
    Therefore 'doors' better reflects the source, likely referring to gate-doors in
    the fortifications.
- source_word: וּבְרִיחַ
  chosen: and bars
  alternatives:
  - and bolts
  lexicon: HALOT
  rationale: בריח refers to a bar or bolt used to secure doors/gates. 'Bars' fits
    the defensive-city context and pairs naturally with 'doors.' 'Bolts' is possible
    but slightly narrower.
