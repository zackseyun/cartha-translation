id: 2CH.8.13
reference: 2 Chronicles 8:13
source:
  edition: WLC
  text: וּ/בִ/דְבַר י֣וֹם בְּ/י֗וֹם לְ/הַעֲלוֹת֙ כְּ/מִצְוַ֣ת מֹשֶׁ֔ה לַ/שַּׁבָּתוֹת֙
    וְ/לֶ֣/חֳדָשִׁ֔ים וְ/לַ/מּ֣וֹעֲד֔וֹת שָׁל֥וֹשׁ פְּעָמִ֖ים בַּ/שָּׁנָ֑ה בְּ/חַ֧ג
    הַ/מַּצּ֛וֹת וּ/בְ/חַ֥ג הַ/שָּׁבֻע֖וֹת וּ/בְ/חַ֥ג הַ/סֻּכּֽוֹת־׃
translation:
  text: 'according to the daily requirement for offering up sacrifices, as Moses commanded,
    for the Sabbaths, the new moons, and the appointed feasts three times in the year:
    at the Feast of Unleavened Bread, at the Feast of Weeks, and at the Feast of Booths.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the rule for each day' (literally, 'according to the matter
      of a day on its day').
    reason: lexical_alternative
  - marker: b
    text: '''Feast of Weeks'' is later called ''Pentecost'' in Greek usage.'
    reason: cross_reference
  - marker: c
    text: Or 'Feast of Tabernacles'; Hebrew 'Booths.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִדְבַר יוֹם בְּיוֹם
  chosen: according to the daily requirement
  alternatives:
  - and by the matter of each day on its day
  - and according to the rule for every day
  lexicon: HALOT
  rationale: The idiom literally involves 'the matter/word of a day in its day' and
    denotes what was required each day. 'Daily requirement' captures the administrative-sacrificial
    sense in natural English without over-paraphrasing.
- source_word: לְהַעֲלוֹת
  chosen: for offering up sacrifices
  alternatives:
  - to offer up
  - to cause to ascend
  lexicon: HALOT
  rationale: The Hiphil of עלה in sacrificial context commonly means to offer up,
    especially burnt offerings or sacrificial offerings generally. 'Offering up sacrifices'
    makes the cultic sense explicit in English.
- source_word: כְּמִצְוַת מֹשֶׁה
  chosen: as Moses commanded
  alternatives:
  - according to the commandment of Moses
  lexicon: HALOT
  rationale: This phrase refers to Mosaic prescription. 'As Moses commanded' is slightly
    more idiomatic while preserving the authority and source of the command.
- source_word: לַשַּׁבָּתוֹת
  chosen: for the Sabbaths
  alternatives:
  - on the Sabbaths
  lexicon: HALOT
  rationale: The preposition here marks the occasions for the offerings. 'For the
    Sabbaths' fits the list of calendrical observances governed by the command.
- source_word: וְלֶחֳדָשִׁים
  chosen: the new moons
  alternatives:
  - the monthly observances
  - the beginnings of months
  lexicon: HALOT
  rationale: In cultic calendar language, חֳדָשִׁים here refers to new moon observances
    rather than months in general. 'New moons' is the standard and accurate rendering.
- source_word: וְלַמּוֹעֲדוֹת
  chosen: the appointed feasts
  alternatives:
  - the appointed times
  - the festivals
  lexicon: HALOT
  rationale: מוֹעֲדִים can mean appointed times broadly, but here the following apposition
    names the three pilgrimage festivals. 'Appointed feasts' preserves both calendrical
    appointment and festal character.
- source_word: שָׁלֹשׁ פְּעָמִים בַּשָּׁנָה
  chosen: three times in the year
  alternatives:
  - three times a year
  lexicon: HALOT
  rationale: A straightforward temporal expression. 'In the year' is slightly more
    formal and mirrors the Hebrew closely.
- source_word: בְּחַג הַמַּצּוֹת
  chosen: at the Feast of Unleavened Bread
  alternatives:
  - at the festival of unleavened bread
  lexicon: HALOT
  rationale: Standard rendering of the pilgrimage feast named in Torah legislation.
- source_word: וּבְחַג הַשָּׁבֻעוֹת
  chosen: at the Feast of Weeks
  alternatives:
  - at the festival of weeks
  - at Pentecost
  lexicon: HALOT
  rationale: The Hebrew names the feast as Weeks. 'Pentecost' would import the later
    Greek designation and is less appropriate in this OT context.
- source_word: וּבְחַג הַסֻּכּוֹת
  chosen: at the Feast of Booths
  alternatives:
  - at the Feast of Tabernacles
  - at the festival of shelters
  lexicon: HALOT
  rationale: סֻכּוֹת literally means booths/shelters. 'Feast of Booths' preserves
    the concrete Hebrew image better than the traditional but less transparent 'Tabernacles'.
