theological_decisions:
- issue: Rendering Israel's pilgrimage festivals in transparent English rather than
    traditional ecclesiastical forms
  chosen_reading: Feast of Unleavened Bread / Feast of Weeks / Feast of Booths
  alternative_readings:
  - Passover season / Pentecost / Tabernacles
  rationale: The Hebrew text names the feasts directly. Following the translation
    philosophy of original-language primacy and readable modern English, the main
    text uses transparent renderings. Traditional alternatives are preserved where
    useful.
  doctrine_reference: Translation philosophy §§1, 6
