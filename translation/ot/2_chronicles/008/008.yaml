id: 2CH.8.8
reference: 2 Chronicles 8:8
source:
  edition: WLC
  text: מִן בְּנֵי/הֶ֗ם אֲשֶׁ֨ר נוֹתְר֤וּ אַחֲרֵי/הֶם֙ בָּ/אָ֔רֶץ אֲשֶׁ֥ר לֹֽא כִלּ֖וּ/ם
    בְּנֵ֣י יִשְׂרָאֵ֑ל וַ/יַּעֲלֵ֤/ם שְׁלֹמֹה֙ לְ/מַ֔ס עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־־׃
translation:
  text: From their descendants who were left after them in the land—those whom the
    sons of Israel had not destroyed—Solomon conscripted them for forced labor, to
    this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites had not wiped out.' The Hebrew says 'the sons of Israel,'
      a standard national designation.
    reason: lexical_alternative
  - marker: b
    text: Or 'for labor levy.' The Hebrew term refers to compulsory state labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן בְּנֵיהֶם
  chosen: From their descendants
  alternatives:
  - From their sons
  - From their children
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of,' but in genealogical/national contexts
    commonly refers to descendants. 'Descendants' communicates the broader referent
    naturally in English.
- source_word: אֲשֶׁר נוֹתְרוּ אַחֲרֵיהֶם
  chosen: who were left after them
  alternatives:
  - who remained after them
  - who survived them
  lexicon: HALOT
  rationale: נוֹתְרוּ from יתר/נותר denotes remaining or being left over. 'Were left
    after them' preserves the passive/resultative sense and the temporal relation
    expressed by אַחֲרֵיהֶם.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ
  - in the country
  lexicon: HALOT
  rationale: '''The land'' is the standard rendering and fits the covenant-historical
    setting better than the more generic ''country.'''
- source_word: אֲשֶׁר לֹא כִלּוּם בְּנֵי יִשְׂרָאֵל
  chosen: those whom the sons of Israel had not destroyed
  alternatives:
  - whom the Israelites had not wiped out
  - whom the sons of Israel had not finished off
  lexicon: HALOT
  rationale: כלה in the Piel commonly means to complete, finish, consume, or destroy.
    In this conquest context, 'destroyed' best fits. 'Sons of Israel' is retained
    for gender-accurate/source-near consistency, though 'Israelites' is a viable smoother
    alternative.
- source_word: וַיַּעֲלֵם
  chosen: conscripted them
  alternatives:
  - brought them up
  - subjected them
  - made them serve
  lexicon: HALOT
  rationale: עלה literally means 'cause to go up,' but with לְמַס in this administrative
    context it idiomatically refers to imposing levy labor. 'Conscripted them' captures
    the causative-administrative force in clear English.
- source_word: לְמַס
  chosen: for forced labor
  alternatives:
  - for labor levy
  - for corvée
  - to taskwork
  lexicon: HALOT
  rationale: מַס denotes compulsory labor or levy service. 'Forced labor' is the clearest
    modern equivalent; 'corvée' is precise but too technical for the target readership.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  - to the present day
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom marking continuation up to the writer's
    present. 'To this day' is the natural English equivalent.
