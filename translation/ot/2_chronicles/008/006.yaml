id: 2CH.8.6
reference: 2 Chronicles 8:6
source:
  edition: WLC
  text: וְ/אֶֽת בַּעֲלָ֗ת וְ/אֵ֨ת כָּל עָרֵ֤י הַֽ/מִּסְכְּנוֹת֙ אֲשֶׁ֣ר הָי֣וּ לִ/שְׁלֹמֹ֔ה
    וְ/אֵת֙ כָּל עָרֵ֣י הָ/רֶ֔כֶב וְ/אֵ֖ת עָרֵ֣י הַ/פָּרָשִׁ֑ים וְ/אֵ֣ת כָּל חֵ֣שֶׁק
    שְׁלֹמֹ֗ה אֲשֶׁ֤ר חָשַׁק֙ לִ/בְנ֤וֹת בִּ/ירֽוּשָׁלִַ֨ם֙ וּ/בַ/לְּבָנ֔וֹן וּ/בְ/כֹ֖ל
    אֶ֥רֶץ מֶמְשַׁלְתּֽ/וֹ־־־׀־׃
translation:
  text: and Baalath, and all the storage cities that belonged to Solomon, and all
    the chariot cities, and the cities for horsemen, and all that Solomon desired
    to build in Jerusalem and in Lebanon and throughout all the land of his dominion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'store cities,' 'supply cities,' or possibly 'treasure cities.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all the desire of Solomon that he desired to build,' a cognate expression
      emphasizing Solomon's wish or pleasure.
    reason: lexical_alternative
  - marker: c
    text: Or 'the cities for horses'; the Hebrew more commonly refers to horsemen/cavalry.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲלָת
  chosen: Baalath
  alternatives:
  - Baalat
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per project
    philosophy for names.
- source_word: עָרֵי הַמִּסְכְּנוֹת
  chosen: storage cities
  alternatives:
  - store cities
  - supply cities
  - treasure cities
  lexicon: HALOT
  rationale: The phrase refers to cities used for storing provisions or supplies.
    'Storage cities' is clear modern English and avoids the archaic 'store cities'
    while not overstating the sense as specifically 'treasure'.
- source_word: אֲשֶׁר הָיוּ לִשְׁלֹמֹה
  chosen: that belonged to Solomon
  alternatives:
  - that were Solomon's
  - that Solomon had
  lexicon: HALOT
  rationale: Conveys possession in natural English. 'Belonged to Solomon' is slightly
    more explicit than 'were Solomon's' and fits the administrative context.
- source_word: עָרֵי הָרֶכֶב
  chosen: the chariot cities
  alternatives:
  - cities for chariots
  - chariot towns
  lexicon: HALOT
  rationale: A conventional and clear rendering for cities associated with chariot
    forces or their support infrastructure.
- source_word: עָרֵי הַפָּרָשִׁים
  chosen: the cities for horsemen
  alternatives:
  - the horsemen's cities
  - the cavalry cities
  - the cities for horses
  lexicon: HALOT
  rationale: פָּרָשִׁים ordinarily denotes horsemen/cavalry rather than horses themselves.
    'Cities for horsemen' preserves the lexical distinction from chariots without
    over-militarizing the phrase.
- source_word: כָּל חֵשֶׁק שְׁלֹמֹה אֲשֶׁר חָשַׁק
  chosen: all that Solomon desired
  alternatives:
  - all Solomon's desire
  - all that Solomon took pleasure in
  - every desire of Solomon
  lexicon: HALOT
  rationale: The Hebrew uses a cognate noun-verb construction emphasizing desire.
    English cannot reproduce the repetition naturally here, so 'all that Solomon desired'
    captures the sense idiomatically without unnecessary awkwardness.
- source_word: לִבְנוֹת
  chosen: to build
  alternatives:
  - to rebuild
  lexicon: HALOT
  rationale: The infinitive simply means 'to build'; nothing in the immediate wording
    requires 'rebuild'.
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: וּבַלְּבָנוֹן
  chosen: and in Lebanon
  lexicon: HALOT
  rationale: Geographical name, transliterated in standard English form.
- source_word: בְכֹל אֶרֶץ מֶמְשַׁלְתּוֹ
  chosen: throughout all the land of his dominion
  alternatives:
  - in all the land of his rule
  - throughout his whole realm
  - in all the territory under his dominion
  lexicon: HALOT
  rationale: מֶמְשָׁלָה denotes rule/dominion. 'Throughout all the land of his dominion'
    preserves both the territorial and governmental sense and reflects the Hebrew
    structure closely.
