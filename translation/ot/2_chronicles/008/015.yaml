id: 2CH.8.15
reference: 2 Chronicles 8:15
source:
  edition: WLC
  text: וְ/לֹ֣א סָרוּ֩ מִצְוַ֨ת הַ/מֶּ֜לֶךְ עַל הַ/כֹּהֲנִ֧ים וְ/הַ/לְוִיִּ֛ם לְ/כָל
    דָּבָ֖ר וְ/לָ/אֹצָרֽוֹת־־׃
translation:
  text: And they did not turn aside from the king’s command concerning the priests
    and the Levites in any matter, or concerning the treasuries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “and concerning the storehouses.” The Hebrew אֹצָרוֹת can refer to treasuries
      or storehouses; “treasuries” fits the temple-administrative context here.
    reason: lexical_alternative
lexical_decisions:
- source_word: סָרוּ
  chosen: did not turn aside
  alternatives:
  - did not depart
  - did not deviate
  lexicon: HALOT
  rationale: The verb סור commonly means to turn aside, depart, or deviate. 'Did not
    turn aside' preserves the concrete Hebrew idiom while remaining natural in English
    and fitting obedience to a command.
- source_word: מִצְוַת הַמֶּלֶךְ
  chosen: the king’s command
  alternatives:
  - the command of the king
  - the king’s order
  lexicon: HALOT
  rationale: מִצְוָה is 'command' or 'commandment.' In this administrative context,
    singular 'command' is the most natural rendering; 'order' is possible but slightly
    less transparent to the Hebrew noun.
- source_word: עַל
  chosen: concerning
  alternatives:
  - regarding
  - about
  - over
  lexicon: HALOT
  rationale: Here עַל introduces the sphere or subject matter of the command, not
    authority 'over' the priests and Levites. 'Concerning' best captures the sense
    that the command pertained to them.
- source_word: הַכֹּהֲנִים וְהַלְוִיִּם
  chosen: the priests and the Levites
  alternatives:
  - the priests and Levites
  lexicon: HALOT
  rationale: The Hebrew marks both groups distinctly with articles. Retaining 'the
    priests and the Levites' reflects the formal distinction important in Chronicles.
- source_word: לְכָל דָּבָר
  chosen: in any matter
  alternatives:
  - in every matter
  - for every matter
  lexicon: HALOT
  rationale: 'This phrase idiomatically means with respect to any/every matter. ''In
    any matter'' reads naturally in English and suits the negative construction: they
    did not deviate at all.'
- source_word: וְלָאֹצָרוֹת
  chosen: or concerning the treasuries
  alternatives:
  - and concerning the treasuries
  - or the storehouses
  lexicon: HALOT
  rationale: אֹצָרוֹת can denote treasuries or storehouses. In the temple-administrative
    context of Chronicles, 'treasuries' is the more precise term. The prefixed conjunction
    may be rendered 'and' formally, but English idiom after 'in any matter' is smoother
    with 'or concerning,' clarifying that the treasuries are an additional area in
    which the command was observed.
