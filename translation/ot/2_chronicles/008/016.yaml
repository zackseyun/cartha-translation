id: 2CH.8.16
reference: 2 Chronicles 8:16
source:
  edition: WLC
  text: וַ/תִּכֹּן֙ כָּל מְלֶ֣אכֶת שְׁלֹמֹ֔ה עַד הַ/יּ֛וֹם מוּסַ֥ד בֵּית יְהוָ֖ה וְ/עַד כְּלֹת֑/וֹ שָׁלֵ֖ם בֵּ֥ית יְהוָֽה־־־־׃ס
translation:
  text: Thus all the work of Solomon was prepared from the day the house of Yahweh was founded until it was finished. So the house of Yahweh was completed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all Solomon's work was prepared/set in order.' The Hebrew verb can carry the sense of being established, made ready, or set in order.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from the day of the founding of the house of the LORD until its completion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּכֹּן
  chosen: was established
  alternatives:
  - was prepared
  - was set in order
  - was made ready
  lexicon: HALOT
  rationale: From כון in the Niphal/wayyiqtol sense of being established, set up, or made firm. Here it summarizes the orderly completion and firm arrangement of Solomon's work rather than merely beginning it. 'Was established' preserves the passive/resultative force.
- source_word: כָּל מְלֶאכֶת שְׁלֹמֹה
  chosen: all the work of Solomon
  alternatives:
  - all Solomon's work
  - all the workmanship of Solomon
  lexicon: HALOT
  rationale: מְלָאכָה commonly denotes work, labor, or undertaking. 'All the work of Solomon' is natural English and broad enough to include the whole royal building project in context.
- source_word: עַד הַיּוֹם
  chosen: from the day
  alternatives:
  - up to the day
  - until the day
  lexicon: HALOT
  rationale: Although עַד often means 'until/up to,' in this construction with the following clause and the overall sense of duration, English reads more clearly with 'from the day ... until ...'. This reflects the temporal span intended by the Hebrew sentence.
- source_word: מוּסַד בֵּית יְהוָה
  chosen: the house of the LORD was founded
  alternatives:
  - the house of the LORD was laid as a foundation
  - the foundation of the house of the LORD was laid
  lexicon: HALOT
  rationale: מוּסַד is a noun related to foundation/founding. The clause refers to the founding or laying of the foundation of the temple. 'The house of the LORD was founded' is concise and idiomatic while preserving the building metaphor.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' Following doctrine, יְהוָה is rendered 'the LORD.' 'House' is retained rather than 'temple' to stay closer to the Hebrew, though the referent is the temple.
- source_word: וְעַד כְּלֹתוֹ
  chosen: until it was finished
  alternatives:
  - until its completion
  - until he finished it
  lexicon: HALOT
  rationale: כלה with 3ms suffix can denote the completion of the house/work. Given the immediate antecedent 'house of the LORD,' rendering the suffix as 'it' is the most natural English expression of the building's completion.
- source_word: שָׁלֵם
  chosen: was completed
  alternatives:
  - was finished
  - was whole/complete
  lexicon: HALOT
  rationale: שָׁלֵם here functions predicatively to state the completed state of the temple. 'Was completed' avoids awkward repetition while matching the sense of being whole/finished.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
