id: 2CH.11.10
reference: 2 Chronicles 11:10
source:
  edition: WLC
  text: וְ/אֶת צָרְעָה֙ וְ/אֶת אַיָּל֔וֹן וְ/אֶת חֶבְר֔וֹן אֲשֶׁ֥ר בִּ/יהוּדָ֖ה וּ/בְ/בִנְיָמִ֑ן עָרֵ֖י מְצֻרֽוֹת־־־׃
translation:
  text: and Zorah, Aijalon, and Hebron, which are in Judah and in Benjamin—fortified cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “fortified towns.”
    reason: lexical_alternative
  - marker: b
    text: Or ', fortified cities.'.
    reason: previous_rendering
lexical_decisions:
- source_word: צָרְעָה
  chosen: Zorah
  alternatives:
  - Zareah
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention rather than translated, in keeping with the philosophy to transliterate names.
- source_word: אַיָּלוֹן
  chosen: Aijalon
  alternatives:
  - Ayalon
  lexicon: HALOT
  rationale: Proper place name; standard English biblical transliteration is retained.
- source_word: חֶבְרוֹן
  chosen: Hebron
  lexicon: HALOT
  rationale: Proper place name; transliterated in its conventional English form.
- source_word: אֲשֶׁר
  chosen: which are
  alternatives:
  - that are
  - which were
  lexicon: HALOT
  rationale: Relative particle introducing a descriptive clause about the listed cities. English requires an explicit verb; present tense fits the geographic description in context better than a past-tense paraphrase.
- source_word: בִּיהוּדָה וּבְבִנְיָמִן
  chosen: in Judah and in Benjamin
  alternatives:
  - in Judah and Benjamin
  - belonging to Judah and Benjamin
  lexicon: HALOT
  rationale: The repeated prepositions are represented naturally in English. The phrase marks geographic/tribal location. 'In Judah and in Benjamin' preserves the Hebrew structure and avoids overinterpreting possession.
- source_word: עָרֵי מְצֻרוֹת
  chosen: fortified cities
  alternatives:
  - fortified towns
  - strong cities
  lexicon: HALOT
  rationale: Construct phrase meaning cities characterized by fortification. 'Fortified cities' is the most natural and standard rendering in modern English; 'strong cities' is too literal and less clear.
- source_word: וְאֶת ... וְאֶת ... וְאֶת
  chosen: and ... and ... and
  alternatives:
  - also ... also ... also
  lexicon: HALOT
  rationale: The repeated conjunction-plus-object marker continues the list from the previous verse. English omits the object marker and preserves the additive force with repeated 'and' in a natural list.
