id: 2CH.11.7
reference: 2 Chronicles 11:7
source:
  edition: WLC
  text: וְ/אֶת בֵּֽית צ֥וּר וְ/אֶת שׂוֹכ֖וֹ וְ/אֶת עֲדֻלָּֽם־־־־׃
translation:
  text: and Beth-zur, Soco, and Adullam;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Beth-zur ... Soco ... Adullam.'' English spellings of these place
      names vary in translations; ''Socoh'' is a common alternative for ''Soco.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  chosen: and
  alternatives:
  - also
  - namely
  lexicon: HALOT
  rationale: Here וְ plus the object marker אֶת introduces each item in a continuing
    list from the previous verse. In English, the object marker is not represented
    directly, so the natural rendering is simply the coordinating conjunction 'and'
    before each place name or as part of a smooth list.
- source_word: בֵּית צ֥וּר
  chosen: Beth-zur
  alternatives:
  - بيت-zur
  - Beth Zur
  lexicon: HALOT
  rationale: This is a proper place name, literally 'house of צור,' but per translation
    philosophy personal and place names are transliterated rather than translated.
    The conventional English transliteration is 'Beth-zur.'
- source_word: שׂוֹכ֖וֹ
  chosen: Soco
  alternatives:
  - Socoh
  - Sokoh
  - Socho
  lexicon: HALOT
  rationale: This is a place name. The Hebrew corresponds to a town elsewhere often
    rendered 'Socoh' or 'Sokhoh.' 'Soco' is a recognized English form in some Bible
    traditions, especially in Chronicles. A transliterated form is preferred over
    translating the name's possible meaning.
- source_word: עֲדֻלָּֽם
  chosen: Adullam
  lexicon: HALOT
  rationale: This is a well-known Judahite place name and is best represented by the
    standard English transliteration 'Adullam.'
