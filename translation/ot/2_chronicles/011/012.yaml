id: 2CH.11.12
reference: 2 Chronicles 11:12
source:
  edition: WLC
  text: וּ/בְ/כָל עִ֤יר וָ/עִיר֙ צִנּ֣וֹת וּ/רְמָחִ֔ים וַֽ/יְחַזְּקֵ֖/ם לְ/הַרְבֵּ֣ה
    מְאֹ֑ד וַ/יְהִי ל֖/וֹ יְהוּדָ֥ה וּ/בִנְיָמִֽן־־׃ס
translation:
  text: And in every city and city he put shields and spears, and he strengthened
    them very greatly; and Judah and Benjamin belonged to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats ''city'' distributively: ''in every city and city,'' emphasizing
      each individual city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/כָל עִיר וָ/עִיר
  chosen: in every city and city
  alternatives:
  - in every city
  - in each and every city
  lexicon: HALOT
  rationale: The distributive repetition עִיר וָעִיר is preserved rather literally
    as 'city and city' to reflect the Hebrew emphasis on each individual city. English
    is slightly unusual here, but it transparently mirrors the source. 'In every city'
    is smoother but loses the repetition.
- source_word: צִנּוֹת
  chosen: shields
  alternatives:
  - large shields
  - bucklers
  lexicon: HALOT
  rationale: צִנּוֹת refers to shields, often larger body-shields in military contexts.
    'Shields' is clear modern English; 'large shields' is possible but may over-specify
    in this verse without necessity.
- source_word: וּ/רְמָחִים
  chosen: spears
  alternatives:
  - lances
  lexicon: HALOT
  rationale: רְמָחִים is the standard term for spears. 'Spears' is the natural modern
    equivalent.
- source_word: וַֽ/יְחַזְּקֵם
  chosen: he strengthened them
  alternatives:
  - he made them strong
  - he fortified them
  lexicon: HALOT
  rationale: The verb חזק with 3mp suffix most naturally means 'he strengthened them,'
    referring back to the fortified cities. 'Fortified them' is contextually attractive,
    but the previous verse already used fortification language; here the text emphasizes
    making them stronger still.
- source_word: לְ/הַרְבֵּה מְאֹד
  chosen: very greatly
  alternatives:
  - to a very great degree
  - exceedingly
  lexicon: HALOT
  rationale: This infinitive-plus-adverb construction intensifies the action strongly.
    'Very greatly' preserves the emphatic force with relatively formal transparency.
    'Exceedingly' is smoother but slightly less explicit.
- source_word: וַ/יְהִי ל֖/וֹ יְהוּדָה וּ/בִנְיָמִן
  chosen: Judah and Benjamin belonged to him
  alternatives:
  - Judah and Benjamin were his
  - he had Judah and Benjamin
  lexicon: HALOT
  rationale: The idiom ויהי לו expresses possession or allegiance. 'Belonged to him'
    communicates that Judah and Benjamin were under Rehoboam's control. 'Were his'
    is more literal but less idiomatic in modern English.
