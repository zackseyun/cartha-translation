id: 2CH.11.11
reference: 2 Chronicles 11:11
source:
  edition: WLC
  text: וַ/יְחַזֵּ֖ק אֶת הַ/מְּצֻר֑וֹת וַ/יִּתֵּ֤ן בָּ/הֶם֙ נְגִידִ֔ים וְ/אֹצְר֥וֹת
    מַאֲכָ֖ל וְ/שֶׁ֥מֶן וָ/יָֽיִן־׃
translation:
  text: He strengthened the fortified places and put commanders in them, along with
    stores of food, oil, and wine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fortresses' or 'strongholds' for 'fortified places.'
    reason: lexical_alternative
  - marker: b
    text: Or 'leaders,' 'rulers,' or 'officers' for 'commanders.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term can refer either to 'storehouses' or to stored supplies;
      here the sense is provisions kept in reserve.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַזֵּק
  chosen: He strengthened
  alternatives:
  - He fortified
  - He made strong
  lexicon: HALOT
  rationale: From חזק in the piel/causative sense, indicating making something strong
    or secure. 'Strengthened' preserves the verbal action without redundantly repeating
    the fortress imagery already present in the object.
- source_word: הַמְּצֻרוֹת
  chosen: the fortified places
  alternatives:
  - the fortresses
  - the strongholds
  lexicon: HALOT
  rationale: The noun refers to fortified sites or strongholds. 'Fortified places'
    is slightly broader and fits the plural administrative/military context, while
    avoiding over-specification if not every site was a major fortress.
- source_word: וַיִּתֵּן בָּהֶם
  chosen: and put ... in them
  alternatives:
  - and placed ... in them
  - and appointed ... over them
  lexicon: HALOT
  rationale: נתן with ב marks placing or assigning within the fortified places. 'Put
    ... in them' is natural English and reflects the locative sense better than 'over
    them,' though the office itself implies authority.
- source_word: נְגִידִים
  chosen: commanders
  alternatives:
  - leaders
  - rulers
  - officers
  lexicon: HALOT
  rationale: נָגִיד can denote a leader, ruler, prince, or official. In this military-fortification
    context, 'commanders' best captures appointed authorities over fortified sites
    without implying royal status.
- source_word: וְאֹצְרוֹת
  chosen: along with stores of
  alternatives:
  - and storehouses of
  - and supplies of
  - and treasuries of
  lexicon: HALOT
  rationale: אֹצָרוֹת can mean storehouses, treasuries, or stored supplies. Because
    the following items are provisions rather than money, 'stores of' communicates
    stocked resources more idiomatically than 'treasuries.'
- source_word: מַאֲכָל
  chosen: food
  alternatives:
  - provisions
  - edible supplies
  lexicon: HALOT
  rationale: A general term for food or provisions. 'Food' is clear and natural; the
    provisioning sense is already supported by the context of stores.
- source_word: שֶׁמֶן
  chosen: oil
  lexicon: HALOT
  rationale: Standard rendering for שמן, here likely olive oil as a staple provision,
    but 'oil' is sufficient and faithful.
- source_word: יָיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering for יין. No contextual reason to substitute a broader
    term like 'drink.'
