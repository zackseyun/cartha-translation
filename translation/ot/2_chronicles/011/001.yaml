id: 2CH.11.1
reference: 2 Chronicles 11:1
source:
  edition: WLC
  text: וַ/יָּבֹ֣א רְחַבְעָם֮ יְרוּשָׁלִַם֒ וַ/יַּקְהֵל֩ אֶת בֵּ֨ית יְהוּדָ֜ה וּ/בִנְיָמִ֗ן
    מֵאָ֨ה וּ/שְׁמוֹנִ֥ים אֶ֛לֶף בָּח֖וּר עֹשֵׂ֣ה מִלְחָמָ֑ה לְ/הִלָּחֵם֙ עִם יִשְׂרָאֵ֔ל
    לְ/הָשִׁ֥יב אֶת הַ/מַּמְלָכָ֖ה לִ/רְחַבְעָֽם־־־׃פ
translation:
  text: When Rehoboam came to Jerusalem, he assembled the house of Judah and Benjamin,
    one hundred eighty thousand chosen warriors, to fight against Israel in order
    to restore the kingdom to Rehoboam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Judah and Benjamin'; Hebrew 'the house of Judah and Benjamin,' a corporate
      designation for the southern kingdom.
    reason: lexical_alternative
  - marker: b
    text: Or 'one hundred eighty thousand select men fit for war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: Qal wayyiqtol of בוא commonly denotes coming/entering. 'Came' is the
    most natural narrative rendering in English with Jerusalem as destination.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: וַיַּקְהֵל
  chosen: assembled
  alternatives:
  - gathered
  - convened
  lexicon: HALOT
  rationale: Hiphil of קהל here means to gather or muster people together. 'Assembled'
    fits both the military and political context.
- source_word: אֶת־בֵּית יְהוּדָה וּבִנְיָמִן
  chosen: the house of Judah and Benjamin
  alternatives:
  - Judah and Benjamin
  - the household of Judah and Benjamin
  lexicon: HALOT
  rationale: בֵּית with a tribal name often denotes the house/clan/political body.
    Retaining 'house' preserves the Hebrew idiom and the corporate sense, while 'Judah
    and Benjamin' alone would flatten that nuance.
- source_word: מֵאָה וּשְׁמוֹנִים אֶלֶף
  chosen: one hundred eighty thousand
  alternatives:
  - a hundred and eighty thousand
  rationale: Straightforward cardinal number rendered in contemporary English style.
- source_word: בָּחוּר
  chosen: chosen
  alternatives:
  - select
  - young
  lexicon: HALOT
  rationale: In military contexts בָּחוּר commonly refers to selected or choice men
    rather than merely young men. 'Chosen' best matches the sense of picked troops.
- source_word: עֹשֵׂה מִלְחָמָה
  chosen: warriors
  alternatives:
  - men fit for war
  - men of war
  - those who made war
  lexicon: HALOT
  rationale: Literally 'doing war' or 'making war.' 'Warriors' is a concise optimal-equivalence
    rendering that preserves the military sense without awkwardness.
- source_word: לְהִלָּחֵם עִם יִשְׂרָאֵל
  chosen: to fight against Israel
  alternatives:
  - to wage war with Israel
  - to fight with Israel
  lexicon: HALOT
  rationale: Though עִם can be rendered 'with,' in hostile contexts it means fighting
    against. 'Against Israel' makes the adversarial sense explicit for English readers.
- source_word: לְהָשִׁיב
  chosen: to restore
  alternatives:
  - to bring back
  - to return
  lexicon: HALOT
  rationale: Hiphil of שוב here expresses causing something to return. 'Restore' is
    idiomatic in English for regaining political control.
- source_word: הַמַּמְלָכָה
  chosen: the kingdom
  alternatives:
  - the kingship
  - the royal rule
  lexicon: HALOT
  rationale: מַמְלָכָה ordinarily denotes kingdom/realm. 'Kingdom' is the most natural
    and sufficiently broad rendering here.
- source_word: לִרְחַבְעָם
  chosen: to Rehoboam
  alternatives:
  - for Rehoboam
  rationale: The lamed marks the beneficiary/recipient of the restoration. 'To Rehoboam'
    preserves the directional nuance of restoring the kingdom back to him.
