theological_decisions:
- issue: Referent of 'Israel' after the schism
  chosen_reading: Retain 'Israel' in the main text for the northern kingdom, without
    interpretive expansion.
  alternative_readings:
  - the northern tribes
  - Israelite rebels
  rationale: The Hebrew text itself uses 'Israel' for the opposing polity. Preserving
    that wording avoids importing later interpretive labels while reflecting the chronicler's
    terminology.
