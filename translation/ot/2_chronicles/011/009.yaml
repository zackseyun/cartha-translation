id: 2CH.11.9
reference: 2 Chronicles 11:9
source:
  edition: WLC
  text: וְ/אֶת אֲדוֹרַ֥יִם וְ/אֶת לָכִ֖ישׁ וְ/אֶת עֲזֵקָֽה־־־׃
translation:
  text: Adoraim, Lachish, and Azekah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew repeats the conjunction and direct-object marker before each city
      name, emphasizing each item in the list individually.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדוֹרַיִם
  chosen: Adoraim
  alternatives:
  - Adorayim
  rationale: Proper place name; transliterated rather than translated in keeping with
    the stated philosophy to transliterate names. 'Adoraim' follows a standard English
    conventional form.
- source_word: לָכִישׁ
  chosen: Lachish
  rationale: Proper place name; transliterated by standard English convention.
- source_word: עֲזֵקָה
  chosen: Azekah
  alternatives:
  - Azekah
  rationale: Proper place name; transliterated rather than translated. 'Azekah' is
    the common English form.
- source_word: וְ/אֶת ... וְ/אֶת ... וְ/אֶת
  chosen: and ... and ... and
  alternatives:
  - with each direct-object marker left untranslated
  lexicon: HALOT
  rationale: The repeated conjunction plus direct-object marker introduces each item
    in a list dependent on the previous verse's verb ('he built'). In English, the
    direct-object marker is not represented, but the coordination is preserved naturally
    as a list with final 'and'.
