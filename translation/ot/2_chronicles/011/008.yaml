id: 2CH.11.8
reference: 2 Chronicles 11:8
source:
  edition: WLC
  text: וְ/אֶת גַּ֥ת וְ/אֶת מָרֵשָׁ֖ה וְ/אֶת זִֽיף־־־׃
translation:
  text: Gath, Mareshah, and Ziph.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְאֶת
  chosen: '[not separately translated; represented by the English list structure and
    conjunction]'
  alternatives:
  - and
  - also
  - namely
  lexicon: HALOT
  rationale: The particle אֵת marks the definite direct object, and with prefixed
    וְ links items in a series. In English, direct-object marking is not expressed,
    so the function is carried by simple coordination in the list.
- source_word: גַּת
  chosen: Gath
  lexicon: HALOT
  rationale: Proper place name; transliterated according to standard English convention
    rather than translated, in keeping with the philosophy of transliterating names.
- source_word: מָרֵשָׁה
  chosen: Mareshah
  alternatives:
  - Maresha
  lexicon: HALOT
  rationale: Proper place name. 'Mareshah' is the more familiar standard English transliteration
    for this Judean city; 'Maresha' is a possible simplified form but less common
    in Bible translation.
- source_word: זִיף
  chosen: Ziph
  lexicon: HALOT
  rationale: Proper place name; transliterated directly into standard English form.
