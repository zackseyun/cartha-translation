theological_decisions:
- issue: Genealogical designation of Maacah as 'daughter of Absalom'
  chosen_reading: Retain the literal wording 'the daughter of Absalom' in the main
    text
  alternative_readings:
  - the granddaughter/descendant of Absalom
  rationale: This is not a doctrinal issue but an interpretive/genealogical one. Since
    the Hebrew explicitly says 'daughter,' the translation preserves that wording
    rather than resolving a possible broader familial sense in the main text. The
    broader possibility is worth preserving in a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §3, §5
