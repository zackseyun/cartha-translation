id: 2CH.11.20
reference: 2 Chronicles 11:20
source:
  edition: WLC
  text: וְ/אַחֲרֶ֣י/הָ לָקַ֔ח אֶֽת מַעֲכָ֖ה בַּת אַבְשָׁל֑וֹם וַ/תֵּ֣לֶד ל֗/וֹ אֶת
    אֲבִיָּה֙ וְ/אֶת עַתַּ֔י וְ/אֶת זִיזָ֖א וְ/אֶת שְׁלֹמִֽית־־־־־־׃
translation:
  text: After her, he took Maacah the daughter of Absalom, and she bore him Abijah,
    Attai, Ziza, and Shelomith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'daughter of Absalom'; the term can sometimes denote a more remote
      female descendant, so some understand 'granddaughter of Absalom.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאַחֲרֶיהָ
  chosen: After her
  alternatives:
  - After that
  - Afterward
  lexicon: HALOT
  rationale: The phrase combines the preposition 'after' with a 3fs suffix, referring
    back to the previously mentioned wife. 'After her' is the most direct and contextually
    clear rendering in English.
- source_word: לָקַח
  chosen: he took
  alternatives:
  - he married
  lexicon: HALOT
  rationale: Literally 'he took.' In marital contexts this often implies taking a
    wife, but 'he took' preserves the Hebrew wording while remaining understandable
    in context.
- source_word: מַעֲכָה
  chosen: Maacah
  rationale: Personal name transliterated according to standard English convention,
    following the project's policy to transliterate names.
- source_word: בַּת אַבְשָׁלוֹם
  chosen: the daughter of Absalom
  alternatives:
  - daughter of Abishalom
  lexicon: HALOT
  rationale: The construct phrase is straightforward. 'Absalom' follows the standard
    English form of the name. Although genealogical usage can sometimes mean granddaughter
    or female descendant, the Hebrew here plainly says 'daughter of Absalom,' so the
    translation preserves the source wording.
- source_word: וַתֵּלֶד לוֹ
  chosen: and she bore him
  alternatives:
  - and she gave birth to for him
  - and she bore to him
  lexicon: HALOT
  rationale: Idiomatic English for ילד with indirect object suffix. 'Bore him' naturally
    conveys that she gave birth to his children.
- source_word: אֶת אֲבִיָּה וְאֶת עַתַּי וְאֶת זִיזָא וְאֶת שְׁלֹמִית
  chosen: Abijah, Attai, Ziza, and Shelomith
  rationale: These are personal names and are transliterated. The repeated object
    marker אֶת is not represented in English. The list is rendered with standard English
    punctuation and conjunction before the final name.
