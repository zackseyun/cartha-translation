id: 2CH.11.3
reference: 2 Chronicles 11:3
source:
  edition: WLC
  text: אֱמֹ֕ר אֶל רְחַבְעָ֥ם בֶּן שְׁלֹמֹ֖ה מֶ֣לֶךְ יְהוּדָ֑ה וְ/אֶל֙ כָּל יִשְׂרָאֵ֔ל
    בִּ/יהוּדָ֥ה וּ/בִנְיָמִ֖ן לֵ/אמֹֽר־־־׃
translation:
  text: Speak to Rehoboam son of Solomon, king of Judah, and to all Israel in Judah
    and Benjamin, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Say to Rehoboam son of Solomon, king of Judah, and to all Israel in
      Judah and Benjamin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר
  chosen: Speak
  alternatives:
  - Say
  lexicon: HALOT
  rationale: Imperative of אמר introducing a divine message to be delivered. 'Speak'
    is natural English here, while still preserving the direct command force; 'say'
    is possible but slightly less idiomatic with the following addressees.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard preposition marking the addressee of the speech.
- source_word: רְחַבְעָם
  chosen: Rehoboam
  rationale: Standard English transliteration of the personal name.
- source_word: בֶּן שְׁלֹמֹה
  chosen: son of Solomon
  alternatives:
  - the son of Solomon
  lexicon: HALOT
  rationale: Construct chain identifying Rehoboam by lineage. The article is not required
    in English.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - the king of Judah
  lexicon: HALOT
  rationale: Royal title in construct with Judah. English idiom does not require the
    article here in apposition to the name.
- source_word: וְאֶל כָּל יִשְׂרָאֵל
  chosen: and to all Israel
  alternatives:
  - and to all the Israelites
  lexicon: HALOT
  rationale: Retains the covenantal-national designation 'Israel' rather than converting
    it to the ethnonym 'Israelites.' In this context it refers to the people identified
    as Israel who are located within Judah and Benjamin.
- source_word: בִּיהוּדָה וּבִנְיָמִן
  chosen: in Judah and Benjamin
  alternatives:
  - of Judah and Benjamin
  lexicon: HALOT
  rationale: 'The preposition ב marks location: the Israelites addressed are those
    situated in the territories of Judah and Benjamin. ''In'' best reflects the Hebrew
    syntax and avoids implying tribal identity alone.'
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and say,
  lexicon: HALOT
  rationale: Infinitive construct of אמר introducing the content of the message in
    the next verse. Rendering it as 'saying,' preserves the linkage to the following
    quotation and matches common biblical English style.
