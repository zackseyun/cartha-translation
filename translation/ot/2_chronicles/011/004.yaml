- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton and aligns with reverential and traditional English Bible practice without obscuring that the covenant God is speaking.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Divine causation in מֵאִתִּי נִהְיָה הַדָּבָר הַזֶּה
  chosen_reading: for this thing has come from me
  alternative_readings:
  - for this matter is from me
  - for this thing has happened by me
  rationale: The Hebrew explicitly attributes the political division and present circumstance to God's agency. The translation preserves that theological claim without expanding it into a fuller doctrine of providence beyond the verse.
