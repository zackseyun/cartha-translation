id: 2CH.11.4
reference: 2 Chronicles 11:4
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֡ה לֹא תַעֲלוּ֩ וְ/לֹא תִלָּ֨חֲמ֜וּ עִם אֲחֵי/כֶ֗ם שׁ֚וּבוּ אִ֣ישׁ לְ/בֵית֔/וֹ כִּ֧י מֵֽ/אִתִּ֛/י נִהְיָ֖ה הַ/דָּבָ֣ר הַ/זֶּ֑ה וַֽ/יִּשְׁמְעוּ֙ אֶת דִּבְרֵ֣י יְהוָ֔ה וַ/יָּשֻׁ֖בוּ מִ/לֶּ֥כֶת אֶל יָרָבְעָֽם־־־־־׃פ
translation:
  text: 'Thus says Yahweh: You must not go up or fight against your brothers. Return, each man to his house, for this thing has come from me. So they listened to the words of Yahweh and turned back from going against Jeroboam.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for this matter is from me.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your brothers,' emphasizing that those opposed are fellow Israelites.
    reason: cultural_note
  - marker: c
    text: Or 'turned back from going to Jeroboam'; in context the movement is toward armed conflict, hence 'against Jeroboam.'
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - So says the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal force of divine speech. יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered according to the project's default for YHWH.
- source_word: לֹא תַעֲלוּ
  chosen: You must not go up
  alternatives:
  - Do not go up
  - You shall not go up
  lexicon: HALOT
  rationale: עלה literally means 'go up,' often used for military advance. Retaining 'go up' preserves the Hebrew idiom and likely movement toward battle without over-paraphrasing.
- source_word: וְלֹא תִלָּחֲמוּ
  chosen: or fight
  alternatives:
  - and do not fight
  - or wage war
  lexicon: HALOT
  rationale: לחם in the Niphal here refers to engaging in battle. 'Fight' is clear modern English and fits the prohibition.
- source_word: עִם אֲחֵיכֶם
  chosen: against your brothers
  alternatives:
  - with your brothers
  - against your kinsmen
  lexicon: HALOT
  rationale: Although עִם is literally 'with,' in battle contexts English idiom requires 'against.' 'Brothers' preserves the familial covenantal relationship emphasized in the Hebrew.
- source_word: שׁוּבוּ אִישׁ לְבֵיתוֹ
  chosen: Return, each man to his house
  alternatives:
  - Go back, each of you to his house
  - Return home, each man
  lexicon: HALOT
  rationale: שוב is 'return/turn back.' אִישׁ is distributive, so 'each man' reflects the masculine singular representative force in line with the project's gender-accurate policy.
- source_word: כִּי מֵאִתִּי נִהְיָה הַדָּבָר הַזֶּה
  chosen: for this thing has come from me
  alternatives:
  - for this matter is from me
  - for this thing has happened from me
  lexicon: HALOT
  rationale: The clause attributes the event to God's agency or ordination. 'This thing has come from me' is natural English while preserving the source-oriented sense of divine causation.
- source_word: וַיִּשְׁמְעוּ אֶת דִּבְרֵי יְהוָה
  chosen: So they listened to the words of the LORD
  alternatives:
  - And they obeyed the word of the LORD
  - And they heard the words of the LORD
  lexicon: HALOT
  rationale: שׁמע can mean hear or obey. Because the following clause shows compliance, 'listened to' captures both hearing and heeding without overstating beyond the text.
- source_word: וַיָּשֻׁבוּ מִלֶּכֶת אֶל יָרָבְעָם
  chosen: and turned back from going against Jeroboam
  alternatives:
  - and returned from going to Jeroboam
  - and turned back from marching against Jeroboam
  lexicon: HALOT
  rationale: The infinitive with אל plus the military context implies movement toward hostile action. 'Against Jeroboam' makes the sense explicit in idiomatic English while remaining grounded in context.
