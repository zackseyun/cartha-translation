id: 2CH.11.22
reference: 2 Chronicles 11:22
source:
  edition: WLC
  text: וַ/יַּֽעֲמֵ֨ד לָ/רֹ֧אשׁ רְחַבְעָ֛ם אֶת אֲבִיָּ֥ה בֶֽן מַעֲכָ֖ה לְ/נָגִ֣יד
    בְּ/אֶחָ֑י/ו כִּ֖י לְ/הַמְלִיכֽ/וֹ־־׃
translation:
  text: And Rehoboam appointed Abijah son of Maacah as chief, as ruler among his brothers,
    because he intended to make him king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over his brothers' for 'among his brothers'; the Hebrew preposition
      can be understood to mark his precedence in relation to them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֵד
  chosen: appointed
  alternatives:
  - set up
  - placed
  - established
  lexicon: HALOT
  rationale: The Hiphil of עמד here means to cause someone to stand in a position,
    idiomatically to appoint or install. 'Appointed' is natural modern English and
    fits the administrative context.
- source_word: לָרֹאשׁ
  chosen: as chief
  alternatives:
  - at the head
  - as head
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' but in leadership contexts it denotes chief
    position or primacy. 'As chief' conveys status clearly in English while preserving
    the metaphorical sense.
- source_word: אֶת אֲבִיָּה בֶן מַעֲכָה
  chosen: Abijah son of Maacah
  rationale: Personal names are transliterated per project philosophy. 'Son of Maacah'
    preserves the Hebrew filial construction straightforwardly.
- source_word: לְנָגִיד
  chosen: as ruler
  alternatives:
  - leader
  - prince
  lexicon: HALOT
  rationale: נָגִיד often denotes a leader, ruler, or prince, especially one designated
    for authority. 'As ruler' communicates delegated governing authority in accessible
    English. 'Prince' could suggest royal sonship rather than office, so it was not
    chosen for the main text.
- source_word: בְּאֶחָיו
  chosen: among his brothers
  alternatives:
  - over his brothers
  lexicon: HALOT
  rationale: The preposition ב can indicate position within a group or relation to
    it. Here the sense is that Abijah was given chief status in relation to his brothers.
    'Among his brothers' is a cautious rendering that preserves the familial group
    context without overstating direct domination.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: כִּי introduces the reason for Rehoboam's action. 'Because' is clearer
    in contemporary English than the more formal 'for.'
- source_word: לְהַמְלִיכוֹ
  chosen: he intended to make him king
  alternatives:
  - to make him king
  - to cause him to reign
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ל expresses purpose or intent.
    Given the narrative explanation, 'he intended to make him king' brings out the
    purposive nuance in idiomatic English. 'Make him king' is retained conceptually,
    and 'cause him to reign' is more wooden.
