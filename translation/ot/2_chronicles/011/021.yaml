theological_decisions:
- issue: Genealogical designation of Maacah as 'daughter of Absalom'
  chosen_reading: Retain the literal Hebrew 'daughter of Absalom' in the main text
  alternative_readings:
  - understood as a broader descendant term, e.g., 'granddaughter of Absalom'
  rationale: This is not a doctrinally weighty issue, but it is a significant interpretive
    question. Following original-language primacy and avoiding over-resolution, the
    main text keeps the Hebrew wording while a footnote preserves the possible broader
    genealogical sense.
  doctrine_reference: Translation philosophy §§1, 3, 5
