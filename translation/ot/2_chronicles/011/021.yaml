id: 2CH.11.21
reference: 2 Chronicles 11:21
source:
  edition: WLC
  text: וַ/יֶּאֱהַ֨ב רְחַבְעָ֜ם אֶת מַעֲכָ֣ה בַת אַבְשָׁל֗וֹם מִ/כָּל נָשָׁי/ו֙ וּ/פִ֣ילַגְשָׁ֔י/ו
    כִּ֠י נָשִׁ֤ים שְׁמוֹנֶֽה עֶשְׂרֵה֙ נָשָׂ֔א וּ/פִֽילַגְשִׁ֖ים שִׁשִּׁ֑ים וַ/יּ֗וֹלֶד
    עֶשְׂרִ֧ים וּ/שְׁמוֹנָ֛ה בָּנִ֖ים וְ/שִׁשִּׁ֥ים בָּנֽוֹת־־־־׃
translation:
  text: Rehoboam loved Maacah daughter of Absalom more than all his wives and his
    concubines, for he had taken eighteen wives and sixty concubines, and he fathered
    twenty-eight sons and sixty daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'descendant of Absalom'; Hebrew 'daughter' can sometimes be
      used more broadly in genealogical contexts.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֶּאֱהַב
  chosen: loved
  alternatives:
  - favored
  - loved more
  lexicon: HALOT
  rationale: The verb אהב straightforwardly denotes love/affection. The comparative
    sense is supplied by the following מִכָּל phrase, so 'loved' is kept here rather
    than building the comparison into the verb itself.
- source_word: בַת אַבְשָׁלוֹם
  chosen: daughter of Absalom
  alternatives:
  - granddaughter of Absalom
  lexicon: HALOT
  rationale: בת normally means 'daughter.' Although genealogical usage can sometimes
    be broader, the Hebrew expression itself is most naturally rendered 'daughter
    of Absalom.' A footnote preserves the possible broader familial sense because
    of the wider genealogical discussion in Chronicles/Kings.
- source_word: מִכָּל נָשָׁיו וּפִילַגְשָׁיו
  chosen: more than all his wives and his concubines
  alternatives:
  - above all his wives and concubines
  lexicon: HALOT
  rationale: מִכָּל marks comparison ('more than'). נָשִׁים is 'wives' in this marital
    context, and פִּילַגְשִׁים is best rendered 'concubines,' a distinct social category
    that should not be flattened into 'wives' or 'women.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - now
  lexicon: HALOT
  rationale: Here כִּי introduces explanatory background for the preceding statement,
    so 'for' fits the discourse flow in readable English.
- source_word: נָשִׁים ... נָשָׂא
  chosen: he had taken eighteen wives
  alternatives:
  - he married eighteen wives
  - he took eighteen wives
  lexicon: HALOT
  rationale: נשא with נשים is an idiom for taking/marrying wives. 'Had taken' preserves
    the lexical sense while sounding natural in English and fitting the explanatory
    clause.
- source_word: פִּילַגְשִׁים
  chosen: concubines
  lexicon: HALOT
  rationale: The term denotes secondary wives/concubines. 'Concubines' is the standard
    precise rendering and preserves the social distinction present in the Hebrew.
- source_word: וַיּוֹלֶד
  chosen: he fathered
  alternatives:
  - he begot
  - he had
  lexicon: HALOT
  rationale: For a male subject, ילד in the Hiphil/Hophal narrative usage is naturally
    rendered 'fathered' in contemporary English. 'Begot' is too archaic; 'had' is
    too vague.
- source_word: עֶשְׂרִים וּשְׁמוֹנָה בָּנִים
  chosen: twenty-eight sons
  lexicon: HALOT
  rationale: The cardinal numbers are combined idiomatically in English as 'twenty-eight.'
    בנים is literally 'sons.'
- source_word: וְשִׁשִּׁים בָּנוֹת
  chosen: sixty daughters
  lexicon: HALOT
  rationale: Straightforward numeric phrase; בנות is 'daughters.'
