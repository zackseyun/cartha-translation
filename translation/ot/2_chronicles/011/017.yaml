id: 2CH.11.17
reference: 2 Chronicles 11:17
source:
  edition: WLC
  text: וַֽ/יְחַזְּקוּ֙ אֶת מַלְכ֣וּת יְהוּדָ֔ה וַֽ/יְאַמְּצ֛וּ אֶת רְחַבְעָ֥ם בֶּן
    שְׁלֹמֹ֖ה לְ/שָׁנִ֣ים שָׁל֑וֹשׁ כִּ֣י הָֽלְכ֗וּ בְּ/דֶ֧רֶךְ דָּוִ֛יד וּ/שְׁלֹמֹ֖ה
    לְ/שָׁנִ֥ים שָׁלֽוֹשׁ־־־׃
translation:
  text: So they strengthened the kingdom of Judah and made Rehoboam son of Solomon
    strong for three years, because for three years they walked in the way of David
    and Solomon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strengthened Rehoboam.' The Hebrew verb can be rendered similarly to
      the previous verb, but the wording here is varied in English to avoid unnecessary
      repetition while preserving the sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַזְּקוּ
  chosen: they strengthened
  alternatives:
  - they made strong
  - they fortified
  lexicon: HALOT
  rationale: From חזק in the piel, with the sense of strengthening or making firm.
    'Strengthened' is natural English and preserves the causative force without over-specifying
    military fortification.
- source_word: מַלְכוּת יְהוּדָה
  chosen: the kingdom of Judah
  alternatives:
  - the kingship of Judah
  - Judah's kingdom
  lexicon: HALOT
  rationale: מַלְכוּת can denote kingship/royal rule or kingdom. Here the political
    entity is in view, so 'the kingdom of Judah' best fits the context.
- source_word: וַיְאַמְּצוּ
  chosen: made ... strong
  alternatives:
  - strengthened
  - encouraged
  - supported
  lexicon: HALOT
  rationale: אמץ in the piel means to make strong, strengthen, or encourage. Because
    חזק already appears earlier in the verse, varying the English avoids awkward repetition
    while preserving the same semantic field. The direct object is Rehoboam himself,
    so 'made Rehoboam ... strong' fits better than 'encouraged'.
- source_word: רְחַבְעָם בֶּן שְׁלֹמֹה
  chosen: Rehoboam son of Solomon
  alternatives:
  - Rehoboam, the son of Solomon
  rationale: Personal names are transliterated by standard convention. The filial
    expression is retained straightforwardly.
- source_word: לְשָׁנִים שָׁלוֹשׁ
  chosen: for three years
  alternatives:
  - during three years
  lexicon: HALOT
  rationale: The preposition ל with a duration expression is naturally rendered 'for'
    in English.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the strengthening described earlier. 'Because'
    makes the causal relation explicit in contemporary English.
- source_word: הָלְכוּ
  chosen: they walked
  alternatives:
  - they lived
  - they followed
  lexicon: HALOT
  rationale: הלך with 'in the way of' is a common idiom for conduct. 'Walked' preserves
    the biblical metaphor and remains readable.
- source_word: בְּדֶרֶךְ דָּוִיד וּשְׁלֹמֹה
  chosen: in the way of David and Solomon
  alternatives:
  - in the ways of David and Solomon
  - in the path of David and Solomon
  lexicon: HALOT
  rationale: The singular 'way' with two names likely denotes the pattern exemplified
    by both rulers. 'In the way of David and Solomon' is the most direct rendering
    of the idiom.
- source_word: לְשָׁנִים שָׁלוֹשׁ
  chosen: for three years
  alternatives:
  - during three years
  lexicon: HALOT
  rationale: 'The repeated duration phrase is retained in translation because it is
    present in the Hebrew and contributes emphasis: the period of fidelity explains
    the period of strengthening.'
