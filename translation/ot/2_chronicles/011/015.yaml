id: 2CH.11.15
reference: 2 Chronicles 11:15
source:
  edition: WLC
  text: וַ/יַּֽעֲמֶד ל/וֹ֙ כֹּֽהֲנִ֔ים לַ/בָּמ֖וֹת וְ/לַ/שְּׂעִירִ֑ים וְ/לָ/עֲגָלִ֖ים
    אֲשֶׁ֥ר עָשָֽׂה־׃
translation:
  text: And he appointed for himself priests for the high places, for the goat-demons,
    and for the calves that he had made.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'satyrs' or 'goats' for 'goat-demons.' The Hebrew term can refer to goat-like
      beings associated with illicit worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֶד
  chosen: appointed
  alternatives:
  - installed
  - set up
  lexicon: HALOT
  rationale: In this causative/establishing context with priests as the object, the
    verb means to appoint or install into office rather than merely to make stand.
- source_word: לּוֹ
  chosen: for himself
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The dative indicates Jeroboam acted in his own interest, so 'for himself'
    brings out the reflexive sense naturally in English.
- source_word: כֹּהֲנִים
  chosen: priests
  lexicon: HALOT
  rationale: Standard rendering for the cultic office.
- source_word: לַבָּמוֹת
  chosen: for the high places
  alternatives:
  - for the shrines
  lexicon: HALOT
  rationale: בָּמוֹת commonly refers to high places, that is, elevated cult sites.
    'High places' preserves the established biblical term and the likely referent.
- source_word: לַשְּׂעִירִים
  chosen: for the goat-demons
  alternatives:
  - for the goats
  - for the satyrs
  lexicon: HALOT
  rationale: In cultic contexts שְׂעִירִים can denote goat-shaped demonic beings or
    satyr-like idols rather than literal goats. Given the list of illicit worship
    objects here, 'goat-demons' best conveys the likely sense without mythologizing
    beyond the Hebrew.
- source_word: וְלָעֲגָלִים
  chosen: and for the calves
  alternatives:
  - and for the calf-idols
  lexicon: HALOT
  rationale: The term means calves; in context these are cult images associated with
    Jeroboam's worship system. The plain noun is retained, with the idolatrous sense
    supplied by context.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he had made
  alternatives:
  - which he made
  lexicon: HALOT
  rationale: English past perfect fits the relative clause referring back to cult
    objects already made prior to the appointment of priests.
