theological_decisions:
- issue: Rendering of שְׂעִירִים in an idolatrous cultic context
  chosen_reading: goat-demons
  alternative_readings:
  - goats
  - satyrs
  rationale: The verse lists unauthorized worship sites and objects established by
    Jeroboam. In this context, a demonic/idolatrous referent is more likely than literal
    animals. 'Goat-demons' communicates the probable sense while remaining transparent
    to the Hebrew imagery.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it beyond the text'
