id: 2CH.11.19
reference: 2 Chronicles 11:19
source:
  edition: WLC
  text: וַ/תֵּ֥לֶד ל֖/וֹ בָּנִ֑ים אֶת יְע֥וּשׁ וְ/אֶת שְׁמַרְיָ֖ה וְ/אֶת זָֽהַם־־־׃
translation:
  text: 'And she bore him sons: Jeush, Shemariah, and Zaham.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתֵּלֶד
  chosen: And she bore
  alternatives:
  - And she gave birth
  - And she bore
  lexicon: HALOT
  rationale: Wayyiqtol of ילד introduces the next event in the narrative. 'Bore' is
    concise, idiomatic in genealogical contexts, and preserves the maternal subject
    without unnecessary expansion.
- source_word: לוֹ
  chosen: him
  alternatives:
  - to him
  - for him
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix here marks the father in a birth
    formula. English idiom normally expresses this as 'bore him' rather than the more
    wooden 'bore to him'.
- source_word: בָּנִים
  chosen: sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'sons,' and the following three named offspring
    are male. This follows the gender-accurate principle rather than neutralizing
    to 'children'.
- source_word: אֶת יְעוּשׁ
  chosen: Jeush
  alternatives:
  - Jeush
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: שְׁמַרְיָה
  chosen: Shemariah
  alternatives:
  - Shemariahu
  lexicon: HALOT
  rationale: Standard English biblical transliteration favors 'Shemariah.' A more
    Hebraizing form such as 'Shemariahu' is possible but less conventional in English
    Bible style.
- source_word: זָהַם
  chosen: Zaham
  alternatives:
  - Zaham
  lexicon: HALOT
  rationale: Personal name transliterated directly and conventionally.
