id: 2CH.11.23
reference: 2 Chronicles 11:23
source:
  edition: WLC
  text: וַ/יָּבֶן֩ וַ/יִּפְרֹ֨ץ מִ/כָּל בָּנָ֜י/ו לְֽ/כָל אַרְצ֧וֹת יְהוּדָ֣ה וּ/בִנְיָמִ֗ן
    לְ/כֹל֙ עָרֵ֣י הַ/מְּצֻר֔וֹת וַ/יִּתֵּ֥ן לָ/הֶ֛ם הַ/מָּז֖וֹן לָ/רֹ֑ב וַ/יִּשְׁאַ֖ל
    הֲמ֥וֹן נָשִֽׁים־־׃
translation:
  text: He acted wisely and distributed some of all his sons throughout all the lands
    of Judah and Benjamin, to all the fortified cities; and he gave them abundant
    provisions and sought many wives for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He showed understanding' or 'He acted with discernment.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew likely means that he dispersed or stationed some of his sons
      throughout the fortified cities, not that every son was sent to every location.
    reason: lexical_alternative
  - marker: c
    text: That is, he arranged marriages for his sons; the Hebrew literally says 'and
      he sought a multitude of wives.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֶן
  chosen: He acted wisely
  alternatives:
  - He understood
  - He showed discernment
  lexicon: HALOT
  rationale: From בין in the Hiphil/causative-derived sense of showing understanding
    or acting with insight. In context of royal administration, an idiomatic English
    rendering is 'acted wisely' rather than the overly literal 'understood.'
- source_word: וַיִּפְרֹץ מִכָּל בָּנָיו
  chosen: distributed some of all his sons
  alternatives:
  - scattered his sons
  - spread out his sons
  - dealt forcefully with all his sons
  lexicon: HALOT
  rationale: פרץ can denote breaking out/spreading abroad. Here, with מן + 'all his
    sons' and followed by locations, the sense is that he dispersed or distributed
    them geographically. 'Some of all his sons' reflects the partitive force of מן
    without implying every son went to every place.
- source_word: לְכָל אַרְצוֹת יְהוּדָה וּבִנְיָמִן
  chosen: throughout all the lands of Judah and Benjamin
  alternatives:
  - throughout all the districts of Judah and Benjamin
  - into all the regions of Judah and Benjamin
  lexicon: HALOT
  rationale: אֲרָצוֹת literally means 'lands/regions.' In this administrative context
    it refers to territorial areas within Judah and Benjamin, not separate countries.
    'Lands' preserves the Hebrew form while remaining understandable.
- source_word: לְכֹל עָרֵי הַמְּצֻרוֹת
  chosen: to all the fortified cities
  alternatives:
  - to every fortified city
  lexicon: HALOT
  rationale: מְצֻרוֹת denotes fortified or stronghold cities. The plural collective
    is naturally rendered 'all the fortified cities.'
- source_word: וַיִּתֵּן לָהֶם הַמָּזוֹן לָרֹב
  chosen: he gave them abundant provisions
  alternatives:
  - he gave them food in abundance
  - he supplied them with much sustenance
  lexicon: HALOT
  rationale: מָזוֹן is provision/food/sustenance. 'Abundant provisions' captures both
    the concrete and administrative sense; לָרֹב adds the idea of abundance.
- source_word: וַיִּשְׁאַל הֲמוֹן נָשִׁים
  chosen: sought many wives for them
  alternatives:
  - obtained many wives for them
  - asked for many wives
  lexicon: HALOT
  rationale: שׁאל commonly means ask/request/seek. In marriage-arrangement context,
    'sought ... for them' best fits the likely sense that Rehoboam procured or arranged
    many wives for his sons. 'For them' is supplied from context, since the preceding
    plural object 'them' naturally carries over.
