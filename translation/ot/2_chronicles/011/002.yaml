id: 2CH.11.2
reference: 2 Chronicles 11:2
source:
  edition: WLC
  text: וַ/יְהִי֙ דְּבַר יְהוָ֔ה אֶל שְׁמַֽעְיָ֥הוּ אִישׁ הָ/אֱלֹהִ֖ים לֵ/אמֹֽר־־־׃
translation:
  text: But the word of the LORD came to Shemaiah the man of God, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  chosen: But ... came
  alternatives:
  - And ... came
  - Now ... came
  - And it happened
  lexicon: HALOT
  rationale: The waw-consecutive on היה introduces the next event in narrative sequence.
    In English, the idiom is best carried by a simple narrative transition rather
    than the wooden 'and it happened.' 'But' fits the immediate context, where this
    divine word interrupts Rehoboam's military response in the preceding verse.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - a word from the LORD
  lexicon: HALOT
  rationale: This is a standard prophetic formula. 'The word of the LORD' preserves
    the recognizable idiom and the construct relationship. YHWH is rendered 'the LORD'
    per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Simple directional preposition indicating the recipient of the divine
    word.
- source_word: שְׁמַעְיָהוּ
  chosen: Shemaiah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - a man of God
  - God's man
  lexicon: HALOT
  rationale: The phrase is a recognized title for a prophetic figure. The article
    supports 'the man of God' here, likely identifying Shemaiah by his known role
    rather than describing him indefinitely.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: Standard introduction to direct speech; 'saying' is natural and formally
    close.
