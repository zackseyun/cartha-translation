id: 2CH.11.16
reference: 2 Chronicles 11:16
source:
  edition: WLC
  text: וְ/אַחֲרֵי/הֶ֗ם מִ/כֹּל֙ שִׁבְטֵ֣י יִשְׂרָאֵ֔ל הַ/נֹּֽתְנִים֙ אֶת לְבָבָ֔/ם
    לְ/בַקֵּ֕שׁ אֶת יְהוָ֖ה אֱלֹהֵ֣י יִשְׂרָאֵ֑ל בָּ֚אוּ יְר֣וּשָׁלִַ֔ם לִ/זְבּ֕וֹחַ
    לַ/יהוָ֖ה אֱלֹהֵ֥י אֲבוֹתֵי/הֶֽם־־׃
translation:
  text: And after them, from all the tribes of Israel, those who set their hearts
    to seek the LORD, the God of Israel, came to Jerusalem to sacrifice to the LORD,
    the God of their fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''those giving their heart''; the idiom means to set or devote
      one''s heart to seek the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'went to Jerusalem.' Hebrew commonly uses the same verb for 'come' and
      'go,' with the choice shaped by narrative viewpoint.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרֵיהֶם
  chosen: And after them
  alternatives:
  - After them
  - Following them
  lexicon: HALOT
  rationale: Introduces sequence from the previous verse, referring to those who had
    already gone over to Rehoboam. 'And after them' preserves the connective וְ and
    the temporal/sequential sense of אַחֲרֵי.
- source_word: מִכֹּל שִׁבְטֵי יִשְׂרָאֵל
  chosen: from all the tribes of Israel
  alternatives:
  - out of all the tribes of Israel
  lexicon: HALOT
  rationale: מִן marks source/origin; 'from all the tribes of Israel' is natural English
    and preserves the comprehensive scope.
- source_word: הַנֹּתְנִים אֶת לְבָבָם
  chosen: those who set their hearts
  alternatives:
  - those who gave their hearts
  - those who devoted their hearts
  lexicon: HALOT
  rationale: Literally 'the ones giving their heart.' In Hebrew idiom this means directing
    or firmly committing one's inner will. 'Set their hearts' is a standard, accurate
    English equivalent that preserves intentionality without sounding wooden.
- source_word: לְבַקֵּשׁ
  chosen: to seek
  alternatives:
  - to seek after
  lexicon: HALOT
  rationale: בקש in this religious context means to seek God, not merely to look for
    information. 'To seek' is the most direct and idiomatic rendering.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    This also matches established English Bible convention for YHWH.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct phrase identifying YHWH specifically as Israel's God. Straightforward
    formal rendering is best.
- source_word: בָּאוּ יְרוּשָׁלִַם
  chosen: came to Jerusalem
  alternatives:
  - went to Jerusalem
  lexicon: HALOT
  rationale: בוא commonly means 'come/go' depending on viewpoint. Since the narrative
    focal point is Judah/Jerusalem, 'came to Jerusalem' is the more natural English
    rendering.
- source_word: לִזְבּוֹחַ
  chosen: to sacrifice
  alternatives:
  - to offer sacrifices
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To sacrifice' is concise and accurate;
    'to offer sacrifices' is slightly more explicit but less direct.
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  chosen: the God of their fathers
  alternatives:
  - the God of their ancestors
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'fathers.' Per gender-accurate policy, this
    should be preserved rather than neutralized to 'ancestors,' since the phrase is
    a covenantal formula with traditional resonance.
