theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Per DOCTRINE.md contested
    terms, YHWH is rendered 'the LORD' in the main text, while alternatives may be
    noted but not adopted as default.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered covenant formula אֱלֹהֵי אֲבוֹתֵיהֶם
  chosen_reading: the God of their fathers
  alternative_readings:
  - the God of their ancestors
  rationale: The Hebrew uses the masculine plural 'fathers' in a conventional covenantal
    expression. Per translation philosophy, gender-accurate rendering is preferred
    over gender-neutral smoothing.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
