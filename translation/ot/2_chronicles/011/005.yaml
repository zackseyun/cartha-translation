id: 2CH.11.5
reference: 2 Chronicles 11:5
source:
  edition: WLC
  text: וַ/יֵּ֥שֶׁב רְחַבְעָ֖ם בִּ/ירוּשָׁלִָ֑ם וַ/יִּ֧בֶן עָרִ֛ים לְ/מָצ֖וֹר בִּ/יהוּדָֽה׃
translation:
  text: Rehoboam lived in Jerusalem, and he built cities for defense in Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fortified cities' or 'cities as fortresses'; the Hebrew says literally
      'cities for defense/fortification.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: The verb ישב commonly means 'sit, dwell, live, remain.' In this narrative
    context, 'lived' gives natural modern English while preserving the sense that
    Rehoboam resided in Jerusalem. 'Dwelt' is more formal/archaic; 'settled' could
    imply a transition not explicit here.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative prepositional phrase. The personal name is transliterated
    by standard English convention.
- source_word: וַיִּבֶן
  chosen: built
  alternatives:
  - fortified
  lexicon: HALOT
  rationale: The verb בנה means 'build.' Although the context is military and the
    following phrase explains defensive purpose, the Hebrew verb itself is not 'fortify'
    but 'build,' so the more literal rendering is preferred.
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: The plural of עִיר is most naturally 'cities.' 'Towns' is possible in
    some contexts, but 'cities' is the standard rendering and fits the Chronicler's
    administrative/military geography.
- source_word: לְמָצוֹר
  chosen: for defense
  alternatives:
  - as fortresses
  - for fortification
  - for a siege defense
  lexicon: HALOT
  rationale: מָצוֹר can denote fortification, stronghold, or siege-related defense.
    Here it describes the purpose of the cities Rehoboam built. 'For defense' is clear
    modern English and captures the functional sense without over-specifying beyond
    the Hebrew. The more concrete alternative 'as fortresses' is plausible but slightly
    more interpretive.
- source_word: בִּיהוּדָה
  chosen: in Judah
  lexicon: HALOT
  rationale: Simple locative phrase indicating the region where the cities were built.
