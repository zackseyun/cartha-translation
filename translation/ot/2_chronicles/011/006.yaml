id: 2CH.11.6
reference: 2 Chronicles 11:6
source:
  edition: WLC
  text: וַ/יִּ֧בֶן אֶת בֵּֽית לֶ֛חֶם וְ/אֶת עֵיטָ֖ם וְ/אֶת תְּקֽוֹעַ־־־־׃
translation:
  text: And he built Bethlehem, Etam, and Tekoa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Tekoah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: built
  alternatives:
  - fortified
  - rebuilt
  lexicon: HALOT
  rationale: The verb בנה in the Qal wayyiqtol normally means 'built.' In the immediate
    context (Rehoboam strengthening cities), English 'built' is the plain lexical
    sense and can naturally include construction or development of fortified sites
    without importing extra detail not explicit in this verse. 'Fortified' is contextually
    possible but belongs more clearly to the surrounding verses than to this verb
    itself.
- source_word: אֶת
  chosen: '[not translated]'
  lexicon: Hebrew grammar
  rationale: Direct-object marker with no independent English equivalent; omitted
    in natural English translation.
- source_word: בֵּית לֶחֶם
  chosen: Bethlehem
  alternatives:
  - Beth-lehem
  lexicon: HALOT
  rationale: Proper place name; per translation philosophy, names are transliterated
    by standard English convention. 'Bethlehem' is the established and recognizable
    English form.
- source_word: עֵיטָם
  chosen: Etam
  alternatives:
  - Eitam
  lexicon: HALOT
  rationale: Proper place name transliterated into standard English form. 'Etam' is
    the conventional rendering.
- source_word: תְּקוֹעַ
  chosen: Tekoa
  alternatives:
  - Tekoah
  lexicon: HALOT
  rationale: Proper place name transliterated. 'Tekoa' is a standard English form;
    'Tekoah' is also common, but 'Tekoa' is a cleaner modern transliteration while
    preserving the identity of the place.
- source_word: וְ...וְ...וְ
  chosen: and ... and ... and
  alternatives:
  - comma-separated list with final 'and'
  lexicon: Hebrew grammar
  rationale: Hebrew polysyndeton links each item with waw. In readable modern English,
    a simple series with a final 'and' best reflects the list without sounding wooden.
