id: 2CH.11.14
reference: 2 Chronicles 11:14
source:
  edition: WLC
  text: כִּֽי עָזְב֣וּ הַ/לְוִיִּ֗ם אֶת מִגְרְשֵׁי/הֶם֙ וַ/אֲחֻזָּתָ֔/ם וַ/יֵּלְכ֥וּ לִ/יהוּדָ֖ה וְ/לִֽ/ירוּשָׁלִָ֑ם כִּֽי הִזְנִיחָ֤/ם יָֽרָבְעָם֙ וּ/בָנָ֔י/ו מִ/כַּהֵ֖ן לַ/יהוָֽה־־־׃
translation:
  text: For the Levites left their pasturelands and their possessions and went to Judah and Jerusalem, because Jeroboam and his sons had rejected them from serving as priests to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their common lands' or 'their grazing lands.' The Hebrew refers to the open land attached to their towns.
    reason: lexical_alternative
  - marker: b
    text: Or 'had excluded them from ministering as priests to the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִגְרְשֵׁיהֶם
  chosen: their pasturelands
  alternatives:
  - their common lands
  - their grazing lands
  - their open lands
  lexicon: HALOT
  rationale: מִגְרָשׁ commonly refers to the open land or pastureland attached to a town, especially Levitical towns. 'Pasturelands' is concrete and readable, while preserving the land-use sense better than the vaguer 'suburbs' of older English.
- source_word: אֲחֻזָּתָם
  chosen: their property
  alternatives:
  - their possessions
  - their holdings
  - their inheritance
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a landed possession or holding. 'Property' communicates owned holdings in natural English. 'Inheritance' could over-specify covenantal nuance not explicit here, while 'possessions' is broader than the likely landholding sense.
- source_word: וַיֵּלְכוּ לִיהוּדָה וְלִירוּשָׁלִָם
  chosen: and went to Judah and Jerusalem
  alternatives:
  - and came to Judah and Jerusalem
  lexicon: HALOT
  rationale: הלך with ל marks movement toward a destination. 'Went to' is the straightforward narrative rendering from the source perspective.
- source_word: הִזְנִיחָם
  chosen: had rejected them
  alternatives:
  - had cast them off
  - had excluded them
  - had abandoned them
  lexicon: HALOT
  rationale: The hiphil of זנח conveys rejecting, spurning, or excluding. In this context the following infinitive phrase explains exclusion from priestly service, so 'had rejected them' best captures both the personal and institutional force.
- source_word: מִכַּהֵן
  chosen: from serving as priests
  alternatives:
  - from ministering as priests
  - from acting as priests
  lexicon: HALOT
  rationale: The preposition מִן with the infinitive construct of כהן indicates prevention or exclusion from priestly service. 'From serving as priests' is idiomatic and preserves the cultic role.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' With כהן, English idiom can take either 'to' or 'for'; 'to the LORD' preserves the Hebrew preposition more closely while remaining natural.
- source_word: כִּי ... כִּי
  chosen: For ... because
  alternatives:
  - Indeed ... for
  - For ... for
  lexicon: HALOT
  rationale: The first כִּי introduces the explanation of the previous verse, naturally rendered 'For.' The second gives the reason for the Levites' move, best rendered 'because' to avoid awkward repetition in English.
