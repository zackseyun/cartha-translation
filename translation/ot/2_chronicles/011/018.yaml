id: 2CH.11.18
reference: 2 Chronicles 11:18
source:
  edition: WLC
  text: וַ/יִּֽקַּֽח ל֤/וֹ רְחַבְעָם֙ אִשָּׁ֔ה אֶת מָ֣חֲלַ֔ת בן יְרִימ֖וֹת בֶּן דָּוִ֑יד
    אֲבִיהַ֕יִל בַּת אֱלִיאָ֖ב בֶּן יִשָֽׁי־־־־־־׃
translation:
  text: Rehoboam took as wife Mahalath daughter of Jerimoth son of David, and Abihail
    daughter of Eliab son of Jesse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew genealogy is compressed: literally, ''Mahalath son/daughter of Jerimoth
      son of David, Abihail daughter of Eliab son of Jesse.'' The sense is likely
      that Mahalath was descended from both lines; some take Abihail as a second name
      in the family notice or, less likely, as a second wife.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקַּח לּוֹ ... אִשָּׁה
  chosen: took as wife
  alternatives:
  - took a wife
  - married
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'took for himself a woman/wife.' 'Took
    as wife' preserves the marital sense without sounding overly wooden; 'married'
    is possible but slightly more interpretive.
- source_word: מָחֲלַת
  chosen: Mahalath
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: בַּת
  chosen: daughter of
  alternatives:
  - daughter
  lexicon: HALOT
  rationale: Although the first genealogical link in the Hebrew text uses בן before
    Jerimoth, the verse as a whole identifies Mahalath through her paternal line and
    then appositionally adds Abihail through her maternal line. Rendering the relationship
    explicitly as 'daughter of' in English produces a coherent genealogy.
- source_word: יְרִימוֹת בֶּן דָּוִיד
  chosen: Jerimoth son of David
  alternatives:
  - Jerimoth, the son of David
  lexicon: HALOT
  rationale: A straightforward genealogical rendering. The construct chain is preserved
    in natural English.
- source_word: אֲבִיהַיִל
  chosen: Abihail
  rationale: Personal name transliterated. In context this is best taken as a second
    genealogical identifier connected to Mahalath, not a second wife in this verse.
- source_word: אֱלִיאָב בֶּן יִשָׁי
  chosen: Eliab son of Jesse
  alternatives:
  - Eliab, the son of Jesse
  lexicon: HALOT
  rationale: Preserves the Hebrew genealogy in idiomatic English.
