theological_decisions:
- issue: Syntactical relationship of the names in the genealogy
  chosen_reading: Mahalath is presented as the daughter of Jerimoth son of David,
    and of Abihail daughter of Eliab son of Jesse.
  alternative_readings:
  - Mahalath daughter of Jerimoth son of David and Abihail daughter of Eliab son of
    Jesse
  - Rehoboam took Mahalath and Abihail as wives
  rationale: The Hebrew is compressed and somewhat awkward, but the most coherent
    reading in context is that only one wife is named here, Mahalath, with both paternal
    and maternal ancestry supplied. This avoids making Abihail a second wife in a
    verse that introduces a singular 'wife' and aligns with common genealogical compression
    in Chronicles.
