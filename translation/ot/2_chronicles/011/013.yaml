id: 2CH.11.13
reference: 2 Chronicles 11:13
source:
  edition: WLC
  text: וְ/הַ/כֹּהֲנִים֙ וְ/הַ/לְוִיִּ֔ם אֲשֶׁ֖ר בְּ/כָל יִשְׂרָאֵ֑ל הִֽתְיַצְּב֥וּ
    עָלָ֖י/ו מִ/כָּל גְּבוּלָֽ/ם־־׃
translation:
  text: And the priests and the Levites who were in all Israel took their stand with
    him from all their territories.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'presented themselves to him' or 'stood before him.' The Hebrew idiom
      may denote either physical appearance before Rehoboam or taking his side; the
      context favors loyal alignment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַכֹּהֲנִים
  chosen: And the priests
  alternatives:
  - Now the priests
  - The priests
  lexicon: HALOT
  rationale: Definite plural noun with conjunction. 'And the priests' preserves the
    narrative linkage and definiteness.
- source_word: וְהַלְוִיִּם
  chosen: and the Levites
  lexicon: HALOT
  rationale: Straightforward rendering of the coordinated definite plural noun; 'Levites'
    is the standard transliteration/title for the Levitical class.
- source_word: אֲשֶׁר בְּכָל יִשְׂרָאֵל
  chosen: who were in all Israel
  alternatives:
  - who were throughout all Israel
  - who were in all of Israel
  lexicon: HALOT
  rationale: The relative clause identifies the priests and Levites as those located
    across the whole nation, not merely Judah. 'In all Israel' is a natural and sufficiently
    formal rendering.
- source_word: הִתְיַצְּבוּ
  chosen: took their stand
  alternatives:
  - presented themselves
  - stationed themselves
  - stood
  lexicon: HALOT
  rationale: The Hitpael of יצב often conveys taking one's position or standing in
    support/alignment. 'Took their stand' captures both the reflexive nuance and the
    sense of deliberate alignment in context.
- source_word: עָלָיו
  chosen: with him
  alternatives:
  - before him
  - beside him
  - for him
  lexicon: HALOT
  rationale: Although על can be literally 'upon/over,' in this context with התיצב
    it idiomatically indicates siding with or standing in support of someone. Given
    the context of loyalty to Rehoboam, 'with him' best conveys the sense.
- source_word: מִכָּל גְּבוּלָם
  chosen: from all their territories
  alternatives:
  - from all their borders
  - out of all their districts
  - from all their regions
  lexicon: HALOT
  rationale: גְּבוּל can mean border, territory, or region. Here the plural with pronominal
    suffix refers to the various territorial areas where they lived. 'Territories'
    is more idiomatic than 'borders' in English while preserving the geographic sense.
