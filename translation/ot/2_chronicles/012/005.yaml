id: 2CH.12.5
reference: 2 Chronicles 12:5
source:
  edition: WLC
  text: וּֽ/שְׁמַֽעְיָ֤ה הַ/נָּבִיא֙ בָּ֣א אֶל רְחַבְעָ֔ם וְ/שָׂרֵ֣י יְהוּדָ֔ה אֲשֶׁר נֶאֶסְפ֥וּ אֶל יְרוּשָׁלִַ֖ם מִ/פְּנֵ֣י שִׁישָׁ֑ק וַ/יֹּ֨אמֶר לָ/הֶ֜ם כֹּה אָמַ֣ר יְהוָ֗ה אַתֶּם֙ עֲזַבְתֶּ֣ם אֹתִ֔/י וְ/אַף אֲנִ֛י עָזַ֥בְתִּי אֶתְ/כֶ֖ם בְּ/יַד שִׁישָֽׁק־־־־־־׃
translation:
  text: 'Then Shemaiah the prophet came to Rehoboam and the officials of Judah who had gathered in Jerusalem because of Shishak, and he said to them, “Thus says Yahweh: You have forsaken me, so I also have forsaken you into the hand of Shishak.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from before Shishak,'' that is, because of or in fear of Shishak.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁמַעְיָה
  chosen: Then Shemaiah
  alternatives:
  - And Shemaiah
  - Now Shemaiah
  lexicon: HALOT
  rationale: The prefixed conjunction advances the narrative. 'Then' gives natural English narrative flow while preserving sequence. The proper name is transliterated per project philosophy.
- source_word: הַ/נָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Standard rendering of נָבִיא; the definite article is retained.
- source_word: בָּא אֶל
  chosen: came to
  alternatives:
  - went to
  lexicon: HALOT
  rationale: The idiom plainly indicates arrival before Rehoboam and the leaders. 'Came to' is the most natural English equivalent here.
- source_word: וְ/שָׂרֵי יְהוּדָה
  chosen: and the officials of Judah
  alternatives:
  - and the princes of Judah
  - and the leaders of Judah
  lexicon: HALOT
  rationale: שָׂרִים denotes rulers/officials/commanders. 'Officials' fits the court-political setting without sounding archaic like 'princes,' while preserving their governing status.
- source_word: אֲשֶׁר נֶאֶסְפוּ
  chosen: who had gathered
  alternatives:
  - who had assembled
  - who were gathered
  lexicon: HALOT
  rationale: The Niphal form is passive/reflexive in sense; in English, 'had gathered' idiomatically conveys their assembling there.
- source_word: אֶל יְרוּשָׁלַםִ
  chosen: in Jerusalem
  alternatives:
  - to Jerusalem
  lexicon: HALOT
  rationale: Although the preposition is 'to,' with verbs of gathering English commonly uses 'in Jerusalem' to express the resulting location.
- source_word: מִ/פְּנֵי שִׁישָׁק
  chosen: because of Shishak
  alternatives:
  - from before Shishak
  - for fear of Shishak
  - because of the threat of Shishak
  lexicon: HALOT
  rationale: The phrase literally means 'from before the face of Shishak' and here denotes cause occasioned by his advance. 'Because of Shishak' is concise and natural; the more specific nuance of fleeing his threat is contextually implied.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula. YHWH is rendered 'the LORD' per doctrine.
- source_word: עֲזַבְתֶּם אֹתִי
  chosen: You have forsaken me
  alternatives:
  - You have abandoned me
  - You have left me
  lexicon: HALOT
  rationale: עָזַב in covenantal contexts often carries the force of forsaking or abandoning. 'Forsaken' preserves the covenantal and theological weight.
- source_word: וְ/אַף אֲנִי
  chosen: so I also
  alternatives:
  - and I also
  - therefore I also
  lexicon: HALOT
  rationale: 'The combination marks corresponding retaliation: as they did, so God also does. ''So I also'' captures the reciprocal force in idiomatic English.'
- source_word: עָזַבְתִּי אֶתְכֶם
  chosen: have forsaken you
  alternatives:
  - have abandoned you
  - have left you
  lexicon: HALOT
  rationale: For consistency with the same Hebrew verb earlier in the clause, the same English gloss is retained. This preserves the rhetorical symmetry of the judgment statement.
- source_word: בְּ/יַד שִׁישָׁק
  chosen: into the hand of Shishak
  alternatives:
  - to Shishak
  - into Shishak's hand
  - under the power of Shishak
  lexicon: HALOT
  rationale: The idiom 'into the hand of' is common in Hebrew for being given over to another's power. Retaining 'hand' preserves the biblical idiom and its judicial-deliverance nuance.
