id: 2CH.12.13
reference: 2 Chronicles 12:13
source:
  edition: WLC
  text: וַ/יִּתְחַזֵּ֞ק הַ/מֶּ֧לֶךְ רְחַבְעָ֛ם בִּ/ירוּשָׁלִַ֖ם וַ/יִּמְלֹ֑ךְ כִּ֣י בֶן אַרְבָּעִ֣ים וְ/אַחַ֣ת שָׁנָה֩ רְחַבְעָ֨ם בְּ/מָלְכ֜/וֹ וּֽ/שֲׁבַ֨ע עֶשְׂרֵ֥ה שָׁנָ֣ה מָלַ֣ךְ בִּֽ/ירוּשָׁלִַ֗ם הָ֠/עִיר אֲשֶׁר בָּחַ֨ר יְהוָ֜ה לָ/שׂ֨וּם אֶת שְׁמ֥/וֹ שָׁם֙ מִ/כֹּל֙ שִׁבְטֵ֣י יִשְׂרָאֵ֔ל וְ/שֵׁ֣ם אִמּ֔/וֹ נַעֲמָ֖ה הָֽ/עַמֹּנִֽית־׀־־׃
translation:
  text: So King Rehoboam established himself in Jerusalem and reigned. Rehoboam was forty-one years old when he began to reign, and he reigned seventeen years in Jerusalem, the city that the LORD had chosen from all the tribes of Israel to put his name there. And his mother’s name was Naamah the Ammonite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'established himself in Jerusalem.' The Hebrew verb can denote becoming strong or firmly established.
    reason: lexical_alternative
  - marker: b
    text: Or 'strengthened himself in Jerusalem and reigned'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּתְחַזֵּק
  chosen: strengthened himself
  alternatives:
  - grew strong
  - established himself
  lexicon: HALOT
  rationale: The hitpael form of חזק is reflexive/inchoative here. 'Strengthened himself' preserves the reflexive nuance better than the smoother but less explicit 'grew strong.' In context it refers to Rehoboam's consolidation after the crisis, not merely physical strength.
- source_word: וַיִּמְלֹךְ
  chosen: and reigned
  alternatives:
  - and became king
  - and began to reign
  lexicon: HALOT
  rationale: The wayyiqtol of מלך here continues the narrative after 'strengthened himself.' 'And reigned' fits the sequence without over-specifying inception; the beginning of his reign is then stated explicitly in the age clause.
- source_word: כִּי
  chosen: when
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: 'Although כי often means ''for,'' in this regnal formula it introduces explanatory age information idiomatically rendered ''when'': ''Rehoboam was forty-one years old when he began to reign.'' This is standard English for the Hebrew construction.'
- source_word: בְּמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - at his reigning
  - when he became king
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks the time of accession. 'When he began to reign' is natural English and preserves the temporal force.
- source_word: הָעִיר אֲשֶׁר בָּחַר יְהוָה
  chosen: the city that the LORD had chosen
  alternatives:
  - the city which the LORD chose
  lexicon: HALOT
  rationale: The relative clause identifies Jerusalem by divine election. The pluperfect 'had chosen' fits the retrospective regnal notice in English, though the Hebrew perfect itself need not mark pluperfect strictly.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD.'
- source_word: לָשׂוּם אֶת־שְׁמוֹ שָׁם
  chosen: to put his name there
  alternatives:
  - to set his name there
  - to place his name there
  lexicon: HALOT
  rationale: This is standard covenant-temple language. 'Put his name there' is clear modern English and preserves the concrete Hebrew idiom without paraphrasing it into an interpretive phrase such as 'to establish his presence there.'
- source_word: מִכֹּל שִׁבְטֵי יִשְׂרָאֵל
  chosen: from all the tribes of Israel
  alternatives:
  - out of all the tribes of Israel
  lexicon: HALOT
  rationale: מן here expresses selection from among the tribes. 'From all the tribes of Israel' is idiomatic and preserves the source sense of election from the whole covenant people.
- source_word: וְשֵׁם אִמּוֹ
  chosen: And his mother’s name was
  alternatives:
  - And the name of his mother was
  lexicon: HALOT
  rationale: This formula occurs in regnal notices. The chosen rendering is slightly smoother in modern English while remaining formally close.
- source_word: הָעַמֹּנִית
  chosen: the Ammonite
  alternatives:
  - the Ammonitess
  - an Ammonite woman
  lexicon: HALOT
  rationale: The feminine gentilic identifies Naamah's ethnic origin. 'The Ammonite' is concise and natural in apposition to a woman's name in English; 'Ammonitess' is archaic.
