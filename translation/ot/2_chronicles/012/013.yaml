theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Temple-election formula 'to put his name there'
  chosen_reading: Retain the concrete idiom without expanding it into a doctrinal paraphrase about presence or indwelling.
  alternative_readings:
  - to establish his presence there
  - to cause his name to dwell there
  rationale: The Hebrew speaks of YHWH choosing Jerusalem 'to put his name there.' Preserving the idiom avoids importing a more developed theological explanation than the text itself states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
revisions:
- timestamp: '2026-04-21T17:13:32Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/weighted_vocab/ot/2_chronicles/012/013.job-11057.json
  category: awkward_english
  tier: 1
  from: strengthened himself in Jerusalem and reigned
  to: established himself in Jerusalem and reigned
  rationale: The current rendering, while literal, is slightly awkward by pairing the specific action 'strengthened himself' with the general state 'reigned' as if they were two simple sequential events. The Hebrew phrase וַיִּתְחַזֵּק ... וַיִּמְלֹךְ describes the single outcome of Rehoboam consolidating his power. Using the lexical alternative 'established himself' (already present in footnote 'a') for the first verb creates a more natural and idiomatic English phrase ('established himself... and reigned') that better captures the holistic sense of the Hebrew. The footnote could then be changed to 'Or 'strengthened himself'.'
