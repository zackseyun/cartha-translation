id: 2CH.12.14
reference: 2 Chronicles 12:14
source:
  edition: WLC
  text: וַ/יַּ֖עַשׂ הָ/רָ֑ע כִּ֣י לֹ֤א הֵכִין֙ לִבּ֔/וֹ לִ/דְר֖וֹשׁ אֶת יְהוָֽה־׃ס
translation:
  text: And he did what was evil, because he had not set his heart to seek Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''had not prepared his heart to seek Yahweh.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: And he did
  alternatives:
  - And he acted
  - So he did
  lexicon: HALOT
  rationale: Qal wayyiqtol of עשה introduces the narrative result. 'Did' is the most direct rendering; 'And' preserves the Hebrew narrative sequence.
- source_word: הָרָע
  chosen: what was evil
  alternatives:
  - evil
  - the evil
  lexicon: HALOT
  rationale: With the article, the phrase idiomatically means 'what was evil' or 'evil' in a moral sense. 'What was evil' is natural English and preserves the ethical evaluation without over-literal awkwardness.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי gives the reason for Rehoboam's evil action. 'Because' best expresses the causal force in clear modern English.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Straightforward negation of the following verb.
- source_word: הֵכִין
  chosen: had not set
  alternatives:
  - had not prepared
  - had not established
  - had not directed
  lexicon: HALOT
  rationale: Hiphil of כון can mean prepare, establish, or set firmly. With 'heart' and an infinitive of purpose ('to seek'), 'set' is the most idiomatic English expression for deliberate inward resolve, while still reflecting the Hebrew sense of making firm/preparing.
- source_word: לִבּוֹ
  chosen: his heart
  alternatives:
  - his mind
  lexicon: HALOT
  rationale: לֵב/לֵבָב in Hebrew commonly denotes the inner person, including will and intention. 'Heart' preserves the Hebrew anthropology better than 'mind' here.
- source_word: לִדְרוֹשׁ
  chosen: to seek
  alternatives:
  - to inquire of
  - to seek after
  lexicon: HALOT
  rationale: דרשׁ with God as object often means to seek him, often with the sense of turning to him in devotion or inquiry. 'To seek' is the standard concise rendering and fits the chronicler's theological idiom.
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Direct object marker plus divine name. Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated.
