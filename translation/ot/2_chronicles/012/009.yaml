id: 2CH.12.9
reference: 2 Chronicles 12:9
source:
  edition: WLC
  text: וַ/יַּ֨עַל שִׁישַׁ֥ק מֶֽלֶךְ מִצְרַיִם֮ עַל יְרוּשָׁלִַם֒ וַ/יִּקַּ֞ח אֶת אֹצְר֣וֹת בֵּית יְהוָ֗ה וְ/אֶת אֹֽצְרוֹת֙ בֵּ֣ית הַ/מֶּ֔לֶךְ אֶת הַ/כֹּ֖ל לָקָ֑ח וַ/יִּקַּח֙ אֶת מָגִנֵּ֣י הַ/זָּהָ֔ב אֲשֶׁ֥ר עָשָׂ֖ה שְׁלֹמֹֽה־־־־־־־׃
translation:
  text: So Shishak king of Egypt came up against Jerusalem and took the treasuries of the house of Yahweh and the treasuries of the king’s house. He took everything; he also took the gold shields that Solomon had made.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of the LORD' for 'the house of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the royal palace' for 'the king’s house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: came up against
  alternatives:
  - went up against
  - advanced against
  lexicon: HALOT
  rationale: עלה with עַל in military context commonly denotes marching up against or attacking a city. 'Came up against' preserves the idiom while sounding natural in English.
- source_word: שִׁישַׁק
  chosen: Shishak
  rationale: Personal name is transliterated according to the project's policy to transliterate names rather than translate them.
- source_word: מֶלֶךְ מִצְרַיִם
  chosen: king of Egypt
  alternatives:
  - the king of Egypt
  lexicon: HALOT
  rationale: Construct phrase straightforwardly identifies Shishak's royal office and realm. The article is not required in English apposition.
- source_word: אֹצְרוֹת
  chosen: treasuries
  alternatives:
  - treasures
  - storehouses
  lexicon: HALOT
  rationale: In context of temple and palace valuables being seized, 'treasuries' best reflects the repositories or treasury holdings, more precise than the broader 'treasures.'
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: בית יהוה is a standard designation for the temple. 'House of the LORD' preserves the Hebrew expression while remaining clear.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the doctrinally specified default rendering for the divine name.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king’s house
  alternatives:
  - the royal palace
  - the palace
  lexicon: HALOT
  rationale: Literally 'the house of the king.' This keeps the parallel with 'the house of the LORD'; 'palace' is interpretive but possible.
- source_word: אֶת־הַכֹּל לָקָח
  chosen: He took everything
  alternatives:
  - he took it all
  - all of it he took
  lexicon: HALOT
  rationale: This resumptive clause emphasizes the totality of the plunder. 'He took everything' is idiomatic and preserves the force.
- source_word: מָגִנֵּי הַזָּהָב
  chosen: the gold shields
  alternatives:
  - the shields of gold
  - the golden shields
  lexicon: HALOT
  rationale: Refers to the notable ceremonial shields made by Solomon. 'Gold shields' is natural and sufficiently literal.
- source_word: אֲשֶׁר עָשָׂה שְׁלֹמֹה
  chosen: that Solomon had made
  alternatives:
  - which Solomon made
  lexicon: HALOT
  rationale: English past perfect fits the prior historical reference and clearly links the shields to Solomon's earlier action.
