id: 2CH.12.1
reference: 2 Chronicles 12:1
source:
  edition: WLC
  text: וַ/יְהִ֗י כְּ/הָכִ֞ין מַלְכ֤וּת רְחַבְעָם֙ וּ/כְ/חֶזְקָת֔/וֹ עָזַ֖ב אֶת תּוֹרַ֣ת יְהוָ֑ה וְ/כָל יִשְׂרָאֵ֖ל עִמּֽ/וֹ־־׃פ
translation:
  text: And when Rehoboam’s kingdom was established, and he had become strong, he abandoned the law of Yahweh—and all Israel with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the instruction of the LORD.' The Hebrew torah can mean 'law' or 'instruction,' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And when
  alternatives:
  - And it happened when
  - Now when
  lexicon: HALOT
  rationale: The waw-consecutive of היה here introduces the narrative circumstance rather than requiring a wooden 'and it happened.' 'And when' is natural English and preserves the temporal setup.
- source_word: כְּהָכִין
  chosen: was established
  alternatives:
  - had been established
  - was prepared
  - was set up
  lexicon: HALOT
  rationale: From כון in the Hiphil/passive-establishing sense. With 'kingdom' as subject, 'was established' best conveys the consolidation of royal rule.
- source_word: מַלְכוּת
  chosen: kingdom
  alternatives:
  - kingship
  - royal rule
  lexicon: HALOT
  rationale: '''Kingdom'' is the most idiomatic rendering here for the realm/rule of Rehoboam. ''Kingship'' is possible but less natural in this narrative context.'
- source_word: רְחַבְעָם
  chosen: Rehoboam
  rationale: Standard English transliteration of the proper name, in keeping with the policy to transliterate names.
- source_word: וּכְחֶזְקָתוֹ
  chosen: and he had become strong
  alternatives:
  - and when he was strong
  - and as he grew strong
  - and at his strengthening
  lexicon: HALOT
  rationale: From חזק with 3ms suffix, referring to Rehoboam's becoming strong/secure. The clause is temporal-circumstantial. 'He had become strong' makes explicit the personal referent and the sense of attained strength or security.
- source_word: עָזַב
  chosen: abandoned
  alternatives:
  - forsook
  - left
  - deserted
  lexicon: HALOT
  rationale: '''Abandoned'' clearly conveys covenantal defection in contemporary English without the archaic tone of ''forsook.'''
- source_word: אֶת תּוֹרַת יְהוָה
  chosen: the law of the LORD
  alternatives:
  - the instruction of the LORD
  - the Torah of the LORD
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction, but in this historical-covenantal context 'the law' is the most recognizable and fitting rendering. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrinal default for the divine name.
- source_word: וְכָל יִשְׂרָאֵל עִמּוֹ
  chosen: and all Israel with him
  alternatives:
  - and all Israel was with him
  - and all Israel along with him
  lexicon: HALOT
  rationale: The phrase indicates that the people joined Rehoboam in this abandonment. The elliptical English 'and all Israel with him' preserves the compact force of the Hebrew; the dash helps signal the appended participation.
