theological_decisions:
- issue: Meaning of 'all Israel' in the divided-monarchy context
  chosen_reading: Rendered as 'all Israel' without narrowing it to Judah alone.
  alternative_readings:
  - all Judah
  - all his people
  rationale: Although the kingdom is divided by this point, Chronicles can still use 'Israel' for the covenant people associated with Judah/Benjamin. The translation preserves the Hebrew wording rather than resolving the historical scope interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
