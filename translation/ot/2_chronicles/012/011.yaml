id: 2CH.12.11
reference: 2 Chronicles 12:11
source:
  edition: WLC
  text: וַ/יְהִ֛י מִ/דֵּי ב֥וֹא הַ/מֶּ֖לֶךְ בֵּ֣ית יְהוָ֑ה בָּ֤אוּ הָ/רָצִים֙ וּ/נְשָׂא֔וּ/ם וֶ/הֱשִׁב֖וּ/ם אֶל תָּ֥א הָ/רָצִֽים־־׃
translation:
  text: And whenever the king entered the house of Yahweh, the guards would come and carry them, and then return them to the guards’ chamber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the runners,' that is, the royal guard.
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'them' refers to the bronze shields mentioned in the previous verse.
    reason: cross_reference
  - marker: c
    text: Or 'guardroom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדֵּי בּוֹא
  chosen: whenever ... entered
  alternatives:
  - as often as ... entered
  - from the time of entering
  lexicon: HALOT
  rationale: The idiom מִדֵּי + infinitive expresses repeated occurrence, not a single event. 'Whenever' gives natural English while preserving the iterative sense.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת here is literally 'house,' the standard designation for the temple. 'House of the LORD' preserves the Hebrew expression. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in accordance with DOCTRINE.md.
- source_word: הָרָצִים
  chosen: the guards
  alternatives:
  - the runners
  - the couriers
  lexicon: HALOT
  rationale: Though literally 'runners,' in royal context this term refers to the king's guard or bodyguard unit. 'Guards' best communicates the function in idiomatic English.
- source_word: וּנְשָׂאוּם
  chosen: carry them
  alternatives:
  - bear them
  - take them up
  lexicon: HALOT
  rationale: The pronoun refers back to the bronze shields from the previous verse. 'Carry them' is clear and contextually appropriate for transporting ceremonial equipment.
- source_word: וֶהֱשִׁבוּם
  chosen: return them
  alternatives:
  - bring them back
  - restore them
  lexicon: HALOT
  rationale: The Hiphil of שוב here means to cause the items to return to their storage place after use. 'Return them' is concise and accurate.
- source_word: תָּא
  chosen: chamber
  alternatives:
  - room
  - guardroom
  lexicon: HALOT
  rationale: תָּא denotes a chamber or cell-like room. Because the phrase is linked with the guards, 'chamber' preserves the noun while allowing the possessive phrase to specify whose chamber it is.
