id: 2CH.12.6
reference: 2 Chronicles 12:6
source:
  edition: WLC
  text: וַ/יִּכָּנְע֥וּ שָׂרֵֽי יִשְׂרָאֵ֖ל וְ/הַ/מֶּ֑לֶךְ וַ/יֹּאמְר֖וּ צַדִּ֥יק יְהוָֽה־׀׃
translation:
  text: Then the leaders of Israel and the king humbled themselves and said, “Yahweh is righteous.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the leaders of Israel.'' In this context some understand this to refer specifically to Judah''s leaders under Rehoboam, but the text itself says ''Israel.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכָּנְעוּ
  chosen: humbled themselves
  alternatives:
  - were humbled
  - submitted themselves
  lexicon: HALOT
  rationale: The Niphal of כנע here denotes an act of humbling/submission in response to prophetic rebuke. 'Humbled themselves' best captures the reflexive sense and the moral-spiritual response in readable English.
- source_word: שָׂרֵי
  chosen: leaders
  alternatives:
  - princes
  - officials
  - chiefs
  lexicon: HALOT
  rationale: שָׂרִים refers to ruling officials or princes. 'Leaders' is clear modern English and fits optimal equivalence without the archaic feel of 'princes.'
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - Judah
  lexicon: HALOT
  rationale: The Hebrew text reads 'Israel.' Although the immediate historical setting concerns Rehoboam in Judah, the Chronicler can use 'Israel' in a broader covenantal or representative sense. The source wording should be preserved rather than harmonized.
- source_word: וְהַמֶּלֶךְ
  chosen: and the king
  lexicon: HALOT
  rationale: A straightforward rendering of the coordinated noun phrase, distinguishing the king from the leaders.
- source_word: וַיֹּאמְרוּ
  chosen: and said
  alternatives:
  - and they said
  lexicon: HALOT
  rationale: English does not require the explicit pronoun; 'and said' is natural and preserves the narrative sequence.
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  - in the right
  lexicon: HALOT
  rationale: צַדִּיק here predicates moral rightness of YHWH in judgment. 'Righteous' preserves the theological and covenantal weight better than the flatter 'in the right,' while 'just' is possible but slightly narrower.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
