theological_decisions:
- issue: Whether to preserve the divine name or render it by the covenant title
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to harmonize 'Israel' to 'Judah' for historical clarity
  chosen_reading: Israel
  alternative_readings:
  - Judah
  rationale: The Hebrew text explicitly says 'Israel.' To substitute 'Judah' would import an interpretive harmonization not warranted by the wording. The translation preserves the Chronicler's diction and leaves interpretation to readers and notes.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
