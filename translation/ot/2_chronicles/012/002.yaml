theological_decisions:
- issue: Covenantal explanation for Shishak's invasion
  chosen_reading: because they had acted unfaithfully against the LORD
  alternative_readings:
  - for they trespassed against the LORD
  - because they were unfaithful to the LORD
  rationale: The Chronicler explicitly frames the political event as divine judgment for covenant breach. The translation preserves that theological causality without softening it into mere political description. 'Against the LORD' reflects the relational offense implied by מעל + ב.
