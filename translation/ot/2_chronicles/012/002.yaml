id: 2CH.12.2
reference: 2 Chronicles 12:2
source:
  edition: WLC
  text: וַ/יְהִ֞י בַּ/שָּׁנָ֤ה הַֽ/חֲמִישִׁית֙ לַ/מֶּ֣לֶךְ רְחַבְעָ֔ם עָלָ֛ה שִׁישַׁ֥ק מֶֽלֶךְ מִצְרַ֖יִם עַל יְרוּשָׁלִָ֑ם כִּ֥י מָעֲל֖וּ בַּ/יהוָֽה־־׃
translation:
  text: And in the fifth year of King Rehoboam, Shishak king of Egypt came up against Jerusalem, because they had acted unfaithfully against Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'had been unfaithful to the LORD' or 'had trespassed against the LORD.' The Hebrew verb carries the sense of breach of faith or covenantal unfaithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ...
  alternatives:
  - Now it happened
  - And it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions as a narrative introducer. In English, a simple 'And' with the temporal phrase carries the discourse flow naturally without woodenly preserving 'it happened.'
- source_word: בַּשָּׁנָה הַחֲמִישִׁית
  chosen: in the fifth year
  alternatives:
  - in year five
  - in the fifth year
  lexicon: HALOT
  rationale: Standard regnal-year expression; 'in the fifth year' is idiomatic and formally close.
- source_word: לַמֶּלֶךְ רְחַבְעָם
  chosen: of King Rehoboam
  alternatives:
  - of the reign of King Rehoboam
  - belonging to King Rehoboam
  lexicon: HALOT
  rationale: The lamed with 'king' in this context marks relation to the king's reign. 'Of King Rehoboam' is concise and idiomatic in English regnal dating.
- source_word: עָלָה
  chosen: came up against
  alternatives:
  - went up against
  - marched up against
  - attacked
  lexicon: HALOT
  rationale: עלה with על in military contexts commonly means to advance against or invade. 'Came up against' preserves the Hebrew idiom while remaining natural English; 'attacked' would over-specify the action.
- source_word: שִׁישַׁק
  chosen: Shishak
  lexicon: HALOT
  rationale: Personal name is transliterated per translation philosophy.
- source_word: מֶלֶךְ מִצְרַיִם
  chosen: king of Egypt
  alternatives:
  - the king of Egypt
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly. The anarthrous Hebrew does not require the English article here.
- source_word: עַל יְרוּשָׁלִָם
  chosen: against Jerusalem
  alternatives:
  - upon Jerusalem
  - to Jerusalem
  lexicon: HALOT
  rationale: With military עלה על, 'against Jerusalem' best conveys hostile movement rather than mere destination.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי gives the reason for the invasion in the Chronicler's theological explanation. 'Because' is the clearest causal rendering.
- source_word: מָעֲלוּ
  chosen: had acted unfaithfully
  alternatives:
  - had been unfaithful
  - had trespassed
  - had dealt treacherously
  lexicon: HALOT
  rationale: מעל denotes breach of faith, often covenantal unfaithfulness. 'Acted unfaithfully' captures the verbal force and moral-religious dimension better than the more generic 'had been unfaithful.'
- source_word: בַּיהוָה
  chosen: against the LORD
  alternatives:
  - against Yahweh
  - with respect to the LORD
  lexicon: HALOT
  rationale: With מעל, the preposition marks the one against whom the unfaithfulness is committed. Per doctrine guidelines, יְהוָה is rendered 'the LORD,' not transliterated in the main text.
