id: 2CH.12.12
reference: 2 Chronicles 12:12
source:
  edition: WLC
  text: וּ/בְ/הִכָּֽנְע֗/וֹ שָׁ֤ב מִמֶּ֨/נּוּ֙ אַף יְהוָ֔ה וְ/לֹ֥א לְ/הַשְׁחִ֖ית לְ/כָלָ֑ה וְ/גַם֙ בִּֽ/יהוּדָ֔ה הָיָ֖ה דְּבָרִ֥ים טוֹבִֽים־׃ס
translation:
  text: And when he humbled himself, the anger of Yahweh turned away from him, so as not to destroy him completely; and also in Judah there were good things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the LORD's anger turned back from him.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'good things'; the phrase is broad and may refer to commendable conditions, actions, or matters in Judah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְהִכָּנְעוֹ
  chosen: when he humbled himself
  alternatives:
  - when he submitted himself
  - when he was humbled
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב conveys temporal sense, 'when/in his humbling himself.' The hitpael of כנע here is reflexive, indicating Rehoboam's act of humbling himself rather than merely being humiliated.
- source_word: שָׁב
  chosen: turned away
  alternatives:
  - returned
  - relented
  lexicon: HALOT
  rationale: With מִמֶּנּוּ and the following אַף יְהוָה, the verb describes the LORD's anger turning back/away from Rehoboam. 'Turned away' is idiomatic in English and preserves the directional sense better than the more interpretive 'relented.'
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - away from him
  lexicon: HALOT
  rationale: The preposition marks separation from Rehoboam as the object from whom the anger turned.
- source_word: אַף יְהוָה
  chosen: the anger of the LORD
  alternatives:
  - the LORD's anger
  lexicon: HALOT
  rationale: אַף literally means 'nose' and idiomatically 'anger/wrath.' The construct-like relation in context is best rendered as 'the anger of the LORD.' 'the LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְלֹא לְהַשְׁחִית לְכָלָה
  chosen: so as not to destroy him completely
  alternatives:
  - and not to destroy to annihilation
  - and not to ruin utterly
  lexicon: HALOT
  rationale: The negative plus infinitive expresses result/purpose after the turning away of anger. לְכָלָה intensifies the destruction as total or complete. Supplying 'him' is contextually necessary in English, referring to Rehoboam/Judah under judgment.
- source_word: וְגַם
  chosen: and also
  alternatives:
  - moreover
  - and indeed
  lexicon: HALOT
  rationale: Adds a further explanatory note. 'And also' is natural modern English and preserves the additive force.
- source_word: בִּיהוּדָה
  chosen: in Judah
  alternatives:
  - among Judah
  lexicon: HALOT
  rationale: Locative sense is most straightforward here.
- source_word: הָיָה דְּבָרִים טוֹבִים
  chosen: there were good things
  alternatives:
  - good matters were found
  - there were good things present
  lexicon: HALOT
  rationale: 'The Hebrew is somewhat idiomatic and broad: literally ''good דברים were.'' ''Things'' keeps the generality of דְּבָרִים without over-specifying moral deeds, conditions, or words. The phrase explains mitigating factors present in Judah.'
