id: 2CH.4.1
reference: 2 Chronicles 4:1
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ֙ מִזְבַּ֣ח נְחֹ֔שֶׁת עֶשְׂרִ֤ים אַמָּה֙ אָרְכּ֔/וֹ וְ/עֶשְׂרִ֥ים
    אַמָּ֖ה רָחְבּ֑/וֹ וְ/עֶ֥שֶׂר אַמּ֖וֹת קוֹמָתֽ/וֹ׃ס
translation:
  text: He made a bronze altar, twenty cubits its length and twenty cubits its width,
    and ten cubits its height.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a brass altar.' The Hebrew נְחֹשֶׁת can be rendered 'bronze,' 'copper,'
      or traditionally 'brass'; 'bronze' is preferred in modern English for temple
      furnishings.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - Then he made
  - And he made
  lexicon: HALOT
  rationale: Wayyiqtol of עשה normally advances the narrative with a simple past.
    English can omit the conjunction for smoother style while preserving sequence.
- source_word: מִזְבַּח
  chosen: altar
  lexicon: HALOT
  rationale: Standard rendering for the sacrificial structure denoted by מזבח.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - brass
  - copper
  lexicon: HALOT
  rationale: נחשת in temple/tabernacle contexts is conventionally rendered 'bronze'
    in modern English; 'brass' is traditional but historically less precise, and 'copper'
    is possible but less idiomatic for this cultic furnishing.
- source_word: עֶשְׂרִים אַמָּה
  chosen: twenty cubits
  alternatives:
  - twenty cubits long
  lexicon: HALOT
  rationale: Retains the ancient unit rather than converting it, preserving formal
    correspondence and the architectural feel of the text.
- source_word: אָרְכּוֹ
  chosen: its length
  alternatives:
  - long
  lexicon: HALOT
  rationale: 'The noun with pronominal suffix is most naturally rendered as a nominal
    measurement phrase in English: ''its length.'''
- source_word: רָחְבּוֹ
  chosen: its width
  alternatives:
  - broad
  lexicon: HALOT
  rationale: The noun with suffix denotes the altar's width/breadth; 'width' is the
    most natural modern architectural term.
- source_word: וְעֶשֶׂר אַמּוֹת
  chosen: and ten cubits
  lexicon: HALOT
  rationale: Straightforward cardinal-number phrase preserved formally.
- source_word: קוֹמָתוֹ
  chosen: its height
  alternatives:
  - its stature
  lexicon: HALOT
  rationale: In an architectural context קומה refers to height; 'stature' would be
    unnatural for an object.
