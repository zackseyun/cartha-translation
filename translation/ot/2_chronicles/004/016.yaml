  from: and all their utensils
  to: and all the related utensils
  rationale: The Hebrew 'כְּלֵיהֶם' (their utensils/implements) likely functions as a catch-all for related equipment. The literal rendering 'their utensils' is slightly awkward in English, as it might imply that shovels or forks have their own distinct utensils. A rendering like 'and all the related utensils' or 'and all the utensils for them' would be clearer and more natural in English while preserving the intended meaning.
