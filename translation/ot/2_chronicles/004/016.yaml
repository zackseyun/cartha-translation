id: 2CH.4.16
reference: 2 Chronicles 4:16
source:
  edition: WLC
  text: וְ/אֶת הַ֠/סִּירוֹת וְ/אֶת הַ/יָּעִ֤ים וְ/אֶת הַ/מִּזְלָגוֹת֙ וְ/אֶת כָּל כְּלֵי/הֶ֔ם עָשָׂ֞ה חוּרָ֥ם אָבִ֛יו לַ/מֶּ֥לֶךְ שְׁלֹמֹ֖ה לְ/בֵ֣ית יְהוָ֑ה נְחֹ֖שֶׁת מָרֽוּק־־־־־׃
translation:
  text: And Huram-abi made the pots, the shovels, the forks, and all the related utensils for King Solomon, for the house of the LORD, of polished bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Huram-abi''; alternatively, ''Huram his father,'' though here it is likely a proper name or title for the craftsman.'
    reason: alternative_reading
  - marker: b
    text: Or 'burnished bronze.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and all their utensils'.
    reason: previous_rendering
lexical_decisions:
- source_word: הַסִּירוֹת
  chosen: the pots
  alternatives:
  - the basins
  - the cooking pots
  lexicon: HALOT
  rationale: סִירוֹת commonly denotes pots or cooking vessels. 'Pots' is the most straightforward English equivalent here in a temple-furnishings list.
- source_word: הַיָּעִים
  chosen: the shovels
  alternatives:
  - the scoops
  lexicon: HALOT
  rationale: יָעִים refers to implements for removing ashes or handling coals; 'shovels' is the standard and contextually fitting rendering in cultic equipment lists.
- source_word: הַמִּזְלָגוֹת
  chosen: the forks
  alternatives:
  - the flesh-hooks
  - the prongs
  lexicon: HALOT
  rationale: מִזְלָגוֹת denotes fork-like implements. 'Forks' is clear modern English; more specialized renderings like 'flesh-hooks' are possible but less certain and less readable here.
- source_word: כָּל כְּלֵיהֶם
  chosen: all their utensils
  alternatives:
  - all their vessels
  - all their implements
  lexicon: HALOT
  rationale: כְּלִי is a broad term for articles, vessels, or implements. 'Utensils' fits the immediate list of functional temple tools and reads naturally in English.
- source_word: חוּרָם אָבִיו
  chosen: Huram-abi
  alternatives:
  - Huram his father
  - Hiram-abi
  lexicon: HALOT
  rationale: The Hebrew form is best taken here as the proper name/title 'Huram-abi,' matching the Chronicler's designation of the craftsman rather than implying literal paternity. Retaining the compound form avoids the misleading English reading 'Huram his father.' 'Huram' follows the Hebrew spelling rather than the variant 'Hiram' familiar from Kings.
- source_word: לַמֶּלֶךְ שְׁלֹמֹה
  chosen: for King Solomon
  alternatives:
  - for the king, Solomon
  - belonging to King Solomon
  lexicon: HALOT
  rationale: The lamed marks relation or service; 'for King Solomon' expresses that the craftsman made these items on Solomon's behalf/commission.
- source_word: לְבֵית יְהוָה
  chosen: for the house of the LORD
  alternatives:
  - for the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' 'House of the LORD' preserves the Hebrew expression while remaining idiomatic. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's mandated default for the divine name, preserving the reverential convention and standard English Bible practice.
- source_word: נְחֹשֶׁת מָרוּק
  chosen: of polished bronze
  alternatives:
  - of burnished bronze
  - of polished copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת in this context refers to bronze/brass-like metalwork; 'bronze' is the usual modern rendering. מָרוּק means polished or burnished. 'Polished bronze' is clear and natural English.
