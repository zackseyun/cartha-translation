- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Understanding חוּרָם אָבִיו
  chosen_reading: Huram-abi as a proper name/title
  alternative_readings:
  - Huram his father
  rationale: In this context the phrase functions as the craftsman's designation, not as a theological or genealogical claim about literal fatherhood. Rendering it as a compound name avoids confusion in English and aligns with the Chronicler's usage.
