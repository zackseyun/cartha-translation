id: 2CH.4.22
reference: 2 Chronicles 4:22
source:
  edition: WLC
  text: וְ/הַֽ/מְזַמְּר֧וֹת וְ/הַ/מִּזְרָק֛וֹת וְ/הַ/כַּפּ֥וֹת וְ/הַ/מַּחְתּ֖וֹת זָהָ֣ב סָג֑וּר וּ/פֶ֣תַח הַ֠/בַּיִת דַּלְתוֹתָ֨י/ו הַ/פְּנִימִיּ֜וֹת לְ/קֹ֣דֶשׁ הַ/קֳּדָשִׁ֗ים וְ/דַלְתֵ֥י הַ/בַּ֛יִת לַ/הֵיכָ֖ל זָהָֽב׃
translation:
  text: the snuffers, the basins, the bowls, and the firepans of pure gold; and the entrance of the house—its inner doors for the Most Holy Place, and the doors of the house for the nave—were of gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the Holy of Holies.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for the temple hall' or 'for the sanctuary.' The Hebrew hekal here denotes the main room of the temple, distinct from the inner Most Holy Place.
    reason: lexical_alternative
  - marker: c
    text: Or 'the firepans,'.
    reason: previous_rendering
lexical_decisions:
- source_word: מְזַמְּרוֹת
  chosen: snuffers
  alternatives:
  - trimmers
  - knives
  lexicon: HALOT
  rationale: In temple-furnishing contexts this term refers to an implement for trimming or snuffing lamp wicks. 'Snuffers' is the most idiomatic English rendering here and fits the cultic inventory better than the broader 'knives.'
- source_word: מִּזְרָקוֹת
  chosen: basins
  alternatives:
  - bowls
  - sprinkling bowls
  lexicon: HALOT
  rationale: The term commonly denotes vessels used for receiving or sprinkling sacrificial blood. 'Basins' distinguishes it from the following כַּפּוֹת and preserves the likely ritual function.
- source_word: כַּפּוֹת
  chosen: bowls
  alternatives:
  - cups
  - pans
  lexicon: HALOT
  rationale: This noun can denote small containers or bowls. 'Bowls' is a natural English equivalent and avoids collapsing it into the preceding מִזְרָקוֹת.
- source_word: מַּחְתּוֹת
  chosen: firepans
  alternatives:
  - censers
  - ash pans
  lexicon: HALOT
  rationale: The term refers to vessels for carrying coals or fire. 'Firepans' is broad enough to fit the temple inventory without over-specifying incense use, which 'censers' might imply.
- source_word: זָהָב סָגוּר
  chosen: pure gold
  alternatives:
  - refined gold
  - closed gold
  lexicon: HALOT
  rationale: The collocation denotes high-quality refined gold. 'Pure gold' is standard, clear English and captures the sense of carefully refined precious metal.
- source_word: פֶּתַח הַבַּיִת
  chosen: the entrance of the house
  alternatives:
  - the doorway of the house
  - the opening of the house
  lexicon: HALOT
  rationale: פֶּתַח denotes an entrance/opening. 'Entrance of the house' works smoothly with the following appositional specification of the doors.
- source_word: דַּלְתוֹתָיו הַפְּנִימִיּוֹת
  chosen: its inner doors
  alternatives:
  - its inner door-leaves
  - its innermost doors
  lexicon: HALOT
  rationale: The plural refers to the paired doors or door-leaves. 'Its inner doors' is readable modern English and preserves the contrast with the outer set named next.
- source_word: לְקֹדֶשׁ הַקֳּדָשִׁים
  chosen: for the Most Holy Place
  alternatives:
  - for the Holy of Holies
  lexicon: HALOT
  rationale: Both are accurate. 'Most Holy Place' is clearer for modern readers while preserving the superlative force of the Hebrew construct.
- source_word: וְדַלְתֵי הַבַּיִת לַהֵיכָל
  chosen: and the doors of the house for the nave
  alternatives:
  - and the doors of the house for the temple hall
  - and the doors of the house for the sanctuary
  lexicon: HALOT
  rationale: הֵיכָל here refers to the main hall of the temple, distinct from the inner sanctuary. 'Nave' concisely conveys the main chamber, though a footnote preserves a more familiar alternative.
- source_word: זָהָב
  chosen: were of gold
  alternatives:
  - gold
  - of gold
  lexicon: HALOT
  rationale: The final noun predicates the material of the doors. Supplying 'were of' is required for natural English syntax.
