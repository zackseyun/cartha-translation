id: 2CH.4.15
reference: 2 Chronicles 4:15
source:
  edition: WLC
  text: אֶת הַ/יָּ֖ם אֶחָ֑ד וְ/אֶת הַ/בָּקָ֥ר שְׁנֵים עָשָׂ֖ר תַּחְתָּֽי/ו־־־׃
translation:
  text: the one Sea, and the twelve oxen under it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the basin called the Sea, and the twelve oxen under it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיָּם
  chosen: the Sea
  alternatives:
  - the basin
  - the sea
  lexicon: HALOT
  rationale: יָם literally means 'sea,' but in temple-furnishing contexts it refers
    to the large cast basin known as the 'Sea.' Capitalizing 'Sea' preserves the established
    object-name while remaining transparent to the Hebrew.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - single
  lexicon: HALOT
  rationale: The numeral straightforwardly modifies 'Sea.' Rendering it as 'one' preserves
    the Hebrew count and the inventory style of the surrounding verses.
- source_word: הַבָּקָר
  chosen: oxen
  alternatives:
  - cattle
  - bulls
  lexicon: HALOT
  rationale: בָּקָר is a collective term for bovines/cattle, but here it denotes the
    twelve bovine figures supporting the Sea. 'Oxen' is the most idiomatic and traditional
    English rendering for such large bovine supports; 'bulls' is possible but less
    certain from the collective noun alone.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  lexicon: HALOT
  rationale: Standard rendering of the compound numeral; no contextual reason to expand
    or paraphrase.
- source_word: תַּחְתָּיו
  chosen: under it
  alternatives:
  - beneath it
  - underneath it
  lexicon: HALOT
  rationale: The preposition with 3ms suffix refers back to the singular masculine
    'Sea.' 'Under it' is the most natural concise English equivalent.
- source_word: אֶת ... וְאֶת
  chosen: '[not separately translated; marks the direct objects]'
  lexicon: Hebrew grammar
  rationale: אֶת functions as the direct-object marker before 'the Sea' and 'the oxen.'
    It has no standalone English equivalent and is represented by English word order.
