id: 2CH.4.5
reference: 2 Chronicles 4:5
source:
  edition: WLC
  text: וְ/עָבְי֣/וֹ טֶ֔פַח וּ/שְׂפָת/וֹ֙ כְּ/מַעֲשֵׂ֣ה שְׂפַת כּ֔וֹס פֶּ֖רַח שֽׁוֹשַׁנָּ֑ה
    מַחֲזִ֣יק בַּתִּ֔ים שְׁלֹ֥שֶׁת אֲלָפִ֖ים יָכִֽיל־׃ס
translation:
  text: Its thickness was a handbreadth, and its rim was made like the rim of a cup,
    like a lily blossom. It could hold three thousand baths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A bath was an ancient Hebrew unit of liquid measure.
    reason: cultural_note
  - marker: b
    text: 1 Kings 7:26 says the sea held two thousand baths. Chronicles here gives
      three thousand baths, likely reflecting either total capacity versus normal
      working volume, or a textual/tradition difference.
    reason: cross_reference
lexical_decisions:
- source_word: עָבְיוֹ
  chosen: its thickness
  alternatives:
  - its thickness/width
  lexicon: HALOT
  rationale: The noun refers to the thickness of the cast metal sea's wall. 'Thickness'
    is the most natural English rendering in this architectural context.
- source_word: טֶפַח
  chosen: a handbreadth
  alternatives:
  - a span
  lexicon: HALOT
  rationale: A standard small unit of measure, conventionally rendered 'handbreadth.'
    'Span' is less precise here and can suggest a larger measure.
- source_word: שְׂפָתוֹ
  chosen: its rim
  alternatives:
  - its lip
  - its edge
  lexicon: HALOT
  rationale: For a vessel, שָׂפָה commonly denotes the lip or rim. 'Rim' is idiomatic
    modern English for a large basin.
- source_word: כְּמַעֲשֵׂה
  chosen: was made like
  alternatives:
  - like the workmanship of
  - like the work of
  lexicon: HALOT
  rationale: The phrase indicates crafted form or design. 'Was made like' preserves
    the comparison while reading naturally in English.
- source_word: שְׂפַת כּוֹס
  chosen: the rim of a cup
  alternatives:
  - the lip of a cup
  lexicon: HALOT
  rationale: A direct comparison to the shaped edge of a cup. 'Rim' matches the earlier
    rendering of שָׂפָה for consistency in vessel imagery.
- source_word: פֶּרַח שׁוֹשַׁנָּה
  chosen: a lily blossom
  alternatives:
  - a lily flower
  - a blossoming lily
  lexicon: HALOT
  rationale: The phrase appositionally describes the cup-like rim as flower-shaped.
    'Lily blossom' is concise and vivid without over-paraphrasing.
- source_word: מַחֲזִיק
  chosen: could hold
  alternatives:
  - holding
  - containing
  lexicon: HALOT
  rationale: Although formally a participle ('holding'), in English the sense is capacity.
    'Could hold' expresses the functional meaning naturally.
- source_word: בַּתִּים
  chosen: baths
  alternatives:
  - bath-measures
  lexicon: HALOT
  rationale: This is the Hebrew liquid measure bath. It is best transliterated rather
    than converted, preserving the source unit.
- source_word: שְׁלֹשֶׁת אֲלָפִים
  chosen: three thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number modifying the capacity statement.
- source_word: יָכִיל
  chosen: It could hold
  alternatives:
  - it contained
  - it held
  lexicon: HALOT
  rationale: The verb reinforces capacity. Rendering with 'could hold' avoids awkward
    duplication while preserving the sense of volume capacity.
