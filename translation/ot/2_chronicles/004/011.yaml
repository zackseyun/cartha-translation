id: 2CH.4.11
reference: 2 Chronicles 4:11
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ חוּרָ֔ם אֶת הַ֨/סִּיר֔וֹת וְ/אֶת הַ/יָּעִ֖ים וְ/אֶת הַ/מִּזְרָק֑וֹת
    וַ/יְכַ֣ל חירם לַ/עֲשׂוֹת֙ אֶת הַ/מְּלָאכָ֔ה אֲשֶׁ֥ר עָשָׂ֛ה לַ/מֶּ֥לֶךְ שְׁלֹמֹ֖ה
    בְּ/בֵ֥ית הָ/אֱלֹהִֽים־־־ס־׃
translation:
  text: 'Huram made the pots, the shovels, and the bowls. So Huram finished doing
    the work that he did for King Solomon in the house of God:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew name also spelled 'Hiram' in related passages and English tradition.
    reason: alternative_reading
lexical_decisions:
- source_word: חוּרָם / חירם
  chosen: Huram
  alternatives:
  - Hiram
  lexicon: HALOT
  rationale: The Chronicler's spelling here is Huram/Hiram; a standard English transliteration
    is required by the translation philosophy. 'Huram' follows the form most directly
    reflected in this verse's consonantal/vocalized text, while 'Hiram' is a familiar
    alternative preserved in a footnote-worthy note.
- source_word: הַסִּירוֹת
  chosen: pots
  alternatives:
  - basins
  - pails
  - cooking pots
  lexicon: HALOT
  rationale: סִירוֹת commonly denotes pots or vessels. 'Pots' is the most natural
    and sufficiently concrete rendering in this temple-furnishings context without
    over-specifying function.
- source_word: הַיָּעִים
  chosen: shovels
  alternatives:
  - scoops
  lexicon: HALOT
  rationale: יָעִים refers to implements for removing ashes or handling material from
    the altar. 'Shovels' is the standard and contextually fitting English equivalent.
- source_word: הַמִּזְרָקוֹת
  chosen: bowls
  alternatives:
  - basins
  - sprinkling bowls
  lexicon: HALOT
  rationale: מִזְרָקוֹת are ritual bowls used in temple service. 'Bowls' is clear
    modern English; 'sprinkling bowls' may be too interpretive for the main text,
    though the ritual association is real.
- source_word: וַיְכַל
  chosen: finished
  alternatives:
  - completed
  - brought to an end
  lexicon: HALOT
  rationale: כלה in this construction means to complete or finish. 'Finished' is idiomatic
    and preserves the narrative sense.
- source_word: לַעֲשׂוֹת אֶת הַמְּלָאכָה
  chosen: doing the work
  alternatives:
  - making the work
  - performing the workmanship
  lexicon: HALOT
  rationale: The infinitive plus מְלָאכָה expresses carrying out the assigned craftsmanship.
    'Doing the work' is natural English and adequately formal.
- source_word: אֲשֶׁר עָשָׂה לַמֶּלֶךְ שְׁלֹמֹה
  chosen: that he did for King Solomon
  alternatives:
  - that he made for King Solomon
  - which he performed for King Solomon
  lexicon: HALOT
  rationale: The repeated עשה can be rendered broadly as 'did' to avoid awkward overuse
    of 'made' after the list of objects, while still covering the full scope of commissioned
    labor.
- source_word: בְּבֵית הָאֱלֹהִים
  chosen: in the house of God
  alternatives:
  - for the house of God
  - in the temple of God
  lexicon: HALOT
  rationale: The preposition בְּ most naturally yields 'in,' and בֵּית הָאֱלֹהִים
    is literally 'the house of God.' 'Temple of God' is possible but less formally
    transparent than the Hebrew expression.
