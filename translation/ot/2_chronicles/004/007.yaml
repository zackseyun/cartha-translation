id: 2CH.4.7
reference: 2 Chronicles 4:7
source:
  edition: WLC
  text: וַ֠/יַּעַשׂ אֶת מְנֹר֧וֹת הַ/זָּהָ֛ב עֶ֖שֶׂר כְּ/מִשְׁפָּטָ֑/ם וַ/יִּתֵּן֙
    בַּֽ/הֵיכָ֔ל חָמֵ֥שׁ מִ/יָּמִ֖ין וְ/חָמֵ֥שׁ מִ/שְּׂמֹֽאול־׃ס
translation:
  text: He made ten gold lampstands according to their prescribed design, and he placed
    them in the temple, five on the right side and five on the left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to their ordinance' or 'according to their pattern.' The Hebrew
      term can denote a prescribed rule, procedure, or design.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'five on the right and five on the left'; these may correspond to
      the south and north sides depending on temple orientation.
    reason: cultural_note
  - marker: c
    text: Or 'in the main hall' or 'in the sanctuary'; the Hebrew refers to the temple
      building proper rather than the wider complex.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  - He fashioned
  lexicon: HALOT
  rationale: Qal wayyiqtol of עשה, the standard narrative verb 'made/did.' 'He made'
    is natural modern English; the prefixed conjunction is absorbed into the narrative
    flow.
- source_word: מְנֹרוֹת
  chosen: lampstands
  alternatives:
  - lamps
  - menorahs
  lexicon: HALOT
  rationale: מְנוֹרָה denotes a lampstand rather than merely a lamp. 'Lampstands'
    is the clearest English equivalent; 'menorahs' would transliterate rather than
    translate.
- source_word: הַזָּהָב
  chosen: gold
  alternatives:
  - of gold
  - golden
  lexicon: HALOT
  rationale: 'The noun with article functions attributively after מְנֹרוֹת: ''the
    gold lampstands'' = ''gold lampstands.'' ''Gold'' is concise and idiomatic.'
- source_word: עֶשֶׂר
  chosen: ten
  lexicon: HALOT
  rationale: Straightforward cardinal number modifying 'lampstands.'
- source_word: כְּמִשְׁפָּטָם
  chosen: according to their prescribed design
  alternatives:
  - according to their ordinance
  - according to their rule
  - according to their pattern
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, ordinance, legal right, or prescribed procedure/pattern.
    In a temple-furnishings context, it refers to the proper specification or prescribed
    arrangement. 'According to their prescribed design' communicates that the lampstands
    were made in conformity with an established standard.
- source_word: וַיִּתֵּן
  chosen: and he placed
  alternatives:
  - and he put
  - and he set
  lexicon: HALOT
  rationale: נתן literally means 'gave/put.' In this spatial context, 'placed' best
    fits English for positioning temple furnishings.
- source_word: בַּהֵיכָל
  chosen: in the temple
  alternatives:
  - in the nave
  - in the main hall
  - in the sanctuary
  lexicon: HALOT
  rationale: הֵיכָל here refers to the temple building/main hall rather than the entire
    temple complex in a broad sense. 'Temple' is the most readable default in English,
    though more specific alternatives are possible.
- source_word: חָמֵשׁ מִיָּמִין
  chosen: five on the right side
  alternatives:
  - five to the right
  - five on the south side
  lexicon: HALOT
  rationale: יָמִין literally means 'right hand/right side.' In temple orientation
    it can imply the south side, but the Hebrew says 'right,' so that wording is preserved
    in the main text.
- source_word: וְחָמֵשׁ מִשְּׂמֹאול
  chosen: and five on the left
  alternatives:
  - and five to the left
  - and five on the north side
  lexicon: HALOT
  rationale: שְׂמֹאול means 'left side.' As with 'right,' the directional term is
    retained rather than converting it interpretively to a compass direction.
