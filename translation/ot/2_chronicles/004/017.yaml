id: 2CH.4.17
reference: 2 Chronicles 4:17
source:
  edition: WLC
  text: בְּ/כִכַּ֤ר הַ/יַּרְדֵּן֙ יְצָקָ֣/ם הַ/מֶּ֔לֶךְ בַּ/עֲבִ֖י הָ/אֲדָמָ֑ה בֵּ֥ין
    סֻכּ֖וֹת וּ/בֵ֥ין צְרֵדָֽתָ/ה׃
translation:
  text: In the plain of the Jordan the king cast them in the clay ground, between
    Sukkoth and Zeredah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The parallel in 1 Kings 7:46 names the location as 'Zarethan.' Chronicles
      here reads 'Zeredah,' likely a variant form of the same place-name.
    reason: textual_variant
lexical_decisions:
- source_word: בְּכִכַּר הַיַּרְדֵּן
  chosen: in the plain of the Jordan
  alternatives:
  - in the circle of the Jordan
  - in the Jordan Valley
  lexicon: HALOT
  rationale: כִּכָּר can denote a round district or plain/valley region. In this geographical
    context, 'plain' is natural modern English and preserves the topographical sense
    without over-paraphrasing.
- source_word: יְצָקָם
  chosen: cast them
  alternatives:
  - poured them
  - cast them in molds
  lexicon: HALOT
  rationale: The verb יצק commonly refers to pouring/casting metal objects. Because
    the object is plural and the context is manufacture of bronze temple furnishings,
    'cast them' best captures the metallurgical sense in idiomatic English.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to Solomon in context; 'the king' is the straightforward
    rendering.
- source_word: בַּעֲבִי הָאֲדָמָה
  chosen: in the clay ground
  alternatives:
  - in the thick ground
  - in the thickness of the soil
  - in the clay soil
  lexicon: HALOT
  rationale: עֲבִי literally denotes thickness/density; with אֲדָמָה here it refers
    to dense clayey soil suitable for casting molds. 'Clay ground' is concise and
    reflects the likely practical sense.
- source_word: בֵּין סֻכּוֹת וּבֵין צְרֵדָתָה
  chosen: between Sukkoth and Zeredah
  alternatives:
  - between Succoth and Zarethan
  lexicon: HALOT
  rationale: Place names are transliterated by standard conventions per project philosophy.
    The Chronicler's form צְרֵדָתָה is rendered 'Zeredah'; a more familiar Kings parallel
    form is preserved in a footnote.
