id: 2CH.4.14
reference: 2 Chronicles 4:14
source:
  edition: WLC
  text: וְ/אֶת הַ/מְּכֹנ֖וֹת עָשָׂ֑ה וְ/אֶת הַ/כִּיֹּר֥וֹת עָשָׂ֖ה עַל הַ/מְּכֹנֽוֹת־־־׃
translation:
  text: He made the stands, and he made the basins on the stands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bases' for 'stands'; the Hebrew term refers to the supporting structures
      for the basins.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'lavers' instead of 'basins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְּכֹנוֹת
  chosen: the stands
  alternatives:
  - the bases
  - the carts
  lexicon: HALOT
  rationale: מְכוֹנוֹת here refers to the crafted supports described in the temple
    furnishings context (cf. the parallel in 1 Kgs 7). 'Stands' is clear modern English
    and fits the function of supporting the basins. 'Bases' is possible and traditional,
    but can sound abstract in English; 'carts' is too specific unless mobility is
    emphasized.
- source_word: עָשָׂה
  chosen: made
  alternatives:
  - fashioned
  lexicon: HALOT
  rationale: The common verb עשה is straightforwardly rendered 'made.' 'Fashioned'
    is possible in artisan contexts, but 'made' better preserves the plain sense without
    adding stylistic color not required by the Hebrew.
- source_word: הַכִּיֹּרוֹת
  chosen: the basins
  alternatives:
  - the lavers
  lexicon: HALOT
  rationale: כִּיּוֹר denotes a basin for washing. 'Basins' is readable modern English
    and suits the temple furnishing context. 'Lavers' is traditional but archaic for
    the target audience.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: The preposition simply indicates placement of the basins atop the stands.
    'On' is the natural modern equivalent; 'upon' is more formal but not necessary.
- source_word: וְאֶת ... וְאֶת
  chosen: and ... and
  alternatives:
  - also ... and
  lexicon: HALOT
  rationale: The repeated object marker with conjunction structures the list of items
    made. English idiom is best served by coordinating the two clauses with 'and'
    rather than reproducing the object marker mechanically.
