id: 2CH.4.4
reference: 2 Chronicles 4:4
source:
  edition: WLC
  text: עוֹמֵ֞ד עַל שְׁנֵ֧ים עָשָׂ֣ר בָּקָ֗ר שְׁלֹשָׁ֣ה פֹנִ֣ים צָפ֡וֹנָ/ה וּ/שְׁלוֹשָׁה֩
    פֹנִ֨ים יָ֜מָּ/ה וּ/שְׁלֹשָׁ֣ה פֹּנִ֣ים נֶ֗גְבָּ/ה וּ/שְׁלֹשָׁה֙ פֹּנִ֣ים מִזְרָ֔חָ/ה
    וְ/הַ/יָּ֥ם עֲלֵי/הֶ֖ם מִ/לְ/מָ֑עְלָ/ה וְ/כָל אֲחֹרֵי/הֶ֖ם בָּֽיְתָ/ה־׀׀׀־׃
translation:
  text: 'It stood on twelve oxen: three facing north, three facing west, three facing
    south, and three facing east. The Sea was above them, and all their rear parts
    were inward.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'three faces northward ... three faces seaward.' Here
      'west' renders the idiomatic directional use of 'seaward.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all their hindquarters were inward.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹמֵד
  chosen: It stood
  alternatives:
  - standing
  lexicon: HALOT
  rationale: Qal participle of עמד functions predicatively/descriptively for the bronze
    Sea's position. English finite verb reads naturally while preserving the stative
    sense.
- source_word: בָּקָר
  chosen: oxen
  alternatives:
  - cattle
  - bulls
  lexicon: HALOT
  rationale: Refers here to the twelve bovine figures supporting the Sea. 'Oxen' is
    the standard English collective for bovines in such architectural/cultic description
    and avoids over-specifying sex as 'bulls'.
- source_word: פֹנִים
  chosen: facing
  alternatives:
  - turned toward
  - looking toward
  lexicon: HALOT
  rationale: Although literally 'faces,' in this directional construction it idiomatically
    describes orientation. 'Facing' is concise and natural in English.
- source_word: צָפוֹנָה
  chosen: north
  alternatives:
  - northward
  lexicon: HALOT
  rationale: Directional he indicates motion/orientation toward a direction; in English
    architectural description the simple cardinal 'north' after 'facing' is idiomatic.
- source_word: יָמָּה
  chosen: west
  alternatives:
  - seaward
  - toward the sea
  lexicon: HALOT
  rationale: Though from ים ('sea'), in Hebrew directional usage it commonly means
    'west.' Here the cardinal direction best communicates the sense for modern readers.
- source_word: נֶגְבָּה
  chosen: south
  alternatives:
  - southward
  - Negeb-ward
  lexicon: HALOT
  rationale: In this directional list the term denotes the south, not specifically
    the Negeb region.
- source_word: מִזְרָחָה
  chosen: east
  alternatives:
  - eastward
  - toward the sunrise
  lexicon: HALOT
  rationale: Standard directional term; 'east' is the clearest idiomatic rendering
    after 'facing'.
- source_word: הַיָּם
  chosen: The Sea
  alternatives:
  - the basin
  - the molten sea
  lexicon: HALOT
  rationale: This is the established name of the large temple basin in context, not
    the geographic sea. Capitalizing 'Sea' signals it as the named cultic object while
    preserving the Hebrew term.
- source_word: עֲלֵיהֶם מִלְמָעְלָה
  chosen: was above them
  alternatives:
  - rested on them above
  - was on top of them
  lexicon: HALOT
  rationale: Expresses the Sea's position over the oxen. 'Was above them' is clear
    and avoids awkward redundancy with the earlier 'stood on'.
- source_word: אֲחֹרֵיהֶם
  chosen: their rear parts
  alternatives:
  - their hindquarters
  - their backsides
  lexicon: HALOT
  rationale: Literally 'their back parts/behind parts.' Since the verse describes
    animal figures, 'rear parts' is anatomically clear without sounding crude.
- source_word: בָּיְתָה
  chosen: inward
  alternatives:
  - toward the inside
  - toward the center
  lexicon: HALOT
  rationale: Directional form from 'house/inside' means inward, i.e., toward the interior
    beneath the basin. 'Inward' is concise and fits the spatial description.
