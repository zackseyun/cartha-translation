id: 2CH.4.8
reference: 2 Chronicles 4:8
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ שֻׁלְחָנוֹת֮ עֲשָׂרָה֒ וַ/יַּנַּח֙ בַּֽ/הֵיכָ֔ל חֲמִשָּׁ֥ה מִ/יָּמִ֖ין
    וַ/חֲמִשָּׁ֣ה מִ/שְּׂמֹ֑אול וַ/יַּ֛עַשׂ מִזְרְקֵ֥י זָהָ֖ב מֵאָֽה׃
translation:
  text: He made ten tables and placed them in the temple, five on the right side and
    five on the left; he also made one hundred bowls of gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “gold basins” or “gold sprinkling bowls”; the Hebrew term refers to ritual
      vessels used in temple service.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֻׁלְחָנוֹת
  chosen: tables
  alternatives:
  - tablets
  - stands
  lexicon: HALOT
  rationale: The noun commonly denotes tables. In the temple-furnishings context,
    'tables' is the plain sense and matches the parallel description in Chronicles
    without over-specifying their function.
- source_word: וַיַּנַּח
  chosen: placed
  alternatives:
  - set
  - put
  - caused to rest
  lexicon: HALOT
  rationale: The verb means to set down or place. 'Placed' is natural modern English
    and preserves the concrete action of positioning the objects.
- source_word: בַּהֵיכָל
  chosen: in the temple
  alternatives:
  - in the palace
  - in the nave
  lexicon: HALOT
  rationale: In this cultic context הֵיכָל refers to the temple building/sanctuary,
    not a royal palace. 'In the temple' is clear and idiomatic for modern readers.
- source_word: מִיָּמִין
  chosen: on the right side
  alternatives:
  - to the right
  - on the south side
  lexicon: HALOT
  rationale: Literally 'from/right.' In placement language, 'on the right side' best
    conveys spatial arrangement. A more interpretive compass direction is avoided.
- source_word: מִשְּׂמֹאול
  chosen: on the left
  alternatives:
  - to the left
  - on the north side
  lexicon: HALOT
  rationale: The term denotes the left side. 'On the left' pairs naturally with 'on
    the right side' and avoids importing a compass orientation not explicit in the
    text.
- source_word: מִזְרְקֵי זָהָב
  chosen: bowls of gold
  alternatives:
  - gold basins
  - gold sprinkling bowls
  lexicon: HALOT
  rationale: מִזְרָק denotes a bowl/basin used in ritual contexts, often for receiving
    or tossing blood. 'Bowls of gold' is accurate and readable; the more technical
    ritual nuance can be preserved as an alternative.
- source_word: מֵאָה
  chosen: one hundred
  alternatives:
  - a hundred
  lexicon: HALOT
  rationale: The cardinal number is rendered straightforwardly. 'One hundred' is slightly
    more formal and suits the inventory style of the verse.
