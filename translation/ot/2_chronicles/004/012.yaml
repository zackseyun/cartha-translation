id: 2CH.4.12
reference: 2 Chronicles 4:12
source:
  edition: WLC
  text: עַמּוּדִ֣ים שְׁנַ֔יִם וְ/הַ/גֻּלּ֧וֹת וְ/הַ/כֹּתָר֛וֹת עַל רֹ֥אשׁ הָ/עַמּוּדִ֖ים
    שְׁתָּ֑יִם וְ/הַ/שְּׂבָכ֣וֹת שְׁתַּ֔יִם לְ/כַסּ֗וֹת אֶת שְׁתֵּי֙ גֻּלּ֣וֹת הַ/כֹּֽתָר֔וֹת
    אֲשֶׁ֖ר עַל רֹ֥אשׁ הָֽ/עַמּוּדִֽים־־־׃
translation:
  text: the two pillars, and the two bowls and the two capitals on top of the pillars,
    and the two latticeworks to cover the two bowls of the capitals that were on top
    of the pillars;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'globes' or 'rounded forms' for 'bowls'; the exact architectural shape
      denoted by the Hebrew is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'networks' for 'latticeworks.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמּוּדִים
  chosen: pillars
  alternatives:
  - columns
  lexicon: HALOT
  rationale: Refers to the two freestanding temple supports described in this context.
    'Pillars' is the standard and clear architectural term in English.
- source_word: גֻּלּוֹת
  chosen: bowls
  alternatives:
  - globes
  - rounded forms
  lexicon: HALOT
  rationale: The noun denotes rounded, bowl-like structures associated with the tops
    of the pillars. 'Bowls' best fits the likely shape and remains understandable
    in modern English. Because the exact architectural form is somewhat uncertain,
    alternatives are preserved in a footnote.
- source_word: כֹּתָרוֹת
  chosen: capitals
  alternatives:
  - crowns
  - chapiters
  lexicon: HALOT
  rationale: In architectural context this refers to the capital, the topmost ornamental
    part of a pillar. 'Capitals' is precise modern English; 'crowns' is too figurative
    here, and 'chapiters' is archaic.
- source_word: רֹאשׁ
  chosen: top
  alternatives:
  - head
  lexicon: HALOT
  rationale: Although literally 'head,' in architectural usage it naturally means
    the top or upper part. 'Top' is idiomatic and contextually accurate.
- source_word: שְּׂבָכוֹת
  chosen: latticeworks
  alternatives:
  - networks
  - grilles
  lexicon: HALOT
  rationale: The term denotes an interwoven or net-like ornamental structure. 'Latticeworks'
    communicates the decorative architectural sense well, while 'networks' is possible
    but less concrete.
- source_word: לְכַסּוֹת
  chosen: to cover
  alternatives:
  - for covering
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To cover' is natural English and preserves
    the function of the latticeworks.
- source_word: אֲשֶׁר
  chosen: that were
  alternatives:
  - which were
  lexicon: HALOT
  rationale: Introduces a relative clause referring back to the bowls/capitals on
    the pillars. 'That were' is smooth modern English.
- source_word: שְׁנַיִם / שְׁתַּיִם / שְׁתֵּי
  chosen: two
  lexicon: HALOT
  rationale: The repeated numerals are retained throughout because the Hebrew deliberately
    inventories the temple furnishings item by item.
