id: 2CH.4.3
reference: 2 Chronicles 4:3
source:
  edition: WLC
  text: וּ/דְמ֣וּת בְּקָרִים֩ תַּ֨חַת ל֜/וֹ סָבִ֤יב סָבִיב֙ סוֹבְבִ֣ים אֹת֔/וֹ עֶ֚שֶׂר
    בָּֽ/אַמָּ֔ה מַקִּיפִ֥ים אֶת הַ/יָּ֖ם סָבִ֑יב שְׁנַ֤יִם טוּרִים֙ הַ/בָּקָ֔ר יְצוּקִ֖ים
    בְּ/מֻֽצַקְתּֽ/וֹ׀־׃
translation:
  text: And beneath it were figures of oxen all around, encircling it, ten to the
    cubit, surrounding the Sea all around. The oxen were in two rows, cast as one
    piece with it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'likenesses of oxen'; the Hebrew indicates decorative bovine forms rather
      than living animals.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'ten to the cubit,' likely meaning ten figures for each cubit around
      the circumference.
    reason: cultural_note
  - marker: c
    text: Or 'cast in its casting,' that is, formed as part of the same molten work.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּדְמוּת
  chosen: figures of
  alternatives:
  - likenesses of
  - images of
  lexicon: HALOT
  rationale: דְּמוּת denotes likeness, form, or representation rather than literal
    animals. 'Figures of' communicates decorative representations in clear modern
    English.
- source_word: בְּקָרִים
  chosen: oxen
  alternatives:
  - bulls
  - cattle
  lexicon: HALOT
  rationale: The plural of בָּקָר can denote bovines generally, but in temple-furnishing
    description 'oxen' is the most natural and traditional English rendering for the
    sculpted bovine forms.
- source_word: תַּחַת לוֹ
  chosen: beneath it
  alternatives:
  - under it
  - below it
  lexicon: HALOT
  rationale: Refers to the underside/below the rim or body of the Sea. 'Beneath it'
    is idiomatic and spatially clear.
- source_word: סָבִיב סָבִיב
  chosen: all around
  alternatives:
  - round about
  - around and around
  lexicon: HALOT
  rationale: The repetition intensifies the encircling sense. English usually expresses
    this naturally as 'all around' rather than duplicating 'around' twice.
- source_word: סוֹבְבִים אֹתוֹ
  chosen: encircling it
  alternatives:
  - surrounding it
  lexicon: HALOT
  rationale: Participial form describes the decorative figures as going around the
    vessel. 'Encircling' preserves the visual force.
- source_word: עֶשֶׂר בָּאַמָּה
  chosen: ten to the cubit
  alternatives:
  - ten per cubit
  - ten in a cubit
  lexicon: HALOT
  rationale: The phrase indicates the density/count along the circumference. 'Ten
    to the cubit' is concise and preserves the measurement relation.
- source_word: מַקִּיפִים אֶת הַיָּם סָבִיב
  chosen: surrounding the Sea all around
  alternatives:
  - going around the Sea
  - encircling the Sea
  lexicon: HALOT
  rationale: Keeps the object explicit and preserves the repeated circular imagery.
    'Sea' is capitalized because it is the conventional designation of this temple
    basin.
- source_word: שְׁנַיִם טוּרִים
  chosen: in two rows
  alternatives:
  - two rows
  - double rows
  lexicon: HALOT
  rationale: טוּרִים refers to rows. The phrase describes the arrangement of the ox
    figures. 'In two rows' reads smoothly in English.
- source_word: הַבָּקָר
  chosen: The oxen
  alternatives:
  - the ox figures
  - the bovines
  lexicon: HALOT
  rationale: Though singular in form collectively, contextually it refers to the decorative
    ox representations already mentioned; English plural 'the oxen' best matches the
    sense.
- source_word: יְצוּקִים
  chosen: cast
  alternatives:
  - molten
  - poured
  lexicon: HALOT
  rationale: In metalworking context, יצק refers to casting metal. 'Cast' is standard
    and clear.
- source_word: בְּמֻצַקְתּוֹ
  chosen: as one piece with it
  alternatives:
  - in its casting
  - when it was cast
  - in the same casting as it
  lexicon: HALOT
  rationale: The phrase indicates that the ox figures were formed in the same casting
    as the Sea rather than attached later. 'As one piece with it' makes the manufacturing
    sense explicit in natural English.
