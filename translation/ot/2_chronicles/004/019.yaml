theological_decisions:
- issue: Rendering of the temple term בֵּית הָאֱלֹהִים
  chosen_reading: the house of God
  alternative_readings:
  - the temple of God
  rationale: No doctrinal dispute is at stake, but the translation philosophy prioritizes
    original-language primacy over inherited English tradition. The literal designation
    'house of God' preserves the Hebrew idiom without loss of meaning.
  doctrine_reference: Translation philosophy §1
- issue: Rendering of לֶחֶם הַפָּנִים
  chosen_reading: the bread of the Presence
  alternative_readings:
  - showbread
  rationale: The chosen rendering favors transparency and source-language sense over
    ecclesiastical tradition, while preserving the cultic/theological significance
    of bread set before God.
  doctrine_reference: Translation philosophy §1, §6
