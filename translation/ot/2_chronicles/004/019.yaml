id: 2CH.4.19
reference: 2 Chronicles 4:19
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ שְׁלֹמֹ֔ה אֵ֚ת כָּל הַ/כֵּלִ֔ים אֲשֶׁ֖ר בֵּ֣ית הָ/אֱלֹהִ֑ים וְ/אֵת֙
    מִזְבַּ֣ח הַ/זָּהָ֔ב וְ/אֶת הַ/שֻּׁלְחָנ֔וֹת וַ/עֲלֵי/הֶ֖ם לֶ֥חֶם הַ/פָּנִֽים־־׃
translation:
  text: 'And Solomon made all the vessels that were in the house of God: the golden
    altar, the tables, and on them the bread of the Presence.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, traditionally, “showbread.” Hebrew: “bread of the Presence.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: made
  alternatives:
  - fashioned
  - constructed
  lexicon: HALOT
  rationale: The verb עשה is the common term 'to make/do.' In this inventory context,
    'made' is the most natural and sufficiently formal rendering.
- source_word: כָּל הַכֵּלִים
  chosen: all the vessels
  alternatives:
  - all the utensils
  - all the articles
  lexicon: HALOT
  rationale: כֵּלִים denotes implements/articles used in worship. 'Vessels' is idiomatic
    in temple-furnishings contexts and preserves the cultic sense better than the
    broader 'articles.'
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: The Hebrew is literally 'house of God.' This is a standard temple designation;
    retaining 'house of God' stays closer to the source while remaining clear.
- source_word: מִזְבַּח הַזָּהָב
  chosen: the golden altar
  alternatives:
  - the altar of gold
  lexicon: HALOT
  rationale: The construct phrase is naturally rendered adjectivally in English. 'The
    golden altar' is the standard and clear expression.
- source_word: הַשֻּׁלְחָנוֹת
  chosen: the tables
  alternatives:
  - the table stands
  lexicon: HALOT
  rationale: The plural noun straightforwardly means 'tables.' In context these are
    the temple tables associated with the bread of the Presence.
- source_word: וַעֲלֵיהֶם
  chosen: and on them
  alternatives:
  - with on them
  - upon them
  lexicon: HALOT
  rationale: The prepositional phrase indicates the bread's placement on the tables.
    'And on them' preserves the Hebrew coordination and spatial relation.
- source_word: לֶחֶם הַפָּנִים
  chosen: the bread of the Presence
  alternatives:
  - the showbread
  - the bread set before God
  lexicon: HALOT
  rationale: This technical cultic expression is best rendered 'bread of the Presence,'
    which is both transparent and closer to the Hebrew than the traditional but less
    transparent 'showbread.'
