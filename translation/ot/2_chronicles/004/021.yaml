id: 2CH.4.21
reference: 2 Chronicles 4:21
source:
  edition: WLC
  text: וְ/הַ/פֶּ֧רַח וְ/הַ/נֵּר֛וֹת וְ/הַ/מֶּלְקַחַ֖יִם זָהָ֑ב ה֖וּא מִכְל֥וֹת זָהָֽב׃
translation:
  text: the flowers, the lamps, and the tongs of gold—purest gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'snuffers' or 'wick-tongs.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'gold—it was completions of gold,' an idiom likely indicating
      fully refined or perfectly finished gold.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַפֶּרַח
  chosen: the flowers
  alternatives:
  - the blossom
  - the floral work
  lexicon: HALOT
  rationale: פֶּרַח literally denotes a flower or blossom. In the temple-furnishing
    context, it likely refers to decorative floral elements associated with the lampstands.
    The plural English 'flowers' is used idiomatically in coordination with the following
    plural items, even though the Hebrew form here is singular/collective.
- source_word: וְהַנֵּרוֹת
  chosen: the lamps
  alternatives:
  - the lamp-cups
  - the lights
  lexicon: HALOT
  rationale: נֵרוֹת is the standard term for lamps/lights. 'Lamps' best fits the cultic
    furnishing context and standard English usage for temple implements.
- source_word: וְהַמֶּלְקַחַיִם
  chosen: the tongs
  alternatives:
  - the snuffers
  - the wick-tongs
  lexicon: HALOT
  rationale: מֶלְקַחַיִם refers to an implement for taking hold of wicks or coals,
    commonly rendered 'tongs' or 'snuffers.' 'Tongs' is the broader and more transparent
    term; the more specific functional nuance is preserved in a footnote.
- source_word: זָהָב
  chosen: of gold
  alternatives:
  - gold
  lexicon: HALOT
  rationale: The first occurrence of זָהָב directly qualifies the listed objects.
    'Of gold' is natural English in an inventory list.
- source_word: הוּא
  chosen: —
  alternatives:
  - it was
  - they were
  lexicon: HALOT
  rationale: The pronoun functions idiomatically in a verbless clause to emphasize
    the quality of the material rather than to introduce a separate predication. In
    English this is best represented by punctuation rather than a wooden explicit
    pronoun.
- source_word: מִכְלוֹת זָהָב
  chosen: purest gold
  alternatives:
  - finished gold
  - complete gold
  - perfect gold
  lexicon: HALOT
  rationale: The phrase is difficult, but in context it denotes gold brought to full
    refinement or completion in workmanship/material quality. 'Purest gold' communicates
    the likely sense idiomatically in modern English and matches the inventory emphasis
    on high-quality temple materials.
