id: 2CH.4.9
reference: 2 Chronicles 4:9
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ֙ חֲצַ֣ר הַ/כֹּהֲנִ֔ים וְ/הָ/עֲזָרָ֖ה הַ/גְּדוֹלָ֑ה וּ/דְלָת֧וֹת
    לָ/עֲזָרָ֛ה וְ/דַלְתוֹתֵי/הֶ֖ם צִפָּ֥ה נְחֹֽשֶׁת׃
translation:
  text: And he made the court of the priests, and the great court, and doors for the
    court; and he overlaid their doors with bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gates for the court.' The Hebrew noun more commonly means 'doors,' so
      'doors' is retained in the main text for consistency.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their doors'; English could also smooth this to 'its doors,' referring
      collectively to the court structures.
    reason: lexical_alternative
  - marker: c
    text: Or 'copper.' The Hebrew term can refer broadly to copper or bronze; 'bronze'
      fits the temple-furnishing context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: And he made
  alternatives:
  - And he fashioned
  - And he constructed
  lexicon: HALOT
  rationale: The verb עשה is broad ('make/do'). In this temple-construction context,
    'made' is natural and sufficiently formal without over-specifying the manner of
    construction.
- source_word: חֲצַר הַכֹּהֲנִים
  chosen: the court of the priests
  alternatives:
  - the priests' court
  - the courtyard of the priests
  lexicon: HALOT
  rationale: חָצֵר denotes a court/courtyard. 'Court of the priests' preserves the
    construct relationship transparently and matches temple architecture language.
- source_word: וְהָעֲזָרָה הַגְּדוֹלָה
  chosen: and the great court
  alternatives:
  - and the great courtyard
  - and the large enclosure
  lexicon: HALOT
  rationale: עֲזָרָה refers to a court/enclosure in temple context. 'Great court'
    is concise and idiomatic, and the adjective גְּדוֹלָה is preserved directly as
    'great' rather than weakened to merely 'large'.
- source_word: וּדְלָתוֹת לָעֲזָרָה
  chosen: and doors for the court
  alternatives:
  - and gates for the court
  - and doors for the enclosure
  lexicon: HALOT
  rationale: דֶּלֶת normally means 'door' rather than the larger 'gate' (for which
    other Hebrew terms are more typical). Since the verse later repeats the same noun
    for the doors themselves, consistency favors 'doors.'
- source_word: וְדַלְתוֹתֵיהֶם
  chosen: their doors
  alternatives:
  - its doors
  lexicon: HALOT
  rationale: The suffix is morphologically 3mp, hence literally 'their.' Although
    English might smooth this to 'its' with collective reference to the court, retaining
    'their' better reflects the Hebrew form and likely refers to the previously mentioned
    doors/court structures.
- source_word: צִפָּה
  chosen: he overlaid
  alternatives:
  - he plated
  - he covered
  lexicon: HALOT
  rationale: צפה in this construction commonly means to overlay or plate an object
    with metal. 'Overlaid' is standard and clear in architectural description.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In biblical material culture, נְחֹשֶׁת often denotes bronze as the conventional
    English rendering for temple furnishings, though the underlying metallurgy can
    overlap with copper. 'Bronze' best matches established object description in this
    context.
