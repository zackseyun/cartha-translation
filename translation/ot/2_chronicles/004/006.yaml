id: 2CH.4.6
reference: 2 Chronicles 4:6
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ כִּיּוֹרִים֮ עֲשָׂרָה֒ וַ֠/יִּתֵּן חֲמִשָּׁ֨ה מִ/יָּמִ֜ין וַ/חֲמִשָּׁ֤ה
    מִ/שְּׂמֹאול֙ לְ/רָחְצָ֣ה בָ/הֶ֔ם אֶת מַעֲשֵׂ֥ה הָ/עוֹלָ֖ה יָדִ֣יחוּ בָ֑/ם וְ/הַ/יָּ֕ם
    לְ/רָחְצָ֥ה לַ/כֹּהֲנִ֖ים בּֽ/וֹ־׃ס
translation:
  text: He made ten basins and set five on the right side and five on the left, to
    wash in them; in them they would rinse the things used for the burnt offering.
    But the sea was for the priests to wash in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lavers' for 'basins.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'the work of the burnt offering'; the phrase likely refers
      to the items or materials associated with preparing the burnt offering.
    reason: lexical_alternative
  - marker: c
    text: That is, the large basin called 'the sea' was for the priests' washing.
    reason: cultural_note
lexical_decisions:
- source_word: כִּיּוֹרִים
  chosen: basins
  alternatives:
  - lavers
  lexicon: HALOT
  rationale: Refers to large washbasins associated with temple service. 'Basins' is
    clear modern English; 'lavers' is traditional but less accessible.
- source_word: מִיָּמִין / מִשְּׂמֹאול
  chosen: on the right side / on the left
  alternatives:
  - to the right / to the left
  lexicon: HALOT
  rationale: These indicate placement orientation. 'On the right side' and 'on the
    left' communicate spatial arrangement naturally in English.
- source_word: לְרָחְצָה
  chosen: to wash
  alternatives:
  - for washing
  lexicon: HALOT
  rationale: Infinitive of purpose. 'To wash' preserves the purpose clause straightforwardly.
- source_word: מַעֲשֵׂה הָעוֹלָה
  chosen: the things used for the burnt offering
  alternatives:
  - the work of the burnt offering
  - what belonged to the burnt offering
  lexicon: HALOT
  rationale: The phrase is somewhat elliptical. In context it refers to the items/materials
    associated with preparing the burnt offering, not the abstract act alone. This
    rendering makes the cultic sense intelligible in natural English without over-paraphrasing.
- source_word: יָדִיחוּ
  chosen: they would rinse
  alternatives:
  - they washed
  - they rinsed off
  lexicon: HALOT
  rationale: 'The Hiphil of דוח/דיח conveys rinsing or washing off. ''Rinse'' fits
    the likely action performed on sacrificial items better than the broader ''wash.''
    The imperfect here is rendered as customary/habitual in context: ''they would
    rinse.'''
- source_word: וְהַיָּם
  chosen: the sea
  alternatives:
  - the large basin
  lexicon: HALOT
  rationale: This is the established designation for the great bronze reservoir. Translating
    it literally as 'the sea' preserves the source term and its distinctive character;
    the referent is clear from context.
- source_word: לַכֹּהֲנִים
  chosen: for the priests
  alternatives:
  - for the priests' use
  lexicon: HALOT
  rationale: Dative of purpose/use. 'For the priests' is concise and natural.
