id: 2CH.4.13
reference: 2 Chronicles 4:13
source:
  edition: WLC
  text: וְ/אֶת הָֽ/רִמּוֹנִ֛ים אַרְבַּ֥ע מֵא֖וֹת לִ/שְׁתֵּ֣י הַ/שְּׂבָכ֑וֹת שְׁנַ֨יִם
    טוּרִ֤ים רִמּוֹנִים֙ לַ/שְּׂבָכָ֣ה הָ/אֶחָ֔ת לְ/כַסּ֗וֹת אֶת שְׁתֵּי֙ גֻּלּ֣וֹת
    הַ/כֹּֽתָר֔וֹת אֲשֶׁ֖ר עַל פְּנֵ֥י הָ/עַמּוּדִֽים־־־׃
translation:
  text: and the four hundred pomegranates for the two latticeworks, two rows of pomegranates
    for each latticework, to cover the two bowl-shaped capitals that were on the tops
    of the pillars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'networks' instead of 'latticeworks.' The Hebrew term refers to netted
      ornamental work on the capitals.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the two bowls of the capitals.' The Hebrew uses imagery for the
      rounded upper portions of the capitals.
    reason: lexical_alternative
lexical_decisions:
- source_word: רִמּוֹנִים
  chosen: pomegranates
  alternatives:
  - ornamental pomegranates
  lexicon: HALOT
  rationale: The noun literally denotes pomegranates; in this temple-furnishing context
    they are decorative forms, but the plain lexical sense should be retained in English.
- source_word: אַרְבַּע מֵאוֹת
  chosen: four hundred
  lexicon: HALOT
  rationale: Straightforward cardinal number; retained formally.
- source_word: שְּׂבָכוֹת
  chosen: latticeworks
  alternatives:
  - networks
  - grilles
  lexicon: HALOT
  rationale: The term refers to the netted or lattice-like ornamental work attached
    to the capitals. 'Latticeworks' is natural English and preserves the crafted structure
    better than the more abstract 'networks.'
- source_word: שְׁנַיִם טוּרִים
  chosen: two rows
  alternatives:
  - two lines
  lexicon: HALOT
  rationale: טוּרִים denotes rows or arranged lines. 'Two rows' is the standard and
    clearest rendering in this architectural inventory context.
- source_word: לַשְּׂבָכָה הָאֶחָת
  chosen: for each latticework
  alternatives:
  - for the one latticework
  - for one latticework
  lexicon: HALOT
  rationale: Although formally singular ('for the one latticework'), the sense in
    context is distributive across the two latticeworks. 'For each latticework' communicates
    the Hebrew idiom clearly in modern English without losing the singular-distributive
    force.
- source_word: לְכַסּוֹת
  chosen: to cover
  alternatives:
  - to conceal
  - to overlay
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To cover' is the most direct and contextually
    appropriate rendering.
- source_word: גֻּלּוֹת
  chosen: bowl-shaped
  alternatives:
  - bowls
  - globes
  - rounded forms
  lexicon: HALOT
  rationale: The noun refers to rounded, bowl-like forms on the capitals. Because
    English requires an explicit relation to the following noun, 'bowl-shaped' idiomatically
    modifies 'capitals' while preserving the imagery.
- source_word: כֹּתָרוֹת
  chosen: capitals
  alternatives:
  - crowns
  - capital tops
  lexicon: HALOT
  rationale: In architectural context this denotes the capitals atop pillars, not
    royal crowns. 'Capitals' is the precise English architectural term.
- source_word: עַל פְּנֵי הָעַמּוּדִים
  chosen: on the tops of the pillars
  alternatives:
  - on the front of the pillars
  - upon the pillars
  lexicon: HALOT
  rationale: Literally 'on the face/surface of the pillars,' but in the context of
    capitals the reference is to their position atop the pillars. 'On the tops of
    the pillars' makes the spatial relation clear in English.
