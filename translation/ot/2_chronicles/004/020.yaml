id: 2CH.4.20
reference: 2 Chronicles 4:20
source:
  edition: WLC
  text: וְ/אֶת הַ/מְּנֹר֞וֹת וְ/נֵרֹתֵי/הֶ֗ם לְ/בַעֲרָ֧/ם כַּ/מִּשְׁפָּ֛ט לִ/פְנֵ֥י
    הַ/דְּבִ֖יר זָהָ֥ב סָגֽוּר־׃
translation:
  text: the lampstands and their lamps, to burn according to the ordinance before
    the inner sanctuary, of pure gold;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the Most Holy Place.' The Hebrew דְּבִיר refers to the temple's
      inner sanctuary.
    reason: lexical_alternative
  - marker: b
    text: Or 'of refined gold.' The phrase 'gold, sāgūr' denotes high-quality purified
      gold.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְּנֹרוֹת
  chosen: the lampstands
  alternatives:
  - the menorahs
  - the lampstands of the lamps
  lexicon: HALOT
  rationale: מְנוֹרָה denotes a lampstand/candelabrum. 'Lampstands' is clear modern
    English and fits temple furnishing context better than transliterating 'menorahs'
    in the main text.
- source_word: וְנֵרֹתֵיהֶם
  chosen: and their lamps
  alternatives:
  - and their lights
  lexicon: HALOT
  rationale: נֵר commonly refers to a lamp or lamp-flame. In the context of temple
    furnishings attached to lampstands, 'lamps' is the most natural rendering.
- source_word: לְבַעֲרָם
  chosen: to burn
  alternatives:
  - for burning
  - to light them
  - to make them burn
  lexicon: HALOT
  rationale: 'The infinitive with pronominal suffix indicates purpose with the lamps
    as object: causing them to burn. ''To burn'' is concise English that preserves
    the function without over-paraphrase.'
- source_word: כַּמִּשְׁפָּט
  chosen: according to the ordinance
  alternatives:
  - according to the rule
  - according to the prescribed manner
  - as prescribed
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to the prescribed regulation for cultic procedure.
    'According to the ordinance' preserves the formal cultic sense; 'as prescribed'
    is possible but slightly less explicit.
- source_word: לִפְנֵי הַדְּבִיר
  chosen: before the inner sanctuary
  alternatives:
  - before the Most Holy Place
  - before the inner room
  - before the debir
  lexicon: HALOT
  rationale: דְּבִיר denotes the inner sanctuary/inner room of the temple. 'Inner
    sanctuary' is understandable and sufficiently formal. 'Most Holy Place' may over-specify
    by importing later conventional terminology, though it is closely related.
- source_word: זָהָב סָגוּר
  chosen: of pure gold
  alternatives:
  - of refined gold
  - of closed gold
  lexicon: HALOT
  rationale: The phrase denotes high-quality refined/pure gold. 'Pure gold' is idiomatic
    English and captures the material description without woodenly reproducing the
    obscure adjective.
- source_word: וְאֶת
  chosen: the
  alternatives:
  - and
  lexicon: Hebrew grammar
  rationale: This verse continues a list of temple items from the previous verse.
    The direct-object marker with prefixed conjunction is not translated mechanically;
    English naturally renders the item directly within the ongoing list.
