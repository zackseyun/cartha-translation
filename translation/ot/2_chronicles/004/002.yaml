id: 2CH.4.2
reference: 2 Chronicles 4:2
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ אֶת הַ/יָּ֖ם מוּצָ֑ק עֶ֣שֶׂר בָּֽ֠/אַמָּה מִ/שְּׂפָת֨/וֹ אֶל שְׂפָת֜/וֹ
    עָג֣וֹל סָבִ֗יב וְ/חָמֵ֤שׁ בָּֽ/אַמָּה֙ קֽוֹמָת֔/וֹ וְ/קָו֙ שְׁלֹשִׁ֣ים בָּֽ/אַמָּ֔ה
    יָסֹ֥ב אֹת֖/וֹ סָבִֽיב־־׀׃
translation:
  text: He made the Sea of cast metal, ten cubits from brim to brim, round all around;
    its height was five cubits, and a line of thirty cubits encircled it all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the molten Sea.' The Hebrew uses 'Sea' as the name of the large basin
      in the temple furnishings.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a line of thirty cubits.' The text describes the basin's circumference
      in the conventional ancient manner.
    reason: cultural_note
lexical_decisions:
- source_word: הַיָּם
  chosen: the Sea
  alternatives:
  - the basin
  - the molten sea
  lexicon: HALOT
  rationale: Although literally 'the sea,' in temple-furnishings context this is the
    large basin traditionally called 'the Sea.' Capitalized to mark it as the named
    object, not an ordinary sea.
- source_word: מוּצָק
  chosen: of cast metal
  alternatives:
  - cast
  - molten
  lexicon: HALOT
  rationale: The passive participial form indicates something cast in metal. 'Of cast
    metal' is natural English and preserves the manufacturing sense better than the
    more traditional but less idiomatic 'molten.'
- source_word: עֶשֶׂר בָּאַמָּה
  chosen: ten cubits
  alternatives:
  - ten cubits across
  lexicon: HALOT
  rationale: Retains the ancient unit rather than converting it. The following phrase
    'from brim to brim' supplies the dimension being measured.
- source_word: מִשְּׂפָתוֹ אֶל שְׂפָתוֹ
  chosen: from brim to brim
  alternatives:
  - from its lip to its lip
  - from edge to edge
  lexicon: HALOT
  rationale: שָׂפָה literally means 'lip' or 'edge'; for a vessel, 'brim' is the most
    idiomatic English equivalent.
- source_word: עָגוֹל סָבִיב
  chosen: round all around
  alternatives:
  - circular all around
  - round about
  lexicon: HALOT
  rationale: Captures both the shape adjective and the surrounding adverb without
    archaic phrasing.
- source_word: וְחָמֵשׁ בָּאַמָּה קוֹמָתוֹ
  chosen: its height was five cubits
  alternatives:
  - and its height was five cubits
  lexicon: HALOT
  rationale: Supplies the copular sense naturally in English while preserving the
    measurement statement.
- source_word: וְקָו
  chosen: and a line
  alternatives:
  - and a measuring line
  - and a circumference
  lexicon: HALOT
  rationale: קו means a cord/line used for measuring. 'Line' keeps the concrete image
    present in the Hebrew; the circumference is then described by the verb.
- source_word: יָסֹב אֹתוֹ סָבִיב
  chosen: encircled it all around
  alternatives:
  - went around it all around
  - surrounded it
  lexicon: HALOT
  rationale: The verb means to go around or surround. 'Encircled' is idiomatic and
    fits the measuring-line image.
