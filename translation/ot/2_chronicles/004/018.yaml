id: 2CH.4.18
reference: 2 Chronicles 4:18
source:
  edition: WLC
  text: וַ/יַּ֧עַשׂ שְׁלֹמֹ֛ה כָּל הַ/כֵּלִ֥ים הָ/אֵ֖לֶּה לָ/רֹ֣ב מְאֹ֑ד כִּ֛י לֹ֥א
    נֶחְקַ֖ר מִשְׁקַ֥ל הַ/נְּחֹֽשֶׁת־׃פ
translation:
  text: Solomon made all these vessels in great abundance, because the weight of the
    bronze could not be determined.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the weight of the bronze was not ascertained.' The Hebrew verb can
      mean 'searched out' or 'determined'; the sense here is that the bronze was so
      abundant that its weight was not calculated.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: made
  alternatives:
  - fashioned
  - produced
  lexicon: HALOT
  rationale: The common verb עשה here straightforwardly denotes making/producing the
    temple items. 'Made' is the most natural and sufficiently formal rendering in
    context.
- source_word: כָּל הַכֵּלִים הָאֵלֶּה
  chosen: all these vessels
  alternatives:
  - all these articles
  - all these utensils
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for implements/items. In temple-furnishing context,
    'vessels' is idiomatic biblical English and fits the metal objects listed in the
    surrounding verses.
- source_word: לָרֹב מְאֹד
  chosen: in great abundance
  alternatives:
  - in very great quantity
  - in exceedingly large number
  lexicon: HALOT
  rationale: The phrase expresses very large quantity rather than manner. 'In great
    abundance' is natural English and preserves the intensification of מְאֹד.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the explanation for the preceding statement. 'Because'
    makes the causal sense explicit in contemporary English.
- source_word: לֹא נֶחְקַר
  chosen: could not be determined
  alternatives:
  - was not investigated
  - was not ascertained
  - could not be searched out
  lexicon: HALOT
  rationale: The Niphal of חקר conveys something not being searched out or ascertained.
    In context of metal quantity/weight, the sense is that the weight was not measurable
    or determinable because of the abundance.
- source_word: מִשְׁקַל
  chosen: the weight
  alternatives:
  - the amount by weight
  lexicon: HALOT
  rationale: מִשְׁקַל refers specifically to weight, not merely quantity. Retaining
    'weight' preserves the concrete measurement idea.
- source_word: הַנְּחֹשֶׁת
  chosen: the bronze
  alternatives:
  - the copper
  - the bronze metal
  lexicon: HALOT
  rationale: נְחֹשֶׁת in temple-furnishing contexts commonly refers to bronze rather
    than pure copper. 'Bronze' matches standard usage in descriptions of tabernacle/temple
    implements.
