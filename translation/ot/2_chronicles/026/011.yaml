id: 2CH.26.11
reference: 2 Chronicles 26:11
source:
  edition: WLC
  text: וַ/יְהִ֣י לְ/עֻזִּיָּ֡הוּ חַיִל֩ עֹשֵׂ֨ה מִלְחָמָ֜ה יוֹצְאֵ֧י צָבָ֣א לִ/גְד֗וּד
    בְּ/מִסְפַּר֙ פְּקֻדָּתָ֔/ם בְּ/יַד֙ יעואל הַ/סּוֹפֵ֔ר וּ/מַעֲשֵׂיָ֖הוּ הַ/שּׁוֹטֵ֑ר
    עַ֚ל יַד חֲנַנְיָ֔הוּ מִ/שָּׂרֵ֖י הַ/מֶּֽלֶךְ־׃
translation:
  text: And Uzziah had an army fit for war, going out for military service by divisions,
    according to the number of their enrollment, under the direction of Jeiel the
    scribe and Maaseiah the officer, under the authority of Hananiah, one of the king’s
    commanders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the number of their muster.' The Hebrew term refers to
      an official counting or enrollment of troops.
    reason: lexical_alternative
  - marker: b
    text: Jeiel is spelled 'יעואל' in the Hebrew text here; the name is sometimes
      represented as 'Jiel' or 'Jeuel' in English traditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַיִל
  chosen: army
  alternatives:
  - force
  - wealth
  - valor
  lexicon: HALOT
  rationale: In this military context, חַיִל refers to a military force rather than
    wealth or abstract strength/valor.
- source_word: עֹשֵׂה מִלְחָמָה
  chosen: fit for war
  alternatives:
  - making war
  - waging war
  - ready for battle
  lexicon: HALOT
  rationale: The participial phrase describes the army as war-capable. 'Fit for war'
    is idiomatic English that preserves the military sense without woodenly saying
    'making war.'
- source_word: יוֹצְאֵי צָבָא
  chosen: going out for military service
  alternatives:
  - going out to war
  - those going out in the army
  lexicon: HALOT
  rationale: This expression commonly denotes those who go out on military duty. 'Military
    service' captures the institutional sense of צָבָא here.
- source_word: לִגְדוּד
  chosen: by divisions
  alternatives:
  - by troops
  - in bands
  - for raiding bands
  lexicon: HALOT
  rationale: In the context of organizing and numbering troops, the sense is military
    units or divisions rather than raiding bands specifically.
- source_word: בְּמִסְפַּר פְּקֻדָּתָם
  chosen: according to the number of their enrollment
  alternatives:
  - by the number of their muster
  - according to their counted total
  lexicon: HALOT
  rationale: פְּקֻדָּה here refers to a formal reckoning, muster, or enrollment of
    troops. 'Enrollment' is clear modern English while preserving the administrative
    nuance.
- source_word: בְּיַד
  chosen: under the direction of
  alternatives:
  - by the hand of
  - under the charge of
  lexicon: HALOT
  rationale: The idiom בְּיַד indicates agency or administrative oversight. 'Under
    the direction of' communicates this naturally in English.
- source_word: הַסּוֹפֵר
  chosen: the scribe
  alternatives:
  - the secretary
  - the recorder
  lexicon: HALOT
  rationale: סֹפֵר often denotes an official scribe or secretary. 'Scribe' is the
    more transparent and broadly consistent rendering, with the administrative role
    clear from context.
- source_word: הַשּׁוֹטֵר
  chosen: the officer
  alternatives:
  - the official
  - the overseer
  lexicon: HALOT
  rationale: שֹׁטֵר denotes an official functionary in administrative or military
    contexts. 'Officer' best fits the military-administrative setting here.
- source_word: עַל יַד
  chosen: under the authority of
  alternatives:
  - at the side of
  - under the supervision of
  lexicon: HALOT
  rationale: This idiom marks a higher level of oversight than the preceding phrase.
    'Under the authority of' reflects the hierarchical structure of command.
- source_word: מִשָּׂרֵי הַמֶּלֶךְ
  chosen: one of the king’s commanders
  alternatives:
  - from the king's princes
  - one of the king's officials
  lexicon: HALOT
  rationale: שָׂר can mean prince, chief, ruler, or commander. In this military context,
    'commander' best matches the function described.
