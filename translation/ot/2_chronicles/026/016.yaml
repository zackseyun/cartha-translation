id: 2CH.26.16
reference: 2 Chronicles 26:16
source:
  edition: WLC
  text: וּ/כְ/חֶזְקָת֗/וֹ גָּבַ֤הּ לִבּ/וֹ֙ עַד לְ/הַשְׁחִ֔ית וַ/יִּמְעַ֖ל בַּ/יהוָ֣ה אֱלֹהָ֑י/ו וַ/יָּבֹא֙ אֶל הֵיכַ֣ל יְהוָ֔ה לְ/הַקְטִ֖יר עַל מִזְבַּ֥ח הַ/קְּטֹֽרֶת־־־׃
translation:
  text: But when he became strong, his heart was lifted up to his destruction, and he acted unfaithfully against Yahweh his God and entered the temple of Yahweh to burn incense on the altar of incense.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּכְחֶזְקָתוֹ
  chosen: But when he became strong
  alternatives:
  - But as soon as he was strong
  - But when he grew powerful
  lexicon: HALOT
  rationale: 'The prefixed conjunction and comparative/temporal כ with the noun ''his strength'' yields a temporal sense: ''when/as he became strong.'' ''Became strong'' is natural English and preserves the causal-temporal setup without over-paraphrasing.'
- source_word: גָּבַהּ לִבּוֹ
  chosen: his heart was lifted up
  alternatives:
  - his heart became proud
  - he became proud
  lexicon: HALOT
  rationale: Literally 'his heart was high.' 'Was lifted up' preserves the Hebrew idiom and its moral nuance, while still being understandable in English. The more interpretive 'became proud' is possible but less transparent to the source wording.
- source_word: עַד לְהַשְׁחִית
  chosen: to his destruction
  alternatives:
  - to the point of ruin
  - until he acted corruptly
  lexicon: HALOT
  rationale: 'The phrase marks result: his pride led to ruin/destruction. ''To his destruction'' is concise and idiomatic in English, preserving the sense of disastrous outcome. ''Corruptly'' would shift the focus from result to manner and is less fitting here.'
- source_word: וַיִּמְעַל
  chosen: he acted unfaithfully
  alternatives:
  - he was unfaithful
  - he trespassed
  - he committed a breach of faith
  lexicon: HALOT
  rationale: מעל commonly denotes acting unfaithfully or committing a breach of faith, especially in covenantal contexts. 'Acted unfaithfully' communicates the covenantal offense better than the more archaic 'trespassed.'
- source_word: בַּיהוָה אֱלֹהָיו
  chosen: against the LORD his God
  alternatives:
  - against Yahweh his God
  - with respect to the LORD his God
  lexicon: HALOT
  rationale: With מעל, the preposition is best rendered 'against.' Per doctrine, יהוה is rendered 'the LORD,' not transliterated.
- source_word: הֵיכַל יְהוָה
  chosen: the temple of the LORD
  alternatives:
  - the sanctuary of the LORD
  - the palace-temple of the LORD
  lexicon: HALOT
  rationale: היכל here refers to the temple building/sanctuary. 'Temple' is the clearest and most natural rendering in this narrative context.
- source_word: לְהַקְטִיר
  chosen: to burn incense
  alternatives:
  - to offer incense
  - to make an incense offering
  lexicon: HALOT
  rationale: The Hiphil of קטר in cultic context means to burn/offer as incense. 'Burn incense' is the standard, direct rendering and fits the following phrase about the altar of incense.
- source_word: מִזְבַּח הַקְּטֹרֶת
  chosen: the altar of incense
  alternatives:
  - the incense altar
  lexicon: HALOT
  rationale: This is the established cultic expression for the altar designated for incense. 'Altar of incense' is transparent and formally close to the Hebrew.
