id: 2CH.26.22
reference: 2 Chronicles 26:22
source:
  edition: WLC
  text: וְ/יֶ֨תֶר֙ דִּבְרֵ֣י עֻזִּיָּ֔הוּ הָ/רִאשֹׁנִ֖ים וְ/הָ/אֲחֲרֹנִ֑ים כָּתַ֛ב
    יְשַֽׁעְיָ֥הוּ בֶן אָמ֖וֹץ הַ/נָּבִֽיא־׃
translation:
  text: Now the rest of the acts of Uzziah, from first to last, Isaiah son of Amoz
    the prophet wrote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the words of Uzziah, the first and the last.' Here
      'words' is a Hebrew annal-style expression meaning the events or acts of his
      reign.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר denotes what remains or is left over. In this chronicler formula,
    'the rest of' is idiomatic English. 'Now' renders the prefixed conjunction smoothly
    in narrative transition without overstating coordination.
- source_word: דִּבְרֵי
  chosen: the acts of
  alternatives:
  - the words of
  - the matters concerning
  lexicon: HALOT
  rationale: Though literally 'words of,' in royal-summary formulas דִּבְרֵי commonly
    refers to the deeds, events, or acts associated with a king. 'Acts of' best matches
    the historiographical sense in context.
- source_word: עֻזִּיָּהוּ
  chosen: Uzziah
  alternatives:
  - Azariah
  rationale: The proper name here is עֻזִּיָּהוּ, standardly transliterated 'Uzziah.'
    'Azariah' is a variant name used for the same king elsewhere, but not the form
    present in this verse.
- source_word: הָרִאשֹׁנִים וְהָאֲחֲרֹנִים
  chosen: from first to last
  alternatives:
  - the former and the latter
  - the first and the last
  lexicon: HALOT
  rationale: This paired expression is a standard Hebrew idiom meaning the whole span
    or entirety. 'From first to last' is natural modern English and preserves the
    temporal scope.
- source_word: כָּתַב
  chosen: wrote
  alternatives:
  - recorded
  - documented
  lexicon: HALOT
  rationale: The verb straightforwardly means 'wrote.' While 'recorded' captures the
    historiographical function, 'wrote' is the plain lexical sense and should be retained
    unless context requires otherwise.
- source_word: יְשַׁעְיָהוּ
  chosen: Isaiah
  rationale: Standard English transliteration of the prophet's name.
- source_word: בֶן אָמוֹץ
  chosen: son of Amoz
  rationale: A straightforward patronymic identifying which Isaiah is meant.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: The definite title identifies Isaiah's recognized prophetic office. It
    should be translated, not transliterated, per project philosophy on titles.
