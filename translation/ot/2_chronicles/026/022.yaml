theological_decisions:
- issue: Nature of דִּבְרֵי in royal annal formula
  chosen_reading: Rendered as 'acts' rather than the more literal 'words'
  alternative_readings:
  - words
  - matters
  rationale: This is not a doctrinal issue but an interpretive one affecting how the
    verse presents the source material. In Chronicles, the formula refers to the historical
    record of a king's reign, so 'acts' best communicates the intended sense without
    paraphrasing beyond the source.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of the conjunction at the verse opening
  chosen_reading: Included as 'Now' rather than 'And'
  alternative_readings:
  - And
  rationale: The Hebrew conjunction can be represented in idiomatic English as a narrative
    transition. 'Now' preserves discourse flow in readable modern English while keeping
    the connective force.
  doctrine_reference: Translation philosophy §6
