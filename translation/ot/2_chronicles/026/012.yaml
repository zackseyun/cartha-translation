id: 2CH.26.12
reference: 2 Chronicles 26:12
source:
  edition: WLC
  text: כֹּ֠ל מִסְפַּ֞ר רָאשֵׁ֤י הָ/אָבוֹת֙ לְ/גִבּ֣וֹרֵי חָ֔יִל אַלְפַּ֖יִם וְ/שֵׁ֥שׁ
    מֵאֽוֹת׃
translation:
  text: The total number of the heads of the fathers’ houses, for the mighty men of
    valor, was two thousand six hundred.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chiefs of the ancestral houses.' The Hebrew idiom refers to leaders
      of family or clan units.
    reason: lexical_alternative
  - marker: b
    text: Or 'mighty warriors' or 'valiant warriors.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  chosen: The total
  alternatives:
  - all
  - whole
  lexicon: HALOT
  rationale: With מִסְפַּר ('number'), כֹּל forms the idiom 'the whole/total number.'
    'The total' is natural English and preserves the quantitative force.
- source_word: מִסְפַּר
  chosen: number
  alternatives:
  - count
  - sum
  lexicon: HALOT
  rationale: The noun denotes a numerical count. 'Number' is the most direct rendering
    in this administrative/military census context.
- source_word: רָאשֵׁי
  chosen: heads
  alternatives:
  - chiefs
  - leaders
  lexicon: HALOT
  rationale: Literally 'heads of.' Retaining 'heads' preserves the familial-household
    administrative idiom, while the following phrase clarifies the social unit involved.
- source_word: הָאָבוֹת
  chosen: the fathers’ houses
  alternatives:
  - the ancestral houses
  - the family houses
  - the fathers
  lexicon: HALOT
  rationale: In Chronicles this phrase refers to clan or family-house divisions, not
    merely individual fathers. 'Fathers’ houses' is a standard, sufficiently transparent
    rendering of the Hebrew social structure.
- source_word: לְגִבּוֹרֵי חָיִל
  chosen: for the mighty men of valor
  alternatives:
  - of the mighty men of valor
  - belonging to the mighty warriors
  - for the valiant warriors
  lexicon: HALOT
  rationale: The ל preposition here links the heads of the fathers’ houses to the
    military class being counted. 'For the mighty men of valor' reflects the Hebrew
    construction and keeps the traditional military sense of גִּבּוֹרֵי חָיִל.
- source_word: גִּבּוֹרֵי
  chosen: mighty men
  alternatives:
  - warriors
  - mighty warriors
  - strong men
  lexicon: HALOT
  rationale: The term denotes strong or heroic fighting men. 'Mighty men' preserves
    the lexical connection with the common biblical expression.
- source_word: חָיִל
  chosen: valor
  alternatives:
  - strength
  - army
  - wealth
  lexicon: HALOT
  rationale: In this military context, חָיִל carries the sense of martial strength
    or valor rather than wealth. 'Valor' fits the collocation גִּבּוֹרֵי חָיִל well
    in English.
- source_word: אַלְפַּיִם וְשֵׁשׁ מֵאוֹת
  chosen: two thousand six hundred
  alternatives:
  - 2,600
  lexicon: HALOT
  rationale: The cardinal number is straightforward. Spelling it out suits running
    biblical prose.
