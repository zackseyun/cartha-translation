id: 2CH.26.3
reference: 2 Chronicles 26:3
source:
  edition: WLC
  text: בֶּן שֵׁ֨שׁ עֶשְׂרֵ֤ה שָׁנָה֙ עֻזִּיָּ֣הוּ בְ/מָלְכ֔/וֹ וַ/חֲמִשִּׁ֤ים וּ/שְׁתַּ֨יִם֙
    שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ יכיליה מִן יְרוּשָׁלִָֽם־־׃
translation:
  text: Uzziah was sixteen years old when he became king, and he reigned fifty-two
    years in Jerusalem. His mother’s name was Jecoliah, from Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''when he began to reign'' or ''at his becoming king.'''
    reason: lexical_alternative
  - marker: b
    text: Jecoliah may also be transliterated 'Jechiliah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן שֵׁשׁ עֶשְׂרֵה שָׁנָה
  chosen: was sixteen years old
  alternatives:
  - was a son of sixteen years
  lexicon: HALOT
  rationale: Hebrew idiom for age is naturally rendered in English as 'was sixteen
    years old' rather than a wooden 'son of sixteen years.'
- source_word: בְמָלְכוֹ
  chosen: when he became king
  alternatives:
  - in his reigning
  - when he began to reign
  lexicon: HALOT
  rationale: The infinitive/construct-like expression with ב marks the time of accession.
    'When he became king' is idiomatic modern English and accurately conveys the onset
    of reign.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb denotes exercising kingship over a period; 'he reigned' fits
    the chronological notice formula used in Kings/Chronicles.
- source_word: וַחֲמִשִּׁים וּשְׁתַּיִם שָׁנָה
  chosen: fifty-two years
  alternatives:
  - fifty and two years
  lexicon: HALOT
  rationale: Standard contemporary English rendering of the numeral phrase.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Locative preposition is straightforward; this is the place of his reign.
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: A common genealogical formula. The chosen rendering preserves the sense
    while using natural English syntax.
- source_word: יכיליה
  chosen: Jecoliah
  alternatives:
  - Jechiliah
  - Yekholyah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention. 'Jecoliah'
    reflects a familiar and readable transliteration of the Hebrew name.
- source_word: מִן יְרוּשָׁלִָם
  chosen: from Jerusalem
  alternatives:
  - of Jerusalem
  lexicon: HALOT
  rationale: The preposition מִן most directly means 'from.' In this maternal notice
    it indicates origin or hometown; 'from Jerusalem' is the most transparent rendering.
