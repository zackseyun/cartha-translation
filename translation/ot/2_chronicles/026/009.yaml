id: 2CH.26.9
reference: 2 Chronicles 26:9
source:
  edition: WLC
  text: וַ/יִּ֨בֶן עֻזִּיָּ֤הוּ מִגְדָּלִים֙ בִּ/יר֣וּשָׁלִַ֔ם עַל שַׁ֧עַר הַ/פִּנָּ֛ה
    וְ/עַל שַׁ֥עַר הַ/גַּ֖יְא וְ/עַל הַ/מִּקְצ֑וֹעַ וַֽ/יְחַזְּקֵֽ/ם־־־׃
translation:
  text: Uzziah built towers in Jerusalem at the Corner Gate, at the Valley Gate, and
    at the Angle, and he fortified them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the corner' for 'the Angle'; the Hebrew term denotes an angle, corner,
      or turning point in the fortification.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: built
  alternatives:
  - constructed
  lexicon: HALOT
  rationale: The verb בנה straightforwardly means 'build.' 'Built' is the natural
    modern English rendering and fits the narrative style.
- source_word: עֻזִּיָּהוּ
  chosen: Uzziah
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: מִגְדָּלִים
  chosen: towers
  alternatives:
  - fortified towers
  lexicon: HALOT
  rationale: The plural noun מגדלים means 'towers.' The adjective 'fortified' is not
    inherent in the noun and is better reserved for the later verb.
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  rationale: Standard locative use of ב with the place name; 'in Jerusalem' is direct
    and idiomatic.
- source_word: עַל
  chosen: at
  alternatives:
  - 'on'
  - by
  lexicon: HALOT
  rationale: Although עַל often means 'on/upon,' with city gates and fortifications
    in this context 'at' best conveys location in natural English without implying
    literal placement on top of the gate structure.
- source_word: שַׁעַר הַפִּנָּה
  chosen: the Corner Gate
  alternatives:
  - the gate of the corner
  lexicon: HALOT
  rationale: A construct phrase naming a city gate. 'Corner Gate' is the established
    and clear English rendering.
- source_word: שַׁעַר הַגַּיְא
  chosen: the Valley Gate
  alternatives:
  - the gate of the valley
  lexicon: HALOT
  rationale: גיא means 'valley.' As a gate name, 'Valley Gate' is concise and idiomatic.
- source_word: הַמִּקְצוֹעַ
  chosen: the Angle
  alternatives:
  - the corner
  - the turning
  lexicon: HALOT
  rationale: The noun refers to a corner, angle, or turning point in a wall or structure.
    'The Angle' preserves the likely technical/topographical sense here and avoids
    confusion with the already-mentioned 'Corner Gate.'
- source_word: וַיְחַזְּקֵם
  chosen: and he fortified them
  alternatives:
  - and he strengthened them
  - and he made them strong
  lexicon: HALOT
  rationale: חזק in the piel commonly means to strengthen or fortify. In the context
    of towers and city defenses, 'fortified' best captures the military/architectural
    sense. The suffix 'them' most naturally refers to the towers just mentioned.
