id: 2CH.26.13
reference: 2 Chronicles 26:13
source:
  edition: WLC
  text: וְ/עַל יָדָ/ם֩ חֵ֨יל צָבָ֜א שְׁלֹ֧שׁ מֵא֣וֹת אֶ֗לֶף וְ/שִׁבְעַ֤ת אֲלָפִים֙
    וַ/חֲמֵ֣שׁ מֵא֔וֹת עוֹשֵׂ֥י מִלְחָמָ֖ה בְּ/כֹ֣חַ חָ֑יִל לַ/עְזֹ֥ר לַ/מֶּ֖לֶךְ
    עַל הָ/אוֹיֵֽב־־׃
translation:
  text: Under their command was an army of 307,500, trained for war, with mighty strength,
    to help the king against the enemy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'By their hand was an army force of 307,500, doers of
      war.' The main text renders the Hebrew military idioms in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל יָדָם
  chosen: Under their command
  alternatives:
  - By their hand
  - In their charge
  lexicon: HALOT
  rationale: The idiom עַל יָד with pronominal suffix indicates supervision or authority
    rather than literal physical agency. 'Under their command' gives the natural English
    sense in this military-administrative context.
- source_word: חֵיל צָבָא
  chosen: an army
  alternatives:
  - military force
  - host of the army
  lexicon: HALOT
  rationale: The collocation denotes a military force/army. Rendering both nouns woodenly
    ('force of army') is unnatural in English; 'an army' captures the sense cleanly.
- source_word: שְׁלֹשׁ מֵאוֹת אֶלֶף וְשִׁבְעַת אֲלָפִים וַחֲמֵשׁ מֵאוֹת
  chosen: 307,500
  alternatives:
  - three hundred seven thousand five hundred
  rationale: This is the straightforward sum of the Hebrew numerals. Numerals are
    rendered in standard modern English form for readability.
- source_word: עוֹשֵׂי מִלְחָמָה
  chosen: trained for war
  alternatives:
  - doing battle
  - fit for war
  - those who made war
  lexicon: HALOT
  rationale: Literally 'doers of war,' an idiom for those engaged/prepared for military
    service. 'Trained for war' communicates the military readiness implied in context
    more idiomatically than a wooden rendering.
- source_word: בְּכֹחַ חָיִל
  chosen: with mighty strength
  alternatives:
  - with strength of valor
  - with military power
  - valiantly
  lexicon: HALOT
  rationale: The phrase combines כוח ('strength, power') with חיל ('strength, valor,
    might'). 'With mighty strength' preserves the emphasis on martial capability without
    overparaphrasing.
- source_word: לַעְזֹר לַמֶּלֶךְ
  chosen: to help the king
  alternatives:
  - to support the king
  - to assist the king
  lexicon: HALOT
  rationale: עזר is the common verb 'help, assist.' 'Help the king' is direct and
    natural.
- source_word: עַל הָאוֹיֵב
  chosen: against the enemy
  alternatives:
  - against the foe
  - concerning the enemy
  lexicon: HALOT
  rationale: With עזר in military context, עַל marks opposition toward the enemy.
    'Against the enemy' best fits the wartime setting.
