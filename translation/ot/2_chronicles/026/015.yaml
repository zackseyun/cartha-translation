theological_decisions:
- issue: Implicit agent of the king's help
  chosen_reading: left implicit in the main text ('he was marvelously helped')
  alternative_readings:
  - made explicit as divine help ('the LORD helped him wonderfully')
  rationale: The Hebrew does not explicitly name God in this clause, though the broader
    context strongly implies divine aid. To avoid importing what this verse itself
    does not state, the translation preserves the passive and leaves the agent unstated.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
