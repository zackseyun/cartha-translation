id: 2CH.26.15
reference: 2 Chronicles 26:15
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ בִּ/ירוּשָׁלִַ֨ם חִשְּׁבֹנ֜וֹת מַחֲשֶׁ֣בֶת חוֹשֵׁ֗ב לִ/הְי֤וֹת
    עַל הַ/מִּגְדָּלִים֙ וְ/עַל הַ/פִּנּ֔וֹת לִ/ירוֹא֙ בַּֽ/חִצִּ֔ים וּ/בָ/אֲבָנִ֖ים
    גְּדֹל֑וֹת וַ/יֵּצֵ֤א שְׁמ/וֹ֙ עַד לְ/מֵ֣/רָח֔וֹק כִּֽי הִפְלִ֥יא לְ/הֵעָזֵ֖ר
    עַ֥ד כִּֽי חָזָֽק׀־־־־־׃
translation:
  text: In Jerusalem he made devices, invented by skillful men, to be on the towers
    and on the corners, to shoot arrows and large stones. And his fame spread far
    abroad, for he was marvelously helped until he became strong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'engines' or 'contrivances'—that is, military devices designed for use
      on the towers and corners of the fortifications.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'his name went out far.'
    reason: lexical_alternative
  - marker: c
    text: The text does not explicitly name the one who helped him, though the context
      suggests divine help.
    reason: alternative_reading
lexical_decisions:
- source_word: חִשְּׁבֹנוֹת
  chosen: devices
  alternatives:
  - engines
  - contrivances
  - machines
  lexicon: HALOT
  rationale: The noun denotes inventions or contrived mechanisms. 'Devices' is natural
    modern English and broad enough to cover military mechanisms without over-specifying
    ancient technology.
- source_word: מַחֲשֶׁבֶת חוֹשֵׁב
  chosen: invented by skillful men
  alternatives:
  - the invention of a designer
  - devised by an expert
  - skillfully designed
  lexicon: HALOT
  rationale: The paired cognates emphasize deliberate design by a planner/craftsman.
    'Invented by skillful men' captures both the conceptual and artisanal sense in
    readable English.
- source_word: עַל הַמִּגְדָּלִים וְעַל הַפִּנּוֹת
  chosen: on the towers and on the corners
  alternatives:
  - upon the towers and upon the battlements
  - on the towers and on the ramparts
  lexicon: HALOT
  rationale: מגדלים are towers. פנות literally means corners; in fortification context
    these are likely corner points or corner towers. 'Corners' preserves the Hebrew
    image without importing a more interpretive military term.
- source_word: לִירוֹא בַּחִצִּים וּבָאֲבָנִים גְּדֹלוֹת
  chosen: to shoot arrows and large stones
  alternatives:
  - for shooting arrows and hurling great stones
  - to fire arrows and stones
  lexicon: HALOT
  rationale: The infinitive expresses purpose. ירה commonly means shoot/throw. Since
    the same verb governs both arrows and stones, 'to shoot arrows and large stones'
    keeps the compactness of the Hebrew, though English readers may infer mechanical
    launching of stones.
- source_word: וַיֵּצֵא שְׁמוֹ עַד לְמֵרָחוֹק
  chosen: his fame spread far abroad
  alternatives:
  - his name went out far away
  - his renown reached far
  lexicon: HALOT
  rationale: The idiom 'his name went out' means reputation or fame spread. 'Far abroad'
    preserves the expansive sense of למרחוק in idiomatic English.
- source_word: הִפְלִיא לְהֵעָזֵר
  chosen: he was marvelously helped
  alternatives:
  - he was wonderfully helped
  - he received extraordinary help
  lexicon: HALOT
  rationale: The hiphil of פלא conveys extraordinary or wondrous action; the niphal
    infinitive of עזר indicates being helped. The passive English rendering reflects
    the Hebrew construction and leaves the helper implicit, as in the source.
- source_word: עַד כִּי חָזָק
  chosen: until he became strong
  alternatives:
  - until he was strong
  - until he grew strong
  lexicon: HALOT
  rationale: This clause marks the result or extent of the help. 'Became strong' communicates
    the attained state in smooth English.
