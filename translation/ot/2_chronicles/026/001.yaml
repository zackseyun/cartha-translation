id: 2CH.26.1
reference: 2 Chronicles 26:1
source:
  edition: WLC
  text: וַ/יִּקְח֞וּ כָּל עַ֤ם יְהוּדָה֙ אֶת עֻזִּיָּ֔הוּ וְ/ה֕וּא בֶּן שֵׁ֥שׁ עֶשְׂרֵ֖ה
    שָׁנָ֑ה וַ/יַּמְלִ֣יכוּ אֹת֔/וֹ תַּ֖חַת אָבִ֥י/ו אֲמַצְיָֽהוּ־־־׃
translation:
  text: Then all the people of Judah took Uzziah, though he was sixteen years old,
    and made him king in place of his father Amaziah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''and he was sixteen years old.'' The Hebrew conjunction can be read
      simply as connective rather than concessive.'
    reason: lexical_alternative
  - marker: b
    text: 'Or: ''selected Uzziah'' for ''took Uzziah''; the Hebrew verb is literally
      ''took'' but in context refers to the people''s action in elevating him to the
      throne.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: took
  alternatives:
  - selected
  - received
  lexicon: HALOT
  rationale: The verb לקח literally means 'take.' In this enthronement context, 'took'
    preserves the Hebrew wording while naturally introducing the people's action toward
    Uzziah. 'Selected' is interpretive and 'received' is less fitting here.
- source_word: כָּל עַם יְהוּדָה
  chosen: all the people of Judah
  alternatives:
  - all Judah
  - all the people of Judah
  lexicon: HALOT
  rationale: The phrase is literally 'all the people of Judah.' This is more precise
    than the compressed 'all Judah' and preserves the collective-populace emphasis
    of עַם.
- source_word: עֻזִּיָּהוּ
  chosen: Uzziah
  alternatives:
  - Azariah
  rationale: The Chronicler uses the personal name עֻזִּיָּהוּ here, standardly transliterated
    'Uzziah.' 'Azariah' is a known alternate name/form in related passages, but not
    the form present in this verse.
- source_word: וְהוּא בֶּן שֵׁשׁ עֶשְׂרֵה שָׁנָה
  chosen: though he was sixteen years old
  alternatives:
  - and he was sixteen years old
  - he being sixteen years old
  lexicon: HALOT
  rationale: Literally, 'and he was a son of sixteen years.' English idiom is 'he
    was sixteen years old.' Rendering the waw as 'though' brings out the concessive
    nuance often felt in context when a young age is noted before enthronement, while
    remaining within acceptable optimal-equivalence.
- source_word: וַיַּמְלִיכוּ אֹתוֹ
  chosen: made him king
  alternatives:
  - crowned him king
  - caused him to reign
  lexicon: HALOT
  rationale: The hiphil of מלך means to make someone king or cause him to reign. 'Made
    him king' is clear, direct, and close to the Hebrew. 'Crowned him king' adds ceremony
    not explicit in the text.
- source_word: תַּחַת
  chosen: in place of
  alternatives:
  - instead of
  - under
  lexicon: HALOT
  rationale: In succession contexts, תַּחַת commonly means 'in place of.' This clearly
    communicates royal replacement/succession. 'Under' would be misleading in English.
- source_word: אָבִיו אֲמַצְיָהוּ
  chosen: his father Amaziah
  rationale: A straightforward rendering of the filial relationship and proper name.
    'Amaziah' is the standard transliteration of אֲמַצְיָהוּ.
