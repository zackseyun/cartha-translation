id: 2CH.26.21
reference: 2 Chronicles 26:21
source:
  edition: WLC
  text: וַ/יְהִי֩ עֻזִּיָּ֨הוּ הַ/מֶּ֜לֶךְ מְצֹרָ֣ע עַד י֣וֹם מוֹת֗/וֹ וַ/יֵּ֜שֶׁב
    בֵּ֤ית ה/חפשות מְצֹרָ֔ע כִּ֥י נִגְזַ֖ר מִ/בֵּ֣ית יְהוָ֑ה וְ/יוֹתָ֤ם בְּנ/וֹ֙ עַל
    בֵּ֣ית הַ/מֶּ֔לֶךְ שׁוֹפֵ֖ט אֶת עַ֥ם הָ/אָֽרֶץ׀־־־׃
translation:
  text: And King Uzziah was leprous until the day of his death, and he lived in a
    separate house, leprous, because he was cut off from the house of the LORD. And
    Jotham his son was over the king’s house, judging the people of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the house of freedom'; the Hebrew expression likely refers to a dwelling
      where Uzziah lived in separation because of his condition.
    reason: lexical_alternative
  - marker: b
    text: Or 'he was excluded from the house of the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: מְצֹרָע
  chosen: leprous
  alternatives:
  - having a skin disease
  - defiled with a skin disease
  lexicon: HALOT
  rationale: The term traditionally refers to a person afflicted with צרעת. In this
    historical narrative about Uzziah, 'leprous' is the most concise and recognizable
    English rendering, while not requiring the translation to specify the exact modern
    medical diagnosis. Alternatives are possible because biblical צרעת is broader
    than later clinical leprosy.
- source_word: בֵּית הַחפשות
  chosen: a separate house
  alternatives:
  - the house of freedom
  - an isolated house
  lexicon: HALOT
  rationale: The phrase is difficult and likely denotes a segregated dwelling set
    apart from normal royal and cultic life. 'A separate house' communicates the practical
    sense in context better than the more opaque literal 'house of freedom.' 'Isolated
    house' is possible, but 'separate' is smoother while preserving the idea of exclusion.
- source_word: נִגְזַר מִבֵּית יְהוָה
  chosen: he was cut off from the house of the LORD
  alternatives:
  - he was excluded from the house of the LORD
  - he was separated from the house of the LORD
  lexicon: HALOT
  rationale: נִגְזַר from גזר conveys being cut off or separated. 'Cut off' preserves
    the force of the Hebrew and the severity of his exclusion from temple access.
    'House of the LORD' follows the project's default rendering for יְהוָה as 'the
    LORD.'
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: The Hebrew is literally 'house of the LORD.' While it refers to the temple,
    retaining 'house' preserves the source wording and intertextual consistency.
- source_word: עַל בֵּית הַמֶּלֶךְ
  chosen: was over the king’s house
  alternatives:
  - was in charge of the king’s household
  - was over the royal palace
  lexicon: HALOT
  rationale: The phrase indicates administrative oversight of the royal household
    or palace establishment. 'Was over the king’s house' is a natural but still close
    rendering that preserves the idiom without over-specifying the office.
- source_word: שׁוֹפֵט אֶת עַם הָאָרֶץ
  chosen: judging the people of the land
  alternatives:
  - governing the people of the land
  - administering justice to the people of the land
  lexicon: HALOT
  rationale: The participle שׁוֹפֵט can include governance and legal judgment. 'Judging'
    keeps the lexical connection to the Hebrew while allowing the broader administrative
    sense in context.
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the people of the country
  - the common people
  lexicon: HALOT
  rationale: The phrase can function as a sociopolitical designation, but here the
    straightforward rendering 'the people of the land' best preserves the Hebrew without
    importing a narrower technical sense.
- source_word: וַיְהִי ... וַיֵּשֶׁב
  chosen: was ... lived
  alternatives:
  - became ... dwelt
  lexicon: HALOT
  rationale: English style favors 'was' and 'lived' here rather than a more wooden
    sequence. This preserves the narrative sense without unnecessary archaism.
