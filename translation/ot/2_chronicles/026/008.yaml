id: 2CH.26.8
reference: 2 Chronicles 26:8
source:
  edition: WLC
  text: וַ/יִּתְּנ֧וּ הָֽ/עַמּוֹנִ֛ים מִנְחָ֖ה לְ/עֻזִּיָּ֑הוּ וַ/יֵּ֤לֶךְ שְׁמ/וֹ֙
    עַד לְ/ב֣וֹא מִצְרַ֔יִם כִּ֥י הֶחֱזִ֖יק עַד לְ/מָֽעְלָ/ה־־׃
translation:
  text: The Ammonites gave tribute to Uzziah, and his fame spread as far as the entrance
    of Egypt, for he had become exceedingly strong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his name spread as far as the entrance of Egypt.' The Hebrew uses 'name'
      in the sense of reputation or fame.
    reason: lexical_alternative
  - marker: b
    text: '''The entrance of Egypt'' may refer to the approach to Egypt or its border
      region.'
    reason: cultural_note
lexical_decisions:
- source_word: הָעַמּוֹנִים
  chosen: The Ammonites
  alternatives:
  - the people of Ammon
  lexicon: HALOT
  rationale: Ethnic/national designation; 'Ammonites' is the standard clear English
    rendering.
- source_word: מִנְחָה
  chosen: tribute
  alternatives:
  - gift
  - offering
  - present
  lexicon: HALOT
  rationale: In a political context involving a foreign people giving to a king, מִנְחָה
    most naturally denotes tribute rather than a generic gift or cultic offering.
- source_word: וַיֵּלֶךְ שְׁמוֹ
  chosen: his fame spread
  alternatives:
  - his name went forth
  - his name spread
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression meaning reputation or renown extended outward.
    'His fame spread' communicates the sense in natural English while preserving the
    metaphor of extension.
- source_word: עַד לְבוֹא מִצְרַיִם
  chosen: as far as the entrance of Egypt
  alternatives:
  - as far as Egypt
  - to the border of Egypt
  lexicon: HALOT
  rationale: More formally, the phrase is 'as far as the entrance of Egypt.' This
    likely refers to the approach/border region of Egypt, and retaining 'entrance'
    preserves the Hebrew image better than flattening it to simply 'Egypt'.
- source_word: הֶחֱזִיק
  chosen: had become strong
  alternatives:
  - grew strong
  - prevailed
  - strengthened himself
  lexicon: HALOT
  rationale: The Hiphil of חזק here conveys becoming or proving strong/powerful. 'Had
    become strong' fits the causal explanation of his expanding fame.
- source_word: עַד לְמַעְלָה
  chosen: exceedingly
  alternatives:
  - to a very high degree
  - greatly
  - to an extraordinary extent
  lexicon: HALOT
  rationale: This idiom intensifies the preceding verb, indicating strength to a very
    high degree. 'Exceedingly' is concise and natural in English.
