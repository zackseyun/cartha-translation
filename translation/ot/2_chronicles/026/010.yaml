id: 2CH.26.10
reference: 2 Chronicles 26:10
source:
  edition: WLC
  text: וַ/יִּ֨בֶן מִגְדָּלִ֜ים בַּ/מִּדְבָּ֗ר וַ/יַּחְצֹב֙ בֹּר֣וֹת רַבִּ֔ים כִּ֤י
    מִקְנֶה רַּב֙ הָ֣יָה ל֔/וֹ וּ/בַ/שְּׁפֵלָ֖ה וּ/בַ/מִּישׁ֑וֹר אִכָּרִ֣ים וְ/כֹֽרְמִ֗ים
    בֶּ/הָרִים֙ וּ/בַ/כַּרְמֶ֔ל כִּֽי אֹהֵ֥ב אֲדָמָ֖ה הָיָֽה־־׃ס
translation:
  text: He built towers in the wilderness and cut out many cisterns, for he had much
    livestock; and in the lowland and in the plain he had farmers and vinedressers,
    in the hills and in the fertile land, for he loved the soil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'watchtowers' for 'towers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Shephelah' for 'the lowland,' the Judean foothill region.
    reason: cultural_note
  - marker: c
    text: Or 'in Carmel' if taken as a place name rather than 'in the fertile land.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִגְדָּלִים
  chosen: towers
  alternatives:
  - watchtowers
  lexicon: HALOT
  rationale: The noun denotes towers; in this agricultural and defensive context 'watchtowers'
    is possible, but the Hebrew itself does not explicitly specify their surveillance
    function, so 'towers' is the more textually restrained rendering.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  - in the pastureland
  lexicon: HALOT
  rationale: מִדְבָּר can refer to wilderness, steppe, or grazing land. 'Wilderness'
    preserves the broad sense without over-specifying aridity, while fitting the context
    of towers and cisterns outside settled areas.
- source_word: וַיַּחְצֹב
  chosen: cut out
  alternatives:
  - hewed out
  - dug
  lexicon: HALOT
  rationale: The verb commonly means to hew or quarry. With cisterns as the object,
    'cut out' reflects excavation in rock more precisely than the more generic 'dug'.
- source_word: בֹּרוֹת
  chosen: cisterns
  alternatives:
  - wells
  - pits
  lexicon: HALOT
  rationale: In this setting of water provision for livestock, 'cisterns' is preferable
    to 'pits' and more precise than 'wells,' since the term often denotes water-storage
    pits rather than spring-fed wells.
- source_word: מִקְנֶה רַב
  chosen: much livestock
  alternatives:
  - many cattle
  - large herds
  lexicon: HALOT
  rationale: מִקְנֶה is a collective term for livestock/property in animals. 'Much
    livestock' is natural modern English and avoids narrowing the reference to cattle
    alone.
- source_word: שְׁפֵלָה
  chosen: the lowland
  alternatives:
  - the Shephelah
  - the foothills
  lexicon: HALOT
  rationale: The term refers to the Judean lowland region. 'The lowland' translates
    the geographic sense accessibly; 'Shephelah' is a transliteration that may be
    less immediately clear in the main text.
- source_word: מִישׁוֹר
  chosen: the plain
  alternatives:
  - the plateau
  - the tableland
  lexicon: HALOT
  rationale: The noun denotes level country. 'Plain' is the most straightforward English
    equivalent here, though some contexts may favor 'plateau' or 'tableland.'
- source_word: אִכָּרִים
  chosen: farmers
  alternatives:
  - plowmen
  - husbandmen
  lexicon: HALOT
  rationale: The word refers to agricultural workers, especially tillers of the soil.
    'Farmers' is clear modern English; older options are less natural.
- source_word: כֹרְמִים
  chosen: vinedressers
  alternatives:
  - vine-growers
  - vinekeepers
  lexicon: HALOT
  rationale: The term specifically denotes those who cultivate vineyards. 'Vinedressers'
    preserves that specificity better than the broader 'farmers' or less idiomatic
    alternatives.
- source_word: בֶּהָרִים
  chosen: in the hills
  alternatives:
  - in the mountains
  lexicon: HALOT
  rationale: Though the noun can mean 'mountains,' 'hills' fits the agricultural context
    more naturally in English and avoids overstating the terrain.
- source_word: בַּכַּרְמֶל
  chosen: in the fertile land
  alternatives:
  - in Carmel
  - in the orchards
  lexicon: HALOT
  rationale: Here כַּרְמֶל is best taken as a common noun meaning fertile land/orchard-land
    rather than the proper place name Carmel. The parallel with 'in the hills' and
    the agricultural context support a land-type sense.
- source_word: אֹהֵב אֲדָמָה
  chosen: he loved the soil
  alternatives:
  - he loved the land
  - he loved farming
  lexicon: HALOT
  rationale: אֲדָמָה is 'ground/soil/land.' 'He loved the soil' preserves the concrete
    agricultural image and explains the preceding note about farmers and vinedressers
    without paraphrasing into an abstract hobby.
