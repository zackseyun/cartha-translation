id: 2CH.26.20
reference: 2 Chronicles 26:20
source:
  edition: WLC
  text: וַ/יִּ֣פֶן אֵלָ֡י/ו עֲזַרְיָהוּ֩ כֹהֵ֨ן הָ/רֹ֜אשׁ וְ/כָל הַ/כֹּהֲנִ֗ים וְ/הִנֵּה
    ה֤וּא מְצֹרָע֙ בְּ/מִצְח֔/וֹ וַ/יַּבְהִל֖וּ/הוּ מִ/שָּׁ֑ם וְ/גַם הוּא֙ נִדְחַ֣ף
    לָ/צֵ֔את כִּ֥י נִגְּע֖/וֹ יְהוָֽה־־־׃
translation:
  text: Azariah the chief priest turned toward him, and all the priests also, and
    behold, he was leprous on his forehead. So they hurried him out of there, and
    he himself also hastened to go out, because the LORD had struck him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they drove him out from there.' The Hebrew verb can convey urgent removal,
      with either the priests' forceful action or the haste of the moment in view.
    reason: lexical_alternative
  - marker: b
    text: Or, 'he was driven to go out.' The Hebrew may emphasize that he was impelled
      outward, though in context it likely means that he himself hurried out.
    reason: lexical_alternative
  - marker: c
    text: '''Leprous'' renders a Hebrew term used in priestly impurity laws for a
      serious skin affliction; it does not necessarily correspond exactly to modern
      medical leprosy.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּפֶן
  chosen: turned toward
  alternatives:
  - turned
  - looked toward
  - faced
  lexicon: HALOT
  rationale: The verb פנה commonly means to turn or face toward someone. 'Turned toward'
    captures the physical reorientation implied before the priests observe Uzziah's
    condition.
- source_word: אֵלָיו
  chosen: toward him
  alternatives:
  - to him
  - at him
  lexicon: HALOT
  rationale: With פנה, the preposition naturally yields 'toward him' rather than a
    more abstract 'to him.'
- source_word: עֲזַרְיָהוּ כֹהֵן הָרֹאשׁ
  chosen: Azariah the chief priest
  alternatives:
  - Azariah the head priest
  - Azariah the high priest
  lexicon: HALOT
  rationale: כֹהֵן הָרֹאשׁ is literally 'the head priest.' 'Chief priest' is clear
    modern English and avoids importing the more technical office term 'high priest'
    unless the text explicitly uses that title.
- source_word: וְכָל הַכֹּהֲנִים
  chosen: and all the priests also
  alternatives:
  - and all the priests
  - with all the priests
  lexicon: HALOT
  rationale: The phrase adds the rest of the priests to Azariah's action. 'Also' reflects
    the additive force in smooth English.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there he was
  - behold
  lexicon: HALOT
  rationale: הִנֵּה marks sudden realization. 'And behold' preserves the narrative
    vividness without paraphrase.
- source_word: מְצֹרָע
  chosen: leprous
  alternatives:
  - afflicted with a skin disease
  - having leprosy
  lexicon: HALOT
  rationale: The traditional rendering 'leprous' is concise and reflects the Hebrew
    term used in priestly impurity contexts. While the condition may not map exactly
    onto modern Hansen's disease, the narrative and legal background are best preserved
    by the established term.
- source_word: בְּמִצְחוֹ
  chosen: on his forehead
  alternatives:
  - in his forehead
  lexicon: HALOT
  rationale: English idiom prefers 'on his forehead' for a visible mark or outbreak.
- source_word: וַיַּבְהִלֻהוּ
  chosen: they hurried him out of there
  alternatives:
  - they drove him out from there
  - they hastened him away from there
  - they alarmed him out of there
  lexicon: HALOT
  rationale: The Hiphil of בהל conveys causing haste or panic. In context the priests
    urgently remove him from the sanctuary area. 'Hurried him out of there' captures
    both urgency and action without overstating force.
- source_word: וְגַם הוּא
  chosen: and he himself also
  alternatives:
  - and he also
  - indeed he too
  lexicon: HALOT
  rationale: The wording emphasizes that Uzziah joined in the urgent departure. 'He
    himself also' preserves that emphasis.
- source_word: נִדְחַף לָצֵאת
  chosen: hastened to go out
  alternatives:
  - was driven to go out
  - pressed to go out
  - hurried to go out
  lexicon: HALOT
  rationale: The Niphal of דחף can suggest being thrust or impelled. Here, because
    the next clause gives the reason and the subject is Uzziah, the sense is that
    he urgently made for the exit. 'Hastened to go out' fits the context and avoids
    implying only external coercion.
- source_word: כִּי נִגְּעוֹ יְהוָה
  chosen: because the LORD had struck him
  alternatives:
  - because the LORD had afflicted him
  - because the LORD had touched him
  - because the LORD had plagued him
  lexicon: HALOT
  rationale: נגע in this context denotes a divine blow or affliction, not a neutral
    touch. 'Had struck him' is vivid, idiomatic, and faithful to the punitive context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
