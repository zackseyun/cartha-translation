theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD,' following the
    stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether כֹהֵן הָרֹאשׁ should be rendered as a technical office title
  chosen_reading: chief priest
  alternative_readings:
  - high priest
  - head priest
  rationale: The Hebrew here says 'the head/chief priest,' not the more specific later
    English ecclesiastical title 'high priest.' The chosen rendering avoids importing
    a technical distinction not explicit in the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
