theological_decisions:
- issue: Rendering of מְצוֹרָע in relation to ritual/medical terminology
  chosen_reading: He is a leper
  alternative_readings:
  - He has a skin disease
  - He is afflicted with a skin disease
  rationale: The Hebrew term refers to a person afflicted with צָרַעַת, a category
    broader than modern clinical leprosy. The main text keeps the familiar traditional
    rendering for readability and continuity, while a footnote preserves the more
    precise alternative so as not to imply an exact modern diagnosis.
  doctrine_reference: Translation philosophy §3, §6
