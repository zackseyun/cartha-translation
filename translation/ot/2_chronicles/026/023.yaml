id: 2CH.26.23
reference: 2 Chronicles 26:23
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֨ב עֻזִּיָּ֜הוּ עִם אֲבֹתָ֗י/ו וַ/יִּקְבְּר֨וּ אֹת֤/וֹ עִם אֲבֹתָי/ו֙
    בִּ/שְׂדֵ֤ה הַ/קְּבוּרָה֙ אֲשֶׁ֣ר לַ/מְּלָכִ֔ים כִּ֥י אָמְר֖וּ מְצוֹרָ֣ע ה֑וּא
    וַ/יִּמְלֹ֛ךְ יוֹתָ֥ם בְּנ֖/וֹ תַּחְתָּֽי/ו־־׃פ
translation:
  text: And Uzziah slept with his fathers, and they buried him with his fathers in
    the burial field that belonged to the kings, for they said, “He is a leper.” And
    Jotham his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “He has a skin disease.” The Hebrew term refers to one afflicted with
      צָרַעַת, which may be broader than modern leprosy.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: In royal obituary formulae, שׁכב with 'with his fathers' is the conventional
    idiom for death. 'Slept' preserves the Hebrew expression while remaining natural
    in English; 'died' would flatten the formulaic wording.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is the standard dynastic burial/death formula. 'Fathers' is retained
    as the more literal and conventional rendering; 'ancestors' is possible but less
    textually precise.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  chosen: they buried him
  alternatives:
  - he was buried
  lexicon: HALOT
  rationale: The Hebrew verb is active plural, not passive. English leaves the subject
    indefinite ('they'), matching the Hebrew's unspecified agents.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - near his fathers
  - among his fathers
  lexicon: HALOT
  rationale: The same phrase recurs in the burial clause. Here it likely indicates
    association with the royal burial area rather than necessarily the exact same
    tomb, but 'with his fathers' best preserves the wording.
- source_word: בִּשְׂדֵה הַקְּבוּרָה
  chosen: in the burial field
  alternatives:
  - in the field of burial
  - in the burial ground
  lexicon: HALOT
  rationale: שָׂדֶה is literally 'field.' 'Burial field' is concise and natural while
    preserving the concrete image better than the more interpretive 'burial ground.'
- source_word: אֲשֶׁר לַמְּלָכִים
  chosen: that belonged to the kings
  alternatives:
  - that was for the kings
  - of the kings
  lexicon: HALOT
  rationale: The lamed here marks possession or association. 'That belonged to the
    kings' makes the relationship explicit in idiomatic English without overinterpreting
    whether it was ownership or designated use.
- source_word: כִּי אָמְרוּ
  chosen: for they said
  alternatives:
  - because they said
  lexicon: HALOT
  rationale: כִּי introduces the reason for his burial location. 'For' fits the explanatory
    narrative style well.
- source_word: מְצוֹרָע
  chosen: leper
  alternatives:
  - a man with a skin disease
  - diseased
  lexicon: HALOT
  rationale: מְצֹרָע denotes one afflicted with צָרַעַת. Traditional 'leper' is concise
    and widely recognized, though the underlying condition may not map exactly onto
    modern Hansen's disease; the alternative is worth preserving in a footnote.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: The wayyiqtol of מלך in succession notices is well rendered 'reigned.'
    'Became king' is possible but less standard in this formula.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: The phrase marks dynastic succession. 'In his place' is idiomatic and
    preserves the sense of replacement more clearly than the temporally weaker 'after
    him'.
