id: 2CH.26.14
reference: 2 Chronicles 26:14
source:
  edition: WLC
  text: וַ/יָּכֶן֩ לָ/הֶ֨ם עֻזִּיָּ֜הוּ לְ/כָל הַ/צָּבָ֗א מָגִנִּ֤ים וּ/רְמָחִים֙
    וְ/כ֣וֹבָעִ֔ים וְ/שִׁרְיֹנ֖וֹת וּ/קְשָׁת֑וֹת וּ/לְ/אַבְנֵ֖י קְלָעִֽים־׃
translation:
  text: And Uzziah prepared for them, for the whole army, shields and spears and helmets
    and body armor and bows and slingstones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stones for slings.' The Hebrew is literally 'stones of slings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּכֶן
  chosen: prepared
  alternatives:
  - provided
  - made ready
  lexicon: HALOT
  rationale: The Hiphil of כון here conveys causing equipment to be ready or available.
    'Prepared' fits the military provisioning context without overstating manufacture.
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - for his men
  - for them all
  lexicon: HALOT
  rationale: The pronoun refers back to the military force described in context. 'For
    them' preserves the Hebrew pronoun directly; the following phrase clarifies the
    referent.
- source_word: לְכָל הַצָּבָא
  chosen: for the whole army
  alternatives:
  - for all the army
  - for the entire host
  lexicon: HALOT
  rationale: צָבָא here denotes the military force, not a heavenly host. 'The whole
    army' is idiomatic modern English and reflects the distributive sense of לְכָל.
- source_word: מָגִנִּים
  chosen: shields
  lexicon: HALOT
  rationale: Standard military term for shields; no contextual reason to narrow further.
- source_word: רְמָחִים
  chosen: spears
  alternatives:
  - lances
  lexicon: HALOT
  rationale: A common rendering for רֹמַח in military lists. 'Spears' is more natural
    and broadly understandable than 'lances'.
- source_word: כּוֹבָעִים
  chosen: helmets
  alternatives:
  - caps
  - headpieces
  lexicon: HALOT
  rationale: In armor contexts this term refers to protective headgear. 'Helmets'
    best captures the military sense.
- source_word: שִׁרְיֹנוֹת
  chosen: body armor
  alternatives:
  - coats of mail
  - armor
  lexicon: HALOT
  rationale: The term denotes protective armor for the torso. 'Body armor' is clear
    modern English; 'coats of mail' is traditional but too specific and archaic.
- source_word: קְשָׁתוֹת
  chosen: bows
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun for bows.
- source_word: אַבְנֵי קְלָעִים
  chosen: slingstones
  alternatives:
  - stones for slings
  - sling stones
  lexicon: HALOT
  rationale: Literally 'stones of slings.' 'Slingstones' is concise and natural in
    English while preserving the weapon reference.
