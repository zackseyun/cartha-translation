id: 2CH.26.4
reference: 2 Chronicles 26:4
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הַ/יָּשָׁ֖ר בְּ/עֵינֵ֣י יְהוָ֑ה כְּ/כֹ֥ל אֲשֶׁר עָשָׂ֖ה אֲמַצְיָ֥הוּ
    אָבִֽי/ו־׃
translation:
  text: He did what was right in the eyes of the LORD, according to all that Amaziah
    his father had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the sight of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: Wayyiqtol of עשה introduces the narrative action. English normally omits
    the conjunction in smooth narrative, so 'He did' best reflects the sense without
    unnecessary woodenness.
- source_word: הַיָּשָׁר
  chosen: what was right
  alternatives:
  - the right
  - what was upright
  lexicon: HALOT
  rationale: The adjective יָשָׁר with עשה forms a common idiom meaning to do what
    is right/upright. 'What was right' is idiomatic modern English and preserves the
    moral evaluation.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This Hebrew idiom marks evaluation from a person's perspective. 'In the
    eyes of' is a transparent and common English rendering that preserves the metaphor.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the translation policy for YHWH.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - just as all that
  - in accordance with everything that
  - like everything that
  lexicon: HALOT
  rationale: The construction expresses conformity or correspondence with a prior
    pattern. 'According to all that' preserves the comprehensive force of כֹל and
    the comparative sense of כְּ.
- source_word: עָשָׂה
  chosen: had done
  alternatives:
  - did
  lexicon: HALOT
  rationale: English past perfect clarifies that Amaziah's actions precede the reign
    now being described, even though Hebrew perfect itself does not require a pluperfect
    in form.
- source_word: אֲמַצְיָהוּ
  chosen: Amaziah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his ancestor
  lexicon: HALOT
  rationale: אָב can sometimes mean ancestor, but here the immediate historical context
    identifies Amaziah as Uzziah's actual father, so 'his father' is the most natural
    and precise rendering.
