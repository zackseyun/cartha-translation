theological_decisions:
- issue: Rendering of צָרַעַת
  chosen_reading: the skin disease
  alternative_readings:
  - leprosy
  rationale: The term traditionally rendered 'leprosy' in older English versions covers
    a wider semantic range in the Hebrew Bible than modern leprosy. Using 'skin disease'
    avoids importing a modern medical diagnosis the text does not require, while still
    reflecting divine judgment in the narrative.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
