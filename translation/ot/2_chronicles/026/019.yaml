id: 2CH.26.19
reference: 2 Chronicles 26:19
source:
  edition: WLC
  text: וַ/יִּזְעַף֙ עֻזִּיָּ֔הוּ וּ/בְ/יָד֥/וֹ מִקְטֶ֖רֶת לְ/הַקְטִ֑יר וּ/בְ/זַעְפּ֣/וֹ
    עִם הַ/כֹּהֲנִ֗ים וְ֠/הַ/צָּרַעַת זָרְחָ֨ה בְ/מִצְח֜/וֹ לִ/פְנֵ֤י הַ/כֹּֽהֲנִים֙
    בְּ/בֵ֣ית יְהוָ֔ה מֵ/עַ֖ל לְ/מִזְבַּ֥ח הַ/קְּטֹֽרֶת־׃
translation:
  text: Then Uzziah became angry, with a censer in his hand to burn incense; and while
    he was angry with the priests, the skin disease broke out on his forehead before
    the priests in the house of the LORD, beside the altar of incense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leprosy.' The Hebrew term צָרַעַת can refer more broadly to a serious
      skin disease or defiling skin condition, not necessarily modern leprosy.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְעַף
  chosen: became angry
  alternatives:
  - was enraged
  - grew furious
  lexicon: HALOT
  rationale: The verb denotes anger or indignation. 'Became angry' preserves the ingressive
    sense of the wayyiqtol in natural English without overstating intensity.
- source_word: עֻזִּיָּהוּ
  chosen: Uzziah
  rationale: Standard English transliteration of the personal name, following the
    philosophy of transliterating names rather than translating them.
- source_word: מִקְטֶרֶת
  chosen: censer
  alternatives:
  - incense burner
  lexicon: HALOT
  rationale: Refers to the vessel used for offering incense. 'Censer' is the standard
    concise English equivalent and fits the cultic context.
- source_word: לְהַקְטִיר
  chosen: to burn incense
  alternatives:
  - for offering incense
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To burn incense' is direct and idiomatic,
    preserving the ritual action.
- source_word: וּבְזַעְפּוֹ עִם הַכֹּהֲנִים
  chosen: while he was angry with the priests
  alternatives:
  - in his anger against the priests
  - as he raged at the priests
  lexicon: HALOT
  rationale: The preposition with the construct phrase marks the circumstance during
    which the next event occurred. 'While he was angry with the priests' best conveys
    the temporal-circumstantial force.
- source_word: הַצָּרַעַת
  chosen: the skin disease
  alternatives:
  - leprosy
  lexicon: HALOT
  rationale: Hebrew צָרַעַת does not map precisely onto modern Hansen's disease and
    can denote a broader defiling skin condition. 'Skin disease' avoids misleading
    medical specificity while preserving the affliction's seriousness.
- source_word: זָרְחָה
  chosen: broke out
  alternatives:
  - shone forth
  - appeared suddenly
  lexicon: HALOT
  rationale: Literally 'shone' or 'flashed forth,' but in context of a skin affliction
    appearing on the forehead, 'broke out' communicates the sudden visible onset in
    idiomatic English.
- source_word: בְמִצְחוֹ
  chosen: on his forehead
  lexicon: HALOT
  rationale: Straightforward anatomical reference; 'on' is the natural English preposition
    for visible manifestation.
- source_word: לִפְנֵי הַכֹּהֲנִים
  chosen: before the priests
  alternatives:
  - in the sight of the priests
  lexicon: HALOT
  rationale: The phrase indicates that the outbreak occurred in the priests' presence.
    'Before the priests' is concise and sufficiently clear.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת with YHWH commonly refers to the temple. 'House of the LORD' preserves
    the Hebrew expression, and 'the LORD' follows the project's required rendering
    of YHWH.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: מֵעַל לְמִזְבַּח הַקְּטֹרֶת
  chosen: beside the altar of incense
  alternatives:
  - from beside the altar of incense
  - at the altar of incense
  lexicon: HALOT
  rationale: The phrase locates the event in relation to the incense altar. The preposition
    combination is somewhat compressed; 'beside the altar of incense' gives a clear
    spatial sense in English without forcing an awkwardly literal rendering.
