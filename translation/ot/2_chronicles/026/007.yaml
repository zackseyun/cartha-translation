id: 2CH.26.7
reference: 2 Chronicles 26:7
source:
  edition: WLC
  text: וַ/יַּעְזְרֵ֨/הוּ הָֽ/אֱלֹהִ֜ים עַל פְּלִשְׁתִּ֧ים וְ/עַל ה/ערביים הַ/יֹּשְׁבִ֥ים
    בְּ/גוּר בָּ֖עַל וְ/הַ/מְּעוּנִֽים־־־׃
translation:
  text: God helped him against the Philistines, against the Arabians who lived in
    Gur-baal, and against the Meunites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Maonites.' The Hebrew ethnonym may reflect a related or variant
      group name.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעְזְרֵהוּ
  chosen: helped him
  alternatives:
  - gave him help
  - came to his aid
  lexicon: HALOT
  rationale: The verb עזר in the waw-consecutive narrative form with 3ms suffix means
    'helped him' or 'came to his aid.' 'Helped him' is the most direct and natural
    English rendering and preserves God as the acting subject aiding Uzziah.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: Although marked with the article in Hebrew, הָאֱלֹהִים here functions
    as the standard designation for Israel's God in narrative. English idiom normally
    renders this simply as 'God,' not 'the God,' unless contrast is explicit.
- source_word: עַל
  chosen: against
  alternatives:
  - concerning
  - over
  lexicon: HALOT
  rationale: With the verb 'help' in a military context, עַל indicates opposition
    toward hostile parties. 'Against' best captures the sense that God aided Uzziah
    in conflict with these peoples.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard English ethnonym for the people group פלשתים.
- source_word: הערביים
  chosen: the Arabians
  alternatives:
  - the Arabs
  lexicon: HALOT
  rationale: The ethnonym refers to Arabian peoples. 'Arabians' fits the older people-group
    sense in historical narrative and avoids possible anachronistic modern political
    associations of 'Arabs,' though that remains a viable alternative.
- source_word: הַיֹּשְׁבִים
  chosen: who lived
  alternatives:
  - who dwelt
  - who were living
  lexicon: HALOT
  rationale: The participle of ישב denotes dwelling or residing. 'Who lived' is clear
    modern English and naturally modifies 'the Arabians.'
- source_word: בְּגוּר בָּעַל
  chosen: in Gur-baal
  alternatives:
  - at Gur-baal
  lexicon: HALOT
  rationale: This is a place name and should be transliterated. The preposition ב
    is most naturally rendered 'in' with a place of residence.
- source_word: הַמְּעוּנִים
  chosen: the Meunites
  alternatives:
  - the Maonites
  lexicon: HALOT
  rationale: The ethnonym is best transliterated as 'Meunites,' following the consonantal
    form מעונים. Because the exact identification is debated and some connect the
    group with Maon, the alternative is worth preserving in a footnote.
