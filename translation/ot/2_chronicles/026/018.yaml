id: 2CH.26.18
reference: 2 Chronicles 26:18
source:
  edition: WLC
  text: וַ/יַּעַמְד֞וּ עַל עֻזִּיָּ֣הוּ הַ/מֶּ֗לֶךְ וַ/יֹּ֤אמְרוּ ל/וֹ֙ לֹא לְ/ךָ֣ עֻזִּיָּ֗הוּ לְ/הַקְטִיר֙ לַֽ/יהוָ֔ה כִּ֣י לַ/כֹּהֲנִ֧ים בְּנֵי אַהֲרֹ֛ן הַ/מְקֻדָּשִׁ֖ים לְ/הַקְטִ֑יר צֵ֤א מִן הַ/מִּקְדָּשׁ֙ כִּ֣י מָעַ֔לְתָּ וְ/לֹֽא לְ/ךָ֥ לְ/כָב֖וֹד מֵ/יְהוָ֥ה אֱלֹהִֽים־־־־־׃
translation:
  text: They stood against King Uzziah and said to him, “It is not for you, Uzziah, to burn incense to Yahweh, but for the priests, the sons of Aaron, who are consecrated to burn incense. Leave the sanctuary, for you have acted unfaithfully, and it will not be for your honor from Yahweh God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'withstood him' or 'confronted him' for 'stood against.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you have trespassed.' The Hebrew verb can denote acting unfaithfully, especially in a sacred or covenantal matter.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'and not to you for honor from the LORD God,' an elliptical expression meaning that this action would not result in honor from God.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַמְדוּ עַל
  chosen: stood against
  alternatives:
  - withstood
  - confronted
  lexicon: HALOT
  rationale: The idiom עמד על in this context conveys taking a stand in opposition to someone, not merely standing near them. 'Stood against' preserves the adversative force while remaining natural English.
- source_word: עֻזִּיָּהוּ הַמֶּלֶךְ
  chosen: King Uzziah
  alternatives:
  - Uzziah the king
  lexicon: HALOT
  rationale: English title-before-name order is more natural, while fully preserving the referent.
- source_word: לֹא לְךָ ... לְהַקְטִיר
  chosen: It is not for you ... to burn incense
  alternatives:
  - It does not belong to you to burn incense
  - You are not authorized to burn incense
  lexicon: HALOT
  rationale: The construction expresses propriety or rightful prerogative. 'It is not for you' captures the restriction without over-paraphrasing into modern bureaucratic language.
- source_word: לְהַקְטִיר
  chosen: to burn incense
  alternatives:
  - to offer incense
  lexicon: HALOT
  rationale: The Hiphil of קטר here refers specifically to making an incense offering. 'Burn incense' is the standard and sufficiently precise rendering.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD' rather than transliterated.
- source_word: כִּי לַכֹּהֲנִים בְּנֵי אַהֲרֹן
  chosen: but for the priests, the sons of Aaron
  alternatives:
  - but for the priests, Aaron's sons
  lexicon: HALOT
  rationale: This marks exclusive priestly prerogative. 'The sons of Aaron' preserves the formal covenantal designation.
- source_word: הַמְקֻדָּשִׁים
  chosen: who are consecrated
  alternatives:
  - who have been sanctified
  - who are set apart
  lexicon: HALOT
  rationale: The passive participle denotes those set apart for sacred service. 'Consecrated' best fits priestly cultic context in readable English.
- source_word: צֵא מִן הַמִּקְדָּשׁ
  chosen: Leave the sanctuary
  alternatives:
  - Go out from the sanctuary
  - Leave the holy place
  lexicon: HALOT
  rationale: מקדש is the holy precinct/sanctuary. 'Leave the sanctuary' is direct and idiomatic. 'Holy place' could imply a narrower inner chamber than the Hebrew necessarily specifies.
- source_word: מָעַלְתָּ
  chosen: you have acted unfaithfully
  alternatives:
  - you have trespassed
  - you have been unfaithful
  - you have acted treacherously
  lexicon: HALOT
  rationale: מעל often denotes breach of faith or sacrilege against God. 'Acted unfaithfully' preserves the covenantal-religious dimension better than the more generic 'trespassed.'
- source_word: וְלֹא לְךָ לְכָבוֹד
  chosen: this will not bring you honor
  alternatives:
  - and not to you for honor
  - and it will not be for your honor
  lexicon: HALOT
  rationale: The Hebrew is elliptical. The sense is that Uzziah's action will result not in honor but disgrace. Supplying 'this will not bring you honor' makes the clause intelligible in natural English while staying close to the implied meaning.
- source_word: מֵיְהוָה אֱלֹהִים
  chosen: from the LORD God
  alternatives:
  - from the LORD, God
  - from Yahweh God
  lexicon: HALOT
  rationale: The phrase identifies the source of true honor. 'The LORD God' is the standard English rendering and aligns with doctrinal guidance on YHWH.
