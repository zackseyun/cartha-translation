theological_decisions:
- issue: Priestly exclusivity in temple incense offering
  chosen_reading: The verse states that burning incense to the LORD belongs specifically to the Aaronic priests consecrated for that task.
  alternative_readings:
  - A broader statement about general worship leadership
  rationale: The text is not making a general comment about kingship versus priesthood in the abstract only, but specifically about the cultic duty of incense offering reserved to Aaron's sons. The translation preserves that concrete priestly restriction.
- issue: Meaning of מָעַלְתָּ
  chosen_reading: Uzziah has acted unfaithfully/sacrilegiously against the LORD's order.
  alternative_readings:
  - Uzziah has merely made a procedural mistake
  rationale: The verb מעל in cultic contexts carries serious covenantal breach, not a minor irregularity. 'Acted unfaithfully' preserves the theological gravity without importing later doctrinal categories.
