id: 2CH.26.2
reference: 2 Chronicles 26:2
source:
  edition: WLC
  text: ה֚וּא בָּנָ֣ה אֶת אֵיל֔וֹת וַ/יְשִׁיבֶ֖/הָ לִֽ/יהוּדָ֑ה אַחֲרֵ֥י שְׁכַֽב הַ/מֶּ֖לֶךְ
    עִם אֲבֹתָֽי/ו־־־׃פ
translation:
  text: He built Eloth and restored it to Judah after the king slept with his fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brought it back to Judah.'
    reason: lexical_alternative
  - marker: b
    text: '''Slept with his fathers'' is a Hebrew idiom for death.'
    reason: cultural_note
lexical_decisions:
- source_word: בָּנָה
  chosen: built
  alternatives:
  - rebuilt
  - fortified
  lexicon: HALOT
  rationale: The verb commonly means 'build.' In context with a city/place name, 'built'
    is the most direct rendering. 'Rebuilt' is possible by implication if the site
    had existed before, but that nuance is not explicit in the verb itself.
- source_word: אֵילוֹת
  chosen: Eloth
  alternatives:
  - Elat
  - Eilat
  lexicon: HALOT
  rationale: This is a place name, so transliteration is preferred per translation
    philosophy. 'Eloth' reflects a conventional English transliteration of the Hebrew
    form here; modernized spellings such as 'Eilat' reflect later usage rather than
    the biblical form.
- source_word: וַיְשִׁיבֶהָ
  chosen: restored it
  alternatives:
  - brought it back
  - returned it
  lexicon: HALOT
  rationale: 'From שוב in the Hiphil, with the feminine singular suffix referring
    to Eloth. In this context the sense is causative: he caused it to return to Judah''s
    control. ''Restored it'' communicates political recovery more idiomatically than
    the more wooden ''returned it.'''
- source_word: לִיהוּדָה
  chosen: to Judah
  alternatives:
  - for Judah
  lexicon: HALOT
  rationale: The preposition ל marks the goal/recipient of the restoration. 'To Judah'
    is the most natural English rendering and preserves the directional sense.
- source_word: אַחֲרֵי שְׁכַב
  chosen: after ... slept
  alternatives:
  - after ... lay down
  - after the death of
  lexicon: HALOT
  rationale: The infinitive construct with אַחֲרֵי means 'after [the] lying down/sleeping.'
    In royal obituary formulae, 'slept' is the standard idiomatic equivalent and preserves
    the Hebrew euphemism for death better than the interpretive gloss 'after the death
    of.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  alternatives:
  - King Amaziah
  lexicon: HALOT
  rationale: The Hebrew reads 'the king,' not the personal name. The referent is clear
    from context, but the translation should preserve the wording of the source text.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is a conventional Hebrew burial/death formula. 'With his fathers'
    preserves the idiom closely; 'with his ancestors' is possible but less literal
    and less traditional in this formulaic context.
