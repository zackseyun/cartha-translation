id: 2CH.26.17
reference: 2 Chronicles 26:17
source:
  edition: WLC
  text: וַ/יָּבֹ֥א אַחֲרָ֖י/ו עֲזַרְיָ֣הוּ הַ/כֹּהֵ֑ן וְ/עִמּ֞/וֹ כֹּהֲנִ֧ים לַ/יהוָ֛ה שְׁמוֹנִ֖ים בְּנֵי חָֽיִל׀־׃
translation:
  text: Azariah the priest went in after him, and with him were eighty priests of Yahweh, valiant men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'men of valor.' The Hebrew idiom בְּנֵי חָיִל can denote men marked by strength, courage, or valor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: went in
  alternatives:
  - came in
  - entered
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come/go/enter.' In this narrative context, Azariah follows Uzziah into the sanctuary area, so 'went in' is natural English and preserves the motion without over-specifying beyond the Hebrew.
- source_word: אַחֲרָיו
  chosen: after him
  alternatives:
  - behind him
  lexicon: HALOT
  rationale: The preposition indicates following someone. 'After him' is idiomatic and fits the narrative sequence.
- source_word: עֲזַרְיָהוּ
  chosen: Azariah
  rationale: Personal names are transliterated by standard convention per translation philosophy.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Definite singular noun identifying Azariah's office. 'The priest' is the straightforward rendering.
- source_word: וְעִמּוֹ
  chosen: and with him were
  alternatives:
  - and with him
  - accompanied by
  lexicon: HALOT
  rationale: The Hebrew is a verbless accompaniment phrase. English supplies 'were' for readability while preserving the sense that the priests were with Azariah.
- source_word: כֹּהֲנִים לַיהוָה
  chosen: priests of the LORD
  alternatives:
  - the LORD's priests
  lexicon: HALOT
  rationale: 'The lamed marks relation/dedication: priests belonging to or serving YHWH. ''Priests of the LORD'' is idiomatic and clear. Per doctrine, יְהוָה is rendered ''the LORD.'''
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered 'the LORD' in keeping with the stated doctrinal default and longstanding reverential convention.
- source_word: שְׁמוֹנִים
  chosen: eighty
  lexicon: HALOT
  rationale: Direct cardinal number.
- source_word: בְּנֵי חָיִל
  chosen: valiant men
  alternatives:
  - men of valor
  - mighty men
  - strong men
  lexicon: HALOT
  rationale: This idiom often denotes men of strength, valor, or standing. Here it characterizes the priests as courageous and forceful in confronting the king. 'Valiant men' is concise, natural English that preserves the masculine form and the idiomatic force.
