id: 2CH.26.6
reference: 2 Chronicles 26:6
source:
  edition: WLC
  text: וַ/יֵּצֵא֙ וַ/יִּלָּ֣חֶם בַּ/פְּלִשְׁתִּ֔ים וַ/יִּפְרֹ֞ץ אֶת ח֣וֹמַת גַּ֗ת
    וְ/אֵת֙ חוֹמַ֣ת יַבְנֵ֔ה וְ/אֵ֖ת חוֹמַ֣ת אַשְׁדּ֑וֹד וַ/יִּבְנֶ֣ה עָרִ֔ים בְּ/אַשְׁדּ֖וֹד
    וּ/בַ/פְּלִשְׁתִּֽים־׃
translation:
  text: He went out and fought against the Philistines, and he broke through the wall
    of Gath, the wall of Jabneh, and the wall of Ashdod; and he built cities in the
    territory of Ashdod and among the Philistines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'breached' or 'broke down' the wall of Gath, the wall of Jabneh, and
      the wall of Ashdod.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in Ashdod and among the Philistines'; 'Ashdod' may refer to the
      city or its surrounding territory.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: He went out
  alternatives:
  - He went forth
  - He marched out
  lexicon: HALOT
  rationale: The verb יצא literally means 'go out.' 'He went out' preserves the narrative
    sequence without adding military nuance beyond what the following verb 'fought'
    already supplies. 'Marched out' would over-interpret.
- source_word: וַיִּלָּחֶם
  chosen: fought against
  alternatives:
  - made war against
  - fought with
  lexicon: HALOT
  rationale: לחם in the Niphal commonly means 'to fight, wage war.' 'Fought against'
    is natural modern English and makes the hostile direction explicit from the preposition.
- source_word: בַּפְּלִשְׁתִּים
  chosen: the Philistines
  alternatives:
  - Philistia
  lexicon: HALOT
  rationale: The form is the people-group, not the land. Therefore 'the Philistines'
    is preferable to a territorial rendering here.
- source_word: וַיִּפְרֹץ
  chosen: broke through
  alternatives:
  - broke down
  - breached
  lexicon: HALOT
  rationale: פרץ can denote breaking through or making a breach. With 'wall' as object,
    'broke through' conveys the military action vividly while remaining idiomatic.
    'Breached' is possible but less accessible.
- source_word: חוֹמַת
  chosen: the wall of
  alternatives:
  - the walls of
  lexicon: HALOT
  rationale: The singular construct appears three times with each city named individually,
    so 'the wall of' should be retained for each city rather than generalized to plural.
- source_word: גַּת
  chosen: Gath
  rationale: Standard English transliteration of the Philistine city name.
- source_word: יַבְנֶה
  chosen: Jabneh
  alternatives:
  - Yabneh
  - Jamnia
  rationale: As a personal/place name, it is transliterated. 'Jabneh' follows a straightforward
    Hebrew-based transliteration; 'Jamnia' reflects later Greek tradition rather than
    the Hebrew form.
- source_word: אַשְׁדּוֹד
  chosen: Ashdod
  rationale: Standard English transliteration of the city name.
- source_word: וַיִּבְנֶה עָרִים
  chosen: he built cities
  alternatives:
  - he rebuilt cities
  - he built towns
  lexicon: HALOT
  rationale: בנה means 'build.' Nothing in the immediate Hebrew explicitly states
    'rebuild,' so the simpler 'built' is preferred. 'Cities' matches the common rendering
    of עָרִים.
- source_word: בְּאַשְׁדּוֹד
  chosen: in the territory of Ashdod
  alternatives:
  - in Ashdod
  - at Ashdod
  lexicon: HALOT
  rationale: Because Ashdod has just referred to the city wall, the preposition here
    likely extends to the district or region associated with Ashdod. 'In the territory
    of Ashdod' avoids the awkward implication that multiple cities were built inside
    the city itself.
- source_word: וּבַפְּלִשְׁתִּים
  chosen: among the Philistines
  alternatives:
  - in Philistia
  - in the land of the Philistines
  lexicon: HALOT
  rationale: The Hebrew again uses the people-group form. 'Among the Philistines'
    preserves that form while communicating location within their domain. 'In Philistia'
    is interpretive and shifts from people to territory.
