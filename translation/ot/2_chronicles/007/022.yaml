id: 2CH.7.22
reference: 2 Chronicles 7:22
source:
  edition: WLC
  text: וְ/אָמְר֗וּ עַל֩ אֲשֶׁ֨ר עָֽזְב֜וּ אֶת יְהוָ֣ה אֱלֹהֵ֣י אֲבֹתֵי/הֶ֗ם אֲשֶׁ֣ר
    הוֹצִיאָ/ם֮ מֵ/אֶ֣רֶץ מִצְרַיִם֒ וַֽ/יַּחֲזִ֨יקוּ֙ בֵּ/אלֹהִ֣ים אֲחֵרִ֔ים וַ/יִּשְׁתַּחֲו֥וּ
    לָ/הֶ֖ם וַ/יַּֽעַבְד֑וּ/ם עַל כֵּן֙ הֵבִ֣יא עֲלֵי/הֶ֔ם אֵ֥ת כָּל הָ/רָעָ֖ה הַ/זֹּֽאת־׀־־׃פ
translation:
  text: And they will say, ‘Because they forsook the LORD, the God of their fathers,
    who brought them out of the land of Egypt, and took hold of other gods, and bowed
    down to them and served them, therefore he has brought all this disaster on them.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “clung to other gods” or “embraced other gods.” The Hebrew verb literally
      means “took hold of,” expressing deliberate attachment to foreign gods.
    reason: lexical_alternative
  - marker: b
    text: “All this disaster” refers to calamity/judgment, not moral evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  chosen: And they will say
  alternatives:
  - And people will say
  - Then they will say
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this explanatory context is
    best rendered as future in English ('will say'), continuing the prediction from
    the previous verse.
- source_word: עַל אֲשֶׁר
  chosen: Because
  alternatives:
  - On account of which
  - For that
  lexicon: HALOT
  rationale: The preposition plus relative particle introduces the reason for the
    devastation; idiomatic English 'Because' captures the causal force.
- source_word: עָזְבוּ
  chosen: forsook
  alternatives:
  - abandoned
  - left
  lexicon: HALOT
  rationale: The verb denotes covenantal abandonment. 'Forsook' preserves the gravity
    and biblical register without excessive archaism.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: אֱלֹהֵי אֲבֹתֵיהֶם
  chosen: the God of their fathers
  alternatives:
  - their fathers' God
  - the God of their ancestors
  lexicon: HALOT
  rationale: This construct phrase evokes covenant continuity with the patriarchs/forefathers.
    'The God of their fathers' is the most natural and traditional equivalent.
- source_word: הוֹצִיאָם מֵאֶרֶץ מִצְרַיִם
  chosen: who brought them out of the land of Egypt
  alternatives:
  - who led them out from the land of Egypt
  lexicon: HALOT
  rationale: Standard exodus formula; 'brought them out' is the clearest idiomatic
    rendering of the Hiphil of יצא in this context.
- source_word: וַיַּחֲזִיקוּ בֵּאלֹהִים אֲחֵרִים
  chosen: and took hold of other gods
  alternatives:
  - and clung to other gods
  - and embraced other gods
  lexicon: HALOT
  rationale: The verb חזק with ב can mean to seize, grasp, or hold fast. Here it describes
    deliberate attachment to idols. 'Took hold of' preserves the concrete metaphor
    and avoids overinterpreting with a more theological gloss like 'clung'.
- source_word: וַיִּשְׁתַּחֲווּ לָהֶם
  chosen: and bowed down to them
  alternatives:
  - and worshiped them
  - and prostrated themselves to them
  lexicon: HALOT
  rationale: The verb literally denotes bowing/prostration. 'Bowed down to them' preserves
    the physical act, while the following verb 'served' completes the worship sense.
- source_word: וַיַּעַבְדוּם
  chosen: and served them
  alternatives:
  - and worshiped them
  lexicon: HALOT
  rationale: עבד with gods commonly denotes religious service/worship. 'Served them'
    keeps the lexical distinction from the previous verb rather than collapsing both
    into 'worshiped'.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: HALOT
  rationale: This phrase marks the consequence of Israel's apostasy; 'therefore' is
    concise and suitably formal.
- source_word: הֵבִיא עֲלֵיהֶם
  chosen: he has brought on them
  alternatives:
  - he brought upon them
  - he caused to come upon them
  lexicon: HALOT
  rationale: The Hiphil of בוא here means to bring calamity upon someone. English
    present perfect fits the quoted explanation of a present ruined condition; 'on
    them' is idiomatic.
- source_word: כָּל הָרָעָה הַזֹּאת
  chosen: all this disaster
  alternatives:
  - all this evil
  - all this calamity
  lexicon: HALOT
  rationale: רָעָה in judgment contexts refers to calamity/disaster rather than moral
    evil. 'Disaster' communicates the sense clearly in modern English.
