id: 2CH.7.8
reference: 2 Chronicles 7:8
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ שְׁלֹמֹ֣ה אֶת הֶ֠/חָג בָּ/עֵ֨ת הַ/הִ֜יא שִׁבְעַ֤ת יָמִים֙ וְ/כָל
    יִשְׂרָאֵ֣ל עִמּ֔/וֹ קָהָ֖ל גָּד֣וֹל מְאֹ֑ד מִ/לְּב֥וֹא חֲמָ֖ת עַד נַ֥חַל מִצְרָֽיִם־־־׃
translation:
  text: At that time Solomon kept the feast for seven days, and all Israel with him,
    a very great assembly, from Lebo-hamath to the Brook of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the entrance of Hamath.' The Hebrew may be understood either as
      a place-name ('Lebo-hamath') or as a descriptive boundary expression.
    reason: alternative_reading
  - marker: b
    text: Or 'to the Wadi of Egypt.' The Hebrew word can denote a seasonal watercourse
      or brook rather than a major river.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: kept
  alternatives:
  - held
  - observed
  - made
  lexicon: HALOT
  rationale: Although the verb is literally 'did/made,' with חָג ('feast/festival')
    the idiomatic sense is to celebrate or observe a festival. 'Kept' is natural English
    and preserves the formal sense of observance without over-paraphrasing.
- source_word: הֶחָג
  chosen: the feast
  alternatives:
  - the festival
  lexicon: HALOT
  rationale: חָג denotes a pilgrimage feast/festival. 'Feast' is concise and traditional,
    while still understandable in modern English. The definite article is preserved.
- source_word: בָּעֵת הַהִיא
  chosen: At that time
  alternatives:
  - At that season
  - At that time then
  lexicon: HALOT
  rationale: A straightforward temporal expression; 'At that time' is the most natural
    modern rendering.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: English idiom prefers 'for seven days' with a festival observance; this
    makes the duration explicit.
- source_word: וְכָל יִשְׂרָאֵל עִמּוֹ
  chosen: and all Israel with him
  alternatives:
  - and all Israel was with him
  - and all Israel along with him
  lexicon: HALOT
  rationale: Retains the collective national sense of 'all Israel' and the accompaniment
    expressed by עִמּוֹ.
- source_word: קָהָל גָּדוֹל מְאֹד
  chosen: a very great assembly
  alternatives:
  - a very large assembly
  - a very great congregation
  lexicon: HALOT
  rationale: Appositional to 'all Israel,' describing the gathered people. 'Assembly'
    fits קָהָל well in this narrative context; 'congregation' could sound more ecclesiastical
    than the Hebrew requires.
- source_word: מִלְּבוֹא חֲמָת
  chosen: from Lebo-hamath
  alternatives:
  - from the entrance of Hamath
  - from Hamath's approach
  lexicon: HALOT
  rationale: This expression is often treated as a place-name or fixed geographical
    designation marking Israel's northern extent. Rendering it as 'Lebo-hamath' preserves
    the toponymic force and avoids an overly interpretive paraphrase.
- source_word: עַד נַחַל מִצְרַיִם
  chosen: to the Brook of Egypt
  alternatives:
  - to the Wadi of Egypt
  - to the river of Egypt
  lexicon: HALOT
  rationale: נַחַל commonly denotes a wadi, torrent-bed, or brook rather than a major
    river. 'Brook of Egypt' is a familiar and defensible rendering; 'Wadi of Egypt'
    is more geographically precise but less natural for many readers.
