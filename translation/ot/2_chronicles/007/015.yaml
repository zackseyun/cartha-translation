theological_decisions:
- issue: Anthropomorphic language for God's perception
  chosen_reading: Preserve 'my eyes' and 'my ears' literally
  alternative_readings:
  - I will watch and listen
  rationale: The Hebrew uses embodied imagery for divine attention. Preserving the
    metaphor respects the source text and avoids flattening its relational and covenantal
    force.
  doctrine_reference: Translation philosophy §1, §3
