id: 2CH.7.15
reference: 2 Chronicles 7:15
source:
  edition: WLC
  text: עַתָּ֗ה עֵינַ/י֙ יִהְי֣וּ פְתֻח֔וֹת וְ/אָזְנַ֖/י קַשֻּׁב֑וֹת לִ/תְפִלַּ֖ת
    הַ/מָּק֥וֹם הַ/זֶּֽה׃
translation:
  text: Now my eyes will be open and my ears attentive to the prayer of this place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to prayer offered in this place' or 'to prayer from this place.' The
      Hebrew more literally reads 'to the prayer of this place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - From now on
  lexicon: HALOT
  rationale: Temporal adverb marking the present result of the preceding dedication
    scene. 'Now' is natural and sufficiently precise; 'from now on' is possible but
    slightly more interpretive.
- source_word: עֵינַי
  chosen: my eyes
  lexicon: HALOT
  rationale: Literal first-person singular possessive with plural noun. Retained concretely
    rather than paraphrasing as 'I will watch,' preserving the anthropomorphic imagery
    of divine attention.
- source_word: יִהְיוּ פְתֻחוֹת
  chosen: will be open
  alternatives:
  - shall be open
  lexicon: HALOT
  rationale: Qal imperfect of היה with passive participle 'open' expresses a future/state
    sense. 'Will be open' is idiomatic modern English and preserves the stative force.
- source_word: וְאָזְנַי
  chosen: and my ears
  lexicon: HALOT
  rationale: Literal rendering parallel to 'my eyes.' The anthropomorphic expression
    is preserved rather than abstracted.
- source_word: קַשֻּׁבוֹת
  chosen: attentive
  alternatives:
  - listening
  - heedful
  lexicon: HALOT
  rationale: Adjectival/passive form from קשׁב conveys attentive listening. 'Attentive'
    fits the parallelism with 'open' and reads naturally in English; 'listening' is
    possible but less formally parallel.
- source_word: לִתְפִלַּת
  chosen: to the prayer
  alternatives:
  - to prayer
  lexicon: HALOT
  rationale: The singular construct with prefixed ל indicates directed attention toward
    prayer. 'To the prayer' is formally closest, though in English it functions generically.
- source_word: הַמָּקוֹם הַזֶּה
  chosen: of this place
  alternatives:
  - offered in this place
  - from this place
  lexicon: HALOT
  rationale: Formally, the phrase is 'the prayer of this place.' In context it means
    prayer associated with this temple/place. 'Of this place' preserves the Hebrew
    construction without adding words not present; more explicit alternatives are
    interpretive and therefore reserved as footnoted possibilities.
