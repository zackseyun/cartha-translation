id: 2CH.7.6
reference: 2 Chronicles 7:6
source:
  edition: WLC
  text: וְ/הַ/כֹּהֲנִ֞ים עַל מִשְׁמְרוֹתָ֣/ם עֹמְדִ֗ים וְ/הַ/לְוִיִּ֞ם בִּ/כְלֵי שִׁ֤יר יְהוָה֙ אֲשֶׁ֨ר עָשָׂ֜ה דָּוִ֣יד הַ/מֶּ֗לֶךְ לְ/הֹד֤וֹת לַ/יהוָה֙ כִּֽי לְ/עוֹלָ֣ם חַסְדּ֔/וֹ בְּ/הַלֵּ֥ל דָּוִ֖יד בְּ/יָדָ֑/ם וְ/הַ/כֹּהֲנִים֙ מחצצרים נֶגְדָּ֔/ם וְ/כָל יִשְׂרָאֵ֖ל עֹמְדִֽים־־־־׃ס
translation:
  text: And the priests were standing at their posts, and the Levites with the instruments of song to Yahweh, which David the king had made to give thanks to Yahweh, for his steadfast love endures forever, when David offered praise by their hand; and the priests were blowing trumpets opposite them, while all Israel was standing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the musical instruments of the LORD.' The Hebrew phrase may mean instruments dedicated to the LORD or instruments used for the LORD's song.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'For his steadfast love is forever,' an idiom commonly rendered 'For his steadfast love endures forever.'
    reason: lexical_alternative
  - marker: c
    text: Or 'when David praised through them.' The Hebrew is compressed and likely means that the Levites rendered Davidic praise as his agents.
    reason: alternative_reading
lexical_decisions:
- source_word: מִשְׁמְרוֹתָם
  chosen: their posts
  alternatives:
  - their divisions
  - their duties
  - their stations
  lexicon: HALOT
  rationale: The noun denotes assigned service-positions or watches. In this temple-service context, 'their posts' is natural modern English and preserves the idea of ordered placement rather than abstract responsibility alone.
- source_word: בִּכְלֵי שִׁיר יְהוָה
  chosen: with the instruments for the song of the LORD
  alternatives:
  - with the musical instruments of the LORD
  - with the instruments of the LORD's song
  lexicon: HALOT
  rationale: כְּלֵי is 'instruments/implements' and שִׁיר is 'song/music.' The phrase likely refers to musical instruments used in praise to the LORD. 'Instruments for the song of the LORD' keeps the genitival relation without overinterpreting it as merely 'musical instruments' detached from worship.
- source_word: לְהוֹדוֹת לַיהוָה
  chosen: to give thanks to the LORD
  alternatives:
  - to praise the LORD
  - to confess thanks to the LORD
  lexicon: HALOT
  rationale: ידה in the Hiphil commonly means to give thanks or praise. Here the thanksgiving formula that follows ('for his steadfast love endures forever') favors 'give thanks' as the more precise rendering.
- source_word: כִּי לְעוֹלָם חַסְדּוֹ
  chosen: For his steadfast love endures forever
  alternatives:
  - For his lovingkindness endures forever
  - For his mercy endures forever
  - For his covenant faithfulness endures forever
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal loyalty, kindness, and mercy. 'Steadfast love' is a well-established English rendering that preserves both affection and covenant durability better than the narrower 'mercy.' 'Endures' is supplied idiomatically in English though not explicit in Hebrew.
- source_word: בְּהַלֵּל דָּוִיד בְּיָדָם
  chosen: when David offered praise by their hand
  alternatives:
  - when David praised by means of them
  - when they praised with David's composition
  - when David praised through them
  lexicon: HALOT
  rationale: The infinitive construct with ב plus subject David and instrument phrase בְּיָדָם is syntactically compressed. The sense is that David's praise was being rendered through the Levites' agency/instrumentality. 'Offered praise by their hand' preserves the Hebrew idiom while remaining intelligible.
- source_word: מחצצרים
  chosen: were blowing trumpets
  alternatives:
  - were sounding trumpets
  - were trumpeting
  lexicon: HALOT
  rationale: The verb from חצצר specifically denotes sounding trumpets. 'Were blowing trumpets' is clear, idiomatic, and suitably concrete.
- source_word: נֶגְדָּם
  chosen: opposite them
  alternatives:
  - before them
  - in front of them
  lexicon: HALOT
  rationale: The preposition denotes being in front of or opposite. 'Opposite them' best preserves the spatial relation without forcing a ceremonial nuance.
- source_word: עֹמְדִים
  chosen: were standing
  alternatives:
  - stood
  lexicon: HALOT
  rationale: The participle gives a durative scene-setting sense. 'Were standing' reflects the ongoing posture of priests and all Israel in the ceremony.
