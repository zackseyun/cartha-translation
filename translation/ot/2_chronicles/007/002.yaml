id: 2CH.7.2
reference: 2 Chronicles 7:2
source:
  edition: WLC
  text: וְ/לֹ֤א יָֽכְלוּ֙ הַ/כֹּ֣הֲנִ֔ים לָ/ב֖וֹא אֶל בֵּ֣ית יְהוָ֑ה כִּֽי מָלֵ֥א
    כְבוֹד יְהוָ֖ה אֶת בֵּ֥ית יְהוָֽה־־־־׃
translation:
  text: And the priests were not able to enter the house of the LORD, because the
    glory of the LORD filled the house of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''house of the LORD''; that is, the temple. The translation keeps
      ''house'' to reflect the Hebrew wording.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  chosen: And ... not
  alternatives:
  - But ... not
  - And ... could not
  lexicon: HALOT
  rationale: 'The conjunction with negation continues the narrative sequence: ''And
    ... not.'' English idiom requires distributing the negation with the verb phrase,
    yielding ''And the priests were not able...'' rather than a more wooden ''And
    not the priests were able.'''
- source_word: יָכְלוּ
  chosen: were not able
  alternatives:
  - could not
  lexicon: HALOT
  rationale: From יכל, expressing ability. 'Were not able' is slightly more formal
    and preserves the sense of incapacity without overinterpreting whether the hindrance
    was physical or cultic. 'Could not' is a valid smoother alternative but less transparent
    to the Hebrew structure.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כהנים in this temple context.
- source_word: לָבוֹא אֶל
  chosen: to enter
  alternatives:
  - to go into
  - to come into
  lexicon: HALOT
  rationale: The infinitive of בוא with אֶל in this context naturally means entering
    a place. 'Enter' is idiomatic and concise in English.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew wording
    and temple theology. 'Temple of the LORD' is contextually accurate but less formally
    aligned with the source.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    This follows established English convention for YHWH while signaling the covenant
    name.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי gives the reason the priests could not enter. 'Because' is
    the clearest modern English causal connector.
- source_word: מָלֵא
  chosen: filled
  alternatives:
  - had filled
  - was full in
  lexicon: HALOT
  rationale: The verb מלא here states that the LORD's glory filled the house. Simple
    past 'filled' works well in the narrative sequence and avoids unnecessary aspectual
    overprecision.
- source_word: כְבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: Both are natural English. 'The glory of the LORD' preserves the construct
    relationship more transparently and matches common biblical diction without being
    archaic.
- source_word: אֶת בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Direct object of 'filled.' Repeating 'the house of the LORD' reflects
    the Hebrew repetition rather than varying the phrase stylistically.
