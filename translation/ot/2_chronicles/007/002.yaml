theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name three times. Following the project's
    doctrine, it is rendered 'the LORD' rather than transliterated forms. This preserves
    consistency with the stated default and with longstanding reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
