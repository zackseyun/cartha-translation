id: 2CH.7.20
reference: 2 Chronicles 7:20
source:
  edition: WLC
  text: וּ/נְתַשְׁתִּ֗י/ם מֵ/עַ֤ל אַדְמָתִ/י֙ אֲשֶׁ֣ר נָתַ֣תִּי לָ/הֶ֔ם וְ/אֶת הַ/בַּ֤יִת
    הַ/זֶּה֙ אֲשֶׁ֣ר הִקְדַּ֣שְׁתִּי לִ/שְׁמִ֔/י אַשְׁלִ֖יךְ מֵ/עַ֣ל פָּנָ֑/י וְ/אֶתְּנֶ֛/נּוּ
    לְ/מָשָׁ֥ל וְ/לִ/שְׁנִינָ֖ה בְּ/כָל הָ/עַמִּֽים־־׃
translation:
  text: then I will uproot them from my land that I have given them, and this house
    that I have consecrated for my name I will cast out of my sight, and I will make
    it a proverb and a byword among all peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''this temple.'' Hebrew: ''this house.'''
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from before my face.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a proverb and an object of scorn' / 'a taunt and a byword.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתַשְׁתִּים
  chosen: then I will uproot them
  alternatives:
  - and I will pluck them up
  - and I will tear them away
  lexicon: HALOT
  rationale: נתשׁ commonly conveys pulling up or uprooting, especially from land.
    'Uproot' preserves the agricultural and covenant-land imagery better than a flatter
    'remove.' The prefixed conjunction is rendered contextually as 'then' in the conditional
    sequence from the previous verse.
- source_word: מֵעַל אַדְמָתִי
  chosen: from my land
  alternatives:
  - from upon my ground
  - from my soil
  lexicon: HALOT
  rationale: אַדָמָה can mean ground/soil/land; here in covenantal-national context
    'land' is the most natural English. 'My' reflects divine ownership and covenant
    grant.
- source_word: אֲשֶׁר נָתַתִּי לָהֶם
  chosen: that I have given them
  alternatives:
  - which I gave to them
  lexicon: HALOT
  rationale: Straightforward relative clause. Present perfect English fits the continuing
    relevance of the prior gift.
- source_word: הַבַּיִת הַזֶּה
  chosen: this house
  alternatives:
  - this temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In this context it refers to the temple,
    but 'house' preserves the Hebrew wording and common biblical idiom for the house
    of God.
- source_word: הִקְדַּשְׁתִּי לִשְׁמִי
  chosen: I have consecrated for my name
  alternatives:
  - I have sanctified for my name
  - I have made holy for my name
  lexicon: HALOT
  rationale: קדשׁ in the hiphil here means to set apart as holy. 'Consecrated' is
    readable modern English and preserves cultic force. 'For my name' is retained
    literally to preserve the theological concept of divine name-presence rather than
    paraphrasing to 'for myself'.
- source_word: אַשְׁלִיךְ מֵעַל פָּנַי
  chosen: I will cast out of my sight
  alternatives:
  - I will throw away from before me
  - I will cast from before my face
  lexicon: HALOT
  rationale: The idiom 'from before my face' means from God's presence/sight. 'Cast
    out of my sight' is idiomatic English that preserves the rejection motif without
    wooden literalism.
- source_word: וְאֶתְּנֶנּוּ
  chosen: and I will make it
  alternatives:
  - and I will give it over as
  lexicon: HALOT
  rationale: נתן plus predicate nouns here means to appoint or make something into
    a certain status. 'Make it' is the clearest English equivalent.
- source_word: לְמָשָׁל
  chosen: a proverb
  alternatives:
  - a parable
  - a taunt
  lexicon: HALOT
  rationale: מָשָׁל can denote proverb, byword, taunt, or illustrative saying. In
    this collocation with שְׁנִינָה, 'proverb' works well as the first term while
    allowing the second term to carry the reproach nuance.
- source_word: לִשְׁנִינָה
  chosen: a byword
  alternatives:
  - an object of scorn
  - a taunt
  lexicon: HALOT
  rationale: שְׁנִינָה denotes a derisive saying or object of mockery. 'Byword' is
    a standard concise rendering in this collocation and communicates public disgrace.
- source_word: בְּכָל הָעַמִּים
  chosen: among all peoples
  alternatives:
  - among all the peoples
  - among all nations
  lexicon: HALOT
  rationale: עַמִּים is plural 'peoples.' 'Among all peoples' is natural English and
    preserves the plural better than the more political 'nations.'
