theological_decisions:
- issue: Rendering of temple terminology
  chosen_reading: this house
  alternative_readings:
  - this temple
  rationale: The Hebrew says 'house,' a common designation for the temple. Retaining
    'house' preserves the source wording and biblical theology of God's house while
    remaining understandable in context.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of divine rejection idiom
  chosen_reading: cast out of my sight
  alternative_readings:
  - cast from before my face
  - cast out of my presence
  rationale: The Hebrew idiom literally refers to God's face/presence. 'Out of my
    sight' communicates divine rejection in clear English without overinterpreting
    the metaphysics of presence.
  doctrine_reference: Translation philosophy §6
