id: 2CH.7.12
reference: 2 Chronicles 7:12
source:
  edition: WLC
  text: וַ/יֵּרָ֧א יְהוָ֛ה אֶל שְׁלֹמֹ֖ה בַּ/לָּ֑יְלָה וַ/יֹּ֣אמֶר ל֗/וֹ שָׁמַ֨עְתִּי֙ אֶת תְּפִלָּתֶ֔/ךָ וּ/בָחַ֜רְתִּי בַּ/מָּק֥וֹם הַ/זֶּ֛ה לִ֖/י לְ/בֵ֥ית זָֽבַח־־׃
translation:
  text: Then Yahweh appeared to Solomon by night and said to him, “I have heard your prayer and have chosen this place for myself as a house of sacrifice.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “at night.”
    reason: lexical_alternative
  - marker: b
    text: Or “for a house of sacrifice”; that is, a place set apart for sacrificial worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָא
  chosen: appeared
  alternatives:
  - was seen
  - revealed himself
  lexicon: HALOT
  rationale: Niphal of ראה here denotes visible manifestation to Solomon. 'Appeared' is standard, natural English and preserves the theophanic sense without overinterpreting the mode of appearance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּלָּיְלָה
  chosen: in the night
  alternatives:
  - by night
  - at night
  lexicon: HALOT
  rationale: The prefixed preposition with 'night' is most directly rendered 'in the night.' This is slightly more formal than 'at night' and fits the narrative setting.
- source_word: שָׁמַעְתִּי
  chosen: I have heard
  alternatives:
  - I heard
  - I have listened to
  lexicon: HALOT
  rationale: The perfect here reports a completed action with present relevance in direct speech. 'I have heard' communicates that God has received Solomon's prayer and now responds to it.
- source_word: תְּפִלָּתֶךָ
  chosen: your prayer
  alternatives:
  - your plea
  lexicon: HALOT
  rationale: The noun denotes prayer in a broad sense; 'your prayer' is the most straightforward rendering in this context.
- source_word: וּבָחַרְתִּי
  chosen: and have chosen
  alternatives:
  - and I chose
  - and have selected
  lexicon: HALOT
  rationale: The perfect parallels 'I have heard' and expresses a completed divine decision with ongoing significance. 'Chosen' preserves covenantal/theological resonance better than 'selected.'
- source_word: בַּמָּקוֹם הַזֶּה
  chosen: this place
  alternatives:
  - the place הזה
  - this site
  lexicon: HALOT
  rationale: Refers to the temple location just dedicated. 'This place' is idiomatic and sufficiently specific in context.
- source_word: לִי
  chosen: for myself
  alternatives:
  - for me
  - as mine
  lexicon: HALOT
  rationale: The dative pronoun marks divine possession/purpose. 'For myself' brings out the personal force more clearly than the flatter 'for me' in English.
- source_word: לְבֵית זָבַח
  chosen: as a house of sacrifice
  alternatives:
  - for a house of sacrifice
  - as a sacrificial house
  - as a temple for sacrifice
  lexicon: HALOT
  rationale: Literally 'for a house of sacrifice.' The phrase identifies the temple as a place designated for sacrificial worship. 'House of sacrifice' stays close to the Hebrew while remaining intelligible; 'temple' would be interpretive and less formally transparent.
