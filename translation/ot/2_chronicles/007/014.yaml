theological_decisions:
- issue: Conditional structure of divine response
  chosen_reading: Render the opening verbs as a protasis completed by 'then I will
    hear from heaven' in the apodosis.
  alternative_readings:
  - Coordinate all clauses with simple 'and' throughout
  rationale: Although Hebrew uses conjunctions throughout, the syntax and discourse
    clearly present a condition-result sequence. Adding 'then' in English clarifies
    the logic without importing new theology.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English.'
- issue: Covenantal idiom of divine name
  chosen_reading: 'Translate the idiom as belonging/identification: ''who are called
    by my name.'''
  alternative_readings:
  - 'More literal spatial idiom: ''upon whom my name is called'''
  rationale: The phrase signals covenant ownership and identity, not merely pronunciation
    of the divine name. The chosen rendering preserves that theological force in idiomatic
    English.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English.'
