id: 2CH.7.14
reference: 2 Chronicles 7:14
source:
  edition: WLC
  text: וְ/יִכָּנְע֨וּ עַמִּ֜/י אֲשֶׁ֧ר נִֽקְרָא שְׁמִ֣/י עֲלֵי/הֶ֗ם וְ/יִֽתְפַּֽלְלוּ֙
    וִֽ/יבַקְשׁ֣וּ פָנַ֔/י וְ/יָשֻׁ֖בוּ מִ/דַּרְכֵי/הֶ֣ם הָ/רָעִ֑ים וַ/אֲנִי֙ אֶשְׁמַ֣ע
    מִן הַ/שָּׁמַ֔יִם וְ/אֶסְלַח֙ לְ/חַטָּאתָ֔/ם וְ/אֶרְפָּ֖א אֶת אַרְצָֽ/ם־־־׃
translation:
  text: and my people, who are called by my name, humble themselves, and pray and
    seek my face, and turn from their evil ways, then I will hear from heaven, and
    I will forgive their sin and heal their land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'upon whom my name is called,' a Hebrew idiom expressing belonging
      to God or bearing his name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִכָּנְעוּ
  chosen: humble themselves
  alternatives:
  - are humbled
  - submit themselves
  lexicon: HALOT
  rationale: Niphal of כנע here is reflexive/intransitive in a conditional sequence
    of responses expected from the people. 'Humble themselves' is idiomatic modern
    English and preserves the volitional sense better than the more passive 'are humbled.'
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward covenantal designation; singular collective in Hebrew
    is naturally rendered as the English collective 'my people.'
- source_word: אֲשֶׁר נִקְרָא שְׁמִי עֲלֵיהֶם
  chosen: who are called by my name
  alternatives:
  - over whom my name is called
  - upon whom my name is called
  lexicon: HALOT
  rationale: This Hebrew idiom denotes belonging/identification with the speaker.
    'Who are called by my name' is the established and natural English equivalent,
    while the more literal alternatives are preserved in a footnote-worthy lexical
    note.
- source_word: וְיִתְפַּלְלוּ
  chosen: pray
  alternatives:
  - pray to me
  lexicon: HALOT
  rationale: The hitpael of פלל commonly means 'pray.' The object is implicit from
    context, so the simple English verb is sufficient without adding words not present
    in the Hebrew.
- source_word: וִיבַקְשׁוּ פָנַי
  chosen: seek my face
  alternatives:
  - seek me
  - seek my favor
  lexicon: HALOT
  rationale: The idiom literally refers to seeking God's face/presence. Retaining
    'seek my face' preserves the metaphor and theological texture better than flattening
    it to 'seek me,' while remaining understandable in English.
- source_word: וְיָשֻׁבוּ מִדַּרְכֵיהֶם הָרָעִים
  chosen: turn from their evil ways
  alternatives:
  - return from their evil ways
  - turn back from their evil ways
  lexicon: HALOT
  rationale: שׁוב often carries repentance/turning language in covenant contexts.
    'Turn from' is idiomatic and captures moral reversal. 'Ways' preserves the plural
    noun and habitual-conduct sense.
- source_word: וַאֲנִי אֶשְׁמַע מִן הַשָּׁמַיִם
  chosen: then I will hear from heaven
  alternatives:
  - and I, I will hear from heaven
  - I will hear in heaven
  lexicon: HALOT
  rationale: 'The conjunction here marks the apodosis after the chain of conditions;
    English ''then'' makes the conditional structure explicit and natural. ''From
    heaven'' reflects the Hebrew preposition מן in context: God hears while located
    in heaven, from the heavenly realm.'
- source_word: וְאֶסְלַח לְחַטָּאתָם
  chosen: forgive their sin
  alternatives:
  - forgive their sins
  - forgive their offense
  lexicon: HALOT
  rationale: The Hebrew noun is singular, functioning collectively. English often
    uses singular collective 'sin' for covenant guilt; this preserves the Hebrew number
    while sounding natural.
- source_word: וְאֶרְפָּא אֶת אַרְצָם
  chosen: heal their land
  alternatives:
  - restore their land
  - make their land whole
  lexicon: HALOT
  rationale: רפא literally means 'heal.' Retaining 'heal' preserves the metaphor of
    the land as afflicted and God's restorative action without reducing it to a more
    interpretive 'restore.'
