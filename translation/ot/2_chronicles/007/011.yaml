id: 2CH.7.11
reference: 2 Chronicles 7:11
source:
  edition: WLC
  text: וַ/יְכַ֧ל שְׁלֹמֹ֛ה אֶת בֵּ֥ית יְהוָ֖ה וְ/אֶת בֵּ֣ית הַ/מֶּ֑לֶךְ וְ/אֵ֨ת כָּל
    הַ/בָּ֜א עַל לֵ֣ב שְׁלֹמֹ֗ה לַ/עֲשׂ֧וֹת בְּ/בֵית יְהוָ֛ה וּ/בְ/בֵית֖/וֹ הִצְלִֽיחַ־־־־־׃פ
translation:
  text: So Solomon finished the house of the LORD and the house of the king, and everything
    that came upon Solomon’s heart to do in the house of the LORD and in his own house
    he successfully accomplished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the royal palace' for 'the house of the king.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''everything that came upon Solomon’s heart,'' meaning what
      he intended or desired to do.'
    reason: cultural_note
  - marker: c
    text: Or 'he prospered' / 'he succeeded.' The Hebrew verb can denote succeeding
      or causing something to succeed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַ֧ל
  chosen: finished
  alternatives:
  - completed
  lexicon: HALOT
  rationale: כלה in the waw-consecutive narrative form denotes bringing something
    to completion. 'Finished' is natural modern English and fits the construction
    with the direct objects that follow.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'House' preserves the Hebrew wording; 'temple'
    is interpretive and possible, but the source text uses בית. Per doctrine, יְהוָה
    is rendered 'the LORD.'
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the house of the king
  alternatives:
  - the royal palace
  - the king's house
  lexicon: HALOT
  rationale: Literally 'the house of the king.' This likely refers to the palace complex,
    but the Hebrew repeats 'house,' so the translation preserves that repetition rather
    than substituting the more interpretive 'palace' in the main text.
- source_word: כָּל הַבָּא עַל לֵב שְׁלֹמֹה
  chosen: everything that came upon Solomon’s heart
  alternatives:
  - everything that came into Solomon's mind
  - all that Solomon had in mind
  - everything that occurred to Solomon
  lexicon: HALOT
  rationale: The idiom על לב expresses what arises in one's heart/mind as intention
    or desire. 'Came upon Solomon’s heart' keeps the Hebrew imagery while remaining
    understandable; alternatives flatten the idiom more dynamically.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to make
  - to carry out
  lexicon: HALOT
  rationale: עשה is broad and here governs Solomon's intended works/projects. 'To
    do' is the most direct rendering; the surrounding English clarifies that these
    are undertakings.
- source_word: וּבְבֵיתוֹ
  chosen: in his own house
  alternatives:
  - in his house
  lexicon: HALOT
  rationale: The pronominal suffix refers back to Solomon. 'His own house' makes the
    referent explicit and distinguishes it from 'the house of the king' already mentioned,
    while still reflecting the Hebrew.
- source_word: הִצְלִיחַ
  chosen: he successfully accomplished
  alternatives:
  - he prospered
  - he succeeded
  - he brought to success
  lexicon: HALOT
  rationale: הצליח in Hiphil commonly means to cause to succeed or to succeed/prosper.
    In this context of building projects, 'he successfully accomplished' best conveys
    successful execution of the intended works, avoiding the potentially misleading
    broader English 'prospered'.
