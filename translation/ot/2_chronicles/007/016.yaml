id: 2CH.7.16
reference: 2 Chronicles 7:16
source:
  edition: WLC
  text: וְ/עַתָּ֗ה בָּחַ֤רְתִּי וְ/הִקְדַּ֨שְׁתִּי֙ אֶת הַ/בַּ֣יִת הַ/זֶּ֔ה לִ/הְיוֹת
    שְׁמִ֥/י שָׁ֖ם עַד עוֹלָ֑ם וְ/הָי֨וּ עֵינַ֧/י וְ/לִבִּ֛/י שָׁ֖ם כָּל הַ/יָּמִֽים־־־־׃
translation:
  text: And now I have chosen and consecrated this house so that my name may be there
    forever, and my eyes and my heart will be there all the days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sanctified.' The Hebrew verb means to set apart as holy.
    reason: lexical_alternative
  - marker: b
    text: '''This house'' refers to the temple.'
    reason: cultural_note
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: The conjunction plus temporal adverb marks a transition in the divine
    speech. 'And now' preserves the discourse flow better than a bare 'Now.'
- source_word: בָּחַרְתִּי
  chosen: I have chosen
  alternatives:
  - I chose
  lexicon: HALOT
  rationale: The Hebrew perfect states a completed divine act with present relevance.
    English present perfect communicates that force naturally in context.
- source_word: וְהִקְדַּשְׁתִּי
  chosen: and consecrated
  alternatives:
  - and sanctified
  - and made holy
  lexicon: HALOT
  rationale: קדשׁ in the Hiphil here means to set apart as holy. 'Consecrated' is
    clear modern English and fits temple-dedication context without sounding overly
    technical.
- source_word: הַבַּיִת הַזֶּה
  chosen: this house
  alternatives:
  - this temple
  lexicon: HALOT
  rationale: The Hebrew literally says 'this house.' While it refers to the temple,
    retaining 'house' preserves the source wording and common biblical idiom for God's
    temple.
- source_word: לִהְיוֹת שְׁמִי שָׁם
  chosen: so that my name may be there
  alternatives:
  - for my name to be there
  - that my name might be there
  lexicon: HALOT
  rationale: This infinitival construction expresses purpose/result. 'So that my name
    may be there' is idiomatic and preserves the theological idea of God's name dwelling
    there, not merely a label attached to the building.
- source_word: שְׁמִי
  chosen: my name
  lexicon: HALOT
  rationale: In temple theology, 'name' signifies God's self-revelation and covenantal
    presence as represented at the temple. The translation keeps the concrete term
    rather than interpreting it away.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - for all time
  lexicon: HALOT
  rationale: The phrase commonly denotes enduring duration. 'Forever' is the most
    natural concise rendering in English.
- source_word: וְהָיוּ עֵינַי וְלִבִּי שָׁם
  chosen: and my eyes and my heart will be there
  alternatives:
  - and my eyes and my heart shall be there
  lexicon: HALOT
  rationale: The plural verb with the compound subject is rendered straightforwardly.
    'Eyes' conveys attentive regard; 'heart' conveys divine concern/commitment. These
    metaphors should be preserved rather than paraphrased.
- source_word: לִבִּי
  chosen: my heart
  alternatives:
  - my mind
  lexicon: HALOT
  rationale: לב can include thought and will, but 'heart' best preserves the Hebrew
    anthropomorphic expression and its affective-covenantal force.
- source_word: כָּל הַיָּמִים
  chosen: all the days
  alternatives:
  - always
  - continually
  lexicon: HALOT
  rationale: The Hebrew is literally 'all the days.' This preserves the idiom and
    echoes biblical style while remaining understandable in modern English.
