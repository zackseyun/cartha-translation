theological_decisions:
- issue: Anthropomorphic language for God ('my eyes and my heart')
  chosen_reading: Preserve the anthropomorphic imagery literally
  alternative_readings:
  - Paraphrase as 'my attention and care will be there'
  rationale: The Hebrew intentionally uses embodied language to express God's attentive
    presence and covenantal commitment. Preserving the imagery maintains the text's
    theological texture without forcing a philosophical explanation.
  doctrine_reference: Translation philosophy §3, §6
- issue: Temple theology in 'my name may be there'
  chosen_reading: Retain 'my name' rather than interpret as full personal presence
    or mere reputation
  alternative_readings:
  - '''I will be there'''
  - '''my presence will be there'''
  rationale: The phrase reflects established Old Testament temple language in which
    God's name dwells there covenantally. Rendering it more explicitly would import
    interpretation beyond the wording; rendering it more weakly as reputation would
    flatten the theology.
  doctrine_reference: Translation philosophy §1, §3
