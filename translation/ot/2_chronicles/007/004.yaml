id: 2CH.7.4
reference: 2 Chronicles 7:4
source:
  edition: WLC
  text: וְ/הַ/מֶּ֖לֶךְ וְ/כָל הָ/עָ֑ם זֹבְחִ֥ים זֶ֖בַח לִ/פְנֵ֥י יְהוָֽה־׃ס
translation:
  text: Then the king and all the people offered sacrifices before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'were sacrificing a sacrifice'—a cognate expression meaning they were offering sacrificial offerings.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמֶּלֶךְ
  chosen: Then the king
  alternatives:
  - And the king
  lexicon: HALOT
  rationale: וְ here continues the narrative; in English narrative style, 'Then' can naturally convey sequential continuation. 'The king' is the straightforward rendering of הַמֶּלֶךְ.
- source_word: וְכָל הָעָם
  chosen: and all the people
  alternatives:
  - and all the assembly
  lexicon: HALOT
  rationale: עָם commonly means 'people.' In this context it refers broadly to the gathered populace participating with the king, so 'all the people' is the most natural and direct rendering.
- source_word: זֹבְחִים
  chosen: were sacrificing
  alternatives:
  - sacrificed
  - were offering sacrifices
  lexicon: HALOT
  rationale: The participle functions predicatively after the subject, describing ongoing action. 'Were sacrificing' preserves the verbal aspect more transparently than a simple past, while remaining natural English.
- source_word: זֶבַח
  chosen: sacrifices
  alternatives:
  - a sacrifice
  - sacrificial offerings
  lexicon: HALOT
  rationale: Although singular in Hebrew, זֶבַח after זבח forms a cognate accusative ('sacrifice a sacrifice'). English normally pluralizes or smooths this construction; 'sacrificing sacrifices' preserves the Hebrew emphasis better than fully idiomatic smoothing, while still being understandable.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: לִפְנֵי regularly means 'before' or 'in the presence of.' 'Before' is concise and idiomatic here, retaining the cultic sense of action done in God's presence.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
