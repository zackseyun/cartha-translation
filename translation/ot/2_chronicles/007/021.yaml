id: 2CH.7.21
reference: 2 Chronicles 7:21
source:
  edition: WLC
  text: וְ/הַ/בַּ֤יִת הַ/זֶּה֙ אֲשֶׁ֣ר הָיָ֣ה עֶלְי֔וֹן לְ/כָל עֹבֵ֥ר עָלָ֖י/ו יִשֹּׁ֑ם
    וְ/אָמַ֗ר בַּ/מֶּ֨ה עָשָׂ֤ה יְהוָה֙ כָּ֔כָה לָ/אָ֥רֶץ הַ/זֹּ֖את וְ/לַ/בַּ֥יִת
    הַ/זֶּֽה־׃
translation:
  text: And this house, which was exalted, will become an object of horror to everyone
    passing by it, and they will say, 'Why has the LORD done thus to this land and
    to this house?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'will be desolate' or 'will be appalling.' The Hebrew verb can emphasize
      devastation and the horror it provokes.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house'; here referring to the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַבַּיִת הַזֶּה
  chosen: And this house
  alternatives:
  - And this temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In this context it refers to the temple,
    but 'house' preserves the Hebrew wording and its covenantal resonance ('house'
    of the LORD) without over-paraphrasing.
- source_word: אֲשֶׁר הָיָה עֶלְיוֹן
  chosen: which was exalted
  alternatives:
  - which was high
  - which was supreme
  - though it was exalted
  lexicon: HALOT
  rationale: עֶלְיוֹן means 'high, exalted.' Here it describes the former prominence
    of the house. 'Exalted' captures both elevated status and grandeur better than
    the merely spatial 'high.'
- source_word: לְכָל עֹבֵר עָלָיו
  chosen: to everyone passing by it
  alternatives:
  - for everyone who passes by it
  - to all who pass by it
  lexicon: HALOT
  rationale: The phrase is idiomatic for passersby observing the ruined site. 'Everyone
    passing by it' is natural modern English while staying close to the Hebrew participial
    construction.
- source_word: יִשֹּׁם
  chosen: will become an object of horror
  alternatives:
  - will be appalling
  - will be desolate
  - will be a horror
  lexicon: HALOT
  rationale: The verb from שמם conveys being appalled/desolated and often evokes astonishment
    at devastation. 'Become an object of horror' brings out the reaction of onlookers
    implied by the context better than a flat 'be desolate.'
- source_word: וְאָמַר
  chosen: and they will say
  alternatives:
  - and he will say
  lexicon: HALOT
  rationale: 'Although morphologically singular, the verb follows the distributive
    singular sense of ''everyone passing by it.'' English naturally renders this with
    plural reference: ''they will say.'''
- source_word: בַּמֶּה
  chosen: Why
  alternatives:
  - For what reason
  - On account of what
  lexicon: HALOT
  rationale: Literally 'for what?' or 'because of what?' In idiomatic English within
    a question about divine judgment, 'Why' best conveys the sense.
- source_word: עָשָׂה יְהוָה
  chosen: has the LORD done
  alternatives:
  - did the LORD do
  lexicon: HALOT
  rationale: The perfect can be rendered as English present perfect in a question
    about a visible state resulting from prior action. 'The LORD' follows the project's
    required rendering of YHWH.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD.'
- source_word: כָּכָה
  chosen: thus
  alternatives:
  - like this
  - in this way
  lexicon: HALOT
  rationale: '''Thus'' is concise and suitably solemn in this judgment context, while
    accurately reflecting the demonstrative adverb.'
- source_word: לָאָרֶץ הַזֹּאת וְלַבַּיִת הַזֶּה
  chosen: to this land and to this house
  alternatives:
  - to this country and to this temple
  lexicon: HALOT
  rationale: '''Land'' is the standard rendering of אֶרֶץ and preserves covenantal
    overtones. Repeating ''house'' maintains lexical consistency with the opening
    of the verse.'
