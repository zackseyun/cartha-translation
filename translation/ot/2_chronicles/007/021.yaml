theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering of
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of the temple's fate in יִשֹּׁם
  chosen_reading: will become an object of horror
  alternative_readings:
  - will be desolate
  - will be appalling
  rationale: The context emphasizes public shock at divine judgment on the temple.
    This rendering preserves the theological force of the temple becoming a sign of
    judgment without narrowing the term to physical ruin alone.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
