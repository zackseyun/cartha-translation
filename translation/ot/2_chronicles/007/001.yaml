id: 2CH.7.1
reference: 2 Chronicles 7:1
source:
  edition: WLC
  text: וּ/כְ/כַלּ֤וֹת שְׁלֹמֹה֙ לְ/הִתְפַּלֵּ֔ל וְ/הָ/אֵ֗שׁ יָֽרְדָה֙ מֵֽ/הַ/שָּׁמַ֔יִם וַ/תֹּ֥אכַל הָ/עֹלָ֖ה וְ/הַ/זְּבָחִ֑ים וּ/כְב֥וֹד יְהוָ֖ה מָלֵ֥א אֶת הַ/בָּֽיִת־׃
translation:
  text: And when Solomon finished praying, the fire came down from heaven and consumed the burnt offering and the sacrifices, and the glory of Yahweh filled the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descended from heaven.'
    reason: lexical_alternative
  - marker: b
    text: That is, the temple; Hebrew 'the house.'
    reason: cultural_note
lexical_decisions:
- source_word: וּכְכַלּוֹת
  chosen: And when ... finished
  alternatives:
  - Now when ... finished
  - as soon as ... finished
  lexicon: HALOT
  rationale: The prefixed conjunction plus temporal infinitive construct of כלה introduces a temporal clause. 'And when' preserves the narrative flow and timing without over-specifying immediacy.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Standard English transliteration of the proper name.
- source_word: לְהִתְפַּלֵּל
  chosen: praying
  alternatives:
  - to pray
  lexicon: HALOT
  rationale: With כְּכַלּוֹת, the infinitive is naturally rendered in English as 'finished praying.' This is smoother and idiomatic while preserving the verbal sense.
- source_word: וְהָאֵשׁ
  chosen: the fire
  alternatives:
  - fire
  lexicon: HALOT
  rationale: The article is present in Hebrew. 'The fire' best reflects a specific, divinely sent fire in the narrative context.
- source_word: יָרְדָה מֵהַשָּׁמַיִם
  chosen: came down from heaven
  alternatives:
  - descended from heaven
  - came down from the heavens
  lexicon: HALOT
  rationale: '''Came down from heaven'' is natural modern English and preserves the vertical movement and divine source. Singular ''heaven'' is standard English for Hebrew plural שׁמים in this idiom.'
- source_word: וַתֹּאכַל
  chosen: consumed
  alternatives:
  - ate up
  - devoured
  lexicon: HALOT
  rationale: Although the verb is literally 'ate,' with fire as subject English idiom prefers 'consumed.' This preserves the sacrificial context without awkwardness.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: עלה in sacrificial context conventionally denotes the burnt offering. This is the established and precise cultic term in English.
- source_word: וְהַזְּבָחִים
  chosen: and the sacrifices
  alternatives:
  - and the sacrificial offerings
  lexicon: HALOT
  rationale: זבחים is a broad sacrificial term distinct from the specific burnt offering just mentioned. 'Sacrifices' preserves that distinction clearly.
- source_word: וּכְבוֹד יְהוָה
  chosen: and the glory of the LORD
  alternatives:
  - and the LORD's glory
  lexicon: HALOT
  rationale: כבוד here denotes the manifest divine glory. Per doctrine, יְהוָה is rendered 'the LORD.' The fuller phrase preserves solemnity and recognizability.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מָלֵא אֶת־הַבָּיִת
  chosen: filled the house
  alternatives:
  - filled the temple
  lexicon: HALOT
  rationale: בית literally means 'house.' In context it refers to the temple, but 'house' preserves the Hebrew wording and the established expression 'the house of the LORD' in Chronicles. The object marker אֶת is not separately represented in English.
