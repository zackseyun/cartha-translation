id: 2CH.7.7
reference: 2 Chronicles 7:7
source:
  edition: WLC
  text: וַ/יְקַדֵּ֣שׁ שְׁלֹמֹ֗ה אֶת תּ֤וֹךְ הֶֽ/חָצֵר֙ אֲשֶׁר֙ לִ/פְנֵ֣י בֵית יְהוָ֔ה כִּֽי עָ֤שָׂה שָׁם֙ הָֽ/עֹל֔וֹת וְ/אֵ֖ת חֶלְבֵ֣י הַ/שְּׁלָמִ֑ים כִּֽי מִזְבַּ֤ח הַ/נְּחֹ֨שֶׁת֙ אֲשֶׁ֣ר עָשָׂ֣ה שְׁלֹמֹ֔ה לֹ֣א יָכ֗וֹל לְ/הָכִ֛יל אֶת הָ/עֹלָ֥ה וְ/אֶת הַ/מִּנְחָ֖ה וְ/אֶת הַ/חֲלָבִֽים־־־־־־־׃
translation:
  text: Then Solomon consecrated the middle of the court that was before the house of Yahweh, because there he offered the burnt offerings and the fat portions of the peace offerings, because the bronze altar that Solomon had made could not hold the burnt offering, the grain offering, and the fat portions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the midst of the court.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'did/made' in sacrificial idiom, that is, 'offered.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the fat of the fellowship offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְקַדֵּשׁ
  chosen: consecrated
  alternatives:
  - sanctified
  - made holy
  - set apart
  lexicon: HALOT
  rationale: קדשׁ in the Hiphil here denotes setting a space apart for sacred use. 'Consecrated' is natural modern English and preserves the cultic sense better than the more archaic 'sanctified.'
- source_word: תּוֹךְ הֶחָצֵר
  chosen: the middle of the court
  alternatives:
  - the midst of the court
  - the interior of the court
  lexicon: HALOT
  rationale: תּוֹךְ commonly means 'midst, middle.' The sense is not merely the court in general but its central area, likely used additionally for sacrificial activity because the altar was insufficient.
- source_word: לִפְנֵי בֵית יְהוָה
  chosen: before the house of the LORD
  alternatives:
  - in front of the house of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is spatial here. 'House of the LORD' is the standard rendering for the temple building, and 'the LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עָשָׂה שָׁם
  chosen: there he offered
  alternatives:
  - there he made
  - there he performed
  lexicon: HALOT
  rationale: Although עשה is literally 'did/made,' in sacrificial contexts it idiomatically means to offer or perform sacrifices. 'Offered' communicates the cultic action clearly in English.
- source_word: הָעֹלוֹת / הָעֹלָה
  chosen: the burnt offerings / the burnt offering
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: עלה in sacrificial usage is the standard 'burnt offering.' The first occurrence is plural, referring to the offerings made there; the second is singular as a collective/category item in the list of what the altar could not contain, and is retained as singular to reflect the Hebrew form.
- source_word: חֶלְבֵי הַשְּׁלָמִים
  chosen: the fat portions of the peace offerings
  alternatives:
  - the fat of the fellowship offerings
  - the choicest parts of the peace offerings
  lexicon: HALOT
  rationale: חלב in sacrificial law refers specifically to the fat portions reserved for offering, not metaphorical richness. שְׁלָמִים is traditionally 'peace offerings'; this remains the clearest established cultic term in English.
- source_word: מִזְבַּח הַנְּחֹשֶׁת
  chosen: the bronze altar
  alternatives:
  - the copper altar
  - the brazen altar
  lexicon: HALOT
  rationale: נחשת in temple-furnishing contexts is best rendered 'bronze' in contemporary English; 'brazen' is archaic and 'copper' is less idiomatic here.
- source_word: לֹא יָכוֹל לְהָכִיל
  chosen: could not hold
  alternatives:
  - could not contain
  - was not able to accommodate
  lexicon: HALOT
  rationale: הכיל means contain/hold. 'Could not hold' is concise, idiomatic, and conveys insufficient capacity.
- source_word: הַמִּנְחָה
  chosen: the grain offering
  alternatives:
  - the tribute offering
  - the gift offering
  lexicon: HALOT
  rationale: In sacrificial context, מִנְחָה is the technical term for the grain offering. Although the root can denote gift/tribute more broadly, the cultic sense is required here.
- source_word: הַחֲלָבִים
  chosen: the fat portions
  alternatives:
  - the fats
  lexicon: HALOT
  rationale: The plural refers to sacrificial fat pieces. 'Fat portions' is more natural and precise in English than the wooden 'fats.'
