id: 2CH.7.10
reference: 2 Chronicles 7:10
source:
  edition: WLC
  text: וּ/בְ/י֨וֹם עֶשְׂרִ֤ים וּ/שְׁלֹשָׁה֙ לַ/חֹ֣דֶשׁ הַ/שְּׁבִיעִ֔י שִׁלַּ֥ח אֶת
    הָ/עָ֖ם לְ/אָהֳלֵי/הֶ֑ם שְׂמֵחִים֙ וְ/ט֣וֹבֵי לֵ֔ב עַל הַ/טּוֹבָ֗ה אֲשֶׁ֨ר עָשָׂ֤ה
    יְהוָה֙ לְ/דָוִ֣יד וְ/לִ/שְׁלֹמֹ֔ה וּ/לְ/יִשְׂרָאֵ֖ל עַמּֽ/וֹ־־׃
translation:
  text: And on the twenty-third day of the seventh month he sent the people to their
    tents, rejoicing and glad of heart because of the goodness that the LORD had shown
    to David and to Solomon and to Israel his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to their homes'; literally 'to their tents.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'had done'; the translation 'had shown' expresses the sense of
      beneficent action in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְיוֹם עֶשְׂרִים וּשְׁלֹשָׁה לַחֹדֶשׁ הַשְּׁבִיעִי
  chosen: And on the twenty-third day of the seventh month
  alternatives:
  - And on the twenty-third day of the month, the seventh
  - On the twenty-third day of the seventh month
  lexicon: HALOT
  rationale: Rendered as standard English date expression. The prefixed conjunction
    and preposition are preserved with 'And on,' maintaining narrative continuity.
- source_word: שִׁלַּח
  chosen: he sent
  alternatives:
  - he dismissed
  - he sent away
  lexicon: HALOT
  rationale: The piel of שלח here denotes sending the assembled people away to return
    home. 'He sent' is sufficiently literal while remaining natural; the destination
    phrase clarifies the sense.
- source_word: לְאָהֳלֵיהֶם
  chosen: to their tents
  alternatives:
  - to their homes
  lexicon: HALOT
  rationale: Literally 'to their tents.' Although idiomatically it can mean returning
    home, the concrete image is retained in the main text for transparency to the
    Hebrew; the idiomatic sense is not necessary to import into the translation.
- source_word: שְׂמֵחִים
  chosen: rejoicing
  alternatives:
  - joyful
  - glad
  lexicon: HALOT
  rationale: A participial/adjectival form describing the people's state. 'Rejoicing'
    conveys active celebratory joy and pairs well with the following expression.
- source_word: וְטוֹבֵי לֵב
  chosen: and glad of heart
  alternatives:
  - and good of heart
  - and merry in heart
  - and with joyful hearts
  lexicon: HALOT
  rationale: The Hebrew idiom denotes inward gladness or cheer. 'Glad of heart' preserves
    the heart-language while sounding natural in English.
- source_word: עַל הַטּוֹבָה
  chosen: because of the goodness
  alternatives:
  - for the goodness
  - because of the good things
  - for the good
  lexicon: HALOT
  rationale: The phrase points to the beneficent good that the LORD had done. 'Because
    of the goodness' captures the abstract singular noun while remaining idiomatic.
- source_word: עָשָׂה
  chosen: had shown
  alternatives:
  - had done
  - had worked
  lexicon: HALOT
  rationale: Although the verb is literally 'had done,' English commonly expresses
    benefaction with 'shown' when followed by 'goodness' toward persons. This is a
    context-driven optimal-equivalence rendering rather than a paraphrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: לְדָוִיד וְלִשְׁלֹמֹה וּלְיִשְׂרָאֵל עַמּוֹ
  chosen: to David and to Solomon and to Israel his people
  alternatives:
  - for David and for Solomon and for Israel his people
  lexicon: HALOT
  rationale: The repeated ל marks the beneficiaries of the LORD's goodness. 'To' works
    naturally with 'had shown.' 'Israel his people' preserves the appositional covenantal
    identification.
