id: 2CH.7.5
reference: 2 Chronicles 7:5
source:
  edition: WLC
  text: וַ/יִּזְבַּ֞ח הַ/מֶּ֣לֶךְ שְׁלֹמֹה֮ אֶת זֶ֣בַח הַ/בָּקָ֗ר עֶשְׂרִ֤ים וּ/שְׁנַ֨יִם֙
    אֶ֔לֶף וְ/צֹ֕אן מֵאָ֥ה וְ/עֶשְׂרִ֖ים אָ֑לֶף וַֽ/יַּחְנְכוּ֙ אֶת בֵּ֣ית הָֽ/אֱלֹהִ֔ים
    הַ/מֶּ֖לֶךְ וְ/כָל הָ/עָֽם־־־׃
translation:
  text: And King Solomon sacrificed twenty-two thousand cattle and one hundred twenty
    thousand sheep. So the king and all the people dedicated the house of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'small livestock,' since the Hebrew term can include sheep and goats
      collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבַּח
  chosen: sacrificed
  alternatives:
  - offered as sacrifices
  - slaughtered for sacrifice
  lexicon: HALOT
  rationale: The verb זבח in sacrificial context means to slaughter/offer as a sacrifice.
    'Sacrificed' is concise, natural English, and preserves the cultic sense better
    than the more generic 'offered.'
- source_word: זֶבַח הַבָּקָר
  chosen: cattle
  alternatives:
  - oxen
  - herd animals
  lexicon: HALOT
  rationale: The phrase literally refers to a sacrifice of cattle/herd animals. 'Cattle'
    is a clear modern collective term and fits the large numerical count better than
    'oxen,' which can sound narrower.
- source_word: עֶשְׂרִים וּשְׁנַיִם אֶלֶף
  chosen: twenty-two thousand
  alternatives:
  - twenty and two thousand
  lexicon: HALOT
  rationale: Standard modern English rendering of the Hebrew number.
- source_word: וְצֹאן
  chosen: sheep
  alternatives:
  - flocks
  - small livestock
  lexicon: HALOT
  rationale: צֹאן can denote small livestock collectively, including sheep and goats,
    but in English Bible style 'sheep' is the most natural shorthand in sacrificial
    tallies. The broader sense is worth preserving in a footnote.
- source_word: מֵאָה וְעֶשְׂרִים אָלֶף
  chosen: one hundred twenty thousand
  alternatives:
  - a hundred and twenty thousand
  lexicon: HALOT
  rationale: Standard modern English rendering of the Hebrew number.
- source_word: וַיַּחְנְכוּ
  chosen: dedicated
  alternatives:
  - inaugurated
  - consecrated
  lexicon: HALOT
  rationale: The verb חנך here refers to formally dedicating or inaugurating the temple.
    'Dedicated' is the standard and clearest English equivalent in this context.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: Literally 'house of God.' This preserves the Hebrew expression while
    remaining natural English. 'Temple' is interpretive but accurate; the more literal
    phrase better reflects the source.
- source_word: הַמֶּלֶךְ וְכָל הָעָם
  chosen: the king and all the people
  alternatives:
  - King Solomon and all the people
  lexicon: HALOT
  rationale: After Solomon has already been named, the Hebrew resumes with the title
    'the king' plus 'all the people.' Retaining 'the king' reflects the source text's
    discourse pattern.
