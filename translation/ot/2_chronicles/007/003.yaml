id: 2CH.7.3
reference: 2 Chronicles 7:3
source:
  edition: WLC
  text: וְ/כֹ֣ל בְּנֵ֣י יִשְׂרָאֵ֗ל רֹאִים֙ בְּ/רֶ֣דֶת הָ/אֵ֔שׁ וּ/כְב֥וֹד יְהוָ֖ה
    עַל הַ/בָּ֑יִת וַ/יִּכְרְעוּ֩ אַפַּ֨יִם אַ֤רְצָ/ה עַל הָ/רִֽצְפָה֙ וַ/יִּֽשְׁתַּֽחֲו֔וּ
    וְ/הוֹד֤וֹת לַ/יהוָה֙ כִּ֣י ט֔וֹב כִּ֥י לְ/עוֹלָ֖ם חַסְדּֽ/וֹ׀־־׃
translation:
  text: 'And all the sons of Israel, seeing the fire come down and the glory of the
    LORD upon the house, bowed down with their faces to the ground on the pavement,
    and they worshiped and gave thanks to the LORD: “For he is good, for his steadfast
    love endures forever.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the Israelites.' The Hebrew is literally 'all the sons of Israel,'
      a standard collective expression for the people of Israel.
    reason: lexical_alternative
  - marker: b
    text: '''The house'' refers to the temple.'
    reason: cultural_note
  - marker: c
    text: Or 'his mercy endures forever' or 'his covenant faithfulness endures forever.'
      The Hebrew חֶסֶד includes the sense of loyal, covenantal love.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כֹל בְּנֵי יִשְׂרָאֵל
  chosen: and all the sons of Israel
  alternatives:
  - and all the people of Israel
  - and all the Israelites
  lexicon: HALOT
  rationale: בְּנֵי is literally 'sons of.' In this national-collective expression
    it refers to the people of Israel as a whole, but per the gender-accurate policy
    the more literal 'sons of Israel' is retained rather than flattening to 'Israelites.'
- source_word: רֹאִים
  chosen: seeing
  alternatives:
  - when they saw
  lexicon: HALOT
  rationale: 'The participle gives a contemporaneous sense: as they were seeing/witnessing
    these events. ''Seeing'' preserves the Hebrew construction smoothly in English.'
- source_word: בְּ/רֶדֶת הָאֵשׁ
  chosen: the fire come down
  alternatives:
  - the descent of the fire
  - the fire descending
  lexicon: HALOT
  rationale: The infinitive construct with ב marks the circumstance observed. 'The
    fire come down' is idiomatic and preserves the downward motion from heaven implied
    by ירד in context.
- source_word: וּכְבוֹד יְהוָה
  chosen: and the glory of the LORD
  alternatives:
  - and the LORD's glory
  lexicon: HALOT
  rationale: כָּבוֹד here denotes the manifest divine glory/presence. YHWH is rendered
    'the LORD' per doctrine.
- source_word: עַל הַבָּיִת
  chosen: upon the house
  alternatives:
  - upon the temple
  - over the house
  lexicon: HALOT
  rationale: בַּיִת literally means 'house'; in this context it refers to the temple.
    'House' preserves the Hebrew term and its theological resonance as the house of
    the LORD.
- source_word: וַיִּכְרְעוּ אַפַּיִם אַרְצָה
  chosen: bowed down with their faces to the ground
  alternatives:
  - knelt with faces to the ground
  - bent low, faces earthward
  lexicon: HALOT
  rationale: כרע denotes kneeling/bowing. With אַפַּיִם אַרְצָה the image is prostration
    with face downward. 'Bowed down with their faces to the ground' communicates the
    posture naturally.
- source_word: עַל הָרִצְפָה
  chosen: on the pavement
  alternatives:
  - on the paved floor
  lexicon: HALOT
  rationale: רִצְפָה refers to a paved surface or pavement in the temple court area.
- source_word: וַיִּשְׁתַּחֲווּ
  chosen: they worshiped
  alternatives:
  - they prostrated themselves
  - they bowed in worship
  lexicon: HALOT
  rationale: The verb often includes bodily prostration, but since the physical act
    has already been described, 'they worshiped' captures the devotional force here
    without redundancy.
- source_word: וְהוֹדוֹת לַיהוָה
  chosen: and gave thanks to the LORD
  alternatives:
  - and praised the LORD
  - and confessed to the LORD
  lexicon: HALOT
  rationale: ידה in the Hiphil commonly means to give thanks or praise. In this liturgical
    formula introducing 'for he is good,' thanksgiving is the best fit.
- source_word: כִּי טוֹב
  chosen: For he is good
  alternatives:
  - because he is good
  lexicon: HALOT
  rationale: This is the standard liturgical acclamation. 'For' works well introducing
    direct speech and preserves the explanatory force of כִּי.
- source_word: כִּי לְעוֹלָם חַסְדּוֹ
  chosen: for his steadfast love endures forever
  alternatives:
  - for his lovingkindness is forever
  - for his covenant faithfulness lasts forever
  - for his mercy endures forever
  lexicon: HALOT
  rationale: חֶסֶד is a rich covenant term. 'Steadfast love' is the established English
    rendering that preserves both affection and covenant loyalty. 'Endures' is supplied
    for natural English with לְעוֹלָם.
