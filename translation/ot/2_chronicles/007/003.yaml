theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies the default rendering of YHWH as 'the LORD,'
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering חַסְדּוֹ in the liturgical refrain
  chosen_reading: his steadfast love
  alternative_readings:
  - his mercy
  - his covenant faithfulness
  - his lovingkindness
  rationale: The Hebrew term carries covenantal loyalty and benevolence. 'Steadfast
    love' best preserves the theological breadth without narrowing it to mere emotion
    or mercy alone.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms,
    documented exception if needed)
