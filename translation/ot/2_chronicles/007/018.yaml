id: 2CH.7.18
reference: 2 Chronicles 7:18
source:
  edition: WLC
  text: וַ/הֲקִ֣ימוֹתִ֔י אֵ֖ת כִּסֵּ֣א מַלְכוּתֶ֑/ךָ כַּ/אֲשֶׁ֣ר כָּרַ֗תִּי לְ/דָוִ֤יד
    אָבִ֨י/ךָ֙ לֵ/אמֹ֔ר לֹֽא יִכָּרֵ֤ת לְ/ךָ֙ אִ֔ישׁ מוֹשֵׁ֖ל בְּ/יִשְׂרָאֵֽל־׃
translation:
  text: then I will establish the throne of your kingdom, as I covenanted with David
    your father, saying, ‘A man ruling over Israel will not be cut off from you.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “You will not lack a man to rule over Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקִימוֹתִי
  chosen: then I will establish
  alternatives:
  - and I will establish
  - I will confirm
  lexicon: HALOT
  rationale: Hiphil of קום here means to cause to stand/establish. In this conditional
    context following the previous verse, English 'then I will establish' best conveys
    the waw-linked apodosis naturally.
- source_word: כִּסֵּא מַלְכוּתֶךָ
  chosen: the throne of your kingdom
  alternatives:
  - your royal throne
  - the throne of your kingship
  lexicon: HALOT
  rationale: 'A formally close rendering preserves both nouns: ''throne'' plus ''kingdom/kingship.''
    ''The throne of your kingdom'' reflects the Hebrew construct chain without unnecessary
    paraphrase.'
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison to the Davidic covenant. Simple 'as' is sufficient
    and idiomatic.
- source_word: כָּרַתִּי
  chosen: I covenanted
  alternatives:
  - I made a covenant
  - I cut a covenant
  lexicon: HALOT
  rationale: Hebrew כרת with covenantal object/person is the standard idiom for making
    a covenant. Because the direct object 'covenant' is not explicit here, 'I covenanted
    with' is concise and natural while preserving covenantal force.
- source_word: לְדָוִיד אָבִיךָ
  chosen: with David your father
  alternatives:
  - to David your father
  lexicon: HALOT
  rationale: With כרת in covenant contexts, English normally uses 'with.' 'Father'
    here means ancestor/predecessor in the dynastic sense, but the literal wording
    is retained.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering introducing the covenant quotation.
- source_word: לֹא יִכָּרֵת
  chosen: will not be cut off
  alternatives:
  - will not fail
  - will not be removed
  lexicon: HALOT
  rationale: Niphal of כרת literally means 'be cut off.' Although idiomatically it
    can mean 'fail' in dynastic contexts, the more transparent rendering preserves
    the covenantal/dynastic imagery.
- source_word: לְךָ
  chosen: from you
  alternatives:
  - for you
  - to you
  lexicon: HALOT
  rationale: In the idiom 'not be cut off from you,' the sense is that Solomon's line
    will not lack such a descendant. 'From you' best reflects the Hebrew preposition
    in English.
- source_word: אִישׁ
  chosen: A man
  alternatives:
  - a person
  - one
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and refers to an individual
    dynastic successor. Per gender-accurate policy, 'man' is retained rather than
    neutralized.
- source_word: מוֹשֵׁל
  chosen: ruling over
  alternatives:
  - to rule over
  - who rules over
  - as ruler over
  lexicon: HALOT
  rationale: Participle of משל functions attributively with אִישׁ. 'A man ruling over
    Israel' is a natural English equivalent that preserves the participial force.
- source_word: בְּיִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - in Israel
  lexicon: HALOT
  rationale: Although the preposition is ב, with משל the idiomatic sense is dominion
    over a people. English 'over Israel' communicates the governing relation clearly.
