theological_decisions:
- issue: Dynastic promise wording
  chosen_reading: A man ruling over Israel will not be cut off from you
  alternative_readings:
  - You will not lack a man to rule over Israel
  - there shall not fail you a man to be ruler in Israel
  rationale: The verse reiterates the Davidic dynastic promise. The chosen rendering
    stays close to the Hebrew idiom ('be cut off') while still making sense in modern
    English. More idiomatic alternatives are preserved because they make the dynastic
    implication more explicit, but the main text avoids over-interpreting beyond the
    source wording.
  doctrine_reference: Translation philosophy §§1, 3, 4, 6
