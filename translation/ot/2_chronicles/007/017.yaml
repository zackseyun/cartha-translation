theological_decisions:
- issue: Rendering covenant-obedience idiom without importing merit theology
  chosen_reading: 'Retain the conditional structure and obedience language plainly:
    ''if you walk before me... doing all... and if you keep...'''
  alternative_readings:
  - Paraphrasing as general faithfulness
  - Softening the condition to avoid perceived works emphasis
  rationale: The verse presents a real covenant condition addressed to Solomon. The
    translation should preserve that tension without doctrinal smoothing or reduction.
    No broader theological system should be imported beyond the text's explicit conditionality.
  doctrine_reference: Translation philosophy §3
