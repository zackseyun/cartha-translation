id: 2CH.7.17
reference: 2 Chronicles 7:17
source:
  edition: WLC
  text: וְ/אַתָּ֞ה אִם תֵּלֵ֣ךְ לְ/פָנַ֗/י כַּ/אֲשֶׁ֤ר הָלַךְ֙ דָּוִ֣יד אָבִ֔י/ךָ
    וְ/לַ/עֲשׂ֕וֹת כְּ/כֹ֖ל אֲשֶׁ֣ר צִוִּיתִ֑י/ךָ וְ/חֻקַּ֥/י וּ/מִשְׁפָּטַ֖/י תִּשְׁמֽוֹר־׃
translation:
  text: And as for you, if you walk before me as your father David walked, doing all
    that I have commanded you, and if you keep my statutes and my judgments,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my ordinances' for 'my judgments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  chosen: And as for you
  alternatives:
  - And you
  - Now you
  lexicon: HALOT
  rationale: Fronted pronoun with conjunction marks a direct, emphatic address to
    Solomon; 'And as for you' preserves the discourse shift and emphasis more naturally
    than a bare 'And you.'
- source_word: אִם
  chosen: if
  lexicon: HALOT
  rationale: Introduces a conditional clause; straightforwardly rendered 'if.'
- source_word: תֵּלֵךְ לְפָנַי
  chosen: you walk before me
  alternatives:
  - you walk in my presence
  - you live before me
  lexicon: HALOT
  rationale: Hebrew idiom for conducting one's life in God's presence. 'Walk before
    me' preserves the covenantal idiom while remaining understandable in English.
- source_word: כַּאֲשֶׁר הָלַךְ דָּוִיד אָבִיךָ
  chosen: as your father David walked
  alternatives:
  - as David your father walked
  - as your father David lived before me
  lexicon: HALOT
  rationale: Keeps the comparison explicit and preserves the same 'walk' imagery from
    the previous clause for coherence.
- source_word: וְלַעֲשׂוֹת כְּכֹל אֲשֶׁר צִוִּיתִיךָ
  chosen: doing all that I have commanded you
  alternatives:
  - to do all that I have commanded you
  - and do according to all that I have commanded you
  lexicon: HALOT
  rationale: Infinitive construct with prefixed conjunction expresses attendant obligation
    within the condition. 'Doing' flows naturally after 'walk,' while preserving the
    comprehensive force of כְּכֹל.
- source_word: חֻקַּי
  chosen: my statutes
  alternatives:
  - my decrees
  lexicon: HALOT
  rationale: A standard rendering for חֻקִּים in legal/covenantal contexts; preserves
    distinction from the following term.
- source_word: וּמִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my rules
  - my ordinances
  lexicon: HALOT
  rationale: Keeps a lexical distinction from 'statutes.' 'Judgments' is somewhat
    formal but reflects משפטים as judicial decisions/ordinances. 'Ordinances' is possible,
    but 'judgments' better preserves the legal nuance.
- source_word: תִּשְׁמֹר
  chosen: you keep
  alternatives:
  - you observe
  - you guard
  lexicon: HALOT
  rationale: Common covenantal verb meaning keep/observe. 'Keep' is concise, idiomatic,
    and preserves the obedience sense without over-paraphrase.
