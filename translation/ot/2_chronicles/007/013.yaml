id: 2CH.7.13
reference: 2 Chronicles 7:13
source:
  edition: WLC
  text: הֵ֣ן אֶֽעֱצֹ֤ר הַ/שָּׁמַ֨יִם֙ וְ/לֹֽא יִהְיֶ֣ה מָטָ֔ר וְ/הֵן אֲצַוֶּ֥ה עַל
    חָגָ֖ב לֶ/אֱכ֣וֹל הָ/אָ֑רֶץ וְ/אִם אֲשַׁלַּ֥ח דֶּ֖בֶר בְּ/עַמִּֽ/י־־־־׃
translation:
  text: When I shut up the heavens so that there is no rain, or command the locust
    to devour the land, or send pestilence among my people,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If I shut up the heavens ...' The Hebrew opening particle can be rendered
      more literally as 'if indeed' or 'behold, if.'
    reason: lexical_alternative
  - marker: b
    text: Or 'plague' for 'pestilence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: When
  alternatives:
  - If indeed
  - Behold, if
  lexicon: HALOT
  rationale: Here הֵן introduces a conditional scenario rather than serving as a simple
    interjection. 'When' gives natural English for the protasis in context, especially
    paired with the following verse's response condition.
- source_word: אֶעֱצֹר
  chosen: I shut up
  alternatives:
  - I restrain
  - I withhold
  lexicon: HALOT
  rationale: The verb עצר with 'the heavens' is an idiom for withholding rain. 'Shut
    up' preserves the concrete imagery and traditional biblical idiom without obscuring
    meaning.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  lexicon: HALOT
  rationale: '''The heavens'' is the more literal rendering and fits biblical diction,
    especially in the idiom of shutting the heavens to stop rain.'
- source_word: וְלֹא יִהְיֶה מָטָר
  chosen: so that there is no rain
  alternatives:
  - and there is no rain
  - and rain does not fall
  lexicon: HALOT
  rationale: This clause expresses the result of shutting up the heavens. 'So that
    there is no rain' makes the relationship clear in idiomatic English.
- source_word: וְהֵן
  chosen: or
  alternatives:
  - and if indeed
  - or if
  lexicon: HALOT
  rationale: In this sequence the particle introduces another alternative condition.
    'Or' best reflects the list structure in smooth English.
- source_word: אֲצַוֶּה עַל חָגָב
  chosen: command the locust
  alternatives:
  - command locusts
  - order the grasshopper swarm
  lexicon: HALOT
  rationale: חָגָב is singular collective here. 'The locust' works well in English
    as a representative collective and matches the singular Hebrew.
- source_word: לֶאֱכֹל
  chosen: to devour
  alternatives:
  - to eat
  - to consume
  lexicon: HALOT
  rationale: While literally 'to eat,' in context of locust plague against the land,
    'devour' better conveys destructive force without over-paraphrasing.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In covenant-judgment context, 'the land' is more contextually precise
    than the broader 'earth.'
- source_word: וְאִם
  chosen: or
  alternatives:
  - or if
  - and if
  lexicon: HALOT
  rationale: This continues the series of alternative judgments. English style is
    improved by coordinating with 'or' rather than repeating 'if' in the main text.
- source_word: אֲשַׁלַּח
  chosen: send
  alternatives:
  - dispatch
  lexicon: HALOT
  rationale: Standard rendering for שלח in divine-judgment contexts; clear and direct.
- source_word: דֶּבֶר
  chosen: pestilence
  alternatives:
  - plague
  - disease
  lexicon: HALOT
  rationale: דֶּבֶר commonly denotes epidemic disease as covenant judgment. 'Pestilence'
    preserves the gravity and biblical register; 'plague' is possible but can be overly
    broad.
- source_word: בְּעַמִּי
  chosen: among my people
  alternatives:
  - on my people
  - against my people
  lexicon: HALOT
  rationale: The preposition ב here is naturally rendered 'among' for an outbreak
    within the people. This avoids implying only external opposition.
