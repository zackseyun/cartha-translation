theological_decisions:
- issue: Rendering the divine judgments as conditional scenarios
  chosen_reading: Use 'When ... or ... or ...' to present real covenant-discipline
    possibilities without softening divine agency.
  alternative_readings:
  - If I shut up ...
  - Behold, if I shut up ...
  rationale: The Hebrew particles introduce a sequence of possible divine acts. 'When'
    in the first clause and 'or' in the following clauses yields natural English while
    preserving God's direct agency in judgment.
