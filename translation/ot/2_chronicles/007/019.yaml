id: 2CH.7.19
reference: 2 Chronicles 7:19
source:
  edition: WLC
  text: וְ/אִם תְּשׁוּב֣וּ/ן אַתֶּ֔ם וַ/עֲזַבְתֶּם֙ חֻקּוֹתַ֣/י וּ/מִצְוֺתַ֔/י אֲשֶׁ֥ר
    נָתַ֖תִּי לִ/פְנֵי/כֶ֑ם וַ/הֲלַכְתֶּ֗ם וַ/עֲבַדְתֶּם֙ אֱלֹהִ֣ים אֲחֵרִ֔ים וְ/הִשְׁתַּחֲוִיתֶ֖ם
    לָ/הֶֽם־׃
translation:
  text: But if you turn away and abandon my statutes and my commandments that I have
    set before you, and go and serve other gods and bow down to them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turn back' or 'turn aside.' The Hebrew verb can broadly mean 'turn/return';
      here the context favors the sense of turning away from covenant faithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - Now if
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the preceding promises/warnings.
    'But if' brings out the adversative force in context better than a bare 'and if'
    while remaining faithful to the conjunction + conditional particle.
- source_word: תְּשׁוּבוּן
  chosen: turn away
  alternatives:
  - turn back
  - turn aside
  lexicon: HALOT
  rationale: From שוב, whose core sense is 'turn/return.' In this warning context,
    with subsequent apostasy language, 'turn away' best captures defection from covenant
    loyalty rather than simple movement or repentance.
- source_word: אַתֶּם
  chosen: you
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis to the 2mp verb. English normally
    conveys this adequately with 'you' without needing an emphatic form like 'you
    yourselves,' which would sound heavy here.
- source_word: וַעֲזַבְתֶּם
  chosen: abandon
  alternatives:
  - forsake
  - leave
  lexicon: HALOT
  rationale: עזב often means 'forsake/abandon.' 'Abandon' is clear modern English
    and preserves the covenantal seriousness better than the more neutral 'leave.'
- source_word: חֻקּוֹתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: חקים is commonly rendered 'statutes' in legal/covenantal contexts. This
    keeps a recognizable distinction from 'commandments' for מצות.
- source_word: וּמִצְוֺתַי
  chosen: my commandments
  alternatives:
  - my commands
  lexicon: HALOT
  rationale: מצות regularly denotes commandments/commands. 'Commandments' preserves
    the formal covenantal register and pairs naturally with 'statutes.'
- source_word: אֲשֶׁר נָתַתִּי לִפְנֵיכֶם
  chosen: that I have set before you
  alternatives:
  - that I have given before you
  - that I gave you
  lexicon: HALOT
  rationale: Literally 'which I gave before you.' The idiom means placing something
    before someone for observance. 'Set before you' is idiomatic English that preserves
    the imagery better than simply 'gave you.'
- source_word: וַהֲלַכְתֶּם
  chosen: go
  alternatives:
  - walk
  - go away
  lexicon: HALOT
  rationale: הלך literally means 'walk/go.' In sequence with 'serve other gods,' English
    idiom prefers 'go and serve,' which reflects movement into apostasy without woodenly
    retaining 'walk.'
- source_word: וַעֲבַדְתֶּם
  chosen: serve
  alternatives:
  - worship
  - be enslaved to
  lexicon: HALOT
  rationale: עבד with gods commonly means religious service/worship. 'Serve' is the
    broad and standard rendering, allowing the following verb to specify the act of
    prostration.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The phrase straightforwardly denotes deities other than the God of Israel.
    'Other gods' is the standard and most direct rendering.
- source_word: וְהִשְׁתַּחֲוִיתֶם לָהֶם
  chosen: bow down to them
  alternatives:
  - worship them
  - prostrate yourselves to them
  lexicon: HALOT
  rationale: The verb denotes bowing/prostration in homage. 'Bow down to them' preserves
    the concrete physical act and avoids collapsing it into the broader 'worship,'
    since 'serve' already covers the wider cultic sense.
