theological_decisions:
- issue: Nature of apostasy language in covenant warning
  chosen_reading: 'Render the sequence as turning away from the LORD''s covenant obligations
    into idolatrous service: ''turn away ... abandon ... go and serve other gods and
    bow down to them.'''
  alternative_readings:
  - Translate שוב more neutrally as 'turn back' or 'turn aside'
  rationale: The immediate context is covenant fidelity versus apostasy. The chosen
    wording preserves the warning's theological force without importing later doctrinal
    categories beyond the text itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
