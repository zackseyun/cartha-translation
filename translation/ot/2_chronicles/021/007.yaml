theological_decisions:
- issue: Dynastic metaphor of נִיר in the Davidic covenant context
  chosen_reading: lamp
  alternative_readings:
  - light
  - dynasty
  rationale: The verse alludes to the Davidic covenant and uses the established biblical
    metaphor of a 'lamp' for the continuance of David's line and rule. Retaining the
    metaphor preserves intertextual and theological resonance without over-interpreting
    it in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
