id: 2CH.21.7
reference: 2 Chronicles 21:7
source:
  edition: WLC
  text: וְ/לֹא אָבָ֣ה יְהוָ֗ה לְ/הַשְׁחִית֙ אֶת בֵּ֣ית דָּוִ֔יד לְמַ֣עַן הַ/בְּרִ֔ית
    אֲשֶׁ֥ר כָּרַ֖ת לְ/דָוִ֑יד וְ/כַ/אֲשֶׁ֣ר אָמַ֗ר לָ/תֵ֨ת ל֥/וֹ נִ֛יר וּ/לְ/בָנָ֖י/ו
    כָּל הַ/יָּמִֽים־־־׃
translation:
  text: Yet the LORD was not willing to destroy the house of David, because of the
    covenant that he had made with David, and as he had said that he would give to
    him and to his sons a lamp for all days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'light.' The Hebrew metaphor likely refers to the continuing line or
      rule of David.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'for all the days'; some translations render this more interpretively
      as 'forever.'
    reason: lexical_alternative
  - marker: c
    text: Or 'give him a lamp, and to his sons,'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְלֹא אָבָה
  chosen: Yet ... was not willing
  alternatives:
  - But ... was not willing
  - And ... did not desire
  - And ... would not
  lexicon: HALOT
  rationale: אָבָה conveys willingness or consent rather than mere desire. 'Was not
    willing' best captures the volitional nuance. 'Yet' renders the conjunction in
    context as mildly adversative after the preceding judgment narrative.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: לְהַשְׁחִית
  chosen: to destroy
  alternatives:
  - to ruin
  - to wipe out
  lexicon: HALOT
  rationale: The Hiphil of שׁחת here refers to bringing the Davidic house to destruction.
    'Destroy' is the standard, clear rendering.
- source_word: בֵּית דָּוִיד
  chosen: the house of David
  alternatives:
  - David's house
  - the dynasty of David
  lexicon: HALOT
  rationale: '''House of David'' preserves the dynastic idiom and its biblical resonance.
    ''Dynasty'' is interpretive and less formally tied to the Hebrew expression.'
- source_word: לְמַעַן הַבְּרִית
  chosen: because of the covenant
  alternatives:
  - for the sake of the covenant
  - on account of the covenant
  lexicon: HALOT
  rationale: לְמַעַן marks motive or reason. 'Because of the covenant' is natural
    English and preserves the causal force.
- source_word: כָּרַת ... לְדָוִיד
  chosen: had made with David
  alternatives:
  - cut with David
  - made for David
  lexicon: HALOT
  rationale: Hebrew 'cut a covenant' is idiomatically rendered 'make a covenant' in
    English. 'With David' reflects covenantal relationship more naturally than 'for
    David' here.
- source_word: וְכַאֲשֶׁר אָמַר
  chosen: and as he had said
  alternatives:
  - according as he had said
  - just as he had promised
  lexicon: HALOT
  rationale: The phrase links God's action to his prior word. 'As he had said' is
    closer to the Hebrew than the more interpretive 'promised,' though promise is
    implied.
- source_word: לָתֵת לוֹ נִיר
  chosen: that he would give him a lamp
  alternatives:
  - to give him a lamp
  - to give him a light
  lexicon: HALOT
  rationale: נִיר in royal/dynastic contexts is conventionally 'lamp,' an image for
    enduring lineage or rule. 'Lamp' preserves the metaphor better than flattening
    it to 'dynasty' or shifting to 'light'.
- source_word: וּלְבָנָיו
  chosen: and to his sons
  alternatives:
  - and to his children
  - and to his descendants
  lexicon: HALOT
  rationale: The Hebrew is specifically 'his sons.' While dynastic extension is broader
    in implication, the wording should remain gender-accurate and formally aligned
    with the source.
- source_word: כָּל הַיָּמִים
  chosen: for all days
  alternatives:
  - always
  - forever
  - all the time
  lexicon: HALOT
  rationale: Literally 'all the days.' 'For all days' preserves the Hebrew expression
    with readable English. 'Forever' is possible in context but slightly stronger
    and more interpretive.
