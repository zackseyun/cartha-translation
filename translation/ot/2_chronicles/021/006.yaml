id: 2CH.21.6
reference: 2 Chronicles 21:6
source:
  edition: WLC
  text: וַ/יֵּ֜לֶךְ בְּ/דֶ֣רֶךְ מַלְכֵ֣י יִשְׂרָאֵ֗ל כַּ/אֲשֶׁ֤ר עָשׂוּ֙ בֵּ֣ית אַחְאָ֔ב
    כִּ֚י בַּת אַחְאָ֔ב הָ֥יְתָה לּ֖/וֹ אִשָּׁ֑ה וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֥י יְהוָֽה׀־׃
translation:
  text: He walked in the way of the kings of Israel, as the house of Ahab had done,
    for Ahab’s daughter was his wife; and he did what was evil in the eyes of the
    LORD.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: He walked
  alternatives:
  - He went
  - He followed
  lexicon: HALOT
  rationale: הלך with בְּדֶרֶךְ is an idiom for conduct or manner of life. 'Walked'
    preserves the Hebrew metaphor and is natural English in this moral context.
- source_word: בְּדֶרֶךְ
  chosen: in the way of
  alternatives:
  - in the path of
  - according to the ways of
  lexicon: HALOT
  rationale: דֶּרֶךְ here denotes course of conduct rather than a literal road. 'In
    the way of' is a standard and transparent rendering that keeps the metaphor.
- source_word: מַלְכֵי יִשְׂרָאֵל
  chosen: the kings of Israel
  lexicon: HALOT
  rationale: Straightforward genitival phrase referring to the northern kingdom's
    rulers as a moral-political pattern.
- source_word: כַּאֲשֶׁר עָשׂוּ בֵּית אַחְאָב
  chosen: as the house of Ahab had done
  alternatives:
  - just as the house of Ahab did
  lexicon: HALOT
  rationale: The clause compares Jehoram's conduct to the established behavior of
    Ahab's dynasty. 'Had done' fits the comparative retrospective sense in English.
- source_word: בֵּית אַחְאָב
  chosen: the house of Ahab
  alternatives:
  - the household of Ahab
  - the dynasty of Ahab
  lexicon: HALOT
  rationale: בַּיִת in royal contexts can mean household or dynasty. 'House' preserves
    the Hebrew expression and allows the dynastic sense to be heard without over-specifying.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the explanatory reason for his alignment with Ahab's house.
    'For' is concise and fits the narrative style.
- source_word: בַּת אַחְאָב
  chosen: Ahab’s daughter
  alternatives:
  - the daughter of Ahab
  lexicon: HALOT
  rationale: Simple possessive English rendering. Although elsewhere she is identified
    as Athaliah, the verse itself uses the relational expression, so the translation
    should do the same.
- source_word: הָיְתָה לּוֹ אִשָּׁה
  chosen: was his wife
  alternatives:
  - became his wife
  - was a wife to him
  lexicon: HALOT
  rationale: The construction states marital relationship. 'Was his wife' is idiomatic
    and avoids implying the marriage occurred at that moment.
- source_word: וַיַּעַשׂ הָרַע
  chosen: he did what was evil
  alternatives:
  - he did evil
  - he acted wickedly
  lexicon: HALOT
  rationale: The object with article, הָרַע, is well represented by 'what was evil.'
    This is slightly more explicit than 'did evil' while remaining close to the Hebrew.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a common evaluative formula. 'In the eyes of' preserves the Hebrew
    idiom. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
