theological_decisions:
- issue: Cause of the rebellions
  chosen_reading: 'The final clause gives the reason in the Chronicler''s perspective: Jehoram''s forsaking of the LORD explains the political rebellions.'
  alternative_readings:
  - The clause could be read more narrowly as explaining only Libnah's rebellion because of Jehoram's apostasy.
  rationale: Syntactically, the singular subject 'he had forsaken' refers to Jehoram, and the Chronicler commonly interprets political events as consequences of covenant unfaithfulness. The English keeps the causal clause attached without over-specifying beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
