id: 2CH.21.10
reference: 2 Chronicles 21:10
source:
  edition: WLC
  text: וַ/יִּפְשַׁ֨ע אֱד֜וֹם מִ/תַּ֣חַת יַד יְהוּדָ֗ה עַ֚ד הַ/יּ֣וֹם הַ/זֶּ֔ה אָ֣ז תִּפְשַׁ֥ע לִבְנָ֛ה בָּ/עֵ֥ת הַ/הִ֖יא מִ/תַּ֣חַת יָד֑/וֹ כִּ֣י עָזַ֔ב אֶת יְהוָ֖ה אֱלֹהֵ֥י אֲבֹתָֽי/ו־־׃
translation:
  text: So Edom rebelled from under the hand of Judah to this day. At that time Libnah also rebelled from under his hand, because he had forsaken Yahweh, the God of his fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'revolted' / 'broke away' for 'rebelled.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from under the hand of Judah' and 'from under his hand,' an idiom for escaping rule or control.
    reason: cultural_note
  - marker: c
    text: The causal clause may explain Jehoram's troubles generally, or more specifically Libnah's rebellion.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּפְשַׁע / תִּפְשַׁע (פשע)
  chosen: rebelled
  alternatives:
  - revolted
  - broke away
  lexicon: HALOT
  rationale: The verb פשע in political context denotes rebellion or revolt against authority. 'Rebelled' is clear modern English and fits both Edom and Libnah in this verse. 'Broke away' is possible but weaker than the covenantal/political force of the Hebrew.
- source_word: מִתַּחַת יַד / מִתַּחַת יָדוֹ
  chosen: from under the hand of / from under his hand
  alternatives:
  - from under the power of
  - from under the control of
  lexicon: HALOT
  rationale: The idiom literally means release from subjection to someone's power or rule. Retaining 'hand' preserves the Hebrew image while remaining understandable in English. A more interpretive rendering like 'control' is possible but less transparent.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Standard transliteration of the kingdom/tribal name, as required by the translation philosophy for names.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is a standard Hebrew temporal formula indicating the state continued to the writer's present. 'To this day' is idiomatic English and preserves the formulaic sense.
- source_word: אָז
  chosen: At that time
  alternatives:
  - Then
  lexicon: HALOT
  rationale: Here אָז marks the temporal point connected with Edom's rebellion. 'At that time' makes the chronology explicit and reads naturally in English. 'Then' is possible but slightly less precise.
- source_word: לִבְנָה
  chosen: Libnah
  rationale: Standard transliteration of the place name.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: In this context כִּי introduces the reason for the rebellions. 'Because' communicates causation more clearly in contemporary English than the more formal 'for'.
- source_word: עָזַב
  chosen: had forsaken
  alternatives:
  - had abandoned
  - left
  lexicon: HALOT
  rationale: עזב here describes Jehoram's covenantal apostasy from the LORD. 'Forsaken' preserves the theological and relational gravity better than the flatter 'left'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי אֲבֹתָיו
  chosen: the God of his fathers
  alternatives:
  - his ancestral God
  - the God of his ancestors
  lexicon: HALOT
  rationale: This construct phrase identifies the covenant God worshiped by Jehoram's forefathers. 'The God of his fathers' is the most direct and traditional rendering; 'ancestors' is possible but less formally aligned with the Hebrew wording.
