id: 2CH.21.14
reference: 2 Chronicles 21:14
source:
  edition: WLC
  text: הִנֵּ֣ה יְהוָ֗ה נֹגֵ֛ף מַגֵּפָ֥ה גְדוֹלָ֖ה בְּ/עַמֶּ֑/ךָ וּ/בְ/בָנֶ֥י/ךָ וּ/בְ/נָשֶׁ֖י/ךָ וּ/בְ/כָל רְכוּשֶֽׁ/ךָ־׃
translation:
  text: Behold, Yahweh is striking your people, your sons, your wives, and all your possessions with a great plague.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will strike ... with a great blow/affliction.' The Hebrew participle can be rendered as imminent or simple future, and מַגֵּפָה can denote a plague or a severe divinely inflicted blow.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces the prophetic announcement with emphatic attention-getting force. 'Behold' preserves the solemnity and immediacy better than the more colloquial 'look' or 'see'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and standard English Bible practice.
- source_word: נֹגֵף
  chosen: is about to strike
  alternatives:
  - is striking
  - will strike
  - is smiting
  lexicon: HALOT
  rationale: The participle with הִנֵּה in prophetic discourse often conveys imminent action. 'Is about to strike' captures the impending judgment more naturally in English than a simple present, while remaining close to the Hebrew.
- source_word: מַגֵּפָה גְדוֹלָה
  chosen: with a great plague
  alternatives:
  - with a severe blow
  - with a great affliction
  - with a great plague-stroke
  lexicon: HALOT
  rationale: מַגֵּפָה commonly denotes a plague or divinely inflicted pestilence/blow. 'Great plague' is the most natural collocation in English and fits the judgment context; 'with' reflects the instrumental sense of the construction with נֹגֵף.
- source_word: בְּעַמְּךָ
  chosen: your people
  alternatives:
  - among your people
  - against your people
  lexicon: HALOT
  rationale: The preposition ב with נכה/נגף can mark the object affected by the blow. 'Your people' is concise and idiomatic in English; 'among' is possible but less direct here.
- source_word: וּבְבָנֶיךָ
  chosen: your sons
  alternatives:
  - your children
  lexicon: HALOT
  rationale: בנים is explicitly masculine plural. Per the project's gender-accurate policy, 'sons' is preferred over the more generic 'children'.
- source_word: וּבְנָשֶׁיךָ
  chosen: your wives
  alternatives:
  - your women
  lexicon: HALOT
  rationale: In this possessive plural context, נָשִׁים clearly means 'wives,' not women in general.
- source_word: וּבְכָל רְכוּשֶׁךָ
  chosen: and all your possessions
  alternatives:
  - and all your property
  - and all your goods
  lexicon: HALOT
  rationale: רְכוּשׁ denotes movable property/wealth/possessions. 'Possessions' is broad, natural modern English and fits the totalizing force of כָל.
