theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    with alternatives preserved only as documented possibilities rather than adopted
    in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the participle נֹגֵף in prophetic announcement
  chosen_reading: imminent future ('is about to strike')
  alternative_readings:
  - present progressive ('is striking')
  - simple future ('will strike')
  rationale: The construction הִנֵּה + participle often signals imminent action in
    prophetic speech. Rendering it as imminent preserves the warning's urgency without
    over-paraphrasing.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
