  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the participle נֹגֵף in prophetic announcement
  chosen_reading: imminent future ('is about to strike')
  alternative_readings:
  - present progressive ('is striking')
  - simple future ('will strike')
  rationale: The construction הִנֵּה + participle often signals imminent action in prophetic speech. Rendering it as imminent preserves the warning's urgency without over-paraphrasing.
