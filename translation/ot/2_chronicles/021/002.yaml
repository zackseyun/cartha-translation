id: 2CH.21.2
reference: 2 Chronicles 21:2
source:
  edition: WLC
  text: וְ/לֽ/וֹ אַחִ֞ים בְּנֵ֣י יְהוֹשָׁפָ֗ט עֲזַרְיָ֤ה וִֽ/יחִיאֵל֙ וּ/זְכַרְיָ֣הוּ
    וַ/עֲזַרְיָ֔הוּ וּ/מִיכָאֵ֖ל וּ/שְׁפַטְיָ֑הוּ כָּל אֵ֕לֶּה בְּנֵ֥י יְהוֹשָׁפָ֖ט
    מֶ֥לֶךְ יִשְׂרָאֵֽל־־־׃
translation:
  text: 'And he had brothers, the sons of Jehoshaphat: Azariah, Jehiel, Zechariah,
    Azariahu, Michael, and Shephatiah. All these were the sons of Jehoshaphat king
    of Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''king of Israel.'' Jehoshaphat is more commonly identified historically
      as king of Judah; Chronicles here uses ''Israel,'' likely in a broader covenantal
      sense.'
    reason: alternative_reading
  - marker: b
    text: The fourth name is spelled differently in Hebrew from the first Azariah;
      the distinction is preserved here as 'Azariahu.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לֽ/וֹ
  chosen: And he had
  alternatives:
  - And to him were
  - Now he had
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition with pronominal suffix literally
    means 'and to him,' an idiom expressing possession. In natural English this is
    best rendered 'and he had' while preserving the simple narrative linkage.
- source_word: אַחִים
  chosen: brothers
  alternatives:
  - kinsmen
  lexicon: HALOT
  rationale: The noun plainly refers to male siblings in this genealogical context,
    not a broader kinship group. 'Brothers' is the most accurate gender-specific rendering.
- source_word: בְּנֵי יְהוֹשָׁפָט
  chosen: the sons of Jehoshaphat
  alternatives:
  - Jehoshaphat's sons
  lexicon: HALOT
  rationale: The construct phrase identifies the brothers as Jehoshaphat's sons. Retaining
    'sons' preserves the formal genealogical style of the Hebrew.
- source_word: עֲזַרְיָה
  chosen: Azariah
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: וִֽיחִיאֵל
  chosen: Jehiel
  alternatives:
  - Yehiel
  rationale: Personal name transliterated in a conventional English biblical form.
    'Jehiel' is the standard recognizable rendering.
- source_word: וּזְכַרְיָהוּ
  chosen: Zechariah
  alternatives:
  - Zekaryahu
  rationale: Personal name transliterated in standard English form rather than a more
    phonetic transliteration.
- source_word: וַעֲזַרְיָהוּ
  chosen: Azariahu
  alternatives:
  - Azariah
  rationale: This spelling differs from the earlier עֲזַרְיָה. Rendering it as 'Azariahu'
    preserves the distinction between two differently spelled names in the Hebrew
    text and avoids collapsing two brothers into identically rendered names.
- source_word: וּמִיכָאֵל
  chosen: Michael
  alternatives:
  - Micael
  rationale: Personal name transliterated in standard English form.
- source_word: וּשְׁפַטְיָהוּ
  chosen: Shephatiah
  alternatives:
  - Shephatyahu
  rationale: Personal name transliterated in standard English biblical form.
- source_word: כָּל אֵלֶּה
  chosen: All these
  alternatives:
  - All of these
  lexicon: HALOT
  rationale: A straightforward resumptive phrase concluding the list. 'All these'
    is idiomatic and sufficiently formal.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  alternatives:
  - king of Judah
  lexicon: HALOT
  rationale: The Hebrew text reads 'king of Israel.' Although Jehoshaphat was king
    of Judah in the divided monarchy, Chronicles can use 'Israel' in a broader covenantal
    sense for the Davidic kingdom. The translation should follow the source text rather
    than harmonize it.
