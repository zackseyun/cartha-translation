theological_decisions:
- issue: Jehoshaphat's title as מֶלֶךְ יִשְׂרָאֵל
  chosen_reading: king of Israel
  alternative_readings:
  - king of Judah
  rationale: The source text explicitly says 'king of Israel.' Rendering 'king of
    Judah' would be an interpretive harmonization against the Hebrew. Keeping 'Israel'
    preserves the Chronicler's wording and possible broader theological use of 'Israel'
    for the covenant people under the Davidic king.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation
    tradition
