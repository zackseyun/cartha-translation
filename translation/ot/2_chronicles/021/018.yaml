id: 2CH.21.18
reference: 2 Chronicles 21:18
source:
  edition: WLC
  text: וְ/אַחֲרֵ֖י כָּל זֹ֑את נְגָפ֨/וֹ יְהוָ֧ה בְּ/מֵעָ֛י/ו לָ/חֳלִ֖י לְ/אֵ֥ין מַרְפֵּֽא־׀׃
translation:
  text: And after all this, Yahweh struck him in his intestines with an incurable disease.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "with no remedy"; literally, "to there being no healing."
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחֲרֵי
  chosen: And after
  alternatives:
  - After
  lexicon: HALOT
  rationale: Temporal sequence marker introducing what followed the preceding events. Retaining 'And' reflects the Hebrew conjunction and narrative flow.
- source_word: כָּל זֹאת
  chosen: all this
  alternatives:
  - all these things
  lexicon: HALOT
  rationale: Idiomatic summary reference to the preceding judgments and actions. 'All this' is natural English and preserves the collective sense.
- source_word: נְגָפוֹ
  chosen: struck him
  alternatives:
  - afflicted him
  - plagued him
  lexicon: HALOT
  rationale: From נגע/נגף in a context of divine smiting. 'Struck him' preserves the force of direct divine judgment without over-specifying the manner.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּמֵעָיו
  chosen: in his intestines
  alternatives:
  - in his bowels
  - in his inward parts
  lexicon: HALOT
  rationale: מֵעֶה refers to the internal organs, especially the bowels/intestines. 'Intestines' is anatomically clear modern English; 'bowels' is traditional but archaic or potentially misleading in contemporary usage.
- source_word: לָחֳלִי
  chosen: with a disease
  alternatives:
  - with sickness
  - with illness
  lexicon: HALOT
  rationale: 'The preposition marks result or condition: he was struck so as to have a disease/sickness. ''Disease'' fits the severe bodily affliction described in context.'
- source_word: לְאֵין מַרְפֵּא
  chosen: incurable
  alternatives:
  - without healing
  - with no remedy
  lexicon: HALOT
  rationale: Literally 'to there being no healing/remedy.' 'Incurable' gives the sense succinctly in natural English while preserving the hopelessness of the condition.
