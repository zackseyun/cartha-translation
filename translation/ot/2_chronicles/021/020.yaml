id: 2CH.21.20
reference: 2 Chronicles 21:20
source:
  edition: WLC
  text: בֶּן שְׁלֹשִׁ֤ים וּ/שְׁתַּ֨יִם֙ הָיָ֣ה בְ/מָלְכ֔/וֹ וּ/שְׁמוֹנֶ֣ה שָׁנִ֔ים
    מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וַ/יֵּ֨לֶךְ֙ בְּ/לֹ֣א חֶמְדָּ֔ה וַֽ/יִּקְבְּרֻ֨/הוּ֙
    בְּ/עִ֣יר דָּוִ֔יד וְ/לֹ֖א בְּ/קִבְר֥וֹת הַ/מְּלָכִֽים־׃
translation:
  text: He was thirty-two years old when he began to reign, and he reigned eight years
    in Jerusalem. Then he departed with no regret, and they buried him in the city
    of David, but not in the tombs of the kings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he went away without being desired,' preserving the more literal sense
      of the Hebrew phrase.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן שְׁלֹשִׁים וּשְׁתַּיִם
  chosen: thirty-two years old
  alternatives:
  - a son of thirty-two years
  lexicon: HALOT
  rationale: This is the standard Hebrew age idiom. Rendering it idiomatically in
    English communicates the sense clearly without woodenly preserving 'son of.'
- source_word: בְמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - at his becoming king
  - when he became king
  lexicon: HALOT
  rationale: The preposition with the infinitive/verb form in this age formula marks
    the time of accession. 'When he began to reign' is natural English and matches
    the formulaic sense.
- source_word: וּשְׁמוֹנֶה שָׁנִים מָלַךְ
  chosen: he reigned eight years
  alternatives:
  - he was king eight years
  lexicon: HALOT
  rationale: מָלַךְ means 'to reign, be king.' 'He reigned eight years' is the most
    natural English rendering of the regnal formula.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative use.
- source_word: וַיֵּלֶךְ
  chosen: he departed
  alternatives:
  - he went away
  - he died
  lexicon: HALOT
  rationale: In this obituary context, 'went' is a conventional euphemism for death.
    'Departed' preserves the euphemistic force in readable English without over-interpreting
    as the explicit 'died.'
- source_word: בְּלֹא חֶמְדָּה
  chosen: with no regret
  alternatives:
  - without desire
  - without being desired
  - without honor
  lexicon: HALOT
  rationale: חֶמְדָּה denotes desire, delight, or preciousness. In context the phrase
    indicates that his death occasioned no sense of loss or public affection. 'With
    no regret' captures the idiomatic force better than a literal but opaque 'without
    desire.'
- source_word: וַיִּקְבְּרֻהוּ
  chosen: they buried him
  lexicon: HALOT
  rationale: 'The plural verb with object suffix is naturally rendered with an indefinite
    English subject: ''they buried him.'''
- source_word: בְּעִיר דָּוִיד
  chosen: in the city of David
  lexicon: HALOT
  rationale: Standard place-name expression referring to the Davidic burial area in
    Jerusalem.
- source_word: וְלֹא בְּקִבְרוֹת הַמְּלָכִים
  chosen: but not in the tombs of the kings
  alternatives:
  - but not in the graves of the kings
  lexicon: HALOT
  rationale: קִבְרוֹת can be rendered 'graves' or 'tombs.' 'Tombs' fits the royal
    burial context more naturally in English.
