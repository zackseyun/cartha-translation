id: 2CH.21.16
reference: 2 Chronicles 21:16
source:
  edition: WLC
  text: וַ/יָּ֨עַר יְהוָ֜ה עַל יְהוֹרָ֗ם אֵ֣ת ר֤וּחַ הַ/פְּלִשְׁתִּים֙ וְ/הָ֣/עַרְבִ֔ים
    אֲשֶׁ֖ר עַל יַ֥ד כּוּשִֽׁים־־׃
translation:
  text: And the LORD stirred up against Jehoram the spirit of the Philistines and
    of the Arabians who were beside the Cushites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'aroused' or 'incited.' The Hebrew verb expresses the LORD's causing
      these nations to rise in hostility against Jehoram.
    reason: lexical_alternative
  - marker: b
    text: Or 'who were near the Cushites.' The phrase may describe the Arabians geographically
      as neighboring the Cushites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּעַר
  chosen: stirred up
  alternatives:
  - aroused
  - incited
  lexicon: HALOT
  rationale: The verb here denotes provoking or rousing hostile action. 'Stirred up'
    is idiomatic modern English and preserves divine causation without over-specifying
    psychological mechanism.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated.
- source_word: עַל יְהוֹרָם
  chosen: against Jehoram
  alternatives:
  - upon Jehoram
  lexicon: HALOT
  rationale: With a hostile verb, עַל is best rendered 'against' in English.
- source_word: רוּחַ
  chosen: the spirit
  alternatives:
  - the disposition
  - the hostility
  lexicon: HALOT
  rationale: רוּחַ can denote spirit, wind, or disposition. Here it refers to the
    animating impulse or hostile spirit of these peoples. 'Spirit' keeps the Hebrew
    imagery and avoids interpretive flattening.
- source_word: הַפְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard ethnic rendering.
- source_word: וְהָעַרְבִים
  chosen: and of the Arabians
  alternatives:
  - and the Arabs
  lexicon: HALOT
  rationale: Either is possible; 'Arabians' matches many English Bible conventions
    for the ancient people group and avoids anachronistic modern ethnic associations.
- source_word: אֲשֶׁר עַל יַד כּוּשִׁים
  chosen: who were beside the Cushites
  alternatives:
  - who were near the Cushites
  - who were by the side of the Cushites
  - who were under the authority of the Cushites
  lexicon: HALOT
  rationale: The idiom עַל יַד most naturally means 'at the side of, beside, near.'
    In this geographical/ethnographic context, a locative sense is preferable to political
    subordination. 'Beside the Cushites' is concise and natural.
