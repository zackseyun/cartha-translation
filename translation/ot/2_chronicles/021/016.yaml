theological_decisions:
- issue: Divine causation in raising hostile nations against Jehoram
  chosen_reading: The verse states that the LORD actively stirred up the hostile spirit
    of these peoples against Jehoram.
  alternative_readings:
  - The LORD merely permitted existing hostility to emerge
  rationale: The Hebrew verb directly attributes the action to the LORD. The translation
    preserves that claim without softening it into mere permission, while not importing
    a fuller theological explanation than the text itself gives.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
