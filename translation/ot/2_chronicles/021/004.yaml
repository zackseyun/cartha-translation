id: 2CH.21.4
reference: 2 Chronicles 21:4
source:
  edition: WLC
  text: וַ/יָּ֨קָם יְהוֹרָ֜ם עַל מַמְלֶ֤כַת אָבִי/ו֙ וַ/יִּתְחַזַּ֔ק וַ/יַּהֲרֹ֥ג
    אֶת כָּל אֶחָ֖י/ו בֶּ/חָ֑רֶב וְ/גַ֖ם מִ/שָּׂרֵ֥י יִשְׂרָאֵֽל־־־׃
translation:
  text: When Jehoram had risen over his father's kingdom and had strengthened himself,
    he killed all his brothers with the sword, and also some of the princes of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'officials' or 'leaders' for 'princes.' The Hebrew term can denote high-ranking
      rulers or administrators.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: had risen over
  alternatives:
  - rose over
  - came to power over
  - established himself over
  lexicon: HALOT
  rationale: The verb קום with עַל in royal context can denote arising to or assuming
    rule over a kingdom. 'Had risen over' preserves the sequential sense while fitting
    the following perfective English construction with 'had strengthened himself.'
- source_word: עַל מַמְלֶכַת אָבִיו
  chosen: over his father's kingdom
  alternatives:
  - to his father's kingdom
  - upon his father's kingdom
  - over the kingdom of his father
  lexicon: HALOT
  rationale: עַל with 'kingdom' here indicates accession to rule. 'Over his father's
    kingdom' is idiomatic English and preserves the relational genitive.
- source_word: וַיִּתְחַזַּק
  chosen: had strengthened himself
  alternatives:
  - strengthened himself
  - made himself strong
  - secured his position
  lexicon: HALOT
  rationale: The hitpael of חזק is reflexive. 'Had strengthened himself' keeps the
    reflexive force and can imply consolidation of power without over-interpreting
    it as purely military or political.
- source_word: וַיַּהֲרֹג
  chosen: he killed
  alternatives:
  - he slew
  - he put to death
  lexicon: HALOT
  rationale: '''Killed'' is the clearest modern English equivalent and avoids archaic
    diction.'
- source_word: אֶת כָּל אֶחָיו
  chosen: all his brothers
  alternatives:
  - all his brothers and sisters
  - all his kin
  lexicon: HALOT
  rationale: The Hebrew explicitly refers to male siblings. Per gender-accurate policy,
    'brothers' is retained rather than broadened.
- source_word: בֶּחָרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  - with a sword
  lexicon: HALOT
  rationale: This is the standard idiom for execution by violent killing. 'With the
    sword' is natural and preserves the instrumental sense.
- source_word: וְגַם
  chosen: and also
  alternatives:
  - also
  - and even
  lexicon: HALOT
  rationale: The conjunction adds a further group beyond his brothers. 'And also'
    preserves the additive emphasis.
- source_word: מִשָּׂרֵי יִשְׂרָאֵל
  chosen: some of the princes of Israel
  alternatives:
  - some of the officials of Israel
  - some of the leaders of Israel
  lexicon: HALOT
  rationale: The prefixed מִן is partitive, so 'some of' should be expressed. שָׂרִים
    can mean princes, officials, or leaders; 'princes' fits the courtly and royal
    setting of Chronicles, while 'of Israel' likely refers to the covenant people/kingdom
    broadly rather than only the northern kingdom in a strict political sense.
