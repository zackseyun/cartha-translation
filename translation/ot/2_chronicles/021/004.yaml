theological_decisions:
- issue: Referent of 'Israel' in 'princes of Israel'
  chosen_reading: Retain 'Israel' as written without narrowing it to 'Judah' or paraphrasing
    it as 'the nation.'
  alternative_readings:
  - princes of Judah
  - leaders of the nation
  rationale: Chronicles can use 'Israel' in broader covenantal or dynastic ways even
    in Judahite contexts. The translation should preserve the source term rather than
    resolve the historical nuance by paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
