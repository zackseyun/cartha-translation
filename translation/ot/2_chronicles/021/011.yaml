theological_decisions:
- issue: Whether to make explicit that Jehoram led Judah away from the LORD
  chosen_reading: 'Keep the object implicit in the main text: ''drove Judah away'''
  alternative_readings:
  - drove Judah away from the LORD
  - led Judah astray
  rationale: The Hebrew does not explicitly state 'from the LORD' in this verse, though
    the context strongly implies covenantal apostasy. To avoid importing words not
    present in the source, the main text preserves the terser Hebrew expression, while
    the lexical rationale notes the implied religious sense.
  doctrine_reference: Translation philosophy §1, §3
