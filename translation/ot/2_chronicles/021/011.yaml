id: 2CH.21.11
reference: 2 Chronicles 21:11
source:
  edition: WLC
  text: גַּם ה֥וּא עָשָֽׂה בָמ֖וֹת בְּ/הָרֵ֣י יְהוּדָ֑ה וַ/יֶּ֨זֶן֙ אֶת יֹשְׁבֵ֣י
    יְרוּשָׁלִַ֔ם וַ/יַּדַּ֖ח אֶת יְהוּדָֽה־־־־׃פ
translation:
  text: He also made high places in the hill country of Judah, led the inhabitants
    of Jerusalem into sexual immorality, and drove Judah away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'caused the inhabitants of Jerusalem to prostitute themselves'; the Hebrew
      uses covenant-infidelity language that can evoke both sexual immorality and
      religious apostasy.
    reason: lexical_alternative
  - marker: b
    text: Or 'led Judah astray' or 'drove Judah away from the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם הוּא
  chosen: He also
  alternatives:
  - He too
  - Also he
  lexicon: HALOT
  rationale: 'גַּם with the independent pronoun adds emphasis and continuation: Jehoram,
    like prior wicked kings, also did this. ''He also'' is natural modern English
    and preserves the additive force.'
- source_word: עָשָׂה
  chosen: made
  alternatives:
  - built
  - established
  lexicon: HALOT
  rationale: The common verb עשה here governs בָּמוֹת and is well rendered 'made.'
    'Built' is possible by implication, but 'made' stays closer to the Hebrew while
    remaining idiomatic.
- source_word: בָמ֖וֹת
  chosen: high places
  lexicon: HALOT
  rationale: במות is the standard term for illicit or unauthorized worship sites.
    'High places' is the established and accurate rendering in this historical context.
- source_word: בְּהָרֵי יְהוּדָה
  chosen: in the hill country of Judah
  alternatives:
  - in the mountains of Judah
  - on the hills of Judah
  lexicon: HALOT
  rationale: הרים can mean mountains or hill country. In English historical-geographical
    style, 'hill country of Judah' is idiomatic and fits the regional sense better
    than a strictly topographical 'mountains.'
- source_word: וַיֶּזֶן
  chosen: led ... into sexual immorality
  alternatives:
  - caused ... to prostitute themselves
  - made ... play the whore
  - seduced ... into unfaithfulness
  lexicon: HALOT
  rationale: From זנה in the Hiphil/causative sense, the verb can denote causing literal
    sexual immorality and, in covenantal contexts, religious apostasy metaphorically
    framed as prostitution. Here, because high places and Judah's apostasy are in
    view, the phrase carries both moral and religious overtones. 'Led ... into sexual
    immorality' is readable modern English that preserves the metaphor's force without
    crude idiom; the stronger prostitution imagery is preserved in a footnote.
- source_word: יֹשְׁבֵי יְרוּשָׁלִַם
  chosen: the inhabitants of Jerusalem
  alternatives:
  - those living in Jerusalem
  - the residents of Jerusalem
  lexicon: HALOT
  rationale: The construct participle literally means 'the dwellers/inhabitants of
    Jerusalem.' 'The inhabitants of Jerusalem' is precise and natural.
- source_word: וַיַּדַּח
  chosen: drove ... away
  alternatives:
  - led ... astray
  - impelled ... to apostasy
  lexicon: HALOT
  rationale: 'נדח in the Hiphil often means to drive away, banish, or lead astray
    from proper allegiance. In this context of covenant infidelity, the sense is metaphorical:
    he drove Judah away from faithfulness to the LORD. ''Drove ... away'' preserves
    the verbal force and allows the context to supply the implied object of departure.'
- source_word: אֶת יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: The direct object is the people/kingdom of Judah collectively. 'Judah'
    is the straightforward rendering and preserves the corporate sense.
