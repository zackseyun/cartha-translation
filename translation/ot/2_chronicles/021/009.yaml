id: 2CH.21.9
reference: 2 Chronicles 21:9
source:
  edition: WLC
  text: וַ/יַּֽעֲבֹ֤ר יְהוֹרָם֙ עִם שָׂרָ֔י/ו וְ/כָל הָ/רֶ֖כֶב עִמּ֑/וֹ וַ/יְהִי֙
    קָ֣ם לַ֔יְלָה וַ/יַּ֗ךְ אֶת אֱדוֹם֙ הַ/סּוֹבֵ֣ב אֵלָ֔י/ו וְ/אֵ֖ת שָׂרֵ֥י הָ/רָֽכֶב־־־׃
translation:
  text: So Jehoram crossed over with his commanders and all the chariots with him.
    And it happened that he arose by night and struck Edom, which had surrounded him,
    and the commanders of the chariots.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chariot commanders.' The Hebrew phrase may refer specifically to
      officers over the chariot force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר
  chosen: crossed over
  alternatives:
  - went over
  - passed over
  - marched out
  lexicon: HALOT
  rationale: The verb עבר broadly means to pass or cross over. In this military context,
    'crossed over' preserves the concrete movement without over-interpreting the destination
    or tactic.
- source_word: שָׂרָיו
  chosen: his commanders
  alternatives:
  - his princes
  - his officers
  - his captains
  lexicon: HALOT
  rationale: שַׂר can denote a ruler, official, or military leader. Given the immediate
    military setting with chariots, 'commanders' best fits the context.
- source_word: הָרֶכֶב
  chosen: the chariots
  alternatives:
  - the chariot force
  - the cavalry
  lexicon: HALOT
  rationale: רֶכֶב often refers collectively to chariots or chariotry. 'The chariots'
    is a natural English collective rendering that stays close to the Hebrew.
- source_word: וַיְהִי קָם לַיְלָה
  chosen: And it happened that he arose by night
  alternatives:
  - Then he rose at night
  - He got up by night
  lexicon: HALOT
  rationale: The Hebrew uses the common narrative formula ויהי plus participle. 'And
    it happened that he arose by night' preserves the sequence and nighttime action
    while remaining readable.
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - attacked
  - defeated
  - smote
  lexicon: HALOT
  rationale: נכה is a broad verb meaning to strike or smite. 'Struck' is suitably
    literal and does not claim more than the text states, unlike 'defeated'.
- source_word: אֱדוֹם
  chosen: Edom
  lexicon: HALOT
  rationale: Proper national name; standard English transliteration is retained.
- source_word: הַסּוֹבֵב אֵלָיו
  chosen: which had surrounded him
  alternatives:
  - that was around him
  - surrounding him
  lexicon: HALOT
  rationale: The participle from סבב with the preposition 'to/around him' most naturally
    describes Edom as encircling Jehoram. The relative clause in English makes the
    sense explicit and smooth.
- source_word: שָׂרֵי הָרָכֶב
  chosen: the commanders of the chariots
  alternatives:
  - the chariot commanders
  - the officers of the chariot force
  lexicon: HALOT
  rationale: This phrase likely refers to the leaders associated with the chariot
    corps. 'The commanders of the chariots' is transparent and close to the Hebrew
    structure.
