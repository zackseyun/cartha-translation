id: 2CH.21.12
reference: 2 Chronicles 21:12
source:
  edition: WLC
  text: וַ/יָּבֹ֤א אֵלָי/ו֙ מִכְתָּ֔ב מֵֽ/אֵלִיָּ֥הוּ הַ/נָּבִ֖יא לֵ/אמֹ֑ר כֹּ֣ה אָמַ֣ר יְהוָ֗ה אֱלֹהֵי֙ דָּוִ֣יד אָבִ֔י/ךָ תַּ֗חַת אֲשֶׁ֤ר לֹֽא הָלַ֨כְתָּ֙ בְּ/דַרְכֵי֙ יְהוֹשָׁפָ֣ט אָבִ֔י/ךָ וּ/בְ/דַרְכֵ֖י אָסָ֥א מֶֽלֶךְ יְהוּדָֽה׀־־׃
translation:
  text: 'Then a letter came to him from Elijah the prophet, saying, “Thus says Yahweh, the God of David your father: Because you have not walked in the ways of Jehoshaphat your father or in the ways of Asa king of Judah,”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “and in the ways of Asa king of Judah.” Hebrew has “and,” but English often uses “or” after a negation: “not ... or ...”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא אֵלָיו
  chosen: Then a letter came to him
  alternatives:
  - Then there came to him
  - Then he received
  lexicon: HALOT
  rationale: The verb is singular masculine ('came') with מִכְתָּב as the following subject, yielding the natural English construction 'a letter came to him.' 'Then' reflects the narrative waw. 'He received' is possible dynamically but less transparent to the Hebrew syntax.
- source_word: מִכְתָּב
  chosen: a letter
  alternatives:
  - a written message
  lexicon: HALOT
  rationale: The noun straightforwardly denotes a written document or letter. 'Letter' is the most natural and specific English equivalent in this context.
- source_word: מֵאֵלִיָּהוּ הַנָּבִיא
  chosen: from Elijah the prophet
  alternatives:
  - from Elijah, the prophet
  lexicon: HALOT
  rationale: Personal name is transliterated per project philosophy, and the title is translated. The appositional phrase is rendered directly and naturally in English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - which said
  lexicon: HALOT
  rationale: Standard introductory formula for quoted speech; 'saying' preserves the Hebrew discourse marker without overtranslation.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. Present-tense 'says' is idiomatic in English for formal prophetic citation, even though the Hebrew form is qatal.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי דָּוִיד אָבִיךָ
  chosen: the God of David your father
  alternatives:
  - the God of your father David
  lexicon: HALOT
  rationale: Both are possible in English. The chosen order closely follows the Hebrew construct chain while remaining natural. 'Your father' here means ancestor/forefather in dynastic context, not immediate parent.
- source_word: תַּחַת אֲשֶׁר
  chosen: Because
  alternatives:
  - Inasmuch as
  - On account of the fact that
  - Instead of that
  lexicon: HALOT
  rationale: In this context the phrase introduces the reason for coming judgment in the following verses. 'Because' captures the causal force clearly in modern English. A more literal 'instead of which' would be awkward and less idiomatic here.
- source_word: לֹא הָלַכְתָּ
  chosen: you have not walked
  alternatives:
  - you did not walk
  - you have not lived
  lexicon: HALOT
  rationale: '''Walked'' preserves the common Hebrew metaphor for conduct. Present perfect works well in English to describe the king''s established pattern up to this point.'
- source_word: בְּדַרְכֵי
  chosen: in the ways of
  alternatives:
  - in the paths of
  - according to the ways of
  lexicon: HALOT
  rationale: This idiom refers to manner of life or conduct. 'Ways' is the standard and transparent rendering.
- source_word: יְהוֹשָׁפָט אָבִיךָ
  chosen: Jehoshaphat your father
  alternatives:
  - your father Jehoshaphat
  lexicon: HALOT
  rationale: Name is transliterated conventionally. 'Your father' is retained literally, though in royal genealogy it can denote immediate father here as well.
- source_word: וּבְדַרְכֵי אָסָא מֶלֶךְ יְהוּדָה
  chosen: or in the ways of Asa king of Judah
  alternatives:
  - and in the ways of Asa king of Judah
  lexicon: HALOT
  rationale: 'The conjunction is formally ''and,'' but with the preceding negation English idiom commonly uses ''or'' in a correlative negative construction: ''not ... or ...''. This preserves the sense that he failed to follow either model. ''King of Judah'' is rendered directly.'
