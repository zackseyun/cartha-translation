id: 2CH.21.3
reference: 2 Chronicles 21:3
source:
  edition: WLC
  text: וַ/יִּתֵּ֣ן לָ/הֶ֣ם אֲ֠בִי/הֶם מַתָּנ֨וֹת רַבּ֜וֹת לְ/כֶ֤סֶף וּ/לְ/זָהָב֙
    וּ/לְ/מִגְדָּנ֔וֹת עִם עָרֵ֥י מְצֻר֖וֹת בִּֽ/יהוּדָ֑ה וְ/אֶת הַ/מַּמְלָכָ֛ה נָתַ֥ן
    לִֽ/יהוֹרָ֖ם כִּי ה֥וּא הַ/בְּכֽוֹר׀־־־׃פ
translation:
  text: Their father gave them many gifts of silver, gold, and precious things, along
    with fortified cities in Judah; but he gave the kingdom to Jehoram, because he
    was the firstborn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'choice things' or 'costly gifts' for 'precious things.' The Hebrew term
      can refer broadly to valuable or select items.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - had given
  lexicon: HALOT
  rationale: Common verb נתן in wayyiqtol narrative sequence; simple past 'gave' fits
    the storyline naturally.
- source_word: מַתָּנוֹת רַבּוֹת
  chosen: many gifts
  alternatives:
  - great gifts
  - numerous gifts
  lexicon: HALOT
  rationale: The noun-adjective combination straightforwardly denotes abundance of
    gifts. 'Many gifts' is idiomatic and preserves the quantitative sense of רַבּוֹת.
- source_word: לְכֶסֶף וּלְזָהָב
  chosen: of silver, gold
  alternatives:
  - in silver and gold
  - consisting of silver and gold
  lexicon: HALOT
  rationale: The prefixed ל here introduces the kinds or categories of gifts. English
    'gifts of silver, gold' communicates the material/value categories without over-specifying.
- source_word: וּלְמִגְדָּנוֹת
  chosen: and precious things
  alternatives:
  - and choice things
  - and delicacies
  - and costly gifts
  lexicon: HALOT
  rationale: מִגְדָּנוֹת can denote choice or precious items. In this royal inheritance
    context, 'precious things' best fits the broader list of valuables and avoids
    the narrower sense 'delicacies,' which could mislead modern readers toward food
    only.
- source_word: עִם עָרֵי מְצֻרוֹת
  chosen: along with fortified cities
  alternatives:
  - together with fortified cities
  - as well as fortified cities
  lexicon: HALOT
  rationale: עִם marks accompaniment. 'Along with' is natural English and preserves
    that the cities were given in addition to the movable gifts.
- source_word: בִּיהוּדָה
  chosen: in Judah
  lexicon: HALOT
  rationale: Simple locative phrase identifying the location of the fortified cities.
- source_word: וְאֶת הַמַּמְלָכָה נָתַן לִיהוֹרָם
  chosen: but he gave the kingdom to Jehoram
  alternatives:
  - and he gave the kingdom to Jehoram
  lexicon: HALOT
  rationale: Although the conjunction is formally 'and,' English idiom benefits from
    'but' to mark the contrast between gifts to the brothers and the kingdom to Jehoram.
    This is an optimal-equivalence adjustment reflecting the discourse contrast.
- source_word: כִּי הוּא הַבְּכוֹר
  chosen: because he was the firstborn
  alternatives:
  - for he was the firstborn
  lexicon: HALOT
  rationale: כִּי gives the reason for Jehoram receiving the kingdom. 'Because' is
    clear modern English; 'firstborn' preserves the legal/familial status signaled
    by הַבְּכוֹר.
