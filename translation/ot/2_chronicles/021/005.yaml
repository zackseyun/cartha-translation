id: 2CH.21.5
reference: 2 Chronicles 21:5
source:
  edition: WLC
  text: בֶּן שְׁלֹשִׁ֥ים וּ/שְׁתַּ֛יִם שָׁנָ֖ה יְהוֹרָ֣ם בְּ/מָלְכ֑/וֹ וּ/שְׁמוֹנֶ֣ה
    שָׁנִ֔ים מָלַ֖ךְ בִּ/ירוּשָׁלִָֽם־׃
translation:
  text: Jehoram was thirty-two years old when he became king, and he reigned eight
    years in Jerusalem.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן
  chosen: was ... years old
  alternatives:
  - son of
  lexicon: HALOT
  rationale: In age formulas, בֶּן + number + שָׁנָה is an idiom meaning someone was
    a given number of years old, not literally 'son of.' English idiom requires restructuring.
- source_word: שְׁלֹשִׁים וּשְׁתַּיִם שָׁנָה
  chosen: thirty-two years old
  alternatives:
  - a son of thirty-two years
  lexicon: HALOT
  rationale: This is the standard Hebrew age expression. 'Thirty-two years old' is
    the natural and accurate English equivalent.
- source_word: יְהוֹרָם
  chosen: Jehoram
  alternatives:
  - Joram
  rationale: Personal names are transliterated by standard English convention. 'Jehoram'
    reflects the fuller form of the Hebrew name here.
- source_word: בְּמָלְכוֹ
  chosen: when he became king
  alternatives:
  - in his reigning
  - when he began to reign
  - at his becoming king
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct with pronominal suffix marks
    the time of accession. 'When he became king' is clear modern English and preserves
    the temporal sense.
- source_word: וּשְׁמוֹנֶה שָׁנִים
  chosen: eight years
  lexicon: HALOT
  rationale: Straightforward numeral plus noun phrase indicating the duration of reign.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb means to reign or be king. 'He reigned' is the standard English
    rendering in regnal formulas and fits the duration phrase.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  rationale: Locative preposition with place name, indicating the seat/location of
    his reign.
