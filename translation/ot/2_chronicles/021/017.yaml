id: 2CH.21.17
reference: 2 Chronicles 21:17
source:
  edition: WLC
  text: וַ/יַּעֲל֤וּ בִֽ/יהוּדָה֙ וַ/יִּבְקָע֔וּ/הָ וַ/יִּשְׁבּ֗וּ אֵ֤ת כָּל הָ/רְכוּשׁ֙
    הַ/נִּמְצָ֣א לְ/בֵית הַ/מֶּ֔לֶךְ וְ/גַם בָּנָ֖י/ו וְ/נָשָׁ֑י/ו וְ/לֹ֤א נִשְׁאַר
    ל/וֹ֙ בֵּ֔ן כִּ֥י אִם יְהוֹאָחָ֖ז קְטֹ֥ן בָּנָֽי/ו־־־־־׃
translation:
  text: They came up against Judah and broke into it, and carried away all the possessions
    found in the king’s house, and also his sons and his wives, so that no son was
    left to him except Jehoahaz, the youngest of his sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jehoahaz is likely the same person elsewhere called Ahaziah (compare 2 Kings
      8:24–26; 2 Chronicles 22:1).
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲלוּ בִיהוּדָה
  chosen: They came up against Judah
  alternatives:
  - They went up into Judah
  - They invaded Judah
  lexicon: HALOT
  rationale: עלה with ב can denote movement up into a territory, and in military context
    naturally carries hostile advance. 'Came up against Judah' preserves the idiom
    while making the military sense clear without over-paraphrasing.
- source_word: וַיִּבְקָעוּהָ
  chosen: broke into it
  alternatives:
  - breached it
  - broke through it
  lexicon: HALOT
  rationale: בקע commonly means split, cleave, or break open. With Judah as the object,
    the sense is that the invaders forced entry/breached the land's defenses. 'Broke
    into it' is idiomatic modern English and fits the context.
- source_word: וַיִּשְׁבּוּ
  chosen: carried away
  alternatives:
  - took captive
  - captured
  lexicon: HALOT
  rationale: שבה often means take captive. Here it governs both property and persons
    in sequence; 'carried away' works naturally for both the possessions and the royal
    family members, preserving the plundering-and-captivity sense.
- source_word: כָּל הָרְכוּשׁ
  chosen: all the possessions
  alternatives:
  - all the property
  - all the goods
  lexicon: HALOT
  rationale: רכוש refers to movable property, goods, or possessions. 'Possessions'
    is broad enough to cover the royal wealth without sounding overly technical.
- source_word: הַנִּמְצָא לְבֵית הַמֶּלֶךְ
  chosen: found in the king’s house
  alternatives:
  - that was found in the king's palace
  - belonging to the king's house
  lexicon: HALOT
  rationale: נמצא means 'found' or 'present.' לבית המלך can mean the royal house/palace.
    'Found in the king’s house' stays close to the Hebrew while remaining readable;
    'house' can denote the palace contextually.
- source_word: וְגַם בָּנָיו וְנָשָׁיו
  chosen: and also his sons and his wives
  alternatives:
  - and even his sons and his wives
  lexicon: HALOT
  rationale: גם adds an emphatic extension to the list of what was taken. 'And also'
    preserves the additive force without exaggeration.
- source_word: וְלֹא נִשְׁאַר לוֹ בֵּן
  chosen: so that no son was left to him
  alternatives:
  - and no son remained to him
  - leaving him with no son
  lexicon: HALOT
  rationale: The passive Niphal of שׁאר expresses remaining. 'So that no son was left
    to him' captures the resultative force in smooth English.
- source_word: כִּי אִם
  chosen: except
  alternatives:
  - but only
  - save
  lexicon: HALOT
  rationale: כי אם here introduces the sole exception. 'Except' is the clearest natural
    rendering.
- source_word: יְהוֹאָחָז
  chosen: Jehoahaz
  alternatives:
  - Ahaziah
  lexicon: HALOT
  rationale: The Masoretic Text reads Jehoahaz here. Although the parallel dynastic
    naming tradition elsewhere associates Jehoram's surviving son with Ahaziah, the
    translation should follow the given Hebrew text in the main line and preserve
    the alternative identification in a footnote.
- source_word: קְטֹן בָּנָיו
  chosen: the youngest of his sons
  alternatives:
  - the smallest of his sons
  - his youngest son
  lexicon: HALOT
  rationale: קטן in this familial context denotes youth/youngest status rather than
    physical size. 'The youngest of his sons' reflects the construct relationship
    clearly.
