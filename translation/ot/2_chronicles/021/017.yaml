theological_decisions:
- issue: Name form of Jehoram's surviving son
  chosen_reading: Retain the MT personal name 'Jehoahaz' in the main text
  alternative_readings:
  - Identify him as 'Ahaziah' based on parallel passages and likely alternate throne/name
    form
  rationale: This is primarily a textual/narrative identification issue rather than
    a doctrinal one. Following original-language primacy, the main text keeps the
    Hebrew reading Jehoahaz. Because readers may know the son as Ahaziah from related
    passages, the alternative is preserved in a footnote for transparency.
  doctrine_reference: Translation philosophy §1, §3
