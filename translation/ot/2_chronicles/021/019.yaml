id: 2CH.21.19
reference: 2 Chronicles 21:19
source:
  edition: WLC
  text: וַ/יְהִ֣י לְ/יָמִ֣ים מִ/יָּמִ֡ים וּ/כְ/עֵת֩ צֵ֨את הַ/קֵּ֜ץ לְ/יָמִ֣ים שְׁנַ֗יִם
    יָצְא֤וּ מֵעָי/ו֙ עִם חָלְי֔/וֹ וַ/יָּ֖מָת בְּ/תַחֲלֻאִ֣ים רָעִ֑ים וְ/לֹא עָ֨שׂוּ
    ל֥/וֹ עַמּ֛/וֹ שְׂרֵפָ֖ה כִּ/שְׂרֵפַ֥ת אֲבֹתָֽי/ו׀־־׃
translation:
  text: And after some time, at the end of two years, his bowels came out because
    of his sickness, and he died in severe diseases. And his people made no burning
    for him like the burning for his fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his intestines came out.' The Hebrew literally refers to his inward
      organs.
    reason: lexical_alternative
  - marker: b
    text: The 'burning' here likely refers to a funerary honor, such as the burning
      of spices, not the cremation of his body; compare royal burial customs elsewhere
      in Chronicles.
    reason: cultural_note
lexical_decisions:
- source_word: לְיָמִים מִיָּמִים
  chosen: after some time
  alternatives:
  - from days to days
  - after days from days
  lexicon: HALOT
  rationale: The idiom marks the passage of an indefinite period of time. A wooden
    rendering would be obscure in English, so an idiomatic equivalent is preferred.
- source_word: וּכְעֵת צֵאת הַקֵּץ לְיָמִים שְׁנַיִם
  chosen: at the end of two years
  alternatives:
  - when the time came for the end of two years
  - about the time of the end, after two years
  lexicon: HALOT
  rationale: The phrase specifies the terminus of the illness as two years. 'At the
    end of two years' is clear modern English and preserves the temporal force.
- source_word: מֵעָיו
  chosen: his bowels
  alternatives:
  - his intestines
  - his inward parts
  lexicon: HALOT
  rationale: The noun refers concretely to the internal organs, especially the intestines/bowels.
    'Bowels' is traditional and still understandable, while preserving the graphic
    force of the Hebrew. A more clinical 'intestines' is possible but slightly narrows
    the term.
- source_word: יָצְאוּ מֵעָיו
  chosen: his bowels came out
  alternatives:
  - his intestines came out
  - his inward parts came out
  lexicon: HALOT
  rationale: The verb יצא retains its ordinary sense 'go out/come out.' The text describes
    a gruesome physical event and should not be softened.
- source_word: עִם חָלְיוֹ
  chosen: because of his sickness
  alternatives:
  - with his sickness
  - along with his sickness
  lexicon: HALOT
  rationale: Although עִם commonly means 'with,' in this context it expresses attendant
    cause or circumstance. 'Because of his sickness' communicates the likely sense
    in natural English.
- source_word: בְּתַחֲלֻאִים רָעִים
  chosen: in severe diseases
  alternatives:
  - with grievous diseases
  - through evil illnesses
  lexicon: HALOT
  rationale: The plural noun with adjective conveys intensely painful or grievous
    sicknesses. 'Severe diseases' is readable modern English and preserves the plural
    expression.
- source_word: שְׂרֵפָה
  chosen: burning
  alternatives:
  - funeral fire
  - burning ceremony
  lexicon: HALOT
  rationale: The term refers not to cremation of the body but to a ceremonial burning
    in honor of the deceased, as in royal burial customs. 'Burning' keeps close to
    the Hebrew; the cultural sense is clarified in a footnote.
- source_word: כִּשְׂרֵפַת אֲבֹתָיו
  chosen: like the burning for his fathers
  alternatives:
  - as for his fathers
  - like the funeral burning of his fathers
  lexicon: HALOT
  rationale: The comparison is to the honor shown previous kings/ancestors. 'For his
    fathers' reflects the commemorative sense without implying their bodies were burned.
