theological_decisions:
- issue: Nature of שְׂרֵפָה in royal burial context
  chosen_reading: a funerary honorific burning, not cremation of Jehoram's body
  alternative_readings:
  - cremation
  - unspecified burning rite
  rationale: In the Chronicler's royal context, the statement contrasts honors given
    to prior kings with honors withheld from Jehoram. Rendering the noun as 'burning'
    in the text preserves lexical transparency, while a footnote explains that this
    likely refers to a ceremonial burning of spices or similar honors rather than
    cremation.
