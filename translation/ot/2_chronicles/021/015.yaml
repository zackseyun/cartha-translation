id: 2CH.21.15
reference: 2 Chronicles 21:15
source:
  edition: WLC
  text: וְ/אַתָּ֛ה בָּ/חֳלָיִ֥ים רַבִּ֖ים בְּ/מַחֲלֵ֣ה מֵעֶ֑י/ךָ עַד יֵצְא֤וּ מֵעֶ֨י/ךָ֙
    מִן הַ/חֹ֔לִי יָמִ֖ים עַל יָמִֽים־־־׃
translation:
  text: And you yourself will suffer many illnesses, with a disease of your bowels,
    until your bowels come out because of the disease, day after day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your intestines' for 'your bowels'; the Hebrew term refers to the inner
      organs.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'days upon days,' an idiom meaning 'day after day' or 'for many days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  chosen: And you yourself
  alternatives:
  - And you
  - But you
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a direct, emphatic shift
    to Jehoram personally. 'You yourself' preserves the emphasis better than a simple
    'you.'
- source_word: בָּחֳלָיִים רַבִּים
  chosen: will suffer many illnesses
  alternatives:
  - with many sicknesses
  - in many diseases
  lexicon: HALOT
  rationale: The preposition ב with חֳלָיִים is idiomatic here, expressing the condition
    or affliction that will be experienced. 'Will suffer many illnesses' gives natural
    English while preserving the plurality and severity.
- source_word: בְּמַחֲלֵה
  chosen: with a disease
  alternatives:
  - by a disease
  - from a disease
  lexicon: HALOT
  rationale: Introduces the specific affliction that explains the preceding general
    statement. 'With a disease' is natural and keeps the instrumental/associative
    force without overinterpreting.
- source_word: מֵעֶיךָ
  chosen: of your bowels
  alternatives:
  - of your intestines
  - of your inward parts
  lexicon: HALOT
  rationale: מֵעֶה refers to internal organs, especially bowels/intestines. 'Bowels'
    is traditional but still understandable in this medical context and matches the
    repeated term. 'Intestines' is possible but slightly more anatomically specific
    than the Hebrew may require.
- source_word: עַד יֵצְאוּ מֵעֶיךָ
  chosen: until your bowels come out
  alternatives:
  - until your intestines come out
  - until your inward parts come out
  lexicon: HALOT
  rationale: The clause describes the horrifying result of the disease in direct terms.
    'Come out' is the plain sense of יצא and should not be softened.
- source_word: מִן הַחֹלִי
  chosen: because of the disease
  alternatives:
  - from the disease
  - due to the sickness
  lexicon: HALOT
  rationale: 'The preposition מן here is causal: the bowels come out as a result of
    the disease. ''Because of the disease'' communicates this clearly in English.'
- source_word: יָמִים עַל יָמִים
  chosen: day after day
  alternatives:
  - for days
  - days upon days
  - day by day
  lexicon: HALOT
  rationale: This idiom conveys an ongoing process over successive days. 'Day after
    day' is idiomatic modern English and preserves the durative force.
