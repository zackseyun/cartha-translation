id: 2CH.21.8
reference: 2 Chronicles 21:8
source:
  edition: WLC
  text: בְּ/יָמָי/ו֙ פָּשַׁ֣ע אֱד֔וֹם מִ/תַּ֖חַת יַד יְהוּדָ֑ה וַ/יַּמְלִ֥יכוּ עֲלֵי/הֶ֖ם
    מֶֽלֶךְ־׃
translation:
  text: In his days Edom rebelled from under the hand of Judah and made a king over
    themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'revolted from Judah's control.' The Hebrew literally says 'rebelled
      from under the hand of Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיָמָיו
  chosen: In his days
  alternatives:
  - During his reign
  - In his time
  lexicon: HALOT
  rationale: Temporal idiom marking the period of Jehoram's rule. 'In his days' is
    a natural, fairly formal rendering that preserves the Hebrew expression without
    over-paraphrasing.
- source_word: פָּשַׁע
  chosen: rebelled
  alternatives:
  - revolted
  - transgressed
  lexicon: HALOT
  rationale: In this political context with Edom breaking away from Judah's control,
    the verb denotes rebellion/revolt rather than moral transgression in the abstract.
    'Rebelled' is concise and idiomatic.
- source_word: אֱדוֹם
  chosen: Edom
  rationale: Standard transliteration of the place/people name, in keeping with the
    policy to transliterate names.
- source_word: מִתַּחַת יַד יְהוּדָה
  chosen: from under the hand of Judah
  alternatives:
  - from Judah's control
  - from under Judah's power
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of being under someone's hand, meaning
    under authority or domination. The main text keeps the concrete idiom because
    it is intelligible in English and preserves the source texture.
- source_word: וַיַּמְלִיכוּ
  chosen: made
  alternatives:
  - appointed
  - set up
  - crowned
  lexicon: HALOT
  rationale: Hiphil of מלך here means to cause someone to reign, i.e., to install
    as king. 'Made' is a straightforward rendering when followed by 'a king over themselves.'
- source_word: עֲלֵיהֶם
  chosen: over themselves
  alternatives:
  - over them
  lexicon: HALOT
  rationale: The preposition with 3mp suffix indicates that the Edomites set a king
    over themselves. 'Over themselves' makes the reflexive sense explicit in idiomatic
    English.
- source_word: מֶלֶךְ
  chosen: a king
  alternatives:
  - king
  lexicon: HALOT
  rationale: 'The noun is indefinite in Hebrew here; English idiom naturally supplies
    the article: ''made a king over themselves.'''
