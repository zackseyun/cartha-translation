id: 2CH.21.1
reference: 2 Chronicles 21:1
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב יְהֽוֹשָׁפָט֙ עִם אֲבֹתָ֔י/ו וַ/יִּקָּבֵ֥ר עִם אֲבֹתָ֖י/ו בְּ/עִ֣יר
    דָּוִ֑יד וַ/יִּמְלֹ֛ךְ יְהוֹרָ֥ם בְּנ֖/וֹ תַּחְתָּֽי/ו־־׃
translation:
  text: And Jehoshaphat slept with his fathers and was buried with his fathers in
    the city of David, and Jehoram his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'died'; literally 'slept with his fathers.'
    reason: lexical_alternative
  - marker: b
    text: '''With his fathers'' is a Hebrew idiom for joining one''s ancestors in
      death and burial.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: The idiom שׁכב עם־אבות regularly refers to death in royal notices. 'Slept
    with his fathers' preserves the Hebrew idiom and its conventional memorial tone
    better than the more interpretive 'died'.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: A standard dynastic idiom. 'Fathers' is more formally aligned with the
    Hebrew and common biblical usage; 'ancestors' is possible but less transparent
    to the source phrasing.
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - was entombed
  lexicon: HALOT
  rationale: Straightforward passive rendering of קבר in the narrative sequence.
- source_word: בְּעִיר דָּוִיד
  chosen: in the city of David
  alternatives:
  - in David's city
  lexicon: HALOT
  rationale: This is the standard biblical place-name expression and should be preserved
    in familiar form.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: The verb מלך in this succession formula is well rendered by 'reigned.'
    'Became king' is possible, but 'reigned' better matches the conventional royal
    notice style.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: '''In his place'' naturally conveys succession while closely reflecting
    the sense of תחתיו. ''After him'' is weaker, and ''instead of him'' can sound
    overly contrastive in English.'
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: יְהוֹרָם
  chosen: Jehoram
  alternatives:
  - Joram
  rationale: The Hebrew form here is יְהוֹרָם, so 'Jehoram' is the more direct transliteration;
    'Joram' reflects a shortened variant used elsewhere.
