id: 2CH.27.9
reference: 2 Chronicles 27:9
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב יוֹתָם֙ עִם אֲבֹתָ֔י/ו וַ/יִּקְבְּר֥וּ אֹת֖/וֹ בְּ/עִ֣יר דָּוִ֑יד
    וַ/יִּמְלֹ֛ךְ אָחָ֥ז בְּנ֖/וֹ תַּחְתָּֽי/ו־׃פ
translation:
  text: And Jotham slept with his fathers, and they buried him in the city of David.
    And Ahaz his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'died with his fathers.' The Hebrew says 'slept
      with his fathers,' a standard royal death formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: In royal obituary formulae, שׁכב with 'with his fathers' is an idiomatic
    expression for death. 'Slept' preserves the Hebrew wording and the conventional
    formula better than the interpretive 'died.'
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is the standard dynastic burial/death formula. 'Fathers' is more
    formally aligned with the Hebrew and preserves the idiom; 'ancestors' is possible
    but less literal.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  chosen: they buried him
  alternatives:
  - he was buried
  lexicon: HALOT
  rationale: The Hebrew verb is active plural, not passive. English idiom naturally
    uses the indefinite subject 'they' for such cases.
- source_word: בְּעִיר דָּוִיד
  chosen: in the city of David
  alternatives:
  - in David's city
  lexicon: HALOT
  rationale: This is the conventional place-name expression. 'The city of David' is
    the standard transparent rendering and preserves the proper-name construction.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: The verb מלך denotes exercising kingship. 'Reigned' is concise and idiomatic
    in succession notices; 'became king' is possible but slightly less direct.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - after him
  - instead of him
  lexicon: HALOT
  rationale: In succession contexts, תַּחַת commonly indicates replacement/succession.
    'In his place' is natural English and accurately conveys dynastic succession.
- source_word: יוֹתָם
  chosen: Jotham
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: אָחָז
  chosen: Ahaz
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: בְּנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: Straightforward filial designation; retained explicitly to preserve the
    succession formula.
