id: 2CH.27.5
reference: 2 Chronicles 27:5
source:
  edition: WLC
  text: וְ֠/הוּא נִלְחַ֞ם עִם מֶ֣לֶךְ בְּנֵי עַמּוֹן֮ וַ/יֶּחֱזַ֣ק עֲלֵי/הֶם֒ וַ/יִּתְּנוּ
    ל֨/וֹ בְנֵֽי עַמּ֜וֹן בַּ/שָּׁנָ֣ה הַ/הִ֗יא מֵאָה֙ כִּכַּר כֶּ֔סֶף וַ/עֲשֶׂ֨רֶת
    אֲלָפִ֤ים כֹּרִים֙ חִטִּ֔ים וּ/שְׂעוֹרִ֖ים עֲשֶׂ֣רֶת אֲלָפִ֑ים זֹ֗את הֵשִׁ֤יבוּ
    ל/וֹ֙ בְּנֵ֣י עַמּ֔וֹן וּ/בַ/שָּׁנָ֥ה הַ/שֵּׁנִ֖ית וְ/הַ/שְּׁלִשִֽׁית־־־־־ס׃
translation:
  text: He fought with the king of the Ammonites and prevailed against them, and the
    Ammonites gave him that year one hundred talents of silver, ten thousand cors
    of wheat, and ten thousand of barley. This the Ammonites paid to him also in the
    second year and in the third.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'ten thousand cors of wheat, and ten thousand of barley'; the measure
      'cors' is understood with 'barley' as well.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִלְחַם עִם
  chosen: fought with
  alternatives:
  - fought against
  - made war with
  lexicon: HALOT
  rationale: The Niphal of לחם with עִם commonly denotes engaging in battle with/against.
    In English, 'fought with' is idiomatic here, while the following clause clarifies
    hostility by saying he prevailed against them.
- source_word: מֶלֶךְ בְּנֵי עַמּוֹן
  chosen: the king of the Ammonites
  alternatives:
  - the king of the sons of Ammon
  - the king of the people of Ammon
  lexicon: HALOT
  rationale: בְּנֵי עַמּוֹן is the standard ethnogeographic expression for the Ammonite
    people. 'The Ammonites' is natural English and preserves the referent.
- source_word: וַיֶּחֱזַק עֲלֵיהֶם
  chosen: prevailed against them
  alternatives:
  - was strong against them
  - became stronger than them
  - gained the upper hand over them
  lexicon: HALOT
  rationale: חזק with עַל in military context conveys overpowering or prevailing,
    not merely becoming physically strong. 'Prevailed against them' captures the result
    of victory in readable English.
- source_word: וַיִּתְּנוּ לוֹ
  chosen: gave him
  alternatives:
  - paid him
  - rendered to him
  lexicon: HALOT
  rationale: The basic verb is 'gave,' and that is retained in the first occurrence.
    The broader context shows this is tribute, but the simple verbal sense should
    remain in the main clause.
- source_word: בַּשָּׁנָה הַהִיא
  chosen: that year
  alternatives:
  - in that year
  lexicon: HALOT
  rationale: A concise temporal rendering that preserves the demonstrative force without
    sounding wooden.
- source_word: מֵאָה כִּכַּר כֶּסֶף
  chosen: one hundred talents of silver
  alternatives:
  - a hundred talents of silver
  lexicon: HALOT
  rationale: כִּכַּר is a weight measure conventionally rendered 'talent.' This is
    the most recognizable English equivalent for the ancient unit.
- source_word: כֹּרִים
  chosen: cors
  alternatives:
  - kor-measures
  - measures
  lexicon: HALOT
  rationale: כֹּר is a dry measure. 'Cors' transliterates the unit while preserving
    specificity better than the generic 'measures.'
- source_word: חִטִּים
  chosen: wheat
  lexicon: HALOT
  rationale: Standard lexical sense.
- source_word: וּשְׂעוֹרִים עֲשֶׂרֶת אֲלָפִים
  chosen: and ten thousand of barley
  alternatives:
  - and ten thousand cors of barley
  lexicon: HALOT
  rationale: The Hebrew omits repeating כֹּרִים after barley, but the measure is naturally
    understood from the previous phrase. To avoid overfilling the text, the main translation
    leaves the ellipsis implicit, while the fuller alternative is preserved in a footnote.
- source_word: זֹאת הֵשִׁיבוּ לוֹ
  chosen: This ... paid to him
  alternatives:
  - This they returned to him
  - This they brought back to him
  - This they rendered to him
  lexicon: HALOT
  rationale: הֵשִׁיבוּ literally means 'returned/brought back,' but in tribute context
    it refers to rendering payment again. 'Paid to him' communicates the economic
    sense clearly in English.
- source_word: וּבַשָּׁנָה הַשֵּׁנִית וְהַשְּׁלִשִׁית
  chosen: also in the second year and in the third
  alternatives:
  - and in the second year and the third
  - in the second and third years as well
  lexicon: HALOT
  rationale: The phrase indicates repetition of the same tribute in each of the next
    two years. 'Also' makes the continuation explicit and natural in English.
