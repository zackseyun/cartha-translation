id: 2CH.27.1
reference: 2 Chronicles 27:1
source:
  edition: WLC
  text: בֶּן עֶשְׂרִ֨ים וְ/חָמֵ֤שׁ שָׁנָה֙ יוֹתָ֣ם בְּ/מָלְכ֔/וֹ וְ/שֵׁשׁ עֶשְׂרֵ֣ה
    שָׁנָ֔ה מָלַ֖ךְ בִּֽ/ירוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ יְרוּשָׁ֖ה בַּת צָדֽוֹק־־־׃
translation:
  text: Jotham was twenty-five years old when he began to reign, and he reigned sixteen
    years in Jerusalem. His mother’s name was Jerushah daughter of Zadok.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְחָמֵשׁ שָׁנָה
  chosen: was twenty-five years old
  alternatives:
  - was a son of twenty-five years
  lexicon: HALOT
  rationale: This Hebrew age formula is idiomatically rendered in natural English
    as 'was twenty-five years old' rather than a wooden literalism.
- source_word: בְּמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - at his becoming king
  - when he became king
  lexicon: HALOT
  rationale: The preposition ב plus infinitive/verb-noun construction marks the time
    of accession. 'When he began to reign' is a standard, clear English rendering
    in regnal formulas.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb specifically denotes exercising kingship/reigning, not merely
    holding the title.
- source_word: בִּירוּשָׁלָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative use of the preposition ב.
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: Rendered idiomatically while preserving the genealogical notice formula.
- source_word: יְרוּשָׁה
  chosen: Jerushah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: בַּת צָדוֹק
  chosen: daughter of Zadok
  lexicon: HALOT
  rationale: Standard filial expression identifying maternal lineage.
