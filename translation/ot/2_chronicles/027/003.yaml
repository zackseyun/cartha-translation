id: 2CH.27.3
reference: 2 Chronicles 27:3
source:
  edition: WLC
  text: ה֗וּא בָּנָ֛ה אֶת שַׁ֥עַר בֵּית יְהוָ֖ה הָ/עֶלְי֑וֹן וּ/בְ/חוֹמַ֥ת הָ/עֹ֛פֶל בָּנָ֖ה לָ/רֹֽב־־׃
translation:
  text: He built the upper gate of the house of Yahweh, and on the wall of the Ophel he built much.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he built much' or 'he built in abundance' on the wall of the Ophel.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנָה
  chosen: built
  alternatives:
  - rebuilt
  - constructed
  lexicon: HALOT
  rationale: Standard sense of the verb is 'build/construct.' Nothing in the immediate context requires the more specific 'rebuild,' so the simple past 'built' best matches the Hebrew.
- source_word: שַׁעַר
  chosen: gate
  alternatives:
  - gateway
  lexicon: HALOT
  rationale: The noun commonly denotes a city or temple gate. 'Gate' is the natural English equivalent and fits the architectural context.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew expression while remaining clear in English. 'Temple' is possible but less formally tied to the source wording.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הָעֶלְיוֹן
  chosen: upper
  alternatives:
  - uppermost
  - high
  lexicon: HALOT
  rationale: As an attributive adjective modifying 'gate,' it identifies the gate's location as the upper gate. 'Upper' is the most idiomatic and precise rendering here.
- source_word: וּבְחוֹמַת
  chosen: and on the wall of
  alternatives:
  - and in the wall of
  - and against the wall of
  lexicon: HALOT
  rationale: The preposition ב with 'wall' in a building context can indicate work done on or at the wall. 'On the wall of' is idiomatic English for construction activity associated with a fortification.
- source_word: הָעֹפֶל
  chosen: the Ophel
  alternatives:
  - Ophel
  lexicon: HALOT
  rationale: This is a proper place name/designation for the raised fortified area in Jerusalem. It is best transliterated rather than translated.
- source_word: לָרֹב
  chosen: extensively
  alternatives:
  - in abundance
  - greatly
  - much
  lexicon: HALOT
  rationale: The phrase indicates the extent or quantity of his building activity. 'Extensively' communicates that he built a great deal there in natural modern English. A more literal 'in abundance' is possible but less idiomatic in this construction.
