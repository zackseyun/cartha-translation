id: 2CH.27.2
reference: 2 Chronicles 27:2
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ הַ/יָּשָׁ֜ר בְּ/עֵינֵ֣י יְהוָ֗ה כְּ/כֹ֤ל אֲשֶׁר עָשָׂה֙ עֻזִּיָּ֣הוּ
    אָבִ֔י/ו רַ֕ק לֹא בָ֖א אֶל הֵיכַ֣ל יְהוָ֑ה וְ/ע֥וֹד הָ/עָ֖ם מַשְׁחִיתִֽים־־־׃
translation:
  text: He did what was right in the eyes of the LORD, according to all that his father
    Uzziah had done—except that he did not enter the temple of the LORD. But the people
    still acted corruptly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he did not go into the temple of the LORD.' The clause likely contrasts
      Jotham with Uzziah, who unlawfully entered the temple (see 2 Chr 26:16–21).
    reason: cross_reference
  - marker: b
    text: Or 'the people still were corrupting themselves' / 'the people still behaved
      corruptly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: Wayyiqtol of עשה narrates the next event in sequence. English idiom does
    not require the initial 'and,' so 'He did' is a natural narrative rendering.
- source_word: הַיָּשָׁר
  chosen: what was right
  alternatives:
  - the right
  - what was upright
  lexicon: HALOT
  rationale: 'The adjective with article functions substantivally: ''the right/upright
    thing.'' ''What was right'' is standard, clear English and preserves the moral
    evaluation.'
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a common Hebrew evaluative idiom. 'In the eyes of the LORD' keeps
    the source imagery while remaining understandable. 'the LORD' follows the project
    default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per project doctrine, the covenant name is rendered 'the LORD' rather
    than transliterated.
- source_word: כְּכֹל אֲשֶׁר עָשָׂה
  chosen: according to all that ... had done
  alternatives:
  - just as ... did
  - according to everything that ... did
  lexicon: HALOT
  rationale: כְּכֹל אֲשֶׁר expresses conformity to a prior pattern. 'According to
    all that ... had done' preserves the comprehensive comparison and reads naturally
    in English.
- source_word: עֻזִּיָּהוּ אָבִיו
  chosen: his father Uzziah
  alternatives:
  - Uzziah his father
  lexicon: HALOT
  rationale: The name is transliterated, and the construct with suffix is rendered
    in natural English order.
- source_word: רַק
  chosen: except that
  alternatives:
  - only
  - however
  - nevertheless
  lexicon: HALOT
  rationale: רַק introduces a limitation to the comparison with Uzziah. 'Except that'
    makes explicit that the following clause qualifies the preceding statement.
- source_word: לֹא בָא אֶל הֵיכַל יְהוָה
  chosen: he did not enter the temple of the LORD
  alternatives:
  - he did not go into the temple of the LORD
  - he did not come into the temple of the LORD
  lexicon: HALOT
  rationale: בוא + אֶל here denotes entering/going into. 'Enter' is concise and idiomatic.
    הֵיכָל is best rendered 'temple' in this context, referring to the sanctuary complex/building
    of the LORD.
- source_word: וְעוֹד
  chosen: But ... still
  alternatives:
  - And still
  - Meanwhile
  - Yet
  lexicon: HALOT
  rationale: The adverb marks continuation of an undesirable state despite the king's
    relative faithfulness. Rendering the clause as 'But the people still...' captures
    both continuity and contrast in context.
- source_word: הָעָם
  chosen: the people
  lexicon: HALOT
  rationale: A straightforward rendering of the collective noun.
- source_word: מַשְׁחִיתִים
  chosen: acted corruptly
  alternatives:
  - were still corrupting themselves
  - continued to be corrupt
  - were acting ruinously
  lexicon: HALOT
  rationale: The Hiphil participle of שׁחת can denote acting corruptly or causing
    corruption. In this context, describing the people's ongoing moral/religious degeneration,
    'acted corruptly' is idiomatic and captures the continuing aspect without over-specifying
    the object.
