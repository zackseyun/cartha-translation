id: 2CH.27.8
reference: 2 Chronicles 27:8
source:
  edition: WLC
  text: בֶּן עֶשְׂרִ֧ים וְ/חָמֵ֛שׁ שָׁנָ֖ה הָיָ֣ה בְ/מָלְכ֑/וֹ וְ/שֵׁשׁ עֶשְׂרֵ֣ה
    שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָֽם־־׃
translation:
  text: He was twenty-five years old when he began to reign, and he reigned sixteen
    years in Jerusalem.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְחָמֵשׁ שָׁנָה
  chosen: twenty-five years old
  alternatives:
  - a son of twenty-five years
  - twenty-five years of age
  lexicon: HALOT
  rationale: This is the standard Hebrew age formula. Idiomatic English requires 'twenty-five
    years old' rather than a wooden rendering like 'a son of twenty-five years.'
- source_word: הָיָה בְמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - when he became king
  - at his reigning
  lexicon: HALOT
  rationale: Literally 'he was in his reigning,' an idiom introducing the age at accession.
    'When he began to reign' is a natural English equivalent that preserves the temporal
    sense without paraphrasing beyond the formula's function.
- source_word: וְשֵׁשׁ עֶשְׂרֵה שָׁנָה
  chosen: sixteen years
  lexicon: HALOT
  rationale: Straightforward cardinal number plus 'years'; rendered directly in standard
    English form.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  - he ruled as king
  lexicon: HALOT
  rationale: The verb specifically denotes reigning as king. 'He reigned' is the most
    direct and conventional English equivalent.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In Jerusalem' is the plain geographic
    sense and fits the regnal formula.
