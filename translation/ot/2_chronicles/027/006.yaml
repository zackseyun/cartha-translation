id: 2CH.27.6
reference: 2 Chronicles 27:6
source:
  edition: WLC
  text: וַ/יִּתְחַזֵּ֖ק יוֹתָ֑ם כִּ֚י הֵכִ֣ין דְּרָכָ֔י/ו לִ/פְנֵ֖י יְהוָ֥ה אֱלֹהָֽי/ו׃
translation:
  text: So Jotham became strong, because he ordered his ways before the LORD his God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prepared his ways' or 'directed his ways.' The Hebrew expression refers
      to intentionally setting one's course of life before God.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְחַזֵּק
  chosen: became strong
  alternatives:
  - grew strong
  - prevailed
  - was strengthened
  lexicon: HALOT
  rationale: The hitpael of חזק here denotes becoming strong or established. 'Became
    strong' is natural English and preserves the resultative sense without overinterpreting
    it as specifically military or political, though those may be included by context.
- source_word: יוֹתָם
  chosen: Jotham
  rationale: Personal names are transliterated by standard English convention.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי gives the reason for Jotham's strengthening. 'Because' is clearer
    in modern English than 'for' while preserving the causal force.
- source_word: הֵכִין
  chosen: ordered
  alternatives:
  - prepared
  - established
  - directed
  lexicon: HALOT
  rationale: The hiphil of כון can mean prepare, establish, or make firm. With 'his
    ways' as object, the sense is that he set or ordered his conduct aright. 'Ordered'
    captures intentional moral arrangement better than the more physical 'prepared.'
- source_word: דְּרָכָיו
  chosen: his ways
  alternatives:
  - his path
  - his conduct
  lexicon: HALOT
  rationale: The plural 'ways' is idiomatic in Hebrew for one's course of life or
    conduct. Retaining 'ways' preserves the metaphor and biblical diction while remaining
    understandable.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: HALOT
  rationale: '''Before'' is the standard concise rendering and adequately conveys
    living or acting in relation to God''s presence.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD.'
- source_word: אֱלֹהָיו
  chosen: his God
  lexicon: HALOT
  rationale: 'The pronominal suffix is significant and should be retained: Jotham
    ordered his ways before the LORD, specifically identified as his God.'
