theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Moral nuance of הֵכִין דְּרָכָיו
  chosen_reading: ordered his ways
  alternative_readings:
  - prepared his ways
  - directed his ways
  rationale: The phrase refers to intentional ordering of one's life before God. 'Ordered his ways' preserves the ethical sense without importing stronger theological claims not explicit in the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
