id: 2CH.27.7
reference: 2 Chronicles 27:7
source:
  edition: WLC
  text: וְ/יֶתֶר֙ דִּבְרֵ֣י יוֹתָ֔ם וְ/כָל מִלְחֲמֹתָ֖י/ו וּ/דְרָכָ֑י/ו הִנָּ֣/ם כְּתוּבִ֔ים
    עַל סֵ֥פֶר מַלְכֵֽי יִשְׂרָאֵ֖ל וִ/יהוּדָֽה־־־׃
translation:
  text: Now the rest of the acts of Jotham, and all his wars and his ways—behold,
    they are written in the Book of the Kings of Israel and Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the words/matters concerning Jotham'; the Hebrew idiom here refers to
      the record of his deeds or affairs.
    reason: lexical_alternative
  - marker: b
    text: '''His ways'' can also mean ''his conduct.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר introduces the remaining matters concerning a subject. 'The rest
    of' is the standard sense; 'Now' smoothly reflects the conjunctive ו in readable
    English narrative style without over-literal repetition of 'and'.
- source_word: דִּבְרֵי
  chosen: the acts of
  alternatives:
  - the words of
  - the matters concerning
  lexicon: HALOT
  rationale: Though literally 'words of,' in royal-summary formulas דִּבְרֵי commonly
    refers to the deeds, affairs, or acts of a king. 'Acts of' best matches the idiomatic
    historiographical usage in context.
- source_word: מִלְחֲמֹתָיו
  chosen: his wars
  alternatives:
  - his battles
  - his military campaigns
  lexicon: HALOT
  rationale: The plural noun denotes warfare/conflicts. 'Wars' is the most direct
    and conventional rendering here; 'campaigns' is possible but slightly more interpretive.
- source_word: וּדְרָכָיו
  chosen: his ways
  alternatives:
  - his conduct
  - his ways of life
  lexicon: HALOT
  rationale: דֶּרֶךְ literally means 'way,' and in this context refers to conduct
    or manner of life. 'His ways' preserves the Hebrew metaphor while remaining natural
    English.
- source_word: הִנָּם
  chosen: behold, they are
  alternatives:
  - indeed they are
  - they are
  lexicon: HALOT
  rationale: The particle adds deictic/emphatic force. 'Behold' preserves that force
    most transparently, though somewhat formal; it fits the archival formula and signals
    emphasis.
- source_word: כְּתוּבִים
  chosen: written
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: Passive participle meaning 'written.' 'Recorded' is a contextual gloss,
    but 'written' stays closer to the source while remaining clear.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Literally 'on the book/scroll,' but English idiom for archival citation
    is 'written in the Book.' This is a standard optimal-equivalence adjustment.
- source_word: מַלְכֵי יִשְׂרָאֵל וִיהוּדָה
  chosen: the Kings of Israel and Judah
  alternatives:
  - the kings of Israel and of Judah
  lexicon: HALOT
  rationale: Construct chain naming the source document. Capitalizing 'Book' and 'Kings'
    reflects a title-like reference to a known record. The single preposition before
    'Judah' naturally yields 'Israel and Judah.'
