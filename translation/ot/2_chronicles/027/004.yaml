id: 2CH.27.4
reference: 2 Chronicles 27:4
source:
  edition: WLC
  text: וְ/עָרִ֥ים בָּנָ֖ה בְּ/הַר יְהוּדָ֑ה וּ/בֶ/חֳרָשִׁ֣ים בָּנָ֔ה בִּֽירָנִיּ֖וֹת
    וּ/מִגְדָּלִֽים־׃
translation:
  text: He built cities in the hill country of Judah, and in the forests he built
    fortresses and towers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wooded areas' or 'thickets' for 'the forests.'
    reason: lexical_alternative
  - marker: b
    text: Or 'citadels' or 'strongholds' for 'fortresses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: The plural of עִיר commonly denotes populated urban settlements. 'Cities'
    is the standard and most natural rendering here in a royal building context.
- source_word: בָּנָה
  chosen: built
  alternatives:
  - constructed
  lexicon: HALOT
  rationale: The verb straightforwardly means 'build.' 'Built' preserves the concise
    narrative style and is idiomatic in English historical prose.
- source_word: בְּהַר יְהוּדָה
  chosen: in the hill country of Judah
  alternatives:
  - in the mountain region of Judah
  - in the mountains of Judah
  lexicon: HALOT
  rationale: הַר can mean 'mountain' or a mountainous/hill region. In this geographic
    expression, 'hill country of Judah' is the most idiomatic English rendering and
    reflects the regional sense rather than a single mountain.
- source_word: חֳרָשִׁים
  chosen: the forests
  alternatives:
  - the wooded areas
  - the thickets
  lexicon: HALOT
  rationale: The noun refers to wooded or forested areas. 'Forests' is concise and
    natural, while still conveying the terrain in which the structures were built.
- source_word: בִּירָנִיּוֹת
  chosen: fortresses
  alternatives:
  - citadels
  - castles
  - strongholds
  lexicon: HALOT
  rationale: This plural noun denotes fortified structures. 'Fortresses' best fits
    the military-defensive context and avoids the anachronistic feel of 'castles.'
    'Citadels' is possible but can imply an urban acropolis more specifically than
    the context requires.
- source_word: מִגְדָּלִים
  chosen: towers
  lexicon: HALOT
  rationale: The noun regularly means 'towers.' In conjunction with 'fortresses,'
    it likely refers to defensive towers in the wooded regions.
