id: 2CH.15.10
reference: 2 Chronicles 15:10
source:
  edition: WLC
  text: וַ/יִּקָּבְצ֥וּ יְרוּשָׁלִַ֖ם בַּ/חֹ֣דֶשׁ הַ/שְּׁלִישִׁ֑י לִ/שְׁנַ֥ת חֲמֵשׁ
    עֶשְׂרֵ֖ה לְ/מַלְכ֥וּת אָסָֽא־׃
translation:
  text: So they gathered at Jerusalem in the third month, in the fifteenth year of
    Asa's reign.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּקָּבְצוּ
  chosen: So they gathered
  alternatives:
  - And they assembled
  - And they were gathered together
  lexicon: HALOT
  rationale: Niphal wayyiqtol of קבץ, here functioning in narrative sequence. 'Gathered'
    is natural modern English and preserves the collective sense without overcomplicating
    the passive/reflexive nuance. 'So' reflects the waw-consecutive in flowing English
    narrative.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name, in keeping with the
    policy to transliterate names.
- source_word: בַּחֹדֶשׁ הַשְּׁלִישִׁי
  chosen: in the third month
  alternatives:
  - in month three
  lexicon: HALOT
  rationale: Straightforward temporal expression with article on both noun and ordinal.
    'In the third month' is idiomatic and formally close.
- source_word: לִשְׁנַת חֲמֵשׁ עֶשְׂרֵה
  chosen: in the fifteenth year
  alternatives:
  - for the fifteenth year
  - in year fifteen
  lexicon: HALOT
  rationale: The preposition ל with 'year' in regnal dating is best rendered idiomatically
    in English as 'in the fifteenth year,' not woodenly 'to/for the year.'
- source_word: לְמַלְכוּת אָסָא
  chosen: of Asa's reign
  alternatives:
  - of the reign of Asa
  - of Asa's kingship
  lexicon: HALOT
  rationale: מַלְכוּת here denotes royal reign/kingship in a chronological formula.
    'Asa's reign' is concise, idiomatic, and preserves the regnal-dating sense.
