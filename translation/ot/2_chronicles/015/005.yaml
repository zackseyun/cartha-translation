id: 2CH.15.5
reference: 2 Chronicles 15:5
source:
  edition: WLC
  text: וּ/בָ/עִתִּ֣ים הָ/הֵ֔ם אֵ֥ין שָׁל֖וֹם לַ/יּוֹצֵ֣א וְ/לַ/בָּ֑א כִּ֚י מְהוּמֹ֣ת
    רַבּ֔וֹת עַ֥ל כָּל יוֹשְׁבֵ֖י הָ/אֲרָצֽוֹת־׃
translation:
  text: And in those times there was no peace for the one going out or for the one
    coming in, because many disturbances were upon all the inhabitants of the lands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great tumults' for 'many disturbances'; the Hebrew term can denote turmoil,
      confusion, or panic.
    reason: lexical_alternative
  - marker: b
    text: The expression 'going out and coming in' is a Hebrew idiom for ordinary
      movement in daily life, especially travel or public activity.
    reason: cultural_note
lexical_decisions:
- source_word: וּבָעִתִּים הָהֵם
  chosen: And in those times
  alternatives:
  - And at those times
  - Now in those times
  lexicon: HALOT
  rationale: Temporal phrase introducing the historical situation. 'In those times'
    is natural English and preserves the plural עִתִּים with the demonstrative 'those'.
- source_word: אֵין שָׁלוֹם
  chosen: there was no peace
  alternatives:
  - there was no well-being
  - there was no safety
  lexicon: HALOT
  rationale: שָׁלוֹם can denote peace, well-being, or wholeness. In this context of
    social instability and unsafe movement, 'peace' is the broad and idiomatic choice,
    while the surrounding clause clarifies the practical insecurity.
- source_word: לַיּוֹצֵא וְלַבָּא
  chosen: for the one going out or for the one coming in
  alternatives:
  - for him who went out and for him who came in
  - for those going out and coming in
  lexicon: HALOT
  rationale: The participles are singular and generic, referring to anyone traveling
    or conducting ordinary movement. 'The one going out ... the one coming in' preserves
    the Hebrew idiom without over-paraphrasing. 'Or' fits the English negative construction
    smoothly while retaining the paired expression.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the lack of peace. 'Because' is the clearest
    modern English causal connector.
- source_word: מְהוּמֹת רַבּוֹת
  chosen: many disturbances
  alternatives:
  - great tumults
  - many confusions
  - many panics
  lexicon: HALOT
  rationale: מְהוּמָה often denotes turmoil, confusion, or panic. Here the plural
    with רַבּוֹת points to widespread social disorder. 'Many disturbances' is readable
    modern English and avoids sounding either too weak ('troubles') or too interpretively
    specific ('panic').
- source_word: עַל כָּל יוֹשְׁבֵי הָאֲרָצוֹת
  chosen: were upon all the inhabitants of the lands
  alternatives:
  - were on all the inhabitants of the countries
  - affected all the inhabitants of the lands
  lexicon: HALOT
  rationale: The preposition עַל is retained with 'were upon' to reflect the Hebrew
    image of turmoil resting on or pressing upon the people. הָאֲרָצוֹת is plural,
    so 'the lands' is preferred over singular 'the land'; it likely refers broadly
    to surrounding regions or territories rather than one country alone.
