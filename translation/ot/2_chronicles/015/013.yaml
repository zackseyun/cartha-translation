id: 2CH.15.13
reference: 2 Chronicles 15:13
source:
  edition: WLC
  text: וְ/כֹ֨ל אֲשֶׁ֧ר לֹֽא יִדְרֹ֛שׁ לַ/יהוָ֥ה אֱלֹהֵֽי יִשְׂרָאֵ֖ל יוּמָ֑ת לְ/מִן קָטֹן֙ וְ/עַד גָּד֔וֹל לְ/מֵ/אִ֖ישׁ וְ/עַד אִשָּֽׁה־־־־־׃
translation:
  text: And everyone who would not seek Yahweh, the God of Israel, was to be put to death, from small to great, from man to woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whoever did not seek the LORD.' The Hebrew verb can be rendered more simply as 'did not seek,' but the context is a covenant oath stipulation.
    reason: lexical_alternative
  - marker: b
    text: Or 'from least to greatest.' The Hebrew idiom expresses totality across the whole community.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל אֲשֶׁר
  chosen: And everyone who
  alternatives:
  - And whoever
  - And all who
  lexicon: HALOT
  rationale: כֹל with אֲשֶׁר introduces a comprehensive relative clause. 'Everyone who' is natural modern English and preserves the universal scope.
- source_word: לֹא יִדְרֹשׁ
  chosen: would not seek
  alternatives:
  - did not seek
  - would not inquire of
  lexicon: HALOT
  rationale: דרשׁ in covenantal/religious contexts commonly means to seek or consult deity. 'Seek' best fits the Chronicler's recurring covenant language. 'Would not seek' reflects the modal/volitional force in this legal-oath setting better than a simple past.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct chain identifying the covenant God specifically as Israel's God.
- source_word: יוּמָת
  chosen: was to be put to death
  alternatives:
  - shall be put to death
  - must be put to death
  - would be put to death
  lexicon: HALOT
  rationale: 'The Hophal of מות is causative/passive: ''be put to death,'' not merely ''die.'' ''Was to be put to death'' fits the narrative report of the oath''s stipulation while preserving its legal force.'
- source_word: לְמִן קָטֹן וְעַד גָּדוֹל
  chosen: from small to great
  alternatives:
  - from least to greatest
  - from young to old
  lexicon: HALOT
  rationale: The idiom marks total social scope. 'From small to great' stays close to the Hebrew and avoids over-specifying age, since the contrast can include status as well as size/importance.
- source_word: לְמֵאִישׁ וְעַד אִשָּׁה
  chosen: from man to woman
  alternatives:
  - from male to female
  - from men to women
  lexicon: HALOT
  rationale: The singular distributive construction is best represented by singular English. 'Man to woman' preserves the gendered pair without flattening it into an abstract category.
