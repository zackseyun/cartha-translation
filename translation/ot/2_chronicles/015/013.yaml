theological_decisions:
- issue: Rendering a severe covenant penalty without softening or expanding it
  chosen_reading: 'Retain the explicit death penalty as stated in the text: ''was to be put to death.'''
  alternative_readings:
  - Soften to 'would die'
  - Paraphrase as excommunication or covenant curse
  rationale: The Hebrew verb is the passive/causative of מות and plainly states execution, not merely death in general or symbolic exclusion. The translation should not mute the severity of the Chronicler's report.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Never paraphrase beyond what the source text warrants.'
