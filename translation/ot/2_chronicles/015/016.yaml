id: 2CH.15.16
reference: 2 Chronicles 15:16
source:
  edition: WLC
  text: וְ/גַֽם מַעֲכָ֞ה אֵ֣ם אָסָ֣א הַ/מֶּ֗לֶךְ הֱסִירָ/הּ֙ מִ/גְּבִירָ֔ה אֲשֶׁר
    עָשְׂתָ֥ה לַ/אֲשֵׁרָ֖ה מִפְלָ֑צֶת וַ/יִּכְרֹ֤ת אָסָא֙ אֶת מִפְלַצְתָּ֔/הּ וַ/יָּ֕דֶק
    וַ/יִּשְׂרֹ֖ף בְּ/נַ֥חַל קִדְרֽוֹן־׀־־׃
translation:
  text: Even Maacah, the mother of King Asa, he removed from being queen mother, because
    she had made a dreadful image for Asherah; and Asa cut down her dreadful image,
    crushed it, and burned it in the Kidron Valley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an abominable image' or 'a horrid thing.' The Hebrew term denotes a
      repulsive or terrifying cult object.
    reason: lexical_alternative
  - marker: b
    text: '''Asherah'' may refer to the goddess or to the cult symbol associated with
      her; older English versions sometimes render it ''grove.'''
    reason: cultural_note
  - marker: c
    text: Or 'in the brook/wadi Kidron.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: Even
  alternatives:
  - And also
  - Also
  lexicon: HALOT
  rationale: Marks addition with emphasis; 'Even' captures the surprising extension
    of Asa's reform to his own royal relative.
- source_word: מַעֲכָה
  chosen: Maacah
  rationale: Personal name is transliterated per translation philosophy.
- source_word: אֵם אָסָא הַמֶּלֶךְ
  chosen: the mother of King Asa
  alternatives:
  - the mother of Asa the king
  lexicon: HALOT
  rationale: Construct chain identifies Maacah in relation to Asa. English word order
    is smoothed while preserving the familial and royal identification.
- source_word: הֱסִירָהּ
  chosen: he removed
  alternatives:
  - he deposed her
  - he took her away
  lexicon: HALOT
  rationale: The verb means to remove or take away. 'Removed' is broad enough to fit
    removal from office/status without over-interpreting as a formal deposition, though
    that sense is implied by the following phrase.
- source_word: מִגְּבִירָה
  chosen: from being queen mother
  alternatives:
  - from the position of queen mother
  - from being mistress/lady
  lexicon: HALOT
  rationale: גְּבִירָה in royal context refers to the queen mother or great lady of
    the court. 'Queen mother' best conveys the institutional role in Judah's monarchy.
- source_word: אֲשֶׁר עָשְׂתָה לַאֲשֵׁרָה
  chosen: because she had made ... for Asherah
  alternatives:
  - which she had made as an Asherah
  - because she had made ... for the Asherah pole
  lexicon: HALOT
  rationale: The clause gives the reason for her removal. לַאֲשֵׁרָה is best taken
    as 'for Asherah,' the cultic deity/object association, without forcing the more
    specific 'pole' where the text does not say that explicitly.
- source_word: מִפְלָצֶת
  chosen: a dreadful image
  alternatives:
  - an abominable image
  - a horrid thing
  - an obscene image
  lexicon: HALOT
  rationale: The noun denotes a horrifying or repulsive cult object. 'Dreadful image'
    preserves the sense of revulsion while remaining readable modern English. 'Image'
    is supplied from context because the object is something later cut down, crushed,
    and burned.
- source_word: וַיִּכְרֹת
  chosen: cut down
  alternatives:
  - cut off
  - chopped down
  lexicon: HALOT
  rationale: The verb commonly means cut off/down. Given a wooden cult object associated
    with Asherah, 'cut down' is the most natural English rendering.
- source_word: מִפְלַצְתָּהּ
  chosen: her dreadful image
  alternatives:
  - her abominable image
  - her horrid thing
  lexicon: HALOT
  rationale: Same noun as earlier, now with pronominal suffix. Rendering is kept consistent.
- source_word: וַיָּדֶק
  chosen: crushed it
  alternatives:
  - ground it small
  - pulverized it
  lexicon: HALOT
  rationale: The verb conveys reducing to small pieces or powder. 'Crushed it' is
    natural English and fits the sequence before burning.
- source_word: וַיִּשְׂרֹף
  chosen: burned it
  alternatives:
  - set it on fire
  lexicon: HALOT
  rationale: Straightforward rendering of the verb for burning.
- source_word: בְּנַחַל קִדְרוֹן
  chosen: in the Kidron Valley
  alternatives:
  - at the Wadi Kidron
  - in the brook Kidron
  lexicon: HALOT
  rationale: נחל can mean wadi, ravine, or brook/valley depending on context. 'Kidron
    Valley' is idiomatic and geographically clear for modern readers.
