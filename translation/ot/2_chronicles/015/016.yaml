theological_decisions:
- issue: Meaning of אֲשֵׁרָה
  chosen_reading: Asherah is rendered as the proper name of the cultic deity/object
    association rather than paraphrased as 'grove.'
  alternative_readings:
  - Asherah pole
  - grove
  rationale: The Hebrew term refers to a Canaanite cultic entity/object and should
    not be obscured by older traditional renderings like 'grove.' The immediate context
    already identifies a manufactured cult object, so retaining 'Asherah' preserves
    the ancient religious setting without over-specifying the object's exact form.
  doctrine_reference: Translation philosophy §1, §5
- issue: Royal title גְּבִירָה
  chosen_reading: Rendered as 'queen mother.'
  alternative_readings:
  - great lady
  - mistress
  rationale: In the Judahite royal context this title most naturally denotes the recognized
    office/status of the king's mother (or grandmother functioning in that role).
    This is a historical-social judgment, not a doctrinal one, but it materially affects
    the verse's sense.
  doctrine_reference: Translation philosophy §6
