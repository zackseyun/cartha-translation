id: 2CH.15.11
reference: 2 Chronicles 15:11
source:
  edition: WLC
  text: וַ/יִּזְבְּח֤וּ לַ/יהוָה֙ בַּ/יּ֣וֹם הַ/ה֔וּא מִן הַ/שָּׁלָ֖ל הֵבִ֑יאוּ בָּקָר֙ שְׁבַ֣ע מֵא֔וֹת וְ/צֹ֖אן שִׁבְעַ֥ת אֲלָפִֽים־׃
translation:
  text: 'On that day they sacrificed to Yahweh from the spoil they had brought: seven hundred cattle and seven thousand sheep.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the plunder.' The Hebrew term refers to goods taken as war spoil.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word can more broadly mean 'flock animals' (sheep and goats), not only sheep.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבְּחוּ
  chosen: they sacrificed
  alternatives:
  - they offered sacrifices
  - they slaughtered sacrificially
  lexicon: HALOT
  rationale: The verb זבח in cultic context refers to offering animal sacrifices. 'They sacrificed' is concise, natural English and preserves the ritual sense better than the more generic 'offered sacrifices'.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated. The preposition ל marks the recipient of the sacrifice.
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - In that day
  - On the same day
  lexicon: HALOT
  rationale: This temporal phrase is most naturally rendered 'On that day' in modern English.
- source_word: מִן הַשָּׁלָל
  chosen: from the spoil
  alternatives:
  - from the plunder
  - from the booty
  lexicon: HALOT
  rationale: שָׁלָל denotes goods taken in war. 'Spoil' is a standard biblical-English rendering that remains understandable and fits the formal register; 'plunder' is possible but slightly more interpretive in tone.
- source_word: הֵבִיאוּ
  chosen: they had brought
  alternatives:
  - they brought
  lexicon: HALOT
  rationale: The perfect after mention of the spoil is well represented by English pluperfect here, clarifying that the spoil had already been brought before the sacrifices were offered.
- source_word: בָּקָר
  chosen: cattle
  alternatives:
  - oxen
  - herd animals
  lexicon: HALOT
  rationale: בָּקָר is a collective term for bovines. 'Cattle' is the broad and natural collective equivalent; 'oxen' would be too narrow.
- source_word: שְׁבַע מֵאוֹת
  chosen: seven hundred
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: וְצֹאן
  chosen: and seven thousand sheep
  alternatives:
  - and seven thousand flock animals
  lexicon: HALOT
  rationale: צֹאן can denote small livestock collectively, including sheep and goats, but in many English Bible contexts 'sheep' is the idiomatic rendering. Here it provides readable English alongside 'cattle,' though the broader sense is worth preserving in a footnote.
- source_word: שִׁבְעַת אֲלָפִים
  chosen: seven thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number.
