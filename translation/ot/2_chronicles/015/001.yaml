id: 2CH.15.1
reference: 2 Chronicles 15:1
source:
  edition: WLC
  text: וַ/עֲזַרְיָ֨הוּ֙ בֶּן עוֹדֵ֔ד הָיְתָ֥ה עָלָ֖י/ו ר֥וּחַ אֱלֹהִֽים־׃
translation:
  text: Now the Spirit of God came upon Azariah son of Oded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Spirit of God was upon Azariah son of Oded.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/עֲזַרְיָהוּ
  chosen: Now ... Azariah
  alternatives:
  - And ... Azariah
  rationale: The prefixed conjunction on the proper name is rendered with discourse-forwarding
    'Now' rather than a bare 'And' for readable modern English, while preserving the
    narrative progression. The personal name is transliterated per project policy.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: 'The construct בֶּן most naturally denotes immediate filiation here:
    ''son of Oded.'' No contextual pressure suggests the broader sense ''descendant.'''
- source_word: עוֹדֵד
  chosen: Oded
  rationale: Proper name transliterated by standard English convention.
- source_word: הָיְתָה עָלָיו
  chosen: came upon
  alternatives:
  - was upon
  - was on
  lexicon: HALOT
  rationale: The idiom 'was upon him' with רוּחַ in prophetic contexts commonly signals
    the Spirit's coming upon a person for inspired speech or empowerment. 'Came upon'
    is a natural English rendering that preserves the eventive force better than the
    more static 'was upon.'
- source_word: רוּחַ אֱלֹהִים
  chosen: the Spirit of God
  alternatives:
  - a spirit of God
  - the רוח of God
  lexicon: HALOT
  rationale: In this context רוּחַ אֱלֹהִים refers to God's Spirit empowering Azariah.
    English idiom and biblical usage favor 'the Spirit of God.' Although Hebrew lacks
    the article on רוּחַ, the construct with אֱלֹהִים in this prophetic setting is
    definite in sense.
