theological_decisions:
- issue: Whether רוּחַ אֱלֹהִים should be rendered impersonally ('a spirit from God')
    or personally/theologically ('the Spirit of God')
  chosen_reading: the Spirit of God
  alternative_readings:
  - a spirit of God
  - a divine spirit
  rationale: The Chronicler's formula in this context introduces prophetic inspiration
    and divine empowerment of a named individual. Rendering it as 'the Spirit of God'
    best reflects the idiom's likely sense without importing claims beyond the text.
    The choice aligns with historic Christian reading while remaining grounded in
    the Hebrew expression.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
