id: 2CH.15.18
reference: 2 Chronicles 15:18
source:
  edition: WLC
  text: וַ/יָּבֵ֞א אֶת קָדְשֵׁ֥י אָבִ֛י/ו וְ/קָֽדָשָׁ֖י/ו בֵּ֣ית הָ/אֱלֹהִ֑ים כֶּ֥סֶף
    וְ/זָהָ֖ב וְ/כֵלִֽים־׃
translation:
  text: 'He brought into the house of God his father''s holy gifts and his own holy
    gifts: silver, gold, and vessels.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the things his father had dedicated and the things he himself had dedicated.'
    reason: lexical_alternative
  - marker: b
    text: '''Vessels'' may refer broadly to temple articles or implements.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֵא
  chosen: He brought
  alternatives:
  - and he brought in
  - then he brought
  lexicon: HALOT
  rationale: Hiphil wayyiqtol of בוא here denotes causing items to enter, idiomatically
    'bring.' English omits the conjunction in favor of smooth narrative flow while
    preserving the sequential sense.
- source_word: קָדְשֵׁי אָבִיו
  chosen: his father's holy gifts
  alternatives:
  - the things his father had dedicated
  - his father's consecrated things
  - his father's holy things
  lexicon: HALOT
  rationale: The plural construct of קדשׁ in temple context refers to items set apart/dedicated
    for sacred use, not abstract holiness. 'Holy gifts' is concise and natural; the
    alternatives are possible, with 'dedicated things' making the cultic sense more
    explicit.
- source_word: וְקָדָשָׁיו
  chosen: and his own holy gifts
  alternatives:
  - and the things he had dedicated
  - and his consecrated things
  - and his holy things
  lexicon: HALOT
  rationale: Parallel to the previous phrase, referring to Asa's own dedicated items.
    'His own' makes the contrast with 'his father's' explicit in idiomatic English.
- source_word: בֵּית הָאֱלֹהִים
  chosen: into the house of God
  alternatives:
  - into God's house
  - into the temple of God
  lexicon: HALOT
  rationale: A standard temple designation. 'House of God' preserves the Hebrew expression
    directly; 'temple' is interpretively accurate but less formally tied to the source
    wording.
- source_word: כֶּסֶף וְזָהָב וְכֵלִים
  chosen: silver, gold, and vessels
  alternatives:
  - silver, gold, and utensils
  - silver, gold, and articles
  lexicon: HALOT
  rationale: This appositional list specifies the nature of the dedicated items. 'Vessels'
    is a conventional rendering for כלים in sanctuary contexts and can include implements
    or containers.
