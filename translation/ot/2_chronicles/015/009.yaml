id: 2CH.15.9
reference: 2 Chronicles 15:9
source:
  edition: WLC
  text: וַ/יִּקְבֹּ֗ץ אֶת כָּל יְהוּדָה֙ וּ/בִנְיָמִ֔ן וְ/הַ/גָּרִים֙ עִמָּ/הֶ֔ם מֵ/אֶפְרַ֥יִם
    וּ/מְנַשֶּׁ֖ה וּ/מִ/שִּׁמְע֑וֹן כִּֽי נָפְל֨וּ עָלָ֤י/ו מִ/יִּשְׂרָאֵל֙ לָ/רֹ֔ב
    בִּ/רְאֹתָ֕/ם כִּֽי יְהוָ֥ה אֱלֹהָ֖י/ו עִמּֽ/וֹ־־־־׃פ
translation:
  text: And he gathered all Judah and Benjamin, and the sojourners with them from
    Ephraim, Manasseh, and Simeon, because many from Israel had defected to him when
    they saw that the LORD his God was with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had come over to him' or more literally 'had fallen to him.' The Hebrew
      idiom refers to people transferring allegiance to Asa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבֹּץ
  chosen: he gathered
  alternatives:
  - he assembled
  - he convened
  lexicon: HALOT
  rationale: Qal wayyiqtol of קבץ denotes collecting or assembling people. 'Gathered'
    is natural English and preserves the concrete sense without over-specifying a
    formal assembly.
- source_word: כָּל יְהוּדָה וּבִנְיָמִן
  chosen: all Judah and Benjamin
  alternatives:
  - all the people of Judah and Benjamin
  lexicon: HALOT
  rationale: The tribal/territorial names stand metonymically for the people. The
    shorter rendering keeps the Hebrew form while remaining idiomatic.
- source_word: הַגָּרִים
  chosen: the sojourners
  alternatives:
  - the resident foreigners
  - the aliens
  - the strangers
  lexicon: HALOT
  rationale: גֵּר refers to a non-native residing among Israel. 'Sojourners' is a
    clear, established rendering that preserves the social-legal nuance better than
    the potentially misleading modern term 'aliens.'
- source_word: עִמָּהֶם
  chosen: with them
  alternatives:
  - among them
  lexicon: HALOT
  rationale: The preposition עם with pronominal suffix straightforwardly means accompaniment/association.
    'With them' best matches the syntax.
- source_word: מֵאֶפְרַיִם וּמְנַשֶּׁה וּמִשִּׁמְעוֹן
  chosen: from Ephraim, Manasseh, and Simeon
  alternatives:
  - out of Ephraim, Manasseh, and Simeon
  lexicon: HALOT
  rationale: These identify the origin of the sojourners or attached persons. 'From'
    is the most natural English equivalent of the prefixed מִן.
- source_word: נָפְלוּ עָלָיו
  chosen: had defected to him
  alternatives:
  - had fallen to him
  - had joined him
  - had come over to him
  lexicon: HALOT
  rationale: The idiom נפל על in political/military contexts means to desert one side
    and join another. 'Defected to him' captures the directional and political sense
    more precisely than the overly literal 'fallen to him.'
- source_word: מִיִּשְׂרָאֵל לָרֹב
  chosen: many from Israel
  alternatives:
  - from Israel in great numbers
  - a great multitude from Israel
  lexicon: HALOT
  rationale: לָרֹב functions adverbially, indicating abundance. 'Many from Israel'
    is concise and idiomatic while preserving the sense of large numbers.
- source_word: בִּרְאֹתָם
  chosen: when they saw
  alternatives:
  - upon seeing
  - because they saw
  lexicon: HALOT
  rationale: The infinitive construct with ב marks circumstance or occasion. 'When
    they saw' fits the narrative flow and naturally introduces the reason for their
    defection.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: אֱלֹהָיו עִמּוֹ
  chosen: his God was with him
  alternatives:
  - his God was on his side
  - his God was with Asa
  lexicon: HALOT
  rationale: The clause states divine presence/support. 'Was with him' is the direct
    and theologically restrained rendering, avoiding interpretive expansion.
