id: 2CH.15.14
reference: 2 Chronicles 15:14
source:
  edition: WLC
  text: וַ/יִּשָּֽׁבְעוּ֙ לַ/יהוָ֔ה בְּ/ק֥וֹל גָּד֖וֹל וּ/בִ/תְרוּעָ֑ה וּ/בַ/חֲצֹצְר֖וֹת וּ/בְ/שׁוֹפָרֽוֹת׃
translation:
  text: And they swore to Yahweh with a loud voice, with shouting, and with trumpets and horns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''shofars'' or ''rams'' horns''; the text distinguishes these from the ''trumpets'' mentioned just before.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבְעוּ
  chosen: they swore
  alternatives:
  - they took an oath
  - they bound themselves by oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע here denotes taking an oath. 'They swore' is concise and natural English while preserving the formal covenantal sense. 'Took an oath' is possible, but the verbal form is well represented by 'swore'.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition marks the one to whom the oath was sworn. Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: בְּקוֹל גָּדוֹל
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - with a great voice
  lexicon: HALOT
  rationale: קוֹל גָּדוֹל is an idiom for loud vocal expression. 'With a loud voice' is idiomatic modern English and preserves the auditory emphasis.
- source_word: וּבִתְרוּעָה
  chosen: with shouting
  alternatives:
  - with a shout
  - with a battle cry
  - with joyful acclamation
  lexicon: HALOT
  rationale: תְּרוּעָה can denote a loud shout or acclamation, often in cultic or celebratory settings. Here it accompanies oath-taking and instruments, so 'shouting' best captures the collective vocal outcry without over-specifying joy or warfare.
- source_word: וּבַחֲצֹצְרוֹת
  chosen: with trumpets
  lexicon: HALOT
  rationale: חֲצֹצְרוֹת refers to the straight metal trumpets used in Israelite worship and assembly. 'Trumpets' is the standard and sufficiently clear rendering.
- source_word: וּבְשׁוֹפָרוֹת
  chosen: and horns
  alternatives:
  - and rams' horns
  - and shofars
  lexicon: HALOT
  rationale: שׁוֹפָרוֹת are horn instruments distinct from חֲצֹצְרוֹת. Rendering them simply also as 'trumpets' would erase the distinction. 'Horns' preserves the contrast in accessible English; 'rams' horns' is more specific but may overstate material in context, and 'shofars' is a transliteration rather than translation.
