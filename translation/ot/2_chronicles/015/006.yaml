theological_decisions:
- issue: Agency of the calamities
  chosen_reading: 'The verse explicitly attributes the societal turmoil to God''s
    action: ''for God troubled them with every kind of distress.'''
  alternative_readings:
  - A more indirect rendering such as 'for God allowed them to be troubled in every
    trouble'
  rationale: The Hebrew uses an active singular verb with God as subject. The translation
    should preserve divine agency as stated without softening it into mere permission,
    while not importing further theological explanation beyond the text.
  doctrine_reference: Translation philosophy §§1, 3
