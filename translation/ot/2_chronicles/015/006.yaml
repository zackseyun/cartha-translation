id: 2CH.15.6
reference: 2 Chronicles 15:6
source:
  edition: WLC
  text: וְ/כֻתְּת֥וּ גוֹי בְּ/ג֖וֹי וְ/עִ֣יר בְּ/עִ֑יר כִּֽי אֱלֹהִ֥ים הֲמָמָ֖/ם בְּ/כָל
    צָרָֽה־־־׃
translation:
  text: Nation was crushed by nation, and city by city, for God troubled them with
    every kind of distress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'threw them into confusion with every kind of trouble.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֻתְּתוּ
  chosen: was crushed
  alternatives:
  - were crushed
  - was shattered
  - was beaten down
  lexicon: HALOT
  rationale: 'Pual perfect 3cp of כתת conveys being broken/crushed. Because the following
    distributive singulars (''nation by nation,'' ''city by city'') function collectively,
    singular English in each pair is natural: ''Nation was crushed by nation, and
    city by city.'' ''Crushed'' preserves the violence without over-paraphrase.'
- source_word: גוֹי בְּגוֹי
  chosen: nation by nation
  alternatives:
  - nation against nation
  - one nation by another nation
  lexicon: HALOT
  rationale: The construction with ב marks hostile interaction. 'Nation by nation'
    is concise and mirrors the Hebrew distributive pattern; 'against nation' is also
    possible but slightly more interpretive.
- source_word: וְעִיר בְּעִיר
  chosen: and city by city
  alternatives:
  - and city against city
  - and one city by another city
  lexicon: HALOT
  rationale: Parallel to the previous phrase, this preserves the terse Hebrew structure
    and the sense of internecine conflict among cities.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the preceding devastation. 'For'
    is a natural explanatory connector in English.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The plural form takes a singular verb and clearly refers to the one God
    in context, so 'God' is required.
- source_word: הֲמָמָם
  chosen: troubled them
  alternatives:
  - threw them into confusion
  - discomfited them
  - disturbed them
  lexicon: HALOT
  rationale: From המם, the verb denotes causing turmoil, confusion, or panic. 'Troubled
    them' fits the immediate context of widespread distress and remains readable modern
    English. The object suffix '-ם' is preserved with 'them.'
- source_word: בְּכָל צָרָה
  chosen: with every kind of distress
  alternatives:
  - with every distress
  - with all distress
  - in every trouble
  lexicon: HALOT
  rationale: 'The preposition ב here is instrumental or circumstantial: God afflicted/confounded
    them by means of every sort of trouble. ''Every kind of distress'' communicates
    the comprehensive force of כָּל with idiomatic English.'
