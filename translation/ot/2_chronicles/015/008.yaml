id: 2CH.15.8
reference: 2 Chronicles 15:8
source:
  edition: WLC
  text: וְ/כִ/שְׁמֹ֨עַ אָסָ֜א הַ/דְּבָרִ֣ים הָ/אֵ֗לֶּה וְ/הַ/נְּבוּאָה֮ עֹדֵ֣ד הַ/נָּבִיא֒
    הִתְחַזַּ֗ק וַ/יַּעֲבֵ֤ר הַ/שִּׁקּוּצִים֙ מִ/כָּל אֶ֤רֶץ יְהוּדָה֙ וּ/בִנְיָמִ֔ן
    וּ/מִן הֶ֣/עָרִ֔ים אֲשֶׁ֥ר לָכַ֖ד מֵ/הַ֣ר אֶפְרָ֑יִם וַ/יְחַדֵּשׁ֙ אֶת מִזְבַּ֣ח
    יְהוָ֔ה אֲשֶׁ֕ר לִ/פְנֵ֖י אוּלָ֥ם יְהוָֽה־־־׃
translation:
  text: And when Asa heard these words and the prophecy of Oded the prophet, he took
    courage and removed the detestable things from all the land of Judah and Benjamin,
    and from the cities that he had captured in the hill country of Ephraim; and he
    renewed the altar of the LORD that was before the vestibule of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the prophecy of Oded the prophet.'' Some interpreters and textual
      discussions connect this with Azariah son of Oded in the surrounding context.'
    reason: textual_variant
lexical_decisions:
- source_word: וְכִשְׁמֹעַ
  chosen: And when ... heard
  alternatives:
  - and upon hearing
  - and as soon as ... heard
  lexicon: HALOT
  rationale: The preposition-conjunction with infinitive construct introduces a temporal
    clause. 'And when Asa heard' is natural English and preserves the sequence without
    overinterpreting immediacy.
- source_word: הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - these matters
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words' or 'matters'; here Asa has just heard Azariah's
    speech, so 'these words' best fits the immediate discourse context.
- source_word: וְהַנְּבוּאָה
  chosen: and the prophecy
  alternatives:
  - and the prophetic message
  - even the prophecy
  lexicon: HALOT
  rationale: A straightforward rendering of נְבוּאָה. Retaining 'prophecy' preserves
    the formal link to prophetic revelation.
- source_word: עֹדֵד הַנָּבִיא
  chosen: of Oded the prophet
  alternatives:
  - of the prophet Oded
  lexicon: HALOT
  rationale: The Hebrew apposition is naturally rendered either way in English. 'of
    Oded the prophet' reads smoothly while preserving the identification. Although
    the wider context raises a known textual/scribal question with Azariah son of
    Oded, the MT here reads Oded and is translated as such.
- source_word: הִתְחַזַּק
  chosen: he took courage
  alternatives:
  - he strengthened himself
  - he was strengthened
  lexicon: HALOT
  rationale: The Hitpael here conveys Asa's being emboldened/strengthened in response
    to the prophetic word. 'He took courage' is idiomatic modern English and captures
    the reflexive nuance better than the wooden 'strengthened himself.'
- source_word: וַיַּעֲבֵר הַשִּׁקּוּצִים
  chosen: and removed the detestable things
  alternatives:
  - and took away the abominations
  - and caused the abhorrent things to pass away
  lexicon: HALOT
  rationale: שִׁקּוּצִים often denotes idolatrous abominations or detestable cult
    objects. 'Detestable things' is readable modern English; 'abominations' is possible
    but can sound opaque. 'Removed' expresses the causative/resultative sense in context.
- source_word: מִכָּל אֶרֶץ יְהוּדָה וּבִנְיָמִן
  chosen: from all the land of Judah and Benjamin
  alternatives:
  - from the whole land of Judah and Benjamin
  - from all the territory of Judah and Benjamin
  lexicon: HALOT
  rationale: אֶרֶץ here refers to territory/land. 'Land' is the most direct and idiomatic
    rendering.
- source_word: וּמִן הֶעָרִים אֲשֶׁר לָכַד מֵהַר אֶפְרָיִם
  chosen: and from the cities that he had captured in the hill country of Ephraim
  alternatives:
  - from the cities that he had taken from the hill country of Ephraim
  - from the cities he captured out of the hill country of Ephraim
  lexicon: HALOT
  rationale: לכד means 'capture/take.' The phrase מֵהַר אֶפְרַיִם is best understood
    geographically as 'in/from the hill country of Ephraim.' 'In the hill country
    of Ephraim' is the clearest English expression of the source sense.
- source_word: וַיְחַדֵּשׁ
  chosen: and he renewed
  alternatives:
  - and he restored
  - and he repaired
  lexicon: HALOT
  rationale: חדשׁ in the Piel means to renew/make new. 'Renewed' preserves the lexical
    sense without narrowing it merely to physical repair, though restoration is included.
- source_word: מִזְבַּח יְהוָה
  chosen: the altar of the LORD
  alternatives:
  - the LORD's altar
  lexicon: HALOT
  rationale: Construct phrase rendered directly. For יְהוָה, the project default is
    'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per project doctrine, the default rendering of the divine name יְהוָה
    is 'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: אֲשֶׁר לִפְנֵי אוּלָם יְהוָה
  chosen: that was before the vestibule of the LORD
  alternatives:
  - that was in front of the porch of the LORD
  - that was before the portico of the LORD
  lexicon: HALOT
  rationale: אוּלָם denotes the temple porch/vestibule/portico. 'Vestibule' is slightly
    more formal but still accessible and fits temple architecture. 'Before' preserves
    the spatial relation לִפְנֵי.
