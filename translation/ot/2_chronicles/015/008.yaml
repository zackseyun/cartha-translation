theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's stated
    default for יְהוָה, it is rendered 'the LORD' in both instances rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Potential textual/scribal tension around 'Oded the prophet'
  chosen_reading: Translate the MT as 'Oded the prophet' in the main text
  alternative_readings:
  - '''Azariah son of Oded the prophet'' harmonized from the surrounding context'
  - other text-critical reconstructions
  rationale: The supplied Hebrew text reads וְהַנְּבוּאָה עֹדֵד הַנָּבִיא. The translation
    follows the given source text rather than harmonizing to the surrounding narrative.
    Because readers may notice the contextual tension, the alternative is preserved
    in a footnote as a textual note rather than resolved in translation.
