theological_decisions:
- issue: Rendering of תּוֹרָה
  chosen_reading: instruction
  alternative_readings:
  - law
  - the law
  - teaching
  rationale: Following original-language primacy, the Hebrew term here is broader
    than statutory law and fits the context of priestly teaching. 'Instruction' preserves
    that breadth and avoids importing a narrower legal sense not demanded by the verse.
  doctrine_reference: Translation philosophy §1, §5
- issue: Definiteness of אֱלֹהֵי אֱמֶת
  chosen_reading: the true God
  alternative_readings:
  - a true God
  - God of truth
  rationale: The context concerns Israel's covenantal deprivation, not generic theism.
    'The true God' best communicates the referent in idiomatic English while preserving
    the contrast implied by the Hebrew.
  doctrine_reference: Translation philosophy §1, §6
