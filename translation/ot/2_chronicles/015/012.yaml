id: 2CH.15.12
reference: 2 Chronicles 15:12
source:
  edition: WLC
  text: וַ/יָּבֹ֣אוּ בַ/בְּרִ֔ית לִ/דְר֕וֹשׁ אֶת יְהוָ֖ה אֱלֹהֵ֣י אֲבוֹתֵי/הֶ֑ם בְּ/כָל
    לְבָבָ֖/ם וּ/בְ/כָל נַפְשָֽׁ/ם־־־׃
translation:
  text: And they entered into the covenant to seek the LORD, the God of their fathers,
    with all their heart and with all their soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they bound themselves by covenant.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the God of their fathers'; that is, the covenant God worshiped by
      their forefathers.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: they entered into
  alternatives:
  - they came into
  - they entered
  lexicon: HALOT
  rationale: The verb בוא literally means 'come/go/enter.' With the following prepositional
    phrase בַּבְּרִית, the idiom is best rendered 'entered into the covenant,' which
    is natural English and preserves the covenantal act rather than a mere physical
    movement.
- source_word: בַּבְּרִית
  chosen: the covenant
  alternatives:
  - a covenant
  - into covenant
  lexicon: HALOT
  rationale: With the article and preposition, this refers to a specific covenantal
    commitment made in the assembly. 'The covenant' is more precise than 'a covenant'
    and reflects the Hebrew form.
- source_word: לִדְרוֹשׁ
  chosen: to seek
  alternatives:
  - to inquire of
  - to seek after
  lexicon: HALOT
  rationale: דרש in covenantal/religious contexts commonly means to seek God, not
    merely to ask questions. 'To seek' is the standard and clearest rendering here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the Septuagintal
    pattern.
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  chosen: the God of their fathers
  alternatives:
  - their fathers' God
  - the God of their ancestors
  lexicon: HALOT
  rationale: This construct chain identifies YHWH as the ancestral covenant God. 'The
    God of their fathers' preserves the source structure and covenantal resonance.
    'Ancestors' is possible in modern English, but 'fathers' better matches the Hebrew
    and the project's gender-accurate policy.
- source_word: בְּכָל לְבָבָם
  chosen: with all their heart
  alternatives:
  - with their whole heart
  - with all their mind
  lexicon: HALOT
  rationale: לֵבָב denotes the inner person, especially will and intention. 'With
    all their heart' is the established and accurate idiom in English for this covenantal
    formula.
- source_word: וּבְכָל נַפְשָׁם
  chosen: and with all their soul
  alternatives:
  - and with all their life
  - and with all their being
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, or self. In the fixed expression 'with
    all the heart and with all the soul,' 'soul' best preserves the familiar covenantal
    wording and the totality of devotion intended by the Hebrew.
