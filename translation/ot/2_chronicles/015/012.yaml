theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH. This preserves continuity with Jewish reverence practice and common English
    Bible usage without making a claim about exact ancient pronunciation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered ancestral language in אֲבוֹתֵיהֶם
  chosen_reading: their fathers
  alternative_readings:
  - their ancestors
  rationale: The Hebrew is explicitly masculine plural ('fathers'). Per the project's
    gender-accurate policy, the translation retains the gendered form where it reflects
    the source intent rather than neutralizing it.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
