theological_decisions:
- issue: Nature of recompense language
  chosen_reading: for there is a reward for your work
  alternative_readings:
  - for your labor will be rewarded
  - there are wages for what you do
  rationale: The verse promises recompense as motivation for covenant faithfulness,
    but it does not specify a detailed doctrine of merit. The translation preserves
    the straightforward statement without importing later theological categories about
    salvation, merit, or justification.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
