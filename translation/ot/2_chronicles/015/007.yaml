id: 2CH.15.7
reference: 2 Chronicles 15:7
source:
  edition: WLC
  text: וְ/אַתֶּ֣ם חִזְק֔וּ וְ/אַל יִרְפּ֖וּ יְדֵי/כֶ֑ם כִּ֛י יֵ֥שׁ שָׂכָ֖ר לִ/פְעֻלַּתְ/כֶֽם־׃ס
translation:
  text: But as for you, be strong, and do not let your hands grow weak, for there
    is a reward for your work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not let your hands be slack.' The Hebrew idiom refers to losing strength,
      resolve, or courage.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתֶּם
  chosen: But as for you
  alternatives:
  - And you
  - But you
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks contrastive emphasis with
    the preceding context. 'But as for you' brings out the exhortational contrast
    more clearly than a bare 'and you,' while remaining faithful to the Hebrew discourse
    function.
- source_word: חִזְקוּ
  chosen: be strong
  alternatives:
  - be strengthened
  - take courage
  lexicon: HALOT
  rationale: Imperative plural from חזק in this context is an exhortation to strength
    or firmness. 'Be strong' is the most natural and direct English rendering.
- source_word: וְ/אַל
  chosen: and do not
  alternatives:
  - but do not
  lexicon: HALOT
  rationale: Standard negative particle with jussive/imperfect in prohibition. 'And
    do not' preserves the coordinate flow of the Hebrew.
- source_word: יִרְפּוּ
  chosen: grow weak
  alternatives:
  - be slack
  - droop
  - be feeble
  lexicon: HALOT
  rationale: From רפה, here with 'hands' as subject in idiomatic expression for losing
    resolve or strength. 'Grow weak' communicates the idiom in clear modern English
    without over-paraphrasing.
- source_word: יְדֵי/כֶם
  chosen: your hands
  alternatives:
  - your hand
  lexicon: HALOT
  rationale: Plural construct with 2mp suffix. The Hebrew idiom uses 'hands' to represent
    strength, resolve, or capacity for action; retained literally in English because
    it is still intelligible.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - surely
  lexicon: HALOT
  rationale: Introduces the ground for the exhortation. 'For' best fits the causal-explanatory
    sense in English.
- source_word: יֵשׁ
  chosen: there is
  alternatives:
  - there will be
  lexicon: HALOT
  rationale: Existential particle. Although the statement implies future recompense,
    the Hebrew itself states existence rather than explicitly future tense, so 'there
    is' is preferred.
- source_word: שָׂכָר
  chosen: a reward
  alternatives:
  - wages
  - recompense
  lexicon: HALOT
  rationale: The noun denotes reward, wages, or recompense. 'Reward' fits the broad
    moral-exhortational context and avoids narrowing the sense to mere payment.
- source_word: לִ/פְעֻלַּתְ/כֶם
  chosen: for your work
  alternatives:
  - for your deed
  - for your labor
  - for what you do
  lexicon: HALOT
  rationale: פְעֻלָּה refers to work, deed, or labor. 'For your work' is natural English
    and preserves the concrete sense of action/labor that receives reward.
