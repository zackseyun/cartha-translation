id: 2CH.15.19
reference: 2 Chronicles 15:19
source:
  edition: WLC
  text: וּ/מִלְחָמָ֖ה לֹ֣א הָיָ֑תָה עַ֛ד שְׁנַת שְׁלֹשִׁ֥ים וְ/חָמֵ֖שׁ לְ/מַלְכ֥וּת
    אָסָֽא־׃ס
translation:
  text: And there was no war until the thirty-fifth year of Asa’s reign.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'until year thirty-five of Asa’s reign.' Some interpreters understand
      this number according to a broader chronological system rather than strictly
      Asa’s regnal count, in order to harmonize with related passages.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/מִלְחָמָה
  chosen: And there was no war
  alternatives:
  - And war was not
  - And no warfare occurred
  lexicon: HALOT
  rationale: מִלְחָמָה means 'war' or 'battle/warfare.' With prefixed conjunction
    וּ and followed by the existential verb, idiomatic English is best expressed as
    'And there was no war.' This preserves the clause linkage and the existential
    sense without wooden wording.
- source_word: לֹא
  chosen: 'no'
  alternatives:
  - not
  lexicon: HALOT
  rationale: The negation directly qualifies the existential clause. In English, 'there
    was no war' is more natural than 'war was not,' while preserving the full negation.
- source_word: הָיָתָה
  chosen: there was
  alternatives:
  - occurred
  - happened
  lexicon: HALOT
  rationale: Qal perfect of היה here functions existentially. 'There was' is the most
    straightforward rendering in context.
- source_word: עַד
  chosen: until
  alternatives:
  - up to
  lexicon: HALOT
  rationale: Temporal preposition marking the endpoint of the period without war.
    'Until' is the standard and clearest English equivalent.
- source_word: שְׁנַת שְׁלֹשִׁים וְחָמֵשׁ
  chosen: the thirty-fifth year
  alternatives:
  - year thirty-five
  - the year thirty-five
  lexicon: HALOT
  rationale: The construct שְׁנַת followed by the number gives a regnal-year expression.
    English idiom normally renders this ordinally as 'the thirty-fifth year.'
- source_word: לְמַלְכוּת
  chosen: of ... reign
  alternatives:
  - of ... kingship
  - of ... kingdom
  lexicon: HALOT
  rationale: In this context מַלְכוּת refers to the period or state of royal rule.
    'Reign' is the most natural English rendering for a regnal-year formula.
- source_word: אָסָא
  chosen: Asa
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
