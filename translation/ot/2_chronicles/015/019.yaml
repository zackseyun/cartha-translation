theological_decisions:
- issue: Chronological expression in relation to surrounding Asa narratives
  chosen_reading: Render the Hebrew regnal formula straightforwardly as 'the thirty-fifth
    year of Asa’s reign' without harmonizing or emending.
  alternative_readings:
  - Interpret as a reference to a different chronological system (for example, from
    the division of the kingdom)
  - Emend the number to harmonize with Kings
  rationale: The Hebrew text plainly presents a regnal-year statement tied to Asa.
    The translation should reflect the source text rather than import a harmonizing
    solution. Because the chronological tension is interpretive rather than lexical,
    the main text remains literal to the Hebrew.
  doctrine_reference: Translation philosophy §1, §3
