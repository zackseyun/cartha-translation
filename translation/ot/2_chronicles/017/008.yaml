theological_decisions:
- issue: Distinction between Levites and priests
  chosen_reading: 'Render both groups explicitly and separately: ''the Levites'' ...
    ''the priests.'''
  alternative_readings:
  - Treat all listed names as Levites without separately identifying the final two
    as priests
  rationale: 'The Hebrew syntax marks two groups: first the Levites, then ''with them''
    Elishama and Jehoram, identified as ''the priests.'' Preserving this distinction
    is important to the text''s institutional detail and should not be flattened.'
