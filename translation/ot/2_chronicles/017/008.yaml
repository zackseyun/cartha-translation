id: 2CH.17.8
reference: 2 Chronicles 17:8
source:
  edition: WLC
  text: וְ/עִמָּ/הֶ֣ם הַ/לְוִיִּ֗ם שְֽׁמַֽעְיָ֡הוּ וּ/נְתַנְיָ֡הוּ וּ/זְבַדְיָ֡הוּ
    וַ/עֲשָׂהאֵ֡ל ו/שמרימות וִֽ/יהוֹנָתָן֩ וַ/אֲדֹ֨נִיָּ֧הוּ וְ/טֽוֹבִיָּ֛הוּ וְ/ט֥וֹב
    אֲדוֹנִיָּ֖ה הַ/לְוִיִּ֑ם וְ/עִמָּ/הֶ֛ם אֱלִישָׁמָ֥ע וִֽ/יהוֹרָ֖ם הַ/כֹּהֲנִֽים׃
translation:
  text: 'And with them were the Levites: Shemaiah, Nethaniah, Zebadiah, Asahel, Shemiramoth,
    Jehonathan, Adonijah, Tobijah, and Tob-adonijah; and with them were Elishama and
    Jehoram, the priests.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Tob Adonijah,' likely a single compound personal name; some translations
      smooth it differently.
    reason: lexical_alternative
  - marker: b
    text: '''Jehonathan'' reflects the fuller Hebrew form of the name; some English
      versions shorten it to ''Jonathan.'''
    reason: lexical_alternative
  - marker: c
    text: '''Tobijah'' reflects the fuller Hebrew form; many English versions have
      ''Tobiah.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעִמָּהֶם
  chosen: And with them were
  alternatives:
  - And with them
  - accompanied by them were
  lexicon: HALOT
  rationale: The prepositional phrase introduces the accompanying personnel in a list.
    Supplying 'were' makes natural English while preserving the Hebrew sense of accompaniment.
- source_word: הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - Levites
  lexicon: HALOT
  rationale: Definite article is present in Hebrew, and the term denotes members of
    the Levitical order, not merely a tribal label in general.
- source_word: שְׁמַעְיָהוּ
  chosen: Shemaiah
  rationale: Personal name transliterated according to standard English convention,
    following the project's policy to transliterate names rather than translate them.
- source_word: נְתַנְיָהוּ
  chosen: Nethaniah
  alternatives:
  - Netaniah
  rationale: Standard conventional English transliteration for this Hebrew personal
    name.
- source_word: זְבַדְיָהוּ
  chosen: Zebadiah
  alternatives:
  - Zabadiah
  rationale: Standard English biblical transliteration.
- source_word: עֲשָׂהאֵל
  chosen: Asahel
  rationale: Conventional transliteration of the personal name.
- source_word: שמרימות
  chosen: Shemiramoth
  alternatives:
  - Shemarimoth
  rationale: The consonantal form corresponds to the name commonly rendered 'Shemiramoth'
    in English biblical tradition; this is a transliteration choice rather than a
    translation.
- source_word: יְהוֹנָתָן
  chosen: Jehonathan
  alternatives:
  - Jonathan
  rationale: The Hebrew form here is the longer יהונתן, so 'Jehonathan' more closely
    reflects the source than the shortened conventional 'Jonathan'.
- source_word: אֲדֹנִיָּהוּ
  chosen: Adonijah
  alternatives:
  - Adoniyahu
  rationale: Standard English transliteration of the personal name.
- source_word: טוֹבִיָּהוּ
  chosen: Tobijah
  alternatives:
  - Tobiah
  rationale: The Hebrew form includes the theophoric ending -yahu; 'Tobijah' preserves
    that more explicitly than the shortened 'Tobiah,' though both are recognizable.
- source_word: טוֹב אֲדוֹנִיָּה
  chosen: Tob-adonijah
  alternatives:
  - Tobadonijah
  - Tob Adonijah
  rationale: The Masoretic Text presents what appears to be a compound personal name
    split into two elements. Rendering it with a hyphen preserves the likely single-name
    function while remaining transparent to the Hebrew form.
- source_word: וְעִמָּהֶם
  chosen: and with them were
  alternatives:
  - and with them
  lexicon: HALOT
  rationale: Repeated phrase introducing an additional accompanying group; English
    again supplies 'were' for clarity.
- source_word: אֱלִישָׁמָע
  chosen: Elishama
  rationale: Standard transliteration of the personal name.
- source_word: יְהוֹרָם
  chosen: Jehoram
  alternatives:
  - Joram
  rationale: The fuller Hebrew form supports 'Jehoram' rather than the shortened 'Joram.'
- source_word: הַכֹּהֲנִים
  chosen: the priests
  alternatives:
  - priests
  lexicon: HALOT
  rationale: Definite article is present; the term identifies Elishama and Jehoram
    as priests in distinction from the Levites named earlier.
