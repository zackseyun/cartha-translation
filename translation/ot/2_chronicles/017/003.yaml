theological_decisions:
- issue: Evaluation of David as a model despite later failures
  chosen_reading: the former ways of David
  alternative_readings:
  - the ways of David in earlier times
  - the first ways of David
  rationale: The Chronicler's wording explicitly limits the comparison to David's earlier faithful conduct, avoiding any implication that Jehoshaphat followed David's later sins. The translation preserves this theological nuance by rendering הָרִאשֹׁנִים as 'former.'
