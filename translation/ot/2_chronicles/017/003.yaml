id: 2CH.17.3
reference: 2 Chronicles 17:3
source:
  edition: WLC
  text: וַ/יְהִ֥י יְהוָ֖ה עִם יְהוֹשָׁפָ֑ט כִּ֣י הָלַ֗ךְ בְּ/דַרְכֵ֞י דָּוִ֤יד אָבִי/ו֙ הָ/רִ֣אשֹׁנִ֔ים וְ/לֹ֥א דָרַ֖שׁ לַ/בְּעָלִֽים־׃
translation:
  text: And Yahweh was with Jehoshaphat, because he walked in the former ways of David his father and did not seek the Baals.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the earlier ways of David his father.' The Hebrew specifies David's former conduct, likely distinguishing it from his later failures.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיְהִי ... עִם
  chosen: was with
  alternatives:
  - came to be with
  - was present with
  lexicon: HALOT
  rationale: The idiom 'YHWH was with' is standard covenantal/support language in English and naturally renders היה עם without unnecessary woodenness.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the LORD's being with Jehoshaphat; 'because' makes the causal sense explicit in clear modern English.
- source_word: הָלַךְ
  chosen: walked
  alternatives:
  - went
  - lived
  lexicon: HALOT
  rationale: In moral/theological contexts הלך commonly means to conduct oneself. 'Walked' preserves the biblical metaphor while remaining idiomatic in English.
- source_word: בְּדַרְכֵי
  chosen: in the ... ways
  alternatives:
  - according to the ... ways
  - in the paths
  lexicon: HALOT
  rationale: '''Ways'' is the standard rendering for דרך in ethical contexts and pairs naturally with ''walked'' to preserve the Hebrew idiom.'
- source_word: דָּוִיד אָבִיו
  chosen: David his father
  alternatives:
  - his father David
  - David his ancestor
  lexicon: HALOT
  rationale: The Hebrew apposition is straightforward. 'Father' is retained rather than 'ancestor' because the source uses paternal covenantal language; English readers can understand this dynastic usage from context.
- source_word: הָרִאשֹׁנִים
  chosen: former
  alternatives:
  - earlier
  - first
  lexicon: HALOT
  rationale: The adjective distinguishes David's earlier ways from later conduct. 'Former' is concise and preserves that contrast better than the potentially misleading 'first.'
- source_word: דָרַשׁ
  chosen: seek
  alternatives:
  - inquire of
  - consult
  - worship
  lexicon: HALOT
  rationale: דרש with a deity often means to seek or consult that deity. 'Seek' is broad enough to preserve the Hebrew's religious orientation without over-specifying the action.
- source_word: לַבְּעָלִים
  chosen: the Baals
  alternatives:
  - the Baal idols
  - the Baalim
  - Baal
  lexicon: HALOT
  rationale: The plural form is explicit in Hebrew. 'The Baals' preserves the plural and reflects the Chronicler's reference to the various Baal manifestations/cults, avoiding flattening to singular 'Baal'.
