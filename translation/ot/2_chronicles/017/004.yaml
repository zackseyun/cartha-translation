theological_decisions:
- issue: Referent of 'Israel'
  chosen_reading: Retain 'Israel' without expanding it to 'the northern kingdom of
    Israel.'
  alternative_readings:
  - the kingdom of Israel
  - the house of Ahab
  rationale: The verse contrasts Jehoshaphat's conduct with that of 'Israel' as stated
    in the Hebrew. Expanding the referent would import contextual interpretation into
    the main text rather than translating the wording actually present.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
