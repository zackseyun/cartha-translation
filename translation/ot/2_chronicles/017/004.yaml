id: 2CH.17.4
reference: 2 Chronicles 17:4
source:
  edition: WLC
  text: כִּ֠י לֵֽ/אלֹהֵ֤י אָבִי/ו֙ דָּרָ֔שׁ וּ/בְ/מִצְוֺתָ֖י/ו הָלָ֑ךְ וְ/לֹ֖א כְּ/מַעֲשֵׂ֥ה
    יִשְׂרָאֵֽל׃
translation:
  text: but he sought the God of his father and walked in his commandments, and not
    according to the deeds of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for he sought the God of his father.' The Hebrew conjunction can also
      be rendered 'for' or 'because'; 'but' is used in the main text to bring out
      the contrast with the previous verse.
    reason: lexical_alternative
  - marker: b
    text: '''Israel'' here likely refers to the northern kingdom in contrast with
      Judah.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: but
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: In context this clause contrasts Jehoshaphat with the ways of Israel
    mentioned in the previous verse. Although כִּי often means 'for' or 'because,'
    an adversative sense is natural here in English to convey the contrast.
- source_word: לֵאלֹהֵי אָבִיו
  chosen: the God of his father
  alternatives:
  - to the God of his father
  - his ancestral God
  lexicon: HALOT
  rationale: The preposition ל with דרש marks the object sought; idiomatic English
    omits 'to.' 'The God of his father' preserves the singular אָבִיו and the covenantal
    continuity implied by the phrase.
- source_word: דָּרָשׁ
  chosen: sought
  alternatives:
  - inquired of
  - sought after
  lexicon: HALOT
  rationale: דרש in covenantal contexts commonly means to seek God devotionally, not
    merely to ask for information. 'Sought' is concise and standard without over-paraphrasing.
- source_word: וּבְמִצְוֺתָיו
  chosen: in his commandments
  alternatives:
  - according to his commandments
  - by his commandments
  lexicon: HALOT
  rationale: The beth with הלך literally yields 'walked in his commandments.' This
    preserves the Hebrew metaphor and avoids flattening it to mere compliance, while
    remaining understandable in English.
- source_word: הָלָךְ
  chosen: walked
  alternatives:
  - lived
  - conducted himself
  lexicon: HALOT
  rationale: הלך is a common biblical metaphor for manner of life. 'Walked' preserves
    the metaphor and its ethical resonance.
- source_word: וְלֹא
  chosen: and not
  alternatives:
  - but not
  lexicon: HALOT
  rationale: A straightforward rendering of the conjunction plus negation; the contrast
    is already carried by the clause structure.
- source_word: כְּמַעֲשֵׂה
  chosen: according to the deeds of
  alternatives:
  - like the practices of
  - according to the work of
  lexicon: HALOT
  rationale: מַעֲשֶׂה here refers to conduct or practices. 'According to the deeds
    of' is close to the Hebrew while still natural English.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the house of Israel
  - the kingdom of Israel
  lexicon: HALOT
  rationale: The text simply says 'Israel.' In Chronicles this often refers to the
    northern kingdom in contrast with Judah, but the translation should preserve the
    source wording without interpretive expansion.
