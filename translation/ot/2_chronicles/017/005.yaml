id: 2CH.17.5
reference: 2 Chronicles 17:5
source:
  edition: WLC
  text: וַ/יָּ֨כֶן יְהוָ֤ה אֶת הַ/מַּמְלָכָה֙ בְּ/יָד֔/וֹ וַ/יִּתְּנ֧וּ כָל יְהוּדָ֛ה
    מִנְחָ֖ה לִ/יהוֹשָׁפָ֑ט וַֽ/יְהִי ל֥/וֹ עֹֽשֶׁר וְ/כָב֖וֹד לָ/רֹֽב־־־־׃
translation:
  text: So the LORD established the kingdom in his hand, and all Judah gave tribute
    to Jehoshaphat; and he had riches and honor in abundance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gift,' 'present,' or 'offering' for 'tribute' (Hebrew minchah); here
      the royal context favors 'tribute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּכֶן
  chosen: established
  alternatives:
  - made firm
  - strengthened
  lexicon: HALOT
  rationale: כון in the Hiphil commonly means to establish, make firm, or set securely.
    'Established' fits the political context of securing royal rule without overinterpreting
    it as military strengthening alone.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated.
- source_word: הַמַּמְלָכָה
  chosen: the kingdom
  alternatives:
  - the royal rule
  - the reign
  lexicon: HALOT
  rationale: מַמְלָכָה denotes kingdom or kingship. 'The kingdom' is the most natural
    English rendering here and can encompass both realm and royal authority.
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - under his control
  - in his power
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'in his hand.' Retaining the image is
    clear in English and preserves the source texture while conveying possession/control.
- source_word: וַיִּתְּנוּ כָל יְהוּדָה
  chosen: all Judah gave
  alternatives:
  - all Judah brought
  - all Judah presented
  lexicon: HALOT
  rationale: נתן means 'give.' 'All Judah' is a collective subject referring to the
    people of the kingdom.
- source_word: מִנְחָה
  chosen: tribute
  alternatives:
  - gift
  - offering
  - present
  lexicon: HALOT
  rationale: Though מִנְחָה can mean offering or gift, in a royal-political context
    it commonly refers to tribute presented to a ruler. 'Tribute' best fits the setting
    of consolidating Jehoshaphat's rule.
- source_word: לִיהוֹשָׁפָט
  chosen: to Jehoshaphat
  rationale: Standard transliteration of the personal name, following the instruction
    to transliterate names.
- source_word: וַיְהִי לוֹ
  chosen: he had
  alternatives:
  - there was for him
  - it came to be for him
  lexicon: HALOT
  rationale: This idiom indicates possession or resulting state. 'He had' is idiomatic
    modern English.
- source_word: עֹשֶׁר
  chosen: riches
  alternatives:
  - wealth
  lexicon: HALOT
  rationale: עֹשֶׁר denotes material wealth. 'Riches' pairs naturally with 'honor'
    in English and reflects the elevated style of the verse.
- source_word: וְכָבוֹד
  chosen: and honor
  alternatives:
  - and glory
  lexicon: HALOT
  rationale: כָּבוֹד can mean honor, glory, or splendor. In this courtly context,
    'honor' best expresses public status and esteem without implying divine glory.
- source_word: לָרֹב
  chosen: in abundance
  alternatives:
  - in great measure
  - abundantly
  lexicon: HALOT
  rationale: The phrase indicates great quantity. 'In abundance' is natural and preserves
    the sense of superabundance.
