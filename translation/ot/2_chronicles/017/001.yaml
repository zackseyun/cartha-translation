id: 2CH.17.1
reference: 2 Chronicles 17:1
source:
  edition: WLC
  text: וַ/יִּמְלֹ֛ךְ יְהוֹשָׁפָ֥ט בְּנ֖/וֹ תַּחְתָּ֑י/ו וַ/יִּתְחַזֵּ֖ק עַל יִשְׂרָאֵֽל־׃
translation:
  text: And Jehoshaphat his son became king in his place, and he strengthened himself
    against Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'established himself against Israel.' The Hebrew verb is reflexive and
      can carry the sense of strengthening or consolidating oneself.
    reason: lexical_alternative
  - marker: b
    text: Here 'Israel' refers to the northern kingdom, in contrast to Judah.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּמְלֹךְ
  chosen: became king
  alternatives:
  - reigned
  - began to reign
  lexicon: HALOT
  rationale: The waw-consecutive verb from מלך marks the succession event. 'Became
    king' captures accession more naturally in English than the more durative 'reigned,'
    while remaining close to the Hebrew.
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: בְּנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: Straightforward filial designation with 3ms suffix; retained explicitly
    in English to preserve the dynastic succession note.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - after him
  - instead of him
  lexicon: HALOT
  rationale: The preposition תחת with suffix here indicates succession to the throne.
    'In his place' is idiomatic and precise in context.
- source_word: וַיִּתְחַזֵּק
  chosen: strengthened himself
  alternatives:
  - established himself
  - grew strong
  lexicon: HALOT
  rationale: The Hitpael of חזק is reflexive. 'Strengthened himself' preserves that
    reflexive nuance better than the smoother but more interpretive 'established himself.'
- source_word: עַל
  chosen: against
  alternatives:
  - over
  - concerning
  lexicon: HALOT
  rationale: With התחזק in this political-military context, על most naturally conveys
    opposition or defensive posture toward the northern kingdom. 'Against' best fits
    the sense in context.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the kingdom of Israel
  - the northern kingdom
  rationale: The Hebrew simply says 'Israel.' In the Chronicler's divided-monarchy
    context this refers to the northern kingdom, but the main text preserves the source
    wording without expansion.
