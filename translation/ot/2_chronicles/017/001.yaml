theological_decisions:
- issue: Referent of 'Israel' in the divided monarchy context
  chosen_reading: Israel refers to the northern kingdom in political opposition to
    Judah.
  alternative_readings:
  - Israel as the people generally
  - Israel as territory in a broader sense
  rationale: The historical context of Jehoshaphat's reign after Asa makes the political
    entity of the northern kingdom the most likely referent. This is a historical-context
    decision rather than a doctrinally contested one, so no theological tension is
    being artificially resolved beyond what the context warrants.
