id: 2CH.17.15
reference: 2 Chronicles 17:15
source:
  edition: WLC
  text: וְ/עַל יָד֖/וֹ יְהוֹחָנָ֣ן הַ/שָּׂ֑ר וְ/עִמּ֕/וֹ מָאתַ֥יִם וּ/שְׁמוֹנִ֖ים
    אָֽלֶף־׃ס
translation:
  text: And under his command was Jehohanan the commander, and with him were two hundred
    eighty thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at his side/under his authority was Jehohanan the commander.' The Hebrew
      idiom literally reads 'upon his hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל יָדוֹ
  chosen: under his command
  alternatives:
  - at his hand
  - under his authority
  - next to him
  lexicon: HALOT
  rationale: The idiom עַל יָד with pronominal suffix in military/administrative listings
    indicates being under someone's direction or authority rather than a literal spatial
    relation. 'Under his command' fits the context of troop organization and reads
    naturally in English.
- source_word: יְהוֹחָנָן
  chosen: Jehohanan
  alternatives:
  - Johanan
  rationale: Personal names are transliterated rather than translated. 'Jehohanan'
    closely reflects the Hebrew form in Chronicles.
- source_word: הַשַּׂר
  chosen: the commander
  alternatives:
  - the prince
  - the official
  - the captain
  lexicon: HALOT
  rationale: שַׂר is a broad term for a leader, official, or commander. In this immediate
    military census context, 'commander' best conveys the function.
- source_word: וְעִמּוֹ
  chosen: and with him were
  alternatives:
  - and with him
  - accompanied by
  lexicon: HALOT
  rationale: The phrase introduces the number of troops attached to Jehohanan. Supplying
    'were' is required for clear English.
- source_word: מָאתַיִם וּשְׁמוֹנִים אָלֶף
  chosen: two hundred eighty thousand
  alternatives:
  - two hundred and eighty thousand
  lexicon: HALOT
  rationale: This is the straightforward cardinal number. The wording without 'and'
    is natural in contemporary English while preserving the exact quantity.
