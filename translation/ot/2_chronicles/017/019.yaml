id: 2CH.17.19
reference: 2 Chronicles 17:19
source:
  edition: WLC
  text: אֵ֖לֶּה הַ/מְשָׁרְתִ֣ים אֶת הַ/מֶּ֑לֶךְ מִ/לְּ/בַ֞ד אֲשֶׁר נָתַ֥ן הַ/מֶּ֛לֶךְ
    בְּ/עָרֵ֥י הַ/מִּבְצָ֖ר בְּ/כָל יְהוּדָֽה־־־׃פ
translation:
  text: These were the ones serving the king, besides those whom the king had stationed
    in the fortified cities throughout all Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'besides those whom the king had placed in the fortified cities throughout
      all Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְשָׁרְתִים
  chosen: serving
  alternatives:
  - ministering
  - attending
  - those who served
  lexicon: HALOT
  rationale: The participle from שׁרת denotes service/attendance, often in an official
    capacity. Rendering it verbally as 'serving' keeps the participial force in natural
    English and avoids the more ecclesiastical 'ministering' in this military-administrative
    context.
- source_word: אֶת־הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Direct object marker plus noun simply identifies the object of service.
    'The king' is straightforward and contextually refers to Jehoshaphat.
- source_word: מִלְּבַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: The phrase marks exclusion/addition relative to the previously listed
    personnel. 'Besides' is concise and idiomatic, preserving the sense that another
    group is being distinguished from those just named.
- source_word: אֲשֶׁר נָתַן
  chosen: whom ... had stationed
  alternatives:
  - whom ... had placed
  - whom ... had appointed
  - whom ... had put
  lexicon: HALOT
  rationale: Although נתן literally means 'gave/put,' in this administrative-military
    setting it refers to assigning personnel to posts. 'Had stationed' best fits the
    context of troops in fortified cities and communicates the functional sense without
    over-paraphrasing.
- source_word: בְּעָרֵי הַמִּבְצָר
  chosen: in the fortified cities
  alternatives:
  - in the fortress cities
  - in the cities of fortification
  lexicon: HALOT
  rationale: The construct phrase refers to cities strengthened for defense. 'Fortified
    cities' is the standard, clear English equivalent and fits the military context.
- source_word: בְּכָל יְהוּדָה
  chosen: throughout all Judah
  alternatives:
  - in all Judah
  - throughout Judah
  lexicon: HALOT
  rationale: The preposition with כל expresses distribution across the territory.
    'Throughout all Judah' preserves the comprehensiveness and reads naturally in
    English.
- source_word: אֵלֶּה
  chosen: These were the ones
  alternatives:
  - These were
  - These
  lexicon: HALOT
  rationale: The demonstrative points back to the enumerated officers and troops.
    'These were the ones' makes the resumptive function explicit in idiomatic English,
    though still close to the Hebrew.
