id: 2CH.17.12
reference: 2 Chronicles 17:12
source:
  edition: WLC
  text: וַ/יְהִ֧י יְהוֹשָׁפָ֛ט הֹלֵ֥ךְ וְ/גָדֵ֖ל עַד לְ/מָ֑עְלָ/ה וַ/יִּ֧בֶן בִּֽ/יהוּדָ֛ה
    בִּירָנִיּ֖וֹת וְ/עָרֵ֥י מִסְכְּנֽוֹת־׃
translation:
  text: And Jehoshaphat became greater and greater, and he built fortresses and store
    cities in Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'citadels' for 'fortresses.' The Hebrew denotes fortified strongholds.
    reason: lexical_alternative
  - marker: b
    text: Or 'storage cities' or 'supply cities.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: became
  alternatives:
  - was
  - came to be
  lexicon: HALOT
  rationale: With the following participles הֹלֵךְ וְגָדֵל, the verb introduces a
    progressive state rather than simple existence. 'Became' in idiomatic English
    captures the onset/continuance of Jehoshaphat's increasing status.
- source_word: הֹלֵךְ וְגָדֵל
  chosen: greater and greater
  alternatives:
  - going and growing
  - continually growing
  - kept becoming great
  lexicon: HALOT
  rationale: The Hebrew construction of a participle plus participle expresses ongoing
    increase. 'Greater and greater' is a natural English equivalent that preserves
    the iterative/progressive sense without woodenly reproducing the Hebrew idiom.
- source_word: עַד לְמָעְלָה
  chosen: greater and greater
  alternatives:
  - to a very high degree
  - upward exceedingly
  lexicon: HALOT
  rationale: This phrase intensifies the preceding growth, literally 'upward' or 'to
    a height.' In English it is best absorbed into the idiom 'greater and greater'
    rather than translated separately in a clumsy way.
- source_word: וַיִּבֶן
  chosen: he built
  alternatives:
  - he constructed
  lexicon: HALOT
  rationale: Standard rendering of בנה in a narrative context; 'built' is clear and
    direct.
- source_word: בִּירָנִיּוֹת
  chosen: fortresses
  alternatives:
  - castles
  - citadels
  - fortified places
  lexicon: HALOT
  rationale: The term refers to fortified strongholds. 'Fortresses' is modern and
    accurate; 'castles' is too medieval and potentially misleading.
- source_word: עָרֵי מִסְכְּנוֹת
  chosen: store cities
  alternatives:
  - storage cities
  - supply cities
  - treasure cities
  lexicon: HALOT
  rationale: This construct phrase denotes cities used for storage/supplies, a known
    administrative-military term in the Hebrew Bible. 'Store cities' is the established
    and sufficiently transparent English rendering.
- source_word: בִּיהוּדָה
  chosen: in Judah
  lexicon: HALOT
  rationale: Locative phrase indicating where the building took place; straightforwardly
    rendered 'in Judah'.
