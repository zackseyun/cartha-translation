id: 2CH.17.2
reference: 2 Chronicles 17:2
source:
  edition: WLC
  text: וַ/יִּ֨תֶּן חַ֔יִל בְּ/כָל עָרֵ֥י יְהוּדָ֖ה הַ/בְּצֻר֑וֹת וַ/יִּתֵּ֤ן נְצִיבִים֙
    בְּ/אֶ֣רֶץ יְהוּדָ֔ה וּ/בְ/עָרֵ֣י אֶפְרַ֔יִם אֲשֶׁ֥ר לָכַ֖ד אָסָ֥א אָבִֽי/ו־־׃
translation:
  text: And he stationed forces in all the fortified cities of Judah, and he placed
    garrisons in the land of Judah and in the cities of Ephraim that Asa his father
    had captured.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'governors,' 'deputies,' or 'prefects' for 'garrisons' (Heb. נְצִיבִים);
      the term can denote appointed officials as well as military posts, but the military
      context here favors 'garrisons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֶּן
  chosen: he stationed
  alternatives:
  - he put
  - he set
  lexicon: HALOT
  rationale: Although the verb is literally 'gave/put,' in military-administrative
    context with חַיִל and locations, idiomatic English is 'stationed' to express
    assigning troops to posts without over-paraphrasing.
- source_word: חַיִל
  chosen: forces
  alternatives:
  - troops
  - army
  - military force
  lexicon: HALOT
  rationale: חַיִל can denote strength, wealth, or military force. Here, with placement
    in fortified cities, the military sense is required. 'Forces' is natural modern
    English and broad enough for stationed military personnel.
- source_word: בְּכָל עָרֵי יְהוּדָה הַבְּצֻרוֹת
  chosen: in all the fortified cities of Judah
  alternatives:
  - in every fortified city of Judah
  lexicon: HALOT
  rationale: The phrase specifies the locations receiving military deployment. 'Fortified
    cities' is the standard and precise rendering of הַבְּצֻרוֹת.
- source_word: וַיִּתֵּן
  chosen: he placed
  alternatives:
  - he set
  - he appointed
  lexicon: HALOT
  rationale: A second use of נתן introduces a different object, נְצִיבִים. 'Placed'
    fits the concrete sense of establishing these officials or military posts in locations.
- source_word: נְצִיבִים
  chosen: garrisons
  alternatives:
  - governors
  - deputies
  - prefects
  - military posts
  lexicon: HALOT
  rationale: נְצִיבִים can refer to officials, prefects, or garrison officers depending
    on context. Because the verse is about securing territory militarily, including
    cities captured from Ephraim, 'garrisons' best fits the immediate context. The
    administrative nuance is preserved as an alternative.
- source_word: בְּאֶרֶץ יְהוּדָה
  chosen: in the land of Judah
  alternatives:
  - throughout the land of Judah
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the territory/land, broader than the cities already
    mentioned. 'In the land of Judah' preserves the wording closely.
- source_word: וּבְעָרֵי אֶפְרַיִם
  chosen: and in the cities of Ephraim
  alternatives:
  - and in Ephraim's cities
  lexicon: HALOT
  rationale: A straightforward territorial phrase. 'Cities of Ephraim' preserves the
    tribal-geographical reference.
- source_word: אֲשֶׁר לָכַד
  chosen: that ... had captured
  alternatives:
  - which ... had taken
  - which ... had seized
  lexicon: HALOT
  rationale: לכד commonly means to capture or seize, especially of cities. 'Captured'
    is the most natural military English equivalent.
- source_word: אָסָא אָבִיו
  chosen: Asa his father
  alternatives:
  - Asa, his father
  lexicon: HALOT
  rationale: The construct with pronominal suffix identifies Jehoshaphat's father.
    The appositional English phrase is clear and direct.
