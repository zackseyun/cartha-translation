id: 2CH.17.10
reference: 2 Chronicles 17:10
source:
  edition: WLC
  text: וַ/יְהִ֣י פַּ֣חַד יְהוָ֗ה עַ֚ל כָּל מַמְלְכ֣וֹת הָֽ/אֲרָצ֔וֹת אֲשֶׁ֖ר סְבִיב֣וֹת יְהוּדָ֑ה וְ/לֹ֥א נִלְחֲמ֖וּ עִם יְהוֹשָׁפָֽט׀־־׃
translation:
  text: And the fear of Yahweh came upon all the kingdoms of the lands that were around Judah, and they did not make war against Jehoshaphat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'terror from the LORD' or 'dread of the LORD.' The Hebrew phrase can denote fear associated with the LORD, here likely meaning a divinely sent dread on the surrounding kingdoms.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: came
  alternatives:
  - was
  - came to be
  lexicon: HALOT
  rationale: The idiom ויהי + abstract noun is naturally rendered in English as the state coming upon someone rather than woodenly 'and it was.' 'Came' preserves the onset of a condition in readable English.
- source_word: פַּחַד יְהוָה
  chosen: the fear of the LORD
  alternatives:
  - terror from the LORD
  - dread of the LORD
  lexicon: HALOT
  rationale: פחד denotes fear, dread, or terror. The construct can mean fear caused by the LORD or fear associated with him. 'The fear of the LORD' is the most direct rendering and fits the context of divinely induced dread falling on surrounding kingdoms. The covenant name יְהוָה follows project policy as 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַל
  chosen: upon
  alternatives:
  - 'on'
  - over
  lexicon: HALOT
  rationale: With פחד and a following group, עַל marks the object affected by the fear. 'Upon' is slightly more idiomatic in this elevated narrative context than simple 'on.'
- source_word: כָּל מַמְלְכוֹת הָאֲרָצוֹת
  chosen: all the kingdoms of the lands
  alternatives:
  - all the kingdoms of the countries
  - all the kingdoms of the lands around
  lexicon: HALOT
  rationale: ממלכות is 'kingdoms.' הארצות is literally 'the lands/countries.' Retaining both nouns reflects the Hebrew expression rather than collapsing it to a single term. 'Lands' is slightly more formal and geographically broad than 'countries.'
- source_word: אֲשֶׁר סְבִיבוֹת יְהוּדָה
  chosen: that were around Judah
  alternatives:
  - that were surrounding Judah
  - around Judah
  lexicon: HALOT
  rationale: This relative clause identifies the neighboring territories. 'That were around Judah' is natural English and preserves the locative sense of סביבות.
- source_word: וְלֹא נִלְחֲמוּ עִם
  chosen: and they did not make war against
  alternatives:
  - and they did not fight against
  - so they did not wage war with
  lexicon: HALOT
  rationale: נלחם עם commonly means to fight or wage war with/against. 'Make war against' captures the military-political sense more fully than the more generic 'fight against.'
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Personal names are transliterated by standard English convention per project policy.
