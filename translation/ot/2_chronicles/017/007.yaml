id: 2CH.17.7
reference: 2 Chronicles 17:7
source:
  edition: WLC
  text: וּ/בִ/שְׁנַ֨ת שָׁל֜וֹשׁ לְ/מָלְכ֗/וֹ שָׁלַ֤ח לְ/שָׂרָי/ו֙ לְ/בֶן חַ֨יִל֙ וּ/לְ/עֹבַדְיָ֣ה
    וְ/לִ/זְכַרְיָ֔ה וְ/לִ/נְתַנְאֵ֖ל וּ/לְ/מִיכָיָ֑הוּ לְ/לַמֵּ֖ד בְּ/עָרֵ֥י יְהוּדָֽה־׃
translation:
  text: And in the third year of his reign, he sent his officials—Ben-hail, Obadiah,
    Zechariah, Nethanel, and Micaiah—to teach in the cities of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his princes' or 'his leaders'; the Hebrew term can denote royal or administrative
      officials.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בִ/שְׁנַת שָׁלֹושׁ
  chosen: And in the third year
  alternatives:
  - Now in the third year
  - In the third year
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition is naturally rendered 'And
    in' in narrative sequence. 'Third year' is a straightforward temporal expression.
- source_word: לְמָלְכוֹ
  chosen: of his reign
  alternatives:
  - of his kingship
  - of his rule
  lexicon: HALOT
  rationale: The infinitive/verb-derived form with pronominal suffix denotes the period
    of his reigning. 'Of his reign' is idiomatic modern English and preserves the
    royal sense.
- source_word: שָׁלַח
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: HALOT
  rationale: Standard rendering of the common verb for sending; no contextual pressure
    suggests a more specialized gloss.
- source_word: לְשָׂרָיו
  chosen: his officials
  alternatives:
  - his princes
  - his leaders
  lexicon: HALOT
  rationale: שַׂר can mean prince, official, commander, or leader. In this administrative
    context, where named royal representatives are commissioned for instruction, 'officials'
    best conveys function in clear modern English without implying blood royalty.
- source_word: לְבֶן חַיִל
  chosen: Ben-hail
  alternatives:
  - Ben-Hail
  lexicon: HALOT
  rationale: This is a personal name, so it is transliterated rather than translated,
    in keeping with the project's policy on names.
- source_word: וּלְעֹבַדְיָה וְלִזְכַרְיָה וְלִנְתַנְאֵל וּלְמִיכָיָהוּ
  chosen: Obadiah, Zechariah, Nethanel, and Micaiah
  alternatives:
  - Obadiah, Zekariah, Nethanel, and Mikayahu
  lexicon: HALOT
  rationale: These are personal names and are therefore transliterated by standard
    English conventions. 'Nethanel' reflects the Hebrew form here rather than the
    more familiar 'Nathaniel.'
- source_word: לְלַמֵּד
  chosen: to teach
  alternatives:
  - to instruct
  lexicon: HALOT
  rationale: The piel infinitive of למד commonly means 'to teach.' 'To teach' is the
    most direct and natural rendering.
- source_word: בְּעָרֵי יְהוּדָה
  chosen: in the cities of Judah
  alternatives:
  - throughout the cities of Judah
  - in Judah's cities
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In the cities of Judah' preserves
    the plain sense; broader distributive nuances such as 'throughout' are possible
    by implication but not required in the main text.
