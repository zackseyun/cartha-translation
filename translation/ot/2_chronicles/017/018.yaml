id: 2CH.17.18
reference: 2 Chronicles 17:18
source:
  edition: WLC
  text: וְ/עַל יָד֖/וֹ יְהוֹזָבָ֑ד וְ/עִמּ֛/וֹ מֵאָֽה וּ/שְׁמוֹנִ֥ים אֶ֖לֶף חֲלוּצֵ֥י
    צָבָֽא־־׃ס
translation:
  text: And at his side was Jehozabad, and with him were 180,000 armed troops.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'at his hand'; this idiom can also suggest being under someone's
      direction or stationed alongside him.
    reason: lexical_alternative
  - marker: b
    text: Or '180,000 troops equipped for war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל יָדוֹ
  chosen: And at his side
  alternatives:
  - And under his command
  - And next to him
  lexicon: HALOT
  rationale: The idiom עַל יָד with pronominal suffix literally means 'at his hand/side'
    and in administrative or military lists can denote association or subordinate
    placement. Here, in a sequence naming commanders and their forces, 'at his side'
    preserves the spatial/associative idiom without over-interpreting it as a strict
    rank formula. 'Under his command' is possible but more interpretive.
- source_word: יְהוֹזָבָד
  chosen: Jehozabad
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy.
- source_word: וְעִמּוֹ
  chosen: and with him were
  alternatives:
  - and with him
  - accompanied by
  lexicon: HALOT
  rationale: The preposition עִם with suffix indicates accompaniment/association.
    English supplies 'were' naturally to form a complete clause with the following
    number and troop designation.
- source_word: מֵאָה וּשְׁמוֹנִים אֶלֶף
  chosen: 180,000
  alternatives:
  - one hundred eighty thousand
  lexicon: HALOT
  rationale: The Hebrew cardinal number is straightforward. Numerals are rendered
    in modern readable English using digits for clarity in a military census context.
- source_word: חֲלוּצֵי צָבָא
  chosen: armed troops
  alternatives:
  - equipped for war
  - troops ready for battle
  - warriors armed for battle
  lexicon: HALOT
  rationale: חֲלוּצִים refers to men equipped or drawn up for military service, often
    armed/ready for battle; צָבָא denotes army/warfare/host. 'Armed troops' is concise
    and natural, preserving the military sense without unnecessary expansion. 'Equipped
    for war' is also possible but less idiomatic in this list.
