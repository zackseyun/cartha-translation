id: 2CH.17.6
reference: 2 Chronicles 17:6
source:
  edition: WLC
  text: וַ/יִּגְבַּ֥הּ לִבּ֖/וֹ בְּ/דַרְכֵ֣י יְהוָ֑ה וְ/ע֗וֹד הֵסִ֛יר אֶת הַ/בָּמ֥וֹת וְ/אֶת הָ/אֲשֵׁרִ֖ים מִ/יהוּדָֽה־־׃פ
translation:
  text: His heart was exalted in the ways of Yahweh, and furthermore he removed the high places and the Asherim from Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his heart grew bold/was encouraged in the ways of the LORD.' The Hebrew idiom can denote an elevated or emboldened heart; here the context is positive, not arrogant.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the Asherim' or 'the sacred poles.' The Hebrew term refers to cultic objects associated with Asherah worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְבַּהּ
  chosen: was lifted up
  alternatives:
  - grew bold
  - was exalted
  - was encouraged
  lexicon: HALOT
  rationale: From גבהּ, literally 'to be high/exalted.' In this positive context with 'in the ways of the LORD,' the sense is not pride against God but elevated courage/resolve. 'Was lifted up' preserves the Hebrew metaphor while allowing the favorable context to govern interpretation.
- source_word: לִבּוֹ
  chosen: his heart
  alternatives:
  - his mind
  - his courage
  lexicon: HALOT
  rationale: לֵב/לֵבָב commonly denotes the inner person, including will, resolve, and disposition. 'Heart' is the most transparent and idiomatic rendering, preserving the Hebrew anthropology.
- source_word: בְּדַרְכֵי יְהוָה
  chosen: in the ways of the LORD
  alternatives:
  - in the ways of Yahweh
  - in the LORD's ways
  lexicon: HALOT
  rationale: דֶּרֶךְ in plural often refers metaphorically to conduct or manner of life. 'In the ways of the LORD' is a natural English rendering and preserves the covenantal idiom. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְעוֹד
  chosen: and furthermore
  alternatives:
  - and also
  - moreover
  - still
  lexicon: HALOT
  rationale: עוֹד here adds a further action beyond the previous clause. 'Furthermore' captures the additive force in readable modern English.
- source_word: הֵסִיר
  chosen: he removed
  alternatives:
  - he took away
  - he abolished
  lexicon: HALOT
  rationale: סוּר in the Hiphil commonly means 'remove' or 'take away.' 'Removed' is direct and fits the reform context without overstating the action.
- source_word: הַבָּמוֹת
  chosen: the high places
  alternatives:
  - the hill shrines
  - the cultic high places
  lexicon: HALOT
  rationale: בָּמוֹת is the standard term for elevated worship sites. 'High places' is the conventional and sufficiently transparent rendering; a more explanatory gloss would move toward paraphrase.
- source_word: הָאֲשֵׁרִים
  chosen: the Asherah poles
  alternatives:
  - the Asherim
  - the sacred poles
  lexicon: HALOT
  rationale: אֲשֵׁרִים can refer either to cultic objects associated with Asherah or, less specifically, sacred wooden poles/trees. 'Asherah poles' best balances lexical specificity and reader comprehension, signaling the likely cultic association without overdefining the exact form.
- source_word: מִיהוּדָה
  chosen: from Judah
  alternatives:
  - out of Judah
  lexicon: HALOT
  rationale: The preposition מִן marks removal from the territory/kingdom of Judah. 'From Judah' is the most natural English expression.
