theological_decisions:
- issue: Whether וַיִּגְבַּהּ לִבּוֹ should be rendered negatively as pride or positively as courage/resolve
  chosen_reading: positive elevation of heart in devotion to the LORD's ways
  alternative_readings:
  - his heart became proud in the ways of the LORD
  - his courage rose because of the LORD's ways
  rationale: Although the idiom can be negative in some contexts, the immediate qualifier 'in the ways of the LORD' and the following note about removing illicit worship sites indicate commendation, not sinful arrogance. The translation preserves the metaphor without importing a condemnatory sense the context does not support.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: How specifically to render אֲשֵׁרִים
  chosen_reading: Asherah poles
  alternative_readings:
  - Asherim
  - sacred poles
  rationale: The term refers to prohibited cultic objects tied to Asherah worship. 'Asherah poles' communicates the likely referent in accessible English while avoiding excessive interpretive expansion.
  doctrine_reference: Readable modern English, not archaic or academic; consistency of key terms, or documented exception.
