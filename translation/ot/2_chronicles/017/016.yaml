id: 2CH.17.16
reference: 2 Chronicles 17:16
source:
  edition: WLC
  text: וְ/עַל יָד/וֹ֙ עֲמַסְיָ֣ה בֶן זִכְרִ֔י הַ/מִּתְנַדֵּ֖ב לַ/יהוָ֑ה וְ/עִמּ֛/וֹ
    מָאתַ֥יִם אֶ֖לֶף גִּבּ֥וֹר חָֽיִל־־׃ס
translation:
  text: And under his command was Amasiah son of Zichri, who volunteered himself to
    the LORD, and with him were two hundred thousand mighty men of valor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who willingly offered himself for the LORD.' The Hebrew participle can
      emphasize voluntary self-dedication, and the preposition may be understood as
      'to' or 'for.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל יָדוֹ
  chosen: And under his command was
  alternatives:
  - And at his hand was
  - And next to him was
  - And under him was
  lexicon: HALOT
  rationale: The idiom עַל יָד with pronominal suffix in administrative/military lists
    indicates subordination or placement under someone's authority. 'Under his command'
    communicates the functional sense in clear modern English better than a more literal
    but opaque 'at his hand.'
- source_word: עֲמַסְיָה
  chosen: Amasiah
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: בֶן זִכְרִי
  chosen: son of Zichri
  rationale: Standard genealogical construction; 'son of' preserves the Hebrew relationship
    marker בן.
- source_word: הַמִּתְנַדֵּב
  chosen: who volunteered himself
  alternatives:
  - who willingly offered himself
  - who freely offered himself
  - the volunteer
  lexicon: HALOT
  rationale: The hitpael participle of נדב denotes willing or voluntary offering of
    oneself. Because the participle modifies Amasiah, an English relative clause is
    natural. 'Volunteered himself' preserves the reflexive/self-dedicatory nuance
    better than simply 'volunteered.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: 'The preposition ל marks direction/dedication: Amasiah offered himself
    to/for YHWH. The project default renders YHWH as ''the LORD.'' ''To the LORD''
    best matches the self-dedicatory sense.'
- source_word: וְעִמּוֹ
  chosen: and with him were
  alternatives:
  - and with him
  - and beside him were
  lexicon: HALOT
  rationale: Introduces the troops attached to Amasiah. Supplying 'were' is required
    in idiomatic English.
- source_word: מָאתַיִם אֶלֶף
  chosen: two hundred thousand
  rationale: Straightforward cardinal number construction.
- source_word: גִּבּוֹר חָיִל
  chosen: mighty men of valor
  alternatives:
  - mighty warriors
  - valiant warriors
  - men of might
  lexicon: HALOT
  rationale: This common military expression denotes strong, capable fighting men.
    'Mighty men of valor' preserves both elements of the Hebrew phrase and its elevated
    register, fitting the military census context.
