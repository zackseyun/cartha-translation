id: 2CH.17.17
reference: 2 Chronicles 17:17
source:
  edition: WLC
  text: וּ/מִ֨ן בִּנְיָמִ֔ן גִּבּ֥וֹר חַ֖יִל אֶלְיָדָ֑ע וְ/עִמּ֛/וֹ נֹֽשְׁקֵי קֶ֥שֶׁת
    וּ/מָגֵ֖ן מָאתַ֥יִם אָֽלֶף־־׃ס
translation:
  text: 'And from Benjamin: Eliada, a mighty man of valor, and with him two hundred
    thousand armed with bow and shield.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bearing bows and shields' or 'equipped with bow and shield.' The Hebrew
      participle indicates men furnished with these weapons.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן
  chosen: And from
  alternatives:
  - From
  - And from among
  lexicon: HALOT
  rationale: The conjunction plus preposition links this tribal contingent with the
    preceding list and introduces another source group. 'And from' preserves the additive
    flow of the military census.
- source_word: בִּנְיָמִן
  chosen: Benjamin
  lexicon: HALOT
  rationale: Proper tribal name, transliterated by standard English convention.
- source_word: גִּבּוֹר חַיִל
  chosen: a mighty man of valor
  alternatives:
  - a mighty warrior
  - a valiant warrior
  - a mighty man
  lexicon: HALOT
  rationale: The collocation commonly denotes a strong, valiant fighting man. 'Mighty
    man of valor' preserves both the personal commendation and the martial nuance,
    while remaining idiomatic in English.
- source_word: אֶלְיָדָע
  chosen: Eliada
  lexicon: HALOT
  rationale: Personal name transliterated rather than translated, per project philosophy.
- source_word: וְעִמּוֹ
  chosen: and with him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: 'The conjunction is retained to mirror the list structure: commander
    named first, then the troops attached to him.'
- source_word: נֹשְׁקֵי
  chosen: armed
  alternatives:
  - bearing
  - equipped with
  lexicon: HALOT
  rationale: The participle from נשק in this military context refers to being equipped
    with weapons. 'Armed' is concise and natural in English, while the following nouns
    specify the weapons.
- source_word: קֶשֶׁת
  chosen: bow
  alternatives:
  - bows
  lexicon: HALOT
  rationale: Hebrew singular after a participial expression can function collectively.
    English idiom prefers singular in the paired expression 'bow and shield' when
    describing equipment.
- source_word: וּמָגֵן
  chosen: and shield
  alternatives:
  - and shields
  lexicon: HALOT
  rationale: As with 'bow,' the singular is used collectively in Hebrew and is rendered
    idiomatically in English as part of the equipment pair.
- source_word: מָאתַיִם אָלֶף
  chosen: two hundred thousand
  lexicon: HALOT
  rationale: Standard cardinal number construction. Rendered straightforwardly as
    the troop count attached to Eliada.
