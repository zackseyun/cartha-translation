id: 2CH.17.11
reference: 2 Chronicles 17:11
source:
  edition: WLC
  text: וּ/מִן פְּלִשְׁתִּ֗ים מְבִיאִ֧ים לִֽ/יהוֹשָׁפָ֛ט מִנְחָ֖ה וְ/כֶ֣סֶף מַשָּׂ֑א
    גַּ֣ם הָֽ/עַרְבִיאִ֗ים מְבִיאִ֥ים ל/וֹ֙ צֹ֕אן אֵילִ֔ים שִׁבְעַ֤ת אֲלָפִים֙ וּ/שְׁבַ֣ע
    מֵא֔וֹת וּ/תְיָשִׁ֕ים שִׁבְעַ֥ת אֲלָפִ֖ים וּ/שְׁבַ֥ע מֵאֽוֹת־׃פ
translation:
  text: 'And some of the Philistines were bringing Jehoshaphat tribute and silver
    as a load; the Arabians also were bringing him flocks: 7,700 rams and 7,700 male
    goats.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the Philistines'; the Hebrew may emphasize source rather than a
      partitive sense.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'silver, a load'—that is, silver carried as tribute.
    reason: cultural_note
lexical_decisions:
- source_word: וּ/מִן פְּלִשְׁתִּים
  chosen: And some of the Philistines
  alternatives:
  - And from the Philistines
  - And the Philistines
  lexicon: HALOT
  rationale: 'The prefixed מִן with an ethnonym can denote source (''from'') or partitive
    sense (''some of''). In context, a partitive nuance fits naturally in English:
    not necessarily every Philistine individually, but Philistines as a contributing
    group.'
- source_word: מְבִיאִים
  chosen: were bringing
  alternatives:
  - brought
  - bringing
  lexicon: HALOT
  rationale: The participle conveys ongoing/customary action in narrative context.
    English past progressive captures the durative or repeated sense better than a
    simple preterite.
- source_word: מִנְחָה
  chosen: tribute
  alternatives:
  - gift
  - offering
  - present
  lexicon: HALOT
  rationale: In a political context involving foreign peoples and a king, מִנְחָה
    commonly denotes tribute rather than a voluntary gift or cultic offering.
- source_word: וְ/כֶסֶף מַשָּׂא
  chosen: and silver as a load
  alternatives:
  - and silver, a burden
  - and silver tribute
  - and money as tribute
  lexicon: HALOT
  rationale: כֶּסֶף is literally 'silver,' often functioning as money. מַשָּׂא is
    'load/burden.' The phrase likely means silver carried as a tribute-load. 'Silver
    as a load' preserves the concrete Hebrew while remaining intelligible.
- source_word: גַּם הָעַרְבִיאִים
  chosen: the Arabians also
  alternatives:
  - also the Arabs
  - the Arabians too
  lexicon: HALOT
  rationale: Retains the additive force of גַּם and the people-group designation.
    'Arabians' is a conventional rendering for this ethnonym in this historical setting.
- source_word: ל/וֹ צֹאן
  chosen: him flocks
  alternatives:
  - to him sheep
  - for him flocks
  lexicon: HALOT
  rationale: צֹאן is a collective term for small livestock, especially sheep and goats.
    Since the verse then specifies rams and male goats, 'flocks' best represents the
    collective heading.
- source_word: אֵילִים
  chosen: rams
  alternatives:
  - male sheep
  lexicon: HALOT
  rationale: Standard lexical sense is adult male sheep; 'rams' is the natural English
    equivalent.
- source_word: שִׁבְעַת אֲלָפִים וּשְׁבַע מֵאוֹת
  chosen: 7,700
  alternatives:
  - seven thousand seven hundred
  lexicon: HALOT
  rationale: Arabic numerals improve readability in modern English without loss of
    meaning.
- source_word: וּ/תְיָשִׁים
  chosen: male goats
  alternatives:
  - he-goats
  - goats
  lexicon: HALOT
  rationale: תְּיָשִׁים specifically denotes male goats. 'Male goats' is clear modern
    English; 'he-goats' is accurate but less natural.
