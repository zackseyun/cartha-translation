id: 2CH.17.9
reference: 2 Chronicles 17:9
source:
  edition: WLC
  text: וַֽ/יְלַמְּדוּ֙ בִּֽ/יהוּדָ֔ה וְ/עִ֨מָּ/הֶ֔ם סֵ֖פֶר תּוֹרַ֣ת יְהוָ֑ה וַ/יָּסֹ֨בּוּ֙
    בְּ/כָל עָרֵ֣י יְהוּדָ֔ה וַֽ/יְלַמְּד֖וּ בָּ/עָֽם־׃
translation:
  text: They taught in Judah, and the Book of the Law of the LORD was with them; they
    went around through all the cities of Judah and taught among the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the scroll of the Law of the LORD.' The Hebrew word can denote a written
      document in scroll form.
    reason: lexical_alternative
  - marker: b
    text: Or 'and taught the people.' The Hebrew more literally says 'taught among
      the people.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with the Book of the Law of the LORD with them'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְלַמְּדוּ
  chosen: They taught
  alternatives:
  - They instructed
  lexicon: HALOT
  rationale: Piel of למד commonly means to teach/instruct. 'Taught' is the most natural
    and direct English rendering here and matches the repeated verb later in the verse.
- source_word: בִּיהוּדָה
  chosen: in Judah
  alternatives:
  - throughout Judah
  lexicon: HALOT
  rationale: The preposition ב normally indicates location, 'in Judah.' The later
    verb 'went around through all the cities of Judah' supplies the distributive sense,
    so the initial phrase is best kept simple.
- source_word: וְעִמָּהֶם
  chosen: with them
  alternatives:
  - and they had with them
  lexicon: HALOT
  rationale: 'The phrase states accompaniment: the book was with them as they taught.
    A fuller paraphrase is unnecessary.'
- source_word: סֵפֶר תּוֹרַת יְהוָה
  chosen: the Book of the Law of the LORD
  alternatives:
  - the scroll of the Law of the LORD
  - the book of the instruction of the LORD
  lexicon: HALOT
  rationale: סֵפֶר is most straightforwardly 'book' here, though historically it could
    denote a scroll; 'Book' is idiomatic in English biblical style. תּוֹרָה can mean
    'instruction,' but in this collocation it refers to the covenantal law corpus,
    so 'Law' is the clearest rendering. יְהוָה follows the doctrinal default 'the
    LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: וַיָּסֹבּוּ
  chosen: they went around
  alternatives:
  - they traveled around
  - they went about
  lexicon: HALOT
  rationale: סבב in this narrative context conveys moving about from place to place.
    'Went around' is natural modern English and preserves the itinerant sense.
- source_word: בְּכָל עָרֵי יְהוּדָה
  chosen: through all the cities of Judah
  alternatives:
  - in all the cities of Judah
  - throughout all the cities of Judah
  lexicon: HALOT
  rationale: With the motion verb, English 'through all the cities of Judah' best
    expresses their circuit among the cities.
- source_word: וַיְלַמְּדוּ בָּעָם
  chosen: and taught among the people
  alternatives:
  - and taught the people
  - and taught among the populace
  lexicon: HALOT
  rationale: The preposition ב with עָם is not a direct-object construction here;
    'among the people' preserves the sense that their teaching activity took place
    within the populace. 'Taught the people' is possible as a smoother idiom, but
    it obscures the preposition.
