  from: with the Book of the Law of the LORD with them
  to: and the Book of the Law of the LORD was with them
  rationale: The current phrasing 'with... with them' is redundant and awkward in
    English. The Hebrew `וְעִמָּהֶם סֵפֶר...` is a verbless clause, literally 'and
    with them (was) the book...'. The suggested rewrite is a more natural and grammatically
    sound English rendering that accurately reflects the Hebrew syntax. It also restores
    the coordinating conjunction `וְ` (and) that connects the first two clauses, which
    the current draft subordinates.
