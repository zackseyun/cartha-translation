id: 2CH.17.14
reference: 2 Chronicles 17:14
source:
  edition: WLC
  text: וְ/אֵ֥לֶּה פְקֻדָּתָ֖/ם לְ/בֵ֣ית אֲבוֹתֵי/הֶ֑ם לִֽ/יהוּדָה֙ שָׂרֵ֣י אֲלָפִ֔ים
    עַדְנָ֣ה הַ/שָּׂ֔ר וְ/עִמּ/וֹ֙ גִּבּ֣וֹרֵי חַ֔יִל שְׁלֹ֥שׁ מֵא֖וֹת אָֽלֶף׃ס
translation:
  text: 'And these were their mustered divisions by their fathers’ houses: for Judah,
    the commanders of thousands: Adnah the commander, and with him three hundred thousand
    mighty men of valor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their number' or 'their enrollment'; the Hebrew term can refer to a
      census, muster, or the resulting arrangement of troops.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְקֻדָּתָם
  chosen: their mustered divisions
  alternatives:
  - their number
  - their enrollment
  - their appointments
  lexicon: HALOT
  rationale: The noun from פקד in military context refers to those counted/mustered
    or the arrangement resulting from that muster. Given the following list of military
    leaders and troop totals, 'mustered divisions' captures both the census/military
    organization sense better than the flatter 'number.'
- source_word: לְבֵית אֲבוֹתֵיהֶם
  chosen: by their fathers’ houses
  alternatives:
  - according to their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: A standard genealogical/administrative expression referring to clan-based
    organization. 'Fathers’ houses' is a fairly literal rendering that remains understandable
    in context.
- source_word: לִיהוּדָה
  chosen: for Judah
  alternatives:
  - of Judah
  - belonging to Judah
  lexicon: HALOT
  rationale: Introduces the contingent from the tribe/kingdom of Judah within the
    larger list. 'For Judah' reads naturally as a heading for the unit listed.
- source_word: שָׂרֵי אֲלָפִים
  chosen: the commanders of thousands
  alternatives:
  - captains of thousands
  - chiefs of thousands
  lexicon: HALOT
  rationale: An administrative-military title for officers over units reckoned by
    thousands. 'Commanders' is modern and clear; 'captains' may sound anachronistically
    specific.
- source_word: עַדְנָה הַשָּׂר
  chosen: Adnah the commander
  alternatives:
  - Adnah the chief
  - Adnah the captain
  lexicon: HALOT
  rationale: הַשָּׂר identifies Adnah as the leading officer in this entry. 'Commander'
    matches the earlier rendering of שׂר.
- source_word: גִּבּוֹרֵי חַיִל
  chosen: mighty men of valor
  alternatives:
  - mighty warriors
  - valiant warriors
  - mighty men of strength
  lexicon: HALOT
  rationale: A common military expression denoting proven fighting men. 'Mighty men
    of valor' preserves the idiomatic force and traditional resonance while remaining
    intelligible.
- source_word: שְׁלֹשׁ מֵאוֹת אָלֶף
  chosen: three hundred thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number; no adjustment warranted.
