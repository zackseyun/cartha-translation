id: 2CH.17.13
reference: 2 Chronicles 17:13
source:
  edition: WLC
  text: וּ/מְלָאכָ֥ה רַבָּ֛ה הָ֥יָה ל֖/וֹ בְּ/עָרֵ֣י יְהוּדָ֑ה וְ/אַנְשֵׁ֧י מִלְחָמָ֛ה
    גִּבּ֥וֹרֵי חַ֖יִל בִּ/ירוּשָׁלִָֽם׃
translation:
  text: And he had much work in the cities of Judah, and men of war, mighty men of
    valor, in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'much property' or 'abundant supplies'; the Hebrew מְלָאכָה can in some
      contexts refer more broadly than labor alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְלָאכָה
  chosen: work
  alternatives:
  - property
  - supplies
  - occupation
  - service
  lexicon: HALOT
  rationale: The noun can denote work, business, service, or possessions depending
    on context. Here, in connection with activity distributed through the cities of
    Judah, 'work' best preserves the broad sense without over-specifying administration
    or wealth. Some versions take it as 'stores' or 'supplies,' but that is less directly
    supported by the lexical core.
- source_word: רַבָּה
  chosen: much
  alternatives:
  - great
  - abundant
  lexicon: HALOT
  rationale: The adjective marks quantity or magnitude. 'Much' fits naturally with
    'work' in English and conveys abundance without sounding inflated.
- source_word: הָיָה לוֹ
  chosen: he had
  alternatives:
  - there was for him
  - it belonged to him
  lexicon: HALOT
  rationale: The existential construction literally means 'there was to him,' but
    idiomatic English is 'he had.' This is a standard optimal-equivalence rendering.
- source_word: בְּעָרֵי יְהוּדָה
  chosen: in the cities of Judah
  alternatives:
  - throughout the cities of Judah
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In the cities of Judah' is the most
    direct rendering; 'throughout' is interpretive and not necessary.
- source_word: אַנְשֵׁי מִלְחָמָה
  chosen: men of war
  alternatives:
  - fighting men
  - soldiers
  - warriors
  lexicon: HALOT
  rationale: The phrase is a standard military expression. 'Men of war' is formally
    close and still understandable in modern English, preserving the masculine wording
    of the Hebrew per the gender-accurate principle.
- source_word: גִּבּוֹרֵי חַיִל
  chosen: mighty men of valor
  alternatives:
  - mighty warriors
  - valiant men
  - mighty men of strength
  lexicon: HALOT
  rationale: This stock phrase often denotes proven, valiant fighting men. 'Mighty
    men of valor' preserves both the idiomatic force and the traditional military
    nuance. 'Mighty warriors' is smoother but compresses the two-part Hebrew expression.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative rendering of the place name.
