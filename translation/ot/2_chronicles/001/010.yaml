theological_decisions:
- issue: Leadership idiom in Solomon's request
  chosen_reading: Retain 'go out before this people and come in' as an idiomatic description
    of royal leadership rather than replacing it with an explicit paraphrase such
    as 'lead this people.'
  alternative_readings:
  - lead this people
  - govern this people
  rationale: The Hebrew idiom is transparent enough in English and preserves the source-text
    imagery and royal nuance. A more explicit paraphrase would communicate the function
    but would move beyond the wording actually used.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Original-language
    primacy over translation tradition.'
