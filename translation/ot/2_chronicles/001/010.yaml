id: 2CH.1.10
reference: 2 Chronicles 1:10
source:
  edition: WLC
  text: עַתָּ֗ה חָכְמָ֤ה וּ/מַדָּע֙ תֶּן לִ֔/י וְ/אֵֽצְאָ֛ה לִ/פְנֵ֥י הָֽ/עָם הַ/זֶּ֖ה
    וְ/אָב֑וֹאָה כִּֽי מִ֣י יִשְׁפֹּ֔ט אֶת עַמְּ/ךָ֥ הַ/זֶּ֖ה הַ/גָּדֽוֹל־־־־׃ס
translation:
  text: Now give me wisdom and knowledge, so that I may go out before this people
    and come in, for who can judge this great people of yours?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'go out before this people and come in,' an idiom for exercising
      public leadership.
    reason: cultural_note
  - marker: b
    text: Or 'your great people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - So now
  - At this time
  lexicon: HALOT
  rationale: Temporal discourse marker introducing Solomon's request; 'Now' is natural
    and concise in English.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חָכְמָה, especially in royal/judicial contexts
    involving skill in governing.
- source_word: וּמַדָּע
  chosen: and knowledge
  alternatives:
  - and understanding
  lexicon: HALOT
  rationale: מַדָּע denotes knowledge or understanding; 'knowledge' is the more direct
    lexical equivalent and preserves the pairing with 'wisdom' without collapsing
    the two terms.
- source_word: תֶּן לִי
  chosen: give me
  alternatives:
  - grant me
  lexicon: HALOT
  rationale: Direct imperative plus indirect object. 'Give me' is the plain sense;
    'grant me' is possible but slightly more interpretive and elevated.
- source_word: וְאֵצְאָה ... וְאָבוֹאָה
  chosen: so that I may go out ... and come in
  alternatives:
  - that I may lead ... and return
  - that I may go out ... and come in among
  lexicon: HALOT
  rationale: The cohortatives express purpose/result after the request. 'Go out and
    come in' preserves the Hebrew idiom commonly used for active public leadership,
    while remaining understandable in English.
- source_word: לִפְנֵי הָעָם הַזֶּה
  chosen: before this people
  alternatives:
  - before these people
  - at the head of this people
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in front of.' In context it conveys leadership
    in relation to the nation. 'Before this people' preserves the Hebrew image without
    over-paraphrasing.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for Solomon's request. 'For' fits the formal connection
    in English.
- source_word: מִי יִשְׁפֹּט
  chosen: who can judge
  alternatives:
  - who is able to judge
  - who can govern
  lexicon: HALOT
  rationale: Although the Hebrew verb means 'judge,' in royal context it includes
    governing and administering justice. 'Judge' keeps the lexical link while 'can'
    appropriately brings out the rhetorical sense of ability.
- source_word: עַמְּךָ
  chosen: people of yours
  alternatives:
  - your people
  lexicon: HALOT
  rationale: The suffix marks direct address to God. The smoother English main text
    uses 'people of yours' here to preserve emphasis at the end of the clause, though
    'your people' is the most idiomatic equivalent.
- source_word: הַגָּדוֹל
  chosen: great
  alternatives:
  - large
  lexicon: HALOT
  rationale: Can denote greatness or largeness; in this context it likely includes
    both size and significance. 'Great' preserves the broader sense and matches the
    rhetorical tone.
