id: 2CH.1.4
reference: 2 Chronicles 1:4
source:
  edition: WLC
  text: אֲבָ֗ל אֲר֤וֹן הָ/אֱלֹהִים֙ הֶעֱלָ֤ה דָוִיד֙ מִ/קִּרְיַ֣ת יְעָרִ֔ים בַּֽ/הֵכִ֥ין
    ל֖/וֹ דָּוִ֑יד כִּ֧י נָֽטָה ל֛/וֹ אֹ֖הֶל בִּ/ירוּשָׁלִָֽם־׃
translation:
  text: But David had brought up the ark of God from Kiriath-jearim to the place David
    had prepared for it, for he had pitched a tent for it in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'to what David had prepared for it'; the Hebrew expression
      is compressed, and the sense is that David brought the ark to the place he had
      made ready for it.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבָל
  chosen: But
  alternatives:
  - However
  - Now
  lexicon: HALOT
  rationale: Marks contrast with the previous verse about the bronze altar being at
    Gibeon, while the ark was elsewhere.
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the ark of the true God
  lexicon: HALOT
  rationale: Standard construct phrase; 'ark of God' is the plain sense and natural
    English.
- source_word: הֶעֱלָה
  chosen: had brought up
  alternatives:
  - brought up
  - caused to go up
  lexicon: HALOT
  rationale: Hiphil of עלה commonly refers to bringing the ark up; pluperfect sense
    fits the narrative background explaining the ark's prior relocation.
- source_word: מִקִּרְיַת יְעָרִים
  chosen: from Kiriath-jearim
  alternatives:
  - from Kiriath Yearim
  lexicon: HALOT
  rationale: Transliterate the place name by standard English convention.
- source_word: בַּהֵכִין לוֹ דָוִיד
  chosen: to the place David had prepared for it
  alternatives:
  - to where David had prepared for it
  - to what David had prepared for it
  lexicon: HALOT
  rationale: The preposition ב plus infinitive/verb form here is elliptical in English;
    the sense is destination toward the prepared location. Supplying 'the place' makes
    the clause intelligible without over-paraphrase.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanatory reason David had prepared that place.
- source_word: נָטָה לוֹ אֹהֶל
  chosen: he had pitched a tent for it
  alternatives:
  - he had spread a tent for it
  - he had set up a tent for it
  lexicon: HALOT
  rationale: נטה with אהל means to pitch or spread a tent. 'Pitched a tent' is idiomatic
    modern English.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative phrase with standard transliteration.
