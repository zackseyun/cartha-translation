id: 2CH.1.15
reference: 2 Chronicles 1:15
source:
  edition: WLC
  text: וַ/יִּתֵּ֨ן הַ/מֶּ֜לֶךְ אֶת הַ/כֶּ֧סֶף וְ/אֶת הַ/זָּהָ֛ב בִּ/ירוּשָׁלִַ֖ם
    כָּ/אֲבָנִ֑ים וְ/אֵ֣ת הָ/אֲרָזִ֗ים נָתַ֛ן כַּ/שִּׁקְמִ֥ים אֲשֶׁר בַּ/שְּׁפֵלָ֖ה
    לָ/רֹֽב־־־׃
translation:
  text: The king made the silver and the gold in Jerusalem as plentiful as stones,
    and he made the cedars as plentiful as the sycamore trees that are in the lowland.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like stones' and 'like the sycamores ... in abundance.' The Hebrew expresses
      extraordinary abundance through comparison.
    reason: lexical_alternative
  - marker: b
    text: '''The lowland'' refers to the Shephelah, the Judean foothill region between
      the hill country and the coastal plain.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּתֵּן / נָתַן
  chosen: made ... as plentiful as / made
  alternatives:
  - gave
  - put
  - made available
  lexicon: HALOT
  rationale: 'Although נתן commonly means ''give'' or ''put,'' in this idiom with
    direct objects (''the silver and the gold'') plus a comparative phrase (''as stones''),
    the sense is causative/resultative: the king caused silver and gold to become
    exceedingly common in Jerusalem. ''Made ... as plentiful as'' communicates the
    idiomatic force in natural English better than a wooden ''gave.'' The second occurrence
    is rendered consistently with the same idiomatic sense.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to Solomon in context; standard rendering is
    straightforward.
- source_word: הַכֶּסֶף
  chosen: the silver
  alternatives:
  - silver
  lexicon: HALOT
  rationale: The article is retained with 'the silver' because the Hebrew has a definite
    direct object and the phrase refers to silver as a commodity in Jerusalem. English
    could omit the article, but retaining it mirrors the Hebrew structure without
    awkwardness.
- source_word: הַזָּהָב
  chosen: the gold
  alternatives:
  - gold
  lexicon: HALOT
  rationale: As with 'the silver,' the article is preserved to reflect the Hebrew
    definite object and the paired expression.
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Simple locative prepositional phrase.
- source_word: כָּאֲבָנִים
  chosen: as plentiful as stones
  alternatives:
  - like stones
  - as stones
  lexicon: HALOT
  rationale: Literally 'like/as the stones.' Because the comparison modifies abundance
    rather than material identity, 'as plentiful as stones' makes the implied sense
    explicit in idiomatic English.
- source_word: הָאֲרָזִים
  chosen: the cedars
  alternatives:
  - cedar wood
  - cedar trees
  lexicon: HALOT
  rationale: The plural noun likely refers to cedar timber/cedar supply in context
    of royal wealth and building materials, but 'the cedars' preserves the Hebrew
    form and remains understandable. 'Cedar wood' would be interpretive.
- source_word: כַּשִּׁקְמִים
  chosen: as plentiful as the sycamore trees
  alternatives:
  - like the sycamore trees
  - as the sycamores
  lexicon: HALOT
  rationale: שׁקמה refers to the sycamore fig tree of the region, not the modern North
    American sycamore maple. 'Sycamore trees' is the most familiar concise rendering,
    with the arboreal sense made explicit.
- source_word: אֲשֶׁר בַּשְּׁפֵלָה
  chosen: that are in the lowland
  alternatives:
  - that were in the Shephelah
  - which are in the foothills
  lexicon: HALOT
  rationale: שְׁפֵלָה can denote the Judean lowland/foothill region. 'The lowland'
    is a clear common-English rendering; 'Shephelah' is more technical and may be
    preserved in a footnote. Present tense 'are' follows the Hebrew relative clause
    naturally in English description.
- source_word: לָרֹב
  chosen: as plentiful as
  alternatives:
  - in abundance
  - very many
  lexicon: HALOT
  rationale: 'This phrase expresses abundance and is best brought into English by
    folding it into the comparative construction: the cedars were made as plentiful
    as the sycamores in the lowland. This avoids a clumsy literal ending such as ''for
    abundance'' while preserving the sense.'
