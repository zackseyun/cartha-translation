id: 2CH.1.14
reference: 2 Chronicles 1:14
source:
  edition: WLC
  text: וַ/יֶּאֱסֹ֣ף שְׁלֹמֹה֮ רֶ֣כֶב וּ/פָרָשִׁים֒ וַֽ/יְהִי ל֗/וֹ אֶ֤לֶף וְ/אַרְבַּע
    מֵאוֹת֙ רֶ֔כֶב וּ/שְׁנֵים עָשָׂ֥ר אֶ֖לֶף פָּרָשִׁ֑ים וַ/יַּנִּיחֵ/ם֙ בְּ/עָרֵ֣י
    הָ/רֶ֔כֶב וְ/עִם הַ/מֶּ֖לֶךְ בִּ/ירֽוּשָׁלִָֽם־־־־׃
translation:
  text: And Solomon gathered chariots and horsemen, and he had 1,400 chariots and
    12,000 horsemen; and he stationed them in the chariot cities and with the king
    in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cavalry.' The Hebrew term refers to mounted riders; 'horsemen' is the
      more literal rendering.
    reason: lexical_alternative
  - marker: b
    text: That is, designated cities where chariots were kept or garrisoned.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֶּאֱסֹף
  chosen: gathered
  alternatives:
  - collected
  - assembled
  lexicon: HALOT
  rationale: The verb אסף commonly means to gather or collect. 'Gathered' is natural
    English and fits the sense of amassing military resources without overinterpreting
    the manner.
- source_word: רֶכֶב
  chosen: chariots
  alternatives:
  - chariotry
  - chariot force
  lexicon: HALOT
  rationale: Although רכב can function collectively for chariotry, the verse immediately
    gives a count ('1,400'), so the concrete plural 'chariots' is the clearest rendering
    in English.
- source_word: פָּרָשִׁים
  chosen: horsemen
  alternatives:
  - cavalry
  - horses
  lexicon: HALOT
  rationale: The noun normally denotes horsemen/riders rather than the animals themselves.
    'Cavalry' is possible but slightly more interpretive and modern-military in tone;
    'horsemen' stays closer to the Hebrew.
- source_word: וַיְהִי לוֹ
  chosen: he had
  alternatives:
  - there were for him
  - it belonged to him
  lexicon: HALOT
  rationale: The idiom literally means 'and there was to him,' but idiomatic English
    is 'he had.' This preserves the possession sense without wooden phrasing.
- source_word: אֶלֶף וְאַרְבַּע מֵאוֹת רֶכֶב
  chosen: 1,400 chariots
  alternatives:
  - one thousand four hundred chariots
  lexicon: HALOT
  rationale: Rendered with standard English number style for readability while preserving
    the exact count.
- source_word: וּשְׁנֵים עָשָׂר אֶלֶף פָּרָשִׁים
  chosen: 12,000 horsemen
  alternatives:
  - twelve thousand horsemen
  lexicon: HALOT
  rationale: Rendered with standard English number style for readability while preserving
    the exact count.
- source_word: וַיַּנִּיחֵם
  chosen: he stationed them
  alternatives:
  - he placed them
  - he settled them
  lexicon: HALOT
  rationale: From נוח/הניח in the causative sense, the verb here refers to placing
    military assets in assigned locations. 'Stationed' best fits the military context.
- source_word: בְּעָרֵי הָרֶכֶב
  chosen: in the chariot cities
  alternatives:
  - in the cities for chariots
  - in the chariot towns
  lexicon: HALOT
  rationale: This phrase refers to designated storage or garrison cities associated
    with chariots. 'Chariot cities' is concise and reflects established usage without
    becoming archaic.
- source_word: וְעִם הַמֶּלֶךְ
  chosen: and with the king
  alternatives:
  - and some with the king
  lexicon: HALOT
  rationale: The Hebrew simply says 'and with the king.' English leaves the implied
    distribution understood from context; adding 'some' would be interpretive.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard transliteration and prepositional rendering.
