id: 2CH.1.12
reference: 2 Chronicles 1:12
source:
  edition: WLC
  text: הַֽ/חָכְמָ֥ה וְ/הַ/מַּדָּ֖ע נָת֣וּן לָ֑/ךְ וְ/עֹ֨שֶׁר וּ/נְכָסִ֤ים וְ/כָבוֹד֙
    אֶתֶּן לָ֔/ךְ אֲשֶׁ֣ר לֹא הָ֣יָה כֵ֗ן לַ/מְּלָכִים֙ אֲשֶׁ֣ר לְ/פָנֶ֔י/ךָ וְ/אַחֲרֶ֖י/ךָ
    לֹ֥א יִֽהְיֶה כֵּֽן־׀־־׃
translation:
  text: Wisdom and knowledge are given to you, and I will give you riches and possessions
    and honor such as no kings before you have had, and none after you will have the
    like.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'which has not been so for the kings who were before
      you, and after you it will not be so.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחָכְמָה
  chosen: wisdom
  alternatives:
  - the wisdom
  lexicon: HALOT
  rationale: Standard rendering of חָכְמָה. English omits the article for natural
    style while preserving the abstract noun sense.
- source_word: הַמַּדָּע
  chosen: knowledge
  alternatives:
  - understanding
  - the knowledge
  lexicon: HALOT
  rationale: מַדָּע denotes knowledge or understanding. 'Knowledge' pairs naturally
    with 'wisdom' and reflects the lexical sense without overinterpreting.
- source_word: נָתוּן לָךְ
  chosen: are given to you
  alternatives:
  - has been given to you
  - is granted to you
  lexicon: HALOT
  rationale: Passive participial form from נתן conveys a granted state. English plural
    agreement ('are given') follows the compound subject 'wisdom and knowledge.'
- source_word: עֹשֶׁר
  chosen: riches
  alternatives:
  - wealth
  lexicon: HALOT
  rationale: עֹשֶׁר refers to wealth/riches. 'Riches' fits the elevated royal context
    and distinguishes it from the following term.
- source_word: נְכָסִים
  chosen: possessions
  alternatives:
  - property
  - assets
  lexicon: HALOT
  rationale: נְכָסִים denotes possessions or property. 'Possessions' is clear modern
    English and avoids overly technical wording like 'assets.'
- source_word: כָבוֹד
  chosen: honor
  alternatives:
  - glory
  lexicon: HALOT
  rationale: In this royal-bestowal context, כָבוֹד can mean honor or glory. 'Honor'
    fits the list of kingly benefits and avoids implying divine glory.
- source_word: אֶתֶּן לָךְ
  chosen: I will give you
  alternatives:
  - I give to you
  lexicon: HALOT
  rationale: Imperfect of נתן here is naturally future in context, expressing God's
    promised bestowal.
- source_word: אֲשֶׁר לֹא הָיָה כֵן
  chosen: such as ... have had
  alternatives:
  - which has not been so
  - the like of which has not been
  lexicon: HALOT
  rationale: The clause compares Solomon's gifts with those of other kings. Idiomatic
    English expresses this as 'such as no kings ... have had' rather than a wooden
    'has not been so.'
- source_word: לַמְּלָכִים
  chosen: kings
  alternatives:
  - the kings
  lexicon: HALOT
  rationale: Definite article is generic/comparative here; English naturally omits
    it in 'no kings before you.'
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - prior to you
  lexicon: HALOT
  rationale: Temporal comparative sense in royal succession context.
- source_word: וְאַחֲרֶיךָ לֹא יִהְיֶה כֵן
  chosen: and none after you will have the like
  alternatives:
  - and after you it will not be so
  - and no one after you will be like this
  lexicon: HALOT
  rationale: The Hebrew continues the comparison with future kings. 'None after you
    will have the like' makes explicit the implied royal comparison and matches the
    preceding clause idiomatically.
