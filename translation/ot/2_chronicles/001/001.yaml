id: 2CH.1.1
reference: 2 Chronicles 1:1
source:
  edition: WLC
  text: וַ/יִּתְחַזֵּ֛ק שְׁלֹמֹ֥ה בֶן דָּוִ֖יד עַל מַלְכוּת֑/וֹ וַ/יהוָ֤ה אֱלֹהָי/ו֙
    עִמּ֔/וֹ וַֽ/יְגַדְּלֵ֖/הוּ לְ/מָֽעְלָ/ה־־׃
translation:
  text: And Solomon son of David strengthened himself over his kingdom, and the LORD
    his God was with him and made him exceedingly great.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'became strong over his kingdom' or 'was established over his kingdom.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD'; the divine name is YHWH.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתְחַזֵּק
  chosen: strengthened himself
  alternatives:
  - became strong
  - was strengthened
  - established himself
  lexicon: HALOT
  rationale: Hitpael of חזק is reflexive/intransitive, indicating Solomon's becoming
    strong or strengthening himself. 'Strengthened himself' preserves the reflexive
    nuance better than the more interpretive 'established himself,' while still reading
    naturally in English.
- source_word: עַל מַלְכוּתוֹ
  chosen: over his kingdom
  alternatives:
  - in his kingdom
  - over his kingship
  - in his reign
  lexicon: HALOT
  rationale: The preposition עַל with מַלְכוּת suggests authority or position over
    the kingdom/royal rule. 'Over his kingdom' keeps the spatial-metaphorical sense
    of dominion without overinterpreting the phrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    to follow established reverential convention and the Septuagintal pattern.
- source_word: אֱלֹהָיו
  chosen: his God
  lexicon: HALOT
  rationale: Straightforward possessive construction; 'his God' preserves the covenantal/personal
    relationship indicated by the Hebrew.
- source_word: עִמּוֹ
  chosen: was with him
  alternatives:
  - was alongside him
  lexicon: HALOT
  rationale: Idiomatic expression of divine presence and favor; 'was with him' is
    the standard and most natural rendering.
- source_word: וַיְגַדְּלֵהוּ
  chosen: made him ... great
  alternatives:
  - magnified him
  - exalted him
  - made him great
  lexicon: HALOT
  rationale: Piel of גדל with object suffix means to make someone great, magnify,
    or exalt. 'Made him great' is clear modern English and preserves the causative
    sense.
- source_word: לְמָעְלָה
  chosen: exceedingly
  alternatives:
  - to a high degree
  - upward
  - beyond measure
  lexicon: HALOT
  rationale: Here לְמַעְלָה functions adverbially/intensively after 'made him great.'
    'Exceedingly' captures the idiomatic force succinctly in English.
- source_word: בֶן דָּוִיד
  chosen: son of David
  lexicon: HALOT
  rationale: Literal filial designation; no reason to paraphrase. It also preserves
    the dynastic connection emphasized by the Chronicler.
