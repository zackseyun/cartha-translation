theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This verse does not require deviation from that policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Agency in Solomon's rise
  chosen_reading: Retain both Solomon's reflexive strengthening and God's active exaltation
    in the same verse
  alternative_readings:
  - Render the first clause passively ('was strengthened')
  - Render the first clause more interpretively ('was established')
  rationale: The Hebrew presents both Solomon's strengthening in relation to the kingdom
    and the LORD's presence and action in making him great. The translation preserves
    that tension rather than collapsing all agency into either Solomon or God alone.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
