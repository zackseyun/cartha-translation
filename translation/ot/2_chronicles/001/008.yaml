theological_decisions:
- issue: Rendering חֶסֶד in a covenantal context
  chosen_reading: covenant faithfulness
  alternative_readings:
  - great kindness
  - steadfast love
  rationale: The verse recalls God's covenantal dealings with David, so a rendering
    that preserves the loyal, covenantal dimension of חֶסֶד is preferable to a flatter
    term like 'kindness.' 'Steadfast love' is traditional and strong, but 'covenant
    faithfulness' makes the covenantal aspect more explicit for modern readers.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Royal succession language
  chosen_reading: made me king in his place
  alternative_readings:
  - caused me to reign after him
  rationale: This wording preserves divine agency in Solomon's accession while keeping
    the statement accessible and idiomatic. It does not import additional theological
    claims beyond God's providential establishment of Solomon as king.
  doctrine_reference: Translation philosophy §§1, 6
