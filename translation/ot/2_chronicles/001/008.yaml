id: 2CH.1.8
reference: 2 Chronicles 1:8
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר שְׁלֹמֹה֙ לֵֽ/אלֹהִ֔ים אַתָּ֗ה עָשִׂ֛יתָ עִם דָּוִ֥יד אָבִ֖/י
    חֶ֣סֶד גָּד֑וֹל וְ/הִמְלַכְתַּ֖/נִי תַּחְתָּֽי/ו־׃
translation:
  text: And Solomon said to God, “You have shown great covenant faithfulness to David
    my father, and you have made me king in his place.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “have shown great kindness to David my father” or “have shown great steadfast
      love to David my father.” The Hebrew חֶסֶד often carries the sense of loyal,
      covenantal love or faithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural,
    sufficiently formal rendering in English narrative style.
- source_word: לֵאלֹהִים
  chosen: to God
  alternatives:
  - to God himself
  lexicon: HALOT
  rationale: אֱלֹהִים here clearly refers to the one true God addressed by Solomon.
    'To God' is the plain and natural rendering.
- source_word: עָשִׂיתָ עִם ... חֶסֶד גָּדוֹל
  chosen: have shown great covenant faithfulness to
  alternatives:
  - have shown great kindness to
  - have dealt with ... in great steadfast love
  - have done great good to
  lexicon: HALOT
  rationale: The idiom עשה עם + חֶסֶד means to act toward someone with loyal, covenantal
    kindness. Because חֶסֶד carries more than generic 'kindness,' 'covenant faithfulness'
    best preserves its theological and relational weight here, while remaining readable.
    'Great' renders גָּדוֹל directly.
- source_word: דָּוִיד אָבִי
  chosen: David my father
  alternatives:
  - my father David
  lexicon: HALOT
  rationale: Both English orders are possible; 'David my father' follows the Hebrew
    sequence more closely while remaining idiomatic.
- source_word: וְהִמְלַכְתַּנִי
  chosen: and you have made me king
  alternatives:
  - and you have caused me to reign
  - and you have enthroned me
  lexicon: HALOT
  rationale: The Hiphil of מלך means to cause someone to reign or make someone king.
    'Made me king' is clear, natural English and preserves the causative sense.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: תחת in succession contexts means 'in place of' or 'instead of.' 'In his
    place' is the most idiomatic English for royal succession without implying displacement
    by force.
