  chosen_reading: fathers’ houses
  alternative_readings:
  - ancestral houses
  - families
  rationale: This is not a doctrinally contested term, but the translation preserves
    the male-marked Hebrew social idiom rather than neutralizing it. This aligns with
    the project's gender-accurate principle and keeps the historical texture of the
    text.
