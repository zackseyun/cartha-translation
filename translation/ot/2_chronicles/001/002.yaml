id: 2CH.1.2
reference: 2 Chronicles 1:2
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שְׁלֹמֹ֣ה לְ/כָל יִשְׂרָאֵ֡ל לְ/שָׂרֵי֩ הָ/אֲלָפִ֨ים וְ/הַ/מֵּא֜וֹת
    וְ/לַ/שֹּֽׁפְטִ֗ים וּ/לְ/כֹ֛ל נָשִׂ֥יא לְ/כָל יִשְׂרָאֵ֖ל רָאשֵׁ֥י הָ/אָבֽוֹת־־׃
translation:
  text: And Solomon spoke to all Israel—to the commanders of thousands and of hundreds,
    to the judges, and to every leader in all Israel, the heads of the fathers’ houses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “said to all Israel.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the heads of the fathers’ houses,” referring to clan or ancestral-household
      leaders.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: Though the verb is formally 'said,' in English 'spoke to' better fits
    the construction with multiple addressees introduced by לְ and avoids awkward
    repetition. This remains within optimal equivalence and preserves the sense of
    public address.
- source_word: לְכָל יִשְׂרָאֵל
  chosen: to all Israel
  alternatives:
  - to all the Israelites
  lexicon: HALOT
  rationale: A direct rendering of the collective national designation. 'All Israel'
    is a standard biblical expression and preserves the corporate sense better than
    the more individualized 'all the Israelites.'
- source_word: שָׂרֵי הָאֲלָפִים וְהַמֵּאוֹת
  chosen: the commanders of thousands and of hundreds
  alternatives:
  - the captains over thousands and hundreds
  - the officials of thousands and hundreds
  lexicon: HALOT
  rationale: שָׂרֵי denotes officials/rulers/commanders. In this military-administrative
    context, 'commanders' is the clearest modern rendering. 'Thousands' and 'hundreds'
    likely refer to military or administrative units, so the genitival construction
    is retained rather than paraphrased.
- source_word: וְלַשֹּׁפְטִים
  chosen: to the judges
  alternatives:
  - to the rulers
  lexicon: HALOT
  rationale: The participial/noun form from שׁפט is straightforwardly rendered 'judges,'
    matching the established administrative role in Israel.
- source_word: וּלְכֹל נָשִׂיא
  chosen: and to every leader
  alternatives:
  - and to every prince
  - and to every chief
  lexicon: HALOT
  rationale: נָשִׂיא can mean prince, chief, leader, or ruler. 'Leader' is broad enough
    to fit the administrative context and avoids the potentially misleading monarchical
    nuance of 'prince' in modern English.
- source_word: לְכָל יִשְׂרָאֵל
  chosen: in all Israel
  alternatives:
  - of all Israel
  lexicon: HALOT
  rationale: 'Here the phrase modifies נָשִׂיא and is best taken distributively/geographically:
    ''every leader in all Israel.'' This avoids the clumsier repetition ''every leader
    of all Israel'' while preserving the scope.'
- source_word: רָאשֵׁי הָאָבוֹת
  chosen: the heads of the fathers’ houses
  alternatives:
  - the heads of the ancestral houses
  - the family heads
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the social structure denoted
    by the Hebrew clan/household terminology. 'Family heads' is smoother but loses
    the specific idiom of patrilineal household groups. The phrase likely stands in
    apposition to 'every leader in all Israel.'
