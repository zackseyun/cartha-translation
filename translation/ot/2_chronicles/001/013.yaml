id: 2CH.1.13
reference: 2 Chronicles 1:13
source:
  edition: WLC
  text: וַ/יָּבֹ֨א שְׁלֹמֹ֜ה לַ/בָּמָ֤ה אֲשֶׁר בְּ/גִבְעוֹן֙ יְר֣וּשָׁלִַ֔ם מִ/לִּ/פְנֵ֖י
    אֹ֣הֶל מוֹעֵ֑ד וַ/יִּמְלֹ֖ךְ עַל יִשְׂרָאֵֽל־־׃פ
translation:
  text: Then Solomon came from the high place that was at Gibeon, from before the
    tent of meeting, to Jerusalem, and he reigned over Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went'; the Hebrew verb can be rendered from either directional viewpoint.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from before the tent of meeting,' a spatial expression for departing
      from the sanctuary area.
    reason: cultural_note
  - marker: c
    text: That is, the cultic high place at Gibeon where the tent of meeting was located.
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come' or 'go/enter' depending on viewpoint.
    Here English can naturally say Solomon 'came ... to Jerusalem' from Gibeon. This
    also avoids the awkwardness created by the Hebrew word order, which places 'Jerusalem'
    after 'Gibeon'.
- source_word: לַבָּמָה
  chosen: the high place
  alternatives:
  - the high place shrine
  lexicon: HALOT
  rationale: במה refers to a cultic high place. 'High place' is the standard and sufficiently
    transparent rendering here, especially since this site at Gibeon is being described
    rather than condemned.
- source_word: אֲשֶׁר בְּגִבְעוֹן
  chosen: that was at Gibeon
  alternatives:
  - which was in Gibeon
  lexicon: HALOT
  rationale: A straightforward relative clause preserving the location of the high
    place.
- source_word: יְרוּשָׁלִַם
  chosen: to Jerusalem
  alternatives:
  - Jerusalem
  lexicon: HALOT
  rationale: Although the Hebrew text places 'Jerusalem' immediately after 'Gibeon,'
    the sense in context is movement back to Jerusalem. English requires making the
    destination explicit in the clause structure.
- source_word: מִלִּפְנֵי
  chosen: from before
  alternatives:
  - from the presence of
  - from before the presence of
  lexicon: HALOT
  rationale: Literally 'from before.' This preserves the spatial/cultic nuance of
    departing from before the sanctuary, while remaining readable.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the tabernacle
  - the tent of appointment
  lexicon: HALOT
  rationale: '''Tent of meeting'' is the established transparent rendering of אהל
    מועד and preserves the Hebrew expression better than the more interpretive ''tabernacle.'''
- source_word: וַיִּמְלֹךְ
  chosen: he reigned
  alternatives:
  - he became king
  - he ruled as king
  lexicon: HALOT
  rationale: מלך in the Qal commonly means 'reign, become king.' In this context Solomon
    is already king, so 'he reigned' best fits the narrative continuation.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - upon Israel
  lexicon: HALOT
  rationale: 'Standard rendering of על with מלך: ''reign over Israel.'''
