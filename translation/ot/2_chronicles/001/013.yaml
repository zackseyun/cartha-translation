theological_decisions:
- issue: Syntactical relation of 'Jerusalem' in a verse whose Hebrew word order is
    compressed and potentially awkward in English
  chosen_reading: Solomon returned from the high place at Gibeon, from before the
    tent of meeting, to Jerusalem
  alternative_readings:
  - Solomon came to the high place that was at Gibeon, Jerusalem, from before the
    tent of meeting
  - Solomon came from the high place that was at Gibeon to Jerusalem, from before
    the tent of meeting
  rationale: The Masoretic sequence is terse and can sound ambiguous if mirrored too
    woodenly in English. The broader context clearly has Solomon going to Gibeon earlier
    and now returning to Jerusalem after the divine encounter. The translation therefore
    reflects the contextual sense without adding content beyond what the syntax implies.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of a legitimate high place associated with the tent of meeting
  chosen_reading: the high place
  alternative_readings:
  - the shrine on the high place
  rationale: The term is translated lexically rather than interpreted polemically.
    In this context the text identifies the site at Gibeon where the tent of meeting
    was, so the translation should not import later negative associations beyond the
    verse itself.
  doctrine_reference: Translation philosophy §1, §3
