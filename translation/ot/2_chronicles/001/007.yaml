theological_decisions:
- issue: Rendering אֱלֹהִים in a theophany context
  chosen_reading: God
  alternative_readings:
  - gods
  rationale: The singular verbal agreement and narrative context make the singular
    referent certain. Rendering it as 'God' reflects the text's monotheistic reference
    without importing additional doctrinal claims.
  doctrine_reference: Affirmations; Translation philosophy §1
