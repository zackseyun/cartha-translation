id: 2CH.1.7
reference: 2 Chronicles 1:7
source:
  edition: WLC
  text: בַּ/לַּ֣יְלָה הַ/ה֔וּא נִרְאָ֥ה אֱלֹהִ֖ים לִ/שְׁלֹמֹ֑ה וַ/יֹּ֣אמֶר ל֔/וֹ שְׁאַ֖ל
    מָ֥ה אֶתֶּן לָֽ/ךְ־׃
translation:
  text: That night God appeared to Solomon and said to him, “Ask what I should give
    you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Ask what I shall give you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּלַּיְלָה הַהוּא
  chosen: That night
  alternatives:
  - In that night
  - On that night
  lexicon: HALOT
  rationale: The Hebrew phrase literally means 'in/on that night.' 'That night' is
    idiomatic modern English and preserves the temporal reference without unnecessary
    stiffness.
- source_word: נִרְאָה
  chosen: appeared
  alternatives:
  - was seen
  - revealed himself
  lexicon: HALOT
  rationale: The Niphal of ראה here functions as 'appeared' in a divine-appearance
    context. 'Was seen' is too wooden in English, and 'revealed himself' adds interpretive
    nuance beyond the verb itself.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural, אֱלֹהִים here takes a singular verb
    and clearly refers to the one God of Israel. 'God' is the natural singular rendering.
- source_word: לִשְׁלֹמֹה
  chosen: to Solomon
  lexicon: HALOT
  rationale: 'The preposition ל marks the indirect object of the appearance: God appeared
    to Solomon.'
- source_word: וַיֹּאמֶר לוֹ
  chosen: and said to him
  alternatives:
  - and told him
  lexicon: HALOT
  rationale: A straightforward rendering of the waw-consecutive plus אמר with pronominal
    object. 'Said to him' is more formally aligned than 'told him.'
- source_word: שְׁאַל
  chosen: Ask
  alternatives:
  - Request
  - Ask for yourself
  lexicon: HALOT
  rationale: The imperative is direct and simple. 'Ask' best preserves the open-ended
    invitation. 'Request' is possible but less natural; 'ask for yourself' overtranslates.
- source_word: מָה אֶתֶּן לָךְ
  chosen: what I should give you
  alternatives:
  - what I am to give you
  - what I shall give you
  - what I should give to you
  lexicon: HALOT
  rationale: 'The Hebrew literally reads ''what shall I give you?'' In English after
    an imperative (''Ask''), indirect-question style is most natural: ''Ask what I
    should give you.'' This preserves the sense without archaic stiffness. ''Shall''
    is possible but sounds dated in contemporary English.'
