id: 2CH.1.18
reference: 2 Chronicles 1:18
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שְׁלֹמֹ֗ה לִ/בְנ֥וֹת בַּ֨יִת֙ לְ/שֵׁ֣ם יְהוָ֔ה וּ/בַ֖יִת לְ/מַלְכוּתֽ/וֹ׃
translation:
  text: And Solomon said to build a house for the name of Yahweh, and a house for his kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Solomon resolved/commanded to build a temple for the LORD's name, and a palace for his kingdom.' The Hebrew more literally repeats 'house' in both clauses.
    reason: lexical_alternative
  - marker: b
    text: Or 'And Solomon said'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - purposed
  - commanded
  - resolved
  lexicon: HALOT
  rationale: The verb is the common 'say.' In this context, with an infinitive following ('to build'), it can imply intention or command, but 'said' preserves the Hebrew wording most directly without over-interpreting Solomon's exact speech act.
- source_word: לִבְנוֹת
  chosen: to build
  alternatives:
  - that he should build
  - to establish
  lexicon: HALOT
  rationale: The infinitive construct of בנה straightforwardly means 'to build.' Rendering it as an infinitive keeps the syntax close to the Hebrew.
- source_word: בַּיִת
  chosen: house
  alternatives:
  - temple
  - palace
  lexicon: HALOT
  rationale: The noun literally means 'house.' Because the verse uses the same noun twice for two different structures, translating both occurrences as 'house' preserves the lexical repetition. The first clearly refers to the temple by function, but 'house' better reflects the Hebrew and allows the following phrase 'for the name of the LORD' to specify its purpose.
- source_word: לְשֵׁם יְהוָה
  chosen: for the name of the LORD
  alternatives:
  - for the LORD's name
  - for the honor of the LORD
  lexicon: HALOT
  rationale: This phrase is a standard temple expression. 'For the name of the LORD' preserves the theological idiom that the temple is associated with YHWH's name, not a claim that God is contained there. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וּבַיִת
  chosen: and a house
  alternatives:
  - and a palace
  lexicon: HALOT
  rationale: The second occurrence of בַּיִת is again rendered 'house' for consistency with the Hebrew repetition. Its royal function is clarified by the following phrase 'for his kingdom.' 'Palace' is a plausible contextual gloss but would obscure the repeated noun.
- source_word: לְמַלְכוּתוֹ
  chosen: for his kingdom
  alternatives:
  - for his kingship
  - for his royal rule
  - for his kingdom's affairs
  lexicon: HALOT
  rationale: The noun מַלְכוּת commonly means 'kingdom' or 'kingship.' 'For his kingdom' is the most natural English rendering here and likely denotes the royal house in relation to Solomon's reign.
