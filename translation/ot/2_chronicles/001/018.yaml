theological_decisions:
- issue: Temple formula involving the divine name
  chosen_reading: for the name of Yahweh
  alternative_readings:
  - for the LORD's name
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of בַּיִת in both clauses
  chosen_reading: house ... and a house
  alternative_readings:
  - temple ... and a palace
  rationale: Using 'house' in both places preserves the Hebrew repetition and avoids importing interpretive specificity into the main text. The contextual distinction is still clear from the qualifying phrases.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #5, consistency of key terms, or documented exception'
