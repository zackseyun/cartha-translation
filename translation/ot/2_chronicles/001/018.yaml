  rationale: The Hebrew construction וַיֹּאמֶר (wayyōmer) followed by an infinitive (here, לִבְנוֹת, 'to build') typically indicates a decision, resolution, or command, not just speech. The current rendering 'said to build' is an unnatural English idiom that can sound awkward or imply he spoke the literal words 'to build'. Changing it to 'resolved to build' (or 'decided', 'purposed') more accurately and naturally conveys the force of the Hebrew idiom, a choice reflected in nearly all major English translations (e.g., KJV, ESV, NASB).
