id: 2CH.1.6
reference: 2 Chronicles 1:6
source:
  edition: WLC
  text: וַ/יַּעַל֩ שְׁלֹמֹ֨ה שָׁ֜ם עַל מִזְבַּ֤ח הַ/נְּחֹ֨שֶׁת֙ לִ/פְנֵ֣י יְהוָ֔ה אֲשֶׁ֖ר לְ/אֹ֣הֶל מוֹעֵ֑ד וַ/יַּ֧עַל עָלָ֛י/ו עֹל֖וֹת אָֽלֶף־׃
translation:
  text: And Solomon went up there to the bronze altar before Yahweh, which was at the tent of meeting, and offered on it a thousand burnt offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text follows the project''s standard rendering ''the LORD'' for the divine name יְהוָה.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - ascended
  - came up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' In sacrificial context here, the first occurrence refers to Solomon's movement to the altar, so 'went up' is natural modern English while preserving the directional sense.
- source_word: שָׁם
  chosen: there
  alternatives:
  - to that place
  lexicon: HALOT
  rationale: Adverb of place referring back to Gibeon in the context; 'there' is the straightforward rendering.
- source_word: מִזְבַּח הַנְּחֹשֶׁת
  chosen: the bronze altar
  alternatives:
  - the altar of bronze
  - the copper altar
  lexicon: HALOT
  rationale: Standard expression for the tabernacle altar. 'Bronze' is conventional and idiomatic in English for נְחֹשֶׁת in this cultic context, though the metal can overlap with copper/bronze.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי denotes presence or position before someone. The divine name יְהוָה follows the project's default rendering 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר לְאֹהֶל מוֹעֵד
  chosen: which was at the tent of meeting
  alternatives:
  - which belonged to the tent of meeting
  - which was before the tent of meeting
  lexicon: HALOT
  rationale: The relative clause identifies the altar in relation to the tent of meeting. The prefixed ל here is best taken locatively/associatively in context, yielding a natural English clause 'which was at the tent of meeting.'
- source_word: וַיַּעַל ... עָלָיו עֹלוֹת
  chosen: offered on it ... burnt offerings
  alternatives:
  - caused to go up on it ... burnt offerings
  - sacrificed on it ... burnt offerings
  lexicon: HALOT
  rationale: 'The second עלה is idiomatic sacrificial language: offerings ''go up'' on the altar. English normally expresses this as ''offered'' rather than repeating ''went up,'' which would obscure the sacrificial sense.'
- source_word: עֹלוֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: Established and accurate rendering for the sacrificial term עֹלָה in the plural.
- source_word: אָלֶף
  chosen: a thousand
  lexicon: HALOT
  rationale: Cardinal number; no special idiom here. It quantifies the scale of Solomon's offerings.
