theological_decisions:
- issue: Rendering of במה in a context of legitimate worship before the temple
  chosen_reading: high place
  alternative_readings:
  - shrine
  - cultic height
  rationale: The term is rendered literally as 'high place' without importing a negative
    theological judgment, since in this context the sanctuary at Gibeon was the proper
    worship site before the temple's construction.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's contested-terms table specifies 'the LORD' as the default
    rendering for YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
