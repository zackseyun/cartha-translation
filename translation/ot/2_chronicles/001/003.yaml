id: 2CH.1.3
reference: 2 Chronicles 1:3
source:
  edition: WLC
  text: וַ/יֵּלְכ֗וּ שְׁלֹמֹה֙ וְ/כָל הַ/קָּהָ֣ל עִמּ֔/וֹ לַ/בָּמָ֖ה אֲשֶׁ֣ר בְּ/גִבְע֑וֹן
    כִּי שָׁ֣ם הָיָ֗ה אֹ֤הֶל מוֹעֵד֙ הָֽ/אֱלֹהִ֔ים אֲשֶׁ֥ר עָשָׂ֛ה מֹשֶׁ֥ה עֶֽבֶד
    יְהוָ֖ה בַּ/מִּדְבָּֽר־־־׃
translation:
  text: So Solomon and all the assembly with him went to the high place that was at
    Gibeon, because the tent of meeting of God was there, which Moses the servant
    of the LORD had made in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the tent of meeting of God was there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: went
  alternatives:
  - set out
  - went up
  lexicon: HALOT
  rationale: Wayyiqtol of הלך gives the main narrative advance; simple past 'went'
    is natural English and sufficient without adding directional nuance not explicit
    in the verb itself.
- source_word: הַקָּהָל
  chosen: the assembly
  alternatives:
  - the congregation
  - the gathered community
  lexicon: HALOT
  rationale: קהל denotes the assembled community. 'Assembly' is clear modern English
    and preserves the corporate sense better than the more tradition-bound 'congregation'
    in this historical setting.
- source_word: עִמּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: Straightforward comitative phrase referring to Solomon.
- source_word: לַבָּמָה
  chosen: to the high place
  alternatives:
  - to the cultic high place
  - to the shrine on the height
  lexicon: HALOT
  rationale: במה commonly refers to a high place used for worship. 'High place' is
    the standard and most transparent rendering; here it is not necessarily pejorative,
    since the legitimate sanctuary was located there at this time.
- source_word: בְּגִבְעוֹן
  chosen: at Gibeon
  alternatives:
  - in Gibeon
  lexicon: HALOT
  rationale: Place name transliterated per project philosophy. 'At Gibeon' fits the
    locative sense idiomatically in English.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason Solomon went there. 'Because' communicates the
    causal force more clearly in contemporary English than the more formal 'for.'
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tabernacle
  lexicon: HALOT
  rationale: Established rendering of the sanctuary term. 'Tabernacle' is possible
    but less transparent and not the lexical wording of the Hebrew here.
- source_word: הָאֱלֹהִים
  chosen: of God
  alternatives:
  - God's
  lexicon: HALOT
  rationale: Construct relationship with אֹהֶל מוֹעֵד is preserved most directly by
    'of God.'
- source_word: עָשָׂה
  chosen: had made
  alternatives:
  - made
  - fashioned
  lexicon: HALOT
  rationale: English past perfect fits the relative clause referring to an action
    prior to the main narrative time. 'Made' is the normal sense of עשה here.
- source_word: עֶבֶד יְהוָה
  chosen: the servant of the LORD
  alternatives:
  - the slave of the LORD
  lexicon: HALOT
  rationale: For this honorific title applied to Moses, 'servant' is the natural English
    rendering. Although עבד can denote slave, the bonded-status nuance is not foregrounded
    here; the title functions as a designation of faithful service.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר in biblical narrative is conventionally and accurately rendered
    'wilderness,' especially in reference to Israel's wilderness period.
