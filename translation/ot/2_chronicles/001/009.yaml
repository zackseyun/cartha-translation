theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD.' Here,
    because אֱלֹהִים immediately follows, the natural English form is 'LORD God' rather
    than 'the LORD God' after the vocative 'Now.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether דְּבָרְךָ should be made explicit as 'promise'
  chosen_reading: your word
  alternative_readings:
  - your promise
  rationale: The context is God's promise to David, but the Hebrew says 'your word.'
    To avoid importing interpretive specificity beyond the text, the main text keeps
    'word' while allowing the promissory nuance to be explained in notes.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
