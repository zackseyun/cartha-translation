id: 2CH.1.9
reference: 2 Chronicles 1:9
source:
  edition: WLC
  text: עַתָּה֙ יְהוָ֣ה אֱלֹהִ֔ים יֵֽאָמֵן֙ דְּבָ֣רְ/ךָ֔ עִ֖ם דָּוִ֣יד אָבִ֑/י כִּ֤י
    אַתָּה֙ הִמְלַכְתַּ֔/נִי עַל עַ֕ם רַ֖ב כַּ/עֲפַ֥ר הָ/אָֽרֶץ־׃
translation:
  text: Now, LORD God, let your word to David my father be confirmed, for you have
    made me king over a people as numerous as the dust of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let your promise to David my father be established.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה אֱלֹהִים
  chosen: LORD God
  alternatives:
  - Yahweh God
  - LORD, God
  lexicon: HALOT
  rationale: Rendered the divine name יְהוָה as 'LORD' per doctrine default, and אֱלֹהִים
    appositionally as 'God.' This preserves the covenant name/title combination without
    transliterating the Tetragrammaton.
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Temporal/discourse marker introducing Solomon's petition. 'Now' is sufficient
    in English without adding an unwarranted conjunction.
- source_word: יֵאָמֵן
  chosen: let ... be confirmed
  alternatives:
  - let ... be established
  - may ... prove faithful/true
  lexicon: HALOT
  rationale: Niphal of אמן here expresses the wish that God's word/promise be established
    or confirmed. 'Be confirmed' fits the passive form and the covenant-promise context.
- source_word: דְּבָרְךָ
  chosen: your word
  alternatives:
  - your promise
  - what you said
  lexicon: HALOT
  rationale: Literally 'your word.' Although the sense is promissory in context, retaining
    'word' preserves the Hebrew expression while remaining natural English.
- source_word: עִם דָּוִיד אָבִי
  chosen: to David my father
  alternatives:
  - with David my father
  - concerning David my father
  lexicon: HALOT
  rationale: The preposition עִם is literally 'with,' but in this idiom with דָּבָר
    it refers to the word spoken/promised to someone. 'To David my father' is the
    clearest idiomatic English rendering.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the ground of Solomon's request. 'For' preserves the formal
    connection and reads naturally in prayer language.
- source_word: הִמְלַכְתַּנִי
  chosen: you have made me king
  alternatives:
  - you have caused me to reign
  - you have enthroned me
  lexicon: HALOT
  rationale: Hiphil of מלך with 1cs suffix means 'cause me to be king' or 'make me
    king.' This is more idiomatic than 'caused me to reign' while preserving the causative
    sense.
- source_word: עַל עַם רַב
  chosen: over a people as numerous
  alternatives:
  - over a great people
  - over a numerous people
  lexicon: HALOT
  rationale: רַב can mean 'great' or 'many/numerous.' Because the following simile
    quantifies the people, 'as numerous' anticipates and matches the sense better
    than 'great.'
- source_word: כַּעֲפַר הָאָרֶץ
  chosen: as the dust of the earth
  alternatives:
  - like the dust of the land
  - like the dust of the ground
  lexicon: HALOT
  rationale: Standard Hebrew simile for innumerability. 'Earth' is preferable here
    to 'land' because the expression is conventional and not specifically territorial.
