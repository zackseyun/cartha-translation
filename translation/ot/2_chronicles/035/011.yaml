id: 2CH.35.11
reference: 2 Chronicles 35:11
source:
  edition: WLC
  text: וַֽ/יִּשְׁחֲט֖וּ הַ/פָּ֑סַח וַ/יִּזְרְק֤וּ הַ/כֹּהֲנִים֙ מִ/יָּדָ֔/ם וְ/הַ/לְוִיִּ֖ם
    מַפְשִׁיטִֽים׃
translation:
  text: And they slaughtered the Passover lamb, and the priests splashed the blood
    from their hands, while the Levites were skinning the animals.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Passover sacrifice.' The Hebrew refers to the Passover victim being
      slaughtered.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'splashed' is the standard sacrificial term for applying
      blood at the altar; it can also be rendered 'sprinkled' in English tradition.
    reason: lexical_alternative
  - marker: c
    text: That is, the Levites were removing the hides from the slaughtered sacrificial
      animals.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁחֲטוּ
  chosen: they slaughtered
  alternatives:
  - they killed
  - they butchered
  lexicon: HALOT
  rationale: The verb שׁחט is the standard term for slaughtering sacrificial animals.
    'Slaughtered' preserves the ritual-sacrificial sense better than the more generic
    'killed.'
- source_word: הַפָּסַח
  chosen: the Passover lamb
  alternatives:
  - the Passover sacrifice
  - the Passover offering
  lexicon: HALOT
  rationale: In this cultic context, פֶּסַח refers to the Passover victim being slaughtered,
    not merely the festival. 'Passover lamb' is natural English and contextually accurate,
    though 'sacrifice' is somewhat broader and possible.
- source_word: וַיִּזְרְקוּ
  chosen: splashed
  alternatives:
  - sprinkled
  - threw
  lexicon: HALOT
  rationale: זרק in sacrificial contexts refers to the priestly application of blood
    at the altar, often by tossing/splashing rather than delicate sprinkling. 'Splashed'
    communicates the ritual action more precisely in modern English.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים in temple-service contexts.
- source_word: מִיָּדָם
  chosen: from their hands
  alternatives:
  - from them
  - from their hand
  lexicon: HALOT
  rationale: The singular noun יָד with 3mp suffix is idiomatically 'from their hand(s).'
    Here it most naturally means the priests received the blood/material from those
    slaughtering and applied it. 'From their hands' is idiomatic English and preserves
    the plural referent.
- source_word: וְהַלְוִיִּם
  chosen: while the Levites
  alternatives:
  - and the Levites
  lexicon: HALOT
  rationale: The conjunction links a concurrent action. Rendering with 'while' makes
    the simultaneity clear in English without changing the sense.
- source_word: מַפְשִׁיטִים
  chosen: were skinning the animals
  alternatives:
  - were flaying them
  - were stripping off the skin
  lexicon: HALOT
  rationale: The participle from פשט in sacrificial context means removing the skin/hide
    from slaughtered animals. 'Skinning the animals' is clear modern English. 'Flaying'
    is more formal but less accessible; 'them' is implicit from context, but 'the
    animals' makes the object explicit for English readability.
