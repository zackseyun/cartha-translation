theological_decisions:
- issue: Gendered kinship and social terminology
  chosen_reading: Retain 'brothers' and 'sons of the people' in the main text
  alternative_readings:
  - your fellow Israelites
  - the people
  rationale: The Hebrew uses masculine kinship terms that function representatively
    within Israel's tribal structure. Per the translation philosophy, gender-accurate
    renderings are preferred over gender-neutral smoothing, especially where the familial
    structure is part of the meaning.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
