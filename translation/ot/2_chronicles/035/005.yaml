id: 2CH.35.5
reference: 2 Chronicles 35:5
source:
  edition: WLC
  text: וְ/עִמְד֣וּ בַ/קֹּ֗דֶשׁ לִ/פְלֻגּוֹת֙ בֵּ֣ית הָֽ/אָב֔וֹת לַ/אֲחֵי/כֶ֖ם בְּנֵ֣י
    הָ/עָ֑ם וַ/חֲלֻקַּ֥ת בֵּֽית אָ֖ב לַ/לְוִיִּֽם־׃
translation:
  text: And stand in the holy place according to the divisions of the fathers’ houses
    of your brothers, the sons of the people, and the division of a father’s house
    for the Levites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lay people'—literally, 'the sons of the people,' distinguishing
      the non-Levitical Israelites from the Levites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעִמְדוּ
  chosen: And stand
  alternatives:
  - Take your stand
  - Stand
  lexicon: HALOT
  rationale: Qal imperative plural of עמד, giving a direct instruction to the Levites.
    'Stand' is the plain sense; 'And' preserves the Hebrew conjunction linking this
    command to the surrounding instructions.
- source_word: בַּקֹּדֶשׁ
  chosen: in the holy place
  alternatives:
  - in the sanctuary
  - in holiness
  lexicon: HALOT
  rationale: With the article and local preposition, the phrase most naturally refers
    to the sacred area where the Levites are to position themselves. 'Holy place'
    preserves the concrete cultic sense without over-specifying a particular chamber.
- source_word: לִפְלֻגּוֹת
  chosen: according to the divisions of
  alternatives:
  - by the divisions of
  - in divisions of
  lexicon: HALOT
  rationale: 'The noun denotes divisions or groupings. Rendering with ''according
    to'' captures the organizational sense of the prefixed ל in context: they are
    to stand arranged in conformity with these divisions.'
- source_word: בֵּית הָאָבוֹת
  chosen: the fathers’ houses
  alternatives:
  - the ancestral houses
  - the family houses
  lexicon: HALOT
  rationale: This is a standard genealogical/tribal expression for paternal household
    groupings. 'Fathers’ houses' is a transparent formal rendering that preserves
    the source structure.
- source_word: לַאֲחֵיכֶם
  chosen: of your brothers
  alternatives:
  - for your brothers
  - belonging to your brothers
  lexicon: HALOT
  rationale: The phrase modifies the household divisions in relation to the Levites'
    fellow Israelites. 'Of your brothers' best fits the appositional/genitival flow
    in English while preserving the familial covenant language.
- source_word: בְּנֵי הָעָם
  chosen: the sons of the people
  alternatives:
  - the people
  - the lay people
  - the sons of the common people
  lexicon: HALOT
  rationale: Literally 'sons of the people.' In this context it distinguishes the
    non-Levitical Israelites from the Levites. Because the translation philosophy
    prefers gender-accurate renderings, the literal expression is retained rather
    than flattened to 'people,' while the contextual sense can be clarified in a footnote.
- source_word: וַחֲלֻקַּת
  chosen: and the division of
  alternatives:
  - and a corresponding division of
  - with the division of
  lexicon: HALOT
  rationale: The conjunction plus singular noun likely sets the corresponding Levitical
    division alongside the people's household divisions. 'And the division of' preserves
    the Hebrew coordination without over-interpreting the syntax.
- source_word: בֵּית אָב
  chosen: a father’s house
  alternatives:
  - a paternal house
  - an ancestral house
  lexicon: HALOT
  rationale: 'Singular here is best kept as a representative unit: one father''s-house
    grouping. English indefinite article communicates the distributive sense naturally.'
- source_word: לַלְוִיִּם
  chosen: for the Levites
  alternatives:
  - of the Levites
  - belonging to the Levites
  lexicon: HALOT
  rationale: The phrase marks the corresponding Levitical grouping. 'For the Levites'
    works idiomatically with the preceding singular 'division' and reflects the relational
    force of the preposition.
