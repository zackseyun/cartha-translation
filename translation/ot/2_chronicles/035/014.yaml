id: 2CH.35.14
reference: 2 Chronicles 35:14
source:
  edition: WLC
  text: וְ/אַחַ֗ר הֵכִ֤ינוּ לָ/הֶם֙ וְ/לַ/כֹּ֣הֲנִ֔ים כִּ֤י הַ/כֹּהֲנִים֙ בְּנֵ֣י
    אַהֲרֹ֔ן בְּ/הַֽעֲל֛וֹת הָ/עוֹלָ֥ה וְ/הַ/חֲלָבִ֖ים עַד לָ֑יְלָה וְ/הַ/לְוִיִּם֙
    הֵכִ֣ינוּ לָ/הֶ֔ם וְ/לַ/כֹּהֲנִ֖ים בְּנֵ֥י אַהֲרֹֽן־׃
translation:
  text: Afterward they prepared for themselves and for the priests, because the priests,
    the sons of Aaron, were occupied in offering up the burnt offering and the fat
    portions until night. So the Levites prepared for themselves and for the priests,
    the sons of Aaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for them' in both occurrences of 'for themselves'; the Hebrew pronoun
      itself is not explicitly reflexive, but the context strongly suggests the Levites
      prepared for their own meal as well as for the priests.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחַר
  chosen: Afterward
  alternatives:
  - After that
  - Later
  lexicon: HALOT
  rationale: Temporal adverb/conjunction marking subsequent action. 'Afterward' is
    natural modern English and preserves the sequence from the prior verse.
- source_word: הֵכִינוּ
  chosen: they prepared
  alternatives:
  - they made ready
  - they prepared food
  lexicon: HALOT
  rationale: The verb כון in Hiphil here means to prepare or make ready. 'Prepared'
    is broad enough to cover the implied meal preparation without adding words not
    explicit in the Hebrew.
- source_word: לָהֶם
  chosen: for themselves
  alternatives:
  - for them
  lexicon: HALOT
  rationale: Given the subject is the Levites and the same phrase recurs later with
    explicit subject, the pronoun most naturally refers reflexively to the Levites'
    own provision. 'For themselves' makes the referent clear in English.
- source_word: וְלַכֹּהֲנִים
  chosen: and for the priests
  lexicon: HALOT
  rationale: Straightforward dative phrase indicating the additional group for whom
    preparation was made.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason the Levites had to prepare for the priests. 'Because'
    is clearer in contemporary English than the more formal 'for'.
- source_word: הַכֹּהֲנִים בְּנֵי אַהֲרֹן
  chosen: the priests, the sons of Aaron
  alternatives:
  - the Aaronic priests
  - the priests, sons of Aaron
  lexicon: HALOT
  rationale: Appositional phrase identifying which priests are meant. Retaining 'sons
    of Aaron' preserves the covenantal and genealogical language of the Hebrew.
- source_word: בְּהַעֲלוֹת
  chosen: were occupied in offering up
  alternatives:
  - were offering
  - were engaged in bringing up
  lexicon: HALOT
  rationale: Infinitive construct of עלה in sacrificial context means to offer up.
    The periphrastic English 'were occupied in offering up' captures the ongoing activity
    that explains why the priests could not prepare for themselves.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: Standard sacrificial term עֹלָה. 'Burnt offering' is the established
    and accurate rendering.
- source_word: וְהַחֲלָבִים
  chosen: and the fat portions
  alternatives:
  - and the fats
  - and the choice fat
  lexicon: HALOT
  rationale: In sacrificial contexts חֲלָבִים refers to the fat pieces offered on
    the altar, not generic dietary fat. 'Fat portions' is idiomatic and precise.
- source_word: עַד לָיְלָה
  chosen: until night
  alternatives:
  - until evening
  - until nighttime
  lexicon: HALOT
  rationale: The phrase denotes duration extending into the night. 'Until night' is
    a close and natural rendering; 'until evening' would understate the likely extent
    of the service.
- source_word: וְהַלְוִיִּם
  chosen: So the Levites
  alternatives:
  - And the Levites
  lexicon: HALOT
  rationale: The conjunction resumes the main clause after the causal explanation.
    'So' brings out the resulting action in English while remaining faithful to the
    discourse flow.
