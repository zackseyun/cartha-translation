id: 2CH.35.20
reference: 2 Chronicles 35:20
source:
  edition: WLC
  text: אַחֲרֵ֣י כָל זֹ֗את אֲשֶׁ֨ר הֵכִ֤ין יֹֽאשִׁיָּ֨הוּ֙ אֶת הַ/בַּ֔יִת עָלָ֞ה נְכ֧וֹ
    מֶֽלֶךְ מִצְרַ֛יִם לְ/הִלָּחֵ֥ם בְּ/כַרְכְּמִ֖ישׁ עַל פְּרָ֑ת וַ/יֵּצֵ֥א לִ/קְרָאת֖/וֹ
    יֹאשִׁיָּֽהוּ־־־־׃
translation:
  text: After all this, when Josiah had set the house in order, Neco king of Egypt
    went up to fight at Carchemish on the Euphrates, and Josiah went out to meet him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had prepared the house,' with 'the house' referring to the temple.
    reason: lexical_alternative
  - marker: b
    text: '''Went out to meet him'' can also carry the sense ''went out against him''
      in this military context.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֵכִין
  chosen: had set ... in order
  alternatives:
  - had prepared
  - had established
  - had repaired
  lexicon: HALOT
  rationale: The Hiphil of כון commonly means to prepare, make ready, establish, or
    set in order. In this context, following the temple reforms and Passover, the
    sense is not physical construction alone but bringing the temple into proper functioning
    order. 'Set the house in order' captures the resultative sense in natural English
    better than the more ambiguous 'prepared the house.'
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: Literally 'the house.' In Chronicles this commonly refers to the temple,
    but the Hebrew expression itself is 'the house.' Retaining 'house' preserves the
    source wording while remaining intelligible in context.
- source_word: עָלָה
  chosen: went up
  alternatives:
  - marched up
  - came up
  lexicon: HALOT
  rationale: עלה is the standard verb 'go up/came up.' Even though the movement is
    military, the text does not use a more specific verb for marching, so 'went up'
    preserves the Hebrew idiom without over-specifying.
- source_word: לְהִלָּחֵם
  chosen: to fight
  alternatives:
  - to wage war
  - to make war
  lexicon: HALOT
  rationale: The infinitive of לחם in the Niphal/Hithpael domain here denotes engaging
    in battle. 'To fight' is straightforward modern English and sufficiently precise.
- source_word: בְּכַרְכְּמִישׁ
  chosen: at Carchemish
  alternatives:
  - against Carchemish
  - in Carchemish
  lexicon: HALOT
  rationale: 'The preposition ב can indicate location. Given the following ''on the
    Euphrates,'' the sense is locative: the battle campaign was at Carchemish.'
- source_word: עַל פְּרָת
  chosen: on the Euphrates
  alternatives:
  - by the Euphrates
  - upon the Euphrates River
  lexicon: HALOT
  rationale: This idiom marks location relative to the Euphrates. 'On the Euphrates'
    is a conventional and concise English rendering, though it means situated by/on
    the river.
- source_word: וַיֵּצֵא לִקְרָאתוֹ
  chosen: went out to meet him
  alternatives:
  - went out against him
  - came out to confront him
  lexicon: HALOT
  rationale: לקראת can mean to meet, encounter, or confront depending on context.
    Since the immediate context is military and leads to conflict, 'meet him' is formally
    accurate while not importing hostility more strongly than the Hebrew itself states
    in this verse alone.
