id: 2CH.35.3
reference: 2 Chronicles 35:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לַ֠/לְוִיִּם ה/מבונים לְ/כָל יִשְׂרָאֵ֜ל הַ/קְּדוֹשִׁ֣ים לַ/יהוָ֗ה
    תְּנ֤וּ אֶת אֲרוֹן הַ/קֹּ֨דֶשׁ֙ בַּ֠/בַּיִת אֲשֶׁ֨ר בָּנָ֜ה שְׁלֹמֹ֤ה בֶן דָּוִיד֙
    מֶ֣לֶךְ יִשְׂרָאֵ֔ל אֵין לָ/כֶ֥ם מַשָּׂ֖א בַּ/כָּתֵ֑ף עַתָּ֗ה עִבְדוּ֙ אֶת יְהוָ֣ה
    אֱלֹֽהֵי/כֶ֔ם וְ/אֵ֖ת עַמּ֥/וֹ יִשְׂרָאֵֽל־־־־־־׃
translation:
  text: And he said to the Levites who taught all Israel, who were holy to the LORD,
    “Put the holy ark in the house that Solomon son of David, king of Israel, built.
    You no longer have to carry it on your shoulders. Now serve the LORD your God
    and his people Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Levites who gave understanding to all Israel' or 'the Levites who
      were instructed for all Israel.' The Hebrew participle can carry the sense of
      being discerning/instructed or of giving instruction.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the house'; that is, the temple built by Solomon.
    reason: cultural_note
  - marker: c
    text: Literally, 'there is no burden for you on the shoulder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ה/מבונים
  chosen: who taught
  alternatives:
  - who were instructed
  - who had understanding
  - who gave instruction
  lexicon: HALOT
  rationale: From בין in the Hiphil/passive-participial form, in this context of Levites
    associated with instructing Israel in sacred matters. 'Who taught' best fits the
    likely functional sense here and reads naturally in English. The alternatives
    reflect the form's semantic overlap with being discerning/instructed.
- source_word: הַ/קְּדוֹשִׁים לַ/יהוָה
  chosen: who were holy to the LORD
  alternatives:
  - who were consecrated to the LORD
  - the holy ones to the LORD
  lexicon: HALOT
  rationale: קדושׁים with ליהוה marks consecration/status belonging to YHWH. 'Holy
    to the LORD' preserves the cultic language while remaining readable. 'Consecrated'
    is possible but slightly more interpretive.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: תְּנ֤וּ אֶת אֲרוֹן הַ/קֹּדֶשׁ בַּבַּיִת
  chosen: Put the holy ark in the house
  alternatives:
  - Place the holy ark in the temple
  - Set the holy ark in the house
  lexicon: HALOT
  rationale: נתן + object + בבית here means to place/set the ark in the building.
    'House' preserves the Hebrew בית and allows the reader to hear temple language
    without over-specifying, though the referent is the temple.
- source_word: אֲרוֹן הַ/קֹּדֶשׁ
  chosen: the holy ark
  alternatives:
  - the ark of holiness
  - the sacred ark
  lexicon: HALOT
  rationale: A straightforward construct-like expression meaning the ark characterized
    by holiness. 'Holy ark' is idiomatic and preserves the sanctity emphasis.
- source_word: בַּבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: בית often refers to the temple as the 'house' of God. I retained 'house'
    in the main text for source-text transparency, since the following clause identifies
    it as Solomon's temple.
- source_word: אֵין לָכֶם מַשָּׂא בַּכָּתֵף
  chosen: You no longer have to carry it on your shoulders
  alternatives:
  - There is no burden for you on the shoulder
  - It is not for you to bear a load on the shoulder
  lexicon: HALOT
  rationale: Literally, 'there is no burden for you on the shoulder.' The idiom refers
    to carrying the ark physically. The dynamic smoothing 'You no longer have to carry
    it on your shoulders' communicates the sense clearly in modern English while preserving
    the image.
- source_word: עַתָּה עִבְדוּ
  chosen: Now serve
  alternatives:
  - Now minister to
  - Now worship
  lexicon: HALOT
  rationale: 'עבד in this cultic context can mean serve/minister. ''Serve'' is broad
    enough to include temple duty and service to God, and it matches the following
    object pair: the LORD and his people.'
- source_word: וְאֵת עַמּוֹ יִשְׂרָאֵל
  chosen: and his people Israel
  alternatives:
  - and Israel his people
  - and his people, Israel
  lexicon: HALOT
  rationale: The phrase identifies Israel as the LORD's people. 'His people Israel'
    is natural English and preserves the covenantal relationship.
