theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Following the project's doctrinal
    guidance, it is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md — Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of Levites' role in ה/מבונים
  chosen_reading: the Levites who taught all Israel
  alternative_readings:
  - the Levites who were instructed for all Israel
  - the Levites who gave understanding to all Israel
  rationale: The participle from בין can denote understanding or causing understanding.
    In the Chronicler's context, Levites are often portrayed as instructing the people
    in sacred matters, so 'who taught all Israel' best captures the likely intended
    role without importing extra doctrine.
