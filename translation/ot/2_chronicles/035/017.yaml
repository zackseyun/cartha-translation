id: 2CH.35.17
reference: 2 Chronicles 35:17
source:
  edition: WLC
  text: וַ/יַּעֲשׂ֨וּ בְנֵֽי יִשְׂרָאֵ֧ל הַֽ/נִּמְצְאִ֛ים אֶת הַ/פֶּ֖סַח בָּ/עֵ֣ת
    הַ/הִ֑יא וְ/אֶת חַ֥ג הַ/מַּצּ֖וֹת שִׁבְעַ֥ת יָמִֽים־־־׃
translation:
  text: And the Israelites who were present kept the Passover at that time, and the
    Feast of Unleavened Bread for seven days.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: kept
  alternatives:
  - observed
  - celebrated
  - did
  lexicon: HALOT
  rationale: Although the verb is literally 'did/made,' with festival objects in Hebrew
    idiom it commonly means to observe or keep a feast. 'Kept' is natural English
    and preserves the cultic sense without paraphrase.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the Israelites
  alternatives:
  - the sons of Israel
  - the children of Israel
  lexicon: HALOT
  rationale: This collective ethnonym refers to the people of Israel. 'The Israelites'
    is idiomatic modern English while accurately representing the group reference.
- source_word: הַנִּמְצְאִים
  chosen: who were present
  alternatives:
  - who were found
  - who were there
  lexicon: HALOT
  rationale: The participle from מצא in this context denotes those found present/available
    at the event. 'Who were present' conveys the situational sense better than the
    overly literal 'who were found.'
- source_word: הַפֶּסַח
  chosen: the Passover
  alternatives:
  - the Passover sacrifice
  - Passover
  lexicon: HALOT
  rationale: In this context the term denotes the Passover observance/meal rather
    than only the sacrificial animal. 'The Passover' is the standard and contextually
    sufficient rendering.
- source_word: בָּעֵת הַהִיא
  chosen: at that time
  alternatives:
  - at that appointed time
  - at that season
  lexicon: HALOT
  rationale: The phrase is temporal and straightforward. 'At that time' is the most
    direct rendering; 'appointed time' would over-specify what the text does not explicitly
    state here.
- source_word: חַג הַמַּצּוֹת
  chosen: the Feast of Unleavened Bread
  alternatives:
  - the festival of unleavened bread
  lexicon: HALOT
  rationale: חַג denotes a feast/festival, and the established English name for this
    observance is 'the Feast of Unleavened Bread.' This preserves both meaning and
    recognizability.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: English idiom prefers 'for seven days' with the preceding verb 'kept.'
    This expresses the duration of the feast clearly.
