id: 2CH.35.19
reference: 2 Chronicles 35:19
source:
  edition: WLC
  text: בִּ/שְׁמוֹנֶ֤ה עֶשְׂרֵה֙ שָׁנָ֔ה לְ/מַלְכ֖וּת יֹאשִׁיָּ֑הוּ נַעֲשָׂ֖ה הַ/פֶּ֥סַח
    הַ/זֶּֽה׃
translation:
  text: In the eighteenth year of Josiah’s reign, this Passover was kept.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this Passover was observed' or more literally, 'this Passover was done.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁמוֹנֶה עֶשְׂרֵה שָׁנָה
  chosen: In the eighteenth year
  alternatives:
  - In year eighteen
  - In the eighteenth year
  lexicon: HALOT
  rationale: The preposition ב plus the cardinal expression with שָׁנָה functions
    idiomatically as a temporal marker, best rendered in natural English as 'In the
    eighteenth year.' This preserves the chronological notice without woodenly reproducing
    Hebrew number syntax.
- source_word: לְ/מַלְכ֖וּת יֹאשִׁיָּהוּ
  chosen: of Josiah’s reign
  alternatives:
  - of the reign of Josiah
  - of Josiah's kingship
  lexicon: HALOT
  rationale: לְ with מַלְכוּת marks relation to the period of royal rule. 'Of Josiah’s
    reign' is idiomatic modern English and accurately conveys the regnal dating formula.
    The personal name is transliterated as 'Josiah' per translation philosophy.
- source_word: נַעֲשָׂה
  chosen: was kept
  alternatives:
  - was done
  - was observed
  - was celebrated
  lexicon: HALOT
  rationale: Although the verb is literally 'was done/made,' with פֶּסַח it idiomatically
    refers to observing or keeping the Passover. 'Was kept' preserves the formal sense
    while sounding natural in English and avoids over-paraphrasing.
- source_word: הַ/פֶּסַח
  chosen: Passover
  alternatives:
  - the Passover feast
  lexicon: HALOT
  rationale: פֶּסַח is the standard term for Passover. 'Passover' is the established
    and accurate English equivalent; adding 'feast' would slightly expand beyond the
    Hebrew.
- source_word: הַ/זֶּה
  chosen: this
  alternatives:
  - this very
  - this one
  lexicon: HALOT
  rationale: The demonstrative points back to the specific Passover just described
    in context. 'This' is the most direct rendering and preserves the discourse linkage.
