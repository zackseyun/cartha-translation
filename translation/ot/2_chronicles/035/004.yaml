id: 2CH.35.4
reference: 2 Chronicles 35:4
source:
  edition: WLC
  text: וְ/הָכִ֥ונוּ לְ/בֵית אֲבוֹתֵי/כֶ֖ם כְּ/מַחְלְקוֹתֵי/כֶ֑ם בִּ/כְתָ֗ב דָּוִיד֙
    מֶ֣לֶךְ יִשְׂרָאֵ֔ל וּ/בְ/מִכְתַּ֖ב שְׁלֹמֹ֥ה בְנֽ/וֹ־׃
translation:
  text: Prepare yourselves by your fathers’ houses, according to your divisions, as
    prescribed in the writing of David king of Israel and in the writing of Solomon
    his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to your fathers’ houses.' The Hebrew phrase refers to ancestral
      or paternal household groupings within Israel.
    reason: lexical_alternative
  - marker: b
    text: '''Divisions'' can also be rendered ''courses,'' especially in priestly
      or Levitical organizational contexts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָכִינוּ
  chosen: Prepare yourselves
  alternatives:
  - Set yourselves in order
  - Be ready
  - Establish yourselves
  lexicon: HALOT
  rationale: The Hiphil imperative/plural of כון calls for active preparation or arranging.
    'Prepare yourselves' is natural modern English and fits the cultic-organizational
    context better than the more wooden 'set yourselves'.
- source_word: לְבֵית אֲבוֹתֵיכֶם
  chosen: by your fathers’ houses
  alternatives:
  - according to your fathers’ houses
  - by ancestral house
  lexicon: HALOT
  rationale: בֵית אָבוֹת refers to paternal/ancestral households or clan units. 'Fathers’
    houses' preserves the historical-social structure; 'by' conveys arrangement within
    those units in idiomatic English.
- source_word: כְּמַחְלְקוֹתֵיכֶם
  chosen: according to your divisions
  alternatives:
  - by your divisions
  - according to your courses
  lexicon: HALOT
  rationale: מַחְלְקוֹת denotes divisions or assigned groups, especially priestly/Levitical
    courses. 'Divisions' is clear modern English; 'courses' is traditional but less
    transparent.
- source_word: בִּכְתָב
  chosen: as prescribed in the writing of
  alternatives:
  - in the writing of
  - according to the written instruction of
  lexicon: HALOT
  rationale: כְּתָב is literally 'writing/document.' Because the preposition ב here
    indicates conformity to an authoritative written source, 'as prescribed in the
    writing of' makes the functional sense explicit without straying far from the
    Hebrew.
- source_word: דָּוִיד מֶלֶךְ יִשְׂרָאֵל
  chosen: David king of Israel
  alternatives:
  - David, the king of Israel
  lexicon: HALOT
  rationale: A straightforward rendering of the royal title. The appositional form
    is retained with minimal smoothing.
- source_word: וּבְמִכְתַּב
  chosen: and in the writing of
  alternatives:
  - and as prescribed in the writing of
  - and in the document of
  lexicon: HALOT
  rationale: מִכְתָּב is closely related to כְּתָב and likewise means a written document.
    For English style, the first occurrence carries the fuller explanatory force ('as
    prescribed'), while the second remains more literal to avoid redundancy.
- source_word: שְׁלֹמֹה בְנוֹ
  chosen: Solomon his son
  alternatives:
  - Solomon, his son
  lexicon: HALOT
  rationale: Simple filial apposition; 'his son' refers to David's son. The translation
    preserves the relationship without overpunctuating.
