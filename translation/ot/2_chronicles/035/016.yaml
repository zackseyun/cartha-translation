id: 2CH.35.16
reference: 2 Chronicles 35:16
source:
  edition: WLC
  text: וַ֠/תִּכּוֹן כָּל עֲבוֹדַ֨ת יְהוָ֜ה בַּ/יּ֤וֹם הַ/הוּא֙ לַ/עֲשׂ֣וֹת הַ/פֶּ֔סַח
    וְ/הַעֲל֣וֹת עֹל֔וֹת עַ֖ל מִזְבַּ֣ח יְהוָ֑ה כְּ/מִצְוַ֖ת הַ/מֶּ֥לֶךְ יֹאשִׁיָּֽהוּ־׃
translation:
  text: So all the service of the LORD was prepared on that day, to keep the Passover
    and to offer burnt offerings on the altar of the LORD, according to the command
    of King Josiah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתִּכּוֹן
  chosen: was prepared
  alternatives:
  - was established
  - was set in order
  - was made ready
  lexicon: HALOT
  rationale: The Niphal/waw-consecutive form of כון here conveys that the cultic work
    was put into proper readiness or order. 'Was prepared' is natural English and
    fits the immediate context of Passover arrangements, while preserving the passive/resultative
    sense.
- source_word: כָּל עֲבוֹדַת יְהוָה
  chosen: all the service of the LORD
  alternatives:
  - all the work of the LORD
  - all the service for the LORD
  lexicon: HALOT
  rationale: עֲבוֹדָה in cultic contexts commonly refers to service/work associated
    with temple worship. 'Service of the LORD' preserves the formal, worship-related
    sense without narrowing it to only priestly labor.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    in keeping with established reverential convention and the translation's default
    handling of the Tetragrammaton.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that day
  - in that day
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'On that day' is idiomatic and preserves
    the Hebrew demonstrative emphasis.
- source_word: לַעֲשׂוֹת הַפֶּסַח
  chosen: to keep the Passover
  alternatives:
  - to do the Passover
  - to celebrate the Passover
  lexicon: HALOT
  rationale: The Hebrew idiom 'do the Passover' means to observe/keep it. 'Keep the
    Passover' is both idiomatic English and close to the ritual sense of the Hebrew.
- source_word: וְהַעֲלוֹת עֹלוֹת
  chosen: and to offer burnt offerings
  alternatives:
  - and to bring up burnt offerings
  - and to present whole burnt offerings
  lexicon: HALOT
  rationale: The Hiphil of עלה with עֹלוֹת is the standard sacrificial idiom for offering
    burnt offerings. 'Offer burnt offerings' is the clearest natural equivalent.
- source_word: עַל מִזְבַּח יְהוָה
  chosen: on the altar of the LORD
  alternatives:
  - upon the altar of the LORD
  lexicon: HALOT
  rationale: This is a direct locative phrase referring to the sacrificial altar belonging
    to/associated with the LORD. 'On the altar of the LORD' is standard and clear.
- source_word: כְּמִצְוַת
  chosen: according to the command
  alternatives:
  - according to the commandment
  - as commanded by
  lexicon: HALOT
  rationale: מִצְוָה can mean command/commandment. Here it refers specifically to
    the king's directive in context, so singular 'command' is the most natural English
    rendering.
- source_word: הַמֶּלֶךְ יֹאשִׁיָּהוּ
  chosen: King Josiah
  alternatives:
  - the king, Josiah
  lexicon: HALOT
  rationale: English idiom normally places the royal title before the name. This preserves
    the referent and reads naturally.
