theological_decisions:
- issue: Rendering of חֶסֶד in reference to Josiah
  chosen_reading: his deeds of covenant faithfulness
  alternative_readings:
  - his kindnesses
  - his faithful deeds
  - his acts of loyalty
  rationale: The term carries covenantal and theological weight beyond generic kindness.
    In a context evaluating Josiah by the standard of the Law of the LORD, 'covenant
    faithfulness' best preserves that dimension without overstating the text.
  doctrine_reference: 'Translation philosophy: preserve theological weight; consistency
    of key terms, or documented exception.'
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD'
