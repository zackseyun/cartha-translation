id: 2CH.35.26
reference: 2 Chronicles 35:26
source:
  edition: WLC
  text: וְ/יֶ֛תֶר דִּבְרֵ֥י יֹאשִׁיָּ֖הוּ וַ/חֲסָדָ֑י/ו כַּ/כָּת֖וּב בְּ/תוֹרַ֥ת יְהוָֽה׃
translation:
  text: 'Now the rest of the acts of Josiah, and his deeds of covenant faithfulness,
    as written in the Law of the LORD:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his faithful deeds,' 'his acts of loyalty,' or 'his kindnesses.' The
      Hebrew term can denote kindness, loyalty, or covenant faithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר introduces the remaining material about Josiah. 'Now' gives natural
    English discourse flow while preserving the conjunctive sense of וְ.
- source_word: דִּבְרֵי
  chosen: the acts of
  alternatives:
  - the words of
  - the matters concerning
  lexicon: HALOT
  rationale: Though literally 'words of,' in royal-summary formulas דִּבְרֵי commonly
    refers to the deeds/events of a king. 'Acts' best matches the historiographical
    idiom in English.
- source_word: יֹאשִׁיָּהוּ
  chosen: Josiah
  rationale: Personal name transliterated by standard English convention.
- source_word: וַחֲסָדָיו
  chosen: his deeds of covenant faithfulness
  alternatives:
  - his faithful deeds
  - his acts of loyalty
  - his good deeds
  - his kindnesses
  lexicon: HALOT
  rationale: חֶסֶד can denote kindness, loyalty, or covenant faithfulness. In this
    royal evaluation context, it points to Josiah's loyal, pious actions in relation
    to the LORD and the law. 'Deeds of covenant faithfulness' preserves the theological
    weight better than the flatter 'kindnesses' or merely moral 'good deeds'.
- source_word: כַּכָּתוּב
  chosen: as written
  alternatives:
  - according to what is written
  - as it is written
  lexicon: HALOT
  rationale: The comparative preposition כ plus passive participle means 'as written'
    or 'according to what is written.' 'As written' is concise and natural here.
- source_word: בְּתוֹרַת
  chosen: in the Law of
  alternatives:
  - in the instruction of
  - in the Torah of
  lexicon: HALOT
  rationale: תּוֹרָה here refers specifically to the authoritative written Mosaic
    law. 'Law' is the most idiomatic rendering in this historical context; alternatives
    are viable but less natural in standard English Bible style.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD'.
