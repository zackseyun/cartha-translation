id: 2CH.35.15
reference: 2 Chronicles 35:15
source:
  edition: WLC
  text: וְ/הַ/מְשֹֽׁרֲרִ֨ים בְּנֵי אָסָ֜ף עַל מַעֲמָדָ֗/ם כְּ/מִצְוַ֤ת דָּוִיד֙ וְ/אָסָ֞ף
    וְ/הֵימָ֤ן וִֽ/ידֻתוּן֙ חוֹזֵ֣ה הַ/מֶּ֔לֶךְ וְ/הַ/שֹּׁעֲרִ֖ים לְ/שַׁ֣עַר וָ/שָׁ֑עַר
    אֵ֣ין לָ/הֶ֗ם לָ/סוּר֙ מֵ/עַ֣ל עֲבֹֽדָתָ֔/ם כִּֽי אֲחֵי/הֶ֥ם הַ/לְוִיִּ֖ם הֵכִ֥ינוּ
    לָ/הֶֽם־־־׃
translation:
  text: And the singers, the sons of Asaph, were at their stations according to the
    command of David, Asaph, Heman, and Jeduthun the king’s seer; and the gatekeepers
    were at each gate. They had no need to depart from their service, because their
    brothers the Levites prepared for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'They were not to depart from their service.' The Hebrew can be taken
      more strongly, though the following clause favors the sense that they did not
      need to leave because the Levites prepared for them.
    reason: alternative_reading
  - marker: b
    text: '''The king’s seer'' most naturally refers to Jeduthun.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְשֹׁרֲרִים
  chosen: the singers
  alternatives:
  - the musicians
  lexicon: HALOT
  rationale: The participial form from שׁיר denotes those engaged in singing. 'Singers'
    is the most direct and natural rendering in this temple-service context; 'musicians'
    is broader than the Hebrew warrants.
- source_word: בְּנֵי אָסָף
  chosen: the sons of Asaph
  alternatives:
  - the descendants of Asaph
  lexicon: HALOT
  rationale: Formally this is 'sons of Asaph.' In context it refers to the guild or
    lineage associated with Asaph. The more literal 'sons' is retained, since it is
    idiomatic and historically recognizable.
- source_word: עַל מַעֲמָדָם
  chosen: were at their stations
  alternatives:
  - were in their place
  - were at their post
  lexicon: HALOT
  rationale: מַעֲמָד refers to a standing place, station, or appointed position. 'At
    their stations' fits the organized liturgical setting and reads naturally in English.
- source_word: כְּמִצְוַת
  chosen: according to the command of
  alternatives:
  - according to the ordinance of
  - as commanded by
  lexicon: HALOT
  rationale: מִצְוָה here refers to an authoritative directive. 'According to the
    command of' preserves the force of the Hebrew while remaining idiomatic.
- source_word: חוֹזֵה הַמֶּלֶךְ
  chosen: the king’s seer
  alternatives:
  - the king's visionary
  - the king's prophet
  lexicon: HALOT
  rationale: 'חוֹזֶה is a technical term for a seer, distinct from but related to
    prophet. ''Seer'' preserves the historical and lexical nuance better than the
    more generalized ''prophet.'' The phrase most naturally apposes Jeduthun: ''Jeduthun
    the king’s seer.'''
- source_word: הַשֹּׁעֲרִים
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  - the guards
  lexicon: HALOT
  rationale: In temple context, שֹׁעֲרִים are those assigned to the gates. 'Gatekeepers'
    is the standard and precise rendering.
- source_word: לְשַׁעַר וָשָׁעַר
  chosen: at each gate
  alternatives:
  - gate by gate
  - at every gate
  lexicon: HALOT
  rationale: The distributive expression indicates assignment to every gate individually.
    'At each gate' conveys the sense clearly in contemporary English.
- source_word: אֵין לָהֶם לָסוּר
  chosen: They had no need to depart
  alternatives:
  - they were not to leave
  - they did not need to turn aside
  lexicon: HALOT
  rationale: The clause states that there was no necessity for them to leave their
    duties, not primarily a prohibition. 'Had no need to depart' best reflects the
    syntax and context, since others provided for them.
- source_word: מֵעַל עֲבֹדָתָם
  chosen: from their service
  alternatives:
  - from their work
  - from their duty
  lexicon: HALOT
  rationale: עֲבֹדָה in cultic context commonly denotes service or duty. 'Service'
    preserves the temple-ministry sense better than the more generic 'work.'
- source_word: אֲחֵיהֶם הַלְוִיִּם
  chosen: their brothers the Levites
  alternatives:
  - their fellow Levites
  - their brothers, the Levites
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'their brothers,' followed by appositional
    'the Levites.' In line with the project's gender-accurate policy, 'brothers' is
    retained rather than neutralizing to 'fellow Levites.'
- source_word: הֵכִינוּ לָהֶם
  chosen: prepared for them
  alternatives:
  - made preparation for them
  - provided for them
  lexicon: HALOT
  rationale: הכין means to prepare or make ready. In context the Levites prepared
    what the singers and gatekeepers needed, likely portions or provisions. 'Prepared
    for them' stays close to the Hebrew without over-specifying the object.
