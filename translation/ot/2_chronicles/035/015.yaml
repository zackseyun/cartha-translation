theological_decisions:
- issue: Syntactical attachment of 'the king’s seer'
  chosen_reading: 'The phrase modifies Jeduthun: ''Jeduthun the king’s seer.'''
  alternative_readings:
  - The phrase could be taken more loosely with the preceding list of named figures.
  rationale: The singular construct phrase חוֹזֵה הַמֶּלֶךְ most naturally attaches
    to the immediately preceding singular proper name, Jeduthun, as in similar Chronicler
    formulations. This is a grammatical and historical judgment rather than a doctrinal
    one.
- issue: Force of 'they had no need to depart'
  chosen_reading: The clause expresses lack of necessity, not a strict prohibition.
  alternative_readings:
  - It could be rendered more strongly as 'they were not to depart from their service.'
  rationale: 'אֵין + ל infinitive commonly expresses non-necessity or absence of occasion.
    The following causal clause explains why they did not need to leave: the Levites
    prepared for them. This favors a descriptive statement over an imperative or prohibition.'
  doctrine_reference: Translation philosophy §1, §5
