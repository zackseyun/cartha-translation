id: 2CH.35.21
reference: 2 Chronicles 35:21
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח אֵלָ֣י/ו מַלְאָכִ֣ים לֵ/אמֹר֩ מַה לִּ֨/י וָ/לָ֜/ךְ מֶ֣לֶךְ יְהוּדָ֗ה
    לֹא עָלֶ֨י/ךָ אַתָּ֤ה הַ/יּוֹם֙ כִּ֚י אֶל בֵּ֣ית מִלְחַמְתִּ֔/י וֵ/אלֹהִ֖ים אָמַ֣ר
    לְ/בַֽהֲלֵ֑/נִי חֲדַל לְ/ךָ֛ מֵ/אֱלֹהִ֥ים אֲשֶׁר עִמִּ֖/י וְ/אַל יַשְׁחִיתֶֽ/ךָ׀׀־־־־־־׃
translation:
  text: But he sent messengers to him, saying, “What have I to do with you, king of
    Judah? I am not coming against you today, but against the house of my war; and
    God has told me to hurry. Stop opposing God, who is with me, so that he does not
    destroy you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “against the place of my war,” or “against the house/kingdom with which
      I am at war.” The Hebrew phrase is difficult.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  - angels
  lexicon: HALOT
  rationale: In this narrative context the word refers to human representatives sent
    by Neco, not heavenly beings. 'Messengers' is the most natural modern English
    rendering.
- source_word: מַה לִּי וָלָךְ
  chosen: What have I to do with you
  alternatives:
  - What is there between me and you
  - What do you have against me
  lexicon: HALOT
  rationale: This idiom expresses disengagement or non-involvement rather than hostility.
    The chosen rendering preserves the idiomatic force in readable English.
- source_word: לֹא עָלֶיךָ אַתָּה הַיּוֹם
  chosen: I am not coming against you today
  alternatives:
  - You are not my target today
  - It is not against you that I come today
  lexicon: HALOT
  rationale: The Hebrew is elliptical but clearly means Neco is not attacking Josiah
    on this occasion. The supplied verb 'coming' makes the sense explicit in natural
    English.
- source_word: אֶל בֵּית מִלְחַמְתִּי
  chosen: against the house of my war
  alternatives:
  - to the house of my war
  - against the place of my warfare
  - to the house with which I am at war
  lexicon: HALOT
  rationale: The phrase is difficult. 'House' likely means dynasty, realm, or power
    associated with Neco's military campaign. The rendering keeps the metaphorical
    'house' while making the hostile direction explicit with 'against.'
- source_word: וֵאלֹהִים
  chosen: God
  alternatives:
  - god
  - the gods
  lexicon: HALOT
  rationale: Although the form can be morphologically plural, the accompanying singular
    verb אָמַר indicates a singular sense here. Given the Chronicler's framing in
    the following verse, 'God' is preferable in English.
- source_word: לְבַהֲלֵנִי
  chosen: to hurry
  alternatives:
  - to hasten me
  - to urge me on
  - to make me hurry
  lexicon: HALOT
  rationale: The infinitive from בהל here conveys urgent haste. 'To hurry' is concise,
    natural English that captures the command's force.
- source_word: חֲדַל לְךָ מֵאֱלֹהִים
  chosen: Stop opposing God
  alternatives:
  - Cease for yourself from God
  - Desist from interfering with God
  - Leave off from God
  lexicon: HALOT
  rationale: The Hebrew idiom calls Josiah to stop interfering with or resisting God's
    action. 'Stop opposing God' communicates the intended warning clearly.
- source_word: אֲשֶׁר עִמִּי
  chosen: who is with me
  alternatives:
  - who is on my side
  - who is with me in this matter
  lexicon: HALOT
  rationale: A straightforward relative clause. 'Who is with me' preserves the wording
    without overinterpreting the nature of divine support.
- source_word: וְאַל יַשְׁחִיתֶךָ
  chosen: so that he does not destroy you
  alternatives:
  - lest he ruin you
  - or he will destroy you
  lexicon: HALOT
  rationale: 'With אַל following the warning, the clause expresses a negative purpose
    or prevention: Josiah should stop so that God will not bring him to ruin. ''Destroy''
    fits the severity of the warning.'
