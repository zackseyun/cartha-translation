theological_decisions:
- issue: Reference of אֱלֹהִים in Neco's speech
  chosen_reading: Render as singular 'God'
  alternative_readings:
  - render as 'god' to reflect Neco's possible pagan perspective
  - render as 'the gods' based on plural form
  rationale: The singular verb אָמַר strongly favors a singular referent. In the Chronicler's
    narrative context, especially v.22 where Josiah does not listen to the words 'from
    the mouth of God,' the speech is presented as genuinely conveying divine warning.
    Translating 'God' preserves the narrator's framing without importing more specificity
    than the text gives.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Interpretation of בֵּית מִלְחַמְתִּי
  chosen_reading: Retain 'house' imagery in the main text
  alternative_readings:
  - '''the place of my war'''
  - '''the dynasty/kingdom with which I am at war'''
  rationale: The Hebrew expression is unusual and somewhat opaque. Preserving 'house'
    maintains transparency to the source while still yielding intelligible English.
    Because the exact referent is uncertain, a lexical alternative is preserved in
    a footnote rather than over-resolving the phrase.
  doctrine_reference: Translation philosophy §1, §3, §5
