id: 2CH.35.8
reference: 2 Chronicles 35:8
source:
  edition: WLC
  text: וְ/שָׂרָ֞י/ו לִ/נְדָבָ֥ה לָ/עָ֛ם לַ/כֹּהֲנִ֥ים וְ/לַ/לְוִיִּ֖ם הֵרִ֑ימוּ חִלְקִיָּ֨ה וּ/זְכַרְיָ֜הוּ וִֽ/יחִיאֵ֗ל נְגִידֵי֙ בֵּ֣ית הָ/אֱלֹהִ֔ים לַ/כֹּהֲנִ֞ים נָתְנ֣וּ לַ/פְּסָחִ֗ים אַלְפַּ֨יִם֙ וְ/שֵׁ֣שׁ מֵא֔וֹת וּ/בָקָ֖ר שְׁלֹ֥שׁ מֵאֽוֹת׃
translation:
  text: And his officials contributed as a freewill offering for the people, for the priests, and for the Levites. Hilkiah, Zechariah, and Jehiel, the leaders of the house of God, gave to the priests 2,600 Passover offerings and 300 cattle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "for the Passover sacrifices." The Hebrew plural may refer to the animals used for the Passover observance.
    reason: lexical_alternative
  - marker: b
    text: Or 'gave to the priests for the Passover offerings 2,600 and 300 cattle'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְשָׂרָיו
  chosen: and his officials
  alternatives:
  - and his princes
  - and his leaders
  lexicon: HALOT
  rationale: שָׂרִים commonly denotes officials, rulers, or princes. In this administrative cultic context, 'officials' is natural modern English and avoids overly aristocratic connotations of 'princes' while preserving status.
- source_word: לִנְדָבָה
  chosen: as a freewill offering
  alternatives:
  - willingly
  - for a voluntary offering
  lexicon: HALOT
  rationale: The noun נְדָבָה denotes a voluntary/freewill gift rather than merely the manner 'willingly.' Rendering it as a noun preserves the concrete sense of contribution.
- source_word: לָעָם לַכֹּהֲנִים וְלַלְוִיִּם
  chosen: for the people, for the priests, and for the Levites
  alternatives:
  - to the people, to the priests, and to the Levites
  lexicon: HALOT
  rationale: The repeated ל marks beneficiaries. 'For' fits the sense of provision made on behalf of these groups in the Passover context.
- source_word: הֵרִימוּ
  chosen: contributed
  alternatives:
  - gave
  - offered up
  - presented
  lexicon: HALOT
  rationale: The hiphil of רום here carries the sense of making a contribution or offering. 'Contributed' fits the context of donated sacrificial animals and reads naturally with נְדָבָה.
- source_word: חִלְקִיָּה וּזְכַרְיָהוּ וִיחִיאֵל
  chosen: Hilkiah, Zechariah, and Jehiel
  rationale: Personal names are transliterated by standard English conventions per project philosophy.
- source_word: נְגִידֵי בֵּית הָאֱלֹהִים
  chosen: the leaders of the house of God
  alternatives:
  - the overseers of the house of God
  - the rulers of the house of God
  lexicon: HALOT
  rationale: נָגִיד can denote leader, ruler, or chief. 'Leaders' is clear modern English and suits their temple administrative role. 'House of God' is retained as the standard temple designation.
- source_word: נָתְנוּ
  chosen: gave
  alternatives:
  - provided
  - donated
  lexicon: HALOT
  rationale: Simple and direct rendering of נתן; the context already conveys donation, so 'gave' avoids overtranslation.
- source_word: לַפְּסָחִים
  chosen: for the Passover offerings
  alternatives:
  - for the Passovers
  - for the Passover sacrifices
  lexicon: HALOT
  rationale: The plural likely refers to the Passover animals/offerings rather than multiple festivals. 'Passover offerings' communicates the cultic referent clearly in English.
- source_word: אַלְפַּיִם וְשֵׁשׁ מֵאוֹת
  chosen: 2,600
  alternatives:
  - two thousand six hundred
  rationale: Rendered numerically for readability; no change in meaning.
- source_word: וּבָקָר שְׁלֹשׁ מֵאוֹת
  chosen: and 300 cattle
  alternatives:
  - and 300 head of cattle
  - and 300 oxen
  lexicon: HALOT
  rationale: בָּקָר is a collective term for cattle/herd animals. 'Cattle' is broad and accurate; 'oxen' would be too narrow.
