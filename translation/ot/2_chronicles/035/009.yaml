id: 2CH.35.9
reference: 2 Chronicles 35:9
source:
  edition: WLC
  text: ו/כונניהו וּ/שְׁמַֽעְיָ֨הוּ וּ/נְתַנְאֵ֜ל אֶחָ֗י/ו וַ/חֲשַׁבְיָ֧הוּ וִ/יעִיאֵ֛ל
    וְ/יוֹזָבָ֖ד שָׂרֵ֣י הַ/לְוִיִּ֑ם הֵרִ֨ימוּ לַ/לְוִיִּ֤ם לַ/פְּסָחִים֙ חֲמֵ֣שֶׁת
    אֲלָפִ֔ים וּ/בָקָ֖ר חֲמֵ֥שׁ מֵאֽוֹת׃
translation:
  text: Conaniah, and Shemaiah and Nethanel his brothers, and Hashabiah and Jeiel
    and Jozabad, the chiefs of the Levites, contributed to the Levites for the Passover
    offerings five thousand and five hundred cattle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the Passover sacrifices' or more literally 'for the Passovers.'
      The Hebrew plural likely refers to the animals designated for Passover observance.
    reason: lexical_alternative
lexical_decisions:
- source_word: כונניהו
  chosen: Conaniah
  alternatives:
  - Conanyahu
  - Cononiah
  rationale: Personal name transliterated by standard English convention rather than
    translated, per project philosophy.
- source_word: שְׁמַעְיָהוּ
  chosen: Shemaiah
  alternatives:
  - Shemayahu
  rationale: Personal name transliterated in familiar English form.
- source_word: נְתַנְאֵל
  chosen: Nethanel
  alternatives:
  - Nathanel
  rationale: Personal name transliterated directly from Hebrew; 'Nethanel' reflects
    the Hebrew vowels more closely than the more familiar NT form 'Nathanael'.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his kinsmen
  lexicon: HALOT
  rationale: Literal familial term retained. Although it may include close male relatives
    more broadly, 'brothers' best matches the Hebrew and the gendered form should
    be preserved.
- source_word: חֲשַׁבְיָהוּ
  chosen: Hashabiah
  alternatives:
  - Hashabyahu
  rationale: Personal name transliterated in standard English form.
- source_word: יעיאל
  chosen: Jeiel
  alternatives:
  - Jeiel
  rationale: Standard English transliteration of the personal name.
- source_word: יוֹזָבָד
  chosen: Jozabad
  alternatives:
  - Yozabad
  rationale: Personal name transliterated in standard English form.
- source_word: שָׂרֵי הַלְוִיִּם
  chosen: the chiefs of the Levites
  alternatives:
  - the leaders of the Levites
  - the princes of the Levites
  lexicon: HALOT
  rationale: שָׂרִים denotes officials or leaders. 'Chiefs' preserves the formal leadership
    sense without sounding overly archaic.
- source_word: הֵרִימוּ
  chosen: contributed
  alternatives:
  - gave
  - offered up
  - raised as a contribution
  lexicon: HALOT
  rationale: The Hiphil of רום here carries the sense of making a contribution or
    lifting up as an offering/donation. 'Contributed' fits the administrative donation
    context better than the more wooden 'lifted up'.
- source_word: לַלְוִיִּם
  chosen: to the Levites
  alternatives:
  - for the Levites
  lexicon: HALOT
  rationale: The preposition marks the recipients of the contribution. 'To the Levites'
    is the clearest English rendering.
- source_word: לַפְּסָחִים
  chosen: for the Passover offerings
  alternatives:
  - for the Passovers
  - for the Passover lambs
  - for the Passover sacrifices
  lexicon: HALOT
  rationale: The plural פְּסָחִים in sacrificial context refers to Passover victims/offerings
    rather than multiple festivals. 'Passover offerings' communicates the cultic sense
    without over-specifying lambs, since the count includes cattle as well.
- source_word: חֲמֵשֶׁת אֲלָפִים
  chosen: five thousand
  rationale: Straightforward cardinal number.
- source_word: וּבָקָר חֲמֵשׁ מֵאוֹת
  chosen: and five hundred cattle
  alternatives:
  - and cattle, five hundred
  - and five hundred head of cattle
  lexicon: HALOT
  rationale: בקר is a collective noun for cattle/herd animals. English idiom prefers
    'five hundred cattle'; 'head of cattle' is possible but slightly more interpretive.
