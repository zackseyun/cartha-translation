theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD,' following the
    stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered expression in לִבְנֵי הָעָם
  chosen_reading: sons of the people
  alternative_readings:
  - people
  - Israelites
  - lay people
  rationale: The Hebrew is grammatically masculine and representative. Per the project's
    gender-accurate policy, the translation preserves the masculine form rather than
    neutralizing it, while a footnote can clarify the representative sense for modern
    readers.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
