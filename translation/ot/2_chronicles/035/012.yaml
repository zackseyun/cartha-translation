id: 2CH.35.12
reference: 2 Chronicles 35:12
source:
  edition: WLC
  text: וַ/יָּסִ֨ירוּ הָ/עֹלָ֜ה לְ֠/תִתָּ/ם לְ/מִפְלַגּ֤וֹת לְ/בֵית אָבוֹת֙ לִ/בְנֵ֣י
    הָ/עָ֔ם לְ/הַקְרִיב֙ לַ/יהוָ֔ה כַּ/כָּת֖וּב בְּ/סֵ֣פֶר מֹשֶׁ֑ה וְ/כֵ֖ן לַ/בָּקָֽר־׃
translation:
  text: They removed the burnt offerings, to give them by divisions of the fathers’
    houses to the sons of the people, to present to the LORD, as it is written in
    the Book of Moses; and so also with the cattle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the people” or “to the lay people.” Hebrew “to the sons of the people,”
      a clan-based expression distinguishing the general populace from the priests
      and Levites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסִירוּ
  chosen: They removed
  alternatives:
  - They set aside
  - They took away
  lexicon: HALOT
  rationale: The hiphil of סור here denotes causing something to be removed or taken
    from its place. In context of sacrificial preparation, 'removed' best captures
    the action of taking the portions away for distribution without overinterpreting
    the procedure.
- source_word: הָעֹלָה
  chosen: the burnt offerings
  alternatives:
  - the burnt offering
  - the ascent offering
  lexicon: HALOT
  rationale: Although morphologically singular, עֹלָה can function collectively. The
    surrounding context concerns multiple Passover sacrifices being processed and
    distributed, so the English plural 'burnt offerings' communicates the collective
    sense naturally. 'Ascent offering' is more etymological but less idiomatic in
    English Bible style.
- source_word: לְתִתָּם
  chosen: to give them
  alternatives:
  - to distribute them
  lexicon: HALOT
  rationale: 'The infinitive plus pronominal suffix expresses purpose: they removed
    them in order to give them. ''To give them'' stays close to the Hebrew while allowing
    the following phrases to specify the recipients and arrangement.'
- source_word: לְמִפְלַגּוֹת
  chosen: by divisions
  alternatives:
  - according to divisions
  - into divisions
  lexicon: HALOT
  rationale: מִפְלָגוֹת refers to divisions or groupings. 'By divisions' fits the
    procedural sense of organizing distribution according to established groups.
- source_word: לְבֵית אָבוֹת
  chosen: of the fathers’ houses
  alternatives:
  - of the ancestral houses
  - of the family houses
  lexicon: HALOT
  rationale: This is a standard kinship-administrative expression for clan-based households.
    'Fathers’ houses' preserves the formal structure and social organization reflected
    in the Hebrew.
- source_word: לִבְנֵי הָעָם
  chosen: to the sons of the people
  alternatives:
  - to the people
  - to the lay people
  - to the common people
  lexicon: HALOT
  rationale: The phrase literally reads 'to the sons of the people.' To preserve the
    source's gendered and representative wording per translation philosophy, the main
    text keeps 'sons of the people' rather than flattening it to 'people.' The expression
    distinguishes the non-Levitical populace from the cultic officials.
- source_word: לְהַקְרִיב לַיהוָה
  chosen: to present to the LORD
  alternatives:
  - to offer to the LORD
  - to bring near to the LORD
  lexicon: HALOT
  rationale: הקריב in sacrificial contexts means to present or offer. 'Present to
    the LORD' is slightly more literal to the underlying notion of bringing near,
    while remaining natural English. 'The LORD' follows the project's required rendering
    of YHWH.
- source_word: כַּכָּתוּב בְּסֵפֶר מֹשֶׁה
  chosen: as it is written in the Book of Moses
  alternatives:
  - as written in the book of Moses
  lexicon: HALOT
  rationale: This formula appeals to written Mosaic instruction. Capitalizing 'Book'
    is a stylistic choice reflecting a recognized written source, while remaining
    faithful to the Hebrew.
- source_word: וְכֵן לַבָּקָר
  chosen: and so also with the cattle
  alternatives:
  - and likewise with the cattle
  - and so they did with the cattle
  lexicon: HALOT
  rationale: The terse Hebrew extends the same procedure to the cattle. 'And so also
    with the cattle' preserves the elliptical style without adding too much implied
    material. 'Cattle' here refers to bovine sacrificial animals.
