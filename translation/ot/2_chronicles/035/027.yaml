id: 2CH.35.27
reference: 2 Chronicles 35:27
source:
  edition: WLC
  text: וּ/דְבָרָ֕י/ו הָ/רִאשֹׁנִ֖ים וְ/הָ/אַחֲרֹנִ֑ים הִנָּ֣/ם כְּתוּבִ֔ים עַל סֵ֥פֶר
    מַלְכֵֽי יִשְׂרָאֵ֖ל וִ/יהוּדָֽה־־׃
translation:
  text: Now his acts, first and last, behold, they are written in the Book of the
    Kings of Israel and Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his words' or 'his deeds'; the Hebrew term can denote words, matters,
      or acts. In this royal summary context, 'acts' best fits the sense.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'behold,' an emphatic particle drawing attention to the written source.
    reason: lexical_alternative
  - marker: c
    text: Or 'on the scroll/book of the Kings of Israel and Judah.' The Hebrew preposition
      is literally 'on/upon,' but English idiom commonly uses 'in' for written records.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּדְבָרָיו
  chosen: his acts
  alternatives:
  - his words
  - his matters
  - his deeds
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or by extension 'deed/affair.' In royal-summary
    formulae, English 'acts' best captures the sense of the king's recorded affairs
    or deeds rather than spoken words.
- source_word: הָרִאשֹׁנִים וְהָאַחֲרֹנִים
  chosen: first and last
  alternatives:
  - former and latter
  - earlier and later
  lexicon: HALOT
  rationale: This is a conventional idiom in Chronicles for the whole span of a person's
    history. 'First and last' preserves the formula concisely and naturally.
- source_word: הִנָּם
  chosen: behold
  alternatives:
  - indeed
  - see
  lexicon: HALOT
  rationale: The particle adds an attention-directing or emphatic note. 'Behold' preserves
    the discourse force more transparently than omitting it, though it is somewhat
    formal.
- source_word: כְּתוּבִים
  chosen: are written
  alternatives:
  - are recorded
  lexicon: HALOT
  rationale: The passive participle from כתב is straightforwardly 'written.' 'Are
    written' keeps closer to the Hebrew while still idiomatic in this archival formula.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  - upon the book
  lexicon: HALOT
  rationale: Although על is literally 'on/upon,' in this documentary formula English
    idiom prefers 'in the Book.' 'Book' is retained for ספר as the conventional rendering
    in this context, though 'scroll' is historically possible.
- source_word: מַלְכֵי יִשְׂרָאֵל וִיהוּדָה
  chosen: the Kings of Israel and Judah
  alternatives:
  - the kings of Israel and of Judah
  lexicon: HALOT
  rationale: This is the title of the source document cited by the Chronicler. Capitalizing
    'Book' and 'Kings' reflects a document title in English. The single preposition
    with both names is naturally rendered 'of Israel and Judah.'
