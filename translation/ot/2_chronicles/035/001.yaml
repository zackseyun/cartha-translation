id: 2CH.35.1
reference: 2 Chronicles 35:1
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ יֹאשִׁיָּ֧הוּ בִֽ/ירוּשָׁלִַ֛ם פֶּ֖סַח לַ/יהוָ֑ה וַ/יִּשְׁחֲט֣וּ
    הַ/פֶּ֔סַח בְּ/אַרְבָּעָ֥ה עָשָׂ֖ר לַ/חֹ֥דֶשׁ הָ/רִאשֽׁוֹן׃
translation:
  text: Josiah kept the Passover to the LORD in Jerusalem, and they slaughtered the
    Passover lamb on the fourteenth day of the first month.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the Passover'; here the term refers to the Passover victim, hence
      'the Passover lamb.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: kept
  alternatives:
  - celebrated
  - observed
  - made
  lexicon: HALOT
  rationale: Although the verb is literally 'did/made,' with פֶּסַח as its object
    it idiomatically means to keep or celebrate the Passover. 'Kept' is concise, natural
    English for covenantal observance and preserves the formal link to ritual performance.
- source_word: פֶּסַח
  chosen: the Passover
  alternatives:
  - Passover festival
  - Passover sacrifice
  lexicon: HALOT
  rationale: Here the noun refers first to the festival/observance as a whole. 'The
    Passover' is the standard and contextually precise rendering.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל marks dedication or direction toward YHWH. Per doctrine,
    יהוה is rendered 'the LORD.' 'To the LORD' preserves the Hebrew relation without
    over-interpreting.
- source_word: בִירוּשָׁלַםִ
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative use with the proper name transliterated by standard
    English convention.
- source_word: וַיִּשְׁחֲטוּ
  chosen: they slaughtered
  alternatives:
  - they killed
  - they sacrificed
  lexicon: HALOT
  rationale: '''Slaughtered'' best matches the sacrificial killing sense of שחט without
    flattening it to generic ''killed'' or over-specifying the cultic act as ''sacrificed''
    when the object already identifies the Passover victim.'
- source_word: הַפֶּסַח
  chosen: the Passover lamb
  alternatives:
  - the Passover
  - the Passover sacrifice
  lexicon: HALOT
  rationale: In the second occurrence the noun refers concretely to the Passover victim
    that is slaughtered. English normally requires an explicit object such as 'lamb'
    to avoid ambiguity; this clarifies the metonymic Hebrew while staying within the
    source sense.
- source_word: בְּאַרְבָּעָה עָשָׂר
  chosen: on the fourteenth day
  alternatives:
  - on the fourteenth
  - on day fourteen
  lexicon: HALOT
  rationale: The Hebrew expression literally gives the cardinal number 'on fourteen,'
    but in idiomatic English calendrical style 'on the fourteenth day' is the clearest
    equivalent.
- source_word: לַחֹדֶשׁ הָרִאשׁוֹן
  chosen: of the first month
  alternatives:
  - in the first month
  lexicon: HALOT
  rationale: This phrase specifies the month to which the fourteenth day belongs.
    'Of the first month' fits the English date construction most naturally.
