id: 2CH.35.2
reference: 2 Chronicles 35:2
source:
  edition: WLC
  text: וַ/יַּעֲמֵ֥ד הַ/כֹּהֲנִ֖ים עַל מִשְׁמְרוֹתָ֑/ם וַֽ/יְחַזְּקֵ֔/ם לַ/עֲבוֹדַ֖ת
    בֵּ֥ית יְהוָֽה־׃
translation:
  text: He appointed the priests to their duties and strengthened them for the service
    of the house of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to their divisions,' 'at their posts,' or more literally 'over their
      watches.'
    reason: lexical_alternative
  - marker: b
    text: Or 'encouraged them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֵד
  chosen: He appointed
  alternatives:
  - He stationed
  - He set in place
  - He caused to stand
  lexicon: HALOT
  rationale: The Hiphil of עמד here means to set or place someone in an assigned position.
    'Appointed' best captures the administrative sense in context, where Josiah organizes
    temple personnel, while remaining natural English.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כהנים; the definite article is preserved.
- source_word: עַל מִשְׁמְרוֹתָם
  chosen: to their duties
  alternatives:
  - over their divisions
  - at their posts
  - according to their watches
  lexicon: HALOT
  rationale: מִשְׁמָרוֹת refers to assigned service-posts, watches, or divisions.
    In this temple-service context, 'duties' communicates the functional sense clearly
    in modern English. 'To' rather than a more literal 'over/upon' reflects idiomatic
    English after 'appointed.'
- source_word: וַיְחַזְּקֵם
  chosen: and strengthened them
  alternatives:
  - and encouraged them
  - and made them strong
  lexicon: HALOT
  rationale: חזק in the Piel can mean strengthen, encourage, or fortify. Here it likely
    refers to giving support and encouragement for temple service. 'Strengthened'
    preserves the lexical core while fitting the context.
- source_word: לַעֲבוֹדַת
  chosen: for the service
  alternatives:
  - for the work
  - for the ministry
  lexicon: HALOT
  rationale: עֲבוֹדָה denotes service or work, especially cultic/temple service. 'Service'
    is the most natural and suitably broad rendering here.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the temple of the LORD
  lexicon: HALOT
  rationale: בֵּית יְהוָה is a standard expression for the temple. 'House of the LORD'
    preserves the Hebrew idiom. Per doctrine, יְהוָה is rendered 'the LORD' rather
    than transliterated.
