id: 2CH.35.10
reference: 2 Chronicles 35:10
source:
  edition: WLC
  text: וַ/תִּכּ֖וֹן הָ/עֲבוֹדָ֑ה וַ/יַּֽעַמְד֨וּ הַ/כֹּהֲנִ֧ים עַל עָמְדָ֛/ם וְ/הַ/לְוִיִּ֥ם
    עַל מַחְלְקוֹתָ֖/ם כְּ/מִצְוַ֥ת הַ/מֶּֽלֶךְ־־׃
translation:
  text: So the service was prepared, and the priests stood at their stations, and
    the Levites by their divisions, according to the command of the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was set in order' or 'was established.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'at their standing/place'; that is, at their assigned positions.
    reason: lexical_alternative
  - marker: c
    text: Or 'according to their divisions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּכּוֹן
  chosen: was prepared
  alternatives:
  - was established
  - was set in order
  - was made ready
  lexicon: HALOT
  rationale: From כון in the Niphal-like sense of being set up, established, or made
    ready. In this Passover context, 'was prepared' communicates that the cultic proceedings
    were put in readiness without sounding overly wooden.
- source_word: הָעֲבוֹדָה
  chosen: the service
  alternatives:
  - the work
  - the ritual service
  - the liturgy
  lexicon: HALOT
  rationale: עֲבוֹדָה in temple contexts commonly refers to the service or duty associated
    with worship. 'The service' is natural English and preserves the cultic sense
    better than the broader 'work'.
- source_word: וַיַּעַמְדוּ
  chosen: stood
  alternatives:
  - took their stand
  - stood ready
  lexicon: HALOT
  rationale: The verb עמד straightforwardly means 'stood' or 'took one's position.'
    'Stood' is sufficient here, with the following phrases specifying their assigned
    places.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים in cultic context.
- source_word: עַל עָמְדָם
  chosen: at their stations
  alternatives:
  - in their place
  - at their post
  - at their standing-place
  lexicon: HALOT
  rationale: The idiom literally involves standing/place of standing. 'At their stations'
    gives clear modern English for assigned liturgical positions while remaining close
    to the Hebrew sense.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/cultic group name.
- source_word: עַל מַחְלְקוֹתָם
  chosen: by their divisions
  alternatives:
  - according to their divisions
  - in their divisions
  lexicon: HALOT
  rationale: מַחְלְקוֹת refers to divisions or courses, especially organized priestly/Levitical
    groupings. 'By their divisions' is concise and idiomatic after 'stood,' indicating
    arrangement by assigned groups.
- source_word: כְּמִצְוַת
  chosen: according to the command
  alternatives:
  - according to the commandment
  - as commanded
  lexicon: HALOT
  rationale: מִצְוָה can mean command or commandment. Here it refers to a specific
    royal directive, so 'command' is more natural than the more formal 'commandment.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite reference to the reigning king in context, rendered straightforwardly.
