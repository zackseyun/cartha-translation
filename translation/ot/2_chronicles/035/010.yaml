theological_decisions:
- issue: Cultic terminology for עֲבוֹדָה
  chosen_reading: the service
  alternative_readings:
  - the ritual service
  - the work
  rationale: The verse describes temple/Passover procedures, so a worship-related
    term is preferable. This is a lexical-contextual decision rather than a doctrinally
    disputed one, but it preserves the sacred-service nuance without importing later
    liturgical terminology.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of organizational idioms for priestly and Levitical placement
  chosen_reading: at their stations ... by their divisions
  alternative_readings:
  - in their place ... according to their divisions
  rationale: The chosen phrasing balances formal correspondence with readable modern
    English, preserving the structured, ordered nature of the worship service without
    paraphrastic expansion.
  doctrine_reference: Translation philosophy §5, §6
