id: 2CH.35.7
reference: 2 Chronicles 35:7
source:
  edition: WLC
  text: וַ/יָּ֣רֶם יֹאשִׁיָּ֣הוּ לִ/בְנֵ֪י הָ/עָ֟ם צֹ֞אן כְּבָשִׂ֣ים וּ/בְנֵֽי עִזִּים֮
    הַ/כֹּ֣ל לַ/פְּסָחִים֒ לְ/כָל הַ/נִּמְצָ֗א לְ/מִסְפַּר֙ שְׁלֹשִׁ֣ים אֶ֔לֶף וּ/בָקָ֖ר
    שְׁלֹ֣שֶׁת אֲלָפִ֑ים אֵ֖לֶּה מֵ/רְכ֥וּשׁ הַ/מֶּֽלֶךְ־־׃ס
translation:
  text: Josiah contributed to the sons of the people from the flock, lambs and young
    goats, all of them for the Passover offerings, for all who were present, to the
    number of thirty thousand, and three thousand cattle. These were from the king’s
    possessions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the people' or 'to the common people'; literally, 'to the sons of
      the people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all for the Passover sacrifices'; Hebrew 'Passovers' likely refers to
      the Passover animals/offerings collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרֶם
  chosen: contributed
  alternatives:
  - gave
  - offered
  - donated
  - presented
  lexicon: HALOT
  rationale: The Hiphil of רום here idiomatically means to make a contribution/provide
    as a gift rather than literally 'raise up.' 'Contributed' fits the cultic and
    royal provisioning context without implying a sacrificial act by Josiah himself.
- source_word: לִבְנֵי הָעָם
  chosen: to the sons of the people
  alternatives:
  - to the people
  - to the lay people
  - to the common people
  lexicon: HALOT
  rationale: Literally 'to the sons of the people.' This likely refers to the non-Levitical
    participants among the populace. Following the gender-accurate principle, the
    familial expression is retained rather than flattened entirely to 'people,' while
    still being understandable in context.
- source_word: צֹאן
  chosen: from the flock
  alternatives:
  - small livestock
  - sheep and goats
  lexicon: HALOT
  rationale: צֹאן is a collective term for small livestock, especially sheep and goats.
    'From the flock' preserves the collective sense and prepares for the specification
    that follows.
- source_word: כְּבָשִׂים וּבְנֵי עִזִּים
  chosen: lambs and young goats
  alternatives:
  - sheep and goats
  - rams and kids
  - lambs and kids
  lexicon: HALOT
  rationale: כְּבָשִׂים commonly denotes lambs/sheep, and בְנֵי עִזִּים literally
    'sons of goats' means young goats/kids. 'Young goats' is clearer for modern readers
    than 'kids' in Bible text.
- source_word: הַכֹּל לַפְּסָחִים
  chosen: all of them for the Passover offerings
  alternatives:
  - all for the Passovers
  - all for the Passover sacrifices
  - all for the Passover
  lexicon: HALOT
  rationale: The plural פְּסָחִים can denote Passover sacrificial animals/offerings
    in aggregate. 'Passover offerings' communicates the cultic function more clearly
    than a wooden 'Passovers.'
- source_word: לְכָל הַנִּמְצָא
  chosen: for all who were present
  alternatives:
  - for everyone found there
  - for all who were found
  - for all who were available
  lexicon: HALOT
  rationale: The Niphal participle of מצא here refers to those present/assembled at
    the celebration. 'Who were present' is idiomatic English and contextually precise.
- source_word: לְמִסְפַּר שְׁלֹשִׁים אֶלֶף
  chosen: to the number of thirty thousand
  alternatives:
  - numbering thirty thousand
  - thirty thousand in number
  - a total of thirty thousand
  lexicon: HALOT
  rationale: This phrase gives the count of the flock animals supplied. 'To the number
    of' closely reflects the Hebrew while remaining readable.
- source_word: וּבָקָר שְׁלֹשֶׁת אֲלָפִים
  chosen: and three thousand cattle
  alternatives:
  - and cattle, three thousand
  - and three thousand head of cattle
  - and oxen, three thousand
  lexicon: HALOT
  rationale: בָּקָר is a collective for cattle/herd animals. 'Three thousand cattle'
    is natural English and preserves the collective sense without over-specifying
    sex or use.
- source_word: אֵלֶּה מֵרְכוּשׁ הַמֶּלֶךְ
  chosen: These were from the king’s possessions
  alternatives:
  - these were from the king's property
  - these came from the king's goods
  - these were from the king's own substance
  lexicon: HALOT
  rationale: רְכוּשׁ denotes property, possessions, or wealth. 'Possessions' is clear
    modern English and conveys that the animals came from Josiah's own royal resources.
