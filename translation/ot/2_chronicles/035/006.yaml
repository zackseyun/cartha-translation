id: 2CH.35.6
reference: 2 Chronicles 35:6
source:
  edition: WLC
  text: וְ/שַׁחֲט֖וּ הַ/פָּ֑סַח וְ/הִתְקַדְּשׁוּ֙ וְ/הָכִ֣ינוּ לַ/אֲחֵי/כֶ֔ם לַ/עֲשׂ֥וֹת כִּ/דְבַר יְהוָ֖ה בְּ/יַד מֹשֶֽׁה־־׃פ
translation:
  text: Slaughter the Passover lamb, consecrate yourselves, and prepare for your brothers, to do according to the word of Yahweh by the hand of Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the Passover'; the Hebrew term can denote the Passover sacrifice as a whole, but here it refers specifically to the animal being slaughtered.
    reason: lexical_alternative
  - marker: b
    text: Or, 'through Moses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁחֲטוּ
  chosen: Slaughter
  alternatives:
  - Kill
  - Slay
  lexicon: HALOT
  rationale: The verb שׁחט commonly denotes slaughtering an animal, especially in sacrificial contexts. 'Slaughter' preserves the ritual-sacrificial sense better than the more generic 'kill'.
- source_word: הַפָּסַח
  chosen: the Passover lamb
  alternatives:
  - the Passover
  - the Passover sacrifice
  lexicon: HALOT
  rationale: In this context the term refers concretely to the Passover victim being slaughtered, not merely the festival as a whole. 'Passover lamb' makes the implied sacrificial animal explicit in natural English.
- source_word: וְהִתְקַדְּשׁוּ
  chosen: consecrate yourselves
  alternatives:
  - sanctify yourselves
  - make yourselves holy
  lexicon: HALOT
  rationale: The hitpael of קדשׁ here is reflexive, referring to ritual preparation for sacred service. 'Consecrate yourselves' is clear modern English and preserves the cultic force.
- source_word: וְהָכִינוּ
  chosen: prepare
  alternatives:
  - make ready
  - prepare it
  lexicon: HALOT
  rationale: The verb כון in the hiphil means to prepare or make ready. The object is left implicit in Hebrew; English can naturally render simply 'prepare' with the following phrase indicating for whom.
- source_word: לַאֲחֵיכֶם
  chosen: for your brothers
  alternatives:
  - for your brothers and sisters
  - for your kin
  lexicon: HALOT
  rationale: The Hebrew literally says 'your brothers.' In keeping with the gender-accurate policy, the masculine familial term is retained in the main text. In context it refers to fellow Israelites who would receive their service in the Passover preparations.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - so that they may do
  - for doing
  lexicon: HALOT
  rationale: The infinitive construct of עשה is broad and here links the preparation with carrying out the prescribed observance. 'To do' is formally close and idiomatic with the following 'according to the word of the LORD.'
- source_word: כִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - according to the command of the LORD
  - as the LORD said
  lexicon: HALOT
  rationale: דבר can mean word, matter, or command. Here it refers to divine instruction mediated through Moses. 'Word' preserves the Hebrew expression while still conveying authority.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּיַד מֹשֶׁה
  chosen: by the hand of Moses
  alternatives:
  - through Moses
  - by Moses
  lexicon: HALOT
  rationale: The idiom literally means mediation through Moses. 'By the hand of Moses' preserves the Hebrew idiom in understandable English; 'through Moses' is preserved in a footnote as a smoother alternative.
