- issue: Gendered familial language in לַאֲחֵיכֶם
  chosen_reading: for your brothers
  alternative_readings:
  - for your brothers and sisters
  - for your fellow Israelites
  rationale: The Hebrew uses the masculine plural 'brothers.' While the referent may include the wider covenant community, the translation policy prefers gender-accurate rendering in the main text, with broader-inclusive alternatives noted only if needed.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
