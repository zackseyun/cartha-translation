id: 2CH.35.22
reference: 2 Chronicles 35:22
source:
  edition: WLC
  text: וְ/לֹֽא הֵסֵב֩ יֹאשִׁיָּ֨הוּ פָנָ֜י/ו מִמֶּ֗/נּוּ כִּ֤י לְ/הִלָּחֵֽם בּ/וֹ֙
    הִתְחַפֵּ֔שׂ וְ/לֹ֥א שָׁמַ֛ע אֶל דִּבְרֵ֥י נְכ֖וֹ מִ/פִּ֣י אֱלֹהִ֑ים וַ/יָּבֹ֕א
    לְ/הִלָּחֵ֖ם בְּ/בִקְעַ֥ת מְגִדּֽוֹ־־־׃
translation:
  text: But Josiah did not turn his face away from him; instead, he disguised himself
    in order to fight against him. He did not listen to the words of Neco from the
    mouth of God, and he came to fight in the Valley of Megiddo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not turn away from him.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''from the mouth of God.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'in the plain of Megiddo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵסֵב ... פָנָיו מִמֶּנּוּ
  chosen: did not turn his face away from him
  alternatives:
  - did not turn away from him
  - did not withdraw from him
  lexicon: HALOT
  rationale: The idiom literally involves turning the face, but in English 'turn his
    face away from him' preserves the Hebrew imagery while remaining understandable.
    A more idiomatic 'turn away' is possible, but the fuller expression better reflects
    the source.
- source_word: כִּי
  chosen: instead
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the explanation of what Josiah did rather than
    a strict causal ''because'' in smooth English. ''Instead'' captures the adversative-explanatory
    force in context: rather than turning away, he disguised himself to fight.'
- source_word: לְהִלָּחֵם בּוֹ
  chosen: in order to fight against him
  alternatives:
  - to fight with him
  - to make war against him
  lexicon: HALOT
  rationale: The construction expresses purpose. With נכהו/Pharaoh Neco as antecedent,
    בּוֹ is best rendered adversatively here as 'against him,' matching the narrative
    context of military opposition.
- source_word: הִתְחַפֵּשׂ
  chosen: disguised himself
  alternatives:
  - disguised himself as another
  - went in disguise
  lexicon: HALOT
  rationale: This Hitpael verb commonly means to disguise oneself. The simple reflexive
    rendering is natural and sufficiently precise.
- source_word: שָׁמַע אֶל
  chosen: did not listen to
  alternatives:
  - did not heed
  - did not obey
  lexicon: HALOT
  rationale: The phrase can imply heed/obey, but 'listen to' is the broadest and most
    transparent rendering here, allowing the context to convey the seriousness of
    his refusal.
- source_word: דִּבְרֵי נְכוֹ
  chosen: the words of Neco
  alternatives:
  - Neco's words
  - the message of Neco
  lexicon: HALOT
  rationale: '''Words of Neco'' is a close and natural rendering. ''Message'' would
    be interpretive; the text simply says ''words.'''
- source_word: מִפִּי אֱלֹהִים
  chosen: from the mouth of God
  alternatives:
  - from God
  - at God's command
  lexicon: HALOT
  rationale: The Hebrew literally says 'from the mouth of God.' Preserving the idiom
    highlights that Neco's words are presented as having divine source, without over-interpreting
    the mode of revelation.
- source_word: וַיָּבֹא
  chosen: he came
  alternatives:
  - he went
  - he proceeded
  lexicon: HALOT
  rationale: The narrative wayyiqtol of בוא is straightforwardly 'he came.' In English
    this works naturally with the following infinitive phrase.
- source_word: בְּבִקְעַת מְגִדּוֹ
  chosen: in the Valley of Megiddo
  alternatives:
  - on the plain of Megiddo
  lexicon: HALOT
  rationale: בִּקְעָה commonly denotes a valley plain or broad valley. 'Valley of
    Megiddo' is a clear, conventional geographic rendering, while 'plain' remains
    a viable alternative.
