theological_decisions:
- issue: Whether Neco's speech is presented as genuinely originating from God
  chosen_reading: The main text preserves the chronicler's claim that Neco's words
    were 'from the mouth of God.'
  alternative_readings:
  - The phrase could be paraphrased more loosely as 'from God' without the idiom.
  - Some interpreters question Neco's claim, but the verse itself presents it as divine
    speech.
  rationale: The translation should not mute the text's theological assertion nor
    resolve interpretive discomfort. Retaining 'from the mouth of God' preserves the
    chronicler's wording and theological tension.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
