id: 2CH.35.13
reference: 2 Chronicles 35:13
source:
  edition: WLC
  text: וַֽ/יְבַשְּׁל֥וּ הַ/פֶּ֛סַח בָּ/אֵ֖שׁ כַּ/מִּשְׁפָּ֑ט וְ/הַ/קֳּדָשִׁ֣ים בִּשְּׁל֗וּ
    בַּ/סִּיר֤וֹת וּ/בַ/דְּוָדִים֙ וּ/בַ/צֵּ֣לָח֔וֹת וַ/יָּרִ֖יצוּ לְ/כָל בְּנֵ֥י
    הָ/עָֽם־׃
translation:
  text: They cooked the Passover lamb in the fire according to the rule, and they
    boiled the holy offerings in pots, kettles, and bowls, and quickly brought them
    to all the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'roasted the Passover lamb in the fire.' The Hebrew
      verb can mean 'cook' broadly, but Passover law required roasting rather than
      boiling (cf. Exod 12:8–9).
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבַשְּׁלוּ
  chosen: cooked
  alternatives:
  - roasted
  - boiled
  lexicon: HALOT
  rationale: The verb בשׁל can broadly mean 'cook/boil.' Here it governs 'the Passover'
    with the qualifying phrase 'in the fire according to the rule,' which indicates
    roasting rather than boiling in the narrow sense (cf. Passover legislation). To
    avoid an apparent contradiction in English while still reflecting the broader
    verb, 'cooked' is used, with the mode specified by 'in the fire.'
- source_word: הַפֶּסַח
  chosen: the Passover lamb
  alternatives:
  - the Passover
  - the Passover sacrifice
  lexicon: HALOT
  rationale: In this ritual context, 'Passover' refers concretely to the sacrificial
    animal/meal, not merely the festival. 'Passover lamb' makes the referent clear
    in natural English.
- source_word: בָּאֵשׁ
  chosen: in the fire
  alternatives:
  - with fire
  - over the fire
  lexicon: HALOT
  rationale: A direct rendering of the prepositional phrase that preserves the sacrificial
    cooking method without over-specifying.
- source_word: כַּמִּשְׁפָּט
  chosen: according to the rule
  alternatives:
  - according to the ordinance
  - as prescribed
  lexicon: HALOT
  rationale: מִשְׁפָּט here denotes the prescribed legal/customary procedure. 'According
    to the rule' is clear modern English and preserves the normative sense.
- source_word: וְהַקֳּדָשִׁים
  chosen: the holy offerings
  alternatives:
  - the holy things
  - the consecrated offerings
  lexicon: HALOT
  rationale: The plural refers to other consecrated sacrificial portions distinct
    from the Passover animal. 'Holy offerings' communicates cultic consecration more
    clearly than the bare 'holy things.'
- source_word: בִּשְּׁלוּ
  chosen: boiled
  alternatives:
  - cooked
  lexicon: HALOT
  rationale: For the other sacred portions, the ordinary culinary sense 'boiled' fits
    the vessels listed immediately after and creates a natural contrast with the Passover
    prepared 'in the fire.'
- source_word: בַּסִּירוֹת
  chosen: in pots
  alternatives:
  - in cooking pots
  lexicon: HALOT
  rationale: Standard rendering for a common cooking vessel.
- source_word: וּבַדְּוָדִים
  chosen: kettles
  alternatives:
  - cauldrons
  - large pots
  lexicon: HALOT
  rationale: The term denotes a larger cooking vessel. 'Kettles' is readable modern
    English; 'cauldrons' is possible but more archaic/literary.
- source_word: וּבַצֵּלָחוֹת
  chosen: bowls
  alternatives:
  - pans
  - dishes
  lexicon: HALOT
  rationale: A serving/preparation vessel; 'bowls' is the most natural modern equivalent,
    though the exact vessel shape is uncertain.
- source_word: וַיָּרִיצוּ
  chosen: quickly brought
  alternatives:
  - hurried them
  - carried them swiftly
  lexicon: HALOT
  rationale: The verb conveys haste. 'Quickly brought' expresses both movement and
    urgency in idiomatic English.
- source_word: לְכָל בְּנֵי הָעָם
  chosen: to all the people
  alternatives:
  - to all the sons of the people
  - to all the lay people
  lexicon: HALOT
  rationale: Though literally 'sons of the people,' the phrase idiomatically refers
    to the people at large, likely the non-Levitical participants. 'All the people'
    is natural English and fits the representative sense.
