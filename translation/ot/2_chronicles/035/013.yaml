theological_decisions:
- issue: Potential tension between בשׁל ('cook/boil') and Passover law requiring roasting
  chosen_reading: Render the first verb broadly as 'cooked' and let 'in the fire according
    to the rule' specify the lawful method.
  alternative_readings:
  - Render explicitly as 'roasted' for the Passover lamb
  - Render both occurrences uniformly as 'boiled/cooked'
  rationale: The verse itself distinguishes the Passover prepared 'in the fire according
    to the rule' from other holy offerings prepared in vessels. This preserves the
    legal distinction without forcing a misleadingly narrow gloss for the first verb.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referent of 'the holy offerings'
  chosen_reading: Treat as sacrificial portions other than the Passover animal.
  alternative_readings:
  - Treat as a general reference to all sacred food including the Passover
  rationale: The syntax contrasts 'the Passover' with 'the holy offerings,' and the
    differing preparation methods support a distinction between them.
  doctrine_reference: Translation philosophy §1
