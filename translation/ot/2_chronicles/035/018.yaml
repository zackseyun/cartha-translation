id: 2CH.35.18
reference: 2 Chronicles 35:18
source:
  edition: WLC
  text: וְ/לֹֽא נַעֲשָׂ֨ה פֶ֤סַח כָּמֹ֨/הוּ֙ בְּ/יִשְׂרָאֵ֔ל מִ/ימֵ֖י שְׁמוּאֵ֣ל הַ/נָּבִ֑יא
    וְ/כָל מַלְכֵ֣י יִשְׂרָאֵ֣ל לֹֽא עָשׂ֡וּ כַּ/פֶּ֣סַח אֲשֶׁר עָשָׂ֣ה יֹֽ֠אשִׁיָּהוּ
    וְ/הַ/כֹּהֲנִ֨ים וְ/הַ/לְוִיִּ֤ם וְ/כָל יְהוּדָה֙ וְ/יִשְׂרָאֵ֣ל הַ/נִּמְצָ֔א
    וְ/יוֹשְׁבֵ֖י יְרוּשָׁלִָֽם־־׀־־־׃ס
translation:
  text: No Passover like it had been kept in Israel since the days of Samuel the prophet,
    and none of the kings of Israel had kept a Passover like the one that Josiah kept,
    with the priests, the Levites, all Judah, Israel that was present, and the inhabitants
    of Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'No Passover like this had been observed in Israel since the days of
      Samuel the prophet.'
    reason: lexical_alternative
  - marker: b
    text: '''Israel that was present'' refers to members of Israel who were there
      for the celebration; alternatively, ''the Israelites who were present.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲשָׂה
  chosen: had been kept
  alternatives:
  - had been made
  - had been observed
  - was done
  lexicon: HALOT
  rationale: The verb עשה with פֶּסַח idiomatically means to observe/keep the Passover,
    not to manufacture it. English perfect passive ('had been kept') fits the retrospective
    comparison introduced by 'since the days of.'
- source_word: פֶסַח
  chosen: Passover
  alternatives:
  - Passover festival
  - Passover sacrifice
  lexicon: HALOT
  rationale: In this context the term refers to the Passover observance as a whole,
    not merely the sacrificial animal. 'Passover' is the standard and sufficiently
    broad rendering.
- source_word: כָּמֹהוּ
  chosen: like it
  alternatives:
  - like this
  - like him
  lexicon: HALOT
  rationale: 'The pronominal suffix refers back to the Passover observance, so the
    comparison is to this Passover celebration: ''like it.'''
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: The preposition ב here is locative/corporate. 'In Israel' is natural
    English and preserves the national scope.
- source_word: מִימֵי שְׁמוּאֵל הַנָּבִיא
  chosen: since the days of Samuel the prophet
  alternatives:
  - from the days of Samuel the prophet
  lexicon: HALOT
  rationale: מִן with 'days' marks the starting point of the comparison. 'Since the
    days of' is idiomatic in English for a continuing retrospective statement.
- source_word: וְכָל מַלְכֵי יִשְׂרָאֵל
  chosen: and none of the kings of Israel
  alternatives:
  - and all the kings of Israel did not
  - and no king of Israel
  lexicon: HALOT
  rationale: Hebrew 'all ... not' is idiomatically rendered in English as 'none of.'
    This avoids a wooden phrasing while preserving the universal negation.
- source_word: לֹא עָשׂוּ כַּפֶּסַח
  chosen: had kept a Passover like
  alternatives:
  - had observed the Passover like
  - had done the Passover like
  lexicon: HALOT
  rationale: Again, עשה + פסח means to keep/observe Passover. The comparative כ is
    carried forward as 'like.'
- source_word: אֲשֶׁר עָשָׂה יֹאשִׁיָּהוּ
  chosen: the one that Josiah kept
  alternatives:
  - which Josiah observed
  - that Josiah made
  lexicon: HALOT
  rationale: Rendering with 'the one that' makes the English comparison smooth while
    preserving the relative clause. 'Kept' reflects the idiom.
- source_word: וְהַכֹּהֲנִים וְהַלְוִיִּם
  chosen: with the priests, the Levites
  alternatives:
  - and the priests and the Levites
  lexicon: HALOT
  rationale: The sequence after Josiah names the participants in the observance. 'With'
    clarifies that these groups joined in keeping the Passover rather than being additional
    subjects detached from Josiah.
- source_word: וְכָל יְהוּדָה
  chosen: all Judah
  alternatives:
  - the whole of Judah
  lexicon: HALOT
  rationale: A straightforward national designation; 'all Judah' is concise and natural.
- source_word: וְיִשְׂרָאֵל הַנִּמְצָא
  chosen: Israel that was present
  alternatives:
  - the Israelites who were present
  - Israel who were found there
  lexicon: HALOT
  rationale: הנמצא denotes those found/present on the occasion, likely members of
    the northern tribes available in the land. 'Israel that was present' preserves
    the collective singular 'Israel' while making the participle explicit.
- source_word: וְיוֹשְׁבֵי יְרוּשָׁלִָם
  chosen: and the inhabitants of Jerusalem
  alternatives:
  - and those living in Jerusalem
  lexicon: HALOT
  rationale: A standard rendering of the participial expression for residents of the
    city.
