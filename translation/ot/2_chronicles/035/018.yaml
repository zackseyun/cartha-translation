theological_decisions:
- issue: Historical comparison with earlier Passovers
  chosen_reading: The verse states that no Passover like Josiah's had been kept since
    Samuel's days, using hyperbolic or qualitative comparison without denying other
    significant Passovers such as Hezekiah's.
  alternative_readings:
  - The statement is an absolute historical claim excluding any comparable observance
    after Samuel until Josiah.
  rationale: The Hebrew compares the quality or uniqueness of this observance and
    then narrows the claim specifically to 'the kings of Israel.' The translation
    preserves the wording without importing harmonization into the main text; interpretive
    nuance is noted here rather than altered in translation.
