id: 2CH.35.23
reference: 2 Chronicles 35:23
source:
  edition: WLC
  text: וַ/יֹּרוּ֙ הַ/יֹּרִ֔ים לַ/מֶּ֖לֶךְ יֹאשִׁיָּ֑הוּ וַ/יֹּ֨אמֶר הַ/מֶּ֤לֶךְ לַ/עֲבָדָי/ו֙
    הַעֲבִיר֔וּ/נִי כִּ֥י הָחֳלֵ֖יתִי מְאֹֽד׃
translation:
  text: And the archers shot King Josiah, and the king said to his servants, “Take
    me away, for I am badly wounded.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Take me away, for I am severely hurt,” since the Hebrew verb can broadly
      mean being weak, sick, or badly wounded; here the battle context favors “wounded.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּרוּ
  chosen: shot
  alternatives:
  - threw
  - cast
  lexicon: HALOT
  rationale: From ירה in the Hiphil, here in a military context with הַיֹּרִים ('the
    shooters/archers'), the sense is 'shot' rather than the broader 'threw' or 'cast'.
- source_word: הַיֹּרִים
  chosen: the archers
  alternatives:
  - the shooters
  lexicon: HALOT
  rationale: The participle from ירה can mean 'shooters,' but in battle context it
    idiomatically refers to archers. This is the natural English military term and
    matches the immediate narrative setting.
- source_word: לַמֶּלֶךְ יֹאשִׁיָּהוּ
  chosen: King Josiah
  alternatives:
  - at King Josiah
  - to King Josiah
  lexicon: HALOT
  rationale: The preposition ל with verbs of shooting can mark the target. English
    idiom expresses this simply as the direct object 'shot King Josiah.' 'At King
    Josiah' is possible but less natural and slightly weaker.
- source_word: הַעֲבִירוּנִי
  chosen: Take me away
  alternatives:
  - carry me away
  - remove me
  lexicon: HALOT
  rationale: The causative form of עבר means 'cause me to pass/move.' In context Josiah
    is asking his attendants to move him from the battlefield. 'Take me away' is idiomatic
    modern English; 'carry me away' is possible but more specific than the Hebrew
    requires.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'For' fits the direct-speech register
    well; 'because' would also be acceptable.
- source_word: הָחֳלֵיתִי
  chosen: I am badly wounded
  alternatives:
  - I am severely wounded
  - I am grievously hurt
  - I am weak/sick
  lexicon: HALOT
  rationale: Though the verb חלה often means 'be sick/weak,' in this battle context
    after being shot it denotes being seriously wounded or stricken. 'Badly wounded'
    communicates the situational sense in clear modern English.
- source_word: מְאֹד
  chosen: badly
  alternatives:
  - severely
  - greatly
  lexicon: HALOT
  rationale: An adverbial intensifier modifying Josiah's condition. 'Badly' is natural
    with 'wounded' in English; 'severely' is a close alternative.
