id: 2CH.35.24
reference: 2 Chronicles 35:24
source:
  edition: WLC
  text: וַ/יַּֽעֲבִירֻ֨/הוּ עֲבָדָ֜י/ו מִן הַ/מֶּרְכָּבָ֗ה וַֽ/יַּרְכִּיבֻ/הוּ֮ עַ֣ל
    רֶ֣כֶב הַ/מִּשְׁנֶה֮ אֲשֶׁר ל/וֹ֒ וַ/יּוֹלִיכֻ֨/הוּ֙ יְר֣וּשָׁלִַ֔ם וַ/יָּ֕מָת
    וַ/יִּקָּבֵ֖ר בְּ/קִבְר֣וֹת אֲבֹתָ֑י/ו וְ/כָל יְהוּדָה֙ וִ/יר֣וּשָׁלִַ֔ם מִֽתְאַבְּלִ֖ים
    עַל יֹאשִׁיָּֽהוּ־־־־׃פ
translation:
  text: So his servants removed him from the chariot and set him on the second chariot
    that belonged to him, and brought him to Jerusalem. And he died and was buried
    in the tombs of his fathers, and all Judah and Jerusalem were mourning for Josiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the chariot of the second [one],' likely meaning Josiah's
      secondary or reserve chariot.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבִירֻהוּ
  chosen: removed him
  alternatives:
  - carried him away
  - transferred him
  lexicon: HALOT
  rationale: The Hiphil of עבר here means to cause someone to pass from one place
    to another. In context, Josiah is being taken out of his battle chariot, so 'removed
    him' is natural modern English and preserves the physical transfer.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his servants/attendants
  - his officials
  lexicon: HALOT
  rationale: Though עבד can denote various kinds of servants or officials, here it
    refers to those attending the king in battle and transport. 'Servants' is the
    broad, contextually appropriate rendering without over-specifying rank.
- source_word: הַמֶּרְכָּבָה
  chosen: the chariot
  alternatives:
  - his chariot
  - the war chariot
  lexicon: HALOT
  rationale: The noun denotes a chariot. The article is present, and the immediate
    context already identifies the vehicle from which he is removed, so 'the chariot'
    is sufficient.
- source_word: וַיַּרְכִּיבֻהוּ
  chosen: set him on
  alternatives:
  - made him ride on
  - placed him on
  lexicon: HALOT
  rationale: The Hiphil of רכב means to cause to ride or mount. Because Josiah is
    wounded, 'set him on' communicates assisted placement more idiomatically than
    'made him ride on.'
- source_word: רֶכֶב הַמִּשְׁנֶה
  chosen: the second chariot
  alternatives:
  - the reserve chariot
  - the chariot of the second rank
  lexicon: HALOT
  rationale: Literally 'the chariot of the second [one].' In narrative context this
    most naturally refers to a secondary or backup chariot belonging to the king.
    'Second chariot' keeps close to the Hebrew while remaining readable.
- source_word: אֲשֶׁר לוֹ
  chosen: that belonged to him
  alternatives:
  - which was his
  - that he had
  lexicon: HALOT
  rationale: This relative clause identifies the second chariot as Josiah's own. 'That
    belonged to him' is clear and idiomatic.
- source_word: וַיּוֹלִיכֻהוּ
  chosen: brought him
  alternatives:
  - led him
  - took him
  lexicon: HALOT
  rationale: The Hiphil of הלך can mean to lead or bring. Since the destination is
    Jerusalem and Josiah is being transported, 'brought him' is the most natural English
    choice.
- source_word: וַיָּמָת
  chosen: he died
  alternatives:
  - and he died
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol of מות. Rendered straightforwardly.
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - and he was buried
  lexicon: HALOT
  rationale: Niphal/passive sense of קבר. 'Was buried' is the natural English passive.
- source_word: בְּקִבְרוֹת אֲבֹתָיו
  chosen: in the tombs of his fathers
  alternatives:
  - in the graves of his fathers
  - in his ancestors' tombs
  lexicon: HALOT
  rationale: The plural 'tombs/graves' with 'his fathers' is a standard Hebrew expression
    for ancestral burial places. 'Tombs of his fathers' preserves the familial and
    dynastic sense.
- source_word: וְכָל יְהוּדָה וִירוּשָׁלַם
  chosen: all Judah and Jerusalem
  alternatives:
  - all Judah and the inhabitants of Jerusalem
  lexicon: HALOT
  rationale: The phrase personifies the kingdom and capital as the mourning community.
    'All Judah and Jerusalem' is a conventional and sufficiently clear rendering.
- source_word: מִתְאַבְּלִים
  chosen: were mourning
  alternatives:
  - mourned
  - were lamenting
  lexicon: HALOT
  rationale: The participle conveys ongoing mourning. 'Were mourning' reflects the
    durative sense better than a simple past.
- source_word: עַל יֹאשִׁיָּהוּ
  chosen: for Josiah
  alternatives:
  - over Josiah
  lexicon: HALOT
  rationale: With אבל, על marks the object of mourning. 'For Josiah' is idiomatic
    English.
