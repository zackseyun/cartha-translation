id: 2CH.16.2
reference: 2 Chronicles 16:2
source:
  edition: WLC
  text: וַ/יֹּצֵ֨א אָסָ֜א כֶּ֣סֶף וְ/זָהָ֗ב מֵ/אֹֽצְר֛וֹת בֵּ֥ית יְהוָ֖ה וּ/בֵ֣ית
    הַ/מֶּ֑לֶךְ וַ/יִּשְׁלַ֗ח אֶל בֶּן הֲדַד֙ מֶ֣לֶךְ אֲרָ֔ם הַ/יּוֹשֵׁ֥ב בְּ/דַרְמֶ֖שֶׂק
    לֵ/אמֹֽר־־׃
translation:
  text: Then Asa brought out silver and gold from the treasuries of the house of the
    LORD and of the king’s house, and sent them to Ben-hadad king of Aram, who lived
    in Damascus, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''king of Aram''; traditionally, ''king of Syria.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּצֵא
  chosen: brought out
  alternatives:
  - took out
  - brought forth
  lexicon: HALOT
  rationale: The Hifil of יצא here means to cause to go out from storage. 'Brought
    out' is natural English and preserves the concrete action better than a more interpretive
    rendering.
- source_word: כֶּסֶף וְזָהָב
  chosen: silver and gold
  lexicon: HALOT
  rationale: Standard literal rendering of the paired valuables; no reason to generalize
    to 'money' or 'treasure' since the Hebrew specifies the metals.
- source_word: מֵאֹצְרוֹת
  chosen: from the treasuries
  alternatives:
  - from the storehouses
  - from the treasury
  lexicon: HALOT
  rationale: Plural construct is explicit in Hebrew. 'Treasuries' fits the context
    of stored royal and temple wealth better than singular 'treasury.'
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: The Hebrew is literally 'house of YHWH.' Following doctrine, יְהוָה is
    rendered 'the LORD.' 'House' preserves the source wording; 'temple' is a possible
    contextual gloss but less direct.
- source_word: וּבֵית הַמֶּלֶךְ
  chosen: and of the king’s house
  alternatives:
  - and from the royal palace
  - and of the palace
  lexicon: HALOT
  rationale: Literally 'and [the] house of the king.' 'King’s house' keeps the parallel
    with 'house of the LORD.' 'Palace' is contextually possible but less formally
    aligned with the Hebrew repetition.
- source_word: וַיִּשְׁלַח
  chosen: sent them
  alternatives:
  - sent
  - dispatched
  lexicon: HALOT
  rationale: The verb means 'sent.' English idiom benefits from supplying the object
    'them,' referring to the silver and gold just mentioned, though the Hebrew leaves
    it implicit.
- source_word: אֶל בֶּן הֲדַד
  chosen: to Ben-hadad
  lexicon: HALOT
  rationale: Personal name transliterated per translation philosophy.
- source_word: מֶלֶךְ אֲרָם
  chosen: king of Aram
  alternatives:
  - king of Syria
  lexicon: HALOT
  rationale: The Hebrew proper name is Aram. 'Aram' is preferred over the traditional
    but interpretive geopolitical equivalent 'Syria' to preserve original-language
    primacy.
- source_word: הַיּוֹשֵׁב בְּדַרְמֶשֶׂק
  chosen: who lived in Damascus
  alternatives:
  - who was dwelling in Damascus
  - who resided in Damascus
  lexicon: HALOT
  rationale: The participial phrase identifies Ben-hadad as the one residing in Damascus.
    'Lived' is clear modern English without losing the durative sense.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'with this message:'
  lexicon: HALOT
  rationale: Standard narrative introduction to direct speech. 'Saying' preserves
    the formal structure and prepares for the next verse.
