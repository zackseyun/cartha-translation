id: 2CH.16.5
reference: 2 Chronicles 16:5
source:
  edition: WLC
  text: וַ/יְהִי֙ כִּ/שְׁמֹ֣עַ בַּעְשָׁ֔א וַ/יֶּחְדַּ֕ל מִ/בְּנ֖וֹת אֶת הָ/רָמָ֑ה
    וַ/יַּשְׁבֵּ֖ת אֶת מְלַאכְתּֽ/וֹ־־׃ס
translation:
  text: And when Baasha heard of it, he stopped building Ramah and ceased his work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he stopped building up Ramah'; the Hebrew refers to ceasing the construction
      or fortification activity at Ramah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּשְׁמֹעַ
  chosen: And when ... heard of it
  alternatives:
  - And it happened, when ... heard
  - Now when ... heard
  lexicon: HALOT
  rationale: The Hebrew wayyiqtol plus infinitive construct introduces a temporal
    clause. In natural English, 'And when ... heard' conveys the sequence without
    woodenly reproducing 'and it happened.' 'of it' is supplied idiomatically because
    English normally requires an object for 'heard' in this context, and the preceding
    narrative supplies the content.
- source_word: בַּעְשָׁא
  chosen: Baasha
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: וַיֶּחְדַּל
  chosen: he stopped
  alternatives:
  - he ceased
  - he refrained
  lexicon: HALOT
  rationale: The verb חדל means to stop or cease. 'Stopped' is the most natural modern
    English choice here and pairs well with the following infinitive.
- source_word: מִבְּנוֹת
  chosen: building
  alternatives:
  - from building
  - to build
  lexicon: HALOT
  rationale: With חדל, the preposition מן plus infinitive expresses cessation of an
    activity. English idiom renders this smoothly as 'stopped building.'
- source_word: אֶת הָרָמָה
  chosen: Ramah
  alternatives:
  - the Ramah fortification
  lexicon: HALOT
  rationale: הָרָמָה is the place name Ramah, not a common noun here. The direct-object
    marker indicates the city as the object of the building activity, best rendered
    simply as 'building Ramah' in context, meaning fortifying or constructing up the
    site.
- source_word: וַיַּשְׁבֵּת
  chosen: and ceased
  alternatives:
  - and stopped
  - and made cease
  lexicon: HALOT
  rationale: The Hiphil of שבת here means to cause to stop or to put an end to. Since
    the object is 'his work,' 'ceased his work' is idiomatic English that preserves
    the sense without awkward causative phrasing.
- source_word: מְלַאכְתּוֹ
  chosen: his work
  alternatives:
  - his labor
  - his project
  lexicon: HALOT
  rationale: מלאכה commonly denotes work, labor, or occupation. 'His work' is broad
    and natural, fitting the context of construction activity.
