id: 2CH.16.1
reference: 2 Chronicles 16:1
source:
  edition: WLC
  text: בִּ/שְׁנַ֨ת שְׁלֹשִׁ֤ים וָ/שֵׁשׁ֙ לְ/מַלְכ֣וּת אָסָ֔א עָלָ֞ה בַּעְשָׁ֤א מֶֽלֶךְ
    יִשְׂרָאֵל֙ עַל יְהוּדָ֔ה וַ/יִּ֖בֶן אֶת הָ/רָמָ֑ה לְ/בִלְתִּ֗י תֵּ֚ת יוֹצֵ֣א
    וָ/בָ֔א לְ/אָסָ֖א מֶ֥לֶךְ יְהוּדָֽה־־־׃
translation:
  text: In the thirty-sixth year of Asa’s reign, Baasha king of Israel went up against
    Judah and built Ramah, so as not to allow anyone to go out or come in to Asa king
    of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in the thirty-sixth year of Asa’s reign.'' This creates a chronological
      tension with 1 Kings’ timeline for Baasha; some understand it as counting from
      the division of the kingdom, and others propose a harmonizing textual adjustment.'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּ/שְׁנַת שְׁלֹשִׁים וָ/שֵׁשׁ
  chosen: In the thirty-sixth year
  alternatives:
  - In year thirty-six
  - In the thirty-sixth year
  lexicon: HALOT
  rationale: 'Construct phrase with prefixed ב marks time: ''in the year of thirty
    and six.'' Idiomatic English is ''In the thirty-sixth year.'''
- source_word: לְ/מַלְכ֣וּת אָסָא
  chosen: of Asa’s reign
  alternatives:
  - of the reign of Asa
  - of Asa’s kingship
  lexicon: HALOT
  rationale: מַלְכוּת denotes reign/royal rule. 'Asa’s reign' is natural English and
    preserves the temporal reference.
- source_word: עָלָה ... עַל יְהוּדָה
  chosen: went up against Judah
  alternatives:
  - came up against Judah
  - marched up against Judah
  lexicon: HALOT
  rationale: עלה with עַל in military context commonly means to advance or campaign
    against. 'Went up against' keeps the Hebrew idiom without over-specifying military
    detail.
- source_word: וַ/יִּבֶן אֶת הָ/רָמָה
  chosen: and built Ramah
  alternatives:
  - and fortified Ramah
  - and rebuilt Ramah
  lexicon: HALOT
  rationale: בנה is simply 'build.' Although the context implies fortification, the
    Hebrew verb itself does not require 'fortified,' so the plainer rendering is preferred.
- source_word: הָ/רָמָה
  chosen: Ramah
  lexicon: HALOT
  rationale: Place name; transliterated according to the translation philosophy for
    personal and place names.
- source_word: לְ/בִלְתִּי תֵּת
  chosen: so as not to allow
  alternatives:
  - in order not to permit
  - to prevent
  lexicon: HALOT
  rationale: לבלתי + infinitive expresses purpose/prevention. 'So as not to allow'
    is clear modern English and closely follows the source sense.
- source_word: יוֹצֵא וָ/בָא
  chosen: to go out or come in
  alternatives:
  - to leave or enter
  - exit or enter
  lexicon: HALOT
  rationale: This pair is a common Hebrew merism for movement/access. 'Go out or come
    in' preserves the Hebrew wording and rhythm.
- source_word: לְ/אָסָא מֶלֶךְ יְהוּדָה
  chosen: to Asa king of Judah
  alternatives:
  - for Asa king of Judah
  - to/from Asa king of Judah
  lexicon: HALOT
  rationale: 'The preposition ל here marks relation/direction with the prevention
    clause: Baasha''s action was intended to block access in relation to Asa. ''To
    Asa king of Judah'' is a sufficiently literal rendering; the broader sense of
    restricting movement to and from Asa is contextually evident.'
