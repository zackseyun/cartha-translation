theological_decisions:
- issue: Chronological tension with the reign of Baasha in Kings
  chosen_reading: Retain the Masoretic wording 'the thirty-sixth year of Asa’s reign'
    in the main text
  alternative_readings:
  - the thirty-sixth year from the division of the kingdom
  - the twenty-sixth year of Asa (harmonizing emendation)
  rationale: The Hebrew text plainly reads 'the thirty-sixth year ... of Asa’s reign.'
    Because this is a historical/chronological difficulty rather than a doctrinal
    one, the translation should not silently emend or harmonize. Alternatives are
    worth preserving in a footnote for transparency.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve tension rather than resolve it)
