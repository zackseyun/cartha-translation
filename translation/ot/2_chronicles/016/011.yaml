id: 2CH.16.11
reference: 2 Chronicles 16:11
source:
  edition: WLC
  text: וְ/הִנֵּה֙ דִּבְרֵ֣י אָסָ֔א הָ/רִאשׁוֹנִ֖ים וְ/הָ/אַחֲרוֹנִ֑ים הִנָּ֤/ם כְּתוּבִים֙
    עַל סֵ֣פֶר הַ/מְּלָכִ֔ים לִ/יהוּדָ֖ה וְ/יִשְׂרָאֵֽל־׃
translation:
  text: Now behold, the acts of Asa, from first to last, are written in the Book of
    the Kings of Judah and Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the words/matters of Asa, the former and the latter.'
      Here 'acts' and 'from first to last' reflect the idiomatic sense of the Hebrew
      historiographical formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: Now behold
  alternatives:
  - Behold
  - Now see
  - Now
  lexicon: HALOT
  rationale: Introduces the concluding notice with attention-getting force. 'Now behold'
    preserves both the conjunction and the deictic/interjective sense better than
    a bare 'behold' or omission.
- source_word: דִּבְרֵי
  chosen: the acts of
  alternatives:
  - the words of
  - the matters of
  - the deeds of
  lexicon: HALOT
  rationale: In royal summary formulas, דִּבְרֵי often refers broadly to the affairs,
    acts, or events concerning a king, not merely his spoken words. 'Acts' is idiomatic
    and fits the historiographical context.
- source_word: הָרִאשׁוֹנִים וְהָאַחֲרוֹנִים
  chosen: from first to last
  alternatives:
  - the former and the latter
  - the first and the last
  lexicon: HALOT
  rationale: This Hebrew pair is a stock expression meaning the whole span or entirety.
    'From first to last' communicates the idiomatic sense in natural English while
    remaining close to the source.
- source_word: הִנָּם כְּתוּבִים
  chosen: are written
  alternatives:
  - indeed they are written
  - behold, they are written
  - are recorded
  lexicon: HALOT
  rationale: The phrase states that these matters stand recorded in a written source.
    'Are written' is formally accurate; the evidential force of הִנָּם is sufficiently
    carried by the opening 'Now behold'.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  - upon the book
  lexicon: HALOT
  rationale: Although עַל is literally 'on/upon,' in this citation formula English
    idiom prefers 'in.' 'Book' is a conventional and understandable rendering for
    סֵפֶר in this archival context, though 'scroll' is possible.
- source_word: הַמְּלָכִים
  chosen: the Kings
  alternatives:
  - the Annals of the Kings
  - the royal records
  lexicon: HALOT
  rationale: The Hebrew is literally 'the kings.' In context it denotes a written
    source associated with the kings. 'Book of the Kings' is the most transparent
    rendering; more interpretive expansions like 'annals' are possible but go beyond
    the explicit wording.
- source_word: לִיהוּדָה וְיִשְׂרָאֵל
  chosen: of Judah and Israel
  alternatives:
  - concerning Judah and Israel
  - for Judah and Israel
  lexicon: HALOT
  rationale: With titles of records, the prefixed ל can indicate relation or belonging.
    'Of Judah and Israel' is the most natural English construal with 'Book of the
    Kings' and matches the likely sense of a record pertaining to the kings of both
    kingdoms.
