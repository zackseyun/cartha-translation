id: 2CH.16.4
reference: 2 Chronicles 16:4
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֨ע בֶּן הֲדַ֜ד אֶל הַ/מֶּ֣לֶךְ אָסָ֗א וַ֠/יִּשְׁלַח אֶת שָׂרֵ֨י
    הַ/חֲיָלִ֤ים אֲשֶׁר ל/וֹ֙ אֶל עָרֵ֣י יִשְׂרָאֵ֔ל וַ/יַּכּוּ֙ אֶת עִיּ֣וֹן וְ/אֶת
    דָּ֔ן וְ/אֵ֖ת אָבֵ֣ל מָ֑יִם וְ/אֵ֥ת כָּֽל מִסְכְּנ֖וֹת עָרֵ֥י נַפְתָּלִֽי־־־־־־־׃
translation:
  text: Ben-hadad listened to King Asa and sent the commanders of his armies against
    the cities of Israel, and they struck Ijon, Dan, Abel-maim, and all the store-cities
    of Naphtali.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abel-maim is the reading of the Hebrew text here; some identify it with
      Abel-beth-maacah known from parallel passages.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: listened to
  alternatives:
  - heard
  - obeyed
  lexicon: HALOT
  rationale: In context, Ben-hadad is responding favorably to Asa's request from the
    previous verse. 'Listened to' captures both hearing and heeding without overstating
    with 'obeyed.'
- source_word: שָׂרֵי הַחֲיָלִים
  chosen: the commanders of his armies
  alternatives:
  - the captains of the forces
  - the commanders of the troops
  lexicon: HALOT
  rationale: שָׂרֵי denotes leaders/commanders, and הַחֲיָלִים refers to military
    forces. The plural possessive sense comes from אֲשֶׁר לוֹ, so 'the commanders
    of his armies' is natural modern English.
- source_word: אֲשֶׁר לוֹ
  chosen: his
  alternatives:
  - that belonged to him
  - who were his
  lexicon: HALOT
  rationale: This phrase modifies the military commanders/forces as belonging to Ben-hadad.
    Rendering it idiomatically as 'his' avoids wooden English while preserving possession.
- source_word: עָרֵי יִשְׂרָאֵל
  chosen: the cities of Israel
  alternatives:
  - Israelite cities
  lexicon: HALOT
  rationale: A straightforward geographical-political reference to the northern kingdom's
    cities.
- source_word: וַיַּכּוּ
  chosen: they struck
  alternatives:
  - they attacked
  - they smote
  lexicon: HALOT
  rationale: נכה in military narrative often means to strike/defeat/attack. 'Struck'
    is concise and preserves the formal force without archaic tone.
- source_word: עִיּוֹן
  chosen: Ijon
  rationale: Proper place name transliterated by standard English convention.
- source_word: אָבֵל מָיִם
  chosen: Abel-maim
  alternatives:
  - Abel-beth-maacah
  lexicon: HALOT
  rationale: The Hebrew text here reads אָבֵל מָיִם, so the translation follows the
    source text directly as 'Abel-maim' rather than harmonizing to the more familiar
    place name in parallel passages. The alternative identification is worth preserving
    in a footnote.
- source_word: מִסְכְּנוֹת
  chosen: store-cities
  alternatives:
  - supply cities
  - storage cities
  - treasure cities
  lexicon: HALOT
  rationale: The term refers to cities used for storage/supplies. 'Store-cities' is
    a conventional but still understandable rendering that fits the military-economic
    context.
- source_word: עָרֵי נַפְתָּלִי
  chosen: of Naphtali
  alternatives:
  - in Naphtali
  lexicon: HALOT
  rationale: The construct chain naturally yields 'the store-cities of Naphtali,'
    indicating the region/tribal territory to which the cities belonged.
