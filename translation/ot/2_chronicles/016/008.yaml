id: 2CH.16.8
reference: 2 Chronicles 16:8
source:
  edition: WLC
  text: הֲ/לֹ֧א הַ/כּוּשִׁ֣ים וְ/הַ/לּוּבִ֗ים הָי֨וּ לְ/חַ֧יִל לָ/רֹ֛ב לְ/רֶ֥כֶב וּ/לְ/פָרָשִׁ֖ים
    לְ/הַרְבֵּ֣ה מְאֹ֑ד וּ/בְ/הִשָּֽׁעֶנְ/ךָ֥ עַל יְהוָ֖ה נְתָנָ֥/ם בְּ/יָדֶֽ/ךָ׀־׃
translation:
  text: Were not the Cushites and the Lubites a very great army, with chariots and
    horsemen in great abundance? Yet when you relied on the LORD, he gave them into
    your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ethiopians and the Libyans.' The Hebrew names are rendered here
      as 'Cushites' and 'Lubites' to stay close to the source ethnonyms.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Were not
  alternatives:
  - Was it not
  - Did not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Were
    not' fits the plural subject and preserves the rhetorical force.
- source_word: הַכּוּשִׁים
  chosen: the Cushites
  alternatives:
  - the Ethiopians
  lexicon: HALOT
  rationale: A transliterated ethnonym is preferred over the traditional but potentially
    anachronistic 'Ethiopians.' This follows original-language primacy and avoids
    importing later geographic assumptions.
- source_word: וְהַלּוּבִים
  chosen: and the Lubites
  alternatives:
  - and the Libyans
  lexicon: HALOT
  rationale: The ethnonym is rendered by transliteration for consistency with Hebrew
    peoples' names and to avoid overconfident identification with later national labels.
    'Libyans' is a plausible contextual equivalent but less text-near.
- source_word: הָיוּ לְחַיִל
  chosen: were ... a ... army
  alternatives:
  - were for a force
  - were a military force
  lexicon: HALOT
  rationale: חַיִל here denotes military strength/army rather than wealth or valor
    in the abstract. 'Army' is the most natural English rendering in context.
- source_word: לָרֹב
  chosen: very great
  alternatives:
  - in great number
  - numerous
  lexicon: HALOT
  rationale: This phrase modifies the scale of the army. 'Very great' captures both
    size and emphasis in idiomatic English.
- source_word: לְרֶכֶב
  chosen: with chariots
  alternatives:
  - as to chariots
  lexicon: HALOT
  rationale: The preposition introduces specification of military assets. 'With chariots'
    is idiomatic and clear.
- source_word: וּלְפָרָשִׁים
  chosen: and horsemen
  alternatives:
  - and cavalry
  lexicon: HALOT
  rationale: The Hebrew refers literally to horsemen. 'Horsemen' preserves the concrete
    imagery better than the more interpretive 'cavalry.'
- source_word: לְהַרְבֵּה מְאֹד
  chosen: in great abundance
  alternatives:
  - very many
  - exceedingly numerous
  lexicon: HALOT
  rationale: This intensifies the number of chariots and horsemen. 'In great abundance'
    is natural English and preserves the emphatic sense.
- source_word: וּבְהִשָּׁעֶנְךָ עַל
  chosen: Yet when you relied on
  alternatives:
  - and when you leaned on
  - because you relied on
  lexicon: HALOT
  rationale: The infinitive construct with preposition expresses the circumstance
    under which victory occurred. 'Relied on' conveys the metaphorical sense of trust/dependence
    better than the more literal 'leaned on.' 'Yet' brings out the contrast implied
    in the argument.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: נְתָנָם בְּיָדֶךָ
  chosen: he gave them into your hand
  alternatives:
  - he delivered them into your hand
  - he gave them into your power
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for granting victory over enemies. 'Gave
    them into your hand' preserves the idiom while remaining understandable; 'delivered'
    is possible but slightly more interpretive.
