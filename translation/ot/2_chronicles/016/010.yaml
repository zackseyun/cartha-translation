id: 2CH.16.10
reference: 2 Chronicles 16:10
source:
  edition: WLC
  text: וַ/יִּכְעַ֨ס אָסָ֜א אֶל הָ/רֹאֶ֗ה וַֽ/יִּתְּנֵ֨/הוּ֙ בֵּ֣ית הַ/מַּהְפֶּ֔כֶת
    כִּֽי בְ/זַ֥עַף עִמּ֖/וֹ עַל זֹ֑את וַ/יְרַצֵּ֥ץ אָסָ֛א מִן הָ/עָ֖ם בָּ/עֵ֥ת הַ/הִֽיא־־־־׃
translation:
  text: Then Asa was angry with the seer and put him in the prison house, because
    he was in a rage with him over this. And Asa brutally oppressed some of the people
    at that time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the house of the stocks'; the Hebrew expression likely refers to a place
      of confinement involving restraint.
    reason: lexical_alternative
  - marker: b
    text: Or 'crushed' or 'mistreated'; the Hebrew verb is literally violent and conveys
      harsh abuse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְעַס
  chosen: was angry
  alternatives:
  - became angry
  - was enraged
  lexicon: HALOT
  rationale: The verb from כעס denotes anger or vexation. 'Was angry' is natural modern
    English and fits the narrative sequence without overstating beyond the Hebrew.
- source_word: הָרֹאֶה
  chosen: the seer
  alternatives:
  - the prophet
  lexicon: HALOT
  rationale: רֹאֶה literally means 'seer,' an older prophetic designation. 'Seer'
    preserves the source term more precisely than the broader 'prophet.'
- source_word: וַיִּתְּנֵהוּ
  chosen: put him
  alternatives:
  - placed him
  - committed him
  lexicon: HALOT
  rationale: נתן with the object and destination idiomatically means to place or put
    someone somewhere. 'Put him' is straightforward and idiomatic.
- source_word: בֵּית הַמַּהְפֶּכֶת
  chosen: the prison house
  alternatives:
  - the stocks
  - the house of the stocks
  - the dungeon
  lexicon: HALOT
  rationale: The phrase is difficult and likely refers to a place of confinement associated
    with restraint or torture. Because בֵּית indicates a place/house and the expression
    functions here as imprisonment, 'prison house' best captures the institutional
    sense in context, while preserving the more specific alternative in a footnote.
- source_word: בְזַעַף עִמּוֹ
  chosen: he was in a rage with him
  alternatives:
  - he was furious with him
  - he was enraged at him
  lexicon: HALOT
  rationale: זַעַף denotes indignation or rage. The prepositional phrase indicates
    Asa's emotional state toward Hanani. 'In a rage with him' reflects the intensity
    without becoming colloquial.
- source_word: עַל זֹאת
  chosen: over this
  alternatives:
  - because of this
  - for this
  lexicon: HALOT
  rationale: A concise causal-reference phrase; 'over this' fits the immediate provocation
    just narrated.
- source_word: וַיְרַצֵּץ
  chosen: brutally oppressed
  alternatives:
  - crushed
  - mistreated
  - abused
  lexicon: HALOT
  rationale: The verb רצץ literally conveys crushing or smashing, but with human objects
    in context it denotes severe mistreatment. 'Brutally oppressed' communicates the
    violent social abuse implied, while a footnote preserves the more literal 'crushed/mistreated'
    range.
- source_word: מִן הָעָם
  chosen: some of the people
  alternatives:
  - from among the people
  - certain of the people
  lexicon: HALOT
  rationale: The מן-partitive sense is best represented by 'some of the people' rather
    than implying the whole populace.
- source_word: בָּעֵת הַהִיא
  chosen: at that time
  alternatives:
  - in that time
  - at that same time
  lexicon: HALOT
  rationale: Standard temporal rendering in idiomatic English.
