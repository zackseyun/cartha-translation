theological_decisions:
- issue: Meaning of the funerary burning
  chosen_reading: A ceremonial burning in Asa's honor, not a statement that his body
    was cremated.
  alternative_readings:
  - A cremation of the corpse
  - A general funeral fire without further specification
  rationale: The verse first states that Asa was buried and laid on a funerary bier,
    then mentions a great burning for him. In the broader Hebrew Bible, such burnings
    can denote honorific burning of spices or aromatic materials at a royal funeral.
    The translation therefore preserves the Hebrew idiom 'burning' rather than interpreting
    it as cremation in the main text.
