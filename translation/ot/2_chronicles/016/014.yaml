id: 2CH.16.14
reference: 2 Chronicles 16:14
source:
  edition: WLC
  text: וַ/יִּקְבְּרֻ֣/הוּ בְ/קִבְרֹתָ֗י/ו אֲשֶׁ֣ר כָּֽרָה ל/וֹ֮ בְּ/עִ֣יר דָּוִיד֒
    וַ/יַּשְׁכִּיבֻ֗/הוּ בַּ/מִּשְׁכָּב֙ אֲשֶׁ֤ר מִלֵּא֙ בְּשָׂמִ֣ים וּ/זְנִ֔ים מְרֻקָּחִ֖ים
    בְּ/מִרְקַ֣חַת מַעֲשֶׂ֑ה וַ/יִּשְׂרְפוּ ל֥/וֹ שְׂרֵפָ֖ה גְּדוֹלָ֥ה עַד לִ/מְאֹֽד־־־׃פ
translation:
  text: They buried him in his tombs, which he had cut out for himself in the City
    of David, and laid him on the bier that had been filled with spices and various
    blended ointments prepared by a perfumer’s craft; and they made a very great burning
    for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bed' or 'couch'; the Hebrew term refers to a place of lying down, here
      likely a funerary bier.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression 'they made a great burning for him' likely refers
      to an honorific burning of spices or aromatics at the funeral, not necessarily
      cremation of the body.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקְבְּרֻהוּ
  chosen: They buried him
  alternatives:
  - and they buried him
  lexicon: HALOT
  rationale: Wayyiqtol of קבר, straightforward narrative past plural with 3ms object
    suffix. English omits the conjunction for natural style while preserving sequence.
- source_word: בְקִבְרֹתָיו
  chosen: in his tombs
  alternatives:
  - in his burial place
  - in his sepulchers
  lexicon: HALOT
  rationale: Plural of קבר/קבורה-form in construct with 3ms suffix. The plural likely
    reflects a burial complex or royal tomb structure rather than multiple unrelated
    graves, so 'his tombs' preserves the Hebrew form without overexplaining.
- source_word: אֲשֶׁר כָּרָה לוֹ
  chosen: which he had cut out for himself
  alternatives:
  - which he had dug for himself
  - which he had hewn out for himself
  lexicon: HALOT
  rationale: כָּרָה commonly means 'dig' or 'excavate'; in the context of a tomb in
    rock, 'cut out' communicates the likely action in idiomatic English better than
    'dug' while remaining close to the source.
- source_word: בְּעִיר דָּוִיד
  chosen: in the City of David
  lexicon: HALOT
  rationale: Standard place-name rendering; 'City of David' is the established and
    transparent English equivalent.
- source_word: וַיַּשְׁכִּיבֻהוּ
  chosen: and laid him
  alternatives:
  - and placed him
  - and caused him to lie
  lexicon: HALOT
  rationale: Hiphil of שׁכב here refers to placing the body in repose. 'Laid him'
    is natural funeral language and fits the object and setting.
- source_word: בַּמִּשְׁכָּב
  chosen: on the bier
  alternatives:
  - on the bed
  - on the couch
  lexicon: HALOT
  rationale: מִשְׁכָּב often means 'bed' or 'place of lying down,' but in a burial
    context it likely refers to the funerary couch or bier on which the body was laid.
    'Bier' best fits the context without implying cremation.
- source_word: אֲשֶׁר מִלֵּא
  chosen: that had been filled
  alternatives:
  - which one had filled
  - which he had filled
  lexicon: HALOT
  rationale: The Hebrew uses a 3ms perfect, but the subject is not explicit in English
    and the focus is on the prepared bier. A passive rendering is idiomatic and preserves
    the resultative sense.
- source_word: בְּשָׂמִים
  chosen: with spices
  alternatives:
  - with balsam
  - with aromatics
  lexicon: HALOT
  rationale: בְּשָׂמִים denotes aromatic substances used in burial and perfuming.
    'Spices' is the most accessible standard rendering.
- source_word: וּזְנִים
  chosen: and various blended ointments
  alternatives:
  - and kinds of perfumes
  - and aromatic mixtures
  lexicon: HALOT
  rationale: This rare term is traditionally understood as kinds/varieties of aromatic
    compounds in parallel with spices. 'Various blended ointments' captures both the
    plurality and the perfumed preparation indicated by the context and following
    participle.
- source_word: מְרֻקָּחִים
  chosen: blended
  alternatives:
  - compounded
  - mixed
  - perfumed
  lexicon: HALOT
  rationale: Passive participle from רקח, used for compounding perfumes or ointments.
    'Blended' is readable modern English; the more technical nuance is reinforced
    by the following phrase.
- source_word: בְּמִרְקַחַת מַעֲשֶׂה
  chosen: prepared by a perfumer’s craft
  alternatives:
  - according to the art of the perfumer
  - as a compounder's work
  lexicon: HALOT
  rationale: The phrase denotes skilled preparation according to the work/art of a
    perfumer or compounder. 'Prepared by a perfumer’s craft' is natural English that
    preserves the artisanal sense.
- source_word: וַיִּשְׂרְפוּ לוֹ שְׂרֵפָה גְדוֹלָה
  chosen: and they made a very great burning for him
  alternatives:
  - and they burned a great fire in his honor
  - and they made a great funeral fire for him
  lexicon: HALOT
  rationale: The idiom refers to a large ceremonial burning associated with burial
    honors, likely of spices rather than the corpse itself in this Judahite royal
    context. 'Made a very great burning for him' stays close to the Hebrew and avoids
    importing cremation.
- source_word: עַד לִמְאֹד
  chosen: very
  alternatives:
  - exceedingly
  - to a very great degree
  lexicon: HALOT
  rationale: Hebrew intensifier meaning 'exceedingly/very much.' Rendered idiomatically
    with 'very' modifying 'great'.
