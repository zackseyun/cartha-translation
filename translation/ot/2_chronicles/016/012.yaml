id: 2CH.16.12
reference: 2 Chronicles 16:12
source:
  edition: WLC
  text: וַ/יֶּחֱלֶ֣א אָסָ֡א בִּ/שְׁנַת֩ שְׁלוֹשִׁ֨ים וָ/תֵ֤שַׁע לְ/מַלְכוּת/וֹ֙ בְּ/רַגְלָ֔י/ו עַד לְ/מַ֖עְלָ/ה חָלְי֑/וֹ וְ/גַם בְּ/חָלְי/וֹ֙ לֹא דָרַ֣שׁ אֶת יְהוָ֔ה כִּ֖י בָּ/רֹפְאִֽים־־־־׃
translation:
  text: In the thirty-ninth year of his reign, Asa became diseased in his feet; his disease became very severe. Yet even in his disease he did not seek Yahweh, but the physicians.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not inquire of the LORD, but from the physicians.' The Hebrew clause is elliptical and contrasts seeking the LORD with turning to physicians.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחֱלֶא
  chosen: became diseased
  alternatives:
  - became sick
  - fell ill
  lexicon: HALOT
  rationale: The verb חלה denotes becoming weak or sick. 'Became diseased' fits the medical context and pairs naturally with the later noun 'disease,' preserving the Hebrew linkage without sounding overly archaic.
- source_word: בְּרַגְלָיו
  chosen: in his feet
  alternatives:
  - in his legs
  lexicon: HALOT
  rationale: רֶגֶל commonly means 'foot' or 'leg.' Here 'feet' is the more natural English rendering for an ailment localized in the lower extremities and reflects the dual form in Hebrew.
- source_word: עַד לְמַעְלָה
  chosen: very severe
  alternatives:
  - exceedingly severe
  - to an extreme degree
  - upward
  lexicon: HALOT
  rationale: This idiom intensifies the severity of the illness rather than indicating spatial direction. Rendering it as 'very severe' communicates the sense clearly in modern English.
- source_word: חָלְיוֹ / בְּחָלְיוֹ
  chosen: his disease / in his disease
  alternatives:
  - his illness / in his illness
  - his sickness / in his sickness
  lexicon: HALOT
  rationale: Using 'disease' maintains lexical consistency across the repeated noun and suits the chronic, severe condition described.
- source_word: דָרַשׁ אֶת יְהוָה
  chosen: did not seek the LORD
  alternatives:
  - did not inquire of the LORD
  - did not seek help from the LORD
  lexicon: HALOT
  rationale: דרש with God commonly means to seek or consult him. 'Seek the LORD' is idiomatic biblical English and preserves the broader covenantal sense, not merely asking for information or healing.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי בָּרֹפְאִים
  chosen: but the physicians
  alternatives:
  - but from the physicians
  - but in the physicians
  - but rather the physicians
  lexicon: HALOT
  rationale: 'The clause is elliptical: literally ''for/in the physicians.'' In context it contrasts seeking the LORD with turning to physicians. ''But the physicians'' preserves the terseness while making the contrast intelligible in English.'
