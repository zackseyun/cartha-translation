theological_decisions:
- issue: Whether the verse condemns medical treatment itself or Asa's failure to seek God
  chosen_reading: The wording preserves the contrast that Asa did not seek the LORD, but instead turned to physicians, without implying that physicians are inherently illegitimate.
  alternative_readings:
  - The verse condemns any use of physicians
  - The verse merely notes he consulted physicians in addition to not seeking God
  rationale: 'The Hebrew contrasts the object of Asa''s seeking: not the LORD, but physicians. The translation should retain that contrast without importing a blanket theological rejection of medicine.'
