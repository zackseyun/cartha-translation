id: 2CH.16.6
reference: 2 Chronicles 16:6
source:
  edition: WLC
  text: וְ/אָסָ֣א הַ/מֶּ֗לֶךְ לָקַח֙ אֶת כָּל יְהוּדָ֔ה וַ/יִּשְׂא֞וּ אֶת אַבְנֵ֤י
    הָֽ/רָמָה֙ וְ/אֶת עֵצֶ֔י/הָ אֲשֶׁ֥ר בָּנָ֖ה בַּעְשָׁ֑א וַ/יִּ֣בֶן בָּ/הֶ֔ם אֶת
    גֶּ֖בַע וְ/אֶת הַ/מִּצְפָּֽה־־־־־־׃ס
translation:
  text: Then King Asa took all Judah, and they carried away the stones of Ramah and
    its timber, with which Baasha had built, and he built with them Geba and Mizpah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'summoned/enlisted all Judah'; literally 'took all Judah.'
    reason: lexical_alternative
  - marker: b
    text: That is, the stones and timber Baasha had used to build up Ramah.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָקַח אֶת כָּל יְהוּדָה
  chosen: took all Judah
  alternatives:
  - summoned all Judah
  - enlisted all Judah
  lexicon: HALOT
  rationale: Literally 'took all Judah.' In context this idiom means Asa mobilized
    the people of Judah for the work. 'Took' preserves the Hebrew wording while remaining
    understandable in English.
- source_word: וַיִּשְׂאוּ
  chosen: they carried away
  alternatives:
  - they carried off
  - they bore away
  lexicon: HALOT
  rationale: From נשׂא, here in the sense of lifting and transporting materials. 'Carried
    away' fits the context of dismantling and removing building supplies.
- source_word: אַבְנֵי הָרָמָה
  chosen: the stones of Ramah
  alternatives:
  - the stones from Ramah
  lexicon: HALOT
  rationale: Construct chain with place name. Since the stones belonged to the fortification
    at Ramah, 'of Ramah' is a natural rendering; 'from Ramah' is possible but slightly
    more interpretive.
- source_word: עֵצֶיהָ
  chosen: its timber
  alternatives:
  - its wood
  - its beams
  lexicon: HALOT
  rationale: The suffix refers back to Ramah's construction materials. 'Timber' is
    idiomatic for building wood and suits the military-building context better than
    the more generic 'wood.'
- source_word: אֲשֶׁר בָּנָה בַּעְשָׁא
  chosen: with which Baasha had built
  alternatives:
  - which Baasha had used to build
  - that Baasha had built
  lexicon: HALOT
  rationale: The relative clause most naturally modifies both stones and timber as
    the materials Baasha used in building Ramah. 'With which ... had built' makes
    that relation explicit in English.
- source_word: וַיִּבֶן בָּהֶם
  chosen: and he built with them
  alternatives:
  - and he used them to build
  - and he fortified with them
  lexicon: HALOT
  rationale: The singular verb has Asa as subject; the plural pronoun refers to the
    recovered materials. 'Built with them' is a close and clear rendering without
    adding 'fortified,' which is implied but not stated.
- source_word: גֶּבַע
  chosen: Geba
  alternatives:
  - Geba
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: הַמִּצְפָּה
  chosen: Mizpah
  alternatives:
  - the Mizpah
  lexicon: HALOT
  rationale: Although the Hebrew has the article, English place names normally omit
    it. 'Mizpah' is the standard transliteration.
