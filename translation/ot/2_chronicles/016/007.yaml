id: 2CH.16.7
reference: 2 Chronicles 16:7
source:
  edition: WLC
  text: וּ/בָ/עֵ֣ת הַ/הִ֗יא בָּ֚א חֲנָ֣נִי הָ/רֹאֶ֔ה אֶל אָסָ֖א מֶ֣לֶךְ יְהוּדָ֑ה
    וַ/יֹּ֣אמֶר אֵלָ֗י/ו בְּ/הִשָּׁ֨עֶנְ/ךָ֜ עַל מֶ֤לֶךְ אֲרָם֙ וְ/לֹ֤א נִשְׁעַ֨נְתָּ֙
    עַל יְהוָ֣ה אֱלֹהֶ֔י/ךָ עַל כֵּ֗ן נִמְלַ֛ט חֵ֥יל מֶֽלֶךְ אֲרָ֖ם מִ/יָּדֶֽ/ךָ־־־־־׃
translation:
  text: At that time Hanani the seer came to Asa king of Judah and said to him, “Because
    you relied on the king of Aram and did not rely on the LORD your God, therefore
    the army of the king of Aram has escaped from your hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the king of Syria.” The Hebrew reads “Aram.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָעֵת הַהִיא
  chosen: At that time
  alternatives:
  - At that moment
  - And at that time
  lexicon: HALOT
  rationale: Idiomatic temporal frame. The prefixed conjunction is absorbed into natural
    English rather than preserved as a separate 'and'.
- source_word: חֲנָנִי
  chosen: Hanani
  rationale: Personal name is transliterated per translation philosophy.
- source_word: הָרֹאֶה
  chosen: the seer
  alternatives:
  - the prophet
  lexicon: HALOT
  rationale: רֹאֶה is a specific prophetic title, traditionally 'seer,' distinct from
    but related to 'prophet.' 'Seer' preserves the source term more precisely.
- source_word: אָסָא מֶלֶךְ יְהוּדָה
  chosen: Asa king of Judah
  alternatives:
  - Asa, king of Judah
  rationale: Straightforward rendering of name plus royal title; comma omitted for
    smooth narrative flow.
- source_word: בְּהִשָּׁעֶנְךָ ... וְלֹא נִשְׁעַנְתָּ
  chosen: Because you relied ... and did not rely
  alternatives:
  - In relying ... and not relying
  - Because you leaned on ... and did not lean on
  lexicon: HALOT
  rationale: The verb שׁען literally involves leaning/support, but in this context
    'rely on' best conveys political and theological dependence in clear modern English.
    Using the same English gloss for both occurrences preserves the Hebrew repetition.
- source_word: מֶלֶךְ אֲרָם
  chosen: the king of Aram
  alternatives:
  - the king of Syria
  lexicon: HALOT
  rationale: Aram is the proper name in the Hebrew text; 'Syria' is a later conventional
    equivalent but less source-transparent.
- source_word: יְהוָה אֱלֹהֶיךָ
  chosen: the LORD your God
  alternatives:
  - Yahweh your God
  lexicon: HALOT
  rationale: Follows the project's default rendering of YHWH as 'the LORD' while preserving
    the covenantal phrase.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: HALOT
  rationale: Standard inferential rendering that clearly marks consequence.
- source_word: נִמְלַט
  chosen: has escaped
  alternatives:
  - escaped
  - slipped away
  - was delivered
  lexicon: HALOT
  rationale: The perfect is rendered with English present perfect to express a completed
    result relevant to the present accusation. 'Has escaped' fits the military context
    better than the more passive 'was delivered.'
- source_word: חֵיל מֶלֶךְ אֲרָם
  chosen: the army of the king of Aram
  alternatives:
  - the force of the king of Aram
  - the host of the king of Aram
  lexicon: HALOT
  rationale: חֵיל in this context denotes military force/army. 'Army' is the clearest
    modern equivalent.
- source_word: מִיָּדֶךָ
  chosen: from your hand
  alternatives:
  - out of your hand
  - from your power
  lexicon: HALOT
  rationale: The idiom is retained in understandable English because it conveys loss
    of control or capture without over-paraphrase.
