id: 2CH.16.3
reference: 2 Chronicles 16:3
source:
  edition: WLC
  text: בְּרִית֙ בֵּינִ֣/י וּ/בֵינֶ֔/ךָ וּ/בֵ֥ין אָבִ֖/י וּ/בֵ֣ין אָבִ֑י/ךָ הִנֵּ֨ה
    שָׁלַ֤חְתִּֽי לְ/ךָ֙ כֶּ֣סֶף וְ/זָהָ֔ב לֵ֞ךְ הָפֵ֣ר בְּרִֽיתְ/ךָ֗ אֶת בַּעְשָׁא֙
    מֶ֣לֶךְ יִשְׂרָאֵ֔ל וְ/יַעֲלֶ֖ה מֵ/עָלָֽ/י־׃
translation:
  text: There is a treaty between me and you, and between my father and your father.
    Look, I have sent you silver and gold. Go, break your treaty with Baasha king
    of Israel, so that he may withdraw from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'covenant' or 'alliance' for 'treaty' (Hebrew בְּרִית); here the context
      is a political pact between kings.
    reason: lexical_alternative
  - marker: b
    text: Literally 'and he may go up from upon me'; the idiom likely means that Baasha
      would withdraw his pressure or military action from Asa.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרִית
  chosen: treaty
  alternatives:
  - covenant
  - alliance
  lexicon: HALOT
  rationale: In this interstate diplomatic context between kings, 'treaty' best conveys
    a political pact. 'Covenant' is possible but in English can sound overly theological
    here; 'alliance' is also possible but is less directly tied to the repeated Hebrew
    noun.
- source_word: בֵּינִי וּבֵינֶךָ וּבֵין אָבִי וּבֵין אָבִיךָ
  chosen: between me and you, and between my father and your father
  alternatives:
  - between me and you, as between my father and your father
  lexicon: HALOT
  rationale: The Hebrew explicitly repeats 'between,' so the translation preserves
    the parallel diplomatic formula rather than compressing it too much.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces attention to the gift being sent. 'Look' is natural modern
    English and preserves the deictic force without archaic tone.
- source_word: שָׁלַחְתִּי לְךָ כֶּסֶף וְזָהָב
  chosen: I have sent you silver and gold
  alternatives:
  - I am sending you silver and gold
  - I have sent silver and gold to you
  lexicon: HALOT
  rationale: The perfect verb is naturally rendered as present perfect in English
    in this epistolary/diplomatic setting, indicating completed action with present
    relevance.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Come, go
  lexicon: HALOT
  rationale: A straightforward imperative introducing the requested action.
- source_word: הָפֵר
  chosen: break
  alternatives:
  - annul
  - invalidate
  lexicon: HALOT
  rationale: The Hiphil of פרר here means to break or nullify a treaty. 'Break' is
    idiomatic and forceful in English for treaty relations.
- source_word: בְּרִיתְךָ אֶת־בַּעְשָׁא
  chosen: your treaty with Baasha
  alternatives:
  - your covenant with Baasha
  - your alliance with Baasha
  lexicon: HALOT
  rationale: The object marker plus personal name indicates the treaty relation involving
    Baasha; English idiom expresses this as 'your treaty with Baasha.'
- source_word: וְיַעֲלֶה מֵעָלַי
  chosen: so that he may withdraw from me
  alternatives:
  - and let him go up from against me
  - that he may go up from me
  - so that he may depart from me
  lexicon: HALOT
  rationale: The idiom 'go up from upon/against me' in context means to cease pressure
    and move away. 'Withdraw from me' communicates the military-political sense clearly
    in modern English.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  lexicon: HALOT
  rationale: Standard royal title, retained directly.
