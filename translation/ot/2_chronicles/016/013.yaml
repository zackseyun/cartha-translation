id: 2CH.16.13
reference: 2 Chronicles 16:13
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֥ב אָסָ֖א עִם אֲבֹתָ֑י/ו וַ/יָּ֕מָת בִּ/שְׁנַ֛ת אַרְבָּעִ֥ים וְ/אַחַ֖ת
    לְ/מָלְכֽ/וֹ־׃
translation:
  text: And Asa slept with his fathers and died in the forty-first year of his reign.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''slept with his fathers,'' a customary expression for death and
      burial among one''s ancestors.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - rested
  lexicon: HALOT
  rationale: The idiom 'slept with his fathers' is a conventional Hebrew expression
    for death/burial in royal narratives. 'Slept' preserves the source wording and
    the idiomatic resonance better than flattening it to 'died,' especially since
    the next verb explicitly states that he died.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: A standard burial/death formula. 'With his fathers' is the more literal
    and traditional rendering, preserving the familial and dynastic sense of the Hebrew;
    'ancestors' is possible but less textually transparent.
- source_word: וַיָּמָת
  chosen: died
  lexicon: HALOT
  rationale: Straightforward rendering of the verb מות. It should remain explicit
    in English because the Hebrew uses both the idiom 'slept with his fathers' and
    the plain statement 'died.'
- source_word: בִּשְׁנַת אַרְבָּעִים וְאַחַת
  chosen: in the forty-first year
  alternatives:
  - in year forty-one
  lexicon: HALOT
  rationale: This is the natural English rendering of the Hebrew ordinal sense expressed
    by cardinal numbers in regnal dating formulas.
- source_word: לְמָלְכוֹ
  chosen: of his reign
  alternatives:
  - of his kingship
  - of his rule
  lexicon: HALOT
  rationale: In this chronological formula, 'of his reign' is the most idiomatic English
    equivalent for the infinitive/verb form referring to Asa's period of ruling as
    king.
- source_word: אָסָא
  chosen: Asa
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names rather than translate them.
