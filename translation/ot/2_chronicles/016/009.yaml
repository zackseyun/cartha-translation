id: 2CH.16.9
reference: 2 Chronicles 16:9
source:
  edition: WLC
  text: כִּ֣י יְהוָ֗ה עֵינָ֞י/ו מְשֹׁטְט֤וֹת בְּ/כָל הָ/אָ֨רֶץ֙ לְ֠/הִתְחַזֵּק עִם
    לְבָבָ֥/ם שָׁלֵ֛ם אֵלָ֖י/ו נִסְכַּ֣לְתָּ עַל זֹ֑את כִּ֣י מֵ/עַ֔תָּה יֵ֥שׁ עִמְּ/ךָ֖
    מִלְחָמֽוֹת־־־׃
translation:
  text: For the eyes of the LORD range throughout all the earth to strengthen those
    whose heart is wholly toward him. You have acted foolishly in this; for from now
    on you will have wars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to show himself strong for those whose heart is blameless toward him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional small-caps covenantal form rather than transliteration.
- source_word: עֵינָיו
  chosen: the eyes of
  alternatives:
  - his eyes
  lexicon: HALOT
  rationale: A literal rendering that keeps the anthropomorphic imagery of divine
    sight and attention explicit in the Hebrew.
- source_word: מְשֹׁטְטוֹת
  chosen: range throughout
  alternatives:
  - roam
  - run to and fro
  - move about
  lexicon: HALOT
  rationale: Conveys active movement over the whole earth in idiomatic modern English
    without losing the vividness of the participle.
- source_word: בְּכָל הָאָרֶץ
  chosen: throughout all the earth
  alternatives:
  - through all the land
  - across the whole earth
  lexicon: HALOT
  rationale: Given the universal scope of the saying, 'earth' is preferable to 'land';
    'throughout' matches the distributive sense.
- source_word: לְהִתְחַזֵּק
  chosen: to strengthen
  alternatives:
  - to show himself strong
  - to support strongly
  - to act strongly
  lexicon: HALOT
  rationale: The infinitive expresses Yahweh's purpose in scanning the earth. In context,
    the object is people with whole hearts, so 'to strengthen' communicates the benefactive
    sense clearly. The more reflexive/traditional 'show himself strong' is possible
    but less natural with the following phrase.
- source_word: עִם לְבָבָם שָׁלֵם אֵלָיו
  chosen: those whose heart is wholly toward him
  alternatives:
  - with those whose heart is blameless toward him
  - for those whose heart is fully his
  - toward those whose heart is complete toward him
  lexicon: HALOT
  rationale: The singular 'heart' after a plural pronominal suffix is naturally rendered
    collectively in English. שָׁלֵם here denotes undivided, whole-hearted loyalty
    rather than sinless perfection; 'wholly toward him' captures covenant devotion.
- source_word: נִסְכַּלְתָּ
  chosen: You have acted foolishly
  alternatives:
  - You have done foolishly
  - You have been foolish
  lexicon: HALOT
  rationale: An idiomatic English rendering of the verb that preserves the prophetic
    rebuke while sounding natural in modern English.
- source_word: עַל זֹאת
  chosen: in this
  alternatives:
  - in this matter
  - because of this
  lexicon: HALOT
  rationale: A concise rendering that refers back to Asa's action just mentioned in
    context.
- source_word: מֵעַתָּה
  chosen: from now on
  alternatives:
  - henceforth
  - from this time
  lexicon: HALOT
  rationale: Modern English equivalent of the temporal adverb.
- source_word: יֵשׁ עִמְּךָ מִלְחָמוֹת
  chosen: you will have wars
  alternatives:
  - wars are with you
  - there will be wars against you
  - you will be at war
  lexicon: HALOT
  rationale: The existential construction with עִם is idiomatically future in force
    here because of מֵעַתָּה. 'You will have wars' is clear and preserves the sense
    of ongoing conflict as judgment.
