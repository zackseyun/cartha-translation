theological_decisions:
- issue: Meaning of שָׁלֵם in describing the heart toward the LORD
  chosen_reading: undivided or whole-hearted devotion, not sinless perfection
  alternative_readings:
  - blameless toward him
  - perfect toward him
  rationale: The context concerns covenant loyalty and reliance on the LORD rather
    than moral flawlessness. Rendering with 'wholly toward him' preserves the theological
    emphasis on complete allegiance without importing perfectionism.
  doctrine_reference: Translation philosophy §3, §6
- issue: Scope of הָאָרֶץ
  chosen_reading: all the earth
  alternative_readings:
  - all the land
  rationale: The statement is proverbial and universal in tone, emphasizing the LORD's
    searching oversight everywhere, not merely within Judah's territory.
