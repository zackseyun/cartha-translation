id: 2CH.28.16
reference: 2 Chronicles 28:16
source:
  edition: WLC
  text: בָּ/עֵ֣ת הַ/הִ֗יא שָׁלַ֞ח הַ/מֶּ֧לֶךְ אָחָ֛ז עַל מַלְכֵ֥י אַשּׁ֖וּר לַ/עְזֹ֥ר
    לֽ/וֹ־׃
translation:
  text: At that time King Ahaz sent to the kings of Assyria to help him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the kings of Assyria''; some translations render ''the king of
      Assyria'' to harmonize with the historical situation.'
    reason: alternative_reading
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  chosen: At that time
  alternatives:
  - At that moment
  - In that time
  lexicon: HALOT
  rationale: A standard temporal expression. 'At that time' is idiomatic modern English
    and preserves the narrative setting without unnecessary stiffness.
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - sent messengers
  - appealed
  lexicon: HALOT
  rationale: The verb simply states that Ahaz 'sent.' While the object is implicit
    and the sense may involve sending envoys or an appeal, the Hebrew does not explicitly
    mention messengers, so 'sent' best preserves the wording.
- source_word: הַמֶּלֶךְ אָחָז
  chosen: King Ahaz
  alternatives:
  - the king, Ahaz
  lexicon: HALOT
  rationale: English naturally renders the appositional construction as 'King Ahaz.'
    This preserves both the title and the personal name.
- source_word: עַל
  chosen: to
  alternatives:
  - against
  - concerning
  - unto
  lexicon: HALOT
  rationale: With שׁלח in this construction, עַל can mark direction toward a person
    or authority appealed to. Here the sense is that Ahaz sent to the Assyrian rulers,
    not against them. 'To' gives the intended meaning in clear English.
- source_word: מַלְכֵי אַשּׁוּר
  chosen: the kings of Assyria
  alternatives:
  - the king of Assyria
  lexicon: HALOT
  rationale: The Masoretic Text is plural, 'kings of Assyria.' Although some English
    translations smooth this to the singular for historical reasons, the Hebrew form
    is plural and should be retained in the main text for transparency to the source.
- source_word: לַעְזֹר לוֹ
  chosen: to help him
  alternatives:
  - for his help
  - to come to his aid
  lexicon: HALOT
  rationale: 'The infinitive plus pronominal suffix expresses purpose: Ahaz sent in
    order that they might help him. ''To help him'' is direct and natural.'
