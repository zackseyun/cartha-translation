theological_decisions:
- issue: Whether to harmonize the plural 'kings of Assyria' with the more historically
    expected singular Assyrian monarch
  chosen_reading: Retain the Masoretic plural in the main text
  alternative_readings:
  - the king of Assyria
  rationale: This is not a doctrinally charged issue, but it is a significant translation
    decision. The Hebrew text reads plural, and the translation philosophy prioritizes
    original-language primacy over smoothing to traditional or historically inferred
    singular wording. The singular is worth preserving in a footnote because readers
    may encounter it in other translations and because it may reflect interpretive
    harmonization.
  doctrine_reference: Translation philosophy §1, §5
