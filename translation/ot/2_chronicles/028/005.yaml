id: 2CH.28.5
reference: 2 Chronicles 28:5
source:
  edition: WLC
  text: וַֽ/יִּתְּנֵ֜/הוּ יְהוָ֣ה אֱלֹהָי/ו֮ בְּ/יַ֣ד מֶ֣לֶךְ אֲרָם֒ וַ/יַּ֨כּוּ ב֔/וֹ
    וַ/יִּשְׁבּ֤וּ מִמֶּ֨/נּוּ֙ שִׁבְיָ֣ה גְדוֹלָ֔ה וַ/יָּבִ֖יאוּ דַּרְמָ֑שֶׂק וְ֠/גַם
    בְּ/יַד מֶ֤לֶךְ יִשְׂרָאֵל֙ נִתָּ֔ן וַ/יַּךְ בּ֖/וֹ מַכָּ֥ה גְדוֹלָֽה־־־׃ס
translation:
  text: Therefore the LORD his God gave him into the hand of the king of Aram, and
    they struck him and took from him a great number of captives and brought them
    to Damascus. He was also given into the hand of the king of Israel, who struck
    him with a great blow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king of Syria'; Hebrew 'Aram.'
    reason: lexical_alternative
  - marker: b
    text: Or 'took many captives from him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'inflicted a great defeat on him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנֵהוּ
  chosen: gave him into
  alternatives:
  - delivered him into
  - handed him over to
  lexicon: HALOT
  rationale: נתן with בְּיַד is a standard idiom for giving someone over into another's
    power. 'Gave him into' is natural English and preserves the causative sense without
    overinterpreting.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֱלֹהָיו
  chosen: his God
  lexicon: HALOT
  rationale: Straightforward possessive construction; retained to preserve the covenantal
    relationship implied in the Hebrew even in a judgment context.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  lexicon: HALOT
  rationale: This idiom denotes being delivered into another's control. 'Into the
    hand of' preserves the Hebrew image and remains readable.
- source_word: מֶלֶךְ אֲרָם
  chosen: the king of Aram
  alternatives:
  - the king of Syria
  lexicon: HALOT
  rationale: Aram is the Hebrew proper name and should be transliterated rather than
    replaced with the later geopolitical label 'Syria.'
- source_word: וַיַּכּוּ בוֹ
  chosen: they struck him
  alternatives:
  - they defeated him
  - they attacked him
  lexicon: HALOT
  rationale: נכה is broad, but 'struck' preserves the verbal link with the later clause
    and avoids importing a more specific military nuance than the text states.
- source_word: וַיִּשְׁבּוּ מִמֶּנּוּ שִׁבְיָה גְדוֹלָה
  chosen: took from him a great number of captives
  alternatives:
  - carried off from him a great captivity
  - took many captives from him
  lexicon: HALOT
  rationale: שביה can denote captives/captivity. In English, 'a great number of captives'
    best conveys the concrete result of the action while remaining faithful to the
    noun.
- source_word: וַיָּבִיאוּ דַּרְמָשֶׂק
  chosen: and brought them to Damascus
  alternatives:
  - and brought [the captives] to Damascus
  lexicon: HALOT
  rationale: The object is implicit from context, namely the captives. Supplying 'them'
    is required for natural English and reflects the antecedent in the previous clause.
- source_word: וְגַם
  chosen: He was also
  alternatives:
  - and also
  - moreover he was
  lexicon: HALOT
  rationale: This marks an additional judgment. Restructuring the clause improves
    English flow while preserving the additive force.
- source_word: נִתָּן
  chosen: was given
  alternatives:
  - was delivered
  lexicon: HALOT
  rationale: Passive of נתן echoes the earlier active clause and preserves the theological
    point that these defeats occurred under divine judgment.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  lexicon: HALOT
  rationale: Standard rendering of the title and national name.
- source_word: וַיַּךְ בּוֹ מַכָּה גְדוֹלָה
  chosen: who struck him with a great blow
  alternatives:
  - and inflicted a great defeat on him
  - and struck him a great blow
  lexicon: HALOT
  rationale: מכה גדולה is literally 'a great blow/strike.' 'With a great blow' preserves
    the metaphor and avoids flattening it into a purely interpretive military summary,
    though the context is martial.
