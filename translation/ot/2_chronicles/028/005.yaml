theological_decisions:
- issue: Agency in Judah's defeat
  chosen_reading: The verse explicitly presents the LORD as the one who gave Ahaz/Judah
    into the power of foreign kings.
  alternative_readings:
  - A purely political or military explanation foregrounded in translation
  rationale: The Hebrew twice uses נתן ('gave' / 'was given') to frame the military
    losses as divine judgment. The translation preserves that theological causality
    without adding commentary beyond the text.
  doctrine_reference: 'Translation philosophy #1 and #3'
- issue: Rendering the divine name
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    יְהוָה, while preserving alternatives only if needed. No footnote is necessary
    here because the default is unambiguous.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
