id: 2CH.28.20
reference: 2 Chronicles 28:20
source:
  edition: WLC
  text: וַ/יָּבֹ֣א עָלָ֔י/ו תִּלְּגַ֥ת פִּלְנְאֶ֖סֶר מֶ֣לֶךְ אַשּׁ֑וּר וַ/יָּ֥צַר
    ל֖/וֹ וְ/לֹ֥א חֲזָקֽ/וֹ׃
translation:
  text: Then Tiglath-pileser king of Assyria came against him and afflicted him instead
    of strengthening him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'distressed him ... and did not strengthen him.' The Hebrew may be rendered
      more formally without making the contrastive force explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא עָלָיו
  chosen: came against him
  alternatives:
  - came to him
  - came upon him
  lexicon: HALOT
  rationale: The idiom בוא על commonly carries an adversative sense in military/political
    contexts, so 'came against him' best reflects the hostile action implied here
    rather than a neutral 'came to him.'
- source_word: תִּלְּגַת פִּלְנְאֶסֶר
  chosen: Tiglath-pileser
  alternatives:
  - Tilgath-pilneser
  rationale: Standard English transliteration of the Assyrian royal name improves
    readability while preserving the personal name as a transliteration rather than
    a translation.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: king of Assyria
  rationale: Straightforward construct rendering; 'Assyria' is the standard English
    form for אַשּׁוּר in geopolitical contexts.
- source_word: וַיָּצַר לוֹ
  chosen: afflicted him
  alternatives:
  - distressed him
  - besieged him
  - treated him as an enemy
  lexicon: HALOT
  rationale: The verb צרר can denote pressing, harassing, or causing distress. Since
    the object is Ahaz personally and the context contrasts this with expected help
    from Assyria, 'afflicted him' captures the broader hostile pressure better than
    the narrower military term 'besieged him,' though that remains possible.
- source_word: וְלֹא חֲזָקוֹ
  chosen: instead of strengthening him
  alternatives:
  - and did not strengthen him
  - but did not help him
  - and did not support him
  lexicon: HALOT
  rationale: חזק in the piel/qal semantic field can mean strengthen, support, make
    strong. The clause is adversative in sense, contrasting Assyria's harmful action
    with the aid Ahaz sought, so 'instead of strengthening him' makes the contrast
    explicit in natural English while staying close to the Hebrew sense.
