theological_decisions:
- issue: Kinship language in an intra-Israelite conflict
  chosen_reading: from their brothers
  alternative_readings:
  - from their kinsmen
  - from their fellow Israelites
  rationale: The verse emphasizes that the captives were not foreign enemies but fellow
    covenant kin. Retaining 'brothers' preserves the ethical and theological force
    without adding interpretation beyond the text.
  doctrine_reference: Translation philosophy §4, gender-accurate over gender-neutral;
    §3, preserve tension rather than resolve it
