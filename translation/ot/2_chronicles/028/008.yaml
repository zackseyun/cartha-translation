id: 2CH.28.8
reference: 2 Chronicles 28:8
source:
  edition: WLC
  text: וַ/יִּשְׁבּוּ֩ בְנֵֽי יִשְׂרָאֵ֨ל מֵֽ/אֲחֵי/הֶ֜ם מָאתַ֣יִם אֶ֗לֶף נָשִׁים֙
    בָּנִ֣ים וּ/בָנ֔וֹת וְ/גַם שָׁלָ֥ל רָ֖ב בָּזְז֣וּ מֵ/הֶ֑ם וַ/יָּבִ֥יאוּ אֶת הַ/שָּׁלָ֖ל
    לְ/שֹׁמְרֽוֹן־־־׃ס
translation:
  text: And the sons of Israel took captive from their brothers two hundred thousand
    women, sons, and daughters. They also plundered much spoil from them and brought
    the spoil to Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from their kinsmen' or 'from their fellow Israelites.' The Hebrew says
      'from their brothers,' emphasizing shared kinship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁבּוּ
  chosen: took captive
  alternatives:
  - captured
  - carried off as captives
  lexicon: HALOT
  rationale: The verb from שבה denotes taking persons as captives in war, not merely
    seizing or kidnapping. 'Took captive' is natural English and preserves the military
    sense.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A more formal rendering is retained here because the phrase stands in
    contrast with 'their brothers' and highlights kinship within Israel/Judah. 'Sons
    of Israel' is understandable modern English and preserves the source expression.
- source_word: מֵאֲחֵיהֶם
  chosen: from their brothers
  alternatives:
  - from their kinsmen
  - from their fellow Israelites
  lexicon: HALOT
  rationale: אָח often extends to kin or fellow countrymen, but 'brothers' best preserves
    the familial and covenantal force of the accusation in context. The literal rendering
    also keeps the moral weight of Israelites enslaving fellow Israelites.
- source_word: מָאתַיִם אֶלֶף
  chosen: two hundred thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number rendering.
- source_word: נָשִׁים בָּנִים וּבָנוֹת
  chosen: women, sons, and daughters
  alternatives:
  - women, boys, and girls
  - women, children, sons, and daughters
  lexicon: HALOT
  rationale: The Hebrew explicitly lists three groups. 'Sons and daughters' is more
    formally accurate than collapsing to 'children,' though the referents are likely
    children. This preserves the source's gendered enumeration.
- source_word: וְגַם
  chosen: They also
  alternatives:
  - and also
  - and furthermore
  lexicon: HALOT
  rationale: This connective advances the narrative with an additive sense. 'They
    also' reads naturally in English while preserving the addition.
- source_word: שָׁלָל רָב
  chosen: much spoil
  alternatives:
  - great plunder
  - a large amount of spoil
  lexicon: HALOT
  rationale: שָׁלָל is war booty/spoil. 'Much spoil' is concise and close to the Hebrew
    collocation; 'plunder' is possible but using 'spoil' here helps preserve the repeated
    noun later in the verse.
- source_word: בָּזְזוּ
  chosen: plundered
  alternatives:
  - took as plunder
  - despoiled
  lexicon: HALOT
  rationale: The verb denotes taking goods by plunder. 'Plundered' is idiomatic and
    matches the military context.
- source_word: וַיָּבִיאוּ אֶת־הַשָּׁלָל לְשֹׁמְרוֹן
  chosen: brought the spoil to Samaria
  alternatives:
  - brought the plunder to Samaria
  lexicon: HALOT
  rationale: A direct rendering of the clause. 'Samaria' is the standard English form
    of the place name שֹׁמְרוֹן.
