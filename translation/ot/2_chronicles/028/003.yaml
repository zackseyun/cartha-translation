theological_decisions:
- issue: Whether the verse should be softened to a less explicit description of child sacrifice
  chosen_reading: The main text states 'he burned his sons in the fire.'
  alternative_readings:
  - he made his sons pass through the fire
  rationale: The Hebrew here uses בער rather than the more idiomatic העביר באש formula. To preserve the text's severity and avoid importing wording from parallel sacrificial formulas elsewhere, the translation keeps the stronger expression while preserving the common alternative in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 4
