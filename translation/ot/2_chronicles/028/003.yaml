id: 2CH.28.3
reference: 2 Chronicles 28:3
source:
  edition: WLC
  text: וְ/ה֥וּא הִקְטִ֖יר בְּ/גֵ֣יא בֶן הִנֹּ֑ם וַ/יַּבְעֵ֤ר אֶת בָּנָי/ו֙ בָּ/אֵ֔שׁ כְּ/תֹֽעֲבוֹת֙ הַ/גּוֹיִ֔ם אֲשֶׁר֙ הֹרִ֣ישׁ יְהוָ֔ה מִ/פְּנֵ֖י בְּנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: He also burned incense in the Valley of Ben-hinnom, and he burned his sons in the fire, according to the abominations of the nations whom Yahweh had driven out before the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he made his sons pass through the fire.' The Hebrew here more directly says 'he burned his sons in the fire.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִקְטִיר
  chosen: burned incense
  alternatives:
  - made offerings smoke
  - offered sacrifices by burning
  lexicon: HALOT
  rationale: The Hiphil of קטר commonly refers to making sacrificial smoke, often specifically burning incense or offerings. Here 'burned incense' is concise, idiomatic, and fits the cultic context without over-specifying beyond the verb itself.
- source_word: בְּגֵיא בֶן־הִנֹּם
  chosen: in the Valley of Ben-hinnom
  alternatives:
  - in the valley of the son of Hinnom
  - in Gehenna
  lexicon: HALOT
  rationale: The phrase is a place name. 'Ben-hinnom' preserves the Hebrew name by transliteration, in keeping with the policy to transliterate names. 'Gehenna' would import later associations not explicit in this historical context.
- source_word: וַיַּבְעֵר אֶת־בָּנָיו בָּאֵשׁ
  chosen: he burned his sons in the fire
  alternatives:
  - he made his sons pass through the fire
  - he burned his children in the fire
  lexicon: HALOT
  rationale: בער in the Hiphil with 'in the fire' most naturally denotes actual burning. Unlike formulas elsewhere that explicitly say 'made pass through the fire,' this text uses a stronger verb. 'Sons' is retained because בָּנָיו is masculine plural and the translation philosophy prefers gender-accurate rendering over neutralizing to 'children.'
- source_word: כְּתוֹעֲבוֹת
  chosen: according to the abominations of
  alternatives:
  - like the abominations of
  - following the detestable practices of
  lexicon: HALOT
  rationale: The comparative כ plus תועבות is well represented by 'according to the abominations of.' This preserves the moral force of the noun while remaining readable. 'Detestable practices' is possible but slightly more interpretive.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: In this historical context גוים refers to the surrounding nations dispossessed from the land. 'Nations' is the most natural and least theologically loaded rendering.
- source_word: הֹרִישׁ
  chosen: had driven out
  alternatives:
  - had dispossessed
  - had cast out
  lexicon: HALOT
  rationale: The Hiphil of ירש here refers to causing prior inhabitants to lose possession of the land. 'Driven out' is idiomatic and clear in English, while still reflecting the expulsion sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִפְּנֵי בְּנֵי יִשְׂרָאֵל
  chosen: before the sons of Israel
  alternatives:
  - from before the Israelites
  - before the people of Israel
  lexicon: HALOT
  rationale: The idiom מִפְּנֵי means 'from before/before' in the sense of removal from someone's presence. 'Before the sons of Israel' stays close to the Hebrew. 'Sons of Israel' is retained for gender accuracy and consistency with the source expression.
