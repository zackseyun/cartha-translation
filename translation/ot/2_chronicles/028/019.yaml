theological_decisions:
- issue: Ahaz designated 'king of Israel'
  chosen_reading: Retain the MT wording 'Ahaz king of Israel' in the main text.
  alternative_readings:
  - Render interpretively as 'Ahaz king of Judah'
  - Treat as a scribal assimilation or rhetorical label and footnote only
  rationale: The source text plainly says 'king of Israel.' Although historically Ahaz ruled Judah, Chronicles can use 'Israel' in rhetorically charged ways. The translation should not harmonize away the Hebrew wording. A footnote preserves the historical clarification.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation tradition; §3 Preserve theological tension rather than resolve it
