id: 2CH.28.19
reference: 2 Chronicles 28:19
source:
  edition: WLC
  text: כִּֽי הִכְנִ֤יעַ יְהוָה֙ אֶת יְהוּדָ֔ה בַּ/עֲב֖וּר אָחָ֣ז מֶֽלֶךְ יִשְׂרָאֵ֑ל כִּ֤י הִפְרִ֨יעַ֙ בִּֽ/יהוּדָ֔ה וּ/מָע֥וֹל מַ֖עַל בַּ/יהוָֽה־־־׃
translation:
  text: For Yahweh humbled Judah because of Ahaz king of Israel, for he had cast off restraint in Judah and had acted very unfaithfully against Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Ahaz king of Israel.'' Ahaz was king of Judah; the Chronicler''s wording is retained rather than harmonized.'
    reason: alternative_reading
  - marker: b
    text: Or 'had acted recklessly in Judah' or 'had cast off restraint in Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכְנִיעַ
  chosen: humbled
  alternatives:
  - brought low
  - subdued
  - afflicted
  lexicon: HALOT
  rationale: The Hiphil of כנע here describes the LORD's action of bringing Judah low in status and condition. 'Humbled' preserves both the causative sense and the covenantal/theological nuance better than the more military 'subdued.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּעֲבוּר
  chosen: because of
  alternatives:
  - on account of
  - for the sake of
  lexicon: HALOT
  rationale: In this context the preposition marks cause rather than benefit. 'Because of' is the clearest modern English rendering.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  alternatives:
  - king of Judah
  lexicon: HALOT
  rationale: The Hebrew text explicitly reads 'king of Israel' for Ahaz. In Chronicles this can reflect the Chronicler's theological portrayal of Judah under apostasy. The wording should be preserved rather than harmonized.
- source_word: הִפְרִיעַ
  chosen: had let loose restraint
  alternatives:
  - had acted recklessly
  - had caused disorder
  - had cast off restraint
  lexicon: HALOT
  rationale: The verb פרע in Hiphil can denote letting loose, making disorderly, or casting off restraint. 'Had let loose restraint' captures the causative sense and the moral-social disorder implied, without over-paraphrasing to a purely interpretive gloss.
- source_word: בִּיהוּדָה
  chosen: in Judah
  alternatives:
  - among Judah
  lexicon: HALOT
  rationale: The preposition ב marks the sphere in which Ahaz's action occurred; 'in Judah' is the most natural rendering.
- source_word: וּמָעוֹל מַעַל
  chosen: and had acted very unfaithfully
  alternatives:
  - and had trespassed grievously
  - and had committed a serious unfaithfulness
  - and had been utterly faithless
  lexicon: HALOT
  rationale: The infinitive absolute plus finite/root-related form intensifies the idea of מעל, covenantal unfaithfulness or treachery. 'Acted very unfaithfully' preserves the verbal force and the intensification in readable English.
- source_word: בַּיהוָה
  chosen: against the LORD
  alternatives:
  - toward the LORD
  - with respect to the LORD
  lexicon: HALOT
  rationale: With מעל, English idiom normally takes 'against' to express covenant breach directed toward God.
