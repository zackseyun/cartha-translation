id: 2CH.28.11
reference: 2 Chronicles 28:11
source:
  edition: WLC
  text: וְ/עַתָּ֣ה שְׁמָע֔וּ/נִי וְ/הָשִׁ֨יבוּ֙ הַ/שִּׁבְיָ֔ה אֲשֶׁ֥ר שְׁבִיתֶ֖ם מֵ/אֲחֵי/כֶ֑ם כִּ֛י חֲר֥וֹן אַף יְהוָ֖ה עֲלֵי/כֶֽם־׃ס
translation:
  text: Now listen to me, and return the captives whom you have taken from your brothers, for the burning anger of Yahweh is upon you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from your fellow Israelites.' The Hebrew says 'from your brothers,' using kinship language for members of the same covenant people.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Introduces an urgent transition in direct speech. 'Now' is natural English; 'And now' is possible but the conjunction need not be carried explicitly in English.
- source_word: שְׁמָעוּנִי
  chosen: listen to me
  alternatives:
  - hear me
  lexicon: HALOT
  rationale: The imperative from שׁמע with 1cs suffix calls for attentive hearing. 'Listen to me' communicates the exhortational force in contemporary English better than the more formal 'hear me.'
- source_word: וְהָשִׁיבוּ
  chosen: return
  alternatives:
  - bring back
  - restore
  lexicon: HALOT
  rationale: Hiphil of שוב here means to cause to return. 'Return' is concise and fits the object 'the captives'; 'bring back' is also possible but slightly more expansive.
- source_word: הַשִּׁבְיָה
  chosen: the captives
  alternatives:
  - the captives taken in war
  - the prisoners
  - the captivity
  lexicon: HALOT
  rationale: Although the noun can denote captivity/captive body collectively, in this context it refers to the people seized. 'The captives' best reflects the concrete referent in idiomatic English.
- source_word: אֲשֶׁר שְׁבִיתֶם
  chosen: whom you have taken
  alternatives:
  - whom you captured
  - that you have taken captive
  lexicon: HALOT
  rationale: The relative clause specifies the captives as those seized by the addressees. 'Whom you have taken' is smooth English and avoids redundancy with 'captives,' while still conveying the action of capture.
- source_word: מֵאֲחֵיכֶם
  chosen: from your brothers
  alternatives:
  - from your kindred
  - from your fellow Israelites
  lexicon: HALOT
  rationale: אָח commonly means 'brother(s)' and in covenantal/national contexts can denote fellow members of the people. Per gender-accurate philosophy, 'brothers' preserves the source term; the broader sense can be clarified in a footnote.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'For' preserves the formal explanatory connection in a natural way.
- source_word: חֲרוֹן אַף
  chosen: the burning anger
  alternatives:
  - the fierce anger
  - the heat of anger
  - wrath
  lexicon: HALOT
  rationale: This Hebrew idiom literally evokes the heat/burning of anger. 'The burning anger' preserves the metaphor and intensity better than the more generalized 'wrath.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֲלֵיכֶם
  chosen: is upon you
  alternatives:
  - is against you
  - rests on you
  lexicon: HALOT
  rationale: The preposition על with anger indicates it is directed toward them. 'Is upon you' is a close and idiomatic rendering that preserves the imagery; 'is against you' is interpretive and slightly stronger.
