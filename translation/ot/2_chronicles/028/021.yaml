id: 2CH.28.21
reference: 2 Chronicles 28:21
source:
  edition: WLC
  text: כִּֽי חָלַ֤ק אָחָז֙ אֶת בֵּ֣ית יְהוָ֔ה וְ/אֶת בֵּ֥ית הַ/מֶּ֖לֶךְ וְ/הַ/שָּׂרִ֑ים וַ/יִּתֵּן֙ לְ/מֶ֣לֶךְ אַשּׁ֔וּר וְ/לֹ֥א לְ/עֶזְרָ֖ה לֽ/וֹ־־־׃
translation:
  text: For Ahaz stripped the house of the LORD, the house of the king, and the princes, and gave it to the king of Assyria, but it did not help him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'divided' / 'apportioned'; here the sense is that Ahaz stripped valuables from these places and persons.
    reason: lexical_alternative
  - marker: b
    text: Or 'the officials.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the house of the LORD, and the house of the king and the princes'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces an explanation for the preceding statement; 'For' fits the narrative flow in English while preserving the causal/explanatory force.
- source_word: חָלַק
  chosen: stripped
  alternatives:
  - divided
  - apportioned
  - plundered
  lexicon: HALOT
  rationale: In this context of taking valuables from the temple, palace, and officials in order to pay Assyria, the sense is not neutral 'divide' but despoil/strip. 'Stripped' captures the concrete act without over-paraphrasing.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: A standard literal rendering of the Hebrew expression. 'Temple' is possible, but 'house of the LORD' preserves the source wording and its formal resonance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the house of the king
  alternatives:
  - the king's house
  - the royal palace
  lexicon: HALOT
  rationale: Keeps the parallel structure with 'the house of the LORD.' 'Royal palace' is interpretive; 'the house of the king' is more transparent to the Hebrew.
- source_word: הַשָּׂרִים
  chosen: the princes
  alternatives:
  - the officials
  - the rulers
  lexicon: HALOT
  rationale: Refers to leading officials/nobles. 'Princes' is a conventional rendering in historical narrative and fits the courtly setting, though 'officials' is a viable modern alternative.
- source_word: וַיִּתֵּן
  chosen: and gave
  alternatives:
  - and he gave
  lexicon: HALOT
  rationale: Straightforward narrative wayyiqtol; simple past is appropriate in English.
- source_word: לְמֶלֶךְ אַשּׁוּר
  chosen: to the king of Assyria
  alternatives:
  - to Assyria's king
  lexicon: HALOT
  rationale: Standard rendering of the indirect object and gentilic proper name.
- source_word: וְלֹא לְעֶזְרָה לוֹ
  chosen: but it did not help him
  alternatives:
  - but it was of no help to him
  - but not for his help
  lexicon: HALOT
  rationale: 'The phrase states the result: the payment did not bring Ahaz assistance. Singular ''it'' treats the gift/tribute collectively, which is idiomatic in English and reflects the sense of the clause.'
