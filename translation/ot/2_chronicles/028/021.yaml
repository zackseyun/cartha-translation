  from: the house of the LORD, and the house of the king and the princes
  to: the house of the LORD, the house of the king, and the princes
  rationale: 'The Hebrew lists three distinct objects of the verb: the LORD''s house, the king''s house, and the princes. The current English rendering, with its ''A, and B and C'' structure, is slightly awkward and less clear than a standard English list. Using a conventional serial list (''A, B, and C'') would more clearly delineate the three separate sources from which Ahaz took wealth, removing any potential ambiguity that ''the house of'' might apply to ''the princes''.'
