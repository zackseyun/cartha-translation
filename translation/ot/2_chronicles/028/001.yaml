id: 2CH.28.1
reference: 2 Chronicles 28:1
source:
  edition: WLC
  text: בֶּן עֶשְׂרִ֤ים שָׁנָה֙ אָחָ֣ז בְּ/מָלְכ֔/וֹ וְ/שֵׁשׁ עֶשְׂרֵ֣ה שָׁנָ֔ה מָלַ֖ךְ
    בִּ/ירוּשָׁלִָ֑ם וְ/לֹא עָשָׂ֧ה הַ/יָּשָׁ֛ר בְּ/עֵינֵ֥י יְהוָ֖ה כְּ/דָוִ֥יד אָבִֽי/ו־־־׃
translation:
  text: Ahaz was twenty years old when he became king, and he reigned sixteen years
    in Jerusalem. He did not do what was right in the eyes of the LORD, as David his
    father had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'David his father'; 'father' here means royal ancestor, not immediate
      parent.
    reason: cultural_note
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים שָׁנָה
  chosen: was twenty years old
  alternatives:
  - was a son of twenty years
  lexicon: HALOT
  rationale: This is the standard Hebrew age formula. A literal rendering ('son of
    twenty years') would be unnatural in modern English; 'was twenty years old' preserves
    the sense accurately.
- source_word: בְּמָלְכוֹ
  chosen: when he became king
  alternatives:
  - at his becoming king
  - when he began to reign
  lexicon: HALOT
  rationale: The preposition plus infinitive/verb form marks the time of accession.
    'When he became king' is idiomatic modern English and fits the regnal formula.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb specifically denotes exercising kingship/reigning, not merely
    holding the title. 'He reigned' is the standard and precise rendering in regnal
    notices.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative phrase indicating the seat of his reign.
- source_word: לֹא עָשָׂה הַיָּשָׁר
  chosen: did not do what was right
  alternatives:
  - did not do the right
  - did not do what was upright
  lexicon: HALOT
  rationale: This is a common evaluative formula in Kings/Chronicles. 'Did not do
    what was right' is natural English and preserves the moral assessment.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: The idiom literally means 'in the eyes of,' expressing divine evaluation.
    Because the Hebrew uses יְהוָה, the project's default rendering is 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per project doctrine, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: כְּדָוִיד אָבִיו
  chosen: as David his father had done
  alternatives:
  - like David his father
  - as David his ancestor
  lexicon: HALOT
  rationale: '''Father'' in royal/genealogical contexts can denote an ancestor, here
    the dynastic forefather David rather than immediate parentage. The wording ''as
    David his father had done'' preserves the Hebrew idiom while making the comparison
    explicit by supplying ''had done'' from the prior clause in natural English.'
