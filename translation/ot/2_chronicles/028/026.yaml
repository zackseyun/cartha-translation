id: 2CH.28.26
reference: 2 Chronicles 28:26
source:
  edition: WLC
  text: וְ/יֶ֤תֶר דְּבָרָי/ו֙ וְ/כָל דְּרָכָ֔י/ו הָ/רִאשֹׁנִ֖ים וְ/הָ/אַחֲרוֹנִ֑ים
    הִנָּ֣/ם כְּתוּבִ֔ים עַל סֵ֥פֶר מַלְכֵֽי יְהוּדָ֖ה וְ/יִשְׂרָאֵֽל־־־׃
translation:
  text: Now the rest of his acts and all his ways, the first and the last, behold,
    they are written in the Book of the Kings of Judah and Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר introduces the remaining material about the king. 'The rest of'
    is the standard idiomatic rendering in regnal summaries; 'Now' smoothly represents
    the prefixed conjunction in English narrative style.
- source_word: דְּבָרָיו
  chosen: his acts
  alternatives:
  - his words
  - his matters
  - his deeds
  lexicon: HALOT
  rationale: Though דָּבָר often means 'word' or 'matter,' in royal summary formulas
    it commonly refers broadly to the king's affairs or deeds. 'Acts' fits the historiographic
    context better than the more literal but misleading 'words.'
- source_word: וְכָל דְּרָכָיו
  chosen: and all his ways
  alternatives:
  - and all his conduct
  - and all his deeds
  lexicon: HALOT
  rationale: דֶּרֶךְ literally means 'way,' and in this context refers to the course
    of Ahaz's conduct. 'Ways' preserves the Hebrew metaphor and remains natural English.
- source_word: הָרִאשֹׁנִים וְהָאַחֲרוֹנִים
  chosen: the first and the last
  alternatives:
  - the earlier and the later
  - from first to last
  lexicon: HALOT
  rationale: This pair is a conventional chronological merism. 'The first and the
    last' is a close rendering that preserves the Hebrew form; 'from first to last'
    is smoother but less formally transparent.
- source_word: הִנָּם
  chosen: behold, they are
  alternatives:
  - indeed they are
  - they are
  lexicon: HALOT
  rationale: הִנֵּה with pronominal suffix adds deictic emphasis. 'Behold' preserves
    that emphasis, though somewhat formal; it suits the chronicler's citation formula.
- source_word: כְּתוּבִים
  chosen: written
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: The passive participle means 'written.' 'Recorded' is interpretive and
    possible, but 'written' stays closer to the source while still reading naturally
    with the citation formula.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - upon the book
  lexicon: HALOT
  rationale: Although עַל is literally 'on/upon,' in bibliographic formulas English
    idiom prefers 'in.' סֵפֶר can denote a scroll or book; 'Book' is conventional
    and clear in this formulaic context.
- source_word: מַלְכֵי יְהוּדָה וְיִשְׂרָאֵל
  chosen: of the Kings of Judah and Israel
  alternatives:
  - of the kings of Judah and Israel
  lexicon: HALOT
  rationale: This is the title of a source document cited by Chronicles. Capitalizing
    'Book' and 'Kings' treats it as a formal title in English, while preserving the
    genitival structure of the Hebrew.
