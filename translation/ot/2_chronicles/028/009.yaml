id: 2CH.28.9
reference: 2 Chronicles 28:9
source:
  edition: WLC
  text: וְ֠/שָׁם הָיָ֨ה נָבִ֥יא לַֽ/יהוָה֮ עֹדֵ֣ד שְׁמ/וֹ֒ וַ/יֵּצֵ֗א לִ/פְנֵ֤י הַ/צָּבָא֙ הַ/בָּ֣א לְ/שֹׁמְר֔וֹן וַ/יֹּ֣אמֶר לָ/הֶ֗ם הִ֠נֵּה בַּ/חֲמַ֨ת יְהוָ֧ה אֱלֹהֵֽי אֲבוֹתֵי/כֶ֛ם עַל יְהוּדָ֖ה נְתָנָ֣/ם בְּ/יֶדְ/כֶ֑ם וַ/תַּֽהַרְגוּ בָ֣/ם בְ/זַ֔עַף עַ֥ד לַ/שָּׁמַ֖יִם הִגִּֽיעַ־־־׃
translation:
  text: Now there was a prophet of Yahweh there, whose name was Oded; and he went out before the army that came to Samaria and said to them, “Behold, because Yahweh, the God of your fathers, was angry with Judah, he gave them into your hand, and you killed them in a rage that has reached to heaven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the wrath of the LORD ... he gave them into your hand.' The Hebrew phrase can be rendered more formally, but the main text expresses the causal sense in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁם
  chosen: Now there was ... there
  alternatives:
  - And there was ... there
  - There was ... there
  lexicon: HALOT
  rationale: The conjunction plus adverb introduces a new scene. 'Now' gives natural English discourse flow while retaining the narrative transition; 'there' is preserved because the Hebrew explicitly locates the prophet in Samaria.
- source_word: נָבִיא לַיהוָה
  chosen: a prophet of the LORD
  alternatives:
  - a prophet belonging to the LORD
  - a prophet for the LORD
  lexicon: HALOT
  rationale: The lamed marks relation/possession here. 'Of the LORD' is idiomatic English and preserves the covenantal association. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: עֹדֵד שְׁמוֹ
  chosen: whose name was Oded
  alternatives:
  - Oded was his name
  lexicon: HALOT
  rationale: This is a standard Hebrew naming formula. The chosen rendering is natural modern English while preserving the identification.
- source_word: וַיֵּצֵא לִפְנֵי הַצָּבָא
  chosen: he went out before the army
  alternatives:
  - he went out to meet the army
  - he went out in front of the army
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in front of.' In context Oded confronts the returning force, so 'before the army' preserves the spatial sense without over-paraphrasing.
- source_word: הַבָּא לְשֹׁמְרוֹן
  chosen: that came to Samaria
  alternatives:
  - coming to Samaria
  - which was coming to Samaria
  lexicon: HALOT
  rationale: The participle modifies 'army.' Since the army is arriving back at Samaria, the relative clause 'that came to Samaria' is clear and idiomatic.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is an attention-getter. 'Look' is readable modern English and preserves the force without archaic tone.
- source_word: בַּחֲמַת יְהוָה
  chosen: because the LORD ... was angry
  alternatives:
  - in the wrath of the LORD
  - by the fury of the LORD
  lexicon: HALOT
  rationale: 'The beth with חֵמָה/חֲמָה here expresses circumstance or cause: Judah was handed over because of the LORD''s wrath. Rendering it verbally as ''because ... was angry'' communicates the sense clearly in English.'
- source_word: אֱלֹהֵי אֲבוֹתֵיכֶם
  chosen: the God of your fathers
  alternatives:
  - your fathers' God
  lexicon: HALOT
  rationale: This covenantal phrase is preserved in a familiar English form, maintaining the appeal to shared ancestral relationship with God.
- source_word: נְתָנָם בְּיֶדְכֶם
  chosen: he gave them into your hand
  alternatives:
  - he delivered them into your hand
  - he gave them into your power
  lexicon: HALOT
  rationale: The idiom 'give into the hand' commonly denotes handing over to another's power. Singular 'hand' follows the Hebrew idiom and remains natural in English.
- source_word: וַתַּהַרְגוּ בָם
  chosen: you have killed them
  alternatives:
  - you killed them
  - you struck them down
  lexicon: HALOT
  rationale: הרג is the straightforward verb 'kill/slay.' The perfective force in direct speech can be represented naturally in English with 'have killed,' highlighting the completed action now being condemned.
- source_word: בְזַעַף
  chosen: in a rage
  alternatives:
  - with fury
  - in wrath
  lexicon: HALOT
  rationale: זַעַף denotes indignation/fury. 'In a rage' is vivid, accessible English and fits the rebuke.
- source_word: עַד לַשָּׁמַיִם הִגִּיעַ
  chosen: that has reached up to heaven
  alternatives:
  - that reached to heaven
  - reaching to the heavens
  lexicon: HALOT
  rationale: The singular verb most naturally refers to the rage/fury just mentioned, personified as reaching heaven. 'Up to heaven' preserves the idiom of extremity and divine notice.
