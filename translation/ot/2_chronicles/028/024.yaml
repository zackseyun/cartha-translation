theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render בֵּית יְהוָה as 'house of the LORD' or 'temple of the LORD'
  chosen_reading: house of the LORD
  alternative_readings:
  - temple of the LORD
  rationale: The Hebrew text uses 'house,' and no contextual necessity requires the
    more interpretive 'temple.' Retaining 'house' better reflects the source while
    remaining clear in English.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
