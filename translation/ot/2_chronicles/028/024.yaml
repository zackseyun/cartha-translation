id: 2CH.28.24
reference: 2 Chronicles 28:24
source:
  edition: WLC
  text: וַ/יֶּאֱסֹ֨ף אָחָ֜ז אֶת כְּלֵ֣י בֵית הָֽ/אֱלֹהִ֗ים וַ/יְקַצֵּץ֙ אֶת כְּלֵ֣י
    בֵית הָֽ/אֱלֹהִ֔ים וַ/יִּסְגֹּ֖ר אֶת דַּלְת֣וֹת בֵּית יְהוָ֑ה וַ/יַּ֨עַשׂ ל֧/וֹ
    מִזְבְּח֛וֹת בְּ/כָל פִּנָּ֖ה בִּ/ירוּשָׁלִָֽם־־־־־־־׃
translation:
  text: Ahaz gathered the vessels of the house of God and cut up the vessels of the
    house of God, and he shut the doors of the house of the LORD and made for himself
    altars in every corner of Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cut the vessels of the house of God in pieces.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱסֹף
  chosen: gathered
  alternatives:
  - collected
  - assembled
  lexicon: HALOT
  rationale: The verb אסף commonly means to gather or collect. 'Gathered' is a natural
    modern rendering that preserves the concrete action without implying motive beyond
    the text.
- source_word: כְּלֵי בֵית הָאֱלֹהִים
  chosen: the vessels of the house of God
  alternatives:
  - the articles of the house of God
  - the furnishings of the house of God
  lexicon: HALOT
  rationale: כְּלִי is broad ('vessel, utensil, article, implement'). 'Vessels' fits
    temple objects well and preserves the cultic sense more concretely than the broader
    'articles.'
- source_word: וַיְקַצֵּץ
  chosen: cut up
  alternatives:
  - cut in pieces
  - dismantled
  lexicon: HALOT
  rationale: The piel of קצץ conveys cutting off or chopping up. 'Cut up' is concise,
    vivid, and faithful; 'dismantled' is too interpretive and less violent than the
    Hebrew suggests.
- source_word: וַיִּסְגֹּר אֶת דַּלְתוֹת
  chosen: shut the doors
  alternatives:
  - closed the doors
  - locked the doors
  lexicon: HALOT
  rationale: סגר means to shut/close. 'Shut' is slightly weightier in tone and avoids
    adding the idea of locking, which the Hebrew does not state.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the house of Yahweh
  - the temple of the LORD
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'House' is retained rather
    than 'temple' to stay closer to the Hebrew wording, while still being intelligible.
- source_word: וַיַּעַשׂ לוֹ
  chosen: made for himself
  alternatives:
  - made
  - made for his own use
  lexicon: HALOT
  rationale: The pronoun לוֹ is significant and indicates personal appropriation.
    'Made for himself' preserves that nuance better than simply 'made.'
- source_word: מִזְבְּחוֹת
  chosen: altars
  lexicon: HALOT
  rationale: Standard rendering for מזבח; no contextual reason to vary.
- source_word: בְּכָל פִּנָּה
  chosen: in every corner
  alternatives:
  - at every corner
  - in every quarter
  lexicon: HALOT
  rationale: פִּנָּה literally means 'corner.' 'In every corner' is idiomatic English
    and preserves the image of widespread illicit worship sites throughout the city.
- source_word: בִּירוּשָׁלִָם
  chosen: of Jerusalem
  alternatives:
  - in Jerusalem
  lexicon: HALOT
  rationale: Attached to 'every corner,' English idiom prefers 'every corner of Jerusalem'
    rather than the more wooden 'in every corner in Jerusalem.'
