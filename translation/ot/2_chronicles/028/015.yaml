theological_decisions:
- issue: Rendering of אֲחֵיהֶם in a kinship context
  chosen_reading: their brothers
  alternative_readings:
  - their kin
  - their fellow Israelites
  rationale: The term is grammatically masculine plural and in context refers to fellow
    members of the southern kingdom/covenant people. Following the project's gender-accurate
    policy, the main text keeps 'brothers' rather than flattening to a neutral term,
    while the broader kinship sense is acknowledged as an alternative.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
