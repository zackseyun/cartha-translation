id: 2CH.28.15
reference: 2 Chronicles 28:15
source:
  edition: WLC
  text: וַ/יָּקֻ֣מוּ הָ/אֲנָשִׁים֩ אֲשֶׁר נִקְּב֨וּ בְ/שֵׁמ֜וֹת וַ/יַּחֲזִ֣יקוּ בַ/שִּׁבְיָ֗ה
    וְ/כָֽל מַעֲרֻמֵּי/הֶם֮ הִלְבִּ֣ישׁוּ מִן הַ/שָּׁלָל֒ וַ/יַּלְבִּשׁ֣וּ/ם וַ֠/יַּנְעִלוּ/ם
    וַ/יַּאֲכִל֨וּ/ם וַ/יַּשְׁק֜וּ/ם וַ/יְסֻכ֗וּ/ם וַ/יְנַהֲל֤וּ/ם בַּ/חֲמֹרִים֙ לְ/כָל
    כּוֹשֵׁ֔ל וַ/יְבִיא֛וּ/ם יְרֵח֥וֹ עִיר הַ/תְּמָרִ֖ים אֵ֣צֶל אֲחֵי/הֶ֑ם וַ/יָּשׁ֖וּבוּ
    שֹׁמְרֽוֹן־־־־־׃פ
translation:
  text: Then the men who had been designated by name stood up and took charge of the
    captives, and from the spoil they clothed all their naked ones. They clothed them,
    put sandals on them, fed them, gave them drink, anointed them, and led all the
    feeble among them on donkeys. They brought them to Jericho, the city of palm trees,
    to their brothers; then they returned to Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their kin' or 'their fellow Israelites' for 'their brothers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִקְּבוּ בְשֵׁמוֹת
  chosen: had been designated by name
  alternatives:
  - were mentioned by name
  - were appointed by name
  - were specified by name
  lexicon: HALOT
  rationale: The Niphal of נקב with 'by names' denotes being specifically identified
    or designated. 'Designated by name' is natural English and preserves the formal
    sense that these men were explicitly named for this task.
- source_word: וַיַּחֲזִיקוּ בַשִּׁבְיָה
  chosen: took charge of the captives
  alternatives:
  - took hold of the captives
  - supported the captives
  - attended to the captives
  lexicon: HALOT
  rationale: החזיק ב can mean seize, support, or take hold of. In this mercy context,
    the sense is not hostile seizure but assuming care/responsibility. 'Took charge
    of' captures active care without over-paraphrasing.
- source_word: מַעֲרֻמֵּיהֶם
  chosen: their naked ones
  alternatives:
  - those of them who were naked
  - their unclothed people
  lexicon: HALOT
  rationale: The noun refers to those who were stripped or naked. 'Their naked ones'
    is slightly literal but clear in context and preserves the distributive sense
    within the captive group.
- source_word: הִלְבִּישׁוּ מִן הַשָּׁלָל
  chosen: from the spoil they clothed
  alternatives:
  - they provided clothing from the spoil for
  - they clothed from the plunder
  lexicon: HALOT
  rationale: 'The phrase states the source of the clothing: the spoil/plunder. ''Spoil''
    is retained as a standard biblical-historical term, with the syntax adjusted for
    readable English.'
- source_word: וַיַּלְבִּשׁוּם
  chosen: They clothed them
  alternatives:
  - They dressed them
  lexicon: HALOT
  rationale: A straightforward rendering of לבשׁ in the causative. Repeating 'clothed'
    reflects the Hebrew's emphasis rather than smoothing it away.
- source_word: וַיַּנְעִלוּם
  chosen: put sandals on them
  alternatives:
  - shod them
  - gave them footwear
  lexicon: HALOT
  rationale: The verb from נעל refers to putting on footwear. 'Put sandals on them'
    is more accessible than archaic 'shod them' and fits the ancient setting better
    than generic 'footwear'.
- source_word: וַיַּאֲכִלוּם
  chosen: fed them
  alternatives:
  - gave them food
  lexicon: HALOT
  rationale: Simple causative of אכל. 'Fed them' is idiomatic and accurate.
- source_word: וַיַּשְׁקוּם
  chosen: gave them drink
  alternatives:
  - gave them water
  - made them drink
  lexicon: HALOT
  rationale: The verb means to give drink. 'Gave them drink' is broad enough not to
    specify water where the Hebrew does not.
- source_word: וַיְסֻכוּם
  chosen: anointed them
  alternatives:
  - rubbed them with oil
  - treated them with oil
  lexicon: HALOT
  rationale: סוך commonly refers to anointing or rubbing with oil. 'Anointed them'
    is the most direct lexical equivalent, though here it likely has a restorative
    rather than ceremonial sense.
- source_word: וַיְנַהֲלוּם בַּחֲמֹרִים
  chosen: led all the feeble among them on donkeys
  alternatives:
  - guided them on donkeys
  - transported them on donkeys
  lexicon: HALOT
  rationale: נהל can mean lead or guide gently. Combined with 'on donkeys' and the
    following phrase about the feeble, the sense is compassionate conveyance. 'Led
    ... on donkeys' preserves the verbal image while remaining natural.
- source_word: לְכָל כּוֹשֵׁל
  chosen: all the feeble among them
  alternatives:
  - everyone who was stumbling
  - all who were weak
  lexicon: HALOT
  rationale: כושל literally denotes one stumbling or faltering. In context of exhausted
    captives, 'the feeble' communicates physical weakness more idiomatically than
    'stumbling,' while 'among them' makes explicit the referent carried by the suffixes.
- source_word: יְרֵחוֹ עִיר הַתְּמָרִים
  chosen: Jericho, the city of palm trees
  alternatives:
  - Jericho, city of palms
  lexicon: HALOT
  rationale: This is a known epithet for Jericho. 'Palm trees' is the most transparent
    modern English rendering of the plural noun.
- source_word: אֵצֶל אֲחֵיהֶם
  chosen: to their brothers
  alternatives:
  - to their kin
  - to their fellow Israelites
  lexicon: HALOT
  rationale: The Hebrew literally says 'their brothers.' Per translation philosophy,
    gender-accurate language is preferred where it matches source intent. Here it
    denotes fellow covenant kin; that broader sense can be noted by context without
    replacing the lexical form.
- source_word: וַיָּשׁוּבוּ שֹׁמְרוֹן
  chosen: then they returned to Samaria
  alternatives:
  - and they returned to Samaria
  lexicon: HALOT
  rationale: A simple narrative wayyiqtol. 'Then' reflects sequential narrative flow
    naturally in English.
