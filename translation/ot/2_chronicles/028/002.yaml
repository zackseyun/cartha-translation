theological_decisions:
- issue: Rendering of בְּעָלִים in the plural
  chosen_reading: the Baals
  alternative_readings:
  - Baal
  - the Baal idols
  rationale: The Hebrew plural should be retained because it reflects the text's portrayal
    of multiple Baal manifestations or cultic forms. Rendering it as singular 'Baal'
    would smooth away a significant detail of the source text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Retention of the 'walk' metaphor for conduct
  chosen_reading: He walked in the ways of the kings of Israel
  alternative_readings:
  - He followed the practices of the kings of Israel
  rationale: The Hebrew moral metaphor is clear and common enough in English biblical
    style to preserve without obscuring meaning. This maintains source-language texture
    while remaining readable.
  doctrine_reference: Translation philosophy §1, §6
