id: 2CH.28.2
reference: 2 Chronicles 28:2
source:
  edition: WLC
  text: וַ/יֵּ֕לֶךְ בְּ/דַרְכֵ֖י מַלְכֵ֣י יִשְׂרָאֵ֑ל וְ/גַ֧ם מַסֵּכ֛וֹת עָשָׂ֖ה לַ/בְּעָלִֽים׃
translation:
  text: He walked in the ways of the kings of Israel, and he also made cast images
    for the Baals.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'molten images.' The Hebrew term refers specifically to images made by
      casting.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'for the Baals,' preserving the plural; this may refer to multiple
      local manifestations or representations associated with Baal worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: He walked
  alternatives:
  - He went
  - He followed
  lexicon: HALOT
  rationale: The verb literally means 'went/walked,' but in the idiom 'walked in the
    ways of' it conveys conduct or pattern of life. 'Walked' preserves the Hebrew
    metaphor and is natural English in this moral sense.
- source_word: בְּדַרְכֵי
  chosen: in the ways of
  alternatives:
  - according to the ways of
  - in the path of
  lexicon: HALOT
  rationale: The plural construct 'ways of' is a standard Hebrew idiom for behavior
    or practices. 'In the ways of' keeps the idiom transparent and readable.
- source_word: מַלְכֵי יִשְׂרָאֵל
  chosen: the kings of Israel
  alternatives:
  - Israel's kings
  lexicon: HALOT
  rationale: A straightforward genitive construction. 'The kings of Israel' preserves
    the formal historical reference, likely contrasting the northern kingdom's idolatrous
    rulers with Judah's expected fidelity.
- source_word: וְגַם
  chosen: and he also
  alternatives:
  - and also
  - even
  lexicon: HALOT
  rationale: The particle adds emphasis beyond the first accusation. 'And he also'
    makes explicit that this is an additional offense committed by Ahaz.
- source_word: מַסֵּכוֹת
  chosen: cast images
  alternatives:
  - molten images
  - metal images
  - idols
  lexicon: HALOT
  rationale: The noun refers specifically to images made by casting, not merely idols
    in general. 'Cast images' preserves the manufacturing nuance while remaining understandable.
    'Molten images' is possible but sounds archaic in contemporary English.
- source_word: עָשָׂה
  chosen: made
  alternatives:
  - fashioned
  lexicon: HALOT
  rationale: The common verb 'made' is sufficient and idiomatic with 'cast images.'
    'Fashioned' is possible but adds stylistic color not required by the Hebrew.
- source_word: לַבְּעָלִים
  chosen: for the Baals
  alternatives:
  - for the Baal idols
  - for the Baals/gods called Baal
  lexicon: HALOT
  rationale: The plural form is explicit in the Hebrew and should be preserved. 'The
    Baals' reflects the various local manifestations or cultic representations associated
    with Baal worship, rather than flattening the term to singular 'Baal.'
