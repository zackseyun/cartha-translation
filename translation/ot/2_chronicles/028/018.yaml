id: 2CH.28.18
reference: 2 Chronicles 28:18
source:
  edition: WLC
  text: וּ/פְלִשְׁתִּ֣ים פָּשְׁט֗וּ בְּ/עָרֵ֨י הַ/שְּׁפֵלָ֣ה וְ/הַ/נֶּגֶב֮ לִֽ/יהוּדָה֒
    וַֽ֠/יִּלְכְּדוּ אֶת בֵּֽית שֶׁ֨מֶשׁ וְ/אֶת אַיָּל֜וֹן וְ/אֶת הַ/גְּדֵר֗וֹת וְ/אֶת
    שׂוֹכ֤וֹ וּ/בְנוֹתֶ֨י/הָ֙ וְ/אֶת תִּמְנָ֣ה וּ/בְנוֹתֶ֔י/הָ וְ/אֶת גִּמְז֖וֹ וְ/אֶת
    בְּנֹתֶ֑י/הָ וַ/יֵּשְׁב֖וּ שָֽׁם־־־־־־־־׃
translation:
  text: And the Philistines had raided the cities of the lowland and the Negeb of
    Judah, and they captured Beth-shemesh, Aijalon, Gederoth, Soko and its villages,
    Timnah and its villages, and Gimzo and its villages; and they settled there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Soco.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְלִשְׁתִּים
  chosen: And the Philistines
  alternatives:
  - Now the Philistines
  - The Philistines
  lexicon: HALOT
  rationale: Proper ethnonym referring to the Philistine people. The prefixed conjunction
    is carried with 'And' to preserve narrative flow.
- source_word: פָּשְׁטוּ
  chosen: had raided
  alternatives:
  - invaded
  - made raids
  - spread out
  lexicon: HALOT
  rationale: In this military context the verb denotes making a raid or incursion
    rather than merely 'spreading out.' 'Had raided' fits the pluperfect-like background
    sense before the subsequent captures are listed.
- source_word: בְּעָרֵי הַשְּׁפֵלָה וְהַנֶּגֶב לִיהוּדָה
  chosen: the cities of the lowland and the Negeb of Judah
  alternatives:
  - the towns of the Shephelah and the South of Judah
  - the cities of the foothills and the south country of Judah
  lexicon: HALOT
  rationale: עָרִים can be 'cities' or 'towns'; 'cities' is retained as a standard
    rendering. הַשְּׁפֵלָה refers to Judah's western lowland/foothill region; 'lowland'
    is clear modern English. הַנֶּגֶב is best preserved as the regional term 'Negeb'
    rather than flattened to 'south,' since it names a known geographic area.
- source_word: וַיִּלְכְּדוּ
  chosen: they captured
  alternatives:
  - they seized
  - they took
  lexicon: HALOT
  rationale: Common military verb for taking cities. 'Captured' is natural and precise
    in context.
- source_word: בֵּית שֶׁמֶשׁ
  chosen: Beth-shemesh
  alternatives:
  - Beth Shemesh
  lexicon: HALOT
  rationale: Place name is transliterated per project philosophy for names.
- source_word: אַיָּלוֹן
  chosen: Aijalon
  alternatives:
  - Ayalon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: הַגְּדֵרוֹת
  chosen: Gederoth
  alternatives: []
  lexicon: HALOT
  rationale: Proper place name, transliterated rather than translated.
- source_word: שׂוֹכוֹ
  chosen: Soko
  alternatives:
  - Soco
  - Sokoh
  lexicon: HALOT
  rationale: Proper place name. 'Soko' is a straightforward modern transliteration;
    alternative spellings exist in English tradition.
- source_word: וּבְנוֹתֶיהָ / בְּנֹתֶיהָ
  chosen: and its villages
  alternatives:
  - and its daughter towns
  - and its dependent settlements
  lexicon: HALOT
  rationale: Literally 'its daughters,' an idiom for satellite settlements dependent
    on a main town. 'Its villages' communicates the sense clearly in modern English.
- source_word: תִּמְנָה
  chosen: Timnah
  alternatives: []
  lexicon: HALOT
  rationale: Proper place name, transliterated.
- source_word: גִּמְזוֹ
  chosen: Gimzo
  alternatives: []
  lexicon: HALOT
  rationale: Proper place name, transliterated.
- source_word: וַיֵּשְׁבוּ שָׁם
  chosen: and they settled there
  alternatives:
  - and they lived there
  - and they dwelt there
  lexicon: HALOT
  rationale: The verb ישׁב in this context indicates taking up residence after conquest.
    'Settled there' conveys occupation and residence more idiomatically than 'dwelt
    there.'
