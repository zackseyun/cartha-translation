id: 2CH.28.25
reference: 2 Chronicles 28:25
source:
  edition: WLC
  text: וּ/בְ/כָל עִ֨יר וָ/עִ֤יר לִֽ/יהוּדָה֙ עָשָׂ֣ה בָמ֔וֹת לְ/קַטֵּ֖ר לֵֽ/אלֹהִ֣ים
    אֲחֵרִ֑ים וַ/יַּכְעֵ֕ס אֶת יְהוָ֖ה אֱלֹהֵ֥י אֲבֹתָֽי/ו־־׃
translation:
  text: And in every city and city of Judah he made high places to burn incense to
    other gods, and he provoked the LORD, the God of his fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in every city and city of Judah,'' a distributive expression
      meaning throughout all the cities of Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְכָל עִיר וָעִיר
  chosen: And in every city and city
  alternatives:
  - And in every city
  - And in each and every city
  lexicon: HALOT
  rationale: The distributive repetition עִיר וָעִיר is preserved rather literally
    as 'city and city' to reflect the Hebrew emphasis on comprehensiveness. Smoother
    English alternatives are possible, but this keeps the force of the repetition
    visible.
- source_word: לִיהוּדָה
  chosen: of Judah
  alternatives:
  - in Judah
  lexicon: HALOT
  rationale: With the preceding phrase, this marks the cities as belonging to Judah.
    'Of Judah' is slightly more formal and tracks the genitival sense closely; 'in
    Judah' would also be acceptable idiomatic English.
- source_word: עָשָׂה
  chosen: he made
  alternatives:
  - he built
  - he set up
  lexicon: HALOT
  rationale: The common verb עשה is broad; 'made' is the most direct rendering. 'Built'
    or 'set up' would interpret the action more specifically than the Hebrew requires.
- source_word: בָּמוֹת
  chosen: high places
  alternatives:
  - cultic high places
  - shrines on high places
  lexicon: HALOT
  rationale: '''High places'' is the standard and accurate rendering for bamot, referring
    to illicit worship sites. It preserves the cultic sense without overexplaining
    in the main text.'
- source_word: לְקַטֵּר
  chosen: to burn incense
  alternatives:
  - to make offerings smoke
  - to offer incense
  lexicon: HALOT
  rationale: The piel infinitive of קטר commonly refers to burning incense or making
    sacrificial smoke ascend. 'To burn incense' is the clearest idiomatic rendering
    here.
- source_word: לֵאלֹהִים אֲחֵרִים
  chosen: to other gods
  alternatives:
  - for other gods
  - to foreign gods
  lexicon: HALOT
  rationale: The phrase straightforwardly denotes deities other than the LORD. 'Other
    gods' is the most direct rendering; 'foreign gods' adds a nuance not explicit
    in אֲחֵרִים.
- source_word: וַיַּכְעֵס
  chosen: and he provoked
  alternatives:
  - and he angered
  - and he provoked to anger
  lexicon: HALOT
  rationale: The hiphil of כעס means to provoke to anger or vex. 'Provoked' is concise
    and natural; the object that follows makes the sense clear.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD' rather than a transliteration.
- source_word: אֱלֹהֵי אֲבֹתָיו
  chosen: the God of his fathers
  alternatives:
  - the God of his ancestors
  lexicon: HALOT
  rationale: This covenantal expression is rendered formally as 'the God of his fathers.'
    'Ancestors' is possible in modern English, but 'fathers' better preserves the
    source wording and biblical resonance.
