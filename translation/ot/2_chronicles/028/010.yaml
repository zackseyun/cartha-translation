id: 2CH.28.10
reference: 2 Chronicles 28:10
source:
  edition: WLC
  text: וְ֠/עַתָּה בְּנֵֽי יְהוּדָ֤ה וִֽ/ירוּשָׁלִַ֨ם֙ אַתֶּ֣ם אֹמְרִ֔ים לִ/כְבֹּ֛שׁ
    לַ/עֲבָדִ֥ים וְ/לִ/שְׁפָח֖וֹת לָ/כֶ֑ם הֲ/לֹ֤א רַק אַתֶּם֙ עִמָּ/כֶ֣ם אֲשָׁמ֔וֹת
    לַ/יהוָ֖ה אֱלֹהֵי/כֶֽם־־׃
translation:
  text: And now, you are saying that the people of Judah and Jerusalem are to be subdued
    as male and female slaves for yourselves. But do not you yourselves also have
    guilt before the LORD your God?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'sons of Judah and Jerusalem.' The Hebrew uses a masculine
      plural expression for the people corporately.
    reason: lexical_alternative
  - marker: b
    text: Or 'to subdue as slaves and female slaves for yourselves.'
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew of the final question is compressed: literally, something like
      ''Are there not, indeed, with you guilt-offenses for the LORD your God?'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing the speaker's present rebuke; 'And now'
    preserves the connective force of ו plus the temporal adverb.
- source_word: בְּנֵי יְהוּדָה וִירוּשָׁלִַם
  chosen: the people of Judah and Jerusalem
  alternatives:
  - sons of Judah and Jerusalem
  - people of Judah and Jerusalem
  lexicon: HALOT
  rationale: Although בְּנֵי is formally 'sons of,' in this address it refers corporately
    to the inhabitants/people. 'The people of Judah and Jerusalem' communicates the
    representative sense in natural English while avoiding an overly literal reading
    that would sound male-exclusive.
- source_word: אַתֶּם אֹמְרִים
  chosen: you are saying
  alternatives:
  - you say
  - you intend
  lexicon: HALOT
  rationale: The participle with pronoun conveys present intention or assertion. 'You
    are saying' preserves the immediate rhetorical accusation.
- source_word: לִכְבֹּשׁ
  chosen: are to be subdued
  alternatives:
  - to subdue
  - to enslave
  - to bring into subjection
  lexicon: HALOT
  rationale: כָּבַשׁ means to subdue or bring under control. Here it governs the result
    clause with slaves, so 'are to be subdued' captures the coercive force without
    overtranslating the verb itself as 'enslave' apart from its object phrase.
- source_word: לַעֲבָדִים וְלִשְׁפָחוֹת
  chosen: as male and female slaves
  alternatives:
  - as slaves and female slaves
  - as servants and maidservants
  lexicon: HALOT
  rationale: The paired nouns distinguish male and female persons reduced to slave
    status. In line with the project's philosophy, 'slaves' is preferred over 'servants'
    because the bonded nature is salient. 'Male and female slaves' renders both terms
    clearly in contemporary English.
- source_word: לָכֶם
  chosen: for yourselves
  alternatives:
  - for you
  - to you
  lexicon: HALOT
  rationale: The dative indicates advantage/possession; 'for yourselves' brings out
    that they intend to acquire these people for their own use.
- source_word: הֲלֹא רַק
  chosen: But do not
  alternatives:
  - Is it not the case that only
  - Surely
  lexicon: HALOT
  rationale: The Hebrew is rhetorically compressed and difficult. In context Oded
    rebukes them by pointing to their own guilt before God. Rendering the force as
    a rhetorical question in idiomatic English best communicates the sense, though
    the particle רַק is not represented woodenly.
- source_word: עִמָּכֶם אֲשָׁמוֹת
  chosen: you yourselves also have guilt
  alternatives:
  - there are guilty deeds with you
  - you yourselves are guilty
  - you have offenses
  lexicon: HALOT
  rationale: The phrase literally speaks of 'guilts/guilt-offenses with you.' In English,
    'you yourselves also have guilt' naturally expresses their culpability while preserving
    the plural noun's collective sense.
- source_word: לַיהוָה אֱלֹהֵיכֶם
  chosen: before the LORD your God
  alternatives:
  - against the LORD your God
  - belonging to the LORD your God
  lexicon: HALOT
  rationale: The preposition ל here is best understood in relation to accountability
    toward God. 'Before the LORD your God' communicates standing guilty in his sight.
    'The LORD' follows the project's default rendering for YHWH.
