theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Status language for עֲבָדִים/שְׁפָחוֹת
  chosen_reading: male and female slaves
  alternative_readings:
  - servants and female servants
  - slaves and maidservants
  rationale: The context concerns forced human subjugation after military victory,
    so the bonded nature is salient. This aligns with the project's preference for
    'slave' where that force is present.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy
    under δοῦλος
