id: 2CH.28.14
reference: 2 Chronicles 28:14
source:
  edition: WLC
  text: וַ/יַּעֲזֹ֣ב הֶֽ/חָל֗וּץ אֶת הַ/שִּׁבְיָה֙ וְ/אֶת הַ/בִּזָּ֔ה לִ/פְנֵ֥י הַ/שָּׂרִ֖ים
    וְ/כָל הַ/קָּהָֽל־־־׃
translation:
  text: So the armed men left the captives and the plunder before the officials and
    all the assembly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole assembly.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the spoil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲזֹב
  chosen: left
  alternatives:
  - abandoned
  - set down
  lexicon: HALOT
  rationale: The verb עזב commonly means 'leave, forsake.' In this context it describes
    relinquishing possession of the captives and spoil in front of the leaders and
    congregation. 'Left' is natural English and fits the narrative action without
    implying total desertion.
- source_word: הֶחָלוּץ
  chosen: the armed men
  alternatives:
  - the armed force
  - the warriors
  - those equipped for battle
  lexicon: HALOT
  rationale: From חלץ, here functioning substantivally for men equipped for battle.
    'The armed men' is concise and idiomatic, matching the military context of the
    preceding verses better than the more wooden 'the armed ones.'
- source_word: הַשִּׁבְיָה
  chosen: the captives
  alternatives:
  - the captivity
  - the prisoners
  lexicon: HALOT
  rationale: Although the noun can denote 'captivity' abstractly, here it refers concretely
    to the people taken in war. 'Captives' best reflects the object being released.
- source_word: הַבִּזָּה
  chosen: the plunder
  alternatives:
  - the spoil
  - the booty
  lexicon: HALOT
  rationale: This noun denotes goods taken in war. 'Plunder' is clear modern English;
    'spoil/booty' are possible but either archaic or potentially distracting.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: HALOT
  rationale: The preposition indicates placement in front of or in the presence of
    the leaders and assembly. 'Before' preserves both spatial and public-accountability
    nuance in concise English.
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the leaders
  - the commanders
  lexicon: HALOT
  rationale: שָׂרִים can mean officials, princes, leaders, or commanders depending
    on context. Since these are recognized authorities overseeing the action, 'officials'
    fits well and avoids implying royal sons ('princes') or strictly military officers
    ('commanders').
- source_word: כָל הַקָּהָל
  chosen: all the assembly
  alternatives:
  - the whole assembly
  - all the congregation
  lexicon: HALOT
  rationale: קהל denotes the gathered community. 'Assembly' is a clear, broadly neutral
    rendering in Chronicles; 'congregation' is possible but can sound more narrowly
    liturgical in English.
