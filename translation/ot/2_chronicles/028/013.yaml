theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of 'Israel' in a context involving the northern kingdom and covenant judgment
  chosen_reading: Israel
  alternative_readings:
  - Ephraim
  - the northern kingdom
  rationale: The Hebrew text says 'Israel.' The translation preserves the canonical term rather than narrowing it interpretively, while allowing readers to infer the immediate historical referent from context.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy
