id: 2CH.28.13
reference: 2 Chronicles 28:13
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ לָ/הֶ֗ם לֹא תָבִ֤יאוּ אֶת הַ/שִּׁבְיָה֙ הֵ֔נָּה כִּי֩ לְ/אַשְׁמַ֨ת יְהוָ֤ה עָלֵ֨י/נוּ֙ אַתֶּ֣ם אֹמְרִ֔ים לְ/הֹסִ֥יף עַל חַטֹּאתֵ֖י/נוּ וְ/עַל אַשְׁמָתֵ֑י/נוּ כִּֽי רַבָּ֤ה אַשְׁמָה֙ לָ֔/נוּ וַ/חֲר֥וֹן אָ֖ף עַל יִשְׂרָאֵֽל־־־־־־׃ס
translation:
  text: And they said to them, “Do not bring the captives here, for you are proposing to add to our sins and to our guilt, bringing guilt from Yahweh upon us, because our guilt is already great, and there is fierce anger against Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for guilt against the LORD is upon us'; the Hebrew phrase is compact and may emphasize either guilt incurred from the LORD's judgment or guilt in relation to the LORD.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'burning of anger,' an idiom for intense wrath.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשִּׁבְיָה
  chosen: the captives
  alternatives:
  - the captivity
  - the prisoners
  lexicon: HALOT
  rationale: 'Although the noun can denote captivity as a state or the body of captives, here the command ''do not bring ... here'' requires the concrete sense: the people taken captive.'
- source_word: הֵנָּה
  chosen: here
  alternatives:
  - to here
  lexicon: HALOT
  rationale: Deictic adverb indicating motion toward the speakers' location; idiomatic English is simply 'here' after 'bring.'
- source_word: לְאַשְׁמַת יְהוָה עָלֵינוּ
  chosen: to bring guilt from the LORD upon us
  alternatives:
  - for guilt against the LORD upon us
  - to make us guilty before the LORD
  lexicon: HALOT
  rationale: The phrase is difficult. Given the following infinitive 'to add to our sins and to our guilt,' the sense is that this action would incur guilt resting on Judah from the LORD. 'From the LORD upon us' best captures divine liability/judgment without overparaphrasing.
- source_word: אַתֶּם אֹמְרִים
  chosen: you are proposing
  alternatives:
  - you are saying
  - you intend
  lexicon: HALOT
  rationale: Literally 'you are saying,' but in context it introduces intended action rather than mere speech. 'Proposing' conveys deliberative intent in natural English while staying close to the Hebrew sense.
- source_word: לְהֹסִיף עַל
  chosen: to add to
  alternatives:
  - to increase
  - to heap onto
  lexicon: HALOT
  rationale: Standard idiomatic rendering of יסף with על in a context of cumulative guilt.
- source_word: חַטֹּאתֵינוּ
  chosen: our sins
  alternatives:
  - our sin-offenses
  lexicon: HALOT
  rationale: Common term for sins/offenses; plural retained.
- source_word: אַשְׁמָתֵינוּ / אַשְׁמָה
  chosen: our guilt / our guilt is already great
  alternatives:
  - our guilt-offering liability
  - our culpability
  lexicon: HALOT
  rationale: The noun emphasizes guilt/liability rather than the acts themselves. Rendering it distinctly from חטאותינו preserves the Hebrew's paired terms 'sins' and 'guilt.'
- source_word: רַבָּה
  chosen: already great
  alternatives:
  - great
  - abundant
  lexicon: HALOT
  rationale: '''Great'' is the core sense; ''already'' is supplied in English to reflect the argument that further wrongdoing would compound an existing condition, not create it from nothing.'
- source_word: וַחֲרוֹן אָף
  chosen: and there is fierce anger
  alternatives:
  - and burning anger
  - and wrath
  lexicon: HALOT
  rationale: Hebrew idiom for burning anger/wrath. 'Fierce anger' is readable modern English and preserves the intensity.
- source_word: עַל יִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - upon Israel
  lexicon: HALOT
  rationale: In context על with divine anger is naturally rendered 'against.' 'Israel' here refers to the covenant people under judgment; the proper name is retained.
