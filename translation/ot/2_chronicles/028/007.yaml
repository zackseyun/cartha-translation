id: 2CH.28.7
reference: 2 Chronicles 28:7
source:
  edition: WLC
  text: וַֽ/יַּהֲרֹ֞ג זִכְרִ֣י גִּבּ֣וֹר אֶפְרַ֗יִם אֶת מַעֲשֵׂיָ֨הוּ֙ בֶּן הַ/מֶּ֔לֶךְ
    וְ/אֶת עַזְרִיקָ֖ם נְגִ֣יד הַ/בָּ֑יִת וְ/אֶת אֶלְקָנָ֖ה מִשְׁנֵ֥ה הַ/מֶּֽלֶךְ׀־־־־׃ס
translation:
  text: And Zikri, a mighty man of Ephraim, killed Maaseiah the king’s son, Azrikam
    the overseer of the palace, and Elkanah, second to the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a warrior of Ephraim' or 'an Ephraimite hero.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the overseer of the house,' likely referring to the royal palace
      or household.
    reason: lexical_alternative
  - marker: c
    text: Or 'the king’s second-in-command.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּהֲרֹג
  chosen: killed
  alternatives:
  - struck down
  - slew
  lexicon: HALOT
  rationale: The verb הרג straightforwardly denotes killing. 'Killed' is clear modern
    English and fits the narrative register better than the more archaic 'slew.'
- source_word: זִכְרִי
  chosen: Zikri
  rationale: Personal name transliterated according to the translation philosophy
    of translating titles but transliterating names.
- source_word: גִּבּוֹר אֶפְרַיִם
  chosen: a mighty man of Ephraim
  alternatives:
  - a warrior of Ephraim
  - an Ephraimite hero
  lexicon: HALOT
  rationale: גִּבּוֹר can mean 'mighty man,' 'warrior,' or 'hero.' 'A mighty man of
    Ephraim' preserves the lexical force while remaining natural. The construct-like
    apposition with אֶפְרַיִם identifies him as belonging to Ephraim.
- source_word: מַעֲשֵׂיָהוּ
  chosen: Maaseiah
  rationale: Personal name transliterated.
- source_word: בֶּן הַמֶּלֶךְ
  chosen: the king’s son
  alternatives:
  - a son of the king
  lexicon: HALOT
  rationale: With the definite article on 'king,' the phrase most naturally refers
    to a specific royal son. The construct is idiomatically rendered 'the king’s son.'
- source_word: עַזְרִיקָם
  chosen: Azrikam
  rationale: Personal name transliterated.
- source_word: נְגִיד הַבָּיִת
  chosen: the overseer of the palace
  alternatives:
  - the governor of the house
  - the ruler of the household
  lexicon: HALOT
  rationale: נְגִיד denotes a leader, ruler, or official; הַבָּיִת in royal context
    refers to the palace/royal household. 'Overseer of the palace' communicates an
    official court position in accessible English without over-specifying the office.
- source_word: אֶלְקָנָה
  chosen: Elkanah
  rationale: Personal name transliterated.
- source_word: מִשְׁנֵה הַמֶּלֶךְ
  chosen: second to the king
  alternatives:
  - the king’s second-in-command
  - the deputy to the king
  - viceroy
  lexicon: HALOT
  rationale: מִשְׁנֶה denotes one who is second in rank. 'Second to the king' is a
    close, readable rendering that preserves the hierarchical sense without importing
    a later technical title.
