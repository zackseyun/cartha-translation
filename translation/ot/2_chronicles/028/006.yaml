id: 2CH.28.6
reference: 2 Chronicles 28:6
source:
  edition: WLC
  text: וַ/יַּהֲרֹג֩ פֶּ֨קַח בֶּן רְמַלְיָ֜הוּ בִּֽ/יהוּדָ֗ה מֵאָ֨ה וְ/עֶשְׂרִ֥ים
    אֶ֛לֶף בְּ/י֥וֹם אֶחָ֖ד הַ/כֹּ֣ל בְּנֵי חָ֑יִל בְּ/עָזְבָ֕/ם אֶת יְהוָ֖ה אֱלֹהֵ֥י
    אֲבוֹתָֽ/ם־־־׃
translation:
  text: And Pekah son of Remaliah killed in Judah one hundred twenty thousand in a
    single day, all of them valiant men, because they had forsaken the LORD, the God
    of their fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in one day.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of valor'; that is, valiant fighting men.
    reason: lexical_alternative
  - marker: c
    text: Or 'when they had forsaken the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּהֲרֹג
  chosen: killed
  alternatives:
  - struck down
  - slew
  lexicon: HALOT
  rationale: The verb הרג straightforwardly denotes killing. 'Killed' is clear modern
    English and avoids archaic 'slew'; 'struck down' is possible but slightly more
    interpretive.
- source_word: בִּיהוּדָה
  chosen: in Judah
  alternatives:
  - among Judah
  - in Judea
  lexicon: HALOT
  rationale: 'The preposition ב marks location: the killing took place in Judah. ''Judah''
    is the standard rendering for the kingdom/territory in this historical context;
    ''Judea'' would be anachronistic.'
- source_word: מֵאָה וְעֶשְׂרִים אֶלֶף
  chosen: one hundred twenty thousand
  alternatives:
  - a hundred and twenty thousand
  lexicon: HALOT
  rationale: This is the direct cardinal number. The chosen form is standard contemporary
    English style.
- source_word: בְּיוֹם אֶחָד
  chosen: in a single day
  alternatives:
  - in one day
  lexicon: HALOT
  rationale: Literally 'in one day.' 'In a single day' preserves the force and reads
    naturally in English, emphasizing the scale of the slaughter.
- source_word: הַכֹּל
  chosen: all of them
  alternatives:
  - the whole number
  - all
  lexicon: HALOT
  rationale: Here הכל sums up the previously mentioned victims. 'All of them' makes
    explicit in idiomatic English that the entire number consisted of what follows.
- source_word: בְּנֵי חָיִל
  chosen: valiant men
  alternatives:
  - mighty men
  - men of valor
  - warriors
  lexicon: HALOT
  rationale: The phrase literally means 'sons of valor/strength' and commonly refers
    to capable fighting men. 'Valiant men' is concise, idiomatic, and preserves the
    masculine reference in line with the gender-accurate policy. 'Warriors' is possible
    but slightly narrows the phrase to military role rather than valor.
- source_word: בְּעָזְבָם
  chosen: because they had forsaken
  alternatives:
  - when they forsook
  - for they abandoned
  lexicon: HALOT
  rationale: The prefixed ב on the infinitive construct can express circumstance or
    cause. In context the clause explains why this judgment befell them, so a causal
    rendering is best. 'Forsaken' fits covenantal language better than the flatter
    'abandoned.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֱלֹהֵי אֲבוֹתָם
  chosen: the God of their fathers
  alternatives:
  - their ancestral God
  - the God of their ancestors
  lexicon: HALOT
  rationale: This construct phrase is a standard covenantal expression. 'The God of
    their fathers' preserves the historical and familial wording of the Hebrew more
    closely than the more inclusive but less literal 'ancestors.'
