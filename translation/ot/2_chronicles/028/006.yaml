theological_decisions:
- issue: Force of בְּעָזְבָם in relation to the slaughter
  chosen_reading: 'causal: ''because they had forsaken'''
  alternative_readings:
  - 'temporal: ''when they forsook'''
  rationale: The Chronicler regularly interprets military disaster as covenant judgment.
    Rendering the clause causally preserves that theological explanation without adding
    anything beyond the Hebrew's plausible sense.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
