id: 2CH.28.27
reference: 2 Chronicles 28:27
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֨ב אָחָ֜ז עִם אֲבֹתָ֗י/ו וַֽ/יִּקְבְּרֻ֤/הוּ בָ/עִיר֙ בִּ/יר֣וּשָׁלִַ֔ם
    כִּ֚י לֹ֣א הֱבִיאֻ֔/הוּ לְ/קִבְרֵ֖י מַלְכֵ֣י יִשְׂרָאֵ֑ל וַ/יִּמְלֹ֛ךְ יְחִזְקִיָּ֥הֽוּ
    בְנ֖/וֹ תַּחְתָּֽי/ו־׃פ
translation:
  text: And Ahaz lay down with his fathers, and they buried him in the city, in Jerusalem,
    for they did not bring him into the tombs of the kings of Israel. And Hezekiah
    his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the kings of Israel.'' Since Ahaz was king of Judah, some understand
      this as referring to the royal tombs of the Davidic kings, or would expect ''kings
      of Judah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: lay down
  alternatives:
  - slept
  - died
  lexicon: HALOT
  rationale: The verb שׁכב in royal death notices is a conventional idiom for death/burial
    transition. 'Lay down' preserves the Hebrew idiom more transparently than the
    interpretive 'died,' while avoiding the potentially misleading English euphemism
    'slept' without context.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is the standard dynastic formula. 'With his fathers' preserves the
    idiomatic and genealogical force of the Hebrew; 'ancestors' is possible but less
    formally aligned with the recurring biblical expression.
- source_word: וַיִּקְבְּרֻהוּ
  chosen: they buried him
  alternatives:
  - he was buried
  lexicon: HALOT
  rationale: The Hebrew has an active 3mp verb with object suffix. 'They buried him'
    reflects the active form better than the passive English alternative.
- source_word: בָעִיר בִּירוּשָׁלִָם
  chosen: in the city, in Jerusalem
  alternatives:
  - in the city of Jerusalem
  - in Jerusalem
  lexicon: HALOT
  rationale: The Hebrew presents both 'in the city' and 'in Jerusalem.' Rendering
    both elements preserves the wording and likely emphasizes burial within the city
    but not in the royal tombs. 'In the city of Jerusalem' is smoother but slightly
    compresses the two-part expression.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the burial location. 'For' is concise
    and natural in narrative English while preserving the causal sense.
- source_word: הֱבִיאֻהוּ
  chosen: did not bring him into
  alternatives:
  - did not place him in
  - did not bury him in
  lexicon: HALOT
  rationale: The verb בוא in hiphil means 'bring.' 'Did not bring him into' keeps
    the concrete motion language of the Hebrew rather than collapsing it into the
    resultative 'bury him in.'
- source_word: לְקִבְרֵי
  chosen: into the tombs
  alternatives:
  - into the graves
  - into the burial places
  lexicon: HALOT
  rationale: קבר can denote grave or burial place; in the context of royal interment,
    'tombs' best conveys formal royal burial chambers.
- source_word: מַלְכֵי יִשְׂרָאֵל
  chosen: of the kings of Israel
  alternatives:
  - of the kings of Judah
  lexicon: HALOT
  rationale: The Hebrew text reads 'Israel.' In Chronicles this can refer broadly
    to the covenant people or the Davidic monarchy's heritage, and the translation
    should not emend it to 'Judah' despite contextual expectations. The literal rendering
    is therefore retained.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: The verb מלך in this succession formula is well rendered by 'reigned.'
    'Became king' is possible but focuses on accession rather than the standard regnal
    notice formula.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: '''In his place'' is the standard idiomatic rendering for dynastic succession
    and matches the Hebrew sense of replacement/succession.'
