theological_decisions:
- issue: Whether to normalize 'kings of Israel' to 'kings of Judah' for historical
    clarity
  chosen_reading: Retain 'kings of Israel' in the main text
  alternative_readings:
  - kings of Judah
  rationale: The Masoretic text explicitly says 'kings of Israel.' Although Ahaz was
    king of Judah and some readers may expect 'Judah,' the translation should preserve
    the received Hebrew wording rather than harmonize it to an inferred historical
    label. A footnote preserves the contextual alternative/explanatory possibility.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
