id: 2CH.28.12
reference: 2 Chronicles 28:12
source:
  edition: WLC
  text: וַ/יָּקֻ֨מוּ אֲנָשִׁ֜ים מֵ/רָאשֵׁ֣י בְנֵֽי אֶפְרַ֗יִם עֲזַרְיָ֤הוּ בֶן יְהֽוֹחָנָן֙
    בֶּרֶכְיָ֣הוּ בֶן מְשִׁלֵּמ֔וֹת וִֽ/יחִזְקִיָּ֨הוּ֙ בֶּן שַׁלֻּ֔ם וַ/עֲמָשָׂ֖א
    בֶּן חַדְלָ֑י עַל הַ/בָּאִ֖ים מִן הַ/צָּבָֽא־־־־־־־׃
translation:
  text: 'Then some men from the heads of the sons of Ephraim stood up against those
    coming from the army: Azariah son of Jehohanan, Berechiah son of Meshillemoth,
    Hezekiah son of Shallum, and Amasa son of Hadlai.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the chiefs of the Ephraimites.' The Hebrew reads literally 'from
      the heads of the sons of Ephraim.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  chosen: stood up
  alternatives:
  - arose
  - rose up
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום, here marking decisive action in narrative. 'Stood
    up' preserves both the physical and oppositional nuance without overinterpreting.
- source_word: אֲנָשִׁים
  chosen: some men
  alternatives:
  - men
  lexicon: HALOT
  rationale: Indefinite plural 'men'; 'some men' communicates the introduction of
    a subset within Ephraim's leadership.
- source_word: מֵרָאשֵׁי בְנֵי אֶפְרַיִם
  chosen: from the heads of the sons of Ephraim
  alternatives:
  - from the chiefs of the Ephraimites
  - from the leaders of the people of Ephraim
  lexicon: HALOT
  rationale: רָאשֵׁי literally 'heads of.' Retained in a fairly formal way because
    it denotes recognized leaders. 'Sons of Ephraim' follows the Hebrew ethnonym construction;
    smoother alternatives are possible but less transparent.
- source_word: עֲזַרְיָהוּ ... בֶּרֶכְיָהוּ ... יְחִזְקִיָּהוּ ... עֲמָשָׂא
  chosen: Azariah ... Berechiah ... Hezekiah ... Amasa
  lexicon: standard transliteration conventions
  rationale: Personal names are transliterated rather than translated, per project
    philosophy.
- source_word: בֶן
  chosen: son of
  lexicon: HALOT
  rationale: Standard patronymic rendering.
- source_word: עַל
  chosen: against
  alternatives:
  - concerning
  - to confront
  lexicon: HALOT
  rationale: In this context עַל with קום conveys opposition or confrontation. 'Against'
    best fits the narrative sense that these leaders opposed the returning troops.
- source_word: הַבָּאִים
  chosen: those coming
  alternatives:
  - those who were coming
  - the ones coming
  lexicon: HALOT
  rationale: Substantival participle of בוא. 'Those coming' is concise and natural
    while preserving the participial force.
- source_word: מִן הַצָּבָא
  chosen: from the army
  alternatives:
  - from the campaign
  - from the host
  lexicon: HALOT
  rationale: צָבָא here refers to the military force/expedition. 'From the army' is
    the clearest modern rendering in context of troops returning from battle.
