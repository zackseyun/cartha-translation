id: 2CH.28.4
reference: 2 Chronicles 28:4
source:
  edition: WLC
  text: וַ/יְזַבֵּ֧חַ וַ/יְקַטֵּ֛ר בַּ/בָּמ֖וֹת וְ/עַל הַ/גְּבָע֑וֹת וְ/תַ֖חַת כָּל
    עֵ֥ץ רַעֲנָֽן־־׃
translation:
  text: He sacrificed and burned incense on the high places, on the hills, and under
    every green tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He offered sacrifices and burned offerings in smoke on the high places,
      on the hills, and under every leafy tree.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְזַבֵּחַ
  chosen: He sacrificed
  alternatives:
  - He offered sacrifices
  lexicon: HALOT
  rationale: The piel wayyiqtol of זבח denotes performing sacrifice. 'He sacrificed'
    is concise and natural; 'offered sacrifices' is a valid fuller alternative but
    not necessary in English.
- source_word: וַיְקַטֵּר
  chosen: and burned incense
  alternatives:
  - and made offerings smoke
  - and burned offerings
  lexicon: HALOT
  rationale: The piel of קטר commonly refers to burning incense or making sacrificial
    smoke ascend. In this idolatrous worship setting, 'burned incense' is the most
    idiomatic and likely sense in modern English.
- source_word: בַּבָּמוֹת
  chosen: on the high places
  alternatives:
  - at the high places
  lexicon: HALOT
  rationale: בָּמוֹת refers to local cultic shrines, traditionally rendered 'high
    places.' This preserves the technical religious sense familiar in the Former Prophets/Chronicles.
    'On' follows the Hebrew preposition and standard English biblical usage.
- source_word: וְעַל הַגְּבָעוֹת
  chosen: on the hills
  alternatives:
  - upon the hills
  lexicon: HALOT
  rationale: גְּבָעוֹת is the ordinary term for hills. The phrase likely expands the
    description of illicit worship locations beyond the technical 'high places.' 'On
    the hills' is clear and natural.
- source_word: וְתַחַת כָּל עֵץ רַעֲנָן
  chosen: and under every green tree
  alternatives:
  - and under every leafy tree
  - and under every flourishing tree
  lexicon: HALOT
  rationale: This is a stock expression for pagan worship sites. רַעֲנָן literally
    denotes luxuriant/fresh/green vegetation. 'Green tree' preserves the idiom and
    imagery better than a more interpretive paraphrase.
