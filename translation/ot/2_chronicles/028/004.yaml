theological_decisions:
- issue: Rendering of cultic-location idiom associated with illicit worship
  chosen_reading: Preserve the conventional phrase 'high places' and the stock expression
    'under every green tree' without softening or paraphrasing.
  alternative_readings:
  - Translate more dynamically as 'at pagan shrines' or 'under every leafy tree'
  rationale: The Hebrew uses established cultic language that signals unauthorized/idolatrous
    worship. Retaining these phrases preserves intertextual resonance across the Old
    Testament while remaining understandable in modern English.
  doctrine_reference: Translation philosophy §§1, 5, 6
