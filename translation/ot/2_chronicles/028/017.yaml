id: 2CH.28.17
reference: 2 Chronicles 28:17
source:
  edition: WLC
  text: וְ/ע֥וֹד אֲדוֹמִ֖ים בָּ֑אוּ וַ/יַּכּ֥וּ בִ/יהוּדָ֖ה וַ/יִּשְׁבּוּ שֶֽׁבִי־׃
translation:
  text: The Edomites had also come and attacked Judah and carried away captives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came and struck Judah and took captives.' The Hebrew uses the common
      military verb 'strike' and a cognate expression for taking captivity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעוֹד
  chosen: had also
  alternatives:
  - also
  - again
  - furthermore
  lexicon: HALOT
  rationale: The conjunction plus עוֹד adds another item in the sequence of hostile
    actions against Ahaz/Judah. 'Had also' fits the narrative context in English,
    signaling an additional event relative to the surrounding report.
- source_word: אֲדוֹמִים
  chosen: the Edomites
  alternatives:
  - Edom
  lexicon: HALOT
  rationale: The plural gentilic refers to the people of Edom, not merely the territory.
    English idiom normally renders this as 'the Edomites.'
- source_word: בָּאוּ
  chosen: had come
  alternatives:
  - came
  lexicon: HALOT
  rationale: The qatal form reports the event as a completed action. In English narrative,
    'had come' works smoothly with the surrounding sequence and with 'also' to mark
    this as another incursion.
- source_word: וַיַּכּוּ
  chosen: attacked
  alternatives:
  - struck
  - defeated
  - smote
  lexicon: HALOT
  rationale: The verb נכה literally means 'strike,' but in military context it commonly
    denotes an armed attack or defeat. 'Attacked' is clear modern English and avoids
    implying a total victory that the Hebrew does not explicitly state.
- source_word: בִיהוּדָה
  chosen: Judah
  alternatives:
  - in Judah
  - against Judah
  lexicon: HALOT
  rationale: The preposition ב can be rendered variously in this context. With a military
    verb, English idiom prefers 'attacked Judah' rather than the more wooden 'struck
    in Judah.' 'Against Judah' is possible, but the direct-object style is more natural
    in English while preserving the sense.
- source_word: וַיִּשְׁבּוּ
  chosen: carried away
  alternatives:
  - took
  - led away captive
  lexicon: HALOT
  rationale: From שׁבה, 'take captive.' Because the following noun is cognate ('captivity/captive
    group'), English benefits from expressing the verbal idea as 'carried away' to
    avoid awkward repetition while preserving the sense of seizure into captivity.
- source_word: שֶׁבִי
  chosen: captives
  alternatives:
  - a captivity
  - prisoners
  - a band of captives
  lexicon: HALOT
  rationale: The noun denotes captives/captivity. In combination with the preceding
    verb, idiomatic English is 'carried away captives.' This preserves the military
    sense without the unnatural literalism of 'captured a captivity.'
