id: 2CH.28.22
reference: 2 Chronicles 28:22
source:
  edition: WLC
  text: וּ/בְ/עֵת֙ הָצֵ֣ר ל֔/וֹ וַ/יּ֖וֹסֶף לִ/מְע֣וֹל בַּ/יהוָ֑ה ה֖וּא הַ/מֶּ֥לֶךְ
    אָחָֽז׃
translation:
  text: In the time of his distress, he continued to act unfaithfully against the
    LORD—he, King Ahaz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''added to act unfaithfully against the LORD,'' an idiom meaning
      he continued or went further in unfaithfulness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְעֵת
  chosen: In the time of
  alternatives:
  - At the time of
  - During
  lexicon: HALOT
  rationale: The prepositional phrase marks temporal setting. 'In the time of' is
    natural English and preserves the formal temporal sense better than the looser
    'during'.
- source_word: הָצֵר לוֹ
  chosen: his distress
  alternatives:
  - when he was in distress
  - his being hard-pressed
  - his trouble
  lexicon: HALOT
  rationale: From צרר/צור in the passive-like form with לּוֹ, the sense is that distress
    came upon him or he was under pressure. 'His distress' is concise and idiomatic
    in English while preserving the noun-like temporal construction.
- source_word: וַיּוֹסֶף
  chosen: he continued
  alternatives:
  - he added
  - he went on
  - he increased
  lexicon: HALOT
  rationale: יסף plus infinitive commonly means to continue or do further. 'He continued'
    best conveys the idiom in natural English; 'he added' would be too wooden here.
- source_word: לִמְעוֹל
  chosen: to act unfaithfully
  alternatives:
  - to trespass
  - to be unfaithful
  - to deal treacherously
  lexicon: HALOT
  rationale: מעל denotes breach of faith, often covenantal or cultic unfaithfulness.
    'Act unfaithfully' captures the verbal force and moral-religious dimension better
    than the archaic 'trespass'.
- source_word: בַּיהוָה
  chosen: against the LORD
  alternatives:
  - against Yahweh
  - toward the LORD
  lexicon: HALOT
  rationale: With מעל, the preposition marks the one against whom the unfaithfulness
    is committed. Per doctrine, יהוה is rendered 'the LORD' rather than 'Yahweh' in
    the main text.
- source_word: הוּא
  chosen: he
  alternatives:
  - that same one
  - indeed he
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. In English, the emphasis is best
    carried by the appositional dash construction rather than an overly explicit pronoun
    gloss.
- source_word: הַמֶּלֶךְ אָחָז
  chosen: King Ahaz
  alternatives:
  - the king, Ahaz
  - Ahaz the king
  lexicon: HALOT
  rationale: The phrase is appositional and identifies the shocking subject emphatically.
    'King Ahaz' is idiomatic English; the dash before it preserves the Hebrew's emphatic
    identification.
