id: 2CH.25.12
reference: 2 Chronicles 25:12
source:
  edition: WLC
  text: וַ/עֲשֶׂ֨רֶת אֲלָפִ֜ים חַיִּ֗ים שָׁבוּ֙ בְּנֵ֣י יְהוּדָ֔ה וַ/יְבִיא֖וּ/ם לְ/רֹ֣אשׁ
    הַ/סָּ֑לַע וַ/יַּשְׁלִיכ֛וּ/ם מֵֽ/רֹאשׁ הַ/סֶּ֖לַע וְ/כֻלָּ֥/ם נִבְקָֽעוּ־׃ס
translation:
  text: And the sons of Judah captured ten thousand alive, brought them to the top
    of the cliff, and threw them down from the top of the cliff, so that all of them
    were dashed to pieces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rock' or 'the crag' for 'the cliff' (Hebrew selaʿ).
    reason: lexical_alternative
  - marker: b
    text: Literally, 'all of them were split open' or 'broken apart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁבוּ
  chosen: captured
  alternatives:
  - took captive
  - seized
  lexicon: HALOT
  rationale: In context with חַיִּים ('alive'), the verb denotes taking prisoners
    alive rather than merely 'returning' (a different sense of the same root in other
    stems/contexts). 'Captured' is natural modern English and fits the military context.
- source_word: חַיִּים
  chosen: alive
  alternatives:
  - living
  lexicon: HALOT
  rationale: Adverbial/predicative use after the numeral phrase indicates that these
    ten thousand were taken alive, not killed in battle.
- source_word: וַיְבִיאוּם
  chosen: brought them
  alternatives:
  - led them
  lexicon: HALOT
  rationale: The verb בוא in the hiphil commonly means 'bring.' 'Led them' is possible
    in context, but 'brought them' is the broader and more direct rendering.
- source_word: לְרֹאשׁ
  chosen: to the top of
  alternatives:
  - to the summit of
  - to the head of
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' but with a geographical feature it idiomatically
    means 'top' or 'summit.' 'Top of' is clear modern English.
- source_word: הַסָּלַע / הַסֶּלַע
  chosen: the cliff
  alternatives:
  - the rock
  - the crag
  lexicon: HALOT
  rationale: סֶלַע often denotes a rocky crag or cliff rather than a small stone.
    Because the action is throwing prisoners down from its top, 'cliff' best conveys
    the sense in idiomatic English.
- source_word: וַיַּשְׁלִיכוּם
  chosen: threw them down
  alternatives:
  - cast them down
  - hurled them
  lexicon: HALOT
  rationale: The verb שלך means 'throw/cast.' Adding 'down' is warranted by the following
    phrase 'from the top of the cliff' and makes the motion explicit in natural English.
- source_word: נִבְקָעוּ
  chosen: were dashed to pieces
  alternatives:
  - were split open
  - were broken apart
  lexicon: HALOT
  rationale: The niphal of בקע means 'be split open' or 'be broken apart.' In this
    narrative context of bodies thrown from a height, 'were dashed to pieces' communicates
    the result idiomatically without softening the violence.
- source_word: וְכֻלָּם
  chosen: all of them
  alternatives:
  - all
  lexicon: HALOT
  rationale: The pronoun suffix is explicit in Hebrew; 'all of them' preserves the
    totality and referential force.
