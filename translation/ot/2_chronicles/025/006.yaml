id: 2CH.25.6
reference: 2 Chronicles 25:6
source:
  edition: WLC
  text: וַ/יִּשְׂכֹּ֣ר מִ/יִּשְׂרָאֵ֗ל מֵ֥אָה אֶ֛לֶף גִּבּ֥וֹר חָ֖יִל בְּ/מֵאָ֥ה כִכַּר
    כָּֽסֶף־׃
translation:
  text: And he hired from Israel one hundred thousand mighty men of valor for one
    hundred talents of silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'valiant warriors' or 'mighty warriors.' The Hebrew expression denotes
      capable fighting men.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂכֹּר
  chosen: he hired
  alternatives:
  - he hired mercenaries
  - he enlisted for pay
  lexicon: HALOT
  rationale: The verb שׂכר in the Qal commonly means to hire for wages. 'He hired'
    is the plain sense and avoids adding 'mercenaries,' which is interpretive though
    contextually plausible.
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - out of Israel
  lexicon: HALOT
  rationale: The preposition מן marks source/origin. 'From Israel' is natural English
    and here refers to the northern kingdom as the source of the hired troops.
- source_word: מֵאָה אֶלֶף
  chosen: one hundred thousand
  lexicon: HALOT
  rationale: This is the straightforward cardinal number construction and should be
    rendered directly.
- source_word: גִּבּוֹר חָיִל
  chosen: mighty men of valor
  alternatives:
  - valiant warriors
  - mighty warriors
  - able-bodied fighting men
  lexicon: HALOT
  rationale: The collocation often denotes strong, valiant fighting men. 'Mighty men
    of valor' preserves the Hebrew flavor and military sense without over-paraphrase.
- source_word: בְּמֵאָה כִכַּר כָּסֶף
  chosen: for one hundred talents of silver
  alternatives:
  - at the cost of one hundred talents of silver
  - with one hundred talents of silver
  lexicon: HALOT
  rationale: The preposition ב here expresses price/payment. 'For one hundred talents
    of silver' is concise and idiomatic, preserving the ancient unit 'talents' rather
    than converting it.
