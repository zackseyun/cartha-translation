theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD,' following the
    stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of Amaziah's devotion
  chosen_reading: not with a whole heart
  alternative_readings:
  - not with a perfect heart
  - not wholeheartedly
  rationale: 'The Hebrew critiques the completeness of his inner devotion without
    specifying hypocrisy in stronger terms. The chosen wording preserves the theological
    tension: outwardly right action, inwardly incomplete loyalty.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension
    rather than resolve it
