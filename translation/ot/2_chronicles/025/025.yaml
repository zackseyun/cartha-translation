id: 2CH.25.25
reference: 2 Chronicles 25:25
source:
  edition: WLC
  text: וַ/יְחִ֨י אֲמַצְיָ֤הוּ בֶן יוֹאָשׁ֙ מֶ֣לֶךְ יְהוּדָ֔ה אַחֲרֵ֣י מ֔וֹת יוֹאָ֥שׁ
    בֶּן יְהוֹאָחָ֖ז מֶ֣לֶךְ יִשְׂרָאֵ֑ל חֲמֵ֥שׁ עֶשְׂרֵ֖ה שָׁנָֽה־־׃
translation:
  text: Amaziah son of Joash, king of Judah, lived fifteen years after the death of
    Joash son of Jehoahaz, king of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''lived ... fifteen years after the death of Joash.'' The sense
      is that Amaziah outlived Joash of Israel by fifteen years.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - survived
  - remained alive
  lexicon: HALOT
  rationale: The wayyiqtol of חיה here reports continued life for a span of years.
    'Lived' is the most natural English rendering in this chronological notice; 'survived'
    is possible but slightly more interpretive.
- source_word: אֲמַצְיָהוּ
  chosen: Amaziah
  rationale: Standard English transliteration of the personal name, following the
    translation philosophy to transliterate names.
- source_word: בֶן
  chosen: son of
  alternatives:
  - son
  lexicon: HALOT
  rationale: In genealogical identification, 'son of' is idiomatic and clear in English.
- source_word: יוֹאָשׁ
  chosen: Joash
  alternatives:
  - Jehoash
  rationale: Standard English form of the name. Although the same Hebrew name can
    be represented as 'Jehoash' in some traditions, 'Joash' is common and clear; the
    verse distinguishes the two Joashes by patronymic and kingdom.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Straightforward construct chain indicating royal office over Judah.
- source_word: אַחֲרֵי מוֹת
  chosen: after the death of
  alternatives:
  - after ... died
  lexicon: HALOT
  rationale: The Hebrew uses the noun 'death' with the preposition 'after.' 'After
    the death of' preserves the nominal construction more closely than recasting it
    verbally.
- source_word: יְהוֹאָחָז
  chosen: Jehoahaz
  rationale: Standard English transliteration of the personal name.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  lexicon: HALOT
  rationale: Straightforward construct chain indicating royal office over Israel.
- source_word: חֲמֵשׁ עֶשְׂרֵה שָׁנָה
  chosen: fifteen years
  lexicon: HALOT
  rationale: Standard English rendering of the numeral phrase; placed after 'lived'
    to produce natural English while preserving the chronological statement.
