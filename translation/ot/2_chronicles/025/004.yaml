id: 2CH.25.4
reference: 2 Chronicles 25:4
source:
  edition: WLC
  text: וְ/אֶת בְּנֵי/הֶ֖ם לֹ֣א הֵמִ֑ית כִּ֣י כַ/כָּת֣וּב בַּ/תּוֹרָ֡ה בְּ/סֵ֣פֶר
    מֹשֶׁה֩ אֲשֶׁר צִוָּ֨ה יְהוָ֜ה לֵ/אמֹ֗ר לֹא יָמ֨וּתוּ אָב֤וֹת עַל בָּנִים֙ וּ/בָנִים֙
    לֹא יָמ֣וּתוּ עַל אָב֔וֹת כִּ֛י אִ֥ישׁ בְּ/חֶטְא֖/וֹ יָמֽוּתוּ־־־־־־׃פ
translation:
  text: But he did not put their sons to death, because it is written in the Law,
    in the Book of Moses, where the LORD commanded, saying, “Fathers shall not be
    put to death for sons, and sons shall not be put to death for fathers, but each
    man shall die for his own sin.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “fathers shall not die for sons, and sons shall not
      die for fathers.” The Hebrew legal idiom is rendered in the main text as “be
      put to death” to make the judicial sense clear.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת בְּנֵיהֶם
  chosen: But ... their sons
  alternatives:
  - And ... their sons
  - But ... their children
  lexicon: HALOT
  rationale: The conjunction with the object marker introduces contrast with the previous
    verse's execution of the assassins, so 'But' best captures the discourse flow.
    בְּנֵיהֶם is literally 'their sons'; 'sons' is retained rather than the broader
    'children' because the Hebrew is specifically male plural and the context is a
    legal citation.
- source_word: לֹא הֵמִית
  chosen: he did not put to death
  alternatives:
  - he did not kill
  - he did not execute
  lexicon: HALOT
  rationale: The Hiphil of מות is causative, so 'put to death' reflects the formal
    legal/judicial sense better than the simpler 'kill.' 'Execute' is possible, but
    the verse then quotes a legal principle more broadly, so 'put to death' is both
    accurate and readable.
- source_word: כִּי כַכָּתוּב
  chosen: because it is written
  alternatives:
  - for as it is written
  - because, as written
  lexicon: HALOT
  rationale: This introduces the reason for Amaziah's action by appeal to Scripture.
    'Because it is written' is idiomatic and preserves the causal force of כִּי and
    the comparative sense of כַּ.
- source_word: בַּתּוֹרָה בְּסֵפֶר מֹשֶׁה
  chosen: in the Law, in the Book of Moses
  alternatives:
  - in the law of the book of Moses
  - in the Torah, in the Book of Moses
  lexicon: HALOT
  rationale: תּוֹרָה is rendered 'Law' for accessible English in this historical citation
    formula, while preserving the scriptural-legal sense. 'Book of Moses' is kept
    formally. 'Torah' would be possible but is less natural for the target audience
    in running text.
- source_word: אֲשֶׁר צִוָּה יְהוָה
  chosen: where the LORD commanded
  alternatives:
  - which the LORD commanded
  - as the LORD commanded
  lexicon: HALOT
  rationale: The relative clause modifies the Mosaic book/law citation. 'Where the
    LORD commanded' reads naturally in English while preserving the sense that this
    written instruction is divine command. יְהוָה follows the doctrinal default 'the
    LORD'.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  - thus
  lexicon: HALOT
  rationale: Standard citation formula introducing the quoted command.
- source_word: לֹא יָמֻתוּ אָבוֹת עַל בָּנִים
  chosen: Fathers shall not be put to death for sons
  alternatives:
  - Fathers shall not die because of sons
  - Fathers shall not be put to death on account of children
  lexicon: HALOT
  rationale: The passive/jussive-like legal formulation is best represented by 'shall
    not be put to death.' עַל here expresses liability or account, rendered 'for.'
    'Sons' is retained for lexical fidelity to בָּנִים.
- source_word: וּבָנִים לֹא יָמֻתוּ עַל אָבוֹת
  chosen: and sons shall not be put to death for fathers
  alternatives:
  - and sons shall not die because of fathers
  - and children shall not be put to death for fathers
  lexicon: HALOT
  rationale: Mirrors the first clause for legal symmetry and preserves the specific
    familial terms in Hebrew.
- source_word: כִּי אִישׁ בְּחֶטְאוֹ יָמֻתוּ
  chosen: but each man shall die for his own sin
  alternatives:
  - but a man shall die for his own sin
  - but each shall be put to death for his own sin
  lexicon: HALOT
  rationale: אִישׁ is singular and representative; 'each man' preserves the gender-accurate
    singular while conveying distributive force. בְּחֶטְאוֹ is 'for/in his sin'; 'for
    his own sin' makes the legal principle explicit in natural English. Although the
    final verb is plural in form, the sense is distributive, so singular English is
    appropriate.
