id: 2CH.25.3
reference: 2 Chronicles 25:3
source:
  edition: WLC
  text: וַ/יְהִ֕י כַּ/אֲשֶׁ֛ר חָזְקָ֥ה הַ/מַּמְלָכָ֖ה עָלָ֑י/ו וַֽ/יַּהֲרֹג֙ אֶת עֲבָדָ֔י/ו
    הַ/מַּכִּ֖ים אֶת הַ/מֶּ֥לֶךְ אָבִֽי/ו־־׃
translation:
  text: Now when the kingdom was firmly in his hand, he killed his servants who had
    struck down the king his father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'when the kingdom was established under his control.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  chosen: Now when
  alternatives:
  - And it happened when
  - when
  lexicon: HALOT
  rationale: The narrative formula introduces the next event. 'Now when' preserves
    the temporal transition in readable modern English without over-literal awkwardness.
- source_word: חָזְקָה
  chosen: was firmly
  alternatives:
  - grew strong
  - became strong
  - was established
  lexicon: HALOT
  rationale: The verb חזק in this context describes the consolidation/strengthening
    of royal rule rather than physical strength. 'Was firmly' works idiomatically
    with 'in his hand' to express secure control.
- source_word: הַמַּמְלָכָה
  chosen: the kingdom
  alternatives:
  - the kingship
  - the royal rule
  lexicon: HALOT
  rationale: ממלכה can denote kingdom or reign/royal rule. 'The kingdom' is the most
    natural English rendering here and, with the following phrase, conveys the realm/government
    under his control.
- source_word: עָלָיו
  chosen: in his hand
  alternatives:
  - upon him
  - under his control
  - over him
  lexicon: HALOT
  rationale: Although literally 'upon him,' the idiom with strengthened rule is best
    represented by 'in his hand,' an English expression that preserves the concrete
    metaphor of possession/control better than a fully flattened dynamic rendering.
- source_word: וַיַּהֲרֹג
  chosen: he killed
  alternatives:
  - he put to death
  - he slew
  lexicon: HALOT
  rationale: A straightforward rendering of הרג. 'Killed' is clear, modern, and sufficiently
    weighty.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his slaves
  lexicon: HALOT
  rationale: In a royal court context, עבד often refers to servants/officials in the
    king's service. 'Servants' is the best default here; 'slaves' would overstate
    bonded status, and 'officials' may be too narrow.
- source_word: הַמַּכִּים
  chosen: who had struck down
  alternatives:
  - who had killed
  - the ones who struck
  lexicon: HALOT
  rationale: The participle identifies the servants as the assassins. 'Struck down'
    preserves the violent nuance of נכה while avoiding unnecessary repetition of 'killed'
    immediately after ויהרג.
- source_word: אֶת־הַמֶּלֶךְ אָבִיו
  chosen: the king his father
  alternatives:
  - the king, his father
  - his father the king
  lexicon: HALOT
  rationale: The Hebrew apposition is preserved closely. In the final English sentence,
    'the king his father' keeps the formal tone and mirrors the Hebrew order, while
    remaining understandable.
