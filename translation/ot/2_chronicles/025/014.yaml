theological_decisions:
- issue: Rendering אֱלֹהִים/אֱלֹהֵי for pagan deities
  chosen_reading: gods
  alternative_readings:
  - divine beings
  rationale: In this context the referent is the idols/deities of Seir that Amaziah adopts for worship. 'Gods' is the natural English equivalent and avoids muting the irony and apostasy in the narrative.
