- timestamp: '2026-04-21T17:46:52Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/weighted_vocab/ot/2_chronicles/025/014.job-11190.json
  category: awkward_english
  tier: 1
  from: after Amaziah came from striking down the Edomites
  to: after Amaziah returned from striking down the Edomites
  rationale: 'The phrase ''came from striking down'' is awkward in English, as ''from'' can be misread as indicating a location rather than a preceding action. The Hebrew construction (אַחֲרֵי בּוֹא ... מֵהַכּוֹת) indicates a temporal sequence: after he came back *from the act of* striking. Using ''returned from'' or ''came back from'' clarifies this temporal relationship and is more natural English.'
