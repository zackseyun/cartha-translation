id: 2CH.25.14
reference: 2 Chronicles 25:14
source:
  edition: WLC
  text: וַ/יְהִ֗י אַחֲרֵ֨י ב֤וֹא אֲמַצְיָ֨הוּ֙ מֵֽ/הַכּ֣וֹת אֶת אֲדוֹמִ֔ים וַ/יָּבֵ֗א אֶת אֱלֹהֵי֙ בְּנֵ֣י שֵׂעִ֔יר וַ/יַּֽעֲמִידֵ֥/ם ל֖/וֹ לֵ/אלֹהִ֑ים וְ/לִ/פְנֵי/הֶ֥ם יִֽשְׁתַּחֲוֶ֖ה וְ/לָ/הֶ֥ם יְקַטֵּֽר־־׃
translation:
  text: Now it happened, after Amaziah returned from striking down the Edomites, that he brought the gods of the sons of Seir and set them up for himself as gods; and before them he bowed down and to them he burned incense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the gods of the people of Seir.' The Hebrew reads 'the gods of the sons of Seir.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he prostrated himself before them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'after Amaziah came from striking down the Edomites'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now it happened
  alternatives:
  - And it happened
  - Then it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new episode. 'Now it happened' is natural modern English while preserving the Hebrew narrative transition.
- source_word: אַחֲרֵי בּוֹא
  chosen: after ... came
  alternatives:
  - after ... returned
  - after the coming of
  lexicon: HALOT
  rationale: The construction marks subsequent time after Amaziah's arrival. 'Came' is the plain sense of בוא; 'returned' is possible by context but less directly lexical.
- source_word: מֵהַכּוֹת אֶת אֲדוֹמִים
  chosen: from striking down the Edomites
  alternatives:
  - from defeating the Edomites
  - after he had struck down the Edomites
  lexicon: HALOT
  rationale: נכה commonly means 'strike, strike down, smite.' 'Striking down' preserves the verbal force without over-specifying the extent of slaughter; 'defeating' is smoother but less concrete.
- source_word: אֱלֹהֵי בְּנֵי שֵׂעִיר
  chosen: the gods of the sons of Seir
  alternatives:
  - the gods of the people of Seir
  - the gods of the sons of Seir
  lexicon: HALOT
  rationale: אֱלֹהֵי is plural here and refers to pagan deities, so 'gods' is required. בְּנֵי שֵׂעִיר is rendered formally as 'sons of Seir'; a more idiomatic 'people of Seir' is possible, but the main text preserves the Hebrew kinship expression.
- source_word: וַיַּעֲמִידֵם לוֹ לֵאלֹהִים
  chosen: set them up for himself as gods
  alternatives:
  - appointed them for himself as gods
  - made them his gods
  lexicon: HALOT
  rationale: עמד in Hiphil here means to set/place/establish. 'Set them up for himself as gods' captures both the physical installation of idols and the functional sense that he adopted them as his gods. 'Made them his gods' is interpretive and less tied to the verb.
- source_word: וְלִפְנֵיהֶם יִשְׁתַּחֲוֶה
  chosen: before them he bowed down
  alternatives:
  - he prostrated himself before them
  - he worshiped before them
  lexicon: HALOT
  rationale: השתחוה denotes bowing/prostration, often in worship. 'Bowed down' preserves the physical act; the worship sense is reinforced by the context and the following incense offering.
- source_word: וְלָהֶם יְקַטֵּר
  chosen: to them he burned incense
  alternatives:
  - to them he made offerings of incense
  - to them he offered incense
  lexicon: HALOT
  rationale: קטר in Piel commonly refers to burning incense or making a smoke offering. 'Burned incense' is concise and standard; 'offered incense' is possible but slightly less literal.
