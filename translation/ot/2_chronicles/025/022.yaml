id: 2CH.25.22
reference: 2 Chronicles 25:22
source:
  edition: WLC
  text: וַ/יִּנָּ֥גֶף יְהוּדָ֖ה לִ/פְנֵ֣י יִשְׂרָאֵ֑ל וַ/יָּנֻ֖סוּ אִ֥ישׁ לְ/אֹהָלָֽי/ו׃
translation:
  text: And Judah was defeated before Israel, and each man fled to his tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''each man to his tent,'' an idiom for dispersing and retreating
      to one''s own place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּנָּגֶף
  chosen: was defeated
  alternatives:
  - was struck down
  - was routed
  - was beaten
  lexicon: HALOT
  rationale: The Niphal of נָגַף here denotes being beaten or defeated in battle rather
    than merely being physically struck. 'Was defeated' is clear modern English and
    fits the military context.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Proper name for the southern kingdom; transliterated according to the
    translation philosophy.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - by
  lexicon: HALOT
  rationale: In battle contexts, לִפְנֵי commonly expresses being overcome 'before'
    an opponent, idiomatically indicating defeat at their hands. 'Before' preserves
    the Hebrew expression while remaining natural in English.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name for the northern kingdom; transliterated according to the
    translation philosophy.
- source_word: וַיָּנֻסוּ
  chosen: fled
  alternatives:
  - ran away
  - took flight
  lexicon: HALOT
  rationale: The verb נוּס means to flee. 'Fled' is concise, natural, and appropriately
    formal for narrative prose.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - every man
  - each one
  lexicon: HALOT
  rationale: The distributive singular אִישׁ with the following phrase means each
    individual person. Because the Hebrew is grammatically masculine and refers to
    male combatants in context, 'each man' is gender-accurate and preserves the source
    form.
- source_word: לְאֹהָלָיו
  chosen: to his tent
  alternatives:
  - to his home
  - to his own tent
  lexicon: HALOT
  rationale: Literally 'to his tents/tent.' In this idiom, it refers to dispersing
    back to one's own dwelling or encampment. 'To his tent' preserves the Hebrew imagery
    and the singular possessive sense in English.
