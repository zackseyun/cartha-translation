id: 2CH.25.27
reference: 2 Chronicles 25:27
source:
  edition: WLC
  text: וּ/מֵ/עֵ֗ת אֲשֶׁר סָ֤ר אֲמַצְיָ֨הוּ֙ מֵ/אַחֲרֵ֣י יְהוָ֔ה וַ/יִּקְשְׁר֨וּ עָלָ֥י/ו
    קֶ֛שֶׁר בִּ/ירוּשָׁלִַ֖ם וַ/יָּ֣נָס לָכִ֑ישָׁ/ה וַ/יִּשְׁלְח֤וּ אַחֲרָי/ו֙ לָכִ֔ישָׁ/ה
    וַ/יְמִיתֻ֖/הוּ שָֽׁם־׃
translation:
  text: Now from the time that Amaziah turned away from following the LORD, they conspired
    against him in Jerusalem, and he fled to Lachish; but they sent after him to Lachish
    and put him to death there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''turned away from after the LORD,'' an idiom meaning he ceased
      following the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵעֵת אֲשֶׁר
  chosen: Now from the time that
  alternatives:
  - And from the time that
  - From the time when
  lexicon: HALOT
  rationale: Temporal marker introducing the point from which the subsequent conspiracy
    began. 'Now' smoothly carries the Hebrew waw in narrative context without over-literalness.
- source_word: סָר
  chosen: turned away
  alternatives:
  - departed
  - turned aside
  lexicon: HALOT
  rationale: The verb denotes apostasy or deviation here, not mere physical departure.
    'Turned away' communicates religious defection in readable English.
- source_word: מֵאַחֲרֵי יְהוָה
  chosen: from following the LORD
  alternatives:
  - from after the LORD
  - from the LORD
  lexicon: HALOT
  rationale: The idiom literally means 'from after YHWH' and commonly signifies ceasing
    to follow him. 'From following the LORD' preserves the covenantal sense better
    than the flatter 'from the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: וַיִּקְשְׁרוּ עָלָיו קֶשֶׁר
  chosen: they conspired against him
  alternatives:
  - they made a conspiracy against him
  - they formed a plot against him
  lexicon: HALOT
  rationale: The verb-noun combination intensifies the idea of conspiracy. English
    idiom is best represented by 'they conspired against him,' which captures the
    force without awkward redundancy.
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative reference indicating where the conspiracy was
    formed.
- source_word: וַיָּנָס לָכִישָׁה
  chosen: and he fled to Lachish
  alternatives:
  - and he escaped to Lachish
  lexicon: HALOT
  rationale: Standard rendering of the verb for flight from danger. The directional
    ending on Lachish is naturally rendered 'to Lachish.'
- source_word: וַיִּשְׁלְחוּ אַחֲרָיו
  chosen: but they sent after him
  alternatives:
  - and they sent after him
  - they sent men after him
  - they pursued him
  lexicon: HALOT
  rationale: The Hebrew says literally 'sent after him'; it implies dispatching agents
    in pursuit. 'But' reflects the adversative sense in English narrative after his
    flight, while staying close to the source.
- source_word: וַיְמִיתֻהוּ
  chosen: and put him to death
  alternatives:
  - and killed him
  - and caused him to die
  lexicon: HALOT
  rationale: Hiphil of מות is causative. 'Put him to death' preserves the deliberate
    execution-like force slightly better than the simpler 'killed him.'
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Locative adverb referring back to Lachish.
