id: 2CH.25.26
reference: 2 Chronicles 25:26
source:
  edition: WLC
  text: וְ/יֶ֨תֶר֙ דִּבְרֵ֣י אֲמַצְיָ֔הוּ הָ/רִאשֹׁנִ֖ים וְ/הָ/אַחֲרוֹנִ֑ים הֲ/לֹא֙
    הִנָּ֣/ם כְּתוּבִ֔ים עַל סֵ֥פֶר מַלְכֵי יְהוּדָ֖ה וְ/יִשְׂרָאֵֽל־־׃
translation:
  text: Now the rest of the acts of Amaziah, from first to last, are they not written
    in the Book of the Kings of Judah and Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the words/deeds of Amaziah, the first and the last.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'on the Book of the Kings of Judah and Israel'; English idiom commonly
      uses 'in the Book.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר introduces the remaining material about a subject. 'The rest of'
    is the standard idiom in this formulaic closing notice; 'Now' smoothly renders
    the prefixed conjunction in readable English.
- source_word: דִּבְרֵי
  chosen: the acts of
  alternatives:
  - the words of
  - the matters concerning
  lexicon: HALOT
  rationale: Though literally 'words of,' in royal-summary formulas דִּבְרֵי commonly
    refers to the deeds/events of a king's reign. 'Acts of' best matches the historiographical
    sense in context.
- source_word: אֲמַצְיָהוּ
  chosen: Amaziah
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: הָרִאשֹׁנִים וְהָאַחֲרוֹנִים
  chosen: from first to last
  alternatives:
  - the former and the latter
  - the first and the last
  lexicon: HALOT
  rationale: This paired expression is an idiom meaning the whole span of a person's
    acts or history. 'From first to last' is natural modern English and preserves
    the totalizing sense.
- source_word: הֲלֹא
  chosen: are they not
  alternatives:
  - is it not the case that
  - behold, are they not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting a positive answer. 'Are they
    not' preserves the rhetorical force and matches English usage in this formula.
- source_word: הִנָּם
  chosen: they
  alternatives:
  - behold, they
  - indeed they
  lexicon: HALOT
  rationale: The particle with pronominal suffix adds emphasis to the assertion. In
    English the emphasis is sufficiently conveyed by the rhetorical question, so a
    simple 'they' is appropriate without overtranslating 'behold.'
- source_word: כְּתוּבִים
  chosen: written
  alternatives:
  - recorded
  - inscribed
  lexicon: HALOT
  rationale: Passive participle meaning 'written.' 'Written' keeps the formal link
    to the source while fitting the archival context.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll/book
  lexicon: HALOT
  rationale: Although עַל is literally 'on,' in this documentary formula English idiom
    prefers 'written in the Book.' 'Book' is conventional and understandable, while
    a scroll nuance is not necessary in the main text.
- source_word: מַלְכֵי יְהוּדָה וְיִשְׂרָאֵל
  chosen: of the Kings of Judah and Israel
  alternatives:
  - of the kings of Judah and Israel
  - of the royal annals of Judah and Israel
  lexicon: HALOT
  rationale: This is the title of the source document cited by the Chronicler. Capitalizing
    'Book' and 'Kings' reflects a title-like reference in English; 'Judah and Israel'
    follows the Hebrew order exactly.
