id: 2CH.25.18
reference: 2 Chronicles 25:18
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֞ח יוֹאָ֣שׁ מֶֽלֶךְ יִשְׂרָאֵ֗ל אֶל אֲמַצְיָ֣הוּ מֶֽלֶךְ יְהוּדָה֮
    לֵ/אמֹר֒ הַ/ח֜וֹחַ אֲשֶׁ֣ר בַּ/לְּבָנ֗וֹן שָׁ֠לַח אֶל הָ/אֶ֜רֶז אֲשֶׁ֤ר בַּ/לְּבָנוֹן֙
    לֵ/אמֹ֔ר תְּנָֽ/ה אֶת בִּתְּ/ךָ֥ לִ/בְנִ֖/י לְ/אִשָּׁ֑ה וַֽ/תַּעֲבֹ֞ר חַיַּ֤ת
    הַ/שָּׂדֶה֙ אֲשֶׁ֣ר בַּ/לְּבָנ֔וֹן וַ/תִּרְמֹ֖ס אֶת הַ/חֽוֹחַ־־־־־־־׃
translation:
  text: Then Joash king of Israel sent to Amaziah king of Judah, saying, “The thornbush
    that was in Lebanon sent to the cedar that was in Lebanon, saying, ‘Give your
    daughter to my son as a wife.’ But a wild beast of the field that was in Lebanon
    passed by and trampled the thornbush.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thistle' or 'briar' for 'thornbush.' The Hebrew names a thorny plant;
      the exact species is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחוֹחַ
  chosen: the thornbush
  alternatives:
  - the thistle
  - the briar
  lexicon: HALOT
  rationale: חוֹחַ denotes a thorny plant; 'thornbush' is natural modern English and
    preserves the image of a low, prickly shrub in contrast to the cedar. 'Thistle'
    is possible but can sound too specific botanically; 'briar' is also possible but
    less common.
- source_word: הָאֶרֶז
  chosen: the cedar
  lexicon: HALOT
  rationale: אֶרֶז straightforwardly refers to a cedar tree, an image of height and
    strength that sharpens the parable's contrast.
- source_word: בַּלְּבָנוֹן
  chosen: in Lebanon
  alternatives:
  - on Lebanon
  lexicon: HALOT
  rationale: The phrase identifies the setting of both plants and the beast. 'In Lebanon'
    is idiomatic English for the region/forest setting.
- source_word: שָׁלַח ... לֵאמֹר
  chosen: sent ... saying
  alternatives:
  - sent word ... saying
  - sent a message ... saying
  lexicon: HALOT
  rationale: The Hebrew repeats שלח with לאמר in both frame narrative and parable.
    'Sent ... saying' preserves the formal structure without unnecessary paraphrase.
- source_word: תְּנָה אֶת־בִּתְּךָ לִבְנִי לְאִשָּׁה
  chosen: Give your daughter to my son as a wife
  alternatives:
  - Give your daughter to my son for a wife
  lexicon: HALOT
  rationale: This is a marriage-alliance formula. 'As a wife' is clear modern English
    and preserves the relational sense of לְאִשָּׁה.
- source_word: חַיַּת הַשָּׂדֶה
  chosen: a wild beast of the field
  alternatives:
  - a beast of the field
  - a wild animal
  lexicon: HALOT
  rationale: The construct phrase refers to a wild land animal. 'Wild beast of the
    field' keeps the elevated tone and the generic force of the Hebrew.
- source_word: וַתַּעֲבֹר
  chosen: passed by
  alternatives:
  - passed through
  - went by
  lexicon: HALOT
  rationale: In context the animal moves past and incidentally crushes the thornbush.
    'Passed by' communicates that sense naturally.
- source_word: וַתִּרְמֹס
  chosen: trampled
  alternatives:
  - crushed underfoot
  - trampled down
  lexicon: HALOT
  rationale: רמס conveys treading down underfoot. 'Trampled' is concise and vivid.
- source_word: וַיִּשְׁלַח ... אֶל ... לֵאמֹר
  chosen: Then Joash king of Israel sent to Amaziah king of Judah, saying
  alternatives:
  - Then Joash king of Israel sent word to Amaziah king of Judah, saying
  lexicon: HALOT
  rationale: The introductory formula is rendered straightforwardly. 'Sent to' is
    slightly formal but reflects the Hebrew closely; the object of sending is implicitly
    a message.
