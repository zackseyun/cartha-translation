id: 2CH.25.21
reference: 2 Chronicles 25:21
source:
  edition: WLC
  text: וַ/יַּ֨עַל יוֹאָ֤שׁ מֶֽלֶךְ יִשְׂרָאֵל֙ וַ/יִּתְרָא֣וּ פָנִ֔ים ה֖וּא וַ/אֲמַצְיָ֣הוּ
    מֶֽלֶךְ יְהוּדָ֑ה בְּ/בֵ֥ית שֶׁ֖מֶשׁ אֲשֶׁ֥ר לִ/יהוּדָֽה־־׃
translation:
  text: So Joash king of Israel went up, and he and Amaziah king of Judah faced one
    another at Beth-shemesh, which belongs to Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'met face to face.' The Hebrew idiom is literally 'saw faces.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - marched up
  - advanced
  lexicon: HALOT
  rationale: עלה in narrative commonly means 'went up' or 'came up.' Here it describes
    Joash's movement to the battle encounter. 'Went up' preserves the Hebrew idiom
    without over-specifying military nuance, though a martial sense is contextually
    present.
- source_word: וַיִּתְרָאוּ פָנִים
  chosen: faced one another
  alternatives:
  - appeared before one another
  - met face to face
  lexicon: HALOT
  rationale: The idiom built from ראה with 'faces' literally suggests seeing one another
    face-to-face. In this battle context, 'faced one another' is natural English and
    preserves the confrontational sense without unnecessary paraphrase.
- source_word: הוּא וַאֲמַצְיָהוּ
  chosen: he and Amaziah
  alternatives:
  - Joash and Amaziah
  lexicon: HALOT
  rationale: 'The explicit pronoun הוּא after the verb emphasizes the two parties:
    ''he and Amaziah.'' English can retain this naturally. Since Joash is the immediately
    preceding subject, ''he'' is clear and reflects the Hebrew structure.'
- source_word: בְּבֵית שֶׁמֶשׁ
  chosen: at Beth-shemesh
  alternatives:
  - in Beth-shemesh
  lexicon: HALOT
  rationale: With a place name in a battle setting, English idiom prefers 'at Beth-shemesh'
    for the location of the encounter. The name is transliterated in keeping with
    the translation philosophy for personal and place names.
- source_word: אֲשֶׁר לִיהוּדָה
  chosen: which belongs to Judah
  alternatives:
  - which was Judah's
  - which was in Judah
  lexicon: HALOT
  rationale: The phrase marks territorial belonging. 'Which belongs to Judah' is slightly
    more formal than 'in Judah' and better reflects the possessive force of ל while
    remaining readable modern English.
- source_word: מֶלֶךְ יִשְׂרָאֵל / מֶלֶךְ יְהוּדָה
  chosen: king of Israel / king of Judah
  lexicon: HALOT
  rationale: These royal titles are rendered directly and consistently, with no need
    for expansion or abbreviation.
