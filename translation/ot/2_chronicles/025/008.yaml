id: 2CH.25.8
reference: 2 Chronicles 25:8
source:
  edition: WLC
  text: כִּ֚י אִם בֹּ֣א אַתָּ֔ה עֲשֵׂ֖ה חֲזַ֣ק לַ/מִּלְחָמָ֑ה יַכְשִֽׁילְ/ךָ֤ הָֽ/אֱלֹהִים֙
    לִ/פְנֵ֣י אוֹיֵ֔ב כִּ֥י יֶשׁ כֹּ֛חַ בֵּ/אלֹהִ֖ים לַ/עְז֥וֹר וּ/לְ/הַכְשִֽׁיל־־׃
translation:
  text: But if you do go, act resolutely for the battle; God will make you stumble
    before the enemy, for there is power in God to help and to make stumble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be strong for the battle' or 'show yourself strong in battle.'
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew repeats the same verb: God has power both ''to help'' and ''to
      make stumble.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: But if
  alternatives:
  - For if
  - However, if
  lexicon: HALOT
  rationale: The particle combination introduces a conditional contrast to the previous
    instruction. 'But if' captures the adversative force in context better than a
    simple 'for if.'
- source_word: בֹּא אַתָּה
  chosen: you do go
  alternatives:
  - you go
  - you indeed go
  lexicon: HALOT
  rationale: The infinitive-like imperative form with explicit pronoun adds emphasis.
    'Do go' preserves the marked second-person emphasis without sounding unnatural.
- source_word: עֲשֵׂה חֲזַק
  chosen: act resolutely
  alternatives:
  - be strong
  - show yourself strong
  - take courage
  lexicon: HALOT
  rationale: The idiom combines 'do/make' with 'strong.' In English, 'act resolutely'
    conveys the exhortational force in a battle setting more naturally than the wooden
    'do strong,' while avoiding overinterpretation.
- source_word: לַמִּלְחָמָה
  chosen: for the battle
  alternatives:
  - in battle
  - for war
  lexicon: HALOT
  rationale: The preposition marks purpose or sphere. 'For the battle' fits the immediate
    military context and pairs naturally with the exhortation.
- source_word: יַכְשִׁילְךָ
  chosen: will make you stumble
  alternatives:
  - will cause you to fall
  - will overthrow you
  lexicon: HALOT
  rationale: The Hiphil of כשל means to cause to stumble/fall. 'Make you stumble'
    preserves the verbal link with the same root later in the verse ('to make stumble')
    and keeps the metaphorical force.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: Although the Hebrew has the article, in this context English idiom normally
    renders it simply as 'God.'
- source_word: לִפְנֵי אוֹיֵב
  chosen: before the enemy
  alternatives:
  - before an enemy
  - in the face of the enemy
  lexicon: HALOT
  rationale: The phrase indicates being brought down in the presence of or before
    one's foe. 'Before the enemy' is the most natural idiomatic rendering.
- source_word: יֶשׁ כֹּחַ בֵּאלֹהִים
  chosen: there is power in God
  alternatives:
  - God has power
  - power belongs to God
  - there is strength with God
  lexicon: HALOT
  rationale: The Hebrew construction literally states that power exists in God. 'There
    is power in God' preserves the source structure and prepares for the paired infinitives
    that follow.
- source_word: לַעְזֹר
  chosen: to help
  alternatives:
  - to give help
  - to support
  lexicon: HALOT
  rationale: A straightforward infinitive of purpose/complement after 'power.' 'To
    help' is the plain and sufficient rendering.
- source_word: וּלְהַכְשִׁיל
  chosen: and to make stumble
  alternatives:
  - and to cause to fall
  - and to overthrow
  lexicon: HALOT
  rationale: 'Using ''make stumble'' keeps the lexical repetition with יַכְשִׁילְךָ
    visible in English, preserving the rhetorical balance: God has power both to help
    and to bring down.'
