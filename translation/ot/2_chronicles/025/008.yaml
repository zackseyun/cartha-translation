theological_decisions:
- issue: Divine agency in military defeat
  chosen_reading: The verse is rendered to state directly that God can cause defeat
    as well as give help.
  alternative_readings:
  - A softened rendering that attributes defeat only indirectly or permissively to
    God
  rationale: The Hebrew explicitly says 'God will make you stumble' and that there
    is power in God 'to help and to make stumble.' To preserve theological tension
    rather than resolve it, the translation keeps the direct divine agency expressed
    in the text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
