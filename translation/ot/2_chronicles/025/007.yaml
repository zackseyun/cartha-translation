id: 2CH.25.7
reference: 2 Chronicles 25:7
source:
  edition: WLC
  text: וְ/אִ֣ישׁ הָ/אֱלֹהִ֗ים בָּ֤א אֵלָי/ו֙ לֵ/אמֹ֔ר הַ/מֶּ֕לֶךְ אַל יָבֹ֥א עִמְּ/ךָ֖
    צְבָ֣א יִשְׂרָאֵ֑ל כִּ֣י אֵ֤ין יְהוָה֙ עִם יִשְׂרָאֵ֔ל כֹּ֖ל בְּנֵ֥י אֶפְרָֽיִם־־׃
translation:
  text: But a man of God came to him, saying, “O king, do not let the army of Israel
    go with you, for the LORD is not with Israel—all the sons of Ephraim.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all the Ephraimites.” The Hebrew reads “all the sons of Ephraim.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ הָאֱלֹהִים
  chosen: a man of God
  alternatives:
  - the man of God
  lexicon: HALOT
  rationale: The expression is an idiomatic title for a divinely commissioned messenger.
    The indefinite article fits the Hebrew construction here and reads naturally in
    English.
- source_word: בָּא אֵלָיו
  chosen: came to him
  alternatives:
  - came against him
  - entered to him
  lexicon: HALOT
  rationale: בוא with אֶל commonly means movement toward a person, so 'came to him'
    is the plain sense.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard speech-introduction formula; 'saying' preserves the Hebrew structure
    without awkwardness.
- source_word: הַמֶּלֶךְ
  chosen: O king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: In direct address, the vocative sense is best represented in English
    as 'O king' rather than the more wooden 'the king.'
- source_word: אַל יָבֹא עִמְּךָ
  chosen: do not let ... go with you
  alternatives:
  - let not ... come with you
  - do not have ... come with you
  lexicon: HALOT
  rationale: Although the verb is 'come,' in context of accompanying a military campaign
    English idiom prefers 'go with you.' The jussive with אַל is naturally rendered
    as a prohibition.
- source_word: צְבָא יִשְׂרָאֵל
  chosen: the army of Israel
  alternatives:
  - Israel's army
  - the troops of Israel
  lexicon: HALOT
  rationale: צָבָא here denotes a military force. 'The army of Israel' is clear and
    suitably formal.
- source_word: כִּי אֵין יְהוָה עִם יִשְׂרָאֵל
  chosen: for the LORD is not with Israel
  alternatives:
  - because Yahweh is not with Israel
  lexicon: HALOT
  rationale: This states the reason for the prohibition. Per doctrine, יְהוָה is rendered
    'the LORD.'
- source_word: כֹּל בְּנֵי אֶפְרָיִם
  chosen: all the sons of Ephraim
  alternatives:
  - all Ephraim
  - all the people of Ephraim
  - all the Ephraimites
  lexicon: HALOT
  rationale: The Hebrew apposition identifies 'Israel' here specifically with the
    northern kingdom represented by Ephraim. 'Sons of Ephraim' preserves the masculine
    familial wording of the source; a footnote preserves the more idiomatic ethnic
    alternative.
