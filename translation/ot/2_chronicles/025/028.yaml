id: 2CH.25.28
reference: 2 Chronicles 25:28
source:
  edition: WLC
  text: וַ/יִּשָּׂאֻ֖/הוּ עַל הַ/סּוּסִ֑ים וַֽ/יִּקְבְּר֥וּ אֹת֛/וֹ עִם אֲבֹתָ֖י/ו
    בְּ/עִ֥יר יְהוּדָֽה־־׃
translation:
  text: They carried him on horses and buried him with his fathers in the city of
    Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'upon the horses.' The Hebrew explicitly mentions horses
      in the plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂאֻהוּ
  chosen: They carried him
  alternatives:
  - They bore him
  - They lifted him
  lexicon: HALOT
  rationale: From נשׂא in the waw-consecutive plural, with 3ms object suffix. 'Carried'
    is natural modern English and fits the context of transporting a corpse.
- source_word: עַל הַסּוּסִים
  chosen: on horses
  alternatives:
  - upon the horses
  - by horse
  lexicon: HALOT
  rationale: The phrase is literally 'on the horses.' The plural should be preserved.
    Although some English versions smooth this to 'on horses' or imply a bier/charriot,
    the Hebrew explicitly mentions horses, so the translation keeps that image without
    over-interpreting.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  chosen: and buried him
  alternatives:
  - and they buried him
  lexicon: HALOT
  rationale: Straightforward rendering of קבר with object marker and suffix. English
    can omit the repeated subject pronoun naturally.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: Literally 'with his fathers.' This is a conventional burial formula.
    'Fathers' preserves the Hebrew idiom and dynastic/familial sense better than the
    more interpretive 'ancestors.'
- source_word: בְּעִיר יְהוּדָה
  chosen: in the city of Judah
  alternatives:
  - in Judah's city
  - in the city of David
  lexicon: HALOT
  rationale: The Masoretic Text reads 'in the city of Judah.' The translation follows
    the given Hebrew text directly. 'City of David' is not the reading here and should
    not be imported from parallel phrasing elsewhere.
