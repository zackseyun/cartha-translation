theological_decisions:
- issue: Burial formula and location wording
  chosen_reading: Follow the MT wording 'in the city of Judah' without harmonizing
    to more familiar formulas.
  alternative_readings:
  - Interpret or emend to 'in the city of David'
  - Generalize to 'in Judah'
  rationale: This is not a doctrinally contested issue, but it is a significant translation
    decision. The source text as provided says 'city of Judah,' and optimal equivalence
    favors preserving the wording rather than normalizing it to a more expected expression.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
