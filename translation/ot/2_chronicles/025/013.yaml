id: 2CH.25.13
reference: 2 Chronicles 25:13
source:
  edition: WLC
  text: וּ/בְנֵ֣י הַ/גְּד֗וּד אֲשֶׁ֨ר הֵשִׁ֤יב אֲמַצְיָ֨הוּ֙ מִ/לֶּ֤כֶת עִמּ/וֹ֙ לַ/מִּלְחָמָ֔ה
    וַֽ/יִּפְשְׁטוּ֙ בְּ/עָרֵ֣י יְהוּדָ֔ה מִ/שֹּׁמְר֖וֹן וְ/עַד בֵּ֣ית חוֹר֑וֹן וַ/יַּכּ֤וּ
    מֵ/הֶם֙ שְׁלֹ֣שֶׁת אֲלָפִ֔ים וַ/יָּבֹ֖זּוּ בִּזָּ֥ה רַבָּֽה־׃ס
translation:
  text: But the men of the troop whom Amaziah had sent back from going with him to
    battle raided the cities of Judah, from Samaria to Beth-horon, and struck down
    three thousand of them and took much plunder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from Samaria as far as Beth-horon.' The Hebrew expression marks the
      extent of the raid.
    reason: lexical_alternative
  - marker: b
    text: Or 'killed three thousand of them.' The Hebrew verb can be rendered more
      explicitly in a battle context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי הַגְּדוּד
  chosen: the men of the troop
  alternatives:
  - the sons of the band
  - the soldiers of the division
  - the members of the raiding party
  lexicon: HALOT
  rationale: Literally 'sons of the troop/band.' In English, 'men of the troop' conveys
    the idiomatic sense of members of the military unit without woodenly preserving
    'sons.' 'Troop' fits גְּדוּד as a military band/unit in this context.
- source_word: אֲשֶׁר הֵשִׁיב אֲמַצְיָהוּ
  chosen: whom Amaziah had sent back
  alternatives:
  - whom Amaziah had turned back
  - whom Amaziah had sent home
  lexicon: HALOT
  rationale: הֵשִׁיב from שוב in the Hiphil means 'cause to return.' 'Sent back' is
    natural English and matches the narrative context of dismissing hired troops.
- source_word: מִלֶּכֶת עִמּוֹ לַמִּלְחָמָה
  chosen: from going with him to battle
  alternatives:
  - from accompanying him to the war
  - from going with him to the battle
  lexicon: HALOT
  rationale: This infinitive construction expresses prevention from accompanying Amaziah
    in the campaign. 'To battle' is concise and idiomatic.
- source_word: וַיִּפְשְׁטוּ
  chosen: raided
  alternatives:
  - made a raid on
  - invaded
  - plundered
  lexicon: HALOT
  rationale: פשט in this military stem commonly denotes making a raid. 'Raided' captures
    the hostile incursion better than the broader 'went into' or the overly result-focused
    'plundered.'
- source_word: בְּעָרֵי יְהוּדָה
  chosen: the cities of Judah
  alternatives:
  - the towns of Judah
  lexicon: HALOT
  rationale: עָרִים is the standard term for cities/towns. 'Cities' is retained as
    the more formal and common biblical rendering.
- source_word: מִשֹּׁמְרוֹן וְעַד בֵּית חוֹרוֹן
  chosen: from Samaria to Beth-horon
  alternatives:
  - from Samaria as far as Beth-horon
  lexicon: HALOT
  rationale: The phrase marks the geographical extent of the raid. 'From Samaria to
    Beth-horon' is straightforward and preserves the place names by transliteration.
- source_word: וַיַּכּוּ מֵהֶם
  chosen: struck down three thousand of them
  alternatives:
  - killed three thousand of them
  - smote three thousand among them
  lexicon: HALOT
  rationale: נכה is a broad verb for striking, often with lethal effect in battle.
    'Struck down' preserves that martial sense without over-specifying beyond the
    context, though death is clearly implied.
- source_word: שְׁלֹשֶׁת אֲלָפִים
  chosen: three thousand
  lexicon: HALOT
  rationale: Direct numerical rendering.
- source_word: וַיָּבֹזּוּ בִּזָּה רַבָּה
  chosen: took much plunder
  alternatives:
  - carried off abundant spoil
  - seized a great amount of loot
  lexicon: HALOT
  rationale: 'The cognate construction intensifies the action: they plundered a great
    plunder. ''Took much plunder'' is natural English that preserves the emphasis
    without awkward repetition.'
