id: 2CH.25.15
reference: 2 Chronicles 25:15
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֥ף יְהוָ֖ה בַּ/אֲמַצְיָ֑הוּ וַ/יִּשְׁלַ֤ח אֵלָי/ו֙ נָבִ֔יא וַ/יֹּ֣אמֶר ל֗/וֹ לָ֤/מָּה דָרַ֨שְׁתָּ֙ אֶת אֱלֹהֵ֣י הָ/עָ֔ם אֲשֶׁ֛ר לֹא הִצִּ֥ילוּ אֶת עַמָּ֖/ם מִ/יָּדֶֽ/ךָ־־־־׃
translation:
  text: Then Yahweh’s anger burned against Amaziah, and he sent a prophet to him, who said to him, “Why have you sought the gods of the people who did not deliver their people from your hand?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'consulted' or 'inquired of' the gods of the people.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  chosen: the LORD’s anger burned
  alternatives:
  - the anger of the LORD was kindled
  - the LORD became angry
  lexicon: HALOT
  rationale: The idiom literally involves the nose/anger burning and commonly denotes kindled anger. 'The LORD’s anger burned' preserves the vivid Hebrew idiom in natural English better than a flatter paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּאֲמַצְיָהוּ
  chosen: against Amaziah
  alternatives:
  - with Amaziah
  lexicon: HALOT
  rationale: With verbs of anger, the preposition conveys hostility directed toward someone; 'against Amaziah' is the most idiomatic and precise English rendering.
- source_word: נָבִיא
  chosen: a prophet
  lexicon: HALOT
  rationale: Standard rendering of the Hebrew term for a prophetic messenger.
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative preserved in simple modern English.
- source_word: דָרַשְׁתָּ
  chosen: have you sought
  alternatives:
  - have you inquired of
  - have you consulted
  - have you worshiped
  lexicon: HALOT
  rationale: דרש often means to seek, inquire, or consult, especially in religious contexts. 'Sought' is broad enough to preserve the act of turning to these gods without over-specifying either inquiry or worship, though both are implicated contextually.
- source_word: אֱלֹהֵי הָעָם
  chosen: the gods of the people
  alternatives:
  - the gods of that people
  - the people's gods
  lexicon: HALOT
  rationale: The phrase refers to the gods of the defeated nation (Edom in context). 'The gods of the people' is a straightforward rendering of the construct phrase.
- source_word: אֲשֶׁר לֹא הִצִּילוּ
  chosen: who did not deliver
  alternatives:
  - which did not rescue
  - who could not save
  lexicon: HALOT
  rationale: '''Deliver'' fits the military context well. ''Could not save'' is interpretive; the Hebrew states the fact that they did not deliver.'
- source_word: עַמָּם
  chosen: their own people
  alternatives:
  - their people
  lexicon: HALOT
  rationale: Adding 'own' brings out the possessive force naturally in English and sharpens the irony of the prophet's rebuke.
- source_word: מִיָּדֶךָ
  chosen: from your hand
  alternatives:
  - out of your hand
  - from your power
  lexicon: HALOT
  rationale: The idiom 'from your hand' is common biblical language for power/control and is still understandable in English; it preserves the concrete imagery of the Hebrew.
