theological_decisions:
- issue: Divine intention in יָעַץ אֱלֹהִים לְהַשְׁחִיתֶךָ
  chosen_reading: God has determined to destroy you
  alternative_readings:
  - God has planned to destroy you
  - God has purposed your destruction
  rationale: The Hebrew presents God's destructive judgment as a settled intention
    in response to Amaziah's actions and refusal to heed prophetic counsel. The translation
    preserves that tension directly without softening it or importing a broader doctrinal
    explanation of providence.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
