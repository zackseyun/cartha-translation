id: 2CH.25.16
reference: 2 Chronicles 25:16
source:
  edition: WLC
  text: וַ/יְהִ֣י בְּ/דַבְּר֣/וֹ אֵלָ֗י/ו וַ/יֹּ֤אמֶר ל/וֹ֙ הַ/לְ/יוֹעֵ֤ץ לַ/מֶּ֨לֶךְ֙
    נְתַנּ֔וּ/ךָ חֲדַל לְ/ךָ֖ לָ֣/מָּה יַכּ֑וּ/ךָ וַ/יֶּחְדַּ֣ל הַ/נָּבִ֗יא וַ/יֹּ֨אמֶר֙
    יָדַ֗עְתִּי כִּֽי יָעַ֤ץ אֱלֹהִים֙ לְ/הַשְׁחִיתֶ֔/ךָ כִּֽי עָשִׂ֣יתָ זֹּ֔את וְ/לֹ֥א
    שָׁמַ֖עְתָּ לַ/עֲצָתִֽ/י׀־־־׃פ
translation:
  text: And it happened, as he was speaking to him, that the king’s adviser said to
    him, “Have we made you an adviser to the king? Stop! Why should they strike you
    down?” So the prophet stopped and said, “I know that God has determined to destroy
    you, because you have done this and have not listened to my counsel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Have we appointed you as an adviser to the king?'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'why should they strike you?' The subject is an unspecified plural,
      likely referring to those who would punish him at the king’s command.
    reason: lexical_alternative
  - marker: c
    text: Or, 'God has purposed/planned to destroy you.' The Hebrew verb literally
      relates to counsel or planning.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְיוֹעֵץ
  chosen: the king’s adviser
  alternatives:
  - an adviser to the king
  - royal counselor
  lexicon: HALOT
  rationale: 'The form is best taken as the interrogative הַ + לְ + יוֹעֵץ, introducing
    the king’s rebuke: ''Have we made you an adviser to the king?'' In English, ''the
    king’s adviser'' is used in the narrative introduction for readability, while
    the quoted speech clarifies the sense. ''Adviser'' is more natural modern English
    than ''counselor,'' though both are possible.'
- source_word: נְתַנּוּךָ
  chosen: Have we made you
  alternatives:
  - Have we appointed you
  - We have made you
  lexicon: HALOT
  rationale: 'From נתן with 1cp subject and 2ms object, in context a rhetorical question
    from the king: ''Have we made/appointed you...?'' ''Made'' is slightly more idiomatic
    with the complement ''an adviser,'' while ''appointed'' is a viable alternative.'
- source_word: חֲדַל
  chosen: Stop!
  alternatives:
  - Cease!
  - Hold your peace!
  lexicon: HALOT
  rationale: An imperative telling the prophet to stop speaking. 'Stop!' is concise,
    forceful, and natural modern English.
- source_word: לָמָּה יַכּוּךָ
  chosen: Why should they strike you down?
  alternatives:
  - Why should you be struck?
  - Why should they beat you?
  lexicon: HALOT
  rationale: 'The Hiphil of נכה with 3mp subject and 2ms object implies an unspecified
    plural agent: ''why should they strike you?'' In royal context, the threat likely
    means violent punishment, so ''strike you down'' conveys the menace better than
    the weaker ''beat you,'' without over-specifying death.'
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Straightforward identification of the speaker as the prophet. Retained
    explicitly for clarity and fidelity to the Hebrew.
- source_word: יָעַץ אֱלֹהִים
  chosen: God has determined
  alternatives:
  - God has counseled
  - God has purposed
  lexicon: HALOT
  rationale: The verb יעץ literally means 'to advise/counsel/plan.' With God as subject
    and the infinitive 'to destroy you,' the sense is divine resolve or purpose. 'Has
    determined' communicates the idiomatic force in clear English better than the
    more wooden 'has counseled.'
- source_word: לְהַשְׁחִיתֶךָ
  chosen: to destroy you
  alternatives:
  - to ruin you
  - to bring you to destruction
  lexicon: HALOT
  rationale: The Hiphil infinitive of שׁחת here denotes bringing about destruction.
    'Destroy you' is the most direct and standard rendering.
- source_word: כִּי עָשִׂיתָ זֹּאת
  chosen: because you have done this
  alternatives:
  - for you did this
  lexicon: HALOT
  rationale: Causal כִּי explains the reason for the announced judgment. 'Done this'
    preserves the Hebrew's demonstrative force without adding content.
- source_word: וְלֹא שָׁמַעְתָּ לַעֲצָתִי
  chosen: and have not listened to my counsel
  alternatives:
  - and did not listen to my advice
  - and have not obeyed my counsel
  lexicon: HALOT
  rationale: שׁמע אל/ל can mean hear, listen to, or obey. Here the issue is refusal
    to heed prophetic advice. 'Listened to my counsel' preserves both the hearing
    and heeding nuance and matches the lexical field of יעץ/עצה in the verse.
