id: 2CH.25.17
reference: 2 Chronicles 25:17
source:
  edition: WLC
  text: וַ/יִּוָּעַ֗ץ אֲמַצְיָ֨הוּ֙ מֶ֣לֶךְ יְהוּדָ֔ה וַ֠/יִּשְׁלַח אֶל יוֹאָ֨שׁ בֶּן
    יְהוֹאָחָ֧ז בֶּן יֵה֛וּא מֶ֥לֶךְ יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר לך נִתְרָאֶ֥ה פָנִֽים־־־׃
translation:
  text: Then Amaziah king of Judah took counsel and sent to Joash son of Jehoahaz,
    son of Jehu, king of Israel, saying, “Come, let us look one another in the face.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “let us meet face to face.” The Hebrew idiom is literally about seeing
      one another’s face and here likely signals a direct confrontation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּעַץ
  chosen: took counsel
  alternatives:
  - consulted
  - made plans
  lexicon: HALOT
  rationale: The Niphal of יעץ here conveys deliberation/consultation before action.
    'Took counsel' preserves the formal sense and the narrative nuance that Amaziah
    acted after deliberation.
- source_word: וַיִּשְׁלַח אֶל
  chosen: sent to
  alternatives:
  - sent messengers to
  - sent word to
  lexicon: HALOT
  rationale: The verb שלח with אֶל commonly means 'sent to.' While messengers are
    implied, they are not explicit in the Hebrew, so the simpler rendering is preferred.
- source_word: יוֹאָשׁ ... מֶלֶךְ יִשְׂרָאֵל
  chosen: Joash son of Jehoahaz, son of Jehu, king of Israel
  rationale: Personal names are transliterated per project philosophy, and the full
    genealogy/title is retained because it is explicit in the source and situates
    the political confrontation.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard narrative introduction to direct speech; 'saying' is idiomatic
    and sufficiently formal.
- source_word: לְךָ
  chosen: Come
  alternatives:
  - Go on
  - Come now
  lexicon: HALOT
  rationale: Here the imperative functions as a challenge invitation. 'Come' is the
    most natural concise English equivalent.
- source_word: נִתְרָאֶה פָנִים
  chosen: let us look one another in the face
  alternatives:
  - let us meet face to face
  - let us see each other's face
  lexicon: HALOT
  rationale: The idiom literally involves seeing faces, but in this military-political
    context it is a challenge to direct confrontation. This rendering preserves the
    face-language while remaining natural English.
