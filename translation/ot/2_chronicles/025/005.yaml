id: 2CH.25.5
reference: 2 Chronicles 25:5
source:
  edition: WLC
  text: וַ/יִּקְבֹּ֤ץ אֲמַצְיָ֨הוּ֙ אֶת יְהוּדָ֔ה וַ/יַּֽעֲמִידֵ֣/ם לְ/בֵית אָב֗וֹת
    לְ/שָׂרֵ֤י הָ/אֲלָפִים֙ וּ/לְ/שָׂרֵ֣י הַ/מֵּא֔וֹת לְ/כָל יְהוּדָ֖ה וּ/בִנְיָמִ֑ן
    וַֽ/יִּפְקְדֵ֗/ם לְ/מִ/בֶּ֨ן עֶשְׂרִ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה וַ/יִּמְצָאֵ֗/ם שְׁלֹשׁ
    מֵא֨וֹת אֶ֤לֶף בָּחוּר֙ יוֹצֵ֣א צָבָ֔א אֹחֵ֖ז רֹ֥מַח וְ/צִנָּֽה־־־־׃
translation:
  text: Then Amaziah gathered Judah and appointed them by fathers’ houses under commanders
    of thousands and commanders of hundreds, for all Judah and Benjamin. He mustered
    them from twenty years old and upward, and found them to be three hundred thousand
    choice men, fit for war, able to handle spear and shield.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'young men' for 'choice men'; the Hebrew בָּחוּר can denote youth, but
      here likely emphasizes able-bodied/select fighting men in the military census.
    reason: lexical_alternative
  - marker: b
    text: Literally 'going out to war,' a Hebrew idiom for those eligible or ready
      for military service.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew צִנָּה refers specifically to a large shield.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבֹּץ
  chosen: gathered
  alternatives:
  - assembled
  - collected
  lexicon: HALOT
  rationale: The verb קבץ commonly means to gather or assemble people. 'Gathered'
    is natural modern English and preserves the concrete action without overinterpreting
    it as a formal military assembly.
- source_word: וַיַּעֲמִידֵם
  chosen: appointed them
  alternatives:
  - stationed them
  - set them in place
  lexicon: HALOT
  rationale: עמד in the Hiphil can mean cause to stand, set, appoint, or place. In
    this administrative-military context, Amaziah is organizing the men into a command
    structure, so 'appointed them' best captures the institutional sense.
- source_word: לְבֵית אָבוֹת
  chosen: by fathers’ houses
  alternatives:
  - according to ancestral houses
  - by family houses
  lexicon: HALOT
  rationale: The phrase refers to clan or paternal-household divisions. 'By fathers’
    houses' is relatively formal but transparent and preserves the social structure
    named in the Hebrew better than the more interpretive 'families' alone.
- source_word: לְשָׂרֵי הָאֲלָפִים וּלְשָׂרֵי הַמֵּאוֹת
  chosen: under commanders of thousands and commanders of hundreds
  alternatives:
  - under captains of thousands and captains of hundreds
  - to the officers of thousands and officers of hundreds
  lexicon: HALOT
  rationale: שׂרים are leaders/officials. 'Commanders' fits the military setting better
    than the archaic 'captains' while preserving the hierarchical structure indicated
    by thousands and hundreds.
- source_word: לְכָל יְהוּדָה וּבִנְיָמִן
  chosen: for all Judah and Benjamin
  alternatives:
  - throughout all Judah and Benjamin
  - from all Judah and Benjamin
  lexicon: HALOT
  rationale: The phrase marks the scope of the organization and muster. 'For all Judah
    and Benjamin' keeps the broad administrative sense without forcing a narrower
    spatial reading.
- source_word: וַיִּפְקְדֵם
  chosen: He mustered them
  alternatives:
  - numbered them
  - enrolled them
  lexicon: HALOT
  rationale: פקד in military contexts often means to count or muster troops. 'Mustered'
    captures both numbering and military review, which suits the context better than
    the bare 'numbered.'
- source_word: לְמִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from twenty years old and above
  - aged twenty years and over
  lexicon: HALOT
  rationale: This is a standard age-threshold formula for military eligibility. The
    chosen rendering is idiomatic and close to the Hebrew wording.
- source_word: וַיִּמְצָאֵם
  chosen: found them to be
  alternatives:
  - found
  - discovered them to number
  lexicon: HALOT
  rationale: מצא here introduces the result of the count. 'Found them to be' makes
    explicit in English that the following number is the outcome of the muster.
- source_word: שְׁלֹשׁ מֵאוֹת אֶלֶף
  chosen: three hundred thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number; no reason to depart from the standard
    rendering.
- source_word: בָּחוּר
  chosen: choice men
  alternatives:
  - picked men
  - young men
  lexicon: HALOT
  rationale: בחור can denote a young man, but in military census contexts it often
    carries the sense of select or able-bodied men. 'Choice men' preserves the evaluative
    nuance better than simply 'young men.'
- source_word: יוֹצֵא צָבָא
  chosen: fit for war
  alternatives:
  - going out to war
  - able to serve in the army
  lexicon: HALOT
  rationale: Literally 'going out to the army/war,' an idiom for military service.
    'Fit for war' is concise, idiomatic, and communicates eligibility for battle rather
    than merely physical movement.
- source_word: אֹחֵז רֹמַח וְצִנָּה
  chosen: able to handle spear and shield
  alternatives:
  - grasping spear and shield
  - bearing spear and shield
  lexicon: HALOT
  rationale: The participle אֹחֵז is literally 'grasping/holding.' In English, 'able
    to handle' conveys martial competence naturally. צִנָּה is a large shield; 'shield'
    is sufficient in the main text, with the more specific nuance not essential here.
