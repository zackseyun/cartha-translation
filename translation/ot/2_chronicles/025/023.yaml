id: 2CH.25.23
reference: 2 Chronicles 25:23
source:
  edition: WLC
  text: וְ/אֵת֩ אֲמַצְיָ֨הוּ מֶֽלֶךְ יְהוּדָ֜ה בֶּן יוֹאָ֣שׁ בֶּן יְהוֹאָחָ֗ז תָּפַ֛שׂ
    יוֹאָ֥שׁ מֶֽלֶךְ יִשְׂרָאֵ֖ל בְּ/בֵ֣ית שָׁ֑מֶשׁ וַ/יְבִיאֵ֨/הוּ֙ יְר֣וּשָׁלִַ֔ם
    וַ/יִּפְרֹ֞ץ בְּ/חוֹמַ֣ת יְרוּשָׁלִַ֗ם מִ/שַּׁ֤עַר אֶפְרַ֨יִם֙ עַד שַׁ֣עַר הַ/פּוֹנֶ֔ה
    אַרְבַּ֥ע מֵא֖וֹת אַמָּֽה־־־־־׃
translation:
  text: And Joash king of Israel captured Amaziah king of Judah, the son of Joash,
    son of Jehoahaz, at Beth-shemesh, and brought him to Jerusalem. Then he broke
    down the wall of Jerusalem from the Ephraim Gate to the Corner Gate, four hundred
    cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from the Ephraim Gate to the gate that turns/faces.'
      The rendering 'Corner Gate' follows the likely identification from the parallel
      account in 2 Kings 14:13.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּפַשׂ
  chosen: captured
  alternatives:
  - seized
  - took prisoner
  lexicon: HALOT
  rationale: The verb denotes laying hold of or taking into custody. 'Captured' is
    natural modern English and fits the military context better than the more generic
    'seized.'
- source_word: בְּבֵית שָׁמֶשׁ
  chosen: at Beth-shemesh
  alternatives:
  - in Beth-shemesh
  lexicon: HALOT
  rationale: With a place name after ב, English 'at' is idiomatic for the site of
    the encounter or battle. The place name is transliterated per project policy for
    personal/place names.
- source_word: וַיְבִיאֵהוּ
  chosen: brought him
  alternatives:
  - led him
  - brought him in
  lexicon: HALOT
  rationale: The hiphil of בוא commonly means 'bring.' 'Brought him' is straightforward
    and does not over-specify manner.
- source_word: וַיִּפְרֹץ בְּחוֹמַת יְרוּשָׁלִַם
  chosen: he broke down the wall of Jerusalem
  alternatives:
  - he made a breach in the wall of Jerusalem
  - he broke through the wall of Jerusalem
  lexicon: HALOT
  rationale: The verb פרץ in this construction refers to breaching or breaking down
    a wall. 'Broke down' is clear modern English; 'made a breach' is more formal but
    less natural.
- source_word: מִשַּׁעַר אֶפְרַיִם עַד שַׁעַר הַפּוֹנֶה
  chosen: from the Ephraim Gate to the Corner Gate
  alternatives:
  - from the Gate of Ephraim to the gate that faces
  - from the Ephraim Gate to the Turning Gate
  lexicon: HALOT
  rationale: שַׁעַר אֶפְרַיִם is naturally rendered as a named city gate. הַפּוֹנֶה
    is traditionally understood as a specific gate name, likely 'Corner Gate' in parallel
    with 2 Kings 14:13. Using 'Corner Gate' preserves the probable referent and reads
    naturally, while the more literal 'gate that faces/turns' is obscure in English.
- source_word: אַרְבַּע מֵאוֹת אַמָּה
  chosen: four hundred cubits
  alternatives:
  - four hundred cubits long
  lexicon: HALOT
  rationale: The Hebrew gives the measurement directly without an explicit word for
    length. 'Four hundred cubits' is sufficiently clear and formally close to the
    source.
- source_word: בֶּן יוֹאָשׁ בֶּן יְהוֹאָחָז
  chosen: the son of Joash, son of Jehoahaz
  alternatives:
  - son of Joash, the son of Jehoahaz
  lexicon: HALOT
  rationale: The genealogy identifies Amaziah. Including both generations preserves
    the Hebrew appositional detail without smoothing it away.
