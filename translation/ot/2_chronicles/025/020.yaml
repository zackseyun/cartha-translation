theological_decisions:
- issue: Divine causation in Amaziah's refusal and defeat
  chosen_reading: The verse states that Amaziah's refusal to listen was from God,
    with the purpose/result that he would be given over to defeat because of idolatry.
  alternative_readings:
  - The clause could be softened as mere providential permission rather than active
    divine purpose.
  rationale: The Hebrew explicitly says 'it was from God' and uses a purposive marker
    ('in order to'). The translation preserves this tension without softening divine
    agency or importing a fuller theological explanation beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
