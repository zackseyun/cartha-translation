id: 2CH.25.20
reference: 2 Chronicles 25:20
source:
  edition: WLC
  text: וְ/לֹא שָׁמַ֣ע אֲמַצְיָ֔הוּ כִּ֤י מֵ/הָֽ/אֱלֹהִים֙ הִ֔יא לְמַ֖עַן תִּתָּ֣/ם
    בְּ/יָ֑ד כִּ֣י דָֽרְשׁ֔וּ אֵ֖ת אֱלֹהֵ֥י אֱדֽוֹם־׃
translation:
  text: But Amaziah would not listen, for it was from God, in order to give them into
    the hand of their enemies, because they had sought the gods of Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'into the hand'; a Hebrew idiom meaning 'into the power' of another.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַע
  chosen: would not listen
  alternatives:
  - did not listen
  - would not hear
  lexicon: HALOT
  rationale: In context of refusing counsel or warning, 'listen' communicates not
    merely auditory hearing but heeding. 'Would not listen' captures the volitional
    nuance in natural English.
- source_word: מֵהָאֱלֹהִים הִיא
  chosen: it was from God
  alternatives:
  - this was from God
  - it came from God
  lexicon: HALOT
  rationale: The feminine pronoun likely refers to the situation/outcome just described.
    'It was from God' is idiomatic and preserves divine causation without over-specifying.
- source_word: לְמַעַן
  chosen: in order to
  alternatives:
  - so that
  - for the purpose of
  lexicon: HALOT
  rationale: This marks purpose/result. 'In order to' preserves the purposive force
    clearly in modern English.
- source_word: תִּתָּם
  chosen: to give them
  alternatives:
  - that he might give them
  - to hand them over
  lexicon: HALOT
  rationale: The verb נתן with following 'into the hand of' is a standard idiom for
    delivering someone over. 'To give them' keeps the Hebrew structure, while the
    following phrase clarifies the sense.
- source_word: בְּיָד
  chosen: into the hand of their enemies
  alternatives:
  - into the hand
  - into the power of their enemies
  lexicon: HALOT
  rationale: The idiom means being delivered into another's power. Because English
    normally requires an explicit object of the hand, 'their enemies' is supplied
    from the immediate narrative context (Joash/Israel) to make the idiom intelligible.
    The more literal alternative is preserved in a footnote.
- source_word: דָרְשׁוּ
  chosen: had sought
  alternatives:
  - had inquired of
  - had consulted
  lexicon: HALOT
  rationale: דרשׁ with deity as object often means seeking or resorting to a god in
    worshipful dependence. 'Had sought' is broad and faithful, avoiding over-interpretation
    while preserving the religious sense.
- source_word: אֱלֹהֵי אֱדוֹם
  chosen: the gods of Edom
  alternatives:
  - Edom's gods
  lexicon: HALOT
  rationale: Construct chain straightforwardly denotes the deities worshiped by Edom.
    'The gods of Edom' is clear and formal enough for the context.
