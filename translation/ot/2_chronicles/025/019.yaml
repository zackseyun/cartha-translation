id: 2CH.25.19
reference: 2 Chronicles 25:19
source:
  edition: WLC
  text: אָמַ֗רְתָּ הִנֵּ֤ה הִכִּ֨יתָ֙ אֶת אֱד֔וֹם וּ/נְשָׂאֲ/ךָ֥ לִבְּ/ךָ֖ לְ/הַכְבִּ֑יד
    עַתָּה֙ שְׁבָ֣/ה בְּ/בֵיתֶ֔/ךָ לָ֤/מָּה תִתְגָּרֶה֙ בְּ/רָעָ֔ה וְ/נָ֣פַלְתָּ֔
    אַתָּ֖ה וִ/יהוּדָ֥ה עִמָּֽ/ךְ־׃
translation:
  text: You said, ‘Look, you have struck Edom, and your heart has lifted you up to
    boast.’ Now stay at home. Why should you provoke disaster, so that you fall—you
    and Judah with you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your heart has exalted you for glory' / 'your heart has made you proud
      for honor.' The Hebrew expression is idiomatic and conveys self-exaltation after
      victory.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַרְתָּ
  chosen: You said
  alternatives:
  - You have said
  lexicon: HALOT
  rationale: Qal perfect 2ms of אמר introduces the reported claim. Simple past reads
    naturally in English narrative discourse.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle marking emphasis. 'Look' preserves the force in readable
    modern English better than archaic 'Behold.'
- source_word: הִכִּיתָ אֶת אֱדוֹם
  chosen: you have struck Edom
  alternatives:
  - you defeated Edom
  - you smote Edom
  lexicon: HALOT
  rationale: Hiphil of נכה commonly means 'strike, defeat.' 'Struck' stays closer
    to the Hebrew while still implying military victory in context.
- source_word: וּנְשָׂאֲךָ לִבְּךָ
  chosen: your heart has lifted you up
  alternatives:
  - your heart has exalted you
  - your heart has made you proud
  lexicon: HALOT
  rationale: The idiom literally speaks of the heart lifting a person up. Rendering
    it fairly literally preserves the metaphor and the causal relation to pride.
- source_word: לְהַכְבִּיד
  chosen: to boast
  alternatives:
  - to glorify yourself
  - to act proudly
  - to gain honor
  lexicon: HALOT
  rationale: The infinitive expresses the result/purpose of the lifted heart. In this
    rebuke context, 'to boast' captures the sense of self-exaltation in idiomatic
    English.
- source_word: עַתָּה שְׁבָה בְּבֵיתֶךָ
  chosen: Now stay at home
  alternatives:
  - Now remain in your house
  - Now sit in your house
  lexicon: HALOT
  rationale: Imperative of ישב with 'in your house' is an idiom for staying put rather
    than going out to war. 'Stay at home' is natural and contextually precise.
- source_word: לָמָּה תִתְגָּרֶה
  chosen: Why should you provoke
  alternatives:
  - Why stir yourself up
  - Why engage in strife
  - Why challenge
  lexicon: HALOT
  rationale: Hitpael of גרה here means to stir up conflict or provoke a confrontation.
    'Provoke' fits the warning context.
- source_word: בְּרָעָה
  chosen: disaster
  alternatives:
  - harm
  - evil
  - trouble
  lexicon: HALOT
  rationale: In this military-political warning, רעה refers to calamity rather than
    moral evil. 'Disaster' communicates impending ruin clearly.
- source_word: וְנָפַלְתָּ
  chosen: so that you fall
  alternatives:
  - and fall
  - and you will fall
  lexicon: HALOT
  rationale: Perfect with prefixed conjunction after the rhetorical question expresses
    the likely consequence. 'So that you fall' makes the warning logic explicit in
    natural English.
- source_word: אַתָּה וִיהוּדָה עִמָּךְ
  chosen: you and Judah with you
  alternatives:
  - you, and Judah with you
  - you and Judah along with you
  lexicon: HALOT
  rationale: The phrase emphasizes that the king's downfall would bring Judah down
    as well. The chosen wording is direct and preserves the collective consequence.
