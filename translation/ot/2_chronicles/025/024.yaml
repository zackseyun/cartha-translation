id: 2CH.25.24
reference: 2 Chronicles 25:24
source:
  edition: WLC
  text: וְ/כָֽל הַ/זָּהָ֣ב וְ/הַ/כֶּ֡סֶף וְ/אֵ֣ת כָּל הַ֠/כֵּלִים הַ/נִּמְצְאִ֨ים
    בְּ/בֵית הָ/אֱלֹהִ֜ים עִם עֹבֵ֣ד אֱד֗וֹם וְ/אֶת אֹצְרוֹת֙ בֵּ֣ית הַ/מֶּ֔לֶךְ וְ/אֵ֖ת
    בְּנֵ֣י הַ/תַּֽעֲרֻב֑וֹת וַ/יָּ֖שָׁב שֹׁמְרֽוֹן־־־־־׃פ
translation:
  text: And he took all the gold and the silver, and all the vessels found in the
    house of God with Obed-edom, and the treasures of the king’s house, and hostages,
    and returned to Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the custody of Obed-edom'; the Hebrew reads literally 'with Obed-edom.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of the pledges,' likely meaning persons taken as security,
      that is, hostages.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַזָּהָב וְהַכֶּסֶף
  chosen: all the gold and the silver
  alternatives:
  - all the gold and silver
  lexicon: HALOT
  rationale: Retains the Hebrew totalizing כָּל ('all') and the distinct mention of
    both precious metals. Including the article before 'silver' reflects the Hebrew
    coordination naturally enough in English.
- source_word: כָּל הַכֵּלִים
  chosen: all the vessels
  alternatives:
  - all the articles
  - all the utensils
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for objects/implements/vessels. In temple-plunder
    context, 'vessels' is the most idiomatic and traditional English rendering without
    being misleading.
- source_word: הַנִּמְצְאִים
  chosen: found
  alternatives:
  - that were found
  - present
  lexicon: HALOT
  rationale: The participle denotes items being found/present there. 'Found' is concise
    and natural in English after 'vessels.'
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: A formally close rendering that preserves the Hebrew expression. 'Temple'
    would be interpretive but acceptable; 'house of God' better reflects the source
    wording.
- source_word: עִם עֹבֵד אֱדוֹם
  chosen: with Obed-edom
  alternatives:
  - under the care of Obed-edom
  - in the custody of Obed-edom
  lexicon: HALOT
  rationale: The preposition עִם is literally 'with.' Since the phrase likely indicates
    custody or association, the more literal 'with Obed-edom' is kept in the main
    text, with the interpretive sense preserved as an alternative.
- source_word: אֹצְרוֹת בֵּית הַמֶּלֶךְ
  chosen: the treasures of the king’s house
  alternatives:
  - the treasuries of the king’s palace
  - the treasures of the royal palace
  lexicon: HALOT
  rationale: אֹצְרוֹת can denote treasures or storehouses/treasuries. In context of
    seized valuables, 'treasures' best conveys the contents taken. 'King’s house'
    is a close rendering of the Hebrew, likely referring to the palace.
- source_word: בְּנֵי הַתַּעֲרֻבוֹת
  chosen: hostages
  alternatives:
  - sons of the pledges
  - sons given as security
  lexicon: HALOT
  rationale: This difficult phrase most naturally refers to persons held as security/pledges,
    hence 'hostages.' The more literal alternatives are awkward in English and less
    clear; the lexical uncertainty is worth preserving in a footnote.
- source_word: וַיָּשָׁב שֹׁמְרוֹן
  chosen: and returned to Samaria
  alternatives:
  - then he returned to Samaria
  lexicon: HALOT
  rationale: 'The wayyiqtol advances the narrative: ''and returned.'' Samaria is the
    destination. The subject is the same as the prior verse''s acting king, so English
    supplies ''he took'' and ''returned'' naturally.'
