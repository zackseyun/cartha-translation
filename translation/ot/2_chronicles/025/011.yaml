id: 2CH.25.11
reference: 2 Chronicles 25:11
source:
  edition: WLC
  text: וַ/אֲמַצְיָ֨הוּ֙ הִתְחַזַּ֔ק וַ/יִּנְהַג֙ אֶת עַמּ֔/וֹ וַ/יֵּ֖לֶךְ גֵּ֣יא
    הַמֶּ֑לַח וַ/יַּ֥ךְ אֶת בְּנֵי שֵׂעִ֖יר עֲשֶׂ֥רֶת אֲלָפִֽים־־־׃
translation:
  text: Then Amaziah strengthened himself, led his people, and went to the Valley
    of Salt, where he struck down ten thousand of the sons of Seir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people/descendants of Seir.' The Hebrew reads 'the sons of Seir,'
      an ethnic-genealogical expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְחַזַּק
  chosen: strengthened himself
  alternatives:
  - took courage
  - showed himself strong
  - became strong
  lexicon: HALOT
  rationale: The Hitpael of חזק is reflexive/inchoative here. 'Strengthened himself'
    preserves the reflexive nuance better than the more interpretive 'took courage,'
    while remaining natural English.
- source_word: וַיִּנְהַג אֶת־עַמּוֹ
  chosen: led his people
  alternatives:
  - marshaled his people
  - drove his people
  - guided his people
  lexicon: HALOT
  rationale: נהג can mean lead, drive, or conduct. In a military context, 'led his
    people' is the clearest idiomatic English without over-specifying tactics. 'Marshaled'
    is possible but slightly more interpretive.
- source_word: גֵּיא הַמֶּלַח
  chosen: the Valley of Salt
  alternatives:
  - the Salt Valley
  lexicon: HALOT
  rationale: A straightforward rendering of the place name components is preferable.
    Capitalization marks it as a recognized location. 'Valley of Salt' is the more
    established and transparent English form.
- source_word: וַיַּךְ
  chosen: struck down
  alternatives:
  - defeated
  - killed
  - smote
  lexicon: HALOT
  rationale: נכה is broad and can denote striking, defeating, or killing depending
    on context. Because the verse immediately gives a casualty number, 'struck down'
    fits well and avoids prematurely narrowing the sense beyond the military action
    described.
- source_word: בְּנֵי שֵׂעִיר
  chosen: the sons of Seir
  alternatives:
  - the people of Seir
  - the descendants of Seir
  - the men of Seir
  lexicon: HALOT
  rationale: The Hebrew literally says 'sons of Seir.' Retaining this preserves the
    genealogical/ethnic idiom of the source. A more dynamic rendering is possible,
    but the literal form is still understandable in English.
- source_word: עֲשֶׂרֶת אֲלָפִים
  chosen: ten thousand
  lexicon: HALOT
  rationale: This is the standard English rendering of the Hebrew numeral phrase and
    requires no expansion.
- source_word: וַאֲמַצְיָהוּ
  chosen: Then Amaziah
  alternatives:
  - And Amaziah
  lexicon: HALOT
  rationale: The prefixed waw continues the narrative. 'Then Amaziah' gives natural
    English narrative flow while preserving sequence; 'And Amaziah' would be more
    formally wooden.
