id: 2CH.25.1
reference: 2 Chronicles 25:1
source:
  edition: WLC
  text: בֶּן עֶשְׂרִ֨ים וְ/חָמֵ֤שׁ שָׁנָה֙ מָלַ֣ךְ אֲמַצְיָ֔הוּ וְ/עֶשְׂרִ֣ים וָ/תֵ֨שַׁע֙
    שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ יְהוֹעַדָּ֖ן מִ/ירוּשָׁלָֽיִם־׃
translation:
  text: Amaziah was twenty-five years old when he became king, and he reigned twenty-nine
    years in Jerusalem. His mother’s name was Jehoaddan, from Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'a son of twenty-five years.'
    reason: lexical_alternative
  - marker: b
    text: Or 'began to reign' for 'became king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְחָמֵשׁ שָׁנָה
  chosen: twenty-five years old
  alternatives:
  - a son of twenty-five years
  lexicon: HALOT
  rationale: This is the standard Hebrew age idiom, literally 'a son of twenty-five
    years.' Natural English requires 'twenty-five years old' while preserving the
    age statement.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - began to reign
  - was king
  lexicon: HALOT
  rationale: In the first occurrence, the verb marks accession to kingship in the
    age formula. 'Became king' is idiomatic and precise in English; 'began to reign'
    is possible but slightly less natural.
- source_word: וְעֶשְׂרִים וָתֵשַׁע שָׁנָה
  chosen: twenty-nine years
  lexicon: HALOT
  rationale: Straightforward numeral phrase indicating the duration of reign.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - was king
  lexicon: HALOT
  rationale: In the second occurrence, the verb refers to the duration of rule, so
    'he reigned' best matches normal English usage for royal chronology.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Locative preposition with the city name; standard rendering.
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: The Hebrew construct phrase is rendered in smooth modern English without
    loss of meaning.
- source_word: יְהוֹעַדָּן
  chosen: Jehoaddan
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: מִירוּשָׁלָיִם
  chosen: from Jerusalem
  alternatives:
  - a woman of Jerusalem
  lexicon: HALOT
  rationale: The preposition מִן normally indicates source/origin, so 'from Jerusalem'
    is the most direct rendering. In this genealogical context it identifies her provenance.
