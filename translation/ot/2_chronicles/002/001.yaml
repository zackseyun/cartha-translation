id: 2CH.2.1
reference: 2 Chronicles 2:1
source:
  edition: WLC
  text: וַ/יִּסְפֹּ֨ר שְׁלֹמֹ֜ה שִׁבְעִ֥ים אֶ֨לֶף֙ אִ֣ישׁ סַבָּ֔ל וּ/שְׁמוֹנִ֥ים אֶ֛לֶף
    אִ֖ישׁ חֹצֵ֣ב בָּ/הָ֑ר וּ/מְנַצְּחִ֣ים עֲלֵי/הֶ֔ם שְׁלֹ֥שֶׁת אֲלָפִ֖ים וְ/שֵׁ֥שׁ
    מֵאֽוֹת׃פ
translation:
  text: Solomon counted seventy thousand men as burden-bearers, and eighty thousand
    men as stonecutters in the hill country, and over them three thousand six hundred
    overseers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'quarrymen in the mountains.' The Hebrew literally says 'hewing in the
      mountain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְפֹּר
  chosen: counted
  alternatives:
  - numbered
  - enrolled
  lexicon: HALOT
  rationale: The verb ספר in the waw-consecutive narrative form most naturally means
    'counted' or 'numbered.' 'Counted' is straightforward modern English and fits
    the census-like listing of laborers.
- source_word: אִישׁ ... סַבָּל
  chosen: men as burden-bearers
  alternatives:
  - men to carry loads
  - porters
  lexicon: HALOT
  rationale: אִישׁ marks individual men, and סַבָּל denotes one who bears burdens.
    'Burden-bearers' preserves the labor category more formally than the looser 'porters.'
- source_word: חֹצֵב בָּהָר
  chosen: stonecutters in the hill country
  alternatives:
  - hewers in the mountain
  - quarrymen in the mountains
  lexicon: HALOT
  rationale: חצב means to hew/cut, here in the context of building labor. Since the
    parallel in Chronicles concerns temple construction materials, 'stonecutters'
    makes the implied object explicit in idiomatic English without overreaching. בָּהָר
    is literally 'in the mountain/hill country'; 'hill country' is natural English
    for the locale.
- source_word: וּמְנַצְּחִים עֲלֵיהֶם
  chosen: overseers over them
  alternatives:
  - supervisors over them
  - foremen over them
  lexicon: HALOT
  rationale: The participle from נצח in this administrative context refers to those
    directing or supervising labor. 'Overseers' is a clear and suitably formal rendering;
    'over them' preserves עֲלֵיהֶם.
- source_word: שְׁלֹשֶׁת אֲלָפִים וְשֵׁשׁ מֵאוֹת
  chosen: three thousand six hundred
  lexicon: HALOT
  rationale: This is the straightforward cardinal number expression and is rendered
    idiomatically in English without conjunction repetition.
- source_word: אִישׁ
  chosen: men
  alternatives:
  - persons
  - workers
  lexicon: HALOT
  rationale: The Hebrew is grammatically and semantically masculine here, referring
    to male laborers in a royal work force. Per the translation philosophy, gender-accurate
    language is preferred over neutralizing.
