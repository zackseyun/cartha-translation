id: 2CH.2.12
reference: 2 Chronicles 2:12
source:
  edition: WLC
  text: וְ/עַתָּ֗ה שָׁלַ֧חְתִּי אִישׁ חָכָ֛ם יוֹדֵ֥עַ בִּינָ֖ה לְ/חוּרָ֥ם אָבִֽי־׃
translation:
  text: And now I have sent a wise man, skilled in understanding, Huram-abi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Huram-abi. The final term literally means 'my father,' but here it
      is likely an honorific title or part of the craftsman's designation; compare
      also 'Huram his father' in 2 Chronicles 4:16.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: The conjunction plus temporal adverb introduces the next step in the
    king's response. 'And now' preserves the discourse flow more fully than simply
    'Now'.
- source_word: שָׁלַחְתִּי
  chosen: I have sent
  alternatives:
  - I am sending
  - I sent
  lexicon: HALOT
  rationale: The Hebrew perfect can be rendered as a present perfect in English here,
    fitting the sense of a completed action with present relevance in the context
    of dispatching a craftsman.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: The noun is explicitly masculine singular and refers to a specific male
    individual, so 'man' is gender-accurate and more precise than 'person'.
- source_word: חָכָם
  chosen: wise
  alternatives:
  - skillful
  lexicon: HALOT
  rationale: The adjective commonly means 'wise,' but in craftsmanship contexts can
    overlap with technical skill. 'Wise' is retained in the main text because it matches
    the Hebrew term directly, while the following participle clarifies practical competence.
- source_word: יוֹדֵעַ בִּינָה
  chosen: skilled in understanding
  alternatives:
  - knowing understanding
  - having insight
  - expert in discernment
  lexicon: HALOT
  rationale: The participle plus noun literally means 'knowing understanding.' In
    idiomatic English, 'skilled in understanding' preserves both the cognitive and
    practical dimensions without becoming wooden.
- source_word: לְחוּרָם אָבִי
  chosen: Huram-abi
  alternatives:
  - Huram my master craftsman
  - Huram my father
  - to Huram my father
  lexicon: HALOT
  rationale: The phrase is difficult. In this context and in comparison with the parallel
    in 2 Chronicles 4:16, it functions as the proper designation of the artisan sent
    by the king of Tyre, commonly represented as the name/title 'Huram-abi.' Rendering
    it this way avoids the misleading familial sense of 'my father' in English while
    preserving the likely titular or name-like force of the Hebrew expression.
