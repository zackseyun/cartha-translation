theological_decisions:
- issue: Meaning of אָבִי in the designation לְחוּרָם אָבִי
  chosen_reading: Treat as part of the artisan's designation/name, rendered 'Huram-abi'
  alternative_readings:
  - '''Huram my father'''
  - '''Huram, my master craftsman'''
  rationale: The term 'father' can function honorifically for a master or counselor,
    not only biologically. In this verse the expression most likely identifies the
    skilled artisan by a name/title rather than indicating literal kinship. Transliteration
    preserves the ambiguity better than forcing a specific relational interpretation
    into the main text.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
