id: 2CH.2.14
reference: 2 Chronicles 2:14
source:
  edition: WLC
  text: וְ֠/עַתָּה הַ/חִטִּ֨ים וְ/הַ/שְּׂעֹרִ֜ים הַ/שֶּׁ֤מֶן וְ/הַ/יַּ֨יִן֙ אֲשֶׁ֣ר
    אָמַ֣ר אֲדֹנִ֔/י יִשְׁלַ֖ח לַ/עֲבָדָֽי/ו׃
translation:
  text: And now, let my lord send to his servants the wheat and the barley, the oil
    and the wine, which he has spoken of.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the oil' may be understood more specifically as 'olive oil' in this
      provisioning context.
    reason: lexical_alternative
  - marker: b
    text: Or 'which he said'; the Hebrew does not require the stronger sense 'which
      he promised.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing the practical request that follows. 'And
    now' preserves the connective force of ו plus the temporal/adverbial עתה.
- source_word: הַחִטִּים
  chosen: the wheat
  alternatives:
  - wheat
  lexicon: HALOT
  rationale: Definite plural noun referring to the commodity requested. English commonly
    uses the mass noun 'wheat'; retaining 'the' reflects the Hebrew article and the
    specific agreed supply.
- source_word: וְהַשְּׂעֹרִים
  chosen: the barley
  alternatives:
  - barley
  lexicon: HALOT
  rationale: Parallel commodity term. English mass noun is most natural; article retained
    to mirror the Hebrew list of specified provisions.
- source_word: הַשֶּׁמֶן
  chosen: the oil
  alternatives:
  - olive oil
  - oil
  lexicon: HALOT
  rationale: In this provisioning context the referent is likely olive oil, but the
    Hebrew says simply 'the oil.' Main text keeps the broader term without over-specifying;
    'olive oil' is a plausible contextual alternative.
- source_word: וְהַיַּיִן
  chosen: the wine
  alternatives:
  - wine
  lexicon: HALOT
  rationale: Straightforward rendering of the commodity in the list. Article retained
    for consistency with the Hebrew enumeration of specified goods.
- source_word: אֲשֶׁר אָמַר
  chosen: which he has spoken of
  alternatives:
  - which he said
  - that he mentioned
  - which he promised
  lexicon: HALOT
  rationale: The relative clause modifies the listed provisions. 'Has spoken of' captures
    the prior reference/agreement without importing the stronger covenantal nuance
    of 'promised,' which the verb אמר alone does not require.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: Polite address from Huram to Solomon. Lowercase 'lord' avoids confusion
    with the divine title and reflects courtly deference rather than deity.
- source_word: יִשְׁלַח
  chosen: let ... send
  alternatives:
  - may ... send
  - will send
  lexicon: HALOT
  rationale: 'The yiqtol here functions jussively in context, expressing a request:
    ''let my lord send.'' Rendering it as simple future (''will send'') would weaken
    the petitionary force.'
- source_word: לַעֲבָדָיו
  chosen: to his servants
  alternatives:
  - for his servants
  - to his workers
  lexicon: HALOT
  rationale: Refers to Huram's laborers/servants. 'To his servants' is the most direct
    rendering of the preposition ל plus עבד. 'Workers' is contextually possible but
    less lexically transparent.
