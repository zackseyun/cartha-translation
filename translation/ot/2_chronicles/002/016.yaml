id: 2CH.2.16
reference: 2 Chronicles 2:16
source:
  edition: WLC
  text: וַ/יִּסְפֹּ֣ר שְׁלֹמֹ֗ה כָּל הָ/אֲנָשִׁ֤ים הַ/גֵּירִים֙ אֲשֶׁר֙ בְּ/אֶ֣רֶץ
    יִשְׂרָאֵ֔ל אַחֲרֵ֣י הַ/סְּפָ֔ר אֲשֶׁ֥ר סְפָרָ֖/ם דָּוִ֣יד אָבִ֑י/ו וַ/יִּמָּצְא֗וּ
    מֵאָ֤ה וַ/חֲמִשִּׁים֙ אֶ֔לֶף וּ/שְׁלֹ֥שֶׁת אֲלָפִ֖ים וְ/שֵׁ֥שׁ מֵאֽוֹת־׃
translation:
  text: Then Solomon counted all the resident foreigners who were in the land of Israel,
    after the census that David his father had taken of them, and they were found
    to be one hundred fifty-three thousand six hundred.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sojourners' or 'the resident aliens.' The Hebrew term refers to
      non-Israelites residing within Israelite territory.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְפֹּר
  chosen: counted
  alternatives:
  - numbered
  - took a census of
  lexicon: HALOT
  rationale: The verb ספר here denotes counting/enumerating persons. 'Counted' is
    natural modern English and fits the subsequent reference to a prior census. 'Took
    a census of' is possible but would over-specify the single verb since the noun
    'census' appears later in the verse.
- source_word: הָאֲנָשִׁים הַגֵּירִים
  chosen: the resident foreigners
  alternatives:
  - the sojourners
  - the resident aliens
  - the foreign men
  lexicon: HALOT
  rationale: גֵּרִים refers to non-native residents living among Israel, not merely
    travelers. 'Resident foreigners' communicates the social-legal category clearly
    in contemporary English. 'Resident aliens' is accurate but sounds bureaucratic;
    'sojourners' is more traditional but less immediately clear.
- source_word: בְּאֶרֶץ יִשְׂרָאֵל
  chosen: in the land of Israel
  alternatives:
  - in Israel
  lexicon: HALOT
  rationale: Retaining 'land of Israel' preserves the territorial sense of אֶרֶץ and
    matches the Hebrew wording more closely than the shorter 'in Israel'.
- source_word: אַחֲרֵי הַסְּפָר
  chosen: after the census
  alternatives:
  - according to the count
  - after the numbering
  lexicon: HALOT
  rationale: The phrase points to a prior enumeration. 'After the census' is the most
    idiomatic rendering in context, likely meaning subsequent to or in accordance
    with the earlier census record.
- source_word: אֲשֶׁר סְפָרָם דָּוִיד אָבִיו
  chosen: that David his father had taken of them
  alternatives:
  - which David his father had counted
  - that David his father had numbered
  lexicon: HALOT
  rationale: English idiom commonly says one 'takes' a census. 'His father' reflects
    dynastic fatherhood/ancestry in royal narrative; here it refers to David as Solomon's
    father straightforwardly.
- source_word: וַיִּמָּצְאוּ
  chosen: they were found to be
  alternatives:
  - there were found
  - they amounted to
  lexicon: HALOT
  rationale: The Niphal of מצא here introduces the total discovered by counting. 'They
    were found to be' preserves the passive/resultative sense without awkwardness.
- source_word: מֵאָה וַחֲמִשִּׁים אֶלֶף וּשְׁלֹשֶׁת אֲלָפִים וְשֵׁשׁ מֵאוֹת
  chosen: one hundred fifty-three thousand six hundred
  alternatives:
  - 153,600
  lexicon: HALOT
  rationale: The full number is rendered in standard English words for readability
    in running text while preserving the exact total.
