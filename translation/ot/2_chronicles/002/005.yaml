id: 2CH.2.5
reference: 2 Chronicles 2:5
source:
  edition: WLC
  text: וּ/מִ֤י יַעֲצָר כֹּ֨חַ֙ לִ/בְנֽוֹת ל֣/וֹ בַ֔יִת כִּ֧י הַ/שָּׁמַ֛יִם וּ/שְׁמֵ֥י
    הַ/שָּׁמַ֖יִם לֹ֣א יְכַלְכְּלֻ֑/הוּ וּ/מִ֤י אֲנִי֙ אֲשֶׁ֣ר אֶבְנֶה לּ֣/וֹ בַ֔יִת
    כִּ֖י אִם לְ/הַקְטִ֥יר לְ/פָנָֽי/ו־־־־׃
translation:
  text: But who has the strength to build a house for him, since the heavens, even
    the highest heavens, cannot contain him? And who am I, that I should build a house
    for him, except to burn incense before him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the heavens and the heavens of the heavens,'' an idiom meaning
      the highest heavens.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to offer incense before him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעֲצָר כֹּחַ
  chosen: has the strength
  alternatives:
  - can prevail
  - is able
  - has power
  lexicon: HALOT
  rationale: The idiom combines עצר with כוח to express having sufficient power or
    capacity. 'Has the strength' is natural English and preserves the rhetorical question
    about adequacy for the task.
- source_word: לִבְנוֹת לוֹ בַיִת
  chosen: to build a house for him
  alternatives:
  - to build him a house
  - to build a temple for him
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' 'Temple' is interpretive; the context
    is temple-building, but 'house' preserves the Hebrew wording while remaining clear.
- source_word: הַשָּׁמַיִם וּשְׁמֵי הַשָּׁמַיִם
  chosen: the heavens, even the highest heavens
  alternatives:
  - heaven and the heaven of heavens
  - the heavens and the heavens of heavens
  lexicon: HALOT
  rationale: The Hebrew superlative-like expression is rendered idiomatically as 'the
    highest heavens' while retaining the two-part structure with 'even' for emphasis.
- source_word: לֹא יְכַלְכְּלֻהוּ
  chosen: cannot contain him
  alternatives:
  - cannot hold him
  - cannot sustain him
  - cannot encompass him
  lexicon: HALOT
  rationale: In this context of divine transcendence and temple-building, the verb
    conveys that even the heavens are inadequate to contain God. 'Contain' is the
    clearest idiomatic English choice.
- source_word: וּמִי אֲנִי
  chosen: And who am I
  alternatives:
  - But who am I
  - Who am I
  lexicon: HALOT
  rationale: The phrase expresses humility in light of God's greatness. 'And' reflects
    the simple conjunction and keeps the flow of the argument.
- source_word: אֲשֶׁר אֶבְנֶה לוֹ בַיִת
  chosen: that I should build a house for him
  alternatives:
  - that I may build a house for him
  - that I would build a house for him
  lexicon: HALOT
  rationale: The relative clause after 'who am I' is best expressed in English as
    'that I should build,' conveying unworthiness rather than mere futurity.
- source_word: כִּי אִם
  chosen: except
  alternatives:
  - but only
  - unless
  lexicon: HALOT
  rationale: 'Here כי אם introduces limitation: the house is not to contain God, but
    serves a restricted cultic purpose. ''Except'' is concise and accurate.'
- source_word: לְהַקְטִיר לְפָנָיו
  chosen: to burn incense before him
  alternatives:
  - to make offerings smoke before him
  - to offer incense before him
  lexicon: HALOT
  rationale: הקטיר literally refers to causing an offering to go up in smoke; with
    no explicit object, 'burn incense' fits the temple context and common cultic usage.
    'Before him' preserves the relational/spatial sense of לפניו.
