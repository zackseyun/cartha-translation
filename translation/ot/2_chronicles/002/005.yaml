theological_decisions:
- issue: Divine transcendence versus temple localization
  chosen_reading: Rendered the verse to emphasize that the temple does not contain
    God, but functions as a place of worship before him.
  alternative_readings:
  - A more localized sense that the house is God's dwelling in a containing sense
  rationale: 'The clause ''the heavens, even the highest heavens, cannot contain him''
    controls the meaning of the temple language. The final limitation ''except to
    burn incense before him'' preserves the text''s theological tension: God is worshiped
    in relation to the house without being confined by it.'
  doctrine_reference: Translation philosophy §3
