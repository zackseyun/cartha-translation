id: 2CH.2.2
reference: 2 Chronicles 2:2
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח שְׁלֹמֹ֔ה אֶל חוּרָ֥ם מֶֽלֶךְ צֹ֖ר לֵ/אמֹ֑ר כַּ/אֲשֶׁ֤ר עָשִׂ֨יתָ֙
    עִם דָּוִ֣יד אָבִ֔/י וַ/תִּֽשְׁלַֽח ל֣/וֹ אֲרָזִ֔ים לִ/בְנֽוֹת ל֥/וֹ בַ֖יִת לָ/שֶׁ֥בֶת
    בּֽ/וֹ־־־־־׃
translation:
  text: Then Solomon sent to Huram king of Tyre, saying, “As you dealt with David
    my father and sent him cedars to build himself a house to dwell in, so do with
    me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Huram is the Hebrew form here; the parallel in Kings commonly has the name
      Hiram.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then ... sent
  alternatives:
  - And ... sent
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural modern
    English while preserving sequential force better than a bare 'and' in this context.
- source_word: חוּרָם
  chosen: Huram
  alternatives:
  - Hiram
  lexicon: HALOT
  rationale: The Chronicler's Hebrew form is חוּרָם, best represented as 'Huram.'
    'Hiram' reflects the more familiar form in Kings and may be preserved as an alternative
    in a footnote if desired, but the main text follows the source form.
- source_word: מֶלֶךְ צֹר
  chosen: king of Tyre
  lexicon: HALOT
  rationale: 'Standard construct rendering: title plus place name.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: English idiom prefers 'saying' to introduce direct speech.
- source_word: כַּאֲשֶׁר
  chosen: As
  alternatives:
  - Just as
  - According as
  lexicon: HALOT
  rationale: Introduces the comparison between Huram's prior action toward David and
    Solomon's present request. 'As' is concise and natural.
- source_word: עָשִׂיתָ עִם דָּוִיד אָבִי
  chosen: you dealt with David my father
  alternatives:
  - you acted toward David my father
  - you did for David my father
  lexicon: HALOT
  rationale: The idiom עשה עם commonly means 'deal with' or 'act toward' someone.
    'Dealt with' is idiomatic and broad enough to be specified by the following clause.
- source_word: וַתִּשְׁלַח לוֹ אֲרָזִים
  chosen: and sent him cedars
  alternatives:
  - and sent cedar logs to him
  - and sent him cedar wood
  lexicon: HALOT
  rationale: אֲרָזִים is the plural of 'cedar'; in building contexts it can denote
    cedar timber. 'Cedars' is a conventional concise rendering that preserves the
    lexical form without over-specifying 'logs' or 'wood' absent an explicit term.
- source_word: לִבְנוֹת לוֹ בַיִת
  chosen: to build himself a house
  alternatives:
  - to build a house for himself
  - to build him a house
  lexicon: HALOT
  rationale: The double ל marks purpose and beneficiary. 'To build himself a house'
    is natural English and preserves that the house was for David's own use.
- source_word: לָשֶׁבֶת בּוֹ
  chosen: to dwell in
  alternatives:
  - to live in
  - to sit in
  lexicon: HALOT
  rationale: ישב in this context means to dwell/reside. 'Dwell in' fits the elevated
    but readable register of the passage.
- source_word: ellipsis after לָשֶׁבֶת בּוֹ
  chosen: so do with me
  alternatives:
  - do the same with me
  - likewise deal with me
  lexicon: HALOT
  rationale: Chronicles continues the request into the next verse, but in English
    this verse's direct speech is awkward if left without the implied apodosis. 'So
    do with me' makes explicit the comparison already signaled by כַאֲשֶׁר and matches
    the parallel in 1 Kings 5:15 English versification/tradition, while remaining
    faithful to the sense of the request.
