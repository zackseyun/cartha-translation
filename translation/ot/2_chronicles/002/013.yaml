theological_decisions:
- issue: Gendered language in artisan reference
  chosen_reading: your skilled men
  alternative_readings:
  - your skilled workers
  - your craftsmen
  rationale: The source uses a masculine plural form. Following the project's gender-accurate
    policy, the translation preserves the masculine form rather than neutralizing
    it, while the context makes clear that artisans are in view.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Courtly address אֲדֹנִי
  chosen_reading: my lord David your father
  alternative_readings:
  - my master David your father
  rationale: Here אֲדֹנִי is a human honorific, not a divine title. 'My lord' is the
    most natural courtly English equivalent and does not create theological confusion
    in context.
  doctrine_reference: DOCTRINE.md Contested terms table on κύριος is not directly
    applicable; decision based on source-context sensitivity
