id: 2CH.2.13
reference: 2 Chronicles 2:13
source:
  edition: WLC
  text: בֶּן אִשָּׁ֞ה מִן בְּנ֣וֹת דָּ֗ן וְ/אָבִ֣י/ו אִישׁ צֹרִ֡י יוֹדֵ֡עַ לַ/עֲשׂ֣וֹת
    בַּ/זָּֽהָב וּ֠/בַ/כֶּסֶף בַּ/נְּחֹ֨שֶׁת בַּ/בַּרְזֶ֜ל בָּ/אֲבָנִ֣ים וּ/בָ/עֵצִ֗ים
    בָּ/אַרְגָּמָ֤ן בַּ/תְּכֵ֨לֶת֙ וּ/בַ/בּ֣וּץ וּ/בַ/כַּרְמִ֔יל וּ/לְ/פַתֵּ֨חַ֙ כָּל
    פִּתּ֔וּחַ וְ/לַ/חְשֹׁ֖ב כָּל מַחֲשָׁ֑בֶת אֲשֶׁ֤ר יִנָּֽתֶן ל/וֹ֙ עִם חֲכָמֶ֔י/ךָ
    וְֽ/חַכְמֵ֔י אֲדֹנִ֖/י דָּוִ֥יד אָבִֽי/ךָ־־־־־־־־׃
translation:
  text: the son of a woman from the daughters of Dan, and his father was a man of
    Tyre, skilled to work in gold and silver, bronze and iron, stone and wood, purple,
    blue, fine linen, and crimson, and to engrave every kind of engraving and to devise
    every kind of design that may be assigned to him, with your skilled men and the
    skilled men of my lord David your father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “scarlet” for “crimson.”
    reason: lexical_alternative
  - marker: b
    text: “From the daughters of Dan” likely indicates that his mother was from the
      tribe of Dan.
    reason: cultural_note
lexical_decisions:
- source_word: בֶּן אִשָּׁה
  chosen: the son of a woman
  alternatives:
  - a woman's son
  lexicon: HALOT
  rationale: A formally close rendering preserves the genealogical description without
    smoothing it into a more interpretive phrase. The construct chain straightforwardly
    means 'son of a woman.'
- source_word: מִן בְּנוֹת דָּן
  chosen: from the daughters of Dan
  alternatives:
  - from the women of Dan
  - of the tribe of Dan
  lexicon: HALOT
  rationale: The Hebrew literally says 'from the daughters of Dan.' This likely indicates
    maternal descent from Dan. 'Of the tribe of Dan' is interpretive and less transparent
    to the wording, so the more literal phrase is retained.
- source_word: וְאָבִיו אִישׁ צֹרִי
  chosen: and his father was a man of Tyre
  alternatives:
  - and his father was a Tyrian man
  - and his father was a man from Tyre
  lexicon: HALOT
  rationale: צֹרִי denotes someone from Tyre. 'A man of Tyre' is idiomatic modern
    English while preserving the geographic identity.
- source_word: יוֹדֵעַ לַעֲשׂוֹת
  chosen: skilled to work
  alternatives:
  - knowing how to make
  - skillful in making
  - able to do
  lexicon: HALOT
  rationale: The participle plus infinitive expresses practical expertise, not mere
    cognitive knowledge. 'Skilled to work' captures artisan competence in concise
    English.
- source_word: בַּזָּהָב וּבַכֶּסֶף בַּנְּחֹשֶׁת בַּבַּרְזֶל
  chosen: in gold and silver, bronze and iron
  alternatives:
  - with gold and silver, bronze and iron
  lexicon: HALOT
  rationale: The repeated ב marks the materials in which he works. 'In' is natural
    with craftsmanship in English and preserves the list of media.
- source_word: בָּאֲבָנִים וּבָעֵצִים
  chosen: stone and wood
  alternatives:
  - stones and woods
  - in stone and wood
  lexicon: HALOT
  rationale: English commonly uses mass-like singulars for materials. This avoids
    awkward plural forms while preserving the sense of working media.
- source_word: בָּאַרְגָּמָן
  chosen: purple
  alternatives:
  - purple fabric
  - purple yarn
  lexicon: HALOT
  rationale: אַרְגָּמָן denotes purple-dyed material. 'Purple' is the conventional
    concise rendering; the material sense is clear from the craft list.
- source_word: בַּתְּכֵלֶת
  chosen: blue
  alternatives:
  - blue-purple
  - violet
  lexicon: HALOT
  rationale: תְּכֵלֶת refers to a blue dyed material. 'Blue' is the standard accessible
    rendering, even though the exact ancient hue may overlap with violet.
- source_word: וּבַבּוּץ
  chosen: fine linen
  alternatives:
  - byssus
  - linen
  lexicon: HALOT
  rationale: בּוּץ refers to fine linen. 'Fine linen' communicates the quality and
    avoids the opaque loanword 'byssus.'
- source_word: וּבַכַּרְמִיל
  chosen: crimson
  alternatives:
  - scarlet
  lexicon: HALOT
  rationale: The term denotes a red dyed material. 'Crimson' is a natural rendering
    here; 'scarlet' is also possible and worth preserving in a footnote as a lexical
    alternative.
- source_word: וּלְפַתֵּחַ כָּל פִּתּוּחַ
  chosen: to engrave every kind of engraving
  alternatives:
  - to execute every kind of engraving
  - to carve any design
  lexicon: HALOT
  rationale: The cognate verb-noun pairing emphasizes engraved workmanship. The English
    keeps that emphasis, though slightly smoothed with 'every kind of' for readability.
- source_word: וְלַחְשֹׁב כָּל מַחֲשָׁבֶת
  chosen: to devise every kind of design
  alternatives:
  - to plan every kind of work
  - to invent every kind of artistic design
  lexicon: HALOT
  rationale: The verb חשׁב in artisan contexts can mean to design or devise artistic
    work. 'Design' fits the craftsmanship context better than the overly abstract
    'thought.'
- source_word: אֲשֶׁר יִנָּתֶן לוֹ
  chosen: that may be assigned to him
  alternatives:
  - that is given to him
  - that may be entrusted to him
  lexicon: HALOT
  rationale: The passive of נתן here refers to tasks being given or assigned. 'Assigned'
    makes the occupational sense explicit in natural English.
- source_word: עִם חֲכָמֶיךָ
  chosen: with your skilled men
  alternatives:
  - with your wise men
  - with your craftsmen
  lexicon: HALOT
  rationale: In this context חכמים refers to skilled artisans rather than sages. 'Skilled
    men' preserves the masculine form and the craft context without over-specifying
    a narrower trade.
- source_word: וְחַכְמֵי אֲדֹנִי דָּוִיד אָבִיךָ
  chosen: and the skilled men of my lord David your father
  alternatives:
  - and the craftsmen of my lord David your father
  lexicon: HALOT
  rationale: The phrase refers to David's artisans. 'My lord David your father' preserves
    the courtly address and relational wording of the Hebrew.
