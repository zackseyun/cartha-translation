id: 2CH.2.15
reference: 2 Chronicles 2:15
source:
  edition: WLC
  text: וַ֠/אֲנַחְנוּ נִכְרֹ֨ת עֵצִ֤ים מִן הַ/לְּבָנוֹן֙ כְּ/כָל צָרְכֶּ֔/ךָ וּ/נְבִיאֵ֥/ם
    לְ/ךָ֛ רַפְסֹד֖וֹת עַל יָ֣ם יָפ֑וֹ וְ/אַתָּ֛ה תַּעֲלֶ֥ה אֹתָ֖/ם יְרוּשָׁלִָֽם־־־׃פ
translation:
  text: And we will cut timber from Lebanon, as much as you need, and bring it to
    you as rafts by sea to Joppa; and you will take it up to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bring them to you in rafts' or 'bring them to you as floats.'
    reason: lexical_alternative
  - marker: b
    text: Joppa is the seaport later known as Jaffa.
    reason: cultural_note
  - marker: c
    text: Hebrew 'bring them up to Jerusalem'; 'up' reflects Jerusalem's higher elevation.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִכְרֹת
  chosen: we will cut
  alternatives:
  - we will cut down
  - we will fell
  lexicon: HALOT
  rationale: Qal imperfect 1cp of כרת in the context of trees means to cut/fell. 'We
    will cut' is natural English and keeps the direct action without over-specifying
    beyond the Hebrew.
- source_word: עֵצִים
  chosen: timber
  alternatives:
  - trees
  - wood
  - logs
  lexicon: HALOT
  rationale: In a building-supply context, עֵצִים refers not merely to living trees
    but wood/timber intended for construction. 'Timber' best matches the commercial
    and architectural setting.
- source_word: מִן הַלְּבָנוֹן
  chosen: from Lebanon
  alternatives:
  - from the Lebanon
  lexicon: HALOT
  rationale: Although the Hebrew has the article, English idiom normally omits it
    with the place name. The phrase denotes the well-known forest region of Lebanon.
- source_word: כְּכָל צָרְכֶּךָ
  chosen: as much as you need
  alternatives:
  - according to all your need
  - according to all your requirement
  lexicon: HALOT
  rationale: This expresses measure according to Solomon's requirements. 'As much
    as you need' is idiomatic modern English and preserves the full sense.
- source_word: וּנְבִיאֵם לְךָ
  chosen: and bring it to you
  alternatives:
  - and we will bring them to you
  lexicon: HALOT
  rationale: The suffix is plural ('them'), referring to the timber pieces, but English
    commonly treats 'timber' as a mass noun, so singular 'it' is smoother while preserving
    meaning.
- source_word: רַפְסֹדוֹת
  chosen: as rafts
  alternatives:
  - in rafts
  - as floats
  lexicon: HALOT
  rationale: The noun denotes tied-together floating timber. 'As rafts' clearly conveys
    the transport method in natural English.
- source_word: עַל יָם יָפוֹ
  chosen: by sea to Joppa
  alternatives:
  - on the sea to Joppa
  - by sea at Joppa
  lexicon: HALOT
  rationale: The phrase indicates maritime transport with Joppa as destination. 'By
    sea to Joppa' is the clearest idiomatic rendering.
- source_word: יָפוֹ
  chosen: Joppa
  alternatives:
  - Japho
  - Jaffa
  lexicon: HALOT
  rationale: Standard biblical English transliteration is 'Joppa.' This follows the
    instruction to transliterate names by standard conventions.
- source_word: תַּעֲלֶה אֹתָם
  chosen: you will take it up
  alternatives:
  - you will bring them up
  - you will carry them up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/bring up.' Because Jerusalem is topographically
    higher, 'take it up' preserves the directional nuance while remaining idiomatic
    with the mass noun 'timber'.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
