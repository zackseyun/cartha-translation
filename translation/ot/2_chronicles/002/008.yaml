id: 2CH.2.8
reference: 2 Chronicles 2:8
source:
  edition: WLC
  text: וּ/לְ/הָכִ֥ין לִ֛/י עֵצִ֖ים לָ/רֹ֑ב כִּ֥י הַ/בַּ֛יִת אֲשֶׁר אֲנִ֥י בוֹנֶ֖ה
    גָּד֥וֹל וְ/הַפְלֵֽא־׃
translation:
  text: and to prepare for me timber in abundance, for the house that I am building
    will be great and wonderful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple'; Hebrew literally 'the house.'
    reason: lexical_alternative
  - marker: b
    text: Or 'great and marvelous.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְהָכִין
  chosen: and to prepare
  alternatives:
  - and prepare
  - and make ready
  lexicon: HALOT
  rationale: Infinitive construct with prefixed conjunction and preposition continues
    the request from the previous verse; 'to prepare' preserves the purposive sense
    naturally in English.
- source_word: לִי
  chosen: for me
  alternatives:
  - for myself
  lexicon: HALOT
  rationale: The preposition with 1cs suffix marks benefit or advantage; 'for me'
    is the most direct rendering in context of Solomon's request.
- source_word: עֵצִים
  chosen: timber
  alternatives:
  - wood
  - trees
  lexicon: HALOT
  rationale: In a building context, 'timber' better conveys processed building wood
    than the broader 'wood' or literal 'trees'.
- source_word: לָרֹב
  chosen: in abundance
  alternatives:
  - in great quantity
  - abundantly
  lexicon: HALOT
  rationale: The phrase indicates large quantity; 'in abundance' is idiomatic and
    preserves the nominal sense.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the request; 'for' is concise and fits elevated
    narrative style.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: Hebrew literally says 'the house.' Although the referent is the temple,
    retaining 'house' preserves the source wording and biblical idiom.
- source_word: אֲשֶׁר אֲנִי בוֹנֶה
  chosen: that I am building
  alternatives:
  - which I am building
  - that I will build
  lexicon: HALOT
  rationale: The relative clause with participle expresses an ongoing or imminent
    building action; 'that I am building' is natural English and reflects the participial
    aspect.
- source_word: גָּדוֹל
  chosen: great
  alternatives:
  - large
  lexicon: HALOT
  rationale: '''Great'' carries both size and grandeur, fitting the temple context
    better than merely spatial ''large.'''
- source_word: וְהַפְלֵא
  chosen: wonderful
  alternatives:
  - marvelous
  - extraordinary
  lexicon: HALOT
  rationale: From the root פלא, denoting what is extraordinary or wondrous. 'Wonderful'
    pairs well with 'great' and communicates exceptional splendor without over-paraphrase.
