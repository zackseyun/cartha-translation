id: 2CH.2.10
reference: 2 Chronicles 2:10
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר חוּרָ֤ם מֶֽלֶךְ צֹר֙ בִּ/כְתָ֔ב וַ/יִּשְׁלַ֖ח אֶל שְׁלֹמֹ֑ה בְּ/אַהֲבַ֤ת יְהוָה֙ אֶת עַמּ֔/וֹ נְתָנְ/ךָ֥ עֲלֵי/הֶ֖ם מֶֽלֶךְ־־־׃
translation:
  text: 'Then Huram king of Tyre answered in a letter that he sent to Solomon: “Because Yahweh loves his people, he has made you king over them.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Huram; traditionally Hiram.
    reason: alternative_reading
  - marker: b
    text: Or “Out of the LORD’s love for his people.”
    reason: lexical_alternative
  - marker: c
    text: Or 'said in a letter, and sent it to Solomon'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence.
- source_word: חוּרָם
  chosen: Huram
  alternatives:
  - Hiram
  lexicon: HALOT
  rationale: The Hebrew form here is חוּרָם, best represented as 'Huram.' 'Hiram' reflects a familiar variant/traditional English form but not the consonantal form of this verse.
- source_word: מֶלֶךְ צֹר
  chosen: king of Tyre
  alternatives:
  - the king of Tyre
  lexicon: HALOT
  rationale: Construct chain straightforwardly identifies Huram's royal office and realm. English idiom prefers 'king of Tyre.'
- source_word: בִּכְתָב
  chosen: in a letter
  alternatives:
  - in writing
  - by letter
  lexicon: HALOT
  rationale: The noun denotes written form/document. 'In a letter' is clear modern English and fits the following verb 'sent it to Solomon.'
- source_word: וַיִּשְׁלַח אֶל שְׁלֹמֹה
  chosen: and sent it to Solomon
  alternatives:
  - and sent to Solomon
  - and sent word to Solomon
  lexicon: HALOT
  rationale: English requires an implied object from 'letter.' Supplying 'it' is warranted by context and avoids awkwardness.
- source_word: בְּאַהֲבַת
  chosen: Because ... loves
  alternatives:
  - In the love of
  - Because of the love of
  - Out of love for
  lexicon: HALOT
  rationale: 'The prefixed ב plus abstract noun can express causal sense here. Rendering it causally produces natural English and matches the clause logic: the LORD''s love for his people explains Solomon''s appointment.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his nation
  lexicon: HALOT
  rationale: The suffix refers to the LORD, not Solomon; 'his people' is the natural covenantal expression in English.
- source_word: נְתָנְךָ
  chosen: he has made you
  alternatives:
  - he has given you
  - he has appointed you
  lexicon: HALOT
  rationale: נתן literally means 'give,' but with a person plus royal office it idiomatically means appointing/placing someone as king. 'Has made you' is idiomatic and faithful.
- source_word: עֲלֵיהֶם מֶלֶךְ
  chosen: king over them
  alternatives:
  - as king over them
  - for a king over them
  lexicon: HALOT
  rationale: The preposition על with מלך indicates rule over the people. 'King over them' is the most natural concise rendering.
