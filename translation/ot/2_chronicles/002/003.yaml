id: 2CH.2.3
reference: 2 Chronicles 2:3
source:
  edition: WLC
  text: הִנֵּה֩ אֲנִ֨י בֽוֹנֶה בַּ֜יִת לְ/שֵׁ֣ם יְהוָ֣ה אֱלֹהָ֗/י לְ/הַקְדִּ֣ישׁ ל֡/וֹ
    לְ/הַקְטִ֣יר לְ/פָנָ֣י/ו קְטֹֽרֶת סַמִּים֩ וּ/מַעֲרֶ֨כֶת תָּמִ֤יד וְ/עֹלוֹת֙ לַ/בֹּ֣קֶר
    וְ/לָ/עֶ֔רֶב לַ/שַּׁבָּתוֹת֙ וְ/לֶ֣/חֳדָשִׁ֔ים וּֽ/לְ/מוֹעֲדֵ֖י יְהוָ֣ה אֱלֹהֵ֑י/נוּ
    לְ/עוֹלָ֖ם זֹ֥את עַל יִשְׂרָאֵֽל־׀־־׃
translation:
  text: Behold, I am building a house for the name of the LORD my God, to consecrate
    it to him, to burn before him fragrant incense, and the regular arrangement of
    bread, and burnt offerings morning and evening, on the Sabbaths, at the new moons,
    and at the appointed feasts of the LORD our God. This is forever for Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the continual showbread' or 'the bread set out
      continually.'
    reason: lexical_alternative
  - marker: b
    text: '''House'' refers to the temple; the Hebrew literally says ''a house for
      the name of the LORD.'''
    reason: lexical_alternative
  - marker: c
    text: The phrase 'This is forever for Israel' means that these offerings are a
      perpetual obligation for Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Discourse marker drawing attention to the declaration. 'Behold' preserves
    the elevated, formal force appropriate to royal speech better than the more colloquial
    'look' or 'see'.
- source_word: בּוֹנֶה
  chosen: am building
  alternatives:
  - build
  - am about to build
  lexicon: HALOT
  rationale: The participle conveys an ongoing or imminent action in context. 'Am
    building' gives natural English while preserving the present/progressive sense.
- source_word: בַּיִת
  chosen: house
  alternatives:
  - temple
  lexicon: HALOT
  rationale: Literally 'house.' Although the referent is the temple, 'house' preserves
    the Hebrew expression 'house for the name of the LORD' and avoids importing an
    interpretive gloss into the main text.
- source_word: לְשֵׁם
  chosen: for the name
  alternatives:
  - for the honor of the name
  - in the name
  lexicon: HALOT
  rationale: The phrase denotes dedication to YHWH's name/presence/reputation. 'For
    the name' is the most transparent rendering and preserves the theological idiom.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֱלֹהָי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward possessive construction; preserves Solomon's personal
    confession in the phrase 'the LORD my God.'
- source_word: לְהַקְדִּישׁ לוֹ
  chosen: to consecrate it to him
  alternatives:
  - to dedicate it to him
  - to make it holy for him
  lexicon: HALOT
  rationale: The Hiphil of קדשׁ here means to set apart as holy. 'Consecrate' best
    preserves the cultic sense; 'it' is supplied naturally in English from 'house'.
- source_word: לְהַקְטִיר לְפָנָיו
  chosen: to burn before him
  alternatives:
  - to offer up before him
  - to make smoke before him
  lexicon: HALOT
  rationale: In sacrificial context, the verb refers to burning an offering, especially
    incense, before God. 'Burn before him' is concise and accurate, with the object
    specified by the following noun.
- source_word: קְטֹרֶת סַמִּים
  chosen: fragrant incense
  alternatives:
  - incense of spices
  - spiced incense
  lexicon: HALOT
  rationale: The phrase refers to specially compounded aromatic incense. 'Fragrant
    incense' is idiomatic modern English and preserves the sensory/cultic force.
- source_word: מַעֲרֶכֶת תָּמִיד
  chosen: the regular arrangement of bread
  alternatives:
  - the continual arrangement
  - the regular row of bread
  - the showbread set out continually
  lexicon: HALOT
  rationale: The noun can denote an arranged row or arrangement, here referring to
    the bread set in order before YHWH. 'Regular arrangement of bread' keeps close
    to the Hebrew without importing the traditional term 'showbread' into the main
    text.
- source_word: עֹלוֹת
  chosen: burnt offerings
  lexicon: HALOT
  rationale: Standard sacrificial term; 'burnt offerings' is the established and accurate
    rendering.
- source_word: לַבֹּקֶר וְלָעֶרֶב
  chosen: morning and evening
  alternatives:
  - in the morning and in the evening
  lexicon: HALOT
  rationale: Temporal pair indicating the daily rhythm of sacrifice. The shorter English
    phrasing is natural and complete.
- source_word: לַשַּׁבָּתוֹת
  chosen: on the Sabbaths
  alternatives:
  - for the Sabbaths
  lexicon: HALOT
  rationale: The preposition marks the occasions on which the offerings are made.
    'On the Sabbaths' communicates the temporal sense clearly.
- source_word: לֶחֳדָשִׁים
  chosen: at the new moons
  alternatives:
  - on the new moons
  - at the monthly festivals
  lexicon: HALOT
  rationale: Refers to the monthly new-moon observances. 'At the new moons' is a natural
    temporal rendering.
- source_word: לְמוֹעֲדֵי
  chosen: at the appointed feasts
  alternatives:
  - at the appointed times
  - at the festivals
  lexicon: HALOT
  rationale: מוֹעֵד can mean appointed time or festival; in this cultic list with
    Sabbaths and new moons, 'appointed feasts' best captures the festal sense.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - perpetually
  - for all time
  lexicon: HALOT
  rationale: In legal/cultic contexts the term denotes enduring obligation. 'Forever'
    is the most direct and readable rendering.
- source_word: זֹאת עַל יִשְׂרָאֵל
  chosen: This is forever for Israel
  alternatives:
  - This is an ordinance for Israel forever
  - This belongs to Israel forever
  - This is incumbent on Israel forever
  lexicon: HALOT
  rationale: The clause states the enduring obligation/status of these practices with
    respect to Israel. Because no explicit noun such as 'statute' appears, the translation
    stays close to the Hebrew while expressing the sense clearly.
