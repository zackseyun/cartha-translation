theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH and preserves the covenant-name
    convention used throughout the translation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render בַּיִת as 'house' or 'temple'
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: The Hebrew says 'house,' and the phrase 'for the name of the LORD' is
    theologically significant in Deuteronomic/Chronicles usage. 'Temple' is interpretively
    correct but less transparent to the source wording.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy
    over translation tradition
- issue: How explicit to make the cultic term מַעֲרֶכֶת תָּמִיד
  chosen_reading: the regular arrangement of bread
  alternative_readings:
  - the continual showbread
  - the bread set out regularly
  rationale: Avoids relying on traditional ecclesiastical jargon ('showbread') in
    the main text while still conveying the temple practice. A footnote preserves
    the familiar traditional term.
  doctrine_reference: DOCTRINE.md Translation philosophy §6, readable modern English,
    not archaic or academic
