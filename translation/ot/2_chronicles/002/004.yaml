id: 2CH.2.4
reference: 2 Chronicles 2:4
source:
  edition: WLC
  text: וְ/הַ/בַּ֛יִת אֲשֶׁר אֲנִ֥י בוֹנֶ֖ה גָּד֑וֹל כִּֽי גָד֥וֹל אֱלֹהֵ֖י/נוּ מִ/כָּל
    הָ/אֱלֹהִֽים־־־׃
translation:
  text: And the house that I am building will be great, for our God is greater than
    all gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple that I am building will be great.' Hebrew literally, 'the
      house that I am building.'
    reason: lexical_alternative
  - marker: b
    text: Or 'our God is great above all gods.' The Hebrew uses 'great' with 'than
      all gods' to express comparison.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/הַ/בַּיִת
  chosen: And the house
  alternatives:
  - And the temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In this context it refers to the sanctuary/temple
    structure, but 'house' preserves the Hebrew wording and its theological resonance
    as God's house. 'Temple' is a possible contextual rendering but is less formally
    aligned here.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: The relative particle is naturally rendered 'that' in contemporary English;
    'which' is possible but less idiomatic here.
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: Straightforward first-person singular pronoun.
- source_word: בוֹנֶה
  chosen: am building
  alternatives:
  - build
  - am about to build
  lexicon: HALOT
  rationale: The participle conveys ongoing or imminent action. 'Am building' gives
    natural English aspect while preserving the sense of an undertaking in progress.
- source_word: גָּדוֹל
  chosen: great
  alternatives:
  - large
  - magnificent
  lexicon: HALOT
  rationale: The adjective denotes greatness in size/status. 'Great' preserves both
    scale and significance better than the more physical 'large' or the more interpretive
    'magnificent'.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the preceding statement. 'For' fits
    the explanatory relation in elevated but readable English.
- source_word: גָדוֹל
  chosen: greater
  alternatives:
  - great
  lexicon: HALOT
  rationale: Although the Hebrew adjective is not morphologically comparative, the
    construction with מִן ('than') makes the sense comparative. English requires 'greater
    than' rather than the unidiomatic 'great ... than.'
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Standard rendering of the plural form with first-person plural suffix
    when referring to Israel's God.
- source_word: מִכָּל
  chosen: than all
  alternatives:
  - above all
  - more than all
  lexicon: HALOT
  rationale: The preposition מִן with כָּל after a comparative adjective is best rendered
    'than all.' This preserves the explicit comparison.
- source_word: הָאֱלֹהִים
  chosen: gods
  alternatives:
  - the gods
  - divine beings
  lexicon: HALOT
  rationale: In this comparative statement, אֱלֹהִים refers to other gods/deities.
    English idiom omits the article after 'all' ('all gods'). 'Divine beings' is possible
    in some contexts, but 'gods' best matches the polemical comparison here.
