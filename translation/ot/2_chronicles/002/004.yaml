theological_decisions:
- issue: Rendering the comparison with other deities
  chosen_reading: our God is greater than all gods
  alternative_readings:
  - our God is great above all gods
  - our God is greater than all divine beings
  rationale: The verse makes a comparative claim about Israel's God over against all
    other so-called gods. The translation preserves the text's rhetoric without importing
    a philosophical explanation of whether these are idols, false gods, or heavenly
    beings. 'Greater than all gods' is the most direct and idiomatic rendering of
    גָדוֹל ... מִכָּל הָאֱלֹהִים.
  doctrine_reference: Preserve theological tension rather than resolve it.
