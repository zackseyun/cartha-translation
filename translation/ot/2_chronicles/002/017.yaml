id: 2CH.2.17
reference: 2 Chronicles 2:17
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ מֵ/הֶ֜ם שִׁבְעִ֥ים אֶ֨לֶף֙ סַבָּ֔ל וּ/שְׁמֹנִ֥ים אֶ֖לֶף חֹצֵ֣ב
    בָּ/הָ֑ר וּ/שְׁלֹ֤שֶׁת אֲלָפִים֙ וְ/שֵׁ֣שׁ מֵא֔וֹת מְנַצְּחִ֖ים לְ/הַעֲבִ֥יד אֶת
    הָ/עָֽם־׃
translation:
  text: From them he made seventy thousand burden-bearers, and eighty thousand stonecutters
    in the hill country, and three thousand six hundred overseers to make the people
    work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'quarrymen in the mountains.' The Hebrew literally says 'hewers in the
      mountain/hill country,' with the object implied by context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ מֵהֶם
  chosen: From them he made
  alternatives:
  - He appointed from among them
  - He made some of them into
  lexicon: HALOT
  rationale: The idiom עשה מן/מֵהֶם here means to make/appoint out of a group. 'From
    them he made' preserves the Hebrew construction while remaining natural enough
    in English.
- source_word: סַבָּל
  chosen: burden-bearers
  alternatives:
  - porters
  - laborers
  - carriers
  lexicon: HALOT
  rationale: The noun denotes one who carries loads. 'Burden-bearers' is more precise
    than the broader 'laborers' and avoids the narrower institutional sense of 'porters'.
- source_word: חֹצֵב בָּהָר
  chosen: stonecutters in the hill country
  alternatives:
  - hewers in the mountain
  - quarrymen in the mountains
  lexicon: HALOT
  rationale: חצב means to hew/cut, often stone in building contexts. Because the object
    is implicit and the context is temple construction, 'stonecutters' makes the sense
    clear. בָּהָר is rendered 'in the hill country' as a natural equivalent of 'in
    the mountain/hill region.'
- source_word: מְנַצְּחִים
  chosen: overseers
  alternatives:
  - supervisors
  - foremen
  lexicon: HALOT
  rationale: The participle from נצח in this administrative context refers to those
    directing or supervising labor. 'Overseers' is a standard and suitably formal
    rendering.
- source_word: לְהַעֲבִיד אֶת הָעָם
  chosen: to make the people work
  alternatives:
  - to set the people to work
  - to direct the people in the labor
  - to keep the people working
  lexicon: HALOT
  rationale: The Hiphil of עבד means to cause to work or set to labor. 'To make the
    people work' is direct and reflects the causative force without unnecessary paraphrase.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the workforce
  - the laborers
  lexicon: HALOT
  rationale: The Hebrew is simply 'the people.' While contextually these are laborers,
    the translation keeps the broader term and lets the context specify their role.
