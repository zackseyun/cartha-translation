id: 2CH.3.14
reference: 2 Chronicles 3:14
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ֙ אֶת הַ/פָּרֹ֔כֶת תְּכֵ֥לֶת וְ/אַרְגָּמָ֖ן וְ/כַרְמִ֣יל וּ/ב֑וּץ
    וַ/יַּ֥עַל עָלָ֖י/ו כְּרוּבִֽים־׃ס
translation:
  text: He made the curtain of blue, purple, crimson, and fine linen, and worked cherubim
    on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the veil.'
    reason: lexical_alternative
  - marker: b
    text: Or 'scarlet' for 'crimson.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'and he caused cherubim to go up on it,' that is, he decorated
      it with cherubim figures.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפָּרֹכֶת
  chosen: the curtain
  alternatives:
  - the veil
  lexicon: HALOT
  rationale: פָּרֹכֶת refers to the inner hanging/partition in the sanctuary. 'Curtain'
    is clearer modern English, while 'veil' is a traditional alternative worth preserving.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - blue cloth
  lexicon: HALOT
  rationale: The term denotes a blue or blue-violet dyed material used in tabernacle/temple
    textiles. 'Blue' is the most natural concise rendering in an English list of materials/colors.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  - purple cloth
  lexicon: HALOT
  rationale: Standard rendering for the prestigious purple-dyed material. In this
    coordinate list, the color term communicates the sense well.
- source_word: כַרְמִיל
  chosen: crimson
  alternatives:
  - scarlet
  lexicon: HALOT
  rationale: The word denotes a red dyed material. 'Crimson' fits the likely shade
    and distinguishes it from simpler 'red'; 'scarlet' is a common traditional alternative.
- source_word: בּוּץ
  chosen: fine linen
  alternatives:
  - linen
  lexicon: HALOT
  rationale: בּוּץ denotes fine linen rather than linen in general. 'Fine linen' preserves
    the textile's quality and cultic richness.
- source_word: וַיַּעַל עָלָיו כְּרוּבִים
  chosen: worked cherubim on it
  alternatives:
  - put cherubim on it
  - embroidered cherubim on it
  - caused cherubim to go up on it
  lexicon: HALOT
  rationale: The idiom literally uses 'made go up upon it' and in context refers to
    producing/decorating the curtain with cherubim figures. 'Worked cherubim on it'
    captures the artisan sense without over-specifying the exact technique, while
    remaining more natural than a literalistic rendering.
- source_word: כְּרוּבִים
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' preserves the conventional biblical term and matches temple/tabernacle
    imagery better than the more colloquial ''cherubs''.'
