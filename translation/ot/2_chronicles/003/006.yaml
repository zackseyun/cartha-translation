id: 2CH.3.6
reference: 2 Chronicles 3:6
source:
  edition: WLC
  text: וַ/יְצַ֧ף אֶת הַ/בַּ֛יִת אֶ֥בֶן יְקָרָ֖ה לְ/תִפְאָ֑רֶת וְ/הַ/זָּהָ֖ב זְהַ֥ב
    פַּרְוָֽיִם־׃
translation:
  text: He overlaid the house with precious stones for beauty, and the gold was gold
    from Parvaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple' for 'the house'; the Hebrew literally says 'the house,'
      a common designation for the temple in Chronicles.
    reason: lexical_alternative
  - marker: b
    text: Parvaim is a place name of uncertain identification; the phrase may mean
      'gold of Parvaim' or 'Parvaim gold.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְצַף
  chosen: He overlaid
  alternatives:
  - He covered
  - He plated
  lexicon: HALOT
  rationale: The verb צפה in this construction refers to covering a structure with
    a material layer. 'Overlaid' fits temple-building context in English and matches
    the likely sense of applying decorative material to the building.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: The Hebrew reads 'the house.' In Chronicles this commonly refers to the
    temple, but retaining 'house' preserves the source wording while remaining intelligible
    in context.
- source_word: אֶבֶן יְקָרָה
  chosen: precious stones
  alternatives:
  - costly stone
  - valuable stones
  lexicon: HALOT
  rationale: The singular noun with adjective is used collectively here. English idiom
    prefers the plural 'precious stones' for decorative building materials.
- source_word: לְתִפְאָרֶת
  chosen: for beauty
  alternatives:
  - for splendor
  - for adornment
  - for glory
  lexicon: HALOT
  rationale: 'The phrase expresses purpose or result: the stones were used as ornamentation.
    ''For beauty'' is natural modern English and preserves the aesthetic sense without
    overstating theological glory language.'
- source_word: וְהַזָּהָב
  chosen: and the gold
  alternatives:
  - and as for the gold
  lexicon: HALOT
  rationale: The clause shifts to specify the kind of gold used. A straightforward
    rendering preserves the Hebrew coordination.
- source_word: זְהַב פַּרְוָיִם
  chosen: gold from Parvaim
  alternatives:
  - Parvaim gold
  - gold of Parvaim
  lexicon: HALOT
  rationale: The construct phrase most naturally indicates provenance or association.
    Since Parvaim is a place name of uncertain identification, 'gold from Parvaim'
    is the clearest English rendering.
