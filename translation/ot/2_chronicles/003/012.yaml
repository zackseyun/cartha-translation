id: 2CH.3.12
reference: 2 Chronicles 3:12
source:
  edition: WLC
  text: וּ/כְנַ֨ף הַ/כְּר֤וּב הָ/אֶחָד֙ אַמּ֣וֹת חָמֵ֔שׁ מַגִּ֖יעַ לְ/קִ֣יר הַ/בָּ֑יִת
    וְ/הַ/כָּנָ֤ף הָ/אַחֶ֨רֶת֙ אַמּ֣וֹת חָמֵ֔שׁ דְּבֵקָ֕ה לִ/כְנַ֖ף הַ/כְּר֥וּב הָ/אַחֵֽר׃
translation:
  text: The wing of the one cherub was five cubits, reaching to the wall of the house;
    and the other wing was five cubits, touching the wing of the other cherub.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'joined to the wing of the other cherub.'
    reason: lexical_alternative
  - marker: b
    text: '''The house'' here refers to the temple building.'
    reason: cultural_note
lexical_decisions:
- source_word: כְנַף
  chosen: wing
  alternatives:
  - side
  lexicon: HALOT
  rationale: In the temple-cherub context, the concrete sense 'wing' is plainly intended,
    not a figurative 'edge' or 'extremity'.
- source_word: כְּרוּב
  chosen: cherub
  alternatives:
  - cherubim
  lexicon: HALOT
  rationale: Singular noun here, so 'cherub' is required. 'Cherubim' would be plural
    and inaccurate for the individual figure described.
- source_word: אַמּוֹת חָמֵשׁ
  chosen: five cubits
  alternatives:
  - seven and a half feet
  lexicon: HALOT
  rationale: Retains the ancient unit for formal accuracy and consistency in architectural
    measurements; a modern approximation would be interpretive.
- source_word: מַגִּיעַ
  chosen: reaching
  alternatives:
  - extending
  - coming to
  lexicon: HALOT
  rationale: Conveys physical extension up to the wall in natural English while preserving
    the participial sense of contact/arrival.
- source_word: קִיר הַבָּיִת
  chosen: the wall of the house
  alternatives:
  - the wall of the temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house'; in Chronicles this refers to the temple
    structure. 'House' preserves the source wording, while context makes the temple
    reference clear.
- source_word: הַכָּנָף הָאַחֶרֶת
  chosen: the other wing
  alternatives:
  - the second wing
  lexicon: HALOT
  rationale: '''The other wing'' is the most natural rendering of the feminine adjective
    אַחֶרֶת modifying ''wing''.'
- source_word: דְּבֵקָה
  chosen: touching
  alternatives:
  - joined to
  - clinging to
  lexicon: HALOT
  rationale: Describes close contact between the wings. 'Touching' is clear and idiomatic
    in this architectural description; 'clinging' would sound overly vivid, and 'joined
    to' could imply fastening not stated in the text.
- source_word: הַכְּרוּב הָאַחֵר
  chosen: the other cherub
  alternatives:
  - the second cherub
  lexicon: HALOT
  rationale: Matches the Hebrew adjective 'other' and preserves the paired relationship
    between the two cherubim.
