id: 2CH.3.4
reference: 2 Chronicles 3:4
source:
  edition: WLC
  text: וְ/הָ/אוּלָ֡ם אֲשֶׁר֩ עַל פְּנֵ֨י הָ/אֹ֜רֶךְ עַל פְּנֵ֤י רֹֽחַב הַ/בַּ֨יִת֙
    אַמּ֣וֹת עֶשְׂרִ֔ים וְ/הַ/גֹּ֖בַהּ מֵאָ֣ה וְ/עֶשְׂרִ֑ים וַ/יְצַפֵּ֥/הוּ מִ/פְּנִ֖ימָה
    זָהָ֥ב טָהֽוֹר־־־׃
translation:
  text: The portico that was in front of the house was twenty cubits long, corresponding
    to the width of the house, and its height was one hundred and twenty; and he overlaid
    its interior with pure gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew text states that the portico's height was 'one hundred and twenty.'
      A parallel description in 1 Kings 6:3 gives the portico's length and width but
      not this height, and some interpreters suspect a textual difficulty here; the
      translation follows the Masoretic Text as preserved.
    reason: textual_variant
lexical_decisions:
- source_word: הָאוּלָם
  chosen: the portico
  alternatives:
  - the vestibule
  - the porch
  lexicon: HALOT
  rationale: אוּלָם denotes the entrance hall/porch structure before the main building.
    'Portico' is clear modern architectural English and fits a temple-front structure
    better than the more archaic 'porch' or the less natural 'vestibule' in this context.
- source_word: אֲשֶׁר עַל־פְּנֵי
  chosen: that was in front of
  alternatives:
  - which was before
  - that faced
  lexicon: HALOT
  rationale: The relative clause plus עַל־פְּנֵי expresses position before or in front
    of something. 'Was in front of' is natural English and preserves the spatial sense
    without overinterpreting orientation.
- source_word: הָאֹרֶךְ עַל־פְּנֵי רֹחַב הַבַּיִת
  chosen: twenty cubits long, corresponding to the width of the house
  alternatives:
  - its length was twenty cubits across the width of the house
  - twenty cubits, in front of the width of the house
  lexicon: HALOT
  rationale: The Hebrew is compressed and relates the portico's length to the house's
    width. 'Corresponding to the width of the house' makes explicit the relation implied
    by עַל־פְּנֵי while remaining close to the source.
- source_word: אַמּוֹת עֶשְׂרִים
  chosen: twenty cubits
  lexicon: HALOT
  rationale: Standard rendering of the measurement term; retaining 'cubits' preserves
    the ancient unit rather than converting it.
- source_word: וְהַגֹּבַהּ מֵאָה וְעֶשְׂרִים
  chosen: and its height was one hundred and twenty
  alternatives:
  - and its height was 120 cubits
  lexicon: HALOT
  rationale: This follows the Masoretic Text as given. The noun 'cubits' is not repeated
    in Hebrew here, but is naturally understood from the measurement context; in English
    it can be left implicit after the numeral, as many translations do, or supplied.
    I left it implicit to stay close to the Hebrew wording while preserving sense.
- source_word: וַיְצַפֵּהוּ
  chosen: and he overlaid
  alternatives:
  - and he overlaid it
  - and he covered
  lexicon: HALOT
  rationale: The verb צפה in this stem means to overlay or plate with a material.
    'Overlaid' is the standard architectural rendering. The object suffix refers to
    the portico/interior complex; English can express the action smoothly with 'he
    overlaid' followed by the interior phrase.
- source_word: מִפְּנִימָה
  chosen: its interior
  alternatives:
  - inside
  - on the inside
  lexicon: HALOT
  rationale: The adverbial form means inwardly/on the inside. 'Its interior' gives
    idiomatic English and clarifies that the gold overlay was on the inner surface.
- source_word: זָהָב טָהוֹר
  chosen: pure gold
  lexicon: HALOT
  rationale: A straightforward rendering of the material phrase; 'pure gold' is idiomatic
    and precise.
