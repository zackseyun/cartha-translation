id: 2CH.3.2
reference: 2 Chronicles 3:2
source:
  edition: WLC
  text: וַ֠/יָּחֶל לִ/בְנ֞וֹת בַּ/חֹ֤דֶשׁ הַ/שֵּׁנִי֙ בַּ/שֵּׁנִ֔י בִּ/שְׁנַ֥ת אַרְבַּ֖ע
    לְ/מַלְכוּתֽ/וֹ׃
translation:
  text: He began to build in the second month, on the second day, in the fourth year
    of his reign.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'in the second month, in the second'; the final phrase
      is commonly understood to mean 'on the second day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּחֶל
  chosen: He began
  alternatives:
  - And he began
  lexicon: HALOT
  rationale: From חלל in the hifil/waw-consecutive, introducing the start of the action.
    English normally omits the narrative conjunction in smooth prose, so 'He began'
    best reflects the sense without unnecessary stiffness.
- source_word: לִבְנוֹת
  chosen: to build
  alternatives:
  - to construct
  lexicon: HALOT
  rationale: Infinitive construct of בנה, the standard verb for building. 'Build'
    is the most direct and natural rendering.
- source_word: בַּחֹדֶשׁ הַשֵּׁנִי
  chosen: in the second month
  lexicon: HALOT
  rationale: Temporal phrase marking the month in which the work began. 'In the second
    month' is idiomatic and formally close.
- source_word: בַּשֵּׁנִי
  chosen: on the second day
  alternatives:
  - on the second
  lexicon: HALOT
  rationale: The repeated ordinal after the month is elliptical in Hebrew and commonly
    understood as the day of the month. Rendering the ellipsis explicitly in English
    avoids ambiguity.
- source_word: בִּשְׁנַת אַרְבַּע
  chosen: in the fourth year
  alternatives:
  - during year four
  lexicon: HALOT
  rationale: Standard regnal-year dating formula. 'In the fourth year' is the conventional
    and clear English equivalent.
- source_word: לְמַלְכוּתוֹ
  chosen: of his reign
  alternatives:
  - of his kingship
  lexicon: HALOT
  rationale: Refers to Solomon's royal rule as the chronological reference point.
    'Reign' is the natural English term in dating formulas.
