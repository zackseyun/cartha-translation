  from: the length, in cubits by the former measure, was sixty cubits
  to: the length, according to the former measure, was sixty cubits
  rationale: The current rendering is slightly redundant in English by including 'in cubits' when the measurement 'sixty cubits' follows immediately. While this reflects the repetition of the Hebrew word אַמּוֹת, it creates an awkward phrasing. A smoother rendering like 'the length, according to the former measure, was sixty cubits' captures the full meaning while being more idiomatic and less cumbersome for the reader.
