id: 2CH.3.3
reference: 2 Chronicles 3:3
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה֙ הוּסַ֣ד שְׁלֹמֹ֔ה לִ/בְנ֖וֹת אֶת בֵּ֣ית הָ/אֱלֹהִ֑ים הָ/אֹ֡רֶךְ אַמּ֞וֹת בַּ/מִּדָּ֤ה הָ/רִֽאשׁוֹנָה֙ אַמּ֣וֹת שִׁשִּׁ֔ים וְ/רֹ֖חַב אַמּ֥וֹת עֶשְׂרִֽים־׃
translation:
  text: 'Now these are Solomon’s foundations for building the house of God: the length, according to the former measure, was sixty cubits, and the width twenty cubits.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Now this is what Solomon founded for building the house of God.” The Hebrew of 'foundations/founded' is somewhat difficult, and some translations render the clause more generally as Solomon’s plan or foundation for the temple.
    reason: lexical_alternative
  - marker: b
    text: “By the former measure” may refer to an older cubit standard.
    reason: cultural_note
  - marker: c
    text: Or 'the length, in cubits by the former measure, was sixty cubits'.
    reason: previous_rendering
lexical_decisions:
- source_word: הוּסַד
  chosen: foundations
  alternatives:
  - foundation
  - plan
  - basis
  lexicon: HALOT
  rationale: The passive/perfect form from יסד is difficult in context. In this construction introducing the temple dimensions, it most naturally refers to the foundational specifications or foundation-laying for Solomon’s building work. Rendering with the plural 'foundations' gives idiomatic English after 'these are' and fits the sense of what follows as foundational measurements.
- source_word: לִבְנוֹת
  chosen: for building
  alternatives:
  - to build
  - in building
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses purpose. 'For building' works smoothly with 'these are Solomon’s foundations' and preserves the purposive sense.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - God’s house
  - the temple of God
  lexicon: HALOT
  rationale: A formally close rendering preserves the temple idiom of the Hebrew. 'Temple' is interpretive but accurate; 'house of God' better reflects the source wording.
- source_word: הָאֹרֶךְ
  chosen: the length
  lexicon: HALOT
  rationale: Standard architectural term matching the measurement context.
- source_word: אַמּוֹת
  chosen: cubits
  lexicon: HALOT
  rationale: The ancient unit should be retained rather than converted, since the Hebrew explicitly gives dimensions in cubits.
- source_word: בַּמִּדָּה הָרִאשׁוֹנָה
  chosen: by the former measure
  alternatives:
  - according to the former standard
  - by the old cubit
  lexicon: HALOT
  rationale: The phrase most naturally qualifies the cubit measurement as following an earlier standard. 'By the former measure' is concise and close to the Hebrew while leaving the exact historical referent open.
- source_word: שִׁשִּׁים
  chosen: sixty
  lexicon: HALOT
  rationale: Cardinal number for the temple length.
- source_word: וְרֹחַב
  chosen: and the width
  alternatives:
  - and width
  - its width
  lexicon: HALOT
  rationale: Supplying the article in English yields natural parallelism with 'the length.' The possessive 'its' is implied but not required.
- source_word: עֶשְׂרִים
  chosen: twenty
  lexicon: HALOT
  rationale: Cardinal number for the temple width.
