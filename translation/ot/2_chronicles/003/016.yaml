id: 2CH.3.16
reference: 2 Chronicles 3:16
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ שַׁרְשְׁרוֹת֙ בַּ/דְּבִ֔יר וַ/יִּתֵּ֖ן עַל רֹ֣אשׁ הָ/עַמֻּדִ֑ים
    וַ/יַּ֤עַשׂ רִמּוֹנִים֙ מֵאָ֔ה וַ/יִּתֵּ֖ן בַּֽ/שַּׁרְשְׁרֽוֹת־׃
translation:
  text: He made chains in the inner sanctuary and put them on the tops of the pillars;
    he also made one hundred pomegranates and put them on the chains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the inner room'; traditionally, 'in the Most Holy Place.' The Hebrew
      term refers to the temple's inner sanctuary, though some understand the phrase
      here more broadly in relation to the decorative work.
    reason: alternative_reading
  - marker: b
    text: Or 'chainwork' or 'garlands' for the ornamental decoration.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁרְשְׁרוֹת
  chosen: chains
  alternatives:
  - chainwork
  - wreaths
  - garlands
  lexicon: HALOT
  rationale: The noun denotes chain-like ornamental work. 'Chains' is the most straightforward
    rendering and fits the repeated use later in the verse. Alternatives such as 'chainwork'
    or 'garlands' are possible in architectural/decorative context, but 'chains' preserves
    the concrete sense.
- source_word: בַּדְּבִיר
  chosen: in the inner sanctuary
  alternatives:
  - in the inner room
  - in the Most Holy Place
  lexicon: HALOT
  rationale: דְּבִיר commonly refers to the inner sanctuary of the temple. 'Inner
    sanctuary' is clear modern English and avoids importing the more interpretive
    liturgical label 'Most Holy Place' into a verse where the immediate point is architectural
    placement. Because the exact sense here is debated in context, a footnote preserves
    alternatives.
- source_word: רֹאשׁ הָעַמֻּדִים
  chosen: the tops of the pillars
  alternatives:
  - the heads of the pillars
  lexicon: HALOT
  rationale: Hebrew 'head' is idiomatically rendered 'top' in English for architectural
    objects. This is a natural equivalent that preserves the spatial sense.
- source_word: רִמּוֹנִים
  chosen: pomegranates
  lexicon: HALOT
  rationale: The term refers to pomegranate-shaped ornaments in temple decoration.
    The literal rendering 'pomegranates' is standard and sufficiently clear in context.
- source_word: מֵאָה
  chosen: one hundred
  alternatives:
  - a hundred
  lexicon: HALOT
  rationale: The cardinal number is rendered directly. 'One hundred' is slightly more
    formal and suits the inventory-like description.
- source_word: וַיִּתֵּן בַּשַּׁרְשְׁרוֹת
  chosen: put them on the chains
  alternatives:
  - set them among the chains
  - placed them on the chainwork
  lexicon: HALOT
  rationale: The preposition with the repeated noun most naturally indicates attachment
    to the chains. 'On the chains' is the most direct rendering; alternatives reflect
    the possibility of ornamental integration rather than simple placement.
