id: 2CH.3.9
reference: 2 Chronicles 3:9
source:
  edition: WLC
  text: וּ/מִשְׁקָ֛ל לְ/מִסְמְר֥וֹת לִ/שְׁקָלִ֖ים חֲמִשִּׁ֣ים זָהָ֑ב וְ/הָ/עֲלִיּ֖וֹת
    חִפָּ֥ה זָהָֽב׃
translation:
  text: And the weight of the nails was fifty shekels of gold, and he overlaid the
    upper rooms with gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the upper chambers"; the Hebrew term may refer more generally to upper
      structures or rooms of the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִשְׁקָל
  chosen: And the weight
  alternatives:
  - And the weight was
  - Now the weight
  lexicon: HALOT
  rationale: מִשְׁקָל denotes 'weight' or 'weighing.' The conjunction ו is carried
    as 'And.' English supplies the copular sense through the clause structure without
    needing an explicit 'was' before the predicate phrase.
- source_word: לְמִסְמְרוֹת
  chosen: of the nails
  alternatives:
  - for the nails
  - of the pegs
  lexicon: HALOT
  rationale: מִסְמְרוֹת refers to nails or pegs. In this construction with מִשְׁקָל,
    English idiom is best represented by 'the weight of the nails,' though the Hebrew
    preposition ל can be understood more literally as 'for.' 'Nails' fits the temple-building
    context better than the broader 'pegs.'
- source_word: לִשְׁקָלִים חֲמִשִּׁים
  chosen: was fifty shekels
  alternatives:
  - amounted to fifty shekels
  - for fifty shekels
  lexicon: HALOT
  rationale: The phrase gives the measured amount. Rendering it as 'was fifty shekels'
    is natural English and preserves the quantitative force of the Hebrew.
- source_word: זָהָב
  chosen: of gold
  alternatives:
  - gold
  lexicon: HALOT
  rationale: 'Here זָהָב specifies the material of the shekels/weight: ''fifty shekels
    of gold.'' This is clearer in English than leaving ''gold'' appositional.'
- source_word: וְהָעֲלִיּוֹת
  chosen: the upper rooms
  alternatives:
  - the upper chambers
  - the upper parts
  lexicon: HALOT
  rationale: עֲלִיּוֹת commonly denotes upper chambers/upper rooms. In the temple
    context the exact architectural referent is somewhat uncertain, but 'upper rooms'
    is a straightforward rendering that preserves the spatial sense without over-specifying.
- source_word: חִפָּה
  chosen: he overlaid
  alternatives:
  - he covered
  - he plated
  lexicon: HALOT
  rationale: The verb חפה in this construction refers to overlaying or covering with
    a material, here gold. 'Overlaid' is the standard architectural sense and fits
    temple decoration language well.
- source_word: זָהָב
  chosen: with gold
  alternatives:
  - in gold
  - gold
  lexicon: HALOT
  rationale: With חפה, English idiom prefers 'overlaid ... with gold,' making the
    material explicit as the covering substance.
