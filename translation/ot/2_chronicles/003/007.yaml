id: 2CH.3.7
reference: 2 Chronicles 3:7
source:
  edition: WLC
  text: וַ/יְחַ֨ף אֶת הַ/בַּ֜יִת הַ/קֹּר֧וֹת הַ/סִּפִּ֛ים וְ/קִֽירוֹתָ֥י/ו וְ/דַלְתוֹתָ֖י/ו
    זָהָ֑ב וּ/פִתַּ֥ח כְּרוּבִ֖ים עַל הַ/קִּירֽוֹת־־׃ס
translation:
  text: He overlaid the house with gold—the beams, the thresholds, its walls, and
    its doors—and he carved cherubim on the walls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple' for 'the house.' The Hebrew literally reads 'the house,'
      a common designation for the temple.
    reason: lexical_alternative
  - marker: b
    text: Or 'rafters' for 'beams.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term may also be rendered 'doorposts' or 'sills'; 'thresholds'
      is chosen as the most likely architectural sense here.
    reason: lexical_alternative
  - marker: d
    text: Or 'engraved' instead of 'carved.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַף
  chosen: he overlaid
  alternatives:
  - he covered
  - he overlaid with
  lexicon: HALOT
  rationale: The verb here refers to covering a structure with a material layer. 'Overlaid'
    is the standard architectural sense in this temple context and fits the following
    direct object plus material ('gold').
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: Literally 'the house.' In context it is the temple building, but 'house'
    preserves the Hebrew wording while remaining clear in context.
- source_word: הַקֹּרוֹת
  chosen: the beams
  alternatives:
  - the rafters
  lexicon: HALOT
  rationale: The noun denotes structural timbers. 'Beams' is a natural modern English
    rendering; 'rafters' is possible but more specific than the Hebrew requires.
- source_word: הַסִּפִּים
  chosen: the thresholds
  alternatives:
  - the doorposts
  - the sills
  lexicon: HALOT
  rationale: The term commonly refers to threshold areas or sill/doorway structures.
    'Thresholds' best matches the likely architectural feature here without overcommitting
    to vertical posts.
- source_word: קִירוֹתָיו
  chosen: its walls
  alternatives:
  - its wall surfaces
  lexicon: HALOT
  rationale: Straightforward plural of 'walls' with 3ms suffix referring back to the
    house. 'Its walls' is idiomatic and accurate.
- source_word: דַלְתוֹתָיו
  chosen: its doors
  alternatives:
  - its door leaves
  - its gates
  lexicon: HALOT
  rationale: The noun denotes doors or door-panels. 'Doors' is the clearest general
    rendering in modern English.
- source_word: זָהָב
  chosen: with gold
  alternatives:
  - gold
  lexicon: HALOT
  rationale: Although the Hebrew places 'gold' directly after the list, English idiom
    requires the material to be expressed with 'with gold' to show what the house
    and its features were overlaid with.
- source_word: וּפִתַּח
  chosen: and he carved
  alternatives:
  - and he engraved
  - and he sculpted
  lexicon: HALOT
  rationale: The verb means to engrave or carve decorative figures. 'Carved' is natural
    in English for ornamental work on walls and woodwork.
- source_word: כְּרוּבִים
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' preserves the biblical and temple-cultic term more precisely
    than the colloquial ''cherubs.'''
- source_word: עַל הַקִּירוֹת
  chosen: on the walls
  alternatives:
  - upon the walls
  - into the walls
  lexicon: HALOT
  rationale: The preposition most naturally indicates location of the carved decoration.
    'On the walls' is idiomatic and sufficiently precise.
