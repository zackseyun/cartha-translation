id: 2CH.3.17
reference: 2 Chronicles 3:17
source:
  edition: WLC
  text: וַ/יָּ֤קֶם אֶת הָֽ/עַמּוּדִים֙ עַל פְּנֵ֣י הַ/הֵיכָ֔ל אֶחָ֥ד מִ/יָּמִ֖ין וְ/אֶחָ֣ד
    מֵֽ/הַ/שְּׂמֹ֑אול וַ/יִּקְרָ֤א שֵׁם ה/ימיני יָכִ֔ין וְ/שֵׁ֥ם הַ/שְּׂמָאלִ֖י בֹּֽעַז־־־׃ס
translation:
  text: He set up the pillars in front of the nave, one on the right and one on the
    left; and he called the name of the one on the right Jachin, and the name of the
    one on the left Boaz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple hall' for 'the nave'; Hebrew heikhal refers here to the main
      hall of the temple building, not necessarily the whole temple complex.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  chosen: He set up
  alternatives:
  - he erected
  - he established
  lexicon: HALOT
  rationale: The Hiphil of קום here refers to causing the pillars to stand in place.
    'Set up' is natural modern English and fits the construction context without sounding
    overly technical.
- source_word: הָעַמּוּדִים
  chosen: the pillars
  alternatives:
  - the columns
  lexicon: HALOT
  rationale: עַמּוּדִים denotes structural pillars/columns. 'Pillars' is the more
    familiar biblical-architectural term in English and matches the naming of these
    two prominent temple supports.
- source_word: עַל־פְּנֵי הַהֵיכָל
  chosen: in front of the nave
  alternatives:
  - before the temple hall
  - at the front of the sanctuary
  lexicon: HALOT
  rationale: הֵיכָל in temple-building contexts refers to the main hall/nave rather
    than the entire temple complex. 'In front of the nave' preserves the spatial sense
    of עַל־פְּנֵי ('before/in front of') and avoids the vaguer 'temple'.
- source_word: אֶחָד מִיָּמִין וְאֶחָד מֵהַשְּׂמֹאול
  chosen: one on the right and one on the left
  alternatives:
  - one to the right and one to the left
  - one on the south side and one on the north side
  lexicon: HALOT
  rationale: The text uses ordinary directional language, not explicit cardinal directions.
    'On the right ... on the left' is the most direct rendering and leaves orientation
    implicit as in the Hebrew.
- source_word: וַיִּקְרָא שֵׁם
  chosen: he called the name of
  alternatives:
  - he named
  - he gave the name
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'called the name of.' In English, a slightly
    fuller rendering preserves the naming formula while remaining readable. This also
    mirrors the repeated structure for both pillars.
- source_word: הַיְמִינִי
  chosen: the one on the right
  alternatives:
  - the right one
  - the right-hand one
  lexicon: HALOT
  rationale: The adjective means 'right-side/right-hand.' 'The one on the right' is
    idiomatic and corresponds to the earlier directional phrase.
- source_word: יָכִין
  chosen: Jachin
  alternatives:
  - Yakin
  lexicon: HALOT
  rationale: This is a proper name, so it is transliterated per project philosophy.
    'Jachin' follows standard English biblical convention.
- source_word: הַשְּׂמָאלִי
  chosen: the one on the left
  alternatives:
  - the left one
  - the left-hand one
  lexicon: HALOT
  rationale: The adjective means 'left-side/left-hand.' 'The one on the left' is clear,
    natural, and parallel to the previous phrase.
- source_word: בֹּעַז
  chosen: Boaz
  alternatives:
  - Boʿaz
  lexicon: HALOT
  rationale: This is a proper name and is therefore transliterated. 'Boaz' is the
    standard English form.
