id: 2CH.3.13
reference: 2 Chronicles 3:13
source:
  edition: WLC
  text: כַּנְפֵי֙ הַ/כְּרוּבִ֣ים הָ/אֵ֔לֶּה פֹּֽרְשִׂ֖ים אַמּ֣וֹת עֶשְׂרִ֑ים וְ/הֵ֛ם
    עֹמְדִ֥ים עַל רַגְלֵי/הֶ֖ם וּ/פְנֵי/הֶ֥ם לַ/בָּֽיִת־׃ס
translation:
  text: The wings of these cherubim spread twenty cubits, and they stood on their
    feet, with their faces toward the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''toward the temple.'' Hebrew: ''toward the house,'' a common designation
      for the temple building.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּנְפֵי
  chosen: the wings of
  alternatives:
  - wings
  lexicon: HALOT
  rationale: Construct plural of כָּנָף, introducing the subject as the wings belonging
    to the cherubim. English idiom naturally supplies 'the ... of' for the construct
    relationship.
- source_word: הַכְּרוּבִים הָאֵלֶּה
  chosen: these cherubim
  alternatives:
  - these cherubs
  lexicon: HALOT
  rationale: Retains the demonstrative emphasis and the established biblical term
    'cherubim' rather than the less traditional 'cherubs.'
- source_word: פֹּרְשִׂים
  chosen: spread
  alternatives:
  - were spreading
  - were outspread
  - extended
  lexicon: HALOT
  rationale: The participle describes the state/position of the wings in context.
    Simple present in English gives a natural descriptive sense without over-translating
    aspect.
- source_word: אַמּוֹת עֶשְׂרִים
  chosen: twenty cubits
  alternatives:
  - twenty cubits wide
  - a span of twenty cubits
  lexicon: HALOT
  rationale: Keeps the Hebrew measure literally. The text states the extent as 'twenty
    cubits' without an added explicit dimension word; English can preserve that concision.
- source_word: וְהֵם עֹמְדִים
  chosen: and they stood
  alternatives:
  - and they were standing
  - while they stood
  lexicon: HALOT
  rationale: The pronoun plus participle marks the cherubim themselves, shifting from
    the wings to the figures. English past narrative style is smoother here than a
    participial construction.
- source_word: עַל רַגְלֵיהֶם
  chosen: on their feet
  alternatives:
  - upon their feet
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the prepositional phrase, indicating
    upright posture.
- source_word: וּפְנֵיהֶם לַבָּיִת
  chosen: with their faces toward the house
  alternatives:
  - and their faces were toward the house
  - with their faces toward the temple
  lexicon: HALOT
  rationale: לַבָּיִת indicates orientation toward 'the house.' In Chronicles this
    refers to the temple building, but 'house' preserves the Hebrew term while remaining
    clear in context. 'With' smoothly links the final descriptive clause in English.
