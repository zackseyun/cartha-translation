theological_decisions:
- issue: Rendering בַּיִת in temple-construction context
  chosen_reading: the house
  alternative_readings:
  - the temple
  rationale: The Hebrew uses the ordinary term 'house,' a standard designation for
    the temple. Retaining 'house' preserves source-language texture and avoids unnecessary
    interpretive expansion, while context still makes the referent clear.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English'
