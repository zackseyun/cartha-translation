id: 2CH.3.11
reference: 2 Chronicles 3:11
source:
  edition: WLC
  text: וְ/כַנְפֵי֙ הַ/כְּרוּבִ֔ים אָרְכָּ֖/ם אַמּ֣וֹת עֶשְׂרִ֑ים כְּנַ֨ף הָ/אֶחָ֜ד
    לְ/אַמּ֣וֹת חָמֵ֗שׁ מַגַּ֨עַת֙ לְ/קִ֣יר הַ/בַּ֔יִת וְ/הַ/כָּנָ֤ף הָ/אַחֶ֨רֶת֙
    אַמּ֣וֹת חָמֵ֔שׁ מַגִּ֕יעַ לִ/כְנַ֖ף הַ/כְּר֥וּב הָ/אַחֵֽר׃
translation:
  text: 'The wings of the cherubim were twenty cubits long: one wing was five cubits,
    reaching to the wall of the house, and the other wing was five cubits, reaching
    to the wing of the other cherub.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'touching to the wall of the house ... touching the wing of the other
      cherub.' The Hebrew participles can emphasize actual contact as well as extension.
    reason: lexical_alternative
  - marker: b
    text: '''House'' here refers to the temple building.'
    reason: cultural_note
lexical_decisions:
- source_word: וְכַנְפֵי הַכְּרוּבִים
  chosen: The wings of the cherubim
  alternatives:
  - And the wings of the cherubim
  lexicon: HALOT
  rationale: Construct plural with conjunction; English omits the initial conjunction
    for smoother style while preserving the subject. 'Cherubim' is retained as the
    conventional transliteration for the heavenly beings rather than attempting an
    explanatory gloss.
- source_word: אָרְכָּם
  chosen: were ... long
  alternatives:
  - their length was
  lexicon: HALOT
  rationale: The noun 'their length' is naturally rendered in English with a predicative
    expression, 'were ... long,' which preserves the measurement sense without awkwardness.
- source_word: אַמּוֹת עֶשְׂרִים
  chosen: twenty cubits
  alternatives:
  - twenty cubits in length
  lexicon: HALOT
  rationale: Standard rendering of the measurement phrase. 'Cubits' is retained rather
    than converted to a modern unit in order to preserve the ancient architectural
    terminology.
- source_word: כְּנַף הָאֶחָד
  chosen: one wing
  alternatives:
  - the one wing
  lexicon: HALOT
  rationale: Though formally definite, English idiom in measurement descriptions is
    better with 'one wing' rather than 'the one wing.'
- source_word: לְאַמּוֹת חָמֵשׁ
  chosen: was five cubits
  alternatives:
  - measured five cubits
  lexicon: HALOT
  rationale: Supplies the implied copular/measurement sense in clear English. The
    Hebrew gives the measure elliptically.
- source_word: מַגַּעַת
  chosen: reaching
  alternatives:
  - touching
  - extending to
  lexicon: HALOT
  rationale: From נגע in a participial form, indicating contact or extension up to
    a point. 'Reaching' fits the architectural description naturally; 'touching' is
    possible but slightly less idiomatic here.
- source_word: לְקִיר הַבַּיִת
  chosen: to the wall of the house
  alternatives:
  - to the wall of the temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In Chronicles this refers to the temple
    structure, but 'house' preserves the source wording while remaining understandable
    in context.
- source_word: וְהַכָּנָף הָאַחֶרֶת
  chosen: and the other wing
  alternatives:
  - and the second wing
  lexicon: HALOT
  rationale: אַחֶרֶת means 'other.' 'Second' is interpretive; 'other' is closer to
    the Hebrew.
- source_word: מַגִּיעַ
  chosen: reaching
  alternatives:
  - touching
  - extending to
  lexicon: HALOT
  rationale: Same verbal idea as the previous participle; rendered consistently as
    'reaching.'
- source_word: לִכְנַף הַכְּרוּב הָאַחֵר
  chosen: to the wing of the other cherub
  alternatives:
  - to the wing of the second cherub
  lexicon: HALOT
  rationale: Maintains the repeated 'other' language and the singular 'cherub' after
    the collective 'cherubim.'
