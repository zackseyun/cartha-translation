id: 2CH.3.15
reference: 2 Chronicles 3:15
source:
  edition: WLC
  text: וַ/יַּ֜עַשׂ לִ/פְנֵ֤י הַ/בַּ֨יִת֙ עַמּוּדִ֣ים שְׁנַ֔יִם אַמּ֕וֹת שְׁלֹשִׁ֥ים
    וְ/חָמֵ֖שׁ אֹ֑רֶךְ וְ/הַ/צֶּ֥פֶת אֲשֶׁר עַל רֹאשׁ֖/וֹ אַמּ֥וֹת חָמֵֽשׁ־־׃ס
translation:
  text: In front of the house he made two pillars, thirty-five cubits long, and the
    capital that was on the top of each was five cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''on its top.'' The singular suffix likely refers distributively
      to each pillar.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew text states 'thirty-five cubits long.' The parallel in 1 Kings
      7:15 gives eighteen cubits for the height of each pillar, leading some to understand
      Chronicles here as giving the combined height or to see a textual difficulty.
    reason: cross_reference
lexical_decisions:
- source_word: לִפְנֵי הַבַּיִת
  chosen: In front of the house
  alternatives:
  - before the house
  - at the front of the temple
  lexicon: HALOT
  rationale: לִפְנֵי denotes position 'before/in front of.' הַבַּיִת in this temple-building
    context can be rendered 'house' or more interpretively 'temple.' 'House' preserves
    the Hebrew wording while remaining natural in English.
- source_word: עַמּוּדִים שְׁנַיִם
  chosen: two pillars
  alternatives:
  - two columns
  lexicon: HALOT
  rationale: עַמּוּדִים refers to standing architectural supports. 'Pillars' is the
    standard and most natural rendering in this temple context.
- source_word: אַמּוֹת שְׁלֹשִׁים וְחָמֵשׁ אֹרֶךְ
  chosen: thirty-five cubits long
  alternatives:
  - thirty-five cubits in length
  lexicon: HALOT
  rationale: The phrase literally gives a measurement of length. 'Cubits' preserves
    the ancient unit rather than converting it. The Hebrew syntax is terse; 'long'
    communicates the sense idiomatically.
- source_word: הַצֶּפֶת
  chosen: the capital
  alternatives:
  - the top piece
  - the crown
  lexicon: HALOT
  rationale: In this architectural context, the term denotes the ornamental top of
    a pillar. 'Capital' is the precise architectural English equivalent.
- source_word: אֲשֶׁר עַל רֹאשׁוֹ
  chosen: that was on the top of each
  alternatives:
  - that was on its top
  - which was on its head
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' but for an object such as a pillar English
    idiom prefers 'top.' Because the verse speaks of two pillars but uses a singular
    pronominal suffix with a collective/schematic sense, 'each' makes the distributive
    sense explicit in natural English.
- source_word: אַמּוֹת חָמֵשׁ
  chosen: five cubits
  lexicon: HALOT
  rationale: Straightforward measurement phrase; retained formally with the ancient
    unit preserved.
