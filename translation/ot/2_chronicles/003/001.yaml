theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering of
    YHWH, following Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Subject of נִרְאָה ('appeared')
  chosen_reading: 'implicit subject understood as the LORD: ''where he had appeared
    to David his father'''
  alternative_readings:
  - 'more explicit: ''where the LORD appeared to David his father'''
  - 'passive-like sense: ''which had been shown to David his father'''
  rationale: The Hebrew leaves the subject implicit in the Niphal form, but in this
    narrative context the appearing one is the LORD. The main text preserves the Hebrew's
    economy with 'he,' while the alternative explicit rendering is preserved in a
    footnote for clarity.
