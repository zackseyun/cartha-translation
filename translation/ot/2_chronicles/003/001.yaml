id: 2CH.3.1
reference: 2 Chronicles 3:1
source:
  edition: WLC
  text: וַ/יָּ֣חֶל שְׁלֹמֹ֗ה לִ/בְנ֤וֹת אֶת בֵּית יְהוָה֙ בִּ/יר֣וּשָׁלִַ֔ם בְּ/הַר֙
    הַ/מּ֣וֹרִיָּ֔ה אֲשֶׁ֥ר נִרְאָ֖ה לְ/דָוִ֣יד אָבִ֑י/הוּ אֲשֶׁ֤ר הֵכִין֙ בִּ/מְק֣וֹם
    דָּוִ֔יד בְּ/גֹ֖רֶן אָרְנָ֥ן הַ/יְבוּסִֽי־־׃
translation:
  text: Then Solomon began to build the house of the LORD in Jerusalem on Mount Moriah,
    where he had appeared to David his father, at the place that David had prepared,
    on the threshing floor of Ornan the Jebusite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'where the LORD appeared to David his father.'
    reason: alternative_reading
  - marker: b
    text: Ornan is the name form used in Chronicles; compare Araunah in 2 Samuel 24:16,
      18.
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּחֶל
  chosen: Then ... began
  alternatives:
  - And ... began
  - started
  lexicon: HALOT
  rationale: Wayyiqtol of חלל/יחל in this construction introduces the next event in
    sequence; 'began' is the plain sense. 'Then' captures the narrative progression
    naturally in English.
- source_word: לִבְנוֹת
  chosen: to build
  alternatives:
  - building
  lexicon: HALOT
  rationale: 'Infinitive construct with ל after ''began'' is best rendered with an
    English infinitive: ''began to build.'''
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  - the house of Yahweh
  lexicon: HALOT
  rationale: '''House of the LORD'' closely reflects the Hebrew and preserves the
    temple-as-house imagery. ''Temple'' is interpretive but accurate; retained as
    an alternative. Per doctrine, יְהוָה is rendered ''the LORD,'' not ''Yahweh''.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name in accordance
    with the doctrine table.
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard locative rendering of the place name.
- source_word: בְּהַר הַמּוֹרִיָּה
  chosen: on Mount Moriah
  alternatives:
  - in the hill country of Moriah
  lexicon: HALOT
  rationale: The phrase denotes the specific mountain/hill known as Moriah. 'Mount
    Moriah' is the established and contextually fitting rendering.
- source_word: אֲשֶׁר נִרְאָה לְדָוִיד אָבִיהוּ
  chosen: where he had appeared to David his father
  alternatives:
  - which had been shown to David his father
  - where the LORD appeared to David his father
  lexicon: HALOT
  rationale: The Niphal of ראה commonly means 'appear' in divine-appearance contexts.
    The relative clause most naturally refers to Mount Moriah as the place where the
    LORD appeared to David. English supplies 'he' for the implicit subject; context
    identifies the LORD. 'Had appeared' fits the prior event relative to Solomon's
    building.
- source_word: אָבִיהוּ
  chosen: his father
  alternatives:
  - his ancestor
  lexicon: HALOT
  rationale: Refers to David as Solomon's father in the ordinary genealogical sense;
    'ancestor' is unnecessary here.
- source_word: אֲשֶׁר הֵכִין
  chosen: that David had prepared
  alternatives:
  - which he had prepared
  - that he had established
  lexicon: HALOT
  rationale: הכין means 'prepare, make ready, establish.' In this context of designating
    the temple site, 'prepared' best matches the immediate sense and echoes the Chronicler's
    wording.
- source_word: בִּמְקוֹם דָּוִיד
  chosen: at the place that David had prepared
  alternatives:
  - in the place of David
  - at the place of David
  lexicon: HALOT
  rationale: 'The Hebrew is compressed: literally ''in/at the place of David.'' In
    context, the following apposition identifies the site David prepared/designated.
    Rendering the phrase with the relative clause produces clear English while preserving
    the sense.'
- source_word: בְּגֹרֶן
  chosen: on the threshing floor
  alternatives:
  - at the threshing floor
  lexicon: HALOT
  rationale: A threshing floor is an open site; 'on' is idiomatic English for location
    on such a surface.
- source_word: אָרְנָן הַיְבוּסִי
  chosen: Ornan the Jebusite
  alternatives:
  - Araunah the Jebusite
  lexicon: HALOT
  rationale: Chronicles uses the form Ornan, while Samuel has Araunah. The translation
    follows the form in the Hebrew text of this verse and preserves the cross-text
    name variant in a footnote-worthy alternative.
