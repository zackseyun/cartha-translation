id: 2CH.3.8
reference: 2 Chronicles 3:8
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ֙ אֶת בֵּֽית קֹ֣דֶשׁ הַ/קֳּדָשִׁ֔ים אָרְכּ֞/וֹ עַל פְּנֵ֤י רֹֽחַב הַ/בַּ֨יִת֙ אַמּ֣וֹת עֶשְׂרִ֔ים וְ/רָחְבּ֖/וֹ אַמּ֣וֹת עֶשְׂרִ֑ים וַ/יְחַפֵּ֨/הוּ֙ זָהָ֣ב ט֔וֹב לְ/כִכָּרִ֖ים שֵׁ֥שׁ מֵאֽוֹת־־־־׃
translation:
  text: He made the Most Holy Place, its length twenty cubits, corresponding to the width of the house, and its width twenty cubits; and he overlaid it with fine gold, amounting to six hundred talents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Holy of Holies.'
    reason: lexical_alternative
  - marker: b
    text: Or 'its length corresponding to the width of the house, twenty cubits'.
    reason: previous_rendering
lexical_decisions:
- source_word: בֵּית קֹדֶשׁ הַקֳּדָשִׁים
  chosen: the Most Holy Place
  alternatives:
  - the house of the Holy of Holies
  - the Holy of Holies
  lexicon: HALOT
  rationale: The construct phrase literally means 'house of the holiness of holinesses,' an idiom for the innermost sanctuary. 'Most Holy Place' is clear modern English and preserves the superlative force without awkward literalism.
- source_word: אָרְכּוֹ עַל פְּנֵי רֹחַב הַבַּיִת
  chosen: its length corresponding to the width of the house
  alternatives:
  - its length in front of the width of the house
  - its length along the width of the house
  lexicon: HALOT
  rationale: The phrase is somewhat idiomatic and spatial. עַל־פְּנֵי can denote relation/alignment with a surface or extent. In this architectural context, 'corresponding to the width of the house' best communicates that the room's length matched the temple's width.
- source_word: אַמּוֹת עֶשְׂרִים
  chosen: twenty cubits
  alternatives:
  - twenty cubits long
  lexicon: HALOT
  rationale: אַמָּה is the standard linear measure 'cubit.' The measure is retained rather than converted to preserve source-text specificity.
- source_word: וְרָחְבּוֹ אַמּוֹת עֶשְׂרִים
  chosen: and its width twenty cubits
  alternatives:
  - and twenty cubits was its width
  lexicon: HALOT
  rationale: A straightforward rendering of the dimensional statement, preserving the terseness of the Hebrew while remaining natural in English.
- source_word: וַיְחַפֵּהוּ
  chosen: and he overlaid it
  alternatives:
  - and he covered it
  - and he plated it
  lexicon: HALOT
  rationale: In temple-building contexts, חפה commonly refers to overlaying a structure with a material such as gold. 'Overlaid' is the standard architectural term and more precise than the generic 'covered.'
- source_word: זָהָב טוֹב
  chosen: fine gold
  alternatives:
  - good gold
  - pure gold
  lexicon: HALOT
  rationale: טוֹב here describes quality. 'Fine gold' is idiomatic English for high-quality gold in craftsmanship contexts; 'good gold' is too wooden, and 'pure gold' may overstate metallurgical precision not explicit in the Hebrew.
- source_word: לְכִכָּרִים שֵׁשׁ מֵאוֹת
  chosen: amounting to six hundred talents
  alternatives:
  - for six hundred talents
  - to the value of six hundred talents
  lexicon: HALOT
  rationale: The ל preposition here likely marks quantity/amount rather than purpose. 'Amounting to six hundred talents' communicates the total weight of gold used without forcing a more technical construction.
