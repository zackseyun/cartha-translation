  from: the work of an image-maker
  to: a work of sculpture
  rationale: The Hebrew phrase `מַעֲשֵׂה צַעֲצֻעִים` refers to the type of craftsmanship, best understood as 'a work of sculpture' or 'sculptured work.' The current rendering translates the rare word `צַעֲצֻעִים` as 'an image-maker,' incorrectly identifying its referent as the artisan rather than the art form or product. This is a significant lexical error. The suggested rewrite, 'a work of sculpture,' accurately reflects the meaning of the Hebrew phrase as an appositive describing the cherubim.
