id: 2CH.3.10
reference: 2 Chronicles 3:10
source:
  edition: WLC
  text: וַ/יַּ֜עַשׂ בְּ/בֵֽית קֹ֤דֶשׁ הַ/קֳּדָשִׁים֙ כְּרוּבִ֣ים שְׁנַ֔יִם מַעֲשֵׂ֖ה צַעֲצֻעִ֑ים וַ/יְצַפּ֥וּ אֹתָ֖/ם זָהָֽב־׃
translation:
  text: In the Most Holy Place he made two cherubim, a work of sculpture, and overlaid them with gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sculptured work,' 'carved work,' or 'artistic work' for the rare expression 'the work of צַעֲצֻעִים.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the work of an image-maker'.
    reason: previous_rendering
lexical_decisions:
- source_word: בְּבֵית קֹדֶשׁ הַקֳּדָשִׁים
  chosen: In the Most Holy Place
  alternatives:
  - in the house of the Holy of Holies
  - in the inner sanctuary
  lexicon: HALOT
  rationale: The construct phrase literally means 'in the house of the holiness of holinesses,' an idiom for the innermost sanctuary. 'Most Holy Place' is clear modern English and preserves the superlative force without awkward literalism.
- source_word: כְּרוּבִים שְׁנַיִם
  chosen: two cherubim
  alternatives:
  - two cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' is the established English plural directly reflecting the Hebrew form and fits sacred-architecture context better than the more colloquial ''cherubs.'''
- source_word: מַעֲשֵׂה
  chosen: the work of
  alternatives:
  - made as
  - crafted as
  lexicon: HALOT
  rationale: The noun denotes workmanship or product. In construct with the following noun it naturally yields 'the work of' or 'workmanship of.'
- source_word: צַעֲצֻעִים
  chosen: an image-maker
  alternatives:
  - sculptured work
  - carved work
  - artistic work
  lexicon: HALOT
  rationale: This rare term is difficult and has been understood in context as referring to crafted or sculpted figures. Because the verse describes large cherub figures made for the sanctuary, 'the work of an image-maker' best captures the sense of fashioned statuary while remaining intelligible. The rarity and uncertainty warrant preserving alternatives in a footnote.
- source_word: וַיְצַפּוּ אֹתָם זָהָב
  chosen: and overlaid them with gold
  alternatives:
  - and covered them with gold
  lexicon: HALOT
  rationale: The verb צפה in this stem commonly refers to overlaying an object with metal plating. 'Overlaid' is the standard architectural/cultic term and is more precise than the broader 'covered.'
