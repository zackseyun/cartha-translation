theological_decisions:
- issue: Rendering בְּנֵי בְלִיַּעַל
  chosen_reading: sons of Belial
  alternative_readings:
  - scoundrels
  - worthless men
  - wicked men
  rationale: This phrase is not listed in the contested-terms table, but it carries
    interpretive weight. Retaining the literal expression avoids prematurely deciding
    whether the Chronicler intends a fixed quasi-name ('Belial') or a descriptive
    term for wickedness. A footnote preserves the more idiomatic sense for readers.
  doctrine_reference: Translation philosophy §1, §3, §5
