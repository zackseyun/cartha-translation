theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's default for YHWH is 'the LORD,' following the stated doctrine
    and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered address בְּנֵי יִשְׂרָאֵל
  chosen_reading: Sons of Israel
  alternative_readings:
  - Children of Israel
  - People of Israel
  rationale: The Hebrew is grammatically masculine plural and functions as a direct
    ethnic/covenantal address. Per translation philosophy, gender-accurate rendering
    is preferred over neutralization, while a more familiar alternative is preserved
    in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
