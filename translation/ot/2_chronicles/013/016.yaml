theological_decisions:
- issue: Divine agency in battle outcome
  chosen_reading: God gave the fleeing Israelites into Judah's hand
  alternative_readings:
  - God allowed them to fall into Judah's hand
  rationale: The verb נתן with God as subject straightforwardly attributes the military
    outcome to divine action, not mere permission. The translation should preserve
    that direct agency without softening it.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of covenantal group terms
  chosen_reading: the sons of Israel ... Judah
  alternative_readings:
  - the Israelites ... Judah
  rationale: The verse contrasts the northern kingdom's forces with Judah. Retaining
    'sons of Israel' preserves the Hebrew expression while leaving the historical
    referent clear from context. This also follows the gender-accurate principle rather
    than flattening the masculine form into a neutral collective without need.
  doctrine_reference: Translation philosophy §4, §5
