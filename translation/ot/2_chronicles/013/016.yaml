id: 2CH.13.16
reference: 2 Chronicles 13:16
source:
  edition: WLC
  text: וַ/יָּנ֥וּסוּ בְנֵי יִשְׂרָאֵ֖ל מִ/פְּנֵ֣י יְהוּדָ֑ה וַ/יִּתְּנֵ֥/ם אֱלֹהִ֖ים
    בְּ/יָדָֽ/ם־׃
translation:
  text: And the sons of Israel fled before Judah, and God gave them into their hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'into their hand,' an idiom meaning into their power or control.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּנ֥וּסוּ
  chosen: fled
  alternatives:
  - ran away
  - took flight
  lexicon: HALOT
  rationale: From נוּס, denoting flight in battle or retreat from danger. 'Fled' is
    concise, natural English and fits the military context better than the more colloquial
    'ran away'.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Formally, the Hebrew is 'sons of Israel.' This can function idiomatically
    for Israelites, but here the more literal rendering preserves the source expression
    without obscuring meaning. It also aligns with the project's gender-accurate preference
    where the source is grammatically masculine.
- source_word: מִפְּנֵי יְהוּדָה
  chosen: before Judah
  alternatives:
  - from before Judah
  - before the men of Judah
  lexicon: HALOT
  rationale: The idiom מִפְּנֵי literally means 'from before' and commonly conveys
    retreat in the face of an opponent. 'Before Judah' is idiomatic enough in English
    in a battle narrative and preserves the sense of fleeing in Judah's presence/advance.
    'The men of Judah' is interpretive and not required by the text.
- source_word: וַיִּתְּנֵם
  chosen: gave them
  alternatives:
  - delivered them
  - handed them over
  lexicon: HALOT
  rationale: From נתן with object suffix 'them.' In military contexts it often means
    to give an enemy over to another's power. 'Gave them' is the most direct rendering;
    the fuller sense is completed by the following phrase 'into their hand.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although the broader context concerns Judah and covenant faithfulness,
    the text here uses אֱלֹהִים rather than the divine name. Therefore 'God' should
    be rendered, not 'the LORD.'
- source_word: בְּיָדָם
  chosen: into their hand
  alternatives:
  - into their hands
  - into their power
  lexicon: HALOT
  rationale: The singular 'hand' with plural suffix is a common Hebrew idiom for power
    or control. 'Into their hand' preserves the idiom closely; 'into their power'
    is a valid dynamic alternative but less transparent to the source wording.
