id: 2CH.13.5
reference: 2 Chronicles 13:5
source:
  edition: WLC
  text: הֲ/לֹ֤א לָ/כֶם֙ לָ/דַ֔עַת כִּ֞י יְהוָ֣ה אֱלֹהֵ֣י יִשְׂרָאֵ֗ל נָתַ֨ן מַמְלָכָ֧ה
    לְ/דָוִ֛יד עַל יִשְׂרָאֵ֖ל לְ/עוֹלָ֑ם ל֥/וֹ וּ/לְ/בָנָ֖י/ו בְּרִ֥ית מֶֽלַח׀־׃ס
translation:
  text: Do you not know that the LORD, the God of Israel, gave the kingship over Israel
    to David forever, to him and to his sons, by a covenant of salt?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a covenant of salt.' The expression likely denotes a binding, enduring
      covenant; compare Numbers 18:19.
    reason: lexical_alternative
  - marker: b
    text: '''To his sons'' refers to David''s royal line or dynasty.'
    reason: cultural_note
lexical_decisions:
- source_word: הֲלֹא
  chosen: Do you not
  alternatives:
  - Have you not
  - Do you not indeed
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Do you not' is
    natural modern English and preserves the confrontational force.
- source_word: לָכֶם לָדַעַת
  chosen: know
  alternatives:
  - have knowledge
  - ought to know
  lexicon: HALOT
  rationale: The infinitive construction with preposition expresses what should be
    known by the audience. 'Know' gives idiomatic English within the rhetorical question
    without over-paraphrasing.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD'.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard construct rendering; identifies YHWH covenantally as Israel's
    God.
- source_word: נָתַן
  chosen: gave
  alternatives:
  - has given
  - granted
  lexicon: HALOT
  rationale: Simple past fits the historical assertion. 'Gave' is the plain sense.
- source_word: מַמְלָכָה
  chosen: the kingship
  alternatives:
  - the kingdom
  - royal rule
  lexicon: HALOT
  rationale: Here the focus is the royal dominion/right to rule vested in David over
    Israel, not merely territory. 'Kingship' best captures that nuance in context.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: עַל with kingship denotes rule over the people/nation.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  lexicon: HALOT
  rationale: The term denotes enduring duration. 'Forever' is the natural modern equivalent
    and preserves the covenantal permanence claim in the text.
- source_word: לוֹ וּלְבָנָיו
  chosen: to him and to his sons
  alternatives:
  - to him and to his descendants
  lexicon: HALOT
  rationale: בנים literally means 'sons.' In royal succession context it can imply
    dynastic heirs, but the text's masculine familial wording should be preserved
    per gender-accurate policy.
- source_word: בְּרִית מֶלַח
  chosen: by a covenant of salt
  alternatives:
  - with a covenant of salt
  - a permanent covenant
  lexicon: HALOT
  rationale: The phrase is a fixed Hebrew expression. Rendering it literally preserves
    the cultural-theological imagery; its likely sense of durability should be explained
    in a footnote rather than absorbed into the main text.
