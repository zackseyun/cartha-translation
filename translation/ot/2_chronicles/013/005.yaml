theological_decisions:
- issue: Meaning of the Davidic grant in relation to covenant permanence
  chosen_reading: The verse states that the LORD granted David's kingship over Israel
    in a perpetual covenantal sense, expressed by 'forever' and 'covenant of salt,'
    without importing later theological conclusions into the translation itself.
  alternative_readings:
  - Treat 'covenant of salt' as an idiom and translate the phrase interpretively as
    'a permanent covenant'
  rationale: The Hebrew explicitly combines לְעוֹלָם with בְּרִית מֶלַח. A literal
    rendering preserves the text's covenantal language and theological weight while
    avoiding interpretive flattening.
  doctrine_reference: Translation philosophy §§1, 3, 6
