theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is 'the LORD' for יְהוָה, following the stated doctrine
    and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Chronicles' theology of the Davidic monarchy
  chosen_reading: the kingdom of the LORD in the hand of the sons of David
  alternative_readings:
  - the kingdom of the LORD under the sons of David
  - the LORD's kingdom ruled by the sons of David
  rationale: 'The wording preserves the text''s theological tension: the kingdom belongs
    to the LORD yet is administered through David''s line. The translation avoids
    collapsing either element into the other.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension
    rather than resolve it
