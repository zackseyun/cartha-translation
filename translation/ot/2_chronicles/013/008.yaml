id: 2CH.13.8
reference: 2 Chronicles 13:8
source:
  edition: WLC
  text: וְ/עַתָּ֣ה אַתֶּ֣ם אֹֽמְרִ֗ים לְ/הִתְחַזֵּק֙ לִ/פְנֵי֙ מַמְלֶ֣כֶת יְהוָ֔ה
    בְּ/יַ֖ד בְּנֵ֣י דָוִ֑יד וְ/אַתֶּם֙ הָמ֣וֹן רָ֔ב וְ/עִמָּ/כֶם֙ עֶגְלֵ֣י זָהָ֔ב
    אֲשֶׁ֨ר עָשָׂ֥ה לָ/כֶ֛ם יָרָבְעָ֖ם לֵ/אלֹהִֽים׀׃
translation:
  text: And now you are saying that you are strong enough to stand against the kingdom
    of the LORD in the hand of the sons of David, because you are a great multitude
    and have with you the golden calves that Jeroboam made for you as gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you say that you will show yourselves strong before the kingdom of
      the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the hand of the sons of David,' an idiom for rule or administration
      through David's line.
    reason: cultural_note
  - marker: c
    text: Or, 'for gods.' The Hebrew is plural, referring polemically to Jeroboam's
      calf idols.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמְרִים
  chosen: you are saying
  alternatives:
  - you say
  - you intend
  lexicon: HALOT
  rationale: The participle can express present or imminent intention. 'You are saying'
    preserves the verbal aspect and rhetorical force in Abijah's speech without over-interpreting
    it as mere inward intention.
- source_word: לְהִתְחַזֵּק
  chosen: that you are strong enough to stand against
  alternatives:
  - to strengthen yourselves
  - to show yourselves strong before
  - to prevail against
  lexicon: HALOT
  rationale: Hitpael of חזק here conveys making oneself strong or proving strong in
    confrontation. In context with לִפְנֵי, the sense is opposition to the Davidic
    kingdom. The chosen rendering communicates attempted resistance in natural English
    while retaining the strength motif.
- source_word: לִפְנֵי
  chosen: to stand against
  alternatives:
  - before
  - in the face of
  lexicon: HALOT
  rationale: Literally 'before/in the face of,' but in this military-polemical context
    it indicates confrontation. Rendering it with 'stand against' brings out the adversative
    sense implied by the infinitive construction.
- source_word: מַמְלֶכֶת יְהוָה
  chosen: the kingdom of the LORD
  alternatives:
  - the LORD's kingdom
  - the royal rule of the LORD
  lexicon: HALOT
  rationale: This is a significant theological phrase in Chronicles, presenting the
    Davidic monarchy as the LORD's kingdom. 'The kingdom of the LORD' is both natural
    and close to the Hebrew. 'the LORD' follows the project's default for יְהוָה.
- source_word: בְּיַד בְּנֵי דָוִיד
  chosen: in the hand of the sons of David
  alternatives:
  - under the control of the sons of David
  - entrusted to the sons of David
  lexicon: HALOT
  rationale: Literally 'in the hand of.' The idiom denotes agency or administration.
    Retaining 'in the hand of' preserves the Hebrew image and the theological claim
    that the LORD's kingdom is exercised through the Davidic line.
- source_word: הָמוֹן רָב
  chosen: a great multitude
  alternatives:
  - a large crowd
  - many people
  lexicon: HALOT
  rationale: The phrase emphasizes numerical superiority. 'A great multitude' is idiomatic,
    suitably elevated for the speech, and reflects the collective military sense.
- source_word: עֶגְלֵי זָהָב
  chosen: the golden calves
  alternatives:
  - gold calves
  - calves of gold
  lexicon: HALOT
  rationale: Definite in sense from context and referring to the well-known cult objects
    of Jeroboam. 'Golden calves' is the standard clear English expression.
- source_word: לֵאלֹהִים
  chosen: as gods
  alternatives:
  - for gods
  - to be gods
  lexicon: HALOT
  rationale: The plural form here refers to the idols Jeroboam appointed as objects
    of worship. 'As gods' is natural English and preserves the accusative/resultative
    sense without softening the polemic.
