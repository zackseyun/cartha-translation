theological_decisions:
- issue: Large casualty figure in a battle narrative
  chosen_reading: Retain the stated number as given in the Hebrew text without reinterpretation.
  alternative_readings:
  - Treat the number as hyperbolic rhetoric
  - Emend the numeral or read it as a clan/military unit figure
  rationale: The verse presents the number directly and without textual signal that
    it should be reduced or symbolized. Translation should reflect the source text
    rather than resolve historical-critical questions in the main text.
