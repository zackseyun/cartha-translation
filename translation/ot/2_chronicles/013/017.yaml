id: 2CH.13.17
reference: 2 Chronicles 13:17
source:
  edition: WLC
  text: וַ/יַּכּ֥וּ בָ/הֶ֛ם אֲבִיָּ֥ה וְ/עַמּ֖/וֹ מַכָּ֣ה רַבָּ֑ה וַ/יִּפְּל֤וּ חֲלָלִים֙
    מִ/יִּשְׂרָאֵ֔ל חֲמֵשׁ מֵא֥וֹת אֶ֖לֶף אִ֥ישׁ בָּחֽוּר־׃
translation:
  text: Abijah and his people struck them with a great blow, and five hundred thousand
    chosen men of Israel fell slain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a severe blow” or “a great slaughter.” The Hebrew phrase is literally
      “a great blow.”
    reason: lexical_alternative
  - marker: b
    text: Or “five hundred thousand picked men of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכּוּ
  chosen: struck
  alternatives:
  - defeated
  - struck down
  lexicon: HALOT
  rationale: From נכה, a common verb for striking/smiting in battle contexts. 'Struck'
    preserves the concrete martial action without overinterpreting the result, which
    is then specified by the following clause.
- source_word: בָהֶם
  chosen: them
  alternatives:
  - among them
  - against them
  lexicon: HALOT
  rationale: The preposition with pronoun here refers to the opposing force just mentioned.
    'Them' is natural English after 'struck' and adequately conveys the object of
    attack.
- source_word: אֲבִיָּה וְעַמּוֹ
  chosen: Abijah and his people
  alternatives:
  - Abijah and his army
  lexicon: HALOT
  rationale: עַם literally means 'people.' In this military context it refers to those
    with him in battle, but 'his people' preserves the Hebrew wording more closely
    than the narrower 'army.'
- source_word: מַכָּה רַבָּה
  chosen: with a great blow
  alternatives:
  - a great slaughter
  - a severe blow
  lexicon: HALOT
  rationale: The phrase literally denotes a great blow/strike. Because the next clause
    explicitly states the deaths, 'great blow' avoids collapsing the two clauses into
    one and preserves the Hebrew sequence.
- source_word: וַיִּפְּלוּ
  chosen: fell
  alternatives:
  - were struck down
  - collapsed
  lexicon: HALOT
  rationale: נפל in battle reports commonly means 'fell' in death. The following predicate
    clarifies that these are battle casualties.
- source_word: חֲלָלִים
  chosen: slain
  alternatives:
  - dead
  - killed men
  lexicon: HALOT
  rationale: חללים denotes those slain, especially in battle. 'Fell slain' is idiomatic
    English that preserves both the verb and the predicate.
- source_word: מִיִּשְׂרָאֵל
  chosen: of Israel
  alternatives:
  - from Israel
  - from among Israel
  lexicon: HALOT
  rationale: Here the phrase identifies the group from which the casualties came,
    namely the northern kingdom's forces. 'Of Israel' is concise and natural in English.
- source_word: חֲמֵשׁ מֵאוֹת אֶלֶף
  chosen: five hundred thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number; no adjustment or interpretive reduction
    is warranted by the text itself.
- source_word: אִישׁ בָּחוּר
  chosen: chosen men
  alternatives:
  - valiant men
  - picked men
  - choice men
  lexicon: HALOT
  rationale: איש functions distributively with the number, and בחור denotes selected
    or choice young/prime men. 'Chosen men' best captures the sense of picked troops
    without adding an evaluative nuance not explicit in the term.
