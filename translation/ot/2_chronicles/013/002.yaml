id: 2CH.13.2
reference: 2 Chronicles 13:2
source:
  edition: WLC
  text: שָׁל֣וֹשׁ שָׁנִ֗ים מָלַךְ֙ בִּ/יר֣וּשָׁלִַ֔ם וְ/שֵׁ֣ם אִמּ֔/וֹ מִיכָיָ֥הוּ
    בַת אוּרִיאֵ֖ל מִן גִּבְעָ֑ה וּ/מִלְחָמָ֥ה הָיְתָ֛ה בֵּ֥ין אֲבִיָּ֖ה וּ/בֵ֥ין
    יָרָבְעָֽם־־׃
translation:
  text: He reigned three years in Jerusalem, and his mother’s name was Micaiah daughter
    of Uriel from Gibeah. And there was war between Abijah and Jeroboam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The parallel in 1 Kings 15:2 gives Abijah’s mother’s name as Maacah. Hebrew
      'daughter' can also be used more broadly for a female descendant, so the two
      accounts may reflect different naming or genealogical conventions.
    reason: alternative_reading
lexical_decisions:
- source_word: מָלַךְ
  chosen: reigned
  alternatives:
  - was king
  lexicon: HALOT
  rationale: The verb means to reign or be king. 'Reigned' is the most natural English
    rendering in regnal formulas and preserves the royal context without awkwardness.
- source_word: וְשֵׁם אִמּוֹ
  chosen: and his mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: This is a standard genealogical formula. The chosen rendering is idiomatic
    modern English while remaining formally close to the Hebrew structure.
- source_word: מִיכָיָהוּ
  chosen: Micaiah
  alternatives:
  - Michaiah
  lexicon: HALOT
  rationale: A standard English transliteration of the Hebrew personal name. This
    verse uses מִיכָיָהוּ, which is best represented as 'Micaiah' in conventional
    English Bible style.
- source_word: בַת אוּרִיאֵל
  chosen: daughter of Uriel
  alternatives:
  - the daughter of Uriel
  lexicon: HALOT
  rationale: The construct phrase straightforwardly identifies maternal lineage. 'Daughter
    of Uriel' is the natural and sufficiently literal rendering.
- source_word: מִן גִּבְעָה
  chosen: from Gibeah
  alternatives:
  - of Gibeah
  lexicon: HALOT
  rationale: The preposition מִן normally means 'from.' In this genealogical notice
    it likely identifies Uriel's place of origin. 'From Gibeah' preserves the explicit
    preposition better than the more compressed 'of Gibeah.'
- source_word: וּמִלְחָמָה הָיְתָה
  chosen: And there was war
  alternatives:
  - Now there was war
  - And war broke out
  - And war continued
  lexicon: HALOT
  rationale: 'The clause is existential and simple: ''and war was.'' ''And there was
    war'' is the closest natural English equivalent without adding aspect not explicit
    in the Hebrew.'
- source_word: בֵּין ... וּבֵין
  chosen: between ... and ...
  lexicon: HALOT
  rationale: This prepositional pairing is the standard Hebrew way to express mutual
    opposition between two parties.
- source_word: אֲבִיָּה
  chosen: Abijah
  alternatives:
  - Abijam
  lexicon: HALOT
  rationale: Chronicles uses the name אֲבִיָּה, conventionally transliterated 'Abijah.'
    'Abijam' belongs to the Kings tradition and should not be imported here.
