theological_decisions:
- issue: Name-form difference between Chronicles and the parallel in Kings regarding
    Abijah's mother
  chosen_reading: Retain the Chronicler’s wording 'Micaiah daughter of Uriel from
    Gibeah' in the main text without harmonizing to Kings.
  alternative_readings:
  - Harmonize the name with Maacah in 1 Kings 15:2
  - Interpret 'daughter' more broadly as granddaughter/descendant
  rationale: The translation should reflect the Hebrew text as given rather than resolve
    historical or genealogical tensions by harmonization. Hebrew בַת can sometimes
    denote a more remote female descendant, but the text itself simply says 'daughter,'
    so that should stand in the main text. Any harmonizing explanation belongs in
    a footnote, not the translation.
  doctrine_reference: Translation philosophy §§1, 3, 5
