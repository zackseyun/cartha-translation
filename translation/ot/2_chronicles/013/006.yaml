id: 2CH.13.6
reference: 2 Chronicles 13:6
source:
  edition: WLC
  text: וַ/יָּ֨קָם֙ יָרָבְעָ֣ם בֶּן נְבָ֔ט עֶ֖בֶד שְׁלֹמֹ֣ה בֶן דָּוִ֑יד וַ/יִּמְרֹ֖ד
    עַל אֲדֹנָֽי/ו־־־׃
translation:
  text: Jeroboam son of Nebat, a servant of Solomon son of David, rose up and rebelled
    against his lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “against his master.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: rose up
  alternatives:
  - arose
  - stood up
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום here introduces Jeroboam's action in beginning opposition.
    'Rose up' preserves the narrative force without overinterpreting it as military
    action alone.
- source_word: יָרָבְעָם בֶּן נְבָט
  chosen: Jeroboam son of Nebat
  rationale: Personal names are transliterated by standard English convention, with
    the patronymic rendered literally.
- source_word: עֶבֶד
  chosen: servant
  alternatives:
  - slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave or servant, in this royal-administrative
    context describing Jeroboam's relation to Solomon, 'servant' best fits the social-political
    sense without implying chattel status. This aligns with the project's context-dependent
    handling of bonded-service terms.
- source_word: שְׁלֹמֹה בֶן דָּוִיד
  chosen: Solomon son of David
  rationale: Names are transliterated; the filial expression is rendered literally
    to preserve dynastic emphasis.
- source_word: וַיִּמְרֹד
  chosen: rebelled
  alternatives:
  - revolted
  lexicon: HALOT
  rationale: מרד commonly denotes rebellion against authority. 'Rebelled' is the most
    natural modern English equivalent and matches the political context.
- source_word: עַל אֲדֹנָיו
  chosen: against his lord
  alternatives:
  - against his master
  lexicon: HALOT
  rationale: אָדוֹן with 3ms suffix refers here to Solomon as Jeroboam's superior.
    'Lord' preserves the hierarchical sense and fits the singular human referent;
    'master' is possible but sounds more domestic or servile in English.
