theological_decisions:
- issue: Rendering of human אֲדֹנָיו
  chosen_reading: his lord
  alternative_readings:
  - his master
  rationale: This is a human superior, not the divine name or title. 'Lord' here is
    lowercase to distinguish it from divine usage while preserving the authority relationship
    stated in the Hebrew.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; YHWH rendered
    ''the LORD'' only for the divine name.'
