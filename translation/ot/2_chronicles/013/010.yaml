theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse explicitly names Israel's covenant God. Following the project's
    doctrinal policy, the Tetragrammaton is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Temporal force of עֲזַבְנֻהוּ
  chosen_reading: we have not forsaken him
  alternative_readings:
  - we did not forsake him
  rationale: The Hebrew perfect in this rhetorical setting expresses a state of continuing
    covenant loyalty rather than merely a past event. The English present perfect
    best preserves that theological and rhetorical force.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
