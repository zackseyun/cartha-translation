id: 2CH.13.10
reference: 2 Chronicles 13:10
source:
  edition: WLC
  text: וַ/אֲנַ֛חְנוּ יְהוָ֥ה אֱלֹהֵ֖י/נוּ וְ/לֹ֣א עֲזַבְנֻ֑/הוּ וְ/כֹ֨הֲנִ֜ים מְשָׁרְתִ֤ים
    לַֽ/יהוָה֙ בְּנֵ֣י אַהֲרֹ֔ן וְ/הַ/לְוִיִּ֖ם בַּ/מְלָֽאכֶת׃
translation:
  text: But as for us, the LORD is our God, and we have not forsaken him; and the
    priests who minister to the LORD are sons of Aaron, and the Levites are at their
    work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we have not abandoned him.'
    reason: lexical_alternative
  - marker: b
    text: Lit. 'the Levites in the work,' that is, engaged in their assigned service.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנַחְנוּ
  chosen: But as for us
  alternatives:
  - But we
  - And we
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun is contrastive in context, setting
    Judah over against the northern kingdom. 'But as for us' brings out the adversative/discourse
    contrast more clearly than a bare 'and we.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential English convention and the stated policy for
    יְהוָה.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  alternatives:
  - our gods
  lexicon: HALOT
  rationale: With the singular referent יְהוָה and covenantal context, the plural
    form functions as the standard singular title for Israel's God; 'our God' is the
    natural English rendering.
- source_word: וְלֹא עֲזַבְנֻהוּ
  chosen: and we have not forsaken him
  alternatives:
  - and we have not abandoned him
  - and we did not forsake him
  lexicon: HALOT
  rationale: עזב commonly means 'forsake, abandon.' 'Forsaken' preserves covenantal/religious
    force. The perfect is rendered with present relevance ('have not forsaken') in
    English, fitting Abijah's claim about Judah's continuing fidelity.
- source_word: וְכֹהֲנִים
  chosen: and the priests
  alternatives:
  - and priests
  lexicon: HALOT
  rationale: The noun introduces a further mark of proper worship. Supplying the article
    in English yields natural style and reflects the class of priests under discussion.
- source_word: מְשָׁרְתִים
  chosen: who minister
  alternatives:
  - serving
  - who serve
  lexicon: HALOT
  rationale: The participle describes ongoing cultic service. 'Who minister' fits
    priestly liturgical context better than the more generic 'serve,' while remaining
    readable.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - before the LORD
  lexicon: HALOT
  rationale: The preposition ל here marks the one to whom the priestly service is
    rendered. 'To the LORD' is the most straightforward expression in English.
- source_word: בְּנֵי אַהֲרֹן
  chosen: sons of Aaron
  alternatives:
  - descendants of Aaron
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Aaron.' This preserves the formal hereditary
    priestly line without over-paraphrasing; 'descendants' is interpretive and broader.
- source_word: וְהַלְוִיִּם
  chosen: and the Levites
  alternatives:
  - and Levites
  lexicon: HALOT
  rationale: Refers to the Levitical class assisting in temple service. The article
    is naturally represented in English as 'the Levites.'
- source_word: בַּמְלָאכֶת
  chosen: are at their work
  alternatives:
  - in the work
  - at the service
  - in their duties
  lexicon: HALOT
  rationale: מְלָאכָה denotes work/task/service. In this temple context it refers
    to assigned duties. 'Are at their work' is idiomatic English that preserves the
    sense of active engagement without narrowing the term too much.
