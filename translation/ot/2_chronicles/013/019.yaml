id: 2CH.13.19
reference: 2 Chronicles 13:19
source:
  edition: WLC
  text: וַ/יִּרְדֹּ֣ף אֲבִיָּה֮ אַחֲרֵ֣י יָרָבְעָם֒ וַ/יִּלְכֹּ֤ד מִמֶּ֨/נּוּ֙ עָרִ֔ים
    אֶת בֵּֽית אֵל֙ וְ/אֶת בְּנוֹתֶ֔י/הָ וְ/אֶת יְשָׁנָ֖ה וְ/אֶת בְּנוֹתֶ֑י/הָ וְ/אֶת
    עפרון וּ/בְנֹתֶֽי/הָ־־־־־־׃
translation:
  text: 'Abijah pursued Jeroboam and captured from him cities: Bethel and its daughter
    towns, Jeshanah and its daughter towns, and Ephron and its daughter towns.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'daughter towns,' meaning the smaller settlements or villages belonging
      to each city.
    reason: lexical_alternative
  - marker: b
    text: Some translations read 'Ophrah' instead of 'Ephron.' The Hebrew Masoretic
      Text here reads 'Ephron.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּרְדֹּף
  chosen: pursued
  alternatives:
  - chased
  - went after
  lexicon: HALOT
  rationale: רדף in military narrative commonly denotes pursuit of a fleeing enemy.
    'Pursued' is natural modern English and preserves the martial sense without over-paraphrase.
- source_word: וַיִּלְכֹּד
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: לכד often means to capture or seize, especially cities in warfare. 'Captured'
    makes the military context explicit and fits the direct object 'cities.'
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - out of his hand
  lexicon: HALOT
  rationale: The preposition with pronominal suffix indicates that the cities were
    taken from Jeroboam's control. 'From him' is the plain sense and avoids adding
    imagery not present in the text.
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: The generic term for urban settlements is best rendered 'cities' here,
    especially since the following named places are principal settlements with dependent
    villages.
- source_word: בְּנוֹתֶיהָ
  chosen: its daughter towns
  alternatives:
  - its villages
  - its dependent towns
  - its surrounding settlements
  lexicon: HALOT
  rationale: Literally 'its daughters,' an idiom for satellite settlements belonging
    to a larger city. 'Daughter towns' preserves the Hebrew metaphor while remaining
    understandable; a footnote preserves the more idiomatic alternative 'villages.'
- source_word: בֵּית אֵל
  chosen: Bethel
  rationale: Standard English transliteration of the place name.
- source_word: יְשָׁנָה
  chosen: Jeshanah
  rationale: Standard transliteration of the place name.
- source_word: עפרון
  chosen: Ephron
  alternatives:
  - Ophrah
  lexicon: HALOT
  rationale: The consonantal form here is commonly rendered 'Ephron' in this verse.
    Some versions reflect a variant-like identification with 'Ophrah,' but the MT
    form supports 'Ephron' in the main text; the alternative is preserved in a footnote.
