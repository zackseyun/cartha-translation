id: 2CH.13.20
reference: 2 Chronicles 13:20
source:
  edition: WLC
  text: וְ/לֹֽא עָצַ֧ר כֹּֽחַ יָרָבְעָ֛ם ע֖וֹד בִּ/ימֵ֣י אֲבִיָּ֑הוּ וַ/יִּגְּפֵ֥/הוּ
    יְהוָ֖ה וַ/יָּמֹֽת־־׃פ
translation:
  text: Jeroboam no longer retained strength in the days of Abijah, and the LORD struck
    him, and he died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD afflicted him' or 'the LORD plagued him.' The Hebrew says only
      that the LORD 'struck' Jeroboam and does not specify the exact means.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָצַר כֹּחַ
  chosen: retained strength
  alternatives:
  - kept his power
  - recovered strength
  - prevailed
  lexicon: HALOT
  rationale: The verb עָצַר normally means 'restrain, retain, hold back.' With כֹּחַ
    ('strength, power'), the sense is that Jeroboam did not continue to possess or
    maintain strength. 'Retained strength' preserves the lexical components without
    overinterpreting it as military victory alone.
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - again
  - still
  - any more
  lexicon: HALOT
  rationale: In the negative construction with לֹא, עוֹד idiomatically means 'no longer'
    or 'not again/any more.' 'No longer' is the most natural modern English rendering
    here.
- source_word: בִּימֵי אֲבִיָּהוּ
  chosen: in the days of Abijah
  alternatives:
  - during Abijah's days
  - in Abijah's time
  lexicon: HALOT
  rationale: A standard temporal expression meaning 'during the lifetime/reign of
    Abijah.' 'In the days of Abijah' is both clear and close to the Hebrew idiom.
- source_word: וַיִּגְּפֵהוּ
  chosen: struck him
  alternatives:
  - plagued him
  - smote him
  - afflicted him
  lexicon: HALOT
  rationale: From נגף, often used for a divine blow, plague, or defeat. 'Struck him'
    is broad enough to preserve the Hebrew's lack of specificity while still conveying
    divine judgment.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD.'
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so that he died
  - and he came to die
  lexicon: HALOT
  rationale: 'The simple wayyiqtol of מות is best rendered straightforwardly as narrative
    sequence: ''and he died.'''
