theological_decisions:
- issue: Nature of the divine action in וַיִּגְּפֵהוּ יְהוָה
  chosen_reading: The verse states directly that the LORD struck Jeroboam, resulting
    in his death, without specifying the means.
  alternative_readings:
  - The LORD plagued him with illness
  - The LORD struck him down immediately in battle or judgment
  rationale: The Hebrew attributes Jeroboam's downfall and death to divine action
    but does not specify whether this was by disease, battle wound, or another providential
    means. The translation preserves that theological claim without narrowing it beyond
    the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
