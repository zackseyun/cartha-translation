id: 2CH.13.21
reference: 2 Chronicles 13:21
source:
  edition: WLC
  text: וַ/יִּתְחַזֵּ֣ק אֲבִיָּ֔הוּ וַ/יִּ֨שָּׂא ל֔/וֹ נָשִׁ֖ים אַרְבַּ֣ע עֶשְׂרֵ֑ה
    וַ/יּ֗וֹלֶד עֶשְׂרִ֤ים וּ/שְׁנַ֨יִם֙ בָּנִ֔ים וְ/שֵׁ֥שׁ עֶשְׂרֵ֖ה בָּנֽוֹת־׃ס
translation:
  text: And Abijah grew strong, and he took for himself fourteen wives and fathered
    twenty-two sons and sixteen daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'became mighty' or 'strengthened himself.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'took for himself fourteen wives,' an idiom meaning he married them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְחַזֵּק
  chosen: grew strong
  alternatives:
  - became mighty
  - strengthened himself
  - became powerful
  lexicon: HALOT
  rationale: Hitpael of חזק here denotes becoming strong or established. 'Grew strong'
    is natural English and preserves the sense of increasing strength/status without
    over-specifying military or political power.
- source_word: אֲבִיָּהוּ
  chosen: Abijah
  alternatives:
  - Abijahu
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy. 'Abijah' is the established English form.
- source_word: וַיִּשָּׂא לוֹ נָשִׁים
  chosen: he took for himself fourteen wives
  alternatives:
  - he married fourteen wives
  - he took fourteen women for himself
  lexicon: HALOT
  rationale: נשא with נשים is an idiom for taking wives, i.e., marrying. 'Took for
    himself ... wives' stays closer to the Hebrew wording than simply 'married' while
    remaining clear in English; the reflexive nuance of לוֹ is preserved by 'for himself.'
- source_word: אַרְבַּע עֶשְׂרֵה
  chosen: fourteen
  rationale: Straightforward cardinal number modifying 'wives.'
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - had
  lexicon: HALOT
  rationale: ילד in the Hiphil with a male subject means to beget/father children.
    'Fathered' is accurate modern English; 'begot' is archaic, and 'had' is too vague.
- source_word: עֶשְׂרִים וּשְׁנַיִם בָּנִים
  chosen: twenty-two sons
  rationale: Direct numerical phrase; 'sons' should be retained rather than generalized
    to 'children' because the Hebrew is specific.
- source_word: וְשֵׁשׁ עֶשְׂרֵה בָּנוֹת
  chosen: and sixteen daughters
  rationale: Direct numerical phrase; 'daughters' should be retained for gender accuracy
    matching the source.
