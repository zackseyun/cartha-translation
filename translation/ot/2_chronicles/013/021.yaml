theological_decisions:
- issue: Polygynous marriage description
  chosen_reading: 'Render the narrative statement descriptively without moral commentary:
    ''he took for himself fourteen wives.'''
  alternative_readings:
  - Use the more interpretive 'married fourteen wives'
  - Add implied evaluation of the practice
  rationale: The verse reports Abijah's actions and offspring without explicit commendation
    or condemnation. The translation should not import doctrinal or ethical judgment
    beyond the text itself.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
