id: 2CH.13.22
reference: 2 Chronicles 13:22
source:
  edition: WLC
  text: וְ/יֶ֨תֶר֙ דִּבְרֵ֣י אֲבִיָּ֔ה וּ/דְרָכָ֖י/ו וּ/דְבָרָ֑י/ו כְּתוּבִ֕ים בְּ/מִדְרַ֖שׁ
    הַ/נָּבִ֥יא עִדּֽוֹ׃
translation:
  text: Now the rest of the acts of Abijah, and his ways and his sayings, are written
    in the midrash of the prophet Iddo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'commentary,' 'exposition,' or more generally 'record.' The Hebrew term
      'midrash' here refers to a written interpretive or investigative work, not necessarily
      the later rabbinic genre in its developed form.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר introduces the remaining material about a subject. 'Now the rest
    of' is idiomatic in English historiographic style and fits the chronicler's formulaic
    summary statements.
- source_word: דִּבְרֵי
  chosen: the acts of
  alternatives:
  - the words of
  - the matters concerning
  lexicon: HALOT
  rationale: Though דבר often literally means 'words' or 'matters,' in royal summary
    formulas 'the words/affairs of' commonly refers broadly to deeds, events, or acts.
    'Acts' best reflects the historiographic sense here in natural English.
- source_word: אֲבִיָּה
  chosen: Abijah
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: וּדְרָכָיו
  chosen: and his ways
  alternatives:
  - and his conduct
  - and his ways of life
  lexicon: HALOT
  rationale: דֶּרֶךְ literally means 'way,' and in plural with a pronominal suffix
    often denotes conduct or course of life. 'His ways' preserves the Hebrew image
    while remaining understandable.
- source_word: וּדְבָרָיו
  chosen: and his sayings
  alternatives:
  - and his words
  - and his matters
  lexicon: HALOT
  rationale: Here דבר likely refers more specifically to Abijah's spoken words or
    recorded statements, distinguished from his acts and ways. 'Sayings' captures
    that nuance better than the broader 'matters.'
- source_word: כְּתוּבִים
  chosen: are written
  alternatives:
  - are recorded
  lexicon: HALOT
  rationale: The passive participle from כתב straightforwardly indicates written record.
    'Are written' is the most direct rendering; 'are recorded' is possible but slightly
    more interpretive.
- source_word: בְּמִדְרַשׁ
  chosen: in the midrash
  alternatives:
  - in the commentary
  - in the exposition
  - in the record
  lexicon: HALOT
  rationale: מִדְרָשׁ here denotes an interpretive or investigative written work.
    Because 'midrash' is a recognized English loanword and preserves the specific
    Hebrew term without flattening it to a generic 'record,' it is retained in the
    main text, with explanatory alternatives preserved in a footnote.
- source_word: הַנָּבִיא עִדּוֹ
  chosen: of the prophet Iddo
  alternatives:
  - of Iddo the prophet
  lexicon: HALOT
  rationale: The construct phrase identifies the work as belonging to or authored
    by the prophet Iddo. 'Of the prophet Iddo' is natural after 'midrash' in English.
