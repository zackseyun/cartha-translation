theological_decisions:
- issue: Divine agency in the battle outcome
  chosen_reading: God struck down Jeroboam and all Israel
  alternative_readings:
  - The men of Judah defeated Jeroboam and all Israel
  rationale: The Hebrew explicitly makes God the subject of נָגַף. The translation
    preserves the text's theological claim that the victory was due to divine action,
    not merely Judah's military success.
  doctrine_reference: Translation philosophy §1, §3
