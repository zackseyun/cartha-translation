id: 2CH.13.15
reference: 2 Chronicles 13:15
source:
  edition: WLC
  text: וַ/יָּרִ֖יעוּ אִ֣ישׁ יְהוּדָ֑ה וַ/יְהִ֗י בְּ/הָרִ֨יעַ֙ אִ֣ישׁ יְהוּדָ֔ה וְ/הָ/אֱלֹהִ֗ים
    נָגַ֤ף אֶת יָֽרָבְעָם֙ וְ/כָל יִשְׂרָאֵ֔ל לִ/פְנֵ֥י אֲבִיָּ֖ה וִ/יהוּדָֽה־־׃
translation:
  text: Then the men of Judah raised a shout, and when the men of Judah shouted, God
    struck down Jeroboam and all Israel before Abijah and Judah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּרִיעוּ
  chosen: raised a shout
  alternatives:
  - shouted
  - gave a war cry
  - raised a battle cry
  lexicon: HALOT
  rationale: The verb רוע/ריע in the Hiphil commonly denotes raising a loud cry or
    shout, often in battle. 'Raised a shout' preserves the eventive force and avoids
    over-specifying 'battle cry,' though the military context is clear.
- source_word: אִישׁ יְהוּדָה
  chosen: the men of Judah
  alternatives:
  - the men of Judah each
  - Judah's men
  lexicon: HALOT
  rationale: Although אִישׁ is singular in form, it functions collectively here with
    the plural verb, referring to the fighting men of Judah as a group. 'The men of
    Judah' is natural English and reflects the collective sense.
- source_word: בְּהָרִיעַ
  chosen: when ... shouted
  alternatives:
  - as ... raised a shout
  - at the shouting of
  lexicon: HALOT
  rationale: The preposition ב with the infinitive construct gives a temporal sense,
    'when' or 'as.' Rendering it 'when the men of Judah shouted' is clear and idiomatic
    while preserving the temporal sequence.
- source_word: וְהָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: With the article, the phrase is literally 'and the God,' but in English
    narrative this is normally rendered simply 'God.' The referent is the God of Israel
    acting decisively in battle.
- source_word: נָגַף
  chosen: struck down
  alternatives:
  - defeated
  - smote
  - plagued
  lexicon: HALOT
  rationale: נָגַף can denote striking, smiting, or defeating. In this battle context,
    'struck down' preserves the direct divine action and the force of a blow without
    archaic diction like 'smote.'
- source_word: וְכָל יִשְׂרָאֵל
  chosen: and all Israel
  alternatives:
  - and all the Israelites
  - and all of Israel
  lexicon: HALOT
  rationale: The phrase refers to the northern kingdom's forces under Jeroboam. 'All
    Israel' preserves the covenantal-national label used in the Hebrew text without
    interpretive expansion.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: HALOT
  rationale: In military contexts לִפְנֵי often means 'before' in the sense of 'in
    front of' or 'in the presence of,' often implying defeat at someone's hands. 'Before'
    is concise and standard in English Bible style.
- source_word: אֲבִיָּה וִיהוּדָה
  chosen: Abijah and Judah
  alternatives:
  - Abijah and the men of Judah
  - Abijah and the people of Judah
  lexicon: HALOT
  rationale: The Hebrew names Abijah and Judah as the opposing party before whom Jeroboam
    and Israel were struck down. 'Abijah and Judah' is the most direct rendering;
    adding 'men of' would interpretively expand beyond the text.
