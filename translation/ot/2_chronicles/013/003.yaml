id: 2CH.13.3
reference: 2 Chronicles 13:3
source:
  edition: WLC
  text: וַ/יֶּאְסֹ֨ר אֲבִיָּ֜ה אֶת הַ/מִּלְחָמָ֗ה בְּ/חַ֨יִל֙ גִּבּוֹרֵ֣י מִלְחָמָ֔ה
    אַרְבַּע מֵא֥וֹת אֶ֖לֶף אִ֣ישׁ בָּח֑וּר וְ/יָרָבְעָ֗ם עָרַ֤ךְ עִמּ/וֹ֙ מִלְחָמָ֔ה
    בִּ/שְׁמוֹנֶ֨ה מֵא֥וֹת אֶ֛לֶף אִ֥ישׁ בָּח֖וּר גִּבּ֥וֹר חָֽיִל־־ס׃ס
translation:
  text: Abijah joined battle with an army of four hundred thousand chosen men, mighty
    warriors; and Jeroboam drew up for battle against him with eight hundred thousand
    chosen men, mighty men of valor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'engaged in battle' for 'joined battle'; the Hebrew idiom is literally
      'bound the battle.'
    reason: lexical_alternative
  - marker: b
    text: '''Mighty men of valor'' renders a Hebrew military expression for valiant,
      capable fighting men.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֶּאְסֹר
  chosen: joined battle
  alternatives:
  - bound
  - engaged in battle
  - began the war
  lexicon: HALOT
  rationale: The verb אסר normally means 'bind,' but in this military idiom with אֶת־הַמִּלְחָמָה
    it means to engage or join battle. 'Joined battle' preserves the martial idiom
    in natural English better than the overly literal 'bound the battle.'
- source_word: אֶת־הַמִּלְחָמָה
  chosen: battle
  alternatives:
  - the war
  - the fighting
  lexicon: HALOT
  rationale: Though מִלְחָמָה can mean 'war,' here the immediate scene is a specific
    military engagement, so 'battle' fits the context more precisely.
- source_word: בְּחַיִל
  chosen: with an army
  alternatives:
  - with force
  - with valor
  lexicon: HALOT
  rationale: חַיִל has a broad semantic range including force, army, wealth, and valor.
    In this context introducing troop numbers, it refers to military force, so 'with
    an army' is the clearest rendering.
- source_word: גִּבּוֹרֵי מִלְחָמָה
  chosen: mighty warriors
  alternatives:
  - warriors
  - mighty men of war
  lexicon: HALOT
  rationale: This phrase denotes proven fighting men. 'Mighty warriors' is readable
    modern English that preserves both strength and military function.
- source_word: אַרְבַּע מֵאוֹת אֶלֶף אִישׁ
  chosen: four hundred thousand ... men
  alternatives:
  - four hundred thousand men
  lexicon: HALOT
  rationale: The Hebrew explicitly counts 'four hundred thousand man/men.' English
    idiom naturally renders the numeral phrase as 'four hundred thousand ... men'
    within the sentence.
- source_word: בָּחוּר
  chosen: chosen
  alternatives:
  - picked
  - select
  lexicon: HALOT
  rationale: בָּחוּר here describes selected or choice fighting men. 'Chosen' is concise
    and preserves the sense of select troops.
- source_word: עָרַךְ עִמּוֹ מִלְחָמָה
  chosen: drew up for battle against him
  alternatives:
  - arrayed battle with him
  - prepared for war with him
  lexicon: HALOT
  rationale: The verb ערך in military contexts means to arrange troops in battle formation.
    'Drew up for battle against him' captures both the tactical sense and the adversarial
    relation implied by the context.
- source_word: בִּשְׁמוֹנֶה מֵאוֹת אֶלֶף אִישׁ
  chosen: with eight hundred thousand ... men
  alternatives:
  - eight hundred thousand men
  lexicon: HALOT
  rationale: As with the first number, the Hebrew explicitly counts men; the English
    keeps that count in idiomatic form.
- source_word: גִּבּוֹר חָיִל
  chosen: mighty men of valor
  alternatives:
  - valiant warriors
  - mighty warriors
  - men of strength
  lexicon: HALOT
  rationale: This common expression denotes valiant, capable fighting men. 'Mighty
    men of valor' preserves the traditional force of the phrase while remaining understandable.
