theological_decisions:
- issue: Rendering of יִשְׂרָאֵל in a divided-kingdom context
  chosen_reading: all Israel
  alternative_readings:
  - all the Israelites
  - all of Israel
  rationale: The Hebrew uses the covenantal-national name directly. Retaining 'all
    Israel' preserves the Chronicler's rhetoric in which the northern kingdom is addressed
    under the full national designation, without narrowing it to ethnicity alone or
    smoothing away the political-theological tension of the divided monarchy.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
