id: 2CH.13.4
reference: 2 Chronicles 13:4
source:
  edition: WLC
  text: וַ/יָּ֣קָם אֲבִיָּ֗ה מֵ/עַל֙ לְ/הַ֣ר צְמָרַ֔יִם אֲשֶׁ֖ר בְּ/הַ֣ר אֶפְרָ֑יִם
    וַ/יֹּ֕אמֶר שְׁמָע֖וּ/נִי יָרָבְעָ֥ם וְ/כָל יִשְׂרָאֵֽל־׃
translation:
  text: Then Abijah stood on Mount Zemaraim, which is in the hill country of Ephraim,
    and said, “Hear me, Jeroboam and all Israel!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “which is in the mountains of Ephraim.” The Hebrew expression can denote
      the Ephraimite hill country or mountainous region.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: stood
  alternatives:
  - arose
  - took his stand
  lexicon: HALOT
  rationale: The verb קום in narrative commonly means 'arose/stood up.' In this military-speech
    setting, 'stood' is natural modern English and fits the following speech introduction
    without overinterpreting as a formal military stance.
- source_word: מֵעַל לְהַר
  chosen: on Mount
  alternatives:
  - from upon Mount
  - up on Mount
  lexicon: HALOT
  rationale: The prepositional sequence literally has 'from upon/to the mountain,'
    but idiomatically describes Abijah's position on the mountain height. 'On Mount'
    gives the plain locative sense in readable English without woodenly reproducing
    the Hebrew prepositions.
- source_word: צְמָרַיִם
  chosen: Zemaraim
  rationale: Proper place name; transliterated according to standard English convention,
    following the project's policy to transliterate names.
- source_word: אֲשֶׁר בְּהַר אֶפְרָיִם
  chosen: which is in the hill country of Ephraim
  alternatives:
  - which is in Mount Ephraim
  - which is in the mountains of Ephraim
  lexicon: HALOT
  rationale: הַר can denote a mountainous region, not only a single peak. In English,
    'hill country of Ephraim' best conveys the regional sense and is a common natural
    rendering for this geographic expression.
- source_word: וַיֹּאמֶר
  chosen: and said
  alternatives:
  - and he said
  lexicon: HALOT
  rationale: Standard narrative speech introducer; 'and said' is sufficient in English
    since the subject is already explicit.
- source_word: שְׁמָעוּנִי
  chosen: Hear me
  alternatives:
  - Listen to me
  lexicon: HALOT
  rationale: Imperative of שמע with 1cs suffix. 'Hear me' preserves the direct, formal
    rhetorical force of the address better than the slightly softer 'Listen to me.'
- source_word: יָרָבְעָם וְכָל יִשְׂרָאֵל
  chosen: Jeroboam and all Israel
  alternatives:
  - Jeroboam, and all Israel
  rationale: Direct address to the king and the northern assembly. 'All Israel' is
    retained literally, reflecting the Chronicler's political-covenantal designation
    for the northern kingdom's gathered forces/people.
