id: 2CH.13.14
reference: 2 Chronicles 13:14
source:
  edition: WLC
  text: וַ/יִּפְנ֣וּ יְהוּדָ֗ה וְ/הִנֵּ֨ה לָ/הֶ֤ם הַ/מִּלְחָמָה֙ פָּנִ֣ים וְ/אָח֔וֹר
    וַֽ/יִּצְעֲק֖וּ לַ/יהוָ֑ה וְ/הַ/כֹּ֣הֲנִ֔ים מחצצרים בַּ/חֲצֹצְרֽוֹת׃
translation:
  text: When Judah turned around, behold, the battle was before them and behind them;
    and they cried out to the LORD, while the priests were blowing the trumpets.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּפְנוּ
  chosen: turned around
  alternatives:
  - turned
  - looked back
  lexicon: HALOT
  rationale: From פנה, here in context of suddenly facing an ambush from front and
    rear. 'Turned around' makes the physical movement explicit in natural English
    without overparaphrasing.
- source_word: יְהוּדָה
  chosen: Judah
  alternatives:
  - the men of Judah
  lexicon: HALOT
  rationale: The collective proper name stands for the people/army of Judah. 'Judah'
    preserves the Hebrew subject succinctly; English readers can understand the collective
    sense from context.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: HALOT
  rationale: Retains the discourse marker's vividness and abruptness. Though somewhat
    elevated, 'behold' remains readable and reflects the Hebrew's attention-directing
    force.
- source_word: הַמִּלְחָמָה
  chosen: the battle
  alternatives:
  - the fighting
  - the war
  lexicon: HALOT
  rationale: '''Battle'' best fits the immediate military engagement rather than a
    prolonged war.'
- source_word: פָּנִים וְאָחוֹר
  chosen: before them and behind them
  alternatives:
  - in front and in back
  - on the front and rear
  lexicon: HALOT
  rationale: This idiom indicates attack from both directions. 'Before them and behind
    them' is clear, close to the Hebrew, and idiomatic enough in English.
- source_word: וַיִּצְעֲקוּ
  chosen: cried out
  alternatives:
  - called out
  - shouted
  lexicon: HALOT
  rationale: Conveys urgent appeal, especially since the object is the LORD. 'Cried
    out' preserves both intensity and prayerful direction.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Straightforward rendering of the noun.
- source_word: מחצצרים
  chosen: were blowing
  alternatives:
  - blew
  - sounded
  lexicon: HALOT
  rationale: The participle gives ongoing or accompanying action. 'Were blowing' captures
    the durative sense alongside Judah's cry.
- source_word: בַּחֲצֹצְרוֹת
  chosen: the trumpets
  alternatives:
  - the silver trumpets
  - trumpets
  lexicon: HALOT
  rationale: חֲצֹצְרוֹת are the straight cultic/military trumpets. 'Trumpets' is the
    standard clear rendering; 'silver' is not explicit in this verse and should not
    be imported.
