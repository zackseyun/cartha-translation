id: 2CH.13.11
reference: 2 Chronicles 13:11
source:
  edition: WLC
  text: וּ/מַקְטִרִ֣ים לַ/יהוָ֡ה עֹל֣וֹת בַּ/בֹּֽקֶר בַּ/בֹּ֣קֶר וּ/בָ/עֶֽרֶב בָּ/עֶ֣רֶב וּ/קְטֹֽרֶת סַמִּים֩ וּ/מַעֲרֶ֨כֶת לֶ֜חֶם עַל הַ/שֻּׁלְחָ֣ן הַ/טָּה֗וֹר וּ/מְנוֹרַ֨ת הַ/זָּהָ֤ב וְ/נֵרֹתֶ֨י/הָ֙ לְ/בָעֵר֙ בָּ/עֶ֣רֶב בָּ/עֶ֔רֶב כִּֽי שֹׁמְרִ֣ים אֲנַ֔חְנוּ אֶת מִשְׁמֶ֖רֶת יְהוָ֣ה אֱלֹהֵ֑י/נוּ וְ/אַתֶּ֖ם עֲזַבְתֶּ֥ם אֹתֽ/וֹ־־־־־־׃
translation:
  text: And we offer up burnt offerings to Yahweh morning by morning and evening by evening, and fragrant incense, and the arrangement of bread on the pure table, and the golden lampstand with its lamps to burn evening by evening; for we are keeping the charge of Yahweh our God, but you have forsaken him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the showbread' or 'the bread of the Presence.' Literally, 'the arrangement of bread.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַקְטִרִים
  chosen: we offer up
  alternatives:
  - we burn
  - we make smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר can denote causing an offering to go up in smoke on the altar. 'Offer up' communicates sacrificial action in natural English without reducing the cultic sense to mere combustion. The object 'burnt offerings' clarifies the sacrificial context.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: עֹלוֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: Standard and precise rendering for עֹלָה in sacrificial contexts.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  chosen: morning by morning
  alternatives:
  - every morning
  - morning after morning
  lexicon: HALOT
  rationale: The repeated temporal expression is distributive and habitual. 'Morning by morning' preserves the Hebrew rhythm and regularity.
- source_word: וּבָעֶרֶב בָּעֶרֶב
  chosen: and evening by evening
  alternatives:
  - and every evening
  - and evening after evening
  lexicon: HALOT
  rationale: As with the morning phrase, the repetition marks regular daily observance. The more formal 'evening by evening' preserves the parallelism.
- source_word: וּקְטֹרֶת סַמִּים
  chosen: and fragrant incense
  alternatives:
  - and incense of spices
  - and spiced incense
  lexicon: HALOT
  rationale: קְטֹרֶת is incense; סַמִּים refers to aromatic spices. 'Fragrant incense' is idiomatic English that preserves the sense of specially compounded aromatic incense.
- source_word: וּמַעֲרֶכֶת לֶחֶם
  chosen: and the arrangement of bread
  alternatives:
  - and the row of bread
  - and the bread set in order
  - and the showbread arrangement
  lexicon: HALOT
  rationale: The phrase refers to the bread arranged before the LORD on the table. 'Arrangement of bread' stays close to the Hebrew without importing later traditional terminology into the main text.
- source_word: עַל הַשֻּׁלְחָן הַטָּהוֹר
  chosen: on the pure table
  alternatives:
  - on the clean table
  - on the ceremonially clean table
  lexicon: HALOT
  rationale: טָהוֹר in cultic contexts denotes ritual purity. 'Pure' is concise and preserves the sacred/cultic nuance better than merely hygienic 'clean'.
- source_word: וּמְנוֹרַת הַזָּהָב
  chosen: and the golden lampstand
  alternatives:
  - and the lampstand of gold
  lexicon: HALOT
  rationale: Natural English rendering of the construct phrase while preserving the tabernacle/temple furnishing reference.
- source_word: וְנֵרֹתֶיהָ לְבָעֵר
  chosen: with its lamps to burn
  alternatives:
  - and its lamps for lighting
  - and its lamps to give light
  lexicon: HALOT
  rationale: The infinitive expresses purpose/function. 'With its lamps to burn' keeps the imagery and links naturally to the following temporal phrase.
- source_word: בָּעֶרֶב בָּעֶרֶב
  chosen: evening by evening
  alternatives:
  - every evening
  - evening after evening
  lexicon: HALOT
  rationale: Repeated phrase again marks regular evening tending/lighting of the lamps; preserving the repetition reflects the Hebrew style.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding claims about proper worship.
- source_word: שֹׁמְרִים אֲנַחְנוּ אֶת מִשְׁמֶרֶת
  chosen: we are keeping the charge
  alternatives:
  - we keep the ordinance
  - we are observing the duty
  - we are guarding the obligation
  lexicon: HALOT
  rationale: The idiom שמר משמרת conveys faithful observance of an assigned religious duty. 'Keeping the charge' is concise, covenantal, and suitably formal.
- source_word: יְהוָה אֱלֹהֵינוּ
  chosen: of the LORD our God
  alternatives:
  - of Yahweh our God
  lexicon: HALOT
  rationale: Maintains the covenant name per doctrine and the possessive relationship expressed in the Hebrew.
- source_word: וְאַתֶּם עֲזַבְתֶּם אֹתוֹ
  chosen: but you have forsaken him
  alternatives:
  - but you have abandoned him
  - and you have left him
  lexicon: HALOT
  rationale: עָזַב in covenantal contexts often carries the force of apostasy or abandonment. 'Forsaken' preserves that theological and rhetorical weight.
