theological_decisions:
- issue: Rendering the temple bread terminology
  chosen_reading: the arrangement of bread
  alternative_readings:
  - the showbread
  - the bread of the Presence
  rationale: The Hebrew here is literally 'the arrangement of bread,' emphasizing the ordered placement in temple service. Traditional terms are accurate by association but are more interpretive; preserving the literal expression in the main text best fits optimal equivalence, while alternatives are worth preserving in a footnote.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering covenant name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
