id: 2CH.13.1
reference: 2 Chronicles 13:1
source:
  edition: WLC
  text: בִּ/שְׁנַ֛ת שְׁמוֹנֶ֥ה עֶשְׂרֵ֖ה לַ/מֶּ֣לֶךְ יָרָבְעָ֑ם וַ/יִּמְלֹ֥ךְ אֲבִיָּ֖ה
    עַל יְהוּדָֽה־׃
translation:
  text: In the eighteenth year of King Jeroboam, Abijah became king over Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abijah is called 'Abijam' in the parallel account in 1 Kings 15:1; Chronicles
      here reads 'Abijah.'
    reason: cross_reference
lexical_decisions:
- source_word: בִּ/שְׁנַת
  chosen: In the ... year of
  alternatives:
  - In the year of
  - During the ... year of
  lexicon: HALOT
  rationale: The preposition ב plus שְׁנַת introduces a regnal-year dating formula.
    English idiom is best represented as 'In the ... year of' rather than a more wooden
    'In year of.'
- source_word: שְׁמוֹנֶה עֶשְׂרֵה
  chosen: eighteenth
  alternatives:
  - eighteen
  lexicon: HALOT
  rationale: The cardinal expression functions idiomatically within a dating formula
    and is naturally rendered by the ordinal 'eighteenth' in English.
- source_word: לַ/מֶּלֶךְ
  chosen: of King
  alternatives:
  - belonging to the king
  - for the king
  lexicon: HALOT
  rationale: In regnal formulas, ל plus 'the king' marks the ruler whose regnal year
    is being counted. 'of King' is the clearest idiomatic English rendering.
- source_word: יָרָבְעָם
  chosen: Jeroboam
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names.
- source_word: וַ/יִּמְלֹךְ
  chosen: became king
  alternatives:
  - began to reign
  - reigned
  lexicon: HALOT
  rationale: The wayyiqtol of מלך here marks accession to kingship. 'Became king'
    communicates the ingressive sense clearly in modern English. 'Reigned' is possible
    but can blur the accession nuance; 'began to reign' is slightly more formal.
- source_word: אֲבִיָּה
  chosen: Abijah
  alternatives:
  - Abijam
  rationale: The Chronicler's form is אֲבִיָּה, appropriately transliterated 'Abijah.'
    'Abijam' reflects the alternate form found in Kings, not the form in this verse.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  - in
  lexicon: HALOT
  rationale: With מלך, עַל denotes rule over a people or territory. 'Over' is the
    standard and natural English equivalent.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Proper name of the southern kingdom, transliterated by standard English
    convention.
