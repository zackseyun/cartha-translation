id: 2CH.13.23
reference: 2 Chronicles 13:23
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֨ב אֲבִיָּ֜ה עִם אֲבֹתָ֗י/ו וַ/יִּקְבְּר֤וּ אֹת/וֹ֙ בְּ/עִ֣יר
    דָּוִ֔יד וַ/יִּמְלֹ֛ךְ אָסָ֥א בְנ֖/וֹ תַּחְתָּ֑י/ו בְּ/יָמָ֛י/ו שָׁקְטָ֥ה הָ/אָ֖רֶץ
    עֶ֥שֶׂר שָׁנִֽים־׃פ
translation:
  text: And Abijah slept with his fathers, and they buried him in the City of David.
    And Asa his son reigned in his place. In his days the land had rest for ten years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land was quiet for ten years.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: The idiom 'slept with his fathers' is a conventional Hebrew expression
    for death. Retaining 'slept' preserves the source-text imagery and established
    biblical idiom without flattening it to the interpretive gloss 'died'.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: A formal rendering preserves the stock royal-death formula. 'Ancestors'
    is possible in smoother English, but 'fathers' better reflects the Hebrew wording
    and biblical register.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  chosen: they buried him
  alternatives:
  - he was buried
  lexicon: HALOT
  rationale: The Hebrew verb is active plural, with an unspecified subject. 'They
    buried him' preserves that form better than the passive.
- source_word: בְּעִיר דָּוִיד
  chosen: in the City of David
  alternatives:
  - in David's city
  lexicon: HALOT
  rationale: '''City of David'' is the standard proper-place rendering in English
    Bible usage and accurately reflects the construct phrase.'
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: The verb means 'to reign/be king.' In succession notices, English 'reigned'
    is concise and natural; 'became king' is interpretive, and 'began to reign' adds
    an inceptive nuance not explicit here.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: The phrase marks dynastic succession. 'In his place' is idiomatic English
    and closely matches the Hebrew sense of replacement/succession.
- source_word: בְּיָמָיו
  chosen: In his days
  alternatives:
  - During his reign
  - In his time
  lexicon: HALOT
  rationale: The Hebrew is literally 'in his days.' This can imply the period of his
    reign, but the more literal phrase preserves the wording while remaining natural
    in English.
- source_word: שָׁקְטָה
  chosen: had rest
  alternatives:
  - was quiet
  - was undisturbed
  - was at peace
  lexicon: HALOT
  rationale: The verb denotes quietness, tranquility, or freedom from disturbance.
    'Had rest' is a common biblical rendering in contexts of national respite and
    fits the Chronicler's idiom better than the flatter 'was quiet.'
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the kingdom
  - the country
  lexicon: HALOT
  rationale: '''The land'' is the most direct rendering and can denote the territory/realm
    under Asa. ''Kingdom'' is more interpretive than the Hebrew noun itself.'
- source_word: עֶשֶׂר שָׁנִים
  chosen: for ten years
  alternatives:
  - ten years
  lexicon: HALOT
  rationale: English idiom normally supplies 'for' with duration. This expresses the
    temporal extent clearly without adding meaning.
