id: 2CH.13.18
reference: 2 Chronicles 13:18
source:
  edition: WLC
  text: וַ/יִּכָּנְע֥וּ בְנֵי יִשְׂרָאֵ֖ל בָּ/עֵ֣ת הַ/הִ֑יא וַ/יֶּֽאֶמְצוּ֙ בְּנֵ֣י
    יְהוּדָ֔ה כִּ֣י נִשְׁעֲנ֔וּ עַל יְהוָ֖ה אֱלֹהֵ֥י אֲבוֹתֵי/הֶֽם־־׃
translation:
  text: So the sons of Israel were subdued at that time, and the sons of Judah prevailed,
    because they relied on the LORD, the God of their fathers.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּכָּנְעוּ
  chosen: were subdued
  alternatives:
  - were humbled
  - were brought low
  - were defeated
  lexicon: HALOT
  rationale: From כנע in the Niphal, conveying being brought into subjection or humbled.
    In this military context, 'were subdued' best captures the passive/resultative
    sense without over-specifying a total rout. 'Were defeated' is possible contextually
    but less directly reflects the lexical nuance of subjugation/humbling.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A formally transparent rendering of the Hebrew construct. Here it refers
    specifically to the northern kingdom's forces, but 'the sons of Israel' preserves
    the source wording and the Judah/Israel contrast in the verse. This follows the
    project's gender-accurate preference.
- source_word: בָּעֵת הַהִיא
  chosen: at that time
  alternatives:
  - in that time
  - then
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the temporal phrase, preserving the narrative
    time reference without awkwardness.
- source_word: וַיֶּאֶמְצוּ
  chosen: prevailed
  alternatives:
  - grew strong
  - were strong
  - proved stronger
  lexicon: HALOT
  rationale: From אמץ, 'to be strong/strengthen oneself.' In battle context, 'prevailed'
    communicates the outcome naturally in English while reflecting strength leading
    to victory. 'Grew strong' is more literal but less idiomatic in this context.
- source_word: בְנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - the men of Judah
  - Judah
  lexicon: HALOT
  rationale: Preserves the Hebrew expression and the parallel with 'the sons of Israel.'
    'Judah' alone would be too compressed; 'men of Judah' is interpretive.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for Judah's prevailing. 'Because' is the clearest
    modern English causal connector.
- source_word: נִשְׁעֲנוּ עַל
  chosen: relied on
  alternatives:
  - leaned on
  - trusted in
  lexicon: HALOT
  rationale: The verb שען with על literally means 'lean on,' metaphorically 'rely
    on.' 'Relied on' preserves the metaphorical sense in clear English. 'Trusted in'
    is possible, but 'relied on' stays closer to the underlying image.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  chosen: the God of their fathers
  alternatives:
  - their fathers' God
  - the God of their ancestors
  lexicon: HALOT
  rationale: A natural rendering of the construct chain that preserves covenantal
    and ancestral resonance. 'Ancestors' is more inclusive in modern English but less
    formally aligned with the masculine plural noun in the source.
