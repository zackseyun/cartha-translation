id: 2CH.13.13
reference: 2 Chronicles 13:13
source:
  edition: WLC
  text: וְ/יָֽרָבְעָ֗ם הֵסֵב֙ אֶת הַ/מַּאְרָ֔ב לָ/ב֖וֹא מֵֽ/אַחֲרֵי/הֶ֑ם וַ/יִּֽהְיוּ֙
    לִ/פְנֵ֣י יְהוּדָ֔ה וְ/הַ/מַּאְרָ֖ב מֵ/אַחֲרֵי/הֶֽם־׃
translation:
  text: But Yarobam had turned the ambush around to come behind them, so they were
    in front of Judah, and the ambush was behind them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ambush force' or 'the men in ambush.' The Hebrew noun can denote
      the ambush as a tactic or the troops lying in wait.
    reason: lexical_alternative
  - marker: b
    text: Traditional English versions often read 'Jeroboam.' The form 'Yarobam' more
      directly reflects the Hebrew name יָרָבְעָם.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵסֵב
  chosen: had turned ... around
  alternatives:
  - caused to go around
  - set in motion
  - brought around
  lexicon: HALOT
  rationale: From סבב in the Hiphil, conveying causing something to turn or go around.
    In this military context, 'had turned ... around' communicates Jeroboam's maneuvering
    of the ambush force into position.
- source_word: הַמַּאְרָב
  chosen: the ambush
  alternatives:
  - the ambush force
  - the men in ambush
  lexicon: HALOT
  rationale: The noun denotes an ambush or ambushing force. 'The ambush' is concise
    and natural in English while still allowing the military force to be understood
    from context.
- source_word: לָבוֹא מֵאַחֲרֵיהֶם
  chosen: to come behind them
  alternatives:
  - to come from behind them
  - to come at their rear
  lexicon: HALOT
  rationale: Infinitive construction expressing purpose/result of the maneuver. 'To
    come behind them' preserves the spatial sense without overinterpreting the tactic.
- source_word: וַיִּהְיוּ לִפְנֵי יְהוּדָה
  chosen: so they were in front of Judah
  alternatives:
  - and they came to be before Judah
  - and they were before Judah
  lexicon: HALOT
  rationale: The plural verb likely refers to Jeroboam's main forces implied by the
    context. 'In front of Judah' gives the straightforward battlefield orientation
    in idiomatic English.
- source_word: לִפְנֵי
  chosen: in front of
  alternatives:
  - before
  lexicon: HALOT
  rationale: Although often rendered 'before,' here the spatial military sense is
    primary, so 'in front of' is clearer for modern readers.
- source_word: מֵאַחֲרֵיהֶם
  chosen: behind them
  alternatives:
  - at their rear
  - from behind them
  lexicon: HALOT
  rationale: The prepositional phrase marks rear position relative to Judah. 'Behind
    them' is the most direct and natural rendering in both occurrences.
- source_word: וְ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: HALOT
  rationale: The conjunction introduces a tactical contrast with the preceding situation,
    so 'But' better reflects the adversative force in context than a simple 'And'.
- source_word: יָרָבְעָם
  chosen: Yarobam
  alternatives:
  - Jeroboam
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. 'Yarobam' reflects the Hebrew form more directly than the traditional
    Anglicized 'Jeroboam'.
