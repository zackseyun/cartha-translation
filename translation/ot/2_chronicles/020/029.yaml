id: 2CH.20.29
reference: 2 Chronicles 20:29
source:
  edition: WLC
  text: וַ/יְהִי֙ פַּ֣חַד אֱלֹהִ֔ים עַ֖ל כָּל מַמְלְכ֣וֹת הָ/אֲרָצ֑וֹת בְּ/שָׁמְעָ֕/ם כִּ֚י נִלְחַ֣ם יְהוָ֔ה עִ֖ם אוֹיְבֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: And the fear of God came upon all the kingdoms of the lands when they heard that Yahweh had fought against the enemies of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'terror from God.' The Hebrew phrase can denote fear associated with God's presence or action.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: came
  alternatives:
  - was
  - came to be
  lexicon: HALOT
  rationale: The waw-consecutive of היה here introduces a resulting state/event. In English, 'came' idiomatically conveys the onset of the fear better than the wooden 'was,' while preserving the narrative force.
- source_word: פַּחַד אֱלֹהִים
  chosen: the fear of God
  alternatives:
  - a godly fear
  - terror from God
  - fear of God
  lexicon: HALOT
  rationale: The construct phrase most naturally means 'fear of God' here, likely denoting fear associated with God's evident action. 'The fear of God' preserves the Hebrew wording and allows the context to show that this is dread falling on surrounding kingdoms because of YHWH's intervention.
- source_word: עַל
  chosen: upon
  alternatives:
  - 'on'
  - over
  lexicon: HALOT
  rationale: '''Upon'' is a natural formal equivalent in this idiom (''came upon'') and fits the sense of something descending on the kingdoms.'
- source_word: כָּל מַמְלְכוֹת הָאֲרָצוֹת
  chosen: all the kingdoms of the lands
  alternatives:
  - all the kingdoms of the countries
  - all the kingdoms of the earth
  lexicon: HALOT
  rationale: ממלכות is 'kingdoms'; הארצות is plural, so 'lands' is more precise than singular 'earth.' This likely refers to surrounding territories/nations rather than the whole world.
- source_word: בְּשָׁמְעָם
  chosen: when they heard
  alternatives:
  - on their hearing
  - as they heard
  lexicon: HALOT
  rationale: The preposition with infinitive construct and suffix expresses temporal circumstance. 'When they heard' is clear modern English and accurately reflects the syntax.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: After 'heard,' כי introduces the content of what was heard, so 'that' is the most natural English rendering.
- source_word: נִלְחַם
  chosen: had fought
  alternatives:
  - fought
  - was fighting
  lexicon: HALOT
  rationale: The perfect refers to the completed divine action that had become known to the nations. English past perfect fits the reported-hearing context well.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עִם
  chosen: against
  alternatives:
  - with
  lexicon: HALOT
  rationale: Although עִם commonly means 'with,' with לחם it can mark the party engaged in battle, and context determines whether the sense is 'with' or 'against.' Since the object is 'the enemies of Israel,' English requires 'against' to convey the intended adversative sense.
- source_word: אוֹיְבֵי יִשְׂרָאֵל
  chosen: the enemies of Israel
  alternatives:
  - Israel's enemies
  lexicon: HALOT
  rationale: The construct chain straightforwardly means 'the enemies of Israel.' The fuller form is retained for clarity and gravity.
