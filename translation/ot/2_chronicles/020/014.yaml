id: 2CH.20.14
reference: 2 Chronicles 20:14
source:
  edition: WLC
  text: וְ/יַחֲזִיאֵ֡ל בֶּן זְכַרְיָ֡הוּ בֶּן בְּ֠נָיָה בֶּן יְעִיאֵ֧ל בֶּן מַתַּנְיָ֛ה הַ/לֵּוִ֖י מִן בְּנֵ֣י אָסָ֑ף הָיְתָ֤ה עָלָי/ו֙ ר֣וּחַ יְהוָ֔ה בְּ/ת֖וֹךְ הַ/קָּהָֽל־־־־־׃
translation:
  text: And Jahaziel son of Zechariah, son of Benaiah, son of Jeiel, son of Mattaniah, the Levite, from the sons of Asaph—the Spirit of Yahweh came upon him in the midst of the assembly.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/יַחֲזִיאֵל
  chosen: And Jahaziel
  alternatives:
  - Now Jahaziel
  rationale: The prefixed conjunction is rendered simply as "And," the normal narrative linkage. The personal name is transliterated rather than translated, following the policy to transliterate names.
- source_word: בֶּן ... בֶּן ... בֶּן ... בֶּן
  chosen: son of ... son of ... son of ... son of
  alternatives:
  - descendant of ...
  lexicon: HALOT
  rationale: The repeated genealogy is preserved formally as "son of" each time, since the text explicitly lists lineage rather than merely indicating general descent.
- source_word: הַ/לֵּוִי
  chosen: the Levite
  alternatives:
  - a Levite
  lexicon: HALOT
  rationale: The article is present in Hebrew, so "the Levite" best reflects the appositional identification of Jahaziel within the genealogy.
- source_word: מִן בְּנֵי אָסָף
  chosen: from the sons of Asaph
  alternatives:
  - of the sons of Asaph
  - from among the descendants of Asaph
  lexicon: HALOT
  rationale: This phrase identifies clan or guild affiliation. "From the sons of Asaph" is a natural English rendering that preserves the Hebrew construction and the corporate lineage reference.
- source_word: הָיְתָה עָלָיו רוּחַ יְהוָה
  chosen: the Spirit of the LORD came upon him
  alternatives:
  - the Spirit of the LORD was upon him
  - the Spirit of the LORD came over him
  lexicon: HALOT
  rationale: This idiom commonly denotes the empowering arrival of God's Spirit for prophetic speech or action. "Came upon him" communicates the eventive force better than the more static "was upon him." "Spirit" is capitalized because the phrase refers to the divine Spirit.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּ/ת֖וֹךְ הַ/קָּהָל
  chosen: in the midst of the assembly
  alternatives:
  - in the middle of the assembly
  - among the assembly
  - in the congregation
  lexicon: HALOT
  rationale: '"In the midst of" reflects the spatial force of בְּתוֹךְ, and "assembly" is a clear rendering of קָהָל in this public gathered context.'
