id: 2CH.20.32
reference: 2 Chronicles 20:32
source:
  edition: WLC
  text: וַ/יֵּ֗לֶךְ בְּ/דֶ֛רֶךְ אָבִ֥י/ו אָסָ֖א וְ/לֹא סָ֣ר מִמֶּ֑/נָּה לַ/עֲשׂ֥וֹת הַ/יָּשָׁ֖ר בְּ/עֵינֵ֥י יְהוָֽה־׃
translation:
  text: He walked in the way of his father Asa and did not turn aside from it, doing what was right in the eyes of Yahweh.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: He walked
  alternatives:
  - He went
  - He lived
  lexicon: HALOT
  rationale: הלך literally means 'went/walked,' but in royal-evaluative formulas it idiomatically describes conduct or manner of life. 'Walked' preserves the Hebrew metaphor and remains natural English.
- source_word: בְּדֶרֶךְ
  chosen: in the way
  alternatives:
  - in the path
  - according to the conduct
  lexicon: HALOT
  rationale: דֶּרֶךְ here is metaphorical for pattern of conduct. 'In the way' is the standard idiomatic rendering and fits the evaluative formula.
- source_word: אָבִיו אָסָא
  chosen: of his father Asa
  alternatives:
  - of Asa his father
  lexicon: HALOT
  rationale: The construct phrase identifies Asa as Jehoshaphat's father. 'Of his father Asa' is smooth modern English while preserving the filial relationship.
- source_word: וְלֹא סָר מִמֶּנָּה
  chosen: and did not turn aside from it
  alternatives:
  - and did not depart from it
  - and did not deviate from it
  lexicon: HALOT
  rationale: סור with מן expresses turning aside or departing. 'Turn aside from it' preserves the path metaphor established by 'way' and matches the feminine suffix referring back to 'way.'
- source_word: לַעֲשׂוֹת
  chosen: doing
  alternatives:
  - to do
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses result or manner in this context. Rendering it as the participial-like 'doing' produces natural English linked to the preceding clause without losing the sense.
- source_word: הַיָּשָׁר
  chosen: what was right
  alternatives:
  - the right
  - what was upright
  lexicon: HALOT
  rationale: The adjective יָשָׁר in this idiom means morally right/upright. 'What was right' is idiomatic English and common in biblical evaluative statements.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for divine evaluation. 'In the eyes of the LORD' preserves the imagery. Per doctrine, יְהוָה is rendered 'the LORD.'
