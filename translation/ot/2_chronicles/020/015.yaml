id: 2CH.20.15
reference: 2 Chronicles 20:15
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר הַקְשִׁ֤יבוּ כָל יְהוּדָה֙ וְ/יֹשְׁבֵ֣י יְרוּשָׁלִַ֔ם וְ/הַ/מֶּ֖לֶךְ יְהוֹשָׁפָ֑ט כֹּֽה אָמַ֨ר יְהוָ֜ה לָ/כֶ֗ם אַ֠תֶּם אַל תִּֽירְא֤וּ וְ/אַל תֵּחַ֨תּוּ֙ מִ/פְּנֵ֨י הֶ/הָמ֤וֹן הָ/רָב֙ הַ/זֶּ֔ה כִּ֣י לֹ֥א לָ/כֶ֛ם הַ/מִּלְחָמָ֖ה כִּ֥י לֵ/אלֹהִֽים־־־־׃
translation:
  text: 'And he said, “Listen, all Judah and inhabitants of Jerusalem, and King Jehoshaphat: Thus says Yahweh to you, ‘Do not fear or be dismayed because of this great multitude, for the battle is not yours, but God''s.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''for the battle is not yours, but belongs to God.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְשִׁיבוּ
  chosen: Listen
  alternatives:
  - Pay attention
  - Hear
  lexicon: HALOT
  rationale: Imperative plural calling for attentive hearing. 'Listen' is natural modern English and preserves the force better than the more wooden 'give ear.'
- source_word: כָל יְהוּדָה
  chosen: all Judah
  alternatives:
  - all you of Judah
  - all the people of Judah
  lexicon: HALOT
  rationale: Keeps the collective geographic/tribal designation concise and close to the Hebrew.
- source_word: יֹשְׁבֵי יְרוּשָׁלִַם
  chosen: inhabitants of Jerusalem
  alternatives:
  - those who dwell in Jerusalem
  - residents of Jerusalem
  lexicon: HALOT
  rationale: The participial construction denotes those living in Jerusalem. 'Inhabitants' is idiomatic and suitably formal.
- source_word: וְהַמֶּלֶךְ יְהוֹשָׁפָט
  chosen: and King Jehoshaphat
  alternatives:
  - and the king, Jehoshaphat
  lexicon: HALOT
  rationale: Appositional title-name sequence is rendered smoothly in English while preserving direct address to the king alongside the people.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - Thus has the LORD said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal prophetic tone. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in accordance with DOCTRINE.md contested terms table.
- source_word: אַל תִּירְאוּ
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: Direct prohibition from ירא. 'Do not fear' is concise and preserves the elevated tone.
- source_word: וְאַל תֵּחַתּוּ
  chosen: and do not be dismayed
  alternatives:
  - and do not be shattered
  - and do not lose heart
  lexicon: HALOT
  rationale: חתת in the Niphal/jussive context conveys being broken, terrified, or dismayed. 'Be dismayed' is the best idiomatic English equivalent in this military exhortation.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - before
  - at the sight of
  - in the face of
  lexicon: HALOT
  rationale: 'Literally ''from before the face of,'' but here the sense is causal in context: they are not to fear on account of the enemy force.'
- source_word: הֶהָמוֹן הָרָב הַזֶּה
  chosen: this great multitude
  alternatives:
  - this vast crowd
  - this great horde
  lexicon: HALOT
  rationale: הָמוֹן denotes a large throng or multitude; with רָב and the demonstrative, 'this great multitude' is a natural rendering that fits the military context without overinterpreting as 'horde.'
- source_word: כִּי לֹא לָכֶם הַמִּלְחָמָה
  chosen: for the battle is not yours
  alternatives:
  - for the war is not for you
  - for this battle does not belong to you
  lexicon: HALOT
  rationale: The predicate possession construction is best expressed idiomatically in English as 'the battle is not yours,' preserving the contrast with the following clause.
- source_word: כִּי לֵאלֹהִים
  chosen: but God’s
  alternatives:
  - but belongs to God
  - for it is God's
  lexicon: HALOT
  rationale: 'The second כי is adversative/explanatory in context, setting up the contrast: the battle belongs to God. ''But God''s'' is concise and idiomatic after the preceding clause.'
