theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Possessive statement about the battle
  chosen_reading: for the battle is not yours, but God’s
  alternative_readings:
  - for the battle is not yours, but belongs to God
  rationale: The Hebrew emphasizes divine ownership/control of the conflict without importing a broader doctrinal claim beyond the immediate context. The concise possessive preserves the theological point that victory depends on God, not Judah.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
