id: 2CH.20.6
reference: 2 Chronicles 20:6
source:
  edition: WLC
  text: וַ/יֹּאמַ֗ר יְהוָ֞ה אֱלֹהֵ֤י אֲבֹתֵ֨י/נוּ֙ הֲ/לֹ֨א אַתָּֽה ה֤וּא אֱלֹהִים֙ בַּ/שָּׁמַ֔יִם וְ/אַתָּ֣ה מוֹשֵׁ֔ל בְּ/כֹ֖ל מַמְלְכ֣וֹת הַ/גּוֹיִ֑ם וּ/בְ/יָדְ/ךָ֙ כֹּ֣חַ וּ/גְבוּרָ֔ה וְ/אֵ֥ין עִמְּ/ךָ֖ לְ/הִתְיַצֵּֽב־׃
translation:
  text: and said, “O Yahweh, God of our fathers, are you not God in heaven? And do you not rule over all the kingdoms of the nations? In your hand are power and might, and there is none who can stand against you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “God of our ancestors.” The Hebrew reads “God of our fathers.”
    reason: lexical_alternative
  - marker: b
    text: Or “there is no one who can withstand you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as “LORD” per the project's default for the divine name YHWH, following established reverential convention and matching the doctrine table.
- source_word: אֱלֹהֵי אֲבֹתֵינוּ
  chosen: God of our fathers
  alternatives:
  - God of our ancestors
  lexicon: HALOT
  rationale: The construct phrase is straightforwardly relational and covenantal. “Fathers” preserves the masculine plural in the Hebrew and the traditional covenantal expression; “ancestors” is possible but less gender-accurate to the source.
- source_word: הֲלֹא
  chosen: are you not
  alternatives:
  - is it not that you are
  - surely you are
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting affirmation. “Are you not” preserves the interrogative force naturally in English.
- source_word: אַתָּה הוּא אֱלֹהִים בַּשָּׁמַיִם
  chosen: you not God in heaven
  alternatives:
  - you the God in heaven
  - you God who is in heaven
  lexicon: HALOT
  rationale: The clause identifies the LORD as God in the heavenly realm. “God in heaven” is concise and idiomatic; the article is not required in English.
- source_word: מוֹשֵׁל
  chosen: rule
  alternatives:
  - govern
  - have dominion
  lexicon: HALOT
  rationale: The participle denotes ongoing sovereign rule. “Rule” is the clearest modern English equivalent and fits the prayer's affirmation of divine kingship.
- source_word: מַמְלְכוֹת הַגּוֹיִם
  chosen: the kingdoms of the nations
  alternatives:
  - the kingdoms of the peoples
  - all the national kingdoms
  lexicon: HALOT
  rationale: מַמְלְכוֹת is “kingdoms,” and הַגּוֹיִם here refers to the nations/peoples outside Judah. “The nations” is the standard and natural rendering.
- source_word: וּבְיָדְךָ
  chosen: In your hand
  alternatives:
  - By your hand
  - In your power
  lexicon: HALOT
  rationale: The idiom locates effective power in God's hand. “In your hand” preserves the Hebrew image rather than flattening it into abstraction.
- source_word: כֹּחַ וּגְבוּרָה
  chosen: power and might
  alternatives:
  - strength and might
  - power and strength
  lexicon: HALOT
  rationale: The pair expresses capacity and victorious force. “Power and might” is idiomatic and preserves the rhetorical weight of the collocation.
- source_word: וְאֵין עִמְּךָ לְהִתְיַצֵּב
  chosen: there is none who can stand against you
  alternatives:
  - no one can withstand you
  - there is none with you to stand
  lexicon: HALOT
  rationale: The infinitive of יצב in this context conveys taking a stand in opposition. “Stand against you” makes the adversative sense explicit and natural in English; “withstand you” is also possible but slightly less transparent for modern readers.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - and he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. English can omit the explicit pronoun because the speaker is clear from context.
