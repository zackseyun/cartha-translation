id: 2CH.20.5
reference: 2 Chronicles 20:5
source:
  edition: WLC
  text: וַ/יַּעֲמֹ֣ד יְהוֹשָׁפָ֗ט בִּ/קְהַ֧ל יְהוּדָ֛ה וִ/ירוּשָׁלִַ֖ם בְּ/בֵ֣ית יְהוָ֑ה לִ/פְנֵ֖י הֶ/חָצֵ֥ר הַ/חֲדָשָֽׁה׃
translation:
  text: And Jehoshaphat stood in the assembly of Judah and Jerusalem, in the house of Yahweh, before the new court.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the new courtyard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - took his stand
  - stood up
  lexicon: HALOT
  rationale: The waw-consecutive with עמד narrates a simple past action. 'Stood' is the most natural concise English rendering; 'took his stand' is possible but slightly more interpretive.
- source_word: בִּקְהַל
  chosen: in the assembly of
  alternatives:
  - in the congregation of
  - before the assembly of
  lexicon: HALOT
  rationale: קהל denotes an assembled gathering. 'Assembly' is clear modern English and fits the public setting. The preposition ב is rendered 'in' straightforwardly.
- source_word: יְהוּדָה וִירוּשָׁלַם
  chosen: Judah and Jerusalem
  rationale: These are place/population designations identifying the gathered community. The coordinate phrase is preserved directly without expansion.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת with YHWH literally means 'house of the LORD.' While 'temple' is contextually accurate, the more literal phrase preserves the Hebrew idiom and remains natural in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  lexicon: HALOT
  rationale: לִפְנֵי commonly marks spatial position here. 'Before' is idiomatic and suitably formal for the setting.
- source_word: הֶחָצֵר הַחֲדָשָׁה
  chosen: the new court
  alternatives:
  - the new courtyard
  lexicon: HALOT
  rationale: חָצֵר refers to a court/courtyard area of the temple complex. 'Court' is concise and traditional in temple contexts; 'courtyard' is a viable modern alternative. The adjective 'new' is retained directly.
