id: 2CH.20.37
reference: 2 Chronicles 20:37
source:
  edition: WLC
  text: וַ/יִּתְנַבֵּ֞א אֱלִיעֶ֤זֶר בֶּן דֹּדָוָ֨הוּ֙ מִ/מָּ֣רֵשָׁ֔ה עַל יְהוֹשָׁפָ֖ט לֵ/אמֹ֑ר כְּ/הִֽתְחַבֶּרְ/ךָ֣ עִם אֲחַזְיָ֗הוּ פָּרַ֤ץ יְהוָה֙ אֶֽת מַעֲשֶׂ֔י/ךָ וַ/יִּשָּׁבְר֣וּ אֳנִיּ֔וֹת וְ/לֹ֥א עָצְר֖וּ לָ/לֶ֥כֶת אֶל תַּרְשִֽׁישׁ־־־־־׃
translation:
  text: Then Eliezer son of Dodavahu, from Mareshah, prophesied against Jehoshaphat, saying, “Because you joined yourself with Ahaziah, Yahweh has broken your works.” So the ships were wrecked and were not able to go to Tarshish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the LORD has shattered your undertaking.” The Hebrew says “your works,” referring here to Jehoshaphat’s shipbuilding enterprise.
    reason: lexical_alternative
  - marker: b
    text: Or “could not go” or “were prevented from going” to Tarshish.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְנַבֵּא
  chosen: prophesied
  alternatives:
  - spoke prophetically
  - declared as a prophet
  lexicon: HALOT
  rationale: The hitpael of נבא here denotes prophetic speech. 'Prophesied' is the natural English equivalent and preserves the formal sense without paraphrase.
- source_word: עַל
  chosen: against
  alternatives:
  - concerning
  - to
  lexicon: HALOT
  rationale: In this context with prophetic speech directed at Jehoshaphat in judgment, עַל is best rendered 'against,' indicating an oracle of rebuke rather than merely speech about him.
- source_word: מִמָּרֵשָׁה
  chosen: from Mareshah
  alternatives:
  - of Mareshah
  lexicon: HALOT
  rationale: The prefixed preposition מִן marks origin or hometown. 'From Mareshah' is straightforward modern English.
- source_word: כְּהִתְחַבֶּרְךָ
  chosen: Because you joined yourself with
  alternatives:
  - when you allied yourself with
  - because you associated yourself with
  lexicon: HALOT
  rationale: The hitpael of חבר conveys joining or allying oneself with another. 'Joined yourself with' preserves the reflexive nuance and avoids over-specifying a formal treaty, though alliance is implied by context.
- source_word: פָּרַץ
  chosen: has broken
  alternatives:
  - has burst against
  - has shattered
  - has broken through against
  lexicon: HALOT
  rationale: פרץ often conveys breaking out or breaking through, but with 'your works' as object it idiomatically means to break down, frustrate, or ruin what was undertaken. 'Has broken' is concise and leaves the object to define the sense.
- source_word: מַעֲשֶׂיךָ
  chosen: your works
  alternatives:
  - your work
  - what you have made
  - your undertaking
  lexicon: HALOT
  rationale: The plural noun literally means 'your works/deeds.' In context it refers specifically to Jehoshaphat's enterprise of shipbuilding. 'Your works' keeps the lexical form while allowing the following clause to specify the practical referent.
- source_word: וַיִּשָּׁבְרוּ אֳנִיּוֹת
  chosen: So the ships were wrecked
  alternatives:
  - and the ships were broken
  - and the ships were shattered
  lexicon: HALOT
  rationale: The niphal/waw form indicates the ships came to be broken. 'Were wrecked' is idiomatic English for ships and accurately conveys the result without unnecessary stiffness.
- source_word: וְלֹא עָצְרוּ לָלֶכֶת
  chosen: and were not able to go
  alternatives:
  - and did not retain strength to go
  - and could not go
  - and were prevented from going
  lexicon: HALOT
  rationale: עצר in this construction conveys being restrained or unable. Since the subject is the ships, idiomatic English is 'were not able to go,' expressing the practical consequence of their wrecking.
- source_word: תַּרְשִׁישׁ
  chosen: Tarshish
  lexicon: HALOT
  rationale: A place name, so it is transliterated according to the translation philosophy.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
