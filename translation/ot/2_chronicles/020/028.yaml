id: 2CH.20.28
reference: 2 Chronicles 20:28
source:
  edition: WLC
  text: וַ/יָּבֹ֨אוּ֙ יְר֣וּשָׁלִַ֔ם בִּ/נְבָלִ֥ים וּ/בְ/כִנֹּר֖וֹת וּ/בַ/חֲצֹצְר֑וֹת אֶל בֵּ֖ית יְהוָֽה־׃
translation:
  text: And they came to Jerusalem with harps and lyres and trumpets, to the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with harps/lutes'; the exact form of the ancient instrument denoted by נְבָלִים is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the temple of the LORD'; literally, 'to the house of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: And they came
  alternatives:
  - And they entered
  - And they arrived
  lexicon: HALOT
  rationale: The waw-consecutive with בוא narrates the next event in sequence. 'Came' is the most natural English narrative rendering here; 'entered' is possible but too specific, and 'arrived' is slightly flatter than the Hebrew movement verb.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard transliteration of the place name, following the translation philosophy of transliterating names.
- source_word: בִּנְבָלִים
  chosen: with harps
  alternatives:
  - with harps/lutes
  - with stringed instruments
  lexicon: HALOT
  rationale: נבל commonly denotes a harp-like or lute-like stringed instrument. 'Harps' is a conventional and readable rendering in this musical list. Because the exact ancient instrument is not fully recoverable, alternatives are preserved in a footnote.
- source_word: וּבְכִנֹּרוֹת
  chosen: and lyres
  alternatives:
  - and harps
  lexicon: HALOT
  rationale: כִּנּוֹר is typically rendered 'lyre.' Rendering it distinctly from נבל avoids collapsing two different Hebrew instrument terms into one English term.
- source_word: וּבַחֲצֹצְרוֹת
  chosen: and trumpets
  alternatives:
  - and silver trumpets
  lexicon: HALOT
  rationale: חֲצֹצְרָה denotes a trumpet, often the straight ceremonial trumpet associated with worship. 'Trumpets' is accurate and sufficiently clear in context; 'silver' is not explicit in this verse and so is not added to the main text.
- source_word: אֶל בֵּית יְהוָה
  chosen: to the house of the LORD
  alternatives:
  - to the temple of the LORD
  lexicon: HALOT
  rationale: בֵּית יְהוָה is literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew expression while remaining natural English. Per doctrine, יְהוָה is rendered 'the LORD.' 'Temple' is interpretive and therefore kept as an alternative rather than the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
