theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God directly. Following the project's
    doctrinal and stylistic policy, the Tetragrammaton is rendered 'the LORD' rather
    than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered collective expression כָּל אִישׁ
  chosen_reading: every man
  alternative_readings:
  - all the men
  - everyone
  rationale: The Hebrew uses a masculine singular noun distributively for the group.
    Per the project's gender-accurate policy, the masculine form is retained rather
    than flattened into a gender-neutral expression, while the collective sense remains
    clear from context.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
revisions:
- timestamp: '2026-04-21T17:40:10Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/weighted_vocab/ot/2_chronicles/020/027.job-11141.json
  category: awkward_english
  tier: 1
  from: returned to go back
  to: turned back to return
  rationale: The Hebrew text uses the root שׁוּב twice for emphasis (וַיָּשֻׁבוּ...
    לָשׁוּב), signifying 'they returned in order to return.' The draft's 'returned
    to go back' is a valid attempt to avoid the English awkwardness of 'returned to
    return,' but it is itself somewhat pleonastic and clunky. Using 'turned back to
    return' better captures the two distinct verbal ideas (the initial action of turning
    from the battlefield and the purpose of returning home) while still reflecting
    the repeated Hebrew root and sounding more natural in English.
