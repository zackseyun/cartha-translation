id: 2CH.20.17
reference: 2 Chronicles 20:17
source:
  edition: WLC
  text: לֹ֥א לָ/כֶ֖ם לְ/הִלָּחֵ֣ם בָּ/זֹ֑את הִתְיַצְּב֣וּ עִמְד֡וּ וּ/רְא֣וּ אֶת יְשׁוּעַת֩ יְהוָ֨ה עִמָּ/כֶ֜ם יְהוּדָ֣ה וִֽ/ירוּשָׁלִַ֗ם אַל תִּֽירְאוּ֙ וְ/אַל תֵּחַ֔תּוּ מָחָר֙ צְא֣וּ לִ/פְנֵי/הֶ֔ם וַ/יהוָ֖ה עִמָּ/כֶֽם־־־׃
translation:
  text: You will not need to fight in this battle. Take your positions, stand still, and see the salvation of Yahweh with you, O Judah and Jerusalem. Do not fear or be dismayed. Tomorrow go out before them, and Yahweh is with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the deliverance of the LORD.' The Hebrew term can refer to rescue in battle as well as salvation more broadly.
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD will be with you.' The Hebrew clause has no explicit verb, and English may express the assurance as present or future.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא לָכֶם לְהִלָּחֵם בָּזֹאת
  chosen: You will not need to fight in this battle
  alternatives:
  - It is not for you to fight in this battle
  - You are not to fight in this battle
  lexicon: HALOT
  rationale: The Hebrew literally says 'not for you to fight in this,' but in context this idiom communicates that Judah will not be required to engage in combat. 'Need to fight' preserves the sense in natural English without over-paraphrasing.
- source_word: הִתְיַצְּבוּ
  chosen: Take your positions
  alternatives:
  - Station yourselves
  - Present yourselves
  lexicon: HALOT
  rationale: The hitpael imperative of יצב calls for positioning oneself firmly. 'Take your positions' is idiomatic and fits the military setting.
- source_word: עִמְדוּ
  chosen: stand still
  alternatives:
  - stand
  - remain standing
  lexicon: HALOT
  rationale: Following 'take your positions,' this second imperative heightens the call to remain fixed and watch. 'Stand still' captures the rhetorical force better than a bare 'stand.'
- source_word: וּרְאוּ אֶת יְשׁוּעַת יְהוָה
  chosen: and see the salvation of the LORD
  alternatives:
  - and see the deliverance of the LORD
  - and see the victory of the LORD
  lexicon: HALOT
  rationale: יְשׁוּעָה can denote salvation or deliverance. 'Salvation' preserves the broader theological resonance while still fitting the immediate military rescue context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עִמָּכֶם
  chosen: with you
  alternatives:
  - for you
  - among you
  lexicon: HALOT
  rationale: The preposition עם here expresses divine presence and support. 'With you' is the most direct and contextually appropriate rendering in both occurrences.
- source_word: יְהוּדָה וִירוּשָׁלִַם
  chosen: O Judah and Jerusalem
  alternatives:
  - Judah and Jerusalem
  lexicon: HALOT
  rationale: These vocatives directly address the people. Adding 'O' marks the vocative force in readable English.
- source_word: אַל תִּירְאוּ
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: A standard prohibition from ירא. 'Do not fear' is concise and preserves the elevated tone.
- source_word: וְאַל תֵּחַתּוּ
  chosen: and do not be dismayed
  alternatives:
  - and do not be shattered
  - and do not lose heart
  lexicon: HALOT
  rationale: חתת in the niphal/jussive context conveys being broken down or dismayed. 'Be dismayed' is the established and accurate English equivalent.
- source_word: מָחָר צְאוּ לִפְנֵיהֶם
  chosen: Tomorrow go out before them
  alternatives:
  - Tomorrow go out against them
  - Tomorrow march out before them
  lexicon: HALOT
  rationale: לִפְנֵי can mean 'before/in front of' and in military context often implies facing the enemy. 'Before them' stays close to the Hebrew while still making sense in context.
- source_word: וַיהוָה עִמָּכֶם
  chosen: and the LORD is with you
  alternatives:
  - and the LORD will be with you
  lexicon: HALOT
  rationale: The clause is verbless in Hebrew. English may render it as present or future. The present 'is with you' preserves the assurance of ongoing divine presence; the future nuance is worth preserving in a footnote because the context points toward the coming battle.
