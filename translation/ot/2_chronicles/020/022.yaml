id: 2CH.20.22
reference: 2 Chronicles 20:22
source:
  edition: WLC
  text: וּ/בְ/עֵת֩ הֵחֵ֨לּוּ בְ/רִנָּ֜ה וּ/תְהִלָּ֗ה נָתַ֣ן יְהוָ֣ה מְ֠אָֽרְבִים עַל בְּנֵ֨י עַמּ֜וֹן מוֹאָ֧ב וְ/הַר שֵׂעִ֛יר הַ/בָּאִ֥ים לִֽ/יהוּדָ֖ה וַ/יִּנָּגֵֽפוּ׀־־׃
translation:
  text: And at the time they began with singing and praise, Yahweh set ambushes against the Ammonites, Moab, and Mount Seir, who were coming against Judah, and they were struck down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD set ambushers' / 'men in ambush.' The Hebrew participle can denote persons lying in ambush as well as the ambush action more generally.
    reason: lexical_alternative
  - marker: b
    text: Or 'who were coming to Judah.' In context the movement is hostile, so 'against Judah' is used in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְעֵת
  chosen: And at the time
  alternatives:
  - And when
  - At the moment
  lexicon: HALOT
  rationale: Temporal phrase marking the point at which the following action occurred. 'And at the time' preserves the conjunction and temporal nuance without sounding overly wooden.
- source_word: הֵחֵלּוּ
  chosen: they began
  alternatives:
  - they started
  lexicon: HALOT
  rationale: Hiphil perfect/pluperfect-like narrative use from חלל/החל 'to begin.' 'They began' is the standard and clear rendering.
- source_word: בְרִנָּה וּתְהִלָּה
  chosen: with singing and praise
  alternatives:
  - with joyful shouting and praise
  - with song and praise
  lexicon: HALOT
  rationale: רִנָּה can denote ringing cry, joyful song, or shout; in this worship context 'singing' fits naturally with תְהִלָּה 'praise.' 'With' reflects the beth preposition instrumentally/circumstantially.
- source_word: נָתַן יְהוָה
  chosen: the LORD set
  alternatives:
  - the LORD placed
  - the LORD appointed
  lexicon: HALOT
  rationale: The idiom 'gave/set ambushes' is best rendered in idiomatic English as 'set ambushes.' YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine table for the divine name.
- source_word: מְאָרְבִים
  chosen: ambushes
  alternatives:
  - ambushers
  - men in ambush
  lexicon: HALOT
  rationale: The participial form can be understood as 'those lying in ambush,' but in this idiom and context English commonly uses the abstract/concrete collective 'ambushes.' This avoids over-specifying whether human agents or divinely caused hidden attacks are meant.
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  lexicon: HALOT
  rationale: In military context, עַל after hostile action is naturally 'against.'
- source_word: בְּנֵי עַמּוֹן מוֹאָב וְהַר שֵׂעִיר
  chosen: the Ammonites, Moab, and Mount Seir
  alternatives:
  - the sons of Ammon, Moab, and Mount Seir
  lexicon: HALOT
  rationale: '''Ammonites'' is the natural English equivalent of ''sons of Ammon.'' ''Moab'' and ''Mount Seir'' are retained as place/people designations as in the Hebrew listing.'
- source_word: הַבָּאִים לִיהוּדָה
  chosen: who were coming against Judah
  alternatives:
  - who were coming to Judah
  - who had come against Judah
  lexicon: HALOT
  rationale: Though ל can be directional 'to,' in invasion context English 'against Judah' makes the hostile sense explicit and matches the military setting.
- source_word: וַיִּנָּגֵפוּ
  chosen: and they were struck down
  alternatives:
  - and they were defeated
  - and they were smitten
  lexicon: HALOT
  rationale: Niphal of נגף conveys being struck/plagued/defeated. 'Struck down' preserves the passive and the force of sudden divine judgment better than the flatter 'defeated.'
