id: 2CH.20.4
reference: 2 Chronicles 20:4
source:
  edition: WLC
  text: וַ/יִּקָּבְצ֣וּ יְהוּדָ֔ה לְ/בַקֵּ֖שׁ מֵֽ/יְהוָ֑ה גַּ֚ם מִ/כָּל עָרֵ֣י יְהוּדָ֔ה בָּ֖אוּ לְ/בַקֵּ֥שׁ אֶת יְהוָֽה־־׃
translation:
  text: And Judah gathered together to seek Yahweh; they even came from all the cities of Judah to seek Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'to seek from the LORD.' The sense in context is to seek help or deliverance from him.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''to seek the LORD.'' The verse uses a slightly different construction in the second clause than in the first.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּבְצוּ
  chosen: gathered together
  alternatives:
  - assembled
  - gathered
  lexicon: HALOT
  rationale: The Niphal wayyiqtol of קבץ denotes being gathered/assembling. 'Gathered together' preserves the collective, deliberate sense and reads naturally in English.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Here the proper noun refers to the people/kingdom of Judah collectively, not merely the tribal ancestor. English convention keeps 'Judah' as the corporate subject.
- source_word: לְבַקֵּשׁ מֵיְהוָה
  chosen: to seek help from the LORD
  alternatives:
  - to seek from the LORD
  - to seek the LORD's help
  lexicon: HALOT
  rationale: בקש means 'seek,' and with מן + YHWH here the object sought is implicit from God, likely aid/deliverance in context. 'Seek help from the LORD' makes the Hebrew construction idiomatic without over-paraphrasing.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: גַּם
  chosen: even
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: גם adds emphasis to the second clause. 'Even' captures the sense that people came not only generally, but from all Judah's cities.
- source_word: מִכָּל עָרֵי יְהוּדָה
  chosen: from all the cities of Judah
  alternatives:
  - out of every city of Judah
  - from all Judah's cities
  lexicon: HALOT
  rationale: This phrase stresses the breadth of participation across the kingdom. 'From all the cities of Judah' is clear and close to the Hebrew.
- source_word: בָּאוּ
  chosen: they came
  alternatives:
  - they arrived
  lexicon: HALOT
  rationale: Simple narrative verb of motion; 'came' is the standard rendering.
- source_word: לְבַקֵּשׁ אֶת יְהוָה
  chosen: to seek the LORD
  alternatives:
  - to inquire of the LORD
  - to seek after the LORD
  lexicon: HALOT
  rationale: With את marking the direct object, the phrase is more personal/direct than the earlier 'seek help from the LORD.' Rendering it 'to seek the LORD' preserves the Hebrew variation between the two clauses.
