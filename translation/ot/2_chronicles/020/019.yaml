id: 2CH.20.19
reference: 2 Chronicles 20:19
source:
  edition: WLC
  text: וַ/יָּקֻ֧מוּ הַ/לְוִיִּ֛ם מִן בְּנֵ֥י הַ/קְּהָתִ֖ים וּ/מִן בְּנֵ֣י הַ/קָּרְחִ֑ים לְ/הַלֵּ֗ל לַ/יהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל בְּ/ק֥וֹל גָּד֖וֹל לְ/מָֽעְלָ/ה־־׃
translation:
  text: Then the Levites, from the sons of the Kohathites and from the sons of the Korahites, stood up to praise Yahweh, the God of Israel, with a very loud voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''with a loud voice exceedingly''—the Hebrew idiom intensifies the volume of their praise.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  chosen: stood up
  alternatives:
  - arose
  - got up
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום, narrating a concrete action of rising/standing. 'Stood up' is natural English and preserves the physical, public action better than the more literary 'arose'.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/cultic group; definite article retained.
- source_word: מִן בְּנֵי הַקְּהָתִים
  chosen: from the sons of the Kohathites
  alternatives:
  - from the Kohathites
  - from among the descendants of Kohath
  lexicon: HALOT
  rationale: Literally 'from the sons of the Kohathites/Kohath.' Rendering 'sons of' preserves the Hebrew kinship expression while remaining understandable. 'Kohathites' is the conventional English form for the clan descended from Kohath.
- source_word: וּמִן בְּנֵי הַקָּרְחִים
  chosen: and from the sons of the Korahites
  alternatives:
  - and from the Korahites
  - and from among the descendants of Korah
  lexicon: HALOT
  rationale: Parallel to the previous phrase. 'Korahites' is the standard clan designation; retaining 'sons of' reflects the Hebrew construction.
- source_word: לְהַלֵּל
  chosen: to praise
  alternatives:
  - to give praise
  - to sing praise
  lexicon: HALOT
  rationale: הלל in this infinitive expresses purpose. 'To praise' is the broad, direct equivalent. 'Sing praise' would over-specify, since the verse emphasizes loud vocal praise but does not explicitly use a verb for singing.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יהוה is 'the LORD.' The preposition is absorbed naturally into English syntax after 'praise'.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct phrase rendered straightforwardly; appositional to 'the LORD'.
- source_word: בְּקוֹל גָּדוֹל
  chosen: with a very loud voice
  alternatives:
  - with a loud voice
  - in a loud voice
  lexicon: HALOT
  rationale: The phrase denotes manner/volume. Because גָּדוֹל is intensified by the following לְמָעְלָה, 'very loud' best captures the heightened force in idiomatic English.
- source_word: לְמָעְלָה
  chosen: very
  alternatives:
  - exceedingly
  - on high
  - upward
  lexicon: HALOT
  rationale: Here the adverb functions idiomatically as an intensifier of the preceding phrase, not spatially. Rendering it as 'very' communicates the superlative force in natural English. A more literal 'upward' would be obscure in context.
