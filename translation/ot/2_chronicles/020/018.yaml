id: 2CH.20.18
reference: 2 Chronicles 20:18
source:
  edition: WLC
  text: וַ/יִּקֹּ֧ד יְהוֹשָׁפָ֛ט אַפַּ֖יִם אָ֑רְצָ/ה וְ/כָל יְהוּדָ֞ה וְ/יֹשְׁבֵ֣י יְרוּשָׁלִַ֗ם נָֽפְלוּ֙ לִ/פְנֵ֣י יְהוָ֔ה לְ/הִֽשְׁתַּחֲוֺ֖ת לַ/יהוָֽה־׃
translation:
  text: Then Jehoshaphat bowed with his face to the ground, and all Judah and the inhabitants of Jerusalem fell down before Yahweh to worship Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fell before the LORD to bow down to the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקֹּד
  chosen: bowed
  alternatives:
  - knelt
  - bent low
  lexicon: HALOT
  rationale: קָדַד denotes bowing or bending low in reverence. 'Bowed' fits the immediate gesture and reads naturally in English without over-specifying kneeling.
- source_word: אַפַּיִם אָרְצָה
  chosen: with his face to the ground
  alternatives:
  - with his nostrils to the ground
  - to the earth
  lexicon: HALOT
  rationale: The idiom literally uses 'face/nostrils' plus 'earthward' to express full prostration. 'With his face to the ground' communicates the idiomatic sense clearly in modern English.
- source_word: וְכָל יְהוּדָה
  chosen: all Judah
  alternatives:
  - all the people of Judah
  lexicon: HALOT
  rationale: The proper name can stand metonymically for the people of the kingdom/tribe. 'All Judah' is concise and idiomatic while preserving the collective force.
- source_word: וְיֹשְׁבֵי יְרוּשָׁלַם
  chosen: the inhabitants of Jerusalem
  alternatives:
  - those dwelling in Jerusalem
  - the residents of Jerusalem
  lexicon: HALOT
  rationale: The participial form means those who dwell/live there. 'Inhabitants' is a standard, natural rendering.
- source_word: נָפְלוּ לִפְנֵי יְהוָה
  chosen: fell down before the LORD
  alternatives:
  - fell before the LORD
  - prostrated themselves before the LORD
  lexicon: HALOT
  rationale: נפל 'fell' in worship contexts can imply prostration. 'Fell down before' preserves the concrete action while allowing the following infinitive 'to worship' to express purpose.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְהִשְׁתַּחֲוֺת
  chosen: to worship
  alternatives:
  - to bow down
  - to prostrate themselves
  lexicon: HALOT
  rationale: The hitpael of שׁחה often denotes bowing oneself in worship. Since the physical act has already been described, 'to worship' best captures the purpose/result here without redundancy.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - to the LORD
  lexicon: HALOT
  rationale: 'Rendered as the object of worship in smooth English: ''to worship the LORD.'' This preserves the repeated divine name in the Hebrew rather than replacing it with a pronoun.'
