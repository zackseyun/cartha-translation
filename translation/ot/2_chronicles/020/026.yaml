id: 2CH.20.26
reference: 2 Chronicles 20:26
source:
  edition: WLC
  text: וּ/בַ/יּ֣וֹם הָ/רְבִעִ֗י נִקְהֲלוּ֙ לְ/עֵ֣מֶק בְּרָכָ֔ה כִּי שָׁ֖ם בֵּרֲכ֣וּ אֶת יְהוָ֑ה עַל כֵּ֡ן קָֽרְא֞וּ אֶת שֵׁ֨ם הַ/מָּק֥וֹם הַ/ה֛וּא עֵ֥מֶק בְּרָכָ֖ה עַד הַ/יּֽוֹם־־־־־׃
translation:
  text: On the fourth day they assembled in the Valley of Beracah, because there they blessed Yahweh. Therefore they called the name of that place the Valley of Beracah to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beracah means “blessing.”
    reason: lexical_alternative
lexical_decisions:
- source_word: נִקְהֲלוּ
  chosen: they assembled
  alternatives:
  - they gathered themselves
  - they were assembled
  lexicon: HALOT
  rationale: The Niphal form of קהל here is best rendered with an intransitive/reflexive sense, indicating that the people came together. 'Assembled' is natural English and preserves the formal sense better than a looser 'met.'
- source_word: עֵמֶק
  chosen: Valley
  alternatives:
  - vale
  lexicon: HALOT
  rationale: The noun denotes a valley. 'Valley' is standard modern English and suits the place-name construction that follows.
- source_word: בְּרָכָה
  chosen: Beracah
  alternatives:
  - Blessing
  lexicon: HALOT
  rationale: As part of the place name עֵמֶק בְּרָכָה, the term is transliterated in keeping with the philosophy 'translate titles; transliterate names.' The underlying meaning 'blessing' is important to the wordplay and is reflected by the explanatory clause 'there they blessed the LORD.'
- source_word: כִּי שָׁם בֵּרֲכוּ אֶת יְהוָה
  chosen: because there they blessed the LORD
  alternatives:
  - for there they blessed the LORD
  lexicon: HALOT
  rationale: כִּי here gives the reason for the place name. 'Because' communicates the causal force clearly in modern English. בֵּרֲכוּ is rendered 'blessed,' preserving the lexical connection with בְּרָכָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: קָרְאוּ אֶת שֵׁם הַמָּקוֹם הַהוּא
  chosen: they called the name of that place
  alternatives:
  - they named that place
  - they called that place
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'called the name of that place.' This is retained in slightly smoothed English to preserve the naming formula without becoming wooden.
- source_word: עַד הַיּוֹם
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom indicating the enduring name up to the writer's present. 'To this day' is the most idiomatic English equivalent.
