id: 2CH.20.13
reference: 2 Chronicles 20:13
source:
  edition: WLC
  text: וְ/כָ֨ל יְהוּדָ֔ה עֹמְדִ֖ים לִ/פְנֵ֣י יְהוָ֑ה גַּם טַפָּ֖/ם נְשֵׁי/הֶ֥ם וּ/בְנֵי/הֶֽם־־׃פ
translation:
  text: And all Judah was standing before Yahweh, even their little ones, their wives, and their children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their sons.' The Hebrew term can specifically mean 'sons' or more broadly 'children,' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  chosen: And all
  alternatives:
  - Now all
  - All
  lexicon: HALOT
  rationale: וְ joins this verse to the preceding narrative, and כָל marks the totality of the group. 'And all' preserves both the connective and the comprehensive sense.
- source_word: יְהוּדָה
  chosen: Judah
  alternatives:
  - the people of Judah
  lexicon: HALOT
  rationale: The proper name refers collectively to the people of Judah here. 'Judah' is concise and natural, while still allowing the collective sense to be carried by the verb and context.
- source_word: עֹמְדִים
  chosen: was standing
  alternatives:
  - stood
  - were standing
  lexicon: HALOT
  rationale: The participle conveys an ongoing posture or state. Because יְהוּדָה is a collective singular in English, 'was standing' reads smoothly while preserving the durative sense better than the simple past 'stood.' 'Were standing' would emphasize the people individually, but the subject is grammatically singular/collective.
- source_word: לִ/פְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: The phrase means being in someone's presence. 'Before' is the standard concise rendering and fits the solemn setting.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: גַּם
  chosen: even
  alternatives:
  - also
  lexicon: HALOT
  rationale: גַּם adds emphasis to the inclusion of those who follow. 'Even' highlights the striking comprehensiveness of the assembly.
- source_word: טַפָּם
  chosen: their little ones
  alternatives:
  - their infants
  - their small children
  lexicon: HALOT
  rationale: טַף refers to dependent little children, often the youngest members of a household. 'Little ones' is idiomatic and broad enough to include infants and toddlers without overstating precision.
- source_word: נְשֵׁיהֶם
  chosen: their wives
  alternatives:
  - their women
  lexicon: HALOT
  rationale: In this household listing, the possessive construction naturally refers to spouses. 'Their wives' is the most contextually accurate rendering.
- source_word: וּ/בְנֵיהֶם
  chosen: and their children
  alternatives:
  - and their sons
  lexicon: HALOT
  rationale: Although בנים can mean 'sons,' it also commonly functions generically for children/offspring in family lists. Since 'little ones' has already specified the youngest, 'children' here best captures the broader household inclusion without implying only males.
