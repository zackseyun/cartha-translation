id: 2CH.20.3
reference: 2 Chronicles 20:3
source:
  edition: WLC
  text: וַ/יִּרָ֕א וַ/יִּתֵּ֧ן יְהוֹשָׁפָ֛ט אֶת פָּנָ֖י/ו לִ/דְר֣וֹשׁ לַ/יהוָ֑ה וַ/יִּקְרָא צ֖וֹם עַל כָּל יְהוּדָֽה־־־־׃
translation:
  text: And Jehoshaphat was afraid, and set his face to seek Yahweh, and proclaimed a fast throughout all Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'became afraid.' The Hebrew verb can mark the onset of fear in the narrative sequence.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'set his face,' an idiom expressing firm resolve or deliberate intention.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרָא
  chosen: was afraid
  alternatives:
  - feared
  - became afraid
  lexicon: HALOT
  rationale: From ירא, denoting fear. 'Was afraid' is natural modern English and preserves the straightforward emotional response without softening it into mere reverence. 'Became afraid' is possible from the wayyiqtol sequence, but English narrative style is smoother with 'was afraid.'
- source_word: וַיִּתֵּן ... אֶת־פָּנָיו
  chosen: set his face
  alternatives:
  - set himself
  - resolved
  lexicon: HALOT
  rationale: The idiom literally means to set one's face toward a purpose. 'Set his face' preserves the Hebrew imagery and determination better than the more interpretive 'resolved' or the flatter 'set himself.'
- source_word: לִדְרוֹשׁ
  chosen: to seek
  alternatives:
  - to inquire of
  - to consult
  lexicon: HALOT
  rationale: דרש with God commonly means to seek him, often with the sense of turning to him for help or guidance. 'Seek' is the broadest and most idiomatic rendering here; 'inquire of' is too narrow for the context of prayerful dependence.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated, following established covenant-name convention while preserving reverence tradition.
- source_word: וַיִּקְרָא צוֹם
  chosen: proclaimed a fast
  alternatives:
  - called a fast
  - declared a fast
  lexicon: HALOT
  rationale: The collocation means to publicly announce or summon a fast. 'Proclaimed a fast' best captures the formal royal/public nature of the action.
- source_word: עַל כָּל יְהוּדָה
  chosen: throughout all Judah
  alternatives:
  - in all Judah
  - for all Judah
  lexicon: HALOT
  rationale: With a proclamation, עַל can indicate scope extending over the whole territory or people. 'Throughout all Judah' communicates the breadth of the proclamation in natural English.
