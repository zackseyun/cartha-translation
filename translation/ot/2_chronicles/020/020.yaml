id: 2CH.20.20
reference: 2 Chronicles 20:20
source:
  edition: WLC
  text: וַ/יַּשְׁכִּ֣ימוּ בַ/בֹּ֔קֶר וַ/יֵּצְא֖וּ לְ/מִדְבַּ֣ר תְּק֑וֹעַ וּ/בְ/צֵאתָ֞/ם עָמַ֣ד יְהוֹשָׁפָ֗ט וַ/יֹּ֨אמֶר֙ שְׁמָע֗וּ/נִי יְהוּדָה֙ וְ/יֹשְׁבֵ֣י יְרוּשָׁלִַ֔ם הַאֲמִ֜ינוּ בַּ/יהוָ֤ה אֱלֹהֵי/כֶם֙ וְ/תֵ֣אָמֵ֔נוּ הַאֲמִ֥ינוּ בִ/נְבִיאָ֖י/ו וְ/הַצְלִֽיחוּ׃
translation:
  text: 'They rose early in the morning and went out to the wilderness of Tekoa. As they were going out, Jehoshaphat stood and said, “Listen to me, Judah and inhabitants of Jerusalem: believe in Yahweh your God, and you will be established; believe in his prophets, and you will succeed.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''trust in the LORD your God, and you will stand firm.'' The Hebrew uses a wordplay on אמן: ''believe'' ... ''be established/stand firm.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'believe his prophets' or 'trust his prophets.' The same Hebrew verb is repeated for rhetorical effect.
    reason: lexical_alternative
  - marker: c
    text: '''the LORD'' renders the divine name YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּשְׁכִּימוּ
  chosen: They rose early
  alternatives:
  - They got up early
  - They started early
  lexicon: HALOT
  rationale: The Hiphil of שׁכם commonly conveys rising early or starting early. 'Rose early' is idiomatic and preserves the narrative force without unnecessary paraphrase.
- source_word: בַבֹּקֶר
  chosen: in the morning
  alternatives:
  - at morning
  - when morning came
  lexicon: HALOT
  rationale: Standard temporal expression; 'in the morning' is natural modern English and keeps the temporal setting explicit.
- source_word: וַיֵּצְאוּ
  chosen: went out
  alternatives:
  - set out
  - went forth
  lexicon: HALOT
  rationale: A straightforward rendering of יצא in narrative movement. 'Went out' preserves the basic verbal sense; 'set out' would be slightly more interpretive.
- source_word: לְמִדְבַּר תְּקוֹעַ
  chosen: to the wilderness of Tekoa
  alternatives:
  - to the desert of Tekoa
  - to the open country of Tekoa
  lexicon: HALOT
  rationale: מִדְבָּר often denotes wilderness or steppe rather than a sand desert specifically. 'Wilderness of Tekoa' is both conventional and geographically appropriate.
- source_word: וּבְצֵאתָם
  chosen: As they were going out
  alternatives:
  - When they went out
  - As they went out
  lexicon: HALOT
  rationale: The preposition plus infinitive construct with suffix gives a temporal clause. 'As they were going out' captures the action in progress at the moment Jehoshaphat speaks.
- source_word: עָמַד
  chosen: stood
  alternatives:
  - took his stand
  lexicon: HALOT
  rationale: Simple narrative verb. 'Stood' is sufficient and avoids over-dramatization.
- source_word: שְׁמָעוּנִי
  chosen: Listen to me
  alternatives:
  - Hear me
  lexicon: HALOT
  rationale: Imperative of שמע with object suffix. 'Listen to me' is more natural contemporary English than 'Hear me' while preserving the direct appeal.
- source_word: יְהוּדָה
  chosen: Judah
  alternatives:
  - people of Judah
  lexicon: HALOT
  rationale: The vocative addresses the polity/people collectively. 'Judah' is concise and faithful; the collective sense is clear from context.
- source_word: וְיֹשְׁבֵי יְרוּשָׁלַם
  chosen: and inhabitants of Jerusalem
  alternatives:
  - and residents of Jerusalem
  - and those living in Jerusalem
  lexicon: HALOT
  rationale: Participle of ישׁב used substantivally. 'Inhabitants' is a natural formal equivalent in public address.
- source_word: הַאֲמִינוּ בַּיהוָה אֱלֹהֵיכֶם
  chosen: believe in the LORD your God
  alternatives:
  - trust in the LORD your God
  - have faith in the LORD your God
  lexicon: HALOT
  rationale: The Hiphil of אמן with ב often means to believe or trust in. 'Believe in' preserves the lexical repetition with the next clause and matches the exhortational structure.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְתֵאָמֵנוּ
  chosen: and you will be established
  alternatives:
  - and you will stand firm
  - and you will be confirmed
  lexicon: HALOT
  rationale: Niphal of אמן here forms a wordplay with the imperative 'believe.' 'Be established' preserves the semantic link of firmness/reliability without collapsing it into mere emotional assurance.
- source_word: הַאֲמִינוּ בִנְבִיאָיו
  chosen: believe in his prophets
  alternatives:
  - trust his prophets
  - believe his prophets
  lexicon: HALOT
  rationale: The same verb אמן is repeated, now with prophets as the object introduced by ב. 'Believe in' keeps the rhetorical repetition visible, though in English it may sound slightly stronger than 'believe'; the footnote preserves that lexical alternative.
- source_word: וְהַצְלִיחוּ
  chosen: and you will succeed
  alternatives:
  - and you will prosper
  - and you will have success
  lexicon: HALOT
  rationale: Hiphil of צלח can denote succeeding or prospering. 'Succeed' fits the immediate military context and avoids implying material prosperity alone.
