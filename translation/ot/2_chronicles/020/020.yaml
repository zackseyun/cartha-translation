theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of אמן in the exhortation
  chosen_reading: believe in the LORD your God ... believe in his prophets
  alternative_readings:
  - trust in the LORD your God ... trust his prophets
  rationale: The verse uses deliberate repetition and wordplay with אמן / תאמנו. 'Believe' preserves the lexical connection more clearly than switching to 'trust,' while the result clause 'you will be established' retains the firmness motif. This does not import a later doctrinal notion of saving faith; it reflects covenantal reliance in context.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 and #5'
