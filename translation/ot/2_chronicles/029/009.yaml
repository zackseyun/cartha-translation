theological_decisions:
- issue: Gendered kinship terms in a judgment context
  chosen_reading: our fathers ... our sons and our daughters and our wives
  alternative_readings:
  - our ancestors ... our children ... our women
  rationale: The Hebrew deliberately lists specific family groups. Following the translation
    philosophy's gender-accurate principle, the rendering preserves these distinctions
    rather than flattening them into neutral collective terms.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
