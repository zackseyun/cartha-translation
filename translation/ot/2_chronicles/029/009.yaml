id: 2CH.29.9
reference: 2 Chronicles 29:9
source:
  edition: WLC
  text: וְ/הִנֵּ֛ה נָפְל֥וּ אֲבוֹתֵ֖י/נוּ בֶּ/חָ֑רֶב וּ/בָנֵ֨י/נוּ וּ/בְנוֹתֵ֧י/נוּ
    וְ/נָשֵׁ֛י/נוּ בַּ/שְּׁבִ֖י עַל זֹֽאת־׃
translation:
  text: And look, our fathers have fallen by the sword, and our sons and our daughters
    and our wives are in captivity because of this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'behold.' The Hebrew discourse marker draws attention emphatically to
      the statement that follows.
    reason: lexical_alternative
  - marker: b
    text: Or 'have been taken captive.' The Hebrew says literally 'in captivity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - See
  lexicon: HALOT
  rationale: Introduces an emphatic, attention-directing statement. 'And look' preserves
    the discourse force in readable modern English better than the more archaic 'behold,'
    while retaining the conjunction.
- source_word: נָפְלוּ
  chosen: have fallen
  alternatives:
  - fell
  - have been struck down
  lexicon: HALOT
  rationale: The verb נפל literally means 'fall.' In this context of battle death,
    'have fallen' preserves the Hebrew idiom and solemn tone without over-interpreting
    beyond the text.
- source_word: אֲבוֹתֵינוּ
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: HALOT
  rationale: The Hebrew specifically says 'our fathers.' In context it refers to the
    preceding generation(s) of Judah, not merely generic forebears. This follows the
    gender-accurate principle rather than neutralizing to 'ancestors.'
- source_word: בֶּחָרֶב
  chosen: by the sword
  alternatives:
  - by sword
  - in battle
  lexicon: HALOT
  rationale: A standard Hebrew idiom for violent death in warfare. 'By the sword'
    is the most natural and sufficiently formal English equivalent.
- source_word: וּבָנֵינוּ
  chosen: our sons
  alternatives:
  - our children
  lexicon: HALOT
  rationale: The Hebrew is specifically male offspring, distinguished from 'our daughters'
    in the next phrase, so 'children' would erase the source distinction.
- source_word: וּבְנוֹתֵינוּ
  chosen: our daughters
  lexicon: HALOT
  rationale: Direct lexical equivalent; preserved distinctly from 'sons' as in the
    Hebrew.
- source_word: וְנָשֵׁינוּ
  chosen: our wives
  alternatives:
  - our women
  lexicon: HALOT
  rationale: In this possessive familial list, 'wives' is the most contextually precise
    rendering for נָשִׁים with first-person plural suffix.
- source_word: בַּשְּׁבִי
  chosen: are in captivity
  alternatives:
  - are in exile
  - are captive
  lexicon: HALOT
  rationale: Refers to being taken captive. 'Are in captivity' is idiomatic English
    and fits the stative sense of the noun with preposition.
- source_word: עַל זֹאת
  chosen: because of this
  alternatives:
  - for this
  - on account of this
  lexicon: HALOT
  rationale: Expresses causation, referring back to Judah's unfaithfulness and the
    resulting judgment in context. 'Because of this' is clear modern English.
