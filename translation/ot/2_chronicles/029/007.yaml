id: 2CH.29.7
reference: 2 Chronicles 29:7
source:
  edition: WLC
  text: גַּ֣ם סָֽגְר֞וּ דַּלְת֣וֹת הָ/אוּלָ֗ם וַ/יְכַבּוּ֙ אֶת הַ/נֵּר֔וֹת וּ/קְטֹ֖רֶת
    לֹ֣א הִקְטִ֑ירוּ וְ/עֹלָה֙ לֹא הֶעֱל֣וּ בַ/קֹּ֔דֶשׁ לֵ/אלֹהֵ֖י יִשְׂרָאֵֽל־־׃
translation:
  text: They also shut the doors of the vestibule, put out the lamps, did not burn
    incense, and did not offer up burnt offerings in the sanctuary to the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the doors of the porch' or 'entry hall'; the Hebrew אוּלָם refers to
      the temple's entrance hall.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the holy place'; the Hebrew term can denote the sacred area of the
      temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: HALOT
  rationale: Adds this action to the preceding accusations; 'also' is the most natural
    connective in English and preserves the cumulative force.
- source_word: סָגְרוּ
  chosen: shut
  alternatives:
  - closed
  lexicon: HALOT
  rationale: The verb means to shut/close. 'Shut' is slightly more vivid and idiomatic
    with 'doors' in this context.
- source_word: דַּלְתוֹת הָאוּלָם
  chosen: the doors of the vestibule
  alternatives:
  - the doors of the porch
  - the doors of the entry hall
  lexicon: HALOT
  rationale: אוּלָם refers to the temple's entrance hall/vestibule. 'Vestibule' is
    precise architecturally and clearer than the traditional but potentially misleading
    'porch.'
- source_word: וַיְכַבּוּ אֶת הַנֵּרוֹת
  chosen: put out the lamps
  alternatives:
  - extinguished the lamps
  - put out the lights
  lexicon: HALOT
  rationale: The idiom is the extinguishing of cultic lamps. 'Put out the lamps' is
    natural English and preserves the concrete temple imagery better than 'lights.'
- source_word: וּקְטֹרֶת לֹא הִקְטִירוּ
  chosen: did not burn incense
  alternatives:
  - did not offer incense
  - did not make incense smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר with קְטֹרֶת denotes the ritual burning/offering of
    incense. 'Burn incense' is standard, clear, and faithful.
- source_word: וְעֹלָה לֹא הֶעֱלוּ
  chosen: did not offer up burnt offerings
  alternatives:
  - did not offer burnt offerings
  - did not bring up a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the technical term for a burnt offering. The verb עלה in Hiphil
    literally means 'cause to go up,' often used for sacrificial offering; 'offer
    up' preserves some of that nuance while remaining idiomatic.
- source_word: בַקֹּדֶשׁ
  chosen: in the sanctuary
  alternatives:
  - in the holy place
  - in the holy sanctuary
  lexicon: HALOT
  rationale: Here the term refers to the sacred precinct/holy place of temple worship.
    'In the sanctuary' is clear modern English and fits the cultic setting without
    over-specifying beyond the Hebrew.
- source_word: לֵאלֹהֵי יִשְׂרָאֵל
  chosen: to the God of Israel
  alternatives:
  - for the God of Israel
  lexicon: HALOT
  rationale: The lamed marks direction or dedication of worship. 'To the God of Israel'
    best conveys the relational and cultic orientation of the offerings.
