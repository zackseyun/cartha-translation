theological_decisions:
- issue: Temple-cult terminology
  chosen_reading: Retain concrete sacrificial and sanctuary language ('burn incense,'
    'burnt offerings,' 'sanctuary')
  alternative_readings:
  - Use broader worship language such as 'worshiped' or 'made offerings'
  rationale: The verse catalogs specific failures in temple service, not general irreligion.
    Preserving the cultic terms maintains the historical and theological specificity
    of Judah's neglect of ordained worship.
  doctrine_reference: Translation philosophy §§1, 5, 6
