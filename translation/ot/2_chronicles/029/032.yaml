id: 2CH.29.32
reference: 2 Chronicles 29:32
source:
  edition: WLC
  text: וַ/יְהִ֞י מִסְפַּ֣ר הָ/עֹלָה֮ אֲשֶׁ֣ר הֵבִ֣יאוּ הַ/קָּהָל֒ בָּקָ֣ר שִׁבְעִ֔ים
    אֵילִ֥ים מֵאָ֖ה כְּבָשִׂ֣ים מָאתָ֑יִם לְ/עֹלָ֥ה לַ/יהוָ֖ה כָּל אֵֽלֶּה־׃
translation:
  text: And the number of the burnt offerings that the assembly brought was seventy
    cattle, one hundred rams, and two hundred lambs; all these were for a burnt offering
    to the LORD.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מִסְפַּר
  chosen: the number of
  alternatives:
  - the total number of
  lexicon: HALOT
  rationale: Straightforward rendering of the noun meaning 'number' or 'count,' introducing
    the tally that follows.
- source_word: הָעֹלָה
  chosen: the burnt offerings
  alternatives:
  - the burnt offering
  lexicon: HALOT
  rationale: Although morphologically singular with the article, the following list
    gives multiple sacrificial animals and English idiom naturally uses the plural
    collective here. This preserves the sacrificial category denoted by עֹלָה.
- source_word: הֵבִיאוּ
  chosen: brought
  alternatives:
  - presented
  lexicon: HALOT
  rationale: Common sacrificial-context rendering for הביא, indicating that the assembly
    brought these animals for offering.
- source_word: הַקָּהָל
  chosen: the assembly
  alternatives:
  - the congregation
  lexicon: HALOT
  rationale: '''Assembly'' is a clear modern-English rendering for the gathered community,
    avoiding potentially church-specific overtones of ''congregation'' while preserving
    the collective sense.'
- source_word: בָּקָר
  chosen: cattle
  alternatives:
  - oxen
  - herd animals
  lexicon: HALOT
  rationale: A collective term for bovine livestock. 'Cattle' best matches the generic
    Hebrew term here, since the text does not specify sex as 'bulls' would.
- source_word: אֵילִים
  chosen: rams
  lexicon: HALOT
  rationale: Standard rendering for male sheep in sacrificial contexts.
- source_word: כְּבָשִׂים
  chosen: lambs
  alternatives:
  - sheep
  lexicon: HALOT
  rationale: Common sacrificial rendering. 'Lambs' fits the usual cultic sense better
    than the broader 'sheep' in this enumerated offering list.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: Expresses purpose/dedication of the listed animals. Singular in English
    works idiomatically as a category after the plural tally.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'To the LORD' reflects the
    dedicatory direction of the offering.
- source_word: כָּל אֵלֶּה
  chosen: all these
  alternatives:
  - all of these
  lexicon: HALOT
  rationale: Natural rendering of the summarizing phrase closing the inventory.
