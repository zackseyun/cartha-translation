id: 2CH.29.12
reference: 2 Chronicles 29:12
source:
  edition: WLC
  text: וַ/יָּקֻ֣מוּ הַ֠/לְוִיִּם מַ֣חַת בֶּן עֲמָשַׂ֞י וְ/יוֹאֵ֣ל בֶּן עֲזַרְיָהוּ֮
    מִן בְּנֵ֣י הַ/קְּהָתִי֒ וּ/מִן בְּנֵ֣י מְרָרִ֔י קִ֚ישׁ בֶּן עַבְדִּ֔י וַ/עֲזַרְיָ֖הוּ
    בֶּן יְהַלֶּלְאֵ֑ל וּ/מִן הַ/גֵּ֣רְשֻׁנִּ֔י יוֹאָח֙ בֶּן זִמָּ֔ה וְ/עֵ֖דֶן בֶּן
    יוֹאָֽח־־־־־־־־־׃
translation:
  text: 'Then the Levites arose: Mahath son of Amasai and Joel son of Azariah, from
    the sons of the Kohathites; and from the sons of Merari, Kish son of Abdi and
    Azariah son of Jehallelel; and from the Gershonites, Joah son of Zimmah and Eden
    son of Joah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from the sons of the Kohathites ... from the sons of
      Merari.' This genealogical wording identifies the named men as representatives
      of those Levitical clans.
    reason: cultural_note
  - marker: b
    text: Or, 'from the sons of Gershon.' The Hebrew uses a clan designation here
      rather than repeating the exact earlier formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  chosen: arose
  alternatives:
  - stood up
  - rose up
  lexicon: HALOT
  rationale: The wayyiqtol of קום narrates the beginning of action in response to
    the king's command. 'Arose' is concise, natural English and preserves the formal
    sense better than the more colloquial 'got up.'
- source_word: הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - the Levitical men
  lexicon: HALOT
  rationale: Standard rendering for the tribal/clan designation לְוִיִּם. The article
    is retained as 'the Levites.'
- source_word: מִן בְּנֵי הַקְּהָתִי
  chosen: from the sons of the Kohathites
  alternatives:
  - from the Kohathites
  - from among the descendants of Kohath
  lexicon: HALOT
  rationale: Literally 'from the sons of the Kohathite/Kohathites.' 'From the sons
    of' preserves the genealogical idiom and the representative nature of the named
    men.
- source_word: וּמִן בְּנֵי מְרָרִי
  chosen: and from the sons of Merari
  alternatives:
  - and from the Merarites
  - and from among the descendants of Merari
  lexicon: HALOT
  rationale: The Hebrew repeats the genealogical formula. Keeping 'sons of Merari'
    reflects the source structure and links the named men to the Merarite clan.
- source_word: וּמִן הַגֵּרְשֻׁנִּי
  chosen: and from the Gershonites
  alternatives:
  - and from the sons of Gershon
  - and from the Gershonite clan
  lexicon: HALOT
  rationale: Here the Hebrew uses the gentilic singular with article functioning collectively.
    'From the Gershonites' is idiomatic English and matches the clan designation.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In this genealogical list, 'son of' is the normal and transparent rendering.
    There is no contextual pressure to broaden it to 'descendant of.'
- source_word: מַחַת; עֲמָשַׂי; יוֹאֵל; עֲזַרְיָהוּ; קִישׁ; עַבְדִּי; יְהַלֶּלְאֵל;
    יוֹאָח; זִמָּה; עֵדֶן
  chosen: Mahath; Amasai; Joel; Azariah; Kish; Abdi; Jehallelel; Joah; Zimmah; Eden
  lexicon: HALOT
  rationale: Personal names are transliterated rather than translated, following project
    policy. Spellings follow standard English conventions for these Hebrew names.
