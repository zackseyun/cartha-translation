theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering חַטָּאת in cultic context
  chosen_reading: sin offering
  alternative_readings:
  - offering for sin
  rationale: In sacrificial legislation and narrative, חַטָּאת commonly denotes the specific sacrifice rather than abstract sin. 'Sin offering' preserves the established cultic category without importing later doctrinal explanation.
