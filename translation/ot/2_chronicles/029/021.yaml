id: 2CH.29.21
reference: 2 Chronicles 29:21
source:
  edition: WLC
  text: וַ/יָּבִ֣יאוּ פָרִים שִׁבְעָה֩ וְ/אֵילִ֨ים שִׁבְעָ֜ה וּ/כְבָשִׂ֣ים שִׁבְעָ֗ה וּ/צְפִירֵ֨י עִזִּ֤ים שִׁבְעָה֙ לְ/חַטָּ֔את עַל הַ/מַּמְלָכָ֥ה וְ/עַל הַ/מִּקְדָּ֖שׁ וְ/עַל יְהוּדָ֑ה וַ/יֹּ֗אמֶר לִ/בְנֵ֤י אַהֲרֹן֙ הַ/כֹּ֣הֲנִ֔ים לְ/הַעֲל֖וֹת עַל מִזְבַּ֥ח יְהוָֽה־־־־־׃
translation:
  text: They brought seven bulls, seven rams, seven lambs, and seven male goats as a sin offering for the kingdom, for the sanctuary, and for Judah. And he told the sons of Aaron, the priests, to offer them on the altar of Yahweh.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּבִיאוּ
  chosen: They brought
  alternatives:
  - They presented
  lexicon: HALOT
  rationale: The waw-consecutive verb from בוא here narrates the bringing of sacrificial animals. 'Brought' is the plain narrative equivalent; 'presented' is possible in sacrificial context but slightly more interpretive.
- source_word: פָרִים
  chosen: bulls
  alternatives:
  - young bulls
  - oxen
  lexicon: HALOT
  rationale: In sacrificial lists פָרִים refers to bovines suitable for offering. 'Bulls' is the most natural and concise rendering here; 'young bulls' is possible but the Hebrew form itself does not explicitly mark age in this verse.
- source_word: אֵילִים
  chosen: rams
  lexicon: HALOT
  rationale: Standard rendering for male sheep in sacrificial contexts.
- source_word: כְבָשִׂים
  chosen: lambs
  alternatives:
  - male lambs
  - sheep
  lexicon: HALOT
  rationale: Common sacrificial term for lambs. 'Male lambs' could make the sex explicit by context, but 'lambs' is idiomatic and sufficient in English.
- source_word: צְפִירֵי עִזִּים
  chosen: male goats
  alternatives:
  - goats
  - he-goats
  lexicon: HALOT
  rationale: The construct phrase specifically denotes male goats. 'Male goats' is clear modern English; 'he-goats' is accurate but less natural.
- source_word: לְחַטָּאת
  chosen: as a sin offering
  alternatives:
  - for a sin offering
  - as an offering for sin
  lexicon: HALOT
  rationale: חַטָּאת in cultic context denotes the sin offering. 'As a sin offering' communicates sacrificial function clearly in readable English.
- source_word: עַל הַמַּמְלָכָה
  chosen: for the kingdom
  alternatives:
  - on behalf of the kingdom
  - for the royal dominion
  lexicon: HALOT
  rationale: With sacrificial עַל, the sense is representative/on behalf of. 'For the kingdom' is concise and natural, covering the representative force without overloading the English.
- source_word: הַמִּקְדָּשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the temple
  lexicon: HALOT
  rationale: מִקְדָּשׁ refers to the holy sanctuary. 'Sanctuary' preserves the cultic sense better than the broader 'temple' in this context.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard transliteration of the territorial/political entity.
- source_word: לִבְנֵי אַהֲרֹן הַכֹּהֲנִים
  chosen: the sons of Aaron, the priests
  alternatives:
  - Aaron's sons, the priests
  lexicon: HALOT
  rationale: This preserves the familial and priestly designation in apposition. 'Sons of Aaron' is the more literal and biblically recognizable phrasing.
- source_word: לְהַעֲלוֹת
  chosen: to offer them up
  alternatives:
  - to offer
  - to cause to ascend
  lexicon: HALOT
  rationale: עלה in sacrificial usage often carries the sense of offering up on the altar. 'Offer them up' reflects the cultic nuance and anticipates the altar phrase. The object 'them' is implicit from context and natural in English.
- source_word: מִזְבַּח יְהוָה
  chosen: the altar of the LORD
  alternatives:
  - the LORD's altar
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
