id: 2CH.29.3
reference: 2 Chronicles 29:3
source:
  edition: WLC
  text: ה֣וּא בַ/שָּׁנָה֩ הָ/רִאשׁוֹנָ֨ה לְ/מָלְכ֜/וֹ בַּ/חֹ֣דֶשׁ הָ/רִאשׁ֗וֹן פָּתַ֛ח
    אֶת דַּלְת֥וֹת בֵּית יְהוָ֖ה וַֽ/יְחַזְּקֵֽ/ם־־׃
translation:
  text: In the first year of his reign, in the first month, he opened the doors of
    the house of the LORD and repaired them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and strengthened them,' that is, made the doors secure or sound again.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The independent pronoun serves to resume the subject emphatically or
    clearly in narrative. English normally does not require explicit emphasis here,
    so simple 'he' is sufficient and natural.
- source_word: בַשָּׁנָה הָרִאשׁוֹנָה לְמָלְכוֹ
  chosen: in the first year of his reign
  alternatives:
  - in the first year when he reigned
  - in the first year of his kingship
  lexicon: HALOT
  rationale: This temporal construction idiomatically marks the first regnal year.
    'Of his reign' is standard, clear English and reflects the infinitive/verb-based
    Hebrew expression without awkwardness.
- source_word: בַּחֹדֶשׁ הָרִאשׁוֹן
  chosen: in the first month
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'Month' is the plain sense of חֹדֶשׁ
    here.
- source_word: פָּתַח
  chosen: opened
  alternatives:
  - unsealed
  - opened up
  lexicon: HALOT
  rationale: The verb plainly means 'opened' in this context of temple doors.
- source_word: דַּלְתוֹת
  chosen: the doors
  alternatives:
  - the door leaves
  - the gates
  lexicon: HALOT
  rationale: דֶּלֶת refers to doors/door panels rather than city gates. 'The doors'
    is the most natural and accurate rendering.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: בֵּית יְהוָה is literally 'house of YHWH.' Following the doctrine guideline,
    יְהוָה is rendered 'the LORD.' 'House' is retained in the main text because it
    is the source expression and remains clear in context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, the default rendering of the divine
    name is 'the LORD.'
- source_word: וַיְחַזְּקֵם
  chosen: and repaired them
  alternatives:
  - and strengthened them
  - and reinforced them
  - and restored them
  lexicon: HALOT
  rationale: The piel of חזק commonly means 'strengthen/make strong,' but with doors
    as the object in a temple-restoration context, the sense is practical restoration
    or repair. 'Repaired them' communicates the likely intended action in idiomatic
    English while preserving the idea of making them sound/strong.
