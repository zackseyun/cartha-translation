id: 2CH.29.2
reference: 2 Chronicles 29:2
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הַ/יָּשָׁ֖ר בְּ/עֵינֵ֣י יְהוָ֑ה כְּ/כֹ֥ל אֲשֶׁר עָשָׂ֖ה דָּוִ֥יד
    אָבִֽי/ו־׃
translation:
  text: He did what was right in the eyes of the LORD, according to all that David
    his father had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'David his ancestor' or 'David his forefather'; 'father' here reflects
      dynastic descent, not immediate paternity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: Qal wayyiqtol of עשה, the standard narrative form meaning 'and/he did.'
    In English narrative, the conjunction is often left implicit for readability,
    while preserving the verbal sense.
- source_word: הַיָּשָׁר
  chosen: what was right
  alternatives:
  - the right
  - what was upright
  lexicon: HALOT
  rationale: 'The adjective ישר with the article functions substantivally: ''the right/upright
    thing.'' English idiom is best captured by ''what was right,'' a common rendering
    in evaluative royal formulas.'
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This Hebrew idiom expresses evaluation from someone's perspective. 'In
    the eyes of' preserves the metaphor and remains natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the LXX/English Bible
    pattern.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - just as everything that
  - in accordance with all that
  lexicon: HALOT
  rationale: The construction marks conformity/comparison with the totality of David's
    conduct. 'According to all that' preserves both the comparative force and the
    comprehensiveness of כל.
- source_word: עָשָׂה
  chosen: had done
  alternatives:
  - did
  lexicon: HALOT
  rationale: A simple past is possible, but English past perfect clarifies that David's
    actions precede Hezekiah's and serve as the standard of comparison.
- source_word: דָּוִיד
  chosen: David
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his ancestor
  lexicon: HALOT
  rationale: Hebrew אב can denote immediate father or forefather/ancestor. In royal
    formula contexts involving David and later kings, it often means dynastic ancestor.
    The main text retains the conventional and literal 'his father,' while the broader
    ancestral sense is preserved in a footnote for auditability.
