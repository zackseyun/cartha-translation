theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This verse contains no contextual pressure to depart from that standard.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of 'David his father' in relation to Hezekiah
  chosen_reading: Retain the dynastic formula as 'David his father' in the main text
  alternative_readings:
  - David his ancestor
  - David his forefather
  rationale: The Hebrew royal formula uses familial language for dynastic descent.
    Keeping 'father' preserves the source wording and familiar biblical idiom without
    importing a mistaken claim of immediate paternity; the ancestral nuance is noted
    in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
