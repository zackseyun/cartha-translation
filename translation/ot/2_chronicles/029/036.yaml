id: 2CH.29.36
reference: 2 Chronicles 29:36
source:
  edition: WLC
  text: וַ/יִּשְׂמַ֤ח יְחִזְקִיָּ֨הוּ֙ וְ/כָל הָ/עָ֔ם עַ֛ל הַ/הֵכִ֥ין הָ/אֱלֹהִ֖ים
    לָ/עָ֑ם כִּ֥י בְּ/פִתְאֹ֖ם הָיָ֥ה הַ/דָּבָֽר־׃פ
translation:
  text: And Hezekiah rejoiced, and all the people, because God had prepared the people,
    for the matter had happened suddenly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'because God had prepared things for the people' or 'because God had
      established this for the people.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׂמַח
  chosen: rejoiced
  alternatives:
  - was glad
  lexicon: HALOT
  rationale: The verb שׂמח denotes joy or gladness. 'Rejoiced' fits the narrative
    register and conveys a stronger public response than the flatter 'was glad.'
- source_word: יְחִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Personal names are transliterated by standard English convention.
- source_word: וְכָל הָעָם
  chosen: and all the people
  alternatives:
  - and all the populace
  lexicon: HALOT
  rationale: עָם here refers to the gathered covenant community. 'The people' is the
    natural and standard rendering in context.
- source_word: עַל
  chosen: because
  alternatives:
  - over
  - concerning
  lexicon: HALOT
  rationale: Although עַל is often literally 'on/upon' or 'over,' after a verb of
    rejoicing it can introduce the cause or occasion of joy. 'Because' gives the idiomatic
    sense in English.
- source_word: הֵכִין
  chosen: had prepared
  alternatives:
  - had established
  - had made ready
  lexicon: HALOT
  rationale: כון in the Hiphil commonly means to prepare, make ready, or establish.
    In this immediate context of sudden readiness for worship reform, 'had prepared'
    best captures the sense of divine enabling.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The form refers to the God of Israel here and is appropriately rendered
    'God.'
- source_word: לָעָם
  chosen: the people
  alternatives:
  - for the people
  lexicon: HALOT
  rationale: The preposition ל marks advantage or benefit. English can express this
    smoothly as 'prepared the people,' but the underlying sense is that God prepared
    matters for the people's benefit. A footnote preserves the more literal alternative.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces an explanatory clause giving the reason for the
    rejoicing. 'For' works well in formal narrative English.
- source_word: בְּפִתְאֹם
  chosen: suddenly
  alternatives:
  - all at once
  lexicon: HALOT
  rationale: The adverb denotes abruptness or unexpected rapidity. 'Suddenly' is concise
    and natural.
- source_word: הָיָה הַדָּבָר
  chosen: the matter had happened
  alternatives:
  - the thing came about
  - this had taken place
  lexicon: HALOT
  rationale: דָּבָר is broad ('matter,' 'thing,' 'event'). In context it refers to
    the whole development of reform and worship restoration. 'The matter had happened'
    preserves the Hebrew's generality while remaining readable.
