theological_decisions:
- issue: Divine agency in the people's readiness
  chosen_reading: God had prepared the people
  alternative_readings:
  - God had prepared things for the people
  - God had established this for the people
  rationale: The Hebrew permits either direct preparation of the people or preparation
    on behalf of the people. The immediate context emphasizes God's enabling role
    in the rapid restoration, and the direct-object reading is the most natural in
    English. Alternatives are preserved in a footnote to maintain the semantic range
    without overstating the text.
  doctrine_reference: Translation philosophy §3, §5
