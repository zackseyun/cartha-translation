id: 2CH.29.24
reference: 2 Chronicles 29:24
source:
  edition: WLC
  text: וַ/יִּשְׁחָטוּ/ם֙ הַ/כֹּ֣הֲנִ֔ים וַֽ/יְחַטְּא֤וּ אֶת דָּמָ/ם֙ הַ/מִּזְבֵּ֔חָ/ה
    לְ/כַפֵּ֖ר עַל כָּל יִשְׂרָאֵ֑ל כִּ֤י לְ/כָל יִשְׂרָאֵל֙ אָמַ֣ר הַ/מֶּ֔לֶךְ הָ/עוֹלָ֖ה
    וְ/הַ/חַטָּֽאת־־־־׃
translation:
  text: The priests slaughtered them and applied their blood to the altar as a sin
    offering, to make atonement for all Israel, because the king had said that the
    burnt offering and the sin offering were for all Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'applied their blood to the altar to purify it'; the Hebrew verb can
      carry the sense of performing a purification/sin-offering rite.
    reason: lexical_alternative
  - marker: b
    text: Or 'the purification offering.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁחָטוּם
  chosen: slaughtered them
  alternatives:
  - killed them
  - slaughtered them as sacrifices
  lexicon: HALOT
  rationale: שָׁחַט in sacrificial contexts commonly means to slaughter an animal
    for sacrifice. The 3mp suffix requires an object, referring back to the goats
    of the previous verse.
- source_word: וַיְחַטְּאוּ אֶת־דָּמָם הַמִּזְבֵּחָה
  chosen: applied their blood to the altar as a sin offering
  alternatives:
  - put their blood on the altar
  - purified the altar with their blood
  - made a sin offering with their blood at the altar
  lexicon: HALOT
  rationale: The Hiphil of חטא in priestly/sacrificial usage can mean to perform a
    purification/sin-offering rite. With 'their blood' and 'to the altar,' the sense
    is ritual application of blood in connection with the sin offering. 'Applied their
    blood to the altar as a sin offering' captures both the concrete action and the
    cultic nuance without overtechnical wording.
- source_word: לְכַפֵּר
  chosen: to make atonement
  alternatives:
  - to atone
  - to purge
  lexicon: HALOT
  rationale: כפר in sacrificial contexts is standardly rendered 'make atonement.'
    This preserves the theological and ritual sense central to the verse.
- source_word: עַל כָּל־יִשְׂרָאֵל
  chosen: for all Israel
  alternatives:
  - on behalf of all Israel
  lexicon: HALOT
  rationale: עַל with כפר here indicates the beneficiaries of the atoning act. 'For
    all Israel' is natural English and preserves representative scope.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the comprehensive scope of the offerings. 'Because'
    is clearer in modern English than the more formal 'for.'
- source_word: לְכָל־יִשְׂרָאֵל אָמַר הַמֶּלֶךְ
  chosen: the king had said that ... were for all Israel
  alternatives:
  - the king said, 'For all Israel ...'
  - the king commanded it for all Israel
  lexicon: HALOT
  rationale: The clause explains the king's intention for the offerings. English requires
    smoothing the Hebrew word order; 'had said' fits the explanatory retrospective
    sense.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: עוֹלָה is the standard sacrificial term 'burnt offering.' The fuller
    'whole burnt offering' is possible but less idiomatic here.
- source_word: וְהַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the purification offering
  lexicon: HALOT
  rationale: חַטָּאת can denote either 'sin' or the 'sin offering.' In sacrificial
    context, 'sin offering' is the most transparent conventional rendering. Because
    some scholars stress the purification nuance, that alternative is preserved in
    a footnote.
