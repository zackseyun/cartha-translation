theological_decisions:
- issue: Rendering of sacrificial terminology related to חטא/חטאת
  chosen_reading: Use 'sin offering' in the main text while preserving 'purification
    offering' as an alternative in a footnote.
  alternative_readings:
  - purification offering
  rationale: The verse is embedded in temple sacrificial procedure, where traditional
    English 'sin offering' is widely understood and fits the immediate context. However,
    the Hebrew root can emphasize purification from impurity as well as dealing with
    sin, so the alternative should be preserved for auditability and to avoid overstating
    one theological nuance.
  doctrine_reference: Translation philosophy §3; §5
