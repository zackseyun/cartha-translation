id: 2CH.29.16
reference: 2 Chronicles 29:16
source:
  edition: WLC
  text: וַ/יָּבֹ֣אוּ הַ֠/כֹּהֲנִים לִ/פְנִ֣ימָה בֵית יְהוָה֮ לְ/טַהֵר֒ וַ/יּוֹצִ֗יאוּ אֵ֤ת כָּל הַ/טֻּמְאָה֙ אֲשֶׁ֤ר מָֽצְאוּ֙ בְּ/הֵיכַ֣ל יְהוָ֔ה לַ/חֲצַ֖ר בֵּ֣ית יְהוָ֑ה וַֽ/יְקַבְּלוּ֙ הַ/לְוִיִּ֔ם לְ/הוֹצִ֥יא לְ/נַֽחַל קִדְר֖וֹן חֽוּצָ/ה־־־׃
translation:
  text: Then the priests went into the inner part of the house of the LORD to cleanse it, and they brought out to the court of the house of the LORD all the uncleanness that they found in the temple of the LORD. Then the Levites received it to carry it outside to the Kidron Valley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sanctuary of the LORD' for 'temple of the LORD' (Hebrew הֵיכָל).
    reason: lexical_alternative
  - marker: b
    text: 'Kidron Valley: traditionally also rendered ''brook Kidron.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'to carry it out to the Kidron Valley, outside.'.
    reason: previous_rendering
lexical_decisions:
- source_word: לִפְנִימָה
  chosen: into the inner part
  alternatives:
  - inside
  - into the interior
  lexicon: HALOT
  rationale: The adverb denotes movement inward, specifically to the inner area of the temple structure. 'Into the inner part' preserves the spatial sense without over-specifying a technical chamber not named here.
- source_word: בֵית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: The Hebrew literally says 'house of YHWH.' 'House of the LORD' preserves the formal designation, while 'temple' is used later for הֵיכָל where the context narrows to the sanctuary building.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name יְהוָה is rendered 'the LORD' rather than transliterated forms.
- source_word: לְטַהֵר
  chosen: to cleanse it
  alternatives:
  - to purify it
  lexicon: HALOT
  rationale: The verb טהר in cultic context refers to ritual cleansing/purification. 'Cleanse' is accessible modern English and fits the temple-cleansing context.
- source_word: הַטֻּמְאָה
  chosen: the uncleanness
  alternatives:
  - the impurity
  - the defilement
  lexicon: HALOT
  rationale: The noun denotes ritual impurity/uncleanness. 'Uncleanness' preserves the cultic register better than the more abstract 'impurity,' while remaining understandable.
- source_word: בְּהֵיכַל יְהוָה
  chosen: in the temple of the LORD
  alternatives:
  - in the sanctuary of the LORD
  - in the palace of the LORD
  lexicon: HALOT
  rationale: הֵיכָל here refers to the temple sanctuary/building. 'Temple' is the clearest English equivalent in this context; 'sanctuary' is possible but can sound narrower or more technical.
- source_word: לַחֲצַר
  chosen: to the court
  alternatives:
  - into the courtyard
  lexicon: HALOT
  rationale: The priests moved the uncleanness from the inner temple area to the outer court. 'Court' is concise and natural in temple context.
- source_word: וַיְקַבְּלוּ
  chosen: received it
  alternatives:
  - took it
  - accepted it
  lexicon: HALOT
  rationale: The verb conveys that the Levites took charge of what the priests brought out. 'Received it' reflects the handoff between priestly and Levitical roles.
- source_word: לְהוֹצִיא
  chosen: to carry it out
  alternatives:
  - to bring it out
  - to take it out
  lexicon: HALOT
  rationale: Given the object is accumulated uncleanness/debris, 'carry it out' communicates physical removal more naturally than a bare 'bring out,' while staying within the verb's sense.
- source_word: נַחַל קִדְרוֹן
  chosen: the Kidron Valley
  alternatives:
  - the wadi Kidron
  - the brook Kidron
  lexicon: HALOT
  rationale: נחל can denote a wadi, ravine, or brook/valley. In English Bible usage for this location, 'Kidron Valley' is clear and geographically natural.
- source_word: חוּצָה
  chosen: outside
  alternatives:
  - outward
  - to the outside
  lexicon: HALOT
  rationale: The final adverb emphasizes removal beyond the temple precincts. 'Outside' is the most natural concise rendering.
