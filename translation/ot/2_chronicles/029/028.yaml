id: 2CH.29.28
reference: 2 Chronicles 29:28
source:
  edition: WLC
  text: וְ/כָל הַ/קָּהָל֙ מִֽשְׁתַּחֲוִ֔ים וְ/הַ/שִּׁ֣יר מְשׁוֹרֵ֔ר וְ/הַ/חֲצֹצְר֖וֹת
    מחצצרים הַ/כֹּ֕ל עַ֖ד לִ/כְל֥וֹת הָ/עֹלָֽה־׃
translation:
  text: And all the assembly was bowing down, while the song was being sung and the
    trumpets were sounding—all this continued until the burnt offering was finished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the singing was singing/sounding'; the Hebrew literally has 'the song'
      with a participle, an idiom rendered more naturally in English as 'the song
      was being sung.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָּהָל
  chosen: assembly
  alternatives:
  - congregation
  - people
  lexicon: HALOT
  rationale: Refers to the gathered community in worship. 'Assembly' is natural modern
    English and preserves the corporate sense without importing later ecclesial associations.
- source_word: מִשְׁתַּחֲוִים
  chosen: was bowing down
  alternatives:
  - was worshiping
  - prostrated themselves
  lexicon: HALOT
  rationale: The verb denotes bodily bowing/prostration. 'Bowing down' preserves the
    physical act; singular progressive English with collective subject ('all the assembly
    was') is idiomatic.
- source_word: הַשִּׁיר
  chosen: the song
  alternatives:
  - the singing
  - the chant
  lexicon: HALOT
  rationale: The noun is literally 'the song.' Although it can stand metonymically
    for singing, retaining 'song' reflects the Hebrew wording while remaining intelligible.
- source_word: מְשׁוֹרֵר
  chosen: was being sung
  alternatives:
  - was singing
  - sang
  lexicon: HALOT
  rationale: 'The participial form here functions with הַשִּׁיר as its subject: ''the
    song [was] sounding/sung.'' Rendering it passively in English avoids the awkward
    literal ''the song was singing'' and matches the sense.'
- source_word: חֲצֹצְרוֹת
  chosen: trumpets
  alternatives:
  - silver trumpets
  lexicon: HALOT
  rationale: Standard rendering for the cultic straight trumpets. 'Silver' is not
    explicit in this verse and so is not added to the main text.
- source_word: מחצצרים
  chosen: were sounding
  alternatives:
  - were blowing
  - were trumpeting
  lexicon: HALOT
  rationale: The Hiphil participle indicates the trumpets were being blown/sounded.
    'Were sounding' reads naturally with 'trumpets' as subject in English.
- source_word: הַכֹּל
  chosen: all this
  alternatives:
  - the whole
  - all of it
  lexicon: HALOT
  rationale: Summative use referring to the combined worship actions just described.
    'All this' best captures the discourse function in English.
- source_word: עַד לִכְלוֹת
  chosen: until ... was finished
  alternatives:
  - until the completion of
  - until ... ended
  lexicon: HALOT
  rationale: Infinitive construct of כלה marks the endpoint of the action. Finite
    English clause is the most natural equivalent.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: Standard sacrificial term for the עולה offering. 'Burnt offering' is
    the established and accurate English rendering.
