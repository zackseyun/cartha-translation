id: 2CH.29.13
reference: 2 Chronicles 29:13
source:
  edition: WLC
  text: וּ/מִן בְּנֵי֙ אֱלִ֣יצָפָ֔ן שִׁמְרִ֖י ו/יעואל וּ/מִן בְּנֵ֣י אָסָ֔ף זְכַרְיָ֖הוּ
    וּ/מַתַּנְיָֽהוּ־־׃ס
translation:
  text: and from the sons of Elizaphan, Shimri and Jeuel; and from the sons of Asaph,
    Zechariah and Mattaniah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of' may denote a wider family line or clan membership, not
      only immediate sons.
    reason: lexical_alternative
  - marker: b
    text: The name 'Jeuel' is spelled differently from some similar names elsewhere
      (for example, 'Jeiel'); the Hebrew form here supports 'Jeuel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִן
  chosen: and from
  alternatives:
  - from
  lexicon: HALOT
  rationale: The prefixed conjunction ו plus preposition מן is best represented as
    'and from' to preserve the list structure linking this group with the preceding
    names in the larger sentence.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the members of
  lexicon: HALOT
  rationale: בני literally means 'sons of.' In genealogical/list contexts it can denote
    descendants or clan members, but 'sons of' preserves the Hebrew form and is natural
    in English for this register.
- source_word: אֱלִיצָפָן
  chosen: Elizaphan
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: שִׁמְרִי
  chosen: Shimri
  alternatives:
  - Shimri
  rationale: Personal name transliterated in standard English form.
- source_word: ו/יעואל
  chosen: and Jeuel
  alternatives:
  - and Jeiel
  rationale: The consonantal form here supports Jeuel/Yeuel. A spelling like 'Jeiel'
    appears elsewhere for related or similar names, but this verse's form is best
    represented as Jeuel.
- source_word: וּ/מִן
  chosen: and from
  alternatives:
  - from
  lexicon: HALOT
  rationale: Repeated phrase preserved to reflect the parallel structure of the Hebrew
    list.
- source_word: בְּנֵי אָסָף
  chosen: the sons of Asaph
  alternatives:
  - the descendants of Asaph
  lexicon: HALOT
  rationale: Retains the genealogical/clan expression in a straightforward way. 'Asaph'
    is a personal name functioning as the ancestor or guild head.
- source_word: זְכַרְיָהוּ
  chosen: Zechariah
  alternatives:
  - Zekaryahu
  rationale: Standard English transliteration of the Hebrew personal name.
- source_word: וּ/מַתַּנְיָהוּ
  chosen: and Mattaniah
  alternatives:
  - and Mattanyahu
  rationale: Standard English transliteration of the Hebrew personal name with conjunction
    preserved.
