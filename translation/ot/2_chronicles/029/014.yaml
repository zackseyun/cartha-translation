id: 2CH.29.14
reference: 2 Chronicles 29:14
source:
  edition: WLC
  text: וּ/מִן בְּנֵ֥י הֵימָ֖ן יחואל וְ/שִׁמְעִ֑י וּ/מִן בְּנֵ֣י יְדוּת֔וּן שְׁמַֽעְיָ֖ה
    וְ/עֻזִּיאֵֽל־ס־׃
translation:
  text: 'And from the sons of Heman: Jehuel and Shimei; and from the sons of Jeduthun:
    Shemaiah and Uzziel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jehuel may also be rendered 'Jahiel' in some English traditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן
  chosen: And from
  alternatives:
  - From
  lexicon: HALOT
  rationale: The conjunction prefixed to מן links this verse to the preceding list,
    so 'And from' preserves the additive flow of the Hebrew enumeration better than
    simply 'From'.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the members of
  lexicon: HALOT
  rationale: In genealogical/list contexts, בְּנֵי commonly denotes members of a family
    line or guild. 'The sons of' is the most direct and transparent rendering, while
    still naturally covering clan/group affiliation in context.
- source_word: הֵימָן
  chosen: Heman
  rationale: Personal name; transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: יחואל
  chosen: Jehuel
  alternatives:
  - Jahiel
  rationale: Personal name; transliterated as 'Jehuel' following a common English
    convention for this spelling. 'Jahiel' appears in some traditions, but the consonantal
    form here supports 'Jehuel' as a straightforward transliteration.
- source_word: וְשִׁמְעִי
  chosen: and Shimei
  rationale: The prefixed conjunction is retained to preserve the list structure.
    'Shimei' is the standard transliteration of the personal name.
- source_word: יְדוּתוּן
  chosen: Jeduthun
  rationale: Personal name; transliterated by standard English convention.
- source_word: שְׁמַעְיָה
  chosen: Shemaiah
  alternatives:
  - Shimea
  rationale: Personal name; 'Shemaiah' is the standard English transliteration and
    best reflects the Hebrew form.
- source_word: וְעֻזִּיאֵל
  chosen: and Uzziel
  rationale: The conjunction is preserved for the final item in the list. 'Uzziel'
    is the standard transliteration of the personal name.
