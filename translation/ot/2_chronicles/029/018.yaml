id: 2CH.29.18
reference: 2 Chronicles 29:18
source:
  edition: WLC
  text: וַ/יָּב֤וֹאוּ פְנִ֨ימָה֙ אֶל חִזְקִיָּ֣הוּ הַ/מֶּ֔לֶךְ וַ/יֹּ֣אמְר֔וּ טִהַ֖רְנוּ אֶת כָּל בֵּ֣ית יְהוָ֑ה אֶת מִזְבַּ֤ח הָ/עוֹלָה֙ וְ/אֶת כָּל כֵּלָ֔י/ו וְ/אֶת שֻׁלְחַ֥ן הַֽ/מַּעֲרֶ֖כֶת וְ/אֶת כָּל כֵּלָֽי/ו־־־־־־־־־׃
translation:
  text: Then they went in to King Hezekiah and said, “We have cleansed all the house of Yahweh, the altar of burnt offering and all its utensils, and the table of the rows and all its utensils.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the table of showbread,” that is, the table for the bread arranged before the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְנִימָה
  chosen: inside
  alternatives:
  - inward
  - into the inner part
  lexicon: HALOT
  rationale: The adverb indicates movement inward. 'Inside' is natural modern English and fits the context of entering to report to the king.
- source_word: טִהַרְנוּ
  chosen: have cleansed
  alternatives:
  - have purified
  - have made clean
  lexicon: HALOT
  rationale: The verb denotes ritual cleansing in temple context. 'Cleansed' preserves the cultic sense without sounding overly technical; present perfect fits the report of completed action with present relevance.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew expression while remaining clear. The divine name follows the doctrinal default 'the LORD' for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִזְבַּח הָעֹלָה
  chosen: the altar of burnt offering
  alternatives:
  - the burnt offering altar
  - the altar for burnt offerings
  lexicon: HALOT
  rationale: This is the standard cultic designation for the altar associated with whole burnt offerings. 'Altar of burnt offering' is clear and close to the Hebrew construction.
- source_word: כֵּלָיו
  chosen: its utensils
  alternatives:
  - its vessels
  - all its articles
  lexicon: HALOT
  rationale: כֵּלִים in sanctuary contexts refers broadly to implements or vessels used in worship. 'Utensils' is readable modern English and suitably concrete.
- source_word: שֻׁלְחַן הַמַּעֲרֶכֶת
  chosen: the table of the arrangement
  alternatives:
  - the table of the rows
  - the table of the bread of arrangement
  - the table of showbread
  lexicon: HALOT
  rationale: The Hebrew literally refers to the table associated with the arranged order, namely the bread set out in rows. 'Table of the arrangement' stays close to the source and avoids importing the traditional but less transparent 'showbread' into the main text.
