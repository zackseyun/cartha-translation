theological_decisions:
- issue: Nature of the comparison between Levites and priests
  chosen_reading: The verse states that the Levites were more upright/sincere in heart
    in consecrating themselves than the priests.
  alternative_readings:
  - The Levites were quicker or more diligent to consecrate themselves than the priests.
  - The Levites were better prepared for consecration than the priests.
  rationale: The Hebrew יִשְׁרֵי לֵבָב emphasizes inner uprightness/sincerity, not
    merely speed or administrative readiness. The comparison should be preserved without
    importing a broader polemic against the priesthood beyond this immediate situation.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
