id: 2CH.29.34
reference: 2 Chronicles 29:34
source:
  edition: WLC
  text: רַ֤ק הַ/כֹּֽהֲנִים֙ הָי֣וּ לִ/מְעָ֔ט וְ/לֹ֣א יָֽכְל֔וּ לְ/הַפְשִׁ֖יט אֶת כָּל
    הָ/עֹל֑וֹת וַֽ/יְּחַזְּק֞וּ/ם אֲחֵי/הֶ֣ם הַ/לְוִיִּ֗ם עַד כְּל֤וֹת הַ/מְּלָאכָה֙
    וְ/עַ֣ד יִתְקַדְּשׁ֣וּ הַ/כֹּֽהֲנִ֔ים כִּ֤י הַ/לְוִיִּם֙ יִשְׁרֵ֣י לֵבָ֔ב לְ/הִתְקַדֵּ֖שׁ
    מֵֽ/הַ/כֹּהֲנִֽים־־־׃
translation:
  text: Only the priests were too few, and they were not able to skin all the burnt
    offerings, so their brothers the Levites strengthened them until the work was
    finished and until the priests had consecrated themselves. For the Levites were
    more upright in heart to consecrate themselves than the priests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'helped them'; the Hebrew verb is literally 'strengthened them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'more wholehearted' or 'upright of heart'; the Hebrew emphasizes inner
      sincerity or rectitude.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - But
  - However
  lexicon: HALOT
  rationale: 'Marks a limiting or contrastive statement. ''Only'' best captures the
    restrictive force here: the problem was that the priests were too few.'
- source_word: לִמְעָט
  chosen: too few
  alternatives:
  - few
  - in small number
  lexicon: HALOT
  rationale: With היה, the phrase indicates insufficiency in number, not merely a
    neutral description. 'Too few' brings out the implied inadequacy that explains
    the following clause.
- source_word: לְהַפְשִׁיט
  chosen: to skin
  alternatives:
  - to flay
  lexicon: HALOT
  rationale: Refers to removing the skin from sacrificial animals. 'Skin' is clear
    modern English; 'flay' is more formal/technical but less accessible.
- source_word: הָעֹלוֹת
  chosen: the burnt offerings
  alternatives:
  - the whole burnt offerings
  lexicon: HALOT
  rationale: Standard sacrificial term for offerings wholly offered up. 'Burnt offerings'
    is the established and accurate English rendering.
- source_word: וַיְחַזְּקוּם
  chosen: strengthened them
  alternatives:
  - helped them
  - supported them
  - assisted them
  lexicon: HALOT
  rationale: The verb literally means 'strengthened' or 'made strong.' In context
    it denotes practical support in carrying out the task. I retained the more literal
    'strengthened them' rather than flattening to 'helped them,' while the context
    makes the sense clear.
- source_word: אֲחֵיהֶם
  chosen: their brothers
  alternatives:
  - their kinsmen
  lexicon: HALOT
  rationale: The term is literally 'their brothers.' In this cultic context it refers
    to fellow Israelites/fellow temple servants, specifically the Levites. Per translation
    philosophy, the gendered familial term is preserved.
- source_word: עַד כְּלוֹת הַמְּלָאכָה
  chosen: until the work was finished
  alternatives:
  - until the task was completed
  - until the service was completed
  lexicon: HALOT
  rationale: This infinitive construction marks duration up to completion. 'The work'
    is broad enough to cover the sacrificial processing being described.
- source_word: יִתְקַדְּשׁוּ
  chosen: had consecrated themselves
  alternatives:
  - had sanctified themselves
  - became holy
  lexicon: HALOT
  rationale: In priestly/temple context, קדשׁ in the hitpael refers to ritual self-consecration/preparation
    for sacred service. 'Consecrated themselves' is both accurate and readable.
- source_word: יִשְׁרֵי לֵבָב
  chosen: more upright in heart
  alternatives:
  - more wholehearted
  - more right-hearted
  - upright of heart
  lexicon: HALOT
  rationale: The phrase denotes inner rectitude/sincerity. Because of the comparative
    force created by מִן in the next phrase, 'more upright in heart' best preserves
    both the idiom and the comparison with the priests.
- source_word: לְהִתְקַדֵּשׁ מֵהַכֹּהֲנִים
  chosen: to consecrate themselves than the priests
  alternatives:
  - for consecrating themselves than the priests
  - to sanctify themselves more than the priests
  lexicon: HALOT
  rationale: 'The preposition מן marks comparison: the Levites were more ready/upright
    with respect to consecrating themselves than the priests were. English idiom requires
    smoothing the construction to ''than the priests.'''
