id: 2CH.29.26
reference: 2 Chronicles 29:26
source:
  edition: WLC
  text: וַ/יַּֽעַמְד֤וּ הַ/לְוִיִּם֙ בִּ/כְלֵ֣י דָוִ֔יד וְ/הַ/כֹּהֲנִ֖ים בַּ/חֲצֹצְרֽוֹת׃ס
translation:
  text: Then the Levites stood with the instruments of David, and the priests with
    the trumpets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with David's instruments.' The Hebrew phrase may mean instruments belonging
      to, commissioned by, or associated with David.
    reason: lexical_alternative
  - marker: b
    text: That is, the cultic trumpets used by the priests; some contexts specify
      them as silver, but that detail is not stated here.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַמְדוּ
  chosen: Then ... stood
  alternatives:
  - and they stood
  - they took their stand
  lexicon: HALOT
  rationale: The waw-consecutive imperfect advances the narrative. 'Then ... stood'
    gives natural English narrative sequence while preserving the basic sense of עמד,
    'stand/take one's position.'
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/cultic group לְוִיִּם. The definite
    article is preserved.
- source_word: בִּכְלֵי דָוִיד
  chosen: with the instruments of David
  alternatives:
  - with David's instruments
  - with the implements of David
  lexicon: HALOT
  rationale: כְּלִי is broad ('vessel, implement, instrument'), but in this temple-musical
    context it refers to musical instruments. 'Of David' preserves the genitival link,
    likely indicating instruments associated with or prescribed by David.
- source_word: וְהַכֹּהֲנִים
  chosen: and the priests
  lexicon: HALOT
  rationale: Straightforward rendering of the coordinated second group, preserving
    the article and conjunction.
- source_word: בַּחֲצֹצְרוֹת
  chosen: with the trumpets
  alternatives:
  - with the silver trumpets
  lexicon: HALOT
  rationale: חֲצֹצְרוֹת denotes the cultic trumpets. 'With the trumpets' is the most
    direct rendering. 'Silver' is often true by broader cultic context but is not
    stated in this verse, so it is not supplied in the main text.
