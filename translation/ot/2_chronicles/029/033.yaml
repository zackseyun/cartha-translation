id: 2CH.29.33
reference: 2 Chronicles 29:33
source:
  edition: WLC
  text: וְֽ/הַ/קֳּדָשִׁ֑ים בָּקָר֙ שֵׁ֣שׁ מֵא֔וֹת וְ/צֹ֖אן שְׁלֹ֥שֶׁת אֲלָפִֽים׃
translation:
  text: And the consecrated offerings were six hundred cattle and three thousand sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the consecrated things'; that is, animals set apart as sacred offerings.
    reason: lexical_alternative
  - marker: b
    text: Hebrew צֹאן can denote flock animals generally, including sheep and goats.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַקֳּדָשִׁים
  chosen: the consecrated offerings
  alternatives:
  - the holy things
  - the consecrated things
  - the dedicated gifts
  lexicon: HALOT
  rationale: The plural of קדשׁ here refers not to abstract holiness but to items
    set apart for sacred use in the temple context. Given the following enumeration
    of animals, an English rendering that makes clear these are sacrificially dedicated
    items is preferable. 'Consecrated offerings' is more natural and contextually
    explicit than the overly literal 'holy things.'
- source_word: בָּקָר
  chosen: cattle
  alternatives:
  - oxen
  - herd animals
  lexicon: HALOT
  rationale: בָּקָר is a collective term for bovines. 'Cattle' best captures the collective
    sense in modern English; 'oxen' would be too narrow, since the Hebrew does not
    specify sex or work-animal status.
- source_word: שֵׁשׁ מֵאוֹת
  chosen: six hundred
  lexicon: HALOT
  rationale: Straightforward cardinal number construction.
- source_word: וְצֹאן
  chosen: and three thousand sheep
  alternatives:
  - and three thousand small livestock
  - and three thousand flock animals
  lexicon: HALOT
  rationale: צֹאן is a collective term that can include sheep and goats, but in English
    narrative inventory contexts 'sheep' is the most idiomatic shorthand. The broader
    sense is possible, but 'sheep' is acceptable here as a conventional rendering
    unless context specifically distinguishes goats.
- source_word: שְׁלֹשֶׁת אֲלָפִים
  chosen: three thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number construction.
