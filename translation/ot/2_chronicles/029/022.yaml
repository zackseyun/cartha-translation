id: 2CH.29.22
reference: 2 Chronicles 29:22
source:
  edition: WLC
  text: וַֽ/יִּשְׁחֲטוּ֙ הַ/בָּקָ֔ר וַ/יְקַבְּל֤וּ הַ/כֹּֽהֲנִים֙ אֶת הַ/דָּ֔ם וַֽ/יִּזְרְק֖וּ
    הַ/מִּזְבֵּ֑חָ/ה וַ/יִּשְׁחֲט֣וּ הָ/אֵלִ֗ים וַ/יִּזְרְק֤וּ הַ/דָּם֙ הַ/מִּזְבֵּ֔חָ/ה
    וַֽ/יִּשְׁחֲטוּ֙ הַ/כְּבָשִׂ֔ים וַ/יִּזְרְק֥וּ הַ/דָּ֖ם הַ/מִּזְבֵּֽחָ/ה־׃
translation:
  text: Then they slaughtered the cattle, and the priests received the blood and threw
    it against the altar. They slaughtered the rams and threw the blood against the
    altar. They slaughtered the lambs and threw the blood against the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'splashed the blood on the altar' or 'dashed the blood against the altar.'
      The Hebrew verb denotes a forceful ritual application of blood, not a light
      sprinkling.
    reason: lexical_alternative
  - marker: b
    text: '''Cattle'' renders a collective Hebrew term for bovine animals; some translations
      specify ''bulls'' from the sacrificial context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁחֲטוּ
  chosen: they slaughtered
  alternatives:
  - they killed
  - they butchered
  lexicon: HALOT
  rationale: The verb שׁחט in sacrificial context specifically denotes ritual slaughter,
    not merely killing. 'Slaughtered' preserves the cultic sense in readable English.
- source_word: הַבָּקָר
  chosen: the cattle
  alternatives:
  - the bulls
  - the herd animals
  lexicon: HALOT
  rationale: בקר is a collective term for bovine livestock. 'Cattle' best reflects
    the Hebrew collective without over-specifying sex. 'Bulls' is possible in sacrificial
    contexts, but the Hebrew here itself is broader.
- source_word: וַיְקַבְּלוּ
  chosen: received
  alternatives:
  - caught
  - collected
  lexicon: HALOT
  rationale: קבל literally means 'receive.' In sacrificial procedure the priests receive
    the blood for ritual application. 'Received' stays close to the source while remaining
    intelligible; the procedural nuance is clear from context.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering for כהנים; no contextual reason to vary.
- source_word: הַדָּם
  chosen: the blood
  lexicon: HALOT
  rationale: Direct and literal rendering of the sacrificial blood.
- source_word: וַיִּזְרְקוּ
  chosen: threw it against
  alternatives:
  - splashed on
  - sprinkled on
  - dashed against
  lexicon: HALOT
  rationale: זרק in sacrificial contexts refers to the ritual tossing or dashing of
    blood onto/against the altar. 'Threw it against' is vivid, natural English and
    better reflects the force of the action than the softer 'sprinkled.'
- source_word: הַמִּזְבֵּחָה
  chosen: against the altar
  alternatives:
  - on the altar
  - toward the altar
  lexicon: HALOT
  rationale: The directional ending indicates motion toward the altar, and in sacrificial
    blood rites the sense is application onto the altar's side/surface. 'Against the
    altar' captures both the direction and the physical action idiomatically.
- source_word: הָאֵלִים
  chosen: the rams
  lexicon: HALOT
  rationale: אילים is the standard term for rams; straightforward rendering.
- source_word: הַכְּבָשִׂים
  chosen: the lambs
  alternatives:
  - the sheep
  lexicon: HALOT
  rationale: כבשים commonly denotes lambs/young sheep in sacrificial lists. 'Lambs'
    fits the cultic context better than the broader 'sheep.'
