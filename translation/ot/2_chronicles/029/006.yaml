id: 2CH.29.6
reference: 2 Chronicles 29:6
source:
  edition: WLC
  text: כִּֽי מָעֲל֣וּ אֲבֹתֵ֗י/נוּ וְ/עָשׂ֥וּ הָ/רַ֛ע בְּ/עֵינֵ֥י יְהוָֽה אֱלֹהֵ֖י/נוּ וַ/יַּֽעַזְבֻ֑/הוּ וַ/יַּסֵּ֧בּוּ פְנֵי/הֶ֛ם מִ/מִּשְׁכַּ֥ן יְהוָ֖ה וַ/יִּתְּנוּ עֹֽרֶף־־־׃
translation:
  text: For our fathers acted unfaithfully and did what was evil in the eyes of Yahweh our God. They abandoned him, turned their faces away from the dwelling place of Yahweh, and turned their backs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'committed trespass' / 'dealt treacherously'; the Hebrew verb carries the sense of acting unfaithfully, often in covenantal matters.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the dwelling place of the LORD'; 'tabernacle' is possible as a lexical gloss for מִשְׁכָּן, but here the reference is to the temple as the LORD's dwelling.
    reason: lexical_alternative
  - marker: c
    text: Literally 'gave the neck.' The idiom means to turn away in refusal or rebellion.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָעֲלוּ
  chosen: acted unfaithfully
  alternatives:
  - were unfaithful
  - committed trespass
  - dealt treacherously
  lexicon: HALOT
  rationale: מעל commonly denotes breach of faith or unfaithfulness, often with covenantal or cultic overtones. 'Acted unfaithfully' preserves the moral-religious force better than the more archaic 'trespassed' and is more natural than the bare 'were unfaithful' in this narrative summary.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - evil
  - the evil
  lexicon: HALOT
  rationale: With עשה, the idiom means 'do what is evil.' This is standard biblical Hebrew usage and reads naturally in English while preserving the objective moral evaluation.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a common Hebrew idiom. 'In the eyes of' is transparent and preserves the metaphor; 'in the sight of' would also be possible but is slightly less literal.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּעַזְבֻהוּ
  chosen: They abandoned him
  alternatives:
  - forsook him
  - left him
  lexicon: HALOT
  rationale: The verb עזב here expresses covenantal/religious abandonment of God. 'Abandoned' is clear modern English and carries the relational force without archaic tone.
- source_word: וַיַּסֵּבּוּ פְנֵיהֶם
  chosen: turned their faces away
  alternatives:
  - turned their faces from
  - turned away their faces
  lexicon: HALOT
  rationale: The Hebrew literally says they turned their faces from the LORD's dwelling. Adding 'away' makes the directional sense idiomatic in English while preserving the image of deliberate rejection.
- source_word: מִמִּשְׁכַּן יְהוָה
  chosen: from the dwelling place of the LORD
  alternatives:
  - from the tabernacle of the LORD
  - from the sanctuary of the LORD
  lexicon: HALOT
  rationale: מִשְׁכָּן literally denotes a dwelling place. In Chronicles this can refer to the temple as the LORD's dwelling, not only the wilderness tabernacle. 'Dwelling place' preserves the lexical sense without importing the more technical 'tabernacle,' which could mislead in this temple context.
- source_word: וַיִּתְּנוּ עֹרֶף
  chosen: turned their backs
  alternatives:
  - gave the neck
  - turned the neck
  lexicon: HALOT
  rationale: The Hebrew idiom literally involves giving the neck/back of the neck, signifying stubborn refusal or rejection. 'Turned their backs' is the clearest idiomatic English equivalent and matches the parallel image of turning the face away.
