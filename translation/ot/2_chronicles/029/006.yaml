theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Cultic term מִשְׁכָּן in temple-period context
  chosen_reading: dwelling place of the LORD
  alternative_readings:
  - tabernacle of the LORD
  - sanctuary of the LORD
  rationale: To avoid anachronistic confusion with the Mosaic tabernacle while preserving the theological idea that the temple is the LORD's dwelling, 'dwelling place' best reflects the Hebrew in this context.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
