id: 2CH.29.30
reference: 2 Chronicles 29:30
source:
  edition: WLC
  text: וַ֠/יֹּאמֶר יְחִזְקִיָּ֨הוּ הַ/מֶּ֤לֶךְ וְ/הַ/שָּׂרִים֙ לַ/לְוִיִּ֔ם לְ/הַלֵּל֙ לַֽ/יהוָ֔ה בְּ/דִבְרֵ֥י דָוִ֖יד וְ/אָסָ֣ף הַ/חֹזֶ֑ה וַֽ/יְהַלְלוּ֙ עַד לְ/שִׂמְחָ֔ה וַֽ/יִּקְּד֖וּ וַ/יִּֽשְׁתַּחֲוֽוּ־׃פ
translation:
  text: Then Hezekiah the king and the officials told the Levites to praise Yahweh with the words of David and of Asaph the seer. So they praised with gladness, and they bowed down and worshiped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the words of David and of Asaph the seer.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'until joy' or 'unto joy'; the sense is that their praise was marked by rejoicing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: told
  alternatives:
  - said
  - commanded
  lexicon: HALOT
  rationale: Although the verb is literally 'said,' the construction 'said ... to the Levites to praise' functions idiomatically as a directive. 'Told' gives natural English while preserving the sense of instruction without overstating it as a harsher 'commanded.'
- source_word: הַמֶּלֶךְ וְהַשָּׂרִים
  chosen: the king and the officials
  alternatives:
  - the king and the princes
  - the king and the rulers
  lexicon: HALOT
  rationale: שָׂרִים denotes leaders/officials. 'Officials' is clear modern English and fits the administrative context better than the more archaic or potentially misleading 'princes.'
- source_word: לְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/cultic group name.
- source_word: לְהַלֵּל
  chosen: to praise
  alternatives:
  - to sing praise
  - to celebrate
  lexicon: HALOT
  rationale: הלל in this liturgical context means to praise. 'To sing praise' is possible, but the object 'with the words of David and of Asaph' already conveys the sung/liturgical setting.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD.'
- source_word: בְּדִבְרֵי דָוִיד וְאָסָף הַחֹזֶה
  chosen: with the words of David and of Asaph the seer
  alternatives:
  - according to the words of David and of Asaph the seer
  - with the songs of David and of Asaph the seer
  lexicon: HALOT
  rationale: דִּבְרֵי is literally 'words of.' 'With the words of' preserves the Hebrew closely while making good sense in context. 'Songs' is interpretive and narrower than the Hebrew. The phrase likely refers to inspired liturgical compositions associated with David and Asaph.
- source_word: הַחֹזֶה
  chosen: the seer
  alternatives:
  - the visionary
  lexicon: HALOT
  rationale: חֹזֶה is a standard prophetic title, commonly rendered 'seer.' This preserves the historical-religious nuance.
- source_word: וַיְהַלְלוּ
  chosen: they praised
  alternatives:
  - they sang praises
  lexicon: HALOT
  rationale: Same root as earlier לְהַלֵּל. 'They praised' keeps consistency and avoids adding 'sang' where the verb itself does not require it.
- source_word: עַד לְשִׂמְחָה
  chosen: with joy
  alternatives:
  - until rejoicing
  - to the point of joy
  - with rejoicing
  lexicon: HALOT
  rationale: The Hebrew expression is somewhat idiomatic. 'With joy' captures the resultant manner/state in natural English. 'Until rejoicing' is more literal but awkward and less clear in English.
- source_word: וַיִּקְּדוּ
  chosen: they bowed down
  alternatives:
  - they knelt
  - they bent low
  lexicon: HALOT
  rationale: The verb denotes bowing/bending in reverence. 'Bowed down' fits the worship context and pairs naturally with the following verb.
- source_word: וַיִּשְׁתַּחֲווּ
  chosen: worshiped
  alternatives:
  - prostrated themselves
  - bowed in worship
  lexicon: HALOT
  rationale: This verb often denotes prostration in worship. Since the preceding verb already expresses bodily bowing, rendering this one as 'worshiped' preserves the distinction between physical posture and devotional act.
