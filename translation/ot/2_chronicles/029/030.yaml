theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relationship between bodily gestures and worship in the final clause
  chosen_reading: 'two coordinated actions: ''they bowed down and worshiped'''
  alternative_readings:
  - a hendiadys such as 'they bowed in worship'
  rationale: The Hebrew uses two distinct verbs, so the translation preserves both actions rather than collapsing them into one. This maintains the text's liturgical and reverential texture without importing additional doctrinal nuance.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
