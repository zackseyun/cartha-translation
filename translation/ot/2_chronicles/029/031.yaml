id: 2CH.29.31
reference: 2 Chronicles 29:31
source:
  edition: WLC
  text: וַ/יַּ֨עַן יְחִזְקִיָּ֜הוּ וַ/יֹּ֗אמֶר עַתָּ֨ה מִלֵּאתֶ֤ם יֶדְ/כֶם֙ לַ/יהוָ֔ה גֹּ֧שׁוּ וְ/הָבִ֛יאוּ זְבָחִ֥ים וְ/תוֹד֖וֹת לְ/בֵ֣ית יְהוָ֑ה וַ/יָּבִ֤יאוּ הַ/קָּהָל֙ זְבָחִ֣ים וְ/תוֹד֔וֹת וְ/כָל נְדִ֥יב לֵ֖ב עֹלֽוֹת־׃
translation:
  text: Then Hezekiah answered and said, “Now you have filled your hand for Yahweh. Come near and bring sacrifices and thank offerings to the house of Yahweh.” And the assembly brought sacrifices and thank offerings, and all who were willing of heart brought burnt offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''you have filled your hand for the LORD,'' an idiom for being consecrated or installed for sacred service.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb commonly means 'answer/respond.' 'Answered' preserves the Hebrew narrative idiom, especially with the following 'and said.'
- source_word: מִלֵּאתֶם יֶדְכֶם
  chosen: you have consecrated yourselves
  alternatives:
  - you have filled your hand for the LORD
  - you have ordained yourselves
  lexicon: HALOT
  rationale: Literally 'you have filled your hand,' an idiom used for installation/consecration to sacred service. In this context Hezekiah addresses those who have just sanctified themselves for temple worship; 'consecrated yourselves' communicates the idiomatic sense in clear English better than the opaque literal expression.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition can be rendered 'to/for.' 'To the LORD' fits the idiom of consecration and keeps the direction of dedication. Per doctrine, יהוה is rendered 'the LORD.'
- source_word: גֹּשׁוּ
  chosen: Come near
  alternatives:
  - Approach
  - Come
  lexicon: HALOT
  rationale: The verb means to approach/draw near. 'Come near' preserves the cultic sense of approaching for worship better than the more generic 'come.'
- source_word: וְהָבִיאוּ
  chosen: bring
  alternatives:
  - present
  lexicon: HALOT
  rationale: Standard rendering for bringing offerings; simple and natural in modern English.
- source_word: זְבָחִים
  chosen: sacrifices
  alternatives:
  - sacrificial offerings
  lexicon: HALOT
  rationale: A broad term for slaughtered sacrifices. 'Sacrifices' is the most natural general rendering here.
- source_word: תוֹדוֹת
  chosen: thank offerings
  alternatives:
  - thanksgiving offerings
  - offerings of thanks
  lexicon: HALOT
  rationale: Refers to thanksgiving sacrifices/offerings. 'Thank offerings' is concise, idiomatic, and preserves the cultic category.
- source_word: לְבֵית יְהוָה
  chosen: to the house of the LORD
  alternatives:
  - to the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'to the house of the LORD.' Although 'temple' is understandable, 'house of the LORD' preserves the Hebrew expression and its theological resonance.
- source_word: הַקָּהָל
  chosen: the assembly
  alternatives:
  - the congregation
  lexicon: HALOT
  rationale: Refers to the gathered community. 'Assembly' is clear modern English and fits public worship context.
- source_word: כָל נְדִיב לֵב
  chosen: all who were willing of heart
  alternatives:
  - everyone whose heart was willing
  - all the generous-hearted
  lexicon: HALOT
  rationale: The phrase denotes voluntary willingness arising from the heart. 'Willing of heart' preserves the Hebrew anthropological expression while remaining readable.
- source_word: עֹלוֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: Standard sacrificial term for offerings wholly burned. 'Burnt offerings' is the conventional and accurate rendering.
