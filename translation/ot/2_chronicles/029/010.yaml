id: 2CH.29.10
reference: 2 Chronicles 29:10
source:
  edition: WLC
  text: עַתָּה֙ עִם לְבָבִ֔/י לִ/כְר֣וֹת בְּרִ֔ית לַ/יהוָ֖ה אֱלֹהֵ֣י יִשְׂרָאֵ֑ל וְ/יָשֹׁ֥ב מִמֶּ֖/נּוּ חֲר֥וֹן אַפּֽ/וֹ־׃
translation:
  text: Now it is in my heart to make a covenant with Yahweh, the God of Israel, so that his burning anger may turn away from us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'to cut a covenant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At this time
  lexicon: HALOT
  rationale: Temporal adverb marking the immediacy of Hezekiah's resolve; 'Now' is natural and sufficiently direct.
- source_word: עִם לְבָבִי
  chosen: it is in my heart
  alternatives:
  - with my heart
  - I have it in mind
  - I am resolved
  lexicon: HALOT
  rationale: The idiom expresses inner intention or resolve. 'It is in my heart' preserves the Hebrew imagery while remaining clear in English better than the overly literal 'with my heart.'
- source_word: לִכְרֹת בְּרִית
  chosen: to make a covenant
  alternatives:
  - to cut a covenant
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'to cut a covenant,' but standard English idiom is 'make a covenant.' The literal alternative is worth preserving in a footnote because of its covenantal significance.
- source_word: לַיהוָה
  chosen: with the LORD
  alternatives:
  - with Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' English requires 'with' to express the covenant partner, though the Hebrew uses lamed after the covenant idiom.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward genitival title identifying the covenant God of the nation.
- source_word: וְיָשֹׁב
  chosen: may turn away
  alternatives:
  - and he will turn back
  - so that he may turn back
  lexicon: HALOT
  rationale: Here the verb expresses desired result/purpose following Hezekiah's intention. 'May turn away' captures the volitional nuance in idiomatic English.
- source_word: מִמֶּנּוּ
  chosen: from us
  lexicon: HALOT
  rationale: First person common plural pronominal suffix; the anger is to turn away from the people.
- source_word: חֲרוֹן אַפּוֹ
  chosen: his burning anger
  alternatives:
  - the fierceness of his anger
  - his wrath
  lexicon: HALOT
  rationale: The Hebrew phrase intensifies divine anger. 'Burning anger' preserves the metaphor of heat better than the more abstract 'wrath' while remaining natural English.
