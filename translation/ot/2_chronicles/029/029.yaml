theological_decisions:
- issue: Rendering of שחה in a cultic setting
  chosen_reading: worshiped
  alternative_readings:
  - bowed down
  - prostrated themselves
  rationale: The verse describes the king and assembly responding to the completion
    of the burnt offering in temple worship. Translating שחה as 'worshiped' conveys
    the religious significance without denying the bodily action, which is already
    expressed by כרע. This preserves the text's liturgical force rather than reducing
    both verbs to near-synonymous physical motions.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
