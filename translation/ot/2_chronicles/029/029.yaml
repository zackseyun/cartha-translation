id: 2CH.29.29
reference: 2 Chronicles 29:29
source:
  edition: WLC
  text: וּ/כְ/כַלּ֖וֹת לְ/הַעֲל֑וֹת כָּרְע֗וּ הַ/מֶּ֛לֶךְ וְ/כָֽל הַ/נִּמְצְאִ֥ים
    אִתּ֖/וֹ וַ/יִּֽשְׁתַּחֲוֽוּ־׃
translation:
  text: And when they had finished offering up the burnt offering, the king and all
    who were present with him knelt down and worshiped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'when they finished offering up'; in this sacrificial
      context the sense is the completion of presenting the burnt offering.
    reason: lexical_alternative
  - marker: b
    text: Or 'bowed down' / 'prostrated themselves.' The Hebrew verb can denote the
      physical act of bowing in reverence; here it is rendered 'worshiped' because
      of the temple-sacrifice context.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/כְ/כַלּוֹת
  chosen: And when they had finished
  alternatives:
  - And as soon as they finished
  - Now when the finishing was complete
  lexicon: HALOT
  rationale: The conjunction plus preposition and infinitive construct of כלה introduces
    a temporal clause. 'And when they had finished' is natural English and preserves
    the sequence of events.
- source_word: לְ/הַעֲל֑וֹת
  chosen: offering up the burnt offering
  alternatives:
  - offering up
  - causing to ascend
  lexicon: HALOT
  rationale: The Hiphil infinitive of עלה literally means 'to cause to go up,' but
    in sacrificial context it refers to presenting an עולה, a burnt offering. Because
    the immediate cultic setting makes the object implicit, 'offering up the burnt
    offering' makes the sacrificial sense explicit in idiomatic English without undue
    paraphrase.
- source_word: כָּרְע֗וּ
  chosen: knelt down
  alternatives:
  - bowed the knee
  - bent the knee
  lexicon: HALOT
  rationale: כרע denotes kneeling or bending the knee. 'Knelt down' is clear modern
    English and distinguishes this action from the following verb for prostration/worship.
- source_word: הַ/מֶּ֛לֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun.
- source_word: וְ/כָֽל הַ/נִּמְצְאִ֥ים אִתּ֖/וֹ
  chosen: and all who were present with him
  alternatives:
  - and everyone found with him
  - and all those with him
  lexicon: HALOT
  rationale: The Niphal participle of מצא here idiomatically means those present or
    in attendance. 'Who were present with him' is the most natural contextual rendering.
- source_word: וַ/יִּֽשְׁתַּחֲוֽוּ
  chosen: worshiped
  alternatives:
  - bowed down
  - prostrated themselves
  lexicon: HALOT
  rationale: The Hishtaphel/Hishtahawah form of שחה commonly denotes bowing down in
    reverence or worship. In this temple-sacrifice context, 'worshiped' best captures
    the religious act, while the preceding 'knelt down' already represents the bodily
    posture.
