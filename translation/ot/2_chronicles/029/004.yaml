id: 2CH.29.4
reference: 2 Chronicles 29:4
source:
  edition: WLC
  text: וַ/יָּבֵ֥א אֶת הַ/כֹּהֲנִ֖ים וְ/אֶת הַ/לְוִיִּ֑ם וַ/יַּֽאַסְפֵ֖/ם לִ/רְח֥וֹב
    הַ/מִּזְרָֽח־־׃
translation:
  text: Then he brought in the priests and the Levites and assembled them in the eastern
    square.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gathered them in the square on the east side.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  chosen: Then he brought in
  alternatives:
  - And he brought
  - Then he brought
  lexicon: HALOT
  rationale: From בוא in the Hiphil wayyiqtol, meaning to cause to come/bring in.
    'Then' reflects normal narrative progression of the waw-consecutive in readable
    English. 'Brought in' is preferable to simply 'brought' because the context is
    movement into the temple precincts or relevant area.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כהנים; no contextual reason to vary.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of לוים as the Levitical temple personnel distinct
    from the priests.
- source_word: וַיַּאַסְפֵם
  chosen: assembled them
  alternatives:
  - gathered them
  - collected them
  lexicon: HALOT
  rationale: From אסף with 3mp suffix, 'gather/assemble them.' 'Assembled' fits the
    formal public setting slightly better than 'gathered,' while remaining natural
    English.
- source_word: לִרְחוֹב
  chosen: in the square
  alternatives:
  - into the square
  - in the open area
  - in the broad place
  lexicon: HALOT
  rationale: רחוב denotes a broad open place or plaza/square, often a public open
    area rather than a street in the modern sense. 'Square' best communicates the
    setting in contemporary English.
- source_word: הַמִּזְרָח
  chosen: the eastern
  alternatives:
  - the east
  - on the east side
  lexicon: HALOT
  rationale: מזרח means east/eastern. In construct-like relation with רחוב here, 'the
    eastern square' is the most natural English expression.
