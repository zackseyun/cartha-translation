id: 2CH.29.19
reference: 2 Chronicles 29:19
source:
  edition: WLC
  text: וְ/אֵ֣ת כָּל הַ/כֵּלִ֗ים אֲשֶׁ֣ר הִזְנִיחַ֩ הַ/מֶּ֨לֶךְ אָחָ֧ז בְּ/מַלְכוּת֛/וֹ
    בְּ/מַעֲל֖/וֹ הֵכַ֣נּוּ וְ/הִקְדָּ֑שְׁנוּ וְ/הִנָּ֕/ם לִ/פְנֵ֖י מִזְבַּ֥ח יְהוָֽה־׃ס
translation:
  text: And all the vessels that King Ahaz discarded during his reign in his unfaithfulness,
    we have prepared and consecrated; and behold, they are before the altar of the
    LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cast aside' or 'neglected' for 'discarded.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in his trespass' or 'in his faithlessness.' The Hebrew emphasizes Ahaz's
      breach of faith.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֵּלִים
  chosen: the vessels
  alternatives:
  - the utensils
  - the articles
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for implements/articles. In temple context, 'vessels'
    is the most natural and established English rendering without becoming overly
    technical.
- source_word: הִזְנִיחַ
  chosen: discarded
  alternatives:
  - cast aside
  - neglected
  - rejected
  lexicon: HALOT
  rationale: The verb conveys treating something as cast off or set aside. 'Discarded'
    captures the active abandonment of temple vessels by Ahaz better than the weaker
    'neglected.'
- source_word: בְּמַלְכוּתוֹ
  chosen: during his reign
  alternatives:
  - in his reign
  - while he reigned
  lexicon: HALOT
  rationale: The preposition with 'his kingship/reign' is temporal here. 'During his
    reign' is idiomatic modern English.
- source_word: בְּמַעֲלוֹ
  chosen: in his unfaithfulness
  alternatives:
  - in his trespass
  - when he acted unfaithfully
  - in his faithlessness
  lexicon: HALOT
  rationale: מַעַל denotes breach of faith, treachery, or unfaithful act, often in
    covenantal/religious contexts. 'In his unfaithfulness' preserves that moral-religious
    sense better than the more opaque 'trespass.'
- source_word: הֵכַנּוּ
  chosen: we have prepared
  alternatives:
  - we have set in order
  - we have made ready
  lexicon: HALOT
  rationale: כון in the hiphil commonly means to prepare or make ready. 'Prepared'
    is clear and fits the restoration of temple vessels.
- source_word: וְהִקְדָּשְׁנוּ
  chosen: and consecrated
  alternatives:
  - and sanctified
  - and made holy
  lexicon: HALOT
  rationale: קדשׁ in the hiphil means to set apart as holy. 'Consecrated' is the most
    fitting cultic English term in this temple setting.
- source_word: וְהִנָּם
  chosen: and behold, they are
  alternatives:
  - and here they are
  - behold, they are
  lexicon: HALOT
  rationale: The particle plus pronoun draws attention to the present state/location
    of the vessels. 'And behold, they are' preserves the demonstrative force while
    remaining readable.
- source_word: לִפְנֵי מִזְבַּח יְהוָה
  chosen: before the altar of the LORD
  alternatives:
  - in front of the altar of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי regularly means 'before/in the presence of.' 'Before the altar
    of the LORD' is both idiomatic and faithful. Per doctrine, יְהוָה is rendered
    'the LORD'.
