id: 2CH.29.35
reference: 2 Chronicles 29:35
source:
  edition: WLC
  text: וְ/גַם עֹלָ֨ה לָ/רֹ֜ב בְּ/חֶלְבֵ֧י הַ/שְּׁלָמִ֛ים וּ/בַ/נְּסָכִ֖ים לָ/עֹלָ֑ה וַ/תִּכּ֖וֹן עֲבוֹדַ֥ת בֵּית יְהוָֽה־־׃
translation:
  text: And the burnt offerings were also in abundance, with the fat of the peace offerings and the drink offerings for the burnt offerings. So the service of the house of Yahweh was established.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "fellowship offerings" for "peace offerings."
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: And ... also
  alternatives:
  - and also
  - moreover
  lexicon: HALOT
  rationale: Conveys additive force linking this clause to the preceding context while keeping natural English word order.
- source_word: עֹלָה
  chosen: burnt offerings
  alternatives:
  - burnt offering
  lexicon: HALOT
  rationale: Although morphologically singular, it functions collectively here in context of many sacrifices; English plural best reflects the sense with לָרֹב ('in abundance').
- source_word: לָרֹב
  chosen: in abundance
  alternatives:
  - in great number
  - abundantly
  lexicon: HALOT
  rationale: Idiomatic rendering of the preposition plus noun indicating large quantity.
- source_word: בְּחֶלְבֵי
  chosen: with the fat of
  alternatives:
  - along with the fat portions of
  - including the fat of
  lexicon: HALOT
  rationale: The preposition is rendered associatively, and חלב in sacrificial context refers to the fat portions offered to God.
- source_word: הַשְּׁלָמִים
  chosen: the peace offerings
  alternatives:
  - the fellowship offerings
  lexicon: HALOT
  rationale: Traditional but still intelligible rendering for שְׁלָמִים in sacrificial contexts; preserves the established cultic category. 'Fellowship offerings' is possible but less directly tied to the Hebrew sacrificial term.
- source_word: וּבַנְּסָכִים
  chosen: and with the drink offerings
  alternatives:
  - and the libations
  lexicon: HALOT
  rationale: נְסָכִים are liquid offerings poured out; 'drink offerings' is standard, clear modern English.
- source_word: לָעֹלָה
  chosen: for the burnt offerings
  alternatives:
  - belonging to the burnt offerings
  - for the burnt offering
  lexicon: HALOT
  rationale: Best taken as indicating association with the burnt offerings just mentioned; plural in English matches the collective sense of עֹלָה in this verse.
- source_word: וַתִּכּוֹן
  chosen: was established
  alternatives:
  - was set in order
  - was made ready
  - was restored
  lexicon: HALOT
  rationale: From כון, indicating being set firmly or put in proper order. 'Was established' captures the resultative sense after the temple service had been disrupted.
- source_word: עֲבוֹדַת בֵּית יְהוָה
  chosen: the service of the house of the LORD
  alternatives:
  - the service of the LORD's house
  - the temple service of the LORD
  lexicon: HALOT
  rationale: Keeps the construct chain transparent and preserves the cultic sense of עֲבוֹדָה as temple service. YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrinal guideline for the divine name.
