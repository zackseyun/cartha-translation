id: 2CH.29.25
reference: 2 Chronicles 29:25
source:
  edition: WLC
  text: וַ/יַּֽעֲמֵ֨ד אֶת הַ/לְוִיִּ֜ם בֵּ֣ית יְהוָ֗ה בִּ/מְצִלְתַּ֨יִם֙ בִּ/נְבָלִ֣ים
    וּ/בְ/כִנֹּר֔וֹת בְּ/מִצְוַ֥ת דָּוִ֛יד וְ/גָ֥ד חֹזֵֽה הַ/מֶּ֖לֶךְ וְ/נָתָ֣ן הַ/נָּבִ֑יא
    כִּ֧י בְ/יַד יְהוָ֛ה הַ/מִּצְוָ֖ה בְּ/יַד נְבִיאָֽי/ו־־־־׃ס
translation:
  text: He stationed the Levites in the house of the LORD with cymbals, harps, and
    lyres, according to the command of David and of Gad the king’s seer and Nathan
    the prophet, for the command was from the LORD through his prophets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for by the hand of the LORD was the command, by the
      hand of his prophets.'
    reason: lexical_alternative
  - marker: b
    text: '''Gad the king’s seer'' uses ''seer'' to reflect the Hebrew title חֹזֶה,
      a term distinct from ''prophet,'' though closely related in function.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֵד
  chosen: He stationed
  alternatives:
  - He set
  - He placed
  - He appointed
  lexicon: HALOT
  rationale: 'The Hiphil of עמד here is causative: Hezekiah caused the Levites to
    take their place for liturgical service. ''Stationed'' captures both placement
    and official function better than the flatter ''set'' or ''placed''.'
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/cultic group; no reason to paraphrase.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Formal phrase preserved. 'House of the LORD' reflects the Hebrew directly;
    'temple' is possible but slightly less transparent to the source wording.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: בִּמְצִלְתַּיִם
  chosen: with cymbals
  lexicon: HALOT
  rationale: Instrumental beth indicates the means/equipment used in service. 'Cymbals'
    is the standard and accurate rendering.
- source_word: בִּנְבָלִים
  chosen: harps
  alternatives:
  - lutes
  - psalteries
  lexicon: HALOT
  rationale: נבל denotes a stringed instrument. Exact modern equivalence is uncertain,
    but 'harps' is the most established and readable rendering in this cultic-instrument
    list.
- source_word: וּבְכִנֹּרוֹת
  chosen: and lyres
  alternatives:
  - and harps
  lexicon: HALOT
  rationale: כִּנּוֹר is commonly identified as a lyre. Rendering it distinctly from
    נבל avoids collapsing two different instruments into one English term.
- source_word: בְּמִצְוַת
  chosen: according to the command of
  alternatives:
  - by the command of
  - in accordance with the command of
  lexicon: HALOT
  rationale: This prepositional phrase introduces the governing authorization for
    the arrangement. 'According to the command of' is natural English and preserves
    the sense of conformity.
- source_word: גָּד חֹזֵה הַמֶּלֶךְ
  chosen: Gad the king’s seer
  alternatives:
  - Gad, the seer of the king
  lexicon: HALOT
  rationale: Construct relationship is best rendered idiomatically in English as 'the
    king’s seer.' 'Seer' preserves the distinct Hebrew term חֹזֶה rather than flattening
    it to 'prophet'.
- source_word: נָתָן הַנָּבִיא
  chosen: Nathan the prophet
  lexicon: HALOT
  rationale: Straightforward appositional title; 'prophet' should be retained.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי gives the reason for the preceding appeal to David, Gad, and
    Nathan: the command ultimately came from the LORD. ''For'' fits the explanatory
    flow.'
- source_word: בְיַד יְהוָה ... בְיַד נְבִיאָיו
  chosen: was from the LORD through his prophets
  alternatives:
  - was by the hand of the LORD by the hand of his prophets
  - came from the LORD by means of his prophets
  lexicon: HALOT
  rationale: The idiom 'by the hand of' denotes agency/mediation. In contemporary
    English, 'from the LORD through his prophets' communicates both ultimate source
    and prophetic mediation without wooden repetition.
- source_word: הַמִּצְוָה
  chosen: the command
  alternatives:
  - the commandment
  - this command
  lexicon: HALOT
  rationale: Definite singular refers to the directive just mentioned. 'Command' is
    natural and sufficiently formal; 'commandment' sounds overly legalistic in this
    narrative context.
