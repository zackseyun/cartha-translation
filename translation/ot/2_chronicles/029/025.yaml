theological_decisions:
- issue: Relationship between Davidic liturgical order and divine authority
  chosen_reading: The command concerning the musical arrangement is presented as ultimately
    from the LORD, mediated through his prophets, not merely as Davidic preference.
  alternative_readings:
  - The command was only Davidic royal policy later attributed to divine sanction
  rationale: 'The clause כִּי בְיַד יְהוָה הַמִּצְוָה בְּיַד נְבִיאָיו explicitly
    grounds the arrangement in divine command mediated by prophets. The translation
    preserves both levels of agency: David/Gad/Nathan are named, but the source is
    the LORD.'
