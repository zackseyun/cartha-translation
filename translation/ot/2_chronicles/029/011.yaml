id: 2CH.29.11
reference: 2 Chronicles 29:11
source:
  edition: WLC
  text: בָּנַ֕/י עַתָּ֖ה אַל תִּשָּׁל֑וּ כִּֽי בָ/כֶ֞ם בָּחַ֣ר יְהוָ֗ה לַ/עֲמֹ֤ד לְ/פָנָי/ו֙
    לְ/שָׁ֣רְת֔/וֹ וְ/לִ/הְי֥וֹת ל֖/וֹ מְשָׁרְתִ֥ים וּ/מַקְטִרִֽים־־׃ס
translation:
  text: My sons, do not be negligent now, for the LORD has chosen you to stand before
    him, to minister to him, and to be his ministers and burners of incense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “do not be slack” or “do not be careless.”'
    reason: lexical_alternative
  - marker: b
    text: Hebrew “to stand before him,” a priestly expression for serving in God's
      presence.
    reason: cultural_note
  - marker: c
    text: 'Or: “and those who offer incense.”'
    reason: lexical_alternative
  - marker: d
    text: Or 'and to be his ministers and those who burn incense'.
    reason: previous_rendering
lexical_decisions:
- source_word: בָּנַי
  chosen: My sons
  alternatives:
  - My children
  lexicon: HALOT
  rationale: Literal vocative from 'sons' with 1cs suffix. Gender-accurate rendering
    fits the address to Levites/priests in context; 'children' would flatten the masculine
    form and social register.
- source_word: עַתָּה
  chosen: now
  alternatives:
  - at this time
  lexicon: HALOT
  rationale: Simple temporal adverb; 'now' is natural and preserves the exhortational
    force.
- source_word: אַל תִּשָּׁלוּ
  chosen: do not be negligent
  alternatives:
  - do not be slack
  - do not be careless
  - do not be deceived
  lexicon: HALOT
  rationale: From שלה in this stem/context, the sense is to be slack, remiss, or negligent.
    'Do not be negligent' communicates the practical exhortation clearly in modern
    English. 'Deceived' reflects a different semantic development and does not fit
    the cultic-duty context here.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the exhortation. 'For' is concise and natural.
- source_word: בָכֶם בָּחַר יְהוָה
  chosen: the LORD has chosen you
  alternatives:
  - the LORD chose you
  lexicon: HALOT
  rationale: Fronted prepositional phrase marks the object of divine choice. English
    naturally renders this as 'has chosen you.' The divine name follows doctrine default
    as 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the Tetragrammaton, render as 'the LORD.'
- source_word: לַעֲמֹד לְפָנָיו
  chosen: to stand before him
  alternatives:
  - to attend before him
  lexicon: HALOT
  rationale: Cultic idiom for taking one's place in service before God. 'Stand before
    him' preserves the Hebrew image and remains understandable.
- source_word: לְשָׁרְתוֹ
  chosen: to minister to him
  alternatives:
  - to serve him
  lexicon: HALOT
  rationale: שרת in priestly/cultic contexts often denotes ministerial service. 'Minister'
    preserves the liturgical nuance better than the broader 'serve.'
- source_word: וְלִהְיוֹת לוֹ מְשָׁרְתִים
  chosen: and to be his ministers
  alternatives:
  - and to be his servants
  - and to be ministering to him
  lexicon: HALOT
  rationale: The infinitive plus predicate participle/noun-like participle expresses
    appointed status/function. 'His ministers' is concise and preserves the cultic
    role; 'servants' is too broad in this context.
- source_word: וּמַקְטִרִים
  chosen: and those who burn incense
  alternatives:
  - and incense burners
  - and those who offer incense
  lexicon: HALOT
  rationale: Hiphil participle of קטר in temple context refers to making offerings
    go up in smoke, especially incense here. 'Those who burn incense' is explicit
    and natural; 'offer incense' is possible but slightly more interpretive.
