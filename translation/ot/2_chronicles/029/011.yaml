  from: and to be his ministers and those who burn incense
  to: and to be his ministers and to burn incense
  rationale: 'The Hebrew coordinates two participles functioning as nouns of role:
    ''ministers'' (מְשָׁרְתִים) and ''(incense) burners'' (מַקְטִרִים). The current
    rendering breaks the parallel structure by using a single noun for the first role
    and a descriptive clause for the second, which is slightly awkward. Converting
    the second participle into a parallel infinitive (''and to burn incense'') is
    a common and effective translation strategy for this type of Hebrew construction.
    It preserves the sense of two parallel duties in a way that is more fluid and
    natural in English, thereby better reflecting the force of the original.'
