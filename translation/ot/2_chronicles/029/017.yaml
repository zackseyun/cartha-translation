id: 2CH.29.17
reference: 2 Chronicles 29:17
source:
  edition: WLC
  text: וַ֠/יָּחֵלּוּ בְּ/אֶחָ֞ד לַ/חֹ֣דֶשׁ הָ/רִאשׁוֹן֮ לְ/קַדֵּשׁ֒ וּ/בְ/י֧וֹם שְׁמוֹנָ֣ה
    לַ/חֹ֗דֶשׁ בָּ֚אוּ לְ/אוּלָ֣ם יְהוָ֔ה וַ/יְקַדְּשׁ֥וּ אֶת בֵּית יְהוָ֖ה לְ/יָמִ֣ים
    שְׁמוֹנָ֑ה וּ/בְ/י֨וֹם שִׁשָּׁ֥ה עָשָׂ֛ר לַ/חֹ֥דֶשׁ הָ/רִאשׁ֖וֹן כִּלּֽוּ־־׃ס
translation:
  text: They began to consecrate on the first day of the first month, and on the eighth
    day of the month they came to the vestibule of the LORD. Then they consecrated
    the house of the LORD in eight days, and on the sixteenth day of the first month
    they finished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'portico' or 'porch' of the LORD' for 'vestibule of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּחֵלּוּ
  chosen: they began
  alternatives:
  - they started
  lexicon: HALOT
  rationale: From חלל in the Hiphil/wayyiqtol sense 'begin.' 'They began' is the natural
    English narrative equivalent and preserves the sequential action.
- source_word: לְקַדֵּשׁ
  chosen: to consecrate
  alternatives:
  - to sanctify
  - to make holy
  lexicon: HALOT
  rationale: קדשׁ here refers to setting apart the temple precincts for holy use through
    ritual purification. 'Consecrate' is clear modern English and fits temple context
    better than the more abstract 'sanctify.'
- source_word: בְּאֶחָד לַחֹדֶשׁ הָרִאשׁוֹן
  chosen: on the first day of the first month
  alternatives:
  - on day one of the first month
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'on one of the month, the first,' meaning
    the first day of the first month. Expanded slightly for idiomatic English clarity.
- source_word: וּבְיוֹם שְׁמוֹנָה לַחֹדֶשׁ
  chosen: and on the eighth day of the month
  alternatives:
  - and on day eight of the month
  lexicon: HALOT
  rationale: Standard Hebrew date formula rendered idiomatically in English.
- source_word: בָּאוּ לְאוּלָם יְהוָה
  chosen: they came to the vestibule of the LORD
  alternatives:
  - they came to the portico of the LORD
  - they entered as far as the porch of the LORD
  lexicon: HALOT
  rationale: אוּלָם denotes the temple's front hall/porch area. 'Vestibule' is a precise
    but still readable architectural term. 'Came to' preserves the directional sense
    without overreading full entry into the sanctuary.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: וַיְקַדְּשׁוּ אֶת בֵּית יְהוָה
  chosen: Then they consecrated the house of the LORD
  alternatives:
  - Then they sanctified the house of the LORD
  - Then they purified the house of the LORD
  lexicon: HALOT
  rationale: בית יהוה in Chronicles commonly refers to the temple. 'House of the LORD'
    preserves the canonical expression. 'Consecrated' maintains lexical consistency
    with קדשׁ in this verse.
- source_word: לְיָמִים שְׁמוֹנָה
  chosen: in eight days
  alternatives:
  - for eight days
  - over eight days
  lexicon: HALOT
  rationale: The phrase indicates duration required to complete this stage. 'In eight
    days' is idiomatic and fits the temporal sequence leading to the sixteenth day.
- source_word: וּבְיוֹם שִׁשָּׁה עָשָׂר לַחֹדֶשׁ הָרִאשׁוֹן
  chosen: and on the sixteenth day of the first month
  alternatives:
  - and on day sixteen of the first month
  lexicon: HALOT
  rationale: Standard date expression rendered in natural English.
- source_word: כִּלּוּ
  chosen: they finished
  alternatives:
  - they completed
  - they were done
  lexicon: HALOT
  rationale: כלה in the Piel means to complete/finish. 'They finished' is concise
    and natural in narrative context.
