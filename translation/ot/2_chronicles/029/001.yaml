id: 2CH.29.1
reference: 2 Chronicles 29:1
source:
  edition: WLC
  text: יְחִזְקִיָּ֣הוּ מָלַ֗ךְ בֶּן עֶשְׂרִ֤ים וְ/חָמֵשׁ֙ שָׁנָ֔ה וְ/עֶשְׂרִ֤ים וָ/תֵ֨שַׁע֙
    שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ אֲבִיָּ֖ה בַּת זְכַרְיָֽהוּ־־׃
translation:
  text: Hezekiah became king when he was twenty-five years old, and he reigned twenty-nine
    years in Jerusalem. His mother’s name was Abijah daughter of Zechariah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: יְחִזְקִיָּהוּ
  chosen: Hezekiah
  alternatives:
  - Hizkiah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name; names are transliterated
    rather than translated.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - reigned
  - was king
  lexicon: HALOT
  rationale: The first occurrence introduces accession to the throne, so 'became king'
    best captures the ingressive sense in natural English.
- source_word: בֶּן עֶשְׂרִים וְחָמֵשׁ שָׁנָה
  chosen: when he was twenty-five years old
  alternatives:
  - a son of twenty-five years
  lexicon: HALOT
  rationale: This is the standard Hebrew age idiom; idiomatic English is required
    rather than a wooden rendering.
- source_word: וְעֶשְׂרִים וָתֵשַׁע שָׁנָה
  chosen: twenty-nine years
  lexicon: HALOT
  rationale: Straightforward cardinal number plus 'years' indicating duration of reign.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - was king
  lexicon: HALOT
  rationale: The second occurrence refers to the duration of his rule, so 'reigned'
    is the most natural contextual rendering.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Locative preposition with place name indicating the seat of his reign.
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: Slightly smoothed English for the common Hebrew biographical formula
    while preserving the same information.
- source_word: אֲבִיָּה
  chosen: Abijah
  alternatives:
  - Abiijah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: בַּת
  chosen: daughter of
  lexicon: HALOT
  rationale: Regular genealogical use indicating parentage.
- source_word: זְכַרְיָהוּ
  chosen: Zechariah
  alternatives:
  - Zekaryahu
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
