id: 2CH.29.20
reference: 2 Chronicles 29:20
source:
  edition: WLC
  text: וַ/יַּשְׁכֵּם֙ יְחִזְקִיָּ֣הוּ הַ/מֶּ֔לֶךְ וַ/יֶּאֱסֹ֕ף אֵ֖ת שָׂרֵ֣י הָ/עִ֑יר וַ/יַּ֖עַל בֵּ֥ית יְהוָֽה׃
translation:
  text: Then King Hezekiah rose early, gathered the officials of the city, and went up to the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the house of Yahweh.'' The main text follows the project''s standard rendering of the divine name as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  chosen: rose early
  alternatives:
  - got up early
  - arose early
  lexicon: HALOT
  rationale: The Hiphil of שׁכם commonly conveys rising early or starting early in the morning. 'Rose early' is natural modern English and preserves the temporal nuance without unnecessary archaism.
- source_word: יְחִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Personal names are transliterated by standard English convention per project philosophy.
- source_word: הַמֶּלֶךְ
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: Rendered as the title 'King' before the proper name in idiomatic English ('King Hezekiah') rather than the more wooden 'Hezekiah the king.' This preserves the appositional force while improving readability.
- source_word: וַיֶּאֱסֹף
  chosen: gathered
  alternatives:
  - assembled
  - collected
  lexicon: HALOT
  rationale: אָסַף here means to bring people together. 'Gathered' is the most natural and sufficiently formal rendering in context.
- source_word: אֵת שָׂרֵי הָעִיר
  chosen: the officials of the city
  alternatives:
  - the princes of the city
  - the leaders of the city
  lexicon: HALOT
  rationale: שָׂרִים denotes officials, rulers, or princes. In this administrative context, 'officials' best communicates civic leaders without implying hereditary nobility. The construct phrase is preserved as 'of the city.'
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - ascended
  - went
  lexicon: HALOT
  rationale: עָלָה literally means 'go up.' Because movement to the temple is often described as ascent, 'went up' preserves the Hebrew imagery better than the flatter 'went.'
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  - the house of Yahweh
  lexicon: HALOT
  rationale: בֵּית יְהוָה is literally 'house of YHWH.' 'The house of the LORD' preserves the Hebrew expression and aligns with the project's default rendering of יְהוָה as 'the LORD.' 'Temple' is possible but less formally equivalent here.
