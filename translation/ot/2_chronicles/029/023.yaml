theological_decisions:
- issue: Meaning of חַטָּאת in sacrificial context
  chosen_reading: sin offering
  alternative_readings:
  - sin
  rationale: In priestly and cultic contexts, חַטָּאת often denotes the offering offered
    for sin rather than the abstract concept itself. The immediate reference to goats
    being presented and hands laid on them confirms the sacrificial sense.
- issue: Referent of the subject in 'they laid their hands'
  chosen_reading: the king and the assembly (or their representatives) laid hands
    on the goats
  alternative_readings:
  - the priests laid hands on the goats
  rationale: The nearest antecedents are 'the king and the assembly,' and the plural
    suffix in 'their hands' naturally points back to them collectively, likely directly
    or through representative action in the ritual setting. The translation keeps
    the Hebrew's plain wording without over-specifying the mechanics.
  doctrine_reference: Preserve theological tension rather than resolve it
