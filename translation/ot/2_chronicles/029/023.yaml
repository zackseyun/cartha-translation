id: 2CH.29.23
reference: 2 Chronicles 29:23
source:
  edition: WLC
  text: וַ/יַּגִּ֨ישׁוּ֙ אֶת שְׂעִירֵ֣י הַֽ/חַטָּ֔את לִ/פְנֵ֥י הַ/מֶּ֖לֶךְ וְ/הַ/קָּהָ֑ל
    וַ/יִּסְמְכ֥וּ יְדֵי/הֶ֖ם עֲלֵי/הֶֽם־׃
translation:
  text: Then they brought near the goats for the sin offering before the king and
    the assembly, and they laid their hands on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'presented the sin-offering goats before the king and the congregation.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'they laid their hands on them'; the subject most naturally
      refers to the king and the assembly, possibly acting through representatives.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּגִּישׁוּ
  chosen: they brought near
  alternatives:
  - they presented
  - they brought forward
  lexicon: HALOT
  rationale: The Hiphil of נגשׁ means to bring near or present. 'Brought near' preserves
    the sacrificial setting and the concrete movement toward those officiating, while
    remaining natural English.
- source_word: שְׂעִירֵי הַחַטָּאת
  chosen: the goats for the sin offering
  alternatives:
  - the goats of the sin offering
  - the sin-offering goats
  lexicon: HALOT
  rationale: שְׂעִירֵי identifies male goats, and הַחַטָּאת here refers to the sin
    offering rather than abstract 'sin.' 'Goats for the sin offering' is clear modern
    English and preserves the cultic sense.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: In this ceremonial context, לִפְנֵי marks presentation in front of the
    king and congregation. 'Before' is concise and idiomatic.
- source_word: הַמֶּלֶךְ וְהַקָּהָל
  chosen: the king and the assembly
  alternatives:
  - the king and the congregation
  lexicon: HALOT
  rationale: קָהָל commonly denotes the gathered community. 'Assembly' is readable
    modern English and fits the public liturgical setting without unnecessary ecclesiastical
    coloring.
- source_word: וַיִּסְמְכוּ יְדֵיהֶם
  chosen: they laid their hands
  alternatives:
  - they leaned their hands
  - they placed their hands
  lexicon: HALOT
  rationale: סמך with hands in sacrificial contexts refers to the ritual act of laying
    hands on the animal. 'Laid their hands' is the standard clear rendering for this
    cultic gesture.
- source_word: עֲלֵיהֶם
  chosen: on them
  alternatives:
  - upon them
  lexicon: HALOT
  rationale: Refers back to the goats. 'On them' is natural modern English.
