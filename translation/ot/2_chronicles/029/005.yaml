id: 2CH.29.5
reference: 2 Chronicles 29:5
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר לָ/הֶ֖ם שְׁמָע֣וּ/נִי הַ/לְוִיִּ֑ם עַתָּ֣ה הִֽתְקַדְּשׁ֗וּ וְ/קַדְּשׁוּ֙
    אֶת בֵּ֤ית יְהוָה֙ אֱלֹהֵ֣י אֲבֹתֵי/כֶ֔ם וְ/הוֹצִ֥יאוּ אֶת הַ/נִּדָּ֖ה מִן הַ/קֹּֽדֶשׁ־־־׃
translation:
  text: And he said to them, “Listen to me, Levites. Now consecrate yourselves, and
    consecrate the house of the LORD, the God of your fathers, and carry the uncleanness
    out from the holy place.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the impurity” or “the filth”; the Hebrew term refers to what defiles
      the sanctuary.
    reason: lexical_alternative
  - marker: b
    text: Or “from the sanctuary.”
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמָעוּנִי
  chosen: Listen to me
  alternatives:
  - Hear me
  lexicon: HALOT
  rationale: Imperative of שׁמע with 1cs suffix. 'Listen to me' is natural modern
    English while preserving the direct summons; 'Hear me' is possible but slightly
    more archaic/formal.
- source_word: הַלְוִיִּם
  chosen: Levites
  lexicon: HALOT
  rationale: Direct address to the Levitical personnel; standard transliteration of
    the group name is appropriate.
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At once
  lexicon: HALOT
  rationale: Temporal adverb marking immediate action. 'Now' preserves both timing
    and exhortational force without overinterpreting urgency.
- source_word: הִתְקַדְּשׁוּ
  chosen: consecrate yourselves
  alternatives:
  - sanctify yourselves
  - make yourselves holy
  lexicon: HALOT
  rationale: Hitpael imperative of קדשׁ, reflexive sense. 'Consecrate yourselves'
    fits cultic preparation language in this temple-cleansing context and is clearer
    for modern readers than 'sanctify yourselves.'
- source_word: וְקַדְּשׁוּ
  chosen: and consecrate
  alternatives:
  - and sanctify
  lexicon: HALOT
  rationale: Piel imperative of קדשׁ directed toward the temple. Using the same English
    root as the previous verb preserves the Hebrew wordplay and consistency.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew expression;
    'temple' is interpretive but not necessary here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: אֱלֹהֵי אֲבֹתֵיכֶם
  chosen: the God of your fathers
  alternatives:
  - the God of your ancestors
  lexicon: HALOT
  rationale: Formal covenantal expression. 'Fathers' matches the Hebrew and the project's
    gender-accurate policy; 'ancestors' is possible but less formally aligned with
    the source.
- source_word: וְהוֹצִיאוּ
  chosen: and carry ... out
  alternatives:
  - and bring ... out
  - and remove
  lexicon: HALOT
  rationale: Hiphil imperative of יצא in causative/removal sense. 'Carry ... out'
    fits the physical removal of defiling objects from the sanctuary better than the
    more generic 'remove.'
- source_word: הַנִּדָּה
  chosen: the uncleanness
  alternatives:
  - the impurity
  - the filth
  lexicon: HALOT
  rationale: נִדָּה can denote impurity/uncleanness, especially cultic defilement.
    'Uncleanness' best captures ritual pollution in this temple context; 'filth' is
    too concrete and 'impurity' is viable but slightly less idiomatic here.
- source_word: מִן הַקֹּדֶשׁ
  chosen: out from the holy place
  alternatives:
  - from the sanctuary
  - from the holy thing/place
  lexicon: HALOT
  rationale: קֹדֶשׁ here refers to the sacred precinct/holy place rather than abstract
    holiness. 'The holy place' preserves the cultic sense and avoids flattening it
    to the broader 'sanctuary,' though that remains a valid alternative.
