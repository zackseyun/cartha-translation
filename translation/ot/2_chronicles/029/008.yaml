id: 2CH.29.8
reference: 2 Chronicles 29:8
source:
  edition: WLC
  text: וַ/יְהִי֙ קֶ֣צֶף יְהוָ֔ה עַל יְהוּדָ֖ה וִ/ירוּשָׁלִָ֑ם וַ/יִּתְּנֵ֤/ם ל/זועה לְ/שַׁמָּ֣ה וְ/לִ/שְׁרֵקָ֔ה כַּ/אֲשֶׁ֛ר אַתֶּ֥ם רֹאִ֖ים בְּ/עֵינֵי/כֶֽם־׃
translation:
  text: So the wrath of Yahweh came upon Judah and Jerusalem, and he made them a horror, a desolation, and an object of hissing, as you see with your own eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a horror' for 'an object of terror'; the Hebrew term denotes something that causes shuddering or horror.
    reason: lexical_alternative
  - marker: b
    text: Or 'of scornful whistling'; 'hissing' refers to the derisive reaction of onlookers to devastation.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֶצֶף
  chosen: wrath
  alternatives:
  - anger
  - indignation
  lexicon: HALOT
  rationale: Conveys intense divine anger in judgment more strongly than 'anger' while remaining natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: וַיְהִי ... עַל
  chosen: came upon
  alternatives:
  - was upon
  - fell on
  lexicon: HALOT
  rationale: The idiom indicates the onset of wrath against Judah and Jerusalem; 'came upon' is idiomatic modern English and preserves the force.
- source_word: וַיִּתְּנֵם
  chosen: he made them
  alternatives:
  - he gave them over
  - he set them
  lexicon: HALOT
  rationale: With נתן plus ל before resulting states, the sense is that God handed them over to become something publicly visible; 'made them' communicates the resultant condition clearly in English.
- source_word: לְזוֹעָה
  chosen: an object of terror
  alternatives:
  - a horror
  - a trembling
  lexicon: HALOT
  rationale: The noun denotes something causing horror/shuddering. 'Object of terror' captures that Judah and Jerusalem became a fearful spectacle to others.
- source_word: לְשַׁמָּה
  chosen: desolation
  alternatives:
  - appallment
  - ruin
  lexicon: HALOT
  rationale: A standard judgment term for devastation; 'desolation' is both accurate and readable.
- source_word: וְלִשְׁרֵקָה
  chosen: of hissing
  alternatives:
  - of scornful whistling
  - of mockery
  lexicon: HALOT
  rationale: Refers to the derisive hissing/whistling of onlookers at a judged people. 'Hissing' preserves the concrete image; the nuance of derision is implied by the judgment context.
- source_word: כַּאֲשֶׁר אַתֶּם רֹאִים בְּעֵינֵיכֶם
  chosen: as you see with your own eyes
  alternatives:
  - as you yourselves see
  - as you are seeing with your eyes
  lexicon: HALOT
  rationale: The phrase is emphatic; 'with your own eyes' preserves the direct appeal to present, visible evidence.
