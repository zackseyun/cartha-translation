theological_decisions:
- issue: Rendering of divine judgment language without softening
  chosen_reading: So the wrath of the LORD came upon Judah and Jerusalem, and he made them an object of terror, of desolation, and of hissing
  alternative_readings:
  - So the anger of the LORD was against Judah and Jerusalem, and he gave them up to horror, desolation, and scorn
  rationale: The Hebrew presents covenantal judgment in stark terms. The translation preserves the severity of divine wrath and the public shame of judgment without importing additional doctrinal explanation.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition.'
