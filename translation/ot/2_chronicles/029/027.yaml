theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God in a worship setting. Following
    the project's doctrine, the tetragrammaton is rendered 'the LORD' rather than
    transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of שִׁיר יְהוָה
  chosen_reading: the song of the LORD
  alternative_readings:
  - the song to the LORD
  - the song for the LORD
  rationale: The Hebrew construct is preserved in the main text to avoid resolving
    whether the phrase emphasizes possession, dedication, or direction. Because English
    readers may hear ambiguity differently, an alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
