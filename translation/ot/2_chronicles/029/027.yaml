id: 2CH.29.27
reference: 2 Chronicles 29:27
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ חִזְקִיָּ֔הוּ לְ/הַעֲל֥וֹת הָ/עֹלָ֖ה לְ/הַ/מִּזְבֵּ֑חַ וּ/בְ/עֵ֞ת
    הֵחֵ֣ל הָֽ/עוֹלָ֗ה הֵחֵ֤ל שִׁיר יְהוָה֙ וְ/הַ/חֲצֹ֣צְר֔וֹת וְ/עַ֨ל יְדֵ֔י כְּלֵ֖י
    דָּוִ֥יד מֶֽלֶךְ יִשְׂרָאֵֽל־־־׃
translation:
  text: Then Hezekiah said to offer up the burnt offering on the altar. And at the
    time the burnt offering began, the song of the LORD began also, with the trumpets
    and by means of the instruments of David king of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the song to the LORD.” The Hebrew literally reads “the song of the
      LORD.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - commanded
  - ordered
  lexicon: HALOT
  rationale: The verb is the common 'say.' In context it introduces a royal directive,
    but 'said' preserves the Hebrew wording without over-interpreting the force as
    a stronger command verb.
- source_word: לְהַעֲלוֹת
  chosen: to offer up
  alternatives:
  - to bring up
  - to present
  lexicon: HALOT
  rationale: עלה in sacrificial contexts commonly means to offer up, especially for
    an עולה. This rendering preserves the cultic sense and the upward/offering nuance.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the burnt offering. 'Burnt offering' is
    the clearest established English equivalent.
- source_word: לַמִּזְבֵּחַ
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: Straightforward cultic location. 'On the altar' is natural modern English
    while remaining formally close.
- source_word: וּבְעֵת
  chosen: at the time
  alternatives:
  - when
  - at the moment
  lexicon: HALOT
  rationale: This preserves the temporal marker with a slightly formal cadence suitable
    to the narrative.
- source_word: הֵחֵל ... הֵחֵל
  chosen: began ... began also
  alternatives:
  - started ... started
  - commenced ... commenced
  lexicon: HALOT
  rationale: 'The repeated verb creates a deliberate coordination: as the burnt offering
    began, the song began. Repeating ''began'' in English preserves that literary
    effect.'
- source_word: שִׁיר יְהוָה
  chosen: the song of the LORD
  alternatives:
  - the song to the LORD
  - the song for the LORD
  - the song of praise to the LORD
  lexicon: HALOT
  rationale: The construct phrase is literally 'song of YHWH.' In context it likely
    means song directed to or belonging to the LORD in worship. The more literal 'song
    of the LORD' preserves the Hebrew form without adding 'praise,' which is implied
    but not explicit.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: הַחֲצֹצְרוֹת
  chosen: the trumpets
  alternatives:
  - the silver trumpets
  lexicon: HALOT
  rationale: חֲצֹצְרוֹת refers to trumpets, often priestly metal trumpets. 'The trumpets'
    is accurate; 'silver' is historically plausible but not stated here.
- source_word: וְעַל יְדֵי
  chosen: by means of
  alternatives:
  - with
  - through
  lexicon: HALOT
  rationale: This idiom can indicate agency or instrumentality. Here it most naturally
    introduces the instrumental means accompanying the song and trumpets.
- source_word: כְּלֵי דָּוִיד
  chosen: the instruments of David
  alternatives:
  - the musical instruments of David
  - the implements of David
  lexicon: HALOT
  rationale: כְּלִי is broad ('vessel, implement, instrument'), but in this liturgical
    context it refers to musical instruments associated with Davidic worship.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  lexicon: HALOT
  rationale: Standard royal title; retained as written.
