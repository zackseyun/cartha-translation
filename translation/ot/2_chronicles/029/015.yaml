id: 2CH.29.15
reference: 2 Chronicles 29:15
source:
  edition: WLC
  text: וַ/יַּֽאַסְפ֤וּ אֶת אֲחֵי/הֶם֙ וַ/יִּֽתְקַדְּשׁ֔וּ וַ/יָּבֹ֥אוּ כְ/מִצְוַת הַ/מֶּ֖לֶךְ בְּ/דִבְרֵ֣י יְהוָ֑ה לְ/טַהֵ֖ר בֵּ֥ית יְהוָֽה־־׃
translation:
  text: They gathered their brothers, consecrated themselves, and came, according to the command of the king, in accordance with the words of the LORD, to cleanse the house of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the word of the LORD.' The Hebrew reads 'by the words of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house of the LORD'; that is, the temple.
    reason: lexical_alternative
  - marker: c
    text: Or 'according to the command of the king by the words of the LORD'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיַּאַסְפוּ
  chosen: They gathered
  alternatives:
  - They assembled
  - They brought together
  lexicon: HALOT
  rationale: The verb from אסף commonly means to gather or assemble. 'Gathered' is natural English and preserves the active sense without adding nuance beyond the Hebrew.
- source_word: אֲחֵיהֶם
  chosen: their brothers
  alternatives:
  - their kinsmen
  - their fellow Levites
  lexicon: HALOT
  rationale: The noun literally means 'their brothers.' In context it refers to fellow Levites, but the text itself uses the kinship term, so 'their brothers' best preserves the source wording. This also follows the gender-accurate principle rather than flattening to a neutral term.
- source_word: וַיִּתְקַדְּשׁוּ
  chosen: consecrated themselves
  alternatives:
  - sanctified themselves
  - made themselves holy
  lexicon: HALOT
  rationale: The hitpael of קדשׁ here denotes ritual self-consecration for sacred service. 'Consecrated themselves' is clear modern English and fits temple-purification context better than the more archaic 'sanctified themselves.'
- source_word: וַיָּבֹאוּ
  chosen: and came
  alternatives:
  - and entered
  - and went in
  lexicon: HALOT
  rationale: The basic sense is 'came.' Although the context implies coming for temple service, the object of entry is not directly stated with this verb, so the simpler rendering is preferred.
- source_word: כְמִצְוַת הַמֶּלֶךְ
  chosen: according to the command of the king
  alternatives:
  - according to the king's command
  - as the king commanded
  lexicon: HALOT
  rationale: This phrase expresses conformity to royal instruction. 'According to the command of the king' is slightly more formal but closely reflects the Hebrew construction.
- source_word: בְּדִבְרֵי יְהוָה
  chosen: by the words of the LORD
  alternatives:
  - according to the word of the LORD
  - by the command of the LORD
  lexicon: HALOT
  rationale: The plural 'words' is present in Hebrew and likely indicates that the king's command was grounded in divine instruction. 'By the words of the LORD' preserves both the preposition and the plural form. An alternative smoother English rendering is possible, but this one remains more transparent to the source.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD.' This follows the project's stated default for the Tetragrammaton.
- source_word: לְטַהֵר
  chosen: to cleanse
  alternatives:
  - to purify
  - to make clean
  lexicon: HALOT
  rationale: The piel infinitive of טהר in temple context refers to ritual cleansing/purification. 'Cleanse' is idiomatic and suitably weighty in English.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of the LORD.' While 'temple' would be idiomatic, 'house of the LORD' preserves the covenantal and cultic wording of the Hebrew and is readily understandable.
