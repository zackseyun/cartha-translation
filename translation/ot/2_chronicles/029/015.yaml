theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering of YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered kinship term אֲחֵיהֶם
  chosen_reading: their brothers
  alternative_readings:
  - their fellow Levites
  - their kinsmen
  rationale: The Hebrew uses a masculine plural kinship term. In context it refers to male Levites, so the gendered rendering should be preserved rather than neutralized.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
revisions:
- timestamp: '2026-04-21T17:56:34Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/weighted_vocab/ot/2_chronicles/029/015.job-11228.json
  category: awkward_english
  tier: 1
  from: according to the command of the king by the words of the LORD
  to: according to the command of the king, in accordance with the words of the LORD
  rationale: The current rendering stacks two prepositions ('according to... by...') in a way that is grammatically valid but stylistically awkward and slightly unclear in English. The Hebrew phrase 'בְּדִבְרֵי יְהוָה' specifies the standard to which the king's command conformed. The suggested rewrite clarifies this relationship by using the more idiomatic 'in accordance with' and adding a comma, improving readability without altering the essential meaning.
