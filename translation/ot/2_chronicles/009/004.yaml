id: 2CH.9.4
reference: 2 Chronicles 9:4
source:
  edition: WLC
  text: וּ/מַאֲכַ֣ל שֻׁלְחָנ֡/וֹ וּ/מוֹשַׁ֣ב עֲבָדָי/ו֩ וּ/מַעֲמַ֨ד מְשָׁרְתָ֜י/ו וּ/מַלְבּֽוּשֵׁי/הֶ֗ם וּ/מַשְׁקָי/ו֙ וּ/מַלְבּ֣וּשֵׁי/הֶ֔ם וַ/עֲלִיָּת֔/וֹ אֲשֶׁ֥ר יַעֲלֶ֖ה בֵּ֣ית יְהוָ֑ה וְ/לֹא הָ֥יָה ע֛וֹד בָּ֖/הּ רֽוּחַ־׃
translation:
  text: the food of his table, the seating of his servants, the attendance of his ministers and their clothing, his cupbearers and their clothing, and the stairway by which he went up to the house of Yahweh, there was no more breath in her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following the parallel in 1 Kings 10:5, 'the burnt offering that he offered at the house of the LORD.' The Hebrew text here most naturally reads 'the stairway/ascent by which he went up.'
    reason: alternative_reading
  - marker: b
    text: 'Hebrew: ''there was no more breath in her,'' an idiom expressing overwhelming astonishment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַאֲכַל שֻׁלְחָנוֹ
  chosen: the food of his table
  alternatives:
  - the provision of his table
  - the fare of his table
  lexicon: HALOT
  rationale: מַאֲכַל denotes food/provision for eating. 'The food of his table' is a natural but still fairly formal rendering that preserves the concrete sense rather than paraphrasing broadly as 'provisions.'
- source_word: מוֹשַׁב עֲבָדָיו
  chosen: the seating of his servants
  alternatives:
  - the sitting of his servants
  - the places of his servants
  lexicon: HALOT
  rationale: מוֹשָׁב refers to seat, sitting place, or arrangement of seating. 'Seating' captures the courtly arrangement being observed. עֲבָדָיו here refers to royal servants/court officials, not slaves in a chattel-sense context.
- source_word: מַעֲמַד מְשָׁרְתָיו
  chosen: the attendance of his ministers
  alternatives:
  - the standing of his attendants
  - the service of his ministers
  lexicon: HALOT
  rationale: מַעֲמַד literally involves standing/station, likely the orderly attendance or stationing of those who served him. 'Attendance' communicates the visible court service arrangement. מְשָׁרְתָיו are those ministering/attending in royal service; 'ministers' fits the court context better than the more generic 'servants' and preserves distinction from עֲבָדָיו.
- source_word: מַלְבּוּשֵׁיהֶם
  chosen: their clothing
  alternatives:
  - their garments
  - their attire
  lexicon: HALOT
  rationale: The noun denotes clothing/garments. 'Clothing' is clear modern English and avoids unnecessary archaism while preserving the concrete detail.
- source_word: מַשְׁקָיו
  chosen: his cupbearers
  alternatives:
  - his butlers
  - those who served his drink
  lexicon: HALOT
  rationale: In royal context the term refers to those responsible for drink service, conventionally 'cupbearers.' 'Butlers' is too culturally specific and potentially misleading in modern English.
- source_word: עֲלִיָּתוֹ אֲשֶׁר יַעֲלֶה בֵּית יְהוָה
  chosen: the stairway by which he went up to the house of the LORD
  alternatives:
  - his ascent by which he went up to the house of the LORD
  - the burnt offering that he offered at the house of the LORD
  lexicon: HALOT
  rationale: The Masoretic Hebrew most naturally reads 'his ascent/stairway by which he went up to the house of the LORD.' Because the parallel in 1 Kings 10:5 is often rendered 'his burnt offerings,' an alternative should be preserved in a footnote. Here, following the given Hebrew text and original-language primacy, the architectural/processional sense is retained in the main text.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: בֵּית is literally 'house.' 'House of the LORD' preserves the Hebrew expression. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: וְלֹא הָיָה עוֹד בָּהּ רוּחַ
  chosen: there was no more breath in her
  alternatives:
  - she was breathless
  - she was overwhelmed
  - there was no more spirit in her
  lexicon: HALOT
  rationale: רוּחַ can mean breath, spirit, or wind. In this idiom describing astonishment, 'there was no more breath in her' preserves the vivid Hebrew image without overinterpreting it psychologically. More idiomatic English alternatives are possible but less transparent to the source.
