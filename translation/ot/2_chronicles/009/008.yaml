theological_decisions:
- issue: כִּסְאוֹ ('his throne') in relation to Solomon's kingship
  chosen_reading: Rendered as 'his throne,' referring to the LORD's throne, not merely Solomon's royal throne.
  alternative_readings:
  - '''the throne'' as a dynastic throne without strong theological emphasis'
  rationale: The Chronicler intentionally presents the Davidic/Solomonic kingship as exercised on behalf of and under the authority of the LORD. Preserving 'his throne' retains this theological claim without expanding beyond the text.
- issue: צְדָקָה in royal context
  chosen_reading: Rendered 'righteousness' alongside 'justice' in the main text.
  alternative_readings:
  - justice
  rationale: The pair מִשְׁפָּט וּצְדָקָה is a standard Hebrew royal expression. Since the project's contested-terms guidance about 'righteousness/justice' is specific to Pauline δικαιοσύνη, no footnote is required here; retaining 'righteousness' preserves the distinction between the two terms.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
