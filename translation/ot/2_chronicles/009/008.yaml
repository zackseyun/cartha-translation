id: 2CH.9.8
reference: 2 Chronicles 9:8
source:
  edition: WLC
  text: יְהִ֨י יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ בָּר֔וּךְ אֲשֶׁ֣ר חָפֵ֣ץ בְּ/ךָ֗ לְ/תִתְּ/ךָ֤ עַל כִּסְא/וֹ֙ לְ/מֶ֔לֶךְ לַ/יהוָ֖ה אֱלֹהֶ֑י/ךָ בְּ/אַהֲבַ֨ת אֱלֹהֶ֤י/ךָ אֶת יִשְׂרָאֵל֙ לְ/הַעֲמִיד֣/וֹ לְ/עוֹלָ֔ם וַ/יִּתֶּנְ/ךָ֤ עֲלֵי/הֶם֙ לְ/מֶ֔לֶךְ לַ/עֲשׂ֖וֹת מִשְׁפָּ֥ט וּ/צְדָקָֽה׀־־׃
translation:
  text: Blessed be the LORD your God, who delighted in you and set you on his throne as king for the LORD your God. Because your God loved Israel and desired to establish them forever, he made you king over them to administer justice and righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'May the LORD your God be blessed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to establish it forever,' with 'it' referring to Israel as a collective people.
    reason: lexical_alternative
  - marker: c
    text: Or 'Because your God loved Israel, to establish them forever, he made you king over them'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְהִי ... בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - May ... be blessed
  lexicon: HALOT
  rationale: The jussive of היה with בָּרוּךְ forms a benedictory expression. 'Blessed be' is idiomatic, concise, and preserves the blessing formula better than a more wooden 'may ... be blessed.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and broad English Bible intelligibility.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward possessive rendering; repeated consistently in the verse.
- source_word: חָפֵץ בְּךָ
  chosen: delighted in you
  alternatives:
  - took pleasure in you
  - was pleased with you
  lexicon: HALOT
  rationale: The verb conveys pleasure or delight. 'Delighted in you' is natural English and preserves the warm evaluative sense better than the flatter 'was pleased with you.'
- source_word: לְתִתְּךָ עַל כִּסְאוֹ
  chosen: set you on his throne
  alternatives:
  - put you on his throne
  - gave you to sit on his throne
  lexicon: HALOT
  rationale: This infinitive phrase expresses appointment to royal rule. 'Set you on his throne' is idiomatic and keeps the striking theology that Solomon's throne is God's throne.
- source_word: לְמֶלֶךְ לַיהוָה אֱלֹהֶיךָ
  chosen: as king for the LORD your God
  alternatives:
  - to be king for the LORD your God
  - as king belonging to the LORD your God
  lexicon: HALOT
  rationale: 'The lamed marks role/purpose: Solomon is installed as king in relation to the LORD. ''For the LORD your God'' preserves that representative/theocratic sense without overinterpreting it.'
- source_word: בְּאַהֲבַת אֱלֹהֶיךָ אֶת יִשְׂרָאֵל
  chosen: Because your God loved Israel
  alternatives:
  - In your God's love for Israel
  - Through your God's love for Israel
  lexicon: HALOT
  rationale: The beth with infinitive-like noun can express causal sense here. 'Because your God loved Israel' gives clear English and fits the logic of the sentence.
- source_word: לְהַעֲמִידוֹ לְעוֹלָם
  chosen: to establish them forever
  alternatives:
  - to make them stand forever
  - to establish it forever
  lexicon: HALOT
  rationale: The suffix is singular in form, likely referring collectively to Israel as a people. In English, 'them' best reflects the collective referent 'Israel' and avoids awkward singular 'it' for a nation in this context.
- source_word: וַיִּתֶּנְךָ עֲלֵיהֶם לְמֶלֶךְ
  chosen: he made you king over them
  alternatives:
  - he gave you over them as king
  - he appointed you king over them
  lexicon: HALOT
  rationale: Though the verb is literally 'gave,' in enthronement context it means appointing/installing. 'Made you king over them' is idiomatic and faithful to the sense.
- source_word: לַעֲשׂוֹת מִשְׁפָּט וּצְדָקָה
  chosen: to administer justice and righteousness
  alternatives:
  - to do justice and righteousness
  - to execute justice and righteousness
  lexicon: HALOT
  rationale: This royal formula denotes governing in accordance with just judgment and right order. 'Administer justice and righteousness' communicates the kingly function clearly while preserving both nouns.
