  category: awkward_english
  tier: 1
  from: Because your God loved Israel, to establish them forever, he made you king over them
  to: Because your God loved Israel and desired to establish them forever, he made you king over them
  rationale: In the Hebrew, the purpose of establishing Israel (לְהַעֲמִידוֹ) is tightly linked to God's love for Israel (בְּאַהֲבַת). The current English syntax, with the infinitive phrase set off by commas, is slightly awkward and makes the clause's relationship to the rest of the sentence ambiguous. It could be read as a second purpose for making Solomon king, rather than the purpose of God's love. Recasting it as a coordinated verb ('and desired to establish them') clarifies the logical flow and improves readability.
