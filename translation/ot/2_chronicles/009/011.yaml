id: 2CH.9.11
reference: 2 Chronicles 9:11
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ הַ֠/מֶּלֶךְ אֶת עֲצֵ֨י הָֽ/אַלְגּוּמִּ֜ים מְסִלּ֤וֹת לְ/בֵית יְהוָה֙ וּ/לְ/בֵ֣ית הַ/מֶּ֔לֶךְ וְ/כִנֹּר֥וֹת וּ/נְבָלִ֖ים לַ/שָּׁרִ֑ים וְ/לֹא נִרְא֥וּ כָ/הֵ֛ם לְ/פָנִ֖ים בְּ/אֶ֥רֶץ יְהוּדָֽה־־־׃
translation:
  text: And the king made from the algum wood stairways for the house of Yahweh and for the king’s house, and lyres and harps for the singers. Nothing like them had been seen before in the land of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stairs' for the house of the LORD and for the king’s house; the Hebrew term may refer to architectural approaches or stairways.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'algum'; in the parallel passage (1 Kgs 10:12) the wood is called 'almug.' The exact species is uncertain.
    reason: cross_reference
lexical_decisions:
- source_word: עֲצֵי הָאַלְגּוּמִּים
  chosen: the algum wood
  alternatives:
  - the almug wood
  - the algum trees/wood of algum
  lexicon: HALOT
  rationale: A rare term for a valuable imported wood. 'Algum' follows the Chronicles form directly; 'almug' reflects the parallel in Kings. Because the species is uncertain, transliteration is preferable to a speculative identification.
- source_word: מְסִלּוֹת
  chosen: walkways
  alternatives:
  - stairs
  - highways
  - terraces
  lexicon: HALOT
  rationale: The noun commonly denotes a raised way or highway, but in this architectural context it refers to constructed approaches made from the wood. 'Walkways' preserves the broader sense without overcommitting to 'stairs,' though that is a traditional rendering based partly on the parallel passage.
- source_word: לְבֵית יְהוָה וּלְבֵית הַמֶּלֶךְ
  chosen: for the house of the LORD and for the king’s house
  alternatives:
  - for the temple of the LORD and for the royal palace
  lexicon: HALOT
  rationale: '''House'' is the direct sense of בַּיִת and keeps the Hebrew idiom. ''Temple'' and ''palace'' are interpretive but possible; the more literal wording is retained in the main text.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: כִנֹּרוֹת
  chosen: lyres
  alternatives:
  - harps
  lexicon: HALOT
  rationale: כִּנּוֹר refers to a stringed instrument more closely approximated by 'lyre' than by the broader English 'harp.'
- source_word: נְבָלִים
  chosen: harps
  alternatives:
  - lutes
  - psalteries
  lexicon: HALOT
  rationale: נֵבֶל is another stringed instrument distinct from כִּנּוֹר. 'Harps' is a clear modern rendering, while exact instrument identification remains uncertain.
- source_word: לַשָּׁרִים
  chosen: for the singers
  alternatives:
  - for the musicians
  lexicon: HALOT
  rationale: The participial form from שׁיר naturally means 'those who sing.' Since the instruments are given to temple performers, 'singers' is the most direct rendering.
- source_word: וְלֹא נִרְאוּ כָהֵם לְפָנִים
  chosen: Nothing like them had been seen before
  alternatives:
  - No such things had ever been seen before
  - There had never before been seen anything like them
  lexicon: HALOT
  rationale: This idiom expresses unprecedented quality or rarity. The English is smoothed for readability while preserving the superlative force.
- source_word: בְּאֶרֶץ יְהוּדָה
  chosen: in the land of Judah
  alternatives:
  - in Judah
  lexicon: HALOT
  rationale: Retains the explicit noun 'land,' which is present in the Hebrew and gives a slightly more formal geographic sense.
