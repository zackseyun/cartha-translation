id: 2CH.5.10
reference: 2 Chronicles 5:10
source:
  edition: WLC
  text: אֵ֚ין בָּֽ/אָר֔וֹן רַ֚ק שְׁנֵ֣י הַ/לֻּח֔וֹת אֲשֶׁר נָתַ֥ן מֹשֶׁ֖ה בְּ/חֹרֵ֑ב אֲשֶׁ֨ר כָּרַ֤ת יְהוָה֙ עִם בְּנֵ֣י יִשְׂרָאֵ֔ל בְּ/צֵאתָ֖/ם מִ/מִּצְרָֽיִם־־׃פ
translation:
  text: There was nothing in the ark except the two tablets that Moses put there at Horeb, where Yahweh made a covenant with the people of Israel when they came out of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the two tablets that Moses placed at Horeb.' The Hebrew verb is literally 'gave,' but here it refers to placing the tablets in the ark.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  chosen: There was nothing
  alternatives:
  - there was not
  lexicon: HALOT
  rationale: Uses idiomatic English existential negation to introduce the clause naturally while preserving the sense of absence.
- source_word: בָּאָרוֹן
  chosen: in the ark
  alternatives:
  - inside the ark
  lexicon: HALOT
  rationale: Straightforward locative rendering of the preposition ב plus אָרוֹן.
- source_word: רַק
  chosen: except
  alternatives:
  - only
  lexicon: HALOT
  rationale: In English, 'nothing ... except' is the most natural equivalent to the Hebrew negation plus restrictive particle.
- source_word: שְׁנֵי הַלֻּחוֹת
  chosen: the two tablets
  alternatives:
  - the two stone tablets
  - the two tablets of stone
  lexicon: HALOT
  rationale: '''Tablets'' is the standard and sufficiently clear rendering of לֻחוֹת here; ''stone'' is not explicit in this verse and so is not added to the main text.'
- source_word: אֲשֶׁר נָתַן מֹשֶׁה
  chosen: that Moses put there
  alternatives:
  - that Moses placed
  - that Moses gave
  lexicon: HALOT
  rationale: Although נָתַן is literally 'gave,' in this context with an object located in the ark, English idiom prefers 'put there' or 'placed.' 'Put there' makes the spatial sense explicit without overtranslation.
- source_word: בְּחֹרֵב
  chosen: at Horeb
  alternatives:
  - in Horeb
  lexicon: HALOT
  rationale: English normally uses 'at' with a named location of this kind; Horeb is preserved as the Hebrew place-name rather than harmonized to Sinai.
- source_word: אֲשֶׁר כָּרַת יְהוָה עִם
  chosen: where the LORD made a covenant with
  alternatives:
  - which the LORD cut with
  - where the LORD cut a covenant with
  lexicon: HALOT
  rationale: כָּרַת בְּרִית is the standard idiom 'make/cut a covenant.' Since בְּרִית is implied rather than repeated, English supplies 'made a covenant' for clarity. 'Where' takes the relative clause as referring to Horeb, the most natural antecedent in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the people of Israel
  alternatives:
  - the sons of Israel
  - the children of Israel
  lexicon: HALOT
  rationale: This renders the collective sense naturally in modern English while preserving the referent. 'Sons/children of Israel' is more formal but less idiomatic here.
- source_word: בְּצֵאתָם מִמִּצְרַיִם
  chosen: when they came out of Egypt
  alternatives:
  - when they went out from Egypt
  - at their going out from Egypt
  lexicon: HALOT
  rationale: Temporal ב plus infinitive construct is well rendered by 'when they came out.' 'Came out' is idiomatic from the narrator's perspective and preserves the exodus reference.
