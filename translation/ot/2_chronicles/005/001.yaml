id: 2CH.5.1
reference: 2 Chronicles 5:1
source:
  edition: WLC
  text: וַ/תִּשְׁלַם֙ כָּל הַ/מְּלָאכָ֔ה אֲשֶׁר עָשָׂ֥ה שְׁלֹמֹ֖ה לְ/בֵ֣ית יְהוָ֑ה וַ/יָּבֵ֨א שְׁלֹמֹ֜ה אֶת קָדְשֵׁ֣י דָּוִ֣יד אָבִ֗י/ו וְ/אֶת הַ/כֶּ֤סֶף וְ/אֶת הַ/זָּהָב֙ וְ/אֶת כָּל הַ/כֵּלִ֔ים נָתַ֕ן בְּ/אֹצְר֖וֹת בֵּ֥ית הָ/אֱלֹהִֽים־־ס־׀־־־־׃פ
translation:
  text: Thus all the work that Solomon had done for the house of Yahweh was finished. Then Solomon brought in the holy things of David his father, and the silver, the gold, and all the vessels; he put them into the treasuries of the house of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the things dedicated by David his father' or 'the consecrated things of David his father.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשְׁלַם
  chosen: was finished
  alternatives:
  - was completed
  - came to an end
  lexicon: HALOT
  rationale: The verb from שלם in this stem/passive-like narrative context indicates completion of the work. 'Was finished' is idiomatic modern English and preserves the resultative sense better than a more wooden 'was completed' while remaining close to the Hebrew.
- source_word: כָּל הַמְּלָאכָה
  chosen: all the work
  alternatives:
  - all the workmanship
  - the whole work
  lexicon: HALOT
  rationale: מְלָאכָה here refers to the total labor/project associated with temple construction and furnishing. 'All the work' is natural and sufficiently broad.
- source_word: לְבֵית יְהוָה
  chosen: for the house of the LORD
  alternatives:
  - for the temple of the LORD
  - for the house of Yahweh
  lexicon: HALOT
  rationale: בַּיִת literally means 'house'; retaining 'house of the LORD' preserves the temple-as-house imagery. Per doctrine, יְהוָה is rendered 'the LORD,' not 'Yahweh.' 'For' reflects the lamed of purpose/reference in context.
- source_word: וַיָּבֵא
  chosen: brought in
  alternatives:
  - brought
  - caused to be brought in
  lexicon: HALOT
  rationale: The verb בוא in the Hiphil commonly means 'bring in.' The context is moving dedicated items into the temple treasury, so 'brought in' captures the directional nuance.
- source_word: קָדְשֵׁי דָּוִיד אָבִיו
  chosen: the holy things of David his father
  alternatives:
  - the things dedicated by David his father
  - the consecrated things of David his father
  lexicon: HALOT
  rationale: The plural construct of קדשׁ here denotes sacred/dedicated items. 'Holy things' is a direct rendering; however, the sense is specifically items set apart for sacred use. This nuance is preserved by context and noted in a footnote alternative.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his ancestor
  lexicon: HALOT
  rationale: Although 'father' can sometimes mean ancestor, here David is Solomon's immediate father, so the straightforward rendering is best.
- source_word: הַכֶּסֶף וְהַזָּהָב
  chosen: the silver, the gold
  alternatives:
  - the silver and gold
  lexicon: HALOT
  rationale: The repeated direct-object markers and articles give a list-like emphasis. Rendering both articles in English preserves the formal cadence of the inventory.
- source_word: כָּל הַכֵּלִים
  chosen: all the vessels
  alternatives:
  - all the articles
  - all the utensils
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for objects/implements. In temple context, 'vessels' is the standard and suitably dignified rendering for sacred implements.
- source_word: נָתַן
  chosen: he put
  alternatives:
  - he placed
  - he deposited
  lexicon: HALOT
  rationale: נתן is semantically broad ('give/put/place'). In context of storing temple valuables, 'he put' is simple and accurate; 'deposited' is possible but slightly more interpretive.
- source_word: בְּאֹצְרוֹת
  chosen: into the treasuries
  alternatives:
  - in the storehouses
  - in the treasury chambers
  lexicon: HALOT
  rationale: אֹצָר denotes treasury/storehouse. The plural suggests multiple treasury rooms or repositories, so 'treasuries' is preferable to singular 'treasury.'
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: As with 'house of the LORD' earlier in the verse, retaining 'house of God' preserves the Hebrew imagery and the variation in divine designation present in the source text.
