theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Distinguishing 'house of the LORD' and 'house of God' within the same verse
  chosen_reading: Preserve both expressions as written
  alternative_readings:
  - Render both as 'temple' for stylistic smoothness
  rationale: The Hebrew intentionally uses בֵּית יְהוָה and later בֵּית הָאֱלֹהִים. Preserving both avoids flattening the source's variation and maintains transparency to the Hebrew text.
