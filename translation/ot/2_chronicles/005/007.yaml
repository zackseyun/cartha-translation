id: 2CH.5.7
reference: 2 Chronicles 5:7
source:
  edition: WLC
  text: וַ/יָּבִ֣יאוּ הַ֠/כֹּהֲנִים אֶת אֲר֨וֹן בְּרִית יְהוָ֧ה אֶל מְקוֹמ֛/וֹ אֶל דְּבִ֥יר הַ/בַּ֖יִת אֶל קֹ֣דֶשׁ הַ/קְּדָשִׁ֑ים אֶל תַּ֖חַת כַּנְפֵ֥י הַ/כְּרוּבִֽים־־־־־־׃
translation:
  text: Then the priests brought the ark of the covenant of Yahweh to its place, into the inner sanctuary of the house, into the Most Holy Place, under the wings of the cherubim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Holy of Holies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבִיאוּ
  chosen: brought
  alternatives:
  - carried in
  - brought in
  lexicon: HALOT
  rationale: Hiphil of בוא commonly means 'bring' or 'cause to come.' 'Brought' is natural English and fits the narrative sequence without adding detail not explicit in the verb itself.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Straightforward rendering of the definite plural noun; the subject is specifically the priests, matching the temple-installation context.
- source_word: אֲרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  lexicon: HALOT
  rationale: This preserves the construct chain closely and keeps the covenantal significance explicit. 'The LORD' follows the project default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְקוֹמוֹ
  chosen: its place
  alternatives:
  - its proper place
  - its location
  lexicon: HALOT
  rationale: The suffix refers to the ark. 'Its place' is concise and idiomatic, preserving the sense of the appointed resting location without interpretive expansion.
- source_word: דְּבִיר הַבַּיִת
  chosen: the inner sanctuary of the house
  alternatives:
  - the inner room of the house
  - the shrine of the house
  lexicon: HALOT
  rationale: דְּבִיר refers to the innermost chamber of the temple. 'Inner sanctuary' communicates the cultic function clearly in modern English; 'house' is retained for בַּיִת rather than paraphrasing as 'temple' at this point.
- source_word: קֹדֶשׁ הַקְּדָשִׁים
  chosen: the Most Holy Place
  alternatives:
  - the Holy of Holies
  - the holiest place
  lexicon: HALOT
  rationale: This is the standard sense of the Hebrew superlative construction. 'Most Holy Place' is clear modern English; the traditional 'Holy of Holies' remains a viable alternative but is somewhat more idiomatic/traditional than transparent.
- source_word: תַּחַת כַּנְפֵי הַכְּרוּבִים
  chosen: under the wings of the cherubim
  alternatives:
  - beneath the wings of the cherubim
  lexicon: HALOT
  rationale: תַּחַת means 'under/beneath,' and כַּנְפֵי is the construct plural 'wings of.' 'Cherubim' is retained as the conventional transliteration for the heavenly beings rather than attempting an English substitute.
