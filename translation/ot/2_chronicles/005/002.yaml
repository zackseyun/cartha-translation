theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Representing Israel's kinship structure in לִבְנֵי יִשְׂרָאֵל and הָאָבוֹת
  chosen_reading: Retain 'sons of Israel' and 'fathers’ houses' in the main text
  alternative_readings:
  - Israelites
  - families of Israel
  - ancestral houses of Israel
  rationale: The verse is concerned with formal tribal and paternal structures surrounding the ark's transfer. Per the translation philosophy, gender-accurate and structure-preserving renderings are preferred where the source text is explicitly masculine and genealogical rather than merely generic.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
