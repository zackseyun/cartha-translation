id: 2CH.5.2
reference: 2 Chronicles 5:2
source:
  edition: WLC
  text: אָז֩ יַקְהֵ֨יל שְׁלֹמֹ֜ה אֶת זִקְנֵ֣י יִשְׂרָאֵ֗ל וְ/אֶת כָּל רָאשֵׁ֨י הַ/מַּטּ֜וֹת נְשִׂיאֵ֧י הָ/אָב֛וֹת לִ/בְנֵ֥י יִשְׂרָאֵ֖ל אֶל יְרוּשָׁלִָ֑ם לְֽ/הַעֲל֞וֹת אֶת אֲר֧וֹן בְּרִית יְהוָ֛ה מֵ/עִ֥יר דָּוִ֖יד הִ֥יא צִיּֽוֹן־־־־־־׃
translation:
  text: Then Solomon assembled the elders of Israel and all the heads of the tribes, the leaders of the fathers’ houses of the sons of Israel, at Jerusalem, to bring up the ark of the covenant of Yahweh from the city of David, that is Zion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew says 'the sons of Israel,' preserving Israel's genealogical and covenantal identity.
    reason: lexical_alternative
  - marker: b
    text: Or 'which is Zion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal discourse marker introducing the next event in sequence; 'Then' is natural modern English and preserves narrative flow.
- source_word: יַקְהֵיל
  chosen: assembled
  alternatives:
  - gathered together
  - convened
  lexicon: HALOT
  rationale: Hiphil of קהל means to cause to assemble or convene. 'Assembled' is concise, formal enough for the setting, and idiomatic with Solomon as subject.
- source_word: זִקְנֵי יִשְׂרָאֵל
  chosen: the elders of Israel
  lexicon: HALOT
  rationale: Standard rendering for the recognized leadership group; no reason to paraphrase.
- source_word: כָּל רָאשֵׁי הַמַּטּוֹת
  chosen: all the heads of the tribes
  alternatives:
  - all the chiefs of the tribes
  - all the heads of the clans
  lexicon: HALOT
  rationale: Although מַטּוֹת can denote 'tribes' or 'staffs,' in this administrative context it refers to tribal divisions. 'Heads' preserves the metaphor of leadership more closely than 'leaders' here, since 'leaders' is used in the following apposition.
- source_word: נְשִׂיאֵי הָאָבוֹת
  chosen: the leaders of the fathers’ houses
  alternatives:
  - the princes of the fathers' houses
  - the chiefs of the ancestral houses
  lexicon: HALOT
  rationale: נְשִׂיאִים are leaders/chieftains. הָאָבוֹת here refers to paternal/ancestral households. 'Fathers’ houses' preserves the Hebrew social structure better than flattening to simply 'families.'
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: of the sons of Israel
  alternatives:
  - of the people of Israel
  - of the Israelites
  lexicon: HALOT
  rationale: Rendered more formally to preserve the Hebrew genealogical-national expression. This is not merely a generic population label but the covenant people in their tribal descent structure.
- source_word: אֶל יְרוּשָׁלָם
  chosen: at Jerusalem
  alternatives:
  - to Jerusalem
  - in Jerusalem
  lexicon: HALOT
  rationale: With the verb 'assembled,' English idiom prefers the meeting location as 'at Jerusalem.' The Hebrew preposition marks destination/location of assembly; 'at' reads most naturally in context.
- source_word: לְהַעֲלוֹת
  chosen: to bring up
  alternatives:
  - to carry up
  - to take up
  lexicon: HALOT
  rationale: עלה in this context refers to moving the ark upward to Jerusalem/Zion. 'Bring up' preserves both the directional nuance and established biblical idiom.
- source_word: אֲרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  lexicon: HALOT
  rationale: This keeps the construct chain transparent and preserves the covenantal significance. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrinal guideline for the divine name.
- source_word: מֵעִיר דָּוִיד
  chosen: from the city of David
  lexicon: HALOT
  rationale: Straightforward locative expression; standard and clear.
- source_word: הִיא צִיּוֹן
  chosen: that is Zion
  alternatives:
  - which is Zion
  lexicon: HALOT
  rationale: Appositional clarification identifying the city of David with Zion in this context. 'That is' is natural modern English.
