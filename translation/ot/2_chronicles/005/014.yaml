id: 2CH.5.14
reference: 2 Chronicles 5:14
source:
  edition: WLC
  text: וְ/לֹא יָֽכְל֧וּ הַ/כֹּהֲנִ֛ים לַ/עֲמ֥וֹד לְ/שָׁרֵ֖ת מִ/פְּנֵ֣י הֶ/עָנָ֑ן כִּֽי מָלֵ֥א כְבוֹד יְהוָ֖ה אֶת בֵּ֥ית הָ/אֱלֹהִֽים־־־־׃פ
translation:
  text: and the priests could not stand to minister because of the cloud, for the glory of Yahweh filled the house of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of God.' Literally, 'the house of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָכְלוּ
  chosen: could
  alternatives:
  - were able
  lexicon: HALOT
  rationale: The verb denotes ability/capacity. 'Could not' is natural modern English and preserves the sense of inability.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Straightforward rendering of the definite plural noun referring to the temple priests.
- source_word: לַעֲמוֹד
  chosen: stand
  alternatives:
  - remain standing
  - take their stand
  lexicon: HALOT
  rationale: The infinitive of עמד literally means 'to stand.' Here it likely conveys remaining in position for service; 'stand' keeps the concrete image without overinterpreting.
- source_word: לְשָׁרֵת
  chosen: to minister
  alternatives:
  - to serve
  lexicon: HALOT
  rationale: שרת in priestly/temple contexts often refers to liturgical service. 'Minister' better conveys cultic service than the broader 'serve.'
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from before
  - on account of
  - due to
  lexicon: HALOT
  rationale: 'The preposition here expresses cause in idiomatic English: the priests were unable to stand because of the cloud.'
- source_word: הֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: Definite noun referring to the visible manifestation filling the temple; no expansion beyond the Hebrew is needed.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the preceding statement. 'For' fits the formal explanatory relation well in English.
- source_word: מָלֵא
  chosen: filled
  alternatives:
  - had filled
  - was filling
  lexicon: HALOT
  rationale: Simple past best matches the narrative sequence and the qatal form in context.
- source_word: כְבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: This construct phrase is conventionally and clearly rendered 'the glory of the LORD.' Per doctrine, יְהוָה is rendered 'the LORD,' not 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  - God's house
  lexicon: HALOT
  rationale: Literally 'the house of God.' This preserves the Hebrew wording while remaining natural English; 'temple' is interpretive though contextually correct.
