id: 2CH.5.13
reference: 2 Chronicles 5:13
source:
  edition: WLC
  text: וַ/יְהִ֣י כְ֠/אֶחָד ל/מחצצרים וְ/לַ/מְשֹֽׁרֲרִ֜ים לְ/הַשְׁמִ֣יעַ קוֹל אֶחָ֗ד
    לְ/הַלֵּ֣ל וּ/לְ/הֹדוֹת֮ לַ/יהוָה֒ וּ/כְ/הָרִ֣ים ק֠וֹל בַּ/חֲצֹצְר֨וֹת וּ/בִ/מְצִלְתַּ֜יִם
    וּ/בִ/כְלֵ֣י הַ/שִּׁ֗יר וּ/בְ/הַלֵּ֤ל לַ/יהוָה֙ כִּ֣י ט֔וֹב כִּ֥י לְ/עוֹלָ֖ם חַסְדּ֑/וֹ
    וְ/הַ/בַּ֛יִת מָלֵ֥א עָנָ֖ן בֵּ֥ית יְהוָֽה־׃
translation:
  text: And it came to pass, as the trumpeters and the singers were as one, to make
    one sound in praising and giving thanks to the LORD, and as they lifted up the
    voice with trumpets and cymbals and instruments of song, and in praising the LORD,
    “For he is good, for his steadfast love endures forever,” the house, the house
    of the LORD, was filled with a cloud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in unison' for 'were as one.'
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, often denoting loyal, covenantal
      love; traditionally also rendered ''mercy'' or ''lovingkindness.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'and with praise to the LORD, saying,'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it came about
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol introducing the event. 'And it came about' preserves
    the Hebrew discourse function without archaic 'came to pass.'
- source_word: כְאֶחָד
  chosen: were as one
  alternatives:
  - were together
  - were in unison
  lexicon: HALOT
  rationale: The phrase emphasizes unified action rather than mere simultaneity. 'As
    one' preserves the imagery and prepares for 'one sound.'
- source_word: למחצצרים
  chosen: the trumpeters
  alternatives:
  - those blowing the trumpets
  lexicon: HALOT
  rationale: Refers to those sounding the חֲצֹצְרוֹת. 'Trumpeters' is concise and
    idiomatic.
- source_word: ולמשׁררים
  chosen: the singers
  alternatives:
  - the musicians
  - the chanters
  lexicon: HALOT
  rationale: From שׁיר in participial form, specifically vocal performers. 'Singers'
    is more precise than the broader 'musicians.'
- source_word: להשמיע קול אחד
  chosen: to make one sound
  alternatives:
  - to sound with one voice
  - to make themselves heard with one sound
  lexicon: HALOT
  rationale: The infinitive phrase expresses producing a unified audible sound. 'One
    sound' keeps the concrete auditory emphasis of קול.
- source_word: להלל ולהודות
  chosen: in praising and giving thanks
  alternatives:
  - to praise and to give thanks
  lexicon: HALOT
  rationale: These infinitives express purpose. The chosen rendering is natural in
    English while preserving both verbal ideas distinctly.
- source_word: ליהוה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: וכהרים קול
  chosen: and when they lifted up their voice
  alternatives:
  - and when they raised the sound
  - and as they lifted up the voice
  lexicon: HALOT
  rationale: Idiomatic rendering of the Hebrew expression for raising the voice/sound.
    Singular 'voice' works collectively in English.
- source_word: בחצצרות ובמצלתים ובכלי השיר
  chosen: with trumpets and cymbals and instruments for song
  alternatives:
  - with trumpets, cymbals, and musical instruments
  - with trumpets and cymbals and song-instruments
  lexicon: HALOT
  rationale: כְּלֵי הַשִּׁיר are instruments used for music/song. 'Instruments for
    song' stays close to the Hebrew while remaining readable.
- source_word: ובהלל ליהוה
  chosen: and with praise to the LORD
  alternatives:
  - and while praising the LORD
  - and in praising the LORD
  lexicon: HALOT
  rationale: The prepositional phrase resumes the act of praise accompanying the instruments.
    'With praise' reflects the instrumental/circumstantial sense.
- source_word: כי טוב כי לעולם חסדו
  chosen: For he is good, for his steadfast love endures forever
  alternatives:
  - For he is good, for his lovingkindness is forever
  - For he is good, for his mercy endures forever
  lexicon: HALOT
  rationale: A liturgical formula. חֶסֶד is best rendered 'steadfast love' in modern
    English to convey covenant loyalty and enduring benevolence.
- source_word: והבית מלא ענן בית יהוה
  chosen: then the house, the house of the LORD, was filled with a cloud
  alternatives:
  - and the house was filled with a cloud, the house of the LORD
  - then the temple, the house of the LORD, was filled with a cloud
  lexicon: HALOT
  rationale: The Hebrew apposition repeats 'house' for emphasis/clarification. Retaining
    'the house, the house of the LORD' reflects the structure, while 'then' makes
    the sequence clear in English. 'A cloud' is indefinite in Hebrew.
