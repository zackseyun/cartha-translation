theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering חַסְדּוֹ in the liturgical refrain
  chosen_reading: his steadfast love endures forever
  alternative_readings:
  - his mercy endures forever
  - his lovingkindness is forever
  rationale: '''Steadfast love'' best preserves the covenantal and durable sense of
    חֶסֶד in accessible modern English without flattening it to mere emotion or using
    archaic diction.'
  doctrine_reference: DOCTRINE.md Translation philosophy §6; consistency of key terms
    §5
