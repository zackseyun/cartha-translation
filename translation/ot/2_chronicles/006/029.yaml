theological_decisions:
- issue: Rendering of הָאָדָם in a generic singular context
  chosen_reading: man
  alternative_readings:
  - humankind
  - person
  rationale: The Hebrew singular generic is grammatically masculine with representative
    force. Following the doctrine's gender-accurate principle and the contested-terms
    guidance for אָדָם, 'man' is retained in the main text, while an inclusive alternative
    is preserved in a footnote for clarity to modern readers.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
    terms: אָדָם adam'
