id: 2CH.6.29
reference: 2 Chronicles 6:29
source:
  edition: WLC
  text: כָּל תְּפִלָּ֣ה כָל תְּחִנָּ֗ה אֲשֶׁ֤ר יִהְיֶה֙ לְ/כָל הָ֣/אָדָ֔ם וּ/לְ/כֹ֖ל
    עַמְּ/ךָ֣ יִשְׂרָאֵ֑ל אֲשֶׁ֣ר יֵדְע֗וּ אִ֤ישׁ נִגְע/וֹ֙ וּ/מַכְאֹב֔/וֹ וּ/פָרַ֥שׂ
    כַּפָּ֖י/ו אֶל הַ/בַּ֥יִת הַ/זֶּֽה־־־־׃
translation:
  text: whatever prayer, whatever plea, may be made by any man or by all your people
    Israel, each knowing his own affliction and his own pain, and spreading out his
    hands toward this house—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by any person.' The Hebrew has 'any man' (אָדָם) used generically.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל תְּפִלָּה
  chosen: whatever prayer
  alternatives:
  - every prayer
  - any prayer
  lexicon: HALOT
  rationale: כָּל with תְּפִלָּה introduces an indefinite comprehensive category in
    a conditional-like construction. 'Whatever prayer' preserves the breadth and fits
    the syntax leading into the apodosis in the next verse.
- source_word: כָל תְּחִנָּה
  chosen: whatever plea
  alternatives:
  - every supplication
  - any petition
  lexicon: HALOT
  rationale: תְּחִנָּה often denotes an earnest entreaty for favor or mercy. 'Plea'
    is more readable modern English than 'supplication' while retaining the urgent
    sense. Repeating 'whatever' mirrors the Hebrew repetition of כָל.
- source_word: אֲשֶׁר יִהְיֶה
  chosen: may be made
  alternatives:
  - that may be
  - which may occur
  lexicon: HALOT
  rationale: The idiom with היה here introduces any prayer that may arise or be offered.
    'May be made' brings out the implied act of offering a prayer in English, without
    over-paraphrasing.
- source_word: לְכָל הָאָדָם
  chosen: by any man
  alternatives:
  - for any man
  - by any person
  - for any person
  lexicon: HALOT
  rationale: The preposition ל can be rendered in context with reference to the one
    to whom the prayer belongs; in idiomatic English, 'made by any man' best fits
    the prayer context. Per doctrine, אָדָם is rendered gender-accurately as 'man'
    where generic/representative force is present.
- source_word: וּלְכֹל עַמְּךָ יִשְׂרָאֵל
  chosen: or by all your people Israel
  alternatives:
  - or by all your people, Israel
  - and by all your people Israel
  lexicon: HALOT
  rationale: The phrase expands from the individual to the covenant people collectively.
    'Or' reflects the distributive sense of the Hebrew pairing better than a simple
    additive 'and' in English.
- source_word: אֲשֶׁר יֵדְעוּ אִישׁ
  chosen: each knowing
  alternatives:
  - when each knows
  - because each knows
  lexicon: HALOT
  rationale: The relative clause describes the praying individuals. 'Each knowing'
    captures אִישׁ distributively and keeps the flow into the following objects.
- source_word: נִגְעוֹ
  chosen: his own affliction
  alternatives:
  - his plague
  - his stroke
  lexicon: HALOT
  rationale: נֶגַע can mean plague, blow, or affliction. Here it refers to the sufferer's
    personally known trouble rather than necessarily a literal epidemic, so 'affliction'
    is broad and natural. 'Own' is supplied to reflect the pronominal suffix.
- source_word: וּמַכְאֹבוֹ
  chosen: and his own pain
  alternatives:
  - and his own sorrow
  - and his own suffering
  lexicon: HALOT
  rationale: מַכְאוֹב denotes pain or suffering. Paired with נֶגַע, 'pain' preserves
    the experiential dimension without collapsing the two terms into one idea.
- source_word: וּפָרַשׂ כַּפָּיו
  chosen: and spreading out his hands
  alternatives:
  - and spreads out his hands
  - and stretching out his palms
  lexicon: HALOT
  rationale: The qatal after the relative clause functions naturally in English as
    part of the same descriptive sequence. 'Spreading out his hands' is a standard
    prayer gesture and idiomatic rendering of the Hebrew expression.
- source_word: אֶל הַבַּיִת הַזֶּה
  chosen: toward this house
  alternatives:
  - to this house
  lexicon: HALOT
  rationale: In prayer contexts, אֶל with the temple indicates direction/orientation.
    'Toward this house' communicates the physical and symbolic orientation of prayer
    more clearly than 'to this house.'
