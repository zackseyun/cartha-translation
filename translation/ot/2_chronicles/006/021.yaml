theological_decisions:
- issue: Divine transcendence and temple theology
  chosen_reading: The verse preserves both prayer toward the temple ('this place')
    and God's true dwelling as heaven.
  alternative_readings:
  - A stronger localization of God in the temple
  - A purely symbolic reading of the temple reference
  rationale: 'The Hebrew explicitly holds both together: Israel prays toward the temple,
    yet God hears from his dwelling place in heaven. The translation keeps both elements
    without collapsing the tension.'
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
