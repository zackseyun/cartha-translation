id: 2CH.6.21
reference: 2 Chronicles 6:21
source:
  edition: WLC
  text: וְ/שָׁ֨מַעְתָּ֜ אֶל תַּחֲנוּנֵ֤י עַבְדְּ/ךָ֙ וְ/עַמְּ/ךָ֣ יִשְׂרָאֵ֔ל אֲשֶׁ֥ר
    יִֽתְפַּֽלְל֖וּ אֶל הַ/מָּק֣וֹם הַ/זֶּ֑ה וְ֠/אַתָּה תִּשְׁמַ֞ע מִ/מְּק֤וֹם שִׁבְתְּ/ךָ֙
    מִן הַ/שָּׁמַ֔יִם וְ/שָׁמַעְתָּ֖ וְ/סָלָֽחְתָּ־־־׃
translation:
  text: And hear the pleas of your servant and of your people Israel when they pray
    toward this place. And may you hear from your dwelling place, from heaven, and
    when you hear, forgive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'listen to the supplications of your servant and of your people Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתָּ / תִּשְׁמַע / וְשָׁמַעְתָּ
  chosen: hear / may you hear / when you hear
  alternatives:
  - listen to
  - give heed to
  lexicon: HALOT
  rationale: The repeated verb שׁמע structures the verse. 'Hear' preserves the formal
    repetition and covenant-prayer idiom in English. The middle occurrence is rendered
    'may you hear' to reflect the petitionary force in context, while the final occurrence
    is rendered 'when you hear' to make natural English sense before 'forgive' without
    losing the sequence.
- source_word: תַּחֲנוּנֵי
  chosen: pleas
  alternatives:
  - supplications
  - petitions
  - entreaties
  lexicon: HALOT
  rationale: The noun denotes earnest requests for mercy or favor. 'Pleas' is accessible
    modern English and preserves the emotional force better than the more formal 'supplications.'
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in royal prayer addressed to God
    by Solomon the relational and honorific sense is foregrounded. 'Your servant'
    is the most natural and contextually fitting rendering here.
- source_word: וְעַמְּךָ יִשְׂרָאֵל
  chosen: and of your people Israel
  alternatives:
  - and your people Israel
  lexicon: HALOT
  rationale: 'The construct with the preceding noun phrase is best represented by
    repeating ''of'' in English: the pleas are those ''of your servant and of your
    people Israel.'' This avoids ambiguity and reflects the Hebrew syntax.'
- source_word: יִתְפַּלְלוּ
  chosen: they pray
  alternatives:
  - they pray toward
  - they make prayer
  lexicon: HALOT
  rationale: The verb means 'pray.' The directional sense belongs to the following
    prepositional phrase אֶל הַמקום הזה, so it is expressed in English as 'pray toward
    this place.'
- source_word: אֶל הַמָּקוֹם הַזֶּה
  chosen: toward this place
  alternatives:
  - to this place
  - in the direction of this place
  lexicon: HALOT
  rationale: Because the referent is the temple and the prayer is directed with reference
    to it, 'toward this place' communicates the directional sense more idiomatically
    than 'to this place.'
- source_word: מִמְּקוֹם שִׁבְתְּךָ
  chosen: from your dwelling place
  alternatives:
  - from the place where you dwell
  - from your habitation
  lexicon: HALOT
  rationale: The phrase refers to God's heavenly abode. 'Dwelling place' is clear,
    reverent, and idiomatic modern English.
- source_word: מִן הַשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  lexicon: HALOT
  rationale: Although morphologically plural, השמים commonly functions idiomatically
    as singular 'heaven' in English. This is standard and natural.
- source_word: סָלָחְתָּ
  chosen: forgive
  alternatives:
  - pardon
  lexicon: HALOT
  rationale: The verb denotes forgiveness, especially of sin or guilt. 'Forgive' is
    the clearest and most theologically transparent English equivalent.
