theological_decisions:
- issue: Rendering of divine response to prayer in judicial language
  chosen_reading: uphold their cause
  alternative_readings:
  - grant them justice
  - execute their judgment
  rationale: The Hebrew משפט can denote judgment, justice, legal right, or cause.
    The verse asks God not merely to listen but to act judicially on behalf of his
    people. 'Uphold their cause' preserves that forensic dimension while remaining
    idiomatic. No doctrinal controversy is being resolved; this is a lexical-contextual
    decision.
  doctrine_reference: Translation philosophy §1, §5, §6
