id: 2CH.6.30
reference: 2 Chronicles 6:30
source:
  edition: WLC
  text: וְ֠/אַתָּה תִּשְׁמַ֨ע מִן הַ/שָּׁמַ֜יִם מְכ֤וֹן שִׁבְתֶּ֨/ךָ֙ וְ/סָ֣לַחְתָּ֔
    וְ/נָתַתָּ֤ה לָ/אִישׁ֙ כְּ/כָל דְּרָכָ֔י/ו אֲשֶׁ֥ר תֵּדַ֖ע אֶת לְבָב֑/וֹ כִּ֤י
    אַתָּה֙ לְ/בַדְּ/ךָ֣ יָדַ֔עְתָּ אֶת לְבַ֖ב בְּנֵ֥י הָ/אָדָֽם־־־־׃
translation:
  text: then may you hear from heaven, the place of your dwelling, and forgive, and
    give to each man according to all his ways, whose heart you know—for you alone
    know the heart of the sons of man—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “humankind” or “the children of humanity.” The Hebrew expression is literally
      “the sons of man,” a representative term for human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמַע
  chosen: may you hear
  alternatives:
  - you shall hear
  - hear
  lexicon: HALOT
  rationale: Although morphologically imperfect 2ms, in Solomon's prayer context it
    functions as a jussive/petition. 'May you hear' best conveys the prayerful request
    in natural English.
- source_word: מִן הַשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  lexicon: HALOT
  rationale: Hebrew uses the plural form 'heavens,' but idiomatic English in this
    context is 'heaven.' This preserves sense without unnecessary literalism.
- source_word: מְכוֹן שִׁבְתֶּךָ
  chosen: the place of your dwelling
  alternatives:
  - your dwelling place
  - the established place of your dwelling
  lexicon: HALOT
  rationale: מָכוֹן denotes a fixed or established place; with 'your dwelling' the
    phrase refers to God's heavenly habitation. 'The place of your dwelling' is clear,
    natural, and close to the Hebrew.
- source_word: וְסָלַחְתָּ
  chosen: and forgive
  alternatives:
  - then forgive
  - and you shall forgive
  lexicon: HALOT
  rationale: In the sequence of petitions, the perfect with waw continues the requested
    action. English imperative/jussive sense is best represented by 'and forgive.'
- source_word: וְנָתַתָּה
  chosen: and give
  alternatives:
  - and repay
  - and render
  lexicon: HALOT
  rationale: נתן literally means 'give,' but here in judicial context it means giving
    to each person according to his conduct. 'Give' preserves the Hebrew wording while
    allowing the following phrase to specify the sense.
- source_word: לָאִישׁ
  chosen: to each man
  alternatives:
  - to each person
  - to a man
  lexicon: HALOT
  rationale: אִישׁ is singular masculine and distributive here. Per the project's
    gender-accurate policy, 'each man' preserves the source form and representative
    force better than a neutral substitute.
- source_word: כְּכָל דְּרָכָיו
  chosen: according to all his ways
  alternatives:
  - according to all his ways of life
  - according to all his conduct
  - according to all his deeds
  lexicon: HALOT
  rationale: '''Ways'' is a common Hebrew idiom for conduct or manner of life. Retaining
    ''ways'' preserves the metaphor while remaining understandable.'
- source_word: אֲשֶׁר תֵּדַע אֶת לְבָבוֹ
  chosen: whose heart you know
  alternatives:
  - as you know his heart
  - for you know his heart
  lexicon: HALOT
  rationale: This relative clause modifies 'each man.' 'Whose heart you know' is concise
    and reflects the Hebrew syntax and emphasis on divine heart-knowledge.
- source_word: לְבָב
  chosen: heart
  alternatives:
  - inner self
  - mind
  lexicon: HALOT
  rationale: לֵבָב in Hebrew commonly denotes the inner person, including thought
    and will. 'Heart' is the standard biblical equivalent and preserves theological
    resonance.
- source_word: כִּי אַתָּה לְבַדְּךָ יָדַעְתָּ
  chosen: for you alone know
  alternatives:
  - because you alone have known
  - for you by yourself know
  lexicon: HALOT
  rationale: The clause gives the reason for the preceding petition. 'You alone know'
    is idiomatic and preserves the exclusivity expressed by לְבַדְּךָ.
- source_word: בְּנֵי הָאָדָם
  chosen: the sons of man
  alternatives:
  - the children of man
  - humankind
  - mankind
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of man/humanity.' Per the project's gender-accurate
    policy, this representative masculine expression is retained rather than flattened
    to a neutral collective. A footnote preserves the broader sense.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: In this construct phrase, אָדָם refers to humanity in a representative
    singular. Rendering within 'sons of man' preserves the idiomatic biblical expression
    while signaling the human race.
