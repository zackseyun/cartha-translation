- issue: Anthropological expression in בְּנֵי הָאָדָם
  chosen_reading: the sons of man
  alternative_readings:
  - humankind
  - the children of humanity
  rationale: The Hebrew uses a masculine representative expression. Following the
    doctrine's gender-accurate policy, the translation preserves the source's form
    rather than neutralizing it, while a footnote can clarify the inclusive human
    reference.
