id: 2CH.6.19
reference: 2 Chronicles 6:19
source:
  edition: WLC
  text: וּ/פָנִ֜יתָ אֶל תְּפִלַּ֧ת עַבְדְּ/ךָ֛ וְ/אֶל תְּחִנָּת֖/וֹ יְהוָ֣ה אֱלֹהָ֑/י לִ/שְׁמֹ֤עַ אֶל הָ/רִנָּה֙ וְ/אֶל הַ/תְּפִלָּ֔ה אֲשֶׁ֥ר עַבְדְּ/ךָ֖ מִתְפַּלֵּ֥ל לְ/פָנֶֽי/ךָ־־־־׃
translation:
  text: Yet turn toward the prayer of your servant and his plea for favor, O Yahweh my God, to hear the cry and the prayer that your servant is praying before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his supplication.' The Hebrew term denotes an earnest plea for mercy or favor.
    reason: lexical_alternative
  - marker: b
    text: Or 'the ringing cry.' The Hebrew word can refer to a loud cry, here likely a cry for help in prayer.
    reason: lexical_alternative
  - marker: c
    text: Or 'and to his plea for favor'.
    reason: previous_rendering
lexical_decisions:
- source_word: וּפָנִיתָ
  chosen: Yet turn toward
  alternatives:
  - and turn
  - have regard to
  - pay attention to
  lexicon: HALOT
  rationale: From פנה, literally 'turn' or 'turn toward.' In this prayer context it idiomatically asks God to direct attention favorably. 'Yet' reflects the conjunction in context as a plea following prior statements, while preserving the verbal image of turning.
- source_word: תְּפִלַּת
  chosen: the prayer
  alternatives:
  - the petition
  lexicon: HALOT
  rationale: Standard rendering of תפלה as 'prayer.' Kept distinct from תחנה later by rendering that term differently.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote 'slave' or 'servant,' in royal prayer language for a subject addressing God, 'servant' is the most natural English equivalent and does not obscure a specifically bonded-status emphasis in this context.
- source_word: תְּחִנָּתוֹ
  chosen: his plea for favor
  alternatives:
  - his supplication
  - his entreaty
  - his plea
  lexicon: HALOT
  rationale: תחנה denotes an earnest plea for mercy or favor. 'Plea for favor' communicates the nuance more transparently for modern readers than the more traditional but less common 'supplication.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהָי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward possessive construction; retained as direct address with 'O LORD my God.'
- source_word: לִשְׁמֹעַ
  chosen: to hear
  alternatives:
  - to listen to
  lexicon: HALOT
  rationale: 'Infinitive of שמע expressing purpose: Solomon asks God to turn toward the prayer in order to hear it.'
- source_word: הָרִנָּה
  chosen: the cry
  alternatives:
  - the plea
  - the ringing cry
  - the supplication
  lexicon: HALOT
  rationale: רנה can denote a ringing cry, sometimes joyful shout, but in prayer contexts it often refers to a loud cry for help. 'Cry' best fits the parallel with prayer here.
- source_word: הַתְּפִלָּה
  chosen: the prayer
  lexicon: HALOT
  rationale: Repeated noun retained as 'prayer' for lexical consistency and to preserve the Hebrew parallelism.
- source_word: מִתְפַּלֵּל
  chosen: is praying
  alternatives:
  - prays
  lexicon: HALOT
  rationale: 'Participle rendered progressively to reflect ongoing action in the immediate scene: the servant is presently praying before God.'
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  lexicon: HALOT
  rationale: Common idiom meaning 'before you' or 'in your presence.' 'Before you' is concise and natural in prayer language.
