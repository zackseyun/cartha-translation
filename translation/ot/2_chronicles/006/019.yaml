theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse directly addresses Israel's covenant God by the tetragrammaton.
    Following the project's doctrine and standard English Bible convention, 'the LORD'
    is used rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
