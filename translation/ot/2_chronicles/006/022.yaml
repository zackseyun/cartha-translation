theological_decisions:
- issue: Judicial sense of אָלָה
  chosen_reading: Rendered primarily as 'oath' in the main text, with curse-sanction
    nuance preserved in a footnote.
  alternative_readings:
  - curse
  - curse-oath
  rationale: In this legal context, the term refers to an oath that invokes a curse
    if false. Rendering only 'curse' would obscure the judicial oath setting; rendering
    only 'oath' risks losing the sanction nuance, so the alternative is preserved
    in a footnote.
  doctrine_reference: Translation philosophy §3, preserve theological/interpretive
    tension where ambiguity is genuine.
