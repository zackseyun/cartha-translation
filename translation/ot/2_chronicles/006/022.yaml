id: 2CH.6.22
reference: 2 Chronicles 6:22
source:
  edition: WLC
  text: אִם יֶחֱטָ֥א אִישׁ֙ לְ/רֵעֵ֔/הוּ וְ/נָֽשָׁא ב֥/וֹ אָלָ֖ה לְ/הַֽאֲלֹת֑/וֹ וּ/בָ֗א
    אָלָ֛ה לִ/פְנֵ֥י מִֽזְבַּחֲ/ךָ֖ בַּ/בַּ֥יִת הַ/זֶּֽה־־׃
translation:
  text: If a man sins against his neighbor, and an oath is laid on him to make him
    swear, and he comes and the oath is before your altar in this house,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a curse-oath is imposed on him' / 'he is put under a curse-oath.' The
      Hebrew term can denote an oath accompanied by a curse if the oath is violated.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  lexicon: HALOT
  rationale: Introduces a conditional clause in Solomon's prayer.
- source_word: יֶחֱטָא
  chosen: sins
  alternatives:
  - does wrong
  - offends
  lexicon: HALOT
  rationale: The verb חטא commonly means 'to sin' or 'to do wrong.' 'Sins' preserves
    the moral/religious force of the Hebrew rather than flattening it to merely civil
    wrongdoing.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine 'man.' Per the translation philosophy,
    gender-accurate rendering is preferred over gender-neutral where the source uses
    masculine representative language.
- source_word: לְרֵעֵהוּ
  chosen: against his neighbor
  alternatives:
  - against his companion
  - against another
  lexicon: HALOT
  rationale: רֵעַ denotes a fellow, companion, or neighbor. 'Neighbor' is idiomatic
    and preserves the interpersonal covenantal/social sense.
- source_word: וְנָשָׁא בוֹ אָלָה
  chosen: an oath is laid on him
  alternatives:
  - he is made to bear an oath
  - a curse is imposed on him
  lexicon: HALOT
  rationale: The idiom נשׂא + אָלָה means to place or impose an oath/curse obligation
    on someone, especially in judicial settings. 'An oath is laid on him' is natural
    English and fits the legal context. Because אָלָה can also carry the sense of
    a curse-sanctioned oath, that nuance is preserved in a footnote.
- source_word: לְהַאֲלֹתוֹ
  chosen: to make him swear
  alternatives:
  - to put him under oath
  - to adjure him
  lexicon: HALOT
  rationale: The Hiphil infinitive from אלה here expresses causing someone to swear
    or placing him under oath. 'To make him swear' is clear modern English.
- source_word: וּבָא
  chosen: and he comes
  alternatives:
  - and he enters
  - and he appears
  lexicon: HALOT
  rationale: Simple narrative/sequential verb 'comes.' In context it refers to coming
    before God at the altar.
- source_word: אָלָה
  chosen: the oath
  alternatives:
  - the sworn oath
  - the curse-oath
  lexicon: HALOT
  rationale: Here the noun refers to the oath involved in the judicial procedure.
    'The oath' keeps the line readable; the possible curse-sanction nuance is preserved
    in a footnote.
- source_word: לִפְנֵי מִזְבַּחֲךָ
  chosen: before your altar
  alternatives:
  - in the presence of your altar
  - before your altar's presence
  lexicon: HALOT
  rationale: Standard spatial/judicial language for appearing before God at the altar.
- source_word: בַּבַּיִת הַזֶּה
  chosen: in this house
  alternatives:
  - in this temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In temple context 'house' is both literal
    and theologically resonant; 'temple' is interpretive but possible. 'House' better
    reflects the Hebrew wording.
