id: 2CH.6.8
reference: 2 Chronicles 6:8
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל דָּוִ֣יד אָבִ֔/י יַ֗עַן אֲשֶׁ֤ר הָיָה֙ עִם לְבָ֣בְ/ךָ֔ לִ/בְנ֥וֹת בַּ֖יִת לִ/שְׁמִ֑/י הֱֽטִיב֔וֹתָ כִּ֥י הָיָ֖ה עִם לְבָבֶֽ/ךָ־־־׃
translation:
  text: But the LORD said to David my father, ‘Because it was in your heart to build a house for my name, you did well to have this in your heart.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to build a temple for my name.' The Hebrew literally says 'to build a house for my name.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you did well that it was in your heart'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional small-caps convention in plain text as 'the LORD'.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר; 'said' is the most natural English rendering here.
- source_word: אָבִי
  chosen: my father
  lexicon: HALOT
  rationale: Literal filial reference from Solomon's speech; no reason to paraphrase.
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Since
  - Inasmuch as
  lexicon: HALOT
  rationale: The paired particles introduce the reason clause. 'Because' is concise and natural modern English.
- source_word: הָיָה עִם לְבָבְךָ
  chosen: it was in your heart
  alternatives:
  - it was with your heart
  - you had it in mind
  lexicon: HALOT
  rationale: The Hebrew idiom refers to inward intention or resolve. 'It was in your heart' preserves the metaphor and remains clear in English.
- source_word: לִבְנוֹת בַּיִת לִשְׁמִי
  chosen: to build a house for my name
  alternatives:
  - to build a temple for my name
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In this context it refers to the temple, but 'house for my name' preserves the Hebrew expression and its theological resonance without over-specifying.
- source_word: הֱטִיבוֹתָ
  chosen: you did well
  alternatives:
  - you have done well
  - it was good that you did this
  lexicon: HALOT
  rationale: Hiphil of יטב here expresses approval. 'You did well' is idiomatic and fits the direct divine commendation.
- source_word: כִּי הָיָה עִם לְבָבֶךָ
  chosen: that it was in your heart
  alternatives:
  - because it was in your heart
  lexicon: HALOT
  rationale: The clause restates the approved intention. Rendering כִּי here as 'that' yields smoother English after 'you did well,' while preserving the sense of the Hebrew repetition.
