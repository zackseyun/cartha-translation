  from: you did well that it was in your heart
  to: you did well to have this in your heart
  rationale: While a literal rendering of the Hebrew repetition, the phrase 'Because it was in your heart... you did well that it was in your heart' sounds tautological in English. A slightly more dynamic phrasing like 'you did well to have this in your heart' would improve fluency while retaining the meaning of God's approval for David's intention.
