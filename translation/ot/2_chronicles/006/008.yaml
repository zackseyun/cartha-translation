theological_decisions:
- issue: Rendering the temple expression בַּיִת לִשְׁמִי
  chosen_reading: house for my name
  alternative_readings:
  - temple for my name
  rationale: The Hebrew says 'house,' and the phrase 'for my name' is theologically significant in Deuteronomistic and Chronicler usage, emphasizing the place associated with God's name rather than implying that God is contained there. 'Temple' is interpretively correct but less textually transparent, so it is preserved as an alternative rather than used in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it'
revisions:
