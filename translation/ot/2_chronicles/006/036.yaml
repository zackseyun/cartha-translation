id: 2CH.6.36
reference: 2 Chronicles 6:36
source:
  edition: WLC
  text: כִּ֣י יֶחֶטְאוּ לָ֗/ךְ כִּ֣י אֵ֤ין אָדָם֙ אֲשֶׁ֣ר לֹא יֶחֱטָ֔א וְ/אָנַפְתָּ֣
    בָ֔/ם וּ/נְתַתָּ֖/ם לִ/פְנֵ֣י אוֹיֵ֑ב וְ/שָׁב֧וּ/ם שׁוֹבֵי/הֶ֛ם אֶל אֶ֥רֶץ רְחוֹקָ֖ה
    א֥וֹ קְרוֹבָֽה־־־׃
translation:
  text: When they sin against you—for there is no man who does not sin—and you are
    angry with them and give them over to an enemy, so that their captors carry them
    away to a land far or near,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “there is no one who does not sin.” The Hebrew says “man” in a generic
      sense for humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  - For
  lexicon: HALOT
  rationale: The opening כִּי introduces a conditional circumstance within Solomon's
    prayer. In context, 'when' is more natural than 'if,' since the following parenthetical
    clause assumes human sinfulness as a reality.
- source_word: יֶחֶטְאוּ לָךְ
  chosen: they sin against you
  alternatives:
  - they sin to you
  lexicon: HALOT
  rationale: חטא with ל can denote sin committed against someone. 'Against you' is
    idiomatic and reflects the relational offense against God.
- source_word: אֵין אָדָם אֲשֶׁר לֹא יֶחֱטָא
  chosen: there is no man who does not sin
  alternatives:
  - there is no human being who does not sin
  - there is no one who does not sin
  lexicon: HALOT
  rationale: אָדָם here is generic for humanity. Per doctrine, gender-accurate rendering
    is preferred where representative force is present; 'man' preserves the Hebrew
    form while still functioning generically in English. The clause is proverbial
    and best rendered straightforwardly.
- source_word: וְאָנַפְתָּ בָם
  chosen: and you are angry with them
  alternatives:
  - and you become angry with them
  - and you are enraged against them
  lexicon: HALOT
  rationale: The verb from אנף denotes anger. 'Are angry' is clear modern English
    and fits the prayer's conditional sequence without overstating the intensity.
- source_word: וּנְתַתָּם לִפְנֵי אוֹיֵב
  chosen: and give them over to an enemy
  alternatives:
  - and deliver them before an enemy
  - and hand them over to the enemy
  lexicon: HALOT
  rationale: נתן + לפני אויב expresses giving someone into an enemy's power. 'Give
    them over to an enemy' communicates subjection without woodenly preserving 'before.'
    The singular אוֹיֵב is indefinite here, hence 'an enemy' rather than 'the enemy.'
- source_word: וְשָׁבוּם שׁוֹבֵיהֶם
  chosen: so that their captors carry them away
  alternatives:
  - and their captors take them captive
  - and those who capture them bring them back
  lexicon: HALOT
  rationale: The construction uses the verb שׁבה with a cognate participle ('their
    captors'). The sense is that the enemy takes them into captivity. 'Carry them
    away' is idiomatic English for deportation and avoids the awkward cognate repetition
    while preserving meaning.
- source_word: אֶל אֶרֶץ רְחוֹקָה אוֹ קְרוֹבָה
  chosen: to a land far or near
  alternatives:
  - to a distant or nearby land
  - to a land far away or close by
  lexicon: HALOT
  rationale: The phrase contrasts distance without specifying from what point; 'far
    or near' is concise and preserves the Hebrew pairing.
