theological_decisions:
- issue: Generic אָדָם in a statement about universal human sinfulness
  chosen_reading: there is no man who does not sin
  alternative_readings:
  - there is no one who does not sin
  - there is no human being who does not sin
  rationale: The Hebrew uses singular אָדָם generically. Following the doctrine's
    gender-accurate principle, 'man' is retained as a representative singular rather
    than neutralizing the form. A more inclusive alternative is preserved in a footnote
    for readability concerns.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
