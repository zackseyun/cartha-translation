theological_decisions:
- issue: Whether to render the temple term explicitly as 'temple' or preserve the
    house imagery
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: The Hebrew says 'house,' and preserving that wording maintains the biblical
    theology of the temple as God's house without importing a more interpretive label
    into the main text.
  doctrine_reference: Translation philosophy §1, §5
- issue: How to express the permanence implied by עוֹלָמִים in relation to God's dwelling
  chosen_reading: forever
  alternative_readings:
  - for ages
  - perpetually
  rationale: The verse speaks in dedicatory, liturgical language about the temple
    as God's enduring dwelling place. 'Forever' preserves the rhetorical force without
    forcing a later theological resolution about the temple's historical destruction;
    the translation should preserve the text's own tension.
  doctrine_reference: Translation philosophy §3
