id: 2CH.6.2
reference: 2 Chronicles 6:2
source:
  edition: WLC
  text: וַֽ/אֲנִ֛י בָּנִ֥יתִי בֵית זְבֻ֖ל לָ֑/ךְ וּ/מָכ֥וֹן לְ/שִׁבְתְּ/ךָ֖ עוֹלָמִֽים־׃
translation:
  text: But I have built for you a lofty house, a place for you to dwell forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a house of exaltation,' 'a majestic house,' or 'a house as a habitation.'
      The Hebrew expression is compact and may emphasize the house's exalted character
      or its function as a dwelling.
    reason: lexical_alternative
  - marker: b
    text: Or 'temple' for 'house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But I
  alternatives:
  - And I
  - As for me, I
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun gives an emphatic transition.
    In context, 'But I' captures the contrastive force better than a simple 'And I,'
    while remaining natural English.
- source_word: בָּנִיתִי
  chosen: have built
  alternatives:
  - built
  lexicon: HALOT
  rationale: The Hebrew perfect denotes a completed action. English present perfect
    fits Solomon's declaration of a completed work with present relevance.
- source_word: בֵית
  chosen: house
  alternatives:
  - temple
  lexicon: HALOT
  rationale: Literally 'house.' Although it refers to the temple, 'house' preserves
    the Hebrew wording and its theological resonance as God's house. 'Temple' is interpretive
    and therefore left as an alternative.
- source_word: זְבֻל
  chosen: lofty
  alternatives:
  - exalted
  - majestic
  - habitation
  lexicon: HALOT
  rationale: The noun can denote an exalted or lofty abode. In construct with 'house,'
    it describes the house as a lofty or exalted dwelling. 'Lofty' preserves the elevated
    sense without over-paraphrasing. 'Habitation' is possible but would flatten the
    two-noun construction.
- source_word: לָךְ
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The preposition marks benefit or dedication. 'For you' is the most natural
    English rendering in this dedicatory context.
- source_word: וּמָכוֹן
  chosen: a place
  alternatives:
  - an established place
  - a fixed place
  - a dwelling place
  lexicon: HALOT
  rationale: The term denotes a fixed or established place. 'A place' is concise and
    natural in English, while the following infinitive phrase supplies its function.
    The more explicit alternatives are possible but somewhat heavier stylistically.
- source_word: לְשִׁבְתְּךָ
  chosen: for you to dwell
  alternatives:
  - for your dwelling
  - for your sitting/enthronement
  lexicon: HALOT
  rationale: From ישׁב, 'to sit, dwell.' In reference to God's presence in the temple,
    'to dwell' is the clearest idiomatic rendering. 'Sitting/enthronement' is lexically
    possible but less likely here given the parallel with house/place.
- source_word: עוֹלָמִים
  chosen: forever
  alternatives:
  - for ages
  - for evermore
  - perpetually
  lexicon: HALOT
  rationale: The plural form intensifies duration. 'Forever' is idiomatic modern English
    and adequately conveys enduring permanence in this prayer context.
