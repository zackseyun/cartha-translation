id: 2CH.6.32
reference: 2 Chronicles 6:32
source:
  edition: WLC
  text: וְ/גַ֣ם אֶל הַ/נָּכְרִ֗י אֲ֠שֶׁר לֹ֥א מֵ/עַמְּ/ךָ֣ יִשְׂרָאֵל֮ הוּא֒ וּ/בָ֣א
    מֵ/אֶ֣רֶץ רְחוֹקָ֗ה לְמַ֨עַן שִׁמְ/ךָ֤ הַ/גָּדוֹל֙ וְ/יָדְ/ךָ֣ הַ/חֲזָקָ֔ה וּֽ/זְרֽוֹעֲ/ךָ֖
    הַ/נְּטוּיָ֑ה וּ/בָ֥אוּ וְ/הִֽתְפַּלְל֖וּ אֶל הַ/בַּ֥יִת הַ/זֶּֽה־׀־׃
translation:
  text: And also concerning the foreigner, who is not from your people Israel, but
    comes from a distant land because of your great name and your mighty hand and
    your outstretched arm, when they come and pray toward this house,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to this house'; the Hebrew preposition can be rendered more literally
      that way, but in this prayer context it carries the sense 'toward this house.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew shifts from singular ('the foreigner ... comes') to plural ('they
      come and pray'), likely using the foreigner as a representative case.
    reason: alternative_reading
lexical_decisions:
- source_word: הַנָּכְרִי
  chosen: the foreigner
  alternatives:
  - the stranger
  - the outsider
  - the foreign national
  lexicon: HALOT
  rationale: נָכְרִי denotes a person from another people group, not an Israelite.
    'Foreigner' is natural modern English and preserves the ethnic/covenantal distinction
    better than 'stranger,' which can suggest merely an unknown person.
- source_word: אֲשֶׁר לֹא מֵעַמְּךָ יִשְׂרָאֵל הוּא
  chosen: who is not from your people Israel
  alternatives:
  - who is not of your people Israel
  - who does not belong to your people Israel
  lexicon: HALOT
  rationale: This clause identifies the foreigner by exclusion from Israel. 'From
    your people Israel' is idiomatic English while retaining the covenantal reference
    to Israel as God's people.
- source_word: וּבָא מֵאֶרֶץ רְחוֹקָה
  chosen: but comes from a distant land
  alternatives:
  - and comes from a far country
  - and comes from a remote land
  lexicon: HALOT
  rationale: 'The waw here is rendered adversatively in smooth English after the negative
    relative clause: the foreigner is not from Israel, but comes from far away. ''Distant
    land'' is contemporary and faithful to אֶרֶץ רְחוֹקָה.'
- source_word: לְמַעַן שִׁמְךָ הַגָּדוֹל
  chosen: because of your great name
  alternatives:
  - for the sake of your great name
  - on account of your great name
  lexicon: HALOT
  rationale: לְמַעַן here expresses motive/occasion. 'Because of' communicates that
    the foreigner comes in response to God's renown. 'Great name' preserves the biblical
    idiom of reputation and revealed identity.
- source_word: וְיָדְךָ הַחֲזָקָה
  chosen: your mighty hand
  alternatives:
  - your strong hand
  lexicon: HALOT
  rationale: The phrase is a standard idiom for God's powerful action. 'Mighty hand'
    is established, natural English and pairs well with the following phrase.
- source_word: וּזְרֹעֲךָ הַנְּטוּיָה
  chosen: your outstretched arm
  alternatives:
  - your extended arm
  lexicon: HALOT
  rationale: This is a conventional biblical anthropomorphism for divine power in
    action. 'Outstretched arm' is the most recognizable and accurate rendering.
- source_word: וּבָאוּ
  chosen: when they come
  alternatives:
  - and they come
  - and when they come
  lexicon: HALOT
  rationale: Although formally plural after the singular 'foreigner,' the verb likely
    generalizes the case or reflects a shift to an indefinite plural. 'When they come'
    gives good English flow and prepares for the prayer request continued in the next
    verse.
- source_word: וְהִתְפַּלְלוּ
  chosen: and pray
  alternatives:
  - and pray toward
  lexicon: HALOT
  rationale: The verb itself means 'pray.' The directional nuance is supplied by אֶל
    plus 'this house,' so the fuller English phrase is expressed in combination with
    the prepositional phrase.
- source_word: אֶל הַבַּיִת הַזֶּה
  chosen: toward this house
  alternatives:
  - to this house
  - toward this temple
  lexicon: HALOT
  rationale: In Solomon's temple prayer, praying 'toward' the house is the idiomatic
    sense of אֶל here. 'House' preserves the Hebrew term and its theological resonance
    as God's house, while 'temple' is a possible but less literal alternative.
