theological_decisions:
- issue: Number shift from singular 'foreigner' to plural verbs
  chosen_reading: 'Render with singular antecedent but plural English pronoun/verb
    sequence: ''when they come and pray'''
  alternative_readings:
  - when he comes and prays
  - when such foreigners come and pray
  rationale: The Hebrew shifts from singular הַנָּכְרִי/וּבָא to plural וּבָאוּ וְהִתְפַּלְלוּ.
    Preserving the shift too woodenly as 'he... they' is awkward in English. Using
    singular 'the foreigner' with generic plural continuation reflects the representative
    sense without flattening the syntax into a purely singular or purely plural construction.
  doctrine_reference: Translation philosophy §§3, 4, 6
- issue: Anthropomorphic language for God's power
  chosen_reading: Retain 'your mighty hand and your outstretched arm' literally
  alternative_readings:
  - your great power
  rationale: The Hebrew uses concrete anthropomorphic imagery common in covenantal
    and exodus language. The translation preserves this theological texture rather
    than reducing it to abstraction.
  doctrine_reference: Translation philosophy §§1, 6
