id: 2CH.6.12
reference: 2 Chronicles 6:12
source:
  edition: WLC
  text: וַֽ/יַּעֲמֹ֗ד לִ/פְנֵי֙ מִזְבַּ֣ח יְהוָ֔ה נֶ֖גֶד כָּל קְהַ֣ל יִשְׂרָאֵ֑ל וַ/יִּפְרֹ֖שׂ
    כַּפָּֽי/ו־׃
translation:
  text: Then he stood before the altar of the LORD in front of all the assembly of
    Israel and spread out his hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole assembly of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'spread out his palms'; the idiom refers to extending the hands in
      prayer.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד
  chosen: Then he stood
  alternatives:
  - And he stood
  - He stood
  lexicon: HALOT
  rationale: Wayyiqtol of עמד advances the narrative. 'Then he stood' gives natural
    English narrative sequence while preserving the simple verbal sense 'stood'.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - facing
  lexicon: HALOT
  rationale: The preposition with פני commonly means 'before' in spatial relation.
    This fits the altar as the reference point.
- source_word: מִזְבַּח יְהוָה
  chosen: the altar of the LORD
  alternatives:
  - the LORD's altar
  lexicon: HALOT
  rationale: Construct chain is most transparently rendered 'the altar of the LORD.'
    The divine name follows project policy as 'the LORD' for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: נֶגֶד
  chosen: in front of
  alternatives:
  - before
  - in the sight of
  lexicon: HALOT
  rationale: נגד marks position vis-à-vis the gathered people. Since 'before' was
    already used for לִפְנֵי, 'in front of' preserves the distinct spatial nuance
    in readable English.
- source_word: כָּל קְהַל יִשְׂרָאֵל
  chosen: all the assembly of Israel
  alternatives:
  - the whole assembly of Israel
  - all the congregation of Israel
  lexicon: HALOT
  rationale: קהל denotes the assembled community. 'Assembly' is clear modern English
    and preserves the corporate sense better than the more tradition-bound 'congregation'
    in this narrative setting.
- source_word: וַיִּפְרֹשׂ
  chosen: and spread out
  alternatives:
  - and stretched out
  - and spread
  lexicon: HALOT
  rationale: פרש with hands denotes extending or spreading them out in prayer. 'Spread
    out' is idiomatic and visually clear.
- source_word: כַּפָּיו
  chosen: his hands
  alternatives:
  - his palms
  lexicon: HALOT
  rationale: Though כף can specifically mean 'palm,' in this idiom with פרש the natural
    English expression is 'spread out his hands.' This conveys the prayer gesture
    without awkward literalism.
