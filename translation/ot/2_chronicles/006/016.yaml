theological_decisions:
- issue: Rendering the Davidic promise formula
  chosen_reading: Retain the idiom 'shall not be cut off from you' rather than replacing
    it with the smoother dynastic paraphrase 'you shall not lack a man.'
  alternative_readings:
  - you shall not lack a man
  - there shall not fail you a man
  rationale: The Hebrew explicitly uses covenantal 'cut off' language. Preserving
    it maintains the theological texture of conditional dynastic continuity while
    the rest of the clause makes the meaning clear.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
- issue: Rendering תורה
  chosen_reading: my law
  alternative_readings:
  - my instruction
  rationale: Both are lexically possible, but 'law' better matches the covenant-obedience
    framework in this royal prayer. This does not deny the broader semantic range
    of תורה, which is preserved in the lexical documentation.
  doctrine_reference: 'Translation philosophy: consistency of key terms, or documented
    exception.'
