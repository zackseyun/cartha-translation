id: 2CH.6.16
reference: 2 Chronicles 6:16
source:
  edition: WLC
  text: וְ/עַתָּ֞ה יְהוָ֣ה אֱלֹהֵ֣י יִשְׂרָאֵ֗ל שְׁ֠מֹר לְ/עַבְדְּ/ךָ֨ דָוִ֤יד אָבִ/י֙
    אֵת֩ אֲשֶׁ֨ר דִּבַּ֤רְתָּ לּ/וֹ֙ לֵ/אמֹ֔ר לֹא יִכָּרֵ֨ת לְ/ךָ֥ אִישׁ֙ מִ/לְּ/פָנַ֔/י
    יוֹשֵׁ֖ב עַל כִּסֵּ֣א יִשְׂרָאֵ֑ל רַ֠ק אִם יִשְׁמְר֨וּ בָנֶ֜י/ךָ אֶת דַּרְכָּ֗/ם
    לָ/לֶ֨כֶת֙ בְּ/ת֣וֹרָתִ֔/י כַּ/אֲשֶׁ֥ר הָלַ֖כְתָּ לְ/פָנָֽ/י׀־־־־׃
translation:
  text: And now, LORD, God of Israel, keep for your servant David my father what you
    spoke to him, saying, ‘A man to sit on the throne of Israel before me shall not
    be cut off from you, if only your sons keep their way by walking in my law, as
    you have walked before me.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'You shall not lack a man before me to sit on the
      throne of Israel.' The Hebrew is literally, 'A man ... shall not be cut off
      from you.'
    reason: lexical_alternative
  - marker: b
    text: '''My law'' may also be rendered ''my instruction.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as 'LORD' per doctrine default for the divine name, following
    established English convention for YHWH while distinguishing it from 'God'.
- source_word: שְׁמֹר
  chosen: keep
  alternatives:
  - fulfill
  - observe
  lexicon: HALOT
  rationale: Imperative of שמר here asks God to guard/keep the promise previously
    spoken. 'Keep' preserves the covenantal sense without overinterpreting as merely
    'fulfill' or 'observe'.
- source_word: לְעַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in royal prayer language for David
    before God, 'servant' is the natural English rendering and the bonded-status nuance
    is not foregrounded.
- source_word: דָוִיד אָבִי
  chosen: David my father
  alternatives:
  - my father David
  lexicon: HALOT
  rationale: Rendered in natural English apposition while preserving the filial identification
    central to Solomon's prayer.
- source_word: אֵת אֲשֶׁר דִּבַּרְתָּ לוֹ
  chosen: what you spoke to him
  alternatives:
  - that which you promised him
  - what you said to him
  lexicon: HALOT
  rationale: The clause refers to God's prior spoken promise. 'What you spoke to him'
    stays close to the Hebrew and avoids importing 'promise' where the text says 'spoke,'
    though the promissory force is clear from context.
- source_word: לֹא יִכָּרֵת לְךָ אִישׁ
  chosen: A man ... shall not be cut off from you
  alternatives:
  - You shall not lack a man
  - there shall not fail you a man
  lexicon: HALOT
  rationale: The Niphal of כרת literally means 'be cut off.' Retaining that idiom
    preserves the covenantal flavor and the source imagery, while the following infinitival-participial
    phrase clarifies the dynastic meaning.
- source_word: מִלְּפָנַי
  chosen: before me
  alternatives:
  - from before me
  - in my presence
  lexicon: HALOT
  rationale: '''Before me'' is the most direct and idiomatic rendering, preserving
    the sense of standing in God''s sight/presence.'
- source_word: יוֹשֵׁב עַל כִּסֵּא יִשְׂרָאֵל
  chosen: to sit on the throne of Israel
  alternatives:
  - sitting on the throne of Israel
  - who sits on the throne of Israel
  lexicon: HALOT
  rationale: This participial phrase describes the dynastic successor. 'To sit' expresses
    the function smoothly in English after 'a man,' while preserving the royal enthronement
    sense.
- source_word: רַק אִם
  chosen: if only
  alternatives:
  - only if
  - provided that
  lexicon: HALOT
  rationale: This combination introduces a strong condition. 'If only' captures the
    restrictive force in natural English prayer language.
- source_word: יִשְׁמְרוּ בָנֶיךָ אֶת דַּרְכָּם
  chosen: your sons keep their way
  alternatives:
  - your sons guard their way
  - your sons watch their conduct
  lexicon: HALOT
  rationale: The idiom combines שמר with 'way' to denote careful conduct. 'Keep their
    way' is close to the Hebrew and understandable in context.
- source_word: לָלֶכֶת בְּתוֹרָתִי
  chosen: by walking in my law
  alternatives:
  - to walk in my law
  - by living according to my instruction
  lexicon: HALOT
  rationale: Torah here refers to God's law/instruction. 'Law' fits the covenantal-royal
    context; 'by walking' preserves the Hebrew infinitive expressing manner.
- source_word: בְּתוֹרָתִי
  chosen: my law
  alternatives:
  - my instruction
  lexicon: HALOT
  rationale: תורה can mean instruction or law. In this context of covenant obedience
    tied to Davidic succession, 'law' best conveys the normative force without obscuring
    the personal possessive 'my.'
- source_word: כַּאֲשֶׁר הָלַכְתָּ לְפָנָי
  chosen: as you have walked before me
  alternatives:
  - just as you walked before me
  - as you have lived before me
  lexicon: HALOT
  rationale: The idiom 'walk before me' is a standard covenantal expression for faithful
    conduct in God's presence. 'Walked before me' preserves the biblical metaphor.
