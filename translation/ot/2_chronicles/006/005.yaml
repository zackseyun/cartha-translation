theological_decisions:
- issue: Temple terminology and divine presence language
  chosen_reading: Retain 'house' and 'for my name to be there' rather than interpretive
    expansions such as 'temple' or 'for my presence to dwell there.'
  alternative_readings:
  - to build a temple so that my name would dwell there
  rationale: The verse speaks in covenantal 'name' theology and uses the ordinary
    noun 'house.' A more interpretive rendering could prematurely resolve the theological
    nuance of how God's name relates to the sanctuary. The chosen wording preserves
    the text's own categories.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gender rendering of אִישׁ
  chosen_reading: Render אִישׁ as 'a man.'
  alternative_readings:
  - anyone
  - a person
  rationale: The Hebrew is grammatically masculine singular and refers to an individual
    male ruler in Israel's history. Per the gender-accurate policy, the masculine
    form should be preserved rather than neutralized.
  doctrine_reference: Translation philosophy §4
