id: 2CH.6.5
reference: 2 Chronicles 6:5
source:
  edition: WLC
  text: מִן הַ/יּ֗וֹם אֲשֶׁ֨ר הוֹצֵ֣אתִי אֶת עַמִּ/י֮ מֵ/אֶ֣רֶץ מִצְרַיִם֒ לֹא בָחַ֣רְתִּֽי
    בְ/עִ֗יר מִ/כֹּל֙ שִׁבְטֵ֣י יִשְׂרָאֵ֔ל לִ/בְנ֣וֹת בַּ֔יִת לִ/הְי֥וֹת שְׁמִ֖/י
    שָׁ֑ם וְ/לֹא בָחַ֣רְתִּֽי בְ/אִ֔ישׁ לִ/הְי֥וֹת נָגִ֖יד עַל עַמִּ֥/י יִשְׂרָאֵֽל־־־־־׃
translation:
  text: From the day that I brought my people out of the land of Egypt, I have not
    chosen a city from any of the tribes of Israel to build a house for my name to
    be there, nor have I chosen a man to be ruler over my people Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Since the day that I brought my people out of the land of Egypt, I did
      not choose...' The Hebrew perfects can be rendered with simple past, but the
      English present perfect better conveys the continuing force from that past point.
    reason: lexical_alternative
  - marker: b
    text: '''House'' refers to the temple; the Hebrew uses ''house'' rather than the
      more interpretive English term ''temple.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'leader' or 'prince' for 'ruler.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן הַיּוֹם אֲשֶׁר
  chosen: From the day that
  alternatives:
  - Since the day that
  - From the time when
  lexicon: HALOT
  rationale: A temporal expression marking the starting point of the following negated
    actions. 'From the day that' is idiomatic and preserves the Hebrew construction
    closely.
- source_word: הוֹצֵאתִי
  chosen: I brought ... out
  alternatives:
  - I led ... out
  lexicon: HALOT
  rationale: The Hiphil of יצא here is causative, referring to the exodus. 'Brought
    out' is the standard and natural English equivalent in this context.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward covenantal designation; no reason to weaken or paraphrase
    it.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: out of the land of Egypt
  alternatives:
  - from the land of Egypt
  lexicon: HALOT
  rationale: The preposition with 'brought out' is naturally rendered 'out of.' 'Land
    of Egypt' preserves the formal geographic expression.
- source_word: לֹא בָחַרְתִּי
  chosen: I have not chosen
  alternatives:
  - I did not choose
  lexicon: HALOT
  rationale: The perfect with the temporal frame 'from the day that...' naturally
    carries a sense extending from past to present in English. 'I have not chosen'
    best reflects that continuing relevance.
- source_word: בְעִיר
  chosen: a city
  alternatives:
  - in a city
  lexicon: HALOT
  rationale: With בחר, the preposition ב can mark the object selected ('choose a city'),
    not merely location. English idiom prefers direct object wording here.
- source_word: מִכֹּל שִׁבְטֵי יִשְׂרָאֵל
  chosen: from any of the tribes of Israel
  alternatives:
  - from all the tribes of Israel
  - out of all the tribes of Israel
  lexicon: HALOT
  rationale: In a negated statement, 'from any of' communicates the distributive force
    clearly in modern English better than the more wooden 'from all.'
- source_word: לִבְנוֹת בַּיִת
  chosen: to build a house
  alternatives:
  - to build a temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' Although the referent is the temple,
    'house' preserves the Hebrew wording and its theological resonance; 'temple' would
    be more interpretive.
- source_word: לִהְיוֹת שְׁמִי שָׁם
  chosen: for my name to be there
  alternatives:
  - that my name might be there
  - for my name to dwell there
  lexicon: HALOT
  rationale: The Hebrew says literally 'for my name to be there.' This preserves the
    covenantal theology of divine name-presence without importing the more interpretive
    'dwell,' which is not the verb used here.
- source_word: וְלֹא בָחַרְתִּי בְאִישׁ
  chosen: nor have I chosen a man
  alternatives:
  - and I have not chosen a man
  - nor have I chosen anyone
  lexicon: HALOT
  rationale: אִישׁ is singular 'man.' Per the gender-accurate policy, the masculine
    singular is retained rather than neutralized to 'anyone.' 'Nor' fits the parallel
    negation smoothly in English.
- source_word: נָגִיד
  chosen: ruler
  alternatives:
  - leader
  - prince
  lexicon: HALOT
  rationale: נָגִיד denotes one placed in authority. 'Ruler' is clear modern English
    and avoids the archaic or potentially misleading connotations of 'prince,' while
    remaining stronger than the broader 'leader'.
- source_word: עַל עַמִּי יִשְׂרָאֵל
  chosen: over my people Israel
  alternatives:
  - over Israel my people
  lexicon: HALOT
  rationale: This preserves both the authority relation ('over') and the covenantal
    phrase 'my people Israel' in natural English order.
