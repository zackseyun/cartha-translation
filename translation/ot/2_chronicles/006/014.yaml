id: 2CH.6.14
reference: 2 Chronicles 6:14
source:
  edition: WLC
  text: וַ/יֹּאמַ֗ר יְהוָ֞ה אֱלֹהֵ֤י יִשְׂרָאֵל֙ אֵין כָּמ֣וֹ/ךָ אֱלֹהִ֔ים בַּ/שָּׁמַ֖יִם
    וּ/בָ/אָ֑רֶץ שֹׁמֵ֤ר הַ/בְּרִית֙ וְֽ/הַ/חֶ֔סֶד לַ/עֲבָדֶ֕י/ךָ הַ/הֹלְכִ֥ים לְ/פָנֶ֖י/ךָ
    בְּ/כָל לִבָּֽ/ם־־׃
translation:
  text: And he said, “O LORD, God of Israel, there is no God like you in heaven or
    on earth, keeping the covenant and the steadfast love for your servants who walk
    before you with all their heart.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “keeping the covenant and covenant faithfulness for your servants.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמַר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing Solomon's prayer. 'And he said'
    preserves the Hebrew narrative flow without overinterpreting temporal sequence.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: God of Israel
  alternatives:
  - God of Isra’el
  lexicon: HALOT
  rationale: Construct phrase identifying YHWH covenantally as Israel's God. 'God
    of Israel' is the natural English equivalent.
- source_word: אֵין כָּמוֹךָ אֱלֹהִים
  chosen: there is no God like you
  alternatives:
  - there is none like you among the gods
  - there is no god like you
  lexicon: HALOT
  rationale: The Hebrew idiom states incomparability. Rendering with singular 'God'
    fits the immediate predicate and English idiom while preserving the claim of YHWH's
    uniqueness.
- source_word: בַּשָּׁמַיִם וּבָאָרֶץ
  chosen: in heaven or on earth
  alternatives:
  - in the heavens and on the earth
  - in heaven and on earth
  lexicon: HALOT
  rationale: Merism expressing totality. 'In heaven or on earth' is idiomatic English
    in a negative comparison statement and preserves the scope of the claim.
- source_word: שֹׁמֵר
  chosen: keeping
  alternatives:
  - who keeps
  - guarding
  lexicon: HALOT
  rationale: Participial form describing God's characteristic action. 'Keeping' flows
    naturally after the vocative clause and retains the durative sense.
- source_word: הַבְּרִית
  chosen: the covenant
  lexicon: HALOT
  rationale: Definite noun referring to God's covenantal commitment; 'covenant' is
    the standard and theologically appropriate rendering.
- source_word: וְהַחֶסֶד
  chosen: the steadfast love
  alternatives:
  - lovingkindness
  - mercy
  - covenant faithfulness
  lexicon: HALOT
  rationale: חֶסֶד is rich covenantal loyalty/mercy. 'Steadfast love' is a well-established
    English rendering that preserves both affection and covenant constancy better
    than the narrower 'mercy'.
- source_word: לַעֲבָדֶיךָ
  chosen: for your servants
  alternatives:
  - toward your servants
  - with your servants
  lexicon: HALOT
  rationale: The preposition marks the beneficiaries/objects of God's covenant-keeping.
    'For your servants' is clear modern English and fits the syntax with 'keeping.'
    'Servants' is preferable here because bonded status is not the salient point.
- source_word: הַהֹלְכִים לְפָנֶיךָ
  chosen: who walk before you
  alternatives:
  - who live before you
  - who walk in your presence
  lexicon: HALOT
  rationale: Common Hebrew idiom for faithful conduct in God's presence. 'Walk before
    you' preserves the metaphor and biblical resonance.
- source_word: בְּכָל לִבָּם
  chosen: with all their heart
  alternatives:
  - with their whole heart
  - with all their hearts
  lexicon: HALOT
  rationale: Hebrew singular 'heart' with plural suffix is a collective/distributive
    expression. 'With all their heart' is idiomatic English and preserves the sense
    of undivided devotion.
