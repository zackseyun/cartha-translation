theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This also matches the prayer's liturgical tone in English.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of חֶסֶד in covenant context
  chosen_reading: steadfast love
  alternative_readings:
  - lovingkindness
  - mercy
  - covenant faithfulness
  rationale: The verse pairs חֶסֶד with 'the covenant,' so the translation should
    preserve covenantal loyalty without collapsing the term into a technical gloss.
    'Steadfast love' best balances readability and theological weight.
  doctrine_reference: DOCTRINE.md Translation philosophy §6; consistency of key terms
    §5
