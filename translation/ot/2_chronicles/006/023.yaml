theological_decisions:
- issue: Forensic sense of divine judgment
  chosen_reading: 'Render the verse in judicial terms: God judges, repays the wicked,
    and vindicates the righteous.'
  alternative_readings:
  - A more general sense of governing or intervening without explicit courtroom nuance
  rationale: The paired clauses about the wicked and the righteous, together with
    שׁפט and הצדיק, strongly indicate a legal/judicial setting. The translation preserves
    that tension without importing later doctrinal categories.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of הצדיק
  chosen_reading: vindicating the righteous
  alternative_readings:
  - justifying the righteous
  rationale: While 'justify' is lexically possible, in English it can evoke Pauline
    doctrinal formulations beyond the immediate context. 'Vindicate' preserves the
    forensic declaration of rightness in a historical prayer setting without theological
    overreach.
  doctrine_reference: Translation philosophy §§1, 3, 6
