id: 2CH.6.23
reference: 2 Chronicles 6:23
source:
  edition: WLC
  text: וְ/אַתָּ֣ה תִּשְׁמַ֣ע מִן הַ/שָּׁמַ֗יִם וְ/עָשִׂ֨יתָ֙ וְ/שָׁפַטְתָּ֣ אֶת עֲבָדֶ֔י/ךָ
    לְ/הָשִׁ֣יב לְ/רָשָׁ֔ע לָ/תֵ֥ת דַּרְכּ֖/וֹ בְּ/רֹאשׁ֑/וֹ וּ/לְ/הַצְדִּ֣יק צַדִּ֔יק
    לָ֥/תֶת ל֖/וֹ כְּ/צִדְקָתֽ/וֹ׀־־׃ס
translation:
  text: then you, hear from heaven and act, and judge your servants, repaying the
    wicked by bringing his way upon his own head, and vindicating the righteous by
    giving to him according to his righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justifying the righteous.' The Hebrew is a forensic term meaning to
      declare or treat someone as in the right.
    reason: lexical_alternative
  - marker: b
    text: Literally 'giving his way on his head,' a Hebrew idiom for bringing a person's
      conduct back upon him in judgment.
    reason: cultural_note
lexical_decisions:
- source_word: תִּשְׁמַע
  chosen: hear
  alternatives:
  - listen
  - give heed
  lexicon: HALOT
  rationale: In prayer language addressed to God, שׁמע commonly means 'hear' in the
    sense of attentive response. 'Hear from heaven' preserves the idiom and the solemn
    register better than 'listen.'
- source_word: מִן הַשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  lexicon: HALOT
  rationale: Although the Hebrew form is plural, English idiom in this context is
    singular 'heaven.' This is standard and accurately conveys the source sense without
    awkwardness.
- source_word: וְעָשִׂיתָ
  chosen: act
  alternatives:
  - do
  lexicon: HALOT
  rationale: The verb is broad ('do/make'), but in this judicial prayer context 'act'
    best conveys decisive divine intervention in natural English while remaining close
    to the source.
- source_word: וְשָׁפַטְתָּ אֶת עֲבָדֶיךָ
  chosen: judge your servants
  alternatives:
  - govern your servants
  - decide between your servants
  lexicon: HALOT
  rationale: שׁפט here is forensic, as the following infinitives specify acquitting/vindicating
    and repaying. 'Judge your servants' preserves the legal sense and the direct object
    construction.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it refers to covenant subjects
    standing before God in prayer, not emphasizing bonded status. 'Servants' is the
    most contextually fitting rendering.
- source_word: לְהָשִׁיב לְרָשָׁע
  chosen: repaying the wicked
  alternatives:
  - bringing back on the wicked
  - returning to the wicked
  lexicon: HALOT
  rationale: 'The infinitive of שוב with ל marks requital: causing the wicked person''s
    conduct to return upon him. ''Repaying the wicked'' expresses the judicial result
    in clear English, with the next phrase preserving the concrete idiom.'
- source_word: לָתֵת דַּרְכּוֹ בְּרֹאשׁוֹ
  chosen: by bringing his way upon his own head
  alternatives:
  - by putting his conduct on his head
  - by bringing his deeds back on his head
  lexicon: HALOT
  rationale: '''Way'' in Hebrew often means conduct or course of life. Retaining ''his
    way upon his own head'' preserves the Hebrew image of consequences returning on
    the offender, while ''bringing'' makes the syntax natural in English.'
- source_word: וּלְהַצְדִּיק צַדִּיק
  chosen: and vindicating the righteous
  alternatives:
  - and justifying the righteous
  - and declaring the righteous to be righteous
  lexicon: HALOT
  rationale: In this courtroom setting, צדק in the Hiphil means to declare or treat
    as in the right. 'Vindicating' communicates forensic acquittal more naturally
    in modern English than 'justify,' which may import later theological associations
    not explicit here.
- source_word: לָתֶת לוֹ כְּצִדְקָתוֹ
  chosen: by giving to him according to his righteousness
  alternatives:
  - by rewarding him according to his righteousness
  - by giving him according to his justice
  lexicon: HALOT
  rationale: The phrase expresses recompense proportionate to the righteous person's
    uprightness. 'According to his righteousness' is the most direct rendering; 'rewarding'
    is interpretive and therefore left as an alternative.
