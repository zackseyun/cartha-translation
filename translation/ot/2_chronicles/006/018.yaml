id: 2CH.6.18
reference: 2 Chronicles 6:18
source:
  edition: WLC
  text: כִּ֚י הַֽ/אֻמְנָ֔ם יֵשֵׁ֧ב אֱלֹהִ֛ים אֶת הָ/אָדָ֖ם עַל הָ/אָ֑רֶץ הִ֠נֵּה שָׁמַ֜יִם
    וּ/שְׁמֵ֤י הַ/שָּׁמַ֨יִם֙ לֹ֣א יְכַלְכְּל֔וּ/ךָ אַ֕ף כִּֽי הַ/בַּ֥יִת הַ/זֶּ֖ה
    אֲשֶׁ֥ר בָּנִֽיתִי־־־׃
translation:
  text: But will God indeed dwell with man on the earth? Behold, heaven and the highest
    heaven cannot contain you, much less this house that I have built.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with humankind' or 'with humanity'; Hebrew 'with man' uses אָדָם in
      a representative sense for human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֻמְנָם
  chosen: indeed
  alternatives:
  - really
  - truly
  lexicon: HALOT
  rationale: Introduces a rhetorical question expressing astonishment or incredulity.
    'Indeed' preserves the solemn tone better than the more colloquial 'really.'
- source_word: יֵשֵׁב
  chosen: dwell
  alternatives:
  - sit
  - remain
  lexicon: HALOT
  rationale: Though the verb is literally 'sit/dwell,' in context of divine presence
    with humanity and temple theology, 'dwell' is the natural English equivalent and
    matches the sense of residing/presence rather than physical sitting.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Singular sense in this context, referring to Israel's God.
- source_word: אֶת הָאָדָם
  chosen: with man
  alternatives:
  - with humankind
  - with humanity
  lexicon: HALOT
  rationale: The Hebrew construction here is idiomatic in context for dwelling 'with'
    man rather than making 'man' a direct object in English. 'Man' follows the project's
    gender-accurate policy for אָדָם where humanity is in view, while preserving the
    singular representative force of the Hebrew.
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - upon the earth
  lexicon: HALOT
  rationale: Straightforward locative rendering in natural modern English.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the demonstrative, attention-directing force and the elevated
    register appropriate to Solomon's prayer.
- source_word: שָׁמַיִם וּשְׁמֵי הַשָּׁמַיִם
  chosen: heaven and the highest heaven
  alternatives:
  - the heavens and the heaven of heavens
  - heaven and heaven of heavens
  lexicon: HALOT
  rationale: The Hebrew superlative expression literally reads 'heavens and heavens
    of heavens.' 'The highest heaven' communicates the idiomatic sense clearly in
    contemporary English while preserving the cosmological heightening.
- source_word: לֹא יְכַלְכְּלוּךָ
  chosen: cannot contain you
  alternatives:
  - cannot hold you
  - cannot sustain you
  lexicon: HALOT
  rationale: The verb conveys capacity to contain or hold. 'Contain' best fits the
    context of God's transcendence over all created space.
- source_word: אַף כִּי
  chosen: much less
  alternatives:
  - how much less
  - let alone
  lexicon: HALOT
  rationale: 'Marks an a fortiori argument: if even the heavens cannot contain God,
    then certainly this house cannot. ''Much less'' is concise and idiomatic.'
- source_word: הַבַּיִת הַזֶּה
  chosen: this house
  alternatives:
  - this temple
  lexicon: HALOT
  rationale: Although it refers to the temple, the Hebrew says 'house,' and retaining
    'house' preserves the temple-house motif without over-paraphrase.
- source_word: אֲשֶׁר בָּנִיתִי
  chosen: that I have built
  alternatives:
  - which I have built
  - that I built
  lexicon: HALOT
  rationale: Present perfect English naturally reflects the completed action with
    present relevance in Solomon's prayer.
