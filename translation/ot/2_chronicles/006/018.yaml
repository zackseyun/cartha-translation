theological_decisions:
- issue: Rendering אָדָם in a generic-humanity context
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The verse contrasts God with humanity in representative singular form.
    Per doctrine, gender-accurate renderings are preferred over flattening to gender-neutral
    language when the source uses masculine/generic singular. A footnote preserves
    the inclusive sense for modern readers.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table
    for אָדָם
