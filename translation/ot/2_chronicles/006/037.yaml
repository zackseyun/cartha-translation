id: 2CH.6.37
reference: 2 Chronicles 6:37
source:
  edition: WLC
  text: וְ/הֵשִׁ֨יבוּ֙ אֶל לְבָבָ֔/ם בָּ/אָ֖רֶץ אֲשֶׁ֣ר נִשְׁבּוּ שָׁ֑ם וְ/שָׁ֣בוּ
    וְ/הִֽתְחַנְּנ֣וּ אֵלֶ֗י/ךָ בְּ/אֶ֤רֶץ שִׁבְיָ/ם֙ לֵ/אמֹ֔ר חָטָ֥אנוּ הֶעֱוִ֖ינוּ
    וְ/רָשָֽׁעְנוּ־־׀׃
translation:
  text: and if they come to their senses in the land where they were taken captive,
    and turn back and plead with you in the land of their captivity, saying, ‘We have
    sinned, we have acted perversely, and we have acted wickedly,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'bring back to their heart,' an idiom meaning to reflect
      deeply or take to heart.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵשִׁיבוּ אֶל־לְבָבָם
  chosen: come to their senses
  alternatives:
  - bring it back to their heart
  - take it to heart
  lexicon: HALOT
  rationale: The idiom literally involves 'bringing back to the heart,' meaning inward
    reflection or recognition. 'Come to their senses' communicates the idiomatic force
    in natural English, while preserving the repentance context. Alternatives are
    viable and worth preserving because the Hebrew imagery is more literal than the
    chosen English idiom.
- source_word: בָּאָרֶץ אֲשֶׁר נִשְׁבּוּ שָׁם
  chosen: in the land where they were taken captive
  alternatives:
  - in the land where they were carried away captive
  - in the land where they were exiled there
  lexicon: HALOT
  rationale: נשבה in the Niphal denotes being taken captive. 'Taken captive' is clear
    modern English and fits the exile setting better than the more archaic 'carried
    away captive.'
- source_word: וְשָׁבוּ
  chosen: turn back
  alternatives:
  - return
  - repent
  lexicon: HALOT
  rationale: שׁוּב can mean return physically or spiritually. Here, in parallel with
    confession and supplication to God, it carries a repentance/return sense. 'Turn
    back' preserves the metaphor without over-interpreting as the explicitly theological
    term 'repent.'
- source_word: וְהִתְחַנְּנוּ אֵלֶיךָ
  chosen: plead with you
  alternatives:
  - make supplication to you
  - entreat you
  lexicon: HALOT
  rationale: The Hitpael of חנן expresses earnest supplication for favor. 'Plead with
    you' is natural modern English and retains the urgency of prayer.
- source_word: בְּאֶרֶץ שִׁבְיָם
  chosen: in the land of their captivity
  alternatives:
  - in the land of their exile
  - in the land where they are captives
  lexicon: HALOT
  rationale: שְׁבִי refers to captivity/captives. 'Land of their captivity' is a close
    and readable rendering, preserving the concrete condition of exile.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and saying
  lexicon: HALOT
  rationale: Standard quotative introducing the content of their confession.
- source_word: חָטָאנוּ
  chosen: We have sinned
  lexicon: HALOT
  rationale: Straightforward confession formula; 'sinned' is the standard and accurate
    rendering.
- source_word: הֶעֱוִינוּ
  chosen: we have acted perversely
  alternatives:
  - we have committed iniquity
  - we have done wrong
  lexicon: HALOT
  rationale: The Hiphil of עוה conveys acting crookedly/perversely. 'Acted perversely'
    preserves the moral distortion more clearly than the less transparent 'committed
    iniquity,' while remaining weighty.
- source_word: וְרָשָׁעְנוּ
  chosen: we have acted wickedly
  alternatives:
  - we have done wickedly
  - we have been wicked
  lexicon: HALOT
  rationale: From רשע, denoting wickedness/guilt. 'Acted wickedly' keeps the verbal
    force and forms a clear climactic confession alongside the previous verbs.
