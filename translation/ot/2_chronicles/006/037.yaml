theological_decisions:
- issue: Repentance language in the exile context
  chosen_reading: Render שׁוּב with 'turn back' rather than the more interpretive
    'repent.'
  alternative_readings:
  - return
  - repent
  rationale: The verse depicts inward recognition, turning, supplication, and confession.
    'Turn back' preserves the theological tension between literal return and spiritual
    repentance without collapsing the term into a narrower doctrinal gloss.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
