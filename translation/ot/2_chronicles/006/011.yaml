id: 2CH.6.11
reference: 2 Chronicles 6:11
source:
  edition: WLC
  text: וָ/אָשִׂ֥ים שָׁם֙ אֶת הָ֣/אָר֔וֹן אֲשֶׁר שָׁ֖ם בְּרִ֣ית יְהוָ֑ה אֲשֶׁ֥ר כָּרַ֖ת
    עִם בְּנֵ֥י יִשְׂרָאֵֽל־־־׃
translation:
  text: And there I have placed the ark, in which is the covenant of the LORD, which
    he made with the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “the children of Israel.” The Hebrew reads “sons
      of Israel,” a standard covenantal name for the people of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָ/אָשִׂים
  chosen: I have placed
  alternatives:
  - I have put
  - I placed
  lexicon: HALOT
  rationale: From שׂוּם, 'to put/place/set.' In Solomon's speech, English present
    perfect ('I have placed') fits the completed action with present relevance better
    than a simple past, while remaining close to the Hebrew wayyiqtol in context.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in it
  - in that place
  lexicon: HALOT
  rationale: The adverb straightforwardly means 'there,' referring to the temple/inner
    sanctuary location just described.
- source_word: הָאָרוֹן
  chosen: the ark
  alternatives:
  - the chest
  - the Ark
  lexicon: HALOT
  rationale: In this cultic context, 'ark' is the established and accurate rendering
    for אָרוֹן referring to the ark of the covenant.
- source_word: אֲשֶׁר שָׁם
  chosen: in which is
  alternatives:
  - where is
  - there is in it
  lexicon: HALOT
  rationale: The relative particle plus adverb introduces a clause locating the covenant
    in the ark. 'In which is' is natural English and preserves the sense that the
    covenant is associated with and contained in the ark.
- source_word: בְּרִית יְהוָה
  chosen: the covenant of the LORD
  alternatives:
  - the LORD's covenant
  lexicon: HALOT
  rationale: בְּרִית is best rendered 'covenant.' Per doctrine guidelines, יְהוָה
    is rendered 'the LORD.' The genitive construction is kept transparent.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD.'
- source_word: אֲשֶׁר כָּרַת
  chosen: which he made
  alternatives:
  - which he cut
  - which he established
  lexicon: HALOT
  rationale: Hebrew idiom 'cut a covenant' is naturally rendered 'make a covenant'
    in contemporary English. This preserves meaning without importing archaic idiom
    into the main text.
- source_word: עִם
  chosen: with
  alternatives:
  - for
  lexicon: HALOT
  rationale: 'Standard prepositional sense in covenant-making context: the covenant
    was made ''with'' Israel.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate policy, the masculine plural construct is preserved
    as 'sons of Israel.' 'Children of Israel' is traditional and broader, but 'sons'
    more directly reflects the Hebrew form; the representative sense can be noted
    in a footnote.
