theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for the Tetragrammaton, preserving
    reverential convention and alignment with the LXX/English Bible tradition without
    obscuring that the covenant is specifically YHWH's covenant.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → the LORD'
- issue: Gendered expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the people of Israel
  rationale: The Hebrew is grammatically masculine plural. Per translation philosophy,
    gender-accurate rendering is preferred over neutralization unless context demands
    otherwise. Because the phrase is a corporate ethnonym, an inclusive alternative
    is worth preserving in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 (Gender-accurate over
    gender-neutral)'
