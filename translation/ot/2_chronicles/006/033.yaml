id: 2CH.6.33
reference: 2 Chronicles 6:33
source:
  edition: WLC
  text: וְ/אַתָּ֞ה תִּשְׁמַ֤ע מִן הַ/שָּׁמַ֨יִם֙ מִ/מְּכ֣וֹן שִׁבְתֶּ֔/ךָ וְ/עָשִׂ֕יתָ
    כְּ/כֹ֛ל אֲשֶׁר יִקְרָ֥א אֵלֶ֖י/ךָ הַ/נָּכְרִ֑י לְמַ֣עַן יֵדְעוּ֩ כָל עַמֵּ֨י
    הָ/אָ֜רֶץ אֶת שְׁמֶ֗/ךָ וּ/לְ/יִרְאָ֤ה אֹֽתְ/ךָ֙ כְּ/עַמְּ/ךָ֣ יִשְׂרָאֵ֔ל וְ/לָ/דַ֕עַת
    כִּֽי שִׁמְ/ךָ֣ נִקְרָ֔א עַל הַ/בַּ֥יִת הַ/זֶּ֖ה אֲשֶׁ֥ר בָּנִֽיתִי־־־־־־׃
translation:
  text: then you, hear from heaven, from your dwelling place, and do according to
    all that the foreigner calls to you for, so that all the peoples of the earth
    may know your name and fear you, as your people Israel do, and may know that your
    name is called upon this house that I have built.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'that this house bears your name.' The Hebrew idiom
      is literally 'your name is called upon this house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמַע
  chosen: hear
  alternatives:
  - listen
  - give heed
  lexicon: HALOT
  rationale: The verb שׁמע in prayer contexts commonly means to hear attentively with
    responsive intent. 'Hear' is the standard concise English equivalent and fits
    the parallel with divine action that follows.
- source_word: מִן הַשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  lexicon: HALOT
  rationale: Although the Hebrew form is morphologically plural, English idiom normally
    renders this as the singular collective 'heaven' in references to God's dwelling.
- source_word: מִמְּכוֹן שִׁבְתֶּךָ
  chosen: from your dwelling place
  alternatives:
  - from the place of your dwelling
  - from your settled habitation
  lexicon: HALOT
  rationale: מכון denotes an established place or fixed dwelling. 'Dwelling place'
    is natural English and preserves the locative sense without archaic phrasing.
- source_word: וְעָשִׂיתָ
  chosen: do
  alternatives:
  - act
  - grant
  lexicon: HALOT
  rationale: The verb עשה is broad. Here it refers to God's acting in response to
    prayer. 'Do' keeps the Hebrew's breadth and avoids over-specifying the nature
    of the response.
- source_word: כְּכֹל אֲשֶׁר יִקְרָא אֵלֶיךָ
  chosen: according to all that ... calls to you for
  alternatives:
  - according to all that ... cries out to you for
  - according to all for which ... calls on you
  lexicon: HALOT
  rationale: קרא אל can mean call to or call upon. Because the object of the request
    is in view, 'calls to you for' captures petitionary prayer while staying close
    to the Hebrew structure.
- source_word: הַנָּכְרִי
  chosen: the foreigner
  alternatives:
  - the stranger
  - the foreign man
  lexicon: HALOT
  rationale: נכרי refers to someone from another people, not an Israelite. 'Foreigner'
    is clear modern English and fits the temple-prayer context better than the potentially
    ambiguous 'stranger'.
- source_word: לְמַעַן יֵדְעוּ
  chosen: so that ... may know
  alternatives:
  - in order that ... may know
  lexicon: HALOT
  rationale: This marks purpose. 'So that ... may know' is idiomatic and preserves
    the intended result of God's answering the foreigner's prayer.
- source_word: כָל עַמֵּי הָאָרֶץ
  chosen: all the peoples of the earth
  alternatives:
  - all the peoples of the land
  lexicon: HALOT
  rationale: In this universal context, הארץ is best taken as 'earth' rather than
    a specific land. 'Peoples' preserves the plural collective sense of distinct nations.
- source_word: אֶת שְׁמֶךָ
  chosen: your name
  lexicon: HALOT
  rationale: In Hebrew, 'name' often carries reputation, revealed identity, and covenantal
    renown. The literal rendering should be retained rather than paraphrased.
- source_word: וּלְיִרְאָה אֹתְךָ
  chosen: and fear you
  alternatives:
  - and revere you
  lexicon: HALOT
  rationale: ירא in relation to God includes reverent fear. 'Fear you' preserves the
    biblical idiom and theological weight; 'revere' is interpretive and weaker.
- source_word: כְּעַמְּךָ יִשְׂרָאֵל
  chosen: as your people Israel do
  alternatives:
  - like your people Israel
  - as your people Israel
  lexicon: HALOT
  rationale: The comparison is between the nations' fear of God and Israel's. Supplying
    'do' makes the English comparison explicit and natural.
- source_word: וְלָדַעַת
  chosen: and may know
  alternatives:
  - and may come to know
  lexicon: HALOT
  rationale: A second purpose infinitive continues the prayer's aim. 'May know' keeps
    the parallel with the earlier ידע.
- source_word: כִּי שִׁמְךָ נִקְרָא עַל
  chosen: that your name is called upon
  alternatives:
  - that your name is called over
  - that this house bears your name
  - that your name is proclaimed over
  lexicon: HALOT
  rationale: The idiom נקרא על often means that something belongs to someone by bearing
    that person's name. A more literal rendering, 'your name is called upon,' preserves
    the Hebrew imagery; the smoother interpretive sense can be noted in a footnote.
- source_word: הַבַּיִת הַזֶּה
  chosen: this house
  alternatives:
  - this temple
  lexicon: HALOT
  rationale: בית literally means 'house.' In context it refers to the temple, but
    'house' preserves the Hebrew wording and the temple connotation remains clear.
- source_word: אֲשֶׁר בָּנִיתִי
  chosen: that I have built
  alternatives:
  - which I have built
  lexicon: HALOT
  rationale: Straightforward relative clause; present perfect English fits the completed
    action with present relevance.
