theological_decisions:
- issue: Rendering the divine dwelling language without implying God is spatially
    confined to the temple or heaven
  chosen_reading: Retain 'hear from heaven, from your dwelling place' and 'this house'
    as the prayer's own language
  alternative_readings:
  - Paraphrase to avoid localization, e.g. 'from your heavenly presence'
  rationale: The verse itself distinguishes heaven as God's dwelling place from the
    temple on earth, while still associating his name with the house. A close rendering
    preserves the text's theology without importing later systematic clarifications.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering fear language for the nations
  chosen_reading: Use 'fear you'
  alternative_readings:
  - '''revere you'''
  rationale: The text presents covenantal reverence in standard biblical fear-of-God
    language. Softening it to 'revere' would reduce the lexical and theological force.
  doctrine_reference: Translation philosophy §1, §6
