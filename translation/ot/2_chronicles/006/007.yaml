id: 2CH.6.7
reference: 2 Chronicles 6:7
source:
  edition: WLC
  text: וַ/יְהִ֕י עִם לְבַ֖ב דָּוִ֣יד אָבִ֑/י לִ/בְנ֣וֹת בַּ֔יִת לְ/שֵׁ֥ם יְהוָ֖ה
    אֱלֹהֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: Now it was in the heart of David my father to build a house for the name of
    the LORD, the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my father David.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a house for the name of the LORD,' a standard expression for the
      temple as the place associated with God's name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now it was
  alternatives:
  - And it was
  - It came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a past-state clause. 'Now it was'
    preserves the narrative transition and existential sense without archaic 'it came
    to pass.'
- source_word: עִם לְבַב
  chosen: in the heart of
  alternatives:
  - with the heart of
  - on the heart of
  - in the mind of
  lexicon: HALOT
  rationale: The idiom עִם + לֵב/לְבַב here expresses an intention or purpose residing
    within someone. 'In the heart of' is the most natural English equivalent and preserves
    the Hebrew anthropological emphasis better than the more interpretive 'in the
    mind of.'
- source_word: דָּוִיד אָבִי
  chosen: David my father
  alternatives:
  - my father David
  lexicon: HALOT
  rationale: Both English orders are possible. 'David my father' follows the Hebrew
    sequence more closely while remaining natural in English.
- source_word: לִבְנוֹת
  chosen: to build
  alternatives:
  - to construct
  lexicon: HALOT
  rationale: The infinitive of בנה is straightforwardly 'to build.' 'Construct' is
    possible but less idiomatic in this solemn context.
- source_word: בַּיִת
  chosen: a house
  alternatives:
  - a temple
  lexicon: HALOT
  rationale: Although the referent is the temple, the Hebrew word is 'house.' Retaining
    'house' preserves the canonical temple idiom ('house for the name of the LORD')
    and avoids over-specifying beyond the source wording.
- source_word: לְשֵׁם
  chosen: for the name of
  alternatives:
  - for the honor of
  - for the renown of
  lexicon: HALOT
  rationale: The phrase 'for the name of' is a standard temple formula in the Hebrew
    Bible. It should be preserved rather than paraphrased, since it carries theological
    significance about the temple's relation to God's name/presence.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered 'the God of Israel.'
    This preserves the covenantal title in standard English form.
