theological_decisions:
- issue: Rendering the temple-related phrase בַּיִת לְשֵׁם יְהוָה
  chosen_reading: a house for the name of the LORD
  alternative_readings:
  - a temple for the LORD
  - a house for the honor of the LORD
  rationale: The Hebrew emphasizes that the building is for YHWH's 'name,' a theologically
    loaded Deuteronomic/Chronicles expression. Preserving 'name' maintains the text's
    own theology of divine presence without collapsing it into a simpler institutional
    label like 'temple.'
  doctrine_reference: 'Translation philosophy #3 and #5; contested terms table for
    יְהוָה'
