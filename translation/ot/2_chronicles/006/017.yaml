- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: 'The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered ''Yahweh'' rather than ''the LORD'', preserving the covenant name God revealed at Sinai.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether דְּבָרְךָ should be rendered more interpretively as 'promise'
  chosen_reading: your word
  alternative_readings:
  - your promise
  rationale: The verse is a prayer for fulfillment of what God spoke to David. 'Promise' is contextually accurate, but 'word' better preserves the source wording and leaves the theological force to the context rather than importing it into the noun itself.
