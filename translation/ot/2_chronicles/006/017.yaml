id: 2CH.6.17
reference: 2 Chronicles 6:17
source:
  edition: WLC
  text: וְ/עַתָּ֕ה יְהוָ֖ה אֱלֹהֵ֣י יִשְׂרָאֵ֑ל יֵֽאָמֵן֙ דְּבָ֣רְ/ךָ֔ אֲשֶׁ֥ר דִּבַּ֖רְתָּ לְ/עַבְדְּ/ךָ֥ לְ/דָוִֽיד׃
translation:
  text: Now, Yahweh, God of Israel, let your word that you spoke to your servant David be confirmed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let your promise be established' or 'let your word prove true.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Temporal/discourse marker introducing Solomon’s next petition. 'Now' is natural English; 'And now' is possible but not necessary in this context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: God of Israel
  lexicon: HALOT
  rationale: Construct phrase identifying YHWH covenantally as Israel’s God. Standard, transparent rendering.
- source_word: יֵאָמֵן
  chosen: be confirmed
  alternatives:
  - be established
  - prove true
  - be faithful
  lexicon: HALOT
  rationale: Niphal of אמן here expresses the petition that God's spoken word be shown firm/established in fulfillment. 'Be confirmed' best captures the passive/resultative sense in clear English. 'Be established' is also viable; 'prove true' is more dynamic.
- source_word: דְּבָרְךָ
  chosen: your word
  alternatives:
  - your promise
  lexicon: HALOT
  rationale: Literally 'your word.' In context it refers to a divine promise to David, but retaining 'word' preserves the Hebrew wording while still communicating clearly.
- source_word: אֲשֶׁר דִּבַּרְתָּ
  chosen: that you spoke
  alternatives:
  - which you spoke
  - that you promised
  lexicon: HALOT
  rationale: Straightforward relative clause. 'Spoke' preserves the verbal link with 'word'; 'promised' would foreground implication rather than the lexical form.
- source_word: לְעַבְדְּךָ
  chosen: to your servant
  alternatives:
  - for your servant
  lexicon: HALOT
  rationale: The preposition ל with דבר commonly marks the addressee, so 'to your servant' is the most natural rendering. 'Servant' is appropriate here for עבד in a royal-covenantal context; 'slave' would overstate the bonded nuance in English for this setting.
- source_word: לְדָוִיד
  chosen: David
  lexicon: HALOT
  rationale: Personal name transliterated by standard convention, following project policy.
