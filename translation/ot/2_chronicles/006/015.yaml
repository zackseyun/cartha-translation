id: 2CH.6.15
reference: 2 Chronicles 6:15
source:
  edition: WLC
  text: אֲשֶׁ֣ר שָׁמַ֗רְתָּ לְ/עַבְדְּ/ךָ֙ דָּוִ֣יד אָבִ֔/י אֵ֥ת אֲשֶׁר דִּבַּ֖רְתָּ
    ל֑/וֹ וַ/תְּדַבֵּ֥ר בְּ/פִ֛י/ךָ וּ/בְ/יָדְ/ךָ֥ מִלֵּ֖אתָ כַּ/יּ֥וֹם הַ/זֶּֽה־׃
translation:
  text: You have kept for your servant David my father what you spoke to him; with
    your mouth you have spoken, and with your hand you have fulfilled it, as it is
    this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what you promised him.' The Hebrew says literally 'what you spoke to
      him,' with the promissory sense inferred from the context of fulfillment.
    reason: lexical_alternative
  - marker: b
    text: Literally 'with your mouth ... and with your hand,' a Hebrew way of contrasting
      God's spoken word with his effective action.
    reason: cultural_note
lexical_decisions:
- source_word: שָׁמַרְתָּ
  chosen: have kept
  alternatives:
  - have observed
  - have preserved
  lexicon: HALOT
  rationale: In covenant/promise contexts שׁמר commonly means to keep or fulfill faithfully.
    'Have kept' is idiomatic English and fits the sense of maintaining what was promised.
- source_word: לְעַבְדְּךָ
  chosen: for your servant
  alternatives:
  - to your servant
  lexicon: HALOT
  rationale: The preposition ל here is naturally rendered 'for' with שׁמר in the sense
    of keeping something on someone's behalf. 'Servant' is appropriate for עבד in
    royal prayer language; the bonded nuance of 'slave' is not foregrounded here.
- source_word: דָּוִיד אָבִי
  chosen: David my father
  alternatives:
  - my father David
  lexicon: HALOT
  rationale: Both English orders are possible. 'David my father' stays closer to the
    Hebrew sequence while remaining natural.
- source_word: אֵת אֲשֶׁר דִּבַּרְתָּ לוֹ
  chosen: what you spoke to him
  alternatives:
  - that which you promised him
  - what you said to him
  lexicon: HALOT
  rationale: The Hebrew says literally 'what you spoke to him.' Since the fulfillment
    language follows, the promissory force is clear without importing 'promised' into
    the main text.
- source_word: וַתְּדַבֵּר בְּפִיךָ
  chosen: with your mouth you have spoken
  alternatives:
  - you spoke with your mouth
  - you declared with your mouth
  lexicon: HALOT
  rationale: This preserves the concrete anthropomorphic parallelism with the next
    clause, emphasizing God's spoken word.
- source_word: וּבְיָדְךָ מִלֵּאתָ
  chosen: and with your hand you have fulfilled it
  alternatives:
  - and by your hand you have fulfilled it
  - and with your hand you have carried it out
  lexicon: HALOT
  rationale: מלא in this idiom means to fulfill or bring to completion. 'With your
    hand' preserves the Hebrew image of effective action corresponding to 'with your
    mouth'.
- source_word: כַּיּוֹם הַזֶּה
  chosen: as it is this day
  alternatives:
  - as on this day
  - as is evident today
  lexicon: HALOT
  rationale: This common biblical idiom points to present, visible confirmation of
    fulfillment. 'As it is this day' is clear and reasonably close to the Hebrew.
