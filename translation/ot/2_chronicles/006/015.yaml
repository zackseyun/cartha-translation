theological_decisions:
- issue: Anthropomorphic language for God ('mouth' and 'hand')
  chosen_reading: Preserve the anthropomorphic expressions literally
  alternative_readings:
  - Render dynamically as 'you said' and 'you accomplished'
  rationale: The verse intentionally pairs divine speech and divine action. Retaining
    'mouth' and 'hand' preserves the rhetoric without implying corporeality beyond
    the text's own idiom.
  doctrine_reference: Translation philosophy §1, §3
