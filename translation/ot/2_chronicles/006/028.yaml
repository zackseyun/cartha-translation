id: 2CH.6.28
reference: 2 Chronicles 6:28
source:
  edition: WLC
  text: רָעָ֞ב כִּֽי יִהְיֶ֣ה בָ/אָ֗רֶץ דֶּ֣בֶר כִּֽי יִֽ֠הְיֶה שִׁדָּפ֨וֹן וְ/יֵרָק֜וֹן
    אַרְבֶּ֤ה וְ/חָסִיל֙ כִּ֣י יִהְיֶ֔ה כִּ֧י יָֽצַר ל֛/וֹ אוֹיְבָ֖י/ו בְּ/אֶ֣רֶץ
    שְׁעָרָ֑י/ו כָּל נֶ֖גַע וְ/כָֽל מַחֲלָֽה־־־־־׃
translation:
  text: If there is famine in the land, if there is plague, blight, mildew, locust,
    or caterpillar; if his enemies besiege him in the land of his gates; whatever
    plague and whatever sickness there may be—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'devouring locust' for 'caterpillar'; the Hebrew term חָסִיל refers generally
      to a crop-devouring insect, and the exact species is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the land of his gates,' with 'gates' standing for the cities
      or towns of the land.
    reason: cultural_note
lexical_decisions:
- source_word: רָעָב
  chosen: famine
  alternatives:
  - hunger
  lexicon: HALOT
  rationale: In disaster lists, רָעָב denotes famine rather than ordinary hunger;
    'famine' is the standard natural-English rendering for a landwide calamity.
- source_word: דֶּבֶר
  chosen: plague
  alternatives:
  - pestilence
  lexicon: HALOT
  rationale: דֶּבֶר commonly refers to epidemic disease or pestilence. 'Plague' is
    more readable modern English while preserving the severity.
- source_word: שִׁדָּפוֹן
  chosen: blight
  alternatives:
  - scorching
  - crop blight
  lexicon: HALOT
  rationale: The term refers to destructive crop damage, often from scorching east
    wind or blight. 'Blight' is concise and idiomatic in an agricultural disaster
    list.
- source_word: יֵרָקוֹן
  chosen: mildew
  alternatives:
  - yellowing
  - blasting
  lexicon: HALOT
  rationale: The noun denotes a plant disease causing yellowing/paleness. 'Mildew'
    is the conventional agricultural rendering in English and pairs naturally with
    'blight'.
- source_word: אַרְבֶּה
  chosen: locust
  alternatives:
  - grasshopper
  lexicon: HALOT
  rationale: In judgment contexts אַרְבֶּה is specifically the locust as a devastating
    swarm insect, not a generic grasshopper.
- source_word: חָסִיל
  chosen: caterpillar
  alternatives:
  - devouring locust
  - grasshopper
  lexicon: HALOT
  rationale: The exact species is uncertain, but traditional and still recognizable
    English uses 'caterpillar' here for a crop-devouring insect distinct from אַרְבֶּה.
    Because the zoological identification is debated, an alternative is preserved
    in a footnote.
- source_word: כִּי יָצַר לוֹ אֹיְבָיו
  chosen: if his enemies besiege him
  alternatives:
  - if his enemies distress him
  - if his enemies hem him in
  lexicon: HALOT
  rationale: The Hiphil of צור here conveys pressing hard, besieging, or hemming in
    by enemies. In the following phrase about the land/cities, 'besiege' best fits
    the military context.
- source_word: בְּאֶרֶץ שְׁעָרָיו
  chosen: in the land of his gates
  alternatives:
  - in the land of his cities
  - in any of his towns
  lexicon: HALOT
  rationale: Literally 'in the land of his gates.' Since 'gates' stands metonymically
    for fortified cities/towns, the translation keeps the literal image for auditability
    while remaining intelligible. A footnote preserves the idiomatic alternative.
- source_word: כָּל נֶגַע
  chosen: whatever plague
  alternatives:
  - any affliction
  - any blow
  lexicon: HALOT
  rationale: נֶגַע is a broad term for a blow, affliction, or plague. Here, in parallel
    with sickness and prior calamities, 'plague' best captures the sense of any severe
    affliction.
- source_word: כָל מַחֲלָה
  chosen: whatever sickness
  alternatives:
  - any disease
  - any illness
  lexicon: HALOT
  rationale: מַחֲלָה denotes sickness/disease. 'Sickness' reads naturally in parallel
    with 'plague' and preserves the broad category.
