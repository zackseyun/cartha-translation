id: 2CH.6.40
reference: 2 Chronicles 6:40
source:
  edition: WLC
  text: עַתָּ֣ה אֱלֹהַ֗/י יִֽהְיוּ נָ֤א עֵינֶ֨י/ךָ֙ פְּתֻח֔וֹת וְ/אָזְנֶ֖י/ךָ קַשֻּׁב֑וֹת
    לִ/תְפִלַּ֖ת הַ/מָּק֥וֹם הַ/זֶּֽה־׃ס
translation:
  text: Now, my God, please let your eyes be open and your ears attentive to the prayer
    of this place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the prayer offered in this place' or 'the prayer from this place.' The
      Hebrew reads more literally, 'the prayer of this place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Temporal/discourse marker introducing Solomon’s concluding petition.
    'Now' is natural English and preserves the transition without adding unnecessary
    conjunctional weight.
- source_word: אֱלֹהַי
  chosen: my God
  alternatives:
  - O my God
  lexicon: HALOT
  rationale: Construct with 1cs suffix expresses direct address. 'My God' preserves
    the personal vocative force; 'O' is possible but omitted for readable modern English.
- source_word: יִהְיוּ נָא
  chosen: please let ... be
  alternatives:
  - may ... be
  - let ... be, please
  lexicon: HALOT
  rationale: Jussive plural with particle נָא expresses polite entreaty. 'Please let
    ... be' captures both the volitional sense and the supplicatory tone in idiomatic
    English.
- source_word: עֵינֶיךָ פְּתֻחוֹת
  chosen: your eyes be open
  alternatives:
  - your eyes remain open
  - your eyes be opened
  lexicon: HALOT
  rationale: Anthropomorphic idiom for divine attention/watchfulness. A literal rendering
    is clear in English and preserves the imagery without over-interpreting it as
    'watchful' in the main text.
- source_word: וְאָזְנֶיךָ קַשֻּׁבוֹת
  chosen: your ears attentive
  alternatives:
  - your ears attentive/listening
  - your ears alert
  lexicon: HALOT
  rationale: קַשֻּׁבוֹת conveys attentiveness or readiness to hear. 'Attentive' is
    idiomatic with 'ears' and preserves the prayer-hearing imagery better than a flatter
    'listening'.
- source_word: לִתְפִלַּת
  chosen: to the prayer
  alternatives:
  - to prayer
  - to the plea
  lexicon: HALOT
  rationale: The singular noun with prefixed ל marks the object toward which divine
    attention is directed. 'To the prayer' is the most straightforward rendering.
- source_word: הַמָּקוֹם הַזֶּה
  chosen: of this place
  alternatives:
  - offered in this place
  - from this place
  lexicon: HALOT
  rationale: Literally 'the place this/this place.' In context, Solomon asks God to
    hear prayer associated with the temple. 'Of this place' stays close to the Hebrew
    genitival construction and avoids importing 'offered' or 'from' into the main
    text.
