theological_decisions:
- issue: Anthropomorphic language for God’s eyes and ears
  chosen_reading: Retain the concrete imagery ('eyes be open,' 'ears attentive')
  alternative_readings:
  - Interpretive paraphrase such as 'watch over and listen to'
  rationale: The Hebrew uses embodied imagery for divine attention to prayer. Preserving
    the metaphor maintains the text’s literary and theological texture without implying
    corporeality in a crude sense. This follows the translation philosophy of preserving
    the source text’s tension and imagery rather than resolving it by paraphrase.
  doctrine_reference: Translation philosophy §3, §6
