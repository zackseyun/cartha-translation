id: 2CH.6.42
reference: 2 Chronicles 6:42
source:
  edition: WLC
  text: יְהוָ֣ה אֱלֹהִ֔ים אַל תָּשֵׁ֖ב פְּנֵ֣י מְשִׁיחֶ֑י/ךָ זָכְרָ֕/ה לְ/חַֽסְדֵ֖י
    דָּוִ֥יד עַבְדֶּֽ/ךָ־׃פ
translation:
  text: O LORD God, do not turn away the face of your anointed one; remember the steadfast
    love shown to David your servant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not reject your anointed one.' The Hebrew literally says 'do not
      turn away the face of your anointed one.'
    reason: lexical_alternative
  - marker: b
    text: '''Your anointed one'' could also be rendered ''your Messiah'' or, contextually,
      ''your king.'''
    reason: alternative_reading
  - marker: c
    text: Or 'remember the mercies shown to David your servant' or 'remember your
      covenant faithfulness to David your servant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as 'LORD' per project doctrine for the divine name YHWH, following
    established English convention that signals the covenant name without transliteration.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: 'In direct address following YHWH, אֱלֹהִים functions as the common divine
    title, naturally rendered ''God'' in English: ''O LORD God.'''
- source_word: אַל תָּשֵׁב
  chosen: do not turn away
  alternatives:
  - do not reject
  - do not turn back
  lexicon: HALOT
  rationale: The idiom with שוב in the Hiphil plus 'face' is best represented by 'turn
    away.' 'Reject' captures the sense but is more interpretive; 'turn away' preserves
    the Hebrew imagery.
- source_word: פְּנֵי
  chosen: the face
  alternatives:
  - the presence
  - the person
  lexicon: HALOT
  rationale: Kept the concrete noun 'face' because the Hebrew idiom is transparent
    enough in English and preserves the poetic force. More abstract renderings like
    'presence' or 'person' smooth the image too much.
- source_word: מְשִׁיחֶךָ
  chosen: your anointed one
  alternatives:
  - your Messiah
  - your king
  lexicon: HALOT
  rationale: Although cognate with 'Messiah,' in this Old Testament royal-prayer context
    the referent is the king/royal representative, not necessarily a direct messianic
    title in the later christological sense. 'Your anointed one' preserves the lexical
    meaning and allows typological resonance without over-specification.
- source_word: זָכְרָה
  chosen: remember
  alternatives:
  - call to mind
  lexicon: HALOT
  rationale: Standard imperative sense of זכר. 'Remember' is idiomatic in covenantal
    prayer language and preserves the theological register.
- source_word: לְחַסְדֵי
  chosen: the steadfast love shown to
  alternatives:
  - the covenant faithfulness of
  - the mercies of
  - the acts of steadfast love toward
  lexicon: HALOT
  rationale: חֶסֶד often denotes covenant loyalty/steadfast love. Because the preposition
    לְ here points toward David as beneficiary/object, 'the steadfast love shown to
    David' makes the syntax clear in natural English. 'Mercies' is traditional but
    less precise; 'covenant faithfulness' is possible but heavier.
- source_word: דָּוִיד עַבְדֶּךָ
  chosen: David your servant
  lexicon: HALOT
  rationale: Straightforward appositional phrase. 'Servant' is the normal rendering
    for עבד here, denoting David's status before God rather than slavery in a socially
    salient sense.
