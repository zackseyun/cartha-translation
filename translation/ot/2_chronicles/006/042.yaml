theological_decisions:
- issue: Rendering מְשִׁיחֶךָ in a royal prayer with possible typological resonance
  chosen_reading: your anointed one
  alternative_readings:
  - your Messiah
  - your king
  rationale: The Hebrew lexeme is the source of 'Messiah,' but in this immediate context
    Solomon is praying concerning the Davidic king. Rendering it 'your anointed one'
    preserves the lexical content and leaves room for canonical/messianic resonance
    without importing a more explicit christological claim than the verse itself makes.
  doctrine_reference: Translation philosophy §§1, 3; Contested terms principle on
    preserving Hebraic messianic context without overstating where context does not
    require title usage.
- issue: Rendering חַסְדֵי דָּוִיד
  chosen_reading: the steadfast love shown to David
  alternative_readings:
  - the mercies of David
  - David's acts of covenant loyalty
  rationale: The phrase is syntactically compressed and could be understood in more
    than one way. In the prayer's context and in light of the parallel in Psalmic
    covenant language, the most natural sense is an appeal for God to remember his
    covenantal loyal love toward David. This avoids implying that David is the primary
    source of the חסדים.
  doctrine_reference: Translation philosophy §3 on preserving tension where ambiguity
    exists.
