theological_decisions:
- issue: Temple theology in the phrase 'my name to be there'
  chosen_reading: Preserve the idiom 'my name to be there' rather than paraphrasing
    it as God's presence dwelling there.
  alternative_readings:
  - for my presence to be there
  - as the place where I am worshiped
  rationale: The Hebrew speaks of God's 'name' being there, a significant covenantal-temple
    expression. Preserving the idiom avoids importing a fuller theological explanation
    into the main text while allowing readers to infer the concept from the biblical
    idiom itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: David's role in 'to be over my people Israel'
  chosen_reading: Render generally as authority 'over' Israel without specifying kingship
    in the main text.
  alternative_readings:
  - to be king over my people Israel
  - to rule my people Israel
  rationale: Although the context concerns kingship, the Hebrew here states only 'to
    be over my people Israel.' Adding 'king' would be interpretive expansion beyond
    the immediate wording.
  doctrine_reference: Translation philosophy §§1, 3
