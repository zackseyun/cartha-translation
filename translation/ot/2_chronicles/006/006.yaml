id: 2CH.6.6
reference: 2 Chronicles 6:6
source:
  edition: WLC
  text: וָ/אֶבְחַר֙ בִּ/יר֣וּשָׁלִַ֔ם לִ/הְי֥וֹת שְׁמִ֖/י שָׁ֑ם וָ/אֶבְחַ֣ר בְּ/דָוִ֔יד
    לִ/הְי֖וֹת עַל עַמִּ֥/י יִשְׂרָאֵֽל־׃
translation:
  text: But I have chosen Jerusalem for my name to be there, and I have chosen David
    to be over my people Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I chose Jerusalem ... and I chose David.' The Hebrew wayyiqtol forms
      can be rendered as simple past; 'have chosen' in the main text brings out the
      continuing force of God's established choice in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶבְחַר
  chosen: I have chosen
  alternatives:
  - I chose
  - I selected
  lexicon: HALOT
  rationale: בחר denotes choosing/electing. The perfect-like English 'have chosen'
    fits the divine declaration of an established choice with continuing significance
    in context, while remaining natural English.
- source_word: בִּירוּשָׁלַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention per
    translation philosophy.
- source_word: לִהְיוֹת
  chosen: to be
  alternatives:
  - for ... to be
  lexicon: HALOT
  rationale: Infinitive of היה expressing purpose/result. Rendered straightforwardly
    as 'to be' in the clause 'for my name to be there' for readable but close translation.
- source_word: שְׁמִי
  chosen: my name
  lexicon: HALOT
  rationale: Literally 'my name.' In temple theology this signifies God's presence,
    reputation, and covenantal claim, but the Hebrew idiom should be preserved rather
    than paraphrased.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb; retained explicitly to preserve the Hebrew emphasis
    on location.
- source_word: בְּדָוִיד
  chosen: David
  alternatives:
  - in David
  lexicon: HALOT
  rationale: With ב after בחר, the sense is 'choose David'/'choose in the person of
    David.' English idiom omits the preposition and says 'chosen David.'
- source_word: עַל
  chosen: to be over
  alternatives:
  - as ruler over
  - to rule over
  lexicon: HALOT
  rationale: עַל marks authority over the people. 'To be over' is a close rendering
    that preserves the relational sense without adding the more interpretive 'rule'
    or 'ruler' absent from the Hebrew.
- source_word: עַמִּי יִשְׂרָאֵל
  chosen: my people Israel
  alternatives:
  - my people, Israel
  lexicon: HALOT
  rationale: Construct phrase with appositional proper name. Rendered naturally as
    'my people Israel' while preserving covenantal language.
- source_word: וְ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: HALOT
  rationale: In context the conjunction contrasts the prior negation ('I did not choose
    a city...') with the positive statement here. 'But' brings out the discourse force
    better than a mechanically repeated 'and'.
