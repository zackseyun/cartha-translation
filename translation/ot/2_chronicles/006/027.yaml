theological_decisions:
- issue: Divine response sequence in Solomon's prayer
  chosen_reading: The verse is rendered as a petition that God forgive, instruct,
    and send rain in response to Israel's prayer and repentance.
  alternative_readings:
  - 'The clause with כִּי could be read more strictly causally: ''because you teach
    them...'''
  rationale: 'The syntax in context supports a prayer for covenant restoration: hearing,
    forgiving, guiding, and restoring rain. Rendering כִּי as ''when'' preserves the
    flow without importing a stronger causal or doctrinal claim than the Hebrew requires.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
