id: 2CH.6.27
reference: 2 Chronicles 6:27
source:
  edition: WLC
  text: וְ/אַתָּ֣ה תִּשְׁמַ֣ע הַ/שָּׁמַ֗יִם וְ/סָ֨לַחְתָּ֜ לְ/חַטַּ֤את עֲבָדֶ֨י/ךָ֙
    וְ/עַמְּ/ךָ֣ יִשְׂרָאֵ֔ל כִּ֥י תוֹרֵ֛/ם אֶל הַ/דֶּ֥רֶךְ הַ/טּוֹבָ֖ה אֲשֶׁ֣ר יֵֽלְכוּ
    בָ֑/הּ וְ/נָתַתָּ֤ה מָטָר֙ עַֽל אַרְצְ/ךָ֔ אֲשֶׁר נָתַ֥תָּה לְ/עַמְּ/ךָ֖ לְ/נַחֲלָֽה׀־־־־׃ס
translation:
  text: then may you hear in heaven and forgive the sin of your servants and of your
    people Israel, when you teach them the good way in which they should walk, and
    give rain on your land that you have given to your people as an inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hear from heaven.' The Hebrew literally says 'hear the heavens/heaven,'
      an idiom for God's hearing from his heavenly dwelling.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמַע הַשָּׁמַיִם
  chosen: hear in heaven
  alternatives:
  - hear from heaven
  - hear in the heavens
  lexicon: HALOT
  rationale: The idiom in this prayer formula is that God hears in/from heaven. English
    commonly prefers 'hear in heaven' or 'hear from heaven'; 'in heaven' stays closer
    to the Hebrew without obscuring the sense.
- source_word: וְסָלַחְתָּ לְחַטַּאת
  chosen: forgive the sin
  alternatives:
  - forgive the offense
  - pardon the sin
  lexicon: HALOT
  rationale: חטאת here denotes sin/guilt. 'Forgive the sin' is the most direct and
    natural rendering in context.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it refers to God's worshiping
    subjects in a covenant-prayer setting rather than emphasizing bonded status. 'Servants'
    fits the register and context.
- source_word: וְעַמְּךָ יִשְׂרָאֵל
  chosen: and of your people Israel
  alternatives:
  - and your people Israel
  lexicon: HALOT
  rationale: The phrase is coordinated with 'your servants' under the object of forgiveness.
    Supplying 'of' in English clarifies that both groups are governed by 'forgive
    the sin of'.
- source_word: כִּי
  chosen: when
  alternatives:
  - because
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the circumstance accompanying divine forgiveness
    and rain, not merely a causal explanation. 'When' best captures the temporal/conditional
    nuance in context.
- source_word: תוֹרֵם
  chosen: you teach them
  alternatives:
  - you instruct them
  - you direct them
  lexicon: HALOT
  rationale: The Hiphil of ירה commonly means to teach/instruct, especially regarding
    the right way. 'Teach them' is clear and preserves the pedagogical sense.
- source_word: אֶל־הַדֶּרֶךְ הַטּוֹבָה
  chosen: the good way
  alternatives:
  - the right way
  - the good path
  lexicon: HALOT
  rationale: A literal rendering is preferable here. 'The good way' preserves the
    moral quality of the path without overinterpreting.
- source_word: אֲשֶׁר יֵלְכוּ בָהּ
  chosen: in which they should walk
  alternatives:
  - that they should walk in
  - in which they will walk
  lexicon: HALOT
  rationale: הלך 'walk' is a common biblical metaphor for conduct. 'Should walk' reflects
    the expected manner of life implied by the prayer better than a simple future.
- source_word: וְנָתַתָּה מָטָר
  chosen: and give rain
  alternatives:
  - and send rain
  - and grant rain
  lexicon: HALOT
  rationale: נתן with מטר is naturally rendered 'give rain.' 'Send rain' is idiomatic
    but slightly less literal.
- source_word: עַל־אַרְצְךָ
  chosen: on your land
  alternatives:
  - upon your land
  - on the land
  lexicon: HALOT
  rationale: 'The possessive is explicit in Hebrew and should be retained: the land
    belongs to God and is granted to Israel.'
- source_word: אֲשֶׁר נָתַתָּה לְעַמְּךָ לְנַחֲלָה
  chosen: that you have given to your people as an inheritance
  alternatives:
  - which you gave to your people for an inheritance
  - that you gave your people to inherit
  lexicon: HALOT
  rationale: נחלה is covenantal inheritance/possession. 'As an inheritance' is natural
    English and preserves the theological land-grant concept.
