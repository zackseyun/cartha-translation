theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project’s doctrine specifies 'the LORD' as the default rendering
    for YHWH. This also aligns with the verse’s liturgical and theophanic tone.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of divine presence in עֲרָפֶל
  chosen_reading: The LORD said that he would dwell in the thick darkness
  alternative_readings:
  - The LORD said he would dwell in the dark cloud
  rationale: The verse recalls God’s self-manifestation in obscurity at the temple
    dedication. 'Thick darkness' preserves the biblical tension of divine nearness
    and hiddenness without over-interpreting the imagery.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
