id: 2CH.6.1
reference: 2 Chronicles 6:1
source:
  edition: WLC
  text: אָ֖ז אָמַ֣ר שְׁלֹמֹ֑ה יְהוָ֣ה אָמַ֔ר לִ/שְׁכּ֖וֹן בָּ/עֲרָפֶֽל׃
translation:
  text: Then Solomon said, “The LORD said that he would dwell in the thick darkness.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the dark cloud.” The Hebrew term can denote dense cloud, gloom, or
      thick darkness, especially in contexts of divine manifestation.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal discourse marker introducing Solomon’s statement in sequence;
    'Then' is natural modern English and preserves the narrative flow.
- source_word: אָמַר ... שְׁלֹמֹה
  chosen: Solomon said
  alternatives:
  - Solomon declared
  lexicon: HALOT
  rationale: Standard rendering of אמר in narrative speech introduction. 'Said' is
    the most direct and least interpretively loaded choice.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and matching the project's contested-terms
    guidance.
- source_word: אָמַר
  chosen: said
  alternatives:
  - declared
  - has said
  lexicon: HALOT
  rationale: A simple past is the most straightforward rendering of the qatal form
    here. English idiom in indirect discourse naturally supplies 'that' and, with
    the infinitive construction following, 'would' to express the content.
- source_word: לִשְׁכּוֹן
  chosen: would dwell
  alternatives:
  - to dwell
  - to reside
  - to tabernacle
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses the content of what the LORD
    said/intended. In idiomatic English indirect discourse, 'would dwell' best conveys
    the sense without woodenness. 'Dwell' preserves the theological resonance of divine
    habitation better than 'reside'.
- source_word: בָּעֲרָפֶל
  chosen: in the thick darkness
  alternatives:
  - in the dark cloud
  - in the gloom
  - in the cloud of darkness
  lexicon: HALOT
  rationale: עֲרָפֶל denotes dense cloud, gloom, or thick darkness, often associated
    with divine manifestation. 'Thick darkness' preserves both the obscurity and the
    theophanic weight better than the more meteorological 'dark cloud.'
