theological_decisions:
- issue: Rendering of אֲבֹתֵיהֶם
  chosen_reading: their fathers
  alternative_readings:
  - their ancestors
  rationale: The Hebrew explicitly says 'their fathers.' Per translation philosophy,
    gender-accurate rendering is preferred over gender-neutral smoothing unless context
    requires otherwise. Here the covenantal appeal to the patriarchal line is adequately
    conveyed by 'fathers.'
