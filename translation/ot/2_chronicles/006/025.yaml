id: 2CH.6.25
reference: 2 Chronicles 6:25
source:
  edition: WLC
  text: וְ/אַתָּה֙ תִּשְׁמַ֣ע מִן הַ/שָּׁמַ֔יִם וְ/סָ֣לַחְתָּ֔ לְ/חַטַּ֖את עַמְּ/ךָ֣
    יִשְׂרָאֵ֑ל וַ/הֲשֵׁיבוֹתָ/ם֙ אֶל הָ֣/אֲדָמָ֔ה אֲשֶׁר נָתַ֥תָּה לָ/הֶ֖ם וְ/לַ/אֲבֹתֵי/הֶֽם־־־׃פ
translation:
  text: then you, hear from heaven, and forgive the sin of your people Israel, and
    bring them back to the land that you gave to them and to their fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their ancestors.' The Hebrew reads 'their fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמַע
  chosen: hear
  alternatives:
  - listen
  - hear and respond
  lexicon: HALOT
  rationale: In prayer contexts שׁמע commonly carries the sense of hearing attentively
    with implied response. 'Hear' preserves the Hebrew wording while allowing the
    covenant-prayer nuance to remain implicit.
- source_word: מִן הַשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  lexicon: HALOT
  rationale: Although the Hebrew form is plural, English idiom normally uses singular
    'heaven' for God's dwelling in such contexts. This is standard optimal-equivalence
    rather than a flattening of meaning.
- source_word: סָלַחְתָּ
  chosen: forgive
  alternatives:
  - pardon
  lexicon: HALOT
  rationale: סלח is the standard verb for divine forgiveness. 'Forgive' is the clearest
    modern English equivalent.
- source_word: לְחַטַּאת
  chosen: the sin
  alternatives:
  - the offense
  - the guilt
  lexicon: HALOT
  rationale: The singular noun functions collectively for Israel's wrongdoing in context.
    'The sin' preserves the singular form without overinterpreting.
- source_word: עַמְּךָ יִשְׂרָאֵל
  chosen: your people Israel
  alternatives:
  - Israel your people
  - your people, Israel
  lexicon: HALOT
  rationale: This keeps both the covenantal designation and the proper name in natural
    English order.
- source_word: וַהֲשֵׁיבוֹתָם
  chosen: bring them back
  alternatives:
  - restore them
  - return them
  lexicon: HALOT
  rationale: 'The Hiphil of שוב here is causative: God causes them to return. ''Bring
    them back'' is natural English and preserves the causative sense better than the
    less idiomatic ''return them.'''
- source_word: אֶל הָאֲדָמָה
  chosen: to the land
  alternatives:
  - to the ground
  - to the soil
  lexicon: HALOT
  rationale: In covenantal-national context אֲדָמָה refers to the land given to Israel,
    not merely soil in an agricultural sense.
- source_word: אֲשֶׁר נָתַתָּה לָהֶם וְלַאֲבֹתֵיהֶם
  chosen: that you gave to them and to their fathers
  alternatives:
  - that you gave them and their fathers
  - which you gave to them and their ancestors
  lexicon: HALOT
  rationale: This preserves the twofold dative structure and the covenantal continuity
    between the present generation and their fathers. 'Fathers' is retained as gender-accurate
    and source-matching rather than neutralized to 'ancestors' in the main text.
