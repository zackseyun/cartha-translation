id: 2CH.6.20
reference: 2 Chronicles 6:20
source:
  edition: WLC
  text: לִ/הְיוֹת֩ עֵינֶ֨י/ךָ פְתֻח֜וֹת אֶל הַ/בַּ֤יִת הַ/זֶּה֙ יוֹמָ֣ם וָ/לַ֔יְלָה
    אֶל הַ֨/מָּק֔וֹם אֲשֶׁ֣ר אָמַ֔רְתָּ לָ/שׂ֥וּם שִׁמְ/ךָ֖ שָׁ֑ם לִ/שְׁמ֨וֹעַ֙ אֶל
    הַ/תְּפִלָּ֔ה אֲשֶׁ֣ר יִתְפַּלֵּ֣ל עַבְדְּ/ךָ֔ אֶל הַ/מָּק֖וֹם הַ/זֶּֽה־־־־׃
translation:
  text: that your eyes may be open toward this house day and night, toward the place
    where you said you would put your name, to hear the prayer that your servant prays
    toward this place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be attentive toward this house.' The Hebrew literally says 'your eyes
      be open,' an idiom for watchful attention.
    reason: lexical_alternative
  - marker: b
    text: '''Put your name'' is a temple idiom referring to God''s chosen association
      with this place, not to literal containment of God there.'
    reason: cultural_note
lexical_decisions:
- source_word: לִהְיוֹת
  chosen: that ... may be
  alternatives:
  - to be
  lexicon: HALOT
  rationale: The infinitive construct with preceding context expresses purpose/result
    in Solomon's prayer. In English, 'that ... may be' best conveys the petitionary
    force rather than a bare infinitive.
- source_word: עֵינֶיךָ
  chosen: your eyes
  lexicon: HALOT
  rationale: A literal rendering preserves the anthropomorphic idiom of divine attention
    without paraphrasing it as merely 'care' or 'watchfulness.'
- source_word: פְתֻחוֹת
  chosen: be open
  alternatives:
  - be attentive
  lexicon: HALOT
  rationale: The passive participle literally means 'opened/open.' 'Be open' keeps
    the concrete metaphor; 'be attentive' is interpretive and therefore left as an
    alternative rather than used in the main text.
- source_word: אֶל הַבַּיִת הַזֶּה
  chosen: toward this house
  alternatives:
  - to this house
  - upon this house
  lexicon: HALOT
  rationale: אֶל commonly indicates direction. 'Toward this house' fits the prayer's
    spatial orientation and reads naturally in English.
- source_word: יוֹמָם וָלַיְלָה
  chosen: day and night
  alternatives:
  - by day and by night
  - continually
  lexicon: HALOT
  rationale: This is the standard merism for continual duration. 'Day and night' is
    both literal and idiomatic.
- source_word: הַמָּקוֹם
  chosen: the place
  lexicon: HALOT
  rationale: A straightforward rendering is appropriate; in context it refers to the
    temple site as the divinely designated location.
- source_word: אֲשֶׁר אָמַרְתָּ לָשׂוּם שִׁמְךָ שָׁם
  chosen: where you said you would put your name
  alternatives:
  - where you said to put your name
  - where you said you would set your name there
  lexicon: HALOT
  rationale: '''Put your name'' preserves the covenant-temple idiom without overexplaining
    it. ''Would put'' reflects the sense of the prior divine declaration in idiomatic
    English.'
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: The phrase is a key theological idiom for God's manifested presence/claim
    without implying literal containment. It should remain 'your name' in the text
    rather than be paraphrased.
- source_word: לִשְׁמֹעַ
  chosen: to hear
  alternatives:
  - so as to hear
  - to listen to
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To hear' is the most direct rendering
    and preserves the biblical idiom of God hearing prayer.
- source_word: הַתְּפִלָּה
  chosen: the prayer
  alternatives:
  - the plea
  - the petition
  lexicon: HALOT
  rationale: תְּפִלָּה is the standard term for prayer. No contextual pressure requires
    a narrower gloss such as 'petition.'
- source_word: יִתְפַּלֵּל
  chosen: prays
  alternatives:
  - will pray
  - may pray
  lexicon: HALOT
  rationale: The imperfect here is naturally rendered as an English present in a relative
    clause describing the servant's act of prayer. This avoids awkward futurity while
    preserving the sense.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in prayerful address to God this
    is a conventional expression of humble service rather than emphasizing bonded
    status. 'Servant' best fits the context under the project's context-dependent
    policy.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  chosen: toward this place
  alternatives:
  - to this place
  lexicon: HALOT
  rationale: As earlier in the verse, אֶל is directional. 'Toward this place' captures
    the orientation of prayer toward the temple.
