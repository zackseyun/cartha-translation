theological_decisions:
- issue: Anthropomorphic language for God ('your eyes may be open')
  chosen_reading: Preserve the anthropomorphic expression literally
  alternative_readings:
  - Render interpretively as 'may you watch over' or 'may you be attentive to'
  rationale: The Hebrew uses concrete bodily imagery for divine attention. Preserving
    it maintains the text's rhetoric and theological texture without forcing a figurative
    paraphrase.
  doctrine_reference: Translation philosophy §1, §3
- issue: Temple theology in 'put your name there'
  chosen_reading: Retain the idiom 'put your name' without explanatory expansion
  alternative_readings:
  - '''cause your presence to dwell there'''
  - '''establish your reputation there'''
  rationale: The phrase is theologically significant and intentionally idiomatic.
    Expanding it would resolve interpretive nuance the Hebrew leaves compact.
  doctrine_reference: Translation philosophy §1, §3
