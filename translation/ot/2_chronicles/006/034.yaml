theological_decisions:
- issue: Directional prayer toward Jerusalem and the temple
  chosen_reading: Retained the concrete spatial language 'toward this city ... and
    the house' without spiritualizing it.
  alternative_readings:
  - Rendered more dynamically as 'with their faces toward this city'
  - Interpreted more abstractly as prayer with reference to Jerusalem/temple
  rationale: The Hebrew emphasizes actual orientation in prayer within Solomon's covenantal
    temple theology. The translation preserves that historical-theological setting
    without importing later doctrinal conclusions.
  doctrine_reference: Translation philosophy §1, §3
