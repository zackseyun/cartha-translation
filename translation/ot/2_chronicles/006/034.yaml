id: 2CH.6.34
reference: 2 Chronicles 6:34
source:
  edition: WLC
  text: כִּֽי יֵצֵ֨א עַמְּ/ךָ֤ לַ/מִּלְחָמָה֙ עַל א֣וֹיְבָ֔י/ו בַּ/דֶּ֖רֶךְ אֲשֶׁ֣ר
    תִּשְׁלָחֵ֑/ם וְ/הִתְפַּֽלְל֣וּ אֵלֶ֗י/ךָ דֶּ֣רֶךְ הָ/עִ֤יר הַ/זֹּאת֙ אֲשֶׁ֣ר
    בָּחַ֣רְתָּ בָּ֔/הּ וְ/הַ/בַּ֖יִת אֲשֶׁר בָּנִ֥יתִי לִ/שְׁמֶֽ/ךָ־־־׃
translation:
  text: If your people go out to battle against their enemies by the way that you
    send them, and they pray to you toward this city that you have chosen and the
    house that I have built for your name,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'facing this city'; the Hebrew literally uses 'way/direction' language
      for prayer oriented toward Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: '''The house'' refers to the temple Solomon built for the LORD''s name.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  - For
  lexicon: HALOT
  rationale: 'In this prayer context introducing a contingent case, כִּי functions
    conditionally: ''if/when.'' ''If'' best matches the protasis structure carried
    into the following petition.'
- source_word: יֵצֵא
  chosen: go out
  alternatives:
  - march out
  lexicon: HALOT
  rationale: The verb יצא literally means 'go out.' In military context it can imply
    going out to war, but 'go out' preserves the Hebrew wording while remaining natural
    English.
- source_word: עַמְּךָ
  chosen: your people
  lexicon: HALOT
  rationale: Straightforward covenantal designation; 'people' is the natural rendering
    for עם here.
- source_word: לַמִּלְחָמָה
  chosen: to battle
  alternatives:
  - to war
  - for battle
  lexicon: HALOT
  rationale: The phrase יצא למלחמה is an idiomatic military expression. 'Go out to
    battle' is idiomatic in English and slightly more immediate than 'to war.'
- source_word: עַל אֹיְבָיו
  chosen: against their enemies
  alternatives:
  - against its enemies
  - against his enemies
  lexicon: HALOT
  rationale: Although the suffix is morphologically singular ('his/its enemies') agreeing
    with collective עם, English naturally shifts to plural sense with 'your people
    ... their enemies.' This preserves meaning in readable modern English.
- source_word: בַּדֶּרֶךְ אֲשֶׁר תִּשְׁלָחֵם
  chosen: by the way that you send them
  alternatives:
  - on the way that you send them
  - by whatever way you send them
  lexicon: HALOT
  rationale: דרך here denotes route/direction or course. 'By the way that you send
    them' preserves the concrete directional sense and the divine commissioning implied
    by שלח.
- source_word: וְהִתְפַּלְלוּ אֵלֶיךָ
  chosen: and they pray to you
  alternatives:
  - and they pray toward you
  lexicon: HALOT
  rationale: The hitpael of פלל with אֶל marks directed prayer. 'Pray to you' is standard
    and clear.
- source_word: דֶּרֶךְ הָעִיר הַזֹּאת
  chosen: toward this city
  alternatives:
  - in the direction of this city
  - facing this city
  lexicon: HALOT
  rationale: דרך with a place after verbs of prayer indicates orientation toward that
    place. 'Toward this city' is concise and idiomatic; the directional nuance is
    important in Solomon's temple prayer.
- source_word: אֲשֶׁר בָּחַרְתָּ בָּהּ
  chosen: that you have chosen
  alternatives:
  - which you chose
  lexicon: HALOT
  rationale: בחר marks divine election of Jerusalem. Present perfect in English fits
    the enduring result of the completed choice.
- source_word: וְהַבַּיִת
  chosen: and the house
  alternatives:
  - and this house
  - and the temple
  lexicon: HALOT
  rationale: בית here refers specifically to the temple, but 'house' preserves the
    Hebrew term and its theological resonance as the house for God's name. 'Temple'
    is a possible interpretive gloss but less textually transparent.
- source_word: אֲשֶׁר בָּנִיתִי
  chosen: that I have built
  alternatives:
  - which I built
  lexicon: HALOT
  rationale: The perfect refers to Solomon's completed act with present relevance;
    English perfect is natural here.
- source_word: לִשְׁמֶךָ
  chosen: for your name
  alternatives:
  - for the sake of your name
  - to your name
  lexicon: HALOT
  rationale: This standard temple formula indicates dedication to God's name/presence.
    'For your name' is the most direct and conventional rendering.
