theological_decisions:
- issue: Repentance language in שׁוּב אֵלֶיךָ
  chosen_reading: Rendered as 'return to you' rather than explicitly 'repent'
  alternative_readings:
  - repent before you
  - turn back to you
  rationale: The Hebrew verb fundamentally means 'return/turn back.' In this prayer
    context it carries repentance implications, but the text itself does not require
    the more interpretive gloss 'repent.' Preserving 'return' maintains theological
    tension between physical/covenantal return and inward repentance.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
