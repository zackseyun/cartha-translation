id: 2CH.6.38
reference: 2 Chronicles 6:38
source:
  edition: WLC
  text: וְ/שָׁ֣בוּ אֵלֶ֗י/ךָ בְּ/כָל לִבָּ/ם֙ וּ/בְ/כָל נַפְשָׁ֔/ם בְּ/אֶ֥רֶץ שִׁבְיָ֖/ם
    אֲשֶׁר שָׁב֣וּ אֹתָ֑/ם וְ/הִֽתְפַּֽלְל֗וּ דֶּ֤רֶךְ אַרְצָ/ם֙ אֲשֶׁ֣ר נָתַ֣תָּה
    לַ/אֲבוֹתָ֔/ם וְ/הָ/עִיר֙ אֲשֶׁ֣ר בָּחַ֔רְתָּ וְ/לַ/בַּ֖יִת אֲשֶׁר בָּנִ֥יתִי
    לִ/שְׁמֶֽ/ךָ־־־־׃
translation:
  text: and they return to you with all their heart and with all their soul in the
    land of their captivity, where they were taken captive, and pray toward their
    land that you gave to their fathers, and toward the city that you have chosen,
    and toward the house that I have built for your name,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turn back to you'; the phrase can carry the sense of repentance in covenant
      contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁבוּ אֵלֶיךָ
  chosen: and they return to you
  alternatives:
  - and they turn back to you
  - and they repent before you
  lexicon: HALOT
  rationale: שׁוּב with אֶל commonly denotes returning/turning back to someone. 'Return
    to you' preserves the concrete verb while allowing the covenantal sense of repentance
    to be inferred from context rather than imported into the main text.
- source_word: בְּכָל לִבָּם
  chosen: with all their heart
  lexicon: HALOT
  rationale: Standard idiom for total inner devotion or sincerity. Singular 'heart'
    is natural in English and matches the Hebrew collective singular.
- source_word: וּבְכָל נַפְשָׁם
  chosen: and with all their soul
  alternatives:
  - and with all their life
  - and with all their being
  lexicon: HALOT
  rationale: נֶפֶשׁ here denotes the whole self/life in an idiom of total devotion.
    'Soul' preserves the familiar covenantal pairing 'heart and soul' without over-paraphrase.
- source_word: בְּאֶרֶץ שִׁבְיָם
  chosen: in the land of their captivity
  alternatives:
  - in the land of their exile
  - in the land where they are captives
  lexicon: HALOT
  rationale: The construct phrase literally refers to the land associated with their
    captivity. 'Land of their captivity' is transparent and close to the Hebrew.
- source_word: אֲשֶׁר שָׁבוּ אֹתָם
  chosen: where they were taken captive
  alternatives:
  - where their captors carried them away
  - which took them captive
  lexicon: HALOT
  rationale: 'The clause uses the verb שׁבה in the active with object suffix, referring
    to enemies taking them captive. English idiom is best expressed with a passive:
    ''where they were taken captive.'''
- source_word: וְהִתְפַּלְלוּ
  chosen: and pray
  alternatives:
  - and they pray
  lexicon: HALOT
  rationale: 'Simple waw + hitpael perfect in this conditional sequence is naturally
    rendered as a continuing future-like action in English: ''and pray.'''
- source_word: דֶּרֶךְ אַרְצָם
  chosen: toward their land
  alternatives:
  - in the direction of their land
  - facing their land
  lexicon: HALOT
  rationale: דֶּרֶךְ in prayer-orientation contexts means 'toward/in the direction
    of.' 'Toward their land' is concise and idiomatic.
- source_word: אֲשֶׁר נָתַתָּה לַאֲבוֹתָם
  chosen: that you gave to their fathers
  alternatives:
  - which you gave to their ancestors
  lexicon: HALOT
  rationale: אָבוֹת often means forefathers/ancestors, but 'fathers' preserves the
    covenantal wording and remains understandable.
- source_word: וְהָעִיר אֲשֶׁר בָּחַרְתָּ
  chosen: and toward the city that you have chosen
  alternatives:
  - and toward the city you chose
  lexicon: HALOT
  rationale: The perfect can be rendered with English present perfect to reflect the
    abiding significance of God's choice of Jerusalem.
- source_word: וְלַבַּיִת אֲשֶׁר בָּנִיתִי לִשְׁמֶךָ
  chosen: and toward the house that I have built for your name
  alternatives:
  - and toward this house that I built for your name
  - and toward the temple that I have built for your name
  lexicon: HALOT
  rationale: בַּיִת here refers to the temple, but 'house' preserves the Hebrew term
    and its theological resonance. 'For your name' keeps the covenantal idiom of dedication
    to God's name rather than paraphrasing it.
