theological_decisions:
- issue: Rendering the divine appeal in Zechariah's dying words
  chosen_reading: An appeal for Yahweh to observe and judicially reckon with the injustice
  alternative_readings:
  - A request for direct vengeance
  - A simple statement that the LORD sees
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: Preserve theological tension rather than resolve it.
