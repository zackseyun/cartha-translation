id: 2CH.24.22
reference: 2 Chronicles 24:22
source:
  edition: WLC
  text: וְ/לֹא זָכַ֞ר יוֹאָ֣שׁ הַ/מֶּ֗לֶךְ הַ/חֶ֨סֶד֙ אֲשֶׁ֨ר עָשָׂ֜ה יְהוֹיָדָ֤ע אָבִי/ו֙ עִמּ֔/וֹ וַֽ/יַּהֲרֹ֖ג אֶת בְּנ֑/וֹ וּ/כְ/מוֹת֣/וֹ אָמַ֔ר יֵ֥רֶא יְהוָ֖ה וְ/יִדְרֹֽשׁ־־׃פ
translation:
  text: But King Joash did not remember the kindness that Jehoiada his father had shown him, and he killed his son. As he was dying, he said, “May Yahweh see and require it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the loyalty' or 'the covenant faithfulness' that Jehoiada had shown him.
    reason: lexical_alternative
  - marker: b
    text: '''His father'' likely reflects Jehoiada''s fatherly role toward Joash rather than biological paternity.'
    reason: cultural_note
  - marker: c
    text: Or 'May the LORD see and require it.' The Hebrew verb can carry the sense of seeking out wrongdoing in order to hold someone accountable.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֶסֶד
  chosen: the kindness
  alternatives:
  - the loyalty
  - the covenant faithfulness
  - the good deed
  lexicon: HALOT
  rationale: חֶסֶד can denote kindness, loyal love, or covenant faithfulness. In this immediate human-to-human context, 'kindness' is the most natural modern English rendering while still conveying a morally weighty benefaction.
- source_word: זָכַר
  chosen: did not remember
  alternatives:
  - did not recall
  - did not keep in mind
  lexicon: HALOT
  rationale: The verb means remember/recall, but in context it implies failure to act in grateful remembrance. 'Did not remember' preserves the Hebrew wording without over-interpreting.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his ancestor
  - his patron
  lexicon: HALOT
  rationale: Although Jehoiada was not Joash's biological father, אָב can denote a fatherly protector or benefactor. The Hebrew text uses 'his father,' likely in an honorific or adoptive sense due to Jehoiada's role in raising and preserving Joash. The literal rendering is retained.
- source_word: וַיַּהֲרֹג אֶת־בְּנוֹ
  chosen: and he killed his son
  alternatives:
  - and he put his son to death
  lexicon: HALOT
  rationale: The straightforward sense is that Joash caused the death of Jehoiada's son Zechariah. 'Killed' is direct and natural; 'put to death' is possible but slightly more interpretive regarding judicial process.
- source_word: וּכְמוֹתוֹ
  chosen: As he was dying
  alternatives:
  - and when he died
  - and at his death
  lexicon: HALOT
  rationale: The prefixed כ with infinitive/construct-like form conveys temporal sense, 'as/when he was dying.' This best fits the narrative moment of Zechariah's final words.
- source_word: יֵרֶא יְהוָה
  chosen: May the LORD see
  alternatives:
  - Let the LORD see
  - The LORD will see
  lexicon: HALOT
  rationale: The jussive expresses a wish or appeal. 'May the LORD see' captures the force of an imprecatory appeal better than a simple future.
- source_word: וְיִדְרֹשׁ
  chosen: and call to account
  alternatives:
  - and require it
  - and seek it out
  - and avenge
  lexicon: HALOT
  rationale: דרש in bloodguilt or justice contexts can mean to require, investigate, or call to account. 'Call to account' communicates divine judicial reckoning in clear modern English without narrowing it only to vengeance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
