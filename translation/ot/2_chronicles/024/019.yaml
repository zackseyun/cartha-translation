- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton, preserving reverential convention and broad English Bible recognizability.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the prophetic verb וַיָּעִידוּ
  chosen_reading: they testified against them
  alternative_readings:
  - they warned them
  rationale: The context is covenantal rebuke through prophets. Rendering the verb with forensic weight preserves the seriousness of prophetic witness without adding doctrinal interpretation beyond the Hebrew.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
