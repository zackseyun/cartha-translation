id: 2CH.24.19
reference: 2 Chronicles 24:19
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח בָּ/הֶם֙ נְבִאִ֔ים לַ/הֲשִׁיבָ֖/ם אֶל יְהוָ֑ה וַ/יָּעִ֥ידוּ בָ֖/ם וְ/לֹ֥א הֶאֱזִֽינוּ־׃ס
translation:
  text: Yet he sent prophets among them to bring them back to Yahweh, and they testified against them, but they would not listen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they warned them.' The Hebrew verb can carry the sense of solemn warning, but here it also has the nuance of bearing witness against them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: HALOT
  rationale: Standard rendering of שלח in narrative prose. 'Sent' is natural and sufficiently formal.
- source_word: בָּהֶם
  chosen: among them
  alternatives:
  - to them
  - against them
  lexicon: HALOT
  rationale: With שלח and persons, ב can indicate motion into the midst of a group; 'among them' fits the sense of sending prophets into Judah/Jerusalem rather than merely 'to them.'
- source_word: נְבִאִים
  chosen: prophets
  lexicon: HALOT
  rationale: Direct and standard rendering of נביאים.
- source_word: לַהֲשִׁיבָם
  chosen: to bring them back
  alternatives:
  - to turn them back
  - to restore them
  lexicon: HALOT
  rationale: Hiphil of שוב means to cause to return. 'Bring them back' communicates both causative force and relational return.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The phrase expresses covenantal return to Israel's God.
- source_word: וַיָּעִידוּ
  chosen: they testified against
  alternatives:
  - they warned
  - they bore witness against
  - they admonished
  lexicon: HALOT
  rationale: The verb עוד in the Hiphil commonly carries the sense of solemnly testifying or warning. In this context of prophetic covenant lawsuit, 'testified against' preserves the forensic nuance better than the flatter 'warned.'
- source_word: בָם
  chosen: against them
  alternatives:
  - to them
  - among them
  lexicon: HALOT
  rationale: 'Here ב with עוד is best taken adversatively/forensically: the prophets bore witness against the people because of their unfaithfulness.'
- source_word: וְלֹא הֶאֱזִינוּ
  chosen: but they would not listen
  alternatives:
  - but they did not listen
  - but they would not pay attention
  lexicon: HALOT
  rationale: קשב/אזן idiomatically means to listen attentively. 'Would not listen' captures not only failure but refusal, fitting the context of persistent rebellion.
