id: 2CH.24.7
reference: 2 Chronicles 24:7
source:
  edition: WLC
  text: כִּ֤י עֲתַלְיָ֨הוּ֙ הַ/מִּרְשַׁ֔עַת בָּנֶ֥י/הָ פָרְצ֖וּ אֶת בֵּ֣ית הָ/אֱלֹהִ֑ים וְ/גַם֙ כָּל קָדְשֵׁ֣י בֵית יְהוָ֔ה עָשׂ֖וּ לַ/בְּעָלִֽים־־־׃
translation:
  text: For Athaliah, that wicked woman, and her sons had broken into the house of God and had also made all the holy things of the house of Yahweh for the Baals.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had made all the holy things of the house of the LORD for the Baals.' The Hebrew verb can be rendered more literally as 'made,' but in context it likely means they appropriated or used the temple's sacred objects for Baal worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding command/context; 'for' preserves the explanatory force in natural English.
- source_word: עֲתַלְיָהוּ
  chosen: Athaliah
  rationale: Personal name is transliterated by standard convention per translation philosophy.
- source_word: הַמִּרְשַׁעַת
  chosen: that wicked woman
  alternatives:
  - the wicked woman
  - the wicked one
  lexicon: HALOT
  rationale: Feminine singular noun/adjective identifying Athaliah. 'That wicked woman' is idiomatic and preserves the demonstrative force of the article in apposition, while making the feminine reference explicit.
- source_word: בָּנֶיהָ
  chosen: her sons
  alternatives:
  - her children
  lexicon: HALOT
  rationale: The Hebrew explicitly uses 'sons,' not a gender-neutral term; this follows the gender-accurate principle.
- source_word: פָרְצוּ אֶת בֵּית הָאֱלֹהִים
  chosen: had broken into the house of God
  alternatives:
  - had broken up the house of God
  - had broken through the house of God
  - had damaged the house of God
  lexicon: HALOT
  rationale: The verb פרץ can denote breaking through/breaking into, and in this context refers to violent violation/plundering of the temple. 'Broken into' communicates unlawful forcible entry clearly in modern English.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew expression directly. 'Temple' is possible, but 'house of God' keeps the lexical link with the next phrase 'house of the LORD.'
- source_word: וְגַם
  chosen: and had also
  alternatives:
  - and also
  - even
  lexicon: HALOT
  rationale: Conveys additive emphasis and fits the past perfect sequence in English.
- source_word: כָּל קָדְשֵׁי בֵית יְהוָה
  chosen: all the holy things of the house of the LORD
  alternatives:
  - all the dedicated things of the house of the LORD
  - all the sacred things of the house of the LORD
  lexicon: HALOT
  rationale: קָדְשֵׁי refers to consecrated/sacred items belonging to the temple. 'Holy things' is a transparent and sufficiently natural rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name.
- source_word: עָשׂוּ לַבְּעָלִים
  chosen: had also used ... for the Baals
  alternatives:
  - had made ... for the Baals
  - had devoted ... to the Baals
  lexicon: HALOT
  rationale: With temple objects as the object, עשה plus ל can indicate employing or appropriating them for another purpose. 'Used ... for the Baals' best fits the context of misusing sacred objects in idolatrous worship. 'Baals' preserves the plural form and likely refers to various Baal images/cults rather than a singular proper name.
