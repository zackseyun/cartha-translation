id: 2CH.24.4
reference: 2 Chronicles 24:4
source:
  edition: WLC
  text: וַ/יְהִ֖י אַחֲרֵי כֵ֑ן הָיָה֙ עִם לֵ֣ב יוֹאָ֔שׁ לְ/חַדֵּ֖שׁ אֶת בֵּ֥ית יְהוָֽה־־׃
translation:
  text: After this, it was in the heart of Joash to restore the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to renew' or 'to repair' the house of the LORD.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house of the LORD'; that is, the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי אַחֲרֵי כֵן
  chosen: After this
  alternatives:
  - Afterward
  - And it happened after this
  lexicon: HALOT
  rationale: The sequence marker introduces a new stage in the narrative. 'After this' is natural modern English and preserves the temporal transition without the overly wooden 'and it happened.'
- source_word: הָיָה עִם לֵב יוֹאָשׁ
  chosen: it was in the heart of Joash
  alternatives:
  - Joash had it in mind
  - Joash set his heart
  lexicon: HALOT
  rationale: The Hebrew idiom literally involves something being 'with the heart' of Joash, expressing inner intention or resolve. 'It was in the heart of Joash' preserves the idiomatic imagery while remaining understandable. 'Set his heart' would suggest a stronger volitional nuance than the Hebrew here necessarily requires.
- source_word: לְחַדֵּשׁ
  chosen: to restore
  alternatives:
  - to renew
  - to repair
  lexicon: HALOT
  rationale: The verb means to make new again, renew, or restore. In the temple-building context, 'restore' best captures renovation of an existing structure. 'Renew' is possible but less idiomatic in contemporary English for a building; 'repair' is somewhat narrower than the Hebrew.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: The Hebrew is literally 'house of YHWH.' 'House of the LORD' preserves the source wording and its covenantal resonance. 'Temple of the LORD' is a valid contextual gloss but is less formally aligned with the Hebrew expression.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
