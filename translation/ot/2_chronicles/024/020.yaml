id: 2CH.24.20
reference: 2 Chronicles 24:20
source:
  edition: WLC
  text: וְ/ר֣וּחַ אֱלֹהִ֗ים לָֽבְשָׁה֙ אֶת זְכַרְיָה֙ בֶּן יְהוֹיָדָ֣ע הַ/כֹּהֵ֔ן וַֽ/יַּעֲמֹ֖ד מֵ/עַ֣ל לָ/עָ֑ם וַ/יֹּ֨אמֶר לָ/הֶ֜ם כֹּ֣ה אָמַ֣ר הָ/אֱלֹהִ֗ים לָ/מָה֩ אַתֶּ֨ם עֹבְרִ֜ים אֶת מִצְוֺ֤ת יְהוָה֙ וְ/לֹ֣א תַצְלִ֔יחוּ כִּֽי עֲזַבְתֶּ֥ם אֶת יְהוָ֖ה וַ/יַּֽעֲזֹ֥ב אֶתְ/כֶֽם־־׀־־־׃
translation:
  text: 'And the Spirit of God clothed Zechariah son of Jehoiada the priest, and he stood above the people and said to them, “Thus says God: Why are you transgressing the commandments of Yahweh, so that you do not prosper? Because you have forsaken Yahweh, he has also forsaken you.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came upon Zechariah'; literally, 'clothed Zechariah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and you will not prosper.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/ר֣וּחַ אֱלֹהִ֗ים
  chosen: the Spirit of God
  alternatives:
  - the spirit of God
  - a spirit from God
  lexicon: HALOT
  rationale: רוּחַ אֱלֹהִים in this prophetic-empowerment context most naturally refers to God's Spirit rather than an impersonal impulse or merely a disposition. Capitalizing 'Spirit' reflects the personal divine agency implied by the narrative without overtranslating beyond the Hebrew.
- source_word: לָֽבְשָׁה֙ אֶת
  chosen: clothed
  alternatives:
  - came upon
  - put on
  - enveloped
  lexicon: HALOT
  rationale: The verb לבשׁ literally means 'to clothe, put on.' Here the idiom is that the Spirit 'clothed' Zechariah, vividly portraying divine empowerment. Retaining the clothing metaphor is more source-faithful than flattening it to 'came upon,' though that sense is preserved as an alternative.
- source_word: זְכַרְיָה֙ בֶּן יְהוֹיָדָ֣ע הַ/כֹּהֵ֔ן
  chosen: Zechariah son of Jehoiada the priest
  alternatives:
  - Zechariah, the son of Jehoiada the priest
  rationale: Names are transliterated per project philosophy. The appositional phrase identifies Jehoiada as 'the priest'; English word order is kept natural while preserving the Hebrew relationship.
- source_word: וַֽ/יַּעֲמֹ֖ד מֵ/עַ֣ל לָ/עָ֑ם
  chosen: he stood above the people
  alternatives:
  - he stood over the people
  - he stood before the people
  lexicon: HALOT
  rationale: מֵעַל literally indicates position 'from above/over.' 'Above the people' preserves the spatial nuance, likely implying an elevated place from which he addressed them. 'Before the people' would be smoother but loses the vertical element.
- source_word: כֹּ֣ה אָמַ֣ר הָ/אֱלֹהִ֗ים
  chosen: Thus says God
  alternatives:
  - This is what God says
  - Thus says the God
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. 'Thus says God' is idiomatic, concise, and preserves the solemn prophetic register. The article on הָאֱלֹהִים is not naturally represented in English here.
- source_word: לָ/מָה֩ אַתֶּ֨ם עֹבְרִ֜ים
  chosen: Why are you transgressing
  alternatives:
  - Why are you crossing over
  - Why are you violating
  lexicon: HALOT
  rationale: עבר with commandments conveys overstepping or violating them. 'Transgressing' best matches the covenantal and moral force of the Hebrew in this rebuke.
- source_word: מִצְוֺ֤ת יְהוָה֙
  chosen: the commandments of the LORD
  alternatives:
  - the commands of the LORD
  lexicon: HALOT
  rationale: מִצְוֺת is straightforwardly 'commandments/commands.' 'Commandments' preserves the covenantal tone. יְהוָה is rendered 'the LORD' per doctrine guidelines.
- source_word: וְ/לֹ֣א תַצְלִ֔יחוּ
  chosen: so that you do not prosper
  alternatives:
  - and you will not prosper
  - but you cannot succeed
  lexicon: HALOT
  rationale: The clause explains the consequence of their transgression. English 'so that you do not prosper' captures the resultative force in context, while keeping the sense of failed success. 'And you will not prosper' is possible, but the rhetorical question favors an explanatory/result nuance.
- source_word: כִּֽי עֲזַבְתֶּ֥ם אֶת יְהוָ֖ה
  chosen: Because you have forsaken the LORD
  alternatives:
  - For you have abandoned the LORD
  lexicon: HALOT
  rationale: עזב in covenant contexts often means 'forsake, abandon.' 'Forsaken' preserves the biblical covenantal resonance and matches the repeated verb in the next clause.
- source_word: וַ/יַּֽעֲזֹ֥ב אֶתְ/כֶֽם
  chosen: he has also forsaken you
  alternatives:
  - he has forsaken you
  - he abandoned you
  lexicon: HALOT
  rationale: 'The repeated verb creates deliberate reciprocity: they forsook the LORD, and he forsook them. Adding ''also'' makes the responsive symmetry explicit in natural English without adding new content.'
