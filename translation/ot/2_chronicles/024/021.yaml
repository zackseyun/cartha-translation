id: 2CH.24.21
reference: 2 Chronicles 24:21
source:
  edition: WLC
  text: וַ/יִּקְשְׁר֣וּ עָלָ֔י/ו וַ/יִּרְגְּמֻ֥/הוּ אֶ֖בֶן בְּ/מִצְוַ֣ת הַ/מֶּ֑לֶךְ בַּ/חֲצַ֖ר בֵּ֥ית יְהוָֽה׃
translation:
  text: So they conspired against him and stoned him at the command of the king, in the court of the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they plotted against him.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'stoned him with stone'; the expression means execution by stoning.
    reason: lexical_alternative
  - marker: c
    text: Or 'in the courtyard of the house of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְשְׁרוּ עָלָיו
  chosen: they conspired against him
  alternatives:
  - they plotted against him
  - they bound themselves against him
  lexicon: HALOT
  rationale: קשר in this stem with עַל commonly means to conspire or plot against someone, not merely to bind. 'Conspired against him' best captures the hostile collective action in idiomatic English.
- source_word: וַיִּרְגְּמֻהוּ אֶבֶן
  chosen: stoned him with stones
  alternatives:
  - stoned him
  - pelted him with stones
  lexicon: HALOT
  rationale: רגם means to stone. The singular אֶבֶן after the verb functions adverbially/instrumentally ('with stone(s)'). 'Stoned him with stones' preserves the Hebrew emphasis more fully than the smoother 'stoned him,' while remaining intelligible.
- source_word: בְּמִצְוַת
  chosen: at the command of
  alternatives:
  - by the command of
  - according to the order of
  lexicon: HALOT
  rationale: מִצְוָה here denotes an authoritative command or order. 'At the command of' is natural English and preserves the king's direct responsibility.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward definite noun; context identifies the king as Joash, but the Hebrew uses the title rather than the personal name here.
- source_word: בַּחֲצַר
  chosen: in the court
  alternatives:
  - in the courtyard
  lexicon: HALOT
  rationale: חָצֵר refers to a court/courtyard. 'Court' is concise and fits the temple setting; 'courtyard' is a viable alternative.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: בֵּית יְהוָה is literally 'house of YHWH.' Following the doctrine guideline, יְהוָה is rendered 'the LORD.' 'House of the LORD' preserves the Hebrew expression more closely than the interpretive 'temple of the LORD'.
