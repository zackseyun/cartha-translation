id: 2CH.24.6
reference: 2 Chronicles 24:6
source:
  edition: WLC
  text: וַ/יִּקְרָ֣א הַ/מֶּלֶךְ֮ לִֽ/יהוֹיָדָ֣ע הָ/רֹאשׁ֒ וַ/יֹּ֣אמֶר ל֗/וֹ מַדּ֨וּעַ֙ לֹֽא דָרַ֣שְׁתָּ עַל הַ/לְוִיִּ֔ם לְ/הָבִ֞יא מִֽ/יהוּדָ֣ה וּ/מִֽ/ירוּשָׁלִַ֗ם אֶת מַשְׂאַת֙ מֹשֶׁ֣ה עֶֽבֶד יְהוָ֔ה וְ/הַ/קָּהָ֖ל לְ/יִשְׂרָאֵ֑ל לְ/אֹ֖הֶל הָ/עֵדֽוּת־־־־׃
translation:
  text: Then the king called Jehoiada the chief and said to him, “Why have you not required the Levites to bring from Judah and from Jerusalem the levy of Moses the servant of Yahweh and of the assembly of Israel for the tent of the testimony?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the levy” or “the contribution” of Moses. The Hebrew term refers to an imposed payment for sanctuary purposes.
    reason: lexical_alternative
  - marker: b
    text: That is, the sanctuary, literally “the tent of the testimony.”
    reason: cultural_note
lexical_decisions:
- source_word: הָרֹאשׁ
  chosen: the chief
  alternatives:
  - the head
  - the chief priest
  lexicon: HALOT
  rationale: The noun literally means 'head/chief.' In context Jehoiada is the leading priest, but the Hebrew here uses the title 'the chief' rather than explicitly 'chief priest,' so the translation preserves the source wording without over-specifying.
- source_word: דָרַשְׁתָּ עַל
  chosen: have you not required
  alternatives:
  - have you not sought from
  - have you not inquired concerning
  - have you not demanded of
  lexicon: HALOT
  rationale: With עַל and an infinitive of result ('to bring'), דרשׁ here carries the sense of calling for or exacting performance, not merely asking a question. 'Required' fits the administrative rebuke in context.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Straightforward rendering of the tribal/ministerial group.
- source_word: לְהָבִיא
  chosen: to bring
  alternatives:
  - to collect and bring
  lexicon: HALOT
  rationale: The infinitive of בוא is most naturally 'to bring.' The broader context involves collection, but the verb itself should not be expanded beyond the Hebrew.
- source_word: מִיהוּדָה וּמִירוּשָׁלִַם
  chosen: from Judah and from Jerusalem
  alternatives:
  - throughout Judah and Jerusalem
  lexicon: HALOT
  rationale: The repeated preposition מן is best preserved as 'from ... and from ...,' indicating the source locations from which the levy was to be brought.
- source_word: מַשְׂאַת
  chosen: the tax
  alternatives:
  - the levy
  - the contribution
  lexicon: HALOT
  rationale: In this context the noun refers to an imposed contribution associated with Moses and the sanctuary. 'Tax' communicates an obligatory levy more clearly than the more ambiguous 'contribution.'
- source_word: מֹשֶׁה עֶבֶד יְהוָה
  chosen: Moses the servant of the LORD
  alternatives:
  - Moses, servant of the LORD
  lexicon: HALOT
  rationale: A standard construct/title phrase. 'the LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְהַקָּהָל לְיִשְׂרָאֵל
  chosen: and of the assembly of Israel
  alternatives:
  - and the assembly of Israel
  - even the assembly for Israel
  lexicon: HALOT
  rationale: The phrase is syntactically difficult, but in apposition with 'Moses' tax' it most naturally identifies the levy associated with Moses and the assembly of Israel. Rendering with 'of' keeps the relation compact and readable without forcing a more interpretive paraphrase.
- source_word: לְאֹהֶל הָעֵדוּת
  chosen: for the tent of the testimony
  alternatives:
  - for the tent of witness
  - for the tabernacle of the testimony
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the sanctuary terminology. 'Tent of the testimony' is transparent and close to the Hebrew; 'tabernacle' is possible but more traditional than necessary.
