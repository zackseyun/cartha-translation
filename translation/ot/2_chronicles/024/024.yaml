theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretation of the Syrians' victory as divine judgment
  chosen_reading: Thus they executed judgments on Joash
  alternative_readings:
  - and on Joash they executed judgment
  - and they dealt judgment against Joash
  rationale: The Hebrew presents the Aramean action as the means by which divine judgments were carried out against Joash. The translation preserves this theological causality without overexplaining the mechanism.
