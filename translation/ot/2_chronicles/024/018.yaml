theological_decisions:
- issue: Referent of 'wrath'
  chosen_reading: understood as divine wrath without adding 'God's' explicitly to the main text
  alternative_readings:
  - made explicit as 'the wrath of God/the LORD came'
  rationale: In context, the wrath is clearly the LORD's judgment, but the Hebrew text simply says 'wrath came.' To avoid importing words not present, the main text keeps the implicit formulation while allowing readers to infer the divine source from context.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Rendering of אֲשֵׁרִים
  chosen_reading: retain the Hebrew-derived term 'Asherim' in the main text
  alternative_readings:
  - translate as 'Asherah poles'
  rationale: The term is culturally specific and debated between reference to cult objects and association with the goddess Asherah. Retaining 'Asherim' avoids over-resolving the issue; a footnote preserves the common explanatory rendering.
  doctrine_reference: Translation philosophy items 1, 3, and 6
