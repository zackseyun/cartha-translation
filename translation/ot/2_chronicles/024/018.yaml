id: 2CH.24.18
reference: 2 Chronicles 24:18
source:
  edition: WLC
  text: וַ/יַּֽעַזְב֗וּ אֶת בֵּ֤ית יְהוָה֙ אֱלֹהֵ֣י אֲבוֹתֵי/הֶ֔ם וַ/יַּֽעַבְד֥וּ אֶת הָ/אֲשֵׁרִ֖ים וְ/אֶת הָֽ/עֲצַבִּ֑ים וַֽ/יְהִי קֶ֗צֶף עַל יְהוּדָה֙ וִ/יר֣וּשָׁלִַ֔ם בְּ/אַשְׁמָתָ֖/ם זֹֽאת־־־־־׃
translation:
  text: And they abandoned the house of Yahweh, the God of their fathers, and served the Asherim and the idols. So wrath came upon Judah and Jerusalem because of this guilt of theirs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Asherah poles.' The Hebrew term refers to cultic Asherah objects, and may also evoke the goddess Asherah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַזְבוּ
  chosen: abandoned
  alternatives:
  - forsook
  - left
  lexicon: HALOT
  rationale: The verb עזב commonly means to leave or forsake. 'Abandoned' is natural modern English and conveys covenantal disloyalty without archaic tone; 'forsook' is possible but less contemporary.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'House' preserves the Hebrew expression, while still clearly referring to the temple context. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving reverential convention and alignment with the LXX/English Bible tradition noted in DOCTRINE.md.
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  chosen: the God of their fathers
  alternatives:
  - their ancestral God
  lexicon: HALOT
  rationale: This is the standard covenantal expression in Hebrew narrative. 'The God of their fathers' preserves both the familial and covenantal resonance better than a more interpretive paraphrase.
- source_word: וַיַּעַבְדוּ
  chosen: served
  alternatives:
  - worshiped
  lexicon: HALOT
  rationale: עבד with divine objects can mean serve/worship. 'Served' is closer to the Hebrew and leaves the religious sense to the objects named; 'worshiped' is interpretive but plausible.
- source_word: הָאֲשֵׁרִים
  chosen: the Asherim
  alternatives:
  - the Asherah poles
  - the Asherahs
  lexicon: HALOT
  rationale: The plural can refer to cultic Asherah objects/poles associated with the goddess Asherah. 'The Asherim' preserves the Hebrew term without over-deciding whether the emphasis is on wooden cult symbols or the deity; an explanatory alternative is preserved in a footnote.
- source_word: הָעֲצַבִּים
  chosen: the idols
  alternatives:
  - images
  lexicon: HALOT
  rationale: The noun refers to idols or carved images, often with a pejorative sense. 'Idols' best captures the religious and polemical force in clear English.
- source_word: וַיְהִי קֶצֶף
  chosen: So wrath came
  alternatives:
  - and there was wrath
  - wrath came to be
  lexicon: HALOT
  rationale: The clause marks resulting divine anger. 'So wrath came' expresses the narrative consequence naturally in English while preserving the terse Hebrew sequence.
- source_word: עַל יְהוּדָה וִירוּשָׁלִַם
  chosen: upon Judah and Jerusalem
  alternatives:
  - against Judah and Jerusalem
  lexicon: HALOT
  rationale: עַל after wrath can be rendered 'upon' or 'against.' 'Upon' fits the idiom 'wrath came upon' and preserves the sense of judgment falling on them.
- source_word: בְּאַשְׁמָתָם זֹאת
  chosen: because of this guilt of theirs
  alternatives:
  - for this trespass of theirs
  - through their guilt in this
  lexicon: HALOT
  rationale: אַשְׁמָה denotes guilt or culpability, sometimes guilt-offense. The prefixed ב is causal here. 'Because of this guilt of theirs' is idiomatic and preserves both the demonstrative 'this' and the possessive force.
