id: 2CH.24.12
reference: 2 Chronicles 24:12
source:
  edition: WLC
  text: וַ/יִּתְּנֵ֨/הוּ הַ/מֶּ֜לֶךְ וִֽ/יהוֹיָדָ֗ע אֶל עוֹשֵׂה֙ מְלֶ֨אכֶת֙ עֲבוֹדַ֣ת בֵּית יְהוָ֔ה וַ/יִּֽהְי֤וּ שֹׂכְרִים֙ חֹצְבִ֣ים וְ/חָרָשִׁ֔ים לְ/חַדֵּ֖שׁ בֵּ֣ית יְהוָ֑ה וְ֠/גַם לְ/חָרָשֵׁ֤י בַרְזֶל֙ וּ/נְחֹ֔שֶׁת לְ/חַזֵּ֖ק אֶת בֵּ֥ית יְהוָֽה־־־׃
translation:
  text: And the king and Jehoiada gave it to those doing the work of the service of the house of Yahweh, and they hired stonecutters and craftsmen to restore the house of Yahweh, and also craftsmen in iron and bronze to strengthen the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'delivered it' or 'handed it over'; the pronoun refers to the collected money in context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house of the LORD'; that is, the temple.
    reason: lexical_alternative
  - marker: c
    text: Or 'smiths in iron and bronze.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנֵהוּ
  chosen: gave it
  alternatives:
  - delivered it
  - handed it over
  lexicon: HALOT
  rationale: The verb נתן with 3ms suffix refers back to the collected money/chest contents in context. 'Gave it' is the most natural English rendering and preserves the direct-object sense without over-specifying.
- source_word: אֶל עוֹשֵׂה מְלֶאכֶת עֲבוֹדַת בֵּית יְהוָה
  chosen: to those doing the work of the service of the house of the LORD
  alternatives:
  - to the workmen who had oversight of the service of the house of the LORD
  - to the doers of the work of the house of the LORD
  lexicon: HALOT
  rationale: 'The Hebrew is somewhat layered and formal: literally ''to the doer(s) of the work of the service of the house of YHWH.'' I preserved the structure as much as readable, avoiding an interpretive expansion such as ''oversight'' that is not explicit in this verse.'
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: '''House of the LORD'' closely reflects the Hebrew and maintains consistency with בית יהוה. ''Temple'' is possible but less formally transparent here.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיִּהְיוּ שֹׂכְרִים
  chosen: and they hired
  alternatives:
  - and they became hirers of
  - and they were hiring
  lexicon: HALOT
  rationale: The construction with היה + participle expresses ongoing or resultant action. In idiomatic English, 'they hired' best conveys the sense that the funds were used to employ workers.
- source_word: חֹצְבִים
  chosen: stonecutters
  alternatives:
  - quarrymen
  - hewers
  lexicon: HALOT
  rationale: In temple-repair context, the participle refers to those cutting stone. 'Stonecutters' is clear modern English and more precise than the archaic 'hewers.'
- source_word: חָרָשִׁים
  chosen: craftsmen
  alternatives:
  - artisans
  - carpenters
  lexicon: HALOT
  rationale: חרש can denote skilled workers broadly, not only woodworkers. 'Craftsmen' preserves the broader sense in this list.
- source_word: לְחַדֵּשׁ
  chosen: to restore
  alternatives:
  - to renew
  - to repair
  lexicon: HALOT
  rationale: The piel infinitive of חדש here means to make new again, in context restoring the temple structure. 'Restore' captures both repair and renewal better than the narrower 'repair.'
- source_word: וְגַם לְחָרָשֵׁי בַרְזֶל וּנְחֹשֶׁת
  chosen: and also workers in iron and bronze
  alternatives:
  - and also smiths in iron and bronze
  - and also craftsmen of iron and bronze
  lexicon: HALOT
  rationale: This phrase specifies metalworkers. 'Workers in iron and bronze' is natural and broad; 'smiths' is possible but slightly more specific than the Hebrew requires.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In many biblical material contexts נְחֹשֶׁת refers to bronze rather than pure copper. 'Bronze' is the standard contextual rendering in temple/building passages.
- source_word: לְחַזֵּק
  chosen: to strengthen
  alternatives:
  - to reinforce
  - to repair
  lexicon: HALOT
  rationale: The verb חזק means to make strong. 'Strengthen' is the most direct rendering and fits the structural context.
