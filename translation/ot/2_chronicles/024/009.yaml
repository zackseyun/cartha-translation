id: 2CH.24.9
reference: 2 Chronicles 24:9
source:
  edition: WLC
  text: וַ/יִּתְּנוּ ק֞וֹל בִּֽ/יהוּדָ֣ה וּ/בִֽ/ירוּשָׁלִַ֗ם לְ/הָבִ֤יא לַֽ/יהוָה֙ מַשְׂאַ֞ת מֹשֶׁ֧ה עֶֽבֶד הָ/אֱלֹהִ֛ים עַל יִשְׂרָאֵ֖ל בַּ/מִּדְבָּֽר־־־׃
translation:
  text: And they made a proclamation in Judah and Jerusalem to bring to Yahweh the levy of Moses the servant of God for Israel in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the contribution' or 'the tax of Moses the servant of God.' The Hebrew term refers to an assessed offering or levy.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ קוֹל
  chosen: they made a proclamation
  alternatives:
  - they gave out a call
  - they proclaimed
  lexicon: HALOT
  rationale: The idiom literally means 'they gave voice/sound' and in context refers to a public announcement throughout the land. 'Made a proclamation' is natural English while preserving the official-public sense.
- source_word: בִּיהוּדָה וּבִירוּשָׁלַם
  chosen: in Judah and Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative rendering; preserves the geographic scope of the proclamation.
- source_word: לְהָבִיא
  chosen: to bring
  alternatives:
  - to bring in
  lexicon: HALOT
  rationale: Infinitive of purpose after the proclamation idiom; 'to bring' is sufficient, with the object clarified by the following phrase.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD' rather than transliterated.
- source_word: מַשְׂאַת
  chosen: the levy
  alternatives:
  - the contribution
  - the tax
  lexicon: HALOT
  rationale: The noun denotes an imposed contribution or assessment. In this context it refers to the required offering associated with Moses' command. 'Levy' preserves the sense of an assessed obligation better than the broader 'contribution,' while avoiding the potentially over-specific modern connotations of 'tax'.
- source_word: מֹשֶׁה עֶבֶד הָאֱלֹהִים
  chosen: of Moses the servant of God
  alternatives:
  - of Moses, the servant of God
  - that Moses the servant of God required
  lexicon: HALOT
  rationale: Construct chain identifying the levy with Moses. 'Servant of God' is the standard title here and should be preserved without paraphrase.
- source_word: עַל יִשְׂרָאֵל
  chosen: laid on Israel
  alternatives:
  - for Israel
  - upon Israel
  lexicon: HALOT
  rationale: The preposition עַל with this noun naturally conveys something imposed upon Israel. 'Laid on Israel' makes the assessed nature of the levy explicit in idiomatic English.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: Standard rendering for the setting of Israel under Moses; 'wilderness' better matches biblical usage than 'desert' in English tradition and sense.
