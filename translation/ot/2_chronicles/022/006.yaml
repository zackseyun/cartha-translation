id: 2CH.22.6
reference: 2 Chronicles 22:6
source:
  edition: WLC
  text: וַ/יָּ֜שָׁב לְ/הִתְרַפֵּ֣א בְ/יִזְרְעֶ֗אל כִּ֤י הַ/מַּכִּים֙ אֲשֶׁ֣ר הִכֻּ֣/הוּ
    בָֽ/רָמָ֔ה בְּ/הִלָּ֣חֲמ֔/וֹ אֶת חֲזָהאֵ֖ל מֶ֣לֶךְ אֲרָ֑ם וַ/עֲזַרְיָ֨הוּ בֶן
    יְהוֹרָ֜ם מֶ֣לֶךְ יְהוּדָ֗ה יָרַ֡ד לִ/רְא֞וֹת אֶת יְהוֹרָ֧ם בֶּן אַחְאָ֛ב בְּ/יִזְרְעֶ֖אל
    כִּי חֹלֶ֥ה הֽוּא־־־־־׃
translation:
  text: So he returned to Jezreel to recover, because of the wounds that they had
    inflicted on him at Ramah when he fought against Hazael king of Aram. And Azariah
    son of Jehoram, king of Judah, went down to see Jehoram son of Ahab in Jezreel,
    because he was sick.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Azariah is the name written here in Chronicles; the same king is elsewhere
      called Ahaziah.
    reason: alternative_reading
  - marker: b
    text: Or 'to visit Jehoram.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: So he returned
  alternatives:
  - And he returned
  - Then he returned
  lexicon: HALOT
  rationale: Wayyiqtol of שוב marks narrative sequence; 'returned' is the core sense.
    'So' gives smooth English narrative connection without overinterpreting.
- source_word: לְהִתְרַפֵּא
  chosen: to recover
  alternatives:
  - to be healed
  - to heal himself
  lexicon: HALOT
  rationale: Hitpael infinitive of רפא here denotes recovering/healing from wounds.
    'To recover' is idiomatic modern English and fits the context of convalescence.
- source_word: בְיִזְרְעֶאל
  chosen: to Jezreel / in Jezreel
  lexicon: HALOT
  rationale: The first occurrence with motion after 'returned' is naturally rendered
    'to Jezreel'; the second with the visit scene is locative, 'in Jezreel.'
- source_word: כִּי הַמַּכִּים
  chosen: because of the wounds
  alternatives:
  - for the wounds
  - because the blows
  lexicon: HALOT
  rationale: Though literally 'the blows/wounds,' English prefers 'because of the
    wounds' after 'returned to recover.' This preserves the causal force of כִּי and
    the noun's resultative sense.
- source_word: אֲשֶׁר הִכֻּהוּ
  chosen: that they had inflicted on him
  alternatives:
  - with which they struck him
  - that struck him
  lexicon: HALOT
  rationale: Passive/causative injury sense from נכה with 3mp subject suffix construction
    is best expressed idiomatically as wounds 'they had inflicted on him.'
- source_word: בָרָמָה
  chosen: at Ramah
  alternatives:
  - in Ramah
  lexicon: HALOT
  rationale: Place name; 'at Ramah' is a natural English rendering for the battle
    location.
- source_word: בְּהִלָּחֲמוֹ
  chosen: when he fought
  alternatives:
  - in his fighting
  - while he fought
  lexicon: HALOT
  rationale: Infinitive construct with prefixed ב conveys temporal circumstance. 'When
    he fought' is clear and natural.
- source_word: אֶת חֲזָהאֵל מֶלֶךְ אֲרָם
  chosen: against Hazael king of Aram
  alternatives:
  - with Hazael king of Aram
  lexicon: HALOT
  rationale: With לחם, English idiom requires 'fight against' rather than a wooden
    'fight with' to avoid ambiguity.
- source_word: וַעֲזַרְיָהוּ
  chosen: And Azariah
  alternatives:
  - And Ahaziah
  lexicon: HALOT
  rationale: The Chronicler's text here reads 'Azariahu.' Since this is the source-text
    form, it is translated as 'Azariah' rather than harmonized to the more familiar
    'Ahaziah.' The alternative identification is worth preserving in a footnote because
    the same king is elsewhere called Ahaziah.
- source_word: יָרַד
  chosen: went down
  alternatives:
  - went
  lexicon: HALOT
  rationale: ירד literally means 'went down.' Retaining 'down' preserves the directional
    nuance common in Hebrew narrative.
- source_word: לִרְאוֹת
  chosen: to see
  alternatives:
  - to visit
  lexicon: HALOT
  rationale: The verb is literally 'to see,' but in context it denotes a visit. Main
    text keeps the more formal lexical sense; the idiomatic alternative is preserved
    in a footnote.
- source_word: יְהוֹרָם בֶּן אַחְאָב
  chosen: Jehoram son of Ahab
  alternatives:
  - Joram son of Ahab
  lexicon: HALOT
  rationale: The Hebrew form is Jehoram; although 'Joram' is a known shortened variant
    in English tradition, the fuller form more directly reflects the source text.
- source_word: כִּי חֹלֶה הוּא
  chosen: because he was sick
  alternatives:
  - for he was ill
  lexicon: HALOT
  rationale: Simple causal clause explaining the visit. 'Sick' is clear modern English.
