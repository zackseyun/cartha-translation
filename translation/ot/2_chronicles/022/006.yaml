theological_decisions:
- issue: Royal name variation in the Chronicler's account
  chosen_reading: Retain 'Azariah' in the main text
  alternative_readings:
  - Ahaziah
  rationale: This is not a doctrinal dispute but a source-text fidelity issue. Following
    original-language primacy, the Hebrew form in this verse is preserved rather than
    harmonized to parallel passages or common English tradition. Because readers may
    identify this king as Ahaziah elsewhere, the alternative is preserved in a footnote
    for transparency.
  doctrine_reference: Translation philosophy §1, §5
