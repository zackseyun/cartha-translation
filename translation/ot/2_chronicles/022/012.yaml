id: 2CH.22.12
reference: 2 Chronicles 22:12
source:
  edition: WLC
  text: וַ/יְהִ֤י אִתָּ/ם֙ בְּ/בֵ֣ית הָֽ/אֱלֹהִ֔ים מִתְחַבֵּ֖א שֵׁ֣שׁ שָׁנִ֖ים וַ/עֲתַלְיָ֖ה
    מֹלֶ֥כֶת עַל הָ/אָֽרֶץ־׃פ
translation:
  text: And he was with them in the house of God, hiding himself for six years, while
    Athaliah was reigning over the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being hidden'; the Hebrew participle may be understood reflexively ('hiding
      himself') or as describing his concealed state in context.
    reason: lexical_alternative
  - marker: b
    text: That is, the temple precincts, literally 'the house of God.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  chosen: And he was
  alternatives:
  - And he remained
  - And he stayed
  lexicon: HALOT
  rationale: The waw-consecutive of היה here advances the narrative and states Joash's
    continued presence. 'And he was' is formally close and idiomatic enough in context.
- source_word: אִתָּם
  chosen: with them
  alternatives:
  - among them
  lexicon: HALOT
  rationale: The preposition with pronominal suffix straightforwardly indicates Joash's
    presence together with those hiding him.
- source_word: בְּבֵית הָאֱלֹהִים
  chosen: in the house of God
  alternatives:
  - in God's house
  - in the temple of God
  lexicon: HALOT
  rationale: בית האלהים literally means 'house of God.' 'Temple' is contextually possible,
    but 'house of God' preserves the Hebrew expression and remains clear in English.
- source_word: מִתְחַבֵּא
  chosen: hiding himself
  alternatives:
  - being hidden
  - in hiding
  lexicon: HALOT
  rationale: The hitpael participle is reflexive/middle, naturally rendered 'hiding
    himself.' Because the broader context includes others concealing him, 'being hidden'
    is possible, but the Hebrew stem supports the reflexive wording in the main text.
- source_word: שֵׁשׁ שָׁנִים
  chosen: for six years
  alternatives:
  - six years
  lexicon: HALOT
  rationale: English idiom normally supplies 'for' with a duration expression.
- source_word: וַעֲתַלְיָה
  chosen: while Athaliah
  alternatives:
  - and Athaliah
  lexicon: HALOT
  rationale: The waw here is best rendered with a contemporaneous sense in English
    because the clause describes what was happening during the six-year hiding.
- source_word: מֹלֶכֶת
  chosen: was reigning
  alternatives:
  - reigned
  - was ruling as queen
  lexicon: HALOT
  rationale: The feminine singular participle denotes ongoing action. 'Was reigning'
    captures the durative sense better than a simple past.
- source_word: עַל הָאָרֶץ
  chosen: over the land
  alternatives:
  - over the הארץ
  - over the kingdom
  lexicon: HALOT
  rationale: הארץ can mean 'land' or 'earth'; here it refers to the realm/land of
    Judah. 'Land' is the most direct rendering without over-specifying beyond the
    Hebrew.
