id: 2CH.22.8
reference: 2 Chronicles 22:8
source:
  edition: WLC
  text: וַ/יְהִ֕י כְּ/הִשָּׁפֵ֥ט יֵה֖וּא עִם בֵּ֣ית אַחְאָ֑ב וַ/יִּמְצָא֩ אֶת שָׂרֵ֨י
    יְהוּדָ֜ה וּ/בְנֵ֨י אֲחֵ֧י אֲחַזְיָ֛הוּ מְשָׁרְתִ֥ים לַ/אֲחַזְיָ֖הוּ וַ/יַּהַרְגֵֽ/ם־־׃
translation:
  text: And it happened, when Jehu was executing judgment on the house of Ahab, that
    he found the officials of Judah and the sons of Ahaziah’s brothers, who were serving
    Ahaziah, and he killed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when Jehu was judging the house of Ahab.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Ahaziah’s brothers'; that is, Ahaziah’s nephews.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/הִשָּׁפֵט
  chosen: was executing judgment
  alternatives:
  - was judging
  - was punishing
  - was bringing justice against
  lexicon: HALOT
  rationale: The Niphal infinitive construct of שׁפט here functions temporally after
    כְּ, describing the time when Jehu was carrying out judicial action against Ahab's
    house. 'Executing judgment' preserves both the legal/judicial sense and the violent
    historical context better than the flatter 'judging.'
- source_word: עִם
  chosen: 'on'
  alternatives:
  - with
  - against
  lexicon: HALOT
  rationale: Although עִם commonly means 'with,' in contexts of hostile action it
    can carry the sense 'against' or indicate the object involved in the action. In
    English, 'executing judgment on the house of Ahab' is idiomatic and reflects the
    sense of punitive action directed toward them.
- source_word: בֵּית אַחְאָב
  chosen: the house of Ahab
  alternatives:
  - Ahab's house
  - the dynasty of Ahab
  lexicon: HALOT
  rationale: '''House of Ahab'' is the standard biblical idiom and preserves the dynastic/familial
    sense without over-interpreting it as only ''dynasty.'''
- source_word: שָׂרֵי יְהוּדָה
  chosen: the officials of Judah
  alternatives:
  - the princes of Judah
  - the leaders of Judah
  lexicon: HALOT
  rationale: שָׂרִים can denote princes, officials, commanders, or leaders depending
    on context. 'Officials' fits the court-political setting and avoids implying only
    royal sons, while remaining broad enough for high-ranking persons.
- source_word: וּבְנֵי אֲחֵי אֲחַזְיָהוּ
  chosen: the sons of Ahaziah’s brothers
  alternatives:
  - the nephews of Ahaziah
  lexicon: HALOT
  rationale: 'The Hebrew is explicitly relational and formal: ''sons of the brothers
    of Ahaziah.'' The more idiomatic English ''nephews'' is possible, but the chosen
    rendering stays closer to the source and preserves auditability of the kinship
    expression.'
- source_word: מְשָׁרְתִים
  chosen: who were serving
  alternatives:
  - ministering to
  - attending
  - serving as attendants to
  lexicon: HALOT
  rationale: The participle describes an ongoing role or function. 'Who were serving'
    is natural English and broad enough to include court attendance or official service
    without importing cultic overtones that 'ministering' might suggest.
- source_word: לַאֲחַזְיָהוּ
  chosen: Ahaziah
  alternatives:
  - to Ahaziah
  - for Ahaziah
  lexicon: HALOT
  rationale: The lamed marks the one served. In English, 'serving Ahaziah' is the
    most natural rendering; 'serving to Ahaziah' would be unidiomatic, and 'for Ahaziah'
    is possible but less direct.
- source_word: וַיַּהַרְגֵם
  chosen: and he killed them
  alternatives:
  - and he struck them down
  - and he put them to death
  lexicon: HALOT
  rationale: הרג is the ordinary verb 'kill/slay.' 'Killed them' is direct, clear,
    and neither euphemistic nor overly stylized.
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came about
  - Now it happened
  lexicon: HALOT
  rationale: This narrative formula marks continuation in Hebrew prose. 'And it happened'
    preserves the discourse function without sounding excessively archaic.
