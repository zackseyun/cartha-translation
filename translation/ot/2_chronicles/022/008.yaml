theological_decisions:
- issue: Nature of Jehu's action in relation to divine/judicial language
  chosen_reading: Render שׁפט with judicial force as 'executing judgment' without
    expanding into explicit divine endorsement.
  alternative_readings:
  - '''was judging'''
  - '''was punishing'' with stronger interpretive force'
  rationale: The verse presents Jehu's action in judicial terms, but the text here
    does not explicitly state the theological evaluation of every killing in this
    clause. The translation preserves the judicial wording of the Hebrew while avoiding
    interpretive expansion beyond the verse itself.
  doctrine_reference: Translation philosophy §§1, 3
