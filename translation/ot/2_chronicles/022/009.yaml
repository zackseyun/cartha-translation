theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse refers to Jehoshaphat's covenant devotion. Following the project's
    stated policy, the Tetragrammaton is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of the final clause about Ahaziah's house
  chosen_reading: dynastic inability to retain royal power
  alternative_readings:
  - lack of strength to rule
  - no one fit to reign
  rationale: The Hebrew speaks of the house of Ahaziah lacking כוח with respect to
    the kingdom. This is best understood as inability to maintain or secure the monarchy,
    not merely physical weakness.
