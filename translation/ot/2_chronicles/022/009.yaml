id: 2CH.22.9
reference: 2 Chronicles 22:9
source:
  edition: WLC
  text: וַ/יְבַקֵּשׁ֩ אֶת אֲחַזְיָ֨הוּ וַֽ/יִּלְכְּדֻ֜/הוּ וְ/ה֧וּא מִתְחַבֵּ֣א בְ/שֹֽׁמְר֗וֹן
    וַ/יְבִאֻ֣/הוּ אֶל יֵהוּא֮ וַ/יְמִתֻ/הוּ֒ וַֽ/יִּקְבְּרֻ֔/הוּ כִּ֤י אָֽמְרוּ֙
    בֶּן יְהוֹשָׁפָ֣ט ה֔וּא אֲשֶׁר דָּרַ֥שׁ אֶת יְהוָ֖ה בְּ/כָל לְבָב֑/וֹ וְ/אֵין֙
    לְ/בֵ֣ית אֲחַזְיָ֔הוּ לַ/עְצֹ֥ר כֹּ֖חַ לְ/מַמְלָכָֽה־־־־־־׃
translation:
  text: And he sought Ahaziah, and they captured him while he was hiding in Samaria,
    and they brought him to Jehu and put him to death. Then they buried him, for they
    said, “He is the son of Jehoshaphat, who sought the LORD with all his heart.”
    And the house of Ahaziah had no power to retain the kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, “they killed him.” The Hebrew verb is causative: “they caused him to
      die,” hence “put him to death.”'
    reason: lexical_alternative
  - marker: b
    text: Or, “the house of Ahaziah had no strength to hold the kingdom.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבַקֵּשׁ
  chosen: he sought
  alternatives:
  - he searched for
  - he looked for
  lexicon: HALOT
  rationale: The verb בקש commonly means to seek or search for. 'He sought' is concise
    and preserves the narrative style; the subject is contextually Jehu or his forces
    acting under his authority.
- source_word: וַיִּלְכְּדֻהוּ
  chosen: they captured him
  alternatives:
  - they seized him
  - they caught him
  lexicon: HALOT
  rationale: לכד denotes capture or seizure. The plural verb is preserved with 'they
    captured him,' reflecting the agents who found Ahaziah.
- source_word: מִתְחַבֵּא
  chosen: while he was hiding
  alternatives:
  - as he hid himself
  - hidden
  lexicon: HALOT
  rationale: The hitpael participle expresses Ahaziah's ongoing state of concealment.
    'While he was hiding' renders the participial nuance naturally in English.
- source_word: בְשֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: The preposition ב normally indicates location. 'In Samaria' is the most
    natural English rendering for the place name.
- source_word: וַיְבִאֻהוּ אֶל יֵהוּא
  chosen: they brought him to Jehu
  alternatives:
  - they led him to Jehu
  lexicon: HALOT
  rationale: בוא in the hiphil means to bring. 'Brought him to Jehu' is straightforward
    and idiomatic.
- source_word: וַיְמִתֻהוּ
  chosen: put him to death
  alternatives:
  - killed him
  - executed him
  lexicon: HALOT
  rationale: מות in the causative means to cause to die. 'Put him to death' preserves
    the causative force more clearly than the simpler 'killed him,' while avoiding
    the potentially over-specific 'executed.'
- source_word: וַיִּקְבְּרֻהוּ
  chosen: they buried him
  lexicon: HALOT
  rationale: A direct and standard rendering of קבר in narrative context.
- source_word: כִּי אָמְרוּ
  chosen: for they said
  alternatives:
  - because they said
  lexicon: HALOT
  rationale: כִּי here introduces the reason for the burial. 'For they said' fits
    the explanatory tone of the narrative.
- source_word: בֶּן יְהוֹשָׁפָט הוּא
  chosen: He is the son of Jehoshaphat
  alternatives:
  - He was Jehoshaphat's son
  lexicon: HALOT
  rationale: The verbless clause is rendered explicitly in English. 'He is the son
    of Jehoshaphat' preserves the direct-speech immediacy.
- source_word: אֲשֶׁר דָּרַשׁ אֶת יְהוָה
  chosen: who sought the LORD
  alternatives:
  - who inquired of the LORD
  - who sought after the LORD
  lexicon: HALOT
  rationale: דרש with God often means to seek him in devotion or dependence. 'Sought
    the LORD' is the most idiomatic and theologically appropriate rendering here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: בְּכָל לְבָבוֹ
  chosen: with all his heart
  alternatives:
  - with his whole heart
  lexicon: HALOT
  rationale: A standard covenantal idiom for wholehearted devotion. 'With all his
    heart' is natural and preserves the idiomatic force.
- source_word: וְאֵין לְבֵית אֲחַזְיָהוּ
  chosen: And the house of Ahaziah had no power
  alternatives:
  - And there was no strength in the house of Ahaziah
  - And the house of Ahaziah had no strength
  lexicon: HALOT
  rationale: The clause states the incapacity of Ahaziah's dynasty. Rendering 'house'
    preserves the dynastic sense rather than reducing it to a physical household.
- source_word: לַעְצֹר כֹּחַ
  chosen: to retain
  alternatives:
  - to hold fast power
  - to muster strength
  - to maintain strength
  lexicon: HALOT
  rationale: The infinitive עצר with כוח is idiomatic and somewhat compressed. In
    context it refers to the ability to keep a grip on royal power. 'To retain' communicates
    the sense clearly in English without over-paraphrasing.
- source_word: לְמַמְלָכָה
  chosen: the kingdom
  alternatives:
  - the royal rule
  - the kingship
  lexicon: HALOT
  rationale: ממלכה here refers to the realm or royal dominion. 'The kingdom' is the
    most natural English equivalent in this historical narrative.
