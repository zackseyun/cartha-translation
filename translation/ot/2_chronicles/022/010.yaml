theological_decisions:
- issue: Rendering of the difficult verb וַתְּדַבֵּר in context
  chosen_reading: Translate according to contextual sense as 'destroyed' rather than
    a wooden 'spoke.'
  alternative_readings:
  - spoke
  - arranged the destruction of
  rationale: The immediate object 'all the royal offspring' and the parallel account
    in 2 Kings 11:1 indicate an act of extermination, not speech. This is a lexical/text-critical
    decision rather than a doctrinal one, but it materially affects meaning and must
    be documented for auditability.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it (not directly theological
    here, but ambiguity is documented rather than hidden).'
