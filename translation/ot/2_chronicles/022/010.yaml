id: 2CH.22.10
reference: 2 Chronicles 22:10
source:
  edition: WLC
  text: וַ/עֲתַלְיָ֨הוּ֙ אֵ֣ם אֲחַזְיָ֔הוּ רָאֲתָ֖ה כִּ֣י מֵ֣ת בְּנָ֑/הּ וַ/תָּ֗קָם
    וַ/תְּדַבֵּ֛ר אֶת כָּל זֶ֥רַע הַ/מַּמְלָכָ֖ה לְ/בֵ֥ית יְהוּדָֽה־־׃
translation:
  text: Now Athaliah, the mother of Ahaziah, saw that her son was dead, and she arose
    and destroyed all the royal offspring of the house of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has a difficult verb form here, literally 'spoke,' but the context
      and the parallel in 2 Kings 11:1 support the sense 'destroyed' or 'put to death.'
    reason: textual_variant
lexical_decisions:
- source_word: וַעֲתַלְיָהוּ
  chosen: Now Athaliah
  alternatives:
  - And Athaliah
  - Athaliah
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention. The prefixed waw is
    rendered as a simple discourse connector; 'Now' gives natural English narrative
    flow without overstating sequence.
- source_word: אֵם אֲחַזְיָהוּ
  chosen: the mother of Ahaziah
  alternatives:
  - Ahaziah's mother
  lexicon: HALOT
  rationale: Construct relationship is expressed naturally in English. Either form
    is possible; the fuller phrase preserves the appositional identification clearly.
- source_word: רָאֲתָה כִּי מֵת בְּנָהּ
  chosen: saw that her son was dead
  alternatives:
  - saw that her son had died
  - saw that her son was dead
  lexicon: HALOT
  rationale: רָאָה with כִּי introduces perception of a fact. English past stative
    'was dead' closely matches the Hebrew clause, while also implying the completed
    death event.
- source_word: וַתָּקָם
  chosen: she arose
  alternatives:
  - she rose
  - she got up
  lexicon: HALOT
  rationale: קוּם in narrative often marks decisive action. 'She arose' preserves
    the formal narrative force better than the more colloquial 'got up'.
- source_word: וַתְּדַבֵּר
  chosen: destroyed
  alternatives:
  - spoke against
  - arranged the death of
  - put to death
  lexicon: HALOT
  rationale: Although the consonantal form reflects דבר ('speak'), the context and
    ancient versions support the well-known idiomatic/variant sense 'destroyed' here,
    parallel to 2 Kings 11:1. Rendering 'spoke' would be nonsensical with the direct
    object 'all the royal offspring.' 'Destroyed' preserves the broader sense of extermination
    without specifying method.
- source_word: אֵת כָּל זֶרַע הַמַּמְלָכָה
  chosen: all the royal offspring
  alternatives:
  - all the seed of the kingdom
  - all the royal family
  - all the heirs to the kingdom
  lexicon: HALOT
  rationale: זֶרַע literally means 'seed/offspring.' In this dynastic context, 'royal
    offspring' is both accurate and readable, preserving the focus on the kingly line
    rather than the abstract institution of the kingdom.
- source_word: לְבֵית יְהוּדָה
  chosen: of the house of Judah
  alternatives:
  - belonging to the house of Judah
  - in the house of Judah
  lexicon: HALOT
  rationale: The phrase identifies the dynastic house to which the royal offspring
    belonged. 'Of the house of Judah' is the clearest idiomatic rendering in English.
