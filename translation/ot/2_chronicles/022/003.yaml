id: 2CH.22.3
reference: 2 Chronicles 22:3
source:
  edition: WLC
  text: גַּם ה֣וּא הָלַ֔ךְ בְּ/דַרְכֵ֖י בֵּ֣ית אַחְאָ֑ב כִּ֥י אִמּ֛/וֹ הָיְתָ֥ה יֽוֹעַצְתּ֖/וֹ
    לְ/הַרְשִֽׁיעַ־׃
translation:
  text: He too walked in the ways of the house of Ahab, because his mother was his
    counselor in doing wickedly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was his adviser to do wickedly' / 'advised him in wickedness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם הוּא
  chosen: He too
  alternatives:
  - He also
  lexicon: HALOT
  rationale: 'גַּם with the independent pronoun adds inclusion/emphasis: this king
    likewise followed the same pattern as others before him. ''He too'' is natural
    modern English and preserves the additive force.'
- source_word: הָלַךְ
  chosen: walked
  alternatives:
  - went
  - lived
  lexicon: HALOT
  rationale: הלך in moral contexts commonly means to conduct oneself. 'Walked' preserves
    the biblical idiom and the ethical sense without flattening it to mere movement.
- source_word: בְּדַרְכֵי
  chosen: in the ways of
  alternatives:
  - according to the ways of
  - in the path of
  lexicon: HALOT
  rationale: The plural construct 'ways of' is a standard Hebrew idiom for patterns
    of conduct. 'In the ways of' is both clear and close to the source.
- source_word: בֵּית אַחְאָב
  chosen: the house of Ahab
  alternatives:
  - Ahab's house
  - the dynasty of Ahab
  lexicon: HALOT
  rationale: '''House of Ahab'' preserves the dynastic/familial sense of בֵּית while
    retaining the familiar biblical expression. ''Dynasty'' is interpretive and less
    literal.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for his conduct. 'Because' is the clearest
    causal rendering in contemporary English.
- source_word: אִמּוֹ
  chosen: his mother
  lexicon: HALOT
  rationale: Straightforward possessive noun; no reason to vary.
- source_word: הָיְתָה יֹעַצְתּוֹ
  chosen: was his counselor
  alternatives:
  - was his adviser
  - advised him
  lexicon: HALOT
  rationale: The construction is nominal ('was his counselor/adviser'), not directly
    verbal. 'Was his counselor' preserves the form and suggests an ongoing advisory
    role rather than a single act.
- source_word: לְהַרְשִׁיעַ
  chosen: in doing wickedly
  alternatives:
  - to do wickedly
  - for wickedness
  - to act wickedly
  lexicon: HALOT
  rationale: 'The Hiphil infinitive of רשע here expresses the result/purpose of her
    counsel: leading him into wicked conduct. ''In doing wickedly'' fits the English
    syntax after ''was his counselor'' and preserves the moral force. ''To do wickedly''
    is also possible, but sounds slightly less natural in this clause.'
