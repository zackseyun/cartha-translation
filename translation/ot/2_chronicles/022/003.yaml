theological_decisions:
- issue: Moral characterization of the king's conduct under maternal influence
  chosen_reading: Retain the text's explicit statement that his mother counseled him
    toward wickedness without softening or expanding it.
  alternative_readings:
  - Render more dynamically as 'his mother encouraged him to do evil'
  rationale: The verse makes a moral judgment using לְהַרְשִׁיעַ. The translation
    should preserve that judgment clearly while not importing additional psychological
    nuance beyond the Hebrew.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the text''s meaning without paraphrastic expansion.'
