id: 2CH.22.4
reference: 2 Chronicles 22:4
source:
  edition: WLC
  text: וַ/יַּ֧עַשׂ הָ/רַ֛ע בְּ/עֵינֵ֥י יְהוָ֖ה כְּ/בֵ֣ית אַחְאָ֑ב כִּי הֵ֜מָּה הָֽיוּ ל֣/וֹ יֽוֹעֲצִ֗ים אַחֲרֵ֛י מ֥וֹת אָבִ֖י/ו לְ/מַשְׁחִ֥ית לֽ/וֹ־־׃
translation:
  text: He did what was evil in the sight of Yahweh, like the house of Ahab, because they were his counselors after the death of his father, to his destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for his ruin' or 'to destroy him.' The Hebrew expression can denote either the outcome of their counsel or its destructive aim.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: Wayyiqtol of עשה narrates the next event in sequence. English normally omits the initial 'and' in smooth narrative, while preserving the verbal sense 'did.'
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - evil
  lexicon: HALOT
  rationale: With the article, the phrase idiomatically means 'the evil' or 'what was evil'; in English, 'did what was evil' is the most natural equivalent for the Hebrew evaluative formula.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the sight of the LORD
  alternatives:
  - in the eyes of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for divine evaluation. 'In the sight of the LORD' preserves the metaphor while reading naturally. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: כְּבֵית אַחְאָב
  chosen: like the house of Ahab
  alternatives:
  - as the house of Ahab did
  - according to the house of Ahab
  lexicon: HALOT
  rationale: כְּ marks comparison. 'House of Ahab' refers to the dynasty/family line, not merely the individual Ahab, so the dynastic expression is retained.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the preceding evaluation. 'Because' is clearer in modern English than 'for.'
- source_word: הֵמָּה הָיוּ לוֹ יוֹעֲצִים
  chosen: they were his counselors
  alternatives:
  - they became counselors to him
  - they were counselors to him
  - they were advising him
  lexicon: HALOT
  rationale: The clause identifies the members of Ahab's house as his advisors. 'His counselors' is concise and idiomatic, preserving the nominal predicate rather than recasting it as a verb of advising.
- source_word: אַחֲרֵי מוֹת אָבִיו
  chosen: after the death of his father
  alternatives:
  - after his father's death
  lexicon: HALOT
  rationale: Both are accurate; the chosen wording is slightly more formal and mirrors the Hebrew construct relationship clearly.
- source_word: לְמַשְׁחִית לוֹ
  chosen: to his destruction
  alternatives:
  - for his ruin
  - resulting in his destruction
  - to destroy him
  lexicon: HALOT
  rationale: The לְ with מַשְׁחִית expresses result/purpose with a destructive outcome for him. 'To his destruction' preserves the compact force of the Hebrew without over-specifying agency. 'To destroy him' would make the counselors' intent more explicit than the Hebrew necessarily requires.
