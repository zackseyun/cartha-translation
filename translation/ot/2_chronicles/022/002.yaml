id: 2CH.22.2
reference: 2 Chronicles 22:2
source:
  edition: WLC
  text: בֶּן אַרְבָּעִ֨ים וּ/שְׁתַּ֤יִם שָׁנָה֙ אֲחַזְיָ֣הוּ בְ/מָלְכ֔/וֹ וְ/שָׁנָ֣ה
    אַחַ֔ת מָלַ֖ךְ בִּֽ/ירוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ עֲתַלְיָ֖הוּ בַּת עָמְרִֽי־־׃
translation:
  text: Ahaziah was forty-two years old when he became king, and he reigned one year
    in Jerusalem. His mother’s name was Athaliah, the daughter of Omri.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''forty-two years old.'' The parallel in 2 Kgs 8:26 reads ''twenty-two
      years old,'' so some understand this as a textual problem or propose another
      way of reckoning the number.'
    reason: textual_variant
  - marker: b
    text: Or 'descendant of Omri.' Hebrew 'daughter' can sometimes be used more broadly
      for a female descendant.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אַרְבָּעִים וּשְׁתַּיִם שָׁנָה
  chosen: was forty-two years old
  alternatives:
  - was a son of forty-two years
  lexicon: HALOT
  rationale: This is the standard Hebrew age idiom ('son of ... years'). Natural English
    requires 'was forty-two years old' rather than a formally wooden rendering.
- source_word: בְמָלְכוֹ
  chosen: when he became king
  alternatives:
  - at his reigning
  - when he began to reign
  lexicon: HALOT
  rationale: The infinitive/construct form with prefixed ב marks the time of accession.
    'When he became king' is idiomatic modern English and accurately conveys the temporal
    sense.
- source_word: וְשָׁנָה אַחַת מָלַךְ
  chosen: and he reigned one year
  alternatives:
  - and he reigned a year
  lexicon: HALOT
  rationale: This straightforwardly states the duration of his reign. 'One year' preserves
    the Hebrew numeral and reads naturally.
- source_word: בִּירוּשָׁלָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard locative use of the preposition ב with the place name.
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: The Hebrew clause is formulaic in royal notices. The chosen rendering
    preserves the meaning while using readable modern English.
- source_word: עֲתַלְיָהוּ
  chosen: Athaliah
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: בַּת עָמְרִי
  chosen: the daughter of Omri
  alternatives:
  - a descendant of Omri
  lexicon: HALOT
  rationale: The plain lexical sense of בַּת is 'daughter,' and optimal equivalence
    favors retaining the direct genealogical wording in the main text. Because Hebrew
    kinship terms can sometimes denote broader descent and because this verse creates
    a well-known chronological/genealogical tension with parallel material, the broader
    alternative is preserved in a footnote rather than imported into the main text.
