theological_decisions:
- issue: Chronological tension in Ahaziah’s accession age
  chosen_reading: Retain the Masoretic wording 'forty-two years old' in the main text
  alternative_readings:
  - twenty-two years old (harmonized with 2 Kings 8:26)
  - understand the number as referring in some way to the Omride dynasty rather than
    Ahaziah’s literal age
  rationale: The supplied source text reads 'forty-two.' The translation should reflect
    the Hebrew text rather than silently emend or harmonize it. Because the reading
    creates an apparent historical difficulty in light of the parallel account, the
    main text preserves the source wording and the alternatives are noted in footnotes.
- issue: Genealogical force of 'daughter of Omri'
  chosen_reading: Translate literally as 'daughter of Omri'
  alternative_readings:
  - descendant/granddaughter of Omri
  rationale: The Hebrew text uses the ordinary kinship term 'daughter.' To avoid resolving
    the genealogical question beyond what the text states, the literal rendering is
    kept in the main text, with the broader familial sense noted in a footnote.
  doctrine_reference: Translation philosophy §3, §5
