id: 2CH.22.11
reference: 2 Chronicles 22:11
source:
  edition: WLC
  text: וַ/תִּקַּח֩ יְהוֹשַׁבְעַ֨ת בַּת הַ/מֶּ֜לֶךְ אֶת יוֹאָ֣שׁ בֶּן אֲחַזְיָ֗הוּ
    וַ/תִּגְנֹ֤ב אֹת/וֹ֙ מִ/תּ֤וֹךְ בְּנֵֽי הַ/מֶּ֨לֶךְ֙ הַ/מּ֣וּמָתִ֔ים וַ/תִּתֵּ֥ן
    אֹת֛/וֹ וְ/אֶת מֵֽינִקְתּ֖/וֹ בַּ/חֲדַ֣ר הַ/מִּטּ֑וֹת וַ/תַּסְתִּירֵ֡/הוּ יְהוֹשַׁבְעַ֣ת
    בַּת הַ/מֶּ֣לֶךְ יְהוֹרָ֡ם אֵשֶׁת֩ יְהוֹיָדָ֨ע הַ/כֹּהֵ֜ן כִּ֣י הִיא֩ הָיְתָ֨ה
    אֲח֧וֹת אֲחַזְיָ֛הוּ מִ/פְּנֵ֥י עֲתַלְיָ֖הוּ וְ/לֹ֥א הֱמִיתָֽתְ/הוּ־־־־־־׃
translation:
  text: But Jehoshabeath, the king’s daughter, took Joash son of Ahaziah and stole
    him away from among the king’s sons who were being put to death, and she put him
    and his nurse in the bedroom. So Jehoshabeath, the daughter of King Jehoram, the
    wife of Jehoiada the priest, hid him from Athaliah, and she did not put him to
    death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from among the king’s sons who were to be put to death.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the room of the beds'; that is, a bedroom or bedchamber.
    reason: lexical_alternative
  - marker: c
    text: 'The final ''she'' most likely refers to Athaliah: Jehoshabeath hid Joash
      so that Athaliah would not kill him.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּקַּח
  chosen: took
  alternatives:
  - took hold of
  - rescued
  lexicon: HALOT
  rationale: Basic narrative verb לקח is best rendered 'took.' 'Rescued' would import
    interpretation beyond the lexical value, though the context implies rescue.
- source_word: בַּת הַמֶּלֶךְ
  chosen: the king’s daughter
  alternatives:
  - daughter of the king
  lexicon: HALOT
  rationale: A straightforward construct chain; 'the king’s daughter' is natural modern
    English and preserves the royal relationship.
- source_word: וַתִּגְנֹב אֹתוֹ
  chosen: stole him away
  alternatives:
  - kidnapped him away
  - snatched him away
  - secreted him away
  lexicon: HALOT
  rationale: גנב literally means 'steal.' In context it refers to removing the child
    secretly from those about to be killed, so 'stole him away' preserves both the
    lexical force and the clandestine action.
- source_word: מִתּוֹךְ בְּנֵי הַמֶּלֶךְ הַמּוּמָתִים
  chosen: from among the king’s sons who were being put to death
  alternatives:
  - from among the king’s sons who were to be put to death
  - from among the slain sons of the king
  lexicon: HALOT
  rationale: The passive participle of מות here describes the group as in the process
    or circumstance of execution. 'Who were being put to death' best captures the
    immediate danger without implying they were already dead.
- source_word: מֵינִקְתּוֹ
  chosen: his nurse
  alternatives:
  - his nursing woman
  - his wet nurse
  lexicon: HALOT
  rationale: The noun denotes the woman nursing the child. 'His nurse' is readable
    and sufficiently precise; 'wet nurse' is possible but more specific and somewhat
    less natural in contemporary English.
- source_word: בַּחֲדַר הַמִּטּוֹת
  chosen: in the bedroom
  alternatives:
  - in the bedchamber
  - in the room of the beds
  lexicon: HALOT
  rationale: Literally 'in the room of the beds.' In context this is a sleeping chamber,
    so 'bedroom' gives clear modern English while staying close to the sense.
- source_word: וַתַּסְתִּירֵהוּ
  chosen: hid him
  alternatives:
  - concealed him
  lexicon: HALOT
  rationale: סתר is the ordinary verb 'hide/conceal.' 'Hid him' is concise and natural.
- source_word: אֵשֶׁת יְהוֹיָדָע הַכֹּהֵן
  chosen: the wife of Jehoiada the priest
  alternatives:
  - wife of Jehoiada the priest
  lexicon: HALOT
  rationale: This appositional identification is retained to preserve the verse’s
    explanatory detail about Jehoshabeath’s identity and connections.
- source_word: כִּי הִיא הָיְתָה אֲחוֹת אֲחַזְיָהוּ
  chosen: and she did not put him to death
  alternatives: []
  lexicon: HALOT
  rationale: This clause is not represented here; it is explanatory for why Jehoshabeath
    acted and is reflected by keeping the causal flow in the sentence structure before
    the final clause. The actual wording is translated separately below.
- source_word: כִּי הִיא הָיְתָה אֲחוֹת אֲחַזְיָהוּ
  chosen: for she was Ahaziah’s sister
  alternatives:
  - because she was the sister of Ahaziah
  lexicon: HALOT
  rationale: כִּי gives the reason for Jehoshabeath’s action. The familial relation
    is preserved explicitly.
- source_word: מִפְּנֵי עֲתַלְיָהוּ
  chosen: from Athaliah
  alternatives:
  - from the presence of Athaliah
  - away from Athaliah
  lexicon: HALOT
  rationale: מִפְּנֵי often means 'from before/from the presence of,' but in this
    context idiomatic English is simply 'from Athaliah,' meaning out of her reach.
- source_word: וְלֹא הֱמִיתָתְהוּ
  chosen: and she did not put him to death
  alternatives:
  - so that she did not kill him
  - and Athaliah did not kill him
  lexicon: HALOT
  rationale: 'The 3fs subject is most naturally Athaliah by sense: Jehoshabeath hid
    him from Athaliah, with the result that Athaliah did not kill him. ''Put him to
    death'' matches the earlier execution language and keeps the register consistent.'
