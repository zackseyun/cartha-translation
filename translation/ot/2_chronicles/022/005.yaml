theological_decisions:
- issue: Rendering of the national name אֲרָם and gentilic הָרַמִּים
  chosen_reading: Aram / Arameans
  alternative_readings:
  - Syria / Syrians
  rationale: This is not a doctrinally contested term, but it reflects the translation
    philosophy of prioritizing the source-language historical designation over inherited
    English convention. 'Aram' better represents the Hebrew text and avoids importing
    a later geopolitical label.
  doctrine_reference: Translation philosophy §1
