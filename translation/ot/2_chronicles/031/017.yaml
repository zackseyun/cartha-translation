id: 2CH.31.17
reference: 2 Chronicles 31:17
source:
  edition: WLC
  text: וְ/אֵ֨ת הִתְיַחֵ֤שׂ הַ/כֹּהֲנִים֙ לְ/בֵ֣ית אֲבוֹתֵי/הֶ֔ם וְ/הַ֨/לְוִיִּ֔ם
    מִ/בֶּ֛ן עֶשְׂרִ֥ים שָׁנָ֖ה וּ/לְ/מָ֑עְלָ/ה בְּ/מִשְׁמְרוֹתֵי/הֶ֖ם בְּ/מַחְלְקוֹתֵי/הֶֽם׃
translation:
  text: The genealogical registration of the priests was by their fathers’ houses,
    and that of the Levites from twenty years old and upward, by their duties in their
    divisions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those enrolled by genealogy among the priests ... and the Levites.'
      The Hebrew is compressed and elliptical, so the English supplies a smoother
      administrative expression.
    reason: lexical_alternative
  - marker: b
    text: '''Fathers’ houses'' refers to ancestral family groupings used for official
      registration and service organization.'
    reason: cultural_note
lexical_decisions:
- source_word: הִתְיַחֵשׂ
  chosen: genealogical registration
  alternatives:
  - enrollment
  - genealogy
  - those enrolled by genealogy
  lexicon: HALOT
  rationale: The verb refers to being entered in genealogical records or enrolled
    by lineage. Because the clause is elliptical after וְאֵת, an abstract English
    expression ('the genealogical registration of') communicates the administrative
    sense without forcing a finite verb not explicit in Hebrew.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of the priestly class; definite article preserved.
- source_word: לְבֵית אֲבוֹתֵיהֶם
  chosen: by their fathers’ houses
  alternatives:
  - according to their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: This phrase denotes clan-based paternal households used for official
    organization. 'Fathers’ houses' preserves the formal Israelite administrative
    term while remaining understandable.
- source_word: וְהַלְוִיִּם
  chosen: and that of the Levites
  alternatives:
  - and the Levites
  - and for the Levites
  lexicon: HALOT
  rationale: The Hebrew is elliptical, continuing the idea of genealogical registration
    from the first clause. Supplying 'that of' in English makes the parallel structure
    clear without over-paraphrasing.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וּלְמָעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from twenty years and above
  - aged twenty years and older
  lexicon: HALOT
  rationale: A standard age-threshold formula. 'And upward' closely reflects the Hebrew
    idiom.
- source_word: בְּמִשְׁמְרוֹתֵיהֶם
  chosen: by their duties
  alternatives:
  - according to their offices
  - in their service assignments
  - by their watches
  lexicon: HALOT
  rationale: The noun can denote charge, duty, or service assignment. Here it refers
    to the Levites' assigned responsibilities rather than literal guard shifts alone;
    'duties' is clear and suitably broad.
- source_word: בְּמַחְלְקוֹתֵיהֶם
  chosen: in their divisions
  alternatives:
  - according to their divisions
  - by their divisions
  lexicon: HALOT
  rationale: Refers to the organized groupings or courses in which they served. 'Divisions'
    is the most natural concise rendering in this administrative context.
