id: 2CH.31.20
reference: 2 Chronicles 31:20
source:
  edition: WLC
  text: וַ/יַּ֧עַשׂ כָּ/זֹ֛את יְחִזְקִיָּ֖הוּ בְּ/כָל יְהוּדָ֑ה וַ/יַּ֨עַשׂ הַ/טּ֤וֹב
    וְ/הַ/יָּשָׁר֙ וְ/הָ֣/אֱמֶ֔ת לִ/פְנֵ֖י יְהוָ֥ה אֱלֹהָֽי/ו־׃
translation:
  text: Hezekiah did this throughout all Judah, and he did what was good and right
    and faithful before the LORD his God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'true' / 'what was true.' The Hebrew אֱמֶת can denote truth, reliability,
      or faithfulness; here it likely describes faithful or trustworthy conduct.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ כָּזֹאת
  chosen: did this
  alternatives:
  - acted in this way
  - did such things
  lexicon: HALOT
  rationale: The idiom combines עשה with the demonstrative כזאת to summarize the preceding
    reforms and arrangements. 'Did this' is concise and natural English while preserving
    the resumptive force.
- source_word: בְּכָל יְהוּדָה
  chosen: throughout all Judah
  alternatives:
  - in all Judah
  - through all Judah
  lexicon: HALOT
  rationale: ב with כל plus a place name indicates scope across the whole territory.
    'Throughout all Judah' communicates geographic extent clearly.
- source_word: הַטּוֹב
  chosen: good
  alternatives:
  - what was good
  lexicon: HALOT
  rationale: טוב here is substantivized by the article and functions as the first
    item in a moral triad. In English, 'what was good' best brings out the substantival
    sense in the clause 'he did what was good...'.
- source_word: הַיָּשָׁר
  chosen: right
  alternatives:
  - upright
  - straight
  lexicon: HALOT
  rationale: ישר in ethical contexts commonly means what is morally right or upright.
    'Right' fits idiomatic English in the sequence 'good and right' and preserves
    the ethical nuance.
- source_word: הָאֱמֶת
  chosen: faithful
  alternatives:
  - 'true'
  - truth
  - what was true
  lexicon: HALOT
  rationale: Although אֱמֶת often denotes 'truth,' in ethical descriptions of conduct
    it can carry the sense of faithfulness, reliability, or integrity. Here, alongside
    'good' and 'right,' 'faithful' best expresses conduct characterized by covenantal
    reliability rather than abstract truth.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the sight of the LORD
  lexicon: HALOT
  rationale: לפני marks action done in God's presence or evaluation. 'Before the LORD'
    is a standard, natural rendering that preserves the relational and evaluative
    sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD' rather than a transliteration.
- source_word: אֱלֹהָיו
  chosen: his God
  lexicon: HALOT
  rationale: The suffix is singular masculine referring to Hezekiah. 'His God' preserves
    the personal covenantal relationship expressed in the Hebrew.
