id: 2CH.31.10
reference: 2 Chronicles 31:10
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלָ֗י/ו עֲזַרְיָ֧הוּ הַ/כֹּהֵ֛ן הָ/רֹ֖אשׁ לְ/בֵ֣ית צָד֑וֹק וַ֠/יֹּאמֶר מֵ/הָחֵ֨ל הַ/תְּרוּמָ֜ה לָ/בִ֣יא בֵית יְהוָ֗ה אָכ֨וֹל וְ/שָׂב֤וֹעַ וְ/הוֹתֵר֙ עַד לָ/ר֔וֹב כִּ֤י יְהוָה֙ בֵּרַ֣ךְ אֶת עַמּ֔/וֹ וְ/הַ/נּוֹתָ֖ר אֶת הֶ/הָמ֥וֹן הַ/זֶּֽה־־־־׃ס
translation:
  text: Azariah the chief priest, of the house of Zadok, said to him, “Since they began bringing the contribution into the house of Yahweh, we have eaten and been satisfied and have had plenty left over, for Yahweh has blessed his people; and what is left is this great abundance.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the offering”; the Hebrew term refers to a contribution set apart for sacred use.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֵן הָרֹאשׁ
  chosen: the chief priest
  alternatives:
  - the head priest
  - the leading priest
  lexicon: HALOT
  rationale: The phrase denotes Azariah's leading priestly role. 'Chief priest' is idiomatic modern English and preserves the hierarchical sense without importing the later technical title 'high priest,' which the Hebrew here does not explicitly use.
- source_word: לְבֵית צָדוֹק
  chosen: of the house of Zadok
  alternatives:
  - belonging to the house of Zadok
  - from the house of Zadok
  lexicon: HALOT
  rationale: The lamed with 'house' identifies family/house affiliation. 'Of the house of Zadok' is concise and natural, preserving the genealogical-priestly connection.
- source_word: מֵהָחֵל
  chosen: Since they began
  alternatives:
  - From the time they began
  - Since the beginning of
  lexicon: HALOT
  rationale: The infinitive construct of חלל after מן marks the starting point of the action. 'Since they began' communicates the temporal force clearly in English.
- source_word: הַתְּרוּמָה
  chosen: the contribution
  alternatives:
  - the offering
  - the heave offering
  lexicon: HALOT
  rationale: תרומה refers to a contribution set apart for sacred use. 'Contribution' fits the context of brought provisions and is more transparent for modern readers than the technical 'heave offering'; 'offering' is possible but less specific.
- source_word: לָבִיא בֵית יְהוָה
  chosen: bringing the contribution into the house of the LORD
  alternatives:
  - bringing ... to the house of the LORD
  lexicon: HALOT
  rationale: The infinitive of בוא with 'house of the LORD' describes the act of bringing the contribution into the temple precincts. 'Into' reflects the directional sense naturally.
- source_word: אָכוֹל וְשָׂבוֹעַ
  chosen: we have eaten and been satisfied
  alternatives:
  - we have eaten and had enough
  - we have eaten our fill
  lexicon: HALOT
  rationale: 'The paired infinitive absolute / verbal forms summarize the result: adequate consumption and satiety. Supplying ''we have'' is required for idiomatic English and matches the speaker''s corporate perspective.'
- source_word: וְהוֹתֵר עַד לָרֹב
  chosen: and have had plenty left over
  alternatives:
  - and there has been much left over
  - and left over in abundance
  lexicon: HALOT
  rationale: The verb יתר with עד לרב expresses surplus to a great extent. 'Have had plenty left over' is natural English that preserves the idea of abundant remainder.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בֵּרַךְ אֶת עַמּוֹ
  chosen: has blessed his people
  alternatives:
  - blessed his people
  lexicon: HALOT
  rationale: The perfect verb gives the reason for the abundance. 'Has blessed' fits the explanatory force in context and reads naturally in English.
- source_word: וְהַנּוֹתָר אֶת הֶהָמוֹן הַזֶּה
  chosen: and what is left is this great abundance
  alternatives:
  - and the remainder is this abundance
  - and what remains is this multitude
  lexicon: HALOT
  rationale: הנותר functions substantivally, 'what is left' or 'the remainder.' המון can mean abundance, mass, or multitude; here the context is surplus provisions, so 'great abundance' best conveys quantity rather than a crowd.
