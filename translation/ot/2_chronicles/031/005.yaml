id: 2CH.31.5
reference: 2 Chronicles 31:5
source:
  edition: WLC
  text: וְ/כִ/פְרֹ֣ץ הַ/דָּבָ֗ר הִרְבּ֤וּ בְנֵֽי יִשְׂרָאֵל֙ רֵאשִׁ֣ית דָּגָ֗ן תִּיר֤וֹשׁ
    וְ/יִצְהָר֙ וּ/דְבַ֔שׁ וְ/כֹ֖ל תְּבוּאַ֣ת שָׂדֶ֑ה וּ/מַעְשַׂ֥ר הַ/כֹּ֛ל לָ/רֹ֖ב
    הֵבִֽיאוּ־׃
translation:
  text: And when the matter spread, the sons of Israel brought in abundance the firstfruits
    of grain, new wine, oil, honey, and all the produce of the field; they brought
    in abundantly the tithe of everything.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites.” The Hebrew reads “the sons of Israel,” a standard corporate
      expression for the people of Israel.
    reason: lexical_alternative
  - marker: b
    text: “Honey” may in some contexts refer to a sweet syrup, such as date syrup,
      not only bee honey.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/כִ/פְרֹץ
  chosen: And when ... spread
  alternatives:
  - And as soon as ... spread
  - And when ... broke out
  lexicon: HALOT
  rationale: The conjunction plus infinitive construct of פרץ after כי gives a temporal
    sense, 'when/as soon as.' The verb literally conveys breaking out or bursting
    forth; with 'the matter' as subject, 'spread' is idiomatic English that preserves
    the idea of rapid dissemination.
- source_word: הַ/דָּבָר
  chosen: the matter
  alternatives:
  - the word
  - the report
  - the command
  lexicon: HALOT
  rationale: דבר is broad in sense. In context it refers to the previously issued
    instruction/report becoming known. 'The matter' is suitably broad and avoids over-specifying
    whether the focus is the command itself or the news of it.
- source_word: הִרְבּוּ
  chosen: brought in abundance
  alternatives:
  - increased
  - brought much
  lexicon: HALOT
  rationale: Hiphil of רבה can mean 'make much/increase.' In context, followed by
    the list of produce and then הֵבִיאוּ, it describes the abundance of what they
    contributed. Rendering it adverbially with the action implied by context gives
    natural English without losing the sense of quantity.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Per gender-accurate policy, the formal expression is retained rather
    than neutralized. In this historical narrative it denotes the Israelite people
    corporately. A footnote preserves the more idiomatic alternative.
- source_word: רֵאשִׁית
  chosen: the firstfruits
  alternatives:
  - the first portion
  - the first produce
  lexicon: HALOT
  rationale: In offering contexts ראשית is the established term for the first portion
    dedicated from produce. 'Firstfruits' is the clearest concise rendering in English.
- source_word: דָּגָן
  chosen: grain
  alternatives:
  - corn
  lexicon: HALOT
  rationale: Generic cereal produce is intended. 'Grain' is standard modern English;
    'corn' would be misleading for many readers.
- source_word: תִּירוֹשׁ
  chosen: new wine
  alternatives:
  - wine
  - fresh wine
  lexicon: HALOT
  rationale: תירוש commonly denotes freshly produced wine/must rather than wine in
    the most general sense. 'New wine' preserves the agricultural nuance.
- source_word: יִצְהָר
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: The term usually refers to fresh oil, especially olive oil. 'Oil' is
    concise and traditional; 'olive oil' is possible but slightly more interpretive
    than necessary in this list.
- source_word: דְבַשׁ
  chosen: honey
  alternatives:
  - date syrup
  lexicon: HALOT
  rationale: The Hebrew can denote bee honey or a sweet syrup, often date syrup. Because
    the exact referent is not explicit, 'honey' is retained in the main text, with
    the cultural alternative preserved in a footnote.
- source_word: וְ/כֹל תְּבוּאַת שָׂדֶה
  chosen: and all the produce of the field
  alternatives:
  - and all the yield of the field
  - and every crop of the field
  lexicon: HALOT
  rationale: תבואה is agricultural produce/yield. 'Produce of the field' is natural
    English and keeps the agrarian sense.
- source_word: וּ/מַעְשַׂר הַ/כֹּל
  chosen: the tithe of everything
  alternatives:
  - the tenth of everything
  - the tithe of all
  lexicon: HALOT
  rationale: מעשר is the technical term for the tithe, not merely a mathematical tenth
    in the abstract. 'Of everything' clearly reflects הכל.
- source_word: לָ/רֹב
  chosen: abundantly
  alternatives:
  - in abundance
  - in great quantity
  lexicon: HALOT
  rationale: The phrase marks the great quantity in which the tithe was brought. 'Abundantly'
    reads smoothly in the second clause while preserving the emphasis.
- source_word: הֵבִיאוּ
  chosen: they brought in
  alternatives:
  - they brought
  - they delivered
  lexicon: HALOT
  rationale: The verb is the concrete action of bringing the contributions. 'Brought
    in' fits the context of collecting and depositing offerings.
