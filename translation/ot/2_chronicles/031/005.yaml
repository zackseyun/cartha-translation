theological_decisions:
- issue: Gendered corporate expression בְנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: Following the stated gender-accurate policy, the masculine plural construct
    is preserved in the main text rather than replaced with a neutral collective.
    Because English readers may take it more narrowly than intended, an idiomatic
    alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
