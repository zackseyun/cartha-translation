theological_decisions:
- issue: Rendering of יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the divine name is 'the LORD,' following the
    stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of חזקו בתורת יהוה
  chosen_reading: so that they might devote themselves to the law of the LORD
  alternative_readings:
  - so that they might be strengthened in the law of the LORD
  - so that they might hold fast to the law of the LORD
  rationale: The phrase is semantically flexible. In this context of material provision
    for priests and Levites, the purpose is to free and enable them for sustained
    attention to their covenantal duties under the LORD's law. 'Devote themselves
    to' best conveys that functional sense without importing extra doctrine.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve tension where
    genuine ambiguity exists
