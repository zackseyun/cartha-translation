id: 2CH.31.4
reference: 2 Chronicles 31:4
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לָ/עָם֙ לְ/יוֹשְׁבֵ֣י יְרוּשָׁלִַ֔ם לָ/תֵ֕ת מְנָ֥ת הַ/כֹּהֲנִ֖ים
    וְ/הַ/לְוִיִּ֑ם לְמַ֥עַן יֶחֶזְק֖וּ בְּ/תוֹרַ֥ת יְהוָֽה׃
translation:
  text: He also told the people, the inhabitants of Jerusalem, to give the portion
    due to the priests and the Levites, so that they might devote themselves to the
    law of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'so that they might be strengthened in the law of the LORD,' or 'so
      that they might hold firmly to the law of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: He also told
  alternatives:
  - and he said
  - he commanded
  lexicon: HALOT
  rationale: The verb אמר is the common verb 'say.' In context, with an infinitive
    clause following and continuing Hezekiah's reforms, 'told' communicates reported
    instruction naturally in English. 'Also' reflects the narrative continuation signaled
    by waw-consecutive in context, though not as a separate Hebrew lexeme here.
- source_word: לָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: עם here refers collectively to the people under the king's authority,
    not humanity in general. 'The people' is the standard and natural rendering.
- source_word: לְיוֹשְׁבֵי יְרוּשָׁלַם
  chosen: the inhabitants of Jerusalem
  alternatives:
  - those living in Jerusalem
  - the residents of Jerusalem
  lexicon: HALOT
  rationale: The participial construction literally means 'to the dwellers/inhabitants
    of Jerusalem.' Apposition with 'the people' is best represented by 'the people,
    the inhabitants of Jerusalem,' preserving specificity.
- source_word: לָתֵת
  chosen: to give
  alternatives:
  - to provide
  lexicon: HALOT
  rationale: The infinitive of נתן is straightforwardly 'to give.' 'Provide' is possible
    but less direct.
- source_word: מְנָת
  chosen: the portion due to
  alternatives:
  - the portion
  - the share
  - the allotment
  lexicon: HALOT
  rationale: מְנָה denotes an assigned portion or share. Because the context is support
    for priests and Levites, 'the portion due to' makes explicit the sense of an allotted
    entitlement without overparaphrasing.
- source_word: הַכֹּהֲנִים וְהַלְוִיִּם
  chosen: the priests and the Levites
  alternatives:
  - the priests and Levites
  lexicon: HALOT
  rationale: Both groups are named distinctly and should both be retained. Including
    the article before 'Levites' mirrors the Hebrew coordination and keeps the phrasing
    formal but readable.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake that
  lexicon: HALOT
  rationale: This conjunction introduces purpose. 'So that' is idiomatic modern English.
- source_word: יֶחֶזְקוּ
  chosen: they might devote themselves to
  alternatives:
  - they might be strong in
  - they might strengthen themselves in
  - they might hold firmly to
  lexicon: HALOT
  rationale: The verb חזק in the Qal can mean 'be strong' or 'take firm hold.' With
    בְּתוֹרַת יְהוָה, the sense is not merely physical strengthening but being enabled
    to give themselves firmly to the LORD's instruction/service. 'Devote themselves
    to' captures the idiomatic force in context of priestly-Levitical support.
- source_word: בְּתוֹרַת יְהוָה
  chosen: to the law of the LORD
  alternatives:
  - in the law of the LORD
  - to the instruction of the LORD
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'law' or 'instruction.' In Chronicles, covenantal and
    cultic instruction is in view; 'law of the LORD' is the most recognizable and
    contextually fitting rendering. The preposition בְּ after חזק is represented idiomatically
    in English by 'to' with 'devote themselves.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
