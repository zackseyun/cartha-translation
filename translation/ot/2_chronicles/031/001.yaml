theological_decisions:
- issue: Gendered ethnonym and distributive singular
  chosen_reading: Then all the sons of Israel returned, each man to his possession
  alternative_readings:
  - Then all the Israelites returned, each to his possession
  - Then all the people of Israel returned, each to his property
  rationale: The Hebrew uses explicitly masculine forms בְּנֵי and אִישׁ. Following
    the project's gender-accurate policy, the translation preserves the masculine
    representative wording rather than neutralizing it, while not implying exclusion
    of women from the community.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
