id: 2CH.31.1
reference: 2 Chronicles 31:1
source:
  edition: WLC
  text: וּ/כְ/כַלּ֣וֹת כָּל זֹ֗את יָצְא֨וּ כָּל יִשְׂרָאֵ֥ל הַֽ/נִּמְצְאִים֮ לְ/עָרֵ֣י
    יְהוּדָה֒ וַ/יְשַׁבְּר֣וּ הַ/מַּצֵּב֣וֹת וַ/יְגַדְּע֣וּ הָ/אֲשֵׁרִ֡ים וַ/יְנַתְּצ֣וּ
    אֶת הַ֠/בָּמוֹת וְ/אֶת הַֽ/מִּזְבְּחֹ֞ת מִ/כָּל יְהוּדָ֧ה וּ/בִנְיָמִ֛ן וּ/בְ/אֶפְרַ֥יִם
    וּ/מְנַשֶּׁ֖ה עַד לְ/כַלֵּ֑ה וַ/יָּשׁ֜וּבוּ כָּל בְּנֵ֧י יִשְׂרָאֵ֛ל אִ֥ישׁ לַ/אֲחֻזָּת֖/וֹ
    לְ/עָרֵי/הֶֽם־־־־־־־׃ס
translation:
  text: And when all this was finished, all Israel who were present went out to the
    cities of Judah and shattered the pillars, cut down the Asherim, and tore down
    the high places and the altars from all Judah and Benjamin, and in Ephraim and
    Manasseh, until they had completely destroyed them. Then all the sons of Israel
    returned, each man to his possession, to their cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cut down the Asherah poles.' The Hebrew אֲשֵׁרִים can refer to cultic
      objects associated with Asherah, often understood as wooden poles or trees.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְכַלּוֹת כָּל זֹאת
  chosen: And when all this was finished
  alternatives:
  - And as soon as all this was finished
  - And when they finished all this
  lexicon: HALOT
  rationale: The infinitive construct with prefixed כ plus conjunction marks a temporal
    clause, 'when/as [the] finishing of all this.' Passive English ('was finished')
    is natural and avoids supplying an explicit subject not stated in Hebrew.
- source_word: כָּל יִשְׂרָאֵל הַנִּמְצְאִים
  chosen: all Israel who were present
  alternatives:
  - all Israel that was found there
  - all Israel who were found
  lexicon: HALOT
  rationale: הנמצאים literally means 'those found/present.' In context it refers to
    those Israelites in attendance at the feast. 'Who were present' is idiomatic modern
    English and preserves the participial sense.
- source_word: לְעָרֵי יְהוּדָה
  chosen: to the cities of Judah
  alternatives:
  - into the cities of Judah
  lexicon: HALOT
  rationale: The preposition ל marks direction toward. 'To the cities of Judah' is
    the most straightforward rendering.
- source_word: וַיְשַׁבְּרוּ הַמַּצֵּבוֹת
  chosen: shattered the pillars
  alternatives:
  - broke the pillars
  - smashed the sacred pillars
  - shattered the standing stones
  lexicon: HALOT
  rationale: מַצֵּבוֹת are cultic standing pillars/stones. 'Pillars' is concise and
    readable; the cultic sense is clear from context. 'Shattered' reflects the force
    of שׁבר better than the flatter 'broke.'
- source_word: וַיְגַדְּעוּ הָאֲשֵׁרִים
  chosen: cut down the Asherim
  alternatives:
  - cut down the Asherah poles
  - felled the Asherim
  lexicon: HALOT
  rationale: אֲשֵׁרִים may denote cult objects associated with Asherah, often wooden
    poles/trees. Retaining 'Asherim' avoids over-specifying the form where the Hebrew
    plural itself is used; the alternative 'Asherah poles' is worth preserving in
    a footnote.
- source_word: וַיְנַתְּצוּ אֶת הַבָּמוֹת
  chosen: tore down the high places
  alternatives:
  - pulled down the high places
  - demolished the high places
  lexicon: HALOT
  rationale: בָּמוֹת are elevated cult sites conventionally called 'high places.'
    This established rendering is still transparent enough in English. נָתַץ conveys
    demolition; 'tore down' is vivid and natural.
- source_word: וְאֶת הַמִּזְבְּחֹת
  chosen: and the altars
  lexicon: HALOT
  rationale: מִזְבְּחוֹת straightforwardly means 'altars.'
- source_word: מִכָּל יְהוּדָה וּבִנְיָמִן וּבְאֶפְרַיִם וּמְנַשֶּׁה
  chosen: from all Judah and Benjamin, and in Ephraim and Manasseh
  alternatives:
  - throughout all Judah and Benjamin, and Ephraim and Manasseh
  - out of all Judah and Benjamin, and Ephraim and Manasseh
  lexicon: HALOT
  rationale: The phrase marks the regions from which these cult sites were removed.
    Keeping 'from all Judah and Benjamin, and in Ephraim and Manasseh' reflects the
    Hebrew sequence while remaining intelligible. The shift in prepositions in English
    smooths the list without changing sense.
- source_word: עַד לְכַלֵּה
  chosen: until they had completely destroyed them
  alternatives:
  - until they finished
  - until they had brought it to an end
  - until completion
  lexicon: HALOT
  rationale: The infinitive expresses completion. Because English needs an object
    for clarity after the list of objects destroyed, 'them' is supplied and refers
    back to the cultic installations. 'Completely destroyed' captures the idiomatic
    force of total removal.
- source_word: וַיָּשׁוּבוּ כָּל בְּנֵי יִשְׂרָאֵל
  chosen: Then all the sons of Israel returned
  alternatives:
  - Then all the Israelites returned
  - Then all the children of Israel returned
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל is a standard ethnonym. Per the project's gender-accurate
    principle, 'sons of Israel' preserves the source form; the more idiomatic 'Israelites'
    is possible but less formally transparent.
- source_word: אִישׁ לַאֲחֻזָּתוֹ
  chosen: each man to his possession
  alternatives:
  - each man to his property
  - each to his inheritance
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each man.' אֲחֻזָּה denotes landed possession/holding.
    'Possession' is broad enough to include hereditary property without importing
    technical inheritance language unless context requires it.
- source_word: לְעָרֵיהֶם
  chosen: to their cities
  alternatives:
  - to his city
  lexicon: HALOT
  rationale: The plural with 3mp suffix is best rendered collectively as 'to their
    cities,' balancing the prior distributive singular with the Hebrew plural ending.
