id: 2CH.31.12
reference: 2 Chronicles 31:12
source:
  edition: WLC
  text: וַ/יָּבִ֨יאוּ אֶת הַ/תְּרוּמָ֧ה וְ/הַֽ/מַּעֲשֵׂ֛ר וְ/הַ/קֳּדָשִׁ֖ים בֶּ/אֱמוּנָ֑ה
    וַ/עֲלֵי/הֶ֤ם נָגִיד֙ כונניהו הַ/לֵּוִ֔י וְ/שִׁמְעִ֥י אָחִ֖י/הוּ מִשְׁנֶֽה־׃
translation:
  text: They brought in the contribution, the tithe, and the holy things faithfully,
    and Conaniah the Levite was chief over them, with his brother Shimei second.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the consecrated things' for 'the holy things.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Shimei his brother was second in command.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבִיאוּ
  chosen: They brought in
  alternatives:
  - They brought
  - They brought into storage
  lexicon: HALOT
  rationale: The Hiphil of בוא commonly means 'bring in/bring'. In this temple-storage
    context, 'brought in' naturally conveys delivery into the storehouses without
    over-specifying beyond the verb itself.
- source_word: הַתְּרוּמָה
  chosen: the contribution
  alternatives:
  - the offering
  - the heave offering
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution set apart for sacred use. 'Contribution'
    is clear modern English and avoids the overly technical 'heave offering' where
    the ritual motion is not in view.
- source_word: הַמַּעֲשֵׂר
  chosen: the tithe
  alternatives:
  - the tenth
  lexicon: HALOT
  rationale: מַעֲשֵׂר is the standard term for the tenth given to God; 'tithe' is
    the established and precise English equivalent.
- source_word: הַקֳּדָשִׁים
  chosen: the holy things
  alternatives:
  - the consecrated things
  - the sacred gifts
  lexicon: HALOT
  rationale: The plural of קֹדֶשׁ here refers to items consecrated for sacred use.
    'Holy things' is a fairly literal rendering that remains readable; 'consecrated
    things' is possible but slightly more interpretive.
- source_word: בֶּאֱמוּנָה
  chosen: faithfully
  alternatives:
  - in faithfulness
  - honestly
  - reliably
  lexicon: HALOT
  rationale: אֱמוּנָה in administrative contexts often conveys faithfulness, reliability,
    or trustworthiness. The adverb 'faithfully' fits the English sentence and reflects
    the manner of handling these goods.
- source_word: וַעֲלֵיהֶם
  chosen: over them
  alternatives:
  - in charge of them
  - over these things
  lexicon: HALOT
  rationale: The preposition על with pronominal suffix indicates authority or supervision
    over the previously mentioned items/arrangements. 'Over them' is the most direct
    rendering.
- source_word: נָגִיד
  chosen: chief
  alternatives:
  - leader
  - overseer
  - ruler
  lexicon: HALOT
  rationale: נָגִיד denotes one placed in charge or appointed as leader. In this administrative
    temple context, 'chief' concisely communicates supervisory authority without implying
    royal rule.
- source_word: כונניהו
  chosen: Conaniah
  alternatives:
  - Conanyahu
  rationale: Personal names are transliterated by standard English convention. 'Conaniah'
    reflects common English Bible usage for this name.
- source_word: הַלֵּוִי
  chosen: the Levite
  alternatives:
  - a Levite
  lexicon: HALOT
  rationale: The article is present in Hebrew. 'The Levite' identifies Conaniah by
    his Levitical status, likely as a known official.
- source_word: אָחִיהוּ
  chosen: his brother
  alternatives:
  - his kinsman
  lexicon: HALOT
  rationale: אָח normally means a literal brother unless context suggests a broader
    kinship sense. Nothing here requires weakening it to 'kinsman.'
- source_word: מִשְׁנֶה
  chosen: second
  alternatives:
  - second in command
  - deputy
  lexicon: HALOT
  rationale: מִשְׁנֶה denotes a second-ranking official or deputy. 'Second' is concise
    and close to the Hebrew; the relationship of rank is clear in context.
