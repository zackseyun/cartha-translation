id: 2CH.31.11
reference: 2 Chronicles 31:11
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְחִזְקִיָּ֗הוּ לְ/הָכִ֧ין לְשָׁכ֛וֹת בְּ/בֵ֥ית יְהוָ֖ה וַ/יָּכִֽינוּ׃
translation:
  text: Then Hezekiah commanded them to prepare chambers in the house of Yahweh, and they prepared them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then Hezekiah said to prepare chambers in the house of the LORD.' The Hebrew verb is literally 'said,' but here it introduces a royal instruction.
    reason: lexical_alternative
  - marker: b
    text: Or 'rooms' or 'storerooms.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: commanded
  alternatives:
  - said
  - ordered
  lexicon: HALOT
  rationale: Although the verb is literally 'said,' the infinitive construction with לְהָכִין expresses the content as an instruction. 'Commanded' conveys the idiomatic force in clear English without overstating beyond the context.
- source_word: יְחִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Standard English transliteration of the personal name, following the translation policy to transliterate names.
- source_word: לְהָכִין
  chosen: to prepare
  alternatives:
  - to make ready
  - to establish
  lexicon: HALOT
  rationale: The Hiphil of כון here means to make ready or prepare. 'Prepare' fits the immediate context of readying storage spaces.
- source_word: לְשָׁכוֹת
  chosen: chambers
  alternatives:
  - rooms
  - storerooms
  lexicon: HALOT
  rationale: The noun refers to rooms/chambers in the temple complex. 'Chambers' is a natural rendering that preserves the architectural sense; the storage function is implied by context but not explicit in the noun itself.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: '''House of the LORD'' is the standard literal rendering of the temple designation and preserves the Hebrew expression. ''LORD'' follows the doctrinal default for YHWH.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיָּכִינוּ
  chosen: and they prepared them
  alternatives:
  - and they made them ready
  - and they established them
  lexicon: HALOT
  rationale: The plural verb has an implied plural object from 'chambers.' English naturally supplies 'them' to make the sentence complete.
