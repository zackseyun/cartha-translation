id: 2CH.31.9
reference: 2 Chronicles 31:9
source:
  edition: WLC
  text: וַ/יִּדְרֹ֣שׁ יְחִזְקִיָּ֗הוּ עַל הַ/כֹּֽהֲנִ֛ים וְ/הַ/לְוִיִּ֖ם עַל הָ/עֲרֵמֽוֹת־־׃
translation:
  text: And Hezekiah asked the priests and the Levites about the heaps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the piles.' The Hebrew refers to accumulated heaps, likely of the contributed
      produce and offerings mentioned in the surrounding verses.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּדְרֹשׁ
  chosen: asked
  alternatives:
  - inquired
  - questioned
  - consulted
  lexicon: HALOT
  rationale: The verb דרש with עַל here means to inquire or ask concerning something.
    'Asked' is natural modern English and fits the direct narrative context, while
    preserving the sense of inquiry.
- source_word: יְחִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Personal names are transliterated by standard English convention.
- source_word: עַל
  chosen: about
  alternatives:
  - concerning
  - regarding
  lexicon: HALOT
  rationale: The preposition עַל after דרש marks the subject matter of inquiry. 'About'
    is the most idiomatic modern rendering.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כהנים in cultic context.
- source_word: וְהַלְוִיִּם
  chosen: and the Levites
  lexicon: HALOT
  rationale: Standard rendering of לוים; the coordinated phrase indicates both priestly
    and Levitical groups were addressed.
- source_word: עַל
  chosen: about
  alternatives:
  - concerning
  - regarding
  lexicon: HALOT
  rationale: Second occurrence again introduces the matter in question.
- source_word: הָעֲרֵמוֹת
  chosen: the heaps
  alternatives:
  - the piles
  lexicon: HALOT
  rationale: ערמות refers to heaps or piles, here the accumulated heaps of contributions
    from the surrounding context. 'Heaps' is slightly more vivid and conventional
    in English Bible style without being archaic.
