  from: in heaps, heap upon heap
  to: heap upon heap
  rationale: The Hebrew uses a repeated noun, `עֲרֵמוֹת עֲרֵמוֹת` (heaps, heaps), for emphasis, indicating a great quantity. The current rendering, 'in heaps, heap upon heap,' is stylistically redundant, as both 'in heaps' and 'heap upon heap' convey the idea of multiplicity. A more concise and idiomatic English phrase like 'heap upon heap' or 'in many heaps' would capture the intensive force of the Hebrew without the awkwardness. For instance, the clause could read '...and they laid them heap upon heap.'
