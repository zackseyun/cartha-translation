id: 2CH.31.6
reference: 2 Chronicles 31:6
source:
  edition: WLC
  text: וּ/בְנֵ֧י יִשְׂרָאֵ֣ל וִֽ/יהוּדָ֗ה הַ/יּֽוֹשְׁבִים֮ בְּ/עָרֵ֣י יְהוּדָה֒ גַּם הֵ֗ם מַעְשַׂ֤ר בָּקָר֙ וָ/צֹ֔אן וּ/מַעְשַׂ֣ר קָֽדָשִׁ֔ים הַ/מְקֻדָּשִׁ֖ים לַ/יהוָ֣ה אֱלֹהֵי/הֶ֑ם הֵבִ֕יאוּ וַֽ/יִּתְּנ֖וּ עֲרֵמ֥וֹת עֲרֵמֽוֹת־׃ס
translation:
  text: And the people of Israel and Judah who lived in the cities of Judah also brought the tithe of cattle and sheep, and the tithe of the holy things consecrated to the LORD their God, and they laid them heap upon heap.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tithe of consecrated things' or 'the tithe of holy gifts.' The Hebrew likely refers to items dedicated to God as holy.
    reason: lexical_alternative
  - marker: b
    text: Or 'in heaps, heap upon heap'.
    reason: previous_rendering
lexical_decisions:
- source_word: וּבְנֵי יִשְׂרָאֵל וִיהוּדָה
  chosen: the people of Israel and Judah
  alternatives:
  - the sons of Israel and Judah
  - the Israelites and Judeans
  lexicon: HALOT
  rationale: בני literally means 'sons/children of,' but in this administrative-historical context it refers corporately to the members of the people. 'The people of Israel and Judah' is natural English and preserves the collective sense without implying only males.
- source_word: הַיֹּשְׁבִים בְּעָרֵי יְהוּדָה
  chosen: who lived in the cities of Judah
  alternatives:
  - dwelling in the cities of Judah
  - who were living in the towns of Judah
  lexicon: HALOT
  rationale: The participle of ישב denotes residing/dwelling. 'Lived' gives clear modern English; 'cities' follows עָרֵי straightforwardly, though 'towns' is possible.
- source_word: גַּם הֵם
  chosen: also
  alternatives:
  - they also
  - even they
  lexicon: HALOT
  rationale: The phrase emphasizes that these residents, too, participated. English can convey this naturally with 'also' without overloading the sentence.
- source_word: מַעְשַׂר
  chosen: tithe
  alternatives:
  - tenth
  lexicon: HALOT
  rationale: The standard cultic term for a tenth given to God is 'tithe.' 'Tenth' is more literal but less idiomatic in this context.
- source_word: בָּקָר וָצֹאן
  chosen: cattle and sheep
  alternatives:
  - herd and flock
  - cattle and flock
  lexicon: HALOT
  rationale: בקר refers to cattle; צאן can denote small livestock collectively, especially sheep and goats. 'Sheep' is a concise rendering, though 'flock' is broader. Here 'cattle and sheep' communicates the livestock categories clearly in natural English.
- source_word: וּמַעְשַׂר קָדָשִׁים
  chosen: and the tithe of the holy things
  alternatives:
  - and the tithe of holy gifts
  - and the tithe of consecrated things
  lexicon: HALOT
  rationale: קָדָשִׁים here refers to things set apart as holy, likely dedicated offerings/items. 'Holy things' is a transparent and sufficiently formal rendering that avoids over-specifying the exact category.
- source_word: הַמְקֻדָּשִׁים
  chosen: consecrated
  alternatives:
  - dedicated
  - made holy
  lexicon: HALOT
  rationale: The passive participle from קדש indicates items that have been set apart to God. 'Consecrated' preserves the cultic nuance better than the more general 'dedicated,' though both are possible.
- source_word: לַיהוָה אֱלֹהֵיהֶם
  chosen: to the LORD their God
  alternatives:
  - for the LORD their God
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The lamed preposition here is naturally expressed as 'to' with consecrated items directed to God.
- source_word: הֵבִיאוּ
  chosen: brought
  alternatives:
  - brought in
  - presented
  lexicon: HALOT
  rationale: The verb בוא in hiphil commonly means 'bring.' 'Brought' fits the narrative sequence simply and accurately.
- source_word: וַיִּתְּנוּ
  chosen: they laid them
  alternatives:
  - they placed them
  - they put them
  lexicon: HALOT
  rationale: נתן is broadly 'give/put/place.' In context, with the following noun 'heaps,' the sense is placing the brought items into piles. 'Laid them' reads smoothly in English and matches the physical action.
- source_word: עֲרֵמוֹת עֲרֵמוֹת
  chosen: in heaps, heap upon heap
  alternatives:
  - in heaps
  - heap after heap
  lexicon: HALOT
  rationale: The repeated noun is an idiomatic intensification indicating many heaps or heaps in succession. Rendering both occurrences preserves the Hebrew emphasis better than a single 'in heaps'.
