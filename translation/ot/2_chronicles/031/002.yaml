theological_decisions:
- issue: Gendered singular אִישׁ in an administrative/cultic context
  chosen_reading: each man according to his service
  alternative_readings:
  - each according to his service
  rationale: The Hebrew uses a masculine singular distributive expression. Per translation policy, gender-accurate language is preferred where it matches the source. Here the referents are priestly and Levitical personnel, historically male officeholders in this context, so 'each man' is appropriate.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering שְׁלָמִים
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  rationale: The translation avoids importing a more interpretive theological nuance where the Hebrew sacrificial category can be represented directly. 'Peace offerings' preserves lexical continuity with the sacrificial system.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Rendering מַחֲנוֹת יְהוָה literally
  chosen_reading: the camps of Yahweh
  alternative_readings:
  - the camp of the LORD
  - the courts of the LORD
  rationale: The phrase is unusual in temple context, but the translation preserves the source imagery rather than normalizing it to 'courts.' This maintains transparency and avoids over-interpretation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
