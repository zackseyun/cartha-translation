id: 2CH.31.2
reference: 2 Chronicles 31:2
source:
  edition: WLC
  text: וַ/יַּעֲמֵ֣ד יְחִזְקִיָּ֡הוּ אֶת מַחְלְק֣וֹת הַ/כֹּהֲנִ֣ים וְ֠/הַ/לְוִיִּם עַֽל מַחְלְקוֹתָ֞/ם אִ֣ישׁ כְּ/פִ֣י עֲבֹדָת֗/וֹ לַ/כֹּהֲנִים֙ וְ/לַ/לְוִיִּ֔ם לְ/עֹלָ֖ה וְ/לִ/שְׁלָמִ֑ים לְ/שָׁרֵת֙ וּ/לְ/הֹד֣וֹת וּ/לְ/הַלֵּ֔ל בְּ/שַׁעֲרֵ֖י מַחֲנ֥וֹת יְהוָֽה־־׀׃ס
translation:
  text: And Hezekiah appointed the divisions of the priests and the Levites according to their divisions, each man according to his service, both the priests and the Levites, for burnt offerings and peace offerings, to minister and to give thanks and to praise in the gates of the camp of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'courses' instead of 'divisions' for the organized priestly and Levitical groupings.
    reason: lexical_alternative
  - marker: b
    text: Or 'fellowship offerings' for 'peace offerings.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the camps of the LORD'; some understand this more interpretively as 'the courts of the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲמֵד
  chosen: appointed
  alternatives:
  - stationed
  - established
  - set in place
  lexicon: HALOT
  rationale: In this administrative cultic context, the verb refers to assigning or setting persons into ordered roles rather than merely causing them to stand physically. 'Appointed' communicates official arrangement clearly in modern English.
- source_word: מַחְלְקוֹת
  chosen: divisions
  alternatives:
  - courses
  - departments
  - assignments
  lexicon: HALOT
  rationale: The term denotes organized priestly/Levitical groupings. 'Divisions' is clear and fairly formal without the archaic feel of 'courses.' The repetition is preserved for transparency to the Hebrew structure.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering for the temple cultic office.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard translational rendering for the Levitical class; this is a tribal/cultic designation rather than a title needing translation.
- source_word: עַל מַחְלְקוֹתָם
  chosen: according to their divisions
  alternatives:
  - by their divisions
  - in their divisions
  lexicon: HALOT
  rationale: The preposition plus repeated noun indicates arrangement in conformity with the existing division structure. 'According to' best captures ordered correspondence.
- source_word: אִישׁ כְּפִי עֲבֹדָתוֹ
  chosen: each man according to his service
  alternatives:
  - each according to his service
  - each man according to his duty
  lexicon: HALOT
  rationale: The Hebrew is singular and masculine; per doctrine, gender-accurate language is retained. 'Service' fits cultic labor broadly, while 'duty' is possible but slightly narrower.
- source_word: עֲבֹדָה
  chosen: service
  alternatives:
  - duty
  - work
  - ministry
  lexicon: HALOT
  rationale: In temple context this refers to assigned cultic work. 'Service' is natural English and preserves the sacred-administrative sense without importing later ecclesiastical terminology.
- source_word: לַכֹּהֲנִים וְלַלְוִיִּם
  chosen: the priests and the Levites
  alternatives:
  - for the priests and the Levites
  lexicon: HALOT
  rationale: This phrase resumes/specifies the groups just mentioned. In English it works appositionally after the dash to clarify who is in view. The underlying lamed may be rendered more woodenly as 'for,' but the appositional sense is smoother and contextually apt.
- source_word: לְעֹלָה
  chosen: for burnt offerings
  alternatives:
  - for the burnt offering
  lexicon: HALOT
  rationale: Though singular in Hebrew, the term can function collectively for the category of burnt-offering service. Plural English sounds more natural in a summary of recurring duties.
- source_word: וְלִשְׁלָמִים
  chosen: and peace offerings
  alternatives:
  - and fellowship offerings
  lexicon: HALOT
  rationale: '''Peace offerings'' is the established and sufficiently transparent rendering of שְׁלָמִים. ''Fellowship offerings'' is interpretive and less directly tied to the Hebrew root and sacrificial category.'
- source_word: לְשָׁרֵת
  chosen: to minister
  alternatives:
  - to serve
  lexicon: HALOT
  rationale: In cultic context, 'minister' appropriately conveys sacred service, whereas 'serve' is broader and less specific.
- source_word: וּלְהוֹדוֹת
  chosen: and to give thanks
  alternatives:
  - and to confess
  - and to offer thanks
  lexicon: HALOT
  rationale: In praise/worship context, the Hiphil of ידה commonly means giving thanks rather than confession. The nearby verb 'to praise' confirms a liturgical thanksgiving sense.
- source_word: וּלְהַלֵּל
  chosen: and to praise
  alternatives:
  - and to sing praise
  lexicon: HALOT
  rationale: Straightforward rendering of הלל in worship context. 'Sing praise' may be implied but is not explicit in the Hebrew.
- source_word: בְּשַׁעֲרֵי
  chosen: at the gates of
  alternatives:
  - in the gates of
  - by the gates of
  lexicon: HALOT
  rationale: The preposition and noun together indicate location at the gate areas. 'At the gates of' is idiomatic and spatially clear.
- source_word: מַחֲנוֹת יְהוָה
  chosen: the camps of the LORD
  alternatives:
  - the camp of the LORD
  - the courts of the LORD
  lexicon: HALOT
  rationale: The Hebrew is plural, likely referring to the temple precincts conceived as encampments or sections associated with the divine dwelling. 'Camps' preserves the plural and avoids replacing the source image with the interpretive 'courts.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
