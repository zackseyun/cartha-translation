id: 2CH.31.13
reference: 2 Chronicles 31:13
source:
  edition: WLC
  text: וִֽ/יחִיאֵ֡ל וַ֠/עֲזַזְיָהוּ וְ/נַ֨חַת וַ/עֲשָׂהאֵ֜ל וִֽ/ירִימ֤וֹת וְ/יוֹזָבָד֙
    וֶ/אֱלִיאֵ֣ל וְ/יִסְמַכְיָ֔הוּ וּ/מַ֖חַת וּ/בְנָיָ֑הוּ פְּקִידִ֗ים מִ/יַּ֤ד כונניהו
    וְ/שִׁמְעִ֣י אָחִ֔י/ו בְּ/מִפְקַד֙ יְחִזְקִיָּ֣הוּ הַ/מֶּ֔לֶךְ וַ/עֲזַרְיָ֖הוּ
    נְגִ֥יד בֵּית הָ/אֱלֹהִֽים־׃
translation:
  text: Jehiel, Azaziah, Nahath, Asahel, Jerimoth, Jozabad, Eliel, Ismakiah, Mahath,
    and Benaiah were officers under the authority of Conaniah and Shimei his brother,
    by the appointment of King Hezekiah and Azariah, the chief officer of the house
    of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'under the hand of Conaniah and Shimei his brother.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by the command of' or 'under the oversight of' King Hezekiah and Azariah.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקִידִים
  chosen: officers
  alternatives:
  - overseers
  - officials
  - supervisors
  lexicon: HALOT
  rationale: The noun denotes appointed officials with administrative responsibility.
    'Officers' fits the temple-administrative context and reads naturally in modern
    English without overstating rank.
- source_word: מִיַּד
  chosen: under the authority of
  alternatives:
  - under the hand of
  - in the charge of
  lexicon: HALOT
  rationale: Literally 'from/by the hand of,' an idiom for agency, control, or supervision.
    'Under the authority of' communicates the functional sense in idiomatic English
    while preserving the chain of oversight.
- source_word: אָחִיו
  chosen: his brother
  lexicon: HALOT
  rationale: A straightforward familial designation referring to Shimei in relation
    to Conaniah; no reason to generalize or paraphrase.
- source_word: בְּמִפְקַד
  chosen: by the appointment of
  alternatives:
  - by the command of
  - by the oversight of
  - according to the charge of
  lexicon: HALOT
  rationale: The noun can denote appointment, oversight, or commission. In this context
    of named officials serving under higher administrators, 'by the appointment of'
    best captures formal authorization from the king and temple leader.
- source_word: נְגִיד
  chosen: chief officer
  alternatives:
  - ruler
  - leader
  - prince
  lexicon: HALOT
  rationale: The term often denotes a leader or chief official. In the administrative
    setting of temple management, 'chief officer' is clearer than the archaic or potentially
    misleading 'prince.'
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: The Hebrew is literally 'house of God.' This is a standard designation
    for the temple, and the more literal rendering preserves the source wording while
    remaining clear.
- source_word: Proper names (יְחִיאֵל, עֲזַזְיָהוּ, נַחַת, עֲשָׂהאֵל, יְרִימוֹת, יוֹזָבָד,
    אֱלִיאֵל, יִסְמַכְיָהוּ, מַחַת, בְּנָיָהוּ, כּוֹנַנְיָהוּ, שִׁמְעִי, יְחִזְקִיָּהוּ,
    עֲזַרְיָהוּ)
  chosen: Jehiel, Azaziah, Nahath, Asahel, Jerimoth, Jozabad, Eliel, Ismakiah, Mahath,
    Benaiah, Conaniah, Shimei, Hezekiah, Azariah
  alternatives:
  - Jehiel/Jehi'el; Conaniah/Konaniah; Ismakiah/Yismakyahu
  rationale: Following the translation philosophy, personal names are transliterated
    rather than translated. Standard English biblical forms are used where established.
