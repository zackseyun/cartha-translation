theological_decisions:
- issue: Nature of temple administrative titles
  chosen_reading: Render administrative terms in ordinary institutional English without
    importing sacerdotal hierarchy beyond the text.
  alternative_readings:
  - Use more elevated terms such as 'princes' or 'rulers'
  rationale: The verse is primarily administrative, listing officials and their chain
    of authority. The translation should not imply a stronger theological or monarchical
    office than the Hebrew requires.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English; do not import doctrinal claims the text does not make.'
