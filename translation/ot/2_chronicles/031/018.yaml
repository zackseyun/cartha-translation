theological_decisions:
- issue: Meaning of אֱמוּנָה in a cultic-administrative context
  chosen_reading: faithfulness/trustworthiness in handling holy matters
  alternative_readings:
  - faith in a more inward or devotional sense
  rationale: The context concerns priestly/Levitical administration and sanctity,
    so the term points to reliable fidelity rather than doctrinal belief. This avoids
    importing later theological categories into a Chronicler context.
  doctrine_reference: Translation philosophy §1, §3
