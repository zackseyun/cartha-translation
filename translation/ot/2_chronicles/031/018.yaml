id: 2CH.31.18
reference: 2 Chronicles 31:18
source:
  edition: WLC
  text: וּ/לְ/הִתְיַחֵ֗שׂ בְּ/כָל טַפָּ֧/ם נְשֵׁי/הֶ֛ם וּ/בְנֵי/הֶ֥ם וּ/בְנוֹתֵי/הֶ֖ם
    לְ/כָל קָהָ֑ל כִּ֥י בֶ/אֱמוּנָתָ֖/ם יִתְקַדְּשׁוּ קֹֽדֶשׁ־־־׃
translation:
  text: and for the enrollment of all their little ones, their wives, their sons,
    and their daughters, for all the assembly; for in their faithfulness they sanctified
    themselves as holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the genealogical registration of all their children.' The Hebrew
      verb refers to enrollment in family or genealogical records.
    reason: lexical_alternative
  - marker: b
    text: '''Faithfulness'' here likely means trustworthiness or fidelity in carrying
      out sacred duties, not primarily inward belief.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they consecrated themselves in holiness' or 'they kept themselves holy.'
      The Hebrew repeats the holiness idea with both verb and noun for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְהִתְיַחֵשׂ
  chosen: and for the enrollment
  alternatives:
  - and for the genealogical registration
  - and to enroll by genealogy
  lexicon: HALOT
  rationale: The hitpael of יחס in Chronicles commonly refers to being entered in
    genealogical/register lists. Here the infinitive with prefixed ל continues the
    administrative purpose from the prior verse. 'Enrollment' is natural English while
    preserving the record-keeping sense; 'genealogical registration' is more formal
    but heavier.
- source_word: בְּכָל טַפָּם
  chosen: of all their little ones
  alternatives:
  - of all their children
  - of all their dependents
  lexicon: HALOT
  rationale: טַף refers to small children/little ones, not the whole household in
    a vague sense. 'Little ones' preserves the lexical specificity better than the
    broader 'children'.
- source_word: נְשֵׁיהֶם
  chosen: their wives
  alternatives:
  - their women
  lexicon: HALOT
  rationale: In this household listing, 'wives' is the idiomatic and contextually
    precise rendering.
- source_word: וּבְנֵיהֶם וּבְנוֹתֵיהֶם
  chosen: their sons, and their daughters
  alternatives:
  - their children
  lexicon: HALOT
  rationale: The Hebrew explicitly distinguishes male and female offspring. Per gender-accurate
    philosophy, both are retained rather than collapsed into 'children'.
- source_word: לְכָל קָהָל
  chosen: for all the assembly
  alternatives:
  - for the whole assembly
  - throughout the whole congregation
  lexicon: HALOT
  rationale: קָהָל is best rendered 'assembly' here, referring to the gathered/community
    body associated with the priestly distribution records. 'For all the assembly'
    follows the preposition and keeps the administrative scope.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the inclusive registration/distribution. 'For'
    is concise and fits formal narrative explanation.
- source_word: בֶאֱמוּנָתָם
  chosen: in their faithfulness
  alternatives:
  - in their trustworthiness
  - faithfully
  lexicon: HALOT
  rationale: אֱמוּנָה here denotes reliability/fidelity in carrying out sacred duties,
    not primarily inward belief. 'In their faithfulness' preserves the noun form and
    moral quality.
- source_word: יִתְקַדְּשׁוּ קֹדֶשׁ
  chosen: they sanctified themselves as holy
  alternatives:
  - they consecrated themselves in holiness
  - they kept themselves holy
  lexicon: HALOT
  rationale: The hitpael of קדש conveys consecrating/sanctifying oneself. The following
    קֹדֶשׁ intensifies or specifies the holy state. 'Sanctified themselves as holy'
    is somewhat formal but preserves both verb and noun; smoother alternatives risk
    losing the doubled holiness language.
