id: 2CH.31.15
reference: 2 Chronicles 31:15
source:
  edition: WLC
  text: וְ/עַל יָד֡/וֹ עֵ֣דֶן וּ֠/מִנְיָמִן וְ/יֵשׁ֨וּעַ וּֽ/שְׁמַֽעְיָ֜הוּ אֲמַרְיָ֧הוּ
    וּ/שְׁכַנְיָ֛הוּ בְּ/עָרֵ֥י הַ/כֹּהֲנִ֖ים בֶּ/אֱמוּנָ֑ה לָ/תֵ֤ת לַ/אֲחֵי/הֶם֙
    בְּ/מַחְלְק֔וֹת כַּ/גָּד֖וֹל כַּ/קָּטָֽן־׃
translation:
  text: Under his authority were Eden, Miniamin, Jeshua, Shemaiah, Amariah, and Shecaniah,
    in the cities of the priests, faithfully to distribute to their brothers by divisions,
    to great and small alike.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'At his side' / 'in his charge'; the Hebrew idiom can express agency,
      supervision, or authority.
    reason: lexical_alternative
  - marker: b
    text: '''Their brothers'' refers to their fellow members of the priestly community.'
    reason: cultural_note
  - marker: c
    text: Or 'faithfully to distribute'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְעַל־יָדוֹ
  chosen: Under his authority
  alternatives:
  - At his side
  - Under his hand
  - In his charge
  lexicon: HALOT
  rationale: The idiom עַל־יָד can denote agency, supervision, or authority. In this
    administrative context, 'Under his authority' communicates that the named men
    served under the oversight of the previously mentioned official, without overly
    literal English awkwardness.
- source_word: עֵדֶן וּמִנְיָמִן וְיֵשׁוּעַ וּשְׁמַעְיָהוּ אֲמַרְיָהוּ וּשְׁכַנְיָהוּ
  chosen: Eden, Miniamin, Jeshua, Shemaiah, Amariah, and Shecaniah
  rationale: Personal names are transliterated rather than translated, per project
    philosophy. 'Miniamin' follows a standard English transliteration of מִנְיָמִן.
- source_word: בְּעָרֵי הַכֹּהֲנִים
  chosen: in the cities of the priests
  alternatives:
  - in the priests' cities
  lexicon: HALOT
  rationale: A straightforward genitive construction. 'Cities of the priests' is clear
    and preserves the formal relation of the Hebrew.
- source_word: בֶּאֱמוּנָה
  chosen: faithfully
  alternatives:
  - in faithfulness
  - reliably
  - trustworthily
  lexicon: HALOT
  rationale: Here אֱמוּנָה describes the trustworthy manner in which the task was
    carried out. 'Faithfully' is idiomatic in English and fits the administrative
    context.
- source_word: לָתֵת
  chosen: to distribute
  alternatives:
  - to give
  lexicon: HALOT
  rationale: Although the verb is simply 'to give,' the context is organized allocation
    of portions to priestly relatives. 'To distribute' makes the administrative sense
    explicit without departing from the source meaning.
- source_word: לַאֲחֵיהֶם
  chosen: to their brothers
  alternatives:
  - to their kinsmen
  - to their fellow priests/Levites
  lexicon: HALOT
  rationale: The Hebrew literally says 'their brothers.' In this context it refers
    to fellow members of the priestly community. Following the project's gender-accurate
    principle, 'brothers' is retained rather than neutralized.
- source_word: בְּמַחְלְקוֹת
  chosen: by divisions
  alternatives:
  - according to divisions
  - in divisions
  lexicon: HALOT
  rationale: מַחְלְקוֹת refers to ordered divisions or courses. 'By divisions' is
    concise and conveys distribution according to established groupings.
- source_word: כַּגָּדוֹל כַּקָּטָן
  chosen: to great and small alike
  alternatives:
  - as to the great, so to the small
  - to the older and the younger
  lexicon: HALOT
  rationale: The phrase is an idiom expressing impartial inclusion of all ranks or
    ages. 'To great and small alike' is natural English and preserves the sense of
    equal distribution.
