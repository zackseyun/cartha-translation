id: 2CH.31.14
reference: 2 Chronicles 31:14
source:
  edition: WLC
  text: וְ/קוֹרֵ֨א בֶן יִמְנָ֤ה הַ/לֵּוִי֙ הַ/שּׁוֹעֵ֣ר לַ/מִּזְרָ֔חָ/ה עַ֖ל נִדְב֣וֹת הָ/אֱלֹהִ֑ים לָ/תֵת֙ תְּרוּמַ֣ת יְהוָ֔ה וְ/קָדְשֵׁ֖י הַ/קֳּדָשִֽׁים־׃
translation:
  text: Kore son of Imnah, the Levite, the gatekeeper on the east, was in charge of the freewill offerings of God, to distribute the contribution of Yahweh and the most holy things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to give'; the Hebrew infinitive is literally 'to give,' here in the sense of distributing what had been dedicated.
    reason: lexical_alternative
  - marker: b
    text: Or 'the most holy offerings.' The Hebrew phrase means things that are especially holy, not necessarily the inner sanctuary ('the Holy of Holies').
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקוֹרֵא
  chosen: Kore
  alternatives:
  - And Kore
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention. The prefixed conjunction is not carried into English because English narrative style does not require 'and' before a resumptive subject here.
- source_word: בֶן יִמְנָה
  chosen: son of Imnah
  lexicon: HALOT
  rationale: Standard filial construction identifying lineage; retained formally.
- source_word: הַלֵּוִי
  chosen: the Levite
  alternatives:
  - a Levite
  lexicon: HALOT
  rationale: Definite article retained; identifies Kore's tribal status specifically.
- source_word: הַשּׁוֹעֵר
  chosen: the gatekeeper
  alternatives:
  - the doorkeeper
  lexicon: HALOT
  rationale: Common temple/entry official term; 'gatekeeper' is clear modern English and fits cultic context better than the more archaic 'doorkeeper'.
- source_word: לַמִּזְרָחָה
  chosen: on the east
  alternatives:
  - to the east
  - at the east gate
  lexicon: HALOT
  rationale: Indicates eastern side/location. 'On the east' is concise and natural with 'gatekeeper'; 'east gate' is interpretive since 'gate' is not explicit in this word.
- source_word: עַל
  chosen: was in charge of
  alternatives:
  - over
  - in charge of
  lexicon: HALOT
  rationale: With a personnel/administrative context, the preposition marks responsibility or oversight rather than mere spatial relation. English idiom requires an explicit verbal idea.
- source_word: נִדְבוֹת הָאֱלֹהִים
  chosen: the freewill offerings of God
  alternatives:
  - the voluntary offerings of God
  - the freewill offerings for God
  lexicon: HALOT
  rationale: נִדָבוֹת denotes voluntary/freewill offerings. The genitive with 'God' is preserved closely; in context these are offerings presented to God. 'Freewill offerings' is the established and accurate cultic term.
- source_word: לָתֵת
  chosen: to distribute
  alternatives:
  - to give
  lexicon: HALOT
  rationale: Although the infinitive is literally 'to give,' in this administrative context Kore oversees offerings for the purpose of giving them out to recipients. 'Distribute' makes the function explicit from context without undue paraphrase.
- source_word: תְּרוּמַת יְהוָה
  chosen: the contribution for the LORD
  alternatives:
  - the offering of the LORD
  - the contribution of the LORD
  - the heave offering of the LORD
  lexicon: HALOT
  rationale: תְּרוּמָה is a contribution/portion set apart. 'Contribution for the LORD' communicates that it is dedicated to him. 'Heave offering' is too traditional and opaque for modern readers; 'offering of the LORD' is ambiguous.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: וְקָדְשֵׁי הַקֳּדָשִׁים
  chosen: and the most holy things
  alternatives:
  - and the holy things of holy things
  - and the most holy offerings
  - and the holy of holies
  lexicon: HALOT
  rationale: The phrase refers to items/things that are most holy, not the inner sanctuary itself in this context. 'Most holy things' preserves the superlative sanctity while avoiding confusion with the location 'Holy of Holies'.
