id: 2CH.31.7
reference: 2 Chronicles 31:7
source:
  edition: WLC
  text: בַּ/חֹ֨דֶשׁ֙ הַ/שְּׁלִשִׁ֔י הֵחֵ֥לּוּ הָ/עֲרֵמ֖וֹת לְ/יִסּ֑וֹד וּ/בַ/חֹ֥דֶשׁ
    הַ/שְּׁבִיעִ֖י כִּלּֽוּ׃ס
translation:
  text: In the third month they began the heaps by laying the foundation, and in the
    seventh month they finished them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the piles.' The Hebrew noun refers to accumulated heaps of contributed
      produce.
    reason: lexical_alternative
  - marker: b
    text: Literally 'they began the heaps to found [them],' an idiom meaning they
      started the heaps by laying their base.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֹדֶשׁ הַשְּׁלִשִׁי
  chosen: In the third month
  alternatives:
  - In month three
  - In the third new moon/month
  lexicon: HALOT
  rationale: חֹדֶשׁ ordinarily denotes 'month' in chronological notices. The preposition
    ב plus article is naturally rendered 'in the.' 'Third month' is the plain temporal
    sense.
- source_word: הֵחֵלּוּ
  chosen: they began
  alternatives:
  - they started
  lexicon: HALOT
  rationale: Hiphil perfect 3cp of חלל/החל in this construction means 'to begin.'
    'Began' is the standard, natural English equivalent.
- source_word: הָעֲרֵמוֹת
  chosen: the heaps
  alternatives:
  - the piles
  lexicon: HALOT
  rationale: עֲרֵמוֹת refers to heaps or piles, here the accumulated contributions
    described in the context. 'Heaps' preserves the concrete image and matches common
    English Bible usage.
- source_word: לְיִסּוֹד
  chosen: by laying the foundation
  alternatives:
  - to found
  - to lay a foundation
  - from the foundation
  lexicon: HALOT
  rationale: 'The infinitive construct of יסד with ל marks the manner or initial stage:
    they began the heaps ''by laying a foundation,'' i.e., by starting the base layer
    of the heaps. This is more idiomatic in English than a bare ''to found.'''
- source_word: וּבַחֹדֶשׁ הַשְּׁבִיעִי
  chosen: and in the seventh month
  alternatives:
  - then in the seventh month
  lexicon: HALOT
  rationale: Straightforward temporal continuation with conjunction ו plus prepositional
    phrase.
- source_word: כִּלּוּ
  chosen: they finished them
  alternatives:
  - they completed them
  - they finished
  lexicon: HALOT
  rationale: Piel perfect 3cp of כלה means 'complete/finish.' English idiom benefits
    from supplying the object 'them,' referring back to the heaps, though Hebrew leaves
    it implicit.
