id: 2CH.31.3
reference: 2 Chronicles 31:3
source:
  edition: WLC
  text: וּ/מְנָת֩ הַ/מֶּ֨לֶךְ מִן רְכוּשׁ֜/וֹ לָ/עֹל֗וֹת לְ/עֹלוֹת֙ הַ/בֹּ֣קֶר וְ/הָ/עֶ֔רֶב
    וְ/הָ֣/עֹל֔וֹת לַ/שַּׁבָּת֖וֹת וְ/לֶ/חֳדָשִׁ֣ים וְ/לַ/מֹּעֲדִ֑ים כַּ/כָּת֖וּב
    בְּ/תוֹרַ֥ת יְהוָֽה־׃
translation:
  text: 'The king’s portion from his own possessions was for the burnt offerings:
    for the burnt offerings of the morning and the evening, and the burnt offerings
    for the Sabbaths, the new moons, and the appointed feasts, as it is written in
    the Law of the LORD.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king’s allotment' or 'the king’s share.'
    reason: lexical_alternative
  - marker: b
    text: '''New moons'' refers to the monthly new-moon observances in Israel’s worship
      calendar.'
    reason: cultural_note
  - marker: c
    text: Or 'appointed times' or 'appointed festivals.'
    reason: lexical_alternative
  - marker: d
    text: 'Hebrew: ''the Law of the LORD''; ''Torah of the LORD'' is a more literal
      alternative.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמְנָת הַמֶּלֶךְ
  chosen: The king’s portion
  alternatives:
  - the king’s allotment
  - the king’s share
  lexicon: HALOT
  rationale: מְנָה denotes an assigned portion or allotment. 'Portion' is natural
    English and preserves the sense of a designated share belonging to the king.
- source_word: מִן רְכוּשׁוֹ
  chosen: from his own possessions
  alternatives:
  - from his property
  - from his wealth
  lexicon: HALOT
  rationale: רְכוּשׁ refers broadly to goods, property, or possessions. 'From his
    own possessions' makes clear that the resources came from the king personally.
- source_word: לָעֹלוֹת
  chosen: for the burnt offerings
  alternatives:
  - for burnt offerings
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering. The article
    is represented naturally in English as 'the burnt offerings' in this summary statement.
- source_word: לְעֹלוֹת הַבֹּקֶר וְהָעֶרֶב
  chosen: for the burnt offerings of the morning and the evening
  alternatives:
  - for the morning and evening burnt offerings
  lexicon: HALOT
  rationale: The Hebrew construction explicitly repeats 'burnt offerings' with genitives
    'of the morning and the evening.' The chosen rendering stays close to the form
    while remaining readable.
- source_word: וְהָעֹלוֹת לַשַּׁבָּתוֹת וְלֶחֳדָשִׁים וְלַמֹּעֲדִים
  chosen: and the burnt offerings for the Sabbaths, the new moons, and the appointed
    feasts
  alternatives:
  - and the burnt offerings for the weekly Sabbaths, monthly observances, and festivals
  - and the burnt offerings for the Sabbaths, months, and festivals
  lexicon: HALOT
  rationale: שַׁבָּתוֹת are Sabbaths; חֳדָשִׁים in cultic context refers to new-moon
    observances rather than merely 'months'; מוֹעֲדִים are appointed times/festivals.
    'Appointed feasts' preserves the sacred-calendar sense.
- source_word: כַּכָּתוּב
  chosen: as it is written
  alternatives:
  - according to what is written
  lexicon: HALOT
  rationale: This formula introduces conformity to scriptural prescription. 'As it
    is written' is idiomatic and faithful.
- source_word: בְּתוֹרַת יְהוָה
  chosen: in the Law of the LORD
  alternatives:
  - in the instruction of the LORD
  - in the Torah of the LORD
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction broadly, but in this cultic-legal context
    it refers to the written Mosaic law. Per doctrine, יְהוָה is rendered 'the LORD.'
