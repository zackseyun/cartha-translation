id: 2CH.31.16
reference: 2 Chronicles 31:16
source:
  edition: WLC
  text: מִ/לְּ/בַ֞ד הִתְיַחְשָׂ֣/ם לִ/זְכָרִ֗ים מִ/בֶּ֨ן שָׁל֤וֹשׁ שָׁנִים֙ וּ/לְ/מַ֔עְלָ/ה
    לְ/כָל הַ/בָּ֥א לְ/בֵית יְהוָ֖ה לִ/דְבַר י֣וֹם בְּ/יוֹמ֑/וֹ לַ/עֲב֣וֹדָתָ֔/ם בְּ/מִשְׁמְרוֹתָ֖/ם
    כְּ/מַחְלְקוֹתֵי/הֶֽם־־־׃
translation:
  text: apart from those enrolled by genealogy among the males from three years old
    and upward—all who entered the house of the LORD, as the daily matter required
    for their service in their duties according to their divisions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those registered by genealogy among the males.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'for the matter of a day on its day,' that is, the requirement
      for each day.
    reason: lexical_alternative
  - marker: c
    text: Or 'in their watches' or 'by their duty-shifts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלְּבַד
  chosen: apart from
  alternatives:
  - besides
  - excluding
  lexicon: HALOT
  rationale: The phrase introduces an additional category distinct from the previously
    mentioned recipients. 'Apart from' preserves the separative sense without overcommitting
    to either simple addition ('besides') or strict exclusion.
- source_word: הִתְיַחְשָׂם
  chosen: those enrolled by genealogy
  alternatives:
  - those registered by genealogy
  - their genealogical enrollment
  lexicon: HALOT
  rationale: The hitpael of יחס refers to enrollment/registration by genealogical
    record. Rendering it verbally with an implied group ('those enrolled by genealogy')
    makes good English while preserving the administrative nuance.
- source_word: לִזְכָרִים
  chosen: among the males
  alternatives:
  - for the males
  - to the males
  lexicon: HALOT
  rationale: The phrase specifies the male members included in the genealogical registration.
    'Among the males' fits the syntax with the enrollment language and preserves the
    gender-specific reference required by the Hebrew.
- source_word: מִבֶּן שָׁלֹשׁ שָׁנִים וּלְמַעְלָה
  chosen: from three years old and upward
  alternatives:
  - from the age of three years and above
  - three years old and older
  lexicon: HALOT
  rationale: This is a standard age-threshold expression. 'From three years old and
    upward' is natural and close to the Hebrew form.
- source_word: לְכָל הַבָּא
  chosen: all who entered
  alternatives:
  - everyone who came
  - all who came in
  lexicon: HALOT
  rationale: The participle functions collectively. 'All who entered' gives a smooth
    English rendering while retaining the ongoing/general sense.
- source_word: לְבֵית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: '''House of the LORD'' is the established literal expression for בית
    יהוה, and ''the LORD'' follows the project''s required rendering of YHWH.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: לִדְבַר יוֹם בְּיוֹמוֹ
  chosen: as the daily matter required
  alternatives:
  - for the matter of each day on its day
  - day by day as required
  lexicon: HALOT
  rationale: The idiom denotes the requirement or allotment for each day. This rendering
    preserves the administrative/daily-duty sense in readable English.
- source_word: לַעֲבוֹדָתָם
  chosen: for their service
  alternatives:
  - for their work
  - for their ministry
  lexicon: HALOT
  rationale: In temple context, עֲבוֹדָה refers to service/duty. 'Service' is broad
    enough to cover cultic work without importing later ecclesiastical terminology.
- source_word: בְּמִשְׁמְרוֹתָם
  chosen: in their duties
  alternatives:
  - in their watches
  - in their charges
  lexicon: HALOT
  rationale: מִשְׁמָרוֹת can denote assigned watches or duty-shifts. 'Duties' communicates
    the functional sense clearly in modern English.
- source_word: כְּמַחְלְקוֹתֵיהֶם
  chosen: according to their divisions
  alternatives:
  - by their divisions
  - according to their courses
  lexicon: HALOT
  rationale: The term refers to the organized priestly/Levitical divisions. 'According
    to their divisions' is clear and sufficiently formal without archaic 'courses.'
