theological_decisions:
- issue: Gender-specific language for temple personnel
  chosen_reading: among the males
  alternative_readings:
  - among the people
  - among those
  rationale: The Hebrew explicitly uses a masculine plural noun and refers to male
    members in the genealogical register. Per the translation philosophy, gender-accurate
    rendering is preferred over neutralization.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD,' following the
    stated doctrine guidance.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
