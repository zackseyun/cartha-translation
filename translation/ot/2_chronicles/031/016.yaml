- issue: Gender-specific language for temple personnel
  chosen_reading: among the males
  alternative_readings:
  - among the people
  - among those
  rationale: The Hebrew explicitly uses a masculine plural noun and refers to male members in the genealogical register. Per the translation philosophy, gender-accurate rendering is preferred over neutralization.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
