id: 2CH.31.19
reference: 2 Chronicles 31:19
source:
  edition: WLC
  text: וְ/לִ/בְנֵי֩ אַהֲרֹ֨ן הַ/כֹּהֲנִ֜ים בִּ/שְׂדֵ֨י מִגְרַ֤שׁ עָרֵי/הֶם֙ בְּ/כָל
    עִ֣יר וָ/עִ֔יר אֲנָשִׁ֕ים אֲשֶׁ֥ר נִקְּב֖וּ בְּ/שֵׁמ֑וֹת לָ/תֵ֣ת מָנ֗וֹת לְ/כָל
    זָכָר֙ בַּ/כֹּ֣הֲנִ֔ים וּ/לְ/כָל הִתְיַחֵ֖שׂ בַּ/לְוִיִּֽם־־־׃
translation:
  text: And for the sons of Aaron, the priests, in the pasture lands of their cities,
    in every single city, there were men designated by name to give portions to every
    male among the priests and to everyone enrolled by genealogy among the Levites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of Aaron the priests.' The Hebrew literally says 'sons of
      Aaron,' a genealogical expression that can include later descendants.
    reason: lexical_alternative
  - marker: b
    text: Or 'common lands' or 'open lands' of their cities. The term refers to the
      land surrounding the cities, often used as pasture.
    reason: cultural_note
  - marker: c
    text: Hebrew 'every city and city,' an idiom meaning 'each and every city.'
    reason: lexical_alternative
  - marker: d
    text: Or 'listed by name' or 'appointed by name.' The Hebrew indicates men specifically
      identified in an official manner.
    reason: lexical_alternative
  - marker: e
    text: That is, those entered in genealogical records among the Levites.
    reason: cultural_note
lexical_decisions:
- source_word: וְלִבְנֵי אַהֲרֹן הַכֹּהֲנִים
  chosen: And for the sons of Aaron, the priests
  alternatives:
  - And for the descendants of Aaron the priests
  - And for the Aaronic priests
  lexicon: HALOT
  rationale: בני literally means 'sons,' but in genealogical/tribal contexts can denote
    descendants. 'Sons of Aaron' preserves the Hebrew form while appositionally clarifying
    with 'the priests.'
- source_word: בִּשְׂדֵי מִגְרַשׁ עָרֵיהֶם
  chosen: in the pasture lands of their cities
  alternatives:
  - in the fields of the common lands of their cities
  - in the open lands around their cities
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land/common pasture surrounding Levitical
    cities. 'Pasture lands' is natural English and fits the land-use sense better
    than a wooden 'suburbs' or overly vague 'fields.'
- source_word: בְּכָל עִיר וָעִיר
  chosen: in every single city
  alternatives:
  - in every city
  - in each and every city
  lexicon: HALOT
  rationale: The distributive repetition 'city and city' emphasizes comprehensiveness.
    'Every single city' captures that force in readable English.
- source_word: אֲנָשִׁים אֲשֶׁר נִקְּבוּ בְּשֵׁמוֹת
  chosen: there were men designated by name
  alternatives:
  - men who were specified by name
  - men who were appointed by name
  - men who were listed by name
  lexicon: HALOT
  rationale: נִקְּבוּ בְּשֵׁמוֹת conveys being identified/registered specifically
    by name. 'Designated by name' preserves the formal administrative sense without
    overcommitting to either appointment or mere listing.
- source_word: לָתֵת מָנוֹת
  chosen: to give portions
  alternatives:
  - to distribute shares
  - to give allotted portions
  lexicon: HALOT
  rationale: מָנוֹת commonly denotes portions or shares distributed from provisions.
    'Give portions' is concise and fits the provisioning context of the chapter.
- source_word: לְכָל זָכָר בַּכֹּהֲנִים
  chosen: to every male among the priests
  alternatives:
  - to every male of the priests
  - to every man among the priests
  lexicon: HALOT
  rationale: זָכָר is specifically 'male,' not the more general 'man.' 'Among the
    priests' expresses the partitive sense naturally in English and preserves the
    gender-specific wording of the Hebrew.
- source_word: וּלְכָל הִתְיַחֵשׂ בַּלְוִיִּם
  chosen: and to everyone enrolled by genealogy among the Levites
  alternatives:
  - and to all who were registered by genealogy among the Levites
  - and to everyone reckoned by genealogy among the Levites
  lexicon: HALOT
  rationale: The hitpael of יחס refers to being enrolled/registered in genealogical
    records. 'Enrolled by genealogy' is clear modern English and preserves the administrative-genealogical
    nuance.
