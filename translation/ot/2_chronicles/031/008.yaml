id: 2CH.31.8
reference: 2 Chronicles 31:8
source:
  edition: WLC
  text: וַ/יָּבֹ֨אוּ֙ יְחִזְקִיָּ֣הוּ וְ/הַ/שָּׂרִ֔ים וַ/יִּרְא֖וּ אֶת הָ/עֲרֵמ֑וֹת וַֽ/יְבָרֲכוּ֙ אֶת יְהוָ֔ה וְ/אֵ֖ת עַמּ֥/וֹ יִשְׂרָאֵֽל־־׃פ
translation:
  text: When Hezekiah and the officials came and saw the heaps, they blessed Yahweh and his people Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the piles.' The Hebrew noun refers to accumulated heaps, here likely of contributed produce or offerings.
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'his people, Israel,' with 'his' taken to refer to Hezekiah rather than to the LORD.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - entered
  - arrived
  lexicon: HALOT
  rationale: The waw-consecutive verb from בוא is naturally rendered as a simple past narrative verb, 'came.' 'Arrived' is possible but less idiomatic in this sequence.
- source_word: יְחִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: וְהַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the rulers
  lexicon: HALOT
  rationale: שָׂרִים denotes leaders or officials. 'Officials' is clear modern English and fits the administrative context better than the more archaic 'princes.'
- source_word: וַיִּרְאוּ
  chosen: saw
  alternatives:
  - looked at
  - observed
  lexicon: HALOT
  rationale: ראה in this context is straightforward visual perception; 'saw' is the most direct rendering.
- source_word: הָעֲרֵמוֹת
  chosen: the heaps
  alternatives:
  - the piles
  lexicon: HALOT
  rationale: The noun refers to heaps or piles, here of contributed produce. 'Heaps' preserves the concrete image and matches the immediate context of accumulated offerings.
- source_word: וַיְבָרֲכוּ
  chosen: blessed
  alternatives:
  - praised
  lexicon: HALOT
  rationale: ברך with God as object commonly means 'blessed' in the sense of speaking well of or praising. Retaining 'blessed' preserves the lexical link while remaining idiomatic in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַמּוֹ יִשְׂרָאֵל
  chosen: his people Israel
  alternatives:
  - his people, Israel
  - Israel his people
  lexicon: HALOT
  rationale: The suffix on 'people' most naturally refers back to the LORD, yielding 'his people Israel.' This preserves the covenantal relationship expressed in the Hebrew construct.
