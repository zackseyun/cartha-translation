id: 2CH.23.7
reference: 2 Chronicles 23:7
source:
  edition: WLC
  text: וְ/הִקִּיפוּ֩ הַ/לְוִיִּ֨ם אֶת הַ/מֶּ֜לֶךְ סָבִ֗יב אִ֚ישׁ וְ/כֵלָ֣י/ו בְּ/יָד֔/וֹ
    וְ/הַ/בָּ֥א אֶל הַ/בַּ֖יִת יוּמָ֑ת וִֽ/הְי֥וּ אֶת הַ/מֶּ֖לֶךְ בְּ/בֹא֥/וֹ וּ/בְ/צֵאתֽ/וֹ־־־׃
translation:
  text: The Levites shall surround the king on every side, each man with his weapons
    in his hand; and whoever enters the house shall be put to death. Stay with the
    king when he comes in and when he goes out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple'; Hebrew 'the house,' a common designation for the temple
      in Chronicles.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקִּיפוּ
  chosen: shall surround
  alternatives:
  - must surround
  - are to surround
  lexicon: HALOT
  rationale: Hiphil of נקף/קוף in this context gives an injunctive sense within Jehoiada's
    instructions. 'Shall surround' preserves the directive force in natural English
    without over-paraphrasing.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Straightforward ethnic/cultic designation for the Levitical guards.
- source_word: סָבִיב
  chosen: on every side
  alternatives:
  - all around
  - around
  lexicon: HALOT
  rationale: Adverbial noun intensifying the encircling action. 'On every side' is
    idiomatic and preserves the sense of full surrounding.
- source_word: אִישׁ וְכֵלָיו בְּיָדוֹ
  chosen: each man with his weapons in his hand
  alternatives:
  - each with his weapons in his hand
  - every man with his weapon in his hand
  lexicon: HALOT
  rationale: אִישׁ is distributive ('each man'). כְּלִי here refers to implements/weapons,
    not generic vessels, because the context is armed protection. The plural 'weapons'
    reflects the collective/instrumental sense of כֵלָיו.
- source_word: וְהַבָּא אֶל הַבַּיִת
  chosen: whoever enters the house
  alternatives:
  - the one who comes into the house
  - anyone entering the house
  lexicon: HALOT
  rationale: The participle with article functions generically. 'Whoever enters' captures
    the legal/general force better than a wooden participial rendering.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In Chronicles this often refers to the
    temple precincts, but the main text keeps the literal term to avoid importing
    more specificity than the Hebrew states; the contextual sense can be noted in
    a footnote.
- source_word: יוּמָת
  chosen: shall be put to death
  alternatives:
  - shall die
  - must be killed
  lexicon: HALOT
  rationale: Hophal gives a passive/causative passive sense. 'Shall be put to death'
    best reflects the formal execution sense rather than simple death.
- source_word: וִהְיוּ אֶת הַמֶּלֶךְ
  chosen: Stay with the king
  alternatives:
  - Be with the king
  - Remain with the king
  lexicon: HALOT
  rationale: Imperative/plural of היה plus אֶת expresses attendant presence. 'Stay
    with' is natural English for protective accompaniment in this military setting.
- source_word: בְּבֹאוֹ וּבְצֵאתוֹ
  chosen: when he comes in and when he goes out
  alternatives:
  - in his coming in and in his going out
  - at his entrance and at his exit
  lexicon: HALOT
  rationale: This idiom refers to the king's movements/activities. The chosen rendering
    is clear modern English while preserving the paired Hebrew expression.
