id: 2CH.23.10
reference: 2 Chronicles 23:10
source:
  edition: WLC
  text: וַ/יַּעֲמֵ֨ד אֶת כָּל הָ/עָ֜ם וְ/אִ֣ישׁ שִׁלְח֣/וֹ בְ/יָד֗/וֹ מִ/כֶּ֨תֶף הַ/בַּ֤יִת
    הַ/יְמָנִית֙ עַד כֶּ֤תֶף הַ/בַּ֨יִת֙ הַ/שְּׂמָאלִ֔ית לַ/מִּזְבֵּ֖חַ וְ/לַ/בָּ֑יִת
    עַל הַ/מֶּ֖לֶךְ סָבִֽיב־־׀־־׃
translation:
  text: And he stationed all the people, each man with his weapon in his hand, from
    the south side of the house to the north side of the house, by the altar and by
    the house, around the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'from the right side of the house to the left side of the house';
      in this setting these correspond to the south and north sides.
    reason: lexical_alternative
  - marker: b
    text: Or 'each man with his spear in his hand'; the Hebrew term can refer more
      specifically to a weapon such as a spear or missile weapon.
    reason: lexical_alternative
  - marker: c
    text: '''The house'' here refers to the temple complex.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעֲמֵד
  chosen: he stationed
  alternatives:
  - he made stand
  - he positioned
  lexicon: HALOT
  rationale: 'The Hiphil of עמד here is causative: Jehoiada caused the people to take
    their positions. ''Stationed'' fits the military/guard context better than the
    more wooden ''made stand'' while remaining close to the Hebrew.'
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the troops
  - all the assembly
  lexicon: HALOT
  rationale: עָם normally means 'people.' In context these are the gathered personnel
    arranged for protection, but the Hebrew does not narrow the term to soldiers alone,
    so 'all the people' is retained.
- source_word: וְאִישׁ
  chosen: each man
  alternatives:
  - each one
  - every man
  lexicon: HALOT
  rationale: 'The distributive sense is clear: individuals throughout the group. Per
    the gender-accurate policy, the masculine singular is preserved as ''each man''
    rather than neutralizing to ''each one.'''
- source_word: שִׁלְחוֹ
  chosen: his weapon
  alternatives:
  - his missile weapon
  - his spear
  - his dart
  lexicon: HALOT
  rationale: The noun can denote a weapon or missile, but in this guard-setting the
    broader 'weapon' best captures the sense without over-specifying a particular
    implement not demanded by the text.
- source_word: בְיָדוֹ
  chosen: in his hand
  alternatives:
  - at hand
  - in hand
  lexicon: HALOT
  rationale: A straightforward idiomatic rendering of the Hebrew phrase, preserving
    the image of readiness.
- source_word: מִכֶּתֶף ... עַד כֶּתֶף
  chosen: from the ... side ... to the ... side
  alternatives:
  - from the shoulder ... to the shoulder
  - from the flank ... to the flank
  lexicon: HALOT
  rationale: כֶּתֶף literally means 'shoulder,' but in architectural/topographical
    usage it refers to a side or flank. 'Side' is the natural English equivalent here.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  - the palace
  lexicon: HALOT
  rationale: In Chronicles this commonly refers to the temple complex. However, because
    the Hebrew says 'house' and the verse also distinguishes 'the altar and the house,'
    retaining 'house' preserves the source wording and spatial relation. The context
    makes clear this is the temple area, not a royal palace.
- source_word: הַיְמָנִית
  chosen: south
  alternatives:
  - right side
  lexicon: HALOT
  rationale: Hebrew orientation commonly uses 'right' for south when facing east.
    In an architectural description, 'south side' communicates the intended compass
    direction more clearly than the literal 'right side.'
- source_word: הַשְּׂמָאלִית
  chosen: north
  alternatives:
  - left side
  lexicon: HALOT
  rationale: Corresponding to the previous term, 'left' here denotes the north side.
    Using compass directions makes the spatial arrangement intelligible in modern
    English.
- source_word: לַמִּזְבֵּחַ
  chosen: by the altar
  alternatives:
  - at the altar
  - toward the altar
  lexicon: HALOT
  rationale: The preposition marks location in the deployment line. 'By the altar'
    fits the sense of stationed positions adjacent to it.
- source_word: וְלַבָּיִת
  chosen: and by the house
  alternatives:
  - and by the temple
  - and by the building
  lexicon: HALOT
  rationale: Parallel to 'by the altar,' this likely marks the line extending along
    the temple structure. 'House' is kept for consistency with the repeated Hebrew
    term.
- source_word: עַל הַמֶּלֶךְ סָבִיב
  chosen: around the king
  alternatives:
  - about the king
  - surrounding the king
  - on account of the king all around
  lexicon: HALOT
  rationale: In this context עַל has the sense of position with protective focus directed
    toward the king. 'Around the king' gives the practical meaning of encirclement
    without awkwardness.
