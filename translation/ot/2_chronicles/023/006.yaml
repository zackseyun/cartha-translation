id: 2CH.23.6
reference: 2 Chronicles 23:6
source:
  edition: WLC
  text: וְ/אַל יָב֣וֹא בֵית יְהוָ֗ה כִּ֤י אִם הַ/כֹּֽהֲנִים֙ וְ/הַ/מְשָׁרְתִ֣ים לַ/לְוִיִּ֔ם
    הֵ֥מָּה יָבֹ֖אוּ כִּי קֹ֣דֶשׁ הֵ֑מָּה וְ/כָל הָ/עָ֔ם יִשְׁמְר֖וּ מִשְׁמֶ֥רֶת יְהוָֽה־־־־־׃
translation:
  text: And let no one enter the house of the LORD except the priests and the ministering
    Levites; they may enter, because they are holy. And let all the people keep the
    charge of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of the LORD.' Literally, 'the house of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: '''Keep the charge of the LORD'' can also be rendered ''keep watch for the
      LORD'' or ''observe the LORD’s duty/order.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַל יָב֣וֹא
  chosen: And let no one enter
  alternatives:
  - And do not let anyone come in
  - And no one shall enter
  lexicon: HALOT
  rationale: אַל with the jussive of בוא expresses prohibition. English idiom is best
    captured with 'let no one enter,' preserving the directive force without awkward
    literalism.
- source_word: בֵית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: בֵית יְהוָה is literally 'house of YHWH.' 'House of the LORD' preserves
    the Hebrew expression while remaining natural English. 'Temple' is possible contextually,
    but the more literal phrase better reflects the source.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD.'
- source_word: כִּי אִם
  chosen: except
  alternatives:
  - but only
  - unless it is
  lexicon: HALOT
  rationale: The combination introduces an exception to the prohibition. 'Except'
    is the clearest concise English rendering.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כהנים in cultic context.
- source_word: וְהַמְשָׁרְתִים לַלְוִיִּם
  chosen: and the ministering Levites
  alternatives:
  - and the Levites who minister
  - and the serving Levites
  lexicon: HALOT
  rationale: The participle משרתים modifies Levites and denotes those engaged in liturgical
    service. 'Ministering Levites' is concise and preserves the cultic sense better
    than the more generic 'serving Levites.'
- source_word: הֵמָּה יָבֹאוּ
  chosen: they may enter
  alternatives:
  - they shall enter
  - they are to enter
  lexicon: HALOT
  rationale: After the exception clause, this states the permitted entrants. 'May
    enter' conveys authorization in context better than a simple future.
- source_word: כִּי קֹדֶשׁ הֵמָּה
  chosen: because they are holy
  alternatives:
  - for they are holy
  - because they are consecrated
  lexicon: HALOT
  rationale: קדש here describes cultic holiness/consecration qualifying them for entry.
    'Holy' is the default and most transparent rendering; 'consecrated' is interpretive
    and narrower.
- source_word: וְכָל הָעָם
  chosen: And let all the people
  alternatives:
  - And all the people
  lexicon: HALOT
  rationale: The phrase contrasts the authorized clergy with the rest of the assembly.
    'All the people' preserves the collective sense of העם.
- source_word: יִשְׁמְרוּ מִשְׁמֶרֶת
  chosen: keep the charge
  alternatives:
  - keep watch
  - observe the duty
  - guard the requirement
  lexicon: HALOT
  rationale: The cognate construction שמר משמרת often means to keep a prescribed duty,
    charge, or watch. Here the sense is broader than merely standing guard; it is
    to observe the assigned sacred duty/order. 'Keep the charge' preserves the formal
    cultic nuance.
- source_word: מִשְׁמֶרֶת יְהוָה
  chosen: the charge of the LORD
  alternatives:
  - the watch of the LORD
  - the duty of the LORD
  lexicon: HALOT
  rationale: This genitive likely denotes the duty/charge belonging to or appointed
    by the LORD. 'Charge of the LORD' is both literal and idiomatic in biblical English,
    while 'watch' could sound too narrowly military.
