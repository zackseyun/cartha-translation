theological_decisions:
- issue: Cultic holiness of priests and Levites
  chosen_reading: Rendered קדש as 'holy' in a ritual/consecrational sense without
    importing broader moral perfection.
  alternative_readings:
  - consecrated
  - set apart
  rationale: The verse grounds access to the sanctuary in sacred status. 'Holy' preserves
    the biblical category while the rationale clarifies that the context is cultic
    qualification, not a claim of sinlessness.
  doctrine_reference: Translation philosophy §1, §6
- issue: Divine name rendering
  chosen_reading: Rendered יְהוָה as 'the LORD.'
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the stated default for the Tetragrammaton and maintains
    consistency with project doctrine.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
