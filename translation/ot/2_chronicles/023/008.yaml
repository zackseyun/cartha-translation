id: 2CH.23.8
reference: 2 Chronicles 23:8
source:
  edition: WLC
  text: וַ/יַּעֲשׂ֨וּ הַ/לְוִיִּ֜ם וְ/כָל יְהוּדָ֗ה כְּ/כֹ֣ל אֲשֶׁר צִוָּה֮ יְהוֹיָדָ֣ע
    הַ/כֹּהֵן֒ וַ/יִּקְחוּ֙ אִ֣ישׁ אֶת אֲנָשָׁ֔י/ו בָּאֵ֣י הַ/שַּׁבָּ֔ת עִ֖ם יוֹצְאֵ֣י
    הַ/שַּׁבָּ֑ת כִּ֣י לֹ֥א פָטַ֛ר יְהוֹיָדָ֥ע הַ/כֹּהֵ֖ן אֶת הַֽ/מַּחְלְקֽוֹת־־־־׃
translation:
  text: So the Levites and all Judah did according to all that Jehoiada the priest
    had commanded, and each man took his men, those coming in on the Sabbath together
    with those going out on the Sabbath, for Jehoiada the priest had not dismissed
    the divisions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the courses' or 'the shifts' for 'the divisions,' referring to the scheduled
      priestly and Levitical service groups.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: HALOT
  rationale: Common verb עשה here introduces compliance with Jehoiada’s command. 'Did'
    is the most natural and sufficiently formal rendering in the idiom 'did according
    to all that... commanded.'
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering for the tribal/cultic group; definite article preserved.
- source_word: וְכָל יְהוּדָה
  chosen: and all Judah
  alternatives:
  - and all the people of Judah
  lexicon: HALOT
  rationale: Retains the geographic-collective expression of the Hebrew. 'Judah' here
    stands metonymically for the Judean populace, but the simpler form preserves the
    source wording.
- source_word: כְּכֹל אֲשֶׁר צִוָּה
  chosen: according to all that ... had commanded
  alternatives:
  - just as ... commanded
  lexicon: HALOT
  rationale: Captures the full scope of obedience indicated by כְּכֹל אֲשֶׁר. Pluperfect
    English ('had commanded') fits the sequence.
- source_word: יְהוֹיָדָע הַכֹּהֵן
  chosen: Jehoiada the priest
  lexicon: HALOT
  rationale: Personal name transliterated; title translated per project philosophy.
- source_word: וַיִּקְחוּ אִישׁ אֶת אֲנָשָׁיו
  chosen: and each man took his men
  alternatives:
  - and each took his men
  - and each man took his troops
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each man.' אֲנָשָׁיו literally 'his men'
    likely refers to the personnel under each leader. 'Troops' is interpretive; 'his
    men' stays closer to the Hebrew while fitting the military/cultic guard context.
- source_word: בָּאֵי הַשַּׁבָּת
  chosen: those coming in on the Sabbath
  alternatives:
  - those entering on the Sabbath
  lexicon: HALOT
  rationale: Participial phrase refers to the incoming weekly shift. 'Coming in' is
    idiomatic and preserves the movement implied by בוא.
- source_word: עִם יוֹצְאֵי הַשַּׁבָּת
  chosen: together with those going out on the Sabbath
  alternatives:
  - with those leaving on the Sabbath
  lexicon: HALOT
  rationale: Pairs the incoming and outgoing divisions. 'Going out' mirrors the Hebrew
    participle and keeps the shift-change imagery.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanation for why both incoming and outgoing groups
    were present.
- source_word: לֹא פָטַר
  chosen: had not dismissed
  alternatives:
  - had not released
  - had not exempted
  lexicon: HALOT
  rationale: פטר in this context means to let go or release from duty. 'Dismissed'
    best fits the context of personnel not being sent away at the end of their normal
    shift.
- source_word: הַמַּחְלְקוֹת
  chosen: the divisions
  alternatives:
  - the courses
  - the shifts
  lexicon: HALOT
  rationale: Refers to organized priestly/Levitical service groups. 'Divisions' is
    a standard and sufficiently transparent rendering; 'courses' is traditional but
    less accessible, while 'shifts' is clearer but slightly more interpretive.
