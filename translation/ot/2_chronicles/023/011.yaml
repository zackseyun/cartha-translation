id: 2CH.23.11
reference: 2 Chronicles 23:11
source:
  edition: WLC
  text: וַ/יּוֹצִ֣יאוּ אֶת בֶּן הַ/מֶּ֗לֶךְ וַ/יִּתְּנ֤וּ עָלָי/ו֙ אֶת הַ/נֵּ֨זֶר֙
    וְ/אֶת הָ֣/עֵד֔וּת וַ/יַּמְלִ֖יכוּ אֹת֑/וֹ וַ/יִּמְשָׁחֻ֨/הוּ֙ יְהוֹיָדָ֣ע וּ/בָנָ֔י/ו
    וַ/יֹּאמְר֖וּ יְחִ֥י הַ/מֶּֽלֶךְ־־־־׃ס
translation:
  text: Then they brought out the king’s son, put the crown and the testimony on him,
    made him king, and anointed him. Jehoiada and his sons said, “Long live the king!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the law' or 'the covenant document' for 'the testimony.' The Hebrew
      term likely refers to the written covenantal witness associated with the king’s
      rule.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִיאוּ
  chosen: they brought out
  alternatives:
  - they led out
  - they brought forth
  lexicon: HALOT
  rationale: The hiphil of יצא means to cause to go out or bring out. 'Brought out'
    is natural modern English and fits the ceremonial presentation of the royal heir.
- source_word: בֶּן־הַמֶּלֶךְ
  chosen: the king’s son
  alternatives:
  - the son of the king
  lexicon: HALOT
  rationale: Construct phrase rendered idiomatically in English. Retains the dynastic
    identification central to the scene.
- source_word: הַנֵּזֶר
  chosen: the crown
  alternatives:
  - the diadem
  - the consecration crown
  lexicon: HALOT
  rationale: נזר can denote a consecrated sign or royal diadem; in this coronation
    context 'crown' is the clearest English rendering. 'Diadem' is possible but less
    accessible.
- source_word: הָעֵדוּת
  chosen: the testimony
  alternatives:
  - the covenant document
  - the law
  - the decree
  lexicon: HALOT
  rationale: The noun commonly means 'testimony' or 'witness.' In royal enthronement
    context it likely refers to the written covenantal testimony/law placed upon or
    given to the king. The formal rendering 'testimony' preserves the Hebrew term
    and its covenantal resonance without over-specifying.
- source_word: וַיַּמְלִיכוּ אֹתוֹ
  chosen: made him king
  alternatives:
  - proclaimed him king
  - crowned him king
  lexicon: HALOT
  rationale: The hiphil of מלך means to cause to reign or make king. 'Made him king'
    is direct and avoids collapsing this action into the separate placing of the crown.
- source_word: וַיִּמְשָׁחֻהוּ
  chosen: anointed him
  lexicon: HALOT
  rationale: Standard rendering of משׁח in royal installation contexts. Preserves
    the theological and ceremonial significance of anointing.
- source_word: יְהוֹיָדָע וּבָנָיו
  chosen: Jehoiada and his sons
  alternatives:
  - Jehoiada with his sons
  lexicon: HALOT
  rationale: Straightforward coordination. The plural subject naturally continues
    into the following verb of speaking/shouting.
- source_word: יְחִי הַמֶּלֶךְ
  chosen: Long live the king!
  alternatives:
  - May the king live!
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the jussive acclamation. It preserves
    the force of public royal proclamation.
