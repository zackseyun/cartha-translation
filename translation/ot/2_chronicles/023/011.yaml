theological_decisions:
- issue: Meaning of הָעֵדוּת in the coronation rite
  chosen_reading: Rendered as 'the testimony' in the main text, understood as the
    covenantal testimony/law associated with kingship.
  alternative_readings:
  - the law
  - the covenant document
  - the decree
  rationale: The Hebrew term is broader than a simple legal code and carries covenantal
    overtones. Keeping 'testimony' preserves the lexical link while allowing readers
    to see the likely allusion to the written obligations of the king without forcing
    a narrower interpretation.
  doctrine_reference: Translation philosophy §§1, 3, 5
