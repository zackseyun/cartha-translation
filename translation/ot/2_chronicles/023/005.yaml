id: 2CH.23.5
reference: 2 Chronicles 23:5
source:
  edition: WLC
  text: וְ/הַ/שְּׁלִשִׁית֙ בְּ/בֵ֣ית הַ/מֶּ֔לֶךְ וְ/הַ/שְּׁלִשִׁ֖ית בְּ/שַׁ֣עַר הַ/יְס֑וֹד וְ/כָל הָ/עָ֔ם בְּ/חַצְר֖וֹת בֵּ֥ית יְהוָֽה־׃
translation:
  text: one third shall be at the king’s house, one third at the Foundation Gate, and all the people in the courts of the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “at the gate of the foundation.” The Hebrew may preserve a specific gate name, here rendered “Foundation Gate.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשְּׁלִשִׁית
  chosen: one third
  alternatives:
  - the third part
  - a third
  lexicon: HALOT
  rationale: 'The feminine ordinal with article is used substantivally here in a distributional military/organizational sense: one third of the group. ''One third'' is idiomatic modern English and preserves the numerical division better than the more archaic ''the third part.'''
- source_word: בְּבֵית הַמֶּלֶךְ
  chosen: at the king’s house
  alternatives:
  - in the king’s house
  - at the royal palace
  lexicon: HALOT
  rationale: בֵּית literally means 'house,' and with 'the king' refers to the royal residence/palace complex. 'At the king’s house' fits the positional assignment context. 'Royal palace' is interpretive; 'house' keeps closer to the Hebrew while remaining clear.
- source_word: בְּשַׁעַר הַיְסוֹד
  chosen: at the Foundation Gate
  alternatives:
  - at the gate of the foundation
  - at the יסוד gate
  lexicon: HALOT
  rationale: שַׁעַר is 'gate.' יְסוֹד commonly means 'foundation' or 'base.' As a gate name, capitalizing 'Foundation Gate' treats it as a proper designation while translating the underlying meaning. The exact referent is uncertain, but a translated gate name is preferable to leaving the Hebrew opaque.
- source_word: וְכָל הָעָם
  chosen: and all the people
  alternatives:
  - and all the populace
  - and all the assembly
  lexicon: HALOT
  rationale: עָם is the common term for 'people.' 'All the people' is the most natural and least interpretive rendering in this narrative setting.
- source_word: בְּחַצְרוֹת
  chosen: in the courts
  alternatives:
  - in the courtyards
  - in the court areas
  lexicon: HALOT
  rationale: The plural of חָצֵר refers to enclosed court spaces. 'Courts' is standard temple-context English and reads naturally with 'house of the LORD.'
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the house of Yahweh
  - the temple of the LORD
  lexicon: HALOT
  rationale: בֵּית יְהוָה is literally 'house of YHWH.' Following the doctrine guideline, יְהוָה is rendered 'the LORD.' 'House' is retained rather than 'temple' to stay close to the Hebrew, though the referent is the temple complex.
