theological_decisions:
- issue: Rendering of Baal cult terminology
  chosen_reading: Retain 'Baal,' 'house,' 'altars,' and 'images' in straightforward
    historical terms without polemical expansion.
  alternative_readings:
  - Translate בֵּית as 'temple' and צְלָמָיו as 'idols'
  rationale: The verse narrates the destruction of Baal worship objects and personnel.
    The translation should reflect the text's historical and cultic details without
    adding interpretive rhetoric beyond what the Hebrew states.
  doctrine_reference: Translation philosophy §§1, 5, 6
