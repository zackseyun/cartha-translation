id: 2CH.23.17
reference: 2 Chronicles 23:17
source:
  edition: WLC
  text: וַ/יָּבֹ֨אוּ כָל הָ/עָ֤ם בֵּית הַ/בַּ֨עַל֙ וַֽ/יִּתְּצֻ֔/הוּ וְ/אֶת מִזְבְּחֹתָ֥י/ו
    וְ/אֶת צְלָמָ֖י/ו שִׁבֵּ֑רוּ וְ/אֵ֗ת מַתָּן֙ כֹּהֵ֣ן הַ/בַּ֔עַל הָרְג֖וּ לִ/פְנֵ֥י
    הַֽ/מִּזְבְּחֽוֹת־־־־׃
translation:
  text: Then all the people went to the house of Baal and tore it down, and they smashed
    his altars and his images, and they killed Mattan the priest of Baal before the
    altars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of Baal.' Hebrew literally 'the house of Baal.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his idols' or 'his statues' for 'his images.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: went
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: The verb בוא in narrative commonly means 'go/come/enter' depending on
    viewpoint. English narrative idiom here favors 'went' with the destination phrase
    'to the house of Baal.'
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - all the people there
  - the whole people
  lexicon: HALOT
  rationale: A straightforward rendering preserving the collective sense of the Hebrew
    phrase without over-specifying who is included.
- source_word: בֵּית הַבַּעַל
  chosen: the house of Baal
  alternatives:
  - the temple of Baal
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' While it refers to a cultic shrine and
    'temple' is possible, 'house' stays closer to the Hebrew and remains clear in
    context.
- source_word: וַיִּתְּצֻהוּ
  chosen: tore it down
  alternatives:
  - broke it down
  - demolished it
  lexicon: HALOT
  rationale: נתץ denotes pulling down or demolishing structures. 'Tore it down' is
    vivid, natural English and fits a building better than simply 'broke.'
- source_word: מִזְבְּחֹתָיו
  chosen: his altars
  alternatives:
  - its altars
  - the altars of Baal
  lexicon: HALOT
  rationale: The 3ms suffix refers back to Baal/the Baal-house complex. 'His altars'
    reflects the Hebrew suffix most directly, with the possessive naturally referring
    to Baal.
- source_word: צְלָמָיו
  chosen: his images
  alternatives:
  - his idols
  - his carved images
  - his statues
  lexicon: HALOT
  rationale: צֶלֶם broadly denotes an image or statue. 'Images' is the most lexically
    direct and avoids importing a more interpretive term like 'idols,' though the
    idolatrous context is obvious.
- source_word: שִׁבֵּרוּ
  chosen: smashed
  alternatives:
  - broke
  - shattered
  lexicon: HALOT
  rationale: שבר here describes forceful destruction of cult objects. 'Smashed' conveys
    the violent action in idiomatic modern English.
- source_word: מַתָּן
  chosen: Mattan
  rationale: Proper name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: כֹּהֵן הַבַּעַל
  chosen: the priest of Baal
  alternatives:
  - Baal's priest
  lexicon: HALOT
  rationale: A direct rendering of the construct phrase, preserving both office and
    deity association.
- source_word: הָרְגוּ
  chosen: they killed
  alternatives:
  - they slew
  - they put to death
  lexicon: HALOT
  rationale: הרג is the ordinary verb for killing. 'Killed' is plain modern English
    and avoids archaic diction.
- source_word: לִפְנֵי הַמִּזְבְּחוֹת
  chosen: before the altars
  alternatives:
  - in front of the altars
  - before his altars
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before/in front of.' 'Before the altars' is concise
    and natural. The Hebrew here lacks an explicit suffix, so the more neutral 'the
    altars' is preferable in the main text.
