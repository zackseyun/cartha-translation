id: 2CH.23.12
reference: 2 Chronicles 23:12
source:
  edition: WLC
  text: וַ/תִּשְׁמַ֣ע עֲתַלְיָ֗הוּ אֶת ק֤וֹל הָ/עָם֙ הָֽ/רָצִ֔ים וְ/הַֽ/מְהַֽלְלִ֖ים אֶת הַ/מֶּ֑לֶךְ וַ/תָּב֥וֹא אֶל הָ/עָ֖ם בֵּ֥ית יְהוָֽה־־־׃
translation:
  text: When Athaliah heard the sound of the people running and praising the king, she came to the people at the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sound' or 'voice' of the people.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew participle can mean 'running'; some take it more specifically of royal runners or guards.
    reason: lexical_alternative
  - marker: c
    text: Or 'the temple of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹל
  chosen: noise
  alternatives:
  - sound
  - voice
  lexicon: HALOT
  rationale: קוֹל broadly denotes sound/noise/voice. In this context Athaliah hears the public commotion of celebration rather than a single articulated speech, so 'noise' best captures the collective audible uproar.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the crowd
  lexicon: HALOT
  rationale: עָם here refers to the gathered populace. 'The people' is the most direct and contextually natural rendering.
- source_word: הָרָצִים
  chosen: running
  alternatives:
  - rushing
  - couriers/guards running
  lexicon: HALOT
  rationale: The participle from רוץ normally means 'running.' Although in some contexts the term can refer to royal runners/guards, here it is most naturally read as describing the people's excited movement in the celebration. The syntax links it with 'the people' and with the parallel participle 'praising.'
- source_word: וְהַמְהַלְלִים
  chosen: and praising
  alternatives:
  - and shouting praise to
  - and celebrating
  lexicon: HALOT
  rationale: הלל in the piel commonly means 'praise.' Because the direct object is 'the king,' the phrase denotes acclaim directed toward the newly presented king. 'Praising' preserves the lexical sense without overinterpreting the exact form of acclamation.
- source_word: אֶת הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Direct and unambiguous reference to the king being acclaimed; no expansion is warranted.
- source_word: וַתָּבֹא אֶל הָעָם
  chosen: she came to the people
  alternatives:
  - she went to the people
  - she came into the crowd
  lexicon: HALOT
  rationale: בוא with אֶל indicates movement toward the people. 'Came to the people' is idiomatic and preserves the directional sense.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: בֵּית יְהוָה is the standard expression for the temple sanctuary complex. 'House of the LORD' preserves the Hebrew idiom, and 'the LORD' follows the project's required rendering of YHWH.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
