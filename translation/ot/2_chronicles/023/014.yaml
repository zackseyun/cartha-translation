id: 2CH.23.14
reference: 2 Chronicles 23:14
source:
  edition: WLC
  text: וַ/יּוֹצֵא֩ יְהוֹיָדָ֨ע הַ/כֹּהֵ֜ן אֶת שָׂרֵ֥י הַ/מֵּא֣וֹת פְּקוּדֵ֣י הַ/חַ֗יִל וַ/יֹּ֤אמֶר אֲלֵ/הֶם֙ הֽוֹצִיא֨וּ/הָ֙ אֶל מִ/בֵּ֣ית הַ/שְּׂדֵר֔וֹת וְ/הַ/בָּ֥א אַחֲרֶ֖י/הָ יוּמַ֣ת בֶּ/חָ֑רֶב כִּ֚י אָמַ֣ר הַ/כֹּהֵ֔ן לֹ֥א תְמִית֖וּ/הָ בֵּ֥ית יְהוָֽה־׀־׃
translation:
  text: Then Jehoiada the priest brought out the commanders of hundreds who were appointed over the army, and said to them, “Bring her out between the ranks, and whoever follows after her, let him be put to death with the sword.” For the priest had said, “Do not put her to death in the house of Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the outside of the rows”; the Hebrew phrase is difficult. It likely refers to taking Athaliah out through or between arranged ranks.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצֵא
  chosen: brought out
  alternatives:
  - led out
  lexicon: HALOT
  rationale: Hiphil of יצא is causative, 'cause to go out/bring out.' 'Brought out' is natural English and preserves the action of summoning or presenting the officers.
- source_word: שָׂרֵי הַמֵּאוֹת
  chosen: commanders of hundreds
  alternatives:
  - captains of hundreds
  - centurions
  lexicon: HALOT
  rationale: A formal military designation. 'Commanders of hundreds' stays close to the Hebrew structure without importing specifically Roman connotations that 'centurions' would carry.
- source_word: פְּקוּדֵי הַחַיִל
  chosen: who were appointed over the army
  alternatives:
  - who were mustered for the army
  - officers of the force
  lexicon: HALOT
  rationale: The passive/participle idea of פקד here identifies these men as those assigned or appointed in relation to the military force. 'Appointed over the army' best captures their official role in context.
- source_word: הוֹצִיאוּהָ
  chosen: Bring her out
  alternatives:
  - Take her out
  - Lead her out
  lexicon: HALOT
  rationale: Imperative plural with 3fs suffix referring to Athaliah. 'Bring her out' is direct and matches the causative sense.
- source_word: אֶל מִבֵּית הַשְּׂדֵרוֹת
  chosen: between the ranks
  alternatives:
  - to the outside of the rows
  - to the area between the lines
  lexicon: HALOT
  rationale: The phrase is difficult, but in this military-temple setting השדרות most plausibly refers to arranged rows or ranks. 'Between the ranks' gives a clear English sense while reflecting the likely meaning. The more literal but obscure 'house of the rows' would mislead modern readers.
- source_word: וְהַבָּא אַחֲרֶיהָ
  chosen: whoever follows after her
  alternatives:
  - anyone coming after her
  - whoever enters after her
  lexicon: HALOT
  rationale: The participle הבא with אחריה denotes one coming/following behind her. 'Whoever follows after her' fits the warning against supporters or escorts.
- source_word: יוּמַת בֶּחָרֶב
  chosen: let him be put to death with the sword
  alternatives:
  - shall be killed by the sword
  - must die by the sword
  lexicon: HALOT
  rationale: Passive/jussive-like force in context of command. 'Let him be put to death with the sword' preserves the formal judicial tone.
- source_word: כִּי אָמַר הַכֹּהֵן
  chosen: For the priest had said
  alternatives:
  - because the priest said
  - for the priest said
  lexicon: HALOT
  rationale: 'The clause explains the preceding command. English past perfect smooths the sequence: the order is grounded in a prior instruction.'
- source_word: לֹא תְמִיתוּהָ
  chosen: Do not put her to death
  alternatives:
  - Do not kill her
  lexicon: HALOT
  rationale: Hiphil of מות is causative, 'put to death.' This preserves the formal register of an execution order.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: בית יהוה is the standard expression 'house of the LORD.' This also follows the doctrinal default rendering of יהוה as 'the LORD.'
