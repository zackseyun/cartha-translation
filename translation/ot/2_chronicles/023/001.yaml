id: 2CH.23.1
reference: 2 Chronicles 23:1
source:
  edition: WLC
  text: וּ/בַ/שָּׁנָ֨ה הַ/שְּׁבִעִ֜ית הִתְחַזַּ֣ק יְהוֹיָדָ֗ע וַ/יִּקַּ֣ח אֶת שָׂרֵ֣י
    הַ/מֵּא֡וֹת לַ/עֲזַרְיָ֣הוּ בֶן יְרֹחָ֡ם וּ/לְ/יִשְׁמָעֵ֣אל בֶּן יְ֠הוֹחָנָן וְ/לַֽ/עֲזַרְיָ֨הוּ
    בֶן עוֹבֵ֜ד וְ/אֶת מַעֲשֵׂיָ֧הוּ בֶן עֲדָיָ֛הוּ וְ/אֶת אֱלִישָׁפָ֥ט בֶּן זִכְרִ֖י
    עִמּ֥/וֹ בַ/בְּרִֽית־־־־־־־־׃
translation:
  text: 'In the seventh year Jehoiada strengthened himself and took into covenant
    with him the commanders of hundreds: Azariah son of Jeroham, Ishmael son of Jehohanan,
    Azariah son of Obed, Maaseiah son of Adaiah, and Elishaphat son of Zichri.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'made a covenant with them' / 'took them into a covenant.' The Hebrew
      phrase literally combines 'took' with 'with him' and 'in/into the covenant,'
      expressing Jehoiada's enlistment of these officers in a covenantal pact.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַשָּׁנָה הַשְּׁבִעִית
  chosen: In the seventh year
  alternatives:
  - And in the seventh year
  lexicon: HALOT
  rationale: Temporal prepositional phrase marking the time of the action. English
    omits the conjunction for smoother style without loss of meaning; 'In the seventh
    year' captures the sense naturally.
- source_word: הִתְחַזַּק
  chosen: strengthened himself
  alternatives:
  - grew strong
  - took courage
  - acted decisively
  lexicon: HALOT
  rationale: Hitpael of חזק commonly has a reflexive nuance, 'strengthen oneself'
    or 'take courage.' Here it introduces Jehoiada's decisive move, so 'strengthened
    himself' preserves the reflexive force more transparently than the more interpretive
    'acted decisively.'
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - took aside
  - gathered
  lexicon: HALOT
  rationale: Basic verb 'take.' In context it means he enlisted or brought certain
    officers into his plan, but 'took' is retained because the following covenant
    phrase explains the action.
- source_word: שָׂרֵי הַמֵּאוֹת
  chosen: the commanders of hundreds
  alternatives:
  - the captains of hundreds
  - the centurions
  - the officers over hundreds
  lexicon: HALOT
  rationale: A military title for leaders over units of one hundred. 'Commanders of
    hundreds' is transparent and avoids importing specifically Roman associations
    that 'centurions' would suggest.
- source_word: עִמּוֹ בַבְּרִית
  chosen: into covenant with him
  alternatives:
  - with him in the covenant
  - in covenant with him
  - into a covenant with him
  lexicon: HALOT
  rationale: The phrase indicates that Jehoiada brought these men into a covenantal
    agreement with himself. 'Into covenant with him' expresses both the motion implied
    by 'took' and the covenantal nature of the act. The article on בְּרִית may be
    generic or situational; English idiom does not require 'the covenant' here.
- source_word: לַעֲזַרְיָהוּ ... וּלְיִשְׁמָעֵאל ... וְלַעֲזַרְיָהוּ ... וְאֶת מַעֲשֵׂיָהוּ
    ... וְאֶת אֱלִישָׁפָט
  chosen: Azariah ... Ishmael ... Azariah ... Maaseiah ... and Elishaphat
  lexicon: HALOT
  rationale: Personal names are transliterated rather than translated, following project
    policy. The repeated Azariah is preserved as in the Hebrew.
- source_word: בֶן
  chosen: son of
  alternatives: []
  lexicon: HALOT
  rationale: Standard patronymic rendering in genealogical identification.
