id: 2CH.23.15
reference: 2 Chronicles 23:15
source:
  edition: WLC
  text: וַ/יָּשִׂ֤ימוּ לָ/הּ֙ יָדַ֔יִם וַ/תָּב֛וֹא אֶל מְב֥וֹא שַֽׁעַר הַ/סּוּסִ֖ים
    בֵּ֣ית הַ/מֶּ֑לֶךְ וַ/יְמִית֖וּ/הָ שָֽׁם־־׃פ
translation:
  text: So they seized her, and she went to the entrance of the Horse Gate at the
    king’s house, and they put her to death there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'they laid hands on her.'
    reason: lexical_alternative
  - marker: b
    text: Or 'at the royal palace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂימוּ לָהּ יָדַיִם
  chosen: they seized her
  alternatives:
  - they laid hands on her
  - they made room for her
  lexicon: HALOT
  rationale: The idiom literally reads 'they put hands for/on her.' In this context
    of arrest and execution, it most naturally means taking hold of or seizing her.
    'Laid hands on her' is more formal and could be preserved as an alternative, while
    'made room for her' reflects a possible contextual interpretation found in some
    translations but is less likely here given the immediate execution.
- source_word: מְבוֹא
  chosen: entrance
  alternatives:
  - entryway
  - approach
  lexicon: HALOT
  rationale: The noun denotes an entrance or place of entry. 'Entrance' is clear modern
    English and fits the construct phrase with the gate.
- source_word: שַׁעַר הַסּוּסִים
  chosen: the Horse Gate
  alternatives:
  - the gate of the horses
  lexicon: HALOT
  rationale: A named gate is best rendered as a proper designation in English. Capitalizing
    'Horse Gate' reflects that likely place-name function.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: at the king’s house
  alternatives:
  - of the king’s house
  - at the royal palace
  lexicon: HALOT
  rationale: The phrase identifies the location associated with the gate entrance.
    'At the king’s house' stays close to the Hebrew while remaining natural. 'Royal
    palace' is interpretive but plausible; the more literal wording is preferred for
    auditability.
- source_word: וַיְמִיתוּהָ
  chosen: they put her to death
  alternatives:
  - they killed her
  - they executed her
  lexicon: HALOT
  rationale: The Hiphil of מות means to cause to die/put to death. 'Put her to death'
    is both accurate and suitably formal for an official killing. 'Executed her' may
    over-specify legal nuance, though the context implies sanctioned action.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' is the direct and natural rendering.
