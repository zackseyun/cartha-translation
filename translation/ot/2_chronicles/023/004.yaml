id: 2CH.23.4
reference: 2 Chronicles 23:4
source:
  edition: WLC
  text: זֶ֥ה הַ/דָּבָ֖ר אֲשֶׁ֣ר תַּעֲשׂ֑וּ הַ/שְּׁלִשִׁ֨ית מִ/כֶּ֜ם בָּאֵ֣י הַ/שַּׁבָּ֗ת
    לַ/כֹּֽהֲנִים֙ וְ/לַ/לְוִיִּ֔ם לְ/שֹֽׁעֲרֵ֖י הַ/סִּפִּֽים׃
translation:
  text: 'This is what you shall do: one third of you who come in on the Sabbath, of
    the priests and of the Levites, shall be gatekeepers at the thresholds.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'shall keep watch at the thresholds.' The Hebrew expression combines
      'gatekeepers/doorkeepers' with 'thresholds,' emphasizing guarding the entrances.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה הַדָּבָר אֲשֶׁר תַּעֲשׂוּ
  chosen: This is what you shall do
  alternatives:
  - This is the thing that you shall do
  - This is what you are to do
  lexicon: HALOT
  rationale: Idiomatic introductory formula. 'What' communicates the sense naturally
    in modern English while preserving the directive force of the Hebrew.
- source_word: הַשְּׁלִשִׁית
  chosen: one third
  alternatives:
  - the third part
  - a third
  lexicon: HALOT
  rationale: The noun denotes a third portion. 'One third' is clear modern English
    and fits the distributive sense of assigning a fraction of the group.
- source_word: מִכֶּם
  chosen: of you
  alternatives:
  - from among you
  lexicon: HALOT
  rationale: 'Marks the partitive relationship: one third is taken from the addressed
    group.'
- source_word: בָּאֵי הַשַּׁבָּת
  chosen: who come in on the Sabbath
  alternatives:
  - who enter on the Sabbath
  - who are coming in on the Sabbath
  lexicon: HALOT
  rationale: The participial construction refers to those arriving for Sabbath duty.
    'Come in' is natural English for entering a post or shift.
- source_word: לַכֹּהֲנִים וְלַלְוִיִּם
  chosen: of the priests and of the Levites
  alternatives:
  - namely, the priests and the Levites
  - from the priests and the Levites
  lexicon: HALOT
  rationale: This phrase identifies the subgroup within the incoming personnel. 'Of
    the priests and of the Levites' preserves the appositional/partitive sense without
    over-interpreting the syntax.
- source_word: לְשֹׁעֲרֵי הַסִּפִּים
  chosen: shall be gatekeepers at the thresholds
  alternatives:
  - shall be gatekeepers of the thresholds
  - shall keep watch at the thresholds
  - shall be doorkeepers at the vestibules
  lexicon: HALOT
  rationale: שֹׁעֲרֵי denotes gatekeepers/doorkeepers; הַסִּפִּים refers to thresholds/door-sills.
    'Gatekeepers at the thresholds' is both intelligible and concrete, preserving
    the temple-entry setting.
