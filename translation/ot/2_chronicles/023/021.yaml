id: 2CH.23.21
reference: 2 Chronicles 23:21
source:
  edition: WLC
  text: וַ/יִּשְׂמְח֥וּ כָל עַם הָ/אָ֖רֶץ וְ/הָ/עִ֣יר שָׁקָ֑טָה וְ/אֶת עֲתַלְיָ֖הוּ
    הֵמִ֥יתוּ בֶ/חָֽרֶב־־־׃ס
translation:
  text: And all the people of the land rejoiced, and the city was quiet; for they
    had put Athaliah to death with the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and they killed Athaliah with the sword.' The Hebrew conjunction can
      be read as simple coordination; the main text renders it as explanatory in context,
      since the city's quietness follows her death.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂמְחוּ
  chosen: rejoiced
  alternatives:
  - were glad
  lexicon: HALOT
  rationale: From שׂמח, denoting joy or gladness. 'Rejoiced' fits the public, celebratory
    context and reads naturally in modern English.
- source_word: כָל עַם הָאָרֶץ
  chosen: all the people of the land
  alternatives:
  - all the people of the הארץ
  - all the people of the country
  lexicon: HALOT
  rationale: כָל + עַם + הָאָרֶץ is a common expression meaning the populace of the
    land. 'People of the land' preserves the Hebrew idiom better than the more interpretive
    'country,' while remaining understandable.
- source_word: וְהָעִיר
  chosen: and the city
  lexicon: HALOT
  rationale: Straightforward rendering of the noun with conjunction; likely Jerusalem
    in context, but the text itself says simply 'the city,' so the translation preserves
    that.
- source_word: שָׁקָטָה
  chosen: was quiet
  alternatives:
  - was at peace
  - was calm
  - was undisturbed
  lexicon: HALOT
  rationale: The verb conveys quietness, rest, or calm after turmoil. 'Was quiet'
    is the most direct and least interpretively loaded rendering in this narrative
    setting.
- source_word: וְאֶת עֲתַלְיָהוּ הֵמִיתוּ
  chosen: for they had put Athaliah to death
  alternatives:
  - and they killed Athaliah
  - and Athaliah they put to death
  lexicon: HALOT
  rationale: הֵמִיתוּ (Hiphil of מות) means 'caused to die,' idiomatically 'put to
    death' or 'killed.' 'Put to death' appropriately reflects an execution in context.
    The conjunction waw here is rendered 'for' in English to express the likely explanatory
    relationship to the city's quietness, rather than a mere sequence.
- source_word: בֶּחָרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: Standard instrumental use of ב + חֶרֶב. 'With the sword' is idiomatic
    English and preserves the concrete means of execution.
