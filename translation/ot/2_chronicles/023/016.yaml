id: 2CH.23.16
reference: 2 Chronicles 23:16
source:
  edition: WLC
  text: וַ/יִּכְרֹ֤ת יְהוֹיָדָע֙ בְּרִ֔ית בֵּינ֕/וֹ וּ/בֵ֥ין כָּל הָ/עָ֖ם וּ/בֵ֣ין הַ/מֶּ֑לֶךְ לִ/הְי֥וֹת לְ/עָ֖ם לַ/יהוָֽה־׃
translation:
  text: Then Jehoiada made a covenant between himself, all the people, and the king, that they should be the LORD's people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'cut a covenant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to be the LORD's people.'
    reason: lexical_alternative
  - marker: c
    text: Or 'that they should be a people for the LORD'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּכְרֹת
  chosen: made
  alternatives:
  - cut
  - made a covenant
  lexicon: HALOT
  rationale: The idiom כרת ברית literally means 'cut a covenant,' but in natural English the established equivalent is 'made a covenant.' 'Then' reflects the narrative waw-consecutive.
- source_word: בְּרִית
  chosen: covenant
  alternatives:
  - treaty
  - agreement
  lexicon: HALOT
  rationale: בְּרִית is best rendered 'covenant' here because the context is a solemn, religiously charged commitment involving the LORD, not merely a political agreement.
- source_word: בֵּינוֹ
  chosen: between himself
  alternatives:
  - between him
  lexicon: HALOT
  rationale: The pronominal form refers back to Jehoiada. 'Himself' is idiomatic in English after 'between' and clarifies the reflexive relation in the covenant formula.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the people of the land
  - the whole people
  lexicon: HALOT
  rationale: The Hebrew here simply says 'all the people.' No expansion beyond the source text is warranted.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: A straightforward rendering of the definite noun; the king is a distinct party in the covenant alongside Jehoiada and the people.
- source_word: לִהְיוֹת
  chosen: that they should be
  alternatives:
  - to be
  lexicon: HALOT
  rationale: The infinitive expresses the covenant's purpose/result. 'That they should be' makes the covenantal aim explicit in idiomatic English.
- source_word: לְעָם
  chosen: a people
  alternatives:
  - the people
  lexicon: HALOT
  rationale: 'The anarthrous noun is qualitative/covenantal: they are to belong to the LORD as his people. ''A people'' preserves this covenant formula.'
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - to the LORD
  - belonging to the LORD
  lexicon: HALOT
  rationale: Following the project's default, יהוה is rendered 'the LORD.' The preposition ל here is rendered 'for' to express covenant belonging and allegiance in natural English.
