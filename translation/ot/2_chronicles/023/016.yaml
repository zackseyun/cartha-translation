theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יהוה is 'the LORD,' following the stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of the covenant parties and purpose clause
  chosen_reading: Jehoiada, all the people, and the king are all parties to the covenant, with the purpose that they should be a people for the LORD
  alternative_readings:
  - Jehoiada made a covenant between the LORD and the people and the king
  rationale: 'The Hebrew lists three parties after ''between'': ''between him, and between all the people, and between the king.'' The following infinitive clause states the covenant''s purpose. The text does not explicitly name the LORD as one of the covenanting parties, but as the one to whom the people belong.'
revisions:
- timestamp: '2026-04-21T17:40:10Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/weighted_vocab/ot/2_chronicles/023/016.job-11164.json
  category: awkward_english
  tier: 1
  from: that they should be a people for the LORD
  to: that they should be the LORD's people
  rationale: The current rendering of the purpose clause (לִהְיוֹת לְעָם לַיהוָה) is a very literal combination of the individual lexical choices. While not incorrect, the result 'a people for the LORD' is slightly stilted in English. The covenantal formula 'a people belonging to the LORD' is more idiomatically and forcefully rendered as 'the LORD's people,' an option already noted in footnote 'b'. Promoting this more natural phrasing to the main text would be an improvement.
