id: 2CH.23.2
reference: 2 Chronicles 23:2
source:
  edition: WLC
  text: וַ/יָּסֹ֨בּוּ֙ בִּֽ/יהוּדָ֔ה וַ/יִּקְבְּצ֤וּ אֶת הַ/לְוִיִּם֙ מִ/כָּל עָרֵ֣י
    יְהוּדָ֔ה וְ/רָאשֵׁ֥י הָ/אָב֖וֹת לְ/יִשְׂרָאֵ֑ל וַ/יָּבֹ֖אוּ אֶל יְרוּשָׁלִָֽם־־־׃
translation:
  text: And they went throughout Judah and gathered the Levites from all the cities
    of Judah, along with the heads of the fathers’ houses of Israel, and they came
    to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the heads of the ancestral houses' or more idiomatically 'the family
      heads.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסֹבּוּ
  chosen: went throughout
  alternatives:
  - went around
  - circulated through
  lexicon: HALOT
  rationale: The verb סבב in this narrative context indicates moving about through
    a region rather than merely turning. 'Went throughout' is natural English and
    preserves the idea of traveling across Judah to carry out the mission.
- source_word: בִּיהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Proper place name; rendered by standard English transliteration.
- source_word: וַיִּקְבְּצוּ
  chosen: gathered
  alternatives:
  - assembled
  - collected
  lexicon: HALOT
  rationale: קבץ commonly means gather together. 'Gathered' fits both the direct object
    'the Levites' and the broader mobilization context.
- source_word: אֶת־הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Straightforward ethnic/tribal-cultic designation; standard English rendering.
- source_word: מִכָּל עָרֵי יְהוּדָה
  chosen: from all the cities of Judah
  alternatives:
  - out of every city of Judah
  lexicon: HALOT
  rationale: The phrase denotes source from across the whole territory. 'From all
    the cities of Judah' is clear and formally close.
- source_word: וְרָאשֵׁי הָאָבוֹת
  chosen: along with the heads of the fathers’ houses
  alternatives:
  - and the heads of the ancestral houses
  - and the family heads
  lexicon: HALOT
  rationale: Literally 'heads of the fathers.' In Chronicles this idiom refers to
    clan or household leaders. 'Heads of the fathers’ houses' preserves the formal
    structure while remaining intelligible; a more idiomatic alternative is worth
    preserving in a footnote.
- source_word: לְיִשְׂרָאֵל
  chosen: of Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: Here ל marks relation/association rather than purpose. 'Of Israel' best
    conveys that these heads belonged to Israel, likely the covenant people represented
    in Judah.
- source_word: וַיָּבֹאוּ אֶל יְרוּשָׁלִָם
  chosen: and they came to Jerusalem
  alternatives:
  - and they entered Jerusalem
  lexicon: HALOT
  rationale: בוא with אֶל commonly means 'come to.' 'Came to Jerusalem' is the most
    natural narrative rendering.
