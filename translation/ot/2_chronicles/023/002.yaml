theological_decisions:
- issue: Scope of 'Israel' in a Judah-centered context
  chosen_reading: Retain 'Israel' in the main text without narrowing it to 'Judah'
    or paraphrasing it as 'the people.'
  alternative_readings:
  - Judah
  - the people of Israel
  rationale: The Hebrew explicitly says 'Israel.' In Chronicles, 'Israel' can denote
    the broader covenant people, even in a southern-kingdom setting. Preserving 'Israel'
    avoids importing a harmonizing interpretation and maintains the Chronicler's theological
    vocabulary.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Rendering the kinship idiom הָאָבוֹת
  chosen_reading: Use 'fathers’ houses' in the main text with a clarifying lexical
    footnote.
  alternative_readings:
  - ancestral houses
  - families
  rationale: The Hebrew idiom is culturally specific and structurally important in
    genealogical and administrative contexts. Keeping it in the text preserves source
    texture, while a footnote can aid readability without flattening the term.
  doctrine_reference: Translation philosophy §5, §6
