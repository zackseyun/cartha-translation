id: 2CH.23.18
reference: 2 Chronicles 23:18
source:
  edition: WLC
  text: וַ/יָּשֶׂם֩ יְהוֹיָדָ֨ע פְּקֻדֹּ֜ת בֵּ֣ית יְהוָ֗ה בְּ/יַ֨ד הַ/כֹּהֲנִ֣ים הַ/לְוִיִּם֮
    אֲשֶׁ֣ר חָלַ֣ק דָּוִיד֮ עַל בֵּ֣ית יְהוָה֒ לְֽ/הַעֲל֞וֹת עֹל֣וֹת יְהוָ֗ה כַּ/כָּת֛וּב
    בְּ/תוֹרַ֥ת מֹשֶׁ֖ה בְּ/שִׂמְחָ֣ה וּ/בְ/שִׁ֑יר עַ֖ל יְדֵ֥י דָוִֽיד־׃
translation:
  text: And Jehoiada appointed the duties of the house of the LORD into the hand of
    the priests, the Levites, whom David had assigned over the house of the LORD,
    to offer up burnt offerings to the LORD, as it is written in the Law of Moses,
    with rejoicing and with song, according to the directions of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''into the hand of,'' an idiom meaning ''into the charge of'' or
      ''under the authority of.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'the Levitical priests' or 'the priests and the Levites.' The Hebrew
      expression can be understood in more than one way.
    reason: alternative_reading
  - marker: c
    text: Or 'by the hand of David,' that is, according to David's arrangement or
      prescription.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: appointed
  alternatives:
  - set
  - placed
  lexicon: HALOT
  rationale: The verb שׂים literally means 'set/put,' but in administrative context
    with פְּקֻדּוֹת it naturally carries the sense of appointing or establishing responsibilities.
- source_word: פְּקֻדּוֹת
  chosen: duties
  alternatives:
  - offices
  - oversight
  - charges
  - divisions
  lexicon: HALOT
  rationale: In this temple-administrative setting, the noun refers to assigned responsibilities
    or oversight functions. 'Duties' is clear modern English and fits the priestly
    context better than the more abstract 'oversight' or the more institutional 'offices'.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the temple of the LORD
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the Hebrew idiom while remaining
    natural. 'Temple' would be interpretive; 'house of the LORD' keeps the source
    texture.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - under the authority of
  - in the charge of
  lexicon: HALOT
  rationale: The Hebrew idiom literally means placement into someone's hand, conveying
    entrusting or assigning responsibility. The main text preserves the idiom; the
    sense is administrative entrustment.
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  chosen: the priests, the Levites
  alternatives:
  - the Levitical priests
  - the priests and the Levites
  lexicon: HALOT
  rationale: The appositional wording in Chronicles often refers to the priestly/Levitical
    personnel together. 'The priests, the Levites' stays close to the Hebrew form
    without over-resolving whether the phrase is strictly appositional or distributive.
- source_word: חָלַק
  chosen: had assigned
  alternatives:
  - had divided
  - had apportioned
  - had distributed
  lexicon: HALOT
  rationale: The verb fundamentally means divide/apportion. In context David organized
    personnel into service groups, so 'had assigned' communicates the practical force
    in idiomatic English.
- source_word: לְהַעֲלוֹת
  chosen: to offer up
  alternatives:
  - to bring up
  - to present
  lexicon: HALOT
  rationale: For sacrificial context, the Hiphil of עלה is conventionally and accurately
    rendered 'offer up,' reflecting the act of presenting sacrifices on the altar.
- source_word: עֹלוֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: This is the standard sacrificial term. 'Burnt offerings' is the clearest
    established English equivalent.
- source_word: כַּכָּתוּב בְּתוֹרַת מֹשֶׁה
  chosen: as it is written in the Law of Moses
  alternatives:
  - according to what is written in the law of Moses
  lexicon: HALOT
  rationale: This formula points to Mosaic written instruction. Capitalizing 'Law'
    reflects its referential force as Torah without changing meaning.
- source_word: בְּשִׂמְחָה וּבְשִׁיר
  chosen: with rejoicing and with song
  alternatives:
  - with joy and with singing
  - with gladness and song
  lexicon: HALOT
  rationale: The paired nouns describe the manner of worship. 'Rejoicing' and 'song'
    preserve the nominal style and liturgical tone.
- source_word: עַל יְדֵי דָוִיד
  chosen: according to the directions of David
  alternatives:
  - by the hand of David
  - as prescribed by David
  lexicon: HALOT
  rationale: The idiom can mean agency or instrumentality. Here it most likely refers
    to Davidic arrangement/prescription for musical-liturgical service. 'According
    to the directions of David' makes that sense explicit in natural English while
    reflecting the idiom's administrative force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    in the main text.
