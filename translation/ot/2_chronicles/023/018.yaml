theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the covenant name as 'the LORD,' following
    the stated doctrine and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Relationship of 'the priests, the Levites'
  chosen_reading: Retain the Hebrew-like expression 'the priests, the Levites' without
    collapsing it into a more interpretive phrase.
  alternative_readings:
  - the Levitical priests
  - the priests and the Levites
  rationale: Chronicles uses this expression in ways debated by interpreters. The
    translation preserves the wording rather than resolving the institutional question
    beyond what the Hebrew requires.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
