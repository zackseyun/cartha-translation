id: 2CH.23.19
reference: 2 Chronicles 23:19
source:
  edition: WLC
  text: וַֽ/יַּעֲמֵד֙ הַ/שּׁ֣וֹעֲרִ֔ים עַֽל שַׁעֲרֵ֖י בֵּ֣ית יְהוָ֑ה וְ/לֹֽא יָבֹ֥א טָמֵ֖א לְ/כָל דָּבָֽר־־־׃
translation:
  text: He stationed the gatekeepers at the gates of the house of Yahweh, so that no one unclean in any respect might enter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “no one unclean for any thing shall enter,” an idiom meaning no one unclean in any respect or for any cause of uncleanness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֵד
  chosen: He stationed
  alternatives:
  - He set
  - He appointed
  - He posted
  lexicon: HALOT
  rationale: 'The Hiphil of עמד here is causative: Jehoiada caused the gatekeepers to stand in position. ''Stationed'' captures the act of placing personnel on duty more naturally than the more wooden ''caused to stand''.'
- source_word: הַשּׁוֹעֲרִים
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  - the guards
  lexicon: HALOT
  rationale: The noun refers specifically to those assigned to guard entrances/gates. 'Gatekeepers' is the most precise and natural rendering in this temple context.
- source_word: עַל שַׁעֲרֵי
  chosen: at the gates of
  alternatives:
  - over the gates of
  - by the gates of
  lexicon: HALOT
  rationale: The preposition עַל with this placement context indicates position at/over the gates. In idiomatic English, 'at the gates of' best conveys stationed presence at the entrances.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  - the house of Yahweh
  lexicon: HALOT
  rationale: בַּיִת + divine name is the standard expression 'house of the LORD.' 'Temple' is possible, but 'house' preserves the source wording. Per doctrine, יְהוָה is rendered 'the LORD,' not 'Yahweh,' in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving the reverential convention and LXX-influenced English pattern.
- source_word: וְלֹא יָבֹא
  chosen: so that ... might enter
  alternatives:
  - and ... should not come in
  - and ... may not enter
  lexicon: HALOT
  rationale: 'The conjunction plus negated imperfect expresses purpose/result in context: the gatekeepers were stationed with the aim that entry be prevented. ''Might enter'' in a purpose clause communicates this clearly in English.'
- source_word: טָמֵא
  chosen: unclean
  alternatives:
  - impure
  - defiled
  lexicon: HALOT
  rationale: In temple-access context, טָמֵא is the standard ritual category 'unclean.' 'Impure' is possible, but 'unclean' is the established and clearest cultic term in English.
- source_word: לְכָל דָּבָר
  chosen: in any respect
  alternatives:
  - for any thing
  - in any matter
  - for any reason
  lexicon: HALOT
  rationale: The phrase is idiomatic and broad, indicating any kind of uncleanness or any matter rendering one unclean. 'In any respect' communicates the comprehensiveness without awkward literalism. A more literal alternative is preserved in a footnote.
