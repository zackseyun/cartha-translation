id: 2CH.23.3
reference: 2 Chronicles 23:3
source:
  edition: WLC
  text: וַ/יִּכְרֹ֨ת כָּל הַ/קָּהָ֥ל בְּרִ֛ית בְּ/בֵ֥ית הָ/אֱלֹהִ֖ים עִם הַ/מֶּ֑לֶךְ
    וַ/יֹּ֣אמֶר לָ/הֶ֗ם הִנֵּ֤ה בֶן הַ/מֶּ֨לֶךְ֙ יִמְלֹ֔ךְ כַּ/אֲשֶׁ֛ר דִּבֶּ֥ר יְהוָ֖ה
    עַל בְּנֵ֥י דָוִֽיד־־־־׃
translation:
  text: And all the assembly made a covenant in the house of God with the king, and
    he said to them, “Look, the king’s son will reign, just as the LORD spoke concerning
    the sons of David.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “cut a covenant.” The Hebrew idiom literally uses the verb “cut” with
      “covenant.”
    reason: lexical_alternative
  - marker: b
    text: Or, “in the temple of God.” Literally, “in the house of God.”
    reason: lexical_alternative
  - marker: c
    text: Or, “concerning the house of David” or “David’s dynasty.” The Hebrew reads
      “the sons of David.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכְרֹת ... בְּרִית
  chosen: made a covenant
  alternatives:
  - cut a covenant
  - entered into a covenant
  lexicon: HALOT
  rationale: The idiom כרת ברית is conventionally 'cut/make a covenant.' 'Made a covenant'
    preserves the covenantal act in clear modern English, while avoiding overly wooden
    phrasing.
- source_word: כָּל הַקָּהָל
  chosen: all the assembly
  alternatives:
  - all the congregation
  - the whole assembly
  lexicon: HALOT
  rationale: קהל denotes the gathered community. 'Assembly' is natural English and
    fits the public, corporate setting better than the more ecclesiastically loaded
    'congregation'.
- source_word: בְּבֵית הָאֱלֹהִים
  chosen: in the house of God
  alternatives:
  - in the temple of God
  lexicon: HALOT
  rationale: The Hebrew is literally 'house of God.' This is transparent and accurate;
    'temple' is a valid contextual gloss but slightly less direct.
- source_word: עִם הַמֶּלֶךְ
  chosen: with the king
  alternatives:
  - for the king
  lexicon: HALOT
  rationale: עִם most naturally means 'with.' The covenant is made in relation to
    the king, not merely on his behalf.
- source_word: וַיֹּאמֶר לָהֶם
  chosen: and he said to them
  alternatives:
  - then he said to them
  lexicon: HALOT
  rationale: The singular subject refers back to Jehoiada in context. The straightforward
    rendering preserves the narrative flow without over-specifying in the main text.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. 'Look' is readable modern
    English and preserves the force better than archaic 'Behold.'
- source_word: בֶן הַמֶּלֶךְ
  chosen: the king’s son
  alternatives:
  - the son of the king
  lexicon: HALOT
  rationale: The construct phrase is naturally rendered as a possessive in English.
- source_word: יִמְלֹךְ
  chosen: will reign
  alternatives:
  - shall reign
  - will become king
  lexicon: HALOT
  rationale: מלך in the verbal form means 'reign/be king.' 'Will reign' is both accurate
    and idiomatic.
- source_word: כַּאֲשֶׁר דִּבֶּר
  chosen: just as ... spoke
  alternatives:
  - as ... promised
  - according to what ... said
  lexicon: HALOT
  rationale: דבר is 'speak/say.' Because the object is the Davidic line, 'spoke' preserves
    the wording of divine declaration without importing the interpretive term 'promised'
    into the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: עַל בְּנֵי דָוִיד
  chosen: concerning the sons of David
  alternatives:
  - about the sons of David
  - over the sons of David
  - concerning the house of David
  lexicon: HALOT
  rationale: עַל with דבר can mean 'concerning/about.' The Hebrew explicitly says
    'sons of David,' so the translation keeps the plural familial wording rather than
    smoothing to 'house of David.'
