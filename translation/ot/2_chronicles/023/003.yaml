theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH, preserving reverential
    convention and alignment with longstanding Jewish and Christian practice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render בְּנֵי דָוִיד literally or interpretively
  chosen_reading: the sons of David
  alternative_readings:
  - the house of David
  - David's dynasty
  rationale: The verse invokes the Davidic royal promise. A more interpretive rendering
    could foreground dynastic theology, but the Hebrew wording is explicitly filial/plural.
    Preserving 'sons of David' maintains lexical transparency and lets the theological
    implication arise from the text itself.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy
    over translation tradition; Preserve theological tension rather than resolve it'
