id: 2CH.23.20
reference: 2 Chronicles 23:20
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח אֶת שָׂרֵ֣י הַ/מֵּא֡וֹת וְ/אֶת הָֽ/אַדִּירִים֩ וְ/אֶת הַ/מּֽוֹשְׁלִ֨ים בָּ/עָ֜ם וְ/אֵ֣ת כָּל עַ֣ם הָ/אָ֗רֶץ וַ/יּ֤וֹרֶד אֶת הַ/מֶּ֨לֶךְ֙ מִ/בֵּ֣ית יְהוָ֔ה וַ/יָּבֹ֛אוּ בְּ/תֽוֹךְ שַׁ֥עַר הָֽ/עֶלְי֖וֹן בֵּ֣ית הַ/מֶּ֑לֶךְ וַ/יּוֹשִׁ֨יבוּ֙ אֶת הַ/מֶּ֔לֶךְ עַ֖ל כִּסֵּ֥א הַ/מַּמְלָכָֽה־־־׀־־־־׃
translation:
  text: Then he took the commanders of hundreds, the nobles, the rulers of the people, and all the people of the land, and brought the king down from the house of Yahweh. They entered through the upper gate of the king’s house and seated the king on the throne of the kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mighty men' for 'the nobles.' The Hebrew term can denote prominent or powerful persons.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all the people of the land,' a common expression in royal narratives for the populace as a socio-political body.
    reason: cultural_note
  - marker: c
    text: Or 'the royal palace' for 'the king’s house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: Then he took
  alternatives:
  - Then he gathered
  - Then he took with him
  lexicon: HALOT
  rationale: The verb לקח literally means 'take.' In this context it introduces Jehoiada's leading or accompanying these groups. 'Took' preserves the Hebrew wording while remaining natural in English; the following objects clarify that he assembled/led them.
- source_word: שָׂרֵי הַמֵּאוֹת
  chosen: the commanders of hundreds
  alternatives:
  - the captains of hundreds
  - the centurions
  lexicon: HALOT
  rationale: A formal rendering of the military title. 'Centurions' would be more interpretive and Roman-sounding; 'commanders of hundreds' preserves the Hebrew structure and likely military function.
- source_word: הָאַדִּירִים
  chosen: the nobles
  alternatives:
  - the mighty men
  - the dignitaries
  lexicon: HALOT
  rationale: אַדִּירִים denotes prominent or powerful persons. In this courtly-political setting, 'nobles' best captures social rank without implying only physical strength.
- source_word: הַמֹּשְׁלִים בָּעָם
  chosen: the rulers of the people
  alternatives:
  - the governors among the people
  - those ruling over the people
  lexicon: HALOT
  rationale: This phrase refers to those exercising authority within the populace. 'Rulers of the people' is clear, close to the Hebrew, and fits the public enthronement scene.
- source_word: כָּל עַם הָאָרֶץ
  chosen: all the people of the land
  alternatives:
  - all the people of the הארץ
  - all the common people
  lexicon: HALOT
  rationale: A standard Hebrew expression in royal narratives. 'People of the land' preserves the idiom and its socio-political sense better than flattening it to 'common people.'
- source_word: וַיּוֹרֶד אֶת הַמֶּלֶךְ
  chosen: brought the king down
  alternatives:
  - led the king down
  - escorted the king down
  lexicon: HALOT
  rationale: The Hiphil of ירד means 'cause to go down/bring down.' Since movement is from the temple precincts to the palace, 'brought ... down' reflects the directional sense in the Hebrew.
- source_word: מִבֵּית יְהוָה
  chosen: from the house of the LORD
  alternatives:
  - from the temple of the LORD
  lexicon: HALOT
  rationale: '''House of the LORD'' is the standard rendering of בית יהוה and preserves the Hebrew expression. Per doctrine, יְהוָה is rendered ''the LORD.'''
- source_word: בְּתוֹךְ שַׁעַר הָעֶלְיוֹן
  chosen: through the upper gate
  alternatives:
  - into the midst of the upper gate
  - by way of the upper gate
  lexicon: HALOT
  rationale: The phrase literally includes 'in/through the midst of,' but idiomatic English for movement through an entrance is 'through the upper gate.' This preserves the spatial sense without awkwardness.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king’s house
  alternatives:
  - the royal palace
  - the house of the king
  lexicon: HALOT
  rationale: The Hebrew is literally 'the house of the king.' 'The king’s house' is natural and still transparent; 'royal palace' is possible but slightly more interpretive.
- source_word: וַיּוֹשִׁיבוּ
  chosen: seated
  alternatives:
  - set
  - caused to sit
  lexicon: HALOT
  rationale: The causative verb means 'caused to sit' or 'set in place.' 'Seated' is idiomatic English for enthronement and matches the ceremonial context.
- source_word: כִּסֵּא הַמַּמְלָכָה
  chosen: the throne of the kingdom
  alternatives:
  - the royal throne
  - the throne of kingship
  lexicon: HALOT
  rationale: A close rendering of the Hebrew phrase. 'Royal throne' is smoother but less formally transparent; 'throne of the kingdom' preserves the explicit noun ממלכה.
