id: 2CH.33.15
reference: 2 Chronicles 33:15
source:
  edition: WLC
  text: וַ֠/יָּסַר אֶת אֱלֹהֵ֨י הַ/נֵּכָ֤ר וְ/אֶת הַ/סֶּ֨מֶל֙ מִ/בֵּ֣ית יְהוָ֔ה וְ/כָל
    הַֽ/מִּזְבְּח֗וֹת אֲשֶׁ֥ר בָּנָ֛ה בְּ/הַ֥ר בֵּית יְהוָ֖ה וּ/בִ/ירוּשָׁלִָ֑ם וַ/יַּשְׁלֵ֖ךְ
    ח֥וּצָ/ה לָ/עִֽיר־־־־׃
translation:
  text: He removed the foreign gods and the idol from the house of the LORD, and all
    the altars that he had built on the mountain of the house of the LORD and in Jerusalem,
    and he threw them outside the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the image.' The Hebrew סֶמֶל can denote an idol or cult image.
    reason: lexical_alternative
  - marker: b
    text: Or 'on the hill of the house of the LORD'; that is, the temple mount.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסַר
  chosen: He removed
  alternatives:
  - He took away
  - He put away
  lexicon: HALOT
  rationale: The verb סוּר in the Hiphil here denotes causing something to depart
    or be removed. 'Removed' is natural modern English and fits the reform context
    without paraphrase.
- source_word: אֱלֹהֵי הַנֵּכָר
  chosen: the foreign gods
  alternatives:
  - the gods of the foreigner
  - the strange gods
  lexicon: HALOT
  rationale: The construct phrase literally means 'gods of foreignness/foreigner.'
    In context it refers to non-Yahwistic deities, so 'foreign gods' is the clearest
    idiomatic rendering.
- source_word: הַסֶּמֶל
  chosen: the idol
  alternatives:
  - the image
  - the carved image
  lexicon: HALOT
  rationale: סֶמֶל denotes an image/idol, often in a cultic and offensive sense. 'Idol'
    best conveys the religious object in this reform narrative. 'Image' is possible
    but less explicit in English.
- source_word: מִבֵּית יְהוָה
  chosen: from the house of the LORD
  alternatives:
  - from the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת with YHWH often refers to the temple, but 'house of the LORD'
    preserves the Hebrew expression more closely while remaining clear.
- source_word: וְכָל הַמִּזְבְּחוֹת
  chosen: and all the altars
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun with כָּל. No reason to
    narrow or expand the sense.
- source_word: אֲשֶׁר בָּנָה
  chosen: that he had built
  alternatives:
  - which he built
  lexicon: HALOT
  rationale: English past perfect fits the sequence naturally, referring to altars
    constructed prior to their removal.
- source_word: בְּהַר בֵּית יְהוָה
  chosen: on the mountain of the house of the LORD
  alternatives:
  - on the hill of the house of the LORD
  - on the temple mount
  lexicon: HALOT
  rationale: הַר is literally 'mountain/hill.' 'Temple mount' is interpretive though
    contextually accurate; the more transparent rendering 'mountain of the house of
    the LORD' better preserves the source wording.
- source_word: וּבִירוּשָׁלָם
  chosen: and in Jerusalem
  lexicon: HALOT
  rationale: The phrase extends the location of the altars beyond the temple mount
    to the city more broadly.
- source_word: וַיַּשְׁלֵךְ
  chosen: and he threw them
  alternatives:
  - and he cast them
  - and he threw
  lexicon: HALOT
  rationale: The verb שׁלך conveys forceful disposal. 'Threw' preserves the vividness
    better than the more formal 'cast.' The object 'them' is supplied in English from
    the preceding plural items.
- source_word: חוּצָה לָעִיר
  chosen: outside the city
  alternatives:
  - out of the city
  - to outside the city
  lexicon: HALOT
  rationale: The directional adverb plus prepositional phrase indicates expulsion
    to a place outside the city limits. 'Outside the city' is idiomatic and precise.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the project's stated policy.
