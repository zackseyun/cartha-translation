id: 2CH.33.22
reference: 2 Chronicles 33:22
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ הָ/רַע֙ בְּ/עֵינֵ֣י יְהוָ֔ה כַּ/אֲשֶׁ֥ר עָשָׂ֖ה מְנַשֶּׁ֣ה אָבִ֑י/ו
    וּֽ/לְ/כָל הַ/פְּסִילִ֗ים אֲשֶׁ֤ר עָשָׂה֙ מְנַשֶּׁ֣ה אָבִ֔י/ו זִבַּ֥ח אָמ֖וֹן
    וַ/יַּֽעַבְדֵֽ/ם־׃
translation:
  text: He did what was evil in the sight of the LORD, just as Manasseh his father
    had done. Amon sacrificed to all the carved images that Manasseh his father had
    made and served them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'idols' for 'carved images.' The Hebrew specifically refers to images
      that were carved or hewn.
    reason: lexical_alternative
  - marker: b
    text: Or 'worshiped them.' The Hebrew verb literally means 'served them,' often
      used for religious service.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ הָרַע
  chosen: He did what was evil
  alternatives:
  - He did evil
  - He did the evil
  lexicon: HALOT
  rationale: The idiom עשה + הרע commonly means 'to do what is evil' or 'to do evil.'
    'What was evil' is natural modern English and preserves the evaluative force without
    sounding wooden.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the sight of the LORD
  alternatives:
  - in the eyes of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for divine evaluation. 'In the sight
    of' is clear and idiomatic in English. יְהוָה is rendered 'the LORD' per doctrine
    guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The project default for the divine name is 'the LORD,' following the
    doctrinal guidance and established reverential convention.
- source_word: כַּאֲשֶׁר עָשָׂה
  chosen: just as ... had done
  alternatives:
  - as ... did
  - according to what ... did
  lexicon: HALOT
  rationale: The comparison points to Amon's imitation of Manasseh's conduct. 'Just
    as ... had done' communicates the prior action naturally in English narrative.
- source_word: מְנַשֶּׁה אָבִיו
  chosen: Manasseh his father
  alternatives:
  - his father Manasseh
  lexicon: HALOT
  rationale: This preserves the Hebrew appositional structure and reads smoothly in
    English.
- source_word: הַפְּסִילִים
  chosen: the carved images
  alternatives:
  - the idols
  - the graven images
  lexicon: HALOT
  rationale: פסילים refers specifically to carved idols/images. 'Carved images' preserves
    the concrete sense better than the more generalized 'idols,' while avoiding the
    archaic tone of 'graven images.'
- source_word: אֲשֶׁר עָשָׂה
  chosen: that ... had made
  alternatives:
  - which ... made
  lexicon: HALOT
  rationale: Because Manasseh's making of the images precedes Amon's actions, English
    past perfect is appropriate for clarity.
- source_word: זִבַּח
  chosen: sacrificed to
  alternatives:
  - offered sacrifices to
  - slaughtered for
  lexicon: HALOT
  rationale: The verb זבח in cultic context means to offer sacrifice. 'Sacrificed
    to' is concise and idiomatic, and the indirect object is supplied naturally in
    English from the lamed preposition.
- source_word: וַיַּעַבְדֵם
  chosen: and served them
  alternatives:
  - and worshiped them
  lexicon: HALOT
  rationale: עבד with idols can mean religious service/worship. 'Served them' is closer
    to the lexical sense and preserves the broader notion of cultic devotion without
    over-interpreting.
- source_word: אָמֹון
  chosen: Amon
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
