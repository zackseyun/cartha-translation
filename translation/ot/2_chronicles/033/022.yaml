theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines explicitly set the default rendering of YHWH
    as 'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to render עבד in an idolatry context as 'served' or 'worshiped'
  chosen_reading: served them
  alternative_readings:
  - worshiped them
  rationale: The Hebrew verb fundamentally denotes service; in idolatrous context
    worship is implied, but the translation preserves the lexical form and lets the
    context carry the religious sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms,
    or documented exception)
