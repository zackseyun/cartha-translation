id: 2CH.33.20
reference: 2 Chronicles 33:20
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב מְנַשֶּׁה֙ עִם אֲבֹתָ֔י/ו וַֽ/יִּקְבְּרֻ֖/הוּ בֵּית֑/וֹ וַ/יִּמְלֹ֛ךְ
    אָמ֥וֹן בְּנ֖/וֹ תַּחְתָּֽי/ו־׃פ
translation:
  text: And Manasseh slept with his fathers, and they buried him in his house. And
    Amon his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his palace'; the Hebrew says 'in his house,' which in a royal context
      may refer to the palace complex.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: The idiom 'slept with his fathers' is a standard Hebrew way of referring
    to death while preserving the familial/burial formula. 'Slept' keeps the source-text
    imagery better than flattening it to 'died'.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: A conventional royal death formula. 'Fathers' is more formally aligned
    with the Hebrew and fits the translation philosophy's gender-accurate principle;
    'ancestors' is possible but less literal.
- source_word: וַיִּקְבְּרֻהוּ
  chosen: they buried him
  alternatives:
  - he was buried
  lexicon: HALOT
  rationale: The Hebrew verb is active plural with object suffix, so 'they buried
    him' reflects the grammatical form more directly than the passive.
- source_word: בֵּיתוֹ
  chosen: in his house
  alternatives:
  - in his palace
  - at his house
  lexicon: HALOT
  rationale: The plain sense of בַּיִת is 'house,' but in royal contexts it can denote
    the palace or house-complex. The Chronicler likely refers to burial within his
    own residence/palace precincts. 'In his house' preserves the Hebrew wording, with
    'palace' worth noting as an alternative.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: The verb denotes royal rule; 'reigned' is the standard concise rendering
    in succession formulas.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: In succession contexts, תַּחַת commonly means 'in place of.' This is
    idiomatic English and accurately conveys dynastic replacement.
