id: 2CH.33.16
reference: 2 Chronicles 33:16
source:
  edition: WLC
  text: ו/יכן אֶת מִזְבַּ֣ח יְהוָ֔ה וַ/יִּזְבַּ֣ח עָלָ֔י/ו זִבְחֵ֥י שְׁלָמִ֖ים וְ/תוֹדָ֑ה וַ/יֹּ֨אמֶר֙ לִֽ/יהוּדָ֔ה לַ/עֲב֕וֹד אֶת יְהוָ֖ה אֱלֹהֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: Then he restored the altar of Yahweh and sacrificed on it sacrifices of peace offerings and thanksgiving, and he told Judah to serve Yahweh, the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'peace offerings'; alternatively, some render 'fellowship offerings.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'thanksgiving'; that is, thanksgiving offerings in this sacrificial context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ו/יכן
  chosen: restored
  alternatives:
  - prepared
  - established
  - set in order
  lexicon: HALOT
  rationale: The Hiphil of כון here refers to putting the altar back into proper condition after its defilement/removal in context. 'Restored' best captures the contextual sense more clearly than the more wooden 'prepared' or 'established'.
- source_word: מִזְבַּח יְהוָה
  chosen: the altar of the LORD
  alternatives:
  - the LORD's altar
  lexicon: HALOT
  rationale: Construct phrase rendered naturally in English. YHWH is translated as 'the LORD' per doctrine guidance on the divine name.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and consistency with the LXX/English tradition noted in DOCTRINE.md.
- source_word: וַ/יִּזְבַּח עָלָיו
  chosen: and sacrificed on it
  alternatives:
  - and offered sacrifices on it
  lexicon: HALOT
  rationale: The verb זבח means to sacrifice/offer sacrifice. 'On it' correctly refers back to the altar. The shorter rendering is natural while preserving the sacrificial action.
- source_word: זִבְחֵי שְׁלָמִים
  chosen: sacrifices of peace offerings
  alternatives:
  - peace offerings
  - fellowship offerings
  lexicon: HALOT
  rationale: The Hebrew explicitly includes both the general term 'sacrifices of' and the specific category 'peace offerings.' Retaining both reflects the source more fully, though English could simplify to 'peace offerings.' 'Fellowship offerings' is interpretive and less direct.
- source_word: וְ/תוֹדָה
  chosen: and thanksgiving
  alternatives:
  - and thank offerings
  - and praise
  lexicon: HALOT
  rationale: תוֹדָה denotes thanksgiving/thank offering. Because it is coordinated with sacrificial language already present, 'thanksgiving' is concise and understandable, while the sacrificial nuance remains implied by the governing verb and prior noun.
- source_word: וַ/יֹּאמֶר לִיהוּדָה
  chosen: and he told Judah
  alternatives:
  - and he said to Judah
  - and he commanded Judah
  lexicon: HALOT
  rationale: The idiom is literally 'said to Judah,' but 'told Judah' is smoother modern English without overstating the force as a formal command.
- source_word: לַ/עֲבֹד
  chosen: to serve
  alternatives:
  - to worship
  lexicon: HALOT
  rationale: עבד in relation to God can include worship, but 'serve' is the broader and more literal term, preserving the covenantal sense without narrowing it to cultic worship alone.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: Standard, transparent rendering of the construct phrase, preserving the covenant identity emphasized in the verse.
