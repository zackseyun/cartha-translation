theological_decisions:
- issue: Conditional permanence of Israel in the land
  chosen_reading: The verse states a real condition for continued dwelling in the
    land without importing broader theological conclusions beyond this covenantal
    context.
  alternative_readings:
  - An unconditional guarantee of permanent possession
  - A purely rhetorical condition with no real contingency
  rationale: The Hebrew plainly makes the promise contingent on obedience ('if only
    they are careful to do...'). The translation preserves that tension and does not
    resolve larger doctrinal debates about covenant permanence beyond what this verse
    says.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
