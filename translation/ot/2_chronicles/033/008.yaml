id: 2CH.33.8
reference: 2 Chronicles 33:8
source:
  edition: WLC
  text: וְ/לֹ֣א אוֹסִ֗יף לְ/הָסִיר֙ אֶת רֶ֣גֶל יִשְׂרָאֵ֔ל מֵ/עַל֙ הָֽ/אֲדָמָ֔ה אֲשֶׁ֥ר
    הֶֽעֱמַ֖דְתִּי לַ/אֲבֹֽתֵי/כֶ֑ם רַ֣ק אִם יִשְׁמְר֣וּ לַ/עֲשׂ֗וֹת אֵ֚ת כָּל אֲשֶׁ֣ר
    צִוִּיתִ֔י/ם לְ/כָל הַ/תּוֹרָ֛ה וְ/הַֽ/חֻקִּ֥ים וְ/הַ/מִּשְׁפָּטִ֖ים בְּ/יַד מֹשֶֽׁה־׀־־־־׃
translation:
  text: And I will no longer remove the foot of Israel from upon the land that I appointed
    for your fathers, if only they are careful to do all that I commanded them, according
    to all the law and the statutes and the judgments given through Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the foot of Israel,' an idiom for Israel's presence in the land.
    reason: lexical_alternative
  - marker: b
    text: Or 'by the hand of Moses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹסִיף לְהָסִיר
  chosen: I will no longer remove
  alternatives:
  - I will not again remove
  - I will no more cause to depart
  lexicon: HALOT
  rationale: The idiom combines יסף ('add, continue, do again') with הסיר ('remove,
    take away'). In English, 'will no longer remove' best captures the future negated
    continuation without sounding wooden.
- source_word: רֶגֶל יִשְׂרָאֵל
  chosen: the foot of Israel
  alternatives:
  - Israel's foot
  - Israel
  lexicon: HALOT
  rationale: The Hebrew literally says 'the foot of Israel,' an idiom for Israel's
    presence/placement in the land. Retaining 'foot' preserves the concrete imagery
    and avoids over-paraphrase, while the surrounding clause makes the sense clear.
- source_word: מֵעַל הָאֲדָמָה
  chosen: from upon the land
  alternatives:
  - from the land
  - off the ground
  lexicon: HALOT
  rationale: מֵעַל is more specific than simple 'from'; 'from upon the land' preserves
    the prepositional force. 'Land' fits covenant-land context better than 'ground'.
- source_word: אֲשֶׁר הֶעֱמַדְתִּי
  chosen: that I appointed
  alternatives:
  - that I established
  - where I caused to stand
  - that I set
  lexicon: HALOT
  rationale: The hiphil of עמד here refers to causing someone/something to stand or
    be established in a place. In context of land given to the fathers, 'appointed'
    communicates divine designation of the land without awkward literalism.
- source_word: לַאֲבֹתֵיכֶם
  chosen: for your fathers
  alternatives:
  - for your ancestors
  - to your fathers
  lexicon: HALOT
  rationale: '''Fathers'' is a standard covenantal expression and preserves the familial-historical
    wording of the Hebrew. ''For'' fits the sense of land designated on their behalf.'
- source_word: רַק אִם
  chosen: if only
  alternatives:
  - only if
  - provided that
  lexicon: HALOT
  rationale: The phrase introduces a strong condition. 'If only' preserves the restrictive
    force while reading naturally in English.
- source_word: יִשְׁמְרוּ לַעֲשׂוֹת
  chosen: they are careful to do
  alternatives:
  - they keep to do
  - they observe to do
  - they take care to do
  lexicon: HALOT
  rationale: The construction means more than mere cognition; it conveys careful observance.
    'Are careful to do' captures the idiomatic sense in readable English.
- source_word: כָּל אֲשֶׁר צִוִּיתִים
  chosen: all that I commanded them
  alternatives:
  - everything that I commanded them
  lexicon: HALOT
  rationale: A straightforward rendering of totality plus divine command. The pronominal
    suffix is retained as 'them'.
- source_word: לְכָל הַתּוֹרָה
  chosen: according to all the law
  alternatives:
  - according to the whole law
  - all the instruction
  lexicon: HALOT
  rationale: Torah can mean 'instruction,' but in this covenantal legal listing with
    statutes and judgments, 'law' is the clearest English equivalent. 'According to'
    reflects the prefixed ל in relation to the commanded content.
- source_word: הַחֻקִּים
  chosen: the statutes
  alternatives:
  - the decrees
  lexicon: HALOT
  rationale: A standard rendering for חקים in legal contexts, preserving distinction
    from the surrounding legal terms.
- source_word: הַמִּשְׁפָּטִים
  chosen: the judgments
  alternatives:
  - the rules
  - the ordinances
  lexicon: HALOT
  rationale: '''Judgments'' is formally close and preserves the juridical nuance.
    ''Ordinances'' is possible but less transparent to modern readers.'
- source_word: בְּיַד מֹשֶׁה
  chosen: given through Moses
  alternatives:
  - by the hand of Moses
  - through the hand of Moses
  lexicon: HALOT
  rationale: The idiom 'by the hand of' often denotes agency or mediation. 'Given
    through Moses' expresses the sense clearly in modern English while preserving
    Mosaic mediation.
