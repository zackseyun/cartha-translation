id: 2CH.33.9
reference: 2 Chronicles 33:9
source:
  edition: WLC
  text: וַ/יֶּ֣תַע מְנַשֶּׁ֔ה אֶת יְהוּדָ֖ה וְ/יֹשְׁבֵ֣י יְרוּשָׁלִָ֑ם לַ/עֲשׂ֣וֹת
    רָ֔ע מִן הַ֨/גּוֹיִ֔ם אֲשֶׁר֙ הִשְׁמִ֣יד יְהוָ֔ה מִ/פְּנֵ֖י בְּנֵ֥י יִשְׂרָאֵֽל־־׃פ
translation:
  text: So Manasseh led Judah and the inhabitants of Jerusalem astray, to do more
    evil than the nations whom the LORD had destroyed before the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the Israelites'' or ''the people of Israel.'' Hebrew: ''the sons of
      Israel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּתַע
  chosen: led ... astray
  alternatives:
  - caused to err
  - seduced
  - misled
  lexicon: HALOT
  rationale: The verb from תעה in the Hiphil conveys causing someone to wander or
    go astray. 'Led ... astray' is idiomatic modern English and preserves the causative
    sense better than a flat 'erred.'
- source_word: יְהוּדָה וְיֹשְׁבֵי יְרוּשָׁלִָם
  chosen: Judah and the inhabitants of Jerusalem
  alternatives:
  - Judah and those living in Jerusalem
  - Judah and the residents of Jerusalem
  lexicon: HALOT
  rationale: 'Keeps the corporate object explicit: both the kingdom/population of
    Judah and specifically Jerusalem''s inhabitants. ''Inhabitants'' is a natural
    rendering of the participial construction.'
- source_word: לַעֲשׂוֹת רָע
  chosen: to do ... evil
  alternatives:
  - to act wickedly
  - to do what was evil
  lexicon: HALOT
  rationale: A straightforward infinitive + adjective construction. 'To do evil' is
    concise and close to the Hebrew idiom.
- source_word: מִן הַגּוֹיִם
  chosen: more evil than the nations
  alternatives:
  - worse than the nations
  - beyond the nations in evil
  lexicon: HALOT
  rationale: Here מִן marks comparison after the idea of evil conduct. English requires
    the comparative sense to be made explicit. 'More evil than the nations' preserves
    the comparison without over-paraphrase.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: In this historical context גוים refers to the surrounding nations/canaanite
    peoples, not specifically 'Gentiles' as a later Jewish/Christian contrast term.
- source_word: אֲשֶׁר הִשְׁמִיד יְהוָה
  chosen: whom the LORD had destroyed
  alternatives:
  - that the LORD had annihilated
  - which the LORD had wiped out
  lexicon: HALOT
  rationale: The relative clause refers back to the nations. 'Destroyed' is strong
    but standard and readable for השמיד. The subject is rendered 'the LORD' per house
    style for YHWH.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD.'
- source_word: מִפְּנֵי
  chosen: before
  alternatives:
  - from before
  - from the presence of
  lexicon: HALOT
  rationale: In this conquest context the idiom means driving out/destroying from
    before someone. 'Before' is the most natural concise English equivalent.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Per the gender-accurate principle,
    the masculine form is retained where it has representative force. A smoother collective
    alternative is possible, but the literal form is preserved here with a footnote
    for readability.
