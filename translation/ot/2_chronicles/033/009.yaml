theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and aligns with the
    translation's treatment of the covenant name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered corporate expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  - the children of Israel
  rationale: The Hebrew is grammatically masculine plural with representative force.
    Per the gender-accurate policy, the masculine form may be retained rather than
    neutralized, while a footnote can preserve a more idiomatic inclusive equivalent.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
