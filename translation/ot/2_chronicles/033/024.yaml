id: 2CH.33.24
reference: 2 Chronicles 33:24
source:
  edition: WLC
  text: וַ/יִּקְשְׁר֤וּ עָלָי/ו֙ עֲבָדָ֔י/ו וַ/יְמִיתֻ֖/הוּ בְּ/בֵיתֽ/וֹ׃
translation:
  text: And his servants conspired against him and put him to death in his own house.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּקְשְׁרוּ
  chosen: conspired
  alternatives:
  - formed a conspiracy
  - plotted
  lexicon: HALOT
  rationale: The idiom קשר על commonly means to conspire against someone, especially
    in royal assassination contexts. 'Conspired' is concise, natural English and preserves
    the hostile political sense better than a flatter 'plotted'.
- source_word: עָלָיו
  chosen: against him
  alternatives:
  - upon him
  lexicon: HALOT
  rationale: With קשר, the preposition על marks the target of the conspiracy. 'Against
    him' is the idiomatic and semantically accurate English rendering.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his slaves
  lexicon: HALOT
  rationale: In a royal court context, עבד often denotes royal servants or officials.
    'His servants' is the most direct rendering and fits the narrative context without
    over-specifying rank. 'His slaves' would overstate bonded status here, and 'officials'
    is interpretive beyond what the text explicitly states.
- source_word: וַיְמִיתֻהוּ
  chosen: put him to death
  alternatives:
  - killed him
  - caused him to die
  lexicon: HALOT
  rationale: The Hiphil of מות is causative. 'Put him to death' preserves that causative
    force and the gravity of an assassination better than the simpler 'killed him,'
    while remaining natural English.
- source_word: בְּבֵיתוֹ
  chosen: in his own house
  alternatives:
  - in his house
  - at his house
  lexicon: HALOT
  rationale: 'The preposition ב marks location: ''in.'' Adding ''own'' is a natural
    English way to reflect the possessive suffix and the shocking intimacy of the
    setting without changing the sense.'
