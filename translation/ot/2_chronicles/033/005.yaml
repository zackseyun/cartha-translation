id: 2CH.33.5
reference: 2 Chronicles 33:5
source:
  edition: WLC
  text: וַ/יִּ֥בֶן מִזְבְּח֖וֹת לְ/כָל צְבָ֣א הַ/שָּׁמָ֑יִם בִּ/שְׁתֵּ֖י חַצְר֥וֹת
    בֵּית יְהוָֽה־־׃
translation:
  text: He built altars for all the host of heaven in the two courts of the house
    of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for all the heavenly host.' The Hebrew expression refers to the celestial
      host worshiped in astral religion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: He built
  alternatives:
  - And he built
  - Then he built
  lexicon: HALOT
  rationale: Qal wayyiqtol of בנה, narrating a past action by Manasseh. English simple
    past best fits readable narrative style; the prefixed waw is absorbed into normal
    English narrative flow rather than mechanically rendered as 'and'.
- source_word: מִזְבְּחוֹת
  chosen: altars
  lexicon: HALOT
  rationale: Plural of מזבח, the standard term for sacrificial/incense altars. 'Altars'
    is the direct and conventional equivalent.
- source_word: לְכָל צְבָא הַשָּׁמַיִם
  chosen: for all the host of heaven
  alternatives:
  - for all the heavenly host
  - to all the host of heaven
  lexicon: HALOT
  rationale: צבא השמים refers to the celestial bodies or heavenly powers worshiped
    in astral cults. 'Host of heaven' preserves the established biblical idiom and
    its cultic sense. 'For' reflects לְ naturally in this construction with altars
    built in honor of these beings.
- source_word: בִּשְׁתֵּי
  chosen: in the two
  alternatives:
  - in both
  lexicon: HALOT
  rationale: The dual-related numeral with the plural noun indicates specifically
    two courts. 'The two' is more explicit and formally closer than 'both,' while
    remaining natural English.
- source_word: חַצְרוֹת
  chosen: courts
  alternatives:
  - courtyards
  lexicon: HALOT
  rationale: In temple context חצרות denotes enclosed court areas. 'Courts' is concise
    and idiomatic in biblical architectural language; 'courtyards' is possible but
    slightly less traditional.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the temple of the LORD
  lexicon: HALOT
  rationale: בית יהוה is literally 'house of YHWH.' Following doctrine, יְהוָה is
    rendered 'the LORD.' 'House of the LORD' preserves the Hebrew expression without
    over-interpreting it as 'temple,' though that is the referent.
