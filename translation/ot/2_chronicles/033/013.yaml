theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of the confession כִּי יְהוָה הוּא הָאֱלֹהִים
  chosen_reading: that Yahweh is God
  alternative_readings:
  - that the LORD, he is God
  - that the LORD alone is God
  rationale: The Hebrew expresses Manasseh's recognition of YHWH's deity. The emphatic pronoun is preserved in sense but not woodenly reproduced. Adding 'alone' would make the confession more exclusive than the wording itself requires, so theological tension is not over-resolved.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
