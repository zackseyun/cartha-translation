  from: and he was moved by his plea and heard his supplication, and he brought him back
  to: and he was moved by his plea, heard his supplication, and brought him back
  rationale: The Hebrew source lists God's three responses (he was entreated, he heard, he brought back) in a tight, parallel sequence of waw-consecutive verbs. The current rendering breaks this parallelism by grouping the first two actions ('was moved... and heard') and then starting a new clause for the third ('and he brought...'). This is slightly awkward and subtly separates the final action from the preceding two. Rendering the three verbs as a single parallel series ('was moved..., heard..., and brought...') would create a smoother English sentence that more closely reflects the unified flow of God's response in the original.
