id: 2CH.33.13
reference: 2 Chronicles 33:13
source:
  edition: WLC
  text: וַ/יִּתְפַּלֵּ֣ל אֵלָ֗י/ו וַ/יֵּעָ֤תֶר ל/וֹ֙ וַ/יִּשְׁמַ֣ע תְּחִנָּת֔/וֹ וַ/יְשִׁיבֵ֥/הוּ יְרוּשָׁלִַ֖ם לְ/מַלְכוּת֑/וֹ וַ/יֵּ֣דַע מְנַשֶּׁ֔ה כִּ֥י יְהוָ֖ה ה֥וּא הָֽ/אֱלֹהִֽים׃
translation:
  text: He prayed to him, and he was moved by his entreaty, heard his supplication, and brought him back to Jerusalem to his kingdom. Then Manasseh knew that Yahweh is God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he let himself be entreated by him' / 'he responded favorably to him.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to his kingdom,' that is, to his royal rule or kingship.
    reason: lexical_alternative
  - marker: c
    text: Or 'and he was moved by his plea and heard his supplication, and he brought him back'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּתְפַּלֵּל אֵלָיו
  chosen: He prayed to him
  alternatives:
  - He entreated him
  - He prayed to him for favor
  lexicon: HALOT
  rationale: התפלל in the hitpael commonly means 'to pray.' The indirect object 'to him' is retained to reflect the Hebrew construction and the personal address to God.
- source_word: וַיֵּעָתֶר לוֹ
  chosen: he was moved by his plea
  alternatives:
  - he was entreated by him
  - he responded to him
  - he let himself be entreated by him
  lexicon: HALOT
  rationale: עתר in the niphal can mean 'to be entreated' or 'to respond favorably to supplication.' 'Was moved by his plea' communicates favorable divine response in readable English without over-paraphrasing. The subject is God, continuing from the previous clause.
- source_word: וַיִּשְׁמַע תְּחִנָּתוֹ
  chosen: heard his supplication
  alternatives:
  - heard his plea
  - listened to his entreaty
  lexicon: HALOT
  rationale: תחנה denotes an earnest plea for mercy or favor. 'Supplication' preserves the gravity and prayer context more precisely than the flatter 'prayer.'
- source_word: וַיְשִׁיבֵהוּ יְרוּשָׁלַםִ לְמַלְכוּתוֹ
  chosen: he brought him back to Jerusalem to his kingdom
  alternatives:
  - he restored him to Jerusalem, to his kingdom
  - he returned him to Jerusalem and to his kingship
  lexicon: HALOT
  rationale: שוב in the hiphil means 'cause to return' or 'bring back.' The phrase indicates restoration to Jerusalem and to royal rule. 'To his kingdom' reflects the Hebrew noun מלכות while keeping the wording close to the source; the sense is restoration to his royal reign.
- source_word: וַיֵּדַע מְנַשֶּׁה
  chosen: Then Manasseh knew
  alternatives:
  - And Manasseh knew
  - So Manasseh came to know
  lexicon: HALOT
  rationale: ידע is straightforwardly 'know.' 'Then' captures the narrative consequence implied by the waw-consecutive in natural English.
- source_word: כִּי יְהוָה הוּא הָאֱלֹהִים
  chosen: that the LORD is God
  alternatives:
  - that the LORD, he is God
  - that the LORD alone is God
  lexicon: HALOT
  rationale: Following project doctrine, יהוה is rendered 'the LORD.' The clause is an affirmation of YHWH's true deity. The pronoun הוּא adds emphasis, but English usually conveys this naturally without a separate 'he.' 'The LORD is God' is idiomatic and faithful; 'alone' would over-interpret since it is not explicit in the Hebrew.
