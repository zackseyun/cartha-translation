id: 2CH.33.18
reference: 2 Chronicles 33:18
source:
  edition: WLC
  text: וְ/יֶ֨תֶר דִּבְרֵ֣י מְנַשֶּׁה֮ וּ/תְפִלָּת֣/וֹ אֶל אֱלֹהָי/ו֒ וְ/דִבְרֵי֙ הַֽ/חֹזִ֔ים הַֽ/מְדַבְּרִ֣ים אֵלָ֔י/ו בְּ/שֵׁ֥ם יְהוָ֖ה אֱלֹהֵ֣י יִשְׂרָאֵ֑ל הִנָּ֕/ם עַל דִּבְרֵ֖י מַלְכֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: Now the rest of the acts of Manasseh, and his prayer to his God, and the words of the seers who spoke to him in the name of Yahweh, the God of Israel—behold, they are written among the records of the kings of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the book/annals of the kings of Israel.' The Hebrew citation formula refers to a written royal source.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶתֶר
  chosen: the rest of
  alternatives:
  - the remainder of
  lexicon: HALOT
  rationale: Introduces material not previously narrated; 'the rest of' is idiomatic English for the chronicler's formula.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - accounts
  lexicon: HALOT
  rationale: In the formula 'the rest of the דברי X' in royal summaries, the sense is broader than spoken words and refers to deeds/events/records. 'Acts' is standard and fits the historiographic context.
- source_word: תְפִלָּתוֹ אֶל אֱלֹהָיו
  chosen: his prayer to his God
  alternatives:
  - his prayer to God
  lexicon: HALOT
  rationale: Retains both the possessive on 'prayer' and 'his God.' The preposition אֶל is naturally 'to.' Preserving 'his God' reflects the Hebrew wording and Manasseh's personal turning.
- source_word: הַחֹזִים
  chosen: the seers
  alternatives:
  - the prophets
  - the visionaries
  lexicon: HALOT
  rationale: חֹזִים is a specific prophetic designation, commonly rendered 'seers.' 'Prophets' would be interpretive leveling; 'seers' preserves the source term.
- source_word: הַמְדַבְּרִים אֵלָיו
  chosen: who spoke to him
  alternatives:
  - who were speaking to him
  lexicon: HALOT
  rationale: English relative clause with simple past best fits the narrative summary; the participle functions attributively.
- source_word: בְּשֵׁם יְהוָה
  chosen: in the name of the LORD
  alternatives:
  - on behalf of the LORD
  - by the authority of the LORD
  lexicon: HALOT
  rationale: This is the most direct and established rendering of בְּשֵׁם. It preserves the prophetic-authoritative sense without over-paraphrasing. 'the LORD' follows the doctrine's default for YHWH.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הִנָּם
  chosen: behold, they are
  alternatives:
  - indeed they are
  - see, they are
  lexicon: HALOT
  rationale: The particle draws attention to the written source. 'Behold' preserves the deictic force, though slightly formal; it fits the chronicler's citation formula.
- source_word: עַל דִּבְרֵי מַלְכֵי יִשְׂרָאֵל
  chosen: written in the records of the kings of Israel
  alternatives:
  - in the book of the kings of Israel
  - in the annals of the kings of Israel
  lexicon: HALOT
  rationale: עַל in this citation formula indicates location/reference in a written source. 'Records' communicates a royal chronicle source in readable modern English. 'Written' is supplied in English because the Hebrew formula implies inscription/documentation rather than mere topicality.
