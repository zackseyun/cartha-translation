theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Identity of 'the kings of Israel' in the source citation
  chosen_reading: retain 'the kings of Israel' as written
  alternative_readings:
  - the kings of Judah
  rationale: Although some readers may expect a Judahite source in a Judahite king's notice, the Masoretic text reads 'Israel.' The translation preserves the source text rather than harmonizing it.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, Original-language primacy over translation tradition
