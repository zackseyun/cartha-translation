id: 2CH.33.2
reference: 2 Chronicles 33:2
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה כְּ/תֽוֹעֲבוֹת֙ הַ/גּוֹיִ֔ם אֲשֶׁר֙ הוֹרִ֣ישׁ יְהוָ֔ה מִ/פְּנֵ֖י בְּנֵ֥י יִשְׂרָאֵֽל׃
translation:
  text: He did what was evil in the sight of Yahweh, according to the abominations of the nations whom Yahweh had driven out before the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the Israelites.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: Wayyiqtol of עשה introduces the narrative action. English normally omits the conjunction here for natural style while preserving the past narrative sense.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - evil
  - the evil
  lexicon: HALOT
  rationale: 'The adjective with article functions substantivally after עשה: ''did the evil/what was evil.'' ''What was evil'' is idiomatic English and preserves the moral evaluation.'
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the sight of the LORD
  alternatives:
  - in the eyes of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew evaluative idiom. 'In the sight of the LORD' is clear modern English and preserves the metaphor. יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כְּתוֹעֲבוֹת
  chosen: according to the abominations
  alternatives:
  - like the abominations
  - in accordance with the detestable practices
  lexicon: HALOT
  rationale: כְּ marks comparison or conformity. 'According to the abominations' preserves the close alignment with the nations' practices. 'Abominations' retains the strong cultic-moral force of תועבות better than a softened paraphrase.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: In this historical context גוים refers to the non-Israelite peoples of the land. 'Nations' is the most natural and least misleading rendering here.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - that
  - which
  lexicon: HALOT
  rationale: The relative pronoun refers to people, so 'whom' is the most precise English rendering.
- source_word: הוֹרִישׁ
  chosen: had driven out
  alternatives:
  - dispossessed
  - caused to inherit from
  - expelled
  lexicon: HALOT
  rationale: In Hiphil ירשׁ commonly means to dispossess or drive out inhabitants. Here the context is the removal of prior nations from the land before Israel; 'had driven out' is clear and contextually apt.
- source_word: מִפְּנֵי
  chosen: before
  alternatives:
  - from before
  - from the presence of
  lexicon: HALOT
  rationale: The idiom מִפְּנֵי with a verb of expulsion means 'from before' or 'before.' In English, 'before' after 'driven out' communicates the sense naturally.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' In line with the project's gender-accurate principle, this masculine familial expression is preserved rather than neutralized, though alternatives are possible in smoother English.
