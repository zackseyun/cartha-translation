id: 2CH.33.3
reference: 2 Chronicles 33:3
source:
  edition: WLC
  text: וַ/יָּ֗שָׁב וַ/יִּ֨בֶן֙ אֶת הַ/בָּמ֔וֹת אֲשֶׁ֥ר נִתַּ֖ץ יְחִזְקִיָּ֣הוּ אָבִ֑י/ו
    וַ/יָּ֨קֶם מִזְבְּח֤וֹת לַ/בְּעָלִים֙ וַ/יַּ֣עַשׂ אֲשֵׁר֔וֹת וַ/יִּשְׁתַּ֨חוּ֙
    לְ/כָל צְבָ֣א הַ/שָּׁמַ֔יִם וַֽ/יַּעֲבֹ֖ד אֹתָֽ/ם־־׃
translation:
  text: For he rebuilt the high places that Hezekiah his father had torn down, and
    he set up altars to the Baals, and made Asherah poles, and bowed down to all the
    host of heaven and served them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he built again'; the Hebrew uses two verbs, literally 'he returned and
      built,' expressing that he restored what had been removed.
    reason: lexical_alternative
  - marker: b
    text: '''The Baals'' preserves the Hebrew plural, likely referring to multiple
      local manifestations or images of Baal; some translations simplify to ''Baal.'''
    reason: lexical_alternative
  - marker: c
    text: Or simply 'Asherahs'; the Hebrew term may refer to cultic poles or symbols
      associated with the goddess Asherah.
    reason: lexical_alternative
  - marker: d
    text: '''Host of heaven'' here refers to celestial bodies as objects of worship;
      compare 2 Kings 21:3.'
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּשָׁב וַיִּבֶן
  chosen: he rebuilt
  alternatives:
  - he returned and built
  - he built again
  lexicon: HALOT
  rationale: The sequence of שוב + בנה idiomatically conveys doing again/restoring
    what had been removed. 'Rebuilt' captures the sense in natural English without
    over-translating the two verbs separately.
- source_word: הַבָּמוֹת
  chosen: the high places
  alternatives:
  - the shrines on the high places
  lexicon: HALOT
  rationale: Standard rendering for bamot, referring to elevated cultic sites. 'High
    places' preserves the established cultic sense and remains understandable.
- source_word: נִתַּץ
  chosen: had torn down
  alternatives:
  - had broken down
  - had demolished
  lexicon: HALOT
  rationale: The verb denotes pulling down/demolishing structures. 'Had torn down'
    is vivid and idiomatic in context.
- source_word: יְחִזְקִיָּהוּ אָבִיו
  chosen: Hezekiah his father
  alternatives:
  - his father Hezekiah
  rationale: Both are natural English; this order follows the Hebrew apposition closely
    while remaining readable.
- source_word: וַיָּקֶם מִזְבְּחוֹת לַבְּעָלִים
  chosen: he set up altars to the Baals
  alternatives:
  - he erected altars for the Baals
  - he raised altars to Baal
  lexicon: HALOT
  rationale: הקים means to set up/erect. The plural הבעלים is best preserved as 'the
    Baals,' reflecting multiple local manifestations/titles rather than flattening
    to singular 'Baal'.
- source_word: אֲשֵׁרוֹת
  chosen: Asherah poles
  alternatives:
  - Asherahs
  - wooden images
  lexicon: HALOT
  rationale: The term can denote cultic objects associated with Asherah. 'Asherah
    poles' communicates the likely referent in accessible English while preserving
    the specific cultic association better than the vague 'wooden images.'
- source_word: וַיִּשְׁתַּחוּ
  chosen: bowed down
  alternatives:
  - prostrated himself
  - worshiped
  lexicon: HALOT
  rationale: The verb literally denotes bowing/prostration. 'Bowed down' preserves
    the physical act, while the following 'served' completes the worship sense.
- source_word: לְכָל צְבָא הַשָּׁמַיִם
  chosen: to all the host of heaven
  alternatives:
  - to all the heavenly host
  - to all the stars of heaven
  lexicon: HALOT
  rationale: This phrase refers to the celestial bodies/army of heaven as objects
    of worship. 'Host of heaven' is a clear and established biblical expression; 'heavenly
    host' could be mistaken for angels in some contexts.
- source_word: וַיַּעֲבֹד אֹתָם
  chosen: served them
  alternatives:
  - worshiped them
  lexicon: HALOT
  rationale: עבד in cultic contexts often means serve/worship. 'Served them' preserves
    the lexical distinction from the previous verb and reflects the paired idiom of
    bowing down and serving.
