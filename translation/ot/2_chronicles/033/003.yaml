theological_decisions:
- issue: Rendering of pagan cult terms without interpretive softening
  chosen_reading: Retain specific terms 'high places,' 'the Baals,' and 'Asherah poles'
  alternative_readings:
  - generalized renderings such as 'idols' or 'false gods'
  rationale: The verse catalogs specific forms of apostasy. Using the concrete cultic
    terms preserves the historical and religious detail of the Hebrew text rather
    than importing a broader theological summary.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Meaning of 'host of heaven'
  chosen_reading: Render as celestial host rather than angelic beings
  alternative_readings:
  - heavenly host understood as angels
  rationale: In this context of illicit worship alongside Baals and Asherah objects,
    the phrase most naturally refers to astral worship. The translation avoids introducing
    ambiguity not demanded by the context.
  doctrine_reference: Translation philosophy §§1, 3
