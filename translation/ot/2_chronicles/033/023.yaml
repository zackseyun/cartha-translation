id: 2CH.33.23
reference: 2 Chronicles 33:23
source:
  edition: WLC
  text: וְ/לֹ֤א נִכְנַע֙ מִ/לִּ/פְנֵ֣י יְהוָ֔ה כְּ/הִכָּנַ֖ע מְנַשֶּׁ֣ה אָבִ֑י/ו כִּ֛י ה֥וּא אָמ֖וֹן הִרְבָּ֥ה אַשְׁמָֽה׃
translation:
  text: But he did not humble himself before Yahweh as his father Manasseh humbled himself, for he, Amon, increased guilt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “before Yahweh.”
    reason: alternative_reading
lexical_decisions:
- source_word: נִכְנַע
  chosen: did not humble himself
  alternatives:
  - did not submit himself
  - was not humbled
  lexicon: HALOT
  rationale: The Niphal of כנע here is reflexive/passive in sense, describing Amon's failure to lower himself before God. 'Humble himself' is the most natural English rendering in this penitential context and matches the comparison with Manasseh in the previous narrative.
- source_word: מִלִּפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - before Yahweh
  - in the presence of the LORD
  lexicon: HALOT
  rationale: The idiom לִפְנֵי with prefixed prepositions here denotes being in the presence of or before someone. 'Before the LORD' is concise and idiomatic. Per doctrine, יְהוָה is rendered 'the LORD,' while 'Yahweh' is preserved as an alternative.
- source_word: כְּהִכָּנַע
  chosen: as ... humbled himself
  alternatives:
  - as ... submitted himself
  lexicon: HALOT
  rationale: The comparative כְ plus infinitive construct of כנע sets Manasseh's prior action as the standard of comparison. Repeating 'humbled himself' preserves the lexical link and rhetorical contrast.
- source_word: מְנַשֶּׁה אָבִיו
  chosen: his father Manasseh
  alternatives:
  - Manasseh his father
  lexicon: HALOT
  rationale: English style prefers the possessive before the proper name here. The phrase identifies Manasseh as Amon's father and supplies the comparison.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces an explanatory clause giving the reason or characterization behind the preceding statement. 'For' preserves the explanatory force without overinterpreting the relation.
- source_word: הוּא אָמוֹן
  chosen: he, Amon,
  alternatives:
  - Amon himself
  - he was Amon
  lexicon: HALOT
  rationale: The pronoun plus proper name is emphatic. Rendering it appositionally as 'he, Amon,' preserves the emphasis and the chronicler's pointed identification of the guilty king.
- source_word: הִרְבָּה
  chosen: multiplied
  alternatives:
  - increased
  - added to
  lexicon: HALOT
  rationale: The Hiphil of רבה means to make much/many or increase. 'Multiplied' is vivid and preserves the sense that guilt was not merely present but greatly increased.
- source_word: אַשְׁמָה
  chosen: guilt
  alternatives:
  - guilt offering
  - trespass
  - guiltiness
  lexicon: HALOT
  rationale: In this context the noun denotes culpability, not a sacrificial offering. 'Guilt' is the clearest modern English equivalent and fits the moral evaluation of Amon's conduct.
