id: 2CH.33.25
reference: 2 Chronicles 33:25
source:
  edition: WLC
  text: וַ/יַּכּוּ֙ עַם הָ/אָ֔רֶץ אֵ֥ת כָּל הַ/קֹּֽשְׁרִ֖ים עַל הַ/מֶּ֣לֶךְ אָמ֑וֹן
    וַ/יַּמְלִ֧יכוּ עַם הָ/אָ֛רֶץ אֶת יֹאשִׁיָּ֥הוּ בְנ֖/וֹ תַּחְתָּֽי/ו־־־־־׃פ
translation:
  text: But the people of the land struck down all those who had conspired against
    King Amon, and the people of the land made Josiah his son king in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the conspirators.'
    reason: lexical_alternative
  - marker: b
    text: '''The people of the land'' is a Hebrew expression that can denote the populace
      of the country, possibly with socio-political overtones.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּכּוּ
  chosen: struck down
  alternatives:
  - killed
  - smote
  lexicon: HALOT
  rationale: The Hifil/wayyiqtol of נכה commonly denotes striking, often lethally
    in narrative contexts. Here the object is the conspirators, and the parallel in
    Kings indicates execution, so 'struck down' preserves the violent action without
    over-idiomatizing.
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the common people
  - the people of the country
  lexicon: HALOT
  rationale: This is a recognized socio-political expression in the Hebrew Bible.
    A more interpretive rendering like 'common people' may be possible in some contexts,
    but the more transparent 'people of the land' best preserves the source wording
    and leaves the exact social nuance open.
- source_word: כָּל הַקֹּשְׁרִים
  chosen: all those who had conspired
  alternatives:
  - all the conspirators
  - all who plotted
  lexicon: HALOT
  rationale: The participle from קשר refers to those bound together in a plot or conspiracy.
    'Those who had conspired' makes the participial force natural in English while
    preserving the idea of conspiracy.
- source_word: עַל הַמֶּלֶךְ אָמוֹן
  chosen: against King Amon
  alternatives:
  - against the king, Amon
  - concerning King Amon
  lexicon: HALOT
  rationale: With קשר plus עַל, the sense is conspiracy against someone. 'Against
    King Amon' is the clearest idiomatic English rendering.
- source_word: וַיַּמְלִיכוּ
  chosen: made ... king
  alternatives:
  - crowned
  - caused ... to reign
  lexicon: HALOT
  rationale: The Hifil of מלך means to make someone king or cause him to reign. 'Made
    Josiah ... king' is both accurate and natural; 'crowned' would add a ceremonial
    nuance not explicit in the Hebrew.
- source_word: יֹאשִׁיָּהוּ בְנוֹ
  chosen: Josiah his son
  alternatives:
  - Josiah, his son
  lexicon: HALOT
  rationale: The appositional construction identifies Josiah as Amon's son. English
    can express this smoothly without requiring punctuation in the main text.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - in place of him
  lexicon: HALOT
  rationale: This prepositional expression marks succession or replacement. 'In his
    place' is idiomatic modern English and clearly indicates royal succession after
    Amon.
- source_word: וַ
  chosen: But
  alternatives:
  - And
  - Then
  lexicon: HALOT
  rationale: Although waw-consecutive often simply advances narrative with 'and,'
    here 'but' appropriately signals contrast with the previous verse, where Amon's
    servants killed him; now the people respond against the conspirators.
