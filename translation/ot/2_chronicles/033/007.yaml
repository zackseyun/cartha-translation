id: 2CH.33.7
reference: 2 Chronicles 33:7
source:
  edition: WLC
  text: וַ/יָּ֕שֶׂם אֶת פֶּ֥סֶל הַ/סֶּ֖מֶל אֲשֶׁ֣ר עָשָׂ֑ה בְּ/בֵ֣ית הָ/אֱלֹהִ֗ים
    אֲשֶׁ֨ר אָמַ֤ר אֱלֹהִים֙ אֶל דָּוִיד֙ וְ/אֶל שְׁלֹמֹ֣ה בְנ֔/וֹ בַּ/בַּ֨יִת הַ/זֶּ֜ה
    וּ/בִֽ/ירוּשָׁלִַ֗ם אֲשֶׁ֤ר בָּחַ֨רְתִּי֙ מִ/כֹּל֙ שִׁבְטֵ֣י יִשְׂרָאֵ֔ל אָשִׂ֥ים
    אֶת שְׁמִ֖/י לְ/עֵילֽוֹם־־־־׃
translation:
  text: He put the carved image, the idol that he had made, in the house of God, of
    which God had said to David and to Solomon his son, “In this house and in Jerusalem,
    which I have chosen out of all the tribes of Israel, I will put my name forever.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the carved image of the idol'; the Hebrew uses two closely related
      terms for an idol statue.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: He put
  alternatives:
  - He set
  - He placed
  lexicon: HALOT
  rationale: Common verb שׂים in wayyiqtol narrative form; 'put' is natural modern
    English and sufficiently formal.
- source_word: פֶּסֶל הַסֶּמֶל
  chosen: the carved image, the idol
  alternatives:
  - the carved image of the idol
  - the idol image
  - the graven image, the image
  lexicon: HALOT
  rationale: The paired nouns intensify the object as an illicit cult statue. 'Carved
    image' preserves פֶּסֶל, while 'idol' captures the force of הַסֶּמֶל in context.
    The appositional rendering keeps both Hebrew terms visible rather than collapsing
    them into one English word.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he had made
  alternatives:
  - which he made
  lexicon: HALOT
  rationale: English past perfect fits the relative clause naturally in relation to
    the main past narrative event.
- source_word: בְּבֵית הָאֱלֹהִים
  chosen: in the house of God
  alternatives:
  - in God's house
  - in the temple of God
  lexicon: HALOT
  rationale: Formal enough to preserve בית language; 'temple' is possible but 'house
    of God' better reflects the Hebrew wording and the quotation that follows.
- source_word: אֲשֶׁר אָמַר אֱלֹהִים
  chosen: of which God had said
  alternatives:
  - about which God said
  - concerning which God had spoken
  lexicon: HALOT
  rationale: Links the house of God with the following divine statement. Past perfect
    is used for smooth English sequence.
- source_word: אֶל דָּוִיד וְאֶל שְׁלֹמֹה בְנוֹ
  chosen: to David and to Solomon his son
  alternatives:
  - to David and Solomon his son
  lexicon: HALOT
  rationale: Retains both prepositions for emphasis and preserves filial identification
    of Solomon.
- source_word: בַּבַּיִת הַזֶּה וּבִירוּשָׁלַם
  chosen: In this house and in Jerusalem
  alternatives:
  - In this temple and in Jerusalem
  lexicon: HALOT
  rationale: Maintains the repeated בית motif and the locative pairing of temple and
    city.
- source_word: אֲשֶׁר בָּחַרְתִּי מִכֹּל שִׁבְטֵי יִשְׂרָאֵל
  chosen: which I have chosen out of all the tribes of Israel
  alternatives:
  - which I chose from all the tribes of Israel
  lexicon: HALOT
  rationale: '''Out of'' reflects מן naturally. Present perfect in the quotation communicates
    the abiding result of God''s choice.'
- source_word: אָשִׂים אֶת שְׁמִי
  chosen: I will put my name
  alternatives:
  - I will place my name
  - I will set my name
  lexicon: HALOT
  rationale: Keeps the concrete covenantal idiom rather than interpreting it away
    as 'cause my name to dwell.'
- source_word: לְעֵילֹום
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - perpetually
  lexicon: HALOT
  rationale: Standard idiomatic rendering for לעולם in covenantal declarations.
