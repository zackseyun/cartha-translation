theological_decisions:
- issue: Divine name/title usage
  chosen_reading: God
  alternative_readings:
  - the LORD
  rationale: The Hebrew here uses אֱלֹהִים, not יהוה. The translation therefore renders
    the term as 'God' rather than importing the covenant name.
  doctrine_reference: 'Contested terms table: יְהוָה rendered ''the LORD'' when present'
- issue: Temple theology idiom
  chosen_reading: I will put my name forever
  alternative_readings:
  - I will establish my name forever there
  - I will cause my name to dwell forever
  rationale: The Hebrew idiom speaks of God placing his name in the chosen house/city.
    The translation preserves the idiom rather than resolving it into a fuller theological
    paraphrase.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
