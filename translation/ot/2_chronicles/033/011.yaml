id: 2CH.33.11
reference: 2 Chronicles 33:11
source:
  edition: WLC
  text: וַ/יָּבֵ֨א יְהוָ֜ה עֲלֵי/הֶ֗ם אֶת שָׂרֵ֤י הַ/צָּבָא֙ אֲשֶׁר֙ לְ/מֶ֣לֶךְ אַשּׁ֔וּר
    וַ/יִּלְכְּד֥וּ אֶת מְנַשֶּׁ֖ה בַּ/חֹחִ֑ים וַ/יַּֽאַסְרֻ֨/הוּ֙ בַּֽ/נְחֻשְׁתַּ֔יִם
    וַ/יּוֹלִיכֻ֖/הוּ בָּבֶֽלָ/ה־־׃
translation:
  text: So the LORD brought against them the commanders of the army of the king of
    Assyria, and they captured Manasseh with hooks, bound him with bronze chains,
    and took him to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a hook'; the Hebrew term can denote hooks or thorns, and some understand
      it more generally as a restraint placed on a captive.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Follows the project''s stated default for the divine name YHWH: ''the
    LORD,'' preserving established reverential convention rather than transliteration.'
- source_word: וַיָּבֵא
  chosen: brought
  alternatives:
  - brought in
  - caused to come
  lexicon: HALOT
  rationale: The hiphil of בוא commonly means 'bring' or 'cause to come.' 'Brought
    against them' is natural English and preserves the causative force.
- source_word: עֲלֵיהֶם
  chosen: against them
  alternatives:
  - upon them
  - over them
  lexicon: HALOT
  rationale: With hostile military action, עַל is best rendered 'against' in idiomatic
    English.
- source_word: שָׂרֵי הַצָּבָא
  chosen: the commanders of the army
  alternatives:
  - the captains of the host
  - the army commanders
  lexicon: HALOT
  rationale: שָׂרִים are officials/leaders; in military context 'commanders' is clear
    modern English. הַצָּבָא is 'the army/host.'
- source_word: אֲשֶׁר לְמֶלֶךְ אַשּׁוּר
  chosen: of the king of Assyria
  alternatives:
  - who belonged to the king of Assyria
  - who served the king of Assyria
  lexicon: HALOT
  rationale: The phrase marks possession/association. 'Of the king of Assyria' is
    concise and natural in English.
- source_word: וַיִּלְכְּדוּ
  chosen: captured
  alternatives:
  - seized
  - took
  lexicon: HALOT
  rationale: לכד in military context is 'capture/seize.' 'Captured' best fits the
    arrest of a king by invading forces.
- source_word: בַּחֹחִים
  chosen: with hooks
  alternatives:
  - with a hook
  - with fetters
  lexicon: HALOT
  rationale: חֹחִים literally denotes hooks/thorns. In this context it likely refers
    to hooks used on captives, a known ancient Near Eastern practice. 'With hooks'
    preserves the concrete image. Because some translations take it more generally,
    an alternative is preserved in a footnote.
- source_word: וַיַּאַסְרֻהוּ
  chosen: bound him
  alternatives:
  - imprisoned him
  - tied him
  lexicon: HALOT
  rationale: אסר commonly means 'bind' or 'imprison.' Since the next phrase specifies
    bronze restraints, 'bound him' fits the immediate action.
- source_word: בַּנְחֻשְׁתַּיִם
  chosen: with bronze chains
  alternatives:
  - with bronze shackles
  - with bronze fetters
  lexicon: HALOT
  rationale: The dual/plural form refers to metal restraints, likely for hands/feet.
    'Bronze chains' is idiomatic and understandable, while retaining the material
    'bronze' rather than the more interpretive 'brass.'
- source_word: וַיּוֹלִיכֻהוּ
  chosen: took him
  alternatives:
  - led him
  - brought him
  lexicon: HALOT
  rationale: הלך in hiphil means 'cause to go/lead.' 'Took him to Babylon' is smooth
    English in a prisoner-transfer context.
- source_word: בָּבֶלָה
  chosen: to Babylon
  alternatives:
  - toward Babylon
  lexicon: HALOT
  rationale: Directional he indicates motion toward a place; 'to Babylon' is the standard
    English rendering.
