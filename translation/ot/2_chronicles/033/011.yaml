theological_decisions:
- issue: Divine agency in Assyria's attack
  chosen_reading: The verse presents the LORD as sovereignly bringing Assyrian commanders
    against Judah.
  alternative_readings:
  - A merely permissive sense ('allowed' rather than 'brought')
  rationale: The hiphil verb explicitly attributes the action to the LORD. The translation
    preserves this direct statement of divine judgment without softening it to mere
    permission.
  doctrine_reference: Translation philosophy §1, §3
