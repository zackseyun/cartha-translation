- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered ancestral language in אֱלֹהֵי אֲבֹתָיו
  chosen_reading: the God of his fathers
  alternative_readings:
  - the God of his ancestors
  rationale: The Hebrew explicitly says 'his fathers.' Per the translation philosophy, gender-accurate renderings are preferred over gender-neutral smoothing unless context requires otherwise.
