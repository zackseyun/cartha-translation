id: 2CH.33.12
reference: 2 Chronicles 33:12
source:
  edition: WLC
  text: וּ/כְ/הָצֵ֣ר ל֔/וֹ חִלָּ֕ה אֶת פְּנֵ֖י יְהוָ֣ה אֱלֹהָ֑י/ו וַ/יִּכָּנַ֣ע מְאֹ֔ד מִ/לִּ/פְנֵ֖י אֱלֹהֵ֥י אֲבֹתָֽי/ו־׃
translation:
  text: And when he was in distress, he sought the favor of Yahweh his God and humbled himself greatly before the God of his fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'implored the LORD his God' or 'entreated the LORD his God'; the Hebrew idiom is literally 'softened/appeased the face of.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the God of his fathers'; 'ancestors' is a possible inclusive rendering, but the main text keeps the masculine form present in the source.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְהָצֵר לוֹ
  chosen: And when he was in distress
  alternatives:
  - And when he was in affliction
  - And when he was in trouble
  lexicon: HALOT
  rationale: The clause marks circumstance in time ('when') and uses the root צרר/הצר in a passive-afflictive sense. 'In distress' is natural modern English and preserves the experiential force without over-paraphrase.
- source_word: חִלָּה אֶת־פְּנֵי
  chosen: sought the favor of
  alternatives:
  - entreated
  - implored
  - appeased
  lexicon: HALOT
  rationale: The idiom חלה את־פני commonly means to entreat or seek the favor of someone. 'Sought the favor of' best captures the Hebrew idiom in readable English while preserving its relational and supplicatory sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהָיו
  chosen: his God
  lexicon: HALOT
  rationale: The pronominal suffix is possessive. 'His God' is the plain sense and highlights Manasseh's turning back to the God to whom he is covenantally related.
- source_word: וַיִּכָּנַע
  chosen: and humbled himself
  alternatives:
  - and was humbled
  - and submitted himself
  lexicon: HALOT
  rationale: 'The Niphal of כנע here is best rendered reflexively in context: Manasseh responds by humbling himself. ''Submitted himself'' is possible but weaker in the penitential context.'
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: HALOT
  rationale: מְאֹד intensifies the verb. 'Greatly' is concise, idiomatic, and preserves the strong degree of humility.
- source_word: מִלִּפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: HALOT
  rationale: Literally 'from before the face of,' but in this construction it functions idiomatically as 'before' or 'in the presence of.' 'Before' is the clearest natural rendering.
- source_word: אֱלֹהֵי אֲבֹתָיו
  chosen: the God of his fathers
  alternatives:
  - the God of his ancestors
  lexicon: HALOT
  rationale: The phrase is a standard covenant-historical expression. 'Fathers' is retained as gender-accurate and tradition-sensitive, matching the Hebrew and the project's stated philosophy.
