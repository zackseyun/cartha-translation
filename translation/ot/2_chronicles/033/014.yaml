id: 2CH.33.14
reference: 2 Chronicles 33:14
source:
  edition: WLC
  text: וְ/אַחֲרֵי כֵ֡ן בָּנָ֣ה חוֹמָ֣ה חִֽיצוֹנָ֣ה לְ/עִיר דָּוִ֡יד מַעְרָבָ/ה֩ לְ/גִיח֨וֹן
    בַּ/נַּ֜חַל וְ/לָ/ב֨וֹא בְ/שַׁ֤עַר הַ/דָּגִים֙ וְ/סָבַ֣ב לָ/עֹ֔פֶל וַ/יַּגְבִּיהֶ֖/הָ
    מְאֹ֑ד וַ/יָּ֧שֶׂם שָֽׂרֵי חַ֛יִל בְּ/כָל הֶ/עָרִ֥ים הַ/בְּצֻר֖וֹת בִּ/יהוּדָֽה־׀־־־׃
translation:
  text: After this he built an outer wall for the city of David, west of Gihon in
    the valley, as far as the entrance of the Fish Gate; he went around Ophel and
    made it very high. He also placed military commanders in all the fortified cities
    in Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and to the entrance of the Fish Gate.' The Hebrew expression may be
      read as marking the wall's extent toward that gate.
    reason: lexical_alternative
  - marker: b
    text: '''Ophel'' is a place-name in Jerusalem, likely the raised area south of
      the temple mount.'
    reason: cultural_note
  - marker: c
    text: Or 'encircled Ophel.' The Hebrew verb can emphasize surrounding rather than
      simply going around.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרֵי כֵן
  chosen: After this
  alternatives:
  - Afterward
  - And after this
  lexicon: HALOT
  rationale: Temporal sequence marker introducing the next action in narrative. 'After
    this' is natural modern English and preserves the discourse flow.
- source_word: בָּנָה
  chosen: built
  alternatives:
  - rebuilt
  - constructed
  lexicon: HALOT
  rationale: Basic sense is 'build.' Although the context may imply restoration or
    expansion, the verb itself does not require 'rebuilt,' so 'built' stays closest
    to the Hebrew.
- source_word: חוֹמָה חִיצוֹנָה
  chosen: an outer wall
  alternatives:
  - a wall outside
  - an exterior wall
  lexicon: HALOT
  rationale: The adjective חִיצוֹנָה modifies חוֹמָה to indicate an outer/external
    wall. 'Outer wall' is idiomatic and sufficiently formal.
- source_word: לְעִיר דָּוִיד
  chosen: for the city of David
  alternatives:
  - of the city of David
  - belonging to the city of David
  lexicon: HALOT
  rationale: 'The preposition לְ here is best taken in relation to the building activity:
    he built a wall for the protection/extension of the city of David. English idiom
    favors ''for'' rather than a wooden ''to''.'
- source_word: מַעְרָבָה לְגִיחוֹן בַּנַּחַל
  chosen: west of Gihon in the valley
  alternatives:
  - on the west side of Gihon in the wadi
  - westward to Gihon in the valley
  lexicon: HALOT
  rationale: מַעְרָבָה indicates westward/west of; גיחון is the proper name Gihon;
    נחל can mean valley or wadi. 'Valley' is more accessible English here while retaining
    the topographical sense.
- source_word: וְלָבוֹא בְשַׁעַר הַדָּגִים
  chosen: as far as the entrance of the Fish Gate
  alternatives:
  - and to the entrance of the Fish Gate
  - up to the approach to the Fish Gate
  lexicon: HALOT
  rationale: The infinitive construct with לְבוֹא functions spatially, marking extent
    toward an entrance/approach. 'As far as the entrance of the Fish Gate' communicates
    the boundary naturally.
- source_word: וְסָבַב לָעֹפֶל
  chosen: he went around Ophel
  alternatives:
  - and encircled Ophel
  - and it went around Ophel
  lexicon: HALOT
  rationale: The verb סבב means to go around, surround, or encircle. The subject is
    still Manasseh in the narrative sequence, though the wall is conceptually involved.
    'He went around Ophel' keeps the verbal sequence straightforward in English.
- source_word: הָעֹפֶל
  chosen: Ophel
  alternatives:
  - the Ophel mound
  lexicon: HALOT
  rationale: A known Jerusalem place-name; transliterated per project policy for names.
    No explanatory expansion is needed in the main text.
- source_word: וַיַּגְבִּיהֶהָ מְאֹד
  chosen: made it very high
  alternatives:
  - raised it very high
  - made it exceedingly high
  lexicon: HALOT
  rationale: The Hiphil of גבה means to make high/raise. The feminine suffix refers
    back to the wall. 'Made it very high' is clear, natural, and preserves the intensifier
    מְאֹד.
- source_word: וַיָּשֶׂם
  chosen: He also placed
  alternatives:
  - and he set
  - and he stationed
  lexicon: HALOT
  rationale: Common verb 'set/place.' 'Also' reflects the additive narrative progression
    in English, though not as a separate Hebrew word.
- source_word: שָׂרֵי חַיִל
  chosen: military commanders
  alternatives:
  - captains of the army
  - officers of valor
  - army commanders
  lexicon: HALOT
  rationale: The phrase denotes military officials/commanders. 'Military commanders'
    is clear modern English without archaic military terminology.
- source_word: בְּכָל הֶעָרִים הַבְּצֻרוֹת
  chosen: in all the fortified cities
  alternatives:
  - in every fortified city
  - throughout all the fortified towns
  lexicon: HALOT
  rationale: בְּכָל plus plural noun indicates distribution across the fortified urban
    centers. 'Cities' is the standard rendering for עָרִים here.
- source_word: בִּיהוּדָה
  chosen: in Judah
  alternatives:
  - throughout Judah
  lexicon: HALOT
  rationale: Geographical designation; simple locative rendering is sufficient and
    natural.
