id: 2CH.33.17
reference: 2 Chronicles 33:17
source:
  edition: WLC
  text: אֲבָל֙ ע֣וֹד הָ/עָ֔ם זֹבְחִ֖ים בַּ/בָּמ֑וֹת רַ֖ק לַ/יהוָ֥ה אֱלֹהֵי/הֶֽם׃
translation:
  text: Nevertheless, the people still sacrificed at the high places, but only to
    the LORD their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'However, the people were still offering sacrifices at the high places,
      only to the LORD their God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבָל
  chosen: Nevertheless
  alternatives:
  - But
  - However
  lexicon: HALOT
  rationale: Marks a concessive contrast with the preceding reforms; 'Nevertheless'
    captures the adversative force with slightly elevated but still natural English.
- source_word: עוֹד
  chosen: still
  alternatives:
  - yet
  - again
  lexicon: HALOT
  rationale: 'Conveys ongoing continuation: despite prior changes, this practice persisted.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: Standard rendering for עָם in narrative context; refers collectively
    to the nation.
- source_word: זֹבְחִים
  chosen: sacrificed
  alternatives:
  - were sacrificing
  - offered sacrifices
  lexicon: HALOT
  rationale: English simple past fits the narrative summary. 'Sacrificed' directly
    represents the participial verbal idea in context.
- source_word: בַּבָּמוֹת
  chosen: at the high places
  alternatives:
  - on the high places
  lexicon: HALOT
  rationale: '''High places'' is the established and accurate term for בָּמוֹת, referring
    to local elevated worship sites. ''At'' is more idiomatic in English than a strictly
    literal ''in/on'' here.'
- source_word: רַק
  chosen: but only
  alternatives:
  - only
  - except that
  lexicon: HALOT
  rationale: 'Signals limitation or qualification: the people''s sacrifices at the
    high places were restricted in object, not location. ''But only'' preserves the
    corrective nuance after the first clause.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
    The preposition indicates the recipient/object of worship.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  alternatives:
  - the God of them
  lexicon: HALOT
  rationale: Construct with pronominal suffix is naturally rendered 'their God,' identifying
    the LORD as the God belonging to the people.
