theological_decisions:
- issue: Rendering of the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of the clause about worship at the high places
  chosen_reading: The verse states that the people continued sacrificing at unauthorized
    high places, though the sacrifices were directed only to the LORD.
  alternative_readings:
  - The people sacrificed only at high places dedicated to the LORD
  rationale: 'The Hebrew syntax places the limitation on the object of sacrifice (''only
    to the LORD their God''), not on the location. This preserves the Chronicler''s
    tension: reform was incomplete because the high places remained in use, even if
    not for foreign gods.'
