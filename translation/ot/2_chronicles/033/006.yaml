id: 2CH.33.6
reference: 2 Chronicles 33:6
source:
  edition: WLC
  text: וְ/הוּא֩ הֶעֱבִ֨יר אֶת בָּנָ֤י/ו בָּ/אֵשׁ֙ בְּ/גֵ֣י בֶן הִנֹּ֔ם וְ/עוֹנֵ֤ן וְ/נִחֵשׁ֙ וְֽ/כִשֵּׁ֔ף וְ/עָ֥שָׂה א֖וֹב וְ/יִדְּעוֹנִ֑י הִרְבָּ֗ה לַ/עֲשׂ֥וֹת הָ/רַ֛ע בְּ/עֵינֵ֥י יְהוָ֖ה לְ/הַכְעִיסֽ/וֹ־־׃
translation:
  text: He made his sons pass through the fire in the Valley of the Son of Hinnom, practiced soothsaying and divination and sorcery, and dealt with mediums and spiritists. He did much evil in the eyes of Yahweh, provoking him to anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'sacrificed his sons in the fire.' The Hebrew idiom is literally 'made his sons pass through the fire.'
    reason: lexical_alternative
  - marker: b
    text: '''Mediums and spiritists'' renders Hebrew terms for practitioners associated with consulting the dead or spirits.'
    reason: cultural_note
lexical_decisions:
- source_word: הֶעֱבִיר אֶת־בָּנָיו בָּאֵשׁ
  chosen: made his sons pass through the fire
  alternatives:
  - burned his sons in the fire
  - caused his sons to pass through the fire
  lexicon: HALOT
  rationale: The Hiphil of עבר with 'through the fire' is the established idiom for child-sacrifice/child-offering rites, but the literal wording should be preserved rather than making the interpretation overly explicit. 'Made ... pass through the fire' keeps the Hebrew idiom while remaining understandable.
- source_word: בְּגֵי בֶן־הִנֹּם
  chosen: in the Valley of the Son of Hinnom
  alternatives:
  - in the valley of Ben-hinnom
  lexicon: HALOT
  rationale: A transparent translation of the toponym preserves the Hebrew sense while retaining the proper name Hinnom by transliteration. Capitalizing 'Valley' reflects its place-name function.
- source_word: וְעוֹנֵן
  chosen: practiced soothsaying
  alternatives:
  - practiced augury
  - practiced divination
  lexicon: HALOT
  rationale: The verb denotes omen-reading/soothsaying. Since נחשׁ follows in the same list, rendering this also as 'divination' would blur the distinction between the terms; 'soothsaying' preserves a separate occult practice in readable English.
- source_word: וְנִחֵשׁ
  chosen: divination
  alternatives:
  - interpreted omens
  - practiced enchantment
  lexicon: HALOT
  rationale: This verb commonly refers to divinatory or omen-interpreting practices. In coordination with עונן and כשף, 'divination' is a natural English rendering that distinguishes it from sorcery while conveying illicit occult practice.
- source_word: וְכִשֵּׁף
  chosen: sorcery
  alternatives:
  - practiced sorcery
  - used magic
  lexicon: HALOT
  rationale: The verb refers to magical arts/spell-casting. 'Sorcery' is concise, idiomatic, and preserves the gravity of the prohibited practice.
- source_word: וְעָשָׂה אוֹב וְיִדְּעוֹנִי
  chosen: dealt with mediums and spiritists
  alternatives:
  - consulted mediums and spiritists
  - appointed mediums and spiritists
  - practiced as a medium and spiritist
  lexicon: HALOT
  rationale: The idiom 'made/did an ʾov and a yiddeʿoni' is difficult woodenly. In context it denotes involvement with necromantic practitioners or practices. 'Dealt with' is broad enough to cover employing/consulting/engaging such practitioners without overcommitting to one narrower interpretation. 'Mediums and spiritists' is standard modern English for אוֹב and יִדְּעוֹנִי.
- source_word: הִרְבָּה לַעֲשׂוֹת
  chosen: He multiplied doing
  alternatives:
  - He did much
  - He greatly increased in doing
  - He did more and more
  lexicon: HALOT
  rationale: The Hiphil of רבה plus infinitive expresses abundance/intensification. 'Multiplied doing' is slightly marked English but preserves the force of deliberate excess better than the flatter 'did much.'
- source_word: הָרַע בְּעֵינֵי יְהוָה
  chosen: what was evil in the eyes of the LORD
  alternatives:
  - evil in the sight of the LORD
  - what was evil before the LORD
  lexicon: HALOT
  rationale: This is a standard evaluative formula. 'In the eyes of' closely reflects the Hebrew idiom while remaining natural. יְהוָה is rendered 'the LORD' per doctrine.
- source_word: לְהַכְעִיסוֹ
  chosen: provoking him to anger
  alternatives:
  - to provoke him
  - to anger him
  lexicon: HALOT
  rationale: 'The infinitive expresses result/purpose: his actions were such as to provoke YHWH. ''Provoking him to anger'' makes the causative nuance explicit and reads naturally in English.'
