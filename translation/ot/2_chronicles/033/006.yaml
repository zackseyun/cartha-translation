theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make the child-sacrifice implication explicit
  chosen_reading: Retain the idiom 'made his sons pass through the fire' in the main text
  alternative_readings:
  - burned his sons as an offering
  - sacrificed his sons in the fire
  rationale: The Hebrew idiom strongly implies a sacrificial rite, but the translation philosophy prefers not to paraphrase beyond what the source text explicitly says. The more explicit interpretation is preserved as an alternative rather than imported into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
