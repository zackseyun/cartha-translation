theological_decisions:
- issue: Referent of the plural subject in 'they did not listen'
  chosen_reading: The plural refers to Manasseh and his people together.
  alternative_readings:
  - The plural refers only to the people, with Manasseh named separately as an addressee.
  rationale: The Hebrew names two addressees ('to Manasseh and to his people') followed by a plural verb ('they did not listen'). The most straightforward reading is that both Manasseh and his people failed to listen. The English 'they' preserves this without over-specification.
