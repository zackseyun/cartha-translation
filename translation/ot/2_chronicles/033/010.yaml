id: 2CH.33.10
reference: 2 Chronicles 33:10
source:
  edition: WLC
  text: וַ/יְדַבֵּ֧ר יְהוָ֛ה אֶל מְנַשֶּׁ֥ה וְ/אֶל עַמּ֖/וֹ וְ/לֹ֥א הִקְשִֽׁיבוּ־־׃
translation:
  text: And Yahweh spoke to Manasseh and to his people, but they did not listen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heed' or 'pay attention.' The Hebrew verb can carry the sense of attentive listening that implies response.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The verb דבר in the piel commonly means 'speak' or 'speak to.' 'Spoke' is the most natural English rendering here and fits the construction with אֶל ('to'). 'Said' is possible but less precise with the preposition.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech; 'to' is the standard and idiomatic English equivalent.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Personal names are transliterated by standard English convention.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his nation
  lexicon: HALOT
  rationale: עַם means 'people' in the sense of a people-group or subjects. With the 3ms suffix, 'his people' naturally refers to Manasseh's people, that is, the people under his rule. 'Nation' is possible but less direct and less common in this narrative context.
- source_word: וְלֹא
  chosen: but they did not
  alternatives:
  - and they did not
  lexicon: HALOT
  rationale: 'The conjunction plus negation can be rendered simply ''and not,'' but in English the adversative sense is clearer: the LORD spoke, yet they did not respond appropriately. ''But'' brings out the contrast without adding content beyond the discourse flow.'
- source_word: הִקְשִׁיבוּ
  chosen: listen
  alternatives:
  - pay attention
  - heed
  - obey
  lexicon: HALOT
  rationale: קשב in the hiphil means to pay attention, listen attentively, or heed. 'Listen' is the clearest modern English choice here. 'Heed' is a viable alternative with a stronger obedience nuance, but the immediate sense is refusal to listen to the LORD's warning.
