id: 2CH.33.21
reference: 2 Chronicles 33:21
source:
  edition: WLC
  text: בֶּן עֶשְׂרִ֧ים וּ/שְׁתַּ֛יִם שָׁנָ֖ה אָמ֣וֹן בְּ/מָלְכ֑/וֹ וּ/שְׁתַּ֣יִם
    שָׁנִ֔ים מָלַ֖ךְ בִּֽ/ירוּשָׁלִָֽם־׃
translation:
  text: Amon was twenty-two years old when he became king, and he reigned two years
    in Jerusalem.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וּשְׁתַּיִם שָׁנָה
  chosen: was twenty-two years old
  alternatives:
  - was a son of twenty-two years
  lexicon: HALOT
  rationale: The Hebrew age idiom literally reads 'a son of twenty-two years,' but
    standard English expresses this as 'was twenty-two years old.' This is a routine
    idiomatic adjustment consistent with optimal equivalence.
- source_word: אָמ֣וֹן
  chosen: Amon
  rationale: Personal names are transliterated rather than translated, following project
    policy.
- source_word: בְּמָלְכוֹ
  chosen: when he became king
  alternatives:
  - at his becoming king
  - when he began to reign
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of מלך marks the time of
    accession. 'When he became king' is natural English and accurately conveys the
    accession sense.
- source_word: וּשְׁתַּיִם שָׁנִים
  chosen: two years
  lexicon: HALOT
  rationale: Straightforward cardinal number plus noun construction indicating the
    duration of reign.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb מלך in this context denotes exercising kingship over a period;
    'he reigned' is the standard and most precise English rendering.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  rationale: Locative preposition with place name, indicating the seat/location of
    his reign.
