id: 2CH.33.1
reference: 2 Chronicles 33:1
source:
  edition: WLC
  text: בֶּן שְׁתֵּ֥ים עֶשְׂרֵ֛ה שָׁנָ֖ה מְנַשֶּׁ֣ה בְ/מָלְכ֑/וֹ וַ/חֲמִשִּׁ֤ים וְ/חָמֵשׁ֙
    שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָֽם־׃
translation:
  text: Manasseh was twelve years old when he began to reign, and he reigned fifty-five
    years in Jerusalem.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן שְׁתֵּים עֶשְׂרֵה שָׁנָה
  chosen: was twelve years old
  alternatives:
  - was a son of twelve years
  lexicon: HALOT
  rationale: This is the standard Hebrew age formula. A literal rendering ('son of
    twelve years') is unnatural in English; 'was twelve years old' preserves the sense
    accurately.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: בְמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - when he became king
  - at his reigning
  lexicon: HALOT
  rationale: In this regnal formula, the infinitive/verb construction indicates the
    time of accession. 'When he began to reign' is idiomatic and closely matches the
    Hebrew sense.
- source_word: וַחֲמִשִּׁים וְחָמֵשׁ שָׁנָה
  chosen: fifty-five years
  alternatives:
  - fifty and five years
  lexicon: HALOT
  rationale: Modern English expresses the compound number as 'fifty-five.' The more
    literal coordinate form is preserved in sense but not in archaic wording.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  - he ruled as king
  lexicon: HALOT
  rationale: The verb מלך in this context denotes royal reign. 'He reigned' is the
    standard concise English equivalent in regnal notices.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: The preposition ב marks location; 'in Jerusalem' is the straightforward
    rendering.
