id: 2CH.33.4
reference: 2 Chronicles 33:4
source:
  edition: WLC
  text: וּ/בָנָ֥ה מִזְבְּח֖וֹת בְּ/בֵ֣ית יְהוָ֑ה אֲשֶׁר֙ אָמַ֣ר יְהוָ֔ה בִּ/ירוּשָׁלִַ֥ם
    יִֽהְיֶה שְּׁמִ֖/י לְ/עוֹלָֽם־׃
translation:
  text: He built altars in the house of the LORD, of which the LORD had said, “In
    Jerusalem my name will be forever.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the temple of the LORD.” Literally, “in the house of the LORD.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “my name will be forever”; compare the common biblical expression
      “my name will be there forever.”'
    reason: cross_reference
lexical_decisions:
- source_word: וּבָנָה
  chosen: He built
  alternatives:
  - And he built
  lexicon: HALOT
  rationale: Qal perfect 3ms of בנה means 'built.' The prefixed conjunction can be
    rendered simply in English narrative without 'and' for smoother modern style,
    while retaining the sequential sense.
- source_word: מִזְבְּחוֹת
  chosen: altars
  lexicon: HALOT
  rationale: Plural of מִזְבֵּחַ, the standard term for sacrificial altars. 'Altars'
    is the direct and natural rendering.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת literally means 'house'; in this context it refers to the temple.
    'House of the LORD' preserves the Hebrew expression while remaining clear in English.
    Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'The divine name follows the project''s contested-terms policy: render
    יְהוָה as ''the LORD'' rather than transliterating the name.'
- source_word: אֲשֶׁר
  chosen: of which
  alternatives:
  - about which
  - concerning which
  - where
  lexicon: HALOT
  rationale: The relative particle introduces the clause modifying 'the house of the
    LORD.' 'Of which' fits the English construction with 'had said' and preserves
    the connection to the house/temple. 'Where' would be more idiomatic but less formally
    tied to the antecedent.
- source_word: אָמַר יְהוָה
  chosen: the LORD had said
  alternatives:
  - the LORD said
  lexicon: HALOT
  rationale: English past perfect clarifies that the divine statement preceded Manasseh's
    action in the narrative. This is an English discourse choice, not a distinct Hebrew
    tense form.
- source_word: בִּירוּשָׁלִַם
  chosen: In Jerusalem
  lexicon: HALOT
  rationale: The preposition and place name are straightforwardly rendered. Fronting
    the phrase in the quotation matches the Hebrew word order and emphasis.
- source_word: יִהְיֶה שְּׁמִי
  chosen: my name will be
  alternatives:
  - my name shall be
  lexicon: HALOT
  rationale: The clause literally says 'my name will be.' This preserves the Hebrew
    wording without importing the fuller idiom from parallel passages ('my name shall
    be there').
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  lexicon: HALOT
  rationale: לְעוֹלָם commonly denotes enduring duration. 'Forever' is natural modern
    English and suitably weighty here.
