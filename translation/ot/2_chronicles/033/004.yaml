theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine explicitly sets 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and longstanding biblical English
    convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to expand 'my name will be' to the interpretive idiom 'my name will
    be there'
  chosen_reading: my name will be
  alternative_readings:
  - my name will be there
  rationale: The Hebrew text in this verse does not include 'there' (שָׁם). To avoid
    importing wording from parallel formulations elsewhere, the translation preserves
    the text as given while allowing readers to infer the temple-presence idiom from
    context.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy
    over translation tradition; Never paraphrase beyond what the source text warrants.'
