theological_decisions:
- issue: Nature of Manasseh's repentance in הִכָּנְעוֹ
  chosen_reading: before he humbled himself
  alternative_readings:
  - before he was humbled
  rationale: The Hebrew form naturally supports a reflexive/intransitive sense, fitting
    the Chronicler's emphasis on Manasseh's repentance without importing a fuller
    theology of conversion than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
