id: 2CH.33.19
reference: 2 Chronicles 33:19
source:
  edition: WLC
  text: וּ/תְפִלָּת֣/וֹ וְ/הֵֽעָתֶר ל/וֹ֮ וְ/כָל חַטָּאת֣/וֹ וּ/מַעְל/וֹ֒ וְ/הַ/מְּקֹמ֗וֹת
    אֲשֶׁר֩ בָּנָ֨ה בָ/הֶ֤ם בָּמוֹת֙ וְ/הֶעֱמִיד֙ הָ/אֲשֵׁרִ֣ים וְ/הַ/פְּסִלִ֔ים לִ/פְנֵ֖י
    הִכָּנְע֑/וֹ הִנָּ֣/ם כְּתוּבִ֔ים עַ֖ל דִּבְרֵ֥י חוֹזָֽי־־׃
translation:
  text: And his prayer, and how he was entreated, and all his sin and his unfaithfulness,
    and the places where he built high places and set up the Asherim and the carved
    images before he humbled himself—behold, they are written in the records of the
    seers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Asherah poles.' The Hebrew term may refer to cultic objects associated
      with Asherah.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the words of Hozai.' The final phrase may preserve a proper name
      rather than mean 'the seers.'
    reason: alternative_reading
lexical_decisions:
- source_word: תְפִלָּתוֹ
  chosen: his prayer
  alternatives:
  - his plea
  lexicon: HALOT
  rationale: Standard rendering of תְּפִלָּה as 'prayer'; 'plea' is possible in context
    of supplication, but 'prayer' is broader and more natural here.
- source_word: הֵעָתֶר לוֹ
  chosen: how he was entreated
  alternatives:
  - how God responded to him
  - his being heard
  lexicon: HALOT
  rationale: The Niphal/related nominal form from עתר here refers to favorable response
    to prayer. The passive English 'he was entreated' preserves the concise Hebrew
    expression and avoids adding an explicit subject not stated in this clause.
- source_word: כָל חַטָּאתוֹ
  chosen: all his sin
  alternatives:
  - all his sins
  - all his sinfulness
  lexicon: HALOT
  rationale: Although English often prefers plural, the Hebrew singular can function
    collectively. 'All his sin' preserves the singular form while still conveying
    the totality of wrongdoing.
- source_word: מַעְלוֹ
  chosen: his unfaithfulness
  alternatives:
  - his trespass
  - his faithlessness
  - his breach of faith
  lexicon: HALOT
  rationale: מעל commonly denotes breach of faith or unfaithfulness, often with covenantal
    overtones. 'Unfaithfulness' is clear modern English and preserves the moral-religious
    force better than the more technical 'trespass'.
- source_word: הַמְּקֹמוֹת
  chosen: the places
  alternatives:
  - the sites
  lexicon: HALOT
  rationale: A straightforward rendering of מקום in the plural. 'Places' is idiomatic
    and leaves the following description to specify their cultic significance.
- source_word: בָּמוֹת
  chosen: high places
  lexicon: HALOT
  rationale: Established and accurate rendering for illicit/local cultic shrines in
    the Hebrew Bible.
- source_word: הֶעֱמִיד
  chosen: set up
  alternatives:
  - erected
  - installed
  lexicon: HALOT
  rationale: '''Set up'' is natural modern English for causing cult objects to stand,
    without sounding overly formal.'
- source_word: הָאֲשֵׁרִים
  chosen: the Asherim
  alternatives:
  - Asherah poles
  lexicon: HALOT
  rationale: The Hebrew plural likely refers to cultic objects associated with Asherah.
    'Asherim' transliterates the term without over-specifying form; 'Asherah poles'
    is interpretive and worth preserving in a footnote.
- source_word: הַפְּסִלִים
  chosen: the carved images
  alternatives:
  - the idols
  - the graven images
  lexicon: HALOT
  rationale: פסילים are carved cult images. 'Carved images' is both accurate and readable;
    'idols' captures function but loses the concrete lexical sense.
- source_word: לִפְנֵי הִכָּנְעוֹ
  chosen: before he humbled himself
  alternatives:
  - before his humbling himself
  - before he was humbled
  lexicon: HALOT
  rationale: The infinitive construct with preposition marks prior time. 'Before he
    humbled himself' best captures the reflexive sense and the narrative emphasis
    on Manasseh's repentance.
- source_word: הִנָּם
  chosen: behold, they are
  alternatives:
  - indeed they are
  - see, they are
  lexicon: HALOT
  rationale: הנם is a deictic-presentative particle. 'Behold' preserves the formal
    literary tone of the chronicler; though somewhat elevated, it remains understandable.
- source_word: כְּתוּבִים
  chosen: written
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: Basic sense is 'written'; in context it implies archival recording, but
    the simpler term preserves the Hebrew wording.
- source_word: עַל דִּבְרֵי חוֹזָי
  chosen: in the records of the seers
  alternatives:
  - upon the words of Hozai
  - in the words/acts of the seers
  lexicon: HALOT
  rationale: 'דברי in source citations often means ''records/annals/acts.'' חוֹזָי
    is traditionally difficult: it may be a proper name (''Hozai'') or a plural/common
    noun related to ''seers.'' Given the likely sense in context and parallel source
    formulas, ''the records of the seers'' is the clearest main-text rendering, while
    the proper-name alternative should be preserved in a footnote.'
