id: 2CH.10.19
reference: 2 Chronicles 10:19
source:
  edition: WLC
  text: וַ/יִּפְשְׁע֤וּ יִשְׂרָאֵל֙ בְּ/בֵ֣ית דָּוִ֔יד עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה׃ס
translation:
  text: So Israel has been in rebellion against the house of David to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Israel rebelled against the house of David to this day.' The Hebrew
      verb can be rendered as a simple past ('rebelled') or as emphasizing the continuing
      state ('has been in rebellion').
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְשְׁעוּ
  chosen: has been in rebellion
  alternatives:
  - rebelled
  - broke away
  - transgressed
  lexicon: HALOT
  rationale: The verb פשע denotes rebellion or revolt, especially against authority.
    In this historical-political context, 'has been in rebellion' captures both the
    revolt sense and the continuing state implied by the clause 'to this day.' 'Broke
    away' is interpretive and narrower; 'transgressed' is too general and moralized
    for this context.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Here 'Israel' refers to the northern tribes/corporate nation in distinction
    from the Davidic house. The proper name should be transliterated rather than expanded
    interpretively in the main text.
- source_word: בְּבֵית דָּוִיד
  chosen: against the house of David
  alternatives:
  - from the house of David
  - against David's house
  lexicon: HALOT
  rationale: With פשע, the preposition ב can mark the party against whom one rebels.
    'Against the house of David' is the most natural English rendering and preserves
    the dynastic sense of 'house.' 'From the house of David' reflects the political
    separation but is less direct to the Hebrew construction.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is a standard idiom meaning the condition continued up to the writer's
    present perspective. 'To this day' is idiomatic modern English.
