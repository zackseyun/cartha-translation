id: 2CH.10.5
reference: 2 Chronicles 10:5
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲלֵ/הֶ֗ם ע֛וֹד שְׁלֹ֥שֶׁת יָמִ֖ים וְ/שׁ֣וּבוּ אֵלָ֑/י וַ/יֵּ֖לֶךְ
    הָ/עָֽם׃ס
translation:
  text: And he said to them, “Come back to me in three days.” So the people went away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'yet three days, and return to me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form of אמר introducing direct speech. 'And
    he said' preserves the Hebrew narrative flow without overinterpreting discourse
    nuance.
- source_word: אֲלֵהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Direct object of speech with אל plus pronominal suffix, naturally rendered
    'to them.'
- source_word: עוֹד שְׁלֹשֶׁת יָמִים
  chosen: in three days
  alternatives:
  - for three more days
  - yet three days
  lexicon: HALOT
  rationale: The Hebrew literally reads 'yet/again three days,' an idiom meaning a
    delay of three days before returning. In idiomatic English within the command
    that follows, 'in three days' best conveys the intended time reference. The more
    literal alternatives are possible but less natural here.
- source_word: וְשׁוּבוּ
  chosen: Come back
  alternatives:
  - return
  lexicon: HALOT
  rationale: Imperative plural of שוב. 'Come back' fits the deictic orientation created
    by 'to me' and is natural modern English; 'return' is a viable more formal alternative.
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Preposition plus first person singular suffix, specifying the destination
    of the return.
- source_word: וַיֵּלֶךְ הָעָם
  chosen: So the people went away
  alternatives:
  - And the people went
  - And the people departed
  lexicon: HALOT
  rationale: Although the verb is morphologically singular, the subject 'the people'
    is a collective noun and takes singular agreement in Hebrew. English idiom prefers
    plural sense with 'the people went away.' 'So' captures the sequential result
    of the command.
