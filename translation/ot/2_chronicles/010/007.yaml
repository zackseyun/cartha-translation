id: 2CH.10.7
reference: 2 Chronicles 10:7
source:
  edition: WLC
  text: וַ/יְדַבְּר֨וּ אֵלָ֜י/ו לֵ/אמֹ֗ר אִם תִּֽהְיֶ֨ה לְ/ט֜וֹב לְ/הָ/עָ֤ם הַ/זֶּה֙
    וּ/רְצִיתָ֔/ם וְ/דִבַּרְתָּ֥ אֲלֵ/הֶ֖ם דְּבָרִ֣ים טוֹבִ֑ים וְ/הָי֥וּ לְ/ךָ֛ עֲבָדִ֖ים
    כָּל הַ/יָּמִֽים־־׃
translation:
  text: They spoke to him, saying, “If you will be good to this people, and if you
    please them and speak good words to them, then they will be your servants all
    the days.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “if you show them favor.” The Hebrew verb can carry the sense of being
      pleased with someone or treating them favorably.
    reason: lexical_alternative
  - marker: b
    text: Or “they will serve you continually.”
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּהְיֶה לְטוֹב
  chosen: you will be good
  alternatives:
  - you will be kind
  - you will act for the good
  lexicon: HALOT
  rationale: The idiom with היה + לְ + טוֹב expresses being or becoming beneficial/good
    toward someone. 'Be good' is concise and natural in English while preserving the
    relational sense; 'kind' is possible but slightly narrows the broader idea of
    beneficent rule.
- source_word: לְהָעָם הַזֶּה
  chosen: to this people
  alternatives:
  - to this nation
  - for this people
  lexicon: HALOT
  rationale: עָם commonly means 'people' in a collective political/social sense. 'This
    people' matches the demonstrative force and the immediate political context better
    than 'nation.' The preposition is rendered 'to' with the preceding idiom 'be good
    to.'
- source_word: וּרְצִיתָם
  chosen: you please them
  alternatives:
  - you satisfy them
  - you accept them
  - you show them favor
  lexicon: HALOT
  rationale: From רצה, the form here most naturally means winning their favor / pleasing
    them in context. 'Please them' fits the sequence of conciliatory actions advised
    to Rehoboam. 'Show them favor' is possible, but the object suffix and parallelism
    with speaking good words favors the effect on the people.
- source_word: וְדִבַּרְתָּ אֲלֵהֶם דְּבָרִים טוֹבִים
  chosen: and speak good words to them
  alternatives:
  - and speak kindly to them
  - and speak favorable words to them
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the lexical repetition of דבר
    / דברים and טוב. 'Speak kindly' is smoother but compresses the Hebrew expression
    more than necessary.
- source_word: וְהָיוּ לְךָ עֲבָדִים
  chosen: then they will be your servants
  alternatives:
  - then they will be your slaves
  - then they will serve you
  lexicon: HALOT
  rationale: עֲבָדִים can denote servants or slaves depending on context. Here the
    setting is political allegiance of free subjects to a king, not chattel bondage,
    so 'servants' best conveys loyal service without importing a stronger institution
    than the context warrants. 'Serve you' is idiomatic but loses the predicate noun
    structure.
- source_word: כָּל הַיָּמִים
  chosen: all the days
  alternatives:
  - always
  - all your days
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'all the days.' This preserves the source
    phrasing and leaves implicit the sense of enduring duration. 'Always' is acceptable
    but less textually transparent.
