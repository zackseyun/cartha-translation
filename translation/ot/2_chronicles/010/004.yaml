id: 2CH.10.4
reference: 2 Chronicles 10:4
source:
  edition: WLC
  text: אָבִ֖י/ךָ הִקְשָׁ֣ה אֶת עֻלֵּ֑/נוּ וְ/עַתָּ֡ה הָקֵל֩ מֵ/עֲבֹדַ֨ת אָבִ֜י/ךָ
    הַ/קָּשָׁ֗ה וּ/מֵ/עֻלּ֧/וֹ הַ/כָּבֵ֛ד אֲשֶׁר נָתַ֥ן עָלֵ֖י/נוּ וְ/נַֽעַבְדֶֽ/ךָּ־־׃
translation:
  text: Your father made our yoke harsh. So now lighten the hard service of your father
    and his heavy yoke that he put on us, and we will serve you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made our yoke hard' or 'made our yoke severe.'
    reason: lexical_alternative
  - marker: b
    text: '''Service'' here refers to imposed labor or obligation under royal rule;
      alternatively, ''labor.'''
    reason: cultural_note
lexical_decisions:
- source_word: הִקְשָׁה
  chosen: made ... harsh
  alternatives:
  - made ... hard
  - made ... severe
  lexicon: HALOT
  rationale: 'The Hiphil of קשׁה here is causative: Solomon ''made'' the yoke harsh/severe.
    ''Made our yoke harsh'' is idiomatic in English and preserves the causative force
    better than a flatter ''hardened''.'
- source_word: עֻלֵּנוּ
  chosen: our yoke
  alternatives:
  - our burden
  lexicon: HALOT
  rationale: עֹל literally denotes a yoke and metaphorically oppressive rule or burden.
    'Yoke' preserves the concrete metaphor that continues later in the verse.
- source_word: הָקֵל
  chosen: lighten
  alternatives:
  - make lighter
  - ease
  lexicon: HALOT
  rationale: The imperative asks Rehoboam to reduce the burden. 'Lighten' is concise,
    natural, and matches the burden/yoke imagery.
- source_word: מֵעֲבֹדַת ... הַקָּשָׁה
  chosen: the hard service
  alternatives:
  - the harsh labor
  - the severe service
  lexicon: HALOT
  rationale: עֲבֹדָה can mean work, labor, or service. In this royal corvée/taxation
    context, 'service' preserves the political sense of imposed labor/obligation,
    while 'hard' reflects the adjective הַקָּשָׁה.
- source_word: וּמֵעֻלּוֹ הַכָּבֵד
  chosen: and his heavy yoke
  alternatives:
  - and his burdensome yoke
  lexicon: HALOT
  rationale: The phrase is parallel to 'our yoke' and should retain the same metaphor.
    'Heavy yoke' is straightforward and preserves the adjective כָּבֵד.
- source_word: אֲשֶׁר נָתַן עָלֵינוּ
  chosen: that he put on us
  alternatives:
  - that he laid on us
  - that he imposed on us
  lexicon: HALOT
  rationale: '''Put on us'' is idiomatic modern English for נָתַן עַל in this burden
    context. ''Imposed on us'' is interpretive; ''put on us'' stays closer to the
    Hebrew image.'
- source_word: וְנַעַבְדֶךָּ
  chosen: and we will serve you
  alternatives:
  - then we will serve you
  lexicon: HALOT
  rationale: The cohortative-like imperfect expresses the people's pledged response
    if Rehoboam relieves the burden. 'We will serve you' is the natural English rendering.
- source_word: אָבִיךָ
  chosen: your father
  lexicon: HALOT
  rationale: Direct filial reference to Solomon; repeated twice in the verse and retained
    for clarity and rhetorical force.
