id: 2CH.10.18
reference: 2 Chronicles 10:18
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֞ח הַ/מֶּ֣לֶךְ רְחַבְעָ֗ם אֶת הֲדֹרָם֙ אֲשֶׁ֣ר עַל הַ/מַּ֔ס וַ/יִּרְגְּמוּ
    ב֧/וֹ בְנֵֽי יִשְׂרָאֵ֛ל אֶ֖בֶן וַ/יָּמֹ֑ת וְ/הַ/מֶּ֣לֶךְ רְחַבְעָ֗ם הִתְאַמֵּץ֙
    לַֽ/עֲל֣וֹת בַּ/מֶּרְכָּבָ֔ה לָ/נ֖וּס יְרוּשָׁלִָֽם־־־־׃ס
translation:
  text: Then King Rehoboam sent Hadoram, who was over the forced labor, but the sons
    of Israel stoned him with stones, and he died. And King Rehoboam strengthened
    himself to get up into the chariot to flee to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Hadoram''; the parallel account in 1 Kings 12:18 has ''Adoram.'''
    reason: alternative_reading
  - marker: b
    text: Or 'the Israelites.' Hebrew 'the sons of Israel' is an idiomatic national
      designation.
    reason: lexical_alternative
  - marker: c
    text: Or 'who was over the labor levy.' The Hebrew term refers to imposed labor
      service.
    reason: lexical_alternative
  - marker: d
    text: Or 'made haste to mount the chariot.' The Hebrew more literally says 'strengthened
      himself to go up into the chariot.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard rendering of שלח in narrative context; 'sent' is natural and
    sufficiently formal.
- source_word: הַמֶּלֶךְ רְחַבְעָם
  chosen: King Rehoboam
  alternatives:
  - the king, Rehoboam
  lexicon: HALOT
  rationale: English idiom normally places the royal title before the name; preserves
    the appositional force without awkwardness.
- source_word: הֲדֹרָם
  chosen: Hadoram
  alternatives:
  - Adoram
  lexicon: HALOT
  rationale: Directly reflects the Chronicles Hebrew form הֲדֹרָם. The parallel in
    Kings has 'Adoram'; that alternative is worth preserving in a footnote as a name-form
    difference across passages, not as the main text here.
- source_word: אֲשֶׁר עַל הַמַּס
  chosen: who was over the forced labor
  alternatives:
  - who was over the labor levy
  - who was in charge of the corvée
  lexicon: HALOT
  rationale: מַס refers to imposed labor/service, not merely taxation. 'Forced labor'
    communicates the sense clearly in modern English; 'labor levy' is more literal
    but less transparent.
- source_word: וַיִּרְגְּמוּ בוֹ ... אֶבֶן
  chosen: stoned him with stones
  alternatives:
  - pelted him with stones
  - stoned him
  lexicon: HALOT
  rationale: The Hebrew explicitly includes both the verb 'stone' and the noun 'stone.'
    Retaining 'with stones' preserves the emphatic concreteness of the source, though
    English could omit it.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Chosen to preserve the gendered and idiomatic Hebrew expression per the
    gender-accurate principle. Here it refers to the northern Israelites in revolt;
    a footnote can clarify the idiomatic sense if needed.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so that he died
  lexicon: HALOT
  rationale: Simple narrative continuation; direct and natural.
- source_word: הִתְאַמֵּץ
  chosen: strengthened himself
  alternatives:
  - made haste
  - acted quickly
  - mustered strength
  lexicon: HALOT
  rationale: The hitpael of אמץ literally conveys strengthening oneself or taking
    courage. Some translations smooth this to 'made haste,' but the Hebrew more specifically
    depicts self-fortifying action in urgent escape.
- source_word: לַעֲלוֹת בַּמֶּרְכָּבָה
  chosen: to get up into the chariot
  alternatives:
  - to mount the chariot
  - to get into the chariot
  lexicon: HALOT
  rationale: עלה plus chariot naturally means ascending/mounting it. 'Get up into'
    preserves the directional nuance while remaining readable.
- source_word: לָנוּס יְרוּשָׁלָם
  chosen: to flee to Jerusalem
  alternatives:
  - to escape to Jerusalem
  lexicon: HALOT
  rationale: נוס denotes fleeing; 'to flee to Jerusalem' is the most direct rendering.
