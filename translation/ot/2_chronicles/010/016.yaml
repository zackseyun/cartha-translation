theological_decisions:
- issue: Gendered distributive noun אִישׁ
  chosen_reading: Each man
  alternative_readings:
  - Everyone
  - Each one
  rationale: The source uses a grammatically masculine singular noun with representative/distributive
    force. Per doctrine, gender-accurate rendering is preferred over flattening to
    gender-neutral English when the source form is explicit.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Idiomatic political repudiation formula
  chosen_reading: What share do we have in David? We have no inheritance in the son
    of Jesse.
  alternative_readings:
  - What portion have we in David? Neither have we inheritance in the son of Jesse.
  rationale: The translation preserves the rhetorical and covenantal language of the
    Hebrew rather than paraphrasing it into a modern political slogan, maintaining
    the text's historical and literary force.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
