id: 2CH.10.16
reference: 2 Chronicles 10:16
source:
  edition: WLC
  text: וְ/כָל יִשְׂרָאֵ֗ל כִּ֠י לֹא שָׁמַ֣ע הַ/מֶּלֶךְ֮ לָ/הֶם֒ וַ/יָּשִׁ֣יבוּ הָ/עָ֣ם
    אֶת הַ/מֶּ֣לֶךְ לֵ/אמֹ֡ר מַה לָּ/נוּ֩ חֵ֨לֶק בְּ/דָוִ֜יד וְ/לֹֽא נַחֲלָ֣ה בְּ/בֶן
    יִשַׁ֗י אִ֤ישׁ לְ/אֹהָלֶ֨י/ךָ֙ יִשְׂרָאֵ֔ל עַתָּ֕ה רְאֵ֥ה בֵיתְ/ךָ֖ דָּוִ֑יד וַ/יֵּ֥לֶךְ
    כָּל יִשְׂרָאֵ֖ל לְ/אֹהָלָֽי/ו־־־׀־־־־׃ס
translation:
  text: And all Israel, because the king did not listen to them, answered the king,
    saying, “What share do we have in David? We have no inheritance in the son of
    Jesse. Each man to your tents, O Israel! Now see to your own house, David.” So
    all Israel went to their tents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'to your homes.' The Hebrew reads 'to your tents,'
      an idiom for dispersing to one's own place.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Each man to your tents, O Israel' uses a masculine singular noun
      distributively.
    reason: cultural_note
lexical_decisions:
- source_word: שָׁמַע
  chosen: listen to
  alternatives:
  - hear
  lexicon: HALOT
  rationale: In this context the verb denotes heeding/responding to the people's request,
    not mere auditory perception. 'Listen to' captures the idiomatic sense in English.
- source_word: וַיָּשִׁיבוּ
  chosen: answered
  alternatives:
  - replied
  - returned answer to
  lexicon: HALOT
  rationale: Though formally from שוב ('return'), this idiom means to give an answer.
    'Answered' is the most natural and accurate English rendering here.
- source_word: חֵלֶק
  chosen: share
  alternatives:
  - portion
  - part
  lexicon: HALOT
  rationale: The expression 'What share do we have in David?' is a conventional political
    disavowal of allegiance. 'Share' is idiomatic and preserves the metaphor of allotted
    participation.
- source_word: נַחֲלָה
  chosen: inheritance
  alternatives:
  - heritage
  - portion
  lexicon: HALOT
  rationale: '''Inheritance'' preserves the covenantal/familial nuance of allotted
    possession and lineage connection in the phrase ''in the son of Jesse.'''
- source_word: בְּבֶן יִשַׁי
  chosen: in the son of Jesse
  alternatives:
  - with the son of Jesse
  lexicon: HALOT
  rationale: The preposition is retained with 'in' to mirror the Hebrew idiom as closely
    as readable English allows; it expresses having a stake or inheritance in David's
    line.
- source_word: אִישׁ
  chosen: Each man
  alternatives:
  - Every man
  - Everyone
  lexicon: HALOT
  rationale: The Hebrew is singular masculine used distributively. 'Each man' preserves
    the gendered form and distributive force better than the gender-neutral 'everyone,'
    in keeping with the project's gender-accurate policy.
- source_word: לְאֹהָלֶיךָ
  chosen: to your tents
  alternatives:
  - to your homes
  lexicon: HALOT
  rationale: Literally 'to your tents.' Although it functions idiomatically as a call
    to disperse homeward, the literal image is retained because it is clear in English
    and preserves the historical texture.
- source_word: רְאֵה בֵיתְךָ
  chosen: see to your own house
  alternatives:
  - look to your house
  - take care of your own house
  lexicon: HALOT
  rationale: This is an idiomatic dismissal of David's dynasty to mind its own affairs.
    'See to your own house' is natural English and preserves the force without over-paraphrase.
- source_word: לְאֹהָלָיו
  chosen: to their tents
  alternatives:
  - to his tents
  - to their homes
  lexicon: HALOT
  rationale: The Hebrew form is morphologically singular ('his tents') after the collective
    singular 'all Israel,' but English idiom prefers the distributive plural 'their
    tents.' This preserves the sense while remaining readable.
