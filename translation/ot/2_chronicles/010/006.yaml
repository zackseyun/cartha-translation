id: 2CH.10.6
reference: 2 Chronicles 10:6
source:
  edition: WLC
  text: וַ/יִּוָּעַ֞ץ הַ/מֶּ֣לֶךְ רְחַבְעָ֗ם אֶת הַ/זְּקֵנִים֙ אֲשֶׁר הָי֣וּ עֹֽמְדִ֗ים
    לִ/פְנֵי֙ שְׁלֹמֹ֣ה אָבִ֔י/ו בִּֽ/הְיֹת֥/וֹ חַ֖י לֵ/אמֹ֑ר אֵ֚יךְ אַתֶּ֣ם נֽוֹעָצִ֔ים
    לְ/הָשִׁ֥יב לָֽ/עָם הַ/זֶּ֖ה דָּבָֽר־־־׃
translation:
  text: Then King Rehoboam consulted the elders who had stood before Solomon his father
    while he was still alive, saying, “How do you advise me to answer this people?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “How are you advising to return a word to this people?” The Hebrew
      idiom means to give an answer or reply.
    reason: lexical_alternative
  - marker: b
    text: “Stood before Solomon” can also mean “attended” or “served” him in an official
      capacity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּעַץ
  chosen: consulted
  alternatives:
  - took counsel with
  - conferred with
  lexicon: HALOT
  rationale: The Niphal of יעץ here denotes seeking counsel from others. 'Consulted'
    is natural modern English and preserves the sense of asking advice rather than
    merely deliberating internally.
- source_word: הַזְּקֵנִים
  chosen: the elders
  alternatives:
  - the old men
  - the senior advisers
  lexicon: HALOT
  rationale: זקנים commonly refers to older leaders or senior men in an official/advisory
    role. 'The elders' is the most direct and contextually appropriate rendering.
- source_word: אֲשֶׁר הָיוּ עֹמְדִים לִפְנֵי
  chosen: who had stood before
  alternatives:
  - who had attended
  - who had served before
  lexicon: HALOT
  rationale: The idiom 'stand before' can imply service in attendance on a superior.
    Here a relatively formal rendering preserves the Hebrew imagery while remaining
    understandable.
- source_word: שְׁלֹמֹה אָבִיו
  chosen: Solomon his father
  alternatives:
  - his father Solomon
  lexicon: HALOT
  rationale: This keeps the Hebrew appositional structure and reads smoothly in English.
- source_word: בִּהְיוֹתוֹ חַי
  chosen: while he was still alive
  alternatives:
  - during his lifetime
  - when he was alive
  lexicon: HALOT
  rationale: The infinitive construct with היה plus חי marks the time when Solomon
    was living. 'While he was still alive' is idiomatic and slightly highlights the
    contrast with the present situation after Solomon's death.
- source_word: אֵיךְ אַתֶּם נוֹעָצִים
  chosen: How do you advise me
  alternatives:
  - What do you advise
  - How are you counseling
  lexicon: HALOT
  rationale: The participle נועצים asks for their counsel. English commonly expresses
    this as 'How do you advise me,' making explicit the implied object of the advice.
- source_word: לְהָשִׁיב
  chosen: to answer
  alternatives:
  - to reply to
  - to respond to
  lexicon: HALOT
  rationale: השיב in this context means to give an answer or reply. 'Answer' is concise
    and fits the direct-speech setting.
- source_word: לָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this people group
  - these people
  lexicon: HALOT
  rationale: The singular 'people' matches the Hebrew עם and preserves the collective
    sense. 'This people' is slightly formal but natural in biblical narrative.
- source_word: דָּבָר
  chosen: me
  alternatives:
  - a word
  - an answer
  lexicon: HALOT
  rationale: Literally 'a word,' but in the collocation 'answer ... a word' English
    idiom requires an object such as 'me' after 'advise' and leaves the response idea
    to 'answer.' This is an optimal-equivalence adjustment rather than a strict formal
    rendering.
