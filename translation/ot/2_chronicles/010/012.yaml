id: 2CH.10.12
reference: 2 Chronicles 10:12
source:
  edition: WLC
  text: וַ/יָּבֹ֨א יָרָבְעָ֧ם וְ/כָל הָ/עָ֛ם אֶל רְחַבְעָ֖ם בַּ/יּ֣וֹם הַ/שְּׁלִשִׁ֑י
    כַּ/אֲשֶׁ֨ר דִּבֶּ֤ר הַ/מֶּ֨לֶךְ֙ לֵ/אמֹ֔ר שׁ֥וּבוּ אֵלַ֖/י בַּ/יּ֥וֹם הַ/שְּׁלִשִֽׁי־־׃
translation:
  text: So Jeroboam and all the people came to Rehoboam on the third day, just as
    the king had said, saying, “Return to me on the third day.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Come back to me on the third day.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come/go' depending on viewpoint. With אֶל
    רְחַבְעָם ('to Rehoboam'), 'came' is the most natural English from the narrator's
    perspective.
- source_word: יָרָבְעָם
  chosen: Jeroboam
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: וְכָל הָעָם
  chosen: and all the people
  alternatives:
  - and all the assembly
  - and all the populace
  lexicon: HALOT
  rationale: עָם here refers broadly to the people who had come with Jeroboam, not
    a formal cultic assembly. 'All the people' is natural and sufficiently literal.
- source_word: אֶל רְחַבְעָם
  chosen: to Rehoboam
  alternatives:
  - before Rehoboam
  lexicon: HALOT
  rationale: אֶל normally marks direction toward a person or place. 'To Rehoboam'
    is the straightforward rendering.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: on the third day
  alternatives:
  - on the third day after that
  lexicon: HALOT
  rationale: The temporal phrase is idiomatically rendered 'on the third day.' No
    expansion is necessary in the main text.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces correspondence between the action and the king's prior command.
    'Just as' clearly conveys that sense.
- source_word: דִּבֶּר הַמֶּלֶךְ
  chosen: the king had said
  alternatives:
  - the king had spoken
  - the king had commanded
  lexicon: HALOT
  rationale: דבר is the ordinary verb 'speak/say.' 'Had said' fits the prior quoted
    instruction better than the stronger 'commanded.' The pluperfect sense is natural
    in English because the speaking occurred earlier.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - when he said
  lexicon: HALOT
  rationale: This infinitive introduces the content of the king's prior speech. Retaining
    'saying' preserves the Hebrew structure without sounding overly awkward here.
- source_word: שׁוּבוּ אֵלַי
  chosen: Return to me
  alternatives:
  - Come back to me
  - Turn back to me
  lexicon: HALOT
  rationale: שׁוּב often means 'return/turn back.' In this narrative setting, 'Return
    to me' best matches the king's instruction to come back after three days.
