id: 2CH.10.1
reference: 2 Chronicles 10:1
source:
  edition: WLC
  text: וַ/יֵּ֥לֶךְ רְחַבְעָ֖ם שְׁכֶ֑מָ/ה כִּ֥י שְׁכֶ֛ם בָּ֥אוּ כָל יִשְׂרָאֵ֖ל לְ/הַמְלִ֥יךְ
    אֹתֽ/וֹ־׃
translation:
  text: Rehoboam went to Shechem, because all Israel had come to Shechem to make him
    king.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - traveled
  - set out
  lexicon: HALOT
  rationale: The wayyiqtol of הלך straightforwardly advances the narrative with the
    simple sense 'went.' 'Went' is the most natural modern English narrative equivalent
    without adding nuance not explicit in the Hebrew.
- source_word: רְחַבְעָם
  chosen: Rehoboam
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: שְׁכֶמָה
  chosen: to Shechem
  alternatives:
  - toward Shechem
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward a destination.
    In idiomatic English this is best rendered 'to Shechem.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Rehoboam's going. 'Because' communicates
    the causal force clearly in modern English; 'for' is possible but less natural.
- source_word: שְׁכֶם
  chosen: to Shechem
  alternatives:
  - at Shechem
  lexicon: HALOT
  rationale: Although the Hebrew simply repeats the place name before the verb 'had
    come,' English normally supplies the destination preposition. 'To Shechem' best
    reflects the implied motion.
- source_word: בָּאוּ
  chosen: had come
  alternatives:
  - came
  lexicon: HALOT
  rationale: The qatal form in this causal clause naturally refers to action prior
    to Rehoboam's going, so English past perfect ('had come') clarifies the sequence
    without overtranslating.
- source_word: כָל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - all the Israelites
  lexicon: HALOT
  rationale: The Hebrew expression is a standard collective designation. 'All Israel'
    preserves the covenantal-national wording and is idiomatic in English biblical
    style.
- source_word: לְהַמְלִיךְ
  chosen: to make him king
  alternatives:
  - to crown him king
  - to proclaim him king
  lexicon: HALOT
  rationale: The Hiphil infinitive of מלך means to cause someone to reign, i.e., 'make
    king.' 'Make him king' is a clear and direct rendering; 'crown' would add ceremonial
    detail not stated, and 'proclaim' narrows the action.
- source_word: אֹתוֹ
  chosen: him
  rationale: Direct object pronoun referring to Rehoboam; rendered with the standard
    English object pronoun.
