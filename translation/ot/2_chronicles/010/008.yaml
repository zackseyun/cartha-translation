id: 2CH.10.8
reference: 2 Chronicles 10:8
source:
  edition: WLC
  text: וַֽ/יַּעֲזֹ֛ב אֶת עֲצַ֥ת הַ/זְּקֵנִ֖ים אֲשֶׁ֣ר יְעָצֻ֑/הוּ וַ/יִּוָּעַ֗ץ אֶת
    הַ/יְלָדִים֙ אֲשֶׁ֣ר גָּדְל֣וּ אִתּ֔/וֹ הָ/עֹמְדִ֖ים לְ/פָנָֽי/ו־־׃
translation:
  text: But he abandoned the advice of the elders that they had given him, and consulted
    with the young men who had grown up with him, who stood before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who attended him' or 'who served him,' reflecting a courtly idiom in
      'stood before him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲזֹב
  chosen: abandoned
  alternatives:
  - forsook
  - rejected
  - left
  lexicon: HALOT
  rationale: The verb עזב commonly means to leave, forsake, or abandon. In this context
    Rehoboam is not merely leaving advice aside temporarily but rejecting it in favor
    of another counsel, so 'abandoned' conveys the force well in natural English.
- source_word: עֲצַת
  chosen: advice
  alternatives:
  - counsel
  lexicon: HALOT
  rationale: עֵצָה can be rendered 'advice' or 'counsel.' 'Advice' is slightly more
    natural in contemporary English here while preserving the sense of guidance offered
    by the elders.
- source_word: הַזְּקֵנִים
  chosen: the elders
  alternatives:
  - the old men
  lexicon: HALOT
  rationale: Though literally related to age, in this context the term refers to senior
    advisers, so 'the elders' best captures both age and social role.
- source_word: יְעָצֻהוּ
  chosen: they had given him
  alternatives:
  - they advised him
  - they had counseled him
  lexicon: HALOT
  rationale: Because the object 'advice' is already explicit, English idiom prefers
    'the advice ... that they had given him' rather than repeating 'counseled.' This
    avoids awkwardness while preserving the Hebrew sense.
- source_word: וַיִּוָּעַץ
  chosen: consulted with
  alternatives:
  - took counsel with
  - sought advice from
  lexicon: HALOT
  rationale: The Niphal form here expresses entering into consultation. 'Consulted
    with' is clear, idiomatic, and appropriately formal.
- source_word: הַיְלָדִים
  chosen: the young men
  alternatives:
  - the youths
  - the boys
  lexicon: HALOT
  rationale: Although ילד can denote children or boys, the context identifies peers
    who grew up with the king and now serve in court. 'Young men' avoids the misleading
    implication that they were literal children.
- source_word: גָּדְלוּ אִתּוֹ
  chosen: had grown up with him
  alternatives:
  - grew up with him
  lexicon: HALOT
  rationale: The clause describes their shared upbringing. The pluperfect-like English
    'had grown up' fits the narrative sequence after the elders' prior advice.
- source_word: הָעֹמְדִים לְפָנָיו
  chosen: who stood before him
  alternatives:
  - who attended him
  - who served before him
  lexicon: HALOT
  rationale: Literally 'standing before him,' this courtly idiom can imply attendance
    or service. The more literal rendering is retained in the main text to preserve
    the Hebrew imagery, while the idiomatic sense is suitable for a footnote.
