id: 2CH.10.9
reference: 2 Chronicles 10:9
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲלֵ/הֶ֗ם מָ֚ה אַתֶּ֣ם נֽוֹעָצִ֔ים וְ/נָשִׁ֥יב דָּבָ֖ר אֶת הָ/עָ֣ם
    הַ/זֶּ֑ה אֲשֶׁ֨ר דִּבְּר֤וּ אֵלַ/י֙ לֵ/אמֹ֔ר הָקֵל֙ מִן הָ/עֹ֔ל אֲשֶׁר נָתַ֥ן
    אָבִ֖י/ךָ עָלֵֽי/נוּ־־־׃
translation:
  text: And he said to them, “What do you advise, so that we may answer this people
    who have spoken to me, saying, ‘Lighten the yoke that your father put on us’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ease the burden that your father put on us.' The Hebrew literally says
      'lighten from the yoke,' preserving the image of a yoke as a metaphor for oppressive
      labor or rule.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֽוֹעָצִים
  chosen: do you advise
  alternatives:
  - are advising
  - counsel
  lexicon: HALOT
  rationale: From יעץ, asking for counsel/advice. English finite verb 'do you advise'
    is natural in direct speech and preserves the consultative sense.
- source_word: וְנָשִׁיב דָּבָר
  chosen: so that we may answer
  alternatives:
  - and we may return a word
  - and we may answer with a word
  lexicon: HALOT
  rationale: שׁוב with דָּבָר in this idiom means to return an answer/reply. 'So that
    we may answer' captures the purpose nuance in context and avoids wooden English.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this people-group
  - these people
  lexicon: HALOT
  rationale: Formal retention of singular collective 'people' reflects the Hebrew
    better than 'these people.' 'This people' is idiomatic enough in elevated narrative
    style.
- source_word: דִּבְּרוּ אֵלַי
  chosen: have spoken to me
  alternatives:
  - spoke to me
  - have said to me
  lexicon: HALOT
  rationale: The perfect in reported context can be rendered as English present perfect
    to connect their prior speech with the current deliberation.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thus
  - as follows
  lexicon: HALOT
  rationale: Standard rendering of the quotative infinitive, introducing the content
    of the people's request.
- source_word: הָקֵל
  chosen: Lighten
  alternatives:
  - make lighter
  - ease
  lexicon: HALOT
  rationale: Imperative of קלל/קלל in the Hiphil here means to make lighter or ease
    a burden. 'Lighten' is concise and conventional.
- source_word: מִן הָעֹל
  chosen: the yoke
  alternatives:
  - the burden
  - the load
  lexicon: HALOT
  rationale: עֹל literally means 'yoke' and is a common metaphor for oppressive labor
    or rule. The literal image should be preserved here.
- source_word: נָתַן ... עָלֵינוּ
  chosen: put on us
  alternatives:
  - laid on us
  - placed upon us
  lexicon: HALOT
  rationale: Idiomatic English for imposing a burden; preserves the sense of an externally
    imposed yoke.
- source_word: אָבִיךָ
  chosen: your father
  lexicon: HALOT
  rationale: Straightforward possessive rendering addressed to Rehoboam.
- source_word: וַיֹּאמֶר אֲלֵהֶם
  chosen: And he said to them
  alternatives:
  - Then he said to them
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing Rehoboam's speech; 'And' preserves
    Hebrew narrative flow.
