id: 2CH.10.3
reference: 2 Chronicles 10:3
source:
  edition: WLC
  text: וַֽ/יִּשְׁלְחוּ֙ וַ/יִּקְרְאוּ ל֔/וֹ וַ/יָּבֹ֥א יָרָבְעָ֖ם וְ/כָל יִשְׂרָאֵ֑ל
    וַֽ/יְדַבְּר֔וּ אֶל רְחַבְעָ֖ם לֵ/אמֹֽר־־־׃
translation:
  text: So they sent and called for him, and Jeroboam and all Israel came and spoke
    to Rehoboam, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they sent word and summoned him.' The Hebrew leaves the object of 'sent'
      implicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  chosen: they sent
  alternatives:
  - they sent word
  - they dispatched messengers
  lexicon: HALOT
  rationale: The verb שׁלח in this context is elliptical, with the object implied
    by the following 'called for him.' 'They sent' preserves the Hebrew sequence without
    over-specifying 'messengers,' though that is likely implied.
- source_word: וַיִּקְרְאוּ לוֹ
  chosen: called for him
  alternatives:
  - summoned him
  - called him
  lexicon: HALOT
  rationale: קרא + ל can mean to call to or call for/summon. 'Called for him' fits
    the narrative context of requesting Jeroboam's presence and preserves the two-step
    action with the previous verb.
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: The singular verb with Jeroboam as the leading subject is naturally rendered
    'came.' English can then coordinate 'Jeroboam and all Israel' as a collective
    party without forcing an awkward literal singular.
- source_word: יָרָבְעָם וְכָל יִשְׂרָאֵל
  chosen: Jeroboam and all Israel
  alternatives:
  - Jeroboam and all the Israelites
  - Jeroboam, with all Israel
  lexicon: HALOT
  rationale: Personal name is transliterated per project philosophy. 'All Israel'
    is the standard covenantal/national expression and should be preserved rather
    than flattened to merely 'the Israelites,' though that sense is possible.
- source_word: וַיְדַבְּרוּ אֶל
  chosen: spoke to
  alternatives:
  - said to
  - addressed
  lexicon: HALOT
  rationale: דבר אל is straightforwardly 'speak to.' This keeps the formal narrative
    style and avoids collapsing it into the more generic 'said to' before the infinitive
    'saying.'
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said,
  lexicon: HALOT
  rationale: The infinitive introduces the direct speech of the next verse. Retaining
    'saying' reflects the Hebrew discourse structure and signals continuation into
    the following quotation.
