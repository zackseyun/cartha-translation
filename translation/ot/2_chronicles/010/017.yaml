id: 2CH.10.17
reference: 2 Chronicles 10:17
source:
  edition: WLC
  text: וּ/בְנֵ֣י יִשְׂרָאֵ֔ל הַ/יֹּֽשְׁבִ֖ים בְּ/עָרֵ֣י יְהוּדָ֑ה וַ/יִּמְלֹ֥ךְ עֲלֵי/הֶ֖ם
    רְחַבְעָֽם׃
translation:
  text: But Rehoboam reigned over the Israelites who lived in the cities of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sons of Israel who were living in the cities of Judah.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי יִשְׂרָאֵל
  chosen: But the Israelites
  alternatives:
  - And the sons of Israel
  - But the children of Israel
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל is a standard ethnonym here, best rendered idiomatically
    as 'the Israelites' rather than the more literal 'sons/children of Israel.' The
    prefixed conjunction is rendered 'But' to mark the contrast with the preceding
    context, where the northern tribes rebel, while this clause identifies those still
    under Rehoboam.
- source_word: הַיֹּשְׁבִים
  chosen: who lived
  alternatives:
  - who were dwelling
  - who sat
  lexicon: HALOT
  rationale: The participle of ישב commonly denotes residing or dwelling. 'Who lived'
    is natural modern English and preserves the durative sense without awkwardness.
- source_word: בְּעָרֵי יְהוּדָה
  chosen: in the cities of Judah
  alternatives:
  - in Judah's cities
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'Cities of Judah' preserves the genitive
    relationship and geographic specificity.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - was king
  lexicon: HALOT
  rationale: The wayyiqtol of מלך here describes Rehoboam's exercise of kingship over
    the remaining population. 'Reigned' is the most idiomatic narrative rendering
    in English.
- source_word: עֲלֵיהֶם
  chosen: over them
  alternatives:
  - over those people
  lexicon: HALOT
  rationale: The preposition על with the pronominal suffix indicates rule over a people.
    In English, this is naturally incorporated into 'reigned over the Israelites...,'
    avoiding unnecessary repetition while preserving the sense.
- source_word: רְחַבְעָם
  chosen: Rehoboam
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
