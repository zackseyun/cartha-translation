theological_decisions:
- issue: Divine causation and human action
  chosen_reading: for this turn of events was from God
  alternative_readings:
  - for the cause was from God
  - for this was a turn of affairs brought about by God
  rationale: The Hebrew explicitly attributes the event's origin to God while narrating
    the king's refusal as a real human action. The translation preserves that tension
    rather than softening divine agency or making God the direct actor of the refusal
    in wording beyond the text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    of YHWH, following established reverential convention while distinguishing the
    covenant name from אֱלֹהִים in the same verse.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
