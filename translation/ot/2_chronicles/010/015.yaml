id: 2CH.10.15
reference: 2 Chronicles 10:15
source:
  edition: WLC
  text: וְ/לֹֽא שָׁמַ֥ע הַ/מֶּ֖לֶךְ אֶל הָ/עָ֑ם כִּֽי הָיְתָ֤ה נְסִבָּה֙ מֵ/עִ֣ם הָֽ/אֱלֹהִ֔ים
    לְמַעַן֩ הָקִ֨ים יְהוָ֜ה אֶת דְּבָר֗/וֹ אֲשֶׁ֤ר דִּבֶּר֙ בְּ/יַד֙ אֲחִיָּ֣הוּ
    הַ/שִּֽׁלוֹנִ֔י אֶל יָרָבְעָ֖ם בֶּן נְבָֽט־־־־־־׃
translation:
  text: So the king did not listen to the people, for this turn of events was from
    God, so that the LORD might establish his word that he had spoken through Ahijah
    the Shilonite to Jeroboam son of Nebat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the cause was from God.' The Hebrew noun can denote a turn, circumstance,
      or causative development.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַע
  chosen: listen to
  alternatives:
  - hear
  - obey
  lexicon: HALOT
  rationale: In context with אֶל הָעָם, the verb means giving heed to the people's
    request, not mere auditory hearing. 'Listen to' is natural English and preserves
    the sense without overinterpreting as full 'obey.'
- source_word: נְסִבָּה
  chosen: turn of events
  alternatives:
  - turn
  - cause
  - circumstance
  lexicon: HALOT
  rationale: The noun denotes a turn, circumstance, or causative development. 'Turn
    of events' communicates that the situation unfolded providentially without sounding
    overly abstract. It avoids a flatter 'cause' while preserving the narrative sense.
- source_word: מֵעִם הָאֱלֹהִים
  chosen: from God
  alternatives:
  - from the true God
  - from God’s hand
  lexicon: HALOT
  rationale: The phrase indicates divine source or origin. 'From God' is the most
    direct and idiomatic rendering here. Although the Hebrew uses הָאֱלֹהִים, English
    does not normally require 'the God' in this context.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake of
  lexicon: HALOT
  rationale: This marks purpose. 'So that' is clear modern English and preserves the
    purposive force.
- source_word: הָקִים
  chosen: might establish
  alternatives:
  - might confirm
  - might fulfill
  lexicon: HALOT
  rationale: The hiphil of קום here means to cause to stand, i.e., establish or confirm.
    'Establish' preserves the verbal imagery and fits the object 'his word.' 'Fulfill'
    is possible interpretively, but 'establish' stays closer to the Hebrew.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: דְּבָרוֹ
  chosen: his word
  alternatives:
  - his promise
  - his message
  lexicon: HALOT
  rationale: '''Word'' is the broad and standard rendering, allowing the reader to
    understand it as the prophetic declaration previously spoken. ''Promise'' would
    narrow the sense too much.'
- source_word: בְּיַד
  chosen: through
  alternatives:
  - by the hand of
  - by
  lexicon: HALOT
  rationale: This idiom commonly marks agency or instrumentality in prophetic speech.
    'Through' is idiomatic English and preserves the mediating role of Ahijah.
- source_word: הַשִּׁלוֹנִי
  chosen: the Shilonite
  alternatives:
  - from Shiloh
  lexicon: HALOT
  rationale: The gentilic adjective is best represented by the standard English form
    'the Shilonite.' This preserves the Hebrew designation more formally than paraphrasing
    it as 'from Shiloh.'
- source_word: בֶּן נְבָט
  chosen: son of Nebat
  lexicon: HALOT
  rationale: Standard patronymic rendering in English; no contextual reason to vary.
