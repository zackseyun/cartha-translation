id: 2CH.10.13
reference: 2 Chronicles 10:13
source:
  edition: WLC
  text: וַ/יַּעֲנֵ֥/ם הַ/מֶּ֖לֶךְ קָשָׁ֑ה וַֽ/יַּעֲזֹב֙ הַ/מֶּ֣לֶךְ רְחַבְעָ֔ם אֵ֖ת
    עֲצַ֥ת הַ/זְּקֵנִֽים׃
translation:
  text: And the king answered them harshly, and King Rehoboam abandoned the counsel
    of the elders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'answered them severely.'
    reason: lexical_alternative
  - marker: b
    text: Or 'rejected the advice of the elders.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנֵם
  chosen: answered them
  alternatives:
  - answered
  lexicon: HALOT
  rationale: From ענה in the sense of replying; the 3mp suffix explicitly marks the
    object, so 'answered them' is preferable to the less explicit 'answered.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of מלך with the article. The first occurrence
    is kept as 'the king' for natural narrative flow.
- source_word: קָשָׁה
  chosen: harshly
  alternatives:
  - harsh
  - severely
  - roughly
  lexicon: HALOT
  rationale: Although formally an adjective ('hard/harsh'), in context it functions
    adverbially with the verb 'answered.' 'Harshly' is idiomatic English and preserves
    the force of a hard or severe reply.
- source_word: וַיַּעֲזֹב
  chosen: abandoned
  alternatives:
  - forsook
  - left
  - rejected
  lexicon: HALOT
  rationale: עזב commonly means 'leave, forsake, abandon.' 'Abandoned' conveys a deliberate
    setting aside of the elders' advice more clearly than the archaic 'forsook' and
    more strongly than merely 'left.'
- source_word: הַמֶּלֶךְ רְחַבְעָם
  chosen: King Rehoboam
  alternatives:
  - the king, Rehoboam
  - Rehoboam the king
  lexicon: HALOT
  rationale: The appositional construction identifies the king by name. 'King Rehoboam'
    is natural English and preserves the identification.
- source_word: עֲצַת
  chosen: the counsel
  alternatives:
  - the advice
  - the plan
  lexicon: HALOT
  rationale: עצה can mean counsel, advice, or plan. Here it refers to the elders'
    recommendation to Rehoboam. 'Counsel' preserves the formal advisory sense and
    matches the narrative register.
- source_word: הַזְּקֵנִים
  chosen: the elders
  alternatives:
  - the old men
  - the senior men
  lexicon: HALOT
  rationale: זקנים in this context refers to recognized older leaders/counselors,
    not merely aged males. 'The elders' best captures the social-political role.
