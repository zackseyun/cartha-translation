id: 2CH.10.10
reference: 2 Chronicles 10:10
source:
  edition: WLC
  text: וַ/יְדַבְּר֣וּ אִתּ֗/וֹ הַ/יְלָדִים֙ אֲשֶׁ֨ר גָּדְל֣וּ אִתּ/וֹ֮ לֵ/אמֹר֒ כֹּֽה
    תֹאמַ֡ר לָ/עָם֩ אֲשֶׁר דִּבְּר֨וּ אֵלֶ֜י/ךָ לֵ/אמֹ֗ר אָבִ֨י/ךָ֙ הִכְבִּ֣יד אֶת
    עֻלֵּ֔/נוּ וְ/אַתָּ֖ה הָקֵ֣ל מֵ/עָלֵ֑י/נוּ כֹּ֚ה תֹּאמַ֣ר אֲלֵ/הֶ֔ם קָֽטָנִּ֥/י
    עָבָ֖ה מִ/מָּתְנֵ֥י אָבִֽ/י־־־׃
translation:
  text: 'The young men who had grown up with him spoke to him, saying, “This is what
    you shall say to the people who spoke to you, saying, ‘Your father made our yoke
    heavy, but you, make it lighter on us.’ This is what you shall say to them: ‘My
    little finger is thicker than my father’s waist.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'My littleness is thicker than my father’s waist'; the
      expression is idiomatically understood as 'My little finger is thicker than
      my father’s waist.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my father’s loins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיְלָדִים
  chosen: the young men
  alternatives:
  - the boys
  - the youths
  lexicon: HALOT
  rationale: Although the noun literally derives from 'children/boys,' in this court
    setting and with the qualifier 'who had grown up with him,' it refers to Rehoboam's
    youthful peers or younger advisers rather than small children. 'Young men' best
    fits the social sense in natural English.
- source_word: גָּדְלוּ אִתּוֹ
  chosen: had grown up with him
  alternatives:
  - were raised with him
  - had become great with him
  lexicon: HALOT
  rationale: The idiom indicates shared upbringing or maturation alongside Rehoboam.
    'Had grown up with him' is the clearest idiomatic English rendering.
- source_word: כֹּה תֹאמַר
  chosen: This is what you shall say
  alternatives:
  - Thus you shall say
  - This is what you must say
  lexicon: HALOT
  rationale: A standard speech-introduction formula. 'This is what you shall say'
    preserves the directive force while using readable modern English.
- source_word: לָעָם
  chosen: to the people
  alternatives:
  - to the people of Israel
  - to the assembly
  lexicon: HALOT
  rationale: The noun is simply 'the people' here. The broader referent is Israel,
    but that should not be imported into the translation beyond what the verse states.
- source_word: אָבִיךָ הִכְבִּיד אֶת עֻלֵּנוּ
  chosen: Your father made our yoke heavy
  alternatives:
  - Your father made our burden heavy
  - Your father made our yoke harsh
  lexicon: HALOT
  rationale: '''Yoke'' is the concrete metaphor in the Hebrew and should be preserved
    rather than flattened to ''burden.'' The verb means to make heavy or burdensome.'
- source_word: הָקֵל מֵעָלֵינוּ
  chosen: make it lighter on us
  alternatives:
  - lighten it from upon us
  - ease it for us
  lexicon: HALOT
  rationale: The Hebrew asks for relief from the burden. 'Make it lighter on us' preserves
    the implied object from context and reads naturally in English.
- source_word: קָטָנִּי
  chosen: My little finger
  alternatives:
  - My smallness
  - My little one
  lexicon: HALOT
  rationale: In this idiom the noun is conventionally understood elliptically as 'my
    little finger' (compare the parallel in 1 Kings 12:10). Rendering the idiomatic
    sense is preferable to a wooden but obscure literalism.
- source_word: עָבָה
  chosen: is thicker than
  alternatives:
  - is thicker
  - is stouter than
  lexicon: HALOT
  rationale: The adjective/verb conveys thickness or stoutness, with the comparison
    supplied by מִן. 'Is thicker than' is the most direct English equivalent.
- source_word: מִמָּתְנֵי אָבִי
  chosen: my father’s waist
  alternatives:
  - my father's loins
  - my father's hips
  lexicon: HALOT
  rationale: מָתְנַיִם often refers to the loins/waist area. 'Waist' communicates
    the body part clearly in contemporary English without archaic connotations, while
    preserving the force of the boastful comparison.
