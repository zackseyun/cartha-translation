id: 2CH.10.14
reference: 2 Chronicles 10:14
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר אֲלֵ/הֶ֗ם כַּ/עֲצַ֤ת הַ/יְלָדִים֙ לֵ/אמֹ֔ר אַכְבִּיד֙ אֶֽת עֻלְּ/כֶ֔ם
    וַ/אֲנִ֖י אֹסִ֣יף עָלָ֑י/ו אָבִ֗/י יִסַּ֤ר אֶתְ/כֶם֙ בַּ/שּׁוֹטִ֔ים וַ/אֲנִ֖י
    בָּ/עֲקְרַבִּֽים־׃
translation:
  text: He spoke to them according to the advice of the young men, saying, “I will
    make your yoke heavier, and I will add to it. My father disciplined you with whips,
    but I with scorpions.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'with scorpion-whips,' that is, whips fitted with sharp points
      or barbs; the Hebrew reads literally 'with scorpions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: He spoke
  alternatives:
  - He answered
  - He told
  lexicon: HALOT
  rationale: The verb דבר is the standard verb 'to speak.' In context it introduces
    Rehoboam's reply, but 'spoke' stays closer to the Hebrew than the more interpretive
    'answered.'
- source_word: כַּעֲצַת
  chosen: according to the advice of
  alternatives:
  - by the counsel of
  - following the counsel of
  lexicon: HALOT
  rationale: עֵצָה denotes counsel/advice. 'According to the advice of' naturally
    renders the comparative כ and preserves the sense that his speech followed their
    counsel.
- source_word: הַיְלָדִים
  chosen: the young men
  alternatives:
  - the youths
  - the boys
  lexicon: HALOT
  rationale: Though literally related to 'children/boys,' in this narrative it refers
    to the younger advisers who grew up with Rehoboam. 'Young men' best fits the social
    context and avoids implying literal children.
- source_word: אַכְבִּיד
  chosen: I will make ... heavier
  alternatives:
  - I will make ... heavy
  - I will increase the weight of
  lexicon: HALOT
  rationale: 'The Hiphil of כבד here is causative: ''make heavy/heavier.'' Because
    the object is an already existing yoke, comparative English (''heavier'') communicates
    the intended escalation more idiomatically.'
- source_word: עֻלְּכֶם
  chosen: your yoke
  alternatives:
  - the yoke on you
  lexicon: HALOT
  rationale: עֹל is literally 'yoke' and metaphorically oppressive burden or forced
    labor. The metaphor is transparent in English and should be preserved.
- source_word: אֹסִיף עָלָיו
  chosen: I will add to it
  alternatives:
  - I will add to your burden
  - I will increase it
  lexicon: HALOT
  rationale: יסף with עַל means to add/increase. The pronoun most naturally refers
    back to the yoke. 'Add to it' preserves the Hebrew image without over-specifying
    'burden' in the main text.
- source_word: יִסַּר
  chosen: disciplined
  alternatives:
  - chastised
  - corrected
  - punished
  lexicon: HALOT
  rationale: יסר can mean discipline/chasten. In this royal-threat context it includes
    punitive force, but 'disciplined' preserves the lexical range and matches common
    biblical usage without sounding archaic like 'chastised.'
- source_word: בַּשּׁוֹטִים
  chosen: with whips
  alternatives:
  - with lashes
  - with scourges
  lexicon: HALOT
  rationale: שׁוֹט denotes a whip/scourge. 'Whips' is the clearest modern English
    rendering.
- source_word: בָּעֲקְרַבִּים
  chosen: with scorpions
  alternatives:
  - with scorpion-whips
  lexicon: HALOT
  rationale: The noun literally means 'scorpions.' In context it likely refers metaphorically
    to especially cruel whips, but the literal term should be retained in the main
    text to preserve the vivid image and traditional wording; the likely sense can
    be noted in a footnote.
