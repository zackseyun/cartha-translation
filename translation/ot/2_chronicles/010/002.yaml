id: 2CH.10.2
reference: 2 Chronicles 10:2
source:
  edition: WLC
  text: וַ/יְהִ֞י כִּ/שְׁמֹ֨עַ יָרָבְעָ֤ם בֶּן נְבָט֙ וְ/ה֣וּא בְ/מִצְרַ֔יִם אֲשֶׁ֣ר
    בָּרַ֔ח מִ/פְּנֵ֖י שְׁלֹמֹ֣ה הַ/מֶּ֑לֶךְ וַ/יָּ֥שָׁב יָרָבְעָ֖ם מִ/מִּצְרָֽיִם־׃
translation:
  text: And when Jeroboam son of Nebat heard it (for he was in Egypt, where he had
    fled from before King Solomon), Jeroboam returned from Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heard of it.' The Hebrew does not state the object explicitly; the context
      supplies what Jeroboam heard.
    reason: lexical_alternative
  - marker: b
    text: Literally 'where he had fled from before King Solomon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּשְׁמֹעַ
  chosen: And when ... heard
  alternatives:
  - And it happened, when ... heard
  - Now when ... heard
  lexicon: HALOT
  rationale: The waw-consecutive with היה plus infinitive construct of שמע introduces
    a temporal clause. In idiomatic modern English, 'And when ... heard' best captures
    the narrative progression without preserving a wooden 'and it happened.'
- source_word: יָרָבְעָם בֶּן נְבָט
  chosen: Jeroboam son of Nebat
  alternatives:
  - Jeroboam, the son of Nebat
  rationale: Personal names are transliterated by standard convention. The construct
    phrase is rendered straightforwardly as an identifying patronymic.
- source_word: וְהוּא בְמִצְרַיִם
  chosen: for he was in Egypt
  alternatives:
  - while he was in Egypt
  - and he was in Egypt
  lexicon: HALOT
  rationale: The parenthetical pronoun clause supplies background information. 'For
    he was in Egypt' reads naturally in English and signals explanatory force better
    than a bare coordinate 'and he was in Egypt.'
- source_word: מִצְרַיִם
  chosen: Egypt
  rationale: Standard English geographical name for the place-name מִצְרַיִם.
- source_word: אֲשֶׁר בָּרַח מִפְּנֵי שְׁלֹמֹה הַמֶּלֶךְ
  chosen: where he had fled from before King Solomon
  alternatives:
  - where he had fled from King Solomon
  - where he had escaped from the presence of King Solomon
  lexicon: HALOT
  rationale: אֲשֶׁר links back to Egypt ('where'). בָּרַח means 'fled/ran away.' מִפְּנֵי
    is literally 'from before/from the presence of'; in this context it denotes fleeing
    from Solomon's presence or threat. 'From before King Solomon' preserves the Hebrew
    nuance more closely, though less idiomatic than simply 'from King Solomon.'
- source_word: הַמֶּלֶךְ
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: In apposition with Solomon, English idiom prefers 'King Solomon' rather
    than 'Solomon the king.'
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - came back
  - dwelt again
  lexicon: HALOT
  rationale: In this narrative context שוב denotes returning to a place, not repentance
    or restoration in a theological sense.
- source_word: מִמִּצְרָיִם
  chosen: from Egypt
  rationale: The preposition מן marks source/origin of the return.
- source_word: שְׁמֹעַ ... heard it
  chosen: heard it
  alternatives:
  - heard
  - heard of it
  lexicon: HALOT
  rationale: Although no explicit object appears in the Hebrew of this verse, the
    broader context supplies the content heard. English normally requires an object
    or implied content marker; 'heard it' is concise and natural, with 'it' referring
    to the events just mentioned in context.
