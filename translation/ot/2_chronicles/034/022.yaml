id: 2CH.34.22
reference: 2 Chronicles 34:22
source:
  edition: WLC
  text: וַ/יֵּ֨לֶךְ חִלְקִיָּ֜הוּ וַ/אֲשֶׁ֣ר הַ/מֶּ֗לֶךְ אֶל חֻלְדָּ֨ה הַ/נְּבִיאָ֜ה
    אֵ֣שֶׁת שַׁלֻּ֣ם בֶּן תוקהת בֶּן חַסְרָה֙ שׁוֹמֵ֣ר הַ/בְּגָדִ֔ים וְ/הִ֛יא יוֹשֶׁ֥בֶת
    בִּ/ירוּשָׁלִַ֖ם בַּ/מִּשְׁנֶ֑ה וַ/יְדַבְּר֥וּ אֵלֶ֖י/הָ כָּ/זֹֽאת־׀־־׃ס
translation:
  text: 'Then Hilkiah and those whom the king had sent went to Huldah the prophetess,
    the wife of Shallum son of Tokhath, son of Hasrah, keeper of the garments. She
    lived in Jerusalem in the Second Quarter, and they spoke to her like this:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew mishneh, likely a named district of Jerusalem; traditionally rendered
      'the Second Quarter.'
    reason: cultural_note
  - marker: b
    text: Or 'keeper of the wardrobe.' The Hebrew is literally 'keeper of the garments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - went along
  - proceeded
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of הלך, rendered simply as past narrative
    'went.'
- source_word: וַאֲשֶׁר הַמֶּלֶךְ
  chosen: and those whom the king had sent
  alternatives:
  - and those of the king
  - and the king's servants
  lexicon: HALOT
  rationale: The phrase is elliptical in Hebrew ('and that/whom of the king'). In
    context, it refers back to the delegation named in the previous verse. English
    requires the implied sense to be supplied; 'had sent' makes the relation clear
    without over-paraphrasing.
- source_word: חֻלְדָּה הַנְּבִיאָה
  chosen: Huldah the prophetess
  alternatives:
  - Huldah the prophet
  lexicon: HALOT
  rationale: Name is transliterated; the feminine noun is best represented by 'prophetess'
    to preserve the source's gender marking.
- source_word: אֵשֶׁת שַׁלֻּם
  chosen: the wife of Shallum
  alternatives:
  - wife of Shallum
  lexicon: HALOT
  rationale: Construct phrase straightforwardly denotes marital relation.
- source_word: בֶּן תוקהת בֶּן חַסְרָה
  chosen: son of Tokhath, son of Hasrah
  lexicon: HALOT
  rationale: Genealogical chain retained formally; names transliterated.
- source_word: שׁוֹמֵר הַבְּגָדִים
  chosen: keeper of the garments
  alternatives:
  - keeper of the wardrobe
  - keeper of the clothes
  lexicon: HALOT
  rationale: Literally 'keeper of the garments.' This likely refers to an official
    wardrobe function, but the more literal rendering preserves the Hebrew while remaining
    understandable.
- source_word: וְהִיא יוֹשֶׁבֶת
  chosen: She lived
  alternatives:
  - and she was living
  - and she dwelt
  lexicon: HALOT
  rationale: The participial construction gives background information about residence.
    'She lived' is natural modern English for ongoing residence.
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard place-name rendering.
- source_word: בַּמִּשְׁנֶה
  chosen: in the Second Quarter
  alternatives:
  - in the Mishneh
  - in the second district
  lexicon: HALOT
  rationale: The term likely denotes a specific district/quarter of Jerusalem. Translating
    it communicates the sense; the transliterated form is worth preserving in a footnote.
- source_word: וַיְדַבְּרוּ אֵלֶיהָ כָּזֹאת
  chosen: 'and they spoke to her like this:'
  alternatives:
  - 'and they spoke to her thus:'
  - 'and they said this to her:'
  lexicon: HALOT
  rationale: Introduces the following speech. 'Like this' is readable modern English
    while preserving the demonstrative force of כָּזֹאת.
