id: 2CH.34.13
reference: 2 Chronicles 34:13
source:
  edition: WLC
  text: וְ/עַ֣ל הַ/סַּבָּלִ֗ים וּֽ/מְנַצְּחִים֙ לְ/כֹל֙ עֹשֵׂ֣ה מְלָאכָ֔ה לַ/עֲבוֹדָ֖ה
    וַ/עֲבוֹדָ֑ה וּ/מֵֽ/הַ/לְוִיִּ֔ם סוֹפְרִ֥ים וְ/שֹׁטְרִ֖ים וְ/שׁוֹעֲרִֽים׃
translation:
  text: They were over the burden-bearers and supervised everyone doing work for service
    after service; and some of the Levites were scribes, officers, and gatekeepers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for each kind of service.' The Hebrew repeats 'service' (literally,
      'for service and service'), likely expressing distribution across the various
      tasks.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: were over
  alternatives:
  - were in charge of
  - were appointed over
  lexicon: HALOT
  rationale: The preposition עַל in this administrative context indicates oversight
    or authority. Rendering it verbally as 'were over' gives natural English while
    preserving the sense of supervision from the previous clause.
- source_word: הַסַּבָּלִים
  chosen: the burden-bearers
  alternatives:
  - the carriers
  - the porters
  - the laborers
  lexicon: HALOT
  rationale: סַבָּלִים refers specifically to those carrying loads. 'Burden-bearers'
    is more precise than the broader 'laborers' and avoids the potentially misleading
    later English sense of 'porters'.
- source_word: וּמְנַצְּחִים
  chosen: and supervised
  alternatives:
  - and were overseers
  - and directed
  lexicon: HALOT
  rationale: The participle from נצח in this context denotes supervisory oversight.
    Because the clause already has an implied subject from the previous verse, an
    English finite verb 'supervised' reads naturally while preserving the participial
    force in context.
- source_word: לְכָל עֹשֵׂה מְלָאכָה
  chosen: everyone doing work
  alternatives:
  - every worker
  - all who did the work
  lexicon: HALOT
  rationale: This phrase is distributive and refers broadly to all engaged in the
    task. 'Everyone doing work' preserves the participial sense without overformal
    wording.
- source_word: לַעֲבוֹדָה וַעֲבוֹדָה
  chosen: for service after service
  alternatives:
  - for each kind of service
  - for service and service
  - for every task
  lexicon: HALOT
  rationale: The repetition of עֲבוֹדָה likely has a distributive or iterative force
    rather than merely redundant coordination. 'Service after service' preserves the
    repeated Hebrew more transparently than flattening it to 'every kind of service,'
    while still sounding idiomatic.
- source_word: וּמֵהַלְוִיִּם
  chosen: and some of the Levites were
  alternatives:
  - and from the Levites were
  - and among the Levites were
  lexicon: HALOT
  rationale: 'The מן construction is partitive: certain Levites filled the following
    roles. ''Some of the Levites were'' makes that sense explicit in natural English.'
- source_word: סוֹפְרִים
  chosen: scribes
  alternatives:
  - secretaries
  - recorders
  lexicon: HALOT
  rationale: סוֹפְרִים commonly denotes scribes or record-keepers. 'Scribes' is the
    standard and sufficiently clear rendering.
- source_word: שֹׁטְרִים
  chosen: officers
  alternatives:
  - officials
  - administrators
  lexicon: HALOT
  rationale: שֹׁטְרִים refers to officials with administrative or supervisory authority.
    'Officers' is concise and conventional in this institutional setting.
- source_word: שׁוֹעֲרִים
  chosen: gatekeepers
  alternatives:
  - doorkeepers
  - guards at the gates
  lexicon: HALOT
  rationale: The term denotes those stationed at gates, especially in temple or civic
    service. 'Gatekeepers' is the most direct and established equivalent.
