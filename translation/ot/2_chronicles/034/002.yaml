id: 2CH.34.2
reference: 2 Chronicles 34:2
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הַ/יָּשָׁ֖ר בְּ/עֵינֵ֣י יְהוָ֑ה וַ/יֵּ֗לֶךְ בְּ/דַרְכֵי֙ דָּוִ֣יד
    אָבִ֔י/ו וְ/לֹא סָ֖ר יָמִ֥ין וּ/שְׂמֹֽאול־׃
translation:
  text: He did what was right in the eyes of the LORD, and walked in the ways of David
    his father; he did not turn aside to the right or to the left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the sight of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: '''David his father'' uses ''father'' in the dynastic sense of ancestor.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - He acted
  - He made
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'). In this evaluative royal formula,
    'did' is the most natural English rendering and preserves the idiomatic construction
    with 'what was right.'
- source_word: הַיָּשָׁר
  chosen: what was right
  alternatives:
  - the right
  - what was upright
  lexicon: HALOT
  rationale: With the article and following evaluative phrase, the adjective functions
    substantivally. 'What was right' is idiomatic English and matches the moral evaluation
    intended.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for divine evaluation. 'In the eyes of
    the LORD' keeps the imagery while remaining clear. Per doctrine, יְהוָה is rendered
    'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered according to the project's default for יְהוָה,
    following established English convention and the doctrine guidance.
- source_word: וַיֵּלֶךְ
  chosen: walked
  alternatives:
  - went
  - lived
  lexicon: HALOT
  rationale: הלך in ethical contexts commonly means to conduct oneself. 'Walked' preserves
    the biblical metaphor and is standard, readable English.
- source_word: בְּדַרְכֵי
  chosen: in the ways of
  alternatives:
  - in the paths of
  - according to the ways of
  lexicon: HALOT
  rationale: '''Ways'' is the conventional and accurate rendering of דרך in moral/behavioral
    contexts, especially with ''walked.'''
- source_word: דָּוִיד אָבִיו
  chosen: David his father
  alternatives:
  - his father David
  - David his ancestor
  lexicon: HALOT
  rationale: The Hebrew apposition is naturally rendered 'David his father.' In royal
    genealogical language, 'father' can denote ancestor, but here the conventional
    dynastic sense is adequately conveyed without overexplaining in the main text.
- source_word: וְלֹא סָר
  chosen: he did not turn aside
  alternatives:
  - he did not depart
  - he did not deviate
  lexicon: HALOT
  rationale: סור in this context means to turn aside from a course. 'Did not turn
    aside' fits the road/path metaphor already established by 'walked in the ways.'
- source_word: יָמִין וּשְׂמֹאול
  chosen: to the right or to the left
  alternatives:
  - right or left
  - to the right hand or to the left
  lexicon: HALOT
  rationale: This is a fixed idiom for not deviating in either direction. 'To the
    right or to the left' is clear, natural, and preserves the metaphor.
