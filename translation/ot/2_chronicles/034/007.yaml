id: 2CH.34.7
reference: 2 Chronicles 34:7
source:
  edition: WLC
  text: וַ/יְנַתֵּ֣ץ אֶת הַֽ/מִּזְבְּח֗וֹת וְ/אֶת הָ/אֲשֵׁרִ֤ים וְ/הַ/פְּסִלִים֙ כִּתַּ֣ת
    לְ/הֵדַ֔ק וְ/כָל הַֽ/חַמָּנִ֥ים גִּדַּ֖ע בְּ/כָל אֶ֣רֶץ יִשְׂרָאֵ֑ל וַ/יָּ֖שָׁב
    לִ/ירוּשָׁלִָֽם־־־־׃ס
translation:
  text: He tore down the altars and the Asherim, and he crushed the carved images
    to powder; he cut down all the incense altars throughout all the land of Israel.
    Then he returned to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Asherah poles.' The Hebrew term refers to cultic objects associated
      with Asherah; the exact form may vary by context.
    reason: lexical_alternative
  - marker: b
    text: Or 'sun-pillars.' The Hebrew term likely refers to a type of cultic object,
      though its precise identification is debated.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְנַתֵּץ
  chosen: he tore down
  alternatives:
  - he broke down
  - he demolished
  lexicon: HALOT
  rationale: נתץ commonly denotes pulling down or tearing down structures. 'Tore down'
    is vivid, natural English and fits altars as physical cultic installations.
- source_word: הַמִּזְבְּחוֹת
  chosen: the altars
  lexicon: HALOT
  rationale: Standard rendering of מזבחות; context is illicit worship sites being
    destroyed.
- source_word: הָאֲשֵׁרִים
  chosen: the Asherim
  alternatives:
  - the Asherah poles
  - the sacred poles
  lexicon: HALOT
  rationale: אֲשֵׁרִים refers to cultic objects associated with Asherah. 'Asherim'
    preserves the specific term without overcommitting to the exact physical form
    in every case; the common explanatory alternative 'Asherah poles' is preserved
    in a footnote.
- source_word: הַפְּסִלִים
  chosen: the carved images
  alternatives:
  - the idols
  - the graven images
  lexicon: HALOT
  rationale: פסילים are carved cult images. 'Carved images' is more lexically precise
    than the broader 'idols' and more readable than the archaic 'graven images'.
- source_word: כִּתַּת לְהֵדַק
  chosen: he crushed ... to powder
  alternatives:
  - he beat ... into dust
  - he pulverized ... finely
  lexicon: HALOT
  rationale: The combination conveys crushing into fine particles. 'To powder' captures
    the result clearly in modern English.
- source_word: הַחַמָּנִים
  chosen: the incense altars
  alternatives:
  - the sun-pillars
  - the incense stands
  lexicon: HALOT
  rationale: חַמָּנִים denotes cultic objects, often linked either to sun-images/pillars
    or incense installations. In this reform context and in light of common usage
    in English Bible tradition, 'incense altars' is a clear main-text rendering, while
    the more literal alternative 'sun-pillars' is preserved in a footnote because
    the exact referent is debated.
- source_word: גִּדַּע
  chosen: he cut down
  alternatives:
  - he chopped down
  - he hewed down
  lexicon: HALOT
  rationale: גדע means to cut down or lop off, suitable for standing cult objects.
- source_word: בְּכָל אֶרֶץ יִשְׂרָאֵל
  chosen: throughout all the land of Israel
  alternatives:
  - in all the land of Israel
  lexicon: HALOT
  rationale: בכל with land language is well represented by 'throughout all the land
    of Israel,' emphasizing the breadth of Josiah's action.
- source_word: וַיָּשָׁב לִירוּשָׁלִָם
  chosen: Then he returned to Jerusalem
  alternatives:
  - and he returned to Jerusalem
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'Then' gives natural English sequence
    without obscuring the Hebrew narrative flow.
