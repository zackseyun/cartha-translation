theological_decisions:
- issue: Rendering of cultic terms associated with idolatry
  chosen_reading: Specific cultic objects are named ('Asherim,' 'carved images,' 'incense
    altars') rather than flattened into a generic term like 'idols.'
  alternative_readings:
  - Generic 'idols and shrines'
  rationale: This preserves the concrete nature of Josiah's reform actions and avoids
    paraphrase beyond the Hebrew. No doctrinal controversy is at stake, but lexical
    specificity better reflects the source text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Consistency of key terms, or documented exception.'
