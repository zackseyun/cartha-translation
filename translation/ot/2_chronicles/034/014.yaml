id: 2CH.34.14
reference: 2 Chronicles 34:14
source:
  edition: WLC
  text: וּ/בְ/הוֹצִיאָ֣/ם אֶת הַ/כֶּ֔סֶף הַ/מּוּבָ֖א בֵּ֣ית יְהוָ֑ה מָצָא֙ חִלְקִיָּ֣הוּ
    הַ/כֹּהֵ֔ן אֶת סֵ֥פֶר תּֽוֹרַת יְהוָ֖ה בְּ/יַד מֹשֶֽׁה־־־־׃
translation:
  text: And when they brought out the silver that had been brought into the house
    of the LORD, Hilkiah the priest found the Book of the Law of the LORD given through
    Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the hand of Moses,'' an idiom meaning ''through Moses'' or
      ''given through Moses.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְהוֹצִיאָם
  chosen: And when they brought out
  alternatives:
  - And as they were bringing out
  - And in their bringing out
  lexicon: HALOT
  rationale: 'The prefixed conjunction and preposition with the infinitive construct
    of יצא plus 3mp suffix forms a temporal clause: ''and/while/in their bringing
    out.'' English idiom is best served by ''And when they brought out,'' which preserves
    the temporal sense without awkwardness.'
- source_word: הַכֶּסֶף
  chosen: the silver
  alternatives:
  - the money
  lexicon: HALOT
  rationale: כֶּסֶף can mean either 'silver' or 'money.' In this temple-restoration
    context it refers to collected funds, but the Hebrew lexical form is literally
    'silver.' 'Silver' preserves the source wording while remaining understandable.
- source_word: הַמּוּבָא
  chosen: that had been brought into
  alternatives:
  - which was brought into
  - being brought into
  lexicon: HALOT
  rationale: 'The Hophal participle of בוא is passive: ''brought in/brought into.''
    The relative sense is supplied naturally in English: ''the silver that had been
    brought into.'' The pluperfect-like English phrasing fits the sequence of events.'
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' Following the doctrinal standard, יְהוָה is
    rendered 'the LORD.' 'House' is retained rather than 'temple' to stay closer to
    the Hebrew while still idiomatic.
- source_word: מָצָא
  chosen: found
  alternatives:
  - discovered
  lexicon: HALOT
  rationale: The Qal perfect straightforwardly means 'found.' 'Discovered' is possible
    but slightly more interpretive.
- source_word: חִלְקִיָּהוּ הַכֹּהֵן
  chosen: Hilkiah the priest
  alternatives:
  - the priest Hilkiah
  lexicon: HALOT
  rationale: Standard English apposition after the verb is 'Hilkiah the priest.' The
    personal name is transliterated per project philosophy.
- source_word: סֵפֶר תּוֹרַת יְהוָה
  chosen: the Book of the Law of the LORD
  alternatives:
  - the scroll of the Law of the LORD
  - the book of the instruction of the LORD
  lexicon: HALOT
  rationale: סֵפֶר is broadly 'book/document/scroll'; 'Book' reflects traditional
    and natural English here. תּוֹרָה can mean 'instruction' or 'law'; in this covenantal
    context 'Law' is the most established and contextually fitting rendering. The
    construct chain is preserved.
- source_word: בְּיַד מֹשֶׁה
  chosen: given through Moses
  alternatives:
  - by the hand of Moses
  - through the hand of Moses
  - through Moses
  lexicon: HALOT
  rationale: The idiom בְּיַד + person often means agency or mediation, literally
    'by the hand of.' In English, 'given through Moses' communicates mediated authorship/delivery
    clearly and idiomatically without woodenness. This is an optimal-equivalence rendering
    of the Hebrew idiom.
