id: 2CH.34.18
reference: 2 Chronicles 34:18
source:
  edition: WLC
  text: וַ/יַּגֵּ֞ד שָׁפָ֤ן הַ/סּוֹפֵר֙ לַ/מֶּ֣לֶךְ לֵ/אמֹ֔ר סֵ֚פֶר נָ֣תַן לִ֔/י חִלְקִיָּ֖הוּ
    הַ/כֹּהֵ֑ן וַ/יִּקְרָא ב֥/וֹ שָׁפָ֖ן לִ/פְנֵ֥י הַ/מֶּֽלֶךְ־׃
translation:
  text: Then Shaphan the scribe told the king, saying, “Hilkiah the priest has given
    me a book,” and Shaphan read from it before the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a scroll.” The Hebrew word can refer broadly to a written document or
      book; the physical form in this period was often a scroll.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - reported
  - declared
  lexicon: HALOT
  rationale: The verb נגד in the Hiphil commonly means to tell or report. 'Told' is
    natural modern English and fits the direct speech that follows without overstating
    formality.
- source_word: הַסּוֹפֵר
  chosen: the scribe
  alternatives:
  - the secretary
  lexicon: HALOT
  rationale: סֹפֵר can denote a royal secretary or official scribe. 'Scribe' preserves
    the lexical form and historical setting better, while remaining understandable.
- source_word: סֵפֶר
  chosen: a book
  alternatives:
  - a scroll
  - a document
  lexicon: HALOT
  rationale: סֵפֶר is a general term for a written document/book. 'Book' is the broadest
    and most natural rendering here; while the physical form may have been a scroll,
    the Hebrew term itself does not require that specificity.
- source_word: נָתַן לִי
  chosen: has given me
  alternatives:
  - gave me
  lexicon: HALOT
  rationale: 'English present perfect works well in the quotation to convey a completed
    action with present relevance: the book is now in Shaphan''s possession. Simple
    past would also be possible, but ''has given me'' better matches the immediate
    context of presentation.'
- source_word: חִלְקִיָּהוּ הַכֹּהֵן
  chosen: Hilkiah the priest
  lexicon: HALOT
  rationale: Standard transliteration of the personal name with the title translated,
    following the project's principle to transliterate names and translate titles.
- source_word: וַיִּקְרָא בוֹ
  chosen: read from it
  alternatives:
  - read it
  - read in it
  lexicon: HALOT
  rationale: The preposition בּוֹ is most naturally represented by 'from it' in English
    when referring to reading aloud from a written work. 'Read it' is possible but
    leaves the preposition untranslated; 'read from it' is both accurate and idiomatic.
- source_word: לִפְנֵי הַמֶּלֶךְ
  chosen: before the king
  alternatives:
  - in the presence of the king
  lexicon: HALOT
  rationale: This phrase indicates presence before the king. 'Before the king' is
    concise, idiomatic, and formally close to the Hebrew.
