id: 2CH.34.16
reference: 2 Chronicles 34:16
source:
  edition: WLC
  text: וַ/יָּבֵ֨א שָׁפָ֤ן אֶת הַ/סֵּ֨פֶר֙ אֶל הַ/מֶּ֔לֶךְ וַ/יָּ֨שֶׁב ע֧וֹד אֶת הַ/מֶּ֛לֶךְ
    דָּבָ֖ר לֵ/אמֹ֑ר כֹּ֛ל אֲשֶׁר נִתַּ֥ן בְּ/יַד עֲבָדֶ֖י/ךָ הֵ֥ם עֹשִֽׂים־־־־־׃
translation:
  text: Then Shaphan brought the book to the king and also brought back word to the
    king, saying, “All that was put into the hand of your servants, they are doing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Everything that was entrusted to your servants, they are carrying out.”
      The Hebrew idiom is literally “was put into the hand of your servants.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  chosen: brought
  alternatives:
  - came with
  - presented
  lexicon: HALOT
  rationale: Hiphil of בוא here is causative, indicating that Shaphan brought the
    book to the king rather than merely coming himself.
- source_word: הַסֵּפֶר
  chosen: the book
  alternatives:
  - the scroll
  - the document
  lexicon: HALOT
  rationale: סֵפֶר can denote a scroll/document, but 'book' is the most natural English
    rendering here and matches the narrative reference to the discovered law-book
    without over-specifying the material form.
- source_word: וַיָּשֶׁב עוֹד אֶת־הַמֶּלֶךְ דָּבָר
  chosen: also brought back word to the king
  alternatives:
  - further reported to the king
  - answered the king again
  lexicon: HALOT
  rationale: The idiom with שוב + דבר means to return/report a matter. 'Brought back
    word' preserves the sense of reporting back after inquiry or commission. עוֹד
    adds the sense 'also/further.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard quotative introducing direct speech.
- source_word: כֹּל אֲשֶׁר נִתַּן בְּיַד עֲבָדֶיךָ
  chosen: All that was put into the hand of your servants
  alternatives:
  - Everything that was entrusted to your servants
  - All that was given into your servants' charge
  lexicon: HALOT
  rationale: The passive נִתַּן with בְיַד is an idiom for entrusting something to
    someone's charge. 'Put into the hand' keeps the Hebrew imagery while remaining
    understandable.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your officials
  - your slaves
  lexicon: HALOT
  rationale: In royal court context, עבד often denotes royal servants/officials. 'Servants'
    is the best contextual rendering; 'slaves' would overstate the bonded aspect here,
    and 'officials' is interpretive.
- source_word: הֵם עֹשִׂים
  chosen: they are doing
  alternatives:
  - they are carrying out
  - they are doing it
  lexicon: HALOT
  rationale: The Hebrew uses an explicit pronoun plus participle for emphasis/ongoing
    action. 'They are doing' preserves the progressive sense and emphasis without
    adding an object not present in the text.
