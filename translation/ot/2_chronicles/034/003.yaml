id: 2CH.34.3
reference: 2 Chronicles 34:3
source:
  edition: WLC
  text: וּ/בִ/שְׁמוֹנֶ֨ה שָׁנִ֜ים לְ/מָלְכ֗/וֹ וְ/הוּא֙ עוֹדֶ֣/נּוּ נַ֔עַר הֵחֵ֕ל
    לִ/דְר֕וֹשׁ לֵ/אלֹהֵ֖י דָּוִ֣יד אָבִ֑י/ו וּ/בִ/שְׁתֵּ֧ים עֶשְׂרֵ֣ה שָׁנָ֗ה הֵחֵל֙
    לְ/טַהֵ֔ר אֶת יְהוּדָה֙ וִ/יר֣וּשָׁלִַ֔ם מִן הַ/בָּמוֹת֙ וְ/הָ֣/אֲשֵׁרִ֔ים וְ/הַ/פְּסִלִ֖ים
    וְ/הַ/מַּסֵּכֽוֹת־־׃
translation:
  text: In the eighth year of his reign, while he was still a youth, he began to seek
    the God of David his father; and in the twelfth year he began to cleanse Judah
    and Jerusalem from the high places, the Asherim, the carved images, and the metal
    images.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the God of David his ancestor'; 'father' here reflects normal royal
      ancestry language.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Asherah poles.' The Hebrew term may refer to cultic symbols associated
      with Asherah, often wooden poles or trees.
    reason: lexical_alternative
  - marker: c
    text: Or 'cast images' or 'molten images.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִשְׁמוֹנֶה שָׁנִים לְמָלְכוֹ
  chosen: In the eighth year of his reign
  alternatives:
  - When he had reigned eight years
  - In the eighth year of his kingship
  lexicon: HALOT
  rationale: The Hebrew preposition ב with a year expression is naturally temporal
    ('in the eighth year'), and לְמָלְכוֹ specifies the regnal framework ('of his
    reign'). This is idiomatic and precise in English.
- source_word: וְהוּא עוֹדֶנּוּ נַעַר
  chosen: while he was still a youth
  alternatives:
  - while he was still young
  - while he was still a boy
  lexicon: HALOT
  rationale: נַעַר can mean boy, youth, or young man depending on context. Since Josiah
    is not a small child here but still immature in age, 'youth' best preserves the
    sense without sounding either too childish ('boy') or too vague ('young'). עוֹדֶנּוּ
    adds the nuance 'still/yet,' which is preserved by 'still.'
- source_word: הֵחֵל לִדְרֹשׁ
  chosen: he began to seek
  alternatives:
  - he began to inquire of
  - he began to seek after
  lexicon: HALOT
  rationale: דרשׁ in relation to God commonly means to seek him devotionally, not
    merely to ask questions. 'Seek' is the standard and most natural rendering in
    this covenantal-religious context.
- source_word: לֵאלֹהֵי דָּוִיד אָבִיו
  chosen: the God of David his father
  alternatives:
  - the God of David his ancestor
  lexicon: HALOT
  rationale: The phrase is literal and genealogical. Although David is a forefather
    rather than immediate father, 'his father' reflects normal biblical usage for
    royal ancestry and preserves the Hebrew wording. An explanatory alternative is
    worth preserving in a footnote.
- source_word: וּבִשְׁתֵּים עֶשְׂרֵה שָׁנָה
  chosen: and in the twelfth year
  alternatives:
  - and in his twelfth year
  - when he was twelve years into his reign
  lexicon: HALOT
  rationale: The regnal-year reference is carried over from context. English naturally
    supplies 'the' and keeps the temporal sequence clear.
- source_word: הֵחֵל לְטַהֵר
  chosen: he began to cleanse
  alternatives:
  - he began to purify
  - he began to make clean
  lexicon: HALOT
  rationale: טהר here refers to removing cultic defilement from the land and city.
    'Cleanse' captures both ritual and moral-religious overtones better than the more
    abstract 'purify' in this context.
- source_word: אֶת יְהוּדָה וִירוּשָׁלַם
  chosen: Judah and Jerusalem
  lexicon: HALOT
  rationale: Straightforward proper names; no reason to paraphrase. The pairing highlights
    both kingdom and capital.
- source_word: מִן הַבָּמוֹת
  chosen: from the high places
  alternatives:
  - from the shrines on the high places
  lexicon: HALOT
  rationale: בָּמוֹת is the standard term for local elevated cult sites. 'High places'
    is established, accurate, and still understandable in modern English.
- source_word: וְהָאֲשֵׁרִים
  chosen: the Asherim
  alternatives:
  - the Asherah poles
  - the sacred poles
  lexicon: HALOT
  rationale: אֲשֵׁרִים may refer either to cultic poles/trees associated with Asherah
    or, more broadly, Asherah-symbols. 'Asherim' preserves the Hebrew term without
    over-deciding the exact physical form. A lexical alternative should be footnoted
    for readers.
- source_word: וְהַפְּסִלִים
  chosen: the carved images
  alternatives:
  - the idols
  - the graven images
  lexicon: HALOT
  rationale: פְּסִלִים are images fashioned by carving. 'Carved images' is transparent
    and more specific than the broader 'idols'; 'graven images' is traditional but
    archaic.
- source_word: וְהַמַּסֵּכוֹת
  chosen: the metal images
  alternatives:
  - the cast images
  - the molten images
  lexicon: HALOT
  rationale: מַסֵּכוֹת are images made by casting metal. 'Metal images' is readable
    modern English; 'cast images' is possible but slightly less transparent, and 'molten
    images' is traditional but dated.
