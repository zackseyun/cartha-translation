theological_decisions:
- issue: Rendering of ancestral language in 'David his father'
  chosen_reading: Retain 'father' in the main text
  alternative_readings:
  - ancestor
  rationale: The Hebrew uses standard dynastic language. Preserving 'father' maintains
    the biblical idiom and literary connection to Davidic kingship, while the footnote
    can clarify that it means forefather rather than immediate parent.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
    and §5 (consistency of key terms, or documented exception)
