id: 2CH.34.21
reference: 2 Chronicles 34:21
source:
  edition: WLC
  text: לְכוּ֩ דִרְשׁ֨וּ אֶת יְהוָ֜ה בַּעֲדִ֗/י וּ/בְעַד֙ הַ/נִּשְׁאָר֙ בְּ/יִשְׂרָאֵ֣ל וּ/בִֽ/יהוּדָ֔ה עַל דִּבְרֵ֥י הַ/סֵּ֖פֶר אֲשֶׁ֣ר נִמְצָ֑א כִּֽי גְדוֹלָ֤ה חֲמַת יְהוָה֙ אֲשֶׁ֣ר נִתְּכָ֣ה בָ֔/נוּ עַל֩ אֲשֶׁ֨ר לֹא שָׁמְר֤וּ אֲבוֹתֵ֨י/נוּ֙ אֶת דְּבַ֣ר יְהוָ֔ה לַ/עֲשׂ֕וֹת כְּ/כָל הַ/כָּת֖וּב עַל הַ/סֵּ֥פֶר הַ/זֶּֽה־־־־־־־־׃פ
translation:
  text: Go, inquire of Yahweh for me and for the remnant in Israel and in Judah concerning the words of the book that has been found, for great is the wrath of Yahweh that has been poured out on us, because our fathers have not kept the word of Yahweh, to do according to all that is written in this book.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the scroll that was found.' The Hebrew word can denote a book or a scroll; 'book' is used in the main text for natural English.
    reason: lexical_alternative
  - marker: b
    text: Or 'our ancestors.' The Hebrew is literally 'our fathers.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in this scroll.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִרְשׁוּ אֶת־יְהוָה
  chosen: inquire of the LORD
  alternatives:
  - seek the LORD
  - consult the LORD
  lexicon: HALOT
  rationale: In this royal command context, דרשׁ with את יהוה means to seek divine guidance or inquiry from God, not merely devotional seeking. 'Inquire of' best captures the practical sense of consulting the LORD about the discovered book.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and broad English Bible recognizability.
- source_word: בַּעֲדִי
  chosen: for me
  alternatives:
  - on my behalf
  lexicon: HALOT
  rationale: בעד here marks representation or benefit. 'For me' is natural modern English and sufficiently precise in context.
- source_word: וּבְעַד הַנִּשְׁאָר בְּיִשְׂרָאֵל וּבִיהוּדָה
  chosen: and for the remnant in Israel and in Judah
  alternatives:
  - and on behalf of the remnant in Israel and Judah
  - and for those left in Israel and Judah
  lexicon: HALOT
  rationale: הנשאר denotes those remaining, idiomatically 'the remnant.' This preserves the covenant-historical nuance without overexpanding the phrase.
- source_word: עַל דִּבְרֵי הַסֵּפֶר
  chosen: concerning the words of the book
  alternatives:
  - about the words of the book
  - regarding the matters of the book
  lexicon: HALOT
  rationale: על with דברי here introduces the subject matter of inquiry. 'Concerning the words of the book' stays close to the Hebrew while remaining readable.
- source_word: הַסֵּפֶר אֲשֶׁר נִמְצָא
  chosen: the book that has been found
  alternatives:
  - the scroll that was found
  lexicon: HALOT
  rationale: ספר can mean 'book' or 'scroll.' 'Book' is retained in the main text for straightforward readability, while 'scroll' remains a viable lexical alternative reflecting ancient material form.
- source_word: גְדוֹלָה חֲמַת יְהוָה
  chosen: great is the wrath of the LORD
  alternatives:
  - the LORD's wrath is great
  - great is the fury of the LORD
  lexicon: HALOT
  rationale: חמה denotes burning wrath or fury. 'Wrath' is the most standard and theologically weighty English equivalent here; the fronted predicate 'great is' reflects the Hebrew emphasis.
- source_word: נִתְּכָה בָנוּ
  chosen: has been poured out on us
  alternatives:
  - has been kindled against us
  - has been unleashed on us
  lexicon: HALOT
  rationale: נתך in the Niphal commonly conveys being poured out, especially of wrath. 'Poured out on us' is the most direct and idiomatic rendering.
- source_word: אֲבוֹתֵינוּ
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural and refers to forefathers. Per project policy, the gendered form is preserved in the main text rather than neutralized.
- source_word: שָׁמְרוּ אֶת־דְּבַר יְהוָה
  chosen: have not kept the word of the LORD
  alternatives:
  - have not obeyed the word of the LORD
  - have not observed the word of the LORD
  lexicon: HALOT
  rationale: שׁמר with דבר conveys keeping/observing what the LORD has spoken. 'Kept' preserves the lexical link while remaining natural English.
- source_word: לַעֲשׂוֹת כְּכָל הַכָּתוּב
  chosen: to do according to all that is written
  alternatives:
  - to act according to all that is written
  - to do all that is written
  lexicon: HALOT
  rationale: 'The infinitive expresses the content or purpose of keeping the word: carrying it out. ''To do according to all that is written'' closely reflects the Hebrew structure and scope.'
- source_word: עַל־הַסֵּפֶר הַזֶּה
  chosen: in this book
  alternatives:
  - in this scroll
  lexicon: HALOT
  rationale: Although על can be literally 'on,' in English the natural idiom for written content is 'in this book.' This is a context-driven adjustment for readability without loss of meaning.
