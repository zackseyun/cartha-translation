id: 2CH.34.29
reference: 2 Chronicles 34:29
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֖ח הַ/מֶּ֑לֶךְ וַ/יֶּאֱסֹ֕ף אֶת כָּל זִקְנֵ֥י יְהוּדָ֖ה וִ/ירוּשָׁלִָֽם־־׃
translation:
  text: Then the king sent word and gathered all the elders of Judah and Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Then the king sent and gathered all the elders of Judah
      and Jerusalem.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent word
  alternatives:
  - sent
  - sent for
  lexicon: HALOT
  rationale: The verb שׁלח literally means 'sent.' In this context, with the following
    gathering of the elders, English idiom is clarified by rendering it 'sent word,'
    indicating that the king dispatched a summons rather than personally going. 'Sent
    for' is possible, but 'sent word' preserves the sequential action without over-interpreting
    the mechanism.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun. The referent is Josiah
    from context, but the Hebrew uses the title rather than the personal name here,
    so 'the king' is retained.
- source_word: וַיֶּאֱסֹף
  chosen: gathered
  alternatives:
  - assembled
  - collected
  lexicon: HALOT
  rationale: אָסף commonly means 'gather' or 'assemble.' 'Gathered' is natural modern
    English and fits the direct object 'all the elders.'
- source_word: אֶת כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: The object marker אֶת is untranslated in English; כָּל is rendered 'all'
    to preserve the comprehensiveness of the gathering.
- source_word: זִקְנֵי
  chosen: the elders
  alternatives:
  - the leaders
  - the old men
  lexicon: HALOT
  rationale: זָקֵן in this construct plural refers to recognized civic/community elders,
    not merely elderly males. 'The elders' is the standard and contextually accurate
    rendering.
- source_word: יְהוּדָה וִירוּשָׁלִָם
  chosen: of Judah and Jerusalem
  alternatives:
  - of Judah and of Jerusalem
  lexicon: HALOT
  rationale: 'The phrase identifies the elders belonging to both Judah and Jerusalem.
    English can omit the repeated preposition smoothly: ''of Judah and Jerusalem.''
    This preserves the geographic-political scope of the assembly.'
