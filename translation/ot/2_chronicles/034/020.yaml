id: 2CH.34.20
reference: 2 Chronicles 34:20
source:
  edition: WLC
  text: וַ/יְצַ֣ו הַ/מֶּ֡לֶךְ אֶת חִלְקִיָּ֡הוּ וְ/אֶת אֲחִיקָ֣ם בֶּן שָׁ֠פָן וְ/אֶת
    עַבְדּ֨וֹן בֶּן מִיכָ֜ה וְ/אֵ֣ת שָׁפָ֣ן הַ/סּוֹפֵ֗ר וְ/אֵ֛ת עֲשָׂיָ֥ה עֶֽבֶד הַ/מֶּ֖לֶךְ
    לֵ/אמֹֽר־־־־־׀־׃
translation:
  text: Then the king commanded Hilkiah, Ahikam son of Shaphan, Abdon son of Micah,
    Shaphan the scribe, and Asaiah the king’s servant, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Masoretic Text reads 'Abdon son of Micah.' The parallel in 2 Kings 22:12
      has 'Achbor son of Micaiah.'
    reason: textual_variant
  - marker: b
    text: Or 'Asaiah, the king’s official.' The Hebrew literally reads 'the king’s
      servant,' which can denote a court official.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - ordered
  - charged
  lexicon: HALOT
  rationale: The waw-consecutive verb from צוה introduces a direct royal command.
    'Commanded' is the most natural modern English equivalent and preserves the authoritative
    force better than the softer 'told.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to Josiah in context; 'the king' is the straightforward
    rendering.
- source_word: חִלְקִיָּהוּ
  chosen: Hilkiah
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: אֲחִיקָם בֶּן שָׁפָן
  chosen: Ahikam son of Shaphan
  alternatives:
  - Ahikam the son of Shaphan
  rationale: Names are transliterated; 'son of' is the standard concise rendering
    of בן in genealogical identification.
- source_word: עַבְדּוֹן בֶּן מִיכָה
  chosen: Abdon son of Micah
  alternatives:
  - Abdon the son of Micah
  rationale: Standard rendering of the personal name plus patronymic. This follows
    the Masoretic Text of Chronicles.
- source_word: שָׁפָן הַסֹּפֵר
  chosen: Shaphan the scribe
  alternatives:
  - Shaphan the secretary
  lexicon: HALOT
  rationale: סֹפֵר can denote a royal secretary or official scribe. 'Scribe' preserves
    the lexical form and remains clear in English; 'secretary' is possible but slightly
    more interpretive.
- source_word: עֲשָׂיָה עֶבֶד הַמֶּלֶךְ
  chosen: Asaiah the king’s servant
  alternatives:
  - Asaiah, the king’s official
  lexicon: HALOT
  rationale: עֶבֶד literally means 'servant' and in court contexts can denote an official
    in royal service. Here 'servant' keeps the lexical transparency; 'official' is
    a contextual alternative worth preserving.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: Standard Hebrew speech-introduction formula. 'Saying' is idiomatic in
    English narrative and signals that the content follows in the next verse.
