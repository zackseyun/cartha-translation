theological_decisions:
- issue: Meaning of the promise 'in peace' in light of Josiah's later death in battle
  chosen_reading: The phrase refers to a peaceful end in the sense that Josiah would die before witnessing the announced judgment on the place and its inhabitants, not necessarily that his death itself would be nonviolent.
  alternative_readings:
  - The phrase predicts an outwardly peaceful death
  - The phrase refers primarily to peaceful burial
  rationale: 'The immediate explanatory clause defines the peace: ''your eyes will not see all the disaster.'' This preserves the textual tension without forcing harmonization beyond what the verse states.'
  doctrine_reference: Preserve theological tension rather than resolve it.
