id: 2CH.34.28
reference: 2 Chronicles 34:28
source:
  edition: WLC
  text: הִנְ/נִ֨י אֹֽסִפְ/ךָ֜ אֶל אֲבֹתֶ֗י/ךָ וְ/נֶאֱסַפְתָּ֣ אֶל קִבְרֹתֶי/ךָ֮ בְּ/שָׁלוֹם֒ וְ/לֹא תִרְאֶ֣ינָה עֵינֶ֔י/ךָ בְּ/כֹל֙ הָֽ/רָעָ֔ה אֲשֶׁ֨ר אֲנִ֥י מֵבִ֛יא עַל הַ/מָּק֥וֹם הַ/זֶּ֖ה וְ/עַל יֹשְׁבָ֑י/ו וַ/יָּשִׁ֥יבוּ אֶת הַ/מֶּ֖לֶךְ דָּבָֽר־־־־־־׃פ
translation:
  text: Behold, I am about to gather you to your fathers, and you will be gathered to your grave in peace, and your eyes will not see all the disaster that I am bringing on this place and on its inhabitants.’ And they brought back word to the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to your ancestors.' The Hebrew reads 'to your fathers,' a common idiom for joining one’s forefathers in death.
    reason: lexical_alternative
  - marker: b
    text: '''In peace'' likely means that Josiah would be spared from seeing the coming disaster, as the next clause explains; it need not imply that his death itself would be without violence.'
    reason: cross_reference
  - marker: c
    text: Or 'to your graves'.
    reason: previous_rendering
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold, I am about to
  alternatives:
  - Behold, I will
  - Look, I am going to
  lexicon: HALOT
  rationale: Introduces the divine declaration with immediacy. 'Behold' preserves the formal discourse marker, while 'I am about to' brings out the imminent/future force of the participial construction with following verb.
- source_word: אֹסִפְךָ
  chosen: gather you
  alternatives:
  - take you away
  - bring you in
  lexicon: HALOT
  rationale: אָסַף in this context is a standard idiom for being gathered in death to one's ancestors. 'Gather you' preserves the metaphor and allows the following phrase 'to your fathers' to carry the funerary sense.
- source_word: אֶל אֲבֹתֶיךָ
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: A conventional Hebrew idiom for joining one's forefathers in death. 'Fathers' is retained as the source-oriented rendering; 'ancestors' is possible but less formally aligned.
- source_word: וְנֶאֱסַפְתָּ
  chosen: you will be gathered
  alternatives:
  - you will be taken
  - you will be brought in
  lexicon: HALOT
  rationale: The passive/Niphal continues the death idiom. Rendering it with 'be gathered' preserves the lexical connection with the previous verb and the Hebrew imagery.
- source_word: אֶל קִבְרֹתֶיךָ
  chosen: to your graves
  alternatives:
  - to your tombs
  - to your burial places
  lexicon: HALOT
  rationale: Plural 'graves' reflects the Hebrew form directly. Though English often prefers singular in such contexts, retaining the plural preserves the source wording without obscuring meaning.
- source_word: בְּשָׁלוֹם
  chosen: in peace
  alternatives:
  - peacefully
  - in well-being
  lexicon: HALOT
  rationale: שָׁלוֹם here denotes a peaceful end rather than necessarily absence of violent circumstances. 'In peace' is the standard and sufficiently broad rendering.
- source_word: וְלֹא תִרְאֶינָה עֵינֶיךָ
  chosen: your eyes will not see
  alternatives:
  - you will not see
  lexicon: HALOT
  rationale: The Hebrew explicitly uses 'your eyes' as the subject. Retaining the bodily expression preserves the vividness and emphasis of the source.
- source_word: בְּכֹל הָרָעָה
  chosen: all the disaster
  alternatives:
  - all the evil
  - all the calamity
  lexicon: HALOT
  rationale: רָעָה in judgment contexts often denotes calamity/disaster rather than moral evil. 'Disaster' communicates the announced national judgment clearly in modern English.
- source_word: מֵבִיא
  chosen: I am bringing
  alternatives:
  - I will bring
  lexicon: HALOT
  rationale: The participle conveys an action viewed as impending or already set in motion. 'I am bringing' preserves that aspect better than a simple future.
- source_word: עַל הַמָּקוֹם הַזֶּה
  chosen: on this place
  alternatives:
  - upon this place
  lexicon: HALOT
  rationale: '''This place'' in context refers to Jerusalem/Judah as the location under judgment. ''On'' is natural modern English for עַל here.'
- source_word: וְעַל יֹשְׁבָיו
  chosen: and on its inhabitants
  alternatives:
  - and on those who dwell in it
  lexicon: HALOT
  rationale: A clear, natural rendering of the participial noun with pronominal suffix. 'Its inhabitants' is concise and faithful.
- source_word: וַיָּשִׁיבוּ אֶת הַמֶּלֶךְ דָּבָר
  chosen: And they brought back word to the king
  alternatives:
  - And they answered the king with a word
  - And they returned the matter to the king
  - And they reported to the king
  lexicon: HALOT
  rationale: This idiom means to bring back a report/message. 'Brought back word to the king' preserves the sense of returning with an answer after inquiry.
