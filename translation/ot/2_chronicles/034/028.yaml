  source_review: state/reviews/gemini/v31_full_coverage/ot/2_chronicles/034/028.job-60220.json
  category: awkward_english
  tier: 1
  from: to your graves
  to: to your grave
  rationale: While the Hebrew noun is plural (קִבְרֹתֶיךָ), translating it as 'your graves' for a single individual is awkward in English and implies burial in multiple locations. The Hebrew plural likely refers to the ancestral burial ground (a complex of tombs) or is a plural of extension. English idiom strongly prefers the singular 'grave' or 'tomb' here.
