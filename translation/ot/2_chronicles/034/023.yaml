id: 2CH.34.23
reference: 2 Chronicles 34:23
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר לָ/הֶ֔ם כֹּה אָמַ֥ר יְהוָ֖ה אֱלֹהֵ֣י יִשְׂרָאֵ֑ל אִמְר֣וּ לָ/אִ֔ישׁ אֲשֶׁר שָׁלַ֥ח אֶתְ/כֶ֖ם אֵלָֽ/י־־׃ס
translation:
  text: 'And she said to them, “Thus says Yahweh, the God of Israel: Say to the man who sent you to me,”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the LORD'' represents the divine name YHWH; alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: And she said
  alternatives:
  - Then she said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next event in sequence. 'And she said' preserves the narrative flow without overinterpreting the conjunction as strictly temporal.
- source_word: לָהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Directly renders the preposition ל plus 3mp suffix, indicating the addressees of Huldah's speech.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - Thus said
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Present-tense 'says' is idiomatic in English for Hebrew prophetic speech formulas, even with a perfect verb.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct phrase identifying YHWH covenantally as Israel's God; straightforward formal rendering is clear and natural.
- source_word: אִמְרוּ
  chosen: Say
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: Imperative plural addressed to the delegation. 'Say' keeps closer to the Hebrew verb אמר and fits the formal prophetic setting.
- source_word: לָאִישׁ
  chosen: to the man
  alternatives:
  - to the האיש/man
  lexicon: HALOT
  rationale: The noun איש is singular masculine, referring specifically to King Josiah as the one who sent them. 'Man' is gender-accurate to the source and should not be neutralized.
- source_word: אֲשֶׁר שָׁלַח אֶתְכֶם אֵלַי
  chosen: who sent you to me
  alternatives:
  - that sent you to me
  lexicon: HALOT
  rationale: Relative clause with שלח plainly identifies the man by his action. 'Who sent you to me' is natural modern English and preserves the directionality of אֵלַי.
