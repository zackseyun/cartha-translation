id: 2CH.34.1
reference: 2 Chronicles 34:1
source:
  edition: WLC
  text: בֶּן שְׁמוֹנֶ֥ה שָׁנִ֖ים יֹאשִׁיָּ֣הוּ בְ/מָלְכ֑/וֹ וּ/שְׁלֹשִׁ֤ים וְ/אַחַת֙
    שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָֽם־׃
translation:
  text: Josiah was eight years old when he became king, and he reigned thirty-one
    years in Jerusalem.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן שְׁמוֹנֶה שָׁנִים
  chosen: was eight years old
  alternatives:
  - was a son of eight years
  - was eight years old when he began to reign
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'a son of eight years,' a standard age
    expression best rendered in natural English as 'was eight years old.' This preserves
    the sense without wooden literalism.
- source_word: יֹאשִׁיָּהוּ
  chosen: Josiah
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: בְמָלְכוֹ
  chosen: when he became king
  alternatives:
  - when he began to reign
  - at his reigning
  lexicon: HALOT
  rationale: The infinitive/verb construction marks the time of accession. 'When he
    became king' is clear modern English and fits the narrative context; 'when he
    began to reign' is more formal but less natural.
- source_word: וּשְׁלֹשִׁים וְאַחַת שָׁנָה
  chosen: thirty-one years
  alternatives:
  - one and thirty years
  lexicon: HALOT
  rationale: This is the duration of Josiah's reign. Standard contemporary English
    number order is preferable.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb specifically denotes reigning as king; 'he reigned' is the most
    direct and idiomatic rendering in English.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  rationale: Straightforward locative use; no contextual reason to expand beyond the
    place name.
