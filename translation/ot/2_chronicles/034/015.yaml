id: 2CH.34.15
reference: 2 Chronicles 34:15
source:
  edition: WLC
  text: וַ/יַּ֣עַן חִלְקִיָּ֗הוּ וַ/יֹּ֨אמֶר֙ אֶל שָׁפָ֣ן הַ/סּוֹפֵ֔ר סֵ֧פֶר הַ/תּוֹרָ֛ה מָצָ֖אתִי בְּ/בֵ֣ית יְהוָ֑ה וַ/יִּתֵּ֧ן חִלְקִיָּ֛הוּ אֶת הַ/סֵּ֖פֶר אֶל שָׁפָֽן־־־׃
translation:
  text: Then Hilkiah answered and said to Shaphan the scribe, “I have found the Book of the Law in the house of Yahweh.” And Hilkiah gave the book to Shaphan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the scroll of the law”; Hebrew sefer can refer to a book, document, or scroll.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: ענה in the wayyiqtol commonly introduces a reply in narrative. 'Answered' preserves the Hebrew discourse marker, even though no direct question immediately precedes; 'responded' is possible but less conventional in this formula.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: אמר is the standard verb of speech. 'Said' is the most natural and direct rendering in English narrative.
- source_word: הַסּוֹפֵר
  chosen: the scribe
  alternatives:
  - the secretary
  - the recorder
  lexicon: HALOT
  rationale: סֹפֵר can denote an official secretary or scribe. 'The scribe' preserves the lexical form and the likely court/administrative role without over-specifying.
- source_word: סֵפֶר הַתּוֹרָה
  chosen: the Book of the Law
  alternatives:
  - the scroll of the law
  - the book of the instruction
  lexicon: HALOT
  rationale: סֵפֶר is broadly 'book/document/scroll'; 'Book' is idiomatic in established English Bible usage here and need not deny scroll format. תּוֹרָה is often 'law' in covenantal contexts; 'instruction' is lexically possible, but 'Law' best fits the likely reference to the covenantal legal corpus discovered in the temple.
- source_word: מָצָאתִי
  chosen: I have found
  alternatives:
  - I found
  lexicon: HALOT
  rationale: The Hebrew perfect reports a completed action with present relevance. English present perfect captures the immediacy of the discovery in Hilkiah's announcement.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת literally means 'house,' and in this context refers to the temple. 'House of the LORD' preserves the Hebrew expression. Per doctrine, יְהוָה is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving the traditional reverential substitution and matching the doctrine guidance.
- source_word: וַיִּתֵּן ... אֶת־הַסֵּפֶר אֶל שָׁפָן
  chosen: gave the book to Shaphan
  alternatives:
  - handed the book to Shaphan
  lexicon: HALOT
  rationale: נתן is the ordinary verb 'give.' 'Gave the book to Shaphan' is straightforward and formally close to the Hebrew.
