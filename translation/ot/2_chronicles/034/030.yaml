theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered language in כָל אִישׁ יְהוּדָה
  chosen_reading: every man of Judah
  alternative_readings:
  - all the men of Judah
  - everyone of Judah
  rationale: The Hebrew uses masculine singular אִישׁ distributively. Per translation philosophy, gender-accurate rendering is preferred over gender-neutral smoothing, while the broader context still includes the whole populace explicitly later in the verse.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral'
