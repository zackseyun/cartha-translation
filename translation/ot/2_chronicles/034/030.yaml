id: 2CH.34.30
reference: 2 Chronicles 34:30
source:
  edition: WLC
  text: וַ/יַּ֣עַל הַ/מֶּ֣לֶךְ בֵּית יְ֠הוָה וְ/כָל אִ֨ישׁ יְהוּדָ֜ה וְ/יֹשְׁבֵ֣י יְרוּשָׁלִַ֗ם וְ/הַ/כֹּֽהֲנִים֙ וְ/הַ/לְוִיִּ֔ם וְ/כָל הָ/עָ֖ם מִ/גָּד֣וֹל וְ/עַד קָטָ֑ן וַ/יִּקְרָ֣א בְ/אָזְנֵי/הֶ֗ם אֶת כָּל דִּבְרֵי֙ סֵ֣פֶר הַ/בְּרִ֔ית הַ/נִּמְצָ֖א בֵּ֥ית יְהוָֽה־־־־־־׃
translation:
  text: Then the king went up to the house of Yahweh, and every man of Judah, and the inhabitants of Jerusalem, and the priests and the Levites, and all the people, from great to small; and he read in their hearing all the words of the book of the covenant that had been found in the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the men of Judah.' The Hebrew says 'every man of Judah,' using masculine language distributively.
    reason: lexical_alternative
  - marker: b
    text: '''The LORD'' renders the divine name YHWH, traditionally represented in English small caps.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - ascended
  - went
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up/ascend.' 'Went up' preserves the directional nuance and fits idiomatic English for going to the temple mount or sanctuary.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew expression while remaining clear in English. 'Temple' is possible but slightly less formal-equivalent here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כָל אִישׁ יְהוּדָה
  chosen: every man of Judah
  alternatives:
  - all the men of Judah
  - everyone of Judah
  lexicon: HALOT
  rationale: The singular אִישׁ with כָל distributively means 'every man.' Following the gender-accurate policy, this is rendered with masculine language rather than flattened to a gender-neutral expression.
- source_word: יֹשְׁבֵי יְרוּשָׁלִַם
  chosen: the inhabitants of Jerusalem
  alternatives:
  - those dwelling in Jerusalem
  - the residents of Jerusalem
  lexicon: HALOT
  rationale: The participial form means 'those dwelling/living in.' 'Inhabitants' is natural English and accurately represents the collective sense.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים in cultic context.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/cultic group לְוִיִּם.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - the whole people
  lexicon: HALOT
  rationale: A straightforward collective expression; 'all the people' is idiomatic and preserves the comprehensiveness of the gathering.
- source_word: מִגָּדוֹל וְעַד קָטָן
  chosen: from great to small
  alternatives:
  - from the greatest to the least
  - from great to little
  lexicon: HALOT
  rationale: This idiom denotes the full social range of the assembly. 'From great to small' is close to the Hebrew wording and clear in English.
- source_word: וַיִּקְרָא
  chosen: he read
  alternatives:
  - he proclaimed
  - he called out
  lexicon: HALOT
  rationale: In context, with the object being the words of a book, קרא means 'read aloud.' 'He read' is the most precise contextual rendering.
- source_word: בְאָזְנֵיהֶם
  chosen: in their hearing
  alternatives:
  - in their ears
  - aloud to them
  lexicon: HALOT
  rationale: Literally 'in their ears,' an idiom for public oral reading. 'In their hearing' preserves the idiomatic force in natural English.
- source_word: כָּל דִּבְרֵי
  chosen: all the words of
  alternatives:
  - all the matters of
  - everything in
  lexicon: HALOT
  rationale: דִּבְרֵי is literally 'words of.' Retaining 'words' reflects the textual emphasis on the covenant document's actual contents.
- source_word: סֵפֶר הַבְּרִית
  chosen: the book of the covenant
  alternatives:
  - the covenant scroll
  - the book of the covenant treaty
  lexicon: HALOT
  rationale: A formal and transparent rendering of the construct phrase. 'Book' is acceptable for a written document in this context, even if physically a scroll.
- source_word: הַנִּמְצָא
  chosen: that had been found
  alternatives:
  - which was found
  lexicon: HALOT
  rationale: The passive participle refers back to the recently discovered covenant book. The pluperfect English sense fits the narrative sequence naturally.
