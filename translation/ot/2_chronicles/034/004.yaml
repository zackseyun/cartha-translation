theological_decisions:
- issue: Rendering of אֲשֵׁרִים
  chosen_reading: the Asherim
  alternative_readings:
  - the Asherah poles
  rationale: The Hebrew term can denote cultic objects associated with Asherah and
    may be rendered either by transliteration or by the interpretive phrase 'Asherah
    poles.' Transliteration better preserves the lexical ambiguity without importing
    a narrower reconstruction.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of הַחַמָּנִים
  chosen_reading: the incense altars
  alternative_readings:
  - the sun-pillars
  rationale: The term is lexically uncertain. The main text uses a contextually plausible
    rendering that fits the reform narrative, while preserving the more traditional
    lexical alternative in a footnote to avoid overstating certainty.
  doctrine_reference: Translation philosophy §3, §5
