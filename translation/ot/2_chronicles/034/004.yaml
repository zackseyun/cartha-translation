id: 2CH.34.4
reference: 2 Chronicles 34:4
source:
  edition: WLC
  text: וַ/יְנַתְּצ֣וּ לְ/פָנָ֗י/ו אֵ֚ת מִזְבְּח֣וֹת הַ/בְּעָלִ֔ים וְ/הַֽ/חַמָּנִ֛ים
    אֲשֶׁר לְ/מַ֥עְלָ/ה מֵ/עֲלֵי/הֶ֖ם גִּדֵּ֑עַ וְ֠/הָ/אֲשֵׁרִים וְ/הַ/פְּסִלִ֤ים
    וְ/הַ/מַּסֵּכוֹת֙ שִׁבַּ֣ר וְ/הֵדַ֔ק וַ/יִּזְרֹק֙ עַל פְּנֵ֣י הַ/קְּבָרִ֔ים הַ/זֹּבְחִ֖ים
    לָ/הֶֽם־־׃
translation:
  text: They tore down before him the altars of the Baals, and he cut down the incense
    altars that were above them. He shattered and crushed the Asherim, the carved
    images, and the metal images, and scattered them over the graves of those who
    had sacrificed to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the sun-pillars.' The Hebrew term is uncertain and may refer to cultic
      pillars associated with sun worship.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the Asherah poles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְנַתְּצוּ
  chosen: they tore down
  alternatives:
  - they broke down
  - they demolished
  lexicon: HALOT
  rationale: נתץ commonly denotes pulling down or tearing down structures. The plural
    verb is retained with 'they,' reflecting the Hebrew form rather than smoothing
    to a singular subject.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  lexicon: HALOT
  rationale: Literally 'before his face/presence.' 'Before him' is natural English
    and preserves the sense that this occurred in Josiah's presence.
- source_word: מִזְבְּחוֹת הַבְּעָלִים
  chosen: the altars of the Baals
  alternatives:
  - the altars of Baal
  lexicon: HALOT
  rationale: The plural בְּעָלִים is best represented as 'the Baals,' referring to
    multiple local manifestations or cultic representations, not singular Baal.
- source_word: הַחַמָּנִים
  chosen: the incense altars
  alternatives:
  - the sun-pillars
  - the incense stands
  lexicon: HALOT
  rationale: The term is difficult and can refer to cultic pillars, possibly associated
    with sun worship. In this context, 'incense altars' fits the parallel in reform
    narratives and the note that they were 'above' the altars. Because the term is
    lexically contested, an alternative is preserved in a footnote.
- source_word: אֲשֶׁר לְמַעְלָה מֵעֲלֵיהֶם
  chosen: that were above them
  alternatives:
  - that were on top of them
  - which stood above them
  lexicon: HALOT
  rationale: This relative clause most naturally modifies הַחַמָּנִים, describing
    their position above the Baal altars.
- source_word: גִּדֵּעַ
  chosen: he cut down
  alternatives:
  - he chopped down
  lexicon: HALOT
  rationale: גדע is used for cutting down or lopping off. 'Cut down' is idiomatic
    and suits cultic objects such as poles or elevated structures.
- source_word: הָאֲשֵׁרִים
  chosen: the Asherim
  alternatives:
  - the Asherah poles
  lexicon: HALOT
  rationale: Transliterating 'Asherim' preserves the ambiguity between cultic poles
    and objects associated with the goddess Asherah. The more interpretive 'Asherah
    poles' is possible but narrower.
- source_word: הַפְּסִלִים
  chosen: the carved images
  alternatives:
  - the idols
  - the carved idols
  lexicon: HALOT
  rationale: פסילים are carved cult images. 'Carved images' is more precise than the
    broader 'idols.'
- source_word: הַמַּסֵּכוֹת
  chosen: the metal images
  alternatives:
  - the cast images
  - the molten images
  lexicon: HALOT
  rationale: מסכות refers to cast metal idols. 'Metal images' is readable modern English;
    'cast images' is a viable more formal alternative.
- source_word: שִׁבַּר
  chosen: he shattered
  alternatives:
  - he broke
  lexicon: HALOT
  rationale: שבר here conveys forceful breaking. 'Shattered' better reflects the destructive
    intensity in context.
- source_word: וְהֵדַק
  chosen: and crushed
  alternatives:
  - and ground to powder
  - and pulverized
  lexicon: HALOT
  rationale: The verb indicates reducing to small pieces or powder. 'Crushed' is concise
    and natural; the stronger nuance is noted by alternatives.
- source_word: וַיִּזְרֹק
  chosen: and scattered them
  alternatives:
  - and threw it
  - and cast it
  lexicon: HALOT
  rationale: זרק means throw/scatter. Since the prior objects have been shattered
    and crushed, English naturally supplies a plural object, 'them,' referring to
    the remains.
- source_word: עַל פְּנֵי הַקְּבָרִים
  chosen: over the graves
  alternatives:
  - on the graves
  - upon the tombs
  lexicon: HALOT
  rationale: The phrase means upon/over the surface of the graves. 'Over the graves'
    is idiomatic and fits the scattering imagery.
- source_word: הַזֹּבְחִים לָהֶם
  chosen: those who had sacrificed to them
  alternatives:
  - those sacrificing to them
  - those who sacrificed to them
  lexicon: HALOT
  rationale: The participle identifies the people associated with these graves. English
    past perfect ('had sacrificed') clarifies that the dead persons buried there were
    former worshipers of these idols.
