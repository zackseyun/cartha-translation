id: 2CH.34.24
reference: 2 Chronicles 34:24
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה הִנְ/נִ֨י מֵבִ֥יא רָעָ֛ה עַל הַ/מָּק֥וֹם הַ/זֶּ֖ה וְ/עַל יוֹשְׁבָ֑י/ו אֵ֤ת כָּל הָ/אָלוֹת֙ הַ/כְּתוּב֣וֹת עַל הַ/סֵּ֔פֶר אֲשֶׁ֣ר קָֽרְא֔וּ לִ/פְנֵ֖י מֶ֥לֶךְ יְהוּדָֽה־־־־׃
translation:
  text: 'Thus says Yahweh: Behold, I am bringing disaster on this place and on its inhabitants—all the curses written in the book that they have read before the king of Judah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the oath-curses,' emphasizing covenant sanctions invoked in the law book.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'book'; the term can also refer to a scroll.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and standard English Bible usage.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - So says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' is concise, natural, and preserves the formal prophetic tone.
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: Retains the deictic force and solemnity of the Hebrew announcement formula. 'Behold' is slightly elevated but still understandable in context.
- source_word: מֵבִיא רָעָה
  chosen: am bringing disaster
  alternatives:
  - am bringing evil
  - am bringing calamity
  lexicon: HALOT
  rationale: רָעָה here denotes harmful judgment, not moral evil. 'Disaster' communicates punitive calamity in clear modern English.
- source_word: הַמָּקוֹם הַזֶּה
  chosen: this place
  alternatives:
  - this site
  lexicon: HALOT
  rationale: Natural rendering of the demonstrative phrase, referring to Jerusalem/Judah in context without over-specifying beyond the text.
- source_word: יוֹשְׁבָיו
  chosen: its inhabitants
  alternatives:
  - those who dwell in it
  - its residents
  lexicon: HALOT
  rationale: Accurately renders the participial noun with possessive suffix in idiomatic English.
- source_word: אֵת כָּל הָאָלוֹת
  chosen: all the curses
  alternatives:
  - all the oath-curses
  - all the imprecations
  lexicon: HALOT
  rationale: אָלָה in covenantal judgment contexts refers to curses invoked by covenant sanctions. 'Curses' is the clearest main-text rendering; the more technical 'oath-curses' is worth preserving in a footnote.
- source_word: הַכְּתוּבוֹת עַל הַסֵּפֶר
  chosen: written in the book
  alternatives:
  - written in the scroll
  - written on the book
  lexicon: HALOT
  rationale: Though סֵפֶר can denote a scroll, 'book' is acceptable modern English and matches the likely referent as a written covenant document. 'In the book' is idiomatic for contents recorded therein.
- source_word: אֲשֶׁר קָרְאוּ לִפְנֵי
  chosen: that they have read before
  alternatives:
  - which they read in the presence of
  - that was read before
  lexicon: HALOT
  rationale: The active plural verb naturally yields 'they have read.' The perfect can be rendered with English present perfect to connect the recent reading with the announced judgment.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: the king of Judah
  alternatives:
  - Judah's king
  lexicon: HALOT
  rationale: Straightforward formal rendering of the construct chain.
