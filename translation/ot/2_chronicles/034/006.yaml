id: 2CH.34.6
reference: 2 Chronicles 34:6
source:
  edition: WLC
  text: וּ/בְ/עָרֵ֨י מְנַשֶּׁ֧ה וְ/אֶפְרַ֛יִם וְ/שִׁמְע֖וֹן וְ/עַד נַפְתָּלִ֑י ב/הר
    בתי/הם סָבִֽיב־׃
translation:
  text: and in the cities of Manasseh and Ephraim and Simeon, as far as Naphtali,
    in their surrounding ruins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew text is difficult in the final phrase; literally, something like
      'in/with their ... סביב.' Many translations understand the sense to be 'in their
      surrounding ruins/desolate places.'
    reason: textual_variant
  - marker: b
    text: Or 'in their surrounding desolate places.' The consonantal text could be
      read more literally as 'their houses,' but the context strongly favors a reference
      to ruined or devastated places.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/עָרֵי
  chosen: and in the cities of
  alternatives:
  - and in the towns of
  - also in the cities of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition are both represented. עָרִים
    commonly means 'cities' or 'towns'; 'cities' is retained as the more standard
    rendering in historical narrative.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Proper tribal/geographical name, transliterated per translation philosophy.
- source_word: וְ/אֶפְרַיִם
  chosen: and Ephraim
  rationale: Proper tribal/geographical name with conjunction preserved.
- source_word: וְ/שִׁמְעוֹן
  chosen: and Simeon
  rationale: Proper tribal/geographical name with conjunction preserved.
- source_word: וְ/עַד נַפְתָּלִי
  chosen: as far as Naphtali
  alternatives:
  - even to Naphtali
  - and as far as Naphtali
  lexicon: HALOT
  rationale: עַד marks extent or limit. 'As far as' naturally conveys the geographical
    range of Josiah's activity.
- source_word: ב/הר
  chosen: in
  alternatives:
  - among
  - with
  lexicon: HALOT
  rationale: The form is difficult and likely reflects a textual issue or rare usage
    in this compressed phrase. In context it introduces the final locative description.
    Rather than overtranslate an uncertain form, the English expresses the locative
    sense required by the clause.
- source_word: בתי/הם
  chosen: their ruins
  alternatives:
  - their waste places
  - their desolate places
  - their houses
  lexicon: HALOT
  rationale: Although the consonantal form resembles 'their houses,' the context of
    Josiah's destruction of cultic sites and the parallel in 2 Kings 23 favor the
    sense 'ruins/desolate places,' likely reflecting a textual or orthographic irregularity.
    This is the most coherent contextual rendering.
- source_word: סָבִיב
  chosen: surrounding
  alternatives:
  - all around
  - round about
  lexicon: HALOT
  rationale: סָבִיב denotes surrounding area or encircling extent. 'Surrounding' gives
    clear modern English and modifies 'ruins' naturally.
