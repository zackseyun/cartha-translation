id: 2CH.34.12
reference: 2 Chronicles 34:12
source:
  edition: WLC
  text: וְ/הָ/אֲנָשִׁים֩ עֹשִׂ֨ים בֶּ/אֱמוּנָ֜ה בַּ/מְּלָאכָ֗ה וַ/עֲלֵי/הֶ֣ם מֻ֠פְקָדִים
    יַ֣חַת וְ/עֹבַדְיָ֤הוּ הַ/לְוִיִּם֙ מִן בְּנֵ֣י מְרָרִ֔י וּ/זְכַרְיָ֧ה וּ/מְשֻׁלָּ֛ם
    מִן בְּנֵ֥י הַ/קְּהָתִ֖ים לְ/נַצֵּ֑חַ וְ/הַ֨/לְוִיִּ֔ם כָּל מֵבִ֖ין בִּ/כְלֵי
    שִֽׁיר׀־־־־׃
translation:
  text: And the men were working faithfully in the work, and over them were appointed
    Jahath and Obadiah the Levites, from the sons of Merari, and Zechariah and Meshullam,
    from the sons of the Kohathites, to oversee; and the Levites, all who were skilled
    with musical instruments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to direct'; the Hebrew verb can denote supervisory leadership.
    reason: lexical_alternative
  - marker: b
    text: Literally 'all understanding in instruments of song,' that is, all who were
      skilled with musical instruments.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּאֱמוּנָה
  chosen: faithfully
  alternatives:
  - with faithfulness
  - reliably
  lexicon: HALOT
  rationale: The noun אֱמוּנָה here functions adverbially with עֹשִׂים, describing
    the manner of the workers' labor. 'Faithfully' is idiomatic modern English and
    preserves the sense of trustworthiness/integrity rather than subjective belief.
- source_word: בַּמְּלָאכָה
  chosen: in the work
  alternatives:
  - at the work
  - in the labor
  lexicon: HALOT
  rationale: מְלָאכָה denotes the task or workmanship underway, here the temple repair
    project. 'In the work' is a natural rendering that stays close to the Hebrew construction.
- source_word: מֻפְקָדִים
  chosen: were appointed
  alternatives:
  - were overseers
  - were put in charge
  lexicon: HALOT
  rationale: The Hophal participle of פקד indicates being appointed/assigned to responsibility.
    Because the next clause names the persons and לְנַצֵּחַ specifies their function,
    'were appointed' best preserves the passive force without prematurely collapsing
    it into the role itself.
- source_word: יַחַת
  chosen: Jahath
  alternatives:
  - Jahath (proper name)
  lexicon: HALOT
  rationale: Proper name; transliterated according to standard English convention,
    in keeping with the policy to transliterate names.
- source_word: עֹבַדְיָהוּ
  chosen: Obadiah
  alternatives:
  - Obadiahu
  lexicon: HALOT
  rationale: Proper name; standard English transliteration is preferred for readability
    and recognizability.
- source_word: מִן בְּנֵי מְרָרִי
  chosen: from the sons of Merari
  alternatives:
  - from the descendants of Merari
  - from the Merarites
  lexicon: HALOT
  rationale: The Hebrew is literally filial/genealogical. 'From the sons of Merari'
    preserves the source structure and clan identity more transparently than the more
    interpretive 'Merarites.'
- source_word: זְכַרְיָה
  chosen: Zechariah
  alternatives:
  - Zekaryah
  lexicon: HALOT
  rationale: Proper name; standard English transliteration.
- source_word: מְשֻׁלָּם
  chosen: Meshullam
  lexicon: HALOT
  rationale: Proper name; transliterated.
- source_word: מִן בְּנֵי הַקְּהָתִים
  chosen: from the sons of the Kohathites
  alternatives:
  - from the sons of Kohath
  - from the descendants of the Kohathites
  lexicon: HALOT
  rationale: The form הַקְּהָתִים is the clan designation 'the Kohathites.' Rendering
    the full phrase as 'from the sons of the Kohathites' reflects the Hebrew wording,
    though slightly formal; it preserves the genealogical/clan structure.
- source_word: לְנַצֵּחַ
  chosen: to oversee
  alternatives:
  - to direct
  - to supervise
  lexicon: HALOT
  rationale: In this administrative context, נצח conveys supervisory direction rather
    than musical leadership alone. 'To oversee' fits the temple-repair setting and
    connects naturally with the appointed Levites.
- source_word: כָּל מֵבִין
  chosen: all who were skilled
  alternatives:
  - everyone understanding
  - all who had understanding
  lexicon: HALOT
  rationale: The participle מֵבִין denotes understanding/skill, especially practical
    competence. In context of instruments, 'all who were skilled' communicates functional
    expertise in clear English.
- source_word: בִּכְלֵי שִׁיר
  chosen: with musical instruments
  alternatives:
  - in instruments of song
  - with instruments for music
  lexicon: HALOT
  rationale: כְּלֵי שִׁיר refers to instruments used for music/song. 'With musical
    instruments' is idiomatic and accurately conveys the phrase's sense.
