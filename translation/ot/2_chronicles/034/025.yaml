id: 2CH.34.25
reference: 2 Chronicles 34:25
source:
  edition: WLC
  text: תַּ֣חַת אֲשֶׁ֣ר עֲזָב֗וּ/נִי ו/יקטירו לֵֽ/אלֹהִ֣ים אֲחֵרִ֔ים לְמַ֨עַן֙ הַכְעִיסֵ֔/נִי
    בְּ/כֹ֖ל מַעֲשֵׂ֣י יְדֵי/הֶ֑ם וְ/תִתַּ֧ךְ חֲמָתִ֛/י בַּ/מָּק֥וֹם הַ/זֶּ֖ה וְ/לֹ֥א
    תִכְבֶּֽה׀׃
translation:
  text: Because they have forsaken me and burned incense to other gods, so as to provoke
    me to anger by all the works of their hands, my wrath will be poured out on this
    place and will not be quenched.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'foreign gods.' The Hebrew more literally says 'other gods.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the works of their hands' can refer broadly to what they have
      made or done, especially man-made idols and related acts.
    reason: cultural_note
lexical_decisions:
- source_word: תַּחַת אֲשֶׁר
  chosen: Because
  alternatives:
  - inasmuch as
  - for the reason that
  lexicon: HALOT
  rationale: The idiom תַּחַת אֲשֶׁר introduces the reason or grounds for the announced
    judgment. 'Because' is natural English and preserves the causal force without
    unnecessary literalism.
- source_word: עֲזָבוּנִי
  chosen: they have forsaken me
  alternatives:
  - they have abandoned me
  lexicon: HALOT
  rationale: עזב commonly means 'forsake, abandon.' 'Forsaken' fits covenantal-religious
    context and preserves the gravity of apostasy.
- source_word: וַיַּקְטִירוּ
  chosen: and burned incense
  alternatives:
  - and made offerings by fire
  - and offered sacrifices
  lexicon: HALOT
  rationale: קטר in the Hiphil commonly refers to burning incense or making a smoke
    offering. In idolatry contexts, 'burned incense' is the standard and most precise
    rendering.
- source_word: לֵאלֹהִים אֲחֵרִים
  chosen: to other gods
  alternatives:
  - to foreign gods
  lexicon: HALOT
  rationale: אֲחֵרִים means 'other.' 'Other gods' is the plain sense and echoes covenantal
    language about idolatry.
- source_word: לְמַעַן הַכְעִיסֵנִי
  chosen: so as to provoke me to anger
  alternatives:
  - to provoke me
  - to anger me
  lexicon: HALOT
  rationale: The construction expresses result or purpose. 'So as to provoke me to
    anger' preserves both the infinitival force and the emotional/judicial nuance
    of כעס in Hiphil.
- source_word: בְּכֹל מַעֲשֵׂי יְדֵיהֶם
  chosen: by all the works of their hands
  alternatives:
  - with all the work of their hands
  - through everything their hands have made
  lexicon: HALOT
  rationale: This Hebrew expression often refers to human-made objects or deeds, especially
    idols and associated acts. 'By all the works of their hands' keeps the idiom visible
    while remaining understandable.
- source_word: וְתִתַּךְ חֲמָתִי
  chosen: my wrath will be poured out
  alternatives:
  - my fury will be poured out
  - my wrath will be kindled
  lexicon: HALOT
  rationale: נתך with wrath metaphorically means 'to be poured out.' 'Wrath' suits
    חֵמָה in judgment contexts and preserves the vivid image.
- source_word: בַּמָּקוֹם הַזֶּה
  chosen: on this place
  alternatives:
  - upon this place
  - in this place
  lexicon: HALOT
  rationale: With poured-out wrath, English idiom favors 'on this place.' This communicates
    directed judgment against the location, not merely something occurring within
    it.
- source_word: וְלֹא תִכְבֶּה
  chosen: and will not be quenched
  alternatives:
  - and will not go out
  - and will not be extinguished
  lexicon: HALOT
  rationale: כבה in this context evokes fire imagery for divine wrath. 'Will not be
    quenched' is the established and accurate English equivalent, preserving the metaphor.
