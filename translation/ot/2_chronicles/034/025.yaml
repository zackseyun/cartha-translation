theological_decisions:
- issue: Rendering divine judgment language without softening or over-systematizing
  chosen_reading: my wrath will be poured out on this place and will not be quenched
  alternative_readings:
  - my fury will be poured out on this place and will not be extinguished
  rationale: The verse speaks directly of God's judicial wrath in response to covenant
    unfaithfulness and idolatry. The translation preserves the personal divine speech
    and the fire/quenching metaphor without importing later doctrinal categories beyond
    the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Reference to deity in the first-person speech
  chosen_reading: me
  rationale: The Hebrew first-person suffixes refer to Israel's covenant God. No substitution
    with 'the LORD' is needed inside the quoted divine speech; retaining 'me/my' reflects
    the source text directly.
  doctrine_reference: Original-language primacy; contested terms table for יְהוָה
