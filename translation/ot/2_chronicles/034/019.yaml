theological_decisions:
- issue: Rendering of תורה in Josiah's reform context
  chosen_reading: the law
  alternative_readings:
  - the instruction
  - the Torah
  rationale: The verse refers to the discovered book's covenantal/legal content. 'The
    law' best communicates that force in idiomatic English without importing a narrower
    doctrinal claim than the Hebrew warrants. No contested doctrinal term from DOCTRINE.md
    requires a footnote here.
  doctrine_reference: 'Translation philosophy: optimal equivalence; consistency of
    key terms, or documented exception.'
