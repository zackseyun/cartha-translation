id: 2CH.34.19
reference: 2 Chronicles 34:19
source:
  edition: WLC
  text: וַ/יְהִי֙ כִּ/שְׁמֹ֣עַ הַ/מֶּ֔לֶךְ אֵ֖ת דִּבְרֵ֣י הַ/תּוֹרָ֑ה וַ/יִּקְרַ֖ע
    אֶת בְּגָדָֽי/ו־׃
translation:
  text: And when the king heard the words of the law, he tore his clothes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the instruction"; Hebrew torah can denote instruction more broadly,
      though here it refers to the covenantal law being read before the king.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ...
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the narrative event. In modern
    English, the full idiom 'and it came to pass' is unnecessarily archaic; the sense
    is carried naturally by beginning the clause with 'And' and letting the temporal
    clause follow.
- source_word: כִּשְׁמֹעַ
  chosen: when ... heard
  alternatives:
  - as ... heard
  - upon hearing
  lexicon: HALOT
  rationale: The preposition כ with infinitive construct of שמע marks temporal circumstance.
    'When the king heard' is idiomatic and preserves the sequence without over-literalness.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun; the referent is King
    Josiah in context, but the Hebrew uses the title, so the translation retains 'the
    king' rather than supplying the personal name.
- source_word: דִּבְרֵי
  chosen: the words of
  alternatives:
  - the matters of
  - the contents of
  lexicon: HALOT
  rationale: The construct plural of דבר here refers to the spoken/read content. 'Words
    of' is the most direct and natural rendering.
- source_word: הַתּוֹרָה
  chosen: the law
  alternatives:
  - the instruction
  - the Torah
  lexicon: HALOT
  rationale: תורה can mean 'instruction' broadly, but in this historical context it
    refers to the covenantal legal corpus being read before the king. 'The law' is
    the clearest established English rendering here. 'Torah' is possible but less
    natural in running English and may sound transliterated rather than translated.
- source_word: וַיִּקְרַע
  chosen: he tore
  alternatives:
  - he ripped
  lexicon: HALOT
  rationale: קרע denotes tearing garments, a conventional sign of grief, distress,
    or repentance. 'Tore' is the standard and suitably dignified English verb.
- source_word: בְּגָדָיו
  chosen: his clothes
  alternatives:
  - his garments
  - his robes
  lexicon: HALOT
  rationale: בגד is a general term for clothing. 'His clothes' is readable modern
    English; 'his garments' is more formal but less natural. 'His robes' would be
    too specific.
