id: 2CH.34.11
reference: 2 Chronicles 34:11
source:
  edition: WLC
  text: וַֽ/יִּתְּנ֗וּ לֶ/חָֽרָשִׁים֙ וְ/לַ/בֹּנִ֔ים לִ/קְנוֹת֙ אַבְנֵ֣י מַחְצֵ֔ב
    וְ/עֵצִ֖ים לַֽ/מְחַבְּר֑וֹת וּ/לְ/קָרוֹת֙ אֶת הַ/בָּ֣תִּ֔ים אֲשֶׁ֥ר הִשְׁחִ֖יתוּ
    מַלְכֵ֥י יְהוּדָֽה־׃
translation:
  text: And they gave it to the craftsmen and to the builders to buy quarried stone
    and timber for the joining work and for roofing the buildings that the kings of
    Judah had ruined.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hewn stone.' The Hebrew phrase refers to stone cut from a quarry for
      construction.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'joining work' is uncertain and may refer to structural
      joining, couplings, or framework elements.
    reason: lexical_alternative
  - marker: c
    text: Or 'for beams' / 'for covering.' The Hebrew verb can refer to roofing or
      covering a structure with beams.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  chosen: they gave it
  alternatives:
  - they gave
  - they delivered
  lexicon: HALOT
  rationale: The verb נתן means 'to give.' 'Gave it' is supplied in English because
    the object is implicit from the previous context (the money/funds) and is necessary
    for natural translation.
- source_word: חָרָשִׁים
  chosen: craftsmen
  alternatives:
  - artisans
  - workers
  lexicon: HALOT
  rationale: חרשים refers broadly to skilled workers/craftsmen, not only one trade.
    'Craftsmen' preserves the skilled-labor sense better than the narrower 'carpenters'
    in this context, especially since builders are mentioned separately.
- source_word: בֹּנִים
  chosen: builders
  alternatives:
  - masons
  - construction workers
  lexicon: HALOT
  rationale: From בנה, here a participial noun for those engaged in building. 'Builders'
    is the most direct and natural rendering.
- source_word: לִקְנוֹת
  chosen: to buy
  alternatives:
  - to purchase
  lexicon: HALOT
  rationale: Straightforward infinitive of קנה. 'To buy' is idiomatic modern English.
- source_word: אַבְנֵי מַחְצֵב
  chosen: quarried stone
  alternatives:
  - hewn stone
  - cut stone
  lexicon: HALOT
  rationale: The phrase denotes stone obtained from a quarry, prepared for construction.
    'Quarried stone' is clear and accurate; 'hewn stone' is possible but slightly
    more interpretive regarding finishing.
- source_word: עֵצִים
  chosen: timber
  alternatives:
  - wood
  - lumber
  lexicon: HALOT
  rationale: In a building context, 'timber' better conveys construction material
    than the more generic 'wood.'
- source_word: לַמְחַבְּרוֹת
  chosen: for the joining work
  alternatives:
  - for the couplings
  - for the framework
  - for the braces
  lexicon: HALOT
  rationale: The noun is difficult and likely refers to joining, fastening, or structural
    connection work. 'For the joining work' preserves the basic sense without over-specifying
    a particular architectural element.
- source_word: וּלְקָרוֹת
  chosen: for roofing
  alternatives:
  - for beams
  - for covering
  lexicon: HALOT
  rationale: From קרה in the building sense, 'to roof/cover with beams.' The infinitive
    here likely expresses the purpose of the timber. 'For roofing' captures the construction
    function in natural English; 'for beams' would shift from action to material.
- source_word: הַבָּתִּים
  chosen: the buildings
  alternatives:
  - the houses
  - the temple structures
  lexicon: HALOT
  rationale: Although בית often means 'house,' in this temple-repair context it likely
    refers to the structures/buildings of the temple complex. 'Buildings' avoids implying
    ordinary dwellings.
- source_word: הִשְׁחִיתוּ
  chosen: had ruined
  alternatives:
  - had destroyed
  - had damaged
  - had corrupted
  lexicon: HALOT
  rationale: The hiphil of שחת can mean ruin, destroy, or spoil. In context of temple
    disrepair caused by prior kings, 'had ruined' fits well without overstating total
    destruction.
- source_word: מַלְכֵי יְהוּדָה
  chosen: the kings of Judah
  lexicon: HALOT
  rationale: Direct rendering of the construct phrase; no special interpretive issue.
