id: 2CH.34.10
reference: 2 Chronicles 34:10
source:
  edition: WLC
  text: וַֽ/יִּתְּנ֗וּ עַל יַד֙ עֹשֵׂ֣ה הַ/מְּלָאכָ֔ה הַ/מֻּפְקָדִ֖ים בְּ/בֵ֣ית יְהוָ֑ה וַ/יִּתְּנ֨וּ אֹת֜/וֹ עוֹשֵׂ֣י הַ/מְּלָאכָ֗ה אֲשֶׁ֤ר עֹשִׂים֙ בְּ/בֵ֣ית יְהוָ֔ה לִ/בְדּ֥וֹק וּ/לְ/חַזֵּ֖ק הַ/בָּֽיִת־׃
translation:
  text: They put it into the hand of the workmen who were appointed over the house of Yahweh, and the workmen who were working in the house of Yahweh gave it for repairing and strengthening the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for restoring and reinforcing the house.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house of the LORD,' that is, the temple.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּתְּנוּ
  chosen: they put / gave
  alternatives:
  - they delivered
  - they handed over
  lexicon: HALOT
  rationale: The verb נתן broadly means 'give, put, deliver.' In the first clause, English idiom favors 'put it into the hands of'; in the second, 'gave it' naturally carries the transfer of funds onward. Using both reflects context while preserving the same underlying verb.
- source_word: עַל יַד
  chosen: into the hands of
  alternatives:
  - to the charge of
  - by the hand of
  lexicon: HALOT
  rationale: This idiom commonly denotes entrusting something to someone's control or agency. 'Into the hands of' is clear modern English and preserves the concrete Hebrew image.
- source_word: עֹשֵׂה הַמְּלָאכָה
  chosen: the workmen
  alternatives:
  - the workers
  - those doing the work
  lexicon: HALOT
  rationale: The singular participle with the collective sense in context refers to laborers/workers generally. 'Workmen' fits the construction setting and keeps the concrete occupational sense.
- source_word: הַמֻּפְקָדִים
  chosen: who were appointed over
  alternatives:
  - who were overseers in
  - who were put in charge of
  lexicon: HALOT
  rationale: The passive participle from פקד here indicates those assigned supervisory responsibility. 'Appointed over' preserves both the passive sense and the authority relation.
- source_word: בְּבֵית יְהוָה
  chosen: over the house of the LORD / in the house of the LORD
  alternatives:
  - over the temple of the LORD
  - in the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת יְהוָה literally means 'house of the LORD.' Retaining 'house' preserves the Hebrew expression, while still being understandable in context as the temple. The divine name follows the project's default as 'the LORD.'
- source_word: אֹתוֹ
  chosen: it
  alternatives:
  - the money
  - this
  lexicon: HALOT
  rationale: The pronoun refers back to the money collected in the preceding context. The English pronoun 'it' is sufficient in this verse without importing an explicit noun not present here.
- source_word: עוֹשֵׂי הַמְּלָאכָה אֲשֶׁר עֹשִׂים
  chosen: the workmen who were working
  alternatives:
  - the workers who were doing the work
  - those doing the work who were at work
  lexicon: HALOT
  rationale: The Hebrew uses a participial expression with repetition of עשה for emphasis and continuity. 'The workmen who were working' preserves the repetition without becoming unnatural.
- source_word: לִבְדּוֹק
  chosen: for repairing
  alternatives:
  - for restoring
  - for mending
  lexicon: HALOT
  rationale: Though בדק can have the basic sense 'inspect/examine' in some contexts, in temple-repair passages it carries the established sense of repairing/restoring structural defects. 'Repairing' best fits the building context here.
- source_word: וּלְחַזֵּק
  chosen: and strengthening
  alternatives:
  - and reinforcing
  - and making firm
  lexicon: HALOT
  rationale: חזק in this construction refers to making the structure strong or secure. 'Strengthening' is a direct and natural rendering.
- source_word: הַבָּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: The repeated noun is literally 'the house,' referring to the temple. Keeping 'house' maintains lexical consistency with the earlier phrase 'house of the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
