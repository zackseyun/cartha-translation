id: 2CH.34.26
reference: 2 Chronicles 34:26
source:
  edition: WLC
  text: וְ/אֶל מֶ֣לֶךְ יְהוּדָ֗ה הַ/שֹּׁלֵ֤חַ אֶתְ/כֶם֙ לִ/דְר֣וֹשׁ בַּֽ/יהוָ֔ה כֹּ֥ה
    תֹאמְר֖וּ אֵלָ֑י/ו כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל הַ/דְּבָרִ֖ים אֲשֶׁ֥ר
    שָׁמָֽעְתָּ־ס־׃
translation:
  text: 'But to the king of Judah, who sent you to inquire of the LORD, this is what
    you shall say to him: ‘This is what the LORD, the God of Israel, says: As for
    the words that you have heard—’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to seek the LORD' or 'to consult the LORD.' The Hebrew verb can carry
      both the sense of seeking and of inquiring in a prophetic context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶל
  chosen: But to
  alternatives:
  - And to
  - Now to
  lexicon: HALOT
  rationale: The conjunction ו plus אֶל introduces a contrastive/additional address
    following the previous message to others. 'But to' fits the discourse flow in
    English while preserving the directional sense 'to'.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: the king of Judah
  alternatives:
  - Judah's king
  lexicon: HALOT
  rationale: A straightforward construct chain; 'the king of Judah' is the natural
    formal rendering.
- source_word: הַשֹּׁלֵחַ אֶתְכֶם
  chosen: who sent you
  alternatives:
  - the one sending you
  lexicon: HALOT
  rationale: The participle with article functions attributively, identifying the
    king as the one who sent the delegation. English idiom prefers the relative clause
    'who sent you'.
- source_word: לִדְרֹשׁ בַּיהוָה
  chosen: to inquire of the LORD
  alternatives:
  - to seek the LORD
  - to consult the LORD
  lexicon: HALOT
  rationale: דרשׁ with ב can mean seek/inquire of, especially in prophetic consultation
    contexts. Here the delegation has been sent for divine inquiry, so 'inquire of'
    best captures the immediate action without flattening it into general piety. YHWH
    is rendered 'the LORD' per doctrine.
- source_word: בַּיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered 'the LORD' according to the project's
    stated default for YHWH.
- source_word: כֹּה תֹאמְרוּ אֵלָיו
  chosen: this is what you shall say to him
  alternatives:
  - thus you shall say to him
  - this is what you are to say to him
  lexicon: HALOT
  rationale: כֹּה plus אמר is the standard prophetic messenger formula. 'This is what
    you shall say to him' is clear modern English while preserving the directive force.
- source_word: כֹּה אָמַר יְהוָה
  chosen: This is what the LORD ... says
  alternatives:
  - Thus says the LORD
  - This is what the LORD said
  lexicon: HALOT
  rationale: The Hebrew prophetic formula is conventionally rendered in present tense
    in English because it introduces the following oracle. 'This is what ... says'
    is readable modern English and preserves the formulaic force.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard construct phrase identifying YHWH covenantally in relation to
    Israel.
- source_word: הַדְּבָרִים אֲשֶׁר שָׁמָעְתָּ
  chosen: As for the words that you have heard—
  alternatives:
  - 'The words that you have heard:'
  - Concerning the words that you heard—
  lexicon: HALOT
  rationale: This clause is syntactically somewhat suspended and is completed by the
    next verse. Rendering it as 'As for the words that you have heard—' preserves
    the Hebrew fronting and the sense of continuation into the next line, better than
    forcing a complete sentence here.
