id: 2CH.34.8
reference: 2 Chronicles 34:8
source:
  edition: WLC
  text: וּ/בִ/שְׁנַ֨ת שְׁמוֹנֶ֤ה עֶשְׂרֵה֙ לְ/מָלְכ֔/וֹ לְ/טַהֵ֥ר הָ/אָ֖רֶץ וְ/הַ/בָּ֑יִת
    שָׁ֠לַח אֶת שָׁפָ֨ן בֶּן אֲצַלְיָ֜הוּ וְ/אֶת מַעֲשֵׂיָ֣הוּ שַׂר הָ/עִ֗יר וְ֠/אֵת
    יוֹאָ֤ח בֶּן יֽוֹאָחָז֙ הַ/מַּזְכִּ֔יר לְ/חַזֵּ֕ק אֶת בֵּ֖ית יְהוָ֥ה אֱלֹהָֽי/ו־־־־־־׃
translation:
  text: Now in the eighteenth year of his reign, when he had cleansed the land and
    the house, he sent Shaphan son of Azaliah, Maaseiah the governor of the city,
    and Joah son of Joahaz, the recorder, to repair the house of the LORD his God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land and the temple'; Hebrew literally 'the land and the house.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to strengthen'; in context this means to repair or restore the temple
      building.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִשְׁנַת
  chosen: Now in the ... year
  alternatives:
  - And in the ... year
  - In the ... year
  lexicon: HALOT
  rationale: The conjunction plus preposition marks narrative continuation with a
    temporal setting. 'Now in' gives smooth modern English while preserving the sequential
    force.
- source_word: שְׁמוֹנֶה עֶשְׂרֵה
  chosen: eighteenth
  alternatives:
  - eighteen
  lexicon: HALOT
  rationale: 'English idiom expresses regnal dating with the ordinal: ''in the eighteenth
    year.'''
- source_word: לְמָלְכוֹ
  chosen: of his reign
  alternatives:
  - of his kingship
  - of his ruling
  lexicon: HALOT
  rationale: Standard regnal formula in context; 'reign' is the natural English equivalent.
- source_word: לְטַהֵר
  chosen: when he had cleansed
  alternatives:
  - to cleanse
  - after cleansing
  - in order to cleanse
  lexicon: HALOT
  rationale: The infinitive with prefixed ל here is best taken in contextual relation
    to the preceding chronology and prior narrative, indicating the stage at which
    the sending occurred. 'When he had cleansed' fits the flow of the account and
    avoids a misleading purpose sense.
- source_word: הָאָרֶץ וְהַבָּיִת
  chosen: the land and the house
  alternatives:
  - the land and the temple
  lexicon: HALOT
  rationale: Literally 'the land and the house.' Because the second 'house' is later
    specified as 'the house of the LORD,' retaining 'house' here preserves the Hebrew
    linkage, while the later phrase clarifies that the temple is meant.
- source_word: שָׁלַח
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: HALOT
  rationale: Simple narrative verb; 'sent' is the direct and natural rendering.
- source_word: שָׁפָן בֶּן אֲצַלְיָהוּ
  chosen: Shaphan son of Azaliah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: מַעֲשֵׂיָהוּ
  chosen: Maaseiah
  rationale: Personal name transliterated.
- source_word: שַׂר הָעִיר
  chosen: the governor of the city
  alternatives:
  - the prince of the city
  - the official of the city
  lexicon: HALOT
  rationale: שַׂר denotes an official or ruler. In this administrative context, 'governor'
    best communicates civic authority in readable English.
- source_word: יוֹאָח בֶּן יוֹאָחָז
  chosen: Joah son of Joahaz
  rationale: Personal names transliterated.
- source_word: הַמַּזְכִּיר
  chosen: the recorder
  alternatives:
  - the secretary
  - the chronicler
  lexicon: HALOT
  rationale: This title refers to a royal official, often one who kept records or
    served as state secretary. 'Recorder' is the conventional and sufficiently clear
    rendering.
- source_word: לְחַזֵּק
  chosen: to repair
  alternatives:
  - to strengthen
  - to restore
  lexicon: HALOT
  rationale: Though the verb literally means 'to strengthen,' in the context of a
    building it idiomatically refers to repair or restoration. 'Repair' is the clearest
    contextual equivalent.
- source_word: בֵּית יְהוָה אֱלֹהָיו
  chosen: the house of the LORD his God
  alternatives:
  - the temple of the LORD his God
  lexicon: HALOT
  rationale: בֵּית is literally 'house,' and יְהוָה is rendered 'the LORD' per doctrine.
    Retaining 'house' preserves the Hebrew expression and links with the earlier 'house.'
    The suffix on 'his God' refers to Josiah.
