id: 2CH.34.17
reference: 2 Chronicles 34:17
source:
  edition: WLC
  text: וַ/יַּתִּ֕יכוּ אֶת הַ/כֶּ֖סֶף הַ/נִּמְצָ֣א בְּ/בֵית יְהוָ֑ה וַֽ/יִּתְּנ֗וּ/הוּ
    עַל יַד֙ הַ/מֻּפְקָדִ֔ים וְ/עַל יַ֖ד עוֹשֵׂ֥י הַ/מְּלָאכָֽה־־־־׃
translation:
  text: They have poured out the silver that was found in the house of the LORD and
    have put it into the hands of the overseers and into the hands of those doing
    the work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'emptied out the silver'; the Hebrew verb may denote pouring out or disbursing
      the money rather than literally melting it down in this context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house of the LORD,' that is, the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּתִּיכוּ
  chosen: have poured out
  alternatives:
  - have emptied out
  - have melted down
  lexicon: HALOT
  rationale: The verb here is commonly understood in context as 'pour out' or 'empty
    out' money, i.e., to bring out or hand over the collected silver. 'Melted down'
    is a possible lexical association in other contexts, but here the following clause
    about giving it to overseers and workers favors the sense of emptying out/disbursing
    rather than smelting.
- source_word: הַכֶּסֶף
  chosen: the silver
  alternatives:
  - the money
  lexicon: HALOT
  rationale: Hebrew כֶּסֶף literally means 'silver' and often by extension 'money.'
    Since temple funds in this context are concretely silver, 'silver' preserves the
    source wording while remaining natural English.
- source_word: הַנִּמְצָא
  chosen: that was found
  alternatives:
  - that had been found
  lexicon: HALOT
  rationale: The Niphal participle denotes what was found/discovered. The relative
    clause 'that was found' is straightforward and idiomatic.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: '''House of the LORD'' is the formal equivalent of the Hebrew phrase
    and is a standard temple designation. Because יְהוָה is rendered by doctrinal
    policy as ''the LORD,'' that form is retained here.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, the default rendering of the divine
    name is 'the LORD.'
- source_word: וַיִּתְּנֻהוּ
  chosen: have put it
  alternatives:
  - have given it
  - have handed it over
  lexicon: HALOT
  rationale: The basic sense is 'gave it,' but in this administrative context with
    'into the hands of' following, 'have put it' reads naturally in English while
    preserving the transfer idea.
- source_word: עַל יַד
  chosen: into the hands of
  alternatives:
  - to the charge of
  - under the authority of
  lexicon: HALOT
  rationale: The idiom literally means 'upon the hand of' and commonly denotes entrusting
    something to someone's charge. 'Into the hands of' preserves the Hebrew imagery
    and remains understandable.
- source_word: הַמֻּפְקָדִים
  chosen: the overseers
  alternatives:
  - those appointed
  - the supervisors
  lexicon: HALOT
  rationale: The passive participle refers to those appointed over the work/funds.
    'Overseers' captures their supervisory role in context.
- source_word: עוֹשֵׂי הַמְּלָאכָה
  chosen: those doing the work
  alternatives:
  - the workmen
  - those who were doing the work
  lexicon: HALOT
  rationale: This phrase refers broadly to the laborers engaged in the project. 'Those
    doing the work' is transparent and avoids importing a narrower occupational term
    than the Hebrew requires.
