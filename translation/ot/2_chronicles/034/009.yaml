id: 2CH.34.9
reference: 2 Chronicles 34:9
source:
  edition: WLC
  text: וַ/יָּבֹ֜אוּ אֶל חִלְקִיָּ֣הוּ הַ/כֹּהֵ֣ן הַ/גָּד֗וֹל וַֽ/יִּתְּנוּ֮ אֶת הַ/כֶּסֶף֮
    הַ/מּוּבָ֣א בֵית אֱלֹהִים֒ אֲשֶׁ֣ר אָסְפֽוּ הַ/לְוִיִּם֩ שֹׁמְרֵ֨י הַ/סַּ֜ף מִ/יַּ֧ד
    מְנַשֶּׁ֣ה וְ/אֶפְרַ֗יִם וּ/מִ/כֹּל֙ שְׁאֵרִ֣ית יִשְׂרָאֵ֔ל וּ/מִ/כָּל יְהוּדָ֖ה
    וּ/בִנְיָמִ֑ן ו/ישבי יְרֽוּשָׁלִָֽם־׀־־־־׃
translation:
  text: Then they came to Hilkiah the high priest and gave the money that had been
    brought into the house of God, which the Levites, the keepers of the threshold,
    had collected from Manasseh and Ephraim and from all the remnant of Israel, and
    from all Judah and Benjamin and the inhabitants of Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the doorkeepers' or 'the gatekeepers'; literally 'the keepers of the
      threshold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: Then they came
  alternatives:
  - And they came
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'Then they came' gives natural English
    narrative flow while preserving the sequential sense.
- source_word: חִלְקִיָּהוּ
  chosen: Hilkiah
  rationale: Personal name transliterated by standard English convention per translation
    philosophy.
- source_word: הַכֹּהֵן הַגָּדוֹל
  chosen: the high priest
  alternatives:
  - the great priest
  - the chief priest
  lexicon: HALOT
  rationale: Established and contextually accurate rendering of the title for the
    chief priestly office.
- source_word: וַיִּתְּנוּ
  chosen: and gave
  alternatives:
  - and handed over
  lexicon: HALOT
  rationale: Simple narrative verb; 'gave' is the most direct and natural rendering
    in context of delivering funds.
- source_word: הַכֶּסֶף
  chosen: the money
  alternatives:
  - the silver
  lexicon: HALOT
  rationale: Though literally 'silver,' in this temple-fund context it refers to money.
    'Money' communicates the sense in clear modern English without loss.
- source_word: הַמּוּבָא
  chosen: that had been brought in
  alternatives:
  - that was brought in
  - brought
  lexicon: HALOT
  rationale: Passive participle from 'bring/come'; the pluperfect-like English 'had
    been brought in' fits the prior collection before delivery.
- source_word: בֵית אֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: Formal phrase preserved. 'House of God' reflects the Hebrew directly;
    'temple' is possible but less transparent to the source wording.
- source_word: אָסְפוּ
  chosen: had collected
  alternatives:
  - collected
  - gathered
  lexicon: HALOT
  rationale: Refers to the Levites' prior action in gathering the funds. 'Had collected'
    clarifies sequence in English.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/ministerial group.
- source_word: שֹׁמְרֵי הַסַּף
  chosen: the keepers of the threshold
  alternatives:
  - the doorkeepers
  - the keepers of the door
  - the gatekeepers
  lexicon: HALOT
  rationale: Literally 'keepers of the threshold.' This preserves the Hebrew image
    and likely temple function. Because 'doorkeepers/gatekeepers' is a familiar functional
    rendering, it is preserved in a footnote.
- source_word: מִיַּד
  chosen: from
  alternatives:
  - from the hand of
  lexicon: HALOT
  rationale: The idiom 'from the hand of' means 'from' or 'from the possession of.'
    In this collection context, concise 'from' is natural English.
- source_word: מְנַשֶּׁה וְאֶפְרַיִם
  chosen: Manasseh and Ephraim
  rationale: Tribal/regional names transliterated in standard English form.
- source_word: שְׁאֵרִית יִשְׂרָאֵל
  chosen: the remnant of Israel
  alternatives:
  - the rest of Israel
  lexicon: HALOT
  rationale: '''Remnant'' is the standard rendering and may carry covenant-historical
    resonance; here it likely refers to those remaining from the northern tribes.'
- source_word: וּמִכָּל יְהוּדָה וּבִנְיָמִן
  chosen: and from all Judah and Benjamin
  alternatives:
  - and from all of Judah and Benjamin
  lexicon: HALOT
  rationale: Preserves the distributive sense of the Hebrew with natural English phrasing.
- source_word: וישבי יְרוּשָׁלִָם
  chosen: and the inhabitants of Jerusalem
  alternatives:
  - and those living in Jerusalem
  lexicon: HALOT
  rationale: Participle of 'dwell/sit' used substantivally; 'inhabitants' is idiomatic
    and concise.
