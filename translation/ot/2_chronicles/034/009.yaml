theological_decisions:
- issue: Potential theological nuance of שְׁאֵרִית ('remnant')
  chosen_reading: the remnant of Israel
  alternative_readings:
  - the rest of Israel
  rationale: The Hebrew naturally supports 'remnant,' and in Chronicles this can denote
    those remaining from the northern tribes without requiring a stronger theological
    claim than the context itself makes. The rendering preserves possible covenantal
    resonance without overinterpreting.
  doctrine_reference: Preserve theological tension rather than resolve it.
