  from: Then he made everyone who was found in Jerusalem and Benjamin stand to it
  to: Then he made everyone who was found in Jerusalem and Benjamin take their stand
  rationale: The current phrasing 'stand to it' relies on a slightly awkward cataphoric reference, where the pronoun 'it' anticipates 'the covenant' from the following clause. The Hebrew verb וַיַּעֲמֵד is used absolutely here, without an object. The suggested rewrite, 'take their stand,' is an idiom that also functions absolutely, thus mirroring the Hebrew syntax more closely. This avoids the awkward pronoun and improves the sentence's flow while still preserving the 'standing' metaphor.
