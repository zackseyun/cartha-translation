id: 2CH.34.32
reference: 2 Chronicles 34:32
source:
  edition: WLC
  text: וַ/יַּעֲמֵ֕ד אֵ֛ת כָּל הַ/נִּמְצָ֥א בִ/ירוּשָׁלִַ֖ם וּ/בִנְיָמִ֑ן וַֽ/יַּעֲשׂוּ֙ יֹשְׁבֵ֣י יְרוּשָׁלִַ֔ם כִּ/בְרִ֥ית אֱלֹהִ֖ים אֱלֹהֵ֥י אֲבוֹתֵי/הֶֽם־׃
translation:
  text: Then he made everyone who was found in Jerusalem and Benjamin take their stand, and the inhabitants of Jerusalem acted according to the covenant of God, the God of their fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he made everyone who was found in Jerusalem and Benjamin stand,' with the sense that they were made to take their stand on the covenant or commit themselves to it.
    reason: lexical_alternative
  - marker: b
    text: Or 'Then he made everyone who was found in Jerusalem and Benjamin stand to it'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיַּעֲמֵד
  chosen: he made ... stand to it
  alternatives:
  - he caused ... to stand
  - he made ... take their stand
  - he made ... enter into it
  lexicon: HALOT
  rationale: Hiphil of עמד commonly means 'cause to stand' or 'make stand.' In this covenant-renewal context, the sense is not merely physical positioning but binding participation/commitment. 'Stand to it' preserves the standing imagery while conveying adherence to the covenant more naturally than a bare 'stand.'
- source_word: אֵת כָּל הַנִּמְצָא
  chosen: everyone who was found
  alternatives:
  - all who were present
  - everyone present
  lexicon: HALOT
  rationale: The construction marks the totality of those present/discovered there. 'Everyone who was found' is a close rendering of the passive participle נמצא while remaining idiomatic.
- source_word: בִירוּשָׁלִַם וּבִנְיָמִן
  chosen: in Jerusalem and Benjamin
  alternatives:
  - in Jerusalem and in Benjamin
  - in Jerusalem and the territory of Benjamin
  lexicon: HALOT
  rationale: The place names are retained directly. 'Benjamin' likely denotes the tribal territory/population associated with Benjamin, but the Hebrew simply names Benjamin, so the translation keeps the concise form.
- source_word: וַיַּעֲשׂוּ
  chosen: acted
  alternatives:
  - did
  - performed
  - kept
  lexicon: HALOT
  rationale: עשה with כְּ/כִּ plus 'covenant' here conveys acting in accordance with or carrying out the covenant. 'Acted' is more idiomatic in English than 'did according to' while staying close to the Hebrew sense.
- source_word: יֹשְׁבֵי יְרוּשָׁלִַם
  chosen: the inhabitants of Jerusalem
  alternatives:
  - those living in Jerusalem
  - the residents of Jerusalem
  lexicon: HALOT
  rationale: The participial/noun construction denotes the people dwelling there. 'Inhabitants' is a standard, clear rendering.
- source_word: כִּבְרִית
  chosen: according to the covenant
  alternatives:
  - in accordance with the covenant
  - by the covenant
  lexicon: HALOT
  rationale: 'The prefixed כ marks conformity/comparison: they acted in line with the covenant. ''According to the covenant'' is both accurate and natural.'
- source_word: אֱלֹהִים אֱלֹהֵי אֲבוֹתֵיהֶם
  chosen: of God, the God of their fathers
  alternatives:
  - of God, God of their fathers
  lexicon: HALOT
  rationale: The appositional phrase identifies this covenant specifically as belonging to God, further defined as 'the God of their fathers.' Repeating 'God' in English preserves the Hebrew apposition and covenantal emphasis.
