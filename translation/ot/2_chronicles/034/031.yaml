id: 2CH.34.31
reference: 2 Chronicles 34:31
source:
  edition: WLC
  text: וַ/יַּעֲמֹ֨ד הַ/מֶּ֜לֶךְ עַל עָמְד֗/וֹ וַ/יִּכְרֹ֣ת אֶֽת הַ/בְּרִית֮ לִ/פְנֵ֣י
    יְהוָה֒ לָ/לֶ֜כֶת אַחֲרֵ֣י יְהוָ֗ה וְ/לִ/שְׁמ֤וֹר אֶת מִצְוֺתָי/ו֙ וְ/עֵֽדְוֺתָ֣י/ו
    וְ/חֻקָּ֔י/ו בְּ/כָל לְבָב֖/וֹ וּ/בְ/כָל נַפְשׁ֑/וֹ לַ/עֲשׂוֹת֙ אֶת דִּבְרֵ֣י
    הַ/בְּרִ֔ית הַ/כְּתוּבִ֖ים עַל הַ/סֵּ֥פֶר הַ/זֶּֽה־־־־־־־׃
translation:
  text: Then the king stood in his place and made the covenant before the LORD, to
    walk after the LORD and to keep his commandments and his testimonies and his statutes
    with all his heart and with all his soul, to carry out the words of the covenant
    that were written in this book.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more historically, 'written in this scroll.' The Hebrew word can refer
      to a written document in scroll form.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - took his stand
  lexicon: HALOT
  rationale: The verb עמד in the wayyiqtol form straightforwardly denotes standing.
    'Stood' is the plain narrative rendering; 'took his stand' is possible but slightly
    more interpretive.
- source_word: עַל עָמְדוֹ
  chosen: in his place
  alternatives:
  - at his station
  - on his stand
  lexicon: HALOT
  rationale: The idiom likely refers to the king standing in his designated place
    or station. 'In his place' is natural English and preserves the idiomatic sense
    without over-specifying architecture or ceremony.
- source_word: וַיִּכְרֹת אֶת־הַבְּרִית
  chosen: made the covenant
  alternatives:
  - cut the covenant
  - made a covenant
  lexicon: HALOT
  rationale: כרת ברית is the standard Hebrew idiom 'cut/make a covenant.' 'Made the
    covenant' preserves the definite article present in Hebrew and fits the context
    of covenant renewal tied to the discovered book. 'Cut' is more formally literal
    but less natural in modern English.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: A standard covenantal phrase indicating solemn action in YHWH's presence.
    Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: לָלֶכֶת אַחֲרֵי יְהוָה
  chosen: to walk after the LORD
  alternatives:
  - to follow the LORD
  - to walk in pursuit of the LORD
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'walk after.' This is a common covenantal
    expression for loyal following. 'Walk after the LORD' preserves the metaphor and
    remains understandable; 'follow the LORD' is possible but less textually transparent.
- source_word: לִשְׁמֹר
  chosen: to keep
  alternatives:
  - to observe
  - to guard
  lexicon: HALOT
  rationale: In legal-covenantal contexts שמר commonly means keeping/observing commands.
    'Keep' is the most idiomatic and established rendering in English Bible style
    without being archaic.
- source_word: מִצְוֺתָיו
  chosen: his commandments
  alternatives:
  - his commands
  lexicon: HALOT
  rationale: מצוה refers to commanded obligations. 'Commandments' preserves the covenantal
    and legal register better than the slightly flatter 'commands.'
- source_word: עֵדְוֺתָיו
  chosen: his testimonies
  alternatives:
  - his decrees
  - his covenant stipulations
  lexicon: HALOT
  rationale: Though less common in contemporary English, 'testimonies' is the standard
    rendering for עדות in covenant-law contexts and distinguishes it from the surrounding
    legal terms rather than collapsing them into synonyms.
- source_word: חֻקָּיו
  chosen: his statutes
  alternatives:
  - his decrees
  - his prescribed statutes
  lexicon: HALOT
  rationale: חקים are fixed prescriptions; 'statutes' is the conventional and suitably
    precise English equivalent in legal contexts.
- source_word: בְּכָל לְבָבוֹ וּבְכָל נַפְשׁוֹ
  chosen: with all his heart and with all his soul
  alternatives:
  - with his whole heart and his whole being
  - with all his heart and all his life
  lexicon: HALOT
  rationale: This covenantal formula echoes Deuteronomic language. 'Heart' and 'soul'
    should be preserved rather than flattened into modern paraphrase, since the wording
    carries intertextual and theological weight.
- source_word: לַעֲשׂוֹת
  chosen: to carry out
  alternatives:
  - to do
  - to perform
  lexicon: HALOT
  rationale: Here עשה governs 'the words of the covenant.' 'Carry out' communicates
    enactment/obedience in natural English better than the wooden 'do,' while remaining
    close to the source.
- source_word: דִּבְרֵי הַבְּרִית
  chosen: the words of the covenant
  alternatives:
  - the terms of the covenant
  - the stipulations of the covenant
  lexicon: HALOT
  rationale: Literally 'words of the covenant.' 'Terms' or 'stipulations' are interpretive
    expansions; the more literal phrase is clear enough in English and preserves the
    Hebrew expression.
- source_word: הַכְּתוּבִים עַל הַסֵּפֶר הַזֶּה
  chosen: that were written in this book
  alternatives:
  - written on this scroll
  - written in this scroll
  lexicon: HALOT
  rationale: ספר can denote a scroll/book document. 'Book' is acceptable modern English,
    especially since the context is the discovered law-book. 'Scroll' is possible
    and historically concrete, but 'book' is more readable; the alternative is worth
    preserving in a footnote because the ancient physical form was likely a scroll.
