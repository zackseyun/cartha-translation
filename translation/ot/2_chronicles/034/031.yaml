theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to preserve covenantal metaphor in לָלֶכֶת אַחֲרֵי יְהוָה
  chosen_reading: to walk after the LORD
  alternative_readings:
  - to follow the LORD
  rationale: The Hebrew uses a covenantal walking metaphor. Preserving it maintains
    theological texture and Deuteronomic resonance rather than reducing it to a generic
    statement of allegiance.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
