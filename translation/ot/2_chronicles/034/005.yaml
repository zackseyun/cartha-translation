id: 2CH.34.5
reference: 2 Chronicles 34:5
source:
  edition: WLC
  text: וְ/עַצְמוֹת֙ כֹּֽהֲנִ֔ים שָׂרַ֖ף עַל מזבחותים וַ/יְטַהֵ֥ר אֶת יְהוּדָ֖ה וְ/אֶת
    יְרוּשָׁלִָֽם־־־׃
translation:
  text: He burned the bones of the priests on their altars, and he cleansed Judah
    and Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the altars.' The Hebrew form here is unusual; the sense is that Josiah
      burned the priests' bones on the altars associated with them.
    reason: textual_variant
lexical_decisions:
- source_word: וְ/עַצְמוֹת
  chosen: the bones of
  alternatives:
  - and the bones of
  lexicon: HALOT
  rationale: עַצְמוֹת is the plural construct of עֶצֶם, here meaning literal bones.
    The prefixed conjunction is not naturally carried into English at the start of
    the clause, so the sense is represented without an initial 'and' in the main text.
- source_word: כֹּהֲנִים
  chosen: the priests
  alternatives:
  - priests
  lexicon: HALOT
  rationale: The noun denotes priests. In context these are the idolatrous priests
    associated with the defiled high places and altars, but the Hebrew text simply
    says 'priests,' so the translation does not add 'idolatrous' to avoid importing
    detail not explicit in this clause.
- source_word: שָׂרַף
  chosen: burned
  alternatives:
  - burnt
  lexicon: HALOT
  rationale: Qal perfect 3ms of שׂרף, 'to burn.' 'Burned' is standard modern English;
    'burnt' is possible but less neutral in contemporary prose.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: The preposition most straightforwardly means 'on/upon.' 'On' is the natural
    modern English equivalent.
- source_word: מזבחותים
  chosen: their altars
  alternatives:
  - the altars
  - their sacrificial altars
  lexicon: HALOT
  rationale: The form reflects 'their altars' in context, referring back to the cultic
    sites being destroyed. English 'their altars' makes the referent clear and matches
    the likely pronominal sense preserved in many textual traditions and translations.
    'Sacrificial altars' would over-specify beyond the Hebrew noun itself.
- source_word: וַ/יְטַהֵר
  chosen: and he cleansed
  alternatives:
  - and he purified
  lexicon: HALOT
  rationale: Piel wayyiqtol of טהר, here in the sense of removing cultic defilement
    from the land. 'Cleansed' communicates both ritual and moral purification in readable
    English; 'purified' is possible but slightly less idiomatic here.
- source_word: אֶת יְהוּדָה וְ/אֶת יְרוּשָׁלִָם
  chosen: Judah and Jerusalem
  alternatives:
  - Judah and Yerushalayim
  lexicon: HALOT
  rationale: These are direct objects marked by אֶת. Standard English transliterations
    are 'Judah' and 'Jerusalem.' The pairing likely refers to the territory and its
    capital as the sphere cleansed from idolatrous pollution.
