theological_decisions:
- issue: Nature of the cleansing
  chosen_reading: cultic-moral cleansing of the land and city from idolatrous defilement
  alternative_readings:
  - purely ceremonial purification
  - merely physical cleaning/destruction
  rationale: The verb טהר in this reform context refers to removing defilement associated
    with illicit worship. 'Cleansed' preserves the ritual-moral dimension without
    overstating a later theological concept.
  doctrine_reference: Translation philosophy §3, §6
