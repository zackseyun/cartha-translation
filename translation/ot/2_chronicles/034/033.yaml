theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to soften Josiah's coercive reform action in וַיַּעֲבֵד
  chosen_reading: he made all who were found in Israel serve
  alternative_readings:
  - he caused all who were found in Israel to serve
  - he compelled all who were found in Israel to serve
  rationale: The causative stem indicates that Josiah actively imposed covenant service.
    The translation preserves that force without overstating it into explicit physical
    compulsion.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Whether to generalize familial terms
  chosen_reading: sons of Israel / fathers
  alternative_readings:
  - Israelites / ancestors
  rationale: The Hebrew uses masculine familial terms. In keeping with the gender-accurate
    policy, these are retained where natural in English rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
revisions:
- timestamp: '2026-04-21T19:54:40Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/weighted_vocab/ot/2_chronicles/034/033.job-11323.json
  category: awkward_english
  tier: 1
  from: all who were found in Israel
  to: all who were present in Israel
  rationale: The Hebrew phrase 'kol-hannimṣāʾ' contextually means 'all who were present'
    or 'everyone there.' While 'found' is the literal meaning of the root, in English
    it can imply that the people were searched for and discovered, a nuance not intended
    here. Using 'present' is more natural English and more accurately conveys the
    intended meaning of 'all the current inhabitants' without potential for misinterpretation.
    The lexical note already identifies 'present' as the contextual meaning, and moving
    it to the main text would improve readability.
