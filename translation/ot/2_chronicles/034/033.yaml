id: 2CH.34.33
reference: 2 Chronicles 34:33
source:
  edition: WLC
  text: וַ/יָּ֨סַר יֹֽאשִׁיָּ֜הוּ אֶת כָּל הַ/תּוֹעֵב֗וֹת מִֽ/כָּל הָ/אֲרָצוֹת֮ אֲשֶׁ֣ר
    לִ/בְנֵ֣י יִשְׂרָאֵל֒ וַֽ/יַּעֲבֵ֗ד אֵ֤ת כָּל הַ/נִּמְצָא֙ בְּ/יִשְׂרָאֵ֔ל לַ/עֲב֖וֹד
    אֶת יְהוָ֣ה אֱלֹהֵי/הֶ֑ם כָּל יָמָ֕י/ו לֹ֣א סָ֔רוּ מֵֽ/אַחֲרֵ֕י יְהוָ֖ה אֱלֹהֵ֥י
    אֲבוֹתֵי/הֶֽם־־־־־־׃פ
translation:
  text: And Josiah removed all the abominations from all the lands that belonged to
    the sons of Israel, and he made all who were found in Israel serve the LORD their
    God. All his days they did not turn away from following the LORD, the God of their
    fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from all the territories of the people of Israel.' The Hebrew literally
      says 'from all the lands that belonged to the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he caused all who were found in Israel to serve the LORD their God.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the God of their fathers'; that is, the covenant God worshiped by
      their forefathers.
    reason: cultural_note
  - marker: d
    text: Or 'all who were found in Israel'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּסַר
  chosen: removed
  alternatives:
  - took away
  - put away
  lexicon: HALOT
  rationale: The verb סור in the Hiphil here means to remove or take away. 'Removed'
    is clear modern English and fits the reform context without paraphrase.
- source_word: הַתּוֹעֵבוֹת
  chosen: abominations
  alternatives:
  - detestable things
  lexicon: HALOT
  rationale: תּוֹעֵבוֹת commonly denotes abhorrent, especially idolatrous, practices
    or objects. 'Abominations' preserves the strong covenantal and cultic force of
    the Hebrew.
- source_word: מִכָּל הָאֲרָצוֹת אֲשֶׁר לִבְנֵי יִשְׂרָאֵל
  chosen: from all the lands that belonged to the sons of Israel
  alternatives:
  - from all the territories of the people of Israel
  - from all the lands of the sons of Israel
  lexicon: HALOT
  rationale: אֲרָצוֹת is plural 'lands/territories.' The phrase refers to the territories
    associated with Israelite inheritance or occupation. 'That belonged to the sons
    of Israel' reflects the lamed construction while preserving the masculine familial
    term in line with gender-accurate policy.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'sons of Israel.' While 'Israelites' is smoother,
    the source's familial wording is retained here because it is natural enough in
    English and aligns with the project's gender-accurate preference.
- source_word: וַיַּעֲבֵד
  chosen: he made ... serve
  alternatives:
  - he compelled ... to serve
  - he caused ... to serve
  lexicon: HALOT
  rationale: 'The Hiphil of עבד is causative: Josiah caused or made the people serve.
    ''Made ... serve'' is idiomatic and preserves the coercive/administrative force
    better than a simple ''led'' or ''encouraged.'''
- source_word: כָּל הַנִּמְצָא בְּיִשְׂרָאֵל
  chosen: all who were found in Israel
  alternatives:
  - everyone present in Israel
  - all who were in Israel
  lexicon: HALOT
  rationale: The Niphal participle נִמְצָא literally means 'found.' In context it
    refers to all those present/located in Israel. 'All who were found in Israel'
    stays close to the Hebrew while remaining intelligible.
- source_word: לַעֲבֹד אֶת יְהוָה אֱלֹהֵיהֶם
  chosen: serve the LORD their God
  alternatives:
  - worship the LORD their God
  lexicon: HALOT
  rationale: עבד with God can denote worshipful service. 'Serve' is preferred because
    it is the direct lexical equivalent and preserves the broader covenantal sense
    beyond liturgical worship alone.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: כָּל יָמָיו
  chosen: All his days
  alternatives:
  - throughout his days
  - as long as he lived
  lexicon: HALOT
  rationale: The phrase most naturally refers to the duration of Josiah's life/reign.
    'All his days' is concise and formally close.
- source_word: לֹא סָרוּ מֵאַחֲרֵי יְהוָה
  chosen: they did not turn away from following the LORD
  alternatives:
  - they did not depart from after the LORD
  - they did not turn aside from the LORD
  lexicon: HALOT
  rationale: סור with מֵאַחֲרֵי expresses turning away from following someone. 'Turn
    away from following' captures both the metaphor and the covenantal loyalty implied.
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  chosen: the God of their fathers
  alternatives:
  - the God of their ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'fathers.' This is a standard covenant formula,
    and retaining it preserves the intergenerational and patriarchal wording of the
    source.
