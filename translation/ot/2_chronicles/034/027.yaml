id: 2CH.34.27
reference: 2 Chronicles 34:27
source:
  edition: WLC
  text: יַ֠עַן רַךְ לְבָ֨בְ/ךָ֜ וַ/תִּכָּנַ֣ע מִ/לִּ/פְנֵ֣י אֱלֹהִ֗ים בְּ/שָׁמְעֲ/ךָ֤ אֶת דְּבָרָי/ו֙ עַל הַ/מָּק֤וֹם הַ/זֶּה֙ וְ/עַל יֹ֣שְׁבָ֔י/ו וַ/תִּכָּנַ֣ע לְ/פָנַ֔/י וַ/תִּקְרַ֥ע אֶת בְּגָדֶ֖י/ךָ וַ/תֵּ֣בְךְּ לְ/פָנָ֑/י וְ/גַם אֲנִ֥י שָׁמַ֖עְתִּי נְאֻם יְהוָֽה־׀־־־־־־׃
translation:
  text: Because your heart was tender, and you humbled yourself before God when you heard his words against this place and against its inhabitants, and because you humbled yourself before me and tore your clothes and wept before me, I also have heard you, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your heart was soft.' The Hebrew idiom describes a receptive, humbled inner disposition.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן
  chosen: Because
  alternatives:
  - since
  lexicon: HALOT
  rationale: Introduces the causal basis for the divine response. 'Because' is natural modern English and preserves the causal force.
- source_word: רַךְ לְבָבְךָ
  chosen: your heart was tender
  alternatives:
  - your heart was soft
  - your heart was responsive
  lexicon: HALOT
  rationale: The adjective רַךְ literally means 'soft/tender.' With 'heart' it denotes receptivity and humility rather than weakness. 'Tender' best captures the moral-spiritual sense in readable English.
- source_word: וַתִּכָּנַע
  chosen: you humbled yourself
  alternatives:
  - you were humbled
  - you submitted yourself
  lexicon: HALOT
  rationale: The Niphal of כנע here expresses Josiah's self-humbling before God. 'You humbled yourself' preserves the reflexive sense and fits both occurrences in the verse.
- source_word: מִלִּפְנֵי אֱלֹהִים
  chosen: before God
  alternatives:
  - from before God
  - in the presence of God
  lexicon: HALOT
  rationale: The idiom conveys standing before God's presence in reverent humility. 'Before God' is concise and idiomatic in English.
- source_word: בְּשָׁמְעֲךָ
  chosen: when you heard
  alternatives:
  - upon your hearing
  - as you heard
  lexicon: HALOT
  rationale: Temporal use of ב with infinitive construct. 'When you heard' is the clearest natural rendering.
- source_word: דְּבָרָיו
  chosen: his words
  alternatives:
  - his message
  - his words spoken
  lexicon: HALOT
  rationale: The suffix most naturally refers to God in context. 'His words' preserves the lexical form and avoids over-interpretation.
- source_word: עַל הַמָּקוֹם הַזֶּה וְעַל יֹשְׁבָיו
  chosen: against this place and against its inhabitants
  alternatives:
  - concerning this place and its inhabitants
  - about this place and its inhabitants
  lexicon: HALOT
  rationale: 'In this judgment context, עַל carries an adversative sense: the words are directed against the place and its people. Repeating ''against'' preserves the Hebrew emphasis.'
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in my presence
  lexicon: HALOT
  rationale: Direct divine speech favors the personal 'before me.' The repetition is retained for rhetorical force.
- source_word: וַתִּקְרַע אֶת בְּגָדֶיךָ
  chosen: and tore your clothes
  alternatives:
  - and tore your garments
  lexicon: HALOT
  rationale: Tearing one's clothes is a conventional sign of grief and repentance. 'Clothes' is more accessible modern English than 'garments' while preserving the act.
- source_word: וַתֵּבְךְּ
  chosen: and wept
  alternatives:
  - and cried
  lexicon: HALOT
  rationale: '''Wept'' better conveys solemn grief than the broader ''cried.'''
- source_word: וְגַם אֲנִי שָׁמַעְתִּי
  chosen: I also have heard you
  alternatives:
  - I too have heard
  - I also heard
  lexicon: HALOT
  rationale: The object 'you' is implicit from context and natural in English. Present perfect 'have heard' conveys the completed action with present relevance in the divine response.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic, weighty, and follows the project's default rendering of יְהוָה as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
