id: 2CH.30.19
reference: 2 Chronicles 30:19
source:
  edition: WLC
  text: כָּל לְבָב֣/וֹ הֵכִ֔ין לִ/דְר֛וֹשׁ הָ/אֱלֹהִ֥ים יְהוָ֖ה אֱלֹהֵ֣י אֲבוֹתָ֑י/ו
    וְ/לֹ֖א כְּ/טָהֳרַ֥ת הַ/קֹּֽדֶשׁ־׀׃ס
translation:
  text: everyone whose heart was set to seek God, the LORD, the God of his fathers,
    though not according to the purification required for the holy place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the sanctuary.” The Hebrew קֹדֶשׁ here may refer to the holy place or
      sanctuary in a cultic sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל לְבָבוֹ
  chosen: everyone whose heart
  alternatives:
  - all whose heart
  - everyone who
  lexicon: HALOT
  rationale: 'כָּל with the following singular noun plus suffix functions distributively
    here: ''everyone/anyone whose heart…''. Rendering with ''everyone whose heart''
    preserves the individualizing force while reading naturally in English.'
- source_word: הֵכִין
  chosen: was set
  alternatives:
  - prepared
  - directed
  - established
  lexicon: HALOT
  rationale: The Hiphil of כון can mean 'prepare, make ready, direct, set firmly.'
    In this context of inward disposition for seeking God, 'was set' idiomatically
    conveys a heart intentionally directed toward God better than the more wooden
    'prepared.'
- source_word: לִדְרוֹשׁ
  chosen: to seek
  alternatives:
  - to inquire of
  - to seek after
  lexicon: HALOT
  rationale: דרש with God as object commonly means to seek him in worshipful devotion
    or inquiry. 'To seek' is the most natural and sufficiently broad rendering here.
- source_word: הָאֱלֹהִים יְהוָה
  chosen: God, the LORD
  alternatives:
  - the God, the LORD
  - God—the LORD
  lexicon: HALOT
  rationale: The appositional sequence identifies the God being sought as YHWH. 'God,
    the LORD' preserves both elements and follows the doctrinal default of rendering
    יְהוָה as 'the LORD.'
- source_word: אֱלֹהֵי אֲבוֹתָיו
  chosen: the God of his fathers
  alternatives:
  - the God of their fathers
  - his ancestral God
  lexicon: HALOT
  rationale: The singular suffix matches the distributive singular established by
    כָּל לְבָבוֹ. 'The God of his fathers' preserves the covenantal ancestral reference
    without paraphrase.
- source_word: וְלֹא
  chosen: though not
  alternatives:
  - and not
  - but not
  lexicon: HALOT
  rationale: 'Here the conjunction introduces a concessive sense relative to the prior
    description: they sought God sincerely, though they were not ritually qualified.
    ''Though not'' captures the relationship in idiomatic English.'
- source_word: כְּטָהֳרַת
  chosen: according to the purification required for
  alternatives:
  - according to the purification of
  - in accordance with the cleanness of
  lexicon: HALOT
  rationale: 'The prefixed כ marks conformity: ''according to/in keeping with.'' טָהֳרָה
    denotes ritual purification or cleanness. Because the phrase modifies participation
    despite ritual deficiency, ''according to the purification required for'' makes
    explicit the normative sense without adding new content.'
- source_word: הַקֹּדֶשׁ
  chosen: the holy place
  alternatives:
  - the sanctuary
  - the holy thing
  - the sacred rite
  lexicon: HALOT
  rationale: In this cultic context, קֹדֶשׁ most naturally refers to the sanctuary/holy
    sphere rather than abstract holiness. 'The holy place' is a transparent rendering
    that preserves the cultic setting; 'sanctuary' is possible but slightly more interpretive.
