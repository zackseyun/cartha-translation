theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Ritual impurity versus sincerity of heart
  chosen_reading: The verse preserves the tension that sincere seeking of God occurred
    despite failure to meet ritual purification standards.
  alternative_readings:
  - A paraphrase that resolves the tension by minimizing the impurity
  - A paraphrase that foregrounds impurity over sincere devotion
  rationale: The Hebrew juxtaposes wholehearted seeking with nonconformity to required
    purification. The translation keeps both elements without doctrinally resolving
    how they relate, in line with the instruction to preserve theological tension
    where present.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
