id: 2CH.30.26
reference: 2 Chronicles 30:26
source:
  edition: WLC
  text: וַ/תְּהִ֥י שִׂמְחָֽה גְדוֹלָ֖ה בִּֽ/ירוּשָׁלִָ֑ם כִּ֠י מִ/ימֵ֞י שְׁלֹמֹ֤ה
    בֶן דָּוִיד֙ מֶ֣לֶךְ יִשְׂרָאֵ֔ל לֹ֥א כָ/זֹ֖את בִּ/ירוּשָׁלִָֽם־־׃ס
translation:
  text: So there was great joy in Jerusalem, for since the days of Solomon son of
    David, king of Israel, there had been nothing like this in Jerusalem.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתְּהִי
  chosen: So there was
  alternatives:
  - And there was
  - Then there was
  lexicon: HALOT
  rationale: The waw-consecutive with היה advances the narrative. 'So there was' gives
    natural English narrative flow while preserving the resultative sense from the
    preceding events.
- source_word: שִׂמְחָה גְדוֹלָה
  chosen: great joy
  alternatives:
  - great rejoicing
  - a great celebration
  lexicon: HALOT
  rationale: The noun-adjective pair straightforwardly denotes intense joy/rejoicing.
    'Great joy' is concise and natural, preserving both the emotional and communal
    sense without over-paraphrasing.
- source_word: בִּירוּשָׁלָם
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: HALOT
  rationale: Standard locative use of the preposition ב. 'In Jerusalem' is idiomatic
    modern English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the statement about great joy. 'For'
    fits the explanatory relationship in elevated but readable English.
- source_word: מִימֵי
  chosen: since the days of
  alternatives:
  - from the days of
  lexicon: HALOT
  rationale: The expression marks a span beginning in an earlier period and extending
    to the present comparison. 'Since the days of' communicates that temporal comparison
    naturally in English.
- source_word: שְׁלֹמֹה בֶן דָּוִיד
  chosen: Solomon son of David
  alternatives:
  - Solomon, the son of David
  lexicon: HALOT
  rationale: Names are transliterated; the construct relationship is rendered directly.
    Omitting the article before 'son' keeps the phrase compact and close to Hebrew
    style while remaining natural.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  alternatives:
  - the king of Israel
  lexicon: HALOT
  rationale: Appositional identification of Solomon. English does not require the
    article here; the anarthrous rendering reads smoothly and preserves the title.
- source_word: לֹא כָזֹאת
  chosen: there had been nothing like this
  alternatives:
  - nothing like this had happened
  - not the like of this
  lexicon: HALOT
  rationale: Literally 'not like this,' with the implied event supplied from context.
    'There had been nothing like this' is idiomatic and captures the comparative force
    without adding unwarranted detail.
- source_word: בִּירוּשָׁלָם
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: HALOT
  rationale: Repeated locative phrase retained for emphasis, as in the Hebrew. Repeating
    'in Jerusalem' preserves the verse's framing and rhetorical effect.
