id: 2CH.30.5
reference: 2 Chronicles 30:5
source:
  edition: WLC
  text: וַ/יַּֽעֲמִ֣ידוּ דָבָ֗ר לְ/הַעֲבִ֨יר ק֤וֹל בְּ/כָל יִשְׂרָאֵל֙ מִ/בְּאֵֽר שֶׁ֣בַע וְ/עַד דָּ֔ן לָ/ב֞וֹא לַ/עֲשׂ֥וֹת פֶּ֛סַח לַ/יהוָ֥ה אֱלֹהֵֽי יִשְׂרָאֵ֖ל בִּ/ירוּשָׁלִָ֑ם כִּ֣י לֹ֥א לָ/רֹ֛ב עָשׂ֖וּ כַּ/כָּתֽוּב־־־־׃
translation:
  text: So they established a decree to send a proclamation throughout all Israel, from Beersheba to Dan, that they should come to keep the Passover to Yahweh, the God of Israel, at Jerusalem; for they had not kept it according to what is written for a long time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for not many had kept it according to what is written.' The Hebrew phrase is somewhat compressed and may emphasize either the small number of participants or the failure to observe it in the prescribed manner.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲמִידוּ דָבָר
  chosen: they established a decree
  alternatives:
  - they set a matter
  - they resolved
  - they enacted a decision
  lexicon: HALOT
  rationale: The idiom literally means 'they caused a matter to stand,' which in context refers to making an official decision. 'Established a decree' captures the formal, public nature of the action better than a wooden 'set a matter.'
- source_word: לְהַעֲבִיר קוֹל
  chosen: to send a proclamation
  alternatives:
  - to make a proclamation pass through
  - to publish a message
  - to circulate a proclamation
  lexicon: HALOT
  rationale: Literally 'to cause a voice/sound to pass through.' In this administrative context it refers to publicly spreading an announcement. 'Send a proclamation' is natural English while preserving the official sense.
- source_word: בְּכָל יִשְׂרָאֵל
  chosen: throughout all Israel
  alternatives:
  - in all Israel
  lexicon: HALOT
  rationale: The phrase marks the full territorial scope of the proclamation. 'Throughout all Israel' conveys dissemination across the land, not merely location within it.
- source_word: מִבְּאֵר שֶׁבַע וְעַד דָּן
  chosen: from Beersheba to Dan
  alternatives:
  - from Beer-sheba to Dan
  lexicon: HALOT
  rationale: This is a standard merism for the whole land from south to north. The transliterated place names are retained, and the idiom is left intact because it is readily understandable in English.
- source_word: לָבוֹא
  chosen: that they should come
  alternatives:
  - to come
  lexicon: HALOT
  rationale: This infinitive expresses the content/purpose of the proclamation. Expanding to 'that they should come' makes the syntax clear in English.
- source_word: לַעֲשׂוֹת פֶּסַח
  chosen: to keep the Passover
  alternatives:
  - to observe the Passover
  - to do the Passover
  lexicon: HALOT
  rationale: Although the Hebrew is literally 'to do/make Passover,' idiomatic English for festival observance is 'keep' or 'observe.' 'Keep the Passover' is both natural and close to established biblical usage.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition can be represented as 'to' or 'for'; 'to the LORD' fits the sacrificial/festal orientation without overinterpreting.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard construct rendering; no special ambiguity here.
- source_word: בִּירוּשָׁלִָם
  chosen: at Jerusalem
  alternatives:
  - in Jerusalem
  lexicon: HALOT
  rationale: Either preposition works in English. 'At Jerusalem' slightly emphasizes the destination for worship, though 'in Jerusalem' would also be acceptable.
- source_word: כִּי לֹא לָרֹב עָשׂוּ
  chosen: for they had not kept it in great numbers
  alternatives:
  - for they had not done so for a long time
  - for not many had kept it
  - for they had not kept it by the multitude
  lexicon: HALOT
  rationale: The phrase is difficult. לָרֹב most naturally relates to quantity ('in abundance/by many') rather than duration. The sense is that the Passover had not been observed by the people in large numbers. This fits the immediate context of a nationwide summons better than a temporal reading such as 'for a long time.'
- source_word: כַּכָּתוּב
  chosen: as it is written
  alternatives:
  - according to what is written
  lexicon: HALOT
  rationale: This refers to conformity with the written prescription of the law. 'As it is written' is concise and idiomatic, while preserving the scriptural norm implied.
