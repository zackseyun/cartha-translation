id: 2CH.30.1
reference: 2 Chronicles 30:1
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֨ח יְחִזְקִיָּ֜הוּ עַל כָּל יִשְׂרָאֵ֣ל וִֽ/יהוּדָ֗ה וְ/גַֽם אִגְּרוֹת֙ כָּתַב֙ עַל אֶפְרַ֣יִם וּ/מְנַשֶּׁ֔ה לָ/ב֥וֹא לְ/בֵית יְהוָ֖ה בִּֽ/ירוּשָׁלִָ֑ם לַ/עֲשׂ֣וֹת פֶּ֔סַח לַ/יהוָ֖ה אֱלֹהֵ֥י יִשְׂרָאֵֽל־־־־־׃
translation:
  text: Then Hezekiah sent word to all Israel and Judah, and also wrote letters to Ephraim and Manasseh, to come to the house of the LORD in Jerusalem to keep the Passover for the LORD, the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'throughout all Israel and Judah'; the Hebrew preposition can suggest the message was sent broadly across the land as well as directed to the people.
    reason: lexical_alternative
  - marker: b
    text: Or 'to celebrate the Passover.' The Hebrew literally says 'to do/make Passover,' an idiom for observing the feast.
    reason: lexical_alternative
  - marker: c
    text: Or 'to keep the Passover to the LORD'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent word
  alternatives:
  - sent
  - sent messengers
  lexicon: HALOT
  rationale: The verb literally means 'sent,' but with עַל plus a people-group it idiomatically conveys sending a message or summons throughout/unto them. 'Sent word' makes the implied communicative action clear in natural English without over-specifying 'messengers.'
- source_word: עַל כָּל יִשְׂרָאֵל וִיהוּדָה
  chosen: to all Israel and Judah
  alternatives:
  - throughout all Israel and Judah
  - concerning all Israel and Judah
  lexicon: HALOT
  rationale: The preposition עַל here functions in the sense of direction/extent of the sending. 'To all Israel and Judah' is clear and idiomatic. 'Throughout' is possible, but 'to' better matches the summons directed to the people.
- source_word: אִגְּרוֹת
  chosen: letters
  alternatives:
  - epistles
  - written messages
  lexicon: HALOT
  rationale: Standard rendering for written correspondence; 'letters' is natural modern English.
- source_word: כָּתַב
  chosen: wrote
  alternatives:
  - sent in writing
  lexicon: HALOT
  rationale: Direct and literal rendering of the verb.
- source_word: עַל אֶפְרַיִם וּמְנַשֶּׁה
  chosen: to Ephraim and Manasseh
  alternatives:
  - concerning Ephraim and Manasseh
  - throughout Ephraim and Manasseh
  lexicon: HALOT
  rationale: Here עַל with כתב likely marks the addressees/target region of the letters. 'To Ephraim and Manasseh' communicates that the letters were directed to those northern tribes.
- source_word: לָבוֹא
  chosen: to come
  alternatives:
  - to enter
  lexicon: HALOT
  rationale: Infinitive of purpose after the summons; 'to come' fits the invitation context.
- source_word: לְבֵית יְהוָה
  chosen: to the house of the LORD
  alternatives:
  - to the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew expression; 'temple' is interpretive though contextually accurate.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is 'the LORD.'
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard locative rendering.
- source_word: לַעֲשׂוֹת פֶּסַח
  chosen: to keep the Passover
  alternatives:
  - to celebrate the Passover
  - to observe the Passover
  lexicon: HALOT
  rationale: Literally 'to do/make Passover,' an idiom for observing the feast. 'Keep the Passover' is a well-established and clear English equivalent that preserves the covenantal/festal sense.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase; preserves covenantal identification.
