revisions:
- timestamp: '2026-04-21T02:11:50Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/2_chronicles/030/001.json
  category: awkward_english
  tier: 1
  from: to keep the Passover to the LORD
  to: to keep the Passover for the LORD
  rationale: The Hebrew preposition 'le' (לְ) before 'the LORD' functions as a dative of interest, indicating the Passover is observed 'for' or 'in honor of' the LORD. While 'to the LORD' is a literal rendering found in some formal translations, 'for the LORD' is more natural and idiomatic English in this context, better conveying the sense of dedication without sounding stiff.
