id: 2CH.30.21
reference: 2 Chronicles 30:21
source:
  edition: WLC
  text: וַ/יַּעֲשׂ֣וּ בְנֵֽי יִ֠שְׂרָאֵל הַ/נִּמְצְאִ֨ים בִּ/ירוּשָׁלִַ֜ם אֶת חַ֧ג
    הַ/מַּצּ֛וֹת שִׁבְעַ֥ת יָמִ֖ים בְּ/שִׂמְחָ֣ה גְדוֹלָ֑ה וּֽ/מְהַלְלִ֣ים לַ֠/יהוָה
    י֣וֹם בְּ/י֞וֹם הַ/לְוִיִּ֧ם וְ/הַ/כֹּהֲנִ֛ים בִּ/כְלֵי עֹ֖ז לַ/יהוָֽה־־׀־׃ס
translation:
  text: And the sons of Israel who were found in Jerusalem kept the Feast of Unleavened
    Bread for seven days with great joy, while the Levites and the priests praised
    the LORD day by day with instruments of strength to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with mighty instruments' or 'with loud instruments'; the Hebrew literally
      says 'with instruments of strength.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: kept
  alternatives:
  - observed
  - celebrated
  - did
  lexicon: HALOT
  rationale: Although the verb is literally 'did/made,' with חַג ('feast/festival')
    the idiom means to observe or keep a festival. 'Kept' is natural English and stays
    close to the Hebrew idiom without paraphrase.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: This is formally 'sons of Israel.' In this historical narrative it refers
    to the Israelites present, but the source expression is retained in a gender-accurate
    way per project philosophy. A smoother alternative like 'the Israelites' is possible
    but less transparent to the Hebrew wording.
- source_word: הַנִּמְצְאִים
  chosen: who were found
  alternatives:
  - who were present
  - who were there
  lexicon: HALOT
  rationale: The participle of מצא literally means 'found.' In context it denotes
    those present/available in Jerusalem, but 'who were found' preserves the Hebrew
    expression and its narrative flavor.
- source_word: חַג הַמַּצּוֹת
  chosen: the Feast of Unleavened Bread
  alternatives:
  - the festival of unleavened bread
  lexicon: HALOT
  rationale: Standard rendering of the established feast name. 'Feast' fits the formal
    title and is widely recognizable.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: English idiom naturally supplies 'for' to express duration.
- source_word: בְּשִׂמְחָה גְדוֹלָה
  chosen: with great joy
  alternatives:
  - with great gladness
  - in great rejoicing
  lexicon: HALOT
  rationale: A direct and readable rendering of the prepositional phrase; 'joy' is
    natural modern English.
- source_word: וּמְהַלְלִים
  chosen: while ... praised
  alternatives:
  - and ... were praising
  - and praising
  lexicon: HALOT
  rationale: The participle gives attendant action concurrent with the feast. English
    finite verbal style is smoother here; 'while ... praised' captures the ongoing
    concurrent sense without awkwardness.
- source_word: יּוֹם בְּיוֹם
  chosen: day by day
  alternatives:
  - day after day
  - every day
  lexicon: HALOT
  rationale: This idiom is well represented by 'day by day,' preserving the distributive
    force.
- source_word: בִּכְלֵי עֹז
  chosen: with instruments of strength
  alternatives:
  - with mighty instruments
  - with loud instruments
  - with instruments of praise
  lexicon: HALOT
  rationale: The phrase is difficult. Literally it is 'with instruments of strength/might.'
    Rather than interpret too freely as merely 'loud' or 'musical instruments,' the
    translation preserves the unusual Hebrew imagery. A footnote preserves a more
    idiomatic alternative.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
