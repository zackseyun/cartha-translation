theological_decisions:
- issue: Rendering the Passover observance idiom without adding interpretive detail
  chosen_reading: to keep the Passover
  alternative_readings:
  - to celebrate the Passover
  - to observe the Passover
  rationale: The Hebrew idiom means to carry out the Passover observance. 'Keep' is
    a balanced rendering that is both natural and close to the covenantal/festal sense,
    without expanding the text into explanatory paraphrase.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition'
