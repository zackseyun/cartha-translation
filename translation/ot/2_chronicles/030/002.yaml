id: 2CH.30.2
reference: 2 Chronicles 30:2
source:
  edition: WLC
  text: וַ/יִּוָּעַ֨ץ הַ/מֶּ֧לֶךְ וְ/שָׂרָ֛י/ו וְ/כָל הַ/קָּהָ֖ל בִּ/ירוּשָׁלִָ֑ם
    לַ/עֲשׂ֥וֹת הַ/פֶּ֖סַח בַּ/חֹ֥דֶשׁ הַ/שֵּׁנִֽי־׃
translation:
  text: Then the king and his officials and all the assembly in Jerusalem decided
    to keep the Passover in the second month.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to do the Passover.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּעַץ
  chosen: decided
  alternatives:
  - took counsel
  - consulted together
  - resolved
  lexicon: HALOT
  rationale: The Niphal of יעץ here denotes collective deliberation leading to a resolution.
    'Decided' gives the result in natural English, while the plural subjects that
    follow make clear this was a joint decision. 'Took counsel' is more formal but
    less idiomatic in contemporary English.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun; context identifies Hezekiah,
    but the Hebrew uses the title rather than the personal name in this clause.
- source_word: וְשָׂרָיו
  chosen: and his officials
  alternatives:
  - and his princes
  - and his leaders
  lexicon: HALOT
  rationale: שָׂרִים refers to rulers or high officials. 'Officials' is clear modern
    English and fits the administrative setting better than the more archaic 'princes,'
    which could misleadingly suggest royal sons.
- source_word: וְכָל הַקָּהָל
  chosen: and all the assembly
  alternatives:
  - and the whole assembly
  - and all the congregation
  lexicon: HALOT
  rationale: קָהָל commonly denotes the assembled community. 'Assembly' preserves
    the corporate sense without importing later ecclesiastical associations that 'congregation'
    may carry.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard locative rendering of the place name.
- source_word: לַעֲשׂוֹת הַפֶּסַח
  chosen: to keep the Passover
  alternatives:
  - to observe the Passover
  - to celebrate the Passover
  - to do the Passover
  lexicon: HALOT
  rationale: Literally 'to do the Passover,' an idiom for observing/keeping the festival.
    'Keep the Passover' is idiomatic English that preserves the covenantal-festival
    sense better than the overly literal 'do the Passover.'
- source_word: בַּחֹדֶשׁ הַשֵּׁנִי
  chosen: in the second month
  lexicon: HALOT
  rationale: Direct temporal rendering. The phrase is significant in context because
    Passover was normally in the first month, but the verse itself simply states the
    timing.
