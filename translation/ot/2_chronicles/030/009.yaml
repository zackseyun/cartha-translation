theological_decisions:
- issue: Repentance language in שׁוּב
  chosen_reading: return to the LORD / return to him
  alternative_readings:
  - turn to the LORD / turn to him
  rationale: The verse calls for covenant repentance and restoration. 'Return' better preserves the restoration motif and the repeated Hebrew root without importing later doctrinal terminology beyond the text.
  doctrine_reference: Translation philosophy §§3, 5
- issue: Gendered family terms
  chosen_reading: your brothers and your sons
  alternative_readings:
  - your brothers and your children
  rationale: The Hebrew uses masculine kinship terms. Following the doctrine's gender-accurate principle, the main text retains them rather than neutralizing to 'children,' though the broader referent may include family members generally.
  doctrine_reference: Translation philosophy §4
