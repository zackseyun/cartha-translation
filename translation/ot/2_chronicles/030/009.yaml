id: 2CH.30.9
reference: 2 Chronicles 30:9
source:
  edition: WLC
  text: כִּ֣י בְ/שׁוּבְ/כֶ֞ם עַל יְהוָ֗ה אֲחֵי/כֶ֨ם וּ/בְנֵי/כֶ֤ם לְ/רַחֲמִים֙ לִ/פְנֵ֣י שֽׁוֹבֵי/הֶ֔ם וְ/לָ/שׁ֖וּב לָ/אָ֣רֶץ הַ/זֹּ֑את כִּֽי חַנּ֤וּן וְ/רַחוּם֙ יְהוָ֣ה אֱלֹהֵי/כֶ֔ם וְ/לֹא יָסִ֤יר פָּנִים֙ מִ/כֶּ֔ם אִם תָּשׁ֖וּבוּ אֵלָֽי/ו־־־־׃פ
translation:
  text: For when you return to Yahweh, your brothers and your sons will find compassion before their captors and return to this land. For Yahweh your God is gracious and compassionate, and he will not turn his face away from you if you return to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be shown mercy before their captors.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your brothers and your sons'; the wording is masculine in the source text.
    reason: lexical_alternative
  - marker: c
    text: Or 'he will not hide his face from you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׁוּבְכֶם עַל יְהוָה
  chosen: when you return to the LORD
  alternatives:
  - when you turn back to the LORD
  - when you return unto the LORD
  lexicon: HALOT
  rationale: שׁוּב with a preposition of direction here denotes repentance/return to covenant loyalty. English 'return to the LORD' preserves both the relational and covenantal sense better than a flatter 'turn toward.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲחֵיכֶם וּבְנֵיכֶם
  chosen: your brothers and your sons
  alternatives:
  - your brothers and your children
  lexicon: HALOT
  rationale: Gender-accurate rendering is preferred. The Hebrew specifically says 'brothers' and 'sons,' not a gender-neutral collective. 'Sons' likely refers to children taken with families, but the masculine form should be retained in the main text.
- source_word: לְרַחֲמִים לִפְנֵי שׁוֹבֵיהֶם
  chosen: will find compassion before their captors
  alternatives:
  - will be shown mercy before their captors
  - will receive compassion in the presence of their captors
  lexicon: HALOT
  rationale: The construction expresses becoming objects of compassion in the sight/presence of those who took them captive. 'Find compassion before' is idiomatic enough in English while preserving the Hebrew relational nuance.
- source_word: שׁוֹבֵיהֶם
  chosen: their captors
  alternatives:
  - those who took them captive
  - their conquerors
  lexicon: HALOT
  rationale: The participle from שבה refers specifically to those who carried them away captive. 'Captors' is concise and accurate.
- source_word: וְלָשׁוּב לָאָרֶץ הַזֹּאת
  chosen: and return to this land
  alternatives:
  - so that they may return to this land
  - and be brought back to this land
  lexicon: HALOT
  rationale: The infinitive expresses the result/purpose connected with the compassion shown by the captors. 'And return to this land' is natural English and leaves open the implied agency without overtranslating.
- source_word: חַנּוּן וְרַחוּם
  chosen: gracious and compassionate
  alternatives:
  - gracious and merciful
  lexicon: HALOT
  rationale: This common divine pair emphasizes favor and mercy. 'Compassionate' avoids flattening both adjectives into near-synonyms in English and reflects רַחוּם well.
- source_word: לֹא יָסִיר פָּנִים מִכֶּם
  chosen: he will not turn his face away from you
  alternatives:
  - he will not hide his face from you
  - he will not turn away from you
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of removing/turning the face from someone. Rendering it with 'face' preserved keeps the relational and covenantal imagery.
- source_word: אִם תָּשׁוּבוּ אֵלָיו
  chosen: if you return to him
  alternatives:
  - if you turn back to him
  lexicon: HALOT
  rationale: Repetition of שׁוּב is important in the verse's rhetoric. 'Return' maintains lexical consistency with the opening clause.
