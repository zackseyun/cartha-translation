id: 2CH.30.14
reference: 2 Chronicles 30:14
source:
  edition: WLC
  text: וַ/יָּקֻ֕מוּ וַ/יָּסִ֨ירוּ֙ אֶת הַֽ/מִּזְבְּח֔וֹת אֲשֶׁ֖ר בִּ/ירוּשָׁלִָ֑ם
    וְ/אֵ֤ת כָּל הַֽ/מְקַטְּרוֹת֙ הֵסִ֔ירוּ וַ/יַּשְׁלִ֖יכוּ לְ/נַ֥חַל קִדְרֽוֹן־־׃
translation:
  text: They arose and removed the altars that were in Jerusalem, and they removed
    all the incense altars and threw them into the Kidron Valley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the places for burning incense' or 'all the incense stands.' The
      Hebrew term refers to cultic installations associated with burning incense.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Kidron wadi/brook/valley.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  chosen: They arose
  alternatives:
  - They got up
  - They stood up
  lexicon: HALOT
  rationale: From קום, here a narrative wayyiqtol introducing decisive action. 'Arose'
    preserves the formal narrative movement better than the more colloquial 'got up.'
- source_word: וַיָּסִירוּ / הֵסִירוּ
  chosen: removed
  alternatives:
  - took away
  - cleared away
  lexicon: HALOT
  rationale: סור/הסיר in the Hiphil commonly means to remove or take away. 'Removed'
    is concise, natural, and fits both occurrences in the verse, preserving consistency.
- source_word: הַמִּזְבְּחוֹת
  chosen: the altars
  lexicon: HALOT
  rationale: מזבחות is the ordinary plural for altars. No narrower gloss is required
    here; the context already implies these are unauthorized cultic installations
    in Jerusalem.
- source_word: אֲשֶׁר בִּירוּשָׁלָם
  chosen: that were in Jerusalem
  alternatives:
  - which were in Jerusalem
  - in Jerusalem
  lexicon: HALOT
  rationale: The relative clause is retained explicitly in English to reflect the
    Hebrew syntax and identify the location of the altars.
- source_word: הַמְקַטְּרוֹת
  chosen: the incense altars
  alternatives:
  - the incense stands
  - the places for burning incense
  lexicon: HALOT
  rationale: From the root קטר, 'to burn incense.' The noun likely refers to cultic
    installations associated with incense burning. 'Incense altars' is the clearest
    natural rendering in context, though the term may denote incense-burning stands
    or places more generally.
- source_word: וַיַּשְׁלִיכוּ
  chosen: threw
  alternatives:
  - cast
  - hurled
  lexicon: HALOT
  rationale: שׁלך means to throw/cast. 'Threw' is idiomatic modern English and preserves
    the forceful disposal implied by the action.
- source_word: לְנַחַל קִדְרוֹן
  chosen: into the Kidron Valley
  alternatives:
  - into the wadi Kidron
  - into the Kidron Brook
  lexicon: HALOT
  rationale: נחל can denote a wadi, ravine, or valley with seasonal watercourse. 'Kidron
    Valley' is the most accessible and geographically intelligible English rendering
    here; 'brook' is traditional but too specific, and 'wadi' may be less familiar
    to general readers.
