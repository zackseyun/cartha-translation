theological_decisions:
- issue: Rendering the idiom תְּנוּ יָד לַיהוָה
  chosen_reading: Give your hand to the LORD
  alternative_readings:
  - Yield yourselves to the LORD
  - Submit to the LORD
  rationale: The phrase likely conveys submission or pledge of allegiance, but the
    translation philosophy favors preserving significant source-language imagery where
    understandable. The idiom is therefore retained in the main text, with the interpretive
    alternatives preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Force of וְיָשֹׁב in the exhortation sequence
  chosen_reading: so that his burning anger may turn away from you
  alternative_readings:
  - and his burning anger will turn away from you
  rationale: In context, the clause follows imperatives and expresses the hoped-for
    result of repentance and worship. Rendering it with 'may' preserves the exhortational/jussive
    nuance without overstating a mechanical guarantee.
  doctrine_reference: Translation philosophy §3
