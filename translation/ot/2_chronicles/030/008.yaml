id: 2CH.30.8
reference: 2 Chronicles 30:8
source:
  edition: WLC
  text: עַתָּ֕ה אַל תַּקְשׁ֥וּ עָרְפְּ/כֶ֖ם כַּ/אֲבוֹתֵי/כֶ֑ם תְּנוּ יָ֣ד לַ/יהוָ֗ה
    וּ/בֹ֤אוּ לְ/מִקְדָּשׁ/וֹ֙ אֲשֶׁ֣ר הִקְדִּ֣ישׁ לְ/עוֹלָ֔ם וְ/עִבְדוּ֙ אֶת יְהוָ֣ה
    אֱלֹהֵי/כֶ֔ם וְ/יָשֹׁ֥ב מִ/כֶּ֖ם חֲר֥וֹן אַפּֽ/וֹ־־־׃
translation:
  text: Now do not stiffen your neck as your fathers did. Give your hand to the LORD,
    and come to his sanctuary, which he has consecrated forever, and serve the LORD
    your God, so that his burning anger may turn away from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Yield yourselves to the LORD' or 'Submit to the LORD.' The Hebrew literally
      reads 'give hand to the LORD,' an idiom of submission or pledge.
    reason: lexical_alternative
  - marker: b
    text: Or 'and his burning anger will turn away from you.'
    reason: alternative_reading
lexical_decisions:
- source_word: תַּקְשׁוּ עָרְפְּכֶם
  chosen: stiffen your neck
  alternatives:
  - harden your neck
  - be stiff-necked
  lexicon: HALOT
  rationale: The idiom literally refers to making the neck hard/stiff and conveys
    stubborn resistance. 'Stiffen your neck' preserves the Hebrew image more directly
    than a flattened paraphrase.
- source_word: כַּאֲבוֹתֵיכֶם
  chosen: as your fathers did
  alternatives:
  - like your fathers
  - as your ancestors did
  lexicon: HALOT
  rationale: The comparison is to the prior generations' behavior. 'Fathers' is retained
    as the direct lexical equivalent and matches the masculine plural source; adding
    'did' makes the English idiomatic.
- source_word: תְּנוּ יָד לַיהוָה
  chosen: Give your hand to the LORD
  alternatives:
  - yield yourselves to the LORD
  - submit to the LORD
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'give hand to.' It can denote submission
    or pledge, but the main text preserves the concrete idiom for transparency. A
    footnote preserves the interpretive sense.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.'
- source_word: מִקְדָּשׁוֹ
  chosen: his sanctuary
  alternatives:
  - his holy place
  - his temple
  lexicon: HALOT
  rationale: מִקְדָּשׁ denotes a holy place/sanctuary. 'Sanctuary' is broad enough
    to reflect the Hebrew term without prematurely narrowing it to the temple building
    as an English technical term.
- source_word: הִקְדִּישׁ לְעוֹלָם
  chosen: has consecrated forever
  alternatives:
  - has sanctified forever
  - has set apart forever
  lexicon: HALOT
  rationale: The verb means to make holy/consecrate. 'Consecrated' is natural modern
    English and preserves the cultic sense. לְעוֹלָם is rendered 'forever' in its
    straightforward sense here.
- source_word: וְעִבְדוּ
  chosen: serve
  alternatives:
  - worship
  - serve in worship
  lexicon: HALOT
  rationale: עבד in relation to God can include worshipful service. 'Serve' is the
    more direct lexical rendering and leaves the broader covenantal sense intact.
- source_word: וְיָשֹׁב מִכֶּם
  chosen: may turn away from you
  alternatives:
  - will turn away from you
  - may turn back from you
  lexicon: HALOT
  rationale: The prefixed form here is jussive-like in the exhortational sequence,
    expressing intended result rather than a flat prediction. 'May turn away' captures
    the volitional/result nuance in English.
- source_word: חֲרוֹן אַפּוֹ
  chosen: his burning anger
  alternatives:
  - the fierceness of his anger
  - his wrath
  lexicon: HALOT
  rationale: The Hebrew expression literally refers to the burning of his nose/anger,
    an idiom for fierce anger. 'Burning anger' preserves the metaphorical heat without
    awkward literalism.
