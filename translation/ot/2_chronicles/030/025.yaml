id: 2CH.30.25
reference: 2 Chronicles 30:25
source:
  edition: WLC
  text: וַֽ/יִּשְׂמְח֣וּ כָּל קְהַ֣ל יְהוּדָ֗ה וְ/הַ/כֹּהֲנִים֙ וְ/הַ/לְוִיִּ֔ם וְ/כָל
    הַ/קָּהָ֖ל הַ/בָּאִ֣ים מִ/יִּשְׂרָאֵ֑ל וְ/הַ/גֵּרִ֗ים הַ/בָּאִים֙ מֵ/אֶ֣רֶץ יִשְׂרָאֵ֔ל
    וְ/הַ/יּוֹשְׁבִ֖ים בִּ/יהוּדָֽה׀־־׃
translation:
  text: And all the assembly of Judah rejoiced, along with the priests and the Levites,
    and all the assembly who had come from Israel, and the sojourners who had come
    from the land of Israel, and those living in Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the resident foreigners.' The Hebrew גֵּרִים refers to non-native residents
      living among Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂמְחוּ
  chosen: rejoiced
  alternatives:
  - were glad
  - celebrated
  lexicon: HALOT
  rationale: The verb שׂמח denotes joy or gladness. 'Rejoiced' is natural modern English
    and preserves the verbal sense without over-specifying the manner of celebration.
- source_word: כָּל קְהַל יְהוּדָה
  chosen: all the assembly of Judah
  alternatives:
  - the whole assembly of Judah
  - all the congregation of Judah
  lexicon: HALOT
  rationale: קהל refers to an assembled community. 'Assembly' is preferred over 'congregation'
    here because the context is a gathered people rather than specifically a worshiping
    congregation in later ecclesial sense. 'All the assembly of Judah' closely reflects
    the Hebrew structure.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים; no contextual reason to vary.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of לְוִיִּם as the Levitical group distinct from the
    priests.
- source_word: כָל הַקָּהָל הַבָּאִים מִיִּשְׂרָאֵל
  chosen: all the assembly who had come from Israel
  alternatives:
  - all the assembly coming from Israel
  - all the gathered people from Israel
  lexicon: HALOT
  rationale: The participle הַבָּאִים identifies those who came from the northern
    kingdom/people of Israel. The English relative clause 'who had come' gives smooth
    narrative sense in past context.
- source_word: הַגֵּרִים
  chosen: the sojourners
  alternatives:
  - the resident foreigners
  - the strangers
  lexicon: HALOT
  rationale: גֵּר denotes a resident alien/sojourner living among Israel. 'Sojourners'
    preserves the covenantal-social category without reducing it merely to ethnicity.
    Because 'resident foreigners' is also plausible and more explicit, it is preserved
    in a footnote.
- source_word: הַבָּאִים מֵאֶרֶץ יִשְׂרָאֵל
  chosen: who had come from the land of Israel
  alternatives:
  - coming from the land of Israel
  lexicon: HALOT
  rationale: אֶרֶץ יִשְׂרָאֵל here is best rendered 'the land of Israel.' The phrase
    distinguishes geographic origin from Judah. The past-perfect-like English fits
    the narrative sequence.
- source_word: הַיּוֹשְׁבִים בִּיהוּדָה
  chosen: those living in Judah
  alternatives:
  - those dwelling in Judah
  - the inhabitants of Judah
  lexicon: HALOT
  rationale: The participle from ישׁב denotes residing or dwelling. 'Those living
    in Judah' is readable modern English and preserves the participial force better
    than a more static noun phrase.
