  category: awkward_english
  tier: 1
  from: the remnant that has escaped, that remains for you
  to: the surviving remnant that is left to you
  rationale: The Hebrew phrase `הַפְּלֵיטָה הַנִּשְׁאֶרֶת` uses a noun ('the escaped group') and an attributive participle ('the remaining') to form a single, emphatic idea. The draft's rendering with two separate relative clauses ('the remnant that has escaped, that remains for you') is grammatically awkward in English and fragments the unified Hebrew concept. A more integrated phrasing like 'the surviving remnant that is left to you' would be more natural and accurately reflect the Hebrew syntax, capturing both roots (פלט for 'surviving' and שׁאר for 'remnant that is left').
