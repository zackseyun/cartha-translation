id: 2CH.30.6
reference: 2 Chronicles 30:6
source:
  edition: WLC
  text: וַ/יֵּלְכוּ֩ הָ/רָצִ֨ים בָּֽ/אִגְּר֜וֹת מִ/יַּ֧ד הַ/מֶּ֣לֶךְ וְ/שָׂרָ֗י/ו בְּ/כָל יִשְׂרָאֵל֙ וִֽ/יהוּדָ֔ה וּ/כְ/מִצְוַ֥ת הַ/מֶּ֖לֶךְ לֵ/אמֹ֑ר בְּנֵ֣י יִשְׂרָאֵ֗ל שׁ֚וּבוּ אֶל יְהוָ֗ה אֱלֹהֵי֙ אַבְרָהָם֙ יִצְחָ֣ק וְ/יִשְׂרָאֵ֔ל וְ/יָשֹׁב֙ אֶל הַ/פְּלֵיטָ֔ה הַ/נִּשְׁאֶ֣רֶת לָ/כֶ֔ם מִ/כַּ֖ף מַלְכֵ֥י אַשּֽׁוּר־־־׃
translation:
  text: So the couriers went with the letters from the hand of the king and his officials throughout all Israel and Judah, according to the command of the king, saying, “Sons of Israel, return to the LORD, the God of Abraham, Isaac, and Israel, so that he may return to the surviving remnant that is left to you from the hand of the kings of Assyria.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Israel,'' not the more familiar ''Jacob.'''
    reason: alternative_reading
  - marker: b
    text: Or 'the remnant that has escaped, that remains for you'.
    reason: previous_rendering
lexical_decisions:
- source_word: הָרָצִים
  chosen: the couriers
  alternatives:
  - the runners
  - the messengers
  lexicon: HALOT
  rationale: The participial form from רוץ literally denotes runners, but in this administrative context of carrying royal letters it refers functionally to couriers. 'Couriers' is natural modern English while preserving the official-delivery sense.
- source_word: בָּאִגְּרוֹת
  chosen: with the letters
  alternatives:
  - in the letters
  - with the dispatches
  lexicon: HALOT
  rationale: אִגְּרוֹת refers to written letters or dispatches. The preposition ב here is best rendered instrumentally/associatively in English as 'with the letters' rather than the more wooden 'in the letters.'
- source_word: מִיַּד הַמֶּלֶךְ וְשָׂרָיו
  chosen: from the hand of the king and his officials
  alternatives:
  - from the king and his princes
  - by order of the king and his officials
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is retained because it is transparent in English and preserves the sense of direct royal authorization. שָׂרִים can be 'princes,' 'officials,' or 'commanders'; 'officials' best fits the administrative setting.
- source_word: בְּכָל יִשְׂרָאֵל וִיהוּדָה
  chosen: throughout all Israel and Judah
  alternatives:
  - in all Israel and Judah
  lexicon: HALOT
  rationale: The phrase marks the extent of the couriers' mission. 'Throughout' conveys movement across the territories more clearly than simple location.
- source_word: וּכְמִצְוַת הַמֶּלֶךְ
  chosen: according to the command of the king
  alternatives:
  - by the king's command
  - according to the king's commandment
  lexicon: HALOT
  rationale: מִצְוָה here is a royal directive, not specifically a divine commandment. 'Command' is idiomatic and avoids archaic ecclesiastical overtones.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: Sons of Israel
  alternatives:
  - Children of Israel
  - People of Israel
  lexicon: HALOT
  rationale: Per the gender-accurate principle, the masculine plural is preserved. 'Sons of Israel' reflects the Hebrew form directly; alternatives are possible but either traditionalized ('Children') or more interpretive ('People').
- source_word: שׁוּבוּ אֶל יְהוָה
  chosen: return to the LORD
  alternatives:
  - turn back to the LORD
  lexicon: HALOT
  rationale: שׁוּב in covenantal exhortation carries both physical and spiritual return/turning. 'Return' preserves the restoration motif and pairs well with the following divine response.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the LORD.'
- source_word: אֱלֹהֵי אַבְרָהָם יִצְחָק וְיִשְׂרָאֵל
  chosen: the God of Abraham, Isaac, and Israel
  alternatives:
  - the God of Abraham, Isaac, and Jacob
  lexicon: HALOT
  rationale: The Hebrew text here reads 'Israel,' not 'Jacob.' The translation follows the source text rather than harmonizing to the more familiar formula.
- source_word: וְיָשֹׁב
  chosen: so that he may return
  alternatives:
  - and he will return
  - that he may turn back
  lexicon: HALOT
  rationale: 'The prefixed verb after the imperative is best taken as expressing result/purpose: if they return, he may return. ''He'' refers to the LORD from the prior clause. This preserves the reciprocal covenantal wording.'
- source_word: הַפְּלֵיטָה
  chosen: the remnant that has escaped
  alternatives:
  - the survivors
  - the escaped remnant
  lexicon: HALOT
  rationale: פְּלֵיטָה denotes those who have escaped destruction. 'Remnant that has escaped' preserves both the theological remnant concept and the concrete sense of survival.
- source_word: הַנִּשְׁאֶרֶת לָכֶם
  chosen: that remains for you
  alternatives:
  - that is left to you
  - remaining among you
  lexicon: HALOT
  rationale: The participle from שׁאר describes what is left over or remaining. 'For you' is retained to reflect לָכֶם, indicating the surviving remnant still belonging to the addressed community.
- source_word: מִכַּף מַלְכֵי אַשּׁוּר
  chosen: from the hand of the kings of Assyria
  alternatives:
  - from the grasp of the kings of Assyria
  - from the power of the kings of Assyria
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is common for domination or power. Retaining 'hand' preserves the Hebrew imagery and matches the earlier phrase 'from the hand of the king.'
