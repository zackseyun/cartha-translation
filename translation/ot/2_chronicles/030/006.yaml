theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's contested-terms table specifies 'the LORD' as the default rendering for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to harmonize 'Israel' to 'Jacob' in the patriarchal formula
  chosen_reading: the God of Abraham, Isaac, and Israel
  alternative_readings:
  - the God of Abraham, Isaac, and Jacob
  rationale: Although 'Abraham, Isaac, and Jacob' is the more familiar English formula, the Hebrew text in this verse explicitly reads 'Israel.' Original-language primacy requires preserving the text as given rather than harmonizing to a traditional formula.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
