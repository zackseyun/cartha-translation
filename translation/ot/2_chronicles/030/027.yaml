theological_decisions:
- issue: Whether to make God the explicit subject of 'was heard'
  chosen_reading: Retain the passive expression 'their voice was heard' without supplying
    'by God' in the main text.
  alternative_readings:
  - God heard their voice
  - their voice was heard by the LORD
  rationale: The Hebrew uses a passive form and does not explicitly name God as subject
    in this clause, though the context clearly implies divine hearing. Preserving
    the passive maintains the text's wording and avoids importing an explicit subject
    not stated.
  doctrine_reference: Translation philosophy §1, §3
- issue: Relationship of 'the priests, the Levites'
  chosen_reading: 'Treat as apposition: ''the priests, the Levites.'''
  alternative_readings:
  - the Levitical priests
  - the priests and the Levites
  rationale: Chronicles often refers to priests as Levites in appositional form. Rendering
    it appositionally avoids implying two distinct groups where the Hebrew likely
    identifies one class more specifically.
  doctrine_reference: Translation philosophy §1, §5
