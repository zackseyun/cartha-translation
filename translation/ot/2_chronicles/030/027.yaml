id: 2CH.30.27
reference: 2 Chronicles 30:27
source:
  edition: WLC
  text: וַ/יָּקֻ֜מוּ הַ/כֹּהֲנִ֤ים הַ/לְוִיִּם֙ וַ/יְבָרֲכ֣וּ אֶת הָ/עָ֔ם וַ/יִּשָּׁמַ֖ע
    בְּ/קוֹלָ֑/ם וַ/תָּב֧וֹא תְפִלָּתָ֛/ם לִ/מְע֥וֹן קָדְשׁ֖/וֹ לַ/שָּׁמָֽיִם־׃פ
translation:
  text: Then the priests, the Levites, stood up and blessed the people, and their
    voice was heard, and their prayer came to his holy dwelling in heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Levitical priests.' The Hebrew phrase may be read appositionally,
      identifying the priests as Levites.
    reason: lexical_alternative
  - marker: b
    text: Or 'their voice was listened to,' with the passive implying that God heard
      them.
    reason: alternative_reading
  - marker: c
    text: Or 'to his holy habitation, to the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  chosen: stood up
  alternatives:
  - arose
  - got up
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום commonly denotes rising or standing up. 'Stood up'
    is natural English and preserves the concrete action before the blessing.
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  chosen: the priests, the Levites
  alternatives:
  - the Levitical priests
  - the priests and the Levites
  lexicon: HALOT
  rationale: The appositional construction is best represented by 'the priests, the
    Levites,' identifying the priests as Levites rather than introducing two separate
    groups. This fits the Chronicler's idiom.
- source_word: וַיְבָרֲכוּ
  chosen: blessed
  alternatives:
  - pronounced a blessing on
  lexicon: HALOT
  rationale: ברך in this context refers to speaking blessing over the people. 'Blessed'
    is the standard concise rendering and is fully adequate here.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the assembly
  lexicon: HALOT
  rationale: עָם normally means 'people.' While the referent is the gathered worshipers,
    'the people' preserves the lexical sense without over-specification.
- source_word: וַיִּשָּׁמַע בְּקוֹלָם
  chosen: their voice was heard
  alternatives:
  - their voice was listened to
  - he heard their voice
  lexicon: HALOT
  rationale: The Niphal of שמע is passive/reflexive, 'was heard.' The subject is most
    naturally 'their voice.' This preserves the Hebrew syntax without adding an explicit
    divine subject not stated in this clause.
- source_word: תְפִלָּתָם
  chosen: their prayer
  alternatives:
  - their plea
  lexicon: HALOT
  rationale: Though plural speakers are in view, the singular noun with suffix is
    well rendered collectively as 'their prayer.'
- source_word: לִמְעוֹן קָדְשׁוֹ
  chosen: to his holy dwelling
  alternatives:
  - to his holy habitation
  - to his holy abode
  lexicon: HALOT
  rationale: מָעוֹן denotes a dwelling place or habitation. 'Holy dwelling' is clear
    modern English and retains the sacred spatial imagery.
- source_word: לַשָּׁמָיִם
  chosen: in heaven
  alternatives:
  - to heaven
  - to the heavens
  lexicon: HALOT
  rationale: With apposition to 'his holy dwelling,' the phrase identifies the location
    of that dwelling. 'In heaven' is idiomatic English; 'to heaven' could misleadingly
    suggest motion beyond what the Hebrew apposition requires.
