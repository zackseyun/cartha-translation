id: 2CH.30.11
reference: 2 Chronicles 30:11
source:
  edition: WLC
  text: אַךְ אֲנָשִׁ֛ים מֵ/אָשֵׁ֥ר וּ/מְנַשֶּׁ֖ה וּ/מִ/זְּבֻל֑וּן נִֽכְנְע֔וּ וַ/יָּבֹ֖אוּ
    לִ/ירוּשָׁלִָֽם־׃
translation:
  text: Nevertheless, some men from Asher, Manasseh, and Zebulun humbled themselves
    and came to Jerusalem.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אַךְ
  chosen: Nevertheless
  alternatives:
  - But
  - However
  - Only
  lexicon: HALOT
  rationale: אַךְ here marks contrast with the preceding rejection by many in the
    northern tribes (v. 10), so an adversative English connector is appropriate. 'Nevertheless'
    captures the concessive contrast more clearly than the more restrictive 'only'.
- source_word: אֲנָשִׁים
  chosen: some men
  alternatives:
  - men
  - certain men
  - some people
  lexicon: HALOT
  rationale: The noun is masculine plural and refers to a subset of individuals from
    the named tribes. 'Some men' reflects the indefinite subset sense in context while
    preserving the gendered form, in line with the gender-accurate policy.
- source_word: מֵאָשֵׁר וּמְנַשֶּׁה וּמִזְּבֻלוּן
  chosen: from Asher, Manasseh, and Zebulun
  alternatives:
  - out of Asher, Manasseh, and Zebulun
  lexicon: HALOT
  rationale: The prepositions mark origin from these tribal territories. Standard
    transliteration is used for tribal names per translation policy.
- source_word: נִכְנְעוּ
  chosen: humbled themselves
  alternatives:
  - submitted themselves
  - were humbled
  lexicon: HALOT
  rationale: The Niphal of כנע commonly conveys humbling oneself or becoming subdued.
    In this context of responding rightly to Hezekiah's call, the reflexive nuance
    'humbled themselves' best fits the voluntary response implied by the following
    action.
- source_word: וַיָּבֹאוּ
  chosen: and came
  alternatives:
  - and went
  - and arrived
  lexicon: HALOT
  rationale: בוא in narrative sequence is naturally rendered 'came' with Jerusalem
    as destination from the narrator's perspective. 'Arrived' is possible but less
    direct.
- source_word: לִירוּשָׁלִָם
  chosen: to Jerusalem
  lexicon: HALOT
  rationale: Standard rendering of the place name with directional preposition.
