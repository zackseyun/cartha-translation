id: 2CH.30.7
reference: 2 Chronicles 30:7
source:
  edition: WLC
  text: וְ/אַל תִּֽהְי֗וּ כַּ/אֲבֽוֹתֵי/כֶם֙ וְ/כַ֣/אֲחֵי/כֶ֔ם אֲשֶׁ֣ר מָעֲל֔וּ בַּ/יהוָ֖ה
    אֱלֹהֵ֣י אֲבוֹתֵי/הֶ֑ם וַ/יִּתְּנֵ֣/ם לְ/שַׁמָּ֔ה כַּ/אֲשֶׁ֖ר אַתֶּ֥ם רֹאִֽים־׃
translation:
  text: Do not be like your fathers and like your brothers, who were unfaithful to
    the LORD, the God of their fathers, so that he made them a desolation, as you
    see.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an object of horror' or 'astonishment'; the Hebrew term can denote both
      devastation and the appalling spectacle it creates.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַל תִּהְיוּ
  chosen: Do not be
  alternatives:
  - And do not be
  - Do not become
  lexicon: HALOT
  rationale: 'אַל with the imperfect gives a negative prohibition. ''Do not be'' is
    natural English and fits the comparison that follows. ''Become'' is possible from
    היה in some contexts, but here the sense is stative: they are warned not to be
    like their ancestors.'
- source_word: כַאֲבוֹתֵיכֶם
  chosen: like your fathers
  alternatives:
  - like your ancestors
  lexicon: HALOT
  rationale: אָבוֹת commonly means 'fathers' or 'ancestors.' Here the direct parallel
    with 'your brothers' and the historical reference to prior generations favors
    'fathers,' while still naturally implying forefathers.
- source_word: וְכַאֲחֵיכֶם
  chosen: and like your brothers
  alternatives:
  - and your kinsmen
  - and your brothers
  lexicon: HALOT
  rationale: אָח can denote literal brothers or broader kin. In this appeal to the
    northern remnant, 'brothers' preserves the familial rhetoric and covenant solidarity
    better than the flatter 'kinsmen.'
- source_word: מָעֲלוּ
  chosen: were unfaithful
  alternatives:
  - acted treacherously
  - trespassed
  - broke faith
  lexicon: HALOT
  rationale: מעל in covenant contexts often denotes breach of faith or unfaithfulness
    toward God. 'Were unfaithful' communicates the covenantal and religious force
    clearly in modern English without sounding overly technical.
- source_word: בַּיהוָה
  chosen: to the LORD
  alternatives:
  - against the LORD
  lexicon: HALOT
  rationale: With מעל, the preposition can be represented in English as 'against'
    or 'to' depending on idiom. 'Unfaithful to the LORD' is the most idiomatic English
    expression for covenant breach. 'The LORD' follows the stated default for YHWH.
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  chosen: the God of their fathers
  alternatives:
  - the God of their ancestors
  lexicon: HALOT
  rationale: This covenant formula is best preserved fairly literally. 'Fathers' maintains
    the traditional and source-oriented wording and echoes the prior 'your fathers.'
- source_word: וַיִּתְּנֵם
  chosen: he made them
  alternatives:
  - he gave them over
  - he delivered them
  lexicon: HALOT
  rationale: 'נתן literally means ''gave,'' but in this construction with לְשַׁמָּה
    the sense is causative/resultative: God rendered them into a state of devastation.
    ''He made them'' communicates the resulting condition smoothly in English. The
    subject is singular and refers to God.'
- source_word: לְשַׁמָּה
  chosen: a desolation
  alternatives:
  - an object of horror
  - astonishment
  - ruin
  lexicon: HALOT
  rationale: שַׁמָּה often denotes desolation and, by extension, an appalling spectacle.
    'A desolation' preserves the noun form and the devastation motif. Because the
    term can also imply horror/astonishment to onlookers, that nuance is preserved
    in a footnote.
- source_word: כַּאֲשֶׁר אַתֶּם רֹאִים
  chosen: as you see
  alternatives:
  - as you yourselves see
  - as you can see
  lexicon: HALOT
  rationale: The phrase appeals to visible historical evidence. 'As you see' is concise
    and direct; 'as you can see' is slightly more interpretive. The present participle
    supports an ongoing, observable reality.
