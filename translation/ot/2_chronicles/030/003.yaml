id: 2CH.30.3
reference: 2 Chronicles 30:3
source:
  edition: WLC
  text: כִּ֣י לֹ֧א יָכְל֛וּ לַ/עֲשֹׂת֖/וֹ בָּ/עֵ֣ת הַ/הִ֑יא כִּ֤י הַ/כֹּהֲנִים֙ לֹֽא
    הִתְקַדְּשׁ֣וּ לְ/מַ דַּ֔י וְ/הָ/עָ֖ם לֹא נֶאֶסְפ֥וּ לִֽ/ירוּשָׁלִָֽם־־׃
translation:
  text: For they could not do it at that time, because the priests had not consecrated
    themselves sufficiently, and the people had not gathered in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Jerusalem.' The Hebrew preposition is literally 'to,' but in English
      'gather in Jerusalem' more naturally expresses the assembly's location.
    reason: lexical_alternative
  - marker: b
    text: Or 'had not consecrated themselves enough' / 'not enough had consecrated
      themselves.' The Hebrew expression is compact and may refer either to adequate
      consecration or to an insufficient number of consecrated priests.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָכְלוּ
  chosen: could
  alternatives:
  - were able
  lexicon: HALOT
  rationale: The verb denotes ability. 'Could not' is natural modern English and preserves
    the sense of incapacity rather than mere unwillingness.
- source_word: לַעֲשֹׂתוֹ
  chosen: do it
  alternatives:
  - observe it
  - carry it out
  lexicon: HALOT
  rationale: The infinitive with pronominal suffix refers back to the Passover observance
    in context. 'Do it' is formally close to the Hebrew while remaining clear in English;
    more explicit alternatives are possible but slightly more interpretive.
- source_word: בָּעֵת הַהִיא
  chosen: at that time
  alternatives:
  - at that appointed time
  - then
  lexicon: HALOT
  rationale: This phrase points to the specific time when the Passover should have
    been kept. 'At that time' is straightforward and sufficiently precise without
    over-specifying 'appointed' in the main text.
- source_word: הִתְקַדְּשׁוּ
  chosen: had not consecrated themselves
  alternatives:
  - had not sanctified themselves
  - had not purified themselves
  lexicon: HALOT
  rationale: In priestly/cultic context, קדשׁ in the hitpael refers to ritual self-consecration.
    'Consecrated themselves' best conveys cultic preparation in readable modern English;
    'sanctified' is more traditional but less accessible, and 'purified' is somewhat
    narrower.
- source_word: לְמַדַּי
  chosen: sufficiently
  alternatives:
  - enough
  - in sufficient number
  lexicon: HALOT
  rationale: 'The phrase means ''to a sufficient degree/amount.'' Here it most naturally
    modifies the priests'' state of consecration: they had not consecrated themselves
    adequately. Some take it numerically (''not enough priests had consecrated themselves''),
    but the adverbial ''sufficiently'' preserves the Hebrew compactly while fitting
    the syntax.'
- source_word: נֶאֶסְפוּ
  chosen: had not gathered
  alternatives:
  - had not assembled
  - had not been gathered
  lexicon: HALOT
  rationale: The niphal of אסף can be intransitive/passive-like, referring to assembling.
    'Had not gathered' is idiomatic English and fits the people's action of coming
    together for the feast. 'Had not been gathered' is more wooden and less natural
    here.
- source_word: לִירוּשָׁלִָם
  chosen: in Jerusalem
  alternatives:
  - to Jerusalem
  lexicon: HALOT
  rationale: Although the preposition is literally 'to,' with verbs of gathering English
    commonly says 'gather in Jerusalem.' This reflects the resulting location of the
    assembly and reads naturally while preserving the sense.
