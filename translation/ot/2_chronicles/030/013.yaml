id: 2CH.30.13
reference: 2 Chronicles 30:13
source:
  edition: WLC
  text: וַ/יֵּֽאָסְפ֤וּ יְרוּשָׁלִַ֨ם֙ עַם רָ֔ב לַ/עֲשׂ֛וֹת אֶת חַ֥ג הַ/מַּצּ֖וֹת
    בַּ/חֹ֣דֶשׁ הַ/שֵּׁנִ֑י קָהָ֖ל לָ/רֹ֥ב מְאֹֽד־־׃
translation:
  text: A great many people gathered in Jerusalem to keep the Festival of Unleavened
    Bread in the second month, a very great assembly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to celebrate' or 'to observe' the Festival of Unleavened Bread; literally
      'to do/make' the festival.
    reason: lexical_alternative
  - marker: b
    text: Or 'Feast of Unleavened Bread.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּאָסְפוּ
  chosen: gathered
  alternatives:
  - assembled
  - were gathered
  lexicon: HALOT
  rationale: From אסף in the Niphal/waw-consecutive form, indicating coming together
    or being assembled. 'Gathered' is natural modern English and preserves the event
    sense without overformal wording.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name, in keeping with the
    policy to transliterate names.
- source_word: עַם רָב
  chosen: a great many people
  alternatives:
  - many people
  - a large crowd
  lexicon: HALOT
  rationale: Literally 'a numerous people/people in great number.' 'A great many people'
    preserves the quantitative emphasis while reading naturally in English. 'Crowd'
    is possible but slightly less neutral than the Hebrew.
- source_word: לַעֲשׂוֹת
  chosen: to keep
  alternatives:
  - to celebrate
  - to observe
  - to do
  lexicon: HALOT
  rationale: Although the verb is literally 'to do/make,' with a festival object in
    Hebrew idiom it means to observe or celebrate it. 'Keep' is a concise English
    equivalent for festival observance and avoids wooden literalism.
- source_word: חַג הַמַּצּוֹת
  chosen: the Festival of Unleavened Bread
  alternatives:
  - the Feast of Unleavened Bread
  lexicon: HALOT
  rationale: חַג is a pilgrimage festival/feast. 'Festival' is slightly more accessible
    modern English than 'Feast' while preserving the formal cultic sense. 'Unleavened
    Bread' is the standard rendering of מַצּוֹת here.
- source_word: בַּחֹדֶשׁ הַשֵּׁנִי
  chosen: in the second month
  lexicon: HALOT
  rationale: Straightforward temporal phrase; retained formally because the chronology
    matters in the context of Hezekiah's delayed Passover observance.
- source_word: קָהָל
  chosen: assembly
  alternatives:
  - congregation
  - gathering
  lexicon: HALOT
  rationale: קָהָל often denotes an assembled community. 'Assembly' fits both the
    formal setting and the immediate apposition summarizing the gathered people. 'Congregation'
    can sound more ecclesiastical than the Hebrew requires here.
- source_word: לָרֹב מְאֹד
  chosen: very great
  alternatives:
  - exceedingly numerous
  - in very great number
  lexicon: HALOT
  rationale: An idiom intensifying the size of the assembly. Rendered as 'very great'
    attached to 'assembly' for smooth English while preserving the emphatic force.
