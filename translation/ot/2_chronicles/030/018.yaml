id: 2CH.30.18
reference: 2 Chronicles 30:18
source:
  edition: WLC
  text: כִּ֣י מַרְבִּ֣ית הָ/עָ֡ם רַ֠בַּת מֵֽ/אֶפְרַ֨יִם וּ/מְנַשֶּׁ֜ה יִשָּׂשכָ֤ר
    וּ/זְבֻלוּן֙ לֹ֣א הִטֶּהָ֔רוּ כִּֽי אָכְל֥וּ אֶת הַ/פֶּ֖סַח בְּ/לֹ֣א כַ/כָּת֑וּב
    כִּי֩ הִתְפַּלֵּ֨ל יְחִזְקִיָּ֤הוּ עֲלֵי/הֶם֙ לֵ/אמֹ֔ר יְהוָ֥ה הַ/טּ֖וֹב יְכַפֵּ֥ר
    בְּעַֽד־־׃
translation:
  text: For a great many of the people, many from Ephraim and Manasseh, Issachar and
    Zebulun, had not purified themselves, yet they ate the Passover otherwise than
    as it is written. But Hezekiah prayed for them, saying, “May the LORD, who is
    good, make atonement for everyone—”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'not according to what is written.'
    reason: lexical_alternative
  - marker: b
    text: The prayer continues into verse 19; the Hebrew sentence is incomplete at
      the end of this verse.
    reason: cross_reference
lexical_decisions:
- source_word: מַרְבִּית הָעָם
  chosen: a great many of the people
  alternatives:
  - the majority of the people
  - a multitude of the people
  lexicon: HALOT
  rationale: The construct phrase denotes a large portion or multitude from among
    the people. 'A great many of the people' is natural English and preserves the
    partitive sense without overstating it as an absolute majority.
- source_word: רַבַּת
  chosen: many
  alternatives:
  - a large number
  - abundant
  lexicon: HALOT
  rationale: Used appositionally/intensively with the preceding phrase to emphasize
    the large number. Rendering it with a second 'many' preserves the Hebrew emphasis,
    though smoothed in English syntax.
- source_word: מֵאֶפְרַיִם וּמְנַשֶּׁה יִשָּׂשכָר וּזְבֻלוּן
  chosen: from Ephraim and Manasseh, Issachar and Zebulun
  alternatives:
  - from Ephraim, Manasseh, Issachar, and Zebulun
  lexicon: HALOT
  rationale: These are tribal names and are transliterated. The sequence is preserved
    closely; commas clarify the list in English.
- source_word: לֹא הִטֶּהָרוּ
  chosen: had not purified themselves
  alternatives:
  - were not clean
  - had not cleansed themselves
  lexicon: HALOT
  rationale: The hitpael of טהר is reflexive, referring to ritual purification. 'Had
    not purified themselves' best captures the reflexive and cultic sense.
- source_word: אָכְלוּ אֶת הַפֶּסַח
  chosen: they ate the Passover
  alternatives:
  - they ate the Passover lamb
  - they partook of the Passover
  lexicon: HALOT
  rationale: The object is 'the Passover,' which can refer to the meal/sacrifice observance.
    'Ate the Passover' is a standard and sufficiently literal rendering without adding
    'lamb,' which is not explicit here.
- source_word: בְּלֹא כַכָּתוּב
  chosen: otherwise than as it is written
  alternatives:
  - not according to what is written
  - contrary to what is prescribed
  lexicon: HALOT
  rationale: The phrase means not in accordance with the written prescription. 'Otherwise
    than as it is written' is idiomatic and preserves the appeal to written Torah.
- source_word: הִתְפַּלֵּל ... עֲלֵיהֶם
  chosen: prayed for them
  alternatives:
  - interceded for them
  lexicon: HALOT
  rationale: The verb plus preposition indicates prayer on behalf of others. 'Prayed
    for them' is clear and direct; 'interceded' is possible but slightly more interpretive.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: הַטּוֹב
  chosen: who is good
  alternatives:
  - the good one
  - the good LORD
  lexicon: HALOT
  rationale: The adjective functions substantivally/appositionally with YHWH. 'Who
    is good' makes the sense explicit in natural English and avoids an awkward title-like
    construction.
- source_word: יְכַפֵּר
  chosen: make atonement
  alternatives:
  - provide atonement
  - forgive
  lexicon: HALOT
  rationale: The piel of כפר in cultic/intercessory context carries the sense of making
    atonement or effecting expiation. 'Forgive' is too interpretive and loses the
    sacrificial/cultic nuance.
- source_word: בְּעַד
  chosen: for everyone
  alternatives:
  - for each one
  - on behalf of
  lexicon: HALOT
  rationale: The preposition means 'for/on behalf of,' but the object is deferred
    to the next verse. To keep the English readable while signaling the incomplete
    syntax, 'for everyone—' anticipates the continuation. The dash marks that the
    sentence continues in v. 19.
