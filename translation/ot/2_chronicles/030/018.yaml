theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the LXX pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Cultic language of כפר
  chosen_reading: make atonement
  alternative_readings:
  - forgive
  - cover
  rationale: The verse is set in a Passover and purification context, so preserving
    the cultic term maintains the theological texture without importing later doctrinal
    specificity.
