id: 2CH.30.24
reference: 2 Chronicles 30:24
source:
  edition: WLC
  text: כִּ֣י חִזְקִיָּ֣הוּ מֶֽלֶךְ יְ֠הוּדָה הֵרִ֨ים לַ/קָּהָ֜ל אֶ֣לֶף פָּרִים֮ וְ/שִׁבְעַ֣ת
    אֲלָפִ֣ים צֹאן֒ וְ/הַ/שָּׂרִ֞ים הֵרִ֤ימוּ לַ/קָּהָל֙ פָּרִ֣ים אֶ֔לֶף וְ/צֹ֖אן
    עֲשֶׂ֣רֶת אֲלָפִ֑ים וַ/יִּֽתְקַדְּשׁ֥וּ כֹהֲנִ֖ים לָ/רֹֽב־ס׃
translation:
  text: For Hezekiah king of Judah contributed to the assembly one thousand bulls
    and seven thousand sheep, and the officials contributed to the assembly one thousand
    bulls and ten thousand sheep; and priests consecrated themselves in great numbers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the assembly' instead of 'to the assembly'; the Hebrew preposition
      can be understood either way in this context of providing animals for communal
      worship.
    reason: lexical_alternative
  - marker: b
    text: '''Sheep'' renders Hebrew צֹאן, a broader term that can refer to flock animals
      generally, including sheep and goats.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding statement about the people's
    rejoicing and participation. 'For' fits the discourse connection naturally in
    English.
- source_word: הֵרִים / הֵרִימוּ
  chosen: contributed
  alternatives:
  - gave
  - offered
  - donated
  - lifted up
  lexicon: HALOT
  rationale: The hiphil of רום here idiomatically refers to making a contribution
    for the gathered worshipers, not literally 'lifting up.' 'Contributed' captures
    the sense of providing animals for communal sacrificial use without over-specifying
    the ritual act.
- source_word: לַקָּהָל
  chosen: to the assembly
  alternatives:
  - for the assembly
  - to the congregation
  lexicon: HALOT
  rationale: קהל denotes the gathered community. 'Assembly' is clear modern English
    and suits the festival gathering. 'To the assembly' preserves the Hebrew preposition
    while remaining idiomatic.
- source_word: אֶלֶף פָּרִים
  chosen: one thousand bulls
  alternatives:
  - a thousand bulls
  - one thousand young bulls
  lexicon: HALOT
  rationale: פָּרִים are bulls/cattle, commonly sacrificial bovines. 'Bulls' is the
    most straightforward rendering here.
- source_word: שִׁבְעַת אֲלָפִים צֹאן
  chosen: seven thousand sheep
  alternatives:
  - seven thousand of the flock
  - seven thousand small livestock
  lexicon: HALOT
  rationale: צֹאן can denote small livestock collectively, including sheep and goats,
    but in English narrative lists of sacrificial animals it is commonly and acceptably
    rendered 'sheep' unless the broader category must be stressed. No contextual pressure
    here requires the more technical 'flock animals.'
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the rulers
  - the leaders
  lexicon: HALOT
  rationale: שָׂרִים refers to high-ranking leaders. 'Officials' communicates their
    governing role in accessible modern English without implying hereditary nobility
    as strongly as 'princes' might.
- source_word: עֲשֶׂרֶת אֲלָפִים
  chosen: ten thousand
  alternatives:
  - ten thousand of the flock
  lexicon: HALOT
  rationale: Straight numerical rendering; the following צֹאן supplies the counted
    item.
- source_word: וַיִּתְקַדְּשׁוּ כֹהֲנִים
  chosen: and priests consecrated themselves
  alternatives:
  - and the priests sanctified themselves
  - and many priests purified themselves
  lexicon: HALOT
  rationale: 'The hitpael/t-stem of קדשׁ here is reflexive: the priests set themselves
    apart ritually for service. ''Consecrated themselves'' preserves the cultic sense
    better than the more general ''purified themselves,'' though ritual purification
    is involved.'
- source_word: לָרֹב
  chosen: in great numbers
  alternatives:
  - in abundance
  - many
  lexicon: HALOT
  rationale: The phrase indicates large quantity. 'In great numbers' is idiomatic
    and reflects the narrative emphasis that many priests became ready for service.
