id: 2CH.30.22
reference: 2 Chronicles 30:22
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר יְחִזְקִיָּ֗הוּ עַל לֵב֙ כָּל הַ/לְוִיִּ֔ם הַ/מַּשְׂכִּילִ֥ים שֵֽׂכֶל ט֖וֹב לַ/יהוָ֑ה וַ/יֹּאכְל֤וּ אֶת הַ/מּוֹעֵד֙ שִׁבְעַ֣ת הַ/יָּמִ֔ים מְזַבְּחִים֙ זִבְחֵ֣י שְׁלָמִ֔ים וּ/מִ֨תְוַדִּ֔ים לַ/יהוָ֖ה אֱלֹהֵ֥י אֲבוֹתֵי/הֶֽם־־־־׃ס
translation:
  text: And Hezekiah spoke encouragingly to all the Levites who had good understanding in the service of Yahweh. And they ate throughout the appointed feast for seven days, sacrificing peace offerings and giving thanks to Yahweh, the God of their fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'spoke to the heart of all the Levites.'
    reason: lexical_alternative
  - marker: b
    text: Or 'who had good insight for the LORD' or 'who were skillful in regard to the LORD.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'peace offerings'; alternatively 'fellowship offerings' or 'offerings of well-being.'
    reason: lexical_alternative
  - marker: d
    text: The verb can also mean 'confessing' or 'praising'; here it likely carries the sense of giving thanks in worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר עַל־לֵב
  chosen: spoke encouragingly
  alternatives:
  - spoke to the heart of
  - spoke kindly to
  - spoke comfortingly to
  lexicon: HALOT
  rationale: The idiom עַל־לֵב literally means 'to the heart,' but in context it denotes speaking in a way that strengthens, comforts, or encourages. 'Spoke encouragingly' captures the idiomatic sense in natural English without over-paraphrasing.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/cultic group; proper ethnoreligious designation should be preserved.
- source_word: הַמַּשְׂכִּילִים שֵׂכֶל טוֹב
  chosen: who showed good understanding
  alternatives:
  - who had good insight
  - who were skillful with good sense
  - who taught good knowledge
  lexicon: HALOT
  rationale: The participle from שׂכל with the cognate noun שׂכל emphasizes insight, skill, or prudence. In this cultic context it likely refers to competent understanding in carrying out sacred duties. 'Showed good understanding' preserves the sense without forcing a narrower meaning such as 'taught.'
- source_word: לַיהוָה
  chosen: in the service of the LORD
  alternatives:
  - for the LORD
  - toward the LORD
  - with respect to the LORD
  lexicon: HALOT
  rationale: The preposition ל here marks relation or direction. Given the context of Levites functioning in temple worship, 'in the service of the LORD' makes explicit the likely sense of their understanding as exercised in relation to YHWH's worship. The divine name follows project policy as 'the LORD.'
- source_word: וַיֹּאכְלוּ אֶת־הַמּוֹעֵד
  chosen: they ate the feast
  alternatives:
  - they kept the appointed feast by eating
  - they ate the festival
  - they celebrated the appointed time
  lexicon: HALOT
  rationale: מוֹעֵד is literally 'appointed time/feast.' Because the verb is 'ate,' the object is best rendered concretely as the feast/festival rather than abstractly as 'appointed time.'
- source_word: שִׁבְעַת הַיָּמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: Idiomatic English duration phrase.
- source_word: מְזַבְּחִים זִבְחֵי שְׁלָמִים
  chosen: sacrificing peace offerings
  alternatives:
  - offering fellowship offerings
  - sacrificing offerings of well-being
  lexicon: HALOT
  rationale: זִבְחֵי שְׁלָמִים is the standard sacrificial term often rendered 'peace offerings.' While 'fellowship offerings' or 'offerings of well-being' are possible, 'peace offerings' is concise and recognizable, and does not distort the sacrificial category.
- source_word: וּמִתְוַדִּים
  chosen: giving thanks
  alternatives:
  - confessing
  - praising
  lexicon: HALOT
  rationale: The hitpael of ידה can mean confess or give thanks/praise depending on context. Here, in a festival setting alongside sacrifices of thanksgiving/peace and worship to the LORD, 'giving thanks' best fits the positive liturgical sense.
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  chosen: the God of their fathers
  alternatives:
  - the God of their ancestors
  lexicon: HALOT
  rationale: A conventional covenantal expression. 'Fathers' preserves the source wording and its ancestral/covenantal resonance; this aligns with the project's gender-accurate policy.
