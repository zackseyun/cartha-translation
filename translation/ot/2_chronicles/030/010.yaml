id: 2CH.30.10
reference: 2 Chronicles 30:10
source:
  edition: WLC
  text: וַ/יִּֽהְי֨וּ הָ/רָצִ֜ים עֹבְרִ֨ים מֵ/עִ֧יר לָ/עִ֛יר בְּ/אֶֽרֶץ אֶפְרַ֥יִם
    וּ/מְנַשֶּׁ֖ה וְ/עַד זְבֻל֑וּן וַ/יִּֽהְיוּ֙ מַשְׂחִיקִ֣ים עֲלֵי/הֶ֔ם וּ/מַלְעִגִ֖ים
    בָּֽ/ם׀־־׃
translation:
  text: So the couriers went from city to city in the land of Ephraim and Manasseh,
    as far as Zebulun; but they were laughing at them and mocking them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the runners' or 'the messengers.' The Hebrew term refers to official
      bearers of a message, likely traveling quickly.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew expression combines two verbs of contempt: they were ''laughing
      at'' the couriers and ''mocking'' them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרָצִים
  chosen: the couriers
  alternatives:
  - the runners
  - the messengers
  lexicon: HALOT
  rationale: From the root רוץ ('run'), the participial noun refers to those sent
    swiftly with a message. 'Couriers' captures both the official and rapid-delivery
    sense better than the more literal 'runners' in modern English.
- source_word: עֹבְרִים
  chosen: went
  alternatives:
  - were passing
  - traveled
  lexicon: HALOT
  rationale: Literally 'passing through,' here in context of movement from city to
    city. 'Went' is smoother modern English while preserving the narrative sense of
    travel.
- source_word: מֵעִיר לָעִיר
  chosen: from city to city
  alternatives:
  - from one city to another
  lexicon: HALOT
  rationale: This idiom is naturally rendered 'from city to city' and preserves the
    distributive sense of repeated travel.
- source_word: בְּאֶרֶץ אֶפְרַיִם וּמְנַשֶּׁה וְעַד זְבֻלוּן
  chosen: in the land of Ephraim and Manasseh, as far as Zebulun
  alternatives:
  - throughout the land of Ephraim and Manasseh, even to Zebulun
  lexicon: HALOT
  rationale: Retains the geographic scope of the couriers' route. 'As far as Zebulun'
    reflects וְעַד clearly and idiomatically.
- source_word: מַשְׂחִיקִים עֲלֵיהֶם
  chosen: laughing at them
  alternatives:
  - making sport of them
  - deriding them
  lexicon: HALOT
  rationale: The Hiphil participle from שׂחק here conveys ridicule rather than simple
    laughter. 'Laughing at them' is clear, natural English and preserves the contemptuous
    force.
- source_word: וּמַלְעִגִים בָּם
  chosen: mocking them
  alternatives:
  - scoffing at them
  - ridiculing them
  lexicon: HALOT
  rationale: From לעג, a strong term for scornful mockery. 'Mocking them' pairs well
    with the previous verb and preserves the intensification of contempt.
- source_word: וַיִּהְיוּ ... וַיִּהְיוּ
  chosen: So ... but they were
  alternatives:
  - and ... and they were
  lexicon: HALOT
  rationale: 'The repeated wayyiqtol of היה structures the narrative. In English,
    rendering the first as ''So'' and the second with adversative ''but'' communicates
    the flow and contrast: the couriers traveled, yet the people responded with scorn.'
