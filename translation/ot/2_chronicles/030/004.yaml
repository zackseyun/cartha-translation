id: 2CH.30.4
reference: 2 Chronicles 30:4
source:
  edition: WLC
  text: וַ/יִּישַׁ֥ר הַ/דָּבָ֖ר בְּ/עֵינֵ֣י הַ/מֶּ֑לֶךְ וּ/בְ/עֵינֵ֖י כָּל הַ/קָּהָֽל־׃
translation:
  text: The proposal seemed right in the eyes of the king and in the eyes of all the
    assembly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The matter was right in the eyes of the king and of all the assembly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּישַׁר
  chosen: seemed right
  alternatives:
  - was right
  - was pleasing
  - was approved
  lexicon: HALOT
  rationale: From ישר in the wayyiqtol, here expressing that the matter was regarded
    favorably or as proper. 'Seemed right' fits the idiom with 'in the eyes of' and
    sounds natural in modern English without over-paraphrasing.
- source_word: הַדָּבָר
  chosen: the proposal
  alternatives:
  - the matter
  - the thing
  - the plan
  lexicon: HALOT
  rationale: דבר is broad ('word, matter, thing'). In context, the preceding verses
    concern a proposed course of action about keeping the Passover, so 'proposal'
    captures the specific referent more clearly than the overly vague 'thing' or 'matter'.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - to
  - in the judgment of
  - before
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for evaluation or judgment. Retaining
    'in the eyes of' preserves the Hebrew imagery while remaining understandable in
    English.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the noun with article.
- source_word: וּבְעֵינֵי
  chosen: and in the eyes of
  alternatives:
  - and to
  - and in the judgment of
  lexicon: HALOT
  rationale: The repeated idiom is preserved for parallelism and fidelity to the Hebrew
    structure.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Standard rendering; it modifies 'the assembly' comprehensively.
- source_word: הַקָּהָל
  chosen: the assembly
  alternatives:
  - the congregation
  - the gathered people
  lexicon: HALOT
  rationale: קהל denotes the assembled community. 'Assembly' is clear, modern, and
    suitably formal; 'congregation' can sound more ecclesiastical than the context
    requires.
