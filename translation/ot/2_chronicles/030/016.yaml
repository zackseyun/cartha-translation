theological_decisions:
- issue: Cultic terminology for blood application
  chosen_reading: were sprinkling the blood
  alternative_readings:
  - were throwing the blood
  rationale: The verse describes prescribed Passover ritual in accordance with Mosaic
    law. Rendering זרק as 'sprinkling' reflects established sacrificial usage and
    avoids a misleadingly casual sense, while not importing later theological claims
    beyond the ritual action itself.
