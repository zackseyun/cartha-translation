id: 2CH.30.16
reference: 2 Chronicles 30:16
source:
  edition: WLC
  text: וַ/יַּֽעַמְד֤וּ עַל עָמְדָ/ם֙ כְּ/מִשְׁפָּטָ֔/ם כְּ/תוֹרַ֖ת מֹשֶׁ֣ה אִישׁ
    הָ/אֱלֹהִ֑ים הַ/כֹּֽהֲנִים֙ זֹרְקִ֣ים אֶת הַ/דָּ֔ם מִ/יַּ֖ד הַ/לְוִיִּֽם־־־׃
translation:
  text: They stood in their place according to their ordinance, according to the law
    of Moses the man of God. The priests were sprinkling the blood received from the
    hand of the Levites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from the hand of the Levites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַמְדוּ
  chosen: They stood
  alternatives:
  - They took their stand
  - They stood up
  lexicon: HALOT
  rationale: The verb עמד in the waw-consecutive narrative form naturally means 'stood'
    or 'took their stand.' 'They stood' is concise and idiomatic, while preserving
    the physical/positional sense in the ritual setting.
- source_word: עַל עָמְדָם
  chosen: in their place
  alternatives:
  - at their station
  - upon their standing-place
  lexicon: HALOT
  rationale: The idiom refers to standing at one's assigned position or station. 'In
    their place' is natural English and fits the cultic context without over-literal
    awkwardness.
- source_word: כְּמִשְׁפָּטָם
  chosen: according to their ordinance
  alternatives:
  - according to their rule
  - according to their custom
  - according to what was prescribed for them
  lexicon: HALOT
  rationale: מִשְׁפָּט in priestly/cultic contexts often denotes prescribed procedure
    or ordinance rather than judicial 'judgment.' 'Ordinance' preserves the formal,
    regulated sense of temple procedure.
- source_word: כְּתוֹרַת מֹשֶׁה
  chosen: according to the law of Moses
  alternatives:
  - according to Moses' law
  - according to the instruction of Moses
  lexicon: HALOT
  rationale: תוֹרָה here refers to the Mosaic legal instruction governing Passover
    procedure. 'The law of Moses' is the most standard and clear rendering in this
    context.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - God's man
  lexicon: HALOT
  rationale: This is a fixed biblical title for Moses. 'The man of God' preserves
    the recognized title and its solemn force.
- source_word: הַכֹּהֲנִים
  chosen: The priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים in temple context.
- source_word: זֹרְקִים
  chosen: were sprinkling
  alternatives:
  - were throwing
  - were tossing
  lexicon: HALOT
  rationale: זרק with blood in sacrificial contexts refers to the ritual application
    of blood at the altar, commonly rendered 'sprinkle.' Although the basic verb can
    mean 'throw,' 'were sprinkling' best communicates the cultic action in idiomatic
    English.
- source_word: אֶת הַדָּם
  chosen: the blood
  lexicon: HALOT
  rationale: Direct object of the priestly action; straightforward sacrificial reference.
- source_word: מִיַּד הַלְוִיִּם
  chosen: received from the hand of the Levites
  alternatives:
  - from the hand of the Levites
  - taken from the Levites
  lexicon: HALOT
  rationale: Literally 'from the hand of the Levites.' In English, the priests are
    understood to receive the blood from the Levites for ritual application. Adding
    'received' makes the relation explicit without changing the sense.
