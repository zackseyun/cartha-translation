id: 2CH.30.15
reference: 2 Chronicles 30:15
source:
  edition: WLC
  text: וַ/יִּשְׁחֲט֣וּ הַ/פֶּ֔סַח בְּ/אַרְבָּעָ֥ה עָשָׂ֖ר לַ/חֹ֣דֶשׁ הַ/שֵּׁנִ֑י וְ/הַ/כֹּהֲנִ֨ים וְ/הַ/לְוִיִּ֤ם נִכְלְמוּ֙ וַ/יִּֽתְקַדְּשׁ֔וּ וַ/יָּבִ֥יאוּ עֹל֖וֹת בֵּ֥ית יְהוָֽה׃
translation:
  text: And they slaughtered the Passover lamb on the fourteenth day of the second month. Then the priests and the Levites were ashamed and consecrated themselves, and they brought burnt offerings to the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the Passover'; here it refers to the Passover victim, that is, the lamb.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁחֲטוּ
  chosen: they slaughtered
  alternatives:
  - they killed
  - they sacrificed
  lexicon: HALOT
  rationale: The verb שָׁחַט commonly denotes slaughtering an animal, especially in sacrificial contexts. 'Slaughtered' preserves the ritual-sacrificial sense without overinterpreting the subject.
- source_word: הַפֶּסַח
  chosen: the Passover lamb
  alternatives:
  - the Passover
  - the Passover sacrifice
  lexicon: HALOT
  rationale: In this context the term refers concretely to the Passover victim being slaughtered, not merely the festival as a whole. 'Passover lamb' makes the referent explicit in natural English while remaining faithful to the ritual setting.
- source_word: בְּאַרְבָּעָה עָשָׂר לַחֹדֶשׁ הַשֵּׁנִי
  chosen: on the fourteenth day of the second month
  alternatives:
  - on the fourteenth of the second month
  lexicon: HALOT
  rationale: This is the standard calendrical expression. 'Day' is supplied idiomatically in English for clarity.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים in cultic context.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of לְוִיִּם, referring to the Levitical personnel distinct from the priests.
- source_word: נִכְלְמוּ
  chosen: were ashamed
  alternatives:
  - were humiliated
  - felt disgrace
  lexicon: HALOT
  rationale: The Niphal of כלם conveys shame or humiliation. 'Were ashamed' is the most direct and idiomatic rendering, fitting the context of their prior negligence and subsequent response.
- source_word: וַיִּתְקַדְּשׁוּ
  chosen: consecrated themselves
  alternatives:
  - sanctified themselves
  - made themselves holy
  lexicon: HALOT
  rationale: The hitpael/t-form of קדשׁ here refers to ritual self-consecration for temple service. 'Consecrated themselves' communicates the cultic action in clear modern English better than the more archaic 'sanctified themselves.'
- source_word: וַיָּבִיאוּ עֹלוֹת
  chosen: they brought burnt offerings
  alternatives:
  - they brought up burnt offerings
  lexicon: HALOT
  rationale: The idiom means to bring sacrificial burnt offerings. 'Brought burnt offerings' is natural English and preserves the sacrificial terminology.
- source_word: בֵּית יְהוָה
  chosen: to the house of the LORD
  alternatives:
  - into the house of the LORD
  - to the temple of the LORD
  lexicon: HALOT
  rationale: בֵּית יְהוָה is literally 'house of YHWH.' Following doctrine, יְהוָה is rendered 'the LORD.' 'House of the LORD' preserves the formal temple designation better than the interpretive 'temple'.
