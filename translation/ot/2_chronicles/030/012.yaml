id: 2CH.30.12
reference: 2 Chronicles 30:12
source:
  edition: WLC
  text: גַּ֣ם בִּ/יהוּדָ֗ה הָֽיְתָה֙ יַ֣ד הָ/אֱלֹהִ֔ים לָ/תֵ֥ת לָ/הֶ֖ם לֵ֣ב אֶחָ֑ד
    לַ/עֲשׂ֞וֹת מִצְוַ֥ת הַ/מֶּ֛לֶךְ וְ/הַ/שָּׂרִ֖ים בִּ/דְבַ֥ר יְהוָֽה׃
translation:
  text: Also in Judah the hand of God was on them to give them one heart to carry
    out the command of the king and the officials, according to the word of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a united heart' for 'one heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Also
  alternatives:
  - Moreover
  - Even
  lexicon: HALOT
  rationale: Adds Judah to the preceding report; 'Also' is natural English and preserves
    the additive force without overstating emphasis.
- source_word: בִּיהוּדָה
  chosen: in Judah
  alternatives:
  - among Judah
  - in the land of Judah
  lexicon: HALOT
  rationale: The preposition ב with the place name is most naturally locative here.
- source_word: הָיְתָה יַד הָאֱלֹהִים
  chosen: the hand of God was on them
  alternatives:
  - the hand of God came upon them
  - God's hand was upon them
  lexicon: HALOT
  rationale: The idiom 'hand of God' denotes divine power or influence at work. 'Was
    on them' preserves the Hebrew image while remaining idiomatic in English.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: Although marked with the article in Hebrew, English normally omits it
    in this construction; the sense is the true God acting providentially.
- source_word: לָתֵת לָהֶם
  chosen: to give them
  alternatives:
  - to grant them
  lexicon: HALOT
  rationale: A straightforward infinitive of purpose following the idiom of divine
    action.
- source_word: לֵב אֶחָד
  chosen: one heart
  alternatives:
  - a united heart
  - one mind
  lexicon: HALOT
  rationale: Literally 'one heart.' This Hebrew expression conveys unified resolve.
    'One heart' preserves the metaphor; the more interpretive 'united heart' was not
    chosen for the main text to stay closer to the source.
- source_word: לַעֲשׂוֹת
  chosen: to carry out
  alternatives:
  - to do
  - to perform
  lexicon: HALOT
  rationale: In context of obeying a command, 'carry out' communicates enacted obedience
    in clear modern English better than the more wooden 'do.'
- source_word: מִצְוַת
  chosen: the command
  alternatives:
  - the commandment
  - the order
  lexicon: HALOT
  rationale: Singular construct with the following nouns; 'command' fits the royal-administrative
    context better than the more religiously loaded 'commandment.'
- source_word: הַמֶּלֶךְ וְהַשָּׂרִים
  chosen: the king and the officials
  alternatives:
  - the king and the princes
  - the king and the leaders
  lexicon: HALOT
  rationale: שָׂרִים refers to rulers/officials. 'Officials' is clear modern English
    and suits the administrative setting.
- source_word: בִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - by the word of the LORD
  - in accordance with the word of the LORD
  lexicon: HALOT
  rationale: This phrase explains that the king's and officials' command accorded
    with Yahweh's word. 'According to' best captures conformity rather than mere instrumentality.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per project doctrine, the default rendering of the divine name is 'the
    LORD,' following established reverential convention and the Septuagintal pattern.
