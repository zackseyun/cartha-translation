theological_decisions:
- issue: Nature of divine action in 'the hand of God was on them'
  chosen_reading: Render as a strong statement of God's active influence producing
    unity, without specifying a later doctrinal mechanism of grace beyond the text.
  alternative_readings:
  - A weaker providential sense such as 'God helped them'
  - A more deterministic paraphrase such as 'God caused them irresistibly'
  rationale: The Hebrew idiom clearly attributes the people's unified response to
    divine action. The translation preserves that theological claim while avoiding
    interpretive expansion into categories not stated in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
