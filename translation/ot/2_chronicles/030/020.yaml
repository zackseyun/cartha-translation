id: 2CH.30.20
reference: 2 Chronicles 30:20
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֤ע יְהוָה֙ אֶל יְחִזְקִיָּ֔הוּ וַ/יִּרְפָּ֖א אֶת הָ/עָֽם־־׃ס
translation:
  text: And Yahweh listened to Hezekiah and healed the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heard Hezekiah.' The Hebrew verb can mean 'hear' or 'listen/respond favorably' in this construction.
    reason: lexical_alternative
  - marker: b
    text: '''Healed'' may refer to the LORD''s removal of affliction or judgment connected with the people''s improper ritual state, not necessarily only to physical sickness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: listened
  alternatives:
  - heard
  lexicon: HALOT
  rationale: The verb שׁמע with אֶל commonly means not merely auditory hearing but listening/responding to someone. In context, Hezekiah has prayed on behalf of the people (vv. 18–19), so 'listened to' better conveys favorable response than the flatter 'heard'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard preposition after שׁמע in this construction; in English 'listened to' is the natural equivalent.
- source_word: יְחִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Personal names are transliterated by standard English convention.
- source_word: וַיִּרְפָּא
  chosen: healed
  alternatives:
  - restored
  - cured
  lexicon: HALOT
  rationale: רפא normally means 'heal.' In this context it likely refers to divine removal of the affliction/judgment associated with improper Passover participation, but 'healed' preserves the Hebrew image without over-interpreting.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: עם in this context refers to the gathered community of Israelites; 'the people' is the natural and sufficiently broad rendering.
