theological_decisions:
- issue: Nature of God's response in 'healed the people'
  chosen_reading: Retain the healing language as stated, without narrowing it to physical healing only.
  alternative_readings:
  - forgave the people
  - spared the people
  - restored the people
  rationale: The immediate context concerns those who ate the Passover without full ritual cleansing and Hezekiah's prayer for divine pardon (vv. 18–19). The text, however, uses רפא ('heal'), which may encompass removal of resulting affliction or judgment. To preserve theological tension and avoid importing a narrower doctrinal claim, the translation keeps 'healed.'
  doctrine_reference: Preserve theological tension rather than resolve it.
