id: 2CH.19.7
reference: 2 Chronicles 19:7
source:
  edition: WLC
  text: וְ/עַתָּ֕ה יְהִ֥י פַֽחַד יְהוָ֖ה עֲלֵי/כֶ֑ם שִׁמְר֣וּ וַ/עֲשׂ֔וּ כִּֽי אֵ֞ין עִם יְהוָ֣ה אֱלֹהֵ֗י/נוּ עַוְלָ֛ה וּ/מַשֹּׂ֥א פָנִ֖ים וּ/מִקַּח שֹֽׁחַד־־־־׃
translation:
  text: Now then, let the fear of Yahweh be upon you. Be careful and act, for with Yahweh our God there is no injustice, no partiality, and no taking of a bribe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''lifting up of faces,'' an idiom meaning showing favoritism or partiality.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now then
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Introduces an exhortation/conclusion. 'Now then' captures both the temporal and inferential force in natural English.
- source_word: יְהִי פַחַד יְהוָה עֲלֵיכֶם
  chosen: let the fear of the LORD be upon you
  alternatives:
  - may the fear of the LORD be on you
  - let the fear of the LORD rest on you
  lexicon: HALOT
  rationale: Jussive יְהִי is best rendered as an exhortatory 'let ... be.' פַחַד here denotes reverential fear/awe toward God, not mere terror. YHWH follows the project default 'the LORD'.
- source_word: שִׁמְרוּ
  chosen: Be careful
  alternatives:
  - Take heed
  - Keep watch
  lexicon: HALOT
  rationale: In this judicial context the imperative calls for careful attention and vigilance in conduct, not merely guarding in a literal sense. 'Be careful' is idiomatic modern English.
- source_word: וַעֲשׂוּ
  chosen: and act
  alternatives:
  - and do it
  - and do
  lexicon: HALOT
  rationale: The verb is broad ('do/make'), but in sequence with 'be careful' it urges concrete execution of judicial duty. 'Act' makes the implied object clear without over-paraphrasing.
- source_word: כִּי אֵין עִם יְהוָה אֱלֹהֵינוּ
  chosen: for with the LORD our God there is no
  alternatives:
  - for there is no ... with the LORD our God
  - because with the LORD our God there is no
  lexicon: HALOT
  rationale: Preserves the Hebrew construction עִם ('with') expressing what is not found in God's character or practice.
- source_word: עַוְלָה
  chosen: injustice
  alternatives:
  - wrongdoing
  - unrighteousness
  - perversion of justice
  lexicon: HALOT
  rationale: In a context about judges, 'injustice' best conveys moral and judicial wrong. 'Unrighteousness' is possible but less specific in English here.
- source_word: מַשֹּׂא פָנִים
  chosen: partiality
  alternatives:
  - favoritism
  - lifting up faces
  - respect of persons
  lexicon: HALOT
  rationale: This idiom refers to showing favor based on status or person. 'Partiality' is concise, accurate, and natural modern English.
- source_word: מִקַּח שֹׁחַד
  chosen: taking of a bribe
  alternatives:
  - accepting a bribe
  - receipt of a bribe
  lexicon: HALOT
  rationale: The nominal construction denotes the act of receiving a bribe. 'Taking of a bribe' stays close to the Hebrew while remaining readable.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
