id: 2CH.19.1
reference: 2 Chronicles 19:1
source:
  edition: WLC
  text: וַ֠/יָּשָׁב יְהוֹשָׁפָ֨ט מֶֽלֶךְ יְהוּדָ֧ה אֶל בֵּית֛/וֹ בְּ/שָׁל֖וֹם לִֽ/ירוּשָׁלִָֽם־־׃
translation:
  text: And Jehoshaphat king of Judah returned in peace to his house in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'returned safely to his house in Jerusalem.' The Hebrew phrase 'in peace'
      can also emphasize safe return.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - went back
  - came back
  lexicon: HALOT
  rationale: The waw-consecutive verb from שוב denotes returning. 'Returned' is the
    most natural and sufficiently formal English rendering in narrative context.
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - the king of Judah
  lexicon: HALOT
  rationale: 'Construct phrase identifying Jehoshaphat''s royal office. English apposition
    without the article reads naturally: ''Jehoshaphat king of Judah.'''
- source_word: אֶל בֵּיתוֹ
  chosen: to his house
  alternatives:
  - to his home
  lexicon: HALOT
  rationale: בית commonly means 'house' and can extend to household/home, but here
    the concrete destination is best preserved with 'house.'
- source_word: בְּשָׁלוֹם
  chosen: in peace
  alternatives:
  - safely
  - in safety
  lexicon: HALOT
  rationale: שָׁלוֹם includes peace, well-being, and safety. 'In peace' preserves
    the Hebrew idiom and allows the reader to hear both safe return and restored well-being.
- source_word: לִירוּשָׁלִָם
  chosen: in Jerusalem
  alternatives:
  - to Jerusalem
  lexicon: HALOT
  rationale: Although the preposition is לְ ('to'), in English with 'his house' the
    destination is most idiomatically expressed as 'to his house in Jerusalem' rather
    than the awkward 'to his house to Jerusalem.' This preserves the sense that his
    house is located in Jerusalem.
