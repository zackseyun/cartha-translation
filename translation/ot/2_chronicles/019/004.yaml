theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nature of Jehoshaphat's action in וַיְשִׁיבֵם אֶל יְהוָה
  chosen_reading: brought them back to the LORD
  alternative_readings:
  - converted them to the LORD
  - caused them to repent
  rationale: The Hebrew states that Jehoshaphat caused the people to return to the
    LORD; it does not specify a technical doctrine of conversion beyond covenantal
    return. The translation preserves that theological tension without importing later
    categories.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
