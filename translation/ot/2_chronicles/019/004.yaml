id: 2CH.19.4
reference: 2 Chronicles 19:4
source:
  edition: WLC
  text: וַ/יֵּ֥שֶׁב יְהוֹשָׁפָ֖ט בִּ/ירוּשָׁלִָ֑ם וַ/יָּ֜שָׁב וַ/יֵּצֵ֣א בָ/עָ֗ם מִ/בְּאֵ֥ר
    שֶׁ֨בַע֙ עַד הַ֣ר אֶפְרַ֔יִם וַ/יְשִׁיבֵ֕/ם אֶל יְהוָ֖ה אֱלֹהֵ֥י אֲבוֹתֵי/הֶֽםס־־׃
translation:
  text: So Jehoshaphat lived in Jerusalem, and he went out again among the people
    from Beersheba to the hill country of Ephraim and brought them back to the LORD,
    the God of their fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'returned and went out among the people'; the Hebrew repeats the verb
      'return' before 'went out,' likely indicating that Jehoshaphat resumed this
      activity after returning to Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: '''The LORD'' renders the divine name YHWH; alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: lived
  alternatives:
  - dwelt
  - resided
  - sat
  lexicon: HALOT
  rationale: From ישׁב, here indicating settled residence rather than the literal
    act of sitting. 'Lived' is natural modern English and fits the locative phrase
    'in Jerusalem.'
- source_word: וַיָּשָׁב
  chosen: went out again
  alternatives:
  - returned and went out
  - turned back and went out again
  lexicon: HALOT
  rationale: The sequence וַיָּשָׁב וַיֵּצֵא is idiomatic and conveys renewed action
    after his return to Jerusalem. Rendering the adverbial force as 'again' avoids
    awkward repetition while preserving the sense that he resumed his activity.
- source_word: וַיֵּצֵא בָעָם
  chosen: went out again among the people
  alternatives:
  - went out to the people
  - went out through the people
  lexicon: HALOT
  rationale: The preposition ב with עָם here is best taken in the sense of movement
    among or through the populace, not merely toward them. 'Among the people' communicates
    his personal circuit through the land.
- source_word: מִבְּאֵר שֶׁבַע עַד הַר אֶפְרַיִם
  chosen: from Beersheba to the hill country of Ephraim
  alternatives:
  - from Beer-sheba to the mountains of Ephraim
  - from Beersheba as far as the hill country of Ephraim
  lexicon: HALOT
  rationale: A standard merism for the extent of Judah's territory. הַר אֶפְרַיִם
    refers to the hill country/mountains region; 'hill country' is idiomatic English
    for the geographic area.
- source_word: וַיְשִׁיבֵם
  chosen: brought them back
  alternatives:
  - turned them back
  - restored them
  lexicon: HALOT
  rationale: Hiphil of שוב with object suffix means to cause them to return. 'Brought
    them back' is clear, active, and fits the spiritual sense of returning the people
    to covenant fidelity.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD.' The preposition marks direction toward renewed allegiance and worship.
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  chosen: the God of their fathers
  alternatives:
  - their fathers' God
  - the God of their ancestors
  lexicon: HALOT
  rationale: This covenantal expression links the people's return to ancestral faith.
    'The God of their fathers' preserves the formal biblical idiom and the masculine
    plural in the source.
