id: 2CH.19.5
reference: 2 Chronicles 19:5
source:
  edition: WLC
  text: וַ/יַּעֲמֵ֨ד שֹֽׁפְטִ֜ים בָּ/אָ֗רֶץ בְּ/כָל עָרֵ֧י יְהוּדָ֛ה הַ/בְּצֻר֖וֹת
    לְ/עִ֥יר וָ/עִֽיר־׃
translation:
  text: And he appointed judges in the land, in all the fortified cities of Judah,
    city by city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'throughout the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֵד
  chosen: appointed
  alternatives:
  - stationed
  - set up
  - caused to stand
  lexicon: HALOT
  rationale: The Hiphil of עמד here means to set or appoint persons into office, not
    merely to make them stand physically. 'Appointed' is natural English and fits
    the administrative context.
- source_word: שֹׁפְטִים
  chosen: judges
  lexicon: HALOT
  rationale: The noun plainly refers to judicial officials. 'Judges' is the standard
    and contextually precise rendering.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - throughout the land
  lexicon: HALOT
  rationale: The phrase locates the appointments within the territory of Judah. 'In
    the land' is formally closer; the following phrase already conveys distributive
    scope.
- source_word: בְּכָל עָרֵי יְהוּדָה
  chosen: in all the cities of Judah
  alternatives:
  - throughout all the cities of Judah
  lexicon: HALOT
  rationale: This specifies the extent of the judicial appointments. 'In all the cities
    of Judah' preserves the prepositional structure and totality.
- source_word: הַבְּצֻרוֹת
  chosen: fortified
  alternatives:
  - fortress
  - walled
  lexicon: HALOT
  rationale: The adjective describes the cities as fortified/defended. 'Fortified
    cities' is idiomatic English and reflects the Hebrew well.
- source_word: לְעִיר וָעִיר
  chosen: city by city
  alternatives:
  - for each city
  - in every city
  lexicon: HALOT
  rationale: This distributive idiom emphasizes individual placement in each city.
    'City by city' preserves the repetitive force succinctly and naturally.
