theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of 'the wicked' / 'those who hate the LORD'
  chosen_reading: generic moral categories rather than naming Ahab explicitly in the wording
  alternative_readings:
  - a wicked man
  - the wicked man (i.e., Ahab)
  rationale: Although the historical referent is Jehoshaphat's alliance with Ahab, the Hebrew uses broader moral categories in the rebuke. The translation preserves that theological force rather than narrowing it to a proper-name paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Never paraphrase beyond what the source text warrants'
