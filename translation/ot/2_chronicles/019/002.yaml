id: 2CH.19.2
reference: 2 Chronicles 19:2
source:
  edition: WLC
  text: וַ/יֵּצֵ֣א אֶל פָּנָ֗י/ו יֵה֣וּא בֶן חֲנָ֘נִי֮ הַ/חֹזֶה֒ וַ/יֹּ֨אמֶר֙ אֶל הַ/מֶּ֣לֶךְ יְהוֹשָׁפָ֔ט הֲ/לָ/רָשָׁ֣ע לַ/עְזֹ֔ר וּ/לְ/שֹׂנְאֵ֥י יְהוָ֖ה תֶּאֱהָ֑ב וּ/בָ/זֹאת֙ עָלֶ֣י/ךָ קֶּ֔צֶף מִ/לִּ/פְנֵ֖י יְהוָֽה־־־׃
translation:
  text: Jehu son of Hanani the seer went out to meet him and said to King Jehoshaphat, “Should you help the wicked and love those who hate Yahweh? Because of this, wrath is upon you from the presence of Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'went out before him.' The Hebrew idiom means 'went out to meet him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the presence of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא אֶל־פָּנָיו
  chosen: went out to meet him
  alternatives:
  - went out before him
  - came out to his face/presence
  lexicon: HALOT
  rationale: The idiom אֶל־פָּנָיו literally involves 'to/toward his face/presence,' but in context means going out to encounter or meet someone. 'Went out to meet him' is natural English and preserves the narrative action without wooden literalism.
- source_word: הַחֹזֶה
  chosen: the seer
  alternatives:
  - the prophet
  lexicon: HALOT
  rationale: חֹזֶה is a specific prophetic title, often distinguished from but overlapping with נָבִיא. 'Seer' preserves the lexical nuance and traditional distinction better than the more generalized 'prophet'.
- source_word: הֲלָרָשָׁע לַעְזֹר
  chosen: Should you help the wicked
  alternatives:
  - Is it for the wicked that you should help?
  - Should you help a wicked man?
  lexicon: HALOT
  rationale: 'The interrogative plus infinitive expresses rebuke: ''Should you help...?'' The adjective with article can be rendered generically as ''the wicked'' rather than singular ''a wicked man''; this fits the representative force and avoids over-specifying beyond the Hebrew.'
- source_word: וּלְשֹׂנְאֵי יְהוָה תֶּאֱהָב
  chosen: and love those who hate the LORD
  alternatives:
  - and do you love the haters of the LORD
  - and love the LORD's enemies
  lexicon: HALOT
  rationale: The participle שֹׂנְאֵי means 'those who hate.' Rendering it explicitly preserves the verbal force better than the more interpretive 'enemies.' 'The LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וּבָזֹאת
  chosen: Because of this
  alternatives:
  - And because of this
  - For this reason
  - In this matter
  lexicon: HALOT
  rationale: The phrase points back to Jehoshaphat's conduct as the reason for the following judgment. 'Because of this' makes the causal force clear in idiomatic English.
- source_word: עָלֶיךָ קֶּצֶף
  chosen: wrath is upon you
  alternatives:
  - there is wrath against you
  - indignation is upon you
  lexicon: HALOT
  rationale: קצף denotes divine wrath/anger. 'Wrath is upon you' preserves the concrete Hebrew construction עָלֶיךָ while remaining readable.
- source_word: מִלִּפְנֵי יְהוָה
  chosen: from before the LORD
  alternatives:
  - from the presence of the LORD
  - from the LORD
  lexicon: HALOT
  rationale: Literally 'from before the LORD,' an idiom indicating source from God's presence. Retaining 'from before' preserves the Hebrew imagery and solemnity better than the flatter 'from the LORD,' while still being understandable.
