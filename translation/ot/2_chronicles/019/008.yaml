theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton and standard
    English Bible convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: How specifically to render לְמִשְׁפַּט יְהוָה
  chosen_reading: the judgment of the LORD
  alternative_readings:
  - the LORD's justice
  - judgment for the LORD
  rationale: The phrase can denote cases pertaining to divine law or judgments rendered
    under divine authority. The chosen rendering preserves the theological and grammatical
    breadth without narrowing it to either cultic or purely civil jurisdiction.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological
    tension rather than resolve it'
