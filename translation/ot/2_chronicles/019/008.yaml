id: 2CH.19.8
reference: 2 Chronicles 19:8
source:
  edition: WLC
  text: וְ/גַ֣ם בִּ֠/ירוּשָׁלִַם הֶעֱמִ֨יד יְהוֹשָׁפָ֜ט מִן הַ/לְוִיִּ֣ם וְ/הַ/כֹּהֲנִ֗ים
    וּ/מֵ/רָאשֵׁ֤י הָ/אָבוֹת֙ לְ/יִשְׂרָאֵ֔ל לְ/מִשְׁפַּ֥ט יְהוָ֖ה וְ/לָ/רִ֑יב וַ/יָּשֻׁ֖בוּ
    יְרוּשָׁלִָֽם־׃
translation:
  text: Also in Jerusalem, Jehoshaphat appointed some of the Levites, the priests,
    and the heads of the fathers’ houses of Israel for the judgment of the LORD and
    for disputes; and they returned to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the LORD’s judgment,' that is, for cases governed by the LORD’s
      law.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''and they returned to Jerusalem.'' Some understand the text differently,
      such as ''and they sat/dwelt in Jerusalem,'' because the received wording is
      somewhat abrupt in context.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  chosen: Also
  alternatives:
  - And also
  - Moreover
  lexicon: HALOT
  rationale: Introduces an additional action in the narrative. 'Also' is concise and
    natural in English while preserving the additive force.
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative prepositional phrase.
- source_word: הֶעֱמִיד
  chosen: appointed
  alternatives:
  - stationed
  - set up
  - established
  lexicon: HALOT
  rationale: In this administrative/judicial context, the Hiphil of עמד conveys causing
    persons to stand in office or position. 'Appointed' best fits the sense of assigning
    officials.
- source_word: מִן הַלְוִיִּם וְהַכֹּהֲנִים וּמֵרָאשֵׁי הָאָבוֹת לְיִשְׂרָאֵל
  chosen: some of the Levites, the priests, and the heads of the fathers’ houses of
    Israel
  alternatives:
  - from the Levites and the priests and from the heads of the fathers' houses of
    Israel
  - some of the Levites and priests and some of the heads of the ancestral houses
    of Israel
  lexicon: HALOT
  rationale: מִן/מֵ marks selection from these groups, so 'some of' makes the partitive
    sense explicit in idiomatic English. רָאשֵׁי הָאָבוֹת is a clan/family-head expression;
    'fathers’ houses' preserves the Hebrew social structure more formally than flattening
    to 'families'.
- source_word: לְמִשְׁפַּט יְהוָה
  chosen: for the judgment of the LORD
  alternatives:
  - for the LORD's judgment
  - for judgment on behalf of the LORD
  lexicon: HALOT
  rationale: This likely refers to judicial matters understood as belonging to or
    governed by the LORD. 'The judgment of the LORD' preserves the genitival ambiguity
    better than over-interpreting it.
- source_word: וְלָרִיב
  chosen: and for disputes
  alternatives:
  - and for legal cases
  - and for controversy
  - and for litigation
  lexicon: HALOT
  rationale: רִיב in judicial contexts denotes a dispute, case, or controversy. 'Disputes'
    is readable modern English and suits the legal setting.
- source_word: וַיָּשֻׁבוּ יְרוּשָׁלִָם
  chosen: and they returned to Jerusalem
  alternatives:
  - and they sat in Jerusalem
  - and they resumed in Jerusalem
  lexicon: HALOT
  rationale: The consonantal text yields 'and they returned to Jerusalem.' This is
    somewhat abrupt after the opening locative phrase, but it is the plain sense of
    שוב. Because some interpreters understand a different sense or emend the text,
    the alternative is preserved in a footnote rather than adopted in the main text.
