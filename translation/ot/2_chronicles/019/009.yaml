theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of אֱמוּנָה in a judicial exhortation
  chosen_reading: faithfulness
  alternative_readings:
  - integrity
  - faith
  rationale: In this context Jehoshaphat is instructing judges how to carry out their duties. The term therefore points to faithful, trustworthy conduct rather than the more abstract concept of 'faith.' This preserves the ethical force of the Hebrew without importing later doctrinal associations.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
