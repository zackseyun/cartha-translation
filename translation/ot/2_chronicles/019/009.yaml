id: 2CH.19.9
reference: 2 Chronicles 19:9
source:
  edition: WLC
  text: וַ/יְצַ֥ו עֲלֵי/הֶ֖ם לֵ/אמֹ֑ר כֹּ֤ה תַעֲשׂוּ/ן֙ בְּ/יִרְאַ֣ת יְהוָ֔ה בֶּ/אֱמוּנָ֖ה וּ/בְ/לֵבָ֥ב שָׁלֵֽם׃
translation:
  text: And he commanded them, saying, “Thus you shall act in the fear of Yahweh, in faithfulness and with a whole heart.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Thus you shall do.”
    reason: lexical_alternative
  - marker: b
    text: “Fear of the LORD” can also be expressed as “reverence for the LORD.”
    reason: lexical_alternative
  - marker: c
    text: Or “with integrity” or “faithfully.”
    reason: lexical_alternative
  - marker: d
    text: Or “with an undivided heart.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: he commanded
  alternatives:
  - he charged
  - he ordered
  lexicon: HALOT
  rationale: The verb צוה commonly denotes giving a command or charge. 'Commanded' is the most straightforward modern rendering and fits the judicial context.
- source_word: עֲלֵיהֶם
  chosen: them
  alternatives:
  - upon them
  - over them
  lexicon: HALOT
  rationale: With צוה, על marks the indirect object of the command. Idiomatic English expresses this simply as 'commanded them' rather than the more literal 'commanded upon them.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing direct speech; 'saying' preserves the Hebrew structure naturally.
- source_word: כֹּה תַעֲשׂוּן
  chosen: Thus you shall act
  alternatives:
  - Thus you shall do
  - This is what you shall do
  lexicon: HALOT
  rationale: עשה is broad ('do, act'). 'Act' fits the ethical/judicial instruction here, while 'thus' preserves כֹּה. 'You shall' reflects the directive force without over-paraphrasing.
- source_word: בְּיִרְאַת יְהוָה
  chosen: in the fear of the LORD
  alternatives:
  - with the fear of the LORD
  - in reverence for the LORD
  lexicon: HALOT
  rationale: יראה here denotes reverent fear before God. 'Fear of the LORD' preserves the established biblical expression and its theological weight. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בֶּאֱמוּנָה
  chosen: with faithfulness
  alternatives:
  - faithfully
  - in faithfulness
  - with integrity
  lexicon: HALOT
  rationale: אֱמוּנָה in this context refers to reliability, fidelity, or trustworthiness in carrying out judgment, not primarily inward belief. 'With faithfulness' best captures the noun form and ethical sense.
- source_word: וּבְלֵבָב שָׁלֵם
  chosen: with a whole heart
  alternatives:
  - with a complete heart
  - with an undivided heart
  - with a blameless heart
  lexicon: HALOT
  rationale: לֵבָב שָׁלֵם denotes wholeheartedness, completeness of inner devotion, and integrity. 'With a whole heart' is natural English and preserves the Hebrew imagery without narrowing it merely to moral blamelessness.
