  - from your kindred
  rationale: The text uses kinship language for members of Judah's covenant community. Following the gender-accurate policy, the masculine plural is preserved as 'brothers' rather than neutralized, while the broader communal sense remains clear from context.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
