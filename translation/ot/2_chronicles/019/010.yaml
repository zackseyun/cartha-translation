id: 2CH.19.10
reference: 2 Chronicles 19:10
source:
  edition: WLC
  text: וְ/כָל רִיב֩ אֲשֶׁר יָב֨וֹא עֲלֵי/כֶ֜ם מֵ/אֲחֵי/כֶ֣ם הַ/יֹּשְׁבִ֣ים בְּ/עָרֵי/הֶ֗ם בֵּֽין דָּ֣ם לְ/דָם֮ בֵּין תּוֹרָ֣ה לְ/מִצְוָה֮ לְ/חֻקִּ֣ים וּ/לְ/מִשְׁפָּטִים֒ וְ/הִזְהַרְתֶּ֣ם אֹתָ֔/ם וְ/לֹ֤א יֶאְשְׁמוּ֙ לַ/יהוָ֔ה וְ/הָֽיָה קֶ֥צֶף עֲלֵי/כֶ֖ם וְ/עַל אֲחֵי/כֶ֑ם כֹּ֥ה תַעֲשׂ֖וּ/ן וְ/לֹ֥א תֶאְשָֽׁמוּ־־׀־׀־־־׃
translation:
  text: And every dispute that comes before you from your brothers who live in their cities—whether between blood and blood, between law and commandment, statutes and judgments—you shall warn them, so that they may not incur guilt before Yahweh; otherwise wrath will come upon you and upon your brothers. Do this, and you will not incur guilt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'between blood and blood,' likely referring to cases involving bloodshed or homicide.
    reason: lexical_alternative
lexical_decisions:
- source_word: רִיב
  chosen: dispute
  alternatives:
  - case
  - controversy
  - lawsuit
  lexicon: HALOT
  rationale: The term denotes a legal dispute or contention. 'Dispute' is natural modern English and fits the judicial context without over-specifying a formal lawsuit.
- source_word: יָבֹוא עֲלֵיכֶם
  chosen: comes before you
  alternatives:
  - comes upon you
  - is brought to you
  lexicon: HALOT
  rationale: In judicial context, the idiom means a case coming to the attention or jurisdiction of the judges. 'Comes before you' is idiomatic English for legal proceedings.
- source_word: מֵאֲחֵיכֶם
  chosen: from your brothers
  alternatives:
  - from your kinsmen
  - from your fellow Israelites
  lexicon: HALOT
  rationale: The Hebrew literally says 'your brothers.' Per gender-accurate philosophy, the familial/covenantal term is retained rather than neutralized, while context indicates fellow members of the covenant community.
- source_word: הַיֹּשְׁבִים בְּעָרֵיהֶם
  chosen: who live in their cities
  alternatives:
  - who dwell in their cities
  lexicon: HALOT
  rationale: A straightforward rendering of the participial phrase; 'live' is more readable modern English than 'dwell.'
- source_word: בֵּין דָּם לְדָם
  chosen: between blood and blood
  alternatives:
  - between one kind of bloodshed and another
  - in cases involving bloodshed
  lexicon: HALOT
  rationale: The Hebrew expression is terse and technical, likely referring to cases involving homicide or bloodguilt. The literal form is preserved in the main text for auditability, with a clarifying alternative preserved in a footnote.
- source_word: בֵּין תּוֹרָה לְמִצְוָה לְחֻקִּים וּלְמִשְׁפָּטִים
  chosen: between law and commandment, statutes and judgments
  alternatives:
  - between instruction and commandment, statutes and rules
  - between law and command, decrees and ordinances
  lexicon: HALOT
  rationale: The series names categories of legal instruction. 'Law' for תּוֹרָה is conventional and suitable here; 'commandment,' 'statutes,' and 'judgments' preserve the distinctions without flattening them into generic 'laws.'
- source_word: וְהִזְהַרְתֶּם אֹתָם
  chosen: you shall warn them
  alternatives:
  - you shall instruct them
  - you shall admonish them
  lexicon: HALOT
  rationale: The Hiphil of זהר here means to warn or admonish so as to prevent wrongdoing. 'Warn' best fits the following purpose clause about avoiding guilt.
- source_word: יֶאְשְׁמוּ לַיהוָה
  chosen: they may not incur guilt before the LORD
  alternatives:
  - they may not be guilty against the LORD
  - they may not become guilty to the LORD
  lexicon: HALOT
  rationale: The verb אשׁם denotes becoming guilty or bearing guilt. 'Incur guilt before the LORD' communicates both culpability and divine accountability in idiomatic English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: קֶצֶף
  chosen: wrath
  alternatives:
  - anger
  - indignation
  lexicon: HALOT
  rationale: The noun denotes divine wrath or anger. 'Wrath' preserves the gravity of covenantal judgment better than the milder 'anger.'
- source_word: כֹּה תַעֲשׂוּן
  chosen: Do this
  alternatives:
  - Thus you shall act
  - You shall do thus
  lexicon: HALOT
  rationale: A concise imperative summary in natural English. It points back to the required judicial warning and instruction.
- source_word: וְלֹא תֶאְשָׁמוּ
  chosen: you will not incur guilt
  alternatives:
  - you will not be guilty
  - you will not become guilty
  lexicon: HALOT
  rationale: For consistency with the earlier use of אשׁם in the verse, the same core gloss is retained.
