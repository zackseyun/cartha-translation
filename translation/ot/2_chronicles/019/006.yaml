id: 2CH.19.6
reference: 2 Chronicles 19:6
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֶל הַ/שֹּֽׁפְטִ֗ים רְאוּ֙ מָֽה אַתֶּ֣ם עֹשִׂ֔ים כִּ֣י לֹ֧א לְ/אָדָ֛ם
    תִּשְׁפְּט֖וּ כִּ֣י לַ/יהוָ֑ה וְ/עִמָּ/כֶ֖ם בִּ/דְבַ֥ר מִשְׁפָּֽט־־׃
translation:
  text: And he said to the judges, “See what you are doing, for you are not judging
    for man, but for the LORD, and he is with you in the matter of judgment.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for humankind.' Hebrew 'for man' uses the singular אָדָם as a generic
      contrast to the LORD.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the matter of justice.' The Hebrew phrase can refer either to the
      act of judging or to judicial matters generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֹּׁפְטִים
  chosen: the judges
  alternatives:
  - the officials
  - those judging
  lexicon: HALOT
  rationale: The participial form from שׁפט functions substantivally here, referring
    to appointed judicial officers. 'Judges' is the most natural and contextually
    precise English rendering.
- source_word: רְאוּ
  chosen: See
  alternatives:
  - Look
  - Consider
  lexicon: HALOT
  rationale: An imperative calling for careful attention. 'See' is concise and idiomatic
    in direct speech, preserving the force of the Hebrew command.
- source_word: מָה אַתֶּם עֹשִׂים
  chosen: what you are doing
  alternatives:
  - what you do
  - what you are about
  lexicon: HALOT
  rationale: This phrase urges self-examination of their judicial conduct. The progressive
    English form reads naturally and conveys ongoing practice.
- source_word: לְאָדָם
  chosen: for man
  alternatives:
  - for a man
  - for humans
  - for humankind
  lexicon: HALOT
  rationale: Following the doctrine's gender-accurate principle for אָדָם, the singular
    contrasts human beings with the LORD. 'For man' preserves the Hebrew singular
    and rhetorical contrast better than a pluralized rendering.
- source_word: תִּשְׁפְּטוּ
  chosen: you are judging
  alternatives:
  - you judge
  - you render judgment
  lexicon: HALOT
  rationale: The verb from שׁפט denotes exercising judicial judgment. 'You are judging'
    fits the immediate exhortational context and pairs well with 'what you are doing.'
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - for Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition marks that
    their judicial service is accountable to and carried out on behalf of the LORD
    rather than merely human interests.
- source_word: וְעִמָּכֶם
  chosen: and he is with you
  alternatives:
  - and with you is he
  - and he is with you all
  lexicon: HALOT
  rationale: The Hebrew prepositional phrase with pronominal suffix implies divine
    presence accompanying the judges. Supplying 'he is' is necessary in English and
    the antecedent is naturally the LORD from the prior clause.
- source_word: בִּדְבַר מִשְׁפָּט
  chosen: in the matter of judgment
  alternatives:
  - in the matter of justice
  - in giving judgment
  - in the case of judgment
  lexicon: HALOT
  rationale: דבר here means 'matter/affair/case,' and משפט denotes judicial decision
    or justice. 'In the matter of judgment' preserves the legal register without over-paraphrasing.
