theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of יהוה as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering אָדָם in a generic singular contrast
  chosen_reading: man
  alternative_readings:
  - humankind
  - humans
  rationale: The verse contrasts human judgment with judgment for the LORD. The singular
    generic 'man' best reflects the Hebrew singular and follows the gender-accurate
    rather than gender-neutral policy.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם
    *adam*'
