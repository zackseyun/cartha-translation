id: 2CH.19.3
reference: 2 Chronicles 19:3
source:
  edition: WLC
  text: אֲבָ֕ל דְּבָרִ֥ים טוֹבִ֖ים נִמְצְא֣וּ עִמָּ֑/ךְ כִּֽי בִעַ֤רְתָּ הָ/אֲשֵׁרוֹת֙
    מִן הָ/אָ֔רֶץ וַ/הֲכִינ֥וֹתָ לְבָבְ/ךָ֖ לִ/דְרֹ֥שׁ הָֽ/אֱלֹהִֽים־־׃
translation:
  text: Nevertheless, good things have been found in you, because you have cleared
    the Asherah poles out of the land and have set your heart to seek God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have prepared your heart to seek God.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Asheroth'; that is, cult objects associated with the goddess
      Asherah.
    reason: cultural_note
lexical_decisions:
- source_word: אֲבָל
  chosen: Nevertheless
  alternatives:
  - But
  - However
  lexicon: HALOT
  rationale: Marks a concessive contrast with the preceding rebuke; 'Nevertheless'
    preserves the rhetorical turn with suitable gravity.
- source_word: דְּבָרִים טוֹבִים
  chosen: good things
  alternatives:
  - good deeds
  - good matters
  lexicon: HALOT
  rationale: The plural noun plus adjective is broad; 'good things' preserves the
    general commendation without narrowing it only to actions.
- source_word: נִמְצְאוּ עִמָּךְ
  chosen: have been found in you
  alternatives:
  - are found in you
  - have been found with you
  lexicon: HALOT
  rationale: The passive construction indicates that commendable qualities or actions
    are discovered in Jehoshaphat. 'In you' is idiomatic in English and reflects the
    evaluative sense better than the more wooden 'with you.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the grounds for the positive assessment. 'Because' is clearer
    in modern English than 'for' while preserving the causal force.
- source_word: בִעַרְתָּ
  chosen: have cleared
  alternatives:
  - have removed
  - have burned away
  - have purged
  lexicon: HALOT
  rationale: The verb can denote burning away or removing. In this context of eliminating
    cult objects from the land, 'cleared' communicates decisive removal without overcommitting
    to the method.
- source_word: הָאֲשֵׁרוֹת
  chosen: the Asherah poles
  alternatives:
  - the Asherim
  - the Asherah images
  lexicon: HALOT
  rationale: Refers to cultic objects associated with Asherah worship. 'Asherah poles'
    is a widely understood rendering that conveys these were idolatrous cult symbols,
    not merely abstract worship practices.
- source_word: מִן הָאָרֶץ
  chosen: out of the land
  alternatives:
  - from the land
  lexicon: HALOT
  rationale: '''Out of the land'' is natural English and preserves the sense of removal
    from the territory/jurisdiction.'
- source_word: וַהֲכִינוֹתָ לְבָבְךָ
  chosen: have set your heart
  alternatives:
  - have prepared your heart
  - have established your heart
  lexicon: HALOT
  rationale: Literally 'prepared your heart.' 'Set your heart' is a natural English
    idiom that preserves the volitional and intentional sense of inner resolve.
- source_word: לִדְרֹשׁ הָאֱלֹהִים
  chosen: to seek God
  alternatives:
  - to seek after God
  - to inquire of God
  lexicon: HALOT
  rationale: In Chronicles, 'seek God' is a key covenantal expression for turning
    to and pursuing him. 'Seek God' preserves this theological motif better than the
    narrower 'inquire of God.'
