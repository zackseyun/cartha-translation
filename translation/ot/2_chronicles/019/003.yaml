theological_decisions:
- issue: Rendering of אֲשֵׁרוֹת
  chosen_reading: Asherah poles
  alternative_readings:
  - Asherim
  - Asherah images
  rationale: The term denotes cultic objects tied to illicit worship. Translating
    rather than merely transliterating helps modern readers grasp the idolatrous reference
    while retaining the proper-name element 'Asherah.'
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; consistency of key terms, or documented exception.'
- issue: Rendering of לִדְרֹשׁ הָאֱלֹהִים
  chosen_reading: seek God
  alternative_readings:
  - inquire of God
  rationale: Chronicles often uses this phrase for covenantal devotion and orientation
    toward God, not merely requesting information. 'Seek God' preserves that broader
    theological force and avoids flattening the spiritual dimension.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
