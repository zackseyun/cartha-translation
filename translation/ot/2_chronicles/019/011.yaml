theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD.' This is a translation-policy
    decision rather than a verse-specific theological innovation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether כֹהֵן הָרֹאשׁ should be rendered with the more technical 'high priest'
  chosen_reading: chief priest
  alternative_readings:
  - high priest
  rationale: The Hebrew literally means 'the head/chief priest.' In this administrative
    setting, 'chief priest' avoids importing a more technical institutional sense
    unless context requires it. The verse emphasizes jurisdictional oversight more
    than cultic rank terminology.
