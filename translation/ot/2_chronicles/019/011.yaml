id: 2CH.19.11
reference: 2 Chronicles 19:11
source:
  edition: WLC
  text: וְ/הִנֵּ֡ה אֲמַרְיָ֣הוּ כֹהֵן֩ הָ/רֹ֨אשׁ עֲלֵי/כֶ֜ם לְ/כֹ֣ל דְּבַר יְהוָ֗ה
    וּ/זְבַדְיָ֨הוּ בֶן יִשְׁמָעֵ֜אל הַ/נָּגִ֤יד לְ/בֵית יְהוּדָה֙ לְ/כֹ֣ל דְּבַר
    הַ/מֶּ֔לֶךְ וְ/שֹׁטְרִ֥ים הַ/לְוִיִּ֖ם לִ/פְנֵי/כֶ֑ם חִזְק֣וּ וַ/עֲשׂ֔וּ וִ/יהִ֥י
    יְהוָ֖ה עִם הַ/טּֽוֹב־־־־־׃פ
translation:
  text: And behold, Amaryahu the chief priest is over you for every matter of the
    LORD, and Zebadyahu son of Ishmael, the ruler of the house of Judah, for every
    matter of the king; and the Levites will serve as officers before you. Be strong
    and act, and may the LORD be with the good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the high priest' for 'the chief priest.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD be with the one who is good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - Now behold
  - See
  lexicon: HALOT
  rationale: Retains the discourse-marking force of drawing attention to the arrangement
    being described. 'Behold' is slightly formal but still readable and preserves
    the emphatic introduction better than omitting it.
- source_word: כֹהֵן הָרֹאשׁ
  chosen: the chief priest
  alternatives:
  - the head priest
  - the high priest
  lexicon: HALOT
  rationale: Literally 'the head priest.' 'Chief priest' is a natural English rendering
    for the leading priest in this administrative context. 'High priest' is possible
    but may imply a more technical office than the Chronicler necessarily intends
    here, so it is preserved as an alternative rather than chosen.
- source_word: עֲלֵיכֶם
  chosen: is over you
  alternatives:
  - is in charge of you
  - is appointed over you
  lexicon: HALOT
  rationale: Conveys supervisory authority in a judicial/administrative setting. The
    supplied copula makes good English sense from the nominal clause.
- source_word: לְכֹל דְּבַר יְהוָה
  chosen: for every matter of the LORD
  alternatives:
  - for every matter pertaining to the LORD
  - for every case of the LORD
  lexicon: HALOT
  rationale: דָּבָר here denotes a matter, case, or affair. 'Matter of the LORD' preserves
    the broad scope, likely referring to religious/judicial matters under divine law,
    without over-specifying to 'case' alone.
- source_word: הַנָּגִיד לְבֵית יְהוּדָה
  chosen: the ruler of the house of Judah
  alternatives:
  - the leader of the house of Judah
  - the governor of the house of Judah
  lexicon: HALOT
  rationale: נָגִיד commonly denotes a leader, ruler, or prince. 'Ruler' fits the
    administrative context. 'House of Judah' is kept formally rather than flattened
    to 'Judah' alone, since the Hebrew includes בֵּית.
- source_word: לְכֹל דְּבַר הַמֶּלֶךְ
  chosen: for every matter of the king
  alternatives:
  - for every matter pertaining to the king
  - for every royal matter
  lexicon: HALOT
  rationale: Parallel to 'every matter of the LORD,' preserving the distinction between
    religious and royal/judicial spheres.
- source_word: וְשֹׁטְרִים הַלְוִיִּם לִפְנֵיכֶם
  chosen: and the Levites will serve as officers before you
  alternatives:
  - and the Levites are officers before you
  - and Levite officials are at your disposal
  lexicon: HALOT
  rationale: שֹׁטְרִים are officials/officers, often administrative functionaries.
    'Will serve as officers' makes the verbless clause idiomatic in English and captures
    their supportive role. 'Before you' is retained rather than paraphrased away,
    indicating attendance or service in support of the judges.
- source_word: חִזְקוּ וַעֲשׂוּ
  chosen: Be strong and act
  alternatives:
  - Be strong and do it
  - Take courage and act
  lexicon: HALOT
  rationale: A concise exhortation. 'Act' renders עשה idiomatically in context, where
    the sense is to carry out the assigned duty, not merely 'do' in an abstract sense.
- source_word: וִיהִי יְהוָה עִם הַטּוֹב
  chosen: and may the LORD be with the good
  alternatives:
  - and may the LORD be with him who is good
  - and the LORD will be with the good
  lexicon: HALOT
  rationale: The jussive sense of וִיהִי is best rendered 'may ... be.' הַטּוֹב can
    be taken generically, 'the good' or 'the one who does good.' The concise generic
    expression fits the Hebrew and the closing blessing. 'the LORD' follows project
    policy for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name, preserving
    reverential convention and consistency.
