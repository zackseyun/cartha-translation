id: 2CH.32.17
reference: 2 Chronicles 32:17
source:
  edition: WLC
  text: וּ/סְפָרִ֣ים כָּתַ֔ב לְ/חָרֵ֕ף לַ/יהוָ֖ה אֱלֹהֵ֣י יִשְׂרָאֵ֑ל וְ/לֵֽ/אמֹ֨ר עָלָ֜י/ו לֵ/אמֹ֗ר כֵּֽ/אלֹהֵ֞י גּוֹיֵ֤ הָ/אֲרָצוֹת֙ אֲשֶׁ֨ר לֹא הִצִּ֤ילוּ עַמָּ/ם֙ מִ/יָּדִ֔/י כֵּ֣ן לֹֽא יַצִּ֞יל אֱלֹהֵ֧י יְחִזְקִיָּ֛הוּ עַמּ֖/וֹ מִ/יָּדִֽ/י־־׃
translation:
  text: He also wrote letters to mock Yahweh, the God of Israel, and to speak against him, saying, “Just as the gods of the nations of the lands have not delivered their people from my hand, so the God of Hezekiah will not deliver his people from my hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to reproach' / 'to defy' the LORD. The Hebrew verb carries the sense of reviling or insulting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּסְפָרִים כָּתַב
  chosen: He also wrote letters
  alternatives:
  - And he wrote letters
  - He wrote documents
  lexicon: HALOT
  rationale: סְפָרִים refers to written letters/documents; in this narrative context 'letters' is the most natural English rendering. The prefixed ו conveys continuation, captured idiomatically by 'also'.
- source_word: לְחָרֵף
  chosen: to mock
  alternatives:
  - to reproach
  - to defy
  - to taunt
  lexicon: HALOT
  rationale: The verb חרף carries the sense of reviling or insulting. 'Mock' is readable modern English and fits the hostile rhetorical action directed toward the LORD; 'reproach' is possible but less natural here.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct chain straightforwardly identifies the LORD as Israel's God.
- source_word: וְלֵאמֹר עָלָיו
  chosen: and to speak against him
  alternatives:
  - and to say against him
  - and to speak concerning him
  lexicon: HALOT
  rationale: The phrase introduces hostile speech directed against the LORD. 'Speak against him' captures the adversative force of עַל in context better than a wooden 'say upon him.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard quotation introducer in English narrative.
- source_word: כֵּאלֹהֵי גּוֹיֵי הָאֲרָצוֹת
  chosen: Just as the gods of the nations of the lands
  alternatives:
  - Like the gods of the peoples of the lands
  - As the gods of the nations of the countries
  lexicon: HALOT
  rationale: כֵּ introduces comparison, best rendered 'just as.' גּוֹיֵי הָאֲרָצוֹת is a plural construct meaning the nations/peoples of the lands; 'nations of the lands' preserves the Hebrew structure without over-smoothing.
- source_word: אֲשֶׁר לֹא הִצִּילוּ עַמָּם
  chosen: have not delivered their people
  alternatives:
  - did not rescue their people
  - have not saved their people
  lexicon: HALOT
  rationale: נצל in the Hiphil means to deliver/rescue. 'Delivered' fits the military-threat context and keeps verbal consistency with the next clause.
- source_word: מִיָּדִי
  chosen: from my hand
  alternatives:
  - out of my hand
  lexicon: HALOT
  rationale: This is a common idiom for power/control. 'From my hand' preserves the metaphor and is standard English biblical style.
- source_word: כֵּן לֹא יַצִּיל
  chosen: so ... will not deliver
  alternatives:
  - thus ... will not rescue
  lexicon: HALOT
  rationale: 'כֵּן marks the apodosis of the comparison: ''so.'' Repeating ''deliver'' preserves the rhetorical parallel with the previous clause.'
- source_word: אֱלֹהֵי יְחִזְקִיָּהוּ
  chosen: the God of Hezekiah
  alternatives:
  - Hezekiah's God
  lexicon: HALOT
  rationale: The construct can be rendered either way; 'the God of Hezekiah' better preserves the taunting tone of Sennacherib's wording.
- source_word: עַמּוֹ
  chosen: his people
  lexicon: HALOT
  rationale: Refers to the people belonging to Hezekiah's God, i.e., Judah/Jerusalem; 'his people' is the natural rendering of the pronominal suffix.
