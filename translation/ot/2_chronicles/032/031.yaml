id: 2CH.32.31
reference: 2 Chronicles 32:31
source:
  edition: WLC
  text: וְ/כֵ֞ן בִּ/מְלִיצֵ֣י שָׂרֵ֣י בָּבֶ֗ל הַֽ/מְשַׁלְּחִ֤ים עָלָי/ו֙ לִ/דְרֹ֗שׁ
    הַ/מּוֹפֵת֙ אֲשֶׁ֣ר הָיָ֣ה בָ/אָ֔רֶץ עֲזָב֖/וֹ הָֽ/אֱלֹהִ֑ים לְ/נַ֨סּוֹת֔/וֹ לָ/דַ֖עַת
    כָּל בִּ/לְבָבֽ/וֹ׀־׃
translation:
  text: And so, in the matter of the envoys of the princes of Babylon, who had been
    sent to him to inquire about the sign that had happened in the land, God left
    him, to test him, to know all that was in his heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wonder' or 'the portent' for 'the sign.'
    reason: lexical_alternative
  - marker: b
    text: The wording 'to know all that was in his heart' is retained as written,
      preserving the narrative's tension; some understand it as 'to reveal' or 'to
      expose' what was in his heart.
    reason: alternative_reading
lexical_decisions:
- source_word: וְכֵן
  chosen: And so
  alternatives:
  - And likewise
  - So also
  - And thus
  lexicon: HALOT
  rationale: Introduces a further circumstance connected to the preceding account.
    'And so' preserves the connective and inferential force without sounding wooden.
- source_word: בִּמְלִיצֵי
  chosen: in the matter of the envoys
  alternatives:
  - through the envoys
  - with the ambassadors
  - concerning the envoys
  lexicon: HALOT
  rationale: The noun from ליץ in this context refers to intermediaries or envoys.
    The prefixed ב marks the sphere/circumstance, so 'in the matter of' best captures
    the idiom in readable English.
- source_word: שָׂרֵי בָּבֶל
  chosen: the princes of Babylon
  alternatives:
  - the officials of Babylon
  - the rulers of Babylon
  lexicon: HALOT
  rationale: שָׂרִים commonly denotes princes, officials, or rulers. 'Princes' is
    a straightforward rendering and preserves the elevated political sense of the
    Hebrew.
- source_word: הַמְשַׁלְּחִים עָלָיו
  chosen: who had been sent to him
  alternatives:
  - who sent to him
  - who were sending to him
  lexicon: HALOT
  rationale: 'Although morphologically active, the phrase functions idiomatically
    of the envoys as those dispatched to Hezekiah. English naturally renders the sense
    as passive: ''who had been sent to him.'''
- source_word: לִדְרֹשׁ
  chosen: to inquire about
  alternatives:
  - to seek
  - to investigate
  - to ask about
  lexicon: HALOT
  rationale: דרש here means to inquire or investigate, not merely to ask a question.
    'To inquire about' fits the diplomatic context.
- source_word: הַמּוֹפֵת
  chosen: the sign
  alternatives:
  - the wonder
  - the portent
  - the miraculous sign
  lexicon: HALOT
  rationale: מוֹפֵת can denote a sign, wonder, or portent. 'Sign' is concise and broad
    enough, while the extraordinary nature is implied by the context.
- source_word: אֲשֶׁר הָיָה בָאָרֶץ
  chosen: that had happened in the land
  alternatives:
  - that had occurred in the land
  - that was in the land
  lexicon: HALOT
  rationale: The clause refers to the notable event in the land that prompted Babylonian
    inquiry. 'Had happened' expresses the eventive sense more clearly than a wooden
    'was.'
- source_word: עֲזָבוֹ
  chosen: left him
  alternatives:
  - forsook him
  - abandoned him
  lexicon: HALOT
  rationale: עזב can mean leave, forsake, or abandon. 'Left him' is the most natural
    and least overstated in context, preserving the text's tension without importing
    a stronger theological conclusion than necessary.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The definite noun refers to the God of Israel. Standard English rendering
    is simply 'God.'
- source_word: לְנַסּוֹתוֹ
  chosen: to test him
  alternatives:
  - to try him
  - to prove him
  lexicon: HALOT
  rationale: נסה commonly means test or try. 'To test him' is clear modern English
    and preserves the evaluative sense.
- source_word: לָדַעַת
  chosen: to know
  alternatives:
  - to make known
  - to learn
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result from the human vantage point
    of the narrative. 'To know' is the direct lexical equivalent and preserves the
    wording of the text.
- source_word: כָּל בִּלְבָבוֹ
  chosen: all that was in his heart
  alternatives:
  - everything in his heart
  - the whole of his heart
  lexicon: HALOT
  rationale: לֵבָב in Hebrew often denotes the inner person, including motives and
    thoughts. 'All that was in his heart' preserves the idiom while remaining natural
    in English.
