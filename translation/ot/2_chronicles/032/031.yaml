theological_decisions:
- issue: Divine testing and knowledge language
  chosen_reading: God left him, to test him, to know all that was in his heart
  alternative_readings:
  - God left him to reveal all that was in his heart
  - God withdrew from him in order to expose his heart
  rationale: The Hebrew states plainly that God left Hezekiah in order to test him
    and to know all that was in his heart. The translation preserves this wording
    and its theological tension rather than softening it to avoid questions about
    divine omniscience. Alternative explanatory renderings are possible, but the main
    text should stay close to the source.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
