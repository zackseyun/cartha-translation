id: 2CH.32.4
reference: 2 Chronicles 32:4
source:
  edition: WLC
  text: וַ/יִּקָּבְצ֣וּ עַם רָ֔ב וַֽ/יִּסְתְּמוּ֙ אֶת כָּל הַ/מַּעְיָנ֔וֹת וְ/אֶת
    הַ/נַּ֛חַל הַ/שּׁוֹטֵ֥ף בְּ/תוֹךְ הָ/אָ֖רֶץ לֵ/אמֹ֑ר לָ֤/מָּה יָב֨וֹאוּ֙ מַלְכֵ֣י
    אַשּׁ֔וּר וּ/מָצְא֖וּ מַ֥יִם רַבִּֽים־־־־־׃
translation:
  text: So many people gathered together, and they stopped up all the springs and
    the stream that was flowing through the land, saying, “Why should the kings of
    Assyria come and find abundant water?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: “the kings of Assyria.” The plural likely refers to the Assyrian
      royal power or dynasty; some translations smooth it to the singular “king of
      Assyria” for immediate historical context.'
    reason: lexical_alternative
  - marker: b
    text: Or “the wadi/brook that was flowing through the land.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּבְצוּ
  chosen: gathered together
  alternatives:
  - assembled
  - were gathered
  lexicon: HALOT
  rationale: The Niphal form conveys coming together/being gathered. 'Gathered together'
    is natural English and preserves the collective action without overformal passivity.
- source_word: עַם רָב
  chosen: many people
  alternatives:
  - a great people
  - a large crowd
  lexicon: HALOT
  rationale: The phrase denotes a numerous populace rather than an ethnic 'people'
    in a technical sense. 'Many people' is idiomatic and fits the military-preparatory
    context.
- source_word: וַיִּסְתְּמוּ
  chosen: stopped up
  alternatives:
  - blocked
  - sealed up
  lexicon: HALOT
  rationale: In context of water sources, the verb means to stop or block them. 'Stopped
    up' is a standard English collocation for springs and channels.
- source_word: כָּל הַמַּעְיָנוֹת
  chosen: all the springs
  alternatives:
  - all the fountains
  - all the water sources
  lexicon: HALOT
  rationale: מַעְיָן refers to a spring or fountainhead. 'Springs' is the clearest
    modern English choice.
- source_word: הַנַּחַל הַשּׁוֹטֵף
  chosen: the stream that was flowing
  alternatives:
  - the wadi that overflowed
  - the brook that flowed
  lexicon: HALOT
  rationale: נַחַל can mean wadi, brook, or stream; here with the participle הַשּׁוֹטֵף
    it describes a watercourse actively flowing. 'Stream that was flowing' is clear
    and avoids the regional term 'wadi' in the main text.
- source_word: בְּתוֹךְ הָאָרֶץ
  chosen: through the land
  alternatives:
  - in the midst of the land
  - within the land
  lexicon: HALOT
  rationale: The phrase indicates the stream's course within/across the territory.
    'Through the land' is idiomatic and captures movement better in English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thinking
  - for they said
  lexicon: HALOT
  rationale: Standard quotative introducing the people's rationale. 'Saying' preserves
    the Hebrew discourse marker.
- source_word: לָמָּה
  chosen: Why should
  alternatives:
  - Why do
  - Why let
  lexicon: HALOT
  rationale: In this rhetorical question introducing purpose, 'Why should' best conveys
    deliberative force in English.
- source_word: יָבֹאוּ מַלְכֵי אַשּׁוּר
  chosen: the kings of Assyria come
  alternatives:
  - the Assyrian kings come
  lexicon: HALOT
  rationale: The construct phrase is straightforwardly rendered 'the kings of Assyria.'
    Retaining the plural reflects the Hebrew, likely referring to the Assyrian royal
    power/dynasty rather than smoothing to singular.
- source_word: וּמָצְאוּ מַיִם רַבִּים
  chosen: and find abundant water
  alternatives:
  - and find much water
  - and find plenty of water
  lexicon: HALOT
  rationale: רַבִּים with מַיִם indicates plentiful supply. 'Abundant water' is concise
    and suitably weighty for the strategic concern.
