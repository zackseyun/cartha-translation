id: 2CH.32.26
reference: 2 Chronicles 32:26
source:
  edition: WLC
  text: וַ/יִּכָּנַ֤ע יְחִזְקִיָּ֨הוּ֙ בְּ/גֹ֣בַהּ לִבּ֔/וֹ ה֖וּא וְ/יֹשְׁבֵ֣י יְרוּשָׁלִָ֑ם
    וְ/לֹא בָ֤א עֲלֵי/הֶם֙ קֶ֣צֶף יְהוָ֔ה בִּ/ימֵ֖י יְחִזְקִיָּֽהוּ־׃
translation:
  text: But Hezekiah humbled himself for the pride of his heart, he and the inhabitants
    of Jerusalem, so the wrath of the LORD did not come upon them in the days of Hezekiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of the pride of his heart.' The Hebrew phrase is literally 'in/for
      the height of his heart,' an idiom for inner pride or haughtiness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכָּנַע
  chosen: humbled himself
  alternatives:
  - was humbled
  - submitted himself
  lexicon: HALOT
  rationale: The Niphal form of כנע here is reflexive/middle in context, describing
    Hezekiah's response of self-humbling rather than merely a passive state. 'Humbled
    himself' is idiomatic and fits the repentance context.
- source_word: בְּגֹבַהּ לִבּוֹ
  chosen: for the pride of his heart
  alternatives:
  - because of the pride of his heart
  - concerning the exaltation of his heart
  lexicon: HALOT
  rationale: גֹבַהּ literally denotes height/exaltation; with 'heart' it refers to
    inner pride or haughtiness. 'For the pride of his heart' captures the causal sense
    and natural English style while preserving the moral nuance.
- source_word: הוּא וְיֹשְׁבֵי יְרוּשָׁלָם
  chosen: he and the inhabitants of Jerusalem
  alternatives:
  - he, and the residents of Jerusalem
  lexicon: HALOT
  rationale: The pronoun הוּא is emphatic/appositional, explicitly including Hezekiah
    alongside the people. 'Inhabitants' is a standard rendering of יֹשְׁבֵי in this
    civic sense.
- source_word: קֶצֶף יְהוָה
  chosen: the wrath of the LORD
  alternatives:
  - the anger of the LORD
  - the fury of the LORD
  lexicon: HALOT
  rationale: קֶצֶף often denotes divine wrath/indignation in judgment contexts. 'Wrath'
    preserves the gravity of covenantal judgment better than the milder 'anger.' 'the
    LORD' follows the project's default for יְהוָה.
- source_word: וְלֹא בָא עֲלֵיהֶם
  chosen: did not come upon them
  alternatives:
  - did not come against them
  - did not fall on them
  lexicon: HALOT
  rationale: The idiom בוא על conveys something coming upon persons, often judgment.
    'Did not come upon them' is a clear, fairly literal English equivalent.
- source_word: בִּימֵי יְחִזְקִיָּהוּ
  chosen: in the days of Hezekiah
  alternatives:
  - during Hezekiah's days
  - in Hezekiah's lifetime
  lexicon: HALOT
  rationale: This temporal phrase is conventionally and accurately rendered 'in the
    days of Hezekiah,' indicating the period of his reign/life without over-specifying.
