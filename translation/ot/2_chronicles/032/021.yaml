id: 2CH.32.21
reference: 2 Chronicles 32:21
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח יְהוָה֙ מַלְאָ֔ךְ וַ/יַּכְחֵ֞ד כָּל גִּבּ֥וֹר חַ֨יִל֙ וְ/נָגִ֣יד
    וְ/שָׂ֔ר בְּ/מַחֲנֵ֖ה מֶ֣לֶךְ אַשּׁ֑וּר וַ/יָּשָׁב֩ בְּ/בֹ֨שֶׁת פָּנִ֜ים לְ/אַרְצ֗/וֹ
    וַ/יָּבֹא֙ בֵּ֣ית אֱלֹהָ֔י/ו ו/מ/יציא/ו מֵעָ֔י/ו שָׁ֖ם הִפִּילֻ֥/הוּ בֶ/חָֽרֶב־׃
translation:
  text: And the LORD sent an angel, who wiped out every mighty warrior, commander,
    and officer in the camp of the king of Assyria. So he returned to his own land
    with shame on his face. And when he entered the house of his god, some of those
    who came from his own body struck him down there with the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a messenger.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'those who came out from his own inward parts'; compare 2 Kings
      19:37, which specifies that they were his sons.
    reason: cross_reference
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the covenant name with small-caps convention in English.
- source_word: מַלְאָךְ
  chosen: an angel
  alternatives:
  - a messenger
  lexicon: HALOT
  rationale: In this narrative of divine intervention, the supernatural sense is most
    natural and traditional; 'messenger' is lexically possible but contextually less
    likely.
- source_word: וַיַּכְחֵד
  chosen: wiped out
  alternatives:
  - destroyed
  - annihilated
  - cut off
  lexicon: HALOT
  rationale: The Hiphil of כחד here conveys decisive destruction/removal. 'Wiped out'
    is vivid modern English while remaining faithful to the military context.
- source_word: כָּל גִּבּוֹר חַיִל
  chosen: every mighty warrior
  alternatives:
  - every valiant warrior
  - every mighty man of valor
  lexicon: HALOT
  rationale: The phrase denotes strong or valiant fighting men. 'Mighty warrior' is
    natural English and preserves the military force of the expression.
- source_word: נָגִיד
  chosen: commander
  alternatives:
  - leader
  - ruler
  - captain
  lexicon: HALOT
  rationale: In military context alongside שַׂר, 'commander' fits well as a leadership
    role within the Assyrian camp.
- source_word: שָׂר
  chosen: officer
  alternatives:
  - prince
  - captain
  - official
  lexicon: HALOT
  rationale: Here the term likely refers to another rank of military or administrative
    authority. 'Officer' differentiates it from נָגִיד while fitting the camp setting.
- source_word: בְּמַחֲנֵה מֶלֶךְ אַשּׁוּר
  chosen: in the camp of the king of Assyria
  alternatives:
  - in the camp of the Assyrian king
  lexicon: HALOT
  rationale: A straightforward rendering of the construct chain; 'king of Assyria'
    is slightly more formal and transparent.
- source_word: בְּבֹשֶׁת פָּנִים
  chosen: with shame on his face
  alternatives:
  - in shamefacedness
  - with a shameful face
  - in disgrace
  lexicon: HALOT
  rationale: The idiom expresses public humiliation. 'With shame on his face' preserves
    the facial imagery more closely than the more abstract 'in disgrace.'
- source_word: לְאַרְצוֹ
  chosen: to his own land
  alternatives:
  - to his land
  - to his country
  lexicon: HALOT
  rationale: Adding 'own' reflects the pronominal suffix naturally in English.
- source_word: בֵּית אֱלֹהָיו
  chosen: the house of his god
  alternatives:
  - the temple of his god
  lexicon: HALOT
  rationale: '''House'' is the more literal rendering of בַּיִת and remains idiomatic
    enough in this context.'
- source_word: וּמִיצָאָיו מֵעָיו
  chosen: some of those who came from his own body
  alternatives:
  - his own sons
  - those from his loins
  - his own offspring
  lexicon: HALOT
  rationale: The Hebrew expression is literally broader than 'sons,' referring to
    descendants from his body. Since the text does not explicitly say 'sons' here,
    the main text preserves the bodily idiom while remaining understandable.
- source_word: הִפִּילֻהוּ בֶחָרֶב
  chosen: struck him down there with the sword
  alternatives:
  - killed him there with the sword
  - caused him to fall by the sword
  lexicon: HALOT
  rationale: The idiom means to bring him down lethally. 'Struck him down' is natural
    English and retains the violent action, while 'with the sword' preserves the instrumental
    phrase.
