theological_decisions:
- issue: Identity of the agent sent by the LORD
  chosen_reading: an angel as a heavenly being
  alternative_readings:
  - a messenger
  rationale: The narrative context of miraculous deliverance favors a supernatural
    angelic agent rather than a human envoy. This is a lexical-contextual decision,
    not a doctrinal expansion beyond the text.
- issue: Rendering the assassins as those from Sennacherib's own body rather than
    explicitly 'sons'
  chosen_reading: retain the broader bodily/kinship expression in the main text
  alternative_readings:
  - his own sons
  rationale: The Hebrew wording is more literally 'those coming out from his inward
    parts/body.' While the parallel account in 2 Kings 19:37 names sons, this verse
    itself uses a broader expression. Preserving that wording avoids importing detail
    from the parallel into the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
