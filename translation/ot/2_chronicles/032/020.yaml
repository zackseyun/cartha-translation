theological_decisions:
- issue: Rendering of הַשָּׁמָיִם in a prayer context
  chosen_reading: to heaven
  alternative_readings:
  - to the heavens
  rationale: The phrase denotes appeal directed toward the divine realm, not a developed
    doctrinal statement about cosmology. 'To heaven' is idiomatic modern English while
    preserving the vertical, God-directed sense of the Hebrew.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; preserve source sense without importing doctrinal claims.'
