id: 2CH.32.20
reference: 2 Chronicles 32:20
source:
  edition: WLC
  text: וַ/יִּתְפַּלֵּ֞ל יְחִזְקִיָּ֣הוּ הַ/מֶּ֗לֶךְ וִֽ/ישַֽׁעְיָ֧הוּ בֶן אָמ֛וֹץ
    הַ/נָּבִ֖יא עַל זֹ֑את וַֽ/יִּזְעֲק֖וּ הַ/שָּׁמָֽיִם־־׃פ
translation:
  text: Then Hezekiah the king and Isaiah son of Amoz, the prophet, prayed about this
    and cried out to heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the heavens.' The Hebrew noun is plural in form.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפַּלֵּל
  chosen: prayed
  alternatives:
  - interceded
  lexicon: HALOT
  rationale: Hitpael of פלל commonly means 'to pray.' Singular verb with a compound
    subject is followed by a plural verb later; English smooths this naturally by
    making both named subjects share the action.
- source_word: יְחִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Standard English transliteration of the personal name.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Appositional title identifying Hezekiah; retained in translation for
    clarity and formality.
- source_word: וִישַׁעְיָהוּ
  chosen: and Isaiah
  rationale: Standard English transliteration of the personal name, joined as the
    second subject.
- source_word: בֶן אָמוֹץ
  chosen: son of Amoz
  lexicon: HALOT
  rationale: Genealogical identification is preserved formally; 'son of' is standard
    and transparent.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Appositional title for Isaiah; retained because it is explicit in the
    Hebrew and significant to the narrative.
- source_word: עַל זֹאת
  chosen: about this
  alternatives:
  - concerning this
  - because of this
  lexicon: HALOT
  rationale: The preposition על with זאת here most naturally indicates the matter
    prompting prayer, hence 'about this.' 'Because of this' is possible but less direct
    in English for the object of prayer.
- source_word: וַיִּזְעֲקוּ
  chosen: cried out
  alternatives:
  - called out
  lexicon: HALOT
  rationale: זעק conveys an urgent cry, often in distress or appeal to God. 'Cried
    out' preserves the intensity better than the flatter 'called out.'
- source_word: הַשָּׁמָיִם
  chosen: to heaven
  alternatives:
  - to the heavens
  lexicon: HALOT
  rationale: Although the Hebrew form is plural ('the heavens'), English idiom commonly
    uses singular 'heaven' when referring to the divine realm. The directional sense
    after 'cried out' is best expressed in English as 'to heaven.'
