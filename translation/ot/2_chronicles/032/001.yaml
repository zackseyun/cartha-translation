id: 2CH.32.1
reference: 2 Chronicles 32:1
source:
  edition: WLC
  text: אַחֲרֵ֨י הַ/דְּבָרִ֤ים וְ/הָ/אֱמֶת֙ הָ/אֵ֔לֶּה בָּ֖א סַנְחֵרִ֣יב מֶֽלֶךְ אַשּׁ֑וּר וַ/יָּבֹ֣א בִֽ/יהוּדָ֗ה וַ/יִּ֨חַן֙ עַל הֶ/עָרִ֣ים הַ/בְּצֻר֔וֹת וַ/יֹּ֖אמֶר לְ/בִקְעָ֥/ם אֵלָֽי/ו־־׃
translation:
  text: After these things and this faithfulness, Sennacherib king of Assyria came and entered Judah, and he encamped against the fortified cities and intended to breach them for himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and these faithful deeds'; the Hebrew אֱמֶת can mean 'truth' or 'faithfulness,' and here likely refers to Hezekiah's faithful conduct in the preceding context.
    reason: lexical_alternative
  - marker: b
    text: Or 'planned to breach them for himself.' The final clause is idiomatic Hebrew expressing Sennacherib's purpose in encamping against the fortified cities.
    reason: lexical_alternative
  - marker: c
    text: Or 'and intended to break through into them for himself'.
    reason: previous_rendering
lexical_decisions:
- source_word: אַחֲרֵי
  chosen: After
  alternatives:
  - Following
  lexicon: HALOT
  rationale: Temporal preposition marking sequence; 'After' is the most natural English rendering.
- source_word: הַדְּבָרִים
  chosen: these things
  alternatives:
  - these events
  - these matters
  lexicon: HALOT
  rationale: דָּבָר in narrative often refers broadly to events or matters. 'These things' preserves the Hebrew idiom while remaining readable.
- source_word: וְהָאֱמֶת הָאֵלֶּה
  chosen: and this faithfulness
  alternatives:
  - and these acts of faithfulness
  - and this truth
  - and these faithful deeds
  lexicon: HALOT
  rationale: Though אֱמֶת often means 'truth,' in historical narrative it can denote faithfulness/reliability. Here it refers back to Hezekiah's faithful conduct, so singular English 'this faithfulness' best captures the sense. The Hebrew construction is somewhat idiomatic, with the demonstrative pointing to the preceding matters.
- source_word: בָּא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Simple narrative verb of motion; 'came' is standard and fits the sequence.
- source_word: סַנְחֵרִיב מֶלֶךְ אַשּׁוּר
  chosen: Sennacherib king of Assyria
  alternatives:
  - Sennacherib, the king of Assyria
  lexicon: HALOT
  rationale: Personal name is transliterated; royal title is translated straightforwardly.
- source_word: וַיָּבֹא בִיהוּדָה
  chosen: entered Judah
  alternatives:
  - came into Judah
  lexicon: HALOT
  rationale: The verb plus ב marks movement into the land. 'Entered Judah' is concise modern English.
- source_word: וַיִּחַן עַל
  chosen: encamped against
  alternatives:
  - camped against
  - laid siege to
  lexicon: HALOT
  rationale: חנה with עַל indicates setting camp against a target. 'Encamped against' is more precise than the more interpretive 'laid siege to,' though siege is implied by context.
- source_word: הֶעָרִים הַבְּצֻרוֹת
  chosen: the fortified cities
  alternatives:
  - the fortified towns
  lexicon: HALOT
  rationale: Standard rendering for defended urban centers; 'cities' is conventional and clear.
- source_word: וַיֹּאמֶר לְבִקְעָם אֵלָיו
  chosen: and intended to break through into them for himself
  alternatives:
  - and planned to breach them for himself
  - and thought to break them open for himself
  lexicon: HALOT
  rationale: 'The ketiv-like infinitive construction from בקע with pronominal suffix expresses purpose/intention: to break open/breach the cities. אֵלָיו is best taken idiomatically as advantage/direction ''for himself,'' i.e., to seize them. ''Intended'' smooths the Hebrew idiom into natural English without losing the purposive force.'
