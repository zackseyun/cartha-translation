  from: and intended to break through into them for himself
  to: and intended to breach them for himself
  rationale: The current phrasing 'break through into them' is slightly redundant, and the final clause feels a bit cumbersome in English. Using 'breach them for himself'—an alternative already noted in a footnote—is more concise, employs standard military terminology for the Hebrew verb בָּקַע ('to break open') in this context, and improves the overall flow while retaining the important idiomatic sense of 'for his own gain' from the Hebrew אֵלָיו.
