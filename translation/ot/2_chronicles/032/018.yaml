id: 2CH.32.18
reference: 2 Chronicles 32:18
source:
  edition: WLC
  text: וַ/יִּקְרְא֨וּ בְ/קוֹל גָּד֜וֹל יְהוּדִ֗ית עַל עַ֤ם יְרוּשָׁלִַ֨ם֙ אֲשֶׁ֣ר
    עַל הַֽ/חוֹמָ֔ה לְ/יָֽרְאָ֖/ם וּֽ/לְ/בַהֲלָ֑/ם לְמַ֖עַן יִלְכְּד֥וּ אֶת הָ/עִֽיר־־־־׃
translation:
  text: And they called out loudly in Judean to the people of Jerusalem who were on
    the wall, to frighten them and to terrify them, so that they might capture the
    city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the language of Judah'; traditionally 'in Hebrew.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  chosen: they called out
  alternatives:
  - they shouted
  - they cried out
  lexicon: HALOT
  rationale: קרא in this context denotes raising the voice publicly toward an audience.
    'Called out' preserves the verbal action without over-specifying emotional tone.
- source_word: בְקוֹל גָּדוֹל
  chosen: loudly
  alternatives:
  - with a loud voice
  - in a loud voice
  lexicon: HALOT
  rationale: The phrase literally means 'with a great/loud voice.' Rendering it adverbially
    as 'loudly' is natural English while preserving the sense of volume.
- source_word: יְהוּדִית
  chosen: in Judean
  alternatives:
  - in Hebrew
  - in the language of Judah
  lexicon: HALOT
  rationale: The term refers to the language/dialect of Judah, not specifically biblical
    Hebrew as a technical linguistic label. 'In Judean' best reflects the ethnolinguistic
    sense and avoids importing later terminology.
- source_word: עַל עַם יְרוּשָׁלִַם אֲשֶׁר עַל הַחוֹמָה
  chosen: to the people of Jerusalem who were on the wall
  alternatives:
  - against the people of Jerusalem who were on the wall
  - over the people of Jerusalem who were on the wall
  lexicon: HALOT
  rationale: עַל after a verb of calling can mark the audience addressed. 'To the
    people' fits the communicative context better than a more adversative 'against,'
    while retaining the public address toward those stationed on the wall.
- source_word: לְיָרְאָם
  chosen: to frighten them
  alternatives:
  - to make them afraid
  - to cause them to fear
  lexicon: HALOT
  rationale: From ירא in the causative/result sense here, the goal is to induce fear.
    'To frighten them' is concise and idiomatic.
- source_word: וּלְבַהֲלָם
  chosen: and to terrify them
  alternatives:
  - and to alarm them
  - and to throw them into panic
  lexicon: HALOT
  rationale: בהל conveys dismay, alarm, or panic. 'Terrify' gives a stronger second
    term than the first infinitive, preserving the rhetorical intensification of the
    pair.
- source_word: לְמַעַן יִלְכְּדוּ אֶת הָעִיר
  chosen: so that they might capture the city
  alternatives:
  - in order that they might seize the city
  - so that they could take the city
  lexicon: HALOT
  rationale: למען introduces purpose. לכד commonly means capture/seize in military
    contexts. 'Capture the city' is clear, natural, and contextually precise.
