id: 2CH.32.11
reference: 2 Chronicles 32:11
source:
  edition: WLC
  text: הֲ/לֹ֤א יְחִזְקִיָּ֨הוּ֙ מַסִּ֣ית אֶתְ/כֶ֔ם לָ/תֵ֣ת אֶתְ/כֶ֔ם לָ/מ֛וּת בְּ/רָעָ֥ב
    וּ/בְ/צָמָ֖א לֵ/אמֹ֑ר יְהוָ֣ה אֱלֹהֵ֔י/נוּ יַצִּילֵ֕/נוּ מִ/כַּ֖ף מֶ֥לֶךְ אַשּֽׁוּר׃
translation:
  text: Is not Hezekiah misleading you, to hand you over to die by famine and by thirst,
    saying, ‘The LORD our God will deliver us from the hand of the king of Assyria’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deceiving you' or 'enticing you.' The Hebrew verb can carry the sense
      of leading someone astray or persuading them wrongly.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Is not
  alternatives:
  - Has not
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Is not' preserves
    the interrogative force and accusatory tone.
- source_word: מַסִּית
  chosen: misleading
  alternatives:
  - enticing
  - deceiving
  - inciting
  lexicon: HALOT
  rationale: From סות in the Hiphil, conveying causing someone to go astray or be
    persuaded wrongly. 'Misleading' fits the context of Rabshakeh's accusation without
    overcommitting to a narrower sense like 'inciting' or a more interpretive sense
    like 'deceiving.'
- source_word: לָתֵת אֶתְכֶם
  chosen: to hand you over
  alternatives:
  - to give you over
  - to deliver you over
  lexicon: HALOT
  rationale: The idiom with נתן plus object and infinitive of death expresses giving
    people up to a fate. 'Hand you over' is idiomatic modern English and preserves
    the hostile sense.
- source_word: לָמוּת
  chosen: to die
  alternatives:
  - so that you die
  lexicon: HALOT
  rationale: Direct infinitive complement after 'to hand you over'; simple and natural
    in English.
- source_word: בְּרָעָב וּבְצָמָא
  chosen: by famine and by thirst
  alternatives:
  - with hunger and with thirst
  - through famine and thirst
  lexicon: HALOT
  rationale: רָעָב is better rendered 'famine' here, referring to siege conditions
    rather than mere hunger. Repeating 'by' reflects the Hebrew prepositions and the
    means of death.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - by saying
  lexicon: HALOT
  rationale: Standard quotative introducing Hezekiah's reported claim.
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward possessive construction; preserves the covenantal claim
    in the quoted speech.
- source_word: יַצִּילֵנוּ
  chosen: will deliver us
  alternatives:
  - will save us
  - will rescue us
  lexicon: HALOT
  rationale: Hiphil of נצל commonly means deliver/rescue. 'Deliver us' fits both military
    and theological context and avoids importing fuller soteriological overtones of
    'save'.
- source_word: מִכַּף
  chosen: from the hand of
  alternatives:
  - from the power of
  lexicon: HALOT
  rationale: A common Hebrew idiom for power or control. 'From the hand of' preserves
    the idiom in readable English.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - Assyria's king
  lexicon: HALOT
  rationale: Standard English rendering of the construct chain; clear and natural.
