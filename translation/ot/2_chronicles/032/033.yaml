theological_decisions:
- issue: Death euphemism in royal formula
  chosen_reading: Retain the idiom 'slept with his fathers' rather than flattening
    it to 'died.'
  alternative_readings:
  - died
  - passed away
  rationale: The phrase is a conventional biblical obituary formula and carries literary-theological
    continuity with the royal narratives. Preserving the idiom reflects original-language
    primacy and avoids unnecessary paraphrase.
  doctrine_reference: Translation philosophy §1, §6
- issue: Scope of 'sons of David'
  chosen_reading: Keep 'sons of David' in the main text, with explanatory footnote
    noting the dynastic sense 'descendants of David.'
  alternative_readings:
  - descendants of David
  rationale: The Hebrew expression is literal, but in context it refers to the Davidic
    royal line more broadly. Preserving the literal wording in the text while clarifying
    in a footnote maintains transparency and avoids over-interpretation.
  doctrine_reference: Translation philosophy §3, §5
