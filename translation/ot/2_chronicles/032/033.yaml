id: 2CH.32.33
reference: 2 Chronicles 32:33
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֨ב יְחִזְקִיָּ֜הוּ עִם אֲבֹתָ֗י/ו וַֽ/יִּקְבְּרֻ/הוּ֮ בְּֽ/מַעֲלֵה֮
    קִבְרֵ֣י בְנֵי דָוִיד֒ וְ/כָבוֹד֙ עָֽשׂוּ ל֣/וֹ בְ/מוֹת֔/וֹ כָּל יְהוּדָ֖ה וְ/יֹשְׁבֵ֣י
    יְרוּשָׁלִָ֑ם וַ/יִּמְלֹ֛ךְ מְנַשֶּׁ֥ה בְנ֖/וֹ תַּחְתָּֽי/ו־־־־׃פ
translation:
  text: And Hezekiah slept with his fathers, and they buried him in the upper part
    of the tombs of the sons of David. And all Judah and the inhabitants of Jerusalem
    honored him at his death, and Manasseh his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tombs of the descendants of David'; 'sons of David' here refers
      to the Davidic royal line.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: The idiom 'slept with his fathers' is a standard Hebrew euphemism for
    death. Retaining 'slept' preserves the source-text idiom and its conventional
    royal obituary style, while the following burial clause makes the meaning clear.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: A conventional dynastic/ancestral formula. 'Fathers' is more formally
    aligned with the Hebrew and preserves the stock biblical expression better than
    the more interpretive 'ancestors'.
- source_word: וַיִּקְבְּרֻהוּ
  chosen: they buried him
  alternatives:
  - he was buried
  lexicon: HALOT
  rationale: The Hebrew verb is active plural, not passive. English can naturally
    preserve the indefinite subject with 'they buried him.'
- source_word: בְּמַעֲלֵה
  chosen: in the upper part of
  alternatives:
  - on the ascent to
  - in the upper area of
  lexicon: HALOT
  rationale: מַעֲלֵה can denote an ascent or upper place. In this burial context,
    'in the upper part of' best fits the likely topographical sense without overcommitting
    to a specific architectural reconstruction.
- source_word: קִבְרֵי בְנֵי דָוִיד
  chosen: the tombs of the sons of David
  alternatives:
  - the tombs of the descendants of David
  - the burial places of the sons of David
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the dynastic reference. 'Sons of
    David' can function broadly for the Davidic royal line; this is left in the main
    text, with the broader sense preserved in a footnote for clarity.
- source_word: וְכָבוֹד עָשׂוּ לוֹ
  chosen: honored him
  alternatives:
  - they made honor for him
  - they paid him honor
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'they did honor to him.' 'Honored him'
    is idiomatic modern English that accurately conveys the sense.
- source_word: בְּמוֹתוֹ
  chosen: at his death
  alternatives:
  - when he died
  - upon his death
  lexicon: HALOT
  rationale: This concise rendering preserves the temporal sense and fits the commemorative
    context.
- source_word: כָּל יְהוּדָה וְיֹשְׁבֵי יְרוּשָׁלִָם
  chosen: all Judah and the inhabitants of Jerusalem
  alternatives:
  - all Judah and those living in Jerusalem
  - all Judah and the residents of Jerusalem
  lexicon: HALOT
  rationale: '''Inhabitants'' is a natural rendering of the participial form and preserves
    the formal public scope of the honor shown.'
- source_word: וַיִּמְלֹךְ ... תַּחְתָּיו
  chosen: reigned in his place
  alternatives:
  - became king in his place
  - reigned instead of him
  lexicon: HALOT
  rationale: This is the standard succession formula. 'Reigned in his place' is idiomatic
    and preserves the sense of dynastic succession.
