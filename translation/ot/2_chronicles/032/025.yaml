theological_decisions:
- issue: Nature of Hezekiah's failure in relation to divine favor
  chosen_reading: Hezekiah failed to make a fitting return for the good he had received,
    without specifying a narrower act such as verbal thanksgiving alone.
  alternative_readings:
  - Hezekiah did not give thanks for the benefit shown to him
  - Hezekiah did not act with gratitude proportionate to God's favor
  rationale: The Hebrew speaks more broadly of not returning according to the benefit
    done to him. Rendering it as 'repay' preserves the text's moral evaluation without
    reducing it to one specific devotional act unless the context explicitly requires
    that narrowing.
  doctrine_reference: Translation philosophy §1, §3
- issue: Source of the wrath
  chosen_reading: The verse leaves the agent implicit and simply states that wrath
    came upon him, Judah, and Jerusalem.
  alternative_readings:
  - divine wrath came upon him
  - the LORD's wrath came upon him
  rationale: In context the wrath is naturally understood as divine, but the Hebrew
    clause does not explicitly name the LORD here. To preserve the text's wording
    and avoid importing an explicit subject not stated in the verse, the translation
    keeps the agent implicit.
  doctrine_reference: Translation philosophy §1, §3
