id: 2CH.32.25
reference: 2 Chronicles 32:25
source:
  edition: WLC
  text: וְ/לֹא כִ/גְמֻ֤ל עָלָי/ו֙ הֵשִׁ֣יב יְחִזְקִיָּ֔הוּ כִּ֥י גָבַ֖הּ לִבּ֑/וֹ
    וַ/יְהִ֤י עָלָי/ו֙ קֶ֔צֶף וְ/עַל יְהוּדָ֖ה וִ/ירוּשָׁלִָֽם־־׃
translation:
  text: But Hezekiah did not repay according to the benefit done to him, because his
    heart was proud; therefore wrath came upon him and upon Judah and Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not respond according to the kindness shown to him.' The Hebrew
      expression refers broadly to making a fitting return for the good received.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִגְמֻל עָלָיו
  chosen: according to the benefit done to him
  alternatives:
  - according to the kindness shown to him
  - in keeping with what had been given him
  - according to the recompense toward him
  lexicon: HALOT
  rationale: גְּמוּל denotes dealing, recompense, or benefit received/given depending
    on context. Here, in light of the preceding narrative of divine healing and deliverance,
    the sense is the good done to Hezekiah. 'According to the benefit done to him'
    preserves the comparative כ and avoids overinterpreting the exact form of repayment
    as merely emotional gratitude.
- source_word: הֵשִׁיב
  chosen: did not repay
  alternatives:
  - did not respond
  - did not return
  - did not make return
  lexicon: HALOT
  rationale: The Hiphil of שוב commonly carries the sense 'return' or 'give back.'
    In this context, with גמול, it idiomatically means to repay or make an appropriate
    return. 'Repay' is concise and natural English.
- source_word: גָבַהּ לִבּוֹ
  chosen: his heart was proud
  alternatives:
  - his heart was lifted up
  - his heart became exalted
  lexicon: HALOT
  rationale: The Hebrew idiom literally says the heart was high/lifted up, expressing
    arrogance or pride. 'His heart was proud' communicates the idiomatic meaning in
    readable modern English while preserving the inward moral focus of 'heart.'
- source_word: קֶצֶף
  chosen: wrath
  alternatives:
  - anger
  - indignation
  lexicon: HALOT
  rationale: קצף often denotes intense wrath, frequently divine. 'Wrath' better preserves
    the gravity of the judgment context than the flatter 'anger.'
- source_word: וַיְהִי עָלָיו קֶצֶף
  chosen: wrath came upon him
  alternatives:
  - there was wrath upon him
  - wrath was upon him
  lexicon: HALOT
  rationale: The Hebrew construction is existential/resultative. 'Came upon him' is
    idiomatic English that conveys the onset of judgment without adding content.
- source_word: יְהוּדָה וִירוּשָׁלִָם
  chosen: Judah and Jerusalem
  lexicon: HALOT
  rationale: Standard transliteration of the place names, following the instruction
    to transliterate names rather than translate them.
