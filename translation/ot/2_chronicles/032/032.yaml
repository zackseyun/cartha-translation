id: 2CH.32.32
reference: 2 Chronicles 32:32
source:
  edition: WLC
  text: וְ/יֶ֛תֶר דִּבְרֵ֥י יְחִזְקִיָּ֖הוּ וַ/חֲסָדָ֑י/ו הִנָּ֣/ם כְּתוּבִ֗ים בַּ/חֲז֞וֹן
    יְשַֽׁעְיָ֤הוּ בֶן אָמוֹץ֙ הַ/נָּבִ֔יא עַל סֵ֥פֶר מַלְכֵי יְהוּדָ֖ה וְ/יִשְׂרָאֵֽל־־־׃
translation:
  text: Now the rest of the acts of Hezekiah and his faithful deeds—behold, they are
    written in the vision of Isaiah son of Amoz, the prophet, in the Book of the Kings
    of Judah and Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his acts of covenant faithfulness' or 'his loyal acts.' The Hebrew term
      can carry the sense of loyal, faithful kindness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר introduces the remaining material about a subject. 'Now the rest
    of' is idiomatic in English historical narrative and preserves the transitional
    force of the conjunction.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - events
  lexicon: HALOT
  rationale: In royal-summary formulas, דִּבְרֵי often refers broadly to the deeds
    or affairs of a king, not merely his spoken words. 'Acts' best matches the historiographical
    sense in context.
- source_word: יְחִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Standard English transliteration of the personal name.
- source_word: וַחֲסָדָיו
  chosen: his faithful deeds
  alternatives:
  - his acts of covenant faithfulness
  - his good deeds
  - his loyal acts
  lexicon: HALOT
  rationale: חֶסֶד can denote covenant loyalty, faithful love, or loyal kindness.
    Here, referring to Hezekiah's conduct, 'faithful deeds' communicates concrete
    acts marked by loyalty/faithfulness without overstating covenantal theology in
    the main text. The more literal covenantal nuance is preserved among alternatives.
- source_word: הִנָּם
  chosen: behold, they are
  alternatives:
  - indeed they are
  - they are
  lexicon: HALOT
  rationale: הִנָּם is a presentational particle drawing attention to what follows.
    'Behold' preserves the rhetorical force, though slightly elevated; it fits the
    formal register of a royal chronicle summary.
- source_word: כְּתוּבִים
  chosen: written
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: Passive participle meaning 'written' or 'recorded.' 'Written' is the
    straightforward rendering and suits the citation formula.
- source_word: בַּחֲזוֹן
  chosen: in the vision
  alternatives:
  - in the record
  - in the prophecy
  lexicon: HALOT
  rationale: חָזוֹן ordinarily means 'vision.' Although it may refer metonymically
    to a prophetic written record, the primary sense should be preserved in translation.
- source_word: יְשַׁעְיָהוּ בֶן אָמוֹץ הַנָּבִיא
  chosen: Isaiah son of Amoz, the prophet
  alternatives:
  - Isaiah the prophet son of Amoz
  rationale: Standard rendering of the prophetic attribution, preserving both lineage
    and office.
- source_word: עַל
  chosen: in
  alternatives:
  - upon
  - concerning/in
  lexicon: HALOT
  rationale: Although עַל commonly means 'on/upon,' in this bibliographic formula
    it links one written source with another source/book. English 'in the Book...'
    communicates the sense more naturally than a wooden 'upon the Book...'.
- source_word: סֵפֶר מַלְכֵי יְהוּדָה וְיִשְׂרָאֵל
  chosen: the Book of the Kings of Judah and Israel
  alternatives:
  - the book of the kings of Judah and Israel
  - the annals of the kings of Judah and Israel
  lexicon: HALOT
  rationale: סֵפֶר is 'book/document.' The construct phrase names a source work. Capitalizing
    'Book' is acceptable for a titled source. 'Annals' is interpretive and therefore
    left as an alternative rather than the main text.
