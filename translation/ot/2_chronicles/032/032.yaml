theological_decisions:
- issue: Nuance of חֶסֶד when applied to Hezekiah's actions
  chosen_reading: Rendered as 'faithful deeds'
  alternative_readings:
  - acts of covenant faithfulness
  - good deeds
  - loyal acts
  rationale: The term carries ethical and relational loyalty overtones. Because the
    subject is a human king rather than directly God's covenant love, 'faithful deeds'
    preserves the positive moral sense without importing a stronger technical covenantal
    claim than the context requires.
  doctrine_reference: Translation philosophy §1, §3, §5
