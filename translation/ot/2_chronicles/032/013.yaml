theological_decisions:
- issue: Reference of 'gods' in a pagan king's boast
  chosen_reading: Render אֱלֹהֵי straightforwardly as 'gods' without qualification.
  alternative_readings:
  - Render as 'so-called gods'
  rationale: The speaker is Sennacherib, whose rhetoric compares the deities of conquered
    nations with Judah's God. The translation should reflect his claim without importing
    theological commentary into the text.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
