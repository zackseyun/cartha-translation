id: 2CH.32.13
reference: 2 Chronicles 32:13
source:
  edition: WLC
  text: הֲ/לֹ֣א תֵדְע֗וּ מֶ֤ה עָשִׂ֨יתִי֙ אֲנִ֣י וַ/אֲבוֹתַ֔/י לְ/כֹ֖ל עַמֵּ֣י הָ/אֲרָצ֑וֹת
    הֲ/יָכ֣וֹל יָֽכְל֗וּ אֱלֹהֵי֙ גּוֹיֵ֣ הָ/אֲרָצ֔וֹת לְ/הַצִּ֥יל אֶת אַרְצָ֖/ם מִ/יָּדִֽ/י־׃
translation:
  text: Do you not know what I and my fathers have done to all the peoples of the
    lands? Were the gods of the nations of the lands at all able to deliver their
    land from my hand?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my ancestors' for 'my fathers.' The Hebrew uses dynastic family language.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Do you not
  alternatives:
  - Do you not indeed
  - Have you not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Do you not' is
    natural modern English and preserves the force better than a stiffer literalism.
- source_word: תֵדְעוּ
  chosen: know
  alternatives:
  - understand
  - recognize
  lexicon: HALOT
  rationale: ידע commonly means 'know.' In this taunt context, simple cognitive awareness
    is primary.
- source_word: מֶה עָשִׂיתִי
  chosen: what I ... have done
  alternatives:
  - what I did
  - what I have accomplished
  lexicon: HALOT
  rationale: The perfect refers to completed actions with present rhetorical relevance;
    English present perfect communicates that force well in context.
- source_word: אֲנִי וַאֲבוֹתַי
  chosen: I and my fathers
  alternatives:
  - I and my ancestors
  lexicon: HALOT
  rationale: Retains the familial/dynastic language of the Hebrew. 'Fathers' is idiomatic
    for royal predecessors here and keeps the source texture better than the more
    interpretive 'ancestors.'
- source_word: לְכֹל עַמֵּי הָאֲרָצוֹת
  chosen: to all the peoples of the lands
  alternatives:
  - against all the peoples of the lands
  - to all the peoples of the countries
  - to all the peoples of the earth
  lexicon: HALOT
  rationale: The phrase refers to the various peoples inhabiting different lands/regions.
    'Of the lands' preserves the plural concrete sense better than flattening to 'earth.'
    The preposition ל here is best represented idiomatically with 'to' after 'done,'
    though the hostile sense is understood from context.
- source_word: הֲיָכוֹל יָכְלוּ
  chosen: Were ... at all able
  alternatives:
  - Could ... possibly
  - Were ... able indeed
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the question. 'At
    all able' captures the emphatic force without sounding wooden.
- source_word: אֱלֹהֵי גּוֹיֵ הָאֲרָצוֹת
  chosen: the gods of the nations of the lands
  alternatives:
  - the gods of the peoples of the lands
  - the gods of the nations of those lands
  lexicon: HALOT
  rationale: This is a genitival chain referring to the deities worshiped by the nations
    in those lands. 'Nations' is a standard rendering for גוי here and fits the political
    taunt.
- source_word: לְהַצִּיל
  chosen: to deliver
  alternatives:
  - to rescue
  - to save
  lexicon: HALOT
  rationale: נצל in military-threat contexts often means 'deliver' or 'rescue.' 'Deliver'
    is both natural and suitably weighty.
- source_word: אֶת אַרְצָם
  chosen: their land
  alternatives:
  - their country
  lexicon: HALOT
  rationale: Singular 'land' with plural suffix is well represented by 'their land,'
    referring collectively to each nation's territory.
- source_word: מִיָדִי
  chosen: from my hand
  alternatives:
  - out of my hand
  - from my power
  lexicon: HALOT
  rationale: The idiom 'from my hand' is transparent in English and preserves the
    metaphor of power/control.
