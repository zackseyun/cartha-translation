id: 2CH.32.29
reference: 2 Chronicles 32:29
source:
  edition: WLC
  text: וְ/עָרִים֙ עָ֣שָׂה ל֔/וֹ וּ/מִקְנֵה צֹ֥אן וּ/בָקָ֖ר לָ/רֹ֑ב כִּ֤י נָֽתַן ל/וֹ֙
    אֱלֹהִ֔ים רְכ֖וּשׁ רַ֥ב מְאֹֽד־־׃
translation:
  text: He also made cities for himself, and acquired flocks and herds in abundance,
    for God had given him very great wealth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'property' or 'possessions' for 'wealth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָרִים
  chosen: He also made cities
  alternatives:
  - and cities
  - and he made cities
  - he made towns
  lexicon: HALOT
  rationale: The conjunction links this verse with the preceding description of Hezekiah's
    prosperity; English 'He also made' brings the additive force naturally. עָרִים
    is the common plural for 'cities/towns'; 'cities' is retained as the more direct
    gloss.
- source_word: עָשָׂה לוֹ
  chosen: made ... for himself
  alternatives:
  - made for him
  - built for himself
  - established for himself
  lexicon: HALOT
  rationale: 'עָשָׂה commonly means ''make/do,'' and with לּוֹ here indicates benefit
    or possession. ''For himself'' reflects the reflexive sense in context: these
    cities belonged to Hezekiah.'
- source_word: וּמִקְנֵה
  chosen: and acquired
  alternatives:
  - and livestock
  - and possessions of
  lexicon: HALOT
  rationale: מִקְנֶה denotes livestock/cattle holdings. Because the following nouns
    specify the animals ('flocks and herds'), rendering the term separately as a noun
    would be clumsy in English. 'Acquired' captures the sense of having livestock
    holdings, smoothing the Hebrew nominal construction into natural English while
    preserving meaning.
- source_word: צֹאן וּבָקָר
  chosen: flocks and herds
  alternatives:
  - sheep and cattle
  - small livestock and cattle
  lexicon: HALOT
  rationale: צֹאן refers collectively to small livestock, especially sheep/goats,
    and בָּקָר to cattle. 'Flocks and herds' is idiomatic English that preserves the
    distinction without over-specifying species.
- source_word: לָרֹב
  chosen: in abundance
  alternatives:
  - in great number
  - abundantly
  - for many
  lexicon: HALOT
  rationale: The phrase indicates large quantity. 'In abundance' is natural English
    and fits both the livestock phrase and the broader prosperity theme.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: כִּי introduces the reason for Hezekiah's abundance. 'For' gives a concise
    causal connection in literary English.
- source_word: נָתַן לוֹ אֱלֹהִים
  chosen: God had given him
  alternatives:
  - God gave him
  - God had bestowed on him
  lexicon: HALOT
  rationale: 'The Hebrew perfect can be rendered as simple past, but English past
    perfect fits the explanatory force: his prosperity existed because God had already
    given it. אֱלֹהִים here clearly refers to the God of Israel, so ''God'' is appropriate.'
- source_word: רְכוּשׁ
  chosen: wealth
  alternatives:
  - property
  - possessions
  - substance
  lexicon: HALOT
  rationale: רְכוּשׁ denotes property or material goods. 'Wealth' best conveys the
    broad sense of substantial possessions in this context of royal prosperity.
- source_word: רַב מְאֹד
  chosen: very great
  alternatives:
  - exceedingly much
  - very abundant
  - great indeed
  lexicon: HALOT
  rationale: The adjective plus intensifier expresses exceptional magnitude. 'Very
    great' is straightforward and preserves the emphasis without sounding archaic.
