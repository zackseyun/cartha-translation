theological_decisions:
- issue: Agency behind Hezekiah's prosperity
  chosen_reading: The verse explicitly attributes Hezekiah's great wealth to God's
    gift.
  rationale: The clause כִּי נָתַן לוֹ אֱלֹהִים directly states divine agency. The
    translation preserves this without expanding into a broader prosperity theology
    beyond the verse's claim.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
