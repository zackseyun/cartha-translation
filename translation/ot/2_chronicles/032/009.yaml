id: 2CH.32.9
reference: 2 Chronicles 32:9
source:
  edition: WLC
  text: אַ֣חַר זֶ֗ה שָׁ֠לַח סַנְחֵרִ֨יב מֶֽלֶךְ אַשּׁ֤וּר עֲבָדָי/ו֙ יְר֣וּשָׁלַ֔יְמָ/ה
    וְ/הוּא֙ עַל לָכִ֔ישׁ וְ/כָל מֶמְשַׁלְתּ֖/וֹ עִמּ֑/וֹ עַל יְחִזְקִיָּ֨הוּ֙ מֶ֣לֶךְ
    יְהוּדָ֔ה וְ/עַל כָּל יְהוּדָ֛ה אֲשֶׁ֥ר בִּ/ירוּשָׁלִַ֖ם לֵ/אמֹֽר־־־־־־׃
translation:
  text: After this, Sennacherib king of Assyria sent his servants to Jerusalem—while
    he was before Lachish with all his dominion with him—against Hezekiah king of
    Judah and against all Judah who were in Jerusalem, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while he was against Lachish' or 'while he was besieging Lachish.' The
      Hebrew says literally 'upon/against Lachish,' a military expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'with all his forces with him.' The Hebrew 'all his dominion' may refer
      either to his imperial rule/realm or, in context, the full power under his command.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַר זֶה
  chosen: After this
  alternatives:
  - After these things
  - Later
  lexicon: HALOT
  rationale: A standard temporal transition. 'After this' is natural modern English
    and preserves the sequence without unnecessary expansion.
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: The basic sense is 'sent.' 'Dispatched' is possible but slightly more
    stylized than needed.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his servants/slaves
  lexicon: HALOT
  rationale: In royal diplomatic context, עבד often refers to royal servants or officials.
    'Servants' preserves the lexical form and remains idiomatic; 'officials' is interpretive,
    and 'slaves' is not demanded by this context.
- source_word: יְרוּשָׁלַיְמָה
  chosen: to Jerusalem
  alternatives:
  - toward Jerusalem
  lexicon: HALOT
  rationale: The directional he indicates motion toward a place. 'To Jerusalem' is
    the most natural English rendering.
- source_word: וְהוּא עַל לָכִישׁ
  chosen: while he was before Lachish
  alternatives:
  - while he was against Lachish
  - while he was at Lachish
  - while he was besieging Lachish
  lexicon: HALOT
  rationale: The preposition עַל with a city in military context commonly indicates
    hostile position against it. 'Before Lachish' preserves the military posture without
    over-specifying the exact action; 'besieging' is plausible from context but more
    interpretive than the Hebrew wording itself.
- source_word: וְכָל מֶמְשַׁלְתּוֹ עִמּוֹ
  chosen: with all his dominion with him
  alternatives:
  - with all his forces with him
  - with all his realm with him
  - and all his power was with him
  lexicon: HALOT
  rationale: מֶמְשָׁלָה denotes rule, dominion, or realm. In this military setting
    it may imply the full imperial power/forces accompanying him. 'Dominion' stays
    closer to the noun's core sense, though somewhat unusual in English; the repetition
    'with him' is retained because it is present in the Hebrew.
- source_word: עַל יְחִזְקִיָּהוּ ... וְעַל כָּל יְהוּדָה
  chosen: against Hezekiah ... and against all Judah
  alternatives:
  - to Hezekiah ... and to all Judah
  lexicon: HALOT
  rationale: The repeated עַל in this hostile diplomatic context is best rendered
    'against,' indicating the message is directed adversarially toward Hezekiah and
    Judah, not merely addressed neutrally to them.
- source_word: אֲשֶׁר בִּירוּשָׁלִַם
  chosen: who were in Jerusalem
  alternatives:
  - that was in Jerusalem
  - who were at Jerusalem
  lexicon: HALOT
  rationale: This qualifies 'all Judah' as the Judeans present in Jerusalem. 'Who
    were in Jerusalem' is clear and idiomatic.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: Standard introduction to direct speech in the following verse; rendered
    conventionally as 'saying,'.
