id: 2CH.32.3
reference: 2 Chronicles 32:3
source:
  edition: WLC
  text: וַ/יִּוָּעַ֗ץ עִם שָׂרָי/ו֙ וְ/גִבֹּרָ֔י/ו לִ/סְתּוֹם֙ אֶת מֵימֵ֣י הָ/עֲיָנ֔וֹת
    אֲשֶׁ֖ר מִ/ח֣וּץ לָ/עִ֑יר וַֽ/יַּעְזְרֽוּ/הוּ־־׃
translation:
  text: And he consulted with his officials and his mighty men about stopping up the
    waters of the springs that were outside the city, and they helped him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he took counsel with his officials and his mighty men to stop up the
      spring waters outside the city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּעַץ
  chosen: he consulted
  alternatives:
  - he took counsel
  - he deliberated
  lexicon: HALOT
  rationale: The Niphal of יעץ here denotes seeking or taking counsel with others.
    'He consulted' is natural modern English and preserves the collaborative sense
    better than the more archaic 'took counsel.'
- source_word: שָׂרָיו
  chosen: his officials
  alternatives:
  - his princes
  - his commanders
  - his leaders
  lexicon: HALOT
  rationale: שַׂר can denote a ruler, official, commander, or prince depending on
    context. In this administrative-military setting, 'officials' best captures the
    broader governing role without implying royalty as 'princes' might.
- source_word: גִבֹּרָיו
  chosen: his mighty men
  alternatives:
  - his warriors
  - his strong men
  - his valiant men
  lexicon: HALOT
  rationale: גִּבּוֹר often refers to a mighty man or warrior. 'Mighty men' preserves
    the Hebrew idiom and likely military nuance, while remaining understandable in
    English.
- source_word: לִסְתּוֹם
  chosen: about stopping up
  alternatives:
  - to stop up
  - to block
  - to shut off
  lexicon: HALOT
  rationale: The infinitive expresses the purpose/content of the consultation. 'About
    stopping up' fits idiomatic English after 'consulted with ... about.' 'Stopping
    up' reflects the physical blocking of water sources.
- source_word: מֵימֵי הָעֲיָנוֹת
  chosen: the waters of the springs
  alternatives:
  - the spring waters
  - the waters of the fountains
  lexicon: HALOT
  rationale: The construct phrase is most directly rendered 'the waters of the springs.'
    'Springs' is preferable to 'fountains' in this geographical context.
- source_word: אֲשֶׁר מִחוּץ לָעִיר
  chosen: that were outside the city
  alternatives:
  - that were outside the town
  - which were beyond the city
  lexicon: HALOT
  rationale: This relative clause locates the springs beyond the city perimeter. 'Outside
    the city' is the clearest natural rendering.
- source_word: וַיַּעְזְרֻהוּ
  chosen: and they helped him
  alternatives:
  - and they supported him
  - and they assisted him
  lexicon: HALOT
  rationale: The verb עזר with 3ms suffix straightforwardly means they gave him help.
    'Helped him' is simple and accurate; the plural subject refers back to the officials
    and mighty men.
