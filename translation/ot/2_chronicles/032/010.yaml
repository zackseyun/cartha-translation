id: 2CH.32.10
reference: 2 Chronicles 32:10
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֔ר סַנְחֵרִ֖יב מֶ֣לֶךְ אַשּׁ֑וּר עַל מָה֙ אַתֶּ֣ם בֹּטְחִ֔ים וְ/יֹשְׁבִ֥ים
    בְּ/מָצ֖וֹר בִּ/ירוּשָׁלִָֽם־׃
translation:
  text: 'Thus says Sennacherib king of Assyria: On what are you trusting, that you
    remain under siege in Jerusalem?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'On what do you trust and sit in siege in Jerusalem?'
      The Hebrew uses participles ('trusting,' 'sitting/remaining') for the people's
      ongoing condition.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Standard prophetic/messenger formula. Present-tense English ('says')
    best reflects the conventional direct-speech introduction in context.
- source_word: סַנְחֵרִיב
  chosen: Sennacherib
  rationale: Personal name is transliterated by standard English convention, per translation
    philosophy.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: king of Assyria
  alternatives:
  - the king of Assyria
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly. Article omitted in English
    because the proper-name complement makes the title definite enough in apposition
    to the name.
- source_word: עַל מָה
  chosen: On what
  alternatives:
  - Why
  - In what
  lexicon: HALOT
  rationale: More formally preserves the Hebrew preposition על with interrogative
    מה, introducing the object/basis of trust rather than merely the reason.
- source_word: אַתֶּם בֹּטְחִים
  chosen: are you trusting
  alternatives:
  - do you trust
  - are you confident
  lexicon: HALOT
  rationale: בטח denotes trust/reliance. Progressive English keeps the rhetorical
    immediacy of the participial form, though simple present would also be possible.
- source_word: וְיֹשְׁבִים
  chosen: that you remain
  alternatives:
  - and sit
  - and stay
  - while remaining
  lexicon: HALOT
  rationale: ישב literally means 'sit/dwell/remain.' In this military context, idiomatic
    English prefers 'remain' rather than the wooden 'sit,' while still conveying continued
    condition.
- source_word: בְּמָצוֹר
  chosen: under siege
  alternatives:
  - in siege
  - in the siege
  - in a besieged state
  lexicon: HALOT
  rationale: מצור is a siege/siege-state. English idiom is 'under siege,' which accurately
    conveys the military circumstance.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  rationale: Standard rendering of the place name with preposition.
