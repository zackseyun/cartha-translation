id: 2CH.32.28
reference: 2 Chronicles 32:28
source:
  edition: WLC
  text: וּ/מִ֨סְכְּנ֔וֹת לִ/תְבוּאַ֥ת דָּגָ֖ן וְ/תִיר֣וֹשׁ וְ/יִצְהָ֑ר וְ/אֻֽרָוֺת֙
    לְ/כָל בְּהֵמָ֣ה וּ/בְהֵמָ֔ה וַ/עֲדָרִ֖ים לָ/אֲוֵרֽוֹת־׃
translation:
  text: storehouses for the produce of grain, new wine, and oil, and stalls for every
    kind of animal, and flocks in folds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'storage cities' for מִסְכְּנוֹת, if the term is taken more literally
      as larger storage complexes rather than simply storehouses.
    reason: lexical_alternative
  - marker: b
    text: '''New wine'' translates תִירוֹשׁ, a term often distinguished from more
      general words for wine in agricultural lists.'
    reason: lexical_alternative
  - marker: c
    text: Or 'pens' or 'enclosures' for 'folds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְכְּנוֹת
  chosen: storehouses
  alternatives:
  - storage cities
  - stores
  lexicon: HALOT
  rationale: In this provisioning context, the noun refers to storage facilities for
    agricultural produce. 'Storehouses' is natural English and fits the following
    lamed phrase 'for the produce of...' better than the more literal but contextually
    awkward 'storage cities.'
- source_word: תְבוּאַת
  chosen: produce of
  alternatives:
  - yield of
  - harvest of
  lexicon: HALOT
  rationale: The construct denotes agricultural produce or yield. 'Produce of' is
    idiomatic with the following list of grain, wine, and oil.
- source_word: דָּגָן
  chosen: grain
  alternatives:
  - corn
  - cereal
  lexicon: HALOT
  rationale: Standard rendering for cereal crops in biblical agricultural lists; 'corn'
    is misleading in modern English.
- source_word: תִירוֹשׁ
  chosen: new wine
  alternatives:
  - wine
  - fresh wine
  lexicon: HALOT
  rationale: The term commonly denotes freshly produced wine in stock agricultural
    triads ('grain, new wine, and oil'). 'New wine' preserves the conventional lexical
    distinction from more general terms for wine.
- source_word: יִצְהָר
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: In this triad the term refers specifically to oil, usually olive oil.
    'Oil' is concise and standard; 'olive oil' is a possible explanatory alternative.
- source_word: אֻרָוֹת
  chosen: stalls
  alternatives:
  - stables
  - mangers
  lexicon: HALOT
  rationale: The plural denotes places for housing or feeding animals. 'Stalls' fits
    the broad reference to livestock better than 'mangers' and is less restrictive
    than 'stables.'
- source_word: לְכָל בְּהֵמָה
  chosen: for every kind of animal
  alternatives:
  - for all cattle
  - for every beast
  lexicon: HALOT
  rationale: בְּהֵמָה here is a collective term for domesticated animals/livestock.
    'Every kind of animal' communicates the collective sense in clear modern English
    without narrowing it only to cattle.
- source_word: בְהֵמָה
  chosen: animal
  alternatives:
  - cattle
  - livestock
  lexicon: HALOT
  rationale: The repeated noun continues the livestock theme. Because the Hebrew uses
    a broad domestic-animal term, 'animal' is retained in the main rendering, while
    the overall phrase implies livestock.
- source_word: עֲדָרִים
  chosen: flocks
  alternatives:
  - herds
  lexicon: HALOT
  rationale: The noun commonly refers to flocks, especially small livestock such as
    sheep and goats. 'Flocks' distinguishes it from the broader livestock term earlier
    in the verse.
- source_word: אֲוֵרוֹת
  chosen: folds
  alternatives:
  - pens
  - enclosures
  lexicon: HALOT
  rationale: The term denotes enclosed places for keeping flocks. 'Folds' is a natural
    biblical-English equivalent; 'pens' is possible but slightly more prosaic.
