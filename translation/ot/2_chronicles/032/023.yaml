id: 2CH.32.23
reference: 2 Chronicles 32:23
source:
  edition: WLC
  text: וְ֠/רַבִּים מְבִיאִ֨ים מִנְחָ֤ה לַ/יהוָה֙ לִ/יר֣וּשָׁלִַ֔ם וּ/מִ֨גְדָּנ֔וֹת לִֽ/יחִזְקִיָּ֖הוּ מֶ֣לֶךְ יְהוּדָ֑ה וַ/יִּנַּשֵּׂ֛א לְ/עֵינֵ֥י כָל הַ/גּוֹיִ֖ם מֵ/אַֽחֲרֵי כֵֽן־־׃ס
translation:
  text: And many were bringing an offering to Yahweh in Jerusalem, and choice gifts to Hezekiah king of Judah, and after this he was exalted in the sight of all the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Jerusalem' / 'in Jerusalem.' The Hebrew preposition can be understood as destination or location in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'precious gifts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבִּים
  chosen: many
  alternatives:
  - many people
  lexicon: HALOT
  rationale: The adjective functions substantivally here, referring to a large number of people. 'Many' is concise and natural in English without adding 'people,' though that sense is implied.
- source_word: מְבִיאִים
  chosen: were bringing
  alternatives:
  - brought
  - bringing
  lexicon: HALOT
  rationale: The participle conveys ongoing or characteristic action in past narrative context. 'Were bringing' captures the durative sense better than a simple past.
- source_word: מִנְחָה
  chosen: an offering
  alternatives:
  - tribute
  - gift offering
  lexicon: HALOT
  rationale: מִנְחָה can denote tribute or an offering/gift. Because the recipient is the LORD, 'offering' best fits the cultic-religious sense without over-specifying the type of sacrifice.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.' The preposition marks the LORD as the recipient of the offering.
- source_word: לִירוּשָׁלִַם
  chosen: at Jerusalem
  alternatives:
  - to Jerusalem
  - in Jerusalem
  lexicon: HALOT
  rationale: Although the preposition is formally 'to,' in this context with bringing offerings to the LORD, the phrase indicates the location where the offerings were presented. 'At Jerusalem' reads naturally and preserves the destination/location nuance.
- source_word: מִגְדָּנוֹת
  chosen: choice gifts
  alternatives:
  - precious gifts
  - delicacies
  lexicon: HALOT
  rationale: The noun denotes precious or choice things presented as gifts. 'Choice gifts' preserves the sense of select valuable presents without narrowing to food items.
- source_word: לִיחִזְקִיָּהוּ מֶלֶךְ יְהוּדָה
  chosen: to Hezekiah king of Judah
  alternatives:
  - for Hezekiah king of Judah
  lexicon: HALOT
  rationale: The phrase straightforwardly identifies Hezekiah as the recipient of the gifts and appositionally as king of Judah.
- source_word: וַיִּנַּשֵּׂא
  chosen: he was exalted
  alternatives:
  - he was lifted up
  - he was highly regarded
  lexicon: HALOT
  rationale: The Niphal form expresses being raised or exalted in status/reputation. 'He was exalted' best captures the passive/resultative sense in context.
- source_word: לְעֵינֵי כָל הַגּוֹיִם
  chosen: in the sight of all the nations
  alternatives:
  - in the eyes of all the nations
  - before all the nations
  lexicon: HALOT
  rationale: This idiom refers to public estimation or visibility among the nations. 'In the sight of' is a clear, fairly literal rendering.
- source_word: מֵאַחֲרֵי כֵן
  chosen: after this
  alternatives:
  - afterward
  - after these things
  lexicon: HALOT
  rationale: The expression marks subsequent time relative to the preceding events. 'After this' is natural and sufficiently literal.
