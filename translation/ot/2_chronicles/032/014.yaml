id: 2CH.32.14
reference: 2 Chronicles 32:14
source:
  edition: WLC
  text: מִ֠י בְּֽ/כָל אֱלֹהֵ֞י הַ/גּוֹיִ֤ם הָ/אֵ֨לֶּה֙ אֲשֶׁ֣ר הֶחֱרִ֣ימוּ אֲבוֹתַ֔/י
    אֲשֶׁ֣ר יָכ֔וֹל לְ/הַצִּ֥יל אֶת עַמּ֖/וֹ מִ/יָּדִ֑/י כִּ֤י יוּכַל֙ אֱלֹ֣הֵי/כֶ֔ם
    לְ/הַצִּ֥יל אֶתְ/כֶ֖ם מִ/יָּדִֽ/י־־׃
translation:
  text: Who among all the gods of these nations that my fathers devoted to destruction
    was able to deliver his people from my hand, that your God should be able to deliver
    you from my hand?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that my fathers put under the ban.' The Hebrew verb refers to devoting
      something to destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  alternatives:
  - Which one
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical challenge; 'Who' is the
    natural English equivalent.
- source_word: בְּכָל אֱלֹהֵי הַגּוֹיִם הָאֵלֶּה
  chosen: among all the gods of these nations
  alternatives:
  - of all the gods of these nations
  lexicon: HALOT
  rationale: The preposition ב with כָל in this idiom is best rendered partitivally
    as 'among all.' 'Nations' accurately reflects גּוֹיִם here in the sense of peoples
    outside Judah.
- source_word: אֲשֶׁר הֶחֱרִימוּ אֲבוֹתַי
  chosen: that my fathers devoted to destruction
  alternatives:
  - that my fathers destroyed
  - that my fathers put under the ban
  lexicon: HALOT
  rationale: הֶחֱרִימוּ from חרם refers to devoting something to destruction, not
    merely ordinary destruction. 'Devoted to destruction' preserves the technical
    force without archaic jargon; 'put under the ban' is more literal-traditional
    but less accessible.
- source_word: אֲבוֹתַי
  chosen: my fathers
  alternatives:
  - my ancestors
  lexicon: HALOT
  rationale: Literally 'my fathers.' In royal rhetoric it refers to predecessors/forefathers.
    'My fathers' keeps the source wording and remains understandable.
- source_word: יָכוֹל
  chosen: was able
  alternatives:
  - could
  lexicon: HALOT
  rationale: Expresses capability in past reference within the rhetorical question.
    'Was able' is slightly more formal and fits the taunt.
- source_word: לְהַצִּיל
  chosen: to deliver
  alternatives:
  - to save
  - to rescue
  lexicon: HALOT
  rationale: נצל commonly means deliver/rescue from danger or power. 'Deliver' fits
    the military-political context and echoes biblical diction without being archaic.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - its people
  lexicon: HALOT
  rationale: Although אֱלֹהֵי can be grammatically plural in form, each false god
    is conceived individually in the rhetorical singular introduced by 'Who... was
    able.' English singular personal reference is the most natural rendering.
- source_word: מִיָּדִי
  chosen: from my hand
  alternatives:
  - out of my hand
  - from my power
  lexicon: HALOT
  rationale: The idiom 'from my hand' should be preserved because it is transparent
    in English and retains the metaphor of power/control.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - so that
  lexicon: HALOT
  rationale: 'Here כִּי introduces the result/inference of the rhetorical comparison:
    ''that your God should be able...'' This best captures the taunting logic in English.'
- source_word: יוּכַל אֱלֹהֵיכֶם
  chosen: your God should be able
  alternatives:
  - your God can
  - your God would be able
  lexicon: HALOT
  rationale: The imperfect in this rhetorical question is well represented by 'should
    be able,' conveying incredulity rather than simple futurity.
- source_word: לְהַצִּיל אֶתְכֶם
  chosen: to deliver you
  alternatives:
  - to save you
  - to rescue you
  lexicon: HALOT
  rationale: Same verb as earlier in the verse; rendered consistently as 'deliver'
    per translation philosophy unless context demands otherwise.
