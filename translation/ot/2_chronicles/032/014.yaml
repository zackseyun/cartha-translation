theological_decisions:
- issue: Rendering of חרם in Assyrian royal taunt context
  chosen_reading: devoted to destruction
  alternative_readings:
  - destroyed
  - put under the ban
  rationale: The Hebrew verb carries the notion of consigning to destruction, not
    merely defeating. Using 'devoted to destruction' preserves the semantic weight
    without importing later theological claims beyond the text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Reference to false gods as 'gods'
  chosen_reading: gods
  alternative_readings:
  - so-called gods
  - gods/idols
  rationale: The speaker's rhetoric uses אֱלֹהֵי straightforwardly. The translation
    should not editorialize by adding 'so-called' or substituting 'idols' where the
    Hebrew says 'gods.'
  doctrine_reference: Translation philosophy §1, §3
