id: 2CH.32.7
reference: 2 Chronicles 32:7
source:
  edition: WLC
  text: חִזְק֣וּ וְ/אִמְצ֔וּ אַל תִּֽירְא֣וּ וְ/אַל תֵּחַ֗תּוּ מִ/פְּנֵי֙ מֶ֣לֶךְ
    אַשּׁ֔וּר וּ/מִ/לִּ/פְנֵ֖י כָּל הֶ/הָמ֣וֹן אֲשֶׁר עִמּ֑/וֹ כִּֽי עִמָּ֥/נוּ רַ֖ב
    מֵ/עִמּֽ/וֹ־־־־־׃
translation:
  text: Be strong and courageous. Do not fear or be dismayed before the king of Assyria
    or before all the multitude that is with him, for there are more with us than
    with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the army that is with him.' The Hebrew word can denote a multitude
      or mass of troops in context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for with us is more than with him,' an elliptical comparison
      clarified by the following verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: חִזְקוּ
  chosen: Be strong
  alternatives:
  - Be strengthened
  - Be firm
  lexicon: HALOT
  rationale: Qal imperative plural of חזק in an exhortational context commonly means
    to be strong/strengthen yourselves. 'Be strong' is idiomatic and pairs naturally
    with the following imperative.
- source_word: וְאִמְצוּ
  chosen: and courageous
  alternatives:
  - and be courageous
  - and be strong
  lexicon: HALOT
  rationale: From אמץ, in the stock exhortation חזק ואמץ. In English, 'Be strong and
    courageous' is the most natural rendering of the pair. The verb sense is preserved
    though the second imperative is slightly compressed for style.
- source_word: אַל תִּירְאוּ
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: ירא in the negative imperative is straightforwardly 'fear/be afraid.'
    'Do not fear' is concise and fits the elevated military exhortation.
- source_word: וְאַל תֵּחַתּוּ
  chosen: or be dismayed
  alternatives:
  - or be shattered
  - or be terrified
  - or be discouraged
  lexicon: HALOT
  rationale: חתת in Niphal can denote being broken, shattered, or dismayed. In this
    context of exhortation before military threat, 'be dismayed' best captures the
    emotional force in natural English.
- source_word: מִפְּנֵי
  chosen: before
  alternatives:
  - because of
  - at the presence of
  - in the face of
  lexicon: HALOT
  rationale: Literally 'from the face/presence of,' but in this idiom with fear it
    means in the face of/before. 'Before' is concise and clear.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - the Assyrian king
  lexicon: HALOT
  rationale: Construct phrase rendered directly. 'The king of Assyria' is the most
    transparent English equivalent.
- source_word: וּמִלִּפְנֵי כָּל הֶהָמוֹן אֲשֶׁר עִמּוֹ
  chosen: or before all the multitude that is with him
  alternatives:
  - or before all the army that is with him
  - or before all the horde with him
  lexicon: HALOT
  rationale: הָמוֹן denotes a multitude, crowd, or noisy throng. In military context
    it can refer to the mass of troops, but 'multitude' preserves the lexical breadth
    without over-specifying 'army.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the exhortation; 'for' fits the discourse flow.
- source_word: עִמָּנוּ רַב מֵעִמּוֹ
  chosen: there are more with us than with him
  alternatives:
  - greater is the one with us than the one with him
  - with us is more than with him
  - those with us are more than those with him
  lexicon: HALOT
  rationale: 'The Hebrew is elliptical: literally ''with us [is] more than with him.''
    Since the next verse explains this in terms of forces on each side, English benefits
    from supplying ''there are'' and rendering רַב comparatively as ''more.'' This
    preserves the sense without importing the explicit theological explanation from
    v. 8.'
