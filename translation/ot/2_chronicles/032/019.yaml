theological_decisions:
- issue: Whether to render the speech as directed 'to' or 'against' the God of Jerusalem
  chosen_reading: against
  alternative_readings:
  - to
  rationale: The immediate context is mocking and blasphemous speech by Sennacherib's
    servants. Rendering אֶל idiomatically as 'against' best reflects the hostile force
    without importing extra theology.
  doctrine_reference: Translation philosophy §1, §6
- issue: Whether אֱלֹהֵי יְרוּשָׁלָם should be singular or plural in English
  chosen_reading: the God of Jerusalem
  alternative_readings:
  - the gods of Jerusalem
  rationale: Though morphologically a plural construct form, אֱלֹהִים regularly takes
    singular sense for Israel's God. The contrast with the explicitly man-made pagan
    gods requires the singular here.
  doctrine_reference: Translation philosophy §1, §5
