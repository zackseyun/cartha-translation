id: 2CH.32.19
reference: 2 Chronicles 32:19
source:
  edition: WLC
  text: וַֽ/יְדַבְּר֔וּ אֶל אֱלֹהֵ֖י יְרוּשָׁלִָ֑ם כְּ/עַ֗ל אֱלֹהֵי֙ עַמֵּ֣י הָ/אָ֔רֶץ
    מַעֲשֵׂ֖ה יְדֵ֥י הָ/אָדָֽם־׃ס
translation:
  text: And they spoke against the God of Jerusalem as against the gods of the peoples
    of the earth, the work of human hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they spoke to the God of Jerusalem as they did against the gods of the
      peoples of the earth.' The Hebrew preposition can be rendered more literally
      as 'to,' but the context indicates hostile speech.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the work of the hands of man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבְּרוּ
  chosen: they spoke
  alternatives:
  - they spoke out
  - they talked
  lexicon: HALOT
  rationale: The verb דבר in the piel commonly means 'speak.' The broader context
    (the Assyrian officials' blasphemous speech) gives it a hostile force, but that
    hostility is more directly conveyed by the following prepositional phrase than
    by overtranslating the verb itself.
- source_word: אֶל
  chosen: against
  alternatives:
  - to
  lexicon: HALOT
  rationale: Although אֶל normally means 'to,' in this context with hostile speech
    it is best rendered idiomatically as 'against,' matching the sense of speaking
    in opposition or contempt toward the God of Jerusalem.
- source_word: אֱלֹהֵי יְרוּשָׁלָם
  chosen: the God of Jerusalem
  alternatives:
  - the gods of Jerusalem
  lexicon: HALOT
  rationale: The construct form אֱלֹהֵי can be singular in sense when referring to
    the God of a place or people. Context clearly points to Israel's one God, contrasted
    with the pagan gods of the nations.
- source_word: כְּעַל
  chosen: as against
  alternatives:
  - like
  - as concerning
  lexicon: HALOT
  rationale: 'The combination expresses comparison with the manner of their speech:
    they spoke against the God of Jerusalem in the same way they spoke against other
    gods. ''As against'' preserves both comparison and hostility.'
- source_word: אֱלֹהֵי עַמֵּי הָאָרֶץ
  chosen: the gods of the peoples of the earth
  alternatives:
  - the gods of the peoples of the land
  - the gods of the nations of the earth
  lexicon: HALOT
  rationale: Here אֱלֹהֵי is plainly plural in sense. עַמֵּי הָאָרֶץ refers broadly
    to the peoples/nations of the earth, not merely one local land. 'Peoples of the
    earth' preserves the Hebrew wording while remaining natural English.
- source_word: מַעֲשֵׂה יְדֵי הָאָדָם
  chosen: the work of human hands
  alternatives:
  - a work of man's hands
  - the work of the hands of man
  lexicon: HALOT
  rationale: This idiom denotes idols as man-made objects. 'Human hands' communicates
    the generic force of הָאָדָם naturally in English while preserving the contrast
    between the living God and manufactured gods.
- source_word: הָאָדָם
  chosen: human
  alternatives:
  - man
  lexicon: HALOT
  rationale: Per the translation philosophy on אָדָם, the term may be rendered 'man'
    or 'humankind' depending on context. Here it is generic rather than male-specific,
    so 'human' is the most accurate natural modifier in English.
