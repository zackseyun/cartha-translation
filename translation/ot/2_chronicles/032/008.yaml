- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the contrast between human and divine aid
  chosen_reading: Explicit adversative 'but with us is the LORD our God'
  alternative_readings:
  - Coordinate 'and with us is the LORD our God'
  rationale: The verse sets human military power over against covenantal divine help. Making the contrast explicit reflects the rhetoric without adding doctrinal content beyond the text.
