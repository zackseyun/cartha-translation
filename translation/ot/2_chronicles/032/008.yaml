id: 2CH.32.8
reference: 2 Chronicles 32:8
source:
  edition: WLC
  text: עִמּ/וֹ֙ זְר֣וֹעַ בָּשָׂ֔ר וְ/עִמָּ֜/נוּ יְהוָ֤ה אֱלֹהֵ֨י/נוּ֙ לְ/עָזְרֵ֔/נוּ וּ/לְ/הִלָּחֵ֖ם מִלְחֲמֹתֵ֑/נוּ וַ/יִּסָּמְכ֣וּ הָ/עָ֔ם עַל דִּבְרֵ֖י יְחִזְקִיָּ֥הוּ מֶֽלֶךְ יְהוּדָֽה־־׃פ
translation:
  text: With him is an arm of flesh, but with us is Yahweh our God, to help us and to fight our battles. And the people relied on the words of Hezekiah king of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'human strength' for 'an arm of flesh'; the Hebrew keeps the metaphor of merely human power in contrast to the LORD's help.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִמּוֹ
  chosen: with him
  alternatives:
  - on his side
  lexicon: HALOT
  rationale: The preposition with pronominal suffix straightforwardly expresses association/support. 'With him' preserves the parallel with 'with us' in the next clause better than the more interpretive 'on his side.'
- source_word: זְרוֹעַ בָּשָׂר
  chosen: an arm of flesh
  alternatives:
  - a fleshly arm
  - human strength
  lexicon: HALOT
  rationale: This idiom contrasts merely human power with divine aid. 'An arm of flesh' keeps the Hebrew imagery and allusive force, while remaining intelligible in English. 'Human strength' captures the sense but loses the metaphor, so it is preserved as an alternative rather than used in the main text.
- source_word: וְעִמָּנוּ
  chosen: but with us
  alternatives:
  - and with us
  lexicon: HALOT
  rationale: The conjunction marks a strong contrast between the Assyrian king's merely human resources and Judah's divine help. Rendering it as 'but' makes the adversative force explicit in natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Standard covenantal expression; 'our God' is the plain and natural rendering.
- source_word: לְעָזְרֵנוּ
  chosen: to help us
  alternatives:
  - for our help
  lexicon: HALOT
  rationale: The infinitive with prefixed ל expresses purpose/result here. 'To help us' is idiomatic and preserves the verbal force.
- source_word: וּלְהִלָּחֵם מִלְחֲמֹתֵינוּ
  chosen: to fight our battles
  alternatives:
  - to wage our wars
  - to fight the battles for us
  lexicon: HALOT
  rationale: 'The infinitive plus cognate accusative intensifies the action: literally ''to fight our wars/battles.'' ''To fight our battles'' is natural English and preserves the martial sense without unnecessary awkwardness. Adding ''for us'' is interpretive because the Hebrew suffix already marks the battles as belonging to Judah.'
- source_word: וַיִּסָּמְכוּ
  chosen: relied on
  alternatives:
  - leaned on
  - took confidence from
  - supported themselves on
  lexicon: HALOT
  rationale: The verb conveys leaning/supporting oneself figuratively, hence trusting or relying. 'Relied on' best fits the context of the people's response to Hezekiah's speech.
- source_word: הָעָם
  chosen: the people
  lexicon: HALOT
  rationale: Collective singular in Hebrew is naturally rendered as the English collective 'the people.'
- source_word: עַל דִּבְרֵי
  chosen: on the words of
  alternatives:
  - in the words of
  - because of the words of
  lexicon: HALOT
  rationale: The preposition עַל with this verb naturally yields 'relied on.' 'Words of' preserves the plural construct and keeps the focus on Hezekiah's spoken assurances.
- source_word: יְחִזְקִיָּהוּ
  chosen: Hezekiah
  alternatives:
  - Hizkiyahu
  lexicon: HALOT
  rationale: Standard English transliteration of the royal name.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Simple construct chain identifying Hezekiah's office and realm; retained in full for clarity and formality.
