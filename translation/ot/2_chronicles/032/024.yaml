id: 2CH.32.24
reference: 2 Chronicles 32:24
source:
  edition: WLC
  text: בַּ/יָּמִ֣ים הָ/הֵ֔ם חָלָ֥ה יְחִזְקִיָּ֖הוּ עַד לָ/מ֑וּת וַ/יִּתְפַּלֵּל֙ אֶל יְהוָ֔ה וַ/יֹּ֣אמֶר ל֔/וֹ וּ/מוֹפֵ֖ת נָ֥תַן לֽ/וֹ־־׃
translation:
  text: In those days Hezekiah became sick to the point of death, and he prayed to Yahweh, and he answered him and gave him a sign.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and he said to him.' The Hebrew verb is 'said,' but here it carries the sense of the LORD's response to Hezekiah's prayer.
    reason: lexical_alternative
  - marker: b
    text: Or 'wonder' or 'portent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  chosen: In those days
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: A standard temporal expression. 'In those days' preserves the Hebrew idiom naturally in English.
- source_word: חָלָה
  chosen: became sick
  alternatives:
  - was sick
  - fell ill
  lexicon: HALOT
  rationale: The verb denotes becoming ill. 'Became sick' reflects the verbal event better than the stative 'was sick'.
- source_word: עַד לָמוּת
  chosen: to the point of death
  alternatives:
  - unto death
  - even to die
  lexicon: HALOT
  rationale: This idiom indicates severity approaching death. 'To the point of death' is clear modern English and preserves the force without archaic phrasing.
- source_word: וַיִּתְפַּלֵּל אֶל יְהוָה
  chosen: and he prayed to the LORD
  alternatives:
  - and he prayed to Yahweh
  lexicon: HALOT
  rationale: The verb is the standard term for prayer. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: וַיֹּאמֶר לוֹ
  chosen: and he answered him
  alternatives:
  - and he spoke to him
  - and he said to him
  lexicon: HALOT
  rationale: Although the consonantal text literally reads 'and he said to him,' in this context the subject is the LORD responding to Hezekiah's prayer, and the parallel in 2 Kings 20:1–11 / Isaiah 38 supports the sense 'answered him.' This is an optimal-equivalence rendering of the contextual force.
- source_word: מוֹפֵת
  chosen: sign
  alternatives:
  - wonder
  - miraculous sign
  - portent
  lexicon: HALOT
  rationale: מוֹפֵת can mean sign, wonder, or portent. Here it refers to the confirming miracle given to Hezekiah, so 'sign' best fits the narrative context and remains accessible.
- source_word: נָתַן לוֹ
  chosen: gave him
  alternatives:
  - granted him
  lexicon: HALOT
  rationale: A straightforward rendering of נתן with indirect object suffix.
