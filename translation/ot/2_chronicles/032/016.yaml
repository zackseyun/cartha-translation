theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of עבד for Hezekiah
  chosen_reading: his servant
  alternative_readings:
  - his slave
  rationale: Although עבד can mean 'slave,' the context presents Hezekiah in a covenantal and royal relationship to the LORD. 'Servant' better reflects the theological register without importing a stronger social nuance than the context requires.
