id: 2CH.32.16
reference: 2 Chronicles 32:16
source:
  edition: WLC
  text: וְ/עוֹד֙ דִּבְּר֣וּ עֲבָדָ֔י/ו עַל יְהוָ֖ה הָ/אֱלֹהִ֑ים וְ/עַ֖ל יְחִזְקִיָּ֥הוּ עַבְדּֽ/וֹ־׃
translation:
  text: And his servants spoke further against Yahweh God and against his servant Hezekiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spoke more about the LORD God and about his servant Hezekiah'; the Hebrew preposition can sometimes be rendered more neutrally, but here the context favors the hostile sense 'against.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעוֹד
  chosen: And further
  alternatives:
  - And more
  - And again
  - Still
  lexicon: HALOT
  rationale: The conjunction plus adverb continues the narrative and adds escalation. 'And further' is natural English and preserves the sense that additional hostile speech followed.
- source_word: דִּבְּרוּ
  chosen: spoke
  alternatives:
  - said
  - spoke out
  lexicon: HALOT
  rationale: The verb דבר in the piel commonly means 'speak.' 'Spoke' is the most direct rendering here and works with the following prepositional phrases.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his servants/slaves
  lexicon: HALOT
  rationale: The noun עבד can denote servant, slave, or official depending on context. Here it refers to the agents of the Assyrian king in an official capacity. 'Servants' is the most straightforward and idiomatic rendering in this royal context; 'slaves' would overstate bonded status, and 'officials' would narrow the term beyond the Hebrew.
- source_word: עַל
  chosen: against
  alternatives:
  - concerning
  - about
  lexicon: HALOT
  rationale: With דבר, על can mean 'against' in hostile contexts. Since the verse describes blasphemous and antagonistic speech toward the LORD and Hezekiah, 'against' best captures the adversative force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: The article is present in Hebrew, but in English 'the LORD God' is the natural equivalent for the divine title sequence יהוה האלהים. Retaining 'God' after 'the LORD' preserves the appositional force without awkwardness.
- source_word: וְעַל
  chosen: and against
  alternatives:
  - and concerning
  lexicon: HALOT
  rationale: The repeated preposition links a second object of the hostile speech. 'And against' preserves the parallelism and antagonistic sense.
- source_word: יְחִזְקִיָּהוּ
  chosen: Hezekiah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: Here עבדו refers to Hezekiah as the LORD's servant, a royal-theological designation of loyal service rather than emphasis on chattel status. 'His servant' is the best contextual rendering and preserves the covenantal relationship.
