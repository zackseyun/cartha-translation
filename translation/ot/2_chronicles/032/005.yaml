id: 2CH.32.5
reference: 2 Chronicles 32:5
source:
  edition: WLC
  text: וַ/יִּתְחַזַּ֡ק וַ/יִּבֶן֩ אֶת כָּל הַ/חוֹמָ֨ה הַ/פְּרוּצָ֜ה וַ/יַּ֣עַל עַל
    הַ/מִּגְדָּל֗וֹת וְ/לַ/ח֨וּצָ/ה֙ הַ/חוֹמָ֣ה אַחֶ֔רֶת וַ/יְחַזֵּ֥ק אֶת הַ/מִּלּ֖וֹא
    עִ֣יר דָּוִ֑יד וַ/יַּ֥עַשׂ שֶׁ֛לַח לָ/רֹ֖ב וּ/מָגִנִּֽים־־־־׃
translation:
  text: And he strengthened himself, and built up all the wall that was broken down,
    and raised it up to the towers, and outside he built another wall, and he strengthened
    the Millo of the city of David, and made weapons and shields in abundance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the terrace' or 'the fill' for 'the Millo,' likely a fortified earthwork
      or supporting structure in Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: Or 'missiles,' 'darts,' or 'javelins' for 'weapons.' The Hebrew term is
      broader than one specific kind of armament.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְחַזַּק
  chosen: he strengthened himself
  alternatives:
  - he took courage
  - he became strong
  lexicon: HALOT
  rationale: The Hitpael of חזק here is reflexive, describing Hezekiah's resolute
    action in preparation for defense. 'Strengthened himself' preserves the reflexive
    force better than the more interpretive 'took courage,' while still sounding natural
    enough in context.
- source_word: וַיִּבֶן ... כָּל הַחוֹמָה הַפְּרוּצָה
  chosen: built up all the wall that was broken down
  alternatives:
  - rebuilt all the broken wall
  - built all the breached wall
  lexicon: HALOT
  rationale: The clause describes repair/restoration of damaged fortifications. 'Built
    up' captures the construction sense of בנה, and 'that was broken down' reflects
    the passive/resultative sense of פְּרוּצָה without overtechnical military wording.
- source_word: הַפְּרוּצָה
  chosen: that was broken down
  alternatives:
  - breached
  - broken through
  lexicon: HALOT
  rationale: From פרץ, the adjective denotes a wall with gaps/breaches. 'Breached'
    is concise and militarily precise, but 'broken down' is more accessible modern
    English while still accurate.
- source_word: וַיַּעַל עַל הַמִּגְדָּלוֹת
  chosen: raised it up to the towers
  alternatives:
  - raised towers upon it
  - built up as far as the towers
  lexicon: HALOT
  rationale: The Hebrew is compressed and somewhat difficult. The sense is that the
    wall was heightened in relation to the towers. 'Raised it up to the towers' preserves
    the likely object from the previous clause and avoids overcommitting to a more
    reconstructed reading.
- source_word: וְלַחוּצָה הַחוֹמָה אַחֶרֶת
  chosen: and outside he built another wall
  alternatives:
  - and on the outside another wall
  - and outwardly another wall
  lexicon: HALOT
  rationale: לַחוּצָה indicates the outer side/outside. The phrase most naturally
    means an additional outer wall. English requires supplying the verb from context;
    'he built' makes the sense explicit and readable.
- source_word: וַיְחַזֵּק אֶת הַמִּלּוֹא עִיר דָּוִיד
  chosen: he strengthened the Millo of the city of David
  alternatives:
  - he repaired the Millo of the city of David
  - he fortified the fill/terrace of the city of David
  lexicon: HALOT
  rationale: מִלּוֹא is a technical place-name/structure associated with Jerusalem,
    often left transliterated. Retaining 'Millo' avoids false precision, while 'strengthened'
    matches the fortification context. The apposition 'of the city of David' is preserved.
- source_word: הַמִּלּוֹא
  chosen: the Millo
  alternatives:
  - the terrace
  - the supporting terraces
  - the fill
  lexicon: HALOT
  rationale: The exact referent is debated; likely a terraced fill or fortification
    structure. Transliteration is preferable in the main text because it preserves
    the historical term without overstating certainty. A lexical footnote preserves
    the explanatory alternative.
- source_word: שֶׁלַח
  chosen: weapons
  alternatives:
  - missiles
  - darts
  - javelins
  lexicon: HALOT
  rationale: The noun refers broadly to weapons/projectiles. 'Weapons' fits the collocation
    with shields and avoids narrowing the term to a specific implement that the context
    does not require.
- source_word: לָרֹב
  chosen: in abundance
  alternatives:
  - in great number
  - many
  lexicon: HALOT
  rationale: This idiom conveys plentiful quantity. 'In abundance' is natural and
    suitably elevated without being archaic.
- source_word: וּמָגִנִּים
  chosen: and shields
  alternatives:
  - and bucklers
  lexicon: HALOT
  rationale: מָגֵן is the standard term for shield. 'Bucklers' is archaic and too
    specific for modern translation.
