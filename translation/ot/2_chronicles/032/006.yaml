id: 2CH.32.6
reference: 2 Chronicles 32:6
source:
  edition: WLC
  text: וַ/יִּתֵּ֛ן שָׂרֵ֥י מִלְחָמ֖וֹת עַל הָ/עָ֑ם וַ/יִּקְבְּצֵ֣/ם אֵלָ֗י/ו אֶל
    רְחוֹב֙ שַׁ֣עַר הָ/עִ֔יר וַ/יְדַבֵּ֥ר עַל לְבָבָ֖/ם לֵ/אמֹֽר־־־׃
translation:
  text: And he appointed military commanders over the people, gathered them to himself
    in the square at the city gate, and spoke to their hearts, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'spoke to their hearts,' an idiom for speaking in a way that encourages
      or strengthens them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: appointed
  alternatives:
  - set
  - placed
  - put
  lexicon: HALOT
  rationale: Though the verb is literally 'gave/put,' in the construction with officials
    over a people it idiomatically means to assign or appoint them to office. 'Appointed'
    is natural English and preserves the administrative sense.
- source_word: שָׂרֵי מִלְחָמוֹת
  chosen: military commanders
  alternatives:
  - captains of war
  - army officers
  - war leaders
  lexicon: HALOT
  rationale: The construct phrase is literally 'princes/officials of wars.' In context
    it refers to leaders of military forces. 'Military commanders' communicates the
    function clearly in modern English without archaic wording.
- source_word: עַל הָעָם
  chosen: over the people
  alternatives:
  - for the people
  lexicon: HALOT
  rationale: The preposition עַל with appointment language indicates authority or
    oversight. 'Over the people' best reflects the Hebrew relation.
- source_word: וַיִּקְבְּצֵם אֵלָיו
  chosen: gathered them to himself
  alternatives:
  - assembled them to him
  - gathered them around him
  lexicon: HALOT
  rationale: The verb קבץ means gather/assemble. Retaining 'to himself' reflects אֵלָיו
    and shows Hezekiah personally convened them.
- source_word: אֶל רְחוֹב שַׁעַר הָעִיר
  chosen: in the square at the city gate
  alternatives:
  - to the open place of the city gate
  - to the plaza of the city gate
  - to the broad place at the city gate
  lexicon: HALOT
  rationale: רְחוֹב denotes an open area or plaza, often just inside or near a gate.
    'Square at the city gate' is idiomatic English and preserves the public civic
    setting.
- source_word: וַיְדַבֵּר עַל לְבָבָם
  chosen: spoke to their hearts
  alternatives:
  - spoke encouragingly to them
  - spoke to their minds
  - spoke over their hearts
  lexicon: HALOT
  rationale: The idiom literally involves speaking 'upon/to the heart,' meaning to
    address someone inwardly, often with encouragement. 'Spoke to their hearts' preserves
    the Hebrew imagery while remaining understandable.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said,
  lexicon: HALOT
  rationale: Standard introduction to direct speech. 'Saying' smoothly links this
    verse to the following quoted exhortation.
