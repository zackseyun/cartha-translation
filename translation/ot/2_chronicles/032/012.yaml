theological_decisions:
- issue: Speaker perspective in possessive suffixes on 'high places' and 'altars'
  chosen_reading: Retain 'his high places' and 'his altars' in the main text as the
    Assyrian speaker's characterization
  alternative_readings:
  - the high places and the altars
  - his shrines and his altars
  rationale: The Hebrew suffixes are explicit. Keeping them preserves the rhetoric
    of the Rabshakeh, who frames the removed sites as belonging to Judah's God. The
    translation should not smooth away the speaker's misunderstanding or polemical
    spin.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
- issue: Cultic centralization language
  chosen_reading: Render the command in terms of one altar without explaining or defending
    Hezekiah's reform in the main text
  alternative_readings:
  - paraphrase as exclusive worship at the temple altar
  rationale: 'The verse reports an accusation, not the narrator''s theological explanation.
    The translation should preserve the historical-theological tension: the Assyrian
    presents reform as impiety, while the broader biblical context treats it as fidelity.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it'
