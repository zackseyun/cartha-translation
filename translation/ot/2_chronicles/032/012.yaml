id: 2CH.32.12
reference: 2 Chronicles 32:12
source:
  edition: WLC
  text: הֲ/לֹא הוּא֙ יְחִזְקִיָּ֔הוּ הֵסִ֥יר אֶת בָּמֹתָ֖י/ו וְ/אֶת מִזְבְּחֹתָ֑י/ו
    וַ/יֹּ֨אמֶר לִֽ/יהוּדָ֤ה וְ/לִֽ/ירוּשָׁלִַ֨ם֙ לֵ/אמֹ֔ר לִ/פְנֵ֨י מִזְבֵּ֧חַ אֶחָ֛ד
    תִּֽשְׁתַּחֲו֖וּ וְ/עָלָ֥י/ו תַּקְטִֽירוּ־־־׃
translation:
  text: Was it not Hezekiah himself who removed his high places and his altars, and
    said to Judah and to Jerusalem, saying, ‘Before one altar you shall bow down,
    and on it you shall burn incense’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Before a single altar you shall worship, and on it you shall make offerings
      go up in smoke.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Was it not
  alternatives:
  - Did not
  - Is it not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Was it not' fits
    the past narrative context and English idiom.
- source_word: הוּא יְחִזְקִיָּהוּ
  chosen: Hezekiah himself
  alternatives:
  - Hezekiah
  - that Hezekiah
  lexicon: HALOT
  rationale: The pronoun plus proper name is emphatic; 'himself' preserves the emphasis
    in natural English.
- source_word: הֵסִיר
  chosen: removed
  alternatives:
  - took away
  - abolished
  lexicon: HALOT
  rationale: A straightforward rendering of the Hiphil of סור in this context of eliminating
    cultic sites.
- source_word: בָּמֹתָיו
  chosen: his high places
  alternatives:
  - his shrines
  - his hilltop sanctuaries
  lexicon: HALOT
  rationale: '''High places'' is the standard and sufficiently transparent rendering
    for בָּמוֹת, referring to local worship sites. The possessive reflects the Rabshakeh''s
    polemical wording, not the narrator''s theological endorsement.'
- source_word: מִזְבְּחֹתָיו
  chosen: his altars
  alternatives:
  - the altars
  lexicon: HALOT
  rationale: The suffix is present in Hebrew and should be represented. As with 'his
    high places,' this reflects the speaker's perspective attributing them to the
    deity.
- source_word: וַיֹּאמֶר לִיהוּדָה וְלִירוּשָׁלִַם לֵאמֹר
  chosen: and said to Judah and to Jerusalem, saying
  alternatives:
  - and told Judah and Jerusalem
  - and said to Judah and Jerusalem
  lexicon: HALOT
  rationale: Retains the formal speech introduction and the repeated speech marker
    לֵאמֹר. Slightly formal English suits the quoted proclamation.
- source_word: לִפְנֵי מִזְבֵּחַ אֶחָד
  chosen: Before one altar
  alternatives:
  - Before a single altar
  - At one altar
  lexicon: HALOT
  rationale: לִפְנֵי is most basically 'before/in front of.' 'One altar' preserves
    the numerical emphasis in the accusation that worship was centralized.
- source_word: תִּשְׁתַּחֲווּ
  chosen: you shall bow down
  alternatives:
  - you shall worship
  - you must bow down
  lexicon: HALOT
  rationale: The verb literally denotes prostration/bowing down. 'Bow down' preserves
    the physical worship language without over-interpreting it as a broader term.
- source_word: וְעָלָיו תַּקְטִירוּ
  chosen: and on it you shall burn incense
  alternatives:
  - and on it you shall make offerings smoke
  - and there you shall burn incense
  lexicon: HALOT
  rationale: The Hiphil of קטר commonly refers to burning incense or turning an offering
    into smoke. In this polemical summary of centralized worship, 'burn incense' is
    the clearest idiomatic rendering.
