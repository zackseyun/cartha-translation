theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of וַיְנַהֲלֵם מִסָּבִיב
  chosen_reading: and he guided them on every side
  alternative_readings:
  - and he led them all around
  - and he gave them rest on every side
  rationale: The Hebrew verb נהל most naturally means 'lead/guide.' While some interpreters understand the clause as implying settled security or rest, the translation preserves the lexical sense rather than resolving it into a more interpretive paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it'
