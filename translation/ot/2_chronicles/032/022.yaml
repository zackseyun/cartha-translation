id: 2CH.32.22
reference: 2 Chronicles 32:22
source:
  edition: WLC
  text: וַ/יּוֹשַׁע֩ יְהוָ֨ה אֶת יְחִזְקִיָּ֜הוּ וְ/אֵ֣ת יֹשְׁבֵ֣י יְרוּשָׁלִַ֗ם מִ/יַּ֛ד סַנְחֵרִ֥יב מֶֽלֶךְ אַשּׁ֖וּר וּ/מִ/יַּד כֹּ֑ל וַֽ/יְנַהֲלֵ֖/ם מִ/סָּבִֽיב־׀־־׃
translation:
  text: So Yahweh saved Hezekiah and the inhabitants of Jerusalem from the hand of Sennacherib king of Assyria and from the hand of all others, and he guided them on every side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and from the hand of all'; the Hebrew leaves the object of 'all' unstated, likely meaning all other enemies or hostile powers.
    reason: lexical_alternative
  - marker: b
    text: Or, 'and he led them all around'; some understand the sense more broadly as granting security on every side.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיּוֹשַׁע
  chosen: saved
  alternatives:
  - delivered
  - gave victory to
  lexicon: HALOT
  rationale: From ישׁע, denoting rescue/deliverance. 'Saved' is natural modern English and preserves the theological weight of divine rescue without over-specifying military victory.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יֹשְׁבֵי יְרוּשָׁלִַם
  chosen: the inhabitants of Jerusalem
  alternatives:
  - those living in Jerusalem
  - the residents of Jerusalem
  lexicon: HALOT
  rationale: The participial construction literally means 'the dwellers/inhabitants of Jerusalem.' 'Inhabitants' is idiomatic and suitably formal.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  - from
  lexicon: HALOT
  rationale: The Hebrew idiom 'from the hand of' expresses deliverance from someone's power or control. It is retained here because it remains understandable in English and preserves the source imagery.
- source_word: סַנְחֵרִיב מֶלֶךְ אַשּׁוּר
  chosen: Sennacherib king of Assyria
  alternatives:
  - Sennacherib, the king of Assyria
  lexicon: HALOT
  rationale: Standard transliteration of the royal name with the appositional title preserved.
- source_word: וּמִיַּד כֹּל
  chosen: and from the hand of all others
  alternatives:
  - and from the hand of all
  - and from everyone
  lexicon: HALOT
  rationale: כֹּל here is elliptical; context indicates other hostile powers or enemies besides Sennacherib. 'All others' makes the implied object explicit enough for English without adding a specific noun not present in Hebrew.
- source_word: וַיְנַהֲלֵם
  chosen: and he guided them
  alternatives:
  - and he led them
  - and he gave them rest
  lexicon: HALOT
  rationale: From נהל, commonly 'lead, guide.' 'Guided' fits the following phrase 'on every side' and avoids implying mere movement from one place to another. Some versions infer 'gave them rest,' but the lexical base more directly supports guidance/leading.
- source_word: מִסָּבִיב
  chosen: on every side
  alternatives:
  - all around
  - round about
  lexicon: HALOT
  rationale: This adverbial phrase conveys surrounding extent. 'On every side' is clear modern English and preserves the sense of comprehensive divine care/protection.
