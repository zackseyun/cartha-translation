theological_decisions:
- issue: Reference of אֱלֹהֵיכֶם
  chosen_reading: singular 'your God' referring to the God of Judah/Israel
  alternative_readings:
  - formal plural 'your gods'
  rationale: Though the Hebrew form is morphologically plural, in this context it
    is the standard plural form used for the singular God of Israel. Rendering it
    as plural would misrepresent the speaker's target and the narrative theology.
