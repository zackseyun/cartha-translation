id: 2CH.32.15
reference: 2 Chronicles 32:15
source:
  edition: WLC
  text: וְ/עַתָּ֡ה אַל יַשִּׁיא֩ אֶתְ/כֶ֨ם חִזְקִיָּ֜הוּ וְ/אַל יַסִּ֨ית אֶתְ/כֶ֣ם
    כָּ/זֹאת֮ וְ/אַל תַּאֲמִ֣ינוּ ל/וֹ֒ כִּי לֹ֣א יוּכַ֗ל כָּל אֱל֨וֹהַ֙ כָּל גּ֣וֹי
    וּ/מַמְלָכָ֔ה לְ/הַצִּ֥יל עַמּ֛/וֹ מִ/יָּדִ֖/י וּ/מִ/יַּ֣ד אֲבוֹתָ֑/י אַ֚ף כִּ֣י
    אֱֽלֹהֵי/כֶ֔ם לֹא יַצִּ֥ילוּ אֶתְ/כֶ֖ם מִ/יָּדִֽ/י־־־־־־־׃
translation:
  text: So now, do not let Hezekiah deceive you, and do not let him persuade you like
    this, and do not believe him; for no god of any nation or kingdom has been able
    to deliver his people from my hand and from the hand of my fathers. How much less
    will your God deliver you from my hand!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'incite you' / 'entice you' for 'persuade you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from my hand and from the hand of my fathers,' with 'hand' meaning
      power or control.
    reason: cultural_note
  - marker: c
    text: Or 'certainly not' for 'How much less,' reflecting the Hebrew idiom of intensified
      negative conclusion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Introduces the speaker's immediate exhortation with a natural English
    discourse marker. 'So now' preserves the rhetorical transition better than bare
    'now'.
- source_word: יַשִּׁיא
  chosen: deceive
  alternatives:
  - mislead
  - beguile
  lexicon: HALOT
  rationale: The verb carries the sense of leading someone astray or deceiving. 'Deceive'
    is direct, idiomatic, and fits the Assyrian spokesman's accusation against Hezekiah.
- source_word: יַסִּית
  chosen: persuade
  alternatives:
  - incite
  - entice
  lexicon: HALOT
  rationale: Though the verb can mean 'incite' or 'entice,' here the object is the
    people being swayed by Hezekiah's words. 'Persuade' best fits the immediate context
    of verbal influence without importing a stronger notion of rebellion than the
    text states.
- source_word: כָּזֹאת
  chosen: like this
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: Refers to the manner/content of Hezekiah's alleged persuasion. 'Like
    this' is readable modern English and preserves the demonstrative force.
- source_word: תַּאֲמִינוּ לוֹ
  chosen: believe him
  alternatives:
  - trust him
  - put faith in him
  lexicon: HALOT
  rationale: In this context the issue is whether the people will accept Hezekiah's
    claims. 'Believe him' is the most natural English rendering; 'trust him' is possible
    but slightly broader.
- source_word: לֹא יוּכַל
  chosen: has been able
  alternatives:
  - is able
  - could
  lexicon: HALOT
  rationale: 'English present perfect captures the force of the speaker''s appeal
    to historical precedent: no god has succeeded in doing this.'
- source_word: כָּל אֱלוֹהַ כָּל גּוֹי וּמַמְלָכָה
  chosen: no god of any nation or kingdom
  alternatives:
  - no god of any people or kingdom
  - not any god of any nation and kingdom
  lexicon: HALOT
  rationale: This compresses the Hebrew construction into clear English while preserving
    the universal claim about the gods associated with nations and kingdoms.
- source_word: לְהַצִּיל
  chosen: to deliver
  alternatives:
  - to rescue
  - to save
  lexicon: HALOT
  rationale: '''Deliver'' is a standard and fitting rendering in military-threat contexts,
    preserving the sense of being snatched from hostile power.'
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - its people
  lexicon: HALOT
  rationale: Because 'god' is rendered with a personal singular in English, 'his people'
    is the most natural concord, reflecting the Hebrew singular suffix.
- source_word: מִיָּדִי וּמִיַּד אֲבוֹתָי
  chosen: from my hand and from the hand of my fathers
  alternatives:
  - out of my hand and the hand of my fathers
  lexicon: HALOT
  rationale: The repeated 'hand' should be preserved because it is a common Hebrew
    idiom for power/control. 'Fathers' here refers to royal predecessors/ancestors,
    not immediate parents.
- source_word: אַף כִּי
  chosen: How much less
  alternatives:
  - how much more so not
  - certainly not
  lexicon: HALOT
  rationale: 'In context this idiom intensifies the negative conclusion: if no other
    god could deliver, then your God certainly will not, in the speaker''s taunt.
    ''How much less'' captures the argumentative force idiomatically.'
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: Although morphologically plural in form, the construction here refers
    to the singular God of Judah. The singular sense is demanded by context and standard
    usage of אֱלֹהִים for Israel's God.
- source_word: לֹא יַצִּילוּ
  chosen: will deliver
  alternatives:
  - will rescue
  - will save
  lexicon: HALOT
  rationale: 'Rendered with future force under the scope of the negation and the taunting
    conclusion. English places the negation naturally before the auxiliary: ''will
    ... not'' or ''will not ...''; the final sentence is expressed idiomatically as
    a rhetorical exclamation.'
