id: 2CH.18.10
reference: 2 Chronicles 18:10
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ ל֛/וֹ צִדְקִיָּ֥הוּ בֶֽן כְּנַעֲנָ֖ה קַרְנֵ֣י בַרְזֶ֑ל וַ/יֹּ֨אמֶר֙ כֹּֽה אָמַ֣ר יְהוָ֔ה בְּ/אֵ֛לֶּה תְּנַגַּ֥ח אֶת אֲרָ֖ם עַד כַּלּוֹתָֽ/ם־־־־׃
translation:
  text: 'Then Zedekiah son of Chenaanah made horns of iron for himself and said, “Thus says Yahweh: With these you will gore Aram until they are consumed.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will push Aram'; the Hebrew verb refers to the thrusting or goring action of a horned animal.
    reason: lexical_alternative
  - marker: b
    text: '''Aram'' can also be rendered ''the Arameans'' or, less precisely in later terms, ''Syria.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ לוֹ
  chosen: made for himself
  alternatives:
  - made for him
  - made
  lexicon: HALOT
  rationale: The verb עשה with לּוֹ naturally indicates making something for oneself/himself in context. Since Zedekiah is the subject and is about to use the horns as a prophetic sign-act, 'made for himself' best captures the reflexive sense in idiomatic English.
- source_word: צִדְקִיָּהוּ בֶן כְּנַעֲנָה
  chosen: Zedekiah son of Chenaanah
  rationale: Personal names are transliterated per project philosophy. 'Son of' preserves the Hebrew patronymic construction.
- source_word: קַרְנֵי בַרְזֶל
  chosen: horns of iron
  alternatives:
  - iron horns
  lexicon: HALOT
  rationale: The construct phrase is most transparently rendered 'horns of iron.' This preserves the imagery of horned power/weaponry without interpretive expansion.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. 'the LORD' follows the doctrinal default for YHWH.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּאֵלֶּה
  chosen: With these
  alternatives:
  - By these
  - With this
  lexicon: HALOT
  rationale: The preposition ב plus demonstrative plural refers to the iron horns as instruments. 'With these' is natural English and preserves the instrumental sense.
- source_word: תְּנַגַּח
  chosen: you will gore
  alternatives:
  - you will push
  - you will strike
  lexicon: HALOT
  rationale: The verb נגח is used of horned animals goring or butting. Because the enacted symbol is a pair of horns, 'gore' best preserves the concrete image and force of the Hebrew.
- source_word: אֶת אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: The Hebrew names the polity/people as 'Aram.' Translating as 'Aram' preserves the historical designation more directly than the later geographical term 'Syria.'
- source_word: עַד כַּלּוֹתָם
  chosen: until they are finished off
  alternatives:
  - until they are consumed
  - until you have destroyed them
  - until their end
  lexicon: HALOT
  rationale: The infinitive construct of כלה with 3mp suffix expresses completion/destruction of the referent. 'Until they are finished off' communicates the result in natural English while leaving the subject of the finishing implicit, as in Hebrew.
