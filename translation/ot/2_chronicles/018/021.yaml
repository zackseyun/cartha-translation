id: 2CH.18.21
reference: 2 Chronicles 18:21
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר אֵצֵא֙ וְ/הָיִ֨יתִי֙ לְ/ר֣וּחַ שֶׁ֔קֶר בְּ/פִ֖י כָּל נְבִיאָ֑י/ו
    וַ/יֹּ֗אמֶר תְּפַתֶּה֙ וְ/גַם תּוּכָ֔ל צֵ֖א וַ/עֲשֵׂה כֵֽן־־־׃
translation:
  text: And he said, ‘I will go out and become a lying spirit in the mouth of all
    his prophets.’ And he said, ‘You will entice him, and you will also succeed. Go
    out and do so.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a spirit of falsehood.'
    reason: lexical_alternative
  - marker: b
    text: Or 'You will deceive him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵצֵא
  chosen: I will go out
  alternatives:
  - I will go forth
  lexicon: HALOT
  rationale: Qal imperfect/cohortative-like first person from יצא expresses the speaker's
    intended action. 'Go out' is natural modern English and preserves the directional
    sense without archaic tone.
- source_word: וְהָיִיתִי
  chosen: and become
  alternatives:
  - and I will be
  lexicon: HALOT
  rationale: Though formally 'and I will be,' in English 'become' better conveys the
    transition into the role described by the predicate 'a lying spirit.' This is
    an optimal-equivalence rendering of היה in predicative context.
- source_word: לְרוּחַ שֶׁקֶר
  chosen: a lying spirit
  alternatives:
  - a spirit of falsehood
  - a false spirit
  lexicon: HALOT
  rationale: The construct-like phrase denotes a spirit characterized by deceit. 'Lying
    spirit' is the most direct and idiomatic rendering and matches the narrative's
    emphasis on deception.
- source_word: בְּפִי
  chosen: in the mouth of
  alternatives:
  - on the lips of
  - through the mouth of
  lexicon: HALOT
  rationale: The Hebrew literally says 'in the mouth of,' an idiom for speech proceeding
    through someone. The literal rendering is clear in English and preserves the imagery.
- source_word: כָּל נְבִיאָיו
  chosen: all his prophets
  alternatives:
  - all of his prophets
  lexicon: HALOT
  rationale: 'כָּל plus plural noun with 3ms suffix is straightforwardly comprehensive:
    ''all his prophets.'' The pronoun refers to Ahab in context.'
- source_word: תְּפַתֶּה
  chosen: You will entice him
  alternatives:
  - You will deceive him
  - You will persuade him
  lexicon: HALOT
  rationale: פתה in the piel commonly carries the sense of enticing or persuading,
    often with deceptive force. 'Entice' preserves the causative nuance without over-specifying
    beyond the Hebrew. The object 'him' is implicit from context and required in English.
- source_word: וְגַם תּוּכָל
  chosen: and you will also succeed
  alternatives:
  - and you will prevail as well
  - and you will be able also
  lexicon: HALOT
  rationale: יכל here denotes successful ability, not mere capacity. 'Also succeed'
    captures both וגם and the contextual sense that the mission will be effective.
- source_word: צֵא
  chosen: Go out
  alternatives:
  - Go
  lexicon: HALOT
  rationale: Imperative of יצא repeats the earlier movement language. 'Go out' preserves
    the verbal echo.
- source_word: וַעֲשֵׂה כֵן
  chosen: and do so
  alternatives:
  - and do thus
  - and do it
  lexicon: HALOT
  rationale: עשה כן is an idiomatic command meaning to act in that manner. 'Do so'
    is concise, natural, and faithful.
