theological_decisions:
- issue: Rendering divine permission/commission in a vision involving deception
  chosen_reading: The text is rendered straightforwardly as God authorizing the spirit's
    deceptive mission within the vision narrative, without softening the language.
  alternative_readings:
  - Render with weaker language to avoid implying divine involvement in deception
  rationale: The Hebrew plainly presents the speaker's plan and the approving response.
    The translation should preserve the theological tension rather than resolve it
    by paraphrase. This follows the stated philosophy of not importing doctrinal smoothing
    where the text is stark.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
