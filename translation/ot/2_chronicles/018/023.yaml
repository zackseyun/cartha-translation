id: 2CH.18.23
reference: 2 Chronicles 18:23
source:
  edition: WLC
  text: וַ/יִּגַּשׁ֙ צִדְקִיָּ֣הוּ בֶֽן כְּנַעֲנָ֔ה וַ/יַּ֥ךְ אֶת מִיכָ֖יְהוּ עַל הַ/לֶּ֑חִי וַ/יֹּ֗אמֶר אֵ֣י זֶ֤ה הַ/דֶּ֨רֶךְ֙ עָבַ֧ר רֽוּחַ יְהוָ֛ה מֵ/אִתִּ֖/י לְ/דַבֵּ֥ר אֹתָֽ/ךְ־־־־׃
translation:
  text: Then Zedekiah son of Chenaanah came near and struck Micaiah on the cheek, and said, “Which way did the Spirit of Yahweh pass from me to speak to you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “By which way did the Spirit of the LORD pass from me to speak to you?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּשׁ
  chosen: came near
  alternatives:
  - approached
  - came forward
  lexicon: HALOT
  rationale: The verb נגשׁ commonly means to approach or come near. 'Came near' preserves the physical movement and fits the confrontational setting.
- source_word: צִדְקִיָּהוּ בֶן־כְּנַעֲנָה
  chosen: Zedekiah son of Chenaanah
  rationale: Personal names are transliterated per project philosophy. 'Son of' is retained as the standard filial expression.
- source_word: וַיַּךְ אֶת־מִיכָיְהוּ עַל־הַלֶּחִי
  chosen: struck Micaiah on the cheek
  alternatives:
  - slapped Micaiah on the cheek
  - hit Micaiah on the jaw
  lexicon: HALOT
  rationale: נכה is a broad verb for striking. 'Struck' is the most neutral and text-faithful choice. לֶחִי denotes the cheek/jaw area; 'on the cheek' is idiomatic English and matches the likely gesture of insult.
- source_word: אֵי זֶה הַדֶּרֶךְ
  chosen: Which way
  alternatives:
  - By which way
  - Where is the way by which
  lexicon: HALOT
  rationale: The phrase is an idiomatic challenge meaning 'by what route/how exactly.' 'Which way' is concise and natural while preserving the metaphor of movement.
- source_word: עָבַר
  chosen: did ... pass
  alternatives:
  - went
  - crossed over
  lexicon: HALOT
  rationale: עבר literally means 'pass over/by/from one place to another.' 'Did ... pass' preserves the imagery of the spirit moving from one speaker to another, which is central to Zedekiah's taunt.
- source_word: רוּחַ יְהוָה
  chosen: the Spirit of the LORD
  alternatives:
  - the spirit of the LORD
  lexicon: HALOT
  rationale: In prophetic context, רוּחַ יְהוָה refers to the divine Spirit rather than a mere disposition or wind. Capitalizing 'Spirit' communicates this referent in standard English usage. יְהוָה is rendered 'the LORD' per doctrine guidelines.
- source_word: מֵאִתִּי
  chosen: from me
  alternatives:
  - away from me
  lexicon: HALOT
  rationale: The prepositional phrase marks source/origin. 'From me' is the straightforward rendering and fits the sarcastic claim that the Spirit had been speaking through Zedekiah.
- source_word: לְדַבֵּר אֹתָךְ
  chosen: to speak to you
  alternatives:
  - to speak with you
  lexicon: HALOT
  rationale: Though the object marker with דבר is unusual, the sense in context is clearly 'speak to you.' English requires the preposition 'to' for natural expression.
