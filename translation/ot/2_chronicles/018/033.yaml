id: 2CH.18.33
reference: 2 Chronicles 18:33
source:
  edition: WLC
  text: וְ/אִ֗ישׁ מָשַׁ֤ךְ בַּ/קֶּ֨שֶׁת֙ לְ/תֻמּ֔/וֹ וַ/יַּךְ֙ אֶת מֶ֣לֶךְ יִשְׂרָאֵ֔ל
    בֵּ֥ין הַ/דְּבָקִ֖ים וּ/בֵ֣ין הַ/שִּׁרְיָ֑ן וַ/יֹּ֣אמֶר לָֽ/רַכָּ֗ב הֲפֹ֧ךְ ידי/ך
    וְ/הוֹצֵאתַ֥/נִי מִן הַֽ/מַּחֲנֶ֖ה כִּ֥י הָחֳלֵֽיתִי־־׃
translation:
  text: But a man drew his bow at random and struck the king of Israel between the
    scale armor and the breastplate. So he said to the charioteer, “Turn your hand
    and take me out of the camp, for I am badly wounded.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without aiming' / 'in his innocence.' The Hebrew לְתֻמּוֹ can denote
      simplicity or innocence, but in this battle context it most likely means the
      archer shot without specific aim.
    reason: lexical_alternative
  - marker: b
    text: Literally 'Turn your hand.' The expression likely means to turn the chariot
      around or maneuver it away from the fighting.
    reason: lexical_alternative
  - marker: c
    text: Or 'between the joints of the armor and the breastplate.' The exact armor
      terminology is uncertain, but the sense is that the arrow found a gap in the
      king's armor.
    reason: cultural_note
lexical_decisions:
- source_word: וְאִישׁ
  chosen: But a man
  alternatives:
  - And a man
  - Now a man
  lexicon: HALOT
  rationale: וְ introduces the next event in narrative sequence; 'But' fits the contrastive
    turn after the battle scene, while אִישׁ is an indefinite 'man,' not specifically
    identified.
- source_word: מָשַׁךְ בַּקֶּשֶׁת
  chosen: drew his bow
  alternatives:
  - drew with the bow
  - pulled the bow
  lexicon: HALOT
  rationale: The idiom refers to drawing/shooting a bow. English idiom prefers 'drew
    his bow' rather than a more wooden 'drew with the bow.'
- source_word: לְתֻמּוֹ
  chosen: at random
  alternatives:
  - in his innocence
  - without aiming
  - in his simplicity
  lexicon: HALOT
  rationale: In this battle context the phrase means without specific intent or aim,
    not moral innocence. 'At random' is the clearest idiomatic rendering and matches
    the narrative point that the shot was not deliberately targeted.
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - hit
  - wounded
  lexicon: HALOT
  rationale: נכה broadly means strike/smite/hit. 'Struck' preserves the immediate
    action, while the resulting injury is expressed later by הָחֳלֵיתִי.
- source_word: בֵּין הַדְּבָקִים וּבֵין הַשִּׁרְיָן
  chosen: between the scale armor and the breastplate
  alternatives:
  - between the joints of the armor and the breastplate
  - between the armor plates and the coat of mail
  lexicon: HALOT
  rationale: The phrase describes a vulnerable gap in Ahab's armor. דְּבָקִים likely
    refers to attached armor pieces/scales or joints; שִׁרְיָן is body armor/cuirass.
    'Scale armor and the breastplate' is readable modern English while preserving
    the sense of a gap between armor components.
- source_word: לָרַכָּב
  chosen: to the charioteer
  alternatives:
  - to the driver
  - to the chariot driver
  lexicon: HALOT
  rationale: The noun here refers to the one driving the chariot, not the vehicle
    itself. 'Charioteer' is concise and natural in this military setting.
- source_word: הֲפֹךְ יָדֶיךָ
  chosen: Turn your hand
  alternatives:
  - Turn around
  - Turn the reins
  - Wheel about
  lexicon: HALOT
  rationale: Literally 'turn your hand.' The idiom likely refers to maneuvering the
    chariot by the driver's hand. The main text keeps the Hebrew image with understandable
    English; a more interpretive alternative is preserved in a footnote.
- source_word: וְהוֹצֵאתַנִי מִן הַמַּחֲנֶה
  chosen: and take me out of the camp
  alternatives:
  - and bring me out of the battle line
  - and get me out of the army
  lexicon: HALOT
  rationale: הוֹצִיא means bring out/take out. מַחֲנֶה can mean camp or army encampment;
    here it refers to the battle force/encampment. 'Out of the camp' is sufficiently
    literal, with the military nuance inferable from context.
- source_word: כִּי הָחֳלֵיתִי
  chosen: for I am badly wounded
  alternatives:
  - for I am wounded
  - for I am sick/hurt
  lexicon: HALOT
  rationale: Though the verb can denote becoming weak or sick, in this immediate context
    after being struck by an arrow it clearly means severely wounded or injured. 'Badly
    wounded' conveys the force in natural English.
