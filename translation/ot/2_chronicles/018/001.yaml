theological_decisions:
- issue: Nature of Jehoshaphat's relationship to Ahab in וַיִּתְחַתֵּן לְאַחְאָב
  chosen_reading: He allied himself by marriage with Ahab
  alternative_readings:
  - He became related by marriage to Ahab
  - He made a marriage alliance with Ahab
  rationale: The verse reports a dynastic/political marriage connection rather than
    stating that Jehoshaphat personally married Ahab. The chosen wording preserves
    the historical sense without over-specifying the exact family arrangement in the
    main text.
