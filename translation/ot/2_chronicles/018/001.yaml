id: 2CH.18.1
reference: 2 Chronicles 18:1
source:
  edition: WLC
  text: וַ/יְהִ֧י לִֽ/יהוֹשָׁפָ֛ט עֹ֥שֶׁר וְ/כָב֖וֹד לָ/רֹ֑ב וַ/יִּתְחַתֵּ֖ן לְ/אַחְאָֽב׃
translation:
  text: Now Jehoshaphat had great wealth and honor, and he allied himself by marriage
    with Ahab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'became related by marriage to Ahab' or 'made a marriage alliance with
      Ahab.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ... had
  alternatives:
  - And ... had
  - And it came to pass that ... had
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a new narrative development. In
    idiomatic modern English, 'Now ... had' conveys the transition without the archaic
    'it came to pass.'
- source_word: לִיהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: עֹשֶׁר
  chosen: wealth
  alternatives:
  - riches
  lexicon: HALOT
  rationale: The noun denotes material abundance; 'wealth' is clear modern English
    and pairs naturally with 'honor.'
- source_word: וְכָבוֹד
  chosen: honor
  alternatives:
  - glory
  lexicon: HALOT
  rationale: In this royal/social context, כָּבוֹד refers to status and prestige rather
    than visible divine glory; 'honor' best fits the sense.
- source_word: לָרֹב
  chosen: great
  alternatives:
  - in abundance
  - in great measure
  lexicon: HALOT
  rationale: The phrase modifies the preceding nouns to indicate abundance. 'Great
    wealth and honor' is natural English that preserves the sense of exceptional extent.
- source_word: וַיִּתְחַתֵּן
  chosen: allied himself by marriage
  alternatives:
  - became related by marriage
  - made a marriage alliance
  lexicon: HALOT
  rationale: The hitpael of חתן here denotes entering into a marriage alliance, not
    merely marrying personally. 'Allied himself by marriage' makes the political/familial
    sense explicit in idiomatic English.
- source_word: לְאַחְאָב
  chosen: with Ahab
  alternatives:
  - to Ahab
  rationale: With verbs of forming relationship, English idiom prefers 'with Ahab.'
    This reflects the relational force of the Hebrew construction.
