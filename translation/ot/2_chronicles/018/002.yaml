id: 2CH.18.2
reference: 2 Chronicles 18:2
source:
  edition: WLC
  text: וַ/יֵּרֶד֩ לְ/קֵ֨ץ שָׁנִ֤ים אֶל אַחְאָב֙ לְ/שֹׁ֣מְר֔וֹן וַ/יִּֽזְבַּֽח ל֨/וֹ
    אַחְאָ֜ב צֹ֤אן וּ/בָקָר֙ לָ/רֹ֔ב וְ/לָ/עָ֖ם אֲשֶׁ֣ר עִמּ֑/וֹ וַ/יְסִיתֵ֕/הוּ לַ/עֲל֖וֹת
    אֶל רָמ֥וֹת גִּלְעָֽד־־־׃
translation:
  text: After some years, he went down to Ahab in Samaria, and Ahab slaughtered sheep
    and cattle in abundance for him and for the people who were with him, and urged
    him to go up against Ramoth-gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'enticed him' or 'incited him' to go up to Ramoth-gilead.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to Ramoth-gilead'; the sense in context is a military move against
      the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  chosen: he went down
  alternatives:
  - he descended
  - he went
  lexicon: HALOT
  rationale: ירד commonly means 'go down/descend.' 'Went down' preserves the directional/topographical
    sense from Judah to Samaria without sounding overly stiff.
- source_word: לְקֵץ שָׁנִים
  chosen: After some years
  alternatives:
  - at the end of years
  - after a number of years
  lexicon: HALOT
  rationale: The idiom literally means 'at the end of years' but in context refers
    to the passage of a period of years. 'After some years' is natural English and
    preserves the temporal sense without over-specifying the number.
- source_word: אֶל אַחְאָב לְשֹׁמְרוֹן
  chosen: to Ahab in Samaria
  alternatives:
  - to Ahab at Samaria
  - to Ahab, to Samaria
  lexicon: HALOT
  rationale: The phrase indicates Jehoshaphat's travel to Ahab located in Samaria.
    'To Ahab in Samaria' communicates destination and location clearly in English.
- source_word: וַיִּזְבַּח לוֹ אַחְאָב
  chosen: Ahab slaughtered ... for him
  alternatives:
  - Ahab sacrificed ... for him
  - Ahab prepared ... for him
  lexicon: HALOT
  rationale: זבח can mean sacrifice/slaughter. Here the context is royal hospitality
    and feasting rather than explicit cultic worship, so 'slaughtered' best fits while
    retaining the concrete action. 'For him' reflects לוֹ, referring to Jehoshaphat.
- source_word: צֹאן וּבָקָר
  chosen: sheep and cattle
  alternatives:
  - flocks and herds
  - small livestock and cattle
  lexicon: HALOT
  rationale: A straightforward rendering of the animal categories. 'Sheep and cattle'
    is idiomatic and specific enough for the feast context.
- source_word: לָרֹב
  chosen: in abundance
  alternatives:
  - in great quantity
  - abundantly
  lexicon: HALOT
  rationale: This adverbial phrase modifies the scale of the slaughter. 'In abundance'
    is natural and preserves the sense of plentiful quantity.
- source_word: וְלָעָם אֲשֶׁר עִמּוֹ
  chosen: for the people who were with him
  alternatives:
  - for the troops with him
  - for the people with him
  lexicon: HALOT
  rationale: עָם can mean 'people' broadly and need not be narrowed to soldiers, though
    attendants or retinue are likely. 'People who were with him' preserves the broader
    wording of the Hebrew.
- source_word: וַיְסִיתֵהוּ
  chosen: urged him
  alternatives:
  - enticed him
  - incited him
  - persuaded him
  lexicon: HALOT
  rationale: סות can carry the sense of inciting or enticing. In this narrative Ahab
    is pressing Jehoshaphat toward military action; 'urged him' communicates strong
    persuasion without importing more malice than the immediate wording requires.
    The stronger alternatives are worth preserving.
- source_word: לַעֲלוֹת
  chosen: to go up
  alternatives:
  - to march up
  - to attack
  lexicon: HALOT
  rationale: עלה literally means 'go up.' In military context it can imply marching
    up for battle, but 'go up' preserves the Hebrew idiom and leaves the military
    objective to the following phrase.
- source_word: אֶל רָמוֹת גִּלְעָד
  chosen: against Ramoth-gilead
  alternatives:
  - to Ramoth-gilead
  lexicon: HALOT
  rationale: Although אֶל is literally 'to,' in this war context English idiom prefers
    'against Ramoth-gilead,' making explicit that the ascent is for military action.
    The place name is transliterated per translation policy.
