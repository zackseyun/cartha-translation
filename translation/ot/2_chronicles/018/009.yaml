id: 2CH.18.9
reference: 2 Chronicles 18:9
source:
  edition: WLC
  text: וּ/מֶ֣לֶךְ יִשְׂרָאֵ֡ל וִֽ/יהוֹשָׁפָ֣ט מֶֽלֶךְ יְהוּדָ֡ה יוֹשְׁבִים֩ אִ֨ישׁ
    עַל כִּסְא֜/וֹ מְלֻבָּשִׁ֤ים בְּגָדִים֙ וְ/יֹשְׁבִ֣ים בְּ/גֹ֔רֶן פֶּ֖תַח שַׁ֣עַר
    שֹׁמְר֑וֹן וְ/כָל הַ֨/נְּבִיאִ֔ים מִֽתְנַבְּאִ֖ים לִ/פְנֵי/הֶֽם־־־׃
translation:
  text: Now the king of Israel and Jehoshaphat king of Judah were sitting, each on
    his throne, clothed in garments, and they were sitting at the threshing floor
    at the entrance of the gate of Samaria, and all the prophets were prophesying
    before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the king of Israel.' The Hebrew conjunction can be rendered either
      'and' or, in English narrative style, 'now.'
    reason: alternative_reading
  - marker: b
    text: Or 'arrayed in robes.' The Hebrew says literally 'clothed in garments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֶלֶךְ יִשְׂרָאֵל
  chosen: Now the king of Israel
  alternatives:
  - And the king of Israel
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply 'and,' but in narrative English
    'now' smoothly introduces the scene without changing the sense.
- source_word: וִיהוֹשָׁפָט מֶלֶךְ יְהוּדָה
  chosen: and Jehoshaphat king of Judah
  alternatives:
  - and Jehoshaphat, the king of Judah
  lexicon: HALOT
  rationale: Personal name is transliterated; appositional royal title is kept straightforwardly.
    The article is not required in English apposition.
- source_word: יוֹשְׁבִים ... וְיֹשְׁבִים
  chosen: were sitting ... and they were sitting
  alternatives:
  - sat ... sat
  - were seated ... were seated
  lexicon: HALOT
  rationale: The Hebrew repeats the participle ישׁב, first for enthronement and then
    for location. Preserving the repetition reflects the source text's scene-setting
    aspect, even though English might normally streamline it.
- source_word: אִישׁ עַל כִּסְאוֹ
  chosen: each on his throne
  alternatives:
  - each on his seat
  - each on his own throne
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each'; כִּסֵּא in royal context is best rendered
    'throne,' not merely 'seat.' 'His' matches the singular suffix and distributive
    sense.
- source_word: מְלֻבָּשִׁים בְּגָדִים
  chosen: clothed in garments
  alternatives:
  - arrayed in robes
  - dressed in clothes
  lexicon: HALOT
  rationale: The passive participle plus noun literally indicates being clothed with
    garments. 'Garments' preserves the formal public setting better than the flatter
    'clothes,' while avoiding overinterpretive 'royal robes' not explicit in the Hebrew.
- source_word: בְּגֹרֶן
  chosen: at the threshing floor
  alternatives:
  - in the threshing floor
  lexicon: HALOT
  rationale: The preposition ב in this locative setting is naturally rendered 'at'
    in English. 'Threshing floor' is the standard sense of גֹּרֶן.
- source_word: פֶּתַח שַׁעַר שֹׁמְרוֹן
  chosen: at the entrance of the gate of Samaria
  alternatives:
  - at the entrance to the gate of Samaria
  - at the opening of Samaria's gate
  lexicon: HALOT
  rationale: The construct chain is preserved closely. 'Entrance of the gate' sounds
    slightly formal but accurately reflects the Hebrew spatial description.
- source_word: וְכָל הַנְּבִיאִים
  chosen: and all the prophets
  alternatives:
  - while all the prophets
  lexicon: HALOT
  rationale: Simple coordination best reflects the Hebrew conjunction and keeps the
    scene cumulative.
- source_word: מִתְנַבְּאִים לִפְנֵיהֶם
  chosen: were prophesying before them
  alternatives:
  - were acting as prophets before them
  - were prophesying in their presence
  lexicon: HALOT
  rationale: The hitpael of נבא here denotes prophetic activity. 'Before them' is
    a literal and natural rendering of לִפְנֵיהֶם, indicating the prophets performed
    in the kings' presence.
