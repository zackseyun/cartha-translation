id: 2CH.18.6
reference: 2 Chronicles 18:6
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ יְה֣וֹשָׁפָ֔ט הַ/אֵ֨ין פֹּ֥ה נָבִ֛יא לַ/יהוָ֖ה ע֑וֹד וְ/נִדְרְשָׁ֖ה מֵ/אֹתֽ/וֹ׃
translation:
  text: But Jehoshaphat said, “Is there not still here a prophet of Yahweh, that we may inquire of him?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''a prophet of Yahweh.'' The main text follows the project’s standard rendering of the divine name as ''the LORD.'''
    reason: alternative_reading
  - marker: b
    text: Or 'Is there not yet another prophet of the LORD here...?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But ... said
  alternatives:
  - And ... said
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive on אמר commonly advances the narrative. 'But' fits the discourse contrast here, since Jehoshaphat responds skeptically to the preceding prophetic consensus; 'and' would be more mechanically formal but less communicative in English.
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Personal names are transliterated by standard English convention per translation philosophy.
- source_word: הֲאֵין
  chosen: Is there not
  alternatives:
  - Is there no
  lexicon: HALOT
  rationale: The interrogative with negative particle introduces a question expecting or seeking confirmation. 'Is there not' preserves the rhetorical force naturally in English.
- source_word: פֹּה
  chosen: here
  alternatives:
  - in this place
  lexicon: HALOT
  rationale: A simple locative adverb; 'here' is the natural modern English equivalent.
- source_word: נָבִיא
  chosen: a prophet
  lexicon: HALOT
  rationale: Standard rendering of נביא. The singular is retained because the Hebrew is singular and Jehoshaphat asks for an additional prophetic voice.
- source_word: לַיהוָה
  chosen: of the LORD
  alternatives:
  - belonging to the LORD
  - for the LORD
  lexicon: HALOT
  rationale: 'The lamed marks relation/association: a prophet belonging to or speaking for YHWH. ''Of the LORD'' is idiomatic and preserves covenantal sense. Per doctrine, יהוה is rendered ''the LORD'' rather than ''Yahweh'' in the main text.'
- source_word: עוֹד
  chosen: still
  alternatives:
  - yet
  - besides
  - another
  lexicon: HALOT
  rationale: In context עוד asks whether there remains an additional prophet beyond those already consulted. 'Still' communicates continued availability; 'another' is interpretive but contextually plausible and preserved as an alternative.
- source_word: וְנִדְרְשָׁה
  chosen: that we may inquire
  alternatives:
  - and let us inquire
  - so that we may seek an answer
  lexicon: HALOT
  rationale: דרשׁ in this context means to seek/inquire of God through a prophet. The cohortative first person plural expresses proposed action. 'That we may inquire' fits the English syntax after the question and preserves the deliberative sense.
- source_word: מֵאֹתוֹ
  chosen: of him
  alternatives:
  - through him
  - from him
  lexicon: HALOT
  rationale: The preposition with pronoun indicates the person from whom inquiry is sought. 'Of him' is idiomatic with 'inquire' in English biblical style; 'through him' would make explicit the mediating role but goes beyond the wording.
