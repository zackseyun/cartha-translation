id: 2CH.18.3
reference: 2 Chronicles 18:3
source:
  edition: WLC
  text: וַ/יֹּ֜אמֶר אַחְאָ֣ב מֶֽלֶךְ יִשְׂרָאֵ֗ל אֶל יְהֽוֹשָׁפָט֙ מֶ֣לֶךְ יְהוּדָ֔ה
    הֲ/תֵלֵ֥ךְ עִמִּ֖/י רָמֹ֣ת גִּלְעָ֑ד וַ/יֹּ֣אמֶר ל֗/וֹ כָּמ֤וֹ/נִי כָמ֨וֹ/ךָ֙
    וּ/כְ/עַמְּ/ךָ֣ עַמִּ֔/י וְ/עִמְּ/ךָ֖ בַּ/מִּלְחָמָֽה־־׃
translation:
  text: And Ahab king of Israel said to Jehoshaphat king of Judah, “Will you go with
    me to Ramoth-gilead?” And he said to him, “I am as you are, and my people as your
    people, and I am with you in the battle.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more idiomatically, ''Your people are my people.'' The Hebrew wording
      is literally comparative: ''and as your people, my people.'''
    reason: lexical_alternative
  - marker: b
    text: The final clause is elliptical in Hebrew, literally 'and with you in the
      battle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתֵלֵךְ עִמִּי
  chosen: Will you go with me
  alternatives:
  - Would you go with me
  - Will you come with me
  lexicon: HALOT
  rationale: הלך with the interrogative הֲ and the preposition עִם naturally asks
    whether Jehoshaphat will accompany Ahab. 'Go with me' is the most direct rendering;
    'come with me' is possible in English but less tied to the Hebrew motion verb.
- source_word: רָמֹת גִּלְעָד
  chosen: Ramoth-gilead
  alternatives:
  - Ramoth Gilead
  lexicon: HALOT
  rationale: A place name, so transliterated rather than translated, following the
    project's policy for names. The hyphenated conventional English form helps readers
    recognize the single toponym.
- source_word: כָּמוֹנִי כָמוֹךָ
  chosen: I am as you are
  alternatives:
  - I am like you
  - I am as yourself
  lexicon: HALOT
  rationale: The idiom expresses solidarity or parity. Rendering it as a full English
    clause preserves the sense without sounding wooden. 'I am as you are' keeps the
    reciprocal force better than the shorter 'I am like you'.
- source_word: וּכְעַמְּךָ עַמִּי
  chosen: and my people as your people
  alternatives:
  - and my people are as your people
  - and your people are my people
  lexicon: HALOT
  rationale: The Hebrew is verbless and elliptical. The chosen rendering preserves
    the compact parallelism while making the sense clear. 'Your people are my people'
    is a smoother English idiom but reverses the Hebrew order and slightly shifts
    the nuance from comparison to identification.
- source_word: וְעִמְּךָ בַּמִּלְחָמָה
  chosen: and I am with you in the battle
  alternatives:
  - and with you in battle
  - and I will be with you in the battle
  lexicon: HALOT
  rationale: The phrase is elliptical, lacking an explicit verb. English requires
    supplementation. 'I am with you in the battle' best conveys Jehoshaphat's pledge
    of support while staying close to the Hebrew. A future 'I will be' is interpretive
    and less directly grounded in the verbless clause.
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  chosen: said ... said
  alternatives:
  - spoke ... said
  - asked ... answered
  lexicon: HALOT
  rationale: אמר is the standard speech verb in both clauses. Although the first introduces
    a question and the second a reply, retaining 'said' in both places stays close
    to the Hebrew narrative style without loss of clarity.
