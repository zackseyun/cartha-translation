theological_decisions:
- issue: Rendering the divine names יְהוָה and אֱלֹהִים within the same verse
  chosen_reading: the LORD ... God
  alternative_readings:
  - Yahweh ... God
  - the LORD ... the LORD
  rationale: The verse intentionally uses both יְהוָה and אֱלֹהִים. Following doctrine,
    יְהוָה is rendered 'the LORD.' אֱלֹהִים is rendered 'God' rather than harmonized
    away, preserving the source-text variation without implying two different deities.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD; Translation
    philosophy #1 and #5'
- issue: Whether Jehoshaphat's cry should be made explicitly a prayer
  chosen_reading: Jehoshaphat cried out
  alternative_readings:
  - Jehoshaphat cried out to the LORD
  - Jehoshaphat cried for help
  rationale: Although the parallel in 1 Kings 22:32 may suggest calling to the LORD,
    this Hebrew verse does not explicitly state the addressee in this clause. To avoid
    importing detail not directly expressed, the translation leaves the cry implicit
    while the following clause shows the LORD's help.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and ''Never: Import doctrinal
    claims the text does not make.'''
