id: 2CH.18.31
reference: 2 Chronicles 18:31
source:
  edition: WLC
  text: וַ/יְהִ֡י כִּ/רְאוֹת֩ שָׂרֵ֨י הָ/רֶ֜כֶב אֶת יְהוֹשָׁפָ֗ט וְ/הֵ֤מָּה אָֽמְרוּ֙
    מֶ֣לֶךְ יִשְׂרָאֵ֣ל ה֔וּא וַ/יָּסֹ֥בּוּ עָלָ֖י/ו לְ/הִלָּחֵ֑ם וַ/יִּזְעַ֤ק יְהֽוֹשָׁפָט֙
    וַֽ/יהוָ֣ה עֲזָר֔/וֹ וַ/יְסִיתֵ֥/ם אֱלֹהִ֖ים מִמֶּֽ/נּוּ־׃
translation:
  text: And it happened that when the commanders of the chariots saw Jehoshaphat,
    they said, “It is the king of Israel.” So they turned against him to fight, but
    Jehoshaphat cried out, and the LORD helped him, and God drew them away from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “He is the king of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “God diverted them from him.” The Hebrew verb can mean to turn or move
      someone away from a target.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי הָרֶכֶב
  chosen: the commanders of the chariots
  alternatives:
  - the captains of the chariots
  - the chariot commanders
  lexicon: HALOT
  rationale: שָׂרֵי denotes military leaders/officials; הָרֶכֶב specifies the chariot
    force. 'Commanders of the chariots' is clear modern English and preserves the
    military sense better than the more archaic 'captains.'
- source_word: מֶלֶךְ יִשְׂרָאֵל הוּא
  chosen: It is the king of Israel
  alternatives:
  - He is the king of Israel
  lexicon: HALOT
  rationale: The Hebrew nominal clause identifies Jehoshaphat as the presumed target.
    English idiom naturally uses 'It is...' in direct speech here, though 'He is...'
    is also possible.
- source_word: וַיָּסֹבּוּ עָלָיו
  chosen: they turned against him
  alternatives:
  - they surrounded him
  - they turned aside toward him
  lexicon: HALOT
  rationale: סבב can denote turning/encircling. In this battle context, the sense
    is that they redirected themselves toward Jehoshaphat as their target. 'Turned
    against him' captures the hostile movement without overcommitting to a full encirclement.
- source_word: לְהִלָּחֵם
  chosen: to fight
  alternatives:
  - to wage war
  - to attack
  lexicon: HALOT
  rationale: 'The infinitive gives purpose: they turned against him in order to engage
    him in battle. ''To fight'' is the most direct and natural rendering.'
- source_word: וַיִּזְעַק
  chosen: cried out
  alternatives:
  - called out
  - cried for help
  lexicon: HALOT
  rationale: זעק often conveys a strong cry, frequently in distress. 'Cried out' preserves
    the intensity while avoiding adding an explicit object not stated in this clause.
- source_word: וַיהוָה עֲזָרוֹ
  chosen: the LORD helped him
  alternatives:
  - the LORD came to his aid
  lexicon: HALOT
  rationale: The verb עזר straightforwardly means 'help.' The divine name is rendered
    'the LORD' per doctrine for יְהוָה.
- source_word: וַיְסִיתֵם אֱלֹהִים מִמֶּנּוּ
  chosen: God drew them away from him
  alternatives:
  - God diverted them from him
  - God incited them away from him
  - God moved them away from him
  lexicon: HALOT
  rationale: The hiphil of סות here means to move, turn, or divert someone away from
    a target, not necessarily to 'entice' in a moral sense. 'Drew them away from him'
    communicates the result in idiomatic English while preserving divine agency. 'God'
    renders אֱלֹהִים naturally in this clause alongside 'the LORD' for יְהוָה earlier
    in the verse.
- source_word: וַיְהִי כִּרְאוֹת
  chosen: And it happened that when ... saw
  alternatives:
  - And when ... saw
  - Now when ... saw
  lexicon: HALOT
  rationale: This is a common Hebrew narrative transition. Retaining 'And it happened
    that' preserves the discourse flow, though slightly smoothed English could omit
    it. Here it is kept in moderated form to reflect the Hebrew without sounding overly
    wooden.
