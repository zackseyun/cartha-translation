id: 2CH.18.29
reference: 2 Chronicles 18:29
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ מֶ֨לֶךְ יִשְׂרָאֵ֜ל אֶל יְהוֹשָׁפָ֗ט הִתְחַפֵּשׂ֙ וָ/ב֣וֹא בַ/מִּלְחָמָ֔ה
    וְ/אַתָּ֖ה לְבַ֣שׁ בְּגָדֶ֑י/ךָ וַ/יִּתְחַפֵּשׂ֙ מֶ֣לֶךְ יִשְׂרָאֵ֔ל וַ/יָּבֹ֖אוּ
    בַּ/מִּלְחָמָֽה־׃
translation:
  text: Then the king of Israel said to Jehoshaphat, “I will disguise myself and go
    into the battle, but you, put on your robes.” So the king of Israel disguised
    himself, and they went into the battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'disguise yourself'; the Hebrew form is terse, but the
      context and following clause indicate the king of Israel is speaking of disguising
      himself.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְחַפֵּשׂ
  chosen: I will disguise myself
  alternatives:
  - disguise yourself
  - change your appearance
  lexicon: HALOT
  rationale: The form is an infinitive absolute used in direct speech before וָבוא,
    functioning idiomatically with first-person force in context, as confirmed by
    the following narrative וַיִּתְחַפֵּשׂ referring to the king of Israel. Rendering
    it as first person makes the sense explicit in natural English. A second-person
    imperative would conflict with the subsequent clause 'but you, put on your robes'
    and the narrative outcome.
- source_word: וָבֹא
  chosen: and go
  alternatives:
  - then I will enter
  - and come
  lexicon: HALOT
  rationale: From בוא, here in sequence with the self-disguising action and followed
    by 'into the battle.' 'Go' is more natural than 'come' in English for entering
    battle from the speaker's perspective.
- source_word: בַמִּלְחָמָה
  chosen: into the battle
  alternatives:
  - into battle
  - in the battle
  lexicon: HALOT
  rationale: The preposition with the noun can be rendered either more formally ('in
    the battle') or idiomatically ('into battle'). 'Into the battle' preserves the
    movement implied by בוא while remaining readable.
- source_word: לְבַשׁ בְּגָדֶיךָ
  chosen: put on your robes
  alternatives:
  - wear your garments
  - dress in your clothes
  lexicon: HALOT
  rationale: בגדים is a general term for garments/clothes, but in royal context 'robes'
    appropriately conveys Jehoshaphat's identifiable royal attire, which explains
    the tactical contrast with Ahab's disguise. This is a contextually justified specification
    rather than paraphrase.
- source_word: וְאַתָּה
  chosen: but you
  alternatives:
  - and you
  - while you
  lexicon: HALOT
  rationale: 'The pronoun is contrastive in context: the king of Israel will disguise
    himself, whereas Jehoshaphat is to remain in visible royal dress. ''But you''
    brings out that contrast clearly.'
- source_word: וַיָּבֹאוּ
  chosen: they went
  alternatives:
  - they came
  - they entered
  lexicon: HALOT
  rationale: The plural verb refers to the two kings proceeding to battle. 'They went'
    is the most natural English narrative rendering.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  alternatives:
  - Israel's king
  lexicon: HALOT
  rationale: A straightforward formal rendering of the title, retained consistently
    in both occurrences.
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names rather than translate them.
