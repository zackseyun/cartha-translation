id: 2CH.18.30
reference: 2 Chronicles 18:30
source:
  edition: WLC
  text: וּ/מֶ֣לֶךְ אֲרָ֡ם צִוָּה֩ אֶת שָׂרֵ֨י הָ/רֶ֤כֶב אֲשֶׁר ל/וֹ֙ לֵ/אמֹ֔ר לֹ֚א
    תִּלָּ֣חֲמ֔וּ אֶת הַ/קָּטֹ֖ן אֶת הַ/גָּד֑וֹל כִּ֛י אִֽם אֶת מֶ֥לֶךְ יִשְׂרָאֵ֖ל
    לְ/בַדּֽ/וֹ־־־־־־׃
translation:
  text: Now the king of Aram had commanded the commanders of the chariots that were
    his, saying, “Do not fight with small or great, but only with the king of Israel
    alone.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “Do not fight with anyone, small or great, but only
      with the king of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מֶלֶךְ אֲרָם
  chosen: Now the king of Aram
  alternatives:
  - And the king of Aram
  - But the king of Aram
  lexicon: HALOT
  rationale: The prefixed conjunction can be rendered simply as 'and,' but in narrative
    English 'now' smoothly marks a shift to background information while preserving
    the discourse connection. 'Aram' is transliterated as a proper name per translation
    philosophy.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: The verb means 'command, order.' The English pluperfect fits the narrative
    setting, since this order precedes the action narrated in the surrounding verses.
- source_word: שָׂרֵי הָרֶכֶב
  chosen: the commanders of the chariots
  alternatives:
  - the captains of the chariots
  - the commanders of the chariot force
  - the chariot commanders
  lexicon: HALOT
  rationale: שָׂרֵי denotes officers/commanders, and הָרֶכֶב refers to chariotry or
    chariot force. 'Commanders of the chariots' is a natural, sufficiently formal
    rendering that preserves the military sense.
- source_word: אֲשֶׁר לוֹ
  chosen: that were his
  alternatives:
  - who belonged to him
  - under his command
  lexicon: HALOT
  rationale: The relative clause literally means 'which were to him/belonged to him.'
    'That were his' is concise and idiomatic, indicating possession or command without
    over-interpreting.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech.
- source_word: לֹא תִּלָּחֲמוּ
  chosen: Do not fight
  alternatives:
  - You shall not fight
  - Do not engage in battle
  lexicon: HALOT
  rationale: The Niphal/imperfect in direct command functions as a prohibition. 'Do
    not fight' is clear modern English.
- source_word: אֶת הַקָּטֹן אֶת הַגָּדוֹל
  chosen: with small or great
  alternatives:
  - with the small or the great
  - with anyone, small or great
  - with either small or great
  lexicon: HALOT
  rationale: This idiom contrasts lesser and greater persons, meaning no one regardless
    of rank. The preposition is not repeated in Hebrew, but English requires a smooth
    rendering. 'Small or great' preserves the idiom more closely than an interpretive
    paraphrase like 'anyone.'
- source_word: כִּי אִם
  chosen: but only
  alternatives:
  - except
  - but rather
  lexicon: HALOT
  rationale: The construction marks exception/exclusivity. 'But only' communicates
    the restrictive force naturally in English.
- source_word: אֶת מֶלֶךְ יִשְׂרָאֵל
  chosen: with the king of Israel
  alternatives:
  - against the king of Israel
  - the king of Israel
  lexicon: HALOT
  rationale: Because the preceding verb 'fight' in English normally takes 'with' or
    'against,' and the earlier objects are rendered with 'with,' the same sense is
    supplied here for consistency. 'With' preserves the Hebrew construction without
    adding a stronger adversative nuance than necessary.
- source_word: לְבַדּוֹ
  chosen: alone
  alternatives:
  - by himself
  - only
  lexicon: HALOT
  rationale: 'The term means ''alone/by himself.'' Here it emphasizes exclusivity:
    the king of Israel is the sole target.'
