id: 2CH.18.24
reference: 2 Chronicles 18:24
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מִיכָ֔יְהוּ הִנְּ/ךָ֥ רֹאֶ֖ה בַּ/יּ֣וֹם הַ/ה֑וּא אֲשֶׁ֥ר תָּב֛וֹא
    חֶ֥דֶר בְּ/חֶ֖דֶר לְ/הֵחָבֵֽא׃
translation:
  text: Micaiah said, “Look, you will see on that day when you go from room to room
    to hide yourself.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''room within room'' or ''chamber to chamber,'' possibly implying
      retreat into an inner room.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְּךָ
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  lexicon: HALOT
  rationale: Deictic/interjection drawing attention to the certainty of the prediction.
    'Look' is readable modern English and preserves the force better than archaic
    'Behold.'
- source_word: רֹאֶה
  chosen: you will see
  alternatives:
  - you are seeing
  - you shall see
  lexicon: HALOT
  rationale: 'Although formally a participle (''seeing''), in context after הִנְּךָ
    it functions predictively: Micaiah is foretelling what Zedekiah will experience.
    ''You will see'' gives the natural English sense.'
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal idiom. 'On that day' is idiomatic modern English while
    remaining close to the Hebrew.
- source_word: אֲשֶׁר תָּבֹא
  chosen: when you go
  alternatives:
  - when you enter
  - that you will come
  lexicon: HALOT
  rationale: The relative particle plus verb introduces the circumstance in which
    the prediction will be fulfilled. 'When you go' fits the movement implied by the
    following phrase 'from room to room.'
- source_word: חֶדֶר בְּחֶדֶר
  chosen: from room to room
  alternatives:
  - into an inner room
  - room within room
  - chamber to chamber
  lexicon: HALOT
  rationale: The repeated noun with preposition expresses movement deeper from one
    chamber to another, likely in frantic concealment. 'From room to room' is clear
    and idiomatic; more literal options are preserved in a footnote because the Hebrew
    can suggest an inner chamber.
- source_word: לְהֵחָבֵא
  chosen: to hide yourself
  alternatives:
  - to hide
  - to conceal yourself
  lexicon: HALOT
  rationale: Niphal infinitive of חבא, reflexive/passive in sense. 'To hide yourself'
    makes explicit the personal involvement of the second-person subject in natural
    English.
- source_word: מִיכָיְהוּ
  chosen: Micaiah
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
