id: 2CH.18.25
reference: 2 Chronicles 18:25
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ מֶ֣לֶךְ יִשְׂרָאֵ֔ל קְחוּ֙ אֶת מִיכָ֔יְהוּ וַ/הֲשִׁיבֻ֖/הוּ אֶל
    אָמ֣וֹן שַׂר הָ/עִ֑יר וְ/אֶל יוֹאָ֖שׁ בֶּן הַ/מֶּֽלֶךְ־־־־־׃
translation:
  text: Then the king of Israel said, “Take Micaiah and return him to Amon, the governor
    of the city, and to Joash the king’s son.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the commander of the city.” The Hebrew title can denote a civic or military
      official.
    reason: lexical_alternative
  - marker: b
    text: Or “son of the king.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - and ... said
  - so ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  alternatives:
  - Israel’s king
  lexicon: HALOT
  rationale: A straightforward formal rendering of the construct chain; in context
    this refers to Ahab, but the Hebrew uses the title rather than the personal name.
- source_word: קְחוּ
  chosen: Take
  alternatives:
  - Seize
  - Bring
  lexicon: HALOT
  rationale: The imperative of לקח commonly means 'take.' 'Seize' would overstate
    hostility beyond the lexical data, while 'bring' is less direct than the Hebrew
    command.
- source_word: מִיכָיְהוּ
  chosen: Micaiah
  alternatives:
  - Micaiahu
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: וַהֲשִׁיבֻהוּ
  chosen: return him
  alternatives:
  - bring him back
  - take him back
  lexicon: HALOT
  rationale: The Hiphil of שוב here means to cause someone to return. 'Return him'
    is concise and accurate; 'bring him back' is possible but slightly more interpretive.
- source_word: אֶל
  chosen: to
  alternatives:
  - back to
  lexicon: HALOT
  rationale: Simple directional preposition. The sense of 'back' is already carried
    by the verb 'return him.'
- source_word: אָמ֣וֹן
  chosen: Amon
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: שַׂר הָעִיר
  chosen: the governor of the city
  alternatives:
  - the commander of the city
  - the official of the city
  - the ruler of the city
  lexicon: HALOT
  rationale: שַׂר denotes a leader, official, or commander. In this civic context,
    'governor' best communicates an administrative office in readable modern English
    without implying strictly military command.
- source_word: וְאֶל יוֹאָשׁ
  chosen: and to Joash
  alternatives:
  - and Joash
  lexicon: HALOT
  rationale: The repeated preposition should be represented in English because it
    marks a second recipient of the command.
- source_word: בֶּן הַמֶּלֶךְ
  chosen: the king’s son
  alternatives:
  - son of the king
  - the prince
  lexicon: HALOT
  rationale: Formally accurate and idiomatic. 'Prince' is possible as an interpretive
    equivalent, but the Hebrew expression is explicitly relational, so 'the king’s
    son' better preserves the wording.
