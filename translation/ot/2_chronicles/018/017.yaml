id: 2CH.18.17
reference: 2 Chronicles 18:17
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר מֶֽלֶךְ יִשְׂרָאֵ֖ל אֶל יְהוֹשָׁפָ֑ט הֲ/לֹא֙ אָמַ֣רְתִּי אֵלֶ֔י/ךָ
    לֹא יִתְנַבֵּ֥א עָלַ֛/י ט֖וֹב כִּ֥י אִם לְ/רָֽע־־־־׃ס
translation:
  text: Then the king of Israel said to Jehoshaphat, “Did I not tell you that he would
    not prophesy good concerning me, but only evil?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he would not prophesy anything good about me, but only disaster.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  alternatives:
  - Israel's king
  lexicon: HALOT
  rationale: A direct, formal rendering of the construct chain; this is the standard
    narrative designation here.
- source_word: אֶל יְהוֹשָׁפָט
  chosen: to Jehoshaphat
  alternatives:
  - to King Jehoshaphat
  lexicon: HALOT
  rationale: The preposition אֶל is straightforwardly directional/speech-recipient.
    The Hebrew names Jehoshaphat without the title, so the translation does likewise.
- source_word: הֲלֹא
  chosen: Did I not
  alternatives:
  - Have I not
  - Was I not
  lexicon: HALOT
  rationale: This particle combination introduces a rhetorical question expecting
    agreement. 'Did I not' fits the past reference established by אָמַרְתִּי.
- source_word: אָמַרְתִּי אֵלֶיךָ
  chosen: tell you
  alternatives:
  - say to you
  lexicon: HALOT
  rationale: '''Tell you'' is idiomatic English for ''said to you'' in this context
    and preserves the direct personal address.'
- source_word: לֹא יִתְנַבֵּא
  chosen: he would not prophesy
  alternatives:
  - he does not prophesy
  - he will not prophesy
  lexicon: HALOT
  rationale: 'The imperfect after a past introductory verb is best rendered in English
    as future-in-the-past: Ahab is recalling what he had previously said about Micaiah''s
    pattern.'
- source_word: עָלַי
  chosen: concerning me
  alternatives:
  - about me
  - for me
  lexicon: HALOT
  rationale: The preposition עַל with this verb here indicates reference or concern.
    'Concerning me' is clear and slightly more formal; 'for me' could imply benefit
    rather than subject matter.
- source_word: טוֹב
  chosen: good
  alternatives:
  - anything good
  - what is good
  - favorably
  lexicon: HALOT
  rationale: 'The adjective functions substantivally: ''good.'' English can preserve
    the concise contrast with ''evil.'''
- source_word: כִּי אִם
  chosen: but only
  alternatives:
  - except
  - but rather
  lexicon: HALOT
  rationale: The expression marks a strong exception/contrast. 'But only' captures
    the idiomatic force in natural English.
- source_word: לְרָע
  chosen: evil
  alternatives:
  - harm
  - disaster
  - bad
  lexicon: HALOT
  rationale: In context Ahab complains that Micaiah predicts adverse outcomes. 'Evil'
    preserves the lexical contrast with 'good' and reflects the Hebrew adjective used
    substantivally, though the sense is specifically unfavorable or disastrous prophecy.
