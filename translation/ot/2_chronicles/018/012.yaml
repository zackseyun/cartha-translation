id: 2CH.18.12
reference: 2 Chronicles 18:12
source:
  edition: WLC
  text: וְ/הַ/מַּלְאָ֞ךְ אֲשֶׁר הָלַ֣ךְ לִ/קְרֹ֣א לְ/מִיכָ֗יְהוּ דִּבֶּ֤ר אֵלָי/ו֙
    לֵ/אמֹ֔ר הִנֵּ֞ה דִּבְרֵ֧י הַ/נְּבִאִ֛ים פֶּֽה אֶחָ֥ד ט֖וֹב אֶל הַ/מֶּ֑לֶךְ וִֽ/יהִי
    נָ֧א דְבָרְ/ךָ֛ כְּ/אַחַ֥ד מֵ/הֶ֖ם וְ/דִבַּ֥רְתָּ טּֽוֹב־׀־־־׃
translation:
  text: Now the messenger who had gone to summon Micaiah spoke to him, saying, “Look,
    the words of the prophets are with one mouth favorable to the king. Please let
    your word be like one of theirs, and speak favorably.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'with one mouth,' an idiom meaning in complete agreement
      or with one voice.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָךְ
  chosen: messenger
  alternatives:
  - angel
  lexicon: HALOT
  rationale: In this narrative context, the figure is the one sent to call Micaiah,
    so 'messenger' fits the human envoy sense better than 'angel.'
- source_word: לִקְרֹא
  chosen: to summon
  alternatives:
  - to call
  lexicon: HALOT
  rationale: '''Summon'' captures the official sense of calling someone to appear
    before the king, while remaining natural English.'
- source_word: לְמִיכָיְהוּ
  chosen: Micaiah
  alternatives:
  - Micaiahu
  rationale: Personal names are transliterated by standard English convention.
- source_word: דִּבֶּר אֵלָיו לֵאמֹר
  chosen: spoke to him, saying
  alternatives:
  - said to him
  lexicon: HALOT
  rationale: This preserves the Hebrew narrative formula with readable English.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: '''Look'' preserves the deictic force in contemporary readable English
    without archaic tone.'
- source_word: דִּבְרֵי הַנְּבִאִים
  chosen: the words of the prophets
  alternatives:
  - the message of the prophets
  lexicon: HALOT
  rationale: The plural construct is most directly represented by 'the words of the
    prophets.'
- source_word: פֶּה אֶחָד
  chosen: with one mouth
  alternatives:
  - with one voice
  - unanimously
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'one mouth.' To preserve source texture
    while remaining intelligible, the main text keeps the image rather than flattening
    it to 'unanimously.'
- source_word: טוֹב אֶל הַמֶּלֶךְ
  chosen: favorable to the king
  alternatives:
  - good for the king
  - good toward the king
  lexicon: HALOT
  rationale: Here 'good' refers to speech that supports or benefits the king; 'favorable
    to the king' conveys the idiomatic sense in English.
- source_word: וִיהִי נָא
  chosen: Please let ... be
  alternatives:
  - Now let ... be
  - May ... please be
  lexicon: HALOT
  rationale: This jussive plus particle נָא expresses polite urging; 'Please let'
    captures both mood and tone.
- source_word: דְבָרְךָ
  chosen: your word
  alternatives:
  - your words
  - your message
  lexicon: HALOT
  rationale: The singular is retained because the Hebrew is singular and refers to
    Micaiah's prophetic utterance as a unit.
- source_word: כְּאַחַד מֵהֶם
  chosen: like one of theirs
  alternatives:
  - like one of them
  - as one of them
  lexicon: HALOT
  rationale: The comparison is to the prophetic words just mentioned; 'like one of
    theirs' makes the referent clear in English.
- source_word: וְדִבַּרְתָּ טּוֹב
  chosen: and speak favorably
  alternatives:
  - and speak good
  - and speak what is favorable
  lexicon: HALOT
  rationale: This repeats the earlier idiom with natural English while preserving
    the exhortation to give a positive oracle.
