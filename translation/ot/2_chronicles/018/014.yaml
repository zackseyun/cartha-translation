id: 2CH.18.14
reference: 2 Chronicles 18:14
source:
  edition: WLC
  text: וַ/יָּבֹא֮ אֶל הַ/מֶּלֶךְ֒ וַ/יֹּ֨אמֶר הַ/מֶּ֜לֶךְ אֵלָ֗י/ו מִיכָה֙ הֲ/נֵלֵ֞ךְ
    אֶל רָמֹ֥ת גִּלְעָ֛ד לַ/מִּלְחָמָ֖ה אִם אֶחְדָּ֑ל וַ/יֹּ֨אמֶר֙ עֲל֣וּ וְ/הַצְלִ֔יחוּ
    וְ/יִנָּתְנ֖וּ בְּ/יֶדְ/כֶֽם־־־׃
translation:
  text: So he came to the king, and the king said to him, “Micaiah, should we go to
    Ramoth-gilead for battle, or should I refrain?” And he said, “Go up and succeed,
    and they will be given into your hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Micaiah's reply is likely ironic or sarcastic in light of the surrounding
      context; the Hebrew itself does not explicitly mark the irony.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: So he came
  alternatives:
  - And he came
  - Then he came
  lexicon: HALOT
  rationale: Wayyiqtol of בוא narrates the next event in sequence. 'So he came' gives
    natural English narrative flow while preserving the sequential force.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun; repeated in the verse
    and retained for clarity.
- source_word: מִיכָה
  chosen: Micaiah
  alternatives:
  - Micah
  lexicon: HALOT
  rationale: The proper name here refers to the prophet known in this narrative as
    Micaiah son of Imlah; standard English convention in this context is 'Micaiah,'
    avoiding confusion with the distinct prophet Micah.
- source_word: הֲנֵלֵךְ
  chosen: should we go
  alternatives:
  - shall we go
  - are we to go
  lexicon: HALOT
  rationale: First person common plural interrogative of הלך. 'Should we go' fits
    idiomatic English for the king's inquiry while preserving the cohortative-like
    deliberative sense.
- source_word: רָמֹת גִּלְעָד
  chosen: Ramoth-gilead
  alternatives:
  - Ramoth Gilead
  lexicon: HALOT
  rationale: Standard English transliteration of the place name; hyphenation reflects
    common Bible-English usage.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - to battle
  - for war
  lexicon: HALOT
  rationale: The preposition ל with מלחמה expresses purpose. 'For battle' is concise,
    natural, and preserves the military sense.
- source_word: אִם אֶחְדָּל
  chosen: or should I refrain
  alternatives:
  - or shall I refrain
  - or should I hold back
  - or should I desist
  lexicon: HALOT
  rationale: חדל means to cease, refrain, or hold back. Because the verb is first
    person singular after the plural 'should we go,' the Hebrew likely reflects the
    king's personal decision-making voice. The translation preserves that shift rather
    than smoothing it away.
- source_word: עֲלוּ
  chosen: Go up
  alternatives:
  - Go
  lexicon: HALOT
  rationale: עלה is literally 'go up' and is commonly used for military movement toward
    a location. The more literal 'Go up' preserves the Hebrew idiom.
- source_word: וְהַצְלִיחוּ
  chosen: and succeed
  alternatives:
  - and prosper
  - and be successful
  lexicon: HALOT
  rationale: Hiphil of צלח here conveys success/prosperity in the campaign. 'Succeed'
    is readable modern English and fits the immediate military context.
- source_word: וְיִנָּתְנוּ בְּיֶדְכֶם
  chosen: and they will be given into your hand
  alternatives:
  - and it will be given into your hand
  - and they will be delivered into your hand
  lexicon: HALOT
  rationale: The Niphal plural of נתן is best rendered passively, 'they will be given.'
    The plural verb likely has an indefinite or implicit plural subject (e.g., the
    city or enemy forces conceived collectively/plurally in context/tradition). 'Into
    your hand' preserves the Hebrew idiom for being delivered into someone's power.
