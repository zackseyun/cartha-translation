id: 2CH.18.18
reference: 2 Chronicles 18:18
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר לָ/כֵ֖ן שִׁמְע֣וּ דְבַר יְהוָ֑ה רָאִ֤יתִי אֶת יְהוָה֙ יוֹשֵׁ֣ב
    עַל כִּסְא֔/וֹ וְ/כָל צְבָ֤א הַ/שָּׁמַ֨יִם֙ עֹֽמְדִ֔ים עַל יְמִינ֖/וֹ וּ/שְׂמֹאלֽ/וֹ־־־־־׃
translation:
  text: 'And he said, “Therefore hear the word of the LORD: I saw the LORD sitting
    on his throne, and all the host of heaven standing at his right hand and at his
    left.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''all the host of heaven''; alternatively, ''all the heavenly host''
      or ''all the army of heaven.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks an inferential or consequential transition from the preceding exchange.
    'Therefore' preserves the formal connection and prophetic force better than the
    looser 'so.'
- source_word: שִׁמְעוּ
  chosen: hear
  alternatives:
  - listen to
  lexicon: HALOT
  rationale: Imperative plural calling for attention to prophetic speech. 'Hear' is
    concise and idiomatic in biblical proclamation contexts.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Word' preserves the canonical resonance
    of divine speech; YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה.
- source_word: רָאִיתִי
  chosen: I saw
  alternatives:
  - I have seen
  lexicon: HALOT
  rationale: Simple past fits the narrative report of Micaiah's vision.
- source_word: יוֹשֵׁב
  chosen: sitting
  alternatives:
  - seated
  lexicon: HALOT
  rationale: Participle describing the LORD's enthroned posture. 'Sitting' is direct
    and natural; 'seated' is possible but slightly more interpretive/stylized.
- source_word: כִּסְאוֹ
  chosen: his throne
  lexicon: HALOT
  rationale: Straightforward rendering of the royal throne imagery in the vision.
- source_word: כָל צְבָא הַשָּׁמַיִם
  chosen: all the host of heaven
  alternatives:
  - all the army of heaven
  - all the heavenly host
  lexicon: HALOT
  rationale: צָבָא denotes an assembled host/army. 'Host of heaven' is established,
    accurate English for the heavenly court setting, while retaining the collective
    sense.
- source_word: עֹמְדִים
  chosen: standing
  alternatives:
  - stationed
  lexicon: HALOT
  rationale: Participle indicating posture and readiness in the heavenly court. 'Standing'
    best matches the plain sense.
- source_word: עַל יְמִינוֹ וּשְׂמֹאלוֹ
  chosen: at his right hand and at his left
  alternatives:
  - on his right and on his left
  - to his right and to his left
  lexicon: HALOT
  rationale: Courtly spatial language. 'At his right hand and at his left' preserves
    the idiomatic dignity of the scene and reflects the repeated preposition.
