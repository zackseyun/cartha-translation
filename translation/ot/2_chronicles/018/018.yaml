theological_decisions:
- issue: Rendering the divine name יְהוָה in a vision where the prophet says he saw
    יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse explicitly names YHWH twice and depicts him enthroned in the
    heavenly council. The translation preserves the directness of the vision while
    following the project's default rendering of the divine name as 'the LORD,' without
    softening the anthropomorphic/throne-room imagery.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → ''the LORD'''
