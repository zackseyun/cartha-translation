id: 2CH.18.22
reference: 2 Chronicles 18:22
source:
  edition: WLC
  text: וְ/עַתָּ֗ה הִנֵּ֨ה נָתַ֤ן יְהוָה֙ ר֣וּחַ שֶׁ֔קֶר בְּ/פִ֖י נְבִיאֶ֣י/ךָ אֵ֑לֶּה וַֽ/יהוָ֔ה דִּבֶּ֥ר עָלֶ֖י/ךָ רָעָֽה׃ס
translation:
  text: And now, behold, Yahweh has put a lying spirit in the mouth of these prophets of yours, and Yahweh has spoken disaster against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a spirit of falsehood.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'has spoken evil against you'; here 'evil' refers to disaster or calamity, not moral evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַתָּה
  chosen: And now
  alternatives:
  - Now
  - So now
  lexicon: HALOT
  rationale: Temporal/discourse marker introducing Micaiah’s conclusion from the heavenly vision. 'And now' preserves the connective force better than a bare 'Now.'
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Deictic particle drawing attention. 'Look' is readable modern English and preserves the force without archaic tone; retained explicitly rather than omitted.
- source_word: נָתַן
  chosen: has put
  alternatives:
  - has given
  - has placed
  lexicon: HALOT
  rationale: In context with 'spirit' and 'in the mouth,' 'has put' is the most natural English idiom while remaining close to the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md contested terms table.
- source_word: ר֣וּחַ שֶׁקֶר
  chosen: a lying spirit
  alternatives:
  - a spirit of falsehood
  - a false spirit
  lexicon: HALOT
  rationale: Construct phrase denoting a spirit characterized by deception. 'Lying spirit' is idiomatic, direct, and traditional without being misleading. 'Spirit of falsehood' is possible but less natural here.
- source_word: בְּ/פִי
  chosen: in the mouth of
  alternatives:
  - in the mouths of
  - on the lips of
  lexicon: HALOT
  rationale: The Hebrew form is singular 'mouth' in a collective/distributive idiom with a plural complement. English commonly renders this idiom as singular 'in the mouth of these prophets,' preserving the Hebrew expression.
- source_word: נְבִיאֶ֣י/ךָ אֵלֶּה
  chosen: these prophets of yours
  alternatives:
  - these your prophets
  - your prophets here
  lexicon: HALOT
  rationale: Preserves the demonstrative emphasis and the second-person possessive. 'These prophets of yours' is natural modern English and keeps the confrontational tone.
- source_word: דִּבֶּר
  chosen: has spoken
  alternatives:
  - has declared
  - has pronounced
  lexicon: HALOT
  rationale: The verb is the standard 'speak.' 'Has spoken' keeps the wording transparent; the object 'disaster' supplies the judicial sense.
- source_word: עָלֶיךָ
  chosen: against you
  alternatives:
  - concerning you
  - upon you
  lexicon: HALOT
  rationale: With רָעָה in a judgment context, 'against you' best conveys hostile/judicial direction rather than mere topic.
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - harm
  - evil
  - calamity
  lexicon: HALOT
  rationale: In prophetic judgment contexts, רָעָה often denotes calamity/disaster rather than moral evil. 'Disaster' avoids implying that the LORD commits moral evil while preserving the announced judgment.
