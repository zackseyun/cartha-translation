theological_decisions:
- issue: Rendering of divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the project's contested terms policy for YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering of רָעָה with reference to the LORD's action
  chosen_reading: disaster
  alternative_readings:
  - evil
  - harm
  - calamity
  rationale: The Hebrew term can denote either moral evil or calamity. In this judgment oracle, the sense is announced calamity against Ahab, not moral evil in God. This preserves theological tension about divine sovereignty without importing a claim that God does moral evil.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 (preserve theological tension rather than resolve it)'
