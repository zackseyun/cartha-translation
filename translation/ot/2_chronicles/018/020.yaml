theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The translation follows the project's stated default for the Tetragrammaton
    rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Moral/theological nuance of פתה in a divine-council context
  chosen_reading: I will entice him
  alternative_readings:
  - I will persuade him
  - I will deceive him
  rationale: The verse depicts the spirit's proposal without yet specifying the exact
    method; the next verse supplies the deceptive means. 'Entice' preserves the text's
    tension without importing a fuller doctrinal explanation into this line alone.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
