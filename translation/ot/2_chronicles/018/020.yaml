id: 2CH.18.20
reference: 2 Chronicles 18:20
source:
  edition: WLC
  text: וַ/יֵּצֵ֣א הָ/ר֗וּחַ וַֽ/יַּעֲמֹד֙ לִ/פְנֵ֣י יְהוָ֔ה וַ/יֹּ֖אמֶר אֲנִ֣י אֲפַתֶּ֑/נּוּ
    וַ/יֹּ֧אמֶר יְהוָ֛ה אֵלָ֖י/ו בַּ/מָּֽה׃
translation:
  text: Then the spirit came forward and stood before the LORD and said, ‘I will entice
    him.’ And the LORD said to him, ‘By what means?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will deceive him' or 'I will persuade him.' The Hebrew verb can carry
      the sense of enticing, persuading, or deceiving depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרוּחַ
  chosen: the spirit
  alternatives:
  - the wind
  - the breath
  lexicon: HALOT
  rationale: רוּחַ has a broad semantic range including wind, breath, and spirit.
    In this heavenly-council scene, the personal actions 'came forward,' 'stood before,'
    and 'said' indicate a personal/spiritual being, so 'the spirit' best fits the
    context.
- source_word: וַיֵּצֵא
  chosen: came forward
  alternatives:
  - went out
  - came out
  lexicon: HALOT
  rationale: The verb יצא literally means 'go out/come out.' In this courtly setting,
    with the spirit presenting itself before the LORD, 'came forward' communicates
    the movement into prominence before the throne more naturally in English while
    preserving the scene's formal character.
- source_word: וַיַּעֲמֹד לִפְנֵי
  chosen: stood before
  alternatives:
  - took his stand before
  - stood in the presence of
  lexicon: HALOT
  rationale: The idiom עמד לפני commonly means to stand before someone in attendance
    or presentation. 'Stood before' is a clear, natural rendering that preserves the
    formal audience setting.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following longstanding English convention and the stated policy for
    יְהוָה.
- source_word: אֲפַתֶּנּוּ
  chosen: I will entice him
  alternatives:
  - I will persuade him
  - I will deceive him
  lexicon: HALOT
  rationale: The piel of פתה can mean entice, persuade, or deceive depending on context.
    Here the spirit proposes to induce Ahab toward a fatal course through false prophecy
    (made explicit in the next verse). 'Entice' preserves the causative sense without
    over-specifying the mechanism in this verse itself; the stronger deceptive nuance
    can be preserved as an alternative.
- source_word: בַּמָּה
  chosen: By what means?
  alternatives:
  - How?
  - In what way?
  lexicon: HALOT
  rationale: The interrogative asks for the manner or means by which the spirit will
    accomplish the enticement. 'By what means?' is idiomatic and suitably formal in
    context.
