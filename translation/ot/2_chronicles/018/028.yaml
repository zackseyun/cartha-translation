id: 2CH.18.28
reference: 2 Chronicles 18:28
source:
  edition: WLC
  text: וַ/יַּ֧עַל מֶֽלֶךְ יִשְׂרָאֵ֛ל וִֽ/יהוֹשָׁפָ֥ט מֶֽלֶךְ יְהוּדָ֖ה אֶל רָמֹ֥ת
    גִּלְעָֽד־־־׃
translation:
  text: So the king of Israel and Jehoshaphat king of Judah went up to Ramoth-gilead.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - went
  - marched up
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up/ascend.' In narrative movement toward
    a place, 'went up' preserves the Hebrew idiom without becoming unnatural in English.
    'Marched up' would add military nuance not explicit in the verb itself.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  alternatives:
  - the king of Isra'el
  - Israel's king
  lexicon: HALOT
  rationale: The Hebrew uses the common royal title construct. 'The king of Israel'
    is the most natural and transparent rendering. The definite sense is appropriate
    in context, referring to the known king already under discussion.
- source_word: וִיהוֹשָׁפָט
  chosen: and Jehoshaphat
  lexicon: HALOT
  rationale: The conjunction is straightforwardly additive, and the personal name
    is transliterated in keeping with the translation philosophy to transliterate
    names rather than translate them.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - the king of Judah
  lexicon: HALOT
  rationale: 'Appositional title following the proper name is naturally rendered without
    repeating the article in English: ''Jehoshaphat king of Judah.'' This preserves
    the Hebrew structure while reading smoothly.'
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks movement toward a destination. 'To' is the standard
    English equivalent here.
- source_word: רָמֹת גִּלְעָד
  chosen: Ramoth-gilead
  alternatives:
  - Ramoth Gilead
  lexicon: HALOT
  rationale: This is a place name conventionally represented in English as 'Ramoth-gilead'
    or 'Ramoth Gilead.' The hyphenated form helps signal the compound toponym and
    is widely recognizable.
