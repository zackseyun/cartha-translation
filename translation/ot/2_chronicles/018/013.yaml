id: 2CH.18.13
reference: 2 Chronicles 18:13
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר מִיכָ֑יְהוּ חַי יְהוָ֕ה כִּ֛י אֶת אֲשֶׁר יֹאמַ֥ר אֱלֹהַ֖/י אֹת֥/וֹ
    אֲדַבֵּֽר־־־׃
translation:
  text: But Micaiah said, “As the LORD lives, whatever my God says, that I will speak.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The LORD lives; what my God says, I will speak.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But ... said
  alternatives:
  - And ... said
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive on אמר commonly advances narrative. English idiom
    here is best served by 'But ... said' because the verse is a direct response of
    contrast to the messenger's prior urging in v. 12, not merely sequential narration.
- source_word: מִיכָיְהוּ
  chosen: Micaiah
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is a standard Hebrew oath formula. 'As the LORD lives' is the most
    natural and established English equivalent that preserves the oath force. YHWH
    is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name follows the project's default rendering 'the LORD' rather
    than a transliteration.
- source_word: כִּי
  chosen: whatever
  alternatives:
  - that
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the content of the oath and works together with
    אֵת אֲשֶׁר to form the sense 'whatever ...'. Rendering the clause idiomatically
    in English avoids a wooden 'that what' construction.
- source_word: אֵת אֲשֶׁר
  chosen: whatever
  alternatives:
  - that which
  - what
  lexicon: HALOT
  rationale: 'The object marker plus relative particle marks the object of both verbs:
    ''that which/whatever my God says.'' ''Whatever'' is concise and natural while
    preserving the full scope.'
- source_word: יֹאמַר
  chosen: says
  alternatives:
  - will say
  - speaks
  lexicon: HALOT
  rationale: The imperfect here expresses what God may say in the immediate situation.
    English present 'says' in a conditional-relative construction ('whatever ... says')
    is idiomatic and equivalent.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: The 1cs suffix is explicit and should be preserved. 'My God' reflects
    Micaiah's personal allegiance and is the plain sense.
- source_word: אֹתוֹ
  chosen: that
  alternatives:
  - it
  lexicon: HALOT
  rationale: 'The resumptive object pronoun refers back to the content spoken by God.
    English commonly uses ''that'' rather than ''it'' in this construction: ''that
    I will speak.'''
- source_word: אֲדַבֵּר
  chosen: I will speak
  alternatives:
  - I will say
  lexicon: HALOT
  rationale: דבר in the piel commonly means 'speak.' 'I will speak' preserves the
    verbal link to prophetic utterance and matches the solemnity of the oath.
