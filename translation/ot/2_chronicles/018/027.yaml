theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Speaker of the final clause וַיֹּאמֶר שִׁמְעוּ עַמִּים כֻּלָּם
  chosen_reading: Then he said, 'Hear, all you peoples!'
  alternative_readings:
  - And he said, 'Hear, O peoples, all of them!'
  - And he said, 'Hear this, all you people!'
  rationale: The Hebrew simply says 'and he said,' with the nearest explicit speaker being Micaiah. The plural 'peoples' is retained because the Hebrew is plural and likely functions as a broad prophetic appeal rather than merely addressing the courtroom audience.
