theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name; per project doctrine, it is rendered
    'the LORD' rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Speaker of the final clause וַיֹּאמֶר שִׁמְעוּ עַמִּים כֻּלָּם
  chosen_reading: Then he said, 'Hear, all you peoples!'
  alternative_readings:
  - And he said, 'Hear, O peoples, all of them!'
  - And he said, 'Hear this, all you people!'
  rationale: The Hebrew simply says 'and he said,' with the nearest explicit speaker
    being Micaiah. The plural 'peoples' is retained because the Hebrew is plural and
    likely functions as a broad prophetic appeal rather than merely addressing the
    courtroom audience.
