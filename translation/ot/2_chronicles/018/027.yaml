id: 2CH.18.27
reference: 2 Chronicles 18:27
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מִיכָ֔יְהוּ אִם שׁ֤וֹב תָּשׁוּב֙ בְּ/שָׁל֔וֹם לֹא דִבֶּ֥ר יְהוָ֖ה בִּ֑/י וַ/יֹּ֕אמֶר שִׁמְע֖וּ עַמִּ֥ים כֻּלָּֽ/ם־־׃פ
translation:
  text: And Micaiah said, “If you indeed return in peace, Yahweh has not spoken by me.” Then he said, “Hear, all you peoples!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD has not spoken through me.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew has 'peoples' (plural), a broader prophetic form of address than simply 'people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִיכָיְהוּ
  chosen: Micaiah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name; translation philosophy prefers transliterating names rather than translating them.
- source_word: אִם שׁוֹב תָּשׁוּב
  chosen: If you indeed return
  alternatives:
  - If you return at all
  - If you surely return
  lexicon: HALOT
  rationale: The construction combines אִם with the infinitive absolute plus imperfect of שוב for emphatic conditional force. 'If you indeed return' preserves both the condition and the emphasis in natural English.
- source_word: בְּשָׁלוֹם
  chosen: in peace
  alternatives:
  - safely
  - whole
  lexicon: HALOT
  rationale: שָׁלוֹם here denotes returning unharmed/safely, but 'in peace' is the most direct and idiomatic rendering that preserves the Hebrew expression.
- source_word: לֹא דִבֶּר יְהוָה בִּי
  chosen: the LORD has not spoken by me
  alternatives:
  - the LORD has not spoken through me
  - the LORD did not speak by me
  lexicon: HALOT
  rationale: The phrase means that Micaiah's prophecy would be false if Ahab returned safely. 'By me' closely reflects בִּי while remaining understandable; the instrumental sense can be preserved in a footnote as 'through me.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Imperative plural calling for attention; 'Hear' preserves the prophetic and solemn tone.
- source_word: עַמִּים כֻּלָּם
  chosen: all you peoples
  alternatives:
  - all peoples
  - all of you peoples
  lexicon: HALOT
  rationale: Plural עַמִּים is best kept as 'peoples,' not flattened to singular 'people.' The vocative force is conveyed by 'you.' This also echoes prophetic summons language.
