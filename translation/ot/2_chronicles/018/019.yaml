theological_decisions:
- issue: Divine involvement in Ahab's downfall
  chosen_reading: Retain the text's direct depiction of the LORD asking who will entice
    Ahab, without softening the causative force.
  alternative_readings:
  - Use weaker wording such as 'influence' or 'allow to be enticed' to reduce divine
    agency
  rationale: The Hebrew presents the LORD as sovereignly initiating the deliberation.
    In keeping with the translation philosophy, the rendering preserves the theological
    tension rather than resolving it by paraphrase.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Moral nuance of פתה in this context
  chosen_reading: Use 'entice' in the main text.
  alternative_readings:
  - persuade
  - deceive
  rationale: The context involves leading Ahab toward a fatal outcome through misleading
    counsel, but the verb itself need not be narrowed to explicit deception in the
    main text. 'Entice' preserves the tension; a footnote records the lexical alternative
    'deceive.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
