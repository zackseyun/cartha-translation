id: 2CH.18.11
reference: 2 Chronicles 18:11
source:
  edition: WLC
  text: וְ/כָל הַ֨/נְּבִאִ֔ים נִבְּאִ֥ים כֵּ֖ן לֵ/אמֹ֑ר עֲלֵ֞ה רָמֹ֤ת גִּלְעָד֙ וְ/הַצְלַ֔ח וְ/נָתַ֥ן יְהוָ֖ה בְּ/יַ֥ד הַ/מֶּֽלֶךְ־׃
translation:
  text: And all the prophets were prophesying thus, saying, “Go up to Ramoth-gilead and succeed, and Yahweh will give it into the hand of the king.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the LORD will give it into the hand of the king.” The Hebrew form can be rendered as an assured future in this prophetic context.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/כָל
  chosen: And all
  alternatives:
  - Now all
  lexicon: HALOT
  rationale: Conjunction plus quantifier naturally introduces the collective subject. 'And all' preserves the Hebrew coordination without overinterpreting discourse flow.
- source_word: הַנְּבִאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: Standard rendering of נביאים in this narrative context; these are court prophets speaking predictive/oracular words.
- source_word: נִבְּאִים
  chosen: were prophesying
  alternatives:
  - prophesied
  lexicon: HALOT
  rationale: The participial form conveys ongoing or contemporaneous action. 'Were prophesying' reflects the durative sense better than a simple past.
- source_word: כֵּן
  chosen: in this way
  alternatives:
  - so
  - thus
  lexicon: HALOT
  rationale: כֵּן points to manner. 'In this way' is slightly fuller English that preserves the sense that they were all speaking alike.
- source_word: לֵאמֹר
  chosen: saying
  lexicon: HALOT
  rationale: Standard rendering of the quotative infinitive introducing direct speech.
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Attack
  - March up
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend.' In military context it can imply marching up to battle, but 'Go up' preserves the Hebrew wording while fitting the context.
- source_word: רָמֹת גִּלְעָד
  chosen: Ramoth-gilead
  alternatives:
  - Ramoth Gilead
  lexicon: HALOT
  rationale: Transliteration of the place name, with hyphenation following common English convention for the compound toponym.
- source_word: וְהַצְלַח
  chosen: and succeed
  alternatives:
  - and prosper
  - and be successful
  lexicon: HALOT
  rationale: The verb denotes succeeding/prospering. 'Succeed' is concise, natural modern English and fits the military exhortation.
- source_word: וְנָתַן יְהוָה
  chosen: for the LORD has given
  alternatives:
  - and the LORD will give
  - for the LORD gives
  lexicon: HALOT
  rationale: 'The qatal after an imperative can express assured future or prophetic certainty. In English, ''has given'' captures the prophetic perfect sense: the outcome is presented as certain because the LORD has already, as it were, handed it over.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - to
  lexicon: HALOT
  rationale: This idiom commonly denotes delivery into someone's control. 'Into the hand of' preserves the Hebrew image while remaining understandable.
- source_word: הַמֶּלֶךְ
  chosen: the king
  alternatives:
  - the king's hand
  lexicon: HALOT
  rationale: Definite singular noun. The Hebrew idiom is best represented in English as 'into the hand of the king,' not by repeating 'hand' with a possessive.
