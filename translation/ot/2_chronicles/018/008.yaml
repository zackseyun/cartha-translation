id: 2CH.18.8
reference: 2 Chronicles 18:8
source:
  edition: WLC
  text: וַ/יִּקְרָא֙ מֶ֣לֶךְ יִשְׂרָאֵ֔ל אֶל סָרִ֖יס אֶחָ֑ד וַ/יֹּ֕אמֶר מַהֵ֖ר מיכהו
    בֶן יִמְלָֽא־־׃
translation:
  text: Then the king of Israel called one officer and said, “Quickly bring Micaiah
    son of Imla.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “one eunuch” or “a court official”; the Hebrew term can refer either
      to a literal eunuch or more generally to a royal officer.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The wayyiqtol of קרא here introduces a direct command to an attendant.
    'Called' is the plain sense and reads naturally in English; 'summoned' is possible
    but slightly more formal than the context requires.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  lexicon: HALOT
  rationale: A straightforward construct chain identifying the speaker. The definite
    sense is carried in context, so English idiom uses 'the king of Israel.'
- source_word: אֶל סָרִיס אֶחָד
  chosen: one officer
  alternatives:
  - one eunuch
  - a court official
  lexicon: HALOT
  rationale: סָרִיס can denote a literal eunuch or, more broadly, a royal officer/court
    official. In this narrative the functional role is that of an attendant dispatched
    on royal business, and the text gives no reason to stress physical status. 'Officer'
    is concise and contextually appropriate; the more literal alternative is preserved
    in a footnote.
- source_word: וַיֹּאמֶר
  chosen: said
  lexicon: HALOT
  rationale: Standard narrative speech verb; 'said' is the natural English rendering.
- source_word: מַהֵר
  chosen: Quickly bring
  alternatives:
  - Hurry, bring
  - Bring at once
  lexicon: HALOT
  rationale: The imperative from מהר conveys urgency. In English, the adverb plus
    verb construction 'Quickly bring' best captures both the command and its urgency
    without sounding awkward.
- source_word: מיכהו
  chosen: Micaiah
  alternatives:
  - Micaiahu
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention per
    project philosophy. 'Micaiah' is the established English form for מיכהו in this
    context.
- source_word: בֶן יִמְלָא
  chosen: son of Imla
  lexicon: HALOT
  rationale: Standard patronymic expression; 'son of Imla' is the direct and idiomatic
    rendering.
