id: 2CH.18.5
reference: 2 Chronicles 18:5
source:
  edition: WLC
  text: וַ/יִּקְבֹּ֨ץ מֶֽלֶךְ יִשְׂרָאֵ֥ל אֶֽת הַ/נְּבִאִים֮ אַרְבַּ֣ע מֵא֣וֹת אִישׁ֒
    וַ/יֹּ֣אמֶר אֲלֵ/הֶ֗ם הֲ/נֵלֵ֞ךְ אֶל רָמֹ֥ת גִּלְעָ֛ד לַ/מִּלְחָמָ֖ה אִם אֶחְדָּ֑ל
    וַ/יֹּאמְר֣וּ עֲלֵ֔ה וְ/יִתֵּ֥ן הָ/אֱלֹהִ֖ים בְּ/יַ֥ד הַ/מֶּֽלֶךְ־־־־׃
translation:
  text: So the king of Israel gathered the prophets, four hundred men, and said to
    them, “Should we go to Ramoth-gilead for battle, or should I refrain?” And they
    said, “Go up, and God will give it into the hand of the king.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''into the hand of the king.'' The phrase is an idiom meaning into
      the king''s power or control.'
    reason: lexical_alternative
  - marker: b
    text: The prophets answer, 'Go up, and God will give it into the hand of the king.'
      Hebrew leaves 'the king' unspecified rather than saying 'your hand.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְבֹּץ
  chosen: gathered
  alternatives:
  - assembled
  - collected
  lexicon: HALOT
  rationale: קבץ commonly means to gather or assemble. 'Gathered' is natural modern
    English and preserves the action without overformal stiffness.
- source_word: הַנְּבִאִים
  chosen: the prophets
  alternatives:
  - the prophetic spokesmen
  lexicon: HALOT
  rationale: נביאים is the standard term for prophets. No contextual reason warrants
    a paraphrase.
- source_word: אַרְבַּע מֵאוֹת אִישׁ
  chosen: four hundred men
  alternatives:
  - four hundred
  lexicon: HALOT
  rationale: The Hebrew explicitly includes אִישׁ after the number. Rendering 'men'
    preserves the gender-accurate wording of the source rather than smoothing it away.
- source_word: הֲנֵלֵךְ
  chosen: Should we go
  alternatives:
  - Shall we go
  lexicon: HALOT
  rationale: First person plural interrogative. 'Should we go' is readable modern
    English and reflects the king's consultation with the assembled prophets.
- source_word: רָמֹת גִּלְעָד
  chosen: Ramoth-gilead
  alternatives:
  - Ramoth Gilead
  lexicon: HALOT
  rationale: A place name, so it is transliterated rather than translated. Hyphenation
    reflects common English convention for the compound toponym.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - to battle
  - for war
  lexicon: HALOT
  rationale: The phrase marks purpose. 'For battle' is concise and idiomatic in English.
- source_word: אִם אֶחְדָּל
  chosen: or should I refrain
  alternatives:
  - or should I hold back
  - or shall I desist
  lexicon: HALOT
  rationale: Though the first clause is plural ('Should we go'), the second verb is
    first person singular ('should I refrain'). The translation preserves that shift
    rather than harmonizing it away.
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Attack
  - March up
  lexicon: HALOT
  rationale: עלה in military/travel contexts often means 'go up' or 'march up.' 'Go
    up' preserves the lexical form and leaves the military implication to context.
- source_word: וְיִתֵּן
  chosen: will give it
  alternatives:
  - will deliver it
  - will hand it over
  lexicon: HALOT
  rationale: The object is implicit in Hebrew and refers to the city/battle outcome.
    Supplying 'it' is required in English and keeps the statement concise.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the gods
  - the divine one
  lexicon: HALOT
  rationale: Despite the morphologically plural form, the singular verb יִתֵּן indicates
    a singular referent here. In this context the prophets speak of deity in the singular,
    so 'God' is the best rendering.
- source_word: בְּיַד הַמֶּלֶךְ
  chosen: into the hand of the king
  alternatives:
  - into the king's hand
  - under the king's power
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for delivering something into someone's
    power. The more literal 'into the hand of the king' preserves the idiom while
    remaining understandable.
