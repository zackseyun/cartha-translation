theological_decisions:
- issue: Referent of 'the king' in the prophets' reply
  chosen_reading: retain the Hebrew expression 'the king' without specifying which
    king
  alternative_readings:
  - understand it specifically as the king of Israel
  - understand it as a deferential self-reference to Ahab in context
  rationale: The Hebrew says simply 'the king,' not 'your hand' as in the parallel
    in 1 Kings 22:6. The translation preserves this wording rather than resolving
    the referent more explicitly than the text does.
  doctrine_reference: Preserve theological tension rather than resolve it.
