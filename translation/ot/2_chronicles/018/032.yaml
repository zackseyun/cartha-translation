id: 2CH.18.32
reference: 2 Chronicles 18:32
source:
  edition: WLC
  text: וַ/יְהִ֗י כִּ/רְאוֹת֙ שָׂרֵ֣י הָ/רֶ֔כֶב כִּ֥י לֹא הָיָ֖ה מֶ֣לֶךְ יִשְׂרָאֵ֑ל
    וַ/יָּשֻׁ֖בוּ מֵ/אַחֲרָֽי/ו־׃
translation:
  text: And when the commanders of the chariots saw that he was not the king of Israel,
    they turned back from following him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'they turned back from after him,' an idiom meaning they
      stopped following or pursuing him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And when
  alternatives:
  - And it happened, when
  - Now when
  lexicon: HALOT
  rationale: The waw-consecutive on היה introduces the next event in narrative sequence.
    In English, a simple temporal transition is more natural than the overly literal
    'and it happened.'
- source_word: כִּרְאוֹת
  chosen: when ... saw
  alternatives:
  - as soon as ... saw
  - upon seeing
  lexicon: HALOT
  rationale: The infinitive construct with כ expresses a temporal clause, naturally
    rendered 'when ... saw.'
- source_word: שָׂרֵי הָרֶכֶב
  chosen: the commanders of the chariots
  alternatives:
  - the captains of the chariots
  - the chariot commanders
  - the commanders of the chariot force
  lexicon: HALOT
  rationale: שָׂרֵי denotes military leaders or commanders. הָרֶכֶב refers to the
    chariot corps/chariotry. 'Commanders of the chariots' preserves the Hebrew structure
    while remaining clear modern English.
- source_word: כִּי לֹא הָיָה מֶלֶךְ יִשְׂרָאֵל
  chosen: that he was not the king of Israel
  alternatives:
  - that it was not the king of Israel
  - that this was not the king of Israel
  lexicon: HALOT
  rationale: Hebrew omits the explicit subject, but the following pronominal suffix
    in מֵאַחֲרָיו ('from after him') shows reference to the person they had been pursuing,
    namely Jehoshaphat. English requires an explicit subject; 'he' is the most natural
    supplied referent.
- source_word: וַיָּשֻׁבוּ
  chosen: they turned back
  alternatives:
  - they returned
  - they turned around
  lexicon: HALOT
  rationale: שׁוּב commonly means return/turn back. In this pursuit context, 'turned
    back' best conveys ceasing the chase.
- source_word: מֵאַחֲרָיו
  chosen: from following him
  alternatives:
  - from after him
  - from pursuing him
  lexicon: HALOT
  rationale: The idiom 'from after him' means from behind him / from pursuing him.
    'From following him' is a close, readable rendering that preserves the pursuit
    imagery without over-paraphrasing.
