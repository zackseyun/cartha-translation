id: 2CH.18.7
reference: 2 Chronicles 18:7
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מֶֽלֶךְ יִשְׂרָאֵ֣ל אֶֽל יְהוֹשָׁפָ֡ט ע֣וֹד אִישׁ אֶחָ֡ד לִ/דְרוֹשׁ֩ אֶת יְהוָ֨ה מֵֽ/אֹת֜/וֹ וַ/אֲנִ֣י שְׂנֵאתִ֗י/הוּ כִּֽי אֵ֠ינֶ/נּוּ מִתְנַבֵּ֨א עָלַ֤/י לְ/טוֹבָה֙ כִּ֣י כָל יָמָ֣י/ו לְ/רָעָ֔ה ה֖וּא מִיכָ֣יְהוּ בֶן יִמְלָ֑א וַ/יֹּ֨אמֶר֙ יְה֣וֹשָׁפָ֔ט אַל יֹאמַ֥ר הַ/מֶּ֖לֶךְ כֵּֽן־׀־־־־־־־׃
translation:
  text: Then the king of Israel said to Jehoshaphat, “There is still one man by whom we may inquire of Yahweh, but I hate him, because he never prophesies good concerning me, but always evil. He is Micaiah son of Imla.” Jehoshaphat said, “Let not the king say so.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'through whom we may inquire of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ע֣וֹד אִישׁ אֶחָד
  chosen: There is still one man
  alternatives:
  - There is yet one man
  - There remains one man
  lexicon: HALOT
  rationale: 'ע֣וֹד with אִישׁ אֶחָד indicates remaining availability: ''still/yet one man.'' ''There is still one man'' is natural modern English while preserving the sense of one remaining person.'
- source_word: לִדְרוֹשׁ אֶת־יְהוָה מֵאֹתוֹ
  chosen: by whom we may inquire of the LORD
  alternatives:
  - through whom we may seek the LORD
  - to inquire of the LORD through him
  lexicon: HALOT
  rationale: דרשׁ with אֶת־יְהוָה in prophetic contexts means to seek/inquire of the LORD, often by consulting a prophet. 'By whom we may inquire of the LORD' makes explicit the mediating role conveyed by מֵאֹתוֹ without over-paraphrasing.
- source_word: וַאֲנִי שְׂנֵאתִיהוּ
  chosen: but I hate him
  alternatives:
  - and I hate him
  - but I have hated him
  lexicon: HALOT
  rationale: The perfect expresses the speaker's settled attitude. In English, present 'I hate him' best conveys the ongoing disposition. 'But' fits the adversative sense in context, though the conjunction is implicit from discourse flow rather than a separate Hebrew adversative particle.
- source_word: כִּי אֵינֶנּוּ מִתְנַבֵּא עָלַי לְטוֹבָה
  chosen: because he never prophesies good concerning me
  alternatives:
  - because he does not prophesy good about me
  - because he is not prophesying good concerning me
  lexicon: HALOT
  rationale: The participle with negative expresses characteristic action, not merely a present moment. 'Never prophesies good concerning me' captures the habitual force. 'Concerning me' is slightly more formal and fits prophetic speech.
- source_word: כִּי כָל־יָמָיו לְרָעָה
  chosen: but always evil
  alternatives:
  - but all his days evil
  - but only evil all his days
  - but for evil all the time
  lexicon: HALOT
  rationale: Literally 'for evil all his days,' an idiom meaning consistently unfavorable prophecy. 'But always evil' communicates the idiomatic sense in concise English. The object 'prophesies' is carried over from the previous clause.
- source_word: מִיכָיְהוּ בֶן־יִמְלָא
  chosen: Micaiah son of Imla
  alternatives:
  - Micaiah the son of Imla
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. 'Son of' is retained rather than reduced to a patronymic form.
- source_word: אַל יֹאמַר הַמֶּלֶךְ כֵּן
  chosen: Let not the king say so
  alternatives:
  - The king should not say so
  - Do not let the king speak this way
  lexicon: HALOT
  rationale: The jussive prohibition אַל + imperfect is well represented by 'Let not ...' in elevated but still readable English. It preserves Jehoshaphat's respectful, indirect correction of the king.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
