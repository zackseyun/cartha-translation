id: 2CH.18.34
reference: 2 Chronicles 18:34
source:
  edition: WLC
  text: וַ/תַּ֤עַל הַ/מִּלְחָמָה֙ בַּ/יּ֣וֹם הַ/ה֔וּא וּ/מֶ֣לֶךְ יִשְׂרָאֵ֗ל הָיָ֨ה
    מַעֲמִ֧יד בַּ/מֶּרְכָּבָ֛ה נֹ֥כַח אֲרָ֖ם עַד הָ/עָ֑רֶב וַ/יָּ֕מָת לְ/עֵ֖ת בּ֥וֹא
    הַ/שָּֽׁמֶשׁ־׃
translation:
  text: And the battle intensified on that day, and the king of Israel remained standing
    in the chariot facing Aram until the evening; and he died at the time of the sun’s
    going down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'at sunset' or 'when the sun went down.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעַל
  chosen: intensified
  alternatives:
  - went up
  - grew fierce
  - increased
  lexicon: HALOT
  rationale: The verb עלה literally means 'went up,' but with 'the battle' as subject
    it idiomatically conveys escalation in intensity. 'Intensified' captures the Hebrew
    sense in natural English without over-paraphrasing.
- source_word: הַמִּלְחָמָה
  chosen: the battle
  alternatives:
  - the fighting
  - the war
  lexicon: HALOT
  rationale: מלחמה here refers to the specific engagement underway, so 'the battle'
    is the most precise contextual rendering.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that day
  lexicon: HALOT
  rationale: A standard temporal expression. 'On that day' preserves the preposition
    and reads naturally.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  lexicon: HALOT
  rationale: A straightforward construct phrase; rendered formally and clearly.
- source_word: הָיָה מַעֲמִיד
  chosen: remained standing
  alternatives:
  - was stationed
  - kept himself in position
  - was propped up
  lexicon: HALOT
  rationale: The periphrastic construction with היה + participle expresses ongoing
    action. מעמיד from עמד in the Hiphil can mean 'to station' or 'to keep standing.'
    In context, Ahab continues upright in his chariot despite being wounded. 'Remained
    standing' preserves the durative sense without importing too much interpretation.
- source_word: בַּמֶּרְכָּבָה
  chosen: in the chariot
  alternatives:
  - in his chariot
  lexicon: HALOT
  rationale: The definite noun is best rendered 'the chariot.' English does not require
    adding 'his,' though that is contextually implied.
- source_word: נֹכַח אֲרָם
  chosen: facing Aram
  alternatives:
  - opposite Aram
  - before the Arameans
  - in front of Aram
  lexicon: HALOT
  rationale: נכח denotes being opposite or in front of. 'Facing Aram' is concise and
    idiomatic. 'Aram' is retained as the proper name rather than generalized to 'the
    Syrians,' following the principle of transliterating names.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: A simple temporal limit. 'Until the evening' preserves the article while
    remaining natural English.
- source_word: וַיָּמָת
  chosen: and he died
  alternatives:
  - then he died
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And he died' is sufficiently
    formal and direct.
- source_word: לְעֵת בּוֹא הַשָּׁמֶשׁ
  chosen: at the time of the sun’s going down
  alternatives:
  - at sunset
  - when the sun went down
  lexicon: HALOT
  rationale: The Hebrew is somewhat more explicit than the single word 'sunset.' This
    rendering preserves the verbal idea of the sun's coming/going down while still
    reading naturally. A shorter alternative is worth preserving in a footnote.
