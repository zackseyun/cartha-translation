id: 2CH.18.26
reference: 2 Chronicles 18:26
source:
  edition: WLC
  text: וַ/אֲמַרְתֶּ֗ם כֹּ֚ה אָמַ֣ר הַ/מֶּ֔לֶךְ שִׂ֥ימוּ זֶ֖ה בֵּ֣ית הַ/כֶּ֑לֶא וְ/הַאֲכִלֻ֜/הוּ
    לֶ֤חֶם לַ֨חַץ֙ וּ/מַ֣יִם לַ֔חַץ עַ֖ד שׁוּבִ֥/י בְ/שָׁלֽוֹם׃
translation:
  text: 'and say, ‘Thus says the king: Put this man in the prison, and feed him with
    bread of affliction and water of affliction until I return in peace.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bread of distress and water of distress,' that is, reduced rations associated
      with imprisonment and hardship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲמַרְתֶּם
  chosen: and say
  alternatives:
  - and you shall say
  - then say
  lexicon: HALOT
  rationale: Second person masculine plural wayyiqtol functioning as an imperative-like
    continuation of the king's command to his attendants. English idiom is best captured
    by 'and say' rather than a wooden past tense.
- source_word: כֹּה אָמַר הַמֶּלֶךְ
  chosen: Thus says the king
  alternatives:
  - This is what the king says
  - Thus said the king
  lexicon: HALOT
  rationale: Standard messenger formula. Present-tense 'says' works naturally in English
    for an official quoted decree.
- source_word: שִׂימוּ זֶה
  chosen: Put this man
  alternatives:
  - Place this one
  - Put this fellow
  lexicon: HALOT
  rationale: The demonstrative 'this' refers to Micaiah in a deictic, somewhat dismissive
    way. 'This man' makes the referent explicit and natural in English without adding
    undue contempt beyond the Hebrew.
- source_word: בֵּית הַכֶּלֶא
  chosen: in the prison
  alternatives:
  - in the house of confinement
  - in prison
  lexicon: HALOT
  rationale: Literally 'house of the prison/confinement.' 'The prison' is the clearest
    idiomatic equivalent.
- source_word: וְהַאֲכִלֻהוּ
  chosen: and feed him
  alternatives:
  - and give him to eat
  - and make him eat
  lexicon: HALOT
  rationale: 'Hiphil imperative with 3ms suffix: causative ''cause him to eat/feed
    him.'' ''Feed him'' is concise and accurate.'
- source_word: לֶחֶם לַחַץ
  chosen: bread of affliction
  alternatives:
  - bread of distress
  - meager bread
  lexicon: HALOT
  rationale: The construct-like phrase denotes bread associated with hardship, oppression,
    or deprivation. 'Bread of affliction' preserves the idiom and echoes established
    biblical usage without obscuring meaning.
- source_word: וּמַיִם לַחַץ
  chosen: water of affliction
  alternatives:
  - water of distress
  - meager water
  lexicon: HALOT
  rationale: Parallel to 'bread of affliction'; likely prison rations marked by deprivation.
    Keeping the same phrase preserves the Hebrew parallelism.
- source_word: עַד שׁוּבִי בְשָׁלוֹם
  chosen: until I return in peace
  alternatives:
  - until I come back safely
  - until I return unharmed
  lexicon: HALOT
  rationale: בְשָׁלוֹם here conveys safe, peaceful return from battle. 'Return in
    peace' is a faithful and idiomatic rendering that preserves the irony in context.
