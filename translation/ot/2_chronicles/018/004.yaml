id: 2CH.18.4
reference: 2 Chronicles 18:4
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוֹשָׁפָ֖ט אֶל מֶ֣לֶךְ יִשְׂרָאֵ֑ל דְּרָשׁ נָ֥א כַ/יּ֖וֹם אֶת
    דְּבַ֥ר יְהוָֽה־־־׃
translation:
  text: And Jehoshaphat said to the king of Israel, “Please inquire today for the
    word of the LORD.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “inquire for a word from the LORD.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative preterite; 'And ... said' preserves
    Hebrew narrative flow without overinterpreting sequence.
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Personal name is transliterated per translation philosophy.
- source_word: אֶל מֶלֶךְ יִשְׂרָאֵל
  chosen: to the king of Israel
  alternatives:
  - to Israel's king
  lexicon: HALOT
  rationale: Direct and natural rendering of the prepositional phrase; preserves the
    formal royal designation.
- source_word: דְּרָשׁ
  chosen: inquire
  alternatives:
  - seek
  - consult
  - ask
  lexicon: HALOT
  rationale: דרש in this context means to seek or consult for an oracle/word from
    God. 'Inquire' best fits prophetic consultation language in English.
- source_word: נָא
  chosen: Please
  alternatives:
  - now
  - I pray you
  lexicon: HALOT
  rationale: Polite particle softening the imperative. 'Please' is idiomatic modern
    English and preserves the request tone.
- source_word: כַיּוֹם
  chosen: today
  alternatives:
  - as of today
  - this day
  lexicon: HALOT
  rationale: In this idiom the phrase functions adverbially, urging immediate inquiry.
    'Today' is the clearest natural rendering.
- source_word: אֶת דְּבַר יְהוָה
  chosen: for the word of the LORD
  alternatives:
  - the word of the LORD
  - a word from the LORD
  lexicon: HALOT
  rationale: With דרש, the object is what is being sought; English often supplies
    'for' after 'inquire.' 'The word of the LORD' preserves the prophetic formula,
    while 'a word from the LORD' is possible but less formally aligned with the Hebrew
    construct.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD'.
