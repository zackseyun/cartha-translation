- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh / Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Generic singular אֱנוֹשׁ
  chosen_reading: man
  alternative_readings:
  - humanity
  - mortals
  - anyone
  rationale: The source uses a grammatically masculine singular noun with generic force. Per doctrine, gender-accurate rendering is preferred over flattening to gender-neutral language when the source intent is representative humanity.
