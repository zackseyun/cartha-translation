id: 2CH.14.10
reference: 2 Chronicles 14:10
source:
  edition: WLC
  text: וַ/יִּקְרָ֨א אָסָ֜א אֶל יְהוָ֣ה אֱלֹהָי/ו֮ וַ/יֹּאמַר֒ יְהוָ֗ה אֵֽין עִמְּ/ךָ֤ לַ/עְזוֹר֙ בֵּ֥ין רַב֙ לְ/אֵ֣ין כֹּ֔חַ עָזְרֵ֜/נוּ יְהוָ֤ה אֱלֹהֵ֨י/נוּ֙ כִּֽי עָלֶ֣י/ךָ נִשְׁעַ֔נּוּ וּ/בְ/שִׁמְ/ךָ֣ בָ֔אנוּ עַל הֶ/הָמ֖וֹן הַ/זֶּ֑ה יְהוָ֤ה אֱלֹהֵ֨י/נוּ֙ אַ֔תָּה אַל יַעְצֹ֥ר עִמְּ/ךָ֖ אֱנֽוֹשׁ־־־־־׃ס
translation:
  text: And Asa cried out to Yahweh his God and said, “Yahweh, there is none besides you to help between the mighty and the powerless. Help us, Yahweh our God, for we rely on you, and in your name we have come against this multitude. Yahweh our God, you are our God; do not let man prevail against you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “there is none besides you to help, whether with many or with those who have no power.” The Hebrew of this clause is compact and may emphasize either numbers or strength.
    reason: alternative_reading
  - marker: b
    text: Or, “do not let mortal man retain strength against you” / “do not let man withstand you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: cried out
  alternatives:
  - called
  - called out
  lexicon: HALOT
  rationale: In prayer context קרא אל commonly means to cry out to God, not merely to speak. 'Cried out' preserves urgency.
- source_word: יְהוָה
  chosen: Yahweh / Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהָיו / אֱלֹהֵינוּ
  chosen: his God / our God
  lexicon: HALOT
  rationale: Straightforward possessive construction; preserves covenantal and prayer language.
- source_word: אֵין עִמְּךָ לַעְזוֹר
  chosen: there is none besides you to help
  alternatives:
  - it is nothing for you to help
  - there is no one with you to help
  lexicon: HALOT
  rationale: The idiom is difficult. The sense is that no one but the LORD can truly give help. This rendering is idiomatic English while preserving the exclusivity of divine aid.
- source_word: בֵּין רַב לְאֵין כֹּחַ
  chosen: between the mighty and the powerless
  alternatives:
  - whether with many or with those who have no power
  - between a great army and one without strength
  lexicon: HALOT
  rationale: The phrase contrasts strong/numerous force with lack of strength. 'The mighty and the powerless' captures the polarity without over-specifying whether רַב means many or mighty; the military context supports strength as the operative sense.
- source_word: עָזְרֵנוּ
  chosen: Help us
  alternatives:
  - come to our aid
  lexicon: HALOT
  rationale: Direct imperative with 1cp suffix; concise and natural in prayer.
- source_word: כִּי עָלֶיךָ נִשְׁעַנּוּ
  chosen: for we rely on you
  alternatives:
  - for we lean on you
  - for we rest on you
  lexicon: HALOT
  rationale: נשען is literally 'lean on,' but 'rely on' communicates the metaphor naturally in English.
- source_word: וּבְשִׁמְךָ בָאנוּ
  chosen: in your name we have come
  alternatives:
  - by your name we have come
  - under your name we have come
  lexicon: HALOT
  rationale: '''In your name'' is the standard biblical idiom for acting under divine authority and dependence.'
- source_word: הֶהָמוֹן הַזֶּה
  chosen: this multitude
  alternatives:
  - this multitude of troops
  - this horde
  lexicon: HALOT
  rationale: הָמוֹן denotes a large crowd or multitude; in military context 'multitude' is accurate and readable.
- source_word: אַל יַעְצֹר עִמְּךָ אֱנוֹשׁ
  chosen: do not let man prevail against you
  alternatives:
  - let not mortal man retain strength against you
  - do not let man restrain you
  lexicon: HALOT
  rationale: The verb עצר here is difficult; in context of battle prayer the sense is that no human should be able to withstand or prevail against the LORD. 'Man' reflects אֱנוֹשׁ, a mortal human, and preserves the source's gender-accurate singular generic.
