theological_decisions:
- issue: Rendering of אֲשֵׁרִים in an idolatry-reform context
  chosen_reading: the Asherim
  alternative_readings:
  - the Asherah poles
  - the Asherahs
  rationale: The term refers to prohibited cultic objects associated with Asherah
    worship, but scholars debate whether the reference is specifically to wooden poles,
    stylized trees, or broader cult symbols. Using 'Asherim' preserves the historical-religious
    specificity without overstating certainty; an explanatory alternative is footnoted.
