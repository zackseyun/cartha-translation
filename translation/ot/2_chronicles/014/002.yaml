id: 2CH.14.2
reference: 2 Chronicles 14:2
source:
  edition: WLC
  text: וַ/יָּ֛סַר אֶת מִזְבְּח֥וֹת הַ/נֵּכָ֖ר וְ/הַ/בָּמ֑וֹת וַ/יְשַׁבֵּר֙ אֶת הַ/מַּצֵּב֔וֹת
    וַ/יְגַדַּ֖ע אֶת הָ/אֲשֵׁרִֽים־־־׃
translation:
  text: He removed the foreign altars and the high places, shattered the sacred pillars,
    and cut down the Asherim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Asherah poles.' The Hebrew term refers to cultic objects associated
      with Asherah worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסַר
  chosen: He removed
  alternatives:
  - He took away
  - He abolished
  lexicon: HALOT
  rationale: The verb סור/הסיר in this causative/narrative form commonly means to
    remove or take away. 'Removed' is natural modern English and preserves the concrete
    reform action without overinterpreting it as a formal abolition.
- source_word: מִזְבְּחוֹת הַנֵּכָר
  chosen: the foreign altars
  alternatives:
  - the altars of foreigners
  - the alien altars
  lexicon: HALOT
  rationale: 'נֵכָר denotes what is foreign/alien, often with the sense of non-Israelite
    or illegitimate in worship contexts. ''Foreign altars'' best captures the likely
    sense: altars associated with foreign worship rather than merely owned by foreigners.'
- source_word: הַבָּמוֹת
  chosen: the high places
  alternatives:
  - the hill shrines
  lexicon: HALOT
  rationale: בָּמוֹת is the standard term for elevated cultic sites. 'High places'
    is the established and accurate English rendering; while somewhat traditional,
    it remains understandable and precise for this cultic term.
- source_word: וַיְשַׁבֵּר
  chosen: shattered
  alternatives:
  - broke down
  - smashed
  lexicon: HALOT
  rationale: שׁבר here conveys forceful breaking. 'Shattered' communicates decisive
    destruction in readable English and fits the reform context.
- source_word: הַמַּצֵּבוֹת
  chosen: the sacred pillars
  alternatives:
  - the pillars
  - the standing stones
  lexicon: HALOT
  rationale: מַצֵּבוֹת refers to cultic standing stones/pillars. 'Sacred pillars'
    makes explicit their religious function for modern readers without excessive paraphrase.
    'Standing stones' is possible but less immediately clear in this context.
- source_word: וַיְגַדַּע
  chosen: cut down
  alternatives:
  - hewed down
  - chopped down
  lexicon: HALOT
  rationale: גדע means to cut down or lop off, especially of wooden objects or trees.
    'Cut down' is idiomatic and fits the likely wooden nature of the objects.
- source_word: הָאֲשֵׁרִים
  chosen: the Asherim
  alternatives:
  - the Asherah poles
  - the Asherahs
  lexicon: HALOT
  rationale: אֲשֵׁרִים can denote cultic objects associated with Asherah, often wooden
    poles or trees, but the exact referent can vary. Translating as 'Asherim' preserves
    the Hebrew cultic term without prematurely narrowing it to 'poles'; the common
    interpretive gloss 'Asherah poles' is preserved in a footnote.
