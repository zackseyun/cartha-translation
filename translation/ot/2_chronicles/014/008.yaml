id: 2CH.14.8
reference: 2 Chronicles 14:8
source:
  edition: WLC
  text: וַ/יֵּצֵ֨א אֲלֵי/הֶ֜ם זֶ֣רַח הַ/כּוּשִׁ֗י בְּ/חַ֨יִל֙ אֶ֣לֶף אֲלָפִ֔ים וּ/מַרְכָּב֖וֹת
    שְׁלֹ֣שׁ מֵא֑וֹת וַ/יָּבֹ֖א עַד מָרֵשָֽׁה־׃
translation:
  text: Zerah the Cushite came out against them with an army of a thousand thousands
    and three hundred chariots, and he came as far as Mareshah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one million.' The Hebrew reads literally 'a thousand thousands.'
    reason: lexical_alternative
  - marker: b
    text: '''Cushite'' is the Hebrew ethnogeographic term; traditionally, ''Ethiopian.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: came out
  alternatives:
  - marched out
  - went out
  lexicon: HALOT
  rationale: The verb יצא in military narrative commonly means to go out for battle.
    'Came out' preserves the Hebrew idiom and fits the following hostile movement
    against Asa's forces.
- source_word: אֲלֵיהֶם
  chosen: against them
  alternatives:
  - to them
  - toward them
  lexicon: HALOT
  rationale: Although literally 'to/toward them,' in this battle context the preposition
    conveys hostile advance. 'Against them' makes the military sense explicit without
    over-paraphrasing.
- source_word: זֶרַח הַכּוּשִׁי
  chosen: Zerah the Cushite
  alternatives:
  - Zerah the Ethiopian
  lexicon: HALOT
  rationale: Personal names are transliterated, and כּוּשִׁי is best rendered 'Cushite'
    rather than the traditional but interpretive 'Ethiopian,' preserving the Hebrew
    ethnogeographic term more directly.
- source_word: בְּחַיִל
  chosen: with an army
  alternatives:
  - with a force
  - with troops
  lexicon: HALOT
  rationale: חַיִל here denotes military force rather than wealth or valor. 'Army'
    is the clearest natural English rendering in context.
- source_word: אֶלֶף אֲלָפִים
  chosen: a thousand thousands
  alternatives:
  - one million
  lexicon: HALOT
  rationale: The Hebrew expression is literally 'a thousand thousands.' Rendering
    it this way preserves the source wording and leaves open the question whether
    the number is strictly arithmetic or a conventional large-number expression. 'One
    million' is possible but more interpretive.
- source_word: וּמַרְכָּבוֹת שְׁלֹשׁ מֵאוֹת
  chosen: and three hundred chariots
  lexicon: HALOT
  rationale: Straightforward numerical phrase; standard English order is used.
- source_word: וַיָּבֹא עַד מָרֵשָׁה
  chosen: and he came as far as Mareshah
  alternatives:
  - and he reached Mareshah
  - and he came to Mareshah
  lexicon: HALOT
  rationale: עַד with a place name indicates movement up to a location. 'As far as
    Mareshah' preserves the nuance better than simply 'to Mareshah.'
