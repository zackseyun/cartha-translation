id: 2CH.14.9
reference: 2 Chronicles 14:9
source:
  edition: WLC
  text: וַ/יֵּצֵ֥א אָסָ֖א לְ/פָנָ֑י/ו וַ/יַּֽעַרְכוּ֙ מִלְחָמָ֔ה בְּ/גֵ֥יא צְפַ֖תָה
    לְ/מָרֵשָֽׁה׃
translation:
  text: And Asa went out before him, and they drew up for battle in the Valley of
    Zephathah at Mareshah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to meet him' or 'against him' for 'before him'; the Hebrew is literally
      'before him' but in context it likely indicates Asa moving out to confront the
      opposing force.
    reason: lexical_alternative
  - marker: b
    text: Or 'they set themselves in battle array.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - marched out
  - came out
  lexicon: HALOT
  rationale: The verb יצא in the waw-consecutive narrative form commonly means 'go
    out' or 'march out,' especially in military contexts. 'Went out' is a clear, natural
    rendering that preserves the narrative movement without over-specifying military
    nuance.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - to meet him
  - against him
  lexicon: HALOT
  rationale: Literally 'before him' or 'in front of him.' In context Asa is responding
    to the advancing enemy, so the phrase implies confrontation. The more literal
    'before him' is retained in the main text to avoid importing more interpretation
    than necessary; the contextual alternatives are preserved.
- source_word: וַיַּעַרְכוּ מִלְחָמָה
  chosen: they drew up for battle
  alternatives:
  - they arranged the battle line
  - they set themselves in battle array
  - they prepared for war
  lexicon: HALOT
  rationale: ערך with מלחמה is an idiom for arranging troops for combat. 'Drew up
    for battle' communicates the military formation sense in readable modern English
    better than the more archaic 'set in battle array,' while remaining close to the
    Hebrew.
- source_word: בְּגֵיא
  chosen: in the Valley of
  alternatives:
  - in the wadi of
  - in the ravine of
  lexicon: HALOT
  rationale: גיא denotes a valley or ravine. 'Valley' is the most standard and accessible
    rendering in English, especially as part of a place designation.
- source_word: צְפַתָה
  chosen: Zephathah
  rationale: This is a proper place name and is therefore transliterated according
    to the translation philosophy.
- source_word: לְמָרֵשָׁה
  chosen: at Mareshah
  alternatives:
  - near Mareshah
  - belonging to Mareshah
  lexicon: HALOT
  rationale: The preposition ל with a place name here likely indicates location in
    relation to Mareshah. 'At Mareshah' is idiomatic English and fits the geographical
    notice. 'Near Mareshah' is possible but less direct.
