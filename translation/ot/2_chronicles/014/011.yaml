theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's God as the direct agent of victory. Following
    DOCTRINE.md, the covenant name is rendered 'the LORD' rather than transliterated
    forms.
