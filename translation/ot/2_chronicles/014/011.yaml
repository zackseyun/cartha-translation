id: 2CH.14.11
reference: 2 Chronicles 14:11
source:
  edition: WLC
  text: וַ/יִּגֹּ֤ף יְהוָה֙ אֶת הַ/כּוּשִׁ֔ים לִ/פְנֵ֥י אָסָ֖א וְ/לִ/פְנֵ֣י יְהוּדָ֑ה וַ/יָּנֻ֖סוּ הַ/כּוּשִֽׁים־׃
translation:
  text: And Yahweh struck down the Cushites before Asa and before Judah, and the Cushites fled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ethiopians.' The Hebrew ethnonym is 'Cushites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגֹּף
  chosen: struck down
  alternatives:
  - defeated
  - smote
  - plagued
  lexicon: HALOT
  rationale: The verb נָגַף in military context commonly denotes striking/defeating an enemy. 'Struck down' preserves the force of divine action without archaic 'smote'; 'defeated' is possible but slightly flattens the vividness of the verb.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַכּוּשִׁים
  chosen: the Cushites
  alternatives:
  - the Ethiopians
  lexicon: HALOT
  rationale: '''Cushites'' is a more direct rendering of כּוּשִׁים and avoids importing a later geographical label too quickly. ''Ethiopians'' reflects some traditional renderings and ancient geographical association, but ''Cushites'' better preserves the Hebrew ethnonym.'
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: HALOT
  rationale: In this battle report, לִפְנֵי idiomatically means 'before' in the sense of 'in front of/at the advance of.' 'Before' is natural English and preserves the Hebrew construction.
- source_word: אָסָא
  chosen: Asa
  rationale: Standard English transliteration of the personal name.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Here the name denotes the kingdom/people of Judah. 'Judah' is the standard rendering and allows the collective sense to stand from context.
- source_word: וַיָּנֻסוּ
  chosen: fled
  alternatives:
  - ran away
  - retreated
  lexicon: HALOT
  rationale: The verb נוּס means 'to flee.' 'Fled' is concise, accurate, and suitably formal for narrative prose.
