id: 2CH.14.12
reference: 2 Chronicles 14:12
source:
  edition: WLC
  text: וַ/יִּרְדְּפֵ֨/ם אָסָ֜א וְ/הָ/עָ֣ם אֲשֶׁר עִמּ/וֹ֮ עַד לִ/גְרָר֒ וַ/יִּפֹּ֤ל מִ/כּוּשִׁים֙ לְ/אֵ֣ין לָ/הֶ֣ם מִֽחְיָ֔ה כִּֽי נִשְׁבְּר֥וּ לִ/פְנֵֽי יְהוָ֖ה וְ/לִ/פְנֵ֣י מַחֲנֵ֑/הוּ וַ/יִּשְׂא֥וּ שָׁלָ֖ל הַרְבֵּ֥ה מְאֹֽד־־־־׃
translation:
  text: Asa and the people who were with him pursued them as far as Gerar, and the Cushites fell until none remained alive, for they were shattered before Yahweh and before his camp. Then they carried off a very great amount of plunder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Ethiopians.' The Hebrew says 'Cushites,' referring to people of Cush.
    reason: lexical_alternative
  - marker: b
    text: Or, 'before his camp.' The Hebrew word can mean 'camp' or 'army'; the suffix may be understood as referring to Asa's force, though some take it as the LORD's host.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּרְדְּפֵם
  chosen: pursued them
  alternatives:
  - chased them
  lexicon: HALOT
  rationale: רדף commonly means to pursue or chase. 'Pursued them' is the more standard military English and fits the narrative tone.
- source_word: עַד לִגְרָר
  chosen: as far as Gerar
  alternatives:
  - to Gerar
  lexicon: HALOT
  rationale: עַד with place name marks extent of pursuit. 'As far as Gerar' clearly conveys the limit reached.
- source_word: מִכּוּשִׁים
  chosen: Cushites
  alternatives:
  - Ethiopians
  lexicon: HALOT
  rationale: כּוּשִׁים refers to people of Cush. 'Cushites' preserves the ethnogeographic reference more directly than the traditional but potentially anachronistic 'Ethiopians.'
- source_word: וַיִּפֹּל מִכּוּשִׁים
  chosen: so many Cushites fell
  alternatives:
  - Cushites fell
  - there fell from the Cushites
  lexicon: HALOT
  rationale: The idiom with נפל plus מן indicates casualties among the group. The phrase is expanded slightly in natural English to convey that members of the Cushite force were struck down.
- source_word: לְאֵין לָהֶם מִחְיָה
  chosen: that none remained alive
  alternatives:
  - until there was no life left to them
  - with no survivor among them
  lexicon: HALOT
  rationale: The expression denotes absence of surviving life. 'That none remained alive' is idiomatic and preserves the force of total defeat without overparaphrase.
- source_word: נִשְׁבְּרוּ
  chosen: were shattered
  alternatives:
  - were broken
  - were crushed
  lexicon: HALOT
  rationale: The passive of שבר here describes decisive military ruin. 'Were shattered' communicates catastrophic defeat vividly while remaining close to the Hebrew image.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - before Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'Before' preserves the Hebrew spatial-theological idiom of defeat in God's presence/power.
- source_word: וְלִפְנֵי מַחֲנֵהוּ
  chosen: and before his army
  alternatives:
  - and before his camp
  - and before his host
  lexicon: HALOT
  rationale: מַחֲנֶה can mean camp or army. In this battle context, 'army' best conveys the active military force associated with Asa's victory, while the suffix most naturally refers back to Asa rather than the LORD.
- source_word: וַיִּשְׂאוּ שָׁלָל
  chosen: they carried off plunder
  alternatives:
  - they took spoil
  - they bore away booty
  lexicon: HALOT
  rationale: נשא with שׁלל means to carry away captured goods. 'Carried off plunder' is clear modern English without sounding archaic.
- source_word: הַרְבֵּה מְאֹד
  chosen: a great deal of
  alternatives:
  - very much
  - an exceedingly large amount of
  lexicon: HALOT
  rationale: The intensifying pair expresses abundance. 'A great deal of plunder' is natural English and preserves the emphasis.
