theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Referent of the suffix in מַחֲנֵהוּ
  chosen_reading: his army = Asa's army
  alternative_readings:
  - his army = the LORD's army/host
  rationale: The nearest natural antecedent in the narrative flow is Asa, and the verse distinguishes defeat before the LORD and before the human force fighting with Asa. This preserves the text's dual emphasis on divine and human agency without collapsing them.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve tension rather than resolve it beyond the text)
