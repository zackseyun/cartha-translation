id: 2CH.14.3
reference: 2 Chronicles 14:3
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ לִֽ/יהוּדָ֔ה לִ/דְר֕וֹשׁ אֶת יְהוָ֖ה אֱלֹהֵ֣י אֲבוֹתֵי/הֶ֑ם וְ/לַ/עֲשׂ֖וֹת הַ/תּוֹרָ֥ה וְ/הַ/מִּצְוָֽה־׃
translation:
  text: And he told Judah to seek Yahweh, the God of their fathers, and to observe the law and the commandment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to inquire of the LORD'; the Hebrew verb can include seeking him in worship, dependence, or consultation.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their fathers'; alternatively, 'their ancestors.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: he told
  alternatives:
  - he said to
  - he commanded
  lexicon: HALOT
  rationale: The verb אמר literally means 'said,' but with לִיהוּדָה plus infinitives expressing content, idiomatic English is better served by 'told.' 'Commanded' is possible by implication, but the Hebrew does not require the stronger force.
- source_word: לִיהוּדָה
  chosen: Judah
  alternatives:
  - to Judah
  - the people of Judah
  lexicon: HALOT
  rationale: The proper name refers collectively to the kingdom/people. 'Judah' preserves the concise Hebrew expression while allowing the collective sense to be understood.
- source_word: לִדְרוֹשׁ
  chosen: to seek
  alternatives:
  - to inquire of
  - to seek after
  lexicon: HALOT
  rationale: דרש with God commonly means to seek him in worshipful dependence or devotion. 'Seek' is the most natural and established rendering here; 'inquire of' is too narrow for the broader covenantal sense in Chronicles.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  chosen: the God of their fathers
  alternatives:
  - their ancestral God
  - the God of their ancestors
  lexicon: HALOT
  rationale: This construct highlights covenant continuity with prior generations. 'The God of their fathers' is a direct and theologically weighty rendering. 'Ancestors' is possible in modern English, but 'fathers' better matches the source and the project's gender-accurate policy.
- source_word: וְלַעֲשׂוֹת
  chosen: to keep
  alternatives:
  - to do
  - to observe
  lexicon: HALOT
  rationale: עשה is literally 'to do,' but with 'the law and the commandment' English idiom favors 'keep' or 'observe.' 'Keep' communicates obedient practice without sounding wooden.
- source_word: הַתּוֹרָה
  chosen: the law
  alternatives:
  - the instruction
  - the Torah
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction' broadly, but in this covenantal context paired with 'the commandment,' 'the law' is the clearest natural rendering in English. 'Torah' would be more transliterative than this project's default style requires.
- source_word: וְהַמִּצְוָה
  chosen: the commandment
  alternatives:
  - the command
  - the commandments
  lexicon: HALOT
  rationale: The singular is preserved because the Hebrew is singular. It may function collectively, but there is no need to pluralize in translation. 'The commandment' also pairs naturally with 'the law' as a summary of covenant obligation.
