id: 2CH.14.1
reference: 2 Chronicles 14:1
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ אָסָא֙ הַ/טּ֣וֹב וְ/הַ/יָּשָׁ֔ר בְּ/עֵינֵ֖י יְהוָ֥ה אֱלֹהָֽי/ו׃
translation:
  text: Asa did what was good and right in the eyes of Yahweh his God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in the eyes of the LORD,'' an idiom meaning ''in the sight/judgment of the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - made
  lexicon: HALOT
  rationale: The verb עשה in this evaluative construction commonly means 'do' in the sense of conduct or practice. 'Did' is the most natural English choice with the following object phrase ('what was good and right').
- source_word: אָסָא
  chosen: Asa
  rationale: Personal name transliterated by standard English convention, following the translation philosophy to transliterate names rather than translate them.
- source_word: הַטּוֹב
  chosen: what was good
  alternatives:
  - the good
  - what was pleasing
  lexicon: HALOT
  rationale: With the article and paired with הַיָּשָׁר after עשה, the phrase is idiomatic for moral conduct. 'What was good' preserves the evaluative sense in natural English better than the more wooden 'the good.'
- source_word: וְהַיָּשָׁר
  chosen: and right
  alternatives:
  - and upright
  - and straight
  lexicon: HALOT
  rationale: יָשָׁר in ethical contexts denotes what is right/upright. 'Right' fits the paired moral evaluation 'good and right' and is more idiomatic in contemporary English than 'upright' here.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This Hebrew idiom expresses evaluation from someone's perspective. 'In the eyes of' is a standard and transparent English rendering that preserves the metaphor.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהָיו
  chosen: his God
  alternatives:
  - his gods
  lexicon: HALOT
  rationale: Although morphologically plural in form, אֱלֹהִים with singular possessive and in reference to Israel's God is conventionally singular in meaning. 'His God' accurately reflects the referent and syntax.
