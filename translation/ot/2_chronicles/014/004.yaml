id: 2CH.14.4
reference: 2 Chronicles 14:4
source:
  edition: WLC
  text: וַ/יָּ֨סַר֙ מִ/כָּל עָרֵ֣י יְהוּדָ֔ה אֶת הַ/בָּמ֖וֹת וְ/אֶת הַֽ/חַמָּנִ֑ים
    וַ/תִּשְׁקֹ֥ט הַ/מַּמְלָכָ֖ה לְ/פָנָֽי/ו־־־׃
translation:
  text: He removed the high places and the incense altars from all the cities of Judah,
    and the kingdom had rest before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly “the sun pillars.” The Hebrew term refers to cultic objects
      and may in some contexts be associated with solar worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסַר
  chosen: He removed
  alternatives:
  - He took away
  - He abolished
  lexicon: HALOT
  rationale: The Hiphil wayyiqtol of סור here denotes causing something to be removed.
    'He removed' is natural English and preserves the concrete action without overinterpreting
    it as a formal abolition.
- source_word: מִכָּל עָרֵי יְהוּדָה
  chosen: from all the cities of Judah
  alternatives:
  - out of every city of Judah
  lexicon: HALOT
  rationale: This phrase marks the scope of Asa's reform geographically. 'From all
    the cities of Judah' is a straightforward rendering of the preposition מן with
    כל plus the construct chain.
- source_word: הַבָּמוֹת
  chosen: the high places
  alternatives:
  - the shrines
  lexicon: HALOT
  rationale: בָּמוֹת commonly refers to elevated cultic sites. 'High places' is the
    standard and most transparent rendering in English Bible usage, preserving the
    historical-religious sense better than the more interpretive 'shrines'.
- source_word: הַחַמָּנִים
  chosen: the incense altars
  alternatives:
  - the sun pillars
  - the incense stands
  lexicon: HALOT
  rationale: חַמָּנִים refers to cultic objects associated in various contexts with
    incense or solar worship. In this reform context, 'incense altars' gives a readable
    and plausible sense without overstating a specifically solar interpretation. Because
    the term is lexically difficult, an alternative is preserved in a footnote.
- source_word: וַתִּשְׁקֹט
  chosen: had rest
  alternatives:
  - was quiet
  - was at peace
  lexicon: HALOT
  rationale: The verb שקט denotes being undisturbed, quiet, or at rest. 'Had rest'
    fits the Chronicler's recurring theme of divinely granted national tranquility
    and reads idiomatically with 'the kingdom' as subject.
- source_word: הַמַּמְלָכָה
  chosen: the kingdom
  alternatives:
  - the realm
  lexicon: HALOT
  rationale: מַמְלָכָה denotes the kingdom or royal realm. 'The kingdom' is the most
    direct and conventional rendering.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  - under him
  - before his face
  lexicon: HALOT
  rationale: Literally 'before him.' In context this likely means during his reign
    or under his leadership. The more literal 'before him' is retained in the main
    text to preserve the Hebrew expression, while the idiomatic sense is noted by
    the alternatives.
