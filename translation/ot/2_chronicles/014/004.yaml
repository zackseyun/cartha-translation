theological_decisions:
- issue: Nature of Asa's reform objects
  chosen_reading: Render בָּמוֹת and חַמָּנִים as concrete cultic installations removed
    by Asa, without specifying more theology than the Hebrew states.
  alternative_readings:
  - Interpret חַמָּנִים specifically as solar images or sun-pillars
  rationale: The verse reports reform activity against illicit worship sites and objects,
    but the exact cultic nuance of חַמָּנִים is debated. The translation should reflect
    the reform plainly without importing a more specific polemic than the term securely
    supports.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
