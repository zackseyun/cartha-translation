theological_decisions:
- issue: Gendered military expression in גִּבּוֹרֵי חָיִל
  chosen_reading: mighty men of valor
  alternative_readings:
  - mighty warriors
  - valiant warriors
  rationale: The phrase refers to male fighting troops in an ancient military census.
    Following the gender-accurate policy, the translation keeps 'men' rather than
    neutralizing the expression, while recognizing that more neutral alternatives
    are possible in English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
