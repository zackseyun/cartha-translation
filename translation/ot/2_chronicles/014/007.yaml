id: 2CH.14.7
reference: 2 Chronicles 14:7
source:
  edition: WLC
  text: וַ/יְהִ֣י לְ/אָסָ֗א חַיִל֮ נֹשֵׂ֣א צִנָּ֣ה וָ/רֹמַח֒ מִֽ/יהוּדָה֙ שְׁלֹ֣שׁ
    מֵא֣וֹת אֶ֔לֶף וּ/מִ/בִּנְיָמִ֗ן נֹשְׂאֵ֤י מָגֵן֙ וְ/דֹ֣רְכֵי קֶ֔שֶׁת מָאתַ֥יִם
    וּ/שְׁמוֹנִ֖ים אָ֑לֶף כָּל אֵ֖לֶּה גִּבּ֥וֹרֵי חָֽיִלס־׃
translation:
  text: And Asa had an army of three hundred thousand from Judah bearing large shields
    and spears, and from Benjamin two hundred eighty thousand bearing shields and
    drawing bows. All these were mighty men of valor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mighty warriors' or 'valiant men.' The Hebrew expression גִּבּוֹרֵי
      חָיִל is a stock term for strong, valiant fighting men.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַיִל
  chosen: army
  alternatives:
  - force
  - host
  lexicon: HALOT
  rationale: In this military census context, חַיִל refers to military strength or
    troops rather than abstract wealth or valor. 'Army' is the clearest modern English
    rendering for the collective force Asa possessed.
- source_word: נֹשֵׂא צִנָּה וָרֹמַח
  chosen: bearing large shields and spears
  alternatives:
  - carrying large shields and spears
  lexicon: HALOT
  rationale: The participle נֹשֵׂא denotes those equipped with or carrying weapons.
    'Bearing' fits military register well. צִנָּה is the larger body shield, so 'large
    shields' distinguishes it from מָגֵן later in the verse. רֹמַח is 'spear' rather
    than a more specific 'lance' in accessible modern English.
- source_word: מִיהוּדָה
  chosen: from Judah
  alternatives:
  - of Judah
  lexicon: HALOT
  rationale: The preposition מִן marks source or tribal origin. 'From Judah' is natural
    English and preserves the tribal division.
- source_word: שְׁלֹשׁ מֵאוֹת אֶלֶף
  chosen: three hundred thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number rendering.
- source_word: נֹשְׂאֵי מָגֵן
  chosen: bearing shields
  alternatives:
  - carrying shields
  lexicon: HALOT
  rationale: Again the participle indicates troops equipped with a weapon. מָגֵן is
    a shield, likely smaller than צִנָּה; because English can sound awkward with 'small
    shields' here, 'shields' is retained while the distinction from צִנָּה is partially
    preserved by rendering the earlier term 'large shields'.
- source_word: וְדֹרְכֵי קֶשֶׁת
  chosen: drawing bows
  alternatives:
  - bending bows
  - treading bows
  lexicon: HALOT
  rationale: The idiom literally involves treading/bending the bow in order to string
    or use it, and by extension denotes archers. 'Drawing bows' communicates active
    bow use in idiomatic English better than the more opaque literal expression.
- source_word: מָאתַיִם וּשְׁמוֹנִים אָלֶף
  chosen: two hundred eighty thousand
  alternatives:
  - two hundred and eighty thousand
  lexicon: HALOT
  rationale: Straightforward number rendering in contemporary English style without
    'and.'
- source_word: כָּל אֵלֶּה
  chosen: All these
  alternatives:
  - All of these
  lexicon: HALOT
  rationale: Natural English for the summarizing phrase.
- source_word: גִּבּוֹרֵי חָיִל
  chosen: mighty men of valor
  alternatives:
  - mighty warriors
  - valiant men
  lexicon: HALOT
  rationale: This stock military expression denotes proven fighting men characterized
    by strength and valor. 'Mighty men of valor' preserves the idiomatic and traditional
    force while remaining understandable. 'Men' is retained because the Hebrew expression
    is grammatically masculine and refers to male soldiers, consistent with the gender-accurate
    policy.
