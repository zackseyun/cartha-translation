id: 2CH.14.6
reference: 2 Chronicles 14:6
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר לִֽ/יהוּדָ֜ה נִבְנֶ֣ה אֶת הֶ/עָרִ֣ים הָ/אֵ֗לֶּה וְ/נָסֵ֨ב חוֹמָ֣ה וּ/מִגְדָּלִים֮ דְּלָתַ֣יִם וּ/בְרִיחִים֒ עוֹדֶ֨/נּוּ הָ/אָ֜רֶץ לְ/פָנֵ֗י/נוּ כִּ֤י דָרַ֨שְׁנוּ֙ אֶת יְהוָ֣ה אֱלֹהֵ֔י/נוּ דָּרַ֕שְׁנוּ וַ/יָּ֥נַֽח לָ֖/נוּ מִ/סָּבִ֑יב וַ/יִּבְנ֖וּ וַ/יַּצְלִֽיחוּ׀־־׃פ
translation:
  text: And he said to Judah, “Let us build these cities and surround them with walls and towers, gates and bars, while the land is still before us, because we have sought Yahweh our God. We have sought him, and he has given us rest on every side.” So they built and prospered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the land is still before us,' implying that the opportunity remains open or the territory lies unthreatened before them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר לִיהוּדָה
  chosen: And he said to Judah
  alternatives:
  - And he said to the people of Judah
  - And he said to Judahites
  lexicon: HALOT
  rationale: The indirect object is the place/name Judah, functioning metonymically for the kingdom/people. 'To Judah' preserves the Hebrew form while remaining natural in English.
- source_word: נִבְנֶה
  chosen: Let us build
  alternatives:
  - We should build
  - Let us rebuild
  lexicon: HALOT
  rationale: First person plural cohortative expresses exhortation or resolve. 'Let us build' best captures the hortatory force without adding nuance such as restoration implied by 'rebuild'.
- source_word: הֶעָרִים הָאֵלֶּה
  chosen: these cities
  alternatives:
  - these towns
  lexicon: HALOT
  rationale: עָרִים commonly denotes urban settlements; 'cities' is the standard rendering and fits the fortified context.
- source_word: וְנָסֵב
  chosen: and surround them with
  alternatives:
  - and encircle with
  - and make a circuit of
  lexicon: HALOT
  rationale: Hiphil of סבב here means to encompass or surround. Because the following nouns are fortification elements, 'surround them with' communicates the construction sense idiomatically.
- source_word: חוֹמָה וּמִגְדָּלִים דְּלָתַיִם וּבְרִיחִים
  chosen: walls and towers, gates and bars
  alternatives:
  - a wall and towers, doors and bars
  - ramparts and towers, gates and bolts
  lexicon: HALOT
  rationale: The list names defensive structures. Plural 'walls' is idiomatic in English for city fortifications, though חוֹמָה is singular collective. 'Gates' is preferable to the more literal 'doors' in a city-fortification context; 'bars' renders the gate-fastening term naturally.
- source_word: עוֹדֶנּוּ הָאָרֶץ לְפָנֵינוּ
  chosen: while the land is still before us
  alternatives:
  - for the land is still before us
  - since the land is still open before us
  lexicon: HALOT
  rationale: The clause indicates present opportunity or unimpeded possession. 'While the land is still before us' preserves the temporal nuance of עוֹדֶנּוּ ('still/yet') and the idiom לְפָנֵינוּ without overinterpreting it as 'at peace' or 'available'.
- source_word: כִּי דָרַשְׁנוּ אֶת יְהוָה אֱלֹהֵינוּ
  chosen: because we have sought the LORD our God
  alternatives:
  - because we have sought the LORD
  - because we have inquired of the LORD our God
  lexicon: HALOT
  rationale: דרשׁ with God often means to seek him in devotion and dependence, not merely to ask for information. 'Sought' preserves the covenantal-spiritual sense.
- source_word: דָּרַשְׁנוּ
  chosen: We have sought him
  alternatives:
  - We have sought the LORD
  - We have inquired of him
  lexicon: HALOT
  rationale: The repetition is emphatic in Hebrew and should be retained. 'Him' is supplied naturally in English from the prior clause.
- source_word: וַיָּנַח לָנוּ מִסָּבִיב
  chosen: and he has given us rest on every side
  alternatives:
  - and he has given us rest all around
  - and he has caused us to rest from surrounding enemies
  lexicon: HALOT
  rationale: The verb conveys giving rest or relief; the idiom מִסָּבִיב means 'all around/on every side.' 'Given us rest on every side' is a standard, clear rendering that avoids importing explicit enemies not named in this clause.
- source_word: וַיִּבְנוּ וַיַּצְלִיחוּ
  chosen: So they built and prospered
  alternatives:
  - And they built and succeeded
  - And they built and had success
  lexicon: HALOT
  rationale: The final pair reports result. 'Prospered' captures the sense of successful progress/blessing more idiomatically than the flatter 'succeeded'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
