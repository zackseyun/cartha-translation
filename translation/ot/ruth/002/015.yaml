id: RUT.2.15
reference: Ruth 2:15
source:
  edition: WLC
  text: וַ/תָּ֖קָם לְ/לַקֵּ֑ט וַ/יְצַו֩ בֹּ֨עַז אֶת נְעָרָ֜י/ו לֵ/אמֹ֗ר גַּ֣ם בֵּ֧ין
    הָֽ/עֳמָרִ֛ים תְּלַקֵּ֖ט וְ/לֹ֥א תַכְלִימֽוּ/הָ־׃
translation:
  text: When she rose to glean, Boaz commanded his young men, saying, “Let her glean
    even among the sheaves, and do not humiliate her.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “between the sheaves.” The Hebrew preposition is literally “between,”
      but “among” is more natural English in this setting.
    reason: lexical_alternative
  - marker: b
    text: Or “do not shame her.” The Hebrew verb can denote causing disgrace or public
      humiliation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּקָם
  chosen: When she rose
  alternatives:
  - And she rose
  - Then she got up
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'When she rose' smoothly
    links her action to Boaz's response in English while preserving the temporal sense
    of the Hebrew verb קום.
- source_word: לְלַקֵּט
  chosen: to glean
  alternatives:
  - for gleaning
  lexicon: HALOT
  rationale: The infinitive of לקט expresses purpose. 'To glean' is the standard and
    contextually precise rendering in Ruth's harvest setting.
- source_word: וַיְצַו ... לֵאמֹר
  chosen: Boaz commanded ... saying
  alternatives:
  - Boaz instructed ... saying
  - Boaz ordered ... saying
  lexicon: HALOT
  rationale: צוה is stronger than a mere suggestion; 'commanded' best reflects the
    directive force. Retaining 'saying' mirrors the Hebrew speech-introduction formula
    without sounding overly wooden.
- source_word: נְעָרָיו
  chosen: his young men
  alternatives:
  - his servants
  - his workers
  lexicon: HALOT
  rationale: נַעַר can denote a young man, servant, or attendant depending on context.
    Here Boaz addresses male field workers under his authority; 'young men' preserves
    the lexical sense and the gendered reference.
- source_word: גַּם
  chosen: even
  alternatives:
  - also
  lexicon: HALOT
  rationale: 'In this context גַּם heightens the generosity of Boaz''s instruction.
    ''Even'' better conveys the concessive-expansive nuance: permission extends beyond
    normal gleaning practice.'
- source_word: בֵּין הָעֳמָרִים
  chosen: among the sheaves
  alternatives:
  - between the sheaves
  lexicon: HALOT
  rationale: עֳמָרִים are gathered bundles of grain, 'sheaves.' Although בֵּין is
    literally 'between,' idiomatic English prefers 'among' for movement or activity
    within a group of objects.
- source_word: תְּלַקֵּט
  chosen: Let her glean
  alternatives:
  - she may glean
  lexicon: HALOT
  rationale: The imperfect here functions jussively in reported command. 'Let her
    glean' captures the permissive directive addressed to Boaz's workers.
- source_word: וְלֹא תַכְלִימוּהָ
  chosen: and do not humiliate her
  alternatives:
  - and do not shame her
  - and do not reproach her
  - and do not embarrass her
  lexicon: HALOT
  rationale: The Hiphil of כלם means to shame, humiliate, or disgrace. 'Humiliate'
    best conveys the social dishonor and harsh treatment Boaz forbids, stronger than
    mere embarrassment.
