id: RUT.2.13
reference: Ruth 2:13
source:
  edition: WLC
  text: וַ֠/תֹּאמֶר אֶמְצָא חֵ֨ן בְּ/עֵינֶ֤י/ךָ אֲדֹנִ/י֙ כִּ֣י נִֽחַמְתָּ֔/נִי וְ/כִ֥י
    דִבַּ֖רְתָּ עַל לֵ֣ב שִׁפְחָתֶ֑/ךָ וְ/אָנֹכִי֙ לֹ֣א אֶֽהְיֶ֔ה כְּ/אַחַ֖ת שִׁפְחֹתֶֽי/ךָ־־׃
translation:
  text: Then she said, “May I find favor in your eyes, my lord, because you have comforted
    me and because you have spoken to the heart of your female servant, though I am
    not like one of your female servants.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “you have spoken kindly to your female servant.” The Hebrew is literally
      “you have spoken to the heart of your female servant.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶמְצָא חֵן
  chosen: May I find favor
  alternatives:
  - Let me find favor
  - I have found favor
  lexicon: HALOT
  rationale: The imperfect first-person singular after the speech verb functions idiomatically
    as a polite wish/request or deferential expression, not a simple future. 'Find
    favor' is the standard idiom for gaining gracious regard.
- source_word: בְּעֵינֶיךָ
  chosen: in your eyes
  alternatives:
  - in your sight
  lexicon: HALOT
  rationale: A common Hebrew idiom for evaluation or favor. 'In your eyes' preserves
    the imagery and remains natural enough in English.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - sir
  - my master
  lexicon: HALOT
  rationale: Here the term is a respectful human address to Boaz, not a divine title.
    'My lord' preserves the social deference better than the flatter modern 'sir,'
    while avoiding the stronger ownership implication of 'master.'
- source_word: נִחַמְתָּנִי
  chosen: you have comforted me
  alternatives:
  - you have consoled me
  - you have encouraged me
  lexicon: HALOT
  rationale: The verb נחם in this context conveys consolation/comfort in response
    to vulnerability. 'Comforted' best captures the emotional sense in readable English.
- source_word: דִבַּרְתָּ עַל־לֵב
  chosen: you have spoken to the heart of
  alternatives:
  - you have spoken kindly to
  - you have reassured
  lexicon: HALOT
  rationale: The Hebrew idiom literally means speaking to the heart, often with the
    sense of tender or reassuring speech. The more literal rendering is retained in
    the main text for transparency, while a smoother alternative is preserved in a
    footnote.
- source_word: שִׁפְחָתֶךָ / שִׁפְחֹתֶיךָ
  chosen: your female servant / your female servants
  alternatives:
  - your servant / your servant girls
  - your slave / your slave women
  lexicon: HALOT
  rationale: The noun specifically denotes a female servant/slave. Because Ruth is
    using deferential self-reference in a household setting and the bonded nature
    is not the main point of the verse, 'female servant' best balances lexical specificity
    and readability. The repeated term is rendered consistently.
- source_word: וְאָנֹכִי לֹא אֶהְיֶה כְּאַחַת
  chosen: though I am not like one
  alternatives:
  - and yet I am not like one
  - although I have not become like one
  lexicon: HALOT
  rationale: The clause is concessive in sense, contrasting Boaz's kindness with Ruth's
    lower status. English present tense communicates the stative force naturally.
    'Though' makes the concession explicit.
