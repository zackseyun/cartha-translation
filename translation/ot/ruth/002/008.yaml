id: RUT.2.8
reference: Ruth 2:8
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ בֹּ֨עַז אֶל ר֜וּת הֲ/ל֧וֹא שָׁמַ֣עַתְּ בִּתִּ֗/י אַל תֵּלְכִי֙
    לִ/לְקֹט֙ בְּ/שָׂדֶ֣ה אַחֵ֔ר וְ/גַ֛ם לֹ֥א תַעֲבוּרִ֖י מִ/זֶּ֑ה וְ/כֹ֥ה תִדְבָּקִ֖י/ן
    עִם נַעֲרֹתָֽ/י־־־׃
translation:
  text: 'Then Boaz said to Ruth, “Listen, my daughter: do not go to glean in another
    field, and also do not go away from here, but stay close with my young women.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Have you not heard, my daughter?'' An idiomatic way of calling
      for Ruth''s attention before giving instruction.'
    reason: lexical_alternative
  - marker: b
    text: Or 'do not leave this place either.'
    reason: lexical_alternative
  - marker: c
    text: Or 'cling to' or 'keep close to' my young women.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: הֲלוֹא שָׁמַעַתְּ
  chosen: Listen
  alternatives:
  - Have you not heard?
  - Do you hear?
  lexicon: HALOT
  rationale: Literally, 'Have you not heard?' In context Boaz is introducing an instruction
    and seeking Ruth's attention. 'Listen' captures the idiomatic force in readable
    English without over-literal awkwardness.
- source_word: בִּתִּי
  chosen: my daughter
  alternatives:
  - daughter
  - my dear girl
  lexicon: HALOT
  rationale: Retains the familial/social term of address. 'My daughter' preserves
    both tenderness and the age/status asymmetry better than a paraphrase.
- source_word: אַל תֵּלְכִי לִלְקֹט
  chosen: do not go to glean
  alternatives:
  - do not go gleaning
  - do not go to pick up grain
  lexicon: HALOT
  rationale: Keeps the motion verb plus infinitive purpose construction. 'Glean' is
    the established and precise agricultural term here.
- source_word: בְּשָׂדֶה אַחֵר
  chosen: in another field
  alternatives:
  - in a different field
  lexicon: HALOT
  rationale: Straightforward rendering of location plus adjective; 'another field'
    is natural and precise.
- source_word: וְגַם לֹא תַעֲבוּרִי מִזֶּה
  chosen: and also do not go away from here
  alternatives:
  - and also do not pass from here
  - and do not leave this place either
  lexicon: HALOT
  rationale: The verb conveys moving on or passing away from this place. 'Go away
    from here' is idiomatic modern English and fits the context of remaining in Boaz's
    field.
- source_word: וְכֹה
  chosen: but
  alternatives:
  - and here
  - rather here
  lexicon: HALOT
  rationale: The adverb means 'thus/here,' but in this context it introduces the positive
    counterpart to the prohibitions. 'But' communicates the contrast naturally in
    English.
- source_word: תִדְבָּקִין
  chosen: stay close
  alternatives:
  - cling
  - keep close
  - stick close
  lexicon: HALOT
  rationale: The verb דבק commonly means cling closely or remain attached. 'Stay close'
    is natural English and preserves the sense of close association without sounding
    wooden.
- source_word: עִם נַעֲרֹתַי
  chosen: with my young women
  alternatives:
  - with my servant girls
  - with my maidens
  - with my female workers
  lexicon: HALOT
  rationale: The feminine plural refers to Boaz's female workers/attendants in the
    field. 'Young women' is accurate and readable; 'maidens' is archaic, while 'servant
    girls' may over-specify status beyond the immediate context.
