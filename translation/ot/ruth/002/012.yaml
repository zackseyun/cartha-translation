id: RUT.2.12
reference: Ruth 2:12
source:
  edition: WLC
  text: יְשַׁלֵּ֥ם יְהוָ֖ה פָּעֳלֵ֑/ךְ וּ/תְהִ֨י מַשְׂכֻּרְתֵּ֜/ךְ שְׁלֵמָ֗ה מֵ/עִ֤ם יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל אֲשֶׁר בָּ֖את לַ/חֲס֥וֹת תַּֽחַת כְּנָפָֽי/ו־־׃
translation:
  text: May Yahweh repay your work, and may your reward be full from Yahweh, the God of Israel, under whose wings you have come to seek refuge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'may your wages be complete.' The Hebrew term can denote wages or reward, and 'full/complete' echoes the same root as 'repay.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְשַׁלֵּם
  chosen: may ... repay
  alternatives:
  - will repay
  - make full
  lexicon: HALOT
  rationale: Piel of שׁלם here functions jussively in Boaz's blessing/wish, so 'may ... repay' best captures the volitional sense. 'Repay' fits the context of recompense for Ruth's actions better than a more wooden 'make complete.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: פָּעֳלֵךְ
  chosen: your work
  alternatives:
  - your deed
  - what you have done
  lexicon: HALOT
  rationale: פֹּעַל commonly denotes work, deed, or activity. 'Your work' is concise and preserves the lexical connection with recompense language, while still naturally referring to Ruth's loyal actions.
- source_word: וּתְהִי
  chosen: and may ... be
  alternatives:
  - and let ... be
  - and ... will be
  lexicon: HALOT
  rationale: Qal jussive of היה continues the blessing formula. 'And may ... be' preserves the parallel wish structure with the first clause.
- source_word: מַשְׂכֻּרְתֵּךְ
  chosen: your reward
  alternatives:
  - your wages
  - your recompense
  lexicon: HALOT
  rationale: The noun can mean wages or reward. In this context Boaz is not speaking of literal pay from an employer but of divine recompense, so 'reward' is the most idiomatic and contextually fitting choice.
- source_word: שְׁלֵמָה
  chosen: be full
  alternatives:
  - be complete
  - be ample
  lexicon: HALOT
  rationale: From the same semantic field as שׁלם, the adjective conveys fullness/completeness. 'Be full' is natural English and preserves the sense of complete recompense.
- source_word: מֵעִם
  chosen: from
  alternatives:
  - from with
  - at the hand of
  lexicon: HALOT
  rationale: 'The preposition indicates source/origin in this context: the reward comes from the LORD. ''From'' is the clearest idiomatic rendering.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard construct rendering; no expansion is needed.
- source_word: אֲשֶׁר בָּאת
  chosen: under whose ... you have come
  alternatives:
  - to whom you have come
  - because you came
  lexicon: HALOT
  rationale: The relative clause modifies 'the God of Israel.' Restructuring to 'under whose' in English avoids a clumsy split infinitive construction while preserving the clause's meaning.
- source_word: לַחֲסוֹת
  chosen: to seek refuge
  alternatives:
  - to take refuge
  - to find shelter
  lexicon: HALOT
  rationale: The infinitive means to seek or take refuge. 'Seek refuge' preserves the purposeful motion implied by 'have come' and is idiomatic in English.
- source_word: תַּחַת כְּנָפָיו
  chosen: under whose wings
  alternatives:
  - under his wings
  - beneath his wings
  lexicon: HALOT
  rationale: The imagery is metaphorical and should be preserved. 'Wings' retains the protective covenantal image rather than flattening it to 'protection.' The relative pronoun 'whose' integrates the phrase smoothly into English syntax.
