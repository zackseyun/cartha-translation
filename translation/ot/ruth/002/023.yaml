id: RUT.2.23
reference: Ruth 2:23
source:
  edition: WLC
  text: וַ/תִּדְבַּ֞ק בְּ/נַעֲר֥וֹת בֹּ֨עַז֙ לְ/לַקֵּ֔ט עַד כְּל֥וֹת קְצִֽיר הַ/שְּׂעֹרִ֖ים
    וּ/קְצִ֣יר הַֽ/חִטִּ֑ים וַ/תֵּ֖שֶׁב אֶת חֲמוֹתָֽ/הּ־־־׃
translation:
  text: So she stayed close to Boaz's young women to glean, until the end of the barley
    harvest and the wheat harvest. And she lived with her mother-in-law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clung to Boaz's young women.' The Hebrew verb can emphasize close attachment.
    reason: lexical_alternative
  - marker: b
    text: Or 'she stayed with her mother-in-law.' The Hebrew verb can mean 'stayed,'
      'remained,' or 'lived/dwelt,' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּדְבַּק
  chosen: stayed close
  alternatives:
  - clung
  - kept close
  - stuck close
  lexicon: HALOT
  rationale: The verb דבק literally conveys clinging or sticking closely. In this
    narrative context, 'stayed close' communicates continued association with Boaz's
    female workers in natural English without overstating physical attachment.
- source_word: בְּנַעֲרוֹת בֹּעַז
  chosen: to Boaz's young women
  alternatives:
  - with Boaz's young women
  - among Boaz's young women
  - to the young women of Boaz
  lexicon: HALOT
  rationale: נַעֲרוֹת refers to Boaz's female workers/young women. Rendering with
    the possessive preserves the relationship. The preposition with דבק is idiomatically
    represented in English by 'stayed close to'.
- source_word: לְלַקֵּט
  chosen: to glean
  alternatives:
  - for gleaning
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To glean' is the standard and precise
    agricultural/legal term in Ruth and should be retained for consistency.
- source_word: עַד כְּלוֹת
  chosen: until the end of
  alternatives:
  - until finishing of
  - until the completion of
  - until
  lexicon: HALOT
  rationale: The construction marks duration up to completion. 'Until the end of'
    is idiomatic English that preserves the temporal sense.
- source_word: קְצִיר הַשְּׂעֹרִים
  chosen: the barley harvest
  alternatives:
  - barley harvest
  lexicon: HALOT
  rationale: A straightforward construct phrase meaning the harvest of barley. The
    article is naturally carried in English as 'the barley harvest' in this sequence.
- source_word: וּקְצִיר הַחִטִּים
  chosen: and the wheat harvest
  alternatives:
  - and wheat harvest
  lexicon: HALOT
  rationale: Parallel to the previous phrase; preserving both harvests highlights
    the extended period of Ruth's gleaning.
- source_word: וַתֵּשֶׁב
  chosen: she lived
  alternatives:
  - she stayed
  - she dwelt
  - she remained
  lexicon: HALOT
  rationale: ישב can mean sit, dwell, remain, or live. Here the sense is residence
    with Naomi, not merely sitting. 'Lived' is clear modern English; 'stayed' is possible
    but slightly less specific.
- source_word: אֶת חֲמוֹתָהּ
  chosen: with her mother-in-law
  alternatives:
  - her mother-in-law
  - beside her mother-in-law
  lexicon: HALOT
  rationale: Although אֶת is the direct-object marker, with ישב this expression idiomatically
    conveys residing with someone. English requires 'with' to express the relationship
    naturally and accurately.
