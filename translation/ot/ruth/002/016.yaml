id: RUT.2.16
reference: Ruth 2:16
source:
  edition: WLC
  text: וְ/גַ֛ם שֹׁל תָּשֹׁ֥לּוּ לָ֖/הּ מִן הַ/צְּבָתִ֑ים וַ/עֲזַבְתֶּ֥ם וְ/לִקְּטָ֖ה
    וְ/לֹ֥א תִגְעֲרוּ בָֽ/הּ־־־׃
translation:
  text: And also, you must surely pull out some for her from the bundles and leave
    it, so that she may gather it, and you must not rebuke her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the sheaves.' The Hebrew term refers to gathered bunches of stalks.
    reason: lexical_alternative
  - marker: b
    text: Or 'let her glean.' The Hebrew verb is the standard term for gleaning in
      a harvested field.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: And also
  alternatives:
  - Also
  - And indeed
  lexicon: HALOT
  rationale: Adds emphasis to Boaz's instruction beyond the previous command; 'and
    also' preserves the connective plus additive force.
- source_word: שֹׁל תָּשֹׁלּוּ
  chosen: you must surely pull out
  alternatives:
  - you shall certainly pull out
  - you must deliberately draw out
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the action. The
    verb שלל/שלל here in context means to draw out or pull out intentionally for Ruth,
    not merely to let fall accidentally.
- source_word: לָהּ
  chosen: for her
  alternatives:
  - to her
  lexicon: HALOT
  rationale: 'In context the preposition marks benefit: the workers are to pull out
    grain for Ruth''s benefit.'
- source_word: מִן הַצְּבָתִים
  chosen: from the bundles
  alternatives:
  - from the sheaves
  - from the stalk bundles
  lexicon: HALOT
  rationale: צבתים refers to gathered bunches of stalks. 'Bundles' is clear modern
    English; 'sheaves' is possible but can sound more traditional and less transparent.
    The sense is grain intentionally taken from what has already been gathered.
- source_word: וַעֲזַבְתֶּם
  chosen: and leave it
  alternatives:
  - and abandon it
  - and let it lie
  lexicon: HALOT
  rationale: The command is to leave the pulled-out grain behind for Ruth to collect.
    'Leave it' is natural and precise.
- source_word: וְלִקְּטָה
  chosen: so that she may gather it
  alternatives:
  - and let her glean
  - that she may pick it up
  lexicon: HALOT
  rationale: לקט is the technical verb for gleaning. Because the object is the grain
    just left behind, 'gather it' reads smoothly in English while preserving the harvesting
    context. The more technical 'glean' is a viable alternative.
- source_word: וְלֹא תִגְעֲרוּ בָהּ
  chosen: and you must not rebuke her
  alternatives:
  - and do not scold her
  - and do not reproach her
  lexicon: HALOT
  rationale: גער means to rebuke or reprimand sharply. 'Rebuke' preserves the force
    without becoming colloquial.
