id: RUT.2.6
reference: Ruth 2:6
source:
  edition: WLC
  text: וַ/יַּ֗עַן הַ/נַּ֛עַר הַ/נִּצָּ֥ב עַל הַ/קּוֹצְרִ֖ים וַ/יֹּאמַ֑ר נַעֲרָ֤ה
    מֽוֹאֲבִיָּה֙ הִ֔יא הַ/שָּׁ֥בָה עִֽם נָעֳמִ֖י מִ/שְּׂדֵ֥ה מוֹאָֽב־־׃
translation:
  text: Then the young man who was set over the reapers answered and said, “She is
    a young Moabite woman who returned with Naomi from the fields of Moab.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from the field of Moab”; the Hebrew singular may be understood collectively
      for the agricultural land of Moab.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: ענה in narrative introduction commonly means 'answered/responded.' 'Answered'
    preserves the Hebrew idiom and pairs naturally with the following 'said.'
- source_word: הַנַּעַר
  chosen: the young man
  alternatives:
  - the servant
  - the foreman
  lexicon: HALOT
  rationale: נַעַר broadly denotes a youth/young man or servant. Here the participial
    qualifier identifies his role over the reapers, so 'young man' keeps the lexical
    sense while letting the role be expressed separately rather than importing 'foreman'
    into the noun itself.
- source_word: הַנִּצָּב עַל הַקּוֹצְרִים
  chosen: who was set over the reapers
  alternatives:
  - who was standing over the reapers
  - who was in charge of the reapers
  lexicon: HALOT
  rationale: נצב can mean stand/station oneself, and with עַל in this context indicates
    an appointed supervisory position. 'Was set over' preserves both the passive/stative
    nuance and the authority relation without over-paraphrasing.
- source_word: הַקּוֹצְרִים
  chosen: the reapers
  alternatives:
  - the harvesters
  lexicon: HALOT
  rationale: The participial noun from קצר refers to those reaping grain. 'Reapers'
    is the most direct and idiomatic rendering in this agricultural setting.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר. 'And said' preserves the Hebrew
    sequence naturally in English.
- source_word: נַעֲרָה
  chosen: a young ... woman
  alternatives:
  - a girl
  - a maiden
  lexicon: HALOT
  rationale: נַעֲרָה denotes a young woman. 'Girl' may sound too juvenile, and 'maiden'
    is archaic. 'Young woman' is clear modern English.
- source_word: מוֹאֲבִיָּה
  chosen: Moabite
  alternatives:
  - from Moab
  lexicon: HALOT
  rationale: The gentilic adjective is best rendered directly as 'Moabite,' preserving
    ethnicity/national origin.
- source_word: הִיא
  chosen: She is
  alternatives:
  - This is
  lexicon: HALOT
  rationale: The independent pronoun gives an identificational statement. 'She is'
    is the most straightforward English equivalent.
- source_word: הַשָּׁבָה
  chosen: who returned
  alternatives:
  - who came back
  lexicon: HALOT
  rationale: שוב means return/turn back. 'Returned' matches the narrative motif of
    Ruth and Naomi coming back and is slightly more formal/literary than 'came back'
    without being archaic.
- source_word: עִם נָעֳמִי
  chosen: with Naomi
  alternatives:
  - along with Naomi
  lexicon: HALOT
  rationale: Simple accompaniment; 'with Naomi' is sufficient and natural.
- source_word: מִשְּׂדֵה מוֹאָב
  chosen: from the fields of Moab
  alternatives:
  - from the field of Moab
  - from the countryside of Moab
  lexicon: HALOT
  rationale: The singular construct שְׂדֵה can function collectively/regionally. English
    plural 'fields' best conveys the idiomatic sense of the agricultural land/territory
    of Moab in this context.
