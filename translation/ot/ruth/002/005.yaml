id: RUT.2.5
reference: Ruth 2:5
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר בֹּ֨עַז֙ לְ/נַעֲר֔/וֹ הַ/נִּצָּ֖ב עַל הַ/קּֽוֹצְרִ֑ים לְ/מִ֖י
    הַ/נַּעֲרָ֥ה הַ/זֹּֽאת־׃
translation:
  text: Then Boaz said to his young man who was set over the reapers, “Whose young
    woman is this?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Who does this young woman belong to?” The Hebrew asks about her affiliation
      or household connection.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence without the stiffness of repeatedly using
    'and.'
- source_word: בֹּעַז
  chosen: Boaz
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: לְנַעֲרוֹ
  chosen: to his young man
  alternatives:
  - to his servant
  - to his foreman
  lexicon: HALOT
  rationale: נַעַר can mean young man, servant, or attendant depending on context.
    Here the following participial phrase identifies this person as the one supervising
    the reapers. 'Young man' preserves the lexical sense, while the supervisory role
    is expressed by the next phrase rather than absorbed into this noun.
- source_word: הַנִּצָּב עַל הַקּוֹצְרִים
  chosen: who was set over the reapers
  alternatives:
  - who was in charge of the reapers
  - who stood over the reapers
  lexicon: HALOT
  rationale: The Niphal participle of נצב with עַל indicates being stationed over
    or appointed over others. 'Was set over' preserves the passive nuance and supervisory
    sense. 'Reapers' is the straightforward rendering of the participle/substantive
    קֹצְרִים.
- source_word: לְמִי
  chosen: Whose
  alternatives:
  - To whom does ... belong
  lexicon: HALOT
  rationale: The idiom asks about belonging or household affiliation. 'Whose' is concise,
    idiomatic English and captures the social sense of the question.
- source_word: הַנַּעֲרָה
  chosen: young woman
  alternatives:
  - girl
  - maiden
  - servant girl
  lexicon: HALOT
  rationale: נַעֲרָה denotes a young female. 'Young woman' is natural modern English
    and avoids the archaic 'maiden' and the potentially too-young 'girl.' 'Servant
    girl' would over-specify a status not explicit in the noun itself here.
- source_word: הַזֹּאת
  chosen: this
  alternatives:
  - this one
  lexicon: HALOT
  rationale: Simple demonstrative modifying 'young woman'; 'this' is the natural English
    equivalent.
