id: RUT.2.19
reference: Ruth 2:19
source:
  edition: WLC
  text: וַ/תֹּאמֶר֩ לָ֨/הּ חֲמוֹתָ֜/הּ אֵיפֹ֨ה לִקַּ֤טְתְּ הַ/יּוֹם֙ וְ/אָ֣נָה עָשִׂ֔ית
    יְהִ֥י מַכִּירֵ֖/ךְ בָּר֑וּךְ וַ/תַּגֵּ֣ד לַ/חֲמוֹתָ֗/הּ אֵ֤ת אֲשֶׁר עָשְׂתָה֙
    עִמּ֔/וֹ וַ/תֹּ֗אמֶר שֵׁ֤ם הָ/אִישׁ֙ אֲשֶׁ֨ר עָשִׂ֧יתִי עִמּ֛/וֹ הַ/יּ֖וֹם בֹּֽעַז־׃
translation:
  text: And her mother-in-law said to her, “Where did you glean today, and where have
    you worked? Blessed be the one who took notice of you.” So she told her mother-in-law
    with whom she had worked, and she said, “The name of the man with whom I worked
    today is Boaz.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew more literally, 'what she had done with him' and 'the man with whom
      I had done [work] today.' Here 'worked' brings out the contextual sense of field
      labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמוֹתָהּ
  chosen: her mother-in-law
  alternatives:
  - her husband's mother
  lexicon: HALOT
  rationale: Standard kinship term in context; 'mother-in-law' is the natural modern
    English equivalent.
- source_word: אֵיפֹה
  chosen: Where
  alternatives:
  - In what place
  lexicon: HALOT
  rationale: Direct interrogative of place; simple 'Where' best matches readable modern
    English.
- source_word: לִקַּטְתְּ
  chosen: did you glean
  alternatives:
  - have you gathered
  lexicon: HALOT
  rationale: The verb refers specifically to gleaning leftover grain in an agricultural
    setting, an important cultural and legal concept in Ruth; 'glean' preserves that
    specificity better than a generic 'gather.'
- source_word: וְאָנָה
  chosen: and where
  alternatives:
  - and to where
  - and in what place
  lexicon: HALOT
  rationale: Parallel interrogative with אֵיפֹה; idiomatic English is 'and where.'
- source_word: עָשִׂית
  chosen: have you worked
  alternatives:
  - did you work
  - have you done
  lexicon: HALOT
  rationale: Although עשה is broadly 'do/make,' in this context with the following
    phrase and Ruth's report about the man 'with whom I worked,' it idiomatically
    refers to labor done in the field. 'Worked' best captures the sense in context.
- source_word: יְהִי מַכִּירֵךְ בָּרוּךְ
  chosen: Blessed be the one who took notice of you
  alternatives:
  - May the one who recognized you be blessed
  - Blessed be your benefactor
  lexicon: HALOT
  rationale: מכיר literally denotes one who recognizes/notices. In context Naomi blesses
    the person who paid favorable attention to Ruth. 'Took notice of you' is idiomatic
    and preserves the personal attentiveness implied.
- source_word: וַתַּגֵּד
  chosen: So she told
  alternatives:
  - And she reported
  - And she declared
  lexicon: HALOT
  rationale: Narrative reporting verb; 'told' is natural English, with 'So' smoothing
    the transition from Naomi's speech to Ruth's response.
- source_word: אֵת אֲשֶׁר עָשְׂתָה עִמּוֹ
  chosen: with whom she had worked
  alternatives:
  - what she had done with him
  - what she had accomplished with him
  lexicon: HALOT
  rationale: The Hebrew more literally says 'what she had done with him,' but in this
    field-labor context English requires an idiomatic rendering. 'With whom she had
    worked' avoids misleading implications and fits Ruth's subsequent clarification.
- source_word: שֵׁם הָאִישׁ
  chosen: The name of the man
  alternatives:
  - The man's name
  lexicon: HALOT
  rationale: Either is possible; 'The name of the man' stays slightly closer to the
    Hebrew while remaining natural.
- source_word: אֲשֶׁר עָשִׂיתִי עִמּוֹ
  chosen: with whom I worked
  alternatives:
  - with whom I labored
  - with whom I did work
  lexicon: HALOT
  rationale: Again, עשה plus עִם in this context points to labor performed in association
    with him, not merely generic action. 'Worked' is the clearest contextual rendering.
- source_word: בֹּעַז
  chosen: Boaz
  lexicon: HALOT
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
