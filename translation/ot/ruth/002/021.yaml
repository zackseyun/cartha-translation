id: RUT.2.21
reference: Ruth 2:21
source:
  edition: WLC
  text: וַ/תֹּ֖אמֶר ר֣וּת הַ/מּוֹאֲבִיָּ֑ה גַּ֣ם כִּי אָמַ֣ר אֵלַ֗/י עִם הַ/נְּעָרִ֤ים
    אֲשֶׁר לִ/י֙ תִּדְבָּקִ֔י/ן עַ֣ד אִם כִּלּ֔וּ אֵ֥ת כָּל הַ/קָּצִ֖יר אֲשֶׁר לִֽ/י׀־־־־־־׃
translation:
  text: Then Ruth the Moabite said, “He also said to me, ‘You are to stay close by
    my young men until they have finished all my harvest.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “stay close with my young men.” The Hebrew preposition may be rendered
      either way in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: ר֣וּת הַמּוֹאֲבִיָּה
  chosen: Ruth the Moabite
  alternatives:
  - Ruth the Moabitess
  lexicon: HALOT
  rationale: Transliterates the personal name and renders the gentilic naturally in
    modern English. 'Moabite' is standard and avoids archaic '-ess' wording.
- source_word: גַּם כִּי
  chosen: He also said to me
  alternatives:
  - Moreover, he said to me
  - Indeed, he said to me
  lexicon: HALOT
  rationale: The combination adds emphasis or addition to Ruth's report. 'Also' fits
    the discourse context and idiomatic English.
- source_word: עִם הַנְּעָרִים
  chosen: by my young men
  alternatives:
  - with my young men
  - near my servants
  lexicon: HALOT
  rationale: נְעָרִים commonly means 'young men' here. 'By' works idiomatically with
    'stay close' in English. The masculine term is retained as 'young men,' matching
    the Hebrew form and context.
- source_word: תִּדְבָּקִין
  chosen: You are to stay close
  alternatives:
  - you shall cling
  - you shall keep close
  - you should stay close
  lexicon: HALOT
  rationale: The verb דבק conveys close attachment or sticking close. 'Stay close'
    is natural modern English and fits Boaz's practical instruction without over-literal
    awkwardness.
- source_word: עַד אִם כִּלּוּ
  chosen: until they have finished
  alternatives:
  - until they finish
  - until they complete
  lexicon: HALOT
  rationale: This expresses the endpoint of the action. The perfect after עַד אִם
    is well represented by English 'until they have finished'.
- source_word: כָּל הַקָּצִיר אֲשֶׁר לִי
  chosen: all my harvest
  alternatives:
  - all the harvest that is mine
  - my whole harvest
  lexicon: HALOT
  rationale: A compact rendering that preserves possession and totality. 'Harvest'
    here refers to the full harvesting work or produce belonging to Boaz.
