id: RUT.2.1
reference: Ruth 2:1
source:
  edition: WLC
  text: וּֽ/לְ/נָעֳמִ֞י מידע לְ/אִישָׁ֗/הּ אִ֚ישׁ גִּבּ֣וֹר חַ֔יִל מִ/מִּשְׁפַּ֖חַת
    אֱלִימֶ֑לֶךְ וּ/שְׁמ֖/וֹ בֹּֽעַז׃
translation:
  text: Now Naomi had a relative of her husband, a man of great worth, from the clan
    of Elimelech, and his name was Boaz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a mighty man of valor,' 'a prominent man,' or 'a wealthy man'; the Hebrew
      expression combines ideas of strength, capability, status, and substance.
    reason: lexical_alternative
  - marker: b
    text: Or 'family of Elimelech'; the Hebrew can refer to a wider kin-group or clan.
    reason: lexical_alternative
lexical_decisions:
- source_word: מידע
  chosen: relative
  alternatives:
  - acquaintance
  - kinsman
  - well-known associate
  lexicon: HALOT
  rationale: The form denotes someone known/connected to Naomi's husband. In context,
    the following phrase 'from the clan of Elimelech' clarifies a familial connection,
    so 'relative' best captures the sense in natural English without prematurely specifying
    the later legal role of kinsman-redeemer.
- source_word: לְאִישָׁהּ
  chosen: of her husband
  alternatives:
  - belonging to her husband
  - on her husband's side
  lexicon: HALOT
  rationale: The preposition plus noun with 3fs suffix identifies the relation as
    tied to Naomi's husband rather than directly to Naomi. 'Of her husband' is concise
    and accurate.
- source_word: אִישׁ גִּבּוֹר חַיִל
  chosen: a man of great worth
  alternatives:
  - a mighty man of valor
  - a prominent man of standing
  - a wealthy and influential man
  lexicon: HALOT
  rationale: The phrase can denote strength, capability, social standing, and wealth.
    In Ruth's non-military context, 'a man of great worth' preserves the broad commendatory
    force without importing warfare language. It also leaves room for the term's moral
    and social dimensions.
- source_word: מִמִּשְׁפַּחַת
  chosen: from the clan of
  alternatives:
  - from the family of
  - from the kin-group of
  lexicon: HALOT
  rationale: מִשְׁפָּחָה often refers to a wider family grouping or clan, not merely
    an immediate household. 'Clan' better reflects the broader kinship structure relevant
    to the narrative.
- source_word: וּשְׁמוֹ
  chosen: and his name was
  alternatives:
  - and his name is
  lexicon: HALOT
  rationale: Standard Hebrew narrative introduction of a character is best rendered
    with English past tense in this context.
- source_word: בֹּעַז
  chosen: Boaz
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: וּלְנָעֳמִי
  chosen: Now Naomi had
  alternatives:
  - And Naomi had
  - Naomi had
  lexicon: HALOT
  rationale: The prefixed conjunction introduces a new narrative detail. 'Now' is
    a natural discourse marker in English that signals transition without over-translating
    the conjunction.
