theological_decisions:
- issue: Potentially cultic nuance of וַתִּשְׁתַּחוּ
  chosen_reading: Rendered as a gesture of respectful prostration before Boaz, not
    worship
  alternative_readings:
  - Rendered with 'worshiped' in a more overtly religious sense
  rationale: In this narrative context Ruth is responding to Boaz with social deference,
    not offering divine worship. English 'bowed to the ground' preserves the action
    without importing a theological claim the text does not make.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make.'
