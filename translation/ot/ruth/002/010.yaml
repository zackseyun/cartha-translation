id: RUT.2.10
reference: Ruth 2:10
source:
  edition: WLC
  text: וַ/תִּפֹּל֙ עַל פָּנֶ֔י/הָ וַ/תִּשְׁתַּ֖חוּ אָ֑רְצָ/ה וַ/תֹּ֣אמֶר אֵלָ֗י/ו
    מַדּוּעַ֩ מָצָ֨אתִי חֵ֤ן בְּ/עֵינֶ֨י/ךָ֙ לְ/הַכִּירֵ֔/נִי וְ/אָּנֹכִ֖י נָכְרִיָּֽה־׃
translation:
  text: Then she fell on her face and bowed to the ground and said to him, “Why have
    I found favor in your eyes, that you should take notice of me, though I am a foreign
    woman?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'recognize me,' 'regard me,' or 'acknowledge me' for 'take notice of
      me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּפֹּל עַל־פָּנֶיהָ
  chosen: she fell on her face
  alternatives:
  - she fell facedown
  - she fell on her face to the ground
  lexicon: HALOT
  rationale: The idiom literally describes falling upon her face, a conventional gesture
    of deep humility. 'She fell on her face' preserves the Hebrew image clearly in
    natural English.
- source_word: וַתִּשְׁתַּחוּ אָרְצָה
  chosen: and bowed to the ground
  alternatives:
  - and prostrated herself to the ground
  - and bowed down to the earth
  lexicon: HALOT
  rationale: The verb שׁחה in the Hishtaphel/related stem commonly denotes bowing
    down or prostration. 'Bowed to the ground' keeps the physical gesture without
    overstating cultic worship in this interpersonal setting.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: A straightforward interrogative asking the reason; 'Why' is the most
    natural modern English equivalent.
- source_word: מָצָאתִי חֵן בְּעֵינֶיךָ
  chosen: have I found favor in your eyes
  alternatives:
  - have I found favor with you
  - have I found grace in your sight
  lexicon: HALOT
  rationale: The Hebrew idiom literally means finding favor in someone's eyes. Retaining
    'in your eyes' preserves the source-text imagery while remaining understandable.
    'Favor' fits the social context better than the more theologically loaded 'grace.'
- source_word: לְהַכִּירֵנִי
  chosen: that you should take notice of me
  alternatives:
  - that you should recognize me
  - that you should regard me
  - that you should acknowledge me
  lexicon: HALOT
  rationale: The Hiphil of נכר here means to take notice of, recognize, or regard.
    In context Ruth is marveling that Boaz has paid attention to her favorably. 'Take
    notice of me' best captures the practical sense in idiomatic English.
- source_word: וְאָנֹכִי
  chosen: though I am
  alternatives:
  - when I am
  - and I am
  lexicon: HALOT
  rationale: 'The conjunction with the independent pronoun marks a concessive contrast
    in context: despite her status, Boaz has shown favor. ''Though I am'' expresses
    that contrast naturally in English.'
- source_word: נָכְרִיָּה
  chosen: a foreign woman
  alternatives:
  - a foreigner
  - an outsider
  - an alien
  lexicon: HALOT
  rationale: The feminine singular adjective/noun refers to a foreign woman. 'Foreigner'
    is possible, but 'foreign woman' preserves the feminine form present in the Hebrew
    and fits the gender-accurate translation philosophy.
