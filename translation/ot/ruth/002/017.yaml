id: RUT.2.17
reference: Ruth 2:17
source:
  edition: WLC
  text: וַ/תְּלַקֵּ֥ט בַּ/שָּׂדֶ֖ה עַד הָ/עָ֑רֶב וַ/תַּחְבֹּט֙ אֵ֣ת אֲשֶׁר לִקֵּ֔טָה
    וַ/יְהִ֖י כְּ/אֵיפָ֥ה שְׂעֹרִֽים־־׃
translation:
  text: So she gleaned in the field until evening, and beat out what she had gleaned,
    and it was about an ephah of barley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: An ephah was an ancient dry measure, roughly 20–22 liters (about half a
      bushel).
    reason: cultural_note
lexical_decisions:
- source_word: וַתְּלַקֵּט
  chosen: So she gleaned
  alternatives:
  - And she gleaned
  - She gathered leftovers
  lexicon: HALOT
  rationale: לקט in Ruth specifically refers to gleaning leftover grain after the
    reapers. 'Gleaned' preserves the legal-agricultural sense better than a generic
    'gathered.' 'So' reflects the narrative waw in smooth English.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the farmland
  lexicon: HALOT
  rationale: שָׂדֶה is the ordinary term for a field. The singular with article is
    naturally rendered 'the field,' referring to the field where Ruth was working.
- source_word: עַד הָעָרֶב
  chosen: until evening
  alternatives:
  - until the evening
  - until dusk
  lexicon: HALOT
  rationale: This marks the time span of her labor. 'Until evening' is idiomatic modern
    English and adequately reflects the Hebrew.
- source_word: וַתַּחְבֹּט
  chosen: beat out
  alternatives:
  - threshed
  - beat
  lexicon: HALOT
  rationale: חבט here refers to beating the gathered stalks to separate the grain.
    'Beat out' is more precise and less industrial-sounding than 'threshed,' while
    still natural in English.
- source_word: אֵת אֲשֶׁר לִקֵּטָה
  chosen: what she had gleaned
  alternatives:
  - that which she had gathered
  lexicon: HALOT
  rationale: The relative construction refers to the produce Ruth collected. Repeating
    'gleaned' maintains lexical consistency with לקט in the verse.
- source_word: וַיְהִי
  chosen: and it was
  alternatives:
  - and there was
  - and it came to be
  lexicon: HALOT
  rationale: A simple existential/resultative clause follows, giving the amount obtained.
    'And it was' is the most straightforward rendering in context.
- source_word: כְּאֵיפָה
  chosen: about an ephah
  alternatives:
  - about a bushel
  - nearly an ephah
  lexicon: HALOT
  rationale: אֵיפָה is an ancient dry measure. The prefixed כ indicates approximation
    ('about/as much as'). The unit is best transliterated as 'ephah' to preserve the
    historical measure; a modern equivalent can be supplied in a footnote.
- source_word: שְׂעֹרִים
  chosen: of barley
  alternatives:
  - of barley grain
  lexicon: HALOT
  rationale: The harvested grain is barley. 'Of barley' is concise and natural after
    the measure phrase.
