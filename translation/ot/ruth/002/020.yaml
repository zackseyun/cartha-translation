id: RUT.2.20
reference: Ruth 2:20
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר נָעֳמִ֜י לְ/כַלָּתָ֗/הּ בָּר֥וּךְ הוּא֙ לַ/יהוָ֔ה אֲשֶׁר֙ לֹא
    עָזַ֣ב חַסְדּ֔/וֹ אֶת הַ/חַיִּ֖ים וְ/אֶת הַ/מֵּתִ֑ים וַ/תֹּ֧אמֶר לָ֣/הּ נָעֳמִ֗י
    קָר֥וֹב לָ֨/נוּ֙ הָ/אִ֔ישׁ מִֽ/גֹּאֲלֵ֖/נוּ הֽוּא־־־׃
translation:
  text: Naomi said to her daughter-in-law, “May he be blessed by the LORD, whose kindness
    has not forsaken the living or the dead.” Then Naomi said to her, “The man is
    a close relative of ours; he is one of our redeemers.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'May he be blessed by the LORD, who has not forsaken his kindness toward
      the living and the dead,' with 'his kindness' understood as Boaz's kindness
      rather than the LORD's.
    reason: alternative_reading
  - marker: b
    text: Or 'one of our kinsman-redeemers.' The Hebrew refers to a near relative
      with a recognized duty or right to redeem a family member or property.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ הוּא לַיהוָה
  chosen: May he be blessed by the LORD
  alternatives:
  - Blessed be he of the LORD
  - He is blessed by the LORD
  lexicon: HALOT
  rationale: The verbless blessing formula can be rendered as a wish/pronouncement
    in English. 'By the LORD' best captures the lamed with the divine name here as
    the source of blessing. This avoids the awkward traditional 'of the LORD' while
    preserving the blessing sense.
- source_word: חַסְדּוֹ
  chosen: his kindness
  alternatives:
  - his covenant loyalty
  - his steadfast love
  lexicon: HALOT
  rationale: חֶסֶד carries a range including kindness, loyal love, and covenant faithfulness.
    Here the referent of the pronoun is debated, and the immediate context is interpersonal
    benevolence shown through Boaz under God's providence. 'Kindness' is natural English
    and fits Ruth's recurring theme, while alternatives remain viable.
- source_word: לֹא עָזַב
  chosen: has not forsaken
  alternatives:
  - has not abandoned
  - has not ceased showing
  lexicon: HALOT
  rationale: The verb עזב commonly means 'leave, forsake, abandon.' 'Has not forsaken'
    preserves the relational force and works idiomatically with חֶסֶד.
- source_word: אֶת הַחַיִּים וְאֶת הַמֵּתִים
  chosen: the living or the dead
  alternatives:
  - the living and the dead
  lexicon: HALOT
  rationale: Hebrew uses waw straightforwardly as 'and,' but in English after a negated
    verb, 'has not forsaken the living or the dead' is idiomatic and preserves the
    totality of the statement without changing the sense.
- source_word: קָרוֹב לָנוּ
  chosen: a close relative of ours
  alternatives:
  - near to us
  - closely related to us
  lexicon: HALOT
  rationale: The adjective קָרוֹב here denotes kinship proximity, not spatial nearness.
    'A close relative of ours' expresses the familial sense clearly in modern English.
- source_word: מִגֹּאֲלֵנוּ
  chosen: one of our redeemers
  alternatives:
  - one of our kinsman-redeemers
  - one of those who have the right to redeem us
  lexicon: HALOT
  rationale: The participial form from גאל refers to a family redeemer figure within
    Israelite kinship law. 'Redeemers' is the main-text choice because it translates
    the term rather than preserving traditional jargon; 'kinsman-redeemers' is preserved
    as an alternative because it makes the familial-legal nuance explicit.
