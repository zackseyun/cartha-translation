theological_decisions:
- issue: Referent of the pronouns in the blessing clause (whether Naomi blesses Boaz,
    and whether 'whose kindness' refers to Boaz or to the LORD)
  chosen_reading: Naomi blesses Boaz ('May he be blessed by the LORD'), and 'whose
    kindness has not forsaken...' refers to the LORD.
  alternative_readings:
  - Naomi blesses Boaz, and 'whose kindness' refers to Boaz
  - The blessing is directed more generally without resolving the pronoun referent
  rationale: The immediate syntax most naturally takes 'he' as Boaz, the man just
    discussed, while the relative clause can attach to 'the LORD' as the nearer and
    theologically weighty antecedent in the blessing formula. This reading also fits
    the book's emphasis on divine kindness working through human agents. Because the
    Hebrew permits debate, the alternative is preserved in a footnote rather than
    erased.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
