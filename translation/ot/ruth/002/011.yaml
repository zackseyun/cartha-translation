id: RUT.2.11
reference: Ruth 2:11
source:
  edition: WLC
  text: וַ/יַּ֤עַן בֹּ֨עַז֙ וַ/יֹּ֣אמֶר לָ֔/הּ הֻגֵּ֨ד הֻגַּ֜ד לִ֗/י כֹּ֤ל אֲשֶׁר
    עָשִׂית֙ אֶת חֲמוֹתֵ֔/ךְ אַחֲרֵ֖י מ֣וֹת אִישֵׁ֑/ךְ וַ/תַּֽעַזְבִ֞י אָּבִ֣י/ךְ
    וְ/אִמֵּ֗/ךְ וְ/אֶ֨רֶץ֙ מֽוֹלַדְתֵּ֔/ךְ וַ/תֵּ֣לְכִ֔י אֶל עַ֕ם אֲשֶׁ֥ר לֹא יָדַ֖עַתְּ
    תְּמ֥וֹל שִׁלְשֽׁוֹם־־־־׃
translation:
  text: Then Boaz answered and said to her, “I have been fully told all that you have
    done for your mother-in-law after the death of your husband, and how you left
    your father and your mother and the land of your birth, and went to a people whom
    you did not know before.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “whom you did not know yesterday or the day before.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הֻגֵּד הֻגַּד לִי
  chosen: I have been fully told
  alternatives:
  - it has surely been reported to me
  - I have been carefully informed
  lexicon: HALOT
  rationale: 'The infinitive absolute plus finite Hophal of נגד intensifies the passive
    idea: Boaz emphasizes that the report reached him thoroughly/certainly. ''I have
    been fully told'' preserves the passive and the intensification in natural English.'
- source_word: כֹּל אֲשֶׁר עָשִׂית
  chosen: all that you have done
  alternatives:
  - everything that you did
  lexicon: HALOT
  rationale: A straightforward rendering of the totalizing כֹּל with the relative
    clause. Present perfect in English fits the relevance of Ruth's past actions to
    the present conversation.
- source_word: אֶת חֲמוֹתֵךְ
  chosen: for your mother-in-law
  alternatives:
  - to your mother-in-law
  lexicon: HALOT
  rationale: Although אֶת marks the object, English idiom with 'do' in this context
    is better expressed as 'do for' someone, bringing out benefactive force implied
    by context without over-paraphrasing.
- source_word: אַחֲרֵי מוֹת אִישֵׁךְ
  chosen: after the death of your husband
  alternatives:
  - after your husband died
  lexicon: HALOT
  rationale: The construct phrase is formally nominal; 'after the death of your husband'
    preserves that form and solemn tone.
- source_word: וַתַּעַזְבִי
  chosen: you left
  alternatives:
  - you forsook
  lexicon: HALOT
  rationale: '''Left'' is the most natural modern English equivalent here. ''Forsook''
    is possible but sounds archaic and overly loaded for this narrative context.'
- source_word: אָּבִיךְ וְאִמֵּךְ
  chosen: your father and your mother
  alternatives:
  - your parents
  lexicon: HALOT
  rationale: The Hebrew names each parent individually; the translation preserves
    that specificity rather than compressing to 'parents'.
- source_word: וְאֶרֶץ מוֹלַדְתֵּךְ
  chosen: the land of your birth
  alternatives:
  - your native land
  - the land of your kindred
  lexicon: HALOT
  rationale: מוֹלֶדֶת can denote birthplace/native land. 'The land of your birth'
    closely follows the Hebrew while remaining clear in modern English.
- source_word: וַתֵּלְכִי אֶל עַם
  chosen: and went to a people
  alternatives:
  - and came to a people
  lexicon: HALOT
  rationale: הלך is 'go/walk.' 'Went to a people' preserves the movement from Ruth's
    perspective and the Hebrew verb choice better than 'came,' which would shift perspective
    toward Boaz/Israel.
- source_word: עַם
  chosen: a people
  alternatives:
  - a nation
  lexicon: HALOT
  rationale: עַם commonly means 'people' in the sense of an ethnic/community group.
    'Nation' is possible but sounds more political than the context requires.
- source_word: אֲשֶׁר לֹא יָדַעַתְּ
  chosen: whom you did not know
  alternatives:
  - that you had not known
  lexicon: HALOT
  rationale: Because the antecedent is personal ('a people'), 'whom' is appropriate
    English. The verb ידע here denotes personal familiarity, not mere factual knowledge.
- source_word: תְּמוֹל שִׁלְשׁוֹם
  chosen: before
  alternatives:
  - yesterday or the day before
  - formerly
  lexicon: HALOT
  rationale: The idiom literally means 'yesterday, the day before,' expressing recent
    prior time and, by extension, previous unfamiliarity. In smooth English after
    'did not know,' 'before' captures the sense without awkwardness; the more literal
    alternative is preserved in a footnote.
