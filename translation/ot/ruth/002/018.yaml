id: RUT.2.18
reference: Ruth 2:18
source:
  edition: WLC
  text: וַ/תִּשָּׂא֙ וַ/תָּב֣וֹא הָ/עִ֔יר וַ/תֵּ֥רֶא חֲמוֹתָ֖/הּ אֵ֣ת אֲשֶׁר לִקֵּ֑טָה
    וַ/תּוֹצֵא֙ וַ/תִּתֶּן לָ֔/הּ אֵ֥ת אֲשֶׁר הוֹתִ֖רָה מִ/שָּׂבְעָֽ/הּ־־־׃
translation:
  text: She picked it up and went into the city, and her mother-in-law saw what she
    had gleaned. Then she brought out and gave to her what she had left over after
    she was satisfied.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after she had eaten her fill.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשָּׂא
  chosen: She picked it up
  alternatives:
  - She carried it
  - She lifted it
  lexicon: HALOT
  rationale: The verb נשׂא literally means 'lift/carry.' In context Ruth is taking
    up the grain she gleaned to bring it home, so 'picked it up' is natural modern
    English while preserving the physical action.
- source_word: הָעִיר
  chosen: the city
  alternatives:
  - the town
  lexicon: HALOT
  rationale: עִיר commonly means 'city.' Although Bethlehem may be thought of as a
    small town, 'city' is the direct lexical equivalent and fits the narrative setting.
- source_word: חֲמוֹתָהּ
  chosen: her mother-in-law
  lexicon: HALOT
  rationale: Standard rendering of the kinship term; the suffix identifies Naomi as
    Ruth's mother-in-law.
- source_word: אֵת אֲשֶׁר לִקֵּטָה
  chosen: what she had gleaned
  alternatives:
  - what she gathered
  lexicon: HALOT
  rationale: לקט in Ruth is a key term for gleaning behind harvesters. 'Gleaned' preserves
    the specific agricultural and legal background better than the more general 'gathered.'
- source_word: וַתּוֹצֵא
  chosen: she brought out
  alternatives:
  - she took out
  lexicon: HALOT
  rationale: The verb יצא in the Hiphil means 'bring out' or 'take out.' Here Ruth
    produces food from what she had kept, so 'brought out' fits the scene smoothly.
- source_word: וַתִּתֶּן לָהּ
  chosen: gave to her
  alternatives:
  - gave her
  lexicon: HALOT
  rationale: The Hebrew explicitly marks the indirect object with לָהּ. English idiom
    allows either form; the translation keeps the sense straightforwardly.
- source_word: אֵת אֲשֶׁר הוֹתִרָה
  chosen: what she had left over
  alternatives:
  - what remained
  - what she had reserved
  lexicon: HALOT
  rationale: הותירה from יתר means to leave over or have remaining. The context is
    the food Ruth saved from her meal, so 'what she had left over' is the clearest
    idiomatic rendering.
- source_word: מִשָּׂבְעָהּ
  chosen: after she was satisfied
  alternatives:
  - from her fullness
  - after she had eaten her fill
  lexicon: HALOT
  rationale: The noun שׂבע with prefixed מִן conveys the state or point of being satisfied/full.
    In context it refers to Ruth saving part of her meal after eating enough, so 'after
    she was satisfied' communicates the sense naturally without overparaphrase.
