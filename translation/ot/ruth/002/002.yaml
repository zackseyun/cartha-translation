id: RUT.2.2
reference: Ruth 2:2
source:
  edition: WLC
  text: וַ/תֹּאמֶר֩ ר֨וּת הַ/מּוֹאֲבִיָּ֜ה אֶֽל נָעֳמִ֗י אֵֽלְכָה נָּ֤א הַ/שָּׂדֶה֙
    וַ/אֲלַקֳטָּ֣ה בַ/שִׁבֳּלִ֔ים אַחַ֕ר אֲשֶׁ֥ר אֶמְצָא חֵ֖ן בְּ/עֵינָ֑י/ו וַ/תֹּ֥אמֶר
    לָ֖/הּ לְכִ֥י בִתִּֽ/י־־־׃
translation:
  text: And Ruth the Moabite said to Naomi, “Please let me go to the field and glean
    among the ears of grain after the one in whose eyes I find favor.” And she said
    to her, “Go, my daughter.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “and glean among the heads of grain.”
    reason: lexical_alternative
  - marker: b
    text: Literally “after whom I find favor in his eyes,” a Hebrew idiom for receiving
      someone's favorable regard.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמּוֹאֲבִיָּה
  chosen: the Moabite
  alternatives:
  - the woman from Moab
  - the Moabitess
  lexicon: HALOT
  rationale: A gentilic identifying Ruth by ethnic origin. 'The Moabite' is natural
    modern English and preserves the narrative emphasis on her foreign identity without
    the archaic or potentially pejorative feel of 'Moabitess'.
- source_word: אֵלְכָה נָּא
  chosen: Please let me go
  alternatives:
  - Let me go, please
  - I will go, please
  lexicon: HALOT
  rationale: The cohortative with נָא expresses a polite request rather than mere
    future action. 'Please let me go' captures both volition and deference toward
    Naomi.
- source_word: הַשָּׂדֶה
  chosen: the field
  alternatives:
  - the countryside
  - the farmland
  lexicon: HALOT
  rationale: The singular with article is best rendered straightforwardly as 'the
    field,' referring to the agricultural area where gleaning would occur.
- source_word: וַאֲלַקֳטָּה
  chosen: and glean
  alternatives:
  - and gather
  - and pick up leftovers
  lexicon: HALOT
  rationale: לקט in this context refers specifically to gleaning leftover produce
    after harvesters. 'Glean' preserves the legal-social background of provision for
    the poor and foreigner better than a generic 'gather'.
- source_word: בַשִּׁבֳּלִים
  chosen: among the ears of grain
  alternatives:
  - among the stalks
  - among the sheaves
  lexicon: HALOT
  rationale: שִׁבֳּלִים refers to ears/heads of grain, not bound sheaves. 'Among the
    ears of grain' is slightly interpretive but accurately communicates the agricultural
    image in idiomatic English.
- source_word: אַחַר אֲשֶׁר אֶמְצָא חֵן בְּעֵינָיו
  chosen: after the one in whose eyes I find favor
  alternatives:
  - behind whoever shows me favor
  - after him in whose sight I find grace
  lexicon: HALOT
  rationale: The idiom literally involves finding favor in someone's eyes. The 3ms
    suffix points to an indefinite singular male landowner/overseer in context. This
    rendering preserves the Hebrew idiom while making the referent explicit enough
    in English.
- source_word: חֵן
  chosen: favor
  alternatives:
  - grace
  lexicon: HALOT
  rationale: In this social setting חֵן denotes favorable regard or acceptance. 'Favor'
    is the most natural contextual rendering; 'grace' is possible but sounds more
    theological than the immediate context requires.
- source_word: לְכִי בִתִּי
  chosen: Go, my daughter
  alternatives:
  - Go ahead, my daughter
  - Go, daughter of mine
  lexicon: HALOT
  rationale: A simple imperative plus affectionate familial address. 'My daughter'
    preserves Naomi's warm, relational speech and is idiomatic English.
