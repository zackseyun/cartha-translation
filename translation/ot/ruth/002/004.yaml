id: RUT.2.4
reference: Ruth 2:4
source:
  edition: WLC
  text: וְ/הִנֵּה בֹ֗עַז בָּ֚א מִ/בֵּ֣ית לֶ֔חֶם וַ/יֹּ֥אמֶר לַ/קּוֹצְרִ֖ים יְהוָ֣ה עִמָּ/כֶ֑ם וַ/יֹּ֥אמְרוּ ל֖/וֹ יְבָרֶכְ/ךָ֥ יְהוָֽה־׃
translation:
  text: And behold, Boaz came from Bethlehem and said to the reapers, “Yahweh be with you.” And they said to him, “May Yahweh bless you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH with you''—a greeting/blessing idiom, rendered ''The LORD be with you.'''
    reason: lexical_alternative
  - marker: b
    text: Or, 'The LORD bless you.' The Hebrew form expresses a wish or blessing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - Now look
  lexicon: HALOT
  rationale: Introduces the scene with a vivid deictic particle. 'And look' preserves the narrative immediacy more naturally than archaic 'behold' while still reflecting the Hebrew discourse marker.
- source_word: בֹּעַז
  chosen: Boaz
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: בָּא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Simple qatal of בוא in narrative context; 'came' is the most direct and idiomatic rendering.
- source_word: מִבֵּית לֶחֶם
  chosen: from Bethlehem
  alternatives:
  - from Beth-lehem
  rationale: Place name is rendered by standard English transliteration; the preposition מִן is translated straightforwardly as 'from'.
- source_word: לַקֹּצְרִים
  chosen: to the reapers
  alternatives:
  - to the harvesters
  lexicon: HALOT
  rationale: From קצר 'to reap'; 'reapers' is concise, natural, and fits the agricultural setting. 'Harvesters' is possible but slightly less direct.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עִמָּכֶם
  chosen: be with you
  alternatives:
  - is with you
  lexicon: HALOT
  rationale: Although the verbless clause is literally 'YHWH with you,' in greeting/blessing context English idiom supplies 'be' to convey the benedictory force rather than a mere statement.
- source_word: יְבָרֶכְךָ
  chosen: May the LORD bless you
  alternatives:
  - The LORD bless you
  lexicon: HALOT
  rationale: The imperfect/jussive-like form in direct speech expresses a wish or blessing. 'May the LORD bless you' makes the volitive force explicit in natural English.
