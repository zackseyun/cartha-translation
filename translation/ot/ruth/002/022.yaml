id: RUT.2.22
reference: Ruth 2:22
source:
  edition: WLC
  text: וַ/תֹּ֥אמֶר נָעֳמִ֖י אֶל ר֣וּת כַּלָּתָ֑/הּ ט֣וֹב בִּתִּ֗/י כִּ֤י תֵֽצְאִי֙
    עִם נַ֣עֲרוֹתָ֔י/ו וְ/לֹ֥א יִפְגְּעוּ בָ֖/ךְ בְּ/שָׂדֶ֥ה אַחֵֽר־־־׃
translation:
  text: Then Naomi said to Ruth her daughter-in-law, “It is good, my daughter, that
    you go out with his young women, so that they do not come upon you in another
    field.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that they do not bother/assault you in another field.' The Hebrew
      verb can denote an encounter that is merely meeting or one that is harmful;
      the context of Naomi's concern for Ruth's safety suggests a negative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: כַּלָּתָהּ
  chosen: her daughter-in-law
  lexicon: HALOT
  rationale: The construct with 3fs suffix explicitly identifies Ruth's relationship
    to Naomi; 'daughter-in-law' is the direct and standard sense.
- source_word: טוֹב
  chosen: It is good
  alternatives:
  - Good
  - It is best
  lexicon: HALOT
  rationale: Predicative adjective expressing Naomi's evaluation. 'It is good' preserves
    the simple Hebrew assessment without over-interpreting it as a superlative.
- source_word: בִּתִּי
  chosen: my daughter
  lexicon: HALOT
  rationale: A term of familial affection and social relationship, not literal maternity
    here. 'My daughter' is the conventional and accurate rendering.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what Naomi judges good: ''that you
    go out...'' This fits the syntax better than a causal ''because'' in English.'
- source_word: תֵצְאִי
  chosen: you go out
  alternatives:
  - you go
  - you go gleaning
  lexicon: HALOT
  rationale: The verb is simply 'go out.' Adding 'gleaning' would import context not
    stated in the verb itself.
- source_word: נַעֲרוֹתָיו
  chosen: his young women
  alternatives:
  - his servant girls
  - his maidens
  lexicon: HALOT
  rationale: The feminine plural refers to Boaz's female workers. 'Young women' is
    natural modern English and avoids archaic 'maidens'; 'servant girls' may over-specify
    status.
- source_word: וְלֹא יִפְגְּעוּ בָךְ
  chosen: so that they do not come upon you
  alternatives:
  - and they do not meet you
  - so that they do not assault you
  - so that no one bothers you
  lexicon: HALOT
  rationale: פגע can mean meet, encounter, or in context hostile encounter. Given
    Naomi's concern for Ruth's safety in another field, 'come upon you' preserves
    the warning without making the threat more explicit than the Hebrew does.
- source_word: בְּשָׂדֶה אַחֵר
  chosen: in another field
  alternatives:
  - in a different field
  lexicon: HALOT
  rationale: A straightforward locative phrase; 'another field' is idiomatic and precise.
