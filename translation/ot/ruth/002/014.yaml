id: RUT.2.14
reference: Ruth 2:14
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ לָ֨/ה בֹ֜עַז לְ/עֵ֣ת הָ/אֹ֗כֶל גֹּ֤שִֽׁי הֲלֹם֙ וְ/אָכַ֣לְתְּ
    מִן הַ/לֶּ֔חֶם וְ/טָבַ֥לְתְּ פִּתֵּ֖/ךְ בַּ/חֹ֑מֶץ וַ/תֵּ֨שֶׁב֙ מִ/צַּ֣ד הַ/קּֽוֹצְרִ֔ים
    וַ/יִּצְבָּט לָ֣/הּ קָלִ֔י וַ/תֹּ֥אכַל וַ/תִּשְׂבַּ֖ע וַ/תֹּתַֽר־־׃
translation:
  text: At mealtime Boaz said to her, “Come here and eat some bread, and dip your
    piece in the sour wine.” So she sat beside the reapers, and he passed her roasted
    grain. She ate and was satisfied, and she had some left over.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “dip your morsel in the vinegar.” The Hebrew חֹמֶץ can denote vinegar
      or a sour wine drink; in this agricultural meal context, a sour wine is likely
      intended.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֵת הָאֹכֶל
  chosen: At mealtime
  alternatives:
  - At the time of eating
  - At the meal
  lexicon: HALOT
  rationale: The phrase is idiomatic for the time when the workers ate. 'At mealtime'
    is natural modern English while preserving the temporal sense.
- source_word: גֹּשִׁי הֲלֹם
  chosen: Come here
  alternatives:
  - Come near here
  - Approach here
  lexicon: HALOT
  rationale: The imperative plus adverb indicates physical approach. 'Come here' is
    concise and idiomatic without losing the direct invitation.
- source_word: וְאָכַלְתְּ מִן הַלֶּחֶם
  chosen: eat some bread
  alternatives:
  - eat from the bread
  - eat of the bread
  lexicon: HALOT
  rationale: מִן with food commonly has a partitive sense. 'Eat some bread' communicates
    that nuance in natural English.
- source_word: וְטָבַלְתְּ פִּתֵּךְ בַּחֹמֶץ
  chosen: dip your piece in the sour wine
  alternatives:
  - dip your morsel in the vinegar
  - dip your bread in the vinegar
  lexicon: HALOT
  rationale: פַּת can mean a piece or morsel of bread; 'your piece' keeps the object
    slightly broader than explicitly 'bread' while fitting the meal context. חֹמֶץ
    in this setting likely refers to a sour wine or vinegar drink used by laborers.
    'Sour wine' best conveys the probable ancient referent; 'vinegar' is preserved
    in a footnote as a lexical alternative.
- source_word: מִצַּד הַקּוֹצְרִים
  chosen: beside the reapers
  alternatives:
  - at the side of the reapers
  - next to the harvesters
  lexicon: HALOT
  rationale: מִצַּד denotes position at the side of. 'Beside the reapers' is clear
    and preserves the agricultural setting.
- source_word: וַיִּצְבָּט לָהּ קָלִי
  chosen: he passed her roasted grain
  alternatives:
  - he handed her roasted grain
  - he served her parched grain
  lexicon: HALOT
  rationale: The verb is uncommon and contextually suggests reaching out or handing
    food to her. 'Passed her' fits table-meal context naturally. קָלִי refers to roasted/parched
    grain; 'roasted grain' is accessible modern English.
- source_word: וַתִּשְׂבַּע
  chosen: was satisfied
  alternatives:
  - ate her fill
  - was full
  lexicon: HALOT
  rationale: The verb denotes being sated. 'Was satisfied' is idiomatic and preserves
    the sense of having enough to eat.
- source_word: וַתֹּתַר
  chosen: she had some left over
  alternatives:
  - she left some over
  - there was food left over
  lexicon: HALOT
  rationale: The verb means to remain over or be left. Given the feminine singular
    subject chain, the sense is that after eating she still had food remaining. 'She
    had some left over' makes the implied object explicit in English.
