theological_decisions:
- issue: Narrative expression of apparent chance in relation to providence
  chosen_reading: 'Render the idiom in ordinary terms of apparent happenstance: ''she
    happened to come'''
  alternative_readings:
  - Render more literally as 'her chance chanced upon'
  - Render more interpretively to foreground providence
  rationale: The Hebrew presents events from the level of human observation using
    an idiom of chance, while the broader book invites readers to perceive divine
    providence. To preserve theological tension rather than resolve it, the main text
    keeps the language of apparent chance and does not import an explicit statement
    about providence.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
