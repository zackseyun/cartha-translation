id: RUT.2.3
reference: Ruth 2:3
source:
  edition: WLC
  text: וַ/תֵּ֤לֶךְ וַ/תָּבוֹא֙ וַ/תְּלַקֵּ֣ט בַּ/שָּׂדֶ֔ה אַחֲרֵ֖י הַ/קֹּצְרִ֑ים
    וַ/יִּ֣קֶר מִקְרֶ֔/הָ חֶלְקַ֤ת הַ/שָּׂדֶה֙ לְ/בֹ֔עַז אֲשֶׁ֖ר מִ/מִּשְׁפַּ֥חַת
    אֱלִימֶֽלֶךְ׃
translation:
  text: So she went and came and gleaned in the field behind the reapers, and she
    happened to come to the portion of the field belonging to Boaz, who was from the
    family of Elimelech.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and her chance happened''—an idiom expressing apparent chance
      from a human perspective; the book''s wider narrative also invites the reader
      to see providence at work.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶךְ
  chosen: she went
  alternatives:
  - she departed
  lexicon: HALOT
  rationale: Basic narrative motion verb הלך. 'She went' is the most natural modern
    English rendering and preserves the sequential Hebrew wayyiqtol narration.
- source_word: וַתָּבוֹא
  chosen: and came
  alternatives:
  - and arrived
  lexicon: HALOT
  rationale: בוא following 'went' creates a vivid step-by-step narrative sequence.
    'And came' preserves the Hebrew rhythm better than smoothing to a single English
    verb.
- source_word: וַתְּלַקֵּט
  chosen: and gleaned
  alternatives:
  - and gathered leftover grain
  lexicon: HALOT
  rationale: לקט in this agricultural context specifically refers to gleaning after
    harvesters. 'Gleaned' is the precise and established English term.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in a field
  lexicon: HALOT
  rationale: The article is present in Hebrew, but in context it functions naturally
    in English as 'the field,' referring to the field area where harvesting was underway
    rather than introducing a specific previously identified field by name.
- source_word: אַחֲרֵי הַקֹּצְרִים
  chosen: behind the reapers
  alternatives:
  - after the harvesters
  lexicon: HALOT
  rationale: 'אַחֲרֵי here is spatial in the gleaning context: Ruth follows behind
    those cutting grain. ''Reapers'' is idiomatic and agriculturally precise.'
- source_word: וַיִּקֶר מִקְרֶהָ
  chosen: she happened to come
  alternatives:
  - her chance chanced
  - it happened by chance to her
  - her lot fell
  lexicon: HALOT
  rationale: This idiom combines the verb קרה with the cognate noun מקרה plus suffix,
    emphasizing apparent happenstance from the human perspective. 'She happened to
    come' communicates the sense in readable English without wooden awkwardness, while
    preserving the narrative irony.
- source_word: חֶלְקַת הַשָּׂדֶה
  chosen: to the portion of the field
  alternatives:
  - to a part of the field
  - to the plot of the field
  lexicon: HALOT
  rationale: חלקה denotes a parcel or portion of land. 'Portion of the field' is clear
    and suitably formal without sounding technical.
- source_word: לְבֹעַז
  chosen: belonging to Boaz
  alternatives:
  - of Boaz
  - that was Boaz's
  lexicon: HALOT
  rationale: The lamed here marks possession/association with the field portion. 'Belonging
    to Boaz' makes the relationship explicit in natural English.
- source_word: אֲשֶׁר מִמִּשְׁפַּחַת אֱלִימֶלֶךְ
  chosen: who was from the family of Elimelech
  alternatives:
  - who was of the clan of Elimelech
  - who belonged to Elimelech's family
  lexicon: HALOT
  rationale: מִשְׁפָּחָה refers to family/clan grouping. 'Family' is the broadest
    accessible rendering; 'clan' is possible but may sound anthropological or overly
    technical in modern English.
