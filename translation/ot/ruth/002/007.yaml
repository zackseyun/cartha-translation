id: RUT.2.7
reference: Ruth 2:7
source:
  edition: WLC
  text: וַ/תֹּ֗אמֶר אֲלַקֳטָה נָּא֙ וְ/אָסַפְתִּ֣י בָֽ/עֳמָרִ֔ים אַחֲרֵ֖י הַ/קּוֹצְרִ֑ים
    וַ/תָּב֣וֹא וַֽ/תַּעֲמ֗וֹד מֵ/אָ֤ז הַ/בֹּ֨קֶר֙ וְ/עַד עַ֔תָּה זֶ֛ה שִׁבְתָּ֥/הּ
    הַ/בַּ֖יִת מְעָֽט־־׃
translation:
  text: She said, ‘Please let me glean and gather among the sheaves after the reapers.’
    So she came and has remained from morning until now, except that she sat in the
    house a little.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “She has rested in the shelter only a little.” The Hebrew of the final
      clause is difficult; 'house' may refer to a worker’s shelter.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲלַקֳטָה
  chosen: let me glean
  alternatives:
  - may I glean
  - please let me pick up
  lexicon: HALOT
  rationale: The cohortative expresses request/desire. 'Glean' is the established
    and precise agricultural term in this context, better than a generic 'pick up.'
- source_word: נָּא
  chosen: please
  alternatives:
  - I pray
  - kindly
  lexicon: HALOT
  rationale: Polite particle marking Ruth's respectful request; modern English 'please'
    conveys this naturally.
- source_word: וְאָסַפְתִּי
  chosen: and gather
  alternatives:
  - and collect
  - and glean
  lexicon: HALOT
  rationale: Keeps a distinction from לקט. The verb suggests collecting what is gleaned,
    likely into gathered amounts, so 'gather' is preferable to repeating 'glean.'
- source_word: בָעֳמָרִים
  chosen: among the sheaves
  alternatives:
  - among the bundles
  - between the sheaves
  lexicon: HALOT
  rationale: עמרים are bound stalks/sheaves. 'Among the sheaves' is idiomatic and
    fits the scene of following the reapers.
- source_word: אַחֲרֵי הַקּוֹצְרִים
  chosen: after the reapers
  alternatives:
  - behind the reapers
  lexicon: HALOT
  rationale: Spatial sense is primary; 'after the reapers' is natural English and
    preserves the sequence/location of gleaning behind workers.
- source_word: וַתָּבֹא וַתַּעֲמוֹד
  chosen: So she came and has remained
  alternatives:
  - Then she came and stood
  - She came and stayed
  lexicon: HALOT
  rationale: Although literally 'came and stood,' in context the overseer is summarizing
    her continued presence and labor. English 'has remained' captures the durative
    force implied by the following time expression better than a wooden 'stood.'
- source_word: מֵאָז הַבֹּקֶר וְעַד עַתָּה
  chosen: from morning until now
  alternatives:
  - since morning until now
  - from early morning until now
  lexicon: HALOT
  rationale: Conveys uninterrupted duration from the start of the workday to the present
    report.
- source_word: זֶה שִׁבְתָּהּ הַבַּיִת מְעָט
  chosen: except that she sat in the house a little
  alternatives:
  - this her sitting in the house was little
  - she has rested in the shelter only a little
  lexicon: HALOT
  rationale: This clause is difficult. The most likely sense is that her time in the
    house/shelter has been minimal. 'Except that she sat in the house a little' preserves
    the Hebrew imagery while making the sense intelligible. Because 'house' may denote
    a field shelter and the syntax is compressed, an alternative is preserved in a
    footnote.
