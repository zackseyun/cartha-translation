theological_decisions:
- issue: Rendering of גאל in the Ruth legal-family context
  chosen_reading: redeem / redeemer language retained in the main text
  alternative_readings:
  - act as kinsman-redeemer
  - perform the duty of a family redeemer
  rationale: The Hebrew verb גאל carries legal-family obligations that are central to Ruth. Retaining 'redeem' preserves the thematic and theological resonance of redemption without importing a narrower doctrinal claim. Because modern readers may miss the kinship nuance, an explanatory footnote preserves the fuller sense.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
