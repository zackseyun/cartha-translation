id: RUT.3.13
reference: Ruth 3:13
source:
  edition: WLC
  text: לִ֣ינִי הַ/לַּ֗יְלָה וְ/הָיָ֤ה בַ/בֹּ֨קֶר֙ אִם יִגְאָלֵ֥/ךְ טוֹב֙ יִגְאָ֔ל וְ/אִם לֹ֨א יַחְפֹּ֧ץ לְ/גָֽאֳלֵ֛/ךְ וּ/גְאַלְתִּ֥י/ךְ אָנֹ֖כִי חַי יְהוָ֑ה שִׁכְבִ֖י עַד הַ/בֹּֽקֶר׀־־־־׃
translation:
  text: Stay here tonight, and in the morning, if he will redeem you, good—let him redeem you. But if he does not desire to redeem you, then I myself will redeem you, as Yahweh lives. Lie down until the morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'redeem' here refers to the role of a family redeemer, often called a 'kinsman-redeemer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִינִי
  chosen: Stay here
  alternatives:
  - Lodge here
  - Remain
  lexicon: HALOT
  rationale: The verb לון means to lodge or spend the night. 'Stay here' is natural modern English and fits the immediate context of remaining through the night without sounding archaic.
- source_word: הַלַּיְלָה
  chosen: tonight
  alternatives:
  - this night
  - the night
  lexicon: HALOT
  rationale: With the imperative לִינִי, the phrase is idiomatically rendered 'tonight' in English rather than the more wooden 'the night.'
- source_word: וְהָיָה בַבֹּקֶר
  chosen: and in the morning
  alternatives:
  - and it shall be in the morning
  - when morning comes
  lexicon: HALOT
  rationale: This clause introduces what will happen next morning. 'And in the morning' preserves the sequence while remaining readable.
- source_word: אִם יִגְאָלֵךְ
  chosen: if he will redeem you
  alternatives:
  - if he acts as kinsman-redeemer for you
  - if he reclaims you
  lexicon: HALOT
  rationale: The verb גאל refers to redemption in a family-legal sense in Ruth. 'Redeem' keeps the key term consistent and allows the legal-theological nuance to remain, while a fuller explanatory alternative is preserved in a footnote.
- source_word: טוֹב
  chosen: good
  alternatives:
  - well
  - all right
  lexicon: HALOT
  rationale: Here טוֹב functions elliptically as approval of that outcome. 'Good' is concise and reflects the Hebrew's brevity.
- source_word: יִגְאָל
  chosen: let him redeem you
  alternatives:
  - he may redeem you
  - he shall redeem you
  lexicon: HALOT
  rationale: 'After the elliptical ''good,'' the sense is permissive/approving: if the nearer redeemer will do it, that is acceptable. ''Let him redeem you'' captures that force in idiomatic English.'
- source_word: לֹא יַחְפֹּץ
  chosen: does not desire
  alternatives:
  - is not willing
  - does not want
  lexicon: HALOT
  rationale: חפץ denotes taking pleasure in, desiring, or being willing. 'Does not desire' is slightly more formal and preserves the volitional nuance without overinterpreting.
- source_word: לְגָאֳלֵךְ
  chosen: to redeem you
  alternatives:
  - to act as redeemer for you
  lexicon: HALOT
  rationale: Maintains consistency with גאל elsewhere in the verse. The fuller legal nuance is important but can be preserved in a footnote rather than expanded in the main text.
- source_word: וּגְאַלְתִּיךְ אָנֹכִי
  chosen: then I myself will redeem you
  alternatives:
  - I will redeem you
  - I myself will act as redeemer for you
  lexicon: HALOT
  rationale: אָנֹכִי adds emphasis, so 'I myself' brings out Boaz's personal commitment. 'Then' clarifies the contrast with the previous clause.
- source_word: חַי יְהוָה
  chosen: as the LORD lives
  alternatives:
  - by the life of the LORD
  - the LORD lives
  lexicon: HALOT
  rationale: This is a standard oath formula. 'As the LORD lives' is the conventional and accurate English equivalent. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שִׁכְבִי
  chosen: Lie down
  alternatives:
  - Lie here
  - Remain lying down
  lexicon: HALOT
  rationale: The imperative from שכב means to lie down. 'Lie down' is direct and natural; adding 'here' would slightly over-specify what is implicit in context.
- source_word: עַד הַבֹּקֶר
  chosen: until the morning
  alternatives:
  - until morning
  lexicon: HALOT
  rationale: Both are possible; 'until the morning' mirrors the Hebrew article and balances the earlier 'in the morning' phrasing.
