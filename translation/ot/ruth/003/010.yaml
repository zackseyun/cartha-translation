theological_decisions:
- issue: Rendering of חֶסֶד in a narrative commendation
  chosen_reading: kindness
  alternative_readings:
  - steadfast love
  - loyalty
  - covenant faithfulness
  rationale: The verse praises Ruth's concrete, loyal action in seeking family redemption rather than romantic or economic advantage. 'Kindness' communicates the narrative sense in readable English without denying the deeper covenantal overtones of חֶסֶד, which are preserved in documentation and footnote.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Rendering of יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
