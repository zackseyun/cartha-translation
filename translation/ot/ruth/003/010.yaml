id: RUT.3.10
reference: Ruth 3:10
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר בְּרוּכָ֨ה אַ֤תְּ לַֽ/יהוָה֙ בִּתִּ֔/י הֵיטַ֛בְתְּ חַסְדֵּ֥/ךְ הָ/אַחֲר֖וֹן מִן הָ/רִאשׁ֑וֹן לְ/בִלְתִּי לֶ֗כֶת אַחֲרֵי֙ הַ/בַּ֣חוּרִ֔ים אִם דַּ֖ל וְ/אִם עָשִֽׁיר־־־־׃
translation:
  text: And he said, “May you be blessed by Yahweh, my daughter. You have made this last kindness greater than the first by not going after the young men, whether poor or rich.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'steadfast love,' 'loyalty,' or 'covenant faithfulness' for 'kindness' (חֶסֶד).
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרוּכָה אַתְּ לַיהוָה
  chosen: May you be blessed by the LORD
  alternatives:
  - Blessed are you of the LORD
  - You are blessed by the LORD
  lexicon: HALOT
  rationale: בְּרוּכָה functions predicatively in a blessing formula. Rendering with 'May you be blessed' captures the benedictory force in natural English. יְהוָה follows the project default 'the LORD'.
- source_word: בִּתִּי
  chosen: my daughter
  alternatives:
  - my child
  lexicon: HALOT
  rationale: Literal and idiomatic in context as an affectionate, socially senior-to-junior address from Boaz to Ruth; 'my daughter' preserves the familial metaphor and age/social nuance better than the more generic 'my child'.
- source_word: הֵיטַבְתְּ
  chosen: You have made ... greater
  alternatives:
  - You have done better
  - You have shown ... better
  lexicon: HALOT
  rationale: The Hiphil of יטב here compares Ruth's present act with an earlier one. In English, 'made this last kindness greater' expresses the comparative sense more clearly than a wooden 'done better'.
- source_word: חַסְדֵּךְ
  chosen: kindness
  alternatives:
  - steadfast love
  - loyalty
  - covenant faithfulness
  lexicon: HALOT
  rationale: חֶסֶד is a rich term involving loyal, generous kindness. Here Boaz praises Ruth's concrete relational loyalty toward Naomi's family line. 'Kindness' is the most natural main-text rendering in this narrative context, while the richer alternatives remain viable lexically.
- source_word: הָאַחֲרוֹן מִן הָרִאשׁוֹן
  chosen: this last ... than the first
  alternatives:
  - the latter ... than the former
  - your later ... than your earlier
  lexicon: HALOT
  rationale: A comparative construction contrasting Ruth's present act with her earlier kindness. 'This last ... than the first' is clear, idiomatic, and preserves the temporal comparison.
- source_word: לְבִלְתִּי לֶכֶת אַחֲרֵי
  chosen: by not going after
  alternatives:
  - in that you did not go after
  - because you did not pursue
  lexicon: HALOT
  rationale: The infinitive construction explains how her latter kindness is greater. 'By not going after' preserves the explanatory force and the idiom of pursuing a marital option.
- source_word: הַבַּחוּרִים
  chosen: the young men
  alternatives:
  - the younger men
  lexicon: HALOT
  rationale: Refers to eligible younger males in the marriage context. 'Young men' is idiomatic and sufficient; 'younger men' is possible but slightly over-specifies the comparison to Boaz.
- source_word: אִם דַּל וְאִם עָשִׁיר
  chosen: whether poor or rich
  alternatives:
  - whether lowly or wealthy
  lexicon: HALOT
  rationale: A merism covering all socioeconomic possibilities among the young men Ruth might have pursued. 'Poor or rich' is direct and natural.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
