id: RUT.4.8
reference: Ruth 4:8
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר הַ/גֹּאֵ֛ל לְ/בֹ֖עַז קְנֵה לָ֑/ךְ וַ/יִּשְׁלֹ֖ף נַעֲלֽ/וֹ־׃
translation:
  text: So the redeemer said to Boaz, “Buy it for yourself,” and he took off his sandal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the kinsman-redeemer.” The Hebrew term refers to a near relative with
      legal responsibility to redeem family property or lineage.
    reason: lexical_alternative
  - marker: b
    text: Removing the sandal functioned as a customary legal sign in this transaction;
      compare Ruth 4:7.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: So ... said
  alternatives:
  - And ... said
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' gives natural English
    narrative flow while preserving the sequential sense.
- source_word: הַגֹּאֵל
  chosen: the redeemer
  alternatives:
  - the kinsman-redeemer
  - the guardian-redeemer
  lexicon: HALOT
  rationale: גאל in Ruth refers to the family member with redemption obligations.
    'Redeemer' is concise and accurate in context; 'kinsman-redeemer' is traditional
    but more interpretive and less natural in modern English.
- source_word: לְבֹעַז
  chosen: to Boaz
  rationale: Standard rendering of the preposition plus proper name; names are transliterated
    per project philosophy.
- source_word: קְנֵה
  chosen: Buy
  alternatives:
  - Acquire
  - Purchase
  lexicon: HALOT
  rationale: Imperative of קנה. 'Buy' is the most direct and idiomatic English equivalent
    in this legal-transaction context.
- source_word: לָךְ
  chosen: for yourself
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition with pronominal suffix is naturally reflexive here in
    English, indicating Boaz is to take the purchase on himself.
- source_word: וַיִּשְׁלֹף
  chosen: and he took off
  alternatives:
  - and he drew off
  - and he pulled off
  lexicon: HALOT
  rationale: The verb means to draw out/remove. In context of footwear, 'took off'
    is the clearest idiomatic English rendering.
- source_word: נַעֲלוֹ
  chosen: his sandal
  alternatives:
  - his shoe
  lexicon: HALOT
  rationale: The Hebrew denotes a sandal/footwear item in an ancient Near Eastern
    setting. 'Sandal' is more culturally precise than 'shoe'.
