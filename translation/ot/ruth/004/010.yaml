theological_decisions:
- issue: Nature of Boaz's action toward Ruth in a legal-redemptive context
  chosen_reading: Use 'I have acquired for myself as a wife' with explicit marital
    purpose and inheritance-restoration language
  alternative_readings:
  - I have bought Ruth as my wife
  - I have taken Ruth as my wife
  rationale: The verse uses transactional language (קנה) within the framework of redemption,
    inheritance, and raising up the dead man's name. The chosen wording preserves
    the legal force without overstating commodification or softening the text into
    mere romance.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering אֶחָיו
  chosen_reading: his brothers
  alternative_readings:
  - his relatives
  - his kinsmen
  rationale: Following the gender-accurate principle, the masculine plural is retained
    in English. While broader kinship may be implied contextually, the source text
    specifically says 'brothers.'
  doctrine_reference: Translation philosophy §4
