id: RUT.4.10
reference: Ruth 4:10
source:
  edition: WLC
  text: וְ/גַ֣ם אֶת ר֣וּת הַ/מֹּאֲבִיָּה֩ אֵ֨שֶׁת מַחְל֜וֹן קָנִ֧יתִי לִ֣/י לְ/אִשָּׁ֗ה
    לְ/הָקִ֤ים שֵׁם הַ/מֵּת֙ עַל נַ֣חֲלָת֔/וֹ וְ/לֹא יִכָּרֵ֧ת שֵׁם הַ/מֵּ֛ת מֵ/עִ֥ם
    אֶחָ֖י/ו וּ/מִ/שַּׁ֣עַר מְקוֹמ֑/וֹ עֵדִ֥ים אַתֶּ֖ם הַ/יּֽוֹם־־־־־׃
translation:
  text: And also Ruth the Moabite, the wife of Mahlon, I have acquired for myself
    as a wife, to raise up the name of the dead man over his inheritance, so that
    the name of the dead man may not be cut off from among his brothers and from the
    gate of his place. You are witnesses today.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I have bought for myself.' The Hebrew verb can carry the sense of acquiring
      by purchase in a legal transaction.
    reason: lexical_alternative
  - marker: b
    text: That is, to preserve the deceased man's family line and legal standing in
      connection with his inherited property.
    reason: cultural_note
  - marker: c
    text: The 'gate' was the public place where legal matters were witnessed and settled.
    reason: cultural_note
lexical_decisions:
- source_word: וְגַם
  chosen: And also
  alternatives:
  - Also
  - Moreover
  lexicon: HALOT
  rationale: Conveys additive force linking this declaration to the preceding legal
    transaction. 'And also' preserves the formal connection and emphasis.
- source_word: ר֣וּת הַמֹּאֲבִיָּה
  chosen: Ruth the Moabite
  alternatives:
  - Ruth the Moabitess
  lexicon: HALOT
  rationale: Transliterates the personal name and renders the gentilic naturally in
    modern English. 'Moabite' is preferable to the archaic 'Moabitess.'
- source_word: אֵשֶׁת מַחְלוֹן
  chosen: the wife of Mahlon
  alternatives:
  - Mahlon's widow
  lexicon: HALOT
  rationale: Formally the construct means 'wife of Mahlon.' Although she is widowed
    in context, the Hebrew expression itself does not use the specific term for widow,
    so the more literal rendering is retained.
- source_word: קָנִיתִי לִי
  chosen: I have acquired for myself
  alternatives:
  - I have bought for myself
  - I have taken for myself
  lexicon: HALOT
  rationale: The verb קנה commonly means acquire/buy. In this legal-redemptive context,
    'acquired' preserves the transactional sense without implying Ruth is treated
    as a commodity in isolation from the levirate-restoration framework.
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - to be my wife
  - for a wife
  lexicon: HALOT
  rationale: Idiomatic English rendering of the Hebrew legal-marital phrase, preserving
    the purpose/result nuance.
- source_word: לְהָקִים שֵׁם הַמֵּת
  chosen: to raise up the name of the dead man
  alternatives:
  - to preserve the name of the dead
  - to establish the name of the deceased
  lexicon: HALOT
  rationale: Keeps the metaphor of 'raising up' and the covenant-legal importance
    of continuing a deceased man's line and standing.
- source_word: עַל נַחֲלָתוֹ
  chosen: over his inheritance
  alternatives:
  - upon his inheritance
  - for his inheritance
  lexicon: HALOT
  rationale: עַל here is best rendered 'over' in the sense of attaching the deceased's
    name to his hereditary property. This preserves the legal-land context.
- source_word: וְלֹא יִכָּרֵת
  chosen: so that ... may not be cut off
  alternatives:
  - and ... may not perish
  - and ... may not disappear
  lexicon: HALOT
  rationale: The Niphal of כרת is a standard covenant/legal expression for being cut
    off. Retaining 'cut off' preserves the idiom's gravity and biblical resonance.
- source_word: מֵעִם אֶחָיו
  chosen: from among his brothers
  alternatives:
  - from among his kinsmen
  - from among his relatives
  lexicon: HALOT
  rationale: The Hebrew literally says 'his brothers.' In this clan-legal setting
    it may extend beyond uterine brothers, but the translation follows the gender-accurate
    principle and keeps the literal term.
- source_word: וּמִשַּׁעַר מְקוֹמוֹ
  chosen: and from the gate of his place
  alternatives:
  - and from the gate of his hometown
  - and from his town gate
  lexicon: HALOT
  rationale: The gate is the place of public legal recognition. 'Gate of his place'
    is somewhat formal but preserves the Hebrew wording and social-legal setting better
    than a freer paraphrase.
- source_word: עֵדִים אַתֶּם הַיּוֹם
  chosen: You are witnesses today
  alternatives:
  - Today you are witnesses
  lexicon: HALOT
  rationale: Clear modern English preserving the formal legal declaration addressed
    to the assembled elders and people.
