id: RUT.4.12
reference: Ruth 4:12
source:
  edition: WLC
  text: וִ/יהִ֤י בֵֽיתְ/ךָ֙ כְּ/בֵ֣ית פֶּ֔רֶץ אֲשֶׁר יָלְדָ֥ה תָמָ֖ר לִֽ/יהוּדָ֑ה מִן הַ/זֶּ֗רַע אֲשֶׁ֨ר יִתֵּ֤ן יְהוָה֙ לְ/ךָ֔ מִן הַֽ/נַּעֲרָ֖ה הַ/זֹּֽאת־־־׃
translation:
  text: And may your house be like the house of Perez, whom Tamar bore to Judah, from the offspring that Yahweh will give you by this young woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the seed' (that is, 'from the offspring'). The Hebrew uses 'seed' as a common idiom for descendants.
    reason: lexical_alternative
  - marker: b
    text: '''House'' here means household or family line, not merely a physical dwelling.'
    reason: cultural_note
lexical_decisions:
- source_word: וִיהִי
  chosen: And may ... be
  alternatives:
  - and let ... be
  - and may it become
  lexicon: HALOT
  rationale: Jussive of היה expresses a blessing/wish. English optative 'may' best captures the performative blessing in natural modern English.
- source_word: בֵיתְךָ
  chosen: your house
  alternatives:
  - your household
  - your family
  lexicon: HALOT
  rationale: בַּיִת/בֵּית can denote house, household, or dynasty. In this blessing about descendants, 'house' preserves the Hebrew idiom and allows the familial/dynastic sense to remain implicit.
- source_word: כְּבֵית פֶּרֶץ
  chosen: like the house of Perez
  alternatives:
  - like Perez's house
  - like the family of Perez
  lexicon: HALOT
  rationale: Retains the Hebrew comparison and the idiomatic 'house of' construction, which in context refers to lineage/household.
- source_word: אֲשֶׁר יָלְדָה תָמָר לִיהוּדָה
  chosen: whom Tamar bore to Judah
  alternatives:
  - that Tamar gave birth to for Judah
  - whom Tamar bore for Judah
  lexicon: HALOT
  rationale: Directly reflects the relative clause and the childbirth verb ילד. 'To Judah' is the most natural English rendering of ל here in a genealogical context.
- source_word: מִן הַזֶּרַע
  chosen: because of the offspring
  alternatives:
  - from the seed
  - through the offspring
  - from the descendants
  lexicon: HALOT
  rationale: זֶרַע literally means 'seed' but commonly denotes offspring/descendants. Here the phrase explains the basis of the comparison/blessing. 'Because of the offspring' communicates the sense clearly in modern English while avoiding overly literal English that could sound opaque.
- source_word: אֲשֶׁר יִתֵּן יְהוָה לְךָ
  chosen: that the LORD will give you
  alternatives:
  - which the LORD will grant you
  - that the LORD may give you
  lexicon: HALOT
  rationale: נתן with future/imperfect here expresses expected divine gift in the blessing. 'Will give you' is the most straightforward rendering in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's mandated default rendering for the divine name.
- source_word: מִן הַנַּעֲרָה הַזֹּאת
  chosen: by this young woman
  alternatives:
  - through this young woman
  - from this young woman
  - by this woman
  lexicon: HALOT
  rationale: נַעֲרָה denotes a young woman. With childbearing context, English 'by this young woman' naturally expresses the maternal source of the offspring. 'Young woman' is more precise than the broader 'woman' and avoids the potentially misleading 'girl'.
