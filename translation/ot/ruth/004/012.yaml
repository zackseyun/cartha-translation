- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of בֵּית ('house') in a fertility/genealogical blessing
  chosen_reading: house
  alternative_readings:
  - household
  - family
  - dynasty
  rationale: The Hebrew idiom intentionally carries household and lineage overtones. Rendering it as 'house' preserves that theological and genealogical breadth without narrowing the sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
