id: RUT.4.14
reference: Ruth 4:14
source:
  edition: WLC
  text: וַ/תֹּאמַ֤רְנָה הַ/נָּשִׁים֙ אֶֽל נָעֳמִ֔י בָּר֣וּךְ יְהוָ֔ה אֲ֠שֶׁר לֹ֣א
    הִשְׁבִּ֥ית לָ֛/ךְ גֹּאֵ֖ל הַ/יּ֑וֹם וְ/יִקָּרֵ֥א שְׁמ֖/וֹ בְּ/יִשְׂרָאֵֽל־׃
translation:
  text: Then the women said to Naomi, “Blessed be the LORD, who has not left you without
    a redeemer today, and may his name be renowned in Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kinsman-redeemer' or 'guardian-redeemer,' highlighting the family-legal
      role of a close relative who acts to restore and protect a family line.
    reason: lexical_alternative
  - marker: b
    text: The 'redeemer' may refer specifically to the newborn child as Naomi's restorer,
      though some understand it more broadly in light of Boaz's role as redeemer in
      the chapter.
    reason: alternative_reading
  - marker: c
    text: Hebrew literally, 'may his name be called in Israel'; the expression means
      that his name will be known, invoked, or honored among Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמַרְנָה
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next event in narrative sequence. 'Then'
    gives natural English narrative flow while preserving the consecutive sense.
- source_word: הַנָּשִׁים
  chosen: the women
  lexicon: HALOT
  rationale: Definite plural noun; straightforwardly refers to the women of the community
    present in the scene.
- source_word: בָּרוּךְ יְהוָה
  chosen: Blessed be the LORD
  alternatives:
  - Blessed is the LORD
  - Praise be to the LORD
  lexicon: HALOT
  rationale: A conventional Hebrew blessing formula. 'Blessed be the LORD' preserves
    the benedictory form and addresses YHWH with the project's default rendering 'the
    LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: אֲשֶׁר לֹא הִשְׁבִּית לָךְ
  chosen: who has not left you without
  alternatives:
  - who has not ceased to provide for you
  - who has not withheld from you
  lexicon: HALOT
  rationale: The Hiphil of שבת here conveys causing to cease/lack. In context with
    גֹּאֵל, the idiomatic sense is that Naomi has not been left lacking a redeemer.
    This is clearer in English than a more wooden 'has not caused to cease for you.'
- source_word: גֹּאֵל
  chosen: redeemer
  alternatives:
  - kinsman-redeemer
  - guardian-redeemer
  lexicon: HALOT
  rationale: גֹּאֵל is a key covenant-legal family term in Ruth. 'Redeemer' is the
    most natural main-text rendering; more explicit kinship-oriented alternatives
    are possible, but the immediate context already supplies the family setting. The
    broader legal nuance is worth preserving in a footnote.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Temporal adverbial use. 'Today' is idiomatic modern English; 'this day'
    is more formal but not necessary here.
- source_word: וְיִקָּרֵא שְׁמוֹ
  chosen: and may his name be renowned
  alternatives:
  - and may his name be called
  - and let his name be proclaimed
  lexicon: HALOT
  rationale: Niphal of קרא with 'name' in this blessing context carries the sense
    of being invoked/known/proclaimed. 'May his name be renowned' communicates the
    idiomatic force in natural English rather than a misleadingly literal 'called.'
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  lexicon: HALOT
  rationale: Locative phrase indicating the sphere in which the child's name will
    be known and honored.
