theological_decisions:
- issue: Referent of 'redeemer' (גֹּאֵל)
  chosen_reading: The term is left as 'redeemer' without specifying in the main text
    whether it refers directly to the newborn child as Naomi's restorer or more broadly
    to Boaz's redemptive provision through the child.
  alternative_readings:
  - It refers specifically to Obed, the child just born.
  - It refers retrospectively to Boaz as the acting kinsman-redeemer.
  rationale: The immediate literary context after the birth announcement favors the
    child as the proximate referent, especially since the following clauses speak
    of 'his name.' Yet the book's legal-redemptive framework also keeps Boaz's role
    in view. The translation preserves the Hebrew's ambiguity rather than resolving
    it beyond what the text requires.
  doctrine_reference: Preserve theological tension rather than resolve it.
