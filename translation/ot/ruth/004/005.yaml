theological_decisions:
- issue: Text-critical/syntactic difficulty in the clause involving Ruth and קניתי
  chosen_reading: 'Render the sense as addressed to the nearer redeemer: acquiring
    the field entails also acquiring Ruth as part of the obligation to preserve the
    dead man''s name.'
  alternative_readings:
  - 'MT-style first person: ''I acquire Ruth the Moabite'''
  - Alternative construals that attach 'from Ruth' differently to the purchase clause
  rationale: The consonantal text and vocalization present a well-known difficulty,
    especially with קניתי ('I acquired'). But the narrative logic requires Boaz to
    be stating the obligation that would fall on the nearer redeemer if he redeems
    the field. Therefore the main text follows the contextual sense in readable English,
    while preserving the more literal MT-first-person reading in a footnote for auditability.
  doctrine_reference: 'Translation philosophy #1, #3, #5'
