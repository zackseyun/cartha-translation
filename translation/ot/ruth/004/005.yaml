id: RUT.4.5
reference: Ruth 4:5
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר בֹּ֔עַז בְּ/יוֹם קְנוֹתְ/ךָ֥ הַ/שָּׂדֶ֖ה מִ/יַּ֣ד נָעֳמִ֑י וּ֠/מֵ/אֵת
    ר֣וּת הַ/מּוֹאֲבִיָּ֤ה אֵֽשֶׁת הַ/מֵּת֙ קניתי לְ/הָקִ֥ים שֵׁם הַ/מֵּ֖ת עַל נַחֲלָתֽ/וֹ־־־־׃
translation:
  text: Then Boaz said, “On the day you acquire the field from the hand of Naomi,
    you also acquire Ruth the Moabite, the wife of the dead man, in order to raise
    up the name of the dead on his inheritance.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew text reads literally, 'I acquired' (or 'I have acquired') Ruth the
      Moabite; many understand the sense here as 'you also acquire' in context.
    reason: textual_variant
  - marker: b
    text: Or 'the dead man’s wife.'
    reason: lexical_alternative
  - marker: c
    text: That is, to preserve the deceased man’s family line and claim within his
      inherited property.
    reason: cultural_note
lexical_decisions:
- source_word: בְּיוֹם
  chosen: On the day
  alternatives:
  - When
  lexicon: HALOT
  rationale: A formally close temporal expression that remains natural in English.
    'When' is possible, but 'On the day' preserves the Hebrew idiom and the legal-transaction
    setting.
- source_word: קְנוֹתְךָ
  chosen: you acquire
  alternatives:
  - you buy
  - you purchase
  lexicon: HALOT
  rationale: From קנה, here in a property-redemption context. 'Acquire' is broad enough
    to cover legal possession without sounding overly commercial, and it fits both
    the field and the associated obligation regarding Ruth.
- source_word: הַשָּׂדֶה
  chosen: the field
  alternatives:
  - the land
  lexicon: HALOT
  rationale: The immediate referent in context is a specific parcel under discussion.
    'Field' is the more direct lexical match; 'land' would be broader and less precise.
- source_word: מִיַּד נָעֳמִי
  chosen: from the hand of Naomi
  alternatives:
  - from Naomi
  lexicon: HALOT
  rationale: The Hebrew idiom 'from the hand of' denotes transfer from someone's control
    or possession. Retained in English because it is intelligible and preserves the
    legal flavor of the transaction.
- source_word: וּמֵאֵת רוּת הַמּוֹאֲבִיָּה
  chosen: you also acquire Ruth the Moabite
  alternatives:
  - and from Ruth the Moabite
  - you acquire also from Ruth the Moabite
  lexicon: HALOT
  rationale: The clause is syntactically difficult in the MT, and ancient versions
    reflect variation. The sense required by the context is that acquiring the field
    entails taking Ruth in levirate-like responsibility. Supplying 'also acquire'
    in English makes the legal implication explicit while staying close to the discourse
    flow.
- source_word: אֵשֶׁת הַמֵּת
  chosen: the wife of the dead man
  alternatives:
  - the widow of the dead man
  - the dead man's wife
  lexicon: HALOT
  rationale: Literally 'wife of the dead.' 'Widow' is interpretive; the Hebrew expression
    itself is preserved more directly by 'the wife of the dead man' or 'the dead man's
    wife.' The chosen wording is transparent and natural.
- source_word: קניתי
  chosen: you also acquire
  alternatives:
  - I acquire
  - I have acquired
  lexicon: HALOT
  rationale: The MT vocalization points to first person singular ('I acquired'), but
    the immediate context strongly favors second person sense addressed to the nearer
    redeemer, and many translations understand it that way, likely reflecting a textual
    or idiomatic issue. The main text adopts the contextual sense; the MT-first-person
    reading is preserved in a footnote as a textual variant.
- source_word: לְהָקִים שֵׁם
  chosen: in order to raise up the name
  alternatives:
  - to preserve the name
  - to establish the name
  lexicon: HALOT
  rationale: The idiom refers to perpetuating the deceased man's line and standing
    within Israel. 'Raise up the name' preserves the metaphor and legal-family resonance
    better than a flattened paraphrase.
- source_word: הַמֵּת
  chosen: the dead
  alternatives:
  - the deceased
  - the dead man
  lexicon: HALOT
  rationale: A direct rendering of the substantivized participle. In English, 'the
    dead' is concise and idiomatic here, though the surrounding phrase clarifies that
    a specific deceased man is meant.
- source_word: עַל נַחֲלָתוֹ
  chosen: on his inheritance
  alternatives:
  - over his inheritance
  - upon his inheritance
  - through his inheritance
  lexicon: HALOT
  rationale: The preposition עַל with 'inheritance' is somewhat idiomatic in this
    legal context. 'On his inheritance' is a close rendering that preserves the connection
    between the deceased man's name and his hereditary property.
