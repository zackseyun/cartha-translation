id: RUT.4.7
reference: Ruth 4:7
source:
  edition: WLC
  text: וְ/זֹאת֩ לְ/פָנִ֨ים בְּ/יִשְׂרָאֵ֜ל עַל הַ/גְּאוּלָּ֤ה וְ/עַל הַ/תְּמוּרָה֙
    לְ/קַיֵּ֣ם כָּל דָּבָ֔ר שָׁלַ֥ף אִ֛ישׁ נַעֲל֖/וֹ וְ/נָתַ֣ן לְ/רֵעֵ֑/הוּ וְ/זֹ֥את
    הַ/תְּעוּדָ֖ה בְּ/יִשְׂרָאֵֽל־־־׃
translation:
  text: 'Now this was formerly the custom in Israel concerning redemption and exchange,
    to confirm any matter: a man removed his sandal and gave it to his neighbor, and
    this was the attestation in Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in former times.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to confirm every transaction.'
    reason: lexical_alternative
  - marker: c
    text: Or 'this was the testimony in Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְפָנִים
  chosen: formerly
  alternatives:
  - in former times
  - previously
  lexicon: HALOT
  rationale: The phrase וְזֹאת לְפָנִים introduces an explanatory note about an earlier
    custom. 'Formerly' is concise, natural English and preserves the temporal sense
    without sounding archaic.
- source_word: הַגְּאוּלָּה
  chosen: redemption
  alternatives:
  - right of redemption
  - purchase back
  lexicon: HALOT
  rationale: גְּאוּלָּה refers to redemption/repurchase within kinship-law context.
    'Redemption' is the most direct rendering and fits the legal setting of Ruth 4.
- source_word: הַתְּמוּרָה
  chosen: exchange
  alternatives:
  - transfer
  - barter
  lexicon: HALOT
  rationale: תְּמוּרָה denotes an exchange or substitution. 'Exchange' best matches
    the plain lexical sense in this legal-custom explanation, without over-specifying
    the exact legal mechanism.
- source_word: לְקַיֵּם כָּל דָּבָר
  chosen: to confirm any matter
  alternatives:
  - to confirm every transaction
  - to ratify any matter
  lexicon: HALOT
  rationale: The infinitive לְקַיֵּם means to establish/confirm, and כָּל דָּבָר is
    broad ('any matter/thing'). 'To confirm any matter' preserves the general legal
    force while remaining readable. 'Ratify' is possible but slightly more technical
    than the Hebrew requires.
- source_word: שָׁלַף
  chosen: removed
  alternatives:
  - drew off
  - pulled off
  - took off
  lexicon: HALOT
  rationale: שָׁלַף literally means to draw out/remove. With sandal as object, 'removed'
    is idiomatic modern English and avoids the awkwardness of 'drew off' while preserving
    the concrete action.
- source_word: נַעֲלוֹ
  chosen: his sandal
  alternatives:
  - his shoe
  lexicon: HALOT
  rationale: נַעַל is footwear, and in biblical-cultural context 'sandal' is the most
    accurate and natural rendering.
- source_word: לְרֵעֵהוּ
  chosen: to his neighbor
  alternatives:
  - to the other man
  - to his companion
  lexicon: HALOT
  rationale: רֵעַ commonly means neighbor/associate/companion. 'To his neighbor' is
    a straightforward rendering, though in context it refers to the other party in
    the transaction. The more interpretive 'the other man' was avoided in the main
    text to stay closer to the Hebrew.
- source_word: הַתְּעוּדָה
  chosen: the attestation
  alternatives:
  - the testimony
  - the legal confirmation
  - the witness
  lexicon: HALOT
  rationale: תְּעוּדָה here refers to the formal validating token or testimony of
    the transaction. 'Attestation' best captures the legal-evidentiary sense in concise
    English. 'Testimony' is possible but can sound verbal rather than procedural.
