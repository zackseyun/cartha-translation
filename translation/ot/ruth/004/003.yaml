id: RUT.4.3
reference: Ruth 4:3
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ לַ/גֹּאֵ֔ל חֶלְקַת֙ הַ/שָּׂדֶ֔ה אֲשֶׁ֥ר לְ/אָחִ֖י/נוּ לֶ/אֱלִימֶ֑לֶךְ
    מָכְרָ֣ה נָעֳמִ֔י הַ/שָּׁ֖בָה מִ/שְּׂדֵ֥ה מוֹאָֽב׃
translation:
  text: Then he said to the redeemer, “Naomi, who has returned from the fields of
    Moab, is selling the portion of the field that belonged to our brother Elimelech.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the parcel of land.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “from the fields of Moab,” an idiom for the land or countryside of
      Moab.
    reason: cultural_note
  - marker: c
    text: Or “has sold”; the Hebrew form can be understood as a completed action,
      but here it is rendered as a present within the ongoing legal discussion.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then he said' gives natural
    modern English while preserving sequential force.
- source_word: לַגֹּאֵל
  chosen: to the redeemer
  alternatives:
  - to the kinsman-redeemer
  - to the next of kin
  lexicon: HALOT
  rationale: גֹּאֵל denotes the family redeemer with legal responsibility. 'Redeemer'
    is concise and accurate in context; 'kinsman-redeemer' is interpretive and more
    traditional, but the kinship aspect is already clear from the narrative.
- source_word: חֶלְקַת הַשָּׂדֶה
  chosen: the portion of the field
  alternatives:
  - the parcel of land
  - the piece of the field
  lexicon: HALOT
  rationale: חֶלְקָה refers to a portion or parcel. 'Portion of the field' stays close
    to the Hebrew while remaining idiomatic.
- source_word: אֲשֶׁר לְאָחִינוּ לֶאֱלִימֶלֶךְ
  chosen: that belonged to our brother Elimelech
  alternatives:
  - which was our brother Elimelech's
  - that was for our brother Elimelech
  lexicon: HALOT
  rationale: The lamed construction expresses possession/association. 'Belonged to'
    makes the possessive sense explicit in natural English. 'Our brother' reflects
    kinship language without implying literal siblinghood only.
- source_word: מָכְרָה
  chosen: is selling
  alternatives:
  - has sold
  - sold
  lexicon: HALOT
  rationale: The perfect can be rendered as a present in context, especially in reported
    legal negotiation where the transaction is being presented as current. 'Is selling'
    fits the scene better than a simple past and avoids implying the matter is already
    fully concluded.
- source_word: נָעֳמִי
  chosen: Naomi
  rationale: Standard English transliteration of the personal name.
- source_word: הַשָּׁבָה
  chosen: who has returned
  alternatives:
  - who returned
  - the one returning
  lexicon: HALOT
  rationale: The participial/adjectival form identifies Naomi as the one who returned.
    'Who has returned' is natural English and preserves the completed relevance of
    her return.
- source_word: מִשְּׂדֵה מוֹאָב
  chosen: from the fields of Moab
  alternatives:
  - from the country of Moab
  - from the territory of Moab
  lexicon: HALOT
  rationale: The Hebrew literally says 'from the field/fields of Moab,' an idiom for
    the land or countryside of Moab. 'Fields of Moab' preserves the concrete Hebrew
    imagery better than the more generalized 'country of Moab'.
