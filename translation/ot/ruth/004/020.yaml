id: RUT.4.20
reference: Ruth 4:20
source:
  edition: WLC
  text: וְ/עַמִּֽינָדָב֙ הוֹלִ֣יד אֶת נַחְשׁ֔וֹן וְ/נַחְשׁ֖וֹן הוֹלִ֥יד אֶת שַׂלְמָֽה־־׃
translation:
  text: Amminadab fathered Nahshon, and Nahshon fathered Salmah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Salmah; some English translations use 'Salmon' in harmony with parallel
      genealogies.
    reason: alternative_reading
lexical_decisions:
- source_word: עַמִּינָדָב
  chosen: Amminadab
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogical contexts commonly means 'to father'
    or 'beget.' 'Fathered' is clear, natural modern English and preserves the male
    genealogical sense better than the archaic 'begot.'
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent lexical meaning in English;
    its function is represented by English word order.
- source_word: נַחְשׁוֹן
  chosen: Nahshon
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: וְ
  chosen: and
  alternatives:
  - then
  lexicon: HALOT
  rationale: Simple conjunction linking the next genealogical clause. 'And' is the
    most direct and formally appropriate rendering.
- source_word: שַׂלְמָה
  chosen: Salmah
  alternatives:
  - Salmon
  lexicon: HALOT
  rationale: The Hebrew form here is שַׂלְמָה, which is most directly represented
    as 'Salmah.' 'Salmon' reflects a different traditional form known from some genealogical
    parallels and English Bible tradition, but the source text here supports 'Salmah'.
