id: RUT.4.16
reference: Ruth 4:16
source:
  edition: WLC
  text: וַ/תִּקַּ֨ח נָעֳמִ֤י אֶת הַ/יֶּ֨לֶד֙ וַ/תְּשִׁתֵ֣/הוּ בְ/חֵיקָ֔/הּ וַ/תְּהִי
    ל֖/וֹ לְ/אֹמֶֽנֶת־־׃
translation:
  text: Then Naomi took the child and laid him in her lap, and she became his nurse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'foster mother' or 'caretaker'; the Hebrew term refers to a woman who
      nurses, raises, or cares for a child, not a medical nurse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקַּח
  chosen: took
  alternatives:
  - received
  lexicon: HALOT
  rationale: The verb לקח in the waw-consecutive narrative sequence is straightforwardly
    'took.' 'Received' is possible in some contexts, but here the physical action
    with the child favors 'took.'
- source_word: הַיֶּלֶד
  chosen: the child
  alternatives:
  - the boy
  lexicon: HALOT
  rationale: יֶלֶד can mean 'child' or 'boy.' Since the focus is on Naomi's caregiving
    relation to a newborn/infant in context, 'child' is more natural and age-appropriate
    in English.
- source_word: וַתְּשִׁתֵהוּ
  chosen: laid him
  alternatives:
  - set him
  - placed him
  lexicon: HALOT
  rationale: From שׂים/שׁית, the sense is to put or place. 'Laid him' fits idiomatic
    English for placing a baby on one's body and matches the tenderness of the scene
    without adding interpretation.
- source_word: בְחֵיקָהּ
  chosen: in her lap
  alternatives:
  - in her bosom
  - at her breast
  lexicon: HALOT
  rationale: חֵיק literally refers to the bosom/lap area. 'In her lap' is clear, natural
    modern English and conveys the physical image without archaic tone. 'Bosom' is
    more literal but less natural for contemporary readers.
- source_word: וַתְּהִי לוֹ
  chosen: she became his
  alternatives:
  - she was to him
  lexicon: HALOT
  rationale: The היה + ל construction here marks a resulting role or relationship.
    'Became his' captures the narrative development more naturally than the more wooden
    'was to him.'
- source_word: לְאֹמֶנֶת
  chosen: nurse
  alternatives:
  - foster mother
  - caretaker
  - guardian
  lexicon: HALOT
  rationale: אֹמֶנֶת denotes a woman who cares for and rears a child, often a nurse
    or foster-mother. 'Nurse' is concise and traditional, but here it is intended
    in the older sense of child-rearer rather than a medical professional. Because
    modern readers may hear 'nurse' medically, an explanatory footnote preserves the
    fuller nuance.
