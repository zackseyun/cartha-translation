id: RUT.4.11
reference: Ruth 4:11
source:
  edition: WLC
  text: וַ/יֹּ֨אמְר֜וּ כָּל הָ/עָ֧ם אֲשֶׁר בַּ/שַּׁ֛עַר וְ/הַ/זְּקֵנִ֖ים עֵדִ֑ים יִתֵּן֩
    יְהוָ֨ה אֶֽת הָ/אִשָּׁ֜ה הַ/בָּאָ֣ה אֶל בֵּיתֶ֗/ךָ כְּ/רָחֵ֤ל וּ/כְ/לֵאָה֙ אֲשֶׁ֨ר
    בָּנ֤וּ שְׁתֵּי/הֶם֙ אֶת בֵּ֣ית יִשְׂרָאֵ֔ל וַ/עֲשֵׂה חַ֣יִל בְּ/אֶפְרָ֔תָה וּ/קְרָא
    שֵׁ֖ם בְּ/בֵ֥ית לָֽחֶם־־־־׀־־־׃
translation:
  text: Then all the people who were at the gate, and the elders, said, “We are witnesses.
    May the LORD make the woman who is coming into your house like Rachel and Leah,
    who together built up the house of Israel. And may you prosper in Ephrathah and
    make a name in Bethlehem.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do valiantly' or 'show worth'; the Hebrew expression can denote valor,
      strength, wealth, or prosperous success.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵדִים
  chosen: We are witnesses
  alternatives:
  - witnesses
  - as witnesses
  lexicon: HALOT
  rationale: Although the Hebrew is nominal ('witnesses'), in English the speech formula
    is most natural and clear as 'We are witnesses,' making explicit the implied copula
    in direct discourse.
- source_word: יִתֵּן יְהוָה
  chosen: May the LORD make
  alternatives:
  - May the LORD give
  - The LORD will make
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in this blessing formula with a direct
    object and comparison ('make the woman ... like Rachel and Leah'), 'make' communicates
    the idiomatic sense better in English while preserving the optative/jussive force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md,
    preserving Jewish reverence tradition and established English convention.
- source_word: הָאִשָּׁה הַבָּאָה אֶל בֵּיתֶךָ
  chosen: the woman who is coming into your house
  alternatives:
  - the woman entering your house
  - the wife who is coming into your household
  lexicon: HALOT
  rationale: Keeps the participial sense of ongoing/imminent entrance and the concrete
    image of entering the household through marriage. 'House' is retained rather than
    generalized to 'family,' though the familial sense is present.
- source_word: כְּרָחֵל וּכְלֵאָה
  chosen: like Rachel and Leah
  alternatives:
  - as Rachel and Leah
  lexicon: HALOT
  rationale: Standard comparative rendering. Names are transliterated per project
    policy.
- source_word: אֲשֶׁר בָּנוּ שְׁתֵּיהֶם אֶת בֵּית יִשְׂרָאֵל
  chosen: who together built up the house of Israel
  alternatives:
  - who both built the house of Israel
  - who built the house of Israel, the two of them
  lexicon: HALOT
  rationale: בנה with 'house' can denote establishing a family line or nation. 'Built
    up' preserves the metaphor while sounding natural in English. 'Together' renders
    שְׁתֵּיהֶם idiomatically.
- source_word: וַעֲשֵׂה חַיִל
  chosen: may you prosper
  alternatives:
  - do valiantly
  - acquire wealth
  - show worth
  lexicon: HALOT
  rationale: חיל has a broad semantic range including strength, valor, wealth, and
    excellence. In this marriage blessing tied to social standing and flourishing,
    'may you prosper' best captures the likely sense in context, while alternatives
    are preserved because the phrase can also imply honorable achievement.
- source_word: בְּאֶפְרָתָה
  chosen: in Ephrathah
  alternatives:
  - in Ephrath
  - at Ephrathah
  lexicon: HALOT
  rationale: Retains the place name as given in the Hebrew. Ephrathah is associated
    with the Bethlehem region; transliteration preserves the local and literary texture.
- source_word: וּקְרָא שֵׁם
  chosen: make a name
  alternatives:
  - proclaim a name
  - be called by name
  - win renown
  lexicon: HALOT
  rationale: The idiom means to gain reputation or renown. 'Make a name' is a transparent
    English equivalent that preserves the Hebrew imagery.
- source_word: בְּבֵית לָחֶם
  chosen: in Bethlehem
  alternatives:
  - at Bethlehem
  lexicon: HALOT
  rationale: Standard rendering of the place name. 'In' fits the sense of local reputation
    within the town.
