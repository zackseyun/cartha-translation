id: RUT.4.18
reference: Ruth 4:18
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה֙ תּוֹלְד֣וֹת פָּ֔רֶץ פֶּ֖רֶץ הוֹלִ֥יד אֶת חֶצְרֽוֹן־׃
translation:
  text: 'Now these are the generations of Perez: Perez fathered Hezron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the descendants of Perez' or 'the family line of Perez.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: Now these
  alternatives:
  - And these
  - These
  lexicon: HALOT
  rationale: The conjunction ו plus demonstrative אֵלֶּה introduces a new section
    or formulaic statement. 'Now these' is natural modern English that still reflects
    the discourse-marking force of the Hebrew better than a bare 'These,' while avoiding
    overly wooden style.
- source_word: תּוֹלְדוֹת
  chosen: the generations
  alternatives:
  - the descendants
  - the family line
  - the genealogy
  lexicon: HALOT
  rationale: The noun often introduces a genealogical record or account of descendants.
    'Generations' preserves the formal, formulaic biblical expression and matches
    the source closely. Alternatives are possible in smoother English, but this verse
    clearly begins a genealogy, so the traditional-formal wording is appropriate.
- source_word: פָּרֶץ
  chosen: Perez
  alternatives:
  - Pharez
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy. 'Perez' is the standard modern English transliteration from Hebrew;
    'Pharez' reflects older Greek/English tradition rather than the Hebrew form.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogies commonly means 'fathered' or 'became
    the father of.' 'Fathered' is concise, natural modern English, and preserves the
    genealogical sense without archaic 'begot.'
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  lexicon: HALOT
  rationale: The particle marks the definite direct object in Hebrew and has no direct
    English equivalent, so it is not represented in translation.
- source_word: חֶצְרוֹן
  chosen: Hezron
  rationale: Personal name transliterated by standard English convention from Hebrew.
