theological_decisions:
- issue: Nature of Boaz's transaction
  chosen_reading: Render the legal transfer with 'acquired' rather than language that
    could imply purchase of persons.
  alternative_readings:
  - I have bought
  - I have purchased
  rationale: The verse concerns property/estate associated with Elimelech, Chilion,
    and Mahlon, received from Naomi's hand. 'Acquired' accurately reflects the legal
    setting without importing implications beyond the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not import
    doctrinal claims the text does not make.'
