id: RUT.4.9
reference: Ruth 4:9
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ בֹּ֨עַז לַ/זְּקֵנִ֜ים וְ/כָל הָ/עָ֗ם עֵדִ֤ים אַתֶּם֙ הַ/יּ֔וֹם
    כִּ֤י קָנִ֨יתִי֙ אֶת כָּל אֲשֶׁ֣ר לֶֽ/אֱלִימֶ֔לֶךְ וְ/אֵ֛ת כָּל אֲשֶׁ֥ר לְ/כִלְי֖וֹן
    וּ/מַחְל֑וֹן מִ/יַּ֖ד נָעֳמִֽי־־־־׃
translation:
  text: Then Boaz said to the elders and all the people, “You are witnesses today
    that I have acquired from the hand of Naomi all that belonged to Elimelech and
    all that belonged to Chilion and Mahlon.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I have bought” or “I have purchased”; the Hebrew verb can denote acquiring
      by purchase in a legal transaction.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “from the hand of Naomi,” an idiom for from Naomi’s possession
      or control.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence; 'And ... said' is more formally
    literal but less idiomatic.
- source_word: לַזְּקֵנִים וְכָל הָעָם
  chosen: to the elders and all the people
  alternatives:
  - to the elders and to all the people
  lexicon: HALOT
  rationale: Direct address is explicit. Repeating 'to' in English is unnecessary;
    the chosen rendering is natural and preserves both groups present at the legal
    transaction.
- source_word: עֵדִים אַתֶּם הַיּוֹם
  chosen: You are witnesses today
  alternatives:
  - You are witnesses this day
  - Today you are witnesses
  lexicon: HALOT
  rationale: Predicate-first Hebrew is rendered in clear English. 'Today' is modern
    and readable; 'this day' is more traditional but slightly archaic.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of the witness declaration rather than
    a causal clause. 'That' best fits English reported speech.
- source_word: קָנִיתִי
  chosen: I have acquired
  alternatives:
  - I have bought
  - I have purchased
  lexicon: HALOT
  rationale: The verb denotes acquisition in a legal/property context. 'Acquired'
    is broad enough to fit the transaction without over-specifying cash purchase,
    while still reflecting formal transfer of rights.
- source_word: אֶת כָּל אֲשֶׁר לֶאֱלִימֶלֶךְ
  chosen: all that belonged to Elimelech
  alternatives:
  - all that was Elimelech's
  - everything that belonged to Elimelech
  lexicon: HALOT
  rationale: The Hebrew literally says 'all that was to/for Elimelech,' an idiom for
    possession. 'Belonged to' expresses ownership naturally in English.
- source_word: וְאֵת כָּל אֲשֶׁר לְכִלְיוֹן וּמַחְלוֹן
  chosen: and all that belonged to Chilion and Mahlon
  alternatives:
  - and all that was Chilion's and Mahlon's
  - and everything that belonged to Chilion and Mahlon
  lexicon: HALOT
  rationale: Parallel with the previous phrase should be preserved. The singular 'all
    that belonged to' naturally governs both names in English.
- source_word: מִיַּד נָעֳמִי
  chosen: from the hand of Naomi
  alternatives:
  - from Naomi
  - out of Naomi's hand
  lexicon: HALOT
  rationale: The idiom means 'from the possession/control of Naomi.' Retaining 'from
    the hand of' preserves the legal and idiomatic flavor of the Hebrew while remaining
    understandable in English.
