id: RUT.4.21
reference: Ruth 4:21
source:
  edition: WLC
  text: וְ/שַׂלְמוֹן֙ הוֹלִ֣יד אֶת בֹּ֔עַז וּ/בֹ֖עַז הוֹלִ֥יד אֶת עוֹבֵֽד־־׃
translation:
  text: And Salmon fathered Boaz, and Boaz fathered Obed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "begot." The Hebrew verb is a standard genealogical term meaning "fathered"
      or "became the father of."
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/שַׂלְמוֹן
  chosen: And Salmon
  alternatives:
  - Now Salmon
  - Salmon
  lexicon: HALOT
  rationale: The conjunction וְ is rendered as "And" to preserve the genealogical
    sequence and the polysyndetic style of the Hebrew list. The proper name is transliterated
    as "Salmon" in keeping with the translation philosophy of transliterating personal
    names.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogical contexts means to beget or father.
    "Fathered" is concise, natural modern English and preserves the male genealogical
    sense better than the more archaic "begot."
- source_word: אֶת
  chosen: '[not translated]'
  lexicon: HALOT
  rationale: אֶת marks the definite direct object in Hebrew and normally has no direct
    English equivalent, so it is left untranslated.
- source_word: בֹּעַז
  chosen: Boaz
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: וּ/בֹעַז
  chosen: and Boaz
  alternatives:
  - Boaz
  lexicon: HALOT
  rationale: The prefixed conjunction is rendered explicitly as "and" to mirror the
    Hebrew coordination in the genealogy.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: Repeated with the same English gloss for consistency in the genealogy.
- source_word: עוֹבֵד
  chosen: Obed
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
