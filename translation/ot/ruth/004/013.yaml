id: RUT.4.13
reference: Ruth 4:13
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח בֹּ֤עַז אֶת רוּת֙ וַ/תְּהִי ל֣/וֹ לְ/אִשָּׁ֔ה וַ/יָּבֹ֖א אֵלֶ֑י/הָ וַ/יִּתֵּ֨ן יְהוָ֥ה לָ֛/הּ הֵרָי֖וֹן וַ/תֵּ֥לֶד בֵּֽן־־׃
translation:
  text: So Boaz took Ruth, and she became his wife. He went in to her, and Yahweh granted her conception, and she bore a son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the LORD gave her conception' or 'the LORD enabled her to conceive.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - married
  lexicon: HALOT
  rationale: The verb לקח literally means 'took.' In marriage contexts it can imply taking a woman as wife, but the following clause 'she became his wife' already makes the marital sense explicit, so 'took' preserves the Hebrew wording without redundancy.
- source_word: וַתְּהִי לוֹ לְאִשָּׁה
  chosen: she became his wife
  alternatives:
  - she became his woman
  - she was his wife
  lexicon: HALOT
  rationale: This idiom marks formal marital status. 'She became his wife' is natural English and preserves the sequential Hebrew narrative sense.
- source_word: וַיָּבֹא אֵלֶיהָ
  chosen: He went in to her
  alternatives:
  - he had relations with her
  - he came to her
  lexicon: HALOT
  rationale: This is a standard Hebrew euphemism for sexual union. 'Went in to her' preserves the idiomatic and modest register of the source better than a more explicit paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיִּתֵּן יְהוָה לָהּ הֵרָיוֹן
  chosen: the LORD granted her conception
  alternatives:
  - the LORD gave her conception
  - the LORD enabled her to conceive
  lexicon: HALOT
  rationale: הֵרָיוֹן denotes conception/pregnancy. 'Granted her conception' is idiomatic English that preserves the text's emphasis on the LORD as the giver of fertility without over-paraphrasing.
- source_word: וַתֵּלֶד בֵּן
  chosen: she bore a son
  alternatives:
  - she gave birth to a son
  lexicon: HALOT
  rationale: '''Bore a son'' is a concise, natural rendering of ילד + בן and matches the narrative register of the Hebrew.'
