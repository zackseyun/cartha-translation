- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Agency in Ruth's conception
  chosen_reading: the LORD granted her conception
  alternative_readings:
  - the LORD gave her pregnancy
  - the LORD enabled her to conceive
  rationale: The Hebrew explicitly presents conception as a gift from the LORD. The translation preserves divine agency without adding theological explanation beyond the text.
