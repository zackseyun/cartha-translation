id: RUT.4.19
reference: Ruth 4:19
source:
  edition: WLC
  text: וְ/חֶצְרוֹן֙ הוֹלִ֣יד אֶת רָ֔ם וְ/רָ֖ם הוֹלִ֥יד אֶת עַמִּֽינָדָֽב־־׃
translation:
  text: Hezron fathered Ram, and Ram fathered Amminadab.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/חֶצְרוֹן
  chosen: Hezron
  alternatives:
  - Hetsron
  lexicon: HALOT
  rationale: Proper name; transliterated by standard English convention per translation
    philosophy to transliterate personal names rather than translate them. The prefixed
    conjunction is carried by the clause structure rather than separately rendered
    as 'and' before the first name in English genealogy style.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: Hiphil of ילד in genealogical context means to beget/father. 'Fathered'
    is concise, natural modern English, and preserves the male genealogical sense
    better than the archaic 'begot' or the more cumbersome 'became the father of'.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent English equivalent; its function
    is represented by English word order.
- source_word: רָם
  chosen: Ram
  lexicon: HALOT
  rationale: Proper name; transliterated in standard English form.
- source_word: וְ/רָם
  chosen: and Ram
  lexicon: HALOT
  rationale: The conjunction joins the second genealogical clause; rendered explicitly
    as 'and' in natural English.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: Repeated verb kept with the same English gloss for consistency in the
    genealogy.
- source_word: עַמִּינָדָב
  chosen: Amminadab
  alternatives:
  - Aminadab
  lexicon: HALOT
  rationale: Proper name; transliterated according to common English biblical convention.
    The doubled 'm' reflects the Hebrew spelling more transparently.
