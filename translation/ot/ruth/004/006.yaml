id: RUT.4.6
reference: Ruth 4:6
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הַ/גֹּאֵ֗ל לֹ֤א אוּכַל֙ ל/גאול לִ֔/י פֶּן אַשְׁחִ֖ית אֶת נַחֲלָתִ֑/י
    גְּאַל לְ/ךָ֤ אַתָּה֙ אֶת גְּאֻלָּתִ֔/י כִּ֥י לֹא אוּכַ֖ל לִ/גְאֹֽל־־־־־־׃
translation:
  text: Then the redeemer said, “I cannot redeem it for myself, lest I ruin my own
    inheritance. Redeem for yourself my right of redemption, for I cannot redeem it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “my redemption.” The Hebrew noun can be rendered more literally this
      way, but here it refers to the legal right/duty to redeem the property and marry
      Ruth within the family line.
    reason: lexical_alternative
  - marker: b
    text: “The redeemer” refers to the nearer family redeemer with prior claim before
      Boaz; traditional English often has “kinsman-redeemer.”
    reason: cultural_note
lexical_decisions:
- source_word: הַגֹּאֵל
  chosen: the redeemer
  alternatives:
  - the kinsman-redeemer
  - the guardian-redeemer
  lexicon: HALOT
  rationale: The participial form from גאל denotes the man with the legal duty/right
    to redeem. 'Redeemer' is concise and accurate in context; 'kinsman-redeemer' is
    traditional and more explicit, but the kinship element is supplied by the broader
    narrative rather than this word alone.
- source_word: לִגְאֹל / גְּאַל / גְּאֻלָּתִי
  chosen: redeem / redeem / my right of redemption
  alternatives:
  - buy back
  - exercise redemption rights
  - my redemption
  lexicon: HALOT
  rationale: The repeated גאל word-group should be reflected consistently. In this
    legal setting it refers to exercising the family redemption obligation/right.
    'Redeem' preserves the legal-theological term, while 'my right of redemption'
    makes the noun גְּאֻלָּה more explicit in English than bare 'my redemption,' which
    could sound overly abstract or soteriological.
- source_word: לִי
  chosen: for myself
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The dative marks personal interest/advantage. 'For myself' brings out
    that the man is speaking of redeeming in a way that affects his own estate.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - for fear that
  lexicon: HALOT
  rationale: Introduces the reason of apprehension. 'Lest' is compact and natural
    here, preserving the warning nuance without paraphrase.
- source_word: אַשְׁחִית
  chosen: I ruin
  alternatives:
  - I damage
  - I impair
  - I jeopardize
  lexicon: HALOT
  rationale: Hiphil of שׁחת here expresses causing harm to his inheritance, not literal
    destruction. 'Ruin' communicates serious legal/economic harm in idiomatic English.
- source_word: נַחֲלָתִי
  chosen: my own inheritance
  alternatives:
  - my inheritance
  - my estate
  lexicon: HALOT
  rationale: In Ruth this refers to patrimonial property/inheritance. 'My own inheritance'
    clarifies the contrast with the property to be redeemed and reflects the possessive
    emphasis.
- source_word: לְךָ אַתָּה
  chosen: for yourself
  alternatives:
  - you yourself
  - you
  lexicon: HALOT
  rationale: The pronoun adds emphasis. English can express this naturally with 'for
    yourself'; the following imperative already addresses Boaz directly, so repeating
    'you yourself' would sound wooden.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanatory restatement of his inability. 'For' fits the
    discourse flow in direct speech.
