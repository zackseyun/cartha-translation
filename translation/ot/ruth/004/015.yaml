theological_decisions:
- issue: Rendering נֶפֶשׁ
  chosen_reading: life
  alternative_readings:
  - soul
  - self
  rationale: The context is familial restoration and provision for Naomi's future,
    not an anthropological statement about the immaterial soul. Rendering as 'life'
    preserves the concrete sense and avoids importing later theological categories.
  doctrine_reference: Translation philosophy §1, §6
- issue: Gendered comparison in מִשִּׁבְעָה בָּנִים
  chosen_reading: seven sons
  alternative_readings:
  - seven children
  rationale: The Hebrew explicitly says 'sons,' and the comparison reflects ancient
    social expectations about sons as providers in old age. Per the gender-accurate
    policy, the masculine term should be preserved rather than neutralized.
  doctrine_reference: Translation philosophy §4
