id: RUT.4.15
reference: Ruth 4:15
source:
  edition: WLC
  text: וְ/הָ֤יָה לָ/ךְ֙ לְ/מֵשִׁ֣יב נֶ֔פֶשׁ וּ/לְ/כַלְכֵּ֖ל אֶת שֵׂיבָתֵ֑/ךְ כִּ֣י
    כַלָּתֵ֤/ךְ אֲֽשֶׁר אֲהֵבַ֨תֶ/ךְ֙ יְלָדַ֔תּ/וּ אֲשֶׁר הִיא֙ ט֣וֹבָה לָ֔/ךְ מִ/שִּׁבְעָ֖ה
    בָּנִֽים־־־׃
translation:
  text: And he will be to you a restorer of life and a sustainer of your old age,
    for your daughter-in-law, who loves you, has borne him—she who is better to you
    than seven sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a restorer of your life'; Hebrew 'restorer of life/soul.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your old age,' literally 'your gray hair.'
    reason: lexical_alternative
  - marker: c
    text: '''Seven sons'' uses a number that often signifies fullness or completeness;
      the point is that Ruth is worth more to Naomi than the idealized blessing of
      many sons.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  chosen: And he will be
  alternatives:
  - And may he be
  - And he shall be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in context functions as a future/result
    statement in the women's blessing over the child; 'will be' gives natural English
    while preserving the predictive sense.
- source_word: לְמֵשִׁיב נֶפֶשׁ
  chosen: a restorer of life
  alternatives:
  - one who restores your life
  - a reviver
  - a restorer of soul
  lexicon: HALOT
  rationale: מֵשִׁיב from שוב means 'bringing back/restoring'; נֶפֶשׁ here is best
    taken in the concrete sense of life/self rather than the more loaded English 'soul.'
    'Restorer of life' is concise and idiomatic while preserving the Hebrew imagery.
- source_word: וּלְכַלְכֵּל
  chosen: and a sustainer
  alternatives:
  - and one who nourishes
  - and one who supports
  - and a provider
  lexicon: HALOT
  rationale: The pilpel/iterative sense of כלכל conveys sustaining, supporting, or
    nourishing. 'Sustainer' fits the parallel with 'restorer' and keeps the participial
    force.
- source_word: אֶת שֵׂיבָתֵךְ
  chosen: of your old age
  alternatives:
  - of your gray hair
  - in your old age
  lexicon: HALOT
  rationale: שֵׂיבָה literally refers to gray hair/old age. In English, 'your old
    age' communicates the idiom's meaning more clearly than the more literal but less
    natural 'your gray hair.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding blessing. 'For' preserves the
    explanatory connection in a literary register suitable to the passage.
- source_word: כַלָּתֵךְ
  chosen: your daughter-in-law
  alternatives:
  - your bride-relative
  lexicon: HALOT
  rationale: Standard contextual meaning in Ruth for Naomi's relationship to Ruth.
- source_word: אֲשֶׁר אֲהֵבַתֶךְ
  chosen: who loves you
  alternatives:
  - who has loved you
  lexicon: HALOT
  rationale: The perfect can describe a settled, demonstrated relationship. Present
    English 'loves you' best conveys the ongoing reality highlighted in context.
- source_word: יְלָדַתּוּ
  chosen: has borne him
  alternatives:
  - has given birth to him
  - has borne a son for him
  lexicon: HALOT
  rationale: The 3ms suffix most naturally refers to the child just mentioned. 'Has
    borne him' is compact and faithful. Adding 'a son' would import an explicit object
    not present in this form, though context implies the newborn boy.
- source_word: אֲשֶׁר הִיא טוֹבָה לָךְ
  chosen: she who is better to you
  alternatives:
  - who is more to you
  - who is good to you
  lexicon: HALOT
  rationale: טוֹבָה with comparative מן expresses superiority in worth/benefit. 'Better
    to you' preserves the comparative force and relational nuance.
- source_word: מִשִּׁבְעָה בָּנִים
  chosen: than seven sons
  alternatives:
  - than seven male children
  lexicon: HALOT
  rationale: Seven is a conventional number of fullness/completeness; 'sons' should
    be retained rather than neutralized, since the Hebrew is explicitly gendered and
    culturally significant.
