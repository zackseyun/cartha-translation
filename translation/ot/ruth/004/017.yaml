id: RUT.4.17
reference: Ruth 4:17
source:
  edition: WLC
  text: וַ/תִּקְרֶאנָה֩ ל֨/וֹ הַ/שְּׁכֵנ֥וֹת שֵׁם֙ לֵ/אמֹ֔ר יֻלַּד בֵּ֖ן לְ/נָעֳמִ֑י
    וַ/תִּקְרֶ֤אנָֽה שְׁמ/וֹ֙ עוֹבֵ֔ד ה֥וּא אֲבִי יִשַׁ֖י אֲבִ֥י דָוִֽד־־׃פ
translation:
  text: Then the neighbor women gave him a name, saying, “A son has been born to Naomi.”
    And they named him Obed. He was the father of Jesse, the father of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'A son has been born to Naomi.' The women speak of Naomi's restored
      family line through Ruth's child, not of Naomi as the biological mother.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׁכֵנוֹת
  chosen: the neighbor women
  alternatives:
  - the women neighbors
  - the neighboring women
  lexicon: HALOT
  rationale: The feminine plural noun refers specifically to women living nearby.
    'Neighbor women' is natural English and preserves both locality and gender.
- source_word: וַתִּקְרֶאנָה לוֹ שֵׁם
  chosen: gave him a name
  alternatives:
  - called a name for him
  - named him
  lexicon: HALOT
  rationale: The idiom literally means 'called a name to/for him.' In English, 'gave
    him a name' best reflects the naming action while preserving the indirect object
    לוֹ. The later clause uses the more direct English 'named him' for stylistic clarity
    with the explicit proper name.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thus saying
  lexicon: HALOT
  rationale: Standard rendering of the quotative infinitive, introducing the content
    of the naming declaration.
- source_word: יֻלַּד בֵּן לְנָעֳמִי
  chosen: A son has been born to Naomi
  alternatives:
  - A son is born to Naomi
  - Naomi has had a son born to her
  lexicon: HALOT
  rationale: The passive verb with ל marks Naomi as the beneficiary/recipient. 'Has
    been born' is idiomatic English narrative perfective and preserves the communal
    announcement. 'To Naomi' should be retained rather than paraphrased away, since
    the women speak from the perspective of Naomi's restored family line.
- source_word: וַתִּקְרֶאנָה שְׁמוֹ עוֹבֵד
  chosen: And they named him Obed
  alternatives:
  - And they called his name Obed
  lexicon: HALOT
  rationale: This is the standard Hebrew naming formula. 'Named him Obed' is idiomatic
    modern English while remaining faithful to the source.
- source_word: עוֹבֵד
  chosen: Obed
  alternatives:
  - Serving
  - Servant
  lexicon: HALOT
  rationale: Per translation philosophy, personal names are transliterated rather
    than translated. The underlying sense may relate to 'serving,' but the text presents
    it as a proper name.
- source_word: אֲבִי
  chosen: father of
  alternatives:
  - ancestor of
  lexicon: HALOT
  rationale: In genealogical contexts, אבי can sometimes denote an ancestor more broadly,
    but here the immediate genealogy Ruth→Obed→Jesse→David supports the straightforward
    'father of' in both instances.
- source_word: דָוִד
  chosen: David
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: יִשַׁי
  chosen: Jesse
  alternatives:
  - Yishai
  lexicon: HALOT
  rationale: '''Jesse'' is the conventional English form of the Hebrew personal name
    and is standard in Bible translation.'
