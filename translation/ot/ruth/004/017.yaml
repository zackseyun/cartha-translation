theological_decisions:
- issue: Naomi's relation to the newborn in the announcement 'A son has been born
    to Naomi'
  chosen_reading: Retain the wording 'to Naomi' in the main text without clarifying
    it as biological maternity.
  alternative_readings:
  - A grandson has been born to Naomi
  - Naomi has received a son
  rationale: The Hebrew intentionally voices the neighborhood women's perspective
    on Naomi's restoration through Ruth's child. Rendering it more explicitly as 'grandson'
    would resolve the literary and familial tension rather than preserve it. The text
    celebrates covenantal/familial restoration, not a biological claim about Naomi
    giving birth.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
