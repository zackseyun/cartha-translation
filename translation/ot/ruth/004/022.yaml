theological_decisions:
- issue: Genealogical verb rendering
  chosen_reading: fathered
  alternative_readings:
  - begot
  - became the father of
  rationale: The verse is a straightforward genealogy culminating in David. 'Fathered'
    preserves the biological/genealogical force of the Hebrew without archaic diction,
    and does not import any theological claim beyond the text.
  doctrine_reference: Translation philosophy §§5–6
