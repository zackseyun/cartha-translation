id: RUT.4.22
reference: Ruth 4:22
source:
  edition: WLC
  text: וְ/עֹבֵד֙ הוֹלִ֣יד אֶת יִשָׁ֔י וְ/יִשַׁ֖י הוֹלִ֥יד אֶת דָּוִֽד־־׃
translation:
  text: And Obed fathered Jesse, and Jesse fathered David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'begot'; Hebrew genealogical language commonly uses 'fathered' or 'became
      the father of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: HALOT
  rationale: The conjunction simply links this final genealogical statement to the
    preceding list. 'And' is the most straightforward English equivalent in genealogical
    narration.
- source_word: עֹבֵד
  chosen: Obed
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogies means 'to father, beget.' 'Fathered'
    is concise, natural modern English and preserves the male genealogical sense better
    than the archaic 'begot.'
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent English equivalent; its function
    is represented by English word order.
- source_word: יִשַׁי / יִשָׁי
  chosen: Jesse
  alternatives:
  - Yishai
  lexicon: HALOT
  rationale: Standard English transliteration/traditional form for the personal name.
    'Jesse' is the established English rendering and readily recognizable in biblical
    context.
- source_word: דָּוִד
  chosen: David
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name דוד.
