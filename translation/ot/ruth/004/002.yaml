id: RUT.4.2
reference: Ruth 4:2
source:
  edition: WLC
  text: וַ/יִּקַּ֞ח עֲשָׂרָ֧ה אֲנָשִׁ֛ים מִ/זִּקְנֵ֥י הָ/עִ֖יר וַ/יֹּ֣אמֶר שְׁבוּ
    פֹ֑ה וַ/יֵּשֵֽׁבוּ־׃
translation:
  text: Then he took ten men from the elders of the city and said, “Sit here,” and
    they sat down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “he selected ten men from the elders of the city.” The Hebrew verb can
      imply taking for a purpose, here likely selecting witnesses for the legal proceeding.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: he took
  alternatives:
  - he selected
  - he gathered
  lexicon: HALOT
  rationale: The verb לקח in the waw-consecutive narrative form most directly means
    'took.' In context it refers to Boaz taking or selecting men for a legal proceeding
    at the gate. 'Took' preserves the Hebrew wording while remaining natural in English.
- source_word: עֲשָׂרָה אֲנָשִׁים
  chosen: ten men
  alternatives:
  - ten persons
  lexicon: HALOT
  rationale: The phrase is straightforwardly masculine and refers to adult male participants
    in a public legal setting. Per the gender-accurate principle, 'men' is preferable
    to an inclusive rendering like 'persons.'
- source_word: מִזִּקְנֵי הָעִיר
  chosen: from the elders of the city
  alternatives:
  - from the city's elders
  lexicon: HALOT
  rationale: זקני העיר is a standard expression for recognized civic leaders or elders.
    'From the elders of the city' preserves the partitive sense of מן and the formal
    public setting.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - told
  lexicon: HALOT
  rationale: The common narrative verb 'said' is the most direct rendering and fits
    the quoted imperative that follows.
- source_word: שְׁבוּ
  chosen: Sit
  alternatives:
  - Sit down
  - Remain seated
  lexicon: HALOT
  rationale: The imperative of ישב here invites the men to take their places for the
    proceeding. 'Sit' is concise and natural; the following clause 'and they sat down'
    supplies the completed action.
- source_word: פֹה
  chosen: here
  alternatives:
  - in this place
  lexicon: HALOT
  rationale: פֹה is a simple deictic adverb meaning 'here.' 'Here' is idiomatic in
    direct speech.
- source_word: וַיֵּשֵׁבוּ
  chosen: they sat down
  alternatives:
  - they sat
  - they took their seats
  lexicon: HALOT
  rationale: The verb repeats ישב in narrative sequence. 'They sat down' reads naturally
    in English and marks the response to Boaz's command.
