id: RUT.1.8
reference: Ruth 1:8
source:
  edition: WLC
  text: וַ/תֹּ֤אמֶר נָעֳמִי֙ לִ/שְׁתֵּ֣י כַלֹּתֶ֔י/הָ לֵ֣כְנָה שֹּׁ֔בְנָה אִשָּׁ֖ה לְ/בֵ֣ית אִמָּ֑/הּ יעשה יְהוָ֤ה עִמָּ/כֶם֙ חֶ֔סֶד כַּ/אֲשֶׁ֧ר עֲשִׂיתֶ֛ם עִם הַ/מֵּתִ֖ים וְ/עִמָּדִֽ/י־׃
translation:
  text: And Naomi said to her two daughters-in-law, “Go, return, each to her mother’s house. May Yahweh show you kindness, as you have shown it to the dead and to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'steadfast love,' 'loyal love,' or 'covenant faithfulness' for 'kindness' (Hebrew hesed).
    reason: lexical_alternative
lexical_decisions:
- source_word: כַלֹּתֶיהָ
  chosen: her two daughters-in-law
  alternatives:
  - her two brides
  - her two daughters by marriage
  lexicon: HALOT
  rationale: כַּלָּה in this context refers to a son's wife; 'daughters-in-law' is the natural and precise English equivalent.
- source_word: לֵכְנָה שֹּׁבְנָה
  chosen: Go, return
  alternatives:
  - Go, go back
  - Come, return
  lexicon: HALOT
  rationale: The paired imperatives intensify Naomi's urging. Rendering both verbs preserves the Hebrew emphasis better than collapsing them into a single English command.
- source_word: אִשָּׁה לְבֵית אִמָּהּ
  chosen: each woman to her mother’s house
  alternatives:
  - each of you to her mother's house
  - each to her family home
  lexicon: HALOT
  rationale: אִשָּׁה here is distributive ('each woman'). 'Mother’s house' is retained rather than generalized, since that is the specific Hebrew expression and may reflect the women's natal household.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: חֶסֶד
  chosen: kindness
  alternatives:
  - steadfast love
  - loyal love
  - covenant faithfulness
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal loyalty and benevolent kindness. In this interpersonal blessing context, 'kindness' is clear modern English while still fitting Naomi's prayer; the richer nuance is preserved in a footnote.
- source_word: עֲשִׂיתֶם עִם הַמֵּתִים וְעִמָּדִי
  chosen: as you have shown it to the dead and to me
  alternatives:
  - as you have dealt with the dead and with me
  - as you have done for the dead and for me
  lexicon: HALOT
  rationale: The verb עשה with חֶסֶד is idiomatically 'show kindness.' Supplying 'it' in English makes the clause natural while preserving the link to חֶסֶד. 'The dead' refers to their deceased husbands and likely Elimelech by extension.
