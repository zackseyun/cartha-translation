theological_decisions:
- issue: Rendering אֱלֹהֶיהָ in reference to Moabite worship
  chosen_reading: her gods
  alternative_readings:
  - her god
  rationale: Although אֱלֹהִים can function as a singular in some contexts, here Naomi
    contrasts return to Israel with return to Moabite identity and worship. The plural
    'gods' best fits the cultural-religious setting and avoids suggesting covenantal
    worship of the LORD.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source text''s plain sense.'
