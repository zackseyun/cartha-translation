id: RUT.1.15
reference: Ruth 1:15
source:
  edition: WLC
  text: וַ/תֹּ֗אמֶר הִנֵּה֙ שָׁ֣בָה יְבִמְתֵּ֔/ךְ אֶל עַמָּ֖/הּ וְ/אֶל אֱלֹהֶ֑י/הָ
    שׁ֖וּבִי אַחֲרֵ֥י יְבִמְתֵּֽ/ךְ־־׃
translation:
  text: And she said, “Look, your sister-in-law has gone back to her people and to
    her gods. Go back after your sister-in-law.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has returned.' The Hebrew verb שוב is repeated in this verse for both
      Orpah's action and Naomi's command to Ruth.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to her gods'; some translate 'to her god,' but the plural likely
      refers to the deities of Moab.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: And she said
  alternatives:
  - Then she said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר introducing Naomi's speech. 'And
    she said' preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention to the situation. 'Look' is readable
    modern English and preserves the force better than archaic 'Behold.'
- source_word: שָׁבָה
  chosen: has gone back
  alternatives:
  - has returned
  - has turned back
  lexicon: HALOT
  rationale: Qal perfect of שוב indicates completed return. 'Has gone back' is natural
    in English and matches the repeated שוב in the verse, while still conveying reversal/return.
- source_word: יְבִמְתֵּךְ
  chosen: your sister-in-law
  alternatives:
  - your husband's brother's wife
  lexicon: HALOT
  rationale: The noun denotes a female in-law in the levirate family relationship;
    in this context 'sister-in-law' is the idiomatic and comprehensible English equivalent.
    Repeated consistently for both occurrences.
- source_word: אֶל עַמָּהּ
  chosen: to her people
  alternatives:
  - to her kin
  - to her nation
  lexicon: HALOT
  rationale: עַם here refers to one's ethnic/community people rather than merely immediate
    family. 'Her people' is the most natural and contextually fitting rendering.
- source_word: וְאֶל אֱלֹהֶיהָ
  chosen: and to her gods
  alternatives:
  - and to her god
  lexicon: HALOT
  rationale: The plural form אֱלֹהִים with 3fs suffix here refers to the deities of
    Moab in context, not the God of Israel. Lowercase plural 'gods' best reflects
    the likely sense and avoids importing monotheistic singular usage into a pagan
    setting.
- source_word: שׁוּבִי
  chosen: Go back
  alternatives:
  - Return
  - Turn back
  lexicon: HALOT
  rationale: Imperative of שוב addressed to Ruth. 'Go back' is idiomatic in direct
    speech and echoes the earlier 'has gone back' while sounding natural in English.
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  - with
  lexicon: HALOT
  rationale: Preposition indicating following after someone. 'After' is the most direct
    rendering and preserves the image of following Orpah's course.
