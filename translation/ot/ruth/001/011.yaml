id: RUT.1.11
reference: Ruth 1:11
source:
  edition: WLC
  text: וַ/תֹּ֤אמֶר נָעֳמִי֙ שֹׁ֣בְנָה בְנֹתַ֔/י לָ֥/מָּה תֵלַ֖כְנָה עִמִּ֑/י הַֽ/עֽוֹד
    לִ֤/י בָנִים֙ בְּֽ/מֵעַ֔/י וְ/הָי֥וּ לָ/כֶ֖ם לַ/אֲנָשִֽׁים־׃
translation:
  text: But Naomi said, “Turn back, my daughters. Why would you go with me? Do I still
    have sons in my womb, that they could become husbands for you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'my daughters'; Naomi is addressing her daughters-in-law with
      familial affection.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: But Naomi said
  alternatives:
  - And Naomi said
  - Then Naomi said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the discourse
    contrast here, since Naomi responds to the daughters-in-law's intention to go
    with her; 'and' would be more formally literal but less communicative of the contrast.
- source_word: שֹׁבְנָה
  chosen: Turn back
  alternatives:
  - Return
  - Go back
  lexicon: HALOT
  rationale: From שוב, a common verb for returning/turning back. 'Turn back' is idiomatic
    and preserves the directional force in Naomi's plea.
- source_word: בְנֹתַי
  chosen: my daughters
  alternatives:
  - my daughters-in-law
  lexicon: HALOT
  rationale: Literally 'my daughters.' In context Naomi addresses her daughters-in-law
    affectionately. The literal form is retained in the main text, since English readers
    can understand it as relational language; the more explicit contextual sense is
    preserved as an alternative.
- source_word: לָמָּה תֵלַכְנָה עִמִּי
  chosen: Why would you go with me?
  alternatives:
  - Why will you go with me?
  - Why should you go with me?
  lexicon: HALOT
  rationale: The imperfect here is naturally rendered in English as a modal or prospective
    question. 'Would you go' conveys Naomi's rhetorical appeal better than a simple
    future.
- source_word: הַעוֹד לִי
  chosen: Do I still have
  alternatives:
  - Are there still for me
  - Do I yet have
  lexicon: HALOT
  rationale: The particle עוד with the dative pronoun expresses continued possession/existence.
    'Do I still have' is clear modern English.
- source_word: בָנִים
  chosen: sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'sons,' which is crucial to the levirate-marriage
    logic of the verse. A gender-neutral rendering would obscure the point.
- source_word: בְּמֵעַי
  chosen: in my womb
  alternatives:
  - in my belly
  - in my body
  lexicon: HALOT
  rationale: The noun literally refers to inward parts/womb. In this context of potential
    childbearing, 'womb' best expresses the reproductive sense.
- source_word: וְהָיוּ לָכֶם לַאֲנָשִׁים
  chosen: that they could become husbands for you
  alternatives:
  - and they would be husbands for you
  - that they might be for you as husbands
  lexicon: HALOT
  rationale: Literally, 'and they would be to you for husbands.' The clause expresses
    the hypothetical purpose/result of having sons. 'Become husbands for you' is natural
    English and preserves the marriage sense of אֲנָשִׁים here as 'husbands,' not
    merely 'men'.
