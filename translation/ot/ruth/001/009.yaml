id: RUT.1.9
reference: Ruth 1:9
source:
  edition: WLC
  text: יִתֵּ֤ן יְהוָה֙ לָ/כֶ֔ם וּ/מְצֶ֣אןָ מְנוּחָ֔ה אִשָּׁ֖ה בֵּ֣ית אִישָׁ֑/הּ וַ/תִּשַּׁ֣ק
    לָ/הֶ֔ן וַ/תִּשֶּׂ֥אנָה קוֹלָ֖/ן וַ/תִּבְכֶּֽינָה׃
translation:
  text: May the LORD grant that you find rest, each of you in the house of her husband."
    Then she kissed them, and they lifted up their voices and wept.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'security' or 'settledness'; the Hebrew 'rest' here refers to the settled
      security of life in a husband's household.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתֵּן
  chosen: May ... grant
  alternatives:
  - give
  - let ... give
  lexicon: HALOT
  rationale: Jussive/imprecatory nuance in Naomi's blessing is best conveyed idiomatically
    with 'May ... grant' rather than the more wooden 'give.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and broad English Bible usage.
- source_word: וּמְצֶאןָ
  chosen: that you find
  alternatives:
  - and find
  - and may you find
  lexicon: HALOT
  rationale: The conjunction plus verb continues the blessing wish. English expresses
    this naturally as 'that you find' after 'May the LORD grant.'
- source_word: מְנוּחָה
  chosen: rest
  alternatives:
  - security
  - settledness
  lexicon: HALOT
  rationale: The noun denotes rest/settled repose; in this context it refers concretely
    to the security and settled life of remarriage, but 'rest' preserves the Hebrew
    term while allowing the contextual sense to be heard.
- source_word: אִשָּׁה בֵּית אִישָׁהּ
  chosen: each of you in the house of her husband
  alternatives:
  - a woman in the house of her husband
  - each in her husband's house
  lexicon: HALOT
  rationale: 'The phrase is distributive with reference to the two women: each woman
    finding rest in a husband''s household. ''Each of you'' makes the distributive
    sense clear in natural English.'
- source_word: וַתִּשַּׁק לָהֶן
  chosen: Then she kissed them
  alternatives:
  - And she kissed them
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol. 'Then' gives smooth English narrative flow
    without altering meaning.
- source_word: וַתִּשֶּׂאנָה קוֹלָן
  chosen: they lifted up their voices
  alternatives:
  - they raised their voices
  - they cried aloud
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for audible lament or crying. Retaining
    'lifted up their voices' preserves the idiom's texture while remaining understandable.
- source_word: וַתִּבְכֶּינָה
  chosen: and wept
  alternatives:
  - and cried
  - and began to weep
  lexicon: HALOT
  rationale: '''Wept'' is the straightforward narrative rendering and pairs naturally
    with the preceding idiom of raising the voice.'
