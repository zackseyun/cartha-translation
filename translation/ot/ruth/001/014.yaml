id: RUT.1.14
reference: Ruth 1:14
source:
  edition: WLC
  text: וַ/תִּשֶּׂ֣נָה קוֹלָ֔/ן וַ/תִּבְכֶּ֖ינָה ע֑וֹד וַ/תִּשַּׁ֤ק עָרְפָּה֙ לַ/חֲמוֹתָ֔/הּ
    וְ/ר֖וּת דָּ֥בְקָה בָּֽ/הּ׃
translation:
  text: Then they lifted up their voices and wept again. Orpah kissed her mother-in-law,
    but Ruth clung to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and Ruth clung to her'; the Hebrew conjunction can be read simply as
      'and,' but the context suggests a contrast between Orpah's kiss and Ruth's continued
      attachment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשֶּׂנָה קוֹלָן
  chosen: they lifted up their voices
  alternatives:
  - they raised their voices
  - they cried aloud
  lexicon: HALOT
  rationale: The idiom literally means 'they lifted up their voice,' with plural subject
    and plural pronominal suffix. 'Lifted up their voices' preserves the Hebrew expression
    in natural English and signals audible lament without over-paraphrasing.
- source_word: וַתִּבְכֶּינָה
  chosen: wept
  alternatives:
  - cried
  lexicon: HALOT
  rationale: The verb denotes weeping/crying. 'Wept' fits the solemn narrative tone
    and distinguishes the act from the preceding idiom about raising the voice.
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - yet
  - further
  lexicon: HALOT
  rationale: In context the adverb marks repetition after a prior episode of weeping,
    so 'again' is the clearest contextual rendering.
- source_word: וַתִּשַּׁק
  chosen: kissed
  alternatives:
  - gave a kiss to
  lexicon: HALOT
  rationale: The verb straightforwardly means 'kiss.' No expansion is needed.
- source_word: לַחֲמוֹתָהּ
  chosen: her mother-in-law
  lexicon: HALOT
  rationale: The noun specifically denotes a mother-in-law. The 3fs suffix refers
    to Orpah, so 'her mother-in-law' is precise and natural.
- source_word: דָּבְקָה בָּהּ
  chosen: clung to her
  alternatives:
  - stuck with her
  - held fast to her
  lexicon: HALOT
  rationale: The verb דבק commonly conveys close attachment or cleaving. 'Clung to
    her' is idiomatic English and preserves the emotional and relational force without
    importing covenantal overtones beyond the context.
- source_word: וְ
  chosen: but
  alternatives:
  - and
  lexicon: HALOT
  rationale: Although the conjunction is formally 'and,' the clause sets Ruth in contrast
    to Orpah's departure-signaling kiss. 'But' brings out the adversative sense that
    is contextually implicit in the narrative.
- source_word: עָרְפָּה
  chosen: Orpah
  rationale: Personal name transliterated according to standard English convention,
    following project policy to transliterate names.
- source_word: רוּת
  chosen: Ruth
  rationale: Personal name transliterated according to standard English convention,
    following project policy to transliterate names.
