id: RUT.1.2
reference: Ruth 1:2
source:
  edition: WLC
  text: וְ/שֵׁ֣ם הָ/אִ֣ישׁ אֱֽלִימֶ֡לֶךְ וְ/שֵׁם֩ אִשְׁתּ֨/וֹ נָעֳמִ֜י וְ/שֵׁ֥ם שְׁנֵֽי
    בָנָ֣י/ו מַחְל֤וֹן וְ/כִלְיוֹן֙ אֶפְרָתִ֔ים מִ/בֵּ֥ית לֶ֖חֶם יְהוּדָ֑ה וַ/יָּבֹ֥אוּ
    שְׂדֵי מוֹאָ֖ב וַ/יִּֽהְיוּ שָֽׁם־׀־־׃
translation:
  text: The man's name was Elimelech, and his wife's name was Naomi, and the names
    of his two sons were Mahlon and Chilion. They were Ephrathites from Bethlehem
    in Judah. They came to the fields of Moab and remained there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the country of Moab' or 'the territory of Moab'; Hebrew 'the fields
      of Moab.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and were there' or 'and stayed there'; Hebrew literally, 'and they were
      there.'
    reason: lexical_alternative
  - marker: c
    text: Chilion may also be spelled 'Kilion' in English transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֵׁם הָאִישׁ
  chosen: The man's name was
  alternatives:
  - And the name of the man was
  - The name of the man was
  lexicon: HALOT
  rationale: Rendered idiomatically in English while preserving the Hebrew naming
    formula. 'Man' reflects אִישׁ straightforwardly; adding the article as 'the man'
    would sound wooden in English at this point, so 'the man's name was' best captures
    the sense.
- source_word: אֱלִימֶלֶךְ
  chosen: Elimelech
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: אִשְׁתּוֹ
  chosen: his wife's
  alternatives:
  - the name of his wife was
  lexicon: HALOT
  rationale: Possessive construction carried naturally into English. 'Wife' is the
    plain sense of אִשָּׁה in this context.
- source_word: נָעֳמִי
  chosen: Naomi
  rationale: Personal name transliterated by standard convention.
- source_word: שְׁנֵי בָנָיו
  chosen: his two sons
  alternatives:
  - the two sons of his
  lexicon: HALOT
  rationale: Direct rendering of the construct phrase with numeral. English word order
    adjusted for readability.
- source_word: מַחְלוֹן וְכִלְיוֹן
  chosen: Mahlon and Chilion
  alternatives:
  - Mahlon and Kilion
  rationale: Personal names transliterated. 'Chilion' reflects a common English convention
    for כִלְיוֹן; alternate spelling preserved as a lexical alternative.
- source_word: אֶפְרָתִים
  chosen: Ephrathites
  alternatives:
  - Ephraimites
  - people of Ephrathah
  lexicon: HALOT
  rationale: The term refers to people associated with Ephrath/Ephrathah, here linked
    with Bethlehem in Judah. 'Ephrathites' is the standard and contextually fitting
    gentilic. 'Ephraimites' would wrongly connect them to Ephraim.
- source_word: מִבֵּית לֶחֶם יְהוּדָה
  chosen: from Bethlehem in Judah
  alternatives:
  - from Bethlehem Judah
  - from Beth-lehem of Judah
  lexicon: HALOT
  rationale: Rendered in natural modern English. The phrase identifies their origin
    as Bethlehem located in Judah, not merely a possessive relation.
- source_word: וַיָּבֹאוּ
  chosen: They came
  alternatives:
  - They went
  - They arrived
  lexicon: HALOT
  rationale: Basic motion verb בוא rendered as 'came.' In narrative English this works
    well from the narrator's perspective; 'arrived' is possible but slightly more
    interpretive.
- source_word: שְׂדֵי מוֹאָב
  chosen: the fields of Moab
  alternatives:
  - the country of Moab
  - the territory of Moab
  lexicon: HALOT
  rationale: שָׂדֶה literally means 'field'; the plural construct here likely denotes
    the open country/region of Moab. Main text keeps the concrete 'fields' to stay
    close to the Hebrew while remaining intelligible.
- source_word: וַיִּהְיוּ שָׁם
  chosen: and remained there
  alternatives:
  - and were there
  - and stayed there
  lexicon: HALOT
  rationale: Though literally 'and they were there,' the idiom in context indicates
    continued residence. 'Remained there' conveys the narrative force more naturally
    than the bare copula.
