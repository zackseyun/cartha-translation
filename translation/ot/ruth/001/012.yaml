id: RUT.1.12
reference: Ruth 1:12
source:
  edition: WLC
  text: שֹׁ֤בְנָה בְנֹתַ/י֙ לֵ֔כְןָ כִּ֥י זָקַ֖נְתִּי מִ/הְי֣וֹת לְ/אִ֑ישׁ כִּ֤י אָמַ֨רְתִּי֙
    יֶשׁ לִ֣/י תִקְוָ֔ה גַּ֣ם הָיִ֤יתִי הַ/לַּ֨יְלָה֙ לְ/אִ֔ישׁ וְ/גַ֖ם יָלַ֥דְתִּי
    בָנִֽים־׃
translation:
  text: Turn back, my daughters; go on, for I am too old to belong to a husband. Even
    if I were to say, ‘There is still hope for me’—even if I were with a husband tonight
    and even bore sons—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to have a husband' or 'to marry.' The Hebrew is literally 'from being
      to a husband/man.'
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew presents a hypothetical chain: ''For if I said, “I have hope,”
      even if I were with a husband tonight and even bore sons—'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁבְנָה
  chosen: Turn back
  alternatives:
  - Return
  lexicon: HALOT
  rationale: Imperative feminine plural from שוב. In context Naomi urges Ruth and
    Orpah to go back from accompanying her. 'Turn back' preserves the directional
    force and echoes the repeated refrain in the passage.
- source_word: בְנֹתַי
  chosen: my daughters
  alternatives:
  - my girls
  lexicon: HALOT
  rationale: Literal familial term used affectionately by Naomi toward her daughters-in-law.
    'My daughters' preserves both the metaphorical family bond and the solemn tone.
- source_word: לֵכְנָה
  chosen: go on
  alternatives:
  - go
  - leave
  lexicon: HALOT
  rationale: A second feminine plural imperative following 'turn back.' Rendering
    it 'go on' avoids awkward repetition in English while preserving the sense that
    they should continue on their own way.
- source_word: זָקַנְתִּי
  chosen: I am too old
  alternatives:
  - I have grown old
  - I am old
  lexicon: HALOT
  rationale: 'The perfect expresses Naomi''s present state resulting from aging. ''I
    am too old'' brings out the implied consequence in context: she is beyond realistic
    remarriage prospects.'
- source_word: מִהְיוֹת לְאִישׁ
  chosen: to belong to a husband
  alternatives:
  - to have a husband
  - to be for a husband
  - to marry
  lexicon: HALOT
  rationale: Literally 'from being to a man/husband.' In this context אִישׁ means
    'husband.' 'To belong to a husband' preserves the relational idiom without flattening
    it entirely to the abstract 'to marry,' while still reading naturally enough in
    English.
- source_word: כִּי אָמַרְתִּי
  chosen: Even if I were to say
  alternatives:
  - For if I said
  - If I should say
  lexicon: HALOT
  rationale: Here כִּי introduces a hypothetical scenario rather than a simple causal
    clause. 'Even if I were to say' fits the sequence of increasingly unlikely conditions
    Naomi presents.
- source_word: יֶשׁ לִי תִקְוָה
  chosen: There is still hope for me
  alternatives:
  - I have hope
  - there is hope for me
  lexicon: HALOT
  rationale: Existential construction with תִקְוָה. 'There is still hope for me' captures
    the idiom and the rhetorical force that Naomi is entertaining even an improbable
    possibility.
- source_word: גַּם הָיִיתִי הַלַּיְלָה לְאִישׁ
  chosen: even if I were with a husband tonight
  alternatives:
  - even if I got a husband tonight
  - even if I belonged to a husband tonight
  lexicon: HALOT
  rationale: The clause imagines immediate remarriage or union. 'Were with a husband
    tonight' is idiomatic English that preserves the temporal emphasis of 'tonight'
    and avoids over-specifying a legal ceremony not explicit in the Hebrew.
- source_word: וְגַם יָלַדְתִּי בָנִים
  chosen: and even bore sons
  alternatives:
  - and even gave birth to sons
  - and even had sons
  lexicon: HALOT
  rationale: ילד with בנים is literal childbearing. 'Bore sons' is concise and natural,
    and 'sons' should be retained rather than 'children' because the levirate context
    specifically concerns male heirs.
