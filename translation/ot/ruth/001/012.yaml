theological_decisions:
- issue: Retention of male-specific offspring language in levirate-marriage context
  chosen_reading: sons
  alternative_readings:
  - children
  rationale: The Hebrew explicitly says בָנִים, and the surrounding argument depends
    on the prospect of male heirs for marriage and family continuation. Following
    the gender-accurate principle, the translation preserves 'sons' rather than neutralizing
    to 'children.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 4
