id: RUT.1.22
reference: Ruth 1:22
source:
  edition: WLC
  text: וַ/תָּ֣שָׁב נָעֳמִ֗י וְ/ר֨וּת הַ/מּוֹאֲבִיָּ֤ה כַלָּתָ/הּ֙ עִמָּ֔/הּ הַ/שָּׁ֖בָה
    מִ/שְּׂדֵ֣י מוֹאָ֑ב וְ/הֵ֗מָּה בָּ֚אוּ בֵּ֣ית לֶ֔חֶם בִּ/תְחִלַּ֖ת קְצִ֥יר שְׂעֹרִֽים׃
translation:
  text: So Naomi returned, and Ruth the Moabite, her daughter-in-law, with her—the
    one who returned from the fields of Moab. And they came to Bethlehem at the beginning
    of the barley harvest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'from the country of Moab.' The Hebrew reads 'from
      the fields of Moab.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּשָׁב
  chosen: returned
  alternatives:
  - came back
  - went back
  lexicon: HALOT
  rationale: From שוב, denoting return. 'Returned' is the most natural and concise
    English rendering here and preserves the narrative linkage with Ruth's return
    as well.
- source_word: הַמּוֹאֲבִיָּה
  chosen: the Moabite
  alternatives:
  - the woman from Moab
  lexicon: HALOT
  rationale: A gentilic feminine adjective used substantivally/appositionally. 'The
    Moabite' preserves the ethnic designation's prominence in the narrative better
    than a paraphrase.
- source_word: כַלָּתָהּ
  chosen: her daughter-in-law
  lexicon: HALOT
  rationale: Standard kinship term; 'daughter-in-law' is the direct and idiomatic
    equivalent.
- source_word: עִמָּהּ
  chosen: with her
  lexicon: HALOT
  rationale: Direct rendering of the preposition with 3fs suffix, indicating Ruth
    accompanied Naomi.
- source_word: הַשָּׁבָה
  chosen: the one who returned
  alternatives:
  - who had returned
  - returning
  lexicon: HALOT
  rationale: The feminine singular participle most naturally refers to Ruth and functions
    appositionally. 'The one who returned' preserves the marked participial description
    without over-smoothing; English punctuation helps readability.
- source_word: מִשְּׂדֵי מוֹאָב
  chosen: from the fields of Moab
  alternatives:
  - from the country of Moab
  - from the territory of Moab
  lexicon: HALOT
  rationale: שָׂדֶה literally means 'field'; the plural construct is retained as 'fields.'
    Although idiomatically it can refer broadly to the land/region, the literal image
    is not awkward in English and should be preserved.
- source_word: וְהֵמָּה
  chosen: And they
  alternatives:
  - Now they
  lexicon: HALOT
  rationale: The independent pronoun adds slight emphasis before the verb. English
    usually absorbs this into the subject pronoun; 'And they' preserves the discourse
    movement adequately.
- source_word: בָּאוּ
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Common verb of motion. 'Came' fits the narrative perspective and pairs
    naturally with the destination Bethlehem.
- source_word: בֵּית לֶחֶם
  chosen: Bethlehem
  lexicon: HALOT
  rationale: Standard transliteration of the place name, in keeping with the translation
    philosophy to transliterate names.
- source_word: בִּתְחִלַּת
  chosen: at the beginning of
  alternatives:
  - at the start of
  lexicon: HALOT
  rationale: A temporal construct noun meaning 'beginning of.' 'At the beginning of'
    is clear and natural.
- source_word: קְצִיר שְׂעֹרִים
  chosen: the barley harvest
  alternatives:
  - barley harvest time
  lexicon: HALOT
  rationale: Construct chain meaning the harvest of barley. The article is supplied
    in English for naturalness because the phrase refers to a known seasonal period.
