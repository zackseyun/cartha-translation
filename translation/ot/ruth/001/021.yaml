theological_decisions:
- issue: Rendering Naomi's statement about God's action in her suffering
  chosen_reading: 'Retain strong language of divine agency: ''the LORD has testified against me'' and ''the Almighty has brought calamity on me.'''
  alternative_readings:
  - Soften to 'has allowed calamity to come upon me'
  - Interpret עָנָה as 'has afflicted me'
  rationale: The Hebrew attributes Naomi's bitter providence directly to the LORD and Shaddai. The translation should preserve that theological tension rather than soften it. At the same time, הֵרַע is rendered as 'brought calamity' rather than 'done evil' to avoid suggesting moral evil in God beyond what idiomatic English can bear.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
