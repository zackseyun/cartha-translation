id: RUT.1.21
reference: Ruth 1:21
source:
  edition: WLC
  text: אֲנִי֙ מְלֵאָ֣ה הָלַ֔כְתִּי וְ/רֵיקָ֖ם הֱשִׁיבַ֣/נִי יְהוָ֑ה לָ֣/מָּה תִקְרֶ֤אנָה לִ/י֙ נָעֳמִ֔י וַֽ/יהוָה֙ עָ֣נָה בִ֔/י וְ/שַׁדַּ֖י הֵ֥רַֽע לִֽ/י׃
translation:
  text: I went away full, but Yahweh has brought me back empty. Why do you call me Naomi, when Yahweh has testified against me and the Almighty has brought calamity on me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has borne witness against me.' The Hebrew verb can carry the sense of answering or testifying against someone.
    reason: lexical_alternative
  - marker: b
    text: Or 'has done me harm.' The Hebrew expression speaks of calamity or adversity brought upon Naomi.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְלֵאָה
  chosen: full
  alternatives:
  - filled
  - with fullness
  lexicon: HALOT
  rationale: Predicate adjective describing Naomi's former state. 'Full' is idiomatic English and preserves the contrast with 'empty.'
- source_word: הָלַכְתִּי
  chosen: I went away
  alternatives:
  - I went
  - I departed
  lexicon: HALOT
  rationale: The verb means 'I went/walked'; 'went away' makes the departure sense explicit in natural English without over-paraphrasing.
- source_word: וְרֵיקָם
  chosen: empty
  alternatives:
  - empty-handed
  - with nothing
  lexicon: HALOT
  rationale: Adverbial accusative meaning 'empty/empty-handed.' 'Empty' preserves the stark antithesis with 'full'; 'empty-handed' is possible but slightly more interpretive.
- source_word: הֱשִׁיבַנִי
  chosen: has brought me back
  alternatives:
  - has returned me
  - has caused me to return
  lexicon: HALOT
  rationale: Hiphil of שוב is causative, 'cause to return/bring back.' 'Has brought me back' is clear, idiomatic, and preserves divine agency.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָמָּה תִקְרֶאנָה לִי נָעֳמִי
  chosen: Why do you call me Naomi
  alternatives:
  - Why should you call me Naomi
  lexicon: HALOT
  rationale: Direct rhetorical question to the women of Bethlehem. 'Do you call' fits the imperfect in context and reads naturally in English.
- source_word: נָעֳמִי
  chosen: Naomi
  lexicon: HALOT
  rationale: Personal name is transliterated per translation philosophy. The meaning of the name ('pleasant') is relevant contextually but should not be imported into the main text.
- source_word: עָנָה בִי
  chosen: has testified against me
  alternatives:
  - has answered against me
  - has afflicted me
  - has borne witness against me
  lexicon: HALOT
  rationale: In this construction, the verb can carry a forensic sense of answering or testifying against someone. 'Has testified against me' best fits the context and avoids collapsing it into the following clause about calamity.
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: Divine title commonly rendered 'the Almighty.' Translating the title preserves meaning, in keeping with project philosophy.
- source_word: הֵרַע לִי
  chosen: has brought calamity on me
  alternatives:
  - has dealt bitterly with me
  - has done evil to me
  - has made things bad for me
  lexicon: HALOT
  rationale: Hiphil of רעע here indicates causing harm/disaster. 'Brought calamity on me' communicates the sense without implying moral evil in God; 'done evil to me' would be misleading in English.
