id: RUT.1.17
reference: Ruth 1:17
source:
  edition: WLC
  text: בַּ/אֲשֶׁ֤ר תָּמ֨וּתִי֙ אָמ֔וּת וְ/שָׁ֖ם אֶקָּבֵ֑ר כֹּה֩ יַעֲשֶׂ֨ה יְהוָ֥ה לִ/י֙ וְ/כֹ֣ה יֹסִ֔יף כִּ֣י הַ/מָּ֔וֶת יַפְרִ֖יד בֵּינִ֥/י וּ/בֵינֵֽ/ךְ׃
translation:
  text: Where you die, I will die, and there I will be buried. May Yahweh do so to me, and more also, if anything but death separates me from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'May the LORD do so to me, and so may he add.' This is a Hebrew oath formula invoking divine judgment.
    reason: lexical_alternative
  - marker: b
    text: Or, 'if anything except death separates me from you.'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּאֲשֶׁר
  chosen: Where
  alternatives:
  - In the place where
  - Wherever
  lexicon: HALOT
  rationale: 'With the prefixed ב and relative אֲשֶׁר, the phrase introduces location: ''in the place where.'' In idiomatic English, ''Where'' best captures the sense without unnecessary stiffness.'
- source_word: תָּמוּתִי / אָמוּת
  chosen: you die, I will die
  alternatives:
  - you die, I die
  lexicon: HALOT
  rationale: The paired forms of מות create a solemn parallel vow. Rendering with future sense in English preserves the volitional/committed force of the Hebrew.
- source_word: וְשָׁם
  chosen: and there
  alternatives:
  - and in that place
  lexicon: HALOT
  rationale: Simple locative continuation from the previous clause; 'and there' is natural and preserves the linkage.
- source_word: אֶקָּבֵר
  chosen: I will be buried
  alternatives:
  - I will be interred
  lexicon: HALOT
  rationale: Niphal of קבר is passive/reflexive in sense, so 'I will be buried' is the straightforward rendering.
- source_word: כֹּה יַעֲשֶׂה יְהוָה לִי וְכֹה יֹסִיף
  chosen: May the LORD do so to me, and more also
  alternatives:
  - Thus may the LORD do to me, and thus may he add
  - May the LORD do this to me, and even more
  lexicon: HALOT
  rationale: This is a conventional self-imprecatory oath formula. 'May the LORD do so to me, and more also' preserves the idiom's solemnity in readable English. 'The LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: if
  alternatives:
  - surely
  - indeed that
  lexicon: HALOT
  rationale: 'In oath contexts, כִּי can introduce the condition/content of the curse with the force ''if.'' English oath idiom requires ''if'' here: ''May the LORD... if...''.'
- source_word: הַמָּוֶת
  chosen: death
  alternatives:
  - the death
  lexicon: HALOT
  rationale: 'Although definite in Hebrew, English idiom omits the article in this construction: ''anything but death.'' The sense is death as the sole permitted separator.'
- source_word: יַפְרִיד
  chosen: separates
  alternatives:
  - parts
  - divides
  lexicon: HALOT
  rationale: Hiphil of פרד means to separate or divide. 'Separates' is the most natural relational term in this covenantal pledge.
- source_word: בֵּינִי וּבֵינֵךְ
  chosen: me from you
  alternatives:
  - between me and you
  lexicon: HALOT
  rationale: English expresses the relational separation more naturally as 'separates me from you' rather than the more literal 'between me and you.'
