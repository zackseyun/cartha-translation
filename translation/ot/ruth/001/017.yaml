theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of Ruth's oath formula
  chosen_reading: if anything but death separates me from you
  alternative_readings:
  - if death separates me from you
  - if anything except death parts me from you
  rationale: The clause idiomatically means that only death may sever the bond; the oath invokes judgment if any lesser cause separates them. This preserves the force of Ruth's covenantal commitment without flattening the Hebrew idiom.
