id: RUT.1.18
reference: Ruth 1:18
source:
  edition: WLC
  text: וַ/תֵּ֕רֶא כִּֽי מִתְאַמֶּ֥צֶת הִ֖יא לָ/לֶ֣כֶת אִתָּ֑/הּ וַ/תֶּחְדַּ֖ל לְ/דַבֵּ֥ר
    אֵלֶֽי/הָ־׃
translation:
  text: When she saw that she was determined to go with her, she stopped speaking
    to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'she ceased to speak to her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  chosen: When she saw
  alternatives:
  - And she saw
  - So she saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. English 'When she saw' captures
    both the temporal sense and smooth narrative flow better than a bare 'And she
    saw' in modern English.
- source_word: כִּי
  chosen: that
  alternatives:
  - when
  - because
  lexicon: HALOT
  rationale: 'Introduces the content of what Naomi perceived: ''that she was determined.''
    ''Because'' is possible in some contexts, but here the clause functions as the
    object of perception.'
- source_word: מִתְאַמֶּצֶת
  chosen: was determined
  alternatives:
  - was strengthening herself
  - was resolute
  - was making herself strong
  lexicon: HALOT
  rationale: The Hitpael of אמץ conveys strengthening oneself, hence resolve or determination.
    'Was determined' is idiomatic English that preserves the sense of firm resolve
    in context.
- source_word: הִיא
  chosen: she
  alternatives:
  - she herself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis to Ruth as the subject. English
    can convey this adequately without an explicit reflexive intensifier, since 'she
    was determined' already keeps the focus clear.
- source_word: לָלֶכֶת
  chosen: to go
  alternatives:
  - to walk
  lexicon: HALOT
  rationale: הלך commonly means 'go' in travel contexts. 'Walk' would be overly literal
    and less natural here.
- source_word: אִתָּהּ
  chosen: with her
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating Ruth's intention to accompany
    Naomi.
- source_word: וַתֶּחְדַּל
  chosen: she stopped
  alternatives:
  - she ceased
  - she refrained
  lexicon: HALOT
  rationale: חדל means to cease or stop. 'Stopped' is clear modern English and fits
    the narrative tone.
- source_word: לְדַבֵּר
  chosen: speaking
  alternatives:
  - to speak
  - talking
  lexicon: HALOT
  rationale: 'With חדל, English often uses a gerund: ''stopped speaking.'' This is
    more natural than ''ceased to speak'' while preserving the meaning.'
- source_word: אֵלֶיהָ
  chosen: to her
  alternatives:
  - with her
  lexicon: HALOT
  rationale: The preposition אֶל is directional, 'to/toward her.' In English, 'speaking
    to her' best reflects the Hebrew construction.
