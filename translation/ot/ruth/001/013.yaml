id: RUT.1.13
reference: Ruth 1:13
source:
  edition: WLC
  text: הֲ/לָהֵ֣ן תְּשַׂבֵּ֗רְנָה עַ֚ד אֲשֶׁ֣ר יִגְדָּ֔לוּ הֲ/לָהֵן֙ תֵּֽעָגֵ֔נָה לְ/בִלְתִּ֖י הֱי֣וֹת לְ/אִ֑ישׁ אַ֣ל בְּנֹתַ֗/י כִּֽי מַר לִ֤/י מְאֹד֙ מִ/כֶּ֔ם כִּֽי יָצְאָ֥ה בִ֖/י יַד יְהוָֽה׀־־־־׃
translation:
  text: Would you wait for them until they were grown? Would you refrain from belonging to a man for them? No, my daughters, for it is much more bitter for me than for you, because the hand of Yahweh has gone out against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Would you remain unmarried for them?' The Hebrew verb is rare and likely refers to holding back from marriage while waiting for future husbands.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּשַׂבֵּרְנָה
  chosen: would you wait
  alternatives:
  - would you hope
  - would you expect
  lexicon: HALOT
  rationale: From שׂבר in the sense of waiting/expecting. In context Naomi asks whether they would wait for hypothetical sons to grow up before marrying. 'Wait' best fits the practical force in English, while 'hope' is too abstract.
- source_word: עַד אֲשֶׁר יִגְדָּלוּ
  chosen: until they were grown
  alternatives:
  - until they grew up
  - until they became adults
  lexicon: HALOT
  rationale: Refers to the hypothetical sons reaching maturity. 'Were grown' is idiomatic and concise, preserving the temporal sense.
- source_word: תֵּעָגֵנָה
  chosen: would you keep yourselves from belonging to a man
  alternatives:
  - would you remain unmarried
  - would you shut yourselves off from having a husband
  lexicon: HALOT
  rationale: From עגן, a rare verb traditionally understood here as remaining unmarried/withholding oneself from marriage. The infinitive phrase לבלתי היות לאיש clarifies the sense. The chosen rendering keeps the marriage-oriented meaning explicit without over-paraphrasing.
- source_word: לְבִלְתִּי הֱיוֹת לְאִישׁ
  chosen: from belonging to a man
  alternatives:
  - from being for a husband
  - from being married to a man
  lexicon: HALOT
  rationale: Literally 'from being to a man.' This idiom refers to entering marriage. 'Belonging to a man' preserves the relational idiom more closely than the smoother but less literal 'remain unmarried.'
- source_word: אַל־בְּנֹתַי
  chosen: No, my daughters
  alternatives:
  - Do not, my daughters
  - No, daughters of mine
  lexicon: HALOT
  rationale: The particle אַל here functions idiomatically in Naomi's emotional refusal rather than as a simple prohibition. 'No, my daughters' captures the discourse force naturally in English.
- source_word: כִּי מַר־לִי מְאֹד מִכֶּם
  chosen: for it is far more bitter for me than for you
  alternatives:
  - for it is much more bitter for me than for you
  - for my lot is much more bitter than yours
  lexicon: HALOT
  rationale: Expresses Naomi's condition as more bitter than that of Ruth and Orpah. The comparative sense of מִכֶּם is best brought out explicitly as 'than for you.'
- source_word: יָצְאָה בִי יַד יְהוָה
  chosen: the hand of the LORD has gone out against me
  alternatives:
  - the hand of the LORD has come out against me
  - the LORD's hand has turned against me
  lexicon: HALOT
  rationale: A Hebrew idiom for divine action in affliction. 'Gone out against me' preserves the verbal imagery of יצא while making the adversative force explicit in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
