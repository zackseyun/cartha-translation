  chosen_reading: because the hand of the LORD has gone out against me
  alternative_readings:
  - because the LORD's hand has turned against me
  rationale: The Hebrew explicitly attributes Naomi's affliction to the LORD's hand. The translation preserves that theological tension without softening or systematizing it.
  doctrine_reference: Preserve theological tension rather than resolve it; יְהוָה default 'the LORD'
