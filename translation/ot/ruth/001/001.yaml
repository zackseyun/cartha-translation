id: RUT.1.1
reference: Ruth 1:1
source:
  edition: WLC
  text: וַ/יְהִ֗י בִּ/ימֵי֙ שְׁפֹ֣ט הַ/שֹּׁפְטִ֔ים וַ/יְהִ֥י רָעָ֖ב בָּ/אָ֑רֶץ וַ/יֵּ֨לֶךְ
    אִ֜ישׁ מִ/בֵּ֧ית לֶ֣חֶם יְהוּדָ֗ה לָ/גוּר֙ בִּ/שְׂדֵ֣י מוֹאָ֔ב ה֥וּא וְ/אִשְׁתּ֖/וֹ
    וּ/שְׁנֵ֥י בָנָֽי/ו׃
translation:
  text: Now it happened in the days when the judges judged that there was a famine
    in the land, and a man went from Bethlehem of Judah to sojourn in the fields of
    Moab—he and his wife and his two sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''when the judges ruled.'' The Hebrew repeats the same root (''judge'')
      in an idiomatic construction: literally, ''when the judges judged.'''
    reason: lexical_alternative
  - marker: b
    text: '''Sojourn'' suggests temporary residence as an outsider, not necessarily
      permanent settlement.'
    reason: cultural_note
  - marker: c
    text: Or 'in the territory/country of Moab.' Literally, 'in the fields of Moab.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now it happened
  alternatives:
  - And it happened
  - It came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the story. 'Now it happened' preserves
    the Hebrew narrative opening in readable modern English without archaic 'it came
    to pass.'
- source_word: בִּימֵי
  chosen: in the days
  alternatives:
  - during the time
  lexicon: HALOT
  rationale: Temporal idiom with יום in construct; 'in the days' is the standard and
    natural rendering.
- source_word: שְׁפֹט הַשֹּׁפְטִים
  chosen: when the judges judged
  alternatives:
  - when the judges ruled
  - during the rule of the judges
  lexicon: HALOT
  rationale: The Hebrew uses the infinitive construct plus finite form of שׁפט for
    emphasis. 'When the judges judged' preserves the verbal repetition and leaves
    the semantic range broad; 'ruled' is smoother but loses the lexical echo.
- source_word: רָעָב
  chosen: famine
  alternatives:
  - hunger
  lexicon: HALOT
  rationale: Standard rendering for a severe food shortage affecting a region; 'famine'
    is the established and precise English equivalent.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ
  - in the country
  lexicon: HALOT
  rationale: '''The land'' is the natural rendering of הארץ here and likely refers
    to the land of Judah/Israel in the narrative setting. ''Country'' is possible
    but less biblically textured.'
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: Gender-accurate singular noun referring to a specific male individual
    later identified as Elimelech. Per translation philosophy, masculine reference
    is preserved rather than neutralized.
- source_word: מִבֵּית לֶחֶם יְהוּדָה
  chosen: from Bethlehem of Judah
  alternatives:
  - from Bethlehem in Judah
  - from Beth-lehem Judah
  lexicon: HALOT
  rationale: Personal/place names are transliterated. The construct-like place designation
    distinguishes this Bethlehem from others; 'of Judah' closely follows the Hebrew.
- source_word: לָגוּר
  chosen: to sojourn
  alternatives:
  - to reside temporarily
  - to stay
  - to live as a foreigner
  lexicon: HALOT
  rationale: גור often denotes temporary residence or living as an outsider rather
    than permanent settlement. 'Sojourn' best preserves that nuance, despite being
    slightly elevated diction.
- source_word: בִּשְׂדֵי מוֹאָב
  chosen: in the fields of Moab
  alternatives:
  - in the territory of Moab
  - in the country of Moab
  lexicon: HALOT
  rationale: שָׂדֶה in plural construct is literally 'fields.' While it can metonymically
    indicate the region, retaining 'fields' preserves the concrete Hebrew expression
    and the agrarian setting.
- source_word: הוּא וְאִשְׁתּוֹ וּשְׁנֵי בָנָיו
  chosen: he and his wife and his two sons
  alternatives:
  - together with his wife and two sons
  lexicon: HALOT
  rationale: The Hebrew appositional phrase explicitly lists the family members accompanying
    him. The chosen rendering keeps the simple additive structure of the source.
