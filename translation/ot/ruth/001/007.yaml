id: RUT.1.7
reference: Ruth 1:7
source:
  edition: WLC
  text: וַ/תֵּצֵ֗א מִן הַ/מָּקוֹם֙ אֲשֶׁ֣ר הָיְתָה שָׁ֔מָּ/ה וּ/שְׁתֵּ֥י כַלֹּתֶ֖י/הָ
    עִמָּ֑/הּ וַ/תֵּלַ֣כְנָה בַ/דֶּ֔רֶךְ לָ/שׁ֖וּב אֶל אֶ֥רֶץ יְהוּדָֽה־־־׃
translation:
  text: So she went out from the place where she had been, and her two daughters-in-law
    with her, and they went on the way to return to the land of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'So she left the place where she had been.' The Hebrew
      verb is literally 'went out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּצֵא
  chosen: So she went out
  alternatives:
  - Then she went out
  - And she went out
  - So she left
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Went out' preserves the
    concrete motion of יצא better than the more interpretive 'left.' 'So' captures
    the narrative linkage to the prior verse in natural English.
- source_word: מִן־הַמָּקוֹם
  chosen: from the place
  alternatives:
  - from that place
  - from the place there
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition plus noun. The article
    is preserved with 'the place.'
- source_word: אֲשֶׁר הָיְתָה שָׁמָּה
  chosen: where she had been
  alternatives:
  - where she was
  - in which she had been there
  lexicon: HALOT
  rationale: This relative clause identifies the place by Naomi's prior residence.
    English idiom prefers 'where she had been' over a more wooden 'which she was there.'
    The pluperfect-like sense fits the narrative transition from residence to departure.
- source_word: וּשְׁתֵּי כַלֹּתֶיהָ עִמָּהּ
  chosen: and her two daughters-in-law with her
  alternatives:
  - with her two daughters-in-law
  - and her two brides with her
  lexicon: HALOT
  rationale: כַּלָּה in this context means 'daughter-in-law,' not 'bride.' The phrase
    order is kept fairly close to the Hebrew while remaining natural.
- source_word: וַתֵּלַכְנָה
  chosen: and they went
  alternatives:
  - and they walked
  - and they set out
  lexicon: HALOT
  rationale: The feminine plural verb refers to Naomi and her daughters-in-law together.
    'Went' is the most natural narrative equivalent; 'walked' is too specific and
    'set out' adds nuance not explicit in the verb alone.
- source_word: בַּדֶּרֶךְ
  chosen: on the way
  alternatives:
  - on the road
  - along the way
  lexicon: HALOT
  rationale: The phrase is idiomatic for being on the journey/road. 'On the way' is
    natural English and preserves the concrete travel setting.
- source_word: לָשׁוּב
  chosen: to return
  alternatives:
  - to go back
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return.' This keeps the thematic importance of
    return in Ruth 1 without flattening it to the more colloquial 'go back.'
- source_word: אֶל־אֶרֶץ יְהוּדָה
  chosen: to the land of Judah
  alternatives:
  - to Judah
  - to the country of Judah
  lexicon: HALOT
  rationale: אֶרֶץ is retained as 'land' rather than omitted, since the Hebrew explicitly
    names the destination as the land/territory of Judah.
