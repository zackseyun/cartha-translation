id: RUT.1.19
reference: Ruth 1:19
source:
  edition: WLC
  text: וַ/תֵּלַ֣כְנָה שְׁתֵּי/הֶ֔ם עַד בֹּאָ֖/נָה בֵּ֣ית לָ֑חֶם וַ/יְהִ֗י כְּ/בֹאָ֨/נָה֙
    בֵּ֣ית לֶ֔חֶם וַ/תֵּהֹ֤ם כָּל הָ/עִיר֙ עֲלֵי/הֶ֔ן וַ/תֹּאמַ֖רְנָה הֲ/זֹ֥את נָעֳמִֽי־־׃
translation:
  text: So the two of them went on until they came to Bethlehem. And when they came
    to Bethlehem, the whole town was stirred because of them, and the women said,
    “Is this Naomi?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and they said'' is feminine plural, indicating that the speakers
      are women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלַכְנָה
  chosen: went on
  alternatives:
  - went
  - walked
  lexicon: HALOT
  rationale: הלך in the wayyiqtol narrative sequence denotes continued travel. 'Went
    on' captures the progression of the journey in natural English without over-paraphrasing.
- source_word: שְׁתֵּיהֶם
  chosen: the two of them
  alternatives:
  - both of them
  lexicon: HALOT
  rationale: The idiom explicitly marks the pair together. 'The two of them' is a
    clear, natural rendering that preserves the emphasis on Naomi and Ruth as a pair.
- source_word: עַד בֹּאנָה
  chosen: until they came
  alternatives:
  - until they arrived
  - as far as their coming
  lexicon: HALOT
  rationale: The preposition עַד with בוא marks the endpoint of the journey. 'Until
    they came' is straightforward and close to the Hebrew syntax.
- source_word: בֵּית לָחֶם
  chosen: Bethlehem
  lexicon: HALOT
  rationale: This is the place name, transliterated according to the translation philosophy
    for personal and place names rather than translated as 'house of bread.'
- source_word: וַיְהִי כְּבֹאנָה
  chosen: And when they came
  alternatives:
  - Now when they came
  - And it happened, when they came
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces the next event. 'And when they
    came' preserves the temporal force while avoiding wooden English like 'and it
    happened.'
- source_word: וַתֵּהֹם
  chosen: was stirred
  alternatives:
  - was in an uproar
  - was excited
  - was agitated
  lexicon: HALOT
  rationale: From המה, the verb conveys commotion or agitation. 'Was stirred' fits
    the town's emotional reaction and is idiomatic in English; 'uproar' would sound
    too strong, implying disorder beyond the text.
- source_word: כָּל הָעִיר
  chosen: the whole town
  alternatives:
  - all the city
  - the whole city
  lexicon: HALOT
  rationale: Though עִיר often means 'city,' Bethlehem in this narrative setting is
    better rendered 'town' in contemporary English. 'Whole town' communicates the
    communal reaction naturally.
- source_word: עֲלֵיהֶן
  chosen: because of them
  alternatives:
  - about them
  - over them
  lexicon: HALOT
  rationale: The preposition עַל here marks the cause or occasion of the commotion.
    'Because of them' best conveys that the town was stirred on account of Naomi and
    Ruth's arrival.
- source_word: וַתֹּאמַרְנָה
  chosen: the women said
  alternatives:
  - they said
  lexicon: HALOT
  rationale: The verb is feminine plural, so the speakers are specifically women.
    English should make that explicit rather than flattening the gendered detail into
    'they said,' in keeping with the gender-accurate principle.
- source_word: הֲזֹאת נָעֳמִי
  chosen: Is this Naomi?
  alternatives:
  - Can this be Naomi?
  - Is this really Naomi?
  lexicon: HALOT
  rationale: The interrogative with demonstrative expresses astonished recognition.
    'Is this Naomi?' is the most direct rendering; stronger expansions like 'really'
    are interpretive and not required by the Hebrew.
