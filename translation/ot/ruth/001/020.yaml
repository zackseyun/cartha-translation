theological_decisions:
- issue: Rendering of the divine title שַׁדַּי
  chosen_reading: the Almighty
  alternative_readings:
  - Shaddai
  rationale: The term is a divine title, not a personal name. Per translation philosophy,
    titles are translated to preserve meaning. 'The Almighty' is the conventional
    and semantically transparent rendering in this context.
  doctrine_reference: Translation philosophy §2 (Translate titles; transliterate names)
