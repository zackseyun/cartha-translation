id: RUT.1.20
reference: Ruth 1:20
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר אֲלֵי/הֶ֔ן אַל תִּקְרֶ֥אנָה לִ֖/י נָעֳמִ֑י קְרֶ֤אןָ לִ/י֙ מָרָ֔א
    כִּי הֵמַ֥ר שַׁדַּ֛י לִ֖/י מְאֹֽד־־׃
translation:
  text: But she said to them, “Do not call me Naomi; call me Mara, for the Almighty
    has dealt very bitterly with me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Naomi means something like “pleasant,” while Mara means “bitter.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: But she said
  alternatives:
  - And she said
  - Then she said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the discourse
    context, marking Naomi's corrective response to the women’s greeting more naturally
    than a simple 'and.'
- source_word: אֲלֵיהֶן
  chosen: to them
  alternatives:
  - to them (feminine)
  - to the women
  lexicon: HALOT
  rationale: The pronominal suffix is feminine plural, referring to the women of Bethlehem
    in context. English normally does not mark feminine plural in the pronoun, so
    'to them' is idiomatic; the feminine referent is contextually clear.
- source_word: אַל תִּקְרֶאנָה לִי
  chosen: Do not call me
  alternatives:
  - Do not name me
  - Do not address me as
  lexicon: HALOT
  rationale: קרא with a personal object and name means 'call/name.' 'Do not call me'
    is the most natural English rendering in this direct-speech context.
- source_word: נָעֳמִי
  chosen: Naomi
  lexicon: HALOT
  rationale: Personal name is transliterated per translation philosophy. The name's
    association with pleasantness is not made explicit in the Hebrew here, so it is
    left untranslated in the main text.
- source_word: קְרֶאןָ לִי
  chosen: call me
  alternatives:
  - name me
  - call me by the name
  lexicon: HALOT
  rationale: Imperative parallel to the previous clause; repeating 'call me' preserves
    the rhetorical contrast between the two names.
- source_word: מָרָא
  chosen: Mara
  alternatives:
  - Bitter
  - Marah
  lexicon: HALOT
  rationale: As a replacement personal designation, it is best transliterated as 'Mara'
    rather than translated as 'Bitter.' 'Marah' is possible by association with Exodus
    15:23, but the consonantal form here is naturally represented as 'Mara.' The meaning
    is preserved in a footnote.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces Naomi's reason for the renaming. 'For' is concise and preserves
    the explanatory force.
- source_word: הֵמַר
  chosen: has dealt very bitterly
  alternatives:
  - has made bitter
  - has embittered
  - has dealt bitterly
  lexicon: HALOT
  rationale: The Hiphil of מרר can mean 'make bitter' or 'deal bitterly.' With לִי
    and in this idiom, 'has dealt very bitterly with me' best captures the experiential
    sense in natural English while preserving the bitterness wordplay with 'Mara.'
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: This divine title is translated rather than transliterated, following
    the philosophy of translating titles to preserve meaning. 'The Almighty' is the
    standard and contextually fitting rendering.
- source_word: לִי
  chosen: with me
  alternatives:
  - to me
  - for me
  lexicon: HALOT
  rationale: Although literally 'to me/for me,' English idiom with 'deal bitterly'
    takes 'with me.' This reflects the relational sense without distorting the Hebrew.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - exceedingly
  - greatly
  lexicon: HALOT
  rationale: מְאֹד intensifies the verb. 'Very' is clear, natural modern English and
    preserves the emphasis.
