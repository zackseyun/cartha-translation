id: RUT.1.6
reference: Ruth 1:6
source:
  edition: WLC
  text: וַ/תָּ֤קָם הִיא֙ וְ/כַלֹּתֶ֔י/הָ וַ/תָּ֖שָׁב מִ/שְּׂדֵ֣י מוֹאָ֑ב כִּ֤י שָֽׁמְעָה֙ בִּ/שְׂדֵ֣ה מוֹאָ֔ב כִּֽי פָקַ֤ד יְהוָה֙ אֶת עַמּ֔/וֹ לָ/תֵ֥ת לָ/הֶ֖ם לָֽחֶם־־׃
translation:
  text: Then she arose with her daughters-in-law and returned from the fields of Moab, because in the field of Moab she had heard that Yahweh had visited his people to give them food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "bread"; Hebrew lechem often means bread specifically, but can also refer more broadly to food or provisions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּקָם
  chosen: Then she arose
  alternatives:
  - Then she got up
  - So she arose
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום marks the next event in narrative sequence. 'Arose' preserves the narrative movement with slightly formal dignity; 'Then' brings out the wayyiqtol progression.
- source_word: וְכַלֹּתֶיהָ
  chosen: with her daughters-in-law
  alternatives:
  - and her daughters-in-law
  lexicon: HALOT
  rationale: 'The conjunction with the following noun is rendered idiomatically as accompaniment in English: she arose together with her daughters-in-law.'
- source_word: וַתָּשָׁב
  chosen: returned
  alternatives:
  - went back
  - turned back
  lexicon: HALOT
  rationale: שׁוב commonly means 'return/turn back.' 'Returned' is the most natural English rendering here and fits the geographic movement back toward Judah.
- source_word: מִשְּׂדֵי מוֹאָב
  chosen: from the fields of Moab
  alternatives:
  - from the country of Moab
  - from the territory of Moab
  lexicon: HALOT
  rationale: שׂדה literally means 'field' and in plural can denote open country/region. 'Fields of Moab' keeps the concrete Hebrew image while remaining understandable. The same noun recurs later in the verse, so consistency favors 'field(s)' rather than flattening both to 'country.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for Naomi's return. 'Because' is clearer in modern English than 'for' while preserving the causal sense.
- source_word: שָׁמְעָה
  chosen: she had heard
  alternatives:
  - she heard
  lexicon: HALOT
  rationale: The qatal verb gives the background reason for the preceding action; English past perfect naturally conveys that prior circumstance.
- source_word: בִּשְׂדֵה מוֹאָב
  chosen: in the field of Moab
  alternatives:
  - in the land of Moab
  - while in Moab
  lexicon: HALOT
  rationale: Singular שׂדה is retained as 'field' to mirror the Hebrew wording and the repeated imagery. English singular here can function collectively or regionally. A smoother dynamic option would be 'while in Moab,' but the chosen rendering stays closer to the source.
- source_word: פָּקַד
  chosen: had visited
  alternatives:
  - had attended to
  - had come to the aid of
  - had taken note of
  lexicon: HALOT
  rationale: פקד in this context denotes the LORD's favorable intervention on behalf of his people. 'Visited' preserves the covenantal nuance and biblical diction without over-interpreting the exact mode of help.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his nation
  lexicon: HALOT
  rationale: עם in covenant contexts is best rendered 'people,' preserving relational and covenantal overtones.
- source_word: לָתֵת לָהֶם לָחֶם
  chosen: to give them food
  alternatives:
  - to give them bread
  lexicon: HALOT
  rationale: לֶחֶם literally means 'bread,' but in many contexts it stands metonymically for food/provisions. Here the point is the end of famine and provision generally, so 'food' communicates the sense clearly in modern English. The more literal 'bread' is preserved in a footnote because it is a significant lexical alternative.
