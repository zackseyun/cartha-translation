id: RUT.1.5
reference: Ruth 1:5
source:
  edition: WLC
  text: וַ/יָּמ֥וּתוּ גַם שְׁנֵי/הֶ֖ם מַחְל֣וֹן וְ/כִלְי֑וֹן וַ/תִּשָּׁאֵר֙ הָֽ/אִשָּׁ֔ה
    מִ/שְּׁנֵ֥י יְלָדֶ֖י/הָ וּ/מֵ/אִישָֽׁ/הּ־׃
translation:
  text: Then both of them also died, Mahlon and Chilion, and the woman was left without
    her two children and without her husband.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without her two sons.' The Hebrew says 'her two children,' using a term
      that can refer to offspring more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמ֥וּתוּ
  chosen: Then ... died
  alternatives:
  - and ... died
  - so ... died
  lexicon: HALOT
  rationale: Wayyiqtol of מוּת advances the narrative with a past tense event. 'Then
    ... died' gives natural English narrative sequence while preserving the verbal
    force.
- source_word: גַם
  chosen: also
  alternatives:
  - too
  - indeed
  lexicon: HALOT
  rationale: גַם adds the sense that this death comes in addition to prior loss in
    the context. 'Also' is the most straightforward English equivalent.
- source_word: שְׁנֵיהֶם
  chosen: both of them
  alternatives:
  - the two of them
  - both
  lexicon: HALOT
  rationale: The dual expression explicitly marks both sons together. 'Both of them'
    preserves the emphasis clearly in English.
- source_word: מַחְלוֹן וְכִלְיוֹן
  chosen: Mahlon and Chilion
  rationale: Personal names are transliterated by standard English conventions per
    project philosophy.
- source_word: וַתִּשָּׁאֵר
  chosen: was left
  alternatives:
  - remained
  - was left behind
  lexicon: HALOT
  rationale: From שׁאר, 'remain/be left over.' In this bereavement context, 'was left'
    best conveys Naomi's surviving in a state of loss, more idiomatically than 'remained.'
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  - Naomi
  lexicon: HALOT
  rationale: The Hebrew says 'the woman,' not Naomi by name. 'Wife' would over-specify
    the relational sense here, while 'the woman' preserves the narrator's wording.
- source_word: מִשְּׁנֵי יְלָדֶיהָ
  chosen: without her two children
  alternatives:
  - bereft of her two sons
  - from her two children
  lexicon: HALOT
  rationale: 'The preposition with שׁאר expresses separation/loss: she was left deprived
    of them. יְלָדִים can mean children/offspring; although these are adult sons,
    ''children'' reflects the Hebrew term directly and preserves the mother''s perspective.
    ''Sons'' is possible but less literal to the chosen noun.'
- source_word: וּמֵאִישָׁהּ
  chosen: and without her husband
  alternatives:
  - and from her husband
  - and without her man
  lexicon: HALOT
  rationale: אִישׁ here in possessive relation means 'husband.' The repeated preposition
    continues the sense of deprivation, so English 'without her husband' communicates
    the idiom naturally.
