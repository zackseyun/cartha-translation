id: RUT.1.4
reference: Ruth 1:4
source:
  edition: WLC
  text: וַ/יִּשְׂא֣וּ לָ/הֶ֗ם נָשִׁים֙ מֹֽאֲבִיּ֔וֹת שֵׁ֤ם הָֽ/אַחַת֙ עָרְפָּ֔ה וְ/שֵׁ֥ם
    הַ/שֵּׁנִ֖ית ר֑וּת וַ/יֵּ֥שְׁבוּ שָׁ֖ם כְּ/עֶ֥שֶׂר שָׁנִֽים׃
translation:
  text: And they took for themselves Moabite wives. The name of the one was Orpah,
    and the name of the second was Ruth. And they lived there about ten years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they married Moabite women.' The Hebrew literally says 'they took for
      themselves Moabite wives.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂאוּ
  chosen: they took
  alternatives:
  - they married
  lexicon: HALOT
  rationale: The verb נָשָׂא with נשים is an idiom for taking wives, i.e., marrying.
    'They took' preserves the Hebrew expression more transparently, while the object
    'wives' makes the marital sense clear without needing to paraphrase as 'they married.'
- source_word: לָהֶם
  chosen: for themselves
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The dative pronoun marks personal involvement/advantage. 'For themselves'
    reflects the Hebrew idiom naturally in English and preserves the reflexive nuance
    of taking wives for themselves.
- source_word: נָשִׁים מֹאֲבִיּוֹת
  chosen: Moabite wives
  alternatives:
  - wives from Moab
  - Moabite women
  lexicon: HALOT
  rationale: The phrase identifies the women as wives and as ethnically/nationally
    Moabite. 'Moabite wives' is concise and faithful to both elements.
- source_word: שֵׁם הָאַחַת
  chosen: The name of the one was
  alternatives:
  - One was named
  - the name of the first was
  lexicon: HALOT
  rationale: This reproduces the Hebrew naming formula with readable English. 'The
    one' matches אַחַת more closely than 'the first,' since the verse contrasts one
    and the second.
- source_word: עָרְפָּה
  chosen: Orpah
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: וְשֵׁם הַשֵּׁנִית
  chosen: and the name of the second was
  alternatives:
  - and the other was named
  - and the name of the other was
  lexicon: HALOT
  rationale: הַשֵּׁנִית is ordinal, 'the second.' Rendering it explicitly preserves
    the structure of the Hebrew parallelism.
- source_word: רוּת
  chosen: Ruth
  rationale: Personal name transliterated by standard English convention.
- source_word: וַיֵּשְׁבוּ שָׁם
  chosen: And they lived there
  alternatives:
  - and they stayed there
  - and they dwelt there
  lexicon: HALOT
  rationale: יָשַׁב commonly means to dwell/live/remain. 'Lived there' is natural
    modern English and fits the context of an extended residence.
- source_word: כְּעֶשֶׂר שָׁנִים
  chosen: about ten years
  alternatives:
  - some ten years
  - approximately ten years
  - for ten years
  lexicon: HALOT
  rationale: The prefixed כ marks approximation here, so 'about ten years' is more
    precise than a flat 'ten years.'
