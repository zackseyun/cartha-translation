id: 1CH.29.19
reference: 1 Chronicles 29:19
source:
  edition: WLC
  text: וְ/לִ/שְׁלֹמֹ֣ה בְנִ֗/י תֵּ֚ן לֵבָ֣ב שָׁלֵ֔ם לִ/שְׁמוֹר֙ מִצְוֺתֶ֔י/ךָ עֵדְוֺתֶ֖י/ךָ
    וְ/חֻקֶּ֑י/ךָ וְ/לַ/עֲשׂ֣וֹת הַ/כֹּ֔ל וְ/לִ/בְנ֖וֹת הַ/בִּירָ֥ה אֲשֶׁר הֲכִינֽוֹתִי־׃פ
translation:
  text: And give to Solomon my son a whole heart to keep your commandments, your testimonies,
    and your statutes, and to do all of them, and to build the temple-fortress that
    I have prepared.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'palace' or simply 'temple' for 'the temple-fortress.' The Hebrew term
      is an unusual word for a grand or fortified structure and here refers to the
      sanctuary David prepared for Solomon to build.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִשְׁלֹמֹה בְנִי
  chosen: And give to Solomon my son
  alternatives:
  - And to Solomon my son, give
  - And give Solomon my son
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition marks the indirect object of
    the prayer request. 'Solomon' is transliterated as a personal name per translation
    philosophy; 'my son' is retained explicitly.
- source_word: תֵּן
  chosen: give
  alternatives:
  - grant
  lexicon: HALOT
  rationale: נתן in prayer commonly means 'give'; 'grant' is possible but 'give' is
    more direct and closer to the Hebrew while remaining natural English.
- source_word: לֵבָב שָׁלֵם
  chosen: a whole heart
  alternatives:
  - a perfect heart
  - a complete heart
  - an undivided heart
  lexicon: HALOT
  rationale: לֵבָב denotes the inner will/mind/heart, and שָׁלֵם conveys wholeness,
    completeness, and integrity. 'A whole heart' preserves the concrete metaphor and
    avoids archaic 'perfect heart.' 'Undivided heart' is interpretive and possible,
    but the Hebrew adjective more basically denotes completeness/integrity.
- source_word: לִשְׁמוֹר
  chosen: to keep
  alternatives:
  - to observe
  - to guard
  lexicon: HALOT
  rationale: שׁמר with commandments regularly means 'keep/observe.' 'Keep' is the
    most idiomatic and standard covenantal rendering in English.
- source_word: מִצְוֺתֶיךָ
  chosen: your commandments
  alternatives:
  - your commands
  lexicon: HALOT
  rationale: מצוה is well represented by 'commandment' in covenantal contexts; this
    preserves the formal distinction from the following legal terms.
- source_word: עֵדְוֺתֶיךָ
  chosen: your testimonies
  alternatives:
  - your decrees
  - your covenant stipulations
  lexicon: HALOT
  rationale: עדות is often rendered 'testimonies' in biblical legal/covenantal diction.
    Though less common in modern English, it preserves the lexical distinction from
    commandments and statutes.
- source_word: וְחֻקֶּיךָ
  chosen: and your statutes
  alternatives:
  - and your decrees
  lexicon: HALOT
  rationale: חקים are fixed prescriptions; 'statutes' is the standard English equivalent
    and keeps distinction from the other terms.
- source_word: וְלַעֲשׂוֹת הַכֹּל
  chosen: and to do all of them
  alternatives:
  - and to do it all
  - and to carry out everything
  lexicon: HALOT
  rationale: The phrase literally means 'and to do the whole/all.' Because the immediate
    referents are plural commandments/testimonies/statutes, 'all of them' makes the
    object explicit in natural English without adding new content.
- source_word: וְלִבְנוֹת הַבִּירָה
  chosen: and to build the temple-fortress
  alternatives:
  - and to build the palace
  - and to build the temple
  lexicon: HALOT
  rationale: בִּירָה can denote a citadel, fortress, or palace-like fortified structure.
    In this context it refers to the temple complex David has prepared for, not a
    royal residence. 'Temple-fortress' preserves the unusual term and signals that
    it is the sanctuary structure, while avoiding the misleading implication of a
    secular palace.
- source_word: אֲשֶׁר הֲכִינוֹתִי
  chosen: that I have prepared
  alternatives:
  - which I have made ready
  - for which I have made preparation
  lexicon: HALOT
  rationale: כון in the Hiphil means to prepare or make ready. The perfect is naturally
    rendered 'have prepared' in English.
