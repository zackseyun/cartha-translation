theological_decisions:
- issue: Rendering of בִּירָה in relation to the Jerusalem sanctuary
  chosen_reading: temple-fortress
  alternative_readings:
  - palace
  - temple
  rationale: The term can suggest a fortified or palace-like structure. In Chronicles
    it refers to the sanctuary project David prepared for. Rendering it simply 'palace'
    could mislead readers toward a royal residence; rendering it only 'temple' loses
    the distinct lexical nuance. 'Temple-fortress' preserves both the cultic referent
    and the marked vocabulary.
  doctrine_reference: Translation philosophy §1, §5
