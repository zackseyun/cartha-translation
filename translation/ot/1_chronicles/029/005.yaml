id: 1CH.29.5
reference: 1 Chronicles 29:5
source:
  edition: WLC
  text: לַ/זָּהָ֤ב לַ/זָּהָב֙ וְ/לַ/כֶּ֣סֶף לַ/כֶּ֔סֶף וּ/לְ/כָל מְלָאכָ֖ה בְּ/יַ֣ד חָרָשִׁ֑ים וּ/מִ֣י מִתְנַדֵּ֔ב לְ/מַלֹּ֥אות יָד֛/וֹ הַ/יּ֖וֹם לַ/יהוָֽה־׃
translation:
  text: gold for the things of gold, and silver for the things of silver, and for every kind of work by the hands of craftsmen. And who is willing to fill his hand today for Yahweh?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to fill his hand.' This Hebrew idiom can refer to consecration or presenting an offering for sacred service.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַזָּהָב ... לַזָּהָב
  chosen: gold for the things of gold
  alternatives:
  - gold for gold
  - gold for the goldwork
  lexicon: HALOT
  rationale: The repeated phrase is elliptical, referring to gold designated for objects made of gold. Supplying 'the things of' makes the sense clear in English without over-paraphrasing.
- source_word: וְלַכֶּסֶף לַכֶּסֶף
  chosen: and silver for the things of silver
  alternatives:
  - and silver for silver
  - and silver for the silverwork
  lexicon: HALOT
  rationale: Parallel to the gold phrase; the repetition indicates silver intended for items made of silver.
- source_word: וּלְכָל מְלָאכָה
  chosen: and for every kind of work
  alternatives:
  - and for all workmanship
  - and for every task
  lexicon: HALOT
  rationale: מְלָאכָה here refers to workmanship or labor involved in the temple project. 'Every kind of work' is natural English and preserves the broad scope.
- source_word: בְּיַד חָרָשִׁים
  chosen: by the hands of craftsmen
  alternatives:
  - in the hand of craftsmen
  - by craftsmen
  - under the direction of craftsmen
  lexicon: HALOT
  rationale: The idiom literally uses 'hand,' but in context it indicates execution by skilled workers. 'By the hands of craftsmen' preserves the Hebrew imagery while remaining understandable.
- source_word: וּמִי מִתְנַדֵּב
  chosen: And who is willing
  alternatives:
  - And who volunteers
  - And who offers himself freely
  lexicon: HALOT
  rationale: The hitpael of נדב conveys freewill offering or willingness. 'Who is willing' fits the rhetorical appeal and reads naturally in English.
- source_word: לְמַלֹּאות יָדוֹ
  chosen: to consecrate his hand
  alternatives:
  - to fill his hand
  - to ordain himself
  - to make a full offering
  lexicon: HALOT
  rationale: The idiom literally means 'to fill the hand' and is used for installation or dedicatory offering. Here David calls for a voluntary act of dedication to temple service/giving. 'Consecrate his hand' preserves the idiom's cultic force better than a flattened paraphrase, while the literal alternative is preserved in a footnote.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Standard temporal adverb; 'today' is clear modern English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD' in the main text, following the project's default rendering.
