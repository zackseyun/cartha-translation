- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Handling the cultic idiom לְמַלֹּאות יָדוֹ
  chosen_reading: to consecrate his hand
  alternative_readings:
  - to fill his hand
  - to consecrate himself
  rationale: The phrase is a temple-related idiom for dedicatory offering or consecration. Rendering it with explicit consecratory language preserves the religious force without reducing it to mere financial volunteering.
