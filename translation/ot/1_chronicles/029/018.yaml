id: 1CH.29.18
reference: 1 Chronicles 29:18
source:
  edition: WLC
  text: יְהוָ֗ה אֱ֠לֹהֵי אַבְרָהָ֞ם יִצְחָ֤ק וְ/יִשְׂרָאֵל֙ אֲבֹתֵ֔י/נוּ שֳׁמְרָ/ה זֹּ֣את לְ/עוֹלָ֔ם לְ/יֵ֥צֶר מַחְשְׁב֖וֹת לְבַ֣ב עַמֶּ֑/ךָ וְ/הָכֵ֥ן לְבָבָ֖/ם אֵלֶֽי/ךָ־׃
translation:
  text: O LORD, God of Abraham, Isaac, and Israel, our fathers, keep this forever as the inclination of the thoughts of the heart of your people, and direct their heart toward you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew “Israel”; many readers may expect “Jacob” in this patriarchal formula, but the text here reads “Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “keep this forever as the inclination of the thoughts of the heart of your people.”
    reason: alternative_reading
  - marker: c
    text: Or “establish their heart toward you.”
    reason: lexical_alternative
  - marker: d
    text: Or 'in the intentions of the thoughts of the heart of your people'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as “LORD” per doctrine default for the divine name, following established English convention for YHWH while signaling the covenant name.
- source_word: אֱלֹהֵי
  chosen: God of
  alternatives:
  - God, the God of
  lexicon: HALOT
  rationale: Construct form with the following patriarchal names; “God of” is the natural English equivalent.
- source_word: אַבְרָהָם יִצְחָק וְיִשְׂרָאֵל אֲבֹתֵינוּ
  chosen: Abraham, Isaac, and Israel, our fathers
  alternatives:
  - Abraham, Isaac, and Jacob, our fathers
  - Abraham, Isaac, and Israel our ancestors
  lexicon: HALOT
  rationale: The Hebrew text reads “Israel,” not “Jacob,” so the translation follows the source rather than harmonizing to a more familiar formula. “Our fathers” preserves the masculine plural and covenantal ancestral language.
- source_word: שֳׁמְרָה
  chosen: keep
  alternatives:
  - preserve
  - guard
  lexicon: HALOT
  rationale: Imperative/jussive prayer to God asking him to preserve or maintain what follows; “keep” is concise and idiomatic in prayer language.
- source_word: זֹּאת
  chosen: this
  alternatives:
  - these things
  lexicon: HALOT
  rationale: Singular demonstrative, referring collectively to the present willing disposition and offerings just mentioned; English singular best matches the Hebrew.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for all time
  lexicon: HALOT
  rationale: Expresses enduring continuance; “forever” is natural modern English.
- source_word: לְיֵצֶר
  chosen: in the intentions
  alternatives:
  - as the inclination
  - as the formation
  lexicon: HALOT
  rationale: יֵצֶר can denote inclination, formation, or intent. In context with “thoughts of the heart,” it refers to inward disposition or intention. “In the intentions” captures the mental-volitional sense without over-psychologizing.
- source_word: מַחְשְׁבוֹת
  chosen: the thoughts
  alternatives:
  - plans
  - purposes
  lexicon: HALOT
  rationale: Denotes thoughts, plans, or devices. Here paired with heart-language, “thoughts” preserves the lexical link while remaining natural.
- source_word: לְבַב עַמֶּךָ
  chosen: of the heart of your people
  alternatives:
  - of your people's heart
  - of your people’s minds
  lexicon: HALOT
  rationale: לְבַב is the inner heart/mind/will. “Heart” is retained to preserve biblical anthropology rather than flattening to “mind.”
- source_word: וְהָכֵן
  chosen: and direct
  alternatives:
  - and establish
  - and prepare
  - and make firm
  lexicon: HALOT
  rationale: כון in the Hiphil can mean establish, prepare, or direct. With “their heart toward you,” the sense is orienting or making firm toward God. “Direct” communicates that relational orientation clearly in English.
- source_word: לְבָבָם אֵלֶיךָ
  chosen: their heart toward you
  alternatives:
  - their hearts toward you
  - their heart to you
  lexicon: HALOT
  rationale: Hebrew has singular collective “their heart,” a common idiom for the people’s inner disposition as a whole. Singular is preserved for closer correspondence, though plural would also be idiomatic in English.
