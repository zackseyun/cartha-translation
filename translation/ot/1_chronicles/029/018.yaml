theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies “the LORD” as the default rendering for YHWH. This preserves reverential convention and aligns with the translation’s stated policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Ancestral designation אֲבֹתֵינוּ
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The Hebrew is grammatically masculine plural and refers to the patriarchs. Per the gender-accurate policy, the masculine familial term is preserved rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
revisions:
