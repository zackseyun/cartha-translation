  category: awkward_english
  tier: 1
  from: in the intentions of the thoughts of the heart of your people
  to: as the inclination of the thoughts of the heart of your people
  rationale: The phrase "in the intentions of the thoughts" is somewhat awkward and verbose. The Hebrew `לְיֵצֶר מַחְשְׁבוֹת` (le-yetzer machshavot) is a construct chain where `יֵצֶר` often refers to an 'inclination' or 'disposition,' particularly when paired with 'thoughts of the heart' (cf. Gen 6:5, 1 Chr 28:9). The preposition `לְ` can function as 'as' or 'for the purpose of.' The suggested rewrite, which is also offered as an alternative in footnote 'b', provides a more natural, concise, and idiomatically precise rendering of the Hebrew in this context.
