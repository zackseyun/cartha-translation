id: 1CH.29.20
reference: 1 Chronicles 29:20
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר דָּוִיד֙ לְ/כָל הַ/קָּהָ֔ל בָּֽרְכוּ נָ֖א אֶת יְהוָ֣ה אֱלֹהֵי/כֶ֑ם
    וַ/יְבָרֲכ֣וּ כָֽל הַ/קָּהָ֗ל לַ/יהוָה֙ אֱלֹהֵ֣י אֲבֹֽתֵי/הֶ֔ם וַ/יִּקְּד֧וּ וַ/יִּֽשְׁתַּחֲו֛וּ
    לַ/יהוָ֖ה וְ/לַ/מֶּֽלֶךְ־־־־׃
translation:
  text: Then David said to all the assembly, “Now bless the LORD your God.” And all
    the assembly blessed the LORD, the God of their fathers, and bowed their heads
    and prostrated themselves before the LORD and before the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Please bless the LORD your God.' The particle נָא can add entreaty or
      urgency.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says they 'prostrated themselves' before 'the LORD and the king.'
      The wording describes bodily homage; some translations render the action toward
      the king as 'paid homage.'
    reason: alternative_reading
lexical_decisions:
- source_word: בָּרְכוּ נָא
  chosen: Now bless
  alternatives:
  - Please bless
  - Bless, I pray
  lexicon: HALOT
  rationale: בָּרְכוּ is a 2mp imperative of ברך, here an exhortation to speak blessing/praise
    toward God. נָא adds urgency or entreaty. 'Now bless' gives natural modern English
    while preserving the imperative force without archaic diction.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the LXX/English Bible pattern.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: 'In covenantal context with YHWH, אֱלֹהִים with pronominal suffix is
    singular in sense: ''your God.'''
- source_word: הַקָּהָל
  chosen: the assembly
  alternatives:
  - the congregation
  - the gathered community
  lexicon: HALOT
  rationale: קָהָל denotes the assembled people. 'Assembly' is a clear, broadly formal
    rendering that fits the public cultic setting.
- source_word: אֱלֹהֵי אֲבֹתֵיהֶם
  chosen: the God of their fathers
  alternatives:
  - the God of their ancestors
  lexicon: HALOT
  rationale: This construct phrase is traditionally and accurately rendered 'the God
    of their fathers.' It preserves the covenantal-historical idiom of Israel's ancestral
    line. 'Ancestors' is possible but less textually specific than the masculine plural
    noun used here.
- source_word: וַיִּקְּדוּ
  chosen: bowed their heads
  alternatives:
  - bowed down
  - knelt
  lexicon: HALOT
  rationale: The verb קדד refers to bowing or inclining, especially the head. Because
    the following verb already expresses full prostration, rendering this as 'bowed
    their heads' preserves the distinction between the two actions.
- source_word: וַיִּשְׁתַּחֲווּ
  chosen: prostrated themselves
  alternatives:
  - worshiped
  - bowed down
  lexicon: HALOT
  rationale: שׁחה in the hitpael commonly denotes prostration/bowing oneself. 'Prostrated
    themselves' preserves the bodily action and avoids prematurely collapsing the
    term into the more interpretive 'worshiped,' especially since the object includes
    both the LORD and the king.
- source_word: לַיהוָה וְלַמֶּלֶךְ
  chosen: before the LORD and before the king
  alternatives:
  - to the LORD and to the king
  - before the LORD and the king
  lexicon: HALOT
  rationale: Although the preposition ל can be rendered 'to,' with השתחוה English
    idiom often uses 'before.' Repeating 'before' clarifies that the people prostrated
    themselves in the presence of both, while not implying identical kinds of honor
    in a flattened sense.
