theological_decisions:
- issue: Rendering the people's action toward both the LORD and the king
  chosen_reading: 'Retain the concrete bodily language: ''bowed their heads and prostrated
    themselves before the LORD and before the king.'''
  alternative_readings:
  - '''worshiped the LORD and paid homage to the king'''
  - '''worshiped the LORD and the king'''
  rationale: The Hebrew presents the same bodily verbs with both objects. To avoid
    importing either an anti-monarchical softening or an implication of divine worship
    offered equally to the king, the translation keeps the physical action explicit.
    This preserves the text's wording and lets readers see the distinction between
    posture and theological evaluation.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather
    than resolve it.'
