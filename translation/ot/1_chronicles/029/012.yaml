theological_decisions:
- issue: Rendering the source phrase מִלְּפָנֶיךָ in relation to divine sovereignty
    and blessing
  chosen_reading: come from before you
  alternative_readings:
  - come from you
  - are from your presence
  rationale: The Hebrew explicitly uses 'before your face/presence.' Preserving that
    wording maintains the theological picture that riches and honor proceed from God's
    presence without adding doctrinal interpretation beyond the text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
