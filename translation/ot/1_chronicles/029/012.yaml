id: 1CH.29.12
reference: 1 Chronicles 29:12
source:
  edition: WLC
  text: וְ/הָ/עֹ֤שֶׁר וְ/הַ/כָּבוֹד֙ מִ/לְּ/פָנֶ֔י/ךָ וְ/אַתָּה֙ מוֹשֵׁ֣ל בַּ/כֹּ֔ל
    וּ/בְ/יָדְ/ךָ֖ כֹּ֣חַ וּ/גְבוּרָ֑ה וּ/בְ/יָ֣דְ/ךָ֔ לְ/גַדֵּ֥ל וּ/לְ/חַזֵּ֖ק לַ/כֹּֽל׃
translation:
  text: Both riches and honor come from before you, and you rule over all. In your
    hand are power and might, and in your hand it is to make great and to strengthen
    all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'come from you' or 'are from your presence'; Hebrew literally, 'from
      before you.'
    reason: lexical_alternative
  - marker: b
    text: '''Honor'' may also be rendered ''glory.'''
    reason: lexical_alternative
  - marker: c
    text: '''To make great'' can also mean ''to exalt.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֹשֶׁר
  chosen: riches
  alternatives:
  - wealth
  lexicon: HALOT
  rationale: The noun denotes material abundance or wealth. 'Riches' fits the elevated
    poetic-prayer context and pairs naturally with 'honor.'
- source_word: הַכָּבוֹד
  chosen: honor
  alternatives:
  - glory
  lexicon: HALOT
  rationale: In this context of royal praise and divine bestowal, the sense is social
    splendor/status bestowed by God. 'Honor' better matches the parallel with 'riches,'
    though 'glory' is a viable alternative.
- source_word: מִלְּפָנֶיךָ
  chosen: come from before you
  alternatives:
  - come from you
  - are from your presence
  lexicon: HALOT
  rationale: Literally 'from before your face/presence.' The idiom expresses source
    proceeding from God's presence. 'Come from before you' preserves the Hebrew imagery
    more transparently than flattening to simply 'come from you.'
- source_word: מוֹשֵׁל בַּכֹּל
  chosen: you rule over all
  alternatives:
  - you govern everything
  - you are ruler over all
  lexicon: HALOT
  rationale: The participle conveys ongoing sovereign rule. 'You rule over all' is
    idiomatic and preserves the durative force.
- source_word: בְיָדְךָ
  chosen: in your hand
  alternatives:
  - by your hand
  - in your power
  lexicon: HALOT
  rationale: The Hebrew idiom denotes possession/control. Retaining 'in your hand'
    preserves the concrete metaphor, important in this prayer's theology of divine
    sovereignty.
- source_word: כֹּחַ
  chosen: power
  alternatives:
  - strength
  lexicon: HALOT
  rationale: Here the term denotes capacity or power resident with God. 'Power' distinguishes
    it from the following גְבוּרָה while still overlapping semantically.
- source_word: גְבוּרָה
  chosen: might
  alternatives:
  - strength
  - valor
  - great power
  lexicon: HALOT
  rationale: The noun often conveys mighty force or prowess. 'Might' gives a natural
    English pairing with 'power' without collapsing the two terms into one gloss.
- source_word: לְגַדֵּל
  chosen: to make great
  alternatives:
  - to exalt
  - to magnify
  lexicon: HALOT
  rationale: The infinitive means to make great. In context it refers to God's ability
    to elevate or exalt. 'To make great' stays close to the Hebrew while remaining
    understandable.
- source_word: לְחַזֵּק
  chosen: to strengthen
  alternatives:
  - to make strong
  - to establish
  lexicon: HALOT
  rationale: The verb means to strengthen or make strong. 'To strengthen' is the most
    direct and natural rendering here.
- source_word: לַכֹּל
  chosen: all
  alternatives:
  - everyone
  - everything
  lexicon: HALOT
  rationale: The phrase likely has a comprehensive sense, referring to all persons/things
    under God's rule. 'All' preserves the breadth and matches the repeated כֹּל in
    the verse.
