theological_decisions:
- issue: Meaning of 'the throne of the LORD' in relation to Solomon's kingship
  chosen_reading: Retain the phrase as written, indicating that Solomon's royal throne is understood as the LORD's throne in a representative/theocratic sense.
  alternative_readings:
  - Paraphrase as 'the throne that belonged to the LORD'
  - Reduce to a merely political throne without theological significance
  rationale: The Chronicler intentionally presents Davidic kingship as exercised under and on behalf of the LORD. The translation should preserve this theological claim without importing later doctrinal constructs or flattening it into a generic royal accession formula.
  doctrine_reference: Translation philosophy §§1, 3, 6; Contested terms table for יְהוָה
