id: 1CH.29.23
reference: 1 Chronicles 29:23
source:
  edition: WLC
  text: וַ/יֵּ֣שֶׁב שְׁ֠לֹמֹה עַל כִּסֵּ֨א יְהוָ֧ה לְ/מֶ֛לֶךְ תַּֽחַת דָּוִ֥יד אָבִ֖י/ו וַ/יַּצְלַ֑ח וַ/יִּשְׁמְע֥וּ אֵלָ֖י/ו כָּל יִשְׂרָאֵֽל־׀־־׃
translation:
  text: Then Solomon sat on the throne of Yahweh as king in place of David his father, and he prospered, and all Israel listened to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'listened to him' / 'heeded him.' The Hebrew can denote hearing attentively, but in this royal context it carries the sense of obedience.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: sat
  alternatives:
  - took his seat
  - was enthroned
  lexicon: HALOT
  rationale: The verb ישב literally means 'sat/dwelt.' In royal context it can imply enthronement, but 'sat' preserves the concrete Hebrew expression while remaining natural in English when followed by 'on the throne.'
- source_word: כִּסֵּא יְהוָה
  chosen: the throne of the LORD
  alternatives:
  - the LORD's throne
  lexicon: HALOT
  rationale: Construct phrase literally 'throne of YHWH.' Per doctrine, יְהוָה is rendered 'the LORD.' The phrase expresses that the Davidic kingship is exercised under divine rule; the formal wording should be preserved rather than paraphrased.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: לְמֶלֶךְ
  chosen: as king
  alternatives:
  - for king
  - to be king
  lexicon: HALOT
  rationale: The preposition ל with 'king' here marks role or office. 'As king' is idiomatic English and reflects accession to kingship.
- source_word: תַּחַת דָּוִיד אָבִיו
  chosen: in place of David his father
  alternatives:
  - after David his father
  - under David his father
  lexicon: HALOT
  rationale: תחת in succession contexts means 'in place of' or 'instead of,' not merely temporal 'after.' This best conveys dynastic replacement.
- source_word: וַיַּצְלַח
  chosen: he prospered
  alternatives:
  - he succeeded
  - he was successful
  lexicon: HALOT
  rationale: צלח in the Hiphil commonly denotes prospering/succeeding. 'He prospered' is concise and preserves the sense of successful advancement under divine favor without over-explication.
- source_word: וַיִּשְׁמְעוּ אֵלָיו
  chosen: obeyed him
  alternatives:
  - listened to him
  - heeded him
  lexicon: HALOT
  rationale: שׁמע אל can mean 'listen to' or, in authority contexts, 'obey.' Since the subject is 'all Israel' responding to the king, 'obeyed him' best captures the covenantal-political sense intended.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  lexicon: HALOT
  rationale: Standard collective expression for the nation as a whole; no expansion is needed.
