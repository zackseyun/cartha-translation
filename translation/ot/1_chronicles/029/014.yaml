id: 1CH.29.14
reference: 1 Chronicles 29:14
source:
  edition: WLC
  text: וְ/כִ֨י מִ֤י אֲנִי֙ וּ/מִ֣י עַמִּ֔/י כִּֽי נַעְצֹ֣ר כֹּ֔חַ לְ/הִתְנַדֵּ֖ב
    כָּ/זֹ֑את כִּֽי מִמְּ/ךָ֣ הַ/כֹּ֔ל וּ/מִ/יָּדְ/ךָ֖ נָתַ֥נּוּ לָֽ/ךְ־־׃
translation:
  text: But who am I, and who are my people, that we should be able to give willingly
    like this? For everything comes from you, and from your hand we have given to
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'that we should have strength to offer willingly thus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: But
  alternatives:
  - And indeed
  - Yet
  - For
  lexicon: HALOT
  rationale: Here the conjunction introduces a humble rhetorical contrast/resumption
    in David's prayer. 'But' captures the discourse turn naturally in English better
    than a wooden 'and' or 'for.'
- source_word: מִי אֲנִי וּמִי עַמִּי
  chosen: who am I, and who are my people
  alternatives:
  - what am I, and what are my people
  lexicon: HALOT
  rationale: מִי normally asks 'who?' and in this rhetorical setting expresses unworthiness/status,
    not essence. 'Who are my people' supplies the English copula for clarity.
- source_word: נַעְצֹר כֹּחַ
  chosen: we should be able
  alternatives:
  - we should retain strength
  - we should have power
  - we should muster the means
  lexicon: HALOT
  rationale: The idiom literally involves restraining/retaining strength, but in context
    it means having the capacity or means to contribute. 'Be able' is the clearest
    optimal-equivalence rendering.
- source_word: לְהִתְנַדֵּב
  chosen: to give willingly
  alternatives:
  - to offer freely
  - to volunteer
  - to make a freewill offering
  lexicon: HALOT
  rationale: The hitpael of נדב conveys voluntary, willing offering. 'Give willingly'
    preserves both the act of giving and the voluntariness without overtechnical cultic
    wording.
- source_word: כָּזֹאת
  chosen: like this
  alternatives:
  - thus
  - in this way
  - such as this
  lexicon: HALOT
  rationale: Refers to the extraordinary generosity just described. 'Like this' is
    idiomatic modern English.
- source_word: מִמְּךָ הַכֹּל
  chosen: everything comes from you
  alternatives:
  - all is from you
  - everything is from you
  lexicon: HALOT
  rationale: The clause states God's ultimate ownership/source of all things. 'Everything
    comes from you' expresses source clearly and naturally.
- source_word: וּמִיָּדְךָ
  chosen: from your hand
  alternatives:
  - from you
  - out of your hand
  lexicon: HALOT
  rationale: The Hebrew image of the hand as source/provision is worth preserving
    in the main text because it is transparent in English and theologically significant.
- source_word: נָתַנּוּ לָךְ
  chosen: we have given to you
  alternatives:
  - we gave to you
  - we have given you
  lexicon: HALOT
  rationale: The perfect summarizes the completed act in the prayer context. 'We have
    given to you' preserves the verbal aspect well enough in English and keeps the
    repetition of 'to you' for emphasis.
