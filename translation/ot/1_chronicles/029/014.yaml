theological_decisions:
- issue: Divine ownership and human giving
  chosen_reading: The verse is rendered to emphasize that Israel's offering is derivative
    of God's prior provision, without adding later doctrinal formulations about stewardship.
  alternative_readings:
  - A more interpretive rendering could stress 'we only return what is already yours'
  rationale: The Hebrew explicitly says all things are from God and what is given
    comes from his hand. The translation preserves that theological claim directly
    while avoiding paraphrastic expansion beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
