id: 1CH.29.9
reference: 1 Chronicles 29:9
source:
  edition: WLC
  text: וַ/יִּשְׂמְח֤וּ הָ/עָם֙ עַל הִֽתְנַדְּבָ֔/ם כִּ֚י בְּ/לֵ֣ב שָׁלֵ֔ם הִֽתְנַדְּב֖וּ לַ/יהוָ֑ה וְ/גַם֙ דָּוִ֣יד הַ/מֶּ֔לֶךְ שָׂמַ֖ח שִׂמְחָ֥ה גְדוֹלָֽה־׃פ
translation:
  text: Then the people rejoiced because they had offered willingly, for with a whole heart they had offered willingly to Yahweh; and David the king also rejoiced with great joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of their freewill offering'; the Hebrew verb/root emphasizes voluntary, willing giving.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'with a whole heart,' expressing undivided sincerity or integrity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂמְחוּ
  chosen: Then ... rejoiced
  alternatives:
  - were glad
  - celebrated
  lexicon: HALOT
  rationale: Rendered with the common narrative past 'Then ... rejoiced' to reflect the waw-consecutive verbal sequence in straightforward English narrative style.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the people group
  - the populace
  lexicon: HALOT
  rationale: Standard rendering for עָם in this context of the assembled covenant community.
- source_word: עַל הִתְנַדְּבָם
  chosen: because they had given willingly
  alternatives:
  - over their freewill offering
  - because of their volunteering
  lexicon: HALOT
  rationale: The construction expresses the cause of rejoicing. The hitpael of נדב conveys voluntary, willing offering of oneself or one's goods. 'Given willingly' is idiomatic and fits the immediate context of contributions for the temple.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the people's rejoicing. 'For' preserves the explanatory linkage to the preceding clause.
- source_word: בְּלֵב שָׁלֵם
  chosen: with a whole heart
  alternatives:
  - with a complete heart
  - with an undivided heart
  - wholeheartedly
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the Hebrew idiom and its covenantal nuance of integrity and undivided devotion. Chosen over the adverb 'wholeheartedly' to keep the concrete Hebrew expression visible.
- source_word: הִתְנַדְּבוּ
  chosen: they had given willingly
  alternatives:
  - they offered freely
  - they volunteered
  lexicon: HALOT
  rationale: Repeated with the same English gloss for consistency, since the same Hebrew root appears twice in the verse and refers to voluntary giving to the LORD.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: וְגַם
  chosen: and ... also
  alternatives:
  - and even
  - also
  lexicon: HALOT
  rationale: Conveys the additive emphasis that David joined the people's joy.
- source_word: דָּוִיד הַמֶּלֶךְ
  chosen: David the king
  alternatives:
  - King David
  lexicon: HALOT
  rationale: Kept the Hebrew appositional order for a slightly more formal narrative cadence while remaining natural English.
- source_word: שָׂמַח שִׂמְחָה גְדוֹלָה
  chosen: rejoiced with great joy
  alternatives:
  - rejoiced greatly
  - was very glad
  lexicon: HALOT
  rationale: Preserves the Hebrew cognate accusative ('rejoiced a great joy') in natural English. This keeps the emphatic repetition of the joy-root better than the flatter adverbial alternative.
