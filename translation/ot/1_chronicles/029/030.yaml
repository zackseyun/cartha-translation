id: 1CH.29.30
reference: 1 Chronicles 29:30
source:
  edition: WLC
  text: עִ֥ם כָּל מַלְכוּת֖/וֹ וּ/גְבוּרָת֑/וֹ וְ/הָ/עִתִּ֗ים אֲשֶׁ֨ר עָבְר֤וּ עָלָי/ו֙
    וְ/עַל יִשְׂרָאֵ֔ל וְ/עַ֖ל כָּל מַמְלְכ֥וֹת הָ/אֲרָצֽוֹת־־־׃פ
translation:
  text: along with all his reign and his might, and the times that passed over him
    and over Israel and over all the kingdoms of the lands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that came upon him.' The Hebrew idiom is literally 'that passed over
      him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all the kingdoms of the countries.' The Hebrew has the plural 'lands,'
      referring to the surrounding territories or nations.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִם
  chosen: along with
  alternatives:
  - with
  lexicon: HALOT
  rationale: Introduces this final item as accompanying the preceding record of David's
    acts. 'Along with' is slightly more natural in English while preserving the associative
    sense of the preposition.
- source_word: מַלְכוּתוֹ
  chosen: his reign
  alternatives:
  - his kingdom
  - his kingship
  lexicon: HALOT
  rationale: In context of a summary of David's life and rule, the abstract/durative
    sense 'reign' fits better than the territorial 'kingdom.'
- source_word: גְבוּרָתוֹ
  chosen: his might
  alternatives:
  - his power
  - his mighty deeds
  lexicon: HALOT
  rationale: The noun can denote strength, power, or mighty acts. Here, paired with
    'his reign' in a summary notice, 'might' captures David's strength/valor without
    over-interpreting it as specifically deeds.
- source_word: הָעִתִּים
  chosen: the times
  alternatives:
  - the events of the times
  - the seasons
  lexicon: HALOT
  rationale: A straightforward rendering of the plural noun. It refers to the periods/circumstances
    of David's life and surrounding history.
- source_word: אֲשֶׁר עָבְרוּ עָלָיו
  chosen: that passed over him
  alternatives:
  - that came upon him
  - that he experienced
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of times 'passing over' someone. The
    main text preserves this imagery because it is intelligible in English and keeps
    closer contact with the source.
- source_word: וְעַל יִשְׂרָאֵל
  chosen: and over Israel
  alternatives:
  - and upon Israel
  lexicon: HALOT
  rationale: 'Maintains the repeated preposition for rhythmic parallelism: over him,
    over Israel, over all the kingdoms.'
- source_word: כָּל מַמְלְכוֹת הָאֲרָצוֹת
  chosen: all the kingdoms of the lands
  alternatives:
  - all the kingdoms of the countries
  - all the kingdoms of the earth
  lexicon: HALOT
  rationale: The plural 'lands' is present in Hebrew and likely refers to the surrounding
    nations/territories. 'Of the earth' would sound broader and less precise than
    the Hebrew plural construct.
