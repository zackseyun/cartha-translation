id: 1CH.29.3
reference: 1 Chronicles 29:3
source:
  edition: WLC
  text: וְ/ע֗וֹד בִּ/רְצוֹתִ/י֙ בְּ/בֵ֣ית אֱלֹהַ֔/י יֶשׁ לִ֥/י סְגֻלָּ֖ה זָהָ֣ב וָ/כָ֑סֶף
    נָתַ֤תִּי לְ/בֵית אֱלֹהַ/י֙ לְ/מַ֔עְלָ/ה מִ/כָּל הֲכִינ֖וֹתִי לְ/בֵ֥ית הַ/קֹּֽדֶשׁ־־־׃
translation:
  text: Moreover, because of my delight in the house of my God, I have a personal
    treasure of gold and silver, and I have given it to the house of my God, over
    and above all that I have prepared for the holy house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a special treasure' or 'my own treasure'; the Hebrew term refers to
      valued personal property.
    reason: lexical_alternative
  - marker: b
    text: Or 'for the house of my God' in the phrase 'because of my delight in the
      house of my God.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for the sanctuary' for 'for the holy house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעוֹד
  chosen: Moreover
  alternatives:
  - And further
  - Besides
  lexicon: HALOT
  rationale: Introduces an additional statement building on the previous verse. 'Moreover'
    captures the additive and emphatic discourse function in natural English.
- source_word: בִּרְצוֹתִי
  chosen: because of my delight
  alternatives:
  - in my pleasure
  - because I take pleasure
  lexicon: HALOT
  rationale: From רצון in a verbal-nominal form with 1cs suffix, expressing favorable
    disposition or delight. 'Because of my delight' best fits the prefixed ב and explains
    David's motive without over-paraphrasing.
- source_word: בְּבֵית אֱלֹהַי
  chosen: in the house of my God
  alternatives:
  - for the house of my God
  lexicon: HALOT
  rationale: 'The preposition ב here naturally expresses the object/sphere of David''s
    delight: the house of his God. ''In the house'' is more literal and idiomatic
    with ''delight'' than shifting to ''for'' in the main text.'
- source_word: יֶשׁ לִי
  chosen: I have
  alternatives:
  - there is for me
  lexicon: HALOT
  rationale: Standard existential possession construction in Hebrew. English idiom
    requires 'I have.'
- source_word: סְגֻלָּה
  chosen: a personal treasure
  alternatives:
  - a special treasure
  - private property
  - own treasure
  lexicon: HALOT
  rationale: The noun denotes valued personal property or a treasured possession.
    In this context David contrasts his own wealth with what he had already prepared
    for the temple project, so 'personal treasure' makes the distinction clear.
- source_word: זָהָב וָכָסֶף
  chosen: gold and silver
  lexicon: HALOT
  rationale: Straightforward material terms; no contextual pressure for variation.
- source_word: נָתַתִּי
  chosen: I have given
  alternatives:
  - I give
  - I gave
  lexicon: HALOT
  rationale: The perfect refers to David's completed act in present discourse. English
    present perfect communicates a completed contribution with present relevance.
- source_word: לְבֵית אֱלֹהַי
  chosen: to the house of my God
  alternatives:
  - for the house of my God
  lexicon: HALOT
  rationale: With נתן, ל marks the recipient/goal. 'To the house of my God' is the
    most direct rendering.
- source_word: לְמַעְלָה
  chosen: over and above
  alternatives:
  - besides
  - in addition to
  lexicon: HALOT
  rationale: The term here has the adverbial sense of excess or addition. 'Over and
    above' preserves the comparative force clearly.
- source_word: מִכָּל הֲכִינוֹתִי
  chosen: all that I have prepared
  alternatives:
  - all my preparations
  - everything I prepared
  lexicon: HALOT
  rationale: The comparative phrase contrasts David's personal gift with the totality
    of prior preparations. 'All that I have prepared' is both clear and close to the
    Hebrew syntax.
- source_word: לְבֵית הַקֹּדֶשׁ
  chosen: for the holy house
  alternatives:
  - for the sanctuary
  - for the holy temple
  lexicon: HALOT
  rationale: Literally 'for the house of holiness/the holy house.' Since בית has already
    been rendered 'house' in this verse, 'holy house' preserves lexical consistency
    and reflects the temple as a consecrated structure. 'Sanctuary' is possible but
    less formally aligned with the Hebrew wording here.
