theological_decisions:
- issue: Rendering of temple terminology in David's speech
  chosen_reading: house / holy house
  alternative_readings:
  - temple / sanctuary
  rationale: The Hebrew repeatedly uses בית ('house'). Rendering it as 'house' preserves
    the covenantal and theological resonance of God's dwelling while remaining natural
    English. 'Temple' is interpretive and possible, but the source wording favors
    'house.'
  doctrine_reference: Translation philosophy §1, §5
