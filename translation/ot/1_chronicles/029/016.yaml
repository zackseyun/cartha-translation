id: 1CH.29.16
reference: 1 Chronicles 29:16
source:
  edition: WLC
  text: יְהוָ֣ה אֱלֹהֵ֔י/נוּ כֹ֣ל הֶ/הָמ֤וֹן הַ/זֶּה֙ אֲשֶׁ֣ר הֲכִינֹ֔נוּ לִ/בְנֽוֹת
    לְ/ךָ֥ בַ֖יִת לְ/שֵׁ֣ם קָדְשֶׁ֑/ךָ מִ/יָּדְ/ךָ֥ היא וּ/לְ/ךָ֥ הַ/כֹּֽל־׃
translation:
  text: O LORD our God, all this abundance that we have prepared to build you a house
    for your holy name comes from your hand, and all things belong to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all this wealth' or 'all this store'; the Hebrew term refers to the
      large quantity of materials amassed for the temple.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from your hand it is.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and all is yours.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as 'LORD' per project doctrine for the divine name, following
    the established convention of representing YHWH with small caps in English.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  alternatives:
  - our gods
  lexicon: HALOT
  rationale: With YHWH and the singular possessive context, the plural form functions
    as the singular title 'God'; 'our God' is the natural English equivalent.
- source_word: כֹּל הֶהָמוֹן הַזֶּה
  chosen: all this abundance
  alternatives:
  - all this multitude
  - all this wealth
  - all this store
  lexicon: HALOT
  rationale: הָמוֹן can denote abundance, wealth, or a great quantity. In context
    David refers to the amassed materials for the temple, so 'all this abundance'
    captures the sense better than 'multitude'.
- source_word: הֲכִינֹנוּ
  chosen: we have prepared
  alternatives:
  - we prepared
  - we have made ready
  lexicon: HALOT
  rationale: The verb means to prepare or make ready. The perfect is rendered with
    English present perfect to fit the prayer context and the completed preparation
    with present relevance.
- source_word: לִבְנוֹת לְךָ בַיִת
  chosen: to build you a house
  alternatives:
  - to build for you a house
  - to build you a temple
  lexicon: HALOT
  rationale: Formally the phrase is 'to build for you a house.' English idiom allows
    'build you a house' without loss. 'House' is retained rather than 'temple' because
    the Hebrew says בַּיִת and the temple-as-house motif is significant.
- source_word: לְשֵׁם קָדְשֶׁךָ
  chosen: for your holy name
  alternatives:
  - for the name of your holiness
  - for your sacred name
  lexicon: HALOT
  rationale: This construction expresses dedication to God's name. 'For your holy
    name' is clear, natural English and preserves the theological emphasis on the
    sanctity of the divine name.
- source_word: מִיָּדְךָ הִיא
  chosen: comes from your hand
  alternatives:
  - is from your hand
  - it is from your hand
  lexicon: HALOT
  rationale: Literally 'from your hand it is.' 'Comes from your hand' makes the idiom
    natural in English while preserving the source image of divine provision.
- source_word: וּלְךָ הַכֹּל
  chosen: all things belong to you
  alternatives:
  - and all is yours
  - and everything is yours
  lexicon: HALOT
  rationale: The phrase asserts God's ultimate ownership of everything. 'All things
    belong to you' expresses the possessive force clearly in contemporary English.
