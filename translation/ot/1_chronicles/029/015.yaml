id: 1CH.29.15
reference: 1 Chronicles 29:15
source:
  edition: WLC
  text: כִּֽי גֵרִ֨ים אֲנַ֧חְנוּ לְ/פָנֶ֛י/ךָ וְ/תוֹשָׁבִ֖ים כְּ/כָל אֲבֹתֵ֑י/נוּ
    כַּ/צֵּ֧ל יָמֵ֛י/נוּ עַל הָ/אָ֖רֶץ וְ/אֵ֥ין מִקְוֶֽה־־׀־׃
translation:
  text: For we are sojourners before you, and temporary residents, as all our fathers
    were. Our days on the earth are like a shadow, and there is no hope.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strangers' / 'foreigners' for 'sojourners.'
    reason: lexical_alternative
  - marker: b
    text: Or 'resident aliens' for 'temporary residents.'
    reason: lexical_alternative
  - marker: c
    text: '''There is no hope'' here refers to the fleeting nature of human life on
      earth, not to the absence of hope in God.'
    reason: cross_reference
lexical_decisions:
- source_word: גֵרִים
  chosen: sojourners
  alternatives:
  - strangers
  - foreigners
  lexicon: HALOT
  rationale: גֵר denotes one residing as an alien/sojourner rather than a mere passerby.
    'Sojourners' preserves the social and covenantal nuance better than 'strangers'
    or 'foreigners' in this prayer context.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  lexicon: HALOT
  rationale: Literally 'before your face.' 'Before you' is natural English and preserves
    the Godward orientation without over-expanding the phrase.
- source_word: תוֹשָׁבִים
  chosen: temporary residents
  alternatives:
  - settlers
  - resident aliens
  lexicon: HALOT
  rationale: תוֹשָׁב refers to one dwelling in a place without full permanence or
    native status. 'Temporary residents' communicates the parallel with גֵרִים in
    readable modern English.
- source_word: כְּכָל אֲבֹתֵינוּ
  chosen: as all our fathers were
  alternatives:
  - like all our fathers
  - as were all our ancestors
  lexicon: HALOT
  rationale: The comparison links the present generation with prior generations. 'Fathers'
    is retained as gender-accurate to the Hebrew and because it refers to forefathers/ancestors
    in Israel's history.
- source_word: כַּצֵּל
  chosen: like a shadow
  alternatives:
  - as a shadow
  lexicon: HALOT
  rationale: A common biblical image for transience and insubstantiality. 'Like a
    shadow' is idiomatic and preserves the metaphor.
- source_word: יָמֵינוּ עַל הָאָרֶץ
  chosen: our days on the earth
  alternatives:
  - our days upon the earth
  lexicon: HALOT
  rationale: A straightforward rendering of the temporal-spatial phrase; 'on the earth'
    is contemporary and clear.
- source_word: וְאֵין מִקְוֶה
  chosen: and there is no hope
  alternatives:
  - and there is no expectation
  - and there is no lasting hope
  lexicon: HALOT
  rationale: מִקְוֶה can denote hope/expectation. In context of human frailty and
    brevity of life, 'hope' best captures the sense that there is no enduring prospect
    in earthly life itself. The phrase is not denying hope in God absolutely, but
    emphasizing mortality.
