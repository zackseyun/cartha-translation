theological_decisions:
- issue: Meaning of וְאֵין מִקְוֶה in context of mortality
  chosen_reading: Rendered as 'there is no hope' with contextual sense of no enduring
    earthly prospect.
  alternative_readings:
  - there is no expectation
  - there is no abiding place
  rationale: The verse stresses human transience before God. Translating מִקְוֶה as
    'hope' is lexically defensible and contextually coherent, while the rationale
    clarifies that the statement is about earthly life's brevity, not a doctrinal
    denial of hope in God or resurrection.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
