id: 1CH.29.24
reference: 1 Chronicles 29:24
source:
  edition: WLC
  text: וְ/כָל הַ/שָּׂרִים֙ וְ/הַ/גִּבֹּרִ֔ים וְ/גַ֕ם כָּל בְּנֵ֖י הַ/מֶּ֣לֶךְ דָּוִ֑יד
    נָ֣תְנוּ יָ֔ד תַּ֖חַת שְׁלֹמֹ֥ה הַ/מֶּֽלֶךְ־־׃
translation:
  text: And all the officials, the mighty men, and also all the sons of King David
    pledged allegiance to Solomon the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'gave the hand under Solomon the king,' a Hebrew idiom for submitting
      oneself or pledging loyalty.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָּׂרִים
  chosen: officials
  alternatives:
  - princes
  - leaders
  - commanders
  lexicon: HALOT
  rationale: שָּׂרִים broadly denotes rulers or high-ranking officials. 'Officials'
    is natural modern English and fits a court/government context without implying
    only military leadership.
- source_word: גִּבֹּרִים
  chosen: mighty men
  alternatives:
  - warriors
  - mighty ones
  lexicon: HALOT
  rationale: The term often refers to valiant or powerful men, frequently with military
    connotations. 'Mighty men' preserves the traditional sense and allows both martial
    and status-related force.
- source_word: בְּנֵי הַמֶּלֶךְ דָּוִיד
  chosen: the sons of King David
  alternatives:
  - David's sons
  - the royal sons of David
  lexicon: HALOT
  rationale: A formally close rendering that preserves the explicit filial relationship
    and the royal title attached to David.
- source_word: נָתְנוּ יָד תַּחַת
  chosen: pledged allegiance to
  alternatives:
  - submitted to
  - gave their hand under
  - placed themselves under the authority of
  lexicon: HALOT
  rationale: The idiom literally means 'gave the hand under' and signifies submission
    or oath-bound loyalty to a superior. 'Pledged allegiance to' communicates the
    idiomatic force in clear modern English better than a wooden literalism.
- source_word: שְׁלֹמֹה הַמֶּלֶךְ
  chosen: Solomon the king
  alternatives:
  - King Solomon
  lexicon: HALOT
  rationale: Either English order is possible. 'Solomon the king' more closely reflects
    the Hebrew apposition and preserves the emphasis on his recognized royal status
    at this moment.
