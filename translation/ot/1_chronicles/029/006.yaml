id: 1CH.29.6
reference: 1 Chronicles 29:6
source:
  edition: WLC
  text: וַ/יִּֽתְנַדְּבוּ֩ שָׂרֵ֨י הָ/אָב֜וֹת וְ/שָׂרֵ֣י שִׁבְטֵ֣י יִשְׂרָאֵ֗ל וְ/שָׂרֵ֤י
    הָ/אֲלָפִים֙ וְ/הַ/מֵּא֔וֹת וּ/לְ/שָׂרֵ֖י מְלֶ֥אכֶת הַ/מֶּֽלֶךְ׀׃
translation:
  text: Then the leaders of the fathers’ houses, and the leaders of the tribes of
    Israel, and the commanders of the thousands and of the hundreds, and the overseers
    of the king’s work, gave willingly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “offered willingly” or “volunteered.” The Hebrew verb emphasizes a freewill
      response; in this context it likely refers to voluntary giving.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the fathers’ houses,” referring to ancestral or clan-based family
      divisions.
    reason: cultural_note
  - marker: c
    text: “The thousands and the hundreds” refers to military or administrative units,
      and thus to their commanders.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּתְנַדְּבוּ
  chosen: gave willingly
  alternatives:
  - offered willingly
  - volunteered
  lexicon: HALOT
  rationale: The hitpael of נדב here refers to making a freewill contribution in response
    to David’s appeal, not merely volunteering oneself for service. 'Gave willingly'
    captures both the voluntary nature and the material-giving context established
    by the surrounding verses.
- source_word: שָׂרֵי
  chosen: leaders
  alternatives:
  - chiefs
  - officials
  - princes
  lexicon: HALOT
  rationale: שָׂרִים denotes persons in positions of authority. 'Leaders' is clear
    modern English and broad enough to cover the several groups listed without implying
    nobility too strongly, as 'princes' might.
- source_word: הָאָבוֹת
  chosen: the fathers’ houses
  alternatives:
  - the ancestral houses
  - the family heads
  lexicon: HALOT
  rationale: In Chronicles this expression refers to clan-based paternal households
    or family divisions. 'Fathers’ houses' preserves the Hebrew social structure more
    transparently than flattening it to 'families' or shifting the referent to the
    persons alone.
- source_word: שִׁבְטֵי יִשְׂרָאֵל
  chosen: the tribes of Israel
  lexicon: HALOT
  rationale: Standard and direct rendering of the tribal units of Israel.
- source_word: הָאֲלָפִים וְהַמֵּאוֹת
  chosen: the thousands and of the hundreds
  alternatives:
  - the thousands and the hundreds
  - the military units of thousands and hundreds
  lexicon: HALOT
  rationale: These terms commonly denote military or administrative divisions and,
    by extension, their officers. Because שָׂרֵי governs both, the English 'commanders
    of the thousands and of the hundreds' preserves the Hebrew structure while remaining
    readable.
- source_word: וּלְשָׂרֵי
  chosen: and the overseers
  alternatives:
  - and the leaders
  - and the officials
  lexicon: HALOT
  rationale: The prefixed conjunction with ל likely continues the list with another
    class of officials associated with royal work. 'Overseers' fits the administrative
    context of those responsible for the king’s projects.
- source_word: מְלֶאכֶת הַמֶּלֶךְ
  chosen: the king’s work
  alternatives:
  - the king’s service
  - the king’s business
  lexicon: HALOT
  rationale: מְלָאכָה denotes work, labor, or task. In this context of temple preparations
    and royal administration, 'the king’s work' is the most straightforward rendering
    and leaves the scope appropriately broad.
