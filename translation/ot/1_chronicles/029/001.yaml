theological_decisions:
- issue: Rendering of the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of לְאָדָם in contrast with לַיהוָה אֱלֹהִים
  chosen_reading: for man
  alternative_readings:
  - for humanity
  rationale: The verse contrasts a merely human beneficiary with the LORD God. Retaining 'man' preserves the singular representative contrast and follows the gender-accurate policy for אָדָם.
  doctrine_reference: 'DOCTRINE.md Contested terms: אָדָם *adam*; Translation philosophy §4'
