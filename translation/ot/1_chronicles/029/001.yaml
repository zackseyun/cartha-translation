id: 1CH.29.1
reference: 1 Chronicles 29:1
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר דָּוִ֤יד הַ/מֶּ֨לֶךְ֙ לְ/כָל הַ/קָּהָ֔ל שְׁלֹמֹ֨ה בְנִ֥/י אֶחָ֛ד בָּֽחַר בּ֥/וֹ אֱלֹהִ֖ים נַ֣עַר וָ/רָ֑ךְ וְ/הַ/מְּלָאכָ֣ה גְדוֹלָ֔ה כִּ֣י לֹ֤א לְ/אָדָם֙ הַ/בִּירָ֔ה כִּ֖י לַ/יהוָ֥ה אֱלֹהִֽים־־׃
translation:
  text: Then King David said to all the assembly, “Solomon my son, whom alone God has chosen, is young and inexperienced, and the work is great; for the palace is not for man, but for Yahweh God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'young and tender.' The Hebrew describes Solomon as youthful and not yet seasoned for so great a task.
    reason: lexical_alternative
  - marker: b
    text: Or 'citadel' or 'fortress.' Here 'palace' refers to the grand building prepared for the LORD, that is, the temple complex.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקָּהָל
  chosen: the assembly
  alternatives:
  - the congregation
  - the gathered community
  lexicon: HALOT
  rationale: קָהָל denotes the assembled community. 'Assembly' is natural modern English and preserves the corporate/public setting better than the more ecclesiastical 'congregation' in this narrative context.
- source_word: אֶחָד
  chosen: the one
  alternatives:
  - alone
  - only
  lexicon: HALOT
  rationale: In apposition to 'Solomon my son' and followed by 'God has chosen,' אֶחָד emphasizes singularity/uniqueness. 'The one God has chosen' brings out the force idiomatically without overtranslating.
- source_word: בָּחַר בּוֹ אֱלֹהִים
  chosen: God has chosen
  alternatives:
  - God chose him
  - God has selected
  lexicon: HALOT
  rationale: בחר means 'choose/select.' English naturally omits the explicit pronoun because it is resumed by the appositional phrase. Present perfect ('has chosen') fits the resulting state relevant to David's speech.
- source_word: נַעַר
  chosen: young
  alternatives:
  - a youth
  - a young man
  - a boy
  lexicon: HALOT
  rationale: נַעַר can range from boy to young man/attendant. Here it highlights Solomon's relative youth for the task. 'Young' avoids implying childishness while preserving the point.
- source_word: וָרָךְ
  chosen: inexperienced
  alternatives:
  - tender
  - delicate
  - inexperienced/untested
  lexicon: HALOT
  rationale: רַךְ literally means 'soft/tender,' but in this context of leadership and construction responsibility it conveys immaturity or lack of seasoned strength. 'Inexperienced' communicates the contextual sense in readable English.
- source_word: הַמְּלָאכָה
  chosen: the work
  alternatives:
  - the task
  - the undertaking
  - the project
  lexicon: HALOT
  rationale: מְלָאכָה commonly denotes work/task. 'The work' is broad enough to include the temple-building enterprise without sounding overly modern like 'project.'
- source_word: גְדוֹלָה
  chosen: is great
  alternatives:
  - is large
  - is immense
  - is weighty
  lexicon: HALOT
  rationale: גדול here describes the magnitude/significance of the undertaking. 'Great' preserves both scale and importance.
- source_word: לְאָדָם
  chosen: for man
  alternatives:
  - for a man
  - for humanity
  lexicon: HALOT
  rationale: Per doctrine, אָדָם should be rendered 'man / humankind' according to context. Here the contrast is between a merely human recipient and the LORD God. 'For man' preserves the singular representative force and the rhetorical contrast.
- source_word: הַבִּירָה
  chosen: the palace
  alternatives:
  - the fortress
  - the citadel
  - the temple complex
  lexicon: HALOT
  rationale: בִּירָה often denotes a fortified structure or palace/citadel. In this temple context it refers to the grand building David is preparing for. 'Palace' is the established and contextually fitting sense, highlighting the royal magnificence of God's house.
- source_word: לַיהוָה אֱלֹהִים
  chosen: for the LORD God
  alternatives:
  - for Yahweh God
  lexicon: HALOT
  rationale: Following doctrine, יהוה is rendered 'the LORD.' The phrase stresses that the building belongs to Israel's covenant God; 'the LORD God' preserves both divine names/titles.
