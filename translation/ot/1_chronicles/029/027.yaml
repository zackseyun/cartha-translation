id: 1CH.29.27
reference: 1 Chronicles 29:27
source:
  edition: WLC
  text: וְ/הַ/יָּמִ֗ים אֲשֶׁ֤ר מָלַךְ֙ עַל יִשְׂרָאֵ֔ל אַרְבָּעִ֖ים שָׁנָ֑ה בְּ/חֶבְר֤וֹן
    מָלַךְ֙ שֶׁ֣בַע שָׁנִ֔ים וּ/בִ/ירוּשָׁלִַ֥ם מָלַ֖ךְ שְׁלֹשִׁ֥ים וְ/שָׁלֽוֹשׁ־׃
translation:
  text: The days that he reigned over Israel were forty years. In Hebron he reigned
    seven years, and in Jerusalem he reigned thirty-three years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהַיָּמִים
  chosen: The days
  alternatives:
  - Now the days
  - The length of time
  lexicon: HALOT
  rationale: A literal rendering of the idiom introducing the duration of David's
    reign. 'The days' preserves the Hebrew expression while remaining natural in English
    when followed by an explanatory clause.
- source_word: אֲשֶׁר מָלַךְ
  chosen: that he reigned
  alternatives:
  - during which he reigned
  - that he was king
  lexicon: HALOT
  rationale: The relative clause is straightforwardly temporal/descriptive. 'Reigned'
    best matches מָלַךְ in royal context without unnecessary expansion.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - over all Israel
  - for Israel
  lexicon: HALOT
  rationale: עַל with מלך commonly indicates rule over a people. 'Over Israel' is
    the plain sense. 'All' is not explicit in this verse and should not be imported.
- source_word: אַרְבָּעִים שָׁנָה
  chosen: forty years
  alternatives:
  - forty year(s)
  lexicon: HALOT
  rationale: Standard English rendering of the numeral plus singular collective noun
    construction.
- source_word: בְּחֶבְרוֹן
  chosen: In Hebron
  alternatives:
  - At Hebron
  lexicon: HALOT
  rationale: The preposition marks location. 'In Hebron' is the most natural English
    expression for the city where he reigned.
- source_word: מָלַךְ שֶׁבַע שָׁנִים
  chosen: he reigned seven years
  alternatives:
  - he was king seven years
  lexicon: HALOT
  rationale: Repeats the Hebrew verb for clarity and rhythm, matching the source's
    parallel structure.
- source_word: וּבִירוּשָׁלִַם
  chosen: and in Jerusalem
  alternatives:
  - and at Jerusalem
  lexicon: HALOT
  rationale: The conjunction plus preposition and place name are rendered directly.
    'Jerusalem' follows standard English transliteration.
- source_word: שְׁלֹשִׁים וְשָׁלוֹשׁ
  chosen: thirty-three
  alternatives:
  - thirty and three
  lexicon: HALOT
  rationale: Modern English combines the Hebrew components into the standard compound
    numeral form.
