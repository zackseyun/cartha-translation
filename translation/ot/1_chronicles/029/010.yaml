id: 1CH.29.10
reference: 1 Chronicles 29:10
source:
  edition: WLC
  text: וַ/יְבָ֤רֶךְ דָּוִיד֙ אֶת יְהוָ֔ה לְ/עֵינֵ֖י כָּל הַ/קָּהָ֑ל וַ/יֹּ֣אמֶר דָּוִ֗יד
    בָּר֨וּךְ אַתָּ֤ה יְהוָה֙ אֱלֹהֵי֙ יִשְׂרָאֵ֣ל אָבִ֔י/נוּ מֵ/עוֹלָ֖ם וְ/עַד עוֹלָֽם־־־׃
translation:
  text: Then David blessed the LORD in the sight of all the assembly, and David said,
    “Blessed are you, LORD, God of Israel our father, from everlasting to everlasting.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'God of Israel, our Father,' if 'our Father' is taken as a direct address
      to God rather than as referring to Israel/Jacob.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְבָרֶךְ
  chosen: blessed
  alternatives:
  - praised
  lexicon: HALOT
  rationale: The verb ברך in the piel with God as object commonly means to bless in
    the sense of speaking blessing/praise toward God. 'Blessed' preserves the lexical
    link with the following בָּרוּךְ and keeps the liturgical tone better than the
    looser 'praised'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: לְעֵינֵי
  chosen: in the sight of
  alternatives:
  - before
  - in the presence of
  lexicon: HALOT
  rationale: Literally 'to/in the eyes of.' 'In the sight of' is natural English that
    still preserves the visual/public nuance of the Hebrew idiom.
- source_word: כָּל הַקָּהָל
  chosen: all the assembly
  alternatives:
  - all the congregation
  - the whole assembly
  lexicon: HALOT
  rationale: קָהָל denotes the gathered community. 'Assembly' is clear modern English
    and fits a formal public setting without importing later ecclesial associations
    too strongly.
- source_word: בָּרוּךְ אַתָּה
  chosen: Blessed are you
  alternatives:
  - May you be blessed
  - Blessed be you
  lexicon: HALOT
  rationale: This is the standard predicative blessing formula. 'Blessed are you'
    is idiomatic and preserves the direct address and doxological force.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: God of Israel
  alternatives:
  - God of Isra'el
  lexicon: HALOT
  rationale: A straightforward construct chain. 'God of Israel' is the natural English
    equivalent.
- source_word: אָבִינוּ
  chosen: our father
  alternatives:
  - our ancestor
  lexicon: HALOT
  rationale: 'The suffix is first person plural, and in context modifies Israel: ''God
    of Israel our father.'' This refers to Israel/Jacob as the nation''s forefather,
    not directly to God as ''our Father.'' ''Our father'' preserves the covenant-historical
    wording better than the more interpretive ''our ancestor''.'
- source_word: מֵעוֹלָם וְעַד עוֹלָם
  chosen: from everlasting to everlasting
  alternatives:
  - forever and ever
  - from eternity to eternity
  lexicon: HALOT
  rationale: This idiom expresses unbounded duration in both directions. 'From everlasting
    to everlasting' is the established and precise English equivalent, preserving
    the elevated doxological register.
