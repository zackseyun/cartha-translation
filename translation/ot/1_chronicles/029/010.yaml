theological_decisions:
- issue: Referent of 'our father' in the phrase 'God of Israel our father'
  chosen_reading: '''our father'' refers to Israel/Jacob, yielding ''God of Israel
    our father'''
  alternative_readings:
  - '''our Father'' taken as a direct address to God'
  rationale: The syntax most naturally reads אָבִינוּ as appositional to 'Israel,'
    a common patriarchal designation in such formulas. Rendering it this way avoids
    importing a different theological emphasis not demanded by the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
