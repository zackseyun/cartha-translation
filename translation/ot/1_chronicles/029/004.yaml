id: 1CH.29.4
reference: 1 Chronicles 29:4
source:
  edition: WLC
  text: שְׁלֹ֧שֶׁת אֲלָפִ֛ים כִּכְּרֵ֥י זָהָ֖ב מִ/זְּהַ֣ב אוֹפִ֑יר וְ/שִׁבְעַ֨ת אֲלָפִ֤ים
    כִּכַּר כֶּ֨סֶף֙ מְזֻקָּ֔ק לָ/ט֖וּחַ קִיר֥וֹת הַ/בָּתִּֽים־׃
translation:
  text: three thousand talents of gold, from the gold of Ophir, and seven thousand
    talents of refined silver, to overlay the walls of the buildings,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of Ophir gold.' The Hebrew can be understood as specifying gold sourced
      from Ophir or as a descriptive genitive.
    reason: lexical_alternative
  - marker: b
    text: '''Talents'' is a unit of weight, not a reference to skill or ability.'
    reason: cultural_note
lexical_decisions:
- source_word: שְׁלֹשֶׁת אֲלָפִים
  chosen: three thousand
  lexicon: HALOT
  rationale: Cardinal number construction rendered straightforwardly in natural English.
- source_word: כִּכְּרֵי / כִּכַּר
  chosen: talents
  alternatives:
  - measures
  - weights
  lexicon: HALOT
  rationale: The term denotes a large unit of weight. 'Talents' is the standard English
    rendering and preserves the historical measure without flattening it into an imprecise
    modern equivalent.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Direct material term; no contextual reason to vary.
- source_word: מִזְּהַב אוֹפִיר
  chosen: from the gold of Ophir
  alternatives:
  - of Ophir gold
  - from Ophir gold
  lexicon: HALOT
  rationale: The min preposition is retained as 'from,' and Ophir is transliterated
    as a place name. This preserves the sense of provenance or source-quality associated
    with Ophir.
- source_word: וְשִׁבְעַת אֲלָפִים
  chosen: and seven thousand
  lexicon: HALOT
  rationale: Simple cardinal number phrase rendered directly.
- source_word: כֶּסֶף
  chosen: silver
  lexicon: HALOT
  rationale: Direct material term; context is precious metal, not money in general.
- source_word: מְזֻקָּק
  chosen: refined
  alternatives:
  - purified
  - pure
  lexicon: HALOT
  rationale: The passive participle indicates metal that has been refined. 'Refined'
    is precise and idiomatic for metallurgical context.
- source_word: לָטוּחַ
  chosen: to overlay
  alternatives:
  - to cover
  - to plaster
  - to coat
  lexicon: HALOT
  rationale: In this context of precious metals applied to walls, 'overlay' best captures
    the idea of covering a surface with a layer of metal. 'Plaster' would mislead
    in English toward mortar rather than metal facing.
- source_word: קִירוֹת
  chosen: the walls
  lexicon: HALOT
  rationale: Standard rendering of the plural noun in construct with 'the buildings.'
- source_word: הַבָּתִּים
  chosen: the buildings
  alternatives:
  - the houses
  - the temple rooms
  lexicon: HALOT
  rationale: Although literally 'houses,' in this temple-building context 'buildings'
    better conveys the architectural structures or chambers without suggesting domestic
    homes. It remains broad enough to match the Hebrew plural.
