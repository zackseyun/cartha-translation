id: 1CH.29.25
reference: 1 Chronicles 29:25
source:
  edition: WLC
  text: וַ/יְגַדֵּ֨ל יְהוָ֤ה אֶת שְׁלֹמֹה֙ לְ/מַ֔עְלָ/ה לְ/עֵינֵ֖י כָּל יִשְׂרָאֵ֑ל
    וַ/יִּתֵּ֤ן עָלָי/ו֙ ה֣וֹד מַלְכ֔וּת אֲ֠שֶׁר לֹֽא הָיָ֧ה עַל כָּל מֶ֛לֶךְ לְ/פָנָ֖י/ו
    עַל יִשְׂרָאֵֽל־־־־־־׃פ
translation:
  text: And the LORD made Solomon exceedingly great in the sight of all Israel, and
    gave him royal majesty such as had not been on any king before him over Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'royal splendor' or 'majesty of kingship.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְגַדֵּל
  chosen: made ... exceedingly great
  alternatives:
  - magnified
  - made great
  lexicon: HALOT
  rationale: Hiphil of גדל is causative, 'made great' or 'magnified.' The following
    לְמַעְלָה intensifies the idea, so 'made ... exceedingly great' captures both
    the causative verb and the adverbial elevation without sounding wooden.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated.
- source_word: לְמַעְלָה
  chosen: exceedingly
  alternatives:
  - upward
  - to a high degree
  - very highly
  lexicon: HALOT
  rationale: Here the adverbial form functions idiomatically as an intensifier with
    ויגדל, not as a spatial 'upward.' 'Exceedingly' gives natural English while preserving
    the force.
- source_word: לְעֵינֵי כָּל יִשְׂרָאֵל
  chosen: in the sight of all Israel
  alternatives:
  - before all Israel
  - in the eyes of all Israel
  lexicon: HALOT
  rationale: This Hebrew idiom denotes public perception or recognition. 'In the sight
    of all Israel' is clear, fairly literal, and idiomatic in English.
- source_word: וַיִּתֵּן עָלָיו
  chosen: gave him
  alternatives:
  - placed on him
  - bestowed on him
  lexicon: HALOT
  rationale: The Hebrew literally says 'gave upon him,' an idiom for bestowal. 'Gave
    him' is the most natural concise English equivalent.
- source_word: הוֹד מַלְכוּת
  chosen: royal majesty
  alternatives:
  - majesty of kingship
  - kingly splendor
  - royal splendor
  lexicon: HALOT
  rationale: הוֹד denotes splendor, majesty, or honor; מַלְכוּת specifies the royal
    sphere. 'Royal majesty' preserves both dignity and kingship in natural English.
- source_word: אֲשֶׁר לֹא הָיָה עַל כָּל מֶלֶךְ
  chosen: such as had not been on any king
  alternatives:
  - which had not been upon any king
  - the like of which was not on any king
  lexicon: HALOT
  rationale: The relative clause modifies 'royal majesty' and uses עַל idiomatically
    for something resting upon a person. 'Such as had not been on any king' is faithful
    and readable.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - prior to him
  - preceding him
  lexicon: HALOT
  rationale: 'Temporal sense is intended here: kings earlier than Solomon. ''Before
    him'' is the standard concise rendering.'
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - in Israel
  lexicon: HALOT
  rationale: With מלך, עַל marks rule or dominion over a people. 'Over Israel' best
    reflects royal authority.
