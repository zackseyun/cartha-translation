id: 1CH.29.28
reference: 1 Chronicles 29:28
source:
  edition: WLC
  text: וַ/יָּ֨מָת֙ בְּ/שֵׂיבָ֣ה טוֹבָ֔ה שְׂבַ֥ע יָמִ֖ים עֹ֣שֶׁר וְ/כָב֑וֹד וַ/יִּמְלֹ֛ךְ
    שְׁלֹמֹ֥ה בְנ֖/וֹ תַּחְתָּֽי/ו׃
translation:
  text: And he died in a good old age, full of days, riches, and honor; and Solomon
    his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'satisfied with days' for the Hebrew idiom 'full of days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: And he died
  alternatives:
  - So he died
  - Then he died
  lexicon: HALOT
  rationale: Wayyiqtol of מות narrates the next event in sequence. 'And he died' preserves
    the straightforward narrative force without adding interpretation.
- source_word: בְּשֵׂיבָה טוֹבָה
  chosen: in a good old age
  alternatives:
  - at a good old age
  - in ripe old age
  lexicon: HALOT
  rationale: The preposition ב plus שֵׂיבָה with the adjective טוֹבָה idiomatically
    describes the condition or circumstance of death. 'In a good old age' is a natural
    English rendering that preserves the Hebrew idiom and positive evaluation.
- source_word: שְׂבַע יָמִים
  chosen: full of days
  alternatives:
  - satisfied with days
  - having had his fill of days
  lexicon: HALOT
  rationale: This is a Hebrew idiom for a long, fulfilled life. 'Full of days' keeps
    the imagery and is established, readable English. It is preferable to a more interpretive
    paraphrase.
- source_word: עֹשֶׁר וְכָבוֹד
  chosen: riches, and honor
  alternatives:
  - wealth and honor
  - riches and glory
  lexicon: HALOT
  rationale: עֹשֶׁר denotes material wealth; כָבוֹד here refers to social honor or
    splendor. 'Riches, and honor' fits the context of royal prosperity and reputation.
    'Glory' is possible, but 'honor' better matches the human, royal context.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: מלך in the Qal commonly means 'reign' or 'be king.' In this succession
    context, 'reigned' is concise and idiomatic; 'became king' is possible but less
    directly tied to the verbal form.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - after him
  - instead of him
  lexicon: HALOT
  rationale: תחת with pronominal suffix in succession formulas means 'in his place'
    or 'instead of him.' 'In his place' is the most natural English expression for
    royal succession here.
- source_word: שְׁלֹמֹה בְנוֹ
  chosen: Solomon his son
  alternatives:
  - his son Solomon
  lexicon: HALOT
  rationale: Both English orders are possible. 'Solomon his son' follows the Hebrew
    order more closely while remaining natural.
