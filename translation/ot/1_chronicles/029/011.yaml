theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of נֵצַח in the praise list
  chosen_reading: victory
  alternative_readings:
  - everlastingness
  - preeminence
  rationale: The term is semantically debated, but in this sequence of royal/doxological attributes, "victory" best fits the immediate context and established usage. The alternatives are preserved in a footnote because the Hebrew can be understood more broadly as enduring preeminence.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
