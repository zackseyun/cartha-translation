id: 1CH.29.11
reference: 1 Chronicles 29:11
source:
  edition: WLC
  text: לְ/ךָ֣ יְ֠הוָה הַ/גְּדֻלָּ֨ה וְ/הַ/גְּבוּרָ֤ה וְ/הַ/תִּפְאֶ֨רֶת֙ וְ/הַ/נֵּ֣צַח וְ/הַ/ה֔וֹד כִּי כֹ֖ל בַּ/שָּׁמַ֣יִם וּ/בָ/אָ֑רֶץ לְ/ךָ֤ יְהוָה֙ הַ/מַּמְלָכָ֔ה וְ/הַ/מִּתְנַשֵּׂ֖א לְ/כֹ֥ל לְ/רֹֽאשׁ־׀׃
translation:
  text: Yours, O Yahweh, are the greatness and the power and the splendor and the victory and the majesty, for everything in the heavens and on the earth is yours. Yours, O Yahweh, is the kingdom, and you are exalted as head over all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the everlastingness" or "the preeminence" for "the victory"; the Hebrew נֵצַח here may denote enduring supremacy as well as triumph.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as "LORD" per the project's default for the divine name YHWH, following the stated doctrine and standard English convention of small-caps covenant name representation.
- source_word: לְךָ
  chosen: Yours / is yours
  alternatives:
  - to you belongs
  - belongs to you
  lexicon: HALOT
  rationale: The prefixed preposition with pronoun marks possession/dative of belonging. English idiom is best expressed by fronting "Yours" and later "is yours," preserving the emphatic repetition.
- source_word: הַגְּדֻלָּה
  chosen: the greatness
  alternatives:
  - greatness
  - majesty
  lexicon: HALOT
  rationale: A straightforward abstract noun meaning greatness. Kept with the article in English for the elevated liturgical style of the verse.
- source_word: הַגְּבוּרָה
  chosen: the power
  alternatives:
  - might
  - strength
  lexicon: HALOT
  rationale: Refers to might or power. "Power" is natural modern English and pairs well with the surrounding royal attributes.
- source_word: הַתִּפְאֶרֶת
  chosen: the splendor
  alternatives:
  - glory
  - beauty
  - honor
  lexicon: HALOT
  rationale: The noun can denote beauty, glory, or splendor. "Splendor" avoids repeating "glory" too soon and fits the sequence of royal praise terms.
- source_word: הַנֵּצַח
  chosen: the victory
  alternatives:
  - the everlastingness
  - the preeminence
  - the glory
  lexicon: HALOT
  rationale: In this doxological list, the term is traditionally difficult. Here it most plausibly conveys enduring triumph/preeminence. "Victory" is a well-established contextual rendering in this verse and fits the parallel praise nouns better than a temporal sense like "everlastingness."
- source_word: הַהוֹד
  chosen: the majesty
  alternatives:
  - the glory
  - the honor
  lexicon: HALOT
  rationale: Denotes majesty, splendor, or honor. "Majesty" suits the royal context and avoids overusing "glory" after rendering תפארת as "splendor."
- source_word: כִּי כֹל בַּשָּׁמַיִם וּבָאָרֶץ
  chosen: for everything in the heavens and on the earth
  alternatives:
  - for all that is in heaven and on earth
  - indeed, all in the heavens and the earth
  lexicon: HALOT
  rationale: כִּי is causal here ("for"). כֹל is best taken comprehensively as "everything" or "all that is." The plural "heavens" reflects the Hebrew form and remains natural in biblical English.
- source_word: הַמַּמְלָכָה
  chosen: the kingdom
  alternatives:
  - the kingship
  - the reign
  - the sovereignty
  lexicon: HALOT
  rationale: The noun denotes kingdom/kingship/royal rule. "Kingdom" is the most direct and idiomatic rendering here, while still implying royal dominion.
- source_word: וְהַמִּתְנַשֵּׂא
  chosen: and you are exalted
  alternatives:
  - and the one exalted
  - and exalting yourself
  lexicon: HALOT
  rationale: 'The participle in context functions predicatively after "Yours, O LORD, is the kingdom," shifting naturally into a verbal clause in English: "and you are exalted." This preserves the sense without awkward nominalization.'
- source_word: לְכֹל לְרֹאשׁ
  chosen: as head over all
  alternatives:
  - over all as head
  - as chief over all
  lexicon: HALOT
  rationale: The phrase expresses supremacy or chief status over all. "As head over all" is idiomatic and preserves the metaphor of headship/chief rule.
