id: 1CH.29.8
reference: 1 Chronicles 29:8
source:
  edition: WLC
  text: וְ/הַ/נִּמְצָ֤א אִתּ/וֹ֙ אֲבָנִ֔ים נָתְנ֖וּ לְ/אוֹצַ֣ר בֵּית יְהוָ֑ה עַ֥ל יַד יְחִיאֵ֖ל הַ/גֵּרְשֻׁנִּֽי־־׃
translation:
  text: Whoever had stones gave them to the treasury of the house of Yahweh, into the care of Jehiel the Gershonite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the hand of Jehiel,'' an idiom meaning under Jehiel''s care or supervision.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנִּמְצָא אִתּוֹ
  chosen: Whoever had
  alternatives:
  - and the one found with him/it
  - everyone with whom there was found
  lexicon: HALOT
  rationale: The Niphal participle of מצא with אִתּוֹ is idiomatic for something being found in someone's possession. English smooths this naturally as 'whoever had' rather than a wooden 'the one with whom it was found.' The distributive sense fits the context of voluntary contributions by many people.
- source_word: אֲבָנִים
  chosen: precious stones
  alternatives:
  - stones
  - gems
  lexicon: HALOT
  rationale: In the temple-donation context, 'stones' refers not to ordinary rocks but valuable stones for treasury or ornamentation. 'Precious stones' makes the contextual sense explicit without over-specifying particular gem types.
- source_word: נָתְנוּ
  chosen: gave
  alternatives:
  - donated
  - placed
  lexicon: HALOT
  rationale: The common verb נתן here denotes giving over as an offering/contribution. 'Gave' is the most direct and natural rendering.
- source_word: לְאוֹצַר
  chosen: to the treasury
  alternatives:
  - for the treasury
  - to the storehouse
  lexicon: HALOT
  rationale: אוֹצָר can mean treasury, storehouse, or treasure. In connection with temple valuables, 'treasury' best captures the institutional repository for donated wealth.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: The construct phrase is literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew expression while remaining clear in English. 'Temple' is possible but less formally aligned with the source wording.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַל יַד
  chosen: into the care of
  alternatives:
  - by the hand of
  - under the supervision of
  - through
  lexicon: HALOT
  rationale: The idiom עַל יַד literally means 'by the hand of' and often indicates agency or entrusted oversight. Here it marks that the donated stones were placed under Jehiel's custodianship. 'Into the care of' communicates the function clearly in modern English.
- source_word: יְחִיאֵל
  chosen: Jehiel
  rationale: Personal names are transliterated by standard English convention.
- source_word: הַגֵּרְשֻׁנִּי
  chosen: the Gershonite
  alternatives:
  - the Gershonite Levite
  lexicon: HALOT
  rationale: The gentilic identifies Jehiel as belonging to the Gershonite clan. 'The Gershonite' is sufficient and formally close to the Hebrew.
