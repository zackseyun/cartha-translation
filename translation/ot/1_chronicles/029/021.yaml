id: 1CH.29.21
reference: 1 Chronicles 29:21
source:
  edition: WLC
  text: וַ/יִּזְבְּח֣וּ לַ/יהוָ֣ה זְ֠בָחִים וַ/יַּעֲל֨וּ עֹל֜וֹת לַ/יהוָ֗ה לְֽ/מָחֳרַת֮
    הַ/יּ֣וֹם הַ/הוּא֒ פָּרִ֨ים אֶ֜לֶף אֵילִ֥ים אֶ֛לֶף כְּבָשִׂ֥ים אֶ֖לֶף וְ/נִסְכֵּי/הֶ֑ם
    וּ/זְבָחִ֥ים לָ/רֹ֖ב לְ/כָל יִשְׂרָאֵֽל׀־׃
translation:
  text: 'They sacrificed sacrifices to the LORD and offered up burnt offerings to
    the LORD on the next day after that day: one thousand bulls, one thousand rams,
    one thousand lambs, and their drink offerings, and sacrifices in abundance for
    all Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more smoothly, 'on the following day.' The Hebrew is literally 'on the
      next day after that day.'
    reason: lexical_alternative
  - marker: b
    text: '''Drink offerings'' refers to liquid offerings poured out with the animal
      sacrifices; alternatively, ''libations.'''
    reason: cultural_note
  - marker: c
    text: Or 'on behalf of all Israel.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּזְבְּחוּ
  chosen: They sacrificed
  alternatives:
  - They slaughtered for sacrifice
  - They offered sacrifices
  lexicon: HALOT
  rationale: The verb זבח in cultic context refers to sacrificial slaughter/offer.
    'They sacrificed' is concise and natural, while the following cognate noun is
    retained to reflect the Hebrew emphasis.
- source_word: זְבָחִים
  chosen: sacrifices
  alternatives:
  - sacrificial offerings
  lexicon: HALOT
  rationale: Generic peace/fellowship-type sacrificial offerings are in view, distinguished
    from the subsequent עֹלוֹת ('burnt offerings'). Rendering both terms separately
    preserves the Hebrew distinction.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition marks dedication/direction of the offerings. 'the LORD'
    follows the project's default rendering for YHWH.
- source_word: עֹלוֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: Standard and accurate cultic term for offerings wholly burned on the
    altar. 'Whole burnt offerings' is more explicit but less idiomatic in English.
- source_word: לְמָחֳרַת הַיּוֹם הַהוּא
  chosen: on the next day after that day
  alternatives:
  - on the following day
  - the next day
  lexicon: HALOT
  rationale: The Hebrew is somewhat emphatic/literal ('on the morrow of that day').
    This rendering preserves the temporal sequence without becoming obscure. A smoother
    alternative is worth noting.
- source_word: פָּרִים אֶלֶף
  chosen: one thousand bulls
  alternatives:
  - a thousand bulls
  lexicon: HALOT
  rationale: פָּרִים are mature bovines suitable for sacrifice; 'bulls' is the natural
    English equivalent.
- source_word: אֵילִים אֶלֶף
  chosen: one thousand rams
  alternatives:
  - a thousand rams
  lexicon: HALOT
  rationale: אֵילִים specifically denotes rams, not generic sheep.
- source_word: כְּבָשִׂים אֶלֶף
  chosen: one thousand lambs
  alternatives:
  - a thousand lambs
  - one thousand sheep
  lexicon: HALOT
  rationale: כְּבָשִׂים commonly refers to lambs/young sheep in sacrificial contexts.
    'Lambs' best fits the cultic setting.
- source_word: וְנִסְכֵּיהֶם
  chosen: and their drink offerings
  alternatives:
  - and their libations
  lexicon: HALOT
  rationale: נסכים are accompanying liquid offerings poured out with the animal sacrifices.
    'Drink offerings' is clearer for modern readers than 'libations'.
- source_word: וּזְבָחִים לָרֹב
  chosen: and sacrifices in abundance
  alternatives:
  - and many sacrifices
  - and sacrifices in great number
  lexicon: HALOT
  rationale: לָרֹב expresses abundance/large quantity. This phrase likely summarizes
    additional sacrifices beyond the enumerated burnt offerings.
- source_word: לְכָל יִשְׂרָאֵל
  chosen: for all Israel
  alternatives:
  - on behalf of all Israel
  lexicon: HALOT
  rationale: The phrase indicates the beneficiaries or representative scope of the
    sacrifices. 'For all Israel' is faithful and readable; 'on behalf of' is interpretively
    stronger.
