theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the doctrinal and
    stylistic guidance to preserve reverential convention while signaling the covenant
    name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether לְכָל יִשְׂרָאֵל implies representative atonement language
  chosen_reading: for all Israel
  alternative_readings:
  - on behalf of all Israel
  rationale: The Hebrew preposition ל here naturally allows a broad 'for' sense without
    requiring a more theologically loaded formulation. The translation preserves the
    text's scope without importing a stronger sacrificial theory than the verse states.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
