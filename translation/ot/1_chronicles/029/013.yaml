id: 1CH.29.13
reference: 1 Chronicles 29:13
source:
  edition: WLC
  text: וְ/עַתָּ֣ה אֱלֹהֵ֔י/נוּ מוֹדִ֥ים אֲנַ֖חְנוּ לָ֑/ךְ וּֽ/מְהַֽלְלִ֖ים לְ/שֵׁ֥ם
    תִּפְאַרְתֶּֽ/ךָ׃
translation:
  text: And now, our God, we give thanks to you and praise your glorious name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'praise the name of your glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Temporal/discourse marker introducing the present response in prayer.
    'And now' preserves the connective waw and the rhetorical flow better than a bare
    'Now.'
- source_word: אֱלֹהֵינוּ
  chosen: our God
  alternatives:
  - O our God
  lexicon: HALOT
  rationale: Construct form with 1cp suffix. 'Our God' is the plain sense. An English
    vocative 'O' is possible in prayer, but the Hebrew does not require it, and modern
    readable English is better served without it.
- source_word: מוֹדִים אֲנַחְנוּ לָךְ
  chosen: we give thanks to you
  alternatives:
  - we thank you
  - we confess to you
  lexicon: HALOT
  rationale: ידה in the Hiphil commonly means 'give thanks, praise' in worship contexts.
    Here, with לָךְ and parallel to 'praise,' 'give thanks to you' best preserves
    the verbal nuance and avoids flattening the parallelism into two near-identical
    English verbs. 'Confess' is a possible sense elsewhere but does not fit this context.
- source_word: וּמְהַלְלִים
  chosen: and praise
  alternatives:
  - and are praising
  - and extol
  lexicon: HALOT
  rationale: הלל in the Piel/participle denotes praising or extolling. 'And praise'
    gives natural English while preserving the coordinate participial sense in context.
- source_word: לְשֵׁם
  chosen: your ... name
  alternatives:
  - to the name of
  - for the name of
  lexicon: HALOT
  rationale: The preposition ל with 'name' in praise formulas is idiomatically rendered
    in English without a wooden 'to the name of.' The object of praise is God's name,
    represented naturally as 'praise your ... name.'
- source_word: תִּפְאַרְתֶּךָ
  chosen: glorious
  alternatives:
  - glory
  - splendor
  - majestic
  lexicon: HALOT
  rationale: The noun denotes beauty, glory, or splendor. In the construct phrase
    'name of your splendor/glory,' idiomatic English is better served by the adjectival
    rendering 'your glorious name,' which preserves the sense without awkwardness.
    'Splendid name' is possible but less natural in contemporary English.
