theological_decisions:
- issue: Rendering the divine address without adding liturgical archaism
  chosen_reading: our God
  alternative_readings:
  - O our God
  rationale: The verse is a prayer, but the Hebrew does not require an added vocative
    particle. Following the project's readable modern English principle, the translation
    keeps the direct address without importing archaic devotional style.
  doctrine_reference: Translation philosophy §6
- issue: Handling the theology of the 'name' expression
  chosen_reading: praise your glorious name
  alternative_readings:
  - praise the name of your glory
  - praise your name of splendor
  rationale: The Hebrew 'name' language is retained because it is theologically significant
    in biblical worship, referring to God's revealed reputation and honor. The phrase
    is rendered idiomatically rather than reduced to a paraphrase like 'praise you
    for your glory.'
  doctrine_reference: Translation philosophy §1 and §6
