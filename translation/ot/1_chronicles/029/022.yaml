id: 1CH.29.22
reference: 1 Chronicles 29:22
source:
  edition: WLC
  text: וַ/יֹּאכְל֨וּ וַ/יִּשְׁתּ֜וּ לִ/פְנֵ֧י יְהוָ֛ה בַּ/יּ֥וֹם הַ/ה֖וּא בְּ/שִׂמְחָ֣ה
    גְדוֹלָ֑ה וַ/יַּמְלִ֤יכוּ שֵׁנִית֙ לִ/שְׁלֹמֹ֣ה בֶן דָּוִ֔יד וַ/יִּמְשְׁח֧וּ לַ/יהוָ֛ה
    לְ/נָגִ֥יד וּ/לְ/צָד֖וֹק לְ/כֹהֵֽן־׃
translation:
  text: And they ate and drank before the LORD on that day with great joy, and they
    made Solomon son of David king a second time, and they anointed him for the LORD
    as ruler, and Zadok as priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the presence of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'again' for 'a second time.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they anointed him before the LORD as ruler'; the Hebrew may express
      dedication to the LORD or action done in his presence.
    reason: alternative_reading
  - marker: d
    text: '''Ruler'' translates Hebrew nagid, also rendered ''prince'' or ''leader''
      in some contexts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: The phrase literally denotes being before/in the presence of YHWH. 'Before
    the LORD' is a natural and established English rendering that preserves the cultic
    setting. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name follows the project's default rendering 'the LORD' per
    DOCTRINE.md contested terms.
- source_word: בְּשִׂמְחָה גְדוֹלָה
  chosen: with great joy
  alternatives:
  - in great joy
  - with great gladness
  lexicon: HALOT
  rationale: The preposition ב plus noun/adjective expresses manner. 'With great joy'
    is idiomatic modern English and preserves the celebratory force without paraphrase.
- source_word: וַיַּמְלִיכוּ
  chosen: they made ... king
  alternatives:
  - they crowned
  - they proclaimed ... king
  lexicon: HALOT
  rationale: The Hiphil of מלך means to cause to reign/make king. 'Made ... king'
    is closer to the Hebrew than 'crowned,' which would add ceremony not explicit
    in the verb.
- source_word: שֵׁנִית
  chosen: a second time
  alternatives:
  - again
  lexicon: HALOT
  rationale: The adverb explicitly marks repetition. 'A second time' preserves the
    specificity better than the looser 'again.'
- source_word: וַיִּמְשְׁחוּ
  chosen: they anointed
  lexicon: HALOT
  rationale: The verb משׁח is the standard term for ritual anointing in royal/priestly
    installation contexts; 'anointed' is the direct and theologically appropriate
    rendering.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - before the LORD
  - to the LORD
  lexicon: HALOT
  rationale: 'Here the lamed likely indicates relation or dedication: the anointing
    is done with reference to the LORD, that is, under his authority/for his service.
    ''For the LORD'' preserves that sense without over-specifying.'
- source_word: לְנָגִיד
  chosen: as ruler
  alternatives:
  - as prince
  - as leader
  lexicon: HALOT
  rationale: נָגִיד often denotes a leader appointed over the people, especially in
    royal contexts. 'Ruler' communicates authority clearly in modern English while
    avoiding the potentially misleading aristocratic nuance of 'prince.'
- source_word: לְכֹהֵן
  chosen: as priest
  lexicon: HALOT
  rationale: The noun straightforwardly denotes priestly office. 'As priest' matches
    the parallel structure with Solomon's appointment.
- source_word: בֶן דָּוִיד
  chosen: son of David
  lexicon: HALOT
  rationale: The filial designation is retained formally and identifies Solomon in
    dynastic relation to David.
