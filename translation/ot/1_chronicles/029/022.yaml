theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the Tetragrammaton as 'the LORD,' following
    the stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of לַיהוָה in the anointing clause
  chosen_reading: they anointed him for the LORD as ruler
  alternative_readings:
  - they anointed him before the LORD as ruler
  - they anointed him to the LORD as ruler
  rationale: The Hebrew permits several closely related nuances. 'For the LORD' best
    preserves the idea of appointment in relation to and under the authority of the
    LORD without forcing a narrower ceremonial sense.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
