id: 1CH.29.17
reference: 1 Chronicles 29:17
source:
  edition: WLC
  text: וְ/יָדַ֣עְתִּי אֱלֹהַ֔/י כִּ֤י אַתָּה֙ בֹּחֵ֣ן לֵבָ֔ב וּ/מֵישָׁרִ֖ים תִּרְצֶ֑ה
    אֲנִ֗י בְּ/יֹ֤שֶׁר לְבָבִ/י֙ הִתְנַדַּ֣בְתִּי כָל אֵ֔לֶּה וְ/עַתָּ֗ה עַמְּ/ךָ֙
    הַ/נִּמְצְאוּ פֹ֔ה רָאִ֥יתִי בְ/שִׂמְחָ֖ה לְ/הִֽתְנַדֶּב לָֽ/ךְ־־־׃
translation:
  text: And I know, my God, that you test the heart and take pleasure in uprightness.
    I, in the uprightness of my heart, have willingly offered all these things, and
    now I have seen your people who are present here willingly offer to you with joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'delight in integrity' for 'take pleasure in uprightness.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your people who are found here,' that is, 'who are present here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֹּחֵן לֵבָב
  chosen: test the heart
  alternatives:
  - examine the heart
  - try the heart
  lexicon: HALOT
  rationale: בֹּחֵן denotes examining or testing; 'test' is natural modern English
    and preserves the evaluative sense. לֵבָב is singular 'heart,' functioning collectively
    for the inner person.
- source_word: וּמֵישָׁרִים תִּרְצֶה
  chosen: take pleasure in uprightness
  alternatives:
  - delight in integrity
  - approve what is right
  lexicon: HALOT
  rationale: מֵישָׁרִים refers to uprightness/straightness/right conduct, and תִּרְצֶה
    conveys being pleased with or accepting. 'Take pleasure in uprightness' preserves
    both the moral quality and God's favorable disposition.
- source_word: בְּיֹשֶׁר לְבָבִי
  chosen: in the uprightness of my heart
  alternatives:
  - with an upright heart
  - in integrity of heart
  lexicon: HALOT
  rationale: The phrase expresses the manner or moral quality of David's giving. 'In
    the uprightness of my heart' closely reflects the Hebrew while remaining readable.
- source_word: הִתְנַדַּבְתִּי
  chosen: have willingly offered
  alternatives:
  - have freely given
  - have volunteered
  lexicon: HALOT
  rationale: The hitpael of נדב conveys voluntary, willing offering. 'Have willingly
    offered' fits the cultic-donative context better than the more general 'volunteered'.
- source_word: כָל אֵלֶּה
  chosen: all these things
  alternatives:
  - all these
  - all this
  lexicon: HALOT
  rationale: The demonstrative likely refers to the gifts just mentioned. 'All these
    things' makes the referent explicit in idiomatic English without over-specifying.
- source_word: עַמְּךָ הַנִּמְצְאוּ פֹה
  chosen: your people who are present here
  alternatives:
  - your people found here
  - your people who are here
  lexicon: HALOT
  rationale: נמצא in the nifal can mean 'be found' or idiomatically 'be present.'
    'Who are present here' is the clearest natural English rendering in context.
- source_word: רָאִיתִי בְשִׂמְחָה
  chosen: I have seen ... with joy
  alternatives:
  - I have seen joyfully
  - I have watched with gladness
  lexicon: HALOT
  rationale: 'The prepositional phrase modifies David''s seeing: he observes with
    joy. Rendering it as ''I have seen ... with joy'' preserves the syntax and sense.'
- source_word: לְהִתְנַדֶּב לָךְ
  chosen: willingly offer to you
  alternatives:
  - freely give to you
  - volunteer offerings to you
  lexicon: HALOT
  rationale: The infinitive of נדב again conveys voluntary giving. Repeating 'willingly
    offer' maintains lexical consistency with הִתְנַדַּבְתִּי while fitting the clause.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward possessive address; standard and natural English.
