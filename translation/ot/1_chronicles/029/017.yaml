theological_decisions:
- issue: Anthropological term לֵבָב
  chosen_reading: heart as the inner person/will
  alternative_readings:
  - mind
  - inner being
  rationale: In Hebrew anthropology, 'heart' includes thought and intention, but English
    'heart' remains the standard biblical rendering and preserves the metaphor without
    reduction.
