id: 1CH.29.2
reference: 1 Chronicles 29:2
source:
  edition: WLC
  text: וּֽ/כְ/כָל כֹּחִ֞/י הֲכִינ֣וֹתִי לְ/בֵית אֱלֹהַ֗/י הַ/זָּהָ֣ב לַ֠/זָּהָב וְ/הַ/כֶּ֨סֶף
    לַ/כֶּ֜סֶף וְ/הַ/נְּחֹ֣שֶׁת לַ/נְּחֹ֗שֶׁת הַ/בַּרְזֶל֙ לַ/בַּרְזֶ֔ל וְ/הָ/עֵצִ֖ים
    לָ/עֵצִ֑ים אַבְנֵי שֹׁ֨הַם וּ/מִלּוּאִ֜ים אַבְנֵי פ֣וּךְ וְ/רִקְמָ֗ה וְ/כֹ֨ל אֶ֧בֶן
    יְקָרָ֛ה וְ/אַבְנֵי שַׁ֖יִשׁ לָ/רֹֽב־־׀־־־׃
translation:
  text: 'And with all my strength I have prepared for the house of my God: the gold
    for the things of gold, and the silver for the things of silver, and the bronze
    for the things of bronze, the iron for the things of iron, and the wood for the
    things of wood; onyx stones, settings, antimony stones, variegated stones, every
    precious stone, and marble stones in abundance.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The exact identification of some stones in this verse is uncertain. 'Onyx'
      for שֹׁהַם and 'marble' for שַׁיִשׁ follow common traditional renderings, though
      other identifications have been proposed.
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'mountings' or 'inlays' for 'settings' (מִלּוּאִים).
    reason: lexical_alternative
  - marker: c
    text: The phrase rendered 'antimony stones' (אַבְנֵי פוּךְ) is difficult; it may
      refer to stones associated with dark pigment, decorative inlay, or another ornamental
      material.
    reason: lexical_alternative
  - marker: d
    text: '''Variegated stones'' renders רִקְמָה in light of the surrounding list
      of stones and building materials; elsewhere the word can refer to embroidered
      or richly patterned work.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְכָל כֹּחִי
  chosen: And with all my strength
  alternatives:
  - Now with all my strength
  - according to all my strength
  - with all my ability
  lexicon: HALOT
  rationale: כֹּחַ denotes strength, power, or capacity. In this context David speaks
    of the full exertion of his resources and effort. 'With all my strength' is idiomatic
    and preserves the personal intensity better than the more wooden 'according to
    all my strength.'
- source_word: הֲכִינוֹתִי
  chosen: I have prepared
  alternatives:
  - I prepared
  - I have made ready
  lexicon: HALOT
  rationale: The perfect verb presents David's completed action with present relevance
    in his speech. 'I have prepared' captures that force naturally in English.
- source_word: לְבֵית אֱלֹהַי
  chosen: for the house of my God
  alternatives:
  - for my God's house
  - for the temple of my God
  lexicon: HALOT
  rationale: בַּיִת here refers to the sanctuary/temple structure. 'House of my God'
    preserves the Hebrew expression and its personal devotion; 'temple' is interpretive
    and less formally tied to the source wording.
- source_word: הַזָּהָב לַזָּהָב
  chosen: the gold for the things of gold
  alternatives:
  - gold for gold things
  - the gold for gold
  lexicon: HALOT
  rationale: The repeated material + ל construction indicates material designated
    for objects made of that material. Supplying 'the things of' makes the sense explicit
    in natural English without over-paraphrasing.
- source_word: וְהַכֶּסֶף לַכֶּסֶף
  chosen: and the silver for the things of silver
  alternatives:
  - and silver for silver things
  - and the silver for silver
  lexicon: HALOT
  rationale: Same construction as with gold; the supplied phrase clarifies intended
    use.
- source_word: וְהַנְּחֹשֶׁת לַנְּחֹשֶׁת
  chosen: and the bronze for the things of bronze
  alternatives:
  - and the bronze for bronze things
  - and the copper for the things of copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper or bronze depending on context. In temple-furnishing
    contexts 'bronze' is the conventional and likely sense for worked metal objects.
- source_word: הַבַּרְזֶל לַבַּרְזֶל
  chosen: the iron for the things of iron
  alternatives:
  - the iron for iron things
  lexicon: HALOT
  rationale: The same material-designation pattern continues; 'things of iron' is
    explicit and readable.
- source_word: וְהָעֵצִים לָעֵצִים
  chosen: and the wood for the things of wood
  alternatives:
  - and the timber for wooden things
  - and the wood for woodwork
  lexicon: HALOT
  rationale: עֵצִים means wood/timber. 'Wood' keeps the parallelism with the preceding
    materials. 'Timber' would narrow the sense.
- source_word: אַבְנֵי שֹׁהַם
  chosen: onyx stones
  alternatives:
  - onyx
  - beryl stones
  lexicon: HALOT
  rationale: שֹׁהַם is traditionally rendered 'onyx,' though the exact gemstone identification
    is uncertain. Because 'onyx' is the standard English rendering, it is retained,
    with uncertainty preserved in a footnote.
- source_word: וּמִלּוּאִים
  chosen: settings
  alternatives:
  - mountings
  - inlays
  - fillings
  lexicon: HALOT
  rationale: The noun refers to settings or mountings for stones in ornamental work.
    'Settings' is concise and fits the list of temple materials.
- source_word: אַבְנֵי פוּךְ
  chosen: antimony stones
  alternatives:
  - stones of black pigment
  - stibium stones
  - painted stones
  lexicon: HALOT
  rationale: פּוּךְ usually denotes antimony/black cosmetic mineral. In this construction
    the exact referent is difficult; 'antimony stones' stays close to the Hebrew while
    signaling the lexical value without speculative paraphrase.
- source_word: וְרִקְמָה
  chosen: variegated stones
  alternatives:
  - colored stones
  - mosaic work
  - embroidered work
  lexicon: HALOT
  rationale: רִקְמָה often means variegated or embroidered work. Here, in a list of
    stones and building materials, it likely refers to variegated/colored stonework
    rather than textile embroidery. 'Variegated stones' makes the contextual sense
    explicit.
- source_word: וְכֹל אֶבֶן יְקָרָה
  chosen: every precious stone
  alternatives:
  - all kinds of precious stones
  - every valuable stone
  lexicon: HALOT
  rationale: A straightforward rendering preserving the distributive force of כֹּל
    with singular אֶבֶן.
- source_word: וְאַבְנֵי שַׁיִשׁ
  chosen: and marble stones
  alternatives:
  - alabaster stones
  - marble
  lexicon: HALOT
  rationale: שַׁיִשׁ commonly refers to marble or a similar polished stone. 'Marble
    stones' keeps the noun explicit and suits the building-material context.
- source_word: לָרֹב
  chosen: in abundance
  alternatives:
  - in great quantity
  - abundantly
  lexicon: HALOT
  rationale: The phrase indicates large quantity. 'In abundance' is natural and preserves
    the nominal force.
