id: 1CH.29.7
reference: 1 Chronicles 29:7
source:
  edition: WLC
  text: וַֽ/יִּתְּנ֞וּ לַ/עֲבוֹדַ֣ת בֵּית הָ/אֱלֹהִ֗ים זָהָ֞ב כִּכָּרִ֣ים חֲמֵֽשֶׁת
    אֲלָפִים֮ וַ/אֲדַרְכֹנִ֣ים רִבּוֹ֒ וְ/כֶ֗סֶף כִּכָּרִים֙ עֲשֶׂ֣רֶת אֲלָפִ֔ים וּ/נְחֹ֕שֶׁת
    רִבּ֛וֹ וּ/שְׁמוֹנַ֥ת אֲלָפִ֖ים כִּכָּרִ֑ים וּ/בַרְזֶ֖ל מֵֽאָה אֶ֥לֶף כִּכָּרִֽים־־־׃
translation:
  text: And they gave for the service of the house of God five thousand talents of
    gold and ten thousand darics, and ten thousand talents of silver, and eighteen
    thousand talents of bronze, and one hundred thousand talents of iron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''a myriad and eight thousand talents of bronze,'' that is, eighteen
      thousand talents.'
    reason: lexical_alternative
  - marker: b
    text: A 'daric' was a Persian gold coin.
    reason: cultural_note
  - marker: c
    text: A 'talent' was a large unit of weight, not a modern 'talent' in the sense
      of ability.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּתְּנוּ
  chosen: And they gave
  alternatives:
  - and they contributed
  - and they donated
  lexicon: HALOT
  rationale: The waw-consecutive with נתן narrates a completed action. 'Gave' is the
    plain, natural rendering; 'contributed' is possible in context but slightly more
    interpretive.
- source_word: לַעֲבוֹדַת
  chosen: for the service of
  alternatives:
  - for the work of
  lexicon: HALOT
  rationale: עֲבוֹדָה can mean service or work. In temple/building context, 'service
    of' preserves both labor and cultic function without over-narrowing to construction
    alone.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - God's house
  - the temple of God
  lexicon: HALOT
  rationale: A formal but clear rendering of the Hebrew phrase. 'Temple' would be
    understandable but imports a more specific English term not present in the wording.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Standard material term.
- source_word: כִּכָּרִים
  chosen: talents
  alternatives:
  - talent-weight measures
  lexicon: HALOT
  rationale: כִּכָּר here is a weight unit, conventionally rendered 'talent.' This
    is standard and readable, though it refers to weight rather than monetary 'talent'
    in modern English.
- source_word: חֲמֵשֶׁת אֲלָפִים
  chosen: five thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number construction modifying talents of gold.
- source_word: אֲדַרְכֹנִים
  chosen: darics
  alternatives:
  - gold coins
  - drachmas
  lexicon: HALOT
  rationale: This Persian loanword denotes darics, a known coin. Transliteration preserves
    the historical specificity better than the generic 'gold coins.' 'Drachmas' is
    inaccurate for this term.
- source_word: רִבּוֹ
  chosen: ten thousand
  alternatives:
  - a myriad
  lexicon: HALOT
  rationale: The singular numeral here denotes 10,000. 'Ten thousand' is clearer in
    modern English than 'a myriad.'
- source_word: כֶּסֶף
  chosen: silver
  lexicon: HALOT
  rationale: Standard material term.
- source_word: עֲשֶׂרֶת אֲלָפִים
  chosen: ten thousand
  lexicon: HALOT
  rationale: Straightforward numeral phrase modifying talents of silver.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper or bronze depending on context. In lists of
    construction metals for ancient temple furnishing, 'bronze' is the conventional
    and likely sense.
- source_word: וּשְׁמוֹנַת אֲלָפִים
  chosen: eighteen thousand
  alternatives:
  - and eight thousand
  lexicon: HALOT
  rationale: The conjunction links this numeral to the preceding רִבּוֹ, yielding
    10,000 + 8,000 = 18,000 talents of bronze. Rendering the total in English avoids
    awkwardness while accurately reflecting the Hebrew syntax.
- source_word: בַּרְזֶל
  chosen: iron
  lexicon: HALOT
  rationale: Standard material term.
- source_word: מֵאָה אֶלֶף
  chosen: one hundred thousand
  lexicon: HALOT
  rationale: Straightforward numeral phrase modifying talents of iron.
