id: 1CH.29.26
reference: 1 Chronicles 29:26
source:
  edition: WLC
  text: וְ/דָוִיד֙ בֶּן יִשָׁ֔י מָלַ֖ךְ עַל כָּל יִשְׂרָאֵֽל־־־׃
translation:
  text: And David son of Jesse reigned over all Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/דָוִיד
  chosen: And David
  alternatives:
  - Now David
  - David
  lexicon: HALOT
  rationale: The conjunction וְ is rendered as simple connective 'And,' which fits
    the narrative continuation. 'David' is transliterated as a personal name per translation
    philosophy.
- source_word: בֶּן יִשָׁי
  chosen: son of Jesse
  alternatives:
  - the son of Jesse
  lexicon: HALOT
  rationale: Construct phrase literally means 'son of Jesse.' English omits the article
    naturally. This preserves the genealogical identification without paraphrase.
- source_word: מָלַךְ
  chosen: reigned
  alternatives:
  - was king
  - became king
  lexicon: HALOT
  rationale: Qal perfect of מלך here denotes exercising kingship, not merely accession.
    'Reigned' best captures the verbal sense in context.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  lexicon: HALOT
  rationale: With מלך, עַל idiomatically marks the realm or people ruled. 'Over' is
    the natural English equivalent.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: HALOT
  rationale: כָּל with the proper name expresses totality of the nation. 'All Israel'
    is the standard, concise rendering and preserves the scope of David's rule.
