id: 1CH.29.29
reference: 1 Chronicles 29:29
source:
  edition: WLC
  text: וְ/דִבְרֵי֙ דָּוִ֣יד הַ/מֶּ֔לֶךְ הָ/רִאשֹׁנִ֖ים וְ/הָ/אֲחרֹנִ֑ים הִנָּ֣/ם
    כְּתוּבִ֗ים עַל דִּבְרֵי֙ שְׁמוּאֵ֣ל הָ/רֹאֶ֔ה וְ/עַל דִּבְרֵי֙ נָתָ֣ן הַ/נָּבִ֔יא
    וְ/עַל דִּבְרֵ֖י גָּ֥ד הַ/חֹזֶֽה־־־׃
translation:
  text: Now the acts of David the king, from first to last, are written in the records
    of Samuel the seer, and in the records of Nathan the prophet, and in the records
    of Gad the seer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the words/matters of David the king, the first and the last.' The Hebrew
      idiom refers to the events or acts of his reign.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'written on/upon the words of Samuel ... Nathan ... Gad'; here 'records'
      conveys that these are written source documents.
    reason: lexical_alternative
  - marker: c
    text: Both Hebrew titles רֹאֶה and חֹזֶה are rendered 'seer' here; alternatively,
      חֹזֶה could be rendered 'visionary' to preserve the lexical distinction.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - events
  - records
  lexicon: HALOT
  rationale: Although the noun literally derives from 'word/matter,' in the construction
    'the דברי of David ... the first and the last' it idiomatically refers to the
    matters or events of his reign. 'Acts' is natural English for a royal summary
    and fits the following temporal frame 'from first to last.'
- source_word: הָרִאשֹׁנִים וְהָאֲחֲרֹנִים
  chosen: from first to last
  alternatives:
  - the former and the latter
  - the first and the last
  lexicon: HALOT
  rationale: This pair is a Hebrew merism indicating the whole span. 'From first to
    last' communicates the idiomatic sense in readable English better than a more
    wooden rendering.
- source_word: הִנָּם כְּתוּבִים
  chosen: are written
  alternatives:
  - behold, they are written
  - are indeed written
  lexicon: HALOT
  rationale: The particle הִנָּם adds deictic/emphatic force, but in English the idiom
    'are written' sufficiently conveys the statement without awkwardly preserving
    'behold.' The emphasis is not strong enough to require an English intensifier
    in the main text.
- source_word: עַל
  chosen: in
  alternatives:
  - 'on'
  - upon
  lexicon: HALOT
  rationale: Here עַל with 'written' introduces the source/document in which the material
    is found. English idiom prefers 'written in the records of' rather than the more
    literal but less natural 'written on/upon the words of.'
- source_word: דִּבְרֵי שְׁמוּאֵל
  chosen: the records of Samuel
  alternatives:
  - the words of Samuel
  - the chronicles of Samuel
  lexicon: HALOT
  rationale: Because דִּבְרֵי here refers to written source material, 'records' best
    captures the documentary sense. 'Words' would sound too speech-oriented in English,
    while 'chronicles' may over-specify genre.
- source_word: הָרֹאֶה
  chosen: the seer
  alternatives:
  - the visionary
  lexicon: HALOT
  rationale: רֹאֶה is a recognized prophetic title, traditionally distinguished from
    נָבִיא. 'Seer' is the standard concise English equivalent and preserves the title
    distinction.
- source_word: דִּבְרֵי נָתָן
  chosen: the records of Nathan
  alternatives:
  - the words of Nathan
  - the chronicles of Nathan
  lexicon: HALOT
  rationale: For consistency with the repeated phrase and the documentary context,
    the same rendering 'records' is used here.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Standard rendering of נָבִיא; it preserves the distinct title given to
    Nathan.
- source_word: דִּבְרֵי גָּד
  chosen: the records of Gad
  alternatives:
  - the words of Gad
  - the chronicles of Gad
  lexicon: HALOT
  rationale: Repeated phrase rendered consistently with the prior two occurrences.
- source_word: הַחֹזֶה
  chosen: the seer
  alternatives:
  - the visionary
  lexicon: HALOT
  rationale: חֹזֶה is another prophetic title often rendered 'seer.' Although distinct
    in Hebrew from רֹאֶה, English has no equally natural pair of common terms that
    preserves the distinction without awkwardness; 'seer' is retained, with the lexical
    overlap noted.
