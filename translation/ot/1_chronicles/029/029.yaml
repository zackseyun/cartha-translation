theological_decisions:
- issue: Rendering of prophetic titles רֹאֶה and חֹזֶה
  chosen_reading: Both rendered 'seer' in the main text
  alternative_readings:
  - Render one as 'seer' and the other as 'visionary' to preserve lexical distinction
  rationale: The verse lists three recognized prophetic sources and titles. The distinction
    between רֹאֶה and חֹזֶה is lexical/historical rather than doctrinally weighty
    here. Readable modern English favors the familiar 'seer' for both, while the alternative
    is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception) and §6 (readable modern English, not archaic or academic)
