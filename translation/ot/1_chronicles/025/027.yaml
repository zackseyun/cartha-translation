id: 1CH.25.27
reference: 1 Chronicles 25:27
source:
  edition: WLC
  text: לְ/עֶשְׂרִים֙ לֶֽ/אֱלִיָּ֔תָה בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים עָשָֽׂר׃
translation:
  text: for the twentieth, Eliathah; his sons and his brothers, twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more explicitly, ''for the twentieth lot: Eliathah, his sons and his
      brothers, twelve.'' The word ''lot'' is implied by the recurring structure of
      the chapter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/עֶשְׂרִים
  chosen: for the twentieth
  alternatives:
  - for the twenty-first division
  - the twentieth
  lexicon: HALOT
  rationale: In the lot/allotment list of this chapter, the prefixed ל marks assignment
    ('for' or 'belonging to') and עשרים is the ordinal slot in the sequence. English
    idiom in this context is best represented as 'for the twentieth,' matching the
    repeated formula of the chapter.
- source_word: לֶאֱלִיָּתָה
  chosen: Eliathah
  alternatives:
  - to Eliathah
  lexicon: HALOT
  rationale: Proper name transliterated rather than translated, per project philosophy.
    The prefixed ל is absorbed into the list formula already expressed by 'for the
    twentieth,' so the name stands appositionally as the person assigned that lot.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: בן in the plural with 3ms suffix specifically denotes male offspring.
    'Sons' is gender-accurate and fits the genealogical/musical roster context.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: אחים here most naturally means literal or clan 'brothers' within the
    roster. 'Brothers' preserves the familial terminology of the Hebrew without broadening
    it unnecessarily.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  alternatives:
  - were twelve
  lexicon: HALOT
  rationale: The cardinal number gives the total of the group. English may supply
    'were' for smoothness, but the verbless Hebrew list style is adequately conveyed
    by the appositional 'twelve' after the group designation.
