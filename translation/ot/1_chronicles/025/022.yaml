id: 1CH.25.22
reference: 1 Chronicles 25:22
source:
  edition: WLC
  text: לַ/חֲמִשָּׁ֤ה עָשָׂר֙ לִֽ/ירֵמ֔וֹת בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים עָשָֽׂר׃
translation:
  text: 'For the fifteenth, to Jeremoth: his sons and his brothers, twelve.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'For the fifteenth, to Jeremoth.' The word 'lot' is implied by
      the repeated pattern in this chapter but is not stated in Hebrew here.
    reason: cross_reference
  - marker: b
    text: Or 'for Jeremoth.' The Hebrew preposition can mark assignment in this list.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַחֲמִשָּׁה עָשָׂר
  chosen: For the fifteenth
  alternatives:
  - For the fifteenth lot
  - The fifteenth
  lexicon: HALOT
  rationale: The phrase is ordinal in sense within the repeated lot-allocation formula
    of this chapter. English supplies 'the' and uses 'for' to reflect the prefixed
    ל in this distribution context. 'Lot' is implied by the larger context but not
    expressed here, so it is not added to the main text.
- source_word: לִירֵמוֹת
  chosen: to Jeremoth
  alternatives:
  - for Jeremoth
  lexicon: HALOT
  rationale: The prefixed ל marks assignment/direction in the lot list. 'Jeremoth'
    is a standard transliteration of the personal name יְרֵמוֹת/יִרֵמוֹת.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically means 'his sons,' not the gender-neutral 'children.'
    This follows the gender-accurate principle.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: The noun means 'his brothers.' In this genealogical/organizational context
    it could denote close male relatives or clan associates, but 'brothers' is the
    most direct and transparent rendering.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  lexicon: HALOT
  rationale: Standard cardinal number indicating the total count associated with Jeremoth's
    sons and brothers.
