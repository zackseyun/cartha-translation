id: 1CH.25.10
reference: 1 Chronicles 25:10
source:
  edition: WLC
  text: הַ/שְּׁלִשִׁ֣י זַכּ֔וּר בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים עָשָֽׂר׃
translation:
  text: 'The third, Zaccur, his sons and his brothers: twelve.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, in context, 'the third lot fell to Zaccur; his sons and his brothers
      were twelve.' The noun 'lot' is implied from the surrounding verses rather than
      repeated here.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׁלִשִׁי
  chosen: The third
  alternatives:
  - the third lot
  - third
  lexicon: HALOT
  rationale: Ordinal with article functioning as a list marker in the sequence of
    divisions/lots in the surrounding context. 'The third' is concise and natural,
    while the implied idea of 'lot' is supplied by context rather than repeated in
    Hebrew here.
- source_word: זַכּוּר
  chosen: Zaccur
  alternatives:
  - Zakkur
  lexicon: HALOT
  rationale: Proper personal name, so transliterated rather than translated, in keeping
    with the translation philosophy. 'Zaccur' follows a standard English convention
    for this Hebrew name.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: בן in the masculine plural construct with 3ms suffix specifically means
    'his sons.' Gender-accurate rendering is required; 'children' would flatten the
    masculine reference not warranted by the source.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  - and his brethren
  lexicon: HALOT
  rationale: אחים with 3ms suffix is most directly 'his brothers.' Although it can
    occasionally broaden to kin-group, in these musician divisions the repeated formula
    is best preserved straightforwardly. 'Brothers' is also more readable than archaic
    'brethren.'
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  alternatives:
  - were twelve
  - made up twelve
  lexicon: HALOT
  rationale: Cardinal number giving the total size of the group. Hebrew here is verbless,
    so English may simply state 'twelve.' Supplying 'were' is possible but unnecessary;
    the colon preserves the list-like census style of the source.
