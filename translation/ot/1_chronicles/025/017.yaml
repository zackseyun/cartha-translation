id: 1CH.25.17
reference: 1 Chronicles 25:17
source:
  edition: WLC
  text: הָ/עֲשִׂירִ֣י שִׁמְעִ֔י בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים עָשָֽׂר׃
translation:
  text: the tenth, Shimei; his sons and his brothers, twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly in context, 'the tenth lot fell to Shimei.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֲשִׂירִי
  chosen: the tenth
  alternatives:
  - the tenth lot
  - the tenth division
  lexicon: HALOT
  rationale: Ordinal numeral with the article, continuing the sequence of lots/divisions
    in the surrounding context. English can supply simply 'the tenth' and let the
    context of the list imply the lot or assignment.
- source_word: שִׁמְעִי
  chosen: Shimei
  lexicon: HALOT
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: בנים specifically means 'sons' here, not a gender-neutral 'children.'
    This preserves the genealogical/list context and follows the gender-accurate policy.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: The normal sense of אחים with 3ms suffix is 'his brothers.' In this roster
    context it may denote close male relatives or fellow guild members from the family
    line, but 'brothers' is the most transparent and direct rendering; broader interpretations
    are better left implicit rather than imported into the main text.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  lexicon: HALOT
  rationale: Standard cardinal number. In context it gives the total count associated
    with Shimei's sons and brothers together, as in the repeated formula throughout
    the chapter.
