id: 1CH.25.15
reference: 1 Chronicles 25:15
source:
  edition: WLC
  text: הַ/שְּׁמִינִ֣י יְשַֽׁעְיָ֔הוּ בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים עָשָֽׂר׃
translation:
  text: the eighth to Jeshaiah, his sons and his brothers, twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the eighth lot: Jeshaiah, his sons and his brothers, twelve.'' The
      word ''lot'' is supplied by context from the surrounding list, not stated explicitly
      in this verse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׁמִינִי
  chosen: the eighth
  alternatives:
  - the eighth lot
  - the eighth division
  lexicon: HALOT
  rationale: Ordinal with article functioning in the lot/allotment list of this chapter.
    'The eighth' is the most textually direct rendering; 'lot' is implied by context
    rather than explicitly present in this verse, so it is not added to the main text.
- source_word: יְשַׁעְיָהוּ
  chosen: Jeshaiah
  alternatives:
  - Jeshaiahu
  rationale: Personal name is transliterated rather than translated, following the
    project's policy for names. 'Jeshaiah' is a standard English transliteration in
    this context.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: בנים specifically denotes 'sons' here, not generic children. This preserves
    the gendered wording of the Hebrew in line with the gender-accurate policy.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: אחים normally means 'brothers.' Although in some contexts it can broaden
    to kin or associates, this list formula is best preserved with the straightforward
    familial term unless context clearly requires otherwise.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  alternatives:
  - were twelve
  lexicon: HALOT
  rationale: Cardinal number giving the total count of the group. Hebrew omits a verb;
    English can preserve the terse list style by simply apposing 'twelve' rather than
    supplying 'were.'
