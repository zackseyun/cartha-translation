id: 1CH.25.29
reference: 1 Chronicles 25:29
source:
  edition: WLC
  text: לִ/שְׁנַ֤יִם וְ/עֶשְׂרִים֙ לְ/גִדַּ֔לְתִּי בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים
    עָשָֽׂר׃
translation:
  text: 'For the twenty-second, to Giddalti: his sons and his brothers, twelve.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''For the twenty-second lot, Giddalti, his sons and his brothers: twelve.''
      The Hebrew list style is compressed, and ''lot'' is implied from the surrounding
      context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁנַיִם וְעֶשְׂרִים
  chosen: For the twenty-second
  alternatives:
  - For the twenty and second
  - For the twenty-second lot
  lexicon: HALOT
  rationale: In this chapter the formula introduces the numbered lot/order in sequence.
    English idiom prefers the ordinal 'twenty-second.' 'For' reflects the prefixed
    ל in the recurring list structure.
- source_word: לְגִדַּלְתִּי
  chosen: to Giddalti
  alternatives:
  - for Giddalti
  lexicon: HALOT
  rationale: The prefixed ל marks assignment to the named individual in the lot list.
    'To Giddalti' is a natural rendering in English lists of allocation, while preserving
    the directional/assigning sense.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically denotes male offspring/plural sons, not children
    generally. This follows the gender-accurate principle.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: The plain lexical sense is 'his brothers.' Although broader kinship can
    sometimes be implied, nothing here requires expansion beyond the ordinary familial/group
    term.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  alternatives:
  - were twelve
  lexicon: HALOT
  rationale: The final numeral gives the total number in the group, as throughout
    the chapter. English can express this tersely by apposition after the list of
    persons. 'Were twelve' is possible but adds a copula not present in the Hebrew.
