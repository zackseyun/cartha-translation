id: 1CH.25.25
reference: 1 Chronicles 25:25
source:
  edition: WLC
  text: לִ/שְׁמוֹנָ֤ה עָשָׂר֙ לַ/חֲנָ֔נִי בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים עָשָֽׂר׃
translation:
  text: For the eighteenth, Hanani; his sons and his brothers, twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'For the eighteenth, Hanani, his sons and his brothers, twelve.'
      The word 'lot' is not stated here but is implied by the repeated pattern of
      the chapter.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁמוֹנָה עָשָׂר
  chosen: For the eighteenth
  alternatives:
  - For the eighteenth lot
  - The eighteenth
  lexicon: HALOT
  rationale: In the surrounding list of divisions/lots, the prefixed ל marks assignment
    ('for/to the eighteenth'). English idiom is best served by 'For the eighteenth,'
    echoing the repeated formula in the chapter without adding 'lot,' which is implied
    by context rather than explicit here.
- source_word: לַחֲנָנִי
  chosen: Hanani
  lexicon: HALOT
  rationale: Proper name; per translation philosophy, personal names are transliterated
    rather than translated.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically means 'his sons,' not the gender-neutral 'children.'
    This follows the gender-accurate principle and preserves the genealogical/list
    structure.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: The plain sense is 'his brothers.' Although in some contexts it can broaden
    to relatives or associates, this roster formula regularly uses the familial term,
    so 'brothers' is the most transparent rendering.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  lexicon: HALOT
  rationale: Cardinal number giving the total count of Hanani's sons and brothers
    in this division.
