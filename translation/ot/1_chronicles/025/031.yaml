id: 1CH.25.31
reference: 1 Chronicles 25:31
source:
  edition: WLC
  text: לְ/אַרְבָּעָ֤ה וְ/עֶשְׂרִים֙ לְ/רוֹמַ֣מְתִּי עָ֔זֶר בָּנָ֥י/ו וְ/אֶחָ֖י/ו
    שְׁנֵ֥ים עָשָֽׂר׃פ
translation:
  text: for the twenty-fourth, Romamti-ezer, his sons and his brothers, twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'for the twenty-fourth'; throughout this section the phrase refers
      to the twenty-fourth lot or division.
    reason: cross_reference
lexical_decisions:
- source_word: לְ/אַרְבָּעָה וְ/עֶשְׂרִים
  chosen: for the twenty-fourth
  alternatives:
  - for the four and twentieth
  - for the twenty-fourth lot
  lexicon: HALOT
  rationale: In this chapter each verse enumerates the successive lot assignments.
    The prefixed לְ marks assignment/distribution ('for'), and the compound numeral
    denotes ordinal sense in context, best rendered idiomatically as 'the twenty-fourth.'
    'Lot' is implied by the larger context but not expressed here, so it is not supplied
    in the main text.
- source_word: לְ/רוֹמַמְתִּי עָזֶר
  chosen: Romamti-ezer
  alternatives:
  - Romamti Ezer
  lexicon: HALOT
  rationale: This is a personal name, and per translation philosophy personal names
    are transliterated rather than translated. The maqqeph-like connection in English
    is conventionally represented with a hyphen.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically means 'his sons,' not the gender-neutral 'children.'
    This follows the gender-accurate principle and matches the genealogical/list context.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: The noun means 'his brothers.' In this roster context it may refer to
    male relatives or guild associates, but the lexical sense is 'brothers,' so that
    is retained.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  lexicon: HALOT
  rationale: Cardinal number indicating the total count of the named group, as throughout
    the chapter.
