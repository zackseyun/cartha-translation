id: 1CH.25.2
reference: 1 Chronicles 25:2
source:
  edition: WLC
  text: לִ/בְנֵ֣י אָסָ֗ף זַכּ֧וּר וְ/יוֹסֵ֛ף וּ/נְתַנְיָ֥ה וַ/אֲשַׂרְאֵ֖לָה בְּנֵ֣י
    אָסָ֑ף עַ֚ל יַד אָסָ֔ף הַ/נִּבָּ֖א עַל יְדֵ֥י הַ/מֶּֽלֶךְ־־׃
translation:
  text: 'Of the sons of Asaph: Zaccur, Joseph, Nethaniah, and Asharelah, the sons
    of Asaph, under the direction of Asaph, who prophesied under the direction of
    the king.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the hand of Asaph ... by the hand of the king.' The Hebrew idiom
      denotes agency, supervision, or direction.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי
  chosen: Of the sons of
  alternatives:
  - For the sons of
  - To the sons of
  lexicon: HALOT
  rationale: The prefixed ל with בני in this list context introduces the subdivision
    or category being enumerated. 'Of the sons of' is idiomatic English for a roster
    heading and fits the surrounding catalog structure better than a more wooden 'to/for
    the sons of.'
- source_word: אָסָף
  chosen: Asaph
  lexicon: HALOT
  rationale: Proper personal name; transliterated per translation philosophy.
- source_word: זַכּוּר
  chosen: Zaccur
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
- source_word: יוֹסֵף
  chosen: Joseph
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration.
- source_word: נְתַנְיָה
  chosen: Nethaniah
  alternatives:
  - Netaniah
  lexicon: HALOT
  rationale: Proper personal name; conventional English biblical transliteration preserves
    recognizability.
- source_word: אֲשַׂרְאֵלָה
  chosen: Asharelah
  alternatives:
  - Asarelah
  lexicon: HALOT
  rationale: Proper personal name; transliterated directly from the Hebrew form in
    WLC.
- source_word: בְּנֵי אָסָף
  chosen: the sons of Asaph
  alternatives:
  - Asaph's sons
  lexicon: HALOT
  rationale: Retained explicitly even though the phrase repeats, because the Hebrew
    repeats it and the repetition clarifies that the listed names belong to Asaph's
    line/group.
- source_word: עַל יַד
  chosen: under the direction of
  alternatives:
  - by the hand of
  - under the hand of
  lexicon: HALOT
  rationale: The idiom על יד literally means 'by the hand of' but commonly denotes
    agency, supervision, or direction. 'Under the direction of' communicates the administrative
    sense naturally in English.
- source_word: הַנִּבָּא
  chosen: who prophesied
  alternatives:
  - the one prophesying
  - who acted as prophet
  lexicon: HALOT
  rationale: The participle from נבא describes Asaph's prophetic activity in connection
    with temple music. A relative clause is the clearest English rendering here.
- source_word: עַל יְדֵי הַמֶּלֶךְ
  chosen: under the direction of the king
  alternatives:
  - by order of the king
  - under the hand of the king
  lexicon: HALOT
  rationale: The same idiom recurs with the king as the governing authority. 'Under
    the direction of the king' preserves the parallelism with the earlier phrase and
    reflects mediated authority rather than mere physical instrumentality.
