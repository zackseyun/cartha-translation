theological_decisions:
- issue: Meaning of 'prophesied' in a temple-musical context
  chosen_reading: Retain 'prophesied' in the main text for Asaph's inspired musical/ministerial
    activity.
  alternative_readings:
  - performed inspired music
  - sang prophetically
  rationale: The Chronicler uses נבא for temple musicians in a way that should not
    be flattened into mere performance. 'Prophesied' preserves the text's theological
    claim, while readers may understand from context that this prophetic activity
    occurs through liturgical music.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
