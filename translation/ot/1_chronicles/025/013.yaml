id: 1CH.25.13
reference: 1 Chronicles 25:13
source:
  edition: WLC
  text: הַ/שִּׁשִּׁ֣י בֻקִּיָּ֔הוּ בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים עָשָֽׂר׃
translation:
  text: 'the sixth, Bukkiah, his sons and his brothers: twelve.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly in context, 'the sixth lot fell to Bukkiah, his sons
      and his brothers, twelve.' The Hebrew list style leaves 'lot fell to' implied
      from the surrounding verses.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשִּׁשִּׁי
  chosen: the sixth
  alternatives:
  - the sixth lot
  - the sixth one
  lexicon: HALOT
  rationale: The ordinal with article functions elliptically in this roster of lots/divisions.
    English can preserve the concise list style with 'the sixth,' while the implied
    'lot' is understood from context and need not be supplied in the main text.
- source_word: בֻקִּיָּהוּ
  chosen: Bukkiah
  alternatives:
  - Bukkiyahu
  rationale: Personal names are transliterated rather than translated, following project
    policy.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically means 'his sons,' not the gender-neutral 'children.'
    This preserves the genealogical/list context and follows the gender-accurate policy.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  - and his brethren
  lexicon: HALOT
  rationale: The basic sense is male siblings or brothers. In this administrative/musical
    roster it may denote close male relatives or associates, but 'brothers' is the
    most direct and transparent rendering.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  alternatives:
  - were twelve
  - numbering twelve
  lexicon: HALOT
  rationale: The cardinal number gives the total of the group. English may render
    it simply as 'twelve' in apposition to the preceding members of the list; adding
    a verb would smooth the English but goes beyond the terse Hebrew style.
