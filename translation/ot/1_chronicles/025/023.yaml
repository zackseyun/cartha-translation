id: 1CH.25.23
reference: 1 Chronicles 25:23
source:
  edition: WLC
  text: לְ/שִׁשָּׁ֤ה עָשָׂר֙ לַ/חֲנַנְיָ֔הוּ בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים עָשָֽׂר׃
translation:
  text: The sixteenth was for Hananyahu, his sons and his brothers, twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly in context, 'The sixteenth lot was for Hananyahu.' The
      word 'lot' is implied by the surrounding verses but is not stated in the Hebrew
      of this verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְשִׁשָּׁה עָשָׂר
  chosen: The sixteenth was for
  alternatives:
  - For the sixteenth
  - The sixteenth lot was for
  lexicon: HALOT
  rationale: The preposition לְ with the ordinal expression marks assignment in the
    sequence of lots/divisions in this context. English supplies 'was' for natural
    syntax. 'Lot' is implied by the larger passage but not explicit in this verse,
    so it is not included in the main text.
- source_word: לַחֲנַנְיָהוּ
  chosen: Hananyahu
  alternatives:
  - Hananiahu
  - Hananiah
  lexicon: BDB
  rationale: Personal names are transliterated rather than translated. 'Hananyahu'
    closely reflects the Hebrew form חֲנַנְיָהוּ; more familiar anglicized forms are
    possible but less directly tied to the consonantal form here.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: בָּנִים specifically denotes sons here, not children in general. This
    follows the gender-accurate principle and matches the genealogical/list context.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: אָח commonly means 'brother' and in such lists can extend to close male
    relatives or associates, but 'brothers' is the most direct rendering and fits
    the recurring formula in this chapter.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  alternatives:
  - numbering twelve
  lexicon: HALOT
  rationale: The numeral gives the total count of the group. Simple 'twelve' is idiomatic
    and preserves the concise list style of the Hebrew.
