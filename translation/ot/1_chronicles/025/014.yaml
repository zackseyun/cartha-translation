id: 1CH.25.14
reference: 1 Chronicles 25:14
source:
  edition: WLC
  text: הַ/שְּׁבִעִ֣י יְשַׂרְאֵ֔לָה בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים עָשָֽׂר׃
translation:
  text: The seventh fell to Jesharelah, his sons and his brothers, twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'The seventh, Jesharelah, his sons and his brothers, twelve';
      the verb 'fell to' is supplied from the repeated lot-allocation formula in the
      surrounding verses.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׁבִעִי
  chosen: The seventh
  alternatives:
  - The seventh lot
  - The seventh division
  lexicon: HALOT
  rationale: Ordinal functioning substantivally in the lot-allocation list. English
    keeps the concise ordinal, with the implied allotment supplied by the verb.
- source_word: יְשַׂרְאֵלָה
  chosen: Jesharelah
  alternatives:
  - Israelah
  lexicon: HALOT
  rationale: Personal name is transliterated rather than translated, following the
    project's policy for names. 'Jesharelah' reflects standard English convention
    in this context.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically means 'his sons,' not the gender-neutral 'children.'
    This preserves the source's gender-specific wording.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: The noun ordinarily means 'brothers.' In this roster context it may denote
    male family/group associates, but the formal sense 'brothers' best matches the
    Hebrew and the project's gender-accurate policy.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  alternatives:
  - numbering twelve
  lexicon: HALOT
  rationale: Cardinal number giving the total count of the group. Simple English numeral
    is the most natural rendering.
- source_word: '[implied allotment formula]'
  chosen: fell to
  alternatives:
  - was for
  - belonged to
  lexicon: HALOT
  rationale: Although no verb appears in the clipped Hebrew line, the surrounding
    context repeatedly uses the lot-allocation formula. 'Fell to' naturally supplies
    the implied sense in English without over-paraphrasing.
