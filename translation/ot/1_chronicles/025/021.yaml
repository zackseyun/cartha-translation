id: 1CH.25.21
reference: 1 Chronicles 25:21
source:
  edition: WLC
  text: לְ/אַרְבָּעָ֤ה עָשָׂר֙ מַתִּתְיָ֔הוּ בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים עָשָֽׂר׃
translation:
  text: The fourteenth was Mattithiah, his sons and his brothers, twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'For fourteen, Mattithiah.' In context throughout this list,
      the number refers to the fourteenth lot or division.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/אַרְבָּעָה עָשָׂר
  chosen: The fourteenth
  alternatives:
  - For the fourteenth
  - The fourteenth lot
  lexicon: HALOT
  rationale: In this chapter the repeated formula with לְ + ordinal/number introduces
    the numbered lot or division. English idiom is best served by 'The fourteenth
    was ...' while preserving the list structure. 'Lot' is implied by context but
    not expressed in this verse, so it is not supplied in the main text.
- source_word: מַתִּתְיָהוּ
  chosen: Mattithiah
  alternatives:
  - Mattithyahu
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English conventions per
    translation philosophy.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically means 'his sons,' not a gender-neutral term.
    This follows the gender-accurate principle.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  - and his brethren
  lexicon: HALOT
  rationale: The noun specifically denotes brothers/brothers of the same group. 'Brothers'
    is the most direct modern rendering; 'brethren' is archaic and 'kinsmen' is broader
    than the Hebrew.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  alternatives:
  - were twelve in all
  lexicon: HALOT
  rationale: The phrase gives the total number associated with Mattithiah's sons and
    brothers. English can render this compactly as 'twelve' after the appositional
    list; the fuller paraphrase is unnecessary in the main text.
