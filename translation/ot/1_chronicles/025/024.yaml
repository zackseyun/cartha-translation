id: 1CH.25.24
reference: 1 Chronicles 25:24
source:
  edition: WLC
  text: לְ/שִׁבְעָ֤ה עָשָׂר֙ לְ/יָשְׁבְּקָ֔שָׁה בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים עָשָֽׂר׃
translation:
  text: for the seventeenth, to Joshbekashah, his sons and his brothers, twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'for the seventeenth, to Joshbekashah'; the noun 'lot' or 'division'
      is implied from the surrounding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְשִׁבְעָה עָשָׂר
  chosen: for the seventeenth
  alternatives:
  - for the seventeenth lot
  - for the seventeenth division
  lexicon: HALOT
  rationale: The preposition לְ with the ordinal expression in this roster context
    marks assignment in sequence. English idiom is best captured as 'for the seventeenth,'
    with the implied lot/division understood from the surrounding list.
- source_word: לְיָשְׁבְּקָשָׁה
  chosen: to Joshbekashah
  alternatives:
  - for Joshbekashah
  rationale: Personal names are transliterated. The prefixed לְ marks the person to
    whom the seventeenth assignment belongs; 'to' is a natural rendering in this list
    format.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: בנים specifically denotes sons here, not children in general. This preserves
    the gendered wording of the Hebrew in keeping with the translation philosophy.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: The noun ordinarily means brothers. In this genealogical-musical roster
    it could denote close male relatives, but 'brothers' is the most direct and transparent
    rendering.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  lexicon: HALOT
  rationale: Straightforward cardinal number giving the total count of the group.
