id: 1CH.25.26
reference: 1 Chronicles 25:26
source:
  edition: WLC
  text: לְ/תִשְׁעָ֤ה עָשָׂר֙ לְ/מַלּ֔וֹתִי בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים עָשָֽׂר׃
translation:
  text: for the nineteenth, Mallothi; his sons and his brothers, twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'for the nineteenth.' In this chapter's repeated formula, the
      sense is the nineteenth assignment or lot.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/תִשְׁעָה עָשָׂר
  chosen: for the nineteenth
  alternatives:
  - for the nineteen
  - for the nineteenth lot
  lexicon: HALOT
  rationale: 'In this roster of divisions/lots, the ordinal sense is required by context:
    each verse enumerates an assignment by order. The prefixed לְ is best rendered
    ''for'' in this formulaic listing.'
- source_word: לְ/מַלּוֹתִי
  chosen: Mallothi
  alternatives:
  - Malloti
  lexicon: HALOT
  rationale: Proper name, so transliterated rather than translated, following the
    project's policy for personal names. 'Mallothi' reflects the conventional English
    transliteration of מַלּוֹתִי.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'sons,' not the gender-neutral 'children.'
    This follows the gender-accurate policy and preserves the genealogical/list context.
- source_word: וְ/אֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: The plain lexical sense is 'brothers.' In this administrative/musical
    division list it may denote close male relatives or clan associates, but the base
    rendering should remain 'brothers' unless context clearly demands a broader term.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  lexicon: HALOT
  rationale: Straightforward cardinal number giving the total count in the division.
