id: 1CH.25.18
reference: 1 Chronicles 25:18
source:
  edition: WLC
  text: עַשְׁתֵּֽי עָשָׂ֣ר עֲזַרְאֵ֔ל בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים עָשָֽׂר־׃
translation:
  text: the twelfth, Azarel; his sons and his brothers, twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Azareel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַשְׁתֵּי עָשָׂר
  chosen: the twelfth
  alternatives:
  - twelve
  - the twelve
  lexicon: HALOT
  rationale: 'In this roster of lots, the ordinal sense is required by context: each
    verse enumerates the next lot assignment. Although the form is literally ''eleven/ten''
    in Hebrew idiom for twelve, idiomatic English in this context is the ordinal ''the
    twelfth.'''
- source_word: עֲזַרְאֵל
  chosen: Azarel
  alternatives:
  - Azareel
  lexicon: HALOT
  rationale: Personal names are transliterated rather than translated, following project
    philosophy. 'Azarel' is a standard English transliteration of the Hebrew name
    here.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically means 'his sons,' not the gender-neutral 'children.'
    This preserves the source's gender-accurate wording.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: The noun means 'his brothers.' In this genealogical/organizational list
    it could denote close male relatives or associates, but 'brothers' is the most
    direct and auditable rendering.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  alternatives: []
  lexicon: HALOT
  rationale: This final numeral gives the total number in Azarel's group. English
    supplies the implied verb elliptically, as in the surrounding list structure.
