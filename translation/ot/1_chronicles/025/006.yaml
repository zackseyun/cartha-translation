id: 1CH.25.6
reference: 1 Chronicles 25:6
source:
  edition: WLC
  text: כָּל אֵ֣לֶּה עַל יְדֵי֩ אֲבִי/הֶ֨ם בַּ/שִּׁ֜יר בֵּ֣ית יְהוָ֗ה בִּ/מְצִלְתַּ֨יִם֙
    נְבָלִ֣ים וְ/כִנֹּר֔וֹת לַ/עֲבֹדַ֖ת בֵּ֣ית הָ/אֱלֹהִ֑ים עַ֚ל יְדֵ֣י הַ/מֶּ֔לֶךְ
    אָסָ֥ף וִ/ידוּת֖וּן וְ/הֵימָֽן־־ס׃
translation:
  text: 'All these were under the direction of their father in the music of the house
    of the LORD, with cymbals, harps, and lyres, for the service of the house of God,
    under the direction of the king: Asaph, Jeduthun, and Heman.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''under the hand of''; the idiom denotes direction, supervision,
      or agency.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in song' or 'in singing.'
    reason: lexical_alternative
  - marker: c
    text: The exact distinction between the instruments rendered 'harps' and 'lyres'
      is uncertain.
    reason: cultural_note
lexical_decisions:
- source_word: עַל יְדֵי אֲבִיהֶם
  chosen: under the direction of their father
  alternatives:
  - at the hands of their father
  - by their father
  lexicon: HALOT
  rationale: The idiom עַל יְדֵי literally involves 'hand(s)' but commonly denotes
    agency or supervision. In this musical-administrative context, 'under the direction
    of' best captures oversight rather than mere instrumentality.
- source_word: בַּשִּׁיר
  chosen: in the music
  alternatives:
  - in song
  - in singing
  lexicon: HALOT
  rationale: שִׁיר can mean 'song' or 'singing.' Here, with instruments and temple
    service in view, a collective sense such as 'music' fits the guild/ministerial
    context better than a single 'song.'
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Formally this is 'house of YHWH.' Following the doctrine default, יְהוָה
    is rendered 'the LORD.' 'House' is retained rather than 'temple' to stay closer
    to the Hebrew while remaining natural English.
- source_word: בִּמְצִלְתַּיִם
  chosen: with cymbals
  lexicon: HALOT
  rationale: The preposition here is instrumental; the term denotes cymbals used in
    temple music.
- source_word: נְבָלִים
  chosen: harps
  alternatives:
  - lyres
  - stringed instruments
  lexicon: HALOT
  rationale: The exact ancient instrument is debated, but 'harps' is a standard and
    intelligible rendering when paired with כִּנֹּרוֹת as a distinct instrument. The
    distinction is preserved by rendering the pair as 'harps and lyres.'
- source_word: וְכִנֹּרוֹת
  chosen: and lyres
  alternatives:
  - and harps
  lexicon: HALOT
  rationale: To preserve the distinction between נְבָלִים and כִּנֹּרוֹת, כִּנּוֹר
    is rendered 'lyre' here. Exact one-to-one modern instrument equivalence is uncertain,
    but differentiation is preferable to collapsing both terms.
- source_word: לַעֲבֹדַת בֵּית הָאֱלֹהִים
  chosen: for the service of the house of God
  alternatives:
  - for the ministry of the house of God
  - for the work of the house of God
  lexicon: HALOT
  rationale: עֲבֹדָה denotes service/work in a cultic setting. 'Service' is broad,
    natural, and suitable for temple duties without importing later ecclesiastical
    terminology.
- source_word: עַל יְדֵי הַמֶּלֶךְ
  chosen: under the direction of the king
  alternatives:
  - by order of the king
  - under the hand of the king
  lexicon: HALOT
  rationale: The repeated idiom again suggests oversight or authorization. 'Under
    the direction of the king' matches the earlier phrase and reflects royal supervision
    of the musical service.
- source_word: אָסָף וִידוּתוּן וְהֵימָן
  chosen: Asaph, Jeduthun, and Heman
  rationale: These are personal names and are transliterated per translation policy.
