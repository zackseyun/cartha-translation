id: 1CH.25.16
reference: 1 Chronicles 25:16
source:
  edition: WLC
  text: הַ/תְּשִׁיעִ֣י מַתַּנְיָ֔הוּ בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים עָשָֽׂר׃
translation:
  text: The ninth, Mattanyahu, his sons and his brothers, twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Mattanyahu; traditionally rendered Mattaniah in many English versions.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַתְּשִׁיעִי
  chosen: The ninth
  alternatives:
  - The ninth lot
  - The ninth was
  lexicon: HALOT
  rationale: Ordinal adjective with article, functioning elliptically in a roster
    of lots/divisions. English keeps the concise list style with 'The ninth,' while
    the implied noun ('lot' or assignment) is left unstated as in the Hebrew.
- source_word: מַתַּנְיָהוּ
  chosen: Mattanyahu
  alternatives:
  - Mattaniah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy. 'Mattanyahu' reflects the Hebrew form more directly; 'Mattaniah' is
    a familiar Anglicized alternative.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically means 'his sons,' not the gender-neutral 'children.'
    This follows the gender-accurate principle and preserves the genealogical/list
    context.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: The basic sense is male siblings or brothers; in this roster context
    it may extend to clan associates, but 'brothers' is the plain lexical value and
    should be preserved unless context clearly demands a broader rendering.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  alternatives:
  - were twelve in all
  lexicon: HALOT
  rationale: Standard cardinal number. In this recurring formula in the chapter, it
    totals the named leader's sons and brothers. English renders it simply as 'twelve'
    to match the terse Hebrew style.
