id: 1CH.25.28
reference: 1 Chronicles 25:28
source:
  edition: WLC
  text: לְ/אֶחָ֤ד וְ/עֶשְׂרִים֙ לְ/הוֹתִ֔יר בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים עָשָֽׂר׃
translation:
  text: for the twenty-first, Hothir; his sons and his brothers, twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'for one and twenty, Hothir.' The Hebrew reflects the lot sequence
      in this chapter.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/אֶחָד וְ/עֶשְׂרִים
  chosen: for the twenty-first
  alternatives:
  - for one and twenty
  - the twenty-first lot
  lexicon: HALOT
  rationale: In this chapter each verse enumerates the lot order. The prefixed ל marks
    assignment within the lot list, so idiomatic English is 'for the twenty-first'
    rather than a wooden 'to one and twenty.' 'Lot' is implied by context but not
    expressed here, so it is not added to the main text.
- source_word: לְ/הוֹתִיר
  chosen: Hothir
  alternatives:
  - to Hothir
  lexicon: HALOT
  rationale: This is the personal name הוֹתִיר in a list of names receiving lots.
    Per translation philosophy, names are transliterated. The prefixed ל is absorbed
    into the idiomatic construction 'for the twenty-first, Hothir' rather than repeated
    as 'to Hothir.'
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: בנים specifically denotes sons here, not children in general. This follows
    the gender-accurate principle and matches the genealogical/list context.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  - and his brethren
  lexicon: HALOT
  rationale: The noun means brothers. In these roster contexts it may refer to fellow
    clan members or associates, but the literal familial term should be preserved
    unless context clearly broadens it.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  alternatives:
  - were twelve
  lexicon: HALOT
  rationale: 'The number gives the total of the group. English can render this tersely
    in apposition, as in the surrounding verses: ''his sons and his brothers, twelve.''
    Supplying ''were'' is possible but unnecessary.'
