id: 1CH.25.11
reference: 1 Chronicles 25:11
source:
  edition: WLC
  text: הָ/רְבִיעִי֙ לַ/יִּצְרִ֔י בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים עָשָֽׂר׃
translation:
  text: The fourth, to Izri—his sons and his brothers, twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly in context, 'The fourth lot fell to Izri.' The noun
      'lot' is implied by the surrounding list but not stated in this verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרְבִיעִי
  chosen: The fourth
  alternatives:
  - The fourth lot
  - The fourth division
  lexicon: HALOT
  rationale: The ordinal stands elliptically in this roster of assigned lots/divisions.
    English can preserve the concise list style with 'The fourth.' 'Lot' is contextually
    implied from the surrounding passage but not expressed in this verse, so it is
    left implicit in the main text.
- source_word: לַיִּצְרִי
  chosen: to Izri
  alternatives:
  - for Izri
  lexicon: HALOT
  rationale: The prefixed ל marks assignment in this list, naturally rendered 'to'
    in English. The proper name is transliterated, following the translation philosophy
    for personal names.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically means 'his sons,' not the gender-neutral 'children.'
    This preserves the genealogical/listing sense and follows the gender-accurate
    principle.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: The noun ordinarily means 'brothers.' In this administrative/musical
    roster it could denote close male relatives or associates, but 'brothers' is the
    most direct and auditable rendering.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  alternatives:
  - were twelve
  lexicon: HALOT
  rationale: The cardinal number gives the total of the group. English can render
    it tersely as 'twelve' in apposition to the preceding members. Supplying 'were'
    is possible for smoother English but is not required.
