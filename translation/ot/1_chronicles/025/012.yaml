id: 1CH.25.12
reference: 1 Chronicles 25:12
source:
  edition: WLC
  text: הַ/חֲמִישִׁ֣י נְתַנְיָ֔הוּ בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים עָשָֽׂר׃
translation:
  text: The fifth was Nethaniah, his sons and his brothers, twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, in context, 'The fifth lot was for Nethaniah; his sons and his brothers
      were twelve.' The Hebrew omits words such as 'lot' or 'was for,' which are inferred
      from the surrounding list.
    reason: alternative_reading
lexical_decisions:
- source_word: הַחֲמִישִׁי
  chosen: The fifth
  alternatives:
  - The fifth lot
  - The fifth division
  lexicon: HALOT
  rationale: Ordinal adjective with the article, functioning elliptically in this
    roster of lots/divisions. English supplies 'The fifth' naturally; 'lot' or 'division'
    is possible from context but not explicit in the Hebrew of this verse, so they
    are not added to the main text.
- source_word: נְתַנְיָהוּ
  chosen: Nethaniah
  alternatives:
  - Netaniahu
  rationale: 'Personal name is transliterated according to the translation philosophy:
    translate titles, transliterate names.'
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: בן in the masculine plural with 3ms suffix specifically denotes 'sons'
    here, not the gender-neutral 'children.' This preserves the gendered form of the
    Hebrew.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: אח in plural with suffix ordinarily means 'brothers.' Although broader
    kinship senses can occur, the roster formula in this chapter is best represented
    straightforwardly as 'brothers.'
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  alternatives:
  - were twelve
  lexicon: HALOT
  rationale: Cardinal number concluding the roster formula, indicating the total count
    of the named group. English can render this compactly as 'twelve'; supplying 'were'
    is interpretive and unnecessary.
