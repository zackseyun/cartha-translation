id: 1CH.25.4
reference: 1 Chronicles 25:4
source:
  edition: WLC
  text: לְ/הֵימָ֑ן בְּנֵ֣י הֵימָ֡ן בֻּקִּיָּ֡הוּ מַתַּנְיָ֡הוּ עֻ֠זִּיאֵל שְׁבוּאֵ֨ל
    וִֽ/ירִימ֜וֹת חֲנַנְיָ֣ה חֲנָ֗נִי אֱלִיאָ֤תָה גִדַּ֨לְתִּי֙ וְ/רֹמַ֣מְתִּי עֶ֔זֶר
    יָשְׁבְּקָ֣שָׁה מַלּ֔וֹתִי הוֹתִ֖יר מַחֲזִיאֽוֹת׃
translation:
  text: 'To Heman: the sons of Heman: Bukkiah, Mattaniah, Uzziel, Shebuel, and Jeremoth,
    Hananiah, Hanani, Eliathah, Giddalti, and Romamti-ezer, Joshbekashah, Mallothi,
    Hothir, Mahazioth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some interpreters have suggested that part of this list can be read as a
      phrase rather than only as names, especially around 'Giddalti' and 'Romamti-ezer';
      in context, this translation treats them as personal names in a roster.
    reason: alternative_reading
  - marker: b
    text: '''Jeremoth'' may also be rendered ''Jerimoth.'''
    reason: lexical_alternative
  - marker: c
    text: '''Shebuel'' may also be rendered ''Shubael.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/הֵימָן
  chosen: To Heman
  alternatives:
  - For Heman
  - Of Heman
  lexicon: HALOT
  rationale: The prefixed ל marks assignment within the larger list of divisions in
    this chapter. 'To Heman' fits the list structure in context better than a possessive
    alone.
- source_word: בְּנֵי הֵימָן
  chosen: the sons of Heman
  alternatives:
  - Heman's sons
  - the descendants of Heman
  lexicon: HALOT
  rationale: בני normally means 'sons' and in genealogical/list contexts can denote
    immediate sons or descendants. Here the verse is a roster of named offspring;
    'the sons of Heman' is the most transparent rendering.
- source_word: בֻּקִּיָּהוּ
  chosen: Bukkiah
  alternatives:
  - Bukkiahu
  rationale: Personal name transliterated by standard English convention, slightly
    smoothing the theophoric ending for readability.
- source_word: מַתַּנְיָהוּ
  chosen: Mattaniah
  alternatives:
  - Mattanyahu
  rationale: Personal name transliterated by standard English convention.
- source_word: עֻזִּיאֵל
  chosen: Uzziel
  rationale: Personal name transliterated conventionally.
- source_word: שְׁבוּאֵל
  chosen: Shebuel
  alternatives:
  - Shubael
  rationale: The consonants permit the familiar English form 'Shebuel'; some traditions
    use 'Shubael,' but 'Shebuel' is a common direct transliteration.
- source_word: וִֽ/ירִימוֹת
  chosen: and Jeremoth
  alternatives:
  - and Jerimoth
  rationale: The conjunction is explicit. The name is commonly represented in English
    as 'Jeremoth' in this context, though 'Jerimoth' is also possible.
- source_word: חֲנַנְיָה
  chosen: Hananiah
  rationale: Personal name transliterated conventionally.
- source_word: חֲנָנִי
  chosen: Hanani
  rationale: Personal name transliterated conventionally.
- source_word: אֱלִיאָתָה
  chosen: Eliathah
  alternatives:
  - Eliatha
  rationale: Personal name transliterated with final -h to reflect the Hebrew ending
    while remaining readable.
- source_word: גִדַּלְתִּי
  chosen: Giddalti
  rationale: Although identical in form to a verbal expression elsewhere, here the
    morphology and context show it is a proper name in a list of sons.
- source_word: וְ/רֹמַמְתִּי עֶזֶר
  chosen: and Romamti-ezer
  alternatives:
  - and Romamti Ezer
  - and I have exalted help
  lexicon: HALOT
  rationale: In this name list, the sequence is best taken as a compound proper name
    rather than a finite verb plus noun. Hyphenation signals the compound name in
    English. The verbal-looking alternative is preserved because some have connected
    the surrounding names to a phrase.
- source_word: יָשְׁבְּקָשָׁה
  chosen: Joshbekashah
  alternatives:
  - Jashbekashah
  rationale: Standard English transliteration often voices the initial yod as J in
    biblical names.
- source_word: מַלּוֹתִי
  chosen: Mallothi
  rationale: Personal name transliterated conventionally.
- source_word: הוֹתִיר
  chosen: Hothir
  rationale: Despite resemblance to a verbal form, context identifies it as a proper
    name in the list.
- source_word: מַחֲזִיאוֹת
  chosen: Mahazioth
  alternatives:
  - Mahaziot
  rationale: Personal name transliterated conventionally; final -th reflects common
    English representation of the feminine/plural-looking ending in names.
