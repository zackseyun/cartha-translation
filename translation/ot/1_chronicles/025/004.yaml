theological_decisions:
- issue: Whether several name forms in this verse should be construed as a meaningful
    sentence or oracle rather than as personal names
  chosen_reading: Treat the entire sequence after 'the sons of Heman' as a list of
    personal names
  alternative_readings:
  - Construal of some names as a phrase such as 'I have magnified and exalted help...'
  rationale: The immediate literary context is a roster of guild members and sons,
    and the morphology table marks these items as proper names. Rendering them as
    names preserves the plain sense of the list without importing a speculative message
    encoded in the names.
  doctrine_reference: Translation philosophy §1, §3, §5
