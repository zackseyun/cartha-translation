id: 1CH.25.19
reference: 1 Chronicles 25:19
source:
  edition: WLC
  text: הַ/שְּׁנֵ֤ים עָשָׂר֙ לַ/חֲשַׁבְיָ֔ה בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים עָשָֽׂר׃
translation:
  text: the twelfth to Hashabiah, his sons and his brothers, twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the twelve," taken more literally; context favors the ordinal sense,
      "the twelfth," because this chapter lists the lots in sequence.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׁנֵים עָשָׂר
  chosen: the twelfth
  alternatives:
  - the twelve
  lexicon: HALOT
  rationale: 'In this roster of lots for temple musicians, the ordinal sense is required
    by context: each verse enumerates the next lot (''the first,'' ''the second,''
    etc.). Although the Hebrew form is literally ''the two [and] ten,'' it functions
    idiomatically here as an ordinal, so ''the twelfth'' is the natural English rendering.'
- source_word: לַחֲשַׁבְיָה
  chosen: to Hashabiah
  alternatives:
  - for Hashabiah
  lexicon: HALOT
  rationale: The prefixed ל marks assignment of the lot to a named person. 'To Hashabiah'
    is concise and matches the list structure; 'for Hashabiah' is possible but less
    direct.
- source_word: חֲשַׁבְיָה
  chosen: Hashabiah
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The noun בנים here specifically denotes male offspring, not children
    generically. 'His sons' is therefore gender-accurate and fits the genealogical/list
    context.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: The basic sense of אחים is 'brothers.' In some contexts it can broaden
    to kin, but in this personnel list the straightforward familial/group designation
    'brothers' best preserves the Hebrew wording.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  lexicon: HALOT
  rationale: The closing number gives the total size of the group assigned in the
    lot. English idiom in this repeated formula is simply 'twelve.'
