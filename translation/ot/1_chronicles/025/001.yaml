id: 1CH.25.1
reference: 1 Chronicles 25:1
source:
  edition: WLC
  text: וַ/יַּבְדֵּ֣ל דָּוִיד֩ וְ/שָׂרֵ֨י הַ/צָּבָ֜א לַ/עֲבֹדָ֗ה לִ/בְנֵ֤י אָסָף֙
    וְ/הֵימָ֣ן וִֽ/ידוּת֔וּן ה/נביאים בְּ/כִנֹּר֥וֹת בִּ/נְבָלִ֖ים וּ/בִ/מְצִלְתָּ֑יִם
    וַֽ/יְהִי֙ מִסְפָּרָ֔/ם אַנְשֵׁ֥י מְלָאכָ֖ה לַ/עֲבֹדָתָֽ/ם׃
translation:
  text: 'And David and the commanders of the army set apart for the service the sons
    of Asaph, Heman, and Jeduthun, who prophesied with lyres, harps, and cymbals;
    and their number, the men for the work of their service, was:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the prophets with lyres, harps, and cymbals.' The Hebrew
      can be read with 'the prophets' in apposition to Asaph, Heman, and Jeduthun.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'sons of Asaph, Heman, and Jeduthun'; this may refer to their descendants
      or guild members, not only immediate sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּבְדֵּל
  chosen: set apart
  alternatives:
  - separated
  - divided off
  - assigned
  lexicon: HALOT
  rationale: The hiphil of בדל commonly means to separate or set apart. 'Set apart'
    fits the cultic/organizational context better than the more mechanical 'separated'
    and avoids overinterpreting as a formal appointment formula.
- source_word: שָׂרֵי הַצָּבָא
  chosen: the commanders of the army
  alternatives:
  - the chiefs of the service
  - the military officers
  - the commanders of the host
  lexicon: HALOT
  rationale: שָׂרִים are leaders/officials, and צָבָא ordinarily means army/host.
    In Chronicles this phrase naturally refers to military leaders, even though they
    participate in temple organization here. 'Commanders of the army' is clear modern
    English.
- source_word: לַעֲבֹדָה
  chosen: for the service
  alternatives:
  - for service
  - for the work
  lexicon: HALOT
  rationale: עֲבֹדָה in cultic contexts often denotes service, especially organized
    temple service. The article in English helps the phrase read naturally and signals
    a defined sphere of duty.
- source_word: לִבְנֵי אָסָף וְהֵימָן וִידוּתוּן
  chosen: the sons of Asaph, Heman, and Jeduthun
  alternatives:
  - the descendants of Asaph, Heman, and Jeduthun
  lexicon: HALOT
  rationale: בְּנֵי can mean literal sons or broader descendants/members of a guild.
    'Sons of' preserves the Hebrew idiom and the likely familial/guild structure without
    flattening it.
- source_word: הנביאים
  chosen: who prophesied
  alternatives:
  - the prophets
  - who acted as prophets
  lexicon: HALOT
  rationale: Although morphologically the form is 'the prophets,' in context it appositionally/descriptively
    identifies these musical guild leaders as exercising prophetic activity with instruments.
    Rendering it verbally in English ('who prophesied') makes the syntax natural while
    preserving the claim that their music was prophetic.
- source_word: בְּכִנֹּרוֹת
  chosen: with lyres
  alternatives:
  - on lyres
  - with harps
  lexicon: HALOT
  rationale: כִּנּוֹר is conventionally rendered 'lyre.' 'With' reflects instrumental
    accompaniment and reads smoothly with the following instrument list.
- source_word: בִּנְבָלִים
  chosen: harps
  alternatives:
  - lutes
  - harp-like instruments
  lexicon: HALOT
  rationale: נֵבֶל denotes a stringed instrument distinct from כִּנּוֹר. Traditional
    English often uses 'psalteries,' but 'harps' is more accessible modern English,
    while the paired rendering 'lyres ... harps' preserves distinction.
- source_word: וּבִמְצִלְתָּיִם
  chosen: and cymbals
  alternatives:
  - with cymbals
  lexicon: HALOT
  rationale: מְצִלְתַּיִם are cymbals. The conjunction is preserved straightforwardly
    in the instrument series.
- source_word: וַיְהִי מִסְפָּרָם
  chosen: 'and their number ... was:'
  alternatives:
  - 'and the number of them was:'
  - 'and their tally was:'
  lexicon: HALOT
  rationale: This clause introduces the enumeration in the following verses. Retaining
    the colon reflects the forward-pointing syntax better than forcing a complete
    sentence here.
- source_word: אַנְשֵׁי מְלָאכָה
  chosen: the men for the work
  alternatives:
  - the skilled men
  - the workmen
  - the men of work
  lexicon: HALOT
  rationale: The phrase denotes men engaged in the assigned task. 'The men for the
    work' stays close to the Hebrew without overstating technical skill, which is
    possible but not explicit.
- source_word: לַעֲבֹדָתָם
  chosen: of their service
  alternatives:
  - for their service
  - in their service
  lexicon: HALOT
  rationale: This final phrase specifies the sphere of the work. 'Of their service'
    preserves the genitival relationship in idiomatic English and keeps the cultic
    nuance of עֲבֹדָה.
