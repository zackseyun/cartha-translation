theological_decisions:
- issue: Whether הַנְּבִיאִים should be rendered as a noun ('the prophets') or as
    a descriptive clause tied to musical ministry
  chosen_reading: Rendered as 'who prophesied' to express that Asaph, Heman, and Jeduthun
    exercised prophetic ministry through music.
  alternative_readings:
  - '''the prophets'''
  - '''who were the prophets'''
  rationale: The Hebrew form can be read appositionally, but a bare noun apposition
    in English is awkward here. The verse explicitly links prophecy with instrumental
    music, and the verbal rendering preserves that theological claim without implying
    a different office than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
