id: 1CH.25.20
reference: 1 Chronicles 25:20
source:
  edition: WLC
  text: לִ/שְׁלֹשָׁ֤ה עָשָׂר֙ שֽׁוּבָאֵ֔ל בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים עָשָֽׂר׃
translation:
  text: The thirteenth, Shubael; his sons and his brothers, twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'For the thirteenth, Shubael.' The word 'lot' is implied from
      the surrounding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁלֹשָׁה עָשָׂר
  chosen: The thirteenth
  alternatives:
  - For the thirteenth
  - The thirteenth lot
  lexicon: HALOT
  rationale: In this roster of lots, the prefixed ל marks assignment/result ('for
    the thirteenth'), but idiomatic English in this repeated list structure is simply
    'The thirteenth.' 'Lot' is implied by context from the surrounding verses rather
    than explicitly present here, so it is not supplied in the main text.
- source_word: שׁוּבָאֵל
  chosen: Shubael
  alternatives:
  - Shuba'el
  rationale: Personal names are transliterated by standard conventions rather than
    translated.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically denotes sons, not children in general, so a gender-accurate
    rendering is required.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  - and his brethren
  lexicon: HALOT
  rationale: The noun means 'brothers.' In this genealogical/organizational context
    it may refer to male relatives or associates within the division, but the lexical
    form is masculine and should be rendered straightforwardly.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  alternatives:
  - were twelve
  lexicon: HALOT
  rationale: The number gives the total associated with Shubael's sons and brothers.
    English can state this tersely as 'twelve' in apposition, matching the list style
    of the passage.
