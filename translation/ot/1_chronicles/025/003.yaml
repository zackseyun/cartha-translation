id: 1CH.25.3
reference: 1 Chronicles 25:3
source:
  edition: WLC
  text: לִ/ידוּת֑וּן בְּנֵ֣י יְדוּת֡וּן גְּדַלְיָ֡הוּ וּ/צְרִ֡י וִֽ֠/ישַׁעְיָהוּ חֲשַׁבְיָ֨הוּ וּ/מַתִּתְיָ֜הוּ שִׁשָּׁ֗ה עַל֩ יְדֵ֨י אֲבִי/הֶ֤ם יְדוּתוּן֙ בַּ/כִּנּ֔וֹר הַ/נִּבָּ֕א עַל הֹד֥וֹת וְ/הַלֵּ֖ל לַ/יהוָֽה־׃ס
translation:
  text: 'Of Jeduthun: the sons of Jeduthun—Gedaliah, Zeri, Jeshaiah, Hashabiah, and Mattithiah, six—under the direction of their father Jeduthun, who prophesied with the lyre, giving thanks and praise to Yahweh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew text lists five names here but then says 'six.' Some interpreters infer that another son is omitted from the list, or that Jeduthun himself is counted.
    reason: textual_variant
  - marker: b
    text: Or 'prophesying with the lyre for thanksgiving and praise to the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִידוּתוּן
  chosen: Of Jeduthun
  alternatives:
  - For Jeduthun
  - Belonging to Jeduthun
  lexicon: HALOT
  rationale: The prefixed ל introduces the next guild division or heading in the list. 'Of Jeduthun' is concise English that fits the catalog style of the chapter.
- source_word: בְּנֵי יְדוּתוּן
  chosen: the sons of Jeduthun
  alternatives:
  - Jeduthun's sons
  lexicon: HALOT
  rationale: Formal familial language is retained; in this context it denotes his descendants/household members serving in the musical order.
- source_word: גְּדַלְיָהוּ וּצְרִי וִישַׁעְיָהוּ חֲשַׁבְיָהוּ וּמַתִּתְיָהוּ
  chosen: Gedaliah, Zeri, Jeshaiah, Hashabiah, and Mattithiah
  alternatives:
  - Gedaliahu, Zeri, Yeshayahu, Hashabyahu, Mattityahu
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English conventions per project philosophy.
- source_word: שִׁשָּׁה
  chosen: six
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'six,' though only five names are listed in the Masoretic Text. The number is retained rather than harmonized away.
- source_word: עַל יְדֵי אֲבִיהֶם
  chosen: under the direction of their father
  alternatives:
  - by the hand of their father
  - under the hand of their father
  lexicon: HALOT
  rationale: The idiom literally means 'by the hands of,' but in administrative/musical contexts it denotes supervision or direction. 'Under the direction of' communicates the sense in natural English.
- source_word: בַּכִּנּוֹר
  chosen: with the lyre
  alternatives:
  - on the lyre
  - with the harp
  lexicon: HALOT
  rationale: כִּנּוֹר is best rendered 'lyre,' the likely ancient instrument, rather than the more traditional but less precise 'harp.' 'With' fits the participial phrase naturally.
- source_word: הַנִּבָּא
  chosen: who prophesied
  alternatives:
  - prophesying
  - who performed inspired praise
  lexicon: HALOT
  rationale: The Niphal participle of נבא is retained with its ordinary verbal force, as in this chapter musical praise is described as prophetic activity. A relative clause smooths the English syntax.
- source_word: עַל הֹדוֹת וְהַלֵּל
  chosen: in giving thanks and praise
  alternatives:
  - for thanksgiving and praise
  - concerning thanks and praise
  lexicon: HALOT
  rationale: The phrase expresses the content or purpose of the prophetic music. 'In giving thanks and praise' is idiomatic and preserves both elements.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD.'
