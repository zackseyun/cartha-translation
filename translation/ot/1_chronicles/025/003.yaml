theological_decisions:
- issue: Meaning of musical 'prophesying' in temple worship
  chosen_reading: Retain 'prophesied' in the main text for נבא, even in a musical context.
  alternative_readings:
  - performed inspired music
  - sang prophetically
  rationale: The Chronicler explicitly uses prophetic terminology for temple musicians. Rendering it as 'prophesied' preserves the theological category rather than reducing it to mere performance, while the surrounding phrase clarifies that this prophecy occurred through musical thanksgiving and praise.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
