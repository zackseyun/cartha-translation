id: 1CH.25.30
reference: 1 Chronicles 25:30
source:
  edition: WLC
  text: לִ/שְׁלֹשָׁ֤ה וְ/עֶשְׂרִים֙ לְ/מַ֣חֲזִיא֔וֹת בָּנָ֥י/ו וְ/אֶחָ֖י/ו שְׁנֵ֥ים
    עָשָֽׂר׃
translation:
  text: for the twenty-third, Mahazioth; his sons and his brothers, twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the twenty-third lot, Mahazioth.' The prefixed preposition can be
      understood as marking assignment within the sequence of lots.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/שְׁלֹשָׁה וְ/עֶשְׂרִים
  chosen: for the twenty-third
  alternatives:
  - for the three and twentieth
  - for the twenty-three
  lexicon: HALOT
  rationale: In this roster of lots, the prefixed ל marks assignment ('for' or 'to'),
    and the compound ordinal/cardinal expression functions idiomatically as the ordinal
    'twenty-third.' Modern English prefers the ordinal form.
- source_word: לְ/מַחֲזִיאוֹת
  chosen: Mahazioth
  alternatives:
  - Mahaziot
  lexicon: HALOT
  rationale: Proper personal name, so transliterated rather than translated, following
    the project's policy for names. The spelling 'Mahazioth' reflects the consonantal
    form and common English convention.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically means 'his sons,' not a gender-neutral term.
    This follows the gender-accurate policy and the genealogical/list context.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  - and his brethren
  lexicon: HALOT
  rationale: The noun means 'brothers' in this list context. 'Brothers' is the most
    direct modern rendering; broader terms like 'kinsmen' are less precise.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  lexicon: HALOT
  rationale: Cardinal number giving the total count of Mahazioth's sons and brothers
    in the lot division. Simple modern English numeral wording is best.
