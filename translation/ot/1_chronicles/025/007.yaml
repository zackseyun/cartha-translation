id: 1CH.25.7
reference: 1 Chronicles 25:7
source:
  edition: WLC
  text: וַ/יְהִ֤י מִסְפָּרָ/ם֙ עִם אֲחֵי/הֶ֔ם מְלֻמְּדֵי שִׁ֖יר לַ/יהוָ֑ה כָּל הַ֨/מֵּבִ֔ין מָאתַ֖יִם שְׁמוֹנִ֥ים וּ/שְׁמוֹנָֽה־־־׃
translation:
  text: Their number, together with their brothers who were trained in singing to Yahweh, all who were skillful, was two hundred eighty-eight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the LORD.' The Hebrew preposition can express direction or purpose in this context of musical service.
    reason: lexical_alternative
  - marker: b
    text: Or 'all who had understanding,' that is, all who were competent or expert in the musical work.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְפָּרָם
  chosen: their number
  alternatives:
  - the number of them
  lexicon: HALOT
  rationale: The noun denotes a counted total. 'Their number' is natural modern English while remaining close to the Hebrew construct with suffix.
- source_word: עִם אֲחֵיהֶם
  chosen: together with their brothers
  alternatives:
  - with their brothers
  - along with their brothers
  lexicon: HALOT
  rationale: עִם marks accompaniment. אֲחֵיהֶם is literally 'their brothers'; per gender-accurate policy, 'brothers' is retained rather than neutralizing to 'siblings,' especially in this male Levitical service context.
- source_word: מְלֻמְּדֵי שִׁיר
  chosen: who were trained in singing
  alternatives:
  - trained in song
  - instructed in singing
  - trained singers
  lexicon: HALOT
  rationale: The passive participle from למד indicates those who have been taught/trained. שִׁיר can mean 'song/singing.' 'Trained in singing' preserves the verbal sense better than the compressed label 'trained singers.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל here marks direction/purpose in worship service. 'To the LORD' fits the immediate collocation with singing. Per doctrine, יהוה is rendered 'the LORD.'
- source_word: כָּל הַמֵּבִין
  chosen: all who were skillful
  alternatives:
  - everyone who understood
  - all who were expert
  - all who had understanding
  lexicon: HALOT
  rationale: The participle of בין here refers not merely to cognitive understanding but to competence/discernment in the musical task. 'Skillful' communicates the contextual sense in readable English.
- source_word: מָאתַיִם שְׁמוֹנִים וּשְׁמוֹנָה
  chosen: two hundred eighty-eight
  alternatives:
  - '288'
  - two hundred and eighty-eight
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence straightforwardly yields 288. Spelling out the number suits Bible style and readability.
