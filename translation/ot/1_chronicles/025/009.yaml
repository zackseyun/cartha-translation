id: 1CH.25.9
reference: 1 Chronicles 25:9
source:
  edition: WLC
  text: וַ/יֵּצֵ֞א הַ/גּוֹרָ֧ל הָ/רִאשׁ֛וֹן לְ/אָסָ֖ף לְ/יוֹסֵ֑ף גְּדַלְיָ֨הוּ֙ הַ/שֵּׁנִ֔י
    הֽוּא וְ/אֶחָ֥י/ו וּ/בָנָ֖י/ו שְׁנֵ֥ים עָשָֽׂר־׃
translation:
  text: The first lot came out for Asaph, for Joseph; Gedaliahu the second, he and
    his brothers and his sons, twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically in the context of casting lots, 'The first lot fell
      for Asaph, for Joseph.'
    reason: lexical_alternative
  - marker: b
    text: Gedaliahu is often anglicized as 'Gedaliah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: came out
  alternatives:
  - fell
  - went out
  lexicon: HALOT
  rationale: In the context of casting lots, the verb literally means 'came out.'
    English 'came out' preserves the concrete imagery better than the more interpretive
    'fell,' while still reading naturally.
- source_word: הַגּוֹרָל
  chosen: lot
  alternatives:
  - portion by lot
  lexicon: HALOT
  rationale: The noun refers to the lot used or the result assigned by lot. 'Lot'
    is the standard concise rendering in this administrative context.
- source_word: הָרִאשׁוֹן
  chosen: the first
  alternatives:
  - first
  lexicon: HALOT
  rationale: Ordinal marking the first assignment in sequence; the article is naturally
    represented in English as 'the first.'
- source_word: לְאָסָף
  chosen: for Asaph
  alternatives:
  - to Asaph
  - belonging to Asaph
  lexicon: HALOT
  rationale: The preposition marks assignment in the lot distribution. 'For Asaph'
    best conveys the lot's allocation.
- source_word: לְיוֹסֵף
  chosen: for Joseph
  alternatives:
  - to Joseph
  lexicon: HALOT
  rationale: This names the specific member of Asaph's line to whom the first lot
    corresponded. Repeating 'for' reflects the Hebrew preposition and the assignment
    sense.
- source_word: גְּדַלְיָהוּ
  chosen: Gedaliahu
  alternatives:
  - Gedaliah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. Since the Hebrew form here ends with -yahu, 'Gedaliahu' preserves
    the source form more transparently than the anglicized 'Gedaliah.'
- source_word: הַשֵּׁנִי
  chosen: the second
  alternatives:
  - second
  lexicon: HALOT
  rationale: Ordinal marking the second assignment in sequence.
- source_word: הוּא
  chosen: he
  alternatives:
  - namely he
  - that is
  lexicon: HALOT
  rationale: 'The pronoun is retained because it is present in the Hebrew and helps
    mark the head of the counted group: Gedaliahu himself together with his brothers
    and sons.'
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: The noun normally means male siblings or close male relatives. In this
    roster context, 'brothers' is the most direct and gender-accurate rendering.
- source_word: וּבָנָיו
  chosen: and his sons
  alternatives:
  - and his children
  lexicon: HALOT
  rationale: The Hebrew specifically denotes sons, not children generally; the translation
    preserves that specificity.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  alternatives:
  - were twelve
  lexicon: HALOT
  rationale: 'The number gives the total size of the group. The verbless Hebrew can
    be represented tersely in English apposition: ''he and his brothers and his sons,
    twelve.'''
