id: 1CH.15.3
reference: 1 Chronicles 15:3
source:
  edition: WLC
  text: וַ/יַּקְהֵ֥ל דָּוִ֛יד אֶת כָּל יִשְׂרָאֵ֖ל אֶל יְרֽוּשָׁלִָ֑ם לְ/הַעֲלוֹת֙
    אֶת אֲר֣וֹן יְהוָ֔ה אֶל מְקוֹמ֖/וֹ אֲשֶׁר הֵכִ֥ין לֽ/וֹ־־־־־־׃
translation:
  text: And David assembled all Israel at Jerusalem to bring up the ark of the LORD
    to its place, which he had prepared for it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Jerusalem'; Hebrew uses the preposition 'to,' but English commonly
      says people are assembled 'at' a place.
    reason: lexical_alternative
  - marker: b
    text: Or 'which he had prepared for him'; the pronoun could be rendered more literally,
      though in context it most naturally refers to the ark.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְהֵל
  chosen: assembled
  alternatives:
  - gathered together
  - convened
  lexicon: HALOT
  rationale: The hiphil of קהל here denotes causing a group to gather. 'Assembled'
    is natural modern English and fits a formal public gathering without over-specifying
    the mechanism.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: HALOT
  rationale: A standard collective expression for the nation/its representatives.
    'All Israel' preserves the idiom and avoids unnecessary expansion.
- source_word: אֶל יְרוּשָׁלִָם
  chosen: at Jerusalem
  alternatives:
  - to Jerusalem
  - in Jerusalem
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to,' with verbs of gathering English often
    idiomatically says people are assembled 'at' a place. This best reflects the resulting
    location of the assembly in readable English.
- source_word: לְהַעֲלוֹת
  chosen: to bring up
  alternatives:
  - to bring
  - to carry up
  lexicon: HALOT
  rationale: עלה in this cultic/transport context commonly carries the sense of bringing
    something up, often with geographical or honorific elevation. 'Bring up' preserves
    that nuance better than the flatter 'bring'.
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the LORD's ark
  lexicon: HALOT
  rationale: This is the standard construct expression. Per doctrine, יְהוָה is rendered
    'the LORD.' The fuller phrase is slightly more formal and suits the sacred object.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and LXX-influenced convention.
- source_word: אֶל מְקוֹמוֹ
  chosen: to its place
  alternatives:
  - to the place for it
  - to its proper place
  lexicon: HALOT
  rationale: The suffix on 'place' most naturally refers to the ark. 'Its place' is
    concise and faithful; 'proper place' adds an interpretive nuance not explicit
    in the Hebrew.
- source_word: אֲשֶׁר הֵכִין לוֹ
  chosen: which he had prepared for it
  alternatives:
  - which he had prepared for him
  - that he had made ready for it
  lexicon: HALOT
  rationale: The most immediate antecedent of the pronominal suffix is the ark/place
    context, and English idiom favors 'prepared for it' referring to the ark's destination.
    The pluperfect 'had prepared' appropriately marks prior action relative to the
    assembly.
