id: 1CH.15.14
reference: 1 Chronicles 15:14
source:
  edition: WLC
  text: וַ/יִּֽתְקַדְּשׁ֔וּ הַ/כֹּהֲנִ֖ים וְ/הַ/לְוִיִּ֑ם לְ/הַעֲל֕וֹת אֶת אֲר֥וֹן
    יְהוָ֖ה אֱלֹהֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: So the priests and the Levites consecrated themselves to bring up the ark
    of the LORD, the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''consecrated themselves''; alternatively, ''sanctified themselves.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְקַדְּשׁוּ
  chosen: consecrated themselves
  alternatives:
  - sanctified themselves
  - made themselves holy
  lexicon: HALOT
  rationale: Hitpael/waw-consecutive of קדשׁ denotes reflexive preparation for sacred
    service. 'Consecrated themselves' is natural modern English and preserves the
    ritual-holiness sense better than the more archaic 'sanctified themselves.'
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כהנים in cultic context.
- source_word: וְהַלְוִיִּם
  chosen: and the Levites
  lexicon: HALOT
  rationale: Standard rendering of לוים; the definite article is retained in English
    by 'the Levites.'
- source_word: לְהַעֲלוֹת
  chosen: to bring up
  alternatives:
  - to carry up
  - to take up
  lexicon: HALOT
  rationale: עלה in the Hiphil commonly means 'cause to go up/bring up.' In the narrative
    context of moving the ark to Jerusalem, 'bring up' is the idiomatic and traditional
    sense without over-specifying the mode of transport.
- source_word: אֶת אֲרוֹן
  chosen: the ark
  alternatives:
  - the chest
  lexicon: HALOT
  rationale: ארון in this context is the covenant ark; 'ark' is the established and
    contextually precise English rendering.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יהוה is rendered 'the LORD'
    rather than transliterated.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly; appositional to 'the LORD,'
    identifying him as Israel's God.
