id: 1CH.15.23
reference: 1 Chronicles 15:23
source:
  edition: WLC
  text: וּ/בֶֽרֶכְיָה֙ וְ/אֶלְקָנָ֔ה שֹׁעֲרִ֖ים לָ/אָרֽוֹן׃
translation:
  text: Berechiah and Elkanah were gatekeepers for the ark.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gatekeepers at the ark.' The Hebrew preposition can be understood as
      indicating assignment to or location at the ark.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּרֶכְיָה
  chosen: Berechiah
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: אֶלְקָנָה
  chosen: Elkanah
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: שֹׁעֲרִים
  chosen: gatekeepers
  alternatives:
  - doorkeepers
  - guards
  lexicon: HALOT
  rationale: The noun denotes those who keep/watch the gate or entrance. 'Gatekeepers'
    is the most natural and contextually precise rendering in English for temple/tabernacle-related
    personnel. 'Doorkeepers' is possible but less idiomatic here; 'guards' is too
    broad and loses the specific entrance-keeping role.
- source_word: לָאָרוֹן
  chosen: for the ark
  alternatives:
  - at the ark
  - of the ark
  lexicon: HALOT
  rationale: 'The preposition ל here expresses relation or assignment: they served
    as gatekeepers in relation to the ark. ''For the ark'' communicates appointed
    responsibility in clear English. ''At the ark'' is possible but more locative
    than the Hebrew necessarily requires; ''of the ark'' is less natural in English.'
- source_word: וְ
  chosen: and
  rationale: Standard conjunction joining the two personal names.
