id: 1CH.15.21
reference: 1 Chronicles 15:21
source:
  edition: WLC
  text: וּ/מַתִּתְיָ֣הוּ וֶ/אֱלִֽיפְלֵ֗הוּ וּ/מִקְנֵיָ֨הוּ֙ וְ/עֹבֵ֣ד אֱדֹ֔ם וִֽ/יעִיאֵ֖ל
    וַ/עֲזַזְיָ֑הוּ בְּ/כִנֹּר֥וֹת עַל הַ/שְּׁמִינִ֖ית לְ/נַצֵּֽחַ־׃
translation:
  text: and Mattithiah, Eliphelehu, Mikneiah, Obed-edom, Jeiel, and Azaziah were to
    lead with lyres according to the Sheminith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with lyres on the eighth' or 'with lyres in the lower octave.' The Hebrew
      phrase 'according to the Sheminith' is a musical term whose precise meaning
      is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַתִּתְיָהוּ
  chosen: Mattithiah
  rationale: Proper personal name; transliterated per project policy to transliterate
    names rather than translate them.
- source_word: אֱלִיפְלֵהוּ
  chosen: Eliphelehu
  alternatives:
  - Elipheleh
  rationale: Proper personal name; transliterated. The Hebrew form here supports the
    fuller ending -hu, though some English traditions shorten it.
- source_word: מִקְנֵיָהוּ
  chosen: Mikneiah
  alternatives:
  - Mikneya
  rationale: Proper personal name; transliterated in a conventional English form reflecting
    the Hebrew consonants and final theophoric element.
- source_word: עֹבֵד אֱדֹם
  chosen: Obed-edom
  alternatives:
  - Obed-Edom
  rationale: Compound proper name; transliterated and hyphenated for readability in
    English.
- source_word: יעִיאֵל
  chosen: Jeiel
  alternatives:
  - Jaaiel
  rationale: Proper personal name; rendered in the conventional English transliteration
    used for this Hebrew name.
- source_word: עֲזַזְיָהוּ
  chosen: Azaziah
  alternatives:
  - Azazyahu
  rationale: Proper personal name; transliterated in a standard English form.
- source_word: בְּכִנֹּרוֹת
  chosen: with lyres
  alternatives:
  - on lyres
  - with harps
  lexicon: HALOT
  rationale: כִּנּוֹר denotes a stringed instrument commonly rendered 'lyre' in modern
    scholarship; 'harp' is traditional but less precise. The preposition ב here is
    instrumental, hence 'with lyres.'
- source_word: עַל הַשְּׁמִינִית
  chosen: according to the Sheminith
  alternatives:
  - on the eighth
  - in the lower octave
  lexicon: HALOT
  rationale: The phrase is technical musical terminology. Because its exact sense
    is uncertain, the transliterated term 'Sheminith' best preserves the Hebrew while
    signaling a likely musical direction. 'According to' reflects עַל in this technical
    setting.
- source_word: לְנַצֵּחַ
  chosen: were to lead
  alternatives:
  - to lead
  - for direction
  - to direct the music
  lexicon: HALOT
  rationale: In musical contexts נצח can denote overseeing, directing, or leading
    performance. Given the list of named musicians and the instrumental notation,
    'were to lead' captures the functional sense in idiomatic English without over-specifying
    a formal title.
