id: 1CH.15.12
reference: 1 Chronicles 15:12
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לָ/הֶ֔ם אַתֶּ֛ם רָאשֵׁ֥י הָ/אָב֖וֹת לַ/לְוִיִּ֑ם הִֽתְקַדְּשׁוּ֙
    אַתֶּ֣ם וַ/אֲחֵי/כֶ֔ם וְ/הַֽעֲלִיתֶ֗ם אֵ֣ת אֲר֤וֹן יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל
    אֶל הֲכִינ֖וֹתִי לֽ/וֹ־׃
translation:
  text: And he said to them, “You are the heads of the fathers’ houses of the Levites.
    Sanctify yourselves, you and your brothers, and bring up the ark of the LORD,
    the God of Israel, to the place I have prepared for it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Consecrate yourselves.” The Hebrew verb refers to ritual sanctification.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאשֵׁי הָאָבוֹת
  chosen: the heads of the fathers’ houses
  alternatives:
  - the chief fathers
  - the heads of the ancestral houses
  - the heads of the families
  lexicon: HALOT
  rationale: The construct phrase literally refers to clan/family heads traced through
    the fathers. 'Fathers’ houses' preserves the Hebrew social structure more transparently
    than the smoother but less specific 'families.'
- source_word: לַלְוִיִּם
  chosen: of the Levites
  alternatives:
  - among the Levites
  - for the Levites
  lexicon: HALOT
  rationale: 'The lamed here marks relation/apposition: these heads belong to the
    Levites. ''Of the Levites'' is the most natural English rendering.'
- source_word: הִתְקַדְּשׁוּ
  chosen: Sanctify yourselves
  alternatives:
  - Consecrate yourselves
  - Make yourselves holy
  lexicon: HALOT
  rationale: The hitpael of קדשׁ denotes ritual self-consecration. 'Sanctify yourselves'
    is slightly more formal but preserves the cultic sense well; 'consecrate yourselves'
    is a viable alternative.
- source_word: וַאֲחֵיכֶם
  chosen: you and your brothers
  alternatives:
  - you and your kinsmen
  lexicon: HALOT
  rationale: The term means 'your brothers' and here refers to fellow Levites/kinsmen.
    'Brothers' keeps the source wording; the representative sense is contextual rather
    than requiring neutralization.
- source_word: וְהַעֲלִיתֶם
  chosen: bring up
  alternatives:
  - carry up
  - bring
  lexicon: HALOT
  rationale: עלה in the causative commonly means 'bring up' or 'cause to go up.' In
    the ark-transport context, 'bring up' is idiomatic and reflects the established
    directional/cultic nuance.
- source_word: אֲרוֹן יְהוָה אֱלֹהֵי יִשְׂרָאֵל
  chosen: the ark of the LORD, the God of Israel
  alternatives:
  - the ark of Yahweh, God of Israel
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered 'the LORD' per doctrine. The appositional
    phrase 'the God of Israel' is retained in full.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's mandated default for the divine name, preserving
    the conventional reverential substitution in English.
- source_word: אֶל הֲכִינוֹתִי לוֹ
  chosen: to the place I have prepared for it
  alternatives:
  - to what I have prepared for it
  - to where I have prepared for it
  lexicon: HALOT
  rationale: 'The verb ''I have prepared'' takes an implied destination/object supplied
    by context: the place prepared for the ark. English requires this to be made explicit
    for clarity. ''Place'' is not overtly present but is strongly implied by the preposition
    אֶל and the narrative context of David''s prepared site/tent.'
