theological_decisions:
- issue: Implicit subject/complement in the opening clause
  chosen_reading: The clause is interpreted as referring to the Levites' absence in
    the first attempt to bring up the ark.
  alternative_readings:
  - Because at the first, you were not the ones, the LORD our God broke out against
    us
  - Because you were not carrying it the first time, the LORD our God broke out against
    us
  rationale: The Hebrew is compressed, but the surrounding context (vv. 2, 12–15)
    explains that the Levites had not carried the ark in the earlier attempt. The
    translation makes the implied sense explicit without over-specifying 'carrying
    it' in the main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Nature of divine action in פרץ
  chosen_reading: A sudden outbreak of judgment by the LORD against Israel
  alternative_readings:
  - A breach made by the LORD among us
  rationale: The wording should preserve the severity of divine judgment while remaining
    readable. 'Broke out against us' echoes the narrative's naming of Perez-uzzah
    and keeps the theological weight of God's holiness.
  doctrine_reference: Translation philosophy §6
