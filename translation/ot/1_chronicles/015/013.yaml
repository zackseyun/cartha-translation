id: 1CH.15.13
reference: 1 Chronicles 15:13
source:
  edition: WLC
  text: כִּ֛י לְ/מַ בָּ/רִ֥אשׁוֹנָ֖ה לֹ֣א אַתֶּ֑ם פָּרַ֨ץ יְהוָ֤ה אֱלֹהֵ֨י/נוּ֙ בָּ֔/נוּ
    כִּי לֹ֥א דְרַשְׁנֻ֖/הוּ כַּ/מִּשְׁפָּֽט־׃
translation:
  text: Because you were not there the first time, the LORD our God broke out against
    us, because we did not seek him according to the ordinance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Because at the first the LORD our God made a breach against us.' The
      Hebrew opening is compressed and may also imply that the Levites were not involved
      in the first attempt to bring up the ark.
    reason: alternative_reading
  - marker: b
    text: Or, 'we did not inquire of him according to the prescribed rule.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַ בָּרִאשׁוֹנָה
  chosen: you were not there the first time
  alternatives:
  - because at the first
  - because the first time
  - for because at the first, since you were not
  lexicon: HALOT
  rationale: The Hebrew sequence is elliptical and idiomatic in context. In David's
    speech to the Levites, the sense is causal and refers to their absence in the
    earlier failed attempt to move the ark (vv. 12–13). Supplying 'you were not there'
    makes explicit what is implied by לֹא אַתֶּם with the temporal phrase 'the first
    time.'
- source_word: פָּרַץ
  chosen: broke out against
  alternatives:
  - burst out against
  - made a breach against
  - broke through against
  lexicon: HALOT
  rationale: פרץ with God as subject and בְּ/בָּנוּ as object recalls the earlier
    judgment on Uzza and is commonly used for a sudden outbreak or breach. 'Broke
    out against us' is natural modern English while preserving the force of divine
    judgment.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward construct with first person plural suffix; retained with
    covenantal force.
- source_word: בָּנוּ
  chosen: against us
  alternatives:
  - on us
  - among us
  lexicon: HALOT
  rationale: With פרץ in a judgment context, English 'against us' best conveys hostile
    impact rather than mere location.
- source_word: דְרַשְׁנֻהוּ
  chosen: we did not seek him
  alternatives:
  - we did not inquire of him
  - we did not consult him
  lexicon: HALOT
  rationale: דרשׁ can mean seek, inquire, or consult. Here the issue is proper approach
    to the LORD in worship and cultic procedure, so 'seek him' preserves the broader
    theological sense while remaining idiomatic.
- source_word: כַּמִּשְׁפָּט
  chosen: according to the ordinance
  alternatives:
  - according to the rule
  - as prescribed
  - according to the proper order
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to the prescribed legal/procedural requirement
    for transporting the ark. 'According to the ordinance' preserves the normative,
    prescribed sense without sounding overly technical.
