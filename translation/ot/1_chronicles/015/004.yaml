id: 1CH.15.4
reference: 1 Chronicles 15:4
source:
  edition: WLC
  text: וַ/יֶּאֱסֹ֥ף דָּוִ֛יד אֶת בְּנֵ֥י אַֽהֲרֹ֖ן וְ/אֶת הַ/לְוִיִּֽם־־׃
translation:
  text: And David gathered the sons of Aaron and the Levites.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֶּאֱסֹף
  chosen: gathered
  alternatives:
  - assembled
  - collected
  lexicon: HALOT
  rationale: The verb אסף in the waw-consecutive narrative form denotes bringing people
    together. 'Gathered' is natural modern English and fits a personal object list
    better than the slightly more formal 'assembled,' while remaining close to the
    Hebrew.
- source_word: דָּוִיד
  chosen: David
  rationale: Standard English transliteration of the personal name.
- source_word: בְּנֵי אַהֲרֹן
  chosen: the sons of Aaron
  alternatives:
  - Aaron's sons
  - the descendants of Aaron
  lexicon: HALOT
  rationale: Literally 'sons of Aaron.' This likely refers to the Aaronic priests
    in context, but the Hebrew expression itself is filial/genealogical. Per the gender-accurate
    principle, 'sons' is retained rather than neutralizing to 'descendants.' 'Aaron's
    sons' would also be possible, but 'the sons of Aaron' preserves the formal register
    and structure of the source.
- source_word: הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - the descendants of Levi
  lexicon: HALOT
  rationale: The term denotes the Levitical group, conventionally and accurately rendered
    'the Levites.' This is the established English equivalent and matches the cultic
    context.
- source_word: אֵת ... וְאֵת
  chosen: '[not separately translated; marked direct objects as coordinated objects]'
  lexicon: Hebrew grammar
  rationale: 'The particle אֵת marks the definite direct object and has no direct
    English equivalent. The repeated use before each object is represented by normal
    English coordination: ''the sons of Aaron and the Levites.'''
