id: 1CH.15.27
reference: 1 Chronicles 15:27
source:
  edition: WLC
  text: וְ/דָוִ֞יד מְכֻרְבָּ֣ל בִּ/מְעִ֣יל בּ֗וּץ וְ/כָל הַ/לְוִיִּם֙ הַ/נֹּשְׂאִ֣ים
    אֶת הָ/אָר֔וֹן וְ/הַ/מְשֹׁ֣רְרִ֔ים וּ/כְנַנְיָ֛ה הַ/שַּׂ֥ר הַ/מַּשָּׂ֖א הַ/מְשֹֽׁרְרִ֑ים
    וְ/עַל דָּוִ֖יד אֵפ֥וֹד בָּֽד׀־־־׃
translation:
  text: Now David was clothed in a robe of fine linen, as were all the Levites who
    were carrying the ark, and the singers, and Chenaniah, the leader of the carrying,
    the singers; and on David was a linen ephod.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'Chenaniah, leader of the singing' or 'leader of the music.'
      The Hebrew phrase is difficult.
    reason: alternative_reading
lexical_decisions:
- source_word: מְכֻרְבָּל
  chosen: was clothed
  alternatives:
  - was wrapped
  - was robed
  lexicon: HALOT
  rationale: The passive participle denotes being dressed or wrapped in a garment.
    'Was clothed' is natural modern English and fits the following prepositional phrase
    naming the garment.
- source_word: מְעִיל
  chosen: robe
  alternatives:
  - mantle
  - outer garment
  lexicon: HALOT
  rationale: Refers to a distinct outer garment. 'Robe' is the clearest idiomatic
    rendering in this ceremonial context.
- source_word: בּוּץ
  chosen: fine linen
  alternatives:
  - byssus
  - linen
  lexicon: HALOT
  rationale: The term denotes fine linen, often of high quality. 'Fine linen' preserves
    the material and its elevated connotation better than simply 'linen'.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering for the tribal/cultic group.
- source_word: הַנֹּשְׂאִים אֶת הָאָרוֹן
  chosen: who were carrying the ark
  alternatives:
  - bearing the ark
  lexicon: HALOT
  rationale: The participle describes the Levites' ongoing action in the procession.
    'Carrying' is clear modern English; 'bearing' is possible but less natural.
- source_word: הַמְשֹׁרְרִים
  chosen: the singers
  alternatives:
  - the musicians
  lexicon: HALOT
  rationale: The root specifically denotes singing. Although musical performance is
    involved, 'singers' is more precise.
- source_word: כְנַנְיָה
  chosen: Chenaniah
  alternatives:
  - Kenaniah
  rationale: Standard English transliteration of the personal name; alternate transliteration
    reflects the same Hebrew consonants.
- source_word: הַשַּׂר
  chosen: the leader
  alternatives:
  - the chief
  - the official
  lexicon: HALOT
  rationale: Denotes one in charge. 'Leader' is readable modern English and fits the
    administrative role in the procession.
- source_word: הַמַּשָּׂא
  chosen: the carrying
  alternatives:
  - the transport
  - the burden
  lexicon: HALOT
  rationale: The noun can mean burden/load/carrying. In this context of moving the
    ark, 'the carrying' best reflects the activity, though the Hebrew construction
    is difficult.
- source_word: אֵפוֹד בָּד
  chosen: a linen ephod
  alternatives:
  - an ephod of linen
  lexicon: HALOT
  rationale: This is a specific cultic garment; 'ephod' should be retained rather
    than paraphrased. 'Linen ephod' is concise and standard.
- source_word: וְעַל דָּוִיד
  chosen: and on David was
  alternatives:
  - and David wore
  - and upon David was
  lexicon: HALOT
  rationale: The Hebrew literally says 'and on David [was]'. Retaining this structure
    helps preserve the distinction between the robe and the additional ephod, though
    it is slightly formal in English.
