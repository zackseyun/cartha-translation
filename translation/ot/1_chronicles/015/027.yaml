theological_decisions:
- issue: Nature of David's attire in a liturgical setting
  chosen_reading: Retain 'ephod' as a specific garment without importing priestly
    claims beyond the text.
  alternative_readings:
  - Paraphrase as 'priestly vest'
  - Infer that David was acting as a priest
  rationale: The verse states what David wore but does not explicitly claim priestly
    office here. Keeping 'ephod' preserves the textual detail without over-interpreting
    its theological significance.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
- issue: Syntactically difficult phrase הַשַּׂר הַמַּשָּׂא הַמְשֹׁרְרִים
  chosen_reading: Render conservatively as 'the leader of the carrying, the singers'
    and preserve a smoother interpretive alternative in a footnote.
  alternative_readings:
  - the leader of the singing
  - the leader of the carrying of the singers
  - the leader of the music
  rationale: The Masoretic wording is awkward and admits multiple construals. A conservative
    main-text rendering avoids silently resolving the difficulty, while a footnote
    preserves a plausible interpretive alternative.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
