id: 1CH.15.10
reference: 1 Chronicles 15:10
source:
  edition: WLC
  text: לִ/בְנֵ֖י עֻזִּיאֵ֑ל עַמִּינָדָ֣ב הַ/שָּׂ֔ר וְ/אֶחָ֕י/ו מֵאָ֖ה וּ/שְׁנֵ֥ים
    עָשָֽׂר׃ס
translation:
  text: 'For the sons of Uzziel: Amminadab the chief, and his brothers, one hundred
    and twelve.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leader' or 'prince' for 'the chief.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/בְנֵי
  chosen: For the sons of
  alternatives:
  - Of the sons of
  - To the sons of
  lexicon: HALOT
  rationale: The prefixed ל here introduces the next clan/group in a list, best rendered
    idiomatically in English as 'For the sons of' rather than a more wooden 'to.'
    'Sons of' preserves the genealogical/clan language of בנים in context.
- source_word: עֻזִּיאֵל
  chosen: Uzziel
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: עַמִּינָדָב
  chosen: Amminadab
  rationale: Personal name; transliterated by standard English convention.
- source_word: הַ/שָּׂר
  chosen: the chief
  alternatives:
  - the leader
  - the prince
  lexicon: HALOT
  rationale: שַׂר commonly denotes a leader, chief, official, or prince. In this administrative/list
    context, 'the chief' is natural modern English and fits the pattern of named clan
    heads in the surrounding verses.
- source_word: וְ/אֶחָי/ו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: אָח can mean literal brothers or broader male kin/group members. In this
    census-like list of Levite representatives, 'brothers' is the standard and sufficiently
    broad rendering, preserving the masculine familial language of the Hebrew.
- source_word: מֵאָה וּ/שְׁנֵים עָשָׂר
  chosen: one hundred and twelve
  alternatives:
  - a hundred and twelve
  lexicon: HALOT
  rationale: Straightforward cardinal number. Rendered in standard English prose style.
