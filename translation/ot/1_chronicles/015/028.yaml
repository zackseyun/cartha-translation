id: 1CH.15.28
reference: 1 Chronicles 15:28
source:
  edition: WLC
  text: וְ/כָל יִשְׂרָאֵ֗ל מַעֲלִים֙ אֶת אֲר֣וֹן בְּרִית יְהוָ֔ה בִּ/תְרוּעָה֙ וּ/בְ/ק֣וֹל
    שׁוֹפָ֔ר וּ/בַ/חֲצֹצְר֖וֹת וּ/בִ/מְצִלְתָּ֑יִם מַשְׁמִעִ֕ים בִּ/נְבָלִ֖ים וְ/כִנֹּרֽוֹת־־־׃
translation:
  text: And all Israel was bringing up the ark of the covenant of the LORD with shouting,
    with the sound of a horn, with trumpets, and with cymbals, sounding on harps and
    lyres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a shout'; the Hebrew term can denote a loud cry of celebration
      or acclamation.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'shofar,' traditionally a horn, distinct from the 'trumpets' mentioned
      next.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲלִים
  chosen: was bringing up
  alternatives:
  - were bringing up
  - brought up
  - was carrying up
  lexicon: HALOT
  rationale: 'Hiphil participle plural of עלה in narrative context conveys ongoing/processive
    action: the people were engaged in bringing the ark upward/up to Jerusalem. English
    singular ''all Israel was'' treats the collective subject naturally.'
- source_word: אֲרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  lexicon: HALOT
  rationale: A straightforward construct chain. 'The LORD' follows the doctrinal default
    for יְהוָה. Retaining 'covenant' preserves the theological specificity of the
    ark's identity.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD'.
- source_word: תְרוּעָה
  chosen: shouting
  alternatives:
  - a shout
  - joyful shouting
  - acclamation
  lexicon: HALOT
  rationale: The term denotes a loud cry/raised shout, often in celebratory or cultic
    settings. 'Shouting' fits the instrumental ב and the festive procession context.
- source_word: קוֹל שׁוֹפָר
  chosen: the sound of a horn
  alternatives:
  - the sound of a ram's horn
  - the sound of a trumpet
  lexicon: HALOT
  rationale: קול is explicitly 'sound/voice,' and שופר is best kept distinct from
    חצצרות later in the verse. 'Horn' preserves that distinction better than repeating
    'trumpet.'
- source_word: חֲצֹצְרוֹת
  chosen: trumpets
  alternatives:
  - silver trumpets
  lexicon: HALOT
  rationale: Standard rendering for the straight ceremonial trumpets, distinguished
    from שופר. 'Silver' is historically plausible in some contexts but not stated
    here.
- source_word: מְצִלְתַּיִם
  chosen: cymbals
  lexicon: HALOT
  rationale: Standard lexical equivalent for the percussion instrument.
- source_word: מַשְׁמִעִים
  chosen: sounding
  alternatives:
  - making music
  - causing to be heard
  - playing loudly
  lexicon: HALOT
  rationale: Hiphil participle of שמע means causing sound to be heard. Here it most
    naturally modifies the instrumental music that follows. 'Sounding' is concise
    and preserves the audible emphasis.
- source_word: נְבָלִים
  chosen: harps
  alternatives:
  - lyres
  - lutes
  lexicon: HALOT
  rationale: English instrument terminology is not exact for ancient strings, but
    rendering נבל as 'harps' and כינורות as 'lyres' preserves a conventional distinction
    between the two terms.
- source_word: כִנֹּרוֹת
  chosen: lyres
  alternatives:
  - harps
  lexicon: HALOT
  rationale: Chosen to distinguish it from נְבָלִים in the same verse. Exact modern
    equivalents are approximate, but two distinct English terms are preferable.
