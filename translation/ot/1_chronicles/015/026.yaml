theological_decisions:
- issue: Subject of the sacrificial action
  chosen_reading: they sacrificed
  alternative_readings:
  - he sacrificed
  rationale: The Hebrew verb ויזבחו is 3rd person masculine plural, so the subject
    is plural. Contextually this most naturally refers to the participants associated
    with the procession, not a singular subject such as David. The translation preserves
    the grammatical plurality without over-specifying the exact subgroup beyond the
    Hebrew.
