id: 1CH.15.26
reference: 1 Chronicles 15:26
source:
  edition: WLC
  text: וַֽ/יְהִי֙ בֶּ/עְזֹ֣ר הָֽ/אֱלֹהִ֔ים אֶ֨ת הַ/לְוִיִּ֔ם נֹשְׂאֵ֖י אֲר֣וֹן בְּרִית
    יְהוָ֑ה וַ/יִּזְבְּח֥וּ שִׁבְעָֽה פָרִ֖ים וְ/שִׁבְעָ֥ה אֵילִֽים־־־׃
translation:
  text: And when God helped the Levites who were carrying the ark of the covenant
    of the LORD, they sacrificed seven bulls and seven rams.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the ark of the LORD's covenant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּעְזֹר
  chosen: when ... helped
  alternatives:
  - in helping
  - as ... helped
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ב after ויהי forms a temporal
    clause: ''when/as God helped.'' ''Helped'' best captures עזר in straightforward
    modern English.'
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the true God
  lexicon: HALOT
  rationale: Although formally marked with the article, האלהים here refers to Israel's
    God and is naturally rendered 'God' in English, not 'the God,' since English proper-name
    usage does not normally retain the article in this construction.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/clan designation; definite article retained
    naturally in English.
- source_word: נֹשְׂאֵי
  chosen: who were carrying
  alternatives:
  - bearing
  - carrying
  lexicon: HALOT
  rationale: The participle modifies 'the Levites' and denotes their ongoing role
    in the scene. 'Who were carrying' gives clear English syntax and reflects the
    durative sense.
- source_word: אֲרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  lexicon: HALOT
  rationale: This preserves the full construct chain transparently. 'The LORD' follows
    the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: וַיִּזְבְּחוּ
  chosen: they sacrificed
  alternatives:
  - they offered sacrifices
  - they slaughtered as sacrifices
  lexicon: HALOT
  rationale: זבח in sacrificial context is best rendered 'sacrificed.' It is concise,
    natural, and preserves the cultic action without overexpansion.
- source_word: שִׁבְעָה פָרִים
  chosen: seven bulls
  alternatives:
  - seven young bulls
  - seven oxen
  lexicon: HALOT
  rationale: פרים commonly denotes bulls in sacrificial contexts. 'Bulls' is the most
    direct and idiomatic rendering here.
- source_word: וְשִׁבְעָה אֵילִים
  chosen: and seven rams
  lexicon: HALOT
  rationale: אילים straightforwardly means 'rams'; the repeated numeral is retained
    for formal clarity and rhythm.
