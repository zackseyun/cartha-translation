theological_decisions:
- issue: Referent of the suffix in וּלְשָׁרְתוֹ
  chosen_reading: The Levites are appointed 'to minister to him,' with the pronoun referring to the LORD.
  alternative_readings:
  - to minister before it (i.e., before the ark), understood by association with the ark in context
  rationale: The nearest explicit personal antecedent of theological prominence is יְהוָה, and Levitical service is regularly described as service to the LORD. Rendering the suffix personally avoids reducing the service to mere attendance on an object while remaining faithful to the Hebrew syntax and cultic context.
