id: 1CH.15.2
reference: 1 Chronicles 15:2
source:
  edition: WLC
  text: אָ֚ז אָמַ֣ר דָּוִ֔יד לֹ֤א לָ/שֵׂאת֙ אֶת אֲר֣וֹן הָֽ/אֱלֹהִ֔ים כִּ֖י אִם הַ/לְוִיִּ֑ם כִּי בָ֣/ם בָּחַ֣ר יְהוָ֗ה לָ/שֵׂ֞את אֶת אֲר֧וֹן יְהוָ֛ה וּֽ/לְ/שָׁרְת֖/וֹ עַד עוֹלָֽם־־־׀־־׃ס
translation:
  text: Then David said, “No one is to carry the ark of God except the Levites, for Yahweh has chosen them to carry the ark of Yahweh and to minister to him forever.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The ark of God is not to be carried by anyone except the Levites.' The Hebrew is elliptical and leaves the implied subject unstated.
    reason: lexical_alternative
  - marker: b
    text: '''Minister to him'' may also be rendered ''serve him.'' The Hebrew verb often refers to sacred or liturgical service.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal discourse marker introducing David’s response after the preceding events; 'Then' is natural modern English and preserves sequence.
- source_word: אָמַר דָּוִיד
  chosen: David said
  alternatives:
  - David declared
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol/qatal-style reporting formula; 'said' is the unmarked and sufficiently formal rendering.
- source_word: לֹא לָשֵׂאת אֶת אֲרוֹן הָאֱלֹהִים כִּי אִם הַלְוִיִּם
  chosen: No one is to carry the ark of God except the Levites
  alternatives:
  - The ark of God is not to be carried by anyone except the Levites
  - None may carry the ark of God except the Levites
  lexicon: HALOT
  rationale: 'The Hebrew is elliptical: literally ''not to carry ... except the Levites.'' English requires the implied subject to be supplied. ''No one is to carry'' best captures the prohibitive force in idiomatic English without over-paraphrase.'
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the chest of God
  lexicon: HALOT
  rationale: '''Ark'' is the established and accurate rendering for אֲרוֹן in this cultic context; ''chest'' would be technically possible but inappropriate in English Bible style and less precise for the sacred object.'
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/clan designation; transliterated people-group term is conventional and clear.
- source_word: כִּי בָם בָּחַר יְהוָה
  chosen: for the LORD has chosen them
  alternatives:
  - because the LORD chose them
  lexicon: HALOT
  rationale: כִּי here gives the reason for the prohibition. Perfect בָּחַר is well rendered with English present perfect in this explanatory context, highlighting the abiding result of the LORD’s prior choice.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָשֵׂאת
  chosen: to carry
  alternatives:
  - to bear
  lexicon: HALOT
  rationale: נשא in this context refers to physically bearing the ark. 'Carry' is clearer modern English than the more formal 'bear'.
- source_word: אֲרוֹן יְהוָה
  chosen: the ark of the LORD
  alternatives:
  - the LORD’s ark
  lexicon: HALOT
  rationale: Maintains the construct relationship transparently and preserves the repeated phraseology of the Hebrew.
- source_word: וּלְשָׁרְתוֹ
  chosen: and to minister to him
  alternatives:
  - and to serve him
  lexicon: HALOT
  rationale: שרת in priestly/Levitical contexts often denotes cultic service. 'Minister' preserves the sacred-service nuance better than the broader 'serve.' The pronominal suffix most naturally refers to the LORD.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for all time
  - perpetually
  lexicon: HALOT
  rationale: Idiomatic rendering of the phrase indicating enduring, ongoing appointment. 'Forever' is natural and sufficiently weighty in English.
