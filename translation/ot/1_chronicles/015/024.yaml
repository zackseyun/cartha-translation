id: 1CH.15.24
reference: 1 Chronicles 15:24
source:
  edition: WLC
  text: וּ/שְׁבַנְיָ֡הוּ וְ/יֽוֹשָׁפָ֡ט וּ/נְתַנְאֵ֡ל וַ/עֲמָשַׂ֡י וּ֠/זְכַרְיָהוּ
    וּ/בְנָיָ֤הוּ וֶֽ/אֱלִיעֶ֨זֶר֙ הַ/כֹּ֣הֲנִ֔ים מחצצרים בַּ/חֲצֹ֣צְר֔וֹת לִ/פְנֵ֖י
    אֲר֣וֹן הָֽ/אֱלֹהִ֑ים וְ/עֹבֵ֤ד אֱדֹם֙ וִֽ/יחִיָּ֔ה שֹׁעֲרִ֖ים לָ/אָרֽוֹן׃
translation:
  text: And Shebaniah, Jehoshaphat, Nethanel, Amasai, Zechariah, Benaiah, and Eliezer
    the priests were blowing the trumpets before the ark of God, and Obed-edom and
    Jehiah were gatekeepers for the ark.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were sounding the trumpets.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term for these trumpets often refers to the straight priestly
      trumpets used in worship.
    reason: cultural_note
  - marker: c
    text: Or 'doorkeepers for the ark.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֲנִים
  chosen: the priests
  alternatives:
  - priests
  lexicon: HALOT
  rationale: Definite article marks the listed men as belonging to the priestly group;
    in English, 'the priests' naturally apposes the preceding names.
- source_word: מחצצרים
  chosen: were blowing
  alternatives:
  - blowing
  - were sounding
  lexicon: HALOT
  rationale: The participle denotes ongoing/contemporaneous action in the procession
    scene. 'Were blowing' gives natural English aspect while preserving the durative
    sense.
- source_word: בַּחֲצֹצְרֹות
  chosen: the trumpets
  alternatives:
  - trumpets
  - the silver trumpets
  lexicon: HALOT
  rationale: חֲצֹצְרֹות refers to trumpets, especially the straight cultic trumpets
    used by priests. 'The trumpets' is the direct lexical rendering; adding 'silver'
    would import detail not explicit in this verse.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  - before the presence of
  lexicon: HALOT
  rationale: 'Standard spatial rendering here: the priests are positioned before the
    ark in the procession.'
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the ark of the true God
  lexicon: HALOT
  rationale: Construct phrase straightforwardly means 'the ark of God.' This is the
    idiomatic biblical expression in English.
- source_word: שֹׁעֲרִים
  chosen: gatekeepers
  alternatives:
  - doorkeepers
  - guards
  lexicon: HALOT
  rationale: The term commonly denotes gatekeepers/porters in temple or sacred-space
    contexts. 'Gatekeepers' preserves the institutional/cultic nuance better than
    the more generic 'guards.'
- source_word: לָאָרוֹן
  chosen: for the ark
  alternatives:
  - at the ark
  - over the ark
  lexicon: HALOT
  rationale: 'The lamed here indicates assignment or responsibility: Obed-edom and
    Jehiah served as gatekeepers in relation to the ark. ''For the ark'' is concise
    and preserves that functional sense.'
- source_word: וְעֹבֵד אֱדֹם
  chosen: Obed-edom
  alternatives:
  - Obed-Edom
  lexicon: HALOT
  rationale: Personal name transliterated per project philosophy. Hyphenation follows
    common English convention for this compound name.
- source_word: וִיחִיָּה
  chosen: Jehiah
  alternatives:
  - Yehiah
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention; 'Jehiah'
    is a familiar rendering in English Bible tradition while remaining recognizably
    close to the Hebrew.
