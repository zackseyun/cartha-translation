theological_decisions:
- issue: Referent of the pronominal suffix in וַיֶּט לוֹ אֹהֶל
  chosen_reading: the suffix refers to the ark, yielding 'pitched a tent for it'
  alternative_readings:
  - the suffix refers to David, yielding 'pitched a tent for himself'
  rationale: The immediate context centers on David's preparations for the ark of
    God, and the sequence 'prepared a place for the ark ... and pitched a tent for
    it' forms a coherent parallel. This avoids introducing a sudden shift back to
    David as the object of concern in the final clause.
