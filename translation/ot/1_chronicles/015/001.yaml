id: 1CH.15.1
reference: 1 Chronicles 15:1
source:
  edition: WLC
  text: וַ/יַּֽעַשׂ ל֥/וֹ בָתִּ֖ים בְּ/עִ֣יר דָּוִ֑יד וַ/יָּ֤כֶן מָקוֹם֙ לַֽ/אֲר֣וֹן
    הָֽ/אֱלֹהִ֔ים וַ/יֶּט ל֖/וֹ אֹֽהֶל־־׃
translation:
  text: And he made houses for himself in the city of David, and he prepared a place
    for the ark of God and pitched a tent for it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and pitched a tent for himself.' The Hebrew suffix can be read as referring
      either to the ark or to David, though the immediate context favors the ark.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: made
  alternatives:
  - built
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'). In context with בָתִּים, English 'made
    houses' is acceptable and closely follows the Hebrew, while 'built' is a plausible
    contextual alternative. 'Made' preserves the source wording more transparently.
- source_word: בָתִּים
  chosen: houses
  alternatives:
  - buildings
  - palaces
  lexicon: HALOT
  rationale: The plural of בית normally means 'houses.' Since the text does not specify
    royal palaces, 'houses' is the most textually restrained rendering, though the
    structures may have been royal residences or associated buildings.
- source_word: בְּעִיר דָּוִיד
  chosen: in the city of David
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'City of David' is the standard English
    rendering and preserves the proper-name force of the Hebrew.
- source_word: וַיָּכֶן
  chosen: prepared
  alternatives:
  - established
  - made ready
  lexicon: HALOT
  rationale: כון in the Hiphil commonly means 'prepare, make ready, establish.' Here
    the object is 'a place' for the ark, so 'prepared' best fits the immediate context.
- source_word: מָקוֹם
  chosen: a place
  alternatives:
  - a site
  lexicon: HALOT
  rationale: מקום is the ordinary term for 'place.' 'A place' is natural and sufficiently
    specific in context.
- source_word: לַאֲרוֹן הָאֱלֹהִים
  chosen: for the ark of God
  alternatives:
  - for the ark of the true God
  lexicon: HALOT
  rationale: אֲרוֹן is 'ark/chest,' and in this context clearly refers to the sacred
    ark. 'Ark of God' is the standard and accurate rendering. No need to expand beyond
    the Hebrew.
- source_word: וַיֶּט
  chosen: pitched
  alternatives:
  - stretched out
  - spread
  lexicon: HALOT
  rationale: נטה can mean 'stretch out' or 'pitch' when used with a tent. Since the
    object is אֹהֶל, 'pitched' is the idiomatic English equivalent.
- source_word: אֹהֶל
  chosen: a tent
  alternatives:
  - the tent
  lexicon: HALOT
  rationale: The noun lacks the article in Hebrew, so 'a tent' is the more formally
    precise rendering. English could use 'the tent' if understood as a known cultic
    tent, but the anarthrous form favors 'a tent.'
- source_word: לּוֹ
  chosen: for it
  alternatives:
  - for the ark
  - for himself
  lexicon: HALOT
  rationale: The pronominal suffix most naturally refers to the nearest suitable antecedent,
    'the ark of God,' yielding 'pitched a tent for it.' Rendering it 'for himself'
    would be possible grammatically but is contextually less likely, since the preceding
    clause concerns preparation for the ark.
