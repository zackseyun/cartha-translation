id: 1CH.15.8
reference: 1 Chronicles 15:8
source:
  edition: WLC
  text: לִ/בְנֵ֖י אֱלִֽיצָפָ֑ן שְׁמַֽעְיָ֥ה הַ/שָּׂ֖ר וְ/אֶחָ֥י/ו מָאתָֽיִם׃ס
translation:
  text: 'For the sons of Elizaphan: Shemaiah the chief, and two hundred of his brothers.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kinsmen' for 'brothers'; the Hebrew term can extend beyond literal siblings
      to fellow clan members in genealogical or military lists.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/בְנֵי
  chosen: For the sons of
  alternatives:
  - Of the sons of
  - For the descendants of
  lexicon: HALOT
  rationale: The prefixed ל here introduces the clan group within the larger list,
    naturally rendered 'for' in English list style. בְּנֵי literally means 'sons of,'
    which is retained rather than generalized, since it denotes a male-line family/clan
    designation in this genealogical context.
- source_word: אֱלִיצָפָן
  chosen: Elizaphan
  alternatives:
  - Elitsaphan
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: שְׁמַעְיָה
  chosen: Shemaiah
  alternatives:
  - Shemayah
  rationale: Personal name transliterated by standard convention.
- source_word: הַ/שָּׂר
  chosen: the chief
  alternatives:
  - the leader
  - the prince
  - the captain
  lexicon: HALOT
  rationale: שַׂר commonly denotes a leader, chief, official, or commander. In this
    clan-list context, 'the chief' best fits the sense of the named representative
    heading his family group, without implying royal rank ('prince') or military office
    ('captain').
- source_word: וְ/אֶחָ֥י/ו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  - and his brethren
  lexicon: HALOT
  rationale: אָח can mean literal brother or broader kin. In numbered clan musters
    such as this, it often refers to fellow clan members. 'Brothers' is retained as
    the more literal and gender-accurate rendering, matching the source form and the
    list's male representative context.
- source_word: מָאתָֽיִם
  chosen: two hundred
  lexicon: HALOT
  rationale: Straightforward cardinal number.
