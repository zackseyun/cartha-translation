id: 1CH.15.16
reference: 1 Chronicles 15:16
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר דָּוִיד֮ לְ/שָׂרֵ֣י הַ/לְוִיִּם֒ לְ/הַֽעֲמִ֗יד אֶת אֲחֵי/הֶם֙
    הַ/מְשֹׁ֣רְרִ֔ים בִּ/כְלֵי שִׁ֛יר נְבָלִ֥ים וְ/כִנֹּר֖וֹת וּ/מְצִלְתָּ֑יִם מַשְׁמִיעִ֥ים
    לְ/הָרִֽים בְּ/ק֖וֹל לְ/שִׂמְחָֽה־־־׃פ
translation:
  text: Then David told the leaders of the Levites to appoint their brothers, the
    singers, with musical instruments—harps, lyres, and cymbals—sounding aloud, to
    raise songs of joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to lift up the voice with joy'; the Hebrew expression is literally 'to
      raise with a sound/voice for joy.'
    reason: lexical_alternative
  - marker: b
    text: '''Their brothers'' refers to their fellow Levites.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then David told
  alternatives:
  - said
  - spoke to
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, so 'Then' reflects the sequence
    naturally in English. 'Told' fits the following infinitive of command ('to appoint')
    better than the more wooden 'said to.'
- source_word: לְשָׂרֵי הַלְוִיִּם
  chosen: the leaders of the Levites
  alternatives:
  - the chiefs of the Levites
  - the officials of the Levites
  lexicon: HALOT
  rationale: שָׂרִים commonly denotes leaders, chiefs, or officials. 'Leaders' is
    clear modern English and suits the administrative context.
- source_word: לְהַעֲמִיד
  chosen: to appoint
  alternatives:
  - to station
  - to set in place
  lexicon: HALOT
  rationale: The Hiphil of עמד can mean cause to stand, set, station, or appoint.
    In this organizational context for temple musicians, 'appoint' best conveys formal
    designation rather than mere physical positioning.
- source_word: אֶת אֲחֵיהֶם
  chosen: their brothers
  alternatives:
  - their fellow Levites
  - their kinsmen
  lexicon: HALOT
  rationale: The Hebrew literally says 'their brothers.' Per the translation philosophy,
    gender-accurate wording is preferred where it matches the source. Here it refers
    to fellow Levites, but the literal kinship term is retained.
- source_word: הַמְשֹׁרְרִים
  chosen: the singers
  alternatives:
  - the musicians
  - those who sang
  lexicon: HALOT
  rationale: From שׁיר, this participle specifically denotes singers rather than musicians
    in general, even though instruments are also mentioned.
- source_word: בִּכְלֵי שִׁיר
  chosen: with musical instruments
  alternatives:
  - with instruments of song
  - with song-instruments
  lexicon: HALOT
  rationale: A natural rendering of the construct phrase meaning instruments used
    for music. 'Musical instruments' is idiomatic without losing the sense.
- source_word: נְבָלִים
  chosen: harps
  alternatives:
  - lutes
  - harp-like instruments
  lexicon: HALOT
  rationale: The exact ancient instrument is debated, but 'harps' is the standard
    and most recognizable rendering in English Bible tradition.
- source_word: וְכִנֹּרוֹת
  chosen: lyres
  alternatives:
  - harps
  - stringed instruments
  lexicon: HALOT
  rationale: כִּנּוֹר is commonly identified as a lyre. Rendering it distinctly from
    נֶבֶל preserves the difference between the two instruments.
- source_word: וּמְצִלְתַּיִם
  chosen: cymbals
  alternatives:
  - clashing cymbals
  lexicon: HALOT
  rationale: The noun denotes cymbals. 'Clashing' is possible contextually but not
    required by the noun itself here.
- source_word: מַשְׁמִיעִים
  chosen: sounding aloud
  alternatives:
  - making a sound
  - causing to be heard
  - playing loudly
  lexicon: HALOT
  rationale: The Hiphil participle of שׁמע means causing sound to be heard. 'Sounding
    aloud' captures the audible, public nature of the music without over-specifying
    the manner.
- source_word: לְהָרִים בְּקוֹל
  chosen: to raise songs
  alternatives:
  - to lift up the voice
  - to raise the sound
  - to sound loudly
  lexicon: HALOT
  rationale: Literally, 'to raise with a voice/sound.' In context of singers and instruments,
    the idiom points to elevating the musical praise. 'Songs' is supplied to make
    the English idiomatic while staying within the semantic field of the verse.
- source_word: לְשִׂמְחָה
  chosen: of joy
  alternatives:
  - for joy
  - with joy
  - for rejoicing
  lexicon: HALOT
  rationale: 'The phrase expresses purpose or result: the music is characterized by
    rejoicing. ''Of joy'' works smoothly with ''songs of joy''; ''for joy'' is also
    possible but less natural in this sentence.'
