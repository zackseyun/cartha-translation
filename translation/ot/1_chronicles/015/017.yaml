id: 1CH.15.17
reference: 1 Chronicles 15:17
source:
  edition: WLC
  text: וַ/יַּעֲמִ֣ידוּ הַ/לְוִיִּ֗ם אֵ֚ת הֵימָ֣ן בֶּן יוֹאֵ֔ל וּ/מִ֨ן אֶחָ֔י/ו אָסָ֖ף
    בֶּן בֶּֽרֶכְיָ֑הוּ וּ/מִן בְּנֵ֤י מְרָרִי֙ אֲחֵי/הֶ֔ם אֵיתָ֖ן בֶּן קֽוּשָׁיָֽהוּ־־־ס־־׃
translation:
  text: So the Levites appointed Heman son of Joel, and from his brothers, Asaph son
    of Berechiah, and from the sons of Merari, their brothers, Ethan son of Kushaiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set in place' / 'stationed'; the Hebrew verb can denote causing someone
      to stand in an assigned role.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the sons of Merari'; that is, from the Merarite clan.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעֲמִידוּ
  chosen: appointed
  alternatives:
  - set up
  - stationed
  - presented
  lexicon: HALOT
  rationale: The Hiphil of עמד here means to cause someone to stand in an assigned
    role. In this context of organizing Levitical musicians, 'appointed' best conveys
    formal designation without overly wooden wording.
- source_word: הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - the Levitical men
  lexicon: HALOT
  rationale: Standard rendering of the tribal/clan designation; definite article preserved.
- source_word: אֵת
  chosen: '[not separately translated]'
  rationale: Direct-object marker has no natural English equivalent and is represented
    by English word order.
- source_word: הֵימָן
  chosen: Heman
  rationale: Personal name transliterated according to standard English convention,
    following project policy to transliterate names.
- source_word: בֶּן
  chosen: son of
  alternatives: []
  lexicon: HALOT
  rationale: Genealogical relationship is explicit and should be preserved formally.
- source_word: יוֹאֵל
  chosen: Joel
  rationale: Personal name transliterated by standard convention.
- source_word: וּמִן אֶחָיו
  chosen: and from his brothers
  alternatives:
  - and from among his brothers
  lexicon: HALOT
  rationale: מן marks selection from a group. 'From his brothers' is concise and natural;
    'his' refers back to Heman/the same Levitical grouping in context.
- source_word: אָסָף
  chosen: Asaph
  rationale: Personal name transliterated by standard convention.
- source_word: בֶּרֶכְיָהוּ
  chosen: Berechiah
  alternatives:
  - Berekyahu
  rationale: Conventional English transliteration of the Hebrew personal name.
- source_word: וּמִן בְּנֵי מְרָרִי
  chosen: and from the sons of Merari
  alternatives:
  - and from the Merarites
  lexicon: HALOT
  rationale: The Hebrew is literally 'from the sons of Merari.' This preserves the
    clan/genealogical expression more transparently than the more interpretive 'Merarites.'
- source_word: אֲחֵיהֶם
  chosen: their brothers
  alternatives:
  - their kinsmen
  lexicon: HALOT
  rationale: Literal familial term retained. In context it denotes fellow Levites
    from the related group; 'brothers' matches the source and the project's gender-accurate
    policy.
- source_word: אֵיתָן
  chosen: Ethan
  rationale: Personal name transliterated by standard convention.
- source_word: קוּשָׁיָהוּ
  chosen: Kushaiah
  alternatives:
  - Kushayah
  rationale: Personal name transliterated; conventional English form 'Kushaiah' is
    clear and readable.
