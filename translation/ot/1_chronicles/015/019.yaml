id: 1CH.15.19
reference: 1 Chronicles 15:19
source:
  edition: WLC
  text: וְ/הַ/מְשֹׁ֣רְרִ֔ים הֵימָ֥ן אָסָ֖ף וְ/אֵיתָ֑ן בִּ/מְצִלְתַּ֥יִם נְחֹ֖שֶׁת
    לְ/הַשְׁמִֽיעַ׃
translation:
  text: The singers were Heman, Asaph, and Ethan, with bronze cymbals to sound them
    loudly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to make them heard' / 'to sound aloud.' The Hebrew infinitive literally
      means 'to cause to be heard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמְשֹׁרְרִים
  chosen: The singers
  alternatives:
  - and the singers
  - the musicians
  lexicon: HALOT
  rationale: From שׁרר/שׁיר in the participial form with article, referring specifically
    to those who sing. 'The singers' is more precise than the broader 'musicians.'
    The prefixed conjunction is naturally absorbed into English sentence flow rather
    than rendered woodenly as 'and.'
- source_word: הֵימָן
  chosen: Heman
  rationale: Personal name; transliterated according to the translation philosophy.
- source_word: אָסָף
  chosen: Asaph
  rationale: Personal name; transliterated according to the translation philosophy.
- source_word: וְאֵיתָן
  chosen: and Ethan
  rationale: Personal name with conjunction; transliterated, with the conjunction
    retained in natural English list form.
- source_word: בִּמְצִלְתַּיִם
  chosen: with cymbals
  alternatives:
  - on cymbals
  - using cymbals
  lexicon: HALOT
  rationale: The preposition ב here is instrumental, indicating the means by which
    they performed. 'With cymbals' is idiomatic and clear.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  - brass
  lexicon: HALOT
  rationale: נְחֹשֶׁת commonly denotes bronze/copper alloy in biblical contexts. 'Bronze'
    is the standard modern rendering for metal instruments and avoids the anachronistic
    'brass.'
- source_word: לְהַשְׁמִיעַ
  chosen: to sound them loudly
  alternatives:
  - to make a sound
  - to raise the sound
  - to sound aloud
  lexicon: HALOT
  rationale: Hiphil infinitive of שׁמע means 'to cause to be heard,' here in a musical
    setting. The phrase indicates producing an audible, prominent sound with the cymbals.
    'To sound them loudly' captures the performative force in natural English.
