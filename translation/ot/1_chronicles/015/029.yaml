id: 1CH.15.29
reference: 1 Chronicles 15:29
source:
  edition: WLC
  text: וַ/יְהִ֗י אֲרוֹן֙ בְּרִ֣ית יְהוָ֔ה בָּ֖א עַד עִ֣יר דָּוִ֑יד וּ/מִיכַ֨ל בַּת
    שָׁא֜וּל נִשְׁקְפָ֣ה בְּעַ֣ד הַ/חַלּ֗וֹן וַ/תֵּ֨רֶא אֶת הַ/מֶּ֤לֶךְ דָּוִיד֙ מְרַקֵּ֣ד
    וּ/מְשַׂחֵ֔ק וַ/תִּ֥בֶז ל֖/וֹ בְּ/לִבָּֽ/הּ־־׀־׃פ
translation:
  text: And as the ark of the covenant of the LORD came to the city of David, Michal
    the daughter of Saul looked out through the window and saw King David dancing
    and celebrating, and she despised him in her heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'rejoicing' or 'making merry' for 'celebrating.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  lexicon: HALOT
  rationale: 'Standard construct chain: ''ark'' + ''covenant'' + divine name. ''the
    LORD'' follows the project''s default for יְהוָה.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, preserving Jewish reverence
    tradition and common English Bible convention.
- source_word: בָּא עַד עִיר דָּוִיד
  chosen: came to the city of David
  alternatives:
  - was coming as far as the city of David
  - entered the city of David
  lexicon: HALOT
  rationale: בוא with עַד here naturally conveys arrival at/to the destination. 'Came
    to' is idiomatic and sufficiently formal without overstating entry.
- source_word: מִיכַל בַּת שָׁאוּל
  chosen: Michal the daughter of Saul
  alternatives:
  - Michal, Saul's daughter
  lexicon: HALOT
  rationale: A direct, formal rendering of the appositional identification; it also
    preserves the narrative emphasis on her Saulide identity.
- source_word: נִשְׁקְפָה בְּעַד הַחַלּוֹן
  chosen: looked out through the window
  alternatives:
  - looked down through the window
  - gazed out of the window
  lexicon: HALOT
  rationale: The verb denotes looking out/down from a window. 'Looked out through
    the window' is natural English and does not over-specify vertical direction, which
    is not crucial here.
- source_word: וַתֵּרֶא אֶת הַמֶּלֶךְ דָּוִיד
  chosen: and saw King David
  alternatives:
  - and saw the king, David
  lexicon: HALOT
  rationale: English naturally renders the title-name combination as 'King David'
    rather than preserving the Hebrew article explicitly.
- source_word: מְרַקֵּד
  chosen: dancing
  alternatives:
  - leaping
  - skipping
  lexicon: HALOT
  rationale: The participle refers to energetic dance-like movement. 'Dancing' fits
    the context of cultic celebration and matches common English usage.
- source_word: וּמְשַׂחֵק
  chosen: celebrating
  alternatives:
  - rejoicing
  - playing merrily
  - making merry
  lexicon: HALOT
  rationale: The verb can denote playful or festive action. In this procession context,
    'celebrating' communicates joyful public festivity without implying trivial play.
- source_word: וַתִּבֶז לוֹ
  chosen: and she despised him
  alternatives:
  - and she held him in contempt
  - and she scorned him
  lexicon: HALOT
  rationale: בזה expresses contempt/despising. 'Despised him' is concise, strong,
    and faithful.
- source_word: בְּלִבָּהּ
  chosen: in her heart
  alternatives:
  - within herself
  lexicon: HALOT
  rationale: A literal but idiomatic rendering that preserves the inward, internal
    nature of her contempt.
