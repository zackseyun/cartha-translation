id: 1CH.15.22
reference: 1 Chronicles 15:22
source:
  edition: WLC
  text: וּ/כְנַנְיָ֥הוּ שַֽׂר הַ/לְוִיִּ֖ם בְּ/מַשָּׂ֑א יָסֹר֙ בַּ/מַּשָּׂ֔א כִּ֥י
    מֵבִ֖ין הֽוּא־׃
translation:
  text: And Chenaniah, chief of the Levites, directed the carrying, because he was
    skillful at it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'directed the singing ... because he was skillful in it.' The Hebrew
      word מַשָּׂא usually means 'burden' or 'carrying,' but some take it here in
      a musical sense because of the surrounding references to singers and musicians.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew repeats the same noun: ''in the carrying ... in the carrying.''
      The translation renders the second occurrence idiomatically as ''at it.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כְנַנְיָהוּ
  chosen: Chenaniah
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: שַׂר
  chosen: chief
  alternatives:
  - leader
  - official
  - prince
  lexicon: HALOT
  rationale: In this administrative/cultic context, שַׂר denotes a leading officer
    or overseer. 'Chief' is concise and natural in English, fitting his supervisory
    role over the Levites.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/clan designation; the article is preserved.
- source_word: בְּמַשָּׂא
  chosen: the carrying
  alternatives:
  - the transport
  - the burden
  - the song
  lexicon: HALOT
  rationale: מַשָּׂא commonly means 'burden, carrying, load.' In this context of moving
    the ark and sacred items, 'carrying' best fits the immediate narrative. Although
    some interpreters take the term here in a musical sense ('song' or 'singing'),
    the more straightforward Hebrew sense is retained in the main text.
- source_word: יָסֹר
  chosen: directed
  alternatives:
  - instructed
  - supervised
  - had charge
  lexicon: HALOT
  rationale: The verb here conveys exercising oversight or direction. 'Directed' communicates
    active supervision in idiomatic modern English without overinterpreting the exact
    administrative nuance.
- source_word: בַּמַּשָּׂא
  chosen: at it
  alternatives:
  - in the carrying
  - in the transport
  - in the burden
  - in the singing
  lexicon: HALOT
  rationale: The repeated phrase is rendered idiomatically to avoid awkward English
    repetition while preserving the sense that his direction pertained specifically
    to the carrying task. The underlying lexical link to the previous מַשָּׂא is noted
    in the footnote.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for his appointment or activity; 'because' is the
    clearest modern English connector.
- source_word: מֵבִין הוּא
  chosen: he was skillful
  alternatives:
  - he understood
  - he was discerning
  - he was expert
  lexicon: HALOT
  rationale: The participle of בין here denotes competence or expertise, not merely
    cognitive understanding. 'Skillful' captures the practical sense in context.
