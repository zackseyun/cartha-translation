id: 1CH.15.11
reference: 1 Chronicles 15:11
source:
  edition: WLC
  text: וַ/יִּקְרָ֣א דָוִ֔יד לְ/צָד֥וֹק וּ/לְ/אֶבְיָתָ֖ר הַ/כֹּֽהֲנִ֑ים וְ/לַ/לְוִיִּ֗ם
    לְ/אֽוּרִיאֵ֤ל עֲשָׂיָה֙ וְ/יוֹאֵ֣ל שְׁמַֽעְיָ֔ה וֶ/אֱלִיאֵ֖ל וְ/עַמִּינָדָֽב׃
translation:
  text: 'Then David called for Zadok and Abiathar the priests, and for the Levites:
    Uriel, Asaiah, Joel, Shemaiah, Eliel, and Amminadab.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called for
  alternatives:
  - called
  - summoned
  lexicon: HALOT
  rationale: The wayyiqtol of קרא here introduces David's act of summoning specific
    persons to appear before him. 'Called for' captures the sense of summoning more
    naturally in English than bare 'called,' while remaining close to the Hebrew.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  alternatives:
  - priests
  lexicon: HALOT
  rationale: 'Definite article is present in Hebrew, referring specifically to Zadok
    and Abiathar in their priestly role. English retains the article: ''the priests.'''
- source_word: וְלַלְוִיִּם
  chosen: and for the Levites
  alternatives:
  - and the Levites
  lexicon: HALOT
  rationale: The preposition ל is repeated before 'the Levites,' parallel to the earlier
    objects of calling. 'And for the Levites' preserves the summoning sense and the
    syntactic parallelism better than simply 'and the Levites.'
- source_word: לְאוּרִיאֵל עֲשָׂיָה וְיוֹאֵל שְׁמַעְיָה וֶאֱלִיאֵל וְעַמִּינָדָב
  chosen: Uriel, Asaiah, Joel, Shemaiah, Eliel, and Amminadab
  lexicon: HALOT
  rationale: These are personal names and are transliterated per project philosophy.
    A colon after 'the Levites' clarifies that the six names identify the Levites
    summoned.
- source_word: דָוִיד
  chosen: David
  lexicon: HALOT
  rationale: Standard English transliteration of the proper name.
