id: 1CH.15.20
reference: 1 Chronicles 15:20
source:
  edition: WLC
  text: וּ/זְכַרְיָ֨ה וַ/עֲזִיאֵ֜ל וּ/שְׁמִֽירָמ֤וֹת וִֽ/יחִיאֵל֙ וְ/עֻנִּ֣י וֶֽ/אֱלִיאָ֔ב
    וּ/מַעֲשֵׂיָ֖הוּ וּ/בְנָיָ֑הוּ בִּ/נְבָלִ֖ים עַל עֲלָמֽוֹת־׃
translation:
  text: and Zechariah, Aziel, Shemiramoth, Jehiel, Unni, Eliab, Maaseiah, and Benaiah,
    with harps according to Alamoth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with harps in a high register'; the Hebrew term 'Alamoth' may be a musical
      direction associated with maidens or soprano-like pitch.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּנְבָלִים
  chosen: with harps
  alternatives:
  - on harps
  - with lyres
  lexicon: HALOT
  rationale: נְבָלִים refers to stringed instruments, commonly rendered 'harps' or
    'lyres.' 'Harps' is a familiar and natural English rendering in this musical inventory
    context. The prefixed ב is rendered instrumentally as 'with.'
- source_word: עַל
  chosen: according to
  alternatives:
  - upon
  - 'on'
  - in soprano
  lexicon: HALOT
  rationale: In this musical context עַל likely introduces the manner, setting, or
    register associated with עֲלָמוֹת rather than a literal spatial sense. 'According
    to' preserves the preposition's flexibility without over-interpreting the exact
    technical meaning.
- source_word: עֲלָמוֹת
  chosen: Alamoth
  alternatives:
  - maidens
  - high pitch
  - soprano
  lexicon: HALOT
  rationale: עֲלָמוֹת literally relates to 'young women/maidens,' but in musical superscriptions
    and lists it is widely understood as a technical musical term, perhaps indicating
    a high register. Because the exact force is uncertain, transliterating as 'Alamoth'
    preserves the source term without falsely resolving the technical sense; lexical
    alternatives are preserved in a footnote.
- source_word: וּ/זְכַרְיָה וַ/עֲזִיאֵל וּ/שְׁמִירָמוֹת וִֽ/יחִיאֵל וְ/עֻנִּי וֶֽ/אֱלִיאָב
    וּ/מַעֲשֵׂיָהוּ וּ/בְנָיָהוּ
  chosen: and Zechariah, Aziel, Shemiramoth, Jehiel, Unni, Eliab, Maaseiah, and Benaiah
  rationale: Personal names are transliterated per project philosophy. The initial
    conjunction is carried into the English list, with a final 'and' before the last
    name for natural English coordination.
