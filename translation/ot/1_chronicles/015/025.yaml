id: 1CH.15.25
reference: 1 Chronicles 15:25
source:
  edition: WLC
  text: וַ/יְהִ֥י דָוִ֛יד וְ/זִקְנֵ֥י יִשְׂרָאֵ֖ל וְ/שָׂרֵ֣י הָ/אֲלָפִ֑ים הַ/הֹֽלְכִ֗ים
    לְֽ/הַעֲל֞וֹת אֶת אֲר֧וֹן בְּרִית יְהוָ֛ה מִן בֵּ֥ית עֹבֵֽד אֱדֹ֖ם בְּ/שִׂמְחָֽה־־־־׃ס
translation:
  text: So David, and the elders of Israel, and the commanders of the thousands went
    to bring up the ark of the covenant of the LORD from the house of Obed-edom with
    joy.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  chosen: So ... went
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה here functions as a narrative introducer rather
    than requiring a wooden existential clause in English. Rendering it with a smooth
    narrative transition ('So') and carrying the main action into 'went' preserves
    the discourse function in readable modern English.
- source_word: זִקְנֵי יִשְׂרָאֵל
  chosen: the elders of Israel
  lexicon: HALOT
  rationale: Standard rendering for the recognized leadership group; both lexically
    precise and idiomatic.
- source_word: שָׂרֵי הָאֲלָפִים
  chosen: the commanders of the thousands
  alternatives:
  - the captains of thousands
  - the chiefs of the thousands
  lexicon: HALOT
  rationale: שָׂרֵי denotes officials/leaders, and אֲלָפִים here refers to military
    or administrative units of 'thousands.' 'Commanders of the thousands' preserves
    the structure of the Hebrew better than a more interpretive paraphrase.
- source_word: הַהֹלְכִים
  chosen: went
  alternatives:
  - were going
  - those going
  lexicon: HALOT
  rationale: The participle modifies the preceding group and describes their action.
    In idiomatic English narrative, finite 'went' best conveys the sense without awkwardness.
- source_word: לְהַעֲלוֹת
  chosen: to bring up
  alternatives:
  - to carry up
  - to take up
  lexicon: HALOT
  rationale: עלה in this cultic/transport context commonly means 'bring up,' especially
    for moving the ark to a higher or more central place. This is the conventional
    and contextually accurate English equivalent.
- source_word: אֲרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  lexicon: HALOT
  rationale: This preserves the construct chain closely while using the doctrinally
    required rendering 'the LORD' for יְהוָה. Either English order is possible; this
    one is transparent to the Hebrew form.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding covenantal usage.
- source_word: מִן בֵּית עֹבֵד אֱדֹם
  chosen: from the house of Obed-edom
  alternatives:
  - from Obed-edom's house
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase and construct
    relationship, while preserving the personal name by transliteration.
- source_word: בְּשִׂמְחָה
  chosen: with joy
  alternatives:
  - in joy
  - rejoicing
  - with rejoicing
  lexicon: HALOT
  rationale: The beth preposition here is best rendered adverbially. 'With joy' is
    concise, natural English and preserves the celebratory tone without overexpansion.
