id: 1CH.15.9
reference: 1 Chronicles 15:9
source:
  edition: WLC
  text: לִ/בְנֵ֖י חֶבְר֑וֹן אֱלִיאֵ֥ל הַ/שָּׂ֖ר וְ/אֶחָ֥י/ו שְׁמוֹנִֽים׃ס
translation:
  text: 'For the sons of Hebron: Eliel the chief, and eighty of his brothers.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kinsmen' for 'brothers'; the Hebrew literally reads 'his brothers,'
      likely referring to male members of the clan group represented by Eliel.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי
  chosen: For the sons of
  alternatives:
  - Of the sons of
  - For the descendants of
  lexicon: HALOT
  rationale: The prefixed ל introduces the clan grouping within the larger list, best
    rendered idiomatically as 'For the sons of.' 'Sons of' preserves the Hebrew kinship
    expression more closely than the broader 'descendants of,' though the latter is
    a possible sense in genealogical contexts.
- source_word: חֶבְרוֹן
  chosen: Hebron
  lexicon: HALOT
  rationale: Proper personal/clan name, transliterated according to the translation
    philosophy of transliterating names.
- source_word: אֱלִיאֵל
  chosen: Eliel
  lexicon: HALOT
  rationale: Proper personal name, transliterated rather than translated.
- source_word: הַשַּׂר
  chosen: the chief
  alternatives:
  - the leader
  - the prince
  - the captain
  lexicon: HALOT
  rationale: שַׂר denotes a leader, official, or chief. In this list of clan representatives,
    'the chief' is natural English and fits the administrative sense without implying
    royalty ('prince') or military specificity ('captain').
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  - and his brethren
  lexicon: HALOT
  rationale: Literally 'and his brothers.' In this clan-list context it likely refers
    to male clan associates or relatives, but 'brothers' best preserves the Hebrew
    wording and matches the gender-accurate policy.
- source_word: שְׁמוֹנִים
  chosen: eighty
  lexicon: HALOT
  rationale: Cardinal number giving the count of those associated with Eliel.
