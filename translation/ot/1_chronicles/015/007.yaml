id: 1CH.15.7
reference: 1 Chronicles 15:7
source:
  edition: WLC
  text: לִ/בְנֵ֖י גֵּרְשׁ֑וֹם יוֹאֵ֣ל הַ/שָּׂ֔ר וְ/אֶחָ֖י/ו מֵאָ֥ה וּ/שְׁלֹשִֽׁים׃ס
translation:
  text: 'For the sons of Gershom: Joel the chief, and 130 of his brothers.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Gershon,' following a more familiar traditional English form of the
      clan name; the Hebrew here reads Gershom.
    reason: alternative_reading
  - marker: b
    text: '''Brothers'' here refers to male members of the same Levitical family group,
      not necessarily Joel''s immediate siblings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/בְנֵי
  chosen: For the sons of
  alternatives:
  - Of the sons of
  - For the descendants of
  lexicon: HALOT
  rationale: The prefixed ל here introduces the next clan/group in a list, so 'For
    the sons of' is natural English while preserving the distributive/listing function.
    'Sons of' is retained rather than 'descendants of' because בני regularly marks
    a genealogical subgroup and the text is listing Levitical family divisions.
- source_word: גֵּרְשׁוֹם
  chosen: Gershom
  alternatives:
  - Gershon
  lexicon: HALOT
  rationale: The consonantal form here is Gershom, and personal names are transliterated
    by standard conventions. Although some English traditions use 'Gershon' for the
    Levitical clan, this verse's form supports 'Gershom.'
- source_word: יוֹאֵל
  chosen: Joel
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: הַ/שָּׂר
  chosen: the chief
  alternatives:
  - the leader
  - the prince
  lexicon: HALOT
  rationale: שַׂר denotes a leader, chief, official, or prince depending on context.
    In this administrative/genealogical list, 'the chief' best conveys Joel's role
    as head of this family division without implying royal status.
- source_word: וְ/אֶחָי/ו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  - and his fellow clansmen
  lexicon: HALOT
  rationale: Although 'brothers' can denote wider kin-group membership, the base sense
    should be preserved where possible. In this census-like context it refers to male
    members of the same Levitical group under Joel.
- source_word: מֵאָה וּ/שְׁלֹשִׁים
  chosen: '130'
  alternatives:
  - one hundred and thirty
  lexicon: HALOT
  rationale: The Hebrew cardinal number is straightforward. Numerals are rendered
    in digits for readability in a list context, without loss of meaning.
