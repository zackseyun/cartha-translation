id: 1CH.15.5
reference: 1 Chronicles 15:5
source:
  edition: WLC
  text: לִ/בְנֵ֖י קְהָ֑ת אוּרִיאֵ֣ל הַ/שָּׂ֔ר וְ/אֶחָ֖י/ו מֵאָ֥ה וְ/עֶשְׂרִֽים׃ס
translation:
  text: 'For the sons of Kohath: Uriel the chief, and 120 of his brothers.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his kinsmen'; 'brothers' here likely refers to fellow members of the
      Kohathite clan, not necessarily only biological siblings.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/בְנֵי
  chosen: For the sons of
  alternatives:
  - Of the sons of
  - For the descendants of
  lexicon: HALOT
  rationale: The prefixed ל here introduces the clan group within a list of Levite
    divisions being named and counted. 'For the sons of' fits the list structure in
    context better than a bare 'to the sons of.' 'Sons of' is retained rather than
    'descendants of' because בני commonly marks a clan line and the translation philosophy
    prefers gender-accurate rendering unless context requires otherwise.
- source_word: קְהָת
  chosen: Kohath
  lexicon: HALOT
  rationale: Proper name of the Levitical ancestor; transliterated per translation
    philosophy for personal names.
- source_word: אוּרִיאֵל
  chosen: Uriel
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: הַ/שָּׂר
  chosen: the chief
  alternatives:
  - the leader
  - the prince
  lexicon: HALOT
  rationale: שַׂר denotes a leader, chief, official, or prince. In this administrative
    and cultic listing, 'the chief' is natural modern English and reflects a recognized
    head of the clan contingent without implying royalty as 'prince' might.
- source_word: וְ/אֶחָי/ו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: Although 'brothers' can denote broader male kin or fellow clan members,
    the Hebrew term is literally 'his brothers.' This preserves the source wording
    while allowing the clan sense to be inferred from context.
- source_word: מֵאָה וְ/עֶשְׂרִים
  chosen: '120'
  alternatives:
  - one hundred and twenty
  lexicon: HALOT
  rationale: The cardinal number is rendered in standard modern English numeral form
    for readability in a census-like list. The meaning is unchanged.
