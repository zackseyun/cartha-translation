id: 1CH.15.18
reference: 1 Chronicles 15:18
source:
  edition: WLC
  text: וְ/עִמָּ/הֶ֖ם אֲחֵי/הֶ֣ם הַ/מִּשְׁנִ֑ים זְכַרְיָ֡הוּ בֵּ֡ן וְ/יַֽעֲזִיאֵ֡ל
    וּ/שְׁמִֽירָמ֡וֹת וִ/יחִיאֵ֣ל וְ/עֻנִּ֡י אֱלִיאָ֡ב וּ/בְנָיָ֡הוּ וּ/מַֽעֲשֵׂיָ֡הוּ
    וּ/מַתִּתְיָהוּ֩ וֶ/אֱלִ֨יפְלֵ֜הוּ וּ/מִקְנֵיָ֨הוּ וְ/עֹבֵ֥ד אֱדֹ֛ם וִֽ/יעִיאֵ֖ל
    הַ/שֹּׁעֲרִֽים׀׃
translation:
  text: 'And with them were their brothers of the second rank: Zechariah, Ben, and
    Jaaziel, and Shemiramoth, and Jehiel, and Unni, Eliab, and Benaiah, and Maaseiah,
    and Mattithiah, and Eliphelehu, and Mikneiah, and Obed-edom, and Jeiel, the gatekeepers.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their brothers, the second group' / 'their brothers of the second order.'
      The Hebrew expression likely distinguishes a secondary rank among the Levites
      or musicians.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעִמָּהֶם
  chosen: And with them were
  alternatives:
  - And with them
  - And with them also were
  lexicon: HALOT
  rationale: The prepositional phrase introduces an accompanying group. Supplying
    'were' is required for natural English and reflects the verbless Hebrew clause.
- source_word: אֲחֵיהֶם
  chosen: their brothers
  alternatives:
  - their kinsmen
  lexicon: HALOT
  rationale: The noun literally means 'their brothers.' In this genealogical/Levitical
    context it can denote fellow Levites or associates, but 'brothers' best preserves
    the source wording and the translation philosophy's preference for gender-accurate
    rendering.
- source_word: הַמִּשְׁנִים
  chosen: of the second rank
  alternatives:
  - the second
  - the seconds
  - the second order
  lexicon: HALOT
  rationale: The term derives from 'second' and here distinguishes a secondary class
    or rank among the musicians/Levites. 'Of the second rank' communicates status/function
    more clearly than the overly literal 'the second.'
- source_word: זְכַרְיָהוּ
  chosen: Zechariah
  alternatives:
  - Zekaryahu
  rationale: Standard English transliteration of the personal name.
- source_word: בֵּן
  chosen: Ben
  alternatives: []
  rationale: Here בֵּן is best taken as a proper name in the list, not the common
    noun 'son of,' since it appears among coordinated names without a following patronymic
    construction.
- source_word: יַעֲזִיאֵל
  chosen: Jaaziel
  alternatives:
  - Jaaziel
  rationale: Standard English transliteration of the personal name.
- source_word: שְׁמִירָמוֹת
  chosen: Shemiramoth
  alternatives: []
  rationale: Standard English transliteration of the personal name.
- source_word: יְחִיאֵל
  chosen: Jehiel
  alternatives:
  - Yehiel
  rationale: Standard English transliteration of the personal name.
- source_word: עֻנִּי
  chosen: Unni
  alternatives: []
  rationale: Standard English transliteration of the personal name.
- source_word: אֱלִיאָב
  chosen: Eliab
  alternatives: []
  rationale: Standard English transliteration of the personal name.
- source_word: בְּנָיָהוּ
  chosen: Benaiah
  alternatives:
  - Benaiahu
  rationale: Standard English transliteration of the personal name.
- source_word: מַעֲשֵׂיָהוּ
  chosen: Maaseiah
  alternatives:
  - Maasiah
  rationale: Standard English transliteration of the personal name.
- source_word: מַתִּתְיָהוּ
  chosen: Mattithiah
  alternatives:
  - Mattityahu
  rationale: Standard English transliteration of the personal name.
- source_word: אֱלִיפְלֵהוּ
  chosen: Eliphelehu
  alternatives:
  - Eliphlehu
  rationale: Standard English transliteration of the personal name.
- source_word: מִקְנֵיָהוּ
  chosen: Mikneiah
  alternatives:
  - Miqneiah
  rationale: Standard English transliteration of the personal name.
- source_word: עֹבֵד אֱדֹם
  chosen: Obed-edom
  alternatives:
  - Obed-Edom
  rationale: Conventional English representation of the compound personal name.
- source_word: יְעִיאֵל
  chosen: Jeiel
  alternatives:
  - Yeiel
  rationale: Standard English transliteration of the personal name.
- source_word: הַשֹּׁעֲרִים
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  - the porters
  lexicon: HALOT
  rationale: The term denotes those stationed at entrances/gates. 'Gatekeepers' is
    clear modern English and fits the temple/tabernacle context better than archaic
    'porters.'
