id: 1CH.15.15
reference: 1 Chronicles 15:15
source:
  edition: WLC
  text: וַ/יִּשְׂא֣וּ בְנֵֽי הַ/לְוִיִּ֗ם אֵ֚ת אֲר֣וֹן הָֽ/אֱלֹהִ֔ים כַּ/אֲשֶׁ֛ר צִוָּ֥ה מֹשֶׁ֖ה כִּ/דְבַ֣ר יְהוָ֑ה בִּ/כְתֵפָ֥/ם בַּ/מֹּט֖וֹת עֲלֵי/הֶֽם־׃פ
translation:
  text: And the sons of the Levites carried the ark of God on their shoulders with the poles upon them, just as Moses had commanded according to the word of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'with the poles resting on them.' The Hebrew phrase describes the poles as being upon their shoulders while they carried the ark.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂאוּ
  chosen: carried
  alternatives:
  - lifted
  - bore
  lexicon: HALOT
  rationale: נשא in this narrative context refers to bearing/transporting the ark, not merely lifting it momentarily. 'Carried' is natural modern English and fits the ongoing action.
- source_word: בְנֵי הַלְוִיִּם
  chosen: the sons of the Levites
  alternatives:
  - the Levites
  - the Levitical sons
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of the Levites,' not simply 'Levites.' This preserves the source wording and its familial/tribal expression, consistent with gender-accurate translation.
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the ark of the covenant of God
  lexicon: HALOT
  rationale: The text here says only 'ark of God.' Adding 'of the covenant' would import wording from other contexts not present in this verse.
- source_word: כַּאֲשֶׁר צִוָּה מֹשֶׁה
  chosen: just as Moses had commanded
  alternatives:
  - as Moses commanded
  - according as Moses commanded
  lexicon: HALOT
  rationale: כַּאֲשֶׁר introduces comparison/conformity. 'Just as' clearly conveys correspondence. The pluperfect 'had commanded' fits the prior command relative to the carrying action.
- source_word: כִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - by the word of the LORD
  - according to the command of the LORD
  lexicon: HALOT
  rationale: דבר is literally 'word/matter.' 'According to the word of the LORD' preserves the formal linkage between Moses' command and divine instruction. 'LORD' follows the project's default for יְהוָה.
- source_word: בִּכְתֵפָם
  chosen: on their shoulders
  alternatives:
  - upon their shoulders
  - by their shoulder
  lexicon: HALOT
  rationale: The preposition and noun together describe the location/support of carrying. 'On their shoulders' is idiomatic and precise.
- source_word: בַּמֹּטוֹת עֲלֵיהֶם
  chosen: with the poles upon them
  alternatives:
  - by the poles on them
  - with poles over them
  - with the poles resting on them
  lexicon: HALOT
  rationale: 'The phrase specifies the means by which the ark was borne: the poles were upon the Levites'' shoulders. ''With the poles upon them'' keeps the Hebrew sequence and referential sense without overexplaining.'
