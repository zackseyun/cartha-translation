theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of David's title עַבְדִּי
  chosen_reading: my servant David
  alternative_readings:
  - my slave David
  rationale: The verse presents David as God's chosen royal servant. The bonded-status nuance of 'slave' is not the main emphasis here, so 'servant' better preserves the covenantal-honorific sense without flattening the relationship.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy for servant/slave context-dependence
