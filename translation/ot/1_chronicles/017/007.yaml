id: 1CH.17.7
reference: 1 Chronicles 17:7
source:
  edition: WLC
  text: וְ֠/עַתָּה כֹּֽה תֹאמַ֞ר לְ/עַבְדִּ֣/י לְ/דָוִ֗יד כֹּ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת אֲנִ֤י לְקַחְתִּ֨י/ךָ֙ מִן הַ/נָּוֶ֔ה מִֽן אַחֲרֵ֖י הַ/צֹּ֑אן לִ/הְי֣וֹת נָגִ֔יד עַ֖ל עַמִּ֥/י יִשְׂרָאֵֽל־ס־־׃
translation:
  text: 'Now therefore, this is what you shall say to my servant David: This is what Yahweh of hosts says: I took you from the pasture, from following the flock, to be ruler over my people Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "from the sheepfold" for "from the pasture."
    reason: lexical_alternative
  - marker: b
    text: Or "leader" or "prince" for "ruler."
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now therefore
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Combines the conjunctive ו with עַתָּה to mark a transition with inferential force in the divine message, not merely temporal sequence.
- source_word: כֹּה תֹאמַר
  chosen: this is what you shall say
  alternatives:
  - thus you shall say
  - you shall say this
  lexicon: HALOT
  rationale: Natural modern English for the prophetic messenger formula while preserving the directive force of the Hebrew.
- source_word: לְעַבְדִּי
  chosen: to my servant
  alternatives:
  - to my slave
  lexicon: HALOT
  rationale: Although עֶבֶד can denote slave or servant, here it functions as an honorific designation for David in covenantal service to God rather than emphasizing bonded status; 'servant' best fits the context.
- source_word: כֹּה אָמַר
  chosen: This is what ... says
  alternatives:
  - Thus says
  - This is what ... has said
  lexicon: HALOT
  rationale: Standard prophetic formula rendered in readable contemporary English. The Hebrew perfect אָמַר functions performatively in direct speech introduction.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and broad English Bible recognizability.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - of heavenly armies
  lexicon: HALOT
  rationale: Traditional but still intelligible rendering of the divine title; it preserves the breadth of צְבָאוֹת beyond merely human military forces.
- source_word: לְקַחְתִּיךָ
  chosen: I took you
  alternatives:
  - I brought you
  - I took hold of you
  lexicon: HALOT
  rationale: Direct rendering of לקח with first-person subject and second-person object, emphasizing God's initiative in David's elevation.
- source_word: מִן הַנָּוֶה
  chosen: from the pasture
  alternatives:
  - from the sheepfold
  - from the dwelling place
  lexicon: HALOT
  rationale: נָוֶה here refers to a pastureland or shepherding place. 'Pasture' fits the immediate shepherding context and avoids the more interpretive 'sheepfold.'
- source_word: מִן אַחֲרֵי הַצֹּאן
  chosen: from following the flock
  alternatives:
  - from behind the flock
  - from tending the sheep
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the shepherd image. 'Flock' is broader and more natural than repeating 'sheep' after 'pasture,' while still matching the pastoral setting.
- source_word: לִהְיוֹת נָגִיד
  chosen: to be ruler
  alternatives:
  - to be prince
  - to be leader
  lexicon: HALOT
  rationale: נָגִיד often denotes one appointed to lead or rule. 'Ruler' communicates governing authority clearly in modern English without importing later technical royal terminology.
- source_word: עַל עַמִּי יִשְׂרָאֵל
  chosen: over my people Israel
  alternatives:
  - over Israel my people
  - over my people, over Israel
  lexicon: HALOT
  rationale: Smooth English word order that preserves both divine possession ('my people') and the identity of the people as Israel.
