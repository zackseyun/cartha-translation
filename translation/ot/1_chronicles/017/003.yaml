id: 1CH.17.3
reference: 1 Chronicles 17:3
source:
  edition: WLC
  text: וַֽ/יְהִ֖י בַּ/לַּ֣יְלָה הַ/ה֑וּא וַ/יְהִי֙ דְּבַר אֱלֹהִ֔ים אֶל נָתָ֖ן לֵ/אמֹֽר־־׃
translation:
  text: But that night the word of God came to Nathan, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a word from God came to Nathan."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: But ... came
  alternatives:
  - And it happened
  - Now it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions as narrative progression. In English,
    rendering the first instance with 'But' captures the connection and mild contrast
    with the preceding context, while the second is absorbed into the idiomatic clause
    'the word of God came.' This avoids wooden repetition of 'and it happened' while
    preserving the narrative flow.
- source_word: בַּלַּיְלָה הַהוּא
  chosen: that night
  alternatives:
  - in that night
  - on that night
  lexicon: HALOT
  rationale: The phrase is a standard temporal expression. 'That night' is the most
    natural modern English equivalent and preserves the demonstrative force of הַהוּא.
- source_word: דְּבַר אֱלֹהִים
  chosen: the word of God
  alternatives:
  - a word from God
  - the message of God
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'message.' In prophetic revelation
    formulas, 'the word of God' is a well-established and accurate rendering that
    preserves the formal revelatory sense. The construct relation is retained directly.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים clearly refers to the God of Israel in singular sense.
    'God' is the straightforward English equivalent.
- source_word: אֶל נָתָן
  chosen: to Nathan
  alternatives:
  - unto Nathan
  lexicon: HALOT
  rationale: אֶל marks direction toward a recipient. 'To Nathan' is the natural English
    rendering; the personal name is transliterated per project philosophy.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The infinitive construct introduces direct speech in standard Hebrew
    narrative. 'Saying' is the conventional and clear English equivalent.
