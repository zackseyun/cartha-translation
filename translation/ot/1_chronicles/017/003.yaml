theological_decisions:
- issue: Rendering the revelatory formula דְּבַר אֱלֹהִים
  chosen_reading: the word of God
  alternative_readings:
  - a word from God
  - the message of God
  rationale: The phrase introduces prophetic revelation. 'The word of God' preserves
    the formal theological register without adding doctrinal content beyond the Hebrew.
    No contested doctrinal term from DOCTRINE.md is involved, but the rendering maintains
    the text's revelatory weight.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Preserve theological
    tension rather than resolve it'
