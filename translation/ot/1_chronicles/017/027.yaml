theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the Tetragrammaton as 'the LORD' in
    keeping with stated doctrine and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of the final clause וּמְבֹרָךְ לְעוֹלָם
  chosen_reading: declarative/resultative ('and it is blessed forever')
  alternative_readings:
  - optative/jussive-like sense ('and may it be blessed forever')
  - future-like sense ('and it will be blessed forever')
  rationale: The Hebrew uses a passive participle rather than an imperative or explicit
    jussive. In context, David concludes from God's prior blessing that the house
    stands in a permanently blessed state. The declarative reading best preserves
    the grammar while retaining the covenantal force.
