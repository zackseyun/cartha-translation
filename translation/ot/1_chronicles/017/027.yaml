id: 1CH.17.27
reference: 1 Chronicles 17:27
source:
  edition: WLC
  text: וְ/עַתָּ֗ה הוֹאַ֨לְתָּ֙ לְ/בָרֵךְ֙ אֶת בֵּ֣ית עַבְדְּ/ךָ֔ לִ/הְי֥וֹת לְ/עוֹלָ֖ם
    לְ/פָנֶ֑י/ךָ כִּֽי אַתָּ֤ה יְהוָה֙ בֵּרַ֔כְתָּ וּ/מְבֹרָ֖ךְ לְ/עוֹלָֽם־־׃פ
translation:
  text: And now, you have been pleased to bless the house of your servant, that it
    may be before you forever; for you, O LORD, have blessed it, and it is blessed
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you have undertaken to bless' or 'you have consented to bless.'
    reason: lexical_alternative
  - marker: b
    text: '''House'' here likely carries dynastic force, not merely the physical dwelling.'
    reason: cultural_note
  - marker: c
    text: Or 'and may it be blessed forever.' The Hebrew can be taken by some as expressing
      a wish, though the form is more naturally read as a statement of enduring blessedness.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Standard discourse transition; 'And now' preserves the connective ו plus
    temporal adverb עתה.
- source_word: הוֹאַלְתָּ
  chosen: you have been pleased
  alternatives:
  - you have undertaken
  - you have consented
  - you have begun
  lexicon: HALOT
  rationale: The verb יאל in this form commonly conveys willingness or gracious consent.
    'Have been pleased' fits the prayer context better than the more mechanical 'have
    undertaken' and reflects David's appeal to divine favor.
- source_word: לְבָרֵךְ
  chosen: to bless
  lexicon: HALOT
  rationale: Direct infinitive complement to הוֹאַלְתָּ; standard rendering.
- source_word: בֵּית עַבְדְּךָ
  chosen: the house of your servant
  alternatives:
  - your servant's house
  - the household of your servant
  lexicon: HALOT
  rationale: '''House'' preserves the dynastic/familial breadth of בַּיִת in this
    Davidic context; ''household'' is possible but can sound narrower in English.'
- source_word: לִהְיוֹת לְעוֹלָם לְפָנֶיךָ
  chosen: that it may be before you forever
  alternatives:
  - to be before you forever
  - to continue forever before you
  lexicon: HALOT
  rationale: This clause expresses the intended result of the blessing. 'Before you
    forever' preserves the covenantal sense of enduring in God's presence/favor without
    over-interpreting it as merely temporal continuation.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the preceding request/statement; 'for' is natural
    and sufficiently formal.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD'.
- source_word: בֵּרַכְתָּ
  chosen: have blessed
  alternatives:
  - blessed
  lexicon: HALOT
  rationale: Perfect verb rendered with present relevance in English; the blessing
    already given grounds the concluding affirmation.
- source_word: וּמְבֹרָךְ לְעוֹלָם
  chosen: and it is blessed forever
  alternatives:
  - and may it be blessed forever
  - and it will be blessed forever
  lexicon: HALOT
  rationale: 'The passive participle מברך is best taken as a stative/resultative statement:
    because the LORD has blessed, the house stands blessed forever. This avoids importing
    an additional jussive nuance not explicit in the Hebrew form.'
