id: 1CH.17.9
reference: 1 Chronicles 17:9
source:
  edition: WLC
  text: וְ/שַׂמְתִּ֣י מָ֠קוֹם לְ/עַמִּ֨/י יִשְׂרָאֵ֤ל וּ/נְטַעְתִּ֨י/הוּ֙ וְ/שָׁכַ֣ן
    תַּחְתָּ֔י/ו וְ/לֹ֥א יִרְגַּ֖ז ע֑וֹד וְ/לֹא יוֹסִ֤יפוּ בְנֵי עַוְלָה֙ לְ/בַלֹּת֔/וֹ
    כַּ/אֲשֶׁ֖ר בָּ/רִאשׁוֹנָֽה־־׃
translation:
  text: And I will appoint a place for my people Israel and plant them, and they will
    dwell in their own place and be disturbed no more. And the sons of wickedness
    will no longer wear them down, as at the first,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'evildoers' for 'the sons of wickedness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as formerly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  chosen: I will appoint
  alternatives:
  - I will set
  - I will establish
  lexicon: HALOT
  rationale: שׂוּם literally means 'set/place,' but with מָקוֹם and a people as object
    it carries the sense of assigning or appointing a place. 'Appoint' is natural
    English while preserving divine initiative.
- source_word: מָקוֹם
  chosen: a place
  alternatives:
  - a location
  - a dwelling place
  lexicon: HALOT
  rationale: Basic sense is 'place.' No need to expand beyond the Hebrew.
- source_word: לְעַמִּי יִשְׂרָאֵל
  chosen: for my people Israel
  alternatives:
  - for Israel my people
  lexicon: HALOT
  rationale: Preserves covenantal wording and possessive force.
- source_word: וּנְטַעְתִּיהוּ
  chosen: and plant them
  alternatives:
  - and plant it
  - and settle them
  lexicon: HALOT
  rationale: The verb is literally 'plant.' Although the suffix is singular, it refers
    collectively to the people Israel or the appointed place for them in a collective
    sense. English idiom favors 'plant them' for the people being securely established
    in the land.
- source_word: וְשָׁכַן
  chosen: and they will dwell
  alternatives:
  - and he will dwell
  - and it will dwell
  - and dwell
  lexicon: HALOT
  rationale: The Hebrew form is singular, but in context it refers to Israel collectively.
    English commonly renders such collectives with a plural pronoun for clarity. 'Dwell'
    preserves the settled, secure nuance.
- source_word: תַּחְתָּיו
  chosen: in their own place
  alternatives:
  - under it
  - in its place
  - in their place
  lexicon: HALOT
  rationale: Literally 'under it/him,' but in this idiom after planting and dwelling
    it conveys settledness in one's assigned place. 'In their own place' communicates
    the sense clearly in English without wooden obscurity.
- source_word: יִרְגַּז
  chosen: be disturbed
  alternatives:
  - be shaken
  - be agitated
  - tremble
  lexicon: HALOT
  rationale: The verb can denote agitation or disturbance. In context of national
    security, 'be disturbed' best captures the idea of being unsettled by hostile
    powers.
- source_word: עוֹד
  chosen: no more
  alternatives:
  - again
  - any longer
  lexicon: HALOT
  rationale: With negation, it idiomatically means cessation into the future.
- source_word: בְנֵי עַוְלָה
  chosen: the sons of wickedness
  alternatives:
  - wicked men
  - sons of injustice
  - evildoers
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew idiom and rhetorical force.
    Because the phrase is transparent enough in English, it is retained rather than
    flattened completely.
- source_word: לְבַלֹּתוֹ
  chosen: wear them down
  alternatives:
  - afflict them
  - consume them
  - oppress them
  lexicon: HALOT
  rationale: בלה in this stem conveys wearing out or consuming. 'Wear them down' captures
    sustained oppressive harm in accessible English.
- source_word: כַּאֲשֶׁר בָּרִאשׁוֹנָה
  chosen: as at the first
  alternatives:
  - as formerly
  - as before
  - as in the beginning
  lexicon: HALOT
  rationale: This points back to the earlier period of Israel's history. 'As at the
    first' is concise and close to the Hebrew, though slightly elevated in tone.
