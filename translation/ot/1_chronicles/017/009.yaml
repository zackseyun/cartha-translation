theological_decisions:
- issue: Collective singular/plural reference in the promises to Israel
  chosen_reading: Render the collective references with plural English pronouns ('them,'
    'they') for clarity while preserving Israel as a corporate people.
  alternative_readings:
  - Render strictly singular throughout ('plant it,' 'it will dwell')
  rationale: The Hebrew shifts through collective singular forms, but idiomatic English
    communicates the referent more clearly with plural pronouns when the people are
    in view. This does not alter theology; it clarifies the corporate promise to Israel.
  doctrine_reference: Translation philosophy §1, §6
- issue: Idiomatic force of תַּחְתָּיו
  chosen_reading: Translate idiomatically as settled possession/security ('in their
    own place').
  alternative_readings:
  - Translate more literally as 'under it/him'
  rationale: A literal rendering would be obscure in English and could mislead readers.
    The context is God's granting Israel a secure place to dwell.
  doctrine_reference: Translation philosophy §1, §6
