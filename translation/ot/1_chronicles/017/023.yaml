theological_decisions:
- issue: Meaning of 'his house' in Davidic covenant context
  chosen_reading: Retain 'his house' in the main text, allowing the covenantal sense
    of David's household/dynasty to stand without narrowing it.
  alternative_readings:
  - his dynasty
  - his family line
  rationale: In 1 Chronicles 17 the promise concerns more than David's physical residence;
    it includes his royal line. However, 'house' is the covenantally loaded Hebrew
    term and should be preserved in the main text rather than interpreted away. The
    broader dynastic sense can be noted in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §5
