id: 1CH.17.23
reference: 1 Chronicles 17:23
source:
  edition: WLC
  text: וְ/עַתָּ֣ה יְהוָ֔ה הַ/דָּבָ֗ר אֲשֶׁ֨ר דִּבַּ֤רְתָּ עַֽל עַבְדְּ/ךָ֙ וְ/עַל
    בֵּית֔/וֹ יֵאָמֵ֖ן עַד עוֹלָ֑ם וַ/עֲשֵׂ֖ה כַּ/אֲשֶׁ֥ר דִּבַּֽרְתָּ־־־׃
translation:
  text: And now, LORD, let the word that you have spoken concerning your servant and
    concerning his house be established forever, and do as you have spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his dynasty' or 'his family line.' The Hebrew 'house' can refer to a
      household, lineage, or royal dynasty in this covenant context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - the LORD
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered with the covenant name in small-caps style as 'LORD' per the
    doctrine's default for YHWH, following established English Bible convention and
    reflecting Jewish reverence tradition.
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: The conjunction plus temporal adverb naturally introduces David's petition
    as a transition from prior praise to present request; 'And now' preserves the
    discourse flow.
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the promise
  - the matter
  lexicon: HALOT
  rationale: Although in context it refers to a divine promise, 'word' more directly
    reflects the Hebrew and preserves the connection to what God has spoken, while
    remaining natural English.
- source_word: אֲשֶׁר דִּבַּרְתָּ
  chosen: that you have spoken
  alternatives:
  - which you spoke
  - that you said
  lexicon: HALOT
  rationale: The perfect verb refers to God's prior speech; English present perfect
    fits the continuing relevance of that spoken word in the prayer.
- source_word: עַל עַבְדְּךָ וְעַל בֵּיתוֹ
  chosen: concerning your servant and concerning his house
  alternatives:
  - about your servant and his house
  - over your servant and over his house
  lexicon: HALOT
  rationale: The preposition עַל here is best rendered 'concerning/about' in relation
    to the content of God's promise. Repeating 'concerning' mirrors the Hebrew structure
    and keeps the formal cadence of the prayer. 'His house' refers to David's dynasty/household,
    but 'house' is retained in the main text to preserve the covenantal wording.
- source_word: יֵאָמֵן
  chosen: be established
  alternatives:
  - be confirmed
  - prove faithful
  - stand firm
  lexicon: HALOT
  rationale: Niphal of אמן here expresses being made firm or confirmed. 'Be established'
    is idiomatic in covenant/promise contexts and suits the prayer that God's spoken
    word endure.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - unto eternity
  - for all time
  lexicon: HALOT
  rationale: A standard idiomatic rendering of the Hebrew phrase indicating enduring
    perpetuity; concise and natural in modern English.
- source_word: וַעֲשֵׂה כַּאֲשֶׁר דִּבַּרְתָּ
  chosen: and do as you have spoken
  alternatives:
  - and do as you said
  - and act according to what you have spoken
  lexicon: HALOT
  rationale: This is a direct petition for God to act in accordance with his promise.
    'Do as you have spoken' preserves the parallel with the earlier 'spoken' and keeps
    the solemn tone.
