id: 1CH.17.11
reference: 1 Chronicles 17:11
source:
  edition: WLC
  text: וְ/הָיָ֗ה כִּֽי מָלְא֤וּ יָמֶ֨י/ךָ֙ לָ/לֶ֣כֶת עִם אֲבֹתֶ֔י/ךָ וַ/הֲקִֽימוֹתִ֤י
    אֶֽת זַרְעֲ/ךָ֙ אַחֲרֶ֔י/ךָ אֲשֶׁ֥ר יִהְיֶ֖ה מִ/בָּנֶ֑י/ךָ וַ/הֲכִינוֹתִ֖י אֶת
    מַלְכוּתֽ/וֹ־־־־׃
translation:
  text: And it shall be, when your days are fulfilled to go to be with your fathers,
    that I will raise up your offspring after you, one of your sons, and I will establish
    his kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to go with your fathers,' a Hebrew idiom for dying and joining
      one's ancestors.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be
  alternatives:
  - And it will happen
  - And it will be
  lexicon: HALOT
  rationale: Formulaic future-transition expression introducing what follows. 'And
    it shall be' preserves the elevated narrative register without becoming archaic
    beyond readability.
- source_word: כִּי
  chosen: when
  alternatives:
  - that
  - for
  lexicon: HALOT
  rationale: 'In this construction with a following perfect, כִּי introduces a temporal
    clause: ''when your days are fulfilled.'''
- source_word: מָלְאוּ יָמֶיךָ
  chosen: your days are fulfilled
  alternatives:
  - your days are complete
  - your days are full
  lexicon: HALOT
  rationale: Idiomatic expression for the completion of one's lifespan. 'Are fulfilled'
    preserves the Hebrew idiom and solemn tone better than the flatter 'are complete.'
- source_word: לָלֶכֶת עִם אֲבֹתֶיךָ
  chosen: to go to be with your fathers
  alternatives:
  - to go with your fathers
  - to lie down with your fathers
  lexicon: HALOT
  rationale: Chronicles uses 'go with your fathers' rather than the more common 'lie
    down with your fathers.' The translation keeps the distinct wording while making
    the sense natural in English. 'Be with' clarifies the idiom refers to death/ancestral
    joining, not physical travel.
- source_word: וַהֲקִימוֹתִי
  chosen: I will raise up
  alternatives:
  - I will establish
  - I will set up
  lexicon: HALOT
  rationale: Here קום in the Hiphil refers to causing a successor to arise. 'Raise
    up' is the standard and contextually precise rendering; 'establish' is reserved
    for the later verb הכין in this verse.
- source_word: זַרְעֲךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendant
  lexicon: HALOT
  rationale: '''Offspring'' is natural modern English and preserves the collective-singular
    sense of זרע. ''Seed'' is too opaque in contemporary English here; ''descendant''
    is possible but less idiomatic in dynastic promise language.'
- source_word: אַחֲרֶיךָ
  chosen: after you
  alternatives:
  - afterward
  - after you are gone
  lexicon: HALOT
  rationale: Straightforward temporal/dynastic succession language; 'after you' is
    both literal and clear.
- source_word: אֲשֶׁר יִהְיֶה מִבָּנֶיךָ
  chosen: one of your sons
  alternatives:
  - who will be from your sons
  - who will come from your sons
  lexicon: HALOT
  rationale: The phrase specifies that the promised offspring will come from David's
    own sons. 'One of your sons' is concise, idiomatic, and faithful to the partitive
    sense of מן.
- source_word: וַהֲכִינוֹתִי
  chosen: I will establish
  alternatives:
  - I will make firm
  - I will confirm
  lexicon: HALOT
  rationale: הכין in this covenantal/dynastic context conveys making secure or established.
    'Establish' is standard and pairs well with 'his kingdom.'
- source_word: מַלְכוּתוֹ
  chosen: his kingdom
  alternatives:
  - his kingship
  - his royal rule
  lexicon: HALOT
  rationale: '''Kingdom'' best fits the dynastic and political scope here. ''Kingship''
    would emphasize office more narrowly than the Hebrew likely intends.'
