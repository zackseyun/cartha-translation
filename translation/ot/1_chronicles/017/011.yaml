theological_decisions:
- issue: Dynastic promise language and possible messianic resonance
  chosen_reading: Render the immediate historical sense of a Davidic successor without
    importing an explicit messianic title into the verse.
  alternative_readings:
  - A more explicitly messianic rendering in the main text
  rationale: The verse speaks first of David's offspring from among his sons and of
    the establishment of his kingdom. While the broader Davidic covenant has messianic
    significance in Christian theology, the translation should preserve the verse's
    direct historical wording and allow canonical/theological development to arise
    from context rather than be inserted here.
  doctrine_reference: Translation philosophy §§1, 3
