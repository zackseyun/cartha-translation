theological_decisions:
- issue: Divine name/title rendering for הָאֱלֹהִים
  chosen_reading: God
  alternative_readings:
  - the God
  rationale: The source uses אֱלֹהִים, not YHWH. Therefore the verse should read 'God,'
    not 'the LORD.' Rendering with the article in English would be wooden and less
    idiomatic here.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    contested terms table distinguishes YHWH → ''the LORD'' from אֱלֹהִים.'
