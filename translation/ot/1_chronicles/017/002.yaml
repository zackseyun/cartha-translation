id: 1CH.17.2
reference: 1 Chronicles 17:2
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר נָתָן֙ אֶל דָּוִ֔יד כֹּ֛ל אֲשֶׁ֥ר בִּֽ/לְבָבְ/ךָ֖ עֲשֵׂ֑ה כִּ֥י
    הָ/אֱלֹהִ֖ים עִמָּֽ/ךְ־׃ס
translation:
  text: And Nathan said to David, “Do all that is in your heart, for God is with you.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural,
    sufficiently formal rendering in English narrative style.
- source_word: נָתָן
  chosen: Nathan
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard preposition of direction; 'to' is idiomatic modern English.
- source_word: דָּוִיד
  chosen: David
  rationale: Personal name transliterated by standard English convention.
- source_word: כֹּל אֲשֶׁר
  chosen: all that
  alternatives:
  - everything that
  - whatever
  lexicon: HALOT
  rationale: The combination means the totality of what follows. 'All that' preserves
    the breadth while remaining natural.
- source_word: בִּלְבָבְךָ
  chosen: is in your heart
  alternatives:
  - is in your mind
  - is in your inner being
  lexicon: HALOT
  rationale: לֵב/לֵבָב commonly denotes the inner will, intention, or thought. 'Heart'
    preserves the Hebrew anthropological term and remains understandable in English;
    adding 'is in' makes the clause idiomatic.
- source_word: עֲשֵׂה
  chosen: Do
  alternatives:
  - Carry out
  - Act
  lexicon: HALOT
  rationale: Imperative of עשה is broad and commonly rendered 'do' or 'make.' Here
    'Do' best matches the object 'all that is in your heart' and keeps the directness
    of Nathan's counsel.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the imperative. 'For' is concise and fits the
    elevated but readable register.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: Although marked with the article in Hebrew, אֱלֹהִים with the article
    often functions as a definite reference to God and is idiomatically rendered simply
    'God' in English rather than 'the God'.
- source_word: עִמָּךְ
  chosen: is with you
  alternatives:
  - is alongside you
  lexicon: HALOT
  rationale: Standard rendering of עִם with pronominal suffix. The phrase expresses
    divine presence/support. 'Is with you' is the natural English equivalent.
