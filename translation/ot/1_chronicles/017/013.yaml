theological_decisions:
- issue: Father-son language in the Davidic covenant
  chosen_reading: Retain the relational language 'a father' / 'a son' without softening
    or paraphrasing.
  alternative_readings:
  - I will care for him as a father, and he will belong to me as a son
  rationale: The verse establishes covenantal royal sonship and is later significant
    in biblical theology. The translation should preserve the direct filial language
    rather than interpret it into a looser metaphor.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 4
- issue: Rendering חֶסֶד in a covenant context
  chosen_reading: Translate as 'steadfast love.'
  alternative_readings:
  - lovingkindness
  - covenant loyalty
  - mercy
  rationale: The term carries covenantal and affective weight. 'Steadfast love' best
    preserves the theological tension of loyal covenant love without narrowing it
    to emotion or legal obligation alone.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5
