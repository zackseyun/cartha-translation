id: 1CH.17.13
reference: 1 Chronicles 17:13
source:
  edition: WLC
  text: אֲנִי֙ אֶֽהְיֶה לּ֣/וֹ לְ/אָ֔ב וְ/ה֖וּא יִֽהְיֶה לִּ֣/י לְ/בֵ֑ן וְ/חַסְדִּ/י֙
    לֹא אָסִ֣יר מֵֽ/עִמּ֔/וֹ כַּ/אֲשֶׁ֣ר הֲסִיר֔וֹתִי מֵ/אֲשֶׁ֥ר הָיָ֖ה לְ/פָנֶֽי/ךָ־־־׃
translation:
  text: I will be a father to him, and he will be a son to me. And I will not remove
    my steadfast love from him, as I removed it from the one who was before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will be his father, and he will be my son.'
    reason: lexical_alternative
  - marker: b
    text: '''The one who was before you'' refers to Saul, David''s predecessor as
      king.'
    reason: cross_reference
lexical_decisions:
- source_word: אֶהְיֶה לּוֹ לְאָב
  chosen: I will be a father to him
  alternatives:
  - I will be his father
  lexicon: HALOT
  rationale: The Hebrew uses the existential verb with a predicate noun and preposition,
    literally 'I will be to him for a father.' 'I will be a father to him' preserves
    the relational force and formal structure while remaining natural English.
- source_word: וְהוּא יִהְיֶה לִּי לְבֵן
  chosen: and he will be a son to me
  alternatives:
  - and he will be my son
  lexicon: HALOT
  rationale: This mirrors the first clause and preserves the covenantal/adoptive relationship
    language. 'A son to me' is slightly more formal and reflects the Hebrew construction
    without obscuring meaning.
- source_word: חַסְדִּי
  chosen: my steadfast love
  alternatives:
  - my lovingkindness
  - my covenant loyalty
  - my mercy
  lexicon: HALOT
  rationale: חֶסֶד here denotes enduring covenantal favor and loyal love. 'Steadfast
    love' is a well-established English rendering that preserves both affection and
    covenant constancy better than the narrower 'mercy' or the archaic 'lovingkindness.'
- source_word: לֹא אָסִיר מֵעִמּוֹ
  chosen: I will not remove ... from him
  alternatives:
  - I will not take ... away from him
  - I will not withdraw ... from him
  lexicon: HALOT
  rationale: The Hiphil of סור means to remove or take away. 'Remove ... from him'
    is direct and fits the parallel with 'as I removed it.' 'Withdraw' is possible
    but slightly more interpretive.
- source_word: כַּאֲשֶׁר הֲסִירוֹתִי
  chosen: as I removed it
  alternatives:
  - as I took it away
  - as I withdrew it
  lexicon: HALOT
  rationale: The comparison explicitly echoes the previous verb. Supplying 'it' in
    English is necessary because the object ('my steadfast love') is understood from
    the prior clause.
- source_word: מֵאֲשֶׁר הָיָה לְפָנֶיךָ
  chosen: from the one who was before you
  alternatives:
  - from him who was before you
  - from the one who preceded you
  lexicon: HALOT
  rationale: The Hebrew avoids naming Saul directly and refers to him as 'the one
    who was before you.' This should be preserved rather than replaced with an explicit
    name in the main text. 'Before you' here means prior in kingship, not spatial
    position.
