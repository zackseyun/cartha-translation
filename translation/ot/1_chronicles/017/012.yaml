theological_decisions:
- issue: Whether to render בָּיִת as 'house' or interpretively as 'temple'
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: The Hebrew text says 'house,' and preserving that wording maintains the
    literary and theological linkage within the Davidic covenant while allowing readers
    to infer the temple reference from context. This follows original-language primacy
    and avoids importing more specificity than the text states.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of עַד עוֹלָם in the Davidic promise
  chosen_reading: forever
  alternative_readings:
  - for eternity
  - perpetually
  rationale: The phrase is rendered straightforwardly as 'forever' without attempting
    to resolve broader theological debates about the Davidic covenant's ultimate fulfillment.
    This preserves the text's own claim without adding interpretive qualifiers.
  doctrine_reference: Translation philosophy §3
