id: 1CH.17.12
reference: 1 Chronicles 17:12
source:
  edition: WLC
  text: ה֥וּא יִבְנֶה לִּ֖/י בָּ֑יִת וְ/כֹנַנְתִּ֥י אֶת כִּסְא֖/וֹ עַד עוֹלָֽם־־־׃
translation:
  text: He will build a house for me, and I will establish his throne forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'temple' for 'house'; the Hebrew word is literally 'house' and in context
      refers to the sanctuary Solomon would build.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּא
  chosen: He
  lexicon: HALOT
  rationale: Third masculine singular independent pronoun, used for emphasis or explicit
    subject. English requires the subject pronoun 'He'.
- source_word: יִבְנֶה
  chosen: will build
  alternatives:
  - shall build
  lexicon: HALOT
  rationale: Qal imperfect 3ms of בנה denotes future action here in the promise context.
    'Will build' is natural modern English and preserves the predictive force.
- source_word: לִּי
  chosen: for me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: 'The preposition ל with first person singular suffix here expresses benefit
    or relation: the house is built for the speaker, not merely toward him. ''For
    me'' best fits the idiom.'
- source_word: בָּיִת
  chosen: a house
  alternatives:
  - house
  - temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In this Davidic covenant context it refers
    to a house for God, i.e., the temple, but the Hebrew uses the broader term. Main
    text keeps 'house' to preserve the lexical link and avoid over-specifying; 'temple'
    is a contextual alternative.
- source_word: וְכֹנַנְתִּי
  chosen: and I will establish
  alternatives:
  - and I will make firm
  - and I will set up
  lexicon: HALOT
  rationale: 'First person singular verb from כון in a causative/resultative sense:
    to establish, make secure, set firmly. ''Establish'' is idiomatic in covenantal
    and royal contexts and fits the throne promise.'
- source_word: אֶת כִּסְאוֹ
  chosen: his throne
  alternatives:
  - the throne of him
  lexicon: HALOT
  rationale: Direct-object marker plus noun with 3ms suffix. 'His throne' is the natural
    English rendering.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - unto the age
  lexicon: HALOT
  rationale: This idiom denotes enduring perpetuity. 'Forever' is the clearest natural
    English equivalent in this covenant promise.
