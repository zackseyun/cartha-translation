id: 1CH.17.5
reference: 1 Chronicles 17:5
source:
  edition: WLC
  text: כִּ֣י לֹ֤א יָשַׁ֨בְתִּי֙ בְּ/בַ֔יִת מִן הַ/יּ֗וֹם אֲשֶׁ֤ר הֶעֱלֵ֨יתִי֙ אֶת
    יִשְׂרָאֵ֔ל עַ֖ד הַ/יּ֣וֹם הַ/זֶּ֑ה וָֽ/אֶהְיֶ֛ה מֵ/אֹ֥הֶל אֶל אֹ֖הֶל וּ/מִ/מִּשְׁכָּֽן־־־׃
translation:
  text: For I have not lived in a house from the day that I brought up Israel to this
    day, but I have gone from tent to tent, and from one dwelling place to another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''I have been from tent to tent, and from tabernacle to tabernacle.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשַׁבְתִּי
  chosen: have not lived
  alternatives:
  - have not dwelt
  - have not sat
  lexicon: HALOT
  rationale: ישב commonly means to dwell/live when used with a location. 'Lived' is
    natural modern English; 'dwelt' is more formal but possible. 'Sat' would be too
    literal and wrong in this context.
- source_word: בְּבַיִת
  chosen: in a house
  alternatives:
  - in the house
  - in a temple
  lexicon: HALOT
  rationale: בית here is anarthrous and refers generally to a house/building, contrasting
    with tent/tabernacle language. 'Temple' would over-specify beyond the Hebrew.
- source_word: הֶעֱלֵיתִי אֶת יִשְׂרָאֵל
  chosen: I brought up Israel
  alternatives:
  - I led Israel up
  - I brought Israel up
  lexicon: HALOT
  rationale: עלה in the Hiphil often means 'bring up/lead up.' In context it refers
    to the exodus/upbringing of Israel from Egypt. 'Brought up Israel' preserves the
    idiom and divine agency.
- source_word: וָאֶהְיֶה
  chosen: I have gone
  alternatives:
  - I was
  - I have been
  lexicon: HALOT
  rationale: Formally the verb is 'and I was/have been,' but in this context with
    the following movement phrases ('from tent to tent') English idiom is better served
    by expressing the implied mobility. This is a modest dynamic adjustment within
    optimal equivalence.
- source_word: מֵאֹהֶל אֶל אֹהֶל
  chosen: from tent to tent
  alternatives:
  - from one tent to another
  - from tent unto tent
  lexicon: HALOT
  rationale: This phrase expresses movement among temporary tented locations. 'From
    tent to tent' is concise and idiomatic while preserving the repetition.
- source_word: וּמִמִּשְׁכָּן
  chosen: and from one dwelling place to another
  alternatives:
  - and from tabernacle to tabernacle
  - and in a tabernacle
  lexicon: HALOT
  rationale: משכן can mean dwelling place/tabernacle. Here, after 'from tent to tent,'
    the sense is another expression of movable sanctuary-dwelling. Since the Hebrew
    lacks a second explicit destination term, English smooths the parallel as 'from
    one dwelling place to another.' 'Tabernacle' is possible but may sound like a
    fixed technical title here more than the Hebrew requires.
