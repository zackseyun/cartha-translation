theological_decisions:
- issue: Rendering of sanctuary terminology without importing later temple theology
  chosen_reading: Use 'house' and 'dwelling place' rather than 'temple' in the main
    text.
  alternative_readings:
  - Use 'temple' for בית
  - Use 'tabernacle' as a technical term for משכן
  rationale: The verse contrasts God's non-residence in a permanent house with his
    presence in movable tented sanctuaries. Rendering בית as 'temple' would import
    a later concept not explicit in the Hebrew. משכן can be rendered 'tabernacle,'
    but 'dwelling place' better preserves the lexical sense while remaining readable;
    the technical alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
