theological_decisions:
- issue: Meaning of 'house' in the Davidic promise
  chosen_reading: Retain 'house' in the main text and allow the dynastic sense to
    remain implicit
  alternative_readings:
  - Render explicitly as 'dynasty'
  rationale: The Hebrew intentionally preserves a layered meaning in the Davidic covenant
    context. Keeping 'house' avoids over-resolving the image while still allowing
    readers to perceive the covenantal promise of an enduring line.
  doctrine_reference: Translation philosophy §3, §5
