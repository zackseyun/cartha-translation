id: 1CH.17.25
reference: 1 Chronicles 17:25
source:
  edition: WLC
  text: כִּ֣י אַתָּ֣ה אֱלֹהַ֗/י גָּלִ֨יתָ֙ אֶת אֹ֣זֶן עַבְדְּ/ךָ֔ לִ/בְנ֥וֹת ל֖/וֹ
    בָּ֑יִת עַל כֵּן֙ מָצָ֣א עַבְדְּ/ךָ֔ לְ/הִתְפַּלֵּ֖ל לְ/פָנֶֽי/ךָ׀־־׃
translation:
  text: For you, my God, have revealed to your servant that you will build him a house;
    therefore your servant has found courage to pray before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'have uncovered the ear of your servant,' an idiom meaning
      'have revealed to your servant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'establish a dynasty for him'; 'house' here likely carries the sense
      of an enduring royal line as well as a household.
    reason: alternative_reading
lexical_decisions:
- source_word: גָּלִיתָ אֶת אֹזֶן עַבְדְּךָ
  chosen: have revealed to your servant
  alternatives:
  - have uncovered your servant's ear
  - have disclosed to your servant
  lexicon: HALOT
  rationale: Literally 'have uncovered the ear of your servant,' a Hebrew idiom for
    revealing or disclosing something. Rendering the idiom directly in English would
    be obscure, so the sense is translated in clear modern English while preserving
    the revelatory force.
- source_word: לִבְנוֹת לוֹ בָּיִת
  chosen: that you will build him a house
  alternatives:
  - to build a house for him
  - to establish a house for him
  lexicon: HALOT
  rationale: The infinitive construction after the idiom of revelation conveys the
    content revealed. 'Build him a house' preserves the wording and the dynastic ambiguity
    of 'house,' which in this Davidic context can mean more than a physical structure.
    'Establish' is interpretive and therefore left as an alternative.
- source_word: בָּיִת
  chosen: house
  alternatives:
  - dynasty
  lexicon: HALOT
  rationale: '''House'' is retained in the main text because it matches the Hebrew
    and preserves the intentional double sense in the Davidic covenant context: a
    literal house and, more importantly, a royal line. The more interpretive ''dynasty''
    is preserved as an alternative rather than replacing the source image.'
- source_word: מָצָא ... לְהִתְפַּלֵּל
  chosen: has found courage to pray
  alternatives:
  - has found it in his heart to pray
  - has found occasion to pray
  lexicon: HALOT
  rationale: The Hebrew idiom 'found' with an infinitive here expresses gaining boldness
    or resolve to act. 'Has found courage to pray' communicates the idiomatic sense
    naturally in English. A more literal rendering such as 'found to pray' would be
    unclear.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  lexicon: HALOT
  rationale: '''Before you'' is a standard and natural rendering of the prepositional
    phrase, preserving the relational and devotional setting of prayer.'
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although the term can denote a slave, in royal-prayer discourse it commonly
    functions as a deferential self-designation before God. 'Servant' best fits the
    register here without denying the underlying submission.
