id: 1CH.17.4
reference: 1 Chronicles 17:4
source:
  edition: WLC
  text: לֵ֤ךְ וְ/אָמַרְתָּ֙ אֶל דָּוִ֣יד עַבְדִּ֔/י כֹּ֖ה אָמַ֣ר יְהוָ֑ה לֹ֥א אַתָּ֛ה
    תִּבְנֶה לִּ֥/י הַ/בַּ֖יִת לָ/שָֽׁבֶת־־׃
translation:
  text: 'Go and say to David my servant, ‘Thus says the LORD: You are not the one
    to build for me the house to dwell in.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “You shall not build for me the house to dwell in,” or more literally,
      “Not you shall build for me the house to dwell in.”
    reason: lexical_alternative
  - marker: b
    text: That is, the house intended as the LORD’s dwelling place; i.e., the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Go on
  - Depart
  lexicon: HALOT
  rationale: Imperative of הלך introducing a divine commission; simple 'Go' is the
    natural and direct English equivalent.
- source_word: וְאָמַרְתָּ
  chosen: and say
  alternatives:
  - and speak
  - and tell
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in command sequence functions imperativally
    after לֵךְ; 'and say' preserves the straightforward speech-introduction.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition before the indirect object 'David.'
- source_word: דָּוִיד
  chosen: David
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in royal-covenantal address to
    David the emphasis is on David's status as YHWH's commissioned servant rather
    than bonded condition; 'my servant' is the most idiomatic and contextually fitting
    rendering.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - Thus said the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal
    force, and יְהוָה is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required default rendering in DOCTRINE.md for the divine name.
- source_word: לֹא אַתָּה
  chosen: You are not the one
  alternatives:
  - Not you
  - You shall not
  lexicon: HALOT
  rationale: The pronoun adds emphasis. Rendering it as 'You are not the one' captures
    the focus on David as the unsuitable/unauthorized builder better than a bare prohibition,
    and avoids overstating the form as a simple future ban.
- source_word: תִּבְנֶה
  chosen: to build
  alternatives:
  - will build
  - shall build
  lexicon: HALOT
  rationale: Imperfect of בנה. In context with the emphatic pronoun and negation,
    the sense is not merely predictive but identifies who is or is not appointed to
    build; infinitival English after 'the one' is idiomatic and accurate.
- source_word: לִּי
  chosen: for me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: Dative of advantage/purpose in temple-building context; 'for me' is the
    natural English expression.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - a house
  - the temple
  lexicon: HALOT
  rationale: בית here refers to the temple structure, but 'the house' preserves the
    Hebrew wording and its theological resonance; 'temple' is interpretive and therefore
    left as an alternative rather than main text.
- source_word: לָשָׁבֶת
  chosen: to dwell in
  alternatives:
  - for dwelling
  - to live in
  - for me to dwell in
  lexicon: HALOT
  rationale: Infinitive construct of ישב expressing purpose/result with the house.
    'To dwell in' is clear modern English and preserves the idea of divine dwelling
    associated with the temple.
