theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to make הַבַּיִת explicit as 'temple'
  chosen_reading: the house
  alternative_readings:
  - the temple
  rationale: The Hebrew says 'the house,' which in context refers to the temple David
    proposed to build. Retaining 'house' preserves the source wording and avoids importing
    a more specific term than the text itself uses.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #5'
