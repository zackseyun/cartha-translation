id: 1CH.17.14
reference: 1 Chronicles 17:14
source:
  edition: WLC
  text: וְ/הַֽעֲמַדְתִּ֛י/הוּ בְּ/בֵיתִ֥/י וּ/בְ/מַלְכוּתִ֖/י עַד הָ/עוֹלָ֑ם וְ/כִסְא֕/וֹ
    יִהְיֶ֥ה נָכ֖וֹן עַד עוֹלָֽם־־׃
translation:
  text: But I will establish him in my house and in my kingdom forever, and his throne
    will be established forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And I will set him in my house and over my kingdom forever.' The Hebrew
      preposition can be rendered more woodenly, but the main text preserves the parallel
      phrasing and broader sense.
    reason: lexical_alternative
  - marker: b
    text: The 'him' may refer immediately to David's royal descendant, especially
      Solomon, while also contributing to the broader Davidic promise later understood
      messianically.
    reason: alternative_reading
  - marker: c
    text: '''My house'' may denote God''s house in a broad covenantal sense; some
      understand it more specifically as the temple or as God''s royal household.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהַעֲמַדְתִּיהוּ
  chosen: But I will establish him
  alternatives:
  - And I will set him
  - And I will cause him to stand
  lexicon: HALOT
  rationale: The Hiphil of עמד here conveys causing someone to stand firmly or be
    established in position. 'Establish' best captures the idiomatic sense in royal/covenantal
    context. The prefixed conjunction is rendered 'But' rather than 'And' because
    the verse contrasts with the preceding warning and marks a positive divine commitment.
- source_word: בְּבֵיתִי
  chosen: in my house
  alternatives:
  - over my house
  lexicon: HALOT
  rationale: בית commonly means 'house,' and in this dynastic context can denote household/temple/domain.
    'In my house' follows the preposition ב and preserves the metaphorical breadth
    without over-specifying. 'Over my house' is interpretive and less directly supported
    by the preposition.
- source_word: וּבְמַלְכוּתִי
  chosen: and in my kingdom
  alternatives:
  - and over my kingdom
  lexicon: HALOT
  rationale: The phrase is parallel to 'in my house.' Rendering the preposition straightforwardly
    as 'in' preserves the Hebrew wording and leaves the exact nuance of placement/authority
    open. 'Kingdom' is the natural gloss for מלכות.
- source_word: עַד הָעוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - unto the age
  lexicon: HALOT
  rationale: This idiom regularly denotes enduring perpetuity. 'Forever' is natural
    modern English and adequately reflects the covenantal permanence expressed by
    עד + עולם.
- source_word: וְכִסְאוֹ
  chosen: and his throne
  lexicon: HALOT
  rationale: כסא is literally 'throne,' a key royal term that should be retained rather
    than paraphrased as 'rule' or 'dynasty' here.
- source_word: יִהְיֶה נָכוֹן
  chosen: will be established
  alternatives:
  - will be secure
  - will be firm
  lexicon: HALOT
  rationale: נכון in predicate position conveys firmness, stability, or being firmly
    established. 'Will be established' matches the royal-dynastic context and echoes
    the earlier verb appropriately, while 'secure' is possible but slightly more interpretive.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - perpetually
  lexicon: HALOT
  rationale: As in the earlier phrase, the idiom expresses enduring permanence. Using
    'forever' maintains clarity and consistency.
