theological_decisions:
- issue: Referent of the pronoun 'him' in the Davidic covenant context
  chosen_reading: Retain the pronoun 'him' without specifying Solomon or the Messiah
    in the main text.
  alternative_readings:
  - Solomon specifically
  - the Davidic royal line collectively
  - the Messiah ultimately
  rationale: The Hebrew text itself uses a third masculine singular pronoun and does
    not explicitly identify the referent within this verse. Given the broader context,
    the promise has immediate dynastic relevance and later messianic significance,
    but the translation should preserve that theological tension rather than resolve
    it in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Scope of 'my house'
  chosen_reading: Translate literally as 'my house' without narrowing it to temple
    or dynasty in the main text.
  alternative_readings:
  - my temple
  - my household/dynasty
  rationale: In context, 'house' may evoke God's temple, household, or covenantal
    domain. A literal rendering preserves the layered meaning and avoids importing
    a single interpretive conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
