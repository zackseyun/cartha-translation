theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrine specifies 'the LORD' as the default rendering
    for יְהוָה, following Jewish reverence tradition and the Septuagintal pattern.
    The second occurrence in direct address is rendered 'O LORD' for vocative English
    style while preserving the same underlying choice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
