theological_decisions:
- issue: Meaning of 'house' in the closing clause
  chosen_reading: Retain 'house' in the main text, implying dynastic promise by context
    rather than replacing it with 'dynasty.'
  alternative_readings:
  - the LORD will establish a dynasty for you
  rationale: The Hebrew intentionally uses בַּיִת as a double entendre in the broader
    Davidic covenant context, referring both to a physical house/temple and to a royal
    house/dynasty. Preserving 'house' maintains the literary and theological tension
    rather than resolving it in translation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
