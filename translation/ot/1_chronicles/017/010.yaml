id: 1CH.17.10
reference: 1 Chronicles 17:10
source:
  edition: WLC
  text: וּ/לְ/מִ/יָּמִ֗ים אֲשֶׁ֨ר צִוִּ֤יתִי שֹֽׁפְטִים֙ עַל עַמִּ֣/י יִשְׂרָאֵ֔ל
    וְ/הִכְנַ֖עְתִּי אֶת כָּל אוֹיְבֶ֑י/ךָ וָ/אַגִּ֣ד לָ֔/ךְ וּ/בַ֖יִת יִֽבְנֶה לְּ/ךָ֥
    יְהוָֽה־־־־׃
translation:
  text: from the days when I appointed judges over my people Israel. And I will subdue
    all your enemies. Moreover, I tell you that the LORD will build you a house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the LORD will build a house for you,' that is, establish a dynasty
      for you.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְמִיָּמִים
  chosen: from the days
  alternatives:
  - since the days
  - even from the days
  lexicon: HALOT
  rationale: The compound prepositional phrase literally combines conjunction + preposition
    + מן + 'days.' In context it resumes the prior promise of rest and is best rendered
    idiomatically as a temporal phrase, 'from the days,' rather than a wooden reproduction.
- source_word: אֲשֶׁר צִוִּיתִי שֹׁפְטִים
  chosen: when I appointed judges
  alternatives:
  - that I commanded judges
  - when I ordained judges
  lexicon: HALOT
  rationale: Although צוה commonly means 'command,' with שֹׁפְטִים in this construction
    and in this historical context it refers to God's instituting/commissioning judges
    over Israel. 'Appointed' communicates the sense more naturally in English.
- source_word: עַל עַמִּי יִשְׂרָאֵל
  chosen: over my people Israel
  alternatives:
  - for my people Israel
  lexicon: HALOT
  rationale: עַל with governing authority is naturally 'over.' The possessive 'my
    people Israel' should be preserved because it is covenantally significant.
- source_word: וְהִכְנַעְתִּי
  chosen: I will subdue
  alternatives:
  - I have subdued
  - I will humble
  lexicon: HALOT
  rationale: The form is a waw-prefixed perfect in prophetic discourse, functioning
    here with future force in the promise sequence. 'Subdue' fits the object 'all
    your enemies' better than the more literal 'humble.'
- source_word: אֶת כָּל אֹיְבֶיךָ
  chosen: all your enemies
  alternatives:
  - every one of your enemies
  lexicon: HALOT
  rationale: Standard rendering preserving the totality expressed by כָּל.
- source_word: וָאַגִּד לָךְ
  chosen: Moreover, I tell you
  alternatives:
  - And I declare to you
  - And I have told you
  lexicon: HALOT
  rationale: The verb נגד in the waw-prefixed form introduces a solemn divine declaration.
    'Moreover' captures the discourse progression, and present 'I tell you' works
    well in English for the performative announcement.
- source_word: וּבַיִת יִבְנֶה לְּךָ יְהוָה
  chosen: the LORD will build you a house
  alternatives:
  - the LORD will build a house for you
  lexicon: HALOT
  rationale: 'This is the key wordplay of the passage: David will not build a house
    (temple) for God; God will build a house (dynasty) for David. English should preserve
    ''house'' rather than interpret it away in the main text. ''Build you a house''
    is idiomatic and keeps the wordplay compact.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD.'
