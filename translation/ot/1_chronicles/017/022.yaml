id: 1CH.17.22
reference: 1 Chronicles 17:22
source:
  edition: WLC
  text: וַ֠/תִּתֵּן אֶת עַמְּ/ךָ֨ יִשְׂרָאֵ֧ל לְ/ךָ֛ לְ/עָ֖ם עַד עוֹלָ֑ם וְ/אַתָּ֣ה
    יְהוָ֔ה הָיִ֥יתָ לָ/הֶ֖ם לֵ/אלֹהִֽים־׀־׃
translation:
  text: And you made your people Israel to be your people forever, and you, O LORD,
    became their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were their God.' The Hebrew can be rendered more statively, but the
      main text reflects the covenant-establishing force in context.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּתֵּן
  chosen: you made
  alternatives:
  - you gave
  - you appointed
  lexicon: HALOT
  rationale: 'From נתן, literally ''gave,'' but in this construction with double ל-prepositions
    (''to/for ... as'') the sense is causative/constitutive: God established Israel
    as his people. ''Made'' is natural English and preserves the force better than
    a wooden ''gave.'''
- source_word: עַמְּךָ יִשְׂרָאֵל
  chosen: your people Israel
  alternatives:
  - Israel your people
  lexicon: HALOT
  rationale: 'Keeps the appositional structure: ''your people, Israel.'' The chosen
    order is smoother in English while preserving both possession and national identity.'
- source_word: לְךָ לְעָם
  chosen: to be your people
  alternatives:
  - for yourself as a people
  - as your people
  lexicon: HALOT
  rationale: 'The paired ל-prepositions express result/status: Israel was constituted
    as belonging to God in covenant identity. ''To be your people'' is idiomatic and
    faithful.'
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - for the age
  lexicon: HALOT
  rationale: Conveys enduring perpetuity in clear modern English. 'Forever' is the
    most natural rendering here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the LXX/English Bible pattern.
- source_word: הָיִיתָ לָהֶם לֵאלֹהִים
  chosen: became their God
  alternatives:
  - were their God
  - have been their God
  lexicon: HALOT
  rationale: The perfect of היה here marks the established covenant relationship resulting
    from God's action. 'Became their God' best reflects the verbal aspect and the
    covenant-formula sense in context, rather than the flatter stative 'were their
    God.'
