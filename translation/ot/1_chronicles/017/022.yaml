theological_decisions:
- issue: Rendering the covenant formula with היה + ל + אלהים
  chosen_reading: became their God
  alternative_readings:
  - were their God
  rationale: The verse recounts God's constituting Israel as his people and correspondingly
    entering/establishing the covenant relation as their God. 'Became' preserves the
    narrative and covenantal force without implying any change in God's nature; it
    describes relational establishment, not ontological change.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
