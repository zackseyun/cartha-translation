  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the project's contested-terms policy for YHWH.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Anthropomorphic expression 'according to your heart'
  chosen_reading: according to your heart
  alternative_readings:
  - according to your will
  rationale: The verse speaks of God's inner intention metaphorically as 'heart.' Preserving the metaphor avoids over-interpreting while remaining orthodox and readable.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 Preserve theological tension rather than resolve it'
