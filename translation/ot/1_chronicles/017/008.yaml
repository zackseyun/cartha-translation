id: 1CH.17.8
reference: 1 Chronicles 17:8
source:
  edition: WLC
  text: וָֽ/אֶהְיֶ֣ה עִמְּ/ךָ֗ בְּ/כֹל֙ אֲשֶׁ֣ר הָלַ֔כְתָּ וָ/אַכְרִ֥ית אֶת כָּל אוֹיְבֶ֖י/ךָ
    מִ/פָּנֶ֑י/ךָ וְ/עָשִׂ֤יתִֽי לְ/ךָ֙ שֵׁ֔ם כְּ/שֵׁ֥ם הַ/גְּדוֹלִ֖ים אֲשֶׁ֥ר בָּ/אָֽרֶץ־־׃
translation:
  text: And I was with you wherever you went, and I cut off all your enemies from
    before you, and I will make for you a name like the name of the great ones who
    are on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will make you renowned'; Hebrew 'I will make for you a name.'
    reason: lexical_alternative
  - marker: b
    text: Or 'who are in the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶהְיֶה
  chosen: I was
  alternatives:
  - I have been
  - I will be
  lexicon: HALOT
  rationale: Qal wayyiqtol of היה in narrative sequence naturally refers to past action
    here, recounting the LORD's prior faithfulness to David. 'I was' fits the retrospective
    context better than a future sense.
- source_word: עִמְּךָ
  chosen: with you
  lexicon: HALOT
  rationale: Standard prepositional phrase indicating presence and support; no expansion
    beyond the Hebrew is needed.
- source_word: בְּכֹל אֲשֶׁר הָלַכְתָּ
  chosen: wherever you went
  alternatives:
  - in all that you went
  - in every place you went
  lexicon: HALOT
  rationale: Literally 'in all that you went,' an idiom meaning in every place or
    circumstance of David's movements. 'Wherever you went' is idiomatic modern English
    that preserves the sense without paraphrasing.
- source_word: וָאַכְרִית
  chosen: I cut off
  alternatives:
  - I destroyed
  - I wiped out
  lexicon: HALOT
  rationale: The Hiphil of כרת here conveys causing enemies to be cut off/removed.
    'I cut off' preserves the Hebrew imagery and remains natural in English.
- source_word: אֶת כָּל אוֹיְבֶיךָ
  chosen: all your enemies
  lexicon: HALOT
  rationale: Direct and comprehensive object; 'all' should be retained because it
    is explicit in the Hebrew.
- source_word: מִפָּנֶיךָ
  chosen: from before you
  alternatives:
  - from your presence
  - before you
  lexicon: HALOT
  rationale: Literally 'from your face/presence.' 'From before you' preserves the
    Hebrew spatial idiom and the image of enemies removed from David's path.
- source_word: וְעָשִׂיתִי לְךָ שֵׁם
  chosen: I will make for you a name
  alternatives:
  - I will make you a name
  - I will give you renown
  lexicon: HALOT
  rationale: The perfect with prefixed conjunction here has future force in the promise
    sequence. 'Make for you a name' stays close to the Hebrew while remaining understandable;
    it refers to reputation/renown, not merely a label.
- source_word: שֵׁם
  chosen: name
  alternatives:
  - renown
  - reputation
  lexicon: HALOT
  rationale: Hebrew שֵׁם often carries the sense of reputation or fame. 'Name' is
    retained in the main text because the idiom is biblically important and transparent
    in English.
- source_word: כְּשֵׁם הַגְּדוֹלִים
  chosen: like the name of the great ones
  alternatives:
  - like the renown of the great ones
  - like the name of the great men
  lexicon: HALOT
  rationale: The comparison is to the fame of the mighty/prominent people. 'Great
    ones' avoids adding a specifically male sense not explicit in the adjective alone,
    while preserving the comparative structure.
- source_word: אֲשֶׁר בָּאָרֶץ
  chosen: who are on the earth
  alternatives:
  - who are in the land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'earth' or 'land.' In this context of worldwide renown,
    'earth' better conveys broad scope than the narrower 'land.'
