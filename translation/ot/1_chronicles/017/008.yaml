theological_decisions:
- issue: Temporal sequence of divine actions in the verse
  chosen_reading: Past actions are recounted ('I was... I cut off...') followed by
    a future promise ('I will make...').
  alternative_readings:
  - All clauses rendered as past
  - All clauses rendered as future
  rationale: The verse combines retrospective divine faithfulness with a forward-looking
    promise to David. Rendering the final clause as future best reflects the promise
    context and parallels in the surrounding passage.
