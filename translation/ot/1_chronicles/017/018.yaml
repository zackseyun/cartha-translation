theological_decisions:
- issue: Sense of the difficult clause לְכָבוֹד אֶת עַבְדֶּךָ
  chosen_reading: God is being addressed as the one honoring David, so the clause
    is rendered 'for honoring your servant.'
  alternative_readings:
  - '''for the honor of your servant'''
  - '''to honor your servant'''
  - expansive renderings such as 'for honoring your servant in your sight'
  rationale: The Hebrew is syntactically compressed. The broader context is David
    marveling at the honor God has shown him. The chosen rendering preserves that
    sense while staying close to the wording and avoiding interpretive additions not
    present in the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    ambiguity where genuine without importing doctrinal claims.'
