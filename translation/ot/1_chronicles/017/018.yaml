id: 1CH.17.18
reference: 1 Chronicles 17:18
source:
  edition: WLC
  text: מַה יּוֹסִ֨יף ע֥וֹד דָּוִ֛יד אֵלֶ֖י/ךָ לְ/כָב֣וֹד אֶת עַבְדֶּ֑/ךָ וְ/אַתָּ֖ה
    אֶֽת עַבְדְּ/ךָ֥ יָדָֽעְתָּ־־־׃
translation:
  text: What more can David add before you for honoring your servant? You know your
    servant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What more can David say to you for the honor shown to your servant?'
      The verb 'say' is supplied in some translations to smooth the Hebrew, but it
      is not explicit in the text.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase rendered 'for honoring your servant' is difficult and
      may also be understood as 'for the honor of your servant' or 'to honor your
      servant.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַה
  chosen: What
  alternatives:
  - How
  lexicon: HALOT
  rationale: 'Interrogative opening introducing a rhetorical question: ''What more...?''
    fits the Hebrew idiom naturally in English.'
- source_word: יּוֹסִיף עוֹד
  chosen: can add ... more
  alternatives:
  - will add further
  - can say more
  lexicon: HALOT
  rationale: יסף with עוד expresses adding further. English idiom prefers 'What more
    can David add...?' Some versions expand to 'say,' but 'say' is not explicit in
    the Hebrew and is therefore avoided in the main text.
- source_word: דָּוִיד
  chosen: David
  rationale: Standard transliteration of the personal name.
- source_word: אֵלֶיךָ
  chosen: before you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: אל can mean 'to' or 'toward,' but in this courtly prayer context 'before
    you' better conveys David's posture in God's presence and fits the rhetorical
    address.
- source_word: לְכָבוֹד
  chosen: for honoring
  alternatives:
  - for the honor
  - concerning the honor
  - to honor
  lexicon: HALOT
  rationale: The preposition ל with כבוד here is difficult. In context it refers to
    God's honoring/exalting David as his servant. 'For honoring' preserves the infinitive-like
    sense in readable English without overparaphrasing.
- source_word: אֶת עַבְדֶּךָ
  chosen: your servant
  lexicon: HALOT
  rationale: Direct-object marker plus 'your servant' refers to David speaking of
    himself before God. 'Servant' is the natural rendering for עבד here; the bonded/slave
    nuance is not foregrounded in this royal-prayer context.
- source_word: וְאַתָּה
  chosen: You
  alternatives:
  - and you
  lexicon: HALOT
  rationale: The conjunction marks continuation, but English style can begin the new
    clause simply with 'You' without loss of meaning. The contrastive force remains
    implicit.
- source_word: יָדָעְתָּ
  chosen: know
  alternatives:
  - have known
  - know fully
  lexicon: HALOT
  rationale: Qal perfect second masculine singular of ידע. In this prayer context
    the perfect expresses God's settled knowledge of David; simple present 'know'
    is idiomatic English.
