id: 1CH.17.6
reference: 1 Chronicles 17:6
source:
  edition: WLC
  text: בְּ/כֹ֥ל אֲשֶֽׁר הִתְהַלַּכְתִּי֮ בְּ/כָל יִשְׂרָאֵל֒ הֲ/דָבָ֣ר דִּבַּ֗רְתִּי
    אֶת אַחַד֙ שֹׁפְטֵ֣י יִשְׂרָאֵ֔ל אֲשֶׁ֥ר צִוִּ֛יתִי לִ/רְע֥וֹת אֶת עַמִּ֖/י לֵ/אמֹ֑ר
    לָ֛/מָּה לֹא בְנִיתֶ֥ם לִ֖/י בֵּ֥ית אֲרָזִֽים־־־־־׃
translation:
  text: In all the places where I have walked among all Israel, did I ever speak a
    word with one of the judges of Israel, whom I commanded to shepherd my people,
    saying, ‘Why have you not built for me a house of cedar?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The parallel passage in 2 Samuel 7:7 reads 'tribes of Israel' (with some
      witnesses reflecting 'leaders' or 'scepters') rather than 'judges of Israel.'
      Chronicles' Hebrew text here reads 'judges.'
    reason: textual_variant
lexical_decisions:
- source_word: הִתְהַלַּכְתִּי
  chosen: I have walked
  alternatives:
  - I moved about
  - I went about
  lexicon: HALOT
  rationale: The hitpael of הלך here conveys God's moving about among his people rather
    than a single act of walking. 'Have walked' preserves the metaphor and remains
    natural in English.
- source_word: בְּכָל יִשְׂרָאֵל
  chosen: among all Israel
  alternatives:
  - throughout all Israel
  - with all Israel
  lexicon: HALOT
  rationale: With the preceding verb, the phrase indicates movement in the midst of
    the nation. 'Among all Israel' best captures presence among the people rather
    than merely geographic extent.
- source_word: הֲדָבָר דִּבַּרְתִּי
  chosen: did I ever speak a word
  alternatives:
  - did I speak anything
  - have I spoken a word
  lexicon: HALOT
  rationale: The interrogative plus cognate accusative intensifies the denial. 'Did
    I ever speak a word' preserves the rhetorical force and the Hebrew idiom.
- source_word: אֶת אַחַד שֹׁפְטֵי יִשְׂרָאֵל
  chosen: with one of the judges of Israel
  alternatives:
  - to one of the judges of Israel
  lexicon: HALOT
  rationale: Although את can mark the direct object, with דבר it can introduce the
    person addressed. 'With' reflects normal English usage for speaking with someone
    while retaining the sense of address.
- source_word: שֹׁפְטֵי יִשְׂרָאֵל
  chosen: judges of Israel
  alternatives:
  - leaders of Israel
  - tribal rulers of Israel
  lexicon: HALOT
  rationale: Chronicles here uses 'judges' where the parallel in Samuel has 'tribes';
    the translation should reflect the Chronicler's wording rather than harmonize
    it away.
- source_word: צִוִּיתִי לִרְעוֹת
  chosen: I commanded to shepherd
  alternatives:
  - I appointed to pasture
  - I commanded to tend
  lexicon: HALOT
  rationale: רעה is a pastoral metaphor commonly used for ruling/caring for God's
    people. 'Shepherd' preserves the metaphor and its theological resonance.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Standard covenantal expression; no reason to flatten or paraphrase.
- source_word: לָמָּה לֹא בְנִיתֶם לִי
  chosen: Why have you not built for me
  alternatives:
  - Why did you not build for me
  lexicon: HALOT
  rationale: The perfect in this rhetorical question can be rendered naturally in
    English as present perfect, highlighting the absence of any such command up to
    this point.
- source_word: בֵּית אֲרָזִים
  chosen: a house of cedar
  alternatives:
  - a cedar house
  - a house of cedars
  lexicon: HALOT
  rationale: This idiom refers to a house built of cedar wood. 'A house of cedar'
    is idiomatic and preserves the elevated tone.
