theological_decisions:
- issue: Chronicles' wording 'judges' versus the Samuel parallel 'tribes'/'tribal
    rulers'
  chosen_reading: Translate the MT of Chronicles as 'judges of Israel' in the main
    text
  alternative_readings:
  - Some versions harmonize toward 'tribes of Israel' based on 2 Samuel 7:7
  rationale: Original-language primacy requires translating the extant Hebrew text
    of Chronicles rather than importing the parallel reading from Samuel. The difference
    is text-critical and literary, not a doctrinal contradiction requiring resolution.
  doctrine_reference: Translation philosophy §1, §3
