id: 1CH.17.24
reference: 1 Chronicles 17:24
source:
  edition: WLC
  text: וְ֠/יֵֽאָמֵן וְ/יִגְדַּ֨ל שִׁמְ/ךָ֤ עַד עוֹלָם֙ לֵ/אמֹ֔ר יְהוָ֤ה צְבָאוֹת֙
    אֱלֹהֵ֣י יִשְׂרָאֵ֔ל אֱלֹהִ֖ים לְ/יִשְׂרָאֵ֑ל וּ/בֵית דָּוִ֥יד עַבְדְּ/ךָ֖ נָכ֥וֹן
    לְ/פָנֶֽי/ךָ־־׃
translation:
  text: May it be established, and may your name be magnified forever, saying, ‘The
    LORD of hosts, the God of Israel, is God for Israel,’ and may the house of David
    your servant be established before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The LORD of hosts, the God of Israel, is Israel’s God.' The Hebrew
      reads more literally, 'is God for Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''House'' here carries the sense of David’s royal house or dynasty.'
    reason: cultural_note
lexical_decisions:
- source_word: וְיֵאָמֵן
  chosen: May it be established
  alternatives:
  - Let it be established
  - May it be confirmed
  lexicon: HALOT
  rationale: Niphal imperfect/jussive sense from אמן here expresses a wish/prayer
    that the preceding promise be made firm or enduring. 'Be established' fits the
    covenantal context and pairs naturally with the later נָכוֹן.
- source_word: וְיִגְדַּל
  chosen: may ... be magnified
  alternatives:
  - may ... be great
  - may ... be exalted
  lexicon: HALOT
  rationale: From גדל, here in jussive force concerning God's name. 'Be magnified'
    preserves the honorific sense better than the flatter 'be great.'
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: Standard Hebrew idiom for reputation, renown, and revealed identity;
    'name' should be retained rather than paraphrased.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - to eternity
  lexicon: HALOT
  rationale: Idiomatic expression for enduring perpetuity. 'Forever' is natural modern
    English and preserves the temporal force.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - so that people say
  - namely
  lexicon: HALOT
  rationale: Introduces the content of the acclamation that follows. Retaining 'saying'
    keeps the Hebrew discourse structure without over-paraphrase.
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: Traditional but still transparent rendering of the divine title; it preserves
    the breadth of heavenly/earthly forces better than the narrower 'armies.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct phrase identifying YHWH covenantally with Israel.
- source_word: אֱלֹהִים לְיִשְׂרָאֵל
  chosen: is God for Israel
  alternatives:
  - is God to Israel
  - is Israel's God
  lexicon: HALOT
  rationale: The preposition ל marks relation/benefit. 'For Israel' preserves the
    Hebrew wording and covenantal orientation without collapsing it into possession,
    though 'Israel's God' is a plausible smoother English alternative.
- source_word: וּבֵית דָּוִיד עַבְדְּךָ
  chosen: and ... the house of David your servant
  alternatives:
  - while the house of David your servant
  - and the dynasty of David your servant
  lexicon: HALOT
  rationale: בַּיִת in dynastic contexts can mean 'house' or 'dynasty.' 'House' is
    retained for transparency, with dynastic sense understood from context.
- source_word: נָכוֹן
  chosen: be established
  alternatives:
  - be made firm
  - be secure
  lexicon: HALOT
  rationale: Passive/stative sense of being firmly set or established. Repeating 'established'
    reflects the covenantal stability theme and matches the semantic field of the
    verse.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  lexicon: HALOT
  rationale: Literal relational phrase. 'Before you' is idiomatic and preserves the
    sense of standing secure in God's sight/presence.
