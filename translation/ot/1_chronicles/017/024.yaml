theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrine specifies 'the LORD' as the default rendering
    of YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of the jussive/imperfect verbs in this prayer
  chosen_reading: Optative 'May it be established ... may your name be magnified ...
    may the house of David ... be established'
  alternative_readings:
  - Future indicative 'It will be established ... your name will be magnified'
  rationale: In context David is praying in response to God's promise, so the imperfects
    are best represented as wishes/prayerful petitions rather than simple predictions.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
- issue: Sense of אֱלֹהִים לְיִשְׂרָאֵל
  chosen_reading: is God for Israel
  alternative_readings:
  - is Israel's God
  - is God to Israel
  rationale: The Hebrew preposition ל is preserved rather than absorbed into a possessive
    paraphrase. This keeps the covenantal nuance without adding doctrinal content
    beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy
    over translation tradition'
