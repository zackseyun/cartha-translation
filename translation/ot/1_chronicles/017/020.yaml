id: 1CH.17.20
reference: 1 Chronicles 17:20
source:
  edition: WLC
  text: יְהוָה֙ אֵ֣ין כָּמ֔וֹ/ךָ וְ/אֵ֥ין אֱלֹהִ֖ים זוּלָתֶ֑/ךָ בְּ/כֹ֥ל אֲשֶׁר שָׁמַ֖עְנוּ
    בְּ/אָזְנֵֽי/נוּ־׃
translation:
  text: O LORD, there is none like you, and there is no God besides you, according
    to all that we have heard with our own ears.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, "there is no god except you" / "there is no God apart from you."
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as "LORD" per project doctrine for the divine name YHWH, following
    the established convention of small-caps covenant name representation in English.
- source_word: אֵין כָּמוֹךָ
  chosen: there is none like you
  alternatives:
  - there is no one like you
  - none compares to you
  lexicon: HALOT
  rationale: The existential particle אֵין with the comparative כָּמוֹךָ expresses
    nonexistence of any comparable being. "There is none like you" is natural, concise,
    and close to the Hebrew structure.
- source_word: וְאֵין אֱלֹהִים זוּלָתֶךָ
  chosen: and there is no God besides you
  alternatives:
  - and there is no god except you
  - and there is no God apart from you
  lexicon: HALOT
  rationale: אֱלֹהִים here refers to deity in the singular sense because the clause
    denies any other true God. "Besides you" accurately reflects זוּלָתֶךָ ('except/besides
    you') and preserves the exclusivity claim.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - god
  lexicon: HALOT
  rationale: Capitalized "God" because in context the statement concerns the uniqueness
    of the true God, not merely any deity among others.
- source_word: בְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - in all that
  - from all that
  - by all that
  lexicon: HALOT
  rationale: 'The preposition בְ with כֹּל אֲשֶׁר here introduces the standard or
    basis of the confession: what has been heard. "According to all that" best conveys
    that the statement accords with the entirety of received report.'
- source_word: שָׁמַעְנוּ
  chosen: we have heard
  alternatives:
  - we heard
  lexicon: HALOT
  rationale: The perfect can be rendered as English present perfect to express accumulated
    testimony up to the present moment, which suits the reflective tone of David's
    prayer.
- source_word: בְּאָזְנֵינוּ
  chosen: with our own ears
  alternatives:
  - in our ears
  - with our ears
  lexicon: HALOT
  rationale: Literally "in/with our ears." The idiomatic English "with our own ears"
    preserves the embodied force of firsthand hearing without sounding wooden.
