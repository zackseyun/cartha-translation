theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    "the LORD." This also fits the prayerful address in context.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Strength of the exclusivity claim in וְאֵין אֱלֹהִים זוּלָתֶךָ
  chosen_reading: 'an absolute monotheistic confession: ''there is no God besides
    you'''
  alternative_readings:
  - a comparative statement about incomparability among gods
  rationale: The Hebrew wording naturally states exclusive deity, not merely superiority.
    The translation preserves the text's direct theological claim without softening
    it into a weaker comparison.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
