id: 1CH.17.17
reference: 1 Chronicles 17:17
source:
  edition: WLC
  text: וַ/תִּקְטַ֨ן זֹ֤את בְּ/עֵינֶ֨י/ךָ֙ אֱלֹהִ֔ים וַ/תְּדַבֵּ֥ר עַל בֵּֽית עַבְדְּ/ךָ֖ לְ/מֵ/רָח֑וֹק וּ/רְאִיתַ֗/נִי כְּ/ת֧וֹר הָ/אָדָ֛ם הַֽ/מַּעֲלָ֖ה יְהוָ֥ה אֱלֹהִֽים־־׃
translation:
  text: And this was a small thing in your eyes, O God; yet you have spoken concerning your servant’s house for a long time to come, and you have looked on me as one in the rank of man of high degree, O Yahweh God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you have shown me the future generations of men,' or 'you have regarded me as a man of high degree.' The Hebrew of the final clause is difficult and admits several interpretations.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּקְטַן זֹאת
  chosen: this was a small thing
  alternatives:
  - this seemed insignificant
  - this was too little
  lexicon: HALOT
  rationale: The verb from קטן in this construction expresses that the matter was small or insignificant in God's sight. 'Was a small thing' preserves the idiom while remaining natural English.
- source_word: בְּעֵינֶיךָ
  chosen: in your eyes
  alternatives:
  - in your sight
  lexicon: HALOT
  rationale: A common Hebrew idiom for evaluation or estimation. 'In your eyes' is transparent and idiomatic enough in English.
- source_word: אֱלֹהִים
  chosen: O God
  lexicon: HALOT
  rationale: Direct address to God in David's prayer; vocative sense is required by context.
- source_word: וַתְּדַבֵּר עַל בֵּית עַבְדְּךָ
  chosen: you have spoken concerning your servant’s house
  alternatives:
  - you have spoken about your servant’s house
  - you have promised concerning your servant’s house
  lexicon: HALOT
  rationale: דבר על is most basically 'speak concerning/about.' Because the speech here is promissory, 'promised' is interpretively possible, but 'spoken concerning' stays closer to the Hebrew while allowing the context to supply the promissory force.
- source_word: לְמֵרָחוֹק
  chosen: for a long time to come
  alternatives:
  - for the distant future
  - far ahead
  lexicon: HALOT
  rationale: Literally 'to/from afar' in temporal context, referring to the distant future of David's house. 'For a long time to come' is clear modern English.
- source_word: וּרְאִיתַנִי
  chosen: you have regarded me
  alternatives:
  - you have seen me
  - you have looked on me
  lexicon: HALOT
  rationale: ראה can mean more than visual perception; here it carries the sense of considering or treating David in a certain way. 'Regarded' best fits the following comparative phrase.
- source_word: כְּתוֹר
  chosen: according to the rank of
  alternatives:
  - as the law of
  - like the manner of
  lexicon: HALOT
  rationale: This phrase is notoriously difficult. The noun תור can denote order, arrangement, or manner. In this context, 'according to the rank of' attempts to preserve the elevated, status-related sense without overcommitting to a highly paraphrastic solution.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - a man
  lexicon: HALOT
  rationale: Per the doctrine's gender-accurate principle, אדם here is singular and best rendered 'man,' especially in a phrase comparing David's treatment to that of an exalted human figure.
- source_word: הַמַּעֲלָה
  chosen: on high
  alternatives:
  - of exaltation
  - the upward place
  lexicon: HALOT
  rationale: The noun derives from 'going up' and can denote ascent or exalted position. 'On high' captures the elevated-status idea in readable English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יְהוָה אֱלֹהִים
  chosen: O LORD God
  alternatives:
  - O Yahweh God
  lexicon: HALOT
  rationale: Combined divine title in direct address; rendered with the doctrinal default for YHWH and standard English capitalization.
