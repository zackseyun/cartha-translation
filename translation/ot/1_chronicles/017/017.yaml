theological_decisions:
- issue: Interpretation of the notoriously difficult final clause וּרְאִיתַנִי כְּתוֹר הָאָדָם הַמַּעֲלָה
  chosen_reading: you have regarded me according to the rank of man on high
  alternative_readings:
  - you have shown me the future generations of men
  - you have regarded me as a man of high degree
  - this is instruction for mankind
  rationale: The Hebrew is textually stable but semantically obscure, and the parallel in 2 Samuel 7:19 is also difficult. The chosen rendering stays relatively close to the Masoretic wording and preserves the sense that God has treated David in an exalted, extraordinary way. Because the clause is genuinely ambiguous, major alternatives are preserved in a footnote rather than being silently excluded.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it); Gender-accurate principle for אָדָם
