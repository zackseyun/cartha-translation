id: 1CH.17.21
reference: 1 Chronicles 17:21
source:
  edition: WLC
  text: וּ/מִי֙ כְּ/עַמְּ/ךָ֣ יִשְׂרָאֵ֔ל גּ֥וֹי אֶחָ֖ד בָּ/אָ֑רֶץ אֲשֶׁר֩ הָלַ֨ךְ
    הָ/אֱלֹהִ֜ים לִ/פְדּ֧וֹת ל֣/וֹ עָ֗ם לָ/שׂ֤וּם לְ/ךָ֙ שֵׁ֚ם גְּדֻלּ֣וֹת וְ/נֹרָא֔וֹת
    לְ/גָרֵ֗שׁ מִ/פְּנֵ֧י עַמְּ/ךָ֛ אֲשֶׁר פָּדִ֥יתָ מִ/מִּצְרַ֖יִם גּוֹיִֽם־׃
translation:
  text: And who is like your people Israel, one nation on the earth, whom God went
    to redeem for himself as a people, to make for yourself a name by great and fearsome
    deeds, driving out nations from before your people, whom you redeemed from Egypt?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great and awesome things.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'driving out nations from before your people'; some understand the
      final word order differently because the parallel in 2 Samuel 7:23 is textually
      difficult.
    reason: textual_variant
lexical_decisions:
- source_word: וּמִי
  chosen: And who
  alternatives:
  - And what nation
  lexicon: HALOT
  rationale: Introduces a rhetorical comparison. 'Who' fits the personal comparison
    with 'your people Israel'; 'what nation' is possible by sense but less direct
    to the Hebrew interrogative מִי.
- source_word: כְעַמְּךָ יִשְׂרָאֵל
  chosen: like your people Israel
  alternatives:
  - like Israel your people
  lexicon: HALOT
  rationale: 'Keeps the simile explicit and preserves the covenantal address to God:
    Israel is ''your people.'''
- source_word: גּוֹי אֶחָד בָּאָרֶץ
  chosen: one nation on the earth
  alternatives:
  - one nation in the earth
  - a unique nation in the land
  lexicon: HALOT
  rationale: Formal sense is 'one nation in/on the earth.' 'One nation on the earth'
    is idiomatic English and preserves the uniqueness claim without overinterpreting
    it as 'unique nation.'
- source_word: אֲשֶׁר הָלַךְ הָאֱלֹהִים
  chosen: whom God went
  alternatives:
  - for which God went
  - which God went out for
  lexicon: HALOT
  rationale: הלך + infinitive here expresses decisive divine action. 'God went' preserves
    the anthropomorphic movement language better than smoothing it away.
- source_word: לִפְדּוֹת לוֹ עָם
  chosen: to redeem for himself as a people
  alternatives:
  - to redeem for himself a people
  - to ransom for himself a people
  lexicon: HALOT
  rationale: 'פדה is ''redeem/ransom''; ''redeem'' is the standard covenantal term.
    ''For himself as a people'' reflects the resultative force: God redeemed Israel
    to be his people.'
- source_word: לָשׂוּם לְךָ שֵׁם
  chosen: to make for yourself a name
  alternatives:
  - to set for yourself a name
  - to make yourself a name
  lexicon: HALOT
  rationale: Idiomatic Hebrew for establishing renown. 'Make for yourself a name'
    is natural English while retaining the reflexive sense.
- source_word: גְּדֻלּוֹת וְנוֹרָאוֹת
  chosen: by great and fearsome deeds
  alternatives:
  - great and awesome things
  - great and terrifying acts
  lexicon: HALOT
  rationale: The pair denotes mighty acts that inspire awe. 'Fearsome' preserves the
    stronger edge of נוראות better than the now-weakened English 'awesome.' 'Deeds'
    is supplied to make the English complete.
- source_word: לְגָרֵשׁ
  chosen: driving out
  alternatives:
  - to drive out
  - expelling
  lexicon: HALOT
  rationale: Best taken with the preceding phrase as describing the great deeds God
    performed. The participial English 'driving out' reads smoothly while preserving
    the action.
- source_word: מִפְּנֵי עַמְּךָ
  chosen: from before your people
  alternatives:
  - before your people
  - from the presence of your people
  lexicon: HALOT
  rationale: מִפְּנֵי literally means 'from before/from the presence of.' 'From before
    your people' preserves the Hebrew idiom tied to dispossession.
- source_word: אֲשֶׁר פָּדִיתָ מִמִּצְרַיִם
  chosen: whom you redeemed from Egypt
  alternatives:
  - which you redeemed out of Egypt
  lexicon: HALOT
  rationale: Directly restates Israel's redemption from Egypt in second-person address
    to God.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - the nations
  - peoples
  lexicon: HALOT
  rationale: Plural object of the driving out. The Hebrew lacks the article, so 'nations'
    is preferable to 'the nations.'
