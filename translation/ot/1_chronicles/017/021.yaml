theological_decisions:
- issue: Divine self-glorification language in לָשׂוּם לְךָ שֵׁם
  chosen_reading: to make for yourself a name
  alternative_readings:
  - to make yourself a name
  rationale: The text explicitly states that God's redemptive acts establish his renown.
    The translation preserves this without softening or importing later theological
    categories.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of נוראות
  chosen_reading: fearsome
  alternative_readings:
  - awesome
  - terrifying
  rationale: The term denotes deeds that evoke awe and dread. 'Fearsome' preserves
    the theological weight of divine acts better than colloquial 'awesome' while avoiding
    overstatement where 'terrifying' might imply only terror.
  doctrine_reference: Translation philosophy §6
