id: 1CH.17.1
reference: 1 Chronicles 17:1
source:
  edition: WLC
  text: וַ/יְהִ֕י כַּ/אֲשֶׁ֛ר יָשַׁ֥ב דָּוִ֖יד בְּ/בֵית֑/וֹ וַ/יֹּ֨אמֶר דָּוִ֜יד אֶל נָתָ֣ן הַ/נָּבִ֗יא הִנֵּ֨ה אָנֹכִ֤י יוֹשֵׁב֙ בְּ/בֵ֣ית הָֽ/אֲרָזִ֔ים וַ/אֲר֥וֹן בְּרִית יְהוָ֖ה תַּ֥חַת יְרִיעֽוֹת־־׃
translation:
  text: Now it happened, when David was living in his house, that David said to Nathan the prophet, “Look, I am living in a house of cedar, but the ark of the covenant of Yahweh is under curtains.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under tent curtains.' The Hebrew יְרִיעוֹת refers to fabric curtains, especially those of a tent or tabernacle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now it happened
  alternatives:
  - And it happened
  - Now it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol introducing a new scene. 'Now it happened' preserves the Hebrew discourse function in readable modern English without archaic phrasing.
- source_word: כַּאֲשֶׁר
  chosen: when
  alternatives:
  - as
  - after
  lexicon: HALOT
  rationale: Introduces the temporal circumstance for the main action. 'When' is the most natural English equivalent here.
- source_word: יָשַׁב ... יוֹשֵׁב
  chosen: was living ... am living
  alternatives:
  - sat ... sit
  - dwelt ... dwell
  lexicon: HALOT
  rationale: The Hebrew verb ישׁב can mean 'sit,' 'dwell,' or 'live.' In this context of residence in a house, 'living' best conveys settled habitation in natural English and preserves the repetition between the narrative clause and David's speech.
- source_word: בְּבֵיתוֹ
  chosen: in his house
  alternatives:
  - in his palace
  - at his house
  lexicon: HALOT
  rationale: The Hebrew says literally 'in his house.' Although the referent is a royal residence and could be understood as a palace, the source text uses 'house,' and the repetition with 'house of cedar' is rhetorically important.
- source_word: נָתָן הַנָּבִיא
  chosen: Nathan the prophet
  alternatives:
  - Nathan, the prophet
  lexicon: HALOT
  rationale: Appositional title identifying Nathan's role. Standard English rendering preserves both the name and office.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention to David's observation. 'Look' is readable modern English; 'behold' would be overly archaic.
- source_word: בְּבֵית הָאֲרָזִים
  chosen: in a house of cedar
  alternatives:
  - in a cedar house
  - in the house of cedars
  lexicon: HALOT
  rationale: The phrase denotes a house made of cedar wood. 'A house of cedar' preserves the Hebrew construction and the contrast with the ark's dwelling.
- source_word: וַאֲרוֹן בְּרִית יְהוָה
  chosen: but the ark of the covenant of the LORD
  alternatives:
  - and the ark of the covenant of the LORD
  - while the ark of the covenant of the LORD
  lexicon: HALOT
  rationale: 'The conjunction marks contrast in sense, even though formally it is simple waw. English idiom requires ''but'' to express David''s concern: his cedar house stands in contrast to the ark''s lesser shelter. ''The LORD'' follows the project''s default for YHWH.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תַּחַת יְרִיעוֹת
  chosen: is under curtains
  alternatives:
  - is under tent curtains
  - is under draperies
  - is beneath curtains
  lexicon: HALOT
  rationale: יריעות refers to fabric hangings/curtains, especially tent curtains. 'Under curtains' is a close rendering of the Hebrew; 'tent curtains' is interpretive but plausible. The simpler phrase preserves the contrast with David's cedar house while remaining natural.
