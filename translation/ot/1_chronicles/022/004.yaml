id: 1CH.22.4
reference: 1 Chronicles 22:4
source:
  edition: WLC
  text: וַ/עֲצֵ֥י אֲרָזִ֖ים לְ/אֵ֣ין מִסְפָּ֑ר כִּֽי הֵ֠בִיאוּ הַ/צִּֽידֹנִ֨ים וְ/הַ/צֹּרִ֜ים
    עֲצֵ֧י אֲרָזִ֛ים לָ/רֹ֖ב לְ/דָוִֽיד׃פ
translation:
  text: and cedar timbers without number, for the Sidonians and Tyrians had brought
    cedar timbers in abundance to David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cedar wood.' The Hebrew can refer broadly to cedar material, though
      in this temple-building context it likely denotes timber for construction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/עֲצֵי אֲרָזִים
  chosen: and cedar timbers
  alternatives:
  - and cedar wood
  - and cedar trees
  lexicon: HALOT
  rationale: עֲצֵי is the construct plural of 'trees/wood/timber' with אֲרָזִים ('cedars').
    In a building-supplies context, 'cedar timbers' best conveys processed building
    material rather than standing trees, while preserving the concrete sense better
    than the broader 'wood'.
- source_word: לְ/אֵין מִסְפָּר
  chosen: without number
  alternatives:
  - beyond counting
  - too many to count
  lexicon: HALOT
  rationale: The idiom literally means 'to there being no number,' expressing innumerability.
    'Without number' is a natural, fairly formal English equivalent that preserves
    the idiomatic force.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the explanation for the previous statement. 'For'
    fits the narrative style and links the clause smoothly to the reason given.
- source_word: הֵבִיאוּ
  chosen: had brought
  alternatives:
  - brought
  lexicon: HALOT
  rationale: The Hiphil perfect 3cp means 'they brought.' English past perfect ('had
    brought') appropriately situates the action as the prior reason David possessed
    such quantities, though simple past would also be possible.
- source_word: הַצִּידֹנִים
  chosen: the Sidonians
  alternatives:
  - the people of Sidon
  lexicon: HALOT
  rationale: A gentilic plural referring to inhabitants of Sidon. 'The Sidonians'
    is concise and standard.
- source_word: וְהַצֹּרִים
  chosen: and Tyrians
  alternatives:
  - and the people of Tyre
  lexicon: HALOT
  rationale: A gentilic plural referring to inhabitants of Tyre. 'Tyrians' is the
    standard English gentilic and pairs well with 'Sidonians.'
- source_word: לָ/רֹב
  chosen: in abundance
  alternatives:
  - in great quantity
  - abundantly
  lexicon: HALOT
  rationale: The phrase denotes large quantity. 'In abundance' is idiomatic in English
    and suits the material-supply context.
- source_word: לְ/דָוִד
  chosen: to David
  alternatives:
  - for David
  lexicon: HALOT
  rationale: The preposition ל marks the recipient. 'To David' is the most direct
    rendering; 'for David' is possible but slightly more interpretive.
