id: 1CH.22.7
reference: 1 Chronicles 22:7
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר דָּוִ֖יד לִ/שְׁלֹמֹ֑ה בנ/ו אֲנִי֙ הָיָ֣ה עִם לְבָבִ֔/י לִ/בְנ֣וֹת בַּ֔יִת לְ/שֵׁ֖ם יְהוָ֥ה אֱלֹהָֽ/י־׃
translation:
  text: And David said to Solomon his son, “As for me, it was in my heart to build a house for the name of Yahweh my God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I had it in my heart.' The Hebrew idiom expresses David's inward intention or resolve.
    reason: lexical_alternative
  - marker: b
    text: Or 'to build a temple.' Literally 'to build a house' for the name of the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' preserves the Hebrew narrative flow without overinterpreting the conjunction.
- source_word: לִשְׁלֹמֹה בְנוֹ
  chosen: to Solomon his son
  alternatives:
  - to his son Solomon
  lexicon: HALOT
  rationale: Both are natural in English; this order closely reflects the Hebrew while remaining readable.
- source_word: אֲנִי
  chosen: As for me
  alternatives:
  - I
  - For my part
  lexicon: HALOT
  rationale: The explicit pronoun is somewhat emphatic in Hebrew. 'As for me' brings out that emphasis more clearly than a bare 'I'.
- source_word: הָיָה עִם לְבָבִי
  chosen: it was in my heart
  alternatives:
  - it was with my heart
  - I had it in my heart
  - my heart was set
  lexicon: HALOT
  rationale: This idiom expresses inward intention or resolve. 'It was in my heart' is a clear, fairly literal English equivalent that preserves the Hebrew imagery better than a more interpretive paraphrase.
- source_word: לִבְנוֹת בַּיִת
  chosen: to build a house
  alternatives:
  - to build a temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' Although the referent is the temple, 'house' preserves the source wording and the common biblical expression 'house for the name of the LORD.' 'Temple' is interpretive and therefore left as an alternative.
- source_word: לְשֵׁם
  chosen: for the name of
  alternatives:
  - for
  - in honor of the name of
  lexicon: HALOT
  rationale: The phrase is covenantal and cultic, referring to dedication to YHWH's name/presence. 'For the name of' preserves the theological wording rather than flattening it to simple dedication language.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהָי
  chosen: my God
  lexicon: HALOT
  rationale: 'The 1cs suffix is explicit and should be preserved: David speaks personally of the LORD as ''my God.'''
