theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render בַּיִת as 'house' or 'temple'
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: The Hebrew says 'house,' and optimal equivalence favors retaining that wording unless clarity demands otherwise. Since the temple referent is understandable in context, the more literal 'house' better preserves the source's theological diction.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
