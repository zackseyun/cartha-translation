id: 1CH.22.8
reference: 1 Chronicles 22:8
source:
  edition: WLC
  text: וַ/יְהִ֨י עָלַ֤/י דְּבַר יְהוָה֙ לֵ/אמֹ֔ר דָּ֤ם לָ/רֹב֙ שָׁפַ֔כְתָּ וּ/מִלְחָמ֥וֹת גְּדֹל֖וֹת עָשִׂ֑יתָ לֹֽא תִבְנֶ֥ה בַ֨יִת֙ לִ/שְׁמִ֔/י כִּ֚י דָּמִ֣ים רַבִּ֔ים שָׁפַ֥כְתָּ אַ֖רְצָ/ה לְ/פָנָֽ/י־־׃
translation:
  text: But the word of Yahweh came to me, saying, ‘You have shed much blood and fought great wars. You shall not build a house for my name, because you have shed much blood on the earth before me.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blood in abundance' for 'much blood.'
    reason: lexical_alternative
  - marker: b
    text: Or 'waged great wars.'
    reason: lexical_alternative
  - marker: c
    text: That is, the temple; Hebrew 'a house for my name.'
    reason: cultural_note
  - marker: d
    text: Or 'to the ground' for 'on the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - a word from the LORD
  - the message of the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'The LORD' follows the doctrinal default for יְהוָה. 'Word' preserves the formal force of דְּבַר better than the more interpretive 'message.'
- source_word: וַיְהִי עָלַי
  chosen: came to me
  alternatives:
  - was upon me
  lexicon: HALOT
  rationale: The idiom 'the word ... was upon me' is naturally rendered in English as 'came to me,' while preserving the sense of divine address.
- source_word: דָּם לָרֹב
  chosen: much blood
  alternatives:
  - blood in abundance
  - a great deal of blood
  lexicon: HALOT
  rationale: The phrase denotes bloodshed in large quantity. 'Much blood' is concise, natural, and retains the concrete imagery.
- source_word: שָׁפַכְתָּ
  chosen: have shed
  alternatives:
  - shed
  lexicon: HALOT
  rationale: With the direct object 'blood,' the idiom means 'shed blood.' Present perfect English fits the retrospective explanation addressed to David.
- source_word: וּמִלְחָמוֹת גְּדֹלוֹת עָשִׂיתָ
  chosen: fought great wars
  alternatives:
  - waged great wars
  - made great wars
  lexicon: HALOT
  rationale: Although literally 'did/made great wars,' idiomatic English is 'fought' or 'waged.' 'Fought great wars' is clear and preserves the active military sense without sounding wooden.
- source_word: לֹא תִבְנֶה בַיִת לִשְׁמִי
  chosen: You shall not build a house for my name
  alternatives:
  - You shall not build a temple for my name
  - You will not build a house for my name
  lexicon: HALOT
  rationale: '''House'' is retained because it reflects the Hebrew and preserves the temple-house motif. ''For my name'' is also retained as covenantal language rather than paraphrasing it away as merely ''for me.'''
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason David may not build the house. 'Because' is clearer in modern English than the more formal 'for.'
- source_word: דָּמִים רַבִּים
  chosen: much blood
  alternatives:
  - many bloods
  - much bloodshed
  lexicon: HALOT
  rationale: The plural דָּמִים often refers to bloodshed/bloodguilt. In this context, repeating 'much blood' keeps the concrete wording and matches the earlier clause, while avoiding an overly abstract rendering.
- source_word: אַרְצָה
  chosen: on the earth
  alternatives:
  - to the ground
  - upon the land
  lexicon: HALOT
  rationale: The directional form can mean 'to the earth/ground.' 'On the earth' works well with 'shed blood' and avoids implying only a local patch of ground; 'to the ground' is possible but less natural here.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in my presence
  lexicon: HALOT
  rationale: A straightforward rendering that preserves the theological force that the bloodshed occurred in God's sight.
