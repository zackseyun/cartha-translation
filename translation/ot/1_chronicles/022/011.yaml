id: 1CH.22.11
reference: 1 Chronicles 22:11
source:
  edition: WLC
  text: עַתָּ֣ה בְנִ֔/י יְהִ֥י יְהוָ֖ה עִמָּ֑/ךְ וְ/הִצְלַחְתָּ֗ וּ/בָנִ֨יתָ֙ בֵּ֚ית
    יְהוָ֣ה אֱלֹהֶ֔י/ךָ כַּ/אֲשֶׁ֖ר דִּבֶּ֥ר עָלֶֽי/ךָ׃
translation:
  text: Now, my son, may the LORD be with you, so that you may prosper and build the
    house of the LORD your God, as he has spoken concerning you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and may you succeed'; the Hebrew verb can mean 'prosper' or 'succeed.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'the temple of the LORD your God.' Literally, 'the house of the LORD
      your God.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'as he promised regarding you.' The Hebrew more literally says, 'as
      he has spoken concerning you.'
    reason: alternative_reading
lexical_decisions:
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - So now
  - At this time
  lexicon: HALOT
  rationale: Temporal discourse marker introducing David's blessing/exhortation; 'Now'
    is natural and sufficiently formal.
- source_word: בְנִי
  chosen: my son
  alternatives:
  - son of mine
  lexicon: HALOT
  rationale: Direct address with 1cs suffix; 'my son' is the natural English equivalent
    and preserves the paternal tone.
- source_word: יְהִי יְהוָה עִמָּךְ
  chosen: may the LORD be with you
  alternatives:
  - the LORD will be with you
  - let the LORD be with you
  lexicon: HALOT
  rationale: The jussive יְהִי expresses a wish/blessing rather than a simple future.
    'May the LORD be with you' best captures the benedictory force. Per doctrine,
    יְהוָה is rendered 'the LORD'.
- source_word: וְהִצְלַחְתָּ
  chosen: so that you may prosper
  alternatives:
  - and may you prosper
  - and you will prosper
  - and succeed
  lexicon: HALOT
  rationale: Hiphil of צלח can mean prosper/succeed. In context it continues the wish
    introduced by the jussive, so English supplies 'so that you may prosper' to make
    the blessing sequence coherent and readable. 'Prosper' fits temple-building context
    without narrowing to material success.
- source_word: וּבָנִיתָ
  chosen: and build
  alternatives:
  - and you will build
  - then build
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction following the blessing sequence
    is rendered with modal force in English, coordinated with ''may prosper'': ''and
    build.'' This avoids an overly rigid past/future form and reflects the intended
    result/expectation.'
- source_word: בֵּית יְהוָה אֱלֹהֶיךָ
  chosen: the house of the LORD your God
  alternatives:
  - the house for the LORD your God
  - the temple of the LORD your God
  lexicon: HALOT
  rationale: Literally 'house of the LORD your God.' 'House' preserves the Hebrew
    expression and its theological resonance; 'temple' is interpretive and therefore
    left as an alternative.
- source_word: כַּאֲשֶׁר דִּבֶּר עָלֶיךָ
  chosen: as he has spoken concerning you
  alternatives:
  - as he spoke about you
  - as he promised regarding you
  - as he said of you
  lexicon: HALOT
  rationale: דבר + על can mean speak concerning/about. Here it refers to the LORD's
    prior word regarding Solomon's role. 'Has spoken concerning you' preserves the
    verbal link without over-interpreting it as an explicit promise, though that sense
    is contextually present.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name יְהוָה is rendered 'the LORD' in the main
    text.
