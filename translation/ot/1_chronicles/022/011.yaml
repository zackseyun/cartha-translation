theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guideline specifies 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the verbal sequence in David's address to Solomon
  chosen_reading: A blessing/wish leading into expected result ('may the LORD be with
    you, so that you may prosper and build')
  alternative_readings:
  - A prediction ('the LORD will be with you, and you will prosper and build')
  rationale: The initial jussive יְהִי strongly suggests benedictory force. The following
    verbs are therefore rendered in a way that coheres with that wish rather than
    as bare prediction, while still preserving the sense of anticipated fulfillment.
