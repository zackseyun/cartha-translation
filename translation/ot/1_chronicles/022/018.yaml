id: 1CH.22.18
reference: 1 Chronicles 22:18
source:
  edition: WLC
  text: הֲ/לֹ֨א יְהוָ֤ה אֱלֹֽהֵי/כֶם֙ עִמָּ/כֶ֔ם וְ/הֵנִ֥יחַ לָ/כֶ֖ם מִ/סָּבִ֑יב כִּ֣י
    נָתַ֣ן בְּ/יָדִ֗/י אֵ֚ת יֹשְׁבֵ֣י הָ/אָ֔רֶץ וְ/נִכְבְּשָׁ֥ה הָ/אָ֛רֶץ לִ/פְנֵ֥י
    יְהוָ֖ה וְ/לִ/פְנֵ֥י עַמּֽ/וֹ׀׃
translation:
  text: Is not the LORD your God with you? And has he not given you rest on every
    side? For he has given the inhabitants of the land into my hand, and the land
    has been subdued before the LORD and before his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and in the sight of his people.' The pronoun in 'his people' is best
      taken to refer to the LORD, though some may understand it as referring to David.
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלֹא
  chosen: Is not
  alternatives:
  - Has not
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Is
    not' preserves the interrogative force naturally in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name is rendered 'the LORD' rather than transliterated.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: With YHWH and the context of Israel's covenant confession, the plural
    form functions as the singular title 'God.'
- source_word: עִמָּכֶם
  chosen: with you
  alternatives:
  - among you
  lexicon: HALOT
  rationale: The preposition with pronominal suffix here expresses divine presence/support;
    'with you' is the most direct rendering.
- source_word: וְהֵנִיחַ לָכֶם מִסָּבִיב
  chosen: And has he not given you rest on every side
  alternatives:
  - and has he caused you to rest from all around
  - and has he given you relief all around
  lexicon: HALOT
  rationale: הניח in this context means to grant rest or relief from surrounding enemies.
    'On every side' is a natural rendering of מִסָּבִיב in conquest/rest contexts.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the preceding rhetorical question, so 'For'
    fits the discourse flow.
- source_word: נָתַן בְּיָדִי
  chosen: he has given ... into my hand
  alternatives:
  - he gave ... into my power
  - he delivered ... into my hand
  lexicon: HALOT
  rationale: This idiom commonly denotes handing over into someone's power. 'Into
    my hand' preserves the Hebrew image while remaining clear.
- source_word: יֹשְׁבֵי הָאָרֶץ
  chosen: the inhabitants of the land
  alternatives:
  - those who dwell in the land
  - the dwellers of the land
  lexicon: HALOT
  rationale: A standard idiomatic rendering of the participial construction referring
    to the people living in the land.
- source_word: וְנִכְבְּשָׁה הָאָרֶץ
  chosen: and the land has been subdued
  alternatives:
  - and the land was subdued
  - and the land has been brought into subjection
  lexicon: HALOT
  rationale: The Niphal of כבש conveys being subdued or brought under control. Present
    perfect English fits the completed-result sense in David's speech.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is most straightforwardly 'before' here, indicating what has
    occurred under the LORD's authority/presence.
- source_word: וְלִפְנֵי עַמּוֹ
  chosen: and before his people
  alternatives:
  - and in the sight of his people
  lexicon: HALOT
  rationale: Maintains the parallel with 'before the LORD.' 'His people' refers to
    the LORD's people in context.
