theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify rendering YHWH as 'the LORD' in keeping
    with Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Referent of 'his people' in וְלִפְנֵי עַמּוֹ
  chosen_reading: '''his'' refers to the LORD'
  alternative_readings:
  - '''his'' refers to David'
  rationale: The nearest prominent antecedent in the clause is the LORD, and the phrase
    'before the LORD and before his people' naturally pairs God with his covenant
    people. This avoids introducing a David-centered reading not demanded by the syntax.
  doctrine_reference: Preserve theological tension rather than resolve it; choose
    the reading best supported by the source without importing extra claims.
