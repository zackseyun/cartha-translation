id: 1CH.22.6
reference: 1 Chronicles 22:6
source:
  edition: WLC
  text: וַ/יִּקְרָ֖א לִ/שְׁלֹמֹ֣ה בְנ֑/וֹ וַ/יְצַוֵּ֨/הוּ֙ לִ/בְנ֣וֹת בַּ֔יִת לַ/יהוָ֖ה אֱלֹהֵ֥י יִשְׂרָאֵֽל׃ס
translation:
  text: Then he called for Solomon his son and commanded him to build a house for Yahweh, the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a temple for the LORD.' The Hebrew literally says 'a house for the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: Then he called for
  alternatives:
  - And he called
  - Then he summoned
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, and 'Then' gives natural English sequence. קרא with ל plus a person commonly means to call/summon someone. 'Called for' is idiomatic and fits the context of David summoning Solomon.
- source_word: לִשְׁלֹמֹה
  chosen: Solomon
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per translation philosophy.
- source_word: בְנוֹ
  chosen: his son
  alternatives:
  - his own son
  lexicon: HALOT
  rationale: The construct with pronominal suffix identifies Solomon as David's son. 'His son' is the natural English rendering and preserves the familial relationship without unnecessary expansion.
- source_word: וַיְצַוֵּהוּ
  chosen: and commanded him
  alternatives:
  - and charged him
  - and instructed him
  lexicon: HALOT
  rationale: צוה often denotes giving a command or charge. 'Commanded him' best preserves the authoritative force in straightforward modern English; 'charged' is possible but slightly more formal and less immediately clear.
- source_word: לִבְנוֹת
  chosen: to build
  lexicon: HALOT
  rationale: 'Infinitive construct of בנה following צוה expresses the content of the command: ''to build.'''
- source_word: בַּיִת
  chosen: a house
  alternatives:
  - a temple
  lexicon: HALOT
  rationale: בית literally means 'house.' In this context it refers to the temple, but the Hebrew uses the ordinary term 'house,' and retaining it preserves the source wording while still being understandable in context. The more interpretive 'temple' is worth preserving as an alternative.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - to the LORD
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition ל here can be rendered 'for' in the sense of building a house dedicated to YHWH; this is idiomatic in English for temple-building contexts.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: This construct phrase identifies the LORD specifically as Israel's God. 'The God of Israel' is the standard and precise rendering.
