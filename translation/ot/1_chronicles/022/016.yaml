id: 1CH.22.16
reference: 1 Chronicles 22:16
source:
  edition: WLC
  text: לַ/זָּהָ֥ב לַ/כֶּ֛סֶף וְ/לַ/נְּחֹ֥שֶׁת וְ/לַ/בַּרְזֶ֖ל אֵ֣ין מִסְפָּ֑ר ק֣וּם
    וַ/עֲשֵׂ֔ה וִ/יהִ֥י יְהוָ֖ה עִמָּֽ/ךְ׃
translation:
  text: For the gold, the silver, the bronze, and the iron, there is no number. Rise
    up and work, and may the LORD be with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'there is no counting' / 'they are beyond counting.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'bronze'; 'copper' is also possible for the metal term in some contexts.
    reason: lexical_alternative
  - marker: c
    text: Or, 'and the LORD will be with you' or 'and let the LORD be with you.' The
      Hebrew form can express a wish or blessing.
    reason: alternative_reading
lexical_decisions:
- source_word: לַזָּהָב לַכֶּסֶף וְלַנְּחֹשֶׁת וְלַבַּרְזֶל
  chosen: For the gold, the silver, the bronze, and the iron
  alternatives:
  - As for the gold, the silver, the bronze, and the iron
  - Gold, silver, bronze, and iron
  lexicon: HALOT
  rationale: The prefixed ל on each noun is best taken as topical/as for-regarding
    rather than strictly directional. 'For the gold...' preserves the resumptive,
    list-like force from the previous context about temple materials.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In material lists of ancient construction and cultic furnishing, נְחֹשֶׁת
    commonly refers to bronze as the practical alloy in view, though 'copper' is a
    possible lexical alternative.
- source_word: אֵין מִסְפָּר
  chosen: there is no number
  alternatives:
  - they are beyond counting
  - there is no counting
  lexicon: HALOT
  rationale: This idiom states innumerability. 'There is no number' is a relatively
    formal but still clear rendering that preserves the Hebrew expression without
    over-paraphrasing.
- source_word: קוּם
  chosen: Rise up
  alternatives:
  - Arise
  - Get up
  lexicon: HALOT
  rationale: Imperative of קום here functions as an exhortation to action. 'Rise up'
    keeps the elevated tone and the sequential force before the next imperative.
- source_word: וַעֲשֵׂה
  chosen: and work
  alternatives:
  - and do it
  - and act
  lexicon: HALOT
  rationale: In this context of building preparations, עשה is best rendered concretely
    as 'work' rather than the overly broad 'do,' making the exhortation natural in
    English while staying within the semantic range.
- source_word: וִיהִי יְהוָה עִמָּךְ
  chosen: and may the LORD be with you
  alternatives:
  - and the LORD will be with you
  - and let the LORD be with you
  lexicon: HALOT
  rationale: The jussive form expresses a wish/blessing rather than a simple future.
    Per doctrine, יְהוָה is rendered 'the LORD.' 'Be with you' is the standard idiomatic
    rendering of עִם.
