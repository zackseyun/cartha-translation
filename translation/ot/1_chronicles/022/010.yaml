id: 1CH.22.10
reference: 1 Chronicles 22:10
source:
  edition: WLC
  text: הֽוּא יִבְנֶ֥ה בַ֨יִת֙ לִ/שְׁמִ֔/י וְ/הוּא֙ יִהְיֶה לִּ֣/י לְ/בֵ֔ן וַ/אֲנִי
    ל֖/וֹ לְ/אָ֑ב וַ/הֲכִ֨ינוֹתִ֜י כִּסֵּ֧א מַלְכוּת֛/וֹ עַל יִשְׂרָאֵ֖ל עַד עוֹלָֽם־־־־־׃
translation:
  text: He will build a house for my name, and he will be a son to me, and I will
    be a father to him, and I will establish the throne of his kingdom over Israel
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'temple for my name.' The Hebrew reads literally 'house for my name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיִת
  chosen: house
  alternatives:
  - temple
  lexicon: HALOT
  rationale: The basic sense is 'house.' In this context it refers to the temple,
    but 'house for my name' preserves the Hebrew expression and avoids over-interpreting
    the metaphor in the main text.
- source_word: לִשְׁמִי
  chosen: for my name
  alternatives:
  - for the sake of my name
  - in honor of my name
  lexicon: HALOT
  rationale: The phrase is a standard Hebrew idiom for something dedicated to God's
    name/presence. 'For my name' is the most direct and preserves the covenantal-theological
    wording.
- source_word: לְבֵן
  chosen: a son
  alternatives:
  - son
  lexicon: HALOT
  rationale: 'The predicate with ל marks relationship: ''he will be a son to me.''
    The indefinite English article is natural in this construction and does not weaken
    the covenantal force.'
- source_word: לְאָב
  chosen: a father
  alternatives:
  - father
  lexicon: HALOT
  rationale: Parallel to 'a son to me'; the English article makes the relational predicate
    idiomatic while preserving the adoption/covenant formula.
- source_word: וַהֲכִינוֹתִי
  chosen: I will establish
  alternatives:
  - I will make firm
  - I will confirm
  lexicon: HALOT
  rationale: From כון in the Hiphil, conveying making firm or establishing. 'Establish'
    is standard, clear English for dynastic stability.
- source_word: כִּסֵּא מַלְכוּתוֹ
  chosen: the throne of his kingdom
  alternatives:
  - his royal throne
  - the throne of his kingship
  lexicon: HALOT
  rationale: A fairly literal rendering preserves both 'throne' and 'kingdom/kingship,'
    maintaining the dynastic and royal dimensions of the promise.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: עַל with royal rule is naturally 'over,' indicating dominion or reign.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - unto the age
  lexicon: HALOT
  rationale: The phrase denotes enduring perpetuity. 'Forever' is idiomatic modern
    English and preserves the force of the promise.
