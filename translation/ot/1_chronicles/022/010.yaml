theological_decisions:
- issue: Father-son covenant formula applied to Solomon and typologically relevant
    to the Davidic messianic promise
  chosen_reading: 'Retain the relational language straightforwardly: ''he will be
    a son to me, and I will be a father to him.'''
  alternative_readings:
  - Paraphrastic renderings that weaken the filial formula, such as 'I will treat
    him like a son'
  rationale: The Hebrew states the covenant relationship directly. Preserving the
    formula maintains both its immediate reference to Solomon and its broader canonical
    significance without importing later doctrinal conclusions into the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
