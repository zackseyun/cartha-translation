id: 1CH.22.17
reference: 1 Chronicles 22:17
source:
  edition: WLC
  text: וַ/יְצַ֤ו דָּוִיד֙ לְ/כָל שָׂרֵ֣י יִשְׂרָאֵ֔ל לַ/עְזֹ֖ר לִ/שְׁלֹמֹ֥ה בְנֽ/וֹ־׃
translation:
  text: 'Then David commanded all the leaders of Israel to help Solomon his son:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְצַו
  chosen: Then ... commanded
  alternatives:
  - And ... commanded
  - gave orders to
  lexicon: HALOT
  rationale: Wayyiqtol of צוה advances the narrative; 'commanded' best preserves the
    force of an authoritative directive. 'Then' reflects the sequential narrative
    sense of waw-consecutive in readable English.
- source_word: שָׂרֵי
  chosen: leaders
  alternatives:
  - officials
  - princes
  - chiefs
  lexicon: HALOT
  rationale: שָׂרִים denotes ruling officials or leaders. 'Leaders' is clear modern
    English and fits the broad administrative sense better than the archaic 'princes.'
- source_word: לְכָל שָׂרֵי יִשְׂרָאֵל
  chosen: all the leaders of Israel
  alternatives:
  - all Israel's leaders
  - all the officials of Israel
  lexicon: HALOT
  rationale: The phrase is straightforwardly inclusive of the national leadership.
    'Of Israel' preserves the genitival relation without over-specifying office.
- source_word: לַעְזֹר
  chosen: to help
  alternatives:
  - to assist
  - to support
  lexicon: HALOT
  rationale: The infinitive of עזר means 'to help/assist.' 'Help' is the most natural
    and direct rendering in modern English.
- source_word: לִשְׁלֹמֹה בְנוֹ
  chosen: Solomon his son
  alternatives:
  - his son Solomon
  - to Solomon, his son
  lexicon: HALOT
  rationale: The Hebrew places the indirect object before the appositional filial
    identifier. 'Solomon his son' is natural in English and preserves the relationship
    emphasized in context.
