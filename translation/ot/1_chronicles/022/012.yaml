theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of וִיצַוְּךָ עַל יִשְׂרָאֵל in royal context
  chosen_reading: appoint you over Israel
  alternative_readings:
  - command you concerning Israel
  - give you charge over Israel
  rationale: This avoids an awkward reading in which God merely 'commands' Solomon
    about Israel; the broader context is David's charge concerning Solomon's rule
    and temple-building. The chosen rendering preserves the idea of divine commissioning
    without overstating theology beyond the syntax.
