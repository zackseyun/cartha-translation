id: 1CH.22.12
reference: 1 Chronicles 22:12
source:
  edition: WLC
  text: אַ֣ךְ יִֽתֶּן לְּ/ךָ֤ יְהוָה֙ שֵׂ֣כֶל וּ/בִינָ֔ה וִֽ/יצַוְּ/ךָ֖ עַל יִשְׂרָאֵ֑ל
    וְ/לִ/שְׁמ֕וֹר אֶת תּוֹרַ֖ת יְהוָ֥ה אֱלֹהֶֽי/ךָ־־־׃
translation:
  text: Only, may the LORD give you insight and understanding, and appoint you over
    Israel, so that you may keep the law of the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'give you charge over Israel'; the Hebrew verb can also be understood
      as 'command you concerning Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the instruction of the LORD your God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Only
  alternatives:
  - Surely
  - Indeed
  - But
  lexicon: HALOT
  rationale: Here אַךְ functions as a limiting or focusing particle introducing David's
    wish/prayer for Solomon. 'Only' preserves the sense 'above all/just this' better
    than a simple adversative 'but.'
- source_word: יִתֶּן
  chosen: may ... give
  alternatives:
  - will give
  - let ... give
  lexicon: HALOT
  rationale: Though morphologically imperfect 3ms, in context it expresses a wish
    or benediction. English 'may the LORD give' best captures the jussive-like force
    in natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH.
- source_word: שֵׂכֶל
  chosen: insight
  alternatives:
  - prudence
  - discretion
  - understanding
  lexicon: HALOT
  rationale: שֵׂכֶל often denotes practical wisdom or good sense. 'Insight' pairs
    well with בינה without collapsing the two into identical English terms.
- source_word: בִינָה
  chosen: understanding
  alternatives:
  - discernment
  - intelligence
  lexicon: HALOT
  rationale: בינה commonly refers to discernment or understanding. 'Understanding'
    is clear, idiomatic, and distinct enough from 'insight' to preserve the Hebrew
    pairing.
- source_word: וִיצַוְּךָ עַל יִשְׂרָאֵל
  chosen: appoint you over Israel
  alternatives:
  - command you concerning Israel
  - give you charge over Israel
  lexicon: HALOT
  rationale: The verb צוה usually means 'command,' but with עַל plus a people in royal
    context it can carry the sense of commissioning or placing in authority. 'Appoint
    you over Israel' fits the context of Solomon's kingship and yields coherent syntax
    with the following infinitive.
- source_word: וְלִשְׁמוֹר
  chosen: so that you may keep
  alternatives:
  - and to keep
  - to keep
  - that you may observe
  lexicon: HALOT
  rationale: The prefixed conjunction plus infinitive expresses purpose/result linked
    to the appointment/commission. 'So that you may keep' makes the relationship explicit
    in natural English.
- source_word: תּוֹרַת
  chosen: the law of
  alternatives:
  - the instruction of
  lexicon: HALOT
  rationale: תורה can mean 'instruction,' but in covenantal context with YHWH as giver,
    'law' remains the most recognizable and contextually fitting rendering, while
    not excluding its instructional force.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward covenantal designation with second masculine singular
    suffix addressed to Solomon.
