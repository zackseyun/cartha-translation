id: 1CH.22.15
reference: 1 Chronicles 22:15
source:
  edition: WLC
  text: וְ/עִמְּ/ךָ֤ לָ/רֹב֙ עֹשֵׂ֣י מְלָאכָ֔ה חֹצְבִ֕ים וְ/חָרָשֵׁ֥י אֶ֖בֶן וָ/עֵ֑ץ
    וְ/כָל חָכָ֖ם בְּ/כָל מְלָאכָֽה־־׃
translation:
  text: 'And with you in abundance are workers for the task: stonecutters and craftsmen
    of stone and wood, and every skilled man for every kind of work.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and every skilled worker.' The Hebrew is literally masculine singular,
      'every skilled man,' used here in a representative sense for skilled laborers.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעִמְּךָ
  chosen: And with you
  alternatives:
  - And there are with you
  - Now with you
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'and with you.' Retaining it
    preserves the direct address to Solomon and the connective force from the previous
    verse.
- source_word: לָרֹב
  chosen: in abundance
  alternatives:
  - in great number
  - many
  lexicon: HALOT
  rationale: The phrase conveys plentiful quantity. 'In abundance' is idiomatic modern
    English and fits the construction with what follows.
- source_word: עֹשֵׂי מְלָאכָה
  chosen: workers for the task
  alternatives:
  - workers for the work
  - workmen
  - those who do the work
  lexicon: HALOT
  rationale: The participle plus noun denotes people engaged in labor. 'Workers' is
    natural English; 'task' avoids awkward repetition with the later מְלָאכָה while
    still reflecting the concrete project context.
- source_word: חֹצְבִים
  chosen: stonecutters
  alternatives:
  - hewers
  - cutters
  lexicon: HALOT
  rationale: In this building context, the participle refers to those who cut stone.
    'Stonecutters' makes the implied object explicit from context and is clearer than
    the archaic 'hewers.'
- source_word: וְחָרָשֵׁי אֶבֶן וָעֵץ
  chosen: craftsmen of stone and wood
  alternatives:
  - artisans in stone and wood
  - workers in stone and wood
  lexicon: HALOT
  rationale: חָרָשׁ commonly denotes a skilled craftsman. 'Craftsmen of stone and
    wood' preserves the genitive relationship and the skilled-trade nuance.
- source_word: וְכָל חָכָם
  chosen: and every skilled man
  alternatives:
  - and every wise man
  - and every skilled worker
  lexicon: HALOT
  rationale: חָכָם here refers to practical skill rather than abstract wisdom. Because
    the Hebrew is grammatically masculine singular with representative force, 'man'
    is retained per the gender-accurate policy; 'skilled' captures the vocational
    sense in context.
- source_word: בְּכָל מְלָאכָה
  chosen: for every kind of work
  alternatives:
  - in every work
  - for every task
  lexicon: HALOT
  rationale: The phrase indicates competence across the range of labor needed. 'Every
    kind of work' expresses the distributive sense naturally in English.
