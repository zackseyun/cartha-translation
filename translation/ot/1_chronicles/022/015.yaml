theological_decisions:
- issue: Gendered language in חָכָם
  chosen_reading: and every skilled man
  alternative_readings:
  - and every skilled worker
  - and every wise person
  rationale: The Hebrew uses a grammatically masculine singular adjective functioning
    representatively. Following the stated gender-accurate policy, the translation
    keeps 'man' rather than neutralizing it, while the context clearly refers to the
    available skilled labor force generally.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
