id: 1CH.22.19
reference: 1 Chronicles 22:19
source:
  edition: WLC
  text: עַתָּ֗ה תְּנ֤וּ לְבַבְ/כֶם֙ וְ/נַפְשְׁ/כֶ֔ם לִ/דְר֖וֹשׁ לַ/יהוָ֣ה אֱלֹהֵי/כֶ֑ם
    וְ/ק֗וּמוּ וּ/בְנוּ֙ אֶת מִקְדַּשׁ֙ יְהוָ֣ה הָֽ/אֱלֹהִ֔ים לְ/הָבִ֞יא אֶת אֲר֣וֹן
    בְּרִית יְהוָ֗ה וּ/כְלֵי֙ קֹ֣דֶשׁ הָֽ/אֱלֹהִ֔ים לַ/בַּ֖יִת הַ/נִּבְנֶ֥ה לְ/שֵׁם
    יְהוָֽה־־־־׃פ
translation:
  text: Now set your heart and your soul to seek the LORD your God. Rise up and build
    the sanctuary of the LORD God, to bring the ark of the covenant of the LORD and
    the holy vessels of God into the house that is to be built for the name of the
    LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'give your heart and your soul' to seek the LORD your
      God.
    reason: lexical_alternative
  - marker: b
    text: '''House'' here refers to the temple building to be constructed for the
      LORD''s name.'
    reason: cultural_note
lexical_decisions:
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - So now
  - At this time
  lexicon: HALOT
  rationale: Temporal/discourse marker introducing an urgent exhortation; 'Now' is
    natural and sufficiently direct.
- source_word: תְּנוּ לְבַבְכֶם וְנַפְשְׁכֶם
  chosen: set your heart and your soul
  alternatives:
  - give your heart and your soul
  - devote your heart and your soul
  lexicon: HALOT
  rationale: Literally 'give your heart and your soul.' In English, 'set' idiomatically
    conveys deliberate resolve while preserving the dual inner faculties rather than
    collapsing them into a single abstract idea.
- source_word: לְבָב / נֶפֶשׁ
  chosen: heart and soul
  alternatives:
  - mind and soul
  - inner being
  lexicon: HALOT
  rationale: Retains the Hebrew anthropological pair without over-interpreting. 'Heart'
    in Hebrew includes will/intention; 'soul' preserves נפשׁ rather than flattening
    to 'life' or 'self' here.
- source_word: לִדְרוֹשׁ
  chosen: to seek
  alternatives:
  - to inquire of
  - to pursue
  lexicon: HALOT
  rationale: דרשׁ with God commonly means to seek him, often with devotion and dependence.
    'Seek' is the standard and best contextual rendering here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: 'Straightforward possessive construction following the divine name: ''the
    LORD your God.'''
- source_word: וְקוּמוּ
  chosen: Rise up
  alternatives:
  - Arise
  - Get up
  lexicon: HALOT
  rationale: Imperative of קום in exhortation. 'Rise up' preserves the elevated tone
    without sounding archaic.
- source_word: וּבְנוּ
  chosen: and build
  alternatives:
  - then build
  lexicon: HALOT
  rationale: Simple imperative continuation; 'and build' reflects the coordination
    of the Hebrew commands.
- source_word: מִקְדַּשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the temple sanctuary
  lexicon: HALOT
  rationale: מקדשׁ denotes a holy sanctuary. 'Sanctuary' is more precise than 'temple'
    here, since the following phrase speaks of the house to be built.
- source_word: יְהוָה הָאֱלֹהִים
  chosen: the LORD God
  alternatives:
  - the LORD, God
  lexicon: HALOT
  rationale: Standard rendering of the compound divine designation in English.
- source_word: לְהָבִיא
  chosen: to bring
  alternatives:
  - in order to bring
  lexicon: HALOT
  rationale: Infinitive of purpose explaining why the sanctuary/house is to be built.
- source_word: אֲרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  lexicon: HALOT
  rationale: Formal rendering that preserves the genitival chain clearly and naturally.
- source_word: וּכְלֵי קֹדֶשׁ הָאֱלֹהִים
  chosen: and the holy vessels of God
  alternatives:
  - and the holy furnishings of God
  - and God's holy articles
  lexicon: HALOT
  rationale: כְּלִים are objects/utensils used in worship. 'Vessels' is traditional
    but still understandable in this cultic context; 'holy' renders the genitive קֹדֶשׁ.
- source_word: לַבַּיִת
  chosen: into the house
  alternatives:
  - into the temple
  - to the house
  lexicon: HALOT
  rationale: בית here refers to the temple building. 'House' preserves the Hebrew
    term and its theological resonance as the LORD's house.
- source_word: הַנִּבְנֶה
  chosen: that is to be built
  alternatives:
  - being built
  - which will be built
  lexicon: HALOT
  rationale: The participle is prospective in this context, referring to the planned
    structure rather than an already ongoing process.
- source_word: לְשֵׁם יְהוָה
  chosen: for the name of the LORD
  alternatives:
  - for the LORD's name
  - in honor of the name of the LORD
  lexicon: HALOT
  rationale: Preserves the important biblical idiom of building for the divine name
    without paraphrasing away its theological significance.
