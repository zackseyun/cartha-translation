theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render YHWH as 'the LORD,' following the stated
    doctrine and translation policy. This also fits the repeated covenant-name usage
    in the verse.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Anthropological pair 'heart and soul'
  chosen_reading: Retained both terms explicitly
  alternative_readings:
  - collapsed to 'whole being'
  - rendered as 'mind and heart'
  rationale: The Hebrew uses two inner-faculty terms to intensify total devotion.
    Preserving both maintains the text's theological and rhetorical force without
    importing a technical anthropology.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
