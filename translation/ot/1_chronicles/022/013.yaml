id: 1CH.22.13
reference: 1 Chronicles 22:13
source:
  edition: WLC
  text: אָ֣ז תַּצְלִ֔יחַ אִם תִּשְׁמ֗וֹר לַ/עֲשׂוֹת֙ אֶת הַֽ/חֻקִּ֣ים וְ/אֶת הַ/מִּשְׁפָּטִ֔ים אֲשֶׁ֨ר צִוָּ֧ה יְהוָ֛ה אֶת מֹשֶׁ֖ה עַל יִשְׂרָאֵ֑ל חֲזַ֣ק וֶ/אֱמָ֔ץ אַל תִּירָ֖א וְ/אַל תֵּחָֽת־־־־־־־׃
translation:
  text: Then you will prosper, if you are careful to do the statutes and the judgments that Yahweh commanded Moses for Israel. Be strong and courageous. Do not fear, and do not be dismayed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will succeed.' The Hebrew verb can denote either prospering or succeeding.
    reason: lexical_alternative
  - marker: b
    text: Or 'the decrees and the ordinances.' The two Hebrew legal terms are distinct and are preserved with separate English renderings.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Marks the result or consequent state following the preceding exhortation; 'Then' is the most natural English connective here.
- source_word: תַּצְלִיחַ
  chosen: you will prosper
  alternatives:
  - you will succeed
  - you will have success
  lexicon: HALOT
  rationale: Hiphil of צלח commonly conveys prospering/succeeding. 'Prosper' fits the covenantal-obedience context without reducing the sense merely to achievement.
- source_word: אִם תִּשְׁמֹר לַעֲשׂוֹת
  chosen: if you are careful to do
  alternatives:
  - if you keep to do
  - if you observe to do
  - if you take care to do
  lexicon: HALOT
  rationale: The idiom combines 'keep/guard' with an infinitive of doing, expressing careful observance. 'Are careful to do' captures both attentiveness and obedience in idiomatic English.
- source_word: הַחֻקִּים
  chosen: the statutes
  alternatives:
  - the decrees
  - the ordinances
  lexicon: HALOT
  rationale: A standard rendering for חֻקִּים in legal contexts; preserves distinction from מִשְׁפָּטִים.
- source_word: הַמִּשְׁפָּטִים
  chosen: the judgments
  alternatives:
  - the rules
  - the ordinances
  - the judgments/justice requirements
  lexicon: HALOT
  rationale: Retains the legal/judicial nuance and preserves distinction from 'statutes.' Though 'rules' is smoother, 'judgments' better reflects the Hebrew term's semantic range in Torah contexts.
- source_word: אֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה עַל יִשְׂרָאֵל
  chosen: that the LORD commanded Moses for Israel
  alternatives:
  - that the LORD commanded Moses concerning Israel
  - that the LORD commanded through Moses for Israel
  lexicon: HALOT
  rationale: The preposition עַל here is best rendered in context as 'for' or 'concerning.' 'For Israel' communicates that these commands were given with Israel as their intended sphere/recipient. The direct-object construction indicates Moses as the one commanded.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: חֲזַק וֶאֱמָץ
  chosen: Be strong and courageous
  alternatives:
  - Be strong and resolute
  - Be strong and bold
  lexicon: HALOT
  rationale: This is a conventional exhortation formula in Hebrew narrative. 'Courageous' best captures the sense of אמץ in this pairing and is familiar without being archaic.
- source_word: אַל תִּירָא
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: A direct and natural rendering of the prohibition; concise and faithful.
- source_word: וְאַל תֵּחָת
  chosen: and do not be dismayed
  alternatives:
  - and do not be discouraged
  - and do not be shattered
  lexicon: HALOT
  rationale: The Niphal/jussive form of חתת conveys being broken down, dismayed, or discouraged. 'Dismayed' preserves the gravity and matches the exhortational context.
