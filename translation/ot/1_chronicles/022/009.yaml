id: 1CH.22.9
reference: 1 Chronicles 22:9
source:
  edition: WLC
  text: הִנֵּה בֵ֞ן נוֹלָ֣ד לָ֗/ךְ ה֤וּא יִהְיֶה֙ אִ֣ישׁ מְנוּחָ֔ה וַ/הֲנִח֥וֹתִי
    ל֛/וֹ מִ/כָּל אוֹיְבָ֖י/ו מִ/סָּבִ֑יב כִּ֤י שְׁלֹמֹה֙ יִהְיֶ֣ה שְׁמ֔/וֹ וְ/שָׁל֥וֹם
    וָ/שֶׁ֛קֶט אֶתֵּ֥ן עַל יִשְׂרָאֵ֖ל בְּ/יָמָֽי/ו־־־׃
translation:
  text: Behold, a son will be born to you. He will be a man of rest, and I will give
    him rest from all his enemies all around; for Solomon will be his name, and I
    will give peace and quiet to Israel in his days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his name will be Solomon.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew links 'Solomon' with 'peace' (shalom), and also speaks of him
      as a 'man of rest.'
    reason: cultural_note
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the deictic, attention-directing force of the Hebrew. 'Behold'
    is slightly formal but still natural in prophetic/divine speech and preserves
    the solemn announcement better than a flatter 'look' or 'see'.
- source_word: בֵן
  chosen: a son
  alternatives:
  - son
  lexicon: HALOT
  rationale: Indefinite in English because the clause introduces the promised child.
    'A son' is idiomatic and reflects the Hebrew noun without over-specification.
- source_word: נוֹלָד
  chosen: will be born
  alternatives:
  - is born
  - has been born
  lexicon: HALOT
  rationale: Although morphologically a participle/passive form, in context of divine
    promise it points to a future event. English future best captures the sense in
    context.
- source_word: לָךְ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The dative marks the son as born to David. 'To you' is the most direct
    and idiomatic rendering.
- source_word: אִישׁ מְנוּחָה
  chosen: a man of rest
  alternatives:
  - a man of peace
  - a man of repose
  lexicon: HALOT
  rationale: Formal rendering preserves the lexical link with the following verb from
    נוח ('give rest') and with the name explanation involving Solomon/shalom. 'Man
    of peace' would anticipate the later שָׁלוֹם rather than translate מְנוּחָה directly.
- source_word: וַהֲנִחוֹתִי לוֹ
  chosen: and I will give him rest
  alternatives:
  - and I will grant him rest
  - and I will cause him to rest
  lexicon: HALOT
  rationale: Chosen to preserve the wordplay and thematic repetition with מְנוּחָה.
    'Give him rest' is natural English and communicates divine granting of security.
- source_word: מִכָּל אֹיְבָיו מִסָּבִיב
  chosen: from all his enemies all around
  alternatives:
  - from all his surrounding enemies
  - from all his enemies on every side
  lexicon: HALOT
  rationale: Keeps both the totality ('all') and the encircling sense of מִסָּבִיב.
    'All around' is readable modern English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding promise and the significance
    of the name. 'For' fits the explanatory flow.
- source_word: שְׁלֹמֹה יִהְיֶה שְׁמוֹ
  chosen: Solomon will be his name
  alternatives:
  - his name will be Solomon
  lexicon: HALOT
  rationale: This order preserves some of the Hebrew emphasis on the name while remaining
    intelligible English. It also keeps the explanatory connection to שָׁלוֹם audible.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: וְשָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  lexicon: HALOT
  rationale: Standard rendering that preserves the lexical connection with the name
    Solomon and the broader biblical sense of shalom.
- source_word: וָשֶׁקֶט
  chosen: quiet
  alternatives:
  - tranquility
  - rest
  lexicon: HALOT
  rationale: Rendered distinctly from שָׁלוֹם and from the earlier מְנוּחָה/'rest'
    to avoid collapsing separate Hebrew terms. 'Quiet' conveys calm security in accessible
    English.
- source_word: אֶתֵּן עַל יִשְׂרָאֵל
  chosen: I will give ... to Israel
  alternatives:
  - I will place ... upon Israel
  lexicon: HALOT
  rationale: Although עַל is literally 'upon,' English idiom with 'give' prefers 'to
    Israel.' This is an optimal-equivalence adjustment for readability without loss
    of meaning.
- source_word: בְּיָמָיו
  chosen: in his days
  alternatives:
  - during his days
  - in his lifetime
  lexicon: HALOT
  rationale: Traditional but still clear English for the temporal phrase, preserving
    the biblical cadence and meaning.
