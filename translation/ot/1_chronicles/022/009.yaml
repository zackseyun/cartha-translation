theological_decisions:
- issue: Name-explanation and thematic linkage between rest, Solomon, and peace
  chosen_reading: Preserve the lexical links by rendering מְנוּחָה as 'rest' and שָׁלוֹם
    as 'peace,' while transliterating the name as 'Solomon.'
  alternative_readings:
  - Render אִישׁ מְנוּחָה as 'man of peace' for smoother thematic alignment
  rationale: The verse intentionally links the son's character and reign with rest
    and peace, and also explains his name. Translating the common nouns distinctly
    but transparently preserves the Hebrew wordplay without forcing the name into
    translation.
  doctrine_reference: Translation philosophy §§2, 5
