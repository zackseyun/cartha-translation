id: 1CH.22.3
reference: 1 Chronicles 22:3
source:
  edition: WLC
  text: וּ/בַרְזֶ֣ל לָ֠/רֹב לַֽ/מִּסְמְרִ֞ים לְ/דַלְת֧וֹת הַ/שְּׁעָרִ֛ים וְ/לַֽ/מְחַבְּר֖וֹת
    הֵכִ֣ין דָּוִ֑יד וּ/נְחֹ֥שֶׁת לָ/רֹ֖ב אֵ֥ין מִשְׁקָֽל׀׃
translation:
  text: And David prepared iron in abundance for the nails for the doors of the gates
    and for the fastenings, and bronze in abundance beyond weighing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hinges' for 'fastenings'; the Hebrew term is broader and refers generally
      to connecting or joining pieces.
    reason: lexical_alternative
  - marker: b
    text: Or 'too much to weigh' for 'beyond weighing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַרְזֶל
  chosen: iron
  alternatives:
  - metal
  lexicon: HALOT
  rationale: The noun straightforwardly denotes iron as a material. 'Iron' is the
    natural English equivalent in a construction listing building materials.
- source_word: לָרֹב
  chosen: in abundance
  alternatives:
  - in great quantity
  - abundantly
  lexicon: HALOT
  rationale: The phrase indicates large quantity. 'In abundance' is idiomatic and
    preserves the material-supply sense better than an adverb like 'abundantly.'
- source_word: מִּסְמְרִים
  chosen: nails
  alternatives:
  - pegs
  - spikes
  lexicon: HALOT
  rationale: In a construction context for doors and gates, 'nails' is the most natural
    rendering. 'Spikes' is possible but more interpretive; 'nails' keeps the term
    broad.
- source_word: דַלְתוֹת הַשְּׁעָרִים
  chosen: the doors of the gates
  alternatives:
  - the gate doors
  - the leaves of the gates
  lexicon: HALOT
  rationale: The construct phrase refers to the door-panels belonging to the gates.
    'The doors of the gates' is slightly more formal but transparent and close to
    the Hebrew structure.
- source_word: מְחַבְּרוֹת
  chosen: fastenings
  alternatives:
  - joints
  - fittings
  - hinges
  lexicon: HALOT
  rationale: The noun refers broadly to connecting or joining pieces in construction.
    'Fastenings' best captures the general sense without over-specifying the exact
    hardware. 'Hinges' is possible in context but too narrow; 'joints' may suggest
    structural seams rather than metal fittings.
- source_word: הֵכִין
  chosen: prepared
  alternatives:
  - made ready
  - provided
  lexicon: HALOT
  rationale: The verb commonly means to prepare or make ready. 'Prepared' fits the
    context of David assembling materials for temple construction.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In biblical material lists, נְחֹשֶׁת often refers to bronze as the usable
    alloy in construction and cultic contexts. 'Bronze' is the standard contextual
    rendering in English Bible translation.
- source_word: אֵין מִשְׁקָל
  chosen: beyond weighing
  alternatives:
  - without weight
  - there was no weighing
  - too much to weigh
  lexicon: HALOT
  rationale: The idiom conveys immeasurable quantity, not literal absence of weight.
    'Beyond weighing' is concise, idiomatic, and preserves the hyperbolic sense that
    the amount was too great to weigh.
