theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering of
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to render בֵּית יְהוָה הָאֱלֹהִים as 'house' or 'temple'
  chosen_reading: the house of the LORD God
  alternative_readings:
  - the temple of the LORD God
  rationale: Although the context concerns the temple site, the Hebrew text itself
    says 'house.' Preserving 'house' avoids importing a more interpretive architectural
    term and retains biblical-theological resonance.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy
    over translation tradition'
