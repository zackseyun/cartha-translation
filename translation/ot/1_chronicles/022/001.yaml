id: 1CH.22.1
reference: 1 Chronicles 22:1
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר דָּוִ֔יד זֶ֣ה ה֔וּא בֵּ֖ית יְהוָ֣ה הָ/אֱלֹהִ֑ים וְ/זֶה מִּזְבֵּ֥חַ
    לְ/עֹלָ֖ה לְ/יִשְׂרָאֵֽל־׃ס
translation:
  text: Then David said, “This is the house of the LORD God, and this is the altar
    for burnt offering for Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, “the temple of the LORD God.” Hebrew: “the house of the LORD God.”'
    reason: lexical_alternative
  - marker: b
    text: Or, “the altar for burnt offerings for Israel.” The Hebrew singular 'burnt
      offering' may be understood generically.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - and ... said
  - so ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence better than a bare 'and said.'
- source_word: דָּוִיד
  chosen: David
  rationale: Standard English transliteration of the personal name.
- source_word: זֶה הוּא
  chosen: This is
  alternatives:
  - This is the place of
  - Here is
  lexicon: HALOT
  rationale: The demonstrative plus pronoun gives emphatic identification. 'This is'
    preserves the direct deictic force without adding interpretive material such as
    'the place of.'
- source_word: בֵּית
  chosen: the house of
  alternatives:
  - the temple of
  lexicon: HALOT
  rationale: Hebrew literally says 'house of.' Although the referent is the future
    temple site, 'house of' preserves the source wording and its theological resonance;
    'temple' is interpretive and less formally tied to the Hebrew.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: 'Appositional to the divine name: ''the LORD God.'' This is the most
    natural and standard rendering in English.'
- source_word: מִּזְבֵּחַ
  chosen: altar
  lexicon: HALOT
  rationale: Standard rendering for the sacrificial structure denoted by the Hebrew
    noun.
- source_word: לְעֹלָה
  chosen: for burnt offering
  alternatives:
  - for burnt offerings
  - for the burnt offering
  lexicon: HALOT
  rationale: The singular noun can function collectively or generically. 'For burnt
    offering' is idiomatic and preserves the generic sacrificial sense without over-specifying
    number.
- source_word: לְיִשְׂרָאֵל
  chosen: for Israel
  alternatives:
  - belonging to Israel
  - for the people of Israel
  lexicon: HALOT
  rationale: The preposition marks relation/purpose with respect to the covenant people.
    'For Israel' is concise and faithful; expanding to 'the people of Israel' is possible
    but not necessary.
