id: 1CH.22.14
reference: 1 Chronicles 22:14
source:
  edition: WLC
  text: וְ/הִנֵּ֨ה בְ/עָנְיִ֜/י הֲכִינ֣וֹתִי לְ/בֵית יְהוָ֗ה זָהָ֞ב כִּכָּרִ֤ים מֵֽאָה אֶ֨לֶף֙ וְ/כֶ֗סֶף אֶ֤לֶף אֲלָפִים֙ כִּכָּרִ֔ים וְ/לַ/נְּחֹ֤שֶׁת וְ/לַ/בַּרְזֶל֙ אֵ֣ין מִשְׁקָ֔ל כִּ֥י לָ/רֹ֖ב הָיָ֑ה וְ/עֵצִ֤ים וַ/אֲבָנִים֙ הֲכִינ֔וֹתִי וַ/עֲלֵי/הֶ֖ם תּוֹסִֽיף־־׃
translation:
  text: Now behold, in my affliction I have prepared for the house of Yahweh one hundred thousand talents of gold, and one million talents of silver; and for the bronze and the iron there is no weight, for it was in abundance. I have prepared timber and stones, and you may add to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in my poverty.' The Hebrew can denote affliction, hardship, or poverty.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a thousand thousands.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and you shall add to them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְעָנְיִי
  chosen: in my affliction
  alternatives:
  - in my poverty
  - with great pains
  - through hardship
  lexicon: HALOT
  rationale: The noun עֳנִי commonly denotes affliction, misery, or hardship, and can in some contexts shade into poverty. Here David speaks of the difficulty under which he amassed materials, not merely his financial state, so 'in my affliction' best preserves the Hebrew while remaining natural. The alternative 'in my poverty' is possible and worth preserving in a footnote because some interpreters take it as self-abasement or relative lack.
- source_word: הֲכִינוֹתִי
  chosen: I have prepared
  alternatives:
  - I prepared
  - I have made ready
  lexicon: HALOT
  rationale: The Hiphil of כון here means to prepare or make ready. English present perfect fits the discourse well, presenting David's completed preparations with present relevance for Solomon.
- source_word: לְבֵית יְהוָה
  chosen: for the house of the LORD
  alternatives:
  - for the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In Chronicles it refers to the temple, but 'house of the LORD' preserves the Hebrew idiom and theological resonance. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving the traditional reverential rendering.
- source_word: כִּכָּרִים
  chosen: talents
  lexicon: HALOT
  rationale: כִּכָּר is a large unit of weight conventionally rendered 'talent.' This is the clearest established English equivalent for temple inventories.
- source_word: מֵאָה אֶלֶף
  chosen: one hundred thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number rendering.
- source_word: אֶלֶף אֲלָפִים
  chosen: one million
  alternatives:
  - a thousand thousand
  lexicon: HALOT
  rationale: The Hebrew literally reads 'a thousand thousands.' In contemporary English, 'one million' communicates the quantity clearly without loss of meaning; the more literal expression is preserved in a footnote as a lexical alternative.
- source_word: וְלַנְּחֹשֶׁת וְלַבַּרְזֶל אֵין מִשְׁקָל
  chosen: and for the bronze and the iron there is no weighing
  alternatives:
  - and the bronze and the iron are beyond weighing
  - and the bronze and the iron have no weight recorded
  lexicon: HALOT
  rationale: The clause literally says there is no weight/weighing for the bronze and iron. The sense is not that they are weightless, but that they were not weighed or could not be quantified because of their abundance. 'There is no weighing' preserves the Hebrew structure while remaining intelligible.
- source_word: כִּי לָרֹב הָיָה
  chosen: for it was in abundance
  alternatives:
  - for there was so much of it
  - because it was abundant
  lexicon: HALOT
  rationale: 'This explains why no weighing is given: the quantity was too great. Singular ''it'' reflects the collective sense of the metals just mentioned.'
- source_word: וְעֵצִים וַאֲבָנִים
  chosen: timber and stones also
  alternatives:
  - wood and stones also
  lexicon: HALOT
  rationale: עֵצִים can mean wood or timber. In a building context, 'timber' is more idiomatic and specific.
- source_word: וַעֲלֵיהֶם תּוֹסִיף
  chosen: and you may add to them
  alternatives:
  - and you shall add to them
  - and add to them
  lexicon: HALOT
  rationale: 'The Hiphil imperfect of יסף addressed to Solomon can be heard as either mild imperative or permissive future. ''You may add to them'' fits the context of David''s charge: he has prepared much, and Solomon can add more as needed. A more forceful imperative is possible and preserved in a footnote.'
