id: 1CH.22.5
reference: 1 Chronicles 22:5
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר דָּוִ֗יד שְׁלֹמֹ֣ה בְנִ/י֮ נַ֣עַר וָ/רָךְ֒ וְ/הַ/בַּ֜יִת לִ/בְנ֣וֹת
    לַ/יהוָ֗ה לְ/הַגְדִּ֨יל לְ/מַ֜עְלָ/ה לְ/שֵׁ֤ם וּ/לְ/תִפְאֶ֨רֶת֙ לְ/כָל הָ֣/אֲרָצ֔וֹת
    אָכִ֥ינָה נָּ֖א ל֑/וֹ וַ/יָּ֧כֶן דָּוִ֛יד לָ/רֹ֖ב לִ/פְנֵ֥י מוֹתֽ/וֹ׀־׃
translation:
  text: And David said, “My son Solomon is young and inexperienced, and the house
    to be built for the LORD must be made exceedingly great in fame and splendor in
    all lands. I will now make preparation for it.” So David made abundant preparations
    before his death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'young and tender.' The Hebrew adjective can denote softness or delicacy;
      here it likely refers to Solomon's immaturity or inexperience.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''the temple.'' Hebrew: ''the house.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'for renown and beauty' / 'for a name and for glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעַר
  chosen: young
  alternatives:
  - a youth
  - a boy
  lexicon: HALOT
  rationale: Here the term describes Solomon's relative youthfulness rather than strict
    childhood. 'Young' is natural modern English and fits the paired description with
    וָרָךְ.
- source_word: וָרָךְ
  chosen: inexperienced
  alternatives:
  - tender
  - delicate
  - immature
  lexicon: HALOT
  rationale: The adjective literally conveys tenderness/softness. In this context,
    paired with 'young' and explaining why David must prepare, it points to Solomon's
    lack of maturity/readiness rather than physical softness. 'Inexperienced' communicates
    the contextual sense in readable English.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: The Hebrew says 'the house.' Since the referent is the sanctuary for
    the LORD, 'temple' is possible, but 'house' preserves the source wording and its
    theological resonance while remaining clear in context.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - for Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: לְהַגְדִּיל לְמַעְלָה
  chosen: must be made exceedingly great
  alternatives:
  - must be made very great
  - must be magnified to the highest degree
  lexicon: HALOT
  rationale: The infinitive plus adverbial expression intensifies the scale of the
    building. 'Exceedingly great' captures the superlative force in idiomatic English.
- source_word: לְשֵׁם וּלְתִפְאֶרֶת
  chosen: in fame and splendor
  alternatives:
  - for renown and beauty
  - for a name and for glory
  lexicon: HALOT
  rationale: The phrase expresses the building's intended reputation and magnificence.
    'Fame and splendor' is idiomatic and preserves both public renown and visible
    grandeur.
- source_word: לְכָל הָאֲרָצוֹת
  chosen: in all lands
  alternatives:
  - throughout all countries
  - for all the earths/lands
  lexicon: HALOT
  rationale: The plural 'lands' refers to the nations/regions of the world. 'In all
    lands' is concise and natural, conveying international renown.
- source_word: אָכִינָה נָּא לוֹ
  chosen: I will now make preparation for it
  alternatives:
  - let me prepare for it
  - I will prepare for him/it now
  lexicon: HALOT
  rationale: The cohortative with נָא expresses David's resolve. The pronominal suffix
    likely refers to the house/project rather than Solomon personally in this context,
    so 'for it' is preferred. 'Now' reflects נָא here as an urgency particle.
- source_word: לָרֹב
  chosen: abundant preparations
  alternatives:
  - in great quantity
  - in abundance
  lexicon: HALOT
  rationale: The phrase indicates the large extent of David's preparations. Rendering
    the adverbial idea with 'abundant preparations' is smooth English and preserves
    the sense of quantity.
- source_word: לִפְנֵי מוֹתוֹ
  chosen: before his death
  alternatives:
  - before he died
  lexicon: HALOT
  rationale: A straightforward temporal expression; 'before his death' is slightly
    more formal and matches the narrative tone.
