theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render הַבַּיִת as 'house' or interpretively as 'temple'
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: The source text uses 'house,' and preserving that wording avoids importing
    a more interpretive term where the Hebrew itself is clear. Context already identifies
    it as the sanctuary for the LORD.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
