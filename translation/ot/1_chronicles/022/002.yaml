id: 1CH.22.2
reference: 1 Chronicles 22:2
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר דָּוִ֔יד לִ/כְנוֹס֙ אֶת הַ/גֵּרִ֔ים אֲשֶׁ֖ר בְּ/אֶ֣רֶץ יִשְׂרָאֵ֑ל
    וַ/יַּעֲמֵ֣ד חֹֽצְבִ֗ים לַ/חְצוֹב֙ אַבְנֵ֣י גָזִ֔ית לִ/בְנ֖וֹת בֵּ֥ית הָ/אֱלֹהִֽים־׃
translation:
  text: And David ordered the foreigners who were in the land of Israel to be gathered,
    and he appointed stonecutters to cut dressed stones for building the house of
    God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sojourners' or 'the resident aliens.' The Hebrew refers to non-Israelite
      residents living in the land.
    reason: lexical_alternative
  - marker: b
    text: Or 'cut stones' or 'hewn stones.'
    reason: lexical_alternative
  - marker: c
    text: That is, the temple.
    reason: cross_reference
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: ordered
  alternatives:
  - said
  - commanded
  lexicon: HALOT
  rationale: Although the verb is literally 'said,' in this construction with an infinitive
    ('to gather') it functions as an order or directive. 'Ordered' conveys the force
    in natural English better than a bare 'said.'
- source_word: לִכְנוֹס
  chosen: to be gathered
  alternatives:
  - to gather
  - to assemble
  lexicon: HALOT
  rationale: The infinitive expresses the content of David's directive. In English,
    passive wording ('to be gathered') best reflects that David is commanding others
    to collect these people, not personally gathering them himself.
- source_word: הַגֵּרִים
  chosen: the foreigners
  alternatives:
  - the sojourners
  - the resident aliens
  lexicon: HALOT
  rationale: גֵּרִים refers to non-native residents living among Israel. 'Foreigners'
    is clear modern English; 'sojourners' is more formal and potentially temporary,
    while 'resident aliens' is accurate but bureaucratic in tone.
- source_word: בְּאֶרֶץ יִשְׂרָאֵל
  chosen: in the land of Israel
  alternatives:
  - in Israel
  lexicon: HALOT
  rationale: Retaining 'land' reflects אֶרֶץ explicitly and suits the chronicler's
    territorial sense.
- source_word: וַיַּעֲמֵד
  chosen: he appointed
  alternatives:
  - he set
  - he stationed
  lexicon: HALOT
  rationale: In context the verb means to assign or install workers for a task. 'Appointed'
    communicates this administrative action clearly.
- source_word: חֹצְבִים
  chosen: stonecutters
  alternatives:
  - hewers
  - quarrymen
  lexicon: HALOT
  rationale: The participle denotes those who cut stone. 'Stonecutters' is natural
    modern English and specific to the context.
- source_word: לַחְצוֹב
  chosen: to cut
  alternatives:
  - to hew
  - to quarry
  lexicon: HALOT
  rationale: The infinitive repeats the same root as 'stonecutters.' 'To cut' is straightforward;
    'hew' is more traditional but less current.
- source_word: אַבְנֵי גָזִית
  chosen: dressed stones
  alternatives:
  - cut stones
  - hewn stones
  lexicon: HALOT
  rationale: This phrase refers to stones shaped for construction. 'Dressed stones'
    captures the prepared/finished sense better than the more generic 'cut stones.'
- source_word: לִבְנוֹת
  chosen: for building
  alternatives:
  - to build
  lexicon: HALOT
  rationale: Rendered with an English gerund after 'for' to produce smooth idiomatic
    syntax while preserving purpose.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - God's house
  - the temple of God
  lexicon: HALOT
  rationale: The Hebrew is literally 'house of God.' This preserves the source wording
    without prematurely substituting the interpretive term 'temple,' though the referent
    is the future temple.
