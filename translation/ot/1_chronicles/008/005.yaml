id: 1CH.8.5
reference: 1 Chronicles 8:5
source:
  edition: WLC
  text: וְ/גֵרָ֥א וּ/שְׁפוּפָ֖ן וְ/חוּרָֽם׃
translation:
  text: Gera, Shephuphan, and Huram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has the name form 'Shephuphan'; compare the alternative form 'Shupham'
      in related genealogical lists.
    reason: alternative_reading
  - marker: b
    text: Hebrew has 'Huram'; some English traditions use the variant 'Hiram' in other
      passages or name traditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֵרָא
  chosen: Gera
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the project policy to transliterate names.
- source_word: שְׁפוּפָן
  chosen: Shephuphan
  alternatives:
  - Shupham
  rationale: Proper personal name; transliterated directly from the consonantal/vocalized
    Hebrew here as Shephuphan. An alternative form appears in related genealogical
    traditions, but this verse's form is best represented by a close transliteration.
- source_word: חוּרָם
  chosen: Huram
  alternatives:
  - Hiram
  rationale: Proper personal name; transliterated from the Hebrew form Huram. 'Hiram'
    is a familiar anglicized variant in some contexts, but Huram more closely reflects
    the Hebrew spelling in this verse.
- source_word: וְ
  chosen: and
  rationale: The prefixed conjunction links the names in a simple list; in English,
    a comma-separated series with 'and' before the final item best conveys the structure.
