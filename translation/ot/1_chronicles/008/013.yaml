id: 1CH.8.13
reference: 1 Chronicles 8:13
source:
  edition: WLC
  text: וּ/בְרִעָ֣ה וָ/שֶׁ֔מַע הֵ֚מָּה רָאשֵׁ֣י הָ/אָב֔וֹת לְ/יוֹשְׁבֵ֖י אַיָּל֑וֹן
    הֵ֥מָּה הִבְרִ֖יחוּ אֶת י֥וֹשְׁבֵי גַֽת־׃
translation:
  text: And Beriah and Shema—they were heads of fathers’ houses for the inhabitants
    of Aijalon; they were the ones who drove out the inhabitants of Gath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'put to flight' / 'caused to flee.' The Hebrew verb emphasizes causing
      the inhabitants of Gath to flee; 'drove out' renders the likely result in context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'heads of fathers’ houses,' a clan-based family leadership expression.
    reason: cultural_note
lexical_decisions:
- source_word: וּבְרִעָה
  chosen: And Beriah
  alternatives:
  - Now Beriah
  - Beriah
  lexicon: HALOT
  rationale: Proper personal name; transliterated per translation philosophy. The
    prefixed conjunction is rendered 'And' to preserve the genealogical narrative
    flow.
- source_word: וָשֶׁמַע
  chosen: and Shema
  alternatives:
  - and Shama
  lexicon: HALOT
  rationale: Proper personal name; transliterated. 'Shema' follows a standard English
    transliteration of the Hebrew name.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - these
  lexicon: HALOT
  rationale: Independent pronoun used for emphasis. In English, the emphasis is represented
    naturally by the clause structure rather than by a wooden repetition alone.
- source_word: רָאשֵׁי הָאָבוֹת
  chosen: heads of fathers’ houses
  alternatives:
  - heads of ancestral houses
  - chief fathers
  - heads of families
  lexicon: HALOT
  rationale: This genealogical expression refers to clan/family heads. 'Heads of fathers’
    houses' preserves the Hebrew social structure more closely than the smoother but
    less precise 'heads of families.'
- source_word: לְיוֹשְׁבֵי אַיָּלוֹן
  chosen: for the inhabitants of Aijalon
  alternatives:
  - among the inhabitants of Aijalon
  - of the inhabitants of Aijalon
  lexicon: HALOT
  rationale: 'The preposition ל here is best taken in relation to leadership/responsibility:
    they were heads with respect to or for the inhabitants of Aijalon.'
- source_word: אַיָּלוֹן
  chosen: Aijalon
  alternatives:
  - Ayalon
  lexicon: HALOT
  rationale: Place name transliterated by standard convention.
- source_word: הֵמָּה
  chosen: they were the ones
  alternatives:
  - they
  - these
  lexicon: HALOT
  rationale: The second independent pronoun is emphatic before the verb. 'They were
    the ones' brings out the emphasis in idiomatic English.
- source_word: הִבְרִיחוּ
  chosen: drove out
  alternatives:
  - put to flight
  - caused to flee
  lexicon: HALOT
  rationale: Hiphil of ברח conveys causing someone to flee. 'Drove out' is natural
    English and fits the context of expelling inhabitants, while preserving the causative
    sense.
- source_word: אֶת יֹשְׁבֵי גַת
  chosen: the inhabitants of Gath
  alternatives:
  - those living in Gath
  - the residents of Gath
  lexicon: HALOT
  rationale: A straightforward rendering of the object phrase. 'Inhabitants' matches
    the earlier phrase and preserves lexical consistency.
