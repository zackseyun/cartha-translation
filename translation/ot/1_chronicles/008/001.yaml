id: 1CH.8.1
reference: 1 Chronicles 8:1
source:
  edition: WLC
  text: וּ/בִ֨נְיָמִ֔ן הוֹלִ֖יד אֶת בֶּ֣לַע בְּכֹר֑/וֹ אַשְׁבֵּל֙ הַ/שֵּׁנִ֔י וְ/אַחְרַ֖ח
    הַ/שְּׁלִישִֽׁי־׃
translation:
  text: Benjamin fathered Bela his firstborn, Ashbel the second, and Aharah the third.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has Aharah; some English versions read Ahrah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִנְיָמִן
  chosen: Benjamin
  alternatives:
  - Now Benjamin
  - And Benjamin
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention. The prefixed
    conjunction can be represented implicitly in English genealogy style; adding 'Now'
    or 'And' is possible but not necessary for natural modern English.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: In genealogical context, the Hiphil of ילד denotes begetting/fathering.
    'Fathered' is clear modern English and preserves the male genealogical sense better
    than the archaic 'begot'.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker has no standalone English equivalent and is represented
    by normal English word order.
- source_word: בֶּלַע
  chosen: Bela
  lexicon: HALOT
  rationale: Proper name transliterated conventionally.
- source_word: בְּכֹרוֹ
  chosen: his firstborn
  alternatives:
  - his first son
  - his eldest
  lexicon: HALOT
  rationale: '''Firstborn'' is the most direct rendering and preserves the birth-order
    terminology of the Hebrew.'
- source_word: אַשְׁבֵּל
  chosen: Ashbel
  lexicon: HALOT
  rationale: Proper name transliterated conventionally.
- source_word: הַשֵּׁנִי
  chosen: the second
  alternatives:
  - second
  lexicon: HALOT
  rationale: Ordinal with article is naturally rendered 'the second' in English, matching
    the list structure.
- source_word: וְאַחְרַח
  chosen: Aharah
  alternatives:
  - Ahrah
  lexicon: HALOT
  rationale: The consonantal form is best represented as 'Aharah' in line with the
    Hebrew spelling here. Some English traditions have 'Ahrah,' likely by harmonization
    or alternate vocalization; the translation follows the MT form of this verse.
- source_word: הַשְּׁלִישִׁי
  chosen: the third
  alternatives:
  - third
  lexicon: HALOT
  rationale: Ordinal with article is naturally rendered 'the third' in English, preserving
    the enumerated genealogy.
