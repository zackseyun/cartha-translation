id: 1CH.8.8
reference: 1 Chronicles 8:8
source:
  edition: WLC
  text: וְ/שַׁחֲרַ֗יִם הוֹלִיד֙ בִּ/שְׂדֵ֣ה מוֹאָ֔ב מִן שִׁלְח֖/וֹ אֹתָ֑/ם חוּשִׁ֥ים
    וְ/אֶֽת בַּעֲרָ֖א נָשָֽׁי/ו־־׃
translation:
  text: And Shaharaim fathered children in the country of Moab after he sent away
    Hushim and Baara, his wives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the field/territory of Moab.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'from his sending them away'; the phrase likely means 'after he
      sent away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/שַׁחֲרַיִם
  chosen: And Shaharaim
  alternatives:
  - Now Shaharaim
  lexicon: HALOT
  rationale: וְ here links the verse to the genealogy; 'And' preserves the narrative-genealogical
    flow. The personal name is transliterated per project policy.
- source_word: הוֹלִיד
  chosen: fathered children
  alternatives:
  - became the father of
  - fathered
  lexicon: HALOT
  rationale: In genealogical contexts ילד in the Hiphil commonly means to beget/father.
    'Fathered children' is natural English while preserving the genealogical sense
    without supplying specific offspring not named until the next verse.
- source_word: בִּ/שְׂדֵה מוֹאָב
  chosen: in the country of Moab
  alternatives:
  - in the field of Moab
  - in the territory of Moab
  lexicon: HALOT
  rationale: שָׂדֶה literally means 'field,' but in geographical expressions it can
    denote open country/territory. 'Country of Moab' best fits idiomatic English and
    the apparent geographical sense.
- source_word: מִן שִׁלְח/וֹ אֹתָם
  chosen: after he sent away
  alternatives:
  - from his sending away of them
  - when he sent them away
  lexicon: HALOT
  rationale: 'The preposition מִן with the infinitive construct of שלח marks a temporal
    circumstance: ''after/from when he sent away.'' English idiom favors ''after he
    sent away.'' The object ''them'' is represented by the following apposition naming
    the women.'
- source_word: חוּשִׁים
  chosen: Hushim
  lexicon: HALOT
  rationale: Proper name, transliterated. Though the form can elsewhere be associated
    with a plural-looking ending, here context identifies a personal name.
- source_word: וְ/אֶת בַּעֲרָא
  chosen: and Baara
  lexicon: HALOT
  rationale: Direct-object marker introducing the second named wife; rendered simply
    with 'and' in English before the transliterated proper name.
- source_word: נָשָׁיו
  chosen: his wives
  alternatives:
  - his women
  lexicon: HALOT
  rationale: The noun אִשָּׁה in plural with pronominal suffix here clearly means
    marital wives, not women generally. Appositional placement in Hebrew is best represented
    in English as 'Hushim and Baara, his wives.'
