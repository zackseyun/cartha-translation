id: 1CH.8.6
reference: 1 Chronicles 8:6
source:
  edition: WLC
  text: וְ/אֵ֖לֶּה בְּנֵ֣י אֵח֑וּד אֵ֣לֶּה הֵ֞ם רָאשֵׁ֤י אָבוֹת֙ לְ/י֣וֹשְׁבֵי גֶ֔בַע
    וַ/יַּגְל֖וּ/ם אֶל מָנָֽחַת־׃
translation:
  text: 'These were the sons of Ehud. These were the heads of fathers’ houses for
    the inhabitants of Geba, and they deported them to Manahath:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'heads of fathers’ houses' refers to clan or ancestral-household
      leaders.
    reason: cultural_note
  - marker: b
    text: Or 'and they carried them away into exile to Manahath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: These were
  alternatives:
  - And these were
  - Now these were
  lexicon: HALOT
  rationale: Introduces a new genealogical notice. English supplies 'were' naturally.
    Omission of initial 'and' improves readability while preserving discourse function.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - descendants of
  - children of
  lexicon: HALOT
  rationale: In genealogical context, 'sons of' is the standard and sufficiently broad
    rendering, even when it may denote descendants.
- source_word: אֵחוּד
  chosen: Ehud
  rationale: Personal name transliterated per translation philosophy.
- source_word: אֵלֶּה הֵם
  chosen: These were
  alternatives:
  - These are the ones who were
  - These
  lexicon: HALOT
  rationale: Emphatic resumptive expression in Hebrew; rendered idiomatically in English
    by repeating 'These were'.
- source_word: רָאשֵׁי אָבוֹת
  chosen: the heads of fathers’ houses
  alternatives:
  - chiefs of ancestral houses
  - heads of families
  - family heads
  lexicon: HALOT
  rationale: A technical genealogical/social phrase. 'Fathers’ houses' preserves the
    clan-household structure more precisely than the flatter 'families'.
- source_word: לְיֹשְׁבֵי גֶבַע
  chosen: for the inhabitants of Geba
  alternatives:
  - among the inhabitants of Geba
  - of the inhabitants of Geba
  lexicon: HALOT
  rationale: 'The lamed here likely marks relation/reference: these heads belonged
    with respect to the inhabitants of Geba. ''For'' is slightly wooden but preserves
    the relation without overinterpreting.'
- source_word: גֶבַע
  chosen: Geba
  rationale: Place name transliterated by standard convention.
- source_word: וַיַּגְלוּם
  chosen: and they deported them
  alternatives:
  - and they carried them away into exile
  - and they exiled them
  - and they removed them
  lexicon: HALOT
  rationale: From גלה in the Hiphil with 3mp object suffix, indicating causing persons
    to go into exile. 'Deported' is concise, modern, and captures forced relocation.
- source_word: אֶל מָנָחַת
  chosen: to Manahath
  alternatives:
  - to Manahat
  lexicon: HALOT
  rationale: Directional phrase with place name; standard transliteration 'Manahath'
    retained.
