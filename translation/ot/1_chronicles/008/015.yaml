id: 1CH.8.15
reference: 1 Chronicles 8:15
source:
  edition: WLC
  text: וּ/זְבַדְיָ֥ה וַ/עֲרָ֖ד וָ/עָֽדֶר׃
translation:
  text: and Zebadiah, Arad, and Eder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'Ader,' reflecting a different transliteration of the Hebrew
      name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/זְבַדְיָה
  chosen: and Zebadiah
  alternatives:
  - Zebadya
  lexicon: HALOT
  rationale: The prefixed conjunction וּ is rendered as 'and.' The proper name is
    transliterated by standard English convention as 'Zebadiah,' following the translation
    philosophy to transliterate personal names rather than translate them.
- source_word: וַ/עֲרָד
  chosen: Arad
  lexicon: HALOT
  rationale: The prefixed conjunction וַ is not separately repeated in English beyond
    the list structure already signaled by the initial 'and' and subsequent commas.
    The proper name is transliterated as 'Arad,' the standard English form.
- source_word: וָ/עָדֶר
  chosen: and Eder
  alternatives:
  - Ader
  lexicon: HALOT
  rationale: The prefixed conjunction וָ is rendered as 'and' before the final item
    in the series. The name is transliterated as 'Eder.' Because the consonantal form
    could also be represented as 'Ader' in some traditions, that alternative is preserved
    in a footnote as a lexical/transliteration alternative.
