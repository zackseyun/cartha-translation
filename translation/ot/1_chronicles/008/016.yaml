id: 1CH.8.16
reference: 1 Chronicles 8:16
source:
  edition: WLC
  text: וּ/מִיכָאֵ֧ל וְ/יִשְׁפָּ֛ה וְ/יוֹחָ֖א בְּנֵ֥י בְרִיעָֽה׃
translation:
  text: and Michael, Ishpah, and Joha, the sons of Beriah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/מִיכָאֵל
  chosen: and Michael
  alternatives:
  - and Mikhael
  lexicon: HALOT
  rationale: Proper name with prefixed conjunction. Per translation philosophy, personal
    names are transliterated by standard English convention; 'Michael' is the established
    English form.
- source_word: וְ/יִשְׁפָּה
  chosen: Ishpah
  alternatives:
  - Jishpah
  - Yishpah
  lexicon: HALOT
  rationale: Proper name transliterated into readable modern English. The prefixed
    conjunction is represented once in the English series rather than repeated before
    each name, which is natural English while preserving the list structure.
- source_word: וְ/יוֹחָא
  chosen: Joha
  alternatives:
  - Yoha
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention. 'Joha' reflects common
    English handling of initial yod in some Hebrew names, while remaining recognizable.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - sons of
  - children of
  - descendants of
  lexicon: HALOT
  rationale: In genealogical context, בְּנֵי most directly means 'sons of.' This is
    more precise than 'children of' or 'descendants of' here, since the verse lists
    male offspring in a lineage register.
- source_word: בְרִיעָה
  chosen: Beriah
  alternatives:
  - Beriah
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention; 'Beriah' is
    the familiar and phonetically transparent form.
