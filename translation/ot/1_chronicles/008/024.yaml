id: 1CH.8.24
reference: 1 Chronicles 8:24
source:
  edition: WLC
  text: וַ/חֲנַנְיָ֥ה וְ/עֵילָ֖ם וְ/עַנְתֹתִיָּֽה׃
translation:
  text: Hananiah, Elam, and Anthothijah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Anthothijah may also be transliterated 'Anathothijah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲנַנְיָה
  chosen: Hananiah
  alternatives:
  - Hananiah
  lexicon: HALOT
  rationale: Proper personal name. Following the translation philosophy, personal
    names are transliterated rather than translated. 'Hananiah' is the standard English
    transliteration of this Hebrew name.
- source_word: עֵילָם
  chosen: Elam
  lexicon: HALOT
  rationale: Proper personal name in a genealogical list. Transliterated by standard
    convention as 'Elam.' Though the same form can designate a region elsewhere, here
    the context and morphology indicate a personal name.
- source_word: עַנְתֹתִיָּה
  chosen: Anthothijah
  alternatives:
  - Anathothijah
  lexicon: HALOT
  rationale: Proper personal name. Transliterated rather than translated. 'Anthothijah'
    reflects a conventional English representation of the Hebrew form; 'Anathothijah'
    is a plausible fuller transliteration but less standard in English Bible tradition.
- source_word: וְ
  chosen: and
  rationale: The prefixed conjunction links the names in a simple list; rendered with
    standard English coordination. The initial conjunction before the first name is
    not separately represented, since English list style does not require repeating
    'and' before every item.
