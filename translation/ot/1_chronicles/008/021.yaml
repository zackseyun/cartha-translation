id: 1CH.8.21
reference: 1 Chronicles 8:21
source:
  edition: WLC
  text: וַ/עֲדָיָ֧ה וּ/בְרָאיָ֛ה וְ/שִׁמְרָ֖ת בְּנֵ֥י שִׁמְעִֽי׃
translation:
  text: Adaiah, Beraiah, and Shimrath, the sons of Shimei.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Beraiah; some English traditions simplify the name to Beriah.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲדָיָה
  chosen: Adaiah
  alternatives:
  - Adayah
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the project's policy for names. 'Adaiah' is the standard English form in
    biblical usage.
- source_word: בְרָאיָה
  chosen: Beraiah
  alternatives:
  - Beriah
  rationale: Proper personal name; transliterated. The spelling with internal aleph
    supports 'Beraiah' rather than the shorter 'Beriah,' so the fuller transliteration
    better reflects the Hebrew form here.
- source_word: שִׁמְרָת
  chosen: Shimrath
  alternatives:
  - Shimrat
  rationale: Proper personal name; transliterated. 'Shimrath' is a conventional English
    representation of the final tav in this name.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - sons of
  lexicon: HALOT
  rationale: Construct plural of 'son,' used genealogically. 'The sons of' is natural
    English in a list and signals the relationship to the following name.
- source_word: שִׁמְעִי
  chosen: Shimei
  alternatives:
  - Shimi
  rationale: Proper personal name; transliterated by standard biblical convention
    as 'Shimei.'
