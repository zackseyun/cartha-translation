id: 1CH.8.11
reference: 1 Chronicles 8:11
source:
  edition: WLC
  text: וּ/מֵ/חֻשִׁ֛ים הוֹלִ֥יד אֶת אֲבִיט֖וּב וְ/אֶת אֶלְפָּֽעַל־־׃
translation:
  text: And by Hushim he fathered Abitub and Elpaal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from Hushim.' The Hebrew preposition can be rendered more literally
      this way, but in a genealogy 'by Hushim' better communicates parentage through
      her.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מֵ/חֻשִׁים
  chosen: And by Hushim
  alternatives:
  - And from Hushim
  - Now with Hushim
  lexicon: HALOT
  rationale: 'The prefixed conjunction plus preposition מִן before the proper name
    most naturally indicates source or relation: ''from/by Hushim.'' In this genealogical
    context, English ''by Hushim'' idiomatically conveys parentage through a wife/consort
    better than the more wooden ''from Hushim.'' The conjunction is retained as ''And''
    to preserve the narrative-genealogical flow.'
- source_word: הוֹלִיד
  chosen: he fathered
  alternatives:
  - he begot
  - he became the father of
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogies commonly means 'to father, beget.' 'He
    fathered' is clear modern English and preserves the male genealogical sense better
    than the archaic 'begot.'
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent English equivalent.
- source_word: אֲבִיטוּב
  chosen: Abitub
  alternatives:
  - Abituv
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: וְ/אֶת
  chosen: and
  lexicon: HALOT
  rationale: The conjunction is translated 'and'; the attached direct-object marker
    again has no separate English equivalent.
- source_word: אֶלְפָּעַל
  chosen: Elpaal
  alternatives:
  - Elpa'al
  rationale: Personal name transliterated by standard English convention. The form
    without apostrophe is the more familiar readable English presentation.
