id: 1CH.8.22
reference: 1 Chronicles 8:22
source:
  edition: WLC
  text: וְ/יִשְׁפָּ֥ן וָ/עֵ֖בֶר וֶ/אֱלִיאֵֽל׃
translation:
  text: Ishpan, Eber, and Eliel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jishpan.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Heber.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁפָּן
  chosen: Ishpan
  alternatives:
  - Jishpan
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the project's policy for names. 'Ishpan' reflects a standard English transliteration
    of the Hebrew form.
- source_word: עֵבֶר
  chosen: Eber
  alternatives:
  - Heber
  rationale: Proper personal name; transliterated. Although the consonants can underlie
    the familiar name 'Heber' in some English traditions, 'Eber' more directly reflects
    the Hebrew form עֵבֶר here and avoids importing a different traditional spelling
    without textual necessity.
- source_word: אֱלִיאֵל
  chosen: Eliel
  rationale: Proper personal name; transliterated directly from the Hebrew. No translation
    of the theophoric elements is attempted because personal names are to be transliterated,
    not translated.
- source_word: וְ / וָ / וֶ
  chosen: and
  alternatives:
  - —
  rationale: Each prefixed waw is the simple conjunction joining names in a list.
    In English genealogy/list style, a comma-separated series with a final 'and' is
    the most natural equivalent.
