id: 1CH.8.27
reference: 1 Chronicles 8:27
source:
  edition: WLC
  text: וְ/יַעֲרֶשְׁיָ֧ה וְ/אֵלִיָּ֛ה וְ/זִכְרִ֖י בְּנֵ֥י יְרֹחָֽם׃
translation:
  text: Jareshiah, Elijah, and Zichri were the sons of Jeroham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of' or, in a broader genealogical sense, 'descendants of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעֲרֶשְׁיָה
  chosen: Jareshiah
  alternatives:
  - Jaareshiah
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. English form follows a standard conventional transliteration from
    the Hebrew consonants and vowels.
- source_word: אֵלִיָּה
  chosen: Elijah
  alternatives:
  - Eliiah
  - Eliyah
  rationale: Proper personal name; transliterated by standard English convention.
    Although the Hebrew form could be represented more mechanically as 'Eliyah,' 'Elijah'
    is the established English transliteration for this name.
- source_word: זִכְרִי
  chosen: Zichri
  alternatives:
  - Zicri
  rationale: Proper personal name; transliterated rather than translated. 'Zichri'
    is the common English representation of this Hebrew name.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: The construct plural of בֵּן most directly means 'sons of.' In genealogical
    contexts it can sometimes broaden to descendants, but here the immediate list
    of three named males favors the more specific 'sons of.' This also follows the
    gender-accurate principle.
- source_word: יְרֹחָם
  chosen: Jeroham
  alternatives:
  - Jeroam
  rationale: Proper personal name; transliterated by standard convention.
