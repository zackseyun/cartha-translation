id: 1CH.8.33
reference: 1 Chronicles 8:33
source:
  edition: WLC
  text: וְ/נֵר֙ הוֹלִ֣יד אֶת קִ֔ישׁ וְ/קִ֖ישׁ הוֹלִ֣יד אֶת שָׁא֑וּל וְ/שָׁא֗וּל הוֹלִ֤יד
    אֶת יְהֽוֹנָתָן֙ וְ/אֶת מַלְכִּי שׁ֔וּעַ וְ/אֶת אֲבִֽינָדָ֖ב וְ/אֶת אֶשְׁבָּֽעַל־־־־־־־׃
translation:
  text: Ner fathered Kish, and Kish fathered Saul, and Saul fathered Jonathan, Malchi-shua,
    Abinadab, and Eshbaal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Eshbaal is called Ish-bosheth in 2 Samuel.
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In a genealogy, the Hiphil of ילד denotes direct male descent. 'Fathered'
    is clear modern English and more natural than the archaic 'begot,' while preserving
    the genealogical force better than the looser 'became the father of.'
- source_word: נֵר
  chosen: Ner
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: קִישׁ
  chosen: Kish
  rationale: Personal name transliterated by standard English convention.
- source_word: שָׁאוּל
  chosen: Saul
  alternatives:
  - Shaul
  rationale: Established English transliteration for the personal name; 'Saul' is
    standard and recognizable.
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  alternatives:
  - Jehonathan
  rationale: Standard English form of the personal name. Although the Hebrew form
    here is Jehonathan, English usage overwhelmingly prefers 'Jonathan' for Saul's
    son, and this does not obscure identity.
- source_word: מַלְכִּי שׁוּעַ
  chosen: Malchi-shua
  alternatives:
  - Malki-shua
  rationale: Compound personal name rendered in its conventional English transliteration
    with hyphenation to reflect the two-part Hebrew form.
- source_word: אֲבִינָדָב
  chosen: Abinadab
  rationale: Standard English transliteration of the personal name.
- source_word: אֶשְׁבָּעַל
  chosen: Eshbaal
  alternatives:
  - Ish-bosheth
  lexicon: HALOT
  rationale: The Chronicler's Hebrew text reads אֶשְׁבָּעַל, so the translation should
    reflect the source text directly rather than harmonize to the alternative name
    form 'Ish-bosheth' known from Samuel. This preserves original-language primacy
    and avoids importing a secondary tradition into the main text.
