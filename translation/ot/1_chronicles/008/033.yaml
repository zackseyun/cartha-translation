theological_decisions:
- issue: Name form for Saul's son in the final position
  chosen_reading: Eshbaal in the main text
  alternative_readings:
  - Ish-bosheth
  rationale: This is not a doctrinal dispute but a text-form and translation-tradition
    issue. The Hebrew of Chronicles explicitly has 'Eshbaal,' whereas Samuel often
    preserves the altered form 'Ish-bosheth.' Following the stated philosophy, the
    main text reflects the Hebrew source, while the alternative familiar form is preserved
    in a footnote for reader orientation.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
