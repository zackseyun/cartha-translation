id: 1CH.8.4
reference: 1 Chronicles 8:4
source:
  edition: WLC
  text: וַ/אֲבִישׁ֥וּעַ וְ/נַעֲמָ֖ן וַ/אֲחֽוֹחַ׃
translation:
  text: and Abishua, Naaman, and Ahoah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַ/אֲבִישׁוּעַ
  chosen: and Abishua
  alternatives:
  - Abishua
  rationale: The prefixed conjunction ו is rendered as 'and,' continuing the genealogical
    list. The personal name is transliterated rather than translated, following the
    stated policy for names.
- source_word: וְ/נַעֲמָן
  chosen: Naaman
  alternatives:
  - and Naaman
  rationale: The conjunction links another name in the sequence; in English list style,
    the conjunction is represented in the overall series rather than necessarily repeated
    before each item. The name is transliterated by standard convention.
- source_word: וַ/אֲחוֹחַ
  chosen: and Ahoah
  alternatives:
  - Ahoah
  rationale: The conjunction is rendered with the final 'and' in the English list.
    The proper name is transliterated. The form is best represented as 'Ahoah' in
    English genealogical style.
