id: 1CH.8.40
reference: 1 Chronicles 8:40
source:
  edition: WLC
  text: וַֽ/יִּהְי֣וּ בְנֵי א֠וּלָם אֲנָשִׁ֨ים גִּבֹּרֵי חַ֜יִל דֹּ֣רְכֵי קֶ֗שֶׁת
    וּ/מַרְבִּ֤ים בָּנִים֙ וּ/בְנֵ֣י בָנִ֔ים מֵאָ֖ה וַ/חֲמִשִּׁ֑ים כָּל אֵ֖לֶּה מִ/בְּנֵ֥י
    בִנְיָמִֽן־־־׃פ
translation:
  text: The sons of Ulam were mighty men of valor, drawers of the bow, and had many
    sons and grandsons, one hundred and fifty. All these were from the sons of Benjamin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'benders of the bow.'
    reason: lexical_alternative
  - marker: b
    text: Or 'were among the sons of Benjamin,' that is, descendants of the tribe
      of Benjamin.
    reason: lexical_alternative
  - marker: c
    text: Or 'one hundred and fifty'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - became
  lexicon: HALOT
  rationale: Simple wayyiqtol of היה introducing a descriptive statement about Ulam's
    sons; 'were' fits the genealogical summary context better than 'became'.
- source_word: בְנֵי אוּלָם
  chosen: The sons of Ulam
  alternatives:
  - Ulam's sons
  lexicon: HALOT
  rationale: Construct chain naming the descendants of Ulam. Kept slightly formal
    genealogical style with 'the sons of Ulam'.
- source_word: אֲנָשִׁים גִּבֹּרֵי חַיִל
  chosen: mighty men of valor
  alternatives:
  - valiant warriors
  - mighty men
  - capable men
  lexicon: HALOT
  rationale: This stock expression often denotes men distinguished by strength and
    martial capability. 'Mighty men of valor' preserves the idiomatic force and traditional
    military nuance without over-paraphrasing.
- source_word: דֹּרְכֵי קֶשֶׁת
  chosen: archers
  alternatives:
  - benders of the bow
  - those who tread the bow
  lexicon: HALOT
  rationale: The participial phrase literally refers to those who bend/tread the bow,
    an idiom for bowmen. 'Archers' is the natural English equivalent.
- source_word: וּמַרְבִּים בָּנִים וּבְנֵי בָנִים
  chosen: and they had many sons and grandsons
  alternatives:
  - and multiplying sons and grandsons
  - and having many sons and sons' sons
  lexicon: HALOT
  rationale: The Hiphil participle of רבה with direct objects indicates abundance/procreation.
    In English, 'they had many sons and grandsons' communicates the genealogical sense
    clearly and idiomatically.
- source_word: מֵאָה וַחֲמִשִּׁים
  chosen: one hundred and fifty
  alternatives:
  - a hundred and fifty
  lexicon: HALOT
  rationale: Cardinal number specifying the total of sons and grandsons.
- source_word: כָּל אֵלֶּה
  chosen: All these
  alternatives:
  - All of these
  lexicon: HALOT
  rationale: Summative phrase concluding the genealogy.
- source_word: מִבְּנֵי בִנְיָמִן
  chosen: were from the sons of Benjamin
  alternatives:
  - were among the sons of Benjamin
  - were descendants of Benjamin
  - were Benjaminites
  lexicon: HALOT
  rationale: The מן + בני construction marks tribal descent. 'From the sons of Benjamin'
    stays close to the Hebrew while remaining readable; 'Benjaminites' is possible
    but less formally aligned with the genealogical wording.
