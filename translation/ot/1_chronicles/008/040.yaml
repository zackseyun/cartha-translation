  from: one hundred and fifty
  to: totaling one hundred and fifty
  rationale: While a literal translation of the appositive, simply stating the number
    'one hundred and fifty' after 'grandsons' can be slightly abrupt in English. It
    could also be misread as applying only to the grandsons. Adding a participle like
    'totaling' or a phrase like 'one hundred and fifty in all' clarifies that the
    number refers to the combined sum of sons and grandsons, improving readability.
