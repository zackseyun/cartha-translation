id: 1CH.8.37
reference: 1 Chronicles 8:37
source:
  edition: WLC
  text: וּ/מוֹצָ֖א הוֹלִ֣יד אֶת בִּנְעָ֑א רָפָ֥ה בְנ֛/וֹ אֶלְעָשָׂ֥ה בְנ֖/וֹ אָצֵ֥ל
    בְּנֽ/וֹ־׃
translation:
  text: And Moza fathered Binea; Rephah was his son, Eleasah his son, Azel his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Bina." The Hebrew name בִּנְעָא may be represented in English with slightly
      different transliterations.
    reason: lexical_alternative
  - marker: b
    text: Or "Rapha." The Hebrew name רָפָה is transliterated variously in English
      versions.
    reason: lexical_alternative
  - marker: c
    text: Or "Elasah." The Hebrew name אֶלְעָשָׂה may be transliterated with a shorter
      initial vowel sequence in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מוֹצָא
  chosen: And Moza
  alternatives:
  - Now Moza
  - Moza
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered as "And" to preserve the genealogical
    chain's connective style. The proper name מוֹצָא is transliterated as "Moza" in
    keeping with the policy to transliterate personal names.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In genealogical contexts ילד in the Hiphil commonly means "to father,
    beget." "Fathered" is concise, natural modern English and preserves the male genealogical
    sense better than the more archaic "begot."
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: The direct-object marker has no direct English equivalent and is represented
    implicitly by English word order.
- source_word: בִּנְעָא
  chosen: Binea
  alternatives:
  - Bina
  lexicon: HALOT
  rationale: The personal name is transliterated directly from the Hebrew consonantal/vocalized
    form. "Binea" reflects the final ע with a slight vowel support in English transliteration;
    "Bina" is a possible simplified form but less transparent to the Hebrew form.
- source_word: רָפָה
  chosen: Rephah
  alternatives:
  - Rapha
  lexicon: HALOT
  rationale: The name is transliterated as "Rephah," a standard English representation
    of the Hebrew form here. "Rapha" is possible, but "Rephah" better reflects the
    vocalization in this verse and common English Bible convention for this name in
    context.
- source_word: בְנ֛/וֹ
  chosen: was his son
  alternatives:
  - his son
  lexicon: HALOT
  rationale: 'The repeated construct-plus-suffix literally means "his son." After
    the initial clause, English reads more naturally with an implied copula in the
    first repetition: "Rephah was his son," then appositionally continuing the line.
    This preserves the genealogical relationship without wooden repetition.'
- source_word: אֶלְעָשָׂה
  chosen: Eleasah
  alternatives:
  - Elasah
  lexicon: HALOT
  rationale: The personal name is transliterated from the Hebrew form. "Eleasah" more
    fully reflects the Hebrew vowels and consonants than the shortened "Elasah."
- source_word: בְנ֖/וֹ
  chosen: his son
  alternatives:
  - was his son
  lexicon: HALOT
  rationale: 'The repeated phrase marks successive descent in the genealogy. After
    the first explicit "was," simple appositional repetition in English is smoother:
    "Eleasah his son, Azel his son."'
- source_word: אָצֵל
  chosen: Azel
  lexicon: HALOT
  rationale: The personal name is straightforwardly transliterated as "Azel," the
    standard English form corresponding to the Hebrew.
- source_word: בְּנֽ/וֹ
  chosen: his son
  alternatives:
  - was his son
  lexicon: HALOT
  rationale: This final repetition continues the genealogical chain and is best rendered
    consistently as "his son" in English.
