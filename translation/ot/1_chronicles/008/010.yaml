id: 1CH.8.10
reference: 1 Chronicles 8:10
source:
  edition: WLC
  text: וְ/אֶת יְע֥וּץ וְ/אֶת שָֽׂכְיָ֖ה וְ/אֶת מִרְמָ֑ה אֵ֥לֶּה בָנָ֖י/ו רָאשֵׁ֥י
    אָבֽוֹת־־־׃
translation:
  text: and Jeuz, and Sachia, and Mirmah. These were his sons, heads of fathers’ houses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “heads of clans.” The Hebrew literally reads “heads of fathers,” an idiom
      for leading ancestral households or family groups.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְעוּץ
  chosen: Jeuz
  alternatives:
  - Jeuz
  rationale: Proper name; transliterated rather than translated per project philosophy
    for personal names. English form follows standard conventional transliteration
    of the Hebrew name.
- source_word: שָׂכְיָה
  chosen: Sachia
  alternatives:
  - Sakiah
  rationale: Proper name; transliterated. 'Sachia' reflects a straightforward Englishing
    of the consonants and vowels; 'Sakiah' is a plausible alternate spelling preserved
    as a lexical alternative.
- source_word: מִרְמָה
  chosen: Mirmah
  alternatives:
  - Mirmah
  rationale: Proper name; transliterated. Although the common noun can mean 'deceit,'
    in this genealogical context the form is clearly a personal name and should not
    be translated semantically.
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - These are
  lexicon: HALOT
  rationale: Demonstrative plural referring back to the listed names. Simple deictic
    'These' fits the verbless Hebrew clause in natural English.
- source_word: בָנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: בנים here is specifically masculine plural in a genealogy, so 'sons'
    is more accurate than the gender-neutral 'children,' in keeping with the gender-accurate
    policy.
- source_word: רָאשֵׁי
  chosen: heads of
  alternatives:
  - chiefs of
  - leaders of
  lexicon: HALOT
  rationale: Construct plural of 'head' used idiomatically for leading figures. 'Heads
    of' preserves the Hebrew metaphor while remaining understandable in English.
- source_word: אָבוֹת
  chosen: fathers’ houses
  alternatives:
  - fathers
  - ancestral houses
  - clans
  lexicon: HALOT
  rationale: In genealogical/tribal contexts, 'fathers' refers metonymically to paternal
    households or family units. English commonly supplies 'houses' to express the
    idiom 'heads of fathers’ houses.' 'Clans' is interpretive and smoother, but less
    formally tied to the Hebrew wording.
