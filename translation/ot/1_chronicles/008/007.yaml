id: 1CH.8.7
reference: 1 Chronicles 8:7
source:
  edition: WLC
  text: וְ/נַעֲמָ֧ן וַ/אֲחִיָּ֛ה וְ/גֵרָ֖א ה֣וּא הֶגְלָ֑/ם וְ/הוֹלִ֥יד אֶת עֻזָּ֖א
    וְ/אֶת אֲחִיחֻֽד־־׃
translation:
  text: and Naaman, Ahijah, and Gera—he carried them into exile and fathered Uzza
    and Ahihud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''he carried them into exile.'' The subject of ''he'' is syntactically
      singular, most naturally referring to Gera, though the genealogy in this section
      is textually and syntactically difficult.'
    reason: alternative_reading
  - marker: b
    text: 'Or ''exiled them'' or ''deported them.'' The Hebrew verb is causative:
      ''caused them to go into exile.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲמָן
  chosen: Naaman
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to the project's policy
    for names.
- source_word: אֲחִיָּה
  chosen: Ahijah
  alternatives:
  - Ahiyah
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration is retained.
- source_word: גֵרָא
  chosen: Gera
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated.
- source_word: הוּא
  chosen: he
  alternatives:
  - this one
  lexicon: HALOT
  rationale: Independent pronoun used resumptively/emphatically. In English genealogy
    style, simple 'he' is the most natural equivalent.
- source_word: הֶגְלָם
  chosen: carried them into exile
  alternatives:
  - exiled them
  - deported them
  lexicon: HALOT
  rationale: From גלה in the Hiphil with 3mp suffix, meaning to cause to go into exile.
    'Carried them into exile' preserves the causative sense and the object suffix
    'them'.
- source_word: וְהוֹלִיד
  chosen: and fathered
  alternatives:
  - and became the father of
  - and begot
  lexicon: HALOT
  rationale: Genealogical verb ילד in the Hiphil commonly means 'to father/beget.'
    'Fathered' is concise, natural modern English and preserves the male genealogical
    sense better than the archaic 'begot'.
- source_word: עֻזָּא
  chosen: Uzza
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
- source_word: אֲחִיחֻד
  chosen: Ahihud
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
