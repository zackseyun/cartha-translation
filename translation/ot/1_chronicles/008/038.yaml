id: 1CH.8.38
reference: 1 Chronicles 8:38
source:
  edition: WLC
  text: וּ/לְ/אָצֵל֮ שִׁשָּׁ֣ה בָנִים֒ וְ/אֵ֣לֶּה שְׁמוֹתָ֗/ם עַזְרִיקָ֥ם בֹּ֨כְרוּ֙
    וְ/יִשְׁמָעֵ֣אל וּ/שְׁעַרְיָ֔ה וְ/עֹבַדְיָ֖ה וְ/חָנָ֑ן כָּל אֵ֖לֶּה בְּנֵ֥י אָצַֽל׀־׃
translation:
  text: 'Azel had six sons, and these were their names: Azrikam, his firstborn, Ishmael,
    Sheariah, Obadiah, and Hanan. All these were the sons of Azel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'To Azel were six sons.' The Hebrew uses a genealogical
      possession formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְאָצֵל
  chosen: Azel had
  alternatives:
  - To Azel were
  lexicon: HALOT
  rationale: The prefixed ל with a genealogical formula is idiomatically rendered
    in English as possession/existence ('Azel had') rather than the more wooden 'to
    Azel were.' This preserves the sense in natural English.
- source_word: שִׁשָּׁה בָנִים
  chosen: six sons
  alternatives:
  - six children
  lexicon: HALOT
  rationale: בָנִים in a genealogy refers specifically to male descendants here, so
    'sons' is more accurate than the broader 'children.'
- source_word: וְאֵלֶּה שְׁמוֹתָם
  chosen: and these were their names
  alternatives:
  - and these are their names
  - and these were his names
  lexicon: HALOT
  rationale: This is a standard naming formula. 'Their names' follows the 3mp suffix
    on שְׁמוֹתָם as written, even though the referent is the listed sons. 'Were' fits
    smooth English narrative style.
- source_word: עַזְרִיקָם
  chosen: Azrikam
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: בֹּכְרוּ
  chosen: his firstborn
  alternatives:
  - the firstborn
  - his eldest
  lexicon: HALOT
  rationale: The form functions appositionally after Azrikam, identifying him as Azel's
    firstborn. 'His firstborn' makes the relationship explicit and reads naturally
    in English genealogy style.
- source_word: יִשְׁמָעֵאל
  chosen: Ishmael
  lexicon: HALOT
  rationale: Personal name transliterated conventionally.
- source_word: שְׁעַרְיָה
  chosen: Sheariah
  alternatives:
  - Shaariah
  lexicon: HALOT
  rationale: Personal name transliterated by standard convention; 'Sheariah' is the
    common English form in biblical genealogies.
- source_word: עֹבַדְיָה
  chosen: Obadiah
  lexicon: HALOT
  rationale: Personal name transliterated conventionally.
- source_word: חָנָן
  chosen: Hanan
  lexicon: HALOT
  rationale: Personal name transliterated conventionally.
- source_word: כָּל־אֵלֶּה
  chosen: All these
  alternatives:
  - All of these
  lexicon: HALOT
  rationale: A straightforward summary phrase concluding the list; 'All these' is
    concise and natural.
- source_word: בְּנֵי אָצַל
  chosen: were the sons of Azel
  alternatives:
  - were Azel's sons
  lexicon: HALOT
  rationale: The proper name is the same as earlier אָצֵל/אָצַל, rendered consistently
    as 'Azel.' The explicit predicate form mirrors the Hebrew genealogical conclusion.
