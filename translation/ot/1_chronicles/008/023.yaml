id: 1CH.8.23
reference: 1 Chronicles 8:23
source:
  edition: WLC
  text: וְ/עַבְדּ֥וֹן וְ/זִכְרִ֖י וְ/חָנָֽן׃
translation:
  text: and Abdon, and Zichri, and Hanan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Zicri.' The Hebrew name זִכְרִי is commonly rendered either way in English
      transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ
  chosen: and
  rationale: The prefixed conjunction on each name is rendered straightforwardly as
    'and,' preserving the genealogical list structure of the Hebrew.
- source_word: עַבְדּוֹן
  chosen: Abdon
  alternatives:
  - Abdon
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the translation philosophy for names. Standard English form 'Abdon' is conventional
    and recognizable.
- source_word: זִכְרִי
  chosen: Zichri
  alternatives:
  - Zicri
  lexicon: HALOT
  rationale: Proper personal name; transliterated. 'Zichri' is the more common English
    transliteration reflecting the Hebrew consonants and vocalization, though 'Zicri'
    is also seen in some English traditions.
- source_word: חָנָן
  chosen: Hanan
  lexicon: HALOT
  rationale: Proper personal name; transliterated directly as 'Hanan' according to
    standard English convention.
