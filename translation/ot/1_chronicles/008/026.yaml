id: 1CH.8.26
reference: 1 Chronicles 8:26
source:
  edition: WLC
  text: וְ/שַׁמְשְׁרַ֥י וּ/שְׁחַרְיָ֖ה וַ/עֲתַלְיָֽה׃
translation:
  text: and Shamshrai, and Sheharyah, and Athaliah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שַׁמְשְׁרַי
  chosen: Shamshrai
  alternatives:
  - Shamsherai
  - Shamsharay
  lexicon: HALOT
  rationale: Proper personal name in a genealogical list; per translation philosophy,
    personal names are transliterated rather than translated. English form follows
    a straightforward consonant-vowel transliteration of the Hebrew name.
- source_word: שְׁחַרְיָה
  chosen: Sheharyah
  alternatives:
  - Shehariah
  - Shahariah
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated. The chosen
    form preserves the Hebrew consonantal structure and final -yah element in readable
    modern English.
- source_word: עֲתַלְיָה
  chosen: Athaliah
  alternatives:
  - Ataliah
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated. 'Athaliah'
    is the standard English transliteration and clearly reflects the Hebrew form.
- source_word: וְ / וּ / וַ
  chosen: and
  lexicon: HALOT
  rationale: Each prefixed conjunction is the simple Hebrew waw joining names in a
    list. Rendering each explicitly as 'and' preserves the list structure and the
    formal cadence of the genealogy.
