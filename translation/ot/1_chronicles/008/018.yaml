id: 1CH.8.18
reference: 1 Chronicles 8:18
source:
  edition: WLC
  text: וְ/יִשְׁמְרַ֧י וְ/יִזְלִיאָ֛ה וְ/יוֹבָ֖ב בְּנֵ֥י אֶלְפָּֽעַל׃
translation:
  text: Ishmerai, Izliah, and Jobab were the sons of Elpaal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew simply reads 'sons of Elpaal'; 'were' is supplied for natural English
      in this genealogical list.
    reason: lexical_alternative
  - marker: b
    text: Some English traditions spell the names 'Jishmerai' and 'Jizliah.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִשְׁמְרַי
  chosen: Ishmerai
  alternatives:
  - Jishmerai
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. English spelling follows a standard Hebrew-to-English convention that
    preserves the consonantal shape.
- source_word: יִזְלִיאָה
  chosen: Izliah
  alternatives:
  - Jizliah
  rationale: Proper personal name; transliterated. The initial yod is represented
    with English 'I' in a conventional biblical-name style, while an alternative with
    'J' is also attested in English tradition.
- source_word: יוֹבָב
  chosen: Jobab
  rationale: Proper personal name; transliterated by standard convention.
- source_word: בְּנֵי
  chosen: were the sons of
  alternatives:
  - sons of
  lexicon: HALOT
  rationale: Construct plural of 'son.' In an English verbless genealogical list,
    supplying 'were' makes the relationship clear and natural without adding meaning
    beyond the genealogical formula.
- source_word: אֶלְפָּעַל
  chosen: Elpaal
  alternatives:
  - Elpa'al
  rationale: Proper personal name; transliterated. The simpler form without apostrophe
    is more readable in modern English while still reflecting the Hebrew name.
