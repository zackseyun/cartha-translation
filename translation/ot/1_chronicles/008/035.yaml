id: 1CH.8.35
reference: 1 Chronicles 8:35
source:
  edition: WLC
  text: וּ/בְנֵ֖י מִיכָ֑ה פִּית֥וֹן וָ/מֶ֖לֶךְ וְ/תַאְרֵ֥עַ וְ/אָחָֽז׃
translation:
  text: 'And the sons of Micah: Pithon, Melech, Tarea, and Ahaz.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew name also spelled “Tahrea” in some English traditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: The conjunction ו is carried forward as 'And' to preserve the genealogical
    sequence, and בְּנֵי is rendered 'sons of' in its standard genealogical sense
    rather than a broader 'descendants of,' since the verse lists immediate offspring
    by name.
- source_word: מִיכָה
  chosen: Micah
  alternatives:
  - Mica
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: פִּיתוֹן
  chosen: Pithon
  lexicon: HALOT
  rationale: Proper name transliterated directly from the Hebrew.
- source_word: וָמֶלֶךְ
  chosen: Melech
  alternatives:
  - and Melech
  lexicon: HALOT
  rationale: Although the Hebrew includes the conjunction on this and the following
    names, English style in name lists normally expresses the conjunction only before
    the final item. 'Melech' is treated here as a proper name, not translated as the
    common noun 'king,' because the morphology and context are genealogical.
- source_word: וְתַאְרֵעַ
  chosen: Tarea
  alternatives:
  - Tahrea
  lexicon: HALOT
  rationale: Proper name transliterated. The consonantal form permits variation in
    English transliteration; 'Tarea' follows a straightforward representation of the
    Hebrew form here, while the alternative spelling is worth preserving.
- source_word: וְאָחָז
  chosen: Ahaz
  lexicon: HALOT
  rationale: Proper name transliterated directly from the Hebrew; in this context
    it is the personal name of Micah's son, not a verbal form.
