id: 1CH.8.14
reference: 1 Chronicles 8:14
source:
  edition: WLC
  text: וְ/אַחְי֥וֹ שָׁשָׁ֖ק וִ/ירֵמֽוֹת׃
translation:
  text: And Ahio, Shashak, and Jeremoth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Jerimoth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחְיוֹ
  chosen: And Ahio
  alternatives:
  - Ahio
  lexicon: HALOT
  rationale: The prefixed conjunction וְ is rendered as 'And,' preserving the genealogical
    list structure. אַחְיוֹ is a personal name and is transliterated rather than translated,
    in keeping with the translation philosophy for names. Standard English form 'Ahio'
    is used.
- source_word: שָׁשָׁק
  chosen: Shashak
  lexicon: HALOT
  rationale: This is a personal name in a genealogical sequence. It is transliterated
    directly as 'Shashak' by standard convention.
- source_word: וִ/ירֵמוֹת
  chosen: and Jeremoth
  alternatives:
  - and Jerimoth
  lexicon: HALOT
  rationale: The prefixed conjunction is rendered 'and.' The name יְרֵמוֹת is transliterated
    here as 'Jeremoth,' a common English representation of the Hebrew form. 'Jerimoth'
    is a plausible alternative transliteration reflecting a different vocalic convention,
    so it is preserved in a footnote as a lexical alternative.
