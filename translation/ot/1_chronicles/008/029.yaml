id: 1CH.8.29
reference: 1 Chronicles 8:29
source:
  edition: WLC
  text: וּ/בְ/גִבְע֥וֹן יָשְׁב֖וּ אֲבִ֣י גִבְע֑וֹן וְ/שֵׁ֥ם אִשְׁתּ֖/וֹ מַעֲכָֽה׃
translation:
  text: In Gibeon lived the father of Gibeon, and his wife’s name was Maacah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the founder of Gibeon' or 'the chief of Gibeon'; Hebrew literally, 'the
      father of Gibeon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/גִבְעוֹן
  chosen: In Gibeon
  alternatives:
  - And in Gibeon
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally yields 'and/in Gibeon.'
    In English, the conjunction is not necessary to convey the verse naturally, so
    the location is rendered simply as 'In Gibeon' while preserving the locative sense.
- source_word: יָשְׁבוּ
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: The verb ישׁב commonly means 'sit, dwell, live.' In genealogical/topographical
    notices, 'lived' is idiomatic modern English and fits the chronicler's statement
    of residence better than the more archaic 'dwelt.'
- source_word: אֲבִי גִבְעוֹן
  chosen: the father of Gibeon
  alternatives:
  - the founder of Gibeon
  - the chief of Gibeon
  lexicon: HALOT
  rationale: The construct phrase is literally 'father of Gibeon.' In such genealogical
    contexts, 'father' can denote founder, ancestor, or leading figure associated
    with a place. The main text preserves the literal expression for transparency;
    a footnote preserves the contextual alternatives.
- source_word: וְ/שֵׁם
  chosen: and ... name was
  alternatives:
  - and the name of
  lexicon: HALOT
  rationale: The Hebrew construction 'and the name of his wife' is rendered idiomatically
    in English as 'and his wife’s name was,' preserving the possessive relationship
    and predication.
- source_word: אִשְׁתּוֹ
  chosen: his wife’s
  alternatives:
  - of his wife
  lexicon: HALOT
  rationale: The noun with 3ms suffix means 'his wife.' English possessive form is
    the most natural way to carry the construct relationship into the clause.
- source_word: מַעֲכָה
  chosen: Maacah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
