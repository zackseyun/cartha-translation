id: 1CH.8.39
reference: 1 Chronicles 8:39
source:
  edition: WLC
  text: וּ/בְנֵ֖י עֵ֣שֶׁק אָחִ֑י/ו אוּלָ֣ם בְּכֹר֔/וֹ יְעוּשׁ֙ הַ/שֵּׁנִ֔י וֶֽ/אֱלִיפֶ֖לֶט
    הַ/שְּׁלִשִֽׁי׃
translation:
  text: 'The sons of Eshek his brother: Ulam his firstborn, Jeush the second, and
    Eliphelet the third.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the sons of Eshek, his brother…' The Hebrew begins with a conjunction,
      which English genealogy style often leaves implicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - Now the sons of
  lexicon: HALOT
  rationale: Construct plural of 'sons' with prefixed conjunction. In English genealogy
    style, the conjunction is naturally absorbed, yielding the idiomatic heading 'The
    sons of' without loss of meaning.
- source_word: עֵשֶׁק
  chosen: Eshek
  alternatives:
  - Esek
  rationale: Personal name is transliterated rather than translated, following the
    project's policy for names. 'Eshek' reflects the conventional English form for
    this Hebrew name in this context.
- source_word: אָחִיו
  chosen: his brother
  alternatives:
  - his kinsman
  lexicon: HALOT
  rationale: The noun ordinarily means 'brother.' In genealogical contexts it can
    sometimes broaden to kinship language, but there is no need here to weaken the
    plain familial term.
- source_word: אוּלָם
  chosen: Ulam
  rationale: Personal name transliterated by standard convention.
- source_word: בְּכֹרוֹ
  chosen: his firstborn
  alternatives:
  - his eldest
  lexicon: HALOT
  rationale: The noun denotes the firstborn son. 'Firstborn' preserves both genealogical
    precision and the lexical form better than the more interpretive 'eldest.'
- source_word: יְעוּשׁ
  chosen: Jeush
  alternatives:
  - Jeus
  rationale: Personal name transliterated by standard convention; 'Jeush' is the established
    English representation.
- source_word: הַשֵּׁנִי
  chosen: the second
  lexicon: HALOT
  rationale: Ordinal adjective marking birth order in the genealogy; rendered straightforwardly.
- source_word: וֶאֱלִיפֶלֶט
  chosen: and Eliphelet
  alternatives:
  - and Eliphalet
  rationale: Conjunction plus personal name. The conjunction is retained explicitly
    before the final item in the series. 'Eliphelet' is a standard English transliteration.
- source_word: הַשְּׁלִשִׁי
  chosen: the third
  lexicon: HALOT
  rationale: Ordinal adjective marking the third son in sequence; rendered directly.
