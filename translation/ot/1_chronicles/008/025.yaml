id: 1CH.8.25
reference: 1 Chronicles 8:25
source:
  edition: WLC
  text: וְ/יִפְדְיָ֥ה ו/פניאל בְּנֵ֥י שָׁשָֽׁק׃
translation:
  text: Iphdeiah and Penuel were the sons of Shashak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Peniel.' The Hebrew spelling can be represented either way in English
      transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִפְדְיָה
  chosen: Iphdeiah
  alternatives:
  - Jiphdeiah
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. English spelling reflects a standard transliteration of the Hebrew
    name.
- source_word: פניאל
  chosen: Penuel
  alternatives:
  - Peniel
  rationale: Proper personal name; transliterated. Although the consonants could support
    the familiar form 'Peniel,' 'Penuel' is a standard English rendering for this
    name in genealogical contexts and distinguishes it from the place-name spelling
    in some passages.
- source_word: בְּנֵי
  chosen: were the sons of
  alternatives:
  - sons of
  lexicon: HALOT
  rationale: 'Construct plural of ''son.'' In this verbless genealogical list, English
    idiom normally supplies ''were'' for clarity: ''X and Y were the sons of Z.''
    ''Sons'' is retained rather than a gender-neutral alternative because the Hebrew
    is explicitly masculine and genealogical.'
- source_word: שָׁשָׁק
  chosen: Shashak
  rationale: Proper personal name; transliterated by standard convention.
