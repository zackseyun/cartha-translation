id: 1CH.8.2
reference: 1 Chronicles 8:2
source:
  edition: WLC
  text: נוֹחָה֙ הָֽ/רְבִיעִ֔י וְ/רָפָ֖א הַ/חֲמִישִֽׁי׃ס
translation:
  text: Nohah the fourth, and Rapha the fifth.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: נוֹחָה
  chosen: Nohah
  alternatives:
  - Nohah
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the project's policy for names. English spelling 'Nohah' straightforwardly
    reflects the Hebrew consonants and vowels.
- source_word: הָרְבִיעִי
  chosen: the fourth
  alternatives:
  - fourth
  lexicon: HALOT
  rationale: Ordinal adjective with article, functioning in a genealogical list to
    mark birth order. Rendering the article explicitly as 'the fourth' matches normal
    English list style and preserves the Hebrew form.
- source_word: וְ
  chosen: and
  lexicon: HALOT
  rationale: Simple conjunction linking the next son in the sequence; standard rendering
    is 'and'.
- source_word: רָפָא
  chosen: Rapha
  alternatives:
  - Raphah
  lexicon: HALOT
  rationale: Proper personal name; transliterated. 'Rapha' is the conventional concise
    English form from the Hebrew name here.
- source_word: הַחֲמִישִׁי
  chosen: the fifth
  alternatives:
  - fifth
  lexicon: HALOT
  rationale: Ordinal adjective with article, parallel to 'the fourth' and indicating
    sequence within the genealogy. Keeping the article preserves the Hebrew structure
    and yields natural English.
