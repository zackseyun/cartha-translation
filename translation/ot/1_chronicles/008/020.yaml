id: 1CH.8.20
reference: 1 Chronicles 8:20
source:
  edition: WLC
  text: וֶ/אֱלִיעֵנַ֥י וְ/צִלְּתַ֖י וֶ/אֱלִיאֵֽל׃
translation:
  text: and Elienai, and Zillethai, and Eliel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וֶ/אֱלִיעֵנַי
  chosen: and Elienai
  alternatives:
  - and Eli-enai
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered straightforwardly as "and." The
    proper name is transliterated rather than translated, following the project rule
    to transliterate personal names. "Elienai" reflects a standard English convention
    for אֱלִיעֵנַי.
- source_word: וְ/צִלְּתַי
  chosen: and Zillethai
  alternatives:
  - and Zillthai
  lexicon: HALOT
  rationale: The conjunction ו is again rendered as "and." The name is transliterated.
    "Zillethai" is chosen as the smoother standard English representation of צִלְּתַי,
    preserving the doubled ל and final -ai sound.
- source_word: וֶ/אֱלִיאֵל
  chosen: and Eliel
  alternatives:
  - and Eliel
  lexicon: HALOT
  rationale: The conjunction ו is rendered "and." The proper name אֱלִיאֵל is transliterated
    as "Eliel," the conventional English form. No attempt is made to translate the
    theophoric elements because personal names are to be transliterated, not translated.
