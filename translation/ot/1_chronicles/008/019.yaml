id: 1CH.8.19
reference: 1 Chronicles 8:19
source:
  edition: WLC
  text: וְ/יָקִ֥ים וְ/זִכְרִ֖י וְ/זַבְדִּֽי׃
translation:
  text: and Jakim, and Zichri, and Zabdi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jakim may also be spelled 'Jachim' in English transliteration traditions.
    reason: lexical_alternative
  - marker: b
    text: Zichri may also be spelled 'Zicri' in English transliteration traditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ
  chosen: and
  rationale: The prefixed conjunction on each name is rendered explicitly as 'and,'
    preserving the Hebrew list structure.
- source_word: יָקִים
  chosen: Jakim
  alternatives:
  - Jachim
  lexicon: HALOT
  rationale: Proper name transliterated rather than translated, following the translation
    philosophy for personal names. 'Jakim' is a standard English transliteration;
    'Jachim' reflects an alternate conventional spelling.
- source_word: זִכְרִי
  chosen: Zichri
  alternatives:
  - Zicri
  lexicon: HALOT
  rationale: Proper name transliterated. 'Zichri' is a common English form that reflects
    the Hebrew consonants and vowel pattern; 'Zicri' is a possible alternate spelling.
- source_word: זַבְדִּי
  chosen: Zabdi
  lexicon: HALOT
  rationale: Proper name transliterated directly into standard English biblical form.
