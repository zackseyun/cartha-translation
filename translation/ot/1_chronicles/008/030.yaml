id: 1CH.8.30
reference: 1 Chronicles 8:30
source:
  edition: WLC
  text: וּ/בְנ֥/וֹ הַ/בְּכ֖וֹר עַבְדּ֑וֹן וְ/צ֥וּר וְ/קִ֖ישׁ וּ/בַ֥עַל וְ/נָדָֽב׃
translation:
  text: His firstborn son was Abdon, then Zur, Kish, Baal, and Nadab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more formally, ''And his firstborn son: Abdon, Zur, Kish, Baal, and
      Nadab.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנוֹ
  chosen: His ... son
  alternatives:
  - And his son
  - Now his son
  lexicon: HALOT
  rationale: The conjunction וְ here links this verse to the genealogy flow, but in
    English the natural rendering is to fold it into the clause as 'His ... son' rather
    than preserve a wooden initial 'And.' The pronominal suffix on בֵּן is rendered
    'his son.'
- source_word: הַבְּכוֹר
  chosen: firstborn
  alternatives:
  - eldest
  lexicon: HALOT
  rationale: The noun/adjective denotes the firstborn son in birth order. 'Firstborn'
    is the most direct and standard genealogical rendering and preserves the lexical
    sense better than the more interpretive 'eldest.'
- source_word: עַבְדּוֹן
  chosen: Abdon
  rationale: Proper personal name; transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: וְצוּר
  chosen: then Zur
  alternatives:
  - and Zur
  rationale: Proper name צוּר is transliterated 'Zur.' The repeated waw in a name
    list is idiomatically rendered in English with commas; 'then' helps the list read
    naturally after 'was Abdon' without changing the genealogical sense.
- source_word: וְקִישׁ
  chosen: Kish
  rationale: Proper personal name; transliterated by standard convention.
- source_word: וּבַעַל
  chosen: Baal
  rationale: This is a personal name in a genealogy, not necessarily a titular reference
    to the deity in this verse's syntax. Following the stated philosophy, names are
    transliterated rather than translated.
- source_word: וְנָדָב
  chosen: Nadab
  rationale: Proper personal name; transliterated by standard convention.
