id: 1CH.8.32
reference: 1 Chronicles 8:32
source:
  edition: WLC
  text: וּ/מִקְל֖וֹת הוֹלִ֣יד אֶת שִׁמְאָ֑ה וְ/אַף הֵ֗מָּה נֶ֧גֶד אֲחֵי/הֶ֛ם יָשְׁב֥וּ
    בִ/ירוּשָׁלִַ֖ם עִם אֲחֵי/הֶֽם־־־׃ס
translation:
  text: Mikloth fathered Shimeah. They too lived opposite their brothers in Jerusalem,
    with their brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'near their brothers'; the Hebrew preposition can denote a position in
      front of, opposite, or in proximity to someone.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here likely refers to fellow clan members or kinsmen within
      the Benjaminite genealogy, not necessarily only biological siblings.'
    reason: cultural_note
lexical_decisions:
- source_word: וּמִקְלוֹת
  chosen: Mikloth
  alternatives:
  - And Mikloth
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention. The prefixed
    conjunction is not separately represented in English because the verse reads naturally
    without repeating 'and' after the prior genealogy context; the connection is implicit.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: Genealogical verb meaning to beget/father. 'Fathered' is concise, natural
    modern English, and preserves the male genealogical sense without archaic tone.
- source_word: אֶת שִׁמְאָה
  chosen: Shimeah
  lexicon: HALOT
  rationale: Direct-object marker is not translated; the personal name is transliterated.
- source_word: וְאַף הֵמָּה
  chosen: They too
  alternatives:
  - And they also
  - They also
  lexicon: HALOT
  rationale: The combination adds emphasis/inclusion. 'They too' captures both the
    conjunction and the adverbial force in idiomatic English.
- source_word: נֶגֶד
  chosen: opposite
  alternatives:
  - before
  - in front of
  - near
  lexicon: HALOT
  rationale: The preposition commonly denotes spatial relation 'in front of/opposite.'
    In this settlement notice, 'opposite' best preserves the concrete relational sense
    without overinterpreting it as mere proximity.
- source_word: אֲחֵיהֶם
  chosen: their brothers
  alternatives:
  - their kinsmen
  - their relatives
  lexicon: HALOT
  rationale: The Hebrew is literally 'their brothers.' In genealogical tribal context
    it can denote kin-group members, but the translation philosophy prefers gender-accurate
    rendering matching the source form; broader kinship nuance can be inferred from
    context.
- source_word: יָשְׁבוּ
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: The verb means to sit/dwell/live. 'Lived' is clear modern English and
    fits a statement of residence.
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard place-name rendering.
- source_word: עִם אֲחֵיהֶם
  chosen: with their brothers
  alternatives:
  - alongside their brothers
  lexicon: HALOT
  rationale: עִם is straightforwardly 'with.' Retaining the repeated phrase reflects
    the Hebrew's emphasis and avoids smoothing away a significant detail.
