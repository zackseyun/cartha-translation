id: 1CH.8.12
reference: 1 Chronicles 8:12
source:
  edition: WLC
  text: וּ/בְנֵ֣י אֶלְפַּ֔עַל עֵ֥בֶר וּ/מִשְׁעָ֖ם וָ/שָׁ֑מֶד ה֚וּא בָּנָ֣ה אֶת אוֹנ֔וֹ
    וְ/אֶת לֹ֖ד וּ/בְנֹתֶֽי/הָ־־׃
translation:
  text: 'The sons of Elpaal: Eber, Misham, and Shemed; he built Ono and Lod with its
    surrounding villages.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'and its daughters,' a Hebrew idiom for a town's dependent or
      surrounding villages.
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'he' most naturally refers to Shemed, the last named son; some
      understand it more loosely in relation to the family line.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - Now the sons of
  lexicon: HALOT
  rationale: Construct plural of בֵּן introducing a genealogical list. English drops
    the conjunction for smoother style while preserving the genealogical heading sense.
- source_word: אֶלְפַּעַל
  chosen: Elpaal
  rationale: Proper personal name; transliterated according to standard English convention
    per translation philosophy.
- source_word: עֵבֶר
  chosen: Eber
  alternatives:
  - Heber
  rationale: Proper personal name. 'Eber' is a standard transliteration here; 'Heber'
    is a possible English form but less likely for this spelling in this context.
- source_word: וּמִשְׁעָם
  chosen: Misham
  rationale: Proper personal name; transliterated directly.
- source_word: וָשָׁמֶד
  chosen: and Shemed
  alternatives:
  - and Shamed
  rationale: Proper personal name; transliterated. The prefixed conjunction is retained
    before the final name in the series.
- source_word: הוּא
  chosen: he
  alternatives:
  - who
  lexicon: HALOT
  rationale: Independent pronoun 3ms most naturally resumes the last named individual,
    Shemed. English renders it as a simple personal pronoun rather than a relative
    clause, though the sense could be appositional ('who built').
- source_word: בָּנָה
  chosen: built
  alternatives:
  - founded
  - rebuilt
  lexicon: HALOT
  rationale: Qal perfect of בנה, standard sense 'build.' 'Founded' is interpretive;
    'rebuilt' is not warranted by the form alone.
- source_word: אֶת אוֹנוֹ
  chosen: Ono
  rationale: Direct-object marker plus place name. The marker is not represented in
    English; the toponym is transliterated.
- source_word: וְאֶת לֹד
  chosen: and Lod
  alternatives:
  - and Lydda
  rationale: Place name transliterated from the Hebrew form 'Lod.' 'Lydda' reflects
    a later Greek/English form and is less direct from the Hebrew text.
- source_word: וּבְנֹתֶיהָ
  chosen: with its surrounding villages
  alternatives:
  - and its daughters
  - and its dependent towns
  lexicon: HALOT
  rationale: Literally 'and its daughters,' an idiom for satellite settlements or
    dependent villages associated with a city. 'Surrounding villages' communicates
    the idiomatic sense in natural modern English.
