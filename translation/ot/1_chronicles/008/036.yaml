id: 1CH.8.36
reference: 1 Chronicles 8:36
source:
  edition: WLC
  text: וְ/אָחָז֙ הוֹלִ֣יד אֶת יְהוֹעַדָּ֔ה וִ/יהֽוֹעַדָּ֗ה הוֹלִ֛יד אֶת עָלֶ֥מֶת
    וְ/אֶת עַזְמָ֖וֶת וְ/אֶת זִמְרִ֑י וְ/זִמְרִ֖י הוֹלִ֥יד אֶת מוֹצָֽא־־־־־׃
translation:
  text: Ahaz fathered Jehoaddah, and Jehoaddah fathered Alemeth, Azmaveth, and Zimri;
    and Zimri fathered Moza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Jehoaddah; some English traditions read 'Jehoadah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In genealogical context, the Hiphil of ילד denotes direct descent. 'Fathered'
    is concise, natural modern English, and more readable than the archaic 'begot'
    while remaining more specific than 'became the father of.'
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: This is the direct-object marker in Hebrew and has no standalone English
    equivalent; its function is reflected in normal English word order.
- source_word: יְהוֹעַדָּה
  chosen: Jehoaddah
  alternatives:
  - Jehoadah
  rationale: Personal names are transliterated rather than translated per project
    philosophy. 'Jehoaddah' closely reflects the consonantal form in the supplied
    Hebrew text.
- source_word: עָלֶמֶת
  chosen: Alemeth
  rationale: Proper name transliterated by standard English convention.
- source_word: עַזְמָוֶת
  chosen: Azmaveth
  alternatives:
  - Azmavet
  rationale: Proper name transliterated in a conventional English biblical form that
    preserves the Hebrew consonants.
- source_word: זִמְרִי
  chosen: Zimri
  rationale: Proper name transliterated consistently in both occurrences.
- source_word: מוֹצָא
  chosen: Moza
  alternatives:
  - Moza
  rationale: Proper name transliterated; 'Moza' is the standard English form for this
    name.
- source_word: וְ
  chosen: and
  alternatives:
  - now
  - then
  lexicon: HALOT
  rationale: The conjunction simply links items in the genealogy. 'And' preserves
    the Hebrew paratactic structure without overinterpreting sequence.
