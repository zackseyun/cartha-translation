id: 1CH.8.3
reference: 1 Chronicles 8:3
source:
  edition: WLC
  text: וַ/יִּהְי֥וּ בָנִ֖ים לְ/בָ֑לַע אַדָּ֥ר וְ/גֵרָ֖א וַ/אֲבִיהֽוּד׃
translation:
  text: 'Bela had sons: Addar, Gera, and Abihud.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more literally, ''And sons were to Bela: Addar, Gera, and Abihud.'''
    reason: lexical_alternative
  - marker: b
    text: Some English versions spell the first name 'Adar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: had
  alternatives:
  - there were
  lexicon: HALOT
  rationale: The verb 'and they were' with 'sons to Bela' is an idiomatic genealogical
    construction best rendered in natural English as 'had sons.' This preserves the
    genealogical sense without wooden literalism.
- source_word: בָנִים
  chosen: sons
  alternatives:
  - children
  - descendants
  lexicon: HALOT
  rationale: In a genealogy, בָנִים most naturally means literal male offspring or
    lineal sons. 'Sons' is gender-accurate and fits the immediate naming of male descendants.
- source_word: לְבָלַע
  chosen: Bela
  rationale: Personal name, transliterated according to the translation philosophy
    rather than translated.
- source_word: אַדָּר
  chosen: Addar
  alternatives:
  - Adar
  rationale: Personal name, transliterated. 'Addar' reflects the doubled consonant
    in the Hebrew spelling more closely, though 'Adar' is a possible simplified English
    form.
- source_word: וְגֵרָא
  chosen: Gera
  rationale: Personal name, transliterated in standard English form.
- source_word: וַאֲבִיהוּד
  chosen: Abihud
  rationale: Personal name, transliterated in standard English form.
