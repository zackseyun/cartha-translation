id: 1CH.8.9
reference: 1 Chronicles 8:9
source:
  edition: WLC
  text: וַ/יּ֖וֹלֶד מִן חֹ֣דֶשׁ אִשְׁתּ֑/וֹ אֶת יוֹבָב֙ וְ/אֶת צִבְיָ֔א וְ/אֶת מֵישָׁ֖א
    וְ/אֶת מַלְכָּֽם־־־־־׃
translation:
  text: And he fathered Jobab, Zibia, Mesha, and Malcam by Hodesh his wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from Hodesh his wife.' The Hebrew preposition can be rendered either
      way in this genealogical formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹלֶד
  chosen: he fathered
  alternatives:
  - he begot
  - he became the father of
  lexicon: HALOT
  rationale: The Hiphil wayyiqtol of ילד in genealogical context denotes siring children.
    'He fathered' is clear modern English and preserves the male genealogical sense
    better than the more archaic 'begot.'
- source_word: מִן
  chosen: by
  alternatives:
  - from
  lexicon: HALOT
  rationale: 'With a wife named as the mother in a genealogical formula, מִן marks
    maternal source/agency: these sons were born by/from Hodesh. ''By'' is the most
    natural English idiom here.'
- source_word: חֹדֶשׁ
  chosen: Hodesh
  lexicon: HALOT
  rationale: This is a personal name, so it is transliterated rather than translated,
    in keeping with the translation philosophy for names.
- source_word: אִשְׁתּוֹ
  chosen: his wife
  alternatives:
  - his woman
  lexicon: HALOT
  rationale: In this context אשה with pronominal suffix clearly means spouse, not
    merely 'woman.' 'His wife' is the natural and accurate rendering.
- source_word: אֶת ... וְאֶת ... וְאֶת ... וְאֶת
  chosen: '[direct-object markers omitted in English; names listed with ''and'']'
  lexicon: HALOT
  rationale: The repeated direct-object marker has no direct English equivalent. Its
    function is represented by a straightforward coordinated list of sons' names.
- source_word: יוֹבָב
  chosen: Jobab
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: צִבְיָא
  chosen: Zibia
  alternatives:
  - Zibia
  lexicon: HALOT
  rationale: A straightforward transliteration of the proper name. 'Zibia' reflects
    the consonants and final aleph in a conventional English form.
- source_word: מֵישָׁא
  chosen: Mesha
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: מַלְכָּם
  chosen: Malcam
  alternatives:
  - Malcham
  lexicon: HALOT
  rationale: Here the form functions as a personal name in a genealogy, so it is transliterated.
    'Malcam' is a conventional English representation of the Hebrew name.
