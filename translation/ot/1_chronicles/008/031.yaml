id: 1CH.8.31
reference: 1 Chronicles 8:31
source:
  edition: WLC
  text: וּ/גְד֥וֹר וְ/אַחְי֖וֹ וָ/זָֽכֶר׃
translation:
  text: and Gedor, and Ahio, and Zecher.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Zacher.' The Hebrew proper name זָכֶר may be represented in English
      by different transliteration conventions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּגְדוֹר
  chosen: and Gedor
  alternatives:
  - Gedor
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered as 'and' in keeping with the genealogical
    list style. גְדוֹר is a proper name and is therefore transliterated 'Gedor' rather
    than translated, following the philosophy of transliterating personal names.
- source_word: וְאַחְיוֹ
  chosen: and Ahio
  alternatives:
  - Ahio
  lexicon: HALOT
  rationale: The conjunction ו is again rendered 'and' to preserve the serial structure
    of the name list. אַחְיוֹ is treated as the proper name 'Ahio' and transliterated
    by standard English convention.
- source_word: וָזָכֶר
  chosen: and Zecher
  alternatives:
  - Zacher
  lexicon: HALOT
  rationale: The prefixed conjunction is rendered 'and.' The proper name זָכֶר is
    transliterated 'Zecher.' An alternative spelling 'Zacher' is possible depending
    on transliteration convention and vocalic representation, but 'Zecher' more directly
    reflects the Masoretic pointing here.
