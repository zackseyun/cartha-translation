id: 1CH.8.17
reference: 1 Chronicles 8:17
source:
  edition: WLC
  text: וּ/זְבַדְיָ֥ה וּ/מְשֻׁלָּ֖ם וְ/חִזְקִ֥י וָ/חָֽבֶר׃
translation:
  text: and Zebadiah, and Meshullam, and Hizki, and Heber.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/זְבַדְיָה
  chosen: and Zebadiah
  alternatives:
  - and Zebadya
  lexicon: HALOT
  rationale: Proper name with prefixed conjunction וּ. Personal names are transliterated
    by standard English convention. 'Zebadiah' is the established and recognizable
    English transliteration of זְבַדְיָה.
- source_word: וּ/מְשֻׁלָּם
  chosen: and Meshullam
  lexicon: HALOT
  rationale: Proper name with prefixed conjunction. Transliterated rather than translated,
    following the project's policy for personal names.
- source_word: וְ/חִזְקִי
  chosen: and Hizki
  alternatives:
  - and Hizzki
  - and Hezeki
  lexicon: HALOT
  rationale: Proper name with prefixed conjunction. Rendered by direct transliteration
    from the Hebrew consonants and vowels as 'Hizki.' Alternative English spellings
    are possible, but this form stays closest to the Hebrew form without importing
    the more familiar but different name 'Hezekiah.'
- source_word: וָ/חָבֶר
  chosen: and Heber
  alternatives:
  - and Haber
  lexicon: HALOT
  rationale: Proper name with prefixed conjunction. 'Heber' is the conventional English
    transliteration for חָבֶר in biblical genealogical contexts.
