id: 1CH.8.28
reference: 1 Chronicles 8:28
source:
  edition: WLC
  text: אֵ֣לֶּה רָאשֵׁ֥י אָב֛וֹת לְ/תֹלְדוֹתָ֖/ם רָאשִׁ֑ים אֵ֖לֶּה יָשְׁב֥וּ בִ/ירוּשָׁלִָֽם׃ס
translation:
  text: These were heads of fathers’ houses according to their generations, chief
    men. These lived in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heads of ancestral houses ... chiefs.' The Hebrew repeats the root for
      'head/chief' for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאשֵׁי אָבוֹת
  chosen: heads of fathers’ houses
  alternatives:
  - heads of ancestral houses
  - chief fathers
  - family heads
  lexicon: HALOT
  rationale: The construct phrase literally combines 'heads' with 'fathers,' an idiom
    for clan or household leaders. 'Heads of fathers’ houses' preserves the Hebrew
    social structure more closely than the smoother but less explicit 'family heads.'
- source_word: לְתֹלְדוֹתָם
  chosen: according to their generations
  alternatives:
  - by their generations
  - in their genealogies
  - according to their family records
  lexicon: HALOT
  rationale: תולדות often refers to generations/descent lines. Here it qualifies the
    clan heads in genealogical arrangement. 'According to their generations' keeps
    the formal genealogical sense without over-interpreting as written records.
- source_word: רָאשִׁים
  chosen: chief men
  alternatives:
  - chiefs
  - leaders
  - heads
  lexicon: HALOT
  rationale: The repeated noun emphasizes status. Rendering it 'chief men' avoids
    an awkward exact repetition of 'heads' in English while preserving the sense of
    leading figures.
- source_word: יָשְׁבוּ
  chosen: lived
  alternatives:
  - dwelt
  - settled
  - resided
  lexicon: HALOT
  rationale: In this genealogical notice, the verb denotes residence rather than the
    act of sitting. 'Lived' is natural modern English and accurately conveys ongoing
    habitation.
- source_word: בִירוּשָׁלָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard rendering of the place name with the preposition preserved.
- source_word: אֵלֶּה ... אֵלֶּה
  chosen: These ... These
  alternatives:
  - These were ... they
  - These are ... these
  lexicon: HALOT
  rationale: The verse uses the demonstrative twice for structural emphasis. Retaining
    both in English reflects the Hebrew discourse pattern, though the second is slightly
    smoothed by the sentence division.
