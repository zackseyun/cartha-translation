id: 1CH.27.14
reference: 1 Chronicles 27:14
source:
  edition: WLC
  text: עַשְׁתֵּֽי עָשָׂר֙ לְ/עַשְׁתֵּ֣י עָשָׂ֣ר הַ/חֹ֔דֶשׁ בְּנָיָ֥ה הַ/פִּרְעָתוֹנִ֖י
    מִן בְּנֵ֣י אֶפְרָ֑יִם וְ/עַל֙ מַחֲלֻקְתּ֔/וֹ עֶשְׂרִ֥ים וְ/אַרְבָּעָ֖ה אָֽלֶף־־־׃ס
translation:
  text: For the twelfth month, Benaiah the Pirathonite, from the sons of Ephraim;
    and over his division were twenty-four thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from Ephraim.' The Hebrew more literally reads 'from the sons of Ephraim,'
      indicating tribal descent.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַשְׁתֵּי עָשָׂר לְעַשְׁתֵּי עָשָׂר הַחֹדֶשׁ
  chosen: For the twelfth month
  alternatives:
  - For the twelve, for the twelfth month
  - For the twelfth, for the twelfth month
  lexicon: HALOT
  rationale: The idiom introduces the military course assigned to the twelfth month.
    English smooths the Hebrew ordinal construction naturally as 'For the twelfth
    month.'
- source_word: בְּנָיָה
  chosen: Benaiah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: הַפִּרְעָתוֹנִי
  chosen: the Pirathonite
  alternatives:
  - the man from Pirathon
  lexicon: HALOT
  rationale: The gentilic is best represented by the standard English form 'Pirathonite,'
    preserving the place-based identity.
- source_word: מִן בְּנֵי אֶפְרָיִם
  chosen: from the sons of Ephraim
  alternatives:
  - from Ephraim
  - from the people of Ephraim
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'sons of Ephraim.' This likely denotes tribal
    descent rather than immediate parentage, but the more literal rendering preserves
    the source wording and its genealogical flavor.
- source_word: וְעַל מַחֲלֻקְתּוֹ
  chosen: and over his division were
  alternatives:
  - and his division had
  - and in his division were
  lexicon: HALOT
  rationale: מַחֲלֻקָה here refers to the military division/course under his command
    in this chapter's repeated formula. 'Over his division were' preserves the Hebrew
    preposition and the administrative sense, though slightly idiomatic in English.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  chosen: twenty-four thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number; rendered in standard English form.
