id: 1CH.27.25
reference: 1 Chronicles 27:25
source:
  edition: WLC
  text: וְ/עַל֙ אֹצְר֣וֹת הַ/מֶּ֔לֶךְ עַזְמָ֖וֶת בֶּן עֲדִיאֵ֑ל וְ/עַ֣ל הָֽ/אֹצָר֡וֹת
    בַּ/שָּׂדֶ֞ה בֶּ/עָרִ֤ים וּ/בַ/כְּפָרִים֙ וּ/בַ/מִּגְדָּל֔וֹת יְהוֹנָתָ֖ן בֶּן
    עֻזִּיָּֽהוּ־ס־׃ס
translation:
  text: Over the king’s treasuries was Azmaveth son of Adiel, and over the treasuries
    in the countryside, in the cities, in the villages, and in the towers, was Jehonathan
    son of Uzziah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the field'; the Hebrew singular likely has a collective sense here,
      referring to rural areas as distinct from cities, villages, and towers.
    reason: lexical_alternative
  - marker: b
    text: '''Jehonathan'' reflects the fuller Hebrew name form here; some English
      versions shorten it to ''Jonathan.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: Over ... was
  alternatives:
  - And over
  - In charge of
  lexicon: HALOT
  rationale: The preposition עַל in this administrative list marks oversight or responsibility.
    'Over ... was' preserves the list-like syntax while communicating assigned authority.
- source_word: אֹצְרוֹת / הָאֹצָרוֹת
  chosen: treasuries / treasuries
  alternatives:
  - stores
  - storehouses
  - treasures
  lexicon: HALOT
  rationale: אֹצָר can denote a treasury, storehouse, or stored goods. In this administrative
    context, 'treasuries' best fits official royal and regional storage/finance oversight.
    Using the same English term for both occurrences preserves lexical consistency.
- source_word: הַמֶּלֶךְ
  chosen: the king’s
  alternatives:
  - of the king
  - royal
  lexicon: HALOT
  rationale: The construct phrase אֹצְרוֹת הַמֶּלֶךְ is naturally rendered 'the king’s
    treasuries.' This is more idiomatic than 'treasuries of the king' while remaining
    formally close.
- source_word: עַזְמָוֶת
  chosen: Azmaveth
  alternatives:
  - Azmavet
  rationale: Personal names are transliterated by standard conventions per project
    philosophy.
- source_word: בֶּן עֲדִיאֵל
  chosen: son of Adiel
  rationale: בן is rendered straightforwardly as 'son of' in genealogical identification.
- source_word: בַּשָּׂדֶה
  chosen: in the countryside
  alternatives:
  - in the field
  - in the open country
  lexicon: HALOT
  rationale: Though singular 'field' is literal, here the phrase contrasts with cities,
    villages, and towers and refers collectively to rural areas. 'In the countryside'
    communicates the distributive geographic sense in natural English.
- source_word: בֶּעָרִים
  chosen: in the cities
  alternatives:
  - among the cities
  lexicon: HALOT
  rationale: A straightforward locative rendering fits the list of places where treasuries
    were kept.
- source_word: וּבַכְּפָרִים
  chosen: in the villages
  alternatives:
  - in the hamlets
  lexicon: HALOT
  rationale: כְּפָרִים refers to villages or rural settlements. 'Villages' is standard
    and clear modern English.
- source_word: וּבַמִּגְדָּלוֹת
  chosen: in the towers
  alternatives:
  - in the watchtowers
  - in the fortified towers
  lexicon: HALOT
  rationale: מִגְדָּלוֹת literally means 'towers.' In this storage-administration
    context these may be fortified or watch towers, but the Hebrew itself does not
    specify beyond 'towers,' so the more literal rendering is preferred.
- source_word: יְהוֹנָתָן
  chosen: Jehonathan
  alternatives:
  - Jonathan
  rationale: The Hebrew form here is יְהוֹנָתָן, not the shorter יוֹנָתָן. 'Jehonathan'
    preserves the fuller name form represented in the source text.
- source_word: בֶּן עֻזִּיָּהוּ
  chosen: son of Uzziah
  rationale: Standard genealogical rendering; Uzziah is the conventional English transliteration
    of עֻזִּיָּהוּ.
