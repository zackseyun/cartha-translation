id: 1CH.27.13
reference: 1 Chronicles 27:13
source:
  edition: WLC
  text: הָ/עֲשִׂירִי֙ לַ/חֹ֣דֶשׁ הָ/עֲשִׂירִ֔י מַהְרַ֥י הַ/נְּטֽוֹפָתִ֖י לַ/זַּרְחִ֑י
    וְ/עַל֙ מַֽחֲלֻקְתּ֔/וֹ עֶשְׂרִ֥ים וְ/אַרְבָּעָ֖ה אָֽלֶף׃ס
translation:
  text: 'The tenth, for the tenth month: Mahrai the Netophathite, of the Zerahites;
    and over his division were twenty-four thousand.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the Zerahite clan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֲשִׂירִי
  chosen: The tenth
  alternatives:
  - The tenth commander
  - The tenth division
  lexicon: HALOT
  rationale: Ordinal adjective used substantivally in this roster context; English
    can naturally render it as 'The tenth,' with the office implied from the surrounding
    list structure.
- source_word: לַחֹדֶשׁ הָעֲשִׂירִי
  chosen: for the tenth month
  alternatives:
  - for the tenth month's service
  - for month ten
  lexicon: HALOT
  rationale: The preposition ל with 'month' in this chapter marks the monthly rotation
    assignment. 'For the tenth month' is concise and contextually clear.
- source_word: מַהְרַי
  chosen: Mahrai
  alternatives:
  - Maharai
  rationale: Personal name transliterated per translation philosophy. 'Mahrai' reflects
    a standard English transliteration of the Hebrew form here.
- source_word: הַנְּטוֹפָתִי
  chosen: the Netophathite
  alternatives:
  - from Netophah
  lexicon: HALOT
  rationale: Gentilic/nisbe form indicating origin from Netophah. The adjectival ethnic
    form 'Netophathite' is the conventional and compact rendering.
- source_word: לַזַּרְחִי
  chosen: of the Zerahites
  alternatives:
  - the Zerahite
  - belonging to Zerah
  lexicon: HALOT
  rationale: The phrase identifies clan affiliation. Although morphologically singular/gentilic,
    in English the collective clan sense is best conveyed by 'of the Zerahites,' matching
    genealogical usage.
- source_word: וְעַל מַחֲלֻקְתּוֹ
  chosen: and over his division were
  alternatives:
  - and over his course were
  - and his division numbered
  lexicon: HALOT
  rationale: מַחֲלֻקָה in this chapter refers to the military division/course assigned
    for service. 'Over his division were' preserves the Hebrew construction with על
    while yielding natural English.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  chosen: twenty-four thousand
  alternatives:
  - twenty and four thousand
  lexicon: HALOT
  rationale: Standard English rendering of the cardinal number phrase.
