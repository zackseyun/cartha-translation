id: 1CH.27.2
reference: 1 Chronicles 27:2
source:
  edition: WLC
  text: עַ֞ל הַ/מַּחֲלֹ֤קֶת הָ/רִֽאשׁוֹנָה֙ לַ/חֹ֣דֶשׁ הָ/רִאשׁ֔וֹן יָֽשָׁבְעָ֖ם בֶּן
    זַבְדִּיאֵ֑ל וְ/עַל֙ מַֽחֲלֻקְתּ֔/וֹ עֶשְׂרִ֥ים וְ/אַרְבָּעָ֖ה אָֽלֶף־׃
translation:
  text: Over the first division for the first month was Jashobeam son of Zabdiel,
    and in his division were twenty-four thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'and over his division, twenty-four thousand'—the Hebrew is elliptical,
      and English supplies 'were' to express the unit's size.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: Over
  alternatives:
  - For
  - Concerning
  lexicon: HALOT
  rationale: In this administrative list, עַל introduces the person set in charge
    of a unit. 'Over' best conveys authority/supervision in natural English.
- source_word: הַמַּחֲלֹקֶת
  chosen: division
  alternatives:
  - course
  - division of service
  - company
  lexicon: HALOT
  rationale: מַחֲלֹקֶת in Chronicles commonly denotes an organized military or cultic
    division. 'Division' is clear modern English and fits the military census context
    better than the more archaic 'course'.
- source_word: הָרִאשׁוֹנָה
  chosen: first
  alternatives:
  - chief
  - former
  lexicon: HALOT
  rationale: The adjective marks sequence within a numbered series of monthly divisions;
    'first' is the straightforward ordinal sense.
- source_word: לַחֹדֶשׁ הָרִאשׁוֹן
  chosen: for the first month
  alternatives:
  - of the first month
  - for month one
  lexicon: HALOT
  rationale: The phrase identifies the division assigned to the first month in the
    annual rotation. 'For the first month' communicates assignment rather than mere
    association.
- source_word: יָשָׁבְעָם
  chosen: Jashobeam
  alternatives:
  - Jashobam
  rationale: Personal names are transliterated by standard English convention. 'Jashobeam'
    is the established English form for this name in Chronicles.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In genealogical identification, 'son of' is the normal and sufficiently
    precise rendering unless the context clearly requires a broader descendant sense.
- source_word: וְעַל מַחֲלֻקְתּוֹ
  chosen: and in his division were
  alternatives:
  - and over his division were
  - and his division numbered
  lexicon: HALOT
  rationale: Literally, 'and over his division,' but the clause is elliptical, with
    the following number giving the size of the unit. English requires the implied
    idea to be supplied. 'In his division were' preserves the sense without overparaphrasing.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  chosen: twenty-four thousand
  alternatives:
  - 24,000
  lexicon: HALOT
  rationale: Standard English rendering of the cardinal number; spelling out the number
    suits Bible style and readability.
