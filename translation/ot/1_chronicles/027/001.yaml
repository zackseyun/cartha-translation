id: 1CH.27.1
reference: 1 Chronicles 27:1
source:
  edition: WLC
  text: וּ/בְנֵ֣י יִשְׂרָאֵ֣ל לְֽ/מִסְפָּרָ֡/ם רָאשֵׁ֣י הָ/אָב֣וֹת וְ/שָׂרֵ֣י הָֽ/אֲלָפִ֣ים
    וְ/הַ/מֵּא֡וֹת וְ/שֹׁטְרֵי/הֶם֩ הַ/מְשָׁרְתִ֨ים אֶת הַ/מֶּ֜לֶךְ לְ/כֹ֣ל דְּבַ֣ר
    הַֽ/מַּחְלְק֗וֹת הַ/בָּאָ֤ה וְ/הַ/יֹּצֵאת֙ חֹ֣דֶשׁ בְּ/חֹ֔דֶשׁ לְ/כֹ֖ל חָדְשֵׁ֣י
    הַ/שָּׁנָ֑ה הַֽ/מַּחֲלֹ֨קֶת֙ הָֽ/אַחַ֔ת עֶשְׂרִ֥ים וְ/אַרְבָּעָ֖ה אָֽלֶף׀׀־׀׃ס
translation:
  text: Now the sons of Israel, according to their number—the heads of fathers’ houses,
    and the commanders of thousands and of hundreds, and their officers who served
    the king in every matter of the divisions that came in and went out month by month
    throughout all the months of the year—each division was twenty-four thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The Israelites,' a more idiomatic collective rendering of 'the sons
      of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'heads of fathers’ houses,' a clan-based administrative term.
    reason: cultural_note
  - marker: c
    text: That is, the divisions rotated into and out of royal service month by month.
    reason: cross_reference
lexical_decisions:
- source_word: וּבְנֵי יִשְׂרָאֵל
  chosen: Now the sons of Israel
  alternatives:
  - And the sons of Israel
  - The Israelites
  lexicon: HALOT
  rationale: בני ישראל is literally 'sons of Israel.' Following gender-accurate policy,
    the formal expression is retained rather than flattened to 'Israelites,' though
    that alternative captures the collective sense. 'Now' renders the prefixed conjunction
    smoothly at the head of a new section.
- source_word: למספרם
  chosen: according to their number
  alternatives:
  - by their number
  - in their number
  lexicon: HALOT
  rationale: The phrase indicates arrangement or reckoning by numerical count. 'According
    to their number' is idiomatic and preserves the administrative sense.
- source_word: ראשי האבות
  chosen: the heads of fathers’ houses
  alternatives:
  - the heads of the fathers
  - the family heads
  - the heads of ancestral houses
  lexicon: HALOT
  rationale: This is a technical kinship-administrative expression. 'Fathers’ houses'
    preserves the Hebrew social structure more precisely than the more interpretive
    'families' or 'clans.'
- source_word: ושרי האלפים והמאות
  chosen: the commanders of thousands and of hundreds
  alternatives:
  - the captains of thousands and hundreds
  - the chiefs of thousands and hundreds
  lexicon: HALOT
  rationale: שרי here refers to military/administrative leaders. 'Commanders' best
    fits the context of rotating divisions in royal service.
- source_word: ושטריהם
  chosen: their officers
  alternatives:
  - their officials
  - their scribes
  lexicon: HALOT
  rationale: שטרים can denote officials/administrators, sometimes with scribal functions.
    In this military-administrative context, 'officers' is the best concise rendering.
- source_word: המשרתים את המלך
  chosen: who served the king
  alternatives:
  - ministering to the king
  - attending the king
  lexicon: HALOT
  rationale: The participle describes ongoing official service. 'Served the king'
    is natural English and broad enough to include administrative and military service.
- source_word: לכל דבר המחלקות
  chosen: in every matter of the divisions
  alternatives:
  - for every matter of the divisions
  - in all the business of the divisions
  lexicon: HALOT
  rationale: דבר here means matter, affair, or business. 'In every matter' preserves
    the comprehensive administrative scope without over-paraphrase.
- source_word: הבאה והיצאת
  chosen: that came in and went out
  alternatives:
  - that entered and departed
  - that came and went
  lexicon: HALOT
  rationale: These participles describe the rotation of the divisions into and out
    of service. 'Came in and went out' preserves the concrete movement and echoes
    the Hebrew pair.
- source_word: חדש בחדש
  chosen: month by month
  alternatives:
  - from month to month
  lexicon: HALOT
  rationale: This distributive idiom is naturally rendered 'month by month.'
- source_word: לכל חדשי השנה
  chosen: throughout all the months of the year
  alternatives:
  - for all the months of the year
  - through all the months of the year
  lexicon: HALOT
  rationale: The phrase specifies the full annual cycle of rotations. 'Throughout'
    conveys duration across the whole year.
- source_word: המחלקת האחת
  chosen: each division
  alternatives:
  - the one division
  - one division
  lexicon: HALOT
  rationale: 'Although literally ''the one division,'' the sense in context is distributive:
    each individual division in the cycle. English requires this contextual rendering
    for clarity.'
- source_word: עשרים וארבעה אלף
  chosen: twenty-four thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number; hyphenated in standard English style.
