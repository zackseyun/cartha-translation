id: 1CH.27.5
reference: 1 Chronicles 27:5
source:
  edition: WLC
  text: שַׂ֣ר הַ/צָּבָ֤א הַ/שְּׁלִישִׁי֙ לַ/חֹ֣דֶשׁ הַ/שְּׁלִישִׁ֔י בְּנָיָ֧הוּ בֶן
    יְהוֹיָדָ֛ע הַ/כֹּהֵ֖ן רֹ֑אשׁ וְ/עַל֙ מַחֲלֻקְתּ֔/וֹ עֶשְׂרִ֥ים וְ/אַרְבָּעָ֖ה
    אָֽלֶף־׃
translation:
  text: The commander of the third division for the third month was Benaiah son of
    Jehoiada, the chief priest; and in his division were twenty-four thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Benaiah son of Jehoiada the priest, chief'; the Hebrew can be read
      more literally this way, but the sense is likely that Jehoiada was a leading
      priest.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂר הַצָּבָא
  chosen: the commander
  alternatives:
  - the leader of the army
  - the captain
  lexicon: HALOT
  rationale: שַׂר denotes a ruler/official/commander, and with הַצָּבָא refers to
    military command. In this chapter the office heads monthly military divisions,
    so 'the commander' is concise and natural English.
- source_word: הַשְּׁלִישִׁי לַחֹדֶשׁ הַשְּׁלִישִׁי
  chosen: of the third division for the third month
  alternatives:
  - for the third month, the third
  - the third, for the third month
  lexicon: HALOT
  rationale: The first 'third' modifies the military unit in the sequence of divisions
    listed in the chapter; the second modifies 'month.' Supplying 'division' makes
    the elliptical Hebrew clear in English and fits the recurring structure of the
    passage.
- source_word: בְּנָיָהוּ בֶן יְהוֹיָדָע
  chosen: Benaiah son of Jehoiada
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: הַכֹּהֵן
  chosen: the chief priest
  alternatives:
  - the priest
  lexicon: HALOT
  rationale: While the Hebrew form is literally 'the priest,' in this context attached
    to Jehoiada and followed by רֹאשׁ, the phrase likely identifies Jehoiada by rank
    or prominence rather than merely profession. 'Chief priest' captures the appositional
    force and matches the sense of a leading priestly figure better than the flat
    'the priest.'
- source_word: רֹאשׁ
  chosen: the chief
  alternatives:
  - head
  - leader
  lexicon: HALOT
  rationale: רֹאשׁ commonly means 'head/chief.' Here it is taken appositionally with
    the preceding priestly designation, yielding 'the chief priest' in idiomatic English
    rather than the awkward 'the priest, head.'
- source_word: וְעַל מַחֲלֻקְתּוֹ
  chosen: and in his division were
  alternatives:
  - and over his division was
  - and his division numbered
  lexicon: HALOT
  rationale: מַחֲלֻקָה in this chapter refers to a military division. The preposition
    עַל with the possessive can indicate relation to or charge over the division,
    but the clause's function in the repeated formula is to state the size of the
    division. 'In his division were' communicates the sense naturally in English.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  chosen: twenty-four thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number; hyphenated compound is standard modern
    English.
