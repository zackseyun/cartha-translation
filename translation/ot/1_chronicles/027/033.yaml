id: 1CH.27.33
reference: 1 Chronicles 27:33
source:
  edition: WLC
  text: וַ/אֲחִיתֹ֖פֶל יוֹעֵ֣ץ לַ/מֶּ֑לֶךְ וְ/חוּשַׁ֥י הָ/אַרְכִּ֖י רֵ֥עַ הַ/מֶּֽלֶךְס׃
translation:
  text: And Ahithophel was counselor to the king, and Hushai the Archite was the king’s
    friend.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'companion' or 'associate'; the Hebrew term can denote a friend generally,
      and in a royal context may also imply a trusted court companion.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲחִיתֹפֶל
  chosen: Ahithophel
  rationale: Proper personal name; transliterated according to the translation philosophy
    of transliterating names rather than translating them.
- source_word: יוֹעֵץ
  chosen: counselor
  alternatives:
  - advisor
  lexicon: HALOT
  rationale: The participial/noun form denotes one who gives counsel. 'Counselor'
    is the most natural English equivalent and fits a court office context better
    than the slightly flatter 'advisor,' while remaining readable modern English.
- source_word: לַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - for the king
  lexicon: HALOT
  rationale: The preposition ל here marks relation/service to the royal office. 'To
    the king' is a natural formal rendering in English and preserves the Hebrew construction.
- source_word: חוּשַׁי
  chosen: Hushai
  rationale: Proper personal name; transliterated.
- source_word: הָאַרְכִּי
  chosen: the Archite
  alternatives:
  - the Arkite
  lexicon: HALOT
  rationale: A gentilicial/title identifying Hushai by clan or place association.
    'Archite' is the conventional and phonetically straightforward transliteration
    from the Hebrew form אַרְכִּי.
- source_word: רֵעַ
  chosen: friend
  alternatives:
  - companion
  - associate
  lexicon: HALOT
  rationale: The noun commonly means friend, companion, or associate. In this court
    setting, 'friend' is the plain lexical sense and also reflects the likely technical
    sense of a royal confidant without over-specifying the office in the main text.
- source_word: הַמֶּלֶךְ
  chosen: the king’s
  alternatives:
  - of the king
  lexicon: HALOT
  rationale: 'Rendered idiomatically as an English possessive: ''the king’s friend.''
    This preserves the construct-like relationship in natural English.'
- source_word: וַ
  chosen: And
  alternatives:
  - Now
  lexicon: HALOT
  rationale: The conjunction links this office-holder notice with the surrounding
    list. 'And' is the straightforward rendering.
