id: 1CH.27.22
reference: 1 Chronicles 27:22
source:
  edition: WLC
  text: לְ/דָ֕ן עֲזַרְאֵ֖ל בֶּן יְרֹחָ֑ם אֵ֕לֶּה שָׂרֵ֖י שִׁבְטֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: 'For Dan: Azarel son of Jeroham. These were the leaders of the tribes of Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chiefs' or 'officials' for 'leaders.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/דָן
  chosen: For Dan
  alternatives:
  - Of Dan
  - for the tribe of Dan
  lexicon: HALOT
  rationale: The prefixed ל introduces the tribal heading in this administrative list,
    best rendered idiomatically as 'For Dan' to indicate the officer assigned to that
    tribe.
- source_word: עֲזַרְאֵל
  chosen: Azarel
  alternatives:
  - Azareel
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention. 'Azarel'
    is a straightforward transliteration of the Hebrew name.
- source_word: בֶּן
  chosen: son of
  alternatives: []
  lexicon: HALOT
  rationale: The construct indicates filiation; 'son of' is the normal and transparent
    rendering in genealogical/administrative notices.
- source_word: יְרֹחָם
  chosen: Jeroham
  alternatives:
  - Yeroham
  lexicon: HALOT
  rationale: Personal name transliterated by standard convention; 'Jeroham' matches
    common English biblical usage while remaining close to the Hebrew.
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - These are
  lexicon: HALOT
  rationale: Deictic plural pronoun introducing the summary statement. English can
    supply the verbless clause naturally in the following predicate.
- source_word: שָׂרֵי
  chosen: leaders
  alternatives:
  - chiefs
  - officials
  - princes
  lexicon: HALOT
  rationale: In this context of tribal administration, 'leaders' communicates the
    governing role clearly in modern English without the archaic feel of 'princes'
    or the overly bureaucratic sense of 'officials.'
- source_word: שִׁבְטֵי
  chosen: of the tribes of
  alternatives:
  - of the tribal groups of
  lexicon: HALOT
  rationale: Construct plural of 'tribe'; rendered directly as part of the genitival
    phrase 'leaders of the tribes of Israel.'
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives: []
  lexicon: HALOT
  rationale: Proper national name, transliterated conventionally.
