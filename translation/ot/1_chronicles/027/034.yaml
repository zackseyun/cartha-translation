id: 1CH.27.34
reference: 1 Chronicles 27:34
source:
  edition: WLC
  text: וְ/אַחֲרֵ֣י אֲחִיתֹ֗פֶל יְהוֹיָדָ֤ע בֶּן בְּנָיָ֨הוּ֙ וְ/אֶבְיָתָ֔ר וְ/שַׂר
    צָבָ֥א לַ/מֶּ֖לֶךְ יוֹאָֽב־־׃פ
translation:
  text: After Ahithophel came Jehoiada son of Benaiah and Abiathar; and Joab was commander
    of the army for the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'After Ahithophel, Jehoiada son of Benaiah and Abiathar.'
      The Hebrew leaves the verb implied.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחֲרֵי
  chosen: After ... came
  alternatives:
  - after
  - and after
  lexicon: HALOT
  rationale: The preposition אַחֲרֵי means 'after.' In this administrative list, English
    idiom is clearer if the implied succession is expressed as 'After Ahithophel came
    ...' rather than a verbless 'and after Ahithophel, Jehoiada...'.
- source_word: אֲחִיתֹפֶל
  chosen: Ahithophel
  rationale: Personal name; transliterated according to the translation philosophy.
- source_word: יְהוֹיָדָע
  chosen: Jehoiada
  rationale: Personal name; transliterated.
- source_word: בֶּן בְּנָיָהוּ
  chosen: son of Benaiah
  alternatives:
  - the son of Benaiah
  lexicon: HALOT
  rationale: Standard Hebrew patronymic construction. English omits the article naturally.
- source_word: וְ/אֶבְיָתָר
  chosen: and Abiathar
  rationale: Simple conjunction plus personal name. The syntax most naturally groups
    Abiathar with Jehoiada as successors/counselors after Ahithophel.
- source_word: וְ/שַׂר צָבָא
  chosen: and ... was commander of the army
  alternatives:
  - and the commander of the army
  - and chief officer of the army
  lexicon: HALOT
  rationale: שַׂר צָבָא denotes the military chief/commander. Because the Hebrew is
    verbless, English supplies 'was' for a complete sentence.
- source_word: לַ/מֶּלֶךְ
  chosen: for the king
  alternatives:
  - to the king
  - of the king
  lexicon: HALOT
  rationale: 'The prefixed ל here indicates relation/service: Joab served as commander
    in relation to the king, hence ''for the king'' is the most natural English rendering.'
- source_word: יוֹאָב
  chosen: Joab
  rationale: Personal name; transliterated.
