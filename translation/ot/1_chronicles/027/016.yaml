id: 1CH.27.16
reference: 1 Chronicles 27:16
source:
  edition: WLC
  text: וְ/עַל֙ שִׁבְטֵ֣י יִשְׂרָאֵ֔ל לָ/רֽאוּבֵנִ֣י נָגִ֔יד אֱלִיעֶ֖זֶר בֶּן זִכְרִ֑י
    לַ/שִּׁ֨מְעוֹנִ֔י שְׁפַטְיָ֖הוּ בֶּֽן מַעֲכָֽה־ס־׃ס
translation:
  text: 'And over the tribes of Israel: for the Reubenites, Eliezer son of Zichri
    was leader; for the Simeonites, Shephatiah son of Maacah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chief,' 'prince,' or 'ruler' for Hebrew נָגִיד.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: And over
  alternatives:
  - Now over
  - Concerning
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces a new section in the administrative
    list and indicates oversight or jurisdiction. 'And over' preserves the structural
    linkage with the preceding context and the sense of authority.
- source_word: שִׁבְטֵי יִשְׂרָאֵל
  chosen: the tribes of Israel
  alternatives:
  - Israel's tribes
  lexicon: HALOT
  rationale: A straightforward construct chain. 'The tribes of Israel' is the most
    natural and transparent English rendering.
- source_word: לָרְאוּבֵנִי
  chosen: for the Reubenites
  alternatives:
  - for Reuben
  - for the tribe of Reuben
  lexicon: HALOT
  rationale: The gentilic form refers to the tribal group rather than the patriarch
    personally. 'For the Reubenites' fits the list format naming the official assigned
    to each tribe.
- source_word: נָגִיד
  chosen: leader
  alternatives:
  - chief
  - prince
  - ruler
  lexicon: HALOT
  rationale: נָגִיד denotes one placed in authority. In this administrative context,
    'leader' is clear modern English and avoids the potentially misleading royal overtones
    of 'prince' while remaining suitably formal.
- source_word: אֱלִיעֶזֶר בֶּן זִכְרִי
  chosen: Eliezer son of Zichri
  rationale: Personal names are transliterated by standard convention per project
    philosophy. 'Son of' preserves the Hebrew patronymic construction.
- source_word: לַשִּׁמְעוֹנִי
  chosen: for the Simeonites
  alternatives:
  - for Simeon
  - for the tribe of Simeon
  lexicon: HALOT
  rationale: As with 'Reubenites,' the gentilic points to the tribal body. 'For the
    Simeonites' keeps the parallel structure.
- source_word: שְׁפַטְיָהוּ בֶּן מַעֲכָה
  chosen: Shephatiah son of Maacah
  rationale: Names are transliterated, and the patronymic is rendered literally. Although
    Maacah can be a male or female name elsewhere, the text simply identifies parentage
    without further clarification.
