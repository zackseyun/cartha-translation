id: 1CH.27.30
reference: 1 Chronicles 27:30
source:
  edition: WLC
  text: וְ/עַל הַ֨/גְּמַלִּ֔ים אוֹבִ֖יל הַ/יִּשְׁמְעֵלִ֑י וְ/עַל הָ֣/אֲתֹנ֔וֹת יֶחְדְּיָ֖הוּ
    הַ/מֵּרֹנֹתִֽי־־׃ס
translation:
  text: Over the camels was Obil the Ishmaelite, and over the female donkeys was Jehdeiah
    the Meronothite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the she-donkeys.' The Hebrew term refers specifically to female donkeys.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: Over
  alternatives:
  - In charge of
  - For
  lexicon: HALOT
  rationale: In this administrative list, עַל marks oversight or responsibility. 'Over'
    preserves the concise Hebrew idiom and fits the repeated pattern in the chapter
    for officials assigned over royal assets.
- source_word: הַגְּמַלִּים
  chosen: the camels
  lexicon: HALOT
  rationale: Straightforward rendering of the definite plural noun for camels. The
    definite article is retained in English.
- source_word: אוֹבִיל
  chosen: Obil
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: הַיִּשְׁמְעֵאלִי
  chosen: the Ishmaelite
  alternatives:
  - the descendant of Ishmael
  lexicon: HALOT
  rationale: Gentilic/adjectival designation identifying Obil by ethnic or clan association.
    'The Ishmaelite' is the natural English equivalent and matches standard rendering
    of gentilics.
- source_word: הָאֲתֹנוֹת
  chosen: the female donkeys
  alternatives:
  - the donkeys
  - the she-donkeys
  lexicon: HALOT
  rationale: אָתוֹן specifically denotes a female donkey, not the generic species.
    'Female donkeys' is clear modern English and preserves the lexical specificity
    better than simply 'donkeys.'
- source_word: יֶחְדְּיָהוּ
  chosen: Jehdeiah
  rationale: Personal name; transliterated by standard English convention.
- source_word: הַמֵּרֹנֹתִי
  chosen: the Meronothite
  alternatives:
  - from Meronoth
  lexicon: HALOT
  rationale: Likely a gentilic from a place name, functioning as an identifier for
    Jehdeiah. 'The Meronothite' preserves the Hebrew form and parallels other gentilics
    in Chronicles.
