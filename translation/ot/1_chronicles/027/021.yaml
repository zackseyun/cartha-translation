id: 1CH.27.21
reference: 1 Chronicles 27:21
source:
  edition: WLC
  text: לַ/חֲצִ֤י הַֽ/מְנַשֶּׁה֙ גִּלְעָ֔דָ/ה יִדּ֖וֹ בֶּן זְכַרְיָ֑הוּ לְ/בִנְיָמִ֔ן
    יַעֲשִׂיאֵ֖ל בֶּן אַבְנֵֽר־ס־׃ס
translation:
  text: 'for the half-tribe of Manasseh in Gilead: Iddo son of Zechariah; for Benjamin:
    Jaasiel son of Abner.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Jashiel son of Abner.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לַ/חֲצִי
  chosen: for the half-tribe of
  alternatives:
  - for half of
  - for the half of
  lexicon: HALOT
  rationale: In this administrative list, חֲצִי with prefixed ל marks the tribal division
    represented by an officer. English needs 'tribe' supplied for clarity because
    the referent is the half of the tribe of Manasseh, not merely an abstract half.
- source_word: הַ/מְנַשֶּׁה
  chosen: Manasseh
  lexicon: HALOT
  rationale: Proper tribal/personal name; transliterated per translation philosophy.
- source_word: גִּלְעָדָ/ה
  chosen: in Gilead
  alternatives:
  - toward Gilead
  - to Gilead
  lexicon: HALOT
  rationale: The directional/paragogic ending here identifies the Transjordanian region
    associated with this half of Manasseh. In English, 'in Gilead' best conveys the
    geographic designation in this list context.
- source_word: יִדּוֹ
  chosen: Iddo
  lexicon: HALOT
  rationale: Proper name; standard English transliteration.
- source_word: בֶּן זְכַרְיָהוּ
  chosen: son of Zechariah
  alternatives:
  - the son of Zechariahu
  lexicon: HALOT
  rationale: Genealogical formula regularly rendered 'son of.' The father's name is
    given in its conventional English form 'Zechariah' rather than a more strictly
    phonetic transliteration for readability.
- source_word: לְ/בִנְיָמִן
  chosen: for Benjamin
  alternatives:
  - for the tribe of Benjamin
  lexicon: HALOT
  rationale: The prefixed ל again marks the tribal group represented by the named
    officer. 'For Benjamin' is concise and natural in this repeated list structure.
- source_word: יַעֲשִׂיאֵל
  chosen: Jaasiel
  alternatives:
  - Jashiel
  lexicon: HALOT
  rationale: Proper name; 'Jaasiel' reflects the Masoretic vocalization more closely.
    An alternative spelling exists in English tradition and is worth preserving in
    a footnote.
- source_word: בֶּן אַבְנֵר
  chosen: son of Abner
  lexicon: HALOT
  rationale: Standard genealogical expression. 'Abner' is the conventional English
    form of the proper name.
