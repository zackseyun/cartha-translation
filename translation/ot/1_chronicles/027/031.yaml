id: 1CH.27.31
reference: 1 Chronicles 27:31
source:
  edition: WLC
  text: וְ/עַל הַ/צֹּ֖אן יָזִ֣יז הַֽ/הַגְרִ֑י כָּל אֵ֨לֶּה֙ שָׂרֵ֣י הָ/רְכ֔וּשׁ אֲשֶׁ֖ר
    לַ/מֶּ֥לֶךְ דָּוִֽיד־־׃
translation:
  text: Over the flocks was Jaziz the Hagrite. All these were officers over the property
    that belonged to King David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Hagarite.” The Hebrew gentilicial may be rendered either way in
      English transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: Over
  alternatives:
  - And over
  - In charge of
  lexicon: HALOT
  rationale: The preposition עַל in this administrative list marks oversight or responsibility.
    'Over' is concise and natural in English, matching the repeated formula in the
    surrounding context.
- source_word: הַצֹּאן
  chosen: the flocks
  alternatives:
  - the sheep
  - the small livestock
  lexicon: HALOT
  rationale: צֹאן can denote sheep specifically or small livestock collectively, often
    sheep and goats. 'Flocks' best fits the broad livestock-administration context
    without over-specifying.
- source_word: יָזִיז
  chosen: Jaziz
  rationale: Proper personal name; transliterated according to the translation philosophy
    of transliterating names rather than translating them.
- source_word: הַהַגְרִי
  chosen: the Hagrite
  alternatives:
  - the Hagarite
  lexicon: HALOT
  rationale: A gentilicial designation referring to a Hagrite/Hagarite. 'Hagrite'
    is a standard concise transliteration; 'Hagarite' is also possible and worth preserving
    as a lexical alternative.
- source_word: כָּל אֵלֶּה
  chosen: All these
  alternatives:
  - All of these
  - These all
  lexicon: HALOT
  rationale: Straightforward summative phrase concluding the list of officials.
- source_word: שָׂרֵי
  chosen: officers
  alternatives:
  - chiefs
  - princes
  - overseers
  lexicon: HALOT
  rationale: שָׂרִים in this context refers to administrative officials in charge
    of royal assets, not necessarily military commanders or aristocratic 'princes.'
    'Officers' best captures the bureaucratic sense in readable English.
- source_word: הָרְכוּשׁ
  chosen: the property
  alternatives:
  - the possessions
  - the goods
  - the wealth
  lexicon: HALOT
  rationale: רְכוּשׁ denotes movable property, possessions, or assets. 'Property'
    fits the catalog of royal resources and keeps the administrative tone.
- source_word: אֲשֶׁר לַמֶּלֶךְ דָּוִיד
  chosen: that belonged to King David
  alternatives:
  - of King David
  - that was King David's
  lexicon: HALOT
  rationale: The relative clause identifies the property as belonging to the king.
    'That belonged to King David' is idiomatic and explicit in modern English while
    preserving the possessive sense.
