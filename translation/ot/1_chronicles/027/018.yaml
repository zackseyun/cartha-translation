id: 1CH.27.18
reference: 1 Chronicles 27:18
source:
  edition: WLC
  text: לִֽ/יהוּדָ֕ה אֱלִיה֖וּ מֵ/אֲחֵ֣י דָוִ֑יד לְ/יִ֨שָׂשכָ֔ר עָמְרִ֖י בֶּן מִיכָאֵֽל־׃ס
translation:
  text: For Judah, Elihu, one of David’s brothers; for Issachar, Omri son of Michael.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Elihu.'' Some ancient versions and interpreters read ''Eliab,''
      likely by harmonization with David’s brother named elsewhere.'
    reason: alternative_reading
lexical_decisions:
- source_word: לִיהוּדָה
  chosen: For Judah
  alternatives:
  - for the tribe of Judah
  - belonging to Judah
  lexicon: HALOT
  rationale: The prefixed ל marks the tribal heading in this administrative list,
    best rendered 'For Judah' in idiomatic English while preserving the list structure.
- source_word: אֱלִיהוּ
  chosen: Elihu
  alternatives:
  - Eliab
  lexicon: HALOT
  rationale: The consonantal text reads אֱלִיהוּ, which is straightforwardly transliterated
    'Elihu.' An alternative tradition in some versions reads 'Eliab,' likely by harmonization
    with David's known brother, but the MT here supports 'Elihu.'
- source_word: מֵאֲחֵי דָוִיד
  chosen: one of David’s brothers
  alternatives:
  - from David’s brothers
  - of the brothers of David
  lexicon: HALOT
  rationale: 'The preposition מִן with the plural construct ''brothers of David''
    is partitive: Elihu was one from among David''s brothers. ''One of David’s brothers''
    is the clearest natural English rendering.'
- source_word: לְיִשָׂשכָר
  chosen: for Issachar
  alternatives:
  - for the tribe of Issachar
  lexicon: HALOT
  rationale: As with Judah, the prefixed ל introduces the tribal representative in
    the list.
- source_word: עָמְרִי
  chosen: Omri
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: בֶּן מִיכָאֵל
  chosen: son of Michael
  alternatives:
  - the son of Michael
  lexicon: HALOT
  rationale: Standard Hebrew patronymic construction; English normally omits the article.
