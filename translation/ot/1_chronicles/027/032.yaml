id: 1CH.27.32
reference: 1 Chronicles 27:32
source:
  edition: WLC
  text: וִֽ/יהוֹנָתָ֤ן דּוֹד דָּוִיד֙ יוֹעֵ֔ץ אִישׁ מֵבִ֥ין וְ/סוֹפֵ֖ר ה֑וּא וִֽ/יחִיאֵ֥ל
    בֶּן חַכְמוֹנִ֖י עִם בְּנֵ֥י הַ/מֶּֽלֶךְ־־־־׃
translation:
  text: Jonathan, David’s uncle, was a counselor, a man of understanding, and a scribe;
    and Jehiel son of Hachmoni was with the king’s sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the royal princes.' The Hebrew reads 'the king’s sons.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says literally 'was with the king’s sons'; some understand this
      to imply service or supervision among them.
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹד
  chosen: uncle
  alternatives:
  - beloved one
  - friend
  - kinsman
  lexicon: HALOT
  rationale: In this genealogical/court context with David named explicitly, דּוֹד
    most naturally denotes a family relationship rather than 'beloved' or 'friend.'
    'Uncle' is the standard contextual sense here.
- source_word: יוֹעֵץ
  chosen: counselor
  alternatives:
  - advisor
  lexicon: HALOT
  rationale: The participial form denotes one who gives counsel in an official capacity.
    'Counselor' fits the court setting and preserves the occupational nuance.
- source_word: אִישׁ מֵבִין
  chosen: a man of understanding
  alternatives:
  - an intelligent man
  - a discerning man
  lexicon: HALOT
  rationale: This phrase commends Jonathan's discernment. 'A man of understanding'
    is a natural English rendering that preserves the masculine singular description
    present in the Hebrew.
- source_word: סוֹפֵר
  chosen: scribe
  alternatives:
  - secretary
  - scholar
  lexicon: HALOT
  rationale: In royal-administrative contexts סוֹפֵר commonly refers to a literate
    official or secretary. 'Scribe' is broad enough to preserve both writing and administrative
    functions without over-specifying.
- source_word: עִם
  chosen: was with
  alternatives:
  - was in charge of
  - attended to
  lexicon: HALOT
  rationale: The preposition literally means 'with.' Some translations infer an administrative
    role from context, but the Hebrew here does not explicitly state oversight. 'Was
    with' preserves the source text's restraint.
- source_word: בְּנֵי הַמֶּלֶךְ
  chosen: the king’s sons
  alternatives:
  - the royal princes
  - the king's children
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'sons,' not a gender-neutral term. 'The king’s
    sons' is therefore the gender-accurate rendering, though 'princes' is a plausible
    contextual interpretation.
- source_word: חַכְמוֹנִי
  chosen: Hachmoni
  alternatives:
  - Hakmoni
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention. 'Hachmoni'
    is a straightforward English transliteration of the Hebrew proper name.
