id: 1CH.27.28
reference: 1 Chronicles 27:28
source:
  edition: WLC
  text: וְ/עַל הַ/זֵּיתִ֤ים וְ/הַ/שִּׁקְמִים֙ אֲשֶׁ֣ר בַּ/שְּׁפֵלָ֔ה בַּ֥עַל חָנָ֖ן
    הַ/גְּדֵרִ֑י וְ/עַל אֹצְר֥וֹת הַ/שֶּׁ֖מֶן יוֹעָֽשׁ־ס־׃ס
translation:
  text: Over the olive trees and the sycamore trees in the Shephelah was Baal-hanan
    the Gederite; and over the stores of oil was Joash.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the lowland.” “The Shephelah” refers to the foothill region of Judah.
    reason: cultural_note
  - marker: b
    text: “Sycamore trees” may also be rendered “sycamore-fig trees.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: Over
  alternatives:
  - In charge of
  - Concerning
  lexicon: HALOT
  rationale: In this administrative list, עַל introduces the person responsible for
    a domain. 'Over' is concise and idiomatic in English for supervisory responsibility.
- source_word: הַזֵּיתִים
  chosen: the olive trees
  alternatives:
  - the olives
  - the olive groves
  lexicon: HALOT
  rationale: The plural noun denotes olive trees rather than the fruit in this land-management
    context. 'Olive trees' is the most direct rendering.
- source_word: וְהַשִּׁקְמִים
  chosen: and the sycamore trees
  alternatives:
  - and the sycamores
  - and the sycamore-fig trees
  lexicon: HALOT
  rationale: שִׁקְמִים refers to sycamore/sycamore-fig trees. 'Sycamore trees' is
    readable modern English; the more technical 'sycamore-fig trees' is possible but
    unnecessary in the main text.
- source_word: אֲשֶׁר בַּשְּׁפֵלָה
  chosen: in the Shephelah
  alternatives:
  - in the lowland
  - that were in the lowlands
  lexicon: HALOT
  rationale: שְׁפֵלָה can be rendered as the geographic region 'Shephelah' or descriptively
    as 'lowland.' Because it often functions as a recognized regional designation
    in Judah, 'the Shephelah' preserves that sense while remaining accessible.
- source_word: בַּעַל חָנָן
  chosen: Baal-hanan
  alternatives:
  - Baalhanan
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. The hyphenated form is a common English convention for this Hebrew
    name.
- source_word: הַגְּדֵרִי
  chosen: the Gederite
  alternatives:
  - from Geder
  - the man from Geder
  lexicon: HALOT
  rationale: The gentilic/adjectival form is best represented by the standard English
    demonym 'Gederite.'
- source_word: אֹצְרוֹת
  chosen: the stores
  alternatives:
  - the treasuries
  - the storehouses
  - the supplies
  lexicon: HALOT
  rationale: In context this refers to storage facilities or stored reserves under
    an official's oversight. 'Stores' is natural English and broad enough to cover
    the sense without over-specifying architecture.
- source_word: הַשֶּׁמֶן
  chosen: of oil
  alternatives:
  - of the oil
  - for oil
  lexicon: HALOT
  rationale: The construct phrase אֹצְרוֹת הַשֶּׁמֶן is most naturally 'stores of
    oil.' English omits the article smoothly here.
- source_word: יוֹעָשׁ
  chosen: Joash
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
