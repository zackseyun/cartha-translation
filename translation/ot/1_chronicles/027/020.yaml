id: 1CH.27.20
reference: 1 Chronicles 27:20
source:
  edition: WLC
  text: לִ/בְנֵ֣י אֶפְרַ֔יִם הוֹשֵׁ֖עַ בֶּן עֲזַזְיָ֑הוּ לַ/חֲצִי֙ שֵׁ֣בֶט מְנַשֶּׁ֔ה
    יוֹאֵ֖ל בֶּן פְּדָיָֽהוּ־־׃ס
translation:
  text: 'For the sons of Ephraim: Hoshea son of Azaziah; for the half-tribe of Manasseh:
    Joel son of Pedaiah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hoshea is alternatively spelled 'Hosea' in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/בְנֵי
  chosen: For the sons of
  alternatives:
  - For the descendants of
  - Over the sons of
  lexicon: HALOT
  rationale: In this administrative list, the prefixed ל marks assignment/responsibility
    ('for' a tribal group). בְנֵי literally means 'sons of,' which is retained as
    a standard tribal designation rather than flattened to 'people of.'
- source_word: אֶפְרַיִם
  chosen: Ephraim
  lexicon: HALOT
  rationale: Proper tribal name, transliterated according to standard English convention.
- source_word: הוֹשֵׁעַ
  chosen: Hoshea
  alternatives:
  - Hosea
  lexicon: HALOT
  rationale: Proper personal name, transliterated. 'Hoshea' better reflects the Hebrew
    form here, while 'Hosea' is a familiar English variant.
- source_word: בֶּן
  chosen: son of
  lexicon: HALOT
  rationale: Standard genealogical linkage in Hebrew narrative and lists.
- source_word: עֲזַזְיָהוּ
  chosen: Azaziah
  lexicon: HALOT
  rationale: Proper personal name, transliterated by standard convention.
- source_word: לַ/חֲצִי
  chosen: for the half-
  alternatives:
  - for half of the
  - over the half-
  lexicon: HALOT
  rationale: The prefixed ל again indicates assignment. חֲצִי means 'half'; in English
    it is most natural to carry it forward into the compound expression 'half-tribe.'
- source_word: שֵׁבֶט
  chosen: tribe
  alternatives:
  - tribal division
  lexicon: HALOT
  rationale: Standard rendering for the tribal unit of Israel.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  lexicon: HALOT
  rationale: Proper tribal name, transliterated. Here it refers specifically to one
    half of the tribe.
- source_word: יוֹאֵל
  chosen: Joel
  alternatives:
  - Yoel
  lexicon: HALOT
  rationale: Proper personal name, transliterated according to standard English convention.
- source_word: פְּדָיָהוּ
  chosen: Pedaiah
  lexicon: HALOT
  rationale: Proper personal name, transliterated by standard convention.
