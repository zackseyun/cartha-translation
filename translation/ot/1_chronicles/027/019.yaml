id: 1CH.27.19
reference: 1 Chronicles 27:19
source:
  edition: WLC
  text: לִ/זְבוּלֻ֕ן יִֽשְׁמַֽעְיָ֖הוּ בֶּן עֹבַדְיָ֑הוּ לְ/נַ֨פְתָּלִ֔י יְרִימ֖וֹת
    בֶּן עַזְרִיאֵֽל־־׃ס
translation:
  text: for Zebulun, Ishmaiah son of Obadiah; for Naphtali, Jerimoth son of Azriel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לִ/זְבוּלֻן
  chosen: for Zebulun
  alternatives:
  - of Zebulun
  - for the tribe of Zebulun
  lexicon: HALOT
  rationale: The prefixed ל marks assignment/representation in this administrative
    list of tribal officers. 'For Zebulun' is concise and idiomatic in English while
    preserving the representative sense.
- source_word: יִשְׁמַעְיָהוּ
  chosen: Ishmaiah
  alternatives:
  - Jishmaiah
  rationale: Personal names are transliterated by standard English convention rather
    than translated. 'Ishmaiah' is the conventional rendering for this Hebrew name.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: The construct בן regularly denotes direct filiation. 'Son of' is the
    natural English equivalent in genealogical/identifying formulas.
- source_word: עֹבַדְיָהוּ
  chosen: Obadiah
  alternatives:
  - Obadyahu
  rationale: Standard English transliteration of the personal name is preferred for
    readability and consistency with common biblical name forms.
- source_word: לְ/נַפְתָּלִי
  chosen: for Naphtali
  alternatives:
  - of Naphtali
  - for the tribe of Naphtali
  lexicon: HALOT
  rationale: As with Zebulun, the prefixed ל indicates the tribal assignment of the
    named official. 'For Naphtali' best fits the list format.
- source_word: יְרִימוֹת
  chosen: Jerimoth
  alternatives:
  - Jerimot
  rationale: The proper name is transliterated according to standard English biblical
    convention.
- source_word: עַזְרִיאֵל
  chosen: Azriel
  alternatives:
  - Azriel
  rationale: Standard English biblical transliteration is used for the personal name.
