id: 1CH.27.11
reference: 1 Chronicles 27:11
source:
  edition: WLC
  text: הַ/שְּׁמִינִי֙ לַ/חֹ֣דֶשׁ הַ/שְּׁמִינִ֔י סִבְּכַ֥י הַ/חֻשָׁתִ֖י לַ/זַּרְחִ֑י
    וְ/עַל֙ מַחֲלֻקְתּ֔/וֹ עֶשְׂרִ֥ים וְ/אַרְבָּעָ֖ה אָֽלֶף׃ס
translation:
  text: 'The eighth, for the eighth month: Sibbecai the Hushathite, of the Zerahites;
    and over his division were twenty-four thousand.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''for the Zerahite.'' The Hebrew expression may be taken more woodenly
      as a singular gentilic, but in context it likely denotes clan affiliation: ''of
      the Zerahites.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׁמִינִי
  chosen: The eighth
  alternatives:
  - The eighth commander
  - The eighth division
  lexicon: HALOT
  rationale: The ordinal stands elliptically at the head of a roster of military courses.
    English can preserve the terseness with 'The eighth,' while the implied office
    is supplied by context from the surrounding verses rather than inserted here.
- source_word: לַחֹדֶשׁ הַשְּׁמִינִי
  chosen: for the eighth month
  alternatives:
  - for month eight
  - for the eighth-month service
  lexicon: HALOT
  rationale: The preposition ל with חֹדֶשׁ in this administrative list indicates assignment
    to a month of service. 'For the eighth month' is natural English and matches the
    recurring pattern in the chapter.
- source_word: סִבְּכַי
  chosen: Sibbecai
  alternatives:
  - Sibbekai
  rationale: Personal names are transliterated by standard English convention. 'Sibbecai'
    is a common conventional rendering of the Hebrew name.
- source_word: הַחֻשָׁתִי
  chosen: the Hushathite
  alternatives:
  - the Hushite
  lexicon: HALOT
  rationale: The gentilic/adjectival form identifies Sibbecai by clan or place association.
    'Hushathite' is the more precise conventional transliteration of the Hebrew form.
- source_word: לַזַּרְחִי
  chosen: of the Zerahites
  alternatives:
  - for the Zerahite
  - belonging to the Zerahites
  lexicon: HALOT
  rationale: In this list, the prefixed ל often marks affiliation. Because the form
    refers to a clan grouping, 'of the Zerahites' communicates lineage/association
    more clearly in English than a wooden 'to the Zerahite.'
- source_word: וְעַל מַחֲלֻקְתּוֹ
  chosen: and over his division were
  alternatives:
  - and his division had
  - and over his course was
  lexicon: HALOT
  rationale: מַחֲלֻקָה in this chapter denotes a military division/course. The phrase
    literally means 'and over his division,' introducing the number under his command.
    'Were' is supplied idiomatically in English to complete the clause.
- source_word: מַחֲלֻקְתּוֹ
  chosen: division
  alternatives:
  - course
  - company
  lexicon: HALOT
  rationale: In the military-administrative context of 1 Chronicles 27, 'division'
    best conveys an organized unit without implying a smaller company-sized force.
    'Course' is possible but sounds archaic in modern English.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  chosen: twenty-four thousand
  alternatives:
  - twenty and four thousand
  lexicon: HALOT
  rationale: This is the straightforward cardinal number for the size of the division.
    Modern English standardizes the compound as 'twenty-four thousand.'
