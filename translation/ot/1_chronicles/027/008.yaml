id: 1CH.27.8
reference: 1 Chronicles 27:8
source:
  edition: WLC
  text: הַ/חַמִישִׁי֙ לַ/חֹ֣דֶשׁ הַ/חֲמִישִׁ֔י הַ/שַּׂ֖ר שַׁמְה֣וּת הַ/יִּזְרָ֑ח וְ/עַל֙
    מַחֲלֻקְתּ֔/וֹ עֶשְׂרִ֥ים וְ/אַרְבָּעָ֖ה אָֽלֶף׃ס
translation:
  text: The fifth, for the fifth month, was the commander Shamhuth the Izrahite; and
    over his division were twenty-four thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the Zerahite.” The Hebrew gentilic here is traditionally rendered that
      way in some versions.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֲמִישִׁי
  chosen: The fifth
  alternatives:
  - The fifth one
  lexicon: HALOT
  rationale: Ordinal used substantivally in this military roster, referring to the
    fifth course/division in sequence. English can omit an explicit noun and still
    convey the sense naturally.
- source_word: לַחֹדֶשׁ הַחֲמִישִׁי
  chosen: for the fifth month
  alternatives:
  - for month five
  - of the fifth month
  lexicon: HALOT
  rationale: In this chapter each division serves by month; ל with חודש indicates
    assignment to that month. 'For the fifth month' is idiomatic and preserves the
    administrative sense.
- source_word: הַשַּׂר
  chosen: the commander
  alternatives:
  - the chief
  - the officer
  - the captain
  lexicon: HALOT
  rationale: שַׂר denotes a leader/official. In this military context, 'commander'
    best fits the roster of division heads without sounding archaic.
- source_word: שַׁמְהוּת
  chosen: Shamhuth
  alternatives:
  - Shamhoth
  lexicon: HALOT
  rationale: Personal name transliterated per translation philosophy. Vocalization
    supports 'Shamhuth'; variant English spellings exist in translations.
- source_word: הַיִּזְרָח
  chosen: the Izrahite
  alternatives:
  - the Zerahite
  lexicon: HALOT
  rationale: Gentilic/title attached to the personal name. The consonantal form here
    supports a transliteration closer to 'Izrahite.' Because some English traditions
    harmonize to 'Zerahite,' that alternative is preserved in a footnote.
- source_word: וְעַל מַחֲלֻקְתּוֹ
  chosen: and over his division were
  alternatives:
  - and his division had
  - and in his division were
  lexicon: HALOT
  rationale: מַחֲלֻקָה in this chapter refers to the military division/course. The
    preposition עַל with the implied administrative sense is well represented by 'over
    his division were,' preserving the Hebrew structure while remaining readable.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  chosen: twenty-four thousand
  alternatives:
  - twenty and four thousand
  lexicon: HALOT
  rationale: Standard English rendering of the numeral phrase.
