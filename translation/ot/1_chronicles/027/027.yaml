id: 1CH.27.27
reference: 1 Chronicles 27:27
source:
  edition: WLC
  text: וְ/עַל הַ֨/כְּרָמִ֔ים שִׁמְעִ֖י הָ/רָֽמָתִ֑י וְ/עַ֤ל שֶׁ/בַּ/כְּרָמִים֙ לְ/אֹצְר֣וֹת
    הַ/יַּ֔יִן זַבְדִּ֖י הַ/שִּׁפְמִֽי־׃ס
translation:
  text: Over the vineyards was Shimei the Ramathite; and over the produce of the vineyards,
    for the wine cellars, was Zabdi the Shiphmite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'that which was in the vineyards'; this likely refers
      to the vineyards' produce rather than the vineyards themselves.
    reason: lexical_alternative
  - marker: b
    text: Or 'storehouses of wine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: over
  alternatives:
  - in charge of
  - for
  lexicon: HALOT
  rationale: In this administrative list, עַל with named officials indicates oversight
    or responsibility. 'Over' preserves the concise Hebrew structure and fits the
    repeated pattern in the chapter.
- source_word: הַכְּרָמִים
  chosen: the vineyards
  alternatives:
  - the vine fields
  lexicon: HALOT
  rationale: כֶּרֶם commonly means 'vineyard.' The plural with article refers to the
    royal vineyards under administration.
- source_word: שִׁמְעִי
  chosen: Shimei
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: הָרָמָתִי
  chosen: the Ramathite
  alternatives:
  - from Ramah
  lexicon: HALOT
  rationale: The gentilic form is best represented by the standard English demonym
    'Ramathite,' preserving the name-based descriptor rather than expanding it.
- source_word: שֶׁבַּכְּרָמִים
  chosen: the produce of the vineyards
  alternatives:
  - what was in the vineyards
  - that which was in the vineyards
  lexicon: HALOT
  rationale: The phrase literally means 'that which was in the vineyards.' In context,
    contrasted with the vineyards themselves and followed by storage of wine, it refers
    to vineyard yield/produce rather than the land. 'Produce of the vineyards' makes
    the administrative distinction clear in natural English.
- source_word: לְאֹצְרוֹת
  chosen: for the wine cellars
  alternatives:
  - for the storehouses
  - for the treasuries
  lexicon: HALOT
  rationale: אֹצָר can denote a storehouse or treasury. Here, with 'wine,' the sense
    is storage facilities for wine rather than financial treasuries. 'Wine cellars'
    is an idiomatic English rendering that communicates the function clearly.
- source_word: הַיַּיִן
  chosen: the wine
  lexicon: HALOT
  rationale: Straightforward rendering of יַיִן as 'wine.'
- source_word: זַבְדִּי
  chosen: Zabdi
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: הַשִּׁפְמִי
  chosen: the Shiphmite
  alternatives:
  - from Shepham
  - from Shiphm
  lexicon: HALOT
  rationale: A gentilic/title from a place-name, best preserved by transliteration
    as 'Shiphmite.' The exact place identification is uncertain, so a demonym is preferable
    to a speculative expansion.
