theological_decisions:
- issue: Whether to identify the source of the wrath explicitly as God
  chosen_reading: 'Leave the agent implicit: ''wrath came upon Israel'''
  alternative_readings:
  - '''the LORD''s wrath came upon Israel'''
  - '''God was angry with Israel'''
  rationale: The immediate Hebrew clause does not explicitly name God as the subject,
    even though the broader narrative context strongly implies divine wrath. To preserve
    the text's wording and avoid importing an unstated subject, the translation keeps
    the agent implicit.
  doctrine_reference: Preserve theological tension rather than resolve it.
