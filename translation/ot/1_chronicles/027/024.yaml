id: 1CH.27.24
reference: 1 Chronicles 27:24
source:
  edition: WLC
  text: יוֹאָ֨ב בֶּן צְרוּיָ֜ה הֵחֵ֤ל לִ/מְנוֹת֙ וְ/לֹ֣א כִלָּ֔ה וַ/יְהִ֥י בָ/זֹ֛את
    קֶ֖צֶף עַל יִשְׂרָאֵ֑ל וְ/לֹ֤א עָלָה֙ הַ/מִּסְפָּ֔ר בְּ/מִסְפַּ֥ר דִּבְרֵֽי הַ/יָּמִ֖ים
    לַ/מֶּ֥לֶךְ דָּוִֽיד־־־׃ס
translation:
  text: Joab son of Zeruiah began to count, but he did not finish; and because of
    this wrath came upon Israel. So the number was not entered in the account of the
    chronicles of King David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was not included' or 'was not recorded.' The Hebrew literally says 'did
      not go up,' an idiom for being entered into an official record.
    reason: lexical_alternative
  - marker: b
    text: '''the chronicles'' refers to the royal annals or official record associated
      with King David.'
    reason: cultural_note
lexical_decisions:
- source_word: הֵחֵל לִמְנוֹת
  chosen: began to count
  alternatives:
  - began to number
  - started taking the census
  lexicon: HALOT
  rationale: The idiom combines החל ('begin') with מנה ('count/number'). 'Began to
    count' is natural English and stays close to the Hebrew without importing the
    fuller 'census' wording unless context requires it.
- source_word: וְלֹא כִלָּה
  chosen: but he did not finish
  alternatives:
  - but did not complete it
  - and did not complete
  lexicon: HALOT
  rationale: כלה here means to complete/finish. Supplying 'he' makes the clause clear
    in English; 'finish' is concise and idiomatic.
- source_word: וַיְהִי בָזֹאת קֶצֶף עַל יִשְׂרָאֵל
  chosen: and because of this wrath came upon Israel
  alternatives:
  - and in this there was wrath against Israel
  - and for this wrath fell on Israel
  lexicon: HALOT
  rationale: קצף denotes wrath/anger, here likely divine judgment in context. 'Because
    of this' captures בָזֹאת idiomatically, and 'came upon Israel' reflects the Hebrew
    construction without over-specifying the agent.
- source_word: הַמִּסְפָּר
  chosen: the number
  alternatives:
  - the total
  - the census total
  lexicon: HALOT
  rationale: The noun refers to the resulting tally. 'The number' is the most direct
    rendering and preserves the connection with the counting already mentioned.
- source_word: וְלֹא עָלָה
  chosen: was not entered
  alternatives:
  - did not go up
  - was not included
  - was not recorded
  lexicon: HALOT
  rationale: עלה literally means 'go up,' but in administrative/register contexts
    it can mean to be entered or included in a record. 'Was not entered' best fits
    the following reference to written chronicles.
- source_word: בְּמִסְפַּר דִּבְרֵי הַיָּמִים
  chosen: in the account of the chronicles
  alternatives:
  - in the numbering of the annals
  - in the record of the daily matters
  - in the chronicles
  lexicon: HALOT
  rationale: דברי הימים is the standard expression for annals/chronicles. Because
    מספר appears again, 'account of the chronicles' preserves both the bookkeeping
    nuance and the established sense of the phrase.
- source_word: לַמֶּלֶךְ דָּוִיד
  chosen: of King David
  alternatives:
  - for King David
  - belonging to King David
  lexicon: HALOT
  rationale: The lamed can indicate relation or possession here. 'Of King David' reads
    naturally in English with 'chronicles' and avoids implying the number was submitted
    to him personally.
