id: 1CH.27.10
reference: 1 Chronicles 27:10
source:
  edition: WLC
  text: הַ/שְּׁבִיעִי֙ לַ/חֹ֣דֶשׁ הַ/שְּׁבִיעִ֔י חֶ֥לֶץ הַ/פְּלוֹנִ֖י מִן בְּנֵ֣י
    אֶפְרָ֑יִם וְ/עַל֙ מַחֲלֻקְתּ֔/וֹ עֶשְׂרִ֥ים וְ/אַרְבָּעָ֖ה אָֽלֶף־׃ס
translation:
  text: 'The seventh, for the seventh month: Helez the Pelonite, from the sons of
    Ephraim; and over his division were twenty-four thousand.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the Paltite,' reflecting a different traditional identification
      of Helez's clan designation.
    reason: alternative_reading
lexical_decisions:
- source_word: הַשְּׁבִיעִי
  chosen: The seventh
  alternatives:
  - The seventh commander
  - The seventh division leader
  lexicon: HALOT
  rationale: Ordinal adjective used elliptically in this roster context, referring
    to the seventh military chief in the sequence. Kept concise in English as 'The
    seventh,' matching the list structure without adding unsupported words to the
    main text.
- source_word: לַחֹדֶשׁ הַשְּׁבִיעִי
  chosen: for the seventh month
  alternatives:
  - for month seven
  - for the seventh-month service
  lexicon: HALOT
  rationale: The preposition ל with חֹדֶשׁ in this chapter marks assignment by month.
    'For the seventh month' is natural English and preserves the administrative sense.
- source_word: חֶלֶץ
  chosen: Helez
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: הַפְּלוֹנִי
  chosen: the Pelonite
  alternatives:
  - the Paltite
  lexicon: HALOT
  rationale: Gentilic/title attached to the personal name. 'Pelonite' follows the
    consonantal Hebrew here. An alternative tradition reflected elsewhere is 'Paltite,'
    but the MT form in this verse supports 'Pelonite.'
- source_word: מִן בְּנֵי אֶפְרָיִם
  chosen: from the sons of Ephraim
  alternatives:
  - from the Ephraimites
  - from the people of Ephraim
  lexicon: HALOT
  rationale: Literally 'from the sons of Ephraim.' This preserves the Hebrew tribal
    idiom while remaining understandable. 'Ephraimites' is possible but less formally
    aligned to the source.
- source_word: וְעַל מַחֲלֻקְתּוֹ
  chosen: and over his division were
  alternatives:
  - and his division had
  - and in his division were
  lexicon: HALOT
  rationale: מַחֲלֻקָה in this chapter denotes the military division/unit under the
    officer's charge. The preposition עַל conveys authority over it. 'Over his division
    were' preserves the Hebrew construction and links naturally to the following number.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  chosen: twenty-four thousand
  alternatives:
  - 24,000
  lexicon: HALOT
  rationale: Standard cardinal number. Spelled out for literary consistency in Bible
    translation.
