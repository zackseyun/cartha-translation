id: 1CH.27.15
reference: 1 Chronicles 27:15
source:
  edition: WLC
  text: הַ/שְּׁנֵ֤ים עָשָׂר֙ לִ/שְׁנֵ֣ים עָשָׂ֣ר הַ/חֹ֔דֶשׁ חֶלְדַּ֥י הַ/נְּטוֹפָתִ֖י
    לְ/עָתְנִיאֵ֑ל וְ/עַל֙ מַחֲלֻקְתּ֔/וֹ עֶשְׂרִ֥ים וְ/אַרְבָּעָ֖ה אָֽלֶף׃פ
translation:
  text: The twelfth, for the twelfth month, was Heldai the Netophathite, of Othniel;
    and over his division were twenty-four thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'belonging to Othniel' or 'descended from Othniel.' The Hebrew construction
      likely indicates family or clan affiliation.
    reason: lexical_alternative
  - marker: b
    text: Some parallel traditions read the name as 'Heled' rather than 'Heldai.'
    reason: cross_reference
lexical_decisions:
- source_word: הַשְּׁנֵים עָשָׂר
  chosen: The twelfth
  alternatives:
  - The twelfth one
  lexicon: HALOT
  rationale: Ordinal sense in context of a numbered military rotation; English idiom
    omits 'one.'
- source_word: לִשְׁנֵים עָשָׂר הַחֹדֶשׁ
  chosen: for the twelfth month
  alternatives:
  - for month twelve
  - for the twelfth-month service
  lexicon: HALOT
  rationale: The preposition ל marks assignment to the month in this recurring administrative
    formula; 'for the twelfth month' is natural and preserves the structure.
- source_word: חֶלְדַּי
  chosen: Heldai
  alternatives:
  - Heled
  lexicon: HALOT
  rationale: Proper name transliterated directly from the consonantal form here. An
    alternate form of the name appears in parallel traditions, but this verse reads
    Heldai.
- source_word: הַנְּטוֹפָתִי
  chosen: the Netophathite
  alternatives:
  - the man from Netophah
  lexicon: HALOT
  rationale: Gentilic adjective indicating origin from Netophah; the conventional
    gentilic form is concise and accurate.
- source_word: לְעָתְנִיאֵל
  chosen: of Othniel
  alternatives:
  - belonging to Othniel
  - descended from Othniel
  lexicon: HALOT
  rationale: The prefixed ל here most naturally indicates clan/family affiliation
    rather than direct service under the long-dead judge Othniel; 'of Othniel' preserves
    the ambiguity of descent/association without over-specifying.
- source_word: וְעַל מַחֲלֻקְתּוֹ
  chosen: and over his division were
  alternatives:
  - and his division had
  - and in his division were
  lexicon: HALOT
  rationale: מַחֲלֻקָה in this chapter denotes the military division/course. Rendering
    with 'over' reflects עַל while producing idiomatic English with the following
    number.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  chosen: twenty-four thousand
  alternatives:
  - 24,000
  lexicon: HALOT
  rationale: Cardinal number for the size of the division; spelled out in running
    biblical prose.
