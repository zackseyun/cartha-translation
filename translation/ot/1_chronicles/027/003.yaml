id: 1CH.27.3
reference: 1 Chronicles 27:3
source:
  edition: WLC
  text: מִן בְּנֵי פֶ֗רֶץ הָ/רֹ֛אשׁ לְ/כָל שָׂרֵ֥י הַ/צְּבָא֖וֹת לַ/חֹ֥דֶשׁ הָ/רִאשֽׁוֹן־־־׃
translation:
  text: From the sons of Perez, the chief over all the commanders of the divisions
    for the first month.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the descendants of Perez.' The Hebrew literally says 'the sons of Perez,'
      a genealogical expression that can refer to a wider line of descent.
    reason: lexical_alternative
  - marker: b
    text: Or 'the commanders of the armies.' The Hebrew term often means 'armies'
      or 'hosts,' but in this chapter it refers to the organized monthly military
      divisions.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן
  chosen: From
  alternatives:
  - Of
  - Among
  lexicon: HALOT
  rationale: 'The preposition marks origin/descent: this leader was from the line
    of Perez. ''From'' is the most natural English rendering here.'
- source_word: בְּנֵי פֶרֶץ
  chosen: the sons of Perez
  alternatives:
  - the descendants of Perez
  lexicon: HALOT
  rationale: Literally 'sons of Perez.' In genealogical/tribal contexts this can mean
    descendants, but 'sons of Perez' preserves the Hebrew form while remaining clear.
- source_word: הָרֹאשׁ
  chosen: the chief
  alternatives:
  - the head
  - the leader
  lexicon: HALOT
  rationale: Here רֹאשׁ functions as a title for the one in highest authority. 'The
    chief' is idiomatic English and fits the military-administrative context.
- source_word: לְכָל
  chosen: over all
  alternatives:
  - for all
  - of all
  lexicon: HALOT
  rationale: The preposition with the following noun phrase indicates scope of authority,
    not mere relation. 'Over all' best conveys jurisdiction.
- source_word: שָׂרֵי הַצְּבָאוֹת
  chosen: the commanders of the divisions
  alternatives:
  - the commanders of the armies
  - the officers of the hosts
  lexicon: HALOT
  rationale: In this chapter the military force is organized by monthly divisions.
    Although צְבָאוֹת often means 'armies/hosts,' 'divisions' fits the immediate administrative
    context and avoids suggesting multiple separate national armies.
- source_word: לַחֹדֶשׁ הָרִאשׁוֹן
  chosen: for the first month
  alternatives:
  - for the first new moon/monthly term
  - of the first month
  lexicon: HALOT
  rationale: This phrase identifies the monthly rotation in view. 'For the first month'
    is the clearest idiomatic rendering in context.
