id: 1CH.27.12
reference: 1 Chronicles 27:12
source:
  edition: WLC
  text: הַ/תְּשִׁיעִי֙ לַ/חֹ֣דֶשׁ הַ/תְּשִׁיעִ֔י אֲבִיעֶ֥זֶר הָ/עַנְּתֹתִ֖י ל/בנימיני
    וְ/עַל֙ מַחֲלֻקְתּ֔/וֹ עֶשְׂרִ֥ים וְ/אַרְבָּעָ֖ה אָֽלֶף׃ס
translation:
  text: 'The ninth, for the ninth month: Abiezer the Anathothite, from Benjamin; and
    over his division were twenty-four thousand.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הַתְּשִׁיעִי
  chosen: The ninth
  alternatives:
  - The ninth commander
  - The ninth division
  lexicon: HALOT
  rationale: The ordinal stands elliptically at the head of a roster of monthly military
    leaders. English can preserve the terseness with 'The ninth,' while the implied
    office is supplied by context from the surrounding verses rather than inserted
    here.
- source_word: לַחֹדֶשׁ הַתְּשִׁיעִי
  chosen: for the ninth month
  alternatives:
  - for the ninth-month service
  - for the ninth month of the year
  lexicon: HALOT
  rationale: ל plus חֹדֶשׁ marks assignment to a month in this recurring formula throughout
    the chapter. 'For the ninth month' is natural English and keeps the administrative
    sense without overexpansion.
- source_word: אֲבִיעֶזֶר
  chosen: Abiezer
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: הָעַנְּתֹתִי
  chosen: the Anathothite
  alternatives:
  - from Anathoth
  lexicon: HALOT
  rationale: The gentilic adjective identifies Abiezer by origin. 'The Anathothite'
    is a standard and concise rendering; 'from Anathoth' is possible but less formally
    aligned with the Hebrew gentilic.
- source_word: לְבִנְיָמִינִי
  chosen: from Benjamin
  alternatives:
  - a Benjaminite
  - belonging to Benjamin
  lexicon: HALOT
  rationale: The phrase identifies tribal affiliation. 'From Benjamin' reads smoothly
    after the gentilic and avoids stacking two adjectival labels in English, while
    preserving the sense of Benjaminite origin.
- source_word: וְעַל מַחֲלֻקְתּוֹ
  chosen: and over his division were
  alternatives:
  - and his division had
  - and in his division were
  lexicon: HALOT
  rationale: 'מַחֲלֻקָה in this chapter refers to the military division under each
    monthly commander. The preposition עַל with the implied leadership sense is represented
    by ''over,'' preserving the administrative structure: he was over a division of
    a stated size.'
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  chosen: twenty-four thousand
  alternatives:
  - twenty and four thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number rendered in contemporary English style.
