id: 1CH.27.4
reference: 1 Chronicles 27:4
source:
  edition: WLC
  text: וְ/עַ֞ל מַחֲלֹ֣קֶת הַ/חֹ֣דֶשׁ הַ/שֵּׁנִ֗י דּוֹדַ֤י הָ/אֲחוֹחִי֙ וּ/מַ֣חֲלֻקְתּ֔/וֹ
    וּ/מִקְל֖וֹת הַ/נָּגִ֑יד וְ/עַל֙ מַחֲלֻקְתּ֔/וֹ עֶשְׂרִ֥ים וְ/אַרְבָּעָ֖ה אָֽלֶף׀׃ס
translation:
  text: Over the division for the second month was Dodai the Ahohite, and Mikloth
    was the leader over his division; and in his division were twenty-four thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and his division, and Mikloth the leader'; the Hebrew sequence is compressed,
      and interpreters differ on whether Mikloth is named as second-in-command within
      Dodai's division or as the one set over it.
    reason: alternative_reading
lexical_decisions:
- source_word: מַחֲלֹקֶת
  chosen: division
  alternatives:
  - course
  - division of service
  lexicon: HALOT
  rationale: In this military-administrative context in 1 Chronicles 27, the noun
    refers to the rotating unit assigned for monthly service. 'Division' is natural
    modern English and preserves the organizational sense better than the more archaic
    'course'.
- source_word: הַחֹדֶשׁ הַשֵּׁנִי
  chosen: the second month
  alternatives:
  - month two
  lexicon: HALOT
  rationale: A straightforward ordinal date expression indicating the monthly rotation.
- source_word: דּוֹדַי
  chosen: Dodai
  alternatives:
  - Dodo
  rationale: Personal names are transliterated by standard conventions. 'Dodai' follows
    the consonantal form here, while 'Dodo' appears as a related name form elsewhere;
    the verse's own form is preserved.
- source_word: הָאֲחוֹחִי
  chosen: the Ahohite
  alternatives:
  - an Ahohite
  lexicon: HALOT
  rationale: A gentilicial/clan designation. 'The Ahohite' is a conventional and sufficiently
    transparent rendering of the Hebrew form with article.
- source_word: וּמַחֲלֻקְתּוֹ
  chosen: his division
  alternatives:
  - his course
  - his unit
  lexicon: HALOT
  rationale: Same noun as earlier with 3ms suffix; rendered consistently as 'division.'
- source_word: וּמִקְלוֹת
  chosen: Mikloth
  rationale: Proper name, transliterated.
- source_word: הַנָּגִיד
  chosen: the leader
  alternatives:
  - the chief
  - the commander
  - the prince
  lexicon: HALOT
  rationale: נָגִיד often denotes a leader, ruler, or commander. Here it most naturally
    identifies Mikloth's role in relation to the division. 'Leader' is broad enough
    to fit the administrative-military setting without overstating rank.
- source_word: וְעַל־מַחֲלֻקְתּוֹ
  chosen: over his division
  alternatives:
  - and over his division
  - with his division
  lexicon: HALOT
  rationale: The repeated preposition עַל is retained with 'over,' indicating authority
    or oversight. This yields the sense that Mikloth held leadership over Dodai's
    division.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  chosen: twenty-four thousand
  alternatives:
  - 24,000
  lexicon: HALOT
  rationale: Standard cardinal number expression for the size of the division.
