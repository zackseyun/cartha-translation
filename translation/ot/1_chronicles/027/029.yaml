id: 1CH.27.29
reference: 1 Chronicles 27:29
source:
  edition: WLC
  text: וְ/עַל הַ/בָּקָר֙ הָ/רֹעִ֣ים בַּ/שָּׁר֔וֹן שטרי הַ/שָּׁרוֹנִ֑י וְ/עַל הַ/בָּקָר֙
    בָּֽ/עֲמָקִ֔ים שָׁפָ֖ט בֶּן עַדְלָֽי־־־׃ס
translation:
  text: Over the herds grazing in Sharon was Shitrai the Sharonite, and over the herds
    in the valleys was Shaphat son of Adlai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the cattle' instead of 'the herds.'
    reason: lexical_alternative
  - marker: b
    text: Sharon was the coastal plain region of Israel; 'the Sharonite' means a man
      from Sharon.
    reason: cultural_note
lexical_decisions:
- source_word: וְעַל
  chosen: over
  alternatives:
  - in charge of
  - for
  lexicon: HALOT
  rationale: In this administrative list, עַל indicates oversight or responsibility.
    'Over' preserves the concise formula used throughout the chapter.
- source_word: הַבָּקָר
  chosen: the herds
  alternatives:
  - the cattle
  - the oxen
  lexicon: HALOT
  rationale: בקר commonly denotes cattle/herd animals. 'Herds' fits the administrative
    context and reads naturally in English, while still referring to bovine livestock.
- source_word: הָרֹעִים
  chosen: grazing
  alternatives:
  - that were grazing
  - pasturing
  lexicon: HALOT
  rationale: The participle from רעה modifies the cattle as those feeding in pasture.
    Rendering it as 'grazing' gives smooth English without adding unnecessary words.
- source_word: בַּשָּׁרוֹן
  chosen: in Sharon
  alternatives:
  - on the Sharon plain
  lexicon: HALOT
  rationale: Sharon is a geographic proper name. 'In Sharon' is the most straightforward
    rendering; the regional nuance can be preserved without expanding the text.
- source_word: שטרי
  chosen: Shitrai
  alternatives:
  - Shitri
  lexicon: BDB
  rationale: This is a personal name and should be transliterated. 'Shitrai' reflects
    the consonantal form and common English convention.
- source_word: הַשָּׁרוֹנִי
  chosen: the Sharonite
  alternatives:
  - from Sharon
  lexicon: HALOT
  rationale: The gentilic form identifies Shitrai by regional origin. 'The Sharonite'
    preserves the Hebrew adjectival/national form more precisely than a paraphrase.
- source_word: בָּעֲמָקִים
  chosen: in the valleys
  alternatives:
  - in the lowlands
  - in the vales
  lexicon: HALOT
  rationale: עמקים is the plural of 'valley/depth.' 'In the valleys' is the most direct
    and natural rendering here.
- source_word: שָׁפָט
  chosen: Shaphat
  lexicon: BDB
  rationale: Personal name; transliterated by standard convention.
- source_word: בֶּן עַדְלָי
  chosen: son of Adlai
  lexicon: HALOT
  rationale: Standard Hebrew patronymic construction; rendered formally and transparently.
