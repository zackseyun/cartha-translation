id: 1CH.27.9
reference: 1 Chronicles 27:9
source:
  edition: WLC
  text: הַ/שִּׁשִּׁי֙ לַ/חֹ֣דֶשׁ הַ/שִּׁשִּׁ֔י עִירָ֥א בֶן עִקֵּ֖שׁ הַ/תְּקוֹעִ֑י
    וְ/עַל֙ מַחֲלֻקְתּ֔/וֹ עֶשְׂרִ֥ים וְ/אַרְבָּעָ֖ה אָֽלֶף־׃ס
translation:
  text: 'The sixth, for the sixth month: Ira son of Ikkesh the Tekoite; and over his
    division were twenty-four thousand.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הַשִּׁשִּׁי
  chosen: The sixth
  alternatives:
  - The sixth commander
  - The sixth division
  lexicon: HALOT
  rationale: The ordinal stands elliptically in this roster formula, referring to
    the sixth military leader in sequence. English preserves the concise elliptical
    style with 'The sixth,' while the supplied role is left implicit from context
    rather than added to the text.
- source_word: לַחֹדֶשׁ הַשִּׁשִּׁי
  chosen: for the sixth month
  alternatives:
  - for month six
  - of the sixth month
  lexicon: HALOT
  rationale: The preposition ל with חֹדֶשׁ in this administrative context indicates
    assignment to a month of service. 'For the sixth month' is natural English and
    reflects the scheduling sense.
- source_word: עִירָא
  chosen: Ira
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: בֶן עִקֵּשׁ
  chosen: son of Ikkesh
  alternatives:
  - the son of Ikkesh
  lexicon: HALOT
  rationale: Standard filial construction. 'Son of Ikkesh' is the most direct and
    natural rendering.
- source_word: הַתְּקוֹעִי
  chosen: the Tekoite
  alternatives:
  - from Tekoa
  lexicon: HALOT
  rationale: The gentilic/adjectival form denotes a man from Tekoa. 'The Tekoite'
    is the conventional and concise English equivalent.
- source_word: וְעַל מַחֲלֻקְתּוֹ
  chosen: and over his division were
  alternatives:
  - and his division had
  - and over his company were
  lexicon: HALOT
  rationale: מַחֲלֻקָה in this chapter refers to a military division or rotational
    unit. The preposition עַל with the following number expresses the force under
    his command. 'Over his division were' preserves the Hebrew structure while remaining
    intelligible.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  chosen: twenty-four thousand
  alternatives:
  - twenty and four thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number rendered in contemporary English style.
