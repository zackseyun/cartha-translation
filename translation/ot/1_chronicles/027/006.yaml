id: 1CH.27.6
reference: 1 Chronicles 27:6
source:
  edition: WLC
  text: ה֧וּא בְנָיָ֛הוּ גִּבּ֥וֹר הַ/שְּׁלֹשִׁ֖ים וְ/עַל הַ/שְּׁלֹשִׁ֑ים וּ/מַ֣חֲלֻקְתּ֔/וֹ
    עַמִּיזָבָ֖ד בְּנֽ/וֹ־׃ס
translation:
  text: This was Benaiah, a mighty man of the Thirty and over the Thirty; and his
    division was under Ammizabad his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He was Benaiah, a mighty warrior among the Thirty and over the Thirty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּבּוֹר
  chosen: a mighty man
  alternatives:
  - a warrior
  - a mighty warrior
  - a hero
  lexicon: HALOT
  rationale: In Chronicles, גִּבּוֹר often denotes a valiant fighting man. 'Mighty
    man' preserves the established military-heroic sense without over-paraphrasing.
- source_word: הַשְּׁלֹשִׁים
  chosen: the Thirty
  alternatives:
  - the thirty warriors
  - the Thirty [elite group]
  lexicon: HALOT
  rationale: The term refers to the known elite military corps associated with David's
    warriors, not merely a number. Capitalizing 'Thirty' signals a recognized group
    while staying close to the Hebrew.
- source_word: וְעַל הַשְּׁלֹשִׁים
  chosen: and over the Thirty
  alternatives:
  - and commander over the Thirty
  - and above the Thirty
  lexicon: HALOT
  rationale: עַל in this context indicates authority or position over a group. 'Over
    the Thirty' is concise and faithful; 'commander' is interpretive and therefore
    left implicit.
- source_word: מַחֲלֻקְתּוֹ
  chosen: his division
  alternatives:
  - his military division
  - his course
  lexicon: HALOT
  rationale: In 1 Chronicles 27 the term denotes one of the rotating military divisions.
    'Division' is the clearest modern equivalent and fits the chapter's administrative
    context.
- source_word: עַמִּיזָבָד בְּנוֹ
  chosen: Ammizabad his son
  alternatives:
  - his son Ammizabad
  lexicon: HALOT
  rationale: The Hebrew apposition places the proper name before 'his son.' English
    can preserve this order naturally enough, though the alternative is also idiomatic.
- source_word: הוּא
  chosen: This was
  alternatives:
  - He was
  lexicon: HALOT
  rationale: The pronoun is resumptive/emphatic, referring back to the officer just
    named in the previous verse. 'This was' makes the linkage clear in English, though
    'He was' would also be possible.
