id: 1CH.27.26
reference: 1 Chronicles 27:26
source:
  edition: WLC
  text: וְ/עַ֗ל עֹשֵׂי֙ מְלֶ֣אכֶת הַ/שָּׂדֶ֔ה לַ/עֲבֹדַ֖ת הָ/אֲדָמָ֑ה עֶזְרִ֖י בֶּן
    כְּלֽוּב־׃
translation:
  text: And over those who did the work of the field for the cultivation of the ground
    was Ezri son of Chelub.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the workers of the field.' The Hebrew participial expression can be
      rendered more compactly.
    reason: lexical_alternative
  - marker: b
    text: Or 'for working the soil.' The phrase refers to agricultural cultivation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: And over
  alternatives:
  - Now over
  - Over
  lexicon: HALOT
  rationale: In this administrative list, עַל commonly introduces the official set
    over a sphere of responsibility. Rendering with 'And over' preserves the connective
    force from the surrounding list and the supervisory sense of עַל.
- source_word: עֹשֵׂי
  chosen: those who did
  alternatives:
  - the workers
  - those doing
  lexicon: HALOT
  rationale: The participle of עשה denotes people engaged in the activity. 'Those
    who did' is natural English in this list context and avoids over-specifying beyond
    the Hebrew.
- source_word: מְלֶאכֶת
  chosen: the work
  alternatives:
  - the labor
  - the service
  lexicon: HALOT
  rationale: מְלָאכָה refers to work or occupational labor. 'The work' fits the administrative
    register and pairs naturally with 'of the field.'
- source_word: הַשָּׂדֶה
  chosen: of the field
  alternatives:
  - in the field
  - of the countryside
  lexicon: HALOT
  rationale: The construct phrase מְלֶאכֶת הַשָּׂדֶה is most directly 'the work of
    the field,' referring to agricultural fieldwork. This preserves the Hebrew structure
    while remaining intelligible.
- source_word: לַעֲבֹדַת
  chosen: for the cultivation
  alternatives:
  - for the service
  - for the working
  lexicon: HALOT
  rationale: עֲבֹדָה can mean service or labor; here, with הָאֲדָמָה, it denotes agricultural
    working of the soil. 'Cultivation' expresses the intended farming sense in clear
    English.
- source_word: הָאֲדָמָה
  chosen: the ground
  alternatives:
  - the land
  - the soil
  lexicon: HALOT
  rationale: אֲדָמָה here refers to arable ground/soil rather than the broader territorial
    sense of 'land.' 'Ground' is a natural English equivalent in this farming context.
- source_word: עֶזְרִי בֶּן כְּלוּב
  chosen: Ezri son of Chelub
  alternatives:
  - Ezri the son of Chelub
  lexicon: BDB
  rationale: Personal names are transliterated per project philosophy. 'Son of' is
    the standard rendering of בן in genealogical/administrative notices.
