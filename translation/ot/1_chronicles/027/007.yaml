id: 1CH.27.7
reference: 1 Chronicles 27:7
source:
  edition: WLC
  text: הָֽ/רְבִיעִ֞י לַ/חֹ֣דֶשׁ הָ/רְבִיעִ֗י עֲשָׂה אֵל֙ אֲחִ֣י יוֹאָ֔ב וּ/זְבַדְיָ֥ה
    בְנ֖/וֹ אַחֲרָ֑י/ו וְ/עַל֙ מַחֲלֻקְתּ֔/וֹ עֶשְׂרִ֥ים וְ/אַרְבָּעָ֖ה אָֽלֶף־׃ס
translation:
  text: The fourth, for the fourth month, was Asahel the brother of Joab, and Zebadiah
    his son after him; and over his division were twenty-four thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'and Zebadiah his son succeeded him.' The Hebrew
      says literally 'after him,' indicating succession.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרְבִיעִי
  chosen: The fourth
  alternatives:
  - The fourth commander
  - The fourth division
  lexicon: HALOT
  rationale: Ordinal adjective used substantivally in this roster formula, referring
    to the fourth unit/appointment in sequence. English keeps the elliptical style
    with 'The fourth,' as in the surrounding list structure.
- source_word: לַחֹדֶשׁ הָרְבִיעִי
  chosen: for the fourth month
  alternatives:
  - for month four
  - for the month, the fourth
  lexicon: HALOT
  rationale: The preposition ל with חֹדֶשׁ marks assignment to a monthly rotation;
    'for the fourth month' is idiomatic and preserves the administrative sense.
- source_word: עֲשָׂהאֵל
  chosen: Asahel
  alternatives:
  - Asael
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name. The morphology
    splits the name, but it is a single proper noun.
- source_word: אֲחִי יוֹאָב
  chosen: the brother of Joab
  alternatives:
  - Joab's brother
  lexicon: HALOT
  rationale: Construct phrase identifying Asahel by relation to Joab. 'The brother
    of Joab' is slightly more formal and mirrors the Hebrew structure.
- source_word: וּזְבַדְיָה בְנוֹ אַחֲרָיו
  chosen: and Zebadiah his son after him
  alternatives:
  - and Zebadiah his son after him in command
  - and Zebadiah his son succeeded him
  lexicon: HALOT
  rationale: אַחֲרָיו here indicates succession. The more literal 'after him' is retained
    in the main text to avoid over-paraphrase, while the succession sense remains
    clear from context.
- source_word: וְעַל מַחֲלֻקְתּוֹ
  chosen: and over his division were
  alternatives:
  - and his division had
  - and in his division were
  lexicon: HALOT
  rationale: מַחֲלֻקָה in this chapter denotes a military division or course. Rendering
    עַל with 'over' preserves the Hebrew idiom of authority/assignment, and 'were'
    is supplied naturally in English.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  chosen: twenty-four thousand
  alternatives:
  - twenty and four thousand
  lexicon: HALOT
  rationale: Standard contemporary English rendering of the number.
