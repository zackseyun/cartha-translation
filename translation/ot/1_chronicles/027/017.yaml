theological_decisions:
- issue: Whether to make explicit that 'Aaron' refers to the Aaronic priesthood
  chosen_reading: Retain the literal ancestral name 'Aaron' in the main text
  alternative_readings:
  - for the house of Aaron
  - for the Aaronites
  rationale: The verse is an administrative list pairing tribal or priestly groups
    with their leaders. The Hebrew simply says 'for Aaron,' and the translation preserves
    that form rather than importing explanatory wording into the main text. Because
    modern readers may not immediately recognize the metonymy, an explanatory footnote
    is appropriate.
  doctrine_reference: Translation philosophy §1 (original-language primacy), §2 (translate
    titles; transliterate names), §5 (consistency of key terms, or documented exception)
