id: 1CH.27.17
reference: 1 Chronicles 27:17
source:
  edition: WLC
  text: לְ/לֵוִ֛י חֲשַׁבְיָ֥ה בֶן קְמוּאֵ֖ל לְ/אַהֲרֹ֥ן צָדֽוֹק־׃ס
translation:
  text: for Levi, Hashabiah son of Kemuel; for Aaron, Zadok.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'for Aaron,' likely meaning the Aaronic priestly house or the Aaronites.
    reason: cultural_note
lexical_decisions:
- source_word: לְ/לֵוִי
  chosen: for Levi
  alternatives:
  - of Levi
  - for the Levites
  lexicon: HALOT
  rationale: The prefixed לְ in this administrative list marks the tribal/familial
    group over which the named official is set, best rendered idiomatically as 'for
    Levi.' 'Of Levi' is possible but less clear in English; 'for the Levites' is interpretive
    since the Hebrew uses the ancestor name Levi rather than the plural gentilic.
- source_word: חֲשַׁבְיָה
  chosen: Hashabiah
  rationale: 'Personal name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: בֶן
  chosen: son of
  alternatives:
  - ben
  lexicon: HALOT
  rationale: Standard genealogical construction in Hebrew. 'Son of' is the natural
    English equivalent.
- source_word: קְמוּאֵל
  chosen: Kemuel
  rationale: Personal name transliterated by standard convention.
- source_word: לְ/אַהֲרֹן
  chosen: for Aaron
  alternatives:
  - of Aaron
  - for the Aaronites
  lexicon: HALOT
  rationale: As with 'for Levi,' the prefixed לְ indicates the group or house represented
    by the ancestral name. 'For Aaron' preserves the Hebrew form and parallels the
    list structure. It likely refers to the Aaronic priestly house, but the text itself
    names Aaron rather than using an expanded English interpretation.
- source_word: צָדוֹק
  chosen: Zadok
  rationale: Personal name transliterated by standard convention.
