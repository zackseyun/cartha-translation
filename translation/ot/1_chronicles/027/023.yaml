id: 1CH.27.23
reference: 1 Chronicles 27:23
source:
  edition: WLC
  text: וְ/לֹא נָשָׂ֤א דָוִיד֙ מִסְפָּרָ֔/ם לְ/מִ/בֶּ֛ן עֶשְׂרִ֥ים שָׁנָ֖ה וּ/לְ/מָ֑טָּה כִּ֚י אָמַ֣ר יְהוָ֔ה לְ/הַרְבּ֥וֹת אֶת יִשְׂרָאֵ֖ל כְּ/כוֹכְבֵ֥י הַ/שָּׁמָֽיִם־־׃
translation:
  text: But David did not count them from twenty years old and under, because Yahweh had said he would multiply Israel like the stars of the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'did not take their number.' The Hebrew idiom is literally 'did not lift up their number,' meaning 'did not count them' or 'did not take a census of them.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'like the stars of heaven.' This echoes the LORD's promise to make Israel exceedingly numerous.
    reason: cross_reference
lexical_decisions:
- source_word: וְלֹא
  chosen: But ... not
  alternatives:
  - And ... not
  - Now ... not
  lexicon: HALOT
  rationale: The conjunction with negation links this verse contrastively to the preceding census context. 'But' brings out the adversative sense in readable English.
- source_word: נָשָׂא ... מִסְפָּרָם
  chosen: did not count them
  alternatives:
  - did not take their number
  - did not lift up their number
  lexicon: HALOT
  rationale: The idiom 'lift/carry number' means to take a census or count. 'Did not count them' is natural English while preserving the census sense.
- source_word: מִסְפָּרָם
  chosen: them
  alternatives:
  - their number
  lexicon: HALOT
  rationale: English idiom prefers the object pronoun after 'count.' The underlying noun 'number' is absorbed into the verbal expression 'count them.'
- source_word: לְמִבֶּן עֶשְׂרִים שָׁנָה וּלְמָטָּה
  chosen: from twenty years old and under
  alternatives:
  - from a son of twenty years and below
  - those twenty years old and downward
  - from twenty years old and below
  lexicon: HALOT
  rationale: This age formula marks the lower age threshold in census eligibility. 'Twenty years old and under' is idiomatic and accurately conveys the inclusive downward range.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here the particle introduces the reason David did not count that age group.
- source_word: אָמַר יְהוָה
  chosen: the LORD had said
  alternatives:
  - the LORD said
  - YHWH had said
  lexicon: HALOT
  rationale: 'Per doctrine, יְהוָה is rendered ''the LORD.'' The pluperfect ''had said'' fits the explanatory sense: David''s action was based on a prior divine statement.'
- source_word: לְהַרְבּוֹת
  chosen: he would multiply
  alternatives:
  - to multiply
  - to make numerous
  - to increase
  lexicon: HALOT
  rationale: The infinitive after 'said' expresses the content/purpose of the divine statement. 'He would multiply' communicates the future-result sense naturally in English.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the people of Israel
  lexicon: HALOT
  rationale: The direct object marker is untranslated; 'Israel' is sufficient and preserves the compactness of the Hebrew.
- source_word: כְּכוֹכְבֵי הַשָּׁמַיִם
  chosen: like the stars of the heavens
  alternatives:
  - as the stars of heaven
  - like the stars in the sky
  lexicon: HALOT
  rationale: The simile echoes patriarchal promise language. 'The heavens' is slightly more formal and preserves the Hebrew plural sense better than 'sky,' while remaining readable.
