id: 1CH.6.17
reference: 1 Chronicles 6:17
source:
  edition: WLC
  text: וַ/יִּהְי֨וּ מְשָׁרְתִ֜ים לִ/פְנֵ֨י מִשְׁכַּ֤ן אֹֽהֶל מוֹעֵד֙ בַּ/שִּׁ֔יר עַד בְּנ֧וֹת שְׁלֹמֹ֛ה אֶת בֵּ֥ית יְהוָ֖ה בִּ/ירוּשָׁלִָ֑ם וַ/יַּעַמְד֥וּ כְ/מִשְׁפָּטָ֖/ם עַל עֲבוֹדָתָֽ/ם־־־־׃
translation:
  text: They were ministering before the tabernacle, the tent of meeting, with song until Solomon built the house of Yahweh in Jerusalem, and they stood according to their ordinance over their service.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in song' or 'by singing.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house of the LORD'; that is, the temple.
    reason: lexical_alternative
  - marker: c
    text: Or 'according to their ordinance' or 'according to their custom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשָׁרְתִים
  chosen: ministering
  alternatives:
  - serving
  lexicon: HALOT
  rationale: The participle denotes performing cultic/service duties. 'Ministering' fits the liturgical context better than the more generic 'serving' while remaining natural English.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: A standard spatial/relational rendering here, indicating service carried out before the sanctuary.
- source_word: מִשְׁכַּן אֹהֶל מוֹעֵד
  chosen: the tabernacle, the tent of meeting
  alternatives:
  - the dwelling, the tent of meeting
  lexicon: HALOT
  rationale: The paired nouns are retained rather than collapsed. 'Tabernacle' is the conventional and accurate rendering of מִשְׁכַּן in this sanctuary context, with 'the tent of meeting' appositional to preserve both Hebrew terms.
- source_word: בַּשִּׁיר
  chosen: with song
  alternatives:
  - in song
  - by singing
  lexicon: HALOT
  rationale: The phrase indicates the manner of their ministry. 'With song' is concise and idiomatic, preserving the musical aspect without overexpansion.
- source_word: עַד בְּנוֹת שְׁלֹמֹה
  chosen: until Solomon built
  alternatives:
  - until the building by Solomon of
  - until Solomon's building of
  lexicon: HALOT
  rationale: The infinitive construct with עַד marks the endpoint of this arrangement. Rendering it verbally in English is clearer and faithful to the sense.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: The Hebrew says 'house'; this is preserved in the main text rather than interpreting it as 'temple,' though the referent is the temple.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּעַמְדוּ
  chosen: they stood
  alternatives:
  - they took their stand
  - they served
  lexicon: HALOT
  rationale: The verb literally means 'stood' and likely conveys taking up one's assigned position. The literal rendering is retained, with the functional nuance supplied by the following phrase.
- source_word: כְמִשְׁפָּטָם
  chosen: in their prescribed order
  alternatives:
  - according to their rule
  - according to their ordinance
  - according to their custom
  lexicon: HALOT
  rationale: In this administrative/cultic context, מִשְׁפָּט refers to an established regulation or prescribed arrangement. 'In their prescribed order' communicates the procedural sense naturally.
- source_word: עַל עֲבוֹדָתָם
  chosen: over their service
  alternatives:
  - for their service
  - at their service
  lexicon: HALOT
  rationale: The preposition עַל here marks relation to the duty assigned to them. 'Over their service' preserves the Hebrew closely, suggesting responsibility with respect to their ministry.
