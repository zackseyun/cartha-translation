id: 1CH.6.16
reference: 1 Chronicles 6:16
source:
  edition: WLC
  text: וְ/אֵ֗לֶּה אֲשֶׁ֨ר הֶעֱמִ֥יד דָּוִ֛יד עַל יְדֵי שִׁ֖יר בֵּ֣ית יְהוָ֑ה מִ/מְּנ֖וֹחַ הָ/אָרֽוֹן־־׃
translation:
  text: These are the men whom David appointed over the service of song in the house of Yahweh, after the ark came to rest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the singing' or 'in charge of the singing.' The Hebrew phrase likely denotes responsibility for musical worship in the sanctuary.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from the resting of the ark.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: These are
  alternatives:
  - And these are
  - Now these are
  lexicon: HALOT
  rationale: Introduces the following list. English drops the conjunction as a natural discourse opening, while retaining the demonstrative force with 'These are.'
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - who
  - that
  lexicon: HALOT
  rationale: Relative particle introducing the clause describing the listed persons. 'Whom' fits the object of 'appointed' in smooth English.
- source_word: הֶעֱמִיד
  chosen: appointed
  alternatives:
  - set
  - stationed
  - established
  lexicon: HALOT
  rationale: In this administrative context, the Hiphil of עמד conveys causing someone to stand in an office or role. 'Appointed' best captures formal designation rather than mere physical placement.
- source_word: דָּוִיד
  chosen: David
  rationale: Standard English transliteration of the personal name.
- source_word: עַל יְדֵי שִׁיר
  chosen: over the service of song
  alternatives:
  - for the singing
  - in charge of the singing
  - for song ministry
  lexicon: HALOT
  rationale: The idiom עַל יְדֵי here indicates responsibility or oversight, and שִׁיר refers to singing/song. 'Over the service of song' preserves both the administrative nuance and the cultic function without over-paraphrasing.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the house of Yahweh
  - the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת here is literally 'house,' referring to the sanctuary. 'House of the LORD' preserves the Hebrew expression. Per doctrine, יְהוָה is rendered 'the LORD,' not 'Yahweh.' 'Temple' would be interpretive and slightly anachronistic in this ark-centered setting.
- source_word: מִמְּנוֹחַ
  chosen: after ... came to rest
  alternatives:
  - from the resting of
  - when there was rest for
  - after the resting of
  lexicon: HALOT
  rationale: The preposition מִן with the noun מְנוֹחַ marks the time from the ark's coming to a settled resting place. In idiomatic English, 'after ... came to rest' communicates the temporal sense clearly.
- source_word: הָאָרוֹן
  chosen: the ark
  alternatives:
  - the ark of the covenant
  lexicon: HALOT
  rationale: The Hebrew text has simply 'the ark.' Expanding to 'ark of the covenant' would add information not explicit in this verse, though the referent is clear from context.
- source_word: אֵלֶּה
  chosen: the men
  alternatives:
  - these
  - these ones
  lexicon: HALOT
  rationale: Although 'men' is not explicit in the Hebrew, the referent is the named male Levites in the following context. Supplying 'the men' makes the English sentence natural and specific without materially altering the sense.
