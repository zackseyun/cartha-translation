id: 1CH.23.32
reference: 1 Chronicles 23:32
source:
  edition: WLC
  text: וְ/שָׁמְר֞וּ אֶת מִשְׁמֶ֣רֶת אֹֽהֶל מוֹעֵ֗ד וְ/אֵת֙ מִשְׁמֶ֣רֶת הַ/קֹּ֔דֶשׁ וּ/מִשְׁמֶ֕רֶת בְּנֵ֥י אַהֲרֹ֖ן אֲחֵי/הֶ֑ם לַ/עֲבֹדַ֖ת בֵּ֥ית יְהוָֽה־־׃פ
translation:
  text: And they were to keep charge of the tent of meeting, the charge of the holy place, and the charge of the sons of Aaron their brothers, for the service of the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sanctuary.' The Hebrew term can denote the holy place or the sacred precinct more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמְרוּ
  chosen: they were to keep
  alternatives:
  - they kept
  - they shall keep
  - they were to guard
  lexicon: HALOT
  rationale: שׁמר commonly means 'keep, guard, observe.' In this administrative/instructional context summarizing Levitical duties, an English modal sense ('were to keep') best conveys assigned responsibility rather than a simple past narrative event.
- source_word: מִשְׁמֶרֶת
  chosen: charge
  alternatives:
  - duty
  - responsibility
  - guard
  lexicon: HALOT
  rationale: The noun denotes an assigned obligation, watch, or charge. Repeating 'charge' three times reflects the Hebrew repetition and preserves the formal structure of the verse better than varying the English gloss.
- source_word: אֹהֶל מוֹעֵד
  chosen: tent of meeting
  alternatives:
  - tabernacle
  - meeting tent
  lexicon: HALOT
  rationale: This is the standard literal rendering of the sanctuary designation. 'Tabernacle' is traditional but less transparent to modern readers and less directly tied to the Hebrew components.
- source_word: הַקֹּדֶשׁ
  chosen: the holy place
  alternatives:
  - the sanctuary
  - the holy thing
  - the holiness
  lexicon: HALOT
  rationale: In cultic context, הַקֹּדֶשׁ refers to the sacred area/things. 'The holy place' gives a clear cultic sense in English and distinguishes it from the broader 'house of the LORD' later in the verse.
- source_word: בְּנֵי אַהֲרֹן אֲחֵיהֶם
  chosen: the sons of Aaron their brothers
  alternatives:
  - the sons of Aaron, their brothers
  - their brothers, the sons of Aaron
  - the descendants of Aaron their brothers
  lexicon: HALOT
  rationale: The phrase identifies the Aaronic priests as the Levites' brothers. 'Sons of Aaron' preserves the familial and priestly terminology of the Hebrew; 'descendants' would be interpretive smoothing.
- source_word: לַעֲבֹדַת
  chosen: for the service of
  alternatives:
  - for the work of
  - for serving in
  lexicon: HALOT
  rationale: עֲבֹדָה in temple context denotes service/work performed in worship administration. 'For the service of' is natural English and preserves the cultic nuance.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the temple of the LORD
  lexicon: HALOT
  rationale: '''House of the LORD'' is the standard transparent rendering. ''Temple'' is possible contextually, but the Hebrew says ''house,'' and the project''s doctrine specifies rendering יְהוָה as ''the LORD''.'
