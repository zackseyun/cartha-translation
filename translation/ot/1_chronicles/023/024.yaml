id: 1CH.23.24
reference: 1 Chronicles 23:24
source:
  edition: WLC
  text: אֵ֣לֶּה בְנֵֽי לֵוִי֩ לְ/בֵ֨ית אֲבֹתֵי/הֶ֜ם רָאשֵׁ֧י הָ/אָב֣וֹת לִ/פְקוּדֵי/הֶ֗ם בְּ/מִסְפַּ֤ר שֵׁמוֹת֙ לְ/גֻלְגְּלֹתָ֔/ם עֹשֵׂה֙ הַ/מְּלָאכָ֔ה לַ/עֲבֹדַ֖ת בֵּ֣ית יְהוָ֑ה מִ/בֶּ֛ן עֶשְׂרִ֥ים שָׁנָ֖ה וָ/מָֽעְלָ/ה־׃
translation:
  text: These were the sons of Levi by their fathers’ houses, the heads of the fathers’ houses, according to those counted of them, by the number of names, head by head, doing the work for the service of the house of Yahweh, from twenty years old and upward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'head by head,' literally 'by their skulls/heads,' an idiom meaning each individual was counted separately.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבֵית אֲבֹתֵיהֶם
  chosen: by their fathers’ houses
  alternatives:
  - according to their ancestral houses
  - for their fathers’ house
  lexicon: HALOT
  rationale: The phrase marks clan/household classification. 'Fathers’ houses' is a conventional but still understandable rendering for Israelite ancestral subdivisions; 'by' conveys categorization.
- source_word: רָאשֵׁי הָאָבוֹת
  chosen: the heads of the fathers’ houses
  alternatives:
  - the chief fathers
  - the heads of the ancestral houses
  lexicon: HALOT
  rationale: Literally 'heads of the fathers.' In context this refers to leading representatives of family houses. The fuller rendering avoids the archaic idiom 'chief fathers' while staying close to the Hebrew.
- source_word: לִפְקוּדֵיהֶם
  chosen: according to those counted of them
  alternatives:
  - according to their enrollment
  - according to their mustering
  lexicon: HALOT
  rationale: From פקד in a passive/counting sense. The phrase links the family heads to the census/register. 'Those counted of them' preserves the relation to persons rather than abstracting too far.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  chosen: by the number of names
  alternatives:
  - by number, by name
  - in the number of names
  lexicon: HALOT
  rationale: A standard census expression indicating named individuals in a register. The chosen wording is natural English while retaining the concrete idea of names being counted.
- source_word: לְגֻלְגְּלֹתָם
  chosen: head by head
  alternatives:
  - by their skulls
  - person by person
  lexicon: HALOT
  rationale: Literally 'by their skulls/heads,' an idiom for individual counting. 'Head by head' preserves the Hebrew imagery better than the more interpretive 'person by person.'
- source_word: עֹשֵׂה הַמְּלָאכָה
  chosen: doing the work
  alternatives:
  - performing the task
  - those doing the work
  lexicon: HALOT
  rationale: The singular participle functions collectively with the counted Levites. 'Doing the work' is concise and reflects ongoing assigned labor.
- source_word: לַעֲבֹדַת בֵּית יְהוָה
  chosen: for the service of the house of the LORD
  alternatives:
  - for the ministry of the house of the LORD
  - for the work of the house of the LORD
  lexicon: HALOT
  rationale: עֲבֹדָה here denotes cultic/service labor connected with the temple. 'Service' is broad enough to include liturgical and practical duties without importing later ecclesiastical terminology. 'The LORD' follows the project’s default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from a son of twenty years and above
  - twenty years old and older
  lexicon: HALOT
  rationale: This idiom sets the minimum age for service eligibility. The chosen English is idiomatic and precise.
