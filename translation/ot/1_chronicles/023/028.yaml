theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relationship of Levites to Aaronic priests in לְיַד בְּנֵי אַהֲרֹן
  chosen_reading: to assist the sons of Aaron
  alternative_readings:
  - at the side of the sons of Aaron
  - under the authority of the sons of Aaron
  rationale: The text presents the Levites in a supporting role relative to the Aaronic priests without making a stronger doctrinal claim about hierarchy than the idiom warrants. 'Assist' preserves the service relationship while avoiding over-interpretation.
