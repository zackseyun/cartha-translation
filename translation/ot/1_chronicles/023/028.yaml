id: 1CH.23.28
reference: 1 Chronicles 23:28
source:
  edition: WLC
  text: כִּ֣י מַעֲמָדָ֞/ם לְ/יַד בְּנֵ֣י אַהֲרֹ֗ן לַ/עֲבֹדַת֙ בֵּ֣ית יְהוָ֔ה עַל הַ/חֲצֵרוֹת֙ וְ/עַל הַ/לְּשָׁכ֔וֹת וְ/עַֽל טָהֳרַ֖ת לְ/כָל קֹ֑דֶשׁ וּ/מַֽעֲשֵׂ֔ה עֲבֹדַ֖ת בֵּ֥ית הָ/אֱלֹהִֽים־־־־־׃
translation:
  text: For their duty was to assist the sons of Aaron in the service of the house of Yahweh, over the courts and the chambers, and the purification of all that is holy, and the work of the service of the house of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their station' or 'their office' for 'their duty.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'at the hand of the sons of Aaron,' that is, serving alongside or assisting them.
    reason: lexical_alternative
  - marker: c
    text: Or 'the purification of every holy thing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces an explanatory clause giving the reason for the Levites' appointment in the surrounding context. 'For' preserves the explanatory force in natural English.
- source_word: מַעֲמָדָם
  chosen: their duty
  alternatives:
  - their station
  - their office
  - their standing
  lexicon: HALOT
  rationale: The noun denotes an assigned position or service-post. In this context of temple responsibilities, 'their duty' communicates functional assignment more clearly than the more static 'station' or 'standing'.
- source_word: לְיַד
  chosen: to assist
  alternatives:
  - at the side of
  - under the direction of
  - beside
  lexicon: HALOT
  rationale: Literally 'at the hand/side of,' but idiomatically here it indicates supportive service rendered alongside the priests. 'To assist' captures the relational and functional sense in idiomatic English.
- source_word: בְּנֵי אַהֲרֹן
  chosen: the sons of Aaron
  alternatives:
  - Aaron's sons
  lexicon: HALOT
  rationale: A standard formal rendering that preserves the familial-priestly designation. It is not merely genealogical but identifies the Aaronic priesthood.
- source_word: לַעֲבֹדַת בֵּית יְהוָה
  chosen: in the service of the house of the LORD
  alternatives:
  - for the service of the house of the LORD
  - for the work of the house of the LORD
  lexicon: HALOT
  rationale: עֲבֹדָה here refers to cultic service. 'Service' is the most natural and sufficiently formal rendering. 'House of the LORD' preserves temple language and the covenant name convention.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: עַל הַחֲצֵרוֹת
  chosen: concerning the courts
  alternatives:
  - over the courts
  - with respect to the courts
  - in the courts
  lexicon: HALOT
  rationale: The preposition עַל here introduces areas or spheres of responsibility rather than simple location. 'Concerning the courts' best fits the list of assigned duties.
- source_word: הַחֲצֵרוֹת
  chosen: the courts
  alternatives:
  - the courtyards
  lexicon: HALOT
  rationale: Refers to temple court areas. 'Courts' is the conventional and concise architectural term in English Bible style.
- source_word: וְעַל הַלְּשָׁכוֹת
  chosen: and the chambers
  alternatives:
  - and the rooms
  - and the side rooms
  lexicon: HALOT
  rationale: לְשָׁכוֹת refers to temple rooms/chambers. 'Chambers' preserves the formal temple-administrative sense better than the more generic 'rooms'.
- source_word: וְעַל טָהֳרַת לְכָל קֹדֶשׁ
  chosen: and the purification of all that is holy
  alternatives:
  - and the cleansing of every holy thing
  - and the purification for all the holy things
  lexicon: HALOT
  rationale: The phrase concerns maintaining ritual purity in relation to holy things. 'The purification of all that is holy' is smooth English and preserves the broad scope without over-specifying objects absent from the Hebrew.
- source_word: קֹדֶשׁ
  chosen: all that is holy
  alternatives:
  - the holy things
  - everything holy
  lexicon: HALOT
  rationale: The singular collective noun can denote holy things generally. 'All that is holy' renders the collective force naturally in English.
- source_word: וּמַעֲשֵׂה עֲבֹדַת בֵּית הָאֱלֹהִים
  chosen: and the work of the service of the house of God
  alternatives:
  - and the work of the ministry of the house of God
  - and the labor of the service of the house of God
  lexicon: HALOT
  rationale: The Hebrew stacks two related nouns, 'work' and 'service,' likely for comprehensiveness. Retaining both avoids flattening the expression and reflects the formal administrative style of Chronicles.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - God's house
  lexicon: HALOT
  rationale: A straightforward formal rendering. The variation from 'house of the LORD' earlier is preserved rather than harmonized, since the Hebrew itself varies.
