theological_decisions:
- issue: Status of Moses' sons in Israel's tribal structure
  chosen_reading: his sons were called among the tribe of Levi
  alternative_readings:
  - his sons were counted as part of the tribe of Levi
  - his sons were named over the tribe of Levi
  rationale: 'The verse distinguishes Moses from Aaron in the surrounding context:
    Aaron''s line receives priestly distinction, while Moses'' sons are included within
    the broader Levite tribe rather than set apart as a separate priestly house. The
    translation preserves that administrative/genealogical point without overstating
    it.'
revisions:
- timestamp: '2026-04-21T03:27:53Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/1_chronicles/023/014.json
  category: awkward_english
  tier: 1
  from: were called among
  to: were counted among
  rationale: The Hebrew idiom יִקָּרְאוּ עַל (niqra' 'al) means 'to be reckoned/counted
    as part of' a group. The current rendering 'were called among' translates the
    verb literally ('called') but combines it with a contextual preposition ('among'),
    resulting in a phrase that is slightly unnatural in English. While the meaning
    is discernible, 'were counted among' or 'were reckoned among' is more idiomatic
    and more precisely captures the sense of official classification or registration
    within the tribe, which is the core point of the verse. This change would move
    a better rendering from the footnote into the main text, improving clarity.
