id: 1CH.23.30
reference: 1 Chronicles 23:30
source:
  edition: WLC
  text: וְ/לַ/עֲמֹד֙ בַּ/בֹּ֣קֶר בַּ/בֹּ֔קֶר לְ/הֹד֥וֹת וּ/לְ/הַלֵּ֖ל לַ/יהוָ֑ה וְ/כֵ֖ן לָ/עָֽרֶב׃
translation:
  text: and to stand every morning to give thanks and to praise Yahweh, and likewise at evening,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''morning by morning,'' expressing a regular daily duty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לַ/עֲמֹד
  chosen: and to stand
  alternatives:
  - and to take their stand
  - and to be stationed
  lexicon: HALOT
  rationale: The infinitive construct of עמד with prefixed conjunction and preposition expresses assigned duty/purpose in the preceding context. 'Stand' preserves the concrete posture and formal service setting better than a more interpretive 'serve' or 'minister.'
- source_word: בַּ/בֹּקֶר בַּ/בֹּקֶר
  chosen: every morning
  alternatives:
  - morning by morning
  - in the morning, in the morning
  lexicon: HALOT
  rationale: The repetition is distributive/iterative, indicating regular daily occurrence. 'Every morning' is natural modern English while preserving the repeated sense; the more literal 'morning by morning' is viable but less idiomatic.
- source_word: לְ/הֹדֹות
  chosen: to give thanks
  alternatives:
  - to thank
  - to confess
  lexicon: HALOT
  rationale: In worship contexts ידה in the Hiphil commonly means giving thanks/praise rather than confession. 'Give thanks' best fits the paired liturgical actions with 'praise.'
- source_word: וּ/לְ/הַלֵּל
  chosen: and to praise
  alternatives:
  - and to sing praise
  - and to extol
  lexicon: HALOT
  rationale: הלל in the Piel denotes praise. 'Praise' is the most direct and broadly understandable rendering; 'sing praise' would add a musical nuance not explicit in the verb itself.
- source_word: לַ/יהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD,' following established reverential convention and the project's default for the Tetragrammaton.
- source_word: וְ/כֵן
  chosen: and likewise
  alternatives:
  - and so
  - and in the same way
  lexicon: HALOT
  rationale: וכן links the evening duty to the morning duty by similarity. 'Likewise' clearly conveys corresponding repetition of the same action.
- source_word: לָ/עָרֶב
  chosen: at evening
  alternatives:
  - in the evening
  - toward evening
  lexicon: HALOT
  rationale: The phrase marks the corresponding evening time for the same liturgical service. 'At evening' is concise and suitably formal; 'in the evening' is also possible.
