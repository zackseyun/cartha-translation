id: 1CH.23.4
reference: 1 Chronicles 23:4
source:
  edition: WLC
  text: מֵ/אֵ֗לֶּה לְ/נַצֵּ֨חַ֙ עַל מְלֶ֣אכֶת בֵּית יְהוָ֔ה עֶשְׂרִ֥ים וְ/אַרְבָּעָ֖ה אָ֑לֶף וְ/שֹׁטְרִ֥ים וְ/שֹׁפְטִ֖ים שֵׁ֥שֶׁת אֲלָפִֽים־־׃
translation:
  text: Of these, twenty-four thousand were to oversee the work of the house of Yahweh, and six thousand were officers and judges.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מֵאֵלֶּה
  chosen: Of these
  alternatives:
  - From these
  - Of them
  lexicon: HALOT
  rationale: The preposition מִן with the demonstrative אֵלֶּה introduces a subset from the previously mentioned Levites. 'Of these' is idiomatic English and preserves the partitive sense.
- source_word: לְנַצֵּחַ
  chosen: were to oversee
  alternatives:
  - to supervise
  - to direct
  - to be in charge of
  lexicon: HALOT
  rationale: The piel infinitive of נצח here carries the sense of supervising or directing work rather than musical leadership. 'Were to oversee' makes the infinitival purpose/appointment sense natural in English while fitting the administrative context.
- source_word: עַל מְלֶאכֶת
  chosen: the work of
  alternatives:
  - over the service of
  - over the labor of
  - for the work of
  lexicon: HALOT
  rationale: מְלָאכָה denotes work, labor, or occupational task. In this temple-administration context, 'the work of' is broad enough to include the full range of duties without narrowing it to cultic 'service' alone.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת with YHWH is the standard expression 'house of the LORD.' 'Temple' would be interpretive; 'house' preserves the Hebrew wording. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  chosen: twenty-four thousand
  alternatives:
  - 24,000
  lexicon: HALOT
  rationale: Straightforward cardinal number. Spelled out in running translation for readability and literary style.
- source_word: וְשֹׁטְרִים
  chosen: officers
  alternatives:
  - officials
  - administrators
  lexicon: HALOT
  rationale: שֹׁטֵר commonly refers to an officer, official, or administrative functionary. 'Officers' is the most established and suitably broad rendering in this governance context.
- source_word: וְשֹׁפְטִים
  chosen: judges
  alternatives:
  - magistrates
  lexicon: HALOT
  rationale: שֹׁפְטִים plainly denotes those exercising judicial functions. 'Judges' is the direct and natural equivalent.
- source_word: שֵׁשֶׁת אֲלָפִים
  chosen: six thousand
  alternatives:
  - 6,000
  lexicon: HALOT
  rationale: Straightforward cardinal number; spelled out for consistency with the first number.
