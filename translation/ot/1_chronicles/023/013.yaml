theological_decisions:
- issue: Referent of the singular suffixes in 'to consecrate him' and 'to minister to him'
  chosen_reading: '''to consecrate him'' refers to Aaron; ''to minister to him'' refers to the LORD'
  alternative_readings:
  - '''to consecrate it'' or an impersonal consecration sense'
  - '''to minister to Aaron'''
  rationale: The immediate syntax after 'Aaron was set apart' supports Aaron as the object of consecration, while the nearer divine referent in 'before the LORD' makes the service directed to the LORD. This preserves the priestly logic of the verse without over-resolving beyond the syntax.
  doctrine_reference: Preserve theological tension rather than resolve it, where ambiguity is genuine.
