id: 1CH.23.13
reference: 1 Chronicles 23:13
source:
  edition: WLC
  text: בְּנֵ֥י עַמְרָ֖ם אַהֲרֹ֣ן וּ/מֹשֶׁ֑ה וַ/יִּבָּדֵ֣ל אַהֲרֹ֡ן לְֽ/הַקְדִּישׁ/וֹ֩ קֹ֨דֶשׁ קָֽדָשִׁ֤ים הֽוּא וּ/בָנָי/ו֙ עַד עוֹלָ֔ם לְ/הַקְטִיר֩ לִ/פְנֵ֨י יְהוָ֧ה לְ/שָׁרְת֛/וֹ וּ/לְ/בָרֵ֥ךְ בִּ/שְׁמ֖/וֹ עַד עוֹלָֽם־־־׃
translation:
  text: 'The sons of Amram: Aaron and Moses. And Aaron was set apart, he and his sons forever, to sanctify him as most holy, to burn incense before Yahweh, to minister to him, and to bless in his name forever.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'holy of holies.' The Hebrew expression is literally 'holiness of holinesses,' a superlative meaning 'most holy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי עַמְרָם
  chosen: The sons of Amram
  alternatives:
  - The descendants of Amram
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of'; in genealogical context it can extend to descendants, but here the immediate naming of Aaron and Moses favors the straightforward 'sons of Amram.'
- source_word: וַיִּבָּדֵל
  chosen: was set apart
  alternatives:
  - was separated
  - was distinguished
  lexicon: HALOT
  rationale: Nifal of בדל commonly denotes being separated or set apart for a special purpose. 'Set apart' best captures consecratory distinction in readable English.
- source_word: לְהַקְדִּישׁוֹ
  chosen: to consecrate him
  alternatives:
  - to sanctify him
  - to make him holy
  lexicon: HALOT
  rationale: קדש in the Hifil means to consecrate or make holy. With the 3ms suffix, the object is singular ('him'), naturally referring to Aaron. 'Consecrate' fits priestly cultic context better than the broader 'make holy.'
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: most holy
  alternatives:
  - holy of holies
  - most holy thing
  lexicon: HALOT
  rationale: The expression is a superlative construction. Here it predicates Aaron's consecrated status rather than naming the sanctuary space, so 'most holy' is preferable to the more traditional but potentially misleading 'holy of holies.'
- source_word: הוּא וּבָנָיו
  chosen: he and his sons
  alternatives:
  - he and his descendants
  lexicon: HALOT
  rationale: The pronoun plus noun explicitly identifies Aaron together with his sons as the priestly line. 'Sons' preserves the Hebrew form and genealogical specificity.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for all time
  - perpetually
  lexicon: HALOT
  rationale: In this cultic-genealogical context עַד עוֹלָם denotes enduring continuance. 'Forever' is idiomatic and sufficiently weighty.
- source_word: לְהַקְטִיר
  chosen: to burn incense
  alternatives:
  - to make offerings smoke
  - to offer up in smoke
  lexicon: HALOT
  rationale: In priestly contexts קטר commonly refers to burning incense or offerings. Given the following 'before the LORD' and priestly duties, 'burn incense' is the clearest contextual rendering.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי expresses presence before YHWH. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: לְשָׁרְתוֹ
  chosen: to minister to him
  alternatives:
  - to serve him
  lexicon: HALOT
  rationale: שרת in cultic contexts often means ministerial service. The suffix most naturally refers to the LORD in the immediate context. 'Minister' preserves priestly nuance better than the broader 'serve.'
- source_word: וּלְבָרֵךְ בִּשְׁמוֹ
  chosen: and to bless in his name
  alternatives:
  - and to pronounce blessing in his name
  - and to bless by his name
  lexicon: HALOT
  rationale: The phrase denotes priestly blessing invoked under the LORD's name/authority. 'Bless in his name' is concise and faithful, while preserving the ambiguity of instrumentality/authority.
