id: 1CH.23.31
reference: 1 Chronicles 23:31
source:
  edition: WLC
  text: וּ/לְ/כֹ֨ל הַעֲל֤וֹת עֹלוֹת֙ לַ/יהוָ֔ה לַ/שַּׁבָּת֔וֹת לֶ/חֳדָשִׁ֖ים וְ/לַ/מֹּעֲדִ֑ים בְּ/מִסְפָּ֨ר כְּ/מִשְׁפָּ֧ט עֲלֵי/הֶ֛ם תָּמִ֖יד לִ/פְנֵ֥י יְהוָֽה׃
translation:
  text: and for all the burnt offerings offered to Yahweh on the Sabbaths, at the new moons, and at the appointed feasts, by number according to the ordinance concerning them, continually before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and for all the offering up of burnt offerings to the LORD.' The Hebrew uses an infinitive plus the noun 'burnt offerings' to express the sacrificial act.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְכֹל
  chosen: and for all
  alternatives:
  - and for every
  - and concerning all
  lexicon: HALOT
  rationale: 'The prefixed conjunction and preposition with כֹּל introduce another duty item in the list: ''and for all...''. ''For'' fits the administrative/service context better than a more abstract ''concerning''.'
- source_word: הַעֲלוֹת
  chosen: offered
  alternatives:
  - to offer up
  - the offering up of
  lexicon: HALOT
  rationale: The infinitive construct of עלה with the following עֹלוֹת expresses the act of presenting the burnt offerings. In English, 'the burnt offerings offered' preserves the Hebrew emphasis without becoming too wooden.
- source_word: עֹלוֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: Standard cultic term for offerings wholly consumed on the altar. 'Burnt offerings' is the clearest established English equivalent.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: With sacrificial language, 'to the LORD' naturally conveys presentation to Israel's covenant God. Per doctrine, יהוה is rendered 'the LORD'.
- source_word: לַשַּׁבָּתוֹת
  chosen: on the Sabbaths
  alternatives:
  - for the Sabbaths
  - at the Sabbaths
  lexicon: HALOT
  rationale: The preposition marks the occasions on which these offerings were made. 'On the Sabbaths' is idiomatic and preserves the plural Hebrew.
- source_word: לֶחֳדָשִׁים
  chosen: at the new moons
  alternatives:
  - on the new moons
  - at the monthly observances
  lexicon: HALOT
  rationale: In cultic calendar contexts חֳדָשִׁים refers to new-moon observances rather than merely 'months.' 'At the new moons' communicates the festival timing.
- source_word: וְלַמּוֹעֲדִים
  chosen: and at the appointed feasts
  alternatives:
  - and at the appointed times
  - and at the festivals
  lexicon: HALOT
  rationale: מוֹעֲדִים in this liturgical sequence denotes the set feast occasions. 'Appointed feasts' preserves both the calendrical and sacred sense.
- source_word: בְּמִסְפָּר
  chosen: by number
  alternatives:
  - in number
  - according to number
  lexicon: HALOT
  rationale: This indicates numerical specification of the offerings. 'By number' is concise and idiomatic in coordination with the next phrase.
- source_word: כְּמִשְׁפָּט
  chosen: according to the ordinance
  alternatives:
  - according to the rule
  - according to the prescribed procedure
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to the prescribed legal/customary regulation for these offerings. 'Ordinance' preserves the formal cultic sense.
- source_word: עֲלֵיהֶם
  chosen: concerning them
  alternatives:
  - for them
  - over them
  lexicon: HALOT
  rationale: The prepositional phrase most naturally points to the regulation applying to these offerings/occasions. 'Concerning them' avoids over-specifying the antecedent while remaining clear.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - regularly
  - continually/regularly
  lexicon: HALOT
  rationale: The term denotes ongoing regularity in cultic service. 'Continually' preserves the formal resonance of the Hebrew while still readable.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard covenantal/cultic expression for service performed in God's presence. 'Before the LORD' is both literal and idiomatic.
