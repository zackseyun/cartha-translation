id: 1CH.18.8
reference: 1 Chronicles 18:8
source:
  edition: WLC
  text: וּ/מִ/טִּבְחַ֤ת וּ/מִ/כּוּן֙ עָרֵ֣י הֲדַדְעֶ֔זֶר לָקַ֥ח דָּוִ֛יד נְחֹ֖שֶׁת
    רַבָּ֣ה מְאֹ֑ד בָּ֣/הּ עָשָׂ֣ה שְׁלֹמֹ֗ה אֶת יָ֤ם הַ/נְּחֹ֨שֶׁת֙ וְ/אֶת הָֽ/עַמּוּדִ֔ים
    וְ/אֵ֖ת כְּלֵ֥י הַ/נְּחֹֽשֶׁת׀־־׃פ
translation:
  text: And from Tibhath and from Cun, cities of Hadadezer, David took a very great
    amount of bronze; with it Solomon made the bronze sea, the pillars, and the bronze
    articles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: In the parallel account at 2 Samuel 8:8, the city name appears as 'Tebah.'
    reason: textual_variant
  - marker: b
    text: In the parallel account at 2 Samuel 8:8, this place is called 'Berothai.'
    reason: textual_variant
  - marker: c
    text: Or 'the Sea of bronze'; this refers to the large basin in the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/טִּבְחַת
  chosen: And from Tibhath
  alternatives:
  - And from Tebah
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition are rendered straightforwardly
    as 'And from.' The place name is transliterated from the Chronicles form טִבְחַת
    as 'Tibhath.' Because the parallel in 2 Samuel 8:8 has 'Tebah,' that alternative
    is worth preserving as a textual-variant footnote rather than harmonizing the
    Chronicles reading in the main text.
- source_word: וּ/מִ/כּוּן
  chosen: and from Cun
  alternatives:
  - and from Berothai
  lexicon: HALOT
  rationale: Rendered with simple transliteration of the place name in Chronicles,
    'Cun.' The Samuel parallel reads 'Berothai,' but the MT of Chronicles should stand
    in the main text; the alternative is preserved in a footnote as a textual variant.
- source_word: עָרֵי הֲדַדְעֶזֶר
  chosen: cities of Hadadezer
  alternatives:
  - Hadadezer's cities
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English. 'Cities of Hadadezer'
    preserves the genitival relationship without overinterpreting political nuance.
- source_word: לָקַח דָּוִיד
  chosen: David took
  alternatives:
  - David captured
  - David took away
  lexicon: HALOT
  rationale: לקח commonly means 'take.' In this military-plunder context, 'took' is
    idiomatic and sufficiently broad without adding interpretive force beyond the
    Hebrew.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  - brass
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper or copper-alloy metal. 'Bronze' is the standard
    contextual rendering in temple-furnishing passages and avoids the anachronistic
    'brass' in many English traditions.
- source_word: רַבָּה מְאֹד
  chosen: a very great amount of
  alternatives:
  - very much
  - a great quantity of
  - exceedingly much
  lexicon: HALOT
  rationale: The adjective plus intensifier expresses abundance. 'A very great amount
    of bronze' gives natural English while preserving the emphatic quantity.
- source_word: בָּהּ
  chosen: with it
  alternatives:
  - from it
  - with this bronze
  lexicon: HALOT
  rationale: The feminine singular pronominal suffix most naturally refers back to
    the bronze just mentioned. 'With it' is concise and reflects instrumental use
    in context.
- source_word: עָשָׂה שְׁלֹמֹה
  chosen: Solomon made
  alternatives:
  - Solomon fashioned
  - Solomon used to make
  lexicon: HALOT
  rationale: Simple past narrative is best represented by 'made.' Although the bronze
    was acquired by David and later used by Solomon, the Hebrew states plainly that
    Solomon made these items from it.
- source_word: יָם הַנְּחֹשֶׁת
  chosen: the bronze sea
  alternatives:
  - the Sea of bronze
  - the bronze basin
  lexicon: HALOT
  rationale: This is the established designation for the large temple basin. 'The
    bronze sea' is both literal and recognizable, preserving the metaphorical noun
    'sea' rather than flattening it to 'basin' in the main text.
- source_word: הָעַמּוּדִים
  chosen: the pillars
  alternatives:
  - the columns
  lexicon: HALOT
  rationale: A straightforward rendering of the plural noun for the temple pillars.
    'Pillars' is conventional and clear.
- source_word: כְּלֵי הַנְּחֹשֶׁת
  chosen: the bronze articles
  alternatives:
  - the bronze vessels
  - the bronze utensils
  - the bronze implements
  lexicon: HALOT
  rationale: כְּלִים is a broad term for objects/articles/vessels. 'Articles' preserves
    breadth better than 'vessels,' since the exact range of temple items is not specified
    here.
