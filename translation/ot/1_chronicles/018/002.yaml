id: 1CH.18.2
reference: 1 Chronicles 18:2
source:
  edition: WLC
  text: וַ/יַּ֖ךְ אֶת מוֹאָ֑ב וַ/יִּהְי֤וּ מוֹאָב֙ עֲבָדִ֣ים לְ/דָוִ֔יד נֹשְׂאֵ֖י
    מִנְחָֽה־׃
translation:
  text: And he struck Moab, and the Moabites became slaves to David, bringing tribute.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants to David, bearing gifts.' The Hebrew terms can be rendered
      more generally, but in this conquest context 'slaves' and 'tribute' best reflect
      the sense of subjugation and payment from a vassal people.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - defeated
  - attacked
  - smote
  lexicon: HALOT
  rationale: The verb נכה literally denotes striking/smiting. 'Struck' preserves the
    concrete military action without overinterpreting the extent of the defeat. 'Defeated'
    is possible by implication but is more interpretive than the Hebrew wording.
- source_word: אֶת
  chosen: '[not translated separately]'
  rationale: Direct-object marker with no independent English equivalent.
- source_word: מוֹאָב
  chosen: Moab / the Moabites
  rationale: The first occurrence is rendered 'Moab' as the national entity/object
    of attack. The second occurrence, though formally still 'Moab,' is rendered 'the
    Moabites' in idiomatic English because the predicate 'became slaves' refers to
    the people of the nation.
- source_word: וַיִּהְיוּ
  chosen: became
  alternatives:
  - were
  lexicon: HALOT
  rationale: 'היה with a predicate often carries an ingressive sense in narrative:
    ''became.'' This fits the sequence after David''s military action better than
    the stative ''were.'''
- source_word: עֲבָדִים
  chosen: slaves
  alternatives:
  - servants
  - subjects
  lexicon: HALOT
  rationale: Although עבד can denote servant or slave depending on context, here the
    political subjugation after conquest makes the bonded/subordinate sense salient.
    In line with the translation philosophy, 'slaves' better preserves the force of
    imposed servitude than the softer 'servants.' 'Subjects' is too interpretive and
    political rather than lexical.
- source_word: לְדָוִיד
  chosen: to David
  alternatives:
  - for David
  rationale: The preposition ל marks relation/subordination here; 'to David' is the
    most natural English expression with 'became slaves.'
- source_word: נֹשְׂאֵי
  chosen: bringing
  alternatives:
  - bearing
  - carrying
  lexicon: HALOT
  rationale: The participle from נשׂא literally means 'bearing/carrying,' but in this
    tribute context 'bringing' is the most natural English rendering while preserving
    the sense of presenting something to a superior.
- source_word: מִנְחָה
  chosen: tribute
  alternatives:
  - gift
  - offering
  - present
  lexicon: HALOT
  rationale: In a political-military context, מִנְחָה refers to tribute presented
    by a subordinate nation, not a cultic offering. 'Tribute' best captures the diplomatic
    and imposed nature of the payment.
