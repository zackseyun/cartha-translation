id: 1CH.18.4
reference: 1 Chronicles 18:4
source:
  edition: WLC
  text: וַ/יִּלְכֹּד֩ דָּוִ֨יד מִמֶּ֜/נּוּ אֶ֣לֶף רֶ֗כֶב וְ/שִׁבְעַ֤ת אֲלָפִים֙ פָּֽרָשִׁ֔ים
    וְ/עֶשְׂרִ֥ים אֶ֖לֶף אִ֣ישׁ רַגְלִ֑י וַ/יְעַקֵּ֤ר דָּוִיד֙ אֶת כָּל הָ/רֶ֔כֶב
    וַ/יּוֹתֵ֥ר מִמֶּ֖/נּוּ מֵ֥אָה רָֽכֶב־־׃
translation:
  text: David captured from him 1,000 chariots, 7,000 horsemen, and 20,000 foot soldiers.
    Then David hamstrung all the chariot horses, but left from them enough for 100
    chariots.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'all the chariotry/chariots'; because the verb means to hamstring,
      the phrase is understood metonymically of the horses belonging to the chariot
      force.
    reason: lexical_alternative
  - marker: b
    text: 2 Samuel 8:4 has '1,700 horsemen' rather than '7,000 horsemen.' This is
      a parallel-passage numerical difference in the textual tradition.
    reason: textual_variant
lexical_decisions:
- source_word: וַיִּלְכֹּד
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: The verb לכד commonly denotes capturing or taking in war. 'Captured'
    fits the military context and reads naturally in English.
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - from them
  lexicon: HALOT
  rationale: The suffix is singular, referring back to Hadadezer in the preceding
    context. English keeps the singular referent explicit.
- source_word: אֶלֶף רֶכֶב
  chosen: 1,000 chariots
  alternatives:
  - 1,000 chariot teams
  - 1,000 chariotry
  lexicon: HALOT
  rationale: רכב can denote chariotry collectively, but with a numeral it is most
    naturally rendered as countable 'chariots.'
- source_word: פָּרָשִׁים
  chosen: horsemen
  alternatives:
  - cavalry
  - mounted troops
  lexicon: HALOT
  rationale: The term refers to mounted warriors. 'Horsemen' is a straightforward,
    source-near rendering; 'cavalry' is possible but slightly more interpretive as
    a collective military category.
- source_word: אִישׁ רַגְלִי
  chosen: foot soldiers
  alternatives:
  - infantry
  - footmen
  lexicon: HALOT
  rationale: Literally 'men of foot.' 'Foot soldiers' preserves the concrete military
    sense in readable modern English better than the more technical 'infantry' or
    archaic 'footmen.'
- source_word: וַיְעַקֵּר
  chosen: hamstrung
  alternatives:
  - disabled
  - houghed
  lexicon: HALOT
  rationale: The verb עקר in this context refers to disabling horses by cutting the
    hamstrings, as in similar military contexts. 'Hamstrung' is precise and idiomatic;
    'houghed' is traditional but archaic.
- source_word: אֶת כָּל הָרֶכֶב
  chosen: all the chariot horses
  alternatives:
  - all the chariots
  - all the chariotry
  lexicon: HALOT
  rationale: Although רכב often means 'chariot(s),' the action 'hamstrung' cannot
    apply to vehicles. In this context the term stands metonymically for the horses
    attached to the chariot force. Rendering the implied referent in English avoids
    nonsense while staying faithful to the military sense.
- source_word: וַיּוֹתֵר מִמֶּנּוּ מֵאָה רָכֶב
  chosen: but left from them enough for 100 chariots
  alternatives:
  - but left 100 chariots of them
  - but spared from them 100 chariot teams
  lexicon: HALOT
  rationale: The clause indicates that David did not disable the entire captured chariot
    force, but retained a remnant corresponding to 100 chariots. 'Enough for 100 chariots'
    makes explicit the implied horses/teams after the metonymic use of רכב in the
    previous clause.
