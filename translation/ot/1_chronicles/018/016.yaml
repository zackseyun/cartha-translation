id: 1CH.18.16
reference: 1 Chronicles 18:16
source:
  edition: WLC
  text: וְ/צָד֧וֹק בֶּן אֲחִיט֛וּב וַ/אֲבִימֶ֥לֶךְ בֶּן אֶבְיָתָ֖ר כֹּהֲנִ֑ים וְ/שַׁוְשָׁ֖א
    סוֹפֵֽר־־׃
translation:
  text: Zadok son of Ahitub and Abimelech son of Abiathar were priests, and Shavsha
    was secretary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The parallel in 2 Samuel 8:17 reads 'Ahimelech son of Abiathar' rather than
      'Abimelech son of Abiathar.' The translation follows the Hebrew text of Chronicles
      here.
    reason: textual_variant
lexical_decisions:
- source_word: צָדוֹק
  chosen: Zadok
  rationale: 'Personal name transliterated according to the translation philosophy:
    translate titles, transliterate names.'
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The construct בן most naturally denotes immediate filiation here in an
    administrative list, so 'son of' is preferred over the broader 'descendant of'.
- source_word: אֲחִיטוּב
  chosen: Ahitub
  rationale: Personal name transliterated.
- source_word: אֲבִימֶלֶךְ
  chosen: Abimelech
  rationale: Personal name transliterated. Although the parallel in 2 Samuel 8:17
    has 'Ahimelech,' the Chronicles text here reads 'Abimelech,' so the translation
    follows the given Hebrew text and preserves the variant in a footnote.
- source_word: אֶבְיָתָר
  chosen: Abiathar
  rationale: Personal name transliterated.
- source_word: כֹּהֲנִים
  chosen: priests
  alternatives:
  - chief ministers
  lexicon: HALOT
  rationale: The normal and primary sense of כֹּהֵן is 'priest.' In some royal-administrative
    contexts it can be understood more broadly, but here with Zadok and Abiathar's
    family line the cultic sense 'priests' is clearly intended.
- source_word: שַׁוְשָׁא
  chosen: Shavsha
  alternatives:
  - Shawsha
  rationale: Personal name transliterated from the consonantal form in Chronicles.
    English spelling varies; 'Shavsha' reflects a straightforward transliteration.
- source_word: סוֹפֵר
  chosen: secretary
  alternatives:
  - scribe
  - recorder
  lexicon: HALOT
  rationale: סוֹפֵר in royal administration commonly denotes an official secretary
    or scribe. 'Secretary' communicates the governmental office in clear modern English
    better than the more ambiguous 'scribe.' 'Recorder' is a different office elsewhere
    and is not the word used here.
