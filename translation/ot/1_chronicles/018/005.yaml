id: 1CH.18.5
reference: 1 Chronicles 18:5
source:
  edition: WLC
  text: וַ/יָּבֹא֙ אֲרַ֣ם דַּרְמֶ֔שֶׂק לַ/עְז֕וֹר לַ/הֲדַדְעֶ֖זֶר מֶ֣לֶךְ צוֹבָ֑ה
    וַ/יַּ֤ךְ דָּוִיד֙ בַּ/אֲרָ֔ם עֶשְׂרִֽים וּ/שְׁנַ֥יִם אֶ֖לֶף אִֽישׁ־׃
translation:
  text: And Aram of Damascus came to help Hadadezer king of Zobah, and David struck
    down twenty-two thousand men of Aram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Arameans of Damascus'; traditionally, 'the Syrians of Damascus.'
    reason: lexical_alternative
  - marker: b
    text: The name is spelled 'Hadadezer' here; some parallel passages have the variant
      'Hadarezer.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲרַם דַּרְמֶשֶׂק
  chosen: Aram of Damascus
  alternatives:
  - the Arameans of Damascus
  - Syria of Damascus
  - the Syrians of Damascus
  lexicon: HALOT
  rationale: אֲרַם can denote Aram/Arameans; to avoid importing the later geopolitical
    term 'Syria' and to preserve the Hebrew ethnogeographic sense, 'Aram' is retained
    as a proper regional name, qualified by 'of Damascus.'
- source_word: לַעְזוֹר
  chosen: to help
  alternatives:
  - to assist
  - to support
  lexicon: HALOT
  rationale: The infinitive of עזר straightforwardly means 'to help/assist.' 'Help'
    is the most natural modern English rendering and fits the military context.
- source_word: הֲדַדְעֶזֶר
  chosen: Hadadezer
  alternatives:
  - Hadarezer
  lexicon: HALOT
  rationale: The Chronicles form here is הֲדַדְעֶזֶר, best transliterated 'Hadadezer.'
    The alternative spelling 'Hadarezer' reflects variation in parallel passages,
    not this verse's consonantal form.
- source_word: מֶלֶךְ צוֹבָה
  chosen: king of Zobah
  lexicon: HALOT
  rationale: A direct genitival rendering preserves the royal title and place name
    without expansion.
- source_word: וַיַּךְ
  chosen: struck down
  alternatives:
  - defeated
  - killed
  lexicon: HALOT
  rationale: נכה in battle contexts can mean strike, smite, defeat, or kill. Because
    the verse immediately gives a casualty number, 'struck down' best preserves the
    military violence without over-specifying beyond the Hebrew.
- source_word: בַּאֲרָם
  chosen: of Aram
  alternatives:
  - among the Arameans
  - the Arameans
  lexicon: HALOT
  rationale: The preposition with the ethnogeographic noun is idiomatically rendered
    in English as 'of Aram' after 'twenty-two thousand men,' yielding a natural expression
    while preserving the referent.
- source_word: עֶשְׂרִים וּשְׁנַיִם אֶלֶף אִישׁ
  chosen: twenty-two thousand men
  alternatives:
  - twenty-two thousand troops
  - twenty-two thousand men of war
  lexicon: HALOT
  rationale: The Hebrew literally reads 'twenty and two thousand man/men.' 'Twenty-two
    thousand men' is the standard, accurate English equivalent; adding 'troops' or
    'men of war' would go beyond the wording.
