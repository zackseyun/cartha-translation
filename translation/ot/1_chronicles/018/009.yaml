id: 1CH.18.9
reference: 1 Chronicles 18:9
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֕ע תֹּ֖עוּ מֶ֣לֶךְ חֲמָ֑ת כִּ֚י הִכָּ֣ה דָוִ֔יד אֶת כָּל חֵ֖יל
    הֲדַדְעֶ֥זֶר מֶֽלֶךְ צוֹבָֽה־־־׃
translation:
  text: When Tou king of Hamath heard that David had struck down all the army of Hadadezer
    king of Zobah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Tou'; the parallel account in 2 Samuel 8:9 has 'Toi.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: When ... heard
  alternatives:
  - And ... heard
  - Now ... heard
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering it as 'When ...
    heard' captures the temporal sense naturally in English and fits the clause's
    function as setup for the following action in the next verse.
- source_word: תֹּעוּ
  chosen: Tou
  alternatives:
  - Toi
  lexicon: HALOT
  rationale: This is a personal name and should be transliterated rather than translated.
    'Tou' follows the Hebrew form in Chronicles; 'Toi' is the parallel form in Samuel
    and is worth preserving as an alternative.
- source_word: מֶלֶךְ חֲמָת
  chosen: king of Hamath
  lexicon: HALOT
  rationale: A straightforward construct chain identifying Tou's royal office and
    realm.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what Tou heard, so 'that' is the
    most natural English rendering.
- source_word: הִכָּה
  chosen: had struck down
  alternatives:
  - had defeated
  - had attacked
  lexicon: HALOT
  rationale: The verb נכה commonly means 'strike' or 'smite,' and in military context
    often implies defeat or killing. 'Struck down' preserves the force of the Hebrew
    while remaining idiomatic.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: The quantifier is explicit and should be retained.
- source_word: חֵיל
  chosen: army
  alternatives:
  - force
  - host
  lexicon: HALOT
  rationale: In this military context חֵיל refers to armed forces rather than abstract
    strength or wealth. 'Army' is the clearest modern English equivalent.
- source_word: הֲדַדְעֶזֶר
  chosen: Hadadezer
  alternatives:
  - Hadarezer
  lexicon: HALOT
  rationale: Personal name transliterated from the Chronicles form. An alternate spelling
    appears in some traditions and parallel passages.
- source_word: מֶלֶךְ צוֹבָה
  chosen: king of Zobah
  lexicon: HALOT
  rationale: A straightforward title plus place name; 'Zobah' is the standard English
    transliteration.
