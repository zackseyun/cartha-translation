id: 1CH.18.15
reference: 1 Chronicles 18:15
source:
  edition: WLC
  text: וְ/יוֹאָ֥ב בֶּן צְרוּיָ֖ה עַל הַ/צָּבָ֑א וִ/יהוֹשָׁפָ֥ט בֶּן אֲחִיל֖וּד מַזְכִּֽיר־־־׃
translation:
  text: And Joab son of Zeruiah was over the army, and Jehoshaphat son of Ahilud was
    recorder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'secretary' or 'chronicler'; the Hebrew term denotes a royal official
      responsible for keeping records and reporting matters to the king.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יוֹאָב
  chosen: And Joab
  alternatives:
  - Now Joab
  - Joab
  lexicon: HALOT
  rationale: The conjunction וְ is rendered with simple connective 'And' to preserve
    the list-like administrative notice. The personal name יוֹאָב is transliterated
    as 'Joab' per the policy to transliterate names.
- source_word: בֶּן צְרוּיָה
  chosen: son of Zeruiah
  alternatives:
  - the son of Zeruiah
  lexicon: HALOT
  rationale: A standard genealogical construction. 'Son of Zeruiah' is retained formally
    and naturally in English; the article is unnecessary in English.
- source_word: עַל הַצָּבָא
  chosen: was over the army
  alternatives:
  - was commander of the army
  - was over the host
  lexicon: HALOT
  rationale: The preposition עַל with an office holder indicates authority over a
    sphere. 'Was over the army' closely reflects the Hebrew while remaining idiomatic.
    'Commander of the army' is a valid interpretive gloss, but the more transparent
    rendering better preserves the source structure.
- source_word: וִ/יהוֹשָׁפָט
  chosen: and Jehoshaphat
  alternatives:
  - Now Jehoshaphat
  - Jehoshaphat
  lexicon: HALOT
  rationale: The conjunction is again rendered 'and' to continue the court-official
    list. The name is transliterated.
- source_word: בֶּן אֲחִילוּד
  chosen: son of Ahilud
  alternatives:
  - the son of Ahilud
  lexicon: HALOT
  rationale: Standard filial identification, rendered straightforwardly.
- source_word: מַזְכִּיר
  chosen: recorder
  alternatives:
  - chronicler
  - remembrancer
  - secretary
  lexicon: HALOT
  rationale: The participial/noun form from זכר in royal-administrative context denotes
    an official who records and keeps state matters before the king. 'Recorder' is
    the conventional and suitably precise English equivalent without over-specifying
    modern bureaucratic functions. 'Secretary' is possible but may suggest a narrower
    or more modern office.
