id: 1CH.18.12
reference: 1 Chronicles 18:12
source:
  edition: WLC
  text: וְ/אַבְשַׁ֣י בֶּן צְרוּיָ֗ה הִכָּ֤ה אֶת אֱדוֹם֙ בְּ/גֵ֣יא הַמֶּ֔לַח שְׁמוֹנָ֥ה
    עָשָׂ֖ר אָֽלֶף־־׃
translation:
  text: And Abishai son of Zeruiah struck down eighteen thousand Edomites in the Valley
    of Salt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Edom''; the translation makes explicit that the reference is
      to the people of Edom (Edomites) in this battle context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַבְשַׁי
  chosen: And Abishai
  alternatives:
  - Now Abishai
  - Abishai
  lexicon: HALOT
  rationale: The conjunction ו is carried as 'And' to preserve the narrative linkage.
    The personal name is transliterated per translation philosophy.
- source_word: בֶּן צְרוּיָה
  chosen: son of Zeruiah
  alternatives:
  - the son of Zeruiah
  lexicon: HALOT
  rationale: A straightforward filial designation. English omits the article for natural
    style while preserving the genealogical identification.
- source_word: הִכָּה
  chosen: struck down
  alternatives:
  - defeated
  - killed
  - struck
  lexicon: HALOT
  rationale: נכה commonly means 'strike, smite.' In a military context with a numbered
    total, 'struck down' preserves the force of the verb without over-specifying whether
    the action was personally killing each one or leading a defeat. 'Defeated' is
    possible but weaker; 'killed' may be too specific from the verb alone.
- source_word: אֶת אֱדוֹם
  chosen: eighteen thousand Edomites
  alternatives:
  - Edom
  - the Edomites
  lexicon: HALOT
  rationale: Although the text has the place/people name 'Edom,' in English after
    a battle verb plus a casualty number, the sense is the people of Edom rather than
    the territory. Rendering as 'Edomites' makes the implied object explicit and natural
    in English.
- source_word: בְּ/גֵיא הַמֶּלַח
  chosen: in the Valley of Salt
  alternatives:
  - in the Salt Valley
  lexicon: HALOT
  rationale: גיא is 'valley,' and the construct phrase is best rendered as the place
    name 'the Valley of Salt.' This preserves the likely toponym while remaining readable.
- source_word: שְׁמוֹנָה עָשָׂר אָלֶף
  chosen: eighteen thousand
  alternatives:
  - 18,000
  lexicon: HALOT
  rationale: The cardinal number is rendered in words in keeping with literary Bible
    style. It modifies the implied people struck down.
