theological_decisions:
- issue: Identification of the object 'Edom' as people or territory
  chosen_reading: people of Edom ('Edomites')
  alternative_readings:
  - territory of Edom
  rationale: The military verb plus a casualty figure strongly indicates persons rather
    than land. This is a lexical-contextual decision, not a doctrinal one, but it
    affects how the event is understood in translation.
