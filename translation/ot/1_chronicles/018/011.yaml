id: 1CH.18.11
reference: 1 Chronicles 18:11
source:
  edition: WLC
  text: גַּם אֹתָ֗/ם הִקְדִּ֞ישׁ הַ/מֶּ֤לֶךְ דָּוִיד֙ לַ/יהוָ֔ה עִם הַ/כֶּ֨סֶף֙ וְ/הַ/זָּהָ֔ב אֲשֶׁ֥ר נָשָׂ֖א מִ/כָּל הַ/גּוֹיִ֑ם מֵֽ/אֱד֤וֹם וּ/מִ/מּוֹאָב֙ וּ/מִ/בְּנֵ֣י עַמּ֔וֹן וּ/מִ/פְּלִשְׁתִּ֖ים וּ/מֵֽ/עֲמָלֵֽק־־־׃
translation:
  text: 'King David also dedicated these to Yahweh, along with the silver and the gold that he had taken from all the nations: from Edom, Moab, the Ammonites, the Philistines, and Amalek.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'them'; the pronoun refers to the bronze articles mentioned in the previous verse.
    reason: cross_reference
  - marker: b
    text: Or 'taken' or 'borne away'; the Hebrew verb can mean 'lifted/carried,' here in the sense of taking spoil or tribute from conquered nations.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the sons of Ammon,' that is, the Ammonites.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: also
  alternatives:
  - indeed
  - even
  lexicon: HALOT
  rationale: 'Adds the sense of continuation from the previous verse: these items too were dedicated.'
- source_word: אֹתָם
  chosen: these
  alternatives:
  - them
  lexicon: HALOT
  rationale: The pronoun refers back to the bronze objects from the previous verse; 'these' makes the anaphoric reference clearer in English than bare 'them'.
- source_word: הִקְדִּישׁ
  chosen: dedicated
  alternatives:
  - consecrated
  - set apart as holy
  lexicon: HALOT
  rationale: In temple/offerings context, 'dedicated' is natural modern English and preserves the sense of setting something apart for the LORD.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Follows the project default rendering of YHWH as 'the LORD.' 'To the LORD' fits the dedicatory action.
- source_word: עִם
  chosen: along with
  alternatives:
  - with
  lexicon: HALOT
  rationale: Signals that the previously mentioned objects were dedicated together with the silver and gold already gathered.
- source_word: הַכֶּסֶף וְהַזָּהָב
  chosen: the silver and the gold
  alternatives:
  - silver and gold
  lexicon: HALOT
  rationale: The articles are present in Hebrew; retaining them gives a slightly more formal inventory sense appropriate to tribute/spoil.
- source_word: אֲשֶׁר נָשָׂא
  chosen: that he had carried off
  alternatives:
  - that he had taken
  - that he had borne away
  lexicon: HALOT
  rationale: נשא here refers to taking away as spoil/tribute from conquered nations. 'Carried off' communicates removal from defeated peoples without over-paraphrasing.
- source_word: מִכָּל הַגּוֹיִם
  chosen: from all the nations
  alternatives:
  - from all the peoples
  lexicon: HALOT
  rationale: גוים in this military-political context is best rendered 'nations,' referring to surrounding foreign peoples.
- source_word: מֵאֱדוֹם וּמִמּוֹאָב וּמִבְּנֵי עַמּוֹן וּמִפְּלִשְׁתִּים וּמֵעֲמָלֵק
  chosen: from Edom, Moab, the Ammonites, the Philistines, and Amalek
  alternatives:
  - from Edom, Moab, the sons of Ammon, the Philistines, and Amalek
  lexicon: HALOT
  rationale: Uses standard English ethnonyms. 'The Ammonites' is idiomatic for בני עמון while preserving the referent. Personal/geographical names are transliterated by standard conventions.
