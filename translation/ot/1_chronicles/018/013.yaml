theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering of עֲבָדִים in a conquest context
  chosen_reading: slaves
  alternative_readings:
  - servants
  - subjects
  rationale: The translation philosophy prefers renderings that preserve bonded subjection
    where context makes it salient. Here the verse describes national subjugation
    after military conquest, so 'slaves' better communicates the force of the Hebrew
    than 'servants.'
