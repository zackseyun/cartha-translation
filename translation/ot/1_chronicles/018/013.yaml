id: 1CH.18.13
reference: 1 Chronicles 18:13
source:
  edition: WLC
  text: וַ/יָּ֤שֶׂם בֶּֽ/אֱדוֹם֙ נְצִיבִ֔ים וַ/יִּהְי֥וּ כָל אֱד֖וֹם עֲבָדִ֣ים לְ/דָוִ֑יד
    וַ/יּ֤וֹשַׁע יְהוָה֙ אֶת דָּוִ֔יד בְּ/כֹ֖ל אֲשֶׁ֥ר הָלָֽךְ־־׃
translation:
  text: He placed garrisons in Edom, and all Edom became slaves to David. And the
    LORD gave David victory wherever he went.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants to David.' The Hebrew term can denote those in service or subjection,
      but here the conquest setting makes the stronger sense of bondage more likely.
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD saved David' or 'the LORD delivered David.' The Hebrew verb
      can be rendered more literally as 'saved,' with 'gave victory' bringing out
      the military sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: He placed
  alternatives:
  - he set
  - he stationed
  lexicon: HALOT
  rationale: The verb שׂוּם commonly means 'set, place.' 'Placed' is natural English
    and fits the military object that follows.
- source_word: בֶּאֱדוֹם
  chosen: in Edom
  alternatives:
  - throughout Edom
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In Edom' is the straightforward locative
    rendering.
- source_word: נְצִיבִים
  chosen: garrisons
  alternatives:
  - governors
  - prefects
  - military posts
  lexicon: HALOT
  rationale: In this conquest context, נְצִיבִים refers to stationed officials or
    troops asserting control; 'garrisons' best captures the military-administrative
    sense in idiomatic English.
- source_word: וַיִּהְיוּ כָל אֱדוֹם
  chosen: and all Edom became
  alternatives:
  - and all the Edomites became
  lexicon: HALOT
  rationale: The place name stands metonymically for its people. 'All Edom became'
    preserves the Hebrew compactness while remaining clear in English.
- source_word: עֲבָדִים
  chosen: slaves
  alternatives:
  - servants
  - subjects
  lexicon: HALOT
  rationale: עֲבָדִים denotes bonded subjection. In a conquest setting the dependent,
    subjugated sense is salient, so 'slaves' better reflects the force of the term
    than the softer 'servants.'
- source_word: לְדָוִיד
  chosen: to David
  alternatives:
  - under David
  lexicon: HALOT
  rationale: The preposition ל marks relation or subordination here; 'to David' is
    the most direct rendering after 'became slaves.'
- source_word: וַיּוֹשַׁע
  chosen: gave ... victory
  alternatives:
  - saved
  - delivered
  lexicon: HALOT
  rationale: From יָשַׁע, the verb can mean save/deliver. In a military narrative,
    'gave victory' expresses the concrete sense of divine deliverance in battle and
    matches common English usage without over-paraphrasing.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: בְּכֹל אֲשֶׁר הָלָךְ
  chosen: wherever he went
  alternatives:
  - in all that he went
  - in every place he went
  lexicon: HALOT
  rationale: This idiom expresses comprehensive scope over David's campaigns or movements.
    'Wherever he went' is idiomatic modern English and preserves the sense.
