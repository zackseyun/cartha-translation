id: 1CH.18.6
reference: 1 Chronicles 18:6
source:
  edition: WLC
  text: וַ/יָּ֤שֶׂם דָּוִיד֙ בַּ/אֲרַ֣ם דַּרְמֶ֔שֶׂק וַ/יְהִ֤י אֲרָם֙ לְ/דָוִ֔יד עֲבָדִ֖ים נֹשְׂאֵ֣י מִנְחָ֑ה וַ/יּ֤וֹשַׁע יְהוָה֙ לְ/דָוִ֔יד בְּ/כֹ֖ל אֲשֶׁ֥ר הָלָֽךְ׃
translation:
  text: And David placed garrisons in Aram of Damascus, and the Arameans became David’s servants, bringing tribute. And Yahweh gave victory to David wherever he went.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stationed forces' or more literally 'put' in Aram of Damascus; the Hebrew verb itself is simply 'placed,' with 'garrisons' understood from the military context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Aram'; traditionally 'Syria' or 'the Syrians.'
    reason: alternative_reading
  - marker: c
    text: Or 'delivered David' or 'saved David'; in this battle context, 'gave victory' expresses the sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: placed garrisons
  alternatives:
  - stationed forces
  - put
  lexicon: HALOT
  rationale: The verb שׂוּם literally means 'put/place,' but in this military context with a location ('in Aram of Damascus') the implied object is military posts or garrisons, as in the parallel account. 'Placed garrisons' makes the contextual sense explicit without undue paraphrase.
- source_word: בַּאֲרָם דַּרְמֶשֶׂק
  chosen: in Aram of Damascus
  alternatives:
  - in Damascus
  - among the Arameans of Damascus
  lexicon: HALOT
  rationale: The Hebrew names the region/people Aram together with Damascus. 'Aram of Damascus' preserves the Hebrew designation more closely than simply 'Damascus,' while remaining intelligible in English.
- source_word: אֲרָם
  chosen: the Arameans
  alternatives:
  - Aram
  - the Syrians
  lexicon: HALOT
  rationale: Here the term refers to the people who became subject to David. 'The Arameans' is preferable to the traditional 'Syrians' because it reflects the Hebrew ethnonym directly.
- source_word: עֲבָדִים
  chosen: servants
  alternatives:
  - slaves
  - subjects
  lexicon: HALOT
  rationale: Although עֶבֶד can denote slave or servant, in this political context of subjugated peoples rendering tribute, 'servants' communicates vassal status without over-specifying chattel slavery. 'Subjects' is interpretive; 'servants' stays closer to the lexical form.
- source_word: נֹשְׂאֵי מִנְחָה
  chosen: bringing tribute
  alternatives:
  - bearing tribute
  - carrying gifts
  lexicon: HALOT
  rationale: The participle plus מִנְחָה describes the ongoing act of presenting tribute to a superior ruler. 'Bringing tribute' is natural modern English and fits the political setting better than the more ambiguous 'gifts.'
- source_word: וַיּוֹשַׁע
  chosen: gave victory
  alternatives:
  - saved
  - delivered
  lexicon: HALOT
  rationale: The hiphil of יָשַׁע means 'save/deliver,' but in battle narrative the idiomatic sense is that the LORD granted military success. 'Gave victory' conveys the contextual force clearly.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּכֹל אֲשֶׁר הָלָךְ
  chosen: wherever he went
  alternatives:
  - in all that he went
  - wherever he marched
  lexicon: HALOT
  rationale: This idiom expresses the totality of David's campaigns or movements. 'Wherever he went' is the most natural English rendering and preserves the broad scope without narrowing it only to marching.
