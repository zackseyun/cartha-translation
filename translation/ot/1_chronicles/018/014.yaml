id: 1CH.18.14
reference: 1 Chronicles 18:14
source:
  edition: WLC
  text: וַ/יִּמְלֹ֥ךְ דָּוִ֖יד עַל כָּל יִשְׂרָאֵ֑ל וַ/יְהִ֗י עֹשֶׂ֛ה מִשְׁפָּ֥ט וּ/צְדָקָ֖ה
    לְ/כָל עַמּֽ/וֹ־־־׃
translation:
  text: So David reigned over all Israel, and he administered justice and righteousness
    for all his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'judgment and righteousness.' The Hebrew pair combines legal justice
      with moral rightness in describing David's rule.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - ruled as king
  lexicon: HALOT
  rationale: From מלך in the Qal wayyiqtol, denoting royal rule. 'Reigned' is the
    most natural English rendering in a historical narrative about a king's established
    rule.
- source_word: עַל כָּל יִשְׂרָאֵל
  chosen: over all Israel
  alternatives:
  - over the whole of Israel
  lexicon: HALOT
  rationale: עַל with מלך regularly marks the realm ruled. 'All Israel' preserves
    the scope of David's kingship without unnecessary expansion.
- source_word: וַיְהִי עֹשֶׂה
  chosen: and he administered
  alternatives:
  - and he was doing
  - and he acted to establish
  lexicon: HALOT
  rationale: The construction היה + participle expresses ongoing customary action.
    A wooden 'was doing' is awkward in English; 'administered' captures the durative
    sense in governmental context while remaining close to the source.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: In royal-administrative context, מִשְׁפָּט refers to the exercise of
    just legal order. 'Justice' is clearer and more idiomatic than 'judgment' here.
- source_word: וּצְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: צְדָקָה often denotes righteousness/right order. Paired with מִשְׁפָּט,
    the traditional and semantically rich combination 'justice and righteousness'
    best preserves the Hebrew distinction. Although overlap exists, rendering both
    as 'justice' would flatten the pair.
- source_word: לְכָל עַמּוֹ
  chosen: for all his people
  alternatives:
  - for all his nation
  - for all the people
  lexicon: HALOT
  rationale: ל here is best taken as marking the beneficiaries of David's just rule.
    'His people' reflects the 3ms suffix and keeps the covenantal-political sense
    of עַם in context.
