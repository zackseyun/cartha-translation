theological_decisions:
- issue: Rendering the royal ethical pair מִשְׁפָּט וּצְדָקָה
  chosen_reading: justice and righteousness
  alternative_readings:
  - justice and equity
  - judgment and righteousness
  rationale: The verse describes David's ideal kingship in terms of both juridical
    justice and moral rectitude. Preserving both terms maintains the theological richness
    of righteous rule without collapsing them into a single concept.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
