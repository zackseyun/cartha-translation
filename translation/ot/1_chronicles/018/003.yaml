id: 1CH.18.3
reference: 1 Chronicles 18:3
source:
  edition: WLC
  text: וַ/יַּ֥ךְ דָּוִ֛יד אֶת הֲדַדְעֶ֥זֶר מֶֽלֶךְ צוֹבָ֖ה חֲמָ֑תָ/ה בְּ/לֶכְתּ֕/וֹ
    לְ/הַצִּ֥יב יָד֖/וֹ בִּֽ/נְהַר פְּרָֽת־־־׃
translation:
  text: David struck Hadadezer king of Zobah, toward Hamath, when he went to establish
    his power at the Euphrates River.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to restore his control' or more literally 'to set up his hand' at the
      Euphrates River.
    reason: lexical_alternative
  - marker: b
    text: The name is spelled 'Hadadezer' here; the parallel in 2 Samuel 8:3 has the
      variant form often rendered 'Hadarezer.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - defeated
  - attacked
  lexicon: HALOT
  rationale: The verb נכה literally denotes striking/smiting. 'Struck' preserves the
    concrete military action without overinterpreting the outcome as total defeat.
- source_word: הֲדַדְעֶזֶר
  chosen: Hadadezer
  alternatives:
  - Hadarezer
  rationale: Personal names are transliterated. The Chronicles spelling supports 'Hadadezer';
    the Samuel parallel has a variant form reflected in some English traditions as
    'Hadarezer'.
- source_word: מֶלֶךְ צוֹבָה
  chosen: king of Zobah
  rationale: A straightforward construct chain identifying Hadadezer's royal office
    and realm.
- source_word: חֲמָתָה
  chosen: toward Hamath
  alternatives:
  - at Hamath
  - to Hamath
  lexicon: HALOT
  rationale: The directional he on the place name commonly indicates motion toward
    a place. 'Toward Hamath' preserves the directional nuance while fitting the syntax
    of the campaign notice.
- source_word: בְּלֶכְתּוֹ
  chosen: when he went
  alternatives:
  - as he was going
  - in his going
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks a temporal circumstance.
    'When he went' is idiomatic and sufficiently close to the Hebrew.
- source_word: לְהַצִּיב יָדוֹ
  chosen: to establish his power
  alternatives:
  - to set up his hand
  - to restore his control
  - to station his monument
  lexicon: HALOT
  rationale: The idiom 'set/establish the hand' in a military-political context refers
    to asserting or reestablishing dominion/control. 'Establish his power' communicates
    the idiomatic sense in natural English without wooden literalism.
- source_word: בִּנְהַר פְּרָת
  chosen: at the Euphrates River
  alternatives:
  - by the river Euphrates
  - at the river Euphrates
  lexicon: HALOT
  rationale: פְּרָת is the Euphrates; rendering נָהָר explicitly as 'River' avoids
    ambiguity for modern readers. 'At' fits the territorial sense of the campaign
    destination.
