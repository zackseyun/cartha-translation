id: 1CH.18.1
reference: 1 Chronicles 18:1
source:
  edition: WLC
  text: וַ/יְהִי֙ אַחֲרֵי כֵ֔ן וַ/יַּ֥ךְ דָּוִ֛יד אֶת פְּלִשְׁתִּ֖ים וַ/יַּכְנִיעֵ֑/ם
    וַ/יִּקַּ֛ח אֶת גַּ֥ת וּ/בְנֹתֶ֖י/הָ מִ/יַּ֥ד פְּלִשְׁתִּֽים־־־׃
translation:
  text: After this, David struck the Philistines and subdued them, and he took Gath
    and its surrounding towns from the hand of the Philistines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'its daughters,' an idiom referring to the smaller towns or villages
      dependent on Gath.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי אַחֲרֵי כֵן
  chosen: After this
  alternatives:
  - Afterward
  - And it happened after this
  lexicon: HALOT
  rationale: Narrative transition formula. 'After this' is natural modern English
    and preserves the temporal sequence without woodenly reproducing the Hebrew idiom
    'and it happened.'
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - defeated
  - attacked
  lexicon: HALOT
  rationale: נכה commonly means 'strike/smite' in military contexts. 'Struck' preserves
    the concrete verbal force better than the more interpretive 'defeated,' while
    the following verb supplies the result.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard ethnic/geopolitical rendering for the people group.
- source_word: וַיַּכְנִיעֵם
  chosen: subdued them
  alternatives:
  - humbled them
  - brought them into subjection
  lexicon: HALOT
  rationale: כנע in the Hiphil conveys causing submission or subjugation. 'Subdued
    them' is concise, idiomatic, and preserves the military-political sense.
- source_word: וַיִּקַּח
  chosen: he took
  alternatives:
  - captured
  - seized
  lexicon: HALOT
  rationale: לקח is broadly 'take.' Here it refers to taking control of territory.
    'He took' stays close to the source while remaining clear in context.
- source_word: גַּת
  chosen: Gath
  lexicon: HALOT
  rationale: Standard transliteration of the Philistine city name.
- source_word: וּבְנֹתֶיהָ
  chosen: its surrounding towns
  alternatives:
  - its daughter towns
  - its villages
  - its dependent towns
  lexicon: HALOT
  rationale: Literally 'its daughters,' an idiom for satellite settlements dependent
    on a main city. 'Its surrounding towns' communicates the sense in clear modern
    English; the more literal idiom is preserved in a footnote.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from
  - out of the power of
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'from the hand of,' expressing control
    or possession. Retaining it in the main text is understandable in English and
    preserves the source imagery.
