id: 1CH.18.10
reference: 1 Chronicles 18:10
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח אֶת הֲדֽוֹרָם בְּנ֣/וֹ אֶל הַ/מֶּֽלֶךְ דָּ֠וִיד ל/שאול ל֨/וֹ
    לְ/שָׁל֜וֹם וּֽ/לְ/בָרֲכ֗/וֹ עַל֩ אֲשֶׁ֨ר נִלְחַ֤ם בַּ/הֲדַדְעֶ֨זֶר֙ וַ/יַּכֵּ֔/הוּ
    כִּי אִ֛ישׁ מִלְחֲמ֥וֹת תֹּ֖עוּ הָיָ֣ה הֲדַדְעָ֑זֶר וְ/כֹ֗ל כְּלֵ֛י זָהָ֥ב וָ/כֶ֖סֶף
    וּ/נְחֹֽשֶׁת־־־־־־׃
translation:
  text: So he sent Hadoram his son to King David to ask about his welfare and to bless
    him because he had fought against Hadadezer and struck him down, for Hadadezer
    had been at war with Tou; and he sent all kinds of articles of gold and silver
    and bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to inquire of him concerning peace.' The Hebrew idiom uses 'peace' in
      the sense of well-being or welfare.
    reason: lexical_alternative
  - marker: b
    text: Or 'and to congratulate him.' The verb literally means 'to bless him,' here
      in a diplomatic setting after victory.
    reason: lexical_alternative
  - marker: c
    text: Literally 'for Hadadezer was a man of wars with Tou,' an idiom meaning that
      Hadadezer had been at war with Tou.
    reason: lexical_alternative
  - marker: d
    text: The Hebrew text ends with 'and all the articles of gold and silver and bronze';
      English supplies 'he sent' from the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: So he sent
  alternatives:
  - And he sent
  lexicon: HALOT
  rationale: Wayyiqtol narrative form of שׁלח introduces the next event in sequence.
    'So' gives natural English narrative flow while preserving the consecutive sense.
- source_word: הֲדוֹרָם בְּנוֹ
  chosen: Hadoram his son
  alternatives:
  - Hadoram, his son
  lexicon: HALOT
  rationale: Proper name is transliterated per philosophy; appositional 'his son'
    is retained explicitly.
- source_word: לִשְׁאוֹל לוֹ לְשָׁלוֹם
  chosen: to ask about his welfare
  alternatives:
  - to inquire of him concerning peace
  - to greet him
  lexicon: HALOT
  rationale: The idiom literally means 'to ask him for peace/well-being.' In context
    it denotes an inquiry after David's well-being. 'Welfare' preserves the sense
    of שָׁלוֹם as well-being rather than merely absence of conflict.
- source_word: וּלְבָרֲכוֹ
  chosen: and to bless him
  alternatives:
  - and to congratulate him
  - and to greet him with blessing
  lexicon: HALOT
  rationale: ברך normally means 'bless.' In this diplomatic context it can overlap
    with congratulation, but 'bless' stays closer to the Hebrew while remaining intelligible.
- source_word: עַל אֲשֶׁר נִלְחַם בַּהֲדַדְעֶזֶר וַיַּכֵּהוּ
  chosen: because he had fought against Hadadezer and struck him down
  alternatives:
  - because he had fought with Hadadezer and defeated him
  lexicon: HALOT
  rationale: The clause explains the reason for the embassy. 'Against' makes the adversarial
    force clear in English. נכה is rendered 'struck him down' as a close but readable
    equivalent, indicating military defeat without over-specifying death.
- source_word: כִּי אִישׁ מִלְחֲמוֹת תֹּעוּ הָיָה הֲדַדְעָזֶר
  chosen: for Hadadezer had been at war with Tou
  alternatives:
  - for Hadadezer was a man of wars with Tou
  - for Hadadezer was Tou's enemy in war
  lexicon: HALOT
  rationale: The Hebrew idiom 'man of wars' is not natural in English here. The sense
    is that Hadadezer and Tou were engaged in warfare. 'Had been at war with Tou'
    communicates the relationship clearly.
- source_word: וְכֹל כְּלֵי זָהָב וָכֶסֶף וּנְחֹשֶׁת
  chosen: and he sent all kinds of articles of gold and silver and bronze
  alternatives:
  - and all the vessels of gold and silver and bronze
  - with every kind of object of gold and silver and bronze
  lexicon: HALOT
  rationale: The Hebrew as given is verbless after the conjunction, but context implies
    that these items accompanied the embassy. 'Articles' is a natural rendering of
    כְּלֵי. 'Bronze' is preferred over 'brass' for נְחֹשֶׁת in ancient-metal contexts.
