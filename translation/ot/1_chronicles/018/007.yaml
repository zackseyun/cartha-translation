id: 1CH.18.7
reference: 1 Chronicles 18:7
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח דָּוִ֗יד אֵ֚ת שִׁלְטֵ֣י הַ/זָּהָ֔ב אֲשֶׁ֣ר הָי֔וּ עַ֖ל עַבְדֵ֣י
    הֲדַדְעָ֑זֶר וַ/יְבִיאֵ֖/ם יְרוּשָׁלִָֽם׃
translation:
  text: And David took the shields of gold that were on the servants of Hadadezer
    and brought them to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'golden shields'; the Hebrew may refer to shields overlaid with gold.
    reason: lexical_alternative
  - marker: b
    text: '''Servants'' here likely means Hadadezer''s royal retainers or military
      attendants, not necessarily household slaves in the narrow modern sense.'
    reason: cultural_note
  - marker: c
    text: Some textual traditions and the parallel in 2 Samuel spell the name 'Hadarezer.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - captured
  - seized
  lexicon: HALOT
  rationale: The verb לקח in narrative commonly means 'take.' In this military context
    'captured' is possible, but 'took' is the plain lexical sense and leaves the narrative
    implication to context.
- source_word: שִׁלְטֵי הַזָּהָב
  chosen: the shields of gold
  alternatives:
  - the golden shields
  - the gold bucklers
  lexicon: HALOT
  rationale: שׁלטים refers to shields, often smaller shields or bucklers in military
    contexts. 'Shields of gold' is clear, natural English and stays close to the construct
    phrase. 'Golden shields' is also possible, but the Hebrew explicitly uses 'shields
    of the gold/of gold.'
- source_word: אֲשֶׁר הָיוּ עַל
  chosen: that were on
  alternatives:
  - that belonged to
  - that were carried by
  lexicon: HALOT
  rationale: The relative clause with על is most literally 'that were on.' In context
    this likely means worn or carried by the men, but the more direct rendering preserves
    the Hebrew imagery without over-interpreting.
- source_word: עַבְדֵי הֲדַדְעָזֶר
  chosen: the servants of Hadadezer
  alternatives:
  - the officers of Hadadezer
  - the men of Hadadezer
  lexicon: HALOT
  rationale: עבדים is the standard word for 'servants.' In a royal-military setting
    it can denote retainers or officials, but 'servants' is the most transparent rendering
    and does not import a narrower rank unless context requires it.
- source_word: הֲדַדְעָזֶר
  chosen: Hadadezer
  alternatives:
  - Hadarezer
  rationale: The Masoretic form here is Hadadezer. A variant spelling 'Hadarezer'
    appears elsewhere in the textual tradition and parallel accounts, but this verse's
    Hebrew supports 'Hadadezer' in the main text.
- source_word: וַיְבִיאֵם יְרוּשָׁלִָם
  chosen: and brought them to Jerusalem
  alternatives:
  - and carried them to Jerusalem
  lexicon: HALOT
  rationale: בוא in the Hiphil means 'bring.' 'Brought them to Jerusalem' is idiomatic
    and accurate, with the pronominal suffix represented by 'them.'
