id: 1CH.18.17
reference: 1 Chronicles 18:17
source:
  edition: WLC
  text: וּ/בְנָיָ֨הוּ֙ בֶּן יְה֣וֹיָדָ֔ע עַל הַ/כְּרֵתִ֖י וְ/הַ/פְּלֵתִ֑י וּ/בְנֵי
    דָוִ֥יד הָ/רִאשֹׁנִ֖ים לְ/יַ֥ד הַ/מֶּֽלֶךְ־־־׃פ
translation:
  text: And Benaiah son of Jehoiada was over the Kerethites and the Pelethites, and
    David’s sons were the chief officials at the king’s side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Cherethites,' the traditional English form of the group name.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the first ones' or 'the foremost ones'; likely a title for leading
      court officials.
    reason: lexical_alternative
  - marker: c
    text: Literally 'to/at the hand of the king,' an idiom for close attendance or
      service.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: was over
  alternatives:
  - was in charge of
  - was commander over
  lexicon: HALOT
  rationale: In administrative/military contexts עַל commonly marks authority or oversight.
    'Was over' is concise and natural while preserving the sense of superintendence.
- source_word: הַכְּרֵתִי
  chosen: the Kerethites
  alternatives:
  - the Cherethites
  lexicon: HALOT
  rationale: This is best treated as an ethnicon/group name and transliterated rather
    than interpreted. 'Kerethites' follows a more direct transliteration from Hebrew;
    the traditional 'Cherethites' is preserved as an alternative.
- source_word: הַפְּלֵתִי
  chosen: the Pelethites
  alternatives:
  - the Pelethites
  lexicon: HALOT
  rationale: This is likewise a group name and is best transliterated. No more interpretive
    rendering is warranted by the text itself.
- source_word: הָרִאשֹׁנִים
  chosen: the chief officials
  alternatives:
  - the first
  - the foremost
  - chief men
  lexicon: HALOT
  rationale: Literally 'the first ones/foremost ones.' In this court setting, the
    adjective functions substantivally for rank or precedence. 'Chief officials' communicates
    status in idiomatic English better than the overly literal 'the first.'
- source_word: לְיַד הַמֶּלֶךְ
  chosen: at the king’s side
  alternatives:
  - in the service of the king
  - under the king's authority
  - beside the king
  lexicon: HALOT
  rationale: Literally 'to/at the hand of the king,' an idiom for close attendance
    or service in the royal court. 'At the king’s side' preserves the relational proximity
    without woodenly reproducing the Hebrew idiom.
- source_word: וּבְנֵי דָוִיד
  chosen: David’s sons
  alternatives:
  - the sons of David
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'David’s sons' is natural modern
    English and preserves the familial reference.
- source_word: בְּנָיָהוּ בֶּן־יְהוֹיָדָע
  chosen: Benaiah son of Jehoiada
  alternatives:
  - Benaiah the son of Jehoiada
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention. The filial
    expression is rendered naturally without unnecessary archaism.
