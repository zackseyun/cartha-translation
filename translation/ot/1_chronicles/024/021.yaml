id: 1CH.24.21
reference: 1 Chronicles 24:21
source:
  edition: WLC
  text: לִ/רְחַבְיָ֑הוּ לִ/בְנֵ֣י רְחַבְיָ֔הוּ הָ/רֹ֖אשׁ יִשִּׁיָּֽה׃
translation:
  text: For Rehabiah, from the sons of Rehabiah, the chief was Isshiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'As for Rehabiah, among the sons of Rehabiah, Isshiah was the head.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/רְחַבְיָהוּ
  chosen: For Rehabiah
  alternatives:
  - As for Rehabiah
  - Of Rehabiah
  lexicon: HALOT
  rationale: The prefixed ל introduces the next clan/family heading in this list.
    'For Rehabiah' is natural English in a genealogical/administrative enumeration
    and preserves the sense of assignment or reference.
- source_word: לִ/בְנֵי רְחַבְיָהוּ
  chosen: from the sons of Rehabiah
  alternatives:
  - for the sons of Rehabiah
  - the sons of Rehabiah
  lexicon: HALOT
  rationale: בני means 'sons/descendants of.' The prefixed ל again marks the listing
    relationship. 'From the sons of Rehabiah' makes clear that the named chief comes
    from that branch. 'Sons' is retained rather than neutralized, in keeping with
    gender-accurate policy and genealogical usage.
- source_word: הָ/רֹאשׁ
  chosen: the chief
  alternatives:
  - the head
  - the leader
  lexicon: HALOT
  rationale: ראש literally means 'head,' but in this administrative genealogy it denotes
    the leading representative of the family division. 'The chief' is idiomatic and
    suitably formal.
- source_word: יִשִּׁיָּה
  chosen: Isshiah
  alternatives:
  - Jisshiah
  - Ishshiah
  lexicon: HALOT
  rationale: This is a personal name and is therefore transliterated rather than translated.
    'Isshiah' is a standard English transliteration that reflects the consonantal
    form without overcomplicating pronunciation.
