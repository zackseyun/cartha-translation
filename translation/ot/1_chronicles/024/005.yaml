theological_decisions:
- issue: Meaning of שָׂרֵי קֹדֶשׁ וְשָׂרֵי הָאֱלֹהִים
  chosen_reading: Two parallel designations for priestly officials are preserved without
    harmonizing or expanding them beyond the Hebrew.
  alternative_readings:
  - '''princes of the sanctuary and princes of God'''
  - '''officials of the holy things and officials of God'''
  - treating the second phrase as shorthand for 'officials of the house/service of
    God'
  rationale: 'The verse explains why lots were used: both Eleazarite and Ithamarite
    lines contained qualified sacred officials. The translation preserves the parallelism
    and avoids importing a more specific institutional phrase not present in the text.'
  doctrine_reference: Translation philosophy items 1, 3, and 6
