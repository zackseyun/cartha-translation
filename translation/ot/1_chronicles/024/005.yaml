id: 1CH.24.5
reference: 1 Chronicles 24:5
source:
  edition: WLC
  text: וַ/יַּחְלְק֥וּ/ם בְּ/גוֹרָל֖וֹת אֵ֣לֶּה עִם אֵ֑לֶּה כִּי הָי֤וּ שָֽׂרֵי קֹ֨דֶשׁ֙
    וְ/שָׂרֵ֣י הָ/אֱלֹהִ֔ים מִ/בְּנֵ֥י אֶלְעָזָ֖ר וּ/בִ/בְנֵ֥י אִיתָמָֽר־־־׃ס
translation:
  text: So they divided them by lots, these with those, because there were officers
    of the sanctuary and officers of God from the sons of Eleazar and from the sons
    of Ithamar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one group with another'; the Hebrew literally says 'these with those.'
    reason: lexical_alternative
  - marker: b
    text: Or 'princes/leaders of the sanctuary and princes/leaders of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחְלְקוּם
  chosen: they divided them
  alternatives:
  - they apportioned them
  - they organized them
  lexicon: HALOT
  rationale: The verb חלק in the piel/waw-consecutive form with 3mp suffix indicates
    an act of dividing or apportioning the priestly groups. 'Divided them' is direct
    and natural in English, while preserving the concrete sense better than the more
    interpretive 'organized.'
- source_word: בְּגוֹרָלוֹת
  chosen: by lots
  alternatives:
  - by lot
  - with lots
  lexicon: HALOT
  rationale: גוֹרָל refers to the casting of lots as the means of assignment. The
    plural is retained with 'lots,' and 'by lots' best expresses instrumentality in
    idiomatic English.
- source_word: אֵלֶּה עִם אֵלֶּה
  chosen: these with those
  alternatives:
  - one group with another
  - these alongside those
  lexicon: HALOT
  rationale: The demonstratives emphasize corresponding groups being treated together
    or in parallel. 'These with those' preserves the terse distributive flavor of
    the Hebrew without overexplaining.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי gives the reason for the lot-based division. 'Because' is clear
    modern English and preserves the causal force.
- source_word: שָׂרֵי קֹדֶשׁ
  chosen: officers of the sanctuary
  alternatives:
  - leaders of the holy place
  - chiefs of holiness
  - princes of the sanctuary
  lexicon: HALOT
  rationale: שָׂרִים are officials, leaders, or officers. In this cultic context,
    'officers' fits administrative function. קֹדֶשׁ here most naturally refers to
    the holy sanctuary sphere rather than abstract 'holiness,' so 'of the sanctuary'
    communicates the institutional/cultic reference.
- source_word: וְשָׂרֵי הָאֱלֹהִים
  chosen: and officers of God
  alternatives:
  - and officers of the house of God
  - and leaders of God
  lexicon: HALOT
  rationale: The phrase is literally 'officers of God.' Although some English versions
    expand the sense toward temple service, the Hebrew does not include 'house.' Retaining
    'of God' preserves the source wording and allows the parallel with the previous
    phrase to stand.
- source_word: מִבְּנֵי אֶלְעָזָר וּבִבְנֵי אִיתָמָר
  chosen: from the sons of Eleazar and from the sons of Ithamar
  alternatives:
  - from among the sons of Eleazar and the sons of Ithamar
  - from Eleazar's sons and Ithamar's sons
  lexicon: HALOT
  rationale: בְּנֵי is a standard genealogical expression meaning 'sons of' or 'descendants
    of.' Since the immediate context concerns priestly family lines, 'sons of' is
    the most transparent rendering. Repeating 'from' reflects the Hebrew prepositions
    and keeps the parallel structure.
