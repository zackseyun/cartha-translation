id: 1CH.24.9
reference: 1 Chronicles 24:9
source:
  edition: WLC
  text: לְ/מַלְכִּיָּה֙ הַ/חֲמִישִׁ֔י לְ/מִיָּמִ֖ן הַ/שִּׁשִּֽׁי׃
translation:
  text: the fifth to Malkijah, the sixth to Mijamin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for Malkijah ... for Mijamin.' The Hebrew preposition can be rendered
      either way in this list of lot assignments.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַלְכִּיָּה
  chosen: to Malkijah
  alternatives:
  - for Malkijah
  lexicon: HALOT
  rationale: The preposition לְ in this lot-allocation list is best rendered idiomatically
    as 'to,' indicating assignment by lot. The personal name is transliterated rather
    than translated, following the project's policy for names.
- source_word: הַחֲמִישִׁי
  chosen: the fifth
  lexicon: HALOT
  rationale: The ordinal with article functions substantivally in this distribution
    formula, referring to the fifth lot/order. English can preserve the concise ordinal
    expression.
- source_word: לְמִיָּמִן
  chosen: to Mijamin
  alternatives:
  - for Mijamin
  lexicon: HALOT
  rationale: As with the first phrase, לְ marks assignment. The name is transliterated
    as 'Mijamin' to reflect the Hebrew form directly.
- source_word: הַשִּׁשִּׁי
  chosen: the sixth
  lexicon: HALOT
  rationale: 'The ordinal with article continues the same lot-allocation pattern:
    ''the sixth'' lot/order.'
