id: 1CH.24.27
reference: 1 Chronicles 24:27
source:
  edition: WLC
  text: בְּנֵ֖י מְרָרִ֑י לְ/יַֽעֲזִיָּ֣הֽוּ בְנ֔/וֹ וְ/שֹׁ֥הַם וְ/זַכּ֖וּר וְ/עִבְרִֽי׃
translation:
  text: 'The sons of Merari: of Jaaziah, his son, Shoham, Zaccur, and Ibri.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'his son.' The syntax is difficult; some take this as the proper
      name 'Beno,' while others understand a plural sense such as 'his sons.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of 'son' introducing a genealogical list. 'Sons of'
    is the most direct and conventional rendering here, while also allowing for immediate
    named descendants in a clan register.
- source_word: מְרָרִי
  chosen: Merari
  lexicon: HALOT
  rationale: Proper personal name; transliterated per translation philosophy.
- source_word: לְיַעֲזִיָּהוּ
  chosen: of Jaaziah
  alternatives:
  - belonging to Jaaziah
  - for Jaaziah
  lexicon: HALOT
  rationale: The prefixed ל here is best taken in a genealogical/listing sense, marking
    the branch associated with Jaaziah. 'Of Jaaziah' is concise and natural in English
    for this register context.
- source_word: בְנוֹ
  chosen: his son
  alternatives:
  - his sons
  - Beno
  lexicon: HALOT
  rationale: The consonantal text naturally reads 'his son.' Some interpreters and
    versions have treated the form as a proper name ('Beno') or emended toward a plural
    sense because of the following list of names, but the MT points to 'his son,'
    which is retained in the main text. The alternative is preserved in a footnote
    because the syntax is difficult.
- source_word: וְשֹׁהַם
  chosen: Shoham
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
- source_word: וְזַכּוּר
  chosen: Zaccur
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
- source_word: וְעִבְרִי
  chosen: Ibri
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
