id: 1CH.24.11
reference: 1 Chronicles 24:11
source:
  edition: WLC
  text: לְ/יֵשׁ֨וּעַ֙ הַ/תְּשִׁעִ֔י לִ/שְׁכַנְיָ֖הוּ הָ/עֲשִׂרִֽי׃
translation:
  text: to Jeshua the ninth, to Shecaniah the tenth.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְיֵשׁוּעַ
  chosen: to Jeshua
  alternatives:
  - for Jeshua
  lexicon: HALOT
  rationale: The preposition לְ here marks assignment in the sequence of priestly
    divisions/courses cast by lot. In English, 'to Jeshua' naturally conveys allotment.
    The personal name is transliterated rather than translated, per project philosophy.
- source_word: הַתְּשִׁיעִי
  chosen: the ninth
  alternatives:
  - ninth
  lexicon: HALOT
  rationale: The ordinal with article functions substantivally, indicating the ninth
    lot/order in the sequence. Retaining 'the ninth' mirrors the Hebrew structure
    and the list format in context.
- source_word: לִשְׁכַנְיָהוּ
  chosen: to Shecaniah
  alternatives:
  - for Shecaniah
  lexicon: HALOT
  rationale: As with the first phrase, לְ indicates assignment/allotment in the ordered
    list. 'Shecaniah' is a standard English transliteration of the Hebrew personal
    name שְׁכַנְיָהוּ.
- source_word: הָעֲשִׂירִי
  chosen: the tenth
  alternatives:
  - tenth
  lexicon: HALOT
  rationale: The ordinal with article denotes the tenth lot/order. 'The tenth' preserves
    the concise enumerative style of the Hebrew.
