id: 1CH.24.25
reference: 1 Chronicles 24:25
source:
  edition: WLC
  text: אֲחִ֤י מִיכָה֙ יִשִּׁיָּ֔ה לִ/בְנֵ֥י יִשִּׁיָּ֖ה זְכַרְיָֽהוּ׃
translation:
  text: 'The brother of Micah: Isshiah; of the sons of Isshiah, Zechariah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Isshiah is also spelled 'Ishiah' or, in some English traditions, 'Jeshiah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲחִי
  chosen: The brother of
  alternatives:
  - his brother
  - brother of
  lexicon: HALOT
  rationale: 'Construct form of אָח, here introducing a genealogical relationship.
    Rendered with the definite article in English for naturalness in a list context:
    ''The brother of Micah.'''
- source_word: מִיכָה
  chosen: Micah
  alternatives:
  - Mica
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention. Personal names
    are transliterated rather than translated.
- source_word: יִשִּׁיָּה
  chosen: Isshiah
  alternatives:
  - Ishiah
  - Jeshiah
  lexicon: HALOT
  rationale: Proper name. 'Isshiah' reflects a straightforward transliteration of
    the Hebrew form here. Alternative traditional English spellings exist and are
    worth preserving in a footnote because this name appears with orthographic variation
    in English traditions.
- source_word: לִבְנֵי
  chosen: of the sons of
  alternatives:
  - for the sons of
  - belonging to the sons of
  lexicon: HALOT
  rationale: The preposition ל plus 'sons of' in this genealogical/organizational
    context is best rendered idiomatically as 'of the sons of,' marking descent or
    subgroup affiliation rather than direction ('to/for').
- source_word: יִשִּׁיָּה
  chosen: Isshiah
  alternatives:
  - Ishiah
  - Jeshiah
  lexicon: HALOT
  rationale: Repeated proper name, rendered consistently with the earlier occurrence
    in the verse.
- source_word: זְכַרְיָהוּ
  chosen: Zechariah
  alternatives:
  - Zekaryahu
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention. 'Zechariah'
    is the established English form and accurately represents the Hebrew name.
