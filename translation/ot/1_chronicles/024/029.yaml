id: 1CH.24.29
reference: 1 Chronicles 24:29
source:
  edition: WLC
  text: לְ/קִ֖ישׁ בְּנֵי קִ֥ישׁ יְרַחְמְאֵֽל־׃
translation:
  text: 'For Kish: the sons of Kish, Jerahmeel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Of Kish” / “As for Kish”; the Hebrew preposition may mark a heading
      in this list.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְקִישׁ
  chosen: For Kish
  alternatives:
  - Of Kish
  - As for Kish
  lexicon: HALOT
  rationale: The prefixed לְ here functions as a heading or topical marker in this
    genealogical/organizational list, introducing the line belonging to Kish. 'For
    Kish' is concise and natural in English while preserving the list structure.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - sons of
  - descendants of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural 'sons of.' In genealogical contexts it
    can sometimes broaden to 'descendants,' but here the immediate naming of a single
    individual favors the more literal 'sons of,' with the English article added for
    readability.
- source_word: קִישׁ
  chosen: Kish
  rationale: Proper name, transliterated according to the translation philosophy's
    preference to transliterate personal names.
- source_word: יְרַחְמְאֵל
  chosen: Jerahmeel
  rationale: Proper name, transliterated. This is the named son/representative under
    Kish in the list.
