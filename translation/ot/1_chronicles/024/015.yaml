id: 1CH.24.15
reference: 1 Chronicles 24:15
source:
  edition: WLC
  text: לְ/חֵזִיר֙ שִׁבְעָ֣ה עָשָׂ֔ר לְ/הַ/פִּצֵּ֖ץ שְׁמוֹנָ֥ה עָשָֽׂר׃
translation:
  text: to Hezir the seventeenth, to Happizzez the eighteenth.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְחֵזִיר
  chosen: to Hezir
  alternatives:
  - for Hezir
  lexicon: HALOT
  rationale: The prefixed ל marks assignment in the lot list; 'to Hezir' is idiomatic
    in English for the distribution of the priestly divisions. The proper name is
    transliterated rather than translated, following the policy for personal names.
- source_word: שִׁבְעָה עָשָׂר
  chosen: the seventeenth
  alternatives:
  - seventeen
  lexicon: HALOT
  rationale: 'In this context of an ordered list of lots/divisions, the compound numeral
    functions ordinally. English idiom prefers the ordinal with the article: ''the
    seventeenth.'''
- source_word: לְהַפִּצֵּץ
  chosen: to Happizzez
  alternatives:
  - for Happizzez
  lexicon: HALOT
  rationale: Again, ל indicates assignment in the sequence. The name is best transliterated
    as 'Happizzez,' preserving the Hebrew proper name rather than attempting a meaning-based
    rendering.
- source_word: שְׁמוֹנָה עָשָׂר
  chosen: the eighteenth
  alternatives:
  - eighteen
  lexicon: HALOT
  rationale: As with the previous numeral, the context requires an ordinal sense in
    English because the verse enumerates the seventeenth and eighteenth priestly lots.
