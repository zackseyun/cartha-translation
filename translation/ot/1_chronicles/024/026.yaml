id: 1CH.24.26
reference: 1 Chronicles 24:26
source:
  edition: WLC
  text: בְּנֵ֤י מְרָרִי֙ מַחְלִ֣י וּ/מוּשִׁ֔י בְּנֵ֖י יַעֲזִיָּ֥הֽוּ בְנֽ/וֹ׃
translation:
  text: 'The sons of Merari: Mahli and Mushi. The sons of Jaaziah: his son.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads “his son.” The line is difficult; some understand this as a
      proper name, “Beno,” or emend the sense to “his sons.”
    reason: textual_variant
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - descendants of
  lexicon: HALOT
  rationale: Construct plural of בן introducing a genealogical/list formula. 'Sons
    of' is the standard and sufficiently literal rendering in this register; 'descendants
    of' would be broader than the immediate wording.
- source_word: מְרָרִי
  chosen: Merari
  lexicon: HALOT
  rationale: Proper name; transliterated per translation philosophy.
- source_word: מַחְלִי
  chosen: Mahli
  lexicon: HALOT
  rationale: Proper name; transliterated.
- source_word: וּמוּשִׁי
  chosen: and Mushi
  lexicon: HALOT
  rationale: Conjunction plus proper name; rendered straightforwardly in the list.
- source_word: בְּנֵי יַעֲזִיָּהוּ
  chosen: The sons of Jaaziah
  alternatives:
  - The descendants of Jaaziah
  lexicon: HALOT
  rationale: Repeats the genealogical formula. Although the following singular 'his
    son' makes the line syntactically difficult, the plural construct phrase itself
    is best preserved as 'The sons of Jaaziah' rather than smoothed away.
- source_word: בְנוֹ
  chosen: his son
  alternatives:
  - his sons
  - Beno
  lexicon: HALOT
  rationale: The consonantal text with pointing reads singular 'his son.' This yields
    a terse and somewhat awkward genealogy, but it is the plain sense of the MT as
    vocalized. Some interpreters and versions have understood the form differently,
    including as a proper name ('Beno') or by emending toward a plural sense; these
    are preserved in a footnote rather than adopted in the main text.
