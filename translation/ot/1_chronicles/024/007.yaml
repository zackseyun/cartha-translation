id: 1CH.24.7
reference: 1 Chronicles 24:7
source:
  edition: WLC
  text: וַ/יֵּצֵ֞א הַ/גּוֹרָ֤ל הָ/רִאשׁוֹן֙ לִ/יה֣וֹיָרִ֔יב לִֽ/ידַעְיָ֖ה הַ/שֵּׁנִֽי׃
translation:
  text: The first lot came out for Jehoiarib, the second for Jedaiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically in English, 'The first lot fell to Jehoiarib, the
      second to Jedaiah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: came out
  alternatives:
  - went out
  - fell
  lexicon: HALOT
  rationale: The verb יצא literally means 'go out/come out.' In the context of casting
    lots, English idiom can use 'fell,' but 'came out' stays closer to the Hebrew
    while remaining natural.
- source_word: הַגּוֹרָל
  chosen: lot
  alternatives:
  - assigned lot
  lexicon: HALOT
  rationale: גוֹרָל refers to the lot used or the allotment determined by lot. Here
    'lot' is the standard concise rendering and fits the procedural context of priestly
    division assignments.
- source_word: הָרִאשׁוֹן
  chosen: the first
  alternatives:
  - first
  lexicon: HALOT
  rationale: 'The adjective marks ordinal sequence. Retaining the article reflects
    the Hebrew construction and yields natural English: ''The first lot.'''
- source_word: לִיהוֹיָרִיב
  chosen: for Jehoiarib
  alternatives:
  - to Jehoiarib
  lexicon: HALOT
  rationale: The prefixed ל marks the recipient of the lot assignment. In English,
    'for Jehoiarib' best conveys allocation.
- source_word: לִידַעְיָה
  chosen: for Jedaiah
  alternatives:
  - to Jedaiah
  lexicon: HALOT
  rationale: As with the previous name, the prefixed ל indicates the recipient of
    the second lot. 'For Jedaiah' is the most natural rendering in this administrative
    list context.
- source_word: הַשֵּׁנִי
  chosen: the second
  alternatives:
  - second
  lexicon: HALOT
  rationale: The ordinal adjective indicates the next lot in sequence. Keeping 'the
    second' mirrors the Hebrew and balances 'the first' earlier in the verse.
