id: 1CH.24.16
reference: 1 Chronicles 24:16
source:
  edition: WLC
  text: לִֽ/פְתַחְיָה֙ תִּשְׁעָ֣ה עָשָׂ֔ר לִֽ/יחֶזְקֵ֖אל הָ/עֶשְׂרִֽים׃
translation:
  text: for Pethahiah, the nineteenth; for Jehezkel, the twentieth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for Ezekiel.' The Hebrew name here is יְחֶזְקֵאל/יֶחֶזְקֵאל in form,
      represented more exactly as 'Jehezkel'; some English versions regularize it
      to the more familiar 'Ezekiel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְתַחְיָה
  chosen: for Pethahiah
  alternatives:
  - to Pethahiah
  - belonging to Pethahiah
  lexicon: HALOT
  rationale: 'The prefixed ל in this roster of priestly divisions marks assignment/allotment:
    the lot/order is ''for'' the named priestly house. The personal name is transliterated
    rather than translated, per project philosophy.'
- source_word: תִּשְׁעָה עָשָׂר
  chosen: the nineteenth
  alternatives:
  - nineteen
  - nineteenth lot/order
  lexicon: HALOT
  rationale: The cardinal expression functions idiomatically as an ordinal in this
    list of divisions. English requires the ordinal sense here; 'the nineteenth' is
    concise and natural while preserving the list structure.
- source_word: לִיחֶזְקֵאל
  chosen: for Jehezkel
  alternatives:
  - to Jehezkel
  - for Ezekiel
  lexicon: HALOT
  rationale: Again, ל marks assignment in the sequence. The name is best transliterated
    from the Hebrew form here as 'Jehezkel' rather than harmonized to the more familiar
    'Ezekiel,' since this is a distinct onomastic form in the Chronicler's list.
- source_word: הָעֶשְׂרִים
  chosen: the twentieth
  alternatives:
  - twenty
  - the twentieth lot/order
  lexicon: HALOT
  rationale: The numeral with article functions as an ordinal designation in the sequence
    of lots/divisions. Rendering it as 'the twentieth' matches the list format and
    the implied noun from context.
