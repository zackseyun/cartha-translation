id: 1CH.24.13
reference: 1 Chronicles 24:13
source:
  edition: WLC
  text: לְ/חֻפָּה֙ שְׁלֹשָׁ֣ה עָשָׂ֔ר לְ/יֶֽשֶׁבְאָ֖ב אַרְבָּעָ֥ה עָשָֽׂר׃
translation:
  text: for Huppah, the thirteenth; for Jeshebeab, the fourteenth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Huppah ... to Jeshebeab.' The Hebrew preposition can be rendered
      either way in this list of assignments.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/חֻפָּה
  chosen: for Huppah
  alternatives:
  - to Huppah
  lexicon: HALOT
  rationale: The prefixed ל in this lot-allocation list marks assignment to a named
    priestly house. 'For Huppah' is idiomatic English in this enumerative context
    and preserves the sense of designation without overtranslating.
- source_word: שְׁלֹשָׁה עָשָׂר
  chosen: the thirteenth
  alternatives:
  - thirteen
  lexicon: HALOT
  rationale: The cardinal expression functions ordinally in this list of divisions
    selected by lot. English naturally renders it as the ordinal 'the thirteenth'
    rather than the less idiomatic 'thirteen'.
- source_word: לְ/יֶשֶׁבְאָב
  chosen: for Jeshebeab
  alternatives:
  - to Jeshebeab
  lexicon: HALOT
  rationale: As with the first name, the prefixed ל indicates assignment in the sequence
    of priestly divisions. 'Jeshebeab' is a standard transliteration of the proper
    name and 'for' best fits the list format.
- source_word: אַרְבָּעָה עָשָׂר
  chosen: the fourteenth
  alternatives:
  - fourteen
  lexicon: HALOT
  rationale: Though formally a cardinal number, it functions as an ordinal in the
    context of ordered lots. 'The fourteenth' communicates the intended rank in natural
    English.
