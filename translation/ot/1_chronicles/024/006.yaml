id: 1CH.24.6
reference: 1 Chronicles 24:6
source:
  edition: WLC
  text: וַֽ/יִּכְתְּבֵ֡/ם שְֽׁמַֽעְיָה֩ בֶן נְתַנְאֵ֨ל הַ/סּוֹפֵ֜ר מִן הַ/לֵּוִ֗י
    לִ/פְנֵ֨י הַ/מֶּ֤לֶךְ וְ/הַ/שָּׂרִים֙ וְ/צָד֣וֹק הַ/כֹּהֵ֗ן וַ/אֲחִימֶ֨לֶךְ֙ בֶּן
    אֶבְיָתָ֔ר וְ/רָאשֵׁי֙ הָֽ/אָב֔וֹת לַ/כֹּהֲנִ֖ים וְ/לַ/לְוִיִּ֑ם בֵּֽית אָ֣ב אֶחָ֗ד
    אָחֻז֙ לְ/אֶלְעָזָ֔ר וְ/אָחֻ֥ז אָחֻ֖ז לְ/אִיתָמָֽר־־־־׀׃פ
translation:
  text: Shemaiah son of Nethanel, the scribe from among the Levites, recorded them
    in the presence of the king, the officials, Zadok the priest, Ahimelech son of
    Abiathar, and the heads of the fathers’ houses of the priests and of the Levites—one
    father’s house being taken for Eleazar, and one being taken for Ithamar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is compressed: ''one father’s house taken for Eleazar, and taken,
      taken for Ithamar.'' The sense is that family heads were selected in turn from
      the Eleazar and Ithamar lines.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְתְּבֵם
  chosen: recorded them
  alternatives:
  - wrote them down
  - registered them
  lexicon: HALOT
  rationale: The verb כתב with 3mp suffix refers to writing down the divisions/lots
    just assigned in the preceding context. 'Recorded them' is natural modern English
    and preserves the documentary sense without over-specifying the medium.
- source_word: הַסֹּפֵר
  chosen: the scribe
  alternatives:
  - the secretary
  - the recorder
  lexicon: HALOT
  rationale: סֹפֵר commonly denotes a scribe or official writer. 'Scribe' best matches
    the historical role and fits the context of written registration.
- source_word: מִן הַלֵּוִי
  chosen: from among the Levites
  alternatives:
  - a Levite
  - of the Levites
  lexicon: HALOT
  rationale: The phrase identifies Shemaiah as belonging to the Levitical group. 'From
    among the Levites' preserves the partitive nuance of מן and reads smoothly in
    English.
- source_word: לִפְנֵי
  chosen: in the presence of
  alternatives:
  - before
  lexicon: HALOT
  rationale: לִפְנֵי here indicates the public setting and witnesses to the record.
    'In the presence of' makes the procedural sense explicit in idiomatic English.
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the leaders
  lexicon: HALOT
  rationale: שָׂרִים in court/administrative contexts refers to ruling officials.
    'Officials' is more accessible than 'princes' and avoids implying royal sons.
- source_word: רָאשֵׁי הָאָבוֹת
  chosen: the heads of the fathers’ houses
  alternatives:
  - the heads of the ancestral houses
  - the chief fathers
  lexicon: HALOT
  rationale: This is a technical genealogical-administrative expression in Chronicles.
    'Heads of the fathers’ houses' preserves the structure closely while remaining
    understandable.
- source_word: לַכֹּהֲנִים וְלַלְוִיִּם
  chosen: of the priests and of the Levites
  alternatives:
  - for the priests and the Levites
  lexicon: HALOT
  rationale: In apposition to the preceding phrase, this identifies whose fathers’
    houses are in view. 'Of the priests and of the Levites' best reflects the genitival
    relationship in English.
- source_word: בֵּית אָב אֶחָד
  chosen: one father’s house
  alternatives:
  - one ancestral house
  - one family house
  lexicon: HALOT
  rationale: This technical phrase denotes a clan unit. 'Father’s house' is retained
    for transparency to the Hebrew social structure.
- source_word: אָחֻז
  chosen: being taken
  alternatives:
  - taken
  - chosen
  - drawn
  lexicon: HALOT
  rationale: The passive participle of אחז literally means 'seized/taken.' In this
    lot-allocation context it indicates that a family unit was taken/selected in turn.
    'Being taken' smooths the compressed Hebrew syntax into intelligible English.
- source_word: לְאֶלְעָזָר ... לְאִיתָמָר
  chosen: for Eleazar ... for Ithamar
  alternatives:
  - belonging to Eleazar ... belonging to Ithamar
  - from Eleazar ... from Ithamar
  lexicon: HALOT
  rationale: The preposition ל marks assignment with respect to the two priestly lines
    descended from Eleazar and Ithamar. 'For' is concise and fits the allocation context.
- source_word: וְאָחֻז אָחֻז לְאִיתָמָר
  chosen: and one being taken for Ithamar
  alternatives:
  - and one by one for Ithamar
  - and another taken for Ithamar
  lexicon: HALOT
  rationale: The repeated participle creates a distributive sense. Because the Hebrew
    is compressed and somewhat elliptical, the English supplies 'one' to mirror the
    prior clause and convey alternating selection without paraphrasing beyond the
    context.
