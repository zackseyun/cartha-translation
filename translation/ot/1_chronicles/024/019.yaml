theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guideline specifies 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of בְּיַד אַהֲרֹן in priestly administration
  chosen_reading: under the hand of Aaron
  alternative_readings:
  - by the hand of Aaron
  - under Aaron's authority
  rationale: The phrase can denote agency or authority. Retaining the idiom preserves
    the text's formal register while allowing the administrative sense to be heard.
    No doctrinal issue is at stake, but the phrase affects how the priestly order
    is understood.
