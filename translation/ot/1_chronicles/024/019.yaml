id: 1CH.24.19
reference: 1 Chronicles 24:19
source:
  edition: WLC
  text: אֵ֣לֶּה פְקֻדָּתָ֞/ם לַ/עֲבֹדָתָ֗/ם לָ/ב֤וֹא לְ/בֵית יְהוָה֙ כְּ/מִשְׁפָּטָ֔/ם
    בְּ/יַ֖ד אַהֲרֹ֣ן אֲבִי/הֶ֑ם כַּ/אֲשֶׁ֣ר צִוָּ֔/הוּ יְהוָ֖ה אֱלֹהֵ֥י יִשְׂרָאֵֽל־׃פ
translation:
  text: These were their appointed duties for their service, to come into the house
    of the LORD according to their ordinance, under the hand of Aaron their father,
    as the LORD, the God of Israel, had commanded him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to their prescribed order.' The Hebrew term can denote an
      ordinance, rule, or prescribed procedure.
    reason: lexical_alternative
  - marker: b
    text: Literally 'under/by the hand of Aaron,' an idiom for administration or authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְקֻדָּתָם
  chosen: their appointed duties
  alternatives:
  - their ordering
  - their office
  - their appointment
  lexicon: HALOT
  rationale: The noun from פקד here refers to an ordered assignment or appointment.
    In this cultic context, 'appointed duties' communicates both the formal assignment
    and the practical responsibilities better than the more abstract 'ordering' or
    the narrower 'office'.
- source_word: לַעֲבֹדָתָם
  chosen: for their service
  alternatives:
  - for their ministry
  - for their work
  lexicon: HALOT
  rationale: עֲבֹדָה in priestly/temple contexts often denotes cultic service. 'Service'
    is clear modern English and preserves the liturgical sense without importing later
    ecclesiastical terminology as strongly as 'ministry'.
- source_word: לָבוֹא
  chosen: to come into
  alternatives:
  - to enter
  lexicon: HALOT
  rationale: The infinitive of בוא literally means 'to come.' In context it refers
    to entering the sanctuary precincts for service. 'To come into' preserves the
    Hebrew verbal idea while remaining natural in English.
- source_word: לְבֵית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: בית יהוה is the standard expression 'house of the LORD.' Although it
    refers functionally to the temple, the more literal rendering preserves the Hebrew
    idiom. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: כְּמִשְׁפָּטָם
  chosen: according to their ordinance
  alternatives:
  - according to their rule
  - according to their prescribed order
  - according to their custom
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, legal claim, ordinance, or prescribed procedure.
    Here it refers to the prescribed regulation/order governing priestly service.
    'Ordinance' best captures the formal prescribed nature, though 'prescribed order'
    is also possible.
- source_word: בְּיַד אַהֲרֹן
  chosen: under the hand of Aaron
  alternatives:
  - by the hand of Aaron
  - under Aaron's authority
  lexicon: HALOT
  rationale: The idiom בְּיַד literally means 'by/under the hand of' and often denotes
    agency or authority. 'Under the hand of' keeps the Hebrew flavor while still being
    understandable; it suggests administration under Aaron's authority.
- source_word: אֲבִיהֶם
  chosen: their father
  alternatives:
  - their ancestor
  lexicon: HALOT
  rationale: Aaron is the ancestral head of the priestly line. 'Their father' is the
    literal Hebrew and is idiomatic for forefather/ancestor in genealogical contexts;
    the literal form is retained.
- source_word: כַּאֲשֶׁר צִוָּהוּ
  chosen: as ... had commanded him
  alternatives:
  - just as ... commanded him
  lexicon: HALOT
  rationale: The clause compares the arrangement with the prior divine command to
    Aaron. The pronominal suffix on צִוָּהוּ is singular, naturally referring to Aaron.
- source_word: יְהוָה אֱלֹהֵי יִשְׂרָאֵל
  chosen: the LORD, the God of Israel
  alternatives:
  - the LORD God of Israel
  lexicon: HALOT
  rationale: The appositional rendering with commas reflects the Hebrew title sequence
    clearly in English. יְהוָה follows the doctrinal default 'the LORD'.
