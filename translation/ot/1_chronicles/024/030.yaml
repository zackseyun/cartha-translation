id: 1CH.24.30
reference: 1 Chronicles 24:30
source:
  edition: WLC
  text: וּ/בְנֵ֣י מוּשִׁ֔י מַחְלִ֥י וְ/עֵ֖דֶר וִ/ירִימ֑וֹת אֵ֛לֶּה בְּנֵ֥י הַ/לְוִיִּ֖ם
    לְ/בֵ֥ית אֲבֹתֵי/הֶֽם׃
translation:
  text: 'And the sons of Mushi: Mahli, Eder, and Jeremoth. These were the sons of
    the Levites according to their fathers'' houses.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jeremoth may also be spelled 'Jerimoth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: ו conjunction plus construct plural of בן introduces the next genealogical
    item in a list. 'And the sons of' preserves the connective and the genealogical
    formula naturally in English.
- source_word: מוּשִׁי
  chosen: Mushi
  lexicon: HALOT
  rationale: Proper personal name; transliterated per translation philosophy.
- source_word: מַחְלִי
  chosen: Mahli
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
- source_word: וְעֵדֶר
  chosen: Eder
  lexicon: HALOT
  rationale: Proper personal name with prefixed conjunction; in an English name list
    the conjunction is represented before the final item rather than before each item.
- source_word: וִירִימוֹת
  chosen: Jeremoth
  alternatives:
  - Jerimoth
  lexicon: HALOT
  rationale: Proper personal name. 'Jeremoth' is a standard English transliteration
    for יְרִימוֹת/יְרֵמוֹת-type forms in Chronicles; 'Jerimoth' is a viable alternative
    spelling preserved in a footnote.
- source_word: אֵלֶּה
  chosen: These were
  alternatives:
  - These are
  lexicon: HALOT
  rationale: Demonstrative plural summing up the listed clans. English often supplies
    'were' in genealogical notices for smoothness. Present 'are' is possible, but
    past fits the narrative register.
- source_word: בְּנֵי הַלְוִיִּם
  chosen: the sons of the Levites
  alternatives:
  - the Levite descendants
  lexicon: HALOT
  rationale: Construct phrase literally 'sons of the Levites.' Retained formally to
    preserve the genealogical idiom and tribal reference.
- source_word: לְבֵית אֲבֹתֵיהֶם
  chosen: according to their fathers' houses
  alternatives:
  - by their ancestral houses
  - for their fathers' house
  lexicon: HALOT
  rationale: Standard genealogical/administrative expression indicating division by
    paternal households or clans. 'According to their fathers' houses' preserves the
    idiom while remaining understandable.
