id: 1CH.24.28
reference: 1 Chronicles 24:28
source:
  edition: WLC
  text: לְ/מַחְלִי֙ אֶלְעָזָ֔ר וְ/לֹא הָ֥יָה ל֖/וֹ בָּנִֽים־׃
translation:
  text: 'For Mahli: Eleazar, and he had no sons.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''As for Mahli: Eleazar; and he had no sons.'' The opening preposition
      likely functions as a list heading/topic marker.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַחְלִי
  chosen: For Mahli
  alternatives:
  - Of Mahli
  - As for Mahli
  lexicon: HALOT
  rationale: The prefixed ל introduces a heading/topic marker in this genealogical
    list. 'For Mahli' gives natural English while preserving the list structure better
    than a more wooden 'Of Mahli.'
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: Standard English transliteration of the personal name; names are transliterated
    rather than translated per project philosophy.
- source_word: וְלֹא הָיָה לוֹ
  chosen: and he had no
  alternatives:
  - but he had no
  - and there were not to him
  lexicon: HALOT
  rationale: The Hebrew idiom 'there was not to him' is most naturally rendered in
    English as 'he had no.' The conjunction is kept as simple 'and' to reflect the
    narrative/list style without adding contrast beyond the text.
- source_word: בָּנִים
  chosen: sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: בנים specifically denotes 'sons' here, not children in general. This
    preserves the genealogical and inheritance context and follows the gender-accurate
    principle.
