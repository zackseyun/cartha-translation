id: 1CH.24.24
reference: 1 Chronicles 24:24
source:
  edition: WLC
  text: בְּנֵ֤י עֻזִּיאֵל֙ מִיכָ֔ה לִ/בְנֵ֥י מִיכָ֖ה שמור׃
translation:
  text: 'The sons of Uzziel: Micah; of the sons of Micah: Shamir.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Shemor" for the final personal name; the Hebrew spelling שמור can be
      represented either way in English transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of בן introducing a genealogical/list formula. 'Sons
    of' is the most direct rendering and fits the immediate register of priestly/genealogical
    enumeration; 'descendants of' is possible in broader genealogical contexts but
    is less precise here.
- source_word: עֻזִּיאֵל
  chosen: Uzziel
  alternatives:
  - Uziel
  rationale: Personal name, transliterated per project philosophy. 'Uzziel' is the
    standard English form reflecting the doubled consonant.
- source_word: מִיכָה
  chosen: Micah
  rationale: Personal name, transliterated in standard English form.
- source_word: לִ/בְנֵי
  chosen: of the sons of
  alternatives:
  - for the sons of
  - belonging to the sons of
  lexicon: HALOT
  rationale: The prefixed ל on a genealogical/list expression is awkward if rendered
    woodenly as 'to/for.' In this context it functions as a heading/link in the list,
    best represented idiomatically as 'of the sons of,' matching the structure of
    surrounding clan enumerations without over-paraphrasing.
- source_word: שמור
  chosen: Shamir
  alternatives:
  - Shemor
  rationale: Proper name. The consonants permit a transliteration closer to 'Shemor,'
    but standard English convention and many translations render it 'Shamir.' As a
    name in a list, conventional transliteration aids readability.
