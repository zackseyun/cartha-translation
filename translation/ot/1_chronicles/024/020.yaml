id: 1CH.24.20
reference: 1 Chronicles 24:20
source:
  edition: WLC
  text: וְ/לִ/בְנֵ֥י לֵוִ֖י הַ/נּוֹתָרִ֑ים לִ/בְנֵ֤י עַמְרָם֙ שֽׁוּבָאֵ֔ל לִ/בְנֵ֥י
    שׁוּבָאֵ֖ל יֶחְדְּיָֽהוּ׃
translation:
  text: 'And for the remaining sons of Levi: for the sons of Amram, Shubael; for the
    sons of Shubael, Jehdeiah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is elliptical in this roster: the personal names likely stand for
      the family head or representative of each clan branch.'
    reason: cultural_note
  - marker: b
    text: Or 'the rest of the sons of Levi.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/בְנֵי
  chosen: And for the sons of
  alternatives:
  - And to the sons of
  - Now for the sons of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with 'sons of' functions as
    a list-introducing formula in this administrative genealogy. 'And for the sons
    of' preserves the connective force and the classificatory sense in readable English.
- source_word: לֵוִי
  chosen: Levi
  lexicon: HALOT
  rationale: Proper name transliterated according to standard convention, per translation
    philosophy.
- source_word: הַנּוֹתָרִים
  chosen: the remaining
  alternatives:
  - those who remained
  - the rest of
  lexicon: HALOT
  rationale: The participle denotes those left over or remaining. 'The remaining'
    is concise and natural in a roster context, modifying 'sons of Levi'.
- source_word: לִ/בְנֵי עַמְרָם
  chosen: for the sons of Amram
  alternatives:
  - to the sons of Amram
  lexicon: HALOT
  rationale: This repeats the list formula and introduces the Amramite branch. 'For'
    fits the elliptical genealogical style better than a more literal 'to' in English.
- source_word: שׁוּבָאֵל
  chosen: Shubael
  alternatives:
  - Shuba'el
  lexicon: HALOT
  rationale: Personal name transliterated in standard English form. In context it
    stands elliptically as the named representative/chief under the sons of Amram.
- source_word: לִ/בְנֵי שׁוּבָאֵל
  chosen: for the sons of Shubael
  alternatives:
  - to the sons of Shubael
  lexicon: HALOT
  rationale: Again the list formula introduces the next sub-branch. Retaining the
    repeated structure reflects the Hebrew administrative style.
- source_word: יֶחְדְּיָהוּ
  chosen: Jehdeiah
  alternatives:
  - Jahdiah
  - Jehdiah
  lexicon: HALOT
  rationale: Proper name transliterated. 'Jehdeiah' reflects a common English convention
    for this name; alternate spellings exist due to transliteration choices.
