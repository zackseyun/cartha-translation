id: 1CH.24.23
reference: 1 Chronicles 24:23
source:
  edition: WLC
  text: וּ/בְנָ֖י יְרִיָּ֑הוּ אֲמַרְיָ֨הוּ֙ הַ/שֵּׁנִ֔י יַחֲזִיאֵל֙ הַ/שְּׁלִישִׁ֔י
    יְקַמְעָ֖ם הָ/רְבִיעִֽי׃
translation:
  text: 'And the sons of Jeriah: Amariah the second, Jahaziel the third, Jekameam
    the fourth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew list syntax is elliptical: literally, ''And the sons of Jeriah:
      Amariah the second, Jahaziel the third, Jekameam the fourth.'' English may also
      render the ordinals with an implied verb: ''Amariah was the second,'' etc.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנָי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: The conjunction waw links this verse to the preceding genealogy/list,
    so 'And' is retained. בְנֵי is the construct plural 'sons of,' which in this context
    denotes male descendants/sons within a genealogical register, not a gender-neutral
    term.
- source_word: יְרִיָּהוּ
  chosen: Jeriah
  alternatives:
  - Jeriiah
  lexicon: HALOT
  rationale: Personal names are transliterated rather than translated. 'Jeriah' is
    a standard English transliteration; 'Jeriiah' reflects a more letter-for-letter
    representation but is less conventional.
- source_word: אֲמַרְיָהוּ
  chosen: Amariah
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: הַשֵּׁנִי
  chosen: the second
  alternatives:
  - was the second
  lexicon: HALOT
  rationale: The ordinal marks Amariah's birth/order rank in the list. English can
    supply only the ordinal phrase without an explicit verb, matching the terse Hebrew
    style.
- source_word: יַחֲזִיאֵל
  chosen: Jahaziel
  alternatives:
  - Jahziel
  lexicon: HALOT
  rationale: Proper name transliterated. 'Jahaziel' follows common English Bible convention
    for this spelling.
- source_word: הַשְּׁלִישִׁי
  chosen: the third
  alternatives:
  - was the third
  lexicon: HALOT
  rationale: Ordinal retained straightforwardly to preserve the list structure.
- source_word: יְקַמְעָם
  chosen: Jekameam
  alternatives:
  - Jekamam
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English convention;
    spelling varies in English traditions, but 'Jekameam' is a common form reflecting
    the Masoretic vocalization.
- source_word: הָרְבִיעִי
  chosen: the fourth
  alternatives:
  - was the fourth
  lexicon: HALOT
  rationale: Ordinal retained as in Hebrew, with no added interpretive expansion beyond
    the implied list syntax.
