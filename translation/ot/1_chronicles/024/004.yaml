id: 1CH.24.4
reference: 1 Chronicles 24:4
source:
  edition: WLC
  text: וַ/יִּמָּצְא֣וּ בְֽנֵי אֶלְעָזָ֡ר רַבִּ֞ים לְ/רָאשֵׁ֧י הַ/גְּבָרִ֛ים מִן בְּנֵ֥י
    אִיתָמָ֖ר וַֽ/יַּחְלְק֑וּ/ם לִ/בְנֵ֨י אֶלְעָזָ֜ר רָאשִׁ֤ים לְ/בֵית אָבוֹת֙ שִׁשָּׁ֣ה
    עָשָׂ֔ר וְ/לִ/בְנֵ֧י אִיתָמָ֛ר לְ/בֵ֥ית אֲבוֹתָ֖/ם שְׁמוֹנָֽה־־־׃
translation:
  text: 'The sons of Eleazar were found to be more numerous as heads of the mighty
    men than the sons of Ithamar, so they divided them thus: for the sons of Eleazar,
    sixteen heads of fathers’ houses, and for the sons of Ithamar, according to their
    fathers’ houses, eight.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as heads of the warriors' for 'as heads of the mighty men.' The Hebrew
      גְּבָרִים can denote strong or valiant men, not merely adult males.
    reason: lexical_alternative
  - marker: b
    text: '''Fathers’ houses'' refers to ancestral family clans or households, a standard
      kinship-administrative unit in Israel.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּמָּצְאוּ
  chosen: were found to be
  alternatives:
  - were found
  - proved to be
  lexicon: HALOT
  rationale: The Niphal of מצא here introduces the discovered state/result, not merely
    physical finding. 'Were found to be' naturally conveys the assessment that follows.
- source_word: רַבִּים
  chosen: more numerous
  alternatives:
  - many
  - greater in number
  lexicon: HALOT
  rationale: In comparison with 'the sons of Ithamar,' the adjective functions comparatively
    in context. 'More numerous' makes the implied comparison explicit in idiomatic
    English.
- source_word: לְרָאשֵׁי הַגְּבָרִים
  chosen: as heads of the mighty men
  alternatives:
  - for heads of the men
  - as chief men
  - as heads of the warriors
  lexicon: HALOT
  rationale: רֹאשׁ can denote 'head/chief,' and גְּבָרִים often refers to strong or
    valiant men. The phrase likely describes leading men within the priestly clans.
    'Heads of the mighty men' stays close to the Hebrew while remaining intelligible.
- source_word: וַיַּחְלְקוּם
  chosen: they divided them thus
  alternatives:
  - they apportioned them
  - they distributed them
  lexicon: HALOT
  rationale: The verb refers to arranging the priestly groups into divisions. 'Divided
    them thus' preserves the action and smoothly introduces the numerical breakdown
    that follows.
- source_word: רָאשִׁים
  chosen: heads
  alternatives:
  - chiefs
  - leaders
  lexicon: HALOT
  rationale: Consistent with the earlier רָאשֵׁי, 'heads' preserves the clan-structural
    terminology rather than flattening it to a generic leadership term.
- source_word: לְבֵית אָבוֹת
  chosen: of fathers’ houses
  alternatives:
  - by ancestral houses
  - by family houses
  lexicon: HALOT
  rationale: בֵּית אָבוֹת is a standard kinship/administrative expression for ancestral
    households or clans. 'Fathers’ houses' is a transparent, fairly literal rendering
    suitable for Chronicles' genealogical context.
- source_word: שִׁשָּׁה עָשָׂר
  chosen: sixteen
  alternatives:
  - sixteen heads
  lexicon: HALOT
  rationale: Straightforward cardinal number; in English it is best integrated into
    the clause as the count of Eleazar's heads of fathers’ houses.
- source_word: לְבֵית אֲבוֹתָם
  chosen: according to their fathers’ houses
  alternatives:
  - of their fathers’ houses
  - by their fathers’ houses
  lexicon: HALOT
  rationale: The pronominal suffix makes explicit that the reckoning is by Ithamar's
    own ancestral houses. 'According to their fathers’ houses' brings out the distributive
    sense.
- source_word: שְׁמוֹנָה
  chosen: eight
  lexicon: HALOT
  rationale: Straightforward cardinal number for the Ithamarite divisions.
