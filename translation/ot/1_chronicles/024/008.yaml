id: 1CH.24.8
reference: 1 Chronicles 24:8
source:
  edition: WLC
  text: לְ/חָרִם֙ הַ/שְּׁלִישִׁ֔י לִ/שְׂעֹרִ֖ים הָ/רְבִעִֽי׃
translation:
  text: the third to Harim, the fourth to Seorim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "for Harim ... for Seorim"; the Hebrew preposition can mark assignment
      and is rendered here as "to" in this lot list.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְחָרִם
  chosen: to Harim
  alternatives:
  - for Harim
  lexicon: HALOT
  rationale: The prefixed ל marks assignment in the lot list, best rendered idiomatically
    as 'to.' 'Harim' is a proper name and is transliterated rather than translated,
    following the name policy.
- source_word: הַשְּׁלִישִׁי
  chosen: the third
  lexicon: HALOT
  rationale: Ordinal adjective with article, referring to the third lot/division in
    the sequence. English keeps the elliptical style of the Hebrew list.
- source_word: לִשְׂעֹרִים
  chosen: to Seorim
  alternatives:
  - for Seorim
  lexicon: HALOT
  rationale: Again the prefixed ל indicates assignment by lot. The name is transliterated
    as 'Seorim' from the Hebrew form rather than adjusted to a traditional English
    form.
- source_word: הָרְבִעִי
  chosen: the fourth
  lexicon: HALOT
  rationale: Ordinal adjective with article, parallel to 'the third,' referring to
    the fourth lot/division. The terse list format is preserved in English.
