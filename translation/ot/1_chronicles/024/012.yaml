id: 1CH.24.12
reference: 1 Chronicles 24:12
source:
  edition: WLC
  text: לְ/אֶלְיָשִׁיב֙ עַשְׁתֵּ֣י עָשָׂ֔ר לְ/יָקִ֖ים שְׁנֵ֥ים עָשָֽׂר׃
translation:
  text: the eleventh to Eliashib, the twelfth to Jakim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for Eliashib ... for Jakim.' The Hebrew preposition can be rendered
      either way in this assignment list.
    reason: lexical_alternative
  - marker: b
    text: Literally 'eleven ... twelve'; in context these function as ordinals in
      the sequence of lots.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/אֶלְיָשִׁיב
  chosen: to Eliashib
  alternatives:
  - for Eliashib
  lexicon: HALOT
  rationale: The prefixed ל marks assignment in this lot list, best rendered idiomatically
    as 'to Eliashib.' The personal name is transliterated rather than translated,
    following the translation philosophy for names.
- source_word: עַשְׁתֵּי עָשָׂר
  chosen: the eleventh
  alternatives:
  - eleven
  - the eleventh lot
  lexicon: HALOT
  rationale: 'In the context of the preceding sequence of priestly lots/divisions,
    the cardinal expression functions ordinally: ''the eleventh.'' Adding the article
    in English reflects the enumerated list style. ''Lot'' is implied by context but
    not expressed here, so it is not added to the main text.'
- source_word: לְ/יָקִים
  chosen: to Jakim
  alternatives:
  - for Jakim
  - to Jakin
  lexicon: HALOT
  rationale: The prefixed ל again marks assignment. The name is transliterated. 'Jakim'
    closely reflects the Hebrew vocalization יָקִים; 'Jakin' reflects a different
    familiar English form but is less directly tied to this spelling.
- source_word: שְׁנֵים עָשָׂר
  chosen: the twelfth
  alternatives:
  - twelve
  - the twelfth lot
  lexicon: HALOT
  rationale: As with the first number pair, the cardinal expression is used in an
    ordinal/listing sense in this administrative register, so 'the twelfth' is the
    most natural English rendering. 'Lot' remains implicit from context and is not
    supplied in the main text.
