id: 1CH.24.1
reference: 1 Chronicles 24:1
source:
  edition: WLC
  text: וְ/לִ/בְנֵ֥י אַהֲרֹ֖ן מַחְלְקוֹתָ֑/ם בְּנֵ֣י אַהֲרֹ֔ן נָדָב֙ וַ/אֲבִיה֔וּא
    אֶלְעָזָ֖ר וְ/אִיתָמָֽר׃
translation:
  text: 'Now these were the divisions of the sons of Aaron: the sons of Aaron were
    Nadab and Abihu, Eleazar and Ithamar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'courses' for 'divisions'; the Hebrew refers to arranged priestly groupings.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/בְנֵי
  chosen: Now these were the ... of the sons of
  alternatives:
  - And for the sons of
  - As for the sons of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition literally yield 'and/for the
    sons of,' but in this heading-like context introducing a new section, idiomatic
    English is best conveyed by 'Now these were the ... of the sons of.' This preserves
    the discourse function without woodenly reproducing the prepositions.
- source_word: מַחְלְקוֹתָם
  chosen: divisions
  alternatives:
  - divisions/orderings
  - courses
  - groups
  lexicon: HALOT
  rationale: The noun denotes divisions or arranged groups. 'Divisions' is the broad,
    transparent rendering that fits the immediate context and avoids the more traditional
    but less immediately clear 'courses.' The possessive sense is absorbed into the
    English construction rather than rendered as 'their divisions' to avoid awkwardness.
- source_word: בְּנֵי אַהֲרֹן
  chosen: the sons of Aaron
  alternatives:
  - Aaron's sons
  lexicon: HALOT
  rationale: A direct and natural rendering of the construct phrase. 'Sons' is retained
    rather than a gender-neutral alternative in keeping with the source wording and
    the project's gender-accurate policy.
- source_word: נָדָב
  chosen: Nadab
  rationale: Standard English transliteration of the personal name.
- source_word: וַאֲבִיהוּא
  chosen: and Abihu
  rationale: Standard English transliteration with conjunction preserved.
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: Standard English transliteration of the personal name.
- source_word: וְאִיתָמָר
  chosen: and Ithamar
  rationale: Standard English transliteration with conjunction preserved.
