id: 1CH.24.14
reference: 1 Chronicles 24:14
source:
  edition: WLC
  text: לְ/בִלְגָּה֙ חֲמִשָּׁ֣ה עָשָׂ֔ר לְ/אִמֵּ֖ר שִׁשָּׁ֥ה עָשָֽׂר׃
translation:
  text: for Bilgah, the fifteenth; for Immer, the sixteenth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literally, ''fifteen'' and ''sixteen''; in this context of numbered lots,
      the sense is ordinal: ''the fifteenth'' and ''the sixteenth.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/בִלְגָּה
  chosen: for Bilgah
  alternatives:
  - to Bilgah
  - belonging to Bilgah
  lexicon: HALOT
  rationale: The prefixed ל marks assignment in the lot list of priestly divisions.
    In this context, 'for Bilgah' idiomatically conveys that the fifteenth lot/division
    fell to the house of Bilgah. The proper name is transliterated per translation
    philosophy.
- source_word: חֲמִשָּׁה עָשָׂר
  chosen: the fifteenth
  alternatives:
  - fifteen
  - lot fifteen
  lexicon: HALOT
  rationale: Although literally 'fifteen,' the ordinal sense is required by the context
    of sequentially assigned priestly lots in this chapter. English naturally supplies
    'the fifteenth' rather than the cardinal 'fifteen.'
- source_word: לְ/אִמֵּר
  chosen: for Immer
  alternatives:
  - to Immer
  - belonging to Immer
  lexicon: HALOT
  rationale: As with Bilgah, the prefixed ל indicates assignment within the list of
    priestly courses. 'For Immer' best reflects the distribution formula in smooth
    English. The name is transliterated.
- source_word: שִׁשָּׁה עָשָׂר
  chosen: the sixteenth
  alternatives:
  - sixteen
  - lot sixteen
  lexicon: HALOT
  rationale: The cardinal form functions ordinally in this enumerated context. 'The
    sixteenth' communicates the intended sequence of lots more clearly in English.
