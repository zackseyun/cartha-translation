id: 1CH.24.17
reference: 1 Chronicles 24:17
source:
  edition: WLC
  text: לְ/יָכִין֙ אֶחָ֣ד וְ/עֶשְׂרִ֔ים לְ/גָמ֖וּל שְׁנַ֥יִם וְ/עֶשְׂרִֽים׃
translation:
  text: for Jakin, the twenty-first; for Gamul, the twenty-second.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְ/יָכִין
  chosen: for Jakin
  alternatives:
  - belonging to Jakin
  - to Jakin
  lexicon: HALOT
  rationale: 'The preposition לְ in this roster context marks assignment by lot/order:
    ''for Jakin.'' The proper name is transliterated rather than translated, following
    the policy for personal names.'
- source_word: אֶחָד וְ/עֶשְׂרִים
  chosen: the twenty-first
  alternatives:
  - one and twenty
  - twenty-one
  lexicon: HALOT
  rationale: The Hebrew cardinal expression literally reads 'one and twenty' but in
    this ordinal listing of priestly divisions it functions idiomatically as the sequence
    number 'the twenty-first.' English ordinal style best conveys the list structure.
- source_word: לְ/גָמוּל
  chosen: for Gamul
  alternatives:
  - belonging to Gamul
  - to Gamul
  lexicon: HALOT
  rationale: As with the first clause, לְ marks the division assigned to this named
    house/order. The name is transliterated as 'Gamul' by standard convention.
- source_word: שְׁנַיִם וְ/עֶשְׂרִים
  chosen: the twenty-second
  alternatives:
  - two and twenty
  - twenty-two
  lexicon: HALOT
  rationale: 'Though formally cardinal (''two and twenty''), the sense in this enumerated
    list is ordinal: ''the twenty-second.'' Adding the article in English produces
    natural list syntax and reflects the implied ordinal force.'
