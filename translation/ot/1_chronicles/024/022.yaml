id: 1CH.24.22
reference: 1 Chronicles 24:22
source:
  edition: WLC
  text: לַ/יִּצְהָרִ֣י שְׁלֹמ֔וֹת לִ/בְנֵ֥י שְׁלֹמ֖וֹת יָֽחַת׃
translation:
  text: 'For the Izharite: Shelomoth; for the sons of Shelomoth: Jahath.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the Izharite.' The Hebrew preposition can be rendered either way
      in this administrative list; 'for' reflects the assignment sense in context.
    reason: lexical_alternative
  - marker: b
    text: '''Sons of'' may also function more broadly as ''descendants of'' in genealogical
      lists.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַיִּצְהָרִי
  chosen: For the Izharite
  alternatives:
  - To/for Izharite
  lexicon: HALOT
  rationale: The prefixed ל marks assignment within the priestly/Levitical divisions
    list, best rendered idiomatically as 'For.' The gentilic/noun from Izhar is rendered
    'Izharite' as a clan designation.
- source_word: שְׁלֹמוֹת
  chosen: Shelomoth
  alternatives:
  - Shelomot
  lexicon: HALOT
  rationale: Proper name, so transliterated rather than translated, following the
    project's policy for personal names.
- source_word: לִבְנֵי
  chosen: for the sons of
  alternatives:
  - for the descendants of
  - for the children of
  lexicon: HALOT
  rationale: 'בנים in genealogical/organizational contexts commonly means ''sons''
    and can extend to descendants, but here the formulaic listing is most naturally
    preserved as ''sons of.'' The prefixed ל again indicates assignment: ''for the
    sons of.'''
- source_word: שְׁלֹמוֹת
  chosen: Shelomoth
  alternatives:
  - Shelomot
  lexicon: HALOT
  rationale: Repeated proper name, consistently transliterated.
- source_word: יָחַת
  chosen: Jahath
  alternatives:
  - Yahath
  lexicon: HALOT
  rationale: Proper name, transliterated by standard English convention as 'Jahath.'
