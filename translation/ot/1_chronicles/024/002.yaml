id: 1CH.24.2
reference: 1 Chronicles 24:2
source:
  edition: WLC
  text: וַ/יָּ֨מָת נָדָ֤ב וַ/אֲבִיהוּא֙ לִ/פְנֵ֣י אֲבִי/הֶ֔ם וּ/בָנִ֖ים לֹא הָי֣וּ
    לָ/הֶ֑ם וַֽ/יְכַהֲנ֔וּ אֶלְעָזָ֖ר וְ/אִיתָמָֽר־׃
translation:
  text: But Nadab and Abihu died before their father, and they had no sons; so Eleazar
    and Ithamar served as priests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the presence of their father.' The Hebrew phrase can be understood
      spatially ('before/in the presence of') or temporally ('before,' that is, during
      their father’s lifetime).
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - was dead
  lexicon: HALOT
  rationale: The wayyiqtol of מוּת narrates a past event, best rendered with simple
    past 'died.'
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - during the lifetime of
  lexicon: HALOT
  rationale: Here לִפְנֵי with 'their father' most naturally means 'before' in the
    temporal sense, i.e., prior to their father’s death, though the spatial sense
    'in the presence of' is also possible and echoes the wording of Lev 10:1-2. Because
    the idiom can carry both senses, the main text keeps the concise traditional rendering
    and the alternative is preserved in a footnote.
- source_word: אֲבִיהֶם
  chosen: their father
  lexicon: HALOT
  rationale: Straightforward construct with 3mp suffix, referring to Aaron as the
    father of Nadab and Abihu.
- source_word: וּבָנִים לֹא הָיוּ לָהֶם
  chosen: they had no sons
  alternatives:
  - they had no children
  lexicon: HALOT
  rationale: בָּנִים specifically means 'sons,' not generic 'children.' Gender-accurate
    rendering is required by the translation philosophy.
- source_word: וַיְכַהֲנוּ
  chosen: served as priests
  alternatives:
  - ministered as priests
  - acted as priests
  - were priests
  lexicon: HALOT
  rationale: The piel of כָּהַן denotes performing priestly service. 'Served as priests'
    is clear modern English and preserves the verbal force better than the static
    'were priests.'
- source_word: אֶלְעָזָר וְאִיתָמָר
  chosen: Eleazar and Ithamar
  rationale: Personal names are transliterated by standard English conventions per
    project philosophy.
