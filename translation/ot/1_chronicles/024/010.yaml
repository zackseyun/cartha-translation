id: 1CH.24.10
reference: 1 Chronicles 24:10
source:
  edition: WLC
  text: לְ/הַקּוֹץ֙ הַ/שְּׁבִעִ֔י לַ/אֲבִיָּ֖ה הַ/שְּׁמִינִֽי׃
translation:
  text: the seventh to Hakkoz, the eighth to Abijah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for Hakkoz … for Abijah.' The Hebrew preposition ל can be rendered either
      way in this assignment list.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַקּוֹץ
  chosen: to Hakkoz
  alternatives:
  - for Hakkoz
  lexicon: HALOT
  rationale: The prefixed ל marks assignment in the lot/order list. 'Hakkoz' is a
    personal name and is transliterated per translation philosophy. 'To' fits the
    idiom of apportionment in this roster context.
- source_word: הַשְּׁבִעִי
  chosen: the seventh
  alternatives:
  - seventh
  lexicon: HALOT
  rationale: Ordinal adjective with article, referring to the seventh division/order
    in the sequence. Retaining the article reflects the Hebrew form and the list style.
- source_word: לַאֲבִיָּה
  chosen: to Abijah
  alternatives:
  - for Abijah
  lexicon: HALOT
  rationale: The prefixed ל again marks assignment in the sequence of priestly divisions.
    'Abijah' is the standard English transliteration of the personal name אֲבִיָּה.
- source_word: הַשְּׁמִינִי
  chosen: the eighth
  alternatives:
  - eighth
  lexicon: HALOT
  rationale: Ordinal adjective with article, parallel to 'the seventh,' indicating
    the eighth division/order in the list.
