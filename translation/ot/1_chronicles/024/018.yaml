id: 1CH.24.18
reference: 1 Chronicles 24:18
source:
  edition: WLC
  text: לִ/דְלָיָ֨הוּ֙ שְׁלֹשָׁ֣ה וְ/עֶשְׂרִ֔ים לְ/מַֽעַזְיָ֖הוּ אַרְבָּעָ֥ה וְ/עֶשְׂרִֽים׃פ
translation:
  text: for Delaiah, the twenty-third; for Maaziah, the twenty-fourth.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לִ/דְלָיָהוּ
  chosen: for Delaiah
  alternatives:
  - to Delaiah
  - belonging to Delaiah
  lexicon: HALOT
  rationale: The prefixed ל marks assignment within the list of priestly divisions/lots.
    In English, 'for Delaiah' best conveys the allotment sense in this enumerative
    context while preserving the name by transliteration.
- source_word: שְׁלֹשָׁה וְ/עֶשְׂרִים
  chosen: the twenty-third
  alternatives:
  - twenty-three
  - the third and twentieth
  lexicon: HALOT
  rationale: The Hebrew cardinal construction literally reads 'three and twenty,'
    but in this context it denotes ordinal sequence in the roster of divisions. English
    idiom is best served by the ordinal 'the twenty-third.'
- source_word: לְ/מַעַזְיָהוּ
  chosen: for Maaziah
  alternatives:
  - to Maaziah
  - belonging to Maaziah
  lexicon: HALOT
  rationale: As with the first name, the prefixed ל indicates assignment of the division/lot.
    'For Maaziah' is the clearest natural English rendering in this list format. The
    personal name is transliterated rather than translated, per project philosophy.
- source_word: אַרְבָּעָה וְ/עֶשְׂרִים
  chosen: the twenty-fourth
  alternatives:
  - twenty-four
  - the fourth and twentieth
  lexicon: HALOT
  rationale: Though formally a cardinal expression ('four and twenty'), the sense
    in the sequence is ordinal. 'The twenty-fourth' communicates the function of the
    number in context.
