id: 1CH.9.23
reference: 1 Chronicles 9:23
source:
  edition: WLC
  text: וְ/הֵ֨ם וּ/בְנֵי/הֶ֜ם עַל הַ/שְּׁעָרִ֧ים לְ/בֵית יְהוָ֛ה לְ/בֵ֥ית הָ/אֹ֖הֶל לְ/מִשְׁמָרֽוֹת־־־׃
translation:
  text: They and their sons were over the gates of the house of Yahweh, that is, the house of the tent, as guards.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the house of the tabernacle.'' Hebrew: ''the house of the tent.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵם
  chosen: They
  alternatives:
  - And they
  lexicon: HALOT
  rationale: The conjunction plus pronoun introduces the subject resumptively. English reads naturally with 'They' rather than retaining an initial 'And,' while preserving the referential force.
- source_word: וּבְנֵיהֶם
  chosen: and their sons
  alternatives:
  - and their children
  lexicon: HALOT
  rationale: בנים here refers specifically to male descendants in a hereditary gatekeeping role, so 'sons' is more accurate than the broader 'children,' in keeping with the gender-accurate policy.
- source_word: עַל הַשְּׁעָרִים
  chosen: were over the gates
  alternatives:
  - were in charge of the gates
  - were at the gates
  lexicon: HALOT
  rationale: The preposition עַל with this administrative context indicates oversight/responsibility, not merely location. 'Were over the gates' preserves the formal sense while remaining understandable.
- source_word: לְבֵית יְהוָה
  chosen: of the house of the LORD
  alternatives:
  - for the house of the LORD
  - at the house of the LORD
  lexicon: HALOT
  rationale: The phrase identifies the gates as belonging to the temple complex. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrinal guideline for the divine name.
- source_word: לְבֵית הָאֹהֶל
  chosen: the house of the tent
  alternatives:
  - the house of the tabernacle
  - the temple, that is, the tent-house
  lexicon: HALOT
  rationale: Formally, the Hebrew is 'the house of the tent.' This likely reflects continuity between temple gatekeepers and the earlier tent sanctuary. 'House of the tent' preserves the wording without over-interpreting; 'tabernacle' is a possible interpretive alternative preserved in a footnote.
- source_word: לְמִשְׁמָרוֹת
  chosen: as guards
  alternatives:
  - for watches
  - for guard duties
  - according to divisions of guard duty
  lexicon: HALOT
  rationale: The noun denotes guard service/watch responsibilities. 'As guards' gives clear modern English and fits the predicate sense of the clause, while avoiding an overly wooden 'for watches.'
