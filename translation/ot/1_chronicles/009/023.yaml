theological_decisions:
- issue: Relation of 'house of the LORD' and 'house of the tent'
  chosen_reading: Treat the second phrase as an appositional/clarifying designation, preserving both expressions in translation.
  alternative_readings:
  - Treat 'house of the tent' as simply 'tabernacle'
  - Treat the phrases as two distinct locations
  rationale: The verse likely reflects the Chronicler's linkage of present temple service with earlier tent-sanctuary patterns. Rendering both phrases preserves that tension rather than collapsing them into a single interpretive term or separating them into unrelated sites.
  doctrine_reference: Preserve theological tension rather than resolve it.
