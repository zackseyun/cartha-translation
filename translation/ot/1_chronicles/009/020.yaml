id: 1CH.9.20
reference: 1 Chronicles 9:20
source:
  edition: WLC
  text: וּ/פִֽינְחָ֣ס בֶּן אֶלְעָזָ֗ר נָגִ֨יד הָיָ֧ה עֲלֵי/הֶ֛ם לְ/פָנִ֖ים יְהוָ֥ה עִמּֽ/וֹ־׀׃
translation:
  text: And Phinehas son of Eleazar had formerly been chief over them; Yahweh was with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Phinehas son of Eleazar was chief over them formerly.' The Hebrew order allows the temporal term 'formerly' to be connected closely either with 'had been chief' or with the whole clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפִינְחָס
  chosen: And Phinehas
  alternatives:
  - Now Phinehas
  - Phinehas
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention. The prefixed conjunction is rendered 'And' to maintain the narrative linkage.
- source_word: בֶּן אֶלְעָזָר
  chosen: son of Eleazar
  alternatives:
  - the son of Eleazar
  lexicon: HALOT
  rationale: Standard genealogical construction; concise English preserves the Hebrew relationship.
- source_word: נָגִיד
  chosen: chief
  alternatives:
  - leader
  - ruler
  - overseer
  lexicon: HALOT
  rationale: נָגִיד denotes one in a leading or ruling position. 'Chief' fits the cultic-administrative context here without overstating royal connotations that 'ruler' might suggest.
- source_word: הָיָה
  chosen: had been
  alternatives:
  - was
  - became
  lexicon: HALOT
  rationale: The qatal with the following לְפָנִים naturally points to a prior state ('formerly had been'), not merely a simple present-like 'was' in English.
- source_word: עֲלֵיהֶם
  chosen: over them
  alternatives:
  - in charge of them
  - over these
  lexicon: HALOT
  rationale: The preposition על with pronominal suffix indicates authority or supervision over the previously mentioned gatekeepers/Levites.
- source_word: לְפָנִים
  chosen: formerly
  alternatives:
  - previously
  - beforetime
  - in former times
  lexicon: HALOT
  rationale: In this idiom לְפָנִים functions adverbially, referring to an earlier time. 'Formerly' is natural modern English and captures the temporal sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עִמּוֹ
  chosen: was with him
  alternatives:
  - was with him in support
  - was with him
  lexicon: HALOT
  rationale: The phrase expresses divine presence/favor. The simple rendering 'was with him' preserves the theological weight without interpretive expansion.
