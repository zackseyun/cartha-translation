id: 1CH.9.19
reference: 1 Chronicles 9:19
source:
  edition: WLC
  text: וְ/שַׁלּ֣וּם בֶּן ק֠וֹרֵא בֶּן אֶבְיָסָ֨ף בֶּן קֹ֜רַח וְֽ/אֶחָ֧י/ו לְ/בֵית אָבִ֣י/ו הַ/קָּרְחִ֗ים עַ֚ל מְלֶ֣אכֶת הָ/עֲבוֹדָ֔ה שֹׁמְרֵ֥י הַ/סִּפִּ֖ים לָ/אֹ֑הֶל וַ/אֲבֹֽתֵי/הֶם֙ עַל מַחֲנֵ֣ה יְהוָ֔ה שֹׁמְרֵ֖י הַ/מָּבֽוֹא־־־־־׃
translation:
  text: And Shallum son of Kore, son of Ebiasaph, son of Korah, and his brothers from his father’s house, the Korahites, were over the work of the service, keepers of the thresholds of the tent; and their fathers had been over the camp of Yahweh, keepers of the entrance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'keepers of the gates of the tent.' The Hebrew literally says 'keepers of the thresholds of the tent.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: alternative_reading
lexical_decisions:
- source_word: וְשַׁלּוּם
  chosen: And Shallum
  alternatives:
  - Now Shallum
  lexicon: HALOT
  rationale: The prefixed conjunction links this verse to the preceding list. 'And' preserves the simple narrative continuation without adding interpretive force.
- source_word: בֶּן ... בֶּן ... בֶּן
  chosen: son of ... son of ... son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The repeated genealogical formula is retained formally because the verse presents a lineage, not merely general descent.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: The Hebrew is the ordinary masculine plural 'brothers.' In this clan context it can imply male relatives, but 'brothers' best preserves the source wording and the gender-accurate policy.
- source_word: לְבֵית אָבִיו
  chosen: from his father’s house
  alternatives:
  - of his ancestral house
  - belonging to his father’s house
  lexicon: HALOT
  rationale: This phrase denotes clan/family affiliation. 'From his father’s house' is natural English while preserving the household-lineage sense.
- source_word: הַקָּרְחִים
  chosen: the Korahites
  alternatives:
  - the Korah clan
  lexicon: HALOT
  rationale: The gentilic/plural form refers to members of the Korahite line. 'Korahites' is the standard and precise English rendering.
- source_word: עַל מְלֶאכֶת הָעֲבוֹדָה
  chosen: were over the work of the service
  alternatives:
  - were in charge of the work of the service
  - were responsible for the work of the ministry
  lexicon: HALOT
  rationale: עַל here marks responsibility or oversight. 'Were over' is concise and close to the Hebrew; 'service' is preferred over 'ministry' to avoid importing later ecclesial connotations.
- source_word: שֹׁמְרֵי
  chosen: keepers of
  alternatives:
  - guardians of
  - those guarding
  lexicon: HALOT
  rationale: The participle denotes an ongoing guarding/keeping role. 'Keepers of' works idiomatically in this gatekeeping context and matches the repeated structure in the verse.
- source_word: הַסִּפִּים
  chosen: the thresholds
  alternatives:
  - the doorposts
  - the gates
  lexicon: HALOT
  rationale: The noun refers literally to thresholds/sills. In context of sanctuary access it can be associated with gatekeeping, but 'thresholds' preserves the concrete Hebrew image better than the broader 'gates'.
- source_word: לָאֹהֶל
  chosen: of the tent
  alternatives:
  - of the tabernacle
  - for the tent
  lexicon: HALOT
  rationale: The Hebrew is simply 'the tent.' Since the wilderness sanctuary imagery is in view, 'tabernacle' is possible, but 'tent' better reflects the actual lexical form and allows the historical allusion to remain implicit.
- source_word: וַאֲבֹתֵיהֶם
  chosen: and their fathers had been
  alternatives:
  - and their fathers were
  - and their ancestors had been
  lexicon: HALOT
  rationale: The clause looks back to an earlier pattern of duty. 'Their fathers' preserves the familial language; the English pluperfect 'had been' makes the retrospective sense clear.
- source_word: עַל מַחֲנֵה יְהוָה
  chosen: over the camp of the LORD
  alternatives:
  - in charge of the camp of the LORD
  - over the LORD’s camp
  lexicon: HALOT
  rationale: מַחֲנֶה evokes the encampment of Israel in relation to the sanctuary. The divine name is rendered 'the LORD' per doctrine. 'Over' mirrors the earlier עַל construction of oversight.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַמָּבוֹא
  chosen: the entrance
  alternatives:
  - the entryway
  - the way in
  lexicon: HALOT
  rationale: The noun denotes the place of entry. 'Entrance' is clear, natural, and suitably concrete in parallel with 'thresholds'.
