theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make sanctuary terminology more interpretive
  chosen_reading: tent
  alternative_readings:
  - tabernacle
  rationale: The Hebrew says 'tent.' Although the referent is the sanctuary, the translation avoids importing a more technical term unless the source itself uses it.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy over translation tradition
