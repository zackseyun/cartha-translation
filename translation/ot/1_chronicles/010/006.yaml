theological_decisions:
- issue: Scope of 'all his house'
  chosen_reading: Retain 'all his house' in the main text without narrowing it to
    every member of Saul's extended family.
  alternative_readings:
  - all his household
  - all his family
  rationale: The phrase should not be expanded into a universal claim about every
    relative of Saul, since the immediate context concerns those who fell with him.
    Keeping 'house' preserves the Hebrew's breadth and avoids importing a more precise
    historical claim than the text itself states.
  doctrine_reference: Translation philosophy §1, §3, §5
