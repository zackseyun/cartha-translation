id: 1CH.10.6
reference: 1 Chronicles 10:6
source:
  edition: WLC
  text: וַ/יָּ֤מָת שָׁאוּל֙ וּ/שְׁלֹ֣שֶׁת בָּנָ֔י/ו וְ/כָל בֵּית֖/וֹ יַחְדָּ֥ו מֵֽתוּ־׃
translation:
  text: So Saul died, and his three sons; and all his house died together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all his household' or 'all his family.' The Hebrew says 'all his house,'
      which can refer to a household or family line rather than a physical building.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: So Saul died
  alternatives:
  - And Saul died
  - Then Saul died
  lexicon: HALOT
  rationale: Wayyiqtol of מוּת advances the narrative. 'So' reflects the resultative/narrative
    continuation naturally in English without overformal repetition of 'and.' The
    verb itself is simply 'died.'
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Standard English transliteration of the personal name.
- source_word: וּשְׁלֹשֶׁת בָּנָיו
  chosen: and his three sons
  alternatives:
  - and the three sons of his
  - and three of his sons
  lexicon: HALOT
  rationale: Construct phrase with numeral plus noun and 3ms suffix means 'his three
    sons.' The wording indicates the three sons already in view from the context,
    but English does not require the article.
- source_word: וְכָל בֵּיתוֹ
  chosen: and all his house
  alternatives:
  - and all his household
  - and all his family
  lexicon: HALOT
  rationale: בַּיִת/בֵּית can mean literal house, household, or dynastic/familial
    house. Here it refers to Saul's house as his household/family line associated
    with him in the battle narrative. 'House' preserves the Hebrew term and its broader
    range better than the more interpretive 'family.'
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - altogether
  lexicon: HALOT
  rationale: Adverb meaning 'together.' It modifies the collective death of Saul,
    his sons, and his house.
- source_word: מֵתוּ
  chosen: died
  alternatives:
  - were dead
  lexicon: HALOT
  rationale: Qal perfect 3cp of מוּת here is best rendered as simple past 'died.'
    Repeating 'died' in English preserves the Hebrew emphasis and structure.
