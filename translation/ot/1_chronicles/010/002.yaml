id: 1CH.10.2
reference: 1 Chronicles 10:2
source:
  edition: WLC
  text: וַ/יַּדְבְּק֣וּ פְלִשְׁתִּ֔ים אַחֲרֵ֥י שָׁא֖וּל וְ/אַחֲרֵ֣י בָנָ֑י/ו וַ/יַּכּ֣וּ
    פְלִשְׁתִּ֗ים אֶת יוֹנָתָ֧ן וְ/אֶת אֲבִינָדָ֛ב וְ/אֶת מַלְכִּי שׁ֖וּעַ בְּנֵ֥י
    שָׁאֽוּל־־־־׃
translation:
  text: And the Philistines pressed hard after Saul and after his sons, and the Philistines
    struck down Jonathan, Abinadab, and Malchi-shua, the sons of Saul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pursued Saul and his sons closely.' The Hebrew verb literally has the
      sense of 'clinging' and here describes relentless pursuit in battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּדְבְּקוּ
  chosen: pressed hard after
  alternatives:
  - pursued closely
  - overtook
  - clung to
  lexicon: HALOT
  rationale: The verb דבק literally means 'cling/stick,' but with אַחֲרֵי in a battle
    narrative it idiomatically conveys close pursuit or pressing hard upon someone.
    'Pressed hard after' preserves the intensity better than the flatter 'pursued.'
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - behind
  - in pursuit of
  lexicon: HALOT
  rationale: The preposition is literally 'after/behind.' In English, 'after' works
    naturally with the chosen verbal idiom 'pressed hard after' and keeps the pursuit
    sense.
- source_word: בָנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically denotes male offspring, and the following names
    confirm this. 'Sons' is gender-accurate and contextually precise.
- source_word: וַיַּכּוּ
  chosen: struck down
  alternatives:
  - killed
  - smote
  - defeated
  lexicon: HALOT
  rationale: נכה is a broad verb meaning 'strike, smite, strike down.' In this military
    context, and given the immediate narrative outcome, 'struck down' is both accurate
    and readable, without over-paraphrasing. 'Killed' is possible but slightly more
    interpretive than the Hebrew verb itself.
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration of the people-group name; repeated in both clauses
    in Hebrew, so retained in English rather than replaced with a pronoun, preserving
    the narrative emphasis.
- source_word: יוֹנָתָן
  chosen: Jonathan
  rationale: Standard English transliteration of the personal name.
- source_word: אֲבִינָדָב
  chosen: Abinadab
  rationale: Standard English transliteration of the personal name.
- source_word: מַלְכִּי שׁוּעַ
  chosen: Malchi-shua
  alternatives:
  - Malchishua
  rationale: Standard transliteration of the compound personal name. The hyphen helps
    reflect the two-part Hebrew form while remaining readable in English.
- source_word: בְּנֵי שָׁאוּל
  chosen: the sons of Saul
  alternatives:
  - Saul's sons
  lexicon: HALOT
  rationale: The appositional phrase identifies the named men. 'The sons of Saul'
    is slightly more formal and mirrors the Hebrew structure closely.
