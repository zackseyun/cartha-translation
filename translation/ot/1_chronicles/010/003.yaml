id: 1CH.10.3
reference: 1 Chronicles 10:3
source:
  edition: WLC
  text: וַ/תִּכְבַּ֤ד הַ/מִּלְחָמָה֙ עַל שָׁא֔וּל וַ/יִּמְצָאֻ֖/הוּ הַ/מּוֹרִ֣ים בַּ/קָּ֑שֶׁת
    וַ/יָּ֖חֶל מִן הַ/יּוֹרִֽים־־׃
translation:
  text: The battle grew heavy against Saul, and the archers found him, and he was
    badly wounded by the archers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he was in great anguish because of the archers.' The Hebrew verb can
      be understood as severe distress rather than physical wounding.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּכְבַּד
  chosen: grew heavy
  alternatives:
  - became severe
  - pressed hard
  lexicon: HALOT
  rationale: The verb כבד literally denotes becoming heavy. In battle context it idiomatically
    conveys intensification or severe pressure. 'Grew heavy' preserves the Hebrew
    image while remaining natural in English.
- source_word: הַמִּלְחָמָה עַל שָׁאוּל
  chosen: The battle ... against Saul
  alternatives:
  - the fighting ... against Saul
  - the battle ... upon Saul
  lexicon: HALOT
  rationale: עַל with a hostile sense is naturally rendered 'against.' 'Battle' is
    the straightforward rendering of מִלְחָמָה here.
- source_word: וַיִּמְצָאֻהוּ
  chosen: found him
  alternatives:
  - overtook him
  - came upon him
  lexicon: HALOT
  rationale: מצא commonly means 'find.' In military narrative it can imply catching
    up with or reaching someone, but 'found him' is both literal and idiomatic.
- source_word: הַמּוֹרִים בַּקָּשֶׁת
  chosen: the archers
  alternatives:
  - the shooters with the bow
  - the bowmen
  lexicon: HALOT
  rationale: The participial phrase literally means 'those shooting with the bow.'
    English compresses this naturally to 'the archers.'
- source_word: וַיָּחֶל
  chosen: he was badly wounded
  alternatives:
  - he was wounded
  - he trembled greatly
  - he was in anguish
  lexicon: HALOT
  rationale: The verb חלל/חול in this form is difficult and has been understood either
    as physical wounding or severe distress. In this context, parallel to 1 Samuel
    31:3 and followed by Saul's fear of abuse, 'he was badly wounded' best fits the
    narrative flow and common interpretation.
- source_word: מִן הַיּוֹרִים
  chosen: by the archers
  alternatives:
  - because of the shooters
  - from the shooters
  lexicon: HALOT
  rationale: מן here marks source or agency. English idiom prefers 'by the archers'
    after a passive-like rendering.
