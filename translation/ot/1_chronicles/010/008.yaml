id: 1CH.10.8
reference: 1 Chronicles 10:8
source:
  edition: WLC
  text: וַ/יְהִי֙ מִֽ/מָּחֳרָ֔ת וַ/יָּבֹ֣אוּ פְלִשְׁתִּ֔ים לְ/פַשֵּׁ֖ט אֶת הַֽ/חֲלָלִ֑ים
    וַֽ/יִּמְצְא֤וּ אֶת שָׁאוּל֙ וְ/אֶת בָּנָ֔י/ו נֹפְלִ֖ים בְּ/הַ֥ר גִּלְבֹּֽעַ־־־׃
translation:
  text: Now it happened on the next day that the Philistines came to strip the slain,
    and they found Saul and his sons fallen on Mount Gilboa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the following day.'
    reason: lexical_alternative
  - marker: b
    text: The verb 'strip' refers to removing spoil such as armor or clothing from
      the battle dead.
    reason: cultural_note
lexical_decisions:
- source_word: מִמָּחֳרָת
  chosen: on the next day
  alternatives:
  - on the following day
  - the next day
  lexicon: HALOT
  rationale: Temporal expression meaning the day after the battle events just narrated.
    'On the next day' is natural English and preserves the sequence.
- source_word: לְפַשֵּׁט
  chosen: to strip
  alternatives:
  - to plunder
  - to strip off
  lexicon: HALOT
  rationale: The verb commonly refers to stripping garments/armor from bodies. 'To
    strip' is more precise than the broader 'to plunder' in this battlefield context.
- source_word: הַחֲלָלִים
  chosen: the slain
  alternatives:
  - the dead
  - the corpses
  lexicon: HALOT
  rationale: Refers specifically to those killed in battle. 'The slain' preserves
    the martial sense better than the more general 'the dead.'
- source_word: נֹפְלִים
  chosen: fallen
  alternatives:
  - lying dead
  - having fallen
  lexicon: HALOT
  rationale: The participle literally means 'fallen' and in battle narrative idiom
    denotes those struck down. 'Fallen' preserves the Hebrew imagery and avoids over-paraphrase.
- source_word: בְּהַר גִּלְבֹּעַ
  chosen: on Mount Gilboa
  alternatives:
  - in the hill country of Gilboa
  lexicon: HALOT
  rationale: Standard rendering of the place name phrase; 'Mount Gilboa' is idiomatic
    English for the named mountain.
- source_word: וַיְהִי
  chosen: Now it happened
  alternatives:
  - And it happened
  - It came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol formula marking continuation. 'Now it happened' is
    readable modern English without archaic tone, while still signaling narrative
    progression.
