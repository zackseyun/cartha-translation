theological_decisions:
- issue: Rendering Saul's feared treatment by the Philistines
  chosen_reading: and abuse me
  alternative_readings:
  - and make sport of me
  - and mistreat me
  - and deal shamefully with me
  rationale: The Hebrew indicates humiliating and likely violent mistreatment, but
    does not specify the exact form. The chosen rendering preserves the gravity without
    importing a more specific scenario than the text states.
  doctrine_reference: Translation philosophy §1, §3
