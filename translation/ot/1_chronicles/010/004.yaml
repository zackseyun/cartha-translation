id: 1CH.10.4
reference: 1 Chronicles 10:4
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שָׁאוּל֩ אֶל נֹשֵׂ֨א כֵלָ֜י/ו שְׁלֹ֥ף חַרְבְּ/ךָ֣ וְ/דָקְרֵ֣/נִי
    בָ֗/הּ פֶּן יָבֹ֜אוּ הָ/עֲרֵלִ֤ים הָ/אֵ֨לֶּה֙ וְ/הִתְעַלְּלוּ בִ֔/י וְ/לֹ֤א אָבָה֙
    נֹשֵׂ֣א כֵלָ֔י/ו כִּ֥י יָרֵ֖א מְאֹ֑ד וַ/יִּקַּ֤ח שָׁאוּל֙ אֶת הַ/חֶ֔רֶב וַ/יִּפֹּ֖ל
    עָלֶֽי/הָ־׀־־ס־׃
translation:
  text: Then Saul said to his armor-bearer, “Draw your sword and thrust me through
    with it, lest these uncircumcised men come and abuse me.” But his armor-bearer
    was not willing, because he was very afraid. So Saul took the sword and fell on
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “and make sport of me,” “and mistreat me,” or “and deal shamefully with
      me.”
    reason: lexical_alternative
  - marker: b
    text: Literally “these uncircumcised ones.”
    reason: lexical_alternative
  - marker: c
    text: Or “thrust me through with it” could be rendered “pierce me with it” or
      “stab me with it.”
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹשֵׂא כֵלָיו
  chosen: his armor-bearer
  alternatives:
  - the one who carried his weapons
  - his weapons-bearer
  lexicon: HALOT
  rationale: The idiom literally means 'bearer of his equipment/weapons' and is conventionally
    but accurately rendered 'armor-bearer' in military context.
- source_word: שְׁלֹף
  chosen: Draw
  alternatives:
  - Pull out
  - Unsheathe
  lexicon: HALOT
  rationale: Imperative of שלף in sword context naturally means drawing a weapon from
    its sheath.
- source_word: וְדָקְרֵנִי בָהּ
  chosen: and thrust me through with it
  alternatives:
  - and pierce me with it
  - and stab me with it
  lexicon: HALOT
  rationale: דקר denotes piercing or running through with a weapon. 'Thrust me through'
    fits the martial setting and the fatal intent more idiomatically than the more
    general 'stab me.'
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that ... not
  lexicon: HALOT
  rationale: Introduces Saul's feared outcome. 'Lest' is concise and preserves the
    warning nuance.
- source_word: הָעֲרֵלִים הָאֵלֶּה
  chosen: these uncircumcised men
  alternatives:
  - these uncircumcised ones
  - these Philistines
  lexicon: HALOT
  rationale: The text says 'these uncircumcised [ones],' a polemical ethnic-religious
    designation. 'Men' makes natural English without importing 'Philistines,' though
    they are contextually implied.
- source_word: וְהִתְעַלְּלוּ בִי
  chosen: and abuse me
  alternatives:
  - and make sport of me
  - and mistreat me
  - and deal shamefully with me
  lexicon: HALOT
  rationale: The hitpael of עלל here conveys abusive, humiliating treatment. 'Abuse
    me' is broad enough to preserve the threat of degrading violence without over-specifying
    the form.
- source_word: וְלֹא אָבָה
  chosen: was not willing
  alternatives:
  - refused
  - was unwilling
  lexicon: HALOT
  rationale: אָבָה means to be willing/consent. 'Was not willing' stays close to the
    Hebrew while reading naturally.
- source_word: כִּי יָרֵא מְאֹד
  chosen: because he was very afraid
  alternatives:
  - for he feared greatly
  - because he was terrified
  lexicon: HALOT
  rationale: This gives the stated reason for the armor-bearer's refusal. 'Very afraid'
    is transparent and faithful to the adverbial intensification.
- source_word: וַיִּפֹּל עָלֶיהָ
  chosen: fell on it
  alternatives:
  - threw himself on it
  lexicon: HALOT
  rationale: Literally 'fell upon it,' referring to the sword. 'Fell on it' is the
    direct rendering; 'threw himself on it' is interpretive and slightly more expansive.
