id: 1CH.10.12
reference: 1 Chronicles 10:12
source:
  edition: WLC
  text: וַ/יָּקוּמוּ֮ כָּל אִ֣ישׁ חַיִל֒ וַ/יִּשְׂא֞וּ אֶת גּוּפַ֣ת שָׁא֗וּל וְ/אֵת֙
    גּוּפֹ֣ת בָּנָ֔י/ו וַ/יְבִיא֖וּ/ם יָבֵ֑ישָׁ/ה וַ/יִּקְבְּר֨וּ אֶת עַצְמוֹתֵי/הֶ֜ם
    תַּ֤חַת הָ/אֵלָה֙ בְּ/יָבֵ֔שׁ וַ/יָּצ֖וּמוּ שִׁבְעַ֥ת יָמִֽים־־־׃
translation:
  text: Then all the valiant men arose and carried away the body of Saul and the bodies
    of his sons, and brought them to Jabesh. They buried their bones under the oak
    in Jabesh and fasted seven days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under the terebinth.' The Hebrew אֵלָה can refer to a large tree of
      the terebinth/oak type.
    reason: lexical_alternative
  - marker: b
    text: The broader narrative identifies the location as Jabesh-gilead; here the
      Hebrew text abbreviates it to 'Jabesh.'
    reason: cross_reference
lexical_decisions:
- source_word: כָּל אִישׁ חַיִל
  chosen: all the valiant men
  alternatives:
  - every mighty man
  - all the men of valor
  lexicon: HALOT
  rationale: אִישׁ חַיִל is a stock expression for men characterized by strength,
    courage, or military worth. 'Valiant men' is natural modern English and preserves
    the martial-honor sense better than a wooden singular 'every man of valor.'
- source_word: גּוּפַת ... גּוּפֹת
  chosen: the body of Saul and the bodies of his sons
  alternatives:
  - corpse of Saul and corpses of his sons
  - body ... bodies
  lexicon: HALOT
  rationale: גּוּפָה refers to a dead body/corpse. 'Body/bodies' is readable English
    and sufficiently clear in context; 'corpse/corpses' is possible but harsher than
    needed here.
- source_word: וַיִּשְׂאוּ
  chosen: carried away
  alternatives:
  - lifted up
  - carried
  lexicon: HALOT
  rationale: נשא here denotes physically bearing the bodies away from the battlefield
    setting. 'Carried away' captures both the lifting and removal.
- source_word: וַיְבִיאוּם יָבֵישָׁה
  chosen: brought them to Jabesh
  alternatives:
  - brought them to Jabesh-gilead
  lexicon: HALOT
  rationale: The Hebrew text here has 'to Jabesh.' Since the place is identifiable
    as Jabesh-gilead from the broader narrative, that fuller form could be supplied,
    but the translation follows the wording of this verse itself and keeps the shorter
    toponym.
- source_word: עַצְמוֹתֵיהֶם
  chosen: their bones
  alternatives:
  - their remains
  lexicon: HALOT
  rationale: עֶצֶם literally means 'bone.' Because the verse says they carried the
    bodies and then buried the bones, the wording likely reflects treatment of the
    remains after recovery. 'Bones' preserves the concrete Hebrew rather than smoothing
    to 'remains.'
- source_word: תַּחַת הָאֵלָה
  chosen: under the oak
  alternatives:
  - under the terebinth
  - under the great tree
  lexicon: HALOT
  rationale: אֵלָה can denote a terebinth or oak-like large tree. 'Oak' is idiomatic
    and familiar English; the more botanically specific 'terebinth' is possible but
    less accessible. The lexical uncertainty is worth preserving in a footnote.
- source_word: וַיָּצֻמוּ שִׁבְעַת יָמִים
  chosen: and fasted seven days
  alternatives:
  - and they fasted for seven days
  lexicon: HALOT
  rationale: Straightforward rendering of the mourning fast. Omitting 'for' keeps
    the line slightly closer to the Hebrew while remaining natural English.
