id: 1CH.10.1
reference: 1 Chronicles 10:1
source:
  edition: WLC
  text: וּ/פְלִשְׁתִּ֖ים נִלְחֲמ֣וּ בְ/יִשְׂרָאֵ֑ל וַ/יָּ֑נָס אִֽישׁ יִשְׂרָאֵל֙ מִ/פְּנֵ֣י
    פְלִשְׁתִּ֔ים וַ/יִּפְּל֥וּ חֲלָלִ֖ים בְּ/הַ֥ר גִּלְבֹּֽעַ־׃
translation:
  text: Now the Philistines fought against Israel, and the men of Israel fled from
    before the Philistines and fell slain on Mount Gilboa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'every man of Israel fled'; the singular 'man' functions collectively
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְלִשְׁתִּים
  chosen: Now the Philistines
  alternatives:
  - And the Philistines
  - The Philistines
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply as 'and,' but at the start of
    a new narrative unit 'now' gives natural English discourse flow without departing
    from the connective force. 'Philistines' is the standard transliteration of the
    people-group name.
- source_word: נִלְחֲמוּ בְיִשְׂרָאֵל
  chosen: fought against Israel
  alternatives:
  - made war against Israel
  - fought with Israel
  lexicon: HALOT
  rationale: The Niphal of לחם with ב commonly means 'to fight against/with.' In this
    hostile military context, 'fought against' makes the adversative sense explicit
    in idiomatic English.
- source_word: וַיָּנָס אִישׁ יִשְׂרָאֵל
  chosen: the men of Israel fled
  alternatives:
  - every man of Israel fled
  - the people of Israel fled
  lexicon: HALOT
  rationale: Although אִישׁ is singular in form, the expression functions collectively
    here. 'The men of Israel' preserves the masculine/gender-accurate wording and
    the distributive collective sense better than the more generic 'people of Israel.'
- source_word: מִפְּנֵי פְלִשְׁתִּים
  chosen: from before the Philistines
  alternatives:
  - before the Philistines
  - from the presence of the Philistines
  - from the Philistines
  lexicon: HALOT
  rationale: The idiom מִפְּנֵי literally means 'from before/from the presence of.'
    Rendering it 'from before' preserves the Hebrew flavor and the sense of retreat
    in the face of the enemy.
- source_word: וַיִּפְּלוּ חֲלָלִים
  chosen: fell slain
  alternatives:
  - fell dead
  - were struck down
  - fell as slain
  lexicon: HALOT
  rationale: The collocation of נפל with חֲלָלִים is a standard battle expression.
    'Fell slain' is concise, natural, and preserves the military sense better than
    the flatter 'died.'
- source_word: בְּהַר גִּלְבֹּעַ
  chosen: on Mount Gilboa
  alternatives:
  - in Mount Gilboa
  - on the mountain of Gilboa
  lexicon: HALOT
  rationale: הַר with a proper place name is idiomatically rendered 'Mount Gilboa'
    in English. 'On' fits the battlefield/topographical setting.
