id: 1CH.10.10
reference: 1 Chronicles 10:10
source:
  edition: WLC
  text: וַ/יָּשִׂ֨ימוּ֙ אֶת כֵּלָ֔י/ו בֵּ֖ית אֱלֹהֵי/הֶ֑ם וְ/אֶת גֻּלְגָּלְתּ֥/וֹ
    תָקְע֖וּ בֵּ֥ית דָּגֽוֹן־־׃ס
translation:
  text: They put his weapons in the house of their gods, and they fastened his skull
    in the house of Dagon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his head.' The Hebrew term can refer to the skull or head, but 'skull'
      more precisely reflects the noun used here.
    reason: lexical_alternative
  - marker: b
    text: Or 'the temple of their gods' / 'the temple of Dagon.' The Hebrew literally
      says 'house,' a common term for a deity's temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂימוּ
  chosen: They put
  alternatives:
  - They placed
  - They set
  lexicon: HALOT
  rationale: From שׂים, a common verb meaning to put/place/set. 'Put' is natural modern
    English and sufficiently formal here.
- source_word: כֵּלָיו
  chosen: his weapons
  alternatives:
  - his armor
  - his equipment
  - his articles
  lexicon: HALOT
  rationale: כְּלִי can denote articles, vessels, implements, or weapons. In the battle-death
    context of Saul and in parallel with 1 Samuel 31:10, 'weapons' best captures the
    likely referent without over-specifying a full suit of armor.
- source_word: בֵּית אֱלֹהֵיהֶם
  chosen: the house of their gods
  alternatives:
  - the temple of their gods
  lexicon: HALOT
  rationale: בַּיִת literally means 'house,' and in cultic context can refer to a
    temple. Rendering 'house' preserves the Hebrew wording while remaining clear in
    English.
- source_word: גֻּלְגָּלְתּוֹ
  chosen: his skull
  alternatives:
  - his head
  lexicon: HALOT
  rationale: The noun specifically denotes skull/head. 'Skull' is the more precise
    lexical equivalent and fits the grisly trophy context better than the broader
    'head.'
- source_word: תָקְעוּ
  chosen: they fastened
  alternatives:
  - they fixed
  - they drove in
  - they impaled
  lexicon: HALOT
  rationale: תקע commonly means to thrust, drive, or fasten. In this context of displaying
    Saul's remains in a shrine, 'fastened' communicates attachment/display without
    adding the stronger and less certain image of impalement.
- source_word: בֵּית דָּגוֹן
  chosen: the house of Dagon
  alternatives:
  - the temple of Dagon
  lexicon: HALOT
  rationale: As above, בֵּית is literally 'house.' Dagon is a proper divine name and
    should be transliterated, not translated.
