id: 1CH.10.11
reference: 1 Chronicles 10:11
source:
  edition: WLC
  text: וַֽ/יִּשְׁמְע֔וּ כֹּ֖ל יָבֵ֣ישׁ גִּלְעָ֑ד אֵ֛ת כָּל אֲשֶׁר עָשׂ֥וּ פְלִשְׁתִּ֖ים
    לְ/שָׁאֽוּל־־׃
translation:
  text: When all Jabesh-gilead heard all that the Philistines had done to Saul,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the inhabitants of Jabesh-gilead.' Hebrew literally, 'all Jabesh-gilead.'
    reason: lexical_alternative
  - marker: b
    text: Or 'what the Philistines had done against Saul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  chosen: When ... heard
  alternatives:
  - and ... heard
  - then ... heard
  lexicon: HALOT
  rationale: The waw-consecutive with שׁמע advances the narrative. In English, 'When
    ... heard' best prepares for the action continued in the next verse, reflecting
    the clause's temporal function in context rather than a simple coordinate 'and.'
- source_word: כֹּל יָבֵישׁ גִּלְעָד
  chosen: all Jabesh-gilead
  alternatives:
  - all the inhabitants of Jabesh-gilead
  - everyone in Jabesh-gilead
  lexicon: HALOT
  rationale: Literally 'all Jabesh-gilead.' In context this refers to the people of
    the town, not the geographic site abstractly. The more literal place-name construction
    is retained in the main text for transparency, while the sense is straightforward
    in English.
- source_word: אֵת כָּל אֲשֶׁר
  chosen: all that
  alternatives:
  - everything that
  lexicon: HALOT
  rationale: This common Hebrew construction introduces the totality of what was done.
    'All that' is natural, concise, and close to the source structure.
- source_word: עָשׂוּ
  chosen: had done
  alternatives:
  - did
  lexicon: HALOT
  rationale: 'English past perfect fits the narrative sequence: the hearing follows
    the Philistines'' prior actions. This clarifies temporal relation without adding
    content.'
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration of the people-group name.
- source_word: לְשָׁאוּל
  chosen: to Saul
  alternatives:
  - against Saul
  lexicon: HALOT
  rationale: The preposition ל with עשה can mark the person affected by the action.
    'To Saul' is the most direct rendering; 'against Saul' is interpretive and stronger
    than the Hebrew requires.
