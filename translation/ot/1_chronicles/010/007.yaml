id: 1CH.10.7
reference: 1 Chronicles 10:7
source:
  edition: WLC
  text: וַ֠/יִּרְאוּ כָּל אִ֨ישׁ יִשְׂרָאֵ֤ל אֲשֶׁר בָּ/עֵ֨מֶק֙ כִּ֣י נָ֔סוּ וְ/כִי
    מֵ֖תוּ שָׁא֣וּל וּ/בָנָ֑י/ו וַ/יַּעַזְב֤וּ עָרֵי/הֶם֙ וַ/יָּנֻ֔סוּ וַ/יָּבֹ֣אוּ
    פְלִשְׁתִּ֔ים וַ/יֵּשְׁב֖וּ בָּ/הֶֽם־־־׃ס
translation:
  text: When all the men of Israel who were in the valley saw that they had fled and
    that Saul and his sons were dead, they abandoned their cities and fled; then the
    Philistines came and lived in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plain' for 'valley.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'all the men of Israel,' using masculine language rather
      than a gender-neutral term.
    reason: lexical_alternative
  - marker: c
    text: Or 'settled in them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  chosen: saw
  alternatives:
  - realized
  lexicon: HALOT
  rationale: Basic sense of ראה is visual perception, and here it introduces what
    the Israelites observed about the battle's outcome. 'Saw' preserves the narrative
    concreteness better than the more interpretive 'realized.'
- source_word: כָּל אִישׁ יִשְׂרָאֵל
  chosen: all the men of Israel
  alternatives:
  - every man of Israel
  - all Israelite men
  lexicon: HALOT
  rationale: The singular אִישׁ after כָּל has a distributive force. Because the Hebrew
    is explicitly masculine and refers to the fighting/inhabiting male population
    in context, 'men' is more gender-accurate than a neutral 'people,' in keeping
    with the translation philosophy.
- source_word: אֲשֶׁר בָּעֵמֶק
  chosen: who were in the valley
  alternatives:
  - who were in the plain
  lexicon: HALOT
  rationale: עֵמֶק commonly denotes a valley. 'Plain' is possible in some contexts,
    but 'valley' is the more straightforward topographical rendering here.
- source_word: כִּי נָסוּ
  chosen: that they had fled
  alternatives:
  - that they fled
  - that Israel had fled
  lexicon: HALOT
  rationale: 'The clause reports what was seen: the rout had already occurred. English
    past perfect fits the narrative sequence. The subject is left implicit in Hebrew;
    ''they'' preserves that ambiguity without over-specifying.'
- source_word: וְכִי מֵתוּ שָׁאוּל וּבָנָיו
  chosen: and that Saul and his sons were dead
  alternatives:
  - and that Saul and his sons had died
  lexicon: HALOT
  rationale: The predicate adjective-like English 'were dead' naturally renders the
    stative/resultative sense in context, though 'had died' is also possible. It matches
    the observed battlefield condition.
- source_word: וַיַּעַזְבוּ עָרֵיהֶם
  chosen: they abandoned their cities
  alternatives:
  - they left their cities
  - they forsook their towns
  lexicon: HALOT
  rationale: עזב carries the sense of leaving behind or abandoning. 'Abandoned' best
    conveys the forced evacuation implied by the military context.
- source_word: וַיָּנֻסוּ
  chosen: and fled
  alternatives:
  - and ran away
  lexicon: HALOT
  rationale: נוס is the standard verb for fleeing. 'Fled' is concise and appropriately
    formal for narrative prose.
- source_word: וַיָּבֹאוּ פְלִשְׁתִּים
  chosen: then the Philistines came
  alternatives:
  - and the Philistines came
  lexicon: HALOT
  rationale: The waw-consecutive advances the sequence. 'Then' makes the progression
    clear in English without adding content.
- source_word: וַיֵּשְׁבוּ בָּהֶם
  chosen: and lived in them
  alternatives:
  - and settled in them
  - and dwelt in them
  lexicon: HALOT
  rationale: ישב often means to dwell or settle. 'Lived in them' is clear modern English;
    'settled in them' is also possible, but 'lived' keeps the focus on occupation
    of the abandoned cities.
