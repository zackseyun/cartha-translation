id: 1CH.10.14
reference: 1 Chronicles 10:14
source:
  edition: WLC
  text: וְ/לֹֽא דָרַ֥שׁ בַּֽ/יהוָ֖ה וַ/יְמִיתֵ֑/הוּ וַ/יַּסֵּב֙ אֶת הַ/מְּלוּכָ֔ה
    לְ/דָוִ֖יד בֶּן יִשָֽׁי־־־׃פ
translation:
  text: He did not seek the LORD, so he put him to death and turned the kingdom over
    to David son of Jesse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inquire of the LORD' or 'consult the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the kingdom'; alternatively 'the kingship.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דָרַשׁ בַּיהוָה
  chosen: seek the LORD
  alternatives:
  - inquire of the LORD
  - consult the LORD
  lexicon: HALOT
  rationale: דרש with ב plus a divine object commonly means to seek, inquire of, or
    consult. In this immediate context (following Saul's failure to seek proper guidance),
    'seek the LORD' is broad enough to include inquiry while preserving the covenantal
    and relational force of the Hebrew.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint tradition.
- source_word: וַיְמִיתֵהוּ
  chosen: he put him to death
  alternatives:
  - he killed him
  - he caused him to die
  lexicon: HALOT
  rationale: 'The Hiphil of מות is causative: ''caused him to die'' / ''put him to
    death.'' ''He put him to death'' preserves the causative force more clearly than
    the simpler ''he killed him'' while remaining natural English. The subject is
    understood from context as the LORD.'
- source_word: וַיַּסֵּב
  chosen: turned ... over
  alternatives:
  - transferred
  - turned
  - gave
  lexicon: HALOT
  rationale: סבב in the Hiphil can mean to turn, redirect, or transfer. With 'the
    kingdom' and a recipient marked by ל, 'turned ... over' captures the sense of
    causing the kingship to pass to another.
- source_word: הַמְּלוּכָה
  chosen: the kingdom
  alternatives:
  - the kingship
  - the royal rule
  lexicon: HALOT
  rationale: מְלוּכָה can denote kingship, reign, or kingdom. Here it refers to royal
    rule being transferred from Saul's house to David. 'Kingdom' is idiomatic and
    sufficiently broad, though 'kingship' is a viable alternative.
- source_word: לְדָוִיד בֶּן־יִשַׁי
  chosen: to David son of Jesse
  alternatives:
  - to David, the son of Jesse
  lexicon: HALOT
  rationale: Standard English appositional rendering of the Hebrew patronymic; no
    article is required in natural modern English.
