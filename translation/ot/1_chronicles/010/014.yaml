theological_decisions:
- issue: Agency in Saul's death
  chosen_reading: The verse attributes Saul's death ultimately to the LORD.
  alternative_readings:
  - The LORD allowed Saul to die rather than directly causing it
  rationale: The explicit subject of the consecutive verbs in context is the LORD,
    and the Hiphil verb 'put him to death' states divine agency without qualification.
    The translation preserves that wording rather than softening it to mere permission,
    while not expanding beyond the text into a theory of secondary causation.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
