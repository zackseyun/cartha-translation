id: 1CH.10.9
reference: 1 Chronicles 10:9
source:
  edition: WLC
  text: וַ/יַּ֨פְשִׁיטֻ֔/הוּ וַ/יִּשְׂא֥וּ אֶת רֹאשׁ֖/וֹ וְ/אֶת כֵּלָ֑י/ו וַ/יְשַׁלְּח֨וּ
    בְ/אֶֽרֶץ פְלִשְׁתִּ֜ים סָבִ֗יב לְ/בַשֵּׂ֛ר אֶת עֲצַבֵּי/הֶ֖ם וְ/אֶת הָ/עָֽם־־־־־׃
translation:
  text: They stripped him, took his head and his weapons, and sent messengers throughout
    the land of the Philistines to proclaim the news to their idols and to the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their images.' The Hebrew term can refer to idol-images; 'idols' is
      chosen because the context is cultic and polemical.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּפְשִׁיטֻהוּ
  chosen: They stripped him
  alternatives:
  - They stripped him of his armor
  - They undressed him
  lexicon: HALOT
  rationale: The verb פשט in this stem commonly means to strip off clothing or armor.
    Since the direct object is Saul himself and the next clause separately mentions
    his head and weapons, 'stripped him' is the most natural concise rendering; 'of
    his armor' is possible by context but not explicit in this clause.
- source_word: וַיִּשְׂאוּ אֶת רֹאשׁוֹ
  chosen: took his head
  alternatives:
  - carried off his head
  - lifted up his head
  lexicon: HALOT
  rationale: נשא literally means 'lift/carry/take.' In this war-plunder context, after
    decapitation implied by the parallel in Samuel, 'took his head' communicates seizure
    of the head as a trophy without overtranslating.
- source_word: כֵּלָיו
  chosen: his weapons
  alternatives:
  - his armor
  - his equipment
  - his gear
  lexicon: HALOT
  rationale: כְּלִי is a broad term for articles, vessels, implements, or weapons.
    In a battlefield context involving a fallen king, 'weapons' best fits the likely
    referent and avoids the narrower 'armor' unless context explicitly demands it.
- source_word: וַיְשַׁלְּחוּ
  chosen: sent messengers
  alternatives:
  - sent word
  - sent
  lexicon: HALOT
  rationale: The verb is simply 'sent,' but English requires an object or idiomatic
    completion in this context. Because the infinitive לְבַשֵּׂר indicates the purpose
    of announcing news around Philistine territory, 'sent messengers' makes the implied
    means explicit without changing the sense.
- source_word: בְאֶרֶץ פְלִשְׁתִּים סָבִיב
  chosen: throughout the land of the Philistines
  alternatives:
  - in the land of the Philistines all around
  - around the land of the Philistines
  lexicon: HALOT
  rationale: The phrase denotes circulation through Philistine territory in every
    direction. 'Throughout the land of the Philistines' is idiomatic modern English
    and captures סָבִיב adverbially.
- source_word: לְבַשֵּׂר
  chosen: to proclaim the news
  alternatives:
  - to announce
  - to bear news
  - to bring good news
  lexicon: HALOT
  rationale: בשר means to announce news; while often positive in other contexts, here
    it is triumphal proclamation of Saul's defeat. 'Proclaim the news' preserves the
    public-announcement force without implying positive gospel-like content.
- source_word: עֲצַבֵּיהֶם
  chosen: their idols
  alternatives:
  - their images
  - their carved idols
  lexicon: HALOT
  rationale: עצב can denote an idol/image, often with a pejorative sense in polemical
    contexts. 'Their idols' is the clearest English rendering and fits the Philistine
    cultic setting.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - their people
  - the populace
  lexicon: HALOT
  rationale: The Hebrew has the definite singular collective 'the people.' In context
    it refers to the Philistine populace generally. 'The people' preserves the form;
    adding 'their' would be interpretive, though contextually understandable.
