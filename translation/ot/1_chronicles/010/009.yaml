theological_decisions:
- issue: Rendering of עֲצַבֵּיהֶם in a cultic context
  chosen_reading: their idols
  alternative_readings:
  - their images
  rationale: The term refers to Philistine deities via their cult images. 'Idols'
    preserves the Hebrew Bible's negative evaluation of false gods/images without
    adding doctrinal content beyond the lexical force of the noun.
