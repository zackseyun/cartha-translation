id: 1CH.10.5
reference: 1 Chronicles 10:5
source:
  edition: WLC
  text: וַ/יַּ֥רְא נֹשֵֽׂא כֵלָ֖י/ו כִּ֣י מֵ֣ת שָׁא֑וּל וַ/יִּפֹּ֥ל גַּם ה֛וּא עַל
    הַ/חֶ֖רֶב וַ/יָּמֹֽת־־־׃ס
translation:
  text: When his armor-bearer saw that Saul was dead, he too fell on the sword and
    died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the bearer of his weapons.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'fell on the sword' is an idiom for killing oneself with a sword.
    reason: cultural_note
lexical_decisions:
- source_word: נֹשֵׂא כֵלָיו
  chosen: his armor-bearer
  alternatives:
  - the one carrying his weapons
  - his weapons-bearer
  lexicon: HALOT
  rationale: The construct phrase literally means 'the bearer of his equipment/weapons.'
    'Armor-bearer' is the established and accurate English equivalent in this military
    context, preserving the role rather than awkwardly translating each component
    separately.
- source_word: כִּי
  chosen: that
  alternatives:
  - when
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content perceived by the armor-bearer: he saw
    that Saul was dead. ''That'' best reflects the clause as object/complement of
    ''saw,'' while English smooths the sequence with initial ''When'' from the narrative
    context.'
- source_word: מֵת
  chosen: was dead
  alternatives:
  - had died
  - dead
  lexicon: HALOT
  rationale: The predicate adjective/participle states Saul's condition at the moment
    observed. 'Was dead' is the most natural English rendering after 'saw that,' though
    'had died' would also fit contextually.
- source_word: וַיִּפֹּל
  chosen: fell
  alternatives:
  - threw himself down
  lexicon: HALOT
  rationale: The verb נפל normally means 'fall.' In the idiom with 'on the sword,'
    English can retain the literal verb while allowing the context to convey suicide.
- source_word: גַּם הוּא
  chosen: he too
  alternatives:
  - also he
  - he also
  lexicon: HALOT
  rationale: This emphasizes that the armor-bearer followed Saul in death. 'He too'
    is concise, natural, and preserves the emphatic additive force.
- source_word: עַל הַחֶרֶב
  chosen: on the sword
  alternatives:
  - upon the sword
  - on his sword
  lexicon: HALOT
  rationale: The Hebrew literally says 'on the sword.' English preserves the idiom
    here, which in context clearly means falling upon a sword to die. 'His sword'
    is interpretive and not explicit in the Hebrew.
- source_word: וַיָּמֹת
  chosen: and died
  alternatives:
  - so he died
  lexicon: HALOT
  rationale: A straightforward rendering of the final wayyiqtol maintains the terse
    narrative sequence and confirms the result of the action.
