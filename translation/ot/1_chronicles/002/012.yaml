id: 1CH.2.12
reference: 1 Chronicles 2:12
source:
  edition: WLC
  text: וּ/בֹ֨עַז֙ הוֹלִ֣יד אֶת עוֹבֵ֔ד וְ/עוֹבֵ֖ד הוֹלִ֥יד אֶת יִשָֽׁי־־׃
translation:
  text: Boaz fathered Obed, and Obed fathered Jesse.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/בֹעַז
  chosen: Boaz
  lexicon: HALOT
  rationale: Proper name; transliterated according to standard English convention,
    following the translation philosophy to transliterate personal names.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogical contexts denotes causing to be born
    in the sense of siring/begetting. 'Fathered' is clear modern English and preserves
    the genealogical force better than the archaic 'begot.'
- source_word: אֶת
  chosen: '[not translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no natural English equivalent; its function
    is represented by English word order.
- source_word: עוֹבֵד
  chosen: Obed
  lexicon: HALOT
  rationale: Proper name; transliterated by standard English convention.
- source_word: וְ/עוֹבֵד
  chosen: and Obed
  lexicon: HALOT
  rationale: The conjunction ו is rendered 'and,' linking the next genealogical clause;
    the proper name remains transliterated.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: Repeated genealogical verb; rendered consistently with the first occurrence
    for clarity and term consistency.
- source_word: יִשָׁי
  chosen: Jesse
  alternatives:
  - Yishai
  lexicon: HALOT
  rationale: Proper name rendered by the standard established English form 'Jesse,'
    which is the conventional transliteration/anglicized form in biblical English
    and aids readability.
