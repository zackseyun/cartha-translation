id: 1CH.2.10
reference: 1 Chronicles 2:10
source:
  edition: WLC
  text: וְ/רָ֖ם הוֹלִ֣יד אֶת עַמִּינָדָ֑ב וְ/עַמִּינָדָב֙ הוֹלִ֣יד אֶת נַחְשׁ֔וֹן
    נְשִׂ֖יא בְּנֵ֥י יְהוּדָֽה־־׃
translation:
  text: Ram fathered Amminadab, and Amminadab fathered Nahshon, leader of the sons
    of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prince of the sons of Judah' or 'chief of the sons of Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In genealogical context, the Hiphil of ילד denotes begetting/fathering.
    'Fathered' is natural modern English and preserves the male genealogical sense
    better than the more wooden 'begot'.
- source_word: נְשִׂיא
  chosen: leader
  alternatives:
  - prince
  - chief
  - ruler
  lexicon: HALOT
  rationale: נָשִׂיא commonly denotes a lifted-up person, i.e., a leader, chief, or
    prince. Here it refers to Nahshon's recognized status among Judah. 'Leader' is
    clear modern English and avoids the potentially misleading monarchical nuance
    of 'prince'.
- source_word: בְּנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - the people of Judah
  - the descendants of Judah
  - the sons of Judah's clan
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Judah.' Per the translation philosophy,
    gender-accurate language is preferred where the source is masculine. In this genealogical
    setting, 'sons of Judah' also preserves the tribal/lineal framing better than
    the broader 'people of Judah'.
- source_word: רָם / עַמִּינָדָב / נַחְשׁוֹן
  chosen: Ram / Amminadab / Nahshon
  rationale: These are personal names, so they are transliterated rather than translated,
    following the stated philosophy.
