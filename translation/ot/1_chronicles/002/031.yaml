id: 1CH.2.31
reference: 1 Chronicles 2:31
source:
  edition: WLC
  text: וּ/בְנֵ֥י אַפַּ֖יִם יִשְׁעִ֑י וּ/בְנֵ֤י יִשְׁעִי֙ שֵׁשָׁ֔ן וּ/בְנֵ֥י שֵׁשָׁ֖ן
    אַחְלָֽי׃
translation:
  text: 'The sons of Appaim: Ishi; and the sons of Ishi: Sheshan; and the sons of
    Sheshan: Ahlai.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of' at each occurrence of 'sons of'; the Hebrew בני can
      denote lineage in genealogies, though 'sons of' is the more direct rendering
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: and the sons of
  alternatives:
  - and the descendants of
  - and the children of
  lexicon: HALOT
  rationale: בני in genealogical contexts commonly introduces direct offspring or
    lineage members. Here the repeated formula structures the genealogy. 'Sons of'
    is the most formally accurate rendering, while 'descendants of' would be more
    interpretive and broader than the Hebrew requires.
- source_word: אַפַּיִם
  chosen: Appaim
  alternatives:
  - Appayim
  lexicon: HALOT
  rationale: This is a personal name and should be transliterated rather than translated,
    following the project's policy for names. 'Appaim' is a standard English transliteration;
    'Appayim' is a possible closer representation of the Hebrew vowels.
- source_word: יִשְׁעִי
  chosen: Ishi
  alternatives:
  - Jishi
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention. 'Ishi' is the established
    English form for this Hebrew name in genealogical contexts.
- source_word: שֵׁשָׁן
  chosen: Sheshan
  lexicon: HALOT
  rationale: Proper name transliterated directly into standard English form.
- source_word: אַחְלָי
  chosen: Ahlai
  lexicon: HALOT
  rationale: Proper name transliterated directly. Although the name belongs to a person
    later discussed in the genealogy, this verse itself simply lists the name without
    further qualification.
