id: 1CH.2.43
reference: 1 Chronicles 2:43
source:
  edition: WLC
  text: וּ/בְנֵ֖י חֶבְר֑וֹן קֹ֥רַח וְ/תַפֻּ֖חַ וְ/רֶ֥קֶם וָ/שָֽׁמַע׃
translation:
  text: 'The sons of Hebron: Korah, Tappuah, Rekem, and Shema.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Shema; the name is sometimes represented as Shamma in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - The descendants of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons,' introducing a genealogy list.
    'The sons of' is the most direct and natural English rendering in this context.
    'Descendants of' is possible in genealogical usage, but here the immediate listing
    of named individuals favors the more literal 'sons of.' The prefixed conjunction
    is not separately represented because English genealogy style naturally begins
    the sentence without 'and.'
- source_word: חֶבְרוֹן
  chosen: Hebron
  lexicon: HALOT
  rationale: Proper personal name, transliterated according to the translation philosophy
    to transliterate names rather than translate them.
- source_word: קֹרַח
  chosen: Korah
  lexicon: HALOT
  rationale: Proper personal name, transliterated in standard English form.
- source_word: תַּפּוּחַ
  chosen: Tappuah
  lexicon: HALOT
  rationale: Proper personal name, transliterated rather than translated, even though
    the name is also the common noun for 'apple' in other contexts.
- source_word: רֶקֶם
  chosen: Rekem
  alternatives:
  - Rekem
  lexicon: HALOT
  rationale: Proper personal name, transliterated in a standard English form. Spelling
    reflects conventional representation of the Hebrew segol vowels.
- source_word: שָׁמַע
  chosen: Shema
  alternatives:
  - Shamma
  lexicon: HALOT
  rationale: Proper personal name, transliterated. 'Shema' closely reflects the consonantal
    form and common English convention. Because the vocalization could invite a slightly
    different English form, an alternative is worth preserving in a footnote.
