id: 1CH.2.50
reference: 1 Chronicles 2:50
source:
  edition: WLC
  text: אֵ֤לֶּה הָיוּ֙ בְּנֵ֣י כָלֵ֔ב בֶּן ח֖וּר בְּכ֣וֹר אֶפְרָ֑תָה שׁוֹבָ֕ל אֲבִ֖י
    קִרְיַ֥ת יְעָרִֽים־׃
translation:
  text: 'These were the sons of Caleb son of Hur, the firstborn of Ephrathah: Shobal,
    father of Kiriath-jearim.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'founder of Kiriath-jearim' or 'ancestor of Kiriath-jearim'; the Hebrew
      'father of' can denote a clan or settlement founder in genealogical contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - These are
  lexicon: HALOT
  rationale: Demonstrative plural introducing the genealogical notice. With the following
    perfect verb, English past-tense framing ('These were') is more natural than a
    present-tense formula.
- source_word: הָיוּ
  chosen: were
  alternatives:
  - are
  lexicon: HALOT
  rationale: Qal perfect 3cp of היה in a genealogical summary is best rendered as
    past tense in English narrative style.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - descendants of
  - children of
  lexicon: HALOT
  rationale: Although genealogies can sometimes use 'sons' more broadly for descendants,
    the Hebrew term is literally 'sons,' and no contextual pressure here requires
    a broader rendering in the main text.
- source_word: כָלֵב
  chosen: Caleb
  rationale: Standard English transliteration of the personal name.
- source_word: בֶּן חוּר
  chosen: son of Hur
  alternatives:
  - descendant of Hur
  lexicon: HALOT
  rationale: Construct chain identifying Caleb in relation to Hur. 'Son of' preserves
    the Hebrew form; while genealogical compression is possible, the text itself states
    'son of.'
- source_word: בְּכֹר אֶפְרָתָה
  chosen: the firstborn of Ephrathah
  alternatives:
  - Ephrathah's firstborn
  - the firstborn son of Ephrathah
  lexicon: HALOT
  rationale: 'The construct phrase most naturally modifies Hur: ''Hur, the firstborn
    of Ephrathah.'' In English, placing it after ''Hur'' preserves that linkage. ''Ephrathah''
    is retained as a proper name rather than interpreted.'
- source_word: שׁוֹבָל
  chosen: Shobal
  rationale: Standard English transliteration of the personal name.
- source_word: אֲבִי
  chosen: father of
  alternatives:
  - founder of
  - ancestor of
  lexicon: HALOT
  rationale: In genealogical and settlement contexts, אָב can denote a progenitor
    or founder associated with a town/clan. 'Father of' keeps the Hebrew idiom in
    the main text while remaining understandable.
- source_word: קִרְיַת יְעָרִים
  chosen: Kiriath-jearim
  alternatives:
  - Kiriath Jearim
  - City of Forests
  lexicon: HALOT
  rationale: This is a place name and should be transliterated rather than translated,
    per the translation philosophy for names. Hyphenation follows common English convention
    for the toponym.
