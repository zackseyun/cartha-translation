id: 1CH.2.22
reference: 1 Chronicles 2:22
source:
  edition: WLC
  text: וּ/שְׂג֖וּב הוֹלִ֣יד אֶת יָאִ֑יר וַֽ/יְהִי ל֗/וֹ עֶשְׂרִ֤ים וְ/שָׁלוֹשׁ֙ עָרִ֔ים
    בְּ/אֶ֖רֶץ הַ/גִּלְעָֽד־־׃
translation:
  text: Segub fathered Jair, and he had twenty-three cities in the land of Gilead.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogical contexts means to beget or father.
    'Fathered' is natural modern English and preserves the genealogical sense without
    archaic tone.
- source_word: יָאִיר
  chosen: Jair
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: וַיְהִי לוֹ
  chosen: and he had
  alternatives:
  - and there were to him
  - and it came to be his
  lexicon: HALOT
  rationale: The idiom היה + ל expresses possession here. 'And he had' is the clearest
    idiomatic English equivalent.
- source_word: עֶשְׂרִים וְשָׁלוֹשׁ
  chosen: twenty-three
  alternatives:
  - three and twenty
  lexicon: HALOT
  rationale: Modern English number style renders the Hebrew cardinal expression naturally
    as 'twenty-three.'
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: עִיר commonly denotes a city or town. 'Cities' is the standard rendering
    and fits the territorial notice in this genealogical summary.
- source_word: בְּאֶרֶץ הַגִּלְעָד
  chosen: in the land of Gilead
  alternatives:
  - in Gilead
  - in the territory of Gilead
  lexicon: HALOT
  rationale: אֶרֶץ with a place name often means land or territory. 'In the land of
    Gilead' preserves the full expression and geographic sense.
- source_word: וּשְׂגוּב
  chosen: Segub
  rationale: Proper name transliterated according to standard English convention;
    the prefixed conjunction is represented by 'and' in the clause structure.
