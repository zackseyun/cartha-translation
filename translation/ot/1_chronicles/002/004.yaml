theological_decisions:
- issue: Genealogical summary after naming Perez and Zerah
  chosen_reading: 'Render the final clause straightforwardly as a total count of Judah''s
    sons: ''All the sons of Judah were five.'''
  alternative_readings:
  - '''These were all the sons of Judah: five'''
  rationale: The Hebrew is a simple summarizing clause, not a theological statement.
    The translation preserves the genealogical accounting without smoothing away the
    explicit total.
  doctrine_reference: Translation philosophy §1, §6
- issue: Gendered kinship and descendant terminology
  chosen_reading: Retain 'daughter-in-law' and 'sons' rather than neutralizing the
    terms.
  alternative_readings:
  - '''relative by marriage'''
  - '''children'''
  rationale: The Hebrew uses specific kinship and male-descendant terms. Per doctrine,
    gender-accurate renderings are preferred where they match the source intent.
  doctrine_reference: Translation philosophy §4
