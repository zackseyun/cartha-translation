id: 1CH.2.4
reference: 1 Chronicles 2:4
source:
  edition: WLC
  text: וְ/תָמָר֙ כַּלָּת֔/וֹ יָ֥לְדָה לּ֖/וֹ אֶת פֶּ֣רֶץ וְ/אֶת זָ֑רַח כָּל בְּנֵ֥י
    יְהוּדָ֖ה חֲמִשָּֽׁה־־־׃ס
translation:
  text: Tamar, his daughter-in-law, bore Perez and Zerah to him. All the sons of Judah
    were five.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'All the sons of Judah were five,' summarizing the total after Perez
      and Zerah are added to Judah's earlier sons.
    reason: cross_reference
  - marker: b
    text: Perez is also spelled 'Peretz' in some transliteration systems.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָמָר
  chosen: Tamar
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: כַּלָּתוֹ
  chosen: his daughter-in-law
  alternatives:
  - his bride-daughter-in-law
  lexicon: HALOT
  rationale: כַּלָּה with 3ms suffix denotes a son's wife, i.e., 'daughter-in-law.'
    This is the natural English kinship term in context.
- source_word: יָלְדָה
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: Qal perfect 3fs of ילד, used of childbirth. 'Bore' is concise, natural,
    and preserves the genealogical register.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix marks relation to Judah as father.
    'To him' is the most literal and idiomatic rendering in this genealogical statement.
- source_word: פֶּרֶץ
  chosen: Perez
  alternatives:
  - Peretz
  lexicon: HALOT
  rationale: Proper name; standard English biblical transliteration is 'Perez.' 'Peretz'
    more closely reflects Hebrew phonology but is less conventional in English.
- source_word: זָרַח
  chosen: Zerah
  alternatives:
  - Zarah
  lexicon: HALOT
  rationale: Proper name; rendered with the standard English biblical form 'Zerah.'
- source_word: כָּל בְּנֵי יְהוּדָה
  chosen: All the sons of Judah
  alternatives:
  - All Judah's sons
  lexicon: HALOT
  rationale: בְּנֵי is literally 'sons of.' Per translation philosophy, gender-accurate
    language is preferred over flattening to a neutral term. The phrase summarizes
    Judah's total male offspring listed in the genealogy.
- source_word: חֲמִשָּׁה
  chosen: five
  lexicon: HALOT
  rationale: 'Cardinal number concluding the summary statement: Judah had five sons
    in total (Er, Onan, Shelah, Perez, and Zerah).'
