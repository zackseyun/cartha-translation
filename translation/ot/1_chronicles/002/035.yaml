id: 1CH.2.35
reference: 1 Chronicles 2:35
source:
  edition: WLC
  text: וַ/יִּתֵּ֨ן שֵׁשָׁ֧ן אֶת בִּתּ֛/וֹ לְ/יַרְחָ֥ע עַבְדּ֖/וֹ לְ/אִשָּׁ֑ה וַ/תֵּ֥לֶד
    ל֖/וֹ אֶת עַתָּֽי־־׃
translation:
  text: Sheshan gave his daughter to Jarha his slave as a wife, and she bore Attai
    to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his servant.' The Hebrew עֶבֶד can denote either a servant or a slave;
      'slave' is used here because Jarha's dependent status within Sheshan's household
      appears to be socially significant in the narrative.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - gave in marriage
  lexicon: HALOT
  rationale: The verb נתן literally means 'gave.' In this marriage context, English
    can idiomatically expand to 'gave in marriage,' but 'gave' with the complement
    'as a wife' preserves the Hebrew structure while remaining clear.
- source_word: שֵׁשָׁן
  chosen: Sheshan
  rationale: Proper personal name; transliterated according to standard English convention.
- source_word: בִּתּוֹ
  chosen: his daughter
  lexicon: HALOT
  rationale: Straightforward filial term with 3ms suffix; no reason to generalize
    or paraphrase.
- source_word: לְיַרְחָע
  chosen: to Jarha
  rationale: Proper personal name with preposition לְ indicating recipient; transliterated
    as a name.
- source_word: עַבְדּוֹ
  chosen: his slave
  alternatives:
  - his servant
  lexicon: HALOT
  rationale: 'עֶבֶד can mean ''servant'' or ''slave.'' In this genealogical and household
    context, the bonded status is salient: Jarha is explicitly identified as Sheshan''s
    subordinate dependent within his household. Per translation philosophy, ''slave''
    is preferred where bonded nature is significant.'
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - for a wife
  - to be his wife
  lexicon: HALOT
  rationale: This is the standard Hebrew marital expression 'to/for a wife.' 'As a
    wife' is natural modern English and preserves the marital sense without overexpansion.
- source_word: וַתֵּלֶד
  chosen: she bore
  alternatives:
  - she gave birth
  lexicon: HALOT
  rationale: ילד in the Qal with a female subject commonly means 'she bore/gave birth.'
    'She bore' fits the concise genealogical style of Chronicles.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix here marks the paternal relation
    in the birth formula. 'To him' is a literal and idiomatic rendering in English
    genealogy style.
- source_word: עַתָּי
  chosen: Attai
  rationale: Proper personal name; transliterated by standard convention.
