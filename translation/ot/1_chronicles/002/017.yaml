id: 1CH.2.17
reference: 1 Chronicles 2:17
source:
  edition: WLC
  text: וַ/אֲבִיגַ֕יִל יָלְדָ֖ה אֶת עֲמָשָׂ֑א וַ/אֲבִ֣י עֲמָשָׂ֔א יֶ֖תֶר הַ/יִּשְׁמְעֵאלִֽי־׃
translation:
  text: Abigail bore Amasa, and the father of Amasa was Jether the Ishmaelite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts and the parallel in 2 Samuel 17:25 read 'Ithra the Israelite'
      instead of 'Jether the Ishmaelite.' The Masoretic Text here reads 'Jether the
      Ishmaelite.'
    reason: textual_variant
lexical_decisions:
- source_word: יָלְדָה
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: The verb ילד in the qal with a female subject commonly means 'bore' or
    'gave birth to.' 'Bore' is concise, natural in genealogical context, and preserves
    the maternal sense without unnecessary expansion.
- source_word: אֶת עֲמָשָׂא
  chosen: Amasa
  lexicon: HALOT
  rationale: אֶת marks the definite direct object; in English it is not translated
    separately. The personal name is transliterated as 'Amasa' per the translation
    philosophy for names.
- source_word: וַאֲבִי עֲמָשָׂא
  chosen: and the father of Amasa
  alternatives:
  - and Amasa's father
  lexicon: HALOT
  rationale: The construct phrase literally means 'and the father of Amasa.' This
    is retained in a natural English form that preserves the explicit genealogical
    relationship.
- source_word: יֶתֶר
  chosen: Jether
  lexicon: HALOT
  rationale: Personal name transliterated by standard convention.
- source_word: הַיִּשְׁמְעֵאלִי
  chosen: the Ishmaelite
  alternatives:
  - an Ishmaelite
  lexicon: HALOT
  rationale: The Hebrew includes the article, so 'the Ishmaelite' is the most formally
    accurate rendering. In this genealogical notice, the gentilic likely functions
    as an identifying designation for Jether.
