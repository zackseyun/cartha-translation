id: 1CH.2.55
reference: 1 Chronicles 2:55
source:
  edition: WLC
  text: וּ/מִשְׁפְּח֤וֹת סֹפְרִים֙ ישבו יַעְבֵּ֔ץ תִּרְעָתִ֥ים שִׁמְעָתִ֖ים שׂוּכָתִ֑ים
    הֵ֚מָּה הַ/קִּינִ֣ים הַ/בָּאִ֔ים מֵ/חַמַּ֖ת אֲבִ֥י בֵית רֵכָֽב־׃ס
translation:
  text: 'and the families of the scribes who lived at Jabez: the Tirathites, the Shimeathites,
    and the Sucathites. These are the Kenites who came from Hammath, the father of
    the house of Rechab.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ancestor/founder of the house of Rechab.' The Hebrew 'father' often
      denotes a progenitor or founder in genealogical contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִשְׁפְּחוֹת
  chosen: and the families of
  alternatives:
  - and families of
  lexicon: HALOT
  rationale: The conjunction waw is retained as 'and' to preserve the genealogical
    list structure. מִשְׁפָּחוֹת refers to clans/families; 'families of' is natural
    English in this register.
- source_word: סֹפְרִים
  chosen: the scribes
  alternatives:
  - the secretaries
  - the scholars
  lexicon: HALOT
  rationale: סֹפְרִים commonly denotes scribes or those engaged in writing/record-keeping.
    'Scribes' is the most direct and established rendering here without overinterpreting
    their exact social role.
- source_word: ישבו יַעְבֵּץ
  chosen: who lived at Jabez
  alternatives:
  - who dwelt at Jabez
  - inhabitants of Jabez
  lexicon: HALOT
  rationale: The verb ישבו is a plural perfect 'lived/dwelt,' with Jabez as the place
    where they resided. Rendering as a relative clause gives clear English syntax
    while preserving the sense.
- source_word: תִּרְעָתִים
  chosen: the Tirathites
  alternatives:
  - the families of Tirathites
  lexicon: HALOT
  rationale: This is a gentilic/group name and is best transliterated as a people/clan
    designation.
- source_word: שִׁמְעָתִים
  chosen: the Shimeathites
  lexicon: HALOT
  rationale: Another gentilic/group name; transliteration preserves the proper-name
    character.
- source_word: שׂוּכָתִים
  chosen: the Sucathites
  alternatives:
  - the Sukkathites
  lexicon: HALOT
  rationale: A third gentilic/group name. 'Sucathites' follows a standard English
    transliteration pattern from the consonantal form.
- source_word: הֵמָּה
  chosen: These are
  alternatives:
  - These were
  - they were
  lexicon: HALOT
  rationale: The independent pronoun is used identificationally. 'These are' fits
    the genealogical style and links the named groups with the following identification.
- source_word: הַקִּינִים
  chosen: the Kenites
  lexicon: HALOT
  rationale: This is the ethnic/clan name קֵינִים with article; 'Kenites' is the standard
    transliteration.
- source_word: הַבָּאִים מֵחַמַּת
  chosen: who came from Hammath
  alternatives:
  - who descended from Hammath
  - who were from Hammath
  lexicon: HALOT
  rationale: The participle 'coming' with מן can denote origin. 'Came from' preserves
    the movement/origin sense without forcing a strictly genealogical or migratory
    nuance.
- source_word: אֲבִי בֵית רֵכָב
  chosen: the father of the house of Rechab
  alternatives:
  - the ancestor of the house of Rechab
  - the founder of the house of Rechab
  lexicon: HALOT
  rationale: אָב in genealogical contexts can mean progenitor/founder, but 'father
    of the house of Rechab' preserves the Hebrew idiom most transparently. 'House'
    here means clan or lineage, but the idiom is understandable in English.
