id: 1CH.2.48
reference: 1 Chronicles 2:48
source:
  edition: WLC
  text: פִּלֶ֤גֶשׁ כָּלֵב֙ מַעֲכָ֔ה יָ֥לַד שֶׁ֖בֶר וְ/אֶֽת תִּרְחֲנָֽה־׃
translation:
  text: Caleb’s concubine Maacah bore Sheber and Tirhanah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'Caleb’s concubine Maacah fathered Sheber and Tirhanah,' if
      the genealogical use of יָלַד is taken more generically; because the subject
      here is explicitly female, the main text uses 'bore.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּלֶגֶשׁ
  chosen: concubine
  alternatives:
  - secondary wife
  lexicon: HALOT
  rationale: The noun denotes a woman in a recognized but subordinate marital/sexual
    union. 'Concubine' is the standard concise English equivalent and fits the genealogical
    context better than a more explanatory paraphrase.
- source_word: כָּלֵב
  chosen: Caleb
  rationale: Personal name; transliterated according to the translation philosophy.
- source_word: מַעֲכָה
  chosen: Maacah
  alternatives:
  - Maakah
  rationale: Personal name; transliterated by standard English convention. 'Maacah'
    is the common English form.
- source_word: יָלַד
  chosen: bore
  alternatives:
  - gave birth to
  - fathered
  lexicon: HALOT
  rationale: In genealogical formulas this verb can be used broadly for begetting/bringing
    forth descendants. Here the grammatical subject is Maacah, a woman, so 'bore'
    is the most natural and gender-accurate English rendering.
- source_word: שֶׁבֶר
  chosen: Sheber
  rationale: Personal name; transliterated.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - also
  lexicon: HALOT
  rationale: The conjunction plus object marker introduces the second direct object,
    Tirhanah. English does not represent the object marker, so 'and' is sufficient.
- source_word: תִּרְחֲנָה
  chosen: Tirhanah
  alternatives:
  - Tirchana
  rationale: Personal name; transliterated. The Hebrew form is best represented in
    standard English as 'Tirhanah'.
