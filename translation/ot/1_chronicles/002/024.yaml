id: 1CH.2.24
reference: 1 Chronicles 2:24
source:
  edition: WLC
  text: וְ/אַחַ֥ר מוֹת חֶצְר֖וֹן בְּ/כָלֵ֣ב אֶפְרָ֑תָה וְ/אֵ֤שֶׁת חֶצְרוֹן֙ אֲבִיָּ֔ה
    וַ/תֵּ֣לֶד ל֔/וֹ אֶת אַשְׁח֖וּר אֲבִ֥י תְקֽוֹעַ־־׃
translation:
  text: After Hezron died in Caleb-ephrathah, Hezron’s wife Abijah bore to him Ashhur,
    the father of Tekoa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the founder of Tekoa.' In genealogies, 'father of' can denote the founder
      or leading ancestor of a settlement or clan, not only an immediate biological
      father.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase 'in Caleb-ephrathah' is difficult. It may refer to a place
      or clan designation, traditionally rendered 'Caleb-ephrathah' or 'Caleb Ephrathah.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאַחַר מוֹת
  chosen: After ... died
  alternatives:
  - And after the death of
  lexicon: HALOT
  rationale: The preposition אַחַר with the infinitive construct מוֹת is most naturally
    rendered temporally in English as 'after [someone] died.' This is smoother than
    the more wooden 'after the death of' while preserving the sense.
- source_word: חֶצְרוֹן
  chosen: Hezron
  rationale: Standard transliteration of the personal name.
- source_word: בְּכָלֵב אֶפְרָתָה
  chosen: in Caleb-ephrathah
  alternatives:
  - in Caleb Ephrathah
  - to Caleb-ephrathah
  lexicon: HALOT
  rationale: The beth preposition is taken locatively ('in'). The phrase is syntactically
    difficult, but the plainest reading is a place/clan designation 'Caleb-ephrathah.'
    A hyphen helps signal that the two elements function together as one designation.
    'To Caleb-ephrathah' is less likely here.
- source_word: וְאֵשֶׁת חֶצְרוֹן
  chosen: Hezron’s wife
  alternatives:
  - and the wife of Hezron
  lexicon: HALOT
  rationale: Construct phrase rendered idiomatically in English with possessive form.
- source_word: אֲבִיָּה
  chosen: Abijah
  alternatives:
  - Abiah
  rationale: Standard English transliteration usually appears as 'Abijah.' 'Abiah'
    is a possible closer transliteration of the consonants/vocalization, but 'Abijah'
    is more recognizable and conventional.
- source_word: וַתֵּלֶד לוֹ
  chosen: bore to him
  alternatives:
  - gave birth to for him
  - bore him
  lexicon: HALOT
  rationale: יַלַד with indirect object pronoun means she bore a child to him. 'Bore
    him' is possible English, but 'bore to him' preserves the Hebrew relation more
    transparently.
- source_word: אַשְׁחוּר
  chosen: Ashhur
  alternatives:
  - Ashur
  rationale: Transliteration of the personal name. English tradition varies between
    'Ashhur' and 'Ashur'; 'Ashhur' better reflects the doubled consonant indicated
    by the pointing.
- source_word: אֲבִי תְקוֹעַ
  chosen: the father of Tekoa
  alternatives:
  - the founder of Tekoa
  lexicon: HALOT
  rationale: In genealogical contexts, אָב can denote ancestor, founder, or chief
    associated with a town or clan. 'Father of Tekoa' is the most transparent formal
    rendering; 'founder of Tekoa' is interpretive and therefore kept as an alternative
    rather than placed in the main text.
