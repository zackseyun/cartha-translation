id: 1CH.2.36
reference: 1 Chronicles 2:36
source:
  edition: WLC
  text: וְ/עַתַּי֙ הֹלִ֣יד אֶת נָתָ֔ן וְ/נָתָ֖ן הוֹלִ֥יד אֶת זָבָֽד־־׃
translation:
  text: Attai fathered Nathan, and Nathan fathered Zabad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/עַתַּי
  chosen: Attai
  alternatives:
  - Atai
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. 'Attai' reflects standard English convention for עתי with doubled
    t to represent the dagesh/closed syllable pattern more naturally in English biblical
    naming tradition.
- source_word: הֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: Hiphil of ילד in genealogical context means to beget/father. 'Fathered'
    is concise, natural modern English and preserves the genealogical sense without
    archaic 'begot.'
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker has no direct English equivalent and is represented
    by normal English word order.
- source_word: נָתָן
  chosen: Nathan
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration.
- source_word: וְ/נָתָן
  chosen: and Nathan
  lexicon: HALOT
  rationale: Conjunction ו rendered as 'and'; name transliterated as 'Nathan.'
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: Same verb and genealogical function as earlier in the verse; rendered
    consistently as 'fathered' in keeping with documented consistency of key terms.
- source_word: זָבָד
  chosen: Zabad
  alternatives:
  - Zabad
  lexicon: HALOT
  rationale: Proper personal name; standard English biblical transliteration is 'Zabad.'
