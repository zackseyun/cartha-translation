id: 1CH.2.49
reference: 1 Chronicles 2:49
source:
  edition: WLC
  text: וַ/תֵּ֗לֶד שַׁ֚עַף אֲבִ֣י מַדְמַנָּ֔ה אֶת שְׁוָ֛א אֲבִ֥י מַכְבֵּנָ֖ה וַ/אֲבִ֣י
    גִבְעָ֑א וּ/בַת כָּלֵ֖ב עַכְסָֽה־־׃ס
translation:
  text: Shepha fathered Sheva, the father of Machbenah and the father of Gibea; and
    Caleb’s daughter was Acsah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'she bore' has a feminine verb form, but in this genealogy it refers
      to Shepha and is rendered idiomatically as 'fathered.'
    reason: lexical_alternative
  - marker: b
    text: Or 'founder of' for 'father of' in the place-name expressions 'father of
      Madmannah,' 'father of Machbenah,' and 'father of Gibea.'
    reason: lexical_alternative
  - marker: c
    text: Acsah is also spelled 'Achsah' in English transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶד
  chosen: fathered
  alternatives:
  - bore
  - became the father of
  lexicon: HALOT
  rationale: Although the verb ילד in the Qal with a feminine form normally means
    'she bore,' the immediate subject is the masculine proper name Shepha. In this
    genealogical context, English idiom is best served by rendering the sense genealogically
    as 'fathered,' reflecting the likely conventional use in lineage lists rather
    than implying a female subject.
- source_word: שַׁעַף
  chosen: Shepha
  alternatives:
  - Shaaph
  rationale: Proper name transliterated into standard English form. 'Shepha' reflects
    a straightforward transliteration of the consonants with readable English spelling;
    'Shaaph' is a possible more formal transliteration.
- source_word: אֲבִי
  chosen: father of
  alternatives:
  - founder of
  - ancestor of
  lexicon: HALOT
  rationale: In genealogical notices, אבי can denote immediate fatherhood or the founder/progenitor
    associated with a settlement or clan. 'Father of' preserves the Hebrew form most
    transparently in the main text.
- source_word: מַדְמַנָּה
  chosen: Madmannah
  rationale: Place or clan name transliterated rather than translated, following the
    policy to transliterate names.
- source_word: אֶת
  chosen: '[object marker not translated]'
  lexicon: HALOT
  rationale: Direct-object marker has no direct English equivalent and is represented
    by normal English syntax.
- source_word: שְׁוָא
  chosen: Sheva
  alternatives:
  - Shava
  rationale: Proper name transliterated by standard convention.
- source_word: מַכְבֵּנָה
  chosen: Machbenah
  alternatives:
  - Macbenah
  rationale: Proper name transliterated; 'Machbenah' preserves the guttural quality
    conventionally represented by 'ch' in English biblical transliteration.
- source_word: גִבְעָא
  chosen: Gibea
  alternatives:
  - Gibea
  rationale: Proper name transliterated in a familiar English biblical form.
- source_word: וּבַת
  chosen: daughter was
  alternatives:
  - and the daughter of
  - and daughter
  lexicon: HALOT
  rationale: The verbless clause is smoothed into idiomatic English as 'daughter was,'
    making explicit the relationship stated in Hebrew.
- source_word: כָּלֵב
  chosen: Caleb’s
  alternatives:
  - of Caleb
  rationale: Possessive form is the most natural English rendering of the construct
    relationship.
- source_word: עַכְסָה
  chosen: Acsah
  alternatives:
  - Achsah
  rationale: Proper name transliterated. 'Acsah' follows a common English convention;
    'Achsah' is a closer consonantal representation and worth preserving in a footnote.
