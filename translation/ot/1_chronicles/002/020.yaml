id: 1CH.2.20
reference: 1 Chronicles 2:20
source:
  edition: WLC
  text: וְ/חוּר֙ הוֹלִ֣יד אֶת אוּרִ֔י וְ/אוּרִ֖י הוֹלִ֥יד אֶת בְּצַלְאֵֽל־־׃ס
translation:
  text: Hur fathered Uri, and Uri fathered Bezalel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: חוּר
  chosen: Hur
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: Hiphil of ילד in genealogical context commonly denotes direct male descent.
    'Fathered' is natural modern English and preserves the genealogical force better
    than archaic 'begot.'
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent English equivalent; its function
    is represented by normal English word order.
- source_word: אוּרִי
  chosen: Uri
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated.
- source_word: וְ
  chosen: and
  alternatives:
  - now
  - then
  lexicon: HALOT
  rationale: Simple conjunction linking successive genealogical statements; 'and'
    is the most straightforward rendering.
- source_word: בְּצַלְאֵל
  chosen: Bezalel
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration retained.
