id: 1CH.2.30
reference: 1 Chronicles 2:30
source:
  edition: WLC
  text: וּ/בְנֵ֥י נָדָ֖ב סֶ֣לֶד וְ/אַפָּ֑יִם וַ/יָּ֥מָת סֶ֖לֶד לֹ֥א בָנִֽים׃ס
translation:
  text: 'The sons of Nadab: Seled and Appaim. Seled died without sons.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Seled died and had no sons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - Now the sons of
  lexicon: HALOT
  rationale: Construct plural of בֵּן with conjunction introduces a genealogical notice.
    In English genealogy style, 'The sons of' is natural and sufficiently formal;
    the prefixed conjunction need not be separately represented at the start of a
    list.
- source_word: נָדָב
  chosen: Nadab
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention.
- source_word: סֶלֶד
  chosen: Seled
  lexicon: HALOT
  rationale: Proper personal name; transliterated consistently in both occurrences.
- source_word: וְאַפָּיִם
  chosen: and Appaim
  lexicon: HALOT
  rationale: Proper personal name with conjunction. Although the form resembles the
    common noun 'nostrils/face,' in this genealogical context it is clearly a personal
    name and should be transliterated, not translated.
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - then died
  lexicon: HALOT
  rationale: Wayyiqtol of מוּת narrates the next event in sequence. Simple past 'died'
    communicates the sense clearly in English without overtranslating the narrative
    conjunction.
- source_word: לֹא בָנִים
  chosen: without sons
  alternatives:
  - and had no sons
  - with no sons
  - without children
  lexicon: HALOT
  rationale: The Hebrew is literally 'not sons.' In context after 'Seled died,' English
    idiom is best expressed as 'without sons.' 'Without children' is too broad, since
    בָּנִים specifically means 'sons' here.
