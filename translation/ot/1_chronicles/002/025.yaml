id: 1CH.2.25
reference: 1 Chronicles 2:25
source:
  edition: WLC
  text: וַ/יִּהְי֧וּ בְנֵי יְרַחְמְאֵ֛ל בְּכ֥וֹר חֶצְר֖וֹן הַ/בְּכ֣וֹר רָ֑ם וּ/בוּנָ֥ה
    וָ/אֹ֛רֶן וָ/אֹ֖צֶם אֲחִיָּֽה־׀׃
translation:
  text: The sons of Jerahmeel, the firstborn of Hezron, were Ram the firstborn, Bunah,
    Oren, Ozem, and Ahijah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew syntax may be read as listing five sons of Jerahmeel, with Ram identified
      as 'the firstborn.' Some interpreters have proposed taking 'Ahijah' differently
      in relation to the list, but the straightforward reading treats Ahijah as another
      personal name in the series.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - became
  lexicon: HALOT
  rationale: In a genealogical listing, היה introduces the members of a family line;
    'were' is the natural English equivalent for enumerating descendants.
- source_word: בְנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: The construct form with a named male ancestor in a genealogy normally
    denotes literal male offspring or line members. 'Sons of' preserves the gendered
    and genealogical force of the Hebrew.
- source_word: יְרַחְמְאֵל
  chosen: Jerahmeel
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: בְּכוֹר חֶצְרוֹן
  chosen: the firstborn of Hezron
  alternatives:
  - Hezron's firstborn
  lexicon: HALOT
  rationale: בכור marks Jerahmeel's status relative to Hezron. 'The firstborn of Hezron'
    is clear and preserves the appositional relationship.
- source_word: הַבְּכוֹר
  chosen: the firstborn
  lexicon: HALOT
  rationale: The repeated designation most naturally apposes Ram, identifying him
    as Jerahmeel's firstborn. Retaining it reflects the Hebrew repetition rather than
    smoothing it away.
- source_word: רָם
  chosen: Ram
  rationale: Personal name transliterated.
- source_word: וּבוּנָה
  chosen: Bunah
  rationale: Personal name transliterated.
- source_word: וָאֹרֶן
  chosen: Oren
  rationale: Personal name transliterated.
- source_word: וָאֹצֶם
  chosen: Ozem
  rationale: Personal name transliterated.
- source_word: אֲחִיָּה
  chosen: Ahijah
  alternatives:
  - Ahijahh
  rationale: Personal name transliterated according to standard English biblical convention.
    The final he is represented in the conventional form 'Ahijah'.
