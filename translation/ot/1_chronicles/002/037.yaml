id: 1CH.2.37
reference: 1 Chronicles 2:37
source:
  edition: WLC
  text: וְ/זָבָד֙ הוֹלִ֣יד אֶת אֶפְלָ֔ל וְ/אֶפְלָ֖ל הוֹלִ֥יד אֶת עוֹבֵֽד־־׃
translation:
  text: Zabad fathered Ephlal, and Ephlal fathered Obed.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: זָבָד
  chosen: Zabad
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the project's policy for names.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In genealogical context ילד in the Hiphil means to beget or become the
    father of. 'Fathered' is concise, natural modern English and preserves the male
    genealogical sense better than the archaic 'begot'.
- source_word: אֶת
  chosen: '[not translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent lexical meaning in English;
    represented implicitly by English word order.
- source_word: אֶפְלָל
  chosen: Ephlal
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: וְ
  chosen: and
  alternatives:
  - now
  lexicon: HALOT
  rationale: Simple conjunction linking the two genealogical clauses; 'and' is the
    plain sense.
- source_word: עוֹבֵד
  chosen: Obed
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated. Although
    the name is related to the Hebrew root for serving, names are not translated in
    this project.
