id: 1CH.2.51
reference: 1 Chronicles 2:51
source:
  edition: WLC
  text: שַׂלְמָא֙ אֲבִ֣י בֵֽית לָ֔חֶם חָרֵ֖ף אֲבִ֥י בֵית גָּדֵֽר־־׃
translation:
  text: Salma, the father of Bethlehem; Hareph, the father of Beth-gader.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'founder of' or 'ancestor of' for 'father of'; in genealogical lists
      this term can denote a clan or town founder, not only an immediate biological
      father.
    reason: lexical_alternative
  - marker: b
    text: Hareph is alternatively rendered 'Hariph' in some name traditions.
    reason: alternative_reading
lexical_decisions:
- source_word: שַׂלְמָא
  chosen: Salma
  alternatives:
  - Salmah
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. 'Salma' reflects a standard English transliteration of the Hebrew
    form.
- source_word: אֲבִי
  chosen: the father of
  alternatives:
  - founder of
  - ancestor of
  lexicon: HALOT
  rationale: In genealogical and settlement lists in Chronicles, אָב can denote a
    literal father, ancestor, or founder/patron of a clan or town. 'The father of'
    preserves the Hebrew wording most transparently while allowing the broader genealogical
    sense to remain implicit.
- source_word: בֵּית לָחֶם
  chosen: Bethlehem
  alternatives:
  - Beth-lehem
  lexicon: HALOT
  rationale: Established place name; rendered in its conventional English form rather
    than a more wooden transliteration.
- source_word: חָרֵף
  chosen: Hareph
  alternatives:
  - Hariph
  lexicon: HALOT
  rationale: Proper personal name; transliterated. 'Hareph' follows the consonantal
    form here, while 'Hariph' is a possible alternative reflected elsewhere in name
    traditions.
- source_word: בֵית גָּדֵר
  chosen: Beth-gader
  alternatives:
  - Beth Gader
  - house of Gader
  lexicon: HALOT
  rationale: Likely a place name. 'Beth-gader' preserves the toponymic form signaled
    by בֵּית + noun/name. 'House of Gader' would be overly literal and less natural
    in an English genealogy list.
