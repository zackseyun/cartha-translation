id: 1CH.2.7
reference: 1 Chronicles 2:7
source:
  edition: WLC
  text: וּ/בְנֵ֖י כַּרְמִ֑י עָכָר֙ עוֹכֵ֣ר יִשְׂרָאֵ֔ל אֲשֶׁ֥ר מָעַ֖ל בַּ/חֵֽרֶם׃ס
translation:
  text: 'And the sons of Karmi: Achar, the troubler of Israel, who acted unfaithfully
    regarding the devoted thing.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Achan.' Chronicles uses the form 'Achar,' likely echoing the Hebrew
      word for 'troubler.' See Joshua 7.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the devoted thing'; that is, what had been placed under the ban,
      devoted to destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: Construct plural of בֵּן with conjunction introduces a genealogical subunit.
    'Sons of' is the standard genealogical rendering and is more precise than 'children
    of' here.
- source_word: כַּרְמִי
  chosen: Karmi
  alternatives:
  - Carmi
  lexicon: HALOT
  rationale: Personal name is transliterated per project philosophy. 'Karmi' more
    directly reflects the Hebrew vocalization כַּרְמִי, though many English versions
    use 'Carmi'.
- source_word: עָכָר
  chosen: Achar
  alternatives:
  - Achan
  lexicon: HALOT
  rationale: The Chronicler writes עָכָר here, not the more familiar עָכָן of Joshua
    7. The translation preserves the form actually present in Chronicles rather than
    harmonizing to the Joshua spelling. The altered form likely plays on the following
    participle עוֹכֵר ('troubler').
- source_word: עוֹכֵר יִשְׂרָאֵל
  chosen: the troubler of Israel
  alternatives:
  - the one who troubled Israel
  - the disturber of Israel
  lexicon: HALOT
  rationale: The Qal participle functions appositionally to Achar and creates a wordplay
    with his name. 'Troubler' preserves the compact force and the literary connection
    better than a finite verbal paraphrase.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative pronoun introducing the clause about Achar's offense; 'who'
    fits a personal antecedent in natural English.
- source_word: מָעַל
  chosen: acted unfaithfully
  alternatives:
  - was unfaithful
  - committed a trespass
  - broke faith
  lexicon: HALOT
  rationale: מעל often denotes breach of faith or sacrilege against what is holy.
    'Acted unfaithfully' is clear modern English and preserves the covenantal/moral
    dimension better than the more technical 'committed a trespass.'
- source_word: בַּחֵרֶם
  chosen: regarding the devoted thing
  alternatives:
  - in the matter of the devoted thing
  - regarding what was devoted to destruction
  - with respect to the ban
  lexicon: HALOT
  rationale: חֵרֶם refers to something devoted, often to destruction, under divine
    ban. Here the singular with article points to the specific banned/devoted items
    in the Achan narrative. 'Devoted thing' is concise and avoids importing the full
    explanatory phrase into the main text, while preserving the sacred-ban sense better
    than the opaque 'ban' alone.
