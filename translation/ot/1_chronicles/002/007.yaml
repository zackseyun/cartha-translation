theological_decisions:
- issue: Rendering of חֵרֶם in a narrative of sacrilege and judgment
  chosen_reading: the devoted thing
  alternative_readings:
  - what was devoted to destruction
  - the ban
  rationale: The term carries both consecration-to-destruction and prohibition. 'The
    devoted thing' keeps the lexical core without over-expanding the phrase in the
    main text; alternatives are preserved in a footnote because the concept may be
    unfamiliar and the fuller nuance is interpretively significant.
  doctrine_reference: Translation philosophy §3, §5
