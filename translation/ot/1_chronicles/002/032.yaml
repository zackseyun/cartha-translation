id: 1CH.2.32
reference: 1 Chronicles 2:32
source:
  edition: WLC
  text: וּ/בְנֵ֤י יָדָע֙ אֲחִ֣י שַׁמַּ֔י יֶ֖תֶר וְ/יוֹנָתָ֑ן וַ/יָּ֥מָת יֶ֖תֶר לֹ֥א
    בָנִֽים׃ס
translation:
  text: 'The sons of Jada, Shammai’s brother: Jether and Jonathan. Jether died without
    sons.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Jether died, not sons,' that is, he died without sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - Now the sons of
  lexicon: HALOT
  rationale: Construct plural of בֵּן introducing a genealogical subunit. English
    genealogies are smoother with 'The sons of' rather than preserving the conjunction
    explicitly.
- source_word: יָדָע
  chosen: Jada
  alternatives:
  - Jeda
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention from Hebrew
    יָדָע.
- source_word: אֲחִי
  chosen: brother
  alternatives:
  - kinsman
  lexicon: HALOT
  rationale: The construct noun means 'brother of,' here linking Jada to Shammai.
    In genealogical prose the literal familial term is most natural.
- source_word: שַׁמַּי
  chosen: Shammai’s
  alternatives:
  - of Shammai
  lexicon: HALOT
  rationale: Proper name transliterated; rendered with English possessive to reflect
    the construct relationship 'brother of Shammai.'
- source_word: יֶתֶר
  chosen: Jether
  lexicon: HALOT
  rationale: Proper name transliterated consistently in both occurrences.
- source_word: וְיוֹנָתָן
  chosen: and Jonathan
  alternatives:
  - and Jehonathan
  lexicon: HALOT
  rationale: Proper name with conjunction; standard English biblical form is 'Jonathan.'
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - then died
  lexicon: HALOT
  rationale: Wayyiqtol narrative form marking the next event in the genealogy. Simple
    past 'died' is idiomatic English.
- source_word: לֹא בָנִים
  chosen: without sons
  alternatives:
  - having no sons
  - and had no sons
  lexicon: HALOT
  rationale: Literally 'not sons.' In English genealogical style, 'without sons' concisely
    conveys that Jether died childless in the male line, which is the point relevant
    to the genealogy.
