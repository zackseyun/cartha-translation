id: 1CH.2.39
reference: 1 Chronicles 2:39
source:
  edition: WLC
  text: וַ/עֲזַרְיָה֙ הֹלִ֣יד אֶת חָ֔לֶץ וְ/חֶ֖לֶץ הֹלִ֥יד אֶת אֶלְעָשָֽׂה־־׃
translation:
  text: Azariah fathered Helez, and Helez fathered Eleasah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'Elasah' for the final name; the Hebrew form here is rendered
      more directly as 'Eleasah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲזַרְיָה
  chosen: Azariah
  alternatives:
  - and Azariah
  lexicon: HALOT
  rationale: Proper personal name; transliterated per translation philosophy. The
    prefixed conjunction waw is naturally carried into the English clause structure
    and need not be separately represented beyond the sentence flow.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In genealogical context ילד in the Hiphil means to beget or father. 'Fathered'
    is concise, natural modern English, and preserves the male genealogical sense
    better than the more archaic 'begot'.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent English equivalent; its function
    is reflected in normal English word order.
- source_word: חָלֶץ
  chosen: Helez
  alternatives:
  - Helez/Helez as a repeated name in second clause
  lexicon: HALOT
  rationale: Proper personal name; transliterated. The same name appears again with
    prefixed conjunction in the next clause and is rendered consistently.
- source_word: וְחֶלֶץ
  chosen: and Helez
  lexicon: HALOT
  rationale: Conjunction plus repeated proper name introducing the second genealogical
    link; rendered straightforwardly as 'and Helez.'
- source_word: אֶלְעָשָׂה
  chosen: Eleasah
  alternatives:
  - Elasah
  lexicon: HALOT
  rationale: Proper personal name; transliterated from the Hebrew form here. 'Eleasah'
    closely reflects the consonantal/vocalized Hebrew in this verse; 'Elasah' is a
    possible simplified English form but is not preferred for directness to the source.
