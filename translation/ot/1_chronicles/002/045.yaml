id: 1CH.2.45
reference: 1 Chronicles 2:45
source:
  edition: WLC
  text: וּ/בֶן שַׁמַּ֖י מָע֑וֹן וּ/מָע֖וֹן אֲבִ֥י בֵֽית צֽוּר־־׃
translation:
  text: And the son of Shammai was Maon, and Maon was the father of Beth-zur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "ancestor/founder of Beth-zur." In genealogies, "father of" can also
      denote the founder or leading ancestor of a clan or settlement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בֶן
  chosen: And the son of
  alternatives:
  - and son of
  - Now the son of
  lexicon: HALOT
  rationale: The conjunction ו is rendered simply as "And" to continue the genealogy.
    בֶן in genealogical context is most naturally "son of," indicating direct descent.
- source_word: שַׁמַּי
  chosen: Shammai
  alternatives:
  - Shammai
  rationale: Proper personal name; transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: מָעוֹן
  chosen: Maon
  alternatives:
  - Maon
  rationale: Proper name here in genealogical sequence; transliterated. Although the
    same consonants can denote the place-name Maon elsewhere, here the syntax identifies
    a descendant/person.
- source_word: וּ/מָעוֹן
  chosen: and Maon
  alternatives:
  - and Maon himself
  rationale: The repeated proper name is retained straightforwardly. Hebrew genealogies
    often use repetition for lineage statements without needing expansion in English.
- source_word: אֲבִי
  chosen: was the father of
  alternatives:
  - father of
  - ancestor of
  - founder of
  lexicon: HALOT
  rationale: In genealogical formulas, אָב/אֲבִי can denote immediate fatherhood or
    broader ancestral/founding relationship. Here "was the father of" preserves the
    standard genealogical idiom in English while remaining readable. The broader possibility
    is preserved in a footnote because Beth-zur is a place/clan name.
- source_word: בֵּית צוּר
  chosen: Beth-zur
  alternatives:
  - Beth Zur
  - the house of Zur
  lexicon: HALOT
  rationale: This is a place/clan name conventionally represented as the compound
    proper noun "Beth-zur." Transliteration is preferable to the overly literal "house
    of Zur" in a genealogical/toponymic context.
