id: 1CH.2.34
reference: 1 Chronicles 2:34
source:
  edition: WLC
  text: וְ/לֹֽא הָיָ֧ה לְ/שֵׁשָׁ֛ן בָּנִ֖ים כִּ֣י אִם בָּנ֑וֹת וּ/לְ/שֵׁשָׁ֛ן עֶ֥בֶד
    מִצְרִ֖י וּ/שְׁמ֥/וֹ יַרְחָֽע־־׃
translation:
  text: Sheshan had no sons, only daughters. And Sheshan had an Egyptian slave whose
    name was Jarha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant.' The Hebrew עֶבֶד can denote a servant or a slave; here 'slave'
      is chosen to preserve the bonded-status sense of the term.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָיָה לְשֵׁשָׁן
  chosen: Sheshan had
  alternatives:
  - there were for Sheshan
  - belonged to Sheshan
  lexicon: HALOT
  rationale: The idiom 'to be to/for someone' expresses possession in Hebrew. In natural
    English, 'Sheshan had' best conveys the sense without unnecessary literalism.
- source_word: בָּנִים
  chosen: sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: The masculine plural here is specifically contrasted with 'daughters'
    later in the verse, so 'sons' is required rather than the broader 'children.'
- source_word: כִּי אִם
  chosen: only
  alternatives:
  - except
  - but only
  lexicon: HALOT
  rationale: 'In this construction after a negation, the phrase means ''except/but
    only.'' ''Only'' is the most natural concise English rendering in context: ''no
    sons, only daughters.'''
- source_word: בָּנוֹת
  chosen: daughters
  lexicon: HALOT
  rationale: Direct lexical equivalent and necessary to preserve the male/female contrast
    in the genealogy.
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  lexicon: HALOT
  rationale: Although 'servant' is possible in some contexts, the base sense of עֶבֶד
    is a bonded subordinate. In keeping with the project's preference to avoid softening
    bonded-status terms where salient, 'slave' is the clearer rendering here.
- source_word: מִצְרִי
  chosen: Egyptian
  alternatives:
  - an Egyptian man
  lexicon: HALOT
  rationale: The adjective/noun identifies the slave's ethnicity or national origin.
    'Egyptian' is the straightforward English equivalent.
- source_word: וּשְׁמוֹ
  chosen: whose name was
  alternatives:
  - and his name was
  lexicon: HALOT
  rationale: The Hebrew is formally 'and his name [was],' but in English the relative
    construction 'whose name was' reads more smoothly while preserving the same information.
- source_word: יַרְחָע
  chosen: Jarha
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
