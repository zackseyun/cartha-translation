id: 1CH.2.8
reference: 1 Chronicles 2:8
source:
  edition: WLC
  text: וּ/בְנֵ֥י אֵיתָ֖ן עֲזַרְיָֽה׃
translation:
  text: 'And the sons of Ethan: Azariah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew "sons of Ethan" is followed by a single name, "Azariah." This may
      function as a genealogical formula introducing Ethan's line, or "sons" may be
      used idiomatically for descendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: The conjunction ו is rendered as "And" to preserve the genealogical sequence
    and linkage with the surrounding list. בְנֵי is the construct plural "sons of,"
    the standard genealogical formula in this context; retaining "sons" is more source-faithful
    than broadening to "descendants" since the Hebrew explicitly uses the filial term.
- source_word: אֵיתָן
  chosen: Ethan
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names rather than
    translate them.
- source_word: עֲזַרְיָה
  chosen: Azariah
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard convention. Although
    the preceding plural "sons of" is followed by a single named individual, the English
    preserves the Hebrew as transmitted rather than smoothing it.
