id: 1CH.2.54
reference: 1 Chronicles 2:54
source:
  edition: WLC
  text: בְּנֵ֣י שַׂלְמָ֗א בֵּ֥ית לֶ֨חֶם֙ וּ/נְט֣וֹפָתִ֔י עַטְר֖וֹת בֵּ֣ית יוֹאָ֑ב
    וַ/חֲצִ֥י הַ/מָּנַחְתִּ֖י הַ/צָּרְעִֽי׃
translation:
  text: 'The sons of Salma: Bethlehem, the Netophathites, Atroth-beth-joab, half of
    the Manahathites, the Zorites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly “the Menuhothites” for “the Manahathites.” The Hebrew gentilic
      is uncertain in its precise place-name association.
    reason: lexical_alternative
  - marker: b
    text: Or “the Zareathites,” that is, people associated with Zorah.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  - The clans of
  lexicon: HALOT
  rationale: In genealogical lists, בְּנֵי often denotes descendants or constituent
    clan groups rather than only immediate sons. 'The sons of' preserves the formal
    genealogical idiom while remaining intelligible in English.
- source_word: שַׂלְמָא
  chosen: Salma
  alternatives:
  - Salmah
  lexicon: HALOT
  rationale: Personal name transliterated according to standard English convention.
    'Salma' follows the consonantal form here.
- source_word: בֵּית לֶחֶם
  chosen: Bethlehem
  alternatives:
  - Beth-lehem
  lexicon: HALOT
  rationale: Established English transliteration of the place name; as part of this
    list it likely denotes the Bethlehemite clan/group descending from Salma.
- source_word: וּנְטוֹפָתִי
  chosen: the Netophathites
  alternatives:
  - the Netophathite
  - Netophah
  lexicon: HALOT
  rationale: The gentilic form is best represented as a clan or inhabitants group,
    hence plural 'the Netophathites.' This fits the sequence of clan/place designations
    in the verse better than a singular individual or the place name alone.
- source_word: עַטְרוֹת בֵּית יוֹאָב
  chosen: Atroth-beth-joab
  alternatives:
  - Ataroth-beth-joab
  - the crowns of the house of Joab
  lexicon: HALOT
  rationale: This is best taken as a compound place/clan name, traditionally rendered
    as a transliterated toponym. Although the components could be analyzed lexically,
    the genealogical context favors preserving the proper name.
- source_word: וַחֲצִי
  chosen: half of
  alternatives:
  - and half of
  lexicon: HALOT
  rationale: The conjunction plus noun literally yields 'and half of.' In English
    list style, 'half of' after a comma naturally conveys the same relation; the coordination
    is preserved by punctuation.
- source_word: הַמָּנַחְתִּי
  chosen: the Manahathites
  alternatives:
  - the Manahathite
  - the Menuhothites
  lexicon: HALOT
  rationale: The form is a gentilic with article, most naturally referring to a clan/group.
    'Manahathites' reflects the likely derivation from Manahath. An alternative tradition
    connects the form with Menuhoth/Menuhath; that uncertainty is worth preserving
    in a footnote.
- source_word: הַצָּרְעִי
  chosen: the Zorites
  alternatives:
  - the Zareathites
  - the people of Zorah
  lexicon: HALOT
  rationale: The gentilic likely refers to people associated with Zorah. 'Zorites'
    is a concise transliteration-based rendering; 'people of Zorah' is interpretive.
    Because English readers may recognize the place-name connection differently, an
    alternative is preserved in a footnote.
