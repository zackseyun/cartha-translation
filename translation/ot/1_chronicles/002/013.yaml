id: 1CH.2.13
reference: 1 Chronicles 2:13
source:
  edition: WLC
  text: וְ/אִישַׁ֛י הוֹלִ֥יד אֶת בְּכֹר֖/וֹ אֶת אֱלִיאָ֑ב וַ/אֲבִינָדָב֙ הַ/שֵּׁנִ֔י
    וְ/שִׁמְעָ֖א הַ/שְּׁלִישִֽׁי־־׃
translation:
  text: And Jesse fathered his firstborn, Eliab; Abinadab the second; and Shimea the
    third.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Shimea'; the parallel list in 1 Samuel 16:9 has 'Shammah.'
    reason: cross_reference
lexical_decisions:
- source_word: וְאִישַׁי
  chosen: And Jesse
  alternatives:
  - Now Jesse
  - Jesse
  lexicon: HALOT
  rationale: וְ here is a simple connective in a genealogy, best rendered 'And' for
    narrative continuity. אִישַׁי is the personal name Jesse, transliterated per translation
    philosophy.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogical contexts means 'to father/beget.' 'Fathered'
    is clear modern English and preserves the male genealogical sense better than
    the archaic 'begot.'
- source_word: אֶת בְּכֹרוֹ
  chosen: his firstborn
  alternatives:
  - his firstborn son
  lexicon: HALOT
  rationale: בְּכוֹר with 3ms suffix means 'his firstborn.' 'Son' is implicit in the
    genealogical context and need not be added in English.
- source_word: אֶת אֱלִיאָב
  chosen: Eliab
  lexicon: HALOT
  rationale: Direct-object marker אֶת is not translated; the personal name is transliterated
    as Eliab by standard convention.
- source_word: וַאֲבִינָדָב הַשֵּׁנִי
  chosen: Abinadab the second
  alternatives:
  - and Abinadab, the second
  - Abinadab, his second
  lexicon: HALOT
  rationale: The conjunction links the next son in the list. הַשֵּׁנִי is an ordinal,
    naturally rendered 'the second.' English can omit the repeated verb and object
    marker in this compressed genealogical style.
- source_word: וְשִׁמְעָא הַשְּׁלִישִׁי
  chosen: and Shimea the third
  alternatives:
  - and Shammah the third
  lexicon: HALOT
  rationale: שִׁמְעָא is best transliterated directly from the Chronicles form as
    'Shimea.' 'Shammah' reflects the parallel form in Samuel, but this verse's Hebrew
    supports 'Shimea.' הַשְּׁלִישִׁי is 'the third.'
