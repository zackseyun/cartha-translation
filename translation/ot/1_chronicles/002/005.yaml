id: 1CH.2.5
reference: 1 Chronicles 2:5
source:
  edition: WLC
  text: בְּנֵי פֶ֖רֶץ חֶצְר֥וֹן וְ/חָמֽוּל־׃ס
translation:
  text: 'The sons of Perez: Hezron and Hamul.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in a genealogy most naturally means 'sons of.'
    Although genealogical contexts can sometimes imply broader descent, this verse
    immediately lists two direct offspring, so the more specific 'sons' is warranted.
- source_word: פֶרֶץ
  chosen: Perez
  alternatives:
  - Peretz
  - Pharez
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention. 'Perez'
    is the common modern form and fits the translation philosophy of transliterating
    names rather than translating them.
- source_word: חֶצְרוֹן
  chosen: Hezron
  lexicon: HALOT
  rationale: Personal name transliterated directly into standard English form.
- source_word: וְחָמוּל
  chosen: and Hamul
  alternatives:
  - and Chamul
  lexicon: HALOT
  rationale: The conjunction וְ is rendered 'and.' The personal name is transliterated
    as 'Hamul,' the standard English form in biblical usage.
