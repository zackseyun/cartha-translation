id: 1CH.2.42
reference: 1 Chronicles 2:42
source:
  edition: WLC
  text: וּ/בְנֵ֤י כָלֵב֙ אֲחִ֣י יְרַחְמְאֵ֔ל מֵישָׁ֥ע בְּכֹר֖/וֹ ה֣וּא אֲבִי זִ֑יף
    וּ/בְנֵ֥י מָרֵשָׁ֖ה אֲבִ֥י חֶבְרֽוֹן־׃
translation:
  text: 'And the sons of Caleb the brother of Jerahmeel: Mesha his firstborn, who
    was the father of Ziph, and the sons of Mareshah, the father of Hebron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew syntax in the final clause is difficult. The Masoretic Text reads
      literally, 'and the sons of Mareshah, the father of Hebron.' Some understand
      this to mean 'Mareshah the father of Hebron,' while others retain the wording
      as translated.
    reason: alternative_reading
  - marker: b
    text: In Chronicles, 'father of' can denote not only a biological father but also
      an ancestor, clan head, or founder associated with a place.
    reason: cultural_note
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The descendants of
  lexicon: HALOT
  rationale: בְּנֵי is the standard genealogical formula 'sons of.' In Chronicles
    this can denote immediate sons or broader descendants, but the formal genealogical
    heading is best preserved as 'sons of' rather than generalized 'descendants of.'
    The prefixed conjunction is rendered simply 'And' to maintain the narrative-genealogical
    flow.
- source_word: כָלֵב
  chosen: Caleb
  lexicon: HALOT
  rationale: Proper personal name, transliterated according to the translation philosophy.
- source_word: אֲחִי יְרַחְמְאֵל
  chosen: the brother of Jerahmeel
  alternatives:
  - Jerahmeel's brother
  lexicon: HALOT
  rationale: Construct phrase with אֲחִי 'brother of.' English idiom slightly prefers
    'the brother of Jerahmeel' in apposition to Caleb, clarifying the relationship.
- source_word: מֵישָׁע
  chosen: Mesha
  lexicon: HALOT
  rationale: Proper personal name, transliterated.
- source_word: בְּכֹרוֹ
  chosen: his firstborn
  alternatives:
  - his eldest
  lexicon: HALOT
  rationale: בכור denotes the firstborn son. 'Firstborn' preserves both genealogical
    and status nuance better than merely 'eldest.'
- source_word: הוּא
  chosen: who was
  alternatives:
  - he was
  lexicon: HALOT
  rationale: The independent pronoun resumes Mesha and introduces an identifying clause.
    In English, 'who was' is smoother and clearly relative to Mesha.
- source_word: אֲבִי זִיף
  chosen: the father of Ziph
  alternatives:
  - the founder of Ziph
  lexicon: HALOT
  rationale: In genealogical/toponymic contexts, אָב can mean literal father or ancestor/founder
    of a clan or settlement. 'Father of' preserves the Hebrew wording while allowing
    the broader genealogical sense.
- source_word: וּבְנֵי מָרֵשָׁה
  chosen: and the sons of Mareshah
  alternatives:
  - and Mareshah's sons
  lexicon: HALOT
  rationale: The Hebrew again uses the genealogical formula 'sons of.' Although the
    syntax of this clause is difficult, the most direct rendering preserves the Masoretic
    wording rather than emending it.
- source_word: אֲבִי חֶבְרוֹן
  chosen: the father of Hebron
  alternatives:
  - the founder of Hebron
  lexicon: HALOT
  rationale: As with 'father of Ziph,' the phrase likely indicates ancestor/founder
    associated with Hebron, whether a person/clan or settlement. 'Father of' keeps
    the lexical correspondence and leaves the genealogical/toponymic ambiguity intact.
