id: 1CH.2.21
reference: 1 Chronicles 2:21
source:
  edition: WLC
  text: וְ/אַחַ֗ר בָּ֤א חֶצְרוֹן֙ אֶל בַּת מָכִיר֙ אֲבִ֣י גִלְעָ֔ד וְ/ה֣וּא לְקָחָ֔/הּ
    וְ/ה֖וּא בֶּן שִׁשִּׁ֣ים שָׁנָ֑ה וַ/תֵּ֥לֶד ל֖/וֹ אֶת שְׂגֽוּב־־־־׃
translation:
  text: Afterward Hezron went in to the daughter of Machir the father of Gilead, and
    he took her when he was sixty years old, and she bore Segub to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came to'; the Hebrew idiom 'went in to' can function as a discreet way
      of referring to marital/sexual union.
    reason: lexical_alternative
  - marker: b
    text: '''He took her'' may also be rendered ''he married her'' or ''he took her
      as wife.'''
    reason: lexical_alternative
  - marker: c
    text: '''Father of Gilead'' may mean immediate father, ancestor, or founder in
      genealogical usage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחַר
  chosen: Afterward
  alternatives:
  - After this
  - Later
  lexicon: HALOT
  rationale: Temporal adverb/conjunction marking subsequent action in the genealogy;
    'Afterward' is natural modern English and preserves sequence.
- source_word: בָּא אֶל
  chosen: went in to
  alternatives:
  - came to
  - had relations with
  lexicon: HALOT
  rationale: The idiom 'go/come in to' with a woman commonly denotes entering into
    sexual/marital union. 'Went in to' preserves the Hebrew idiom without over-paraphrasing;
    'had relations with' is more interpretive.
- source_word: בַּת מָכִיר
  chosen: the daughter of Machir
  alternatives:
  - Machir's daughter
  lexicon: HALOT
  rationale: Both are possible; the fuller form better reflects the construct chain
    and keeps the genealogical style.
- source_word: אֲבִי גִלְעָד
  chosen: the father of Gilead
  alternatives:
  - the ancestor of Gilead
  - the founder of Gilead
  lexicon: HALOT
  rationale: אָב in genealogical contexts can mean progenitor/founder, but 'father
    of' is the most direct rendering and suits the chronicler's genealogical formula.
- source_word: לְקָחָהּ
  chosen: he took her
  alternatives:
  - he married her
  - he took her as wife
  lexicon: HALOT
  rationale: לקח with a woman often implies marriage. 'He took her' is formally closer
    to the Hebrew while allowing the marital sense to be inferred from context.
- source_word: וְהוּא בֶּן שִׁשִּׁים שָׁנָה
  chosen: when he was sixty years old
  alternatives:
  - and he was a son of sixty years
  - while he was sixty years old
  lexicon: HALOT
  rationale: Hebrew age idiom literally reads 'a son of sixty years.' The chosen rendering
    is standard idiomatic English.
- source_word: וַתֵּלֶד לוֹ
  chosen: she bore ... to him
  alternatives:
  - she gave birth to ... for him
  - she bore him
  lexicon: HALOT
  rationale: The Hebrew explicitly includes לּוֹ, so 'to him' preserves the dative
    nuance more transparently than simply 'bore him,' while remaining natural enough
    in genealogical style.
- source_word: שְׂגוּב
  chosen: Segub
  rationale: Standard English transliteration of the personal name.
