id: 1CH.2.23
reference: 1 Chronicles 2:23
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח גְּשֽׁוּר וַ֠/אֲרָם אֶת חַוֺּ֨ת יָאִ֧יר מֵ/אִתָּ֛/ם אֶת קְנָ֥ת
    וְ/אֶת בְּנֹתֶ֖י/הָ שִׁשִּׁ֣ים עִ֑יר כָּל אֵ֕לֶּה בְּנֵ֖י מָכִ֥יר אֲבִי גִלְעָֽד־־־־־־׃
translation:
  text: But Geshur and Aram took the villages of Jair from them, along with Kenath
    and its daughter towns—sixty cities. All these were the sons of Machir, the father
    of Gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Havvoth-jair,' a place-name meaning 'tent-villages of Jair.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'its daughters,' referring to dependent settlements around Kenath.
    reason: cultural_note
  - marker: c
    text: '''Sons of Machir'' may mean descendants or clan members, not necessarily
      immediate sons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - captured
  - seized
  lexicon: HALOT
  rationale: The singular verb with the compound subject 'Geshur and Aram' is idiomatic.
    'Took' is the most natural and sufficiently broad English rendering for territorial
    acquisition without over-specifying military nuance.
- source_word: גְּשׁוּר וַאֲרָם
  chosen: Geshur and Aram
  alternatives:
  - the Geshurites and Aram
  - Geshur and Syria
  lexicon: HALOT
  rationale: These are proper names and should be transliterated rather than translated.
    'Aram' is preferred over 'Syria' to reflect the Hebrew name directly.
- source_word: חַוֺּת יָאִיר
  chosen: the villages of Jair
  alternatives:
  - the tent-villages of Jair
  - Havvoth-jair
  lexicon: HALOT
  rationale: The phrase is a known toponym, but its lexical sense is transparent enough
    to translate. 'Villages of Jair' balances readability and source transparency.
    The more formal transliteration 'Havvoth-jair' is preserved as an alternative.
- source_word: מֵאִתָּם
  chosen: from them
  alternatives:
  - out of their possession
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition plus pronominal suffix,
    indicating removal from the possession/control of the previously mentioned group.
- source_word: קְנָת
  chosen: Kenath
  alternatives:
  - Qenath
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: בְּנֹתֶיהָ
  chosen: its daughter towns
  alternatives:
  - its villages
  - its dependent towns
  lexicon: HALOT
  rationale: Literally 'its daughters,' an idiom for satellite settlements dependent
    on a main city. 'Daughter towns' preserves the metaphor while remaining understandable.
- source_word: שִׁשִּׁים עִיר
  chosen: sixty cities
  alternatives:
  - sixty towns
  lexicon: HALOT
  rationale: Although 'daughter towns' has just been used, עִיר is the standard term
    for city/town. 'Cities' is retained here because it is the direct lexical equivalent
    and reflects the summary total.
- source_word: כָּל אֵלֶּה
  chosen: All these
  alternatives:
  - All these places
  - All these people
  lexicon: HALOT
  rationale: The Hebrew is formally ambiguous as to whether it points to the settlements
    or the line descended from Machir. The following nominal clause favors a genealogical
    statement, so 'All these' leaves the referent broad enough to match the Hebrew.
- source_word: בְּנֵי מָכִיר
  chosen: were the sons of Machir
  alternatives:
  - belonged to the sons of Machir
  - were descendants of Machir
  lexicon: HALOT
  rationale: The most direct rendering is genealogical. In context, the phrase may
    function broadly for clan descent rather than immediate sons, but 'sons of' preserves
    the Hebrew wording.
- source_word: אֲבִי גִלְעָד
  chosen: the father of Gilead
  alternatives:
  - the ancestor of Gilead
  - the founder of Gilead
  lexicon: HALOT
  rationale: Hebrew 'father of' can denote progenitor or founder. 'Father of Gilead'
    keeps the idiom intact; readers may understand it genealogically, and the broader
    nuance is noted by alternatives.
