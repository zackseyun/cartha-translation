id: 1CH.2.44
reference: 1 Chronicles 2:44
source:
  edition: WLC
  text: וְ/שֶׁ֣מַע הוֹלִ֔יד אֶת רַ֖חַם אֲבִ֣י יָרְקֳעָ֑ם וְ/רֶ֖קֶם הוֹלִ֥יד אֶת שַׁמָּֽי־־׃
translation:
  text: Shema fathered Raham, the father of Jorkeam; and Rekem fathered Shammai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Raham, founder/ancestor of Jorkeam.' The Hebrew expression 'father of'
      can denote a founding or ancestral relationship, especially in genealogies connected
      with clans or settlements.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In genealogical contexts ילד in the Hiphil commonly denotes direct descent.
    'Fathered' is concise, natural modern English, and more readable than the archaic
    'begot' while remaining more specific than 'became the father of.'
- source_word: אֲבִי
  chosen: the father of
  alternatives:
  - founder of
  - ancestor of
  lexicon: HALOT
  rationale: אב in construct with a place name can sometimes mean founder or chief
    ancestor of a settlement/clan. Here, because the genealogy repeatedly uses this
    idiom and the immediate syntax is straightforward, 'the father of' preserves the
    Hebrew form most transparently. The possible nuance 'founder of' is worth preserving
    in a footnote.
- source_word: יָרְקֳעָם
  chosen: Jorkeam
  alternatives:
  - Jorkoam
  rationale: This is a proper name and is transliterated rather than translated, following
    the project's policy for personal/place names. 'Jorkeam' reflects a standard English
    convention for this Hebrew form.
- source_word: שֶׁמַע
  chosen: Shema
  rationale: Proper name; transliterated by standard convention.
- source_word: רַחַם
  chosen: Raham
  rationale: Proper name; transliterated by standard convention.
- source_word: רֶקֶם
  chosen: Rekem
  rationale: Proper name; transliterated by standard convention.
- source_word: שַׁמָּי
  chosen: Shammai
  alternatives:
  - Shammai
  rationale: Proper name; transliterated by standard convention. 'Shammai' is the
    more familiar English form for this spelling.
