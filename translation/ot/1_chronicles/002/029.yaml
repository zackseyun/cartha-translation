id: 1CH.2.29
reference: 1 Chronicles 2:29
source:
  edition: WLC
  text: וְ/שֵׁ֛ם אֵ֥שֶׁת אֲבִישׁ֖וּר אֲבִיהָ֑יִל וַ/תֵּ֣לֶד ל֔/וֹ אֶת אַחְבָּ֖ן וְ/אֶת
    מוֹלִֽיד־־׃
translation:
  text: The name of Abishur’s wife was Abihail, and she bore to him Ahban and Molid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew begins with a conjunction, literally, 'And the name of Abishur’s
      wife was Abihail.' English style commonly omits the conjunction here.
    reason: lexical_alternative
  - marker: b
    text: Abihail may also be transliterated 'Abihayil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֵׁם
  chosen: The name
  alternatives:
  - And the name
  - Now the name
  lexicon: HALOT
  rationale: שֵׁם means 'name.' The prefixed conjunction is not always best represented
    by a separate English 'and' in genealogical prose; English reads naturally with
    'The name' while preserving the clause’s sense.
- source_word: אֵשֶׁת
  chosen: wife of
  alternatives:
  - woman of
  lexicon: HALOT
  rationale: Construct form of אִשָּׁה here denotes marital relation, so 'wife of'
    is the natural and accurate rendering.
- source_word: אֲבִישׁוּר
  chosen: Abishur
  rationale: Personal name; transliterated according to the project’s policy to transliterate
    names rather than translate them.
- source_word: אֲבִיהָיִל
  chosen: Abihail
  alternatives:
  - Abihayil
  rationale: Personal name; standard English transliteration is 'Abihail.' A more
    phonetic transliteration is possible but less conventional.
- source_word: וַתֵּלֶד
  chosen: she bore
  alternatives:
  - she gave birth
  - she bore children
  lexicon: HALOT
  rationale: From ילד, in genealogical contexts commonly rendered 'bore.' This is
    concise and idiomatic in English genealogies.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The preposition with pronominal suffix indicates the children were borne
    to Abishur; 'to him' is the standard genealogical English expression.
- source_word: אֶת אַחְבָּן וְאֶת מוֹלִיד
  chosen: Ahban and Molid
  rationale: Direct-object marker אֶת is untranslated in English. The two following
    forms are personal names and are transliterated.
