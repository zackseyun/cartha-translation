id: 1CH.2.33
reference: 1 Chronicles 2:33
source:
  edition: WLC
  text: וּ/בְנֵ֥י יוֹנָתָ֖ן פֶּ֣לֶת וְ/זָזָ֑א אֵ֥לֶּה הָי֖וּ בְּנֵ֥י יְרַחְמְאֵֽל׃
translation:
  text: 'And the sons of Jonathan: Peleth and Zaza. These were the sons of Jerahmeel.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: The conjunction ו is carried as 'And' to preserve the genealogical sequence,
    and בְּנֵי in construct is naturally rendered 'sons of' in this lineage context.
- source_word: יוֹנָתָן
  chosen: Jonathan
  alternatives:
  - Jonathan
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: פֶּלֶת
  chosen: Peleth
  alternatives:
  - Peleth
  lexicon: HALOT
  rationale: Proper name transliterated directly from the Hebrew.
- source_word: וְזָזָא
  chosen: and Zaza
  alternatives:
  - and Zaza
  lexicon: HALOT
  rationale: The conjunction joins the second named son; the proper name is transliterated
    directly.
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - These men
  - These ones
  lexicon: HALOT
  rationale: The demonstrative plural points back to the named descendants; simple
    'These' is the most natural and sufficiently formal rendering.
- source_word: הָיוּ
  chosen: were
  alternatives:
  - became
  lexicon: HALOT
  rationale: In this genealogical summary clause, היה functions as a copula indicating
    identification, best rendered 'were' rather than the more dynamic 'became.'
- source_word: בְּנֵי יְרַחְמְאֵל
  chosen: the sons of Jerahmeel
  alternatives:
  - Jerahmeel's sons
  - descendants of Jerahmeel
  lexicon: HALOT
  rationale: The construct phrase is rendered straightforwardly. 'Sons' is retained
    rather than 'descendants' because the Hebrew uses בני and the genealogical context
    can preserve the formal lineage language without obscurity.
