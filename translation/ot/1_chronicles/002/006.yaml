id: 1CH.2.6
reference: 1 Chronicles 2:6
source:
  edition: WLC
  text: וּ/בְנֵ֣י זֶ֗רַח זִ֠מְרִי וְ/אֵיתָ֧ן וְ/הֵימָ֛ן וְ/כַלְכֹּ֥ל וָ/דָ֖רַע כֻּלָּ֥/ם
    חֲמִשָּֽׁה׃ס
translation:
  text: 'And the sons of Zerah: Zimri, Ethan, Heman, Kalkol, and Dara—five in all.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditional English versions often read 'Calcol' for כַלְכֹּל.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Dara'; the parallel in 1 Kings 4:31 reads 'Darda.'
    reason: cross_reference
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons.' In genealogical contexts, 'sons
    of' is the standard and most precise rendering, even when it can denote descendants
    more broadly. The prefixed conjunction ו is rendered 'And' to preserve the list
    structure.
- source_word: זֶרַח
  chosen: Zerah
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to the translation philosophy
    to transliterate names rather than translate them.
- source_word: זִמְרִי
  chosen: Zimri
  lexicon: HALOT
  rationale: Proper personal name; transliterated in standard English form.
- source_word: וְאֵיתָן
  chosen: Ethan
  lexicon: HALOT
  rationale: Proper personal name with prefixed conjunction; rendered by transliteration
    of the name and inclusion in the coordinate list.
- source_word: וְהֵימָן
  chosen: Heman
  lexicon: HALOT
  rationale: Proper personal name; transliterated in conventional English form.
- source_word: וְכַלְכֹּל
  chosen: Kalkol
  alternatives:
  - Calcol
  lexicon: HALOT
  rationale: Proper personal name. 'Kalkol' more directly reflects the Hebrew consonants,
    while 'Calcol' reflects older English tradition. The more transparent transliteration
    is preferred, with the traditional form preserved as an alternative.
- source_word: וָדָרַע
  chosen: Dara
  alternatives:
  - Darda
  lexicon: HALOT
  rationale: The MT here reads Dara. Although a parallel genealogy in 1 Kings 4:31
    has 'Darda,' this verse's Hebrew text supports 'Dara,' so the main text follows
    the source text rather than harmonizing to the parallel.
- source_word: כֻּלָּם
  chosen: in all
  alternatives:
  - all of them
  lexicon: HALOT
  rationale: Literally 'all of them.' In English genealogical style, 'five in all'
    is a natural rendering that preserves the totalizing sense without awkwardness.
- source_word: חֲמִשָּׁה
  chosen: five
  lexicon: HALOT
  rationale: Cardinal number; rendered straightforwardly as 'five.' Combined with
    כֻּלָּם to form the idiomatic English phrase 'five in all.'
