id: 1CH.2.3
reference: 1 Chronicles 2:3
source:
  edition: WLC
  text: בְּנֵ֣י יְהוּדָ֗ה עֵ֤ר וְ/אוֹנָן֙ וְ/שֵׁלָ֔ה שְׁלוֹשָׁה֙ נ֣וֹלַד ל֔/וֹ מִ/בַּת
    שׁ֖וּעַ הַֽ/כְּנַעֲנִ֑ית וַ/יְהִ֞י עֵ֣ר בְּכ֣וֹר יְהוּדָ֗ה רַ֛ע בְּ/עֵינֵ֥י יְהוָ֖ה
    וַ/יְמִיתֵֽ/הוּ־׀׃ס
translation:
  text: 'The sons of Judah: Er, Onan, and Shelah—three were born to him by the daughter
    of Shua the Canaanite. Er, Judah’s firstborn, was evil in the sight of the LORD,
    and he put him to death.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the daughter of Shua the Canaanite''; some take ''Bath-shua''
      as a proper name here.'
    reason: lexical_alternative
  - marker: b
    text: 'Or: ''and the LORD put him to death.'' The Hebrew leaves the subject implicit,
      but it most naturally refers to the LORD from the previous clause.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי יְהוּדָה
  chosen: The sons of Judah
  alternatives:
  - Judah's sons
  lexicon: HALOT
  rationale: Construct phrase naming descendants/sons. 'The sons of Judah' is slightly
    more formal and fits the genealogical register.
- source_word: שְׁלוֹשָׁה
  chosen: three
  lexicon: HALOT
  rationale: Cardinal number retained explicitly to match the Hebrew summary of the
    three named sons.
- source_word: נ֣וֹלַד ל֔וֹ
  chosen: were born to him
  alternatives:
  - he fathered
  - were born
  lexicon: HALOT
  rationale: The Niphal of ילד here is passive/resultative ('were born to him'), which
    is more textually precise than the more active 'he fathered,' though the latter
    is idiomatic in genealogies.
- source_word: מִבַּת שׁוּעַ הַכְּנַעֲנִית
  chosen: by the daughter of Shua the Canaanite
  alternatives:
  - from Bath-shua the Canaanite woman
  - by Bath-shua the Canaanite
  lexicon: HALOT
  rationale: The Hebrew reads literally 'from/by the daughter of Shua, the Canaanite
    woman,' not the proper name 'Bath-shua' as a single name in this verse. 'By the
    daughter of Shua' preserves the source wording; 'the Canaanite' renders the gentilic
    adjective.
- source_word: בְּכוֹר יְהוּדָה
  chosen: Judah’s firstborn
  alternatives:
  - the firstborn of Judah
  lexicon: HALOT
  rationale: Construct relationship rendered naturally in English while preserving
    the genealogical emphasis.
- source_word: רַע בְּעֵינֵי יְהוָה
  chosen: was evil in the sight of the LORD
  alternatives:
  - was wicked in the eyes of the LORD
  - was evil in the eyes of the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew evaluative formula. 'In the sight of' is idiomatic
    modern English that still reflects the metaphor of divine evaluation.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: וַיְמִיתֵהוּ
  chosen: he put him to death
  alternatives:
  - he killed him
  - the LORD put him to death
  lexicon: HALOT
  rationale: The verb means 'caused him to die/put him to death.' English requires
    an explicit subject; the nearest and intended subject is the LORD from the preceding
    clause. 'Put him to death' preserves the causative nuance better than simply 'killed
    him.'
