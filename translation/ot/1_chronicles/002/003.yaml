theological_decisions:
- issue: Explicit subject of וַיְמִיתֵהוּ
  chosen_reading: and he put him to death, with 'he' referring to the LORD
  alternative_readings:
  - and the LORD put him to death
  rationale: Hebrew narrative commonly continues the prior subject without restating
    it. Since the previous clause ends with 'the LORD,' the implied subject is the
    LORD. The main text keeps the Hebrew-style pronoun flow while remaining intelligible
    in English.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for the Tetragrammaton and
    preserves continuity with longstanding English Bible convention without denying
    the underlying proper name.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
