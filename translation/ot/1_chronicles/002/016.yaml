id: 1CH.2.16
reference: 1 Chronicles 2:16
source:
  edition: WLC
  text: ו/אחיתי/הם צְרוּיָ֣ה וַ/אֲבִיגָ֑יִל וּ/בְנֵ֣י צְרוּיָ֗ה אַבְשַׁ֛י וְ/יוֹאָ֥ב
    וַ/עֲשָׂה אֵ֖ל שְׁלֹשָֽׁה־׃
translation:
  text: 'Their sisters were Zeruiah and Abigail. The sons of Zeruiah: Abishai, Joab,
    and Asahel—three.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַאֲחֹתֵיהֶם
  chosen: Their sisters were
  alternatives:
  - And their sisters were
  - Now their sisters were
  lexicon: HALOT
  rationale: The conjunction plus noun with 3mp suffix introduces an additional family
    detail. 'Their sisters were' is natural English while preserving the plural 'sisters'
    and possessive 'their.'
- source_word: צְרוּיָה
  chosen: Zeruiah
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: וַאֲבִיגָיִל
  chosen: and Abigail
  rationale: Personal name transliterated; conjunction rendered straightforwardly
    as 'and.'
- source_word: וּבְנֵי צְרוּיָה
  chosen: The sons of Zeruiah
  alternatives:
  - And the sons of Zeruiah
  lexicon: HALOT
  rationale: Construct phrase literally means 'the sons of Zeruiah.' Capitalizing
    the sentence and using a colon reflects the list structure in readable English.
- source_word: אַבְשַׁי
  chosen: Abishai
  rationale: Standard English transliteration of the personal name.
- source_word: וְיוֹאָב
  chosen: Joab
  rationale: Standard English transliteration of the personal name with conjunction
    absorbed into the English list.
- source_word: וַעֲשָׂהאֵל
  chosen: and Asahel
  rationale: The name is conventionally rendered 'Asahel.' The conjunction is represented
    by 'and' in the final item of the list.
- source_word: שְׁלֹשָׁה
  chosen: three
  lexicon: HALOT
  rationale: Cardinal number summarizing the total number of Zeruiah's sons. Retained
    explicitly as in the Hebrew rather than omitted as redundant.
