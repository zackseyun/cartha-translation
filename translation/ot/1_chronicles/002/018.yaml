id: 1CH.2.18
reference: 1 Chronicles 2:18
source:
  edition: WLC
  text: וְ/כָלֵ֣ב בֶּן חֶצְר֗וֹן הוֹלִ֛יד אֶת עֲזוּבָ֥ה אִשָּׁ֖ה וְ/אֶת יְרִיע֑וֹת
    וְ/אֵ֣לֶּה בָנֶ֔י/הָ יֵ֥שֶׁר וְ/שׁוֹבָ֖ב וְ/אַרְדּֽוֹן־־־׃
translation:
  text: 'And Caleb son of Hezron fathered children by Azubah his wife, and by Jerioth;
    and these were her sons: Jesher, Shobab, and Ardon.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew syntax is difficult. 'Jerioth' may be understood either as a
      second woman associated with Caleb or as connected appositionally with Azubah
      in some interpretations.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew: ''her sons.'' Some interpreters understand the genealogy differently,
      but the Masoretic Text has a feminine singular suffix here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹלִיד
  chosen: fathered children by
  alternatives:
  - fathered
  - begot
  lexicon: HALOT
  rationale: The Hiphil of ילד commonly means to beget/father. Because the syntax
    that follows names women, English needs a slightly expanded rendering ('fathered
    children by') to make the relationship intelligible without wooden awkwardness.
- source_word: אֶת עֲזוּבָה אִשָּׁה וְאֶת יְרִיעוֹת
  chosen: by Azubah his wife, and by Jerioth
  alternatives:
  - Azubah, a woman, and Jerioth
  - Azubah his wife and Jerioth
  - Azubah-wife and Jerioth
  lexicon: HALOT
  rationale: The Hebrew construction is difficult and compressed. אִשָּׁה here is
    best taken appositionally with Azubah ('his wife'), while Jerioth is coordinated
    as another woman connected to Caleb's offspring. Rendering with 'by' clarifies
    the genealogical sense implied by הוֹלִיד.
- source_word: אִשָּׁה
  chosen: his wife
  alternatives:
  - a woman
  - wife
  lexicon: HALOT
  rationale: Although the noun lacks an explicit pronominal suffix, in this genealogical
    context 'wife' is the natural sense of אִשָּׁה. English idiom prefers 'his wife'
    to make the relationship explicit.
- source_word: יְרִיעוֹת
  chosen: Jerioth
  rationale: Personal names are transliterated by project policy.
- source_word: וְאֵלֶּה בָנֶיהָ
  chosen: and these were her sons
  alternatives:
  - and these are her sons
  - and these were his sons
  lexicon: HALOT
  rationale: The suffix on בָנֶיהָ is feminine singular, so 'her sons' is the plain
    grammatical sense. Past tense is natural in English narrative genealogy. 'His
    sons' would smooth the genealogy but does not match the consonantal text.
- source_word: יֵשֶׁר וְשׁוֹבָב וְאַרְדּוֹן
  chosen: Jesher, Shobab, and Ardon
  rationale: These are personal names and are therefore transliterated.
