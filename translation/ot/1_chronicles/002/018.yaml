theological_decisions:
- issue: Genealogical ambiguity regarding the women named in the verse
  chosen_reading: Caleb fathered children by Azubah his wife, and by Jerioth; the
    following names are presented as 'her sons' according to the feminine suffix in
    the MT.
  alternative_readings:
  - Caleb fathered Azubah, a woman, and Jerioth
  - Jerioth may be appositional to Azubah rather than a second woman
  - The sons listed may be attributed differently in some reconstructions of the genealogy
  rationale: This is a textual/syntactic issue rather than a doctrinal one, but the
    translation should preserve the Masoretic grammar without over-resolving the genealogy.
    The feminine suffix in 'her sons' is retained in the main text, while the broader
    ambiguity is noted in a footnote.
  doctrine_reference: 'Translation philosophy §3: preserve theological/interpretive
    tension rather than resolve it'
