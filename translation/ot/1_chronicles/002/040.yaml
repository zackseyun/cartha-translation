id: 1CH.2.40
reference: 1 Chronicles 2:40
source:
  edition: WLC
  text: וְ/אֶלְעָשָׂה֙ הֹלִ֣יד אֶת סִֽסְמָ֔י וְ/סִסְמַ֖י הֹלִ֥יד אֶת שַׁלּֽוּם־־׃
translation:
  text: Eleasah fathered Sismai, and Sismai fathered Shallum.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֶלְעָשָׂה
  chosen: Eleasah
  alternatives:
  - Eleasahh
  - Elasah
  rationale: Proper personal name; transliterated rather than translated per project
    policy for names. 'Eleasah' reflects a standard English transliteration of the
    Hebrew form.
- source_word: הֹלִיד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogical contexts means to beget or become the
    father of. 'Fathered' preserves the genealogical sense while using readable modern
    English; it is less archaic than 'begot' and more concise than 'became the father
    of'.
- source_word: אֶת
  chosen: '[not translated separately]'
  lexicon: HALOT
  rationale: Direct-object marker with no standalone English equivalent; its function
    is reflected in the syntax of the clause.
- source_word: סִסְמָי
  chosen: Sismai
  alternatives:
  - Sisamai
  rationale: Proper personal name; transliterated. 'Sismai' is the conventional and
    phonetically straightforward rendering of the Hebrew name.
- source_word: וְ
  chosen: and
  alternatives:
  - now
  lexicon: HALOT
  rationale: Simple coordinating conjunction linking the two genealogical clauses.
    'And' is the natural rendering in this list context.
- source_word: שַׁלּוּם
  chosen: Shallum
  alternatives:
  - Shallun
  rationale: Proper personal name; transliterated by standard convention. 'Shallum'
    is the established English form for this Hebrew name.
