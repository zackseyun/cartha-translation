id: 1CH.2.9
reference: 1 Chronicles 2:9
source:
  edition: WLC
  text: וּ/בְנֵ֥י חֶצְר֖וֹן אֲשֶׁ֣ר נוֹלַד ל֑/וֹ אֶת יְרַחְמְאֵ֥ל וְ/אֶת רָ֖ם וְ/אֶת
    כְּלוּבָֽי־־־־׃
translation:
  text: 'The sons of Hezron who were born to him: Jerahmeel, Ram, and Chelubai.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Chelubai is likely the same person elsewhere called Caleb in this genealogy.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - Now the sons of
  lexicon: HALOT
  rationale: Construct plural of בֵּן with prefixed conjunction. In English genealogy
    style, the conjunction is naturally absorbed rather than represented with a sentence-initial
    'and.' 'Sons of' is the plain genealogical sense.
- source_word: חֶצְרוֹן
  chosen: Hezron
  rationale: Proper name, transliterated by standard English convention.
- source_word: אֲשֶׁר נוֹלַד לוֹ
  chosen: who were born to him
  alternatives:
  - who were born to Hezron
  - whom he fathered
  lexicon: HALOT
  rationale: The relative clause with Niphal of ילד plus לּוֹ is most naturally rendered
    'who were born to him.' This preserves the passive form of the Hebrew better than
    the more active 'whom he fathered,' while still reading naturally in English.
    'Him' refers back to Hezron.
- source_word: אֶת
  chosen: —
  rationale: Direct-object marker has no direct English equivalent and is not represented
    in translation.
- source_word: יְרַחְמְאֵל
  chosen: Jerahmeel
  rationale: Proper name, transliterated by standard English convention.
- source_word: רָם
  chosen: Ram
  rationale: Proper name, transliterated by standard English convention.
- source_word: כְּלוּבָי
  chosen: Chelubai
  alternatives:
  - Caleb
  lexicon: HALOT
  rationale: The consonantal form here is כְּלוּבָי, which is best represented directly
    as the personal name 'Chelubai' rather than harmonized to the more familiar 'Caleb.'
    Because some interpreters identify this figure with Caleb elsewhere in the genealogy,
    that alternative is preserved in a footnote rather than adopted in the main text.
