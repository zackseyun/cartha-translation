id: 1CH.2.46
reference: 1 Chronicles 2:46
source:
  edition: WLC
  text: וְ/עֵיפָה֙ פִּילֶ֣גֶשׁ כָּלֵ֔ב יָֽלְדָ֛ה אֶת חָרָ֥ן וְ/אֶת מוֹצָ֖א וְ/אֶת
    גָּזֵ֑ז וְ/חָרָ֖ן הֹלִ֥יד אֶת גָּזֵֽז־־־־׃ס
translation:
  text: And Ephah, Caleb’s concubine, bore Haran, Moza, and Gazez; and Haran fathered
    Gazez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Haran became the father of Gazez.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּילֶגֶשׁ
  chosen: concubine
  alternatives:
  - secondary wife
  lexicon: HALOT
  rationale: The Hebrew term denotes a woman of recognized but subordinate marital
    status. 'Concubine' is the standard concise English equivalent and fits the genealogical
    context better than a paraphrase.
- source_word: יָלְדָה
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: In genealogical notices, 'bore' is idiomatic, concise English for ילד
    when a woman is the subject.
- source_word: הֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogies commonly indicates male descent. 'Fathered'
    is natural modern English and preserves the genealogical force without archaic
    tone.
- source_word: עֵיפָה
  chosen: Ephah
  rationale: Personal name; transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: כָּלֵב
  chosen: Caleb
  rationale: Personal name; standard English transliteration.
- source_word: חָרָן
  chosen: Haran
  rationale: Personal name; transliterated consistently. The same name appears twice
    in the verse and is rendered identically in both instances.
- source_word: מוֹצָא
  chosen: Moza
  alternatives:
  - Motsa
  rationale: Personal name; rendered with the conventional English transliteration
    'Moza.'
- source_word: גָּזֵז
  chosen: Gazez
  rationale: Personal name; transliterated consistently in both occurrences.
- source_word: וְ
  chosen: and
  alternatives:
  - now
  rationale: The conjunction links names and clauses in a straightforward genealogical
    sequence; 'and' is the natural rendering throughout.
- source_word: אֶת
  chosen: '[not translated separately]'
  lexicon: HALOT
  rationale: Direct-object marker has no direct English equivalent and is represented
    implicitly by English word order.
