id: 1CH.2.1
reference: 1 Chronicles 2:1
source:
  edition: WLC
  text: אֵ֖לֶּה בְּנֵ֣י יִשְׂרָאֵ֑ל רְאוּבֵ֤ן שִׁמְעוֹן֙ לֵוִ֣י וִ/יהוּדָ֔ה יִשָׂשכָ֖ר
    וּ/זְבֻלֽוּן׃
translation:
  text: 'These are the sons of Israel: Reuben, Simeon, Levi, and Judah, Issachar,
    and Zebulun.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These were
  lexicon: HALOT
  rationale: 'Deictic plural introducing a list; English idiom naturally supplies
    the copula: ''These are.'' Present-tense list introduction fits the genealogical
    heading style.'
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: The construct phrase בְּנֵי יִשְׂרָאֵל here introduces Jacob/Israel's
    male offspring by name. 'Sons of' is more precise than 'children of' or 'descendants
    of' because the verse lists the tribal patriarchs themselves, not a broader mixed-gender
    or later genealogical group.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - Jacob
  lexicon: HALOT
  rationale: The Hebrew uses the covenant name 'Israel.' Since this is a proper name
    and personal names are transliterated, 'Israel' is retained rather than interpreted
    as 'Jacob,' though the referent is the patriarch Jacob/Israel.
- source_word: רְאוּבֵן
  chosen: Reuben
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: שִׁמְעוֹן
  chosen: Simeon
  alternatives:
  - Shimeon
  lexicon: HALOT
  rationale: Standard conventional English transliteration.
- source_word: לֵוִי
  chosen: Levi
  lexicon: HALOT
  rationale: Standard conventional English transliteration.
- source_word: וִיהוּדָה
  chosen: and Judah
  lexicon: HALOT
  rationale: The conjunction is explicit in Hebrew and is retained. 'Judah' is the
    standard English transliteration of the personal name.
- source_word: יִשָׂשכָר
  chosen: Issachar
  alternatives:
  - Issakar
  lexicon: HALOT
  rationale: Standard conventional English transliteration of the tribal patriarch's
    name.
- source_word: וּזְבֻלוּן
  chosen: and Zebulun
  alternatives:
  - and Zebulon
  lexicon: HALOT
  rationale: The conjunction is explicit in Hebrew and is retained. 'Zebulun' is the
    standard English transliteration; 'Zebulon' is a familiar English variant but
    less directly aligned with the Hebrew vocalization.
