id: 1CH.2.52
reference: 1 Chronicles 2:52
source:
  edition: WLC
  text: וַ/יִּהְי֤וּ בָנִים֙ לְ/שׁוֹבָ֔ל אֲבִ֖י קִרְיַ֣ת יְעָרִ֑ים הָרֹאֶ֖ה חֲצִ֥י
    הַ/מְּנֻחֽוֹת׃
translation:
  text: 'And Shobal the father of Kiriath-jearim had sons: Haroeh, half of the Manahathites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the founder of Kiriath-jearim'; 'father of' in genealogies can denote
      the ancestor or leading founder associated with a town.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'half of the Menuhoth'; this may mean 'half of Menuhoth' or 'half
      of the inhabitants/clan of Menuhoth (Manahath).'
    reason: lexical_alternative
  - marker: c
    text: Haroeh may reflect a personal name otherwise rendered 'Reaiah' in some traditions.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּהְיוּ בָנִים לְשׁוֹבָל
  chosen: And Shobal ... had sons
  alternatives:
  - And there were sons to Shobal
  lexicon: HALOT
  rationale: The Hebrew idiom 'there were sons to X' is naturally rendered in English
    as 'X had sons' while preserving the genealogical sense.
- source_word: אֲבִי קִרְיַת יְעָרִים
  chosen: the father of Kiriath-jearim
  alternatives:
  - the founder of Kiriath-jearim
  lexicon: HALOT
  rationale: In genealogical and settlement contexts, 'father of' can denote ancestor,
    founder, or chief associated with a town. The more literal 'father of' is retained
    in the main text for transparency, with the broader sense noted as an alternative.
- source_word: קִרְיַת יְעָרִים
  chosen: Kiriath-jearim
  alternatives:
  - Kiriath-jearim (City of Forests)
  rationale: This is a place name and should be transliterated rather than translated,
    per the translation philosophy for names.
- source_word: הָרֹאֶה
  chosen: Haroeh
  alternatives:
  - Reaiah
  - the seer
  lexicon: HALOT
  rationale: In this genealogical list the form functions as a proper name. Although
    the consonants are related to the verb 'to see' and some versions connect it with
    a name such as Reaiah, transliteration best preserves the Hebrew form without
    over-interpreting it.
- source_word: חֲצִי הַמְּנֻחוֹת
  chosen: half of the Manahathites
  alternatives:
  - half of Menuhoth
  - half of the inhabitants of Menuhoth
  lexicon: HALOT
  rationale: The phrase literally reads 'half of the Menuhoth/Manahath.' In the genealogical-geographical
    context, it likely refers to a clan or population group associated with Manahath/Menuhoth.
    'Manahathites' gives a clear English sense while preserving the likely gentilical
    force; the more place-oriented alternatives are preserved in a footnote.
