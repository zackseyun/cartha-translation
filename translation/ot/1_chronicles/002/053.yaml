id: 1CH.2.53
reference: 1 Chronicles 2:53
source:
  edition: WLC
  text: וּ/מִשְׁפְּחוֹת֙ קִרְיַ֣ת יְעָרִ֔ים הַ/יִּתְרִי֙ וְ/הַ/פּוּתִ֔י וְ/הַ/שֻּׁמָתִ֖י
    וְ/הַ/מִּשְׁרָעִ֑י מֵ/אֵ֗לֶּה יָצְאוּ֙ הַ/צָּ֣רְעָתִ֔י וְ/הָ/אֶשְׁתָּ֖אֻֽלִֽי׃ס
translation:
  text: 'And the clans of Kiriath-jearim: the Ithrites, the Puthites, the Shumathites,
    and the Mishraites. From these came the Zorathites and the Eshtaolites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'families' instead of 'clans'; the Hebrew term often refers to extended
      kinship groups within a tribal genealogy.
    reason: lexical_alternative
  - marker: b
    text: 'Literally ''went out''; here the sense is genealogical origin: these groups
      descended from or emerged from the preceding clans.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִשְׁפְּחוֹת
  chosen: And the clans
  alternatives:
  - And the families
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת in genealogical contexts commonly denotes clan groupings
    within a tribe or lineage rather than merely nuclear families. 'Clans' best fits
    the social structure in English while remaining close to the Hebrew.
- source_word: קִרְיַת יְעָרִים
  chosen: Kiriath-jearim
  alternatives:
  - Kiriath Yearim
  lexicon: HALOT
  rationale: This is a place name, so it is transliterated rather than translated,
    in keeping with the translation philosophy for names.
- source_word: הַיִּתְרִי
  chosen: the Ithrites
  alternatives:
  - the Jethrites
  lexicon: HALOT
  rationale: A gentilicial/clan designation derived from a proper name. 'Ithrites'
    reflects a straightforward transliteration of the Hebrew form in this context.
- source_word: וְהַפּוּתִי
  chosen: the Puthites
  alternatives:
  - the Putites
  lexicon: HALOT
  rationale: Another clan/gentilic name; transliterated directly. The medial 'th'
    reflects common English representation of the Hebrew consonantal pattern in gentilics.
- source_word: וְהַשֻּׁמָתִי
  chosen: the Shumathites
  alternatives:
  - the Shumites
  lexicon: HALOT
  rationale: Clan designation best represented by transliteration. 'Shumathites' preserves
    the fuller Hebrew form more transparently than a shortened anglicization.
- source_word: וְהַמִּשְׁרָעִי
  chosen: the Mishraites
  alternatives:
  - the Mishrites
  lexicon: HALOT
  rationale: Gentilic/clan name transliterated from the Hebrew. 'Mishraites' preserves
    the likely stem more clearly in English.
- source_word: מֵאֵלֶּה
  chosen: From these
  alternatives:
  - From them
  - From these people
  lexicon: HALOT
  rationale: The phrase points back to the previously named clans as the source from
    which the following groups emerged. 'From these' is concise and natural.
- source_word: יָצְאוּ
  chosen: came
  alternatives:
  - went out
  - descended
  lexicon: HALOT
  rationale: Literally 'went out/came out,' but in genealogical prose it indicates
    origin or emergence. 'Came' in the phrase 'came the...' communicates derivation
    idiomatically without over-paraphrasing.
- source_word: הַצָּרְעָתִי
  chosen: the Zorathites
  alternatives:
  - the Zareathites
  lexicon: HALOT
  rationale: This gentilic is traditionally connected with Zorah/צרעה. 'Zorathites'
    is the standard English form that reflects that place-derived identity.
- source_word: וְהָאֶשְׁתָּאֻלִי
  chosen: the Eshtaolites
  alternatives:
  - the Eshtaulites
  lexicon: HALOT
  rationale: Gentilic from Eshtaol, transliterated in a familiar English biblical
    form. This preserves the place-name connection.
