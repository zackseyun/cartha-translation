id: 1CH.2.28
reference: 1 Chronicles 2:28
source:
  edition: WLC
  text: וַ/יִּהְי֥וּ בְנֵי אוֹנָ֖ם שַׁמַּ֣י וְ/יָדָ֑ע וּ/בְנֵ֣י שַׁמַּ֔י נָדָ֖ב וַ/אֲבִישֽׁוּר־׃
translation:
  text: 'The sons of Onam were Shammai and Jada. The sons of Shammai: Nadab and Abishur.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more woodenly, 'And the sons of Shammai were Nadab and Abishur.' The
      Hebrew repeats the genealogical formula with a conjunction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - became
  - came to be
  lexicon: HALOT
  rationale: In genealogical formulae, היה commonly functions as a simple copular/existential
    verb introducing descendants. 'Were' is natural English and preserves the formula
    without overtranslating.
- source_word: בְנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: In this genealogy the immediate male lineage is in view, so 'sons of'
    is more precise than the broader 'children of' or 'descendants of.' This follows
    the gender-accurate principle.
- source_word: אוֹנָם
  chosen: Onam
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: שַׁמַּי
  chosen: Shammai
  alternatives:
  - Shammai
  rationale: Personal name transliterated rather than translated. Same form retained
    consistently for both occurrences in the verse.
- source_word: יָדָע
  chosen: Jada
  alternatives:
  - Jeda
  rationale: As a personal name, it is transliterated. 'Jada' reflects the consonantal
    form and common English convention in this verse's genealogical context.
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - Now the sons of
  lexicon: HALOT
  rationale: The conjunction introduces the next genealogical branch. English can
    omit a strictly connective 'and' for smoother style while preserving the structure.
    Repeating 'The sons of' keeps the genealogy clear.
- source_word: נָדָב
  chosen: Nadab
  rationale: Personal name transliterated by standard convention.
- source_word: אֲבִישׁוּר
  chosen: Abishur
  rationale: Personal name transliterated by standard convention.
