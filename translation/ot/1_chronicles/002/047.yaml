id: 1CH.2.47
reference: 1 Chronicles 2:47
source:
  edition: WLC
  text: וּ/בְנֵ֖י יָהְדָּ֑י רֶ֧גֶם וְ/יוֹתָ֛ם וְ/גֵישָׁ֥ן וָ/פֶ֖לֶט וְ/עֵיפָ֥ה וָ/שָֽׁעַף׃
translation:
  text: 'The sons of Jahdai: Regem, Jotham, Geshan, Pelet, Ephah, and Shaaph.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - The descendants of
  lexicon: HALOT
  rationale: בני is the construct plural of 'sons,' introducing a genealogical list.
    'The sons of' is the most direct and natural English rendering in this context.
    'Descendants of' is possible in genealogies, but there is no contextual pressure
    here to broaden beyond the literal genealogical formula.
- source_word: יָהְדָּי
  chosen: Jahdai
  alternatives:
  - Yahdai
  rationale: This is a personal name and should be transliterated rather than translated,
    per project philosophy. 'Jahdai' follows a standard English-style transliteration;
    'Yahdai' is a possible alternative reflecting the initial consonant more explicitly.
- source_word: רֶגֶם
  chosen: Regem
  rationale: Personal name; transliterated directly.
- source_word: יוֹתָם
  chosen: Jotham
  alternatives:
  - Yotam
  rationale: Personal name; 'Jotham' is the conventional English transliteration,
    while 'Yotam' is a more phonetic alternative. The conventional form aids readability
    and recognizability.
- source_word: גֵישָׁן
  chosen: Geshan
  alternatives:
  - Geishan
  rationale: Personal name; transliterated directly. Vowel representation in English
    is somewhat flexible, but 'Geshan' is a straightforward conventional-style rendering.
- source_word: פֶלֶט
  chosen: Pelet
  alternatives:
  - Peleth
  rationale: Personal name; transliterated directly. Final tav without dagesh is commonly
    rendered simply as 't' in modern English transliteration.
- source_word: עֵיפָה
  chosen: Ephah
  alternatives:
  - Eifah
  rationale: Personal name here, not the common noun for a dry measure. 'Ephah' is
    the established English form for this name.
- source_word: שָׁעַף
  chosen: Shaaph
  alternatives:
  - Shaaf
  rationale: Personal name; transliterated directly. 'Shaaph' preserves the doubled
    vowel/consonantal feel of the Hebrew better than a simplified form.
