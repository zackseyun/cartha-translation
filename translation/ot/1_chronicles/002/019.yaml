id: 1CH.2.19
reference: 1 Chronicles 2:19
source:
  edition: WLC
  text: וַ/תָּ֖מָת עֲזוּבָ֑ה וַ/יִּֽקַּֽח ל֤/וֹ כָלֵב֙ אֶת אֶפְרָ֔ת וַ/תֵּ֥לֶד ל֖/וֹ
    אֶת חֽוּר־־־׃
translation:
  text: Azubah died, and Caleb took Ephrath as his wife, and she bore Hur to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, 'Caleb married Ephrath.' The Hebrew literally says 'Caleb took
      Ephrath,' an idiom for marriage.
    reason: lexical_alternative
  - marker: b
    text: The name may also be rendered 'Ephrathah' in related forms elsewhere, but
      the Hebrew here reads the shorter form 'Ephrath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: Qal wayyiqtol of מות, the standard verb for dying. 'Died' is the plain,
    direct English equivalent and avoids euphemism.
- source_word: עֲזוּבָה
  chosen: Azubah
  rationale: Proper personal name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: וַיִּקַּח לוֹ
  chosen: took ... as his wife
  alternatives:
  - married
  - took
  lexicon: HALOT
  rationale: לקח with a woman as object commonly functions idiomatically for taking
    in marriage. 'Took ... as his wife' preserves the Hebrew idiom while making the
    marital sense explicit; 'married' is possible but slightly less formally transparent.
- source_word: כָלֵב
  chosen: Caleb
  rationale: Proper personal name, transliterated by standard English convention.
- source_word: אֶפְרָת
  chosen: Ephrath
  alternatives:
  - Ephrathah
  rationale: Proper personal name. The Hebrew form here is אֶפְרָת, best represented
    as 'Ephrath.' 'Ephrathah' reflects a related/expanded form found elsewhere, but
    this verse's form is shorter.
- source_word: וַתֵּלֶד לוֹ
  chosen: she bore ... to him
  alternatives:
  - she gave birth to ... for him
  - she bore him
  lexicon: HALOT
  rationale: ילד in the Qal with indirect object indicates childbirth. 'She bore Hur
    to him' is slightly formal but accurately reflects both the verb and the pronominal
    phrase לּוֹ.
- source_word: חוּר
  chosen: Hur
  rationale: Proper personal name, transliterated by standard English convention.
