id: 1CH.2.14
reference: 1 Chronicles 2:14
source:
  edition: WLC
  text: נְתַנְאֵל֙ הָֽ/רְבִיעִ֔י רַדַּ֖י הַ/חֲמִישִֽׁי׃
translation:
  text: Nethanel the fourth, Raddai the fifth.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: נְתַנְאֵל
  chosen: Nethanel
  alternatives:
  - Netanel
  lexicon: HALOT
  rationale: Proper personal name; per translation philosophy, personal names are
    transliterated rather than translated. 'Nethanel' follows standard English biblical
    convention.
- source_word: הָרְבִיעִי
  chosen: the fourth
  alternatives:
  - fourth
  lexicon: HALOT
  rationale: Ordinal adjective with article, functioning in a genealogical list to
    mark birth order. Rendering the article explicitly as 'the fourth' is natural
    and preserves the Hebrew structure.
- source_word: רַדַּי
  chosen: Raddai
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention.
- source_word: הַחֲמִישִׁי
  chosen: the fifth
  alternatives:
  - fifth
  lexicon: HALOT
  rationale: Ordinal adjective with article, parallel to the previous phrase, indicating
    sequence in the genealogy. 'The fifth' preserves the formal listing style of the
    Hebrew.
