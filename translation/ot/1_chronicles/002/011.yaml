id: 1CH.2.11
reference: 1 Chronicles 2:11
source:
  edition: WLC
  text: וְ/נַחְשׁוֹן֙ הוֹלִ֣יד אֶת שַׂלְמָ֔א וְ/שַׂלְמָ֖א הוֹלִ֥יד אֶת בֹּֽעַז־־׃
translation:
  text: Nahshon fathered Salma, and Salma fathered Boaz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Salma; some translations read Salmon to harmonize with related genealogies
      (for example, Ruth 4:20–21; Matt. 1:4–5).
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/נַחְשׁוֹן
  chosen: Nahshon
  alternatives:
  - Naashon
  lexicon: HALOT
  rationale: Proper name; transliterated rather than translated per philosophy. 'Nahshon'
    is the standard English transliteration for נַחְשׁוֹן.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In genealogical contexts ילד in the Hiphil commonly means 'to father,
    beget.' 'Fathered' is concise, natural modern English, and preserves the male
    genealogical sense better than the archaic 'begot.'
- source_word: אֶת
  chosen: '[not translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent lexical meaning in English;
    reflected implicitly by English syntax.
- source_word: שַׂלְמָא
  chosen: Salma
  alternatives:
  - Salmon
  lexicon: HALOT
  rationale: The Hebrew form here is שַׂלְמָא, which is more directly represented
    by 'Salma.' Although 'Salmon' appears in some English Bible traditions and related
    genealogical passages, the source text here supports 'Salma' as the primary rendering.
- source_word: וְ/שַׂלְמָא
  chosen: and Salma
  alternatives:
  - and Salmon
  lexicon: HALOT
  rationale: The conjunction ו is naturally rendered 'and,' and the proper name is
    again best represented by the Hebrew form 'Salma' in this verse.
- source_word: בֹּעַז
  chosen: Boaz
  lexicon: HALOT
  rationale: Proper name; standard English transliteration of the Hebrew personal
    name בֹּעַז.
