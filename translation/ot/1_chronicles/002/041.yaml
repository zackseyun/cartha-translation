id: 1CH.2.41
reference: 1 Chronicles 2:41
source:
  edition: WLC
  text: וְ/שַׁלּוּם֙ הוֹלִ֣יד אֶת יְקַמְיָ֔ה וִֽ/יקַמְיָ֖ה הֹלִ֥יד אֶת אֱלִישָׁמָֽע־־׃
translation:
  text: Shallum fathered Jekamiah, and Jekamiah fathered Elishama.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שַׁלּוּם
  chosen: Shallum
  rationale: Proper personal name; transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogical contexts commonly means 'to father,
    beget.' 'Fathered' is concise, natural modern English and preserves the genealogical
    force better than the archaic 'begot.'
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no standalone English equivalent; its function
    is represented by English word order.
- source_word: יְקַמְיָה
  chosen: Jekamiah
  alternatives:
  - Jekamiahh
  rationale: Proper personal name; standard English transliteration is 'Jekamiah.'
- source_word: וִיקַמְיָה
  chosen: and Jekamiah
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered as 'and'; the name is again transliterated.
    Repetition is retained because the Hebrew repeats the name in genealogical sequence.
- source_word: הֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: Same verb and same genealogical sense as earlier in the verse, so the
    same English gloss is maintained for consistency.
- source_word: אֱלִישָׁמָע
  chosen: Elishama
  rationale: Proper personal name; transliterated by standard convention.
