id: 1CH.2.26
reference: 1 Chronicles 2:26
source:
  edition: WLC
  text: וַ/תְּהִ֨י אִשָּׁ֥ה אַחֶ֛רֶת לִֽ/ירַחְמְאֵ֖ל וּ/שְׁמָ֣/הּ עֲטָרָ֑ה הִ֖יא אֵ֥ם
    אוֹנָֽם׃ס
translation:
  text: Jerahmeel also had another wife, and her name was Atarah; she was the mother
    of Onam.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתְּהִי
  chosen: also had
  alternatives:
  - there was
  - and there was
  lexicon: HALOT
  rationale: The verb היה with ל plus a person commonly expresses possession/existence
    in context ('there was to Jerahmeel'). In natural English genealogy style, 'had'
    best conveys the sense. 'Also' reflects the waw-consecutive in context, indicating
    an additional wife.
- source_word: אִשָּׁה אַחֶרֶת
  chosen: another wife
  alternatives:
  - an additional wife
  - a different wife
  lexicon: HALOT
  rationale: אִשָּׁה means 'woman/wife'; with לירחמאל in a genealogical notice, 'wife'
    is the contextual sense. אַחֶרֶת indicates addition or distinction; 'another wife'
    is the most idiomatic and contextually precise rendering.
- source_word: לִירַחְמְאֵל
  chosen: Jerahmeel
  rationale: Personal names are transliterated by standard convention per translation
    philosophy. The prefixed ל is absorbed into the English possessive construction
    'Jerahmeel ... had' rather than rendered woodenly as 'to Jerahmeel'.
- source_word: וּשְׁמָהּ
  chosen: and her name was
  alternatives:
  - whose name was
  lexicon: HALOT
  rationale: A standard Hebrew naming formula. 'And her name was' preserves the coordination
    and remains natural English.
- source_word: עֲטָרָה
  chosen: Atarah
  rationale: Proper name transliterated rather than translated.
- source_word: הִיא
  chosen: she
  alternatives:
  - she herself
  lexicon: HALOT
  rationale: The independent pronoun adds slight emphasis or clarification. In English,
    simple 'she' is sufficient and natural without overstating emphasis.
- source_word: אֵם
  chosen: mother
  lexicon: HALOT
  rationale: Straightforward lexical rendering in a genealogical context.
- source_word: אוֹנָם
  chosen: Onam
  rationale: Proper name transliterated by standard convention.
