id: 1CH.2.38
reference: 1 Chronicles 2:38
source:
  edition: WLC
  text: וְ/עוֹבֵד֙ הוֹלִ֣יד אֶת יֵה֔וּא וְ/יֵה֖וּא הוֹלִ֥יד אֶת עֲזַרְיָֽה־־׃
translation:
  text: Obed fathered Jehu, and Jehu fathered Azariah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: עוֹבֵד
  chosen: Obed
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention
    rather than translated, following the policy to transliterate names.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In genealogical contexts ילד in the Hiphil commonly denotes direct descent
    as 'fathered' or 'became the father of.' 'Fathered' is concise, natural modern
    English and preserves the male genealogical sense better than the archaic 'begot'.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no standalone English equivalent; its function
    is represented by normal English word order.
- source_word: יֵהוּא
  chosen: Jehu
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: וְ
  chosen: and
  alternatives:
  - now
  - then
  lexicon: HALOT
  rationale: Simple conjunction linking the two genealogical clauses; 'and' best matches
    the Hebrew coordination without adding discourse nuance.
- source_word: עֲזַרְיָה
  chosen: Azariah
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention.
