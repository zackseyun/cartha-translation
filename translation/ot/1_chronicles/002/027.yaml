id: 1CH.2.27
reference: 1 Chronicles 2:27
source:
  edition: WLC
  text: וַ/יִּהְי֥וּ בְנֵי רָ֖ם בְּכ֣וֹר יְרַחְמְאֵ֑ל מַ֥עַץ וְ/יָמִ֖ין וָ/עֵֽקֶר־׃
translation:
  text: 'The sons of Ram: Jerahmeel the firstborn, Maaz, Jamin, and Eker.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew literally, ''And the sons of Ram were: Jerahmeel the firstborn,
      Maaz, Jamin, and Eker.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: '[understood in the verbless-style list as introducing the genealogy]'
  alternatives:
  - and there were
  - and they were
  lexicon: HALOT
  rationale: The verb 'and they were' functions idiomatically to introduce a genealogical
    list. In natural English, the sense is best carried by a colon after 'The sons
    of Ram' rather than by a wooden 'and there were.' The existence/listing force
    is preserved without awkwardness.
- source_word: בְנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: In genealogical contexts בנים commonly denotes male offspring/lineage
    members. Here the named individuals are male descendants, so 'sons of' is the
    most direct and gender-accurate rendering.
- source_word: רָם
  chosen: Ram
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: בְּכוֹר
  chosen: the firstborn
  alternatives:
  - firstborn son
  - his firstborn
  lexicon: HALOT
  rationale: The construct with the following proper name identifies Jerahmeel as
    the firstborn. 'The firstborn' is concise and natural in apposition to the name.
- source_word: יְרַחְמְאֵל
  chosen: Jerahmeel
  rationale: Personal name transliterated by standard convention.
- source_word: מַעַץ
  chosen: Maaz
  alternatives:
  - Maats
  rationale: Proper name transliterated in its conventional English form 'Maaz.'
- source_word: יָמִין
  chosen: Jamin
  alternatives:
  - Yamin
  rationale: Proper name transliterated in the familiar English biblical form 'Jamin.'
    Though the underlying root can mean 'right hand' or 'south,' here it is clearly
    a personal name.
- source_word: עֵקֶר
  chosen: Eker
  alternatives:
  - Aker
  rationale: Proper name transliterated as 'Eker,' the standard English representation
    of the Hebrew name in this context.
