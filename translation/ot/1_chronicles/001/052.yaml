id: 1CH.1.52
reference: 1 Chronicles 1:52
source:
  edition: WLC
  text: אַלּ֧וּף אָהֳלִיבָמָ֛ה אַלּ֥וּף אֵלָ֖ה אַלּ֥וּף פִּינֹֽן׃
translation:
  text: Chief Oholibamah, chief Elah, chief Pinon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clan chief.' Older English versions often render אַלּוּף as 'duke.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלּוּף
  chosen: chief
  alternatives:
  - clan chief
  - duke
  - leader
  lexicon: HALOT
  rationale: In the Edomite genealogy lists, אַלּוּף denotes a tribal or clan leader
    rather than a military 'commander' in a narrow sense. 'Chief' is concise, natural
    English, and fits the repeated titular formula before each proper name. 'Duke'
    is traditional in older English versions but is archaic and potentially misleading.
- source_word: אָהֳלִיבָמָה
  chosen: Oholibamah
  alternatives:
  - Aholibamah
  rationale: Personal names are transliterated rather than translated, following project
    philosophy. 'Oholibamah' reflects a standard English transliteration of the Hebrew
    name.
- source_word: אֵלָה
  chosen: Elah
  rationale: Proper name transliterated directly from the Hebrew. No translation is
    attempted because this is a personal/clan name in the genealogy list.
- source_word: פִּינֹן
  chosen: Pinon
  alternatives:
  - Pinnon
  rationale: Proper name transliterated directly from the Hebrew consonantal form.
    'Pinon' is the standard concise English form.
