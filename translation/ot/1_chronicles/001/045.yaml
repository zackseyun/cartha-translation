id: 1CH.1.45
reference: 1 Chronicles 1:45
source:
  edition: WLC
  text: וַ/יָּ֖מָת יוֹבָ֑ב וַ/יִּמְלֹ֣ךְ תַּחְתָּ֔י/ו חוּשָׁ֖ם מֵ/אֶ֥רֶץ הַ/תֵּימָנִֽי׃
translation:
  text: And Yobab died, and Husham from the land of the Temanites reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditionally, 'Jobab' for 'Yobab.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the land of Teman' or 'from the land of the Temanite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - and he died
  lexicon: HALOT
  rationale: Wayyiqtol of מות narrates the next event in sequence. English supplies
    the subject by naming Yobab, so 'died' is the natural rendering.
- source_word: יוֹבָב
  chosen: Yobab
  alternatives:
  - Jobab
  lexicon: HALOT
  rationale: Personal names are transliterated. 'Yobab' reflects the Hebrew form more
    directly, while 'Jobab' is a familiar traditional English form; the more transparent
    transliteration is preferred.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: מלך in this succession formula is well rendered by 'reigned.' 'Became
    king' is possible, but the standard narrative sense in royal lists is that he
    assumed kingship and reigned.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - after him
  - instead of him
  lexicon: HALOT
  rationale: תחת with pronominal suffix in succession contexts means replacement/succession.
    'In his place' is idiomatic English and preserves the sense of direct succession.
- source_word: חוּשָׁם
  chosen: Husham
  lexicon: HALOT
  rationale: Personal name transliterated directly from the Hebrew.
- source_word: מֵאֶרֶץ
  chosen: from the land of
  alternatives:
  - from
  - out of the land of
  lexicon: HALOT
  rationale: The preposition מן plus אֶרֶץ identifies geographic origin. 'From the
    land of' preserves the fuller Hebrew expression better than the shorter 'from'
    alone.
- source_word: הַתֵּימָנִי
  chosen: the Temanites
  alternatives:
  - Teman
  - the Temanite
  lexicon: HALOT
  rationale: In this construction with 'land of,' the term functions as a gentilic
    or regional designation. 'The land of the Temanites' is smoother in English than
    'the land of the Temanite' and avoids implying a single individual named Teman
    in this immediate phrase, while still reflecting the Hebrew-derived place/people
    designation.
