id: 1CH.1.6
reference: 1 Chronicles 1:6
source:
  edition: WLC
  text: וּ/בְנֵ֖י גֹּ֑מֶר אַשְׁכֲּנַ֥ז וְ/דִיפַ֖ת וְ/תוֹגַרְמָֽה׃
translation:
  text: 'And the sons of Gomer: Ashkenaz, Diphath, and Togarmah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Genesis 10:3 reads 'Riphath' in the parallel genealogy; here the Hebrew
      text of Chronicles reads 'Diphath.'
    reason: textual_variant
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons.' In genealogical contexts, 'sons
    of' is the standard and most transparent rendering, preserving the formal lineage
    language rather than broadening to 'children of.' The prefixed conjunction ו is
    rendered 'And' to maintain the list structure.
- source_word: גֹּמֶר
  chosen: Gomer
  lexicon: HALOT
  rationale: Proper name; transliterated according to the translation philosophy to
    transliterate names rather than translate them.
- source_word: אַשְׁכֲּנַז
  chosen: Ashkenaz
  lexicon: HALOT
  rationale: Proper name; transliterated by standard English convention.
- source_word: דִיפַת
  chosen: Diphath
  alternatives:
  - Riphath
  lexicon: HALOT
  rationale: The Masoretic Text of Chronicles reads דִיפַת, which is best represented
    as 'Diphath.' Because the parallel genealogy in Genesis 10:3 has 'Riphath,' that
    alternative is worth preserving in a footnote, but the main text follows the source
    text of this verse.
- source_word: תוֹגַרְמָה
  chosen: Togarmah
  lexicon: HALOT
  rationale: Proper name; transliterated by standard English convention.
