id: 1CH.1.20
reference: 1 Chronicles 1:20
source:
  edition: WLC
  text: וְ/יָקְטָ֣ן יָלַ֔ד אֶת אַלְמוֹדָ֖ד וְ/אֶת שָׁ֑לֶף וְ/אֶת חֲצַרְמָ֖וֶת וְ/אֶת
    יָֽרַח־־־־׃
translation:
  text: Joktan fathered Almodad, Sheleph, Hazarmaveth, and Jerah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'became the father of'; traditionally, 'begot.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָקְטָן
  chosen: Joktan
  alternatives:
  - Yoqtan
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. 'Joktan' follows standard English biblical convention.
- source_word: יָלַד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In genealogical context, יָלַד commonly denotes begetting/parentage rather
    than the more general 'gave birth.' 'Fathered' is concise, natural modern English,
    and preserves the male genealogical sense better than 'became the father of,'
    while avoiding archaic 'begot.'
- source_word: אֶת
  chosen: '[not separately translated; marks direct object]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent English equivalent; represented
    by normal English syntax.
- source_word: אַלְמוֹדָד
  chosen: Almodad
  lexicon: HALOT
  rationale: Proper name; transliterated by standard convention.
- source_word: שָׁלֶף
  chosen: Sheleph
  alternatives:
  - Shelaph
  lexicon: HALOT
  rationale: Proper name; transliterated. 'Sheleph' reflects a common English form
    from the Hebrew vocalization.
- source_word: חֲצַרְמָוֶת
  chosen: Hazarmaveth
  alternatives:
  - Hazarmaveth
  lexicon: HALOT
  rationale: Proper name; transliterated. The chosen form preserves the Hebrew consonantal
    shape and matches common English biblical usage.
- source_word: יָרַח
  chosen: Jerah
  alternatives:
  - Yerah
  lexicon: HALOT
  rationale: Proper name; transliterated by standard English convention, using J for
    initial yod as in many established biblical name forms.
