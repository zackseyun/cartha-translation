id: 1CH.1.44
reference: 1 Chronicles 1:44
source:
  edition: WLC
  text: וַ/יָּ֖מָת בָּ֑לַע וַ/יִּמְלֹ֣ךְ תַּחְתָּ֔י/ו יוֹבָ֥ב בֶּן זֶ֖רַח מִ/בָּצְרָֽה־׃
translation:
  text: Bela died, and Jobab son of Zerah from Bozrah reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "of Bozrah." The Hebrew preposition can mark origin or association with
      the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - and died
  lexicon: HALOT
  rationale: Wayyiqtol of מוּת narrates the next event in sequence. English idiom
    does not require repeating 'and' before the first verb when the sentence already
    continues with a coordinated clause.
- source_word: בָּלַע
  chosen: Bela
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: מלך in the Qal wayyiqtol here denotes accession to kingship. 'Reigned'
    is the standard concise rendering in royal succession formulas and fits the chronicler's
    style.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: תחת with pronominal suffix in succession contexts means taking the predecessor's
    place. 'In his place' is natural English and preserves the succession formula.
- source_word: יוֹבָב
  chosen: Jobab
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: בֶּן זֶרַח
  chosen: son of Zerah
  rationale: Standard Hebrew patronymic construction; rendered formally and transparently.
- source_word: מִבָּצְרָה
  chosen: from Bozrah
  alternatives:
  - of Bozrah
  lexicon: HALOT
  rationale: The prefixed מִן normally indicates origin or association. 'From Bozrah'
    is the most direct rendering, though in English it can also imply hometown/territorial
    association.
