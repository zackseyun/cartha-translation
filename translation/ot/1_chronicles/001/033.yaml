id: 1CH.1.33
reference: 1 Chronicles 1:33
source:
  edition: WLC
  text: וּ/בְנֵ֣י מִדְיָ֗ן עֵיפָ֤ה וָ/עֵ֨פֶר֙ וַ/חֲנ֔וֹךְ וַ/אֲבִידָ֖ע וְ/אֶלְדָּעָ֑ה
    כָּל אֵ֖לֶּה בְּנֵ֥י קְטוּרָֽה־׃ס
translation:
  text: 'The sons of Midian: Ephah, Epher, Hanoch, Abida, and Eldaah. All these were
    the sons of Keturah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Hanoch; traditionally 'Enoch' in some English Bibles.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - Now the sons of
  lexicon: HALOT
  rationale: Construct plural of בֵּן with prefixed conjunction. In English genealogy
    style, 'The sons of' is natural and sufficiently formal; the conjunction is not
    always carried with a separate 'and' at the start of a list verse.
- source_word: מִדְיָן
  chosen: Midian
  lexicon: HALOT
  rationale: Proper name; transliterated according to standard English convention.
- source_word: עֵיפָה
  chosen: Ephah
  alternatives:
  - Eiphah
  lexicon: HALOT
  rationale: Proper name; standard English biblical transliteration is retained.
- source_word: וָעֵפֶר
  chosen: Epher
  alternatives:
  - and Epher
  lexicon: HALOT
  rationale: Proper name with conjunction. The conjunction is represented by comma-listing
    plus final 'and' in idiomatic English.
- source_word: וַחֲנוֹךְ
  chosen: Hanoch
  alternatives:
  - Hanokh
  - and Hanoch
  lexicon: HALOT
  rationale: Proper name; transliterated rather than translated. Distinct from the
    more familiar English form 'Enoch' because the Hebrew here is best represented
    directly as 'Hanoch' in a genealogical list.
- source_word: וַאֲבִידָע
  chosen: Abida
  alternatives:
  - Abidah
  - and Abida
  lexicon: HALOT
  rationale: Proper name; standard English rendering in this verse is 'Abida.'
- source_word: וְאֶלְדָּעָה
  chosen: and Eldaah
  alternatives:
  - Eldaah
  lexicon: HALOT
  rationale: Final item in the series takes 'and' in English. Proper name transliterated
    directly.
- source_word: כָּל אֵלֶּה
  chosen: All these
  alternatives:
  - All of these
  - All these men
  lexicon: HALOT
  rationale: Straightforward demonstrative phrase summing up the preceding names.
    'All these' is concise and natural.
- source_word: בְּנֵי קְטוּרָה
  chosen: were the sons of Keturah
  alternatives:
  - were Keturah's sons
  lexicon: HALOT
  rationale: Construct phrase identifying the listed descendants as belonging to Keturah's
    line. Supplying 'were' is required for clear English syntax.
- source_word: קְטוּרָה
  chosen: Keturah
  lexicon: HALOT
  rationale: Proper name; transliterated by standard convention.
