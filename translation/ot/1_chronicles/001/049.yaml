id: 1CH.1.49
reference: 1 Chronicles 1:49
source:
  edition: WLC
  text: וַ/יָּ֖מָת שָׁא֑וּל וַ/יִּמְלֹ֣ךְ תַּחְתָּ֔י/ו בַּ֥עַל חָנָ֖ן בֶּן עַכְבּֽוֹר־׃
translation:
  text: And Shaul died, and Baal-hanan son of Akbor reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditional English versions often spell these names 'Saul,' 'Baal-hanan,'
      and 'Achbor.' This draft uses more direct Hebrew-based transliterations for
      personal names.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - and he died
  - passed away
  lexicon: HALOT
  rationale: Qal wayyiqtol of מוּת/מות, the standard narrative form meaning 'and he
    died.' 'Died' is the plain, non-euphemistic rendering best matching the Hebrew
    narrative sequence.
- source_word: שָׁאוּל
  chosen: Shaul
  alternatives:
  - Saul
  lexicon: HALOT
  rationale: Proper name transliterated per project philosophy to transliterate personal
    names rather than translate them. 'Saul' is the conventional English form, but
    'Shaul' more directly reflects the Hebrew spelling and sound.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: Qal wayyiqtol of מלך in royal succession formulae commonly means 'reigned'
    or 'became king.' 'Reigned' is concise and idiomatic in English genealogical/royal
    notices, while still conveying accession in context.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - in his stead
  - after him
  lexicon: HALOT
  rationale: The preposition תַּחַת with pronominal suffix indicates succession/substitution.
    'In his place' is natural modern English and accurately conveys royal succession.
- source_word: בַּעַל חָנָן
  chosen: Baal-hanan
  alternatives:
  - Baalhanan
  lexicon: HALOT
  rationale: Proper name transliterated. The hyphen helps English readers recognize
    the compound Hebrew name while preserving the source form.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  - descendant of
  lexicon: HALOT
  rationale: In this genealogical context בן straightforwardly denotes immediate filial
    relationship. 'Son of' is the standard and most transparent rendering.
- source_word: עַכְבּוֹר
  chosen: Akbor
  alternatives:
  - Achbor
  lexicon: HALOT
  rationale: Proper name transliterated from Hebrew. 'Achbor' is a common conventional
    form, but 'Akbor' more directly reflects the consonantal value in a simplified
    modern transliteration.
