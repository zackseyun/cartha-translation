id: 1CH.1.15
reference: 1 Chronicles 1:15
source:
  edition: WLC
  text: וְ/אֶת הַ/חִוִּ֥י וְ/אֶת הַֽ/עַרְקִ֖י וְ/אֶת הַ/סִּינִֽי־־־׃
translation:
  text: and the Hivites, and the Arkites, and the Sinites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew uses singular gentilic forms with the article ('the Hivite,' 'the
      Arkite,' 'the Sinite'), but in this genealogical context they denote peoples
      or clans; hence the English plurals 'Hivites,' 'Arkites,' and 'Sinites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  chosen: and
  alternatives:
  - and [object marker left untranslated]
  lexicon: HALOT
  rationale: The conjunction ו is rendered 'and.' The direct-object marker אֵת has
    no natural English equivalent here and is not represented separately; the coordination
    of the list carries the sense.
- source_word: הַחִוִּי
  chosen: the Hivites
  alternatives:
  - the Hivite
  lexicon: HALOT
  rationale: 'This is an ethnonym/gentilic with the article, referring to a people
    group descended from Canaan in this genealogy context. English idiom normally
    renders such entries in plural form in lists of peoples: ''the Hivites.'''
- source_word: הָעַרְקִי
  chosen: the Arkites
  alternatives:
  - the Arkite
  lexicon: HALOT
  rationale: Gentilic/ethnic designation from a place or clan name. In this genealogical
    list of Canaanite groups, plural English 'the Arkites' best reflects the collective
    sense.
- source_word: הַסִּינִי
  chosen: the Sinites
  alternatives:
  - the Sinite
  lexicon: HALOT
  rationale: Gentilic/ethnic designation. As with the surrounding names, the collective
    people-group sense is best conveyed by the plural 'the Sinites.'
