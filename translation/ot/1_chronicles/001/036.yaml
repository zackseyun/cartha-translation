theological_decisions:
- issue: Genealogical relationship of Timna and Amalek in this verse compared with
    Genesis 36
  chosen_reading: Render both Timna and Amalek as members of the list of Eliphaz's
    sons in the main text, following the plain form of Chronicles.
  alternative_readings:
  - Treat Timna as a concubine and Amalek as her son, harmonizing with Genesis 36:12
  rationale: The Chronicler's wording here presents a simple list under 'The sons
    of Eliphaz.' Optimal equivalence favors translating the verse as written rather
    than importing explanatory material from the parallel account. Because readers
    may notice the difference from Genesis 36, the alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition) and §3 (Preserve theological tension rather than resolve it).
