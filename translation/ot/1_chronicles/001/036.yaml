id: 1CH.1.36
reference: 1 Chronicles 1:36
source:
  edition: WLC
  text: בְּנֵ֖י אֱלִיפָ֑ז תֵּימָ֤ן וְ/אוֹמָר֙ צְפִ֣י וְ/גַעְתָּ֔ם קְנַ֖ז וְ/תִמְנָ֥ע
    וַ/עֲמָלֵֽק׃ס
translation:
  text: 'The sons of Eliphaz: Teman, Omar, Zephi, Gatam, Kenaz, Timna, and Amalek.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Genesis 36:12 identifies Timna as Eliphaz's concubine and Amalek as her
      son. Here Chronicles presents both names within the list of Eliphaz's sons.
    reason: cross_reference
  - marker: b
    text: Hebrew Zephi; Genesis 36:11 has the variant form Zepho.
    reason: textual_variant
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of בן introducing a genealogy list. 'Sons of' is the
    most direct and standard rendering in genealogical contexts, while 'descendants
    of' is possible but less precise here.
- source_word: אֱלִיפָז
  chosen: Eliphaz
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: תֵּימָן
  chosen: Teman
  rationale: Personal name in this genealogical list; transliterated by standard English
    convention.
- source_word: אוֹמָר
  chosen: Omar
  rationale: Personal name; transliterated directly.
- source_word: צְפִי
  chosen: Zephi
  alternatives:
  - Zepi
  lexicon: HALOT
  rationale: The Chronicler's form here is צפי, best represented as 'Zephi' in English
    transliteration. Genesis 36:11 has a variant spelling often rendered 'Zepho';
    the Chronicles form should be reflected in the main text.
- source_word: גַעְתָּם
  chosen: Gatam
  rationale: Personal name; straightforward transliteration.
- source_word: קְנַז
  chosen: Kenaz
  alternatives:
  - Qenaz
  rationale: Personal name; 'Kenaz' is the established English transliteration.
- source_word: תִמְנָע
  chosen: Timna
  alternatives:
  - Timnah
  rationale: The consonantal form here is a personal name in the genealogy. 'Timna'
    reflects the name as pointed in this verse; 'Timnah' is a familiar alternative
    English form used elsewhere.
- source_word: עֲמָלֵק
  chosen: Amalek
  rationale: Personal/tribal ancestor name; transliterated directly.
- source_word: וְ / וַ
  chosen: comma-separated list with final 'and'
  alternatives:
  - repeating 'and' before each name
  rationale: The Hebrew uses conjunctions through the list. In readable modern English
    genealogy style, commas with a final 'and' preserve the list structure without
    wooden repetition.
