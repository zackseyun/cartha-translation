id: 1CH.1.42
reference: 1 Chronicles 1:42
source:
  edition: WLC
  text: בְּֽנֵי אֵ֔צֶר בִּלְהָ֥ן וְ/זַעֲוָ֖ן יַעֲקָ֑ן בְּנֵ֥י דִישׁ֖וֹן ע֥וּץ וַ/אֲרָֽן־׃פ
translation:
  text: 'The sons of Ezer: Bilhan, Zaavan, and Jaakan. The sons of Dishon: Uz and
    Aran.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Zaavan; the parallel genealogy in Genesis 36:27 reads Zavan.
    reason: alternative_reading
  - marker: b
    text: Hebrew Jaakan; the parallel genealogy in Genesis 36:27 reads Akan.
    reason: cross_reference
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of בֵּן introducing a genealogy list. 'Sons of' is the
    most direct and conventional rendering in genealogical contexts, while 'descendants
    of' is possible but less precise unless the context clearly broadens beyond immediate
    sons.
- source_word: אֵצֶר
  chosen: Ezer
  rationale: Proper personal name; transliterated according to the translation philosophy
    for names.
- source_word: בִּלְהָן
  chosen: Bilhan
  rationale: Proper personal name; transliterated.
- source_word: זַעֲוָן
  chosen: Zaavan
  alternatives:
  - Zavan
  rationale: Proper personal name. 'Zaavan' closely reflects the Hebrew vocalization
    in Chronicles. A shorter 'Zavan' appears in some English traditions and in the
    parallel genealogy, so it is preserved as an alternative in a footnote.
- source_word: יַעֲקָן
  chosen: Jaakan
  alternatives:
  - Akan
  rationale: Proper personal name; transliterated from the Hebrew form in Chronicles.
    The parallel in Genesis 36:27 has 'Akan,' likely a variant form, so that alternative
    is worth preserving in a footnote.
- source_word: דִישׁוֹן
  chosen: Dishon
  rationale: Proper personal name; transliterated. Distinguished from the similar
    name 'Dishan' elsewhere in the Edomite genealogy.
- source_word: עוּץ
  chosen: Uz
  alternatives:
  - Uts
  rationale: Proper personal name/place name traditionally rendered 'Uz' in English;
    this preserves recognizability and standard transliteration practice.
- source_word: אֲרָן
  chosen: Aran
  rationale: Proper personal name; transliterated.
