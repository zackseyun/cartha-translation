id: 1CH.1.39
reference: 1 Chronicles 1:39
source:
  edition: WLC
  text: וּ/בְנֵ֥י לוֹטָ֖ן חֹרִ֣י וְ/הוֹמָ֑ם וַ/אֲח֥וֹת לוֹטָ֖ן תִּמְנָֽע׃ס
translation:
  text: 'The sons of Lotan: Hori and Homam; and Lotan’s sister was Timna.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: In the parallel genealogy at Genesis 36:22, the name appears as Hemam rather
      than Homam.
    reason: textual_variant
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - The children of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons.' In genealogical context, 'sons
    of' is the standard and most precise rendering. The prefixed conjunction is not
    required to be represented with an initial 'And' in English, since the verse reads
    naturally without it.
- source_word: לוֹטָן
  chosen: Lotan
  rationale: Proper name; transliterated according to the translation philosophy to
    transliterate personal names rather than translate them.
- source_word: חֹרִי
  chosen: Hori
  rationale: Proper name; transliterated. Although the form resembles the ethnonym
    'Horite,' here the morphology and context identify it as a personal name in a
    genealogy.
- source_word: וְהוֹמָם
  chosen: and Homam
  alternatives:
  - and Hemam
  rationale: Proper name with conjunction. The Chronicler's form here is הוֹמָם, best
    rendered 'Homam.' An alternative spelling tradition appears in the parallel genealogy
    in Genesis 36:22 as 'Hemam,' which is worth preserving in a footnote as a cross-text
    name variation rather than altering the Chronicles reading.
- source_word: וַאֲחוֹת
  chosen: and ... sister was
  alternatives:
  - and the sister of
  - and sister of
  lexicon: HALOT
  rationale: 'אֲחוֹת means ''sister.'' Because Hebrew often omits the copula in nominal
    clauses, idiomatic English supplies ''was'': ''and Lotan’s sister was Timna.''
    This preserves the genealogical notice clearly.'
- source_word: לוֹטָן
  chosen: Lotan’s
  alternatives:
  - of Lotan
  rationale: 'The construct relationship is expressed naturally in English with the
    possessive: ''Lotan’s sister.'''
- source_word: תִּמְנָע
  chosen: Timna
  alternatives:
  - Timnah
  rationale: Proper name; transliterated. The Hebrew form here lacks the final he
    found in the place-name/person-name spelling 'Timnah,' so 'Timna' more directly
    reflects the consonantal form in this verse.
