id: 1CH.1.37
reference: 1 Chronicles 1:37
source:
  edition: WLC
  text: בְּנֵ֖י רְעוּאֵ֑ל נַ֥חַת זֶ֖רַח שַׁמָּ֥ה וּ/מִזָּֽה׃ס
translation:
  text: 'The sons of Reuel: Nahath, Zerah, Shammah, and Mizzah.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of בֵּן introducing a genealogy. 'Sons of' is the most
    direct and standard rendering in genealogical contexts; 'descendants of' is possible
    more broadly, but here the list presents immediate offspring.
- source_word: רְעוּאֵל
  chosen: Reuel
  alternatives:
  - Raguel
  lexicon: HALOT
  rationale: Personal name transliterated according to standard English convention
    from the Hebrew form רְעוּאֵל. 'Raguel' reflects a different transliteration tradition,
    often via Greek/Latin.
- source_word: נַחַת
  chosen: Nahath
  lexicon: HALOT
  rationale: Proper name; transliterated rather than translated, following the project's
    policy for personal names.
- source_word: זֶרַח
  chosen: Zerah
  alternatives:
  - Zerahh
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention. Although the
    underlying root can mean 'rising' or 'shining,' as a personal name it should be
    transliterated, not translated.
- source_word: שַׁמָּה
  chosen: Shammah
  alternatives:
  - Shamma
  lexicon: HALOT
  rationale: Proper name transliterated in its conventional English form. The final
    he is represented in the established spelling 'Shammah.'
- source_word: וּ/מִזָּה
  chosen: and Mizzah
  alternatives:
  - and Mizza
  lexicon: HALOT
  rationale: Conjunction ו plus proper name מִזָּה. Rendered with 'and' plus standard
    transliteration 'Mizzah.' The doubled z reflects the dagesh in the Hebrew spelling.
