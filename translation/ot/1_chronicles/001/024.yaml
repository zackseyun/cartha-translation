id: 1CH.1.24
reference: 1 Chronicles 1:24
source:
  edition: WLC
  text: שֵׁ֥ם אַרְפַּכְשַׁ֖ד שָֽׁלַח׀׃
translation:
  text: Shem, Arpachshad, Shelah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Arpachshad is traditionally rendered 'Arphaxad' in some English versions,
      reflecting Greek-influenced transmission.
    reason: lexical_alternative
  - marker: b
    text: Shelah is rendered 'Salah' in some traditions and in Luke 3:35.
    reason: cross_reference
lexical_decisions:
- source_word: שֵׁם
  chosen: Shem
  alternatives:
  - Sem
  lexicon: HALOT
  rationale: Proper name in a genealogy; per translation philosophy, personal names
    are transliterated rather than translated. 'Shem' follows standard English biblical
    convention.
- source_word: אַרְפַּכְשַׁד
  chosen: Arpachshad
  alternatives:
  - Arphaxad
  lexicon: HALOT
  rationale: Proper name in genealogical sequence. 'Arpachshad' reflects a direct
    transliteration from the Hebrew; 'Arphaxad' is a traditional form influenced by
    Greek/English transmission and is worth preserving as an alternative.
- source_word: שָׁלַח
  chosen: Shelah
  alternatives:
  - Salah
  lexicon: HALOT
  rationale: Proper name in genealogy. The consonantal Hebrew here corresponds to
    the personal name commonly rendered 'Shelah' in English OT contexts; 'Salah' reflects
    another traditional form seen in some genealogical traditions and translations.
