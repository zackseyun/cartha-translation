id: 1CH.1.7
reference: 1 Chronicles 1:7
source:
  edition: WLC
  text: וּ/בְנֵ֥י יָוָ֖ן אֱלִישָׁ֣ה וְ/תַרְשִׁ֑ישָׁ/ה כִּתִּ֖ים וְ/רוֹדָנִֽים׃ס
translation:
  text: 'And the sons of Javan: Elishah, Tarshish, Kittim, and Rodanim.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Genesis 10:4 reads “Dodanim” instead of “Rodanim,” reflecting a textual
      variation in the name.
    reason: textual_variant
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the descendants of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons of.' In genealogical contexts
    it can denote descendants more broadly, but here the immediate list of named peoples/places
    conventionally represented as offspring is well served by the formal 'sons of,'
    preserving the genealogy style of Chronicles.
- source_word: יָוָן
  chosen: Javan
  alternatives:
  - Greece
  - the Greeks
  lexicon: HALOT
  rationale: This is a proper name and should be transliterated per project philosophy
    ('Translate titles; transliterate names'). Although the referent is associated
    with the Greek world/Ionia, the text presents it as a personal/genealogical name.
- source_word: אֱלִישָׁה
  chosen: Elishah
  lexicon: HALOT
  rationale: Proper name; transliterated directly.
- source_word: תַּרְשִׁישָׁה
  chosen: Tarshish
  lexicon: HALOT
  rationale: Proper name; the final he is part of the name form here, not something
    requiring a distinct English rendering. Standard English transliteration is 'Tarshish.'
- source_word: כִּתִּים
  chosen: Kittim
  alternatives:
  - Chittim
  lexicon: HALOT
  rationale: Proper ethnonym/place-name; transliterated in a readable modern form.
    'Chittim' reflects older English orthography, but 'Kittim' better matches the
    Hebrew consonant כ in contemporary transliteration.
- source_word: וְרוֹדָנִים
  chosen: and Rodanim
  alternatives:
  - and Dodanim
  lexicon: HALOT
  rationale: The Masoretic Text in Chronicles reads רוֹדָנִים ('Rodanim'). Genesis
    10:4 has 'Dodanim,' likely reflecting a textual variation between dalet and resh.
    Since the source text here is Chronicles, the main text follows MT 'Rodanim,'
    while preserving the alternative in a footnote as a worthwhile parallel/textual
    note.
