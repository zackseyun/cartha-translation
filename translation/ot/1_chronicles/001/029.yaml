id: 1CH.1.29
reference: 1 Chronicles 1:29
source:
  edition: WLC
  text: אֵ֖לֶּה תֹּלְדוֹתָ֑/ם בְּכ֤וֹר יִשְׁמָעֵאל֙ נְבָי֔וֹת וְ/קֵדָ֥ר וְ/אַדְבְּאֵ֖ל
    וּ/מִבְשָֽׂם׃
translation:
  text: 'These are their generations: the firstborn of Ishmael, Nebaioth, Kedar, Adbeel,
    and Mibsam.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nebaioth is traditionally also spelled Nebajoth in some English translations.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These were
  lexicon: HALOT
  rationale: Deictic plural introducing a list or record. Present-tense English formula
    fits genealogical style and matches the Hebrew nominal clause naturally.
- source_word: תֹּלְדוֹתָם
  chosen: their generations
  alternatives:
  - their descendants
  - their family line
  lexicon: HALOT
  rationale: תּוֹלְדוֹת in genealogical contexts often denotes generations, descendants,
    or family records. 'Their generations' preserves the formal genealogical heading
    and stays close to the Hebrew without over-paraphrasing.
- source_word: בְּכוֹר
  chosen: the firstborn
  alternatives:
  - firstborn son
  lexicon: HALOT
  rationale: The noun denotes firstborn status. 'The firstborn' is sufficient in English
    because the following proper name identifies the son; adding 'son' would be interpretive
    expansion.
- source_word: יִשְׁמָעֵאל
  chosen: Ishmael
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names.
- source_word: נְבָיוֹת
  chosen: Nebaioth
  alternatives:
  - Nebajoth
  lexicon: HALOT
  rationale: A proper name. 'Nebaioth' is a common modern transliteration from the
    Hebrew form; 'Nebajoth' reflects another established English convention and is
    worth preserving as a lexical alternative.
- source_word: קֵדָר
  chosen: Kedar
  lexicon: HALOT
  rationale: Proper name transliterated straightforwardly.
- source_word: אַדְבְּאֵל
  chosen: Adbeel
  lexicon: HALOT
  rationale: Proper name transliterated straightforwardly from the Hebrew.
- source_word: מִבְשָׂם
  chosen: Mibsam
  lexicon: HALOT
  rationale: Proper name transliterated straightforwardly from the Hebrew.
