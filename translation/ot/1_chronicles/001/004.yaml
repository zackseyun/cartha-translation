  lexicon: HALOT
  rationale: Proper personal name in a genealogical list; transliterated by standard
    convention rather than rendered by its lexical meaning ('name').
- source_word: חָם
  chosen: Ham
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration used in this genealogy.
- source_word: וָ/יָפֶת
  chosen: and Japheth
  alternatives:
