reference: 1 Chronicles 1:1
source:
  edition: WLC
  text: אָדָ֥ם שֵׁ֖ת אֱנֽוֹשׁ׃
translation:
  text: Adam, Seth, Enosh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, in other contexts, 'man' or 'humankind' for the Hebrew Adam.
    reason: lexical_alternative
  - marker: b
    text: Enosh is traditionally rendered 'Enos' in some older English versions.
