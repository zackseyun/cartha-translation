lexical_decisions:
- source_word: אָדָם
  chosen: Adam
  alternatives:
  - man
  - humankind
  lexicon: HALOT
  rationale: Here the form is a proper name in a genealogy, not the common noun for
    humanity. Per translation philosophy, personal names are transliterated by standard
    conventions. Although אָדָם can mean 'man' or 'humankind' in other contexts, the
    genealogical sequence with Seth and Enosh identifies the individual Adam.
- source_word: שֵׁת
  chosen: Seth
  lexicon: HALOT
  rationale: Proper personal name in a genealogy; transliterated by standard English
    convention.
- source_word: אֱנוֹשׁ
  chosen: Enosh
  alternatives:
  - Enos
  lexicon: HALOT
  rationale: Proper personal name in a genealogy; transliterated rather than translated.
    'Enos' reflects older English tradition, but 'Enosh' more transparently represents
    the Hebrew form.
