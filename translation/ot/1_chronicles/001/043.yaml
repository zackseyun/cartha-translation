id: 1CH.1.43
reference: 1 Chronicles 1:43
source:
  edition: WLC
  text: וְ/אֵ֣לֶּה הַ/מְּלָכִ֗ים אֲשֶׁ֤ר מָלְכוּ֙ בְּ/אֶ֣רֶץ אֱד֔וֹם לִ/פְנֵ֥י מְלָךְ
    מֶ֖לֶךְ לִ/בְנֵ֣י יִשְׂרָאֵ֑ל בֶּ֚לַע בֶּן בְּע֔וֹר וְ/שֵׁ֥ם עִיר֖/וֹ דִּנְהָֽבָה־־׃
translation:
  text: 'And these are the kings who reigned in the land of Edom before any king reigned
    over the sons of Israel: Bela son of Beor, and the name of his city was Dinhabah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'before a king reigned over the sons of Israel.' The Hebrew is literally
      'before the reigning of a king for/over the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: And these are
  alternatives:
  - These are
  lexicon: HALOT
  rationale: The conjunction plus demonstrative naturally introduces a list. Retaining
    'And' preserves the genealogical/list continuity of Chronicles, while 'these are'
    is the standard presentational formula.
- source_word: הַמְּלָכִים
  chosen: the kings
  lexicon: HALOT
  rationale: Definite plural noun referring to a known sequence of rulers in Edom.
- source_word: אֲשֶׁר מָלְכוּ
  chosen: who reigned
  alternatives:
  - who became kings
  - who ruled
  lexicon: HALOT
  rationale: The relative clause with מלך in the Qal denotes exercising kingship.
    'Reigned' is idiomatic and suitably formal for royal rule.
- source_word: בְּאֶרֶץ אֱדוֹם
  chosen: in the land of Edom
  alternatives:
  - in Edom
  lexicon: HALOT
  rationale: The construct phrase explicitly includes 'land,' and retaining it reflects
    the Hebrew wording without sounding unnatural.
- source_word: לִפְנֵי מְלָךְ מֶלֶךְ
  chosen: before any king reigned
  alternatives:
  - before a king reigned
  - before the reigning of a king
  lexicon: HALOT
  rationale: The infinitive construct plus cognate noun expresses the onset of kingship.
    English requires smoothing; 'before any king reigned' captures the temporal sense
    naturally and avoids implying a specific already-known king.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: over the sons of Israel
  alternatives:
  - for the sons of Israel
  - over Israel
  lexicon: HALOT
  rationale: The preposition here marks relation to the people governed. 'Sons of
    Israel' preserves the Hebrew idiom and the translation philosophy's gender-accurate
    preference; 'over' is supplied in English to complete the sense of reigning.
- source_word: בֶּלַע בֶּן בְּעוֹר
  chosen: Bela son of Beor
  alternatives:
  - Bela the son of Beor
  lexicon: HALOT
  rationale: Names are transliterated. 'Son of' is concise and natural in genealogical
    style.
- source_word: וְשֵׁם עִירוֹ
  chosen: and the name of his city was
  alternatives:
  - and his city's name was
  lexicon: HALOT
  rationale: A literal but readable rendering of the nominal clause introducing the
    ruler's city.
- source_word: דִּנְהָבָה
  chosen: Dinhabah
  lexicon: HALOT
  rationale: Place-name transliterated by standard English convention.
