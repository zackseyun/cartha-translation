id: 1CH.1.30
reference: 1 Chronicles 1:30
source:
  edition: WLC
  text: מִשְׁמָ֣ע וְ/דוּמָ֔ה מַשָּׂ֖א חֲדַ֥ד וְ/תֵימָֽא׃
translation:
  text: Mishma, Dumah, Massa, Hadad, and Tema.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Genesis 25:15 has 'Hadar' in the parallel list; 1 Chronicles reads 'Hadad.'
    reason: textual_variant
lexical_decisions:
- source_word: מִשְׁמָע
  chosen: Mishma
  alternatives:
  - Mishmah
  rationale: Proper name in a genealogical list; transliterated rather than translated
    per project philosophy for personal/place names. English form 'Mishma' follows
    a standard transliteration of the Hebrew consonants and vowels in this context.
- source_word: וְ/דוּמָה
  chosen: and Dumah
  rationale: Conjunction וְ rendered as 'and'; דוּמָה is a proper name and is therefore
    transliterated. The list structure in Hebrew is preserved straightforwardly in
    English.
- source_word: מַשָּׂא
  chosen: Massa
  alternatives:
  - Massae
  rationale: Proper name in the genealogy, transliterated. Although the consonants
    could elsewhere relate to the common noun 'burden/oracle,' here morphology and
    context clearly indicate a name in a descendant list.
- source_word: חֲדַד
  chosen: Hadad
  alternatives:
  - Hadar
  rationale: Proper name, transliterated. The Chronicler's text here reads Hadad.
    An alternative form 'Hadar' appears in the parallel genealogy of Genesis 25:15,
    so the Chronicles reading is retained in the main text and the parallel is preserved
    in a footnote.
- source_word: וְ/תֵימָא
  chosen: and Tema
  rationale: Conjunction rendered as 'and'; תֵימָא is a proper name and is transliterated.
    The final item in the series is represented with normal English list punctuation.
