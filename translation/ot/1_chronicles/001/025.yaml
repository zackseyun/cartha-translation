id: 1CH.1.25
reference: 1 Chronicles 1:25
source:
  edition: WLC
  text: עֵ֥בֶר פֶּ֖לֶג רְעֽוּ׃
translation:
  text: Eber, Peleg, Reu.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Heber' for Eber in some English traditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵבֶר
  chosen: Eber
  alternatives:
  - Heber
  lexicon: HALOT
  rationale: Proper noun in a genealogy; transliterated rather than translated per
    translation philosophy. 'Eber' follows standard English convention for this patriarchal
    name, while 'Heber' is a possible alternative transliteration in some traditions.
- source_word: פֶּלֶג
  chosen: Peleg
  lexicon: HALOT
  rationale: Proper noun in a genealogical sequence; transliterated by standard English
    convention. Although the common noun can mean 'division' or 'channel,' here it
    functions as a personal name and should not be translated semantically in the
    main text.
- source_word: רְעוּ
  chosen: Reu
  alternatives:
  - Reu/Re'u
  lexicon: HALOT
  rationale: Proper noun; transliterated in keeping with the treatment of names. The
    form 'Reu' is the standard English biblical spelling; a more explicitly marked
    transliteration such as 'Re'u' is possible but less natural in readable modern
    English.
