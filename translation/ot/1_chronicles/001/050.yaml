id: 1CH.1.50
reference: 1 Chronicles 1:50
source:
  edition: WLC
  text: וַ/יָּ֨מָת֙ בַּ֣עַל חָנָ֔ן וַ/יִּמְלֹ֤ךְ תַּחְתָּי/ו֙ הֲדַ֔ד וְ/שֵׁ֥ם עִיר֖/וֹ
    פָּ֑עִי וְ/שֵׁ֨ם אִשְׁתּ֤/וֹ מְהֵיטַבְאֵל֙ בַּת מַטְרֵ֔ד בַּ֖ת מֵ֥י זָהָֽב־׃
translation:
  text: Baal-hanan died, and Hadad reigned in his place. The name of his city was
    Pai, and the name of his wife was Mehetabel daughter of Matred, daughter of Mezahab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Genesis 36:39 gives the city name as 'Pau,' while Chronicles reads 'Pai.'
    reason: textual_variant
  - marker: b
    text: The repeated 'daughter of' may imply 'granddaughter of' in genealogical
      usage, but the Hebrew wording is left more literal here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - and he died
  lexicon: HALOT
  rationale: Wayyiqtol of מות narrates the succession sequence; 'died' is the plain
    English equivalent. The subject is supplied by the following proper name.
- source_word: בַּעַל חָנָן
  chosen: Baal-hanan
  alternatives:
  - Baal Hanan
  lexicon: HALOT
  rationale: Proper personal name is transliterated per project philosophy. Hyphenation
    reflects common English convention for this compound name.
- source_word: וַיִּמְלֹךְ תַּחְתָּיו
  chosen: reigned in his place
  alternatives:
  - became king in his place
  - reigned instead of him
  lexicon: HALOT
  rationale: מלך in this royal list denotes accession to kingship. 'Reigned in his
    place' is natural English and preserves the succession formula conveyed by תחתיו.
- source_word: הֲדַד
  chosen: Hadad
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention.
- source_word: וְשֵׁם עִירוֹ
  chosen: The name of his city was
  alternatives:
  - and the name of his city was
  lexicon: HALOT
  rationale: A verbless naming clause in Hebrew is idiomatically rendered with 'was'
    in English. 'His city' most naturally refers to Hadad, the new king just mentioned.
- source_word: פָּעִי
  chosen: Pai
  alternatives:
  - Pau
  lexicon: HALOT
  rationale: The Chronicles form is פָּעִי, best represented as 'Pai.' The parallel
    in Genesis 36:39 has 'Pau,' which is preserved as an alternative textual/canonical
    form in a footnote rather than imported into the main text.
- source_word: וְשֵׁם אִשְׁתּוֹ
  chosen: and the name of his wife was
  alternatives:
  - and his wife's name was
  lexicon: HALOT
  rationale: This mirrors the Hebrew naming formula while remaining readable modern
    English.
- source_word: מְהֵיטַבְאֵל
  chosen: Mehetabel
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention.
- source_word: בַּת מַטְרֵד בַּת מֵי זָהָב
  chosen: daughter of Matred, daughter of Mezahab
  alternatives:
  - daughter of Matred, granddaughter of Mezahab
  lexicon: HALOT
  rationale: Hebrew בת can denote immediate daughter and, in genealogical style, descendant.
    Here the repeated formula is most transparently preserved as 'daughter of ...
    daughter of ...' rather than resolving it interpretively; the genealogical implication
    of 'granddaughter' is possible but not required by the wording.
- source_word: מֵי זָהָב
  chosen: Mezahab
  alternatives:
  - Me-zahab
  lexicon: HALOT
  rationale: Treated as a proper name and transliterated rather than translated ('waters
    of gold' or similar), since the context is genealogical naming.
