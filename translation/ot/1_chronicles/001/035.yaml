id: 1CH.1.35
reference: 1 Chronicles 1:35
source:
  edition: WLC
  text: בְּנֵ֖י עֵשָׂ֑ו אֱלִיפַ֛ז רְעוּאֵ֥ל וִ/יע֖וּשׁ וְ/יַעְלָ֥ם וְ/קֹֽרַח׃ס
translation:
  text: 'The sons of Esau: Eliphaz, Reuel, Jeush, Jalam, and Korah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Reuel may also be represented as 'Raguel' in some English traditions, reflecting
      a different transliteration pathway rather than a different underlying name.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: Construct plural of בֵּן introducing a genealogical list. 'Sons of' is
    the plain and conventional genealogical sense here, more specific than 'children
    of' and more immediate than the broader 'descendants of.'
- source_word: עֵשָׂו
  chosen: Esau
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: אֱלִיפַז
  chosen: Eliphaz
  rationale: Personal name transliterated by standard convention.
- source_word: רְעוּאֵל
  chosen: Reuel
  alternatives:
  - Raguel
  rationale: Hebrew personal name best represented in English as 'Reuel.' 'Raguel'
    reflects a different transliteration tradition, often mediated through Greek/Latin
    forms, but the Hebrew here supports 'Reuel.'
- source_word: וִיעוּשׁ
  chosen: Jeush
  alternatives:
  - Yeush
  rationale: Personal name with prefixed conjunction. Standard English biblical transliteration
    is 'Jeush'; 'Yeush' would be a more phonetic transliteration but is less conventional.
- source_word: וְיַעְלָם
  chosen: Jalam
  alternatives:
  - Yalam
  rationale: Personal name with conjunction. 'Jalam' follows established English biblical
    spelling while remaining close to the Hebrew form.
- source_word: וְקֹרַח
  chosen: and Korah
  rationale: Final personal name in the series with conjunction. 'Korah' is the standard
    English transliteration of the Hebrew proper name.
