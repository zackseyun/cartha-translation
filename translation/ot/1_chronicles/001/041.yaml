id: 1CH.1.41
reference: 1 Chronicles 1:41
source:
  edition: WLC
  text: בְּנֵ֥י עֲנָ֖ה דִּישׁ֑וֹן וּ/בְנֵ֣י דִישׁ֔וֹן חַמְרָ֥ן וְ/אֶשְׁבָּ֖ן וְ/יִתְרָ֥ן
    וּ/כְרָֽןס׃ס
translation:
  text: 'The sons of Anah: Dishon. And the sons of Dishon: Hamran, Eshban, Ithran,
    and Keran.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A parallel genealogy in Genesis 36:26 reads 'Hemdan' instead of 'Hamran.'
      The main text follows the Masoretic Text of 1 Chronicles here.
    reason: textual_variant
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: The construct plural of בן in genealogical lists is most naturally rendered
    'sons of.' Although such lists can imply broader descent, the immediate form is
    masculine and specific, so 'sons' best matches the Hebrew while remaining natural
    English.
- source_word: עֲנָה
  chosen: Anah
  rationale: Proper personal name; transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names rather than
    translate them.
- source_word: דִּישׁוֹן
  chosen: Dishon
  rationale: Proper personal name; transliterated. In this verse the name appears
    first as the son of Anah and then as the father of the following four names, so
    the same English form is retained consistently.
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered 'And' in this genealogical sequence,
    preserving the list structure. 'Sons of' is retained for consistency with the
    first clause.
- source_word: חַמְרָן
  chosen: Hamran
  alternatives:
  - Hemdan
  rationale: The Masoretic Text here reads Hamran (חמרן), so the main text follows
    the provided Hebrew source directly. Because a parallel genealogy in Genesis 36:26
    has 'Hemdan,' that alternative is worth preserving in a footnote as a textual/cross-tradition
    note rather than importing it into the main text.
- source_word: אֶשְׁבָּן
  chosen: Eshban
  rationale: Proper personal name; transliterated straightforwardly from the Hebrew.
- source_word: יִתְרָן
  chosen: Ithran
  alternatives:
  - Jethran
  rationale: Proper personal name; transliterated with initial 'I' to reflect the
    consonantal form more directly in modern English transliteration. 'Jethran' is
    a possible anglicized alternative but is less direct from the Hebrew spelling.
- source_word: כְרָן
  chosen: Keran
  rationale: Proper personal name; transliterated directly from the Hebrew. The conjunction
    prefixed to the name is represented by 'and' before the final item in the English
    list.
