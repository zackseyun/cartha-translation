id: 1CH.1.12
reference: 1 Chronicles 1:12
source:
  edition: WLC
  text: וְֽ/אֶת פַּתְרֻסִ֞ים וְ/אֶת כַּסְלֻחִ֗ים אֲשֶׁ֨ר יָצְא֥וּ מִ/שָּׁ֛ם פְּלִשְׁתִּ֖ים
    וְ/אֶת כַּפְתֹּרִֽים־־־׃ס
translation:
  text: and the Pathrusites, and the Casluhites (from whom the Philistines came),
    and the Caphtorites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from there the Philistines came out.' The Hebrew most naturally
      links this clause to the Casluhites here in Chronicles, though Genesis 10:14
      has the same wording and the broader tradition also associates the Philistines
      with Caphtor (cf. Amos 9:7; Jeremiah 47:4).
    reason: cross_reference
lexical_decisions:
- source_word: פַּתְרֻסִים
  chosen: Pathrusites
  alternatives:
  - Patrusites
  lexicon: HALOT
  rationale: A people-group name derived from Pathros; transliterated rather than
    translated in keeping with the philosophy of transliterating names and ethnonyms.
- source_word: כַּסְלֻחִים
  chosen: Casluhites
  alternatives:
  - Kasluhites
  lexicon: HALOT
  rationale: An ethnonym of uncertain referent; transliteration best preserves the
    Hebrew form without over-interpreting.
- source_word: אֲשֶׁר יָצְאוּ מִשָּׁם
  chosen: from whom ... came
  alternatives:
  - from there ... came out
  - from whom ... descended
  lexicon: HALOT
  rationale: The relative clause literally reads 'who/which came out from there.'
    In English genealogy style, 'from whom ... came' is natural and preserves the
    sense of origin. Because the antecedent is the immediately preceding people-group,
    'from whom' is clearer than the more spatially literal 'from there' in the main
    text.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  alternatives:
  - Philistines
  lexicon: HALOT
  rationale: Standard English ethnonym for the people group. The article is idiomatic
    in English when referring to a known nation.
- source_word: כַּפְתֹּרִים
  chosen: Caphtorites
  alternatives:
  - Kaphtorites
  lexicon: HALOT
  rationale: Ethnonym related to Caphtor; transliterated as a people-group name.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - also
  lexicon: HALOT
  rationale: In this genealogical list, the repeated object marker with conjunction
    is not represented woodenly in English; simple coordination with 'and' best reflects
    the list structure.
