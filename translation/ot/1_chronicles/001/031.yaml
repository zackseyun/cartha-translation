id: 1CH.1.31
reference: 1 Chronicles 1:31
source:
  edition: WLC
  text: יְט֥וּר נָפִ֖ישׁ וָ/קֵ֑דְמָה אֵ֥לֶּה הֵ֖ם בְּנֵ֥י יִשְׁמָעֵֽאל׃ס
translation:
  text: Jetur, Naphish, and Kedemah. These were the sons of Ishmael.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kedemah may also be transliterated 'Qedemah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְטוּר
  chosen: Jetur
  alternatives:
  - Yetur
  lexicon: HALOT
  rationale: Proper name; transliterated according to standard English biblical convention
    rather than translated.
- source_word: נָפִישׁ
  chosen: Naphish
  alternatives:
  - Nafish
  lexicon: HALOT
  rationale: Proper name; transliterated in its conventional English form.
- source_word: וָ/קֵדְמָה
  chosen: and Kedemah
  alternatives:
  - and Qedemah
  lexicon: HALOT
  rationale: Conjunction ו rendered as 'and'; proper name קֵדְמָה transliterated by
    standard convention as 'Kedemah.'
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - These ones
  lexicon: HALOT
  rationale: Demonstrative pronoun introducing a summary statement; 'These' is natural
    and sufficiently formal in English.
- source_word: הֵם
  chosen: were
  alternatives:
  - they were
  - are
  lexicon: HALOT
  rationale: Combined with אֵלֶּה in an identificational clause. English idiom prefers
    'These were' rather than the more wooden 'These they are.' Past tense fits the
    genealogical narrative context.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: The Hebrew construct literally means 'sons of.' In a genealogy this can
    sometimes function broadly, but here it names male offspring in a list of Ishmael's
    sons, so 'sons of' is the most accurate rendering.
- source_word: יִשְׁמָעֵאל
  chosen: Ishmael
  lexicon: HALOT
  rationale: Proper name; transliterated in standard English form.
