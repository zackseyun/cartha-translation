id: 1CH.1.16
reference: 1 Chronicles 1:16
source:
  edition: WLC
  text: וְ/אֶת הָ/אַרְוָדִ֥י וְ/אֶת הַ/צְּמָרִ֖י וְ/אֶת הַֽ/חֲמָתִֽי־־־׃ס
translation:
  text: and the Arvadites, and the Zemarites, and the Hamathites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew gentilics here are grammatically singular but function collectively,
      referring to peoples or clans: Arvadite, Zemarite, Hamathite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  chosen: and
  alternatives:
  - also
  - with
  lexicon: HALOT
  rationale: In this genealogical list, the conjunction with the object marker introduces
    another item in a sequence. English does not require a separate rendering for
    אֵת here, so 'and' naturally carries the connective force.
- source_word: הָאַרְוָדִי
  chosen: the Arvadites
  alternatives:
  - the Arvadite
  - the people of Arvad
  lexicon: HALOT
  rationale: Although morphologically singular gentilic, in genealogical nation lists
    this form regularly functions collectively for a people group or clan. 'Arvadites'
    best reflects the collective ethnic sense in idiomatic English and matches the
    parallel list in Genesis 10.
- source_word: הַצְּמָרִי
  chosen: the Zemarites
  alternatives:
  - the Zemarite
  - the people of Zemar
  lexicon: HALOT
  rationale: As with the surrounding gentilics, the singular form is used collectively.
    'Zemarites' is the standard English transliteration for the people associated
    with Zemar/Simyra and preserves the ethnic-list style of the passage.
- source_word: הַחֲמָתִי
  chosen: the Hamathites
  alternatives:
  - the Hamathite
  - the people of Hamath
  lexicon: HALOT
  rationale: This gentilic likewise denotes the inhabitants or clan associated with
    Hamath. The plural collective 'Hamathites' communicates the intended people-group
    reference in natural English.
