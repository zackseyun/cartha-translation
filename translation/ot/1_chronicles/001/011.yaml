id: 1CH.1.11
reference: 1 Chronicles 1:11
source:
  edition: WLC
  text: וּ/מִצְרַ֡יִם יָלַ֞ד אֶת לודיים וְ/אֶת עֲנָמִ֛ים וְ/אֶת לְהָבִ֖ים וְ/אֶת נַפְתֻּחִֽים־־־־׃
translation:
  text: Mizraim fathered the Ludites, the Anamites, the Lehabites, and the Naphtuhites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or transliterated more directly: ''Ludim, Anamim, Lehabim, and Naphtuhim.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מִצְרַיִם
  chosen: Mizraim
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: Treated here as a proper name in a genealogy, so transliteration is preferred
    over translating as the place-name 'Egypt.' This follows the project's principle
    to transliterate names.
- source_word: יָלַד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: In genealogical context the verb denotes procreation/ancestral descent.
    'Fathered' is natural modern English and preserves the male genealogical framing
    better than the archaic 'begot.'
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent English equivalent; its function
    is reflected in the syntax of the translation.
- source_word: לודיים
  chosen: Ludites
  alternatives:
  - Ludim
  lexicon: HALOT
  rationale: A people-group name descended from Mizraim. 'Ludites' gives a natural
    English ethnonym, while 'Ludim' is a more formal transliteration preserved as
    an alternative.
- source_word: עֲנָמִים
  chosen: Anamites
  alternatives:
  - Anamim
  lexicon: HALOT
  rationale: Rendered as an English ethnonym for readability in a genealogy. The more
    direct transliteration 'Anamim' is possible but less transparent to English readers.
- source_word: לְהָבִים
  chosen: Lehabites
  alternatives:
  - Lehabim
  lexicon: HALOT
  rationale: Rendered as an English ethnonym parallel to the surrounding names. This
    maintains consistency across the list.
- source_word: נַפְתֻּחִים
  chosen: Naphtuhites
  alternatives:
  - Naphtuhim
  lexicon: HALOT
  rationale: Rendered as an English ethnonym parallel to the surrounding names. 'Naphtuhim'
    is a viable transliteration but less idiomatic in English.
