id: 1CH.1.47
reference: 1 Chronicles 1:47
source:
  edition: WLC
  text: וַ/יָּ֖מָת הֲדָ֑ד וַ/יִּמְלֹ֣ךְ תַּחְתָּ֔י/ו שַׂמְלָ֖ה מִ/מַּשְׂרֵקָֽה׃
translation:
  text: Hadad died, and Samlah from Masrekah reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "after him." The Hebrew expression literally means "under/in place of
      him" and marks royal succession.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: Wayyiqtol of מוּת straightforwardly denotes death; 'died' is the plain,
    natural English equivalent and avoids unnecessary euphemism.
- source_word: הֲדָד
  chosen: Hadad
  rationale: Proper personal name; transliterated per project policy to transliterate
    names rather than translate them.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - ruled as king
  lexicon: HALOT
  rationale: Wayyiqtol of מָלַךְ in royal succession formulas is idiomatically rendered
    'reigned.' This preserves the chronicler's king-list style better than the more
    interpretive 'became king.'
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: The preposition תַּחַת with pronominal suffix here marks succession.
    'In his place' is idiomatic English that clearly conveys replacement in office;
    'after him' is possible but less explicit about succession.
- source_word: שַׂמְלָה
  chosen: Samlah
  rationale: Proper personal name; transliterated according to standard English convention.
- source_word: מִמַּשְׂרֵקָה
  chosen: from Masrekah
  alternatives:
  - of Masrekah
  lexicon: HALOT
  rationale: The prefixed מִן normally indicates origin or association. In this royal
    list, 'from Masrekah' naturally identifies Samlah by place of origin or residence.
    'Of Masrekah' is viable but slightly less transparent for modern readers.
