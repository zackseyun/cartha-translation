id: 1CH.1.9
reference: 1 Chronicles 1:9
source:
  edition: WLC
  text: וּ/בְנֵ֣י כ֔וּשׁ סְבָא֙ וַ/חֲוִילָ֔ה וְ/סַבְתָּ֥א וְ/רַעְמָ֖א וְ/סַבְתְּכָ֑א
    וּ/בְנֵ֥י רַעְמָ֖א שְׁבָ֥א וּ/דְדָֽן׃ס
translation:
  text: 'The sons of Cush: Seba, Havilah, Sabta, Raama, and Sabteca. And the sons
    of Raama: Sheba and Dedan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sabta is traditionally rendered 'Sabtah.'
    reason: lexical_alternative
  - marker: b
    text: Raama is traditionally rendered 'Raamah'; some English readers may also
      think of the distinct name 'Ramah.'
    reason: lexical_alternative
  - marker: c
    text: Sabteca is traditionally rendered 'Sabtechah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - The descendants of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons.' In genealogical contexts it
    can imply descendants, but here the formulaic list structure is best preserved
    with the more formal 'sons of.' The initial conjunction is not repeated at the
    start in English because the verse reads naturally as a heading followed by names.
- source_word: כּוּשׁ
  chosen: Cush
  lexicon: HALOT
  rationale: Proper name; transliterated rather than translated, in keeping with the
    translation philosophy for names.
- source_word: סְבָא
  chosen: Seba
  lexicon: HALOT
  rationale: Proper name/toponym in genealogical list; standard English transliteration
    is retained.
- source_word: חֲוִילָה
  chosen: Havilah
  lexicon: HALOT
  rationale: Proper name; transliterated by standard convention.
- source_word: סַבְתָּא
  chosen: Sabta
  alternatives:
  - Sabtah
  lexicon: HALOT
  rationale: The Hebrew name is commonly rendered either 'Sabta' or 'Sabtah.' 'Sabta'
    is chosen as a straightforward transliteration without adding a final h not pronounced
    in normal English usage; the common alternative is preserved in a footnote.
- source_word: רַעְמָא
  chosen: Raama
  alternatives:
  - Ramah
  - Raamah
  lexicon: HALOT
  rationale: This is the genealogical name traditionally rendered 'Raamah.' The consonantal
    form supports a transliteration with doubled long vowel representation. 'Raama'
    is chosen for a simpler standard transliteration closer to the Hebrew spelling
    in this project style; alternatives are preserved in a footnote because 'Raamah'
    is familiar in many English Bibles and 'Ramah' could be confused with a different
    biblical name.
- source_word: סַבְתְּכָא
  chosen: Sabteca
  alternatives:
  - Sabtechah
  lexicon: HALOT
  rationale: Proper name; transliterated. The shorter English form avoids an unnecessary
    final h while preserving the Hebrew consonants; the common traditional alternative
    is footnoted.
- source_word: וּבְנֵי רַעְמָא
  chosen: And the sons of Raama
  alternatives:
  - And the descendants of Raama
  lexicon: HALOT
  rationale: The conjunction is retained here because it marks a new sub-branch within
    the genealogy. 'Sons' is kept for consistency with the genealogical formula.
- source_word: שְׁבָא
  chosen: Sheba
  lexicon: HALOT
  rationale: Proper name; standard transliteration.
- source_word: דְדָן
  chosen: Dedan
  alternatives:
  - Dedanite lineage
  lexicon: HALOT
  rationale: Proper name; transliterated directly. No expansion beyond the name itself
    is warranted by the text.
