id: 1CH.1.28
reference: 1 Chronicles 1:28
source:
  edition: WLC
  text: בְּנֵי֙ אַבְרָהָ֔ם יִצְחָ֖ק וְ/יִשְׁמָעֵֽאל׃ס
translation:
  text: 'The sons of Abraham: Isaac and Ishmael.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of' or 'descendants of' in a broader genealogical sense; the
      Hebrew literally says 'sons of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The children of
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of בֵּן, here introducing a genealogical list. 'Sons
    of' is the most direct and idiomatic rendering in genealogical context, preserving
    the male-line framing of the Hebrew rather than neutralizing it to 'children'
    or broadening it to 'descendants'.
- source_word: אַבְרָהָם
  chosen: Abraham
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention,
    consistent with the translation philosophy to transliterate names.
- source_word: יִצְחָק
  chosen: Isaac
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration.
- source_word: וְ/יִשְׁמָעֵאל
  chosen: and Ishmael
  lexicon: HALOT
  rationale: Simple conjunction plus proper personal name. Rendered straightforwardly
    as 'and Ishmael.'
