id: 1CH.1.5
reference: 1 Chronicles 1:5
source:
  edition: WLC
  text: בְּנֵ֣י יֶ֔פֶת גֹּ֣מֶר וּ/מָג֔וֹג וּ/מָדַ֖י וְ/יָוָ֣ן וְ/תֻבָ֑ל וּ/מֶ֖שֶׁךְ
    וְ/תִירָֽס׃ס
translation:
  text: 'The sons of Japheth: Gomer, Magog, Madai, Javan, Tubal, Meshech, and Tiras.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of' can function genealogically for immediate sons or broader
      descendants; here it introduces Japheth's line in list form.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - descendants of
  - children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן introducing a genealogy. 'Sons of' is the standard
    and sufficiently literal rendering in genealogical lists; while it can imply broader
    descendants in some contexts, here it heads the immediate list of named offspring
    and should remain formal.
- source_word: יֶפֶת
  chosen: Japheth
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English biblical
    convention, consistent with the translation philosophy to transliterate names.
- source_word: גֹּמֶר
  chosen: Gomer
  lexicon: HALOT
  rationale: Proper name in a genealogical list; transliterated rather than translated.
- source_word: מָגוֹג
  chosen: Magog
  lexicon: HALOT
  rationale: Proper name; transliterated by standard convention.
- source_word: מָדַי
  chosen: Madai
  lexicon: HALOT
  rationale: Proper name; although associated with the Medes in some contexts, the
    form here is a personal/genealogical name and is best transliterated as 'Madai'
    rather than interpreted ethnically in the main text.
- source_word: יָוָן
  chosen: Javan
  alternatives:
  - Iavan
  lexicon: HALOT
  rationale: Proper name; standard English biblical transliteration is 'Javan.' Though
    the name is associated with Ionia/Greece, the genealogical form is preserved as
    a name in the text.
- source_word: תֻבָל
  chosen: Tubal
  lexicon: HALOT
  rationale: Proper name; transliterated.
- source_word: מֶשֶׁךְ
  chosen: Meshech
  lexicon: HALOT
  rationale: Proper name; transliterated.
- source_word: תִירָס
  chosen: Tiras
  lexicon: HALOT
  rationale: Proper name; transliterated.
- source_word: וְ / וּ
  chosen: comma-separated list with final 'and'
  alternatives:
  - repeating 'and' before each name
  rationale: The Hebrew uses conjunctions before most items in list style. In readable
    modern English, commas with a final 'and' preserve the list function without wooden
    repetition.
