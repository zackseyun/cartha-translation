id: 1CH.1.8
reference: 1 Chronicles 1:8
source:
  edition: WLC
  text: בְּנֵ֖י חָ֑ם כּ֥וּשׁ וּ/מִצְרַ֖יִם פּ֥וּט וּ/כְנָֽעַן׃
translation:
  text: 'The sons of Ham: Cush, Mizraim, Put, and Canaan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of Ham.' The Hebrew genealogical formula 'sons of' can denote
      immediate sons or broader lineal descendants.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Mizraim'; traditionally associated with Egypt. Here the transliteration
      is retained because the term appears in a genealogical list as a proper name
      alongside Cush, Put, and Canaan.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - descendants of
  - children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in a genealogy formula. 'Sons of' is the standard
    and sufficiently natural rendering, while also allowing the genealogical sense
    that may include lineal descendants.
- source_word: חָם
  chosen: Ham
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention,
    consistent with the translation philosophy to transliterate names.
- source_word: כּוּשׁ
  chosen: Cush
  alternatives:
  - Kush
  lexicon: HALOT
  rationale: Proper name, traditionally rendered 'Cush' in English biblical usage.
    This may denote a person/eponymous ancestor and associated people/region, but
    in this genealogical list the proper-name form is best preserved.
- source_word: מִצְרַיִם
  chosen: Mizraim
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: In a genealogy alongside other eponymous names, the transliterated proper
    name 'Mizraim' better reflects the Hebrew form than the geographic rendering 'Egypt.'
    This follows the philosophy of transliterating names rather than translating them
    as place names when functioning as personal/eponymous names.
- source_word: פּוּט
  chosen: Put
  alternatives:
  - Phut
  lexicon: HALOT
  rationale: Proper name; 'Put' is a straightforward transliteration of the Hebrew.
    'Phut' reflects older transliteration tradition but is less standard in modern
    English.
- source_word: כְנָעַן
  chosen: Canaan
  lexicon: HALOT
  rationale: Proper name; standard English transliteration. In this context it functions
    as the eponymous ancestor/name in the genealogy.
