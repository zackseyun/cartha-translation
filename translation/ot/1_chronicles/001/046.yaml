id: 1CH.1.46
reference: 1 Chronicles 1:46
source:
  edition: WLC
  text: וַ/יָּ֖מָת חוּשָׁ֑ם וַ/יִּמְלֹ֨ךְ תַּחְתָּ֜י/ו הֲדַ֣ד בֶּן בְּדַ֗ד הַ/מַּכֶּ֤ה
    אֶת מִדְיָן֙ בִּ/שְׂדֵ֣ה מוֹאָ֔ב וְ/שֵׁ֥ם עִיר֖/וֹ עיות־־׃
translation:
  text: And Husham died, and Hadad son of Bedad reigned in his place, the one who
    struck Midian in the field of Moab; and the name of his city was Avith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Aioth,' a variant transliteration of the city name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: The waw-consecutive verb from מות is the standard narrative form meaning
    'died.' 'Died' is the plain, direct rendering and avoids euphemism.
- source_word: וַיִּמְלֹךְ תַּחְתָּיו
  chosen: reigned in his place
  alternatives:
  - became king in his place
  - reigned after him
  lexicon: HALOT
  rationale: מלך in this genealogical-royal context denotes accession to kingship.
    'In his place' renders תחתיו naturally and clearly in English.
- source_word: הֲדַד
  chosen: Hadad
  rationale: Personal names are transliterated by project policy.
- source_word: בֶּן בְּדַד
  chosen: son of Bedad
  rationale: A straightforward patronymic construction; 'son of' preserves the Hebrew
    relationship marker בן.
- source_word: הַמַּכֶּה
  chosen: the one who struck
  alternatives:
  - who defeated
  - who attacked
  lexicon: HALOT
  rationale: The participial form of נכה identifies Hadad by a notable action. 'Struck'
    stays close to the Hebrew while remaining idiomatic; 'defeated' is interpretive
    and slightly stronger than the lexical form itself.
- source_word: אֶת מִדְיָן
  chosen: Midian
  rationale: Direct-object marker plus proper name; rendered simply as the people/place
    name 'Midian' in English.
- source_word: בִּשְׂדֵה מוֹאָב
  chosen: in the field of Moab
  alternatives:
  - in the country of Moab
  - in the territory of Moab
  lexicon: HALOT
  rationale: שָׂדֶה literally means 'field' and can extend to open country. Because
    the Hebrew is singular construct, 'the field of Moab' preserves the form while
    remaining understandable. Alternatives are possible if one wishes to emphasize
    region rather than a single field.
- source_word: וְשֵׁם עִירוֹ
  chosen: and the name of his city was
  alternatives:
  - and his city's name was
  lexicon: HALOT
  rationale: This is a common Hebrew naming formula. The fuller English wording preserves
    the formal cadence of the source.
- source_word: עיות
  chosen: Avith
  alternatives:
  - Aioth
  rationale: The place name is transliterated. 'Avith' reflects the conventional English
    transliteration of עֲוִית/עיות in this context; spelling variation exists because
    of textual and vocalization traditions.
