lexical_decisions:
- source_word: שְׂר֥וּג
  chosen: Serug
  alternatives:
  - Srug
  rationale: Proper personal name (HNp). Following the translation philosophy, personal
    names are transliterated by standard English convention. 'Serug' is the conventional
    and recognizable English transliteration of the Hebrew name.
- source_word: נָח֖וֹר
  chosen: Nahor
  rationale: Proper personal name (HNp). Transliterated rather than translated, using
    the standard English form 'Nahor' attested in biblical usage.
- source_word: תָּֽרַח
  chosen: Terah
  rationale: Proper personal name (HNp). Transliterated by standard English convention
    as 'Terah.' The verse is a genealogical list, so preserving the sequence of names
    with minimal expansion best reflects the source text.
