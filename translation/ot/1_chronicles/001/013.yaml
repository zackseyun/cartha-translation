id: 1CH.1.13
reference: 1 Chronicles 1:13
source:
  edition: WLC
  text: וּ/כְנַ֗עַן יָלַ֛ד אֶת צִיד֥וֹן בְּכֹר֖/וֹ וְ/אֶת חֵֽת־־׃
translation:
  text: And Canaan fathered Sidon his firstborn, and Heth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Zidon,” following an older English transliteration of the name.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “Heth,” the ancestor associated with the Hittites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/כְנַעַן
  chosen: And Canaan
  alternatives:
  - Now Canaan
  - Canaan
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention. The prefixed
    conjunction is rendered 'And' to preserve the genealogical sequence.
- source_word: יָלַד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: In genealogical context, יָלַד with a male subject denotes begetting/fathering.
    'Fathered' is natural modern English and preserves the paternal genealogical sense
    better than the archaic 'begot'.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker has no standalone English equivalent and is represented
    through normal English syntax.
- source_word: צִידוֹן
  chosen: Sidon
  alternatives:
  - Zidon
  lexicon: HALOT
  rationale: Proper name transliterated in its standard English form. 'Sidon' is the
    conventional modern spelling; 'Zidon' reflects older tradition but is less standard
    in contemporary English.
- source_word: בְּכֹר/וֹ
  chosen: his firstborn
  alternatives:
  - his eldest son
  lexicon: HALOT
  rationale: The noun means 'firstborn' with 3ms suffix. 'His firstborn' is both accurate
    and concise, preserving the birth-order emphasis present in the Hebrew.
- source_word: וְ/אֶת
  chosen: and
  lexicon: HALOT
  rationale: The conjunction plus direct-object marker is naturally rendered by 'and'
    introducing the second named descendant.
- source_word: חֵת
  chosen: Heth
  alternatives:
  - the Hittites
  lexicon: HALOT
  rationale: The Hebrew form here is the proper name חֵת, a progenitor in the genealogy,
    not the ethnonym in plural form. Therefore the personal-name rendering 'Heth'
    is preferred over the interpretive ethnic rendering 'the Hittites'.
