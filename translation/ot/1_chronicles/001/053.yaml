id: 1CH.1.53
reference: 1 Chronicles 1:53
source:
  edition: WLC
  text: אַלּ֥וּף קְנַ֛ז אַלּ֥וּף תֵּימָ֖ן אַלּ֣וּף מִבְצָֽר׃
translation:
  text: Chief Kenaz, chief Teman, chief Mibzar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clan chief' for each occurrence of אַלּוּף.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלּוּף
  chosen: chief
  alternatives:
  - clan chief
  - leader
  - duke
  lexicon: HALOT
  rationale: In Edomite genealogical lists, אַלּוּף denotes a tribal or clan leader.
    'Chief' is clear modern English and avoids the archaic/tradition-bound 'duke,'
    while remaining concise in this list format.
- source_word: קְנַז
  chosen: Kenaz
  rationale: Proper name; transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: תֵּימָן
  chosen: Teman
  alternatives:
  - Temanite region
  lexicon: HALOT
  rationale: Here the term functions as a proper name in the list of Edomite chiefs.
    Although the name is associated with a region/clan, the genealogy format favors
    simple transliteration as a name.
- source_word: מִבְצָר
  chosen: Mibzar
  rationale: Proper name; transliterated rather than translated, consistent with the
    handling of personal or clan names in genealogical lists.
