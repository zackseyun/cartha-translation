theological_decisions:
- issue: Status term for Keturah in relation to Abraham
  chosen_reading: concubine
  alternative_readings:
  - wife
  - secondary wife
  rationale: The verse explicitly uses פִּילֶגֶשׁ, which should be translated according
    to its lexical sense rather than harmonized to passages where Keturah is called
    Abraham's wife. This preserves the wording of the Chronicler without importing
    a reconciliation into the main text.
  doctrine_reference: Translation philosophy §1, §3
