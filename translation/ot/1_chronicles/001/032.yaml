id: 1CH.1.32
reference: 1 Chronicles 1:32
source:
  edition: WLC
  text: וּ/בְנֵ֨י קְטוּרָ֜ה פִּילֶ֣גֶשׁ אַבְרָהָ֗ם יָלְדָ֞ה אֶת זִמְרָ֧ן וְ/יָקְשָׁ֛ן
    וּ/מְדָ֥ן וּ/מִדְיָ֖ן וְ/יִשְׁבָּ֣ק וְ/שׁ֑וּחַ וּ/בְנֵ֥י יָקְשָׁ֖ן שְׁבָ֥א וּ/דְדָֽן־׃ס
translation:
  text: 'And the sons of Keturah, Abraham’s concubine: she bore Zimran, Jokshan, Medan,
    Midian, Ishbak, and Shuah. And the sons of Jokshan: Sheba and Dedan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Genesis 25:1 calls Keturah Abraham’s wife; here the Chronicler specifically
      calls her his concubine.
    reason: cross_reference
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons of.' The prefixed conjunction
    is rendered 'And' to preserve the genealogical sequence and list-like style of
    Chronicles.
- source_word: קְטוּרָה
  chosen: Keturah
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention.
- source_word: פִּילֶגֶשׁ
  chosen: concubine
  alternatives:
  - secondary wife
  lexicon: HALOT
  rationale: The Hebrew denotes a woman of recognized union but lesser status than
    a primary wife. 'Concubine' is the standard concise English equivalent and best
    fits the genealogical notice.
- source_word: אַבְרָהָם
  chosen: Abraham’s
  lexicon: HALOT
  rationale: 'Proper name in genitival relationship with פִּילֶגֶשׁ, naturally rendered
    in English as a possessive: ''Abraham’s concubine.'''
- source_word: יָלְדָה
  chosen: she bore
  alternatives:
  - bore
  - gave birth to
  lexicon: HALOT
  rationale: The feminine singular verb refers back to Keturah. 'She bore' makes the
    subject explicit in English and preserves the genealogical register better than
    the more expansive 'gave birth to.'
- source_word: אֶת
  chosen: '[direct object marker, not translated]'
  lexicon: HALOT
  rationale: Hebrew direct object marker has no direct English equivalent and is therefore
    omitted in translation.
- source_word: זִמְרָן
  chosen: Zimran
  lexicon: HALOT
  rationale: Proper name; transliterated.
- source_word: יָקְשָׁן
  chosen: Jokshan
  alternatives:
  - Yokshan
  lexicon: HALOT
  rationale: Proper name; standard English biblical transliteration is 'Jokshan.'
- source_word: מְדָן
  chosen: Medan
  lexicon: HALOT
  rationale: Proper name; transliterated.
- source_word: מִדְיָן
  chosen: Midian
  lexicon: HALOT
  rationale: Proper name; transliterated in its conventional English form.
- source_word: יִשְׁבָּק
  chosen: Ishbak
  lexicon: HALOT
  rationale: Proper name; transliterated.
- source_word: שׁוּחַ
  chosen: Shuah
  alternatives:
  - Shuach
  lexicon: HALOT
  rationale: Proper name; 'Shuah' is the conventional English form in this genealogical
    context.
- source_word: וּבְנֵי יָקְשָׁן
  chosen: And the sons of Jokshan
  alternatives:
  - Now the sons of Jokshan
  - Jokshan’s sons
  lexicon: HALOT
  rationale: Construct phrase repeated to introduce the next genealogical sub-list.
    Retaining 'sons of' mirrors the Hebrew structure and keeps the chronicler’s formal
    style.
- source_word: שְׁבָא
  chosen: Sheba
  lexicon: HALOT
  rationale: Proper name; transliterated in standard English form.
- source_word: דְדָן
  chosen: Dedan
  lexicon: HALOT
  rationale: Proper name; transliterated in standard English form.
