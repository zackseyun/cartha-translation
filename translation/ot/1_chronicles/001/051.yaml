id: 1CH.1.51
reference: 1 Chronicles 1:51
source:
  edition: WLC
  text: וַ/יָּ֖מָת הֲדָ֑ד וַ/יִּהְיוּ֙ אַלּוּפֵ֣י אֱד֔וֹם אַלּ֥וּף תִּמְנָ֛ע אַלּ֥וּף
    עליה אַלּ֥וּף יְתֵֽתס׃
translation:
  text: 'Hadad died, and the chiefs of Edom were: Chief Timna, Chief Aliah, Chief
    Jetheth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Genesis 36:40 has the corresponding name as 'Alvah.' Chronicles here reads
      'Aliah.'
    reason: textual_variant
  - marker: b
    text: Older English versions often render אַלּוּף as 'duke'; here it denotes an
      Edomite clan or tribal chief.
    reason: lexical_alternative
  - marker: c
    text: Timna may also be spelled 'Timnah' in English transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - and he died
  - then he died
  lexicon: HALOT
  rationale: Wayyiqtol of מות narrates the next event in sequence. English simple
    past 'died' conveys the sense naturally; the conjunction is absorbed into normal
    English narrative flow.
- source_word: הֲדָד
  chosen: Hadad
  rationale: Personal name is transliterated per translation philosophy.
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - became
  lexicon: HALOT
  rationale: Here היה introduces the following list of Edomite clan leaders after
    Hadad's death. 'Were' is the most natural English copular rendering for list introduction.
- source_word: אַלּוּפֵי
  chosen: chiefs of
  alternatives:
  - clan chiefs of
  - dukes of
  - leaders of
  lexicon: HALOT
  rationale: אַלּוּף in Edomite genealogical/political lists denotes tribal or clan
    leaders. 'Chiefs' is clear modern English and avoids the archaic 'dukes' found
    in older versions.
- source_word: אֱדוֹם
  chosen: Edom
  rationale: Standard English transliteration of the place/people name.
- source_word: אַלּוּף
  chosen: Chief
  alternatives:
  - Clan chief
  - leader
  lexicon: HALOT
  rationale: Repeated singular title before each proper name is best represented explicitly
    in English to preserve the list structure.
- source_word: תִּמְנָע
  chosen: Timna
  alternatives:
  - Timnah
  rationale: The consonantal form here names an Edomite chief. 'Timna' closely reflects
    the Hebrew form in this genealogical context; 'Timnah' is a familiar alternative
    spelling in English tradition.
- source_word: עליה
  chosen: Aliah
  alternatives:
  - Alvah
  rationale: The Chronicles form is עליה, which supports the transliteration 'Aliah.'
    'Alvah' reflects the parallel form in Genesis 36:40 and is worth preserving in
    a footnote as a parallel-name variant.
- source_word: יְתֵת
  chosen: Jetheth
  alternatives:
  - Jethath
  rationale: Standard transliteration of the Hebrew proper name in this verse; doubled
    'th' reflects common English convention for this name.
