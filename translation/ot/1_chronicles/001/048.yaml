id: 1CH.1.48
reference: 1 Chronicles 1:48
source:
  edition: WLC
  text: וַ/יָּ֖מָת שַׂמְלָ֑ה וַ/יִּמְלֹ֣ךְ תַּחְתָּ֔י/ו שָׁא֖וּל מֵ/רְחֹב֥וֹת הַ/נָּהָֽר׃
translation:
  text: Samlah died, and Shaul from Rehoboth on the River reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the river'; many understand this as a reference to the Euphrates.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: Qal wayyiqtol of מות straightforwardly denotes death. 'Died' is the plain,
    direct narrative rendering and avoids unnecessary euphemism.
- source_word: שַׂמְלָה
  chosen: Samlah
  alternatives:
  - Samla
  rationale: Proper name; transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: The verb מלך in this royal succession formula is idiomatically rendered
    'reigned.' Although the form can mark accession, English biblical style commonly
    uses 'reigned' in such genealogical notices without loss of meaning.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: The preposition תחת with pronominal suffix in succession contexts means
    'in place of' or 'instead of.' 'In his place' is natural English and clearly expresses
    royal succession.
- source_word: שָׁאוּל
  chosen: Shaul
  alternatives:
  - Saul
  rationale: Proper name; transliterated directly from Hebrew rather than assimilated
    to the more familiar English form 'Saul.' This follows the stated philosophy of
    transliterating personal names by standard conventions and avoids conflating this
    Edomite king with the later Israelite Saul.
- source_word: מֵרְחֹבוֹת
  chosen: from Rehoboth
  alternatives:
  - of Rehoboth
  lexicon: HALOT
  rationale: The prefixed מ indicates origin or association, naturally rendered 'from.'
    Rehoboth is a place name here, not a common noun to be translated.
- source_word: הַנָּהָר
  chosen: the River
  alternatives:
  - the Euphrates
  - the river
  lexicon: HALOT
  rationale: נהר with article literally means 'the river.' In ancient Near Eastern
    usage it can function as a known geographic designation, often understood as the
    Euphrates, but the Hebrew text itself does not specify Euphrates. Capitalizing
    'River' preserves the likely toponymic force while staying close to the source.
