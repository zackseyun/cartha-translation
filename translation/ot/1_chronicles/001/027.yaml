theological_decisions:
- issue: Rendering the verbless identification formula in a genealogical context
  chosen_reading: Abram—that is, Abraham.
  alternative_readings:
  - Abram, he is Abraham.
  - Abram is Abraham.
  rationale: The Hebrew consists of two proper names linked by the pronoun הוּא in
    a nominal clause. In English, 'that is' most naturally conveys the chronicler's
    explanatory identification. This is a stylistic and syntactic decision, not a
    theological reinterpretation.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    plain sense in readable modern English.'
