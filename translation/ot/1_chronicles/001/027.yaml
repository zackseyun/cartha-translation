reference: 1 Chronicles 1:27
source:
  edition: WLC
  text: אַבְרָ֖ם ה֥וּא אַבְרָהָֽם׃ס
translation:
  text: Abram—that is, Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Abram, he is Abraham” or “Abram is Abraham.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אַבְרָם
  chosen: Abram
  lexicon: HALOT
  rationale: Proper personal name; per translation philosophy, names are transliterated
    by standard English convention rather than translated.
- source_word: הוּא
  chosen: that is
  alternatives:
  - he is
  - is
  lexicon: HALOT
  rationale: The independent pronoun literally means 'he,' but in this equative identification
    formula between two names, idiomatic English is best expressed as 'that is,' clarifying
    that the verse identifies Abram with Abraham rather than making a predicative
    statement in awkward English. This preserves the genealogical note's function.
- source_word: אַבְרָהָם
  chosen: Abraham
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention.
    The verse marks the renamed identity of Abram as Abraham.
