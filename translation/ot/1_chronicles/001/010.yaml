id: 1CH.1.10
reference: 1 Chronicles 1:10
source:
  edition: WLC
  text: וְ/כ֖וּשׁ יָלַ֣ד אֶת נִמְר֑וֹד ה֣וּא הֵחֵ֔ל לִ/הְי֥וֹת גִּבּ֖וֹר בָּ/אָֽרֶץ־׃ס
translation:
  text: And Cush fathered Nimrod; he began to be a mighty man in the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the earth.' Hebrew אֶרֶץ can mean 'land' or 'earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כּוּשׁ
  chosen: And Cush
  alternatives:
  - Now Cush
  lexicon: HALOT
  rationale: וְ here is the simple conjunction linking genealogical notices; 'And
    Cush' is the most natural English continuation. כּוּשׁ is a proper name and is
    transliterated as 'Cush' per the name policy.
- source_word: יָלַד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: In genealogical contexts ילד commonly denotes direct begetting/fathering.
    'Fathered' is concise, natural modern English, and more readable than archaic
    'begot' while remaining formally close.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: Hebrew grammar
  rationale: אֶת marks the definite direct object and is not represented by a standalone
    English word.
- source_word: נִמְרֹד
  chosen: Nimrod
  lexicon: HALOT
  rationale: Proper name; transliterated by standard English convention.
- source_word: הוּא
  chosen: he
  alternatives:
  - this one
  lexicon: Hebrew grammar
  rationale: The independent pronoun adds emphasis/resumption after the name. English
    normally expresses this simply as 'he' without overtranslating the emphasis.
- source_word: הֵחֵל
  chosen: began
  alternatives:
  - was the first
  - became
  lexicon: HALOT
  rationale: The Hiphil of חלל with infinitive commonly means 'begin.' Some contexts
    allow an ingressive nuance ('became' or 'was the first to become'), but 'began'
    best reflects the verbal form without importing more interpretation than necessary.
- source_word: לִהְיוֹת
  chosen: to be
  alternatives:
  - to become
  lexicon: HALOT
  rationale: The infinitive of היה is straightforwardly 'to be.' In English, with
    'began,' this yields the idiomatic 'began to be,' preserving the Hebrew construction.
- source_word: גִּבּוֹר
  chosen: a mighty man
  alternatives:
  - a mighty one
  - a warrior
  - a hero
  lexicon: HALOT
  rationale: גִּבּוֹר can denote a mighty man, warrior, or hero. Here the text gives
    a broad characterization rather than explicitly military activity, so 'a mighty
    man' preserves the general sense and matches the genealogical summary. 'Warrior'
    is possible but narrower than the Hebrew requires.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - on the earth
  - in the earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In this context describing Nimrod's
    rise within the human realm, either is possible; 'in the land' is a restrained
    rendering that avoids overstating universality while remaining natural English.
    The broader alternative is preserved in a footnote.
