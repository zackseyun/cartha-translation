theological_decisions:
- issue: Scope of בָּאָרֶץ in describing Nimrod's prominence
  chosen_reading: in the land
  alternative_readings:
  - on the earth
  rationale: The Hebrew אֶרֶץ is semantically broad. Because the verse itself does
    not explicitly universalize Nimrod's status, the main text uses the less expansive
    'land.' The more traditional 'earth' remains viable and is preserved in a footnote
    to maintain interpretive transparency.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
