id: 1CH.1.2
reference: 1 Chronicles 1:2
source:
  edition: WLC
  text: קֵינָ֥ן מַהֲלַלְאֵ֖ל יָֽרֶד׃
translation:
  text: Kenan, Mahalalel, Jared.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew name spellings may also appear in English as 'Kainan' or 'Cainan,'
      especially under Greek or Latin influence.
    reason: lexical_alternative
  - marker: b
    text: The name 'Mahalalel' is also commonly spelled 'Mahalaleel' in some English
      traditions.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew form behind 'Jared' could be represented more strictly as 'Yered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קֵינָן
  chosen: Kenan
  alternatives:
  - Kainan
  - Cainan
  rationale: Proper personal name (HNp). Following the project's principle to transliterate
    names rather than translate titles. 'Kenan' reflects a standard direct transliteration
    from the Hebrew consonants and vowels; alternative English spellings reflect Greek/Latin-influenced
    traditions rather than the Hebrew form.
- source_word: מַהֲלַלְאֵל
  chosen: Mahalalel
  alternatives:
  - Mahalaleel
  rationale: Proper personal name (HNp). Transliterated from Hebrew rather than translated,
    in keeping with the project's naming policy. The chosen spelling is a standard
    modern English transliteration; the longer 'Mahalaleel' reflects a more traditional/Greek-influenced
    English form.
- source_word: יָרֶד
  chosen: Jared
  alternatives:
  - Yered
  rationale: Proper personal name (HNp). Although the underlying Hebrew form could
    be represented more strictly as 'Yered,' 'Jared' is the established standard English
    transliteration for this biblical name and remains transparent to readers while
    still representing the Hebrew name rather than translating its verbal root.
