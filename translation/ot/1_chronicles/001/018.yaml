id: 1CH.1.18
reference: 1 Chronicles 1:18
source:
  edition: WLC
  text: וְ/אַרְפַּכְשַׁ֖ד יָלַ֣ד אֶת שָׁ֑לַח וְ/שֶׁ֖לַח יָלַ֥ד אֶת עֵֽבֶר־־׃
translation:
  text: Arpachshad fathered Shelah, and Shelah fathered Eber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Shelah; compare the traditional form 'Salah' in some translations
      and related genealogical passages.
    reason: lexical_alternative
  - marker: b
    text: Traditional English versions often read 'Arphaxad' for Arpachshad, reflecting
      a Greek-influenced form of the name.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַרְפַּכְשַׁד
  chosen: Arpachshad
  alternatives:
  - Arphaxad
  rationale: Proper name transliterated by standard English convention from the Hebrew
    form. 'Arphaxad' reflects a tradition influenced by Greek/older English forms,
    but the Hebrew here supports 'Arpachshad' more directly.
- source_word: יָלַד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In this genealogy, the verb denotes male descent. 'Fathered' is concise,
    natural modern English, and more readable than archaic 'begot' while remaining
    more specific than the overly broad 'became the father of'.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent English equivalent; its function
    is represented by English word order.
- source_word: שָׁלַח / שֶׁלַח
  chosen: Shelah
  alternatives:
  - Salah
  rationale: Proper name transliterated from the Hebrew form in Chronicles. The verse
    contains the name twice with slightly different vocalization/orthography in the
    Masoretic pointing, but both refer to the same person and are represented consistently
    in English as 'Shelah.' 'Salah' reflects the Genesis/LXX-related tradition and
    is worth preserving as an alternative.
- source_word: עֵבֶר
  chosen: Eber
  alternatives:
  - Heber
  rationale: Proper name transliterated from Hebrew. 'Eber' best reflects the consonantal
    form עבר here; 'Heber' is a familiar English form for some similar names but is
    less precise for this spelling in this context.
