id: 1CH.1.21
reference: 1 Chronicles 1:21
source:
  edition: WLC
  text: וְ/אֶת הֲדוֹרָ֥ם וְ/אֶת אוּזָ֖ל וְ/אֶת דִּקְלָֽה־־־׃
translation:
  text: Hadoram, Uzal, and Diklah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats the object marker before each name: literally, ''and Hadoram,
      and Uzal, and Diklah.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲדוֹרָם
  chosen: Hadoram
  alternatives:
  - Hadoram
  rationale: Proper name; transliterated rather than translated per project philosophy.
    'Hadoram' reflects a straightforward English transliteration of the Hebrew consonants
    and vowels. 'Hadoram' is a possible spelling variant in English.
- source_word: אוּזָל
  chosen: Uzal
  rationale: Proper name; transliterated directly into standard English form.
- source_word: דִּקְלָה
  chosen: Diklah
  alternatives:
  - Dikla
  rationale: Proper name; transliterated rather than translated. 'Diklah' preserves
    the final he in conventional English transliteration more clearly than 'Dikla'.
- source_word: וְ/אֶת ... וְ/אֶת ... וְ/אֶת
  chosen: '[simple coordination expressed as a list with ''and'' before the final
    item]'
  alternatives:
  - and Hadoram, and Uzal, and Diklah
  lexicon: Hebrew grammar
  rationale: The repeated waw + object marker introduces successive names in a genealogy.
    In English, a simple list is the most natural equivalent; reproducing every Hebrew
    object marker and conjunction would be wooden without adding meaning.
