theological_decisions:
- issue: Meaning of 'the earth was divided' in the naming notice for Peleg
  chosen_reading: Retain the broad wording 'the earth was divided' without specifying
    the nature of the division.
  alternative_readings:
  - the land was divided
  - an allusion to the division of peoples/languages after Babel
  - a reference to a geographical division
  rationale: The Hebrew text itself does not define what sort of division is meant.
    To preserve theological and interpretive tension, the translation keeps the wording
    broad and does not import a specific explanation into the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
