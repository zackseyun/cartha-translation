id: 1CH.1.19
reference: 1 Chronicles 1:19
source:
  edition: WLC
  text: וּ/לְ/עֵ֥בֶר יֻלַּ֖ד שְׁנֵ֣י בָנִ֑ים שֵׁ֣ם הָ/אֶחָ֞ד פֶּ֗לֶג כִּ֤י בְ/יָמָי/ו֙
    נִפְלְגָ֣ה הָ/אָ֔רֶץ וְ/שֵׁ֥ם אָחִ֖י/ו יָקְטָֽן׃
translation:
  text: 'And to Eber were born two sons: the name of the one was Peleg, because in
    his days the earth was divided; and his brother’s name was Joktan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land was divided.' The Hebrew can refer either to the whole earth
      or to a land/territory; the text does not specify the nature of the division.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְעֵבֶר
  chosen: And to Eber
  alternatives:
  - And to Eber also
  - Now to Eber
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition are most naturally rendered
    together as 'And to Eber,' preserving the genealogical flow and the indirect-object
    construction with the passive verb.
- source_word: יֻלַּד
  chosen: were born
  alternatives:
  - was born
  - begot
  lexicon: HALOT
  rationale: This is a passive form of ילד, with 'two sons' as the plural subject
    in sense. English idiom prefers 'were born' rather than a wooden singular passive.
    'Begot' would shift the syntax from passive birth to active fathering, which the
    Hebrew does not do here.
- source_word: שְׁנֵי בָנִים
  chosen: two sons
  alternatives:
  - two children
  lexicon: HALOT
  rationale: A straightforward rendering of the construct phrase; 'sons' preserves
    the male-specific sense of בנים in this genealogical context.
- source_word: שֵׁם הָאֶחָד
  chosen: the name of the one
  alternatives:
  - the name of the first
  - one was named
  lexicon: HALOT
  rationale: The Hebrew literally says 'the name of the one.' This is retained in
    a natural but still transparent English form. 'First' is interpretive; the text
    distinguishes the two sons without explicitly numbering them.
- source_word: פֶּלֶג
  chosen: Peleg
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: כִּי בְיָמָיו
  chosen: because in his days
  alternatives:
  - for in his days
  - since in his days
  lexicon: HALOT
  rationale: כִּי here introduces the explanation for the name Peleg. 'Because' makes
    the causal force clear in modern English.
- source_word: נִפְלְגָה הָאָרֶץ
  chosen: the earth was divided
  alternatives:
  - the land was divided
  lexicon: HALOT
  rationale: The verb from פלג means 'to divide' or 'be divided.' הארץ can mean 'earth'
    or 'land'; 'earth' is the more traditional and broader sense here, fitting the
    etiological explanation attached to the name Peleg without narrowing it to a local
    territory.
- source_word: וְשֵׁם אָחִיו
  chosen: and his brother’s name
  alternatives:
  - and the name of his brother
  lexicon: HALOT
  rationale: This preserves the possessive relationship while using natural English
    word order.
- source_word: יָקְטָן
  chosen: Joktan
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
