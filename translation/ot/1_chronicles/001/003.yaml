id: 1CH.1.3
reference: 1 Chronicles 1:3
source:
  edition: WLC
  text: חֲנ֥וֹךְ מְתוּשֶׁ֖לַח לָֽמֶךְ׃
translation:
  text: Enoch, Methuselah, Lamech.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more explicitly in genealogical sense: ''Enoch fathered Methuselah,
      and Methuselah fathered Lamech.'' The Hebrew verse itself lists only the names,
      with the father-son relationship understood from context.'
    reason: alternative_reading
lexical_decisions:
- source_word: חֲנוֹךְ
  chosen: Enoch
  alternatives:
  - Hanokh
  lexicon: HALOT
  rationale: Proper personal name; per translation philosophy, personal names are
    transliterated by standard English convention rather than translated. 'Enoch'
    is the established English form of חֲנוֹךְ.
- source_word: מְתוּשֶׁלַח
  chosen: Methuselah
  alternatives:
  - Methushelah
  lexicon: HALOT
  rationale: Proper personal name in a genealogy; transliterated using the conventional
    English form 'Methuselah.'
- source_word: לָמֶךְ
  chosen: Lamech
  alternatives:
  - Lamek
  lexicon: HALOT
  rationale: Proper personal name; rendered by the standard English transliteration
    'Lamech.'
- source_word: — (genealogical sequence)
  chosen: comma-separated list
  alternatives:
  - '''Enoch fathered Methuselah, Methuselah fathered Lamech'''
  rationale: The Hebrew here consists only of three names without an explicit verb,
    continuing the genealogical list style from the surrounding verses. English preserves
    this terse list format rather than supplying repeated verbs not present in this
    verse.
