id: 1CH.1.22
reference: 1 Chronicles 1:22
source:
  edition: WLC
  text: וְ/אֶת עֵיבָ֥ל וְ/אֶת אֲבִימָאֵ֖ל וְ/אֶת שְׁבָֽא־־־׃
translation:
  text: Ebal, Abimael, and Sheba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: In the parallel genealogy at Genesis 10:28, this name appears as 'Obal.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֶת
  chosen: and
  alternatives:
  - (not separately translated beyond list coordination)
  lexicon: HALOT
  rationale: The combination of conjunction וְ with the object marker אֶת introduces
    each item in a genealogical list. In English, repeated object markers are not
    represented; the conjunction is conveyed by normal list punctuation and the final
    'and.'
- source_word: עֵיבָל
  chosen: Ebal
  alternatives:
  - Obal
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English convention from
    the Hebrew form עֵיבָל. An alternative tradition 'Obal' appears in the parallel
    genealogy of Genesis 10:28, so that variant is worth preserving in a footnote.
- source_word: אֲבִימָאֵל
  chosen: Abimael
  lexicon: HALOT
  rationale: Proper name transliterated directly from the Hebrew. As a personal name,
    it is transliterated rather than translated, in keeping with the project's policy
    for names.
- source_word: שְׁבָא
  chosen: Sheba
  alternatives:
  - Seba
  lexicon: HALOT
  rationale: Proper name transliterated from the Hebrew form שְׁבָא. 'Sheba' is the
    standard rendering for this spelling; 'Seba' represents a different but similar
    name elsewhere, so it is not adopted here.
