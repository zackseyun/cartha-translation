id: 1CH.1.40
reference: 1 Chronicles 1:40
source:
  edition: WLC
  text: בְּנֵ֣י שׁוֹבָ֔ל עַלְיָ֧ן וּ/מָנַ֛חַת וְ/עֵיבָ֖ל שְׁפִ֣י וְ/אוֹנָ֑ם וּ/בְנֵ֥י
    צִבְע֖וֹן אַיָּ֥ה וַ/עֲנָֽהס׃
translation:
  text: 'The sons of Shobal: Alian, Manahath, Ebal, Shephi, and Onam. And the sons
    of Zibeon: Aiah and Anah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Alian'; the parallel genealogy in Genesis 36:23 reads 'Alvan.'
    reason: alternative_reading
  - marker: b
    text: Chronicles reads 'Shephi'; the parallel in Genesis 36:23 reads 'Shepho.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: In a genealogy, בְּנֵי literally means 'sons of,' though it can sometimes
    function more broadly as 'descendants.' Here the immediate list of named offspring
    is best represented by the more formal genealogical phrase 'sons of.'
- source_word: שׁוֹבָל
  chosen: Shobal
  alternatives:
  - Shobal
  rationale: Proper personal name; transliterated according to standard English convention
    rather than translated.
- source_word: עַלְיָן
  chosen: Alian
  alternatives:
  - Alvan
  rationale: Proper name transliterated from the Chronicles form עַלְיָן. An alternative
    tradition reflected elsewhere has 'Alvan' (cf. Genesis 36:23), but the consonantal
    form here supports 'Alian' as the direct rendering of this verse.
- source_word: מָנַחַת
  chosen: Manahath
  alternatives:
  - Manachat
  rationale: Proper name transliterated directly from Hebrew. Standard English biblical
    convention favors 'Manahath.'
- source_word: עֵיבָל
  chosen: Ebal
  alternatives:
  - Obal
  rationale: Proper name transliterated from the Chronicles spelling עֵיבָל. A parallel
    in Genesis 36:23 reads 'Shepho and Onam' with related variation in this list;
    'Ebal' is the direct rendering of the form present here.
- source_word: שְׁפִי
  chosen: Shephi
  alternatives:
  - Shepho
  rationale: Proper name transliterated from the form in Chronicles. The parallel
    genealogy in Genesis 36:23 has 'Shepho'; this verse's Hebrew supports 'Shephi.'
- source_word: אוֹנָם
  chosen: Onam
  rationale: Proper name transliterated directly from Hebrew.
- source_word: צִבְעוֹן
  chosen: Zibeon
  alternatives:
  - Zib'on
  rationale: Proper personal name transliterated by standard English convention.
- source_word: אַיָּה
  chosen: Aiah
  alternatives:
  - Ajah
  rationale: Proper name transliterated from Hebrew. English biblical usage varies
    between 'Aiah' and 'Ajah'; 'Aiah' more transparently reflects the Hebrew form
    here.
- source_word: עֲנָה
  chosen: Anah
  rationale: Proper name transliterated directly from Hebrew.
- source_word: וְ / וּ / וַ
  chosen: and
  alternatives:
  - now
  lexicon: HALOT
  rationale: The prefixed conjunctions simply coordinate names and clauses in this
    genealogical list. English 'and' preserves the structure naturally without overinterpreting
    discourse nuance.
