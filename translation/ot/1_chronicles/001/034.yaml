theological_decisions:
- issue: Rendering יִשְׂרָאֵל in a genealogical list where Jacob is in view
  chosen_reading: Israel
  alternative_readings:
  - Jacob
  rationale: The verse explicitly names Isaac's sons as 'Esau and Israel.' Although
    the referent is Jacob, the translation follows the Hebrew wording and does not
    replace the covenant name with the birth name. This is a lexical-textual fidelity
    issue rather than a doctrinal one, and preserving 'Israel' avoids importing harmonization
    not present in the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Translate titles; transliterate names'
