id: 1CH.1.34
reference: 1 Chronicles 1:34
source:
  edition: WLC
  text: וַ/יּ֥וֹלֶד אַבְרָהָ֖ם אֶת יִצְחָ֑ק בְּנֵ֣י יִצְחָ֔ק עֵשָׂ֖ו וְ/יִשְׂרָאֵֽל־ס׃ס
translation:
  text: 'Abraham fathered Isaac. The sons of Isaac: Esau and Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: "Israel," that is, Jacob.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogical contexts denotes causing offspring
    to be born, idiomatically 'fathered' in modern English. 'Begot' is traditional
    but archaic; 'became the father of' is accurate but less concise.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent English equivalent; its function
    is reflected in the syntax 'fathered Isaac.'
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - sons of
  lexicon: HALOT
  rationale: Construct plural of בן introducing the next genealogical line. 'The sons
    of' reads naturally as a heading-like genealogical formula in English.
- source_word: עֵשָׂו
  chosen: Esau
  rationale: Standard English transliteration of the personal name.
- source_word: וְיִשְׂרָאֵל
  chosen: and Israel
  alternatives:
  - and Jacob
  lexicon: HALOT
  rationale: The Hebrew text reads 'Israel,' the covenant name of Jacob. The translation
    preserves the source-text form rather than harmonizing to the more expected birth
    name 'Jacob.'
