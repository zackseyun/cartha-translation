id: 1CH.1.17
reference: 1 Chronicles 1:17
source:
  edition: WLC
  text: בְּנֵ֣י שֵׁ֔ם עֵילָ֣ם וְ/אַשּׁ֔וּר וְ/אַרְפַּכְשַׁ֖ד וְ/ל֣וּד וַ/אֲרָ֑ם וְ/ע֥וּץ
    וְ/ח֖וּל וְ/גֶ֥תֶר וָ/מֶֽשֶׁךְ׃ס
translation:
  text: 'The sons of Shem: Elam, Asshur, Arpachshad, Lud, and Aram; and Uz, Hul, Gether,
    and Meshech.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Genesis 10:23 reads “Mash” instead of “Meshech” in the parallel genealogy.
    reason: textual_variant
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of בן introducing a genealogy. 'Sons of' is the most
    direct rendering and fits the genealogical register; 'descendants of' is possible
    in broader lineage contexts but is less formally aligned with the Hebrew here.
- source_word: שֵׁם
  chosen: Shem
  lexicon: HALOT
  rationale: Proper name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: עֵילָם
  chosen: Elam
  lexicon: HALOT
  rationale: Proper name/toponym used here in genealogical list; standard English
    transliteration retained.
- source_word: אַשּׁוּר
  chosen: Asshur
  alternatives:
  - Assyria
  lexicon: HALOT
  rationale: In this genealogy the form functions as a proper name in a list of Shem's
    sons, so the personal-name transliteration 'Asshur' is preferable. 'Assyria' would
    shift the sense toward the later national/geographical entity rather than the
    named ancestor.
- source_word: אַרְפַּכְשַׁד
  chosen: Arpachshad
  alternatives:
  - Arphaxad
  lexicon: HALOT
  rationale: Direct transliteration from the Hebrew form is preferred over the traditional
    form influenced by Greek/English tradition.
- source_word: לוּד
  chosen: Lud
  alternatives:
  - Ludim
  lexicon: HALOT
  rationale: The Hebrew here is singular proper name לוּד, not the plural ethnonym
    Ludim. Therefore 'Lud' is the accurate rendering.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - Syria
  lexicon: HALOT
  rationale: As with Asshur, the genealogical context favors the ancestor's name 'Aram'
    rather than the later territorial designation 'Syria'.
- source_word: עוּץ
  chosen: Uz
  alternatives:
  - Uts
  lexicon: HALOT
  rationale: Standard English transliteration of the proper name.
- source_word: חוּל
  chosen: Hul
  alternatives:
  - Chul
  lexicon: HALOT
  rationale: Proper name transliterated in a conventional, readable English form.
- source_word: גֶתֶר
  chosen: Gether
  lexicon: HALOT
  rationale: Proper name transliterated straightforwardly.
- source_word: מֶשֶׁךְ
  chosen: Meshech
  alternatives:
  - Mash
  lexicon: HALOT
  rationale: The Masoretic Text here reads 'Meshech,' and that is translated directly.
    However, Genesis 10:23 has 'Mash' in the parallel list, so the alternative is
    worth preserving in a footnote as a textual/canonical parallel.
