id: 1CH.1.23
reference: 1 Chronicles 1:23
source:
  edition: WLC
  text: וְ/אֶת אוֹפִ֥יר וְ/אֶת חֲוִילָ֖ה וְ/אֶת יוֹבָ֑ב כָּל אֵ֖לֶּה בְּנֵ֥י יָקְטָֽן־־־־׃ס
translation:
  text: and Ophir, Havilah, and Jobab. All these were the sons of Joktan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of Joktan.' The Hebrew says 'sons of Joktan,' but in genealogical
      contexts 'sons' can sometimes function more broadly for lineage.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  chosen: and
  alternatives:
  - (untranslated object marker)
  - also
  lexicon: HALOT
  rationale: Here אֵת marks each item in a continuing genealogy list, while the prefixed
    conjunction ו supplies the coordination. In English genealogy style, the object
    marker is not represented directly, so the natural rendering is simply the conjunction
    'and' before each final set of names.
- source_word: אוֹפִיר
  chosen: Ophir
  lexicon: HALOT
  rationale: Proper name; transliterated according to the translation philosophy for
    personal/place names in genealogies. Whether the name also evokes a region known
    for gold is not activated here beyond the genealogical listing.
- source_word: חֲוִילָה
  chosen: Havilah
  lexicon: HALOT
  rationale: Proper name; transliterated. Standard English biblical form 'Havilah'
    is retained for recognizability and consistency.
- source_word: יוֹבָב
  chosen: Jobab
  lexicon: HALOT
  rationale: Proper name; transliterated in standard English biblical form.
- source_word: כָּל אֵלֶּה
  chosen: All these
  alternatives:
  - All of these
  - These all
  lexicon: HALOT
  rationale: The phrase sums up the preceding names. 'All these' is concise, natural
    English and preserves the demonstrative emphasis.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: Although genealogical formulas can sometimes imply broader descent, the
    Hebrew term is explicitly masculine plural construct 'sons of.' Following the
    gender-accurate principle, 'sons of' is preferred in the main text rather than
    the more generic 'descendants of' or 'children of'.
- source_word: יָקְטָן
  chosen: Joktan
  alternatives:
  - Yoktan
  lexicon: HALOT
  rationale: Proper name; transliterated using the conventional English biblical form
    'Joktan' for readability and consistency with established usage.
