id: 1CH.1.54
reference: 1 Chronicles 1:54
source:
  edition: WLC
  text: אַלּ֥וּף מַגְדִּיאֵ֖ל אַלּ֣וּף עִירָ֑ם אֵ֖לֶּה אַלּוּפֵ֥י אֱדֽוֹם׃פ
translation:
  text: Chief Magdiel, chief Iram. These were the chiefs of Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clan chiefs of Edom.' The Hebrew term can denote tribal or clan leaders;
      older English versions often use 'dukes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלּוּף
  chosen: chief
  alternatives:
  - clan chief
  - duke
  - leader
  lexicon: HALOT
  rationale: אַלּוּף in Edomite genealogical/political lists denotes a tribal or clan
    leader. 'Chief' is clear modern English and avoids the archaic/tradition-bound
    'duke,' while remaining concise in this list format.
- source_word: מַגְדִּיאֵל
  chosen: Magdiel
  rationale: Proper name; transliterated according to the translation philosophy to
    preserve the personal name rather than translate its possible meaning.
- source_word: עִירָם
  chosen: Iram
  alternatives:
  - Iram/Irām
  rationale: Proper name; transliterated by standard English convention.
- source_word: אֵלֶּה
  chosen: These were
  alternatives:
  - These are
  - These
  lexicon: HALOT
  rationale: Though formally 'these,' English idiom in a summarizing genealogical
    notice is best rendered 'These were,' making the verbless Hebrew clause natural
    in English while preserving the retrospective force.
- source_word: אַלּוּפֵי אֱדֹם
  chosen: the chiefs of Edom
  alternatives:
  - the clan chiefs of Edom
  - the leaders of Edom
  lexicon: HALOT
  rationale: Construct phrase summarizing the preceding names as Edomite chiefs. 'Chiefs
    of Edom' is concise and consistent with the earlier occurrences of אַלּוּף in
    the verse.
