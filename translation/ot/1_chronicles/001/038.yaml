id: 1CH.1.38
reference: 1 Chronicles 1:38
source:
  edition: WLC
  text: וּ/בְנֵ֣י שֵׂעִ֔יר לוֹטָ֥ן וְ/שׁוֹבָ֖ל וְ/צִבְע֣וֹן וַֽ/עֲנָ֑ה וְ/דִישֹׁ֥ן
    וְ/אֵ֖צֶר וְ/דִישָֽׁן׃
translation:
  text: 'And the sons of Seir: Lotan, Shobal, Zibeon, Anah, Dishon, Ezer, and Dishan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of' can denote direct sons or, more broadly in genealogical
      contexts, descendants/clan members. Here the formal genealogical wording is
      retained.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons of,' introducing a genealogical
    list. The prefixed conjunction ו is rendered 'And' to preserve the list-like continuity
    of the genealogy.
- source_word: שֵׂעִיר
  chosen: Seir
  lexicon: HALOT
  rationale: Proper personal name in this genealogical context; transliterated per
    translation philosophy rather than translated.
- source_word: לוֹטָן
  chosen: Lotan
  alternatives:
  - Lotan
  lexicon: HALOT
  rationale: Proper name; standard English transliteration retained.
- source_word: שׁוֹבָל
  chosen: Shobal
  alternatives:
  - Shobal
  lexicon: HALOT
  rationale: Proper name; transliterated by standard convention.
- source_word: צִבְעוֹן
  chosen: Zibeon
  alternatives:
  - Zib'eon
  lexicon: HALOT
  rationale: Proper name; 'Zibeon' is the conventional English transliteration and
    is more readable than a more strictly marked transliteration.
- source_word: עֲנָה
  chosen: Anah
  lexicon: HALOT
  rationale: Proper name; transliterated directly.
- source_word: דִישֹׁן
  chosen: Dishon
  lexicon: HALOT
  rationale: Proper name; transliterated directly. Distinguished from the following
    similar but separate name דִישָׁן.
- source_word: אֵצֶר
  chosen: Ezer
  alternatives:
  - Etser
  lexicon: HALOT
  rationale: Proper name; 'Ezer' follows standard English transliteration conventions.
- source_word: דִישָׁן
  chosen: Dishan
  lexicon: HALOT
  rationale: Proper name; transliterated directly. Kept distinct from דִישֹׁן ('Dishon')
    to reflect the Hebrew spelling difference.
