id: 1CH.5.15
reference: 1 Chronicles 5:15
source:
  edition: WLC
  text: אֲחִי֙ בֶּן עַבְדִּיאֵ֣ל בֶּן גּוּנִ֔י רֹ֖אשׁ לְ/בֵ֥ית אֲבוֹתָֽ/ם־־׃
translation:
  text: Ahi son of Abdiel, son of Guni, was head of their fathers’ houses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “head of their ancestral houses” or “chief of their family houses.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲחִי
  chosen: Ahi
  rationale: Proper personal name; transliterated rather than translated per project
    policy for names.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The genealogical formula in this context is most naturally rendered 'son
    of.' While Hebrew בן can sometimes indicate a more remote descendant, the immediate
    lineage notice is best represented with the standard genealogical expression.
- source_word: עַבְדִּיאֵל
  chosen: Abdiel
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: גּוּנִי
  chosen: Guni
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: רֹאשׁ
  chosen: head
  alternatives:
  - chief
  - leader
  lexicon: HALOT
  rationale: רֹאשׁ commonly denotes 'head' in the sense of chief or leader. 'Head'
    preserves the metaphor present in the Hebrew while remaining natural in English.
- source_word: לְבֵית
  chosen: of ... houses
  alternatives:
  - for the house of
  - of the house of
  lexicon: HALOT
  rationale: The preposition ל with בית in this administrative/genealogical expression
    is idiomatically rendered in English as belonging to or heading a household grouping.
    Because the following noun is plural in sense through אבותם, English plural 'houses'
    best conveys the clan structure.
- source_word: אֲבוֹתָם
  chosen: their fathers’
  alternatives:
  - their ancestral
  - their family
  lexicon: HALOT
  rationale: Literally 'their fathers.' In the construct phrase בית אבותם, the idiom
    refers to ancestral households or fathers' houses. Retaining 'fathers’' preserves
    the source imagery and the technical clan terminology.
