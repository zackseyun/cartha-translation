id: 1CH.5.23
reference: 1 Chronicles 5:23
source:
  edition: WLC
  text: וּ/בְנֵ֗י חֲצִי֙ שֵׁ֣בֶט מְנַשֶּׁ֔ה יָשְׁב֖וּ בָּ/אָ֑רֶץ מִ/בָּשָׁ֞ן עַד בַּ֧עַל
    חֶרְמ֛וֹן וּ/שְׂנִ֥יר וְ/הַר חֶרְמ֖וֹן הֵ֥מָּה רָבֽוּ־־׃
translation:
  text: And the sons of the half-tribe of Manasseh lived in the land from Bashan as
    far as Baal-hermon, Senir, and Mount Hermon; they became numerous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they increased' or 'they multiplied.' The Hebrew verb emphasizes growth
      in number.
    reason: lexical_alternative
  - marker: b
    text: Baal-hermon, Senir, and Mount Hermon are place names marking the northern
      extent of the territory.
    reason: cultural_note
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the descendants of
  - And the people of
  lexicon: HALOT
  rationale: בני literally means 'sons of.' In tribal/genealogical context it denotes
    the members/descendants of a group. 'Sons of' preserves the formal genealogical
    flavor better than the more interpretive 'people of.'
- source_word: חֲצִי שֵׁבֶט
  chosen: the half-tribe
  alternatives:
  - half the tribe
  lexicon: HALOT
  rationale: The construct phrase refers to the recognized political/tribal unit known
    as the half-tribe of Manasseh east of the Jordan. 'Half-tribe' is idiomatic and
    standard in English for this entity.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Proper name transliterated according to standard English convention,
    per translation philosophy.
- source_word: יָשְׁבוּ
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: ישב commonly means 'sit, dwell, live, settle.' Here it describes habitation
    in a region. 'Lived' is natural modern English; 'dwelt' is more formal/archaic,
    and 'settled' may overemphasize initial settlement rather than ongoing residence.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the region
  - in the territory
  lexicon: HALOT
  rationale: ארץ here refers to the land/territory they inhabited. 'In the land' preserves
    the Hebrew wording while remaining clear.
- source_word: מִבָּשָׁן עַד
  chosen: from Bashan as far as
  alternatives:
  - from Bashan to
  - in Bashan up to
  lexicon: HALOT
  rationale: The preposition pair marks geographic extent. 'From Bashan as far as'
    captures the range with slightly more precision than a bare 'to.'
- source_word: בַּעַל חֶרְמוֹן
  chosen: Baal-hermon
  alternatives:
  - Baal Hermon
  lexicon: HALOT
  rationale: Place name transliterated. Hyphenation helps English readers recognize
    it as a compound toponym.
- source_word: וּשְׂנִיר
  chosen: Senir
  lexicon: HALOT
  rationale: Proper place name transliterated.
- source_word: וְהַר חֶרְמוֹן
  chosen: and Mount Hermon
  alternatives:
  - and the hill country of Hermon
  lexicon: HALOT
  rationale: הר normally means 'mountain/mount.' 'Mount Hermon' is the natural English
    rendering of the toponymic phrase.
- source_word: הֵמָּה רָבוּ
  chosen: they became numerous
  alternatives:
  - they increased
  - they multiplied
  lexicon: HALOT
  rationale: רבה in Qal can mean 'be/become many, increase.' With the pronoun for
    emphasis, the clause summarizes their growth in number. 'Became numerous' is clear
    modern English and avoids the potentially more wooden 'multiplied.'
