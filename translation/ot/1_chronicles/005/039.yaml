id: 1CH.5.39
reference: 1 Chronicles 5:39
source:
  edition: WLC
  text: וְ/שַׁלּוּם֙ הוֹלִ֣יד אֶת חִלְקִיָּ֔ה וְ/חִלְקִיָּ֖ה הוֹלִ֥יד אֶת עֲזַרְיָֽה־־׃
translation:
  text: And Shallum fathered Hilkiah, and Hilkiah fathered Azariah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ
  chosen: And
  alternatives:
  - Now
  lexicon: HALOT
  rationale: The prefixed conjunction links this genealogical notice to the preceding
    line. 'And' preserves the simple connective force typical in Hebrew genealogies.
- source_word: שַׁלּוּם
  chosen: Shallum
  lexicon: HALOT
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In genealogical contexts ילד in the Hiphil means 'to father, beget.'
    'Fathered' is concise, natural modern English, and preserves the male genealogical
    line better than the more cumbersome 'became the father of.' 'Begot' is more traditional
    but archaic.
- source_word: אֶת
  chosen: '[not translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent lexical meaning in English;
    it is represented implicitly by English word order.
- source_word: חִלְקִיָּה
  chosen: Hilkiah
  alternatives:
  - Hilqiah
  lexicon: HALOT
  rationale: Personal name transliterated by standard English biblical convention.
    'Hilkiah' is the familiar and readable English form.
- source_word: וְ
  chosen: and
  alternatives:
  - then
  lexicon: HALOT
  rationale: The second conjunction coordinates the next genealogical step. 'And'
    best reflects the Hebrew sequence without adding interpretive nuance.
- source_word: חִלְקִיָּה
  chosen: Hilkiah
  alternatives:
  - Hilqiah
  lexicon: HALOT
  rationale: Repeated proper name kept consistent within the verse.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: Same verb and same genealogical sense as earlier in the verse; consistency
    is maintained.
- source_word: עֲזַרְיָה
  chosen: Azariah
  alternatives:
  - Azaryah
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention; 'Azariah'
    is the established readable form.
