id: 1CH.5.13
reference: 1 Chronicles 5:13
source:
  edition: WLC
  text: וַ/אֲחֵי/הֶ֞ם לְ/בֵ֣ית אֲבוֹתֵי/הֶ֗ם מִֽיכָאֵ֡ל וּ/מְשֻׁלָּ֡ם וְ֠/שֶׁבַע וְ/יוֹרַ֧י
    וְ/יַעְכָּ֛ן וְ/זִ֥יעַ וָ/עֵ֖בֶר שִׁבְעָֽה׃ס
translation:
  text: 'And their brothers, according to their fathers’ houses: Michael, Meshullam,
    Sheba, Jorai, Jachan, Zia, and Eber—seven.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kinsmen'; the Hebrew 'brothers' can denote wider clan-relatives in genealogical
      contexts.
    reason: lexical_alternative
  - marker: b
    text: Literally 'by/according to their fathers’ houses,' a clan or paternal-household
      designation.
    reason: cultural_note
  - marker: c
    text: Some render the name 'Ziza' due to textual or transliteration variation.
    reason: alternative_reading
  - marker: d
    text: '''Eber'' may also be rendered ''Heber'' in English tradition.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲחֵיהֶם
  chosen: And their brothers
  alternatives:
  - And their kinsmen
  lexicon: HALOT
  rationale: The noun means 'brothers' and in genealogical contexts can extend to
    clan-relatives. 'Brothers' preserves the Hebrew wording and familial structure,
    while the broader sense is possible from context.
- source_word: לְבֵית אֲבוֹתֵיהֶם
  chosen: according to their fathers’ houses
  alternatives:
  - by their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: This genealogical formula refers to division by paternal households/clans.
    'According to their fathers’ houses' is a clear, fairly formal rendering that
    preserves the social structure without over-paraphrasing.
- source_word: מִיכָאֵל
  chosen: Michael
  rationale: Personal name transliterated by standard English convention.
- source_word: וּמְשֻׁלָּם
  chosen: Meshullam
  rationale: Personal name transliterated by standard English convention.
- source_word: וְשֶׁבַע
  chosen: Sheba
  alternatives:
  - Sheva
  lexicon: HALOT
  rationale: The form here is best taken as a personal name in the list. 'Sheba' follows
    common English transliteration; 'Sheva' is a possible more phonetic alternative.
- source_word: וְיוֹרַי
  chosen: Jorai
  alternatives:
  - Jurai
  rationale: Personal name transliterated conventionally; exact vocalic representation
    in English may vary.
- source_word: וְיַעְכָּן
  chosen: Jachan
  alternatives:
  - Jaakan
  rationale: Personal name transliterated into standard readable English. The consonantal
    form allows slight variation in English representation.
- source_word: וְזִיעַ
  chosen: Zia
  alternatives:
  - Ziza
  rationale: The Masoretic form here supports 'Zia.' Some English traditions differ
    due to textual or transliteration variation, so the alternative is worth preserving.
- source_word: וָעֵבֶר
  chosen: and Eber
  alternatives:
  - and Heber
  rationale: The name is commonly rendered 'Eber' in genealogical contexts, though
    'Heber' is also found in English tradition for the same Hebrew form in some contexts.
- source_word: שִׁבְעָה
  chosen: seven
  lexicon: HALOT
  rationale: Cardinal number summarizing the total number of named individuals in
    the list. The dash before 'seven' in English helps reflect its appositional summary
    force.
