id: 1CH.5.24
reference: 1 Chronicles 5:24
source:
  edition: WLC
  text: וְ/אֵ֖לֶּה רָאשֵׁ֣י בֵית אֲבוֹתָ֑/ם וְ/עֵ֡פֶר וְ/יִשְׁעִ֡י וֶ/אֱלִיאֵ֡ל וְ֠/עַזְרִיאֵל
    וְ/יִרְמְיָ֨ה וְ/הוֹדַוְיָ֜ה וְ/יַחְדִּיאֵ֗ל אֲנָשִׁים֙ גִּבּ֣וֹרֵי חַ֔יִל אַנְשֵׁ֣י
    שֵׁמ֔וֹת רָאשִׁ֖ים לְ/בֵ֥ית אֲבוֹתָֽ/ם־׃
translation:
  text: 'These were the heads of their fathers’ houses: Epher, Ishi, Eliel, Azriel,
    Jeremiah, Hodaviah, and Jahdiel, mighty men of valor, men of renown, heads of
    their fathers’ houses.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the heads of their ancestral houses.' The Hebrew expression refers to
      clan-based family units under a common forefather.
    reason: cultural_note
  - marker: b
    text: Hebrew 'men of names,' that is, men of renown or distinction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: These were
  alternatives:
  - And these were
  - Now these were
  lexicon: HALOT
  rationale: Introduces the list deictically. English idiom prefers 'These were' at
    the head of a genealogical notice; the conjunction is absorbed naturally rather
    than woodenly retained as 'And'.
- source_word: רָאשֵׁי בֵית אֲבוֹתָם
  chosen: the heads of their fathers’ houses
  alternatives:
  - the heads of their ancestral houses
  - the chief men of their family houses
  lexicon: HALOT
  rationale: A standard clan/genealogical expression. 'Fathers’ houses' preserves
    the Hebrew social structure more transparently than flattening to 'families,'
    while still being understandable in context.
- source_word: עֵפֶר
  chosen: Epher
  alternatives:
  - Hepher
  rationale: Personal name transliterated per project philosophy. 'Epher' reflects
    the consonants here more directly than harmonizing to other similar English name
    forms.
- source_word: יִשְׁעִי
  chosen: Ishi
  alternatives:
  - Ishii
  - Jishai
  rationale: Personal name transliterated by standard convention.
- source_word: אֱלִיאֵל
  chosen: Eliel
  rationale: Personal name transliterated by standard convention.
- source_word: עַזְרִיאֵל
  chosen: Azriel
  alternatives:
  - Azareel
  rationale: Personal name transliterated by standard convention; 'Azriel' is the
    most familiar and direct English form.
- source_word: יִרְמְיָה
  chosen: Jeremiah
  alternatives:
  - Jeremiahu
  rationale: Standard English transliteration of the personal name.
- source_word: הוֹדַוְיָה
  chosen: Hodaviah
  alternatives:
  - Hodevah
  - Hodiah
  rationale: Personal name transliterated conservatively from the Hebrew form in this
    verse.
- source_word: יַחְדִּיאֵל
  chosen: Jahdiel
  alternatives:
  - Jachdiel
  - Yachdiel
  rationale: Personal name transliterated by standard convention; 'Jahdiel' is a readable
    English form.
- source_word: אֲנָשִׁים גִּבּוֹרֵי חַיִל
  chosen: mighty men of valor
  alternatives:
  - mighty warriors
  - valiant men
  - men of might
  lexicon: HALOT
  rationale: This stock phrase often denotes proven strength, courage, and military
    capability. 'Mighty men of valor' preserves the traditional force and the masculine
    reference present in the Hebrew.
- source_word: אַנְשֵׁי שֵׁמוֹת
  chosen: men of renown
  alternatives:
  - men of name
  - famous men
  - distinguished men
  lexicon: HALOT
  rationale: Literally 'men of names,' an idiom for notable or famous persons. 'Men
    of renown' is natural English and preserves the honorific sense.
- source_word: רָאשִׁים לְבֵית אֲבוֹתָם
  chosen: heads of their fathers’ houses
  alternatives:
  - chiefs of their ancestral houses
  lexicon: HALOT
  rationale: The phrase repeats the opening idea and is best retained in translation
    rather than collapsed, since the Hebrew intentionally restates their status within
    the clan structure.
