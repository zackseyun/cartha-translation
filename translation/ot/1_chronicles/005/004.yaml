id: 1CH.5.4
reference: 1 Chronicles 5:4
source:
  edition: WLC
  text: בְּנֵ֖י יוֹאֵ֑ל שְׁמַֽעְיָ֥ה בְנ֛/וֹ גּ֥וֹג בְּנ֖/וֹ שִׁמְעִ֥י בְנֽ/וֹ׃
translation:
  text: 'The sons of Joel: Shemaiah his son, Gog his son, Shimei his son.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of Joel.' The Hebrew genealogical formula can sometimes
      denote broader descent, but the repeated 'his son' here supports a direct line.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of בֵּן introducing a genealogy. 'Sons of' is the most
    direct and conventional rendering in genealogical context; 'descendants of' is
    possible in some genealogies but here the following chain of immediate filial
    links favors the more literal 'sons of'.
- source_word: יוֹאֵל
  chosen: Joel
  rationale: Personal name; transliterated according to standard English convention,
    per translation philosophy to transliterate names rather than translate them.
- source_word: שְׁמַעְיָה
  chosen: Shemaiah
  alternatives:
  - Shemayah
  rationale: Personal name; standard English transliteration is retained for readability
    and consistency with common biblical name forms.
- source_word: בְנוֹ
  chosen: his son
  alternatives:
  - son of him
  lexicon: HALOT
  rationale: The noun with 3ms suffix marks direct filial descent in the genealogy.
    English idiom prefers 'his son' after each name.
- source_word: גּוֹג
  chosen: Gog
  rationale: Personal name; transliterated directly. Although the name is notable
    elsewhere, here it functions simply as a genealogical proper name.
- source_word: שִׁמְעִי
  chosen: Shimei
  alternatives:
  - Shimi
  rationale: Personal name; rendered by the standard English biblical form 'Shimei'
    for consistency with established transliteration conventions.
