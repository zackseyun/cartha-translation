id: 1CH.5.40
reference: 1 Chronicles 5:40
source:
  edition: WLC
  text: וַ/עֲזַרְיָה֙ הוֹלִ֣יד אֶת שְׂרָיָ֔ה וּ/שְׂרָיָ֖ה הוֹלִ֥יד אֶת יְהוֹצָדָֽק־־׃
translation:
  text: Azariah fathered Seraiah, and Seraiah fathered Jehozadak.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַ/עֲזַרְיָה
  chosen: Azariah
  alternatives:
  - Azaryah
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the project's policy for names. Standard English convention favors 'Azariah'.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogical contexts denotes causing to be born,
    idiomatically 'fathered' in modern English. 'Begot' is traditional but archaic;
    'became the father of' is more formal but less concise.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent English equivalent; its function
    is reflected in normal English word order.
- source_word: שְׂרָיָה
  chosen: Seraiah
  alternatives:
  - Seraiah
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention as
    'Seraiah'.
- source_word: וּ/שְׂרָיָה
  chosen: and Seraiah
  lexicon: HALOT
  rationale: The prefixed conjunction ו is naturally rendered 'and,' linking the next
    genealogical clause.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: Repeated genealogical verb; rendered consistently with the first occurrence
    for clarity and lexical consistency.
- source_word: יְהוֹצָדָק
  chosen: Jehozadak
  alternatives:
  - Jehozadok
  - Jozadak
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to common English biblical
    convention as 'Jehozadak.'
