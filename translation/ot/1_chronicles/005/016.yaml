id: 1CH.5.16
reference: 1 Chronicles 5:16
source:
  edition: WLC
  text: וַ/יֵּֽשְׁב֛וּ בַּ/גִּלְעָ֥ד בַּ/בָּשָׁ֖ן וּ/בִ/בְנֹתֶ֑י/הָ וּ/בְ/כָֽל מִגְרְשֵׁ֥י
    שָׁר֖וֹן עַל תּוֹצְאוֹתָֽ/ם־־׃
translation:
  text: They lived in Gilead, in Bashan and its towns, and in all the pasturelands
    of Sharon, as far as their borders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'its daughters,' a Hebrew idiom for dependent towns or villages.
    reason: lexical_alternative
  - marker: b
    text: Or 'open lands' or 'common lands' of Sharon.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'upon their goings out'; that is, to their outer limits or borders.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  chosen: They lived
  alternatives:
  - They dwelt
  - They settled
  lexicon: HALOT
  rationale: The verb ישב commonly denotes dwelling or residing. 'Lived' is natural
    modern English and fits the geographic notice; 'dwelt' is more formal/archaic,
    and 'settled' may overemphasize initial establishment rather than ongoing residence.
- source_word: בַּגִּלְעָד
  chosen: in Gilead
  lexicon: HALOT
  rationale: Proper place name; transliterated according to standard convention.
- source_word: בַּבָּשָׁן
  chosen: in Bashan
  lexicon: HALOT
  rationale: Proper place name; transliterated according to standard convention.
- source_word: וּבִבְנֹתֶיהָ
  chosen: and its towns
  alternatives:
  - and its daughter towns
  - and its villages
  lexicon: HALOT
  rationale: Literally 'and its daughters,' an idiom for dependent towns/settlements
    associated with a main city or region. 'Its towns' communicates the idiomatic
    sense clearly in modern English. The feminine singular suffix most naturally refers
    back to Bashan as the nearest antecedent.
- source_word: וּבְכָל
  chosen: and in all
  alternatives:
  - and throughout all
  lexicon: HALOT
  rationale: Retains the distributive force of the preposition with כל while reading
    smoothly in English.
- source_word: מִגְרְשֵׁי
  chosen: the pasturelands of
  alternatives:
  - the open lands of
  - the common lands of
  lexicon: HALOT
  rationale: מִגְרָשׁ often refers to open land or pastureland around settlements.
    'Pasturelands' best fits the tribal-territorial context and common usage in Chronicles.
- source_word: שָׁרוֹן
  chosen: Sharon
  lexicon: HALOT
  rationale: Proper regional name; transliterated rather than translated.
- source_word: עַל תּוֹצְאוֹתָם
  chosen: as far as their borders
  alternatives:
  - to their outskirts
  - up to their limits
  - according to their goings out
  lexicon: HALOT
  rationale: The phrase is idiomatic and spatial, referring to extent or outer limits.
    'As far as their borders' gives clear English sense in a territorial description.
    The 3mp suffix likely refers to the pasturelands/settlements just mentioned, indicating
    their full extent.
