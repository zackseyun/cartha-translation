  from: prostituted themselves after
  to: prostituted themselves to
  rationale: In English, the reflexive verb phrase 'prostituted themselves' naturally
    pairs with the preposition 'to' rather than 'after.' While 'whored after' or 'played
    the prostitute after' works well with 'after' to reflect the Hebrew idiom of pursuit
    (אַחֲרֵי), 'prostituted themselves after' creates a slightly awkward mixed idiom.
