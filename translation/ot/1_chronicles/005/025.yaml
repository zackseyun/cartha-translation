theological_decisions:
- issue: Retention of the sexual metaphor for idolatry
  chosen_reading: prostituted themselves after the gods
  alternative_readings:
  - were unfaithful to the gods
  - went after the gods
  rationale: The Hebrew deliberately uses sexualized covenant language for idolatry.
    Preserving the metaphor maintains the theological force of Israel's breach of
    covenant rather than flattening it into generic disobedience.
  doctrine_reference: Translation philosophy §3, §6
- issue: Rendering אֱלֹהִים here as 'God' rather than 'gods' in the relative clause
  chosen_reading: whom God had destroyed before them
  alternative_readings:
  - whom gods had destroyed before them
  rationale: Although אֱלֹהִים is morphologically plural, the singular verb הִשְׁמִיד
    marks the referent as the one true God. The English should reflect the singular
    sense unambiguously.
