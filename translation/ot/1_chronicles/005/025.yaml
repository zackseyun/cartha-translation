id: 1CH.5.25
reference: 1 Chronicles 5:25
source:
  edition: WLC
  text: וַ/יִּֽמְעֲל֔וּ בֵּ/אלֹהֵ֖י אֲבוֹתֵי/הֶ֑ם וַ/יִּזְנ֗וּ אַחֲרֵי֙ אֱלֹהֵ֣י עַמֵּי
    הָ/אָ֔רֶץ אֲשֶׁר הִשְׁמִ֥יד אֱלֹהִ֖ים מִ/פְּנֵי/הֶֽם־־׃
translation:
  text: But they acted unfaithfully against the God of their fathers and prostituted
    themselves after the gods of the peoples of the land, whom God had destroyed before
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'played the prostitute after' or 'went whoring after.' The Hebrew uses
      a sexual metaphor for idolatry and covenant unfaithfulness.
    reason: lexical_alternative
  - marker: b
    text: Or 'prostituted themselves after'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּמְעֲלוּ
  chosen: acted unfaithfully
  alternatives:
  - were treacherous
  - broke faith
  - trespassed
  lexicon: HALOT
  rationale: מעל commonly denotes acting unfaithfully or committing a breach of faith,
    especially in covenantal/religious contexts. 'Acted unfaithfully' preserves the
    covenantal sense better than the older 'trespassed' and is more natural than 'were
    treacherous' here.
- source_word: בֵּאלֹהֵי אֲבוֹתֵיהֶם
  chosen: against the God of their fathers
  alternatives:
  - with the God of their fathers
  lexicon: HALOT
  rationale: The preposition ב with מעל regularly marks the party against whom unfaithfulness
    is committed. 'Against the God of their fathers' makes the relational breach explicit
    in idiomatic English.
- source_word: וַיִּזְנוּ
  chosen: prostituted themselves
  alternatives:
  - played the prostitute
  - whored
  - were unfaithful
  lexicon: HALOT
  rationale: זנה is a standard prophetic/covenantal metaphor for spiritual infidelity
    through idolatry. 'Prostituted themselves' preserves the force of the metaphor
    without archaic phrasing like 'went a-whoring.'
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: 'In idiom with זנה, ''after'' is the standard and concise rendering:
    they prostituted themselves after other gods.'
- source_word: אֱלֹהֵי עַמֵּי הָאָרֶץ
  chosen: the gods of the peoples of the land
  alternatives:
  - the gods of the peoples of the הארץ
  - the gods of the nations of the land
  lexicon: HALOT
  rationale: The plural construct chain is best represented straightforwardly. 'Peoples'
    reflects עַמֵּי more closely than 'nations' in this local context.
- source_word: אֲשֶׁר הִשְׁמִיד אֱלֹהִים מִפְּנֵיהֶם
  chosen: whom God had destroyed before them
  alternatives:
  - which God had destroyed from before them
  - whom God destroyed before them
  lexicon: HALOT
  rationale: The relative clause refers back to the peoples of the land; in English,
    'whom' fits the personal antecedent. The Hiphil of שׁמד is causative/destructive;
    'had destroyed' conveys prior action relative to Israel's apostasy. 'Before them'
    is the idiomatic rendering of מִפְּנֵיהֶם in this context.
