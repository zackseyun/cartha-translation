id: 1CH.5.5
reference: 1 Chronicles 5:5
source:
  edition: WLC
  text: מִיכָ֥ה בְנ֛/וֹ רְאָיָ֥ה בְנ֖/וֹ בַּ֥עַל בְּנֽ/וֹ׃
translation:
  text: Micah his son, Reaiah his son, Baal his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Baal' is here a personal name in the genealogy, not a title translated
      as 'lord.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִיכָה
  chosen: Micah
  alternatives:
  - Mica
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention.
    'Micah' is the familiar and natural English form for this Hebrew name.
- source_word: בְנֹו
  chosen: his son
  alternatives:
  - son of him
  - his descendant
  lexicon: HALOT
  rationale: The construct noun with 3ms suffix literally means 'his son.' In this
    genealogical chain, the repeated formula marks direct filial succession, so 'his
    son' is the clearest and most natural rendering.
- source_word: רְאָיָה
  chosen: Reaiah
  alternatives:
  - Reayah
  - Raiah
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated. 'Reaiah'
    reflects a standard English transliteration and fits the genealogical context.
- source_word: בַּעַל
  chosen: Baal
  alternatives:
  - Baal (personal name retained, not title)
  lexicon: HALOT
  rationale: Here the form is a personal name in a genealogy, not necessarily a reference
    to the deity as such. Following the translation philosophy, personal names are
    transliterated. Rendering it as 'Baal' preserves the Hebrew form without importing
    theological judgment beyond the text.
