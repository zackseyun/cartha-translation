theological_decisions:
- issue: Whether בַּעַל should be translated as a title/deity reference or retained
    as a personal name
  chosen_reading: Retained as the personal name 'Baal'
  alternative_readings:
  - Rendered as a title such as 'lord'
  rationale: In this verse the word appears in a genealogical list alongside other
    proper names and is best understood as a personal name. Translating it as 'lord'
    would obscure the genre and syntax of the passage and import a meaning not demanded
    by the text.
  doctrine_reference: Translate titles; transliterate names.
