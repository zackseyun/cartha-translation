theological_decisions:
- issue: Agency of the help in battle
  chosen_reading: The passive 'They were helped' leaves the immediate agent implicit
    in the clause while the following causal clauses make clear that God is the ultimate
    helper.
  alternative_readings:
  - They helped them
  - God helped them against their enemies
  rationale: The Hebrew verb form is passive, so the translation should not convert
    it into an active clause without warrant. At the same time, the verse itself explains
    that the help came in response to prayer and trust in God, so the theology of
    divine aid is preserved without over-specifying the syntax.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering of divine response to prayer
  chosen_reading: '''He answered their plea'''
  alternative_readings:
  - '''He was entreated by them'''
  - '''He let himself be found by them'''
  rationale: The Hebrew emphasizes God's favorable response to supplication. The chosen
    rendering communicates that response clearly in modern English while preserving
    the theological link between prayer, trust, and divine action.
  doctrine_reference: Translation philosophy §§3, 6
