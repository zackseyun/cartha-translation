id: 1CH.5.20
reference: 1 Chronicles 5:20
source:
  edition: WLC
  text: וַ/יֵּעָזְר֣וּ עֲלֵי/הֶ֔ם וַ/יִּנָּתְנ֤וּ בְ/יָדָ/ם֙ הַֽ/הַגְרִיאִ֔ים וְ/כֹ֖ל
    שֶׁ֣/עִמָּ/הֶ֑ם כִּ֠י לֵ/אלֹהִ֤ים זָעֲקוּ֙ בַּ/מִּלְחָמָ֔ה וְ/נַעְתּ֥וֹר לָ/הֶ֖ם
    כִּי בָ֥טְחוּ בֽ/וֹ־׃
translation:
  text: They were helped against them, and the Hagrites and all who were with them
    were given into their hand, because they cried out to God in the battle, and he
    answered their plea because they trusted in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Hagarites.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'were given into their hand,' an idiom for being delivered over in
      defeat.
    reason: lexical_alternative
  - marker: c
    text: Or 'he was entreated by them,' that is, God responded favorably to their
      prayer.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּעָזְרוּ עֲלֵיהֶם
  chosen: They were helped against them
  alternatives:
  - Help was given against them
  - They received help against them
  lexicon: HALOT
  rationale: The Niphal of עזר here is best rendered as passive ('were helped') rather
    than active ('they helped'), matching the morphology and the battle context of
    divine aid in the preceding verse.
- source_word: וַיִּנָּתְנוּ בְיָדָם
  chosen: were given into their hand
  alternatives:
  - were delivered into their hand
  - were handed over to them
  lexicon: HALOT
  rationale: The passive of נתן with ביד is a standard idiom for military defeat and
    transfer of power. 'Given into their hand' preserves the Hebrew imagery while
    remaining natural enough in English.
- source_word: הַהַגְרִיאִים
  chosen: the Hagrites
  alternatives:
  - the Hagarites
  lexicon: HALOT
  rationale: A standard transliteration of the people-group name is appropriate under
    the policy to transliterate names. 'Hagrites' is concise and recognizable; 'Hagarites'
    is a viable alternative preserved in a footnote.
- source_word: וְכֹל שֶׁעִמָּהֶם
  chosen: and all who were with them
  alternatives:
  - and everyone with them
  - and all that were with them
  lexicon: HALOT
  rationale: This refers to the Hagrites' allies or accompanying forces. 'All who
    were with them' is clear, personal, and fits the military setting.
- source_word: כִּי לֵאלֹהִים זָעֲקוּ
  chosen: because they cried out to God
  alternatives:
  - for they cried out to God
  - because they called on God for help
  lexicon: HALOT
  rationale: זעק conveys a desperate cry for help. 'Cried out to God' preserves both
    the urgency and the direction of the appeal.
- source_word: בַּמִּלְחָמָה
  chosen: in the battle
  alternatives:
  - in war
  - during the battle
  lexicon: HALOT
  rationale: The definite article points to the specific conflict just narrated. 'In
    the battle' is more contextually precise than the broader 'in war.'
- source_word: וְנַעְתּוֹר לָהֶם
  chosen: and he answered their plea
  alternatives:
  - and he was entreated by them
  - and he responded to their prayer
  lexicon: HALOT
  rationale: עתר in the Niphal commonly means to allow oneself to be entreated or
    to respond favorably to prayer. 'He answered their plea' communicates the result
    in idiomatic modern English without losing the prayer context.
- source_word: כִּי בָטְחוּ בוֹ
  chosen: because they trusted in him
  alternatives:
  - because they put their trust in him
  - because they relied on him
  lexicon: HALOT
  rationale: בטח ב expresses reliance or trust. 'Trusted in him' is a natural and
    theologically transparent rendering that preserves the causal connection to God's
    favorable answer.
