id: 1CH.5.8
reference: 1 Chronicles 5:8
source:
  edition: WLC
  text: וּ/בֶ֨לַע֙ בֶּן עָזָ֔ז בֶּן שֶׁ֖מַע בֶּן יוֹאֵ֑ל ה֚וּא יוֹשֵׁ֣ב בַּ/עֲרֹעֵ֔ר
    וְ/עַד נְב֖וֹ וּ/בַ֥עַל מְעֽוֹן־־־־׃
translation:
  text: and Bela son of Azaz, son of Shema, son of Joel; he lived in Aroer, as far
    as Nebo and Baal-meon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "dwelt" for "lived"; the Hebrew participle denotes residing in a place.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בֶלַע
  chosen: and Bela
  alternatives:
  - Now Bela
  - Bela
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered as "and" to preserve the genealogical/list
    continuity from the preceding verse. The personal name בלע is transliterated as
    "Bela" per the policy to transliterate names.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In a genealogy, בן normally marks immediate or lineal descent. "Son of"
    preserves the formal genealogical structure; while "descendant of" is possible
    in some genealogies, nothing here requires weakening the relation.
- source_word: עָזָז
  chosen: Azaz
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: שֶׁמַע
  chosen: Shema
  lexicon: HALOT
  rationale: Proper name transliterated rather than translated.
- source_word: יוֹאֵל
  chosen: Joel
  lexicon: HALOT
  rationale: Proper name transliterated by established English convention.
- source_word: הוּא
  chosen: he
  alternatives:
  - this one
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis/resumption after the genealogy.
    English naturally renders this as "he" before the participle.
- source_word: יוֹשֵׁב
  chosen: lived
  alternatives:
  - dwelt
  - was living
  - inhabited
  lexicon: HALOT
  rationale: The Qal participle of ישׁב denotes dwelling/residing. "Lived" is idiomatic
    modern English and fits the chronicler's notice of settlement without sounding
    archaic like "dwelt."
- source_word: בַּ/עֲרֹעֵר
  chosen: in Aroer
  alternatives:
  - at Aroer
  lexicon: HALOT
  rationale: The preposition ב marks location. "In Aroer" is the most natural English
    rendering for residence in a town.
- source_word: וְ/עַד
  chosen: as far as
  alternatives:
  - and as far as
  - up to
  lexicon: HALOT
  rationale: The phrase marks the extent of the inhabited territory from Aroer to
    the following place names. "As far as" communicates geographic range clearly in
    English.
- source_word: נְבוֹ
  chosen: Nebo
  lexicon: HALOT
  rationale: Place name transliterated.
- source_word: וּ/בַעַל מְעוֹן
  chosen: and Baal-meon
  alternatives:
  - to Baal-meon
  - and Baal Meon
  lexicon: HALOT
  rationale: 'This is a place name, conventionally represented as the compound "Baal-meon."
    The prefixed conjunction is retained as "and" because the verse lists the territorial
    extent through coordinated place names: "as far as Nebo and Baal-meon."'
