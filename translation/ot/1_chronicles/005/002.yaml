id: 1CH.5.2
reference: 1 Chronicles 5:2
source:
  edition: WLC
  text: כִּ֤י יְהוּדָה֙ גָּבַ֣ר בְּ/אֶחָ֔י/ו וּ/לְ/נָגִ֖יד מִמֶּ֑/נּוּ וְ/הַ/בְּכֹרָ֖ה
    לְ/יוֹסֵֽף׃ס
translation:
  text: For Judah prevailed over his brothers, and from him came the ruler, though
    the birthright belonged to Joseph.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leader' or 'prince' for 'the ruler.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding statement about Reuben's
    genealogy and loss of status. 'For' fits the discourse connection in English better
    than the more causal-sounding 'because' here.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Proper tribal/personal name; transliterated per translation philosophy.
- source_word: גָּבַר
  chosen: prevailed
  alternatives:
  - was strong
  - became mighty
  - was superior
  lexicon: HALOT
  rationale: The verb denotes being strong or prevailing. 'Prevailed' captures the
    comparative sense in context with בְּאֶחָיו ('over his brothers') and explains
    Judah's ascendancy among the tribes.
- source_word: בְּאֶחָיו
  chosen: over his brothers
  alternatives:
  - among his brothers
  - against his brothers
  lexicon: HALOT
  rationale: With גבר, the preposition conveys superiority in relation to the brothers.
    'Over his brothers' best expresses Judah's prominence. 'Brothers' is retained
    as gender-accurate and contextually refers to the brother tribes/sons of Israel.
- source_word: וּלְנָגִיד
  chosen: and ... came the ruler
  alternatives:
  - and for a ruler
  - and as leader
  - and to be prince
  lexicon: HALOT
  rationale: נָגִיד commonly means leader, ruler, or prince. In this context it refers
    to the emergence of tribal rulership from Judah, likely dynastic leadership. Rendering
    the phrase idiomatically with 'came the ruler' makes good English while preserving
    the sense of origin from Judah.
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - from Judah
  - from among them
  lexicon: HALOT
  rationale: The pronominal suffix is singular and most naturally refers back to Judah.
    'From him' preserves the Hebrew form; the antecedent is clear in context.
- source_word: וְהַבְּכֹרָה
  chosen: though the birthright belonged to
  alternatives:
  - but the birthright was
  - and the birthright belonged to
  lexicon: HALOT
  rationale: הַבְּכֹרָה is the right/status of the firstborn. The conjunction here
    marks contrast between Judah's ascendancy and Joseph's possession of the firstborn
    right. 'Though' brings out that contrast naturally in English without overstating
    it.
- source_word: לְיוֹסֵף
  chosen: Joseph
  lexicon: HALOT
  rationale: Proper name; transliterated. The lamed marks possession/direction here,
    hence 'belonged to Joseph'.
