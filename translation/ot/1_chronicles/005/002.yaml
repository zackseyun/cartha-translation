theological_decisions:
- issue: Relation between Judah's prominence and Joseph's birthright
  chosen_reading: The verse distinguishes tribal supremacy/rulership for Judah from
    the legal firstborn status assigned to Joseph.
  alternative_readings:
  - The verse could be read more loosely as saying Judah became strongest while Joseph
    retained inheritance privileges.
  rationale: The Hebrew juxtaposes Judah's prevailing and the emergence of a נָגִיד
    from him with the statement that the בכרה belonged to Joseph. The translation
    preserves this tension rather than collapsing both privileges into one category.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
