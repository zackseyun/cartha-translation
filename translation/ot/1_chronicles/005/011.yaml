id: 1CH.5.11
reference: 1 Chronicles 5:11
source:
  edition: WLC
  text: וּ/בְנֵי גָ֣ד לְ/נֶגְדָּ֗/ם יָֽשְׁב֛וּ בְּ/אֶ֥רֶץ הַ/בָּשָׁ֖ן עַד סַלְכָֽה־־׃
translation:
  text: And the sons of Gad lived opposite them in the land of Bashan, as far as Salecah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “next to them” or “facing them”; the Hebrew expression indicates relative
      position with respect to the group mentioned previously.
    reason: lexical_alternative
  - marker: b
    text: Salecah is also rendered “Salkah” in some translations.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - And the descendants of
  - Now the sons of
  lexicon: HALOT
  rationale: בני literally means 'sons of,' but in genealogical/tribal contexts can
    denote descendants. Here, because the phrase identifies the tribal group of Gad
    in parallel with surrounding tribal notices, 'sons of' preserves the Hebrew form
    while remaining natural English.
- source_word: גָד
  chosen: Gad
  lexicon: HALOT
  rationale: Proper tribal/personal name; transliterated per translation philosophy.
- source_word: לְ/נֶגְדָּ/ם
  chosen: opposite them
  alternatives:
  - next to them
  - before them
  - facing them
  lexicon: HALOT
  rationale: נגד with pronominal suffix indicates position in front of or opposite
    someone/something. In this territorial context it denotes relative location with
    respect to the Reubenites mentioned in the preceding verse. 'Opposite them' is
    a transparent rendering that preserves the spatial sense without over-interpreting
    the exact geography.
- source_word: יָשְׁבוּ
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: ישב commonly means dwell, sit, or inhabit. In a territorial settlement
    notice, 'lived' is idiomatic modern English; 'dwelt' is more formal/archaic, and
    'settled' could imply the act of settling rather than ongoing residence.
- source_word: בְּ/אֶרֶץ
  chosen: in the land of
  alternatives:
  - in the territory of
  lexicon: HALOT
  rationale: ארץ here denotes a region/land rather than the earth in general. 'Land
    of' is the standard natural rendering for a named region.
- source_word: הַ/בָּשָׁן
  chosen: Bashan
  lexicon: HALOT
  rationale: Proper place name; transliterated.
- source_word: עַד
  chosen: as far as
  alternatives:
  - up to
  - until
  lexicon: HALOT
  rationale: In geographic boundary language, עד marks extent. 'As far as' best conveys
    territorial reach in idiomatic English.
- source_word: סַלְכָה
  chosen: Salecah
  alternatives:
  - Salkah
  lexicon: HALOT
  rationale: Proper place name. The Hebrew samekh + lamed + qamets-he is commonly
    represented as 'Salecah' in many English Bible traditions, though 'Salkah' is
    also possible as a closer transliteration. The chosen form is recognizable and
    natural in English Bible geography.
