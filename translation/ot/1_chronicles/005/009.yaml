id: 1CH.5.9
reference: 1 Chronicles 5:9
source:
  edition: WLC
  text: וְ/לַ/מִּזְרָ֗ח יָשַׁב֙ עַד לְ/ב֣וֹא מִדְבָּ֔רָ/ה לְ/מִן הַ/נָּהָ֖ר פְּרָ֑ת
    כִּ֧י מִקְנֵי/הֶ֛ם רָב֖וּ בְּ/אֶ֥רֶץ גִּלְעָֽד־־׃
translation:
  text: To the east he settled as far as the entrance to the wilderness, from the
    river Euphrates, because their livestock had multiplied in the land of Gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as far as the wilderness from the river Euphrates.' The Hebrew boundary
      description is compressed and may be understood in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: וְלַמִּזְרָח
  chosen: To the east
  alternatives:
  - eastward
  - and to the east
  lexicon: HALOT
  rationale: The prefixed conjunction with directional noun marks spatial orientation.
    English omits an explicit 'and' for smoother style since the verse begins a new
    clause, while preserving the directional sense.
- source_word: יָשַׁב
  chosen: he settled
  alternatives:
  - he dwelt
  - he lived
  lexicon: HALOT
  rationale: The singular verb refers collectively to the clan through its ancestor/tribal
    representative. 'Settled' fits territorial occupation in context better than the
    more static 'dwelt'.
- source_word: עַד לְבוֹא מִדְבָּרָה
  chosen: as far as the entrance to the wilderness
  alternatives:
  - as far as the approach to the wilderness
  - up to the wilderness
  lexicon: HALOT
  rationale: The idiom עַד + לְבוֹא expresses extent 'as far as the entrance/approach
    of.' Retaining 'entrance' preserves the concrete boundary sense better than flattening
    to simply 'to the wilderness'.
- source_word: לְמִן הַנָּהָר פְּרָת
  chosen: from the river Euphrates
  alternatives:
  - from the Euphrates River
  - toward the river Euphrates
  lexicon: HALOT
  rationale: The phrase is difficult syntactically after 'wilderness.' The compound
    prepositional expression is best taken as marking the region extending from the
    Euphrates side. 'From the river Euphrates' is a close rendering of the Hebrew
    wording while remaining intelligible.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the eastward expansion. 'Because' is clearer
    in modern English than the more formal 'for'.
- source_word: מִקְנֵיהֶם
  chosen: their livestock
  alternatives:
  - their cattle
  - their herds
  lexicon: HALOT
  rationale: מִקְנֶה denotes possessions in animals broadly, not only bovines. 'Livestock'
    is the most accurate modern collective term.
- source_word: רָבוּ
  chosen: had multiplied
  alternatives:
  - became numerous
  - increased
  lexicon: HALOT
  rationale: The verb indicates numerical increase. The pluperfect-like English 'had
    multiplied' fits the causal sense explaining prior expansion.
- source_word: בְּאֶרֶץ גִּלְעָד
  chosen: in the land of Gilead
  alternatives:
  - in Gilead
  - in the territory of Gilead
  lexicon: HALOT
  rationale: אֶרֶץ here denotes territory/land. The fuller phrase preserves the geographic
    sense of the Hebrew.
