id: 1CH.5.38
reference: 1 Chronicles 5:38
source:
  edition: WLC
  text: וַ/אֲחִיטוּב֙ הוֹלִ֣יד אֶת צָד֔וֹק וְ/צָד֖וֹק הוֹלִ֥יד אֶת שַׁלּֽוּם־־׃
translation:
  text: Ahitub fathered Zadok, and Zadok fathered Shallum.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַ/אֲחִיטוּב
  chosen: Ahitub
  lexicon: HALOT
  rationale: Proper personal name; per translation philosophy, names are transliterated
    rather than translated. The prefixed conjunction is carried by the English sentence
    structure rather than separately rendered as 'and Ahitub' at the start.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogical contexts means 'to father, beget.'
    'Fathered' is concise, natural modern English, and preserves the genealogical
    sense better than the more archaic 'begot.'
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent English equivalent; its function
    is represented by English word order.
- source_word: צָדוֹק
  chosen: Zadok
  lexicon: HALOT
  rationale: Proper personal name, transliterated by standard convention.
- source_word: וְ/צָדוֹק
  chosen: and Zadok
  lexicon: HALOT
  rationale: The conjunction ו is naturally rendered as 'and,' linking the next generation
    in the genealogy.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: Repeated genealogical verb; rendered consistently with the first occurrence
    for clarity and lexical consistency.
- source_word: שַׁלּוּם
  chosen: Shallum
  lexicon: HALOT
  rationale: Proper personal name, transliterated by standard convention.
