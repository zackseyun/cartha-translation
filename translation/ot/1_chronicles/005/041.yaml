theological_decisions:
- issue: Divine and human agency in the exile
  chosen_reading: The LORD is presented as the one who sent Judah and Jerusalem into
    exile, and Nebuchadnezzar as the instrumental agent.
  alternative_readings:
  - Nebuchadnezzar alone as the effective subject of the exile event
  rationale: The syntax places YHWH as subject of the infinitive clause and uses 'by
    the hand of Nebuchadnezzar' to mark secondary agency. The translation preserves
    this theological emphasis without diminishing the historical role of Babylon.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
