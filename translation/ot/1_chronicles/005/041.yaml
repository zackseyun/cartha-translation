id: 1CH.5.41
reference: 1 Chronicles 5:41
source:
  edition: WLC
  text: וִ/יהוֹצָדָ֣ק הָלַ֔ךְ בְּ/הַגְל֣וֹת יְהוָ֔ה אֶת יְהוּדָ֖ה וִ/ירוּשָׁלִָ֑ם
    בְּ/יַ֖ד נְבֻכַדְנֶאצַּֽר־׃ס
translation:
  text: And Jehozadak went away when the LORD sent Judah and Jerusalem into exile
    by the hand of Nebuchadnezzar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And Jehozadak went when the LORD exiled Judah and Jerusalem
      by the hand of Nebuchadnezzar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִ/יהוֹצָדָק
  chosen: And Jehozadak
  alternatives:
  - And Jozadak
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention. The prefixed
    conjunction is carried as 'And.' 'Jehozadak' preserves the fuller Hebrew form
    better than the shortened 'Jozadak.'
- source_word: הָלַךְ
  chosen: went away
  alternatives:
  - went
  - departed
  lexicon: HALOT
  rationale: הלך commonly means 'go/walk,' but in this context of deportation/exile,
    'went away' communicates movement from the land without overstating that he personally
    led or initiated the action. 'Departed' is possible but slightly more formal.
- source_word: בְּ/הַגְל֣וֹת
  chosen: when ... sent ... into exile
  alternatives:
  - at the exile of
  - when ... exiled
  - in the carrying away of
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive construct of גלה is temporal here:
    ''when exiling/when ... sent into exile.'' English idiom prefers an explicit finite
    verb with object, so ''when the LORD sent ... into exile'' is a natural optimal-equivalence
    rendering.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֶת יְהוּדָה וִ/ירוּשָׁלָם
  chosen: Judah and Jerusalem
  alternatives:
  - the people of Judah and Jerusalem
  lexicon: HALOT
  rationale: The direct object marker introduces the paired objects 'Judah and Jerusalem.'
    The text names the kingdom/territory and city directly; adding 'people of' would
    interpret beyond the wording.
- source_word: בְּ/יַד
  chosen: by the hand of
  alternatives:
  - through
  - by means of
  lexicon: HALOT
  rationale: This Hebrew idiom denotes agency or instrumentality. 'By the hand of'
    preserves the biblical idiom clearly in English; it also identifies Nebuchadnezzar
    as the human agent under the LORD's action.
- source_word: נְבֻכַדְנֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: Standard English transliteration for the Babylonian king's name.
