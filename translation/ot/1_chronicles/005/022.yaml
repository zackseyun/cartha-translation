id: 1CH.5.22
reference: 1 Chronicles 5:22
source:
  edition: WLC
  text: כִּֽי חֲלָלִ֤ים רַבִּים֙ נָפָ֔לוּ כִּ֥י מֵ/הָ/אֱלֹהִ֖ים הַ/מִּלְחָמָ֑ה וַ/יֵּשְׁב֥וּ
    תַחְתֵּי/הֶ֖ם עַד הַ/גֹּלָֽה־־׃פ
translation:
  text: For many slain fell, because the battle was from God; and they lived in their
    place until the exile.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'because the battle belonged to God.' The Hebrew phrase emphasizes that
      the battle's outcome came from God.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: The first כִּי introduces an explanation of the previous victory report,
    so 'For' fits natural English while preserving the causal sense.
- source_word: חֲלָלִים רַבִּים
  chosen: many slain
  alternatives:
  - many casualties
  - many were killed
  lexicon: HALOT
  rationale: חֲלָלִים denotes those pierced or slain in battle, not merely generic
    dead. 'Many slain' preserves the martial sense and keeps the nominal construction
    concise.
- source_word: נָפָלוּ
  chosen: fell
  alternatives:
  - were struck down
  - fell dead
  lexicon: HALOT
  rationale: נפל is commonly used in battle contexts for falling in death. 'Fell'
    is idiomatic and lets the preceding 'slain' carry the death sense without overtranslating.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: The second כִּי gives the reason for the heavy losses, so 'because' makes
    the causal relation explicit in modern English.
- source_word: מֵהָאֱלֹהִים
  chosen: from God
  alternatives:
  - of God
  - by God
  lexicon: HALOT
  rationale: The preposition מִן here indicates source or origin. 'From God' best
    reflects that the battle's decisive character originated with God, without overstating
    direct agency beyond the Hebrew.
- source_word: הַמִּלְחָמָה
  chosen: the battle
  alternatives:
  - the war
  - the fighting
  lexicon: HALOT
  rationale: מִלְחָמָה here refers to the military conflict just described. 'Battle'
    is the most natural singular rendering in context.
- source_word: וַיֵּשְׁבוּ
  chosen: they lived
  alternatives:
  - they dwelt
  - they settled
  lexicon: HALOT
  rationale: ישב can mean dwell, settle, or live. In context of occupying conquered
    territory, 'lived' is readable modern English, though the settlement nuance is
    preserved by the following phrase.
- source_word: תַחְתֵּיהֶם
  chosen: in their place
  alternatives:
  - in their stead
  - under them
  lexicon: HALOT
  rationale: The idiom means taking the place of the defeated inhabitants, not spatially
    'under them.' 'In their place' clearly conveys replacement occupancy.
- source_word: עַד הַגֹּלָה
  chosen: until the exile
  alternatives:
  - until the deportation
  lexicon: HALOT
  rationale: גּוֹלָה refers to the exile/deportation of the tribes. 'Exile' is the
    standard concise rendering and fits the historical reference.
