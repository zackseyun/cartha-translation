theological_decisions:
- issue: Divine involvement in warfare
  chosen_reading: because the battle was from God
  alternative_readings:
  - because God gave the battle
  - because the battle belonged to God
  rationale: The Hebrew explicitly grounds the battle's outcome in God as its source.
    The translation preserves that claim without expanding it into a fuller theology
    of holy war beyond the verse itself.
  doctrine_reference: Translation philosophy §1, §3
