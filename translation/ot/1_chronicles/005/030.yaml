id: 1CH.5.30
reference: 1 Chronicles 5:30
source:
  edition: WLC
  text: אֶלְעָזָר֙ הוֹלִ֣יד אֶת פִּֽינְחָ֔ס פִּֽינְחָ֖ס הֹלִ֥יד אֶת אֲבִישֽׁוּעַ־־׃
translation:
  text: Eleazar fathered Phinehas; Phinehas fathered Abishua.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֶלְעָזָר
  chosen: Eleazar
  alternatives:
  - Eleasar
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention rather
    than translated.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: Hiphil of ילד in genealogical context denotes direct begetting/ancestry.
    'Fathered' is natural modern English and preserves the genealogical force better
    than archaic 'begot'.
- source_word: אֶת
  chosen: '[not translated separately]'
  lexicon: HALOT
  rationale: Direct-object marker with no standalone English equivalent; its function
    is represented by English word order.
- source_word: פִּינְחָס
  chosen: Phinehas
  alternatives:
  - Phinhas
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard biblical English convention.
- source_word: פִּינְחָס
  chosen: Phinehas
  alternatives:
  - Phinhas
  lexicon: HALOT
  rationale: Repeated proper name retained consistently in the second clause for genealogical
    succession.
- source_word: הֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: Same verb and same genealogical usage as earlier in the verse; rendered
    consistently.
- source_word: אֶת
  chosen: '[not translated separately]'
  lexicon: HALOT
  rationale: Direct-object marker with no standalone English equivalent; omitted in
    idiomatic English.
- source_word: אֲבִישׁוּעַ
  chosen: Abishua
  alternatives:
  - Abishuah
  lexicon: HALOT
  rationale: Proper personal name; transliterated in a familiar English form.
