id: 1CH.5.35
reference: 1 Chronicles 5:35
source:
  edition: WLC
  text: וַ/אֲחִימַ֨עַץ֙ הוֹלִ֣יד אֶת עֲזַרְיָ֔ה וַ/עֲזַרְיָ֖ה הוֹלִ֥יד אֶת יוֹחָנָֽן־־׃
translation:
  text: Ahimaaz fathered Azariah, and Azariah fathered Johanan.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַ/אֲחִימַעַץ
  chosen: Ahimaaz
  alternatives:
  - Ahimaats
  lexicon: HALOT
  rationale: Proper personal name; per translation philosophy, names are transliterated
    rather than translated. Standard English biblical form is 'Ahimaaz.' The prefixed
    conjunction is carried by English sentence flow rather than separately rendered
    as 'and' at the start.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogical contexts means to beget or father.
    'Fathered' is concise, natural modern English, and preserves the genealogical
    sense better than archaic 'begot.'
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: Hebrew grammar
  rationale: Direct-object marker with no independent English equivalent; its function
    is represented by English word order.
- source_word: עֲזַרְיָה
  chosen: Azariah
  lexicon: HALOT
  rationale: Proper personal name, transliterated by standard convention.
- source_word: וַ/עֲזַרְיָה
  chosen: and Azariah
  lexicon: HALOT
  rationale: The prefixed conjunction here is naturally rendered with 'and' to link
    the next genealogical clause.
- source_word: יוֹחָנָן
  chosen: Johanan
  alternatives:
  - Jehohanan
  lexicon: HALOT
  rationale: Proper personal name, transliterated by standard convention. 'Johanan'
    is the usual English form for this Hebrew name in genealogical contexts.
