id: 1CH.5.12
reference: 1 Chronicles 5:12
source:
  edition: WLC
  text: יוֹאֵ֣ל הָ/רֹ֔אשׁ וְ/שָׁפָ֖ם הַ/מִּשְׁנֶ֑ה וְ/יַעְנַ֥י וְ/שָׁפָ֖ט בַּ/בָּשָֽׁן׃
translation:
  text: Joel the chief, Shapham the second, and Jaanai and Shaphat in Bashan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Shapham the deputy' or 'Shapham the second in rank.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹאֵל
  chosen: Joel
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention rather
    than translated, in keeping with the project's policy for names.
- source_word: הָרֹאשׁ
  chosen: the chief
  alternatives:
  - the head
  - the leader
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' but in genealogical/administrative context
    it denotes rank or leadership. 'The chief' is natural English and preserves the
    sense of primary status.
- source_word: וְשָׁפָם
  chosen: Shapham
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
- source_word: הַמִּשְׁנֶה
  chosen: the second
  alternatives:
  - the deputy
  - the second in rank
  lexicon: HALOT
  rationale: מִשְׁנֶה denotes second position or secondary rank. 'The second' is a
    concise rendering that matches the appositional structure of the Hebrew; 'deputy'
    is interpretive and therefore left as an alternative.
- source_word: וְיַעְנַי
  chosen: Jaanai
  alternatives:
  - Jaanay
  lexicon: HALOT
  rationale: Proper personal name; transliterated. English spelling varies slightly,
    but 'Jaanai' is a standard representation of the Hebrew form.
- source_word: וְשָׁפָט
  chosen: Shaphat
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
- source_word: בַּבָּשָׁן
  chosen: in Bashan
  alternatives:
  - in the Bashan
  lexicon: HALOT
  rationale: Place name with prefixed preposition. English idiom normally omits the
    article before the proper place name, so 'in Bashan' is preferred.
