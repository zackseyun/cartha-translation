id: 1CH.5.21
reference: 1 Chronicles 5:21
source:
  edition: WLC
  text: וַ/יִּשְׁבּ֣וּ מִקְנֵי/הֶ֗ם גְּֽמַלֵּי/הֶ֞ם חֲמִשִּׁ֥ים אֶ֨לֶף֙ וְ/צֹ֗אן מָאתַ֤יִם
    וַ/חֲמִשִּׁים֙ אֶ֔לֶף וַ/חֲמוֹרִ֖ים אַלְפָּ֑יִם וְ/נֶ֥פֶשׁ אָדָ֖ם מֵ֥אָה אָֽלֶף׃
translation:
  text: 'They captured their livestock: 50,000 of their camels, 250,000 sheep, 2,000
    donkeys, and 100,000 people.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a human soul/person' (נֶפֶשׁ אָדָם), that is, 100,000 persons
      taken captive.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁבּוּ
  chosen: They captured
  alternatives:
  - they took captive
  - they seized
  lexicon: HALOT
  rationale: The verb שׁבה commonly refers to taking as spoil/captive. Here the direct
    object includes livestock and humans, so 'captured' works idiomatically for both
    categories in English without awkwardly repeating different verbs.
- source_word: מִקְנֵיהֶם
  chosen: their livestock
  alternatives:
  - their cattle
  - their possessions
  lexicon: HALOT
  rationale: מִקְנֶה can denote livestock or acquired property, but the following
    appositional list specifies animals, so 'livestock' best fits the context.
- source_word: גְּמַלֵּיהֶם
  chosen: their camels
  lexicon: HALOT
  rationale: Straightforward plural construct with pronominal suffix.
- source_word: וְצֹאן
  chosen: sheep
  alternatives:
  - flocks
  - small livestock
  lexicon: HALOT
  rationale: צֹאן can refer collectively to small livestock (sheep/goats), but in
    English number lists of captured animals are most naturally rendered with a specific
    collective term. 'Sheep' is the conventional and likely intended sense here.
- source_word: וַחֲמוֹרִים
  chosen: donkeys
  alternatives:
  - asses
  lexicon: HALOT
  rationale: '''Donkeys'' is clear modern English; ''asses'' is archaic in contemporary
    usage.'
- source_word: וְנֶפֶשׁ אָדָם
  chosen: people
  alternatives:
  - human lives
  - persons
  - people as captives
  lexicon: HALOT
  rationale: Literally 'human soul/person,' an idiom for persons or human beings counted
    individually. 'People' is natural modern English and preserves the sense of human
    captives without wooden phrasing.
- source_word: מֵאָה אָלֶף
  chosen: 100,000
  alternatives:
  - a hundred thousand
  lexicon: HALOT
  rationale: Rendered numerically for readability and consistency with the other figures
    in the verse.
