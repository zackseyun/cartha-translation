id: 1CH.5.33
reference: 1 Chronicles 5:33
source:
  edition: WLC
  text: מְרָיוֹת֙ הוֹלִ֣יד אֶת אֲמַרְיָ֔ה וַ/אֲמַרְיָ֖ה הוֹלִ֥יד אֶת אֲחִיטֽוּב־־׃
translation:
  text: Meraioth fathered Amariah, and Amariah fathered Ahitub.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מְרָיוֹת
  chosen: Meraioth
  alternatives:
  - Merayoth
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. 'Meraioth' follows standard English biblical convention.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  rationale: In a genealogy, this hiphil form of ילד denotes direct paternal descent.
    'Fathered' is concise, natural modern English, and preserves the male genealogical
    sense better than the archaic 'begot'.
- source_word: אֶת
  chosen: '[not separately translated]'
  rationale: Direct-object marker with no independent English equivalent; its function
    is reflected in normal English syntax.
- source_word: אֲמַרְיָה
  chosen: Amariah
  rationale: Proper personal name; transliterated by standard convention.
- source_word: וַ/אֲמַרְיָה
  chosen: and Amariah
  rationale: Conjunction waw is rendered with simple coordination 'and'; the name
    remains transliterated.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  rationale: Repeated genealogical verb; rendered consistently with the first occurrence
    for clarity and lexical consistency.
- source_word: אֲחִיטוּב
  chosen: Ahitub
  alternatives:
  - Ahituv
  rationale: Proper personal name; transliterated according to standard English biblical
    usage.
