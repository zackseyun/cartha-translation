id: 1CH.5.26
reference: 1 Chronicles 5:26
source:
  edition: WLC
  text: וַ/יָּעַר֩ אֱלֹהֵ֨י יִשְׂרָאֵ֜ל אֶת ר֣וּחַ פּ֣וּל מֶֽלֶךְ אַשּׁ֗וּר וְ/אֶת
    ר֨וּחַ֙ תִּלְּגַ֤ת פִּלְנֶ֨סֶר֙ מֶ֣לֶךְ אַשּׁ֔וּר וַ/יַּגְלֵ/ם֙ לָ/ראוּבֵנִ֣י
    וְ/לַ/גָּדִ֔י וְ/לַ/חֲצִ֖י שֵׁ֣בֶט מְנַשֶּׁ֑ה וַ֠/יְבִיאֵ/ם לַ/חְלַ֨ח וְ/חָב֤וֹר
    וְ/הָרָא֙ וּ/נְהַ֣ר גּוֹזָ֔ן עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־׀־־׃פ
translation:
  text: So the God of Israel stirred up the spirit of Pul king of Assyria, that is,
    the spirit of Tilgath-pilneser king of Assyria, and he took the Reubenites, the
    Gadites, and the half-tribe of Manasseh into exile, and brought them to Halah,
    Habor, Hara, and the river Gozan, to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the spirit of Pul king of Assyria and the spirit of Tilgath-pilneser
      king of Assyria,' taking the two names as separate rulers rather than two names
      for the same king.
    reason: alternative_reading
  - marker: b
    text: '''Tilgath-pilneser'' reflects the Hebrew form here; the more familiar English
      form is ''Tiglath-pileser.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּעַר
  chosen: stirred up
  alternatives:
  - aroused
  - awakened
  - incited
  lexicon: HALOT
  rationale: The verb here denotes rousing or stirring someone to action. 'Stirred
    up' is idiomatic modern English and preserves divine causation without over-specifying
    motive. 'Incited' can sound morally negative, which the Hebrew itself does not
    require.
- source_word: ר֣וּחַ ... ר֨וּחַ
  chosen: the spirit of ... the spirit of
  alternatives:
  - the mind of
  - the disposition of
  lexicon: HALOT
  rationale: רוּחַ in this context refers to the inner impulse or disposition moved
    by God. 'Spirit' is the most direct and traditional rendering, and it preserves
    the theological texture of divine stirring of a ruler's inner will.
- source_word: פּוּל
  chosen: Pul
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: תִּלְּגַת פִּלְנֶסֶר
  chosen: Tilgath-pilneser
  alternatives:
  - Tiglath-pileser
  rationale: The Hebrew form in Chronicles is best represented by a transliteration
    close to the consonantal text. 'Tiglath-pileser' is the more familiar conventional
    English form, but 'Tilgath-pilneser' more transparently reflects the Hebrew spelling
    here.
- source_word: וַיַּגְלֵם
  chosen: he took ... into exile
  alternatives:
  - he exiled them
  - he deported them
  lexicon: HALOT
  rationale: The verb גלה in the Hiphil commonly means to carry away into exile. 'Took
    ... into exile' preserves the concrete action and reads naturally in English.
    'Deported' is possible but more bureaucratic in tone.
- source_word: לָראוּבֵנִי וְלַגָּדִי
  chosen: the Reubenites, the Gadites
  alternatives:
  - those of Reuben, those of Gad
  lexicon: HALOT
  rationale: These gentilic forms are naturally rendered as tribal group names in
    English.
- source_word: וְלַחֲצִי שֵׁבֶט מְנַשֶּׁה
  chosen: the half-tribe of Manasseh
  alternatives:
  - half the tribe of Manasseh
  lexicon: HALOT
  rationale: This is the standard and clear rendering of the construct phrase, referring
    to the Transjordanian half of Manasseh.
- source_word: וַיְבִיאֵם
  chosen: and brought them
  alternatives:
  - and led them
  - and carried them
  lexicon: HALOT
  rationale: A straightforward rendering of בוא in Hiphil. 'Brought' fits the sequence
    of deportation and relocation.
- source_word: לַחְלַח וְחָבוֹר וְהָרָא וּנְהַר גּוֹזָן
  chosen: to Halah, Habor, Hara, and the river Gozan
  alternatives:
  - to Halah, Habor, Hara, and the River of Gozan
  lexicon: HALOT
  rationale: These are place names and are transliterated. נְהַר גּוֹזָן is most naturally
    'the river Gozan' or 'the river of Gozan'; the former is smoother in English while
    preserving the geographic reference.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This idiom is conventionally and accurately rendered 'to this day' in
    contemporary English.
