theological_decisions:
- issue: Relationship between Pul and Tilgath-pilneser
  chosen_reading: Rendered appositionally as 'Pul king of Assyria, that is, ... Tilgath-pilneser
    king of Assyria' to reflect the likely identification of the two names in context.
  alternative_readings:
  - 'Rendered coordinately as two separate rulers: ''the spirit of Pul ... and the
    spirit of Tilgath-pilneser ...'''
  rationale: The Hebrew repeats 'the spirit of' with both names, which could be read
    as either two names for the same Assyrian king or two distinct rulers. In this
    historical context, many interpreters identify Pul with Tiglath-pileser III. The
    appositional English makes the historical sense clearer while preserving the doubled
    Hebrew expression through repetition. Because the alternative is viable from the
    syntax alone, it is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
