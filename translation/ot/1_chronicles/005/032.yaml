id: 1CH.5.32
reference: 1 Chronicles 5:32
source:
  edition: WLC
  text: וְ/עֻזִּי֙ הוֹלִ֣יד אֶת זְרַֽחְיָ֔ה וּֽ/זְרַֽחְיָ֖ה הוֹלִ֥יד אֶת מְרָיֽוֹת־־׃
translation:
  text: Uzzi fathered Zerahiah, and Zerahiah fathered Meraioth.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/עֻזִּי
  chosen: Uzzi
  alternatives:
  - Uzi
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. 'Uzzi' is the standard English transliteration.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: Hiphil of ילד in genealogical context means to beget/father. 'Fathered'
    is concise, natural modern English and preserves the genealogical sense without
    archaic tone.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker has no direct English equivalent and is represented
    by normal English word order.
- source_word: זְרַחְיָה
  chosen: Zerahiah
  alternatives:
  - Zerachiah
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard convention. 'Zerahiah'
    reflects common English biblical usage.
- source_word: וּֽ/זְרַֽחְיָה
  chosen: and Zerahiah
  lexicon: HALOT
  rationale: Conjunction plus repeated proper name; rendered straightforwardly to
    preserve the chain structure of the genealogy.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: Repeated genealogical verb; rendered consistently with the first occurrence
    for clarity and term consistency.
- source_word: מְרָיֽוֹת
  chosen: Meraioth
  alternatives:
  - Merayoth
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention.
