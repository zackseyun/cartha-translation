id: 1CH.5.10
reference: 1 Chronicles 5:10
source:
  edition: WLC
  text: וּ/בִ/ימֵ֣י שָׁא֗וּל עָשׂ֤וּ מִלְחָמָה֙ עִם הַֽ/הַגְרִאִ֔ים וַֽ/יִּפְּל֖וּ
    בְּ/יָדָ֑/ם וַ/יֵּשְׁבוּ֙ בְּ/אָ֣הֳלֵי/הֶ֔ם עַֽל כָּל פְּנֵ֖י מִזְרָ֥ח לַ/גִּלְעָֽד־־־׃פ
translation:
  text: In the days of Saul they made war with the Hagrites, and they fell into their
    hand; and they lived in their tents throughout all the region east of Gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Hagarites.” The Hebrew ethnonym likely refers to a people associated
      with Hagar.
    reason: lexical_alternative
  - marker: b
    text: Literally “they fell into their hand,” that is, into their power; the ones
      who fell are the Hagrites implied from context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִימֵי
  chosen: In the days of
  alternatives:
  - during the time of
  lexicon: HALOT
  rationale: The preposition plus plural construct of יוֹם is an idiom marking a period
    or era. 'In the days of' is a natural and sufficiently formal English equivalent.
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Standard English transliteration of the personal name.
- source_word: עָשׂוּ מִלְחָמָה
  chosen: made war
  alternatives:
  - waged war
  - fought
  lexicon: HALOT
  rationale: The collocation עשה מלחמה is a standard idiom for engaging in warfare.
    'Made war' preserves the Hebrew structure while remaining clear; 'waged war' is
    possible but slightly more interpretive.
- source_word: עִם
  chosen: with
  alternatives:
  - against
  lexicon: HALOT
  rationale: The preposition literally means 'with.' In a warfare context English
    often uses 'against,' but 'with' preserves the source wording without obscuring
    the adversarial sense.
- source_word: הַהַגְרִאִים
  chosen: the Hagrites
  alternatives:
  - the Hagarites
  lexicon: HALOT
  rationale: The ethnonym refers to the descendants or people associated with Hagar.
    'Hagrites' is a standard concise rendering; 'Hagarites' is also possible and may
    make the connection to Hagar more explicit.
- source_word: וַיִּפְּלוּ בְּיָדָם
  chosen: they fell into their hand
  alternatives:
  - they were delivered into their hand
  - they fell by their hand
  lexicon: HALOT
  rationale: The idiom נפל ביד commonly means to fall into someone's power. Here the
    subject is the Hagrites, implied from context after the battle clause. 'They fell
    into their hand' keeps the Hebrew imagery and allows the antecedent to be inferred
    naturally.
- source_word: וַיֵּשְׁבוּ
  chosen: they lived
  alternatives:
  - they dwelt
  - they settled
  lexicon: HALOT
  rationale: ישב can mean sit, dwell, remain, or settle. In context of occupying territory
    and tents after victory, 'lived' is idiomatic modern English; 'settled' is possible
    but may overstate permanence.
- source_word: בְּאָהֳלֵיהֶם
  chosen: in their tents
  alternatives:
  - in their tent-settlements
  - in their dwellings
  lexicon: HALOT
  rationale: The phrase most naturally refers to the tents of the defeated Hagrites
    now occupied by the victors. 'In their tents' preserves the concrete image and
    the pronoun's likely reference to the Hagrites.
- source_word: עַל כָּל פְּנֵי
  chosen: throughout all the region
  alternatives:
  - over all the face of
  - across the whole expanse of
  lexicon: HALOT
  rationale: The idiom על כל פני denotes extension across an area. 'Throughout all
    the region' renders the spatial sense in natural English without wooden literalism.
- source_word: מִזְרָח לַגִּלְעָד
  chosen: east of Gilead
  alternatives:
  - to the east of Gilead
  - the eastern side of Gilead
  lexicon: HALOT
  rationale: The phrase identifies the area lying eastward relative to Gilead. 'East
    of Gilead' is concise and clear in English.
