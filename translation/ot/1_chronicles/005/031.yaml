id: 1CH.5.31
reference: 1 Chronicles 5:31
source:
  edition: WLC
  text: וַ/אֲבִישׁ֨וּעַ֙ הוֹלִ֣יד אֶת בֻּקִּ֔י וּ/בֻקִּ֖י הוֹלִ֥יד אֶת עֻזִּֽי־־׃
translation:
  text: Abishua fathered Bukki, and Bukki fathered Uzzi.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַ/אֲבִישׁוּעַ
  chosen: Abishua
  alternatives:
  - Abi-shua
  lexicon: HALOT
  rationale: Proper name; transliterated according to standard English convention,
    following the project's policy to transliterate personal names rather than translate
    them.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: Hiphil of ילד in genealogical context means to beget or father. 'Fathered'
    is concise, natural modern English, and preserves the genealogical relationship
    without archaic tone.
- source_word: אֶת
  chosen: '[not translated]'
  alternatives:
  - direct object marker
  lexicon: HALOT
  rationale: Hebrew direct-object marker has no natural English equivalent and is
    therefore left untranslated.
- source_word: בֻּקִּי
  chosen: Bukki
  lexicon: HALOT
  rationale: Proper name; transliterated into conventional English form.
- source_word: וּ/בֻקִּי
  chosen: and Bukki
  alternatives:
  - Bukki
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered 'and' to preserve the simple sequence
    of the genealogy.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - begot
  - became the father of
  lexicon: HALOT
  rationale: Repeated genealogical verb; rendered consistently with the first occurrence
    for transparency and stylistic coherence.
- source_word: עֻזִּי
  chosen: Uzzi
  alternatives:
  - Uzi
  lexicon: HALOT
  rationale: Proper name; transliterated using the conventional English biblical form
    'Uzzi'.
