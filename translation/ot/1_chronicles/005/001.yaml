id: 1CH.5.1
reference: 1 Chronicles 5:1
source:
  edition: WLC
  text: וּ/בְנֵ֨י רְאוּבֵ֥ן בְּכֽוֹר יִשְׂרָאֵל֮ כִּ֣י ה֣וּא הַ/בְּכוֹר֒ וּֽ/בְ/חַלְּל/וֹ֙
    יְצוּעֵ֣י אָבִ֔י/ו נִתְּנָה֙ בְּכֹ֣רָת֔/וֹ לִ/בְנֵ֥י יוֹסֵ֖ף בֶּן יִשְׂרָאֵ֑ל
    וְ/לֹ֥א לְ/הִתְיַחֵ֖שׂ לַ/בְּכֹרָֽה־־׃
translation:
  text: Now the sons of Reuben, the firstborn of Israel—for he was the firstborn,
    but because he defiled his father’s bed, his birthright was given to the sons
    of Joseph son of Israel, though not to be enrolled in the genealogy as firstborn—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his father’s couch.' The Hebrew is literally plural ('beds/couches'),
      an idiom for the marriage bed.
    reason: lexical_alternative
  - marker: b
    text: Or, 'but not to be reckoned in the genealogy according to the birthright.'
      The clause indicates that the birthright passed to Joseph’s sons without making
      them the genealogically listed firstborn.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי
  chosen: Now the sons of
  alternatives:
  - And the sons of
  lexicon: HALOT
  rationale: The conjunction waw can be rendered simply as 'and,' but here 'Now' better
    signals a transition into a genealogical explanation in readable English while
    preserving the connective force.
- source_word: בְּכוֹר יִשְׂרָאֵל
  chosen: the firstborn of Israel
  lexicon: HALOT
  rationale: בכור denotes the firstborn son in status and birth order. The construct
    with Israel is straightforward and should be rendered formally.
- source_word: כִּי הוּא הַבְּכוֹר
  chosen: for he was the firstborn
  alternatives:
  - because he was the firstborn
  lexicon: HALOT
  rationale: כִּי here introduces an explanatory parenthetical clause. 'For' fits
    the explanatory sense better than a stronger causal 'because' in English.
- source_word: וּבְחַלְּלוֹ
  chosen: but because he defiled
  alternatives:
  - when he profaned
  - in his defiling
  lexicon: HALOT
  rationale: The infinitive construct of חלל with prefixed beth marks circumstance/cause.
    In context it refers to Reuben's sexual violation of paternal honor (cf. Gen 35:22),
    so 'defiled' is idiomatic and morally weighty without over-paraphrasing.
- source_word: יְצוּעֵי אָבִיו
  chosen: his father’s bed
  alternatives:
  - his father’s couch
  - his father’s beds
  lexicon: HALOT
  rationale: The plural form literally means 'beds/couches,' but in this idiom it
    refers to the father's marriage bed. Singular 'bed' is the most natural English
    idiom and matches the sexual context.
- source_word: נִתְּנָה בְּכֹרָתוֹ
  chosen: his birthright was given
  alternatives:
  - his right as firstborn was given
  lexicon: HALOT
  rationale: בכֹרה here refers not merely to birth order but to the legal privileges
    of the firstborn. 'Birthright' is the established and accurate English equivalent.
- source_word: לִבְנֵי יוֹסֵף בֶּן יִשְׂרָאֵל
  chosen: to the sons of Joseph son of Israel
  alternatives:
  - to the sons of Joseph, the son of Israel
  lexicon: HALOT
  rationale: The phrase is genealogical and should remain explicit. 'Son of Israel'
    identifies Joseph as Jacob's son, preserving the Hebrew wording.
- source_word: וְלֹא לְהִתְיַחֵשׂ לַבְּכֹרָה
  chosen: though not to be enrolled in the genealogy as firstborn
  alternatives:
  - but not to be reckoned in the genealogy according to the birthright
  - and not to register himself for the birthright
  lexicon: HALOT
  rationale: התיחשׂ is a genealogical term meaning to enroll/register by genealogy
    or lineage. The clause explains that Joseph's line received the birthright without
    displacing the formal genealogical reckoning of firstborn status. 'As firstborn'
    captures לַבְּכֹרָה idiomatically in context.
