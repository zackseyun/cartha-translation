theological_decisions:
- issue: Nature of Reuben's loss of status
  chosen_reading: The verse distinguishes between Reuben's biological status as firstborn
    and the transfer of the birthright privileges to Joseph's sons, without asserting
    that Joseph became the genealogically reckoned firstborn.
  alternative_readings:
  - Joseph's line replaced Reuben entirely as firstborn in every sense
  rationale: 'The final clause explicitly limits the transfer: the birthright was
    given to Joseph''s sons, yet not for genealogical enrollment as firstborn. The
    translation preserves this tension rather than collapsing legal privilege and
    genealogical rank into one category.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
