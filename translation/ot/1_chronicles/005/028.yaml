id: 1CH.5.28
reference: 1 Chronicles 5:28
source:
  edition: WLC
  text: וּ/בְנֵ֖י קְהָ֑ת עַמְרָ֣ם יִצְהָ֔ר וְ/חֶבְר֖וֹן וְ/עֻזִּיאֵֽל׃ס
translation:
  text: 'And the sons of Kohath: Amram, Izhar, Hebron, and Uzziel.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: The conjunction ו is carried forward as 'And' to reflect the genealogical
    continuation, while בְנֵי in construct is most naturally 'sons of' in this lineage
    context rather than a broader 'descendants of.'
- source_word: קְהָת
  chosen: Kohath
  alternatives:
  - Qehath
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: עַמְרָם
  chosen: Amram
  rationale: Proper name transliterated in standard English form.
- source_word: יִצְהָר
  chosen: Izhar
  alternatives:
  - Jizhar
  rationale: Proper name transliterated in the conventional English biblical form.
- source_word: וְ/חֶבְרוֹן
  chosen: Hebron
  rationale: Proper name transliterated; the prefixed conjunction is represented by
    the English list structure and final 'and.' Although 'Hebron' is also a place
    name elsewhere, here morphology and context indicate the personal name in a genealogy.
- source_word: וְ/עֻזִּיאֵל
  chosen: and Uzziel
  alternatives:
  - and Uzziel
  rationale: Proper name transliterated in standard English form; the prefixed conjunction
    is explicitly rendered with 'and' before the final item in the series.
