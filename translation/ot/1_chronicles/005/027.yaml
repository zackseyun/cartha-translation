id: 1CH.5.27
reference: 1 Chronicles 5:27
source:
  edition: WLC
  text: בְּנֵ֖י לֵוִ֑י גֵּרְשׁ֕וֹן קְהָ֖ת וּ/מְרָרִֽי׃
translation:
  text: 'The sons of Levi: Gershon, Kohath, and Merari.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of Levi.' In genealogies, 'sons of' can sometimes function
      more broadly for lineage, though here it most naturally refers to Levi's three
      immediate sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - descendants of
  - children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן. In genealogical contexts, 'sons of' is the
    standard and most transparent rendering, even when it can denote a broader line
    of descent. Here it introduces Levi's immediate clan divisions, so 'sons of' is
    both natural and sufficiently formal.
- source_word: לֵוִי
  chosen: Levi
  lexicon: HALOT
  rationale: Proper personal name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: גֵּרְשׁוֹן
  chosen: Gershon
  alternatives:
  - Gershom
  lexicon: HALOT
  rationale: Proper name of one of Levi's sons. 'Gershon' matches the Hebrew form
    here and standard English convention in this genealogical context. 'Gershom' is
    a distinct but related name elsewhere and should not be imported here.
- source_word: קְהָת
  chosen: Kohath
  lexicon: HALOT
  rationale: Proper name; standard English transliteration of the Hebrew name קְהָת.
- source_word: מְרָרִי
  chosen: Merari
  lexicon: HALOT
  rationale: Proper name; standard English transliteration of the Hebrew name מְרָרִי.
- source_word: וּ
  chosen: and
  lexicon: HALOT
  rationale: Simple conjunction joining the final name in the list.
