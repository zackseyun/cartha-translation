id: 1CH.5.3
reference: 1 Chronicles 5:3
source:
  edition: WLC
  text: בְּנֵ֥י רְאוּבֵ֖ן בְּכ֣וֹר יִשְׂרָאֵ֑ל חֲנ֥וֹךְ וּ/פַלּ֖וּא חֶצְר֥וֹן וְ/כַרְמִֽי׃
translation:
  text: 'The sons of Reuben, the firstborn of Israel: Hanoch, Pallu, Hezron, and Carmi.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - descendants of
  - children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in a genealogical list is most naturally rendered
    'sons of.' 'Descendants of' is broader than the immediate wording, and 'children
    of' is less precise in this male lineage context.
- source_word: רְאוּבֵן
  chosen: Reuben
  rationale: Personal name transliterated by standard English convention, following
    the project's policy to transliterate names rather than translate them.
- source_word: בְּכֹר יִשְׂרָאֵל
  chosen: the firstborn of Israel
  alternatives:
  - Israel's firstborn
  lexicon: HALOT
  rationale: The construct phrase identifies Reuben appositionally as 'the firstborn
    of Israel.' The fuller phrasing is slightly more explicit and natural in English
    while preserving the genealogical note.
- source_word: חֲנוֹךְ
  chosen: Hanoch
  alternatives:
  - Hanok
  rationale: Standard English transliteration of the personal name in the Hebrew genealogical
    tradition.
- source_word: פַלּוּא
  chosen: Pallu
  alternatives:
  - Pallu
  rationale: Standard English biblical form is 'Pallu.' The Hebrew proper name is
    transliterated rather than translated.
- source_word: חֶצְרוֹן
  chosen: Hezron
  rationale: Standard English transliteration of the proper name.
- source_word: כַרְמִי
  chosen: Carmi
  rationale: Standard English transliteration of the proper name.
