id: 1CH.5.19
reference: 1 Chronicles 5:19
source:
  edition: WLC
  text: וַ/יַּעֲשׂ֥וּ מִלְחָמָ֖ה עִם הַֽ/הַגְרִיאִ֑ים וִ/יט֥וּר וְ/נָפִ֖ישׁ וְ/נוֹדָֽב־׃
translation:
  text: They made war against the Hagrites, Jetur, Naphish, and Nodab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Hagarites." The Hebrew ethnonym may be rendered either way in English
      transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: They made
  alternatives:
  - They waged
  - They fought
  lexicon: HALOT
  rationale: The verb עשה literally means 'do/make,' but in the idiom עשה מלחמה the
    natural English equivalent is 'make war' or 'wage war.' 'Made' is retained as
    part of the established Hebrew idiom rather than flattening it to simply 'fought.'
- source_word: מִלְחָמָה
  chosen: war
  alternatives:
  - battle
  lexicon: HALOT
  rationale: The noun denotes warfare/war. 'War' best matches the idiom with עשה and
    preserves the broader military sense rather than a single engagement implied by
    'battle.'
- source_word: עִם
  chosen: against
  alternatives:
  - with
  lexicon: HALOT
  rationale: Although the preposition commonly means 'with,' in the context of making
    war it is adversative in sense. English 'against' communicates the relationship
    clearly and idiomatically.
- source_word: הַגְרִיאִים
  chosen: the Hagrites
  alternatives:
  - the Hagarites
  lexicon: HALOT
  rationale: This is an ethnonym referring to the Hagrites/Hagarites. 'Hagrites' is
    a standard modern transliteration from the Hebrew form and avoids implying a direct
    interpretive claim beyond the consonantal form. The article is represented with
    'the' because the Hebrew includes it.
- source_word: וִיטוּר
  chosen: Jetur
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: וְנָפִישׁ
  chosen: Naphish
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English convention.
- source_word: וְנוֹדָב
  chosen: and Nodab
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English convention.
    The conjunction is carried into English with 'and' to preserve the list structure.
