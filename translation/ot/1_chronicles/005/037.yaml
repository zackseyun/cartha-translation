id: 1CH.5.37
reference: 1 Chronicles 5:37
source:
  edition: WLC
  text: וַ/יּ֥וֹלֶד עֲזַרְיָ֖ה אֶת אֲמַרְיָ֑ה וַ/אֲמַרְיָ֖ה הוֹלִ֥יד אֶת אֲחִיטֽוּב־־׃
translation:
  text: Azariah fathered Amariah, and Amariah fathered Ahitub.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: From ילד in the Hiphil/waw-consecutive genealogical formula, indicating
    direct descent. 'Fathered' is natural modern English and preserves the genealogical
    sense better than the archaic 'begot.'
- source_word: עֲזַרְיָה
  chosen: Azariah
  rationale: Proper personal name; transliterated according to the translation philosophy
    to transliterate names rather than translate them.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no standalone English equivalent; its function
    is represented by English word order.
- source_word: אֲמַרְיָה
  chosen: Amariah
  rationale: Proper personal name; transliterated consistently.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: Same ילד genealogical verb as earlier in the verse. Rendered consistently
    as 'fathered' for readability and lexical consistency within the genealogy.
- source_word: אֲחִיטוּב
  chosen: Ahitub
  rationale: Proper personal name; transliterated by standard English convention.
