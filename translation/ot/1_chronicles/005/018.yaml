id: 1CH.5.18
reference: 1 Chronicles 5:18
source:
  edition: WLC
  text: בְּנֵֽי רְאוּבֵ֨ן וְ/גָדִ֜י וַ/חֲצִ֥י שֵֽׁבֶט מְנַשֶּׁה֮ מִן בְּנֵי חַיִל֒
    אֲ֠נָשִׁים נֹשְׂאֵ֨י מָגֵ֤ן וְ/חֶ֨רֶב֙ וְ/דֹ֣רְכֵי קֶ֔שֶׁת וּ/לְמוּדֵ֖י מִלְחָמָ֑ה
    אַרְבָּעִ֨ים וְ/אַרְבָּעָ֥ה אֶ֛לֶף וּ/שְׁבַע מֵא֥וֹת וְ/שִׁשִּׁ֖ים יֹצְאֵ֥י צָבָֽא־־־־־׃
translation:
  text: The sons of Reuben and the Gadites and the half-tribe of Manasseh, valiant
    men, men who carried shield and sword, who drew the bow, and who were trained
    for war, were forty-four thousand seven hundred sixty, able to go out to war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mighty men' or 'men of valor' for 'valiant men.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'who bent/trod the bow,' a Hebrew idiom for drawing a bow to shoot.
    reason: cultural_note
  - marker: c
    text: Or 'fit for military service' for 'able to go out to war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי רְאוּבֵן
  chosen: The sons of Reuben
  alternatives:
  - The Reubenites
  - The descendants of Reuben
  lexicon: HALOT
  rationale: Formal kinship language is retained with 'sons of' because the Hebrew
    construct explicitly uses בְּנֵי. 'Reubenites' is possible but slightly less transparent
    to the source wording.
- source_word: וְגָדִי
  chosen: and the Gadites
  alternatives:
  - and Gad
  - and the sons of Gad
  lexicon: HALOT
  rationale: The gentilic form indicates members of the tribe/clan of Gad rather than
    the individual Gad. 'The Gadites' is the most natural English equivalent.
- source_word: וַחֲצִי שֵׁבֶט מְנַשֶּׁה
  chosen: and the half-tribe of Manasseh
  alternatives:
  - and half the tribe of Manasseh
  lexicon: HALOT
  rationale: Standard English rendering of the construct phrase; preserves the tribal
    designation clearly.
- source_word: מִן בְּנֵי חַיִל
  chosen: valiant men
  alternatives:
  - mighty men
  - men of valor
  - from the sons of valor
  lexicon: HALOT
  rationale: The idiom denotes capable, valiant fighting men. 'Valiant men' is idiomatic
    modern English and fits the military context. The prefixed מִן is best taken partitively/descriptively
    here, introducing what sort of men they were.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - warriors
  - males
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'men'; retaining it matches the source's gendered
    and military description. 'Warriors' would front-load interpretation already supplied
    by the following participles.
- source_word: נֹשְׂאֵי מָגֵן וְחֶרֶב
  chosen: who carried shield and sword
  alternatives:
  - bearing shield and sword
  - equipped with shield and sword
  lexicon: HALOT
  rationale: The participle נֹשְׂאֵי literally means 'bearing/carrying.' 'Carried
    shield and sword' is natural English while preserving the concrete military imagery.
- source_word: וְדֹרְכֵי קֶשֶׁת
  chosen: who drew the bow
  alternatives:
  - who bent the bow
  - archers
  lexicon: HALOT
  rationale: The idiom literally refers to treading/bending the bow in order to shoot.
    'Drew the bow' communicates the action idiomatically in English without reducing
    it merely to the noun 'archers.'
- source_word: וּלְמוּדֵי מִלְחָמָה
  chosen: who were trained for war
  alternatives:
  - trained in battle
  - experienced in war
  - taught in warfare
  lexicon: HALOT
  rationale: The passive/resultative sense of לְמוּדֵי is well conveyed by 'trained.'
    'For war' is slightly more idiomatic than 'in war' here.
- source_word: אַרְבָּעִים וְאַרְבָּעָה אֶלֶף וּשְׁבַע מֵאוֹת וְשִׁשִּׁים
  chosen: forty-four thousand seven hundred sixty
  alternatives:
  - 44,760
  lexicon: HALOT
  rationale: The full number is rendered in standard English words for readability
    in running text.
- source_word: יֹצְאֵי צָבָא
  chosen: able to go out to war
  alternatives:
  - going out to the army
  - fit for military service
  - ready for battle
  lexicon: HALOT
  rationale: This Hebrew military idiom refers to those eligible/available for military
    campaign. 'Able to go out to war' preserves the idiom's imagery while making the
    sense clear.
