id: 1CH.5.29
reference: 1 Chronicles 5:29
source:
  edition: WLC
  text: וּ/בְנֵ֣י עַמְרָ֔ם אַהֲרֹ֥ן וּ/מֹשֶׁ֖ה וּ/מִרְיָ֑ם וּ/בְנֵ֣י אַהֲרֹ֔ן נָדָב֙
    וַ/אֲבִיה֔וּא אֶלְעָזָ֖ר וְ/אִיתָמָֽרס׃ס
translation:
  text: 'The sons of Amram: Aaron, Moses, and Miriam; and the sons of Aaron: Nadab
    and Abihu, Eleazar and Ithamar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of.' In this genealogical context the term denotes direct descendants/children
      in a male-line listing; here the list under Amram includes Miriam as well as
      Aaron and Moses.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - Now the sons of
  lexicon: HALOT
  rationale: Construct plural of בֵּן with prefixed conjunction. In genealogical style,
    English commonly renders this as a heading-like phrase, 'The sons of,' rather
    than preserving every conjunction with 'and' at the start.
- source_word: עַמְרָם
  chosen: Amram
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Personal name transliterated by standard convention.
- source_word: וּמֹשֶׁה
  chosen: Moses
  rationale: Personal name with conjunction; in an English list the conjunction is
    naturally represented before the final item rather than repeated before each name.
- source_word: וּמִרְיָם
  chosen: and Miriam
  rationale: Personal name transliterated as Miriam. The prefixed conjunction is represented
    with the final English 'and' in the series.
- source_word: וּבְנֵי אַהֲרֹן
  chosen: and the sons of Aaron
  alternatives:
  - the sons of Aaron
  lexicon: HALOT
  rationale: Introduces a second genealogical sub-list. Retaining 'and' reflects the
    Hebrew conjunction and links the two clauses, while still reading naturally in
    English.
- source_word: נָדָב
  chosen: Nadab
  rationale: Personal name transliterated by standard convention.
- source_word: וַאֲבִיהוּא
  chosen: and Abihu
  rationale: Personal name transliterated by standard convention; conjunction retained
    in the English list.
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: Personal name transliterated by standard convention.
- source_word: וְאִיתָמָר
  chosen: and Ithamar
  rationale: Personal name transliterated by standard convention; conjunction retained
    before the final item in the list.
