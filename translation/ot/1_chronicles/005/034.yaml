id: 1CH.5.34
reference: 1 Chronicles 5:34
source:
  edition: WLC
  text: וַ/אֲחִיטוּב֙ הוֹלִ֣יד אֶת צָד֔וֹק וְ/צָד֖וֹק הוֹלִ֥יד אֶת אֲחִימָֽעַץ־־׃
translation:
  text: Ahitub fathered Zadok, and Zadok fathered Ahimaaz.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֲחִיטוּב
  chosen: Ahitub
  alternatives:
  - Ahitub
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the stated policy for names.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  rationale: The Hiphil of ילד in genealogical contexts denotes producing offspring
    / becoming father to. 'Fathered' is concise, natural modern English, and preserves
    the genealogical force better than the archaic 'begot'.
- source_word: אֶת
  chosen: '[not translated]'
  rationale: Direct-object marker with no independent lexical equivalent in English;
    its syntactic function is represented by English word order.
- source_word: צָדוֹק
  chosen: Zadok
  alternatives:
  - Zadok
  rationale: Proper personal name; transliterated by standard convention.
- source_word: וְ
  chosen: and
  alternatives:
  - then
  rationale: Simple conjunction linking the next genealogical clause; 'and' is the
    most direct and formally appropriate rendering.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  rationale: Repeated genealogical verb; rendered consistently with the first occurrence
    for transparency and style.
- source_word: אֲחִימָעַץ
  chosen: Ahimaaz
  alternatives:
  - Ahimaaz
  rationale: Proper personal name; transliterated by standard convention.
