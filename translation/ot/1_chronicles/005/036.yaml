id: 1CH.5.36
reference: 1 Chronicles 5:36
source:
  edition: WLC
  text: וְ/יוֹחָנָ֖ן הוֹלִ֣יד אֶת עֲזַרְיָ֑ה ה֚וּא אֲשֶׁ֣ר כִּהֵ֔ן בַּ/בַּ֕יִת אֲשֶׁר
    בָּנָ֥ה שְׁלֹמֹ֖ה בִּ/ירוּשָׁלִָֽם־־׃
translation:
  text: And Johanan fathered Azariah; he was the one who served as priest in the house
    that Solomon built in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the temple'; Hebrew 'in the house,' a common way of referring to
      the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יוֹחָנָן
  chosen: And Johanan
  alternatives:
  - Johanan
  lexicon: HALOT
  rationale: The prefixed conjunction ו is carried over as 'And' to preserve the genealogical
    sequence. The proper name is transliterated as 'Johanan' per the translation philosophy
    for personal names.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In genealogical contexts ילד in the Hiphil means to beget/father. 'Fathered'
    is concise, natural modern English, and preserves the male genealogical sense
    better than the archaic 'begot'.
- source_word: אֶת עֲזַרְיָה
  chosen: Azariah
  lexicon: HALOT
  rationale: The direct-object marker אֶת is not translated in English; the personal
    name is transliterated as 'Azariah'.
- source_word: הוּא אֲשֶׁר
  chosen: he was the one who
  alternatives:
  - he who
  - who
  lexicon: HALOT
  rationale: This construction marks Azariah out for identification. 'He was the one
    who' brings out the emphatic resumptive pronoun הוּא in readable English better
    than the more wooden 'he who'.
- source_word: כִּהֵן
  chosen: served as priest
  alternatives:
  - ministered as priest
  - was priest
  lexicon: HALOT
  rationale: The verb כהן denotes functioning in priestly service. 'Served as priest'
    is idiomatic and preserves the verbal force better than the flatter 'was priest'.
- source_word: בַּ/בַּיִת
  chosen: in the house
  alternatives:
  - in the temple
  lexicon: HALOT
  rationale: The Hebrew literally says 'in the house.' Because the following clause
    identifies it as the structure Solomon built in Jerusalem, the referent is the
    temple, but the main text retains the source term 'house' rather than importing
    the interpretive gloss 'temple'.
- source_word: אֲשֶׁר בָּנָה שְׁלֹמֹה
  chosen: that Solomon built
  alternatives:
  - which Solomon built
  lexicon: HALOT
  rationale: A straightforward relative clause; 'that' is natural modern English.
- source_word: בִּ/ירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard rendering of the place name with the preposition preserved.
