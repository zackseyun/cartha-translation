id: 1CH.5.17
reference: 1 Chronicles 5:17
source:
  edition: WLC
  text: כֻּלָּ/ם֙ הִתְיַחְשׂ֔וּ בִּ/ימֵ֖י יוֹתָ֣ם מֶֽלֶךְ יְהוּדָ֑ה וּ/בִ/ימֵ֖י יָרָבְעָ֥ם
    מֶֽלֶךְ יִשְׂרָאֵֽל־־׃פ
translation:
  text: All of them were enrolled by genealogy in the days of Jotham king of Judah,
    and in the days of Jeroboam king of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'were registered by genealogies' or 'were reckoned by genealogy.' The
      Hebrew verb refers to being entered in a genealogical record.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּם
  chosen: All of them
  alternatives:
  - All
  - They all
  lexicon: HALOT
  rationale: The term denotes totality with a 3mp suffix. 'All of them' preserves
    the explicit pronominal force more naturally than bare 'All' in English.
- source_word: הִתְיַחְשׂוּ
  chosen: were enrolled by genealogy
  alternatives:
  - were registered by genealogies
  - were reckoned by genealogy
  - were entered in the genealogical record
  lexicon: HALOT
  rationale: The hitpael of יחשׂ in Chronicles commonly refers to being entered or
    reckoned in genealogical records. 'Were enrolled by genealogy' captures both the
    administrative/passive sense and the genealogical context without awkward literalism.
- source_word: בִּימֵי
  chosen: in the days of
  alternatives:
  - during the reign of
  - in the time of
  lexicon: HALOT
  rationale: Literally 'in the days of.' This is a standard Hebrew temporal expression.
    Retaining 'in the days of' preserves the source idiom while remaining clear in
    English.
- source_word: יוֹתָם
  chosen: Jotham
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Straightforward construct phrase; translated directly.
- source_word: וּבִימֵי
  chosen: and in the days of
  alternatives:
  - and during the reign of
  - and in the time of
  lexicon: HALOT
  rationale: The conjunction plus repeated temporal phrase is retained for Hebrew-style
    parallelism and chronological precision.
- source_word: יָרָבְעָם
  chosen: Jeroboam
  rationale: Personal name transliterated by standard English convention.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase; translated directly.
