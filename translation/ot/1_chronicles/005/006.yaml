id: 1CH.5.6
reference: 1 Chronicles 5:6
source:
  edition: WLC
  text: בְּאֵרָ֣ה בְנ֔/וֹ אֲשֶׁ֣ר הֶגְלָ֔ה תִּלְּגַ֥ת פִּלְנְאֶ֖סֶר מֶ֣לֶךְ אַשֻּׁ֑ר
    ה֥וּא נָשִׂ֖יא לָ/רֽאוּבֵנִֽי׃
translation:
  text: Beerah his son, whom Tilgath-pilneser king of Assyria carried away into exile—he
    was a chief of the Reubenites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew form of the Assyrian king’s name here is 'Tilgath-pilneser';
      many English versions use the more familiar historical form 'Tiglath-pileser.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאֵרָה
  chosen: Beerah
  rationale: Proper personal name; transliterated according to the translation philosophy
    for names.
- source_word: בְנוֹ
  chosen: his son
  alternatives:
  - the son of him
  lexicon: HALOT
  rationale: Construct noun with 3ms suffix referring back to the previously named
    ancestor in the genealogy; idiomatic English is 'his son.'
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - who
  lexicon: HALOT
  rationale: Relative particle introducing the clause about Beerah. 'Whom' fits the
    object relationship with 'carried away into exile' in standard English.
- source_word: הֶגְלָה
  chosen: carried away into exile
  alternatives:
  - took into exile
  - deported
  lexicon: HALOT
  rationale: Hiphil of גלה commonly denotes causing someone to go into exile. 'Carried
    away into exile' preserves the causative sense and the historical deportation
    context without becoming overly technical.
- source_word: תִּלְגַת פִּלְנְאֶסֶר
  chosen: Tilgath-pilneser
  alternatives:
  - Tiglath-pileser
  rationale: The Hebrew form here is תִּלְגַת פִּלְנְאֶסֶר, which is most directly
    represented by 'Tilgath-pilneser.' The more familiar English historical form 'Tiglath-pileser'
    reflects harmonization to Akkadian/other biblical spellings rather than this verse's
    consonantal form.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: king of Assyria
  alternatives:
  - the king of Assyria
  lexicon: HALOT
  rationale: Standard construct chain. English omits the article naturally in apposition
    after the royal name.
- source_word: הוּא
  chosen: he
  alternatives:
  - this man
  lexicon: HALOT
  rationale: Independent pronoun used resumptively/emphatically. Rendering it as 'he'
    preserves the Hebrew emphasis and clarifies the shift back to Beerah after the
    relative clause.
- source_word: נָשִׂיא
  chosen: chief
  alternatives:
  - prince
  - leader
  - ruler
  lexicon: HALOT
  rationale: In a tribal/genealogical context, נָשִׂיא denotes a recognized leader
    or chief. 'Chief' is clear modern English and avoids the potentially misleading
    royal connotations of 'prince.'
- source_word: לָרְאוּבֵנִי
  chosen: of the Reubenites
  alternatives:
  - for the Reubenites
  - of the Reubenite clan
  lexicon: HALOT
  rationale: The lamed here marks relation with נָשִׂיא, indicating the group over
    which he held leadership. 'Of the Reubenites' is the most natural English expression.
