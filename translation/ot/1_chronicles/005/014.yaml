id: 1CH.5.14
reference: 1 Chronicles 5:14
source:
  edition: WLC
  text: אֵ֣לֶּה בְּנֵ֣י אֲבִיחַ֗יִל בֶּן חוּרִ֡י בֶּן יָ֠רוֹחַ בֶּן גִּלְעָ֧ד בֶּן
    מִיכָאֵ֛ל בֶּן יְשִׁישַׁ֥י בֶּן יַחְדּ֖וֹ בֶּן בּֽוּז׀־־־־־־־׃
translation:
  text: These were the sons of Abihail son of Huri, son of Jaroah, son of Gilead,
    son of Michael, son of Jeshishai, son of Jahdo, son of Buz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of' and repeated 'son of' may function genealogically for a
      family line and do not always require every generation to be listed explicitly.
    reason: cultural_note
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These were
  alternatives:
  - These are
  lexicon: HALOT
  rationale: The demonstrative plural introduces the genealogy. English idiom in narrative/genealogical
    listing is smoother with past tense, since the verse reports a recorded lineage.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  lexicon: HALOT
  rationale: The construct plural of בן most directly means 'sons of.' In genealogical
    contexts it can sometimes broaden to descendants, but here the immediate function
    is to identify a family line, and 'sons of' preserves the formal structure of
    the Hebrew.
- source_word: אֲבִיחַיִל
  chosen: Abihail
  rationale: 'Personal name transliterated according to the translation philosophy:
    translate titles, transliterate names.'
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: Repeated construct marker in the genealogy. 'Son of' preserves the Hebrew
    chain exactly; while genealogies can telescope generations, the text itself uses
    the singular filial formula throughout.
- source_word: חוּרִי
  chosen: Huri
  rationale: Personal name transliterated by standard convention.
- source_word: יָרוֹחַ
  chosen: Jaroah
  alternatives:
  - Jaroh
  rationale: Personal name transliterated. 'Jaroah' reflects a conventional English
    representation of the Hebrew vowels and final ח.
- source_word: גִּלְעָד
  chosen: Gilead
  rationale: Personal name transliterated in its standard English form.
- source_word: מִיכָאֵל
  chosen: Michael
  alternatives:
  - Micael
  rationale: Standard English transliteration of the personal name.
- source_word: יְשִׁישַׁי
  chosen: Jeshishai
  alternatives:
  - Jeshishay
  rationale: Personal name transliterated; this form preserves the consonantal shape
    and common English convention.
- source_word: יַחְדּוֹ
  chosen: Jahdo
  alternatives:
  - Jachdō
  - Yahdo
  rationale: Personal name transliterated. 'Jahdo' is a readable conventional English
    form for the proper name.
- source_word: בּוּז
  chosen: Buz
  rationale: Personal name transliterated directly.
