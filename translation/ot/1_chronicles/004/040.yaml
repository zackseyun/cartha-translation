id: 1CH.4.40
reference: 1 Chronicles 4:40
source:
  edition: WLC
  text: וַֽ/יִּמְצְא֤וּ מִרְעֶה֙ שָׁמֵ֣ן וָ/ט֔וֹב וְ/הָ/אָ֨רֶץ֙ רַחֲבַ֣ת יָדַ֔יִם
    וְ/שֹׁקֶ֖טֶת וּ/שְׁלֵוָ֑ה כִּ֣י מִן חָ֔ם הַ/יֹּשְׁבִ֥ים שָׁ֖ם לְ/פָנִֽים־׃
translation:
  text: And they found rich and good pasture, and the land was broad, quiet, and peaceful,
    for some of Ham's descendants had lived there formerly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for Hamites had lived there before.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִרְעֶה
  chosen: pasture
  alternatives:
  - pastureland
  - grazing place
  lexicon: HALOT
  rationale: The noun denotes a place for grazing. 'Pasture' is natural English and
    fits the immediate context of seeking grazing for flocks.
- source_word: שָׁמֵן
  chosen: rich
  alternatives:
  - fat
  - fertile
  lexicon: HALOT
  rationale: Literally 'fat,' but in land/pasture context it describes luxuriant,
    fertile abundance. 'Rich' communicates the idiomatic sense in readable modern
    English without sounding wooden.
- source_word: טוֹב
  chosen: good
  alternatives:
  - pleasant
  - fine
  lexicon: HALOT
  rationale: A broad positive adjective; 'good' preserves the simple evaluative force
    and pairs naturally with 'rich'.
- source_word: רַחֲבַת יָדַיִם
  chosen: broad
  alternatives:
  - wide on both sides
  - spacious
  lexicon: HALOT
  rationale: The idiom literally involves 'broad of hands,' meaning roomy or extensive.
    'Broad' is concise and idiomatic in English when predicated of land.
- source_word: שֹׁקֶטֶת
  chosen: quiet
  alternatives:
  - undisturbed
  - tranquil
  lexicon: HALOT
  rationale: The participial form describes the land as undisturbed or at rest. 'Quiet'
    is a clear, accessible rendering.
- source_word: שְׁלֵוָה
  chosen: peaceful
  alternatives:
  - secure
  - at ease
  - prosperous
  lexicon: HALOT
  rationale: The term can denote ease, security, or tranquility. Here, paired with
    'quiet,' 'peaceful' best captures the settled condition of the land without overreading
    economic prosperity.
- source_word: כִּי מִן חָם הַיֹּשְׁבִים שָׁם לְפָנִים
  chosen: for some of Ham's descendants had lived there formerly
  alternatives:
  - for those living there formerly were from Ham
  - for Hamites had lived there before
  lexicon: HALOT
  rationale: 'The clause explains why the land was quiet and open: its earlier inhabitants
    were Hamites. Hebrew omits an explicit word for ''descendants,'' but English requires
    a natural expression for ethnic descent from Ham. ''Formerly'' renders לְפָנִים
    idiomatically as ''before/in earlier times.'''
- source_word: חָם
  chosen: Ham
  rationale: Proper name; transliterated per translation philosophy.
