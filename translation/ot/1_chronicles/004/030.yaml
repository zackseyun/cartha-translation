id: 1CH.4.30
reference: 1 Chronicles 4:30
source:
  edition: WLC
  text: וּ/בִ/בְתוּאֵ֥ל וּ/בְ/חָרְמָ֖ה וּ/בְ/צִֽיקְלָֽג׃
translation:
  text: and in Bethuel, and in Hormah, and in Ziklag,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/בִ/בְתוּאֵל
  chosen: and in Bethuel
  alternatives:
  - and at Bethuel
  lexicon: HALOT
  rationale: The prefixed conjunction וּ is rendered 'and,' continuing the settlement
    list. The preposition ב is most naturally 'in' for locations in an inventory of
    towns. בְתוּאֵל is a place name here, so it is transliterated 'Bethuel' rather
    than translated.
- source_word: וּ/בְ/חָרְמָה
  chosen: and in Hormah
  alternatives:
  - and at Hormah
  lexicon: HALOT
  rationale: Again, ו plus ב is rendered 'and in' to preserve the repetitive structure
    of the Hebrew list. חָרְמָה is a toponym and is therefore transliterated as 'Hormah'
    by standard English convention.
- source_word: וּ/בְ/צִֽיקְלָג
  chosen: and in Ziklag
  alternatives:
  - and at Ziklag
  lexicon: HALOT
  rationale: The same list formula continues here. 'In' is preferred over 'at' for
    consistency across the sequence of towns. צִקְלָג is a place name and is transliterated
    'Ziklag.'
