id: 1CH.4.22
reference: 1 Chronicles 4:22
source:
  edition: WLC
  text: וְ/יוֹקִ֞ים וְ/אַנְשֵׁ֣י כֹזֵבָ֗א וְ/יוֹאָ֧שׁ וְ/שָׂרָ֛ף אֲשֶׁר בָּעֲל֥וּ
    לְ/מוֹאָ֖ב וְ/יָשֻׁ֣בִי לָ֑חֶם וְ/הַ/דְּבָרִ֖ים עַתִּיקִֽים־׃
translation:
  text: and Jokim, and the men of Cozeba, and Joash, and Saraph, who ruled in Moab
    and returned to Lehem. These records are ancient.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who possessed Moab,' 'who became lords in Moab,' or possibly 'who married
      into Moab.' The Hebrew expression is terse and uncertain.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew uncertain: possibly a proper name, ''Jashubi-lehem'' (or ''Jashub-lehem''),
      rather than ''returned to Lehem.'' Some also connect the place with Bethlehem.'
    reason: alternative_reading
  - marker: c
    text: Or, 'and the matters are ancient' / 'and these things are from ancient times.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹקִים
  chosen: Jokim
  rationale: Proper name; transliterated according to the project's policy to transliterate
    personal names rather than translate them.
- source_word: אַנְשֵׁי כֹזֵבָא
  chosen: the men of Cozeba
  alternatives:
  - the men of Chezib
  - the people of Cozeba
  lexicon: HALOT
  rationale: אַנְשֵׁי is the construct plural 'men of.' כֹזֵבָא appears to be a place
    name; 'Cozeba' preserves the Hebrew form more directly than traditional 'Chezib.'
    'Men of' is retained rather than the broader 'people of' because the Hebrew is
    specifically masculine plural.
- source_word: יוֹאָשׁ
  chosen: Joash
  rationale: Proper name; standard English transliteration.
- source_word: שָׂרָף
  chosen: Saraph
  rationale: Proper name; transliterated as a personal name, not translated as the
    common noun 'burning one' or related senses, because the context is genealogical.
- source_word: אֲשֶׁר בָּעֲלוּ לְמוֹאָב
  chosen: who ruled in Moab
  alternatives:
  - who possessed Moab
  - who married into Moab
  - who became lords in Moab
  lexicon: HALOT
  rationale: The verb בעל in the qal can carry senses related to possessing, ruling,
    or being lord over; in this genealogical-historical note, 'ruled in Moab' gives
    a natural English rendering of status or dominion. Because the phrase is terse
    and somewhat obscure, alternatives are preserved in a footnote.
- source_word: יָשֻׁבִי לָחֶם
  chosen: returned to Lehem
  alternatives:
  - Jashubi-lehem
  - and they returned to Bethlehem
  - Jashub-lehem
  lexicon: HALOT
  rationale: The consonantal form is difficult and has been taken either as a proper
    name or as a verbal phrase plus place name. Given the morphology supplied, the
    first element is treated as a proper-name-like form, but the overall phrase is
    plausibly understood as a verbal idea 'returned' with a place name 'Lehem.' Because
    the text is notoriously difficult, the proper-name alternative is preserved in
    a footnote.
- source_word: הַדְּבָרִים עַתִּיקִים
  chosen: These records are ancient
  alternatives:
  - and the matters are ancient
  - and these things are from ancient times
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words,' 'matters,' or by extension 'records/account'
    in context. In this genealogical note, the sense is that the information derives
    from old records or ancient tradition. 'These records are ancient' communicates
    the idiom in readable English while staying close to the source.
