id: 1CH.4.23
reference: 1 Chronicles 4:23
source:
  edition: WLC
  text: הֵ֚מָּה הַ/יּ֣וֹצְרִ֔ים וְ/יֹשְׁבֵ֥י נְטָעִ֖ים וּ/גְדֵרָ֑ה עִם הַ/מֶּ֥לֶךְ
    בִּ/מְלַאכְתּ֖/וֹ יָ֥שְׁבוּ שָֽׁם־׃ס
translation:
  text: These were the potters and the inhabitants of Netaim and Gederah; they lived
    there with the king for his work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'These were the potters, and those who lived among plantings
      and walls/enclosures.' The Hebrew terms Netaim and Gederah may be read either
      as place names or as common nouns.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  chosen: These were
  alternatives:
  - They were
  - These are
  lexicon: HALOT
  rationale: Demonstrative pronoun referring back to the preceding group in the genealogy.
    English supplies 'were' naturally in this verbless identification clause.
- source_word: הַיּוֹצְרִים
  chosen: the potters
  alternatives:
  - the craftsmen
  - the formers
  lexicon: HALOT
  rationale: From יצר, here commonly used for pottery workers/artisans who shape clay.
    'Potters' is the most specific and conventional sense in this context.
- source_word: וְיֹשְׁבֵי
  chosen: and the inhabitants of
  alternatives:
  - and those who lived in
  - and dwellers in
  lexicon: HALOT
  rationale: Construct participle of ישב indicating settled residents. 'Inhabitants
    of' is natural English and preserves the nominal force.
- source_word: נְטָעִים
  chosen: Netaim
  alternatives:
  - plantings
  lexicon: HALOT
  rationale: Although the noun can mean 'plantings,' in this genealogical-geographical
    context it is best taken as a place name, traditionally rendered Netaim.
- source_word: וּגְדֵרָה
  chosen: and Gederah
  alternatives:
  - and the wall/enclosure
  lexicon: HALOT
  rationale: Best understood as the place name Gederah alongside Netaim. The common
    noun sense 'wall, enclosure' is less likely in this list-like context.
- source_word: עִם הַמֶּלֶךְ
  chosen: with the king
  alternatives:
  - in the service of the king
  - near the king
  lexicon: HALOT
  rationale: The preposition עִם normally means 'with.' In context it likely implies
    royal association or service, but the simpler wording preserves the Hebrew while
    allowing that implication to stand.
- source_word: בִּמְלַאכְתּוֹ
  chosen: for his work
  alternatives:
  - in his work
  - for his service
  - in his service
  lexicon: HALOT
  rationale: מְלָאכָה denotes work, occupation, or service. With the king as antecedent
    of the suffix, 'for his work' communicates that they were attached to the king's
    labor/service.
- source_word: יָשְׁבוּ שָׁם
  chosen: they lived there
  alternatives:
  - they dwelt there
  - they stayed there
  lexicon: HALOT
  rationale: Qal perfect of ישב with שָׁם indicates residence in that location. 'Lived
    there' is readable modern English.
