id: 1CH.4.5
reference: 1 Chronicles 4:5
source:
  edition: WLC
  text: וּ/לְ/אַשְׁחוּר֙ אֲבִ֣י תְק֔וֹעַ הָי֖וּ שְׁתֵּ֣י נָשִׁ֑ים חֶלְאָ֖ה וְ/נַעֲרָֽה׃
translation:
  text: 'Ashhur the father of Tekoa had two wives: Helah and Naarah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'founder of Tekoa' / 'ancestor of Tekoa'; in genealogies, 'father of'
      can denote a clan founder or settlement founder, not only an immediate biological
      father.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְאַשְׁחוּר
  chosen: Ashhur
  alternatives:
  - And Ashhur
  - Now Ashhur
  lexicon: HALOT
  rationale: The conjunction and preposition attached to the proper name are best
    taken here as a discourse-linking introduction in the genealogy rather than requiring
    a wooden 'and to Ashhur.' In smooth English genealogy style, the main referent
    is simply 'Ashhur.' The connective force is not semantically weighty enough to
    preserve awkwardly in the main text.
- source_word: אֲבִי תְקוֹעַ
  chosen: the father of Tekoa
  alternatives:
  - founder of Tekoa
  - ancestor of Tekoa
  lexicon: HALOT
  rationale: In genealogical contexts, אָב can denote a literal father, ancestor,
    or founder/patron of a clan or settlement. 'Father of Tekoa' is the most transparent
    and formally faithful rendering, while allowing readers to infer the broader genealogical
    sense. Alternatives are possible but less direct.
- source_word: הָיוּ
  chosen: had
  alternatives:
  - there were to
  - were
  lexicon: HALOT
  rationale: 'Although the Hebrew uses the verb ''were,'' idiomatic English expresses
    possession with ''had'' in this construction: ''had two wives.'' This is a standard
    optimal-equivalence adjustment that preserves the sense without wooden phrasing.'
- source_word: שְׁתֵּי נָשִׁים
  chosen: two wives
  alternatives:
  - two women
  lexicon: HALOT
  rationale: Given the possessive/existential construction with a named man in a genealogical
    notice, נָשִׁים clearly means 'wives,' not merely 'women.' This is the natural
    and contextually precise rendering.
- source_word: חֶלְאָה
  chosen: Helah
  alternatives:
  - Heleh
  lexicon: HALOT
  rationale: Proper names are transliterated by standard English conventions. 'Helah'
    reflects the consonantal form clearly and reads naturally in English.
- source_word: וְנַעֲרָה
  chosen: and Naarah
  alternatives:
  - and Naarah
  lexicon: HALOT
  rationale: The conjunction is retained before the second wife's name in a simple
    coordinate list. The name is transliterated; 'Naarah' is a straightforward representation
    of the Hebrew form, though 'Naarah'/'Naarah' style variation exists in English
    traditions.
