id: 1CH.4.27
reference: 1 Chronicles 4:27
source:
  edition: WLC
  text: וּ/לְ/שִׁמְעִ֞י בָּנִ֨ים שִׁשָּׁ֤ה עָשָׂר֙ וּ/בָנ֣וֹת שֵׁ֔שׁ וּ/לְ/אֶחָ֕י/ו
    אֵ֖ין בָּנִ֣ים רַבִּ֑ים וְ/כֹל֙ מִשְׁפַּחְתָּ֔/ם לֹ֥א הִרְבּ֖וּ עַד בְּנֵ֥י יְהוּדָֽה־׃ס
translation:
  text: Shimei had sixteen sons and six daughters, but his brothers did not have many
    sons, and all their clans did not multiply as much as the sons of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'did not become as numerous as the sons of Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְשִׁמְעִי
  chosen: Shimei had
  alternatives:
  - and to Shimei
  - Shimei
  lexicon: HALOT
  rationale: The preposition ל with a genealogical subject commonly introduces possession/existence
    ('to Shimei [were]'), which idiomatic English renders as 'Shimei had.' 'Shimei'
    is transliterated as a personal name per project policy.
- source_word: בָּנִים שִׁשָּׁה עָשָׂר
  chosen: sixteen sons
  alternatives:
  - sons, sixteen
  lexicon: HALOT
  rationale: Straightforward cardinal expression; reordered for natural English while
    preserving the count and referent.
- source_word: וּבָנוֹת שֵׁשׁ
  chosen: and six daughters
  alternatives:
  - and daughters, six
  lexicon: HALOT
  rationale: Direct rendering of the coordinated phrase; English places the number
    before the noun.
- source_word: וּלְאֶחָיו
  chosen: but his brothers
  alternatives:
  - and his brothers
  - and to his brothers
  lexicon: HALOT
  rationale: The conjunction is formally 'and,' but the clause contrasts Shimei's
    numerous children with his brothers' fewer sons, so 'but' best reflects the discourse
    relation in readable English.
- source_word: אֵין בָּנִים רַבִּים
  chosen: did not have many sons
  alternatives:
  - there were not many sons
  - had no many sons
  lexicon: HALOT
  rationale: Existential אֵין with the prepositional subject is idiomatically rendered
    as lack/absence. 'Many sons' preserves רַבִּים without overstating as 'very many.'
- source_word: וְכֹל מִשְׁפַּחְתָּם
  chosen: and all their clans
  alternatives:
  - and all their families
  - and their whole family
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in genealogical contexts often denotes a clan-level kinship
    unit rather than the modern nuclear 'family.' 'Their' refers back to the brothers'
    line collectively.
- source_word: לֹא הִרְבּוּ
  chosen: did not multiply
  alternatives:
  - did not become numerous
  - did not increase
  lexicon: HALOT
  rationale: The Hiphil of רבה here refers to becoming numerous/increasing in number.
    'Multiply' preserves the genealogical-population sense and echoes biblical idiom.
- source_word: עַד בְּנֵי יְהוּדָה
  chosen: as much as the sons of Judah
  alternatives:
  - up to the sons of Judah
  - to the level of the sons of Judah
  - like the sons of Judah
  lexicon: HALOT
  rationale: עַד here expresses extent/measure ('up to, as far as'), not simple spatial
    direction. The sense is that their clans did not grow to the numerical level of
    Judah's descendants. 'Sons of Judah' is retained as a standard genealogical expression.
