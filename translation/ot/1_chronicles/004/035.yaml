id: 1CH.4.35
reference: 1 Chronicles 4:35
source:
  edition: WLC
  text: וְ/יוֹאֵ֑ל וְ/יֵהוּא֙ בֶּן י֣וֹשִׁבְיָ֔ה בֶּן שְׂרָיָ֖ה בֶּן עֲשִׂיאֵֽל־־־׃
translation:
  text: and Joel, and Jehu son of Joshibiah, son of Seraiah, son of Asiel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew genealogical 'son of' can in some contexts mean a more remote descendant,
      but here it is rendered literally in the genealogy formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ
  chosen: and
  lexicon: HALOT
  rationale: The prefixed conjunction simply links this name and the following genealogy
    to the preceding list; rendered straightforwardly as 'and.'
- source_word: יוֹאֵל
  chosen: Joel
  lexicon: HALOT
  rationale: Personal name; transliterated by standard English convention rather than
    translated, in keeping with the project's policy for names.
- source_word: וְ
  chosen: and
  lexicon: HALOT
  rationale: Second prefixed conjunction introducing another person in the list; rendered
    as 'and' to preserve the serial structure of the genealogy.
- source_word: יֵהוּא
  chosen: Jehu
  alternatives:
  - Yehu
  lexicon: HALOT
  rationale: Personal name; transliterated in its conventional English form 'Jehu.'
    A more phonetic transliteration is possible, but standard biblical English usage
    aids readability and recognition.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In genealogical contexts בן normally denotes immediate filiation, though
    it can sometimes be broader. Here 'son of' best matches the plain sense and the
    repetitive genealogy formula.
- source_word: יֹשִׁבְיָה
  chosen: Joshibiah
  alternatives:
  - Joshibiah
  lexicon: HALOT
  rationale: Personal name; transliterated. English spelling varies slightly, but
    'Joshibiah' reflects the Hebrew form adequately and reads naturally.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: Repeated genealogical marker; kept consistent with the first occurrence
    for transparency and rhythm.
- source_word: שְׂרָיָה
  chosen: Seraiah
  alternatives:
  - Seraiah
  lexicon: HALOT
  rationale: Personal name; transliterated in the standard English biblical form 'Seraiah.'
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: Repeated genealogical marker; rendered consistently as 'son of.'
- source_word: עֲשִׂיאֵל
  chosen: Asiel
  alternatives:
  - Asiael
  lexicon: HALOT
  rationale: Personal name; transliterated. 'Asiel' is a standard concise English
    form for this Hebrew name.
