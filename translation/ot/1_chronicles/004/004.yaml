id: 1CH.4.4
reference: 1 Chronicles 4:4
source:
  edition: WLC
  text: וּ/פְנוּאֵל֙ אֲבִ֣י גְדֹ֔ר וְ/עֵ֖זֶר אֲבִ֣י חוּשָׁ֑ה אֵ֤לֶּה בְנֵי חוּר֙ בְּכ֣וֹר
    אֶפְרָ֔תָה אֲבִ֖י בֵּ֥ית לָֽחֶם־׃
translation:
  text: Penuel, the father of Gedor, and Ezer, the father of Hushah—these were the
    sons of Hur, the firstborn of Ephrathah, the father of Bethlehem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'father of' in this genealogical context may also mean 'founder of'
      or 'ancestor of,' especially in relation to towns or clans.
    reason: lexical_alternative
  - marker: b
    text: '''Penuel'' is spelled ''Peniel'' in some other passages; this reflects
      a variant form of the same name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְנוּאֵל
  chosen: Penuel
  alternatives:
  - Peniel
  lexicon: HALOT
  rationale: Personal name, so transliterated rather than translated. The spelling
    'Penuel' follows the consonantal form here; 'Peniel' is a known variant elsewhere
    and worth preserving as an alternative form.
- source_word: אֲבִי
  chosen: the father of
  alternatives:
  - founder of
  - ancestor of
  lexicon: HALOT
  rationale: In genealogical and settlement contexts in Chronicles, 'father of' can
    denote progenitor, founder, or chief associated with a place or clan. The formal
    rendering 'father of' is retained in the main text to preserve the Hebrew idiom,
    while allowing the broader semantic range to remain available.
- source_word: גְדֹר
  chosen: Gedor
  lexicon: HALOT
  rationale: Proper place/clan name; transliterated.
- source_word: עֵזֶר
  chosen: Ezer
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
- source_word: חוּשָׁה
  chosen: Hushah
  lexicon: HALOT
  rationale: Proper place/clan name; transliterated.
- source_word: אֵלֶּה
  chosen: these were
  alternatives:
  - these are
  lexicon: HALOT
  rationale: The verbless Hebrew clause is naturally rendered in English with an implied
    copula. Past tense fits the genealogical narrative context.
- source_word: בְנֵי
  chosen: sons of
  alternatives:
  - descendants of
  lexicon: HALOT
  rationale: The Hebrew term is literally 'sons of.' In genealogies it can sometimes
    function more broadly, but 'sons of' best preserves the source wording and structure
    here.
- source_word: חוּר
  chosen: Hur
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
- source_word: בְּכֹר
  chosen: the firstborn of
  alternatives:
  - firstborn son of
  lexicon: HALOT
  rationale: Construct form indicating Hur's status relative to Ephrathah. 'The firstborn
    of' is precise and does not add 'son' beyond what the Hebrew states.
- source_word: אֶפְרָתָה
  chosen: Ephrathah
  alternatives:
  - Ephratah
  lexicon: HALOT
  rationale: Proper name; transliterated. The form 'Ephrathah' is standard in English
    Bible usage for this Hebrew spelling.
- source_word: בֵּית לָחֶם
  chosen: Bethlehem
  alternatives:
  - Beth-lehem
  lexicon: HALOT
  rationale: Established English transliteration of the place name. Although the components
    literally mean 'house of bread,' names are transliterated by project philosophy.
