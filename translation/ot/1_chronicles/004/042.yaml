id: 1CH.4.42
reference: 1 Chronicles 4:42
source:
  edition: WLC
  text: וּ/מֵ/הֶ֣ם מִן בְּנֵ֣י שִׁמְע֗וֹן הָלְכוּ֙ לְ/הַ֣ר שֵׂעִ֔יר אֲנָשִׁ֖ים חֲמֵ֣שׁ
    מֵא֑וֹת וּ/פְלַטְיָ֡ה וּ֠/נְעַרְיָה וּ/רְפָיָ֧ה וְ/עֻזִּיאֵ֛ל בְּנֵ֥י יִשְׁעִ֖י
    בְּ/רֹאשָֽׁ/ם׀־׃
translation:
  text: And some of them, from the sons of Simeon, went to Mount Seir—five hundred
    men—with Pelatyah, Neariah, Rephayah, and Uzziel, sons of Ishi, at their head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and Pelatyah, Neariah, Rephayah, and Uzziel ... were their leaders.'
      The Hebrew syntax places the names before 'sons of Ishi, at their head,' indicating
      these men led the group.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵהֶם
  chosen: And some of them
  alternatives:
  - And from them
  - Now some of them
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition and pronoun naturally introduces
    a subset from the previously mentioned group. 'Some of them' is idiomatic English
    and preserves the partitive sense better than the more wooden 'from them.'
- source_word: מִן בְּנֵי שִׁמְעוֹן
  chosen: from the sons of Simeon
  alternatives:
  - from the Simeonites
  - from among the sons of Simeon
  lexicon: HALOT
  rationale: Retains the genealogical phrasing of the Hebrew. 'Simeonites' is possible,
    but 'sons of Simeon' better matches the chronicler's lineage-oriented style.
- source_word: הָלְכוּ
  chosen: went
  alternatives:
  - traveled
  - marched
  lexicon: HALOT
  rationale: Simple narrative motion verb; 'went' is the most direct and unembellished
    rendering.
- source_word: לְהַר שֵׂעִיר
  chosen: to Mount Seir
  alternatives:
  - to the hill country of Seir
  lexicon: HALOT
  rationale: The construct with proper name is conventionally rendered 'Mount Seir.'
    'Hill country' is possible contextually, but the standard toponym is preferable
    unless context demands otherwise.
- source_word: אֲנָשִׁים חֲמֵשׁ מֵאוֹת
  chosen: five hundred men
  alternatives:
  - five hundred men strong
  - a force of five hundred men
  lexicon: HALOT
  rationale: This is a straightforward numerical apposition identifying the size of
    the group. 'Five hundred men' is clear and sufficiently formal without adding
    military nuance not explicit in the text.
- source_word: וּפְלַטְיָה וּנְעַרְיָה וּרְפָיָה וְעֻזִּיאֵל
  chosen: with Pelatyah, Neariah, Rephayah, and Uzziel
  alternatives:
  - and Pelatyah, Neariah, Rephaiah, and Uzziel
  lexicon: HALOT
  rationale: The Hebrew lists these leaders after the group size, with the following
    phrase 'at their head.' Rendering with 'with' makes the English syntax natural
    while preserving their association with the expedition. Name forms are transliterated
    rather than translated, per philosophy. 'Rephayah' reflects the Hebrew vocalization
    here more closely than the more familiar 'Rephaiah.'
- source_word: בְּנֵי יִשְׁעִי
  chosen: sons of Ishi
  alternatives:
  - the sons of Ishi
  lexicon: HALOT
  rationale: Genealogical identification of the four named men. The article is not
    required in English in apposition.
- source_word: בְּרֹאשָׁם
  chosen: at their head
  alternatives:
  - as their leaders
  - leading them
  lexicon: HALOT
  rationale: Literally 'at their head.' This idiom communicates leadership while preserving
    the Hebrew image. It most naturally refers to the named sons of Ishi as leaders
    of the five hundred.
