id: 1CH.4.25
reference: 1 Chronicles 4:25
source:
  edition: WLC
  text: שַׁלֻּ֥ם בְּנ֛/וֹ מִבְשָׂ֥ם בְּנ֖/וֹ מִשְׁמָ֥ע בְּנֽ/וֹ׃
translation:
  text: Shallum his son, Mibsam his son, Mishma his son.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שַׁלֻּם
  chosen: Shallum
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention
    rather than translated, in keeping with the philosophy to transliterate names.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - son of him
  - his descendant
  lexicon: HALOT
  rationale: Construct noun בן with 3ms suffix means 'his son.' In this genealogy,
    the repeated formula marks direct filial succession in the list. 'Descendant'
    is possible in some genealogical contexts, but 'son' is the plain lexical sense
    and should be retained unless context requires broader lineage language.
- source_word: מִבְשָׂם
  chosen: Mibsam
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated.
- source_word: מִשְׁמָע
  chosen: Mishma
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated.
