id: 1CH.4.15
reference: 1 Chronicles 4:15
source:
  edition: WLC
  text: וּ/בְנֵי֙ כָּלֵ֣ב בֶּן יְפֻנֶּ֔ה עִ֥ירוּ אֵלָ֖ה וָ/נָ֑עַם וּ/בְנֵ֥י אֵלָ֖ה
    וּ/קְנַֽז־׃
translation:
  text: 'And the sons of Caleb son of Jephunneh: Iru, Elah, and Naam; and the sons
    of Elah: Kenaz.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more broadly, 'the descendants of Caleb son of Jephunneh.' In genealogies,
      'sons' can sometimes function as a wider family term, though here the immediate
      list favors 'sons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The descendants of
  lexicon: HALOT
  rationale: בני in genealogical contexts most directly means 'sons of,' though it
    can extend to descendants. Here the verse lists immediate named offspring, so
    'sons of' is the most transparent rendering.
- source_word: כָּלֵב
  chosen: Caleb
  rationale: Proper personal name; transliterated according to standard English convention.
- source_word: בֶּן יְפֻנֶּה
  chosen: son of Jephunneh
  alternatives:
  - the son of Jephunneh
  lexicon: HALOT
  rationale: Standard genealogical apposition identifying which Caleb is meant. English
    omits the article naturally.
- source_word: עִירוּ
  chosen: Iru
  alternatives:
  - Irû
  rationale: Proper name; transliterated in a readable standard English form.
- source_word: אֵלָה
  chosen: Elah
  rationale: Proper name; transliterated. Although אלה can also be a common noun elsewhere,
    here morphology and context indicate a personal name.
- source_word: וָנָעַם
  chosen: and Naam
  alternatives:
  - and Naamah
  rationale: The consonantal form and pointing here support the masculine proper name
    Naam. 'Naamah' would reflect a different form; therefore 'Naam' is preferred.
- source_word: וּבְנֵי אֵלָה
  chosen: and the sons of Elah
  alternatives:
  - and Elah's sons
  lexicon: HALOT
  rationale: Maintains the genealogical structure and repetition of the Hebrew. The
    phrase introduces a sub-branch under Elah.
- source_word: וּקְנַז
  chosen: Kenaz
  rationale: Proper name; transliterated according to standard English convention.
