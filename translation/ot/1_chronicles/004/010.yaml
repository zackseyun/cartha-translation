id: 1CH.4.10
reference: 1 Chronicles 4:10
source:
  edition: WLC
  text: וַ/יִּקְרָ֣א יַ֠עְבֵּץ לֵ/אלֹהֵ֨י יִשְׂרָאֵ֜ל לֵ/אמֹ֗ר אִם בָּרֵ֨ךְ תְּבָרֲכֵ֜/נִי
    וְ/הִרְבִּ֤יתָ אֶת גְּבוּלִ/י֙ וְ/הָיְתָ֤ה יָדְ/ךָ֙ עִמִּ֔/י וְ/עָשִׂ֥יתָ מֵּ/רָעָ֖ה
    לְ/בִלְתִּ֣י עָצְבִּ֑/י וַ/יָּבֵ֥א אֱלֹהִ֖ים אֵ֥ת אֲשֶׁר שָׁאָֽל־־־׃
translation:
  text: And Jabez called on the God of Israel, saying, “If you would indeed bless
    me and enlarge my territory, and let your hand be with me, and keep me from harm
    so that I may not suffer pain!” And God granted what he asked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “keep me from evil.” The Hebrew רָעָה can mean moral evil or harmful
      calamity; here the context favors protection from harm.
    reason: lexical_alternative
  - marker: b
    text: The wording “so that I may not suffer pain” echoes the explanation of Jabez’s
      name in the previous verse.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called on
  alternatives:
  - cried out to
  - invoked
  lexicon: HALOT
  rationale: In this prayer context, the verb means more than simply 'called'; 'called
    on' idiomatically conveys an appeal to God.
- source_word: לֵאלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase identifying Israel's God; definite article
    is natural in English.
- source_word: אִם בָּרֵךְ תְּבָרֲכֵנִי
  chosen: If you would indeed bless me
  alternatives:
  - Oh, that you would bless me
  - If blessing you would bless me
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the request. 'Indeed
    bless me' preserves the emphasis without awkward literalism. 'If' reflects the
    Hebrew particle, though in English the clause functions as an earnest wish/prayer.
- source_word: וְהִרְבִּיתָ אֶת גְּבוּלִי
  chosen: and enlarge my territory
  alternatives:
  - and increase my border
  - and make my boundary great
  lexicon: HALOT
  rationale: גְּבוּל can mean border, boundary, or territory. In context of blessing,
    'territory' best communicates expanded landholding or sphere within readable English.
- source_word: וְהָיְתָה יָדְךָ עִמִּי
  chosen: and let your hand be with me
  alternatives:
  - and may your hand be with me
  - and your hand was with me
  lexicon: HALOT
  rationale: '''Your hand'' is a common Hebrew idiom for divine power/help. Preserving
    the idiom is preferable; ''let'' supplies natural English for the prayer request.'
- source_word: וְעָשִׂיתָ מֵּרָעָה
  chosen: and keep me from harm
  alternatives:
  - and act so as to remove evil from me
  - and do away with evil from me
  - and keep me from evil
  lexicon: HALOT
  rationale: The Hebrew is compressed and somewhat difficult. Given the following
    purpose clause about pain, the sense is a request for protection from harmful
    evil/calamity. 'Keep me from harm' is clear and contextually fitting.
- source_word: לְבִלְתִּי עָצְבִּי
  chosen: so that I may not suffer pain
  alternatives:
  - that I may not cause pain
  - so that it might not grieve me
  lexicon: HALOT
  rationale: The verb relates to pain, hurt, or grief and echoes Jabez's naming in
    the previous verse. The first-person suffix favors 'I may not suffer pain' rather
    than 'cause pain.'
- source_word: וַיָּבֵא אֱלֹהִים אֵת אֲשֶׁר שָׁאָל
  chosen: And God granted what he asked
  alternatives:
  - And God brought about what he requested
  - And God gave what he asked for
  lexicon: HALOT
  rationale: The idiom with בוא plus object here means God caused the request to come
    about, i.e., granted it. 'Granted what he asked' is idiomatic and accurate.
