theological_decisions:
- issue: Nature of Jabez's request for expanded גְּבוּל
  chosen_reading: Rendered in ordinary territorial terms without importing prosperity-theology
    implications.
  alternative_readings:
  - Rendered more abstractly as 'sphere of influence'
  rationale: The Hebrew most naturally refers to boundary/territory. The translation
    avoids both flattening it into a metaphor and overloading it with modern theological
    applications not stated in the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Meaning of רָעָה in the prayer
  chosen_reading: Rendered as 'harm' rather than the more morally charged 'evil' in
    the main text.
  alternative_readings:
  - evil
  rationale: In this context, paired with the request not to suffer pain, the term
    likely points to calamity or harmful adversity. To preserve the lexical alternative
    and theological tension, 'evil' is noted in a footnote.
  doctrine_reference: Translation philosophy §§3, 5
