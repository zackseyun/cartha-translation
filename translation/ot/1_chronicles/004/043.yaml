id: 1CH.4.43
reference: 1 Chronicles 4:43
source:
  edition: WLC
  text: וַ/יַּכּ֕וּ אֶת שְׁאֵרִ֥ית הַ/פְּלֵטָ֖ה לַ/עֲמָלֵ֑ק וַ/יֵּ֣שְׁבוּ שָׁ֔ם עַ֖ד
    הַ/יּ֥וֹם הַ/זֶּֽה־׃
translation:
  text: And they struck down the remnant of the survivors of Amalek, and they have
    lived there to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the remnant that had escaped of the Amalekites.' The Hebrew expression
      combines two near-synonymous terms for those left after devastation.
    reason: lexical_alternative
  - marker: b
    text: Or 'they settled there to this day.' The verb can denote dwelling or settling
      in a place.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכּוּ
  chosen: they struck down
  alternatives:
  - they struck
  - they defeated
  - they killed
  lexicon: HALOT
  rationale: From נכה in the waw-consecutive narrative form. 'Struck down' preserves
    the military sense and likely lethal outcome in context without over-specifying
    beyond the verb itself.
- source_word: שְׁאֵרִית הַפְּלֵטָה
  chosen: the remnant of the survivors
  alternatives:
  - the surviving remnant
  - the remainder of the escapees
  - the remnant that had escaped
  lexicon: HALOT
  rationale: The paired nouns intensify the idea of those left after prior destruction.
    Rendering both terms preserves the Hebrew emphasis better than collapsing them
    into a single English word.
- source_word: לַעֲמָלֵק
  chosen: of Amalek
  alternatives:
  - of the Amalekites
  - belonging to Amalek
  lexicon: HALOT
  rationale: The proper name Amalek can denote the people group descended from/identified
    with Amalek. 'Of Amalek' is formally close to the Hebrew; 'Amalekites' is a possible
    interpretive expansion.
- source_word: וַיֵּשְׁבוּ
  chosen: they have lived
  alternatives:
  - they lived
  - they settled
  - they dwelt
  lexicon: HALOT
  rationale: ישב commonly means 'sit, dwell, live, settle.' In this context of taking
    possession of a place, 'lived' is natural English. The perfect English form with
    'to this day' reflects the continuing state from the narrator's perspective.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb referring back to the place just mentioned.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  - to the present day
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the Hebrew temporal expression in narrative
    prose.
