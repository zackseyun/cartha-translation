id: 1CH.4.2
reference: 1 Chronicles 4:2
source:
  edition: WLC
  text: וּ/רְאָיָ֤ה בֶן שׁוֹבָל֙ הוֹלִ֣יד אֶת יַ֔חַת וְ/יַ֣חַת הֹלִ֔יד אֶת אֲחוּמַ֖י
    וְ/אֶת לָ֑הַד אֵ֖לֶּה מִשְׁפְּח֥וֹת הַ/צָּֽרְעָתִֽי־־־־׃ס
translation:
  text: Reaiah son of Shobal fathered Jahath, and Jahath fathered Ahumai and Lahad.
    These were the clans of the Zorathites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “families of the Zorathites.” The Hebrew term can denote extended kinship
      groups; “clans” is used here for clarity in a tribal genealogy.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/רְאָיָה
  chosen: Reaiah
  alternatives:
  - Reayah
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the project's policy for names. English spelling 'Reaiah' reflects common
    convention for this Hebrew form.
- source_word: בֶן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In genealogical contexts בן can denote immediate son or broader descent.
    Here 'son of' preserves the formal genealogical wording of the Hebrew while allowing
    the conventional elasticity of such lists.
- source_word: הוֹלִיד / הֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - was the father of
  - begot
  lexicon: HALOT
  rationale: ילד in the Hiphil in genealogies means to beget/father. 'Fathered' is
    concise, natural modern English and preserves the male genealogical sense better
    than the archaic 'begot'.
- source_word: יַחַת
  chosen: Jahath
  lexicon: HALOT
  rationale: Proper name; standard English transliteration.
- source_word: אֲחוּמַי
  chosen: Ahumai
  lexicon: HALOT
  rationale: Proper name; transliterated.
- source_word: לָהַד
  chosen: Lahad
  lexicon: HALOT
  rationale: Proper name; transliterated.
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - These men
  lexicon: HALOT
  rationale: Simple demonstrative referring back to the named descendants. 'These'
    is sufficient; 'men' is not explicit in the Hebrew.
- source_word: מִשְׁפְּחֹות
  chosen: clans
  alternatives:
  - families
  lexicon: HALOT
  rationale: In tribal/genealogical contexts, 'clans' better conveys extended kinship
    groups within a tribe than the narrower modern English 'families'.
- source_word: הַצָּרְעָתִי
  chosen: the Zorathites
  alternatives:
  - the people of Zorah
  - the Zareathites
  lexicon: HALOT
  rationale: Gentilic form from Zorah. 'Zorathites' is the standard English rendering
    for members of that locality/clan group and fits the genealogical notice.
