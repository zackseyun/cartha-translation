id: 1CH.4.24
reference: 1 Chronicles 4:24
source:
  edition: WLC
  text: בְּנֵ֖י שִׁמְע֑וֹן נְמוּאֵ֣ל וְ/יָמִ֔ין יָרִ֖יב זֶ֥רַח שָׁאֽוּל׃
translation:
  text: 'The sons of Simeon: Nemuel, Jamin, Jarib, Zerah, and Shaul.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nemuel is called Jemuel in some English traditions and in the parallel genealogy
      of Genesis 46:10; the Hebrew form here reads Nemuel.
    reason: alternative_reading
  - marker: b
    text: Zerah corresponds to Zohar in the parallel genealogy of Genesis 46:10 and
      Exodus 6:15.
    reason: textual_variant
  - marker: c
    text: Shaul is the Hebrew form of the name often Anglicized as Saul.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of 'son' introducing a genealogical list. 'Sons of'
    is the most direct and conventional rendering in this context; 'descendants of'
    is possible in genealogies but less precise here since individual named sons follow.
- source_word: שִׁמְעוֹן
  chosen: Simeon
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention in
    keeping with the translation philosophy to transliterate names.
- source_word: נְמוּאֵל
  chosen: Nemuel
  alternatives:
  - Jemuel
  lexicon: HALOT
  rationale: Proper name transliterated from the Hebrew form in this verse. 'Jemuel'
    reflects a variant form found in some English traditions and related passages,
    but the consonantal form here supports 'Nemuel'.
- source_word: וְיָמִין
  chosen: and Jamin
  lexicon: HALOT
  rationale: The conjunction ו is naturally rendered 'and' before the next name in
    the series. The proper name is transliterated as 'Jamin' by standard convention.
- source_word: יָרִיב
  chosen: Jarib
  lexicon: HALOT
  rationale: Proper name transliterated directly from the Hebrew. No contextual reason
    to translate the lexical sense of the name.
- source_word: זֶרַח
  chosen: Zerah
  alternatives:
  - Zohar
  lexicon: HALOT
  rationale: The Hebrew form in this verse is זֶרַח, which is best transliterated
    'Zerah.' 'Zohar' appears in the parallel genealogy of Genesis 46:10 and Exodus
    6:15, so it is preserved as an alternative textual/genealogical form rather than
    adopted here.
- source_word: שָׁאוּל
  chosen: Shaul
  alternatives:
  - Saul
  lexicon: HALOT
  rationale: Proper name transliterated from Hebrew. 'Saul' is the familiar Anglicized
    form, but 'Shaul' more transparently reflects the Hebrew spelling and aligns with
    the stated preference to transliterate names.
