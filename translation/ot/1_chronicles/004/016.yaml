id: 1CH.4.16
reference: 1 Chronicles 4:16
source:
  edition: WLC
  text: וּ/בְנֵ֖י יְהַלֶּלְאֵ֑ל זִ֣יף וְ/זִיפָ֔ה תִּירְיָ֖א וַ/אֲשַׂרְאֵֽל׃
translation:
  text: 'And the sons of Jehallelel: Ziph, Ziphah, Tiria, and Asarel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Asarel may also be spelled 'Asareel' in English transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons of,' introducing descendants
    in a genealogy. The prefixed conjunction is rendered 'And' to preserve the narrative/genealogical
    linkage.
- source_word: יְהַלֶּלְאֵל
  chosen: Jehallelel
  alternatives:
  - Jehaleleel
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. 'Jehallelel' reflects a standard English transliteration of the Hebrew
    form.
- source_word: זִיף
  chosen: Ziph
  rationale: Proper personal name; transliterated directly.
- source_word: וְזִיפָה
  chosen: Ziphah
  rationale: Proper personal name with conjunction; transliterated directly and joined
    with 'and' in English.
- source_word: תִּירְיָא
  chosen: Tiria
  alternatives:
  - Tiria
  rationale: Proper personal name; transliterated directly. English spelling 'Tiria'
    reflects the Hebrew consonants and vowels in standard form.
- source_word: וַאֲשַׂרְאֵל
  chosen: and Asarel
  alternatives:
  - and Asareel
  rationale: Proper personal name with conjunction. Rendered 'Asarel' as a straightforward
    transliteration of the Masoretic form; an alternate English spelling with double
    'e' appears in some traditions and is worth preserving in a footnote.
