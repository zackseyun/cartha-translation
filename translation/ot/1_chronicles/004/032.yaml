id: 1CH.4.32
reference: 1 Chronicles 4:32
source:
  edition: WLC
  text: וְ/חַצְרֵי/הֶם֙ עֵיטָ֣ם וָ/עַ֔יִן רִמּ֥וֹן וְ/תֹ֖כֶן וְ/עָשָׁ֑ן עָרִ֖ים חָמֵֽשׁ׃
translation:
  text: And their settlements were Etam, Ain, Rimmon, Tochen, and Ashan—five cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their villages.' The Hebrew term can refer to smaller settlements or
      enclosed habitations.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַצְרֵיהֶם
  chosen: their settlements
  alternatives:
  - their villages
  - their hamlets
  - their enclosures
  lexicon: HALOT
  rationale: חָצֵר can denote a settlement, village, or enclosed habitation. In this
    genealogical/topographical list, 'settlements' is natural modern English and broad
    enough to cover the likely sense without implying only small agricultural villages.
- source_word: עֵיטָם
  chosen: Etam
  rationale: Proper place name; transliterated according to the translation philosophy
    to transliterate names rather than translate them.
- source_word: עַיִן
  chosen: Ain
  alternatives:
  - Ayin
  rationale: Proper place name; transliterated. Although the common noun can mean
    'spring' or 'eye,' here morphology and context indicate a toponym in a list of
    towns.
- source_word: רִמּוֹן
  chosen: Rimmon
  rationale: Proper place name; transliterated. Though the noun can mean 'pomegranate,'
    here it functions as a town name.
- source_word: תֹכֶן
  chosen: Tochen
  alternatives:
  - Token
  rationale: Proper place name; transliterated. 'Tochen' reflects a straightforward
    transliteration of the consonantal form in this verse.
- source_word: עָשָׁן
  chosen: Ashan
  rationale: Proper place name; transliterated in keeping with the stated philosophy.
- source_word: עָרִים חָמֵשׁ
  chosen: five cities
  alternatives:
  - five towns
  lexicon: HALOT
  rationale: עִיר commonly means 'city' or 'town.' 'Cities' is the standard rendering
    and fits the summary statement counting the listed locations. 'Towns' is possible,
    but 'cities' preserves the conventional lexical force.
