id: 1CH.4.1
reference: 1 Chronicles 4:1
source:
  edition: WLC
  text: בְּנֵ֖י יְהוּדָ֑ה פֶּ֧רֶץ חֶצְר֛וֹן וְ/כַרְמִ֖י וְ/ח֥וּר וְ/שׁוֹבָֽל׃
translation:
  text: 'The sons of Judah: Perez, Hezron, Carmi, Hur, and Shobal.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of' can function genealogically for direct sons or more broadly
      for descendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - descendants of
  - children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in a genealogy. 'Sons of' is the most direct
    and conventional rendering, while in genealogical context it can denote descendants
    more broadly. Here the Hebrew form is preserved formally, and the broader genealogical
    flexibility is noted by alternative glosses.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Proper name of the tribe/ancestor Judah; standard English transliteration
    is appropriate per translation philosophy to transliterate names.
- source_word: פֶּרֶץ
  chosen: Perez
  alternatives:
  - Perez/Pharez
  lexicon: HALOT
  rationale: Proper name. 'Perez' reflects standard modern transliteration from Hebrew;
    'Pharez' is a traditional form mediated through Greek/older English and is not
    preferred in main text.
- source_word: חֶצְרוֹן
  chosen: Hezron
  lexicon: HALOT
  rationale: Proper name; standard English transliteration from Hebrew.
- source_word: כַרְמִי
  chosen: Carmi
  lexicon: HALOT
  rationale: Proper name; standard English transliteration from Hebrew. Although some
    genealogical discussions compare this name with other Judahite lines, the verse
    itself simply lists the name.
- source_word: חוּר
  chosen: Hur
  lexicon: HALOT
  rationale: Proper name; standard English transliteration from Hebrew.
- source_word: שׁוֹבָל
  chosen: Shobal
  lexicon: HALOT
  rationale: Proper name; standard English transliteration from Hebrew.
- source_word: וְ
  chosen: and
  alternatives:
  - ', (asyndetic list punctuation)'
  lexicon: HALOT
  rationale: The repeated conjunction marks a simple list of names. In idiomatic English
    genealogy style, commas plus a final 'and' best represent the Hebrew sequence
    without wooden repetition.
