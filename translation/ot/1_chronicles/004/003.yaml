id: 1CH.4.3
reference: 1 Chronicles 4:3
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה֙ אֲבִ֣י עֵיטָ֔ם יִזְרְעֶ֥אל וְ/יִשְׁמָ֖א וְ/יִדְבָּ֑שׁ וְ/שֵׁ֥ם
    אֲחוֹתָ֖/ם הַצְלֶלְפּֽוֹנִי׃
translation:
  text: 'These were the father of Etam: Jezreel, Ishma, and Idbash; and the name of
    their sister was Hazzelelponi.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'founder of Etam' or 'ancestor of Etam'; the Hebrew 'father
      of' can carry a broader genealogical sense in Chronicles.
    reason: lexical_alternative
  - marker: b
    text: Hazzelelponi is also spelled 'Hazzelelponi' in some English transliterations.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: These were
  alternatives:
  - And these were
  - Now these were
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces a genealogical notice.
    'These were' is natural English while preserving the presentational force of the
    Hebrew.
- source_word: אֲבִי
  chosen: the father of
  alternatives:
  - father of
  - founder of
  - ancestor of
  lexicon: HALOT
  rationale: In genealogical contexts אָב can denote immediate father, ancestor, or
    founder. Here 'the father of Etam' is the most direct rendering of the construct
    form and preserves the ambiguity without over-interpreting it as 'founder.'
- source_word: עֵיטָם
  chosen: Etam
  rationale: Proper place or clan name transliterated according to the translation
    philosophy to transliterate names rather than translate them.
- source_word: יִזְרְעֶאל
  chosen: Jezreel
  rationale: Proper personal name, transliterated by standard English convention.
- source_word: וְיִשְׁמָא
  chosen: Ishma
  alternatives:
  - Jishma
  rationale: Proper personal name. 'Ishma' follows a straightforward transliteration
    of the Hebrew form; 'Jishma' reflects another English convention but is less direct
    from the consonantal form.
- source_word: וְיִדְבָּשׁ
  chosen: and Idbash
  rationale: Proper personal name, transliterated. The conjunction is retained as
    part of the list structure.
- source_word: וְשֵׁם אֲחוֹתָם
  chosen: and the name of their sister was
  alternatives:
  - and their sister's name was
  lexicon: HALOT
  rationale: This reproduces the Hebrew nominal expression closely while remaining
    idiomatic in English. The suffix on 'sister' is plural ('their'), referring back
    to the named males.
- source_word: הַצְלֶלְפּוֹנִי
  chosen: Hazzelelponi
  alternatives:
  - Hazzelelponi
  rationale: Proper female name, transliterated. The doubled z reflects the assimilated
    article in the Hebrew spelling; English conventions vary, so an alternative spelling
    is worth preserving.
