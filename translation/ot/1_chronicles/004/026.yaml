id: 1CH.4.26
reference: 1 Chronicles 4:26
source:
  edition: WLC
  text: וּ/בְנֵ֖י מִשְׁמָ֑ע חַמּוּאֵ֥ל בְּנ֛/וֹ זַכּ֥וּר בְּנ֖/וֹ שִׁמְעִ֥י בְנֽ/וֹ׃
translation:
  text: 'The sons of Mishma: Hammuel his son, Zaccur his son, Shimei his son.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - descendants of
  lexicon: HALOT
  rationale: בני is the construct plural of 'sons.' In genealogical context, 'sons
    of' is the standard and sufficiently literal rendering. The prefixed conjunction
    can be left untranslated in English because the verse functions as a list item
    within a genealogy; 'the sons of' reads naturally while preserving the structure.
- source_word: מִשְׁמָע
  chosen: Mishma
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to the translation philosophy
    to preserve the Hebrew name rather than translate it.
- source_word: חַמּוּאֵל
  chosen: Hammuel
  alternatives:
  - Hamuel
  lexicon: HALOT
  rationale: Proper personal name; transliterated. 'Hammuel' closely reflects the
    consonantal form in the Masoretic Text. 'Hamuel' is a possible simplified English
    spelling but is not adopted here.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - son of him
  - his descendant
  lexicon: HALOT
  rationale: The singular construct with 3ms suffix straightforwardly means 'his son.'
    In this genealogy it marks direct filial succession, so the more specific 'his
    son' is preferred over the broader 'his descendant.'
- source_word: זַכּוּר
  chosen: Zaccur
  alternatives:
  - Zakkur
  lexicon: HALOT
  rationale: Proper personal name; transliterated. 'Zaccur' is a standard English
    representation of the Hebrew name.
- source_word: שִׁמְעִי
  chosen: Shimei
  alternatives:
  - Shimi
  lexicon: HALOT
  rationale: Proper personal name; transliterated. 'Shimei' is the conventional English
    form and reflects the Hebrew vocalization well.
