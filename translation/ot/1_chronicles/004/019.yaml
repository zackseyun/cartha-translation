id: 1CH.4.19
reference: 1 Chronicles 4:19
source:
  edition: WLC
  text: וּ/בְנֵי֙ אֵ֣שֶׁת הֽוֹדִיָּ֔ה אֲח֣וֹת נַ֔חַם אֲבִ֥י קְעִילָ֖ה הַ/גַּרְמִ֑י
    וְ/אֶשְׁתְּמֹ֖עַ הַ/מַּעֲכָתִֽי׃
translation:
  text: And the sons of the wife of Hodiah, the sister of Naham, were the father of
    Keilah the Garmite and Eshtemoa the Maacathite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'father of' in genealogies can mean founder, ancestor, or clan-head,
      not only immediate biological father.
    reason: lexical_alternative
  - marker: b
    text: Because the Hebrew says 'sons' but then uses singular 'father of,' the line
      is compressed and may summarize a clan relationship rather than a simple father-son
      sequence.
    reason: cultural_note
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the descendants of
  lexicon: HALOT
  rationale: בנים in genealogical contexts commonly means literal sons, though it
    can extend to descendants. Here a straightforward genealogical notice favors 'sons
    of,' while the broader genealogical sense remains possible.
- source_word: אֵשֶׁת
  chosen: the wife of
  alternatives:
  - wife
  lexicon: HALOT
  rationale: 'Construct form with Hodiah indicates relationship: ''the wife of Hodiah.''
    Including ''the'' yields natural English in this genealogical clause.'
- source_word: הוֹדִיָּה
  chosen: Hodiah
  rationale: Personal name is transliterated per project philosophy.
- source_word: אֲחוֹת נַחַם
  chosen: the sister of Naham
  alternatives:
  - Naham's sister
  lexicon: HALOT
  rationale: The construct phrase identifies the wife of Hodiah more specifically.
    'The sister of Naham' is formally transparent and natural enough in English.
- source_word: אֲבִי
  chosen: were the father of
  alternatives:
  - were the founder of
  - were the ancestor of
  lexicon: HALOT
  rationale: In genealogical texts אבי can denote not only immediate paternity but
    also founder/progenitor of a clan or settlement. Because the Hebrew singular 'father
    of' follows a plural subject ('sons'), the idiom is somewhat compressed. Retaining
    'father of' preserves the source wording most closely, while the broader sense
    is noted as an alternative.
- source_word: קְעִילָה
  chosen: Keilah
  rationale: Proper name transliterated. It may refer to a person/clan associated
    with the place-name Keilah; transliteration avoids overinterpretation.
- source_word: הַגַּרְמִי
  chosen: the Garmite
  alternatives:
  - the descendant of Garm
  - the clan of Garm
  lexicon: HALOT
  rationale: Gentilic/adjectival form with article is best represented as 'the Garmite.'
    This preserves the Hebrew ethnic/clan designation without forcing a more interpretive
    paraphrase.
- source_word: וְאֶשְׁתְּמֹעַ
  chosen: and Eshtemoa
  rationale: Proper name transliterated. The conjunction links a second genealogical
    designation coordinated with Keilah.
- source_word: הַמַּעֲכָתִי
  chosen: the Maacathite
  alternatives:
  - the descendant of Maacah
  - the clan of Maacah
  lexicon: HALOT
  rationale: Gentilic/adjectival form with article is naturally rendered 'the Maacathite,'
    preserving the clan/ethnic label.
