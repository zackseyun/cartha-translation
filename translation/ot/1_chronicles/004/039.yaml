id: 1CH.4.39
reference: 1 Chronicles 4:39
source:
  edition: WLC
  text: וַ/יֵּלְכוּ֙ לִ/מְב֣וֹא גְדֹ֔ר עַ֖ד לְ/מִזְרַ֣ח הַ/גָּ֑יְא לְ/בַקֵּ֥שׁ מִרְעֶ֖ה
    לְ/צֹאנָֽ/ם׃
translation:
  text: They went to the entrance of Gedor, as far as the east side of the valley,
    to seek pasture for their flocks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the approach of Gedor'; the Hebrew term can denote an entrance, approach,
      or place of entry.
    reason: lexical_alternative
  - marker: b
    text: Or 'east of the valley' or 'toward the east of the valley'; the Hebrew expression
      is a compact topographical phrase.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: They went
  alternatives:
  - They traveled
  - They came
  lexicon: HALOT
  rationale: Wayyiqtol of הלך narrates the next action in sequence; 'went' is the
    straightforward narrative rendering.
- source_word: לִמְבּוֹא
  chosen: to the entrance of
  alternatives:
  - to the approach to
  - to the region of entry of
  lexicon: HALOT
  rationale: מָבוֹא commonly denotes an entrance, approach, or place of entry. With
    Gedor it most naturally indicates the approach/entrance to that place. 'Entrance
    of' is concise and preserves the spatial sense.
- source_word: גְדֹר
  chosen: Gedor
  rationale: Proper place name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: עַד
  chosen: as far as
  alternatives:
  - up to
  - until
  lexicon: HALOT
  rationale: Marks spatial extent here, not temporal duration; 'as far as' best fits
    the geography.
- source_word: לְמִזְרַח
  chosen: the east side of
  alternatives:
  - east of
  - to the east of
  - toward the east of
  lexicon: HALOT
  rationale: מִזְרָח denotes east/eastward direction. In this topographical phrase
    with עַד and הַגָּיְא, 'the east side of' communicates a specific eastern area
    or side of the valley more naturally than the more ambiguous 'east of'.
- source_word: הַגָּיְא
  chosen: the valley
  alternatives:
  - the ravine
  lexicon: HALOT
  rationale: גַּיְא refers to a valley or ravine. 'Valley' is the broader and more
    natural English term in this geographic notice.
- source_word: לְבַקֵּשׁ
  chosen: to seek
  alternatives:
  - to look for
  lexicon: HALOT
  rationale: Infinitive of בקש expresses purpose. 'To seek' is slightly more formal
    and fits the narrative register.
- source_word: מִרְעֶה
  chosen: pasture
  alternatives:
  - grazing land
  - pastureland
  lexicon: HALOT
  rationale: Refers to pasture or grazing place for animals. 'Pasture' is idiomatic
    and sufficiently precise.
- source_word: לְצֹאנָם
  chosen: for their flocks
  alternatives:
  - for their sheep
  - for their small livestock
  lexicon: HALOT
  rationale: צֹאן can denote sheep and goats collectively, not only sheep. 'Flocks'
    best captures the collective livestock sense without over-specifying species.
