id: 1CH.4.7
reference: 1 Chronicles 4:7
source:
  edition: WLC
  text: וּ/בְנֵ֖י חֶלְאָ֑ה צֶ֥רֶת יצחר וְ/אֶתְנָֽן׃
translation:
  text: 'And the sons of Helah: Zereth, Izhar, and Ethnan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'Heleh' for the mother's name, depending on transliteration
      convention.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew genealogical formula: ''sons of'' may denote direct sons or more
      broadly descendants within a family line.'
    reason: cultural_note
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: The conjunction ו is carried forward as simple narrative linkage, best
    rendered 'And' in this genealogical context. בְנֵי is the construct plural 'sons
    of,' the standard genealogical formula; retaining 'sons' is gender-accurate to
    the Hebrew form and fits the lineage list.
- source_word: חֶלְאָה
  chosen: Helah
  alternatives:
  - Heleh
  lexicon: HALOT
  rationale: Proper personal name, so transliteration rather than translation follows
    project policy. 'Helah' reflects the consonantal form and common English convention
    for this name.
- source_word: צֶרֶת
  chosen: Zereth
  alternatives:
  - Zeret
  lexicon: HALOT
  rationale: Proper name transliterated into standard English form. Final tav is naturally
    represented by 'th' in many conventional transliterations of Hebrew names.
- source_word: יצחר
  chosen: Izhar
  alternatives:
  - Jizhar
  - Izhar
  lexicon: HALOT
  rationale: The consonantal name is best represented by the familiar biblical English
    form 'Izhar.' Although this spelling can coincide with another biblical name elsewhere,
    here it is simply transliterated from the given Hebrew form.
- source_word: וְ/אֶתְנָן
  chosen: and Ethnan
  alternatives:
  - Ethnan
  lexicon: HALOT
  rationale: The prefixed conjunction joins the final name in the series, so 'and
    Ethnan' is the natural English rendering. 'Ethnan' is a straightforward transliteration
    of the proper name.
