id: 1CH.4.17
reference: 1 Chronicles 4:17
source:
  edition: WLC
  text: וּ/בֶן עֶזְרָ֔ה יֶ֥תֶר וּ/מֶ֖רֶד וְ/עֵ֣פֶר וְ/יָל֑וֹן וַ/תַּ֨הַר֙ אֶת מִרְיָ֣ם
    וְ/אֶת שַׁמַּ֔י וְ/אֶת יִשְׁבָּ֖ח אֲבִ֥י אֶשְׁתְּמֹֽעַ־־־־׃
translation:
  text: 'The sons of Ezrah: Jether, Mered, Epher, and Jalon; and she conceived Miriam,
    Shammai, and Ishbah, the father of Eshtemoa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'And the son of Ezrah.' Because several names follow,
      the phrase is commonly understood collectively as 'the sons of Ezrah.'
    reason: textual_variant
  - marker: b
    text: The Hebrew says only 'and she conceived'; the woman is not identified in
      this clause.
    reason: lexical_alternative
  - marker: c
    text: Or 'the founder of Eshtemoa,' if Eshtemoa is understood as a clan or settlement
      rather than an individual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֶן
  chosen: The sons of
  alternatives:
  - And the son of
  - And Ben
  lexicon: HALOT
  rationale: Although the consonantal text reads singular 'son,' the following list
    contains multiple names, and many English versions understand this as a collective/genealogical
    heading. Rendering 'The sons of' best fits the immediate syntax and genealogy
    style without over-paraphrasing. The singular reading is preserved as an alternative
    in a footnote because the Hebrew form is notable.
- source_word: עֶזְרָה
  chosen: Ezrah
  rationale: Personal name; transliterated according to the translation philosophy.
- source_word: יֶתֶר
  chosen: Jether
  rationale: Personal name; transliterated.
- source_word: וּמֶרֶד
  chosen: Mered
  rationale: Personal name; transliterated.
- source_word: וְעֵפֶר
  chosen: Epher
  rationale: Personal name; transliterated.
- source_word: וְיָלוֹן
  chosen: Jalon
  rationale: Personal name; transliterated.
- source_word: וַתַּהַר
  chosen: and she conceived
  alternatives:
  - and she became pregnant
  - and she bore
  lexicon: HALOT
  rationale: The verb הרה means 'to conceive, become pregnant.' 'Conceived' is the
    most direct rendering. Because the subject is feminine singular but unnamed in
    this clause, English preserves the ambiguity with 'she' rather than supplying
    a name not present in the Hebrew.
- source_word: מִרְיָם
  chosen: Miriam
  rationale: Personal name; transliterated. Although Miriam is elsewhere a female
    name, here it is simply reproduced as written in the genealogical list.
- source_word: שַׁמַּי
  chosen: Shammai
  rationale: Personal name; transliterated.
- source_word: יִשְׁבָּח
  chosen: Ishbah
  rationale: Personal name; transliterated.
- source_word: אֲבִי אֶשְׁתְּמֹעַ
  chosen: the father of Eshtemoa
  alternatives:
  - the founder of Eshtemoa
  lexicon: HALOT
  rationale: In genealogical contexts, אָב ('father of') can denote either immediate
    paternity or clan/town founder. 'Father of Eshtemoa' is the more formal and transparent
    rendering in the main text; 'founder of Eshtemoa' is preserved in a footnote as
    a contextual alternative, especially if Eshtemoa is understood as a settlement
    or clan name.
