id: 1CH.4.12
reference: 1 Chronicles 4:12
source:
  edition: WLC
  text: וְ/אֶשְׁתּ֗וֹן הוֹלִ֞יד אֶת בֵּ֤ית רָפָא֙ וְ/אֶת פָּסֵ֔חַ וְ/אֶת תְּחִנָּ֖ה
    אֲבִ֣י עִ֣יר נָחָ֑שׁ אֵ֖לֶּה אַנְשֵׁ֥י רֵכָֽה־־־׃ס
translation:
  text: Eshton fathered Beth-rapha, Paseah, and Tehinnah, the father of Ir-nahash.
    These were the men of Rekah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the founder of Ir-nahash'; in genealogical contexts, 'father of' can
      denote an ancestor or founder, not only an immediate biological father.
    reason: lexical_alternative
  - marker: b
    text: Ir-nahash may mean 'city of Nahash,' but here it is likely functioning as
      a place-name.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In genealogical context, the Hiphil of ילד commonly denotes begetting
    or founding descent. 'Fathered' is natural modern English and preserves the genealogical
    sense without archaic tone.
- source_word: בֵּית רָפָא
  chosen: Beth-rapha
  alternatives:
  - Beth Rapha
  - Bethrapha
  lexicon: HALOT
  rationale: The form is treated as a proper name in the genealogy. Although בית can
    mean 'house of,' in this context the morphology and parallelism with adjacent
    names favor transliteration as a personal name rather than translating it compositionally.
- source_word: פָּסֵחַ
  chosen: Paseah
  alternatives:
  - Paseach
  lexicon: HALOT
  rationale: Proper name; standard English transliteration is preferred.
- source_word: תְּחִנָּה
  chosen: Tehinnah
  alternatives:
  - Techinnah
  lexicon: HALOT
  rationale: Proper name; transliterated rather than translated, despite the common
    noun sense 'supplication' elsewhere.
- source_word: אֲבִי עִיר נָחָשׁ
  chosen: the father of Ir-nahash
  alternatives:
  - the founder of Ir-nahash
  - father of the city Nahash
  lexicon: HALOT
  rationale: In genealogies, אבי can denote either immediate fatherhood or founder/ancestor
    of a clan or settlement. Here 'father of Ir-nahash' preserves the Hebrew idiom
    while remaining readable. עִיר נָחָשׁ is best taken as the place-name Ir-nahash
    ('city of Nahash'), not as a common noun phrase translated 'city of Nahash,' because
    of the onomastic context.
- source_word: אֵלֶּה אַנְשֵׁי רֵכָה
  chosen: These were the men of Rekah
  alternatives:
  - These are the men of Rekah
  - These were the people of Rekah
  lexicon: HALOT
  rationale: אַנְשֵׁי literally means 'men of' and in genealogical notices often denotes
    members of a clan or locality. 'Men of Rekah' keeps the formal linkage. Past tense
    'were' fits English narrative style in this genealogy.
- source_word: רֵכָה
  chosen: Rekah
  alternatives:
  - Rechah
  lexicon: HALOT
  rationale: Proper name or place-name; transliterated by standard convention.
