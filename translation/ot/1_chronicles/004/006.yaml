id: 1CH.4.6
reference: 1 Chronicles 4:6
source:
  edition: WLC
  text: וַ/תֵּ֨לֶד ל֤/וֹ נַעֲרָה֙ אֶת אֲחֻזָּ֣ם וְ/אֶת חֵ֔פֶר וְ/אֶת תֵּימְנִ֖י וְ/אֶת
    הָ/אֲחַשְׁתָּרִ֑י אֵ֖לֶּה בְּנֵ֥י נַעֲרָֽה־־־־׃
translation:
  text: Naarah bore to him Ahuzzam, Hepher, Temeni, and Haahashtari. These were the
    sons of Naarah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Temeni may also be understood as a name with adjectival force, such as 'Temenite'
      or 'southerner,' but in this genealogy it is rendered as a personal name.
    reason: lexical_alternative
  - marker: b
    text: Haahashtari may also be transliterated 'Ahashtari.' The Hebrew form includes
      the prefixed article, which may have become fixed as part of the name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶד
  chosen: bore
  alternatives:
  - gave birth
  lexicon: HALOT
  rationale: The wayyiqtol of ילד introduces a genealogical birth notice. 'Bore' is
    concise, idiomatic in English genealogies, and preserves the maternal subject.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix here marks the male parent in
    the genealogical formula. 'To him' is the most natural literal rendering in English
    and avoids overinterpreting the relationship beyond the immediate context.
- source_word: נַעֲרָה
  chosen: Naarah
  lexicon: HALOT
  rationale: This is a personal name, so it is transliterated rather than translated,
    in keeping with the project's policy to transliterate names. The same form is
    retained at the end of the verse for consistency.
- source_word: אֶת ... וְאֶת ...
  chosen: '[direct-object marking represented by English word order and list punctuation]'
  lexicon: Hebrew grammar
  rationale: The repeated אֶת marks each named son as a direct object. English does
    not require an equivalent particle, so the function is conveyed by normal syntax
    and coordinated listing.
- source_word: אֲחֻזָּם
  chosen: Ahuzzam
  alternatives:
  - Ahuzzam
  lexicon: HALOT
  rationale: A proper name transliterated into standard English form. 'Ahuzzam' reflects
    the doubled consonant indicated in Hebrew and is a common conventional transliteration.
- source_word: חֵפֶר
  chosen: Hepher
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention.
- source_word: תֵּימְנִי
  chosen: Temeni
  alternatives:
  - Temnite
  lexicon: HALOT
  rationale: Although the form could look adjectival ('Temenite'/'southern'), in this
    genealogical list it functions as a personal name. Transliteration best preserves
    that likely onomastic use without importing an interpretive label.
- source_word: הָאֲחַשְׁתָּרִי
  chosen: Haahashtari
  alternatives:
  - Ahashtari
  lexicon: HALOT
  rationale: The prefixed article is preserved in transliteration because the form
    appears as part of the name in the Hebrew text. Rendering it as a gentilic or
    descriptive title would be more interpretive than the context warrants.
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - These ones
  lexicon: HALOT
  rationale: Standard demonstrative introducing a summary statement about the preceding
    names.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: In a genealogical context, בנים most naturally means 'sons.' This is
    gender-accurate and should not be flattened to 'children' where the text specifies
    male offspring.
