id: 1CH.4.18
reference: 1 Chronicles 4:18
source:
  edition: WLC
  text: וְ/אִשְׁתּ֣/וֹ הַ/יְהֻדִיָּ֗ה יָלְדָ֞ה אֶת יֶ֨רֶד אֲבִ֤י גְדוֹר֙ וְ/אֶת חֶ֨בֶר֙
    אֲבִ֣י שׂוֹכ֔וֹ וְ/אֶת יְקֽוּתִיאֵ֖ל אֲבִ֣י זָנ֑וֹחַ וְ/אֵ֗לֶּה בְּנֵי֙ בִּתְיָ֣ה
    בַת פַּרְעֹ֔ה אֲשֶׁ֥ר לָקַ֖ח מָֽרֶד־־־־׃ס
translation:
  text: And his wife the Jewess bore Jered the father of Gedor, Heber the father of
    Soco, and Jekuthiel the father of Zanoah. These are the sons of Bithiah daughter
    of Pharaoh, whom Mered took as wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Judean woman' or 'the Jewish woman' for 'the Jewess.'
    reason: lexical_alternative
  - marker: b
    text: '''Father of'' in Chronicles can also mean founder, ancestor, or clan chief
      associated with a place.'
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew is difficult: the relation between ''his wife the Jewess'' and
      ''Bithiah daughter of Pharaoh'' is debated; some understand them as the same
      woman, others as different wives of Mered.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַיְהֻדִיָּה
  chosen: the Jewess
  alternatives:
  - the Judean woman
  - the Jewish woman
  lexicon: HALOT
  rationale: The feminine gentilic from יהודי most naturally means 'Jewess/Judean
    woman.' In this genealogical context, 'Jewess' is concise and preserves the ethnic
    designation. 'Judean woman' is possible but sounds more geographic than the likely
    ethnic sense in English.
- source_word: יָלְדָה
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: In genealogical formulae ילד commonly means 'bore' or 'gave birth to.'
    'Bore' is idiomatic and compact in English genealogy style.
- source_word: אֲבִי
  chosen: the father of
  alternatives:
  - founder of
  - ancestor of
  lexicon: HALOT
  rationale: In Chronicles, 'father of' can denote progenitor, founder, or chief associated
    with a place/clan. The formal rendering 'father of' preserves the Hebrew idiom
    without over-interpreting whether the referent is a literal son, clan founder,
    or settlement founder.
- source_word: שׂוֹכוֹ
  chosen: Soco
  alternatives:
  - Sokoh
  - Socoh
  lexicon: HALOT
  rationale: A standard English transliteration is needed for the place name. 'Soco'
    is a conventional simplified form; alternate spellings reflect the same Hebrew
    place name.
- source_word: יְקוּתִיאֵל
  chosen: Jekuthiel
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: זָנוֹחַ
  chosen: Zanoah
  lexicon: HALOT
  rationale: Place name transliterated by standard convention.
- source_word: בְּנֵי
  chosen: sons
  alternatives:
  - children
  - descendants
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'sons.' In genealogical contexts it may function
    broadly, but the project prefers gender-accurate rendering unless context clearly
    requires a broader term.
- source_word: בִּתְיָה בַת פַּרְעֹה
  chosen: Bithiah daughter of Pharaoh
  alternatives:
  - Bithiah, Pharaoh's daughter
  lexicon: HALOT
  rationale: The appositional construction is straightforward. 'Daughter of Pharaoh'
    preserves the Hebrew relationship explicitly.
- source_word: לָקַח
  chosen: took as wife
  alternatives:
  - took
  - married
  lexicon: HALOT
  rationale: Although the verb is simply 'took,' in marital contexts Hebrew often
    uses לקח to mean taking a woman in marriage. 'Took as wife' makes the sense explicit
    in natural English while remaining close to the source.
- source_word: וְאֵלֶּה
  chosen: These are
  alternatives:
  - and these are
  - now these are
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces a summarizing identification.
    English commonly omits the initial 'and' for smoother style without loss of meaning.
