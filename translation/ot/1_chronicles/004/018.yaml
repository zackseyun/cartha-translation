theological_decisions:
- issue: Referent of 'These are the sons of Bithiah daughter of Pharaoh' after the
    preceding births by 'his wife the Jewess'
  chosen_reading: Retain the Hebrew sequence without harmonizing the apparent genealogical
    tension; present Bithiah as the woman whom Mered took as wife and leave the relationship
    as stated.
  alternative_readings:
  - Treat 'the Jewess' as Bithiah herself
  - Repunctuate or emend the verse to distinguish two wives more explicitly
  rationale: The verse is syntactically difficult, and commentators differ on whether
    'the Jewess' and Bithiah are the same woman or different wives. The translation
    should preserve the text's wording rather than resolve the genealogy beyond what
    the Hebrew states. Rendering the final clause as 'whom Mered took as wife' reflects
    the marital sense of לקח while leaving the identification tension intact.
  doctrine_reference: Preserve theological/interpreive tension rather than resolve
    it.
