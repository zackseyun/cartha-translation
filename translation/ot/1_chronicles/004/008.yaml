id: 1CH.4.8
reference: 1 Chronicles 4:8
source:
  edition: WLC
  text: וְ/ק֣וֹץ הוֹלִ֔יד אֶת עָנ֖וּב וְ/אֶת הַ/צֹּבֵבָ֑ה וּ/מִשְׁפְּח֥וֹת אֲחַרְחֵ֖ל
    בֶּן הָרֽוּם־־־׃
translation:
  text: Koz fathered Anub, Hazzobebah, and the families of Aharhel son of Harum.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Zobebah' if the prefixed article is not represented in transliteration.
    reason: lexical_alternative
  - marker: b
    text: '''Families'' may also be rendered ''clans'' in this genealogical context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֣וֹץ
  chosen: Koz
  alternatives:
  - Hakkoz
  lexicon: HALOT
  rationale: Proper name; transliterated rather than translated per project philosophy.
    'Koz' follows the consonantal form directly. 'Hakkoz' is a related name elsewhere
    but the article is absent here.
- source_word: הוֹלִ֔יד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In genealogical context ילד in the Hiphil commonly denotes begetting
    or ancestry. 'Fathered' is concise, natural modern English, and preserves the
    genealogical sense better than archaic 'begot'.
- source_word: עָנ֖וּב
  chosen: Anub
  lexicon: HALOT
  rationale: Proper name; standard transliteration.
- source_word: הַ/צֹּבֵבָ֑ה
  chosen: Hazzobebah
  alternatives:
  - Zobebah
  lexicon: HALOT
  rationale: Proper name with prefixed article in the Hebrew form. In names of this
    sort, English tradition often preserves the initial h-sound from the article,
    yielding 'Hazzobebah.' 'Zobebah' is possible if the article is not carried into
    transliteration, so it is preserved as an alternative.
- source_word: וּ/מִשְׁפְּח֥וֹת
  chosen: and the families of
  alternatives:
  - and clans of
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת in genealogical lists refers to family groupings or clans.
    'Families' is the more transparent modern term; 'clans' is possible but slightly
    more interpretive.
- source_word: אֲחַרְחֵ֖ל
  chosen: Aharhel
  lexicon: HALOT
  rationale: Proper name; transliterated directly.
- source_word: בֶּן
  chosen: son of
  lexicon: HALOT
  rationale: Standard genealogical marker linking Aharhel to Harum.
- source_word: הָרֽוּם
  chosen: Harum
  alternatives:
  - Haram
  lexicon: HALOT
  rationale: Proper name; transliterated from the Masoretic pointing as 'Harum.' Some
    English traditions reflect a variant-like form 'Haram,' but the MT vocalization
    supports 'Harum'.
