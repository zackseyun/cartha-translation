id: 1CH.4.28
reference: 1 Chronicles 4:28
source:
  edition: WLC
  text: וַ/יֵּֽשְׁב֛וּ בִּ/בְאֵֽר שֶׁ֥בַע וּ/מוֹלָדָ֖ה וַ/חֲצַ֥ר שׁוּעָֽל־׃
translation:
  text: They lived in Beer-sheba, Moladah, and Hazar-shual.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beer-sheba may also be spelled “Beersheba” in English.
    reason: lexical_alternative
  - marker: b
    text: Hazar-shual may also be rendered “Hazor-shual” or “Hazar Shual” in English
      transliteration traditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  chosen: They lived
  alternatives:
  - They dwelt
  - They settled
  lexicon: HALOT
  rationale: From ישׁב in the wayyiqtol plural, indicating residence or habitation
    in a place. 'They lived' is natural modern English and fits a settlement list;
    'dwelt' is more formal/archaic, and 'settled' could imply initial establishment
    rather than ongoing residence.
- source_word: בִּבְאֵר שֶׁבַע
  chosen: in Beer-sheba
  alternatives:
  - in Beersheba
  lexicon: HALOT
  rationale: Toponym meaning Beer-sheba/Beersheba. Per philosophy, names are transliterated
    rather than translated. The hyphenated conventional English form improves readability
    while preserving the Hebrew name.
- source_word: וּמוֹלָדָה
  chosen: Moladah
  lexicon: HALOT
  rationale: Proper place name; transliterated directly.
- source_word: וַחֲצַר שׁוּעָל
  chosen: Hazar-shual
  alternatives:
  - Hazor-shual
  - Hazar Shual
  lexicon: HALOT
  rationale: Proper place name composed of two elements. Transliteration is preferred
    for toponyms. 'Hazar-shual' reflects the consonantal form חצר שועל; spacing or
    alternate vocalized forms are possible in English tradition.
