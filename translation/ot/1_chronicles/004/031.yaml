id: 1CH.4.31
reference: 1 Chronicles 4:31
source:
  edition: WLC
  text: וּ/בְ/בֵ֤ית מַרְכָּבוֹת֙ וּ/בַ/חֲצַ֣ר סוּסִ֔ים וּ/בְ/בֵ֥ית בִּרְאִ֖י וּֽ/בְ/שַׁעֲרָ֑יִם
    אֵ֥לֶּה עָרֵי/הֶ֖ם עַד מְלֹ֥ךְ דָּוִֽיד־׃
translation:
  text: and in Beth-marcaboth, and in Hazar-susim, and in Beth-biri, and in Shaaraim.
    These were their cities until David reigned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beth-marcaboth may be rendered more literally as “House of Chariots,” but
      here it is treated as a place name.
    reason: lexical_alternative
  - marker: b
    text: Hazar-susim may be rendered more literally as “Court of Horses” or “Village
      of Horses,” but here it is treated as a place name.
    reason: lexical_alternative
  - marker: c
    text: Beth-biri may also be spelled “Beth-birei” in English transliteration.
    reason: alternative_reading
  - marker: d
    text: Shaaraim may reflect an etymological sense like “Two Gates,” but here it
      is treated as a place name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/בֵית מַרְכָּבוֹת
  chosen: and in Beth-marcaboth
  alternatives:
  - and in Beth-markaboth
  - and in House of Chariots
  lexicon: HALOT
  rationale: The expression is a place name. Following the translation philosophy,
    personal and place names are transliterated rather than translated. A more literal
    rendering ('House of Chariots') is possible from the components, but in a settlement
    list a toponym is best preserved as a name.
- source_word: וּ/בַ/חֲצַר סוּסִים
  chosen: and in Hazar-susim
  alternatives:
  - and in Hazar-susim
  - and in Court of Horses
  - and in Village of Horses
  lexicon: HALOT
  rationale: This is likewise a place name. Although the components can be translated
    literally, the context is a list of towns, so transliteration is preferred. English
    spelling regularized with hyphenation for readability.
- source_word: וּ/בְ/בֵית בִּרְאִי
  chosen: and in Beth-biri
  alternatives:
  - and in Beth-birei
  - and in House of Biri
  lexicon: HALOT
  rationale: Taken as a toponym in parallel with the surrounding names. The final
    element is somewhat uncertain in vocalization/transliteration tradition, so an
    alternative spelling is preserved in a footnote.
- source_word: וּֽ/בְ/שַׁעֲרָיִם
  chosen: and in Shaaraim
  alternatives:
  - and in Shaarayim
  - and in Two Gates
  lexicon: HALOT
  rationale: Another place name in the list. Though the form may etymologically suggest
    'two gates,' the settlement-list context favors transliteration.
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - These places
  lexicon: HALOT
  rationale: Simple demonstrative referring back to the listed towns. 'These' is sufficient
    and natural in English.
- source_word: עָרֵיהֶם
  chosen: were their cities
  alternatives:
  - were their towns
  lexicon: HALOT
  rationale: עִיר can mean city or town. 'Cities' is the more direct lexical equivalent
    and fits the genealogical-territorial register of Chronicles.
- source_word: עַד מְלֹךְ דָּוִיד
  chosen: until David reigned
  alternatives:
  - until the reign of David
  - until David became king
  lexicon: HALOT
  rationale: The infinitive construct with עַד marks a temporal limit. 'Until David
    reigned' is concise, natural, and preserves the verbal force without overinterpreting
    the exact onset/duration nuance.
