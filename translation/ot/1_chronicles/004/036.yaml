id: 1CH.4.36
reference: 1 Chronicles 4:36
source:
  edition: WLC
  text: וְ/אֶלְיוֹעֵינַ֡י וְֽ/יַעֲקֹ֡בָה וִ֠/ישׁוֹחָיָה וַ/עֲשָׂיָ֧ה וַ/עֲדִיאֵ֛ל
    וִ/ישִׂימִאֵ֖ל וּ/בְנָיָֽה׃
translation:
  text: and Elioenai, and Jaakobah, and Jeshohaiah, and Asaiah, and Adiel, and Jesimiel,
    and Benaiah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֶלְיוֹעֵינַי
  chosen: Elioenai
  alternatives:
  - Elyoenai
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. 'Elioenai' follows a standard English convention for this Hebrew name.
- source_word: יַעֲקֹבָה
  chosen: Jaakobah
  alternatives:
  - Jacobah
  - Yaakobah
  lexicon: HALOT
  rationale: Proper personal name; transliterated. 'Jaakobah' preserves the consonantal
    shape more transparently than the more assimilated 'Jacobah,' while remaining
    readable in English.
- source_word: יְשׁוֹחָיָה
  chosen: Jeshohaiah
  alternatives:
  - Yeshohaiah
  lexicon: HALOT
  rationale: Proper personal name; transliterated. Initial yod is represented with
    English 'J' in line with common anglicizing conventions for Hebrew names in Chronicles.
- source_word: עֲשָׂיָה
  chosen: Asaiah
  alternatives:
  - Asayah
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English biblical convention
    as 'Asaiah.'
- source_word: עֲדִיאֵל
  chosen: Adiel
  alternatives:
  - Adi'el
  lexicon: HALOT
  rationale: Proper personal name; transliterated. The compact form 'Adiel' is standard
    and readable in English.
- source_word: יְשִׂימִיאֵל
  chosen: Jesimiel
  alternatives:
  - Yesimiel
  lexicon: HALOT
  rationale: Proper personal name; transliterated. 'Jesimiel' reflects a conventional
    English representation of initial yod in such names.
- source_word: בְּנָיָה
  chosen: Benaiah
  alternatives:
  - Benayah
  lexicon: HALOT
  rationale: Proper personal name; transliterated using the well-established English
    biblical form 'Benaiah'.
- source_word: וְ / וַ / וִ / וּ prefixed to each name
  chosen: and
  alternatives:
  - ','
  - —
  lexicon: HALOT
  rationale: Each prefixed conjunction is the simple Hebrew waw linking names in a
    genealogy/list. Rendering each with 'and' preserves the polysyndetic style of
    the source rather than smoothing into a comma-only English list.
