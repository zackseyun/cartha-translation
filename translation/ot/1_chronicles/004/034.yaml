id: 1CH.4.34
reference: 1 Chronicles 4:34
source:
  edition: WLC
  text: וּ/מְשׁוֹבָ֣ב וְ/יַמְלֵ֔ךְ וְ/יוֹשָׁ֖ה בֶּן אֲמַצְיָֽה־׃
translation:
  text: and Meshobab, and Jamlech, and Joshah son of Amaziah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew transliteration of the names may also be represented as 'Yamlech'
      and 'Joshah/Joshah-like forms' depending on transliteration convention.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשׁוֹבָב
  chosen: Meshobab
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy for names.
- source_word: יַמְלֵךְ
  chosen: Jamlech
  alternatives:
  - Yamlech
  rationale: Proper personal name. Rendered by standard English transliteration with
    initial 'J' convention for yod-based Hebrew names; a more letter-for-letter form
    'Yamlech' is possible.
- source_word: יוֹשָׁה
  chosen: Joshah
  alternatives:
  - Joshah
  rationale: Proper personal name; transliterated into conventional English form.
    Spelling with initial 'J' follows common English convention, though 'Yoshah/Joshah'
    type variation exists in transliteration practice.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical marker meaning 'son of.' The simple 'son of' is
    natural English and fits the list structure.
- source_word: אֲמַצְיָה
  chosen: Amaziah
  rationale: Proper personal name; transliterated by standard convention.
- source_word: וְ
  chosen: and
  lexicon: HALOT
  rationale: The conjunction is repeated before each listed name in Hebrew. Retained
    as 'and' to preserve the list structure rather than smoothing it away.
