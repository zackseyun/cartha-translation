id: 1CH.4.41
reference: 1 Chronicles 4:41
source:
  edition: WLC
  text: וַ/יָּבֹ֡אוּ אֵלֶּה֩ הַ/כְּתוּבִ֨ים בְּ/שֵׁמ֜וֹת בִּ/ימֵ֣י יְחִזְקִיָּ֣הוּ
    מֶֽלֶךְ יְהוּדָ֗ה וַ/יַּכּ֨וּ אֶת אָהֳלֵי/הֶ֜ם וְ/אֶת ה/מעינים אֲשֶׁ֤ר נִמְצְאוּ
    שָׁ֨מָּ/ה֙ וַ/יַּחֲרִימֻ/ם֙ עַד הַ/יּ֣וֹם הַ/זֶּ֔ה וַ/יֵּשְׁב֖וּ תַּחְתֵּי/הֶ֑ם
    כִּֽי מִרְעֶ֥ה לְ/צֹאנָ֖/ם שָֽׁם׀־־־־־־׃
translation:
  text: These, who were recorded by name, came in the days of Hezekiah king of Judah,
    and they struck down their tents and the Meunites who were found there, and devoted
    them to destruction to this day. Then they settled in their place, because there
    was pasture there for their flocks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew הַמְּעִינִים is difficult. It is traditionally taken as 'the Meunites,'
      a people-group; some understand it instead as 'the habitations' or 'the dwellings.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַכְּתוּבִים בְּשֵׁמוֹת
  chosen: who were recorded by name
  alternatives:
  - who were written by names
  - who were listed by name
  lexicon: HALOT
  rationale: The passive participle with בְּשֵׁמוֹת refers to persons entered in a
    register or genealogy. 'Recorded by name' is idiomatic modern English and preserves
    the administrative sense better than a wooden 'written by names.'
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come/arrive.' 'Came' fits the narrative
    sequence naturally in English.
- source_word: וַיַּכּוּ
  chosen: struck down
  alternatives:
  - attacked
  - defeated
  - smote
  lexicon: HALOT
  rationale: נכה in military narrative often denotes a forceful attack resulting in
    defeat or killing. 'Struck down' preserves the violence without over-specifying
    the exact extent beyond the Hebrew.
- source_word: אָהֳלֵיהֶם
  chosen: their tents
  alternatives:
  - their tent-dwellings
  lexicon: HALOT
  rationale: The noun is the ordinary word for tents. Retaining 'tents' reflects the
    likely semi-nomadic setting.
- source_word: המעינים
  chosen: the Meunites
  alternatives:
  - the habitations
  - the dwellings
  lexicon: HALOT
  rationale: The consonantal text can be understood as a gentilic, traditionally 'Meunites,'
    and this fits the context of striking both tents and a people found there. Because
    the form is difficult and some take it as a common noun referring to habitations,
    the alternative is preserved in a footnote.
- source_word: אֲשֶׁר נִמְצְאוּ שָׁמָּה
  chosen: who were found there
  alternatives:
  - that were found there
  lexicon: HALOT
  rationale: Given the choice of 'Meunites' as a people-group, the relative clause
    is rendered personally as 'who were found there.' If the alternative reading 'habitations/dwellings'
    were adopted, 'that were found there' would be required.
- source_word: וַיַּחֲרִימֻם
  chosen: devoted them to destruction
  alternatives:
  - utterly destroyed them
  - put them under the ban
  lexicon: HALOT
  rationale: חרם in the Hiphil carries the sense of placing under ḥerem, that is,
    devoting to destruction. This rendering preserves the technical force better than
    the flatter 'destroyed,' while remaining readable.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the Hebrew temporal formula.
- source_word: וַיֵּשְׁבוּ תַּחְתֵּיהֶם
  chosen: they settled in their place
  alternatives:
  - they lived under them
  - they dwelt in their stead
  lexicon: HALOT
  rationale: The idiom תַּחַת/תַּחְתֵּי with persons often means 'in place of' or
    'instead of.' 'Settled in their place' is clear modern English and fits the context
    of replacement settlement.
- source_word: מִרְעֶה לְצֹאנָם
  chosen: pasture there for their flocks
  alternatives:
  - grazing land there for their sheep
  lexicon: HALOT
  rationale: מִרְעֶה denotes pasture or grazing land. 'Flocks' is broader and natural
    for צֹאן, which can include sheep and goats.
