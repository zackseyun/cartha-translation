id: 1CH.4.14
reference: 1 Chronicles 4:14
source:
  edition: WLC
  text: וּ/מְעוֹנֹתַ֖י הוֹלִ֣יד אֶת עָפְרָ֑ה וּ/שְׂרָיָ֗ה הוֹלִ֤יד אֶת יוֹאָב֙ אֲבִי֙
    גֵּ֣יא חֲרָשִׁ֔ים כִּ֥י חֲרָשִׁ֖ים הָיֽוּ־־׃פ
translation:
  text: Meonothai fathered Ophrah, and Seraiah fathered Joab, the father of Ge-harashim,
    for they were craftsmen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ge-harashim likely means 'Valley of Craftsmen.' The Hebrew preserves it
      as a place-name while the following clause explains the name.
    reason: lexical_alternative
  - marker: b
    text: Or 'the founder of Ge-harashim.' The expression 'father of' can denote a
      founder or ancestral head in genealogical contexts.
    reason: alternative_reading
lexical_decisions:
- source_word: מְעוֹנֹתַי
  chosen: Meonothai
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In genealogical context ילד in the Hiphil commonly denotes direct descent.
    'Fathered' is natural modern English and preserves the genealogical force better
    than archaic 'begot.'
- source_word: עָפְרָה
  chosen: Ophrah
  lexicon: HALOT
  rationale: Proper personal/place name here functioning as a descendant's name; standard
    transliteration retained.
- source_word: שְׂרָיָה
  chosen: Seraiah
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
- source_word: יוֹאָב
  chosen: Joab
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration.
- source_word: אֲבִי
  chosen: the father of
  alternatives:
  - ancestor of
  - founder of
  lexicon: HALOT
  rationale: אב in genealogical notices can denote immediate fatherhood or a broader
    founding/ancestral relationship. 'The father of' keeps the Hebrew wording in the
    main text while allowing readers to infer a founder sense from context.
- source_word: גֵּיא
  chosen: Ge-
  alternatives:
  - Valley of
  lexicon: HALOT
  rationale: גיא means 'valley,' but in this construction גֵּיא חֲרָשִׁים functions
    as a toponym. Rendering it as the transliterated place-name 'Ge-harashim' preserves
    the name-like force while avoiding overtranslation in the main text.
- source_word: חֲרָשִׁים
  chosen: harashim
  alternatives:
  - craftsmen
  - artisans
  lexicon: HALOT
  rationale: In the place-name גֵּיא חֲרָשִׁים, the element is best preserved by transliteration
    as part of the toponym 'Ge-harashim.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the explanation for the place-name. 'For' is concise and preserves
    the explanatory relation.
- source_word: חֲרָשִׁים
  chosen: craftsmen
  alternatives:
  - artisans
  - smiths
  lexicon: HALOT
  rationale: The common noun חרשים can refer broadly to skilled workers or craftsmen.
    'Craftsmen' is broad enough to avoid narrowing the sense to metalworkers alone,
    while matching the explanatory clause about the inhabitants/associated group.
- source_word: הָיוּ
  chosen: they were
  alternatives:
  - there were
  lexicon: HALOT
  rationale: Simple copular verb. 'They were' naturally refers back to the people
    associated with the place-name and explains why it bore that name.
