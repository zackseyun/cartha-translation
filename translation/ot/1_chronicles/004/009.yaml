id: 1CH.4.9
reference: 1 Chronicles 4:9
source:
  edition: WLC
  text: וַ/יְהִ֣י יַעְבֵּ֔ץ נִכְבָּ֖ד מֵ/אֶחָ֑י/ו וְ/אִמּ֗/וֹ קָרְאָ֨ה שְׁמ֤/וֹ יַעְבֵּץ֙
    לֵ/אמֹ֔ר כִּ֥י יָלַ֖דְתִּי בְּ/עֹֽצֶב׃
translation:
  text: Now Jabez was more honored than his brothers, and his mother called his name
    Jabez, saying, “Because I bore him in pain.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The name Jabez sounds like the Hebrew expression for pain or sorrow in his
      mother's explanation.
    reason: lexical_alternative
  - marker: b
    text: Or “Because I bore him with sorrow.” The Hebrew עֹצֶב can denote pain, sorrow,
      or hardship.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ... was
  alternatives:
  - And ... was
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive with היה introduces the narrative statement. 'Now
    ... was' gives natural modern English while preserving the discourse move without
    archaic 'it came to pass.'
- source_word: יַעְבֵּץ
  chosen: Jabez
  lexicon: HALOT
  rationale: Personal name is transliterated per translation philosophy. The repeated
    use also supports the wordplay with pain/sorrow in the naming explanation.
- source_word: נִכְבָּד
  chosen: more honored
  alternatives:
  - more honorable
  - held in honor
  lexicon: HALOT
  rationale: From כבד in the sense of being weighty/honored. In context of comparison
    with his brothers, 'more honored' is clear modern English and preserves the comparative
    force implied by מִן.
- source_word: מֵאֶחָיו
  chosen: than his brothers
  alternatives:
  - than his kin
  - than his brothers and sisters
  lexicon: HALOT
  rationale: The Hebrew noun is masculine plural 'brothers' with 3ms suffix. Given
    the genealogical context, 'brothers' is the most direct rendering; no contextual
    pressure requires a broader inclusive gloss.
- source_word: וְאִמּוֹ
  chosen: and his mother
  lexicon: HALOT
  rationale: Straightforward possessive construction; retained formally.
- source_word: קָרְאָה שְׁמוֹ
  chosen: called his name
  alternatives:
  - named him
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'called his name.' This is preserved
    because it is natural enough in English and keeps the naming formula visible;
    'named him' would also be possible but slightly flattens the formality.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - saying that
  lexicon: HALOT
  rationale: Standard rendering introducing the mother's explanation for the name.
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason for the naming. 'Because' makes the causal force
    explicit in contemporary English.
- source_word: יָלַדְתִּי
  chosen: I bore him
  alternatives:
  - I gave birth to him
  - I bore
  lexicon: HALOT
  rationale: The Hebrew verb is simply 'I bore/gave birth.' English requires the object
    to be explicit for clarity in this sentence; 'him' is implied by context. 'I bore
    him' is concise and suitably formal.
- source_word: בְּעֹצֶב
  chosen: in pain
  alternatives:
  - with pain
  - in sorrow
  - with sorrow
  lexicon: HALOT
  rationale: עֹצֶב can denote pain, toil, or sorrow. Here the naming wordplay with
    Jabez favors the concrete childbirth sense 'pain,' while preserving the emotional
    resonance. 'In pain' reads naturally with 'I bore him.'
