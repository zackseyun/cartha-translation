id: 1CH.4.13
reference: 1 Chronicles 4:13
source:
  edition: WLC
  text: וּ/בְנֵ֣י קְנַ֔ז עָתְנִיאֵ֖ל וּ/שְׂרָיָ֑ה וּ/בְנֵ֥י עָתְנִיאֵ֖ל חֲתַֽת׃
translation:
  text: 'The sons of Kenaz: Othniel and Seraiah. And the sons of Othniel: Hathath.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The name שְׂרָיָה is often rendered 'Seraiah' in English versions; some
      may prefer the fuller spelling 'Seraiah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - Descendants of
  lexicon: HALOT
  rationale: Construct plural of בֵּן with prefixed conjunction. In genealogical style,
    'the sons of' is the most transparent rendering; the initial conjunction is not
    pressed as 'and' in English because a new genealogical line is being introduced
    after the previous verse.
- source_word: קְנַז
  chosen: Kenaz
  lexicon: HALOT
  rationale: Proper personal name; transliterated per translation philosophy.
- source_word: עָתְנִיאֵל
  chosen: Othniel
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration retained.
- source_word: וּשְׂרָיָה
  chosen: and Seraiah
  alternatives:
  - and Seraiah
  lexicon: HALOT
  rationale: Proper personal name with prefixed conjunction. The consonantal form
    corresponds to the name commonly rendered 'Seraiah'; 'Seraiah' reflects a fuller
    conventional spelling in English, but 'Seraiah' is less directly tied to the Hebrew
    vocalization here.
- source_word: וּבְנֵי עָתְנִיאֵל
  chosen: And the sons of Othniel
  alternatives:
  - And the descendants of Othniel
  lexicon: HALOT
  rationale: Repeated genealogical formula. Here 'and' is retained because it links
    the next generation within the same verse.
- source_word: חֲתַת
  chosen: Hathath
  lexicon: HALOT
  rationale: Proper personal name; transliterated directly.
