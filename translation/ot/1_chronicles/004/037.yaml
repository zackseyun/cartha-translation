id: 1CH.4.37
reference: 1 Chronicles 4:37
source:
  edition: WLC
  text: וְ/זִיזָ֨א בֶן שִׁפְעִ֧י בֶן אַלּ֛וֹן בֶּן יְדָיָ֥ה בֶן שִׁמְרִ֖י בֶּן שְׁמַֽעְיָֽה־־־־־׃
translation:
  text: and Ziza son of Shiphi, son of Allon, son of Jedaiah, son of Shimri, son of
    Shemaiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly "Zizah," reflecting a different English convention for the final
      syllable of the name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זִיזָא
  chosen: and Ziza
  alternatives:
  - Zizah
  lexicon: HALOT
  rationale: The prefixed conjunction וְ is rendered as "and," continuing the genealogy
    list. The proper name is transliterated rather than translated, following the
    project policy for personal names. English spelling "Ziza" follows a straightforward
    transliteration of זִיזָא; "Zizah" is a possible alternative influenced by final-he
    conventions in some English traditions, but the Hebrew here ends with aleph, not
    he.
- source_word: בֶן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: In genealogical formulae, בֶן is most naturally rendered "son of." Repetition
    is preserved for transparency to the Hebrew structure. "The son of" is possible
    in smoother English but less direct.
- source_word: שִׁפְעִי
  chosen: Shiphi
  alternatives:
  - Shiph'i
  - Shiphai
  lexicon: HALOT
  rationale: Proper name transliterated by standard English conventions. "Shiphi"
    gives a readable form approximating the Hebrew consonants and vowels. Alternatives
    reflect different ways of representing the final hireq-yod or separating the ayin-like
    break, but the simpler form is preferable for readability.
- source_word: אַלּוֹן
  chosen: Allon
  lexicon: HALOT
  rationale: Proper name transliterated directly. Although the common noun can mean
    "oak," in this context it is clearly a personal name and should not be translated.
- source_word: יְדָיָה
  chosen: Jedaiah
  alternatives:
  - Jedajah
  lexicon: HALOT
  rationale: Proper name transliterated in a familiar English biblical form. This
    preserves recognizability while reflecting the Hebrew name.
- source_word: שִׁמְרִי
  chosen: Shimri
  alternatives:
  - Simri
  lexicon: HALOT
  rationale: Proper name transliterated with "Sh" to reflect Hebrew shin. "Simri"
    is less precise for the consonant.
- source_word: שְׁמַעְיָה
  chosen: Shemaiah
  alternatives:
  - Shemayah
  lexicon: HALOT
  rationale: Proper name transliterated in a standard English biblical form. This
    is more recognizable and readable than a more mechanically phonetic rendering.
