id: 1CH.4.20
reference: 1 Chronicles 4:20
source:
  edition: WLC
  text: וּ/בְנֵ֣י שִׁימ֔וֹן אַמְנ֣וֹן וְ/רִנָּ֔ה בֶּן חָנָ֖ן ו/תולון וּ/בְנֵ֣י יִשְׁעִ֔י
    זוֹחֵ֖ת וּ/בֶן זוֹחֵֽת־־׃
translation:
  text: 'The sons of Shimon: Amnon and Rinnah, Ben-Hanan and Tilon. And the sons of
    Ishi: Zoheth and Ben-Zoheth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Ben-Hanan' could be understood as 'the son of Hanan,' though in this
      genealogical list it is likely a personal name.
    reason: lexical_alternative
  - marker: b
    text: Or, 'Ben-Zoheth' could be understood as 'the son of Zoheth,' though in this
      genealogical list it is likely a personal name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  lexicon: HALOT
  rationale: Construct plural of בֵּן introducing a genealogy. At the head of the
    verse, English reads naturally without repeating 'and'; the second occurrence
    is rendered 'And the sons of' to reflect the Hebrew conjunction and the continuation
    of the list.
- source_word: שִׁימוֹן
  chosen: Shimon
  alternatives:
  - Simeon
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. Although 'Simeon' is traditional, the Hebrew form here is best represented
    as 'Shimon'.
- source_word: אַמְנוֹן
  chosen: Amnon
  lexicon: HALOT
  rationale: Proper name transliterated straightforwardly.
- source_word: וְרִנָּה
  chosen: and Rinnah
  lexicon: HALOT
  rationale: Proper name with conjunction; rendered as the next member in the genealogical
    list.
- source_word: בֶּן חָנָן
  chosen: Ben-Hanan
  alternatives:
  - son of Hanan
  - Benhanan
  lexicon: HALOT
  rationale: In this genealogical sequence the expression functions as a proper name
    rather than a fresh filial notice. Rendering it as the compound name 'Ben-Hanan'
    preserves the onomastic force and matches common treatment of such names in Chronicles.
    'Son of Hanan' would suggest a break in the list and a different syntactic relation.
- source_word: וְתוֹלוֹן
  chosen: and Tilon
  alternatives:
  - and Tolon
  lexicon: HALOT
  rationale: Proper name transliterated. 'Tilon' reflects the conventional English
    representation of the Hebrew vowels here.
- source_word: וּבְנֵי יִשְׁעִי
  chosen: And the sons of Ishi
  alternatives:
  - And the descendants of Ishi
  lexicon: HALOT
  rationale: Genealogical formula repeated. 'Sons' is the direct and standard rendering;
    while genealogies can imply broader descendants, nothing in the immediate syntax
    requires expansion.
- source_word: זוֹחֵת
  chosen: Zoheth
  lexicon: HALOT
  rationale: Proper name transliterated straightforwardly.
- source_word: וּבֶן זוֹחֵת
  chosen: and Ben-Zoheth
  alternatives:
  - and the son of Zoheth
  - and son Zoheth
  lexicon: HALOT
  rationale: As with 'Ben-Hanan,' this is best taken as a proper name in a list of
    names. The absence of a following personal name after 'son of' favors reading
    the whole expression as the name 'Ben-Zoheth' rather than a filial clause.
