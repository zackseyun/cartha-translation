id: 1CH.4.38
reference: 1 Chronicles 4:38
source:
  edition: WLC
  text: אֵ֚לֶּה הַ/בָּאִ֣ים בְּ/שֵׁמ֔וֹת נְשִׂיאִ֖ים בְּ/מִשְׁפְּחוֹתָ֑/ם וּ/בֵית֙
    אֲב֣וֹתֵי/הֶ֔ם פָּרְצ֖וּ לָ/רֽוֹב׃
translation:
  text: These, who were mentioned by name, were leaders in their clans, and their
    ancestral houses increased greatly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'These who came, listed by name.' The Hebrew participle literally means
      'coming,' but here likely refers to those entered or designated in the genealogical
      record.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'their fathers’ houses increased to abundance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - These men
  - These ones
  lexicon: HALOT
  rationale: Demonstrative plural introducing the named group from the preceding genealogy/list.
    Simple 'These' is natural and sufficiently explicit in English.
- source_word: הַבָּאִים
  chosen: who were mentioned
  alternatives:
  - who came
  - those who came
  - who entered
  lexicon: HALOT
  rationale: Although the participle of בוא literally means 'coming,' in genealogical/list
    contexts with בְּשֵׁמוֹת it idiomatically refers to those who are entered or listed
    by name. Rendering it woodenly as 'came' would be misleading here.
- source_word: בְּשֵׁמוֹת
  chosen: by name
  alternatives:
  - by names
  - named individually
  lexicon: HALOT
  rationale: Standard idiom meaning individually designated or recorded by name. 'By
    name' is concise and idiomatic in English.
- source_word: נְשִׂיאִים
  chosen: leaders
  alternatives:
  - chiefs
  - princes
  - chieftains
  lexicon: HALOT
  rationale: The term denotes elevated clan or tribal leaders. 'Princes' is too monarchical
    in modern English; 'chiefs' is possible but can sound archaic or culturally misleading.
    'Leaders' best fits the social setting.
- source_word: בְּמִשְׁפְּחוֹתָם
  chosen: in their clans
  alternatives:
  - among their families
  - in their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in genealogical contexts often refers to a clan-level kinship
    unit rather than the narrower modern nuclear 'family.' 'Clans' preserves that
    sense.
- source_word: וּבֵית אֲבוֹתֵיהֶם
  chosen: their ancestral houses
  alternatives:
  - their fathers' houses
  - their ancestral households
  lexicon: HALOT
  rationale: The phrase denotes the larger patrilineal household/lineage unit. 'Fathers'
    houses' is formally closer but less natural in modern English; 'ancestral houses'
    preserves the lineage sense without archaic phrasing.
- source_word: פָּרְצוּ
  chosen: increased
  alternatives:
  - spread out
  - multiplied
  - grew strong
  lexicon: HALOT
  rationale: The verb literally conveys breaking out/bursting forth, and in this context
    refers to numerical expansion or flourishing of the ancestral houses. 'Increased'
    communicates the result clearly.
- source_word: לָרֹב
  chosen: greatly
  alternatives:
  - abundantly
  - into a multitude
  - greatly in number
  lexicon: HALOT
  rationale: This phrase intensifies the growth as abundant or numerous. 'Greatly'
    is smooth English; the numerical nuance is already implied by 'increased' in context.
