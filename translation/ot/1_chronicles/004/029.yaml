id: 1CH.4.29
reference: 1 Chronicles 4:29
source:
  edition: WLC
  text: וּ/בְ/בִלְהָ֥ה וּ/בְ/עֶ֖צֶם וּ/בְ/תוֹלָֽד׃
translation:
  text: and in Bilhah, and in Ezem, and in Tolad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at Bilhah ... at Ezem ... at Tolad.' The Hebrew preposition ב can be
      rendered either way in a list of towns.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/בִלְהָה
  chosen: and in Bilhah
  alternatives:
  - and at Bilhah
  lexicon: HALOT
  rationale: The prefixed conjunction ו plus preposition ב is most naturally rendered
    'and in' in this place-name list. 'At' is possible idiomatic English for settlement
    lists, but 'in' more closely reflects the Hebrew preposition while remaining natural.
    בִלְהָה is a proper place name and is therefore transliterated as 'Bilhah' rather
    than translated.
- source_word: וּ/בְ/עֶצֶם
  chosen: and in Ezem
  alternatives:
  - and at Ezem
  lexicon: HALOT
  rationale: Again, ו + ב is rendered 'and in' for consistency in the sequence of
    towns. עֶצֶם here is a toponym in a genealogical-territorial list, so it is transliterated
    'Ezem.'
- source_word: וּ/בְ/תוֹלָד
  chosen: and in Tolad
  alternatives:
  - and at Tolad
  lexicon: HALOT
  rationale: The same construction continues the list of inhabited places. The proper
    name is transliterated 'Tolad.' 'In' is retained for formal consistency with the
    Hebrew preposition and the surrounding entries.
