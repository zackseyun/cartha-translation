id: 1CH.4.21
reference: 1 Chronicles 4:21
source:
  edition: WLC
  text: בְּנֵי֙ שֵׁלָ֣ה בֶן יְהוּדָ֔ה עֵ֚ר אֲבִ֣י לֵכָ֔ה וְ/לַעְדָּ֖ה אֲבִ֣י מָרֵשָׁ֑ה
    וּ/מִשְׁפְּח֛וֹת בֵּית עֲבֹדַ֥ת הַ/בֻּ֖ץ לְ/בֵ֥ית אַשְׁבֵּֽעַ־־׃
translation:
  text: 'The sons of Shelah son of Judah: Er the father of Lecah, and Laadah the father
    of Mareshah, and the clans of the house of linen workers at Beth-ashbea.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the clans of the house of those who worked fine linen, of Beth-ashbea.'
      The Hebrew phrase is compressed, and 'father of' earlier in the verse may also
      carry the sense 'founder of' or 'ancestor of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Literal filial language is appropriate in this genealogy. 'Descendants'
    is possible in genealogical contexts, but 'sons' preserves the Hebrew form and
    the style of the passage.
- source_word: שֵׁלָה
  chosen: Shelah
  lexicon: HALOT
  rationale: Personal name transliterated according to standard English convention.
- source_word: בֶן יְהוּדָה
  chosen: son of Judah
  alternatives:
  - of Judah
  lexicon: HALOT
  rationale: The construct explicitly states filiation. Retaining 'son of Judah' preserves
    the genealogical linkage rather than compressing it.
- source_word: עֵר
  chosen: Er
  lexicon: HALOT
  rationale: Personal name transliterated.
- source_word: אֲבִי
  chosen: the father of
  alternatives:
  - founder of
  - ancestor of
  lexicon: HALOT
  rationale: In genealogical and settlement lists, אבי can denote progenitor or founder
    associated with a place or clan. 'Father of' is kept in the main text for transparency,
    while allowing the broader sense to be understood from context.
- source_word: לֵכָה
  chosen: Lecah
  lexicon: HALOT
  rationale: Place or clan name transliterated in standard form.
- source_word: לַעְדָּה
  chosen: Laadah
  lexicon: HALOT
  rationale: Personal name transliterated.
- source_word: מָרֵשָׁה
  chosen: Mareshah
  lexicon: HALOT
  rationale: Place name transliterated in its common English biblical form.
- source_word: מִשְׁפְּחוֹת
  chosen: the clans
  alternatives:
  - the families
  lexicon: HALOT
  rationale: In tribal/genealogical contexts, 'clans' better communicates extended
    kinship groups than the more modern-sounding 'families'.
- source_word: בֵּית
  chosen: the house of
  alternatives:
  - the household of
  lexicon: HALOT
  rationale: Construct phrase preserved formally. Here it likely denotes a guild-like
    or familial house associated with a trade.
- source_word: עֲבֹדַת הַבֻּץ
  chosen: linen workers
  alternatives:
  - workers in fine linen
  - those who worked the linen
  lexicon: HALOT
  rationale: The phrase literally refers to the work/service of byssus or fine linen.
    'Linen workers' gives clear modern English while preserving the occupational sense.
    'Fine linen' is a possible nuance, but the shorter rendering is natural and adequate
    here.
- source_word: לְבֵית אַשְׁבֵּעַ
  chosen: at Beth-ashbea
  alternatives:
  - belonging to Beth-ashbea
  - of Beth-ashbea
  lexicon: HALOT
  rationale: The preposition ל with a place name in this compressed genealogical notice
    is difficult. 'At Beth-ashbea' best conveys local association in idiomatic English
    without overinterpreting the syntax.
