id: 1CH.4.33
reference: 1 Chronicles 4:33
source:
  edition: WLC
  text: וְ/כָל חַצְרֵי/הֶ֗ם אֲשֶׁ֧ר סְבִיב֛וֹת הֶ/עָרִ֥ים הָ/אֵ֖לֶּה עַד בָּ֑עַל זֹ֚את
    מוֹשְׁבֹתָ֔/ם וְ/הִתְיַחְשָׂ֖/ם לָ/הֶֽם־־׃
translation:
  text: And all their villages that were around these cities, as far as Baal—these
    were their settlements, and they had their genealogy recorded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their hamlets' or 'their settlements' for 'their villages.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and they enrolled themselves by genealogy'; the Hebrew expression refers
      to genealogical registration.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַצְרֵיהֶם
  chosen: their villages
  alternatives:
  - their hamlets
  - their settlements
  - their courts/enclosures
  lexicon: HALOT
  rationale: חָצֵר can denote an enclosure, courtyard, or a village/settlement dependent
    on context. In a list of inhabited places surrounding named cities, 'villages'
    best fits the geographic sense in natural English.
- source_word: אֲשֶׁר סְבִיבוֹת הֶעָרִים הָאֵלֶּה
  chosen: that were around these cities
  alternatives:
  - which were surrounding these cities
  - that were in the vicinity of these cities
  lexicon: HALOT
  rationale: The relative clause describes the villages' location with respect to
    the previously listed cities. 'Around these cities' is a clear, idiomatic rendering
    of the spatial phrase.
- source_word: עַד בָּעַל
  chosen: as far as Baal
  alternatives:
  - up to Baal
  lexicon: HALOT
  rationale: עַד marks extent or limit. Because בָּעַל here is a place name in the
    territorial description, it is transliterated as 'Baal' in keeping with the policy
    to transliterate names.
- source_word: זֹאת
  chosen: these were
  alternatives:
  - this was
  lexicon: HALOT
  rationale: 'Though formally singular feminine (''this''), זֹאת here functions resumptively/summatively
    over the preceding list. English idiom prefers plural agreement with the implied
    plural referent: ''these were.'''
- source_word: מוֹשְׁבֹתָם
  chosen: their settlements
  alternatives:
  - their dwelling places
  - their habitations
  lexicon: HALOT
  rationale: מוֹשָׁב denotes a dwelling place or place of settlement. 'Settlements'
    fits the administrative/geographical context and reads naturally in modern English.
- source_word: וְהִתְיַחְשָׂם לָהֶם
  chosen: and they had their genealogy recorded
  alternatives:
  - and their genealogical registration belonged to them
  - and they enrolled themselves by genealogy
  - and their genealogical record was for them
  lexicon: HALOT
  rationale: The Hitpael of יחס refers to reckoning or registering by genealogy. The
    phrase is somewhat compressed, but in context it indicates that these clans were
    genealogically enrolled/recorded. 'They had their genealogy recorded' conveys
    the sense clearly without over-paraphrasing.
