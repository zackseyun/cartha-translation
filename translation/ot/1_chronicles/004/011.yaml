id: 1CH.4.11
reference: 1 Chronicles 4:11
source:
  edition: WLC
  text: וּ/כְל֥וּב אֲחִֽי שׁוּחָ֖ה הוֹלִ֣יד אֶת מְחִ֑יר ה֖וּא אֲבִ֥י אֶשְׁתּֽוֹן־־׃
translation:
  text: Chelub, the brother of Shuhah, fathered Mehir; he was the father of Eshton.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ancestor/founder of Eshton.' In genealogical lists, 'father of' can
      sometimes denote a clan or settlement founder rather than an immediate biological
      father.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/כְל֥וּב
  chosen: Chelub
  alternatives:
  - Kelub
  lexicon: HALOT
  rationale: Proper name; transliterated rather than translated per project philosophy.
    The prefixed conjunction is naturally carried by English sentence flow without
    requiring an initial 'And' in this genealogical notice.
- source_word: אֲחִֽי שׁוּחָ֖ה
  chosen: the brother of Shuhah
  alternatives:
  - Shuhah's brother
  lexicon: HALOT
  rationale: Construct chain with אח rendered by the straightforward kinship term
    'brother.' 'The brother of Shuhah' preserves the Hebrew relation clearly in readable
    English.
- source_word: הוֹלִ֣יד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In genealogical contexts ילד in the Hiphil commonly denotes begetting
    or producing descendants. 'Fathered' is concise, natural modern English, and suitably
    genealogical without the archaism of 'begot.'
- source_word: מְחִ֑יר
  chosen: Mehir
  lexicon: HALOT
  rationale: Proper name; transliterated by standard convention.
- source_word: ה֖וּא
  chosen: he
  alternatives:
  - who
  lexicon: HALOT
  rationale: 'The independent pronoun resumes the subject and is best represented
    by ''he'' in English. This keeps the clause structure explicit: Mehir is followed
    by a statement about him.'
- source_word: אֲבִ֥י
  chosen: the father of
  alternatives:
  - ancestor of
  - founder of
  lexicon: HALOT
  rationale: In genealogies אב can denote immediate fatherhood or a broader ancestral/founding
    relationship. The default rendering 'father of' stays closest to the Hebrew while
    allowing the genealogical breadth to remain implicit.
- source_word: אֶשְׁתּֽוֹן
  chosen: Eshton
  lexicon: HALOT
  rationale: Proper name; transliterated by standard convention.
