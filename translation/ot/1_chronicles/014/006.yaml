id: 1CH.14.6
reference: 1 Chronicles 14:6
source:
  edition: WLC
  text: וְ/נֹ֥גַהּ וְ/נֶ֖פֶג וְ/יָפִֽיעַ׃
translation:
  text: Nogah, Nepheg, and Japhia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more phonetically, 'Noga.'
    reason: lexical_alternative
  - marker: b
    text: '''Japhia'' may also be transliterated ''Yaphia.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹגַהּ
  chosen: Nogah
  alternatives:
  - Noga
  lexicon: HALOT
  rationale: Proper name in a genealogical/name list; per translation philosophy,
    personal names are transliterated rather than translated. The final הּ can be
    represented in English as -ah; a shorter 'Noga' is a possible transliteration
    but 'Nogah' better reflects the Hebrew form.
- source_word: נֶפֶג
  chosen: Nepheg
  alternatives:
  - Nepheg/Nefeg (phonetic variation)
  lexicon: HALOT
  rationale: Proper name; transliterated directly. English tradition commonly uses
    'Nepheg,' which closely reflects the consonantal form.
- source_word: יָפִיעַ
  chosen: Japhia
  alternatives:
  - Yaphia
  lexicon: HALOT
  rationale: Proper name; transliterated by standard English convention. Initial yod
    in Hebrew personal names is commonly represented by 'J' in established biblical
    English forms, while 'Yaphia' is a more phonetic alternative.
