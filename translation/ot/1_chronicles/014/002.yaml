theological_decisions:
- issue: Referent of the possessive in 'his people Israel'
  chosen_reading: '''his'' refers to the LORD, not David'
  alternative_readings:
  - '''his'' refers to David'
  rationale: In context, the verse explains that David's kingdom was exalted for the
    benefit of Israel as the LORD's covenant people. This aligns with the broader
    Chronicler theology and avoids implying that Israel is fundamentally David's possession
    in the same sense.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Force of the second כִּי
  chosen_reading: 'causal: ''for'''
  alternative_readings:
  - resultative or explanatory 'that'
  rationale: 'The second clause gives the reason David knew the LORD had established
    him: his kingdom had been highly exalted. Rendering it ''for'' preserves the logical
    connection in clear English.'
  doctrine_reference: Translation philosophy §1, §6
