id: 1CH.14.2
reference: 1 Chronicles 14:2
source:
  edition: WLC
  text: וַ/יֵּ֣דַע דָּוִ֔יד כִּֽי הֱכִינ֧/וֹ יְהוָ֛ה לְ/מֶ֖לֶךְ עַל יִשְׂרָאֵ֑ל כִּֽי
    נִשֵּׂ֤את לְ/מַ֨עְלָ/ה֙ מַלְכוּת֔/וֹ בַּ/עֲב֖וּר עַמּ֥/וֹ יִשְׂרָאֵֽל־־־׃פ
translation:
  text: And David knew that the LORD had established him as king over Israel, for
    his kingdom had been exalted greatly for the sake of his people Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his kingdom had been lifted up on high.'
    reason: lexical_alternative
  - marker: b
    text: That is, Israel as the LORD's people; some take 'his people' to refer to
      David's people.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּדַע
  chosen: knew
  alternatives:
  - realized
  - recognized
  lexicon: HALOT
  rationale: Qal wayyiqtol of ידע commonly means 'know' or 'come to know.' 'Knew'
    is the most direct rendering and fits the narrative style without over-interpreting
    the cognitive nuance.
- source_word: הֱכִינוֹ
  chosen: had established him
  alternatives:
  - had made him secure
  - had confirmed him
  lexicon: HALOT
  rationale: Hiphil of כון often carries the sense of establishing, making firm, or
    confirming. 'Had established him' best fits royal installation language in context
    and reads naturally in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established English convention and the stated policy for
    יְהוָה.
- source_word: לְמֶלֶךְ
  chosen: as king
  alternatives:
  - to be king
  - for king
  lexicon: HALOT
  rationale: The preposition ל with מלך here marks result or appointment. 'As king'
    is idiomatic English for being established in royal office.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - upon Israel
  lexicon: HALOT
  rationale: עַל in royal contexts is naturally rendered 'over,' indicating rule or
    authority.
- source_word: נִשֵּׂאת
  chosen: had been exalted
  alternatives:
  - had been lifted up
  - had been raised
  lexicon: HALOT
  rationale: 'Niphal of נשׂא here is passive/reflexive in sense: the kingdom was lifted
    up or exalted. ''Had been exalted'' best conveys elevated status in a royal context.'
- source_word: לְמַעְלָה
  chosen: greatly
  alternatives:
  - on high
  - upward
  - to a high degree
  lexicon: HALOT
  rationale: The expression נִשֵּׂאת לְמַעְלָה is idiomatic for being raised high.
    In English, 'exalted greatly' communicates the adverbial force more naturally
    than the more literal but awkward 'exalted on high.'
- source_word: מַלְכוּתוֹ
  chosen: his kingdom
  alternatives:
  - his kingship
  - his reign
  lexicon: HALOT
  rationale: מַלְכוּת can denote kingdom, kingship, or royal rule. 'His kingdom' is
    the most straightforward here and matches the idea of David's royal dominion being
    elevated.
- source_word: בַּעֲבוּר
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  lexicon: HALOT
  rationale: בַּעֲבוּר often expresses purpose or benefit. 'For the sake of' best
    captures that David's exaltation served God's people rather than merely being
    caused by them.
- source_word: עַמּוֹ יִשְׂרָאֵל
  chosen: his people Israel
  alternatives:
  - his people, Israel
  - Israel his people
  lexicon: HALOT
  rationale: The phrase identifies Israel as belonging to the LORD. 'His people Israel'
    preserves the covenantal relationship and reads smoothly in English.
