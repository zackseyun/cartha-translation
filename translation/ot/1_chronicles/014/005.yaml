id: 1CH.14.5
reference: 1 Chronicles 14:5
source:
  edition: WLC
  text: וְ/יִבְחָ֥ר וֶ/אֱלִישׁ֖וּעַ וְ/אֶלְפָּֽלֶט׃
translation:
  text: Ibhar, Elishua, and Elpelet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: In the parallel account at 2 Samuel 5:16, the corresponding name appears
      as 'Elishama' rather than 'Elishua.' Chronicles here reads 'Elishua.'
    reason: textual_variant
  - marker: b
    text: '''Jibhar'' and ''Elpalet'' are conventional English spelling alternatives
      for ''Ibhar'' and ''Elpelet.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יִבְחָר
  chosen: Ibhar
  alternatives:
  - Jibhar
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. English form 'Ibhar' reflects a straightforward transliteration of
    the Hebrew name. 'Jibhar' is a possible conventional alternative based on older
    English name-rendering practices.
- source_word: אֱלִישׁוּעַ
  chosen: Elishua
  alternatives:
  - Elishama
  rationale: Proper personal name; transliterated directly from the Masoretic Hebrew.
    'Elishama' appears in the parallel list in 2 Samuel 5:16 and is therefore preserved
    as an alternative textual/cross-tradition form, but the Chronicles reading here
    is אֱלִישׁוּעַ.
- source_word: אֶלְפָּלֶט
  chosen: Elpelet
  alternatives:
  - Elpalet
  rationale: Proper personal name; transliterated from Hebrew. 'Elpelet' closely reflects
    the vocalization of the Masoretic Text; 'Elpalet' is a common English spelling
    alternative.
- source_word: וְ
  chosen: and
  rationale: The prefixed conjunction links the names in a simple list; rendered with
    standard English coordination.
