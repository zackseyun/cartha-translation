id: 1CH.14.10
reference: 1 Chronicles 14:10
source:
  edition: WLC
  text: וַ/יִּשְׁאַ֨ל דָּוִ֤יד בֵּ/אלֹהִים֙ לֵ/אמֹ֔ר הַ/אֶֽעֱלֶה֙ עַל פלשתיים וּ/נְתַתָּ֖/ם בְּ/יָדִ֑/י וַ/יֹּ֨אמֶר ל֤/וֹ יְהוָה֙ עֲלֵ֔ה וּ/נְתַתִּ֖י/ם בְּ/יָדֶֽ/ךָ־׃
translation:
  text: And David inquired of God, saying, “Shall I go up against the Philistines, and will you give them into my hand?” And Yahweh said to him, “Go up, and I will give them into your hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'will you deliver them into my hand?' The Hebrew idiom is literally 'give them into my hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַל
  chosen: inquired
  alternatives:
  - asked
  - consulted
  lexicon: HALOT
  rationale: The verb שׁאל here refers to seeking divine guidance, not merely asking a casual question. 'Inquired' preserves the formal sense of consulting God.
- source_word: בֵּאלֹהִים
  chosen: of God
  alternatives:
  - God
  - with God
  lexicon: HALOT
  rationale: The preposition ב with שׁאל in this idiom conveys inquiry directed to God. 'Inquired of God' is idiomatic English and reflects the construction well.
- source_word: הַאֶעֱלֶה
  chosen: Should I go up
  alternatives:
  - Shall I go up
  - Am I to go up
  lexicon: HALOT
  rationale: The interrogative with עלה asks whether David should undertake the military advance. 'Should I go up' is natural modern English while preserving the upward/military movement idiom.
- source_word: עַל פלשתיים
  chosen: against the Philistines
  alternatives:
  - to the Philistines
  - up to the Philistines
  lexicon: HALOT
  rationale: With military context, על plus a people group means hostile movement against them. 'Against the Philistines' makes the sense explicit in English.
- source_word: וּנְתַתָּם בְּיָדִי
  chosen: will you give them into my hand
  alternatives:
  - will you deliver them into my hand
  - will you place them in my power
  lexicon: HALOT
  rationale: נתן ביד is a standard idiom for giving an enemy into someone's power. 'Give them into my hand' keeps the Hebrew imagery; 'deliver' is possible but slightly more interpretive.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Advance
  - Go
  lexicon: HALOT
  rationale: The imperative repeats the same military-movement verb עלה from David's question. 'Go up' preserves the verbal correspondence.
- source_word: וּנְתַתִּים בְּיָדֶךָ
  chosen: I will give them into your hand
  alternatives:
  - I will deliver them into your hand
  - I will give them into your power
  lexicon: HALOT
  rationale: The response mirrors David's wording and should be translated correspondingly. Retaining 'into your hand' preserves the Hebrew idiom and literary symmetry.
