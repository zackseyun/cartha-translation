theological_decisions:
- issue: Narrative description of David's polygamy
  chosen_reading: Render the verse descriptively without moral qualification.
  alternative_readings:
  - Add an evaluative nuance implying approval or disapproval
  rationale: The verse reports David's taking additional wives and fathering children,
    but does not itself comment morally on the practice. To preserve the text's own
    stance, the translation remains descriptive and does not import doctrinal judgment.
  doctrine_reference: Translation philosophy §1, §3
