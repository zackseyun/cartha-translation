id: 1CH.14.3
reference: 1 Chronicles 14:3
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח דָּוִ֥יד ע֛וֹד נָשִׁ֖ים בִּ/ירוּשָׁלִָ֑ם וַ/יּ֧וֹלֶד דָּוִ֛יד
    ע֖וֹד בָּנִ֥ים וּ/בָנֽוֹת׃
translation:
  text: And David took more wives in Jerusalem, and David fathered more sons and daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'married more women'; the Hebrew literally says 'took more wives.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - married
  - took for himself
  lexicon: HALOT
  rationale: The verb לקח literally means 'took.' In this context of acquiring wives,
    English 'took' preserves the source wording without over-paraphrasing. 'Married'
    is interpretive and slightly smoother, but the Hebrew does not explicitly use
    a marriage-specific verb.
- source_word: עוֹד
  chosen: more
  alternatives:
  - again
  - additional
  lexicon: HALOT
  rationale: Here עוֹד modifies both 'wives' and 'sons and daughters' in a quantitative
    sense. 'More' is the most natural modern English rendering.
- source_word: נָשִׁים
  chosen: wives
  alternatives:
  - women
  lexicon: HALOT
  rationale: Although the noun can mean 'women' or 'wives,' in the context of David
    taking them in Jerusalem, 'wives' best reflects the relational sense intended
    by the narrative.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative use of the preposition ב with the place name
    Jerusalem.
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - had
  lexicon: HALOT
  rationale: The verb ילד with a male subject means 'became the father of' or 'fathered.'
    'Fathered' is accurate and readable modern English. 'Begot' is archaic; 'had'
    is too vague.
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly names both sexes. 'Sons and daughters' preserves
    that specificity better than the generalized 'children'.
- source_word: דָּוִיד
  chosen: David
  rationale: Standard English transliteration of the personal name.
