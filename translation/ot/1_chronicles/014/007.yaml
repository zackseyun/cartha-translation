id: 1CH.14.7
reference: 1 Chronicles 14:7
source:
  edition: WLC
  text: וֶ/אֱלִישָׁמָ֥ע וּ/בְעֶלְיָדָ֖ע וֶ/אֱלִיפָֽלֶט׃
translation:
  text: and Elishama, and Beeliada, and Eliphelet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: In the parallel list at 2 Samuel 5:16, the name appears as 'Eliada.' Here
      the Hebrew text reads 'Beeliada.'
    reason: alternative_reading
lexical_decisions:
- source_word: וֶ/אֱלִישָׁמָע
  chosen: and Elishama
  alternatives:
  - and Elishamah
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered as 'and.' The proper name is transliterated
    rather than translated, following the project policy for personal names. 'Elishama'
    is the standard English transliteration of אֱלִישָׁמָע.
- source_word: וּ/בְעֶלְיָדָע
  chosen: and Beeliada
  alternatives:
  - and Eliada
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered as 'and.' The consonantal form
    here is בְעֶלְיָדָע, which supports the transliteration 'Beeliada.' An alternative
    name form 'Eliada' appears in the parallel tradition (cf. 2 Sam 5:16), but this
    verse's Hebrew text specifically reads Beeliada, so the translation follows the
    received text and preserves the alternative in a footnote.
- source_word: וֶ/אֱלִיפָלֶט
  chosen: and Eliphelet
  alternatives:
  - and Elpalet
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered as 'and.' The proper name is transliterated
    as 'Eliphelet,' a conventional English representation of אֱלִיפָלֶט. Minor transliteration
    variations exist in English, but 'Eliphelet' best reflects the Hebrew form.
