id: 1CH.14.13
reference: 1 Chronicles 14:13
source:
  edition: WLC
  text: וַ/יֹּסִ֤יפוּ עוֹד֙ פְּלִשְׁתִּ֔ים וַֽ/יִּפְשְׁט֖וּ בָּ/עֵֽמֶק׃
translation:
  text: And the Philistines again spread out in the valley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'once more spread themselves out in the valley.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסִיפוּ
  chosen: again
  alternatives:
  - continued
  - added
  lexicon: HALOT
  rationale: The verb from יסף literally means 'added' or 'did again.' In English,
    the adverbial sense is most natural here when paired with עוֹד, yielding the idiomatic
    sense that the action was repeated.
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - further
  - once more
  lexicon: HALOT
  rationale: עוֹד reinforces repetition or continuation. Rather than render both וַיֹּסִיפוּ
    and עוֹד woodenly ('added still'), English compresses the combined force as 'again.'
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration of the people-group name with the English article,
    since the noun is definite in sense in context.
- source_word: וַיִּפְשְׁטוּ
  chosen: spread out
  alternatives:
  - made a raid
  - deployed themselves
  - rushed
  lexicon: HALOT
  rationale: The verb פשט can mean to spread out, strip off, or raid depending on
    context. Here, with 'in the valley' and in a military setting, 'spread out' best
    captures troop deployment across the area without over-specifying the action as
    plundering.
- source_word: בָּעֵמֶק
  chosen: in the valley
  alternatives:
  - through the valley
  - across the valley
  lexicon: HALOT
  rationale: 'The preposition ב with עֵמֶק is most straightforwardly locative: ''in
    the valley.'' The article is represented naturally in English.'
