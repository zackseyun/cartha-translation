theological_decisions:
- issue: Reference of אֱלֹהִים in David's declaration
  chosen_reading: God as the singular divine subject acting through David
  rationale: The singular verb פָּרַץ indicates a singular subject, so the clause
    attributes the victory to God while also affirming David as the human instrument
    ('by my hand'). This preserves the text's theology of divine agency without diminishing
    human participation.
  doctrine_reference: Translation philosophy §3
