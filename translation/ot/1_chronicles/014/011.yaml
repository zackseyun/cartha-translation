id: 1CH.14.11
reference: 1 Chronicles 14:11
source:
  edition: WLC
  text: וַ/יַּעֲל֥וּ בְּ/בַֽעַל פְּרָצִים֮ וַ/יַּכֵּ֣/ם שָׁ֣ם דָּוִיד֒ וַ/יֹּ֣אמֶר
    דָּוִ֔יד פָּרַ֨ץ הָֽ/אֱלֹהִ֧ים אֶת אוֹיְבַ֛/י בְּ/יָדִ֖/י כְּ/פֶ֣רֶץ מָ֑יִם עַל
    כֵּ֗ן קָֽרְא֛וּ שֵֽׁם הַ/מָּק֥וֹם הַ/ה֖וּא בַּ֥עַל פְּרָצִֽים־־־־׃
translation:
  text: So they went up to Baal-perazim, and David struck them down there. And David
    said, “God has broken through my enemies by my hand, like a bursting flood of
    waters.” Therefore they called the name of that place Baal-perazim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Baal-perazim sounds like 'lord/master of breakings through' or 'place of
      breakthroughs,' echoing David's statement that God 'broke through' his enemies.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  chosen: they went up
  alternatives:
  - they came up
  - they advanced
  lexicon: HALOT
  rationale: עלה in military movement commonly means 'go up' or 'come up.' 'Went up'
    preserves the directional idiom without overinterpreting the tactical nuance.
- source_word: בְּבַעַל פְּרָצִים / בַּעַל פְּרָצִים
  chosen: Baal-perazim
  alternatives:
  - Baal Perazim
  - Lord of Breakings Through
  lexicon: HALOT
  rationale: This is a place name and therefore transliterated per translation philosophy.
    The meaning is explained implicitly by David's wordplay on פרץ and preserved further
    in a footnote rather than translated in the main text.
- source_word: וַיַּכֵּם
  chosen: David struck them down
  alternatives:
  - David defeated them
  - David struck them
  lexicon: HALOT
  rationale: נכה in battle contexts often denotes striking/defeating. 'Struck them
    down' preserves the concrete martial force better than the more abstract 'defeated,'
    while the object suffix requires 'them.'
- source_word: פָּרַץ
  chosen: has broken through
  alternatives:
  - has burst forth against
  - has broken out against
  lexicon: HALOT
  rationale: פרץ conveys breaking through or bursting out. 'Has broken through' best
    matches the following simile 'like a bursting flood of waters' and preserves the
    wordplay with the place name Perazim.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: With the article, האלהים can still function idiomatically as 'God' rather
    than requiring 'the God' in English. The singular verb פָּרַץ confirms a singular
    referent.
- source_word: אֶת אֹיְבַי
  chosen: my enemies
  alternatives:
  - my foes
  lexicon: HALOT
  rationale: Straightforward rendering of the direct object phrase; 'enemies' is the
    standard and clearest gloss.
- source_word: בְּיָדִי
  chosen: by my hand
  alternatives:
  - through me
  - by means of me
  lexicon: HALOT
  rationale: The idiom literally means 'by my hand' and denotes agency/instrumentality.
    Retaining 'hand' preserves the Hebrew imagery while remaining natural in English.
- source_word: כְּפֶרֶץ מָיִם
  chosen: like a bursting flood of waters
  alternatives:
  - like the breaking out of waters
  - like a breach of waters
  lexicon: HALOT
  rationale: The phrase compares God's action to waters bursting through a breach.
    'Bursting flood of waters' is vivid, natural English that preserves the imagery
    and the lexical link to פרץ.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - That is why
  lexicon: HALOT
  rationale: Standard inferential connective; 'Therefore' fits the formal narrative
    style.
- source_word: קָרְאוּ שֵׁם הַמָּקוֹם הַהוּא
  chosen: they called the name of that place
  alternatives:
  - he called that place
  - that place was called
  lexicon: HALOT
  rationale: The Hebrew verb is 3rd person plural, so 'they called' is retained rather
    than harmonizing to the singular found in some parallel-style English renderings.
    'Called the name of that place' closely reflects the Hebrew naming formula.
