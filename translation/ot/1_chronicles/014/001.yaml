id: 1CH.14.1
reference: 1 Chronicles 14:1
source:
  edition: WLC
  text: וַ֠/יִּשְׁלַח חירם מֶֽלֶךְ צֹ֥ר מַלְאָכִים֮ אֶל דָּוִיד֒ וַ/עֲצֵ֣י אֲרָזִ֔ים
    וְ/חָרָשֵׁ֣י קִ֔יר וְ/חָרָשֵׁ֖י עֵצִ֑ים לִ/בְנ֥וֹת ל֖/וֹ בָּֽיִת־־׃
translation:
  text: Then Hiram king of Tyre sent messengers to David, along with cedar timber,
    masons, and carpenters, to build a house for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'envoys' for 'messengers.' The Hebrew term can denote official representatives
      in a royal context.
    reason: lexical_alternative
  - marker: b
    text: Or 'to build him a palace.' Hebrew 'house' can refer to a royal residence,
      but the main text preserves the more literal wording.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then ... sent
  alternatives:
  - And ... sent
  - sent
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative sequence while preserving the past action.
- source_word: חירם
  chosen: Hiram
  alternatives:
  - Huram
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention. Although
    Chronicles elsewhere often has 'Huram,' the consonantal form here supports 'Hiram.'
- source_word: מֶלֶךְ צֹר
  chosen: king of Tyre
  alternatives:
  - the king of Tyre
  lexicon: HALOT
  rationale: Construct chain straightforwardly identifies Hiram's royal office and
    realm. English omits the article naturally in apposition with the name.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  - ambassadors
  lexicon: HALOT
  rationale: The term broadly denotes messengers. In this diplomatic context 'envoys'
    is possible, but 'messengers' stays closer to the lexical base without overstating
    formal diplomatic rank.
- source_word: וַעֲצֵי אֲרָזִים
  chosen: along with cedar timber
  alternatives:
  - and cedar trees
  - and cedar wood
  - and cedar logs
  lexicon: HALOT
  rationale: The phrase refers to cedar wood supplied for construction, not living
    trees. 'Timber' communicates building material idiomatically.
- source_word: חָרָשֵׁי קִיר
  chosen: masons
  alternatives:
  - wall-builders
  - workers in stone
  lexicon: HALOT
  rationale: חָרָשׁ denotes a craftsman/artisan, and with קִיר ('wall') likely refers
    to builders working in masonry. 'Masons' is concise and fits the construction
    context.
- source_word: חָרָשֵׁי עֵצִים
  chosen: carpenters
  alternatives:
  - woodworkers
  - craftsmen in wood
  lexicon: HALOT
  rationale: The construct with 'wood' indicates artisans working in wood; 'carpenters'
    is the natural English equivalent in a building context.
- source_word: לִבְנוֹת לוֹ בָּיִת
  chosen: to build a house for him
  alternatives:
  - to build him a house
  - to build a palace for him
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'House' is the direct lexical equivalent
    of בַּיִת and should be retained rather than interpreted as 'palace,' though the
    context is royal construction.
