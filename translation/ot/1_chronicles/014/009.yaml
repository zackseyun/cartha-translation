id: 1CH.14.9
reference: 1 Chronicles 14:9
source:
  edition: WLC
  text: וּ/פְלִשְׁתִּ֖ים בָּ֑אוּ וַֽ/יִּפְשְׁט֖וּ בְּ/עֵ֥מֶק רְפָאִֽים׃
translation:
  text: Now the Philistines came and raided the Valley of Rephaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spread out in the Valley of Rephaim.' The Hebrew verb can denote deploying
      oneself or making a raid; the context favors a hostile military incursion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פְלִשְׁתִּים
  chosen: Now the Philistines
  alternatives:
  - And the Philistines
  - But the Philistines
  lexicon: HALOT
  rationale: פְלִשְׁתִּים is the ethnic name 'Philistines.' The prefixed conjunction
    ו is rendered 'Now' to give natural narrative progression in English; 'and' would
    also be possible more formally.
- source_word: בָּאוּ
  chosen: came
  alternatives:
  - had come
  - arrived
  lexicon: HALOT
  rationale: Qal perfect 3cp of בוא, straightforwardly 'came.' In narrative sequence,
    simple past is the most natural English rendering.
- source_word: וַיִּפְשְׁטוּ
  chosen: raided
  alternatives:
  - spread out
  - made a raid
  - invaded
  lexicon: HALOT
  rationale: From פשט in this military context, the sense is not merely spatial spreading
    but hostile deployment/plundering incursion. 'Raided' captures the military action
    idiomatically without overexpanding the text. 'Spread out' is possible but weaker
    and less contextually specific.
- source_word: בְּעֵמֶק
  chosen: the Valley of
  alternatives:
  - in the valley of
  - in the plain of
  lexicon: HALOT
  rationale: עֵמֶק denotes a valley. With the following proper name, English idiom
    favors 'the Valley of Rephaim.' The preposition ב is absorbed naturally into the
    verbal phrase 'raided the Valley of...' rather than rendered woodenly as 'in.'
- source_word: רְפָאִים
  chosen: Rephaim
  alternatives:
  - the Rephaim
  lexicon: HALOT
  rationale: Here רְפָאִים functions as a place name in the established expression
    'Valley of Rephaim.' As a proper name, it is transliterated rather than translated,
    in keeping with the translation philosophy.
