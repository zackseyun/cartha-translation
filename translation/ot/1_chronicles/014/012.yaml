theological_decisions:
- issue: Rendering אֱלֹהֵיהֶם in a context of pagan cult objects
  chosen_reading: their gods
  alternative_readings:
  - their idols
  rationale: The Hebrew text says 'their gods,' and the translation preserves that
    wording rather than replacing it with the more interpretive 'idols.' This avoids
    importing polemical language beyond the lexical form while still allowing the
    likely referent to be noted.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
