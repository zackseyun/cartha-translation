id: 1CH.14.12
reference: 1 Chronicles 14:12
source:
  edition: WLC
  text: וַ/יַּעַזְבוּ שָׁ֖ם אֶת אֱלֹֽהֵי/הֶ֑ם וַ/יֹּ֣אמֶר דָּוִ֔יד וַ/יִּשָּׂרְפ֖וּ
    בָּ/אֵֽשׁ־־׃פ
translation:
  text: And they left their gods there, and David gave the order, and they were burned
    with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their idols.' The Hebrew literally says 'their gods,' though the referent
      is likely their cult images.
    reason: lexical_alternative
  - marker: b
    text: 'The parallel account in 2 Samuel 5:21 reads more actively: ''and David
      and his men carried them away.'' Chronicles instead says they were burned with
      fire at David''s order.'
    reason: cross_reference
lexical_decisions:
- source_word: וַיַּעַזְבוּ
  chosen: they left
  alternatives:
  - they abandoned
  - they forsook
  lexicon: HALOT
  rationale: The verb עזב commonly means 'leave, abandon, forsake.' 'They left' is
    the most natural English rendering here, describing the Philistines leaving their
    idols behind in flight without adding interpretive weight.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: The adverb simply marks location. 'There' is concise and idiomatic.
- source_word: אֶת אֱלֹהֵיהֶם
  chosen: their gods
  alternatives:
  - their idols
  lexicon: HALOT
  rationale: Literally 'their gods.' Although the referent is cult images, the Hebrew
    uses אֱלֹהִים with a 3mp suffix, so 'their gods' best reflects the source wording.
    'Their idols' is interpretive and is better preserved as an alternative because
    the parallel in 2 Samuel 5:21 uses a term more explicitly meaning idols.
- source_word: וַיֹּאמֶר דָּוִיד
  chosen: David gave the order
  alternatives:
  - David said
  - David commanded
  lexicon: HALOT
  rationale: Literally 'and David said,' but in context the content of his speech
    is an order resulting in the burning. 'David gave the order' conveys the function
    of the speech in natural English while staying close to the narrative sense.
- source_word: וַיִּשָּׂרְפוּ
  chosen: they were burned
  alternatives:
  - they burned them
  - they were set on fire
  lexicon: HALOT
  rationale: 'The form is best taken here as passive/niphal-like in sense: ''they
    were burned.'' This matches the likely subject ''their gods'' and avoids supplying
    an explicit object not present in the Hebrew. It also aligns with the Chronicler''s
    wording, in contrast to the active formulation in the Samuel parallel.'
- source_word: בָּאֵשׁ
  chosen: with fire
  alternatives:
  - in the fire
  - by fire
  lexicon: HALOT
  rationale: The prepositional phrase indicates means or instrument. 'With fire' is
    idiomatic and clear in English.
