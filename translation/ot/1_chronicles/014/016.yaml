theological_decisions:
- issue: Subject of the battle verb וַיַּכּוּ
  chosen_reading: 'plural subject: David and his men/forces'
  alternative_readings:
  - singular sense referring to David alone
  rationale: The Hebrew verbal form is plural, and the narrative context naturally
    includes David's troops acting with him. The translation preserves this grammatical
    detail with 'they struck down' rather than smoothing to singular.
