id: 1CH.14.16
reference: 1 Chronicles 14:16
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ דָּוִ֔יד כַּֽ/אֲשֶׁ֥ר צִוָּ֖/הוּ הָֽ/אֱלֹהִ֑ים וַ/יַּכּוּ֙ אֶת
    מַחֲנֵ֣ה פְלִשְׁתִּ֔ים מִ/גִּבְע֖וֹן וְ/עַד גָּֽזְרָ/ה־־׃
translation:
  text: So David did as God had commanded him, and they struck down the Philistine
    army from Gibeon as far as Gezer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the camp of the Philistines'; here rendered 'the Philistine army'
      because 'camp' likely refers metonymically to the military force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: HALOT
  rationale: Common verb עשה here introduces David's obedience in straightforward
    narrative style. 'Did' best matches the idiom 'did as ... commanded' in natural
    English without overinterpreting.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according to what
  lexicon: HALOT
  rationale: 'Introduces comparison/conformity: David acted in conformity with the
    divine command. ''As'' is concise and idiomatic with the following verb.'
- source_word: צִוָּהוּ
  chosen: had commanded him
  alternatives:
  - commanded him
  - ordered him
  lexicon: HALOT
  rationale: The verb צוה denotes commanding. English past perfect ('had commanded
    him') clarifies that God's command preceded David's action. 'Ordered' is possible
    but slightly less fitting in biblical narrative register.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: With the article, Hebrew often still functions as a proper designation
    for Israel's God in context. English idiom prefers 'God' rather than 'the God'
    here.
- source_word: וַיַּכּוּ
  chosen: they struck down
  alternatives:
  - he struck
  - they defeated
  - they attacked
  lexicon: HALOT
  rationale: The form is morphologically plural, so the subject is best understood
    as David and his forces rather than David alone. נכה in military context commonly
    means to strike/defeat. 'Struck down' preserves the force better than the weaker
    'attacked.'
- source_word: מַחֲנֵה פְלִשְׁתִּים
  chosen: the Philistine army
  alternatives:
  - the camp of the Philistines
  - the Philistine camp
  lexicon: HALOT
  rationale: מַחֲנֶה literally means 'camp,' but in battle context it can stand metonymically
    for the encamped force. 'Army' communicates the military referent clearly in modern
    English while remaining faithful to the sense.
- source_word: מִגִּבְעוֹן וְעַד גָּזְרָה
  chosen: from Gibeon as far as Gezer
  alternatives:
  - from Gibeon to Gezer
  lexicon: HALOT
  rationale: The construction marks the extent of the pursuit/defeat. 'As far as'
    slightly better reflects עַד as a limit marker, though 'to' would also be acceptable.
    Place names are transliterated per project philosophy.
