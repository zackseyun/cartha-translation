id: 1CH.14.14
reference: 1 Chronicles 14:14
source:
  edition: WLC
  text: וַ/יִּשְׁאַ֨ל ע֤וֹד דָּוִיד֙ בֵּֽ/אלֹהִ֔ים וַ/יֹּ֤אמֶר ל/וֹ֙ הָֽ/אֱלֹהִ֔ים
    לֹ֥א תַֽעֲלֶ֖ה אַֽחֲרֵי/הֶ֑ם הָסֵב֙ מֵֽ/עֲלֵי/הֶ֔ם וּ/בָ֥אתָ לָ/הֶ֖ם מִ/מּ֥וּל
    הַ/בְּכָאִֽים׃
translation:
  text: So David inquired of God again, and God said to him, “You shall not go up
    after them. Circle around away from them, and come against them opposite the balsam
    trees.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the baca trees'; the exact species is uncertain. Traditional English
      versions often read 'mulberry trees.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַל ... בֵּאלֹהִים
  chosen: inquired of God
  alternatives:
  - asked God
  - consulted God
  lexicon: HALOT
  rationale: שׁאל with ב can denote asking/inquiring of someone, especially seeking
    divine guidance. 'Inquired of God' preserves the consultative sense better than
    the flatter 'asked God.'
- source_word: עוֹד
  chosen: again
  alternatives:
  - further
  - once more
  lexicon: HALOT
  rationale: In context it marks repetition of David's inquiry after the previous
    encounter; 'again' is the most natural modern English rendering.
- source_word: וַיֹּאמֶר לוֹ הָאֱלֹהִים
  chosen: and God said to him
  alternatives:
  - and God told him
  lexicon: HALOT
  rationale: A straightforward narrative speech formula. 'Said' is more formally aligned
    with the Hebrew than 'told.'
- source_word: לֹא תַעֲלֶה אַחֲרֵיהֶם
  chosen: You shall not go up after them
  alternatives:
  - Do not go up after them
  - You must not attack them from behind
  lexicon: HALOT
  rationale: עלה literally means 'go up.' In military context it can imply advancing/attacking,
    but the Hebrew wording is simple and should not be overinterpreted. 'You shall
    not go up after them' keeps the military movement language without paraphrase.
- source_word: הָסֵב
  chosen: Circle around
  alternatives:
  - Turn away
  - Go around
  lexicon: HALOT
  rationale: The imperative from סבב/סוב calls for changing direction or making a
    circuit. 'Circle around' captures the tactical maneuver more clearly than the
    vague 'turn away.'
- source_word: מֵעֲלֵיהֶם
  chosen: away from them
  alternatives:
  - from upon them
  - from against them
  lexicon: HALOT
  rationale: The prepositional phrase indicates moving away from a direct frontal
    position relative to the Philistines. 'Away from them' gives the sense in idiomatic
    English.
- source_word: וּבָאתָ לָהֶם
  chosen: and come against them
  alternatives:
  - and come to them
  - and approach them
  lexicon: HALOT
  rationale: בוא + ל in military context often means to come upon/against an enemy.
    'Come against them' makes the hostile force explicit from context while remaining
    close to the Hebrew.
- source_word: מִמּוּל
  chosen: opposite
  alternatives:
  - in front of
  - over against
  lexicon: HALOT
  rationale: The term denotes a position facing or opposite something. 'Opposite'
    is concise and natural.
- source_word: הַבְּכָאִים
  chosen: the balsam trees
  alternatives:
  - the baca trees
  - the mulberry trees
  lexicon: HALOT
  rationale: The plant term is uncertain. Traditional 'mulberry trees' is likely inaccurate,
    while 'baca trees' merely transliterates. 'Balsam trees' reflects a common lexical
    judgment while preserving a concrete botanical reference; the uncertainty is worth
    noting in a footnote.
