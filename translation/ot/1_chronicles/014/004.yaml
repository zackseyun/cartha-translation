id: 1CH.14.4
reference: 1 Chronicles 14:4
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה֙ שְׁמ֣וֹת הַ/יְלוּדִ֔ים אֲשֶׁ֥ר הָיוּ ל֖/וֹ בִּ/ירוּשָׁלִָ֑ם שַׁמּ֣וּעַ
    וְ/שׁוֹבָ֔ב נָתָ֖ן וּ/שְׁלֹמֹֽה־׃
translation:
  text: 'And these are the names of the children born to him in Jerusalem: Shammua,
    Shobab, Nathan, and Solomon.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ones born to him in Jerusalem.' The Hebrew expression is literally
      'the born ones' and does not use the ordinary noun for 'sons,' though all the
      names listed are male.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: And these are
  alternatives:
  - Now these are
  - These are
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces the next item in the narrative/list.
    'And these are' preserves the Hebrew linkage while remaining natural in English.
- source_word: שְׁמוֹת
  chosen: the names of
  alternatives:
  - the names
  lexicon: HALOT
  rationale: Construct plural of 'name' introducing a list of persons. English idiom
    prefers 'the names of' before the following genitive phrase.
- source_word: הַיְלוּדִים
  chosen: the children born
  alternatives:
  - those born
  - the sons born
  - the offspring born
  lexicon: HALOT
  rationale: Passive participial form from ילד, literally 'the ones born.' 'Children
    born' is natural and accurate. 'Sons' is possible in context because the listed
    names are male, but the Hebrew form here itself is not the ordinary noun 'sons';
    'children born' better reflects the wording without over-specifying.
- source_word: אֲשֶׁר הָיוּ לוֹ
  chosen: to him
  alternatives:
  - who were his
  - who belonged to him
  lexicon: HALOT
  rationale: 'The relative clause plus היה with ל expresses possession/existence:
    ''who were to him,'' idiomatically ''who were his'' or ''born to him.'' Since
    English already includes ''born'' from the participle, ''born to him'' efficiently
    conveys the possessive sense.'
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative prepositional phrase indicating the place of
    birth.
- source_word: שַׁמּוּעַ
  chosen: Shammua
  alternatives:
  - Shamua
  rationale: Personal name transliterated according to standard English convention,
    following the project's policy to transliterate names rather than translate them.
- source_word: שׁוֹבָב
  chosen: Shobab
  rationale: Personal name transliterated.
- source_word: נָתָן
  chosen: Nathan
  rationale: Personal name transliterated in its standard English form.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  alternatives:
  - Shelomoh
  rationale: Personal name transliterated by standard English convention; 'Solomon'
    is the established English form for שְׁלֹמֹה.
