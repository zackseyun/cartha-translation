id: 1CH.14.15
reference: 1 Chronicles 14:15
source:
  edition: WLC
  text: וִ֠/יהִי כְּֽ/שָׁמְעֲ/ךָ֞ אֶת ק֤וֹל הַ/צְּעָדָה֙ בְּ/רָאשֵׁ֣י הַ/בְּכָאִ֔ים
    אָ֖ז תֵּצֵ֣א בַ/מִּלְחָמָ֑ה כִּֽי יָצָ֤א הָֽ/אֱלֹהִים֙ לְ/פָנֶ֔י/ךָ לְ/הַכּ֖וֹת
    אֶת מַחֲנֵ֥ה פְלִשְׁתִּֽים־־־׃
translation:
  text: And when you hear the sound of marching in the tops of the balsam trees, then
    go out to battle, for God has gone out before you to strike down the camp of the
    Philistines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'baca trees' or traditionally 'mulberry trees'; the precise species denoted
      by the Hebrew is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיהִי
  chosen: And when
  alternatives:
  - And it shall be
  - And it will happen, when
  lexicon: HALOT
  rationale: The waw + היה introduces a temporal circumstance. In idiomatic English,
    folding it into 'And when' best reflects the clause-opening function without woodenly
    preserving 'it shall be.'
- source_word: כְּשָׁמְעֲךָ
  chosen: when you hear
  alternatives:
  - as soon as you hear
  - when you have heard
  lexicon: HALOT
  rationale: The preposition כ plus infinitive construct with 2ms suffix marks a temporal
    clause. 'When you hear' is natural and sufficiently precise; 'as soon as' would
    over-specify immediacy not explicit in the form.
- source_word: קוֹל
  chosen: sound
  alternatives:
  - voice
  - noise
  lexicon: HALOT
  rationale: Here qol refers not to speech but to an audible phenomenon associated
    with movement. 'Sound' is the most natural English equivalent in context.
- source_word: הַצְּעָדָה
  chosen: marching
  alternatives:
  - stepping
  - the sound of steps
  lexicon: HALOT
  rationale: From צעד, the noun denotes stepping or marching. In a military context
    and with the following command to attack, 'marching' captures the likely sense
    better than the more pedestrian 'steps,' while remaining textually grounded.
- source_word: בְּרָאשֵׁי
  chosen: in the tops of
  alternatives:
  - at the tops of
  - in the head/top of
  lexicon: HALOT
  rationale: The plural construct of 'head/top' with ב marks location. 'In the tops
    of' is idiomatic for movement/noise perceived among the upper parts of the trees.
- source_word: הַבְּכָאִים
  chosen: the balsam trees
  alternatives:
  - the baca trees
  - the mulberry trees
  lexicon: HALOT
  rationale: The precise species is uncertain. Traditional 'mulberry trees' is likely
    too specific, while transliterated 'baca trees' is opaque for modern readers.
    'Balsam trees' reflects a common scholarly identification while preserving the
    sense of a named tree type; the uncertainty is worth preserving in a footnote.
- source_word: אָז
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: Marks the consequent action after the sign is heard. 'Then' is the clearest
    English connective.
- source_word: תֵּצֵא
  chosen: go out
  alternatives:
  - advance
  - march out
  lexicon: HALOT
  rationale: The verb יצא literally means 'go out.' In military context it can imply
    advancing to engage, but 'go out' preserves the Hebrew while the following phrase
    'to battle' supplies the military sense.
- source_word: בַּמִּלְחָמָה
  chosen: to battle
  alternatives:
  - into the battle
  - for battle
  - in battle
  lexicon: HALOT
  rationale: The prepositional phrase is idiomatically rendered as movement into combat.
    'To battle' is concise and natural in English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason David should act. 'For' fits the explanatory force
    in elevated but readable English.
- source_word: יָצָא הָאֱלֹהִים לְפָנֶיךָ
  chosen: God has gone out before you
  alternatives:
  - God goes out before you
  - God has gone before you
  lexicon: HALOT
  rationale: The perfect verb presents the divine action as already initiated when
    the sign appears. 'Has gone out before you' preserves both the verb and the military
    imagery of preceding into battle.
- source_word: לְהַכּוֹת
  chosen: to strike down
  alternatives:
  - to strike
  - to defeat
  - to smite
  lexicon: HALOT
  rationale: The hiphil infinitive of נכה commonly means to strike/defeat. 'Strike
    down' communicates decisive military action in clear modern English.
- source_word: מַחֲנֵה פְלִשְׁתִּים
  chosen: the camp of the Philistines
  alternatives:
  - the army of the Philistines
  - the Philistine camp
  lexicon: HALOT
  rationale: מַחֲנֶה is literally 'camp,' which can metonymically denote the army.
    'The camp of the Philistines' stays closer to the Hebrew while remaining intelligible.
