theological_decisions:
- issue: Rendering הָאֱלֹהִים
  chosen_reading: God
  alternative_readings:
  - the gods
  rationale: Although אֱלֹהִים is morphologically plural, in this context with a singular
    verb and Israel's God as subject, it clearly refers to the one true God. No doctrinally
    contested issue is present, but the singular English rendering should be documented.
