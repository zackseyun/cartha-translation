id: 1CH.14.8
reference: 1 Chronicles 14:8
source:
  edition: WLC
  text: וַ/יִּשְׁמְע֣וּ פְלִשְׁתִּ֗ים כִּי נִמְשַׁ֨ח דָּוִ֤יד לְ/מֶ֨לֶךְ֙ עַל כָּל
    יִשְׂרָאֵ֔ל וַ/יַּעֲל֥וּ כָל פְּלִשְׁתִּ֖ים לְ/בַקֵּ֣שׁ אֶת דָּוִ֑יד וַ/יִּשְׁמַ֣ע
    דָּוִ֔יד וַ/יֵּצֵ֖א לִ/פְנֵי/הֶֽם־־־־־׃
translation:
  text: When the Philistines heard that David had been anointed king over all Israel,
    all the Philistines went up to seek David. And David heard, and went out before
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'went out to meet them' or 'went out against them.' The Hebrew literally
      says 'went out before them,' which may imply military confrontation without
      stating it explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  chosen: heard
  alternatives:
  - learned
  - came to hear
  lexicon: HALOT
  rationale: The verb שׁמע in narrative commonly means 'hear' in the sense of receiving
    news. 'Heard' is the most direct and natural English rendering here.
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  alternatives:
  - Philistines
  lexicon: HALOT
  rationale: Standard transliteration for the people group. The English article is
    natural for a known national group in narrative.
- source_word: כִּי
  chosen: that
  alternatives:
  - when
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what they heard, so 'that' best reflects
    the clause function.
- source_word: נִמְשַׁח
  chosen: had been anointed
  alternatives:
  - was anointed
  lexicon: HALOT
  rationale: The Niphal of משׁח means 'be anointed.' English past perfect fits the
    sequence after 'heard that,' indicating an action already completed.
- source_word: לְמֶלֶךְ
  chosen: king
  alternatives:
  - as king
  lexicon: HALOT
  rationale: 'The preposition ל marks result or office: David was anointed ''king''/''as
    king.'' ''King'' is concise and idiomatic in English.'
- source_word: עַל כָּל יִשְׂרָאֵל
  chosen: over all Israel
  alternatives:
  - for all Israel
  lexicon: HALOT
  rationale: עַל with royal office indicates rule over a people. 'Over all Israel'
    preserves the political scope of David's kingship.
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - came up
  - marched up
  lexicon: HALOT
  rationale: '''Went up'' is the standard rendering of עלה in military-geographical
    narrative. ''Marched up'' would add military nuance not explicit in the verb itself.'
- source_word: כָל פְּלִשְׁתִּים
  chosen: all the Philistines
  alternatives:
  - the whole Philistine force
  - all Philistia
  lexicon: HALOT
  rationale: A straightforward rendering of the distributive/collective phrase. It
    likely means the Philistine forces broadly, but the Hebrew says 'all the Philistines,'
    which should be preserved.
- source_word: לְבַקֵּשׁ אֶת דָּוִיד
  chosen: to seek David
  alternatives:
  - to look for David
  - to search for David
  lexicon: HALOT
  rationale: בקשׁ means 'seek.' In this hostile context it implies pursuit, but 'seek
    David' preserves the Hebrew wording without over-specifying their intent.
- source_word: וַיִּשְׁמַע דָּוִיד
  chosen: And David heard
  alternatives:
  - But David heard
  - When David heard
  lexicon: HALOT
  rationale: The repeated שׁמע forms a narrative link with the Philistines' hearing.
    'And David heard' preserves the Hebrew coordination and rhythm.
- source_word: וַיֵּצֵא לִפְנֵיהֶם
  chosen: went out before them
  alternatives:
  - went out to meet them
  - went out against them
  lexicon: HALOT
  rationale: Literally, 'went out before them.' In context it likely means he advanced
    to confront them, but the more literal rendering preserves the Hebrew image while
    remaining intelligible. A more interpretive alternative is worth preserving in
    a footnote.
