id: 1CH.14.17
reference: 1 Chronicles 14:17
source:
  edition: WLC
  text: וַ/יֵּצֵ֥א שֵׁם דָּוִ֖יד בְּ/כָל הָֽ/אֲרָצ֑וֹת וַֽ/יהוָ֛ה נָתַ֥ן אֶת פַּחְדּ֖/וֹ עַל כָּל הַ/גּוֹיִֽם־־־־־׃
translation:
  text: And David’s name went out into all the lands, and Yahweh put the fear of him on all the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'David’s fame spread through all the lands.'
    reason: lexical_alternative
  - marker: b
    text: That is, the LORD caused all the nations to fear David.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - spread
  - went forth
  lexicon: HALOT
  rationale: The verb יצא literally means 'go out.' In this idiom with 'name,' it conveys the extension of reputation. 'Went out' preserves the Hebrew image while remaining natural English; 'spread' is possible but slightly more interpretive.
- source_word: שֵׁם
  chosen: name
  alternatives:
  - fame
  - reputation
  lexicon: HALOT
  rationale: Hebrew 'name' often stands metonymically for fame or renown. Retaining 'name' keeps the source-language expression and allows readers to infer the sense of reputation from context.
- source_word: בְּכָל הָאֲרָצוֹת
  chosen: into all the lands
  alternatives:
  - throughout all the lands
  - in all the countries
  lexicon: HALOT
  rationale: אֲרָצוֹת is the plural of 'land/earth' and here refers to multiple surrounding lands or territories. 'Lands' is more formally aligned than 'countries,' while 'into all the lands' fits the motion implied by 'went out.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נָתַן
  chosen: put
  alternatives:
  - gave
  - set
  lexicon: HALOT
  rationale: With פחד plus עַל, the idiom means to place fear upon someone. 'Put' is idiomatic and straightforward in English.
- source_word: פַּחְדּוֹ
  chosen: the fear of him
  alternatives:
  - fear of him
  - dread of him
  - his fear
  lexicon: HALOT
  rationale: The suffix is third masculine singular and in context refers to David, not the LORD. 'The fear of him' is slightly more literal and clarifies that the nations feared David. 'Dread' is possible but stronger than necessary.
- source_word: עַל כָּל הַגּוֹיִם
  chosen: on all the nations
  alternatives:
  - upon all the nations
  - over all the nations
  lexicon: HALOT
  rationale: גּוֹיִם here denotes the surrounding peoples/nations. 'On all the nations' reflects the Hebrew preposition עַל in the idiom 'put fear on/upon.'
