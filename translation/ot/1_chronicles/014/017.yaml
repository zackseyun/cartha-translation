theological_decisions:
- issue: Referent of the pronominal suffix in 'פַּחְדּוֹ'
  chosen_reading: 'The suffix refers to David: ''the fear of him.'''
  alternative_readings:
  - 'The suffix refers to the LORD: ''his fear'' meaning fear of the LORD'
  rationale: The immediate context centers on David's renown among the nations after military victories, and the parallel in Chronicles/Samuel presents God as causing surrounding nations to fear David. Thus the most contextually coherent reading is that the LORD caused fear of David to fall on the nations.
