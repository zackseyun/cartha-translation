id: 1CH.13.2
reference: 1 Chronicles 13:2
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר דָּוִ֜יד לְ/כֹ֣ל קְהַ֣ל יִשְׂרָאֵ֗ל אִם עֲלֵי/כֶ֨ם ט֜וֹב וּ/מִן יְהוָ֣ה אֱלֹהֵ֗י/נוּ נִפְרְצָה֙ נִשְׁלְחָ֞ה עַל אַחֵ֣י/נוּ הַ/נִּשְׁאָרִ֗ים בְּ/כֹל֙ אַרְצ֣וֹת יִשְׂרָאֵ֔ל וְ/עִמָּ/הֶ֛ם הַ/כֹּהֲנִ֥ים וְ/הַ/לְוִיִּ֖ם בְּ/עָרֵ֣י מִגְרְשֵׁי/הֶ֑ם וְ/יִקָּבְצ֖וּ אֵלֵֽי/נוּ׀־־־׃
translation:
  text: And David said to all the assembly of Israel, “If it seems good to you, and if it is from Yahweh our God, let us send word to our brothers who remain in all the lands of Israel, and also to the priests and Levites with them in the cities of their pasturelands, that they may gather to us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'let us break out; let us send.' The expression likely means to send out broadly or widely.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here refers to fellow Israelites in a representative sense.'
    reason: lexical_alternative
  - marker: c
    text: Or 'regions of Israel'; Hebrew has the plural 'lands.'
    reason: lexical_alternative
  - marker: d
    text: That is, the open lands or pasturelands belonging to their cities.
    reason: cultural_note
lexical_decisions:
- source_word: קְהַל
  chosen: assembly
  alternatives:
  - congregation
  - community
  lexicon: HALOT
  rationale: '''Assembly'' best fits the gathered national body in context without importing later ecclesiastical overtones that ''congregation'' may carry.'
- source_word: אִם עֲלֵיכֶם טוֹב
  chosen: If it seems good to you
  alternatives:
  - If it is good in your eyes
  - If it is good to you
  lexicon: HALOT
  rationale: This idiom expresses approval or consent. 'Seems good to you' is natural modern English while preserving the conditional appeal to the people's judgment.
- source_word: וּמִן יְהוָה אֱלֹהֵינוּ
  chosen: and if it is from the LORD our God
  alternatives:
  - and from the LORD our God
  - and if this is from the LORD our God
  lexicon: HALOT
  rationale: The phrase coordinates popular approval with divine sanction. Supplying 'if it is' makes the English idiomatic and reflects the implied predicate.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's default rendering for the divine name.
- source_word: נִפְרְצָה
  chosen: far and wide
  alternatives:
  - let us break out
  - let us spread out
  lexicon: HALOT
  rationale: The verb literally suggests breaking out or spreading abroad. In this collocation with 'let us send,' it idiomatically intensifies the scope of the sending. Rendering it adverbially as 'far and wide' communicates the sense in clear English.
- source_word: נִשְׁלְחָה
  chosen: let us send word
  alternatives:
  - let us send
  - let us dispatch messengers
  lexicon: HALOT
  rationale: The object is implicit in Hebrew. 'Send word' makes explicit the communicative action intended by the following prepositional phrase and invitation to gather.
- source_word: עַל אַחֵינוּ
  chosen: to our brothers
  alternatives:
  - concerning our brothers
  - to our kinsmen
  lexicon: HALOT
  rationale: With שלח and על, the sense is sending to or reaching out to. 'Brothers' preserves the masculine familial term used representatively for fellow Israelites, in line with the gender-accurate policy.
- source_word: הַנִּשְׁאָרִים
  chosen: who remain
  alternatives:
  - who are left
  - the remnant
  lexicon: HALOT
  rationale: The participle denotes those remaining throughout the land. 'Who remain' is straightforward and avoids overloading the phrase with the theological nuance 'remnant,' which is not demanded here.
- source_word: בְּכֹל אַרְצוֹת יִשְׂרָאֵל
  chosen: in all the lands of Israel
  alternatives:
  - throughout all the land of Israel
  - in all the regions of Israel
  lexicon: HALOT
  rationale: The plural 'lands' or 'regions' reflects the Hebrew plural אַרְצוֹת. 'Lands of Israel' is retained rather than flattening to singular, though the sense is territorial breadth within Israel.
- source_word: וְעִמָּהֶם
  chosen: and also to ... with them
  alternatives:
  - and with them
  - together with them
  lexicon: HALOT
  rationale: The phrase links the priests and Levites residing among those addressed. The English wording clarifies that they too are recipients of the summons.
- source_word: מִגְרְשֵׁיהֶם
  chosen: pasturelands
  alternatives:
  - common lands
  - open lands
  lexicon: HALOT
  rationale: The term refers to the surrounding lands attached to Levitical cities, often for grazing. 'Pasturelands' is concrete and contextually apt.
- source_word: וְיִקָּבְצוּ אֵלֵינוּ
  chosen: that they may gather to us
  alternatives:
  - and let them gather to us
  - that they may assemble with us
  lexicon: HALOT
  rationale: The imperfect here expresses purpose or result following the summons. 'That they may gather to us' preserves the directional sense and the collective action.
