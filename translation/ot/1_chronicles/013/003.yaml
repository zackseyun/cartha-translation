theological_decisions:
- issue: Object of 'we did not seek'
  chosen_reading: Retain the grammatical object as 'it,' referring to the ark, while
    allowing the theological implication that Israel had neglected seeking God in
    connection with the ark.
  alternative_readings:
  - we did not seek him
  - we did not inquire of him
  rationale: The Hebrew suffix most naturally points back to 'ark' (masculine singular),
    not directly to God. Rendering 'him' would import an interpretive theological
    conclusion into the main text. The wording should preserve the text's concrete
    reference and let readers infer the broader spiritual neglect.
  doctrine_reference: Translation philosophy §§1, 3, 5
