id: 1CH.13.3
reference: 1 Chronicles 13:3
source:
  edition: WLC
  text: וְ/נָסֵ֛בָּה אֶת אֲר֥וֹן אֱלֹהֵ֖י/נוּ אֵלֵ֑י/נוּ כִּי לֹ֥א דְרַשְׁנֻ֖/הוּ
    בִּ/ימֵ֥י שָׁאֽוּל־־׃
translation:
  text: And let us bring the ark of our God back to us, for we did not seek it in
    the days of Shaul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'we did not inquire of it/him.' The Hebrew verb can carry the sense
      of seeking or inquiring, and some translations make the object explicitly God
      rather than the ark.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסֵבָּה
  chosen: And let us bring ... back
  alternatives:
  - and let us turn around
  - and let us bring around
  lexicon: HALOT
  rationale: The cohortative 1cp of סבב here is idiomatic in context for causing the
    ark to be brought back/around to the community. Given the object 'the ark of our
    God' and the following 'to us,' English 'let us bring ... back' best captures
    the intended motion without wooden awkwardness.
- source_word: אֶת אֲרוֹן אֱלֹהֵינוּ
  chosen: the ark of our God
  alternatives:
  - the ark of God, ours
  lexicon: HALOT
  rationale: Construct chain with 1cp suffix straightforwardly means 'the ark of our
    God.' Retaining 'ark' preserves the cultic object reference without paraphrase.
- source_word: אֵלֵינוּ
  chosen: to us
  alternatives:
  - to ourselves
  lexicon: HALOT
  rationale: The preposition with 1cp suffix indicates direction toward the speakers/community.
    'To us' is natural modern English and preserves the communal sense.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the proposal. 'For' fits the explanatory relation
    and keeps a slightly formal narrative tone appropriate to the context.
- source_word: לֹא דְרַשְׁנֻהוּ
  chosen: we did not seek it
  alternatives:
  - we did not inquire of it
  - we did not consult it
  - we did not seek him
  lexicon: HALOT
  rationale: דרש with object suffix can mean seek, inquire after, or consult. In this
    context of neglecting the ark as the locus of divine presence, 'seek it' is the
    most direct rendering of the grammar while allowing the implied sense of seeking
    God by means of the ark. The suffix grammatically refers to the masculine singular
    noun 'ark,' so 'it' is preferred over interpretive 'him.'
- source_word: בִּימֵי שָׁאוּל
  chosen: in the days of Shaul
  alternatives:
  - during the days of Saul
  - in Saul's days
  lexicon: HALOT
  rationale: The phrase means 'in the days of Saul.' Per project guidance, personal
    names are transliterated by standard conventions from the Hebrew, so 'Shaul' is
    used rather than the traditional anglicized 'Saul'.
