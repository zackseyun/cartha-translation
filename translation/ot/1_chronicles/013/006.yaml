theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpreting the final clause אֲשֶׁר נִקְרָא שֵׁם
  chosen_reading: whose name is called there
  alternative_readings:
  - which is called by the Name
  - where the Name is invoked
  rationale: The Hebrew is elliptical and has a well-known parallel in 2 Samuel 6:2.
    To preserve the ambiguity rather than over-resolve it, the main text stays relatively
    literal and the more idiomatic interpretive options are preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
