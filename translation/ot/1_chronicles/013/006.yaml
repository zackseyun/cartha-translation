id: 1CH.13.6
reference: 1 Chronicles 13:6
source:
  edition: WLC
  text: וַ/יַּ֨עַל דָּוִ֤יד וְ/כָל יִשְׂרָאֵל֙ בַּעֲלָ֔תָ/ה אֶל קִרְיַ֥ת יְעָרִ֖ים
    אֲשֶׁ֣ר לִ/יהוּדָ֑ה לְ/הַעֲל֣וֹת מִ/שָּׁ֗ם אֵת֩ אֲר֨וֹן הָ/אֱלֹהִ֧ים יְהוָ֛ה יוֹשֵׁ֥ב
    הַ/כְּרוּבִ֖ים אֲשֶׁר נִקְרָ֥א שֵֽׁם־־׀־׃
translation:
  text: So David and all Israel went up to Baalah, that is, to Kiriath-jearim, which
    belongs to Judah, to bring up from there the ark of God, the LORD who is enthroned
    above the cherubim, whose name is called there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the ark of God, the LORD who is enthroned above
      the cherubim, which is called by the Name.' Compare 2 Samuel 6:2.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - ascended
  - went
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' In narrative travel contexts, 'went
    up' preserves the directional sense without sounding overly formal.
- source_word: בַּעֲלָתָה
  chosen: Baalah
  alternatives:
  - Baalath
  lexicon: HALOT
  rationale: A place name; transliterated per philosophy. The form refers to the same
    location identified appositionally as Kiriath-jearim.
- source_word: אֶל קִרְיַת יְעָרִים
  chosen: that is, to Kiriath-jearim
  alternatives:
  - to Kiriath-jearim
  - toward Kiriath-jearim
  lexicon: HALOT
  rationale: The verse names Baalah and then identifies it as Kiriath-jearim. 'That
    is' makes the appositional identification clear in natural English.
- source_word: אֲשֶׁר לִיהוּדָה
  chosen: which belongs to Judah
  alternatives:
  - which is in Judah
  - which is of Judah
  lexicon: HALOT
  rationale: The lamed construction marks association with the tribal territory of
    Judah. 'Belongs to Judah' is a clear territorial rendering; 'is in Judah' is possible
    but slightly less explicit.
- source_word: לְהַעֲלוֹת מִשָּׁם
  chosen: to bring up from there
  alternatives:
  - to carry up from there
  - to bring from there
  lexicon: HALOT
  rationale: The infinitive of עלה with the ark as object indicates transporting it
    upward/from that place. 'Bring up' preserves the verbal link with ויעל while sounding
    idiomatic.
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the ark of the true God
  lexicon: HALOT
  rationale: Standard construct rendering. No contextual need to expand 'God' beyond
    the Hebrew.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: יוֹשֵׁב הַכְּרוּבִים
  chosen: who is enthroned above the cherubim
  alternatives:
  - who sits enthroned between the cherubim
  - who dwells among the cherubim
  lexicon: HALOT
  rationale: The participle with cherubim evokes the LORD's royal enthronement in
    relation to the ark. 'Enthroned above' is concise and fits the ark imagery; 'between'
    reflects traditional wording but is interpretive beyond the prepositionless Hebrew
    here.
- source_word: אֲשֶׁר נִקְרָא שֵׁם
  chosen: whose name is called there
  alternatives:
  - which is called by the Name
  - where the Name is invoked
  - on which the Name is called
  lexicon: HALOT
  rationale: This compressed Hebrew clause is difficult. The likely sense is that
    the ark is identified by the divine Name. Because Chronicles parallels 2 Sam 6:2,
    alternatives such as 'which is called by the Name' are strong. I chose a relatively
    literal rendering that preserves the passive 'is called' and allows the footnote
    to preserve the more idiomatic alternative.
