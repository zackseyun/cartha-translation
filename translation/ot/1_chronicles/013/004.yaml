id: 1CH.13.4
reference: 1 Chronicles 13:4
source:
  edition: WLC
  text: וַ/יֹּאמְר֥וּ כָֽל הַ/קָּהָ֖ל לַ/עֲשׂ֣וֹת כֵּ֑ן כִּֽי יָשַׁ֥ר הַ/דָּבָ֖ר בְּ/עֵינֵ֥י
    כָל הָ/עָֽם־־־׃
translation:
  text: And all the assembly said to do so, for the matter was right in the eyes of
    all the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole assembly said that it should be done'; the Hebrew wording
      expresses the assembly's consent to the proposal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: said
  alternatives:
  - said that they should do so
  - agreed
  lexicon: HALOT
  rationale: The verb is the standard wayyiqtol of אמר, 'to say.' 'Said' preserves
    the direct verbal action without over-interpreting it as mere internal agreement,
    though the context implies consent.
- source_word: כָל הַקָּהָל
  chosen: all the assembly
  alternatives:
  - the whole assembly
  - all the congregation
  lexicon: HALOT
  rationale: קָהָל commonly denotes the assembled community. 'Assembly' is clear modern
    English and fits the gathered national body better than the more ecclesiastically
    colored 'congregation.' The prefixed כָל is retained as 'all.'
- source_word: לַעֲשׂוֹת כֵּן
  chosen: to do so
  alternatives:
  - to do thus
  - to act accordingly
  lexicon: HALOT
  rationale: The infinitive construct of עשה with כֵּן is idiomatically rendered 'to
    do so.' This is natural English while remaining close to the Hebrew expression.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the assembly's response. 'For' is
    concise and preserves the explanatory connection.
- source_word: יָשַׁר
  chosen: was right
  alternatives:
  - was upright
  - was pleasing
  - was proper
  lexicon: HALOT
  rationale: יָשַׁר in this context describes the proposal as proper or right. 'Was
    right' is the most natural English equivalent and matches the evaluative sense.
- source_word: הַדָּבָר
  chosen: the matter
  alternatives:
  - the thing
  - the proposal
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' In this deliberative context,
    'the matter' best captures the proposal under discussion without adding interpretation.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - to
  lexicon: HALOT
  rationale: This Hebrew idiom is preserved as 'in the eyes of' because it is standard,
    transparent English biblical idiom and communicates evaluative perspective.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - the whole people
  - all the nation
  lexicon: HALOT
  rationale: עָם here refers to the people collectively. 'All the people' is the most
    straightforward rendering and mirrors the Hebrew construction with כָל.
