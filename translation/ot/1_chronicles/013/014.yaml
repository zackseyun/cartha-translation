id: 1CH.13.14
reference: 1 Chronicles 13:14
source:
  edition: WLC
  text: וַ/יֵּשֶׁב֩ אֲר֨וֹן הָ/אֱלֹהִ֜ים עִם בֵּ֨ית עֹבֵ֥ד אֱדֹ֛ם בְּ/בֵית֖/וֹ שְׁלֹשָׁ֣ה
    חֳדָשִׁ֑ים וַ/יְבָ֧רֶךְ יְהוָ֛ה אֶת בֵּ֥ית עֹבֵֽד אֱדֹ֖ם וְ/אֶת כָּל אֲשֶׁר לֽ/וֹ־־־־־־׃פ
translation:
  text: And the ark of God remained with the household of Obed-edom, in his house,
    for three months. And the LORD blessed the household of Obed-edom and all that
    belonged to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the house of Obed-edom' in both occurrences; Hebrew בֵּית can mean either
      a physical house or a household.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: remained
  alternatives:
  - stayed
  - dwelt
  - sat
  lexicon: HALOT
  rationale: The verb ישב literally means 'sit/dwell/remain.' In this context of the
    ark's temporary location, 'remained' best captures continued presence in idiomatic
    English without implying permanent residence as strongly as 'dwelt.'
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the ark of the covenant of God
  lexicon: HALOT
  rationale: The Hebrew here is simply 'the ark of God,' not the fuller covenant title
    found elsewhere. The translation preserves the exact expression used in this verse.
- source_word: עִם בֵּית עֹבֵד אֱדֹם
  chosen: with the household of Obed-edom
  alternatives:
  - with the house of Obed-edom
  - with Obed-edom's family
  lexicon: HALOT
  rationale: בֵּית can denote a physical house or a household/family unit. Because
    the verse later distinguishes 'in his house,' rendering this phrase as 'household'
    preserves the likely social sense and avoids awkward repetition.
- source_word: בְּבֵיתוֹ
  chosen: in his house
  alternatives:
  - in his home
  lexicon: HALOT
  rationale: This phrase specifies the physical location. 'House' keeps the concrete
    sense and preserves the distinction from the prior use of בֵּית in the sense of
    household.
- source_word: שְׁלֹשָׁה חֳדָשִׁים
  chosen: for three months
  alternatives:
  - three months
  lexicon: HALOT
  rationale: English idiom normally supplies 'for' with a duration expression; this
    is a natural and accurate rendering.
- source_word: וַיְבָרֶךְ יְהוָה
  chosen: the LORD blessed
  alternatives:
  - Yahweh blessed
  lexicon: HALOT
  rationale: The subject is YHWH. Per doctrine guidelines, יְהוָה is rendered 'the
    LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name, preserving
    reverential convention and consistency with the stated doctrine.
- source_word: אֶת בֵּית עֹבֵד אֱדֹם
  chosen: the household of Obed-edom
  alternatives:
  - the house of Obed-edom
  lexicon: HALOT
  rationale: Again, בֵּית here likely refers to the household as the object of blessing,
    not merely the building. 'Household' communicates that persons and estate are
    in view.
- source_word: וְאֶת כָּל אֲשֶׁר לוֹ
  chosen: and all that belonged to him
  alternatives:
  - and all that he had
  - and everything that was his
  lexicon: HALOT
  rationale: The phrase encompasses all possessions and dependents associated with
    him. 'All that belonged to him' is natural English and broad enough to preserve
    the Hebrew scope.
