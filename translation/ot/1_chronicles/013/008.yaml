theological_decisions:
- issue: Rendering of הָאֱלֹהִים
  chosen_reading: God
  alternative_readings:
  - the God
  rationale: Although the Hebrew has the article, in this context it functions as
    the standard designation for Israel's God rather than requiring the awkward English
    'the God.' This preserves natural English while maintaining reference to the true
    God worshiped in the procession.
