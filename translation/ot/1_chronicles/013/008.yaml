id: 1CH.13.8
reference: 1 Chronicles 13:8
source:
  edition: WLC
  text: וְ/דָוִ֣יד וְ/כָל יִשְׂרָאֵ֗ל מְשַׂחֲקִ֛ים לִ/פְנֵ֥י הָ/אֱלֹהִ֖ים בְּ/כָל
    עֹ֑ז וּ/בְ/שִׁירִ֤ים וּ/בְ/כִנֹּרוֹת֙ וּ/בִ/נְבָלִ֣ים וּ/בְ/תֻפִּ֔ים וּ/בִ/מְצִלְתַּ֖יִם
    וּ/בַ/חֲצֹצְרֽוֹת־־׃
translation:
  text: And David and all Israel were celebrating before God with all their might,
    with songs, lyres, harps, tambourines, cymbals, and trumpets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were playing/rejoicing before God'; the Hebrew verb can denote festive,
      joyful activity.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשַׂחֲקִים
  chosen: were celebrating
  alternatives:
  - were playing
  - were rejoicing
  - were making merry
  lexicon: HALOT
  rationale: The participle from שׂחק can denote playful or festive activity. In this
    cultic procession context, paired with music and instruments, 'were celebrating'
    best captures the public festive sense in natural English without implying mere
    amusement. 'Playing' could be misunderstood as referring only to instruments,
    and 'making merry' is archaic.
- source_word: לִפְנֵי הָאֱלֹהִים
  chosen: before God
  alternatives:
  - in the presence of God
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase indicating worshipful
    activity in God's presence. 'Before God' is concise and idiomatic while preserving
    the relational and liturgical sense.
- source_word: בְּכָל עֹז
  chosen: with all their might
  alternatives:
  - with all strength
  - with all power
  lexicon: HALOT
  rationale: עֹז denotes strength or might. Because the subject is plural ('David
    and all Israel'), English idiom favors 'their might.' This conveys vigorous intensity
    in worship better than the more wooden 'with all strength.'
- source_word: שִׁירִים
  chosen: songs
  alternatives:
  - singing
  lexicon: HALOT
  rationale: The plural noun naturally denotes songs. While the phrase may imply singing,
    the nominal form is better preserved by 'songs.'
- source_word: כִנֹּרוֹת
  chosen: lyres
  alternatives:
  - harps
  lexicon: HALOT
  rationale: כִּנּוֹר is commonly identified as a lyre-type stringed instrument. 'Lyres'
    is more precise than the traditional but broader 'harps.'
- source_word: נְבָלִים
  chosen: harps
  alternatives:
  - lutes
  - psalteries
  lexicon: HALOT
  rationale: נֵבֶל refers to another stringed instrument distinct from כִּנּוֹר. Since
    exact reconstruction is uncertain, 'harps' is a familiar modern term that preserves
    the distinction from 'lyres' without using archaic 'psalteries.' 'Lutes' is possible
    but less established.
- source_word: תֻפִּים
  chosen: tambourines
  alternatives:
  - tambourines/drums
  - hand drums
  lexicon: HALOT
  rationale: תֹּף denotes a frame drum or tambourine-like percussion instrument. 'Tambourines'
    is the most accessible modern equivalent.
- source_word: מְצִלְתַּיִם
  chosen: cymbals
  lexicon: HALOT
  rationale: Standard and secure rendering for this percussion instrument.
- source_word: חֲצֹצְרוֹת
  chosen: trumpets
  alternatives:
  - silver trumpets
  lexicon: HALOT
  rationale: The term denotes trumpets, often the straight ceremonial kind. 'Trumpets'
    is sufficient here; 'silver' is not stated in this verse and should not be imported.
- source_word: וְדָוִיד וְכָל יִשְׂרָאֵל
  chosen: And David and all Israel
  alternatives:
  - David and all Israel
  lexicon: HALOT
  rationale: The conjunction is retained for narrative flow. 'All Israel' is the natural
    collective rendering of the national assembly.
