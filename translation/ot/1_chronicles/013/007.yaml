id: 1CH.13.7
reference: 1 Chronicles 13:7
source:
  edition: WLC
  text: וַ/יַּרְכִּ֜יבוּ אֶת אֲר֤וֹן הָ/אֱלֹהִים֙ עַל עֲגָלָ֣ה חֲדָשָׁ֔ה מִ/בֵּ֖ית
    אֲבִינָדָ֑ב וְ/עֻזָּ֣א וְ/אַחְי֔וֹ נֹהֲגִ֖ים בָּ/עֲגָלָֽה־־׃
translation:
  text: So they set the ark of God on a new cart from the house of Abinadab, and Uzza
    and Ahio were guiding the cart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were driving the cart.' The Hebrew participle can denote leading or
      driving a vehicle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְכִּיבוּ
  chosen: set
  alternatives:
  - mounted
  - placed
  - put
  lexicon: HALOT
  rationale: From רכב in the causative sense, here meaning to cause something to ride/be
    carried on a vehicle. 'Set' is natural English with 'on a new cart' and preserves
    the concrete action without over-paraphrase.
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the ark of the God
  lexicon: HALOT
  rationale: Standard construct rendering. 'Ark' is the established and accurate term
    for אֲרוֹן in this cultic context; 'of God' reflects the definite noun with article
    on אֱלֹהִים in idiomatic English.
- source_word: עַל עֲגָלָה חֲדָשָׁה
  chosen: on a new cart
  alternatives:
  - upon a new cart
  - on a new wagon
  lexicon: HALOT
  rationale: עגלה denotes a cart/wagon. 'Cart' is the more common rendering in this
    ark-transport context and matches the parallel narrative. 'New' is retained explicitly.
- source_word: מִבֵּית אֲבִינָדָב
  chosen: from the house of Abinadab
  alternatives:
  - from Abinadab's house
  lexicon: HALOT
  rationale: The preposition מן with בֵּית naturally indicates source/origin. 'From
    the house of Abinadab' is slightly more formal and transparent to the Hebrew structure.
- source_word: עֻזָּא
  chosen: Uzza
  alternatives:
  - Uzzah
  rationale: Standard English transliteration of the name as it appears in many modern
    translations of Chronicles. Personal names are transliterated.
- source_word: אַחְיוֹ
  chosen: Ahio
  alternatives: []
  rationale: Personal name transliterated by standard convention.
- source_word: נֹהֲגִים
  chosen: were guiding
  alternatives:
  - were driving
  - led
  lexicon: HALOT
  rationale: The participle of נהג denotes driving or leading a vehicle/animals. 'Were
    guiding' fits the participial sense in context and avoids implying only animal-driving
    while still conveying active control of the cart.
- source_word: בָּעֲגָלָה
  chosen: the cart
  alternatives:
  - the wagon
  - with the cart
  lexicon: HALOT
  rationale: With נהג, the preposition ב can mark the vehicle being driven. Rendering
    it as the direct object in English ('guiding the cart') is idiomatic and preserves
    the sense.
