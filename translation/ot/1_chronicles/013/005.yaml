id: 1CH.13.5
reference: 1 Chronicles 13:5
source:
  edition: WLC
  text: וַ/יַּקְהֵ֤ל דָּוִיד֙ אֶת כָּל יִשְׂרָאֵ֔ל מִן שִׁיח֥וֹר מִצְרַ֖יִם וְ/עַד
    לְב֣וֹא חֲמָ֑ת לְ/הָבִיא֙ אֶת אֲר֣וֹן הָ/אֱלֹהִ֔ים מִ/קִּרְיַ֖ת יְעָרִֽים־־־־־׃
translation:
  text: So David assembled all Israel, from the Shihor of Egypt to Lebo-hamath, to
    bring the ark of God from Kiriath-jearim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “as far as the entrance of Hamath.”
    reason: lexical_alternative
  - marker: b
    text: “Shihor of Egypt” is a southern boundary designation; some understand it
      as “the brook of Egypt.”
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּקְהֵל
  chosen: assembled
  alternatives:
  - gathered
  - convened
  lexicon: HALOT
  rationale: The hiphil of קהל here denotes causing a group to come together. 'Assembled'
    is natural modern English and fits a national gathering better than the slightly
    more wooden 'gathered.'
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - all the Israelites
  lexicon: HALOT
  rationale: Retains the collective national expression of the Hebrew. 'All Israel'
    is idiomatic in English biblical style and may denote the whole nation representatively,
    not necessarily every individual.
- source_word: מִן שִׁיחוֹר מִצְרַיִם
  chosen: from the Shihor of Egypt
  alternatives:
  - from Shihor of Egypt
  - from the brook of Egypt
  lexicon: HALOT
  rationale: The Hebrew uses the proper name שִׁיחוֹר with 'Egypt.' Rendering it as
    the transliterated place name preserves original-language primacy and avoids prematurely
    identifying it with a specific watercourse in the main text. The article in English
    helps readability with a river-like geographic term.
- source_word: וְעַד לְבוֹא חֲמָת
  chosen: to Lebo-hamath
  alternatives:
  - as far as Lebo-hamath
  - to the entrance of Hamath
  lexicon: HALOT
  rationale: Though literally 'to the entering of Hamath,' the phrase functions as
    a recognized place designation/boundary formula. 'Lebo-hamath' preserves the toponymic
    force while remaining concise. The more literal alternative is preserved in a
    footnote.
- source_word: לְהָבִיא
  chosen: to bring
  alternatives:
  - in order to bring
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To bring' communicates that purpose
    clearly without overloading the English syntax.
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the ark of the true God
  lexicon: HALOT
  rationale: Standard and accurate rendering of the construct phrase. No contextual
    reason exists here to expand 'God' interpretively.
- source_word: מִקִּרְיַת יְעָרִים
  chosen: from Kiriath-jearim
  alternatives:
  - from Kiriath Yearim
  lexicon: HALOT
  rationale: Uses a standard English transliteration of the place name while preserving
    the Hebrew proper noun.
