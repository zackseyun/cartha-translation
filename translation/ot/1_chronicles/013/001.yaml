id: 1CH.13.1
reference: 1 Chronicles 13:1
source:
  edition: WLC
  text: וַ/יִּוָּעַ֣ץ דָּוִ֗יד עִם שָׂרֵ֧י הָ/אֲלָפִ֛ים וְ/הַ/מֵּא֖וֹת לְ/כָל נָגִֽיד־־׃
translation:
  text: And David consulted with the commanders of the thousands and the hundreds,
    with every leader.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'took counsel with the chiefs of thousands and hundreds, every leader.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּעַץ
  chosen: consulted
  alternatives:
  - took counsel
  - conferred
  lexicon: HALOT
  rationale: The Niphal/waw-consecutive form of יעץ here denotes engaging in deliberation
    or consultation. 'Consulted' is natural modern English and preserves the reciprocal/deliberative
    sense without archaic phrasing like 'took counsel.'
- source_word: עִם
  chosen: with
  alternatives:
  - together with
  lexicon: HALOT
  rationale: 'The preposition straightforwardly marks association: David consulted
    ''with'' these groups.'
- source_word: שָׂרֵי
  chosen: commanders
  alternatives:
  - chiefs
  - captains
  - officials
  lexicon: HALOT
  rationale: שָׂר commonly refers to officials or military leaders. In the collocation
    with 'thousands and hundreds,' the military-administrative sense is prominent,
    so 'commanders' best fits contemporary English.
- source_word: הָאֲלָפִים
  chosen: the thousands
  alternatives:
  - thousands
  lexicon: HALOT
  rationale: Literally 'the thousands,' referring to military or administrative units.
    Retaining the numeral expression preserves the Hebrew structure and the likely
    organizational sense.
- source_word: וְהַמֵּאוֹת
  chosen: and the hundreds
  alternatives:
  - and hundreds
  lexicon: HALOT
  rationale: Literally 'and the hundreds,' paired with 'the thousands' as standard
    unit designations. The article is reflected for formal clarity.
- source_word: לְכָל
  chosen: with every
  alternatives:
  - to every
  - and every
  lexicon: HALOT
  rationale: Although ל often means 'to/for,' in this construction after the prior
    phrase it functions to extend the scope of those consulted. Rendering it 'with
    every' makes the relation explicit in idiomatic English.
- source_word: נָגִיד
  chosen: leader
  alternatives:
  - ruler
  - prince
  - chief
  lexicon: HALOT
  rationale: נָגִיד denotes one in a leading or ruling position. 'Leader' is broad
    enough to fit the context without overstating royal or princely nuance.
