id: 1CH.13.9
reference: 1 Chronicles 13:9
source:
  edition: WLC
  text: וַ/יָּבֹ֖אוּ עַד גֹּ֣רֶן כִּידֹ֑ן וַ/יִּשְׁלַ֨ח עֻזָּ֜א אֶת יָד֗/וֹ לֶ/אֱחֹז֙
    אֶת הָ֣/אָר֔וֹן כִּ֥י שָֽׁמְט֖וּ הַ/בָּקָֽר־־־׃
translation:
  text: When they came to the threshing floor of Kidon, Uzza reached out his hand
    to take hold of the ark, because the oxen stumbled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the oxen slipped.' The Hebrew verb can denote slipping or letting something
      drop; here it describes the oxen's destabilizing movement.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּרֶן כִּידֹן
  chosen: the threshing floor of Kidon
  alternatives:
  - the threshing floor at Kidon
  lexicon: HALOT
  rationale: גֹּרֶן is a threshing floor; כִּידֹן is a place name and is transliterated
    rather than translated, per project policy on names.
- source_word: וַיִּשְׁלַח ... אֶת יָדוֹ
  chosen: reached out his hand
  alternatives:
  - put out his hand
  - stretched out his hand
  lexicon: HALOT
  rationale: The idiom with שׁלח + hand commonly means to extend or put forth the
    hand. 'Reached out his hand' is natural modern English while preserving the physical
    action.
- source_word: לֶאֱחֹז
  chosen: to take hold of
  alternatives:
  - to seize
  - to grasp
  lexicon: HALOT
  rationale: אחז means to grasp or take hold. 'Take hold of' fits the context of steadying
    the ark without implying hostile seizure.
- source_word: הָאָרוֹן
  chosen: the ark
  alternatives:
  - the ark of God
  lexicon: HALOT
  rationale: The Hebrew here has simply 'the ark,' not the fuller phrase 'ark of God.'
    The translation should not import words from the broader context into this verse.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: כִּי introduces the reason for Uzza's action. 'Because' is clearer in
    contemporary English than the more formal 'for.'
- source_word: שָׁמְטוּ
  chosen: stumbled
  alternatives:
  - slipped
  - nearly upset it
  - let it slip
  lexicon: HALOT
  rationale: The verb denotes slipping or letting drop. With הַבָּקָר as subject,
    the sense is that the oxen slipped or stumbled, threatening the ark's stability.
    'Stumbled' is idiomatic and contextually clear.
- source_word: הַבָּקָר
  chosen: the oxen
  alternatives:
  - the cattle
  lexicon: HALOT
  rationale: Though בָּקָר can denote cattle broadly, in this transport context it
    refers to the draft animals pulling the cart; 'oxen' is the most precise English
    rendering.
