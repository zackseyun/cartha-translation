id: 1CH.13.13
reference: 1 Chronicles 13:13
source:
  edition: WLC
  text: וְ/לֹֽא הֵסִ֨יר דָּוִ֧יד אֶת הָ/אָר֛וֹן אֵלָ֖י/ו אֶל עִ֣יר דָּוִ֑יד וַ/יַּטֵּ֕/הוּ
    אֶל בֵּ֥ית עֹבֵֽד אֱדֹ֖ם הַ/גִּתִּֽי־־־־־׃
translation:
  text: So David did not bring the ark to himself, into the City of David; instead,
    he turned it aside to the house of Obed-edom the Gittite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not remove the ark to himself.' The Hebrew verb can mean 'remove'
      or, in context, 'bring' or 'take.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he diverted it' or 'he brought it aside' to the house of Obed-edom.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵסִיר
  chosen: did not bring
  alternatives:
  - did not remove
  - did not take away
  lexicon: HALOT
  rationale: The verb סוּר in Hiphil can mean 'remove,' 'turn aside,' or 'take away.'
    In this context, with the ark as object and the destination phrase following,
    idiomatic English is best served by 'did not bring,' expressing that David did
    not move the ark onward to his own location. 'Remove' is more formal but less
    natural here.
- source_word: אֵלָיו
  chosen: to himself
  alternatives:
  - to him
  lexicon: HALOT
  rationale: 'The preposition plus 3ms suffix is literally ''to him,'' but with David
    as subject and the following destination phrase ''into the City of David,'' the
    sense is reflexive: he did not bring it to his own place. ''To himself'' makes
    that relation clear in English without over-paraphrasing.'
- source_word: עִיר דָּוִיד
  chosen: the City of David
  alternatives:
  - David's city
  lexicon: HALOT
  rationale: This is a fixed place name and is best rendered by the standard English
    form 'the City of David' rather than the more literal but less idiomatic 'David's
    city.'
- source_word: וַיַּטֵּהוּ
  chosen: he turned it aside
  alternatives:
  - he diverted it
  - he brought it aside
  lexicon: HALOT
  rationale: The verb נָטָה commonly means 'stretch out,' 'turn,' or 'incline.' Here
    it describes redirecting the ark from its intended route, so 'turned it aside'
    preserves the concrete sense and fits the narrative context better than the more
    abstract 'diverted it.'
- source_word: בֵּית
  chosen: the house of
  alternatives:
  - the household of
  lexicon: HALOT
  rationale: In this narrative setting, בַּיִת can denote either a physical house
    or household. Because the ark is being lodged at a location, 'the house of' is
    the most immediate and contextually appropriate rendering.
- source_word: עֹבֵד אֱדֹם
  chosen: Obed-edom
  alternatives:
  - Obed-Edom
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. The hyphenated and unhyphenated forms both occur in English; 'Obed-edom'
    is a readable standard transliteration.
- source_word: הַגִּתִּי
  chosen: the Gittite
  alternatives:
  - the man from Gath
  lexicon: HALOT
  rationale: The gentilic adjective is most directly rendered 'the Gittite.' 'The
    man from Gath' is interpretive and less concise; the traditional gentilic is understandable
    in modern English.
