id: 1CH.13.10
reference: 1 Chronicles 13:10
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֤ף יְהוָה֙ בְּ/עֻזָּ֔א וַ/יַּכֵּ֕/הוּ עַ֛ל אֲשֶׁר שָׁלַ֥ח יָד֖/וֹ עַל הָ/אָר֑וֹן וַ/יָּ֥מָת שָׁ֖ם לִ/פְנֵ֥י אֱלֹהִֽים־־־׃
translation:
  text: Then Yahweh’s anger burned against Uzza, and he struck him down because he had put out his hand to the ark; and he died there before God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'because he had reached out his hand to the ark.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף יְהוָה
  chosen: Then the LORD’s anger burned
  alternatives:
  - Then the LORD became angry
  - Then the anger of the LORD burned
  lexicon: HALOT
  rationale: The idiom חרה אף literally involves the nose/anger burning and commonly denotes kindled anger. 'The LORD’s anger burned' preserves the Hebrew idiom's force in natural English. 'the LORD' follows the doctrinal default for יְהוָה.
- source_word: בְּעֻזָּא
  chosen: against Uzza
  alternatives:
  - at Uzza
  lexicon: HALOT
  rationale: With חרה אף, the preposition ב marks the object of anger. 'Against Uzza' is the most natural English rendering.
- source_word: וַיַּכֵּהוּ
  chosen: he struck him down
  alternatives:
  - he struck him
  - he smote him
  lexicon: HALOT
  rationale: נכה can mean strike, smite, or strike down. Because the immediate result is death, 'struck him down' conveys the severity without adding more than the context warrants.
- source_word: עַל אֲשֶׁר
  chosen: because
  alternatives:
  - for that
  - on account of the fact that
  lexicon: HALOT
  rationale: The phrase introduces the reason for the judgment. 'Because' is concise and accurate modern English.
- source_word: שָׁלַח יָדוֹ עַל הָאָרוֹן
  chosen: he had put out his hand to the ark
  alternatives:
  - he had reached out his hand to the ark
  - he had stretched out his hand toward the ark
  lexicon: HALOT
  rationale: שׁלח יד על commonly means to put forth or stretch out the hand against/to something. 'Put out his hand to the ark' is idiomatic and preserves the physical action without overinterpreting motive.
- source_word: הָאָרוֹן
  chosen: the ark
  alternatives:
  - the ark of God
  - the chest
  lexicon: HALOT
  rationale: The Hebrew here has simply 'the ark,' and the immediate context makes the referent clear. Expanding to 'ark of God' would import words not present in this verse.
- source_word: וַיָּמָת שָׁם
  chosen: and he died there
  alternatives:
  - and he died on the spot there
  lexicon: HALOT
  rationale: A straightforward rendering of the narrative sequence; 'there' preserves שׁם without embellishment.
- source_word: לִפְנֵי אֱלֹהִים
  chosen: before God
  alternatives:
  - in the presence of God
  - before the presence of God
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before' or 'in the presence of.' 'Before God' is concise and natural while preserving the theological solemnity of the scene.
