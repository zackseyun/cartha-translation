theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relation between 'the LORD' and 'God' in the same verse
  chosen_reading: 'Retain both as in the Hebrew: ''the LORD'' ... ''before God'''
  alternative_readings:
  - Harmonize both as 'the LORD'
  - Render the second as 'before him'
  rationale: The Hebrew uses יְהוָה in the first clause and אֱלֹהִים in the final phrase. Preserving both reflects the source text rather than smoothing the variation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy over translation tradition'
