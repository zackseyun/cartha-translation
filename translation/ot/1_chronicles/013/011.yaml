id: 1CH.13.11
reference: 1 Chronicles 13:11
source:
  edition: WLC
  text: וַ/יִּ֣חַר לְ/דָוִ֔יד כִּֽי פָרַ֧ץ יְהוָ֛ה פֶּ֖רֶץ בְּ/עֻזָּ֑א וַ/יִּקְרָ֞א
    לַ/מָּק֤וֹם הַ/הוּא֙ פֶּ֣רֶץ עֻזָּ֔א עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־׃
translation:
  text: And David was angry because the LORD had broken out in a breach against Uzza;
    so he called that place Perez-uzza to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Perez-uzza sounds like 'breach against Uzza' or 'outburst against Uzza,'
      echoing the Hebrew wordplay in 'the LORD had broken out in a breach against
      Uzza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר לְדָוִיד
  chosen: And David was angry
  alternatives:
  - And David burned with anger
  - And it displeased David
  lexicon: HALOT
  rationale: The idiom חרה ל expresses anger kindled in a person. 'Was angry' is clear
    modern English and preserves the emotional force without over-literal awkwardness.
    'Displeased' is too weak; 'burned with anger' is possible but more expansive.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for David's anger. 'Because' is more natural in
    contemporary English than 'for' while preserving the causal sense.
- source_word: פָרַץ יְהוָה פֶּרֶץ
  chosen: the LORD had broken out in a breach
  alternatives:
  - the LORD had made a breach
  - the LORD had burst forth
  lexicon: HALOT
  rationale: The verb פרץ and cognate noun פרץ form a wordplay meaning a sudden bursting
    out or breach. Rendering both with 'broken out in a breach' preserves the cognate
    force better than flattening to 'struck down' or only 'made a breach.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: בְּעֻזָּא
  chosen: against Uzza
  alternatives:
  - upon Uzza
  - on Uzza
  lexicon: HALOT
  rationale: With the breach idiom, English naturally expresses the target as 'against
    Uzza.' This makes explicit that Uzza is the object of the divine outbreak.
- source_word: וַיִּקְרָא לַמָּקוֹם הַהוּא
  chosen: so he called that place
  alternatives:
  - and he named that place
  lexicon: HALOT
  rationale: Standard naming formula. 'Called that place' is slightly more formal
    and matches common biblical naming idiom.
- source_word: פֶּרֶץ עֻזָּא
  chosen: Perez-uzza
  alternatives:
  - Breach of Uzza
  - Outburst against Uzza
  lexicon: HALOT
  rationale: This is a place name formed from the preceding wordplay. Per translation
    philosophy, names are transliterated rather than translated in the main text,
    while the meaning can be preserved in a footnote.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Standard idiom indicating the place name remained current at the time
    of writing. 'To this day' is the most natural English equivalent.
