id: 1CH.13.12
reference: 1 Chronicles 13:12
source:
  edition: WLC
  text: וַ/יִּירָ֤א דָוִיד֙ אֶת הָ֣/אֱלֹהִ֔ים בַּ/יּ֥וֹם הַ/ה֖וּא לֵ/אמֹ֑ר הֵ֚יךְ
    אָבִ֣יא אֵלַ֔/י אֵ֖ת אֲר֥וֹן הָ/אֱלֹהִֽים־׃
translation:
  text: And David feared God that day, saying, “How can I bring the ark of God to
    me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “was afraid of God”; the Hebrew verb can denote fear, dread, or reverence
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירָא
  chosen: feared
  alternatives:
  - was afraid of
  - revered
  lexicon: HALOT
  rationale: From ירא in the waw-consecutive narrative form, the immediate sense in
    context is fear in response to divine judgment, not merely reverence. 'Feared'
    preserves both the emotional force and the possibility of reverential dread better
    than the weaker 'was afraid.'
- source_word: אֶת הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Direct object marker plus the definite noun 'the God/God.' In English,
    'feared God' is idiomatic and natural; retaining the article would be awkward
    here.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard temporal expression. 'That day' is concise modern English and
    fully preserves the temporal reference.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Infinitive construct introducing direct speech. 'Saying' closely reflects
    the Hebrew discourse function without unnecessary expansion.
- source_word: הֵיךְ
  chosen: How can
  alternatives:
  - How shall
  - How could
  lexicon: HALOT
  rationale: Introduces David's question about possibility/propriety. 'How can' communicates
    practical and moral difficulty in natural English.
- source_word: אָבִיא
  chosen: I bring
  alternatives:
  - I bring in
  - I carry
  lexicon: HALOT
  rationale: Hiphil of בוא, causative 'bring.' 'Bring' is the most direct and idiomatic
    rendering in this context.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - to myself
  - to my place
  lexicon: HALOT
  rationale: First person singular pronominal form. 'To me' is the most literal and
    leaves implicit whether the destination is David personally or his city/household,
    as in the Hebrew.
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - God's ark
  lexicon: HALOT
  rationale: Construct chain rendered transparently. 'The ark of God' preserves the
    formal weight of the phrase and matches the narrative's repeated terminology.
