theological_decisions:
- issue: Nature of David's response to God's judgment
  chosen_reading: Render ירא as 'feared' to preserve genuine dread before God rather
    than softening to mere reverence.
  alternative_readings:
  - was afraid of God
  - revered God
  rationale: The context is Uzza's death and David's immediate reaction. The translation
    should preserve the theological tension of holy fear before God without importing
    a later doctrinal explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
