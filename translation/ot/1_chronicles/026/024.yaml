id: 1CH.26.24
reference: 1 Chronicles 26:24
source:
  edition: WLC
  text: וּ/שְׁבֻאֵל֙ בֶּן גֵּרְשׁ֣וֹם בֶּן מֹשֶׁ֔ה נָגִ֖יד עַל הָ/אֹצָרֽוֹת־־־׃
translation:
  text: And Shebuel son of Gershom, son of Moses, was chief officer over the treasuries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leader,' 'overseer,' or 'prince' for 'chief officer.' The Hebrew term
      denotes one placed in authority.
    reason: lexical_alternative
  - marker: b
    text: Or 'storehouses' for 'treasuries.' The term can refer either to places where
      valuables are stored or to the treasures themselves, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁבֻאֵל
  chosen: And Shebuel
  alternatives:
  - Now Shebuel
  - Shebuel
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered as 'And' to preserve the verse's
    connective function in the genealogical/administrative listing. The proper name
    is transliterated, following the philosophy of transliterating personal names.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In this genealogical context בן straightforwardly marks direct filial
    descent. 'Son of' is the most natural and sufficiently formal rendering.
- source_word: גֵּרְשׁוֹם
  chosen: Gershom
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: 'Repeated בן is rendered consistently to reflect the genealogical chain:
    Gershom was son of Moses.'
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: נָגִיד
  chosen: chief officer
  alternatives:
  - leader
  - ruler
  - prince
  - overseer
  lexicon: HALOT
  rationale: נָגִיד denotes one placed in charge, a leader or chief. In this administrative
    context over temple treasuries, 'chief officer' best conveys official supervisory
    responsibility without suggesting kingship ('prince') or overly generic leadership.
    It is clearer in modern English than 'ruler' and more specific than 'leader'.
- source_word: עַל
  chosen: over
  alternatives:
  - in charge of
  lexicon: HALOT
  rationale: The preposition marks authority/supervision over the object. 'Over' preserves
    the concise syntax of the Hebrew and fits English administrative usage.
- source_word: הָ/אֹצָרוֹת
  chosen: the treasuries
  alternatives:
  - the storehouses
  - the treasures
  lexicon: HALOT
  rationale: אֹצָרוֹת can denote storehouses or treasuries depending on context. In
    1 Chronicles 26, the passage concerns custodianship of dedicated wealth and temple
    holdings, so 'treasuries' best fits the administrative-financial sense.
