id: 1CH.26.11
reference: 1 Chronicles 26:11
source:
  edition: WLC
  text: חִלְקִיָּ֤הוּ הַ/שֵּׁנִי֙ טְבַלְיָ֣הוּ הַ/שְּׁלִשִׁ֔י זְכַרְיָ֖הוּ הָ/רְבִעִ֑י
    כָּל בָּנִ֧ים וְ/אַחִ֛ים לְ/חֹסָ֖ה שְׁלֹשָׁ֥ה עָשָֽׂר־׃
translation:
  text: Hilkiah the second, Tebaliah the third, Zechariah the fourth. All the sons
    and brothers of Hosah were thirteen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'kinsmen' for 'brothers,' if the term is taken more broadly
      for male relatives within Hosah's clan.
    reason: lexical_alternative
lexical_decisions:
- source_word: חִלְקִיָּהוּ
  chosen: Hilkiah
  alternatives:
  - Hilkiahu
  rationale: Proper name; transliterated by standard English convention rather than
    translated, per project policy for personal names.
- source_word: הַשֵּׁנִי
  chosen: the second
  lexicon: HALOT
  rationale: Ordinal adjective with article, marking birth/order rank in the list.
    Rendered straightforwardly as an English ordinal.
- source_word: טְבַלְיָהוּ
  chosen: Tebaliah
  alternatives:
  - Tebalyahu
  rationale: Proper name; transliterated in standard English form.
- source_word: הַשְּׁלִשִׁי
  chosen: the third
  lexicon: HALOT
  rationale: Ordinal adjective with article; rendered as an English ordinal parallel
    to the surrounding names.
- source_word: זְכַרְיָהוּ
  chosen: Zechariah
  alternatives:
  - Zekaryahu
  rationale: Proper name; transliterated by established English convention.
- source_word: הָרְבִעִי
  chosen: the fourth
  lexicon: HALOT
  rationale: Ordinal adjective with article; rendered as an English ordinal in sequence.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole number of
  lexicon: HALOT
  rationale: Summative term introducing the total count of the group just listed and
    related family members. 'All' is natural and sufficiently precise.
- source_word: בָּנִים
  chosen: sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'sons,' not the gender-neutral 'children.'
    This matches the genealogical/list context and follows the project's gender-accurate
    policy.
- source_word: וְאַחִים
  chosen: brothers
  alternatives:
  - kinsmen
  lexicon: HALOT
  rationale: In this clan/register context, the term most naturally refers to male
    siblings or close male relatives. 'Brothers' preserves the lexical form; broader
    kinship nuance is possible but less direct.
- source_word: לְחֹסָה
  chosen: of Hosah
  alternatives:
  - belonging to Hosah
  lexicon: HALOT
  rationale: The preposition marks relation/possession in context; English genitive
    'of Hosah' is the most natural rendering.
- source_word: שְׁלֹשָׁה עָשָׂר
  chosen: thirteen
  lexicon: HALOT
  rationale: Cardinal number giving the total count of sons and brothers; rendered
    idiomatically as 'thirteen'.
