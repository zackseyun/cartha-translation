id: 1CH.26.32
reference: 1 Chronicles 26:32
source:
  edition: WLC
  text: וְ/אֶחָ֣י/ו בְּנֵי חַ֗יִל אַלְפַּ֛יִם וּ/שְׁבַ֥ע מֵא֖וֹת רָאשֵׁ֣י הָ/אָב֑וֹת
    וַ/יַּפְקִידֵ֞/ם דָּוִ֣יד הַ/מֶּ֗לֶךְ עַל הָ/ראוּבֵנִ֤י וְ/הַ/גָּדִי֙ וַ/חֲצִי֙
    שֵׁ֣בֶט הַֽ/מְנַשִּׁ֔י לְ/כָל דְּבַ֥ר הָ/אֱלֹהִ֖ים וּ/דְבַ֥ר הַ/מֶּֽלֶךְ־־־׃פ
translation:
  text: And his brothers, valiant men, were two thousand seven hundred heads of fathers’
    houses; and David the king appointed them over the Reubenites, the Gadites, and
    the half-tribe of Manasseh for every matter of God and the matter of the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for all the business of God and the king’s business.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶחָיו
  chosen: And his brothers
  alternatives:
  - And his kinsmen
  - And his relatives
  lexicon: HALOT
  rationale: The suffix refers back to Hashabiah in the previous verse. 'Brothers'
    is the most direct rendering of אחים and fits the clan context; broader kinship
    senses are possible but less precise. This also aligns with the gender-accurate
    policy, since the Hebrew is masculine.
- source_word: בְּנֵי חַיִל
  chosen: valiant men
  alternatives:
  - men of valor
  - capable men
  lexicon: HALOT
  rationale: The phrase commonly denotes men of strength, competence, or valor. Here,
    in an administrative and leadership context, 'valiant men' preserves the idiomatic
    force without flattening it to mere ability.
- source_word: אַלְפַּיִם וּשְׁבַע מֵאוֹת
  chosen: two thousand seven hundred
  lexicon: HALOT
  rationale: Straightforward cardinal number rendering.
- source_word: רָאשֵׁי הָאָבוֹת
  chosen: heads of fathers’ houses
  alternatives:
  - heads of ancestral houses
  - chiefs of the fathers' houses
  lexicon: HALOT
  rationale: This technical genealogical-administrative phrase refers to clan or family
    heads. 'Fathers’ houses' preserves the Hebrew social structure more transparently
    than the more interpretive 'families'.
- source_word: וַיַּפְקִידֵם
  chosen: appointed them
  alternatives:
  - put them in charge
  - entrusted them
  lexicon: HALOT
  rationale: The verb פקד in the Hiphil here conveys assigning oversight or office.
    'Appointed them' is natural English and preserves the official nature of the action.
- source_word: עַל
  chosen: over
  alternatives:
  - in charge of
  - for
  lexicon: HALOT
  rationale: In this administrative context, על marks authority or responsibility
    over the listed groups; 'over' is the most direct rendering.
- source_word: הָראוּבֵנִי וְהַגָּדִי וַחֲצִי שֵׁבֶט הַמְנַשִּׁי
  chosen: the Reubenites, the Gadites, and the half-tribe of Manasseh
  alternatives:
  - the Reubenite, the Gadite, and half the tribe of Manasseh
  lexicon: HALOT
  rationale: Although the gentilic forms are singular in Hebrew, English idiom normally
    renders these tribal designations as plurals when referring to the people collectively.
- source_word: לְכָל דְּבַר הָאֱלֹהִים
  chosen: for every matter of God
  alternatives:
  - for every matter pertaining to God
  - for all the business of God
  lexicon: HALOT
  rationale: דבר here means matter, affair, or business. The phrase likely refers
    to religious or cultic concerns. 'Matter of God' is somewhat formal but preserves
    the compactness and ambiguity of the Hebrew better than a more expansive paraphrase.
- source_word: וּדְבַר הַמֶּלֶךְ
  chosen: and the matter of the king
  alternatives:
  - and the king's business
  - and matters of the king
  lexicon: HALOT
  rationale: This balances the previous phrase and preserves the distinction between
    divine/religious affairs and royal/civil affairs. Singular 'matter' reflects the
    Hebrew construct form used generically.
