theological_decisions:
- issue: Scope of administrative responsibility in relation to divine and royal affairs
  chosen_reading: The appointees were responsible for both matters pertaining to God
    and matters pertaining to the king.
  alternative_readings:
  - The phrase could be rendered more dynamically as 'for all the work of God and
    the service of the king.'
  rationale: The verse distinguishes two spheres of oversight without specifying a
    theological hierarchy between them. The translation preserves that distinction
    and avoids importing later church-state categories or cultic technicalities not
    explicit in the Hebrew.
  doctrine_reference: Translation philosophy §3, §6
