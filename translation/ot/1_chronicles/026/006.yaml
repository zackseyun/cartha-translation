id: 1CH.26.6
reference: 1 Chronicles 26:6
source:
  edition: WLC
  text: וְ/לִֽ/שְׁמַֽעְיָ֤ה בְנ/וֹ֙ נוֹלַ֣ד בָּנִ֔ים הַ/מִּמְשָׁלִ֖ים לְ/בֵ֣ית אֲבִי/הֶ֑ם
    כִּֽי גִבּ֥וֹרֵי חַ֖יִל הֵֽמָּה־׃
translation:
  text: And to Shemaiah his son, sons were born who ruled over their fathers’ households,
    for they were mighty men of valor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who were rulers over their ancestral households.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase 'mighty men of valor' can also denote men of proven strength,
      competence, or standing, not only battlefield warriors.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִשְׁמַעְיָה
  chosen: And to Shemaiah
  alternatives:
  - Now to Shemaiah
  - And for Shemaiah
  lexicon: HALOT
  rationale: 'The prefixed conjunction and preposition introduce a new member in the
    genealogy/list: ''and to Shemaiah.'' ''To'' best reflects the Hebrew construction
    used with birth formulas.'
- source_word: בְנוֹ
  chosen: his son
  alternatives:
  - his descendant
  lexicon: HALOT
  rationale: בן with 3ms suffix most naturally means 'his son' here, identifying Shemaiah
    as the son of the previously mentioned Obed-edom.
- source_word: נוֹלַד
  chosen: were born
  alternatives:
  - was born
  lexicon: HALOT
  rationale: Although morphologically singular/passive ('was born'), Hebrew commonly
    uses this form with a plural subject in birth notices; idiomatic English requires
    plural 'were born' with 'sons' as the effective subject.
- source_word: בָּנִים
  chosen: sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'sons,' and the translation follows the gender-specific
    wording rather than neutralizing it.
- source_word: הַמִּמְשָׁלִים
  chosen: who ruled over
  alternatives:
  - the rulers of
  - who had authority over
  lexicon: HALOT
  rationale: From משל in the sense of ruling/governing. Rendered verbally in English
    to connect naturally with 'sons were born.' This preserves the idea of exercising
    authority, not merely holding a title.
- source_word: לְבֵית אֲבִיהֶם
  chosen: their fathers’ households
  alternatives:
  - their ancestral house
  - their father’s house
  lexicon: HALOT
  rationale: בית אב often denotes a father's household or family clan unit. The plural
    suffix on 'their fathers' supports a plural rendering in English. 'Households'
    communicates the social-family unit better than a wooden 'house of their fathers.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason they exercised authority. 'For' is concise and
    natural in elevated narrative style.
- source_word: גִּבּוֹרֵי חַיִל
  chosen: mighty men of valor
  alternatives:
  - mighty men
  - capable men
  - valiant warriors
  lexicon: HALOT
  rationale: This stock phrase can denote strength, valor, or proven capability. In
    this genealogical/administrative context it likely includes competence and strength,
    but 'mighty men of valor' preserves the established force of the expression without
    reducing it merely to military prowess.
- source_word: הֵמָּה
  chosen: they were
  alternatives:
  - they themselves were
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. English can reflect this adequately
    with 'they were' without overloading the sentence; the emphasis is carried by
    the clause as a whole.
