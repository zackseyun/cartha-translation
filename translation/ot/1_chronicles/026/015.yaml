id: 1CH.26.15
reference: 1 Chronicles 26:15
source:
  edition: WLC
  text: לְ/עֹבֵ֥ד אֱדֹ֖ם נֶ֑גְבָּ/ה וּ/לְ/בָנָ֖י/ו בֵּ֥ית הָ/אֲסֻפִּֽים׃
translation:
  text: To Obed-edom, the south; and to his sons, the house of stores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the house of the storehouses' / 'the house of collections.' The Hebrew
      term refers to a storage area or repositories.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֹבֵד אֱדֹם
  chosen: To Obed-edom
  alternatives:
  - For Obed-edom
  lexicon: HALOT
  rationale: The prefixed ל marks assignment in the lot-distribution context of this
    passage. 'To Obed-edom' is idiomatic English for the allotment formula used in
    the surrounding verses.
- source_word: נֶגְבָּה
  chosen: the south
  alternatives:
  - southward
  - the Negeb/south side
  lexicon: HALOT
  rationale: Here the noun with directional ending indicates the southern side/direction
    assigned to Obed-edom. In context of gate assignments, 'the south' is the clearest
    concise rendering.
- source_word: וּלְבָנָיו
  chosen: and to his sons
  alternatives:
  - and for his sons
  lexicon: HALOT
  rationale: בנים here refers to Obed-edom's sons as the recipients of a further assignment.
    'Sons' is gender-accurate and matches the Hebrew.
- source_word: בֵּית
  chosen: the house of
  alternatives:
  - the building of
  - the area of
  lexicon: HALOT
  rationale: Construct state before הָאֲסֻפִּים. 'House of' preserves the Hebrew genitive
    construction while remaining natural enough in English.
- source_word: הָאֲסֻפִּים
  chosen: stores
  alternatives:
  - storehouses
  - supplies
  - collections
  lexicon: HALOT
  rationale: From אסף ('gather'), the term refers to storage/collected supplies in
    this temple context. 'Stores' is concise and fits the construct phrase 'house
    of stores'; 'storehouses' would overtranslate since the preceding בֵּית already
    supplies the architectural sense.
