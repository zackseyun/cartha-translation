id: 1CH.26.9
reference: 1 Chronicles 26:9
source:
  edition: WLC
  text: וְ/לִ/מְשֶֽׁלֶמְיָ֗הוּ בָּנִ֧ים וְ/אַחִ֛ים בְּנֵי חָ֖יִל שְׁמוֹנָ֥ה עָשָֽׂר־׃ס
translation:
  text: And Shelemiah had sons and brothers, eighteen valiant men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'for Shelemiah,' a Hebrew construction introducing the person
      being counted.
    reason: lexical_alternative
  - marker: b
    text: Or 'men of valor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/מְשֶׁלֶמְיָהוּ
  chosen: And Shelemiah
  alternatives:
  - And for Shelemiah
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition literally yield 'and/to-for
    Shelemiah,' but in this genealogical/enumerative context the lamed marks the person
    under discussion ('as for Shelemiah'). Smooth English is best achieved with 'And
    Shelemiah,' preserving the discourse progression without awkwardness. The personal
    name is transliterated per translation philosophy.
- source_word: בָּנִים
  chosen: sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew specifically denotes male offspring, not children in general.
    'Sons' is therefore the gender-accurate rendering.
- source_word: וְ/אַחִים
  chosen: and brothers
  alternatives:
  - and kinsmen
  lexicon: HALOT
  rationale: The normal sense of אַחִים is 'brothers.' While broader kinship can occur
    in some contexts, this list naturally counts immediate male relatives attached
    to Shelemiah's house, so 'brothers' is preferred.
- source_word: בְּנֵי חָיִל
  chosen: valiant men
  alternatives:
  - men of valor
  - capable men
  - mighty men
  lexicon: HALOT
  rationale: The idiom literally means 'sons of valor/strength.' In English, 'valiant
    men' communicates the idiomatic sense of capable, strong, worthy men in a concise
    and natural way. 'Men of valor' is more formal and could also fit; the chosen
    rendering balances readability and fidelity.
- source_word: שְׁמוֹנָה עָשָׂר
  chosen: eighteen
  lexicon: HALOT
  rationale: Standard cardinal number rendering.
