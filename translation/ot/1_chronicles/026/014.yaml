id: 1CH.26.14
reference: 1 Chronicles 26:14
source:
  edition: WLC
  text: וַ/יִּפֹּ֧ל הַ/גּוֹרָ֛ל מִזְרָ֖חָ/ה לְ/שֶֽׁלֶמְיָ֑הוּ וּ/זְכַרְיָ֨הוּ בְנ֜/וֹ
    יוֹעֵ֣ץ בְּ/שֶׂ֗כֶל הִפִּ֨ילוּ֙ גּֽוֹרָל֔וֹת וַ/יֵּצֵ֥א גוֹרָל֖/וֹ צָפֽוֹנָ/ה׀׃ס
translation:
  text: The lot for the east fell to Shelemyahu. Then they cast lots for his son Zekaryahu,
    a counselor with insight, and his lot came out for the north.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a wise counselor.' The Hebrew phrase literally describes Zekaryahu as
      'a counselor with insight/prudence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֹּל הַגּוֹרָל
  chosen: The lot ... fell
  alternatives:
  - the lot was assigned
  - the lot came down
  lexicon: HALOT
  rationale: The idiom נפל + גורל is the standard expression for a lot falling/being
    assigned. 'Fell' preserves the concrete imagery and common biblical idiom in natural
    English.
- source_word: מִזְרָחָה
  chosen: for the east
  alternatives:
  - eastward
  - to the east
  lexicon: HALOT
  rationale: Directional he indicates direction/location. 'For the east' fits the
    context of gate assignments by lot.
- source_word: לְשֶׁלֶמְיָהוּ
  chosen: to Shelemyahu
  alternatives:
  - for Shelemiah
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. The lamed marks the recipient of the lot.
- source_word: וּזְכַרְיָהוּ בְנוֹ
  chosen: Then they cast lots for his son Zekaryahu
  alternatives:
  - and for Zechariah his son
  - and Zekaryahu his son
  rationale: The clause introduces a second person in the lot-casting sequence. 'His
    son Zekaryahu' reflects the construct relation clearly in English. 'Then' smooths
    the narrative progression implied by waw without over-paraphrasing.
- source_word: יוֹעֵץ בְּשֶׂכֶל
  chosen: a counselor with insight
  alternatives:
  - a wise counselor
  - one giving counsel with prudence
  - an insightful adviser
  lexicon: HALOT
  rationale: יוֹעֵץ is an active participle, 'counselor/adviser.' בְּשֶׂכֶל denotes
    prudence, insight, or discretion. 'A counselor with insight' preserves both elements
    without collapsing them into a single adjective.
- source_word: הִפִּילוּ גּוֹרָלוֹת
  chosen: they cast lots
  alternatives:
  - they caused lots to fall
  - they threw lots
  lexicon: HALOT
  rationale: The Hiphil of נפל with גורלות means to cast lots. English idiom prefers
    'cast lots'.
- source_word: וַיֵּצֵא גוֹרָלוֹ
  chosen: and his lot came out
  alternatives:
  - and his lot fell
  - and his lot went out
  lexicon: HALOT
  rationale: יצא with גורל naturally means the result emerged/came out. 'Came out'
    is idiomatic for the outcome of lot-casting and distinguishes it from the earlier
    נפל idiom.
- source_word: צָפוֹנָה
  chosen: for the north
  alternatives:
  - northward
  - to the north
  lexicon: HALOT
  rationale: Directional he again marks the assigned direction. 'For the north' matches
    the earlier 'for the east' and keeps the assignment sense consistent.
