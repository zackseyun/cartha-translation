id: 1CH.26.18
reference: 1 Chronicles 26:18
source:
  edition: WLC
  text: לַ/פַּרְבָּ֖ר לַֽ/מַּעֲרָ֑ב אַרְבָּעָה֙ לַֽ/מְסִלָּ֔ה שְׁנַ֖יִם לַ/פַּרְבָּֽר׃
translation:
  text: 'For the colonnade on the west: four at the highway, and two at the colonnade.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'precinct,' 'court,' 'annex,' or traditionally 'suburb' for the rare
      Hebrew term parbar. The exact architectural reference is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'causeway' or 'road.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּרְבָּר
  chosen: colonnade
  alternatives:
  - precinct
  - suburb
  - court
  - annex
  lexicon: HALOT
  rationale: The term is rare and its precise architectural reference is uncertain.
    In this gatekeeper-allocation context, it appears to denote a specific temple-side
    structure or area rather than a civic 'suburb.' 'Colonnade' gives a plausible
    architectural sense in readable English while avoiding overprecision. Because
    the meaning is debated, alternatives are preserved in a footnote.
- source_word: מַעֲרָב
  chosen: west
  alternatives:
  - west side
  lexicon: HALOT
  rationale: The noun denotes the western direction/side. 'West' is concise and natural
    in this allocation list.
- source_word: אַרְבָּעָה
  chosen: four
  lexicon: HALOT
  rationale: Cardinal number indicating the number of gatekeepers/posts assigned.
- source_word: מְסִלָּה
  chosen: highway
  alternatives:
  - road
  - causeway
  lexicon: HALOT
  rationale: The word commonly denotes a raised road, highway, or causeway. In this
    temple-administrative setting, 'highway' best reflects a formal route or approach
    without becoming too technical.
- source_word: שְׁנַיִם
  chosen: two
  lexicon: HALOT
  rationale: Cardinal number indicating the second assignment count.
- source_word: לְ
  chosen: for / at
  alternatives:
  - to
  lexicon: HALOT
  rationale: The repeated preposition marks assignment by location. In English, this
    is best represented idiomatically as 'for' in the opening assignment and 'at'
    for the sub-location 'at the highway.'
