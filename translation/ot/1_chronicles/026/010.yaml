id: 1CH.26.10
reference: 1 Chronicles 26:10
source:
  edition: WLC
  text: וּ/לְ/חֹסָ֥ה מִן בְּנֵי מְרָרִ֖י בָּנִ֑ים שִׁמְרִ֤י הָ/רֹאשׁ֙ כִּ֣י לֹא הָיָ֣ה
    בְכ֔וֹר וַ/יְשִׂימֵ֥/הוּ אָבִ֖י/הוּ לְ/רֹֽאשׁ־־־׃
translation:
  text: 'And Hosah, from the sons of Merari, had sons: Shimri the chief, though he
    was not the firstborn; his father made him chief.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "for he was not the firstborn"; the Hebrew conjunction can be read as
      explanatory as well as concessive.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְחֹסָה
  chosen: And Hosah
  alternatives:
  - Now for Hosah
  - And to Hosah
  lexicon: HALOT
  rationale: The prefixed conjunction links this notice to the preceding genealogy/list,
    best rendered simply as "And." The preposition ל with a personal name in this
    listing context introduces possession/descent ('as for Hosah' / 'Hosah had'),
    and idiomatic English is captured by "And Hosah." The name is transliterated,
    per policy for personal names.
- source_word: מִן בְּנֵי מְרָרִי
  chosen: from the sons of Merari
  alternatives:
  - of the sons of Merari
  - a Merarite
  lexicon: HALOT
  rationale: Literally 'from the sons of Merari.' This identifies Hosah's clan affiliation
    within Levi. "From the sons of Merari" preserves the Hebrew structure more closely
    than the adjectival "a Merarite," while remaining natural enough in English.
- source_word: בָּנִים
  chosen: had sons
  alternatives:
  - sons
  - children
  lexicon: HALOT
  rationale: The Hebrew simply has 'sons,' but English requires a verbal link in this
    nominal list context. "Had sons" is a minimal, idiomatic expansion that reflects
    the genealogical formula without adding content. "Children" would be less precise
    than the masculine plural in the source.
- source_word: שִׁמְרִי
  chosen: Shimri
  lexicon: HALOT
  rationale: Personal name, so transliterated rather than translated.
- source_word: הָרֹאשׁ
  chosen: the chief
  alternatives:
  - the head
  - the leader
  lexicon: HALOT
  rationale: רֹאשׁ here denotes rank or leadership within the family grouping, not
    a literal body part. "The chief" fits the administrative/genealogical context
    and pairs naturally with the later clause 'his father made him chief.' "Head"
    is possible but less idiomatic in modern English.
- source_word: כִּי לֹא הָיָה בְכוֹר
  chosen: though he was not the firstborn
  alternatives:
  - for he was not the firstborn
  - because he was not the firstborn
  lexicon: HALOT
  rationale: כִּי can mark cause or explanation, but in English the sense here is
    concessive relative to Shimri's status as chief despite not being firstborn. "Though"
    brings out that contrast clearly without overstating interpretation.
- source_word: בְכוֹר
  chosen: the firstborn
  alternatives:
  - firstborn son
  lexicon: HALOT
  rationale: Standard rendering for the birth-order term. Adding "son" is unnecessary
    because the context already concerns sons.
- source_word: וַיְשִׂימֵהוּ אָבִיהוּ לְרֹאשׁ
  chosen: his father made him chief
  alternatives:
  - his father appointed him as chief
  - his father set him as head
  lexicon: HALOT
  rationale: The verb שׂים with ל expresses appointment or designation to a role.
    "Made him chief" is concise, natural English and preserves the sense of formal
    placement in rank. Repeating "chief" also reflects the lexical link with הָרֹאשׁ.
