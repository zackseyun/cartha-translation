id: 1CH.26.8
reference: 1 Chronicles 26:8
source:
  edition: WLC
  text: כָּל אֵ֜לֶּה מִ/בְּנֵ֣י עֹבֵ֣ד אֱדֹ֗ם הֵ֤מָּה וּ/בְנֵי/הֶם֙ וַ/אֲחֵי/הֶ֔ם
    אִֽישׁ חַ֥יִל בַּ/כֹּ֖חַ לַ/עֲבֹדָ֑ה שִׁשִּׁ֥ים וּ/שְׁנַ֖יִם לְ/עֹבֵ֥ד אֱדֹֽם־׀־׃
translation:
  text: All these were from the sons of Obed-edom—they and their sons and their brothers,
    able men with strength for the service—sixty-two belonging to Obed-edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their kinsmen' for 'their brothers,' if the term is taken more broadly
      for male relatives within the clan.
    reason: lexical_alternative
  - marker: b
    text: '''Able men'' translates a Hebrew expression that can also mean ''men of
      valor'' or ''valiant men''; here it likely emphasizes capable, strong men fit
      for temple duty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבְּנֵי
  chosen: from the sons of
  alternatives:
  - of the sons of
  - among the sons of
  lexicon: HALOT
  rationale: 'The preposition מִן with ''sons'' marks source/group membership: these
    gatekeepers came from the family line of Obed-edom. ''From the sons of'' is natural
    English while preserving the genealogical sense.'
- source_word: הֵמָּה וּבְנֵיהֶם וַאֲחֵיהֶם
  chosen: they and their sons and their brothers
  alternatives:
  - they, their sons, and their kinsmen
  lexicon: HALOT
  rationale: This lists the men themselves together with the next generation and their
    male relatives. 'Brothers' is retained as the gender-accurate rendering of אחים
    in keeping with the translation philosophy, rather than broadening to 'relatives'
    in the main text.
- source_word: אִישׁ חַיִל
  chosen: able men
  alternatives:
  - men of valor
  - valiant men
  - competent men
  lexicon: HALOT
  rationale: In this administrative/temple-service context, the phrase emphasizes
    capability and worth rather than battlefield heroism alone. 'Able men' captures
    competence and strength without importing a purely military sense.
- source_word: בַּכֹּחַ
  chosen: with strength
  alternatives:
  - in strength
  - mighty
  lexicon: HALOT
  rationale: The phrase qualifies their fitness. 'With strength' preserves the concrete
    sense of כוח while reading smoothly in English.
- source_word: לַעֲבֹדָה
  chosen: for the service
  alternatives:
  - for the work
  - for service
  lexicon: HALOT
  rationale: In Chronicles this commonly refers to assigned temple or Levitical duty.
    'For the service' is slightly more specific and idiomatic than 'for the work'
    while not over-specifying beyond the Hebrew.
- source_word: שִׁשִּׁים וּשְׁנַיִם
  chosen: sixty-two
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: לְעֹבֵד אֱדֹם
  chosen: belonging to Obed-edom
  alternatives:
  - for Obed-edom
  - of Obed-edom
  lexicon: HALOT
  rationale: The final לְ marks relation/association, summing up the total for Obed-edom's
    household line. 'Belonging to Obed-edom' makes the relationship clear in English
    and avoids awkward repetition of 'of' after the opening phrase.
