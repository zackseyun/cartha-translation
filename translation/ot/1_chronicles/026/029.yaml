id: 1CH.26.29
reference: 1 Chronicles 26:29
source:
  edition: WLC
  text: לַ/יִּצְהָרִ֞י כְּנַנְיָ֣הוּ וּ/בָנָ֗י/ו לַ/מְּלָאכָ֤ה הַ/חִֽיצוֹנָה֙ עַל
    יִשְׂרָאֵ֔ל לְ/שֹׁטְרִ֖ים וּ/לְ/שֹׁפְטִֽים־׃
translation:
  text: For the Izharites, Chenaniah and his sons were assigned to the external work
    over Israel, as officers and judges.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'outside work'—that is, duties outside the central sanctuary service,
      likely administrative and judicial responsibilities among Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַיִּצְהָרִי
  chosen: For the Izharites
  alternatives:
  - As for the Izharites
  - Of the Izharites
  lexicon: HALOT
  rationale: The prefixed ל with a clan designation introduces a category within the
    larger list, best rendered idiomatically as 'For the Izharites' in English. 'Izharites'
    is a standard transliteration of the family name.
- source_word: כְּנַנְיָהוּ
  chosen: Chenaniah
  alternatives:
  - Kenaniah
  lexicon: HALOT
  rationale: Personal names are transliterated rather than translated per project
    philosophy. 'Chenaniah' is a standard English transliteration reflecting the Hebrew
    name.
- source_word: וּבָנָיו
  chosen: and his sons
  alternatives:
  - and his children
  lexicon: HALOT
  rationale: בנים here is specifically masculine plural and genealogical/household
    in context, so 'sons' is more accurate than the gender-neutral 'children,' in
    keeping with the gender-accurate policy.
- source_word: לַמְּלָאכָה
  chosen: were assigned to the work
  alternatives:
  - for the work
  - for service
  - for the duty
  lexicon: HALOT
  rationale: מְלָאכָה denotes work, occupation, or assigned task. Because the verse
    is a roster of Levitical responsibilities and English requires a verbal idea,
    'were assigned to the work' brings out the implied appointment without adding
    more than the context warrants.
- source_word: הַחִיצוֹנָה
  chosen: the external
  alternatives:
  - the outside
  - the outward
  lexicon: HALOT
  rationale: The adjective means 'outer' or 'external.' In this administrative context
    it distinguishes duties outside the internal temple service, so 'external' is
    the clearest concise rendering.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - for Israel
  - concerning Israel
  lexicon: HALOT
  rationale: עַל commonly marks oversight or authority in administrative contexts.
    'Over Israel' preserves that supervisory nuance better than the broader 'for Israel.'
- source_word: לְשֹׁטְרִים
  chosen: as officers
  alternatives:
  - for officers
  - as officials
  lexicon: HALOT
  rationale: שֹׁטְרִים refers to administrative officers or officials rather than
    military police in this context. 'Officers' is the conventional concise rendering
    in biblical administrative lists.
- source_word: וּלְשֹׁפְטִים
  chosen: and judges
  alternatives:
  - and magistrates
  lexicon: HALOT
  rationale: The participial/noun form from שׁפט denotes those exercising judicial
    functions. 'Judges' is the most direct and transparent rendering.
