id: 1CH.26.19
reference: 1 Chronicles 26:19
source:
  edition: WLC
  text: אֵ֗לֶּה מַחְלְקוֹת֙ הַ/שֹּׁ֣עֲרִ֔ים לִ/בְנֵ֥י הַ/קָּרְחִ֖י וְ/לִ/בְנֵ֥י מְרָרִֽי׃
translation:
  text: These were the divisions of the gatekeepers for the sons of the Korahites
    and for the sons of Merari.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'These are the divisions of the gatekeepers for the
      sons of the Korahites and for the sons of Merari.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These were
  alternatives:
  - These are
  lexicon: HALOT
  rationale: Demonstrative plural introducing a summary statement. English idiom in
    this genealogical/list context is smoother with past tense ('were'), reflecting
    the narrative/listing frame, though the verbless Hebrew could be rendered more
    literally as 'These are'.
- source_word: מַחְלְקוֹת
  chosen: divisions
  alternatives:
  - divisions of service
  - courses
  - departments
  lexicon: HALOT
  rationale: The noun denotes divisions or assigned groupings, especially in organized
    temple service contexts. 'Divisions' is concise and natural, preserving the administrative
    sense without over-specifying.
- source_word: הַשֹּׁעֲרִים
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  - the porters
  lexicon: HALOT
  rationale: Refers to those assigned to guard/watch the gates. 'Gatekeepers' is the
    clearest modern English equivalent; 'porters' is archaic and 'doorkeepers' is
    less fitting for temple gates.
- source_word: לִבְנֵי
  chosen: for the sons of
  alternatives:
  - for the descendants of
  - belonging to the sons of
  lexicon: HALOT
  rationale: The preposition plus 'sons of' marks affiliation/distribution by clan.
    'For the sons of' preserves the Hebrew structure while remaining readable.
- source_word: הַקָּרְחִי
  chosen: the Korahites
  alternatives:
  - Korah
  - the Korahite clan
  lexicon: HALOT
  rationale: Gentilic/clan designation from Korah. 'The Korahites' is the standard
    and accurate English rendering for the clan group, better than the singular personal
    name here.
- source_word: וְלִבְנֵי מְרָרִי
  chosen: and for the sons of Merari
  alternatives:
  - and for the Merarites
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'and for the sons of Merari,' so the translation
    retains the full phrase rather than compressing it to 'Merarites,' preserving
    the parallel structure with the previous clause.
