id: 1CH.26.21
reference: 1 Chronicles 26:21
source:
  edition: WLC
  text: בְּנֵ֣י לַ֠עְדָּן בְּנֵ֨י הַ/גֵּרְשֻׁנִּ֜י לְ/לַעְדָּ֗ן רָאשֵׁ֧י הָ/אָב֛וֹת
    לְ/לַעְדָּ֥ן הַ/גֵּרְשֻׁנִּ֖י יְחִיאֵלִֽי׃
translation:
  text: 'The sons of Ladan, the sons of the Gershonite belonging to Ladan: the heads
    of the fathers’ houses belonging to Ladan the Gershonite were Jehieli.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of Ladan.' In genealogical contexts, 'sons' can denote a
      broader line of descent.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'heads of the fathers’ houses,' that is, leaders of ancestral family
      units or clans.
    reason: cultural_note
lexical_decisions:
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - descendants of
  lexicon: HALOT
  rationale: The construct plural commonly means 'sons of,' and in genealogical/tribal
    contexts can extend to descendants. Here 'sons of' preserves the formal genealogical
    style of Chronicles while remaining natural English.
- source_word: לַעְדָּן
  chosen: Ladan
  alternatives:
  - Laadan
  lexicon: HALOT
  rationale: Personal names are transliterated. 'Ladan' is a standard English form
    for this Levite name; 'Laadan' reflects a more explicit transliteration of the
    Hebrew vowels but is less conventional.
- source_word: הַגֵּרְשֻׁנִּי
  chosen: the Gershonite
  alternatives:
  - the Gershonite clan member
  - the Gershonite descendant
  lexicon: HALOT
  rationale: The gentilic/adjectival form identifies clan affiliation. 'The Gershonite'
    is the standard concise rendering and fits the genealogical register.
- source_word: לְלַעְדָּן
  chosen: belonging to Ladan
  alternatives:
  - of Ladan
  - for Ladan
  lexicon: HALOT
  rationale: The prefixed ל here marks relation/classification within the genealogy
    rather than direction. 'Belonging to Ladan' makes the affiliation explicit in
    English and helps untangle the compressed Hebrew syntax.
- source_word: רָאשֵׁי
  chosen: heads
  alternatives:
  - chiefs
  - leaders
  lexicon: HALOT
  rationale: In the phrase 'heads of the fathers’ houses,' 'heads' is the conventional
    and semantically precise rendering for family leaders. 'Chiefs' is possible but
    slightly more interpretive.
- source_word: הָאָבוֹת
  chosen: fathers’ houses
  alternatives:
  - ancestral houses
  - families
  lexicon: HALOT
  rationale: This is the standard kinship expression for extended family units or
    clans. 'Fathers’ houses' preserves the source idiom; 'families' is smoother but
    loses the formal genealogical texture.
- source_word: יְחִיאֵלִי
  chosen: Jehieli
  alternatives:
  - Jehieli
  lexicon: HALOT
  rationale: The proper name is transliterated. 'Jehieli' reflects the consonantal
    form here and distinguishes it from the more common name Jehiel in English tradition.
