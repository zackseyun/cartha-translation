id: 1CH.26.27
reference: 1 Chronicles 26:27
source:
  edition: WLC
  text: מִן הַ/מִּלְחָמ֥וֹת וּ/מִן הַ/שָּׁלָ֖ל הִקְדִּ֑ישׁוּ לְ/חַזֵּ֖ק לְ/בֵ֥ית יְהוָֽה־־׃
translation:
  text: From the wars and from the spoil they had dedicated them to strengthen the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the battles and from the plunder they dedicated [them].' The Hebrew leaves the object unstated, and 'spoil' may also be rendered 'plunder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן הַמִּלְחָמוֹת
  chosen: From the wars
  alternatives:
  - From the battles
  lexicon: HALOT
  rationale: מִן marks source/origin, and מִלְחָמוֹת is the plural of 'wars/battles.' 'Wars' is slightly broader and fits the plural collective sense in context.
- source_word: וּמִן הַשָּׁלָל
  chosen: and from the spoil
  alternatives:
  - and from the plunder
  lexicon: HALOT
  rationale: שָׁלָל denotes goods taken in war. 'Spoil' is a standard, concise rendering in military contexts; 'plunder' is possible but slightly more interpretive in tone.
- source_word: הִקְדִּישׁוּ
  chosen: they had dedicated things
  alternatives:
  - they dedicated
  - they consecrated
  lexicon: HALOT
  rationale: The Hiphil of קדשׁ here means to set apart as holy/dedicated. Because the direct object is implicit in Hebrew, 'things' is supplied in English for clarity. The perfect is rendered with past perfect ('had dedicated') to fit the surrounding narrative context.
- source_word: לְחַזֵּק
  chosen: to strengthen
  alternatives:
  - to support
  - to repair
  lexicon: HALOT
  rationale: The infinitive of חזק means 'to strengthen, make strong.' In temple-administrative context it can imply support or maintenance, but 'strengthen' stays closest to the Hebrew while remaining natural.
- source_word: לְבֵית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת with YHWH commonly refers to the temple/sanctuary. 'House of the LORD' preserves the Hebrew idiom. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
