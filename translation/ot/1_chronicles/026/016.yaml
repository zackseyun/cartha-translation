id: 1CH.26.16
reference: 1 Chronicles 26:16
source:
  edition: WLC
  text: לְ/שֻׁפִּ֤ים וּ/לְ/חֹסָה֙ לַֽ/מַּעֲרָ֔ב עִ֚ם שַׁ֣עַר שַׁלֶּ֔כֶת בַּֽ/מְסִלָּ֖ה
    הָ/עוֹלָ֑ה מִשְׁמָ֖ר לְ/עֻמַּ֥ת מִשְׁמָֽר׃
translation:
  text: For Shuppim and Hosah, the lot fell to the west, with the Gate of Shallecheth
    on the ascending highway, guard opposite guard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the Gate of Casting Out'; 'Shallecheth' is likely a proper
      gate name derived from a verb meaning 'to cast out' or 'throw down.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְשֻׁפִּים
  chosen: For Shuppim
  alternatives:
  - To Shuppim
  lexicon: HALOT
  rationale: The prefixed ל marks assignment in the lot-distribution context of the
    surrounding verses. 'For Shuppim' reads naturally in English while preserving
    the dative sense.
- source_word: וּלְחֹסָה
  chosen: and Hosah
  alternatives:
  - and for Hosah
  lexicon: HALOT
  rationale: Continuation of the assignment formula from the previous verse. English
    can omit the repeated 'for' after the conjunction without loss, but the sense
    is retained in the clause as a whole.
- source_word: לַמַּעֲרָב
  chosen: to the west
  alternatives:
  - for the west side
  - westward
  lexicon: HALOT
  rationale: Refers to the western side/location assigned by lot. 'To the west' is
    concise and idiomatic in English.
- source_word: עִם
  chosen: with
  alternatives:
  - by
  - together with
  lexicon: HALOT
  rationale: Introduces an associated landmark, namely the gate. 'With' best preserves
    the simple relational force.
- source_word: שַׁעַר שַׁלֶּכֶת
  chosen: the Gate of Shallecheth
  alternatives:
  - the Shallecheth Gate
  - the Gate of Casting Out
  lexicon: HALOT
  rationale: שַׁלֶּכֶת appears to be a proper gate name. Following the translation
    philosophy, names are transliterated rather than translated in the main text.
    A lexical alternative is worth preserving in a footnote because the name may derive
    from a verb meaning 'to cast out' or 'throw down.'
- source_word: בַּמְסִלָּה הָעוֹלָה
  chosen: on the ascending highway
  alternatives:
  - on the highway that goes up
  - at the ascent road
  lexicon: HALOT
  rationale: מְסִלָּה is a raised road/highway/causeway; הָעוֹלָה qualifies it as
    going up or ascending. 'Ascending highway' is compact while preserving the topographical
    sense.
- source_word: מִשְׁמָר לְעֻמַּת מִשְׁמָר
  chosen: guard opposite guard
  alternatives:
  - watch opposite watch
  - one guard corresponding to another
  lexicon: HALOT
  rationale: The phrase describes corresponding guard posts or watches facing each
    other. 'Guard opposite guard' preserves the terse Hebrew style and likely spatial
    arrangement better than a more interpretive paraphrase.
