id: 1CH.26.23
reference: 1 Chronicles 26:23
source:
  edition: WLC
  text: לַֽ/עַמְרָמִי֙ לַ/יִּצְהָרִ֔י לַֽ/חֶבְרוֹנִ֖י לָֽ/עָזִּיאֵלִֽי׃
translation:
  text: For the Amramites, the Izharites, the Hebronites, and the Uzzielites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Of the Amramites, the Izharites, the Hebronites, and the Uzzielites."
      The Hebrew consists only of four clan designations with the preposition ל, functioning
      as a list heading.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַעַמְרָמִי
  chosen: For the Amramites
  alternatives:
  - Of the Amramites
  - As for the Amramites
  lexicon: HALOT
  rationale: The prefixed ל with the gentilic/familial form marks a heading-like designation
    in this genealogical/administrative list. 'For the Amramites' gives natural English
    while preserving the list structure. 'Amramites' transliterates the clan name
    rather than translating it.
- source_word: לַיִּצְהָרִי
  chosen: the Izharites
  alternatives:
  - the Izhar clan
  - the descendants of Izhar
  lexicon: HALOT
  rationale: A gentilicial clan designation from Izhar. 'Izharites' is the most concise
    and conventional English rendering for a family group in a list.
- source_word: לַחֶבְרוֹנִי
  chosen: the Hebronites
  alternatives:
  - the Hebron clan
  - the descendants of Hebron
  lexicon: HALOT
  rationale: Another gentilicial clan term. 'Hebronites' maintains consistency with
    the surrounding names and preserves the list format.
- source_word: לָעָזִּיאֵלִי
  chosen: and the Uzzielites
  alternatives:
  - and the Uzziel clan
  - and the descendants of Uzziel
  lexicon: HALOT
  rationale: Final gentilicial clan designation in the series. 'Uzzielites' is a standard
    transliteration-based rendering; 'and' is supplied in English to complete the
    list naturally.
