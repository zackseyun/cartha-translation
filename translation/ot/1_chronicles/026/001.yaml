id: 1CH.26.1
reference: 1 Chronicles 26:1
source:
  edition: WLC
  text: לְ/מַחְלְק֖וֹת לְ/שֹׁעֲרִ֑ים לַ/קָּרְחִ֕ים מְשֶֽׁלֶמְיָ֥הוּ בֶן קֹרֵ֖א מִן
    בְּנֵ֥י אָסָֽף־־׃
translation:
  text: 'For the divisions of the gatekeepers: of the Korahites, Meshelemiah son of
    Kore, from the sons of Asaph.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'According to the divisions of the gatekeepers.' The opening phrase
      functions like a section heading introducing the gatekeeper divisions.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַחְלְקוֹת
  chosen: For the divisions
  alternatives:
  - According to the divisions
  - As for the divisions
  lexicon: HALOT
  rationale: The prefixed ל introduces the heading/topic of the section. מַחְלְקוֹת
    refers to divisions or assigned groups/courses. 'For the divisions' works well
    as a heading in English while preserving the organizational sense.
- source_word: לְשֹׁעֲרִים
  chosen: of the gatekeepers
  alternatives:
  - for the gatekeepers
  - of the doorkeepers
  lexicon: HALOT
  rationale: שֹׁעֲרִים are those stationed at gates; 'gatekeepers' is the clearest
    modern equivalent. The second ל is rendered idiomatically with 'of' in English
    to express the category governed by the heading.
- source_word: לַקָּרְחִים
  chosen: of the Korahites
  alternatives:
  - for the Korahites
  - belonging to the Korahites
  lexicon: HALOT
  rationale: This identifies the clan/subgroup within the gatekeepers. 'Korahites'
    is the standard transliteration for descendants of Korah. 'Of the Korahites' fits
    the list-like syntax.
- source_word: מְשֶׁלֶמְיָהוּ
  chosen: Meshelemiah
  alternatives:
  - Shelemiah
  rationale: Personal names are transliterated by standard convention per project
    philosophy. 'Meshelemiah' reflects the consonantal form in this verse.
- source_word: בֶן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In immediate genealogy, 'son of' is the most natural and direct rendering.
    Although בן can sometimes mean descendant, there is no need to generalize here.
- source_word: קֹרֵא
  chosen: Kore
  rationale: Proper name transliterated directly.
- source_word: מִן בְּנֵי אָסָף
  chosen: from the sons of Asaph
  alternatives:
  - from among the sons of Asaph
  - of the sons of Asaph
  lexicon: HALOT
  rationale: מִן marks source/origin or membership from within a larger family line.
    'From the sons of Asaph' preserves the Hebrew wording closely. Although 'Asaph'
    can evoke the well-known Levitical singer, here it is best left as the personal
    name in the genealogy without importing further interpretation.
