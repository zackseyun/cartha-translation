id: 1CH.26.26
reference: 1 Chronicles 26:26
source:
  edition: WLC
  text: ה֧וּא שְׁלֹמ֣וֹת וְ/אֶחָ֗י/ו עַ֣ל כָּל אֹצְר֤וֹת הַ/קֳּדָשִׁים֙ אֲשֶׁ֨ר הִקְדִּ֜ישׁ
    דָּוִ֣יד הַ/מֶּ֗לֶךְ וְ/רָאשֵׁ֧י הָ/אָב֛וֹת לְ/שָׂרֵֽי הָ/אֲלָפִ֥ים וְ/הַ/מֵּא֖וֹת
    וְ/שָׂרֵ֥י הַ/צָּבָֽא־־׃
translation:
  text: Shelomoth and his brothers were over all the treasuries of the holy things
    that King David, the heads of the fathers’ houses, the commanders of thousands
    and hundreds, and the commanders of the army had dedicated.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sacred things' or 'the dedicated gifts.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the heads of the fathers’ houses,' a clan-based administrative term.
    reason: cultural_note
lexical_decisions:
- source_word: הוּא
  chosen: were
  alternatives:
  - he was
  lexicon: HALOT
  rationale: Although literally 'he,' the clause functions with the compound subject
    'Shelomoth and his brothers.' English idiom naturally supplies the plural verb
    'were' rather than preserving a formally singular pronoun.
- source_word: שְׁלֹמוֹת
  chosen: Shelomoth
  alternatives:
  - Shelomot
  lexicon: HALOT
  rationale: Personal names are transliterated rather than translated, following project
    policy.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: אָח commonly means 'brother'; here it refers to male relatives/associates
    in the Levitical context. 'Brothers' is the most direct rendering and is gender-accurate
    to the Hebrew form.
- source_word: עַל
  chosen: were over
  alternatives:
  - were in charge of
  - were responsible for
  lexicon: HALOT
  rationale: In administrative contexts עַל indicates authority or oversight. 'Were
    over' preserves the concise Hebrew sense while remaining natural English.
- source_word: כָּל אֹצְרוֹת
  chosen: all the treasuries
  alternatives:
  - all the storehouses
  - all the treasures
  lexicon: HALOT
  rationale: אֹצָר denotes a treasury/storehouse or its stored wealth. In this temple-administrative
    setting, 'treasuries' best fits the institutional sense.
- source_word: הַקֳּדָשִׁים
  chosen: of the holy things
  alternatives:
  - of the dedicated gifts
  - of the sacred things
  lexicon: HALOT
  rationale: The phrase refers to consecrated items kept in the treasuries. 'Holy
    things' is a transparent rendering of the Hebrew, while the following verb 'had
    dedicated' clarifies their consecrated status.
- source_word: אֲשֶׁר הִקְדִּישׁ
  chosen: that ... had dedicated
  alternatives:
  - that ... had consecrated
  - that ... had set apart as holy
  lexicon: HALOT
  rationale: קדשׁ in the Hiphil means to dedicate/consecrate. 'Had dedicated' is natural
    modern English and suits the context of donated sacred treasury items.
- source_word: דָּוִיד הַמֶּלֶךְ
  chosen: King David
  alternatives:
  - David the king
  lexicon: HALOT
  rationale: English title order normally places the title first. This preserves meaning
    without unnecessary Hebraic word order.
- source_word: רָאשֵׁי הָאָבוֹת
  chosen: the heads of the fathers’ houses
  alternatives:
  - the heads of the ancestral houses
  - the family heads
  lexicon: HALOT
  rationale: Literally 'heads of the fathers.' In Chronicles this is a technical kinship-administrative
    expression. 'Fathers’ houses' preserves the source structure better than the more
    interpretive 'family heads.'
- source_word: שָׂרֵי הָאֲלָפִים וְהַמֵּאוֹת
  chosen: the commanders of thousands and hundreds
  alternatives:
  - the officers over thousands and hundreds
  - the captains of thousands and hundreds
  lexicon: HALOT
  rationale: שָׂרִים are officials/commanders. In military-administrative context,
    'commanders' is clear modern English. 'Thousands and hundreds' reflects the Hebrew
    organizational units.
- source_word: שָׂרֵי הַצָּבָא
  chosen: the commanders of the army
  alternatives:
  - the army commanders
  - the commanders of the host
  lexicon: HALOT
  rationale: צָבָא here refers to the military force, not a heavenly host. 'Commanders
    of the army' is clear and suitably formal.
