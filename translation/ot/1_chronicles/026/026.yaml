theological_decisions:
- issue: Scope of those who dedicated the holy things
  chosen_reading: All listed groups—King David, the heads of the fathers’ houses,
    the commanders of thousands and hundreds, and the commanders of the army—are understood
    as joint dedicators.
  alternative_readings:
  - Only David dedicated them, with the following groups appositional or otherwise
    related indirectly.
  rationale: The Hebrew coordination with repeated וְ most naturally reads as a list
    of subjects attached to the singular verb by collective sense after the relative
    clause. English plural perfect 'had dedicated' makes the intended sense explicit
    and avoids implying that only David dedicated the items.
