id: 1CH.26.4
reference: 1 Chronicles 26:4
source:
  edition: WLC
  text: וּ/לְ/עֹבֵ֥ד אֱדֹ֖ם בָּנִ֑ים שְׁמַֽעְיָ֤ה הַ/בְּכוֹר֙ יְהוֹזָבָ֣ד הַ/שֵּׁנִ֔י
    יוֹאָ֤ח הַ/שְּׁלִשִׁי֙ וְ/שָׂכָ֣ר הָ/רְבִיעִ֔י וּ/נְתַנְאֵ֖ל הַ/חֲמִישִֽׁי׃
translation:
  text: 'And Obed-edom had sons: Shemaiah the firstborn, Jehozabad the second, Joah
    the third, and Sakar the fourth, and Nethanel the fifth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'And to Obed-edom, sons'; the English supplies 'had' to
      express the genealogical formula naturally.
    reason: lexical_alternative
  - marker: b
    text: The name 'Sakar' is distinct from 'Issachar' in the Hebrew form used here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/עֹבֵד אֱדֹם
  chosen: And Obed-edom
  alternatives:
  - Now to Obed-edom
  - And to Obed-edom
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally yields 'and/to Obed-edom.'
    In this genealogical listing, idiomatic English commonly renders the dative-like
    construction as a topical introduction, 'And Obed-edom,' before stating what he
    had.
- source_word: בָּנִים
  chosen: had sons
  alternatives:
  - sons were born
  - there were sons
  lexicon: HALOT
  rationale: The noun 'sons' stands in an elliptical genealogical formula. English
    requires a verb; 'had sons' is natural and accurately conveys the sense without
    overparaphrase.
- source_word: שְׁמַעְיָה
  chosen: Shemaiah
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: הַבְּכוֹר
  chosen: the firstborn
  alternatives:
  - the eldest
  - the first
  lexicon: HALOT
  rationale: בכור is a substantive title meaning 'firstborn,' not merely ordinal sequence.
    'Firstborn' preserves the lexical and familial nuance.
- source_word: יְהוֹזָבָד
  chosen: Jehozabad
  rationale: Personal name transliterated by standard English convention.
- source_word: הַשֵּׁנִי
  chosen: the second
  lexicon: HALOT
  rationale: Simple ordinal adjective marking birth order; rendered directly.
- source_word: יוֹאָח
  chosen: Joah
  alternatives:
  - Joach
  rationale: Standard English transliteration is 'Joah.'
- source_word: הַשְּׁלִשִׁי
  chosen: the third
  lexicon: HALOT
  rationale: Simple ordinal adjective marking birth order; rendered directly.
- source_word: וְ/שָׂכָר
  chosen: and Sakar
  alternatives:
  - and Issachar
  rationale: The consonantal form here is the personal name Sakar, not the tribal
    name Issachar. Transliteration should reflect the form in this verse.
- source_word: הָרְבִיעִי
  chosen: the fourth
  lexicon: HALOT
  rationale: Simple ordinal adjective marking birth order; rendered directly.
- source_word: וּ/נְתַנְאֵל
  chosen: and Nethanel
  alternatives:
  - and Nathanael
  rationale: Standard Hebrew-based transliteration is 'Nethanel'; 'Nathanael' reflects
    a more familiar Greek-influenced form but is less direct from the Hebrew here.
- source_word: הַחֲמִישִׁי
  chosen: the fifth
  lexicon: HALOT
  rationale: Simple ordinal adjective marking birth order; rendered directly.
