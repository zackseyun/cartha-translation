id: 1CH.26.5
reference: 1 Chronicles 26:5
source:
  edition: WLC
  text: עַמִּיאֵ֤ל הַ/שִּׁשִּׁי֙ יִשָׂשכָ֣ר הַ/שְּׁבִיעִ֔י פְּעֻלְּתַ֖י הַ/שְּׁמִינִ֑י
    כִּ֥י בֵרֲכ֖/וֹ אֱלֹהִֽים׃פ
translation:
  text: Ammiel the sixth, Issachar the seventh, Peullethai the eighth; for God had
    blessed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because God blessed him.' The Hebrew conjunction and verb can be rendered
      more directly without the English past perfect.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמִּיאֵל
  chosen: Ammiel
  rationale: Proper personal name; transliterated rather than translated per project
    policy for names.
- source_word: הַשִּׁשִּׁי
  chosen: the sixth
  rationale: Ordinal with article, continuing the list of sons in birth order.
- source_word: יִשָׂשכָר
  chosen: Issachar
  rationale: Proper personal name; although also the tribal name elsewhere, here context
    clearly identifies an individual son, so standard transliteration is retained.
- source_word: הַשְּׁבִיעִי
  chosen: the seventh
  rationale: Ordinal with article, parallel to the surrounding list structure.
- source_word: פְּעֻלְּתַי
  chosen: Peullethai
  alternatives:
  - Peulthai
  rationale: Proper personal name. 'Peullethai' reflects a fuller transliteration
    of the doubled consonant and vocalization; a simplified English form is possible.
- source_word: הַשְּׁמִינִי
  chosen: the eighth
  rationale: Ordinal with article, completing the sequence.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the large number of sons listed in this context;
    'for' is natural and preserves the explanatory force.
- source_word: בֵרֲכוֹ
  chosen: had blessed him
  alternatives:
  - blessed him
  lexicon: HALOT
  rationale: Verb ברך with 3ms suffix refers to God blessing Obed-edom, the father
    named in the surrounding context. English past perfect fits the explanatory sense
    relative to the preceding genealogy.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Common Hebrew designation for God; singular sense is required by the
    singular verbal form and context.
