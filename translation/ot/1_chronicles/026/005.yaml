theological_decisions:
- issue: Referent of the pronoun in 'had blessed him'
  chosen_reading: The pronoun refers to Obed-edom, the father in the immediate context.
  alternative_readings:
  - The pronoun could be taken more generally as referring to the household line.
  rationale: The broader passage (1 Chr 26:4–8) enumerates Obed-edom's sons and descendants,
    and the explanatory clause most naturally grounds their number in God's blessing
    on him. This is a contextual, not doctrinal, decision.
