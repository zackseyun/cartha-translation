id: 1CH.26.22
reference: 1 Chronicles 26:22
source:
  edition: WLC
  text: בְּנֵ֖י יְחִֽיאֵלִ֑י זֵתָם֙ וְ/יוֹאֵ֣ל אָחִ֔י/ו עַל אֹצְר֖וֹת בֵּ֥ית יְהוָֽה־׃
translation:
  text: 'The sons of Jehieli: Zetham and Joel his brother were over the treasuries of the house of Yahweh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'house of Yahweh'; traditionally rendered 'house of the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Construct plural of בן. In genealogical/administrative context, 'sons of' is the most direct and conventional rendering; 'descendants of' is possible but less precise here.
- source_word: יְחִיאֵלִי
  chosen: Jehieli
  alternatives:
  - Jehielite
  lexicon: HALOT
  rationale: Treated as a personal name in apposition after 'sons of.' Although the form could be understood adjectivally ('Jehielite'), the parallel with named descendants favors transliterating it as the proper name 'Jehieli.'
- source_word: זֵתָם
  chosen: Zetham
  lexicon: HALOT
  rationale: Proper name; transliterated according to standard English convention.
- source_word: וְיוֹאֵל
  chosen: and Joel
  lexicon: HALOT
  rationale: Proper name with conjunction; straightforward coordination with Zetham.
- source_word: אָחִיו
  chosen: his brother
  alternatives:
  - their brother
  lexicon: HALOT
  rationale: 'Singular noun with 3ms suffix most naturally refers to Joel as the brother of Zetham: ''Joel his brother.'' Some English renderings smooth to ''their brother,'' but the Hebrew form is singular.'
- source_word: עַל
  chosen: were over
  alternatives:
  - were in charge of
  - had charge of
  lexicon: HALOT
  rationale: In administrative contexts על commonly indicates oversight or responsibility. 'Were over' preserves the concise Hebrew sense while remaining natural English.
- source_word: אֹצְרוֹת
  chosen: the treasuries
  alternatives:
  - the storehouses
  - the treasures
  lexicon: HALOT
  rationale: Refers to treasury holdings/storage under temple administration. 'Treasuries' best fits the institutional sense in this context.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: בית יהוה is literally 'house of YHWH.' Following the doctrine guideline, YHWH is rendered 'the LORD.' 'House' is retained rather than 'temple' to stay closer to the Hebrew while remaining idiomatic.
