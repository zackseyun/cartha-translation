id: 1CH.26.20
reference: 1 Chronicles 26:20
source:
  edition: WLC
  text: וְֽ/הַ/לְוִיִּ֑ם אֲחִיָּ֗ה עַל אֽוֹצְרוֹת֙ בֵּ֣ית הָ/אֱלֹהִ֔ים וּ/לְ/אֹֽצְר֖וֹת
    הַ/קֳּדָשִֽׁים־׃
translation:
  text: And of the Levites, Ahijah was over the treasuries of the house of God and
    the treasuries of the holy things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''And the Levites: Ahijah was over ...'' The Hebrew opening is somewhat
      elliptical and may function as a heading-like transition.'
    reason: alternative_reading
  - marker: b
    text: '''Holy things'' may also be rendered ''dedicated things'' or ''consecrated
      things,'' referring to items set apart for sacred use.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַלְוִיִּם
  chosen: And of the Levites
  alternatives:
  - And the Levites
  - As for the Levites
  lexicon: HALOT
  rationale: 'The conjunction plus article+noun can be read as a topical transition:
    ''and/as for the Levites.'' Given the following singular proper name, the phrase
    likely introduces the Levitical oversight assignment rather than serving as a
    simple subject plural. ''And of the Levites'' preserves the somewhat elliptical
    Hebrew while remaining intelligible.'
- source_word: אֲחִיָּה
  chosen: Ahijah
  alternatives:
  - Ahiah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name; names are transliterated
    rather than translated per project philosophy.
- source_word: עַל
  chosen: was over
  alternatives:
  - was in charge of
  - was responsible for
  lexicon: HALOT
  rationale: In administrative contexts עַל commonly indicates authority or oversight.
    'Was over' is a natural, fairly formal rendering that preserves the governance
    sense without over-paraphrasing.
- source_word: אֹצְרוֹת
  chosen: treasuries
  alternatives:
  - storehouses
  - stores
  lexicon: HALOT
  rationale: The noun denotes places or collections for stored valuables/supplies.
    In the temple context, 'treasuries' best fits both the institutional setting and
    the likely contents under official supervision.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: Literally 'house of God.' Although it refers to the sanctuary complex,
    the more literal rendering is preferred here because the Hebrew expression is
    straightforward and idiomatic in English.
- source_word: וּלְאֹצְרוֹת
  chosen: and the treasuries of
  alternatives:
  - and over the treasuries of
  lexicon: HALOT
  rationale: 'The preposition לְ after the conjunction links the second treasury phrase
    to the first under the governance of עַל. English can omit repeating ''over''
    without loss, but the relation remains clear: Ahijah supervised both sets of treasuries.'
- source_word: הַקֳּדָשִׁים
  chosen: the holy things
  alternatives:
  - the dedicated things
  - the consecrated things
  - the sacred gifts
  lexicon: HALOT
  rationale: The plural refers to items set apart as holy, likely dedicated offerings
    or sacred objects. 'Holy things' is the most direct rendering; alternatives are
    interpretive expansions of the cultic sense.
