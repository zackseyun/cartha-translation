id: 1CH.26.31
reference: 1 Chronicles 26:31
source:
  edition: WLC
  text: לַֽ/חֶבְרוֹנִי֙ יְרִיָּ֣ה הָ/רֹ֔אשׁ לַֽ/חֶבְרוֹנִ֥י לְ/תֹלְדֹתָ֖י/ו לְ/אָב֑וֹת
    בִּ/שְׁנַ֨ת הָֽ/אַרְבָּעִ֜ים לְ/מַלְכ֤וּת דָּוִיד֙ נִדְרָ֔שׁוּ וַ/יִּמָּצֵ֥א בָ/הֶ֛ם
    גִּבּ֥וֹרֵי חַ֖יִל בְּ/יַעְזֵ֥יר גִּלְעָֽד׃
translation:
  text: For the Hebronites, Jeriah was the chief of the Hebronites according to his
    generations by fathers’ houses. In the fortieth year of David’s reign they were
    searched out, and among them mighty men of valor were found at Jazer of Gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'As for the Hebronites, Jeriah was the head.'
    reason: lexical_alternative
  - marker: b
    text: '''Fathers’ houses'' is a clan term referring to ancestral household groupings,
      not merely nuclear families.'
    reason: cultural_note
  - marker: c
    text: Or 'mighty warriors' or 'capable men'; the Hebrew phrase can denote men
      distinguished by strength, valor, or proven ability.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַחֶבְרוֹנִי
  chosen: For the Hebronites
  alternatives:
  - As for the Hebronites
  - Of the Hebronites
  lexicon: HALOT
  rationale: The prefixed ל marks topical reference here, introducing a new Levitical
    clan section. 'For the Hebronites' is natural English while preserving the discourse
    function.
- source_word: יְרִיָּה
  chosen: Jeriah
  alternatives:
  - Jerahiah
  lexicon: HALOT
  rationale: Standard transliteration of the personal name. An alternate English form
    exists in some traditions, but 'Jeriah' follows the consonantal form here.
- source_word: הָרֹאשׁ
  chosen: was the chief
  alternatives:
  - was the head
  - was the leader
  lexicon: HALOT
  rationale: In administrative/genealogical context, רֹאשׁ denotes the leading figure
    or chief. 'Chief' is idiomatic and suitably formal.
- source_word: לַחֶבְרוֹנִי
  chosen: of the Hebronites
  alternatives:
  - for the Hebronites
  lexicon: HALOT
  rationale: The repeated phrase identifies the group over which Jeriah had chief
    status. 'Chief of the Hebronites' best reflects the relation in English.
- source_word: לְתֹלְדֹתָיו לְאָבוֹת
  chosen: according to his generations by fathers’ houses
  alternatives:
  - according to his genealogies by ancestral houses
  - by his generations, by fathers' houses
  lexicon: HALOT
  rationale: This formula combines descent lines and clan structure. 'Generations'
    preserves תולדות, while 'fathers’ houses' keeps the technical kinship term rather
    than flattening it to merely 'families.' The singular suffix on תולדותיו is retained
    as 'his,' referring to Jeriah/the clan line represented by him.
- source_word: בִּשְׁנַת הָאַרְבָּעִים לְמַלְכוּת דָּוִיד
  chosen: In the fortieth year of David’s reign
  alternatives:
  - In the fortieth year of David's kingship
  lexicon: HALOT
  rationale: A straightforward regnal dating formula. 'Reign' is the most natural
    English equivalent for מלכות in this context.
- source_word: נִדְרָשׁוּ
  chosen: they were searched out
  alternatives:
  - they were investigated
  - they were sought out
  - they were enrolled by inquiry
  lexicon: HALOT
  rationale: The Niphal of דרש here indicates formal inquiry or investigation into
    genealogical/administrative records. 'Searched out' preserves the passive and
    the sense of deliberate examination.
- source_word: וַיִּמָּצֵא בָהֶם
  chosen: and among them ... were found
  alternatives:
  - and there were found among them
  - and he found among them
  lexicon: HALOT
  rationale: Although the verb is morphologically singular, it functions idiomatically
    with an indefinite/passive sense in context. English plural 'were found' matches
    the plural subject that follows and reads naturally.
- source_word: גִּבּוֹרֵי חַיִל
  chosen: mighty men of valor
  alternatives:
  - mighty warriors
  - capable men
  - valiant men
  lexicon: HALOT
  rationale: This stock phrase can denote military prowess or notable capability.
    In this administrative context the men are being identified as especially able;
    however, 'mighty men of valor' preserves the established force of the Hebrew without
    over-narrowing it.
- source_word: בְּיַעְזֵיר גִּלְעָד
  chosen: at Jazer of Gilead
  alternatives:
  - in Jazer of Gilead
  - at Jaazer in Gilead
  lexicon: HALOT
  rationale: A place designation locating where these men were found. 'At' fits the
    discovery context; 'Jazer' is a standard English form, though 'Jaazer' appears
    in some traditions.
