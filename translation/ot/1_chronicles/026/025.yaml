id: 1CH.26.25
reference: 1 Chronicles 26:25
source:
  edition: WLC
  text: וְ/אֶחָ֖י/ו לֶֽ/אֱלִיעֶ֑זֶר רְחַבְיָ֨הוּ בְנ֜/וֹ וִֽ/ישַׁעְיָ֤הוּ בְנ/וֹ֙
    וְ/יֹרָ֣ם בְּנ֔/וֹ וְ/זִכְרִ֥י בְנ֖/וֹ ו/שלמות בְּנֽ/וֹ׃
translation:
  text: 'And his brothers belonging to Eliezer: Rehabiah his son, and Jeshaiah his
    son, and Joram his son, and Zichri his son, and Shelomith his son.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'his brothers of Eliezer.' The Hebrew construction likely
      introduces the Eliezerite branch of the family line.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶחָיו
  chosen: And his brothers
  alternatives:
  - And his kinsmen
  - Now his brothers
  lexicon: HALOT
  rationale: אָח in the plural with 3ms suffix is most naturally 'his brothers.' In
    genealogical/tribal contexts it can extend to broader kin, but the immediate list
    functions as a family line, so 'brothers' best preserves the source wording while
    remaining natural.
- source_word: לֶאֱלִיעֶזֶר
  chosen: belonging to Eliezer
  alternatives:
  - of Eliezer
  - for Eliezer
  lexicon: HALOT
  rationale: The prefixed ל marks relation here after 'his brothers,' introducing
    the branch associated with Eliezer. English needs a smoothing expression; 'belonging
    to Eliezer' makes the genealogical linkage explicit without overinterpreting.
- source_word: רְחַבְיָהוּ
  chosen: Rehabiah
  alternatives:
  - Rehabiahu
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - son
  lexicon: HALOT
  rationale: Repeated filial marker in the genealogy. Rendering each occurrence as
    'his son' preserves the chain of descent explicitly present in Hebrew.
- source_word: וִישַׁעְיָהוּ
  chosen: and Jeshaiah
  alternatives:
  - and Isaiah
  - and Yeshayahu
  rationale: Proper name transliterated in its conventional English form for this
    individual in Chronicles; not translated as the better-known prophetic name 'Isaiah'
    to avoid confusion with another figure.
- source_word: וְיֹרָם
  chosen: and Joram
  alternatives:
  - and Jehoram
  rationale: The shorter Hebrew form here is best represented as 'Joram.' 'Jehoram'
    reflects a related fuller form but is not the form written in this verse.
- source_word: וְזִכְרִי
  chosen: and Zichri
  alternatives:
  - and Zikri
  rationale: Standard transliteration of the personal name.
- source_word: וּשְׁלֹמוֹת
  chosen: and Shelomith
  alternatives:
  - and Shelomot
  rationale: The consonantal form here is commonly represented in English tradition
    as 'Shelomith' for this personal name in Chronicles. This avoids an awkwardly
    literal transliteration while preserving the name as a name.
