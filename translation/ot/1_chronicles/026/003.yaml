id: 1CH.26.3
reference: 1 Chronicles 26:3
source:
  edition: WLC
  text: עֵילָ֤ם הַ/חֲמִישִׁי֙ יְהוֹחָנָ֣ן הַ/שִּׁשִּׁ֔י אֶלְיְהוֹעֵינַ֖י הַ/שְּׁבִיעִֽי׃
translation:
  text: Elam the fifth, Jehohanan the sixth, Eliehoenai the seventh.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: עֵילָם
  chosen: Elam
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention
    rather than translated, following the philosophy of transliterating names.
- source_word: הַחֲמִישִׁי
  chosen: the fifth
  alternatives:
  - fifth
  lexicon: HALOT
  rationale: Ordinal adjective with article. Rendered with the English article to
    mirror the Hebrew construction and the list format of the genealogy/register.
- source_word: יְהוֹחָנָן
  chosen: Jehohanan
  alternatives:
  - Yehohanan
  lexicon: HALOT
  rationale: Proper personal name; transliterated in a conventional English form.
    A more strictly phonetic transliteration is possible, but standard biblical-name
    convention is preferable for readability.
- source_word: הַשִּׁשִּׁי
  chosen: the sixth
  alternatives:
  - sixth
  lexicon: HALOT
  rationale: Ordinal adjective with article. Kept formally parallel with the surrounding
    names and ordinals.
- source_word: אֶלְיְהוֹעֵינַי
  chosen: Eliehoenai
  alternatives:
  - Elihoenai
  - El-yeho-enai
  lexicon: HALOT
  rationale: Proper personal name; transliterated. 'Eliehoenai' reflects a common
    English convention for this Hebrew name while preserving recognizability.
- source_word: הַשְּׁבִיעִי
  chosen: the seventh
  alternatives:
  - seventh
  lexicon: HALOT
  rationale: Ordinal adjective with article. Rendered consistently with the preceding
    ordinals in this enumerated list.
