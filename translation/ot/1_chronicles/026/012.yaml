theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יְהוָה is 'the LORD,' following the stated doctrine
    and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether גְּבָרִים should be rendered with a male-specific term
  chosen_reading: men
  alternative_readings:
  - persons
  - leaders
  rationale: The Hebrew is grammatically masculine plural and refers to male temple
    personnel in this historical setting. Per the gender-accurate policy, a masculine
    English rendering is retained rather than neutralized.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
