id: 1CH.26.12
reference: 1 Chronicles 26:12
source:
  edition: WLC
  text: לְ֠/אֵלֶּה מַחְלְק֨וֹת הַ/שֹּֽׁעֲרִ֜ים לְ/רָאשֵׁ֧י הַ/גְּבָרִ֛ים מִשְׁמָר֖וֹת
    לְ/עֻמַּ֣ת אֲחֵי/הֶ֑ם לְ/שָׁרֵ֖ת בְּ/בֵ֥ית יְהוָֽה׃
translation:
  text: For these divisions of the gatekeepers, the chief men had assigned duties
    corresponding to those of their brothers, to minister in the house of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the leading men had watches/duties alongside their brothers.' The Hebrew
      is compact, and מִשְׁמָרוֹת can also be rendered 'watches' or 'service assignments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאֵלֶּה
  chosen: For these
  alternatives:
  - To these
  - These
  lexicon: HALOT
  rationale: 'The prefixed ל here is best taken as introducing or referring to the
    following arrangement: ''for these'' or ''as for these.'' In English, ''For these''
    naturally introduces the summary statement about the divisions.'
- source_word: מַחְלְקוֹת
  chosen: divisions
  alternatives:
  - courses
  - departments
  lexicon: HALOT
  rationale: The noun denotes organized divisions or allotments within temple service.
    'Divisions' is clear modern English and fits the administrative context better
    than the more archaic 'courses.'
- source_word: הַשֹּׁעֲרִים
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  - the porters
  lexicon: HALOT
  rationale: Refers to those assigned to guard and manage the gates. 'Gatekeepers'
    is the most transparent modern rendering.
- source_word: לְרָאשֵׁי הַגְּבָרִים
  chosen: the chief men
  alternatives:
  - the heads of the men
  - the heads of the warriors
  - the leading men
  lexicon: HALOT
  rationale: The phrase is syntactically compressed. רָאשֵׁי means 'heads/chiefs,'
    and גְּבָרִים here likely means able or prominent men rather than specifically
    warriors. 'Chief men' preserves the leadership sense without overinterpreting
    militarily.
- source_word: מִשְׁמָרוֹת
  chosen: had assigned duties
  alternatives:
  - were divisions of duty
  - were guard-posts
  - were watches
  lexicon: HALOT
  rationale: 'The noun often denotes watches, duties, or service assignments. Because
    the Hebrew here is elliptical, an explicit English verbal idea helps convey the
    sense: these chief men had service assignments. ''Had assigned duties'' captures
    the administrative function in readable English.'
- source_word: לְעֻמַּת
  chosen: corresponding to
  alternatives:
  - alongside
  - opposite
  - in relation to
  lexicon: HALOT
  rationale: The preposition indicates correspondence or parallel relation. 'Corresponding
    to' best expresses that their duties matched or stood in relation to those of
    their brothers.
- source_word: אֲחֵיהֶם
  chosen: their brothers
  alternatives:
  - their kinsmen
  - their fellow Levites
  lexicon: HALOT
  rationale: The Hebrew literally says 'their brothers.' In this temple-service context
    it refers to fellow members of the broader Levitical community, but the literal
    familial term should be preserved in the main text.
- source_word: לְשָׁרֵת
  chosen: to minister
  alternatives:
  - to serve
  lexicon: HALOT
  rationale: In cultic/temple contexts, שׁרת often carries the sense of ministering
    in sacred service. 'Minister' preserves that temple-service nuance better than
    the broader 'serve.'
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת יְהוָה is literally 'house of YHWH.' Following the doctrinal guideline,
    יְהוָה is rendered 'the LORD.' 'House of the LORD' preserves the Hebrew expression,
    while readers can infer temple reference from context.
