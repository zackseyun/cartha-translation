id: 1CH.26.17
reference: 1 Chronicles 26:17
source:
  edition: WLC
  text: לַ/מִּזְרָח֮ הַ/לְוִיִּ֣ם שִׁשָּׁה֒ לַ/צָּפ֤וֹנָ/ה לַ/יּוֹם֙ אַרְבָּעָ֔ה לַ/נֶּ֥גְבָּ/ה
    לַ/יּ֖וֹם אַרְבָּעָ֑ה וְ/לָ/אֲסֻפִּ֖ים שְׁנַ֥יִם שְׁנָֽיִם׃
translation:
  text: On the east were six Levites; on the north, four a day; on the south, four
    a day; and at the storehouses, two by two.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Asuppim; the term may refer to a specific place-name or chamber complex
      rather than storehouses in a general sense.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמִּזְרָח
  chosen: on the east
  alternatives:
  - to the east
  - at the east side
  lexicon: HALOT
  rationale: Directional noun with prefixed preposition indicates location/assignment
    by side or direction. 'On the east' is natural English in a list of gate assignments.
- source_word: הַלְוִיִּם
  chosen: Levites
  alternatives:
  - the Levites
  lexicon: HALOT
  rationale: Refers to the Levitical gatekeepers/guards in context. English omits
    the article for smoother style while preserving the group identity.
- source_word: שִׁשָּׁה
  chosen: six
  lexicon: HALOT
  rationale: Cardinal number giving the count assigned on the east side.
- source_word: לַצָּפוֹנָה
  chosen: on the north
  alternatives:
  - to the north
  - on the north side
  lexicon: HALOT
  rationale: Directional expression parallel to east and south; rendered locatively
    in idiomatic English.
- source_word: לַיּוֹם
  chosen: a day
  alternatives:
  - per day
  - daily
  lexicon: HALOT
  rationale: In administrative counting context, the phrase indicates the number assigned
    each day. 'A day' preserves the distributive sense in readable English.
- source_word: אַרְבָּעָה
  chosen: four
  lexicon: HALOT
  rationale: Cardinal number for the north and south assignments.
- source_word: לַנֶּגְבָּה
  chosen: on the south
  alternatives:
  - to the south
  - on the south side
  lexicon: HALOT
  rationale: Directional term rendered in parallel with the other sides.
- source_word: וְלָאֲסֻפִּים
  chosen: at the storehouses
  alternatives:
  - at the Asuppim
  - at the collections
  - at the store rooms
  lexicon: HALOT
  rationale: The noun likely denotes storehouses/store rooms or a place of gathering/storage
    in the temple complex. Because the common noun sense is more transparent than
    a transliteration here, 'storehouses' best serves optimal equivalence. The transliterated
    place-name-like option is preserved in a footnote because the exact referent is
    debated.
- source_word: שְׁנַיִם שְׁנָיִם
  chosen: two by two
  alternatives:
  - two and two
  - two each
  lexicon: HALOT
  rationale: Repetition of the numeral is distributive, indicating paired assignment.
    'Two by two' is the clearest idiomatic rendering.
