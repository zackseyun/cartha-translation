id: 1CH.26.7
reference: 1 Chronicles 26:7
source:
  edition: WLC
  text: בְּנֵ֣י שְׁמַֽעְיָ֗ה עָ֠תְנִי וּ/רְפָאֵ֨ל וְ/עוֹבֵ֧ד אֶלְזָבָ֛ד אֶחָ֖י/ו בְּנֵי
    חָ֑יִל אֱלִיה֖וּ וּ/סְמַכְיָֽהוּ־׃
translation:
  text: 'The sons of Shemaiah: Othni, Rephael, Obed, Elzabad, his brothers, capable
    men, Elihu and Semakiah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'men of valor' or 'able men.' The Hebrew phrase can denote strength,
      valor, or competence; here it likely emphasizes capability for service.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי שְׁמַעְיָה
  chosen: The sons of Shemaiah
  alternatives:
  - Shemaiah's sons
  lexicon: HALOT
  rationale: Construct chain indicating filial relationship. 'The sons of Shemaiah'
    is slightly more formal and fits the genealogical/list style of the passage.
- source_word: עָתְנִי
  chosen: Othni
  alternatives:
  - Othnî
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy to transliterate names rather than translate them.
- source_word: וּרְפָאֵל
  chosen: Rephael
  alternatives:
  - Raphael
  rationale: Personal name transliterated directly from Hebrew. 'Raphael' is a familiar
    traditional form, but 'Rephael' more closely reflects the Hebrew vocalization
    here.
- source_word: וְעוֹבֵד
  chosen: Obed
  rationale: Personal name transliterated in standard English biblical form.
- source_word: אֶלְזָבָד
  chosen: Elzabad
  rationale: Personal name transliterated in standard English biblical form.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - their brothers
  lexicon: HALOT
  rationale: The Hebrew form is singular construct with 3ms suffix, literally 'his
    brothers.' In context it most naturally refers back to Elzabad as the nearest
    antecedent, while also functioning appositionally within the list. The singular
    suffix should be preserved rather than smoothed to 'their' without necessity.
- source_word: בְּנֵי חָיִל
  chosen: capable men
  alternatives:
  - men of valor
  - worthy men
  - able men
  lexicon: HALOT
  rationale: חַיִל in this context denotes strength, competence, or valor. Since this
    is a temple gatekeeper genealogy rather than a battle scene, 'capable men' best
    conveys proven competence without importing specifically military overtones.
- source_word: אֱלִיהוּ
  chosen: Elihu
  alternatives:
  - Eliyahu
  rationale: Personal name transliterated in standard English biblical form.
- source_word: וּסְמַכְיָהוּ
  chosen: Semakiah
  alternatives:
  - Semachiah
  - Semaiah
  rationale: Personal name transliterated from the Hebrew consonantal/vocalized form;
    'Semakiah' is a clear English representation of the Masoretic form.
