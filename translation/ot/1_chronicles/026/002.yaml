id: 1CH.26.2
reference: 1 Chronicles 26:2
source:
  edition: WLC
  text: וְ/לִ/מְשֶֽׁלֶמְיָ֖הוּ בָּנִ֑ים זְכַרְיָ֤הוּ הַ/בְּכוֹר֙ יְדִֽיעֲאֵ֣ל הַ/שֵּׁנִ֔י
    זְבַדְיָ֨הוּ֙ הַ/שְּׁלִישִׁ֔י יַתְנִיאֵ֖ל הָ/רְבִיעִֽי׃
translation:
  text: 'And Shelemiah had sons: Zechariah the firstborn, Jediael the second, Zebadiah
    the third, and Jathniel the fourth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And to Shelemiah, sons,'' a genealogical construction meaning
      ''And Shelemiah had sons.'''
    reason: cultural_note
  - marker: b
    text: Or 'Yathniel,' reflecting the initial Hebrew consonant more directly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִמְשֶׁלֶמְיָהוּ
  chosen: And Shelemiah
  alternatives:
  - Now to Shelemiah
  - And to Shelemiah
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition literally read 'and/to Shelemiah.'
    In this genealogical listing, English idiom is best served by rendering the dative
    construction as the possessive/existential 'Shelemiah had,' while retaining the
    connective 'And' to link with the preceding context.
- source_word: בָּנִים
  chosen: had sons
  alternatives:
  - sons
  - children
  lexicon: HALOT
  rationale: בָּנִים means 'sons.' Because the Hebrew clause is verbless ('to Shelemiah,
    sons'), idiomatic English supplies 'had.' 'Sons' is retained rather than 'children'
    because the source is specifically masculine and lists male descendants.
- source_word: זְכַרְיָהוּ
  chosen: Zechariah
  rationale: Standard English transliteration of the personal name.
- source_word: הַבְּכוֹר
  chosen: the firstborn
  alternatives:
  - the eldest
  - the first
  lexicon: HALOT
  rationale: בְּכוֹר specifically denotes the firstborn son, not merely the oldest
    in a loose sense. 'Firstborn' preserves the lexical and familial nuance.
- source_word: יְדִיעֲאֵל
  chosen: Jediael
  rationale: Standard English transliteration of the personal name.
- source_word: הַשֵּׁנִי
  chosen: the second
  lexicon: HALOT
  rationale: Ordinal adjective rendered directly and consistently.
- source_word: זְבַדְיָהוּ
  chosen: Zebadiah
  rationale: Standard English transliteration of the personal name.
- source_word: הַשְּׁלִישִׁי
  chosen: the third
  lexicon: HALOT
  rationale: Ordinal adjective rendered directly and consistently.
- source_word: יַתְנִיאֵל
  chosen: Jathniel
  alternatives:
  - Yathniel
  rationale: A standard English transliteration is 'Jathniel,' using conventional
    English 'J' for initial yod in many biblical names. An alternative more closely
    reflecting the Hebrew consonant is possible, but 'Jathniel' is more natural in
    English Bible style.
- source_word: הָרְבִיעִי
  chosen: the fourth
  lexicon: HALOT
  rationale: Ordinal adjective rendered directly and consistently.
