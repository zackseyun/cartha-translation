id: 1CH.3.24
reference: 1 Chronicles 3:24
source:
  edition: WLC
  text: וּ/בְנֵ֣י אֶלְיוֹעֵינַ֗י הדיוהו וְ/אֶלְיָשִׁ֡יב וּ/פְלָיָ֡ה וְ֠/עַקּוּב וְ/יוֹחָנָ֧ן
    וּ/דְלָיָ֛ה וַ/עֲנָ֖נִי שִׁבְעָֽה׃ס
translation:
  text: 'And the sons of Elyoenai: Hodaviah, Eliashib, Pelaiah, Akkub, Johanan, Delaiah,
    and Anani—seven.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew spelling of the first listed name is unusual. 'Hodaviah' follows
      the most likely conventional identification; possible alternatives include 'Hodiah'
      or a more phonetic transliteration such as 'Hodevahu.'
    reason: textual_variant
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons.' In genealogical contexts, 'sons
    of' is the standard and most precise rendering, even when it can denote descendants
    more broadly. The prefixed conjunction is rendered 'And' to preserve the list-like
    continuity of the genealogy.
- source_word: אֶלְיוֹעֵינַי
  chosen: Elyoenai
  alternatives:
  - Elioenai
  lexicon: HALOT
  rationale: This is a personal name and is therefore transliterated rather than translated,
    following project policy. 'Elyoenai' closely reflects the Hebrew vocalization
    in the provided text; 'Elioenai' is a common English conventional form but is
    not adopted in the main text.
- source_word: הדיוהו
  chosen: Hodaviah
  alternatives:
  - Hodiah
  - Hodevahu
  lexicon: HALOT
  rationale: The consonantal form here is unusual, but the traditional identification
    is a proper name commonly rendered 'Hodaviah.' Because this is a name in a genealogy,
    a stable conventional transliteration is preferable to an overly speculative phonetic
    reconstruction. An alternative is worth preserving due to the orthographic difficulty.
- source_word: וְאֶלְיָשִׁיב
  chosen: Eliashib
  lexicon: HALOT
  rationale: Proper name; standard transliteration from the Hebrew form.
- source_word: וּפְלָיָה
  chosen: Pelaiah
  alternatives:
  - Pelaia
  lexicon: HALOT
  rationale: Proper name; 'Pelaiah' is the standard English transliteration for this
    Hebrew name ending in -yāh.
- source_word: וְעַקּוּב
  chosen: Akkub
  alternatives:
  - Accub
  lexicon: HALOT
  rationale: Proper name; 'Akkub' more directly reflects the doubled qoph/k sound
    in Hebrew, though 'Accub' appears in some English traditions.
- source_word: וְיוֹחָנָן
  chosen: Johanan
  alternatives:
  - Jehohanan
  lexicon: HALOT
  rationale: Proper name; 'Johanan' is the conventional transliteration of this form
    and distinguishes it from longer theophoric variants.
- source_word: וּדְלָיָה
  chosen: Delaiah
  alternatives:
  - Delaia
  lexicon: HALOT
  rationale: Proper name; standard English transliteration.
- source_word: וַעֲנָנִי
  chosen: and Anani
  lexicon: HALOT
  rationale: Proper name with prefixed conjunction. The conjunction is rendered naturally
    before the final item in the list.
- source_word: שִׁבְעָה
  chosen: seven
  lexicon: HALOT
  rationale: Cardinal number summarizing the total number of sons listed. It is retained
    explicitly because it is present in the Hebrew and serves as a genealogical tally.
