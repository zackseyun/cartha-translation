id: 1CH.3.11
reference: 1 Chronicles 3:11
source:
  edition: WLC
  text: יוֹרָ֥ם בְּנ֛/וֹ אֲחַזְיָ֥הוּ בְנ֖/וֹ יוֹאָ֥שׁ בְּנֽ/וֹ׃
translation:
  text: Joram his son, Ahaziah his son, Joash his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'son' can in genealogies sometimes refer to a later descendant, but
      here it is rendered 'son' because the verse presents a royal succession list
      in concise form.
    reason: lexical_alternative
  - marker: b
    text: Joram is also called Jehoram in some English translations.
    reason: alternative_reading
  - marker: c
    text: Joash is also called Jehoash in some English translations.
    reason: alternative_reading
lexical_decisions:
- source_word: יוֹרָם
  chosen: Joram
  alternatives:
  - Jehoram
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention. 'Joram' is
    a common English form for יוֹרָם, while 'Jehoram' is an alternative fuller form
    used elsewhere for the same Hebrew name.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - his descendant
  lexicon: HALOT
  rationale: The construct noun בן with 3ms suffix most directly means 'his son.'
    In genealogical contexts it can sometimes denote a more remote descendant, but
    the text presents a succession formula, so the straightforward rendering is retained.
- source_word: אֲחַזְיָהוּ
  chosen: Ahaziah
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English biblical usage.
- source_word: יוֹאָשׁ
  chosen: Joash
  alternatives:
  - Jehoash
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention. 'Joash' is
    the usual English form; 'Jehoash' is a recognized alternative form of the same
    name.
