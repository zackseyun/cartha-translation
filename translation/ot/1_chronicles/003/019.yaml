id: 1CH.3.19
reference: 1 Chronicles 3:19
source:
  edition: WLC
  text: וּ/בְנֵ֣י פְדָיָ֔ה זְרֻבָּבֶ֖ל וְ/שִׁמְעִ֑י וּ/בֶן זְרֻבָּבֶל֙ מְשֻׁלָּ֣ם
    וַ/חֲנַנְיָ֔ה וּ/שְׁלֹמִ֖ית אֲחוֹתָֽ/ם־׃
translation:
  text: 'The sons of Pedaiah: Zerubbabel and Shimei. And the sons of Zerubbabel: Meshullam
    and Hananiah; and Shelomith was their sister.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads singular 'the son of Zerubbabel.' Because the verse then names
      Meshullam and Hananiah, many understand this as a textual irregularity or as
      genealogical usage functioning collectively; hence 'the sons of Zerubbabel'
      in the main text.
    reason: textual_variant
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - The descendants of
  lexicon: HALOT
  rationale: בנים in a genealogy most naturally means literal 'sons' unless context
    clearly broadens it. The prefixed conjunction is not always best represented by
    initial 'and' in English after a heading-like genealogical transition, so 'The
    sons of' gives clear, natural English while preserving the genealogical sense.
- source_word: פְדָיָה
  chosen: Pedaiah
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: זְרֻבָּבֶל
  chosen: Zerubbabel
  rationale: Personal name transliterated by standard convention.
- source_word: וְשִׁמְעִי
  chosen: and Shimei
  rationale: Simple coordination of the second named son of Pedaiah; the conjunction
    is retained because it naturally links the two names in English.
- source_word: וּבֶן זְרֻבָּבֶל
  chosen: And the sons of Zerubbabel
  alternatives:
  - And the son of Zerubbabel
  - And Zerubbabel's son
  lexicon: HALOT
  rationale: The consonantal text has singular בֶן ('son'), but the following list
    contains two male names plus a sister, and many interpreters understand the singular
    as a textual irregularity or collective/genealogical usage. For coherent English
    reflecting the apparent sense of the verse, 'the sons of Zerubbabel' is adopted
    in the main text, while the singular reading is preserved in a footnote as a textual/lexical
    alternative.
- source_word: מְשֻׁלָּם
  chosen: Meshullam
  rationale: Personal name transliterated by standard convention.
- source_word: וַחֲנַנְיָה
  chosen: and Hananiah
  rationale: Coordinated second male descendant in Zerubbabel's line; rendered with
    simple English conjunction.
- source_word: וּשְׁלֹמִית
  chosen: and Shelomith
  rationale: Personal name transliterated by standard convention.
- source_word: אֲחוֹתָם
  chosen: was their sister
  alternatives:
  - their sister
  - the sister of them
  lexicon: HALOT
  rationale: The suffix is plural ('their'), referring most naturally to Meshullam
    and Hananiah. Supplying 'was' yields idiomatic English in a verbless Hebrew genealogical
    clause while preserving the familial relationship.
