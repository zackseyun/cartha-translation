theological_decisions:
- issue: Whether אַסִּר should be translated as a common noun ('the captive/prisoner')
    or retained as a proper name in the genealogy
  chosen_reading: Retain as the proper name 'Assir' in the main text
  alternative_readings:
  - 'And the sons of Jeconiah the captive: Shealtiel his son.'
  rationale: The Hebrew consonants permit either a proper name or an appellative description.
    In this genealogical context, the Masoretic pointing and list-like structure support
    reading it as a name. Because the alternative has interpretive and historical
    significance and is reflected in some translations, it is preserved in a footnote
    rather than resolved silently.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it; preserve genuine ambiguity in a footnote.'
