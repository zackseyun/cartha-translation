id: 1CH.3.17
reference: 1 Chronicles 3:17
source:
  edition: WLC
  text: וּ/בְנֵי֙ יְכָנְיָ֣ה אַסִּ֔ר שְׁאַלְתִּיאֵ֖ל בְּנֽ/וֹ׃
translation:
  text: 'And the sons of Jeconiah: Assir, Shealtiel his son.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''And the sons of Jeconiah the captive: Shealtiel his son.'' The Hebrew
      אַסִּר can be read either as the proper name Assir or as the common noun ''captive/prisoner.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: The conjunction ו is carried as 'And' to preserve the genealogical sequence,
    and בְנֵי is rendered 'sons of' in its standard genealogical sense.
- source_word: יְכָנְיָה
  chosen: Jeconiah
  alternatives:
  - Jechoniah
  - Coniah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention. 'Jeconiah'
    is the common full form corresponding to the Hebrew name here.
- source_word: אַסִּר
  chosen: Assir
  alternatives:
  - prisoner
  - captive
  lexicon: HALOT
  rationale: Although the form is identical to a common noun meaning 'prisoner/captive,'
    in this genealogical list it is most naturally taken as a personal name in apposition
    within the list of descendants. Rendering it as a name best fits the syntax of
    the verse as transmitted.
- source_word: שְׁאַלְתִּיאֵל
  chosen: Shealtiel
  alternatives:
  - Salathiel
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention from the
    Hebrew form.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - son of him
  - his descendant
  lexicon: HALOT
  rationale: The suffix marks possession, and 'his son' is the natural English rendering
    in a genealogy. It most directly refers back to Jeconiah in the line as presented.
