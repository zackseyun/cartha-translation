id: 1CH.3.15
reference: 1 Chronicles 3:15
source:
  edition: WLC
  text: וּ/בְנֵי֙ יֹאשִׁיָּ֔הוּ הַ/בְּכוֹר֙ יוֹחָנָ֔ן הַ/שֵּׁנִ֖י יְהוֹיָקִ֑ים הַ/שְּׁלִשִׁי֙
    צִדְקִיָּ֔הוּ הָ/רְבִיעִ֖י שַׁלּֽוּם׃
translation:
  text: 'And the sons of Josiah: the firstborn, Johanan; the second, Jehoiakim; the
    third, Zedekiah; the fourth, Shallum.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Shallum is commonly identified with Jehoahaz in 2 Kings 23:30–34 and Jeremiah
      22:11; the Chronicler here preserves the name Shallum in Josiah’s genealogy.
    reason: cross_reference
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: The conjunction ו is carried as "And" to preserve the genealogical flow,
    and בְנֵי is rendered "sons of" in its standard genealogical sense rather than
    a broader "descendants," since four immediate sons are then listed.
- source_word: יֹאשִׁיָּהוּ
  chosen: Josiah
  rationale: Standard English transliteration of the personal name; names are transliterated
    rather than translated per project philosophy.
- source_word: הַבְּכוֹר
  chosen: the firstborn
  alternatives:
  - the eldest
  - the first
  lexicon: HALOT
  rationale: בכור denotes birth order and status as firstborn. "The firstborn" is
    the most direct and genealogically precise rendering.
- source_word: יוֹחָנָן
  chosen: Johanan
  alternatives:
  - Jehohanan
  rationale: Standard transliteration of the Hebrew name. "Johanan" is the conventional
    English form for this spelling.
- source_word: הַשֵּׁנִי
  chosen: the second
  lexicon: HALOT
  rationale: Ordinal adjective rendered straightforwardly to preserve the sequence
    of sons.
- source_word: יְהוֹיָקִים
  chosen: Jehoiakim
  alternatives:
  - Eliakim
  rationale: The Hebrew form here is Jehoiakim, not Eliakim; the transliteration follows
    the form present in the text.
- source_word: הַשְּׁלִשִׁי
  chosen: the third
  lexicon: HALOT
  rationale: Ordinal adjective rendered directly and consistently with the surrounding
    sequence.
- source_word: צִדְקִיָּהוּ
  chosen: Zedekiah
  alternatives:
  - Ṣidqiyyahu
  rationale: Standard English transliteration of the royal name; "Zedekiah" is the
    established conventional form.
- source_word: הָרְבִיעִי
  chosen: the fourth
  lexicon: HALOT
  rationale: Ordinal adjective rendered directly and consistently with the list structure.
- source_word: שַׁלּוּם
  chosen: Shallum
  rationale: Standard transliteration of the personal name in the Hebrew text.
