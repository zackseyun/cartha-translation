theological_decisions:
- issue: Genealogical ordering versus regnal prominence
  chosen_reading: Render the verse as a simple list of Josiah's sons in birth-order
    labels as given in the Hebrew text, without harmonizing to the better-known succession
    narratives.
  alternative_readings:
  - Reorder or annotate the names in the main text to match the order of kings who
    reigned after Josiah
  rationale: The verse itself presents a genealogical list with ordinals attached
    to each son. Translation should preserve the source presentation rather than importing
    historical harmonization into the main text. Any tension with Kings/Jeremiah is
    better handled in a footnote, not by altering the translation.
  doctrine_reference: Translation philosophy §1, §3, §5
