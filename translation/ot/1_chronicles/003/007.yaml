id: 1CH.3.7
reference: 1 Chronicles 3:7
source:
  edition: WLC
  text: וְ/נֹ֥גַהּ וְ/נֶ֖פֶג וְ/יָפִֽיעַ׃
translation:
  text: Nogah, Nepheg, and Japhia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew personal names transliterated: ''Nogah'' may also be rendered ''Noga,''
      and ''Japhia'' may also be rendered ''Yaphia.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹגַהּ
  chosen: Nogah
  alternatives:
  - Noga
  lexicon: HALOT
  rationale: Proper personal name in a genealogical list; per translation philosophy,
    personal names are transliterated rather than translated. The final הּ is represented
    with standard English transliteration as 'h.' An alternate simplified transliteration
    'Noga' exists in English usage.
- source_word: נֶפֶג
  chosen: Nepheg
  lexicon: HALOT
  rationale: Proper personal name; transliterated directly into standard English form
    used for Hebrew names in genealogies. No translation of meaning is warranted in
    context.
- source_word: יָפִיעַ
  chosen: Japhia
  alternatives:
  - Yaphia
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated. 'Japhia'
    follows conventional English representation of initial yod in many biblical names,
    while 'Yaphia' is a more phonetic alternative.
- source_word: וְ
  chosen: and
  rationale: The prefixed conjunction links the names in a simple series. In English
    list style, the conjunction is rendered before the final item, with commas marking
    the sequence for readability.
