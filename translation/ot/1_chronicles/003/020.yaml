id: 1CH.3.20
reference: 1 Chronicles 3:20
source:
  edition: WLC
  text: וַ/חֲשֻׁבָ֡ה וָ֠/אֹהֶל וּ/בֶרֶכְיָ֧ה וַֽ/חֲסַדְיָ֛ה י֥וּשַׁב חֶ֖סֶד חָמֵֽשׁ׃
translation:
  text: and Hashubah, Ohel, Berekiah, Hasadiah, and Jushab-hesed—five.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew simply reads “five,” summarizing the five names just listed; English
      may supply “there were” for smoothness, but the text is elliptical.
    reason: lexical_alternative
  - marker: b
    text: The final name is written as two Hebrew elements, “Jushab Hesed,” but is
      best understood as a single compound personal name, here rendered “Jushab-hesed.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/חֲשֻׁבָה
  chosen: and Hashubah
  alternatives:
  - and Hashuba
  lexicon: HALOT
  rationale: Proper name with prefixed conjunction ו. Transliterated rather than translated,
    per project policy for personal names. English spelling 'Hashubah' reflects the
    Hebrew vocalization reasonably well.
- source_word: וָ/אֹהֶל
  chosen: Ohel
  alternatives:
  - Ohel
  lexicon: HALOT
  rationale: Proper name with prefixed conjunction. In English the conjunction is
    represented once in the list structure rather than repeated mechanically before
    every name. The name itself is transliterated, not translated as the common noun
    'tent,' because the form functions here as a personal name.
- source_word: וּ/בֶרֶכְיָה
  chosen: Berekiah
  alternatives:
  - Berechiah
  lexicon: HALOT
  rationale: Proper name with conjunction. 'Berekiah' is a standard transliteration
    from Hebrew; 'Berechiah' is a familiar alternative influenced by representing
    כ with 'ch.'
- source_word: וַֽ/חֲסַדְיָה
  chosen: Hasadiah
  alternatives:
  - Hasadya
  lexicon: HALOT
  rationale: Proper name with conjunction. Transliterated directly from Hebrew. The
    final יה element is represented with '-iah' in conventional English biblical name
    spelling.
- source_word: י֥וּשַׁב חֶ֖סֶד
  chosen: Jushab-hesed
  alternatives:
  - Jushabhesed
  - Josheb-hesed
  lexicon: HALOT
  rationale: This is a compound proper name written as two elements in Hebrew but
    functioning as one personal name. Hyphenation in English helps readers recognize
    it as a single name. Alternative spellings exist due to uncertainty in representing
    the initial vowel and the compound form.
- source_word: חָמֵשׁ
  chosen: five
  alternatives:
  - there were five
  lexicon: HALOT
  rationale: Cardinal number summarizing the preceding list. The Hebrew is elliptical,
    so concise English 'five' preserves the genealogical style. 'There were five'
    is smoother but adds words not explicit in the text.
