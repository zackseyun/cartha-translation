id: 1CH.3.23
reference: 1 Chronicles 3:23
source:
  edition: WLC
  text: וּ/בֶן נְעַרְיָ֗ה אֶלְיוֹעֵינַ֧י וְ/חִזְקִיָּ֛ה וְ/עַזְרִיקָ֖ם שְׁלֹשָֽׁה־׃
translation:
  text: 'The sons of Neariah: Elioenai, Hezekiah, and Azrikam—three.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has 'son of Neariah,' but in this genealogical context it functions
      as a heading for multiple descendants; hence 'sons of Neariah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֶן
  chosen: The sons of
  alternatives:
  - And the son of
  - The son of
  lexicon: HALOT
  rationale: Although the consonantal form is singular ('and/son of'), in this genealogical
    context the sense is collective, introducing the list of Neariah's offspring.
    The following three proper names and the concluding 'three' support rendering
    the phrase idiomatically as a plural heading in English. This also aligns with
    the common genealogical usage in Chronicles where singular בן can function as
    a family-list introducer.
- source_word: נְעַרְיָה
  chosen: Neariah
  rationale: Proper personal name; transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: אֶלְיוֹעֵינַי
  chosen: Elioenai
  alternatives:
  - Elihoenai
  rationale: Proper personal name; standard English transliteration is retained. Minor
    spelling variation is possible in English representation, but 'Elioenai' is the
    conventional form.
- source_word: וְחִזְקִיָּה
  chosen: Hezekiah
  alternatives:
  - Hizkiah
  - Hizkijah
  rationale: Proper personal name; rendered by the standard English transliteration
    'Hezekiah,' which is familiar and accurately reflects the Hebrew name.
- source_word: וְעַזְרִיקָם
  chosen: and Azrikam
  alternatives:
  - and Azrikam
  rationale: Proper personal name with conjunction; transliterated in standard English
    form.
- source_word: שְׁלֹשָׁה
  chosen: three
  lexicon: HALOT
  rationale: Cardinal number summarizing the total number of sons listed. Retained
    explicitly because it is present in the Hebrew and is typical of genealogical
    style.
