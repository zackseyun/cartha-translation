id: 1CH.3.22
reference: 1 Chronicles 3:22
source:
  edition: WLC
  text: וּ/בְנֵ֥י שְׁכַנְיָ֖ה שְׁמַעְיָ֑ה וּ/בְנֵ֣י שְׁמַעְיָ֗ה חַטּ֡וּשׁ וְ֠/יִגְאָל
    וּ/בָרִ֧יחַ וּ/נְעַרְיָ֛ה וְ/שָׁפָ֖ט שִׁשָּֽׁה׃
translation:
  text: 'And the sons of Shecaniah: Shemaiah. And the sons of Shemaiah: Hattush, Igal,
    Bariah, Neariah, and Shaphat—six.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew text says 'six,' though only five names are listed here in the
      Masoretic Text. This may reflect a textual issue or an omitted name in transmission.
    reason: textual_variant
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the descendants of
  - Now the sons of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons.' In genealogical contexts it
    can sometimes broaden to 'descendants,' but here the verse immediately lists named
    offspring in a lineage formula, so 'sons of' is the most direct and auditable
    rendering.
- source_word: שְׁכַנְיָה
  chosen: Shecaniah
  alternatives:
  - Shekaniah
  lexicon: HALOT
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated. 'Shecaniah' is a standard English transliteration.
- source_word: שְׁמַעְיָה
  chosen: Shemaiah
  lexicon: HALOT
  rationale: Personal name; transliterated consistently in English.
- source_word: וּבְנֵי שְׁמַעְיָה
  chosen: And the sons of Shemaiah
  alternatives:
  - And Shemaiah's sons
  lexicon: HALOT
  rationale: Retains the genealogical formula and mirrors the Hebrew structure. The
    fuller phrasing is slightly more formal but clearer for lineage lists.
- source_word: חַטּוּשׁ
  chosen: Hattush
  lexicon: HALOT
  rationale: Personal name; standard transliteration.
- source_word: יִגְאָל
  chosen: Igal
  alternatives:
  - Jigal
  - Yigal
  lexicon: HALOT
  rationale: Personal name. The consonantal form permits transliteration with initial
    y/j sound, but 'Igal' is a conventional English form in many Bible translations
    and reads naturally.
- source_word: בָרִיחַ
  chosen: Bariah
  alternatives:
  - Bariah
  - Beriah
  lexicon: HALOT
  rationale: The MT here reads בָרִיחַ, best represented as 'Bariah.' 'Beriah' would
    reflect a different, more familiar biblical name and should not be imported against
    the present consonantal text.
- source_word: נְעַרְיָה
  chosen: Neariah
  alternatives:
  - Neariah
  lexicon: HALOT
  rationale: Personal name; transliterated in a standard English form.
- source_word: שָׁפָט
  chosen: Shaphat
  alternatives:
  - Shephat
  lexicon: HALOT
  rationale: Personal name; standard transliteration.
- source_word: שִׁשָּׁה
  chosen: six
  lexicon: HALOT
  rationale: Cardinal number. It is rendered directly as 'six,' even though only five
    names are listed in the Masoretic Text; the translation should preserve the source
    text rather than harmonize it silently.
