id: 1CH.3.2
reference: 1 Chronicles 3:2
source:
  edition: WLC
  text: הַ/שְּׁלִשִׁי֙ לְ/אַבְשָׁל֣וֹם בֶּֽן מַעֲכָ֔ה בַּת תַּלְמַ֖י מֶ֣לֶךְ גְּשׁ֑וּר
    הָ/רְבִיעִ֖י אֲדֹנִיָּ֥ה בֶן חַגִּֽית־־־׃
translation:
  text: the third, Absalom son of Maacah daughter of Talmai king of Geshur; the fourth,
    Adonijah son of Haggith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'granddaughter of Talmai,' since 'daughter' can sometimes denote
      a more remote female descendant in genealogical contexts; the Hebrew here most
      directly reads 'daughter of Talmai king of Geshur.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ/שְּׁלִשִׁי
  chosen: the third
  alternatives:
  - third
  lexicon: HALOT
  rationale: Ordinal with article functioning in a list of David's sons; English naturally
    supplies 'the third' to match the enumerative structure carried over from the
    previous verse.
- source_word: לְ/אַבְשָׁלוֹם
  chosen: Absalom
  lexicon: HALOT
  rationale: Proper name transliterated according to the project's policy to transliterate
    personal names rather than translate them.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - was the son of
  lexicon: HALOT
  rationale: Construct relationship indicating parentage. 'Son of' is the concise
    genealogical English equivalent.
- source_word: מַעֲכָה
  chosen: Maacah
  lexicon: HALOT
  rationale: Proper name transliterated.
- source_word: בַּת
  chosen: daughter of
  alternatives:
  - granddaughter of
  lexicon: HALOT
  rationale: The plain lexical sense is 'daughter of.' Although genealogical usage
    can sometimes be broader, nothing in this verse requires departing from the direct
    sense.
- source_word: תַּלְמַי
  chosen: Talmai
  lexicon: HALOT
  rationale: Proper name transliterated.
- source_word: מֶלֶךְ גְּשׁוּר
  chosen: king of Geshur
  alternatives:
  - the king of Geshur
  lexicon: HALOT
  rationale: Construct chain identifying Talmai's royal status over Geshur. English
    omits the article naturally in apposition after the name.
- source_word: הָ/רְבִיעִי
  chosen: the fourth
  alternatives:
  - fourth
  lexicon: HALOT
  rationale: Ordinal with article continuing the list structure.
- source_word: אֲדֹנִיָּה
  chosen: Adonijah
  lexicon: HALOT
  rationale: Proper name transliterated.
- source_word: חַגִּית
  chosen: Haggith
  lexicon: HALOT
  rationale: Proper name transliterated.
