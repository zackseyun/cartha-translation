id: 1CH.3.5
reference: 1 Chronicles 3:5
source:
  edition: WLC
  text: וְ/אֵ֥לֶּה נוּלְּדוּ ל֖/וֹ בִּ/ירוּשָׁלָ֑יִם שִׁ֠מְעָא וְ/שׁוֹבָ֞ב וְ/נָתָ֤ן
    וּ/שְׁלֹמֹה֙ אַרְבָּעָ֔ה לְ/בַת שׁ֖וּעַ בַּת עַמִּיאֵֽל־־־׃
translation:
  text: 'These were born to him in Jerusalem: Shimea, Shobab, Nathan, and Solomon—four
    by Bath-shua daughter of Ammiel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: In 2 Samuel 5:14 and related parallels, she is called Bathsheba, daughter
      of Eliam.
    reason: alternative_reading
  - marker: b
    text: Hebrew Shimea; the parallel in 2 Samuel 5:14 has Shammua.
    reason: textual_variant
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: These
  alternatives:
  - Now these
  - And these
  lexicon: HALOT
  rationale: Introduces the next subset in the genealogy. Simple 'These' is natural
    modern English while preserving the demonstrative force.
- source_word: נוּלְּדוּ לוֹ
  chosen: were born to him
  alternatives:
  - were born to David
  - he fathered
  lexicon: HALOT
  rationale: The Niphal of ילד here is passive ('were born'), and the pronominal suffix
    refers back to David from context. 'Were born to him' preserves the Hebrew syntax
    without over-specifying in the main clause.
- source_word: בִּירוּשָׁלָיִם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative phrase indicating the place of birth.
- source_word: שִׁמְעָא
  chosen: Shimea
  alternatives:
  - Shammua
  lexicon: HALOT
  rationale: The Chronicler's form here is שִׁמְעָא, best represented as 'Shimea.'
    An alternative traditional harmonization with the Samuel parallel ('Shammua')
    should not replace the form actually present here.
- source_word: שׁוֹבָב
  chosen: Shobab
  lexicon: HALOT
  rationale: Standard transliteration of the proper name.
- source_word: נָתָן
  chosen: Nathan
  lexicon: HALOT
  rationale: Standard transliteration of the proper name.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  alternatives:
  - Shelomoh
  lexicon: HALOT
  rationale: Uses the conventional English form for the well-known royal name, consistent
    with standard Bible English and readability.
- source_word: אַרְבָּעָה
  chosen: four
  lexicon: HALOT
  rationale: Summative numeral referring to the four sons just listed.
- source_word: לְבַת שׁוּעַ
  chosen: by Bath-shua
  alternatives:
  - to Bath-shua
  - from Bath-shua
  lexicon: HALOT
  rationale: In genealogical English, 'by Bath-shua' idiomatically conveys maternity/source
    of birth. It is concise and matches the function of the Hebrew preposition in
    this context.
- source_word: בַּת עַמִּיאֵל
  chosen: daughter of Ammiel
  lexicon: HALOT
  rationale: Standard filial expression. The Chronicler identifies her by her father
    here.
