theological_decisions:
- issue: Name form of David's wife in Chronicles versus Samuel parallel
  chosen_reading: Bath-shua daughter of Ammiel
  alternative_readings:
  - Bathsheba daughter of Eliam
  rationale: The Hebrew text of Chronicles reads 'Bath-shua daughter of Ammiel.' The
    translation follows the form in the source text rather than harmonizing to the
    Samuel parallel. The alternative is preserved in a footnote because readers may
    recognize the parallel identification.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
