id: 1CH.3.1
reference: 1 Chronicles 3:1
source:
  edition: WLC
  text: וְ/אֵ֤לֶּה הָיוּ֙ בְּנֵ֣י דָויִ֔ד אֲשֶׁ֥ר נֽוֹלַד ל֖/וֹ בְּ/חֶבְר֑וֹן הַ/בְּכ֣וֹר
    אַמְנֹ֗ן לַ/אֲחִינֹ֨עַם֙ הַ/יִּזְרְעֵאלִ֔ית שֵׁנִי֙ דָּנִיֵּ֔אל לַ/אֲבִיגַ֖יִל
    הַֽ/כַּרְמְלִֽית־׀׃
translation:
  text: 'Now these were David’s sons who were born to him in Hebron: the firstborn,
    Amnon, by Ahinoam the Jezreelite; the second, Daniel, by Abigail the Carmelite.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: In the parallel list at 2 Samuel 3:3, this son is called Chileab rather
      than Daniel.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: Now these
  alternatives:
  - And these
  - These
  lexicon: HALOT
  rationale: Introduces a new section while maintaining narrative continuity. 'Now
    these' is natural modern English and preserves the demonstrative force better
    than a bare 'These'.
- source_word: הָיוּ
  chosen: were
  alternatives:
  - are
  lexicon: HALOT
  rationale: Qal perfect plural of היה in a past genealogical notice is best rendered
    as simple past, 'were'.
- source_word: בְּנֵי דָוִיד
  chosen: David’s sons
  alternatives:
  - the sons of David
  - David’s children
  lexicon: HALOT
  rationale: Construct phrase literally means 'sons of David.' 'David’s sons' is idiomatic
    English and preserves the male-specific reference required by the genealogy.
- source_word: אֲשֶׁר נוֹלַד לוֹ
  chosen: who were born to him
  alternatives:
  - who were born
  - whom he fathered
  lexicon: HALOT
  rationale: The relative clause with passive נולד plus לּוֹ indicates sons born to
    David. 'Who were born to him' preserves the passive form and the dative relation
    without over-interpreting as active begetting.
- source_word: בְּחֶבְרוֹן
  chosen: in Hebron
  alternatives:
  - at Hebron
  lexicon: HALOT
  rationale: Standard locative rendering for בְ with a city name.
- source_word: הַבְּכוֹר
  chosen: the firstborn
  alternatives:
  - the eldest
  lexicon: HALOT
  rationale: בכור is a status term, not merely age order. 'Firstborn' preserves the
    lexical and genealogical significance.
- source_word: אַמְנוֹן
  chosen: Amnon
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: לַאֲחִינֹעַם
  chosen: by Ahinoam
  alternatives:
  - to Ahinoam
  - from Ahinoam
  lexicon: HALOT
  rationale: In genealogical formulas, לְ before the mother's name indicates maternity.
    English 'by Ahinoam' is concise and idiomatic in birth notices.
- source_word: הַיִּזְרְעֵאלִית
  chosen: the Jezreelite
  alternatives:
  - the woman from Jezreel
  - the Jezreelitess
  lexicon: HALOT
  rationale: Gentilic feminine identifying Ahinoam's origin. 'The Jezreelite' is clear
    modern English; 'Jezreelitess' is archaic.
- source_word: שֵׁנִי
  chosen: the second
  alternatives:
  - second
  lexicon: HALOT
  rationale: Ordinal introducing the next son in the list. The article is supplied
    in English for smooth parallel structure with 'the firstborn.'
- source_word: דָּנִיֵּאל
  chosen: Daniel
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention. This is
    the Chronicler's form here, distinct from the parallel in 2 Samuel 3:3.
- source_word: לַאֲבִיגַיִל
  chosen: by Abigail
  alternatives:
  - to Abigail
  - from Abigail
  lexicon: HALOT
  rationale: Same genealogical use of לְ with the mother's name; 'by Abigail' is idiomatic
    and parallel to the previous clause.
- source_word: הַכַּרְמְלִית
  chosen: the Carmelite
  alternatives:
  - the woman from Carmel
  - the Carmelitess
  lexicon: HALOT
  rationale: Gentilic feminine identifying Abigail's origin. 'The Carmelite' is the
    natural modern rendering.
