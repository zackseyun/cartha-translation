theological_decisions:
- issue: Genealogical filial language in royal lineage
  chosen_reading: Retain the literal filial formula 'his son' throughout.
  alternative_readings:
  - Use 'descendant' to reflect possible telescoping in biblical genealogies.
  rationale: The Hebrew text explicitly repeats בְנוֹ ('his son'). While biblical
    genealogies may compress generations in some contexts, there is no doctrinal or
    contextual necessity here to generalize the wording. Preserving the literal formula
    maintains transparency to the source text and avoids interpretive expansion.
  doctrine_reference: Translation philosophy §1, §5
