id: 1CH.3.12
reference: 1 Chronicles 3:12
source:
  edition: WLC
  text: אֲמַצְיָ֧הוּ בְנ֛/וֹ עֲזַרְיָ֥ה בְנ֖/וֹ יוֹתָ֥ם בְּנֽ/וֹ׃
translation:
  text: Amaziah his son, Azariah his son, Jotham his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Azariah'; this king is also known elsewhere as Uzziah.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲמַצְיָהוּ
  chosen: Amaziah
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention rather
    than translated, in keeping with the project's policy to transliterate names.
- source_word: בְנוֹ
  chosen: his son
  alternatives:
  - his descendant
  lexicon: HALOT
  rationale: בן with 3ms suffix most directly means 'his son' in genealogical succession.
    Although genealogies can sometimes telescope generations and thus imply 'descendant,'
    the immediate form is singular filial language, so 'his son' is the most transparent
    rendering.
- source_word: עֲזַרְיָה
  chosen: Azariah
  alternatives:
  - Uzziah
  lexicon: HALOT
  rationale: The Hebrew form here is עֲזַרְיָה ('Azariah'), so the translation follows
    the source form directly. 'Uzziah' is a known alternate name/form for this king
    elsewhere, but using it here would import harmonization over the plain wording
    of the verse.
- source_word: בְנוֹ
  chosen: his son
  alternatives:
  - his descendant
  lexicon: HALOT
  rationale: Repeated genealogical term; rendered consistently as 'his son' for the
    same reason as the first occurrence.
- source_word: יוֹתָם
  chosen: Jotham
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: בְנוֹ
  chosen: his son
  alternatives:
  - his descendant
  lexicon: HALOT
  rationale: Repeated genealogical term; rendered consistently as 'his son' for the
    same reason as the previous occurrences.
