id: 1CH.3.8
reference: 1 Chronicles 3:8
source:
  edition: WLC
  text: וֶ/אֱלִישָׁמָ֧ע וְ/אֶלְיָדָ֛ע וֶ/אֱלִיפֶ֖לֶט תִּשְׁעָֽה׃
translation:
  text: Elishama, Eliada, and Eliphelet—nine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, these names complete a total of nine sons listed in verses 5–8.
    reason: cross_reference
lexical_decisions:
- source_word: אֱלִישָׁמָע
  chosen: Elishama
  rationale: Proper personal name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: אֶלְיָדָע
  chosen: Eliada
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: אֱלִיפֶלֶט
  chosen: Eliphelet
  alternatives:
  - Eliphelet
  - Elpelet
  rationale: Proper personal name. 'Eliphelet' follows the fuller transliteration
    of the Hebrew form here. A shortened English form such as 'Elpelet' appears elsewhere
    for related spellings, but this verse's form supports 'Eliphelet'.
- source_word: וְ
  chosen: and
  rationale: Standard conjunction linking the final name in the list; earlier prefixed
    waw on each name is represented idiomatically in English list punctuation rather
    than repeating 'and' before every item.
- source_word: תִּשְׁעָה
  chosen: nine
  lexicon: HALOT
  rationale: Cardinal number meaning 'nine.' In context it functions as a summary
    count of the sons listed in vv. 5–8, so it is retained as a standalone concluding
    total.
