theological_decisions:
- issue: Referent of 'his wife' in the phrase 'Eglah his wife'
  chosen_reading: Retain the straightforward genealogical note that Eglah was David's
    wife, without importing later interpretive identifications.
  alternative_readings:
  - Treat 'his wife' as implying special status for Eglah among David's wives
  - Identify Eglah with Michal, as in some later Jewish interpretation
  rationale: The Hebrew simply apposes עֶגְלָה with אִשְׁתּוֹ, yielding 'Eglah his
    wife.' The verse itself does not explain why this wife is singled out, so the
    translation preserves the wording without resolving speculative identifications
    or status claims not explicit in the text.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
