id: 1CH.3.3
reference: 1 Chronicles 3:3
source:
  edition: WLC
  text: הַ/חֲמִישִׁ֥י שְׁפַטְיָ֖ה לַ/אֲבִיטָ֑ל הַ/שִּׁשִּׁ֥י יִתְרְעָ֖ם לְ/עֶגְלָ֥ה
    אִשְׁתּֽ/וֹ׃
translation:
  text: the fifth, Shephatiah, by Abital; the sixth, Ithream, by Eglah his wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Abital' / 'to Eglah,' that is, 'born to Abital' and 'born to Eglah.'
      The Hebrew preposition is rendered idiomatically here in genealogical English
      as 'by.'
    reason: lexical_alternative
  - marker: b
    text: Some interpreters identify Eglah with Michal, but the text itself does not
      state this.
    reason: alternative_reading
lexical_decisions:
- source_word: הַחֲמִישִׁי
  chosen: the fifth
  alternatives:
  - fifth
  lexicon: HALOT
  rationale: Ordinal adjective with article, continuing the numbered list of David's
    sons. English keeps the article for natural list style.
- source_word: שְׁפַטְיָה
  chosen: Shephatiah
  alternatives:
  - Shephatya
  rationale: Personal name; transliterated rather than translated, per translation
    philosophy for names.
- source_word: לַאֲבִיטָל
  chosen: by Abital
  alternatives:
  - to Abital
  - from Abital
  lexicon: HALOT
  rationale: The preposition ל in this genealogical formula marks maternity/parentage
    in the sense 'born to' a mother. In idiomatic English genealogy, 'by Abital' best
    conveys 'whose mother was Abital' while matching the repeated pattern in the context.
- source_word: הַשִּׁשִּׁי
  chosen: the sixth
  alternatives:
  - sixth
  lexicon: HALOT
  rationale: Ordinal adjective with article, parallel to 'the fifth' and preserving
    the list structure.
- source_word: יִתְרְעָם
  chosen: Ithream
  alternatives:
  - Yithream
  rationale: Personal name; standard English transliteration is retained.
- source_word: לְעֶגְלָה
  chosen: by Eglah
  alternatives:
  - to Eglah
  - from Eglah
  lexicon: HALOT
  rationale: As with לַאֲבִיטָל, the preposition in this genealogical context indicates
    maternity. 'By Eglah' is concise and idiomatic in English genealogical style.
- source_word: אִשְׁתּוֹ
  chosen: his wife
  alternatives:
  - his woman
  lexicon: HALOT
  rationale: 'Standard sense of אִשָּׁה with 3ms suffix in marital context is ''his
    wife.'' The phrase most naturally modifies Eglah: ''Eglah his wife.'''
