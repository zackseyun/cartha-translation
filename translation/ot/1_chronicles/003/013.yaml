id: 1CH.3.13
reference: 1 Chronicles 3:13
source:
  edition: WLC
  text: אָחָ֥ז בְּנ֛/וֹ חִזְקִיָּ֥הוּ בְנ֖/וֹ מְנַשֶּׁ֥ה בְנֽ/וֹ׃
translation:
  text: Ahaz his son, Hezekiah his son, Manasseh his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'son' in genealogies can sometimes function more broadly for a descendant,
      but the text here uses the standard formula 'his son.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָחָז
  chosen: Ahaz
  alternatives:
  - Achaz
  lexicon: HALOT
  rationale: Proper name; transliterated by standard English convention rather than
    translated, in keeping with the project policy to transliterate personal names.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - his descendant
  lexicon: HALOT
  rationale: The construct noun בן with 3ms suffix most directly means 'his son.'
    In genealogical contexts it can sometimes denote a more remote descendant, but
    here the formulaic succession list is best rendered literally as 'his son' while
    allowing the broader genealogical convention to be understood from context.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  alternatives:
  - Hizkiah
  lexicon: HALOT
  rationale: Proper name; standard English transliteration is preferred for readability
    and recognizability.
- source_word: בְנוֹ
  chosen: his son
  alternatives:
  - his descendant
  lexicon: HALOT
  rationale: Repeated genealogical formula; rendered consistently with the previous
    occurrence to preserve the structure of the Hebrew.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  lexicon: HALOT
  rationale: Proper name; transliterated according to standard English biblical usage.
- source_word: בְנוֹ
  chosen: his son
  alternatives:
  - his descendant
  lexicon: HALOT
  rationale: Repeated genealogical formula; kept as 'his son' for formal transparency
    and consistency across the verse.
