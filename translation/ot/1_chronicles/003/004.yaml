id: 1CH.3.4
reference: 1 Chronicles 3:4
source:
  edition: WLC
  text: שִׁשָּׁה֙ נֽוֹלַד ל֣/וֹ בְ/חֶבְר֔וֹן וַ/יִּ֨מְלָךְ שָׁ֔ם שֶׁ֥בַע שָׁנִ֖ים
    וְ/שִׁשָּׁ֣ה חֳדָשִׁ֑ים וּ/שְׁלֹשִׁ֤ים וְ/שָׁלוֹשׁ֙ שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָֽם־־׃ס
translation:
  text: Six were born to him in Hebron, and he reigned there seven years and six months;
    and in Jerusalem he reigned thirty-three years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שִׁשָּׁה
  chosen: Six
  alternatives:
  - These six
  lexicon: HALOT
  rationale: Cardinal number introducing the summary of sons just listed. English
    can simply begin with 'Six'; 'These six' is possible by context but not explicit
    in the Hebrew.
- source_word: נוֹלַד לוֹ
  chosen: were born to him
  alternatives:
  - were born for him
  - he fathered
  lexicon: HALOT
  rationale: Passive of ילד with ל + pronominal suffix naturally means 'were born
    to him.' 'He fathered' is more active and interpretive than the passive form warrants.
- source_word: בְחֶבְרוֹן
  chosen: in Hebron
  lexicon: HALOT
  rationale: Straightforward locative preposition with place name.
- source_word: וַיִּמְלָךְ שָׁם
  chosen: and he reigned there
  alternatives:
  - and he became king there
  - and he ruled there
  lexicon: HALOT
  rationale: מלך in this narrative context denotes exercising kingship, not merely
    accession. 'Reigned' is the most idiomatic and precise English rendering.
- source_word: שֶׁבַע שָׁנִים וְשִׁשָּׁה חֳדָשִׁים
  chosen: seven years and six months
  lexicon: HALOT
  rationale: Standard rendering of the duration expression.
- source_word: וּשְׁלֹשִׁים וְשָׁלוֹשׁ שָׁנָה
  chosen: thirty-three years
  alternatives:
  - thirty and three years
  lexicon: HALOT
  rationale: Hebrew number order is rendered in natural modern English as 'thirty-three
    years.' Singular שָׁנָה after a compound number is idiomatic Hebrew and does not
    require singular English.
- source_word: מָלַךְ בִּירוּשָׁלִָם
  chosen: in Jerusalem he reigned
  alternatives:
  - he reigned in Jerusalem
  - he was king in Jerusalem
  lexicon: HALOT
  rationale: 'Retains the Hebrew emphasis on the new location while producing natural
    English. In the final sentence, the clause order is slightly smoothed: ''and in
    Jerusalem he reigned thirty-three years.'''
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard locative rendering of the place name.
