id: 1CH.3.6
reference: 1 Chronicles 3:6
source:
  edition: WLC
  text: וְ/יִבְחָ֥ר וֶ/אֱלִישָׁמָ֖ע וֶ/אֱלִיפָֽלֶט׃
translation:
  text: Ibhar, Elishama, and Eliphelet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew names transliterated: ''Ibhar'' is also sometimes spelled ''Jibhar'';
      ''Eliphelet'' also appears in variant English spellings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִבְחָר
  chosen: Ibhar
  alternatives:
  - Jibhar
  rationale: Proper personal name in a genealogical list; per translation philosophy,
    names are transliterated rather than translated. 'Ibhar' reflects a standard English
    transliteration from Hebrew יבחר. 'Jibhar' is a less common English form influenced
    by older conventions for initial yod.
- source_word: אֱלִישָׁמָע
  chosen: Elishama
  alternatives:
  - Elishamah
  rationale: Proper personal name; transliterated in standard English form. Final
    ayin is normally not represented in common English Bible transliteration, yielding
    'Elishama' rather than a more phonetic but less conventional form.
- source_word: אֱלִיפָלֶט
  chosen: Eliphelet
  alternatives:
  - Elpalet
  - Eliphalet
  rationale: Proper personal name; transliterated rather than translated. 'Eliphelet'
    is the conventional English form for this Hebrew name in biblical genealogies.
    Alternative spellings exist due to different approaches to representing the medial
    consonants/vowels.
- source_word: וְ
  chosen: and
  rationale: The prefixed conjunction on each name marks simple coordination in a
    list. In idiomatic English genealogy style, rendering only the final conjunction
    explicitly ('A, B, and C') best reflects the Hebrew list without wooden repetition.
