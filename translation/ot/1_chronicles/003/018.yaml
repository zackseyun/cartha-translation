id: 1CH.3.18
reference: 1 Chronicles 3:18
source:
  edition: WLC
  text: וּ/מַלְכִּירָ֥ם וּ/פְדָיָ֖ה וְ/שֶׁנְאַצַּ֑ר יְקַמְיָ֥ה הוֹשָׁמָ֖ע וּ/נְדַבְיָֽה׃
translation:
  text: Malchiram, Pedaiah, Shenazzar, Jekamiah, Hoshama, and Nedabiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew personal names may be transliterated differently in English, e.g.,
      'Malkiram' for 'Malchiram' or 'Yekamiah' for 'Jekamiah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכִּירָם
  chosen: Malchiram
  alternatives:
  - Malkiram
  lexicon: HALOT
  rationale: Proper personal name in a genealogy; transliterated rather than translated
    per project philosophy. 'Malchiram' follows a standard English convention reflecting
    the Hebrew consonants and vowels.
- source_word: פְדָיָה
  chosen: Pedaiah
  alternatives:
  - Pedayah
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard convention. The theophoric
    ending is commonly represented as '-iah' in English biblical names.
- source_word: שֶׁנְאַצַּר
  chosen: Shenazzar
  alternatives:
  - Shenazar
  - Shenatstsar
  lexicon: HALOT
  rationale: Proper personal name; transliterated. 'Shenazzar' best reflects the doubled
    צ indicated in the pointed form while remaining readable in modern English.
- source_word: יְקַמְיָה
  chosen: Jekamiah
  alternatives:
  - Yekamiah
  lexicon: HALOT
  rationale: Proper personal name; transliterated. Initial yod in many established
    English biblical names is conventionally represented with 'J' rather than 'Y'.
- source_word: הוֹשָׁמָע
  chosen: Hoshama
  alternatives:
  - Hoshama
  lexicon: HALOT
  rationale: Proper personal name; transliterated. 'Hoshama' is a standard English
    form and preserves the Hebrew vocalization clearly.
- source_word: נְדַבְיָה
  chosen: Nedabiah
  alternatives:
  - Nedabyah
  lexicon: HALOT
  rationale: Proper personal name; transliterated. The final divine element is conventionally
    rendered '-iah' in English biblical names.
- source_word: וּ / וְ
  chosen: and
  lexicon: HALOT
  rationale: The prefixed conjunction simply links the names in a list. In English
    genealogy style, commas are used throughout with a single final 'and' before the
    last name for natural readability while preserving the list structure.
