id: 1CH.3.21
reference: 1 Chronicles 3:21
source:
  edition: WLC
  text: וּ/בֶן חֲנַנְיָ֖ה פְּלַטְיָ֣ה וִ/ישַֽׁעְיָ֑ה בְּנֵ֤י רְפָיָה֙ בְּנֵ֣י אַרְנָ֔ן
    בְּנֵ֥י עֹבַדְיָ֖ה בְּנֵ֥י שְׁכַנְיָֽה־׃ס
translation:
  text: 'And the son of Hananiah: Pelatiah and Jeshaiah; the sons of Rephaiah, the
    sons of Arnan, the sons of Obadiah, the sons of Shecaniah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Hebrew syntax is compressed and somewhat difficult. It reads literally,
      ''And the son of Hananiah: Pelatiah and Jeshaiah; the sons of Rephaiah, the
      sons of Arnan, the sons of Obadiah, the sons of Shecaniah.'' Some interpreters
      understand part of the sequence more broadly as a line of descendants rather
      than immediate sons.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבֶן
  chosen: And the son of
  alternatives:
  - and a son of
  - and the descendants of
  lexicon: HALOT
  rationale: The singular construct בן with prefixed conjunction is best rendered
    literally as 'and the son of,' continuing the genealogy from the previous verse.
    Although the following two names create some syntactic difficulty, the Hebrew
    text as pointed begins with a singular 'son,' so the translation preserves that
    form rather than smoothing it into a plural.
- source_word: חֲנַנְיָה
  chosen: Hananiah
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: פְּלַטְיָה
  chosen: Pelatiah
  alternatives:
  - Pelaṭiah
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration used.
- source_word: וִישַׁעְיָה
  chosen: and Jeshaiah
  alternatives:
  - and Isaiah
  lexicon: HALOT
  rationale: Proper personal name with conjunction. 'Jeshaiah' reflects the distinct
    Hebrew form here and avoids conflating it with the more familiar prophetic name
    Isaiah, though the names are related in form.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  lexicon: HALOT
  rationale: In genealogical contexts בני commonly means 'sons of,' though it can
    function more broadly for descendants. The repeated chain is preserved formally
    as 'the sons of' to reflect the Hebrew structure and avoid over-interpreting the
    exact generational distance.
- source_word: רְפָיָה
  chosen: Rephaiah
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
- source_word: אַרְנָן
  chosen: Arnan
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
- source_word: עֹבַדְיָה
  chosen: Obadiah
  alternatives:
  - Obadyah
  lexicon: HALOT
  rationale: Proper personal name; conventional English transliteration used.
- source_word: שְׁכַנְיָה
  chosen: Shecaniah
  alternatives:
  - Shekaniah
  lexicon: HALOT
  rationale: Proper personal name; conventional English transliteration used. The
    maqqef at the end simply links to the verse ending and does not alter translation.
