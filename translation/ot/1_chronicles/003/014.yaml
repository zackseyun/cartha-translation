id: 1CH.3.14
reference: 1 Chronicles 3:14
source:
  edition: WLC
  text: אָמ֥וֹן בְּנ֖/וֹ יֹאשִׁיָּ֥הוּ בְנֽ/וֹ׃
translation:
  text: Amon his son, Josiah his son.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אָמ֥וֹן
  chosen: Amon
  alternatives:
  - Amon
  lexicon: HALOT
  rationale: Proper personal name of the Judean king; transliterated rather than translated
    per project philosophy. Standard English form is 'Amon.'
- source_word: בְּנ֖וֹ
  chosen: his son
  alternatives:
  - son of him
  lexicon: HALOT
  rationale: Construct noun בֵּן with 3ms suffix literally means 'his son.' In this
    genealogy, the idiomatic English rendering is 'his son,' indicating direct descent
    in the royal line.
- source_word: יֹאשִׁיָּ֥הוּ
  chosen: Josiah
  alternatives:
  - Yoshiyahu
  lexicon: HALOT
  rationale: Proper personal name; rendered by the standard English transliteration
    'Josiah' for readability and continuity, while preserving the identity of the
    Hebrew name.
- source_word: בְנֽוֹ
  chosen: his son
  alternatives:
  - son of him
  lexicon: HALOT
  rationale: Repeated genealogical formula; translated consistently as 'his son' to
    preserve the structure and succession indicated in the Hebrew.
