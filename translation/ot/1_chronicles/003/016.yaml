id: 1CH.3.16
reference: 1 Chronicles 3:16
source:
  edition: WLC
  text: וּ/בְנֵ֖י יְהוֹיָקִ֑ים יְכָנְיָ֥ה בְנ֖/וֹ צִדְקִיָּ֥ה בְנֽ/וֹ׃
translation:
  text: 'And the sons of Jehoiakim: Jeconiah his son, Zedekiah his son.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is terse: ''Jeconiah his son, Zedekiah his son.'' This may be read
      as a simple genealogical sequence, though interpreters differ on whether both
      names are sons of Jehoiakim or whether Zedekiah is son of Jeconiah in the line
      as stated here.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons,' introducing a genealogical
    list. The prefixed conjunction ו is retained as 'And' to preserve the list-like
    continuity of the genealogy.
- source_word: יְהוֹיָקִים
  chosen: Jehoiakim
  alternatives:
  - Joiakim
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention, following
    the translation philosophy to transliterate personal names rather than translate
    them.
- source_word: יְכָנְיָה
  chosen: Jeconiah
  alternatives:
  - Jechoniah
  - Coniah
  lexicon: HALOT
  rationale: Proper name transliterated in a standard English biblical form. 'Jeconiah'
    best matches the Hebrew form here (יְכָנְיָה), while 'Jechoniah' reflects a common
    variant in English tradition and 'Coniah' appears in other contexts as a shortened
    form.
- source_word: בְנ֖/וֹ
  chosen: his son
  alternatives:
  - son of him
  lexicon: HALOT
  rationale: The noun with 3ms suffix is naturally rendered 'his son' in English.
    The phrase is repeated in the genealogy and should be translated straightforwardly
    rather than compressed away.
- source_word: צִדְקִיָּה
  chosen: Zedekiah
  alternatives:
  - Ṣidqiyyah
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention. 'Zedekiah'
    is the established English form corresponding to the Hebrew name.
- source_word: בְנֽ/וֹ
  chosen: his son
  alternatives:
  - son of him
  lexicon: HALOT
  rationale: Repeated genealogical marker retained explicitly. Although the syntax
    is terse, preserving the repetition reflects the Hebrew structure and leaves the
    genealogical relationship as stated in the source text.
