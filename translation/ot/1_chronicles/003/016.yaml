theological_decisions:
- issue: Genealogical syntax and relationship in a difficult lineage notice
  chosen_reading: 'The verse is rendered as a straightforward genealogy: Jeconiah
    his son, Zedekiah his son.'
  alternative_readings:
  - The verse may be understood as listing Jehoiakim's sons as Jeconiah and Zedekiah.
  - The second 'his son' may be taken as referring back to Jeconiah rather than Jehoiakim,
    yielding 'Jeconiah his son, Zedekiah his son' in nested succession.
  rationale: The Hebrew is terse and formally repeats 'his son' after each name. Rather
    than harmonizing with other historical passages or resolving the genealogy interpretively,
    the translation preserves the wording as given. This follows the principle of
    original-language primacy and avoids importing a reconstructed lineage into the
    main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
