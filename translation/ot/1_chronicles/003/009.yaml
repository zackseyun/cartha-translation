id: 1CH.3.9
reference: 1 Chronicles 3:9
source:
  edition: WLC
  text: כֹּ֖ל בְּנֵ֣י דָוִ֑יד מִ/לְּ/בַ֥ד בְּֽנֵי פִֽילַגְשִׁ֖ים וְ/תָמָ֥ר אֲחוֹתָֽ/ם־׃פ
translation:
  text: All these were David’s sons, besides the sons of the concubines; and Tamar
    was their sister.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'apart from the sons of the concubines.' The Hebrew phrase may be understood
      as excluding those sons from the preceding total or as noting them additionally
      outside the main list.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  chosen: All these
  alternatives:
  - All
  - The totality of these
  lexicon: HALOT
  rationale: כֹּל marks totality. In English, 'All these' naturally gathers the previously
    listed names and fits the summarizing function of the verse better than a bare
    'All.'
- source_word: בְּנֵי דָוִיד
  chosen: David’s sons
  alternatives:
  - the sons of David
  - David’s children
  lexicon: HALOT
  rationale: בְּנֵי is specifically masculine plural, so 'sons' is required rather
    than gender-neutral 'children,' in keeping with gender-accurate translation.
- source_word: מִלְּבַד
  chosen: besides
  alternatives:
  - apart from
  - excluding
  - in addition to
  lexicon: HALOT
  rationale: The preposition indicates exception or addition outside the immediately
    listed group. 'Besides' is concise and idiomatic in a genealogical summary.
- source_word: בְּנֵי פִילַגְשִׁים
  chosen: the sons of the concubines
  alternatives:
  - the sons of David’s concubines
  - the children of the concubines
  lexicon: HALOT
  rationale: The Hebrew literally says 'sons of concubines.' Supplying 'David’s' in
    the main text is unnecessary because the context already makes that relationship
    clear. 'Sons' again preserves the masculine form.
- source_word: פִילַגְשִׁים
  chosen: concubines
  alternatives:
  - secondary wives
  lexicon: HALOT
  rationale: '''Concubines'' is the standard and most precise rendering for the social
    category denoted by פִילַגְשִׁים in royal household contexts.'
- source_word: וְתָמָר
  chosen: and Tamar
  alternatives:
  - with Tamar
  lexicon: HALOT
  rationale: Simple conjunction plus proper name; standard transliteration is appropriate
    for a personal name.
- source_word: אֲחוֹתָם
  chosen: was their sister
  alternatives:
  - their sister
  - the sister of them
  lexicon: HALOT
  rationale: Although the Hebrew is verbless, English normally supplies 'was.' The
    phrase identifies Tamar in relation to the listed sons, so 'was their sister'
    is the most natural rendering.
