id: 1CH.3.10
reference: 1 Chronicles 3:10
source:
  edition: WLC
  text: וּ/בֶן שְׁלֹמֹ֖ה רְחַבְעָ֑ם אֲבִיָּ֥ה בְנ֛/וֹ אָסָ֥א בְנ֖/וֹ יְהוֹשָׁפָ֥ט
    בְּנֽ/וֹ־׃
translation:
  text: And the son of Solomon was Rehoboam; Abijah his son, Asa his son, Jehoshaphat
    his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Abijah.'' In 1–2 Kings the same king is also referred to by the
      variant name ''Abijam.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בֶן
  chosen: And the son of
  alternatives:
  - Now the son of
  - and son of
  lexicon: HALOT
  rationale: The conjunction ו plus construct בֶן introduces the next link in the
    genealogy. 'And the son of' preserves the genealogical style and the connective
    force of the Hebrew without over-paraphrasing.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name שְׁלֹמֹה.
- source_word: רְחַבְעָם
  chosen: Rehoboam
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name רְחַבְעָם.
- source_word: אֲבִיָּה
  chosen: Abijah
  alternatives:
  - Abijam
  lexicon: HALOT
  rationale: The Chronicler's form here is אֲבִיָּה, regularly rendered 'Abijah.'
    'Abijam' reflects a different naming form used in some Kings contexts, not the
    form present in this verse.
- source_word: בְנ/וֹ
  chosen: his son
  alternatives:
  - son of him
  lexicon: HALOT
  rationale: The noun with 3ms suffix marks filial succession in the genealogy. 'His
    son' is the natural English equivalent and preserves the repetitive genealogical
    cadence.
- source_word: אָסָא
  chosen: Asa
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name אָסָא.
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name יְהוֹשָׁפָט.
