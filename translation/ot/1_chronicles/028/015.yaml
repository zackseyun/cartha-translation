id: 1CH.28.15
reference: 1 Chronicles 28:15
source:
  edition: WLC
  text: וּ/מִשְׁקָ֞ל לִ/מְנֹר֣וֹת הַ/זָּהָ֗ב וְ/נֵרֹֽתֵי/הֶם֙ זָהָ֔ב בְּ/מִשְׁקַל
    מְנוֹרָ֥ה וּ/מְנוֹרָ֖ה וְ/נֵרֹתֶ֑י/הָ וְ/לִ/מְנֹר֨וֹת הַ/כֶּ֤סֶף בְּ/מִשְׁקָל֙
    לִ/מְנוֹרָ֣ה וְ/נֵרֹתֶ֔י/הָ כַּ/עֲבוֹדַ֖ת מְנוֹרָ֥ה וּ/מְנוֹרָֽה־׃
translation:
  text: and the weight for the lampstands of gold and their lamps of gold, by the
    weight of each lampstand and its lamps; and for the lampstands of silver, by weight
    for a lampstand and its lamps, according to the service of each lampstand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'by the weight of lampstand and lampstand' and 'according
      to the service of lampstand and lampstand,' a distributive expression meaning
      each lampstand individually.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁקָל
  chosen: weight
  alternatives:
  - amount by weight
  - weighing
  lexicon: HALOT
  rationale: The noun denotes a measured weight or quantity by weight in a temple-inventory
    context. 'Weight' is the most natural and sufficiently formal rendering here.
- source_word: מְנֹרוֹת
  chosen: lampstands
  alternatives:
  - lamps
  - menorahs
  lexicon: HALOT
  rationale: מְנוֹרָה refers to a lampstand, not merely a lamp. 'Lampstands' is clearer
    for modern readers than transliterating 'menorahs,' while preserving the cultic
    object.
- source_word: נֵרֹתֵיהֶם / נֵרֹתֶיהָ
  chosen: lamps
  alternatives:
  - lights
  lexicon: HALOT
  rationale: נֵר denotes the individual lamp(s) associated with the lampstand. 'Lamps'
    distinguishes these from the lampstand itself.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward material term; repeated in Hebrew for both the lampstands
    and their lamps, so retained in English.
- source_word: בְּמִשְׁקַל מְנוֹרָה וּמְנוֹרָה
  chosen: by the weight of each lampstand
  alternatives:
  - according to the weight of lampstand by lampstand
  - by the weight assigned to every lampstand
  lexicon: HALOT
  rationale: The distributive repetition 'lampstand and lampstand' indicates item-by-item
    allocation. English idiom is best captured by 'each lampstand' rather than a wooden
    repetition.
- source_word: וְלִמְנֹרוֹת הַכֶּסֶף
  chosen: and for the lampstands of silver
  alternatives:
  - and for the silver lampstands
  lexicon: HALOT
  rationale: Either order is possible in English. 'Lampstands of silver' preserves
    the Hebrew structure and keeps parallelism with 'lampstands of gold.'
- source_word: כַּעֲבוֹדַת מְנוֹרָה וּמְנוֹרָה
  chosen: according to the service of each lampstand
  alternatives:
  - according to the use of each lampstand
  - according to the work of each lampstand
  lexicon: HALOT
  rationale: עֲבוֹדָה in cultic contexts often denotes service or function. Here it
    likely means the intended liturgical use/function of each silver lampstand, again
    with distributive repetition. 'Service' preserves the temple context better than
    the more generic 'use.'
