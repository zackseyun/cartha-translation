id: 1CH.28.14
reference: 1 Chronicles 28:14
source:
  edition: WLC
  text: לַ/זָּהָ֤ב בַּ/מִּשְׁקָל֙ לַ/זָּהָ֔ב לְ/כָל כְּלֵ֖י עֲבוֹדָ֣ה וַ/עֲבוֹדָ֑ה
    לְ/כֹ֨ל כְּלֵ֤י הַ/כֶּ֨סֶף֙ בְּ/מִשְׁקָ֔ל לְ/כָל כְּלֵ֖י עֲבוֹדָ֥ה וַ/עֲבוֹדָֽה־־׃
translation:
  text: the gold by weight for the gold, for all the articles for each kind of service;
    and all the silver articles by weight, for all the articles for each kind of service.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew repeats 'service and service,' a distributive expression meaning
      something like 'for each kind of service' or 'for every use.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָּהָב
  chosen: gold
  alternatives:
  - the gold
  lexicon: HALOT
  rationale: Basic material term. The prefixed article is retained in English only
    where natural; because the verse is elliptical and list-like, 'gold' communicates
    the substance without overloading the line with repeated articles.
- source_word: מִשְׁקָל
  chosen: by weight
  alternatives:
  - weight
  - according to weight
  lexicon: HALOT
  rationale: The preposition ב plus מִשְׁקָל indicates specification by measured weight.
    'By weight' is concise modern English and fits the inventory style of the context.
- source_word: כְּלֵי
  chosen: articles
  alternatives:
  - utensils
  - vessels
  - implements
  lexicon: HALOT
  rationale: כְּלִי is a broad term for objects/items used in service. 'Articles'
    is suitably broad and readable in a temple-inventory context without implying
    only containers ('vessels') or only tools ('implements').
- source_word: עֲבוֹדָה
  chosen: service
  alternatives:
  - work
  - ministry
  lexicon: HALOT
  rationale: In cultic/temple contexts עֲבוֹדָה commonly denotes service or work performed.
    'Service' best captures the functional/cultic sense in accessible English.
- source_word: עֲבוֹדָה וַעֲבוֹדָה
  chosen: each kind of service
  alternatives:
  - service and service
  - for every service and service
  - for each service
  lexicon: HALOT
  rationale: The repetition is distributive, indicating differentiation according
    to various categories of use. 'Each kind of service' preserves that distributive
    force in idiomatic English better than a wooden repetition.
- source_word: כֶּסֶף
  chosen: silver
  alternatives:
  - the silver
  lexicon: HALOT
  rationale: Parallel to זָּהָב, referring to the material assigned for temple objects.
    English naturally renders the substance simply as 'silver' in this inventory statement.
- source_word: לְכָל / לְכֹל
  chosen: for all
  alternatives:
  - for every
  - for each
  lexicon: HALOT
  rationale: The preposition plus כֹּל marks scope/distribution. 'For all' is retained
    in the main line, while the following repeated phrase is smoothed with 'each kind
    of service' to avoid awkwardness while preserving the distributive sense.
