theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH and aligns with established reverential English convention while preserving covenantal reference.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of 'the throne of the kingdom of the LORD'
  chosen_reading: Retain the full phrase without reduction
  alternative_readings:
  - the royal throne
  - the throne of Israel's kingdom
  rationale: The Hebrew explicitly attributes the kingdom to the LORD, not merely to Israel or David. The translation preserves this theological emphasis that the Davidic throne is derivative of YHWH's kingship.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
