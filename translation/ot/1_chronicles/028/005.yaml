id: 1CH.28.5
reference: 1 Chronicles 28:5
source:
  edition: WLC
  text: וּ/מִ/כָּ֨ל בָּנַ֔/י כִּ֚י רַבִּ֣ים בָּנִ֔ים נָ֥תַן לִ֖/י יְהוָ֑ה וַ/יִּבְחַר֙ בִּ/שְׁלֹמֹ֣ה בְנִ֔/י לָ/שֶׁ֗בֶת עַל כִּסֵּ֛א מַלְכ֥וּת יְהוָ֖ה עַל יִשְׂרָאֵֽל־־־׃
translation:
  text: And from among all my sons—for Yahweh has given me many sons—he chose Solomon my son to sit on the throne of the kingdom of Yahweh over Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the LORD gave me many sons.' The Hebrew clause is explanatory and may be rendered with either present-perfect or simple past in English.
    reason: lexical_alternative
  - marker: b
    text: '''The throne of the kingdom of the LORD'' emphasizes that Israel''s monarchy belongs ultimately to the LORD, even though Solomon is the human king.'
    reason: cross_reference
lexical_decisions:
- source_word: וּמִכָּל
  chosen: And from among all
  alternatives:
  - And of all
  - And out of all
  lexicon: HALOT
  rationale: Combines conjunction ו with preposition מן and כָּל. 'From among all' best conveys selection out of a larger group in natural English.
- source_word: בָּנַי
  chosen: my sons
  alternatives:
  - my children
  lexicon: HALOT
  rationale: Literal masculine plural with 1cs suffix. 'Sons' is gender-accurate and contextually specific, since royal succession is in view.
- source_word: כִּי רַבִּים בָּנִים
  chosen: for ... many sons
  alternatives:
  - since ... many sons
  lexicon: HALOT
  rationale: כִּי here introduces an explanatory parenthetical clause. 'For' preserves the explanatory force without overinterpreting causation.
- source_word: נָתַן לִי יְהוָה
  chosen: the LORD has given me
  alternatives:
  - the LORD gave me
  lexicon: HALOT
  rationale: 'Renders YHWH as ''the LORD'' per doctrine. English present perfect fits the stative/resultative sense in context: David presently has many sons because the LORD gave them.'
- source_word: וַיִּבְחַר
  chosen: he chose
  alternatives:
  - and he chose
  - then he chose
  lexicon: HALOT
  rationale: Subject remains the LORD from the prior clause. English omits repeated subject naturally, but 'he chose' keeps the agency explicit.
- source_word: בִּשְׁלֹמֹה בְנִי
  chosen: Solomon my son
  alternatives:
  - in Solomon my son
  lexicon: HALOT
  rationale: With בחר, the preposition ב often marks the one chosen. English idiom is simply 'chose Solomon my son.'
- source_word: לָשֶׁבֶת
  chosen: to sit
  alternatives:
  - to dwell
  - to be seated
  lexicon: HALOT
  rationale: In enthronement context, ישב with throne language means 'sit' in the sense of reigning from a throne.
- source_word: עַל כִּסֵּא
  chosen: on the throne
  alternatives:
  - upon the throne
  lexicon: HALOT
  rationale: Standard idiomatic rendering for enthronement language.
- source_word: מַלְכוּת יְהוָה
  chosen: of the kingdom of the LORD
  alternatives:
  - of the LORD's kingdom
  - of the kingship of the LORD
  lexicon: HALOT
  rationale: Construct chain most naturally rendered 'the kingdom of the LORD.' This preserves the theological claim that Israel's monarchy is under and belongs to YHWH.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: עַל with throne/kingdom language indicates rule or dominion; 'over Israel' is the clearest idiomatic rendering.
