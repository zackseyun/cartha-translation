id: 1CH.28.12
reference: 1 Chronicles 28:12
source:
  edition: WLC
  text: וְ/תַבְנִ֗ית כֹּל֩ אֲשֶׁ֨ר הָיָ֤ה בָ/ר֨וּחַ֙ עִמּ֔/וֹ לְ/חַצְר֧וֹת בֵּית יְהוָ֛ה וּ/לְ/כָל הַ/לְּשָׁכ֖וֹת סָבִ֑יב לְ/אֹֽצְרוֹת֙ בֵּ֣ית הָ/אֱלֹהִ֔ים וּ/לְ/אֹצְר֖וֹת הַ/קֳּדָשִֽׁים־־׃
translation:
  text: 'and the plan of all that was in the Spirit with him: for the courts of the house of Yahweh, for all the surrounding chambers, for the treasuries of the house of God, and for the treasuries of the holy things.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all that was in his spirit with him,' that is, what was in David's own mind or heart.
    reason: alternative_reading
lexical_decisions:
- source_word: תַבְנִית
  chosen: plan
  alternatives:
  - pattern
  - design
  lexicon: HALOT
  rationale: In temple/building contexts תַבְנִית commonly denotes an architectural plan or pattern. 'Plan' is natural modern English and fits the list of temple features that follows.
- source_word: כֹּל אֲשֶׁר
  chosen: all that
  alternatives:
  - everything that
  - the whole of what
  lexicon: HALOT
  rationale: This construction introduces the totality of the plan David gave. 'All that' preserves the comprehensiveness without sounding wooden.
- source_word: הָיָה בָרוּחַ עִמּוֹ
  chosen: was in the Spirit with him
  alternatives:
  - was in his spirit
  - he had by the Spirit
  lexicon: HALOT
  rationale: The phrase is syntactically unusual and can mean either what was in David's own spirit/mind or what was given by the divine Spirit. Given the broader context of divinely given temple plans (cf. v. 19), 'in the Spirit with him' preserves the Hebrew's wording while allowing the likely theological force. Capitalizing 'Spirit' reflects the probable reference to the divine Spirit, while the footnote preserves the alternative reading 'in his spirit'.
- source_word: לְחַצְרוֹת
  chosen: for the courts
  alternatives:
  - for the courtyards
  lexicon: HALOT
  rationale: In temple architecture, 'courts' is the standard and clearest English rendering.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' Per doctrine, יְהוָה is rendered 'the LORD.' 'House' preserves the Hebrew expression and temple connotation.
- source_word: לְּשָׁכוֹת
  chosen: chambers
  alternatives:
  - rooms
  - side chambers
  lexicon: HALOT
  rationale: These are temple rooms/chambers surrounding the main structure. 'Chambers' is both accurate and idiomatic in this architectural context.
- source_word: סָבִיב
  chosen: surrounding
  alternatives:
  - all around
  - round about
  lexicon: HALOT
  rationale: This adverb describes the chambers as encircling the structure. 'Surrounding' integrates smoothly into English.
- source_word: אֹצְרוֹת
  chosen: treasuries
  alternatives:
  - storehouses
  - treasure rooms
  lexicon: HALOT
  rationale: The term denotes storage/treasury spaces. 'Treasuries' fits the temple context and distinguishes these from ordinary rooms.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: A second designation for the temple. 'House of God' preserves the Hebrew wording and parallels 'house of the LORD' earlier in the verse.
- source_word: הַקֳּדָשִׁים
  chosen: the holy things
  alternatives:
  - the dedicated things
  - the sacred gifts
  lexicon: HALOT
  rationale: Here the plural likely refers to holy/dedicated items kept in temple treasuries. 'Holy things' is the most direct rendering; more interpretive options are preserved as alternatives.
