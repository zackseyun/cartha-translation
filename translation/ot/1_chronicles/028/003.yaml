theological_decisions:
- issue: Reason David is forbidden to build the temple
  chosen_reading: The text states that David's identity as a man of wars and his shedding
    of blood are the stated reasons God gave for forbidding him to build a house for
    God's name.
  alternative_readings:
  - The bloodshed refers specifically to morally culpable violence.
  - The statement is purely about ritual unsuitability despite legitimate warfare.
  rationale: The verse itself gives the reason without explicitly adjudicating whether
    the bloodshed was sinful, ritually disqualifying, or simply unsuitable for the
    temple builder's role. The translation preserves that tension and does not import
    a stronger doctrinal judgment than the Hebrew states.
  doctrine_reference: Preserve theological tension rather than resolve it.
