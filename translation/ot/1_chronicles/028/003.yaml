id: 1CH.28.3
reference: 1 Chronicles 28:3
source:
  edition: WLC
  text: וְ/הָ/אֱלֹהִים֙ אָ֣מַר לִ֔/י לֹא תִבְנֶ֥ה בַ֖יִת לִ/שְׁמִ֑/י כִּ֣י אִ֧ישׁ
    מִלְחָמ֛וֹת אַ֖תָּה וְ/דָמִ֥ים שָׁפָֽכְתָּ־׃
translation:
  text: But God said to me, ‘You shall not build a house for my name, because you
    are a man of wars and have shed blood.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a man of war.' The Hebrew is literally 'a man of wars.'
    reason: lexical_alternative
  - marker: b
    text: '''A house for my name'' refers to the temple as the place associated with
      God''s name and presence.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהָאֱלֹהִים
  chosen: But God
  alternatives:
  - And God
  - Now God
  lexicon: HALOT
  rationale: 'אֱלֹהִים here refers to the God of Israel and is best rendered ''God.''
    The prefixed conjunction וְ can be rendered simply ''and,'' but in English discourse
    ''but'' better reflects the adversative force in David''s explanation: despite
    his desire to build, God forbade it.'
- source_word: אָמַר לִי
  chosen: said to me
  alternatives:
  - told me
  lexicon: HALOT
  rationale: A straightforward rendering of אמר with indirect object suffix. 'Said
    to me' preserves the speech-reporting form more formally than 'told me.'
- source_word: לֹא תִבְנֶה
  chosen: You shall not build
  alternatives:
  - You must not build
  - You will not build
  lexicon: HALOT
  rationale: The imperfect with לֹא in direct divine speech here functions as a prohibition/declaration
    of what David is not permitted to do. 'You shall not build' preserves both the
    solemnity and the ambiguity between prohibition and decree better than a more
    colloquial form.
- source_word: בַיִת
  chosen: a house
  alternatives:
  - the house
  - a temple
  lexicon: HALOT
  rationale: בַיִת literally means 'house.' In this context it refers to the temple,
    but 'house' preserves the Hebrew wording and the theological idiom of a house
    for God's name. 'Temple' is interpretive and therefore left implicit.
- source_word: לִשְׁמִי
  chosen: for my name
  alternatives:
  - for the sake of my name
  - bearing my name
  lexicon: HALOT
  rationale: The phrase is a standard biblical expression for a sanctuary associated
    with God's revealed name/presence. 'For my name' is the most direct and idiomatic
    rendering, preserving the theological wording rather than paraphrasing it.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason God gives for the prohibition. 'Because' is clear
    modern English and preserves the causal force.
- source_word: אִישׁ מִלְחָמוֹת
  chosen: a man of wars
  alternatives:
  - a man of war
  - a warrior
  - a fighting man
  lexicon: HALOT
  rationale: Literally, 'a man of wars.' The plural 'wars' is retained to reflect
    the Hebrew more closely and to emphasize repeated military activity rather than
    merely a warrior identity in the abstract. 'Warrior' is smoother but less transparent
    to the source.
- source_word: וְדָמִים שָׁפָכְתָּ
  chosen: and have shed blood
  alternatives:
  - and have spilled blood
  - and bloods you have shed
  lexicon: HALOT
  rationale: The idiom דמים שפך means to shed blood, often with connotations of bloodguilt
    or violent killing. English idiom requires singular 'blood' rather than the Hebrew
    plural form. The perfect is naturally rendered 'have shed' in this explanatory
    context.
