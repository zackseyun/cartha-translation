theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered kinship term אַחַי
  chosen_reading: my brothers
  alternative_readings:
  - my brothers and sisters
  - my kinsmen
  rationale: The source is grammatically masculine plural and likely representative in a public assembly, but the translation policy prefers gender-accurate renderings over gender-neutral smoothing. Inclusivity can be noted in a footnote rather than altering the main text.
