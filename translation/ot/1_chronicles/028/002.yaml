id: 1CH.28.2
reference: 1 Chronicles 28:2
source:
  edition: WLC
  text: וַ/יָּ֨קָם דָּוִ֤יד הַ/מֶּ֨לֶךְ֙ עַל רַגְלָ֔י/ו וַ/יֹּ֕אמֶר שְׁמָע֖וּ/נִי אַחַ֣/י וְ/עַמִּ֑/י אֲנִ֣י עִם לְבָבִ֡/י לִ/בְנוֹת֩ בֵּ֨ית מְנוּחָ֜ה לַ/אֲר֣וֹן בְּרִית יְהוָ֗ה וְ/לַ/הֲדֹם֙ רַגְלֵ֣י אֱלֹהֵ֔י/נוּ וַ/הֲכִינ֖וֹתִי לִ/בְנֽוֹת־־־׃
translation:
  text: Then King David rose to his feet and said, “Hear me, my brothers and my people. It was in my heart to build a house of rest for the ark of the covenant of Yahweh, and for the footstool of our God, and I made preparations to build it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “my kinsmen”; the Hebrew says “my brothers,” a masculine plural form used in a public address.
    reason: lexical_alternative
  - marker: b
    text: “House of rest” may also be rendered “resting place,” referring to a settled dwelling for the ark.
    reason: lexical_alternative
  - marker: c
    text: That is, the ark is described as the footstool associated with the presence of Israel’s God; compare Psalm 132:7.
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּקָם
  chosen: rose
  alternatives:
  - stood up
  - arose
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום denotes rising/standing up. 'Rose' is natural modern English and preserves the narrative action.
- source_word: עַל רַגְלָיו
  chosen: to his feet
  alternatives:
  - on his feet
  - upon his feet
  lexicon: HALOT
  rationale: Idiomatic complement to קום. 'Rose to his feet' is standard English for the Hebrew expression and avoids wooden phrasing.
- source_word: שְׁמָעוּנִי
  chosen: Hear me
  alternatives:
  - Listen to me
  lexicon: HALOT
  rationale: Imperative of שמע with 1cs suffix. 'Hear me' fits the solemn public address and is concise.
- source_word: אַחַי וְעַמִּי
  chosen: my brothers and my people
  alternatives:
  - my brothers and my fellow people
  - my kinsmen and my people
  lexicon: HALOT
  rationale: Retains the masculine plural 'brothers' per gender-accurate policy rather than flattening to 'brothers and sisters.' The pairing expresses both kinship and national identity.
- source_word: אֲנִי עִם לְבָבִי
  chosen: I had it in my heart
  alternatives:
  - as for me, it was with my heart
  - I was with my heart set
  lexicon: HALOT
  rationale: Hebrew idiom expressing inward intention or resolve. 'I had it in my heart' is a faithful English equivalent that preserves the volitional sense.
- source_word: לִבְנוֹת
  chosen: to build
  lexicon: HALOT
  rationale: Infinitive construct of בנה; straightforwardly 'to build.'
- source_word: בֵּית מְנוּחָה
  chosen: a house of rest
  alternatives:
  - a resting place
  - a house of repose
  lexicon: HALOT
  rationale: Literally 'house of rest.' Kept relatively formal because the phrase is cultic and evocative, referring to a settled dwelling for the ark rather than merely a building.
- source_word: לַאֲרוֹן בְּרִית יְהוָה
  chosen: for the ark of the covenant of the LORD
  alternatives:
  - for the ark of the LORD's covenant
  lexicon: HALOT
  rationale: Preserves the construct chain clearly in English. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the project's contested-terms policy for the divine name.
- source_word: וְלַהֲדֹם רַגְלֵי אֱלֹהֵינוּ
  chosen: and for the footstool of our God
  alternatives:
  - even the footstool of our God
  - for our God's footstool
  lexicon: HALOT
  rationale: The phrase stands in apposition to the ark, identifying it as the footstool associated with God's presence. 'Footstool of our God' preserves the metaphor without overexplaining.
- source_word: וַהֲכִינוֹתִי
  chosen: and I made preparations
  alternatives:
  - and I prepared
  - and I had prepared
  lexicon: HALOT
  rationale: Hiphil conveys causing/preparing. 'Made preparations' captures the preparatory sense and fits the following infinitive 'to build it.'
- source_word: לִבְנוֹת
  chosen: to build it
  alternatives:
  - to build
  lexicon: HALOT
  rationale: English naturally supplies the object from context ('house'/'temple project'). The Hebrew infinitive lacks an explicit object, but 'it' makes the sentence complete without changing the sense.
