id: 1CH.28.18
reference: 1 Chronicles 28:18
source:
  edition: WLC
  text: וּ/לְ/מִזְבַּ֧ח הַ/קְּטֹ֛רֶת זָהָ֥ב מְזֻקָּ֖ק בַּ/מִּשְׁקָ֑ל וּ/לְ/תַבְנִ֣ית
    הַ/מֶּרְכָּבָ֗ה הַ/כְּרֻבִ֤ים זָהָב֙ לְ/פֹ֣רְשִׂ֔ים וְ/סֹכְכִ֖ים עַל אֲר֥וֹן בְּרִית
    יְהוָֽה־־׃
translation:
  text: and for the altar of incense, refined gold by weight; and for the pattern
    of the chariot—the cherubim of gold—spreading out their wings and overshadowing
    the ark of the covenant of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the plan/model of the chariot'; the Hebrew phrase is difficult, and
      may refer to the cherubim-throne structure associated with the ark.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'covering' or 'overshadowing'; the image is of the cherubim with
      wings spread over the ark.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְבַּח הַקְּטֹרֶת
  chosen: the altar of incense
  alternatives:
  - the incense altar
  lexicon: HALOT
  rationale: 'A straightforward construct relationship: ''altar of incense.'' This
    is the familiar cultic object in the temple furnishings. ''Incense altar'' is
    possible, but the fuller phrase is slightly clearer in modern English.'
- source_word: זָהָב מְזֻקָּק
  chosen: refined gold
  alternatives:
  - pure gold
  lexicon: HALOT
  rationale: מְזֻקָּק denotes gold that has been refined/purified. 'Refined gold'
    preserves the metallurgical sense more directly than the more traditional but
    slightly interpretive 'pure gold.'
- source_word: בַּמִּשְׁקָל
  chosen: by weight
  alternatives:
  - according to weight
  - in weight
  lexicon: HALOT
  rationale: The phrase indicates quantified allocation by measured weight. 'By weight'
    is concise and idiomatic while preserving the sense of specification.
- source_word: תַבְנִית
  chosen: the pattern
  alternatives:
  - the plan
  - the model
  lexicon: HALOT
  rationale: תַבְנִית often refers to a pattern, form, or architectural plan. 'Pattern'
    fits the broader temple-design context in this chapter and preserves possible
    connection to divinely given design language.
- source_word: הַמֶּרְכָּבָה
  chosen: the chariot
  alternatives:
  - the chariot-work
  - the chariot-throne
  lexicon: HALOT
  rationale: The noun normally means 'chariot.' In this difficult temple-context phrase,
    retaining 'chariot' is the most textually transparent choice rather than resolving
    it into a more interpretive expression. The likely sense is the cherubic structure
    conceived as a chariot-like throne support.
- source_word: הַכְּרֻבִים
  chosen: the cherubim
  alternatives:
  - the cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' is the standard English transliteration for the plural
    and preserves the technical biblical term better than the more colloquial ''cherubs.'''
- source_word: זָהָב
  chosen: of gold
  alternatives:
  - golden
  lexicon: HALOT
  rationale: Here the second occurrence of 'gold' most naturally qualifies the cherubim/pattern
    material. 'Of gold' is more concrete and less stylistically elevated than 'golden.'
- source_word: לְפֹרְשִׂים
  chosen: spreading out their wings
  alternatives:
  - outspread
  - stretching out
  lexicon: HALOT
  rationale: The participle from פרשׂ means to spread out. Supplying 'their wings'
    is contextually warranted because cherubim spread wings in the immediately recognizable
    temple imagery, and English requires the implied object for clarity.
- source_word: וְסֹכְכִים
  chosen: and overshadowing
  alternatives:
  - and covering
  - and sheltering over
  lexicon: HALOT
  rationale: The participle from סכך conveys covering/overshadowing. 'Overshadowing'
    matches the ark-cherubim imagery well and avoids flattening the cultic nuance
    to a generic 'covering.'
- source_word: אֲרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  lexicon: HALOT
  rationale: This preserves the full construct chain transparently. Per doctrine,
    יְהוָה is rendered 'the LORD.' The alternative English phrasing is also natural
    but slightly more interpretive in possessive form.
