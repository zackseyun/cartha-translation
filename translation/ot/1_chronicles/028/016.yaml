id: 1CH.28.16
reference: 1 Chronicles 28:16
source:
  edition: WLC
  text: וְ/אֶת הַ/זָּהָ֥ב מִשְׁקָ֛ל לְ/שֻׁלְחֲנ֥וֹת הַֽ/מַּעֲרֶ֖כֶת לְ/שֻׁלְחַ֣ן וְ/שֻׁלְחָ֑ן
    וְ/כֶ֖סֶף לְ/שֻׁלְחֲנ֥וֹת הַ/כָּֽסֶף־׃
translation:
  text: and the weight of the gold for the tables of the arrangement, for each table
    and table, and silver for the silver tables.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tables for the bread of arrangement,' traditionally 'tables for the
      showbread.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁקָל
  chosen: weight
  alternatives:
  - amount by weight
  - measure
  lexicon: HALOT
  rationale: In this temple-inventory context, the noun refers to the specified weight
    allocation of precious metal for each item, not an abstract 'value.' 'Weight'
    is the most direct and natural rendering.
- source_word: שֻׁלְחֲנוֹת הַמַּעֲרֶכֶת
  chosen: tables of the arrangement
  alternatives:
  - tables of the row
  - tables for the bread of arrangement
  - tables for the showbread
  lexicon: HALOT
  rationale: The Hebrew literally says 'tables of the arrangement.' The term מַעֲרֶכֶת
    refers to something arranged in order, here likely the bread set in rows before
    Yahweh. To avoid importing later traditional terminology too strongly into the
    main text, the more transparent 'arrangement' is retained, while the more idiomatic
    cultic sense is preserved in a footnote.
- source_word: לְשֻׁלְחָן וְשֻׁלְחָן
  chosen: for each table and table
  alternatives:
  - for table by table
  - for every table
  - for each individual table
  lexicon: HALOT
  rationale: The singular repeated construction distributively indicates item-by-item
    allocation. 'For each table and table' preserves the Hebrew repetition more closely
    than smoothing it away entirely, while still being intelligible in English.
- source_word: כֶּסֶף
  chosen: silver
  lexicon: HALOT
  rationale: The plain material term is intended here, contrasting with gold in the
    first half of the verse.
- source_word: שֻׁלְחֲנוֹת הַכָּסֶף
  chosen: the silver tables
  alternatives:
  - tables of silver
  - silver-plated tables
  lexicon: HALOT
  rationale: The construct phrase most naturally means tables made of silver or designated
    as silver tables. 'The silver tables' is concise and idiomatic.
