id: 1CH.28.11
reference: 1 Chronicles 28:11
source:
  edition: WLC
  text: וַ/יִּתֵּ֣ן דָּוִ֣יד לִ/שְׁלֹמֹ֣ה בְנ֡/וֹ אֶת תַּבְנִ֣ית הָ/אוּלָם֩ וְֽ/אֶת
    בָּ֨תָּ֜י/ו וְ/גַנְזַכָּ֧י/ו וַ/עֲלִיֹּתָ֛י/ו וַ/חֲדָרָ֥י/ו הַ/פְּנִימִ֖ים וּ/בֵ֥ית
    הַ/כַּפֹּֽרֶת־־׃
translation:
  text: Then David gave to Solomon his son the plan of the portico, its buildings,
    its treasuries, its upper rooms, its inner chambers, and the house of the mercy
    seat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the atonement cover' for 'the mercy seat.' The Hebrew כַּפֹּרֶת refers
      to the cover of the ark in the Most Holy Place.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּבְנִית
  chosen: plan
  alternatives:
  - pattern
  - design
  lexicon: HALOT
  rationale: תַּבְנִית denotes a model, pattern, or architectural plan. In this temple-building
    context, 'plan' is natural modern English while preserving the sense of a specified
    design David hands over.
- source_word: הָאוּלָם
  chosen: the portico
  alternatives:
  - the vestibule
  - the porch
  lexicon: HALOT
  rationale: אוּלָם refers to the entrance hall or porch-like structure of a monumental
    building. 'Portico' best fits the temple architectural setting in readable modern
    English.
- source_word: בָּתָּיו
  chosen: its buildings
  alternatives:
  - its houses
  - its rooms
  lexicon: HALOT
  rationale: Though בַּיִת often means 'house,' the plural here likely refers to the
    structural units or attached buildings associated with the temple complex rather
    than domestic houses. 'Buildings' captures the broader architectural sense.
- source_word: גַנְזַכָּיו
  chosen: its treasuries
  alternatives:
  - its storehouses
  - its treasuries/treasure rooms
  lexicon: HALOT
  rationale: The term refers to places where valuables or dedicated items are stored.
    'Treasuries' is the most idiomatic rendering in temple context.
- source_word: עֲלִיֹּתָיו
  chosen: its upper rooms
  alternatives:
  - its upper chambers
  - its upper stories
  lexicon: HALOT
  rationale: עֲלִיָּה commonly denotes an upper room or upper chamber. 'Upper rooms'
    is clear and sufficiently concrete.
- source_word: חֲדָרָיו הַפְּנִימִים
  chosen: its inner chambers
  alternatives:
  - its inner rooms
  - its innermost chambers
  lexicon: HALOT
  rationale: חֶדֶר means room/chamber, and הַפְּנִימִים specifies the interior ones.
    'Inner chambers' preserves the architectural description without overstating with
    'innermost,' which could imply a superlative not explicit in the Hebrew.
- source_word: בֵית הַכַּפֹּרֶת
  chosen: the house of the mercy seat
  alternatives:
  - the room of the mercy seat
  - the house of atonement
  lexicon: HALOT
  rationale: Literally this is 'house of the kapporet.' Since כַּפֹּרֶת in temple/tabernacle
    usage refers to the cover of the ark, traditionally 'mercy seat,' the phrase likely
    denotes the Most Holy Place as the chamber housing it. 'House of the mercy seat'
    stays close to the Hebrew while remaining intelligible.
- source_word: וַיִּתֵּן
  chosen: Then David gave
  alternatives:
  - And David gave
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then David gave' reads naturally
    in English and reflects sequential action.
