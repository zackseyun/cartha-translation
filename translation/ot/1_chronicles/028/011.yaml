theological_decisions:
- issue: Rendering כַּפֹּרֶת in temple terminology
  chosen_reading: mercy seat
  alternative_readings:
  - atonement cover
  rationale: Although 'atonement cover' is a possible explanatory rendering, 'mercy
    seat' remains the most recognizable and contextually precise English equivalent
    for כַּפֹּרֶת in sanctuary language. This verse is architectural rather than doctrinal,
    so preserving the established cultic term is preferable, with the alternative
    noted in a footnote for transparency.
  doctrine_reference: Translation philosophy §1, §6
