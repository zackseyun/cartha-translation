theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the LXX pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render בַּיִת as 'house' or interpretively as 'temple'
  chosen_reading: a house for the sanctuary
  alternative_readings:
  - the temple
  - a temple sanctuary
  rationale: The verse commissions Solomon to build the temple, but the Hebrew uses
    the common idiom 'house' plus 'for the sanctuary.' Retaining 'house' avoids over-interpretation
    while still making the cultic purpose clear through 'for the sanctuary.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy
    over translation tradition'
