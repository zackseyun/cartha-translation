id: 1CH.28.10
reference: 1 Chronicles 28:10
source:
  edition: WLC
  text: רְאֵ֣ה עַתָּ֗ה כִּֽי יְהוָ֛ה בָּ֧חַר בְּ/ךָ֛ לִ/בְנֽוֹת בַּ֥יִת לַ/מִּקְדָּ֖שׁ
    חֲזַ֥ק וַ/עֲשֵֽׂה׀־־׃פ
translation:
  text: See now, for the LORD has chosen you to build a house for the sanctuary. Be
    strong, and do it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Consider now' or 'Take heed now.' The opening imperative calls for attentive
      reflection, not only physical sight.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a house for the sanctuary'; that is, the temple building as a holy
      place.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  chosen: See now
  alternatives:
  - Consider now
  - Take heed now
  - Look now
  lexicon: HALOT
  rationale: Imperative of ראה used idiomatically to call attention, not merely visual
    seeing. 'See now' preserves the directness of the Hebrew while remaining natural
    in English.
- source_word: עַתָּה
  chosen: now
  alternatives:
  - at this time
  lexicon: HALOT
  rationale: Temporal/discourse particle reinforcing the immediacy of the exhortation;
    naturally paired with the opening imperative.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the ground for the exhortation. 'For' best conveys
    the motivational force linking the command to the reason given.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated.
- source_word: בָּחַר בְּךָ
  chosen: has chosen you
  alternatives:
  - chose you
  - selected you
  lexicon: HALOT
  rationale: בחר denotes divine choosing/election for a task. The English present
    perfect fits the Hebrew perfect in this exhortational context, emphasizing a completed
    choice with present relevance.
- source_word: לִבְנוֹת
  chosen: to build
  alternatives:
  - to construct
  lexicon: HALOT
  rationale: Standard infinitive of בנה; 'build' is the natural and sufficiently formal
    rendering.
- source_word: בַּיִת
  chosen: a house
  alternatives:
  - a temple
  lexicon: HALOT
  rationale: The Hebrew literally says 'house.' Although the referent is the temple,
    retaining 'house' preserves the source wording and its common biblical idiom for
    God's dwelling.
- source_word: לַמִּקְדָּשׁ
  chosen: for the sanctuary
  alternatives:
  - as a sanctuary
  - for the holy place
  lexicon: HALOT
  rationale: מקדש denotes a holy place/sanctuary. The phrase 'a house for the sanctuary'
    reflects the Hebrew sequence without collapsing both nouns into simply 'temple.'
    It likely means a house intended as the sanctuary, but this more literal rendering
    preserves the wording.
- source_word: חֲזַק
  chosen: Be strong
  alternatives:
  - Be courageous
  - Be firm
  lexicon: HALOT
  rationale: Imperative exhortation to strength/resolution. 'Be strong' is the standard
    rendering and fits the commissioning context.
- source_word: וַעֲשֵׂה
  chosen: and do it
  alternatives:
  - and act
  - and make it
  - and do
  lexicon: HALOT
  rationale: עשה here is a broad verb of action. In context, 'do it' idiomatically
    conveys the charge to carry out the building task, making explicit in English
    what is contextually implied.
