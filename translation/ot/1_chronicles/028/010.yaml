theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render בַּיִת as 'house' or interpretively as 'temple'
  chosen_reading: a house for the sanctuary
  alternative_readings:
  - the temple
  - a temple sanctuary
  rationale: The verse commissions Solomon to build the temple, but the Hebrew uses the common idiom 'house' plus 'for the sanctuary.' Retaining 'house' avoids over-interpretation while still making the cultic purpose clear through 'for the sanctuary.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition'
