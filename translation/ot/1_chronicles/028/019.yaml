id: 1CH.28.19
reference: 1 Chronicles 28:19
source:
  edition: WLC
  text: הַ/כֹּ֥ל בִּ/כְתָ֛ב מִ/יַּ֥ד יְהוָ֖ה עָלַ֣/י הִשְׂכִּ֑יל כֹּ֖ל מַלְאֲכ֥וֹת הַ/תַּבְנִֽית׃פ
translation:
  text: All this he made clear to me in writing from the hand of Yahweh, all the works of the pattern.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The hand of the LORD was upon me, and he made me understand all the works of the pattern.'
    reason: alternative_reading
  - marker: b
    text: '''Pattern'' may also be rendered ''plan'' or ''design.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּל
  chosen: All this
  alternatives:
  - The whole thing
  - All of it
  lexicon: HALOT
  rationale: 'The demonstrative sense is supplied by context: David is referring to the entirety of the temple plan just described. ''All this'' is idiomatic English and preserves the comprehensive force of כֹּל.'
- source_word: בִּכְתָב
  chosen: in writing
  alternatives:
  - as a writing
  - in a document
  lexicon: HALOT
  rationale: The preposition ב plus כְּתָב naturally yields 'in writing,' indicating that the plan was given in written form rather than merely orally.
- source_word: מִיַּד יְהוָה
  chosen: from the hand of the LORD
  alternatives:
  - from the LORD
  - by the hand of the LORD
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is retained because it is a common Hebrew expression for direct divine agency. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name in accordance with the doctrine table.
- source_word: עָלַי
  chosen: upon me
  alternatives:
  - on me
  - to me
  lexicon: HALOT
  rationale: The phrase is somewhat compressed in Hebrew. 'Upon me' preserves the literal preposition and fits the idiom of divine influence or inspiration resting on David.
- source_word: הִשְׂכִּיל
  chosen: he gave insight
  alternatives:
  - he made understand
  - he instructed
  - he caused to understand
  lexicon: HALOT
  rationale: Hiphil of שׂכל here conveys causing understanding or giving skill/insight. 'He gave insight' is readable modern English while preserving the causative sense.
- source_word: כֹּל מַלְאֲכוֹת
  chosen: all the works
  alternatives:
  - all the workmanship
  - all the tasks
  lexicon: HALOT
  rationale: מְלָאכוֹת refers to works, workmanship, or tasks involved in carrying out the design. 'Works' is broad enough to include the various components and labors of the temple plan.
- source_word: הַתַּבְנִית
  chosen: the pattern
  alternatives:
  - the plan
  - the design
  lexicon: HALOT
  rationale: תַּבְנִית often denotes a pattern, model, or architectural plan. 'Pattern' preserves the possible echo of divinely revealed sanctuary design while remaining natural in English.
