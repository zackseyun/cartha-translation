theological_decisions:
- issue: How to construe the compressed clause עָלַי הִשְׂכִּיל
  chosen_reading: 'The LORD is the subject: ''from the hand of the LORD upon me, he gave insight'''
  alternative_readings:
  - '''The hand of the LORD was upon me; he gave me insight'''
  - '''He made me understand it all in writing by his hand upon me'''
  rationale: The Hebrew is terse and allows slightly different syntactic unpackings. The chosen rendering keeps the LORD as the implied subject of הִשְׂכִּיל and preserves both divine agency and the notion of revelation resting upon David, without over-paraphrasing into a smoother but less transparent English sentence.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather than resolve it'
