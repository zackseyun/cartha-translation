id: 1CH.28.20
reference: 1 Chronicles 28:20
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר דָּוִ֜יד לִ/שְׁלֹמֹ֣ה בְנ֗/וֹ חֲזַ֤ק וֶ/אֱמַץ֙ וַ/עֲשֵׂ֔ה אַל תִּירָ֖א וְ/אַל תֵּחָ֑ת כִּי֩ יְהוָ֨ה אֱלֹהִ֤ים אֱלֹהַ/י֙ עִמָּ֔/ךְ לֹ֤א יַרְפְּ/ךָ֙ וְ/לֹ֣א יַֽעַזְבֶ֔/ךָּ עַד לִ/כְל֕וֹת כָּל מְלֶ֖אכֶת עֲבוֹדַ֥ת בֵּית יְהוָֽה־־־־־׃
translation:
  text: And David said to Solomon his son, “Be strong and courageous, and do it. Do not fear or be dismayed, for Yahweh God, my God, is with you. He will not fail you or forsake you until all the work for the service of the house of Yahweh is finished.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He will not let go of you'; the Hebrew verb can carry the sense of not slackening or dropping one's support.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲזַק
  chosen: Be strong
  alternatives:
  - Be firm
  - Be strengthened
  lexicon: HALOT
  rationale: Imperative to Solomon calling for strength/courage in undertaking the temple task. 'Be strong' is the most natural and established English equivalent and pairs well with the following verb.
- source_word: וֶאֱמַץ
  chosen: and courageous
  alternatives:
  - and be courageous
  - and be resolute
  lexicon: HALOT
  rationale: From אמץ in the imperative, commonly paired with חזק. English idiom regularly renders the pair 'be strong and courageous.' I omitted the repeated 'be' for natural style while preserving the imperative force.
- source_word: וַעֲשֵׂה
  chosen: and do it
  alternatives:
  - and act
  - and do
  lexicon: HALOT
  rationale: 'The verb is a direct imperative following the exhortation. ''Do it'' makes explicit the action-oriented force in context: Solomon is to proceed with the temple work. This is slightly more idiomatic than bare ''and do'' while still warranted by context.'
- source_word: אַל תִּירָא
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: Standard rendering of ירא in prohibition. 'Do not fear' is concise and preserves the lexical connection with common biblical exhortation formulas.
- source_word: וְאַל תֵּחָת
  chosen: or be dismayed
  alternatives:
  - or be shattered
  - or be terrified
  lexicon: HALOT
  rationale: חתת in this exhortation formula conveys discouragement or collapse of resolve. 'Be dismayed' is the best idiomatic English equivalent in this context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהִים אֱלֹהַי
  chosen: God, my God
  alternatives:
  - God—my God
  - God, the God I worship
  lexicon: HALOT
  rationale: 'The appositional sequence emphasizes both deity and David''s personal covenant relation: ''the LORD God, my God.'' This preserves the Hebrew repetition without over-paraphrase.'
- source_word: עִמָּךְ
  chosen: is with you
  alternatives:
  - will be with you
  lexicon: HALOT
  rationale: The prepositional phrase lacks an explicit verb, so English supplies one. Present 'is with you' best reflects the nominal clause as stated, while the following future verbs carry the forward-looking assurance.
- source_word: לֹא יַרְפְּךָ
  chosen: He will not fail you
  alternatives:
  - He will not let go of you
  - He will not drop you
  - He will not leave you helpless
  lexicon: HALOT
  rationale: The Hiphil of רפה here conveys not relaxing support or letting one's grip slacken. In English exhortation formulas, 'fail you' best captures the sense alongside 'forsake you,' and matches the covenant-assurance idiom without wooden literalism.
- source_word: וְלֹא יַעַזְבֶךָּ
  chosen: or forsake you
  alternatives:
  - or abandon you
  - or leave you
  lexicon: HALOT
  rationale: עזב in covenantal reassurance is well rendered 'forsake.' This preserves the solemn biblical resonance and pairs naturally with 'fail you.'
- source_word: עַד לִכְלוֹת
  chosen: until ... is finished
  alternatives:
  - until ... is completed
  - until the finishing of
  lexicon: HALOT
  rationale: The infinitive construct of כלה marks the endpoint of God's sustaining presence in relation to the task. Rendering with a passive English clause is natural and faithful.
- source_word: כָּל מְלֶאכֶת עֲבוֹדַת בֵּית יְהוָה
  chosen: all the work for the service of the house of the LORD
  alternatives:
  - all the work of the service of the house of the LORD
  - all the workmanship for the ministry of the house of the LORD
  - all the work related to the service of the house of the LORD
  lexicon: HALOT
  rationale: The construct chain is dense. 'Work for the service of the house of the LORD' preserves both מְלֶאכֶת ('work') and עֲבוֹדַת ('service') without awkward literalism. 'House of the LORD' is retained as the standard temple designation.
