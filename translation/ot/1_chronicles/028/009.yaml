id: 1CH.28.9
reference: 1 Chronicles 28:9
source:
  edition: WLC
  text: וְ/אַתָּ֣ה שְׁלֹמֹֽה בְנִ֡/י דַּע֩ אֶת אֱלֹהֵ֨י אָבִ֜י/ךָ וְ/עָבְדֵ֗/הוּ בְּ/לֵ֤ב שָׁלֵם֙ וּ/בְ/נֶ֣פֶשׁ חֲפֵצָ֔ה כִּ֤י כָל לְבָבוֹת֙ דּוֹרֵ֣שׁ יְהוָ֔ה וְ/כָל יֵ֥צֶר מַחֲשָׁב֖וֹת מֵבִ֑ין אִֽם תִּדְרְשֶׁ֨/נּוּ֙ יִמָּ֣צֵא לָ֔/ךְ וְ/אִם תַּֽעַזְבֶ֖/נּוּ יַזְנִיחֲ/ךָ֥ לָ/עַֽד־־־־־־׃
translation:
  text: And you, Solomon my son, know the God of your father and serve him with a whole heart and a willing soul, for Yahweh searches all hearts and understands every intention of the thoughts. If you seek him, he will let himself be found by you; but if you forsake him, he will cast you off forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will be found by you.' The Hebrew verb is passive/reflexive in form.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will reject you forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּע
  chosen: know
  alternatives:
  - acknowledge
  - come to know
  lexicon: HALOT
  rationale: Imperative of ידע calls Solomon to personal knowledge/recognition of God, not merely intellectual awareness. 'Know' preserves the covenantal and relational force without overexpansion.
- source_word: אֱלֹהֵי אָבִיךָ
  chosen: the God of your father
  alternatives:
  - your father's God
  lexicon: HALOT
  rationale: Construct phrase is most naturally rendered 'the God of your father.' This preserves the familial and covenantal continuity in David's charge to Solomon.
- source_word: וְעָבְדֵהוּ
  chosen: and serve him
  alternatives:
  - and worship him
  lexicon: HALOT
  rationale: עבד in relation to God can include worshipful service, but 'serve him' best preserves the broader sense of devoted obedience and worship together.
- source_word: בְּלֵב שָׁלֵם
  chosen: with a whole heart
  alternatives:
  - with a perfect heart
  - with an undivided heart
  lexicon: HALOT
  rationale: שָׁלֵם conveys completeness, wholeness, and integrity. 'Whole heart' is natural modern English and avoids the misleading modern sense of 'perfect' as sinless flawlessness.
- source_word: וּבְנֶפֶשׁ חֲפֵצָה
  chosen: and a willing soul
  alternatives:
  - and a willing mind
  - and a delighted soul
  lexicon: HALOT
  rationale: נֶפֶשׁ is more than 'mind'; it denotes the inner self/person. חֲפֵצָה conveys willingness, desire, or delight. 'Willing soul' preserves both the anthropological and volitional sense.
- source_word: כִּי כָל לְבָבוֹת דּוֹרֵשׁ יְהוָה
  chosen: for the LORD searches all hearts
  alternatives:
  - for the LORD seeks all hearts
  - for the LORD examines all hearts
  lexicon: HALOT
  rationale: דרשׁ here means to search out or examine, not to seek in the sense of needing to find. 'Searches all hearts' is idiomatic and fits the explanatory clause.
- source_word: וְכָל יֵצֶר מַחֲשָׁבוֹת מֵבִין
  chosen: and understands every intention of the thoughts
  alternatives:
  - and understands every inclination of the thoughts
  - and discerns every forming of thoughts
  lexicon: HALOT
  rationale: יֵצֶר denotes formation, inclination, or intention; with מַחֲשָׁבוֹת it refers to the inner shaping of thoughts. 'Every intention of the thoughts' communicates the inward motivational sense clearly.
- source_word: אִם תִּדְרְשֶׁנּוּ
  chosen: If you seek him
  alternatives:
  - If you inquire of him
  lexicon: HALOT
  rationale: דרשׁ in this covenantal context means to seek God in devotion and dependence. 'Seek him' is the standard and clearest rendering.
- source_word: יִמָּצֵא לָךְ
  chosen: he will let himself be found by you
  alternatives:
  - he will be found by you
  - you will find him
  lexicon: HALOT
  rationale: 'The Niphal of מצא is passive/reflexive in sense: ''be found.'' ''Let himself be found by you'' brings out the theological nuance that access to God is granted, while remaining faithful to the Hebrew.'
- source_word: תַּעַזְבֶנּוּ
  chosen: if you forsake him
  alternatives:
  - if you abandon him
  - if you leave him
  lexicon: HALOT
  rationale: עזב in covenant contexts often carries the force of forsaking or abandoning loyalty. 'Forsake' preserves the solemn covenantal tone.
- source_word: יַזְנִיחֲךָ לָעַד
  chosen: he will cast you off forever
  alternatives:
  - he will reject you forever
  - he will abandon you forever
  lexicon: HALOT
  rationale: The Hiphil of זנח conveys rejection or casting off. 'Cast you off forever' is strong, solemn, and fits the warning context. 'Forever' straightforwardly renders לָעַד.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
