theological_decisions:
- issue: Anthropological language in 'heart' and 'soul'
  chosen_reading: Retained 'heart' and 'soul' rather than reducing both to psychological categories such as 'mind.'
  alternative_readings:
  - with a perfect heart and a willing mind
  rationale: The Hebrew distinguishes לֵב and נֶפֶשׁ, expressing total inner devotion. Preserving both terms maintains the text's theological anthropology and avoids flattening the call to wholehearted covenant fidelity.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Divine accessibility in יִמָּצֵא לָךְ
  chosen_reading: Rendered 'he will let himself be found by you' in the main text.
  alternative_readings:
  - he will be found by you
  - you will find him
  rationale: The Niphal form suggests that God is found in a way that depends on his self-disclosure, not merely human discovery. This wording preserves that tension without importing a later doctrinal system.
  doctrine_reference: Translation philosophy §3
- issue: Severity of covenant warning
  chosen_reading: Rendered יַזְנִיחֲךָ לָעַד as 'he will cast you off forever.'
  alternative_readings:
  - he will reject you forever
  - he will abandon you forever
  rationale: The verse presents a stark covenantal warning from David to Solomon. The translation should preserve the gravity of the warning without softening it or resolving broader theological questions about perseverance beyond what the text states.
  doctrine_reference: Translation philosophy §3
