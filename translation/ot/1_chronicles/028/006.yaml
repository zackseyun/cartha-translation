id: 1CH.28.6
reference: 1 Chronicles 28:6
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לִ֔/י שְׁלֹמֹ֣ה בִנְ/ךָ֔ הֽוּא יִבְנֶ֥ה בֵיתִ֖/י וַ/חֲצֵרוֹתָ֑/י
    כִּי בָחַ֨רְתִּי ב֥/וֹ לִ/י֙ לְ/בֵ֔ן וַ/אֲנִ֖י אֶֽהְיֶה לּ֥/וֹ לְ/אָֽב־־־׃
translation:
  text: And he said to me, ‘Solomon your son—he will build my house and my courts,
    for I have chosen him for myself as a son, and I will be to him as a father.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'I have chosen him to be my son, and I will be his
      father.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר לִי
  chosen: And he said to me
  alternatives:
  - And he told me
  lexicon: HALOT
  rationale: The waw-consecutive with אמר is naturally rendered as a past narrative
    verb, and לִי marks the indirect object. 'Said to me' is the most transparent
    rendering in context.
- source_word: שְׁלֹמֹה בִנְךָ
  chosen: Solomon your son
  alternatives:
  - your son Solomon
  lexicon: HALOT
  rationale: Personal names are transliterated. The construct phrase literally means
    'Solomon, your son'; English can render either order, but 'Solomon your son' preserves
    the Hebrew emphasis and apposition.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis: ''he'' or ''he himself.'' In
    English, the emphasis is conveyed adequately by the dash construction in the sentence
    without overtranslating.'
- source_word: יִבְנֶה בֵיתִי
  chosen: will build my house
  alternatives:
  - will build my temple
  lexicon: HALOT
  rationale: בנה + בית is literally 'build my house.' Although the referent is the
    temple, 'house' preserves the covenantal and theological resonance of the Hebrew
    while remaining clear in context.
- source_word: וַחֲצֵרוֹתָי
  chosen: and my courts
  alternatives:
  - and my courtyards
  lexicon: HALOT
  rationale: חָצֵר in temple context refers to enclosed court areas. 'Courts' is the
    standard concise rendering; 'courtyards' is possible but slightly more interpretive.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: כִּי introduces the reason for Solomon's role. 'For' fits elevated but
    readable English and links the rationale smoothly.
- source_word: בָחַרְתִּי בוֹ
  chosen: I have chosen him
  alternatives:
  - I chose him
  lexicon: HALOT
  rationale: The perfect can be rendered as a present-result state in English. 'I
    have chosen him' highlights the abiding force of the divine choice in this context.
- source_word: לִי לְבֵן
  chosen: for myself as a son
  alternatives:
  - to be my son
  - for a son to myself
  lexicon: HALOT
  rationale: The double lamed construction is somewhat idiomatic. 'For myself as a
    son' preserves both לִי and לְבֵן without flattening the phrase into a simple
    possessive, while still reading naturally.
- source_word: וַאֲנִי אֶהְיֶה לוֹ לְאָב
  chosen: and I will be to him as a father
  alternatives:
  - and I will be his father
  lexicon: HALOT
  rationale: The Hebrew is literally 'I will be to him for a father.' 'I will be his
    father' is idiomatic English, but 'be to him as a father' more closely preserves
    the covenantal formulation and its relational nuance.
