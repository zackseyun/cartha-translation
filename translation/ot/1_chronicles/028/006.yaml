theological_decisions:
- issue: Father-son language in God's relationship to Solomon
  chosen_reading: 'Retain the filial language straightforwardly: ''I have chosen him
    for myself as a son, and I will be to him as a father.'''
  alternative_readings:
  - I have chosen him to be my son, and I will be his father
  rationale: The verse echoes royal covenant language and should not be weakened into
    merely metaphorical or functional language. At the same time, the translation
    should not import later Christological conclusions into this immediate context.
    The chosen rendering preserves the covenantal relationship in the wording of the
    Hebrew.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 4
