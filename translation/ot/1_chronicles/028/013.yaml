id: 1CH.28.13
reference: 1 Chronicles 28:13
source:
  edition: WLC
  text: וּֽ/לְ/מַחְלְקוֹת֙ הַ/כֹּהֲנִ֣ים וְ/הַ/לְוִיִּ֔ם וּֽ/לְ/כָל מְלֶ֖אכֶת עֲבוֹדַ֣ת בֵּית יְהוָ֑ה וּֽ/לְ/כָל כְּלֵ֖י עֲבוֹדַ֥ת בֵּית יְהוָֽה־־־־׃
translation:
  text: for the divisions of the priests and the Levites, and for all the work of the service of the house of Yahweh, and for all the vessels of service of the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'courses' of the priests and the Levites.
    reason: lexical_alternative
  - marker: b
    text: Or 'articles' or 'implements' for the service of the house of the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחְלְקוֹת
  chosen: divisions
  alternatives:
  - courses
  - groups
  - departments
  lexicon: HALOT
  rationale: In Chronicles this term commonly refers to organized priestly/Levitical divisions or assigned groups. 'Divisions' is clear modern English and preserves the administrative sense better than the more traditional but less transparent 'courses'.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of the noun for Israel's priestly class; definite article retained.
- source_word: וְהַלְוִיִּם
  chosen: and the Levites
  lexicon: HALOT
  rationale: Proper tribal/service designation; transliterated in standard English form rather than paraphrased.
- source_word: מְלֶאכֶת
  chosen: work
  alternatives:
  - labor
  lexicon: HALOT
  rationale: A broad term for work or craftsmanship. Here it introduces the totality of temple-related tasks, so 'work' is the most natural and sufficiently broad rendering.
- source_word: עֲבוֹדַת
  chosen: service
  alternatives:
  - ministry
  - labor
  lexicon: HALOT
  rationale: Refers to cultic or assigned service. 'Service' preserves the temple-duty sense without importing later ecclesiastical language such as 'ministry'.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew expression while remaining understandable. 'LORD' follows the project's required rendering of YHWH.
- source_word: כְּלֵי
  chosen: vessels
  alternatives:
  - articles
  - utensils
  - implements
  lexicon: HALOT
  rationale: Refers to the various objects used in temple service. 'Vessels' is a conventional and suitably broad rendering for sacred service items, though not limited to containers.
- source_word: לְכָל
  chosen: for all
  alternatives:
  - for every
  - concerning all
  lexicon: HALOT
  rationale: The repeated preposition plus 'all' structures the verse as listing categories covered by the plan. 'For all' preserves that list-like function in smooth English.
