id: 1CH.28.1
reference: 1 Chronicles 28:1
source:
  edition: WLC
  text: וַ/יַּקְהֵ֣ל דָּוִ֣יד אֶת כָּל שָׂרֵ֣י יִשְׂרָאֵ֡ל שָׂרֵ֣י הַ/שְּׁבָטִ֣ים
    וְ/שָׂרֵ֣י הַ/מַּחְלְק֣וֹת הַ/מְשָׁרְתִ֪ים אֶת הַ/מֶּ֟לֶךְ וְ/שָׂרֵ֣י הָ/אֲלָפִ֣ים
    וְ/שָׂרֵ֣י הַ/מֵּא֡וֹת וְ/שָׂרֵ֣י כָל רְכוּשׁ וּ/מִקְנֶה֩ לַ/מֶּ֨לֶךְ וּ/לְ/בָנָ֜י/ו
    עִם הַ/סָּרִיסִ֧ים וְ/הַ/גִּבּוֹרִ֛ים וּֽ/לְ/כָל גִּבּ֥וֹר חָ֖יִל אֶל יְרוּשָׁלִָֽם־־־־־׀־־־׃
translation:
  text: 'Then David assembled at Jerusalem all the leaders of Israel: the leaders
    of the tribes, the leaders of the divisions that served the king, the commanders
    of thousands and of hundreds, and the leaders over all the property and livestock
    belonging to the king and to his sons, together with the court officials, the
    mighty men, and every mighty man of valor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eunuchs'; the Hebrew term can refer either to literal eunuchs or more
      generally to royal court officials.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְהֵל
  chosen: assembled
  alternatives:
  - gathered together
  - convened
  lexicon: HALOT
  rationale: The hiphil wayyiqtol of קהל here denotes causing a formal gathering.
    'Assembled' fits the official, public setting better than the more generic 'gathered
    together.'
- source_word: שָׂרֵי יִשְׂרָאֵל
  chosen: the leaders of Israel
  alternatives:
  - the officials of Israel
  - the princes of Israel
  lexicon: HALOT
  rationale: שַׂר can mean leader, official, commander, or prince depending on context.
    Because the verse then specifies multiple categories of administrative and military
    figures, 'leaders' is the broadest accurate umbrella term.
- source_word: שָׂרֵי הַשְּׁבָטִים
  chosen: the leaders of the tribes
  alternatives:
  - the chiefs of the tribes
  - the princes of the tribes
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'Leaders' maintains consistency with
    the broader use of שַׂר while remaining natural English.
- source_word: הַמַּחְלְקוֹת הַמְשָׁרְתִים אֶת הַמֶּלֶךְ
  chosen: the divisions that served the king
  alternatives:
  - the divisions ministering to the king
  - the courses serving the king
  lexicon: HALOT
  rationale: מַחְלְקוֹת refers to organized divisions or courses; מְשָׁרְתִים means
    serving/ministering. 'Divisions that served the king' is clear modern English
    and preserves the administrative sense.
- source_word: שָׂרֵי הָאֲלָפִים
  chosen: the commanders of thousands
  alternatives:
  - the captains of thousands
  - the leaders of thousands
  lexicon: HALOT
  rationale: In military-administrative contexts, שַׂר is well rendered 'commander.'
    'Thousands' reflects the Hebrew unit without overexplaining whether it is strictly
    numerical or organizational.
- source_word: שָׂרֵי הַמֵּאוֹת
  chosen: of hundreds
  alternatives:
  - the commanders of hundreds
  - the captains of hundreds
  lexicon: HALOT
  rationale: The second phrase is syntactically dependent on the prior 'commanders,'
    so 'of hundreds' avoids unnecessary repetition while preserving the parallel structure.
- source_word: רְכוּשׁ
  chosen: property
  alternatives:
  - goods
  - possessions
  lexicon: HALOT
  rationale: רְכוּשׁ denotes movable property/wealth. 'Property' is broad and works
    well alongside 'livestock' as a paired expression.
- source_word: מִקְנֶה
  chosen: livestock
  alternatives:
  - cattle
  - herds
  lexicon: HALOT
  rationale: מִקְנֶה commonly refers to livestock or acquired animals generally, not
    only cattle. 'Livestock' is the most accurate broad rendering.
- source_word: לַמֶּלֶךְ וּלְבָנָיו
  chosen: belonging to the king and to his sons
  alternatives:
  - of the king and his sons
  - for the king and his sons
  lexicon: HALOT
  rationale: The lamed here marks possession/association in context. 'Belonging to'
    makes the relationship explicit and natural in English.
- source_word: הַסָּרִיסִים
  chosen: the court officials
  alternatives:
  - the eunuchs
  lexicon: HALOT
  rationale: סָרִיס can denote either literal eunuchs or, more broadly, royal court
    officials. In this administrative list, the official function is foregrounded,
    so 'court officials' is preferred while preserving 'eunuchs' in a footnote as
    a lexical alternative.
- source_word: הַגִּבּוֹרִים
  chosen: the mighty men
  alternatives:
  - the warriors
  - the heroes
  lexicon: HALOT
  rationale: גִּבּוֹרִים in Chronicles often refers to David's notable warriors. 'Mighty
    men' preserves the traditional and contextual sense without becoming archaic.
- source_word: כָל גִּבּוֹר חָיִל
  chosen: every mighty man of valor
  alternatives:
  - every valiant warrior
  - every capable fighting man
  lexicon: HALOT
  rationale: The phrase combines personal strength/status (גִּבּוֹר) with valor, strength,
    or military capability (חַיִל). 'Mighty man of valor' is a conventional but still
    intelligible rendering that preserves the idiomatic force.
- source_word: אֶל יְרוּשָׁלִָם
  chosen: at Jerusalem
  alternatives:
  - to Jerusalem
  - in Jerusalem
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' with verbs of assembling it can indicate
    the destination of the gathering. In idiomatic English, 'assembled at Jerusalem'
    communicates the completed gathering most naturally.
