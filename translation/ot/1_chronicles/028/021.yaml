theological_decisions:
- issue: Gendered reference in נָדִיב
  chosen_reading: every willing man
  alternative_readings:
  - everyone willing
  - every volunteer
  rationale: The Hebrew uses a masculine singular form. Per the project's gender-accurate
    policy, the translation preserves the masculine form rather than neutralizing
    it, while recognizing that the phrase may function representatively for available
    workers in context.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering בֵּית הָאֱלֹהִים
  chosen_reading: the house of God
  alternative_readings:
  - the temple
  rationale: The Hebrew expression is concrete and cultic. 'House of God' preserves
    the source wording and avoids importing a more interpretive shorthand, though
    'temple' is contextually accurate.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
