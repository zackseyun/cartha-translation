id: 1CH.28.21
reference: 1 Chronicles 28:21
source:
  edition: WLC
  text: וְ/הִנֵּ֗ה מַחְלְקוֹת֙ הַ/כֹּהֲנִ֣ים וְ/הַ/לְוִיִּ֔ם לְ/כָל עֲבוֹדַ֖ת בֵּ֣ית
    הָ/אֱלֹהִ֑ים וְ/עִמְּ/ךָ֙ בְ/כָל מְלָאכָ֜ה לְ/כָל נָדִ֤יב בַּֽ/חָכְמָה֙ לְ/כָל
    עֲבוֹדָ֔ה וְ/הַ/שָּׂרִ֥ים וְ/כָל הָ/עָ֖ם לְ/כָל דְּבָרֶֽי/ךָ־־־־־־׃פ
translation:
  text: And behold, the divisions of the priests and the Levites are for all the service
    of the house of God, and with you in all the work will be every willing man skilled
    in wisdom for every kind of service; the officials also, and all the people, will
    be wholly at your command.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every volunteer skilled in wisdom.' The Hebrew literally has 'every
      willing man in wisdom' for every service.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for all your words'; that is, ready to carry out all your directives
      or matters.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And see
  - Now behold
  lexicon: HALOT
  rationale: Retains the deictic, attention-directing force of the Hebrew discourse
    marker rather than omitting it. 'Behold' is slightly formal but still readable
    and preserves the rhetorical emphasis of David's assurance.
- source_word: מַחְלְקוֹת
  chosen: divisions
  alternatives:
  - courses
  - groups
  - departments
  lexicon: HALOT
  rationale: Refers to organized priestly/Levitical divisions or rotations. 'Divisions'
    is clear modern English and avoids the more traditional but less transparent 'courses.'
- source_word: הַכֹּהֲנִים וְהַלְוִיִּם
  chosen: the priests and the Levites
  lexicon: HALOT
  rationale: Straightforward rendering of the two temple-service groups; preserving
    both terms reflects the text's institutional specificity.
- source_word: לְכָל עֲבוֹדַת בֵּית הָאֱלֹהִים
  chosen: for all the service of the house of God
  alternatives:
  - for every service of the house of God
  - for all the work of the house of God
  lexicon: HALOT
  rationale: 'The preposition and noun together indicate purpose/sphere: these divisions
    are appointed for the full range of temple service. ''House of God'' preserves
    the concrete cultic expression rather than flattening it to ''temple''.'
- source_word: וְעִמְּךָ
  chosen: and with you
  alternatives:
  - and at your side
  lexicon: HALOT
  rationale: Expresses support alongside Solomon. 'With you' is the most direct rendering.
- source_word: בְכָל מְלָאכָה
  chosen: in all the work
  alternatives:
  - for every task
  - in every kind of work
  lexicon: HALOT
  rationale: מְלָאכָה here denotes practical labor/tasking connected with the project.
    'Work' keeps the broad scope and pairs naturally with the following clauses.
- source_word: לְכָל נָדִיב
  chosen: every willing man
  alternatives:
  - every volunteer
  - everyone willing
  lexicon: HALOT
  rationale: נָדִיב here denotes one who is willing/noble-hearted, likely a volunteer.
    Because the Hebrew form is masculine singular and refers to persons available
    for service, 'man' preserves the gendered form per the project's gender-accurate
    policy, while 'willing' captures the voluntariness.
- source_word: בַּחָכְמָה
  chosen: skilled in wisdom
  alternatives:
  - skillful
  - wise
  - skilled
  lexicon: HALOT
  rationale: In craftsmanship/administrative contexts חָכְמָה often carries the sense
    of practical skill informed by wisdom. 'Skilled in wisdom' preserves the lexical
    link to 'wisdom' while making sense in English.
- source_word: לְכָל עֲבוֹדָה
  chosen: for every kind of service
  alternatives:
  - for every task
  - for all service
  lexicon: HALOT
  rationale: Keeps a distinction from the earlier מְלָאכָה while still overlapping
    semantically. 'Every kind of service' reflects the broad applicability of the
    skilled volunteers.
- source_word: וְהַשָּׂרִים
  chosen: the officials also
  alternatives:
  - the leaders also
  - the princes also
  lexicon: HALOT
  rationale: In this royal-administrative context, שָׂרִים are governing officers
    or leaders. 'Officials' best fits modern English without implying hereditary nobility
    as 'princes' might.
- source_word: וְכָל הָעָם
  chosen: and all the people
  lexicon: HALOT
  rationale: Direct rendering preserving the comprehensiveness of support behind Solomon.
- source_word: לְכָל דְּבָרֶיךָ
  chosen: will be wholly at your command
  alternatives:
  - for all your words
  - for all your matters
  - for all your commands
  lexicon: HALOT
  rationale: Literally 'for all your words,' but in context the idiom means readiness
    to carry out Solomon's directives in all matters. 'Wholly at your command' communicates
    the functional sense in natural English while preserving the totality expressed
    by לְכָל.
