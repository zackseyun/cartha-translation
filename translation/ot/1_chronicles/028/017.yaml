id: 1CH.28.17
reference: 1 Chronicles 28:17
source:
  edition: WLC
  text: וְ/הַ/מִּזְלָג֧וֹת וְ/הַ/מִּזְרָק֛וֹת וְ/הַ/קְּשָׂוֺ֖ת זָהָ֣ב טָה֑וֹר וְ/לִ/כְפוֹרֵ֨י
    הַ/זָּהָ֤ב בְּ/מִשְׁקָל֙ לִ/כְפ֣וֹר וּ/כְפ֔וֹר וְ/לִ/כְפוֹרֵ֥י הַ/כֶּ֛סֶף בְּ/מִשְׁקָ֖ל
    לִ/כְפ֥וֹר וּ/כְפֽוֹר׃
translation:
  text: and the forks, the basins, and the pitchers of pure gold; and for the golden
    bowls, by weight for each bowl and bowl; and for the silver bowls, by weight for
    each bowl and bowl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew repeats 'for bowl and bowl,' a distributive expression meaning each
      vessel had its own assigned weight.
    reason: lexical_alternative
  - marker: b
    text: Or 'flagons' for 'pitchers.' The Hebrew term denotes a pouring vessel.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִּזְלָגוֹת
  chosen: forks
  alternatives:
  - flesh-hooks
  - prongs
  lexicon: HALOT
  rationale: The noun denotes fork-like temple utensils. 'Forks' is clear modern English
    and fits the cultic inventory context better than the archaic 'flesh-hooks,' while
    preserving the concrete object.
- source_word: מִּזְרָקוֹת
  chosen: basins
  alternatives:
  - bowls
  - sprinkling bowls
  lexicon: HALOT
  rationale: This term commonly refers to ritual basins used in sacrificial service.
    'Basins' distinguishes it from the later כפורים in the verse, which are better
    rendered 'bowls.'
- source_word: קְּשָׂוֹת
  chosen: pitchers
  alternatives:
  - cups
  - flagons
  lexicon: HALOT
  rationale: The vessel appears to be a pouring container. 'Pitchers' communicates
    that function in readable modern English better than the archaic 'flagons.' 'Cups'
    is possible but too small/general for the likely sense.
- source_word: זָהָב טָהוֹר
  chosen: of pure gold
  alternatives:
  - pure gold
  lexicon: HALOT
  rationale: The phrase modifies the preceding utensils collectively. 'Of pure gold'
    is idiomatic English and preserves the material specification.
- source_word: כְפוֹרֵי
  chosen: bowls
  alternatives:
  - cups
  - basins
  lexicon: HALOT
  rationale: In this inventory context the noun refers to a vessel, likely a bowl-shaped
    container. 'Bowls' is the most natural modern rendering and avoids confusion with
    the distinct term already rendered 'basins' earlier in the verse.
- source_word: בְּמִשְׁקָל
  chosen: by weight
  alternatives:
  - according to weight
  - with a specified weight
  lexicon: HALOT
  rationale: The phrase indicates that the amount of precious metal was assigned according
    to the weight of each item. 'By weight' is concise and natural.
- source_word: לִכְפוֹר וּכְפוֹר
  chosen: for each bowl and bowl
  alternatives:
  - for bowl after bowl
  - for each individual bowl
  lexicon: HALOT
  rationale: The Hebrew distributive repetition emphasizes item-by-item allocation.
    The somewhat literal 'for each bowl and bowl' preserves that repetitive force,
    though slightly smoothed English could also be justified.
- source_word: כֶּסֶף
  chosen: silver
  lexicon: HALOT
  rationale: Standard rendering for the metal in contrast to gold.
