id: 1CH.28.7
reference: 1 Chronicles 28:7
source:
  edition: WLC
  text: וַ/הֲכִינוֹתִ֥י אֶת מַלְכוּת֖/וֹ עַד לְ/עוֹלָ֑ם אִם יֶחֱזַ֗ק לַ/עֲשׂ֛וֹת מִצְוֺתַ֥/י
    וּ/מִשְׁפָּטַ֖/י כַּ/יּ֥וֹם הַ/זֶּֽה־־־׃
translation:
  text: And I will establish his kingdom forever, if he remains strong to do my commandments
    and my judgments, as at this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'confirm' or 'make firm' his kingdom.
    reason: lexical_alternative
  - marker: b
    text: Or 'holds firm' or 'is resolute' to do my commandments and my judgments.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'as at this day,' that is, as he is doing now.
    reason: cultural_note
lexical_decisions:
- source_word: וַהֲכִינוֹתִי
  chosen: And I will establish
  alternatives:
  - And I will confirm
  - And I will make firm
  lexicon: HALOT
  rationale: The Hiphil of כון here carries the sense of causing to stand firm or
    establishing. 'Establish' is natural modern English and fits royal/kingdom context
    well.
- source_word: מַלְכוּתוֹ
  chosen: his kingdom
  alternatives:
  - his kingship
  - his reign
  lexicon: HALOT
  rationale: מַלְכוּת can denote kingship, reign, or kingdom. In context of dynastic
    permanence, 'kingdom' is the most idiomatic and sufficiently broad English rendering.
- source_word: עַד לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  lexicon: HALOT
  rationale: The phrase denotes enduring perpetuity. 'Forever' is clear modern English
    and preserves the force without archaic spelling.
- source_word: אִם
  chosen: if
  alternatives:
  - provided that
  - on condition that
  lexicon: HALOT
  rationale: The particle introduces a straightforward condition. 'If' preserves the
    conditional force without over-interpreting the syntax.
- source_word: יֶחֱזַק
  chosen: he remains strong
  alternatives:
  - he is strong
  - he holds firm
  - he is resolute
  lexicon: HALOT
  rationale: חזק in this context conveys firmness or steadfast resolve in obedience.
    'Remains strong' captures the continuing sense implied by the condition better
    than a simple stative 'is strong.'
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to keep
  - to carry out
  lexicon: HALOT
  rationale: The infinitive is literally 'to do.' Although English often says 'keep
    commandments,' the Hebrew verb is עשה, so 'to do' better reflects the source while
    remaining understandable.
- source_word: מִצְוֺתַי
  chosen: my commandments
  alternatives:
  - my commands
  lexicon: HALOT
  rationale: '''Commandments'' preserves the formal covenantal tone of מִצְוָה and
    matches the parallel legal terminology in the verse.'
- source_word: וּמִשְׁפָּטַי
  chosen: and my judgments
  alternatives:
  - and my ordinances
  - and my rules
  lexicon: HALOT
  rationale: מִשְׁפָּטִים can mean judgments, ordinances, or rules. 'Judgments' is
    a fairly literal rendering and preserves the juridical flavor; alternatives are
    viable but slightly more interpretive.
- source_word: כַּיּוֹם הַזֶּה
  chosen: as at this day
  alternatives:
  - as he is today
  - as on this day
  - as at the present time
  lexicon: HALOT
  rationale: The idiom means 'as at this day' or 'as is the case today,' pointing
    to Solomon's present posture of obedience. This rendering stays close to the Hebrew
    idiom while remaining intelligible.
