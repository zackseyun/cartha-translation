theological_decisions:
- issue: Conditionality of the promise concerning Solomon's kingdom
  chosen_reading: 'The verse is rendered with an explicit condition: the establishment
    of his kingdom is stated as contingent on his continuing obedience.'
  alternative_readings:
  - A less explicit rendering that softens the condition into a general description
    of Solomon's character
  rationale: The particle אִם plainly introduces a condition, and the translation
    should preserve that theological tension rather than harmonize it with unconditional
    aspects of the Davidic promise elsewhere.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
