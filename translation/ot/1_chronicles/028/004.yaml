id: 1CH.28.4
reference: 1 Chronicles 28:4
source:
  edition: WLC
  text: וַ/יִּבְחַ֡ר יְהוָ֣ה אֱלֹהֵי֩ יִשְׂרָאֵ֨ל בִּ֜/י מִ/כֹּ֣ל בֵּית אָבִ֗/י לִ/הְי֨וֹת
    לְ/מֶ֤לֶךְ עַל יִשְׂרָאֵל֙ לְ/עוֹלָ֔ם כִּ֤י בִֽ/יהוּדָה֙ בָּחַ֣ר לְ/נָגִ֔יד וּ/בְ/בֵ֥ית
    יְהוּדָ֖ה בֵּ֣ית אָבִ֑/י וּ/בִ/בְנֵ֣י אָבִ֔/י בִּ֣/י רָצָ֔ה לְ/הַמְלִ֖יךְ עַל
    כָּל יִשְׂרָאֵֽל־־־־׃
translation:
  text: Yet the LORD, the God of Israel, chose me from all my father's house to be
    king over Israel forever; for he chose Judah as ruler, and from the house of Judah,
    my father's house, and among my father's sons he took pleasure in me to make me
    king over all Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as prince' for 'as ruler' (Hebrew nagid).
    reason: lexical_alternative
  - marker: b
    text: '''Forever'' reflects the Hebrew term often used for enduring or perpetual
      duration, here in the context of the Davidic kingship.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD.'
- source_word: וַיִּבְחַר / בָּחַר
  chosen: chose
  alternatives:
  - selected
  - picked
  lexicon: HALOT
  rationale: בחר denotes choosing/electing. 'Chose' is the natural and sufficiently
    formal rendering in both occurrences, preserving the repeated emphasis on divine
    selection.
- source_word: בִּי מִכֹּל בֵּית אָבִי
  chosen: me from all my father's house
  alternatives:
  - me out of all my father's house
  - me from among all my father's house
  lexicon: HALOT
  rationale: The phrase marks David as selected from within the larger paternal household/clan.
    'From all my father's house' is idiomatic and preserves the comparative force
    of מִכֹּל.
- source_word: לִהְיוֹת לְמֶלֶךְ
  chosen: to be king
  alternatives:
  - to become king
  lexicon: HALOT
  rationale: The infinitive construction expresses appointment/result. 'To be king'
    is straightforward and formal without overstating process.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  lexicon: HALOT
  rationale: עוֹלָם here expresses enduring dynastic permanence rather than merely
    David's lifespan. 'Forever' is idiomatic modern English and preserves the theological
    weight of the Davidic promise.
- source_word: לְנָגִיד
  chosen: as ruler
  alternatives:
  - as prince
  - as leader
  lexicon: HALOT
  rationale: נָגִיד often denotes a leader/prince appointed over the people. Here
    'ruler' is clear modern English and avoids the potentially misleading narrower
    sense of 'prince' in contemporary usage.
- source_word: וּבְבֵית יְהוּדָה בֵּית אָבִי
  chosen: and from the house of Judah, my father's house
  alternatives:
  - and in the house of Judah, my father's house
  lexicon: HALOT
  rationale: 'The sequence narrows the line of choice: Judah → house of Judah → my
    father''s house. Rendering with ''from'' in English makes the progression of selection
    clear, though the Hebrew preposition is beth.'
- source_word: וּבִבְנֵי אָבִי
  chosen: and among my father's sons
  alternatives:
  - and among the sons of my father
  - and among my brothers
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'sons of my father,' not simply 'brothers.'
    'Among my father's sons' preserves the familial and genealogical specificity.
- source_word: בִּי רָצָה
  chosen: he took pleasure in me
  alternatives:
  - he delighted in me
  - he was pleased with me
  - he favored me
  lexicon: HALOT
  rationale: רצה conveys favorable regard or delight. 'Took pleasure in me' preserves
    the personal evaluative nuance and avoids flattening it to mere selection, especially
    since בחר already covers choosing.
- source_word: לְהַמְלִיךְ
  chosen: to make me king
  alternatives:
  - to cause me to reign
  - to enthrone me as king
  lexicon: HALOT
  rationale: 'The hiphil of מלך is causative: to make someone king. This is more precise
    than simply ''to reign'' and fits the context of divine appointment.'
- source_word: עַל כָּל יִשְׂרָאֵל
  chosen: over all Israel
  alternatives:
  - over the whole of Israel
  lexicon: HALOT
  rationale: Standard rendering preserving scope and political authority.
