id: 1CH.19.8
reference: 1 Chronicles 19:8
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֖ע דָּוִ֑יד וַ/יִּשְׁלַח֙ אֶת יוֹאָ֔ב וְ/אֵ֥ת כָּל צָבָ֖א הַ/גִּבּוֹרִֽים־־׃
translation:
  text: When David heard, he sent Joab and all the army of the mighty men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he was informed' or 'he learned of it.'
    reason: lexical_alternative
  - marker: b
    text: '''The mighty men'' may refer to David''s valiant warriors or elite fighting
      force.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - learned
  - was informed
  lexicon: HALOT
  rationale: The verb שׁמע in this narrative context means that David received the
    report. 'Heard' is the most direct and natural rendering, while also allowing
    the implied sense of receiving news.
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: A standard rendering of שלח in military narrative. 'Sent' is clear and
    sufficiently formal without overstating the nuance.
- source_word: יוֹאָב
  chosen: Joab
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole
  lexicon: HALOT
  rationale: כָּל here modifies the following construct phrase and is best rendered
    straightforwardly as 'all.'
- source_word: צָבָא
  chosen: army
  alternatives:
  - host
  - forces
  lexicon: HALOT
  rationale: In this military context צבא refers to an organized fighting force. 'Army'
    is the clearest modern English equivalent.
- source_word: הַגִּבּוֹרִים
  chosen: the mighty men
  alternatives:
  - the warriors
  - the fighting men
  lexicon: HALOT
  rationale: גִּבּוֹרִים often denotes valiant warriors or mighty men. Because the
    phrase is 'all the army of the mighty men,' retaining 'mighty men' preserves the
    lexical identity of the term and its likely reference to David's elite fighting
    force.
- source_word: וְאֵת כָּל צָבָא הַגִּבּוֹרִים
  chosen: and all the army of the mighty men
  alternatives:
  - and the whole army of warriors
  - and all the fighting force of the mighty men
  lexicon: HALOT
  rationale: The Hebrew construction links Joab with a second direct object. Rendering
    it as 'all the army of the mighty men' preserves the construct relationship rather
    than flattening it to simply 'his whole army.'
