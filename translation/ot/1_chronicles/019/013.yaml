id: 1CH.19.13
reference: 1 Chronicles 19:13
source:
  edition: WLC
  text: חֲזַ֤ק וְ/נִֽתְחַזְּקָה֙ בְּעַד עַמֵּ֔/נוּ וּ/בְעַ֖ד עָרֵ֣י אֱלֹהֵ֑י/נוּ וַֽ/יהוָ֔ה
    הַ/טּ֥וֹב בְּ/עֵינָ֖י/ו יַעֲשֶֽׂה־׃
translation:
  text: Be strong, and let us show ourselves strong for our people and for the cities
    of our God, and may the LORD do what is good in his eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and let us be strong' or 'and let us strengthen ourselves.' The Hebrew
      verb is reflexive/intensive.
    reason: lexical_alternative
  - marker: b
    text: Or, 'and the LORD will do what is good in his eyes.' The Hebrew form can
      be read as either volitional or predictive in context.
    reason: alternative_reading
lexical_decisions:
- source_word: חֲזַק
  chosen: Be strong
  alternatives:
  - Be courageous
  - Be firm
  lexicon: HALOT
  rationale: Qal imperative 2ms of חזק, an exhortation to strength/courage. 'Be strong'
    is the most direct and idiomatic rendering and pairs well with the following cohortative.
- source_word: וְנִתְחַזְּקָה
  chosen: and let us show ourselves strong
  alternatives:
  - and let us be strong
  - and let us strengthen ourselves
  lexicon: HALOT
  rationale: Hitpael cohortative 1cp of חזק. The reflexive nuance is stronger than
    a simple stative 'be strong'; 'show ourselves strong' preserves the self-engaging,
    resolute sense in context of battle exhortation.
- source_word: בְּעַד
  chosen: for
  alternatives:
  - on behalf of
  - for the sake of
  lexicon: HALOT
  rationale: In this military-communal context, בְּעַד marks acting in defense of
    or for the benefit of someone. 'For' is concise and natural, while still covering
    the sense of acting on behalf of.
- source_word: עַמֵּנוּ
  chosen: our people
  alternatives:
  - our army
  - our nation
  lexicon: HALOT
  rationale: עם normally means 'people.' Although spoken in wartime, the reference
    is broader than merely the troops; it is the covenant people as a whole.
- source_word: עָרֵי אֱלֹהֵינוּ
  chosen: the cities of our God
  alternatives:
  - our God's cities
  lexicon: HALOT
  rationale: Construct phrase rendered transparently. 'The cities of our God' preserves
    the theological claim that Israel's cities belong to God, not merely to the nation.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated.
- source_word: הַטּוֹב בְּעֵינָיו
  chosen: what is good in his eyes
  alternatives:
  - what seems good to him
  - what is good in his sight
  lexicon: HALOT
  rationale: This idiom denotes what is pleasing or right from the subject's perspective.
    'What is good in his eyes' keeps the Hebrew imagery while remaining understandable
    in English.
- source_word: יַעֲשֶׂה
  chosen: may ... do
  alternatives:
  - will do
  - let ... do
  lexicon: HALOT
  rationale: 'Imperfect 3ms following the exhortation has a jussive-like volitional
    force in context: a deferential entrusting of outcome to God. ''May the LORD do''
    best captures that nuance in English.'
