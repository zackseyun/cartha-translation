theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Volitional nuance of the final clause
  chosen_reading: and may the LORD do what is good in his eyes
  alternative_readings:
  - and the LORD will do what is good in his eyes
  rationale: In context, Joab's statement combines resolve with submission to God's
    sovereign will. Rendering the imperfect with volitional force preserves that theological
    tension without overstating predictive certainty.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
