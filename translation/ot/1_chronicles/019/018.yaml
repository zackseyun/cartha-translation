id: 1CH.19.18
reference: 1 Chronicles 19:18
source:
  edition: WLC
  text: וַ/יָּ֣נָס אֲרָם֮ מִ/לִּ/פְנֵ֣י יִשְׂרָאֵל֒ וַ/יַּהֲרֹ֨ג דָּוִ֜יד מֵ/אֲרָ֗ם
    שִׁבְעַ֤ת אֲלָפִים֙ רֶ֔כֶב וְ/אַרְבָּעִ֥ים אֶ֖לֶף אִ֣ישׁ רַגְלִ֑י וְ/אֵ֛ת שׁוֹפַ֥ךְ
    שַֽׂר הַ/צָּבָ֖א הֵמִֽית־׃
translation:
  text: And Aram fled before Israel, and David killed seven thousand charioteers from
    Aram and forty thousand foot soldiers, and he put Shophach the commander of the
    army to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The parallel passage in 2 Samuel 10:18 reads 'seven hundred chariots and
      forty thousand horsemen.' Chronicles here reads 'seven thousand charioteers
      and forty thousand foot soldiers.'
    reason: textual_variant
  - marker: b
    text: Shophach is called Shobach in the parallel account in 2 Samuel 10:16, 18.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: Rendered as the transliterated place/people name 'Aram' in keeping with
    the philosophy of transliterating names. In context it refers to the Aramean forces,
    but retaining 'Aram' preserves the Hebrew wording and avoids importing the later
    geopolitical label 'Syria'.
- source_word: וַיָּנָס
  chosen: fled
  alternatives:
  - ran away
  - retreated
  lexicon: HALOT
  rationale: The verb נוּס commonly means 'flee.' 'Fled' is the most direct and natural
    narrative rendering.
- source_word: מִלִּפְנֵי יִשְׂרָאֵל
  chosen: before Israel
  alternatives:
  - from before Israel
  - from Israel
  lexicon: HALOT
  rationale: The idiom literally means 'from before the face of Israel,' expressing
    rout in battle. 'Before Israel' is idiomatic enough in English while staying close
    to the Hebrew.
- source_word: וַיַּהֲרֹג דָּוִיד
  chosen: David killed
  alternatives:
  - David struck down
  - David slew
  lexicon: HALOT
  rationale: הרג is the standard verb 'kill/slay.' 'Killed' is clear modern English
    and avoids archaic diction.
- source_word: שִׁבְעַת אֲלָפִים רֶכֶב
  chosen: seven thousand charioteers
  alternatives:
  - seven thousand chariots
  - seven thousand chariot warriors
  lexicon: HALOT
  rationale: רֶכֶב literally denotes 'chariotry/chariots,' but counting 'seven thousand
    chariots' is awkward and differs from the parallel in 2 Samuel 10:18, which speaks
    of chariot personnel. In this battle context, the Hebrew likely uses the vehicle
    term metonymically for the chariot force. 'Charioteers' makes good sense in English
    while reflecting the military unit rather than woodenly counting vehicles.
- source_word: וְאַרְבָּעִים אֶלֶף אִישׁ רַגְלִי
  chosen: forty thousand foot soldiers
  alternatives:
  - forty thousand infantrymen
  - forty thousand men on foot
  lexicon: HALOT
  rationale: אִישׁ רַגְלִי is literally 'man of foot,' an idiom for infantry. 'Foot
    soldiers' is natural modern English and preserves the military distinction.
- source_word: שׁוֹפַךְ
  chosen: Shophach
  alternatives:
  - Shobach
  lexicon: HALOT
  rationale: Rendered by transliteration of the Chronicles form שׁוֹפַךְ. The parallel
    passage in Samuel has 'Shobach'; that alternate form is worth preserving in a
    footnote as a name variation, not as the main text.
- source_word: שַׂר הַצָּבָא
  chosen: the commander of the army
  alternatives:
  - the commander of the host
  - the army commander
  lexicon: HALOT
  rationale: שַׂר is a leader/official, and צָבָא here is the army. 'Commander of
    the army' is clear and suitably formal.
- source_word: הֵמִית
  chosen: he put ... to death
  alternatives:
  - killed
  - struck down
  lexicon: HALOT
  rationale: מות in the Hiphil means 'cause to die, put to death.' Using 'put ...
    to death' gives a slight distinction from the earlier הרג while remaining natural
    English.
