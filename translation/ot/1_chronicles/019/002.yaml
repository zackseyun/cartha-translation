id: 1CH.19.2
reference: 1 Chronicles 19:2
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר דָּוִ֜יד אֶֽעֱשֶׂה חֶ֣סֶד עִם חָנ֣וּן בֶּן נָחָ֗שׁ כִּֽי עָשָׂ֨ה
    אָבִ֤י/ו עִמִּ/י֙ חֶ֔סֶד וַ/יִּשְׁלַ֥ח דָּוִ֛יד מַלְאָכִ֖ים לְ/נַחֲמ֣/וֹ עַל אָבִ֑י/ו
    וַ/יָּבֹאוּ֩ עַבְדֵ֨י דָוִ֜יד אֶל אֶ֧רֶץ בְּנֵי עַמּ֛וֹן אֶל חָנ֖וּן לְ/נַחֲמֽ/וֹ־׀־־־־־־־׃
translation:
  text: And David said, “I will show kindness to Hanun son of Nahash, because his
    father showed kindness to me.” So David sent messengers to comfort him concerning
    his father. And David’s servants came to the land of the Ammonites, to Hanun,
    to comfort him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to console him over his father.' The Hebrew expression indicates that
      the consolation was occasioned by his father's death.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶסֶד
  chosen: kindness
  alternatives:
  - steadfast love
  - loyalty
  - favor
  lexicon: HALOT
  rationale: In this political and interpersonal context between David and Hanun/Nahash,
    חֶסֶד refers to benevolent loyalty or kindness shown between parties, not primarily
    covenantal 'steadfast love.' 'Kindness' is natural English and fits both occurrences
    in the verse.
- source_word: עִם
  chosen: to
  alternatives:
  - with
  lexicon: HALOT
  rationale: Although עִם literally means 'with,' the idiom עשה חסד עם is best rendered
    in English as 'show kindness to' rather than the less idiomatic 'do kindness with.'
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  - angels
  lexicon: HALOT
  rationale: Here the referent is human representatives sent by David, so 'messengers'
    is the clearest rendering. 'Envoys' is possible given the diplomatic setting,
    but 'messengers' stays closer to the lexical range without overstating official
    status.
- source_word: לְנַחֲמוֹ
  chosen: to comfort him
  alternatives:
  - to console him
  lexicon: HALOT
  rationale: The infinitive of נחם in this context denotes offering consolation after
    bereavement. 'Comfort him' is standard, clear English and suits both occurrences.
- source_word: עַל אָבִיו
  chosen: concerning his father
  alternatives:
  - because of his father
  - over his father
  lexicon: HALOT
  rationale: The preposition עַל with נחם in mourning contexts can indicate the occasion
    or cause of consolation. 'Concerning his father' is idiomatic and preserves the
    sense that the comfort relates to his father's death.
- source_word: אֶרֶץ בְּנֵי עַמּוֹן
  chosen: the land of the Ammonites
  alternatives:
  - the land of the sons of Ammon
  - the country of the Ammonites
  lexicon: HALOT
  rationale: '''Ammonites'' is the standard English ethnonym for בְּנֵי עַמּוֹן in
    this context. ''Land of the Ammonites'' is readable modern English while preserving
    the geographic sense of אֶרֶץ.'
- source_word: בֶּן נָחָשׁ
  chosen: son of Nahash
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per translation
    philosophy; the filial expression is rendered straightforwardly.
- source_word: וַיֹּאמֶר ... וַיִּשְׁלַח ... וַיָּבֹאוּ
  chosen: And David said ... So David sent ... And David’s servants came
  alternatives:
  - Then David said ... and sent ... and came
  lexicon: HALOT
  rationale: The Hebrew wayyiqtol sequence narrates successive actions. English style
    benefits from varying connectors slightly; 'So' marks consequence from David's
    stated intention without departing from the narrative flow.
- source_word: עַבְדֵי דָוִיד
  chosen: David’s servants
  alternatives:
  - David's officials
  - David's servants/attendants
  lexicon: HALOT
  rationale: עבדים here refers to those in David's service. 'Servants' is the most
    direct rendering; the context does not require the stronger political nuance 'officials,'
    though that is possible.
