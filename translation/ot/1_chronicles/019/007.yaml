id: 1CH.19.7
reference: 1 Chronicles 19:7
source:
  edition: WLC
  text: וַ/יִּשְׂכְּר֣וּ לָ/הֶ֡ם שְׁנַיִם֩ וּ/שְׁלֹשִׁ֨ים אֶ֜לֶף רֶ֗כֶב וְ/אֶת מֶ֤לֶךְ
    מַעֲכָה֙ וְ/אֶת עַמּ֔/וֹ וַ/יָּבֹ֕אוּ וַֽ/יַּחֲנ֖וּ לִ/פְנֵ֣י מֵידְבָ֑א וּ/בְנֵ֣י
    עַמּ֗וֹן נֶאֶסְפוּ֙ מֵ/עָ֣רֵי/הֶ֔ם וַ/יָּבֹ֖אוּ לַ/מִּלְחָמָֽה־־׃פ
translation:
  text: So they hired for themselves thirty-two thousand chariots, and the king of
    Maacah with his people. They came and camped before Medeba, and the sons of Ammon
    gathered from their cities and came to the battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ammonites' for 'the sons of Ammon.' The Hebrew is literally 'sons
      of Ammon,' a standard ethnic designation.
    reason: lexical_alternative
  - marker: b
    text: '''Chariots'' may also denote a chariot force or chariotry collectively,
      not necessarily a count of individual vehicles only.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂכְּרוּ
  chosen: they hired
  alternatives:
  - they hired for pay
  - they hired mercenaries
  lexicon: HALOT
  rationale: The verb שׂכר in this stem means to hire or obtain by payment. 'They
    hired' is the plain sense; 'mercenaries' would over-specify what is implicit rather
    than explicit in the verb itself.
- source_word: לָהֶם
  chosen: for themselves
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The dative pronoun indicates advantage/benefit. 'For themselves' makes
    the reflexive sense natural in English.
- source_word: שְׁנַיִם וּשְׁלֹשִׁים אֶלֶף
  chosen: thirty-two thousand
  alternatives:
  - two and thirty thousand
  lexicon: HALOT
  rationale: Modern English idiom reverses the Hebrew number order. The value is preserved
    exactly.
- source_word: רֶכֶב
  chosen: chariots
  alternatives:
  - chariotry
  - chariot force
  lexicon: HALOT
  rationale: רכב can denote chariots collectively or chariot troops. 'Chariots' is
    the most direct and conventional rendering here, while still allowing the military
    collective sense.
- source_word: מֶלֶךְ מַעֲכָה
  chosen: the king of Maacah
  alternatives:
  - the king Maacah
  lexicon: HALOT
  rationale: Construct relationship indicates rulership over the place-name Maacah.
    Transliteration of the proper name follows the project's policy.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his army
  - his troops
  lexicon: HALOT
  rationale: The noun עם normally means 'people.' In this military context it likely
    refers to the king's fighting force, but 'his people' preserves the lexical form
    without narrowing beyond the Hebrew.
- source_word: וַיָּבֹאוּ
  chosen: They came
  alternatives:
  - they arrived
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol of בוא is best rendered with the straightforward
    past 'came.'
- source_word: וַיַּחֲנוּ
  chosen: camped
  alternatives:
  - encamped
  - pitched camp
  lexicon: HALOT
  rationale: '''Camped'' is readable modern English and accurately conveys the military
    encampment sense.'
- source_word: לִפְנֵי מֵידְבָא
  chosen: before Medeba
  alternatives:
  - in front of Medeba
  - opposite Medeba
  lexicon: HALOT
  rationale: לִפְנֵי in geographic/military contexts often means 'before' or 'opposite.'
    'Before Medeba' is concise and idiomatic, preserving the spatial relation without
    over-interpreting.
- source_word: מֵידְבָא
  chosen: Medeba
  alternatives:
  - Meidba
  lexicon: HALOT
  rationale: Standard English transliteration of the place-name is 'Medeba.'
- source_word: בְנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the people of Ammon
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Ammon.' In line with the project's gender-accurate
    principle, the literal form is retained where it refers to the national group
    descended from Ammon. 'Ammonites' is a valid smoother alternative but less transparent
    to the source wording.
- source_word: נֶאֶסְפוּ
  chosen: gathered
  alternatives:
  - assembled
  - were gathered
  lexicon: HALOT
  rationale: The Niphal here conveys assembling/gathering. 'Gathered' reads naturally
    and fits the military mobilization context.
- source_word: מֵעָרֵיהֶם
  chosen: from their cities
  alternatives:
  - out of their cities
  - from their towns
  lexicon: HALOT
  rationale: The preposition marks origin. 'Cities' is the standard rendering of עָרִים
    and suits the mobilization scene.
- source_word: לַמִּלְחָמָה
  chosen: to the battle
  alternatives:
  - for battle
  - to war
  lexicon: HALOT
  rationale: The phrase indicates movement toward engagement in war. 'To the battle'
    preserves the article and the concrete military sense. 'For battle' is possible
    but slightly more interpretive.
