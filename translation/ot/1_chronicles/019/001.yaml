id: 1CH.19.1
reference: 1 Chronicles 19:1
source:
  edition: WLC
  text: וַ/יְהִי֙ אַחֲרֵי כֵ֔ן וַ/יָּ֕מָת נָחָ֖שׁ מֶ֣לֶךְ בְּנֵי עַמּ֑וֹן וַ/יִּמְלֹ֥ךְ
    בְּנ֖/וֹ תַּחְתָּֽי/ו־־׃
translation:
  text: After this, Nahash king of the Ammonites died, and his son reigned in his
    place.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי אַחֲרֵי כֵן
  chosen: After this
  alternatives:
  - Afterward
  - And it happened after this
  lexicon: HALOT
  rationale: The Hebrew narrative formula literally means 'and it happened after this.'
    In readable modern English, 'After this' preserves the temporal transition without
    unnecessary stiffness.
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: The verb מות straightforwardly means 'die.' 'Died' is the plain and accurate
    rendering; 'passed away' would soften the text beyond what the Hebrew warrants.
- source_word: נָחָשׁ
  chosen: Nahash
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: מֶלֶךְ בְּנֵי עַמּוֹן
  chosen: king of the Ammonites
  alternatives:
  - king of the sons of Ammon
  - king of the people of Ammon
  lexicon: HALOT
  rationale: Although the construct is literally 'king of the sons of Ammon,' idiomatic
    English renders the ethnonym as 'the Ammonites.' This preserves the referent clearly
    and naturally.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: The verb מלך in this context denotes assuming royal rule. 'Reigned' is
    concise and idiomatic in English narrative, while still reflecting the royal action.
- source_word: בְּנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: The pronominal suffix clearly refers back to Nahash; 'his son' is direct
    and unambiguous.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: The preposition indicates succession in place or position. 'In his place'
    is the most natural English expression for royal succession here.
