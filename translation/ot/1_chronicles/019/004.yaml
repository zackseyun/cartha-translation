id: 1CH.19.4
reference: 1 Chronicles 19:4
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח חָנ֜וּן אֶת עַבְדֵ֤י דָוִיד֙ וַֽ/יְגַלְּחֵ֔/ם וַ/יִּכְרֹ֧ת אֶת
    מַדְוֵי/הֶ֛ם בַּ/חֵ֖צִי עַד הַ/מִּפְשָׂעָ֑ה וַֽ/יְשַׁלְּחֵֽ/ם־־־׃
translation:
  text: So Hanun took David’s servants, shaved them, cut their garments in half at
    the buttocks, and sent them away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The parallel in 2 Samuel 10:4 specifies that Hanun shaved off half of their
      beards. Chronicles states only that he 'shaved them.'
    reason: cross_reference
  - marker: b
    text: Or 'up to the buttocks.' The Hebrew refers to the rear/buttocks area, emphasizing
      public humiliation through exposure.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֵי
  chosen: servants
  alternatives:
  - slaves
  lexicon: HALOT
  rationale: The noun can denote servants or slaves. Here it refers to royal envoys
    in service to David; the bonded status is not the focus, so 'servants' best fits
    the context while remaining natural English.
- source_word: וַיְגַלְּחֵם
  chosen: shaved them
  alternatives:
  - shaved off their beards
  - made them bald
  lexicon: HALOT
  rationale: The verb means 'to shave.' In the parallel account (2 Sam 10:4) the object
    specified is half the beard, but Chronicles leaves the object implicit. 'Shaved
    them' preserves the Hebrew wording without importing the fuller wording from Samuel.
- source_word: מַדְוֵיהֶם
  chosen: their garments
  alternatives:
  - their robes
  - their clothes
  lexicon: HALOT
  rationale: The term refers to garments/clothing, likely official attire. 'Garments'
    is slightly more formal and suits the humiliating mutilation of clothing described
    here.
- source_word: בַּחֵצִי
  chosen: in half
  alternatives:
  - by half
  - to the middle
  lexicon: HALOT
  rationale: This phrase indicates the garments were cut into two parts. 'In half'
    is the clearest idiomatic English rendering.
- source_word: עַד הַמִּפְשָׂעָה
  chosen: at the buttocks
  alternatives:
  - up to the buttocks
  - at the hips
  - to the groin
  lexicon: HALOT
  rationale: The noun denotes the area of the buttocks/rear. The phrase describes
    the garments being cut so as to expose the lower body shamefully. 'At the buttocks'
    is both accurate and readable; 'groin' is less precise here.
- source_word: וַיְשַׁלְּחֵם
  chosen: sent them away
  alternatives:
  - sent them off
  - dismissed them
  lexicon: HALOT
  rationale: The verb means 'send.' 'Sent them away' captures the dismissive force
    after the humiliation.
