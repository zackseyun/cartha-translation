id: 1CH.19.15
reference: 1 Chronicles 19:15
source:
  edition: WLC
  text: וּ/בְנֵ֨י עַמּ֤וֹן רָאוּ֙ כִּי נָ֣ס אֲרָ֔ם וַ/יָּנ֣וּסוּ גַם הֵ֗ם מִ/פְּנֵי֙
    אַבְשַׁ֣י אָחִ֔י/ו וַ/יָּבֹ֖אוּ הָ/עִ֑ירָ/ה וַ/יָּבֹ֥א יוֹאָ֖ב יְרוּשָׁלִָֽם־־׃פ
translation:
  text: When the Ammonites saw that Aram had fled, they also fled before Abishai his
    brother and entered the city. Then Joab came to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Aram'; this refers to the Aramean forces, traditionally rendered
      'the Syrians.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Abishai, his brother,' that is, Joab's brother.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  - the people of Ammon
  lexicon: HALOT
  rationale: The idiom 'sons of Ammon' refers to the people/nation, not specifically
    male descendants. 'The Ammonites' is the natural English ethnonym and preserves
    the referent accurately.
- source_word: רָאוּ
  chosen: saw
  alternatives:
  - realized
  lexicon: HALOT
  rationale: The verb is the common verb 'to see.' Here it introduces perception of
    battlefield events; 'saw' is sufficiently natural and close to the Hebrew.
- source_word: כִּי
  chosen: that
  alternatives:
  - when
  - because
  lexicon: HALOT
  rationale: 'In this clause כִּי introduces the content of what they saw: ''that
    Aram had fled.'' This is the most straightforward rendering.'
- source_word: נָס
  chosen: had fled
  alternatives:
  - fled
  - was fleeing
  lexicon: HALOT
  rationale: The perfect describes Aram's flight as the event perceived by the Ammonites
    prior to their own response. English past perfect best captures the sequence.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: The Hebrew proper name is singular in form but refers collectively to
    the Aramean forces. Following the translation philosophy, names are transliterated
    rather than replaced with the traditional geopolitical label 'Syria.'
- source_word: וַיָּנוּסוּ גַם הֵם
  chosen: they also fled
  alternatives:
  - they too fled
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, and גַם הֵם adds emphasis/comparison
    with Aram's retreat. 'They also fled' is clear and idiomatic.
- source_word: מִפְּנֵי
  chosen: before
  alternatives:
  - from before
  - from the presence of
  - because of
  lexicon: HALOT
  rationale: In military context the idiom means retreating before an opponent. 'Before'
    is concise, idiomatic English.
- source_word: אַבְשַׁי אָחִיו
  chosen: Abishai his brother
  alternatives:
  - Abishai, his brother
  - Abishai, Joab's brother
  lexicon: HALOT
  rationale: The suffix on 'his brother' most naturally refers to Joab in the narrative
    context. The Hebrew apposition is retained closely; English punctuation is not
    required in the main text.
- source_word: וַיָּבֹאוּ הָעִירָה
  chosen: entered the city
  alternatives:
  - came into the city
  - went into the city
  lexicon: HALOT
  rationale: The directional ending on עִיר indicates movement into the city. 'Entered
    the city' is natural English and preserves the sense of retreat into urban protection.
- source_word: וַיָּבֹא יוֹאָב יְרוּשָׁלִָם
  chosen: Then Joab came to Jerusalem
  alternatives:
  - and Joab came to Jerusalem
  - so Joab returned to Jerusalem
  lexicon: HALOT
  rationale: The waw-consecutive continues the sequence. 'Then' reflects narrative
    progression well. 'Returned' would add information not explicit in the verb, though
    context implies it.
