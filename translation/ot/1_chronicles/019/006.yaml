id: 1CH.19.6
reference: 1 Chronicles 19:6
source:
  edition: WLC
  text: וַ/יִּרְאוּ֙ בְּנֵ֣י עַמּ֔וֹן כִּ֥י הִֽתְבָּאֲשׁ֖וּ עִם דָּוִ֑יד וַ/יִּשְׁלַ֣ח
    חָ֠נוּן וּ/בְנֵ֨י עַמּ֜וֹן אֶ֣לֶף כִּכַּר כֶּ֗סֶף לִ/שְׂכֹּ֣ר לָ֠/הֶם מִן אֲרַ֨ם
    נַהֲרַ֜יִם וּ/מִן אֲרַ֤ם מַעֲכָה֙ וּ/מִ/צּוֹבָ֔ה רֶ֖כֶב וּ/פָרָשִֽׁים־־־־׃
translation:
  text: When the Ammonites saw that they had become odious to David, Hanun and the
    Ammonites sent a thousand talents of silver to hire for themselves chariots and
    horsemen from Aram-naharaim, from Aram-maacah, and from Zobah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aram-naharaim is traditionally understood as 'Aram of the Two Rivers,' that
      is, Mesopotamia.
    reason: cultural_note
  - marker: b
    text: 'Hebrew: ''had become odious''—literally, ''had made themselves stink''
      to David, an idiom for becoming offensive or detestable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  chosen: saw
  alternatives:
  - realized
  lexicon: HALOT
  rationale: Basic sense of ראה is visual perception, but in context it introduces
    recognition of their situation. 'Saw' preserves the Hebrew idiom while remaining
    natural in English.
- source_word: בְּנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  lexicon: HALOT
  rationale: Ethnonym is the natural English rendering in context; more readable than
    the formally literal 'sons of Ammon' while preserving reference to the people
    group.
- source_word: הִתְבָּאֲשׁוּ עִם דָּוִיד
  chosen: had become odious to David
  alternatives:
  - had made themselves stink to David
  - had become hateful to David
  - had become offensive to David
  lexicon: HALOT
  rationale: The hitpael of באש is an idiom meaning to become offensive or odious
    in someone's eyes. 'Become odious to David' preserves the metaphorical force without
    using the overly wooden English idiom 'stink to.'
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard rendering of שלח. Here it governs the object 'a thousand talents
    of silver,' indicating sending payment rather than merely sending messengers.
- source_word: חָנוּן וּבְנֵי עַמּוֹן
  chosen: Hanun and the Ammonites
  alternatives:
  - Hanun and the sons of Ammon
  lexicon: HALOT
  rationale: Keeps the named king and his people as joint subjects, matching the Hebrew
    coordination.
- source_word: אֶלֶף כִּכַּר כֶּסֶף
  chosen: a thousand talents of silver
  alternatives:
  - 1,000 talents of silver
  lexicon: HALOT
  rationale: כִּכָּר is a weight measure conventionally rendered 'talent.' This is
    more transparent for Bible readers than converting to modern currency or weight
    in the main text.
- source_word: לִשְׂכֹּר לָהֶם
  chosen: to hire for themselves
  alternatives:
  - to hire
  - to hire for their use
  lexicon: HALOT
  rationale: The infinitive of שׂכר means 'to hire,' and לָהֶם indicates benefit/reflexive
    advantage. 'For themselves' preserves that nuance.
- source_word: אֲרַם נַהֲרַיִם
  chosen: Aram-naharaim
  alternatives:
  - Mesopotamian Aram
  - Aram of the Two Rivers
  lexicon: HALOT
  rationale: As a place-name, transliteration best follows the philosophy of transliterating
    names. A more interpretive geographic gloss can be preserved in a footnote.
- source_word: אֲרַם מַעֲכָה
  chosen: Aram-maacah
  alternatives:
  - Aram of Maacah
  lexicon: HALOT
  rationale: Treated as a compound regional name; transliteration preserves the proper-name
    character.
- source_word: מִצּוֹבָה
  chosen: from Zobah
  alternatives: []
  lexicon: HALOT
  rationale: Proper place-name, so transliterated.
- source_word: רֶכֶב
  chosen: chariots
  alternatives:
  - chariotry
  lexicon: HALOT
  rationale: Though the singular can function collectively, English plural 'chariots'
    is the most natural way to express the military force being hired.
- source_word: וּפָרָשִׁים
  chosen: horsemen
  alternatives:
  - cavalry
  lexicon: HALOT
  rationale: פָרָשִׁים refers to mounted troops. 'Horsemen' is concrete and pairs
    naturally with 'chariots'; 'cavalry' is possible but slightly more interpretive
    and modernized.
