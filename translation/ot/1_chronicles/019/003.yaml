id: 1CH.19.3
reference: 1 Chronicles 19:3
source:
  edition: WLC
  text: וַ/יֹּאמְרוּ֩ שָׂרֵ֨י בְנֵי עַמּ֜וֹן לְ/חָנ֗וּן הַֽ/מְכַבֵּ֨ד דָּוִ֤יד אֶת
    אָבִ֨י/ךָ֙ בְּ/עֵינֶ֔י/ךָ כִּֽי שָׁלַ֥ח לְ/ךָ֖ מְנַחֲמִ֑ים הֲ/לֹ֡א בַּ֠/עֲבוּר
    לַ/חְקֹ֨ר וְ/לַ/הֲפֹ֤ךְ וּ/לְ/רַגֵּל֙ הָ/אָ֔רֶץ בָּ֥אוּ עֲבָדָ֖י/ו אֵלֶֽי/ךָ־־־׃פ
translation:
  text: But the princes of the Ammonites said to Hanun, “Is David honoring your father
    in your sight because he has sent comforters to you? Have not his servants come
    to you in order to search, to overthrow, and to spy out the land?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in your eyes.” The Hebrew idiom refers to Hanun’s perception or judgment.
    reason: lexical_alternative
  - marker: b
    text: Or “to overturn.” The Hebrew verb can mean to turn over or overturn; here
      it likely carries the sense of hostile subversion.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי
  chosen: princes
  alternatives:
  - officials
  - leaders
  lexicon: HALOT
  rationale: שָׂרִים commonly denotes rulers or high officials. 'Princes' preserves
    the elevated political rank and matches the courtly setting better than the flatter
    'leaders.'
- source_word: הַמְכַבֵּד
  chosen: honoring
  alternatives:
  - showing honor to
  - glorifying
  lexicon: HALOT
  rationale: From כבד in the sense of honoring or treating with respect. 'Honoring'
    is natural English and fits the accusation that David's gesture may only appear
    respectful.
- source_word: בְּעֵינֶיךָ
  chosen: in your sight
  alternatives:
  - in your eyes
  - in your opinion
  lexicon: HALOT
  rationale: The idiom literally means 'in your eyes.' 'In your sight' keeps the visual
    metaphor while remaining readable; it signals Hanun's perception rather than objective
    fact.
- source_word: מְנַחֲמִים
  chosen: comforters
  alternatives:
  - consolers
  - those who comfort
  lexicon: HALOT
  rationale: The participle from נחם refers to those sent to console after bereavement.
    'Comforters' is concise and idiomatic in this context.
- source_word: בַּעֲבוּר
  chosen: in order to
  alternatives:
  - for the sake of
  - because of
  lexicon: HALOT
  rationale: Here the preposition introduces purpose. 'In order to' clearly signals
    intent in English.
- source_word: לַחְקֹר
  chosen: to search
  alternatives:
  - to investigate
  - to explore
  lexicon: HALOT
  rationale: חקר can mean search out or investigate. 'Search' fits the espionage sequence
    and avoids over-technical wording.
- source_word: וְלַהֲפֹךְ
  chosen: to overthrow
  alternatives:
  - to overturn
  - to spy out thoroughly
  lexicon: HALOT
  rationale: The verb הפך literally means turn over/overturn. In this military-political
    context it likely suggests subversion or overthrow, not merely physical inspection.
    'To overthrow' best captures the hostile intent implied by the advisers.
- source_word: וּלְרַגֵּל
  chosen: to spy out
  alternatives:
  - to spy on
  - to reconnoiter
  lexicon: HALOT
  rationale: רגל in the piel commonly refers to spying or reconnaissance. 'Spy out'
    is a standard and clear rendering in biblical narrative.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  - the territory
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the territory of Ammon. 'The land' is the most natural
    biblical-narrative rendering and preserves the broad territorial sense.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his men
  lexicon: HALOT
  rationale: עֶבֶד in royal contexts often denotes servants or court envoys. 'His
    servants' is the most direct rendering and does not over-specify their office.
