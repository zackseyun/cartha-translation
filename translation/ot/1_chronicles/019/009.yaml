id: 1CH.19.9
reference: 1 Chronicles 19:9
source:
  edition: WLC
  text: וַ/יֵּצְאוּ֙ בְּנֵ֣י עַמּ֔וֹן וַ/יַּֽעַרְכ֥וּ מִלְחָמָ֖ה פֶּ֣תַח הָ/עִ֑יר
    וְ/הַ/מְּלָכִ֣ים אֲשֶׁר בָּ֔אוּ לְ/בַדָּ֖/ם בַּ/שָּׂדֶֽה־׃
translation:
  text: And the sons of Ammon came out and drew up for battle at the entrance of the
    city, while the kings who had come were by themselves in the open field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ammonites came out.' The Hebrew reads more literally, 'the sons
      of Ammon.'
    reason: lexical_alternative
  - marker: b
    text: Or 'arrayed themselves for battle.' The Hebrew idiom refers to arranging
      troops in battle formation.
    reason: lexical_alternative
  - marker: c
    text: Or 'at the gate of the city,' though the Hebrew word is more generally 'entrance/opening'
      than the usual term for 'gate.'
    reason: lexical_alternative
  - marker: d
    text: That is, the allied kings were stationed separately from the Ammonite forces,
      out in the field.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּצְאוּ
  chosen: came out
  alternatives:
  - went out
  lexicon: HALOT
  rationale: The verb יצא in narrative commonly means 'go/come out.' 'Came out' fits
    the military scene from the city's perspective and reads naturally in English.
- source_word: בְּנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew expression literally. 'Ammonites'
    is idiomatic English, but 'sons of Ammon' keeps the ethnonym's underlying form
    without obscuring meaning.
- source_word: וַיַּעַרְכוּ מִלְחָמָה
  chosen: drew up for battle
  alternatives:
  - arrayed themselves for battle
  - formed for battle
  - set the battle in order
  lexicon: HALOT
  rationale: ערך with מלחמה is a military idiom for arranging troops in battle formation.
    'Drew up for battle' is clear modern English and preserves the tactical sense
    better than the more generic 'fought.'
- source_word: פֶּתַח הָעִיר
  chosen: at the entrance of the city
  alternatives:
  - at the gate of the city
  - at the opening of the city
  lexicon: HALOT
  rationale: פתח means 'opening/entrance.' Since the Hebrew does not use the usual
    word for 'gate,' 'entrance of the city' is more textually precise, though it likely
    refers to the city approach/gate area.
- source_word: וְהַמְּלָכִים אֲשֶׁר בָּאוּ
  chosen: while the kings who had come
  alternatives:
  - and the kings who had come
  lexicon: HALOT
  rationale: The clause contrasts the Ammonites' position with that of their allied
    kings. Rendering waw here as 'while' brings out the adversative/circumstantial
    force in smooth English.
- source_word: לְבַדָּם
  chosen: by themselves
  alternatives:
  - alone
  - separately
  lexicon: HALOT
  rationale: The term indicates separation from the Ammonite forces. 'By themselves'
    communicates that they were stationed apart, not necessarily solitary in number.
- source_word: בַּשָּׂדֶה
  chosen: in the open field
  alternatives:
  - in the field
  - in the countryside
  lexicon: HALOT
  rationale: שׂדה can mean 'field/open country.' In this military context, 'open field'
    clarifies that the allied kings were deployed outside the city rather than within
    an agricultural plot.
