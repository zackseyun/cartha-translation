id: 1CH.19.19
reference: 1 Chronicles 19:19
source:
  edition: WLC
  text: וַ/יִּרְא֞וּ עַבְדֵ֣י הֲדַדְעֶ֗זֶר כִּ֤י נִגְּפוּ֙ לִ/פְנֵ֣י יִשְׂרָאֵ֔ל וַ/יַּשְׁלִ֥ימוּ
    עִם דָּוִ֖יד וַ/יַּֽעַבְדֻ֑/הוּ וְ/לֹא אָבָ֣ה אֲרָ֔ם לְ/הוֹשִׁ֥יעַ אֶת בְּנֵי
    עַמּ֖וֹן עֽוֹד־־־־׃פ
translation:
  text: When the servants of Hadadezer saw that they had been defeated before Israel,
    they made peace with David and served him. And Aram was no longer willing to help
    the sons of Ammon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ammonites' for 'the sons of Ammon.' The Hebrew expression is literally
      'sons of Ammon' and functions as an ethnic designation.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֵי
  chosen: servants
  alternatives:
  - slaves
  lexicon: HALOT
  rationale: In this royal-political context, the term refers to subjects/official
    retainers of Hadadezer rather than emphasizing chattel status. 'Servants' best
    fits the relationship in readable English while preserving subordination.
- source_word: נִגְּפוּ
  chosen: had been defeated
  alternatives:
  - had been struck down
  - had been routed
  lexicon: HALOT
  rationale: The Niphal of נגב/נגף here denotes suffering military defeat. 'Had been
    defeated' is natural English and matches the battle context without overstating
    casualties.
- source_word: לִפְנֵי יִשְׂרָאֵל
  chosen: before Israel
  alternatives:
  - by Israel
  - in the presence of Israel
  lexicon: HALOT
  rationale: The idiom literally means 'before the face of Israel' and commonly conveys
    defeat at the hands of or in front of Israel. 'Before Israel' preserves the Hebrew
    idiom in understandable English.
- source_word: וַיַּשְׁלִימוּ עִם דָּוִיד
  chosen: made peace with David
  alternatives:
  - made peace with
  - came to terms with
  - submitted to
  lexicon: HALOT
  rationale: The Hiphil of שלם with עִם commonly means to make peace or conclude peace
    with someone. 'Made peace with David' is the clearest idiomatic rendering.
- source_word: וַיַּעַבְדֻהוּ
  chosen: served him
  alternatives:
  - became his servants
  - were subject to him
  lexicon: HALOT
  rationale: The verb עבד here expresses political subjection/service to David following
    peace. 'Served him' is concise and faithful; the object suffix makes David explicit.
- source_word: אָבָה
  chosen: was willing
  alternatives:
  - was willing any longer
  - consented
  - was disposed
  lexicon: HALOT
  rationale: The verb means to be willing or consent. With the negation and עוֹד,
    the sense is refusal to continue helping. English requires a modal expression
    such as 'was willing.'
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: The Hebrew proper name is singular collective here. Per philosophy, names
    are transliterated rather than replaced with traditional geopolitical labels like
    'Syria.' 'Aram' preserves the source term.
- source_word: לְהוֹשִׁיעַ
  chosen: to help
  alternatives:
  - to save
  - to deliver
  lexicon: HALOT
  rationale: Although the verb often means 'save/deliver,' in this military-alliance
    context it refers to coming to the aid of the Ammonites. 'Help' communicates the
    contextual sense naturally without importing soteriological overtones.
- source_word: בְּנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the people of Ammon
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Ammon.' Because the phrase is a standard
    ethnonym, either literal or idiomatic rendering is possible. The main text keeps
    'sons of Ammon' to remain gender-accurate and closer to the source, while still
    understandable.
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - again
  - any more
  lexicon: HALOT
  rationale: With negation, עוֹד means 'any longer/no longer.' 'No longer' is the
    most natural placement in English for the clause.
