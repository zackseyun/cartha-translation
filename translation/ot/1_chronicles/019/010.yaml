id: 1CH.19.10
reference: 1 Chronicles 19:10
source:
  edition: WLC
  text: וַ/יַּ֣רְא יוֹאָ֗ב כִּֽי הָיְתָ֧ה פְנֵי הַ/מִּלְחָמָ֛ה אֵלָ֖י/ו פָּנִ֣ים וְ/אָח֑וֹר
    וַ/יִּבְחַ֗ר מִ/כָּל בָּחוּר֙ בְּ/יִשְׂרָאֵ֔ל וַֽ/יַּעֲרֹ֖ךְ לִ/קְרַ֥את אֲרָֽם־־־׃
translation:
  text: When Joab saw that the battle line was set against him in front and in the
    rear, he chose some of the best men from all Israel and arranged them to meet
    Aram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from all Israel's picked men.' The Hebrew phrase refers to select or
      choice warriors.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Aram'; that is, the Aramean forces.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - realized
  lexicon: HALOT
  rationale: Basic sense of ראה in narrative is visual perception, here extending
    naturally to recognition of the tactical situation. 'Saw' preserves the Hebrew
    narrative style without over-interpreting.
- source_word: פְנֵי הַמִּלְחָמָה
  chosen: the battle line
  alternatives:
  - the front of the battle
  - the battle front
  lexicon: HALOT
  rationale: Literally 'the face/front of the battle.' In military context, idiomatic
    English 'battle line' best conveys an opposing formation rather than merely abstract
    warfare.
- source_word: אֵלָיו פָּנִים וְאָחוֹר
  chosen: was set against him in front and in the rear
  alternatives:
  - was against him before and behind
  - faced him from front and rear
  lexicon: HALOT
  rationale: The phrase indicates encirclement or attack from both directions. 'Was
    set against him' brings out the military posture implied by the Hebrew while retaining
    the front/rear contrast.
- source_word: וַיִּבְחַר
  chosen: he chose
  alternatives:
  - selected
  lexicon: HALOT
  rationale: Standard rendering of בחר. 'Chose' is straightforward and preserves the
    narrative simplicity.
- source_word: מִכָּל בָּחוּר בְּיִשְׂרָאֵל
  chosen: some of the best men from all Israel
  alternatives:
  - from all the choice men of Israel
  - from all Israel's picked men
  lexicon: HALOT
  rationale: בָּחוּר can denote a young man or a chosen/choice warrior depending on
    context. In this military setting it refers to select fighting men. 'Best men'
    communicates elite troops in natural English; 'some of' reflects the partitive
    מִן.
- source_word: וַיַּעֲרֹךְ
  chosen: arranged them
  alternatives:
  - drew them up
  - deployed them
  lexicon: HALOT
  rationale: ערך in battle contexts means to arrange or draw up troops in formation.
    'Arranged them' is clear modern English; the military nuance is reinforced by
    the following phrase.
- source_word: לִקְרַאת אֲרָם
  chosen: to meet Aram
  alternatives:
  - to face Aram
  - against Aram
  lexicon: HALOT
  rationale: לקראת often means 'to meet' or 'to confront.' Here it introduces military
    engagement. 'To meet Aram' is concise and faithful, while context makes the hostile
    sense clear.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: Following the translation philosophy, names are transliterated rather
    than replaced with later geographic labels. 'Aram' preserves the Hebrew proper
    name; 'the Arameans' is a plausible contextual alternative but less directly tied
    to the source form here.
