id: 1CH.19.16
reference: 1 Chronicles 19:16
source:
  edition: WLC
  text: וַ/יַּ֣רְא אֲרָ֗ם כִּ֣י נִגְּפוּ֮ לִ/פְנֵ֣י יִשְׂרָאֵל֒ וַֽ/יִּשְׁלְחוּ֙ מַלְאָכִ֔ים
    וַ/יּוֹצִ֣יאוּ אֶת אֲרָ֔ם אֲשֶׁ֖ר מֵ/עֵ֣בֶר הַ/נָּהָ֑ר וְ/שׁוֹפַ֛ךְ שַׂר צְבָ֥א
    הֲדַדְעֶ֖זֶר לִ/פְנֵי/הֶֽם־־׃
translation:
  text: When Aram saw that they had been defeated before Israel, they sent messengers
    and brought out the Arameans who were from beyond the River, with Shophach the
    commander of Hadadezer’s army leading them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from across the Euphrates'; the Hebrew reads simply 'from beyond the
      River.'
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'Syria/Syrians'; Hebrew 'Aram/Arameans.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרָם
  chosen: Aram / the Arameans
  alternatives:
  - Syria / the Syrians
  lexicon: HALOT
  rationale: The proper name refers both to the polity ('Aram') and, in the object
    phrase, to its people/forces ('the Arameans'). 'Aram' preserves the Hebrew name
    rather than substituting the traditional but less direct 'Syria.'
- source_word: נִגְּפוּ
  chosen: had been defeated
  alternatives:
  - had been struck down
  - had been routed
  lexicon: HALOT
  rationale: The Niphal of נגב/נגף here denotes suffering defeat in battle. 'Had been
    defeated' is clear modern English and fits the military context without overstating
    total destruction.
- source_word: לִפְנֵי יִשְׂרָאֵל
  chosen: before Israel
  alternatives:
  - by Israel
  - in the presence of Israel
  lexicon: HALOT
  rationale: The idiom literally means 'before the face of Israel' and commonly conveys
    defeat at another's hands. 'Before Israel' preserves the Hebrew idiom while remaining
    natural in English.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  - angels
  lexicon: HALOT
  rationale: In this political-military setting the word means human emissaries, not
    angels. 'Messengers' is the broad, contextually appropriate rendering.
- source_word: וַיּוֹצִיאוּ אֶת אֲרָם
  chosen: brought out the Arameans
  alternatives:
  - brought out Aram
  - summoned the Arameans
  lexicon: HALOT
  rationale: The Hiphil of יצא means 'cause to come out/bring out.' Here it refers
    to mobilizing additional Aramean forces. 'Brought out the Arameans' stays close
    to the Hebrew while making the military sense intelligible.
- source_word: מֵעֵבֶר הַנָּהָר
  chosen: from beyond the River
  alternatives:
  - from across the Euphrates
  - from Trans-Euphrates
  lexicon: HALOT
  rationale: The phrase literally means 'from beyond the River.' In this historical
    context 'the River' likely refers to the Euphrates, but the Hebrew itself does
    not name it, so the main text preserves the source wording.
- source_word: וְשׁוֹפַךְ
  chosen: with Shophach
  alternatives:
  - and Shophach
  lexicon: HALOT
  rationale: The prefixed conjunction here is best taken as introducing an accompanying
    element in the force composition. 'With Shophach' makes the syntax smoother in
    English while preserving his inclusion with the troops.
- source_word: שַׂר צְבָא הֲדַדְעֶזֶר
  chosen: the commander of Hadadezer’s army
  alternatives:
  - the captain of Hadadezer's host
  - Hadadezer's army commander
  lexicon: HALOT
  rationale: שַׂר צְבָא is a standard military title. 'Commander of Hadadezer’s army'
    is natural modern English and accurately conveys rank and function.
- source_word: לִפְנֵיהֶם
  chosen: leading them
  alternatives:
  - before them
  - at their head
  lexicon: HALOT
  rationale: Literally 'before them,' but in military movement this indicates position
    at the front. 'Leading them' expresses the idiomatic force clearly for modern
    readers.
