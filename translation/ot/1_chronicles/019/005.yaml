id: 1CH.19.5
reference: 1 Chronicles 19:5
source:
  edition: WLC
  text: וַ/יֵּלְכוּ֩ וַ/יַּגִּ֨ידוּ לְ/דָוִ֤יד עַל הָֽ/אֲנָשִׁים֙ וַ/יִּשְׁלַ֣ח לִ/קְרָאתָ֔/ם
    כִּי הָי֥וּ הָ/אֲנָשִׁ֖ים נִכְלָמִ֣ים מְאֹ֑ד וַ/יֹּ֤אמֶר הַ/מֶּ֨לֶךְ֙ שְׁב֣וּ
    בִֽ/ירֵח֔וֹ עַ֛ד אֲשֶׁר יְצַמַּ֥ח זְקַנְ/כֶ֖ם וְ/שַׁבְתֶּֽם־־־׃
translation:
  text: They went and told David about the men, and he sent to meet them, because
    the men were greatly humiliated. And the king said, “Stay in Jericho until your
    beards have grown back, then return.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he sent messengers to meet them'; the Hebrew does not state the object
      explicitly, though messengers are naturally implied.
    reason: lexical_alternative
  - marker: b
    text: '''Greatly humiliated'' could also be rendered ''deeply ashamed'' or ''utterly
      disgraced.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: They went
  alternatives:
  - They departed
  lexicon: HALOT
  rationale: Common wayyiqtol of הלך introducing the next action in narrative. 'They
    went' is the plain narrative rendering.
- source_word: וַיַּגִּידוּ לְדָוִיד עַל הָאֲנָשִׁים
  chosen: told David about the men
  alternatives:
  - reported to David concerning the men
  lexicon: HALOT
  rationale: הגיד with ל marks the person informed; עַל marks the matter reported.
    'Told David about the men' is natural English while preserving the report's object.
- source_word: וַיִּשְׁלַח לִקְרָאתָם
  chosen: he sent to meet them
  alternatives:
  - he sent messengers to meet them
  - he sent out to meet them
  lexicon: HALOT
  rationale: The object after שׁלח is unstated in Hebrew. English can render idiomatically
    as 'he sent to meet them'; the implied agents are not explicit, so 'messengers'
    is possible but not necessary in the main text.
- source_word: נִכְלָמִים מְאֹד
  chosen: greatly humiliated
  alternatives:
  - deeply ashamed
  - utterly disgraced
  lexicon: HALOT
  rationale: The Niphal participle of כלם denotes being shamed/humiliated. In context
    of public beard-shaving and garment-cutting, 'humiliated' captures the social
    disgrace well; מְאֹד intensifies it as 'greatly'.
- source_word: שְׁבוּ
  chosen: Stay
  alternatives:
  - Remain
  - Sit
  lexicon: HALOT
  rationale: Imperative of ישׁב often means 'dwell, remain, stay.' 'Stay' is the most
    idiomatic command in this context.
- source_word: בִירֵחוֹ
  chosen: in Jericho
  lexicon: HALOT
  rationale: Standard transliteration of the place name יְרֵחוֹ as 'Jericho' per the
    philosophy of transliterating names.
- source_word: עַד אֲשֶׁר יְצַמַּח זְקַנְכֶם
  chosen: until your beards have grown back
  alternatives:
  - until your beard grows
  - until your beards grow
  lexicon: HALOT
  rationale: צמח means 'sprout, grow.' English idiom in this context is 'grow back,'
    since the beards had been cut off in the previous verse. The plural possessive
    favors 'beards' in English.
- source_word: וְשַׁבְתֶּם
  chosen: then return
  alternatives:
  - and return
  - then come back
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction after an עד אשר clause functions
    as the subsequent action. 'Then return' makes the sequence clear in natural English.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite title referring to David in his royal role; retained as 'the
    king' to match the Hebrew wording rather than replacing with the name.
