id: 1CH.19.11
reference: 1 Chronicles 19:11
source:
  edition: WLC
  text: וְ/אֵת֙ יֶ֣תֶר הָ/עָ֔ם נָתַ֕ן בְּ/יַ֖ד אַבְשַׁ֣י אָחִ֑י/ו וַ/יַּ֣עַרְכ֔וּ
    לִ/קְרַ֖את בְּנֵ֥י עַמּֽוֹן׃
translation:
  text: He put the rest of the troops under the command of Abishai his brother, and
    they drew up in battle formation to meet the Ammonites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'gave into the hand of Abishai his brother,' an idiom
      for entrusting to his authority or command.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶתֶר הָעָם
  chosen: the rest of the troops
  alternatives:
  - the rest of the people
  - the remainder of the army
  lexicon: HALOT
  rationale: יֶתֶר means 'remainder/rest.' הָעָם literally means 'the people,' but
    in this military narrative it refers to the fighting force under Joab's command.
    'Troops' communicates the contextual sense in natural English without over-paraphrasing.
- source_word: נָתַן בְּיַד
  chosen: put ... under the command of
  alternatives:
  - gave into the hand of
  - placed in the hand of
  lexicon: HALOT
  rationale: The idiom נָתַן בְּיַד literally means 'gave into the hand of,' often
    expressing entrusting or placing under someone's authority. Here it refers to
    assigning command responsibility, so 'put ... under the command of' best captures
    the idiomatic force.
- source_word: אַבְשַׁי אָחִיו
  chosen: Abishai his brother
  alternatives:
  - Abshai his brother
  rationale: Standard English transliteration is 'Abishai.' The appositional phrase
    אָחִיו is retained straightforwardly as 'his brother,' referring to Joab's brother.
- source_word: וַיַּעַרְכוּ
  chosen: they drew up in battle formation
  alternatives:
  - they arranged themselves
  - they lined up
  - they set themselves in array
  lexicon: HALOT
  rationale: The verb ערך in military contexts commonly refers to arranging troops
    for battle. 'Drew up in battle formation' conveys the martial sense more clearly
    than the more wooden 'arranged themselves.'
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - against
  - to face
  lexicon: HALOT
  rationale: לִקְרַאת often means 'to meet' or 'to face.' In battle context English
    may imply hostility from context, so 'to meet' is sufficient and close to the
    Hebrew.
- source_word: בְּנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  lexicon: HALOT
  rationale: The ethnonym 'Ammonites' is the natural English rendering of 'sons of
    Ammon' in narrative contexts.
