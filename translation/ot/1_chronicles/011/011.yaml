id: 1CH.11.11
reference: 1 Chronicles 11:11
source:
  edition: WLC
  text: וְ/אֵ֛לֶּה מִסְפַּ֥ר הַ/גִּבֹּרִ֖ים אֲשֶׁ֣ר לְ/דָוִ֑יד יָשָׁבְעָ֣ם בֶּן חַכְמוֹנִ֗י
    רֹ֚אשׁ ה/שלושים הֽוּא עוֹרֵ֧ר אֶת חֲנִית֛/וֹ עַל שְׁלֹשׁ מֵא֥וֹת חָלָ֖ל בְּ/פַ֥עַם
    אֶחָֽת־־־־־׃
translation:
  text: 'And these are the number of David’s mighty men: Jashobeam son of Hachmoni,
    the chief of the Thirty; he wielded his spear against three hundred slain in one
    encounter.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he raised/brandished his spear against three hundred slain at one time.'
      The Hebrew idiom is compact, and English renderings vary in how literally they
      express the spear action and the single occasion.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְפַּר
  chosen: the number of
  alternatives:
  - the account of
  - the list of
  lexicon: HALOT
  rationale: The noun most directly means 'number' or 'count.' In context it introduces
    an enumerated roster of warriors, so 'the number of' preserves the Hebrew wording
    while remaining natural in English.
- source_word: הַגִּבֹּרִים
  chosen: mighty men
  alternatives:
  - warriors
  - mighty warriors
  lexicon: HALOT
  rationale: גִּבּוֹר commonly denotes a mighty man, warrior, or valiant hero. 'Mighty
    men' preserves the established sense in Davidic military contexts without over-paraphrasing.
- source_word: אֲשֶׁר לְדָוִיד
  chosen: David’s
  alternatives:
  - who belonged to David
  - who were with David
  lexicon: HALOT
  rationale: The lamed marks relation/possession. English idiom naturally compresses
    this to 'David’s,' conveying association without unnecessary expansion.
- source_word: יָשָׁבְעָם בֶּן חַכְמוֹנִי
  chosen: Jashobeam son of Hachmoni
  alternatives:
  - Jashobeam the son of Hachmoni
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. 'Son of' is
    retained formally because the patronymic is explicit in the Hebrew.
- source_word: רֹאשׁ הַשלושים
  chosen: the chief of the Thirty
  alternatives:
  - head of the Thirty
  - leader of the Thirty
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' but in rank contexts 'chief' is the most
    idiomatic English equivalent. 'The Thirty' is retained as the apparent name/designation
    of the elite group.
- source_word: עוֹרֵר אֶת חֲנִיתוֹ
  chosen: wielded his spear
  alternatives:
  - roused his spear
  - brandished his spear
  - raised his spear
  lexicon: HALOT
  rationale: The verb עורר literally means 'stir up, rouse, awaken.' In this military
    idiom with spear, a more natural English rendering is needed. 'Wielded his spear'
    captures active martial use without wooden literalism.
- source_word: עַל שְׁלֹשׁ מֵאוֹת
  chosen: against three hundred
  alternatives:
  - over three hundred
  lexicon: HALOT
  rationale: With a weapon and combat context, עַל is best rendered 'against,' indicating
    hostile action directed toward the opponents.
- source_word: חָלָל
  chosen: slain
  alternatives:
  - dead men
  - casualties
  lexicon: HALOT
  rationale: חָלָל denotes one who has been pierced/killed, hence 'slain.' This is
    more precise than the generic 'dead' and fits the battle setting.
- source_word: בְּפַעַם אֶחָת
  chosen: in one encounter
  alternatives:
  - at one time
  - on one occasion
  - at one stroke
  lexicon: HALOT
  rationale: Literally 'in one time/occurrence.' 'In one encounter' communicates the
    sense of a single battle episode in contemporary English. 'At one stroke' would
    overstate the idiom as though all were killed by a single physical blow.
