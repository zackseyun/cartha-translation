id: 1CH.11.30
reference: 1 Chronicles 11:30
source:
  edition: WLC
  text: מַהְרַי֙ הַ/נְּטֹ֣פָתִ֔י חֵ֥לֶד בֶּֽן בַּֽעֲנָ֖ה הַ/נְּטוֹפָתִֽי־׃ס
translation:
  text: Maharai the Netophathite, Heled son of Baanah the Netophathite;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from Netophah' for 'the Netophathite' in both occurrences.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַהְרַי
  chosen: Maharai
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated per project
    policy for names.
- source_word: הַנְּטֹפָתִי
  chosen: the Netophathite
  alternatives:
  - from Netophah
  lexicon: HALOT
  rationale: Gentilic adjective with article, denoting a man from Netophah. 'Netophathite'
    is the concise and conventional English rendering; 'from Netophah' is possible
    but less formally aligned with the Hebrew gentilic form.
- source_word: חֵלֶד
  chosen: Heled
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
- source_word: בֶּן
  chosen: son of
  lexicon: HALOT
  rationale: Standard filial construction in Hebrew genealogy/list contexts.
- source_word: בַּעֲנָה
  chosen: Baanah
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
- source_word: הַנְּטוֹפָתִי
  chosen: the Netophathite
  alternatives:
  - from Netophah
  lexicon: HALOT
  rationale: 'Repeated gentilic adjective with article modifying Baanah in apposition:
    ''Baanah the Netophathite.'' Retaining the repetition reflects the Hebrew structure
    and avoids obscuring whether the designation belongs to Heled or to Baanah.'
