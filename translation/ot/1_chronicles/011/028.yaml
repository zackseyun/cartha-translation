id: 1CH.11.28
reference: 1 Chronicles 11:28
source:
  edition: WLC
  text: עִירָ֤א בֶן עִקֵּשׁ֙ הַ/תְּקוֹעִ֔י אֲבִיעֶ֖זֶר הָ/עֲנְּתוֹתִֽי־׃ס
translation:
  text: Ira son of Ikkesh the Tekoite, Abiezer the Anathothite;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''from Tekoa.'' The Hebrew uses a gentilic form: ''the Tekoite.'''
    reason: lexical_alternative
  - marker: b
    text: 'Or ''from Anathoth.'' The Hebrew uses a gentilic form: ''the Anathothite.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עִירָא
  chosen: Ira
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention rather
    than translated, in keeping with the project policy for names.
- source_word: בֶן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical/linking term meaning 'son of.' The shorter English
    form is natural in a list of warriors and preserves the filial relationship.
- source_word: עִקֵּשׁ
  chosen: Ikkesh
  alternatives:
  - Ikkesh
  lexicon: HALOT
  rationale: Proper personal name; transliterated. Spelling with initial 'I' and doubled
    'kk' reflects common English representation of the Hebrew consonants and voweling.
- source_word: הַתְּקוֹעִי
  chosen: the Tekoite
  alternatives:
  - from Tekoa
  lexicon: HALOT
  rationale: Gentilic with article, denoting a man from Tekoa. 'The Tekoite' is the
    most concise and conventional way to render the adjectival form in a roster.
- source_word: אֲבִיעֶזֶר
  chosen: Abiezer
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard convention.
- source_word: הָעֲנְּתוֹתִי
  chosen: the Anathothite
  alternatives:
  - from Anathoth
  lexicon: HALOT
  rationale: Gentilic with article, denoting a man from Anathoth. 'The Anathothite'
    preserves the Hebrew adjectival/national form and matches the list style.
