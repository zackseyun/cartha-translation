id: 1CH.11.27
reference: 1 Chronicles 11:27
source:
  edition: WLC
  text: שַׁמּוֹת֙ הַ/הֲרוֹרִ֔י חֶ֖לֶץ הַ/פְּלוֹנִֽי׃ס
translation:
  text: Shammoth the Harorite, Helez the Pelonite;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: In the parallel list at 2 Samuel 23:26, the designation is 'the Harodite.'
      Chronicles here reads 'the Harorite.'
    reason: textual_variant
  - marker: b
    text: In the parallel list at 2 Samuel 23:26, Helez is called 'the Paltite.' Chronicles
      here reads 'the Pelonite.'
    reason: textual_variant
lexical_decisions:
- source_word: שַׁמּוֹת
  chosen: Shammoth
  alternatives:
  - Shammot
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. English convention commonly represents final ת here as 'th' in this
    name tradition.
- source_word: הֲרוֹרִי
  chosen: the Harorite
  alternatives:
  - the Harodite
  lexicon: HALOT
  rationale: Gentilic with article, rendered as a clan/place designation. 'Harorite'
    follows the consonantal form in Chronicles (הררי/הרורי-type tradition) rather
    than harmonizing to the Samuel parallel's 'Harodite.' Because the underlying place/name
    is uncertain and there is a known parallel variation, the alternative is preserved
    in a footnote.
- source_word: חֶלֶץ
  chosen: Helez
  rationale: Proper personal name; standard transliteration.
- source_word: פְּלוֹנִי
  chosen: the Pelonite
  alternatives:
  - the Paltite
  lexicon: HALOT
  rationale: Gentilic with article, transliterated as a place/clan designation. 'Pelonite'
    reflects the Masoretic form in Chronicles and should not be replaced by the Samuel
    parallel 'Paltite' in the main text. The parallel form is worth preserving in
    a footnote due to likely textual or traditional variation.
