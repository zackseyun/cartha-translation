id: 1CH.11.15
reference: 1 Chronicles 11:15
source:
  edition: WLC
  text: וַ/יֵּרְד֡וּ שְֽׁלוֹשָׁה֩ מִן הַ/שְּׁלוֹשִׁ֨ים רֹ֤אשׁ עַל הַ/צֻּר֙ אֶל דָּוִ֔יד
    אֶל מְעָרַ֖ת עֲדֻלָּ֑ם וּ/מַחֲנֵ֣ה פְלִשְׁתִּ֔ים חֹנָ֖ה בְּ/עֵ֥מֶק רְפָאִֽים־־־־׃
translation:
  text: Then three of the thirty chief men went down to the rock, to David, at the
    cave of Adullam, while the camp of the Philistines was encamped in the Valley
    of Rephaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'three of the thirty chiefs went down upon the rock to
      David, to the cave of Adullam.' The Hebrew syntax is compressed, and 'at the
      cave of Adullam' in the main text clarifies David's location.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרְדוּ
  chosen: went down
  alternatives:
  - came down
  - descended
  lexicon: HALOT
  rationale: Wayyiqtol of ירד, the standard narrative form meaning 'went down' or
    'descended.' 'Went down' is natural modern English and preserves the directional
    sense.
- source_word: שְׁלוֹשָׁה מִן־הַשְּׁלוֹשִׁים
  chosen: three of the thirty
  alternatives:
  - three from the thirty
  lexicon: HALOT
  rationale: The phrase straightforwardly identifies a subgroup drawn from 'the thirty,'
    the known body of David's warriors. 'Of the thirty' is idiomatic English.
- source_word: רֹאשׁ
  chosen: chief men
  alternatives:
  - chief
  - leaders
  - captains
  lexicon: HALOT
  rationale: Here רֹאשׁ functions appositionally to qualify the three as leading figures
    among the thirty. 'Chief men' preserves the sense of rank without over-specifying
    a military office such as 'captains.'
- source_word: עַל־הַצּוּר
  chosen: to the rock
  alternatives:
  - upon the rock
  - down to the rock
  lexicon: HALOT
  rationale: The preposition על can denote movement onto/up to/toward depending on
    context. In this narrative setting, the phrase likely marks the rocky stronghold
    area associated with David's refuge. 'To the rock' is concise and idiomatic, while
    preserving the concrete topographical reference.
- source_word: אֶל־דָּוִיד
  chosen: to David
  alternatives:
  - for David
  lexicon: HALOT
  rationale: אֶל marks direction toward David; 'to David' is the plain sense.
- source_word: אֶל־מְעָרַת עֲדֻלָּם
  chosen: at the cave of Adullam
  alternatives:
  - to the cave of Adullam
  lexicon: HALOT
  rationale: 'Although אֶל often means ''to,'' English style is improved by rendering
    the second phrase locatively in apposition to David''s location: they went down
    to David, who was at the cave of Adullam. This reflects the sense without awkward
    repetition.'
- source_word: וּמַחֲנֵה פְלִשְׁתִּים
  chosen: while the camp of the Philistines
  alternatives:
  - and the camp of the Philistines
  lexicon: HALOT
  rationale: The conjunction introduces the circumstantial setting rather than a new
    main action. 'While' makes the temporal/background force explicit in natural English.
- source_word: חֹנָה
  chosen: was encamped
  alternatives:
  - was camping
  - camped
  lexicon: HALOT
  rationale: Qal participle feminine singular agreeing with מַחֲנֶה used as a collective
    noun. 'Was encamped' conveys the ongoing circumstantial state.
- source_word: בְּעֵמֶק רְפָאִים
  chosen: in the Valley of Rephaim
  alternatives:
  - in the valley of Rephaim
  lexicon: HALOT
  rationale: A geographic proper name. Capitalizing 'Valley' is appropriate in English
    for a recognized place name; 'Rephaim' is transliterated as a proper noun.
