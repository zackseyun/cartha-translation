id: 1CH.11.14
reference: 1 Chronicles 11:14
source:
  edition: WLC
  text: וַ/יִּֽתְיַצְּב֤וּ בְ/תוֹךְ הַ/חֶלְקָה֙ וַ/יַּצִּיל֔וּ/הָ וַ/יַּכּ֖וּ אֶת פְּלִשְׁתִּ֑ים וַ/יּ֥וֹשַׁע יְהוָ֖ה תְּשׁוּעָ֥ה גְדוֹלָֽה־־׃
translation:
  text: And they took their stand in the middle of the plot and delivered it, and they struck down the Philistines, and Yahweh saved by a great victory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD brought about a great deliverance' or 'the LORD gave a great victory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְיַצְּבוּ
  chosen: they took their stand
  alternatives:
  - they stationed themselves
  - they stood firm
  lexicon: HALOT
  rationale: The hitpael of יצב conveys taking a firm position or standing one's ground. 'Took their stand' is idiomatic English that preserves the deliberate, martial sense.
- source_word: בְּתוֹךְ הַחֶלְקָה
  chosen: in the middle of the plot
  alternatives:
  - in the midst of the field
  - within the parcel
  lexicon: HALOT
  rationale: תוך means 'midst/middle of,' and חלקה denotes a plot or parcel of cultivated land. 'Plot' fits the agricultural setting and avoids overgeneralizing to any field.
- source_word: וַיַּצִּילוּהָ
  chosen: delivered it
  alternatives:
  - rescued it
  - saved it
  lexicon: HALOT
  rationale: The verb נצל commonly means rescue/deliver. Because the object is the plot of land, 'delivered it' preserves the military sense of saving it from enemy seizure without sounding awkwardly personal.
- source_word: וַיַּכּוּ אֶת־פְּלִשְׁתִּים
  chosen: they struck down the Philistines
  alternatives:
  - they struck the Philistines
  - they defeated the Philistines
  lexicon: HALOT
  rationale: נכה often means strike/smite and in battle contexts can imply lethal defeat. 'Struck down' preserves the force better than the weaker 'struck' while avoiding the interpretive expansion of 'defeated' alone.
- source_word: וַיּוֹשַׁע יְהוָה
  chosen: the LORD saved them
  alternatives:
  - the LORD brought salvation
  - the LORD gave victory
  lexicon: HALOT
  rationale: The subject is YHWH, which per doctrine is rendered 'the LORD.' Although no explicit object is stated in Hebrew, English idiom benefits from supplying 'them' from the battle context. 'Saved' keeps the lexical link with ישׁע and the following תשועה.
- source_word: תְּשׁוּעָה גְדוֹלָה
  chosen: by a great victory
  alternatives:
  - a great salvation
  - a great deliverance
  lexicon: HALOT
  rationale: תשועה can mean salvation, deliverance, or victory. In this immediate military context, 'great victory' best communicates the concrete sense in natural English. Using 'saved them by a great victory' preserves the Hebrew wordplay between the verb and noun without becoming wooden.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
