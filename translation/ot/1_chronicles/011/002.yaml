id: 1CH.11.2
reference: 1 Chronicles 11:2
source:
  edition: WLC
  text: גַּם תְּמ֣וֹל גַּם שִׁלְשׁ֗וֹם גַּ֚ם בִּ/הְי֣וֹת שָׁא֣וּל מֶ֔לֶךְ אַתָּ֛ה הַ/מּוֹצִ֥יא וְ/הַ/מֵּבִ֖יא אֶת יִשְׂרָאֵ֑ל וַ/יֹּאמֶר֩ יְהוָ֨ה אֱלֹהֶ֜י/ךָ לְ/ךָ֗ אַתָּ֨ה תִרְעֶ֤ה אֶת עַמִּ/י֙ אֶת יִשְׂרָאֵ֔ל וְ/אַתָּה֙ תִּהְיֶ֣ה נָגִ֔יד עַ֖ל עַמִּ֥/י יִשְׂרָאֵֽל־־־־־׃
translation:
  text: Even in times past, even before, when Saul was king, you were the one who led Israel out and brought them in; and Yahweh your God said to you, ‘You shall shepherd my people Israel, and you shall be ruler over my people Israel.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'both yesterday and the day before yesterday,' a Hebrew idiom meaning 'formerly' or 'in times past.'
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'you were the one who led out and brought in Israel,' a Hebrew expression for exercising leadership over the people.
    reason: lexical_alternative
  - marker: c
    text: Or 'leader' or 'prince' for 'ruler'; the Hebrew term is not the usual word for 'king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם תְּמוֹל גַּם שִׁלְשׁוֹם
  chosen: Even in times past, even before
  alternatives:
  - Both yesterday and the day before
  - For some time now
  lexicon: HALOT
  rationale: The idiom literally refers to 'yesterday and the third day'/'day before yesterday,' but in context functions as a temporal idiom meaning formerly or in past time. 'Even in times past, even before' preserves the emphatic repetition of גַּם while expressing the idiomatic sense in natural English.
- source_word: בִּהְיוֹת שָׁאוּל מֶלֶךְ
  chosen: when Saul was king
  alternatives:
  - while Saul was king
  lexicon: HALOT
  rationale: The infinitive construct with ב marks a temporal clause. 'When Saul was king' is straightforward and idiomatic.
- source_word: אַתָּה הַמּוֹצִיא וְהַמֵּבִיא אֶת יִשְׂרָאֵל
  chosen: you were the one who led Israel out and brought them in
  alternatives:
  - you were the one who went out and came in before Israel
  - you were the one who led out and brought in Israel
  lexicon: HALOT
  rationale: The idiom 'go out and come in' in leadership contexts refers to leading the people in military/civic activity. Rendering it as 'led Israel out and brought them in' preserves the Hebrew imagery while clarifying that David functioned as Israel's leader, not merely moving himself.
- source_word: וַיֹּאמֶר יְהוָה אֱלֹהֶיךָ לְךָ
  chosen: and the LORD your God said to you
  alternatives:
  - and the LORD, your God, said to you
  lexicon: HALOT
  rationale: 'יְהוָה is rendered ''the LORD'' per doctrine. The suffix on אֱלֹהֶיךָ is singular, addressed to David: ''your God.'''
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אַתָּה תִרְעֶה אֶת עַמִּי אֶת יִשְׂרָאֵל
  chosen: You shall shepherd my people Israel
  alternatives:
  - You shall pasture my people Israel
  - You shall tend my people Israel
  lexicon: HALOT
  rationale: רעה in this context is the standard royal/shepherd metaphor. 'Shepherd' preserves the metaphor and its theological resonance better than the flatter 'rule' or 'lead.'
- source_word: נָגִיד
  chosen: ruler
  alternatives:
  - prince
  - leader
  - chief
  lexicon: HALOT
  rationale: נָגִיד denotes one appointed as leader/ruler, often with royal connotations but not identical to 'king' (מֶלֶךְ). 'Ruler' preserves the distinction from Saul's title 'king' earlier in the verse.
