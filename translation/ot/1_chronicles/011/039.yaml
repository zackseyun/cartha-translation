id: 1CH.11.39
reference: 1 Chronicles 11:39
source:
  edition: WLC
  text: צֶ֖לֶק הָ/עַמּוֹנִ֑י נַחְרַי֙ הַ/בֵּ֣רֹתִ֔י נֹשֵׂ֕א כְּלֵ֖י יוֹאָ֥ב בֶּן צְרוּיָֽה־׃ס
translation:
  text: Zelek the Ammonite, Naharai the Beerothite, the armor-bearer of Joab son of
    Zeruiah;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'bearer of the weapons of Joab.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צֶלֶק
  chosen: Zelek
  rationale: Proper personal name; transliterated according to the translation philosophy
    of transliterating names rather than translating them.
- source_word: הָעַמּוֹנִי
  chosen: the Ammonite
  alternatives:
  - an Ammonite
  lexicon: HALOT
  rationale: Gentilic with article, identifying Zelek by ethnic/geographic origin.
    'The Ammonite' is the most natural formal rendering in a list of warriors.
- source_word: נַחְרַי
  chosen: Naharai
  alternatives:
  - Nahrai
  rationale: Proper personal name. Rendered by standard transliteration; English traditions
    vary between 'Naharai' and 'Nahrai' depending on how fully the vowel pattern is
    represented.
- source_word: הַבֵּרֹתִי
  chosen: the Beerothite
  alternatives:
  - the Berothite
  lexicon: HALOT
  rationale: Gentilic from Beeroth, marked with article. 'Beerothite' preserves the
    place-name connection more transparently than a shortened form.
- source_word: נֹשֵׂא כְּלֵי
  chosen: the armor-bearer
  alternatives:
  - the bearer of the weapons
  - the weapons-bearer
  lexicon: HALOT
  rationale: The participle plus 'weapons/gear' is an established Hebrew expression
    for an armor-bearer. This is a clear idiomatic rendering in modern English.
- source_word: יוֹאָב
  chosen: Joab
  rationale: Proper personal name; standard English transliteration.
- source_word: בֶּן צְרוּיָה
  chosen: son of Zeruiah
  alternatives:
  - the son of Zeruiah
  rationale: Construct chain identifying Joab by maternal lineage, as commonly in
    Samuel/Chronicles. 'Son of Zeruiah' is the natural English rendering and preserves
    the Hebrew identification.
