id: 1CH.11.23
reference: 1 Chronicles 11:23
source:
  edition: WLC
  text: וְ/הֽוּא הִכָּה֩ אֶת הָ/אִ֨ישׁ הַ/מִּצְרִ֜י אִ֥ישׁ מִדָּ֣ה חָמֵ֣שׁ בָּ/אַמָּ֗ה
    וּ/בְ/יַ֨ד הַ/מִּצְרִ֤י חֲנִית֙ כִּ/מְנ֣וֹר אֹרְגִ֔ים וַ/יֵּ֥רֶד אֵלָ֖י/ו בַּ/שָּׁ֑בֶט
    וַ/יִּגְזֹ֤ל אֶֽת הַ/חֲנִית֙ מִ/יַּ֣ד הַ/מִּצְרִ֔י וַ/יַּהַרְגֵ֖/הוּ בַּ/חֲנִיתֽ/וֹ־־׀־׃
translation:
  text: And he struck down the Egyptian, a man five cubits tall. In the Egyptian’s
    hand was a spear like a weaver’s beam, yet he went down to him with a staff, snatched
    the spear from the Egyptian’s hand, and killed him with his own spear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a man of great stature, five cubits tall.' The Hebrew phrase literally
      reads 'a man of measure.'
    reason: lexical_alternative
  - marker: b
    text: A cubit was an ancient unit of length roughly equivalent to the distance
      from the elbow to the fingertips.
    reason: cultural_note
  - marker: c
    text: Or, 'with a club' or 'with a rod' for 'with a staff.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכָּה
  chosen: struck down
  alternatives:
  - struck
  - killed
  lexicon: HALOT
  rationale: The verb נכה can mean 'strike' broadly, but in this combat context it
    results in death. 'Struck down' preserves the violent action without prematurely
    collapsing it into 'killed,' since the explicit killing verb appears later in
    the verse.
- source_word: הָאִישׁ הַמִּצְרִי
  chosen: the Egyptian
  alternatives:
  - the Egyptian man
  lexicon: HALOT
  rationale: English idiom does not require repeating 'man' here; 'the Egyptian' naturally
    conveys the individual opponent.
- source_word: אִישׁ מִדָּה
  chosen: a man ... tall
  alternatives:
  - a man of measure
  - a man of great stature
  lexicon: HALOT
  rationale: The phrase denotes exceptional size or stature. Rendering it with the
    following measurement as 'a man five cubits tall' communicates the sense clearly
    in modern English.
- source_word: חָמֵשׁ בָּאַמָּה
  chosen: five cubits tall
  alternatives:
  - five cubits in height
  lexicon: HALOT
  rationale: This is a straightforward measurement phrase. 'Cubits' preserves the
    ancient unit rather than converting it, maintaining formal transparency.
- source_word: חֲנִית
  chosen: spear
  alternatives:
  - javelin
  lexicon: HALOT
  rationale: The weapon is best rendered 'spear' in this narrative context; it matches
    the comparison to a weaver's beam and the parallel account.
- source_word: כִּמְנוֹר אֹרְגִים
  chosen: like a weaver’s beam
  alternatives:
  - like the beam of weavers
  lexicon: HALOT
  rationale: 'This is the conventional and accurate sense: the spear shaft was as
    thick or imposing as a loom beam. ''Weaver’s beam'' is idiomatic and precise.'
- source_word: וַיֵּרֶד אֵלָיו
  chosen: he went down to him
  alternatives:
  - he came down against him
  - he advanced toward him
  lexicon: HALOT
  rationale: ירד literally means 'went down.' Even if the motion may imply attack
    or descent into combat, the literal wording is retained because it is natural
    enough in English and preserves the narrative texture.
- source_word: בַּשָּׁבֶט
  chosen: with a staff
  alternatives:
  - with a club
  - with a rod
  lexicon: HALOT
  rationale: שבט can denote rod, staff, or club depending on context. Here 'staff'
    is the broadest and least interpretively loaded choice, contrasting with the Egyptian's
    spear.
- source_word: וַיִּגְזֹל
  chosen: snatched
  alternatives:
  - seized
  - took away
  - robbed
  lexicon: HALOT
  rationale: The verb conveys forceful taking. 'Snatched' fits the rapid combat action
    better than the more commercial sense of 'robbed.'
- source_word: וַיַּהַרְגֵהוּ
  chosen: killed him
  alternatives:
  - slew him
  lexicon: HALOT
  rationale: This is the explicit death verb in the verse. 'Killed him' is clear modern
    English and avoids archaic diction.
- source_word: בַּחֲנִיתוֹ
  chosen: with his own spear
  alternatives:
  - with the spear
  - with his spear
  lexicon: HALOT
  rationale: The suffix most naturally refers to the Egyptian's spear just taken from
    him. 'His own spear' makes that referent explicit in English and clarifies the
    irony of the action.
