id: 1CH.11.8
reference: 1 Chronicles 11:8
source:
  edition: WLC
  text: וַ/יִּ֤בֶן הָ/עִיר֙ מִ/סָּבִ֔יב מִן הַ/מִּלּ֖וֹא וְ/עַד הַ/סָּבִ֑יב וְ/יוֹאָ֕ב
    יְחַיֶּ֖ה אֶת שְׁאָ֥ר הָ/עִֽיר־־־׃
translation:
  text: He built the city all around, from the Millo even to the surrounding area,
    and Joab restored the rest of the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Joab revived/repaired the rest of the city.' The Hebrew verb literally
      means 'made alive,' here likely used idiomatically for restoring the city.
    reason: lexical_alternative
  - marker: b
    text: '''The Millo'' is a topographical term in Jerusalem; its precise meaning
      is uncertain. It may refer to a terraced structure or filled-in earthwork.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: He built
  alternatives:
  - And he built
  - He rebuilt
  lexicon: HALOT
  rationale: Qal wayyiqtol of בנה normally denotes straightforward past narrative
    action, 'built.' The subject is David from the prior verse. 'And he built' is
    possible but English style can omit the conjunction at sentence start. 'Rebuilt'
    would overinterpret without explicit contextual necessity.
- source_word: הָעִיר
  chosen: the city
  alternatives:
  - the town
  lexicon: HALOT
  rationale: עִיר is the standard term for 'city.' 'Town' is possible in some contexts,
    but 'city' best fits Jerusalem/Zion in this royal narrative.
- source_word: מִסָּבִיב
  chosen: all around
  alternatives:
  - around
  - from around
  lexicon: HALOT
  rationale: The adverbial use of סָבִיב conveys surrounding extent. 'All around'
    captures the distributive sense naturally in English.
- source_word: מִן הַמִּלּוֹא
  chosen: from the Millo
  alternatives:
  - from the terraces
  - from the fill
  lexicon: HALOT
  rationale: מִלּוֹא is best left as the proper/topographical term 'the Millo,' since
    its exact referent is debated. More interpretive renderings like 'terraces' or
    'fill' should be preserved, if at all, in a footnote rather than imposed in the
    main text.
- source_word: וְעַד הַסָּבִיב
  chosen: even to the surrounding area
  alternatives:
  - and as far as all around
  - and to the circuit
  lexicon: HALOT
  rationale: The phrase marks the extent of construction from the Millo outward/to
    the perimeter. 'Even to the surrounding area' gives a readable rendering without
    forcing a highly technical sense. The Hebrew is somewhat compressed, so a natural
    English expansion is warranted.
- source_word: וְיוֹאָב
  chosen: and Joab
  lexicon: HALOT
  rationale: Proper name transliterated according to standard convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: יְחַיֶּה
  chosen: restored
  alternatives:
  - revived
  - kept alive
  - repaired
  lexicon: HALOT
  rationale: The Piel of חיה literally means 'made alive,' but in relation to a city
    it idiomatically refers to restoring or repairing it so that it flourishes again.
    'Restored' best communicates the likely sense in idiomatic modern English. 'Revived'
    is more literal but less natural for urban construction; 'repaired' is narrower
    than the probable sense.
- source_word: אֶת שְׁאָר הָעִיר
  chosen: the rest of the city
  alternatives:
  - the remainder of the city
  lexicon: HALOT
  rationale: שְׁאָר means what remains, the rest/remainder. 'The rest of the city'
    is the most natural modern English rendering.
