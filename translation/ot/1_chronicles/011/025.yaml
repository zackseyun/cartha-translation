id: 1CH.11.25
reference: 1 Chronicles 11:25
source:
  edition: WLC
  text: מִן הַ/שְּׁלוֹשִׁ֗ים הִנּ֤/וֹ נִכְבָּד֙ ה֔וּא וְ/אֶל הַ/שְּׁלוֹשָׁ֖ה לֹא בָ֑א
    וַ/יְשִׂימֵ֥/הוּ דָוִ֖יד עַל מִשְׁמַעְתּֽ/וֹ־־־־׃ס
translation:
  text: Among the Thirty, he was indeed honored, but he did not attain to the Three;
    and David appointed him over his bodyguard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he did not reach the Three.' The Hebrew literally says 'he did not come
      to the Three,' using 'come' idiomatically for attaining their rank.
    reason: lexical_alternative
  - marker: b
    text: Or 'over his guard' or 'over those under his command.' The Hebrew term may
      refer more broadly to a guard unit or charge under David's authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן הַשְּׁלוֹשִׁים
  chosen: Among the Thirty
  alternatives:
  - More than the Thirty
  - From the Thirty
  lexicon: HALOT
  rationale: 'The preposition מִן with a group designation here is best taken partitively/comparatively
    in context: he belongs to or is ranked within the Thirty. ''Among the Thirty''
    is idiomatic English and fits the parallel with the following clause about not
    reaching ''the Three.'''
- source_word: הִנּוֹ
  chosen: indeed
  alternatives:
  - behold
  - surely
  lexicon: HALOT
  rationale: The particle adds emphasis rather than introducing a visual command in
    English. 'Indeed' preserves the emphatic force in natural modern English.
- source_word: נִכְבָּד
  chosen: honored
  alternatives:
  - esteemed
  - glorious
  lexicon: HALOT
  rationale: The Niphal of כבד here denotes being weighty/honored in status. 'Honored'
    fits the military-ranking context better than the more abstract 'glorious.'
- source_word: וְאֶל הַשְּׁלוֹשָׁה לֹא בָא
  chosen: but he did not attain to the Three
  alternatives:
  - but he did not come up to the Three
  - but he did not reach the Three
  lexicon: HALOT
  rationale: בוא with אֶל in this context expresses reaching or attaining a rank/status,
    not simple physical movement. 'Attain to' clearly conveys comparative status.
- source_word: הַשְּׁלוֹשָׁה
  chosen: the Three
  alternatives:
  - the chief three
  lexicon: HALOT
  rationale: The phrase refers to the elite triad within David's warriors. 'The Three'
    is the direct rendering; 'chief' is interpretive and not explicit in this clause.
- source_word: וַיְשִׂימֵהוּ
  chosen: and David appointed him
  alternatives:
  - and David set him
  - and David placed him
  lexicon: HALOT
  rationale: שׂים commonly means 'set/place,' but in an administrative or military
    context 'appointed' best conveys the sense of assigning office.
- source_word: עַל מִשְׁמַעְתּוֹ
  chosen: over his bodyguard
  alternatives:
  - over his hearing/obedience
  - over his guard
  - over those who obeyed him
  lexicon: HALOT
  rationale: מִשְׁמַעַת can denote a body under command, charge, or guard detail.
    In this context of David's military organization, 'bodyguard' is the most plausible
    and idiomatic rendering, reflecting a personal guard under the king's command.
