id: 1CH.11.43
reference: 1 Chronicles 11:43
source:
  edition: WLC
  text: חָנָן֙ בֶּֽן מַעֲכָ֔ה וְ/יוֹשָׁפָ֖ט הַ/מִּתְנִֽי־׃ס
translation:
  text: Hanan son of Maacah, and Joshaphat the Mithnite;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew יוֹשָׁפָט here is shorter than the more familiar name form often
      rendered 'Jehoshaphat'; hence 'Joshaphat.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָנָן
  chosen: Hanan
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - ben
  lexicon: HALOT
  rationale: Standard genealogical/patronymic marker meaning 'son of.' In this list
    context it identifies lineage rather than requiring a more dynamic rendering.
- source_word: מַעֲכָה
  chosen: Maacah
  alternatives:
  - Maakah
  lexicon: HALOT
  rationale: Proper name, here most naturally the father/ancestor named in the patronymic
    expression 'son of Maacah.' Transliterated rather than translated.
- source_word: וְיוֹשָׁפָט
  chosen: and Joshaphat
  alternatives:
  - and Jehoshaphat
  lexicon: HALOT
  rationale: Conjunction plus proper personal name. The shorter transliteration 'Joshaphat'
    reflects the Hebrew form here (Yošaphat) rather than importing the fuller familiar
    English form 'Jehoshaphat' from other name forms.
- source_word: הַמִּתְנִי
  chosen: the Mithnite
  alternatives:
  - the Mithni
  - the man from Mithni
  lexicon: HALOT
  rationale: Gentilic/title with article, identifying Joshaphat by place or clan affiliation.
    'The Mithnite' is the most natural formal English rendering for a Hebrew gentilic
    in a warrior list.
