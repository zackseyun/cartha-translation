id: 1CH.11.4
reference: 1 Chronicles 11:4
source:
  edition: WLC
  text: וַ/יֵּ֨לֶךְ דָּוִ֧יד וְ/כָל יִשְׂרָאֵ֛ל יְרוּשָׁלִַ֖ם הִ֣יא יְב֑וּס וְ/שָׁם֙
    הַ/יְבוּסִ֔י יֹשְׁבֵ֖י הָ/אָֽרֶץ־׃
translation:
  text: Then David and all Israel went to Jerusalem—that is, Jebus—where the Jebusites,
    the inhabitants of the land, were.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and there the Jebusite, inhabitants of the land''; ''the Jebusite''
      is a collective singular, hence ''the Jebusites.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: Then ... went
  alternatives:
  - And ... went
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... went' gives natural
    English narrative flow while preserving the sequential sense of the Hebrew verb
    הלך.
- source_word: וְכָל יִשְׂרָאֵל
  chosen: and all Israel
  alternatives:
  - with all Israel
  lexicon: HALOT
  rationale: A straightforward rendering of the conjunction plus noun phrase. 'All
    Israel' is the established and natural English equivalent for the collective national
    designation.
- source_word: יְרוּשָׁלִַם הִיא יְבוּס
  chosen: Jerusalem—that is, Jebus
  alternatives:
  - Jerusalem (that is, Jebus)
  - Jerusalem, which is Jebus
  lexicon: HALOT
  rationale: The pronoun הִיא identifies Jerusalem with its older name Jebus. An appositional
    explanatory rendering communicates the equivalence clearly in modern English.
- source_word: וְשָׁם
  chosen: where
  alternatives:
  - and there
  lexicon: HALOT
  rationale: Although literally 'and there,' English idiom prefers 'where' when introducing
    the clause describing the city's inhabitants. This preserves the sense without
    awkwardness.
- source_word: הַיְבוּסִי
  chosen: the Jebusites
  alternatives:
  - the Jebusite people
  - the Jebusite
  lexicon: HALOT
  rationale: Though morphologically singular, the term functions collectively here,
    as shown by the following plural participle 'inhabitants.' English therefore naturally
    uses the plural ethnonym 'the Jebusites.'
- source_word: יֹשְׁבֵי הָאָרֶץ
  chosen: the inhabitants of the land
  alternatives:
  - those dwelling in the land
  - the inhabitants of the הארץ/land
  lexicon: HALOT
  rationale: The participial construct means 'inhabitants of.' 'Land' is the most
    direct rendering of אָרֶץ here. In context it refers to the local land/region
    occupied by the Jebusites, not necessarily the whole earth.
