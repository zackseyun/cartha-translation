id: 1CH.11.33
reference: 1 Chronicles 11:33
source:
  edition: WLC
  text: עַזְמָ֨וֶת֙ הַ/בַּ֣חֲרוּמִ֔י אֶלְיַחְבָּ֖א הַ/שַּׁעַלְבֹנִֽי׃ס
translation:
  text: Azmaveth the Baharumite, Eliyahba the Shaalbonite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the Baharumite'; possibly related to Bahurim, hence 'the Bahurimite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַזְמָוֶת
  chosen: Azmaveth
  alternatives:
  - Azmavet
  rationale: Proper personal name (HNp). Following the translation philosophy, personal
    names are transliterated rather than translated. 'Azmaveth' reflects a standard
    English transliteration of the Hebrew name.
- source_word: הַבַּחֲרוּמִי
  chosen: the Baharumite
  alternatives:
  - the Baharumite man
  - the Bahurimite
  lexicon: HALOT
  rationale: Gentilic with article, identifying Azmaveth by place/clan association.
    'Baharumite' is a direct transliteration of the form as pointed in the Masoretic
    Text. 'Bahurimite' reflects the likely association with Bahurim known elsewhere,
    but the main text follows the consonantal/vocalized form here more closely.
- source_word: אֶלְיַחְבָּא
  chosen: Eliyahba
  alternatives:
  - Eliahba
  rationale: Proper personal name (HNp). Transliterated directly from Hebrew. 'Eliyahba'
    preserves the visible divine element and Hebrew phonology more transparently,
    while 'Eliahba' is a possible simplified English form.
- source_word: הַשַּׁעַלְבֹנִי
  chosen: the Shaalbonite
  alternatives:
  - the Shaalbomite
  - the man from Shaalbon
  lexicon: HALOT
  rationale: Gentilic with article, denoting origin from Shaalbon/Shaalbim-related
    locality. 'Shaalbonite' is the most straightforward transliteration of the MT
    form. A more interpretive rendering such as 'the man from Shaalbon' is possible
    but less concise and less consistent with list-style gentilics in this context.
