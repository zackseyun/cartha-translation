theological_decisions:
- issue: Kinship idiom used in royal acclamation
  chosen_reading: Rendered literally as 'your bone and your flesh' rather than interpreting
    it as a looser paraphrase such as 'we are your own people.'
  alternative_readings:
  - we are your own flesh and blood
  - we are your kin
  rationale: The phrase signals shared kinship and covenant solidarity with David.
    A more paraphrastic rendering would communicate the sense but obscure the concrete
    Hebrew idiom and its intertextual resonance in royal/national contexts.
  doctrine_reference: Translation philosophy §§1, 3, 6
