id: 1CH.11.1
reference: 1 Chronicles 11:1
source:
  edition: WLC
  text: וַ/יִּקָּבְצ֧וּ כָֽל יִשְׂרָאֵ֛ל אֶל דָּוִ֖יד חֶבְר֣וֹנָ/ה לֵ/אמֹ֑ר הִנֵּ֛ה
    עַצְמְ/ךָ֥ וּֽ/בְשָׂרְ/ךָ֖ אֲנָֽחְנוּ־־׃
translation:
  text: Then all Israel gathered to David at Hebron, saying, “Look, we are your bone
    and your flesh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “we are your own flesh and blood.” The Hebrew reads
      literally, “your bone and your flesh.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּבְצוּ
  chosen: Then ... gathered
  alternatives:
  - assembled
  - came together
  lexicon: HALOT
  rationale: The Niphal wayyiqtol of קבץ denotes collective assembling. 'Gathered'
    is natural modern English and preserves the corporate action. 'Then' reflects
    the narrative wayyiqtol sequence.
- source_word: כָל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - all the Israelites
  lexicon: HALOT
  rationale: A standard collective expression for the nation/tribal representatives.
    'All Israel' preserves the Hebrew idiom and its political-covenantal force better
    than the more interpretive 'all the Israelites.'
- source_word: אֶל דָּוִיד
  chosen: to David
  alternatives:
  - before David
  lexicon: HALOT
  rationale: אֶל normally marks movement toward. 'To David' is the most direct rendering
    in this context of coming to him at Hebron.
- source_word: חֶבְרֹנָה
  chosen: at Hebron
  alternatives:
  - to Hebron
  lexicon: HALOT
  rationale: The directional he indicates motion toward Hebron, but in English the
    clause naturally locates the meeting there once the gathering is complete. 'At
    Hebron' best fits the whole event in idiomatic English while retaining the place
    reference.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The infinitive construct formula introduces direct speech. 'Saying' is
    concise and formally close to the Hebrew.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  lexicon: HALOT
  rationale: הִנֵּה is a discourse particle drawing attention. 'Look' is readable
    modern English and preserves the deictic force without archaic tone.
- source_word: עַצְמְךָ וּבְשָׂרְךָ
  chosen: your bone and your flesh
  alternatives:
  - your bones and your flesh
  - your own flesh and blood
  lexicon: HALOT
  rationale: The idiom expresses kinship/solidarity. 'Bone and flesh' stays close
    to the Hebrew wording; singular 'bone' matches the Hebrew form. 'Flesh and blood'
    is a possible English idiom but shifts the lexical imagery away from the source.
- source_word: אֲנָחְנוּ
  chosen: we are
  alternatives:
  - we
  lexicon: HALOT
  rationale: Hebrew nominal clauses often omit the copula; English requires it. 'We
    are' makes the predication explicit and natural.
