id: 1CH.11.42
reference: 1 Chronicles 11:42
source:
  edition: WLC
  text: עֲדִינָ֨א בֶן שִׁיזָ֜א הָ/רֽאוּבֵנִ֗י רֹ֛אשׁ לָ/רֽאוּבֵנִ֖י וְ/עָלָ֥י/ו שְׁלוֹשִֽׁים־׃ס
translation:
  text: Adina son of Shiza the Reubenite, a chief of the Reubenites, and with him
    were thirty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and over him were thirty.' The Hebrew preposition can
      be read more literally, but in this military list it likely means thirty men
      were attached to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲדִינָא
  chosen: Adina
  lexicon: HALOT
  rationale: Proper personal name; transliterated per translation philosophy to preserve
    the Hebrew name rather than translate.
- source_word: בֶן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The construct בן commonly denotes immediate filiation in genealogical
    and warrior lists; 'son of' is the most natural and sufficiently formal rendering
    here.
- source_word: שִׁיזָא
  chosen: Shiza
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard convention.
- source_word: הָרְאוּבֵנִי
  chosen: the Reubenite
  alternatives:
  - of Reuben
  lexicon: HALOT
  rationale: The gentilic with article identifies tribal affiliation. 'The Reubenite'
    is concise and idiomatic in English.
- source_word: רֹאשׁ
  chosen: a chief
  alternatives:
  - head
  - leader
  lexicon: HALOT
  rationale: In this military-list context, רֹאשׁ denotes leadership status rather
    than anatomical 'head.' 'Chief' preserves the sense of rank without over-specifying
    office.
- source_word: לָרְאוּבֵנִי
  chosen: of the Reubenites
  alternatives:
  - for the Reubenites
  - belonging to the Reubenites
  lexicon: HALOT
  rationale: The phrase רֹאשׁ לָרְאוּבֵנִי is best taken as 'chief of the Reubenites,'
    with ל marking relation/sphere. English 'of' communicates the leadership relationship
    most naturally.
- source_word: וְעָלָיו
  chosen: and with him were
  alternatives:
  - and over him were
  - and upon him were
  lexicon: HALOT
  rationale: Although the preposition על literally means 'upon/over,' in this roster
    context the idiom is commonly understood to indicate men attached to or accompanying
    him. 'With him were' gives the likely sense in readable English while avoiding
    a misleadingly literal 'over him.'
- source_word: שְׁלוֹשִׁים
  chosen: thirty
  lexicon: HALOT
  rationale: Cardinal number rendered directly. In context it most naturally refers
    to thirty men associated with Adina.
