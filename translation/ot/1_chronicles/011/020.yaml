id: 1CH.11.20
reference: 1 Chronicles 11:20
source:
  edition: WLC
  text: וְ/אַבְשַׁ֣י אֲחִֽי יוֹאָ֗ב ה֤וּא הָיָה֙ רֹ֣אשׁ הַ/שְּׁלוֹשָׁ֔ה וְ/הוּא֙ עוֹרֵ֣ר
    אֶת חֲנִית֔/וֹ עַל שְׁלֹ֥שׁ מֵא֖וֹת חָלָ֑ל ו/לא שֵׁ֖ם בַּ/שְּׁלוֹשָֽׁה־־־־׃
translation:
  text: And Abishai, the brother of Joab, was chief of the Three. He brandished his
    spear against three hundred slain, and had a name among the Three.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Three.'' In the parallel passage (2 Sam 23:18), some English
      versions render the group differently because of textual and contextual difficulties
      involving ''three'' and ''thirty.'''
    reason: textual_variant
  - marker: b
    text: Or 'lifted up his spear' or 'wielded his spear.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew idiom is literally 'had a name,' that is, 'was renowned.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאשׁ
  chosen: chief
  alternatives:
  - head
  - leader
  lexicon: HALOT
  rationale: In this military context רֹאשׁ denotes rank or leadership status, not
    a literal head. 'Chief' is concise, natural English for the office Abishai held
    over the group.
- source_word: הַשְּׁלוֹשָׁה / בַּשְּׁלוֹשָׁה
  chosen: the Three / among the Three
  alternatives:
  - the thirty
  - the three warriors
  lexicon: HALOT
  rationale: The Hebrew form here is plainly 'the three,' matching the immediate wording
    of the verse. Because the surrounding Davidic-warrior material can involve textual
    and contextual complexity between 'three' and 'thirty' in parallel passages, the
    main text preserves the MT wording here rather than harmonizing.
- source_word: עוֹרֵר אֶת־חֲנִיתוֹ
  chosen: brandished his spear
  alternatives:
  - roused/wielded his spear
  - lifted up his spear
  lexicon: HALOT
  rationale: The idiom literally involves stirring or arousing the spear, but in context
    it refers to martial action. 'Brandished' captures the vivid military sense in
    readable English without over-paraphrasing.
- source_word: עַל שְׁלֹשׁ מֵאוֹת חָלָל
  chosen: against three hundred slain
  alternatives:
  - over three hundred whom he killed
  - against three hundred men
  lexicon: HALOT
  rationale: חָלָל means one slain or pierced. The phrase likely summarizes the result
    of his exploit. 'Against three hundred slain' stays close to the Hebrew wording
    while allowing the appositional/resultative sense to be heard.
- source_word: שֵׁם
  chosen: had a name
  alternatives:
  - was renowned
  - won renown
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'name.' Rendering it as 'had a name' preserves
    the source idiom in understandable English and conveys reputation or renown.
- source_word: אַבְשַׁי
  chosen: Abishai
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: אֲחִי יוֹאָב
  chosen: the brother of Joab
  alternatives:
  - Joab's brother
  lexicon: HALOT
  rationale: Either English form is possible; 'the brother of Joab' follows the Hebrew
    construct closely and reads naturally.
