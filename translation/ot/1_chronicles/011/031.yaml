id: 1CH.11.31
reference: 1 Chronicles 11:31
source:
  edition: WLC
  text: אִיתַ֣י בֶּן רִיבַ֗י מִ/גִּבְעַת֙ בְּנֵ֣י בִנְיָמִ֔ן בְּנָיָ֖ה הַ/פִּרְעָתֹנִֽי־ס׃
translation:
  text: Ittai son of Ribai, from Gibeah of the sons of Benjamin; Benaiah the Pirathonite;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Benjamin,' that is, members of the tribe of Benjamin.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִיתַי
  chosen: Ittai
  alternatives:
  - Ithai
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. 'Ittai' is a standard English transliteration of the Hebrew name.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - ben
  lexicon: HALOT
  rationale: The construct בֶּן with a following personal name denotes direct filiation.
    'Son of' is the natural English equivalent.
- source_word: רִיבַי
  chosen: Ribai
  alternatives:
  - Ribay
  rationale: Proper personal name; transliterated by standard convention.
- source_word: מִ/גִּבְעַת
  chosen: from Gibeah
  alternatives:
  - of Gibeah
  lexicon: HALOT
  rationale: The prefixed preposition מִן indicates origin or association, best rendered
    'from.' גִּבְעַת here is the place name Gibeah, not translated as the common noun
    'hill' because it functions as a proper noun.
- source_word: בְּנֵי בִנְיָמִן
  chosen: of the sons of Benjamin
  alternatives:
  - of Benjaminites
  - of the people of Benjamin
  lexicon: HALOT
  rationale: Literally 'sons of Benjamin.' In genealogical and tribal contexts this
    denotes tribal affiliation. The more formal rendering preserves the Hebrew expression
    while remaining clear in English.
- source_word: בְּנָיָה
  chosen: Benaiah
  rationale: Proper personal name; transliterated.
- source_word: הַ/פִּרְעָתֹנִי
  chosen: the Pirathonite
  alternatives:
  - from Pirathon
  lexicon: HALOT
  rationale: The gentilic with article identifies Benaiah by place-origin or clan
    association. 'The Pirathonite' is the conventional and sufficiently transparent
    English rendering.
