id: 1CH.11.12
reference: 1 Chronicles 11:12
source:
  edition: WLC
  text: וְ/אַחֲרָ֛י/ו אֶלְעָזָ֥ר בֶּן דּוֹד֖וֹ הָ/אֲחוֹחִ֑י ה֖וּא בִּ/שְׁלוֹשָׁ֥ה
    הַ/גִּבֹּרִֽים־׃
translation:
  text: After him was Eleazar son of Dodo the Ahohite; he was among the three mighty
    men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "one of the three mighty men." The Hebrew expression can denote membership
      in the elite group of three.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחֲרָיו
  chosen: After him
  alternatives:
  - And after him
  - Next to him
  lexicon: HALOT
  rationale: The phrase marks sequence in the list of David's warriors. 'After him'
    is the plain temporal/listing sense; retaining 'and' is unnecessary in natural
    English, while 'next to him' would suggest spatial proximity not required by the
    context.
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: 'Personal name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The immediate genealogical sense is most natural here in a warrior list.
    'Descendant of' is possible in some contexts but not demanded here.
- source_word: דּוֹדוֹ
  chosen: Dodo
  alternatives:
  - Dodai
  rationale: The consonantal form here supports the proper name 'Dodo.' 'Dodai' reflects
    a variant form known elsewhere, but this verse's form is best represented as 'Dodo.'
- source_word: הָ/אֲחוֹחִי
  chosen: the Ahohite
  alternatives:
  - the descendant of Ahoah
  lexicon: HALOT
  rationale: This gentilicial/clan designation is best preserved by transliteration
    as 'Ahohite,' a standard way to render such Hebrew family or regional identifiers
    in English Bible style.
- source_word: הוּא
  chosen: he was
  alternatives:
  - he
  lexicon: HALOT
  rationale: The independent pronoun is naturally carried into English with an explicit
    copular sense because the following prepositional phrase functions predicatively.
- source_word: בִּ/שְׁלוֹשָׁה
  chosen: among the three
  alternatives:
  - one of the three
  - with the three
  lexicon: HALOT
  rationale: The preposition ב plus the numeral here indicates inclusion within a
    known group. 'Among the three' preserves that membership sense without over-specifying
    rank. 'One of the three' is also possible, but 'among' better reflects the Hebrew
    construction.
- source_word: הַ/גִּבֹּרִים
  chosen: mighty men
  alternatives:
  - warriors
  - mighty warriors
  lexicon: HALOT
  rationale: In Chronicles this term is a recognized designation for David's elite
    fighters. 'Mighty men' preserves the established military-title nuance while remaining
    understandable. 'Warriors' is possible but loses the quasi-titular resonance.
