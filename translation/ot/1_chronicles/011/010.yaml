id: 1CH.11.10
reference: 1 Chronicles 11:10
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה רָאשֵׁ֤י הַ/גִּבּוֹרִים֙ אֲשֶׁ֣ר לְ/דָוִ֔יד הַ/מִּתְחַזְּקִ֨ים עִמּ֧/וֹ בְ/מַלְכוּת֛/וֹ עִם כָּל יִשְׂרָאֵ֖ל לְ/הַמְלִיכ֑/וֹ כִּ/דְבַ֥ר יְהוָ֖ה עַל יִשְׂרָאֵֽל־־־׃ס
translation:
  text: Now these were the chiefs of the mighty men who belonged to David, who strengthened themselves with him in his kingdom, together with all Israel, to make him king, according to the word of Yahweh concerning Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who strengthened themselves with him' or 'who supported him strongly.' The Hebrew expression can be rendered more literally, but here likely refers to rallying to David in support of his kingship.
    reason: lexical_alternative
  - marker: b
    text: Or, 'according to the word of the LORD over Israel.' The Hebrew more literally reads 'upon Israel,' but in this construction likely means 'concerning Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאשֵׁי
  chosen: chiefs of
  alternatives:
  - heads of
  - leaders of
  lexicon: HALOT
  rationale: Construct form of רֹאשׁ here denotes leading figures or principal members, not literal 'heads.' 'Chiefs of' is natural English and preserves the hierarchical sense.
- source_word: הַגִּבּוֹרִים
  chosen: the mighty men
  alternatives:
  - the warriors
  - the mighty warriors
  lexicon: HALOT
  rationale: In Chronicles this term commonly refers to David's elite fighting men. 'Mighty men' preserves the established military-heroic sense without over-paraphrasing.
- source_word: אֲשֶׁר לְדָוִיד
  chosen: who belonged to David
  alternatives:
  - who were David's
  - who were with David
  lexicon: HALOT
  rationale: The lamed with David marks association/possession. 'Belonged to David' conveys that these chiefs were attached to David's company; it avoids the overly flat possessive while remaining idiomatic.
- source_word: הַמִּתְחַזְּקִים עִמּוֹ
  chosen: who gave strong support to him
  alternatives:
  - who strengthened themselves with him
  - who held strongly with him
  - who supported him strongly
  lexicon: HALOT
  rationale: The hitpael of חזק with עִם can express showing oneself strong with someone, i.e., supporting or rallying to him. A too-literal 'strengthened themselves with him' is awkward in English and obscures the political-military sense.
- source_word: בְמַלְכוּתוֹ
  chosen: in his kingdom
  alternatives:
  - in his kingship
  - in his reign
  lexicon: HALOT
  rationale: The noun מַלְכוּת can denote kingship, royal rule, or kingdom. Here the context is the establishment of David's royal rule. 'In his kingdom' is a straightforward rendering, though 'in his reign' is possible.
- source_word: עִם כָּל יִשְׂרָאֵל
  chosen: together with all Israel
  alternatives:
  - along with all Israel
  - with all Israel
  lexicon: HALOT
  rationale: עִם marks accompaniment. 'Together with all Israel' makes clear that these mighty men acted in concert with the wider nation.
- source_word: לְהַמְלִיכוֹ
  chosen: to make him king
  alternatives:
  - to crown him king
  - to cause him to reign
  lexicon: HALOT
  rationale: Hiphil of מלך means to make someone king. 'To make him king' is the most direct and transparent rendering.
- source_word: כִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - according to the promise of the LORD
  - in accordance with the word of the LORD
  lexicon: HALOT
  rationale: דבר here is best rendered 'word,' preserving the formal link to divine speech. 'Promise' is interpretive and narrower than the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַל יִשְׂרָאֵל
  chosen: concerning Israel
  alternatives:
  - over Israel
  - for Israel
  lexicon: HALOT
  rationale: With דבר, עַל often means 'concerning' or 'about.' Since the phrase modifies 'the word of the LORD,' 'concerning Israel' best fits the syntax. 'Over Israel' could be taken as modifying David's kingship rather than the LORD's word.
