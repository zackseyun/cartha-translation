theological_decisions:
- issue: Sense of David's supporters' action in הַמִּתְחַזְּקִים עִמּוֹ
  chosen_reading: political-military support for David's accession
  alternative_readings:
  - self-strengthening alongside David
  - mutual strengthening with David
  rationale: The context concerns the establishment of David's rule and the role of his mighty men in making him king. Rendering the phrase as active support best fits the immediate clause 'to make him king' and avoids an opaque literalism.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Scope of בְמַלְכוּתוֹ
  chosen_reading: during/in relation to David's royal rule
  alternative_readings:
  - in his kingdom as territorial realm
  - in his reign
  rationale: The Hebrew term can denote kingship, reign, or kingdom. The context is accession and royal establishment, so the translation keeps a broad phrase that can include both rule and realm without forcing a narrower doctrinal or political nuance.
  doctrine_reference: Translation philosophy §5, §6
