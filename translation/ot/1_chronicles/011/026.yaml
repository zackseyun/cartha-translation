id: 1CH.11.26
reference: 1 Chronicles 11:26
source:
  edition: WLC
  text: וְ/גִבּוֹרֵ֖י הַ/חֲיָלִ֑ים עֲשָׂה אֵל֙ אֲחִ֣י יוֹאָ֔ב אֶלְחָנָ֥ן בֶּן דּוֹד֖וֹ
    מִ/בֵּ֥ית לָֽחֶם־־׃ס
translation:
  text: 'And the mighty warriors were: Asahel the brother of Joab, Elhanan son of
    Dodo, from Bethlehem.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Bethlehemite.' The Hebrew reads literally 'from Bethlehem.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגִבּוֹרֵי הַחֲיָלִים
  chosen: And the mighty warriors
  alternatives:
  - And the mighty men of valor
  - Now the mighty warriors
  lexicon: HALOT
  rationale: גִּבּוֹרֵי with הַחֲיָלִים denotes valiant fighting men or elite warriors.
    'Mighty warriors' is natural modern English and preserves the military sense without
    archaic 'men of valor.' The prefixed וְ is carried as 'And' to continue the list.
- source_word: עֲשָׂהאֵל
  chosen: Asahel
  lexicon: HALOT
  rationale: Proper personal name conventionally transliterated 'Asahel.' The ketiv
    is split in the morphology table but represents the known name עֲשָׂה־אֵל.
- source_word: אֲחִי יוֹאָב
  chosen: the brother of Joab
  alternatives:
  - Joab's brother
  lexicon: HALOT
  rationale: Construct phrase identifying Asahel by relationship. 'The brother of
    Joab' is slightly more formal and mirrors the Hebrew structure closely; 'Joab's
    brother' would also be acceptable.
- source_word: אֶלְחָנָן
  chosen: Elhanan
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: בֶּן דּוֹדוֹ
  chosen: son of Dodo
  lexicon: HALOT
  rationale: Genealogical formula rendered straightforwardly. דּוֹדוֹ here is a personal
    name, not the common noun 'his beloved/uncle.'
- source_word: מִבֵּית לָחֶם
  chosen: from Bethlehem
  alternatives:
  - the Bethlehemite
  lexicon: HALOT
  rationale: The preposition מִן plus place name naturally means origin, 'from Bethlehem.'
    This is clearer than converting it into the gentilic 'the Bethlehemite,' though
    that is a common idiomatic alternative in English versions.
