id: 1CH.11.41
reference: 1 Chronicles 11:41
source:
  edition: WLC
  text: אֽוּרִיָּה֙ הַ/חִתִּ֔י זָבָ֖ד בֶּן אַחְלָֽי־׃ס
translation:
  text: Uriah the Hittite, Zabad son of Ahlai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Uriah the Hittite is the same man associated with Bathsheba in 2 Samuel
      11.
    reason: cross_reference
lexical_decisions:
- source_word: אֽוּרִיָּה
  chosen: Uriah
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: הַ/חִתִּי
  chosen: the Hittite
  alternatives:
  - the Hethite
  lexicon: HALOT
  rationale: Gentilic with article, identifying Uriah by ethnic/national origin. 'Hittite'
    is the standard and clear English rendering of חִתִּי.
- source_word: זָבָד
  chosen: Zabad
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard construct relationship indicating immediate filiation. 'Son
    of' is natural English and sufficiently formal for a list of names.
- source_word: אַחְלָי
  chosen: Ahlai
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard convention.
