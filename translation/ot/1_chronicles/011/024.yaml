id: 1CH.11.24
reference: 1 Chronicles 11:24
source:
  edition: WLC
  text: אֵ֣לֶּה עָשָׂ֔ה בְּנָיָ֖הוּ בֶּן יְהוֹיָדָ֑ע וְ/ל/וֹ שֵׁ֖ם בִּ/שְׁלוֹשָׁ֥ה
    הַ/גִּבֹּרִֽים־־׃
translation:
  text: These things Benaiah son of Jehoiada did, and he had a name among the three
    mighty men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he had renown among the three mighty men.' The Hebrew literally says
      'he had a name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These things
  alternatives:
  - These
  - Such things
  lexicon: HALOT
  rationale: Plural demonstrative referring back to the exploits just recounted; 'These
    things' makes the resumptive force explicit in natural English.
- source_word: עָשָׂה
  chosen: did
  alternatives:
  - performed
  - accomplished
  lexicon: HALOT
  rationale: Common verb עשה here summarizes Benaiah's deeds. 'Did' is the most direct
    and idiomatic rendering with the preceding demonstrative.
- source_word: בְּנָיָהוּ בֶּן יְהוֹיָדָע
  chosen: Benaiah son of Jehoiada
  alternatives:
  - Benaiah the son of Jehoiada
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy; construct relationship
    is naturally rendered 'son of.'
- source_word: וְלוֹ
  chosen: and he had
  alternatives:
  - and to him was
  - and he had for himself
  lexicon: HALOT
  rationale: The prepositional phrase with ל plus pronominal suffix expresses possession/existence
    idiomatically. 'And he had' conveys the Hebrew sense in readable English.
- source_word: שֵׁם
  chosen: a name
  alternatives:
  - renown
  - reputation
  lexicon: HALOT
  rationale: Hebrew 'name' often carries the sense of reputation or renown. Retaining
    'a name' preserves the idiom while remaining understandable in English.
- source_word: בִּשְׁלוֹשָׁה
  chosen: among the three
  alternatives:
  - with the three
  - in the three
  lexicon: HALOT
  rationale: The preposition ב here indicates association or standing within a group.
    'Among the three' best communicates recognized status in relation to that group.
- source_word: הַגִּבֹּרִים
  chosen: mighty men
  alternatives:
  - warriors
  - heroes
  lexicon: HALOT
  rationale: In Chronicles this term is a recognized designation for David's elite
    fighters. 'Mighty men' preserves that established military-title sense better
    than the more generic 'warriors' or 'heroes.'
