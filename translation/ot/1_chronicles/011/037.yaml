id: 1CH.11.37
reference: 1 Chronicles 11:37
source:
  edition: WLC
  text: חֶצְרוֹ֙ הַֽ/כַּרְמְלִ֔י נַעֲרַ֖י בֶּן אֶזְבָּֽי־׃ס
translation:
  text: Hezro the Carmelite, Naarai son of Ezbai;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the man from Carmel.' The Hebrew gentilic means a person belonging to
      Carmel.
    reason: lexical_alternative
  - marker: b
    text: 'In the parallel list at 2 Samuel 23:35, the corresponding names differ:
      ''Hezrai the Carmelite, Paarai the Arbite.'' Chronicles preserves a distinct
      form here.'
    reason: cross_reference
lexical_decisions:
- source_word: חֶצְרוֹ
  chosen: Hezro
  alternatives:
  - Hezrai
  rationale: Proper personal name; transliterated according to standard English convention
    from the Hebrew form in Chronicles. An alternative form appears in parallel traditions,
    but the Chronicles reading is represented here.
- source_word: הַכַּרְמְלִי
  chosen: the Carmelite
  alternatives:
  - the man from Carmel
  - the Carmelite
  lexicon: HALOT
  rationale: The gentilic with article denotes a person from Carmel. 'Carmelite' is
    the conventional and concise English rendering for this place-based designation,
    not a reference to the later religious order.
- source_word: נַעֲרַי
  chosen: Naarai
  alternatives:
  - Naarai
  rationale: Proper personal name; transliterated directly from the Hebrew. English
    spelling varies slightly; 'Naarai' preserves the long vowel sequence clearly.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  - descendant of
  lexicon: HALOT
  rationale: In genealogical/name-list contexts, בן most naturally means 'son of.'
    'Descendant of' is possible in broader lineage contexts, but nothing here requires
    that expansion.
- source_word: אֶזְבָּי
  chosen: Ezbai
  rationale: Proper personal name; transliterated directly from the Hebrew form.
