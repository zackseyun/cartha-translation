id: 1CH.11.35
reference: 1 Chronicles 11:35
source:
  edition: WLC
  text: אֲחִיאָ֧ם בֶּן שָׂכָ֛ר הַ/הֲרָרִ֖י אֱלִיפַ֥ל בֶּן אֽוּר־־׃ס
translation:
  text: Ahiam son of Sachar the Hararite, Eliphal son of Ur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'descendant of' for each occurrence of 'son of,' though immediate
      sonship is the most natural sense in this military roster.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲחִיאָם
  chosen: Ahiam
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the project policy for names.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The construct בֶּן most naturally denotes immediate filiation in this
    roster context. 'Descendant of' is possible more broadly but is less likely here.
- source_word: שָׂכָר
  chosen: Sachar
  alternatives:
  - Sacar
  rationale: Proper personal name; transliterated into standard English form. Spelling
    variation reflects transliteration conventions for שׂ.
- source_word: הֲרָרִי
  chosen: the Hararite
  alternatives:
  - the mountaineer
  - the man from Harar
  lexicon: HALOT
  rationale: The gentilic/adjectival form is best represented as an ethnic or geographic
    designation in this list of warriors. 'Hararite' preserves the form without over-interpreting
    the underlying place or descriptor.
- source_word: אֱלִיפַל
  chosen: Eliphal
  alternatives:
  - Elipal
  rationale: Proper personal name; transliterated by standard convention.
- source_word: אֽוּר
  chosen: Ur
  alternatives:
  - Aur
  rationale: Proper personal name; transliterated directly. In this context it is
    a personal name, not the Mesopotamian city.
