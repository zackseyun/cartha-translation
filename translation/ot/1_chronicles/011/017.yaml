id: 1CH.11.17
reference: 1 Chronicles 11:17
source:
  edition: WLC
  text: ו/יתאו דָּוִ֖יד וַ/יֹּאמַ֑ר מִ֚י יַשְׁקֵ֣/נִי מַ֔יִם מִ/בּ֥וֹר בֵּֽית לֶ֖חֶם
    אֲשֶׁ֥ר בַּ/שָּֽׁעַר־׃
translation:
  text: And David longed and said, “Who will give me water to drink from the well
    of Bethlehem that is by the gate?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “If only someone would give me water to drink from
      the well of Bethlehem by the gate!”
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word rendered “well” can also mean “cistern” or “pit,” but here
      it refers to a source of drinking water.
    reason: lexical_alternative
lexical_decisions:
- source_word: ויתאו
  chosen: longed
  alternatives:
  - desired
  - yearned
  lexicon: HALOT
  rationale: The hitpael/imperfect-consecutive of אוה expresses strong desire or longing.
    'Longed' is natural modern English and preserves the intensity without sounding
    overly poetic.
- source_word: מי
  chosen: Who will
  alternatives:
  - Who would
  - If only someone would
  lexicon: HALOT
  rationale: The interrogative introduces David's wish in direct-speech form. 'Who
    will' keeps the Hebrew wording more closely than an idiomatic paraphrase like
    'If only someone would,' while still conveying a wish.
- source_word: ישקני
  chosen: give me water to drink
  alternatives:
  - let me drink
  - cause me to drink
  - give me a drink
  lexicon: HALOT
  rationale: The Hiphil of שקה means 'give to drink' or 'cause to drink.' In English,
    'give me water to drink' best captures both the causative sense and the explicit
    object מים. 'Give me a drink' is smoother but omits the lexical presence of 'water.'
- source_word: מים
  chosen: water
  lexicon: HALOT
  rationale: Straightforward rendering of the common noun.
- source_word: מבּור
  chosen: from the well
  alternatives:
  - from the cistern
  - from the pit
  lexicon: HALOT
  rationale: בור can denote a pit, cistern, or well depending on context. Here, because
    it is a known source of drinking water at Bethlehem, 'well' is the clearest contextual
    rendering in English.
- source_word: בית לחם
  chosen: Bethlehem
  rationale: Standard English transliteration of the place name.
- source_word: אשר בשער
  chosen: that is by the gate
  alternatives:
  - that is at the gate
  - which is in the gate
  lexicon: HALOT
  rationale: The relative clause locates the well with reference to the city gate.
    'By the gate' is idiomatic and spatially clear in modern English, while remaining
    faithful to the Hebrew.
