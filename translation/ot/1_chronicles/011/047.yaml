id: 1CH.11.47
reference: 1 Chronicles 11:47
source:
  edition: WLC
  text: אֱלִיאֵ֣ל וְ/עוֹבֵ֔ד וְ/יַעֲשִׂיאֵ֖ל הַ/מְּצֹבָיָֽה׃פ
translation:
  text: Eliel, Obed, and Jaasiel the Mezobaite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew הַמְּצֹבָיָה is a gentilic designation, likely meaning that Jaasiel
      was from Mezobah or a similarly named place/clan; the exact underlying place-name
      is uncertain, so transliterations such as “Mezobaite” or “Mitzobaite” are possible.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלִיאֵל
  chosen: Eliel
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the project's policy for names.
- source_word: וְעוֹבֵד
  chosen: Obed
  alternatives:
  - and Obed
  lexicon: HALOT
  rationale: Proper personal name with prefixed conjunction. In English list style,
    the conjunction is represented naturally in the sequence rather than repeated
    mechanically before every item.
- source_word: וְיַעֲשִׂיאֵל
  chosen: and Jaasiel
  alternatives:
  - and Jaasiel
  - and Jaasiel
  lexicon: HALOT
  rationale: Proper personal name with prefixed conjunction. The transliteration 'Jaasiel'
    reflects the Hebrew form יַעֲשִׂיאֵל as commonly rendered in English, preserving
    the name rather than attempting to translate its components.
- source_word: הַמְּצֹבָיָה
  chosen: the Mezobaite
  alternatives:
  - the Mitzobaite
  - the Mezobahite
  lexicon: HALOT
  rationale: Gentilic/title-like designation with article, identifying Jaasiel by
    place or clan origin. Rendered as an English gentilicial form, 'the Mezobaite,'
    to preserve the function of the Hebrew designation. Because the underlying place-name
    is uncertain in English tradition, a close transliteration is preferred over speculative
    interpretation.
