id: 1CH.11.22
reference: 1 Chronicles 11:22
source:
  edition: WLC
  text: בְּנָיָ֨ה בֶן יְהוֹיָדָ֧ע בֶּן אִֽישׁ חַ֛יִל רַב פְּעָלִ֖ים מִֽן קַבְצְאֵ֑ל
    ה֣וּא הִכָּ֗ה אֵ֣ת שְׁנֵ֤י אֲרִיאֵל֙ מוֹאָ֔ב וְ֠/הוּא יָרַ֞ד וְ/הִכָּ֧ה אֶֽת הָ/אֲרִ֛י
    בְּ/ת֥וֹךְ הַ/בּ֖וֹר בְּ/י֥וֹם הַ/שָּֽׁלֶג־־־־־־׃
translation:
  text: Benaiah son of Jehoiada, son of a mighty man, a man of many deeds, from Kabzeel—he
    struck down the two sons of Ariel of Moab. He also went down and struck down the
    lion in the midst of a pit on a snowy day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew אֲרִיאֵל מוֹאָב is uncertain. It may mean 'the two sons of Ariel
      of Moab,' 'the two Ariels of Moab,' or 'the two lion-like heroes of Moab.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִישׁ חַיִל
  chosen: a mighty man
  alternatives:
  - a valiant man
  - a man of valor
  - a capable man
  lexicon: HALOT
  rationale: The phrase commonly denotes strength, valor, or proven capability. In
    this warrior context, 'a mighty man' communicates martial excellence naturally
    in English without over-specifying social status.
- source_word: רַב פְּעָלִים
  chosen: a man of many deeds
  alternatives:
  - great in deeds
  - of many exploits
  - abounding in actions
  lexicon: HALOT
  rationale: Literally 'many deeds/acts.' The appositional English 'a man of many
    deeds' preserves the sense of notable exploits while remaining readable.
- source_word: מִן קַבְצְאֵל
  chosen: from Kabzeel
  alternatives:
  - of Kabzeel
  lexicon: HALOT
  rationale: The preposition מן is most straightforwardly rendered 'from,' indicating
    place of origin.
- source_word: הִכָּה
  chosen: struck down
  alternatives:
  - killed
  - smote
  - defeated
  lexicon: HALOT
  rationale: נכה is broad ('strike, smite, strike down'). In this heroic list context,
    'struck down' preserves the violent action without forcing the narrower gloss
    'killed,' though death is likely implied.
- source_word: שְׁנֵי אֲרִיאֵל מוֹאָב
  chosen: the two sons of Ariel of Moab
  alternatives:
  - the two Ariels of Moab
  - the two lion-like heroes of Moab
  lexicon: HALOT
  rationale: אֲרִיאֵל is lexically difficult here. It can function as a proper name
    ('Ariel') or as a descriptive term related to 'lion'/'lion-like hero.' Because
    the form can naturally be read as a singular proper name in construct-like relation
    after 'two,' the main text uses 'the two sons of Ariel of Moab' as a restrained
    rendering that makes coherent sense in English. Significant alternatives are preserved
    in a footnote because the Hebrew is genuinely ambiguous.
- source_word: יָרַד
  chosen: went down
  alternatives:
  - descended
  lexicon: HALOT
  rationale: The common verb 'go down' is retained in ordinary English. It may refer
    to descending into the pit.
- source_word: הָאֲרִי
  chosen: the lion
  lexicon: HALOT
  rationale: The noun plainly means 'the lion' here.
- source_word: בְּתוֹךְ הַבּוֹר
  chosen: in the midst of a pit
  alternatives:
  - inside the pit
  - into the pit
  lexicon: HALOT
  rationale: The phrase emphasizes location within the pit. 'In the midst of a pit'
    is slightly formal but preserves the Hebrew image closely.
- source_word: בְּיוֹם הַשָּׁלֶג
  chosen: on a snowy day
  alternatives:
  - on the day of snow
  - when snow had fallen
  lexicon: HALOT
  rationale: Literally 'on the day of the snow.' 'On a snowy day' is idiomatic modern
    English and preserves the situational detail.
