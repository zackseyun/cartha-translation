id: 1CH.11.36
reference: 1 Chronicles 11:36
source:
  edition: WLC
  text: חֵ֚פֶר הַ/מְּכֵ֣רָתִ֔י אֲחִיָּ֖ה הַ/פְּלֹנִֽי׃ס
translation:
  text: Hepher the Mecherathite, Ahijah the Pelonite,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The parallel list in 2 Samuel 23:26 reads “Helez the Paltite,” not “Ahijah
      the Pelonite.” This reflects a parallel-list difference rather than a translation
      choice in this verse.
    reason: cross_reference
  - marker: b
    text: Or “the Paltite,” following the parallel reading in 2 Samuel 23:26 rather
      than the Masoretic wording here.
    reason: alternative_reading
lexical_decisions:
- source_word: חֵפֶר
  chosen: Hepher
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention
    rather than translated, in keeping with the project's policy for names.
- source_word: הַמְּכֵרָתִי
  chosen: the Mecherathite
  alternatives:
  - the Mekerathite
  - the Maacarathite
  lexicon: HALOT
  rationale: Gentilic with article, identifying Hepher by place or clan origin. Rendered
    as a transliterated ethnic/geographic designation with English gentilicial suffix
    '-ite.' Because the underlying place-name is uncertain and English tradition varies,
    a close transliteration is preferred over conjectural normalization.
- source_word: אֲחִיָּה
  chosen: Ahijah
  alternatives:
  - Ahiyah
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard convention. The familiar
    English form 'Ahijah' is clear and conventional.
- source_word: הַפְּלֹנִי
  chosen: the Pelonite
  alternatives:
  - the Paltite
  lexicon: HALOT
  rationale: Gentilic/title with article. In Chronicles the consonantal form supports
    'Pelonite,' so the translation follows the Masoretic form directly. 'Paltite'
    reflects the parallel in 2 Samuel 23:26 rather than this verse's wording, so it
    is preserved only as an alternative note rather than adopted in the main text.
