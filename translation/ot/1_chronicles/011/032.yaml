id: 1CH.11.32
reference: 1 Chronicles 11:32
source:
  edition: WLC
  text: חוּרַי֙ מִ/נַּ֣חֲלֵי גָ֔עַשׁ אֲבִיאֵ֖ל הָ/עַרְבָתִֽיס׃ס
translation:
  text: Hurai from the wadis of Gaash, Abiel the Arbathite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the valleys of Gaash' or 'from the brooks of Gaash.' The Hebrew
      term can refer to a wadi, ravine, torrent-bed, or valley.
    reason: lexical_alternative
  - marker: b
    text: '''Arbathite'' is a gentilic, meaning a man from Arbath (possibly related
      to the Arabah).'
    reason: cultural_note
lexical_decisions:
- source_word: חוּרַי
  chosen: Hurai
  alternatives:
  - Huraih
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the policy to transliterate names. English convention favors 'Hurai.'
- source_word: מִ/נַּחֲלֵי
  chosen: from the wadis of
  alternatives:
  - from the valleys of
  - from the brooks of
  lexicon: HALOT
  rationale: נחל commonly denotes a wadi, torrent-bed, or valley. 'Wadis' best preserves
    the geographical sense of seasonal ravines in a Judean setting, while remaining
    understandable modern English.
- source_word: גָעַשׁ
  chosen: Gaash
  lexicon: HALOT
  rationale: Place name; transliterated as a proper noun.
- source_word: אֲבִיאֵל
  chosen: Abiel
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: הָ/עַרְבָתִי
  chosen: the Arbathite
  alternatives:
  - the Arabathite
  lexicon: HALOT
  rationale: Gentilic/title indicating origin from Arbath/Arabah-related locality.
    'Arbathite' is the more conventional rendering in this name list and preserves
    the ethnic/geographic designation without over-interpreting the exact site.
