id: 1CH.11.5
reference: 1 Chronicles 11:5
source:
  edition: WLC
  text: וַ/יֹּ֨אמְר֜וּ יֹשְׁבֵ֤י יְבוּס֙ לְ/דָוִ֔יד לֹ֥א תָב֖וֹא הֵ֑נָּה וַ/יִּלְכֹּ֤ד
    דָּוִיד֙ אֶת מְצֻדַ֣ת צִיּ֔וֹן הִ֖יא עִ֥יר דָּוִֽיד־׃
translation:
  text: The inhabitants of Jebus said to David, “You will not come in here.” But David
    captured the stronghold of Zion, that is, the City of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “You shall not come here” / “You will not enter here.” The Hebrew literally
      says, “You will not come here,” functioning as a refusal of entry.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשְׁבֵי יְבוּס
  chosen: the inhabitants of Jebus
  alternatives:
  - those dwelling in Jebus
  - the residents of Jebus
  lexicon: HALOT
  rationale: The construct phrase literally denotes those who dwell in Jebus. 'Inhabitants'
    is natural modern English and preserves the collective sense without unnecessary
    stiffness.
- source_word: לֹא תָבֹוא הֵנָּה
  chosen: You will not come in here
  alternatives:
  - You shall not come here
  - You will not enter here
  lexicon: HALOT
  rationale: The Hebrew combines the verb 'come' with the adverb 'here,' functioning
    idiomatically as a denial of entry. 'Come in here' preserves the direct speech
    force and spatial sense better than a flatter 'come here.'
- source_word: וַיִּלְכֹּד
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: The verb לקד/לכד in military context commonly means to capture or seize
    a place. 'Captured' is the clearest idiomatic rendering for taking a fortified
    site.
- source_word: מְצֻדַת צִיּוֹן
  chosen: the stronghold of Zion
  alternatives:
  - the fortress of Zion
  - the citadel of Zion
  lexicon: HALOT
  rationale: מְצוּדָה denotes a stronghold or fortress. 'Stronghold' is a standard
    and readable rendering that fits a defensible military installation.
- source_word: הִיא עִיר דָּוִיד
  chosen: that is, the City of David
  alternatives:
  - it is the City of David
  lexicon: HALOT
  rationale: The pronoun plus nominal clause identifies Zion's stronghold with a known
    designation. 'That is' makes the appositional explanatory force clear in natural
    English.
- source_word: עִיר דָּוִיד
  chosen: the City of David
  lexicon: HALOT
  rationale: This is a fixed place-name designation in context, so capitalization
    is appropriate.
