id: 1CH.11.44
reference: 1 Chronicles 11:44
source:
  edition: WLC
  text: עֻזִיָּ֖א הָ/עֲשְׁתְּרָתִ֑י שָׁמָע֙ ו/יעואל בְּנֵ֖י חוֹתָ֥ם הָ/עֲרֹעֵרִֽיס׃ס
translation:
  text: Uzzia the Ashterathite, Shama and Jeuel, the sons of Hotham the Aroerite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ashtarothite.' The gentilic likely refers to a man from Ashtaroth/Ashteroth.
    reason: lexical_alternative
  - marker: b
    text: '''Jeuel'' could also be rendered ''Jeiel,'' reflecting a common variant
      in English transliteration traditions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֻזִיָּא
  chosen: Uzzia
  alternatives:
  - Uzziah
  rationale: Personal name; transliterated rather than translated per project philosophy.
    The shorter form 'Uzzia' matches the consonantal form here without importing the
    more familiar but slightly expanded English form 'Uzziah' unless context requires
    it.
- source_word: הָעֲשְׁתְּרָתִי
  chosen: the Ashterathite
  alternatives:
  - the Ashtarothite
  lexicon: HALOT
  rationale: Gentilic from a place-name related to Ashtaroth/Ashteroth. 'Ashterathite'
    preserves the Hebrew form more directly; 'Ashtarothite' is a plausible conventional
    alternative and worth preserving in a footnote as a lexical alternative.
- source_word: שָׁמָע
  chosen: Shama
  alternatives:
  - Shammah
  rationale: Personal name; transliterated from the Hebrew form given here. 'Shammah'
    reflects a more familiar English form in some contexts, but the MT here supports
    'Shama'.
- source_word: ויעואל
  chosen: and Jeuel
  alternatives:
  - and Jeiel
  rationale: The prefixed conjunction ו is rendered 'and'; the name is transliterated
    as 'Jeuel' from the consonantal form here. 'Jeiel' is a common variant in English
    tradition and may reflect related name forms elsewhere, so it is preserved as
    an alternative.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - sons of
  lexicon: HALOT
  rationale: 'Construct plural of ''son.'' In a list of warriors, English reads naturally
    with the article carried forward: ''the sons of Hotham.'' This preserves the familial
    designation without paraphrase.'
- source_word: חוֹתָם
  chosen: Hotham
  rationale: Personal name; straightforward transliteration.
- source_word: הָעֲרֹעֵרִי
  chosen: the Aroerite
  alternatives:
  - the Aroarite
  lexicon: HALOT
  rationale: Gentilic from Aroer. 'Aroerite' is the standard English formation from
    the place-name Aroer and fits the Hebrew gentilic ending היט. An alternative spelling
    is possible but less common.
