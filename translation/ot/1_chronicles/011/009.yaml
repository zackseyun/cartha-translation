id: 1CH.11.9
reference: 1 Chronicles 11:9
source:
  edition: WLC
  text: וַ/יֵּ֥לֶךְ דָּוִ֖יד הָל֣וֹךְ וְ/גָד֑וֹל וַ/יהוָ֥ה צְבָא֖וֹת עִמּֽ/וֹ׃פ
translation:
  text: And David became greater and greater, for the LORD of hosts was with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''David went, going and growing great,'' an idiom meaning that
      he became progressively greater.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: became
  alternatives:
  - went
  - advanced
  - continued
  lexicon: HALOT
  rationale: In the idiom וילך הלוך וגדול, the finite verb 'went' functions with the
    infinitive absolute and following adjective/participle to express progressive
    increase rather than literal movement. English 'became' captures the sense naturally
    when paired with 'greater and greater.'
- source_word: הָלוֹךְ וְגָדוֹל
  chosen: greater and greater
  alternatives:
  - going on and becoming great
  - continually growing greater
  - increasingly great
  lexicon: HALOT
  rationale: This infinitive absolute plus adjective/verb construction is an idiom
    of ongoing intensification. 'Greater and greater' preserves the progressive force
    in idiomatic modern English without woodenly reproducing the Hebrew form.
- source_word: דָּוִיד
  chosen: David
  rationale: Standard English transliteration of the personal name.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - Almighty
  lexicon: HALOT
  rationale: צבאות with the divine name is a fixed title. 'Of hosts' is the most transparent
    and established rendering, preserving the imagery of heavenly/earthly armies better
    than the interpretive 'Almighty.'
- source_word: עִמּוֹ
  chosen: with him
  alternatives:
  - on his side
  lexicon: HALOT
  rationale: 'The preposition עם plus pronominal suffix straightforwardly means accompaniment/presence:
    ''with him.'''
