id: 1CH.11.38
reference: 1 Chronicles 11:38
source:
  edition: WLC
  text: יוֹאֵל֙ אֲחִ֣י נָתָ֔ן מִבְחָ֖ר בֶּן הַגְרִֽי־׃ס
translation:
  text: Joel the brother of Nathan, Mibhar son of Hagri,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Mibhar son of the Hagrite.” The Hebrew הַגְרִי may be read as a gentilic/title
      rather than a personal name.
    reason: alternative_reading
lexical_decisions:
- source_word: יוֹאֵל
  chosen: Joel
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention in
    keeping with the translation philosophy to transliterate names rather than translate
    them.
- source_word: אֲחִי
  chosen: the brother of
  alternatives:
  - brother of
  - kinsman of
  lexicon: HALOT
  rationale: Construct form of 'brother' before the proper name Nathan. 'The brother
    of' is natural English in a list of names and preserves the relational sense.
    'Kinsman of' is possible in some contexts but is less likely here absent contextual
    pressure.
- source_word: נָתָן
  chosen: Nathan
  lexicon: HALOT
  rationale: Proper personal name; transliterated in standard English form.
- source_word: מִבְחָר
  chosen: Mibhar
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The common genealogical marker is best rendered 'son of' in this roster.
    While Hebrew can sometimes mean a broader descendant relationship, there is no
    contextual reason here to weaken the immediate filial sense.
- source_word: הַגְרִי
  chosen: Hagri
  alternatives:
  - the Hagrite
  lexicon: HALOT
  rationale: Treated here as a proper name in apposition after 'son of.' Because the
    form could also be understood as a gentilic/title ('the Hagrite'), the main text
    keeps the name-like rendering, while the alternative is preserved in a footnote
    for auditability.
