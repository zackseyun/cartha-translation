id: 1CH.11.3
reference: 1 Chronicles 11:3
source:
  edition: WLC
  text: וַ֠/יָּבֹאוּ כָּל זִקְנֵ֨י יִשְׂרָאֵ֤ל אֶל הַ/מֶּ֨לֶךְ֙ חֶבְר֔וֹנָ/ה וַ/יִּכְרֹת֩ לָ/הֶ֨ם דָּוִ֥יד בְּרִ֛ית בְּ/חֶבְר֖וֹן לִ/פְנֵ֣י יְהוָ֑ה וַ/יִּמְשְׁח֨וּ אֶת דָּוִ֤יד לְ/מֶ֨לֶךְ֙ עַל יִשְׂרָאֵ֔ל כִּ/דְבַ֥ר יְהוָ֖ה בְּ/יַד שְׁמוּאֵֽל־־־־־׃ס
translation:
  text: So all the elders of Israel came to the king at Hebron, and David made a covenant with them at Hebron before Yahweh. Then they anointed David king over Israel, according to the word of Yahweh by Samuel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the hand of Samuel,'' an idiom meaning ''through Samuel'' or ''by Samuel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: זִקְנֵי
  chosen: elders
  alternatives:
  - leaders
  lexicon: HALOT
  rationale: '''Elders'' is the standard and contextually appropriate rendering for the recognized representatives of Israel; ''leaders'' is possible but less specific to the social-political office implied.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  alternatives:
  - King David
  lexicon: HALOT
  rationale: The Hebrew has the title with article, not the personal name here. 'The king' preserves the narrative designation, while the following clause identifies him as David.
- source_word: חֶבְרוֹנָה / בְּחֶבְרוֹן
  chosen: at Hebron
  alternatives:
  - to Hebron
  - in Hebron
  lexicon: HALOT
  rationale: The directional form in the first instance indicates movement toward Hebron, but idiomatic English after 'came to the king' is best expressed as 'at Hebron.' The second occurrence with ב clearly locates the covenant there. Using 'at Hebron' in both places yields natural English while preserving the setting.
- source_word: וַיִּכְרֹת ... בְּרִית
  chosen: made a covenant
  alternatives:
  - cut a covenant
  - entered into a covenant
  lexicon: HALOT
  rationale: The idiom literally means 'cut a covenant,' but 'made a covenant' is the clearest optimal-equivalence rendering in modern English. 'Entered into a covenant' is possible but less directly reflects David as the acting subject.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: This preserves the covenantal and solemn sense of divine witness without overexpanding the phrase. The divine name follows the project's default rendering 'the LORD' for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיִּמְשְׁחוּ
  chosen: they anointed
  alternatives:
  - they consecrated
  lexicon: HALOT
  rationale: The verb specifically denotes anointing, especially in royal installation contexts. 'Consecrated' is interpretive and less concrete.
- source_word: לְמֶלֶךְ עַל יִשְׂרָאֵל
  chosen: king over Israel
  alternatives:
  - as king over Israel
  - to be king over Israel
  lexicon: HALOT
  rationale: '''King over Israel'' is concise and natural, accurately reflecting appointment to royal rule over the nation.'
- source_word: כִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - according to the promise of the LORD
  - as the LORD had spoken
  lexicon: HALOT
  rationale: '''Word'' is the most direct rendering of דָבָר and preserves the formal connection to divine speech. ''Promise'' narrows the sense beyond the Hebrew.'
- source_word: בְּיַד שְׁמוּאֵל
  chosen: by Samuel
  alternatives:
  - through Samuel
  - by the hand of Samuel
  lexicon: HALOT
  rationale: The idiom literally means 'by the hand of Samuel,' indicating agency or mediation. 'By Samuel' is the most natural English here; 'through Samuel' is also viable but slightly more interpretive.
