id: 1CH.11.7
reference: 1 Chronicles 11:7
source:
  edition: WLC
  text: וַ/יֵּ֥שֶׁב דָּוִ֖יד בַּ/מְצָ֑ד עַל כֵּ֥ן קָרְאוּ ל֖/וֹ עִ֥יר דָּוִֽיד־־׃
translation:
  text: David lived in the stronghold; therefore they called it the City of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fortress.' The Hebrew מְצָד refers to a fortified stronghold.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: lived
  alternatives:
  - dwelt
  - settled
  - sat
  lexicon: HALOT
  rationale: The verb ישב commonly means 'sit,' but in narrative with a location it
    idiomatically means 'dwell/live/settle.' 'Lived' is natural modern English and
    fits the context of taking up residence in the captured fortress.
- source_word: בַּמְצָד
  chosen: in the stronghold
  alternatives:
  - in the fortress
  - in the stronghold/fortress
  lexicon: HALOT
  rationale: מְצָד denotes a fortified place or stronghold. 'Stronghold' preserves
    the military-defensive sense and matches common usage in this Davidic context.
    The prefixed preposition ב is rendered 'in.'
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for that reason
  - so
  lexicon: HALOT
  rationale: This idiom introduces the consequence of the preceding action. 'Therefore'
    is concise and preserves the causal-logical connection.
- source_word: קָרְאוּ לוֹ
  chosen: they called it
  alternatives:
  - it was called
  - they named it
  lexicon: HALOT
  rationale: The Hebrew is active plural, literally 'they called to/for him it,' with
    לּוֹ functioning idiomatically in naming. English naturally expresses this as
    'they called it.' 'They named it' is possible, but 'called' more directly reflects
    קרא.
- source_word: עִיר דָּוִיד
  chosen: the City of David
  alternatives:
  - David's city
  lexicon: HALOT
  rationale: This is a fixed place-name/title in biblical usage. 'The City of David'
    preserves the recognized designation and capitalizes it as a proper name.
