id: 1CH.11.16
reference: 1 Chronicles 11:16
source:
  edition: WLC
  text: וְ/דָוִ֖יד אָ֣ז בַּ/מְּצוּדָ֑ה וּ/נְצִ֣יב פְּלִשְׁתִּ֔ים אָ֖ז בְּ/בֵ֥ית לָֽחֶם׃
translation:
  text: Now David was then in the stronghold, and the garrison of the Philistines
    was then in Bethlehem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fortress' for 'stronghold.'
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew repeats ''then'' in both clauses for emphasis: ''David was then
      in the stronghold, and the garrison of the Philistines was then in Bethlehem.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מְּצוּדָה
  chosen: stronghold
  alternatives:
  - fortress
  lexicon: HALOT
  rationale: מְצוּדָה denotes a fortified place or defensible refuge. 'Stronghold'
    is idiomatic in English and fits the military setting while preserving the concrete
    sense better than a more generic 'place of safety.'
- source_word: נְצִיב
  chosen: garrison
  alternatives:
  - governor
  - prefect
  - station
  lexicon: HALOT
  rationale: In this context with 'of the Philistines' and location in Bethlehem,
    the term refers to a military post or occupying force rather than a civil official.
    'Garrison' best captures the military sense in readable English.
- source_word: פְּלִשְׁתִּים
  chosen: Philistines
  lexicon: HALOT
  rationale: Standard transliteration for the people group; this is the conventional
    and accurate English form.
- source_word: בְּבֵית לָחֶם
  chosen: in Bethlehem
  alternatives:
  - at Bethlehem
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In Bethlehem' is the most natural
    English rendering for a town location.
- source_word: אָז ... אָז
  chosen: then ... then
  alternatives:
  - at that time ... at that time
  - now ... then
  lexicon: HALOT
  rationale: The Hebrew repeats אָז in both clauses. The translation preserves the
    repetition with 'then ... then' to reflect the source structure and temporal framing,
    even though English might omit one occurrence for style.
- source_word: וְדָוִיד
  chosen: Now David
  alternatives:
  - And David
  lexicon: HALOT
  rationale: Clause-initial waw here is rendered 'Now' to introduce the narrative
    circumstance smoothly in English. 'And' would be more mechanically formal but
    less natural in this discourse setting.
