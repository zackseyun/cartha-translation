id: 1CH.11.6
reference: 1 Chronicles 11:6
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר דָּוִ֔יד כָּל מַכֵּ֤ה יְבוּסִי֙ בָּ/רִ֣אשׁוֹנָ֔ה יִהְיֶ֥ה לְ/רֹ֖אשׁ
    וּ/לְ/שָׂ֑ר וַ/יַּ֧עַל בָּ/רִאשׁוֹנָ֛ה יוֹאָ֥ב בֶּן צְרוּיָ֖ה וַ/יְהִ֥י לְ/רֹֽאשׁ־־׃
translation:
  text: And David said, “Whoever strikes down a Jebusite first shall become chief
    and commander.” So Joab son of Zeruiah went up first, and he became chief.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “shall be head and commander.”
    reason: lexical_alternative
  - marker: b
    text: The verb “went up” may imply ascending in attack against the stronghold,
      but the Hebrew wording itself is simply “went up.”
    reason: cultural_note
lexical_decisions:
- source_word: כָּל מַכֵּה יְבוּסִי
  chosen: Whoever strikes down a Jebusite
  alternatives:
  - Everyone who strikes a Jebusite
  - Whoever attacks the Jebusite
  lexicon: HALOT
  rationale: כָּל with the participle מַכֵּה functions idiomatically as an indefinite
    relative, best rendered 'whoever.' מַכֵּה from נכה in military context commonly
    means 'strike down/defeat,' and singular יְבוּסִי is naturally generic, 'a Jebusite.'
    'Strikes down' conveys the martial sense better than the weaker 'strikes.'
- source_word: בָּרִאשׁוֹנָה
  chosen: first
  alternatives:
  - as the first one
  - first of all
  lexicon: HALOT
  rationale: The adverbial use indicates priority in action, not merely sequence in
    narration. Simple 'first' is idiomatic English and preserves the sense.
- source_word: יִהְיֶה לְרֹאשׁ וּלְשָׂר
  chosen: shall become chief and commander
  alternatives:
  - shall be head and captain
  - shall become leader and prince
  lexicon: HALOT
  rationale: לְרֹאשׁ denotes leadership status ('head/chief'), and שַׂר denotes an
    official ruler or military commander. 'Chief and commander' preserves the paired
    offices in natural English without archaic 'captain.' 'Become' is supplied for
    idiomatic English with היה + ל.
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - advanced
  - attacked
  lexicon: HALOT
  rationale: עלה literally means 'go up.' In this military/topographical context it
    may imply ascent in attack, but the text itself says only 'went up,' so the more
    literal rendering is preferred over interpretive 'attacked.'
- source_word: יוֹאָב בֶּן צְרוּיָה
  chosen: Joab son of Zeruiah
  alternatives:
  - Joab, the son of Zeruiah
  lexicon: HALOT
  rationale: Standard transliteration of the personal names, with Hebrew filiation
    rendered straightforwardly.
- source_word: וַיְהִי לְרֹאשׁ
  chosen: and he became chief
  alternatives:
  - and he became head
  - and he was made chief
  lexicon: HALOT
  rationale: This echoes the earlier promise using רֹאשׁ. 'Became chief' keeps the
    lexical link and reads naturally. The text mentions only רֹאשׁ here, not שַׂר,
    so the English should not repeat both titles.
