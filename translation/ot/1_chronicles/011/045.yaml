id: 1CH.11.45
reference: 1 Chronicles 11:45
source:
  edition: WLC
  text: יְדִֽיעֲאֵל֙ בֶּן שִׁמְרִ֔י וְ/יֹחָ֥א אָחִ֖י/ו הַ/תִּיצִֽי־׃ס
translation:
  text: Jediael son of Shimri, and Joha his brother, the Tizite;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly “the Zizite,” depending on how the gentilic הַתִּיצִי is vocalized
      and related to a place or clan name.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְדִיעֲאֵל
  chosen: Jediael
  lexicon: HALOT
  rationale: Proper personal name; per translation philosophy, personal names are
    transliterated rather than translated.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The construct בֶּן most naturally denotes immediate filial relationship
    in this roster context. 'Son of' is the standard and most transparent rendering.
- source_word: שִׁמְרִי
  chosen: Shimri
  alternatives:
  - Shimeri
  lexicon: HALOT
  rationale: Proper personal name, transliterated by standard English convention.
    'Shimri' reflects the consonantal form directly.
- source_word: וְיֹחָא
  chosen: and Joha
  alternatives:
  - and Johah
  lexicon: HALOT
  rationale: Conjunction plus proper name. The name is transliterated; 'Joha' is a
    straightforward rendering of the Hebrew form here.
- source_word: אָחִיו
  chosen: his brother
  alternatives:
  - his kinsman
  lexicon: HALOT
  rationale: אָח commonly means 'brother'; while it can extend to kinship more broadly,
    in a genealogical/military list the plain sense 'his brother' is preferable unless
    context requires otherwise.
- source_word: הַתִּיצִי
  chosen: the Tizite
  alternatives:
  - the Zizite
  - the Tizi
  lexicon: HALOT
  rationale: Gentilic/title with article, indicating clan or place association. 'The
    Tizite' preserves the likely ethnic/geographic designation without over-interpreting
    the underlying locality.
