id: 1CH.11.21
reference: 1 Chronicles 11:21
source:
  edition: WLC
  text: מִן הַ/שְּׁלוֹשָׁ֤ה בַ/שְּׁנַ֨יִם֙ נִכְבָּ֔ד וַ/יְהִ֥י לָ/הֶ֖ם לְ/שָׂ֑ר וְ/עַד
    הַ/שְּׁלוֹשָׁ֖ה לֹֽא בָֽא־־־׃ס
translation:
  text: He was more honored than the two among the three, and he became their commander;
    but he did not attain to the three.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He was honored more than the three by the two.' The Hebrew is compressed
      and difficult; the sense is that he was highly honored within a ranked group,
      yet still did not equal 'the three.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִן הַשְּׁלוֹשָׁה בַשְּׁנַיִם
  chosen: than the two among the three
  alternatives:
  - than the three by the two
  - more than the three in respect to two
  - than the second three
  lexicon: HALOT
  rationale: 'The phrase is elliptical and comparative. In context (the ranking of
    Abishai among David''s mighty men), it most naturally distinguishes a group of
    two in relation to a larger triad. English smooths the Hebrew into an intelligible
    comparative: he was more honored than the two, within/among the three. This aligns
    with the parallel sense in the surrounding verses while preserving the Hebrew''s
    group-reference.'
- source_word: נִכְבָּד
  chosen: was more honored
  alternatives:
  - was honored
  - was esteemed
  - was glorious
  lexicon: HALOT
  rationale: The Niphal of כבד here carries the sense of being honored or held in
    high esteem. Because the construction is comparative, English supplies 'more honored'
    rather than a bare passive.
- source_word: וַיְהִי לָהֶם לְשָׂר
  chosen: and he became their commander
  alternatives:
  - and he became their chief
  - and he was their captain
  - and he became a leader to them
  lexicon: HALOT
  rationale: שַׂר denotes a leader, chief, or commander. 'Commander' fits the military
    context of David's mighty men and is natural modern English.
- source_word: וְעַד הַשְּׁלוֹשָׁה לֹא בָא
  chosen: but he did not attain to the three
  alternatives:
  - but he did not come up to the three
  - but he did not reach the three
  lexicon: HALOT
  rationale: בוא with עַד in this context expresses reaching or attaining a rank/status.
    'Attain to' communicates that he did not equal the status of the leading three,
    not merely that he failed to arrive physically.
