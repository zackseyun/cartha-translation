id: 1CH.11.29
reference: 1 Chronicles 11:29
source:
  edition: WLC
  text: סִבְּכַי֙ הַ/חֻ֣שָׁתִ֔י עִילַ֖י הָ/אֲחוֹחִֽי׃ס
translation:
  text: Sibbecai the Hushathite, Ilai the Ahohite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some translations read 'Irai' here, influenced by the parallel in 2 Samuel
      23:26. The Hebrew text of 1 Chronicles 11:29 reads 'Ilai.'
    reason: alternative_reading
lexical_decisions:
- source_word: סִבְּכַי
  chosen: Sibbecai
  alternatives:
  - Sibbechai
  rationale: Proper personal name; transliterated rather than translated per translation
    philosophy. 'Sibbecai' follows common English convention for this Hebrew name.
- source_word: הַחֻשָׁתִי
  chosen: the Hushathite
  alternatives:
  - the Hushite
  lexicon: HALOT
  rationale: Gentilic with article, derived from a place or clan name חוּשָׁה/חוּשָׁת.
    'Hushathite' preserves the likely gentilic form more precisely than the smoother
    but less exact 'Hushite'.
- source_word: עִילַי
  chosen: Ilai
  alternatives:
  - Irai
  rationale: Proper personal name; transliterated. The consonantal text here supports
    'Ilai.' 'Irai' appears in some English traditions due to comparison with the parallel
    list in 2 Samuel 23:26, but this verse's Hebrew form is best represented as 'Ilai'.
- source_word: הָאֲחוֹחִי
  chosen: the Ahohite
  lexicon: HALOT
  rationale: Gentilic/clan designation with article from אֲחוֹחַ. 'Ahohite' is the
    standard and sufficiently transparent English transliteration of the clan name.
