id: 1CH.11.34
reference: 1 Chronicles 11:34
source:
  edition: WLC
  text: בְּנֵ֗י הָשֵׁם֙ הַ/גִּ֣זוֹנִ֔י יוֹנָתָ֥ן בֶּן שָׁגֵ֖ה הַ/הֲרָרִֽי־׃ס
translation:
  text: the sons of Hashem the Gizonite, Jonathan son of Shagee the Hararite;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew text reads 'the sons of Hashem the Gizonite.' The parallel list
      in 2 Samuel 23:32 has a different name sequence, often reflected in translations
      or reconstructions.
    reason: textual_variant
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - sons of
  - bene
  lexicon: HALOT
  rationale: Construct plural of בן. The plain sense is 'sons of.' Although the parallel
    in 2 Samuel 23:32 has a different reading, this verse as pointed in Chronicles
    reads a plural construct, so the translation preserves the Masoretic wording rather
    than harmonizing.
- source_word: הָשֵׁם
  chosen: Hashem
  alternatives:
  - Hašem
  - Hasham
  lexicon: HALOT
  rationale: Proper name, so transliterated rather than translated, following the
    project's policy for personal names. The form is best represented in standard
    English as 'Hashem.'
- source_word: הַגִּזוֹנִי
  chosen: the Gizonite
  alternatives:
  - the Gizoni
  - the Gizonite man
  lexicon: HALOT
  rationale: Gentilic/provenance term with article. English idiom normally renders
    such forms with '-ite'; 'the Gizonite' preserves both the gentilic sense and the
    article.
- source_word: יוֹנָתָן
  chosen: Jonathan
  alternatives:
  - Jehonathan
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Construct singular of בן introducing filiation. 'Son of' is the natural
    English equivalent in a name list.
- source_word: שָׁגֵה
  chosen: Shagee
  alternatives:
  - Shage
  - Shageh
  lexicon: HALOT
  rationale: Proper name transliterated directly. 'Shagee' reflects the conventional
    English representation of the final vowel.
- source_word: הַהֲרָרִי
  chosen: the Hararite
  alternatives:
  - the Harari
  lexicon: HALOT
  rationale: Gentilic/provenance term with article, best rendered in English with
    '-ite.' This likely identifies clan or regional origin rather than functioning
    as a second personal name.
