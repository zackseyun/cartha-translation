id: 1CH.11.40
reference: 1 Chronicles 11:40
source:
  edition: WLC
  text: עִירָא֙ הַ/יִּתְרִ֔י גָּרֵ֖ב הַ/יִּתְרִֽי׃ס
translation:
  text: Ira the Ithrite, Gareb the Ithrite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Jithrite' for both occurrences of the clan designation.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִירָא
  chosen: Ira
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention
    rather than translated, following the policy to transliterate names.
- source_word: הַיִּתְרִי
  chosen: the Ithrite
  alternatives:
  - the Jithrite
  lexicon: HALOT
  rationale: Gentilic with article, indicating clan or regional affiliation. 'Ithrite'
    is the conventional and phonetically straightforward transliteration of the Hebrew
    gentilic; 'Jithrite' is a possible alternative reflecting the initial yod more
    explicitly in older English forms.
- source_word: גָּרֵב
  chosen: Gareb
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated.
- source_word: הַיִּתְרִי
  chosen: the Ithrite
  alternatives:
  - the Jithrite
  lexicon: HALOT
  rationale: Repeated gentilic for Gareb as well. Retained identically for consistency
    within the verse and to reflect the repeated Hebrew expression.
