id: 1CH.11.46
reference: 1 Chronicles 11:46
source:
  edition: WLC
  text: אֱלִיאֵל֙ הַֽ/מַּחֲוִ֔ים וִ/ירִיבַ֥י וְ/יוֹשַׁוְיָ֖ה בְּנֵ֣י אֶלְנָ֑עַם וְ/יִתְמָ֖ה
    הַ/מּוֹאָבִֽי׃
translation:
  text: Eliel the Mahavite, and Jeribai and Joshaviah, the sons of Elnaam, and Ithmah
    the Moabite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Mahavite; the exact place-name or clan designation behind this gentilic
      is uncertain.
    reason: cultural_note
  - marker: b
    text: Or 'Jaribai' for Jeribai, and 'Jithmah' for Ithmah; these are transliteration
      alternatives for the Hebrew names.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלִיאֵל
  chosen: Eliel
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated per project
    policy for names.
- source_word: הַמַּחֲוִים
  chosen: the Mahavite
  alternatives:
  - the Mahawite
  - the Maavite
  lexicon: HALOT
  rationale: Gentilic/toponymic designation with uncertain underlying place-name identification.
    A transliterated gentilic best preserves the Hebrew form without overclaiming
    a location. The article is retained in English as part of the epithet construction.
- source_word: וִירִיבַי
  chosen: and Jeribai
  alternatives:
  - and Jaribai
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration favors Jeribai,
    though vocalization can yield a slightly different form.
- source_word: וְיוֹשַׁוְיָה
  chosen: and Joshaviah
  alternatives:
  - and Joshaviah
  lexicon: HALOT
  rationale: Proper personal name; transliterated. The English form with 'sh' reflects
    the Hebrew ש sound clearly for modern readers.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - sons of
  lexicon: HALOT
  rationale: 'Construct plural of ''sons.'' Rendering with the article in English
    fits the appositional list structure: the two preceding names are identified as
    the sons of Elnaam.'
- source_word: אֶלְנָעַם
  chosen: Elnaam
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
- source_word: וְיִתְמָה
  chosen: and Ithmah
  alternatives:
  - and Jithmah
  lexicon: HALOT
  rationale: Proper personal name; transliterated. English initial 'I' is a common
    convention for this Hebrew name, though 'Jithmah' is also seen.
- source_word: הַמּוֹאָבִי
  chosen: the Moabite
  alternatives:
  - a Moabite
  lexicon: HALOT
  rationale: Gentilic with article. 'The Moabite' preserves the Hebrew form and likely
    functions as an identifying epithet attached to Ithmah.
