theological_decisions:
- issue: Cultic significance of David's action with the water
  chosen_reading: Render the action concretely in the main text as 'poured it out to the LORD' while preserving the libation/drink-offering sense in a footnote.
  alternative_readings:
  - Render directly as 'offered it as a drink offering to the LORD'
  rationale: The Hebrew verb carries sacrificial overtones, but the narrative depicts a visible act of pouring out. Keeping the concrete action in the main text preserves readability and textual immediacy without suppressing the theological/cultic dimension, which is noted in the footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6; Contested terms entry for יְהוָה
