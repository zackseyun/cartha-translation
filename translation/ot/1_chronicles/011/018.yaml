id: 1CH.11.18
reference: 1 Chronicles 11:18
source:
  edition: WLC
  text: וַ/יִּבְקְע֨וּ הַ/שְּׁלֹשָׁ֜ה בְּ/מַחֲנֵ֣ה פְלִשְׁתִּ֗ים וַ/יִּֽשְׁאֲבוּ מַ֨יִם֙ מִ/בּ֤וֹר בֵּֽית לֶ֨חֶם֙ אֲשֶׁ֣ר בַּ/שַּׁ֔עַר וַ/יִּשְׂא֖וּ וַ/יָּבִ֣אוּ אֶל דָּוִ֑יד וְ/לֹֽא אָבָ֤ה דָוִיד֙ לִ/שְׁתּוֹתָ֔/ם וַ/יְנַסֵּ֥ךְ אֹתָ֖/ם לַ/יהוָֽה־־־־׃
translation:
  text: So the three broke through into the camp of the Philistines and drew water from the well of Bethlehem that was by the gate, and carried it and brought it to David. But David was not willing to drink it; instead, he poured it out to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'he poured it out as a drink offering to the LORD.' The Hebrew verb can carry libation/sacrificial force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְקְעוּ
  chosen: broke through
  alternatives:
  - forced their way through
  - split open
  lexicon: HALOT
  rationale: In military context with בְּמַחֲנֵה פְלִשְׁתִּים, the verb conveys breaking through enemy lines rather than a literal splitting. 'Broke through' is idiomatic and preserves the action's force.
- source_word: הַשְּׁלֹשָׁה
  chosen: the three
  alternatives:
  - the three mighty men
  lexicon: HALOT
  rationale: The Hebrew here simply says 'the three'; the larger context identifies them, but the verse itself does not repeat 'mighty men.' To avoid importing words not present, the translation keeps the shorter expression.
- source_word: בְּמַחֲנֵה פְלִשְׁתִּים
  chosen: into the camp of the Philistines
  alternatives:
  - through the camp of the Philistines
  - into the Philistine camp
  lexicon: HALOT
  rationale: With the verb 'broke through,' English naturally supplies movement into enemy position. 'Camp of the Philistines' is a straightforward rendering of the construct phrase.
- source_word: וַיִּשְׁאֲבוּ מַיִם
  chosen: drew water
  alternatives:
  - fetched water
  lexicon: HALOT
  rationale: '''Drew water'' is the standard equivalent for שאב in this context and fits the image of taking water from a well.'
- source_word: מִבּוֹר בֵּית לֶחֶם אֲשֶׁר בַּשַּׁעַר
  chosen: from the well of Bethlehem that was by the gate
  alternatives:
  - from the cistern of Bethlehem that was at the gate
  - from the pit/well of Bethlehem by the gate
  lexicon: HALOT
  rationale: בּוֹר can denote pit, cistern, or well depending on context. Since the narrative concerns drawing drinking water, 'well' is the most natural English choice. 'By the gate' renders the location clearly without over-specifying.
- source_word: וַיִּשְׂאוּ
  chosen: carried it
  alternatives:
  - lifted it
  - bore it
  lexicon: HALOT
  rationale: After drawing the water, the sense is transporting it. English requires an object, supplied from context as 'it' referring to the water.
- source_word: וַיָּבִיאוּ אֶל דָּוִיד
  chosen: brought it to David
  alternatives:
  - brought it back to David
  lexicon: HALOT
  rationale: Simple narrative sequence; 'back' is implied by context but not explicit, so omitted from the main text.
- source_word: וְלֹא אָבָה דָוִיד לִשְׁתּוֹתָם
  chosen: David was not willing to drink it
  alternatives:
  - David would not drink it
  - David refused to drink it
  lexicon: HALOT
  rationale: אָבָה expresses willingness/consent. 'Was not willing' is slightly more formal and transparent to the Hebrew than the stronger 'refused,' while still natural English. The Hebrew suffix is plural ('them'), likely referring to the waters as a plural/mass noun; idiomatic English uses singular 'it' for water.
- source_word: וַיְנַסֵּךְ אֹתָם לַיהוָה
  chosen: he poured it out to the LORD
  alternatives:
  - he poured it out as a drink offering to the LORD
  - he offered it as a libation to the LORD
  lexicon: HALOT
  rationale: נסך in cultic context can denote pouring out as a libation/drink offering. The immediate narrative action is the pouring out itself, so the main text keeps the concrete verb. The sacrificial nuance is important and preserved in a footnote. 'The LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
