id: 1CH.11.13
reference: 1 Chronicles 11:13
source:
  edition: WLC
  text: הֽוּא הָיָ֨ה עִם דָּוִ֜יד בַּ/פַּ֣ס דַּמִּ֗ים וְ/הַ/פְּלִשְׁתִּים֙ נֶאֱסְפוּ
    שָׁ֣ם לַ/מִּלְחָמָ֔ה וַ/תְּהִ֛י חֶלְקַ֥ת הַ/שָּׂדֶ֖ה מְלֵאָ֣ה שְׂעוֹרִ֑ים וְ/הָ/עָ֥ם
    נָ֖סוּ מִ/פְּנֵ֥י פְלִשְׁתִּֽים־־־׃
translation:
  text: He was with David at Pas-dammim, where the Philistines had gathered for battle.
    Now the plot of the field was full of barley, and the people fled from before
    the Philistines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Pas-dammim is a place name; compare the parallel account in 1 Samuel 17:1,
      which names the site Ephes-dammim.
    reason: cross_reference
  - marker: b
    text: Or 'fled before the Philistines.' The Hebrew idiom is literally 'fled from
      before the Philistines.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּפַּס דַּמִּים
  chosen: at Pas-dammim
  alternatives:
  - at the boundary of bloodshed
  - at Ephes-dammim
  lexicon: HALOT
  rationale: Treated as a place name in Chronicles, matching the proper-noun usage
    reflected in the morphology and parallel battle narrative. Transliteration is
    preferred for names under the translation philosophy. A more literal etymological
    rendering ('boundary of bloodshed') is possible but would obscure that this is
    a location.
- source_word: נֶאֱסְפוּ
  chosen: had gathered
  alternatives:
  - were gathered
  - assembled
  lexicon: HALOT
  rationale: The Niphal of אסף here denotes assembling together. 'Had gathered' gives
    smooth English in relation to the following battle setting while preserving the
    sense of a completed mustering.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  lexicon: HALOT
  rationale: '''Battle'' is the more natural English expression in this immediate
    narrative context of a specific military engagement, while remaining faithful
    to the Hebrew.'
- source_word: חֶלְקַת הַשָּׂדֶה
  chosen: the plot of the field
  alternatives:
  - the portion of the field
  - the tract of land
  lexicon: HALOT
  rationale: חלקה denotes a parcel or plot. 'The plot of the field' preserves the
    concrete sense of a defined cultivated section without overformal wording.
- source_word: מְלֵאָה שְׂעוֹרִים
  chosen: was full of barley
  alternatives:
  - was full of grain
  lexicon: HALOT
  rationale: The Hebrew specifically names barley, not grain in general. The wording
    keeps the agricultural detail explicit.
- source_word: וְהָעָם
  chosen: the people
  alternatives:
  - the troops
  - the men
  lexicon: HALOT
  rationale: עם is broader than 'men' and need not be narrowed to combatants only.
    'The people' is the most direct rendering, though in context it likely refers
    to Israelite forces.
- source_word: נָסוּ מִפְּנֵי פְלִשְׁתִּים
  chosen: fled from before the Philistines
  alternatives:
  - fled before the Philistines
  - ran away from the Philistines
  lexicon: HALOT
  rationale: The idiom מִפְּנֵי is literally 'from before' and commonly means retreating
    before an enemy. The chosen rendering preserves the Hebrew flavor while remaining
    understandable in English.
