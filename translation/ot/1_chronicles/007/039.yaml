id: 1CH.7.39
reference: 1 Chronicles 7:39
source:
  edition: WLC
  text: וּ/בְנֵ֖י עֻלָּ֑א אָרַ֥ח וְ/חַנִּיאֵ֖ל וְ/רִצְיָֽא׃
translation:
  text: 'The sons of Ulla: Arah, Hanniel, and Rizia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the sons of Ulla.' The Hebrew begins with a conjunction, but English
      genealogical style often omits it.
    reason: lexical_alternative
  - marker: b
    text: Ulla may also be spelled 'Ula' in English transliteration.
    reason: lexical_alternative
  - marker: c
    text: Hanniel may also be spelled 'Haniel.'
    reason: lexical_alternative
  - marker: d
    text: Rizia may also be rendered 'Riziah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - The descendants of
  lexicon: HALOT
  rationale: בני is the construct plural of 'sons of.' In genealogical contexts, 'sons
    of' is the standard and sufficiently natural English rendering. The prefixed conjunction
    is not separately represented because English genealogy style commonly begins
    the entry without 'and,' and the sense is preserved.
- source_word: עֻלָּא
  chosen: Ulla
  alternatives:
  - Ula
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. 'Ulla' closely reflects the Hebrew form with doubled consonant.
- source_word: אָרַח
  chosen: Arah
  lexicon: HALOT
  rationale: Proper personal name; standard transliteration of the Hebrew name.
- source_word: חַנִּיאֵל
  chosen: Hanniel
  alternatives:
  - Haniel
  lexicon: HALOT
  rationale: Proper personal name; transliterated. 'Hanniel' preserves the doubled
    nun indicated in the Hebrew spelling more closely than the simplified 'Haniel.'
- source_word: רִצְיָא
  chosen: Rizia
  alternatives:
  - Riziah
  lexicon: HALOT
  rationale: Proper personal name; transliterated directly from the Hebrew consonants
    and vowels. An English form with final -h is possible, but 'Rizia' more simply
    reflects the written form here.
