id: 1CH.7.30
reference: 1 Chronicles 7:30
source:
  edition: WLC
  text: בְּנֵ֣י אָשֵׁ֗ר יִמְנָ֧ה וְ/יִשְׁוָ֛ה וְ/יִשְׁוִ֥י וּ/בְרִיעָ֖ה וְ/שֶׂ֥רַח
    אֲחוֹתָֽ/ם׃
translation:
  text: 'The sons of Asher: Imnah, Ishvah, Ishvi, and Beriah, and Serah their sister.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew name spellings vary in English tradition: ''Imnah'' may also appear
      as ''Jimnah,'' ''Ishvah'' as ''Ishuah,'' and ''Ishvi'' as ''Ishui.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons.' In genealogical contexts it
    can sometimes broaden to 'descendants,' but here it introduces an immediate list
    of named children, so 'sons of' is the most direct and accurate rendering.
- source_word: אָשֵׁר
  chosen: Asher
  lexicon: HALOT
  rationale: Proper personal/tribal name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: יִמְנָה
  chosen: Imnah
  alternatives:
  - Jimnah
  lexicon: HALOT
  rationale: Proper name transliterated from Hebrew. 'Imnah' reflects a standard direct
    transliteration; 'Jimnah' reflects older English convention influenced by initial
    yod rendering.
- source_word: יִשְׁוָה
  chosen: Ishvah
  alternatives:
  - Ishuah
  lexicon: HALOT
  rationale: Proper name transliterated directly. The consonantal form supports 'Ishvah';
    some English traditions use 'Ishuah' in harmonization with related genealogical
    forms, but this verse's pointing favors 'Ishvah.'
- source_word: יִשְׁוִי
  chosen: Ishvi
  alternatives:
  - Ishui
  lexicon: HALOT
  rationale: Proper name transliterated from the Masoretic vocalization. 'Ishvi' follows
    the Hebrew form here; 'Ishui' is an alternate English spelling.
- source_word: בְרִיעָה
  chosen: Beriah
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: שֶׂרַח
  chosen: Serah
  alternatives:
  - Sarah
  lexicon: HALOT
  rationale: Proper female name transliterated from Hebrew. 'Serah' preserves the
    distinct Hebrew name and avoids confusion with the more common 'Sarah,' which
    is a different name.
- source_word: אֲחוֹתָם
  chosen: their sister
  alternatives:
  - his sister
  lexicon: HALOT
  rationale: The form includes a 3mp suffix, yielding 'their sister.' Although English
    style might sometimes recast the phrase, the Hebrew straightforwardly identifies
    Serah as the sister of the listed brothers collectively.
