id: 1CH.7.23
reference: 1 Chronicles 7:23
source:
  edition: WLC
  text: וַ/יָּבֹא֙ אֶל אִשְׁתּ֔/וֹ וַ/תַּ֖הַר וַ/תֵּ֣לֶד בֵּ֑ן וַ/יִּקְרָ֤א אֶת שְׁמ/וֹ֙
    בְּרִיעָ֔ה כִּ֥י בְ/רָעָ֖ה הָיְתָ֥ה בְּ/בֵיתֽ/וֹ־־׃
translation:
  text: Then he went in to his wife, and she conceived and bore a son, and he called
    his name Beriah, because disaster had come upon his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he named him Beriah.'
    reason: lexical_alternative
  - marker: b
    text: '''Disaster'' here refers to calamity or misfortune that had struck his
      household, not moral evil.'
    reason: lexical_alternative
  - marker: c
    text: Or 'because calamity was in his house.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא אֶל אִשְׁתּוֹ
  chosen: he went in to his wife
  alternatives:
  - he had relations with his wife
  - he came to his wife
  lexicon: HALOT
  rationale: The idiom בוא אל with 'wife' is a conventional euphemism for sexual relations.
    'Went in to his wife' preserves the Hebrew idiom in readable English without becoming
    either overly explicit or obscure.
- source_word: וַתַּהַר
  chosen: she conceived
  alternatives:
  - she became pregnant
  lexicon: HALOT
  rationale: Standard rendering of הרה in birth narratives. 'Conceived' is concise
    and idiomatic in English.
- source_word: וַתֵּלֶד בֵּן
  chosen: bore a son
  alternatives:
  - gave birth to a son
  lexicon: HALOT
  rationale: A natural, slightly more formal narrative rendering that matches the
    compact Hebrew style.
- source_word: וַיִּקְרָא אֶת שְׁמוֹ בְּרִיעָה
  chosen: he called his name Beriah
  alternatives:
  - he named him Beriah
  lexicon: HALOT
  rationale: The Hebrew literally says 'called his name.' This is a common naming
    formula. The chosen rendering stays close to the source while remaining clear;
    'named him Beriah' is possible but slightly less formally transparent.
- source_word: בְּרִיעָה
  chosen: Beriah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the naming. 'Because' is clearer in modern
    English than the more formal 'for.'
- source_word: בְרָעָה
  chosen: disaster
  alternatives:
  - evil
  - calamity
  - trouble
  - misfortune
  lexicon: HALOT
  rationale: In this context the noun refers to grievous misfortune that had struck
    Ephraim's household, not moral evil. 'Disaster' best conveys the sense in contemporary
    English.
- source_word: הָיְתָה בְּבֵיתוֹ
  chosen: had come upon his house
  alternatives:
  - was in his house
  - had been in his household
  lexicon: HALOT
  rationale: Literally, 'was in his house.' In context, English idiom prefers an eventive
    expression for calamity affecting a family. 'Had come upon his house' brings out
    the sense of affliction befalling the household while remaining faithful to the
    Hebrew idea.
- source_word: בְּבֵיתוֹ
  chosen: his house
  alternatives:
  - his household
  - his family
  lexicon: HALOT
  rationale: '''House'' preserves the Hebrew בית, which can denote household/family.
    Here ''house'' is retained in the main text for formal transparency, while the
    context naturally implies household/family.'
