id: 1CH.7.35
reference: 1 Chronicles 7:35
source:
  edition: WLC
  text: וּ/בֶן הֵ֖לֶם אָחִ֑י/ו צוֹפַ֥ח וְ/יִמְנָ֖ע וְ/שֵׁ֥לֶשׁ וְ/עָמָֽל־׃
translation:
  text: 'The son of Helem his brother: Zophah, Imna, Shelesh, and Amal.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'Zophach' for the name צוֹפַח, depending on transliteration
      convention for the final Hebrew letter ח.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֶן
  chosen: The son of
  alternatives:
  - And the son of
  - Now the son of
  lexicon: HALOT
  rationale: Construct form of בֵּן introducing a genealogical relationship. English
    idiom in genealogies commonly omits the conjunction at the start of a verse, but
    the sense is preserved by 'The son of.' Singular is retained because the Hebrew
    is singular.
- source_word: הֵלֶם
  chosen: Helem
  alternatives:
  - Helem/Holem (orthographic variation only)
  lexicon: HALOT
  rationale: Proper personal name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: אָחִיו
  chosen: his brother
  alternatives:
  - the brother of him
  lexicon: HALOT
  rationale: Literal kinship term with 3ms suffix. In this genealogical context it
    most naturally identifies Helem as the brother of the previously mentioned figure.
    The straightforward rendering 'his brother' preserves the Hebrew relation without
    over-explaining the antecedent.
- source_word: צוֹפַח
  chosen: Zophah
  alternatives:
  - Zophach
  lexicon: HALOT
  rationale: Proper name. The consonantal form supports a standard English transliteration
    'Zophah.' An alternate transliteration with final -ch reflects a different handling
    of the final ח, but 'Zophah' is smoother and common in English Bible tradition.
- source_word: וְיִמְנָע
  chosen: Imna
  alternatives:
  - and Imna
  lexicon: HALOT
  rationale: Proper name in a list. The prefixed conjunction simply coordinates list
    items; in English the series is naturally rendered with commas and a final 'and,'
    so the name itself is given as 'Imna.'
- source_word: וְשֵׁלֶשׁ
  chosen: Shelesh
  alternatives:
  - and Shelesh
  lexicon: HALOT
  rationale: Proper name in the genealogical list, transliterated directly. The conjunction
    is represented by English list punctuation.
- source_word: וְעָמָל
  chosen: and Amal
  alternatives:
  - Amal
  lexicon: HALOT
  rationale: Final proper name in the series. The Hebrew conjunction is best represented
    by the final English 'and' before the last item.
