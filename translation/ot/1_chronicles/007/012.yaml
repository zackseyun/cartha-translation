id: 1CH.7.12
reference: 1 Chronicles 7:12
source:
  edition: WLC
  text: וְ/שֻׁפִּ֤ם וְ/חֻפִּם֙ בְּנֵ֣י עִ֔יר חֻשִׁ֖ם בְּנֵ֥י אַחֵֽר׃
translation:
  text: And Shuppim and Huppim were the sons of Ir; Hushim was the son of Aher.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''sons of Aher.'' The text is syntactically difficult: the plural
      ''sons'' stands with the singular name Hushim. Some take ''Aher'' as a proper
      name; others understand it as ''another.'''
    reason: lexical_alternative
  - marker: b
    text: Some English traditions render the names as 'Shephupham' and 'Hupham' in
      light of related genealogical parallels.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/שֻׁפִּם
  chosen: And Shuppim
  alternatives:
  - and Shephupham
  lexicon: HALOT
  rationale: Proper name; transliterated rather than translated per project philosophy.
    The prefixed conjunction is carried over as 'And.' Variant English spellings reflect
    differing transliteration traditions.
- source_word: וְ/חֻפִּם
  chosen: and Huppim
  alternatives:
  - and Hupham
  lexicon: HALOT
  rationale: Proper name; transliterated. The conjunction is retained. Alternative
    spellings occur in related genealogical passages and English traditions.
- source_word: בְּנֵי
  chosen: were the sons of
  alternatives:
  - sons of
  - descendants of
  lexicon: HALOT
  rationale: In genealogical context, 'sons of' is the default sense. 'Were the sons
    of' supplies natural English predication since the Hebrew is verbless. 'Descendants
    of' is possible in genealogies generally, but here a more immediate filial sense
    best matches the compact list structure.
- source_word: עִיר
  chosen: Ir
  alternatives:
  - Iri
  lexicon: HALOT
  rationale: Proper name, transliterated. The consonantal form supports 'Ir'; some
    traditions connect the name with forms like 'Iri' in genealogical parallels, but
    the MT here reads עִיר.
- source_word: חֻשִׁם
  chosen: Hushim
  lexicon: HALOT
  rationale: Proper name; transliterated directly from the Hebrew.
- source_word: בְּנֵי אַחֵר
  chosen: was the son of Aher
  alternatives:
  - were the sons of Aher
  - sons of another
  lexicon: HALOT
  rationale: Although בְּנֵי is morphologically plural ('sons of'), the phrase likely
    functions genealogically with a singular referent in this compressed list, and
    English smooths this as 'was the son of Aher' with Hushim as the subject. 'Aher'
    is taken as a proper name, following the pointing and genealogical context, rather
    than the common adjective 'another.' The plural form may reflect a formulaic genealogical
    usage or textual irregularity.
