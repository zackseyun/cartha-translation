id: 1CH.7.2
reference: 1 Chronicles 7:2
source:
  edition: WLC
  text: וּ/בְנֵ֣י תוֹלָ֗ע עֻזִּ֡י וּ/רְפָיָ֡ה וִֽ֠/ירִיאֵל וְ/יַחְמַ֨י וְ/יִבְשָׂ֜ם
    וּ/שְׁמוּאֵ֗ל רָאשִׁ֤ים לְ/בֵית אֲבוֹתָ/ם֙ לְ/תוֹלָ֔ע גִּבּ֥וֹרֵי חַ֖יִל לְ/תֹלְדוֹתָ֑/ם
    מִסְפָּרָ/ם֙ בִּ/ימֵ֣י דָוִ֔יד עֶשְׂרִֽים וּ/שְׁנַ֥יִם אֶ֖לֶף וְ/שֵׁ֥שׁ מֵאֽוֹת־־׃ס
translation:
  text: 'The sons of Tola: Uzzi, Rephaiah, Jeriel, Jahmai, Ibsam, and Samuel, heads
    of their fathers’ houses for Tola, mighty men of valor according to their generations.
    Their number in the days of David was twenty-two thousand six hundred.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chiefs' or 'leaders' of their fathers’ houses.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'mighty men of valor' can also be rendered 'mighty warriors'
      or 'valiant men.'
    reason: lexical_alternative
  - marker: c
    text: Or 'by their generations' or 'in their genealogies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - The descendants of
  lexicon: HALOT
  rationale: בנים in genealogical context most naturally means 'sons,' though by extension
    it can imply descendants. Here a direct filial list follows, so 'sons of' is preferred.
    The prefixed conjunction is not separately represented in English because the
    verse reads naturally without initial 'And.'
- source_word: תוֹלָע
  chosen: Tola
  lexicon: HALOT
  rationale: Proper name; transliterated per translation policy for personal names.
- source_word: רְפָיָה
  chosen: Rephaiah
  alternatives:
  - Raphaiah
  lexicon: HALOT
  rationale: Proper name; standard English transliteration retained. Alternate vocalized
    transliteration is possible but less common.
- source_word: יִרִיאֵל
  chosen: Jeriel
  alternatives:
  - Jeriel
  lexicon: HALOT
  rationale: Proper name; rendered with conventional English initial J for yod-based
    name forms.
- source_word: יַחְמַי
  chosen: Jahmai
  alternatives:
  - Yahmai
  lexicon: HALOT
  rationale: Proper name; transliterated by standard English convention.
- source_word: יִבְשָׂם
  chosen: Ibsam
  alternatives:
  - Jibsam
  lexicon: HALOT
  rationale: Proper name; 'Ibsam' is the conventional English form in this genealogical
    context.
- source_word: שְׁמוּאֵל
  chosen: Samuel
  alternatives:
  - Shemuel
  lexicon: HALOT
  rationale: Proper name; the familiar English form 'Samuel' is standard and transparent.
- source_word: רָאשִׁים
  chosen: heads
  alternatives:
  - chiefs
  - leaders
  lexicon: HALOT
  rationale: Literally 'heads.' In construct with 'their fathers’ houses,' it denotes
    clan heads or family heads. 'Heads' preserves the Hebrew metaphor while remaining
    understandable.
- source_word: לְבֵית אֲבוֹתָם
  chosen: of their fathers’ houses
  alternatives:
  - of their ancestral houses
  - of their family houses
  lexicon: HALOT
  rationale: בית אבות is a standard kinship/social unit in genealogical and military
    lists. 'Fathers’ houses' preserves the idiom with minimal interpretation.
- source_word: לְתוֹלָע
  chosen: for Tola
  alternatives:
  - belonging to Tola
  - of Tola
  lexicon: HALOT
  rationale: The phrase links these heads to the Tolaite line. 'For Tola' is slightly
    wooden but preserves the relational force without overexplaining.
- source_word: גִּבּוֹרֵי חַיִל
  chosen: mighty men of valor
  alternatives:
  - mighty warriors
  - valiant men
  - mighty men
  lexicon: HALOT
  rationale: This stock phrase can denote military prowess and social standing. In
    a census-like genealogical context, 'mighty men of valor' preserves the traditional
    force and likely martial nuance better than the flatter 'capable men.'
- source_word: לְתֹלְדוֹתָם
  chosen: according to their generations
  alternatives:
  - by their generations
  - in their genealogies
  lexicon: HALOT
  rationale: תולדות here refers to family lines/descent groupings. 'According to their
    generations' is a natural rendering that preserves the genealogical sense.
- source_word: מִסְפָּרָם
  chosen: Their number
  alternatives:
  - Their total number
  - The number of them
  lexicon: HALOT
  rationale: Straightforward census term introducing the total count.
- source_word: בִּימֵי דָוִיד
  chosen: in the days of David
  alternatives:
  - during David's reign
  lexicon: HALOT
  rationale: Literally temporal phrase. 'In the days of David' is preferred over the
    interpretive 'during David's reign,' though the latter is likely implied.
- source_word: עֶשְׂרִים וּשְׁנַיִם אֶלֶף וְשֵׁשׁ מֵאוֹת
  chosen: twenty-two thousand six hundred
  lexicon: HALOT
  rationale: Standard English rendering of the Hebrew number sequence.
