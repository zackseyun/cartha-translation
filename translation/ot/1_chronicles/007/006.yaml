id: 1CH.7.6
reference: 1 Chronicles 7:6
source:
  edition: WLC
  text: בִּנְיָמִ֗ן בֶּ֧לַע וָ/בֶ֛כֶר וִ/ידִֽיעֲאֵ֖ל שְׁלֹשָֽׁה׃
translation:
  text: 'The sons of Benjamin: Bela, Beker, and Jediael—three.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditional English versions often spell the second name 'Becher'; the Hebrew
      form here may be represented more directly as 'Beker.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּנְיָמִן
  chosen: Benjamin
  lexicon: HALOT
  rationale: Proper personal/tribal name; transliterated according to the translation
    philosophy for names. In context this heading introduces Benjamin's descendants,
    so the English supplies the relational phrase 'The sons of' for natural sense.
- source_word: בֶּלַע
  chosen: Bela
  lexicon: HALOT
  rationale: Proper name; transliterated directly.
- source_word: בֶּכֶר
  chosen: Beker
  alternatives:
  - Becher
  lexicon: HALOT
  rationale: Proper name; transliterated from the Hebrew consonants as Beker. 'Becher'
    reflects a more traditional English form, but 'Beker' more transparently represents
    the Hebrew כ here.
- source_word: יְדִיעֲאֵל
  chosen: Jediael
  alternatives:
  - Jedihael
  lexicon: HALOT
  rationale: Proper name; standard English transliteration is Jediael. An alternate
    more mechanically transparent form could be 'Jedihael,' but the conventional transliteration
    is smoother and widely recognizable.
- source_word: שְׁלֹשָׁה
  chosen: three
  lexicon: HALOT
  rationale: Cardinal number summarizing the total of named sons. Rendered simply
    as 'three.'
- source_word: '[implicit genealogical heading]'
  chosen: 'The sons of Benjamin:'
  alternatives:
  - 'Benjamin:'
  - 'Benjamin had:'
  rationale: The Hebrew is verbless and elliptical, a common genealogical style. English
    normally requires the relationship to be made explicit. 'The sons of Benjamin:'
    conveys the plain sense without adding more than the context warrants.
