id: 1CH.7.11
reference: 1 Chronicles 7:11
source:
  edition: WLC
  text: כָּל אֵ֜לֶּה בְּנֵ֤י יְדִֽיעֲאֵל֙ לְ/רָאשֵׁ֣י הָ/אָב֔וֹת גִּבּוֹרֵ֖י חֲיָלִ֑ים
    שִׁבְעָֽה עָשָׂ֥ר אֶ֨לֶף֙ וּ/מָאתַ֔יִם יֹצְאֵ֥י צָבָ֖א לַ/מִּלְחָמָֽה־־׃
translation:
  text: All these were sons of Jediael, heads of the fathers’ houses, mighty warriors,
    seventeen thousand two hundred, fit for military service in war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “descendants of Jediael.” The Hebrew “sons of” can function broadly in
      genealogical lists.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “heads of the fathers’ houses,” that is, clan or family heads.
    reason: cultural_note
  - marker: c
    text: Or “mighty men of valor.”
    reason: lexical_alternative
  - marker: d
    text: Literally “those going out to the army for war,” an idiom for men available
      or eligible for military duty.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל אֵלֶּה
  chosen: All these
  alternatives:
  - All these men
  - All these were
  lexicon: HALOT
  rationale: A straightforward summative phrase introducing the total just given.
    'All these' preserves the Hebrew compactness without adding an explicit noun not
    present in the text.
- source_word: בְּנֵי יְדִיעֲאֵל
  chosen: sons of Jediael
  alternatives:
  - descendants of Jediael
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of.' In genealogical contexts it can extend
    to descendants, but here the formal genealogical style favors the more literal
    'sons of,' leaving the broader clan sense to context.
- source_word: לְרָאשֵׁי הָאָבוֹת
  chosen: heads of the fathers’ houses
  alternatives:
  - heads of the ancestral houses
  - chiefs of the fathers’ households
  lexicon: HALOT
  rationale: The phrase denotes clan/family heads. 'Fathers’ houses' is a standard
    rendering for בֵּית־אָב type social structure; here the plural אָבוֹת is best
    represented by the familiar idiom rather than flattened to merely 'families.'
- source_word: גִּבּוֹרֵי חֲיָלִים
  chosen: mighty warriors
  alternatives:
  - mighty men of valor
  - valiant warriors
  lexicon: HALOT
  rationale: This expression commonly denotes proven fighting men. 'Mighty warriors'
    is natural modern English and preserves both strength and military capability
    without archaic diction.
- source_word: שִׁבְעָה עָשָׂר אֶלֶף וּמָאתַיִם
  chosen: seventeen thousand two hundred
  alternatives:
  - 17,200
  lexicon: HALOT
  rationale: The Hebrew gives a precise census total. Spelling out the number fits
    Bible translation style and preserves the formal register.
- source_word: יֹצְאֵי צָבָא
  chosen: fit for military service
  alternatives:
  - going out to the army
  - able to go out in the army
  - those who went out for military service
  lexicon: HALOT
  rationale: Literally 'those going out of army/service,' an idiom for men eligible
    or available for military duty. 'Fit for military service' communicates the idiomatic
    sense in clear English.
- source_word: לַמִּלְחָמָה
  chosen: in war
  alternatives:
  - for war
  - for battle
  lexicon: HALOT
  rationale: The phrase specifies the purpose of military service. 'In war' reads
    smoothly with 'fit for military service' and preserves the martial context without
    redundancy.
