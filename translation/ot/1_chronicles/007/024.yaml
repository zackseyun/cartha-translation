id: 1CH.7.24
reference: 1 Chronicles 7:24
source:
  edition: WLC
  text: וּ/בִתּ֣/וֹ שֶׁאֱרָ֔ה וַ/תִּ֧בֶן אֶת בֵּית חוֹר֛וֹן הַ/תַּחְתּ֖וֹן וְ/אֶת
    הָ/עֶלְי֑וֹן וְ/אֵ֖ת אֻזֵּ֥ן שֶׁאֱרָֽה־־־׃
translation:
  text: His daughter was Sheerah, and she built Lower Beth-horon and Upper Beth-horon,
    and Uzzen-sheerah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'and his daughter, Sheerah'; the Hebrew conjunction can be carried
      over more literally, but English genealogy style often smooths it to 'His daughter
      was Sheerah.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'and the upper'; 'Beth-horon' is understood from the previous phrase.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִתּוֹ
  chosen: His daughter was
  alternatives:
  - and his daughter
  - now his daughter
  lexicon: HALOT
  rationale: The conjunction plus noun with 3ms suffix literally reads 'and his daughter.'
    In English genealogy style, 'His daughter was' makes the appositional naming construction
    with שֶׁאֱרָה natural while preserving the familial relation.
- source_word: שֶׁאֱרָה
  chosen: Sheerah
  alternatives:
  - Shearah
  lexicon: HALOT
  rationale: Personal name is transliterated rather than translated, following the
    project's policy for names. 'Sheerah' is a standard English transliteration.
- source_word: וַתִּבֶן
  chosen: she built
  alternatives:
  - she founded
  - she rebuilt
  lexicon: HALOT
  rationale: From בנה, the normal sense is 'build.' In context of towns, English may
    imply establishment or fortification, but 'built' stays closest to the Hebrew
    without over-interpreting.
- source_word: בֵּית חוֹרוֹן הַתַּחְתּוֹן
  chosen: Lower Beth-horon
  alternatives:
  - Beth-horon the lower
  - Lower Beth Horon
  lexicon: HALOT
  rationale: The place name בית חורון is conventionally transliterated 'Beth-horon.'
    The adjective 'the lower' is rendered idiomatically before the name in English
    as 'Lower Beth-horon.'
- source_word: הָעֶלְיוֹן
  chosen: Upper Beth-horon
  alternatives:
  - the upper one
  - Upper Beth Horon
  lexicon: HALOT
  rationale: Although the noun 'Beth-horon' is not repeated in Hebrew, it is clearly
    implied from the parallel structure. Supplying it in English avoids awkwardness
    and accurately reflects the referent.
- source_word: אֻזֵּן שֶׁאֱרָה
  chosen: Uzzen-sheerah
  alternatives:
  - Uzzen Sheerah
  lexicon: HALOT
  rationale: This is a place name, traditionally represented as a compound proper
    noun. The hyphenated form helps English readers recognize it as one toponym rather
    than two separate items.
