id: 1CH.7.5
reference: 1 Chronicles 7:5
source:
  edition: WLC
  text: וַ/אֲחֵי/הֶ֗ם לְ/כֹל֙ מִשְׁפְּח֣וֹת יִשָׂשכָ֔ר גִּבּוֹרֵ֖י חֲיָלִ֑ים שְׁמוֹנִ֤ים
    וְ/שִׁבְעָה֙ אֶ֔לֶף הִתְיַחְשָׂ֖/ם לַ/כֹּֽל׃פ
translation:
  text: And their brothers, throughout all the families of Issachar, were mighty men
    of valor, eighty-seven thousand in all, enrolled by genealogy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their kinsmen' or 'their relatives'; Hebrew 'brothers' can extend beyond
      immediate siblings in clan and genealogical contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'were registered by genealogy.' The Hebrew verb refers to being entered
      in genealogical records.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲחֵיהֶם
  chosen: And their brothers
  alternatives:
  - And their kinsmen
  - And their relatives
  lexicon: HALOT
  rationale: אָח commonly means 'brother,' but in genealogical contexts can extend
    to clan relatives. 'Their brothers' preserves the Hebrew idiom while remaining
    natural in English.
- source_word: לְכֹל מִשְׁפְּחוֹת יִשָׂשכָר
  chosen: throughout all the families of Issachar
  alternatives:
  - according to all the families of Issachar
  - for all the families of Issachar
  lexicon: HALOT
  rationale: The preposition ל with כֹל here marks relation/scope. 'Throughout all
    the families of Issachar' conveys that these brothers are considered across the
    clan divisions of Issachar.
- source_word: גִּבּוֹרֵי חֲיָלִים
  chosen: mighty men of valor
  alternatives:
  - mighty warriors
  - valiant men
  - mighty men of strength
  lexicon: HALOT
  rationale: This stock expression often denotes proven fighting men. 'Mighty men
    of valor' preserves the traditional force and the dual sense of strength and martial
    capability better than the flatter 'warriors'.
- source_word: שְׁמוֹנִים וְשִׁבְעָה אֶלֶף
  chosen: eighty-seven thousand
  alternatives:
  - 87,000
  lexicon: HALOT
  rationale: Straightforward cardinal number; spelled out in running biblical prose.
- source_word: הִתְיַחְשָׂם
  chosen: enrolled by genealogy
  alternatives:
  - were registered by genealogy
  - were reckoned in the genealogies
  - were enrolled in the genealogical records
  lexicon: HALOT
  rationale: The hitpael of יחשׂ refers to being entered or reckoned in genealogical
    registration. 'Enrolled by genealogy' is concise and reflects the administrative/genealogical
    sense.
- source_word: לַכֹּל
  chosen: in all
  alternatives:
  - altogether
  - as a whole
  lexicon: HALOT
  rationale: Here the phrase sums the total number. 'In all' is idiomatic and clear.
