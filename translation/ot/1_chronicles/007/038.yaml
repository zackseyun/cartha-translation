id: 1CH.7.38
reference: 1 Chronicles 7:38
source:
  edition: WLC
  text: וּ/בְנֵ֖י יֶ֑תֶר יְפֻנֶּ֥ה וּ/פִסְפָּ֖ה וַ/אְרָֽא׃
translation:
  text: 'And the sons of Jether: Jephunneh, Pispa, and Ara.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Pispa may also be rendered 'Pispah,' reflecting a more letter-for-letter
      transliteration of the final Hebrew consonant.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons,' commonly used in genealogical
    formulas. 'Sons of' preserves the formal genealogical idiom better than the broader
    'children of.' The prefixed conjunction is rendered simply as 'And,' matching
    the list structure in context.
- source_word: יֶתֶר
  chosen: Jether
  alternatives:
  - Jeter
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English convention.
    'Jether' is the established and phonetically straightforward rendering of the
    Hebrew name.
- source_word: יְפֻנֶּה
  chosen: Jephunneh
  lexicon: HALOT
  rationale: Proper name transliterated rather than translated, in keeping with the
    project's policy for personal names. 'Jephunneh' is the conventional English form.
- source_word: וּפִסְפָּה
  chosen: Pispa
  alternatives:
  - Pispah
  lexicon: HALOT
  rationale: Proper name with prefixed conjunction. The final ה in this name is commonly
    silent in transliteration; 'Pispa' gives a clean standard English form, while
    'Pispah' is a possible more letter-for-letter alternative.
- source_word: וַאְרָא
  chosen: and Ara
  alternatives:
  - and Are
  lexicon: HALOT
  rationale: This is best taken as a proper name with prefixed conjunction in a genealogical
    list. 'Ara' is the standard transliteration. The conjunction is rendered with
    the final list item in normal English style.
