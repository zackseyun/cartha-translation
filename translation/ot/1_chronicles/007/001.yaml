id: 1CH.7.1
reference: 1 Chronicles 7:1
source:
  edition: WLC
  text: וְ/לִ/בְנֵ֣י יִשָׂשכָ֗ר תּוֹלָ֧ע וּ/פוּאָ֛ה ישיב וְ/שִׁמְר֖וֹן אַרְבָּעָֽה׃ס
translation:
  text: 'The sons of Issachar: Tola, Puah, Jashub, and Shimron—four.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Puah; some English traditions have 'Puvah' based on a parallel form
      in other genealogical lists.
    reason: alternative_reading
  - marker: b
    text: Hebrew Jashub; Genesis 46:13 has the parallel name form 'Ishvi.'
    reason: cross_reference
lexical_decisions:
- source_word: וְ/לִ/בְנֵי
  chosen: The sons of
  alternatives:
  - And for the sons of
  - Now the sons of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with 'sons of' introduces the
    next tribal genealogy. In English, 'The sons of' is the most natural rendering
    for this list heading; the conjunction is not semantically weighty enough to require
    explicit representation in the main text.
- source_word: יִשָׂשכָר
  chosen: Issachar
  lexicon: HALOT
  rationale: Proper tribal/personal name; transliterated according to standard English
    convention, following the translation philosophy to transliterate names.
- source_word: תּוֹלָע
  chosen: Tola
  lexicon: HALOT
  rationale: Proper name in a genealogical list; transliterated rather than translated.
- source_word: וּ/פוּאָה
  chosen: Puah
  alternatives:
  - Puvah
  - Puwwah
  lexicon: HALOT
  rationale: Proper name. The Chronicles form here is vocalized as Puah. Alternative
    English spellings reflect related textual traditions and parallels, but the MT
    form is best represented by 'Puah' in the main text.
- source_word: ישיב
  chosen: Jashub
  alternatives:
  - Ishvi
  lexicon: HALOT
  rationale: The consonantal form here corresponds to the name commonly rendered 'Jashub'
    in this verse. 'Ishvi' reflects the parallel in Genesis 46:13, but Chronicles
    presents a different form, so the translation follows the present Hebrew text.
- source_word: וְ/שִׁמְרוֹן
  chosen: and Shimron
  lexicon: HALOT
  rationale: Proper name with conjunction; rendered straightforwardly as the final
    named son in the list.
- source_word: אַרְבָּעָה
  chosen: four
  lexicon: HALOT
  rationale: Cardinal number summarizing the total number of sons listed. An em dash
    before 'four' reflects the appositional summary style common in genealogical notices.
