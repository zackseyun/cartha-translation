id: 1CH.7.21
reference: 1 Chronicles 7:21
source:
  edition: WLC
  text: וְ/זָבָ֥ד בְּנ֛/וֹ וְ/שׁוּתֶ֥לַח בְּנ֖/וֹ וְ/עֵ֣זֶר וְ/אֶלְעָ֑ד וַ/הֲרָג֗וּ/ם
    אַנְשֵׁי גַת֙ הַ/נּוֹלָדִ֣ים בָּ/אָ֔רֶץ כִּ֣י יָרְד֔וּ לָ/קַ֖חַת אֶת מִקְנֵי/הֶֽם־־׃
translation:
  text: Zabad his son, and Shuthelah his son, and Ezer and Elead—the men of Gath,
    who were born in the land, killed them, because they had gone down to take their
    livestock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the native-born men of Gath.' The Hebrew literally says 'the men of
      Gath, the ones born in the land.'
    reason: lexical_alternative
  - marker: b
    text: The subject of 'had gone down' is contextually Ezer and Elead, the nearest
      plural antecedents.
    reason: cross_reference
lexical_decisions:
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - son of him
  lexicon: HALOT
  rationale: Construct noun with 3ms suffix; rendered naturally in English genealogy
    style as 'his son.' Repeated twice to preserve the lineage notation in the Hebrew.
- source_word: וְעֵזֶר וְאֶלְעָד
  chosen: and Ezer and Elead
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. The conjunctions
    are retained to mirror the list structure.
- source_word: וַהֲרָגוּם
  chosen: killed them
  alternatives:
  - struck them down
  lexicon: HALOT
  rationale: Qal wayyiqtol of הרג with 3mp object suffix. 'Killed them' is the plain,
    direct sense and best fits readable modern English.
- source_word: אַנְשֵׁי גַת
  chosen: the men of Gath
  alternatives:
  - the men from Gath
  - the people of Gath
  lexicon: HALOT
  rationale: אַנְשֵׁי commonly means 'men of' in such expressions. 'Men of Gath' preserves
    the idiom and likely refers to male inhabitants/warriors rather than the population
    generically.
- source_word: הַנּוֹלָדִים בָּאָרֶץ
  chosen: who were born in the land
  alternatives:
  - who were native to the land
  - who had been born in the land
  lexicon: HALOT
  rationale: Passive participle of ילד with article, modifying 'the men of Gath.'
    'Born in the land' is a close rendering; contextually it likely means native-born
    inhabitants, but the more literal wording preserves the Hebrew expression.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the killing. 'Because' is clearer in modern
    English than the more formal 'for.'
- source_word: יָרְדוּ
  chosen: had gone down
  alternatives:
  - went down
  lexicon: HALOT
  rationale: The verb 'go down' is retained rather than flattened to 'came' or 'descended.'
    Pluperfect sense in English helps show the prior action relative to the killing.
- source_word: לָקַחַת
  chosen: to take
  alternatives:
  - to seize
  lexicon: HALOT
  rationale: Infinitive of לקח. 'Take' is the broad default sense; 'seize' is possible
    in a raiding context but is more interpretive than the Hebrew requires.
- source_word: מִקְנֵיהֶם
  chosen: their livestock
  alternatives:
  - their cattle
  - their possessions
  lexicon: HALOT
  rationale: מִקְנֶה commonly denotes livestock/herds. 'Livestock' is the clearest
    modern equivalent and avoids the narrower 'cattle' if multiple kinds of animals
    are intended.
