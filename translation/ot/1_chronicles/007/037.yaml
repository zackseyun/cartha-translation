id: 1CH.7.37
reference: 1 Chronicles 7:37
source:
  edition: WLC
  text: בֶּ֣צֶר וָ/ה֗וֹד וְ/שַׁמָּ֧א וְ/שִׁלְשָׁ֛ה וְ/יִתְרָ֖ן וּ/בְאֵרָֽא׃
translation:
  text: Bezer, Hod, Shamma, Shilshah, Ithran, and Beera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew spelling here supports the name form 'Shamma'; some English versions
      use 'Shammah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Jethran' for Ithran, reflecting a more traditional English anglicization
      of the Hebrew name.
    reason: lexical_alternative
  - marker: c
    text: Or 'Be'era,' a more explicit transliteration of the Hebrew aleph in the
      name.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּצֶר
  chosen: Bezer
  alternatives:
  - Bezer/Bezer
  lexicon: HALOT
  rationale: Proper name in a genealogy list; transliterated rather than translated
    in keeping with the project's policy for personal names.
- source_word: הוֹד
  chosen: Hod
  lexicon: HALOT
  rationale: Proper name; although the common noun can mean 'majesty' or 'splendor,'
    here morphology and context indicate a personal name in a list of descendants,
    so transliteration is appropriate.
- source_word: שַׁמָּא
  chosen: Shamma
  alternatives:
  - Shammah
  lexicon: HALOT
  rationale: Proper name; transliterated directly from the Hebrew form. 'Shammah'
    is a possible anglicized alternative reflecting other biblical name forms, but
    this verse's spelling supports 'Shamma.'
- source_word: שִׁלְשָׁה
  chosen: Shilshah
  alternatives:
  - Shilsha
  lexicon: HALOT
  rationale: Proper name; transliterated from the Hebrew consonantal/vocalized form.
    English representation varies slightly, but 'Shilshah' best preserves the final
    ה sound/value in standard transliteration practice.
- source_word: יִתְרָן
  chosen: Ithran
  alternatives:
  - Jethran
  lexicon: HALOT
  rationale: Proper name; transliterated with initial yod commonly rendered as 'I'
    in this name. 'Jethran' reflects a more traditional anglicization but is less
    directly tied to the Hebrew form.
- source_word: בְאֵרָא
  chosen: Beera
  alternatives:
  - Be'era
  lexicon: HALOT
  rationale: Proper name; transliterated in a readable modern English form. The aleph
    may be marked more explicitly as 'Be'era,' but 'Beera' is smoother while still
    reflecting the Hebrew name.
