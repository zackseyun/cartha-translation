id: 1CH.7.32
reference: 1 Chronicles 7:32
source:
  edition: WLC
  text: וְ/חֶ֨בֶר֙ הוֹלִ֣יד אֶת יַפְלֵ֔ט וְ/אֶת שׁוֹמֵ֖ר וְ/אֶת חוֹתָ֑ם וְ/אֵ֖ת שׁוּעָ֥א
    אֲחוֹתָֽ/ם־־־׃
translation:
  text: Heber fathered Japhlet, Shomer, Hotham, and Shua their sister.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Shemer' for Shomer.
    reason: lexical_alternative
  - marker: b
    text: Or 'Shuah' for Shua.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶבֶר
  chosen: Heber
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention
    rather than translated.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: In genealogical contexts ילד in the Hiphil commonly denotes begetting
    or fathering descendants. 'Fathered' is concise, natural modern English, and preserves
    the genealogical force better than the archaic 'begot'.
- source_word: אֶת
  chosen: '[not translated]'
  lexicon: Hebrew grammar
  rationale: Direct-object marker has no direct English equivalent and is therefore
    omitted in translation.
- source_word: יַפְלֵט
  chosen: Japhlet
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
- source_word: שׁוֹמֵר
  chosen: Shomer
  alternatives:
  - Shemer
  lexicon: HALOT
  rationale: Proper personal name. 'Shomer' follows a straightforward transliteration
    of the consonants and vowels in the Masoretic Text; 'Shemer' is a possible conventional
    variant worth preserving.
- source_word: חוֹתָם
  chosen: Hotham
  lexicon: HALOT
  rationale: Proper personal name; transliterated.
- source_word: שׁוּעָא
  chosen: Shua
  alternatives:
  - Shuah
  lexicon: HALOT
  rationale: Proper personal name; transliterated from the Hebrew form here. 'Shuah'
    is a common English variant and is preserved as an alternative.
- source_word: אֲחוֹתָם
  chosen: their sister
  alternatives:
  - his sister
  lexicon: HALOT
  rationale: The noun means 'sister' with a 3mp suffix, yielding 'their sister.' This
    most naturally refers to the previously named brothers collectively. Some translations
    smooth to 'their sister was Shua' or construe differently, but the Hebrew apposition
    is adequately represented by 'and Shua their sister.'
