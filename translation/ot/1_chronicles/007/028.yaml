id: 1CH.7.28
reference: 1 Chronicles 7:28
source:
  edition: WLC
  text: וַ/אֲחֻזָּתָ/ם֙ וּ/מֹ֣שְׁבוֹתָ֔/ם בֵּֽית אֵ֖ל וּ/בְנֹתֶ֑י/הָ וְ/לַ/מִּזְרָ֣ח
    נַעֲרָ֔ן וְ/לַֽ/מַּעֲרָ֗ב גֶּ֤זֶר וּ/בְנֹתֶ֨י/הָ֙ וּ/שְׁכֶ֣ם וּ/בְנֹתֶ֔י/הָ עַד
    עַיָּ֖ה וּ/בְנֹתֶֽי/הָ־־׃
translation:
  text: Their holdings and settlements were Bethel and its daughter towns, and to
    the east Naaran, and to the west Gezer and its daughter towns, and Shechem and
    its daughter towns, as far as Ayyah and its daughter towns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Naaran is rendered by some as 'Naarah' based on a related place-name tradition
      elsewhere.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'daughter towns' is an idiom for smaller dependent towns or villages
      belonging to a larger city.
    reason: cultural_note
  - marker: c
    text: The Hebrew text reads 'Ayyah'; some ancient witnesses and translations instead
      reflect 'Gaza.'
    reason: textual_variant
lexical_decisions:
- source_word: אֲחֻזָּתָם
  chosen: their holdings
  alternatives:
  - their possessions
  - their property
  - their inheritance
  lexicon: HALOT
  rationale: אֲחֻזָּה commonly denotes landed property or possession, especially territorial
    holding. 'Holdings' fits the geographic list that follows better than the broader
    'possessions' and avoids the more theologically loaded 'inheritance' here.
- source_word: מֹשְׁבוֹתָם
  chosen: settlements
  alternatives:
  - dwelling places
  - habitations
  - residences
  lexicon: HALOT
  rationale: In a territorial context, the term refers to places of habitation. 'Settlements'
    is natural modern English for inhabited sites within a tribal allotment.
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: בְנֹתֶיהָ
  chosen: its daughter towns
  alternatives:
  - its villages
  - its dependent towns
  lexicon: HALOT
  rationale: Literally 'its daughters,' an idiom for satellite towns or dependent
    settlements attached to a principal city. 'Daughter towns' preserves the metaphor
    while remaining understandable.
- source_word: לַמִּזְרָח
  chosen: to the east
  alternatives:
  - eastward
  - on the east
  lexicon: HALOT
  rationale: Directional marker introducing the eastern extent or side of the territory.
    'To the east' is idiomatic in English.
- source_word: נַעֲרָן
  chosen: Naaran
  alternatives:
  - Naarah
  lexicon: HALOT
  rationale: The consonantal form here supports the place name Naaran. An alternate
    vocalization/tradition appears elsewhere; that is worth preserving in a footnote.
- source_word: לַמַּעֲרָב
  chosen: to the west
  alternatives:
  - westward
  - on the west
  lexicon: HALOT
  rationale: Directional counterpart to 'to the east'; 'to the west' is clear and
    idiomatic.
- source_word: גֶּזֶר
  chosen: Gezer
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: שְׁכֶם
  chosen: Shechem
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: עַד
  chosen: as far as
  alternatives:
  - up to
  - unto
  lexicon: HALOT
  rationale: Marks the territorial limit or extent. 'As far as' reads naturally in
    a boundary-style description.
- source_word: עַיָּה
  chosen: Ayyah
  alternatives:
  - Gaza
  - Aija
  - Ayyah/Ayyâ
  lexicon: HALOT
  rationale: The Masoretic Text reads עַיָּה, best represented by transliteration
    as 'Ayyah.' Because some ancient versions and translations reflect a different
    place name, that alternative should be preserved in a footnote rather than adopted
    into the main text.
