id: 1CH.7.25
reference: 1 Chronicles 7:25
source:
  edition: WLC
  text: וְ/רֶ֣פַח בְּנ֗/וֹ וְ/רֶ֧שֶׁף וְ/תֶ֛לַח בְּנ֖/וֹ וְ/תַ֥חַן בְּנֽ/וֹ׃
translation:
  text: Rephah his son, Resheph, Telah his son, Tahan his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew genealogies often omit an explicit verb; the sequence is a list
      of descendants: ''Rephah his son, Resheph, Telah his son, Tahan his son.'''
    reason: cultural_note
lexical_decisions:
- source_word: רֶפַח
  chosen: Rephah
  alternatives:
  - Rephach
  - Rephaḥ
  lexicon: HALOT
  rationale: Proper name; transliterated rather than translated, following the project
    policy to transliterate personal names. English form 'Rephah' reflects a standard
    readable transliteration of the Hebrew consonants.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - son of him
  lexicon: HALOT
  rationale: Construct noun with 3ms suffix. Rendered idiomatically as 'his son' in
    English. The repeated genealogical formula is preserved rather than smoothed away.
- source_word: רֶשֶׁף
  chosen: Resheph
  alternatives:
  - Rhesheph
  lexicon: HALOT
  rationale: Here the form functions as a personal name in a genealogy, so it is transliterated.
    Although the noun elsewhere can mean 'flame,' 'plague,' or refer to the deity
    Resheph, the genealogical context indicates a proper name.
- source_word: תֶלַח
  chosen: Telah
  alternatives:
  - Telaḥ
  lexicon: HALOT
  rationale: Proper name in a genealogy; transliterated by standard English convention.
- source_word: תַחַן
  chosen: Tahan
  alternatives:
  - Taḥan
  lexicon: HALOT
  rationale: Proper name in a genealogy; transliterated by standard English convention.
- source_word: וְ
  chosen: ', / and'
  lexicon: HALOT
  rationale: The prefixed conjunction links the names in a genealogical sequence.
    In English, a mixture of commas and the final implied coordination yields natural
    readability while preserving the list structure.
