id: 1CH.7.19
reference: 1 Chronicles 7:19
source:
  edition: WLC
  text: וַ/יִּהְי֖וּ בְּנֵ֣י שְׁמִידָ֑ע אַחְיָ֣ן וָ/שֶׁ֔כֶם וְ/לִקְחִ֖י וַ/אֲנִיעָֽם׃פ
translation:
  text: The sons of Shemida were Ahian, Shechem, Likhi, and Aniam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of Shemida.' In genealogies, 'sons' can sometimes function
      more broadly for male descendants, though the immediate context here supports
      'sons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - became
  - came to be
  lexicon: HALOT
  rationale: 'In a genealogical list, the wayyiqtol of היה functions idiomatically
    to introduce the named descendants: ''were.'' This is natural English and preserves
    the list structure without adding nuance not present in the Hebrew.'
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: In genealogical contexts, בנים often can denote descendants broadly,
    but here the immediate listing of male names favors the more formal 'sons of.'
    This keeps the source's masculine genealogical wording.
- source_word: שְׁמִידָע
  chosen: Shemida
  alternatives:
  - Shemidah
  rationale: Personal names are transliterated by standard English convention. 'Shemida'
    reflects a straightforward transliteration of the Hebrew name.
- source_word: אַחְיָן
  chosen: Ahian
  alternatives:
  - Ahyan
  rationale: Proper name transliterated directly from Hebrew consonants and vowels
    into standard English form.
- source_word: שֶׁכֶם
  chosen: Shechem
  rationale: This is a proper name and is best represented by the familiar transliteration
    'Shechem.' Though also the name of a place elsewhere, here the syntax clearly
    marks it as a personal name in a genealogy.
- source_word: לִקְחִי
  chosen: Likhi
  alternatives:
  - Liqhi
  rationale: Proper name transliterated into readable modern English. 'Likhi' gives
    a conventional English representation of the Hebrew name.
- source_word: אֲנִיעָם
  chosen: Aniam
  alternatives:
  - Aniam
  rationale: Proper name transliterated directly. No translation is attempted because
    names are to be transliterated rather than translated.
