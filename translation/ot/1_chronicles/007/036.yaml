id: 1CH.7.36
reference: 1 Chronicles 7:36
source:
  edition: WLC
  text: בְּנֵ֖י צוֹפָ֑ח ס֧וּחַ וְ/חַרְנֶ֛פֶר וְ/שׁוּעָ֖ל וּ/בֵרִ֥י וְ/יִמְרָֽה׃
translation:
  text: 'The sons of Zophah: Suah, Harnepher, Shual, Beri, and Imrah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “descendants of Zophah.” In genealogical lists, Hebrew בְּנֵי can sometimes
      denote broader lineage, though “sons of” is the more direct rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons' and in genealogical contexts
    commonly introduces immediate offspring or lineage members. Here 'sons of' is
    the most direct and conventional rendering, with 'descendants of' possible but
    less precise unless the context clearly broadens the relationship.
- source_word: צוֹפָח
  chosen: Zophah
  alternatives:
  - Zophai
  lexicon: HALOT
  rationale: This is a personal name and, per translation philosophy, names are transliterated
    rather than translated. 'Zophah' follows the consonantal form of the Masoretic
    Text in this verse.
- source_word: סוּחַ
  chosen: Suah
  alternatives:
  - Suh
  lexicon: HALOT
  rationale: Personal name transliterated into standard English form. 'Suah' gives
    a smoother English representation of the Hebrew name while staying close to the
    source.
- source_word: חַרְנֶפֶר
  chosen: Harnepher
  lexicon: HALOT
  rationale: Personal name transliterated directly from the Hebrew. No translation
    is appropriate for a proper name in this genealogical list.
- source_word: שׁוּעָל
  chosen: Shual
  alternatives:
  - Shu'al
  lexicon: HALOT
  rationale: Although the consonants can correspond to a common noun elsewhere, here
    the morphology and context mark it as a personal name in a genealogy, so it is
    transliterated. 'Shual' is a standard English form.
- source_word: בֵרִי
  chosen: Beri
  alternatives:
  - Beeri
  lexicon: HALOT
  rationale: Personal name transliterated from Hebrew. 'Beri' reflects the MT spelling
    here; 'Beeri' would suggest a fuller vocalization associated with other name forms
    and is less exact for this verse.
- source_word: יִמְרָה
  chosen: Imrah
  alternatives:
  - Jimrah
  lexicon: HALOT
  rationale: Personal name transliterated. 'Imrah' is a straightforward English representation
    of the Hebrew form; 'Jimrah' reflects older conventions for initial yod but is
    less natural in modern English.
