id: 1CH.7.29
reference: 1 Chronicles 7:29
source:
  edition: WLC
  text: וְ/עַל יְדֵ֣י בְנֵי מְנַשֶּׁ֗ה בֵּית שְׁאָ֤ן וּ/בְנֹתֶ֨י/הָ֙ תַּעְנַ֣ךְ וּ/בְנֹתֶ֔י/הָ
    מְגִדּ֥וֹ וּ/בְנוֹתֶ֖י/הָ דּ֣וֹר וּ/בְנוֹתֶ֑י/הָ בְּ/אֵ֨לֶּה֙ יָשְׁב֔וּ בְּנֵ֥י
    יוֹסֵ֖ף בֶּן יִשְׂרָאֵֽל־־־־׃פ
translation:
  text: And along the borders of the sons of Manasseh were Beth-shean and its daughter
    towns, Taanach and its daughter towns, Megiddo and its daughter towns, Dor and
    its daughter towns. In these lived the sons of Joseph son of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'villages' for 'daughter towns'; the Hebrew literally says 'daughters,'
      a common expression for dependent settlements around a main city.
    reason: lexical_alternative
  - marker: b
    text: Or 'at the side of the sons of Manasseh'; the Hebrew idiom can be rendered
      more literally, but here it refers to territorial adjacency or border.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל יְדֵי
  chosen: along the borders of
  alternatives:
  - at the side of
  - by the hand of
  - beside
  lexicon: HALOT
  rationale: The idiom עַל יְדֵי in territorial lists denotes location alongside or
    at the border, not literal 'hands.' 'Along the borders of' best fits the geographic
    context and reads naturally in English.
- source_word: בְנֵי מְנַשֶּׁה
  chosen: the sons of Manasseh
  alternatives:
  - the descendants of Manasseh
  - the people of Manasseh
  lexicon: HALOT
  rationale: Formal kinship language is retained because the genealogical-territorial
    context regularly uses 'sons of' for tribal descendants.
- source_word: בֵּית שְׁאָן
  chosen: Beth-shean
  alternatives:
  - Beth-shan
  lexicon: HALOT
  rationale: Standard English transliteration of the place name. The Masoretic pointing
    supports the longer form reflected in many modern translations.
- source_word: וּבְנֹתֶיהָ / וּבְנוֹתֶיהָ
  chosen: and its daughter towns
  alternatives:
  - and its villages
  - and its daughters
  - and its dependent settlements
  lexicon: HALOT
  rationale: In settlement formulas, 'daughters' refers to satellite settlements dependent
    on a principal city. 'Daughter towns' preserves the metaphor while making the
    sense clear.
- source_word: תַּעְנַךְ
  chosen: Taanach
  alternatives:
  - Ta'anach
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: מְגִדּוֹ
  chosen: Megiddo
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: דּוֹר
  chosen: Dor
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: בְּאֵלֶּה
  chosen: In these
  alternatives:
  - In these places
  - Among these
  lexicon: HALOT
  rationale: The phrase points back to the listed towns/settlements. 'In these' is
    concise and sufficiently clear in context.
- source_word: יָשְׁבוּ
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: The verb ישׁב in this context denotes habitation/settlement. 'Lived'
    is natural modern English; 'dwelt' is more formal, and 'settled' could imply initial
    occupation rather than ongoing residence.
- source_word: בְּנֵי יוֹסֵף
  chosen: the sons of Joseph
  alternatives:
  - the descendants of Joseph
  lexicon: HALOT
  rationale: Retains the genealogical idiom and links the verse to the Joseph tribes
    in context.
- source_word: בֶּן יִשְׂרָאֵל
  chosen: son of Israel
  alternatives:
  - the son of Israel
  lexicon: HALOT
  rationale: Appositional identification of Joseph is preserved straightforwardly.
    The article is not required in English proper-name apposition.
