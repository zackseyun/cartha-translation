id: 1CH.7.26
reference: 1 Chronicles 7:26
source:
  edition: WLC
  text: לַעְדָּ֥ן בְּנ֛/וֹ עַמִּיה֥וּד בְּנ֖/וֹ אֱלִישָׁמָ֥ע בְּנֽ/וֹ׃
translation:
  text: Ladan his son, Ammihud his son, Elishama his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'Laadan' for the first name, reflecting a different transliteration
      choice from the same Hebrew spelling.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַעְדָּן
  chosen: Ladan
  alternatives:
  - Laadan
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated per project
    policy. 'Ladan' follows a standard English transliteration from the Hebrew form
    here, while 'Laadan' is a plausible alternative reflecting the fuller vowel pattern.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - son of him
  - his descendant
  lexicon: HALOT
  rationale: The construct noun with 3ms suffix literally means 'his son.' In this
    genealogical context, 'his son' is the most natural and sufficiently formal English
    rendering. 'Descendant' is possible in some genealogies, but there is no contextual
    pressure here to broaden beyond the literal filial term.
- source_word: עַמִּיהוּד
  chosen: Ammihud
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: אֱלִישָׁמָע
  chosen: Elishama
  alternatives:
  - Elishamah
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated. 'Elishama'
    is the conventional English form for this Hebrew name.
