id: 1CH.7.17
reference: 1 Chronicles 7:17
source:
  edition: WLC
  text: וּ/בְנֵ֥י אוּלָ֖ם בְּדָ֑ן אֵ֚לֶּה בְּנֵ֣י גִלְעָ֔ד בֶּן מָכִ֖יר בֶּן מְנַשֶּֽׁה־־׃
translation:
  text: 'And the sons of Ulam: Bedan. These were the sons of Gilead son of Machir,
    son of Manasseh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'These [are/were] the sons of Gilead...' The clause may function
      as a genealogical summary linking Ulam's line back through Gilead, Machir, and
      Manasseh.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: The conjunction ו is carried forward as simple narrative linkage, best
    rendered 'And' in this genealogical context. בְנֵי is the construct plural 'sons
    of,' the standard genealogical formula.
- source_word: אוּלָם
  chosen: Ulam
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: בְּדָן
  chosen: Bedan
  rationale: Personal name; transliterated by standard convention.
- source_word: אֵלֶּה
  chosen: These were
  alternatives:
  - These are
  lexicon: HALOT
  rationale: Although the Hebrew demonstrative literally reads 'these,' English genealogical
    style commonly supplies the copula. Past tense 'were' fits the retrospective genealogical
    register better than present 'are' in English.
- source_word: בְּנֵי גִלְעָד
  chosen: the sons of Gilead
  alternatives:
  - the descendants of Gilead
  lexicon: HALOT
  rationale: The construct phrase is formally 'sons of Gilead.' While 'descendants'
    can capture broader lineage, 'sons' preserves the Hebrew genealogical idiom more
    transparently.
- source_word: בֶּן מָכִיר
  chosen: son of Machir
  lexicon: HALOT
  rationale: Standard genealogical linkage; 'son of' is retained formally.
- source_word: בֶּן מְנַשֶּׁה
  chosen: son of Manasseh
  lexicon: HALOT
  rationale: Standard genealogical linkage; 'son of' is retained formally. 'Manasseh'
    is the tribal ancestor's personal name, so transliteration is appropriate.
