id: 1CH.7.10
reference: 1 Chronicles 7:10
source:
  edition: WLC
  text: וּ/בְנֵ֥י יְדִיעֲאֵ֖ל בִּלְהָ֑ן וּ/בְנֵ֣י בִלְהָ֗ן יעיש וּ֠/בִנְיָמִן וְ/אֵה֤וּד
    וּֽ/כְנַעֲנָה֙ וְ/זֵיתָ֔ן וְ/תַרְשִׁ֖ישׁ וַ/אֲחִישָֽׁחַר׃
translation:
  text: 'And the sons of Jediael: Bilhan. And the sons of Bilhan: Jeush, Benjamin,
    Ehud, Chenaanah, Zethan, Tarshish, and Ahishahar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew form for the first son is unusual (יעיש). It is rendered 'Jeush'
      following the likely intended proper name in this genealogy; possible alternatives
      include 'Jaaish' or 'Jaish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the descendants of
  lexicon: HALOT
  rationale: בֵּן in genealogical contexts commonly means literal sons but can also
    extend to descendants. Here the immediate structure is a direct genealogy list,
    so 'sons of' is the most natural and formally accurate rendering.
- source_word: יְדִיעֲאֵל
  chosen: Jediael
  alternatives:
  - Jedihael
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: בִּלְהָן
  chosen: Bilhan
  rationale: Personal name; transliterated directly.
- source_word: וּבְנֵי בִלְהָן
  chosen: 'And the sons of Bilhan:'
  alternatives:
  - 'And Bilhan''s sons:'
  lexicon: HALOT
  rationale: Repeated genealogical formula is preserved for transparency and rhythm.
    The colon reflects the appositional list structure in English.
- source_word: יעיש
  chosen: Jeush
  alternatives:
  - Jaaish
  - Jaish
  rationale: The consonantal form here is unusual/defective relative to the more familiar
    name יְעוּשׁ. English tradition commonly identifies the name as 'Jeush,' which
    fits the likely intended proper name in this genealogical list.
- source_word: וּבִנְיָמִן
  chosen: Benjamin
  rationale: Proper name transliterated in its standard English form.
- source_word: וְאֵהוּד
  chosen: Ehud
  rationale: Proper name transliterated in its standard English form.
- source_word: וּכְנַעֲנָה
  chosen: Chenaanah
  alternatives:
  - Canaanah
  rationale: Proper name, not the ethnonym 'Canaan.' The doubled vowel is preserved
    to reflect the Hebrew name more closely; 'Canaanah' is a possible anglicized alternative.
- source_word: וְזֵיתָן
  chosen: Zethan
  alternatives:
  - Zeithan
  rationale: Proper name transliterated in the conventional English biblical form.
- source_word: וְתַרְשִׁישׁ
  chosen: Tarshish
  rationale: Here the form is a personal name in a genealogy, though elsewhere it
    can denote a place. Context clearly requires the personal-name rendering.
- source_word: וַאֲחִישָׁחַר
  chosen: Ahishahar
  alternatives:
  - Ahishachar
  rationale: Proper name transliterated directly from the Hebrew form. The medial
    consonant cluster is represented straightforwardly rather than harmonized to more
    familiar name patterns.
