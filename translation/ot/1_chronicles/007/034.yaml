id: 1CH.7.34
reference: 1 Chronicles 7:34
source:
  edition: WLC
  text: וּ/בְנֵ֖י שָׁ֑מֶר אֲחִ֥י ו/רוהגה יחבה וַ/אֲרָֽם׃
translation:
  text: 'And the sons of Shemer: Ahi, Rohgah, Jehubbah, and Aram.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew genealogical formulas often use 'sons of' for male descendants or
      clan members, not only immediate sons.
    reason: cultural_note
  - marker: b
    text: Some English versions spell the third name 'Jehubbah' and others 'Hubbah';
      the Hebrew form permits transliteration variation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: Construct plural of בן with conjunction. In genealogical context, 'sons
    of' is the standard and sufficiently literal rendering; it can denote descendants,
    but here it introduces an immediate list of named male offspring/line members.
- source_word: שָׁמֶר
  chosen: Shemer
  alternatives:
  - Shamer
  rationale: Proper name transliterated rather than translated, per translation philosophy.
    'Shemer' reflects a common English convention for this Hebrew name.
- source_word: אֲחִי
  chosen: Ahi
  alternatives:
  - Achi
  rationale: Proper name. Although the consonants could suggest a form related to
    'brother,' in this genealogical list it functions as a personal name and is best
    transliterated.
- source_word: ו/רוהגה
  chosen: Rohgah
  alternatives:
  - Rohga
  - Rohgahh
  rationale: Proper name with prefixed conjunction. The name is transliterated according
    to standard English handling of Hebrew proper names; the conjunction is rendered
    separately as 'and.'
- source_word: יחבה
  chosen: Jehubbah
  alternatives:
  - Hubbah
  - Yehubbah
  rationale: Proper name transliterated. English Bible tradition commonly reflects
    initial yod here with 'Je-'/'Ye-'; 'Jehubbah' is a recognizable conventional form
    while remaining close to the Hebrew.
- source_word: וַ/אֲרָם
  chosen: and Aram
  alternatives:
  - and Ram
  rationale: Proper name with conjunction. The Hebrew form is אֲרָם, normally transliterated
    'Aram.' Although some English traditions have 'Ram' in other contexts, this form
    here supports 'Aram' directly.
