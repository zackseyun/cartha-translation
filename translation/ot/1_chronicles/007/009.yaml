id: 1CH.7.9
reference: 1 Chronicles 7:9
source:
  edition: WLC
  text: וְ/הִתְיַחְשָׂ֣/ם לְ/תֹלְדוֹתָ֗/ם רָאשֵׁי֙ בֵּ֣ית אֲבוֹתָ֔/ם גִּבּוֹרֵ֖י חָ֑יִל
    עֶשְׂרִ֥ים אֶ֖לֶף וּ/מָאתָֽיִם׃ס
translation:
  text: 'They were enrolled by genealogy, according to their generations, as heads
    of their fathers’ houses, mighty men of valor: twenty thousand two hundred.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'registered by genealogy.' The Hebrew verb refers to being entered in
      a genealogical record.
    reason: lexical_alternative
  - marker: b
    text: '''Fathers’ houses'' is a clan-based household term, referring to ancestral
      family units rather than merely nuclear families.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהִתְיַחְשָׂם
  chosen: They were enrolled by genealogy
  alternatives:
  - They were registered by genealogy
  - Their genealogical record was taken
  lexicon: HALOT
  rationale: The hitpael of יחשׂ in Chronicles refers to being entered or reckoned
    in genealogical records. 'Enrolled by genealogy' preserves both the passive/reflexive
    sense and the administrative-genealogical context better than a bare 'numbered'.
- source_word: לְתֹלְדוֹתָם
  chosen: according to their generations
  alternatives:
  - by their generations
  - according to their family lines
  lexicon: HALOT
  rationale: תולדות commonly denotes generations or family descent. 'According to
    their generations' is a fairly literal rendering that fits the genealogical setting;
    'family lines' is possible but slightly more interpretive.
- source_word: רָאשֵׁי בֵּית אֲבוֹתָם
  chosen: as heads of their fathers’ houses
  alternatives:
  - heads of their ancestral houses
  - chiefs of their fathers’ households
  lexicon: HALOT
  rationale: This is a standard clan-based expression in Chronicles. 'Fathers’ houses'
    preserves the idiom and social structure more closely than smoothing to 'families,'
    while 'heads' accurately renders the leadership sense of רָאשֵׁי.
- source_word: גִּבּוֹרֵי חָיִל
  chosen: mighty men of valor
  alternatives:
  - mighty warriors
  - valiant men
  lexicon: HALOT
  rationale: The phrase often denotes men of strength, valor, or military capability.
    'Mighty men of valor' preserves the traditional force and breadth of the Hebrew
    without reducing it only to battlefield activity, though 'mighty warriors' is
    contextually plausible.
- source_word: עֶשְׂרִים אֶלֶף וּמָאתָיִם
  chosen: twenty thousand two hundred
  alternatives:
  - 20,200
  lexicon: HALOT
  rationale: The Hebrew cardinal number is straightforward. Spelling it out suits
    the literary style of the translation.
