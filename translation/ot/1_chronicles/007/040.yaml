id: 1CH.7.40
reference: 1 Chronicles 7:40
source:
  edition: WLC
  text: כָּל אֵ֣לֶּה בְנֵי אָ֠שֵׁר רָאשֵׁ֨י בֵית הָ/אָב֤וֹת בְּרוּרִים֙ גִּבּוֹרֵ֣י
    חֲיָלִ֔ים רָאשֵׁ֖י הַ/נְּשִׂיאִ֑ים וְ/הִתְיַחְשָׂ֤/ם בַּ/צָּבָא֙ בַּ/מִּלְחָמָ֔ה
    מִסְפָּרָ֣/ם אֲנָשִׁ֔ים עֶשְׂרִ֥ים וְ/שִׁשָּׁ֖ה אָֽלֶף־־־׃ס
translation:
  text: All these were sons of Asher, heads of their fathers’ houses, select men,
    mighty warriors, chief leaders; and they were enrolled for service in the army
    for war. Their number in men was twenty-six thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their genealogy was recorded' / 'they were registered by genealogy.'
      The Hebrew verb often refers to genealogical enrollment in Chronicles.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאשֵׁי בֵית הָאָבוֹת
  chosen: heads of their fathers’ houses
  alternatives:
  - heads of ancestral houses
  - chiefs of the fathers’ households
  lexicon: HALOT
  rationale: A standard genealogical/social expression in Chronicles referring to
    clan or household heads. 'Fathers’ houses' preserves the Hebrew idiom more transparently
    than smoothing to 'families,' while remaining understandable in English.
- source_word: בְּרוּרִים
  chosen: select men
  alternatives:
  - chosen men
  - distinguished men
  lexicon: HALOT
  rationale: The passive participial form conveys those who are selected or choice.
    'Select men' fits the context of military and genealogical commendation and reads
    naturally in modern English.
- source_word: גִּבּוֹרֵי חֲיָלִים
  chosen: mighty warriors
  alternatives:
  - mighty men of valor
  - valiant warriors
  lexicon: HALOT
  rationale: A common Hebrew military expression. 'Mighty warriors' preserves both
    strength and martial sense without archaic phrasing like 'men of valor.'
- source_word: רָאשֵׁי הַנְּשִׂיאִים
  chosen: chief leaders
  alternatives:
  - heads of the princes
  - chiefs of the leaders
  lexicon: HALOT
  rationale: The phrase is somewhat compressed and likely appositional, emphasizing
    high rank among leaders. 'Chief leaders' communicates prominence clearly in English
    without importing monarchical nuance from 'princes' that may mislead modern readers.
- source_word: וְהִתְיַחְשָׂם
  chosen: they were enrolled
  alternatives:
  - their genealogy was recorded
  - they were registered by genealogy
  lexicon: HALOT
  rationale: The hitpael of יחס in Chronicles often refers to genealogical registration.
    In this context, because it is immediately linked with military service, 'they
    were enrolled' captures the practical result of being entered in the register
    while remaining faithful to the administrative sense.
- source_word: בַּצָּבָא
  chosen: for service in the army
  alternatives:
  - in the host
  - for military service
  lexicon: HALOT
  rationale: צָבָא here denotes organized military service or army. 'For service in
    the army' makes explicit the functional sense in idiomatic English.
- source_word: בַּמִּלְחָמָה
  chosen: for war
  alternatives:
  - for battle
  lexicon: HALOT
  rationale: This phrase specifies the purpose of the military enrollment. 'For war'
    is concise and natural alongside 'service in the army.'
- source_word: מִסְפָּרָם אֲנָשִׁים
  chosen: Their number in men
  alternatives:
  - their number of men
  - the number of them, men
  lexicon: HALOT
  rationale: The Hebrew construction explicitly counts persons as men. 'Their number
    in men' is slightly formal but preserves the source structure better than a looser
    paraphrase; the following numeral clarifies the count.
- source_word: עֶשְׂרִים וְשִׁשָּׁה אָלֶף
  chosen: twenty-six thousand
  alternatives:
  - twenty and six thousand
  lexicon: HALOT
  rationale: Standard English rendering of the numeral.
