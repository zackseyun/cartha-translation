id: 1CH.7.4
reference: 1 Chronicles 7:4
source:
  edition: WLC
  text: וַ/עֲלֵי/הֶ֨ם לְ/תֹלְדוֹתָ֜/ם לְ/בֵ֣ית אֲבוֹתָ֗/ם גְּדוּדֵי֙ צְבָ֣א מִלְחָמָ֔ה
    שְׁלֹשִׁ֥ים וְ/שִׁשָּׁ֖ה אָ֑לֶף כִּֽי הִרְבּ֥וּ נָשִׁ֖ים וּ/בָנִֽים־׃
translation:
  text: And with them, by their generations, according to their fathers' houses, were
    36,000 troops for the army of war, for they had many wives and sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'women' instead of 'wives'; the Hebrew נָשִׁים can bear either sense,
      but 'wives' best fits the genealogical and household context here.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase 'troops for the army of war' is a compressed military
      expression, also renderable as 'military divisions for battle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲלֵיהֶם
  chosen: And with them
  alternatives:
  - And over them
  - And beside them
  lexicon: HALOT
  rationale: The preposition עַל with pronominal suffix here is idiomatic in a listing
    context, introducing what belonged to or was associated with them. 'And with them'
    fits the census-style syntax better than a spatial 'over them.'
- source_word: לְתֹלְדוֹתָם
  chosen: by their generations
  alternatives:
  - according to their generations
  - in their genealogies
  lexicon: HALOT
  rationale: תּוֹלְדוֹת can denote generations or genealogical divisions. Here it
    qualifies the military count in relation to clan descent, so 'by their generations'
    preserves the genealogical sense without over-paraphrasing.
- source_word: לְבֵית אֲבוֹתָם
  chosen: according to their fathers' houses
  alternatives:
  - by their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: This is a standard tribal/clan expression for paternal households or
    ancestral houses. 'Fathers' houses' is a conventional and sufficiently transparent
    rendering that preserves the social structure of the Hebrew.
- source_word: גְּדוּדֵי צְבָא מִלְחָמָה
  chosen: troops for the army of war
  alternatives:
  - bands of the army for battle
  - military divisions for war
  - troops fit for battle
  lexicon: HALOT
  rationale: גְּדוּדֵי denotes bands/troops/divisions; צְבָא is army/host; מִלְחָמָה
    is war/battle. The phrase is cumulative and military. 'Troops for the army of
    war' stays close to the Hebrew, though somewhat wooden; it preserves the stacked
    military terminology rather than collapsing it too much.
- source_word: שְׁלֹשִׁים וְשִׁשָּׁה אָלֶף
  chosen: 36,000
  alternatives:
  - thirty-six thousand
  lexicon: HALOT
  rationale: Straightforward numeral rendering; Arabic numerals improve readability
    in modern English while preserving exact quantity.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the large number. 'For' is concise and natural
    in English narrative explanation.
- source_word: הִרְבּוּ
  chosen: had many
  alternatives:
  - multiplied
  - increased greatly
  lexicon: HALOT
  rationale: The hiphil of רבה means to make many/increase. With 'wives and sons'
    as object, idiomatic English is 'had many' rather than the more awkwardly literal
    'multiplied wives and sons.'
- source_word: נָשִׁים
  chosen: wives
  alternatives:
  - women
  lexicon: HALOT
  rationale: Although נָשִׁים can mean 'women,' in this household/genealogical context
    paired with 'sons' it most naturally refers to wives, explaining population growth
    through large families.
- source_word: וּבָנִים
  chosen: and sons
  alternatives:
  - and children
  lexicon: HALOT
  rationale: בָּנִים literally means 'sons.' In a genealogical census context, retaining
    'sons' is more accurate than broadening to 'children.'
