id: 1CH.7.31
reference: 1 Chronicles 7:31
source:
  edition: WLC
  text: וּ/בְנֵ֣י בְרִיעָ֔ה חֶ֖בֶר וּ/מַלְכִּיאֵ֑ל ה֖וּא אֲבִ֥י ברזות׃
translation:
  text: 'The sons of Beriah: Heber and Malchiel; he was the father of Birzaith.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ancestor of' or 'founder of' Birzaith; in genealogical contexts, 'father
      of' may indicate a clan or settlement founder rather than an immediate biological
      father.
    reason: lexical_alternative
  - marker: b
    text: The name 'Birzaith' may also be rendered 'Birzoth' or 'Berazoth' in English
      transliteration.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - Now the sons of
  lexicon: HALOT
  rationale: Construct plural of 'son' with prefixed conjunction introduces a genealogical
    subunit. In English genealogy style, 'The sons of' is natural and sufficiently
    formal; the conjunction need not be separately represented at the head of a list.
- source_word: בְרִיעָה
  chosen: Beriah
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention,
    per translation philosophy for names.
- source_word: חֶבֶר
  chosen: Heber
  alternatives:
  - Hever
  lexicon: HALOT
  rationale: Proper personal name. 'Heber' is the conventional English transliteration
    in many biblical contexts; 'Hever' is a possible more phonetic alternative but
    less standard.
- source_word: וּמַלְכִּיאֵל
  chosen: and Malchiel
  lexicon: HALOT
  rationale: Proper personal name with conjunction. Transliteration retained; conjunction
    rendered straightforwardly as 'and' joining the two sons named.
- source_word: הוּא
  chosen: he
  alternatives:
  - which is
  - who
  lexicon: HALOT
  rationale: Independent pronoun resumes the immediately preceding masculine singular
    referent in genealogical style. English 'he' best preserves the Hebrew syntax
    without overinterpreting.
- source_word: אֲבִי
  chosen: the father of
  alternatives:
  - ancestor of
  - founder of
  lexicon: HALOT
  rationale: In genealogies, 'father of' can denote immediate parentage or ancestral/founding
    relationship. The more literal 'father of' is retained in the main text to preserve
    the Hebrew wording and genealogical idiom; broader senses are possible and worth
    noting.
- source_word: ברזות
  chosen: Birzaith
  alternatives:
  - Birzoth
  - Berazoth
  lexicon: HALOT
  rationale: Proper name, likely a place or clan designation in this context. Because
    the Hebrew form is uncommon and vocalization/transliteration is uncertain in English
    tradition, a conservative transliteration is used rather than an interpretive
    gloss.
