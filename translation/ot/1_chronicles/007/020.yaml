id: 1CH.7.20
reference: 1 Chronicles 7:20
source:
  edition: WLC
  text: וּ/בְנֵ֥י אֶפְרַ֖יִם שׁוּתָ֑לַח וּ/בֶ֤רֶד בְּנ/וֹ֙ וְ/תַ֣חַת בְּנ֔/וֹ וְ/אֶלְעָדָ֥ה
    בְנ֖/וֹ וְ/תַ֥חַת בְּנֽ/וֹ׃
translation:
  text: 'The sons of Ephraim: Shuthelah, and Bered his son, and Tahath his son, and
    Eleadah his son, and Tahath his son.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'son' in genealogies can sometimes denote a more remote descendant,
      but the text literally reads 'his son' at each step.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - Now the sons of
  lexicon: HALOT
  rationale: Construct plural of בן with prefixed conjunction. In genealogical style,
    English often omits a wooden initial 'and'; 'The sons of' gives natural English
    while preserving the heading function of the clause.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  lexicon: HALOT
  rationale: Proper personal/tribal name; transliterated according to standard English
    convention, per translation philosophy for names.
- source_word: שׁוּתָלַח
  chosen: Shuthelah
  alternatives:
  - Shuthalah
  lexicon: HALOT
  rationale: Proper name; standard English transliteration retained.
- source_word: וּבֶרֶד
  chosen: and Bered
  alternatives:
  - and Beredh
  lexicon: HALOT
  rationale: Proper name with prefixed conjunction. Rendered as the next item in the
    genealogy list.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - his descendant
  lexicon: HALOT
  rationale: בן with 3ms suffix most naturally means 'his son' in a genealogy. Although
    genealogies can telescope generations, the lexical value remains 'son'; broader
    lineage sense is interpretive and better left to footnote if needed.
- source_word: וְתַחַת
  chosen: and Tahath
  alternatives:
  - and Tahaath
  lexicon: HALOT
  rationale: Here תַחַת is a proper name, not the common noun/preposition 'under/beneath.'
    Context and morphology identify it as a personal name in the genealogy.
- source_word: וְאֶלְעָדָה
  chosen: and Eleadah
  alternatives:
  - and Eladah
  lexicon: HALOT
  rationale: Proper name in the genealogical sequence; transliterated rather than
    translated.
- source_word: וְתַחַת בְּנוֹ
  chosen: and Tahath his son
  alternatives:
  - and Tahath, his son
  lexicon: HALOT
  rationale: Repeated genealogical formula preserved for transparency and rhythm.
    The repetition is part of the source text's structure and should not be smoothed
    away.
