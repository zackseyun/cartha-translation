id: 1CH.7.27
reference: 1 Chronicles 7:27
source:
  edition: WLC
  text: נ֥וֹן בְּנ֖/וֹ יְהוֹשֻׁ֥עַ בְּנֽ/וֹ׃
translation:
  text: Nun his son, Joshua his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats the formula ''his son'' after each name, a standard genealogical
      style indicating successive descent: ''Nun his son, Joshua his son.'''
    reason: cultural_note
lexical_decisions:
- source_word: נ֥וֹן
  chosen: Nun
  alternatives:
  - Non
  lexicon: HALOT
  rationale: Proper name; transliterated by standard English convention rather than
    translated, in keeping with the philosophy to transliterate personal names.
- source_word: בְּנ֖/וֹ
  chosen: his son
  alternatives:
  - son of him
  lexicon: HALOT
  rationale: Construct noun בֵּן with 3ms suffix literally means 'his son.' In this
    genealogical list, idiomatic English keeps the repeated formula while preserving
    the filial relationship.
- source_word: יְהוֹשֻׁ֥עַ
  chosen: Joshua
  alternatives:
  - Jehoshua
  lexicon: HALOT
  rationale: Proper name; standard English transliteration is 'Joshua.' Although the
    Hebrew form is Yehoshua, English Bible usage strongly and accurately reflects
    this name as Joshua.
- source_word: בְּנֽ/וֹ
  chosen: his son
  alternatives:
  - son of him
  lexicon: HALOT
  rationale: Repeated genealogical formula preserved for transparency to the Hebrew
    structure. The repetition signals successive descent in the genealogy.
