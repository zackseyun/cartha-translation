id: 1CH.7.14
reference: 1 Chronicles 7:14
source:
  edition: WLC
  text: בְּנֵ֣י מְנַשֶּׁ֔ה אַשְׂרִיאֵ֖ל אֲשֶׁ֣ר יָלָ֑דָה פִּֽילַגְשׁ/וֹ֙ הָֽ/אֲרַמִּיָּ֔ה
    יָלְדָ֕ה אֶת מָכִ֖יר אֲבִ֥י גִלְעָֽד־׃
translation:
  text: 'The sons of Manasseh: Asriel, whom his Aramean concubine bore; she bore Machir
    the father of Gilead.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The descendants of Manasseh.' In genealogies, 'sons' can sometimes
      function more broadly for descendants.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Aramean woman'; traditionally 'the Syrian.'
    reason: lexical_alternative
  - marker: c
    text: '''Father of Gilead'' may also carry the sense ''ancestor'' or ''founder''
      in genealogical usage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי מְנַשֶּׁה
  chosen: The sons of Manasseh
  alternatives:
  - The descendants of Manasseh
  lexicon: HALOT
  rationale: בְּנֵי is the standard construct plural 'sons of.' In genealogical contexts
    it can extend to descendants, but here a straightforward 'sons of Manasseh' best
    matches the form and preserves the genealogy style.
- source_word: אַשְׂרִיאֵל
  chosen: Asriel
  rationale: Proper name transliterated according to standard English convention,
    following the project's policy to transliterate personal names.
- source_word: אֲשֶׁר יָלָדָה
  chosen: whom ... bore
  alternatives:
  - who was born to
  lexicon: HALOT
  rationale: The relative clause with ילד in the Qal perfect 3fs naturally means 'whom
    she bore.' This preserves the feminine subject implied by the following noun phrase
    ('his concubine, the Aramean woman').
- source_word: פִּילַגְשׁוֹ
  chosen: his concubine
  alternatives:
  - his secondary wife
  lexicon: HALOT
  rationale: פִּילֶגֶשׁ denotes a concubine. 'Concubine' is the most direct and conventional
    rendering; 'secondary wife' is interpretive and less precise.
- source_word: הָאֲרַמִּיָּה
  chosen: Aramean
  alternatives:
  - Syrian
  lexicon: HALOT
  rationale: 'The adjective/noun refers to an Aramean woman. ''Aramean'' is more historically
    precise than the traditional but potentially anachronistic ''Syrian.'' In English
    the ethnicity is naturally expressed attributively: ''his Aramean concubine.'''
- source_word: יָלְדָה אֶת מָכִיר
  chosen: she bore Machir
  alternatives:
  - and she bore Machir
  lexicon: HALOT
  rationale: The second finite verb resumes the feminine subject and introduces a
    second birth notice. English can omit an explicit conjunction here while preserving
    the Hebrew sequence. Repeating 'she bore' reflects the Hebrew emphasis.
- source_word: אֲבִי גִלְעָד
  chosen: the father of Gilead
  alternatives:
  - ancestor of Gilead
  - founder of Gilead
  lexicon: HALOT
  rationale: אָב in genealogies often means immediate father, though it can also denote
    ancestor or founder. Here 'father of Gilead' is the most literal and standard
    rendering; broader senses are possible but need not displace the main text.
