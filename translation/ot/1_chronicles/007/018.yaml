id: 1CH.7.18
reference: 1 Chronicles 7:18
source:
  edition: WLC
  text: וַ/אֲחֹת֖/וֹ הַ/מֹּלֶ֑כֶת יָלְדָה֙ אֶת אִישְׁה֔וֹד וְ/אֶת אֲבִיעֶ֖זֶר וְ/אֶת
    מַחְלָֽה־־־׃
translation:
  text: His sister Hammoleketh bore Ishhod, Abiezer, and Mahlah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Hammoleketh; possibly 'Molecheth.' The name is related in form to
      a word meaning 'queen' or 'ruling one,' but here it is best taken as a personal
      name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲחֹתוֹ
  chosen: His sister
  alternatives:
  - And his sister
  lexicon: HALOT
  rationale: The conjunction waw here links this notice to the preceding genealogy,
    but in English the connective can be left implicit for smoother style without
    loss of meaning. אֲחוֹת with 3ms suffix is straightforwardly 'his sister.'
- source_word: הַמֹּלֶכֶת
  chosen: Hammoleketh
  alternatives:
  - the queen
  - Molecheth
  lexicon: HALOT
  rationale: Morphology marks this as a proper noun, so it is transliterated rather
    than translated, in keeping with the project's policy to transliterate personal
    names. Although the form is etymologically related to 'queen' or 'ruling one,'
    the genealogical context favors a personal name. 'Hammoleketh' preserves the Hebrew
    article as part of the conventional name form; 'Molecheth' is a possible simplified
    transliteration.
- source_word: יָלְדָה
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: In genealogical contexts ילד is idiomatically rendered 'bore' for a female
    subject. This is concise, natural English and preserves the maternal sense explicit
    in the Hebrew feminine verb form.
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  lexicon: HALOT
  rationale: The particle marks the following proper names as direct objects and is
    not represented directly in English.
- source_word: אִישְׁהוֹד
  chosen: Ishhod
  alternatives:
  - Ish-hod
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention. Hyphenation is possible
    but unnecessary in running English text.
- source_word: אֲבִיעֶזֶר
  chosen: Abiezer
  alternatives:
  - Abi-ezer
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention. 'Abiezer' is the familiar
    English form and accurately reflects the Hebrew name.
- source_word: מַחְלָה
  chosen: Mahlah
  lexicon: HALOT
  rationale: Proper name transliterated directly. No contextual reason requires alteration.
