id: 1CH.7.3
reference: 1 Chronicles 7:3
source:
  edition: WLC
  text: וּ/בְנֵ֥י עֻזִּ֖י יִֽזְרַֽחְיָ֑ה וּ/בְנֵ֣י יִֽזְרַֽחְיָ֗ה מִֽיכָאֵ֡ל וְ֠/עֹבַדְיָה
    וְ/יוֹאֵ֧ל יִשִּׁיָּ֛ה חֲמִשָּׁ֖ה רָאשִׁ֥ים כֻּלָּֽ/ם׃
translation:
  text: 'And the sons of Uzzi: Izrahiah. And the sons of Izrahiah: Michael, Obadiah,
    Joel, and Isshiah—five, all of them heads.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'five chief men' or 'five family heads.' The Hebrew literally says 'five
      heads, all of them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons of,' the standard genealogical
    formula. The prefixed conjunction is rendered 'And' to preserve the narrative/list
    continuity of the genealogy.
- source_word: עֻזִּי
  chosen: Uzzi
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: יִזְרַחְיָה
  chosen: Izrahiah
  alternatives:
  - Izrahyah
  lexicon: HALOT
  rationale: Proper personal name; transliterated in a conventional English form.
    The same spelling is retained consistently for both occurrences in the verse.
- source_word: מִיכָאֵל
  chosen: Michael
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration.
- source_word: וְעֹבַדְיָה
  chosen: Obadiah
  alternatives:
  - Obadiah
  lexicon: HALOT
  rationale: Proper personal name with conjunction; rendered by standard English form
    'Obadiah' and included in the list with commas.
- source_word: וְיוֹאֵל
  chosen: Joel
  alternatives:
  - Joël
  lexicon: HALOT
  rationale: Proper personal name with conjunction; rendered by the conventional English
    spelling 'Joel.'
- source_word: יִשִּׁיָּה
  chosen: Isshiah
  alternatives:
  - Ishiah
  - Jishiah
  lexicon: HALOT
  rationale: Proper personal name; 'Isshiah' reflects the consonantal form closely
    while remaining readable in English. Alternative conventional spellings exist
    in English traditions.
- source_word: חֲמִשָּׁה
  chosen: five
  lexicon: HALOT
  rationale: Cardinal number, rendered straightforwardly as 'five.'
- source_word: רָאשִׁים
  chosen: heads
  alternatives:
  - chiefs
  - family heads
  - leaders
  lexicon: HALOT
  rationale: Literally 'heads.' In genealogical context this denotes leading clan
    or family heads. The main text keeps the concrete term 'heads' for formal transparency,
    while English remains understandable from context.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - all
  - every one of them
  lexicon: HALOT
  rationale: Emphatic summary term referring to the five named descendants. 'All of
    them' preserves the emphasis more clearly than bare 'all' in English.
