id: 1CH.7.13
reference: 1 Chronicles 7:13
source:
  edition: WLC
  text: בְּנֵ֣י נַפְתָּלִ֗י יַחֲצִיאֵ֧ל וְ/גוּנִ֛י וְ/יֵ֥צֶר וְ/שַׁלּ֖וּם בְּנֵ֥י
    בִלְהָֽה׃פ
translation:
  text: 'The sons of Naphtali: Jahziel, Guni, Jezer, and Shallum—the sons of Bilhah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Genesis 46:24 reads 'Shillem' for this name; Chronicles here has 'Shallum.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: The construct plural of בן most directly means 'sons of.' In a genealogical
    list it can sometimes function more broadly for descendants, but here it introduces
    four immediate named males, so 'sons of' is the most precise rendering.
- source_word: נַפְתָּלִי
  chosen: Naphtali
  rationale: Personal/tribal name transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: יַחֲצִיאֵל
  chosen: Jahziel
  alternatives:
  - Jahzeel
  - Jachzeel
  rationale: A standard English transliteration of the Hebrew personal name. Alternate
    spellings reflect different conventions and alignment with Genesis 46:24; 'Jahziel'
    is a readable conventional form for Chronicles.
- source_word: וְ
  chosen: and
  rationale: Simple conjunction linking the names in the list.
- source_word: גוּנִי
  chosen: Guni
  rationale: Personal name transliterated straightforwardly.
- source_word: יֵצֶר
  chosen: Jezer
  alternatives:
  - Jezer
  rationale: Personal name transliterated with initial J to match common English convention
    for this Hebrew name.
- source_word: שַׁלּוּם
  chosen: Shallum
  alternatives:
  - Shillem
  rationale: The MT of Chronicles reads Shallum. Although the parallel in Genesis
    46:24 has 'Shillem,' the translation should follow the source text here and preserve
    the parallel form in a footnote.
- source_word: בְּנֵי בִלְהָה
  chosen: the sons of Bilhah
  alternatives:
  - sons of Bilhah
  lexicon: HALOT
  rationale: This appositional/genealogical tag identifies these men as belonging
    to Bilhah's line. Including the article in English improves readability after
    the dash without changing sense.
