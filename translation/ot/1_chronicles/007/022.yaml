id: 1CH.7.22
reference: 1 Chronicles 7:22
source:
  edition: WLC
  text: וַ/יִּתְאַבֵּ֛ל אֶפְרַ֥יִם אֲבִי/הֶ֖ם יָמִ֣ים רַבִּ֑ים וַ/יָּבֹ֥אוּ אֶחָ֖י/ו
    לְ/נַחֲמֽ/וֹ׃
translation:
  text: And Ephraim their father mourned for many days, and his brothers came to comfort
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to console him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְאַבֵּל
  chosen: mourned
  alternatives:
  - grieved
  - lamented
  lexicon: HALOT
  rationale: The Hitpael of אבל denotes entering into mourning or grieving, often
    in response to death. 'Mourned' best fits the bereavement context established
    in the preceding verse and is natural English.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: אֲבִיהֶם
  chosen: their father
  alternatives:
  - the father of them
  lexicon: HALOT
  rationale: The construct with 3mp suffix identifies Ephraim as 'their father,' referring
    to the sons just mentioned. This is the plain syntactic sense and reads naturally
    in English.
- source_word: יָמִים רַבִּים
  chosen: for many days
  alternatives:
  - many days
  lexicon: HALOT
  rationale: This common Hebrew idiom expresses duration. English normally supplies
    'for' to convey the temporal sense smoothly.
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - went in
  - arrived
  lexicon: HALOT
  rationale: The verb בוא in narrative is most naturally rendered 'came' here, introducing
    the action of Ephraim's brothers approaching him.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his kinsmen
  lexicon: HALOT
  rationale: The noun ordinarily means 'his brothers.' While broader kinship is possible
    in some contexts, there is no compelling reason here to weaken it. The straightforward
    familial rendering should stand.
- source_word: לְנַחֲמוֹ
  chosen: to comfort him
  alternatives:
  - to console him
  lexicon: HALOT
  rationale: The infinitive of נחם in this stem commonly means to comfort or console
    a mourner. 'Comfort' is the most idiomatic and widely understood English choice.
