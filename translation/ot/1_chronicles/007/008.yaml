id: 1CH.7.8
reference: 1 Chronicles 7:8
source:
  edition: WLC
  text: וּ/בְנֵ֣י בֶ֗כֶר זְמִירָ֡ה וְ/יוֹעָ֡שׁ וֶ֠/אֱלִיעֶזֶר וְ/אֶלְיוֹעֵינַ֤י וְ/עָמְרִי֙
    וִ/ירֵמ֣וֹת וַ/אֲבִיָּ֔ה וַ/עֲנָת֖וֹת וְ/עָלָ֑מֶת כָּל אֵ֖לֶּה בְּנֵי בָֽכֶר־־׃
translation:
  text: 'And the sons of Becher: Zemirah, Joash, Eliezer, Elioenai, Omri, Jeremoth,
    Abijah, Anathoth, and Alemeth. All these were the sons of Becher.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jeremoth may also be spelled 'Jerimoth' in English transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons.' In genealogical contexts, 'sons
    of' is the standard and most precise rendering, preserving the formal lineage
    language better than the broader 'children of.' The prefixed conjunction is rendered
    'And' to reflect the ongoing list structure.
- source_word: בֶכֶר
  chosen: Becher
  lexicon: HALOT
  rationale: Proper personal name; per translation philosophy, personal names are
    transliterated by standard English convention.
- source_word: זְמִירָה
  chosen: Zemirah
  alternatives:
  - Zemira
  lexicon: HALOT
  rationale: Proper name transliterated in a conventional English form. 'Zemirah'
    preserves the final ה in a familiar transliteration style.
- source_word: יוֹעָשׁ
  chosen: Joash
  alternatives:
  - Jehoash
  lexicon: HALOT
  rationale: Standard English transliteration for this personal name in biblical usage
    is 'Joash.'
- source_word: אֱלִיעֶזֶר
  chosen: Eliezer
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention.
- source_word: אֶלְיוֹעֵינַי
  chosen: Elioenai
  alternatives:
  - Elyoenai
  lexicon: HALOT
  rationale: Proper name transliterated according to common English biblical convention
    as 'Elioenai.'
- source_word: עָמְרִי
  chosen: Omri
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention.
- source_word: יְרֵמוֹת
  chosen: Jeremoth
  alternatives:
  - Jerimoth
  lexicon: HALOT
  rationale: The consonantal form here is commonly represented in English as 'Jeremoth'
    in many translations of Chronicles. Because the name has variant English spellings
    in tradition, the alternative is worth preserving.
- source_word: אֲבִיָּה
  chosen: Abijah
  alternatives:
  - Abiah
  lexicon: HALOT
  rationale: Standard English biblical transliteration is 'Abijah.' 'Abiah' is a simpler
    transliteration but less common in English Bible tradition.
- source_word: עֲנָתוֹת
  chosen: Anathoth
  lexicon: HALOT
  rationale: Although also known as a place name elsewhere, here the morphology and
    context indicate a personal name in a genealogy; transliterated accordingly.
- source_word: עָלָמֶת
  chosen: Alemeth
  alternatives:
  - Alameth
  lexicon: HALOT
  rationale: Proper name transliterated in a conventional English form. 'Alemeth'
    is the more familiar biblical spelling.
- source_word: כָּל אֵלֶּה
  chosen: All these
  alternatives:
  - All of these
  lexicon: HALOT
  rationale: A straightforward rendering of the summarizing phrase, natural in English
    while remaining close to the Hebrew.
- source_word: בְּנֵי בָכֶר
  chosen: were the sons of Becher
  alternatives:
  - were Becher's sons
  lexicon: HALOT
  rationale: The repeated phrase closes the genealogy emphatically. Adding 'were'
    is required for natural English syntax; 'sons of Becher' preserves the formal
    genealogical wording better than the possessive paraphrase.
