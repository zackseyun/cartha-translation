id: 1CH.7.7
reference: 1 Chronicles 7:7
source:
  edition: WLC
  text: וּ/בְנֵ֣י בֶ֗לַע אֶצְבּ֡וֹן וְ/עֻזִּ֡י וְ֠/עֻזִּיאֵל וִ/ירִימ֨וֹת וְ/עִירִ֜י
    חֲמִשָּׁ֗ה רָאשֵׁי֙ בֵּ֣ית אָב֔וֹת גִּבּוֹרֵ֖י חֲיָלִ֑ים וְ/הִתְיַחְשָׂ֗/ם עֶשְׂרִ֤ים
    וּ/שְׁנַ֨יִם֙ אֶ֔לֶף וּ/שְׁלֹשִׁ֖ים וְ/אַרְבָּעָֽה׃ס
translation:
  text: 'And the sons of Bela: Ezbon, Uzzi, Uzziel, Jerimoth, and Iri—five heads of
    fathers’ houses, mighty men of valor; and their genealogical enrollment was twenty-two
    thousand and thirty-four.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their genealogy' or 'their registration by genealogy.' The Hebrew term
      refers to being entered in genealogical records.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the descendants of
  - Now the sons of
  lexicon: HALOT
  rationale: בני literally means 'sons of,' and in genealogical contexts can extend
    to descendants. Here, because a direct list of named male offspring follows, 'sons
    of' is the most natural and sufficiently precise rendering.
- source_word: בֶלַע
  chosen: Bela
  rationale: Personal name; transliterated per translation philosophy.
- source_word: אֶצְבּוֹן
  chosen: Ezbon
  alternatives:
  - Ezbun
  - Azzbon
  rationale: Personal name; standard English transliteration from Hebrew consonants.
    Variant spellings exist in English tradition, but 'Ezbon' straightforwardly reflects
    the Hebrew form.
- source_word: עֻזִּי
  chosen: Uzzi
  rationale: Personal name; transliterated.
- source_word: עֻזִּיאֵל
  chosen: Uzziel
  rationale: Personal name; transliterated.
- source_word: יְרִימוֹת
  chosen: Jerimoth
  alternatives:
  - Jerimot
  rationale: Personal name; conventional transliteration in English biblical usage.
- source_word: עִירִי
  chosen: Iri
  alternatives:
  - Irri
  rationale: Personal name; transliterated directly.
- source_word: חֲמִשָּׁה
  chosen: five
  lexicon: HALOT
  rationale: Cardinal number modifying the listed names.
- source_word: רָאשֵׁי בֵּית אָבוֹת
  chosen: heads of fathers’ houses
  alternatives:
  - chiefs of ancestral houses
  - heads of family houses
  lexicon: HALOT
  rationale: A technical genealogical/social phrase in Chronicles. 'Heads' preserves
    the metaphor of leadership; 'fathers’ houses' reflects the clan-based household
    structure more literally than the smoother but less transparent 'families.'
- source_word: גִּבּוֹרֵי חֲיָלִים
  chosen: mighty men of valor
  alternatives:
  - mighty warriors
  - valiant men
  lexicon: HALOT
  rationale: A common Hebrew expression for capable fighting men or men of proven
    strength. 'Mighty men of valor' preserves the traditional force and the plural
    construction, while remaining understandable.
- source_word: וְהִתְיַחְשָׂם
  chosen: their genealogical enrollment
  alternatives:
  - their genealogy
  - their registration by genealogy
  - they were enrolled by genealogy
  lexicon: HALOT
  rationale: 'The Hitpael of יחס in Chronicles refers to being entered in genealogical
    records. The Hebrew form here functions substantivally with the following number,
    so an English nominal rendering best fits: ''their genealogical enrollment.'''
- source_word: עֶשְׂרִים וּשְׁנַיִם אֶלֶף וּשְׁלֹשִׁים וְאַרְבָּעָה
  chosen: twenty-two thousand and thirty-four
  alternatives:
  - 22,034
  lexicon: HALOT
  rationale: 'Rendered in words for literary style. The sequence is the standard Hebrew
    number construction: 22,000 + 34.'
