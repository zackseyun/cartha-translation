id: 1CH.7.16
reference: 1 Chronicles 7:16
source:
  edition: WLC
  text: וַ/תֵּ֨לֶד מַעֲכָ֤ה אֵֽשֶׁת מָכִיר֙ בֵּ֔ן וַ/תִּקְרָ֤א שְׁמ/וֹ֙ פֶּ֔רֶשׁ וְ/שֵׁ֥ם
    אָחִ֖י/ו שָׁ֑רֶשׁ וּ/בָנָ֖י/ו אוּלָ֥ם וָ/רָֽקֶם־׃
translation:
  text: Maacah the wife of Machir bore a son, and she called his name Peresh; and
    the name of his brother was Sheresh, and his sons were Ulam and Rakem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'she named him Peresh.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew genealogies often use 'sons' in a specifically male sense; here the
      term is retained rather than generalized to 'children.'
    reason: cultural_note
lexical_decisions:
- source_word: וַתֵּלֶד
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: Wayyiqtol of ילד in genealogical context is naturally rendered 'bore'
    in English, which is concise and idiomatic for lineage notices.
- source_word: אֵשֶׁת מָכִיר
  chosen: the wife of Machir
  alternatives:
  - Machir's wife
  lexicon: HALOT
  rationale: Construct phrase identifying Maacah by relationship to Machir. 'The wife
    of Machir' preserves the formal genealogical style while remaining clear.
- source_word: בֵּן
  chosen: a son
  alternatives:
  - son
  lexicon: HALOT
  rationale: Indefinite sense fits English idiom after 'bore'; the Hebrew singular
    common noun introduces the child before naming him.
- source_word: וַתִּקְרָא שְׁמוֹ
  chosen: she called his name
  alternatives:
  - she named him
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'called his name.' This is slightly more
    formal than 'named him' and preserves the source phrasing without becoming unnatural.
- source_word: פֶּרֶשׁ
  chosen: Peresh
  rationale: 'Personal name is transliterated according to the translation philosophy:
    translate titles, transliterate names.'
- source_word: וְשֵׁם אָחִיו
  chosen: and the name of his brother was
  alternatives:
  - and his brother's name was
  lexicon: HALOT
  rationale: This closely follows the Hebrew nominal expression and maintains the
    genealogical register.
- source_word: שָׁרֶשׁ
  chosen: Sheresh
  rationale: Personal name transliterated.
- source_word: וּבָנָיו
  chosen: and his sons were
  alternatives:
  - and his children were
  lexicon: HALOT
  rationale: בנים here specifically denotes male descendants in a genealogy, so 'sons'
    is gender-accurate and preferable to the broader 'children'.
- source_word: אוּלָם
  chosen: Ulam
  rationale: Personal name transliterated.
- source_word: וָרָקֶם
  chosen: and Rakem
  rationale: Personal name transliterated; the prefixed conjunction is carried over
    as 'and' in the list.
