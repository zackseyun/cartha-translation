id: 1CH.7.33
reference: 1 Chronicles 7:33
source:
  edition: WLC
  text: וּ/בְנֵ֣י יַפְלֵ֔ט פָּסַ֥ךְ וּ/בִמְהָ֖ל וְ/עַשְׁוָ֑ת אֵ֖לֶּה בְּנֵ֥י יַפְלֵֽט׃
translation:
  text: 'The sons of Japhlet: Pasach, Bimhal, and Ashvath. These were the sons of
    Japhlet.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Pasah' for the first name listed; English transliterations of Hebrew
      personal names vary.
    reason: lexical_alternative
  - marker: b
    text: Or 'These are the sons of Japhlet.' The Hebrew demonstrative formula can
      be rendered with either present or past tense in English genealogical style.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in a genealogy most naturally means 'sons of.'
    Although genealogies can sometimes telescope generations, the immediate sense
    here is filial listing, so 'sons of' is preferred over broader 'descendants of.'
- source_word: יַפְלֵט
  chosen: Japhlet
  alternatives:
  - Japhlet (variant transliteration Yaphlet)
  rationale: Personal names are transliterated rather than translated, following project
    policy. 'Japhlet' is a standard English transliteration for יַפְלֵט.
- source_word: פָּסַךְ
  chosen: Pasach
  alternatives:
  - Pasah
  rationale: This is a personal name, so it is transliterated. 'Pasach' reflects the
    final כ sound; some English traditions simplify to 'Pasah,' which is preserved
    as an alternative transliteration.
- source_word: וּבִמְהָל
  chosen: Bimhal
  alternatives:
  - Bimhāl
  rationale: Proper name with prefixed conjunction. The conjunction is rendered separately
    as 'and,' and the name is transliterated as 'Bimhal.'
- source_word: וְעַשְׁוָת
  chosen: Ashvath
  alternatives:
  - Ashwath
  - Ashvath (from a less anglicized transliteration)
  rationale: Proper name with conjunction. The consonantal sequence is best represented
    in readable modern English as 'Ashvath'; 'Ashwath' is a plausible alternative
    depending on how שׁו is represented in transliteration.
- source_word: אֵלֶּה
  chosen: These were
  alternatives:
  - These are
  - These
  lexicon: HALOT
  rationale: The demonstrative introduces a summarizing genealogical formula. English
    idiom in this narrative-genealogical context is smoother with 'These were,' though
    a more formally present-tense 'These are' is possible.
- source_word: בְּנֵי יַפְלֵט
  chosen: the sons of Japhlet
  alternatives:
  - Japhlet's sons
  lexicon: HALOT
  rationale: The repeated phrase closes the list with a standard genealogical formula.
    Repeating it in full preserves the structure of the Hebrew.
