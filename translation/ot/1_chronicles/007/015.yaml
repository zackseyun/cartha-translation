theological_decisions:
- issue: Genealogical ambiguity in 'the second'
  chosen_reading: Retain the compressed wording 'the second' in the main text without
    adding 'son'
  alternative_readings:
  - the second son
  - the other
  rationale: This is not a major doctrinal issue, but it is a significant interpretive
    decision. The Hebrew is terse and does not explicitly supply 'son.' To avoid importing
    a more resolved genealogy than the text states, the main text preserves the ambiguity
    and the footnote records the smoother alternative.
  doctrine_reference: Translation philosophy §3, §5
