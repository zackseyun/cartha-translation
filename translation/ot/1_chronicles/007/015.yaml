id: 1CH.7.15
reference: 1 Chronicles 7:15
source:
  edition: WLC
  text: וּ/מָכִ֞יר לָקַ֤ח אִשָּׁה֙ לְ/חֻפִּ֣ים וּ/לְ/שֻׁפִּ֔ים וְ/שֵׁ֤ם אֲחֹת/וֹ֙
    מַעֲכָ֔ה וְ/שֵׁ֥ם הַ/שֵּׁנִ֖י צְלָפְחָ֑ד וַ/תִּהְיֶ֥נָה לִ/צְלָפְחָ֖ד בָּנֽוֹת׃
translation:
  text: Machir took a wife for Huppim and for Shuppim. The name of his sister was
    Maacah, and the name of the second was Zelophehad; and Zelophehad had daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and the name of the second son was Zelophehad.' The Hebrew says simply
      'the second,' leaving the referent implicit.
    reason: alternative_reading
lexical_decisions:
- source_word: לָקַח אִשָּׁה
  chosen: took a wife
  alternatives:
  - took a woman
  - married
  lexicon: HALOT
  rationale: The idiom לָקַח אִשָּׁה commonly means 'take a wife' / 'marry.' Here
    the following לְחֻפִּים וּלְשֻׁפִּים indicates the wife was taken for Huppim and
    Shuppim rather than for Machir himself, so the idiomatic sense is retained while
    preserving the syntax.
- source_word: לְחֻפִּים וּלְשֻׁפִּים
  chosen: for Huppim and for Shuppim
  alternatives:
  - for Huppim and Shuppim
  - for Huppim and Shuppim as wife
  lexicon: HALOT
  rationale: The repeated preposition לְ is best represented as 'for ... and for ...,'
    preserving the unusual Hebrew construction. This likely means Machir arranged
    a marriage on behalf of Huppim and Shuppim.
- source_word: וְשֵׁם אֲחֹתוֹ מַעֲכָה
  chosen: The name of his sister was Maacah
  alternatives:
  - and his sister's name was Maacah
  lexicon: HALOT
  rationale: A straightforward rendering of the naming formula. 'His sister' most
    naturally refers back to Machir in the immediate context.
- source_word: וְשֵׁם הַשֵּׁנִי צְלָפְחָד
  chosen: and the name of the second was Zelophehad
  alternatives:
  - and the name of the second son was Zelophehad
  - and the name of the other was Zelophehad
  lexicon: HALOT
  rationale: The Hebrew literally says 'the second,' but the referent is compressed
    and somewhat obscure in context. The main text keeps the literal wording rather
    than supplying 'son,' which is interpretive. An alternative is preserved in a
    footnote because many understand an implied male descendant.
- source_word: וַתִּהְיֶנָה לִצְלָפְחָד בָּנוֹת
  chosen: and Zelophehad had daughters
  alternatives:
  - and daughters came to belong to Zelophehad
  - and there were daughters to Zelophehad
  lexicon: HALOT
  rationale: This is a natural English rendering of the existential possession construction.
    It preserves the important genealogical note that Zelophehad had daughters rather
    than sons.
