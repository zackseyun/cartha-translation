theological_decisions:
- issue: Identity of הָרָפָא
  chosen_reading: a lineage/group designated 'the Rapha,' rendered without collapsing
    it into 'giant' terminology
  alternative_readings:
  - Rapha as a personal ancestor
  - the giant
  - the Rephaim/giants
  rationale: The Hebrew form is singular with article and does not explicitly use
    the common plural form 'Rephaim.' Rendering it as 'the Rapha' preserves the ambiguity
    of whether this is an eponymous ancestor or a clan designation. This avoids importing
    a stronger interpretive claim than the text itself makes while still reflecting
    the likely connection to the giant tradition in Gath.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
