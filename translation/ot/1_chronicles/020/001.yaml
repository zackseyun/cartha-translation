id: 1CH.20.1
reference: 1 Chronicles 20:1
source:
  edition: WLC
  text: וַ/יְהִ֡י לְ/עֵת֩ תְּשׁוּבַ֨ת הַ/שָּׁנָ֜ה לְ/עֵ֣ת צֵ֣את הַ/מְּלָכִ֗ים וַ/יִּנְהַ֣ג
    יוֹאָב֩ אֶת חֵ֨יל הַ/צָּבָ֜א וַ/יַּשְׁחֵ֣ת אֶת אֶ֣רֶץ בְּנֵֽי עַמּ֗וֹן וַ/יָּבֹא֙
    וַ/יָּ֣צַר אֶת רַבָּ֔ה וְ/דָוִ֖יד יֹשֵׁ֣ב בִּ/ירֽוּשָׁלִָ֑ם וַ/יַּ֥ךְ יוֹאָ֛ב
    אֶת רַבָּ֖ה וַ/יֶּֽהֶרְסֶֽ/הָ׀־׀־־־־׃
translation:
  text: And it happened at the time of the turning of the year, at the time when kings
    go out, that Joab led out the army and devastated the land of the Ammonites, and
    he came and besieged Rabbah. But David stayed in Jerusalem. And Joab struck Rabbah
    and tore it down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'in the spring, when kings go out to battle.' The
      Hebrew reads more literally, 'at the turning of the year, at the time when kings
      go out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּשׁוּבַת הַשָּׁנָה
  chosen: the turning of the year
  alternatives:
  - the return of the year
  - the spring of the year
  - the new year
  lexicon: HALOT
  rationale: Literally denotes the year's turning/return. 'The turning of the year'
    preserves the Hebrew idiom while remaining understandable. 'Spring' is interpretive
    and reflects the military season implied by the following phrase rather than this
    expression alone.
- source_word: לְעֵת צֵאת הַמְּלָכִים
  chosen: at the time when kings go out
  alternatives:
  - in the spring, when kings go out to battle
  - at the time of the campaign of kings
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the idiom and leaves the object
    of 'go out' implicit as in Hebrew. The military sense is clear from context, but
    adding 'to battle' in the main text would slightly expand beyond the wording.
- source_word: וַיִּנְהַג
  chosen: led out
  alternatives:
  - drove
  - conducted
  - marched out with
  lexicon: HALOT
  rationale: The verb conveys leading or driving forth. 'Led out' fits military movement
    naturally and corresponds to Joab's command of the force.
- source_word: חֵיל הַצָּבָא
  chosen: the army
  alternatives:
  - the force of the army
  - the military force
  - the host
  lexicon: HALOT
  rationale: The paired nouns together denote the military force. 'The army' is concise,
    natural English and captures the sense without unnecessary redundancy.
- source_word: וַיַּשְׁחֵת אֶת אֶרֶץ בְּנֵי עַמּוֹן
  chosen: devastated the land of the Ammonites
  alternatives:
  - destroyed the land of the sons of Ammon
  - ravaged the country of the Ammonites
  lexicon: HALOT
  rationale: The verb means to ruin, destroy, or devastate. 'Devastated' suits a military
    campaign against territory. 'Ammonites' is smoother English than the more literal
    'sons of Ammon' while preserving reference.
- source_word: וַיָּצַר
  chosen: besieged
  alternatives:
  - laid siege to
  - encircled
  lexicon: HALOT
  rationale: Standard military term for laying siege to a city. 'Besieged' is the
    most direct modern rendering.
- source_word: וְדָוִיד יֹשֵׁב בִּירוּשָׁלִָם
  chosen: But David stayed in Jerusalem
  alternatives:
  - and David was sitting in Jerusalem
  - while David remained in Jerusalem
  lexicon: HALOT
  rationale: The participle with subject gives a durative/state sense. 'Stayed' communicates
    that David remained behind during the campaign. 'But' brings out the contrast
    with Joab's action, which is contextually important and reflected in English style.
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - attacked
  - smote
  - defeated
  lexicon: HALOT
  rationale: The verb is broad and often means strike/attack/defeat. 'Struck' preserves
    the lexical force without over-specifying the result, which is then clarified
    by the following verb.
- source_word: וַיֶּהֶרְסֶהָ
  chosen: tore it down
  alternatives:
  - demolished it
  - overthrew it
  - destroyed it
  lexicon: HALOT
  rationale: The verb means to tear down or demolish, often of structures or cities.
    'Tore it down' is vivid, natural English and distinguishes it from the earlier
    verb for devastating the land.
- source_word: רַבָּה
  chosen: Rabbah
  alternatives:
  - Rabbah of the Ammonites
  lexicon: HALOT
  rationale: Standard transliteration of the city name, in keeping with the policy
    to transliterate personal and place names.
