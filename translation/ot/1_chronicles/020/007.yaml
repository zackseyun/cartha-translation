id: 1CH.20.7
reference: 1 Chronicles 20:7
source:
  edition: WLC
  text: וַ/יְחָרֵ֖ף אֶת יִשְׂרָאֵ֑ל וַ/יַּכֵּ֨/הוּ֙ יְה֣וֹנָתָ֔ן בֶּן שִׁמְעָ֖א אֲחִ֥י
    דָוִֽיד־־׃
translation:
  text: And when he taunted Israel, Jonathan son of Shimea, David’s brother, struck
    him down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "defied Israel." The Hebrew verb can denote scornful reproach or open
      defiance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחָרֵף
  chosen: taunted
  alternatives:
  - defied
  - reproached
  - mocked
  lexicon: HALOT
  rationale: The verb חרף in this context conveys insulting or defiant speech directed
    against Israel. 'Taunted' is natural modern English and captures the hostile verbal
    provocation without overformal archaism. 'Defied' is possible and reflected in
    some traditions, but 'taunted' better matches the speech-act nuance.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the Israelites
  lexicon: HALOT
  rationale: The direct object is the national entity 'Israel.' Rendering it simply
    as 'Israel' preserves the Hebrew wording and can naturally stand for the people
    as a whole in English.
- source_word: וַיַּכֵּהוּ
  chosen: struck him down
  alternatives:
  - killed him
  - struck him
  - smote him
  lexicon: HALOT
  rationale: The Hiphil/imperfect consecutive of נכה with 3ms object here refers to
    Jonathan's lethal blow in narrative context. 'Struck him down' communicates the
    result idiomatically in modern English while staying close to the Hebrew action.
    'Killed him' is slightly more interpretive; 'struck him' may sound incomplete
    in English.
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  rationale: Standard English transliteration of the personal name.
- source_word: בֶּן שִׁמְעָא
  chosen: son of Shimea
  alternatives:
  - son of Shimea
  rationale: Personal names are transliterated. 'Shimea' follows the conventional
    English form for שִׁמְעָא in this context.
- source_word: אֲחִי דָוִיד
  chosen: David’s brother
  alternatives:
  - the brother of David
  lexicon: HALOT
  rationale: The construct phrase literally means 'brother of David.' The possessive
    form is smoother in modern English while preserving the familial relation exactly.
