id: 1CH.20.4
reference: 1 Chronicles 20:4
source:
  edition: WLC
  text: וַ/יְהִי֙ אַחֲרֵי כֵ֔ן וַ/תַּעֲמֹ֧ד מִלְחָמָ֛ה בְּ/גֶ֖זֶר עִם פְּלִשְׁתִּ֑ים
    אָ֣ז הִכָּ֞ה סִבְּכַ֣י הַ/חֻֽשָׁתִ֗י אֶת סִפַּ֛י מִ/ילִדֵ֥י הָ/רְפָאִ֖ים וַ/יִּכָּנֵֽעוּ־־׃
translation:
  text: After this, war arose at Gezer with the Philistines. Then Sibbecai the Hushathite
    struck down Sippai, one of the descendants of the Rephaim, and they were subdued.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Saphai" for the name rendered "Sippai."
    reason: lexical_alternative
  - marker: b
    text: Hebrew "the Rephaim"; traditionally also rendered "the giants."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי אַחֲרֵי כֵן
  chosen: After this
  alternatives:
  - Afterward
  - And it happened after this
  lexicon: HALOT
  rationale: Idiomatic narrative transition. Rendering the full waw-consecutive formula
    woodenly ('and it happened after this') is unnecessary in modern English; 'After
    this' preserves the temporal sequence naturally.
- source_word: וַתַּעֲמֹד מִלְחָמָה
  chosen: war arose
  alternatives:
  - there was war
  - war broke out
  - war stood
  lexicon: HALOT
  rationale: The verb עמד with מלחמה in narrative context conveys the onset or occurrence
    of conflict. 'War arose' keeps some formal correspondence while reading naturally.
- source_word: בְּגֶזֶר
  chosen: at Gezer
  alternatives:
  - in Gezer
  lexicon: HALOT
  rationale: For a battle location, English idiom favors 'at Gezer.' The place name
    is transliterated as a proper noun.
- source_word: עִם פְּלִשְׁתִּים
  chosen: with the Philistines
  alternatives:
  - against the Philistines
  lexicon: HALOT
  rationale: The preposition עם literally means 'with.' In warfare contexts it can
    imply hostile engagement; 'with the Philistines' preserves the Hebrew wording
    while the context makes the adversarial sense clear.
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Simple sequential marker in narrative; 'Then' is the most natural English
    equivalent.
- source_word: הִכָּה
  chosen: struck down
  alternatives:
  - killed
  - defeated
  - struck
  lexicon: HALOT
  rationale: The verb נכה often means to strike/strike down and in battle contexts
    can imply killing. 'Struck down' preserves the martial force without overstating
    beyond the lexical range.
- source_word: סִבְּכַי הַחֻשָׁתִי
  chosen: Sibbecai the Hushathite
  lexicon: HALOT
  rationale: Personal and gentilic names are transliterated per project philosophy.
    'The Hushathite' preserves the ethnic/geographic designation.
- source_word: סִפַּי
  chosen: Sippai
  alternatives:
  - Saphai
  lexicon: HALOT
  rationale: The consonantal form here supports 'Sippai.' An alternative vocalized/transliterated
    form appears in some English traditions and should be preserved in a footnote
    for auditability.
- source_word: מִילִדֵי הָרְפָאִים
  chosen: one of the descendants of the Rephaim
  alternatives:
  - from the children of the Rephaim
  - one of the sons of Rapha
  - one of the descendants of the giants
  lexicon: HALOT
  rationale: ילידי denotes those born of/descended from. Rephaim is best transliterated
    rather than interpreted as 'giants,' since the term can function as an ethnonym/clan
    designation and the text itself does not require the interpretive gloss. 'One
    of the descendants of' makes the singular referent explicit in English.
- source_word: וַיִּכָּנֵעוּ
  chosen: they were subdued
  alternatives:
  - they were humbled
  - they were brought into subjection
  - they submitted
  lexicon: HALOT
  rationale: The Niphal of כנע commonly conveys being subdued or humbled. In this
    military context, 'they were subdued' best fits the outcome of the conflict.
