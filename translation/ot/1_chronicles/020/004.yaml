theological_decisions:
- issue: Rendering הָרְפָאִים
  chosen_reading: the Rephaim
  alternative_readings:
  - the giants
  rationale: This term can be understood as a people group/clan name rather than a
    direct descriptive label. Transliteration avoids importing a stronger interpretive
    claim than the Hebrew requires, while preserving the common alternative in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §5
