id: 1CH.20.2
reference: 1 Chronicles 20:2
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח דָּוִ֣יד אֶת עֲטֶֽרֶת מַלְכָּ/ם֩ מֵ/עַ֨ל רֹאשׁ֜/וֹ וַֽ/יִּמְצָאָ֣/הּ
    מִשְׁקַ֣ל כִּכַּר זָהָ֗ב וּ/בָ/הּ֙ אֶ֣בֶן יְקָרָ֔ה וַ/תְּהִ֖י עַל רֹ֣אשׁ דָּוִ֑יד
    וּ/שְׁלַ֥ל הָ/עִ֛יר הוֹצִ֖יא הַרְבֵּ֥ה מְאֹֽד־־׀־־׃
translation:
  text: And David took the crown of their king from his head and found that it weighed
    a talent of gold, and in it was a precious stone; and it was placed on David’s
    head. And he carried off very much plunder from the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the crown of Milcom' (or 'Malcam'), taking מַלְכָּם as the name of the
      Ammonite god rather than 'their king.'
    reason: alternative_reading
  - marker: b
    text: A talent was a large ancient unit of weight, often estimated at roughly
      75 pounds or 34 kilograms, though exact values varied.
    reason: cultural_note
lexical_decisions:
- source_word: עֲטֶרֶת
  chosen: crown
  alternatives:
  - diadem
  lexicon: HALOT
  rationale: Standard rendering for a royal headdress; 'diadem' is possible but less
    natural in modern English and not required by the context.
- source_word: מַלְכָּם
  chosen: their king
  alternatives:
  - Milcom
  - Malcam
  lexicon: HALOT
  rationale: The morphology points naturally to מֶלֶךְ with 3mp suffix, 'their king.'
    Although the consonants can also be read as the Ammonite deity-name Milcom/Malcam,
    the immediate syntax with 'from his head' favors a royal referent in the main
    text. Because the deity-name reading is a known alternative, it is preserved in
    a footnote.
- source_word: מֵעַל רֹאשׁוֹ
  chosen: from his head
  alternatives:
  - from off his head
  lexicon: HALOT
  rationale: Idiomatic modern English equivalent of the Hebrew prepositional phrase,
    preserving the concrete image.
- source_word: וַיִּמְצָאָהּ
  chosen: found that it weighed
  alternatives:
  - found it to weigh
  - found it weighing
  lexicon: HALOT
  rationale: The verb 'found' introduces the discovered weight of the crown. English
    idiom commonly expresses this as 'found that it weighed,' making the relation
    clear without adding content.
- source_word: מִשְׁקַל כִּכַּר זָהָב
  chosen: it weighed a talent of gold
  alternatives:
  - its weight was a talent of gold
  lexicon: HALOT
  rationale: A clear modern rendering of the construct chain. 'Talent' preserves the
    ancient unit rather than converting it, which would add interpretive specificity.
- source_word: אֶבֶן יְקָרָה
  chosen: a precious stone
  alternatives:
  - a precious jewel
  - a costly stone
  lexicon: HALOT
  rationale: A straightforward rendering of the singular phrase. 'Precious stone'
    is transparent and avoids over-specifying the gem type.
- source_word: וַתְּהִי עַל רֹאשׁ דָּוִיד
  chosen: it was placed on David’s head
  alternatives:
  - it was on David's head
  - it came to be on David's head
  lexicon: HALOT
  rationale: The Hebrew literally says 'and it was on David's head.' In context, English
    naturally expresses the resulting action as 'it was placed on David's head,' while
    preserving the sense that David wore the crown.
- source_word: וּשְׁלַל הָעִיר
  chosen: plunder from the city
  alternatives:
  - spoil of the city
  lexicon: HALOT
  rationale: '''Plunder'' is the clearest modern equivalent for שָׁלָל in a military
    context; ''spoil'' is traditional but less current.'
- source_word: הוֹצִיא
  chosen: he carried off
  alternatives:
  - he brought out
  - he took out
  lexicon: HALOT
  rationale: In context of war booty, 'carried off' best conveys removal as spoil
    rather than merely bringing something out.
- source_word: הַרְבֵּה מְאֹד
  chosen: very much
  alternatives:
  - in great abundance
  - exceedingly much
  lexicon: HALOT
  rationale: This adverbial intensification emphasizes quantity. 'Very much' is concise
    and natural, though 'in great abundance' would also fit.
