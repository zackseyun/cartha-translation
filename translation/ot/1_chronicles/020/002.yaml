theological_decisions:
- issue: Whether מַלְכָּם refers to 'their king' or the Ammonite deity Milcom/Malcam
  chosen_reading: their king
  alternative_readings:
  - Milcom
  - Malcam
  rationale: This is primarily a lexical/syntactic issue rather than a doctrinal one,
    but it affects interpretation. The pronominal syntax 'from his head' most readily
    refers to a king whose crown David took. The deity-name reading is ancient and
    plausible in light of the consonants and the parallel in Samuel, so it is preserved
    in a footnote rather than excluded.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    alternatives in footnotes where ambiguity is genuine.
