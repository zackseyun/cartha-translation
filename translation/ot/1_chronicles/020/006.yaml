id: 1CH.20.6
reference: 1 Chronicles 20:6
source:
  edition: WLC
  text: וַ/תְּהִי ע֥וֹד מִלְחָמָ֖ה בְּ/גַ֑ת וַ/יְהִ֣י אִ֣ישׁ מִדָּ֗ה וְ/אֶצְבְּעֹתָ֤י/ו
    שֵׁשׁ וָ/שֵׁשׁ֙ עֶשְׂרִ֣ים וְ/אַרְבַּ֔ע וְ/גַם ה֖וּא נוֹלַ֥ד לְ/הָ/רָפָֽא־׀־־׃
translation:
  text: And there was war again at Gath, and there was a man of great size whose fingers
    and toes were six each, twenty-four in all; he also was born to the Rapha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was descended from the giant' or 'was one of the Rephaim.' The Hebrew
      reads 'was born to the Rapha.'
    reason: alternative_reading
lexical_decisions:
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - yet
  - further
  lexicon: HALOT
  rationale: 'In narrative sequence with וַתְּהִי, עוֹד marks recurrence: another
    instance of war, best rendered ''again.'''
- source_word: מִלְחָמָה
  chosen: war
  alternatives:
  - battle
  - fighting
  lexicon: HALOT
  rationale: The noun denotes warfare/conflict broadly; 'war' fits the narrative summary
    better than the more event-specific 'battle.'
- source_word: בְּגַת
  chosen: at Gath
  alternatives:
  - in Gath
  lexicon: HALOT
  rationale: The preposition ב can be rendered 'in' or 'at'; 'at Gath' is idiomatic
    for the location of conflict.
- source_word: אִישׁ מִדָּה
  chosen: a man of great size
  alternatives:
  - a man of stature
  - a giant of a man
  - a man of measure
  lexicon: HALOT
  rationale: The phrase literally means 'a man of measure/stature' and in this context
    refers to unusual bodily size. 'A man of great size' communicates the sense naturally
    without overparaphrasing.
- source_word: אֶצְבְּעֹתָיו
  chosen: his fingers and toes
  alternatives:
  - his digits
  lexicon: HALOT
  rationale: Though the noun literally means 'fingers,' in this stock description
    of six on hands and feet (cf. the parallel in 2 Sam 21:20) the sense includes
    both fingers and toes. Rendering both explicitly makes the Hebrew idiom clear
    in English.
- source_word: שֵׁשׁ וָשֵׁשׁ
  chosen: six each
  alternatives:
  - six and six
  - six apiece
  lexicon: HALOT
  rationale: 'The distributive sense is intended: six on each hand and foot grouping.
    ''Six each'' is concise modern English.'
- source_word: עֶשְׂרִים וְאַרְבַּע
  chosen: twenty-four in all
  alternatives:
  - twenty-four
  lexicon: HALOT
  rationale: The total number is being summed; 'in all' makes the arithmetic relation
    explicit and natural in English.
- source_word: וְגַם הוּא
  chosen: he also
  alternatives:
  - and he too
  - he as well
  lexicon: HALOT
  rationale: Marks that this man, like others in the context, belonged to the same
    lineage/group.
- source_word: נוֹלַד לְהָרָפָא
  chosen: was born to the Rapha
  alternatives:
  - was descended from Rapha
  - was born to the giant
  - was one of the Rephaim
  lexicon: HALOT
  rationale: The phrase is literally 'was born to the Rapha.' In Chronicles/Samuel
    this likely refers to descent from a figure or clan associated with the Rephaim.
    'Rapha' preserves the singular form of the Hebrew and avoids importing an interpretive
    plural into the main text.
