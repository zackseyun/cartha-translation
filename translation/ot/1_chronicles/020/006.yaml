theological_decisions:
- issue: Identity of הָרָפָא
  chosen_reading: the Rapha as a proper ancestral/clan designation preserved in transliteration
  alternative_readings:
  - the giant
  - the Rephaim
  rationale: This is not a major doctrinal issue, but it is an interpretive one. The
    Hebrew form is singular with article, and the immediate context concerns notable
    Philistine warriors of unusual size. Transliteration preserves ambiguity between
    a named ancestor and a clan designation, while alternatives are preserved in a
    footnote.
  doctrine_reference: Translation philosophy §3, §5
