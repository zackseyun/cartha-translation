theological_decisions:
- issue: Whether the verse describes execution/torture of the Ammonites or forced
    labor
  chosen_reading: The main text renders David as putting the captured people to work
    with implements.
  alternative_readings:
  - The verse may be read, especially from the Samuel parallel, as describing execution
    with saws and iron tools.
  rationale: The Chronicler's wording differs from 2 Samuel 12:31 and can be read
    less violently. Following original-language primacy, the translation should not
    import the Samuel wording into Chronicles. Because the matter is debated and ethically/theologically
    significant, the harsher alternative is preserved in a footnote rather than resolved
    silently.
  doctrine_reference: Translation philosophy §§1, 3
