id: 1CH.20.3
reference: 1 Chronicles 20:3
source:
  edition: WLC
  text: וְ/אֶת הָ/עָ֨ם אֲשֶׁר בָּ֜/הּ הוֹצִ֗יא וַ/יָּ֨שַׂר בַּ/מְּגֵרָ֜ה וּ/בַ/חֲרִיצֵ֤י
    הַ/בַּרְזֶל֙ וּ/בַ/מְּגֵר֔וֹת וְ/כֵן֙ יַעֲשֶׂ֣ה דָוִ֔יד לְ/כֹ֖ל עָרֵ֣י בְנֵי עַמּ֑וֹן
    וַ/יָּ֧שָׁב דָּוִ֛יד וְ/כָל הָ/עָ֖ם יְרוּשָׁלִָֽם־־־־׃פ
translation:
  text: He brought out the people who were in it and put them to work with saws, iron
    picks, and axes. Thus David did to all the cities of the Ammonites. Then David
    and all the people returned to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, possibly, 'put them under saws, iron threshing-sledges, and cutting
      tools'; some take the verse, influenced by 2 Samuel 12:31, to mean that David
      executed them with such instruments.
    reason: alternative_reading
  - marker: b
    text: The Hebrew terms for the tools are partly uncertain; the phrase rendered
      'iron picks, and axes' may refer more generally to iron cutting implements.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹצִיא
  chosen: brought out
  alternatives:
  - brought forth
  - led out
  lexicon: HALOT
  rationale: The Hiphil of יצא commonly means to bring out or lead out. 'Brought out'
    is natural English and preserves the concrete action of removing the city's inhabitants.
- source_word: וַיָּשַׂר
  chosen: put them to work
  alternatives:
  - cut them with
  - sawed
  - assigned them to
  lexicon: HALOT
  rationale: This verb is difficult and has been understood in light of the parallel
    in 2 Samuel 12:31. In Chronicles, the wording can naturally be read as setting
    the people to labor with the listed implements rather than executing them. 'Put
    them to work' fits the Chronicler's wording and avoids importing the harsher sense
    from Samuel beyond what this text warrants.
- source_word: בַּמְּגֵרָה
  chosen: with saws
  alternatives:
  - at the saw
  - with the saw
  lexicon: HALOT
  rationale: מְגֵרָה denotes a saw. Because the phrase lists implements collectively,
    the English plural 'saws' is idiomatic.
- source_word: בַּחֲרִיצֵי הַבַּרְזֶל
  chosen: with iron picks
  alternatives:
  - with iron threshing-sledges
  - with iron cutting tools
  - with iron sharp instruments
  lexicon: HALOT
  rationale: The noun refers to sharp implements or cutting devices; the exact tool
    is uncertain. 'Iron picks' gives a plausible, readable rendering without overstating
    precision. An alternative is preserved in a footnote because some understand the
    term as threshing implements.
- source_word: וּבַמְּגֵרוֹת
  chosen: and axes
  alternatives:
  - and saws
  - and cutting instruments
  lexicon: HALOT
  rationale: The form is lexically difficult because it resembles the previous noun
    for 'saw,' but many interpreters understand a different cutting tool here in context.
    'Axes' provides a sensible distinction in the list of labor implements while acknowledging
    uncertainty in a footnote.
- source_word: וְכֵן יַעֲשֶׂה
  chosen: Thus ... did
  alternatives:
  - and so ... would do
  - and in this way ... did
  lexicon: HALOT
  rationale: The construction summarizes David's customary action toward the Ammonite
    cities. 'Thus David did' is concise and idiomatic in narrative English.
- source_word: לְכֹל עָרֵי בְנֵי עַמּוֹן
  chosen: to all the cities of the Ammonites
  alternatives:
  - to all the cities of the sons of Ammon
  lexicon: HALOT
  rationale: '''Ammonites'' is the natural English ethnonym for בְנֵי עַמּוֹן in this
    context.'
- source_word: וַיָּשָׁב ... יְרוּשָׁלִָם
  chosen: returned to Jerusalem
  alternatives:
  - went back to Jerusalem
  lexicon: HALOT
  rationale: Standard narrative use of שוב with a destination. 'Returned' is the most
    natural rendering.
