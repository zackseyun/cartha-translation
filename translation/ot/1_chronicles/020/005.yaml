id: 1CH.20.5
reference: 1 Chronicles 20:5
source:
  edition: WLC
  text: וַ/תְּהִי ע֥וֹד מִלְחָמָ֖ה אֶת פְּלִשְׁתִּ֑ים וַ/יַּ֞ךְ אֶלְחָנָ֣ן בֶּן יעור
    אֶת לַחְמִי֙ אֲחִי֙ גָּלְיָ֣ת הַ/גִּתִּ֔י וְ/עֵ֣ץ חֲנִית֔/וֹ כִּ/מְנ֖וֹר אֹרְגִֽים־־־־׃
translation:
  text: And there was war with the Philistines again, and Elhanan son of Jair struck
    down Lahmi, the brother of Goliath the Gittite, whose spear shaft was like a weaver’s
    beam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The parallel in 2 Samuel 21:19 has a difficult Hebrew text and is often
      discussed in relation to this verse; Chronicles explicitly says Elhanan killed
      Lahmi, the brother of Goliath.
    reason: textual_variant
lexical_decisions:
- source_word: וַתְּהִי עוֹד מִלְחָמָה
  chosen: And there was war ... again
  alternatives:
  - And there was battle ... again
  - And there was still war
  lexicon: HALOT
  rationale: The clause introduces another episode in an ongoing series. 'War' is
    a natural rendering of מִלְחָמָה here, while עוֹד is best captured by 'again'
    in context rather than the more wooden 'still'.
- source_word: אֶת פְּלִשְׁתִּים
  chosen: with the Philistines
  alternatives:
  - against the Philistines
  lexicon: HALOT
  rationale: With verbs/nouns of conflict, אֶת can mark the opposing party. English
    idiom prefers 'with the Philistines' after 'there was war.'
- source_word: וַיַּךְ
  chosen: struck down
  alternatives:
  - killed
  - smote
  lexicon: HALOT
  rationale: נכה commonly means to strike, smite, or strike down. In this battle context
    it clearly results in death, but 'struck down' preserves the Hebrew verbal imagery
    without over-paraphrasing.
- source_word: אֶלְחָנָן בֶּן יעור
  chosen: Elhanan son of Jair
  alternatives:
  - Elhanan the son of Jair
  lexicon: HALOT
  rationale: The proper name is conventionally rendered 'Jair' for יעור in this verse,
    following the standard vocalized/traditional identification in Chronicles. 'Son
    of Jair' is straightforward English.
- source_word: אֶת לַחְמִי
  chosen: Lahmi
  alternatives: []
  lexicon: HALOT
  rationale: The direct object marker אֶת is not translated. לַחְמִי is taken as the
    proper name 'Lahmi,' as reflected by the Masoretic pointing and the Chronicler's
    wording, rather than being split differently as in the Samuel parallel.
- source_word: אֲחִי גָּלְיָת
  chosen: the brother of Goliath
  alternatives:
  - Goliath's brother
  lexicon: HALOT
  rationale: The construct phrase is explicit and should be preserved. 'The brother
    of Goliath' keeps the relationship clear and mirrors the Hebrew structure.
- source_word: הַגִּתִּי
  chosen: the Gittite
  alternatives:
  - from Gath
  lexicon: HALOT
  rationale: The gentilic adjective is best rendered 'the Gittite,' a standard English
    form that preserves the ethnic/geographic designation tied to Gath.
- source_word: וְעֵץ חֲנִיתוֹ
  chosen: whose spear shaft
  alternatives:
  - and the wood of his spear
  - and his spear's shaft
  lexicon: HALOT
  rationale: Literally 'and the wood/shaft of his spear.' In idiomatic English, 'whose
    spear shaft' smoothly conveys the sense while retaining the concrete image.
- source_word: כִּמְנוֹר אֹרְגִים
  chosen: was like a weaver’s beam
  alternatives:
  - was like the beam of weavers
  lexicon: HALOT
  rationale: This is a familiar ancient comparison for a large spear shaft. 'Weaver’s
    beam' is clear, idiomatic, and close to the Hebrew.
