theological_decisions:
- issue: Relationship to the parallel account in 2 Samuel 21:19, where the text is
    famously difficult and can sound as though Elhanan killed Goliath himself
  chosen_reading: 'Follow the Chronicler''s explicit wording: Elhanan killed Lahmi,
    the brother of Goliath.'
  alternative_readings:
  - Harmonizing Samuel by emending or expanding its text to read 'the brother of Goliath'
    there as well
  - Reading Lahmi as part of 'Bethlehemite' in relation to the Samuel parallel
  rationale: The translation should reflect the plain sense of the Hebrew text in
    Chronicles rather than import the wording problem from Samuel into this verse.
    Chronicles explicitly names Lahmi as 'the brother of Goliath,' so the English
    should preserve that clarity while noting the parallel difficulty in a footnote.
  doctrine_reference: Translation philosophy §1, §3
