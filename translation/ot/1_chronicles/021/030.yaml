id: 1CH.21.30
reference: 1 Chronicles 21:30
source:
  edition: WLC
  text: וְ/לֹא יָכֹ֥ל דָּוִ֛יד לָ/לֶ֥כֶת לְ/פָנָ֖י/ו לִ/דְרֹ֣שׁ אֱלֹהִ֑ים כִּ֣י נִבְעַ֔ת מִ/פְּנֵ֕י חֶ֖רֶב מַלְאַ֥ךְ יְהוָֽה־׃ס
translation:
  text: But David could not go before it to seek God, because he was terrified by the sword of the angel of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before him,' if the pronoun is taken to refer to God rather than to the tabernacle at Gibeon.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/לֹא
  chosen: But ... not
  alternatives:
  - And ... not
  - Now ... not
  lexicon: HALOT
  rationale: The conjunction plus negation continues the narrative with mild contrast from the previous verse; 'But' captures the sense naturally in English without overstating it.
- source_word: יָכֹל
  chosen: could
  alternatives:
  - was able
  - was not able
  lexicon: HALOT
  rationale: The verb denotes ability. In English, 'could not' is the most natural rendering with the following infinitive.
- source_word: לָ/לֶכֶת
  chosen: go
  alternatives:
  - walk
  - come
  lexicon: HALOT
  rationale: The infinitive of הלך here expresses movement to a place; 'go' is idiomatic and contextually appropriate.
- source_word: לְ/פָנָי/ו
  chosen: before it
  alternatives:
  - before him
  - before that place
  lexicon: HALOT
  rationale: The pronominal suffix is masculine singular and refers most plausibly to the tabernacle/tent of meeting mentioned in the immediate context (v. 29), not to God or the angel. English requires an explicit object; 'it' preserves the likely antecedent without overexpansion.
- source_word: לִ/דְרֹשׁ אֱלֹהִים
  chosen: to seek God
  alternatives:
  - to inquire of God
  - to consult God
  lexicon: HALOT
  rationale: דרש with God commonly means seeking or inquiring of God in worship/prayer. 'Seek God' is concise, natural, and preserves the broader devotional sense rather than narrowing it merely to consultation.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here the conjunction gives the reason David could not go; 'because' is the clearest modern English equivalent.
- source_word: נִבְעַת
  chosen: was terrified
  alternatives:
  - was frightened
  - was dismayed
  - was startled
  lexicon: HALOT
  rationale: The Niphal conveys being overcome with terror or dread. 'Was terrified' best reflects the intensity of the fear in this context.
- source_word: מִ/פְּנֵי
  chosen: by
  alternatives:
  - because of
  - from before
  - at the presence of
  lexicon: HALOT
  rationale: 'With a fear verb, the preposition expresses the cause/source of fear. ''By'' is idiomatic in English: ''terrified by the sword...''.'
- source_word: חֶרֶב
  chosen: sword
  alternatives:
  - blade
  lexicon: HALOT
  rationale: The literal weapon is in view, recalling the angel's drawn sword in the narrative. 'Sword' should be retained.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מלאך can mean 'messenger' or 'angel,' but in this narrative a heavenly being is clearly intended. Per doctrine guidance, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name in accordance with the doctrine excerpt.
