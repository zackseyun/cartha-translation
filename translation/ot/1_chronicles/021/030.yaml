theological_decisions:
- issue: Referent of the pronoun in 'before it/him'
  chosen_reading: The pronoun refers to the tabernacle/tent at Gibeon rather than to God or the angel.
  alternative_readings:
  - The pronoun refers to God ('before him')
  - The pronoun refers more generally to the place of worship
  rationale: The immediate context in v. 29 mentions the tabernacle of the LORD and the altar at the high place in Gibeon, and v. 30 explains why David did not go there. Rendering 'before it' makes the narrative logic explicit while preserving the likely antecedent.
