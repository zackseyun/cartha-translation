id: 1CH.21.9
reference: 1 Chronicles 21:9
source:
  edition: WLC
  text: וַ/יְדַבֵּ֤ר יְהוָה֙ אֶל גָּ֔ד חֹזֵ֥ה דָוִ֖יד לֵ/אמֹֽר־׃
translation:
  text: And the LORD spoke to Gad, David’s seer, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive + דבר introduces the next narrative event. 'Spoke'
    is the standard and slightly more formal rendering for דבר with a personal indirect
    object, while 'said' is possible but less precise here given the following לֵאמֹר
    formula.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD,' following established English convention and reflecting Jewish reverence
    tradition.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech; 'to' is the natural
    English equivalent in this context.
- source_word: גָּד
  chosen: Gad
  rationale: Personal names are transliterated by standard English convention.
- source_word: חֹזֵה
  chosen: seer
  alternatives:
  - visionary
  - prophet
  lexicon: HALOT
  rationale: חֹזֶה denotes one who receives revelatory sight/visions. 'Seer' is the
    most direct and established English equivalent and preserves the distinction from
    other prophetic terms better than the broader 'prophet.'
- source_word: דָוִיד
  chosen: David’s
  alternatives:
  - of David
  rationale: The construct relationship is most naturally rendered in English with
    the possessive, 'David’s seer,' rather than the more wooden 'seer of David.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: This infinitive formula introduces direct discourse in standard Hebrew
    narrative. 'Saying' preserves the formal structure without over-paraphrasing.
