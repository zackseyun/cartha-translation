id: 1CH.21.24
reference: 1 Chronicles 21:24
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר הַ/מֶּ֤לֶךְ דָּוִיד֙ לְ/אָרְנָ֔ן לֹ֕א כִּֽי קָנֹ֥ה אֶקְנֶ֖ה בְּ/כֶ֣סֶף מָלֵ֑א כִּ֠י לֹא אֶשָּׂ֤א אֲשֶׁר לְ/ךָ֙ לַ/יהוָ֔ה וְ/הַעֲל֥וֹת עוֹלָ֖ה חִנָּֽם־־־׃
translation:
  text: But King David said to Ornan, “No, for I will surely buy it for the full price in silver, because I will not take for Yahweh what is yours, nor offer up a burnt offering for nothing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “for the full amount in silver.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “I will not take what is yours for the LORD and offer up a burnt offering for nothing.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא כִּי
  chosen: No, for
  alternatives:
  - No, but
  - No indeed, for
  lexicon: HALOT
  rationale: The sequence introduces a firm refusal followed by explanation. 'No, for' preserves both the negation and the causal force without sounding unnatural in English.
- source_word: קָנֹה אֶקְנֶה
  chosen: I will surely buy
  alternatives:
  - I will indeed buy
  - I will certainly purchase
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the action. 'Will surely buy' captures the emphatic commitment better than a simple 'will buy.'
- source_word: בְּכֶסֶף מָלֵא
  chosen: for the full price in silver
  alternatives:
  - with full silver
  - for full silver
  - for the full amount in silver
  lexicon: HALOT
  rationale: The phrase denotes full monetary payment, not a token sum. 'Full price in silver' is idiomatic English and preserves the material of payment.
- source_word: אֶשָּׂא
  chosen: I will not take
  alternatives:
  - I will not carry off
  - I will not lift up
  lexicon: HALOT
  rationale: Here נשׂא in context means taking or appropriating something belonging to another. 'Take' best fits the legal-economic sense in context.
- source_word: אֲשֶׁר לְךָ
  chosen: what is yours
  alternatives:
  - that which belongs to you
  - what belongs to you
  lexicon: HALOT
  rationale: This expresses possession plainly. 'What is yours' is natural and sufficiently precise.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - to the LORD
  lexicon: HALOT
  rationale: 'Given the sense of dedicating or presenting something in sacrifice, ''for the LORD'' fits the offering context. The divine name follows project policy: YHWH rendered ''the LORD.'''
- source_word: וְהַעֲלוֹת עוֹלָה
  chosen: nor offer up a burnt offering
  alternatives:
  - and offer a burnt offering
  - nor present a burnt offering
  lexicon: HALOT
  rationale: 'The infinitive construct continues David''s explanation: he refuses both to take another''s property and to offer sacrifice from it. ''Offer up a burnt offering'' preserves the sacrificial idiom of עלה/עולה.'
- source_word: חִנָּם
  chosen: for nothing
  alternatives:
  - without cost
  - free of charge
  lexicon: HALOT
  rationale: The adverb means gratuitously or without payment. 'For nothing' is idiomatic and matches David's point that worship should not cost him nothing.
