id: 1CH.21.7
reference: 1 Chronicles 21:7
source:
  edition: WLC
  text: וַ/יֵּ֨רַע֙ בְּ/עֵינֵ֣י הָ/אֱלֹהִ֔ים עַל הַ/דָּבָ֖ר הַ/זֶּ֑ה וַ/יַּ֖ךְ אֶת
    יִשְׂרָאֵֽל־־׃פ
translation:
  text: But this matter was evil in the sight of God, so he struck Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was displeasing in God's eyes.' The Hebrew literally says 'was evil
      in the eyes of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרַע
  chosen: was evil
  alternatives:
  - was displeasing
  - was bad
  lexicon: HALOT
  rationale: The verb from רעע here denotes that the matter was morally wrong or offensive.
    'Was evil' preserves the Hebrew's stronger evaluative force better than the softer
    idiom 'was displeasing,' while still reading naturally in English.
- source_word: בְּעֵינֵי הָאֱלֹהִים
  chosen: in the sight of God
  alternatives:
  - in God's eyes
  - before God
  lexicon: HALOT
  rationale: The idiom literally means 'in the eyes of God.' 'In the sight of God'
    is a clear, natural English equivalent that preserves the evaluative perspective
    of the Hebrew idiom.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The text has הָאֱלֹהִים, not the divine name YHWH. Therefore it should
    be rendered 'God,' not 'the LORD.'
- source_word: עַל הַדָּבָר הַזֶּה
  chosen: this matter
  alternatives:
  - this thing
  - this act
  lexicon: HALOT
  rationale: דבר is broad ('word, matter, thing, affair'). In this context, referring
    to David's census action, 'this matter' is idiomatic and sufficiently specific
    without over-interpreting.
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - smote
  - afflicted
  - struck down
  lexicon: HALOT
  rationale: נכה commonly means 'strike, smite.' 'Struck' is the most natural modern
    English rendering. 'Struck down' would over-specify lethality, which is not explicit
    in this verse alone, though the broader context involves plague and death.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: The direct object is the nation Israel. No expansion such as 'the people
    of Israel' is necessary here, since 'Israel' is clear and concise in context.
- source_word: וַ
  chosen: But ... so
  alternatives:
  - And ... and
  - And ... so
  rationale: The initial waw links this verse to the preceding narrative with mild
    contrast, since David's action has just been narrated and is now evaluated by
    God. Rendering the first waw as 'But' brings out that contrast in natural English;
    the second waw is rendered 'so' to express the resulting action.
