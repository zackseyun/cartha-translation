id: 1CH.21.2
reference: 1 Chronicles 21:2
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר דָּוִ֤יד אֶל יוֹאָב֙ וְ/אֶל שָׂרֵ֣י הָ/עָ֔ם לְכ֗וּ סִפְרוּ֙ אֶת
    יִשְׂרָאֵ֔ל מִ/בְּאֵ֥ר שֶׁ֖בַע וְ/עַד דָּ֑ן וְ/הָבִ֣יאוּ אֵלַ֔/י וְ/אֵדְעָ֖ה אֶת
    מִסְפָּרָֽ/ם־־־־־׃
translation:
  text: Then David said to Joab and to the commanders of the people, “Go, count Israel
    from Beersheba to Dan, and bring the total to me, so that I may know their number.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''from Beersheba to Dan'' means from one end of Israel to
      the other.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force.
- source_word: שָׂרֵי הָעָם
  chosen: the commanders of the people
  alternatives:
  - the leaders of the people
  - the officials of the people
  - the captains of the people
  lexicon: HALOT
  rationale: שָׂרִים commonly denotes officials, princes, or military leaders. In
    this census context alongside Joab, 'commanders' best fits the likely administrative-military
    sense without overstating rank.
- source_word: לְכוּ
  chosen: Go
  alternatives:
  - Go on
  - Proceed
  lexicon: HALOT
  rationale: A straightforward imperative of הלך. 'Go' is the natural concise English
    equivalent.
- source_word: סִפְרוּ
  chosen: count
  alternatives:
  - number
  - take a census of
  lexicon: HALOT
  rationale: The verb ספר here means to count or enumerate. 'Count' is clear and direct;
    'take a census of' is interpretive expansion, while 'number' can sound less idiomatic
    in this command.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the people of Israel
  lexicon: HALOT
  rationale: The direct object is simply 'Israel.' In context it refers to the nation/population,
    and English can preserve that collective sense without expansion.
- source_word: מִבְּאֵר שֶׁבַע וְעַד דָּן
  chosen: from Beersheba to Dan
  alternatives:
  - from Beer-sheba to Dan
  lexicon: HALOT
  rationale: This is the standard idiom for the full extent of the land, south to
    north. The conventional English place-name spellings are retained.
- source_word: וְהָבִיאוּ אֵלַי
  chosen: and bring the total to me
  alternatives:
  - and bring it to me
  - and report back to me
  lexicon: HALOT
  rationale: Literally 'bring to me,' but the implied object is the result/number
    of the census. 'Bring the total to me' makes the ellipsis explicit in idiomatic
    English without adding more than the context warrants.
- source_word: וְאֵדְעָה
  chosen: so that I may know
  alternatives:
  - that I may know
  - and I will know
  lexicon: HALOT
  rationale: The cohortative expresses purpose or desired result following the commands.
    'So that I may know' captures the volitional nuance better than a simple future.
- source_word: אֶת מִסְפָּרָם
  chosen: their number
  alternatives:
  - the number of them
  - their total
  lexicon: HALOT
  rationale: A natural rendering of the noun phrase. 'Their number' preserves the
    focus on the counted population.
