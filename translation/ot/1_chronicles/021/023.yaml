id: 1CH.21.23
reference: 1 Chronicles 21:23
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אָרְנָ֤ן אֶל דָּוִיד֙ קַֽח לָ֔/ךְ וְ/יַ֛עַשׂ אֲדֹנִ֥/י הַ/מֶּ֖לֶךְ
    הַ/טּ֣וֹב בְּ/עֵינָ֑י/ו רְאֵה֩ נָתַ֨תִּי הַ/בָּקָ֜ר לָֽ/עֹל֗וֹת וְ/הַ/מּוֹרִגִּ֧ים
    לָ/עֵצִ֛ים וְ/הַ/חִטִּ֥ים לַ/מִּנְחָ֖ה הַ/כֹּ֥ל נָתָֽתִּי־־׃
translation:
  text: And Ornan said to David, “Take it for yourself, and let my lord the king do
    what is good in his eyes. See, I have given the cattle for burnt offerings, the
    threshing sledges for wood, and the wheat for the grain offering. I have given
    it all.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'let my lord the king do what seems good to him.' The Hebrew idiom is
      literally 'what is good in his eyes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the oxen for burnt offerings.' The Hebrew term can refer broadly to
      cattle or more specifically to oxen.
    reason: lexical_alternative
  - marker: c
    text: That is, the threshing implements are offered to be used as fuel for the
      sacrifice.
    reason: cultural_note
  - marker: d
    text: Or 'offering' or 'tribute offering.' In sacrificial contexts, the Hebrew
      term commonly refers to a grain offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח לָךְ
  chosen: Take it for yourself
  alternatives:
  - Take it
  - Take for yourself
  lexicon: HALOT
  rationale: 'The imperative לקח with לָךְ expresses personal appropriation: David
    is invited to take the site/materials for his own use in the sacrificial purpose.
    ''Take it for yourself'' preserves the dative nuance without sounding unnatural.'
- source_word: וְיַעַשׂ אֲדֹנִי הַמֶּלֶךְ הַטּוֹב בְּעֵינָיו
  chosen: and let my lord the king do what is good in his eyes
  alternatives:
  - and may my lord the king do what seems good to him
  - and let my lord the king do what is right in his sight
  lexicon: HALOT
  rationale: This is a common idiom for permitting or inviting someone to act according
    to his judgment. 'What is good in his eyes' is more formally transparent to the
    Hebrew than the smoother idiom 'what seems good to him,' while remaining understandable.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: אדני here is a courtly address to David, not a divine title. 'My lord
    the king' is the standard respectful rendering in royal narrative and best fits
    the register.
- source_word: רְאֵה
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: The particle-like imperative introduces emphatic explanation. 'See' is
    natural modern English and preserves the discourse force better than archaic 'Behold.'
- source_word: הַבָּקָר לָעֹלוֹת
  chosen: the cattle for burnt offerings
  alternatives:
  - the oxen for burnt offerings
  - the cattle for the burnt offerings
  lexicon: HALOT
  rationale: בקר is a collective term for cattle/oxen. 'Cattle' preserves the collective
    sense and avoids over-specifying sex or number. עֹלוֹת is the standard sacrificial
    term 'burnt offerings.'
- source_word: הַמּוֹרִגִּים לָעֵצִים
  chosen: the threshing sledges for wood
  alternatives:
  - the threshing instruments for firewood
  - the threshing sledges as wood
  lexicon: HALOT
  rationale: מורגים refers to threshing implements/sledges. In context they are to
    be used as fuel, so 'for wood' means 'for firewood.' 'Threshing sledges' is concrete
    and historically plausible while still readable.
- source_word: הַחִטִּים לַמִּנְחָה
  chosen: the wheat for the grain offering
  alternatives:
  - the wheat for the offering
  - the wheat for the tribute offering
  lexicon: HALOT
  rationale: מנחה in sacrificial context is best rendered 'grain offering,' the conventional
    and contextually precise term. 'Wheat' is retained literally as the material supplied
    for that offering.
- source_word: הַכֹּל נָתָתִּי
  chosen: I have given it all
  alternatives:
  - I give it all
  - I have given all
  lexicon: HALOT
  rationale: The perfect summarizes Ornan's complete offer. English idiom prefers
    'I have given it all,' making explicit the totality of the gift.
