id: 1CH.21.4
reference: 1 Chronicles 21:4
source:
  edition: WLC
  text: וּ/דְבַר הַ/מֶּ֖לֶךְ חָזַ֣ק עַל יוֹאָ֑ב וַ/יֵּצֵ֣א יוֹאָ֗ב וַ/יִּתְהַלֵּךְ֙
    בְּ/כָל יִשְׂרָאֵ֔ל וַ/יָּבֹ֖א יְרוּשָׁלִָֽם־־־׃
translation:
  text: But the king’s word prevailed against Joab. So Joab went out and went throughout
    all Israel, and he came to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king’s command prevailed over Joab.'
    reason: lexical_alternative
  - marker: b
    text: Or 'traveled throughout all Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּדְבַר הַמֶּלֶךְ
  chosen: But the king’s word
  alternatives:
  - But the king’s command
  - Yet the king’s word
  lexicon: HALOT
  rationale: דָּבָר literally means 'word/matter.' In this context it refers to the
    king’s spoken directive. 'Word' preserves the Hebrew expression, while English
    readers can still understand it as an authoritative order. The conjunction is
    rendered 'But' to mark contrast with Joab’s objection in the preceding context.
- source_word: חָזַק עַל
  chosen: prevailed against
  alternatives:
  - was strong against
  - overruled
  lexicon: HALOT
  rationale: The idiom 'was strong over/against' conveys that the king’s directive
    overpowered Joab’s resistance. 'Prevailed against' is natural English and preserves
    the force of the Hebrew without over-paraphrasing.
- source_word: וַיֵּצֵא יוֹאָב
  chosen: So Joab went out
  alternatives:
  - Then Joab went out
  lexicon: HALOT
  rationale: יָצָא is the ordinary verb 'go out.' 'So' reflects the narrative consequence
    of the king’s prevailing word.
- source_word: וַיִּתְהַלֵּךְ בְּכָל יִשְׂרָאֵל
  chosen: went throughout all Israel
  alternatives:
  - traveled throughout all Israel
  - moved about in all Israel
  lexicon: HALOT
  rationale: The hitpael of הָלַךְ here suggests moving about or traveling around.
    'Went throughout all Israel' is concise, idiomatic, and fits the census-taking
    context without importing details not explicitly stated.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: HALOT
  rationale: A straightforward rendering of the distributive phrase, indicating the
    full national scope of Joab’s journey.
- source_word: וַיָּבֹא יְרוּשָׁלִָם
  chosen: and he came to Jerusalem
  alternatives:
  - and returned to Jerusalem
  lexicon: HALOT
  rationale: בּוֹא means 'come/enter.' Although 'returned' may fit the narrative implication,
    the Hebrew simply says 'came,' so the more literal rendering is preferred.
