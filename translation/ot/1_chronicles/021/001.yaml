theological_decisions:
- issue: Identity and sense of שָׂטָן
  chosen_reading: Satan as a personal adversarial figure
  alternative_readings:
  - an adversary
  - the accuser
  rationale: The Hebrew lexeme can denote an adversary in a generic sense, but in
    this context it most plausibly refers to Satan as a personal being. This also
    preserves the canonical tension with 2 Samuel 24:1 rather than resolving it away.
    Because the lexical ambiguity is real, the alternative is preserved in a footnote
    rather than adopted in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; Original-language
    primacy over translation tradition
