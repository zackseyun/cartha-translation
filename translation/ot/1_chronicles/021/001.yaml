id: 1CH.21.1
reference: 1 Chronicles 21:1
source:
  edition: WLC
  text: וַ/יַּֽעֲמֹ֥ד שָׂטָ֖ן עַל יִשְׂרָאֵ֑ל וַ/יָּ֨סֶת֙ אֶת דָּוִ֔יד לִ/מְנ֖וֹת
    אֶת יִשְׂרָאֵֽל־־־׃
translation:
  text: Then Satan stood up against Israel and incited David to count Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an adversary.' The Hebrew word satan can mean 'adversary' or function
      as the personal name/title 'Satan.'
    reason: lexical_alternative
  - marker: b
    text: 2 Samuel 24:1 attributes the incitement to the LORD's anger against Israel.
      Chronicles presents Satan as the immediate agent, preserving a theological tension
      rather than flattening either account.
    reason: cross_reference
lexical_decisions:
- source_word: וַיַּעֲמֹד
  chosen: stood up
  alternatives:
  - arose
  - stood
  lexicon: HALOT
  rationale: The verb עמד literally means 'stand' or 'take one's stand.' In this narrative
    context, 'stood up' preserves the concrete imagery while also conveying hostile
    initiative.
- source_word: שָׂטָן
  chosen: Satan
  alternatives:
  - an adversary
  - the accuser
  lexicon: HALOT
  rationale: Here the noun is used without the article yet functions as a personal
    designation in context and in longstanding canonical reception, especially in
    parallel with 2 Samuel 24:1. 'Satan' best reflects the likely referent in this
    verse, while preserving the lexical alternative in a footnote because the Hebrew
    term can also mean 'adversary.'
- source_word: עַל יִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - over Israel
  - concerning Israel
  lexicon: HALOT
  rationale: With עַל after a hostile verb, 'against' is the most natural English
    rendering and fits the adversarial sense of the clause.
- source_word: וַיָּסֶת
  chosen: incited
  alternatives:
  - moved
  - provoked
  - stirred up
  lexicon: HALOT
  rationale: The Hiphil of סות means to entice, incite, or provoke. 'Incited' clearly
    communicates causative prompting toward an action without overstating compulsion.
- source_word: לִמְנוֹת
  chosen: to count
  alternatives:
  - to number
  - to take a census of
  lexicon: HALOT
  rationale: מנה means 'count' or 'number.' 'Count' is clear modern English; 'take
    a census of' is interpretive and slightly more expansive than the Hebrew wording,
    though contextually related.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the people of Israel
  lexicon: HALOT
  rationale: The direct object is simply 'Israel.' Rendering it without expansion
    preserves the terseness of the Hebrew while naturally implying the nation/people
    in context.
