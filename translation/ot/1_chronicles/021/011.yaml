id: 1CH.21.11
reference: 1 Chronicles 21:11
source:
  edition: WLC
  text: וַ/יָּ֥בֹא גָ֖ד אֶל דָּוִ֑יד וַ/יֹּ֥אמֶר ל֛/וֹ כֹּֽה אָמַ֥ר יְהוָ֖ה קַבֶּל
    לָֽ/ךְ־־־׃
translation:
  text: So Gad came to David and said to him, “Thus says the LORD, ‘Choose for yourself—’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “Accept for yourself—”; the sense in context is an instruction
      to choose among the options stated in the following verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: From בוא, the common narrative verb for movement. 'Came' fits the English
    deictic perspective toward David and is the most natural narrative rendering here.
- source_word: גָד
  chosen: Gad
  rationale: Proper personal name; transliterated per translation philosophy.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard preposition marking movement toward a person. 'To' is idiomatic
    modern English.
- source_word: דָּוִיד
  chosen: David
  rationale: Proper personal name; standard English transliteration.
- source_word: וַיֹּאמֶר לוֹ
  chosen: said to him
  alternatives:
  - told him
  - said
  lexicon: HALOT
  rationale: אמר with indirect object pronoun is most straightforwardly 'said to him.'
    'Told him' is possible but slightly more interpretive.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Present-tense 'says' is conventional
    and natural in English for direct divine speech introductions, even though the
    Hebrew form is qatal.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH as 'the
    LORD.'
- source_word: קַבֶּל
  chosen: Choose
  alternatives:
  - Accept
  - Take for yourself
  - Receive
  lexicon: HALOT
  rationale: Imperative of קבל in this context introduces the three judgment options
    that follow in the next verse. 'Choose' best captures the contextual force, though
    the more literal sense is 'accept/receive.' Because the contextual rendering is
    interpretive, the more literal alternative is preserved in a footnote.
- source_word: לָךְ
  chosen: for yourself
  alternatives:
  - for you
  - to yourself
  lexicon: HALOT
  rationale: Dative pronoun with the imperative, naturally rendered 'for yourself'
    in English to reflect David's personal selection among the options.
