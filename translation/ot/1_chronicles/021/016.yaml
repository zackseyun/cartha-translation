id: 1CH.21.16
reference: 1 Chronicles 21:16
source:
  edition: WLC
  text: וַ/יִּשָּׂ֨א דָוִ֜יד אֶת עֵינָ֗י/ו וַ/יַּ֞רְא אֶת מַלְאַ֤ךְ יְהוָה֙ עֹמֵ֗ד בֵּ֤ין הָ/אָ֨רֶץ֙ וּ/בֵ֣ין הַ/שָּׁמַ֔יִם וְ/חַרְבּ֤/וֹ שְׁלוּפָה֙ בְּ/יָד֔/וֹ נְטוּיָ֖ה עַל יְרוּשָׁלִָ֑ם וַ/יִּפֹּ֨ל דָּוִ֧יד וְ/הַ/זְּקֵנִ֛ים מְכֻסִּ֥ים בַּ/שַּׂקִּ֖ים עַל פְּנֵי/הֶֽם־־־־׃
translation:
  text: David lifted up his eyes and saw the angel of Yahweh standing between the earth and the heavens, with his sword drawn in his hand, stretched out over Jerusalem. Then David and the elders, covered in sackcloth, fell on their faces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'between earth and heaven.' The Hebrew has 'between the earth and the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא ... עֵינָיו
  chosen: lifted up his eyes
  alternatives:
  - looked up
  lexicon: HALOT
  rationale: Retains the Hebrew idiom with natural English wording. 'Looked up' is possible, but 'lifted up his eyes' preserves the narrative solemnity and concrete imagery.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the angel of Yahweh
  lexicon: HALOT
  rationale: Standard rendering of the construct phrase. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֹמֵד
  chosen: standing
  alternatives:
  - stationed
  lexicon: HALOT
  rationale: The participle denotes a visible posture/location. 'Standing' is the plain and natural rendering here.
- source_word: בֵּין הָאָרֶץ וּבֵין הַשָּׁמַיִם
  chosen: between the earth and the heavens
  alternatives:
  - between earth and heaven
  - between the land and the heavens
  lexicon: HALOT
  rationale: '''Earth'' best fits the cosmic contrast with ''the heavens.'' The plural ''heavens'' reflects the Hebrew form שָּׁמַיִם more closely than singular ''heaven,'' while remaining readable.'
- source_word: וְחַרְבּוֹ שְׁלוּפָה
  chosen: with his sword drawn
  alternatives:
  - and his sword was drawn
  - with his unsheathed sword
  lexicon: HALOT
  rationale: Conveys the passive/resultative sense of שְׁלוּפָה in idiomatic English. 'Drawn' is the standard natural equivalent for a sword removed from its sheath.
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - in his grasp
  lexicon: HALOT
  rationale: Direct and literal rendering of the prepositional phrase.
- source_word: נְטוּיָה עַל יְרוּשָׁלִָם
  chosen: stretched out over Jerusalem
  alternatives:
  - extended over Jerusalem
  - reached out over Jerusalem
  lexicon: HALOT
  rationale: '''Stretched out'' captures the threatening extension of the sword toward the city and echoes common biblical judgment language.'
- source_word: וַיִּפֹּל ... עַל פְּנֵיהֶם
  chosen: fell on their faces
  alternatives:
  - fell facedown
  - prostrated themselves
  lexicon: HALOT
  rationale: This is the standard idiomatic equivalent for the Hebrew expression of prostration. It preserves both the physical action and reverential/humble force.
- source_word: וְהַזְּקֵנִים
  chosen: and the elders
  alternatives:
  - along with the elders
  lexicon: HALOT
  rationale: Straightforward rendering of the coordinated subject.
- source_word: מְכֻסִּים בַּשַּׂקִּים
  chosen: covered in sackcloth
  alternatives:
  - clothed in sackcloth
  - wrapped in sackcloth
  lexicon: HALOT
  rationale: The passive participle 'covered' matches the Hebrew form closely. 'Sackcloth' preserves the cultural and penitential significance without paraphrase.
