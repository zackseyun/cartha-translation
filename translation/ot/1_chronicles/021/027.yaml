id: 1CH.21.27
reference: 1 Chronicles 21:27
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ לַ/מַּלְאָ֔ךְ וַ/יָּ֥שֶׁב חַרְבּ֖/וֹ אֶל נְדָנָֽ/הּ־׃
translation:
  text: And the LORD spoke to the angel, and he returned his sword to its sheath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'said to the angel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'put his sword back into its sheath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name YHWH is rendered 'the LORD'
    rather than transliterated, following established reverential convention and the
    stated default.
- source_word: וַיֹּאמֶר
  chosen: spoke
  alternatives:
  - said
  - commanded
  lexicon: HALOT
  rationale: The verb אמר most basically means 'say.' In English, 'spoke to' is idiomatic
    with the following indirect object 'to the angel' and preserves the sense without
    over-specifying the content as a formal command, though the context implies divine
    direction.
- source_word: לַמַּלְאָךְ
  chosen: to the angel
  alternatives:
  - to the messenger
  lexicon: HALOT
  rationale: מלאך can mean 'messenger' or 'angel.' In this narrative context involving
    the heavenly being with the drawn sword, 'angel' is the clear contextual sense.
- source_word: וַיָּשֶׁב
  chosen: he returned
  alternatives:
  - he put back
  - he caused to return
  lexicon: HALOT
  rationale: The Hiphil of שוב commonly means 'cause to return' or 'bring back.' With
    'his sword' as object, 'he returned' is natural English and preserves the causative
    sense without awkwardness.
- source_word: חַרְבּוֹ
  chosen: his sword
  lexicon: HALOT
  rationale: 'Straightforward possessive construction: ''his sword,'' referring to
    the angel''s sword in the immediate context.'
- source_word: אֶל נְדָנָהּ
  chosen: to its sheath
  alternatives:
  - into its sheath
  - to its scabbard
  lexicon: HALOT
  rationale: נְדָן denotes a sheath or scabbard. 'Sheath' is the more common and readable
    modern English term. The 3fs suffix refers to the sword by grammatical gender,
    which English naturally renders as 'its.'
