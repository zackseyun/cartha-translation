theological_decisions:
- issue: Subject of וַיָּשֶׁב ('and he returned')
  chosen_reading: The subject is the angel, implied from the immediately preceding
    phrase 'to the angel.'
  alternative_readings:
  - The LORD returned the sword by command, with God as the grammatical subject
  rationale: The narrative sense strongly favors the angel as the one who physically
    puts back the sword in response to the LORD's word. English preserves this with
    'he returned his sword,' leaving the antecedent to be resolved by context.
  doctrine_reference: Preserve theological tension rather than resolve it only where
    the source is genuinely ambiguous; here the contextual reading is sufficiently
    clear.
