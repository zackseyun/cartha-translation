id: 1CH.21.19
reference: 1 Chronicles 21:19
source:
  edition: WLC
  text: וַ/יַּ֤עַל דָּוִיד֙ בִּ/דְבַר גָּ֔ד אֲשֶׁ֥ר דִּבֶּ֖ר בְּ/שֵׁ֥ם יְהוָֽה־׃
translation:
  text: So David went up at the word of Gad, which he had spoken in the name of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "according to the word of Gad."
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: "in the name of Yahweh"; the main text follows the project''s standard rendering of the divine name as "the LORD."'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - went
  - ascended
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend.' 'Went up' preserves the directional nuance without sounding overly formal. In context it refers to David proceeding to the threshing floor as commanded.
- source_word: בִּדְבַר
  chosen: at the word of
  alternatives:
  - according to the word of
  - by the word of
  - in response to the word of
  lexicon: HALOT
  rationale: The preposition ב with דָּבָר here expresses basis or accordance. 'At the word of' is idiomatic modern English that still reflects obedience to a spoken command.
- source_word: גָּד
  chosen: Gad
  rationale: Personal names are transliterated by standard convention per translation philosophy.
- source_word: אֲשֶׁר דִּבֶּר
  chosen: which he had spoken
  alternatives:
  - that he spoke
  - which he spoke
  lexicon: HALOT
  rationale: The relative clause refers back to Gad's word. 'Had spoken' gives natural English sense for the prior speech act relative to David's response, while remaining faithful to the Hebrew perfect.
- source_word: בְּשֵׁם יְהוָה
  chosen: in the name of the LORD
  alternatives:
  - by the authority of the LORD
  - in the LORD's name
  lexicon: HALOT
  rationale: This phrase indicates prophetic speech delivered under YHWH's authority. 'In the name of the LORD' is both accurate and idiomatic. Per doctrine, יְהוָה is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
