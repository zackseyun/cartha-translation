id: 1CH.21.28
reference: 1 Chronicles 21:28
source:
  edition: WLC
  text: בָּ/עֵ֣ת הַ/הִ֔יא בִּ/רְא֤וֹת דָּוִיד֙ כִּי עָנָ֣/הוּ יְהוָ֔ה בְּ/גֹ֖רֶן אָרְנָ֣ן הַ/יְבוּסִ֑י וַ/יִּזְבַּ֖ח שָֽׁם־׃
translation:
  text: At that time, when David saw that Yahweh had answered him at the threshing floor of Ornan the Jebusite, he sacrificed there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the LORD had responded to him.' The Hebrew verb can denote answering, especially in response to prayer or sacrifice.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  chosen: At that time
  alternatives:
  - At that moment
  - At that time then
  lexicon: HALOT
  rationale: A standard temporal expression. 'At that time' is natural modern English and preserves the narrative linkage without over-specifying immediacy.
- source_word: בִּרְאוֹת
  chosen: when ... saw
  alternatives:
  - on seeing
  - in seeing
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks a temporal circumstance. In English, 'when David saw' best conveys the sense idiomatically while retaining the causal-temporal connection.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what David saw: he saw ''that'' the LORD had answered him. ''Because'' would shift the syntax toward explicit causation more than the Hebrew requires.'
- source_word: עָנָהוּ
  chosen: had answered him
  alternatives:
  - answered him
  - responded to him
  lexicon: HALOT
  rationale: ענה in this context means to answer/respond, specifically to a prayer or sacrifice, as shown by the surrounding narrative. The pluperfect 'had answered' fits the English sequence after 'saw that' and reflects the completed divine response.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּגֹרֶן
  chosen: at the threshing floor
  alternatives:
  - on the threshing floor
  - in the threshing floor area
  lexicon: HALOT
  rationale: '''Threshing floor'' is the straightforward lexical sense of גֹּרֶן. ''At'' fits the locative sense naturally in English narrative.'
- source_word: אָרְנָן הַיְבוּסִי
  chosen: Ornan the Jebusite
  alternatives:
  - Ornan, the Jebusite
  lexicon: HALOT
  rationale: Personal name is transliterated; the gentilic is translated. The appositional form without comma is smooth and standard in English Bible style.
- source_word: וַיִּזְבַּח
  chosen: he sacrificed
  alternatives:
  - he offered sacrifices
  - he slaughtered for sacrifice
  lexicon: HALOT
  rationale: The verb זבח denotes offering sacrifice. 'He sacrificed' is concise and faithful; 'offered sacrifices' is possible but slightly more expansive than the singular verbal form requires.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: A simple locative adverb; 'there' preserves the Hebrew directly and naturally.
