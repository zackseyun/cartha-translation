id: 1CH.21.6
reference: 1 Chronicles 21:6
source:
  edition: WLC
  text: וְ/לֵוִי֙ וּ/בִנְיָמִ֔ן לֹ֥א פָקַ֖ד בְּ/תוֹכָ֑/ם כִּֽי נִתְעַ֥ב דְּבַר הַ/מֶּ֖לֶךְ
    אֶת יוֹאָֽב־־־׃
translation:
  text: But he did not count Levi and Benjamin among them, because the king’s command
    was detestable to Joab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king’s word was abhorrent to Joab.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לֵוִי
  chosen: But Levi
  alternatives:
  - And Levi
  - As for Levi
  lexicon: HALOT
  rationale: Proper tribal name transliterated as 'Levi.' The prefixed conjunction
    is rendered 'But' rather than simple 'And' to reflect the contrast with the preceding
    census totals and the exclusion stated here.
- source_word: וּ/בִנְיָמִן
  chosen: and Benjamin
  lexicon: HALOT
  rationale: Proper tribal name transliterated as 'Benjamin.' Coordinated with Levi
    as the two tribes omitted from the count.
- source_word: לֹא פָקַד
  chosen: did not count
  alternatives:
  - did not number
  - did not register
  - did not muster
  lexicon: HALOT
  rationale: פקד in census contexts commonly means to count or number. 'Did not count'
    is clear modern English and fits the immediate context of Joab's census.
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  - with them
  lexicon: HALOT
  rationale: Literally 'in their midst/among them.' Here it indicates that Levi and
    Benjamin were not included within the counted groups already under discussion.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason Joab omitted these tribes; 'because' is the most
    natural causal connector in contemporary English.
- source_word: נִתְעַב
  chosen: was detestable
  alternatives:
  - was abhorrent
  - was abominable
  - was loathsome
  lexicon: HALOT
  rationale: The Niphal form conveys that the matter was regarded as abhorrent. 'Detestable'
    preserves the strong negative force without sounding archaic.
- source_word: דְּבַר הַמֶּלֶךְ
  chosen: the king’s command
  alternatives:
  - the king’s word
  - the king’s matter
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'command.' In context it refers to
    the king's order to conduct the census, so 'command' best captures the sense.
- source_word: אֶת יוֹאָב
  chosen: to Joab
  alternatives:
  - in Joab's eyes
  - with Joab
  lexicon: HALOT
  rationale: After verbs of emotion or evaluation, אֶת can mark the person affected.
    Here the sense is that the king's command was detestable to Joab.
