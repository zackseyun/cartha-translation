id: 1CH.21.26
reference: 1 Chronicles 21:26
source:
  edition: WLC
  text: וַ/יִּבֶן֩ שָׁ֨ם דָּוִ֤יד מִזְבֵּ֨חַ֙ לַ/יהוָ֔ה וַ/יַּ֥עַל עֹל֖וֹת וּ/שְׁלָמִ֑ים וַ/יִּקְרָא֙ אֶל יְהוָ֔ה וַ/יַּֽעֲנֵ֤/הוּ בָ/אֵשׁ֙ מִן הַ/שָּׁמַ֔יִם עַ֖ל מִזְבַּ֥ח הָ/עֹלָֽה־־׃פ
translation:
  text: There David built an altar to Yahweh and offered up burnt offerings and peace offerings. He called on Yahweh, and he answered him with fire from heaven on the altar of burnt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' for 'peace offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: built
  alternatives:
  - constructed
  lexicon: HALOT
  rationale: The verb plainly denotes building/constructing. 'Built' is the natural English narrative equivalent and preserves the concrete action.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Locative adverb indicating the specific site just mentioned. 'There' is concise and sufficient in context.
- source_word: מִזְבֵּחַ
  chosen: altar
  lexicon: HALOT
  rationale: Standard rendering for the sacrificial structure; no contextual reason to vary.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Follows the project's default rendering of יְהוָה as 'the LORD.' The preposition marks dedication/direction, well represented by 'to.'
- source_word: וַיַּעַל
  chosen: offered up
  alternatives:
  - offered
  - presented
  lexicon: HALOT
  rationale: In sacrificial context עלה with offerings means to offer them up. 'Offered up' preserves the cultic nuance better than the flatter 'offered.'
- source_word: עֹלוֹת
  chosen: burnt offerings
  lexicon: HALOT
  rationale: Established and precise rendering for the whole-burnt sacrificial category.
- source_word: שְׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  lexicon: HALOT
  rationale: '''Peace offerings'' is the most recognizable and sufficiently literal rendering of the sacrificial term. ''Fellowship offerings'' is possible but more interpretive.'
- source_word: וַיִּקְרָא אֶל יְהוָה
  chosen: He called on the LORD
  alternatives:
  - He called to the LORD
  lexicon: HALOT
  rationale: In prayer context this idiom commonly means invoking/calling on God. 'Called on' is idiomatic English and fits the context of petition.
- source_word: וַיַּעֲנֵהוּ
  chosen: he answered him
  alternatives:
  - the LORD answered him
  lexicon: HALOT
  rationale: The subject is implicitly the LORD from context. English can preserve the Hebrew narrative flow with 'he answered him' without ambiguity after the preceding clause.
- source_word: בָאֵשׁ
  chosen: with fire
  alternatives:
  - by fire
  - through fire
  lexicon: HALOT
  rationale: The beth here is instrumental. 'With fire' is natural English and matches the sense of divine response manifested in fire.
- source_word: מִן הַשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  lexicon: HALOT
  rationale: Although morphologically plural in Hebrew, the idiomatic English equivalent is singular 'heaven' in this context.
- source_word: עַל מִזְבַּח הָעֹלָה
  chosen: upon the altar of burnt offering
  alternatives:
  - on the altar of burnt offering
  - upon the altar for burnt offering
  lexicon: HALOT
  rationale: The phrase identifies the altar associated with the burnt offering. 'Upon' fits the imagery of fire descending onto the altar; 'altar of burnt offering' is a standard cultic expression.
