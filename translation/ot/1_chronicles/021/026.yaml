theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nature of the divine response by fire
  chosen_reading: The text states that the LORD answered David by sending fire from heaven onto the altar, without expanding beyond the narrative claim.
  rationale: The translation preserves the miraculous event as narrated and avoids importing later theological explanation or symbolic interpretation not explicit in the verse.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; do not import doctrinal claims the text does not make'
