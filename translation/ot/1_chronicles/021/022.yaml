id: 1CH.21.22
reference: 1 Chronicles 21:22
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר דָּוִ֜יד אֶל אָרְנָ֗ן תְּנָ/ה לִּ/י֙ מְק֣וֹם הַ/גֹּ֔רֶן וְ/אֶבְנֶה
    בּ֥/וֹ מִזְבֵּ֖חַ לַ/יהוָ֑ה בְּ/כֶ֤סֶף מָלֵא֙ תְּנֵ֣/הוּ לִ֔/י וְ/תֵעָצַ֥ר הַ/מַּגֵּפָ֖ה
    מֵ/עַ֥ל הָ/עָֽם־־־׃
translation:
  text: Then David said to Ornan, “Give me the place of the threshing floor, so that
    I may build on it an altar to the LORD. Give it to me for the full price, so that
    the plague may be stopped from upon the people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “for full silver,” that is, for the full amount rather
      than as a gift.
    reason: lexical_alternative
  - marker: b
    text: Or, “so that the plague may be stopped from the people.” The Hebrew reads
      more literally, “from upon the people.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מְקוֹם
  chosen: place
  alternatives:
  - site
  lexicon: HALOT
  rationale: מקום denotes a place or location. 'Place' is straightforward modern English
    and fits the request for the specific location of the threshing floor.
- source_word: הַגֹּרֶן
  chosen: the threshing floor
  lexicon: HALOT
  rationale: גורן is the standard term for a threshing floor, the prepared area where
    grain is threshed. The definite article is preserved.
- source_word: וְאֶבְנֶה בּוֹ
  chosen: so that I may build on it
  alternatives:
  - and I will build on it
  - that I may build on it
  lexicon: HALOT
  rationale: The cohortative expresses David's intention/purpose. 'So that I may build
    on it' captures the volitional nuance in natural English.
- source_word: מִזְבֵּחַ
  chosen: an altar
  lexicon: HALOT
  rationale: Standard rendering for מזבח, the structure for sacrifice/worship.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The lamed here marks relation/dedication;
    'to the LORD' is idiomatic with 'altar' in English and preserves the sense of
    dedication.
- source_word: בְּכֶסֶף מָלֵא
  chosen: for the full price
  alternatives:
  - for full silver
  - for the full amount of money
  lexicon: HALOT
  rationale: Literally 'with full silver/money.' The idiom means full payment, not
    a gift or discount. 'For the full price' is clear and natural while preserving
    the commercial force.
- source_word: תְּנֵהוּ לִי
  chosen: Give it to me
  alternatives:
  - sell it to me
  lexicon: HALOT
  rationale: The verb is still 'give,' but in context with 'for the full price' it
    clearly refers to transferring ownership by payment. The main text keeps the lexical
    repetition of נתן as 'give'; the commercial implication is carried by the price
    phrase.
- source_word: וְתֵעָצַר
  chosen: so that ... may be stopped
  alternatives:
  - that ... may be restrained
  - and ... may be halted
  lexicon: HALOT
  rationale: The Niphal/jussive-like form from עצר conveys being restrained or stopped.
    'May be stopped' is idiomatic for a plague and fits the purpose clause.
- source_word: הַמַּגֵּפָה
  chosen: the plague
  alternatives:
  - the affliction
  lexicon: HALOT
  rationale: מגפה commonly denotes a plague or pestilence, especially in judgment
    contexts. 'Plague' is the most direct rendering here.
- source_word: מֵעַל הָעָם
  chosen: from upon the people
  alternatives:
  - from the people
  - away from the people
  lexicon: HALOT
  rationale: The Hebrew preposition is literally 'from upon,' which pictures the plague
    resting on the people. The translation preserves that imagery while remaining
    understandable.
- source_word: אָרְנָן
  chosen: Ornan
  alternatives:
  - Araunah
  lexicon: HALOT
  rationale: The Chronicles form of the name is אָרְנָן, properly transliterated 'Ornan.'
    'Araunah' belongs to the Samuel parallel, not this Hebrew form.
