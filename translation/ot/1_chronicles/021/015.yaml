id: 1CH.21.15
reference: 1 Chronicles 21:15
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֩ הָ/אֱלֹהִ֨ים מַלְאָ֥ךְ לִֽ/ירוּשָׁלִַם֮ לְ/הַשְׁחִיתָ/הּ֒ וּ/כְ/הַשְׁחִ֗ית
    רָאָ֤ה יְהוָה֙ וַ/יִּנָּ֣חֶם עַל הָֽ/רָעָ֔ה וַ/יֹּ֨אמֶר לַ/מַּלְאָ֤ךְ הַ/מַּשְׁחִית֙
    רַ֔ב עַתָּ֖ה הֶ֣רֶף יָדֶ֑/ךָ וּ/מַלְאַ֤ךְ יְהוָה֙ עֹמֵ֔ד עִם גֹּ֖רֶן אָרְנָ֥ן
    הַ/יְבוּסִֽי׀׀־־׃ס
translation:
  text: And God sent an angel to Jerusalem to destroy it, but as he was destroying
    it, the LORD saw and relented concerning the calamity, and he said to the destroying
    angel, “Enough; now withdraw your hand.” And the angel of the LORD was standing
    by the threshing floor of Ornan the Jebusite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the disaster' for 'the calamity'; Hebrew רָעָה here refers to destructive
      judgment, not moral evil.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'stay your hand' for 'withdraw your hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the gods
  lexicon: HALOT
  rationale: With the article and singular verbal context, this clearly refers to
    the God of Israel. 'God' is the natural English rendering here.
- source_word: מַלְאָךְ
  chosen: angel
  alternatives:
  - messenger
  lexicon: HALOT
  rationale: In this judgment context involving a heavenly being sent by God, 'angel'
    best reflects the referent rather than the broader 'messenger'.
- source_word: לִירוּשָׁלִַם
  chosen: to Jerusalem
  alternatives:
  - against Jerusalem
  lexicon: HALOT
  rationale: The preposition ל marks direction toward the city. In English, 'to Jerusalem'
    preserves the movement; the hostile purpose is then expressed by the infinitive
    'to destroy it'.
- source_word: לְהַשְׁחִיתָהּ
  chosen: to destroy it
  alternatives:
  - to ruin it
  - to bring it to destruction
  lexicon: HALOT
  rationale: The Hiphil of שׁחת here denotes destructive action against the city.
    'Destroy it' is direct and idiomatic.
- source_word: וּכְהַשְׁחִית
  chosen: but as he was destroying it
  alternatives:
  - and when he began to destroy
  - and as he destroyed
  lexicon: HALOT
  rationale: The construction marks contemporaneous action. Rendering it progressively
    in English captures the interruption of the destruction already underway. 'But'
    helps signal the turn in the narrative.
- source_word: רָאָה יְהוָה
  chosen: the LORD saw
  alternatives:
  - the LORD looked
  lexicon: HALOT
  rationale: Straightforward rendering of ראה. Per doctrine, יְהוָה is rendered 'the
    LORD'.
- source_word: וַיִּנָּחֶם עַל הָרָעָה
  chosen: relented concerning the calamity
  alternatives:
  - was sorry about the disaster
  - changed his mind about the evil
  lexicon: HALOT
  rationale: נחם in this context conveys relenting or being moved to withhold further
    judgment. הָרָעָה here refers to disaster/calamity, not moral evil. 'Relented
    concerning the calamity' preserves the anthropopathic expression without importing
    philosophical claims beyond the text.
- source_word: הָרָעָה
  chosen: the calamity
  alternatives:
  - the disaster
  - the harm
  lexicon: HALOT
  rationale: In judgment contexts רָעָה often denotes disaster rather than moral evil.
    'Calamity' fits the register and avoids misunderstanding.
- source_word: הַמַּשְׁחִית
  chosen: the destroying angel
  alternatives:
  - the destroyer angel
  - the angel who was destroying
  lexicon: HALOT
  rationale: The participle functions attributively with מַלְאָךְ. 'Destroying angel'
    is concise, natural English and preserves the active force.
- source_word: רַב
  chosen: Enough
  alternatives:
  - It is enough
  - Too much
  lexicon: HALOT
  rationale: Here רַב is an exclamation meaning 'enough' or 'sufficient.' The concise
    exclamation suits the direct speech.
- source_word: הֶרֶף יָדֶךָ
  chosen: withdraw your hand
  alternatives:
  - stay your hand
  - let your hand rest
  - stop your hand
  lexicon: HALOT
  rationale: The idiom means to cease the action being carried out by the hand. 'Withdraw
    your hand' is clear modern English; 'stay your hand' is traditional but more archaic.
- source_word: וּמַלְאַךְ יְהוָה
  chosen: And the angel of the LORD
  alternatives:
  - Now the angel of the LORD
  lexicon: HALOT
  rationale: Construct phrase with divine name. 'The angel of the LORD' is the standard
    transparent rendering; no attempt is made to resolve the figure's ontology beyond
    the text.
- source_word: עֹמֵד עִם
  chosen: was standing by
  alternatives:
  - was standing near
  - stood with
  lexicon: HALOT
  rationale: עִם can mean 'with,' but spatially here it indicates location near the
    threshing floor. 'Was standing by' is idiomatic and contextually precise.
- source_word: גֹּרֶן
  chosen: threshing floor
  alternatives:
  - threshing place
  lexicon: HALOT
  rationale: Standard rendering for the agricultural site.
- source_word: אָרְנָן הַיְבוּסִי
  chosen: Ornan the Jebusite
  lexicon: HALOT
  rationale: Personal name is transliterated per project philosophy; gentilic rendered
    straightforwardly as 'the Jebusite'.
