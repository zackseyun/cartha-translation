theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's contested-terms table specifies 'the LORD' as the default
    rendering for YHWH, following Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Anthropopathic language in וַיִּנָּחֶם עַל הָרָעָה
  chosen_reading: relented concerning the calamity
  alternative_readings:
  - repented of the evil
  - changed his mind about the disaster
  rationale: The translation preserves the text's portrayal of God responding within
    the narrative without flattening it into either a denial of divine responsiveness
    or a philosophical claim that exceeds the verse. 'Relented' is idiomatic and theologically
    careful while remaining faithful to the Hebrew.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension
    rather than resolve it
- issue: Identity of מַלְאַךְ יְהוָה
  chosen_reading: the angel of the LORD
  alternative_readings:
  - the LORD himself in angelic manifestation
  - a created angelic messenger
  rationale: The phrase is translated literally without resolving the debated theological
    identity of the figure. This preserves the textual wording and avoids importing
    a doctrinal conclusion not explicit in the verse.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Never import doctrinal
    claims the text does not make'
