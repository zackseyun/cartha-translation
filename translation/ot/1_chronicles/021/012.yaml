id: 1CH.21.12
reference: 1 Chronicles 21:12
source:
  edition: WLC
  text: אִם שָׁל֨וֹשׁ שָׁנִ֜ים רָעָ֗ב וְ/אִם שְׁלֹשָׁ֨ה חֳדָשִׁ֜ים נִסְפֶּ֥ה מִ/פְּנֵי צָרֶי/ךָ֮ וְ/חֶ֣רֶב אוֹיְבֶ֣/ךָ לְ/מַשֶּׂגֶת֒ וְ/אִם שְׁלֹ֣שֶׁת יָ֠מִים חֶ֣רֶב יְהוָ֤ה וְ/דֶ֨בֶר֙ בָּ/אָ֔רֶץ וּ/מַלְאַ֣ךְ יְהוָ֔ה מַשְׁחִ֖ית בְּ/כָל גְּב֣וּל יִשְׂרָאֵ֑ל וְ/עַתָּ֣ה רְאֵ֔ה מָֽה אָשִׁ֥יב אֶת שֹׁלְחִ֖/י דָּבָֽר־־־׀־־־־׃פ
translation:
  text: either three years of famine, or three months of being swept away before your foes while the sword of your enemies overtakes you, or three days of the sword of Yahweh, even pestilence in the land, with the angel of Yahweh destroying throughout all the territory of Israel. Now consider what answer I should return to the one who sent me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being consumed' or 'perishing before your enemies'; the Hebrew participle can denote being brought to ruin in battle.
    reason: lexical_alternative
  - marker: b
    text: Or 'plague'; the Hebrew word denotes epidemic disease sent as judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָעָב
  chosen: famine
  alternatives:
  - hunger
  lexicon: HALOT
  rationale: Standard rendering for covenantal/national food shortage; 'famine' is the natural English equivalent in this judgment context.
- source_word: נִסְפֶּה
  chosen: being swept away
  alternatives:
  - being consumed
  - perishing
  - being defeated
  lexicon: HALOT
  rationale: The Niphal participle conveys being brought to ruin or swept off. 'Swept away' fits the military pursuit context and avoids over-specifying death alone.
- source_word: מִפְּנֵי צָרֶיךָ
  chosen: before your foes
  alternatives:
  - from before your adversaries
  - before your enemies
  lexicon: HALOT
  rationale: Idiomatic military expression for fleeing or being routed in the presence of hostile forces. 'Foes' avoids repetition with the following אוֹיְבֶיךָ while preserving sense.
- source_word: חֶרֶב אוֹיְבֶיךָ
  chosen: the sword of your enemies
  alternatives:
  - your enemies' sword
  lexicon: HALOT
  rationale: Conventional and clear rendering of the construct phrase, preserving the martial imagery.
- source_word: לְמַשֶּׂגֶת
  chosen: overtakes you
  alternatives:
  - catches up with you
  - reaches you
  lexicon: HALOT
  rationale: From נשׂג/השיג, the sense is attaining or overtaking in pursuit. 'Overtakes you' is vivid and idiomatic in English.
- source_word: חֶרֶב יְהוָה
  chosen: the sword of the LORD
  alternatives:
  - the LORD's sword
  lexicon: HALOT
  rationale: Preserves the construct imagery and the theological contrast with 'the sword of your enemies.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by doctrine table for the divine name YHWH.
- source_word: דֶבֶר
  chosen: pestilence
  alternatives:
  - plague
  - disease
  lexicon: HALOT
  rationale: In judgment contexts דבר commonly denotes epidemic plague. 'Pestilence' preserves the gravity and traditional semantic range without being archaic in this setting.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: The phrase regularly denotes an angelic agent in narrative contexts. 'Angel' is the standard and contextually appropriate rendering.
- source_word: מַשְׁחִית
  chosen: destroying
  alternatives:
  - bringing destruction
  - acting destructively
  lexicon: HALOT
  rationale: Hiphil participle of שׁחת here functions verbally for the angel's ongoing action. 'Destroying' is concise and natural.
- source_word: בְּכָל גְּבוּל יִשְׂרָאֵל
  chosen: throughout all the territory of Israel
  alternatives:
  - within all the borders of Israel
  - through all Israel's territory
  lexicon: HALOT
  rationale: גְּבוּל can mean border or territory. Here the sense is the full extent of the land, not merely boundary lines.
- source_word: רְאֵה
  chosen: consider
  alternatives:
  - see
  - look
  lexicon: HALOT
  rationale: In this discourse setting the imperative asks David to reflect and decide, not merely to look physically. 'Consider' captures the pragmatic force.
- source_word: מָה אָשִׁיב ... דָּבָר
  chosen: what answer I should return
  alternatives:
  - what word I should bring back
  - what I should answer
  lexicon: HALOT
  rationale: Hebrew 'return a word' is an idiom for giving a reply. 'What answer I should return' preserves the idiom's sense in natural English.
- source_word: שֹׁלְחִי
  chosen: the one who sent me
  alternatives:
  - my sender
  - him who sent me
  lexicon: HALOT
  rationale: Natural English rendering of the participial form with first-person suffix, referring to Gad's sender.
