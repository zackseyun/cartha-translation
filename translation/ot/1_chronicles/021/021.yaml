theological_decisions:
- issue: Whether Ornan's act should be rendered in a way that implies worship of David
  chosen_reading: bowed down before David
  alternative_readings:
  - worshiped David
  - paid homage to David
  rationale: The Hebrew verb השתחוה can denote bowing before a human superior or worship
    depending on context. Since the object is David and the scene is courtly deference,
    the translation should preserve the act of prostration without implying divine
    worship.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
