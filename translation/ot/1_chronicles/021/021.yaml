id: 1CH.21.21
reference: 1 Chronicles 21:21
source:
  edition: WLC
  text: וַ/יָּבֹ֥א דָוִ֖יד עַד אָרְנָ֑ן וַ/יַּבֵּ֤ט אָרְנָן֙ וַ/יַּ֣רְא אֶת דָּוִ֔יד
    וַ/יֵּצֵא֙ מִן הַ/גֹּ֔רֶן וַ/יִּשְׁתַּ֧חוּ לְ/דָוִ֛יד אַפַּ֖יִם אָֽרְצָ/ה־־־׃
translation:
  text: When David came to Ornan, Ornan looked and saw David, and he went out from
    the threshing floor and bowed down before David with his face to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prostrated himself before David.' The Hebrew describes a full bow with
      the face to the ground.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come/go' depending on viewpoint. In English
    narrative with David approaching Ornan, 'came' is the most natural rendering.
- source_word: עַד
  chosen: to
  alternatives:
  - as far as
  - up to
  lexicon: HALOT
  rationale: Here עַד marks movement toward a person. 'To' is idiomatic English and
    captures the sense without woodenly preserving the preposition.
- source_word: וַיַּבֵּט
  chosen: looked
  alternatives:
  - looked up
  - gazed
  lexicon: HALOT
  rationale: נבט denotes directing one's gaze. 'Looked' is the clearest base rendering;
    'looked up' is possible contextually but not explicit in the Hebrew.
- source_word: וַיַּרְא אֶת דָּוִיד
  chosen: saw David
  alternatives:
  - caught sight of David
  lexicon: HALOT
  rationale: ראה is the standard verb 'see.' The sequence 'looked and saw David' preserves
    the Hebrew's two-step narration rather than collapsing it.
- source_word: וַיֵּצֵא מִן הַגֹּרֶן
  chosen: went out from the threshing floor
  alternatives:
  - came out of the threshing floor
  lexicon: HALOT
  rationale: יצא means 'go out/come out.' 'Went out from the threshing floor' preserves
    the movement and the preposition מן clearly.
- source_word: הַגֹּרֶן
  chosen: the threshing floor
  lexicon: HALOT
  rationale: גורן is the standard term for a threshing floor, the agricultural site
    central to this narrative.
- source_word: וַיִּשְׁתַּחוּ לְדָוִיד
  chosen: bowed down before David
  alternatives:
  - prostrated himself before David
  - paid homage to David
  lexicon: HALOT
  rationale: השתחוה denotes bowing/prostration. 'Bowed down before' communicates the
    physical act without overstating it as worship; 'paid homage' is interpretive
    and less concrete.
- source_word: אַפַּיִם אָרְצָה
  chosen: with his face to the ground
  alternatives:
  - with his nostrils to the ground
  - face down to the ground
  lexicon: HALOT
  rationale: Literally 'nostrils/faces earthward,' this idiom describes full prostration.
    'With his face to the ground' is the standard natural English equivalent.
