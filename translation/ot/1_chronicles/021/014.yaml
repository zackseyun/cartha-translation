id: 1CH.21.14
reference: 1 Chronicles 21:14
source:
  edition: WLC
  text: וַ/יִּתֵּ֧ן יְהוָ֛ה דֶּ֖בֶר בְּ/יִשְׂרָאֵ֑ל וַ/יִּפֹּל֙ מִ/יִּשְׂרָאֵ֔ל שִׁבְעִ֥ים
    אֶ֖לֶף אִֽישׁ׃
translation:
  text: So the LORD sent a plague on Israel, and seventy thousand men of Israel fell.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pestilence.' The Hebrew term denotes a deadly outbreak, often in the
      context of divine judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as 'the LORD' per doctrine default for the divine name, following
    established English convention that reflects reverential substitution while distinguishing
    the covenant name from other divine titles.
- source_word: וַיִּתֵּן
  chosen: sent
  alternatives:
  - gave
  - put
  lexicon: HALOT
  rationale: Although the verb is literally 'gave,' in English the idiom with דֶּבֶר
    is more naturally expressed as 'sent a plague.' This preserves the causative force
    without wooden phrasing.
- source_word: דֶּבֶר
  chosen: a plague
  alternatives:
  - pestilence
  - disease
  lexicon: HALOT
  rationale: דֶּבֶר commonly denotes pestilence/plague as a divinely sent outbreak.
    'Plague' is clear modern English and carries the judgment context better than
    the more archaic 'pestilence.'
- source_word: בְּיִשְׂרָאֵל
  chosen: on Israel
  alternatives:
  - against Israel
  - in Israel
  lexicon: HALOT
  rationale: With דֶּבֶר, the preposition is best rendered idiomatically as 'on Israel,'
    expressing the plague's coming upon the people. 'In Israel' is possible but less
    natural in English here.
- source_word: וַיִּפֹּל
  chosen: fell
  alternatives:
  - died
  - were struck down
  lexicon: HALOT
  rationale: The verb literally means 'fell.' Retaining 'fell' preserves the Hebrew
    idiom for death in judgment while remaining intelligible in English. More explicit
    renderings like 'died' interpret the idiom more fully than necessary.
- source_word: מִיִּשְׂרָאֵל
  chosen: of Israel
  alternatives:
  - from Israel
  - among Israel
  lexicon: HALOT
  rationale: In the phrase 'seventy thousand men of Israel,' 'of Israel' is the most
    natural English expression of membership/source. 'From Israel' is possible but
    less idiomatic.
- source_word: שִׁבְעִים אֶלֶף אִישׁ
  chosen: seventy thousand men
  alternatives:
  - seventy thousand people
  - seventy thousand menfolk
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'man/men' (אִישׁ used collectively after the
    number). Per the gender-accurate policy, 'men' is preferred over the gender-neutral
    'people,' unless context clearly broadens the reference beyond the source wording.
