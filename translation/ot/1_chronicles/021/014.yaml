theological_decisions:
- issue: Divine agency in judgment
  chosen_reading: So the LORD sent a plague on Israel
  alternative_readings:
  - So the LORD allowed a plague on Israel
  rationale: The Hebrew straightforwardly attributes the action to the LORD with no mitigating verb such as 'allowed.' The translation preserves the text's direct statement of divine judgment rather than softening it theologically.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
