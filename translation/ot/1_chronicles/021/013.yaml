id: 1CH.21.13
reference: 1 Chronicles 21:13
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר דָּוִ֛יד אֶל גָּ֖ד צַר לִ֣/י מְאֹ֑ד אֶפְּלָה נָּ֣א בְ/יַד יְהוָ֗ה כִּֽי רַבִּ֤ים רַחֲמָי/ו֙ מְאֹ֔ד וּ/בְ/יַד אָדָ֖ם אַל אֶפֹּֽל־־־־־־־׃
translation:
  text: Then David said to Gad, “I am in great distress. Please let me fall into the hand of Yahweh, for his mercies are very great; but do not let me fall into the hand of man.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'human hands.' The Hebrew reads singular 'the hand of man,' contrasting human power with the hand of the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַר לִי מְאֹד
  chosen: I am in great distress
  alternatives:
  - It is very distressing to me
  - I am in a great strait
  lexicon: HALOT
  rationale: The idiom expresses severe anguish or tightness of circumstance. 'I am in great distress' is natural modern English and preserves the emotional force without archaic wording.
- source_word: אֶפְּלָה נָּא
  chosen: Please let me fall
  alternatives:
  - Please, let me fall
  - May I fall, please
  lexicon: HALOT
  rationale: The cohortative with נָא expresses a polite, urgent request. 'Please let me fall' captures both the volitional nuance and the plea.
- source_word: בְיַד יְהוָה
  chosen: into the hand of the LORD
  alternatives:
  - into the LORD's hand
  lexicon: HALOT
  rationale: The idiom 'into the hand of' denotes being given over to someone's power or judgment. Retaining 'hand' preserves the Hebrew imagery. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name, preserving established reverential convention and the pattern reflected in many English translations.
- source_word: כִּי רַבִּים רַחֲמָיו מְאֹד
  chosen: for his mercies are very great
  alternatives:
  - for his compassion is very great
  - for his mercy is exceedingly abundant
  lexicon: HALOT
  rationale: רַחֲמִים often denotes compassion or mercies. The plural form is well represented by 'mercies,' and 'very great' reflects both רַבִּים and מְאֹד without over-paraphrase.
- source_word: וּבְיַד אָדָם
  chosen: but do not let me fall into the hand of man
  alternatives:
  - but do not let me fall into human hands
  - but into the hand of man let me not fall
  lexicon: HALOT
  rationale: The contrast is between divine judgment and human agency. 'Man' matches the singular אָדָם and follows the project's gender-accurate policy; the idiom 'hand of man' is preserved for literary and semantic parallelism with 'hand of the LORD.'
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - human
  lexicon: HALOT
  rationale: Here אָדָם refers generically to a human agent in contrast with the LORD, not humanity collectively. 'Man' preserves the singular contrast and aligns with the doctrine's gender-accurate principle.
- source_word: אַל אֶפֹּל
  chosen: do not let me fall
  alternatives:
  - let me not fall
  - may I not fall
  lexicon: HALOT
  rationale: The negative particle with the first-person verb expresses David's plea that this outcome not occur. English idiom is best conveyed with 'do not let me fall' in parallel with the prior request.
