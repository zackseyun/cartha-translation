id: 1CH.21.5
reference: 1 Chronicles 21:5
source:
  edition: WLC
  text: וַ/יִּתֵּ֥ן יוֹאָ֛ב אֶת מִסְפַּ֥ר מִפְקַד הָ/עָ֖ם אֶל דָּוִ֑יד וַ/יְהִ֣י כָֽל
    יִשְׂרָאֵ֡ל אֶ֣לֶף אֲלָפִים֩ וּ/מֵאָ֨ה אֶ֤לֶף אִישׁ֙ שֹׁ֣לֵֽף חֶ֔רֶב וִֽ/יהוּדָ֕ה
    אַרְבַּע֩ מֵא֨וֹת וְ/שִׁבְעִ֥ים אֶ֛לֶף אִ֖ישׁ שֹׁ֥לֵֽף חָֽרֶב־־־־׃
translation:
  text: Joab gave the number of the census of the people to David. All Israel was
    1,100,000 men drawing the sword, and Judah was 470,000 men drawing the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a thousand thousands and a hundred thousand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְפַּר מִפְקַד הָעָם
  chosen: the number of the census of the people
  alternatives:
  - the number of the mustered people
  - the total of the enrollment of the people
  lexicon: HALOT
  rationale: The construct chain combines מִסְפַּר ('number, total') with מִפְקַד
    ('mustering, census, enrollment'). 'The number of the census of the people' preserves
    both nouns rather than collapsing them into a single English term, while remaining
    readable.
- source_word: וַיְהִי כָל יִשְׂרָאֵל
  chosen: All Israel was
  alternatives:
  - the whole of Israel amounted to
  - all Israel came to
  lexicon: HALOT
  rationale: The clause introduces the resulting total. 'All Israel was' is a natural
    English way to render the Hebrew existential/resultative construction while keeping
    the collective singular sense.
- source_word: אֶלֶף אֲלָפִים וּמֵאָה אֶלֶף
  chosen: 1,100,000
  alternatives:
  - one million one hundred thousand
  lexicon: HALOT
  rationale: The Hebrew literally reads 'a thousand thousands and a hundred thousand.'
    Rendering with Arabic numerals improves readability without loss of meaning.
- source_word: אִישׁ
  chosen: men
  alternatives:
  - man
  lexicon: HALOT
  rationale: Here אִישׁ is distributive/collective in a military census context. 'Men'
    accurately reflects the masculine military population and follows the gender-accurate
    policy.
- source_word: שֹׁלֵף חֶרֶב
  chosen: drawing the sword
  alternatives:
  - bearing the sword
  - wielding the sword
  lexicon: HALOT
  rationale: The participle שֹׁלֵף is literally 'drawing' or 'unsheathing.' 'Drawing
    the sword' preserves the vivid military idiom more closely than the smoother but
    less literal 'bearing arms.'
- source_word: וִיהוּדָה
  chosen: and Judah was
  alternatives:
  - and Judah numbered
  - while Judah was
  lexicon: HALOT
  rationale: The conjunction links a second census total parallel to 'All Israel was.'
    Supplying 'was' in English is necessary for a complete clause and reflects the
    implied verb from the previous phrase.
- source_word: אַרְבַּע מֵאוֹת וְשִׁבְעִים אֶלֶף
  chosen: 470,000
  alternatives:
  - four hundred seventy thousand
  lexicon: HALOT
  rationale: Arabic numerals present the large number clearly and naturally in modern
    English.
