theological_decisions:
- issue: Sense of עָוֹן in David's plea
  chosen_reading: Rendered as 'guilt' rather than 'iniquity' or 'punishment'
  alternative_readings:
  - iniquity
  - punishment for iniquity
  rationale: The verse is a confession and request for divine forgiveness. Rendering
    עָוֹן as 'guilt' best communicates the moral burden David asks God to remove,
    while avoiding a narrower reading of the term as either only the sinful act or
    only its penalty.
