id: 1CH.21.8
reference: 1 Chronicles 21:8
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר דָּוִיד֙ אֶל הָ֣/אֱלֹהִ֔ים חָטָ֣אתִֽי מְאֹ֔ד אֲשֶׁ֥ר עָשִׂ֖יתִי
    אֶת הַ/דָּבָ֣ר הַ/זֶּ֑ה וְ/עַתָּ֗ה הַֽעֲבֶר נָא֙ אֶת עֲו֣וֹן עַבְדְּ/ךָ֔ כִּ֥י
    נִסְכַּ֖לְתִּי מְאֹֽד־־־־׃פ
translation:
  text: Then David said to God, “I have sinned greatly in doing this thing. But now,
    please take away the guilt of your servant, for I have acted very foolishly.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remove the iniquity of your servant.' The Hebrew word can mean 'iniquity,'
      'guilt,' or the liability arising from guilt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: אֶל הָאֱלֹהִים
  chosen: to God
  alternatives:
  - to the God
  lexicon: HALOT
  rationale: With אֱלֹהִים referring to Israel's God in direct address context, idiomatic
    English is simply 'God,' not 'the God.'
- source_word: חָטָאתִי מְאֹד
  chosen: I have sinned greatly
  alternatives:
  - I have sinned very much
  - I have sinned grievously
  lexicon: HALOT
  rationale: Captures both the perfect confession and the intensifier מְאֹד. 'Greatly'
    is natural and weighty without sounding archaic.
- source_word: אֲשֶׁר עָשִׂיתִי אֶת הַדָּבָר הַזֶּה
  chosen: in doing this thing
  alternatives:
  - because I did this thing
  - that I have done this thing
  lexicon: HALOT
  rationale: אֲשֶׁר here introduces the content/ground of the sin. 'In doing this
    thing' is concise, idiomatic, and preserves the link between sin and the specific
    act.
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Marks a turn from confession to petition. 'But now' reflects the rhetorical
    shift more clearly in English.
- source_word: הַעֲבֶר נָא
  chosen: please take away
  alternatives:
  - please remove
  - please cause to pass away
  lexicon: HALOT
  rationale: The Hiphil imperative of עבר in this idiom means to remove or take away.
    'Please take away' is idiomatic and preserves the plea marked by נָא.
- source_word: עֲוֹן
  chosen: the guilt
  alternatives:
  - the iniquity
  - the punishment of guilt
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or guilt-liability. In a plea for forgiveness,
    'guilt' best fits the sense of what David asks God to remove, without over-specifying
    punishment.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, here it is a deferential self-designation
    before God rather than emphasizing bonded status. 'Your servant' is the most contextually
    fitting English rendering.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the plea. 'For' is concise and natural in this
    penitential statement.
- source_word: נִסְכַּלְתִּי מְאֹד
  chosen: I have acted very foolishly
  alternatives:
  - I have been very foolish
  - I have done very foolishly
  lexicon: HALOT
  rationale: The verb conveys acting foolishly, not merely possessing a trait. 'I
    have acted very foolishly' preserves the verbal force and the intensifier מְאֹד.
