id: 1CH.21.29
reference: 1 Chronicles 21:29
source:
  edition: WLC
  text: וּ/מִשְׁכַּ֣ן יְ֠הוָה אֲשֶׁר עָשָׂ֨ה מֹשֶׁ֧ה בַ/מִּדְבָּ֛ר וּ/מִזְבַּ֥ח הָ/עוֹלָ֖ה
    בָּ/עֵ֣ת הַ/הִ֑יא בַּ/בָּמָ֖ה בְּ/גִבְעֽוֹן־׃
translation:
  text: Now the tabernacle of the LORD, which Moses had made in the wilderness, and
    the altar of burnt offering were at that time on the high place at Gibeon.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מִשְׁכַּן
  chosen: tabernacle
  alternatives:
  - dwelling place
  - tent dwelling
  lexicon: HALOT
  rationale: In this cultic context referring to the Mosaic sanctuary, 'tabernacle'
    is the established and precise English term. 'Dwelling place' is too general,
    and 'tent dwelling' is awkward.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated.
- source_word: אֲשֶׁר עָשָׂה
  chosen: which Moses had made
  alternatives:
  - that Moses made
  lexicon: HALOT
  rationale: The relative clause is straightforward. The pluperfect 'had made' fits
    the narrative retrospectively, referring back to Moses' earlier construction in
    the wilderness.
- source_word: בַמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard rendering for מִדְבָּר in Israel''s exodus
    setting and preserves biblical resonance better than ''desert''.'
- source_word: מִזְבַּח הָעוֹלָה
  chosen: the altar of burnt offering
  alternatives:
  - the altar for burnt offering
  - the burnt-offering altar
  lexicon: HALOT
  rationale: This is the standard cultic expression for the altar designated for whole
    burnt offerings. The chosen rendering is clear and idiomatic in English.
- source_word: בָּעֵת הַהִיא
  chosen: at that time
  alternatives:
  - in those days
  - at that moment
  lexicon: HALOT
  rationale: The phrase marks the temporal setting of the narrative. 'At that time'
    is the most natural and sufficiently formal rendering.
- source_word: בַּבָּמָה
  chosen: on the high place
  alternatives:
  - at the high place
  lexicon: HALOT
  rationale: בָּמָה denotes a cultic high place. 'On the high place' reflects the
    spatial imagery and is idiomatic enough in English, though 'at' is possible.
- source_word: בְּגִבְעוֹן
  chosen: at Gibeon
  alternatives:
  - in Gibeon
  lexicon: HALOT
  rationale: For a named location in English narrative, 'at Gibeon' reads naturally.
    It identifies the site where the sanctuary complex was located.
- source_word: וּ
  chosen: Now
  alternatives:
  - And
  lexicon: HALOT
  rationale: The initial conjunction links this verse to the previous context while
    also introducing explanatory background. 'Now' captures the discourse function
    better than a bare 'And' in modern English.
