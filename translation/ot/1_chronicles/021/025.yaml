id: 1CH.21.25
reference: 1 Chronicles 21:25
source:
  edition: WLC
  text: וַ/יִּתֵּ֥ן דָּוִ֛יד לְ/אָרְנָ֖ן בַּ/מָּק֑וֹם שִׁקְלֵ֣י זָהָ֔ב מִשְׁקָ֖ל שֵׁ֥שׁ
    מֵאֽוֹת׃
translation:
  text: And David gave Ornan six hundred shekels of gold by weight for the place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The parallel in 2 Samuel 24:24 mentions fifty shekels of silver; Chronicles
      here reads six hundred shekels of gold, likely reflecting a different scope
      of purchase or textual tradition.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - paid
  lexicon: HALOT
  rationale: The verb נתן commonly means 'give.' Although the context is a purchase,
    'gave' preserves the Hebrew wording without over-interpreting; the payment sense
    is clear from the amount and object.
- source_word: לְאָרְנָן
  chosen: Ornan
  alternatives:
  - Araunah
  rationale: The Chronicler's Hebrew text has the personal name Ornan. 'Araunah' belongs
    to the Samuel parallel, so 'Ornan' should be retained here in keeping with transliterating
    names from the immediate source text.
- source_word: בַּמָּקוֹם
  chosen: for the place
  alternatives:
  - for the site
  - at the place
  lexicon: HALOT
  rationale: מָקוֹם means 'place' or 'site.' In this purchase context, 'for the place'
    best reflects the preposition and the likely sense that David paid for the location
    itself.
- source_word: שִׁקְלֵי זָהָב
  chosen: shekels of gold
  alternatives:
  - gold shekels
  lexicon: HALOT
  rationale: This is the standard weight-and-material expression. 'Shekels of gold'
    is natural English and preserves the ancient unit rather than converting it.
- source_word: מִשְׁקָל
  chosen: by weight
  alternatives:
  - in weight
  - weight
  lexicon: HALOT
  rationale: מִשְׁקָל specifies that the shekels are a weight measure. 'By weight'
    makes that explicit in idiomatic English.
- source_word: שֵׁשׁ מֵאוֹת
  chosen: six hundred
  lexicon: HALOT
  rationale: Straightforward cardinal number; no adjustment is warranted despite the
    differing figure in the Samuel parallel.
