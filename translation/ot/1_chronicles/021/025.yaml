theological_decisions:
- issue: Numerical difference from the parallel account in 2 Samuel 24:24
  chosen_reading: Retain the Chronicler's figure, 'six hundred shekels of gold,' without
    harmonizing.
  alternative_readings:
  - A harmonized rendering reflecting the Samuel account's lower amount for oxen and
    threshing floor
  rationale: The Hebrew text of Chronicles explicitly states six hundred shekels of
    gold. Translation should represent the verse as written rather than resolve intertextual
    tension by harmonization. The difference likely reflects either a broader purchase
    in Chronicles or a distinct textual tradition, but the translator should not import
    that explanation into the main text.
  doctrine_reference: Translation philosophy §1, §3, §5
