id: 1CH.21.10
reference: 1 Chronicles 21:10
source:
  edition: WLC
  text: לֵךְ֩ וְ/דִבַּרְתָּ֨ אֶל דָּוִ֜יד לֵ/אמֹ֗ר כֹּ֚ה אָמַ֣ר יְהוָ֔ה שָׁל֕וֹשׁ
    אֲנִ֖י נֹטֶ֣ה עָלֶ֑י/ךָ בְּחַר לְ/ךָ֛ אַחַ֥ת מֵ/הֵ֖נָּה וְ/אֶֽעֱשֶׂה לָּֽ/ךְ־־־׃
translation:
  text: 'Go and speak to David, saying, ‘Thus says the LORD: I am setting three things
    before you. Choose one of them for yourself, and I will do it to you.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Three I am stretching out/setting upon you.' The Hebrew leaves
      the object unstated; the sense is that the LORD is placing three options before
      David.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Go on
  - Come, go
  lexicon: HALOT
  rationale: Qal imperative 2ms of הלך, a straightforward command to depart/go.
- source_word: וְדִבַּרְתָּ אֶל דָּוִיד
  chosen: and speak to David
  alternatives:
  - and tell David
  - and talk with David
  lexicon: HALOT
  rationale: דבר with אֶל commonly means 'speak to.' 'Tell' is possible, but 'speak
    to' preserves the verbal form more closely.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the direct speech; 'saying'
    is concise and conventional.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - Thus said the LORD
  lexicon: HALOT
  rationale: Prophetic messenger formula. YHWH is rendered 'the LORD' per doctrine
    guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name follows the project's default rendering for יְהוָה.
- source_word: שָׁלֹושׁ אֲנִי נֹטֶה עָלֶיךָ
  chosen: I am setting three things before you
  alternatives:
  - I am stretching out three against you
  - Three I am extending upon you
  - I am presenting three options to you
  lexicon: HALOT
  rationale: נֹטֶה literally means 'stretching out/extending.' In this context of
    alternatives from which David must choose, the idiomatic sense is that the LORD
    is placing three options before him. 'Things' is supplied in English because the
    Hebrew leaves the object implicit.
- source_word: בְּחַר לְךָ
  chosen: Choose one of them for yourself
  alternatives:
  - Choose for yourself
  - Select one for yourself
  lexicon: HALOT
  rationale: בחר is a direct imperative. The dative לְךָ adds personal involvement,
    naturally expressed as 'for yourself.'
- source_word: אַחַת מֵהֵנָּה
  chosen: one of them
  alternatives:
  - one from them
  - a single one of these
  lexicon: HALOT
  rationale: Feminine singular plus partitive phrase refers back to the three implicit
    options/judgments.
- source_word: וְאֶעֱשֶׂה לָּךְ
  chosen: and I will do it to you
  alternatives:
  - and I will do it for you
  - and I will bring it upon you
  lexicon: HALOT
  rationale: עשה with ל can mean doing something to or for someone depending on context.
    Here the context is punitive options, so 'do it to you' best conveys the force
    without overparaphrasing. 'Bring it upon you' is interpretive but possible.
