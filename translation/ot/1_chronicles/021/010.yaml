theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the tetragrammaton is 'the LORD,' following the
    stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Implicit object of 'three I am setting before you'
  chosen_reading: Supply 'three things' rather than specifying 'judgments' or 'plagues'
  alternative_readings:
  - three judgments
  - three plagues
  - three options
  rationale: The Hebrew leaves the noun unstated in this verse. Supplying the minimal
    English placeholder 'things' preserves the ambiguity until the next verse names
    the options, avoiding interpretive overreach.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
