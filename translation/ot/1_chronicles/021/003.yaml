theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of עֲבָדִים in relation to the king
  chosen_reading: servants
  alternative_readings:
  - slaves
  rationale: Although the underlying term can denote slaves, here the emphasis is political allegiance and subjection to the king rather than bonded status as such. 'Servants' better matches the immediate courtly context while remaining semantically faithful.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος servant / slave (context-dependent); consistency by documented exception principle'
