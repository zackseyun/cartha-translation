id: 1CH.21.3
reference: 1 Chronicles 21:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יוֹאָ֗ב יוֹסֵף֩ יְהוָ֨ה עַל עַמּ֤/וֹ כָּ/הֵם֙ מֵאָ֣ה פְעָמִ֔ים הֲ/לֹא֙ אֲדֹנִ֣/י הַ/מֶּ֔לֶךְ כֻּלָּ֥/ם לַ/אדֹנִ֖/י לַ/עֲבָדִ֑ים לָ֣/מָּה יְבַקֵּ֥שׁ זֹאת֙ אֲדֹנִ֔/י לָ֛/מָּה יִהְיֶ֥ה לְ/אַשְׁמָ֖ה לְ/יִשְׂרָאֵֽל־׀׃
translation:
  text: But Joab said, “May Yahweh add to his people a hundred times as many as they are! Are they not all, my lord the king, servants of my lord? Why does my lord seek this? Why should it become guilt for Israel?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “May the LORD make his people a hundred times more than they are.”
    reason: lexical_alternative
  - marker: b
    text: Or, “Are they not all my lord’s slaves?”
    reason: lexical_alternative
  - marker: c
    text: That is, guilt or liability coming upon Israel because of this action.
    reason: cultural_note
lexical_decisions:
- source_word: יוֹסֵף
  chosen: May ... add
  alternatives:
  - will add
  - let ... add
  lexicon: HALOT
  rationale: 'The jussive expresses Joab’s wish/prayer: ''May the LORD add.'' English optative wording best captures the volitional force.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַל עַמּוֹ כָּהֵם מֵאָה פְעָמִים
  chosen: to his people a hundred times as many as they are
  alternatives:
  - to his people like them a hundred times
  - over his people a hundred times as many
  lexicon: HALOT
  rationale: The idiom expresses multiplication relative to the present number. 'A hundred times as many as they are' communicates the comparative sense naturally in English while staying close to the Hebrew.
- source_word: הֲלֹא
  chosen: Are ... not
  alternatives:
  - Surely ... are
  - Are not ...
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement; standard English negative interrogative fits the discourse.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: Courtly address to the king is best rendered 'my lord the king'; 'master' is possible but less idiomatic here.
- source_word: כֻּלָּם לַאדֹנִי לַעֲבָדִים
  chosen: Are they not all ... servants of my lord?
  alternatives:
  - Are they not all ... slaves of my lord?
  - Do they not all belong as servants to my lord?
  lexicon: HALOT
  rationale: The phrase states the people’s status under the king. 'Servants' fits royal-political subordination here without foregrounding chattel connotations that are not the point of the verse.
- source_word: יְבַקֵּשׁ זֹאת
  chosen: seek this
  alternatives:
  - require this
  - ask for this
  lexicon: HALOT
  rationale: בקש commonly means 'seek' or 'request.' 'Seek this' preserves the broad sense of pursuing the census.
- source_word: לְאַשְׁמָה
  chosen: guilt
  alternatives:
  - guilt offering
  - trespass
  - cause of guilt
  lexicon: HALOT
  rationale: In context the noun denotes liability or culpability coming upon Israel, not a sacrificial offering. 'Guilt' is the clearest concise rendering.
- source_word: יִהְיֶה לְאַשְׁמָה לְיִשְׂרָאֵל
  chosen: should it become guilt for Israel
  alternatives:
  - should it bring guilt on Israel
  - should it become a cause of guilt to Israel
  lexicon: HALOT
  rationale: The construction indicates resulting culpability affecting Israel. 'Become guilt for Israel' is close to the Hebrew while remaining readable.
