id: 1CH.21.20
reference: 1 Chronicles 21:20
source:
  edition: WLC
  text: וַ/יָּ֣שָׁב אָרְנָ֗ן וַ/יַּרְא֙ אֶת הַ/מַּלְאָ֔ךְ וְ/אַרְבַּ֧עַת בָּנָ֛י/ו
    עִמּ֖/וֹ מִֽתְחַבְּאִ֑ים וְ/אָרְנָ֖ן דָּ֥שׁ חִטִּֽים־׃
translation:
  text: Now Ornan turned and saw the angel, and his four sons with him were hiding
    themselves, while Ornan was threshing wheat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were hiding.' The Hebrew reflexive form more literally suggests 'were
      hiding themselves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: turned
  alternatives:
  - turned around
  - looked back
  lexicon: HALOT
  rationale: The verb שוב literally means 'turn/return.' In this narrative setting,
    'turned' naturally conveys the physical action that leads to seeing the angel.
    'Turned around' is possible but slightly more expansive than the Hebrew requires.
- source_word: וַיַּרְא אֶת־הַמַּלְאָךְ
  chosen: saw the angel
  alternatives:
  - saw the messenger
  lexicon: HALOT
  rationale: מַלְאָךְ can mean 'messenger' or 'angel,' but in this context of the
    divine judgment narrative the supernatural referent is clear, so 'angel' is the
    most accurate and natural rendering.
- source_word: וְאַרְבַּעַת בָּנָיו
  chosen: his four sons
  alternatives:
  - and four of his sons
  lexicon: HALOT
  rationale: The construct phrase straightforwardly identifies the four sons belonging
    to Ornan. 'His four sons' is idiomatic and precise.
- source_word: עִמּוֹ
  chosen: with him
  alternatives:
  - who were with him
  lexicon: HALOT
  rationale: The prepositional phrase modifies the sons and is best rendered compactly
    as 'with him.' The fuller relative clause is interpretive and unnecessary in the
    main text.
- source_word: מִתְחַבְּאִים
  chosen: were hiding themselves
  alternatives:
  - were hiding
  - hid themselves
  lexicon: HALOT
  rationale: The Hitpael stem is reflexive/middle, so 'were hiding themselves' preserves
    that nuance better than the simpler 'were hiding,' while still reading naturally
    enough in English.
- source_word: וְאָרְנָן דָּשׁ חִטִּים
  chosen: while Ornan was threshing wheat
  alternatives:
  - and Ornan was threshing wheat
  lexicon: HALOT
  rationale: The clause is circumstantial, explaining what Ornan was doing at the
    time. 'While Ornan was threshing wheat' communicates the ongoing background action
    more clearly than a simple coordinate 'and.'
- source_word: חִטִּים
  chosen: wheat
  alternatives:
  - grain
  lexicon: HALOT
  rationale: The noun specifically denotes wheat, not grain in general, so the more
    specific English term should be retained.
