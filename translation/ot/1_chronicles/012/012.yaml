id: 1CH.12.12
reference: 1 Chronicles 12:12
source:
  edition: WLC
  text: עַתַּי֙ הַ/שִּׁשִּׁ֔י אֱלִיאֵ֖ל הַ/שְּׁבִעִֽי׃
translation:
  text: Attai the sixth, Eliel the seventh.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: עַתַּי
  chosen: Attai
  alternatives:
  - Athai
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the project's policy for names. 'Attai' is a standard English transliteration
    of the Hebrew form.
- source_word: הַשִּׁשִּׁי
  chosen: the sixth
  alternatives:
  - sixth
  lexicon: HALOT
  rationale: Ordinal adjective with article, indicating Attai's position in the list.
    Rendering the article as 'the' is natural and reflects the Hebrew form.
- source_word: אֱלִיאֵל
  chosen: Eliel
  alternatives:
  - Eliel
  lexicon: HALOT
  rationale: Proper personal name; transliterated directly. 'Eliel' is the conventional
    English form and preserves the Hebrew name.
- source_word: הַשְּׁבִעִי
  chosen: the seventh
  alternatives:
  - seventh
  lexicon: HALOT
  rationale: Ordinal adjective with article, marking Eliel's place in the sequence.
    'The seventh' best matches the Hebrew and the list structure.
