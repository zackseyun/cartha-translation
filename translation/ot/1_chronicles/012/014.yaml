id: 1CH.12.14
reference: 1 Chronicles 12:14
source:
  edition: WLC
  text: יִרְמְיָ֨הוּ֙ הָ/עֲשִׂירִ֔י מַכְבַּנַּ֖י עַשְׁתֵּ֥י עָשָֽׂרס׃
translation:
  text: Jeremiah the tenth, Machbannai the eleventh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'eleven.' In this list context it functions as 'the eleventh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  alternatives:
  - Yirmeyahu
  rationale: Proper personal name; per translation philosophy, names are transliterated
    by standard English convention rather than translated.
- source_word: הָעֲשִׂירִי
  chosen: the tenth
  alternatives:
  - tenth
  lexicon: HALOT
  rationale: 'Ordinal adjective with article, functioning appositionally in a list
    of names and ranks/order. English naturally renders with the definite article:
    ''the tenth''.'
- source_word: מַכְבַּנַּי
  chosen: Machbannai
  alternatives:
  - Makbannai
  rationale: Proper personal name; transliterated into standard English form. Spelling
    reflects conventional representation of the Hebrew consonants.
- source_word: עַשְׁתֵּי עָשָׂר
  chosen: the eleventh
  alternatives:
  - eleven
  - one and ten
  lexicon: HALOT
  rationale: 'Hebrew cardinal expression ''eleven'' is used here elliptically in parallel
    with the preceding ordinal within a roster. English idiom requires supplying the
    ordinal sense: ''the eleventh.'' This preserves the list structure and intended
    meaning rather than woodenly rendering the bare numeral.'
