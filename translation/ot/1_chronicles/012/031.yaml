id: 1CH.12.31
reference: 1 Chronicles 12:31
source:
  edition: WLC
  text: וּ/מִן בְּנֵ֣י אֶפְרַ֔יִם עֶשְׂרִ֥ים אֶ֖לֶף וּ/שְׁמוֹנֶ֣ה מֵא֑וֹת גִּבּ֣וֹרֵי
    חַ֔יִל אַנְשֵׁ֥י שֵׁמ֖וֹת לְ/בֵ֥ית אֲבוֹתָֽ/ם־׃ס
translation:
  text: And from the sons of Ephraim, twenty thousand eight hundred mighty men of
    valor, men of renown according to their fathers’ houses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'distinguished men'; literally 'men of names,' an idiom for notable or
      well-known men.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן
  chosen: And from
  alternatives:
  - From
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition continues the tribal enumeration
    in context, so 'And from' best reflects the list structure while preserving the
    Hebrew linkage.
- source_word: בְּנֵי אֶפְרַיִם
  chosen: the sons of Ephraim
  alternatives:
  - the men of Ephraim
  - the descendants of Ephraim
  lexicon: HALOT
  rationale: Literally 'sons of Ephraim.' In tribal census/muster contexts this idiom
    denotes members/descendants of the tribe. 'Sons' preserves the Hebrew form and
    the genealogical flavor.
- source_word: עֶשְׂרִים אֶלֶף וּשְׁמוֹנֶה מֵאוֹת
  chosen: twenty thousand eight hundred
  alternatives:
  - 20,800
  lexicon: HALOT
  rationale: Rendered in standard English words for readability while preserving the
    exact number.
- source_word: גִּבּוֹרֵי חַיִל
  chosen: mighty men of valor
  alternatives:
  - mighty warriors
  - valiant men
  - mighty men
  lexicon: HALOT
  rationale: This common Hebrew expression can denote strength, military prowess,
    and valor. 'Mighty men of valor' preserves both the idiomatic force and the martial
    context better than the flatter 'men of ability.'
- source_word: אַנְשֵׁי שֵׁמוֹת
  chosen: men of renown
  alternatives:
  - famous men
  - men with names
  - distinguished men
  lexicon: HALOT
  rationale: The idiom refers to men known by name, hence notable or renowned persons.
    'Men of renown' is concise, natural English and preserves the honorific sense.
- source_word: לְבֵית אֲבוֹתָם
  chosen: according to their fathers’ houses
  alternatives:
  - by their ancestral houses
  - for their fathers' houses
  - by their family houses
  lexicon: HALOT
  rationale: This phrase marks clan/family classification. 'According to their fathers’
    houses' is a fairly formal rendering that preserves the social-kinship structure
    of the Hebrew.
