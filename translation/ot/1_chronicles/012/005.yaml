id: 1CH.12.5
reference: 1 Chronicles 12:5
source:
  edition: WLC
  text: וְ/יִרְמְיָ֤ה וְ/יַחֲזִיאֵל֙ וְ/י֣וֹחָנָ֔ן וְ/יוֹזָבָ֖ד הַ/גְּדֵרָתִֽי׃
translation:
  text: Jeremiah, Jahaziel, Johanan, and Jozabad the Gederathite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly “the Gederite” or “the man from Gederah”; the Hebrew gentilic
      identifies Jozabad by origin or clan association.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְמְיָה
  chosen: Jeremiah
  alternatives:
  - Yirmeyah
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention rather
    than translated, in keeping with the project's policy for names.
- source_word: יַחֲזִיאֵל
  chosen: Jahaziel
  alternatives:
  - Yahaziel
  lexicon: HALOT
  rationale: Proper personal name; rendered by conventional English transliteration.
- source_word: יוֹחָנָן
  chosen: Johanan
  alternatives:
  - Yehohanan
  - Jehohanan
  lexicon: HALOT
  rationale: Proper personal name; 'Johanan' is a standard concise English transliteration
    that preserves recognizability without over-Hebraizing.
- source_word: יוֹזָבָד
  chosen: Jozabad
  alternatives:
  - Yozabad
  lexicon: HALOT
  rationale: Proper personal name; rendered by standard English transliteration.
- source_word: הַגְּדֵרָתִי
  chosen: the Gederathite
  alternatives:
  - the Gederite
  - the man from Gederah
  lexicon: HALOT
  rationale: The gentilic with article identifies Jozabad by place-origin or clan
    association. 'Gederathite' is the most formally transparent rendering of the Hebrew
    gentilic ending and preserves the specificity better than the more interpretive
    'man from Gederah.' The article is naturally retained as 'the' in apposition to
    the final name.
