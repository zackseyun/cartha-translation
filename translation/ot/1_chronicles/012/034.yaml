id: 1CH.12.34
reference: 1 Chronicles 12:34
source:
  edition: WLC
  text: מִ/זְּבֻל֞וּן יוֹצְאֵ֣י צָבָ֗א עֹרְכֵ֧י מִלְחָמָ֛ה בְּ/כָל כְּלֵ֥י מִלְחָמָ֖ה
    חֲמִשִּׁ֣ים אָ֑לֶף וְ/לַ/עֲדֹ֖ר בְּ/לֹא לֵ֥ב וָ/לֵֽב־־׃ס
translation:
  text: From Zebulun, fifty thousand men fit for military service, prepared for battle
    with every kind of weapon of war, to help without a divided heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'without heart and heart,' a Hebrew idiom meaning without divided
      loyalty or double-mindedness.
    reason: lexical_alternative
  - marker: b
    text: Or 'to join the ranks' / 'to support'; the Hebrew verb is uncommon here,
      and the sense is that they came in unified support for David.
    reason: alternative_reading
lexical_decisions:
- source_word: מִ/זְּבֻלוּן
  chosen: From Zebulun
  alternatives:
  - Of Zebulun
  lexicon: HALOT
  rationale: 'The prefixed מ marks source/origin: the contingent comes from the tribe/region
    of Zebulun. ''From Zebulun'' is the most natural English rendering.'
- source_word: יוֹצְאֵי צָבָא
  chosen: men fit for military service
  alternatives:
  - those going out to the army
  - those able to go out to war
  lexicon: HALOT
  rationale: Literally 'those going out of army/service,' an idiom for men eligible
    or available for military duty. 'Fit for military service' conveys the idiomatic
    sense in clear modern English.
- source_word: עֹרְכֵי מִלְחָמָה
  chosen: prepared for battle
  alternatives:
  - arrayed for battle
  - arranging the battle line
  lexicon: HALOT
  rationale: The participle of ערך with מלחמה refers to setting in order for combat,
    hence being battle-ready or drawn up for war. 'Prepared for battle' is readable
    and faithful to the military sense.
- source_word: בְּכָל כְּלֵי מִלְחָמָה
  chosen: with every kind of weapon of war
  alternatives:
  - with all the weapons of war
  - with every weapon of battle
  lexicon: HALOT
  rationale: כְּלֵי מִלְחָמָה denotes military equipment/weapons. 'Every kind of weapon
    of war' reflects בְּכָל while keeping the martial register.
- source_word: חֲמִשִּׁים אָלֶף
  chosen: fifty thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: וְלַעֲדֹר
  chosen: to help
  alternatives:
  - to join the ranks
  - to support
  - to muster together
  lexicon: HALOT
  rationale: The infinitive of עדר here is difficult, but in context it refers to
    joining/supporting David's cause in ordered military solidarity. 'To help' captures
    the functional sense without over-specifying a technical nuance that is uncertain.
- source_word: בְּלֹא לֵב וָלֵב
  chosen: without a divided heart
  alternatives:
  - without double-heartedness
  - without a heart and a heart
  - without duplicity
  lexicon: HALOT
  rationale: The idiom literally means 'without heart and heart,' i.e., without divided
    loyalty or double-mindedness. 'Without a divided heart' preserves the heart-language
    of the Hebrew while making the idiom intelligible in English.
