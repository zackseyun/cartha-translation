id: 1CH.12.26
reference: 1 Chronicles 12:26
source:
  edition: WLC
  text: מִן בְּנֵ֣י שִׁמְע֗וֹן גִּבּ֤וֹרֵי חַ֨יִל֙ לַ/צָּבָ֔א שִׁבְעַ֥ת אֲלָפִ֖ים
    וּ/מֵאָֽה־׃ס
translation:
  text: 'From the sons of Simeon, mighty men of valor for the army: 7,100.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מִן
  chosen: From
  alternatives:
  - Of
  - From among
  lexicon: HALOT
  rationale: Introduces the tribal source of the contingent. 'From' is natural English
    and preserves the sense of origin.
- source_word: בְּנֵי שִׁמְעוֹן
  chosen: the sons of Simeon
  alternatives:
  - the descendants of Simeon
  - the Simeonites
  lexicon: HALOT
  rationale: Literally 'sons of Simeon.' This preserves the Hebrew kinship expression
    while clearly identifying the tribe. 'Simeonites' is possible but less transparent
    to the source wording.
- source_word: גִּבּוֹרֵי חַיִל
  chosen: mighty men of valor
  alternatives:
  - mighty warriors
  - valiant men
  - able men
  lexicon: HALOT
  rationale: A common Hebrew expression for capable, valiant fighting men. 'Mighty
    men of valor' preserves both the strength and courage components and matches the
    military context.
- source_word: לַצָּבָא
  chosen: for the army
  alternatives:
  - for battle
  - for military service
  - for war
  lexicon: HALOT
  rationale: The phrase marks their military function. 'For the army' is a clear rendering
    of the dative-lamed plus צבא in this census-like context; 'for battle' is possible
    but slightly less concrete.
- source_word: שִׁבְעַת אֲלָפִים וּמֵאָה
  chosen: 7,100
  alternatives:
  - seven thousand one hundred
  lexicon: HALOT
  rationale: Straightforward cardinal number. Numerals are rendered in modern English
    figure style for readability while preserving exact quantity.
