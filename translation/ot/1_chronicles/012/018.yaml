theological_decisions:
- issue: Divine action in the closing appeal
  chosen_reading: may the God of our fathers see and judge
  alternative_readings:
  - the God of our fathers will see and judge
  - let the God of our fathers see and rebuke
  rationale: The Hebrew imperfects after a conditional accusation function naturally
    as an appeal to divine adjudication. Rendering them with 'may' preserves the solemn
    invocation without overstating predictive certainty. 'Judge' is preferred over
    'rebuke' because the context is forensic and concerns innocence versus treachery.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
