id: 1CH.12.18
reference: 1 Chronicles 12:18
source:
  edition: WLC
  text: וַ/יֵּצֵ֣א דָוִיד֮ לִ/פְנֵי/הֶם֒ וַ/יַּ֨עַן֙ וַ/יֹּ֣אמֶר לָ/הֶ֔ם אִם לְ/שָׁל֞וֹם
    בָּאתֶ֤ם אֵלַ/י֙ לְ/עָזְרֵ֔/נִי יִֽהְיֶה לִּ֧/י עֲלֵי/כֶ֛ם לֵבָ֖ב לְ/יָ֑חַד וְ/אִֽם
    לְ/רַמּוֹתַ֣/נִי לְ/צָרַ֗/י בְּ/לֹ֤א חָמָס֙ בְּ/כַפַּ֔/י יֵ֛רֶא אֱלֹהֵ֥י אֲבוֹתֵ֖י/נוּ
    וְ/יוֹכַֽח־־־׃ס
translation:
  text: David went out before them and answered and said to them, “If you have come
    to me in peace to help me, my heart will be united with you; but if you have come
    to betray me to my enemies, though there is no violence in my hands, may the God
    of our fathers see and judge.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to deceive me.' The Hebrew verb can denote treacherous deception; 'betray'
      is chosen here because the context involves being handed over to enemies.
    reason: lexical_alternative
  - marker: b
    text: Or 'see and rebuke' / 'see and decide.' The final verb can carry the sense
      of reproving, arbitrating, or rendering judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - came out
  - went forth
  lexicon: HALOT
  rationale: The verb יצא in narrative commonly means 'go out.' 'Went out' is natural
    modern English and preserves the movement toward the group without archaic tone.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - to meet them
  - in front of them
  lexicon: HALOT
  rationale: Literally 'before them.' In context it indicates David's going out into
    their presence. 'Before them' keeps the spatial sense; 'to meet them' is interpretive
    and therefore not preferred in the main text.
- source_word: וַיַּעַן וַיֹּאמֶר
  chosen: answered and said
  alternatives:
  - responded and said
  - said
  lexicon: HALOT
  rationale: The paired Hebrew narrative formula is retained rather than collapsed,
    since both verbs are present and the style remains readable in English.
- source_word: לְשָׁלוֹם
  chosen: in peace
  alternatives:
  - peaceably
  - for peace
  lexicon: HALOT
  rationale: The phrase asks whether their approach is peaceable and sincere. 'In
    peace' is concise and close to the Hebrew prepositional phrase.
- source_word: לְעָזְרֵנִי
  chosen: to help me
  alternatives:
  - to assist me
  lexicon: HALOT
  rationale: A straightforward infinitive of purpose from עזר. 'Help' is the most
    natural and transparent rendering.
- source_word: יִהְיֶה לִּי עֲלֵיכֶם לֵבָב לְיָחַד
  chosen: my heart will be united with you
  alternatives:
  - my heart will be joined to you
  - there will be for me with you a united heart
  lexicon: HALOT
  rationale: 'The Hebrew is somewhat idiomatic: literally, ''there will be for me
    upon/with you a heart to togetherness.'' The sense is one-hearted solidarity.
    ''My heart will be united with you'' communicates covenantal alignment without
    wooden awkwardness.'
- source_word: לְרַמּוֹתַנִי
  chosen: to betray me
  alternatives:
  - to deceive me
  - to trick me
  lexicon: HALOT
  rationale: The piel infinitive of רמה can mean deceive or betray. In this military-political
    context, where David fears being handed over to enemies, 'betray me' best captures
    the treacherous force.
- source_word: לְצָרַי
  chosen: to my enemies
  alternatives:
  - to my adversaries
  lexicon: HALOT
  rationale: צר often denotes enemies or hostile opponents. 'Enemies' is the clearest
    contextual rendering.
- source_word: בְּלֹא חָמָס בְּכַפַּי
  chosen: though there is no violence in my hands
  alternatives:
  - when there is no violence in my hands
  - while my hands are free from violence
  - without wrong in my hands
  lexicon: HALOT
  rationale: The phrase asserts David's innocence. 'Violence' reflects חמס well, and
    'in my hands' preserves the Hebrew idiom for culpable action. 'Though' brings
    out the concessive force in context.
- source_word: יֵרֶא
  chosen: may ... see
  alternatives:
  - let ... see
  - will ... see
  lexicon: HALOT
  rationale: 'Although formally imperfect, in this imprecatory/jussive-like context
    it functions as a wish or appeal: ''may the God ... see.'' This fits the following
    verb and the discourse setting.'
- source_word: אֱלֹהֵי אֲבוֹתֵינוּ
  chosen: the God of our fathers
  alternatives:
  - God of our ancestors
  lexicon: HALOT
  rationale: This is a standard covenantal expression. 'Fathers' preserves the source
    wording and biblical idiom; it is gender-accurate to the Hebrew form.
- source_word: וְיוֹכַח
  chosen: and judge
  alternatives:
  - and rebuke
  - and decide
  - and prove
  lexicon: HALOT
  rationale: The hiphil of יכח can mean decide, reprove, or arbitrate. In parallel
    with 'see,' the sense is that God will examine the matter and render judgment.
    'Judge' is the clearest idiomatic English in context.
