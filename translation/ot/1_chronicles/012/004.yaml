id: 1CH.12.4
reference: 1 Chronicles 12:4
source:
  edition: WLC
  text: וְ/יִֽשְׁמַֽעְיָ֧ה הַ/גִּבְעוֹנִ֛י גִּבּ֥וֹר בַּ/שְּׁלֹשִׁ֖ים וְ/עַל הַ/שְּׁלֹשִֽׁים־׃
translation:
  text: and Ishmaiah the Gibeonite, a mighty man among the Thirty and over the Thirty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the Thirty'; the Hebrew preposition may denote membership in the
      elite group called 'the Thirty.'
    reason: lexical_alternative
  - marker: b
    text: '''Over the Thirty'' likely indicates a position of leadership or higher
      rank in relation to the Thirty.'
    reason: cultural_note
lexical_decisions:
- source_word: וְ/יִשְׁמַעְיָה
  chosen: and Ishmaiah
  alternatives:
  - Ishmaiah
  lexicon: HALOT
  rationale: The prefixed conjunction וְ is carried over as 'and,' continuing the
    list of David's supporters. The proper name is transliterated per translation
    philosophy.
- source_word: הַגִּבְעוֹנִי
  chosen: the Gibeonite
  alternatives:
  - from Gibeon
  lexicon: HALOT
  rationale: The gentilic with article identifies Ishmaiah by origin or clan affiliation.
    'The Gibeonite' preserves the nominal force more formally than the adjectival
    paraphrase 'from Gibeon.'
- source_word: גִּבּוֹר
  chosen: a mighty man
  alternatives:
  - a warrior
  - a mighty warrior
  - a valiant man
  lexicon: HALOT
  rationale: גִּבּוֹר commonly denotes a strong or valiant warrior. 'A mighty man'
    fits the Chronicler's military-list context and preserves the connection with
    the broader category of David's mighty men without over-paraphrasing.
- source_word: בַּשְּׁלֹשִׁים
  chosen: among the Thirty
  alternatives:
  - of the Thirty
  - in the Thirty
  lexicon: HALOT
  rationale: The preposition ב plus the article with 'Thirty' most naturally places
    him within the elite group known as 'the Thirty.' 'Among the Thirty' is idiomatic
    English and reflects membership.
- source_word: וְעַל הַשְּׁלֹשִׁים
  chosen: and over the Thirty
  alternatives:
  - and a leader over the Thirty
  - and above the Thirty
  lexicon: HALOT
  rationale: עַל in this context indicates authority or rank. 'Over the Thirty' preserves
    the terse Hebrew and communicates leadership or superiority in relation to the
    group.
