id: 1CH.12.1
reference: 1 Chronicles 12:1
source:
  edition: WLC
  text: וְ/אֵ֗לֶּה הַ/בָּאִ֤ים אֶל דָּוִיד֙ לְ/צִ֣יקְלַ֔ג ע֣וֹד עָצ֔וּר מִ/פְּנֵ֖י
    שָׁא֣וּל בֶּן קִ֑ישׁ וְ/הֵ֨מָּה֙ בַּ/גִּבּוֹרִ֔ים עֹזְרֵ֖י הַ/מִּלְחָמָֽה־־׃
translation:
  text: Now these are the men who came to David at Ziklag while he was still restricted
    because of Saul son of Kish; and they were among the mighty warriors, helpers
    in war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'held back' or 'confined' because of Saul son of Kish.
    reason: lexical_alternative
  - marker: b
    text: Or 'among the mighty men'; Hebrew gibbôrîm refers to valiant warriors or
      heroes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: Now these are
  alternatives:
  - And these are
  - These are
  lexicon: HALOT
  rationale: Introduces a new section/list. 'Now these are' gives natural English
    discourse flow while preserving the connective force of וְ and the demonstrative
    sense of אֵלֶּה.
- source_word: הַבָּאִים
  chosen: who came
  alternatives:
  - the ones coming
  - those who came
  lexicon: HALOT
  rationale: The participle functions substantivally to identify the group. English
    idiom prefers the relative clause 'who came' in this list-introduction context.
- source_word: אֶל דָּוִיד
  chosen: to David
  alternatives:
  - unto David
  lexicon: HALOT
  rationale: Straightforward directional phrase; 'to David' is the natural modern
    equivalent.
- source_word: לְצִיקְלַג
  chosen: at Ziklag
  alternatives:
  - to Ziklag
  lexicon: HALOT
  rationale: Although לְ can be directional, in context with 'came to David' the phrase
    identifies the location where they joined him. 'At Ziklag' best reflects the sense
    in English.
- source_word: עוֹד
  chosen: still
  alternatives:
  - yet
  - while yet
  lexicon: HALOT
  rationale: Marks the continuing state at the time of their coming. 'Still' is concise
    and natural.
- source_word: עָצוּר
  chosen: restricted
  alternatives:
  - held back
  - confined
  - shut up
  lexicon: HALOT
  rationale: The passive participial/adjectival form indicates David was under constraint
    because of Saul. 'Restricted' preserves the idea without over-specifying imprisonment,
    which the context does not require.
- source_word: מִפְּנֵי שָׁאוּל בֶּן קִישׁ
  chosen: because of Saul son of Kish
  alternatives:
  - from before Saul son of Kish
  - on account of Saul son of Kish
  lexicon: HALOT
  rationale: מִפְּנֵי here expresses causation arising from Saul's hostile presence.
    'Because of' communicates the force clearly in modern English.
- source_word: וְהֵמָּה
  chosen: and they
  alternatives:
  - and these
  - and they themselves
  lexicon: HALOT
  rationale: Resumptive pronoun marking the subject of the next clause. Simple 'and
    they' is sufficient in English.
- source_word: בַּגִּבּוֹרִים
  chosen: among the mighty warriors
  alternatives:
  - among the mighty men
  - among the heroes
  lexicon: HALOT
  rationale: גִּבּוֹרִים denotes valiant fighting men. 'Mighty warriors' preserves
    martial force better for modern readers than the traditional but potentially ambiguous
    'mighty men.'
- source_word: עֹזְרֵי הַמִּלְחָמָה
  chosen: helpers in war
  alternatives:
  - helpers for battle
  - those helping in the war
  - supporters in battle
  lexicon: HALOT
  rationale: Construct phrase describing their military role. 'Helpers in war' is
    concise and close to the Hebrew, while still readable.
