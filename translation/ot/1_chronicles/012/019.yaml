theological_decisions:
- issue: Whether רוּחַ refers to a divine Spirit or merely an impersonal/spiritual
    impulse
  chosen_reading: the Spirit
  alternative_readings:
  - a spirit
  - the spirit
  rationale: In Chronicles, divine empowerment of leaders is a recurring theme, and
    the idiom of the spirit clothing a person strongly suggests God's Spirit enabling
    Amasai's declaration. Capitalization in English signals this likely referent while
    remaining a translation judgment rather than a doctrinal expansion.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
