id: 1CH.12.19
reference: 1 Chronicles 12:19
source:
  edition: WLC
  text: וְ/ר֣וּחַ לָבְשָׁ֗ה אֶת עֲמָשַׂי֮ רֹ֣אשׁ ה/שלושים לְ/ךָ֤ דָוִיד֙ וְ/עִמְּ/ךָ֣
    בֶן יִשַׁ֔י שָׁל֨וֹם שָׁל֜וֹם לְ/ךָ֗ וְ/שָׁלוֹם֙ לְ/עֹ֣זְרֶ֔/ךָ כִּ֥י עֲזָרְ/ךָ֖
    אֱלֹהֶ֑י/ךָ וַ/יְקַבְּלֵ֣/ם דָּוִ֔יד וַֽ/יִּתְּנֵ֖/ם בְּ/רָאשֵׁ֥י הַ/גְּדֽוּד־־׀׃פ
translation:
  text: And the Spirit clothed Amasai, chief of the Thirty, and he said, “Yours are
    we, David, and with you, son of Jesse! Peace, peace to you, and peace to your
    helpers, for your God helps you.” Then David received them and made them chiefs
    of the troops.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a spirit clothed Amasai' or 'the spirit came upon Amasai.' The Hebrew
      literally says 'spirit clothed Amasai.'
    reason: alternative_reading
  - marker: b
    text: Or 'and peace to your helper'; the Hebrew singular may be understood collectively
      as 'your helpers.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for your God has helped you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרוּחַ לָבְשָׁה
  chosen: the Spirit clothed
  alternatives:
  - a spirit clothed
  - the spirit came upon
  lexicon: HALOT
  rationale: רוּחַ without article can be rendered 'spirit' or 'Spirit'; in this idiom
    with לָבַשׁ ('clothe') and a named leader speaking under divine impulse, 'the
    Spirit clothed' best captures the Hebrew metaphor and likely divine agency without
    flattening it to the more interpretive 'came upon.'
- source_word: אֶת עֲמָשַׂי
  chosen: Amasai
  rationale: Direct object marker plus personal name; transliterated per policy for
    names.
- source_word: רֹאשׁ הַשְּׁלֹשִׁים
  chosen: chief of the Thirty
  alternatives:
  - head of the Thirty
  - chief of the thirty warriors
  lexicon: HALOT
  rationale: רֹאשׁ is 'head/chief.' הַשְּׁלֹשִׁים likely denotes a known military
    group, conventionally 'the Thirty.' Capitalization signals a recognized body rather
    than an indefinite number.
- source_word: לְךָ דָוִיד
  chosen: Yours are we, David
  alternatives:
  - We are yours, David
  - For you, David
  lexicon: HALOT
  rationale: The terse nominal expression is elliptical. 'Yours are we' preserves
    the Hebrew emphasis and allegiance formula more closely than smoothing fully into
    idiomatic English, while remaining understandable.
- source_word: וְעִמְּךָ בֶן יִשַׁי
  chosen: and with you, son of Jesse
  alternatives:
  - and we are with you, son of Jesse
  lexicon: HALOT
  rationale: The prepositional phrase is verbless; English supplies the sense. 'And
    with you' keeps the compact parallelism with the previous line.
- source_word: שָׁלוֹם שָׁלוֹם לְךָ
  chosen: Peace, peace to you
  alternatives:
  - Peace to you, peace to you
  lexicon: HALOT
  rationale: The repetition is emphatic and should be preserved rather than collapsed.
- source_word: וְשָׁלוֹם לְעֹזְרֶךָ
  chosen: and peace to your helpers
  alternatives:
  - and peace to him who helps you
  - and peace to your helper
  lexicon: HALOT
  rationale: The singular participle with 2ms suffix can function collectively. In
    context of David's band and the following plural reception, 'your helpers' best
    conveys the likely collective sense in natural English.
- source_word: כִּי עֲזָרְךָ אֱלֹהֶיךָ
  chosen: for your God helps you
  alternatives:
  - for your God has helped you
  lexicon: HALOT
  rationale: The qatal may be rendered present-perfect or gnomic/present from context.
    Here it grounds the blessing in God's ongoing support of David; present English
    communicates that force well.
- source_word: וַיְקַבְּלֵם
  chosen: received them
  alternatives:
  - accepted them
  lexicon: HALOT
  rationale: קבל commonly means receive/accept. 'Received' fits the narrative sequence
    and avoids over-interpreting formal acceptance.
- source_word: וַיִּתְּנֵם בְּרָאשֵׁי הַגְּדוּד
  chosen: made them chiefs of the troops
  alternatives:
  - appointed them as heads of the raiding band
  - put them among the chiefs of the troop
  lexicon: HALOT
  rationale: The idiom 'gave them among/as heads of the troop' means appointment to
    leadership. גְּדוּד can denote troop/band/raiding unit; plural 'troops' reads
    naturally in English for military organization and avoids implying only one small
    band.
