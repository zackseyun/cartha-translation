theological_decisions:
- issue: Potential theological overtones of שְׁאֵרִית ('remnant')
  chosen_reading: Rendered contextually as 'all the rest of Israel' rather than 'all
    the remnant of Israel.'
  alternative_readings:
  - all the remnant of Israel
  rationale: Although שְׁאֵרִית often bears theological significance in prophetic
    literature, here the immediate context is a narrative summary of national support
    for David. Rendering it as 'rest' avoids importing a technical remnant theology
    the verse itself does not foreground.
  doctrine_reference: Translation philosophy §§1, 3, 6
