id: 1CH.12.39
reference: 1 Chronicles 12:39
source:
  edition: WLC
  text: כָּל אֵ֜לֶּה אַנְשֵׁ֣י מִלְחָמָה֮ עֹדְרֵ֣י מַעֲרָכָה֒ בְּ/לֵבָ֤ב שָׁלֵם֙ בָּ֣אוּ
    חֶבְר֔וֹנָ/ה לְ/הַמְלִ֥יךְ אֶת דָּוִ֖יד עַל כָּל יִשְׂרָאֵ֑ל וְ֠/גַם כָּל שֵׁרִ֧ית
    יִשְׂרָאֵ֛ל לֵ֥ב אֶחָ֖ד לְ/הַמְלִ֥יךְ אֶת דָּוִֽיד־־־־־־׃
translation:
  text: All these were men of war, arrayed for battle, who came to Hebron with a whole
    heart to make David king over all Israel; and also all the rest of Israel were
    of one heart to make David king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the remnant of Israel.' Here the sense is likely 'all the rest of
      Israel' in context, not the prophetic-theological 'remnant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי מִלְחָמָה
  chosen: men of war
  alternatives:
  - warriors
  - fighting men
  lexicon: HALOT
  rationale: A construct phrase literally meaning 'men of war.' 'Men of war' preserves
    the masculine form and military sense; 'warriors' is possible but slightly less
    formally transparent.
- source_word: עֹדְרֵי מַעֲרָכָה
  chosen: arrayed for battle
  alternatives:
  - drawing up in battle line
  - equipped for battle
  - ready for battle
  lexicon: HALOT
  rationale: The participial phrase denotes those arranging or setting the battle
    line. 'Arrayed for battle' is idiomatic modern English that preserves the military
    formation nuance better than the flatter 'ready for battle.'
- source_word: בְּלֵבָב שָׁלֵם
  chosen: with a whole heart
  alternatives:
  - with an undivided heart
  - with a loyal heart
  - wholeheartedly
  lexicon: HALOT
  rationale: The phrase expresses inner integrity/completeness of intention. 'With
    a whole heart' keeps the heart imagery and avoids reducing it to a mere adverb;
    'undivided heart' is interpretive but plausible.
- source_word: בָּאוּ חֶבְרוֹנָה
  chosen: came to Hebron
  alternatives:
  - went to Hebron
  lexicon: HALOT
  rationale: The directional he on 'Hebron' marks motion toward the place. English
    idiom prefers 'came to Hebron' in this narrative setting.
- source_word: לְהַמְלִיךְ אֶת דָּוִיד
  chosen: to make David king
  alternatives:
  - to crown David king
  - to proclaim David king
  lexicon: HALOT
  rationale: The Hiphil of מלך here means to cause someone to reign, i.e., install/make
    king. 'Make David king' is direct and natural; 'crown' imports ceremony not explicit
    in the Hebrew.
- source_word: עַל כָּל יִשְׂרָאֵל
  chosen: over all Israel
  alternatives:
  - over the whole of Israel
  lexicon: HALOT
  rationale: Standard rendering of royal rule over the nation; concise and faithful.
- source_word: כָּל שֵׁרִית יִשְׂרָאֵל
  chosen: all the rest of Israel
  alternatives:
  - all the remnant of Israel
  - all the remainder of Israel
  lexicon: HALOT
  rationale: שְׁאֵרִית can mean 'remnant,' but here in a non-theological census/narrative
    context it refers to those not already listed or otherwise the rest of the nation.
    'Rest' avoids importing prophetic 'remnant' overtones not demanded here.
- source_word: לֵב אֶחָד
  chosen: of one heart
  alternatives:
  - with one heart
  - united in heart
  - of one mind
  lexicon: HALOT
  rationale: The Hebrew is literally 'one heart,' expressing unified intention. 'Of
    one heart' preserves the metaphor and reads naturally in English; 'one mind' would
    shift the imagery.
