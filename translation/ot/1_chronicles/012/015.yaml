id: 1CH.12.15
reference: 1 Chronicles 12:15
source:
  edition: WLC
  text: אֵ֥לֶּה מִ/בְּנֵי גָ֖ד רָאשֵׁ֣י הַ/צָּבָ֑א אֶחָ֤ד לְ/מֵאָה֙ הַ/קָּטָ֔ן וְ/הַ/גָּד֖וֹל
    לְ/אָֽלֶף־׃
translation:
  text: These were from the sons of Gad, heads of the army; the least was a match
    for a hundred, and the greatest for a thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'one for a hundred, and the great one for a thousand'—an
      idiom expressing military prowess or effectiveness.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These were
  alternatives:
  - These
  - These are
  lexicon: HALOT
  rationale: Demonstrative plural introducing the listed men. English supplies 'were'
    naturally in this verbless Hebrew clause.
- source_word: מִבְּנֵי גָד
  chosen: from the sons of Gad
  alternatives:
  - from the Gadites
  - of the sons of Gad
  lexicon: HALOT
  rationale: Literally 'from the sons of Gad.' This preserves the familial/tribal
    expression while remaining natural English. 'Gadites' is possible but less formally
    tied to the Hebrew wording.
- source_word: רָאשֵׁי הַצָּבָא
  chosen: heads of the army
  alternatives:
  - chiefs of the army
  - leaders of the army
  - commanders of the army
  lexicon: HALOT
  rationale: רָאשֵׁי literally means 'heads/chiefs.' 'Heads of the army' keeps the
    metaphor close to the Hebrew while still being understandable. The phrase denotes
    military leaders.
- source_word: אֶחָד לְמֵאָה
  chosen: the least was a match for a hundred
  alternatives:
  - one for a hundred
  - each one was equal to a hundred
  - one against a hundred
  lexicon: HALOT
  rationale: The Hebrew is elliptical. In context it expresses fighting strength or
    military worth, not mere numerical ratio. 'Was a match for' makes the implied
    sense explicit in idiomatic English without overparaphrasing.
- source_word: הַקָּטָן
  chosen: the least
  alternatives:
  - the smallest
  - the lesser
  lexicon: HALOT
  rationale: Refers to the least significant or weakest among them in comparative
    rank/strength. 'The least' is idiomatic in English for this contrast.
- source_word: וְהַגָּדוֹל לְאָלֶף
  chosen: and the greatest for a thousand
  alternatives:
  - and the greatest was a match for a thousand
  - and the greatest against a thousand
  lexicon: HALOT
  rationale: Parallel to the previous clause. 'For a thousand' is retained in compact
    form after the first clause has already supplied the implied sense. 'Greatest'
    fits the contrast with 'least'.
