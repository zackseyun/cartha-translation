id: 1CH.12.3
reference: 1 Chronicles 12:3
source:
  edition: WLC
  text: הָ/רֹ֨אשׁ אֲחִיעֶ֜זֶר וְ/יוֹאָ֗שׁ בְּנֵי֙ הַ/שְּׁמָעָ֣ה הַ/גִּבְעָתִ֔י ו/יזואל
    וָ/פֶ֖לֶט בְּנֵ֣י עַזְמָ֑וֶת וּ/בְרָכָ֕ה וְ/יֵה֖וּא הָ/עֲנְּתֹתִֽי׃
translation:
  text: The chief was Ahiezer, then Joash, the sons of Shemaah the Gibeathite; and
    Jeziel and Pelet, the sons of Azmaveth; and Beracah and Jehu the Anathothite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew ויזואל may also be transliterated 'Iziel.'
    reason: lexical_alternative
  - marker: b
    text: The name 'Beracah' is also often spelled 'Berakah' in English transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרֹאשׁ
  chosen: The chief was
  alternatives:
  - the head
  - the leader
  lexicon: HALOT
  rationale: In this roster context, רֹאשׁ denotes the leading man or chief among
    those listed, not a literal 'head.' Supplying 'was' makes the verbless Hebrew
    clause natural in English.
- source_word: אֲחִיעֶזֶר
  chosen: Ahiezer
  rationale: Personal name transliterated according to standard English convention.
- source_word: וְיוֹאָשׁ
  chosen: then Joash
  alternatives:
  - and Joash
  rationale: The conjunction simply means 'and,' but 'then' helps English readers
    follow the sequence of names after identifying the chief. This is a minor stylistic
    adjustment within optimal equivalence.
- source_word: בְּנֵי הַשְּׁמָעָה
  chosen: the sons of Shemaah
  alternatives:
  - sons of Hashemaah
  lexicon: HALOT
  rationale: בְּנֵי is the standard genealogical 'sons of.' The name is pointed here
    as הַשְּׁמָעָה, commonly represented as Shemaah. Because the initial article-like
    form may reflect the proper name rather than a separate article, a transliterated
    personal name is preferable.
- source_word: הַגִּבְעָתִי
  chosen: the Gibeathite
  alternatives:
  - the man from Gibeah
  lexicon: HALOT
  rationale: The gentilic adjective indicates origin from Gibeah. 'Gibeathite' preserves
    the concise Hebrew form while remaining understandable.
- source_word: ויזואל
  chosen: Jeziel
  alternatives:
  - Iziel
  rationale: The consonantal form is commonly rendered 'Jeziel' in English versions
    of this verse. Because the initial consonant can be represented differently in
    transliteration, the alternative is worth preserving.
- source_word: וָפֶלֶט
  chosen: and Pelet
  alternatives:
  - and Pelet his deliverance-name form
  rationale: Personal name transliterated straightforwardly. No interpretive expansion
    is warranted in the main text.
- source_word: בְּנֵי עַזְמָוֶת
  chosen: the sons of Azmaveth
  lexicon: HALOT
  rationale: Standard genealogical construction. 'Azmaveth' is a conventional transliteration
    of the personal name.
- source_word: וּבְרָכָה
  chosen: and Beracah
  alternatives:
  - and Berakah
  rationale: Personal name transliterated. English conventions vary between 'Beracah'
    and 'Berakah'; the latter is preserved as an alternative spelling.
- source_word: וְיֵהוּא
  chosen: and Jehu
  rationale: Personal name transliterated by standard English convention.
- source_word: הָעֲנְּתֹתִי
  chosen: the Anathothite
  alternatives:
  - the man from Anathoth
  lexicon: HALOT
  rationale: Gentilic adjective from Anathoth. 'Anathothite' preserves the Hebrew
    form compactly and matches common English biblical style.
