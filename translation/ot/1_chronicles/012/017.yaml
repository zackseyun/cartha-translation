id: 1CH.12.17
reference: 1 Chronicles 12:17
source:
  edition: WLC
  text: וַ/יָּבֹ֗אוּ מִן בְּנֵ֤י בִנְיָמִן֙ וִֽ/יהוּדָ֔ה עַד לַ/מְצָ֖ד לְ/דָוִֽיד־־׃
translation:
  text: And some of the sons of Benjamin and Judah came to the stronghold, to David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among the sons of Benjamin and Judah.' The Hebrew construction
      is partitive, indicating that only some members of these tribes came.
    reason: lexical_alternative
  - marker: b
    text: Or 'fortress.' The Hebrew term refers to a fortified refuge or defensive
      stronghold.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: Wayyiqtol of בוא in narrative commonly advances the storyline with 'came.'
    English 'came' fits the deictic movement toward David's location.
- source_word: מִן
  chosen: some of
  alternatives:
  - from
  - out of
  lexicon: HALOT
  rationale: 'With an anarthrous group expression (''from the sons of Benjamin and
    Judah''), the sense is partitive: not all Benjaminites and Judahites, but members
    from among them. ''Some of'' makes the partitive force clear in natural English.'
- source_word: בְּנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the Benjaminites
  - Benjamin's sons
  lexicon: HALOT
  rationale: Formal kinship expression is retained because it is the Hebrew wording
    and remains clear in English. 'Benjaminites' is possible but slightly more interpretive.
- source_word: וִיהוּדָה
  chosen: and Judah
  alternatives:
  - and the sons of Judah
  - and Judahites
  lexicon: HALOT
  rationale: The Hebrew coordinates Judah with 'sons of Benjamin' elliptically. Rendering
    'and Judah' preserves the compact source structure while naturally implying people
    from the tribe of Judah. Supplying 'sons of' would be interpretive expansion.
- source_word: עַד
  chosen: to
  alternatives:
  - as far as
  - up to
  lexicon: HALOT
  rationale: In this movement context, עַד marks destination. 'To' is idiomatic English;
    'as far as' is possible but less natural here.
- source_word: הַמְצָד
  chosen: the stronghold
  alternatives:
  - the fortress
  - the mountain stronghold
  lexicon: HALOT
  rationale: מְצָד denotes a fortified refuge/stronghold. 'Stronghold' is the standard
    and contextually suitable rendering in David narratives.
- source_word: לְדָוִיד
  chosen: to David
  alternatives:
  - for David
  - where David was
  lexicon: HALOT
  rationale: The preposition marks relation to David as the one at the destination;
    'to David' is concise and idiomatic in English after 'came to the stronghold.'
