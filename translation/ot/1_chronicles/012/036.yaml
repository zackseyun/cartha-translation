id: 1CH.12.36
reference: 1 Chronicles 12:36
source:
  edition: WLC
  text: וּ/מִן הַ/דָּנִי֙ עֹרְכֵ֣י מִלְחָמָ֔ה עֶשְׂרִֽים וּ/שְׁמוֹנָ֥ה אֶ֖לֶף וְ/שֵׁ֥שׁ
    מֵאֽוֹת־־׃ס
translation:
  text: From Dan, twenty-eight thousand six hundred prepared for battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'arrayed for battle' or 'drawing up for battle.' The Hebrew participial
      phrase emphasizes military readiness or battle formation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן
  chosen: From
  alternatives:
  - And from
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally yields 'and from,'
    but in English the simple preposition 'From' is natural in this tribal census-style
    sequence and preserves the sense without awkwardness.
- source_word: הַדָּנִי
  chosen: Dan
  alternatives:
  - the Danite
  lexicon: HALOT
  rationale: In this context the gentilic with article refers to the tribe/territory
    represented in the military list, so 'Dan' is the most idiomatic English rendering.
    'The Danite' would sound singular and misleading.
- source_word: עֹרְכֵי מִלְחָמָה
  chosen: prepared for battle
  alternatives:
  - arranging battle
  - drawing up for battle
  - equipped for war
  - arrayed for battle
  lexicon: HALOT
  rationale: The participial phrase denotes those who set themselves in battle order
    or are ready for combat. 'Prepared for battle' communicates the military readiness
    clearly in modern English while staying close to the Hebrew sense.
- source_word: עֶשְׂרִים וּשְׁמוֹנָה אֶלֶף וְשֵׁשׁ מֵאוֹת
  chosen: twenty-eight thousand six hundred
  lexicon: HALOT
  rationale: This is the straightforward cardinal number sequence in Hebrew and is
    best rendered with standard English number phrasing.
