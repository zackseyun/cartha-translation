id: 1CH.12.23
reference: 1 Chronicles 12:23
source:
  edition: WLC
  text: כִּ֚י לְ/עֶת י֣וֹם בְּ/י֔וֹם יָבֹ֥אוּ עַל דָּוִ֖יד לְ/עָזְר֑/וֹ עַד לְ/מַחֲנֶ֥ה
    גָד֖וֹל כְּ/מַחֲנֵ֥ה אֱלֹהִֽים־־־׃פ
translation:
  text: For day by day men came to David to help him, until there was a great camp,
    like the camp of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like God's camp' or 'like a divine/heavenly camp.' The Hebrew keeps
      the expression compact and evocative.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - because
  lexicon: HALOT
  rationale: Introduces an explanatory statement connecting with the surrounding narrative;
    'for' fits the discourse flow better than a stronger asseverative or strictly
    causal rendering.
- source_word: לְעֶת יוֹם בְּיוֹם
  chosen: day by day
  alternatives:
  - at the time, day by day
  - from day to day
  lexicon: HALOT
  rationale: The idiom expresses repeated, ongoing action over successive days. 'Day
    by day' is natural English and preserves the iterative sense.
- source_word: יָבֹאוּ
  chosen: came
  alternatives:
  - would come
  - kept coming
  lexicon: HALOT
  rationale: The imperfect here describes repeated past action in narrative context.
    Simple past in English communicates the sequence clearly; the iterative force
    is already conveyed by 'day by day'.
- source_word: עַל דָּוִיד
  chosen: to David
  alternatives:
  - upon David
  - against David
  lexicon: HALOT
  rationale: With a verb of coming and the following purpose clause 'to help him,'
    the preposition is best understood directionally as movement toward David, not
    hostility against him.
- source_word: לְעָזְרוֹ
  chosen: to help him
  alternatives:
  - to support him
  - for his aid
  lexicon: HALOT
  rationale: The infinitive construct with pronominal suffix expresses purpose. 'To
    help him' is the most direct and idiomatic rendering.
- source_word: עַד
  chosen: until there was
  alternatives:
  - until
  - as far as becoming
  lexicon: HALOT
  rationale: The preposition marks the result or extent reached by the ongoing arrivals.
    Supplying 'there was' makes the English clause complete while reflecting the implied
    resultative sense.
- source_word: לְמַחֲנֶה גָדוֹל
  chosen: a great camp
  alternatives:
  - a great army camp
  - a large camp
  lexicon: HALOT
  rationale: מַחֲנֶה denotes a camp or encampment, often military. 'Camp' preserves
    the imagery; 'great' reflects גָדוֹל straightforwardly.
- source_word: כְּמַחֲנֵה אֱלֹהִים
  chosen: like the camp of God
  alternatives:
  - like God's camp
  - like a divine camp
  lexicon: HALOT
  rationale: The simile is retained formally. 'Camp of God' preserves the Hebrew genitive
    and leaves intact the likely allusion to an extraordinarily vast host (cf. Gen
    32:2) without over-interpreting it.
