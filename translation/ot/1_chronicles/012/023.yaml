theological_decisions:
- issue: Sense of אֱלֹהִים in the simile כְּמַחֲנֵה אֱלֹהִים
  chosen_reading: God
  alternative_readings:
  - divine
  - heavenly
  rationale: The phrase most naturally means 'the camp of God,' an idiomatic way of
    describing an immense or awe-inspiring host. Rendering it with 'God' preserves
    the Hebrew expression and avoids flattening the theological resonance into a mere
    adjective.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
