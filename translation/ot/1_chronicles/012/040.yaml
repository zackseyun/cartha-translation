- issue: Rendering of אֲחֵיהֶם in a potentially broader kinship sense
  chosen_reading: their brothers
  alternative_readings:
  - their kinsmen
  - their relatives
  rationale: No doctrinal controversy is present, but the translation follows the
    stated gender-accurate policy by preserving the masculine kinship term in the
    main text rather than neutralizing it. A broader social sense is possible and
    worth preserving in a footnote.
