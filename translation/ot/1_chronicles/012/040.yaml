id: 1CH.12.40
reference: 1 Chronicles 12:40
source:
  edition: WLC
  text: וַ/יִּהְיוּ שָׁ֤ם עִם דָּוִיד֙ יָמִ֣ים שְׁלוֹשָׁ֔ה אֹכְלִ֖ים וְ/שׁוֹתִ֑ים
    כִּֽי הֵכִ֥ינוּ לָ/הֶ֖ם אֲחֵי/הֶֽם־־־׃
translation:
  text: They were there with David for three days, eating and drinking, because their
    brothers had prepared for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their kinsmen' or 'their relatives.' The Hebrew literally says 'their
      brothers,' which may refer more broadly to fellow clan or tribal members in
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: They were
  alternatives:
  - They remained
  - They stayed
  lexicon: HALOT
  rationale: Qal wayyiqtol of היה here functions as a simple past narrative verb indicating
    presence/existence in a place, best rendered idiomatically as 'They were' in English.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Adverb of place referring to the gathering location with David; 'there'
    is the natural concise English equivalent.
- source_word: עִם דָּוִיד
  chosen: with David
  lexicon: HALOT
  rationale: The preposition עִם straightforwardly denotes accompaniment or association.
- source_word: יָמִים שְׁלוֹשָׁה
  chosen: for three days
  alternatives:
  - three days
  lexicon: HALOT
  rationale: 'The accusative of duration is naturally expressed in English with ''for'':
    they were there for a period of three days.'
- source_word: אֹכְלִים וְשׁוֹתִים
  chosen: eating and drinking
  alternatives:
  - feasting
  lexicon: HALOT
  rationale: The participles describe ongoing activity during the three-day stay.
    A more interpretive summary like 'feasting' is possible from context, but the
    text explicitly says 'eating and drinking,' so that wording is preserved.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the eating and drinking; 'because' is clearer
    in modern English than the more formal 'for.'
- source_word: הֵכִינוּ
  chosen: had prepared
  alternatives:
  - prepared
  - made ready
  - provided
  lexicon: HALOT
  rationale: 'The Hiphil of כון means to prepare or make ready. ''Had prepared'' fits
    the causal sense: provisions were already made for them. ''Provided'' is interpretive
    and less directly tied to the verb.'
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - for these men
  lexicon: HALOT
  rationale: Indirect object/pronominal phrase referring to those with David; simple
    pronominal rendering is sufficient.
- source_word: אֲחֵיהֶם
  chosen: their brothers
  alternatives:
  - their kinsmen
  - their relatives
  lexicon: HALOT
  rationale: Consistent with the gender-accurate principle, אחים is rendered 'brothers.'
    In this military-tribal context it can imply fellow Israelites/kinsmen, but the
    literal term should stand in the main text.
