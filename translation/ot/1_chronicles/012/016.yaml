id: 1CH.12.16
reference: 1 Chronicles 12:16
source:
  edition: WLC
  text: אֵ֣לֶּה הֵ֗ם אֲשֶׁ֨ר עָבְר֤וּ אֶת הַ/יַּרְדֵּן֙ בַּ/חֹ֣דֶשׁ הָ/רִאשׁ֔וֹן וְ/ה֥וּא
    מְמַלֵּ֖א עַל כָּל גדיתי/ו וַ/יַּבְרִ֨יחוּ֙ אֶת כָּל הָ֣/עֲמָקִ֔ים לַ/מִּזְרָ֖ח
    וְ/לַֽ/מַּעֲרָֽב־־־־־׃ס
translation:
  text: These are the men who crossed the Jordan in the first month, when it was overflowing
    all its banks, and they put to flight all those in the valleys, to the east and
    to the west.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'all the valleys'; the sense is the people in the valleys,
      since the verb means 'caused to flee' or 'put to flight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה הֵם
  chosen: These are the men
  alternatives:
  - These are they
  - These are the ones
  lexicon: HALOT
  rationale: The demonstrative plus pronoun is an emphatic identification formula,
    naturally rendered in English as 'These are...'. 'The men' is supplied from context
    because the referents are the warriors being described in the surrounding passage;
    this makes idiomatic English without materially adding content.
- source_word: אֲשֶׁר עָבְרוּ אֶת הַיַּרְדֵּן
  chosen: who crossed the Jordan
  alternatives:
  - who passed over the Jordan
  lexicon: HALOT
  rationale: עָבַר commonly means 'cross, pass over.' 'Crossed the Jordan' is the
    most natural modern English rendering and preserves the concrete action.
- source_word: בַּחֹדֶשׁ הָרִאשׁוֹן
  chosen: in the first month
  alternatives:
  - during the first month
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'In the first month' is both formal
    enough to reflect the Hebrew and natural in English.
- source_word: וְהוּא מְמַלֵּא עַל כָּל גְּדִיתָיו
  chosen: when it was overflowing all its banks
  alternatives:
  - while it filled all its banks
  - and it was full over all its banks
  lexicon: HALOT
  rationale: The clause describes the Jordan's flood stage. גְּדִיתָיו refers to its
    banks/borders, and מְמַלֵּא with עַל conveys overflowing over them. 'When it was
    overflowing all its banks' communicates the sense clearly in modern English.
- source_word: וַיַּבְרִיחוּ
  chosen: and they put to flight
  alternatives:
  - and they drove away
  - and they routed
  lexicon: HALOT
  rationale: The Hiphil of ברח here means to cause others to flee. 'Put to flight'
    is a standard military idiom that preserves the causative sense without overinterpreting
    the scale of the victory.
- source_word: אֶת כָּל הָעֲמָקִים
  chosen: all those in the valleys
  alternatives:
  - all the valleys
  - all the valley-dwellers
  lexicon: HALOT
  rationale: Although the direct object is literally 'all the valleys,' the verb 'put
    to flight' requires personal objects; the phrase is a metonymy for the people
    inhabiting the valleys. Rendering it as 'all those in the valleys' preserves the
    sense in intelligible English while avoiding a wooden impossibility.
- source_word: לַמִּזְרָח וְלַמַּעֲרָב
  chosen: to the east and to the west
  alternatives:
  - eastward and westward
  lexicon: HALOT
  rationale: These directional phrases indicate the extent of those driven off on
    both sides. 'To the east and to the west' is clear and close to the Hebrew.
