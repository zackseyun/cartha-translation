id: 1CH.12.10
reference: 1 Chronicles 12:10
source:
  edition: WLC
  text: עֵ֖זֶר הָ/רֹ֑אשׁ עֹבַדְיָה֙ הַ/שֵּׁנִ֔י אֱלִיאָ֖ב הַ/שְּׁלִשִֽׁי׃
translation:
  text: Ezer the chief, Obadiah the second, Eliab the third.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ezer the leader'; Hebrew literally 'Ezer the head.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵזֶר
  chosen: Ezer
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the project policy to transliterate names.
- source_word: הָרֹאשׁ
  chosen: the chief
  alternatives:
  - the head
  - the leader
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' but in list context it functions idiomatically
    for rank or leadership. 'The chief' is natural English and preserves the sense
    that Ezer held first place among those named.
- source_word: עֹבַדְיָה
  chosen: Obadiah
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration.
- source_word: הַשֵּׁנִי
  chosen: the second
  lexicon: HALOT
  rationale: Ordinal adjective with article; straightforwardly rendered 'the second'
    to mark rank/order in the list.
- source_word: אֱלִיאָב
  chosen: Eliab
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration.
- source_word: הַשְּׁלִשִׁי
  chosen: the third
  lexicon: HALOT
  rationale: Ordinal adjective with article; rendered directly as 'the third' to preserve
    the list structure and ranking.
