id: 1CH.12.13
reference: 1 Chronicles 12:13
source:
  edition: WLC
  text: יֽוֹחָנָן֙ הַ/שְּׁמִינִ֔י אֶלְזָבָ֖ד הַ/תְּשִׁיעִֽי׃
translation:
  text: Johanan the eighth, Elzabad the ninth.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: יֽוֹחָנָן
  chosen: Johanan
  alternatives:
  - Jehohanan
  lexicon: HALOT
  rationale: Personal name transliterated rather than translated, following the translation
    philosophy for names. 'Johanan' is the standard English transliteration for this
    Hebrew name.
- source_word: הַ/שְּׁמִינִי
  chosen: the eighth
  alternatives:
  - eighth
  lexicon: HALOT
  rationale: Ordinal adjective with article, functioning appositionally after the
    name in a list. Rendering the article as 'the' preserves the Hebrew structure
    and the sense of rank/order within the sequence.
- source_word: אֶלְזָבָד
  chosen: Elzabad
  alternatives:
  - Elzebad
  lexicon: HALOT
  rationale: Personal name transliterated by standard convention. The form 'Elzabad'
    is the common English representation of the Hebrew name.
- source_word: הַ/תְּשִׁיעִי
  chosen: the ninth
  alternatives:
  - ninth
  lexicon: HALOT
  rationale: Ordinal adjective with article, parallel to the previous phrase. 'The
    ninth' keeps the concise list style of the Hebrew and clearly marks sequence.
