id: 1CH.12.2
reference: 1 Chronicles 12:2
source:
  edition: WLC
  text: נֹ֣שְׁקֵי קֶ֗שֶׁת מַיְמִינִ֤ים וּ/מַשְׂמִאלִים֙ בָּֽ/אֲבָנִ֔ים וּ/בַ/חִצִּ֖ים
    בַּ/קָּ֑שֶׁת מֵ/אֲחֵ֥י שָׁא֖וּל מִ/בִּנְיָמִֽן׃
translation:
  text: They were archers, able to use both the right hand and the left in hurling
    stones and shooting arrows with the bow; they were from Saul’s brothers, from
    Benjamin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from Saul’s kinsmen' or 'from Saul’s relatives.' The Hebrew 'brothers'
      can extend beyond literal siblings to members of the same wider family or tribe.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹשְׁקֵי קֶשֶׁת
  chosen: archers
  alternatives:
  - armed with bows
  - handlers of the bow
  lexicon: HALOT
  rationale: The participial construction literally denotes those equipped with/using
    the bow. In idiomatic English, 'archers' best captures the role succinctly without
    losing sense.
- source_word: מַיְמִינִים וּמַשְׂמִאלִים
  chosen: able to use both the right hand and the left
  alternatives:
  - right-handed and left-handed
  - using the right hand or the left
  lexicon: HALOT
  rationale: The Hiphil participles here describe skillful use of either hand, not
    merely natural handedness. The chosen rendering makes the functional sense explicit
    in English.
- source_word: בָּאֲבָנִים
  chosen: in hurling stones
  alternatives:
  - with stones
  - with slingshots of stones
  lexicon: HALOT
  rationale: The preposition with 'stones' in this military context implies throwing
    or slinging stones. 'Hurling stones' is natural English and avoids importing 'sling'
    where it is not explicitly stated.
- source_word: וּבַחִצִּים בַּקָּשֶׁת
  chosen: shooting arrows with the bow
  alternatives:
  - with arrows on the bow
  - with arrows from the bow
  lexicon: HALOT
  rationale: This phrase specifies the second weapon skill alongside stones. 'Shooting
    arrows with the bow' is clear modern English and preserves the instrumental sense.
- source_word: מֵאֲחֵי שָׁאוּל
  chosen: from Saul’s brothers
  alternatives:
  - from Saul’s kinsmen
  - from Saul’s relatives
  lexicon: HALOT
  rationale: The plural construct of 'brothers' can denote close kin more broadly,
    but the most direct rendering is 'brothers.' Because tribal affiliation follows,
    the phrase likely refers to Saul's fellow clansmen/tribesmen rather than literal
    siblings; this broader possibility is preserved in a footnote.
- source_word: מִבִּנְיָמִן
  chosen: from Benjamin
  alternatives:
  - Benjaminites
  lexicon: HALOT
  rationale: The phrase identifies tribal origin. 'From Benjamin' is formally close
    and reads smoothly after the preceding phrase.
