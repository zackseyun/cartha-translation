id: 1CH.12.29
reference: 1 Chronicles 12:29
source:
  edition: WLC
  text: וְ/צָד֥וֹק נַ֖עַר גִּבּ֣וֹר חָ֑יִל וּ/בֵית אָבִ֥י/ו שָׂרִ֖ים עֶשְׂרִ֥ים וּ/שְׁנָֽיִם־׃ס
translation:
  text: And Zadok, a young man mighty in valor, and from his father’s house twenty-two
    commanders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a mighty man of valor.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from his ancestral house' or 'from his clan, twenty-two commanders.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צָדוֹק
  chosen: Zadok
  lexicon: HALOT
  rationale: Proper personal name; transliterated per project policy to transliterate
    names rather than translate them.
- source_word: נַעַר
  chosen: young man
  alternatives:
  - youth
  - young warrior
  - servant
  lexicon: HALOT
  rationale: In this military census context, נַעַר most naturally denotes a young
    male rather than a servant. 'Young man' is idiomatic and preserves the age-related
    nuance without overinterpreting his role.
- source_word: גִּבּוֹר חָיִל
  chosen: mighty in valor
  alternatives:
  - mighty man of valor
  - valiant warrior
  - mighty man
  lexicon: HALOT
  rationale: The collocation commonly denotes proven strength/valor, often in martial
    settings. 'Mighty in valor' preserves the Hebrew sense while reading naturally
    in modern English. 'Mighty man of valor' is more traditional but less natural;
    'valiant warrior' is possible but slightly more interpretive.
- source_word: בֵית אָבִיו
  chosen: his father’s house
  alternatives:
  - his ancestral house
  - his family house
  - his clan
  lexicon: HALOT
  rationale: The Hebrew idiom refers to the paternal household/family line. 'His father’s
    house' keeps the source image and social structure more closely than the more
    interpretive 'clan'.
- source_word: שָׂרִים
  chosen: commanders
  alternatives:
  - chiefs
  - leaders
  - captains
  - princes
  lexicon: HALOT
  rationale: In this military context, שָׂרִים refers to persons in positions of command.
    'Commanders' best fits the surrounding list of fighting men. 'Chiefs' or 'leaders'
    are broader; 'princes' would mislead in English toward royal sons or nobility.
- source_word: עֶשְׂרִים וּשְׁנָיִם
  chosen: twenty-two
  lexicon: HALOT
  rationale: Straightforward cardinal number; rendered idiomatically in English.
- source_word: וְ
  chosen: And
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Simple conjunction linking this entry with the preceding tribal/military
    notices. 'And' preserves the list structure.
