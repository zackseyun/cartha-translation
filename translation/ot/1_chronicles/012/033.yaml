id: 1CH.12.33
reference: 1 Chronicles 12:33
source:
  edition: WLC
  text: וּ/מִ/בְּנֵ֣י יִשָּׂשכָ֗ר יוֹדְעֵ֤י בִינָה֙ לַֽ/עִתִּ֔ים לָ/דַ֖עַת מַה יַּעֲשֶׂ֣ה
    יִשְׂרָאֵ֑ל רָאשֵׁי/הֶ֣ם מָאתַ֔יִם וְ/כָל אֲחֵי/הֶ֖ם עַל פִּי/הֶֽם־־־׃ס
translation:
  text: 'From the sons of Issachar, men who understood the times, to know what Israel
    should do: their chiefs were two hundred, and all their brothers were under their
    command.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'men of understanding of the times'; the Hebrew emphasizes discernment
      suited to the historical moment.
    reason: lexical_alternative
  - marker: b
    text: Literally 'all their brothers were according to their mouth,' an idiom meaning
      they were subject to their direction or command.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבְּנֵי יִשָּׂשכָר
  chosen: From the sons of Issachar
  alternatives:
  - And from the sons of Issachar
  - From the people of Issachar
  lexicon: HALOT
  rationale: מִן with בני marks origin/source within the larger list of tribal contingents.
    'Sons of Issachar' preserves the Hebrew idiom and tribal designation better than
    the more interpretive 'people of Issachar.' The prefixed conjunction is naturally
    absorbed in English list style.
- source_word: יוֹדְעֵי בִינָה
  chosen: men who understood
  alternatives:
  - those having understanding
  - knowers of understanding
  - men of understanding
  lexicon: HALOT
  rationale: The participial construction with בינה denotes possessing discernment/understanding.
    'Men who understood' is idiomatic modern English and captures the active sense
    without wooden literalism. 'Men' is supplied because the referents are military
    leaders in context and the Hebrew masculine plural is not merely abstract here.
- source_word: בִינָה
  chosen: understood
  alternatives:
  - understanding
  - discernment
  - insight
  lexicon: HALOT
  rationale: בינה often carries the sense of discernment or understanding. Here it
    is folded into the verbal phrase 'understood' for natural English, while retaining
    the cognitive/discerning nuance.
- source_word: לָעִתִּים
  chosen: the times
  alternatives:
  - the seasons
  - the circumstances
  lexicon: HALOT
  rationale: עִתִּים refers to times/appointed times. In this context it points to
    the historical moment and its demands. 'The times' is the most natural and sufficiently
    broad rendering; 'seasons' may sound overly cyclical, and 'circumstances' is more
    interpretive.
- source_word: לָדַעַת מַה יַעֲשֶׂה יִשְׂרָאֵל
  chosen: to know what Israel should do
  alternatives:
  - to know what Israel ought to do
  - to know what Israel was to do
  - to know what Israel would do
  lexicon: HALOT
  rationale: The infinitive לָדַעַת expresses purpose/result, and the imperfect יַעֲשֶׂה
    in context conveys what action was appropriate or called for. 'Should do' best
    communicates practical discernment without overstating obligation. 'Would do'
    is too predictive; 'ought to do' is possible but slightly more moralizing than
    the context requires.
- source_word: רָאשֵׁיהֶם מָאתַיִם
  chosen: their chiefs were two hundred
  alternatives:
  - their heads were two hundred
  - their leaders numbered two hundred
  lexicon: HALOT
  rationale: רָאשִׁים/רָאשֵׁי can denote heads, chiefs, or leaders. 'Chiefs' preserves
    the leadership nuance with some formality appropriate to the military census context.
    The verbless clause is rendered idiomatically with 'were.'
- source_word: וְכָל אֲחֵיהֶם
  chosen: and all their brothers
  alternatives:
  - and all their kinsmen
  - and all their brethren
  lexicon: HALOT
  rationale: אֲחִים literally means brothers, but can extend to fellow tribesmen/kinsmen.
    Because the context is a male military muster, 'brothers' is both gender-accurate
    and contextually fitting; 'kinsmen' is possible but less direct.
- source_word: עַל־פִּיהֶם
  chosen: under their command
  alternatives:
  - at their command
  - according to their word
  - under their direction
  lexicon: HALOT
  rationale: Literally 'upon their mouth,' an idiom for being subject to someone's
    word/authority. 'Under their command' communicates the hierarchical military sense
    clearly in modern English. 'According to their word' is more literal but less
    idiomatic.
