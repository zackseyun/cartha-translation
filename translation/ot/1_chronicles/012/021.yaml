id: 1CH.12.21
reference: 1 Chronicles 12:21
source:
  edition: WLC
  text: בְּ/לֶכְתּ֣/וֹ אֶל צִֽיקְלַ֗ג נָפְל֣וּ עָלָ֣י/ו מִֽ/מְּנַשֶּׁ֡ה עַ֠דְנַח וְ/יוֹזָבָ֤ד
    וִ/ידִֽיעֲאֵל֙ וּ/מִיכָאֵ֣ל וְ/יוֹזָבָ֔ד וֶ/אֱלִיה֖וּא וְ/צִלְּתָ֑י רָאשֵׁ֥י הָ/אֲלָפִ֖ים
    אֲשֶׁ֥ר לִ/מְנַשֶּֽׁה־׀׃
translation:
  text: 'As he went to Ziklag, some from Manasseh defected to him: Adnah, Jozabad,
    Jediael, Michael, another Jozabad, Elihu, and Zillethai, chiefs of the thousands
    that belonged to Manasseh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'fell to him,' an idiom meaning they went over to David's
      side.
    reason: lexical_alternative
  - marker: b
    text: The name Jozabad appears twice in the Hebrew list, indicating two different
      men with the same name.
    reason: cultural_note
  - marker: c
    text: '''Chiefs of the thousands'' may refer to commanders of military units or
      leaders of clan divisions within Manasseh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּלֶכְתּוֹ
  chosen: As he went
  alternatives:
  - When he went
  - In his going
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of הלך with pronominal suffix
    gives a temporal sense. 'As he went' is natural modern English and preserves the
    ongoing/temporal force without over-literal awkwardness.
- source_word: אֶל צִיקְלַג
  chosen: to Ziklag
  alternatives:
  - toward Ziklag
  lexicon: HALOT
  rationale: אֶל commonly marks motion toward a destination. 'To Ziklag' is the idiomatic
    rendering in this travel context.
- source_word: נָפְלוּ עָלָיו
  chosen: defected to him
  alternatives:
  - fell to him
  - joined him
  lexicon: HALOT
  rationale: The idiom נפל על/אל someone in military-political contexts means to go
    over to someone's side. 'Defected to him' best captures the allegiance shift more
    precisely than the wooden 'fell to him'; 'joined him' is possible but weaker.
- source_word: מִמְּנַשֶּׁה
  chosen: from Manasseh
  alternatives:
  - from the tribe of Manasseh
  lexicon: HALOT
  rationale: The phrase identifies tribal origin. 'From Manasseh' is concise and sufficient
    in context; the tribal sense is clear from the proper name and the later apposition.
- source_word: עַדְנַח וְיוֹזָבָד וִידִיעֲאֵל וּמִיכָאֵל וְיוֹזָבָד וֶאֱלִיהוּא וְצִלְּתָי
  chosen: Adnah, Jozabad, Jediael, Michael, another Jozabad, Elihu, and Zillethai
  alternatives:
  - Adnah, Jozabad, Jediael, Michael, Jozabad, Elihu, and Zillethai
  lexicon: HALOT
  rationale: These are personal names and should be transliterated. Because יוֹזָבָד
    appears twice in the Hebrew list, English can sound confusing if repeated without
    clarification; adding 'another' preserves the repeated name while helping readability,
    without implying a textual emendation.
- source_word: רָאשֵׁי הָאֲלָפִים
  chosen: chiefs of the thousands
  alternatives:
  - heads of the thousands
  - captains of the thousands
  - leaders of the clans
  lexicon: HALOT
  rationale: רָאשֵׁי is 'heads/chiefs.' אֲלָפִים can denote military units of a thousand
    or clan divisions. In Chronicles this phrase often refers to recognized military/clan
    leaders. 'Chiefs of the thousands' preserves the Hebrew expression while remaining
    readable and leaving the exact institutional nuance open.
- source_word: אֲשֶׁר לִמְנַשֶּׁה
  chosen: that belonged to Manasseh
  alternatives:
  - who were of Manasseh
  - who belonged to the tribe of Manasseh
  lexicon: HALOT
  rationale: The relative clause identifies these chiefs as associated with Manasseh.
    'That belonged to Manasseh' is natural English for organizational affiliation
    and avoids over-specifying beyond the Hebrew.
