id: 1CH.12.35
reference: 1 Chronicles 12:35
source:
  edition: WLC
  text: וּ/מִ/נַּפְתָּלִ֖י שָׂרִ֣ים אָ֑לֶף וְ/עִמָּ/הֶם֙ בְּ/צִנָּ֣ה וַ/חֲנִ֔ית שְׁלֹשִׁ֥ים
    וְ/שִׁבְעָ֖ה אָֽלֶף׃ס
translation:
  text: 'From Naphtali: 1,000 commanders, and with them 37,000 with shield and spear.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chiefs' or 'captains' for 'commanders.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term for 'shield' can refer specifically to a large shield.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִנַּפְתָּלִי
  chosen: From Naphtali
  alternatives:
  - And from Naphtali
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally means 'and from Naphtali.'
    In English list style, 'From Naphtali' is natural while still preserving the tribal
    source.
- source_word: שָׂרִים
  chosen: commanders
  alternatives:
  - chiefs
  - leaders
  - captains
  lexicon: HALOT
  rationale: שָׂרִים denotes officials or military leaders. In this military census
    context, 'commanders' best conveys rank and function without overstating a specific
    office.
- source_word: אָלֶף
  chosen: 1,000
  alternatives:
  - a thousand
  lexicon: HALOT
  rationale: Rendered numerically for readability in a military enumeration. The term
    is the standard cardinal number here.
- source_word: וְעִמָּהֶם
  chosen: and with them
  alternatives:
  - with them
  lexicon: HALOT
  rationale: The conjunction is retained because it coordinates the commanders with
    the larger body accompanying them.
- source_word: בְּצִנָּה
  chosen: with shield
  alternatives:
  - bearing shield
  - with large shield
  lexicon: HALOT
  rationale: צִנָּה refers to a shield, often a large shield. 'With shield' matches
    the Hebrew prepositional phrase and keeps the equipment-list style concise.
- source_word: וַחֲנִית
  chosen: and spear
  alternatives:
  - and lance
  lexicon: HALOT
  rationale: חֲנִית is the standard term for spear. 'Spear' is the clearest modern
    equivalent.
- source_word: שְׁלֹשִׁים וְשִׁבְעָה אָלֶף
  chosen: 37,000
  alternatives:
  - thirty-seven thousand
  lexicon: HALOT
  rationale: Rendered numerically for readability and consistency with the preceding
    number in this roster context.
