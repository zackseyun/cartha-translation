id: 1CH.12.28
reference: 1 Chronicles 12:28
source:
  edition: WLC
  text: וִ/יהוֹיָדָ֖ע הַ/נָּגִ֣יד לְ/אַהֲרֹ֑ן וְ/עִמּ֕/וֹ שְׁלֹ֥שֶׁת אֲלָפִ֖ים וּ/שְׁבַ֥ע
    מֵאֽוֹת׃ס
translation:
  text: and Jehoiada, the leader of Aaron, and with him three thousand seven hundred.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jehoiada, the leader for Aaron,' that is, the chief representing the
      Aaronite priestly house.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִ/יהוֹיָדָע
  chosen: and Jehoiada
  alternatives:
  - Jehoiada
  lexicon: HALOT
  rationale: The prefixed conjunction ו is carried over as 'and,' continuing the census-style
    list. The personal name is transliterated per translation philosophy.
- source_word: הַ/נָּגִיד
  chosen: the leader
  alternatives:
  - the prince
  - the ruler
  - the chief
  lexicon: HALOT
  rationale: נָגִיד denotes a leader, ruler, or chief. 'Leader' is clear modern English
    and fits the military/tribal listing context without implying monarchy as strongly
    as 'prince' might.
- source_word: לְ/אַהֲרֹן
  chosen: of Aaron
  alternatives:
  - for Aaron
  - belonging to Aaron
  lexicon: HALOT
  rationale: The preposition ל here marks affiliation or relation, not direction.
    In context Jehoiada is identified as the leader associated with the Aaronites/priestly
    house, so 'of Aaron' is the most concise rendering of that genitival relationship.
- source_word: וְ/עִמּ/וֹ
  chosen: and with him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: The conjunction plus prepositional phrase introduces the number accompanying
    Jehoiada. Retaining 'and with him' preserves the list structure and the Hebrew
    coordination.
- source_word: שְׁלֹשֶׁת אֲלָפִים וּ/שְׁבַע מֵאֽוֹת
  chosen: three thousand seven hundred
  alternatives:
  - 3,700
  lexicon: HALOT
  rationale: The cardinal number is rendered in standard English words for readability
    in running text. This preserves the exact count without paraphrase.
