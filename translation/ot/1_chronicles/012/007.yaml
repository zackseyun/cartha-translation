id: 1CH.12.7
reference: 1 Chronicles 12:7
source:
  edition: WLC
  text: אֶלְקָנָ֡ה וְ֠/יִשִּׁיָּהוּ וַ/עֲזַרְאֵ֧ל וְ/יוֹעֶ֛זֶר וְ/יָשָׁבְעָ֖ם הַ/קָּרְחִֽים׃
translation:
  text: Elkanah, Isshiah, Azarel, Joezer, and Jashobeam, the Korahites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the descendants of Korah."
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶלְקָנָה
  chosen: Elkanah
  rationale: Proper personal name; transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: יִשִּׁיָּהוּ
  chosen: Isshiah
  alternatives:
  - Ishiah
  - Jeshiah
  rationale: Proper personal name; transliterated from the Hebrew form in this verse.
    Alternative English spellings reflect different conventions for representing Hebrew
    consonants and vowels.
- source_word: עֲזַרְאֵל
  chosen: Azarel
  alternatives:
  - Azareel
  rationale: Proper personal name; transliterated directly from Hebrew. Alternative
    spelling reflects a fuller representation of the vowel sequence in some English
    traditions.
- source_word: יוֹעֶזֶר
  chosen: Joezer
  alternatives:
  - Joezer
  rationale: Proper personal name; transliterated in a standard English biblical form.
    The initial יוֹ is commonly represented as 'Jo-' in English biblical names.
- source_word: יָשָׁבְעָם
  chosen: Jashobeam
  alternatives:
  - Josheb-Basshebeth
  rationale: Proper personal name; transliterated from the form attested here. The
    listed alternative is a different name form associated elsewhere, not the reading
    of this verse, so it is not adopted.
- source_word: הַקָּרְחִים
  chosen: the Korahites
  alternatives:
  - the Korhites
  - the descendants of Korah
  lexicon: HALOT
  rationale: Gentilic/plural clan designation with the article. 'The Korahites' is
    the most natural English rendering for a family or clan group descended from Korah.
    'Descendants of Korah' is interpretive and more expansive than the Hebrew form
    requires.
