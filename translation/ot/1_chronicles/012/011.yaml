id: 1CH.12.11
reference: 1 Chronicles 12:11
source:
  edition: WLC
  text: מִשְׁמַנָּה֙ הָ/רְבִיעִ֔י יִרְמְיָ֖ה הַ/חֲמִשִֽׁי׃
translation:
  text: Mishmannah the fourth, Jeremiah the fifth.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מִשְׁמַנָּה
  chosen: Mishmannah
  alternatives:
  - Mishmanah
  rationale: Proper personal name; per translation philosophy, names are transliterated
    rather than translated. English spelling follows a standard transliteration that
    preserves the doubled consonant indicated in Hebrew.
- source_word: הָרְבִיעִי
  chosen: the fourth
  alternatives:
  - fourth
  lexicon: HALOT
  rationale: Ordinal adjective with article, indicating rank in the list. Rendering
    the article explicitly as 'the fourth' matches normal English enumeration style
    in this genealogical/military roster context.
- source_word: יִרְמְיָה
  chosen: Jeremiah
  alternatives:
  - Yirmeyah
  rationale: Proper personal name; transliterated in conventional English biblical
    form for readability and recognizability.
- source_word: הַחֲמִשִׁי
  chosen: the fifth
  alternatives:
  - fifth
  lexicon: HALOT
  rationale: Ordinal adjective with article, indicating the next rank in the sequence.
    'The fifth' preserves the list structure and mirrors the Hebrew article.
