id: 1CH.12.8
reference: 1 Chronicles 12:8
source:
  edition: WLC
  text: וְ/יוֹעֵאלָ֧ה וּ/זְבַדְיָ֛ה בְּנֵ֥י יְרֹחָ֖ם מִן הַ/גְּדֽוֹר־׃
translation:
  text: and Joelah and Zebadiah, the sons of Jeroham from Gedor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew spelling may also be transliterated 'Joelah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יוֹעֵאלָה
  chosen: and Joelah
  alternatives:
  - and Joelah
  lexicon: HALOT
  rationale: The prefixed conjunction וְ is rendered as 'and.' The proper name is
    transliterated rather than translated, following the translation philosophy for
    personal names. English spelling 'Joelah' reflects a standard transliteration
    of יוֹעֵאלָה; 'Joelah' is preserved as an alternative due to variation in English
    conventions for representing the initial יוֹ sequence.
- source_word: וּ/זְבַדְיָה
  chosen: and Zebadiah
  alternatives:
  - and Zabadiah
  lexicon: HALOT
  rationale: The prefixed conjunction וּ is rendered as 'and.' The proper name is
    transliterated. 'Zebadiah' is a conventional English form; a slightly different
    vowel representation is possible in transliteration, so an alternative is noted.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - sons of
  - descendants of
  lexicon: HALOT
  rationale: Construct plural of בן is most directly 'sons of.' The article is supplied
    in English for natural syntax in a list. 'Descendants of' is possible in some
    genealogical contexts, but here the immediate filial sense is most natural.
- source_word: יְרֹחָם
  chosen: Jeroham
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: מִן הַ/גְּדֽוֹר
  chosen: from Gedor
  alternatives:
  - from the Gedorite settlement
  - from Gedor
  lexicon: HALOT
  rationale: The preposition מִן is rendered 'from.' הַגְּדוֹר is best taken as a
    place name, 'Gedor,' with the article absorbed idiomatically in English rather
    than rendered woodenly as 'the Gedor.' The phrase identifies origin or clan association.
