id: 1CH.12.20
reference: 1 Chronicles 12:20
source:
  edition: WLC
  text: וּ/מִֽ/מְּנַשֶּׁ֞ה נָפְל֣וּ עַל דָּוִ֗יד בְּ/בֹא֨/וֹ עִם פְּלִשְׁתִּ֧ים עַל
    שָׁא֛וּל לַ/מִּלְחָמָ֖ה וְ/לֹ֣א עֲזָרֻ֑/ם כִּ֣י בְ/עֵצָ֗ה שִׁלְּחֻ֜/הוּ סַרְנֵ֤י
    פְלִשְׁתִּים֙ לֵ/אמֹ֔ר בְּ/רָאשֵׁ֕י/נוּ יִפּ֖וֹל אֶל אֲדֹנָ֥י/ו שָׁאֽוּל־־־־׃
translation:
  text: Some from Manasseh also defected to David when he came with the Philistines
    against Saul for battle, though they did not help them, because the lords of the
    Philistines, after taking counsel, sent him away, saying, “He may defect to his
    master Saul at the cost of our heads.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fell to David' / 'joined David'; the Hebrew idiom means to go over to
      someone's side.
    reason: lexical_alternative
  - marker: b
    text: Literally 'with our heads,' an idiom meaning 'at the cost of our lives'
      or 'to our own ruin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִמְּנַשֶּׁה
  chosen: Some from Manasseh also
  alternatives:
  - And from Manasseh
  - Also from Manasseh
  lexicon: HALOT
  rationale: 'The prefixed conjunction plus מן marks addition: ''and/from Manasseh.''
    English idiom benefits from making the implied partitive explicit (''some from
    Manasseh''), since named individuals follow in the next verse. ''Also'' captures
    the additive force.'
- source_word: נָפְלוּ עַל דָּוִיד
  chosen: defected to David
  alternatives:
  - fell to David
  - joined David
  lexicon: HALOT
  rationale: The idiom נפל על in military/political contexts means to go over to someone's
    side, not literal falling. 'Defected to' best preserves the political-military
    sense and fits the later concern that he might 'defect' back to Saul.
- source_word: בְּבֹאוֹ עִם פְּלִשְׁתִּים עַל שָׁאוּל לַמִּלְחָמָה
  chosen: when he came with the Philistines against Saul for battle
  alternatives:
  - when he went with the Philistines against Saul to battle
  - when he came with the Philistines to fight against Saul
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks temporal circumstance,
    'when he came/went.' 'Came' is retained as a straightforward rendering of בוא.
    עִם indicates accompaniment with the Philistines; עַל שָׁאוּל marks hostile direction
    'against Saul'; לַמִּלְחָמָה is purpose/result, naturally 'for battle.'
- source_word: וְלֹא עֲזָרֻם
  chosen: though they did not help them
  alternatives:
  - but they did not help them
  - yet they did not help them
  lexicon: HALOT
  rationale: The clause explains that these Manassites did not actually assist the
    Philistines in battle. The 3mp suffix most naturally refers to the Philistines,
    the nearest plural antecedent. 'Though' gives smooth English connection to the
    prior clause while preserving the adversative sense.
- source_word: כִּי בְעֵצָה
  chosen: because ... after taking counsel
  alternatives:
  - for by counsel
  - because by agreement
  lexicon: HALOT
  rationale: 'בְעֵצָה denotes deliberation/counsel. In context it introduces the reason
    David''s men did not help: the Philistine rulers dismissed David after consultation.
    ''After taking counsel'' expresses the idiom naturally in English.'
- source_word: שִׁלְּחֻהוּ
  chosen: sent him away
  alternatives:
  - dismissed him
  - sent him off
  lexicon: HALOT
  rationale: The Piel of שלח with object suffix here means to dispatch or dismiss
    David from accompanying the Philistines. 'Sent him away' is clear and slightly
    more formal than 'sent him off.'
- source_word: סַרְנֵי פְלִשְׁתִּים
  chosen: the lords of the Philistines
  alternatives:
  - the rulers of the Philistines
  - the Philistine commanders
  lexicon: HALOT
  rationale: סַרְנֵי is the distinctive title for Philistine rulers. 'Lords' preserves
    the title-like quality better than the flatter 'rulers,' while avoiding over-specification
    such as 'commanders.'
- source_word: בְּרָאשֵׁינוּ
  chosen: at the cost of our heads
  alternatives:
  - with our heads
  - by means of our heads
  lexicon: HALOT
  rationale: The idiom means at the price of their lives/heads, i.e., to their mortal
    danger. 'At the cost of our heads' preserves the vivid Hebrew image while making
    the sense clear.
- source_word: יִפּוֹל אֶל אֲדֹנָיו שָׁאוּל
  chosen: He may defect to his master Saul
  alternatives:
  - he will fall away to his master Saul
  - he may go over to his lord Saul
  lexicon: HALOT
  rationale: Again נפל in this context means to defect or go over to another side.
    The imperfect in direct speech can express apprehension ('he may defect'). אֲדֹנָיו
    refers to Saul as David's master/lord in political service; 'master' fits the
    personal allegiance context better than 'lord' in modern English and avoids theological
    overtones.
