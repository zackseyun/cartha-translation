id: 1CH.12.30
reference: 1 Chronicles 12:30
source:
  edition: WLC
  text: וּ/מִן בְּנֵ֧י בִנְיָמִ֛ן אֲחֵ֥י שָׁא֖וּל שְׁלֹ֣שֶׁת אֲלָפִ֑ים וְ/עַד הֵ֨נָּה֙
    מַרְבִּיתָ֔/ם שֹׁמְרִ֕ים מִשְׁמֶ֖רֶת בֵּ֥ית שָׁאֽוּל־־׃ס
translation:
  text: And from the sons of Benjamin, Saul’s brothers, three thousand; until then
    most of them had been keeping watch over the house of Saul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Saul’s kinsmen' / 'relatives of Saul.' The Hebrew 'brothers' can extend
      beyond literal siblings to a wider kinship group.
    reason: lexical_alternative
  - marker: b
    text: '''The house of Saul'' may refer to Saul’s household or to the broader interests
      of Saul’s royal line.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן
  chosen: And from
  alternatives:
  - From
  lexicon: HALOT
  rationale: The conjunction plus preposition continues the numerical list of tribes
    contributing to David. Rendering both elements preserves the verse’s additive
    structure within the larger catalog.
- source_word: בְּנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the Benjaminites
  - the people of Benjamin
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the tribal/genealogical idiom.
    'Benjaminites' is possible, but 'sons of Benjamin' better reflects the Hebrew
    construction in this census-like context.
- source_word: אֲחֵי שָׁאוּל
  chosen: Saul’s brothers
  alternatives:
  - kinsmen of Saul
  - relatives of Saul
  lexicon: HALOT
  rationale: Although 'brothers' can sometimes broaden to kin, the construct phrase
    naturally identifies the Benjaminites as Saul’s tribal/familial brothers. The
    more literal rendering is retained, while the broader sense is preserved in a
    footnote because English readers may otherwise assume only literal siblings.
- source_word: שְׁלֹשֶׁת אֲלָפִים
  chosen: three thousand
  lexicon: HALOT
  rationale: Standard numerical rendering; no special idiom requires expansion.
- source_word: וְעַד הֵנָּה
  chosen: until then
  alternatives:
  - up to that time
  - until now
  lexicon: HALOT
  rationale: In this historical narrative setting, the phrase points to the time up
    to David’s accession/support described here, not to the reader’s present. 'Until
    then' is idiomatic and contextually precise.
- source_word: מַרְבִּיתָם
  chosen: most of them
  alternatives:
  - the greater part of them
  - their majority
  lexicon: HALOT
  rationale: The noun denotes the larger number or majority. 'Most of them' is clear
    modern English and accurately conveys the comparative sense.
- source_word: שֹׁמְרִים
  chosen: had been keeping watch
  alternatives:
  - were keeping guard
  - were guarding
  lexicon: HALOT
  rationale: The participle in context describes an ongoing prior state up to that
    point. English past perfect progressive best captures the sense in relation to
    'until then.'
- source_word: מִשְׁמֶרֶת
  chosen: watch
  alternatives:
  - guard
  - charge
  - duty
  lexicon: HALOT
  rationale: With שׁמר, the cognate noun expresses the act/duty of guarding. 'Keeping
    watch' is idiomatic English that preserves the guarding sense without awkward
    repetition like 'keeping guard.'
- source_word: בֵּית שָׁאוּל
  chosen: the house of Saul
  alternatives:
  - Saul’s house
  - the household of Saul
  - the dynasty of Saul
  lexicon: HALOT
  rationale: '''House'' preserves the Hebrew''s intentional breadth, which may include
    household, royal interest, or dynastic cause. A more interpretive gloss like ''dynasty''
    would narrow the sense too much in the main text.'
