id: 1CH.12.32
reference: 1 Chronicles 12:32
source:
  edition: WLC
  text: וּ/מֵ/חֲצִי֙ מַטֵּ֣ה מְנַשֶּׁ֔ה שְׁמוֹנָ֥ה עָשָׂ֖ר אָ֑לֶף אֲשֶׁ֤ר נִקְּבוּ֙
    בְּ/שֵׁמ֔וֹת לָ/ב֖וֹא לְ/הַמְלִ֥יךְ אֶת דָּוִֽיד־׃ס
translation:
  text: And from the half-tribe of Manasseh, eighteen thousand, who were designated
    by name, came to make David king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who were named by name,' that is, individually designated or expressly
      listed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מֵ/חֲצִי
  chosen: And from the half-
  alternatives:
  - And from half of the
  - And from the half of the
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition are carried over explicitly.
    חֲצִי means 'half' or 'half of.' In English, 'from the half-tribe' is the most
    natural compact rendering when followed by מַטֵּה.
- source_word: מַטֵּה מְנַשֶּׁה
  chosen: tribe of Manasseh
  alternatives:
  - staff of Manasseh
  - branch of Manasseh
  lexicon: HALOT
  rationale: In tribal census/military contexts מַטֶּה commonly means 'tribe.' Because
    it is modified by חֲצִי, the full phrase is best rendered 'the half-tribe of Manasseh.'
    'Manasseh' is transliterated as a personal/tribal name per project philosophy.
- source_word: שְׁמוֹנָה עָשָׂר אָלֶף
  chosen: eighteen thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number construction.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  - which
  lexicon: HALOT
  rationale: Relative pronoun referring to the people counted from the half-tribe;
    'who' is idiomatic for persons in English.
- source_word: נִקְּבוּ
  chosen: were designated
  alternatives:
  - were named
  - were specified
  - were enrolled
  lexicon: HALOT
  rationale: The Niphal of נקב in this context conveys being designated/identified
    explicitly. 'Were designated' preserves the passive sense without overcommitting
    to a technical administrative nuance.
- source_word: בְּשֵׁמוֹת
  chosen: by name
  alternatives:
  - by names
  - name by name
  lexicon: HALOT
  rationale: Idiomatic expression meaning individually identified or expressly listed.
    Singular English idiom 'by name' best conveys the sense.
- source_word: לָבוֹא
  chosen: came
  alternatives:
  - to come
  lexicon: HALOT
  rationale: 'Although formally an infinitive (''to come''), in this list context
    English reads more naturally by making the movement finite: they ''came'' for
    the stated purpose. This is a modest smoothing consistent with optimal equivalence.'
- source_word: לְהַמְלִיךְ
  chosen: to make ... king
  alternatives:
  - to crown
  - to enthrone
  - to cause ... to reign
  lexicon: HALOT
  rationale: The Hiphil of מלך means 'to make king' or 'to proclaim/install as king.'
    'Make David king' is direct and natural, avoiding the narrower ceremonial sense
    of 'crown.'
- source_word: אֶת דָּוִיד
  chosen: David
  lexicon: HALOT
  rationale: Direct object marker plus proper name; rendered simply as the object
    'David.'
