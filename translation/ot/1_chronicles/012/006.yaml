id: 1CH.12.6
reference: 1 Chronicles 12:6
source:
  edition: WLC
  text: אֶלְעוּזַ֤י וִ/ירִימוֹת֙ וּ/בְעַלְיָ֣ה וּ/שְׁמַרְיָ֔הוּ וּ/שְׁפַטְיָ֖הוּ ה/חריפי׃
translation:
  text: Eluzai, Jerimoth, Bealiah, Shemariahu, and Shephatiah the Haruphite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Hariphite." The Hebrew gentilicial form may reflect a clan name
      also represented elsewhere with the form Hariph.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶלְעוּזַי
  chosen: Eluzai
  alternatives:
  - El-uzai
  rationale: Proper personal name; per translation philosophy, personal names are
    transliterated rather than translated.
- source_word: וִירִימוֹת
  chosen: Jerimoth
  alternatives:
  - Yerimoth
  rationale: Proper personal name with prefixed conjunction; rendered by standard
    English transliteration, with the conjunction absorbed into English list punctuation
    rather than repeated as 'and' before every item.
- source_word: וּבְעַלְיָה
  chosen: Bealiah
  alternatives:
  - Baaliah
  rationale: Proper personal name; transliterated. The initial consonant-vowel sequence
    can be represented as 'Bea-' or 'Baa-'; 'Bealiah' is a common and readable English
    form.
- source_word: וּשְׁמַרְיָהוּ
  chosen: Shemariahu
  alternatives:
  - Shemariah
  rationale: Proper personal name; transliterated. The fuller ending '-yahu' is preserved
    to reflect the Hebrew form more directly, rather than shortening it to '-iah'.
- source_word: וּשְׁפַטְיָהוּ
  chosen: Shephatiah
  alternatives:
  - Shephatiahu
  rationale: Proper personal name; transliterated. 'Shephatiah' is the conventional
    English form and is sufficiently close to the Hebrew while remaining readable.
- source_word: הַחֲרִיפִי
  chosen: the Haruphite
  alternatives:
  - the Hariphite
  lexicon: HALOT
  rationale: Gentilic/title with article, indicating clan or family affiliation. Rendered
    as a gentilicial designation with '-ite.' The underlying form likely relates to
    the family/clan name Hariph/Haruph; 'Haruphite' follows the consonantal-vocalized
    form in this text, while 'Hariphite' is a plausible alternative influenced by
    related name forms elsewhere.
