id: 1CH.12.24
reference: 1 Chronicles 12:24
source:
  edition: WLC
  text: וְ֠/אֵלֶּה מִסְפְּרֵ֞י רָאשֵׁ֤י הֶֽ/חָלוּץ֙ לַ/צָּבָ֔א בָּ֥אוּ עַל דָּוִ֖יד
    חֶבְר֑וֹנָ/ה לְ/הָסֵ֞ב מַלְכ֥וּת שָׁא֛וּל אֵלָ֖י/ו כְּ/פִ֥י יְהוָֽה־׃ס
translation:
  text: And these are the numbers of the heads of the armed troops for war, who came
    to David at Hebron to turn Saul’s kingdom over to him, according to the word of
    the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''according to the mouth of the LORD,'' an idiom meaning ''according
      to the word'' or ''as the LORD had spoken.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְפְּרֵי
  chosen: the numbers of
  alternatives:
  - the number of
  - the tally of
  lexicon: HALOT
  rationale: 'Plural construct naturally introduces an enumeration/list: ''these are
    the numbers of...'' rather than a singular abstract ''number.'''
- source_word: רָאשֵׁי
  chosen: the heads of
  alternatives:
  - the chiefs of
  - the leaders of
  lexicon: HALOT
  rationale: Literally 'heads of.' Kept in a transparent but natural English expression.
    'Leaders' is possible, but 'heads of' preserves the construct relation and military-administrative
    nuance.
- source_word: הֶחָלוּץ
  chosen: the armed troops
  alternatives:
  - the armed men
  - those equipped for battle
  lexicon: HALOT
  rationale: The term refers to those equipped/drawn up for military service, not
    merely generic soldiers. 'Armed troops' captures the collective military sense
    better than a strictly individualizing gloss.
- source_word: לַצָּבָא
  chosen: for war
  alternatives:
  - for the army
  - for military service
  lexicon: HALOT
  rationale: In context with הֶחָלוּץ, this specifies military purpose/function. 'For
    war' is concise and idiomatic; 'for the army' is less natural in English here.
- source_word: בָּאוּ עַל דָּוִיד
  chosen: came to David
  alternatives:
  - came over to David
  - came against David
  lexicon: HALOT
  rationale: With עַל after בוא in this context, the sense is movement toward/allegiance
    to David, not hostility. 'Came to David' is clear; 'came over to David' is interpretive
    but plausible. The simpler rendering avoids overreading while fitting the context
    of support.
- source_word: חֶבְרוֹנָה
  chosen: at Hebron
  alternatives:
  - to Hebron
  lexicon: HALOT
  rationale: The directional he indicates motion toward Hebron, but in English the
    phrase with David is most naturally rendered 'came to David at Hebron.' This preserves
    the locative sense in idiomatic English.
- source_word: לְהָסֵב
  chosen: to turn ... over
  alternatives:
  - to transfer
  - to turn
  lexicon: HALOT
  rationale: The hiphil of סבב here conveys causing the kingship to pass/turn to David.
    'Turn ... over' is idiomatic and preserves the transfer sense without becoming
    too technical.
- source_word: מַלְכוּת שָׁאוּל
  chosen: Saul’s kingdom
  alternatives:
  - the kingdom of Saul
  - Saul’s kingship
  lexicon: HALOT
  rationale: The construct can denote the royal rule/kingdom belonging to Saul. 'Saul’s
    kingdom' is natural English. 'Kingship' is possible, but 'kingdom' better fits
    the transfer of rule in narrative style.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - over to him
  lexicon: HALOT
  rationale: Rendered with the verb phrase as 'turn ... over to him' to express the
    directional transfer clearly.
- source_word: כְּפִי יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - according to the mouth of the LORD
  - as the LORD had spoken
  lexicon: HALOT
  rationale: Literally 'according to the mouth of YHWH,' an idiom for divine utterance/command.
    'According to the word of the LORD' preserves the idiomatic sense while remaining
    readable. Per doctrine, יְהוָה is rendered 'the LORD'.
