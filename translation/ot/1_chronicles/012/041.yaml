id: 1CH.12.41
reference: 1 Chronicles 12:41
source:
  edition: WLC
  text: וְ/גַ֣ם הַ/קְּרֽוֹבִים אֲ֠לֵי/הֶם עַד יִשָׂשכָ֨ר וּ/זְבֻל֜וּן וְ/נַפְתָּלִ֗י
    מְבִיאִ֣ים לֶ֡חֶם בַּ/חֲמוֹרִ֣ים וּ/בַ/גְּמַלִּ֣ים וּ/בַ/פְּרָדִ֣ים וּֽ/בַ/בָּקָ֡ר
    מַאֲכָ֡ל קֶ֠מַח דְּבֵלִ֨ים וְ/צִמּוּקִ֧ים וְ/יַֽיִן וְ/שֶׁ֛מֶן וּ/בָקָ֥ר וְ/צֹ֖אן
    לָ/רֹ֑ב כִּ֥י שִׂמְחָ֖ה בְּ/יִשְׂרָאֵֽל־־׀־׃פ
translation:
  text: 'Also those near them, as far as Issachar and Zebulun and Naphtali, were bringing
    food on donkeys, camels, mules, and cattle: provisions of flour, fig cakes, raisin
    cakes, wine, oil, cattle, and sheep in abundance, for there was joy in Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew לֶחֶם is literally 'bread,' but here it introduces a wider list of
      provisions, so 'food' is used in the main text.
    reason: lexical_alternative
  - marker: b
    text: Or 'even to Issachar, Zebulun, and Naphtali.' The phrase marks the geographic
      extent of those bringing supplies.
    reason: alternative_reading
  - marker: c
    text: Hebrew צִמּוּקִים may be rendered 'raisins' or 'dried grapes'; 'raisin cakes'
      reflects the likely prepared-food sense in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: Also
  alternatives:
  - And also
  - Moreover
  lexicon: HALOT
  rationale: Adds continuation and emphasis from the previous verse; 'Also' is natural
    English while preserving the additive force.
- source_word: הַקְּרֹבִים אֲלֵיהֶם
  chosen: those near them
  alternatives:
  - their neighbors
  - those close to them
  lexicon: HALOT
  rationale: Literally 'the ones near to them.' 'Those near them' preserves the relational
    sense without over-interpreting as settled neighbors only.
- source_word: עַד יִשָׂשכָר וּזְבֻלוּן וְנַפְתָּלִי
  chosen: as far as Issachar and Zebulun and Naphtali
  alternatives:
  - even to Issachar, Zebulun, and Naphtali
  lexicon: HALOT
  rationale: עַד marks extent. The phrase indicates that support came from nearby
    groups extending northward to these tribes.
- source_word: מְבִיאִים
  chosen: were bringing
  alternatives:
  - brought
  - bringing
  lexicon: HALOT
  rationale: Participle in narrative context conveys ongoing or repeated action; 'were
    bringing' reflects that aspect in idiomatic English.
- source_word: לֶחֶם
  chosen: food
  alternatives:
  - bread
  lexicon: HALOT
  rationale: Though literally 'bread,' the following list includes a broad range of
    provisions. 'Food' best captures the collective sense here without restricting
    it to baked bread.
- source_word: בַּחֲמוֹרִים וּבַגְּמַלִּים וּבַפְּרָדִים וּבַבָּקָר
  chosen: on donkeys, camels, mules, and cattle
  alternatives:
  - by donkeys, camels, mules, and oxen
  - on donkeys, camels, mules, and ox-carts
  lexicon: HALOT
  rationale: The preposition ב marks means or conveyance. בָּקָר normally means cattle/herd
    animals, not carts; the text says the goods were transported by pack and herd
    animals. 'On' is idiomatic for carried transport.
- source_word: מַאֲכָל
  chosen: provisions
  alternatives:
  - food
  - supplies
  lexicon: HALOT
  rationale: Introduces the detailed list of edible supplies. 'Provisions' fits the
    logistical context of supplying a large gathering.
- source_word: קֶמַח
  chosen: flour
  alternatives:
  - meal
  lexicon: HALOT
  rationale: Standard rendering for finely ground grain product in a food list.
- source_word: דְּבֵלִים
  chosen: fig cakes
  alternatives:
  - pressed figs
  - cakes of figs
  lexicon: HALOT
  rationale: Refers to compressed masses of figs prepared for transport and storage;
    'fig cakes' is concise and idiomatic.
- source_word: צִמּוּקִים
  chosen: raisin cakes
  alternatives:
  - raisins
  - dried grapes
  lexicon: HALOT
  rationale: Likely compressed dried grapes rather than loose fruit in this provisioning
    context. 'Raisin cakes' matches the prepared-food sense alongside fig cakes.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering.
- source_word: שֶׁמֶן
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: The Hebrew is simply 'oil'; in context it would ordinarily be olive oil,
    but the text does not specify, so the broader term is retained.
- source_word: וּבָקָר וְצֹאן
  chosen: cattle, and sheep
  alternatives:
  - herds and flocks
  - oxen and sheep
  lexicon: HALOT
  rationale: Distinct from the earlier transport reference, here the animals themselves
    are part of the abundance supplied. 'Cattle and sheep' is clear and concrete.
- source_word: לָרֹב
  chosen: in abundance
  alternatives:
  - in great quantity
  - abundantly
  lexicon: HALOT
  rationale: Expresses plentiful supply; 'in abundance' is natural and preserves the
    quantitative emphasis.
- source_word: כִּי שִׂמְחָה בְּיִשְׂרָאֵל
  chosen: for there was joy in Israel
  alternatives:
  - because there was rejoicing in Israel
  lexicon: HALOT
  rationale: A concluding causal clause explaining the lavish support. 'Joy' is slightly
    broader and smoother in English, while still faithful to שִׂמְחָה.
