id: 1CH.12.22
reference: 1 Chronicles 12:22
source:
  edition: WLC
  text: וְ/הֵ֗מָּה עָזְר֤וּ עִם דָּוִיד֙ עַֽל הַ/גְּד֔וּד כִּֽי גִבּ֥וֹרֵי חַ֖יִל
    כֻּלָּ֑/ם וַ/יִּהְי֥וּ שָׂרִ֖ים בַּ/צָּבָֽא־־־׃
translation:
  text: And they helped David against the raiding band, for all of them were mighty
    men of valor, and they became commanders in the army.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against the band' or 'against the troop'; the Hebrew גְּדוּד can refer
      to a military band or raiding party.
    reason: lexical_alternative
  - marker: b
    text: Or 'mighty warriors'; the Hebrew phrase גִבּוֹרֵי חַיִל is a standard expression
      for valiant, capable fighting men.
    reason: lexical_alternative
  - marker: c
    text: Or 'captains' or 'chiefs' for 'commanders.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵמָּה
  chosen: And they
  alternatives:
  - And these
  - Now they
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis to the subject. In natural English,
    this is adequately conveyed by the explicit subject 'they' with the conjunction
    retained.
- source_word: עָזְרוּ
  chosen: helped
  alternatives:
  - came to help
  - gave support to
  lexicon: HALOT
  rationale: The verb עזר commonly means 'help' or 'support.' 'Helped' is the most
    direct and idiomatic rendering here.
- source_word: עִם דָּוִיד
  chosen: David
  alternatives:
  - with David
  lexicon: HALOT
  rationale: Although עִם normally means 'with,' English idiom with 'help' often expresses
    the beneficiary directly ('helped David'). The association with David is preserved
    without awkwardness.
- source_word: עַל הַגְּדוּד
  chosen: against the raiding band
  alternatives:
  - against the band
  - against the troop
  - in the raid
  lexicon: HALOT
  rationale: גְּדוּד can denote a band, troop, or raiding party. In this military
    context, 'raiding band' best captures the sense of an armed marauding group. The
    preposition עַל is rendered 'against' to fit the hostile military sense.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for their effectiveness or role. 'For'
    preserves the explanatory connection in a slightly more formal narrative style.
- source_word: גִבּוֹרֵי חַיִל
  chosen: mighty men of valor
  alternatives:
  - mighty warriors
  - valiant men
  - men of strength
  lexicon: HALOT
  rationale: This is a common Hebrew military expression for capable, valiant fighting
    men. 'Mighty men of valor' preserves the traditional force and lexical components,
    while remaining understandable.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - all
  lexicon: HALOT
  rationale: The suffixal form explicitly refers to the whole group. 'All of them'
    brings out the distributive emphasis more clearly than bare 'all.'
- source_word: וַיִּהְיוּ
  chosen: they became
  alternatives:
  - they were
  - they served as
  lexicon: HALOT
  rationale: 'The verb היה in wayyiqtol here most naturally marks resultant status:
    they came to be or became. ''They became'' reflects the narrative progression
    better than a static ''they were.'''
- source_word: שָׂרִים
  chosen: commanders
  alternatives:
  - chiefs
  - captains
  - leaders
  lexicon: HALOT
  rationale: שָׂרִים denotes officials, princes, or military leaders depending on
    context. In this military setting, 'commanders' is the clearest contextual rendering.
- source_word: בַּצָּבָא
  chosen: in the army
  alternatives:
  - in the host
  - in the military force
  lexicon: HALOT
  rationale: צָבָא here refers to the organized military force. 'Army' is the most
    natural modern English equivalent.
