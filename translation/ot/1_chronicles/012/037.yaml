id: 1CH.12.37
reference: 1 Chronicles 12:37
source:
  edition: WLC
  text: וּ/מֵ/אָשֵׁ֗ר יוֹצְאֵ֥י צָבָ֛א לַ/עֲרֹ֥ךְ מִלְחָמָ֖ה אַרְבָּעִ֥ים אָֽלֶף׃ס
translation:
  text: And from Asher, forty thousand who went out for military service, to draw
    up for battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forty thousand able to array themselves for war.' The Hebrew combines
      'going out for military service' with a verb meaning 'to arrange/draw up' in
      battle formation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מֵ/אָשֵׁר
  chosen: And from Asher
  alternatives:
  - From Asher
  - And from the tribe of Asher
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition are naturally rendered together
    as 'And from.' 'Asher' is the tribal name and is transliterated as a proper name
    rather than expanded unless context requires 'tribe of.'
- source_word: יוֹצְאֵי
  chosen: who went out
  alternatives:
  - those going out
  - those who marched out
  lexicon: HALOT
  rationale: The participle from יצא denotes those going out or going forth. In this
    military census-style context, 'who went out' is idiomatic English and preserves
    the participial sense without over-paraphrase.
- source_word: צָבָא
  chosen: for military service
  alternatives:
  - for the army
  - for warfare
  - for service
  lexicon: HALOT
  rationale: צָבָא can denote army, host, or military service. Here with יוֹצְאֵי
    it describes men available for organized martial duty. 'For military service'
    captures the function more clearly in English than the less idiomatic 'going out
    of army/host.'
- source_word: לַ/עֲרֹךְ
  chosen: to draw up
  alternatives:
  - to arrange
  - to set in order
  - to prepare
  lexicon: HALOT
  rationale: ערך in military contexts commonly means to arrange or draw up troops
    in battle order. 'To draw up' is a concise military English equivalent.
- source_word: מִלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  - the battle
  lexicon: HALOT
  rationale: Although the noun is 'war/battle,' in combination with לערך the idiomatic
    sense is drawing up for battle. This is more natural than 'arrange war' while
    remaining faithful to the military context.
- source_word: אַרְבָּעִים אָלֶף
  chosen: forty thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number construction; rendered directly as 'forty
    thousand.'
