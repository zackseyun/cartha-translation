id: 1CH.12.27
reference: 1 Chronicles 12:27
source:
  edition: WLC
  text: מִן בְּנֵי֙ הַ/לֵּוִ֔י אַרְבַּ֥עַת אֲלָפִ֖ים וְ/שֵׁ֥שׁ מֵאֽוֹת־׃ס
translation:
  text: 'From the sons of Levi: 4,600.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מִן
  chosen: From
  alternatives:
  - Of
  - From among
  lexicon: HALOT
  rationale: The preposition marks the tribal/group source within the larger census-style
    list. 'From' is the most natural English rendering in this enumerative context.
- source_word: בְּנֵי הַלֵּוִי
  chosen: the sons of Levi
  alternatives:
  - the Levites
  - from Levi's sons
  lexicon: HALOT
  rationale: Literally 'sons of Levi.' Although 'Levites' is idiomatic and contextually
    equivalent, the construct phrase is straightforward and preserves the genealogical/tribal
    wording of the Hebrew while remaining readable.
- source_word: אַרְבַּעַת אֲלָפִים וְשֵׁשׁ מֵאוֹת
  chosen: 4,600
  alternatives:
  - four thousand six hundred
  lexicon: HALOT
  rationale: The Hebrew cardinal number phrase means 'four thousand and six hundred.'
    Numerals are rendered with digits for clarity in a roster/list context, without
    loss of meaning.
