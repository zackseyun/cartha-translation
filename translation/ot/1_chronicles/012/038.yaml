id: 1CH.12.38
reference: 1 Chronicles 12:38
source:
  edition: WLC
  text: וּ/מֵ/עֵ֣בֶר לַ֠/יַּרְדֵּן מִן הָ/ראוּבֵנִ֨י וְ/הַ/גָּדִ֜י וַ/חֲצִ֣י שֵׁ֣בֶט
    מְנַשֶּׁ֗ה בְּ/כֹל֙ כְּלֵי֙ צְבָ֣א מִלְחָמָ֔ה מֵאָ֥ה וְ/עֶשְׂרִ֖ים אָֽלֶף־׀׃
translation:
  text: And from beyond the Jordan, from the Reubenites, the Gadites, and the half-tribe
    of Manasseh, with every kind of military equipment for war, there were one hundred
    twenty thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from across the Jordan.' The Hebrew expression can be rendered from
      a different geographical viewpoint as 'from the other side of the Jordan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵעֵבֶר לַיַּרְדֵּן
  chosen: And from beyond the Jordan
  alternatives:
  - And from the other side of the Jordan
  - And from across the Jordan
  lexicon: HALOT
  rationale: מֵעֵבֶר with the Jordan denotes the region across/beyond the Jordan.
    'Beyond the Jordan' is concise and natural, while preserving the geographical
    expression without over-specifying viewpoint.
- source_word: מִן הָראוּבֵנִי וְהַגָּדִי וַחֲצִי שֵׁבֶט מְנַשֶּׁה
  chosen: from the Reubenites, the Gadites, and the half-tribe of Manasseh
  alternatives:
  - from the Reubenite, the Gadite, and half the tribe of Manasseh
  lexicon: HALOT
  rationale: Although the gentilic forms are singular in Hebrew, they function collectively
    for the tribal groups. English idiom prefers the plural ethnics 'Reubenites' and
    'Gadites.' 'Half-tribe of Manasseh' is the standard clear rendering of חֲצִי שֵׁבֶט
    מְנַשֶּׁה.
- source_word: בְּכֹל כְּלֵי צְבָא מִלְחָמָה
  chosen: with every kind of military equipment for war
  alternatives:
  - with all the weapons of war
  - with every weapon of battle
  - fully equipped for battle
  lexicon: HALOT
  rationale: כְּלֵי literally means 'articles/implements/vessels,' and in military
    context refers broadly to equipment or weapons. 'Military equipment for war' preserves
    the concrete sense better than the more interpretive 'fully equipped,' while 'every
    kind of' reflects בְּכֹל.
- source_word: מֵאָה וְעֶשְׂרִים אָלֶף
  chosen: one hundred twenty thousand
  alternatives:
  - a hundred and twenty thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number. The modern style 'one hundred twenty
    thousand' fits the translation's readable contemporary English aim.
