id: 1CH.12.9
reference: 1 Chronicles 12:9
source:
  edition: WLC
  text: וּ/מִן הַ/גָּדִ֡י נִבְדְּל֣וּ אֶל דָּוִיד֩ לַ/מְצַ֨ד מִדְבָּ֜רָ/ה גִּבֹּרֵ֣י
    הַ/חַ֗יִל אַנְשֵׁ֤י צָבָא֙ לַ/מִּלְחָמָ֔ה עֹרְכֵ֥י צִנָּ֖ה וָ/רֹ֑מַח וּ/פְנֵ֤י
    אַרְיֵה֙ פְּנֵי/הֶ֔ם וְ/כִ/צְבָאיִ֥ם עַל הֶ/הָרִ֖ים לְ/מַהֵֽר־־־׃ס
translation:
  text: Some of the Gadites separated themselves to David at the stronghold in the
    wilderness, mighty warriors, men of the army for battle, able to handle shield
    and spear, whose faces were like the faces of lions, and who were as swift as
    gazelles on the mountains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the stronghold in the wilderness.' The Hebrew prepositional sequence
      can be understood as movement toward the stronghold or arrival at it.
    reason: alternative_reading
  - marker: b
    text: Literally, 'arranging shield and spear.' The expression refers to men prepared
      and skilled for combat.
    reason: lexical_alternative
  - marker: c
    text: Or 'like gazelles on the mountains, quick to move.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן הַגָּדִי
  chosen: Some of the Gadites
  alternatives:
  - And from the Gadites
  - From Gad
  lexicon: HALOT
  rationale: The preposition מן with the gentilic הַגָּדִי indicates origin from the
    tribe/clan of Gad. English idiom is improved by 'Some of the Gadites,' since the
    verse introduces a subset rather than the whole tribe.
- source_word: נִבְדְּלוּ
  chosen: separated themselves
  alternatives:
  - broke away
  - set themselves apart
  lexicon: HALOT
  rationale: The Niphal of בדל conveys separation or setting apart. 'Separated themselves'
    preserves the reflexive nuance without overinterpreting motive.
- source_word: אֶל דָּוִיד
  chosen: to David
  alternatives:
  - to join David
  - to David's side
  lexicon: HALOT
  rationale: The preposition is simply 'to/toward David.' The context implies alignment,
    but the main text keeps the more direct wording and lets context supply the sense.
- source_word: לַמְצַד מִדְבָּרָה
  chosen: at the stronghold in the wilderness
  alternatives:
  - to the stronghold in the wilderness
  - to the mountain stronghold in the wilderness
  lexicon: HALOT
  rationale: מְצַד denotes a stronghold/fortress. With אל דוד and this locative phrase,
    English reads naturally as arrival 'at the stronghold in the wilderness.'
- source_word: גִּבֹּרֵי הַחַיִל
  chosen: mighty warriors
  alternatives:
  - mighty men of valor
  - valiant warriors
  lexicon: HALOT
  rationale: This common military expression denotes proven fighting men. 'Mighty
    warriors' is natural modern English and preserves the martial force.
- source_word: אַנְשֵׁי צָבָא לַמִּלְחָמָה
  chosen: men of the army for battle
  alternatives:
  - soldiers fit for battle
  - fighting men for war
  lexicon: HALOT
  rationale: The phrase intensifies their military identity. 'Men of the army for
    battle' stays close to the Hebrew while remaining readable.
- source_word: עֹרְכֵי צִנָּה וָרֹמַח
  chosen: able to handle shield and spear
  alternatives:
  - arraying shield and spear
  - equipped with shield and spear
  lexicon: HALOT
  rationale: The participle from ערך in military context can mean arranging/preparing
    weapons for combat. 'Able to handle' communicates combat readiness in idiomatic
    English better than the wooden 'arraying.'
- source_word: וּפְנֵי אַרְיֵה פְּנֵיהֶם
  chosen: whose faces were like the faces of lions
  alternatives:
  - their faces were lionlike
  - they had the faces of lions
  lexicon: HALOT
  rationale: The Hebrew repeats 'faces' for emphasis. The translation preserves the
    simile and much of the repetition while remaining natural.
- source_word: וְכִצְבָאִים
  chosen: as swift as gazelles
  alternatives:
  - like gazelles
  - as gazelles
  lexicon: HALOT
  rationale: צְבִי/צְבָאִים refers to gazelles/deer-like animals, often emphasizing
    speed and agility. Since the following infinitive לְמַהֵר highlights quickness,
    'as swift as gazelles' makes the implied comparison explicit in English.
- source_word: עַל הֶהָרִים
  chosen: on the mountains
  alternatives:
  - on the hills
  - in the mountains
  lexicon: HALOT
  rationale: הָרִים is the standard plural 'mountains/hills.' 'On the mountains' matches
    the imagery of agile movement over high terrain.
- source_word: לְמַהֵר
  chosen: swift
  alternatives:
  - quick
  - speedy
  lexicon: HALOT
  rationale: 'The infinitive expresses haste/speed. In English it is best absorbed
    into the comparison: ''as swift as gazelles on the mountains.'' This preserves
    sense without awkward literalism.'
