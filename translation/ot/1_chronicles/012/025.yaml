id: 1CH.12.25
reference: 1 Chronicles 12:25
source:
  edition: WLC
  text: בְּנֵ֣י יְהוּדָ֔ה נֹשְׂאֵ֥י צִנָּ֖ה וָ/רֹ֑מַח שֵׁ֧שֶׁת אֲלָפִ֛ים וּ/שְׁמוֹנֶ֥ה
    מֵא֖וֹת חֲלוּצֵ֥י צָבָֽא׃ס
translation:
  text: From the sons of Judah, carrying shield and spear, there were 6,800 equipped
    for battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'armed for war.' The Hebrew phrase חֲלוּצֵי צָבָא refers to men equipped
      or prepared for military combat.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יְהוּדָה
  chosen: From the sons of Judah
  alternatives:
  - The sons of Judah
  - Men of Judah
  lexicon: HALOT
  rationale: בני יהודה identifies members/descendants of the tribe of Judah. 'From
    the sons of Judah' fits the census-style listing in context, where each verse
    names a tribal contingent. 'Men of Judah' is possible dynamically, but 'sons'
    better preserves the Hebrew form and tribal sense.
- source_word: נֹשְׂאֵי
  chosen: carrying
  alternatives:
  - bearing
  lexicon: HALOT
  rationale: The participle of נשׂא here describes those who bear military equipment.
    'Carrying' is natural modern English; 'bearing' is slightly more formal but equivalent.
- source_word: צִנָּה
  chosen: shield
  alternatives:
  - large shield
  lexicon: HALOT
  rationale: צנה denotes a shield, often a large shield distinct from smaller bucklers
    in some contexts. Since English readers generally understand 'shield' and the
    verse pairs it with spear as standard armament, the simpler rendering is preferred;
    the more specific nuance is not required in the main text.
- source_word: וָרֹמַח
  chosen: and spear
  alternatives:
  - and lance
  lexicon: HALOT
  rationale: רמח is a spear or lance. 'Spear' is the most common and accessible military
    term in English.
- source_word: שֵׁשֶׁת אֲלָפִים וּשְׁמוֹנֶה מֵאוֹת
  chosen: 6,800
  alternatives:
  - six thousand eight hundred
  rationale: The Hebrew cardinal expression is straightforwardly numerical. Arabic
    numerals improve readability in a military census list without loss of meaning.
- source_word: חֲלוּצֵי צָבָא
  chosen: equipped for battle
  alternatives:
  - armed for war
  - ready for military service
  - drawn up for battle
  lexicon: HALOT
  rationale: חלוץ in military contexts refers to men equipped/arrayed for combat.
    'Equipped for battle' captures preparedness and military function in clear modern
    English. 'Armed for war' is also possible, but 'equipped for battle' reads more
    naturally with the preceding mention of shield and spear.
