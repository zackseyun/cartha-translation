theological_decisions:
- issue: Whether 'the nations' should be rendered 'Gentiles'
  chosen_reading: from the nations
  alternative_readings:
  - from the Gentiles
  rationale: In this Old Testament context, the phrase refers to surrounding peoples
    among whom Israel may be scattered, not to a developed NT Jew/Gentile theological
    distinction. 'Nations' preserves the historical sense without importing later
    categories.
- issue: How to render the final clause's self-referential praise language
  chosen_reading: glory in your praise
  alternative_readings:
  - boast in your praise
  - exult in your praise
  rationale: The Hebrew expresses exultant self-involvement in praising God. 'Glory
    in' preserves the positive biblical sense of boasting in God without sounding
    crass or self-centered in English.
  doctrine_reference: Translation philosophy §6
