id: 1CH.16.35
reference: 1 Chronicles 16:35
source:
  edition: WLC
  text: וְ/אִמְר֕וּ הוֹשִׁיעֵ֨/נוּ֙ אֱלֹהֵ֣י יִשְׁעֵ֔/נוּ וְ/קַבְּצֵ֥/נוּ וְ/הַצִּילֵ֖/נוּ
    מִן הַ/גּוֹיִ֑ם לְ/הֹדוֹת֙ לְ/שֵׁ֣ם קָדְשֶׁ֔/ךָ לְ/הִשְׁתַּבֵּ֖חַ בִּ/תְהִלָּתֶֽ/ךָ־׃
translation:
  text: And say, “Save us, God of our salvation; gather us and deliver us from the
    nations, that we may give thanks to your holy name and glory in your praise.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from the Gentiles,” though here the sense is more broadly “from the
      nations/peoples.”
    reason: lexical_alternative
  - marker: b
    text: Or “boast in your praise” or “exult in your praise.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִמְרוּ
  chosen: And say
  alternatives:
  - Then say
  - Say
  lexicon: HALOT
  rationale: Imperative plural of אמר introducing the congregation's spoken response.
    'And say' preserves the conjunction and the liturgical flow better than omitting
    it.
- source_word: הוֹשִׁיעֵנוּ
  chosen: Save us
  alternatives:
  - Give us salvation
  - Deliver us
  lexicon: HALOT
  rationale: Hiphil imperative of ישׁע with 1cp suffix. 'Save us' is the most natural
    and theologically weighty English equivalent, while 'deliver' is reserved later
    for נצל to preserve lexical distinction.
- source_word: אֱלֹהֵי יִשְׁעֵנוּ
  chosen: God of our salvation
  alternatives:
  - our saving God
  - God our Savior
  lexicon: HALOT
  rationale: Construct phrase literally 'God of our salvation.' This preserves the
    Hebrew idiom and avoids importing later title-language beyond the text.
- source_word: וְקַבְּצֵנוּ
  chosen: gather us
  alternatives:
  - bring us together
  - assemble us
  lexicon: HALOT
  rationale: Piel imperative of קבץ commonly means gather/collect, often with restoration-from-dispersion
    nuance. 'Gather us' is concise and preserves that possible covenantal-restoration
    sense.
- source_word: וְהַצִּילֵנוּ
  chosen: deliver us
  alternatives:
  - rescue us
  - save us
  lexicon: HALOT
  rationale: Hiphil imperative of נצל. 'Deliver us' distinguishes it from the earlier
    ישׁע and fits the sense of rescue from hostile powers.
- source_word: מִן־הַגּוֹיִם
  chosen: from the nations
  alternatives:
  - from the Gentiles
  - out of the nations
  lexicon: HALOT
  rationale: גוים here refers to the surrounding peoples/nations rather than making
    a later Jew/Gentile theological contrast. 'From the nations' is the most contextually
    appropriate rendering.
- source_word: לְהוֹדוֹת
  chosen: that we may give thanks
  alternatives:
  - to give thanks
  - that we may praise
  lexicon: HALOT
  rationale: Infinitive with ל expressing purpose. 'Give thanks' is the standard sense
    of ידה in the Hiphil here and pairs well with the following purpose clause.
- source_word: לְשֵׁם קָדְשֶׁךָ
  chosen: to your holy name
  alternatives:
  - to the name of your holiness
  - for your holy name
  lexicon: HALOT
  rationale: The preposition ל after הודות is naturally rendered 'to' in English with
    'give thanks.' 'Holy name' preserves the covenantal reverence formula.
- source_word: לְהִשְׁתַּבֵּחַ
  chosen: and glory
  alternatives:
  - and boast
  - and exult
  lexicon: HALOT
  rationale: Hitpael infinitive of שׁבח in the sense of exulting/boasting oneself.
    'Glory' in the verbal sense fits biblical English idiom and avoids the negative
    connotation that 'boast' can carry in modern English.
- source_word: בִּתְהִלָּתֶךָ
  chosen: in your praise
  alternatives:
  - in your praises
  - in praise of you
  lexicon: HALOT
  rationale: The beth preposition is retained with 'in.' The noun תהלה can denote
    praise directed to God or praiseworthiness; 'in your praise' best matches the
    Hebrew construction and the parallelism.
