id: 1CH.16.14
reference: 1 Chronicles 16:14
source:
  edition: WLC
  text: ה֚וּא יְהוָ֣ה אֱלֹהֵ֔י/נוּ בְּ/כָל הָ/אָ֖רֶץ מִשְׁפָּטָֽי/ו־׃
translation:
  text: He is Yahweh our God; his judgments are in all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'throughout all the land,' if אֶרֶץ is taken in a more localized sense; here 'earth' is preferred because the context emphasizes the LORD's worldwide rule.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew divine name is YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: הוּא
  chosen: He is
  alternatives:
  - He
  lexicon: HALOT
  rationale: 'The independent pronoun is emphatic and functions as the subject of a verbless clause. English supplies ''is'' naturally: ''He is'' preserves the emphasis without awkwardness.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  alternatives:
  - our gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, אֱלֹהִים with first person plural suffix here clearly refers to Israel's singular God; 'our God' is the idiomatic and theologically correct rendering in context.
- source_word: בְּכָל הָאָרֶץ
  chosen: in all the earth
  alternatives:
  - throughout all the earth
  - in all the land
  lexicon: HALOT
  rationale: The preposition ב with כָּל and אֶרֶץ most naturally gives a universal scope here. 'Earth' fits the cosmic sense of the psalmic/chronistic praise context better than the more localized 'land.'
- source_word: מִשְׁפָּטָיו
  chosen: his judgments
  alternatives:
  - his justice
  - his ordinances
  - his acts of judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote judgments, justice, legal decisions, or ordinances. In this context, the statement concerns the worldwide extent of the LORD's judicial rule; 'judgments' best preserves the lexical form and broad semantic range without over-interpreting toward either abstract 'justice' or specific 'ordinances.'
