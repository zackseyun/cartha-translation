  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of הָאָרֶץ
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: The verse parallels broad declarations of the LORD's rule and judgments in worship language. Rendering אֶרֶץ as 'earth' preserves the universal theological scope rather than narrowing it to a specific territory.
