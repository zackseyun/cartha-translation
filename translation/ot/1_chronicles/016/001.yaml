id: 1CH.16.1
reference: 1 Chronicles 16:1
source:
  edition: WLC
  text: וַ/יָּבִ֨יאוּ֙ אֶת אֲר֣וֹן הָֽ/אֱלֹהִ֔ים וַ/יַּצִּ֣יגוּ אֹת֔/וֹ בְּ/ת֣וֹךְ
    הָ/אֹ֔הֶל אֲשֶׁ֥ר נָֽטָה ל֖/וֹ דָּוִ֑יד וַ/יַּקְרִ֛יבוּ עֹל֥וֹת וּ/שְׁלָמִ֖ים
    לִ/פְנֵ֥י הָ/אֱלֹהִֽים־־׃
translation:
  text: So they brought in the ark of God and set it in the middle of the tent that
    David had pitched for it, and they offered burnt offerings and peace offerings
    before God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inside the tent' or 'within the tent'; the Hebrew phrase can denote
      being within something, though literally it is 'in the midst of the tent.'
    reason: lexical_alternative
  - marker: b
    text: Or 'fellowship offerings' or 'offerings of well-being' for 'peace offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבִיאוּ
  chosen: brought in
  alternatives:
  - brought
  lexicon: HALOT
  rationale: Hiphil of בוא commonly means 'bring' or 'bring in.' 'Brought in' fits
    the movement of the ark into the prepared tent and reflects the directional sense
    in context.
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the ark of the covenant of God
  lexicon: HALOT
  rationale: The Hebrew here is simply 'ark of God,' not the fuller covenant formula
    found elsewhere. The translation preserves the exact expression without importing
    additional wording.
- source_word: וַיַּצִּיגוּ אֹתוֹ
  chosen: set it
  alternatives:
  - placed it
  - stationed it
  lexicon: HALOT
  rationale: The verb יצג in this causative/narrative setting means to set or place
    something in position. 'Set it' is natural English and adequately formal.
- source_word: בְּתוֹךְ הָאֹהֶל
  chosen: in the middle of the tent
  alternatives:
  - inside the tent
  - within the tent
  lexicon: HALOT
  rationale: בְּתוֹךְ can mean 'in the midst/middle of' or more generally 'within.'
    'In the middle of the tent' preserves the more concrete spatial nuance of the
    Hebrew.
- source_word: הָאֹהֶל
  chosen: the tent
  alternatives:
  - the tabernacle
  lexicon: HALOT
  rationale: The word is the common noun 'tent,' and the text specifies that David
    pitched it. Rendering it 'tabernacle' would import later cultic associations not
    explicit in this verse.
- source_word: אֲשֶׁר נָטָה לוֹ דָּוִיד
  chosen: that David had pitched for it
  alternatives:
  - that David had stretched out for it
  - that David had set up for it
  lexicon: HALOT
  rationale: נטה with tent language refers to pitching or stretching out a tent. The
    pronoun לוֹ is best taken as referring to the ark ('for it'), indicating purpose.
- source_word: וַיַּקְרִיבוּ
  chosen: they offered
  alternatives:
  - they presented
  - they brought near
  lexicon: HALOT
  rationale: In sacrificial contexts קרב in the Hiphil means to present or offer a
    sacrifice. 'Offered' is the standard and clearest cultic rendering.
- source_word: עֹלוֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the sacrifice wholly consumed on the altar.
    'Burnt offerings' is the conventional and accurate rendering.
- source_word: שְׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: While the term can denote well-being or fellowship, 'peace offerings'
    remains a clear and established rendering that reflects the semantic field of
    שׁלם without over-paraphrasing.
- source_word: לִפְנֵי הָאֱלֹהִים
  chosen: before God
  alternatives:
  - in the presence of God
  lexicon: HALOT
  rationale: The phrase literally means 'before the face/presence of God.' 'Before
    God' is concise, natural, and sufficiently transparent.
