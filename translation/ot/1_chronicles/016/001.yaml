theological_decisions:
- issue: Rendering of sacrificial terminology
  chosen_reading: Retain specific cultic terms 'burnt offerings' and 'peace offerings'
    rather than flattening them into generic sacrifices.
  alternative_readings:
  - burnt offerings and fellowship offerings
  - sacrifices
  rationale: The verse reports concrete acts of worship tied to Israel's sacrificial
    system. Preserving the distinct offering types maintains theological and ritual
    specificity without importing later doctrinal interpretation.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Identification of the tent
  chosen_reading: Translate הָאֹהֶל as 'the tent,' not 'the tabernacle.'
  alternative_readings:
  - the tabernacle
  rationale: The Hebrew uses the ordinary noun for a tent and explicitly says David
    pitched it for the ark. Using 'tabernacle' could suggest the Mosaic tabernacle
    as such, which the verse itself does not explicitly state.
  doctrine_reference: Translation philosophy §1
