id: 1CH.16.38
reference: 1 Chronicles 16:38
source:
  edition: WLC
  text: וְ/עֹבֵ֥ד אֱדֹ֛ם וַ/אֲחֵי/הֶ֖ם שִׁשִּׁ֣ים וּ/שְׁמוֹנָ֑ה וְ/עֹבֵ֨ד אֱדֹ֧ם בֶּן
    יְדִית֛וּן וְ/חֹסָ֖ה לְ/שֹׁעֲרִֽים־׃
translation:
  text: And Obed-edom and their brothers, sixty-eight; and Obed-edom son of Jeduthun
    and Hosah were gatekeepers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'their brothers'; some translations smooth this to 'his brothers'
      to clarify the relationship, but the main text follows the plural suffix of
      the received Hebrew text.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/עֹבֵד אֱדֹם
  chosen: And Obed-edom
  alternatives:
  - Now Obed-edom
  - Also Obed-edom
  lexicon: HALOT
  rationale: The prefixed conjunction is rendered simply as 'And' to preserve the
    list-like continuation from the previous verse. The proper name is transliterated
    by standard convention.
- source_word: וַ/אֲחֵי/הֶם
  chosen: and their brothers
  alternatives:
  - and his brothers
  - with their brothers
  lexicon: HALOT
  rationale: The ketiv-like consonantal form with 3mp suffix is most naturally rendered
    'their brothers.' This follows the received Hebrew form as given. Because the
    referent is somewhat compressed in the list, English preserves the plural possessive
    rather than smoothing to singular.
- source_word: שִׁשִּׁים וּ/שְׁמוֹנָה
  chosen: sixty-eight
  alternatives:
  - sixty and eight
  lexicon: HALOT
  rationale: The cardinal number is rendered in standard modern English as 'sixty-eight'
    rather than the more literal but less natural 'sixty and eight.'
- source_word: וְ/עֹבֵד אֱדֹם
  chosen: and Obed-edom
  alternatives:
  - with Obed-edom
  lexicon: HALOT
  rationale: The second occurrence introduces a further specification about Obed-edom.
    Repeating the name in English preserves the Hebrew structure rather than collapsing
    the clauses.
- source_word: בֶּן יְדִיתוּן
  chosen: son of Jeduthun
  alternatives:
  - the son of Jeduthun
  lexicon: HALOT
  rationale: A straightforward filial designation. 'Son of' is retained formally because
    genealogical identification is important in Chronicles.
- source_word: וְ/חֹסָה
  chosen: and Hosah
  lexicon: HALOT
  rationale: Proper name transliterated directly; the conjunction links Hosah with
    Obed-edom as sharing the following role.
- source_word: לְ/שֹׁעֲרִים
  chosen: were gatekeepers
  alternatives:
  - for gatekeepers
  - as gatekeepers
  - to be gatekeepers
  lexicon: HALOT
  rationale: 'The preposition ל with the noun indicates appointment or function. English
    idiom requires supplying ''were'' to express the predication clearly: Obed-edom
    and Hosah served in the role of gatekeepers.'
