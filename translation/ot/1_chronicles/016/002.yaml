id: 1CH.16.2
reference: 1 Chronicles 16:2
source:
  edition: WLC
  text: וַ/יְכַ֣ל דָּוִ֔יד מֵ/הַעֲל֥וֹת הָ/עֹלָ֖ה וְ/הַ/שְּׁלָמִ֑ים וַ/יְבָ֥רֶךְ אֶת
    הָ/עָ֖ם בְּ/שֵׁ֥ם יְהוָֽה־׃
translation:
  text: When David finished offering up the burnt offering and the peace offerings,
    he blessed the people in the name of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the fellowship offerings” or “the offerings of well-being.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַל
  chosen: When ... finished
  alternatives:
  - And ... finished
  - completed
  lexicon: HALOT
  rationale: The wayyiqtol of כלה here advances the narrative and marks completion.
    Rendering with 'When David finished' captures both the temporal linkage to the
    following action and natural English narrative flow better than a bare 'and David
    finished.'
- source_word: מֵהַעֲלוֹת
  chosen: offering up
  alternatives:
  - from offering
  - after offering
  lexicon: HALOT
  rationale: The preposition מִן with the infinitive construct of עלה after כלה yields
    the sense 'finished offering up' / 'finished from offering.' 'Offering up' preserves
    the sacrificial nuance of העלה and reads idiomatically in English.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the burnt offering. 'Burnt offering' is
    the conventional and accurate cultic rendering in modern English.
- source_word: וְהַשְּׁלָמִים
  chosen: and the peace offerings
  alternatives:
  - and the fellowship offerings
  - and the offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים denotes a class of sacrifices associated with peace/well-being/communion.
    'Peace offerings' is the most recognizable traditional rendering and remains sufficiently
    transparent here; alternatives are viable but less standard.
- source_word: וַיְבָרֶךְ
  chosen: he blessed
  alternatives:
  - he pronounced a blessing on
  lexicon: HALOT
  rationale: ברך in this context means to bless. The simple verbal rendering is both
    accurate and natural.
- source_word: אֶת־הָעָם
  chosen: the people
  alternatives:
  - all the people
  lexicon: HALOT
  rationale: The direct object is simply 'the people.' 'All' is not explicit in this
    verse and should not be imported from context.
- source_word: בְּשֵׁם יְהוָה
  chosen: in the name of the LORD
  alternatives:
  - by the name of the LORD
  - in the LORD's name
  lexicon: HALOT
  rationale: בְּשֵׁם is most naturally rendered 'in the name of.' Per doctrine, יְהוָה
    is rendered 'the LORD' rather than a transliteration.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' preserving the reverential convention and LXX/English Bible pattern.
