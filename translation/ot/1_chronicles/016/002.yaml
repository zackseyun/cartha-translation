theological_decisions:
- issue: Rendering of the sacrificial term שְׁלָמִים
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  - offerings of well-being
  rationale: The Hebrew term can emphasize peace, well-being, or fellowship/communion.
    'Peace offerings' preserves the established sacrificial category without importing
    a narrower theological interpretation. Alternatives are preserved in a footnote
    because they are legitimate lexical options.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. No contextual factor here warrants deviation.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD'
