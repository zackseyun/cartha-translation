theological_decisions:
- issue: Rendering of the sacrificial term שְׁלָמִים
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  - offerings of well-being
  rationale: The Hebrew term can emphasize peace, well-being, or fellowship/communion. 'Peace offerings' preserves the established sacrificial category without importing a narrower theological interpretation. Alternatives are preserved in a footnote because they are legitimate lexical options.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
