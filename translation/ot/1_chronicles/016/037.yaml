id: 1CH.16.37
reference: 1 Chronicles 16:37
source:
  edition: WLC
  text: וַ/יַּֽעֲזָב שָׁ֗ם לִ/פְנֵי֙ אֲר֣וֹן בְּרִית יְהוָ֔ה לְ/אָסָ֖ף וּ/לְ/אֶחָ֑י/ו
    לְ/שָׁרֵ֞ת לִ/פְנֵ֧י הָ/אָר֛וֹן תָּמִ֖יד לִ/דְבַר י֥וֹם בְּ/יוֹמֽ/וֹ־־־׃
translation:
  text: So he left Asaph and his brothers there before the ark of the covenant of
    the LORD, to minister before the ark continually, according to each day's requirement.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as each day required'; Hebrew literally, 'according to the matter of
      a day in its day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲזָב
  chosen: he left
  alternatives:
  - he appointed
  - he stationed
  lexicon: HALOT
  rationale: The verb עזב normally means 'leave' or 'forsake.' In this administrative
    context, 'left' naturally conveys that David left Asaph and his brothers there
    for ongoing service. 'Appointed' is interpretive and less directly lexical, though
    contextually related.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb indicating the place where they remained.
- source_word: לִפְנֵי אֲרוֹן בְּרִית יְהוָה
  chosen: before the ark of the covenant of the LORD
  alternatives:
  - in the presence of the ark of the covenant of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is most naturally 'before' in cultic/spatial contexts. יְהוָה
    follows the doctrinal default 'the LORD.' The full construct chain is preserved
    rather than simplified.
- source_word: לְאָסָף וּלְאֶחָיו
  chosen: Asaph and his brothers
  alternatives:
  - Asaph and his kinsmen
  lexicon: HALOT
  rationale: אֶחָיו literally means 'his brothers.' In this Levitical service context
    it can denote fellow Levites/associates, but 'brothers' preserves the Hebrew wording
    and communal sense.
- source_word: לְשָׁרֵת
  chosen: to minister
  alternatives:
  - to serve
  lexicon: HALOT
  rationale: שרת in cultic contexts often denotes ministerial service before God or
    sacred objects. 'Minister' preserves the liturgical nuance better than the broader
    'serve.'
- source_word: לִפְנֵי הָאָרוֹן
  chosen: before the ark
  alternatives:
  - in the presence of the ark
  lexicon: HALOT
  rationale: Repeated phrase retained consistently. 'Before' fits both the spatial
    and liturgical setting.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - regularly
  - continually day by day
  lexicon: HALOT
  rationale: תמיד indicates ongoing regularity/continuity in worship service. 'Continually'
    is concise and idiomatic.
- source_word: לִדְבַר יוֹם בְּיוֹמוֹ
  chosen: according to each day's requirement
  alternatives:
  - as each day required
  - for the matter of each day on its day
  - day by day as required
  lexicon: HALOT
  rationale: This idiom refers to the prescribed duty appropriate to each day. 'According
    to each day's requirement' captures the administrative/cultic sense without wooden
    awkwardness.
