- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering חֶסֶד in a covenantal praise formula
  chosen_reading: steadfast love
  alternative_readings:
  - covenant faithfulness
  - mercy
  - lovingkindness
  rationale: The verse is a liturgical refrain emphasizing the LORD's enduring covenant loyalty. 'Steadfast love' best preserves the theological tension between affection and loyalty without narrowing the term to mere emotion or mercy.
