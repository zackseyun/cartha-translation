theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of הָאָרֶץ
  chosen_reading: the earth
  alternative_readings:
  - the land
  rationale: The verse is part of a cosmic hymn in which creation rejoices before the LORD. Rendering הָאָרֶץ as 'the earth' preserves the universal scope of divine judgment rather than narrowing it to a specific territory.
