id: 1CH.16.33
reference: 1 Chronicles 16:33
source:
  edition: WLC
  text: אָ֥ז יְרַנְּנ֖וּ עֲצֵ֣י הַ/יָּ֑עַר מִ/לִּ/פְנֵ֣י יְהוָ֔ה כִּי בָ֖א לִ/שְׁפּ֥וֹט אֶת הָ/אָֽרֶץ־־׃
translation:
  text: Then the trees of the forest will sing for joy before Yahweh, for he comes to judge the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will shout for joy.' The Hebrew verb can denote jubilant ringing out, whether sung or shouted.
    reason: lexical_alternative
  - marker: b
    text: Or 'he is coming to judge the earth.' The Hebrew form can express a coming action with vivid certainty in poetic context.
    reason: lexical_alternative
  - marker: c
    text: Or 'the land,' if taken more locally; here the wider cosmic context favors 'the earth.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb introducing the result or ensuing scene; 'Then' is natural and sufficiently formal in context.
- source_word: יְרַנְּנוּ
  chosen: will sing for joy
  alternatives:
  - will shout for joy
  - will rejoice
  lexicon: HALOT
  rationale: Piel of רנן commonly conveys jubilant ringing out. 'Sing for joy' captures the poetic, celebratory sense better than the more generic 'rejoice.' Future sense fits the imperfect in this hymnic context.
- source_word: עֲצֵי הַיָּעַר
  chosen: the trees of the forest
  alternatives:
  - the trees of the woods
  - the forest trees
  lexicon: HALOT
  rationale: Construct phrase best rendered straightforwardly as 'the trees of the forest.' This preserves the poetic personification without paraphrase.
- source_word: מִלִּפְנֵי
  chosen: before
  alternatives:
  - at the presence of
  - from before the presence of
  lexicon: HALOT
  rationale: In this idiom with rejoicing and divine presence, English 'before' naturally conveys being in the presence of the LORD. A more literal 'from before' would be awkward and misleading in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for cosmic rejoicing. 'For' is concise and fits the poetic line.
- source_word: בָא
  chosen: he comes
  alternatives:
  - he has come
  - he is coming
  lexicon: HALOT
  rationale: The qatal in this poetic-prophetic context can express imminent or certain action. 'He comes' preserves the vividness and liturgical force better than a simple past, and aligns with the following infinitive of purpose.
- source_word: לִשְׁפּוֹט
  chosen: to judge
  alternatives:
  - to govern
  - to rule
  lexicon: HALOT
  rationale: The primary sense here is judicial rule/judgment. 'To judge' is the most direct rendering and preserves the theological weight of divine judgment.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  - the world
  lexicon: HALOT
  rationale: In this cosmic praise context involving forest trees and the LORD's universal judgment, 'the earth' is preferable to the more localized 'land.'
