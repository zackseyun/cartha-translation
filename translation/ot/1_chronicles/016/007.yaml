id: 1CH.16.7
reference: 1 Chronicles 16:7
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא אָ֣ז נָתַ֤ן דָּוִיד֙ בָּ/רֹ֔אשׁ לְ/הֹד֖וֹת לַ/יהוָ֑ה בְּ/יַד
    אָסָ֖ף וְ/אֶחָֽי/ו־׃פ
translation:
  text: On that day, then, David first appointed Asaph and his brothers to give thanks
    to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'David appointed at the head/chief place Asaph and his brothers to give
      thanks to the LORD,' or 'David for the first time appointed Asaph and his brothers
      to give thanks to the LORD.' The Hebrew phrase is idiomatic and may emphasize
      priority, leadership, or initial institution.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - In that day
  lexicon: HALOT
  rationale: Temporal phrase with prefixed preposition ב marking time. 'On that day'
    is the natural modern English equivalent.
- source_word: אָז
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: Discourse adverb marking sequence or emphasis. 'Then' preserves the narrative
    flow without overtranslating.
- source_word: נָתַן
  chosen: appointed
  alternatives:
  - gave
  - assigned
  - put
  lexicon: HALOT
  rationale: Although the verb is literally 'gave,' in this administrative context
    with בָּרֹאשׁ and בְּיַד it denotes assigning or appointing responsibility. 'Appointed'
    best conveys the idiomatic sense in English.
- source_word: בָּרֹאשׁ
  chosen: first
  alternatives:
  - at the head
  - as chief
  - for the first time
  lexicon: HALOT
  rationale: The phrase is idiomatic and difficult. In context it most naturally indicates
    the initial institution of this thanksgiving ministry/song. 'First' captures the
    adverbial force succinctly. Alternative nuances are preserved in a footnote.
- source_word: לְהֹדוֹת
  chosen: to give thanks
  alternatives:
  - to praise
  - to confess
  - to offer thanks
  lexicon: HALOT
  rationale: Hiphil infinitive of ידה in this liturgical context commonly means giving
    thanks or praise to God. 'Give thanks' is the clearest and most contextually fitting
    rendering.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: בְּיַד
  chosen: appointed Asaph and his brothers
  alternatives:
  - by the hand of Asaph and his brothers
  - through Asaph and his brothers
  lexicon: HALOT
  rationale: The Hebrew literally says 'by the hand of,' an idiom for agency or instrumentality.
    In smooth English, the agency is incorporated into the appointment clause rather
    than rendered woodenly.
- source_word: אָסָף וְאֶחָיו
  chosen: Asaph and his brothers
  alternatives:
  - Asaph and his kinsmen
  lexicon: HALOT
  rationale: '''Brothers'' is the direct and gender-accurate rendering of אחים here,
    likely referring to fellow Levites/associates. It should not be flattened unless
    context requires.'
