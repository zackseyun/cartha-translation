id: 1CH.16.10
reference: 1 Chronicles 16:10
source:
  edition: WLC
  text: הִֽתְהַֽלְלוּ֙ בְּ/שֵׁ֣ם קָדְשׁ֔/וֹ יִשְׂמַ֕ח לֵ֖ב מְבַקְשֵׁ֥י יְהוָֽה׃
translation:
  text: Boast in his holy name; let the hearts of those who seek Yahweh rejoice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH'' (the divine name), traditionally rendered ''the LORD''; alternatively ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: הִתְהַלְלוּ
  chosen: Boast
  alternatives:
  - Glory
  - Exult
  lexicon: HALOT
  rationale: Hitpael imperative plural of הלל here carries the sense of exulting or boasting in someone/something. 'Boast' preserves the imperative force and the relational object introduced by בְּ, while remaining natural English. 'Glory' is possible but less idiomatic in contemporary English.
- source_word: בְּשֵׁם
  chosen: in ... name
  alternatives:
  - about ... name
  - because of ... name
  lexicon: HALOT
  rationale: The preposition בְּ with 'name' is most naturally rendered 'in,' expressing the sphere or basis of boasting. This keeps the Hebrew construction transparent.
- source_word: קָדְשׁוֹ
  chosen: his holy
  alternatives:
  - his sacred
  lexicon: HALOT
  rationale: קדשׁ as an attributive adjective modifying 'name' is well rendered 'holy.' 'Sacred' is possible but 'holy name' is both accurate and idiomatic.
- source_word: יִשְׂמַח
  chosen: let ... rejoice
  alternatives:
  - rejoices
  - may ... rejoice
  lexicon: HALOT
  rationale: 'Although morphologically 3ms imperfect, in this poetic/jussive context it functions as a jussive: ''let ... rejoice.'' This best matches the exhortational flow following the imperative.'
- source_word: לֵב
  chosen: the heart
  alternatives:
  - heart
  lexicon: HALOT
  rationale: לב is singular and serves collectively for the inner being. 'The heart' preserves the singular Hebrew while sounding natural in English.
- source_word: מְבַקְשֵׁי
  chosen: those who seek
  alternatives:
  - the seekers of
  - those seeking
  lexicon: HALOT
  rationale: 'The participle denotes an ongoing characteristic: people who seek. ''Those who seek'' is clear, idiomatic, and preserves the substantive participial force.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
