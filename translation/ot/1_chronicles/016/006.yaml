id: 1CH.16.6
reference: 1 Chronicles 16:6
source:
  edition: WLC
  text: וּ/בְנָיָ֥הוּ וְ/יַחֲזִיאֵ֖ל הַ/כֹּהֲנִ֑ים בַּ/חֲצֹצְר֣וֹת תָּמִ֔יד לִ/פְנֵ֖י
    אֲר֥וֹן בְּרִית הָ/אֱלֹהִֽים־׃
translation:
  text: And Benaiah and Jahaziel the priests were continually with the trumpets before
    the ark of the covenant of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'were continually blowing the trumpets before the ark of the covenant
      of God.' The Hebrew does not state the verb explicitly, though this is likely
      the intended sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנָיָהוּ
  chosen: And Benaiah
  alternatives:
  - And Benaiah
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention. The prefixed
    conjunction is carried into the clause as 'And.'
- source_word: וְ/יַחֲזִיאֵל
  chosen: and Jahaziel
  alternatives:
  - and Jehaziel
  lexicon: HALOT
  rationale: Proper name transliterated rather than translated, following the translation
    philosophy for personal names. 'Jahaziel' reflects a common direct transliteration
    of the Hebrew form.
- source_word: הַ/כֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Definite plural noun identifying Benaiah and Jahaziel by office. 'Priests'
    is the plain and standard rendering of כֹּהֲנִים.
- source_word: בַּ/חֲצֹצְר֣וֹת
  chosen: with the trumpets
  alternatives:
  - on the trumpets
  - blowing the trumpets
  - with trumpets
  lexicon: HALOT
  rationale: חֲצֹצְרוֹת refers specifically to trumpets, not generic horns. The preposition
    ב here is best rendered instrumentally/associatively as 'with.' 'Blowing' is implied
    by context but not explicitly stated, so it is not supplied in the main text.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - regularly
  - continually ministering
  lexicon: HALOT
  rationale: תָּמִיד denotes ongoing regularity or continual performance. 'Continually'
    preserves the adverbial force without over-interpreting the exact schedule.
- source_word: לִ/פְנֵי
  chosen: before
  alternatives:
  - in front of
  - in the presence of
  lexicon: HALOT
  rationale: Standard rendering for spatial/cultic positioning. 'Before' fits both
    the physical and liturgical sense in English Bible style without sounding archaic
    here.
- source_word: אֲר֥וֹן בְּרִית
  chosen: the ark of the covenant
  alternatives:
  - the covenant ark
  lexicon: HALOT
  rationale: Construct chain rendered in the familiar and precise English form 'the
    ark of the covenant.'
- source_word: הָ/אֱלֹהִים
  chosen: of God
  alternatives:
  - of the true God
  lexicon: HALOT
  rationale: Definite אֱלֹהִים here refers to Israel's God. 'Of God' is the natural
    English completion of the construct phrase and does not require expansion.
