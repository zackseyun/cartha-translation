theological_decisions:
- issue: Whether to make explicit that the priests were blowing the trumpets
  chosen_reading: Retain the more literal wording 'were continually with the trumpets'
    rather than adding 'blowing' to the main text.
  alternative_readings:
  - were continually blowing the trumpets before the ark of the covenant of God
  rationale: The Hebrew text names the priests, the trumpets, and their continual
    position/service before the ark, but does not include an explicit verbal form
    for 'blow.' English requires some smoothing, yet the translation should avoid
    importing more action than the source states. The chosen rendering preserves the
    likely instrumental/cultic sense while remaining auditable.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
