theological_decisions:
- issue: Rendering of יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of אֶחָיו ('his brothers') in priestly context
  chosen_reading: his fellow priests
  alternative_readings:
  - his brothers, the priests
  rationale: The Hebrew masculine plural can denote kin-group or close associates. In this administrative/worship context, the phrase identifies Zadok together with the other priests serving with him. Rendering it 'fellow priests' avoids implying literal sibling relationship while preserving the source intent.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (gender-accurate over gender-neutral) and §6 (readable modern English)
