id: 1CH.16.39
reference: 1 Chronicles 16:39
source:
  edition: WLC
  text: וְ/אֵ֣ת צָד֣וֹק הַ/כֹּהֵ֗ן וְ/אֶחָי/ו֙ הַ/כֹּ֣הֲנִ֔ים לִ/פְנֵ֖י מִשְׁכַּ֣ן יְהוָ֑ה בַּ/בָּמָ֖ה אֲשֶׁ֥ר בְּ/גִבְעֽוֹן׀׃
translation:
  text: And Zadok the priest and his fellow priests were before the tabernacle of Yahweh at the high place that was in Gibeon,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''his brothers, the priests.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵת
  chosen: And [left object marker untranslated while carrying forward the coordination]
  alternatives:
  - Now Zadok
  - As for Zadok
  lexicon: HALOT
  rationale: The conjunction waw is rendered as simple coordination, while the direct-object marker אֵת has no direct English equivalent. Because the previous verse continues with an implied verb of appointing/leaving, English supplies a smooth continuation rather than a wooden 'and [object marker].'
- source_word: צָדוֹק
  chosen: Zadok
  lexicon: HALOT
  rationale: Personal name transliterated by standard convention per translation philosophy.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Definite title identifying Zadok's office; straightforwardly rendered 'the priest.'
- source_word: וְאֶחָיו הַכֹּהֲנִים
  chosen: and his fellow priests
  alternatives:
  - and his brothers, the priests
  - and his brothers the priests
  lexicon: HALOT
  rationale: Literally 'and his brothers, the priests.' In context this refers to priestly colleagues rather than biological brothers specifically. 'Fellow priests' preserves the relational sense in natural English while accurately conveying the group.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  - at
  lexicon: HALOT
  rationale: Standard locative sense indicating position in the presence/front of the sanctuary.
- source_word: מִשְׁכַּן יְהוָה
  chosen: the tabernacle of the LORD
  alternatives:
  - the dwelling place of the LORD
  - the tent of the LORD
  lexicon: HALOT
  rationale: מִשְׁכָּן commonly denotes the tabernacle/dwelling. 'Tabernacle' is the established and contextually precise rendering for the sanctuary structure. יְהוָה is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine excerpt's default rendering for the divine name.
- source_word: בַּבָּמָה
  chosen: at the high place
  alternatives:
  - on the high place
  - at the shrine
  lexicon: HALOT
  rationale: בָּמָה refers to a cultic high place. Here it is the legitimate worship site at Gibeon prior to the temple, so 'high place' is retained as the standard term without importing later negative connotations.
- source_word: אֲשֶׁר בְּגִבְעוֹן
  chosen: that was in Gibeon
  alternatives:
  - which was at Gibeon
  lexicon: HALOT
  rationale: Relative clause specifying the location of the high place. 'In Gibeon' is idiomatic and sufficiently precise.
