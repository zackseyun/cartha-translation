theological_decisions:
- issue: Whether מְקוֹמוֹ should be interpreted specifically as the sanctuary/temple
    location
  chosen_reading: Rendered broadly as 'his place'
  alternative_readings:
  - his sanctuary
  - his dwelling place
  rationale: The immediate context is liturgical and a parallel in Psalm 96:6 reads
    'in his sanctuary,' but Chronicles here uses מְקוֹמוֹ ('his place'). To avoid
    harmonizing away the Chronicler's wording, the translation keeps the broader term
    in the main text while preserving more specific contextual possibilities in a
    footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
