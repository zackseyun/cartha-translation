id: 1CH.16.27
reference: 1 Chronicles 16:27
source:
  edition: WLC
  text: ה֤וֹד וְ/הָדָר֙ לְ/פָנָ֔י/ו עֹ֥ז וְ/חֶדְוָ֖ה בִּ/מְקֹמֽ/וֹ׃
translation:
  text: Splendor and majesty are before him; strength and joy are in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his dwelling place' or 'in his sanctuary.' The Hebrew says 'in his
      place,' a broader expression than the parallel wording in Psalm 96:6.
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹד
  chosen: splendor
  alternatives:
  - honor
  - glory
  - majesty
  lexicon: HALOT
  rationale: הוֹד denotes stately magnificence or splendor. 'Splendor' fits the poetic
    pairing with הָדָר and avoids collapsing both nouns into the same English term.
- source_word: הָדָר
  chosen: majesty
  alternatives:
  - honor
  - beauty
  - glory
  lexicon: HALOT
  rationale: In poetic parallelism הָדָר commonly conveys majesty or stately honor.
    'Majesty' complements 'splendor' while preserving the elevated royal sense.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  - before his face
  lexicon: HALOT
  rationale: Literally 'before him/his face.' 'Before him' is natural English and
    preserves the spatial-relational imagery without over-literal awkwardness.
- source_word: עֹז
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: HALOT
  rationale: עֹז regularly denotes strength or might. 'Strength' is the most straightforward
    and readable rendering here.
- source_word: חֶדְוָה
  chosen: joy
  alternatives:
  - gladness
  - rejoicing
  lexicon: HALOT
  rationale: חֶדְוָה denotes joy or gladness. 'Joy' is concise, idiomatic, and suits
    the poetic balance with 'strength.'
- source_word: בִּמְקֹמוֹ
  chosen: in his place
  alternatives:
  - in his dwelling place
  - in his sanctuary
  lexicon: HALOT
  rationale: The noun means 'place' in a broad sense. While the context of worship
    could suggest sanctuary, the Hebrew here does not explicitly say 'sanctuary,'
    so 'in his place' preserves the source text without importing a narrower cultic
    term.
