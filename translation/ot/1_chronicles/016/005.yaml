id: 1CH.16.5
reference: 1 Chronicles 16:5
source:
  edition: WLC
  text: אָסָ֥ף הָ/רֹ֖אשׁ וּ/מִשְׁנֵ֣/הוּ זְכַרְיָ֑ה יְעִיאֵ֡ל וּ/שְׁמִֽירָמ֡וֹת וִֽ/יחִיאֵ֡ל
    וּ/מַתִּתְיָ֡ה וֶ/אֱלִיאָ֡ב וּ/בְנָיָהוּ֩ וְ/עֹבֵ֨ד אֱדֹ֜ם וִֽ/יעִיאֵ֗ל בִּ/כְלֵ֤י
    נְבָלִים֙ וּ/בְ/כִנֹּר֔וֹת וְ/אָסָ֖ף בַּֽ/מְצִלְתַּ֥יִם מַשְׁמִֽיעַ׃
translation:
  text: Asaph was the chief, and second to him was Zechariah; then Jeiel, Shemiramoth,
    Jehiel, Mattithiah, Eliab, Benaiah, Obed-edom, and Jeiel, with instruments of
    harps and lyres; and Asaph sounded the cymbals.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and his second was Zechariah.' The Hebrew term indicates second rank
      relative to Asaph.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew distinguishes two stringed instruments: nebalim and kinnorot,
      rendered here ''harps'' and ''lyres.'''
    reason: cultural_note
lexical_decisions:
- source_word: הָרֹאשׁ
  chosen: the chief
  alternatives:
  - the head
  - the leader
  lexicon: HALOT
  rationale: In this personnel list, the noun רֹאשׁ denotes rank or leadership status
    rather than a body part. 'The chief' is natural English for the principal musician
    named first.
- source_word: וּמִשְׁנֵהוּ
  chosen: and second to him was
  alternatives:
  - and his second was
  - and next to him was
  lexicon: HALOT
  rationale: The construct with 3ms suffix indicates the one in second rank relative
    to Asaph. 'Second to him' makes the relationship explicit in idiomatic English.
- source_word: יְעִיאֵל / וִיעִיאֵל
  chosen: Jeiel
  alternatives:
  - Jaaiel
  - Jeiel
  lexicon: HALOT
  rationale: The same personal name appears twice in the verse. A standard English
    transliteration is used consistently for both occurrences.
- source_word: בִּכְלֵי נְבָלִים
  chosen: with instruments of harps
  alternatives:
  - with harps
  - with instruments of lutes
  lexicon: HALOT
  rationale: כְּלֵי means 'instruments/implements of,' and נְבָלִים refers to stringed
    instruments commonly rendered 'harps.' Retaining 'instruments of' reflects the
    Hebrew construction, while 'harps' is the most familiar and likely sense.
- source_word: וּבְכִנֹּרוֹת
  chosen: and lyres
  alternatives:
  - and harps
  - and zithers
  lexicon: HALOT
  rationale: כִּנּוֹר is distinct from נֵבֶל and is commonly rendered 'lyre.' This
    preserves the distinction between the two instrument types in the Hebrew.
- source_word: בַּמְצִלְתַּיִם
  chosen: the cymbals
  alternatives:
  - cymbals
  lexicon: HALOT
  rationale: The definite article is present in Hebrew. English can naturally render
    it as 'the cymbals' in this clause describing Asaph's assigned instrument.
- source_word: מַשְׁמִיעַ
  chosen: sounded
  alternatives:
  - made heard
  - caused to sound
  - played loudly
  lexicon: HALOT
  rationale: The Hiphil participle of שמע here means causing the cymbals to be heard,
    i.e., sounding them audibly. 'Sounded' is concise, idiomatic, and faithful to
    the causative sense.
- source_word: וְאָסָף ... מַשְׁמִיעַ
  chosen: and Asaph sounded the cymbals
  alternatives:
  - while Asaph made the cymbals heard
  - and Asaph was sounding the cymbals
  lexicon: HALOT
  rationale: The clause identifies Asaph's specific musical role. English simple past
    fits the list context better than a participial form while preserving the action.
