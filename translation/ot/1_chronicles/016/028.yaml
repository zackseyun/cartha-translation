id: 1CH.16.28
reference: 1 Chronicles 16:28
source:
  edition: WLC
  text: הָב֤וּ לַֽ/יהוָה֙ מִשְׁפְּח֣וֹת עַמִּ֔ים הָב֥וּ לַ/יהוָ֖ה כָּב֥וֹד וָ/עֹֽז׃
translation:
  text: Ascribe to Yahweh, families of the peoples, ascribe to Yahweh glory and strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clans of the peoples' or 'families of the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבוּ
  chosen: Ascribe
  alternatives:
  - Give
  - Render
  lexicon: HALOT
  rationale: Imperative plural of יהב in a liturgical context calls for acknowledging or attributing what is due to the LORD, not literally transferring something to him. 'Ascribe' best captures the idiomatic force in English and matches the parallel usage in praise texts.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of the imperative. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: מִשְׁפְּחוֹת עַמִּים
  chosen: families of the peoples
  alternatives:
  - clans of the peoples
  - families of the nations
  lexicon: HALOT
  rationale: מִשְׁפְּחוֹת denotes kinship groups or clans; 'families' is a natural modern rendering. עַמִּים is plural, referring to multiple peoples/groups. 'Families of the peoples' preserves the Hebrew construction and the universal summons better than flattening to simply 'nations.'
- source_word: כָּבוֹד
  chosen: glory
  alternatives:
  - honor
  lexicon: HALOT
  rationale: In doxological context כבוד refers to honor, weight, or glory due to God. 'Glory' is the standard and most fitting English equivalent here.
- source_word: וָעֹז
  chosen: and strength
  alternatives:
  - and might
  lexicon: HALOT
  rationale: עֹז commonly denotes strength or might. 'Strength' pairs well with 'glory' and reflects the likely sense of attributes acknowledged as belonging to the LORD.
