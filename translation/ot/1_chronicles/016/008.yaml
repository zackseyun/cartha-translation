id: 1CH.16.8
reference: 1 Chronicles 16:8
source:
  edition: WLC
  text: הוֹד֤וּ לַֽ/יהוָה֙ קִרְא֣וּ בִ/שְׁמ֔/וֹ הוֹדִ֥יעוּ בָ/עַמִּ֖ים עֲלִילֹתָֽי/ו׃
translation:
  text: Give thanks to Yahweh; call on his name; make his deeds known among the peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''among the peoples''; alternatively, ''among the nations.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'his acts'; the Hebrew term refers to what he has done.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹד֤וּ
  chosen: Give thanks
  alternatives:
  - Praise
  - Confess
  - Give praise
  lexicon: HALOT
  rationale: The Hiphil imperative plural of ידה in this praise context most naturally means giving thanks or praise to God. 'Give thanks' is the established and contextually precise English idiom here, fitting the parallel worship imperatives.
- source_word: לַֽיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The divine name יהוה is rendered 'the LORD' per doctrine guidelines for YHWH, following the project's default covenant-name convention.
- source_word: קִרְא֣וּ
  chosen: call on
  alternatives:
  - call upon
  - proclaim
  - invoke
  lexicon: HALOT
  rationale: With the following prepositional phrase 'in/by his name,' קרא here denotes invocation or appeal directed to God rather than merely speaking aloud. 'Call on' is natural modern English and preserves the worshipful sense.
- source_word: בִשְׁמוֹ
  chosen: his name
  alternatives:
  - by his name
  - in his name
  lexicon: HALOT
  rationale: The phrase with קרא can be rendered idiomatically in English as 'call on his name.' A more literal 'call in/by his name' is less natural and does not improve clarity. 'Name' retains the Hebrew concept of revealed identity and reputation.
- source_word: הוֹדִ֥יעוּ
  chosen: make known
  alternatives:
  - declare
  - proclaim
  - cause to know
  lexicon: HALOT
  rationale: The Hiphil imperative of ידע means to cause others to know. 'Make known' is a clear and suitably formal rendering that preserves the causative force.
- source_word: בָעַמִּים
  chosen: among the peoples
  alternatives:
  - among the nations
  - among the peoples of the world
  lexicon: HALOT
  rationale: 'עמים commonly means peoples/nations. ''Peoples'' preserves the plural ethnic sense without over-specifying geopolitical ''nations.'' It also matches the preposition''s distributive sense: among the various peoples.'
- source_word: עֲלִילֹתָיו
  chosen: his deeds
  alternatives:
  - his acts
  - his mighty acts
  - his works
  lexicon: HALOT
  rationale: The noun refers to actions or deeds, often notable ones. 'His deeds' is broad enough to preserve the lexical sense without adding 'mighty,' which is interpretive though often contextually implied.
