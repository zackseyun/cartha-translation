id: 1CH.16.30
reference: 1 Chronicles 16:30
source:
  edition: WLC
  text: חִ֤ילוּ מִ/לְּ/פָנָי/ו֙ כָּל הָ/אָ֔רֶץ אַף תִּכּ֥וֹן תֵּבֵ֖ל בַּל תִּמּֽוֹט־־־׃
translation:
  text: Tremble before him, all the earth; indeed, the world is established; it shall
    not be moved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it will not totter' or 'it will not be shaken.' The Hebrew image is
      of firm stability.
    reason: lexical_alternative
lexical_decisions:
- source_word: חִילוּ
  chosen: Tremble
  alternatives:
  - Writhe
  - Be in anguish
  - Fear
  lexicon: HALOT
  rationale: The verb from חול in the qal imperative can denote writhing/shaking,
    and in worship-theophany contexts it idiomatically conveys trembling before divine
    presence. 'Tremble' is natural English and fits the summons to all the earth in
    context better than the more physical 'writhe.'
- source_word: מִלְּפָנָיו
  chosen: before him
  alternatives:
  - from before him
  - at his presence
  lexicon: HALOT
  rationale: Literally 'from before his face/presence,' but in English the idiom 'before
    him' best captures reverential stance in context. 'At his presence' is possible,
    but the imperative plus preposition is well represented by 'before him.'
- source_word: כָּל הָאָרֶץ
  chosen: all the earth
  alternatives:
  - all the land
  lexicon: HALOT
  rationale: In this cosmic praise context, אֶרֶץ refers to the whole earth/world
    rather than a specific land. 'All the earth' preserves the universal scope.
- source_word: אַף
  chosen: indeed
  alternatives:
  - also
  - 'yes'
  - surely
  lexicon: HALOT
  rationale: Here אַף adds emphatic force to the following clause rather than simple
    addition. 'Indeed' conveys that emphasis smoothly in modern English.
- source_word: תִּכּוֹן
  chosen: is established
  alternatives:
  - is firmly fixed
  - is set in place
  lexicon: HALOT
  rationale: Niphal of כון commonly means 'be established, be firm.' The passive-like
    English 'is established' preserves both the stative sense and the implication
    of secure ordering.
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  lexicon: HALOT
  rationale: תבל often denotes the world in its inhabited, ordered sense. 'The world'
    is the most idiomatic concise rendering; the nuance of inhabited order is not
    lost in context.
- source_word: בַּל
  chosen: not
  alternatives:
  - never
  lexicon: HALOT
  rationale: Poetic negative particle meaning 'not.' 'Not' is the straightforward
    equivalent here.
- source_word: תִּמּוֹט
  chosen: it shall not be moved
  alternatives:
  - it will not totter
  - it will not be shaken
  lexicon: HALOT
  rationale: Mot in the niphal means to totter, slip, or be moved. 'It shall not be
    moved' is a strong, idiomatic English rendering in cosmic-stability contexts,
    while still reflecting the underlying image of not tottering.
