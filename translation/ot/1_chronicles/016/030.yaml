theological_decisions:
- issue: Cosmic stability language
  chosen_reading: The verse affirms the world's established order under God's rule
    without specifying a scientific claim about immobility.
  alternative_readings:
  - A more literal reading could emphasize 'will not totter' rather than 'will not
    be moved' to foreground stability rather than absolute motionlessness.
  rationale: The Hebrew poetic idiom speaks of firmness and security in creation under
    divine kingship. Rendering it idiomatically avoids importing later cosmological
    debates while preserving the theological claim of God's sustaining order.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Original-language primacy over translation tradition.'
