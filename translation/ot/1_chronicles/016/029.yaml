theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יְהוָה is 'the LORD,' following the stated doctrine
    and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of בְּהַדְרַת קֹדֶשׁ
  chosen_reading: in holy splendor
  alternative_readings:
  - in the splendor of holiness
  - in holy attire
  rationale: The Hebrew phrase is poetically compact and can be understood either
    as the splendor belonging to holiness or as holy adornment appropriate to worship.
    The chosen rendering preserves the theological-aesthetic force without over-resolving
    the ambiguity; alternatives are preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
