id: 1CH.16.29
reference: 1 Chronicles 16:29
source:
  edition: WLC
  text: הָב֥וּ לַ/יהוָ֖ה כְּב֣וֹד שְׁמ֑/וֹ שְׂא֤וּ מִנְחָה֙ וּ/בֹ֣אוּ לְ/פָנָ֔י/ו
    הִשְׁתַּחֲו֥וּ לַ/יהוָ֖ה בְּ/הַדְרַת קֹֽדֶשׁ־׃
translation:
  text: Ascribe to the LORD the glory due his name; bring an offering and come before
    him. Bow down to the LORD in holy splendor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in the splendor of holiness'; possibly, 'in holy attire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבוּ
  chosen: Ascribe
  alternatives:
  - Give
  - Render
  lexicon: HALOT
  rationale: In this liturgical imperative, the verb calls hearers to acknowledge
    or attribute honor to the LORD rather than literally transfer something material.
    'Ascribe' best captures the idiomatic force in English while preserving the formal
    sense.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered 'the LORD' per doctrine guidelines
    for the covenant name.
- source_word: כְּבוֹד שְׁמוֹ
  chosen: the glory due his name
  alternatives:
  - the glory of his name
  - glory to his name
  lexicon: HALOT
  rationale: The construct phrase means glory associated with or owed to his name.
    'Due his name' makes explicit the idiomatic sense found in this worship formula
    and reads naturally in modern English.
- source_word: שְׂאוּ
  chosen: bring
  alternatives:
  - lift up
  - carry
  lexicon: HALOT
  rationale: Although the verb literally means 'lift/carry,' with מִנְחָה it idiomatically
    means to bring or present an offering.
- source_word: מִנְחָה
  chosen: an offering
  alternatives:
  - a gift offering
  - a tribute
  lexicon: HALOT
  rationale: A broad sacrificial/gift term. 'Offering' is the clearest general rendering
    here without over-specifying the type.
- source_word: וּבֹאוּ לְפָנָיו
  chosen: and come before him
  alternatives:
  - and enter his presence
  - and come into his presence
  lexicon: HALOT
  rationale: A standard idiom for approaching God in worship. 'Come before him' preserves
    the spatial and reverential sense without unnecessary expansion.
- source_word: הִשְׁתַּחֲווּ
  chosen: Bow down
  alternatives:
  - Worship
  - Prostrate yourselves
  lexicon: HALOT
  rationale: The verb denotes the physical act of bowing/prostration, often as worship.
    'Bow down' preserves the embodied sense better than the more interpretive 'worship,'
    while still fitting the context.
- source_word: בְּהַדְרַת קֹדֶשׁ
  chosen: in holy splendor
  alternatives:
  - in the splendor of holiness
  - in holy attire
  lexicon: HALOT
  rationale: The phrase can denote holiness as splendid beauty, and in some contexts
    may imply holy adornment/attire. 'In holy splendor' is a balanced rendering that
    preserves the poetic quality without forcing a narrower cultic reading.
