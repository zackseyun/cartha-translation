id: 1CH.16.40
reference: 1 Chronicles 16:40
source:
  edition: WLC
  text: לְֽ/הַעֲלוֹת֩ עֹל֨וֹת לַ/יהוָ֜ה עַל מִזְבַּ֧ח הָ/עֹלָ֛ה תָּמִ֖יד לַ/בֹּ֣קֶר וְ/לָ/עָ֑רֶב וּ/לְ/כָל הַ/כָּתוּב֙ בְּ/תוֹרַ֣ת יְהוָ֔ה אֲשֶׁ֥ר צִוָּ֖ה עַל יִשְׂרָאֵֽל־־־׃
translation:
  text: to offer burnt offerings to Yahweh on the altar of burnt offering continually, morning and evening, and according to all that is written in the law of Yahweh, which he commanded for Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the instruction of the LORD' for 'in the law of the LORD'; Hebrew torah can mean both 'law' and 'instruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַעֲלוֹת
  chosen: to offer
  alternatives:
  - to bring up
  - to cause to ascend
  lexicon: HALOT
  rationale: The Hiphil infinitive of עלה literally means 'to cause to go up,' but in sacrificial contexts it idiomatically means to offer a sacrifice. 'To offer' is clear modern English and preserves the cultic sense without wooden literalism.
- source_word: עֹלוֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: The plural noun עֹלָה is the standard term for the burnt offering. 'Burnt offerings' is the established and accurate cultic rendering.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: 'Per doctrine, יְהוָה is rendered ''the LORD'' rather than transliterated. The preposition ל marks direction/dedication: the offerings are made to the LORD.'
- source_word: מִזְבַּח הָעֹלָה
  chosen: the altar of burnt offering
  alternatives:
  - the altar for burnt offering
  - the burnt-offering altar
  lexicon: HALOT
  rationale: This construct phrase identifies the specific altar used for burnt offerings. 'The altar of burnt offering' is natural and sufficiently formal.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - regularly
  - continually/regularly
  lexicon: HALOT
  rationale: תָּמִיד denotes regular continuity in cultic practice. 'Continually' preserves the formal force, while the following 'morning and evening' specifies the rhythm.
- source_word: לַבֹּקֶר וְלָעָרֶב
  chosen: morning and evening
  alternatives:
  - in the morning and in the evening
  lexicon: HALOT
  rationale: The paired temporal expressions indicate the daily schedule of the offerings. Omitting repeated prepositions in English yields smoother style without loss of meaning.
- source_word: וּלְכָל הַכָּתוּב
  chosen: and according to all that is written
  alternatives:
  - and for all that is written
  - and with respect to all that is written
  lexicon: HALOT
  rationale: The prefixed ל with כָל here is best represented idiomatically as conformity to the written prescriptions. 'According to all that is written' captures the sense of regulated obedience.
- source_word: בְּתוֹרַת יְהוָה
  chosen: in the law of the LORD
  alternatives:
  - in the instruction of the LORD
  - in the Torah of the LORD
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction,' but in this cultic-legal context 'law' best communicates the written covenantal prescriptions to modern readers. 'Torah' is possible but less transparent for general English readers.
- source_word: אֲשֶׁר צִוָּה עַל יִשְׂרָאֵל
  chosen: which he commanded for Israel
  alternatives:
  - which he commanded concerning Israel
  - which he commanded upon Israel
  - which he commanded Israel
  lexicon: HALOT
  rationale: The preposition עַל after צוה can indicate what is enjoined upon someone. 'For Israel' communicates that these commands were laid upon Israel, avoiding awkward literalism while preserving the covenantal addressee.
