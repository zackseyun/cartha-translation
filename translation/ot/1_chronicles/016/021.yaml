id: 1CH.16.21
reference: 1 Chronicles 16:21
source:
  edition: WLC
  text: לֹא הִנִּ֤יחַ לְ/אִישׁ֙ לְ/עָשְׁקָ֔/ם וַ/יּ֥וֹכַח עֲלֵי/הֶ֖ם מְלָכִֽים־׃
translation:
  text: He allowed no man to oppress them, and he rebuked kings on their account,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for their sake' or 'because of them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנִּיחַ
  chosen: allowed
  alternatives:
  - permitted
  - let
  lexicon: HALOT
  rationale: In the causative stem with לֹא and an infinitive, the verb means 'allow/permit.'
    'Allowed' is natural modern English and preserves the sense that God did not permit
    the action.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  - anyone
  lexicon: HALOT
  rationale: The Hebrew is singular masculine 'man' used generically. Per the translation
    philosophy, a gender-accurate rendering is preferred where the source has generic
    masculine force. 'No man' is idiomatic here.
- source_word: לְעָשְׁקָם
  chosen: to oppress them
  alternatives:
  - to wrong them
  - to exploit them
  lexicon: HALOT
  rationale: The verb עָשַׁק commonly denotes oppression, defrauding, or exploitation.
    'Oppress' best fits the broader sense of harmful mistreatment in this historical
    summary.
- source_word: וַיּוֹכַח
  chosen: rebuked
  alternatives:
  - reproved
  - corrected
  lexicon: HALOT
  rationale: The verb יכח in this context conveys issuing a reproof or rebuke. 'Rebuked'
    is strong, clear English and suits the object 'kings.'
- source_word: עֲלֵיהֶם
  chosen: on their account
  alternatives:
  - for their sake
  - because of them
  lexicon: HALOT
  rationale: The preposition עַל with pronominal suffix here indicates action taken
    with reference to or for the benefit of the patriarchs. 'On their account' is
    a natural rendering that preserves the causal/protective nuance.
- source_word: מְלָכִים
  chosen: kings
  alternatives:
  - rulers
  lexicon: HALOT
  rationale: The noun straightforwardly means 'kings'; there is no contextual reason
    to generalize it to 'rulers' in the main text.
