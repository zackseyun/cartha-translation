theological_decisions:
- issue: Implicit subject of the verbs
  chosen_reading: The subject is God, carried over from the surrounding context.
  alternative_readings:
  - An unspecified subject
  rationale: The verse continues the description of the LORD's protective action toward
    the patriarchs in the surrounding passage. English requires an explicit pronoun,
    so 'he' is supplied, referring to God without expanding the theology beyond the
    context.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the source sense in readable modern English.'
