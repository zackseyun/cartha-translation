theological_decisions:
- issue: Referent of the pronoun suffix in 'He confirmed it'
  chosen_reading: The feminine suffix refers to the covenantal promise/oath mentioned
    in the immediate preceding verses.
  alternative_readings:
  - The suffix could be understood more specifically as referring to the oath alone.
  rationale: The immediate context (vv. 16–17) speaks of covenant, sworn word, and
    oath in close parallel. Rendering the suffix simply as 'it' preserves the Hebrew
    anaphora without forcing an overly narrow antecedent in English.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
