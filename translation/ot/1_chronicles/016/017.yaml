id: 1CH.16.17
reference: 1 Chronicles 16:17
source:
  edition: WLC
  text: וַ/יַּעֲמִידֶ֤/הָ לְ/יַעֲקֹב֙ לְ/חֹ֔ק לְ/יִשְׂרָאֵ֖ל בְּרִ֥ית עוֹלָֽם׃
translation:
  text: He confirmed it to Jacob as a statute, to Israel as an everlasting covenant,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He established it.' The Hebrew verb can carry the sense of causing something
      to stand firm.
    reason: lexical_alternative
  - marker: b
    text: Or 'an eternal covenant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמִידֶהָ
  chosen: He confirmed it
  alternatives:
  - He established it
  - He set it in place
  lexicon: HALOT
  rationale: From עמד in the Hiphil, with 3fs suffix referring back to the covenant/oath
    in the preceding context. In this context the causative sense is idiomatically
    that God made the covenant stand firm or valid. 'Confirmed' communicates this
    well in natural English while preserving the covenantal force.
- source_word: לְיַעֲקֹב
  chosen: to Jacob
  alternatives:
  - for Jacob
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object/beneficiary. 'To Jacob' is
    the most straightforward rendering in English and matches the parallel phrase
    with Israel.
- source_word: לְחֹק
  chosen: as a statute
  alternatives:
  - as a decree
  - as an ordinance
  lexicon: HALOT
  rationale: חֹק commonly denotes a fixed statute, prescribed due, or decree. 'Statute'
    preserves the formal covenantal/legal nuance better than the broader 'decree'
    here.
- source_word: לְיִשְׂרָאֵל
  chosen: to Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: Parallel to 'to Jacob.' Since Jacob and Israel are paired covenant names
    for the patriarch/people, the translation preserves the Hebrew repetition rather
    than smoothing it away.
- source_word: בְּרִית עוֹלָם
  chosen: as an everlasting covenant
  alternatives:
  - as an eternal covenant
  - an age-long covenant
  lexicon: HALOT
  rationale: בְּרִית is 'covenant,' a central theological term that should be retained.
    עוֹלָם in covenant contexts is conventionally and accurately rendered 'everlasting,'
    expressing enduring permanence without over-specifying philosophical eternity.
