id: 1CH.16.13
reference: 1 Chronicles 16:13
source:
  edition: WLC
  text: זֶ֚רַע יִשְׂרָאֵ֣ל עַבְדּ֔/וֹ בְּנֵ֥י יַעֲקֹ֖ב בְּחִירָֽי/ו׃
translation:
  text: O offspring of Israel his servant, sons of Jacob, his chosen ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seed of Israel'; the Hebrew uses a collective singular for descendants.
    reason: lexical_alternative
  - marker: b
    text: Or 'children of Jacob'; Hebrew literally 'sons of Jacob.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his elect.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶרַע
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: HALOT
  rationale: The noun denotes posterity/descendants. 'Offspring' preserves the collective
    singular force in natural English better than the more literal but potentially
    misleading 'seed,' while remaining closer to the Hebrew than the more interpretive
    'descendants.'
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Standard transliteration of the personal/covenantal name, as required
    by the translation philosophy to transliterate names rather than translate them.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: Though עבד can denote either 'servant' or 'slave,' here it is a covenantal
    designation for Israel in relation to God rather than emphasizing bonded social
    status. 'Servant' best fits the context and aligns with the doctrine's context-dependent
    handling of such terms.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural construct, literally 'sons
    of.' In keeping with the gender-accurate principle, 'sons of' is retained rather
    than neutralizing to 'children of,' especially since this is a conventional genealogical/corporate
    expression.
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Standard transliteration of the patriarch's name.
- source_word: בְּחִירָיו
  chosen: his chosen ones
  alternatives:
  - his elect
  - his chosen
  lexicon: HALOT
  rationale: The plural noun means those chosen by him. 'Chosen ones' is clear modern
    English and preserves the plural explicitly. 'Elect' is possible but carries heavier
    theological freight than the immediate context requires.
