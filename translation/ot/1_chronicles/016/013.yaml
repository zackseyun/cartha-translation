theological_decisions:
- issue: Referent of the 3ms suffixes in 'his servant' and 'his chosen ones'
  chosen_reading: The suffixes refer to God, so Israel/Jacob are described as God's
    servant and God's chosen ones.
  alternative_readings:
  - The suffixes could be read more loosely in apposition within the poetic line,
    but the natural sense in context is divine possession.
  rationale: In the surrounding call to remember the LORD's works, the people addressed
    are identified as belonging to the LORD. Rendering the suffixes straightforwardly
    as 'his' preserves the Hebrew while allowing the contextual referent to remain
    clear.
