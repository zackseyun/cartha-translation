id: 1CH.16.16
reference: 1 Chronicles 16:16
source:
  edition: WLC
  text: אֲשֶׁ֤ר כָּרַת֙ אֶת אַבְרָהָ֔ם וּ/שְׁבוּעָת֖/וֹ לְ/יִצְחָֽק־׃
translation:
  text: which he made with Abraham, and his oath to Isaac—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'which he cut with Abraham,' a Hebrew idiom meaning 'made a covenant
      with Abraham.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative particle introducing the clause; 'which' fits the antecedent
    ('the covenant' in the previous verse) in smooth English.
- source_word: כָּרַת
  chosen: made
  alternatives:
  - cut
  lexicon: HALOT
  rationale: The verb literally means 'cut' and is the standard idiom for making a
    covenant. In English, 'made' communicates the covenant idiom naturally without
    obscuring meaning; the more literal 'cut' would be unnatural here.
- source_word: אֶת אַבְרָהָם
  chosen: with Abraham
  alternatives:
  - Abraham
  lexicon: HALOT
  rationale: Although אֶת marks the direct object, English idiom with 'make a covenant'
    normally takes 'with Abraham.' This reflects the sense of covenant-making rather
    than a wooden object marker rendering.
- source_word: וּשְׁבוּעָתוֹ
  chosen: and his oath
  alternatives:
  - and the oath he swore
  - and his sworn promise
  lexicon: HALOT
  rationale: The noun means 'oath'; the 3ms suffix is retained as 'his.' This keeps
    the parallel structure with the covenant and preserves the possessive suffix.
- source_word: לְיִצְחָק
  chosen: to Isaac
  alternatives:
  - for Isaac
  lexicon: HALOT
  rationale: The preposition ל here is best rendered 'to,' indicating the oath's direction
    or addressee. 'For Isaac' is possible but less direct in this covenantal context.
