theological_decisions:
- issue: Covenant idiom כרת ברית implied from the previous verse's antecedent
  chosen_reading: which he made with Abraham
  alternative_readings:
  - which he cut with Abraham
  rationale: The Hebrew idiom for covenant-making is preserved in sense rather than
    wooden form. This avoids paraphrase while keeping the covenantal force clear in
    modern English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
