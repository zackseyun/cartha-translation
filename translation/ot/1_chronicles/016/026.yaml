id: 1CH.16.26
reference: 1 Chronicles 16:26
source:
  edition: WLC
  text: כִּ֠י כָּל אֱלֹהֵ֤י הָ/עַמִּים֙ אֱלִילִ֔ים וַ/יהוָ֖ה שָׁמַ֥יִם עָשָֽׂה־׃
translation:
  text: For all the gods of the peoples are idols, but the LORD made the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the nations' instead of 'the peoples.'
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew conjunction is literally ''and,'' but here it carries a contrasting
      sense: ''but the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the surrounding call to worship; 'for' preserves
    the explanatory force in natural English.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Retains the comprehensive scope of the statement.
- source_word: אֱלֹהֵי
  chosen: gods
  alternatives:
  - divine beings
  lexicon: HALOT
  rationale: In construct with 'the peoples,' this refers to the deities worshiped
    by the nations/peoples. 'Gods' is the standard and most direct rendering here.
- source_word: הָעַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: עַמִּים commonly means 'peoples.' 'Nations' is possible, but 'peoples'
    more closely matches the Hebrew plural and avoids importing a more political nuance
    than necessary.
- source_word: אֱלִילִים
  chosen: idols
  alternatives:
  - worthless idols
  - nothings
  lexicon: HALOT
  rationale: The term denotes idols and carries a pejorative sense of worthlessness.
    'Idols' is clear, idiomatic, and sufficiently captures the contrast with the LORD
    as Creator; stronger paraphrastic options were avoided in the main text.
- source_word: וַיהוָה
  chosen: but the LORD
  alternatives:
  - and the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' Although the conjunction is
    formally 'and,' the clause is strongly adversative in context, contrasting false
    gods with the true Creator, so 'but' best conveys the Hebrew sense in English.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: The Hebrew plural is best represented by 'the heavens,' especially in
    creation language.
- source_word: עָשָׂה
  chosen: made
  alternatives:
  - created
  - fashioned
  lexicon: HALOT
  rationale: עשה broadly means 'made' or 'did.' 'Made' is the most direct rendering
    here; 'created' would be interpretively stronger and less formally tied to the
    Hebrew verb used.
