theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering of יהוה as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the conjunction before יהוה
  chosen_reading: adversative contrast ('but the LORD')
  alternative_readings:
  - simple coordination ('and the LORD')
  rationale: The verse sets the gods of the peoples over against the LORD as the maker
    of the heavens. Rendering the conjunction adversatively preserves the theological
    contrast explicit in the Hebrew discourse without adding content beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    source-text sense in readable English'
