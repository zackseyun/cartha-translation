id: 1CH.16.41
reference: 1 Chronicles 16:41
source:
  edition: WLC
  text: וְ/עִמָּ/הֶם֙ הֵימָ֣ן וִֽ/ידוּת֔וּן וּ/שְׁאָר֙ הַ/בְּרוּרִ֔ים אֲשֶׁ֥ר נִקְּב֖וּ בְּ/שֵׁמ֑וֹת לְ/הֹדוֹת֙ לַֽ/יהוָ֔ה כִּ֥י לְ/עוֹלָ֖ם חַסְדּֽ/וֹ׃
translation:
  text: And with them were Heman and Jeduthun and the rest who were chosen, who were designated by name to give thanks to Yahweh, for his steadfast love endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who were specified by name' or 'who were named individually.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''for his steadfast love is forever,'' a recurring liturgical refrain.'
    reason: cultural_note
lexical_decisions:
- source_word: וְעִמָּהֶם
  chosen: And with them were
  alternatives:
  - And with them
  - And with them was
  lexicon: HALOT
  rationale: The prepositional phrase introduces those accompanying the previously mentioned appointees. Supplying 'were' is natural English and matches the plural sense of the following names and group.
- source_word: הֵימָן
  chosen: Heman
  rationale: Proper personal name; transliterated according to standard English convention.
- source_word: וִידוּתוּן
  chosen: Jeduthun
  rationale: Proper personal name; transliterated according to standard English convention.
- source_word: וּשְׁאָר הַבְּרוּרִים
  chosen: and the rest of those chosen
  alternatives:
  - and the rest of the chosen men
  - and the remainder of the selected ones
  lexicon: HALOT
  rationale: שְׁאָר means 'rest/remainder.' The passive participle הַבְּרוּרִים denotes those selected or chosen. 'Those chosen' is natural English without adding 'men,' which is not explicit in the Hebrew.
- source_word: אֲשֶׁר נִקְּבוּ בְּשֵׁמוֹת
  chosen: who were designated by name
  alternatives:
  - who were specified by name
  - who were named individually
  - who were expressly named
  lexicon: HALOT
  rationale: The Niphal of נקב with 'names' conveys being identified or designated explicitly by name. 'Designated by name' preserves the formal sense while reading smoothly.
- source_word: לְהֹדוֹת
  chosen: to give thanks
  alternatives:
  - to praise
  - to confess/acknowledge
  lexicon: HALOT
  rationale: In this liturgical context ידה in the Hiphil commonly means giving thanks or praise. 'Give thanks' fits the following refrain and the cultic setting best.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered 'the LORD' per the project's stated default for YHWH.
- source_word: כִּי לְעוֹלָם חַסְדּוֹ
  chosen: for his steadfast love endures forever
  alternatives:
  - for his lovingkindness is forever
  - for his covenant love is everlasting
  - for his mercy endures forever
  lexicon: HALOT
  rationale: This is a common refrain. כִּי here introduces the content/reason of thanksgiving. חֶסֶד is richly covenantal; 'steadfast love' is the best established English rendering that preserves this weight. 'Endures forever' is idiomatic and reflects לְעוֹלָם.
