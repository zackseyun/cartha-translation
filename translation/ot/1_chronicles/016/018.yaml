theological_decisions:
- issue: Shift from singular addressee to plural possessive
  chosen_reading: 'Retain both numbers in translation: ''To you ... your inheritance.'''
  alternative_readings:
  - 'Smooth to singular throughout: ''your inheritance'' referring only to Abraham/Isaac/Jacob
    in a collective sense'
  - Restructure dynamically to 'for you and your descendants'
  rationale: The Hebrew text itself juxtaposes singular לְךָ ('to you') with plural
    נַחֲלַתְכֶם ('your [plural] inheritance'). Preserving the shift reflects the covenant
    promise given to the patriarch and realized in his descendants/community. This
    maintains the textual-theological tension rather than harmonizing it away.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
