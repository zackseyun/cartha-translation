id: 1CH.16.18
reference: 1 Chronicles 16:18
source:
  edition: WLC
  text: לֵ/אמֹ֗ר לְ/ךָ֙ אֶתֵּ֣ן אֶֽרֶץ כְּנָ֔עַן חֶ֖בֶל נַחֲלַתְ/כֶֽם־׃
translation:
  text: saying, “To you I will give the land of Canaan as the portion of your inheritance.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew shifts from singular ('to you') to plural ('your inheritance'), likely
      moving from the patriarch addressed to his descendants as the covenant heirs.
    reason: lexical_alternative
  - marker: b
    text: Or 'allotment' for 'portion'; the Hebrew word literally refers to a cord
      or measured line and by extension a measured share of land.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - saying that
  - declaring
  lexicon: HALOT
  rationale: Infinitive construct of אמר introducing the content of the covenant speech
    from the previous verse; 'saying' is the standard and sufficiently natural connective
    in English.
- source_word: לְךָ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: Second masculine singular pronominal object of the giving verb, referring
    to the patriarch addressed in the quoted promise. 'To you' best matches the dative
    sense.
- source_word: אֶתֵּן
  chosen: I will give
  alternatives:
  - I give
  lexicon: HALOT
  rationale: 'Qal imperfect 1cs of נתן in a promissory context naturally carries future
    force: a divine promise of grant.'
- source_word: אֶרֶץ כְּנָעַן
  chosen: the land of Canaan
  alternatives:
  - Canaan
  - the country of Canaan
  lexicon: HALOT
  rationale: Construct-like apposition naming the specific territory promised. Including
    'land of' preserves the concrete territorial sense of אֶרֶץ.
- source_word: חֶבֶל
  chosen: portion
  alternatives:
  - allotment
  - measuring line
  - territory
  lexicon: HALOT
  rationale: Though literally 'cord/line,' in land-grant contexts it denotes an allotted
    share or measured portion. 'Portion' is idiomatic and preserves the inheritance-allotment
    imagery without over-literal awkwardness.
- source_word: נַחֲלַתְכֶם
  chosen: your inheritance
  alternatives:
  - your possession
  - your heritage
  lexicon: HALOT
  rationale: נחלה commonly denotes inherited possession, especially covenant land.
    'Inheritance' preserves both legal and theological resonance. The 2mp suffix is
    retained as 'your,' reflecting the Chronicler's application to the descendants/community
    rather than only the singular patriarch.
