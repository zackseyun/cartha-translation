id: 1CH.16.3
reference: 1 Chronicles 16:3
source:
  edition: WLC
  text: וַ/יְחַלֵּק֙ לְ/כָל אִ֣ישׁ יִשְׂרָאֵ֔ל מֵ/אִ֖ישׁ וְ/עַד אִשָּׁ֑ה לְ/אִישׁ֙
    כִּכַּר לֶ֔חֶם וְ/אֶשְׁפָּ֖ר וַ/אֲשִׁישָֽׁה־־־׃
translation:
  text: He distributed to every man of Israel, from man to woman, to each person a
    loaf of bread, a portion of meat, and a raisin cake.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'a portion' or another food item; the Hebrew word אֶשְׁפָּר
      is rare and its precise sense is uncertain. Many understand it here as a portion
      of meat.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַלֵּק
  chosen: He distributed
  alternatives:
  - he apportioned
  - he divided out
  lexicon: HALOT
  rationale: Piel wayyiqtol of חלק in this context denotes distributing portions to
    a crowd. 'Distributed' is natural modern English and preserves the concrete sense
    of allotting items.
- source_word: לְכָל אִישׁ יִשְׂרָאֵל
  chosen: to every man of Israel
  alternatives:
  - to every person of Israel
  - to all Israel
  lexicon: HALOT
  rationale: The Hebrew uses אִישׁ with distributive force. Per the gender-accurate
    policy, 'every man of Israel' preserves the source wording, while the following
    phrase clarifies that women were included as well.
- source_word: מֵאִישׁ וְעַד אִשָּׁה
  chosen: from man to woman
  alternatives:
  - from male to female
  - both men and women
  lexicon: HALOT
  rationale: This idiom explicitly marks the full range of recipients by sex. 'From
    man to woman' is a close rendering that preserves the Hebrew expression without
    flattening it.
- source_word: לְאִישׁ
  chosen: to each person
  alternatives:
  - to each one
  - to each man
  lexicon: HALOT
  rationale: Here the repeated אִישׁ is distributive and refers back to each individual
    recipient regardless of sex, as established by the preceding phrase. 'Each person'
    communicates the distributive sense clearly in English.
- source_word: כִּכַּר לֶחֶם
  chosen: a loaf of bread
  alternatives:
  - a round loaf of bread
  - a cake of bread
  lexicon: HALOT
  rationale: כִּכַּר commonly denotes a round loaf or cake-shaped portion. 'Loaf of
    bread' is idiomatic and sufficiently precise for modern readers.
- source_word: אֶשְׁפָּר
  chosen: a portion of meat
  alternatives:
  - a measure
  - a portion
  - a cake of dates
  lexicon: HALOT
  rationale: The noun is rare and disputed. In this context of festive food distribution,
    'a portion of meat' follows the most common contextual understanding and fits
    the parallel in Samuel, while preserving a concrete food item.
- source_word: אֲשִׁישָׁה
  chosen: a raisin cake
  alternatives:
  - a cake of raisins
  - a pressed cake
  lexicon: HALOT
  rationale: This term elsewhere denotes a pressed cake, commonly understood as made
    from raisins. 'Raisin cake' is concise and widely intelligible.
