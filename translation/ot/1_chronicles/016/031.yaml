id: 1CH.16.31
reference: 1 Chronicles 16:31
source:
  edition: WLC
  text: יִשְׂמְח֤וּ הַ/שָּׁמַ֨יִם֙ וְ/תָגֵ֣ל הָ/אָ֔רֶץ וְ/יֹאמְר֥וּ בַ/גּוֹיִ֖ם יְהוָ֥ה
    מָלָֽךְ׃
translation:
  text: Let the heavens rejoice, and let the earth be glad; and let them say among
    the nations, “The LORD reigns!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh reigns.'' The main text follows the project''s default
      rendering of the divine name as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יִשְׂמְחוּ
  chosen: Let ... rejoice
  alternatives:
  - will rejoice
  - may ... rejoice
  lexicon: HALOT
  rationale: 'Qal imperfect 3mp of שׂמח in this poetic/jussive context is best rendered
    as a volitive: ''Let ... rejoice,'' matching the parallel volitives in the verse
    and preserving the summons-like force.'
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: שׁמים is morphologically plural and in poetic praise contexts commonly
    refers to the heavens/celestial realm rather than merely the visible sky. 'The
    heavens' preserves the elevated register and plural form.
- source_word: וְתָגֵל
  chosen: and let ... be glad
  alternatives:
  - and let ... rejoice
  - and ... exult
  lexicon: HALOT
  rationale: גיל conveys gladness/exultation. Rendering it as 'be glad' avoids awkward
    repetition with the previous 'rejoice' while preserving the parallel poetic sense.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In parallel with 'the heavens' and in a cosmic praise formula, ארץ is
    best rendered 'the earth,' not the more localized 'land.'
- source_word: וְיֹאמְרוּ
  chosen: and let them say
  alternatives:
  - and they will say
  - and say
  lexicon: HALOT
  rationale: Qal imperfect 3mp of אמר continues the volitive sequence. English supplies
    'let them' to reflect the jussive-like force and maintain the poetic parallelism.
- source_word: בַגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - in the nations
  lexicon: HALOT
  rationale: גוים here refers broadly to the peoples/nations of the world, not specifically
    'Gentiles' in a later Jewish-Christian contrast. 'Among the nations' fits the
    missional/public proclamation sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention
    while signaling the covenant name.
- source_word: מָלָךְ
  chosen: reigns
  alternatives:
  - has become king
  - is king
  - has reigned
  lexicon: HALOT
  rationale: The perfect of מלך in enthronement/praise contexts can express the present
    reality of kingship. 'Reigns' is idiomatic in English and fits the proclamation
    formula. 'Has become king' is possible but can imply a temporal transition not
    required by the context.
