theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Following the project's
    doctrinal guidance for contested terms, it is rendered 'the LORD' rather than
    transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of עוֹלָם in the doxology
  chosen_reading: from everlasting to everlasting
  alternative_readings:
  - from eternity to eternity
  - forever and ever
  rationale: The phrase expresses God's praise across unbounded time. The chosen rendering
    preserves the elevated doxological force without importing philosophical precision
    beyond the Hebrew idiom.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    source sense without paraphrase'
