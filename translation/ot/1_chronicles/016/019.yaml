id: 1CH.16.19
reference: 1 Chronicles 16:19
source:
  edition: WLC
  text: בִּֽ/הְיֽוֹתְ/כֶם֙ מְתֵ֣י מִסְפָּ֔ר כִּ/מְעַ֖ט וְ/גָרִ֥ים בָּֽ/הּ׃
translation:
  text: when you were few in number, very few, and sojourners in it,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'few indeed' or 'almost none'; the Hebrew intensifies their smallness.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּהְיוֹתְכֶם
  chosen: when you were
  alternatives:
  - as you were
  - while you were
  - in your being
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of היה with 2mp suffix introduces
    a temporal clause. 'When you were' is natural English and preserves the temporal
    sense without wooden literalism.
- source_word: מְתֵי מִסְפָּר
  chosen: few in number
  alternatives:
  - men of number
  - a small number
  - numbered men
  lexicon: HALOT
  rationale: This idiom means a small or countable few. 'Few in number' is the standard
    idiomatic English equivalent and best reflects the Hebrew expression.
- source_word: כִּמְעַט
  chosen: very few
  alternatives:
  - almost nothing
  - a little
  - few indeed
  lexicon: HALOT
  rationale: Here כ with מעט intensifies the preceding idea of smallness rather than
    introducing comparison alone. 'Very few' communicates the emphatic sense in smooth
    English. Because the phrase can also be rendered more literally as 'indeed few'
    or 'almost none,' that alternative nuance is preserved in a footnote.
- source_word: וְגָרִים
  chosen: and sojourners
  alternatives:
  - and strangers
  - and resident aliens
  - and temporary residents
  lexicon: HALOT
  rationale: The participle from גור denotes living as a foreigner or temporary resident.
    'Sojourners' preserves the covenantal and social nuance better than the broader
    'strangers,' while remaining readable.
- source_word: בָּהּ
  chosen: in it
  alternatives:
  - in her
  - there
  lexicon: HALOT
  rationale: The feminine singular pronominal suffix refers back to the land in the
    surrounding context. English normally uses 'it' for land, though Hebrew marks
    the noun as feminine.
