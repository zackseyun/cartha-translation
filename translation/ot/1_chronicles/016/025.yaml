id: 1CH.16.25
reference: 1 Chronicles 16:25
source:
  edition: WLC
  text: כִּי֩ גָד֨וֹל יְהוָ֤ה וּ/מְהֻלָּל֙ מְאֹ֔ד וְ/נוֹרָ֥א ה֖וּא עַל כָּל אֱלֹהִֽים־־׃
translation:
  text: For Yahweh is great and greatly to be praised, and he is to be feared above all gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'awesome.' The Hebrew means inspiring awe and reverent fear; 'to be feared' preserves that force more clearly in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the surrounding call to worship. 'For' fits the discourse flow in English and preserves the explanatory force without over-specifying causation.
- source_word: גָדוֹל
  chosen: great
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: The adjective denotes greatness in status and majesty. 'Great' is the most direct and idiomatic rendering here and pairs naturally with the following praise clause.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְהֻלָּל
  chosen: to be praised
  alternatives:
  - praised
  - worthy of praise
  lexicon: HALOT
  rationale: The passive participial form conveys that the LORD is praiseworthy / is one who should be praised. 'To be praised' preserves the predicative force in natural English; 'worthy of praise' is interpretive and slightly more expansive.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very
  - exceedingly
  lexicon: HALOT
  rationale: Used adverbially to intensify the praise clause. 'Greatly' yields the established and natural English expression 'greatly to be praised' and reflects the strong intensification.
- source_word: נוֹרָא
  chosen: to be feared
  alternatives:
  - fearsome
  - awesome
  lexicon: HALOT
  rationale: From the root ירא, the term here speaks of inspiring reverent fear. 'To be feared' best preserves the verbal and theological force. 'Awesome' in contemporary English is too weakened; 'fearsome' can imply mere terror.
- source_word: עַל כָּל אֱלֹהִים
  chosen: above all gods
  alternatives:
  - more than all gods
  - over all gods
  lexicon: HALOT
  rationale: The preposition עַל in this context expresses superiority or exaltation over other so-called gods. 'Above all gods' is concise and idiomatic, preserving the comparative sense.
- source_word: אֱלֹהִים
  chosen: gods
  alternatives:
  - divine beings
  lexicon: HALOT
  rationale: In this context the plural refers to the gods of the nations, not to the singular God of Israel. 'Gods' is the plain lexical sense and matches the polemical contrast in the surrounding context.
