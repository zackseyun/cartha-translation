theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of נוֹרָא in relation to God
  chosen_reading: he is to be feared
  alternative_readings:
  - he is awesome
  - he is fearsome
  rationale: The Hebrew emphasizes that God evokes reverent fear and awe. 'To be feared' preserves this theological weight without reducing it to modern colloquial 'awesome' or shifting toward sheer terror.
  doctrine_reference: DOCTRINE.md Translation philosophy §6 (readable modern English without flattening theological weight)
