theological_decisions:
- issue: Rendering מְשִׁיחָי in a non-messianic plural context
  chosen_reading: my anointed ones
  alternative_readings:
  - my anointed
  - my messiahs
  rationale: Although the Hebrew term is cognate with 'Messiah,' this verse refers
    broadly to those anointed by God rather than to the singular eschatological Messiah.
    To avoid importing christological specificity the text does not assert, the plural
    common-noun sense is used.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; preserve
    source meaning without importing doctrinal claims the text does not make.'
