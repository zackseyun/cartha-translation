id: 1CH.16.22
reference: 1 Chronicles 16:22
source:
  edition: WLC
  text: אַֽל תִּגְּעוּ֙ בִּ/מְשִׁיחָ֔/י וּ/בִ/נְבִיאַ֖/י אַל תָּרֵֽעוּ־־׃פ
translation:
  text: Do not touch my anointed ones, and do not harm my prophets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my anointed'; literally, 'my anointed ones.' The Hebrew term is related
      to 'Messiah,' but here it refers more broadly to those anointed by God, not
      specifically to the Messiah.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּגְּעוּ
  chosen: touch
  alternatives:
  - strike
  - lay a hand on
  lexicon: HALOT
  rationale: נגע commonly means 'touch' or 'reach/touch upon.' In this prohibitive
    context, 'touch' is the most direct and idiomatic rendering, while also carrying
    the sense of hostile contact implied by the parallel prohibition against harming.
- source_word: בִּמְשִׁיחָי
  chosen: my anointed ones
  alternatives:
  - my anointed
  - my messiahs
  lexicon: HALOT
  rationale: 'מָשִׁיחַ means ''anointed one.'' The plural with 1cs suffix is best
    rendered explicitly as plural in English: ''my anointed ones.'' ''Messiahs'' would
    be formally possible but is misleading in English because it suggests the unique
    messianic title rather than those consecrated by God in a broader sense.'
- source_word: וּבִנְבִיאַי
  chosen: my prophets
  lexicon: HALOT
  rationale: נָבִיא is straightforwardly 'prophet.' The plural construct with 1cs
    suffix yields 'my prophets.'
- source_word: תָּרֵעוּ
  chosen: harm
  alternatives:
  - do evil to
  - injure
  - mistreat
  lexicon: HALOT
  rationale: From רעע in the Hiphil/jussive prohibition, the sense is to do harm or
    evil to someone. 'Harm' is concise, natural English and fits the parallelism with
    'touch' without over-specifying the kind of injury.
- source_word: אַל
  chosen: Do not
  alternatives:
  - Never
  lexicon: HALOT
  rationale: אַל with the following imperfect forms marks prohibition. 'Do not' is
    the standard and most transparent English equivalent.
