id: 1CH.16.43
reference: 1 Chronicles 16:43
source:
  edition: WLC
  text: וַ/יֵּלְכ֥וּ כָל הָ/עָ֖ם אִ֣ישׁ לְ/בֵית֑/וֹ וַ/יִּסֹּ֥ב דָּוִ֖יד לְ/בָרֵ֥ךְ
    אֶת בֵּיתֽ/וֹ־־׃פ
translation:
  text: Then all the people went, each man to his house, and David turned to bless
    his household.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his house.' The Hebrew word can refer either to the physical house or
      to the household/family associated with it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: went
  alternatives:
  - departed
  lexicon: HALOT
  rationale: Wayyiqtol of הלך marks the next narrative action. 'Went' is the plain,
    natural English rendering; 'departed' is possible but slightly more formal than
    the context requires.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - all the assembly
  lexicon: HALOT
  rationale: עם commonly means 'people.' In this narrative conclusion it refers to
    the gathered populace. 'Assembly' is possible in cultic contexts, but 'people'
    better matches the ordinary sense here.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - everyone
  lexicon: HALOT
  rationale: The distributive use of אִישׁ after 'all the people' means 'each' individually.
    Per the gender-accurate philosophy, the masculine form is preserved as 'each man'
    rather than neutralizing to 'each one,' while the sense remains distributive.
- source_word: לְבֵיתוֹ
  chosen: to his house
  alternatives:
  - to his home
  lexicon: HALOT
  rationale: בַּיִת in this construction denotes one's dwelling. 'House' is the more
    direct and consistent gloss; 'home' is smoother but slightly more interpretive.
- source_word: וַיִּסֹּב
  chosen: turned
  alternatives:
  - went around
  - returned
  lexicon: HALOT
  rationale: From סבב, here idiomatically indicating David's change of direction or
    turning aside from the public gathering toward his own house. 'Turned' is concise
    and idiomatic in English. 'Returned' is interpretive and less directly tied to
    the verb's core sense.
- source_word: לְבָרֵךְ
  chosen: to bless
  alternatives:
  - to pronounce a blessing on
  lexicon: HALOT
  rationale: ברך in the infinitive expresses purpose. 'To bless' is the standard rendering
    and preserves the theological and relational weight without expansion.
- source_word: בֵּיתוֹ
  chosen: his household
  alternatives:
  - his house
  - his family
  lexicon: HALOT
  rationale: Here בַּיִת likely refers not merely to the building but to David's domestic
    sphere—those of his house. 'Household' best captures that likely sense in context,
    while still reflecting the Hebrew term.
