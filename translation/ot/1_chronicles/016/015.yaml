id: 1CH.16.15
reference: 1 Chronicles 16:15
source:
  edition: WLC
  text: זִכְר֤וּ לְ/עוֹלָם֙ בְּרִית֔/וֹ דָּבָ֥ר צִוָּ֖ה לְ/אֶ֥לֶף דּֽוֹר׃
translation:
  text: Remember his covenant forever, the word he commanded for a thousand generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the promise he commanded for a thousand generations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִכְרוּ
  chosen: Remember
  alternatives:
  - Remember!
  - Call to mind
  lexicon: HALOT
  rationale: Qal imperative masculine plural from זכר, addressed to the community.
    English imperative 'Remember' best preserves the direct exhortation without adding
    emphasis beyond the Hebrew.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - continually
  lexicon: HALOT
  rationale: The phrase means 'for eternity/perpetually.' 'Forever' is natural modern
    English and fits the exhortational context.
- source_word: בְּרִיתוֹ
  chosen: his covenant
  alternatives:
  - his treaty
  - his pact
  lexicon: HALOT
  rationale: בְּרִית commonly denotes covenant, especially in theological contexts
    involving God's binding commitments. 'His covenant' is the standard and most theologically
    appropriate rendering here.
- source_word: דָּבָר
  chosen: the word
  alternatives:
  - the promise
  - the matter
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or by extension 'promise.' In parallel
    with 'his covenant' and followed by 'he commanded,' 'the word' preserves the Hebrew
    lexeme while allowing the covenantal sense to be heard. 'Promise' is interpretive
    and therefore kept as an alternative rather than the main text.
- source_word: צִוָּה
  chosen: he commanded
  alternatives:
  - he ordained
  - he established
  lexicon: HALOT
  rationale: The verb צוה ordinarily means 'command.' Although some English versions
    smooth this to 'ordained' in context, 'he commanded' is the plain lexical sense
    and preserves the force of divine decree.
- source_word: לְאֶלֶף דּוֹר
  chosen: for a thousand generations
  alternatives:
  - to a thousand generations
  - through a thousand generations
  lexicon: HALOT
  rationale: This phrase expresses enduring duration across generations. 'For a thousand
    generations' is idiomatic English and reflects the lamed of extent/duration without
    overinterpreting whether the number is strictly literal or idiomatic.
