theological_decisions:
- issue: Whether to render דָּבָר as 'word' or the more interpretive 'promise' in
    covenantal parallelism
  chosen_reading: the word
  alternative_readings:
  - the promise
  rationale: The Hebrew lexeme is broader than 'promise,' and the translation philosophy
    prioritizes original-language primacy over inherited smoothing. Because the covenantal
    context may suggest 'promise' to readers, that alternative is preserved in a footnote
    rather than adopted in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
