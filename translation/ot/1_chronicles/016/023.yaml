id: 1CH.16.23
reference: 1 Chronicles 16:23
source:
  edition: WLC
  text: שִׁ֤ירוּ לַֽ/יהוָה֙ כָּל הָ/אָ֔רֶץ בַּשְּׂר֥וּ מִ/יּֽוֹם אֶל י֖וֹם יְשׁוּעָתֽ/וֹ־־־׃
translation:
  text: Sing to Yahweh, all the earth; proclaim his salvation from day to day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to Yahweh.'' The divine name יְהוָה is rendered ''the LORD'' in keeping with the project''s default practice.'
    reason: alternative_reading
  - marker: b
    text: Or 'announce good news of his salvation day after day.' The verb carries the sense of bringing or proclaiming good news.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁירוּ
  chosen: Sing
  alternatives:
  - sing praise
  - sing out
  lexicon: HALOT
  rationale: Imperative plural of שׁיר, straightforward call to sing. 'Sing' is the most direct and natural English equivalent without adding interpretive material such as 'praise.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered 'the LORD' per doctrine default for YHWH, following established reverential convention and the pattern reflected in many English translations.
- source_word: כָּל הָאָרֶץ
  chosen: all the earth
  alternatives:
  - all the land
  - the whole earth
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth'; in this hymnic summons to universal praise, the global sense 'earth' best fits. 'All the earth' preserves the Hebrew idiom and scope.
- source_word: בַּשְּׂרוּ
  chosen: proclaim
  alternatives:
  - announce good news
  - declare glad tidings
  - bear news
  lexicon: HALOT
  rationale: Piel imperative of בשׂר carries the sense of announcing good news. 'Proclaim' is concise, idiomatic, and suits the poetic parallelism; the more explicit 'announce good news' is a viable alternative but slightly heavier in English.
- source_word: מִיּוֹם אֶל יוֹם
  chosen: from day to day
  alternatives:
  - day after day
  - from one day to another
  lexicon: HALOT
  rationale: This Hebrew expression denotes continual or daily repetition. 'From day to day' preserves the form and poetic cadence of the source.
- source_word: יְשׁוּעָתוֹ
  chosen: his salvation
  alternatives:
  - his deliverance
  - his victory
  lexicon: HALOT
  rationale: יְשׁוּעָה commonly denotes salvation or deliverance. 'His salvation' is the broadest and most theologically resonant rendering here, while still fitting the immediate context of public proclamation.
