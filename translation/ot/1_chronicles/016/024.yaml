theological_decisions:
- issue: Reference of the pronominal suffixes ('his')
  chosen_reading: The verse refers to the God of Israel, whose glory and wondrous
    deeds are to be proclaimed universally.
  rationale: In the immediate context of 1 Chronicles 16, the object of praise is
    the LORD. The English retains the pronoun 'his' as in the Hebrew, without importing
    additional doctrinal elaboration.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
