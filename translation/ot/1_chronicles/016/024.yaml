id: 1CH.16.24
reference: 1 Chronicles 16:24
source:
  edition: WLC
  text: סַפְּר֤וּ בַ/גּוֹיִם֙ אֶת כְּבוֹד֔/וֹ בְּ/כָל הָ/עַמִּ֖ים נִפְלְאֹתָֽי/ו־־׃
translation:
  text: Declare his glory among the nations, his wondrous deeds among all the peoples.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: סַפְּרוּ
  chosen: Declare
  alternatives:
  - Tell
  - Recount
  - Proclaim
  lexicon: HALOT
  rationale: Imperative plural of ספר, calling for verbal announcement. 'Declare'
    preserves the public, proclamatory sense better than the more casual 'tell,' while
    remaining natural English.
- source_word: בַגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - to the nations
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations.' In this psalmic/chronicles praise context
    it refers broadly to the peoples outside Israel, not specifically 'Gentiles' in
    a later technical sense. 'Among' matches the preposition ב in context.
- source_word: כְּבוֹדוֹ
  chosen: his glory
  alternatives:
  - his honor
  - his splendor
  lexicon: HALOT
  rationale: כָּבוֹד here denotes the manifested weight, honor, and splendor of God.
    'Glory' is the standard and most theologically resonant English rendering.
- source_word: בְּכָל־הָעַמִּים
  chosen: among all the peoples
  alternatives:
  - among all the nations
  - among all peoples
  lexicon: HALOT
  rationale: עַמִּים is best rendered 'peoples,' distinguishing it from the earlier
    גּוֹיִם and preserving the poetic parallelism. 'Among' again reflects ב.
- source_word: נִפְלְאֹתָיו
  chosen: his wondrous deeds
  alternatives:
  - his wonders
  - his marvelous works
  lexicon: HALOT
  rationale: From פלא, referring to extraordinary acts that evoke wonder. 'Wondrous
    deeds' communicates both the marvelous quality and the concrete acts in view.
