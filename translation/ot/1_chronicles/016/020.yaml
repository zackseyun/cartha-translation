id: 1CH.16.20
reference: 1 Chronicles 16:20
source:
  edition: WLC
  text: וַ/יִּֽתְהַלְּכוּ֙ מִ/גּ֣וֹי אֶל גּ֔וֹי וּ/מִ/מַּמְלָכָ֖ה אֶל עַ֥ם אַחֵֽר־־׃
translation:
  text: And they went about from nation to nation, and from one kingdom to another
    people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they wandered from nation to nation, and from one kingdom to another
      people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְהַלְּכוּ
  chosen: they went about
  alternatives:
  - they wandered
  - they moved about
  - they went from place to place
  lexicon: HALOT
  rationale: Hitpael of הלך here conveys movement about or from place to place, not
    merely a single act of going. 'Went about' preserves the iterative/distributive
    sense in readable English and fits the following 'from...to...' phrases.
- source_word: מִגּוֹי אֶל גּוֹי
  chosen: from nation to nation
  alternatives:
  - from one nation to another
  - from people to people
  lexicon: HALOT
  rationale: גּוֹי commonly means 'nation.' The idiom 'from nation to nation' is natural
    English and preserves the Hebrew repetition. 'People' is possible lexically but
    less precise here because the parallel line distinguishes מַמְלָכָה and עַם.
- source_word: וּמִמַּמְלָכָה
  chosen: and from one kingdom
  alternatives:
  - and from kingdom
  - and from a kingdom
  lexicon: HALOT
  rationale: מַמְלָכָה means 'kingdom.' Supplying 'one' in English clarifies the distributive
    sense implied by the parallel structure, even though the numeral is not explicit
    in Hebrew.
- source_word: אֶל עַם אַחֵר
  chosen: to another people
  alternatives:
  - to another nation
  - to a different people
  lexicon: HALOT
  rationale: עַם is best rendered 'people' here, with אַחֵר as 'another.' This preserves
    the lexical distinction from גּוֹי earlier in the verse while remaining idiomatic.
