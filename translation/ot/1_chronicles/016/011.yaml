id: 1CH.16.11
reference: 1 Chronicles 16:11
source:
  edition: WLC
  text: דִּרְשׁ֤וּ יְהוָה֙ וְ/עֻזּ֔/וֹ בַּקְּשׁ֥וּ פָנָ֖י/ו תָּמִֽיד׃
translation:
  text: Seek Yahweh and his strength; seek his face continually.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his presence' (literally, 'his face').
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּרְשׁוּ
  chosen: Seek
  alternatives:
  - Inquire of
  - Consult
  lexicon: HALOT
  rationale: דרש in the imperative commonly calls for actively turning to or pursuing God, not merely asking questions. 'Seek' is the established and plain English equivalent in this devotional-exhortative context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְעֻזּוֹ
  chosen: and his strength
  alternatives:
  - and his might
  - and his stronghold
  lexicon: HALOT
  rationale: עֹז most often denotes strength or might. 'His strength' is the most direct rendering here. While some contexts can shade toward 'stronghold,' the parallel with seeking God's face favors the sense of divine power/presence rather than a place of refuge.
- source_word: בַּקְּשׁוּ
  chosen: seek
  alternatives:
  - look for
  - strive after
  lexicon: HALOT
  rationale: בקש overlaps with דרש but often emphasizes earnest pursuit. Rendering both as 'seek' preserves the poetic parallelism and imperative force without over-differentiating beyond what the English can naturally bear.
- source_word: פָנָיו
  chosen: his face
  alternatives:
  - his presence
  lexicon: HALOT
  rationale: Literally 'his face.' This idiom often conveys personal presence, but the concrete expression should be preserved in the main text because it is both intelligible in English and theologically evocative. The more interpretive 'his presence' is preserved in a footnote.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - always
  - constantly
  lexicon: HALOT
  rationale: תמיד denotes ongoing regularity or constancy. 'Continually' fits the exhortational tone and reads naturally in modern English.
