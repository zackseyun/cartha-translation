id: 1CH.16.12
reference: 1 Chronicles 16:12
source:
  edition: WLC
  text: זִכְר֗וּ נִפְלְאֹתָי/ו֙ אֲשֶׁ֣ר עָשָׂ֔ה מֹפְתָ֖י/ו וּ/מִשְׁפְּטֵי פִֽי/הוּ־׃
translation:
  text: Remember his wondrous deeds that he has done, his signs, and the judgments
    of his mouth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his wonders' for 'his wondrous deeds.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his portents' for 'his signs.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the ordinances/decrees of his mouth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִכְרוּ
  chosen: Remember
  alternatives:
  - Call to mind
  - Recall
  lexicon: HALOT
  rationale: Imperative plural from זכר, calling the audience to active remembrance.
    'Remember' is the standard, natural English imperative and preserves the exhortational
    force.
- source_word: נִפְלְאֹתָיו
  chosen: his wondrous deeds
  alternatives:
  - his wonders
  - his marvelous works
  lexicon: HALOT
  rationale: From פלאות, referring to extraordinary acts that evoke wonder. 'Wondrous
    deeds' preserves both the sense of marvel and the fact that these are acts performed
    by God, not abstract 'wonders' alone.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he has done
  alternatives:
  - which he did
  - that he did
  lexicon: HALOT
  rationale: Relative clause specifying the wondrous deeds. Present perfect English
    ('has done') reads naturally in exhortational remembrance contexts while remaining
    faithful to the completed action.
- source_word: מֹפְתָיו
  chosen: his signs
  alternatives:
  - his wonders
  - his miracles
  - his portents
  lexicon: HALOT
  rationale: מופת often denotes signs/portents that attest divine power. 'Signs' is
    concise and accessible; 'portents' is possible but less natural in contemporary
    English, and 'miracles' can over-specify the nuance.
- source_word: וּמִשְׁפְּטֵי פִיהוּ
  chosen: and the judgments of his mouth
  alternatives:
  - and the judgments he has spoken
  - and the ordinances from his mouth
  - and the decrees of his mouth
  lexicon: HALOT
  rationale: משפטים can mean judgments, ordinances, or decrees. The construct with
    'his mouth' points to spoken judicial pronouncements. 'Judgments of his mouth'
    preserves the vivid Hebrew expression and allows both judicial and decretive nuance.
