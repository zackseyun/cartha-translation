theological_decisions:
- issue: Rendering of divine acts terminology in parallelism
  chosen_reading: 'Different English terms are preserved for פלאות and מופתים: ''wondrous
    deeds'' and ''signs.'''
  alternative_readings:
  - '''wonders'' and ''miracles'''
  - '''marvels'' and ''portents'''
  rationale: The Hebrew uses two related but distinct terms in poetic parallelism.
    Rendering them with differentiated English preserves the texture of the verse
    without collapsing the semantic range into a single repeated gloss.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
