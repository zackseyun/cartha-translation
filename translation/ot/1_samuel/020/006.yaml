id: 1SA.20.6
reference: 1 Samuel 20:6
source:
  edition: WLC
  text: אִם פָּקֹ֥ד יִפְקְדֵ֖/נִי אָבִ֑י/ךָ וְ/אָמַרְתָּ֗ נִשְׁאֹל֩ נִשְׁאַ֨ל מִמֶּ֤/נִּי
    דָוִד֙ לָ/רוּץ֙ בֵּֽית לֶ֣חֶם עִיר֔/וֹ כִּ֣י זֶ֧בַח הַ/יָּמִ֛ים שָׁ֖ם לְ/כָל הַ/מִּשְׁפָּחָֽה־־־׃
translation:
  text: If your father definitely notices me, then say, ‘David earnestly asked leave
    of me to run to Bethlehem, his city, because the yearly sacrifice is there for
    the whole family.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If your father surely misses me.' The Hebrew uses an infinitive absolute
      with a finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'David urgently asked permission from me.' The Hebrew likewise uses an
      infinitive absolute with a finite verb for emphasis.
    reason: lexical_alternative
  - marker: c
    text: Literally 'to run to Bethlehem'; the sense is to go there quickly.
    reason: lexical_alternative
  - marker: d
    text: Or 'the annual sacrifice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּקֹד יִפְקְדֵנִי
  chosen: definitely notices me
  alternatives:
  - surely misses me
  - certainly takes note of me
  - indeed calls me to account
  lexicon: HALOT
  rationale: The infinitive absolute + imperfect of פקד intensifies the verb. In this
    context Saul is expected to observe David's absence at table, so 'definitely notices
    me' captures both the emphasis and the situational sense better than a wooden
    'visits me' or a narrower 'misses me.'
- source_word: אָבִיךָ
  chosen: your father
  lexicon: HALOT
  rationale: Direct, literal rendering of the construct with 2ms suffix, addressed
    by David to Jonathan.
- source_word: נִשְׁאֹל נִשְׁאַל
  chosen: earnestly asked leave
  alternatives:
  - repeatedly asked
  - earnestly requested
  - asked permission
  lexicon: HALOT
  rationale: 'The Niphal infinitive absolute + finite verb of שאל gives emphatic force:
    David ''earnestly'' or ''urgently'' asked. Because the request concerns departure,
    ''asked leave'' idiomatically conveys asking permission without over-paraphrasing.'
- source_word: מִמֶּנִּי
  chosen: of me
  alternatives:
  - from me
  lexicon: HALOT
  rationale: With שאל in this construction, English idiom prefers 'asked ... of me'
    or 'asked permission from me.' 'Of me' keeps the phrasing compact and natural.
- source_word: לָרוּץ
  chosen: to run
  alternatives:
  - to hurry
  - to go quickly
  lexicon: HALOT
  rationale: The verb is literally 'to run.' In context it conveys haste in going
    to Bethlehem. The main text preserves the concrete imagery rather than smoothing
    it to 'go,' though the sense includes urgency.
- source_word: בֵּית לֶחֶם עִירוֹ
  chosen: Bethlehem, his city
  alternatives:
  - Bethlehem, his hometown
  lexicon: HALOT
  rationale: Literal rendering of the place name plus apposition. 'His city' reflects
    the Hebrew directly; 'hometown' is a possible dynamic alternative but less formal.
- source_word: זֶבַח הַיָּמִים
  chosen: the yearly sacrifice
  alternatives:
  - the annual sacrifice
  - a family sacrifice at the appointed time
  lexicon: HALOT
  rationale: The phrase denotes a recurring sacrifice associated with the days/annual
    cycle. 'Yearly sacrifice' is a clear idiomatic rendering in context and matches
    the family observance implied by the next clause.
- source_word: לְכָל הַמִּשְׁפָּחָה
  chosen: for the whole family
  alternatives:
  - for all the clan
  - for the entire family group
  lexicon: HALOT
  rationale: מִשְׁפָּחָה can mean family or clan. Here the domestic setting in Bethlehem
    supports 'family,' while 'whole' reflects כָל.
