theological_decisions:
- issue: Meaning of the elliptical clause 'and the LORD sought from the hand of David’s enemies'
  chosen_reading: The clause is rendered as the LORD requiring accountability/vengeance in relation to the covenant, expressed as 'the LORD sought it from the hand of David’s enemies.'
  alternative_readings:
  - the LORD sought out David’s enemies
  - may the LORD require it at the hand of David’s enemies
  rationale: The Hebrew lacks an explicit object, creating ambiguity. The chosen rendering preserves the MT wording and its ellipsis while making minimal implicit sense in English by supplying 'it.' This avoids turning the clause into a full paraphrase such as 'may the LORD take vengeance,' yet still communicates that the LORD is the one enforcing or requiring something against David’s enemies. Because the ambiguity is genuine, alternatives are preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
