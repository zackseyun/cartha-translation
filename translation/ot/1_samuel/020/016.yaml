id: 1SA.20.16
reference: 1 Samuel 20:16
source:
  edition: WLC
  text: וַ/יִּכְרֹ֥ת יְהוֹנָתָ֖ן עִם בֵּ֣ית דָּוִ֑ד וּ/בִקֵּ֣שׁ יְהוָ֔ה מִ/יַּ֖ד אֹיְבֵ֥י דָוִֽד־׃
translation:
  text: So Jonathan made a covenant with the house of David, and Yahweh required it at the hand of David’s enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and the LORD required it at the hand of David’s enemies'; the Hebrew leaves the object unstated, likely referring to covenant accountability or vengeance.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכְרֹת
  chosen: made a covenant
  alternatives:
  - cut a covenant
  - made an agreement
  lexicon: HALOT
  rationale: כרת with בְּרִית is the standard idiom 'cut/make a covenant.' Since בְּרִית is not repeated here but implied from the surrounding context, 'made a covenant' brings the idiom into natural English while preserving the covenantal sense.
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  rationale: Standard English transliteration of the personal name.
- source_word: עִם בֵּית דָּוִד
  chosen: with the house of David
  alternatives:
  - with David’s house
  - with David’s family
  lexicon: HALOT
  rationale: בֵּית דָּוִד is a dynastic/household expression. 'House of David' preserves the formal and potentially dynastic sense better than the flatter 'family of David.'
- source_word: וּבִקֵּשׁ
  chosen: sought it
  alternatives:
  - required it
  - called for it
  - sought
  lexicon: HALOT
  rationale: 'בקש commonly means ''seek.'' In this context the object is unstated but naturally understood from the covenant/oath context: the LORD would seek or require accountability. Adding ''it'' makes the English intelligible without over-specifying beyond the Hebrew ellipsis.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - at the hand of
  - from
  lexicon: HALOT
  rationale: This idiom often denotes agency or power. 'From the hand of' preserves the Hebrew imagery and is still readable in English.
- source_word: אֹיְבֵי דָוִד
  chosen: David’s enemies
  alternatives:
  - the enemies of David
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English; possessive form is concise and clear.
