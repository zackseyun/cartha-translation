theological_decisions:
- issue: Implied negation in Jonathan's oath
  chosen_reading: The main text supplies the implied sense 'and I do not disclose it to you' within the oath formula.
  alternative_readings:
  - 'A more literal rendering could omit the negation: ''if my father intends evil against you, then I will disclose it to you...'''
  rationale: The Hebrew oath formula leaves the apodosis compressed. In context Jonathan is swearing that if Saul intends harm, he will certainly warn David; the curse falls on Jonathan if he fails to do so. Supplying the implied negation makes the oath intelligible in English while preserving the intended meaning.
  doctrine_reference: Translation philosophy §1, §3, §6
