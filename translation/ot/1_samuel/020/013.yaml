id: 1SA.20.13
reference: 1 Samuel 20:13
source:
  edition: WLC
  text: כֹּֽה יַעֲשֶׂה֩ יְהוָ֨ה לִֽ/יהוֹנָתָ֜ן וְ/כֹ֣ה יֹסִ֗יף כִּֽי יֵיטִ֨ב אֶל אָבִ֤/י אֶת הָֽ/רָעָה֙ עָלֶ֔י/ךָ וְ/גָלִ֨יתִי֙ אֶת אָזְנֶ֔/ךָ וְ/שִׁלַּחְתִּ֖י/ךָ וְ/הָלַכְתָּ֣ לְ/שָׁל֑וֹם וִ/יהִ֤י יְהוָה֙ עִמָּ֔/ךְ כַּ/אֲשֶׁ֥ר הָיָ֖ה עִם אָבִֽ/י־־־־־־׃
translation:
  text: May Yahweh do so to Jonathan, and more also, if my father intends evil against you and I do not disclose it to you and send you away, so that you may go in peace. And may Yahweh be with you, as he has been with my father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'uncover your ear,' an idiom meaning 'inform you' or 'disclose it to you.'
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'if it is good to my father [to do] the evil against you,' that is, 'if my father is pleased/intends to harm you.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and I do not disclose it to you and send you away'.
    reason: previous_rendering
lexical_decisions:
- source_word: כֹּה יַעֲשֶׂה יְהוָה לִיהוֹנָתָן וְכֹה יֹסִיף
  chosen: May the LORD do so to Jonathan, and more also
  alternatives:
  - Thus may the LORD do to Jonathan, and thus may he add
  - May the LORD do this to Jonathan and even more
  lexicon: HALOT
  rationale: This is a standard oath/curse formula. English idiom is best preserved with 'May the LORD do so ... and more also,' which communicates the imprecatory force without woodenly repeating 'thus.' 'Jonathan' is retained in the third person because the Hebrew uses לִיהוֹנָתָן rather than a first-person pronoun.
- source_word: יֵיטִב אֶל אָבִי אֶת הָרָעָה עָלֶיךָ
  chosen: if my father intends evil against you
  alternatives:
  - if it seems good to my father to do you harm
  - if my father is pleased to bring evil upon you
  lexicon: HALOT
  rationale: The clause is elliptical and idiomatic. Literally, 'if it is good to my father the evil against you' means if Saul is favorably disposed toward doing harm to David. 'Intends evil against you' captures the sense in natural English without over-paraphrasing.
- source_word: וְגָלִיתִי אֶת אָזְנֶךָ
  chosen: and I do not disclose it to you
  alternatives:
  - and uncover your ear
  - and reveal it in your hearing
  lexicon: HALOT
  rationale: 'The idiom ''uncover the ear'' means to inform or disclose. Because the oath implies a curse if Jonathan fails to act, English requires the implied negation: the sense is ''if ... and I do not disclose it to you.'' The object ''it'' is supplied from context (the intended evil).'
- source_word: וְשִׁלַּחְתִּיךָ
  chosen: and send you away
  alternatives:
  - and let you go
  - and dismiss you
  lexicon: HALOT
  rationale: Jonathan promises active assistance in David's departure. 'Send you away' preserves the causative nuance better than simply 'let you go.'
- source_word: וְהָלַכְתָּ לְשָׁלוֹם
  chosen: so that you may go in peace
  alternatives:
  - and you may go in peace
  - and go safely
  lexicon: HALOT
  rationale: The sequence expresses purpose/result following Jonathan's warning and release. 'Go in peace' is a standard Hebrew expression; 'so that you may' makes the flow clear in English.
- source_word: וִיהִי יְהוָה עִמָּךְ
  chosen: And may the LORD be with you
  alternatives:
  - And the LORD be with you
  lexicon: HALOT
  rationale: Jussive force is best represented by 'may.' YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: כַּאֲשֶׁר הָיָה עִם אָבִי
  chosen: as he has been with my father
  alternatives:
  - as he was with my father
  lexicon: HALOT
  rationale: The perfect can be rendered as a past state with present relevance. 'Has been' fits Jonathan's comparison between the LORD's prior support of Saul and his wish for David.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
