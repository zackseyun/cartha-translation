  from: and I do not disclose it to you and send you away
  to: and I fail to disclose it to you and send you away
  rationale: The current phrasing, 'and I do not disclose... and send...', is ungrammatical or at least highly awkward. The intended meaning is that the curse applies if Jonathan fails to perform the sequence of actions (disclosing and sending). The suggested rewrite using 'fail to' correctly negates the entire sequence of promised actions in clear, idiomatic English, while respecting the drafter's defensible decision (noted in the theological decisions) to make the implied negation explicit.
