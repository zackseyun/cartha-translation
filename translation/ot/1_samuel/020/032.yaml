id: 1SA.20.32
reference: 1 Samuel 20:32
source:
  edition: WLC
  text: וַ/יַּ֨עַן֙ יְה֣וֹנָתָ֔ן אֶת שָׁא֖וּל אָבִ֑י/ו וַ/יֹּ֧אמֶר אֵלָ֛י/ו לָ֥/מָּה
    יוּמַ֖ת מֶ֥ה עָשָֽׂה־׃
translation:
  text: Jonathan answered Saul his father and said to him, “Why should he be put to
    death? What has he done?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Why must he be killed?” The Hebrew verb specifically carries the sense
      of being put to death, not merely dying.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: ענה in this narrative formula commonly means 'answer/respond.' 'Answered'
    preserves the conventional dialogical sense and fits the following direct speech.
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אֶת שָׁאוּל אָבִיו
  chosen: Saul his father
  alternatives:
  - his father Saul
  lexicon: HALOT
  rationale: The object marker plus apposition identifies the addressee as Saul, further
    specified as Jonathan's father. 'Saul his father' follows Hebrew order more closely
    while remaining natural English.
- source_word: וַיֹּאמֶר אֵלָיו
  chosen: and said to him
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The indirect object is explicit in Hebrew and is retained for transparency,
    even though English could omit it.
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative best represented by simple modern English 'Why.'
- source_word: יוּמַת
  chosen: should he be put to death
  alternatives:
  - should he die
  - must he be killed
  lexicon: HALOT
  rationale: 'The form is Hophal imperfect of מות, a causative/passive sense: ''be
    put to death'' rather than merely ''die.'' ''Should'' conveys the deliberative/jussive
    force in context.'
- source_word: מֶה עָשָׂה
  chosen: What has he done?
  alternatives:
  - What did he do?
  lexicon: HALOT
  rationale: This idiom asks what offense has been committed. Present perfect in English
    naturally conveys a completed act with present relevance in the accusation context.
