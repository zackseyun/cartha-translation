id: 1SA.20.38
reference: 1 Samuel 20:38
source:
  edition: WLC
  text: וַ/יִּקְרָ֤א יְהֽוֹנָתָן֙ אַחֲרֵ֣י הַ/נַּ֔עַר מְהֵרָ֥ה ח֖וּשָׁ/ה אַֽל תַּעֲמֹ֑ד
    וַ/יְלַקֵּ֞ט נַ֤עַר יְהֽוֹנָתָן֙ אֶת ה/חצי וַ/יָּבֹ֖א אֶל אֲדֹנָֽי/ו־־־׃
translation:
  text: And Jonathan called after the boy, “Hurry! Be quick! Do not stop!” So Jonathan’s
    boy gathered up the arrows and came to his master.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “Do not stand.” The sense in context is “Do not stop.”
    reason: lexical_alternative
  - marker: b
    text: The Hebrew form for “arrows” is written in a way that can appear singular,
      but the context clearly refers to the arrows Jonathan had shot.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - cried out
  - shouted
  lexicon: HALOT
  rationale: The verb קרא in this narrative context denotes calling out loudly after
    someone. 'Called' is natural English and sufficient; the following direct speech
    conveys urgency without requiring the stronger 'shouted' in the main text.
- source_word: אַחֲרֵי הַנַּעַר
  chosen: after the boy
  alternatives:
  - to the boy behind him
  - after the servant
  lexicon: HALOT
  rationale: אַחֲרֵי with קרא idiomatically means calling after someone. נַעַר here
    is a youthful attendant; 'boy' preserves the age/status nuance better than the
    more formal 'servant,' though his servant role is clear from context.
- source_word: מְהֵרָה
  chosen: Hurry!
  alternatives:
  - Quickly!
  - Make haste!
  lexicon: HALOT
  rationale: An adverb used as an urgent command in direct speech. 'Hurry!' is idiomatic
    modern English and preserves the imperative force.
- source_word: חוּשָׁה
  chosen: Be quick!
  alternatives:
  - Hasten!
  - Quick!
  lexicon: HALOT
  rationale: From חושׁ, an urgent command to act swiftly. Rendering it separately
    from מְהֵרָה preserves the Hebrew's doubled urgency rather than collapsing the
    two terms into one English expression.
- source_word: אַל תַּעֲמֹד
  chosen: Do not stop!
  alternatives:
  - Do not stand still!
  - Do not stay there!
  lexicon: HALOT
  rationale: Though literally 'do not stand,' in context Jonathan is urging continued
    movement. 'Do not stop' best conveys the idiomatic sense in natural English.
- source_word: וַיְלַקֵּט
  chosen: gathered up
  alternatives:
  - collected
  - picked up
  lexicon: HALOT
  rationale: לקט often means gather/collect. 'Gathered up' fits the action of retrieving
    multiple arrows from the ground.
- source_word: נַעַר יְהוֹנָתָן
  chosen: Jonathan’s boy
  alternatives:
  - Jonathan’s servant
  - the boy of Jonathan
  lexicon: HALOT
  rationale: The construct phrase identifies the boy as belonging to Jonathan's household/service.
    'Jonathan’s boy' preserves the repeated נער vocabulary from the verse and sounds
    natural in narrative English.
- source_word: החצי
  chosen: the arrows
  alternatives:
  - the arrow-shafts
  - the missiles
  lexicon: HALOT
  rationale: Though the consonantal form appears singular in this orthography, the
    context and established sense here are collective/plural, referring to the arrows
    Jonathan had shot. English plural is required by the narrative sense.
- source_word: אֶל אֲדֹנָיו
  chosen: to his master
  alternatives:
  - to his lord
  lexicon: HALOT
  rationale: אָדוֹן with 3ms suffix refers to the boy's human superior, Jonathan.
    'Master' is the normal contextual rendering for a servant's superior; 'lord' would
    sound overly elevated in English and could create unwanted theological resonance.
