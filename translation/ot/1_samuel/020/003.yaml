id: 1SA.20.3
reference: 1 Samuel 20:3
source:
  edition: WLC
  text: וַ/יִּשָּׁבַ֨ע ע֜וֹד דָּוִ֗ד וַ/יֹּ֨אמֶר֙ יָדֹ֨עַ יָדַ֜ע אָבִ֗י/ךָ כִּֽי מָצָ֤אתִי חֵן֙ בְּ/עֵינֶ֔י/ךָ וַ/יֹּ֛אמֶר אַל יֵֽדַע זֹ֥את יְהוֹנָתָ֖ן פֶּן יֵֽעָצֵ֑ב וְ/אוּלָ֗ם חַי יְהוָה֙ וְ/חֵ֣י נַפְשֶׁ֔/ךָ כִּ֣י כְ/פֶ֔שַׂע בֵּינִ֖/י וּ/בֵ֥ין הַ/מָּֽוֶת־־־־־׃
translation:
  text: But David swore again and said, “Your father certainly knows that I have found favor in your eyes, and he has said, ‘Do not let Jonathan know this, lest he be grieved.’ But as Yahweh lives, and as your soul lives, there is but a step between me and death.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''there is but a step between me and death.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבַע עוֹד
  chosen: swore again
  alternatives:
  - continued to swear
  - swore further
  lexicon: HALOT
  rationale: The waw-consecutive verb with עוֹד indicates renewed or further oath-taking in the flow of dialogue. 'Swore again' is idiomatic modern English and preserves the sense that David intensifies his assertion with another oath.
- source_word: יָדֹעַ יָדַע
  chosen: certainly knows
  alternatives:
  - surely knows
  - knows full well
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies certainty. 'Certainly knows' preserves the emphatic force without sounding archaic.
- source_word: מָצָאתִי חֵן בְּעֵינֶיךָ
  chosen: I have found favor in your eyes
  alternatives:
  - I have found grace in your eyes
  - I am in your favor
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for receiving favor. 'Favor' is the most natural English equivalent here; retaining 'in your eyes' preserves the relational idiom rather than flattening it to mere approval.
- source_word: אַל יֵדַע זֹאת יְהוֹנָתָן
  chosen: Jonathan must not know this
  alternatives:
  - let Jonathan not know this
  - Jonathan should not know this
  lexicon: HALOT
  rationale: The negative particle with imperfect expresses Saul's stated intention or wish. 'Must not know' captures the force in natural English better than the more wooden 'let ... not know.'
- source_word: פֶּן יֵעָצֵב
  chosen: lest he be grieved
  alternatives:
  - or he will be distressed
  - lest he be pained
  lexicon: HALOT
  rationale: The Niphal of עצב conveys being hurt, pained, or grieved. 'Be grieved' fits the emotional context and works well after 'lest.'
- source_word: וְאוּלָם
  chosen: But
  alternatives:
  - however
  - nevertheless
  lexicon: HALOT
  rationale: The particle marks a strong contrast between Saul's concealment and David's solemn assertion of danger. 'But' is concise and natural in dialogue.
- source_word: חַי יְהוָה וְחֵי נַפְשֶׁךָ
  chosen: as the LORD lives, and as your soul lives
  alternatives:
  - by the life of the LORD and by your life
  - as surely as the LORD lives and you yourself live
  lexicon: HALOT
  rationale: This is a double oath formula. Per doctrine, יְהוָה is rendered 'the LORD.' 'Your soul lives' preserves the Hebrew idiom more closely than simply 'you live,' while remaining understandable.
- source_word: כְפֶשַׂע בֵּינִי וּבֵין הַמָּוֶת
  chosen: there is only a step between me and death
  alternatives:
  - there is but a step between me and death
  - I am one step away from death
  lexicon: HALOT
  rationale: פשע here denotes a step or pace, not transgression. 'Only a step between me and death' is the established sense and communicates imminent mortal danger clearly in modern English.
