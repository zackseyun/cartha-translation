theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of יִהְיֶה in the oath formula
  chosen_reading: May the LORD be between me and you
  alternative_readings:
  - The LORD will be between me and you
  rationale: The context is a solemn covenant invocation, so an optative/jussive sense is preferable in English. This preserves the relational and covenantal appeal to the LORD without importing a stronger interpretive gloss such as 'witness' into the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
