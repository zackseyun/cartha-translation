theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice in oath context. Following
    project doctrine, it is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of יִהְיֶה in the oath formula
  chosen_reading: May the LORD be between me and you
  alternative_readings:
  - The LORD will be between me and you
  rationale: The context is a solemn covenant invocation, so an optative/jussive sense
    is preferable in English. This preserves the relational and covenantal appeal
    to the LORD without importing a stronger interpretive gloss such as 'witness'
    into the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
