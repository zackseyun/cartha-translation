id: 1SA.20.42
reference: 1 Samuel 20:42
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר יְהוֹנָתָ֛ן לְ/דָוִ֖ד לֵ֣ךְ לְ/שָׁל֑וֹם אֲשֶׁר֩ נִשְׁבַּ֨עְנוּ
    שְׁנֵ֜י/נוּ אֲנַ֗חְנוּ בְּ/שֵׁ֤ם יְהוָה֙ לֵ/אמֹ֔ר יְהוָ֞ה יִֽהְיֶ֣ה בֵּינִ֣/י
    וּ/בֵינֶ֗/ךָ וּ/בֵ֥ין זַרְעִ֛/י וּ/בֵ֥ין זַרְעֲ/ךָ֖ עַד עוֹלָֽם׀־׃פ
translation:
  text: Jonathan said to David, “Go in peace, because the two of us have sworn in
    the name of the LORD, saying, ‘May the LORD be between me and you, and between
    my offspring and your offspring forever.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''The LORD will be between me and you.'' The Hebrew imperfect may be
      read as a simple future, though in this oath context it likely carries an invoked
      sense: ''May the LORD be.'''
    reason: alternative_reading
  - marker: b
    text: '''Between me and you'' implies the LORD as the one overseeing or witnessing
      the covenant between them.'
    reason: cultural_note
lexical_decisions:
- source_word: לֵךְ לְשָׁלוֹם
  chosen: Go in peace
  alternatives:
  - Go in safety
  - Go peacefully
  lexicon: HALOT
  rationale: Idiomatic dismissal/blessing formula. 'Go in peace' is natural English
    and preserves both the departure command and the covenantal goodwill implied by
    שָׁלוֹם.
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - that
  - as for what
  lexicon: HALOT
  rationale: 'Here אֲשֶׁר introduces the content/reason connected to Jonathan''s farewell.
    Rendering it as ''because'' best captures the sense in context: David may depart
    in peace on the basis of their oath.'
- source_word: נִשְׁבַּעְנוּ שְׁנֵינוּ אֲנַחְנוּ
  chosen: the two of us have sworn
  alternatives:
  - we both swore
  - we two have taken an oath
  lexicon: HALOT
  rationale: The combination of verb plus emphatic pronouns/numeral stresses mutuality.
    'The two of us have sworn' preserves that emphasis in idiomatic English.
- source_word: בְּשֵׁם יְהוָה
  chosen: in the name of the LORD
  alternatives:
  - by the name of the LORD
  - in the LORD's name
  lexicon: HALOT
  rationale: Standard oath language. 'In the name of the LORD' is clear, natural,
    and reflects covenantal invocation.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the LXX pattern.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Introduces the quoted oath formula. 'Saying' is the normal English equivalent.
- source_word: יְהוָה יִהְיֶה בֵּינִי וּבֵינֶךָ
  chosen: May the LORD be between me and you
  alternatives:
  - The LORD will be between me and you
  - The LORD is witness between me and you
  lexicon: HALOT
  rationale: Though יִהְיֶה is formally imperfect ('will be'), in oath/blessing context
    it carries a jussive-like force. 'May the LORD be' best conveys invocation rather
    than mere prediction. 'Between' preserves the covenant-witness/arbiter sense without
    overinterpreting it as 'witness' in the main text.
- source_word: זַרְעִי ... זַרְעֲךָ
  chosen: my offspring ... your offspring
  alternatives:
  - my descendants ... your descendants
  - my seed ... your seed
  lexicon: HALOT
  rationale: זֶרַע can denote seed, offspring, or descendants. 'Offspring' is natural
    modern English and can refer collectively to posterity without sounding overly
    technical or archaic.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for all time
  - perpetually
  lexicon: HALOT
  rationale: Concise and idiomatic rendering of enduring duration. 'Forever' fits
    the covenantal scope here.
