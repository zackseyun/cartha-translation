id: 1SA.20.20
reference: 1 Samuel 20:20
source:
  edition: WLC
  text: וַ/אֲנִ֕י שְׁלֹ֥שֶׁת הַ/חִצִּ֖ים צִדָּ֣/ה אוֹרֶ֑ה לְ/שַֽׁלַּֽח לִ֖/י לְ/מַטָּרָֽה־׃
translation:
  text: And I will shoot the three arrows to the side of it, as though I were shooting
    for myself at a target.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to the side of it'; the suffix likely refers to the stone or marker
      mentioned in the surrounding context.
    reason: cross_reference
  - marker: b
    text: Or 'beside it.'
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew expression is idiomatic: literally, ''to send for myself at
      a target,'' that is, to act as though practicing archery.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: And I
  alternatives:
  - As for me, I
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a shift to Jonathan's
    own action in the plan. 'And I' is natural English and preserves the discourse
    progression.
- source_word: שְׁלֹשֶׁת הַחִצִּים
  chosen: the three arrows
  alternatives:
  - three arrows
  lexicon: HALOT
  rationale: The construct numeral with the definite noun is best rendered 'the three
    arrows,' preserving definiteness and referring to a specific prearranged signal.
- source_word: צִדָּה
  chosen: to the side of it
  alternatives:
  - beside it
  - to its side
  lexicon: HALOT
  rationale: The noun with 3fs suffix likely refers back to the previously mentioned
    stone/marker in the larger context. 'To the side of it' preserves the directional
    sense without over-specifying the referent in the main text.
- source_word: אוֹרֶה
  chosen: I will shoot
  alternatives:
  - I will cast
  - I will direct
  lexicon: HALOT
  rationale: From ירה in the Hiphil, in an archery context the natural sense is 'shoot.'
    Future sense fits the planned action.
- source_word: לְשַׁלַּח לִי
  chosen: as though I were shooting for myself
  alternatives:
  - as if sending them for myself
  - to send for myself
  lexicon: HALOT
  rationale: The infinitive of שלח with dative 'for myself' is idiomatic and difficult
    if rendered woodenly. In context Jonathan is describing the appearance of casually
    shooting arrows as target practice. 'As though I were shooting for myself' captures
    the purposive/pretended sense in readable English while staying close to the action.
- source_word: לְמַטָּרָה
  chosen: at a target
  alternatives:
  - for a mark
  - at the target
  lexicon: HALOT
  rationale: מַטָּרָה denotes a target or mark in an archery setting. 'At a target'
    is clear modern English and fits the indefinite sense.
