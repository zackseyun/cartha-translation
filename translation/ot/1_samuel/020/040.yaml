id: 1SA.20.40
reference: 1 Samuel 20:40
source:
  edition: WLC
  text: וַ/יִּתֵּ֤ן יְהֽוֹנָתָן֙ אֶת כֵּלָ֔י/ו אֶל הַ/נַּ֖עַר אֲשֶׁר ל֑/וֹ וַ/יֹּ֣אמֶר
    ל֔/וֹ לֵ֖ךְ הָבֵ֥יא הָ/עִֽיר־־־׃
translation:
  text: Then Jonathan gave his weapons to the young man who belonged to him and said
    to him, “Go, bring them to the city.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'his weapons' could more broadly mean 'his equipment' or 'his gear';
      the context of Jonathan's bow and arrows favors 'weapons.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the boy who was with him' / 'his servant boy.' The Hebrew describes
      the young attendant as belonging to Jonathan.
    reason: lexical_alternative
  - marker: c
    text: The object of 'bring' is implicit in Hebrew and is supplied in English as
      'them,' referring to Jonathan's weapons/equipment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - handed
  lexicon: HALOT
  rationale: The waw-consecutive verb from נתן is the standard narrative past, best
    rendered simply as 'gave.' 'Handed' is possible but less neutral.
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: כֵּלָיו
  chosen: his weapons
  alternatives:
  - his gear
  - his equipment
  - his articles
  lexicon: HALOT
  rationale: כְּלִי can mean vessel, implement, article, or weaponry depending on
    context. In this scene of archery and retrieval of arrows, 'weapons' best captures
    the military/archery equipment Jonathan gives to the boy. 'Gear/equipment' is
    broader but less contextually precise.
- source_word: הַנַּעַר אֲשֶׁר לוֹ
  chosen: the young man who belonged to him
  alternatives:
  - the boy who was with him
  - his servant boy
  - the young man who was his
  lexicon: HALOT
  rationale: נַעַר denotes a youth/young man/servant depending on context. The phrase
    אֲשֶׁר לוֹ literally means 'who was to him/belonged to him,' indicating personal
    attendant or servant. 'Young man' preserves the lexical sense while 'who belonged
    to him' reflects the possessive relation without over-specifying rank. Because
    the attendant is clearly subordinate, the possessive nuance should be retained.
- source_word: וַיֹּאמֶר לוֹ
  chosen: and said to him
  alternatives:
  - and told him
  lexicon: HALOT
  rationale: אמר is the ordinary verb 'say.' 'Said to him' is the most transparent
    rendering.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Be on your way
  lexicon: HALOT
  rationale: Imperative of הלך, straightforwardly 'Go.'
- source_word: הָבֵיא
  chosen: bring them
  alternatives:
  - take them
  - carry them
  lexicon: HALOT
  rationale: The Hiphil of בוא commonly means 'bring.' English requires an object,
    supplied from the immediately preceding 'weapons.' 'Take them' is possible from
    the attendant's perspective, but 'bring' more closely matches the Hebrew verb.
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Definite noun rendered directly as 'the city.' In context this refers
    to the nearby city/town, but no further specification is warranted by the text.
