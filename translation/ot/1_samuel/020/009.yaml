id: 1SA.20.9
reference: 1 Samuel 20:9
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוֹנָתָ֖ן חָלִ֣ילָ/ה לָּ֑/ךְ כִּ֣י אִם יָדֹ֣עַ אֵדַ֗ע כִּֽי
    כָלְתָ֨ה הָ/רָעָ֜ה מֵ/עִ֤ם אָבִ/י֙ לָ/ב֣וֹא עָלֶ֔י/ךָ וְ/לֹ֥א אֹתָ֖/הּ אַגִּ֥יד
    לָֽ/ךְ׀־־׃ס
translation:
  text: Jonathan said, “Far be it from you! If I knew for certain that evil had been
    determined by my father to come upon you, would I not tell you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the harm was fixed' / 'the evil was complete.' The Hebrew expression
      may denote that Saul's harmful intent had become settled or fully formed.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלִילָה לָּךְ
  chosen: Far be it from you!
  alternatives:
  - Far be it!
  - Never!
  - That would be unthinkable for you
  lexicon: HALOT
  rationale: Idiomatic expression of strong rejection or denial. Including 'from you'
    preserves the dative pronoun לָּךְ and fits the immediate context of Jonathan
    rejecting David's suspicion.
- source_word: כִּי אִם
  chosen: If
  alternatives:
  - For if
  - But if indeed
  lexicon: HALOT
  rationale: Here the particle sequence introduces a conditional clause rather than
    a contrastive statement. Simple 'If' gives the sense naturally in English.
- source_word: יָדֹעַ אֵדַע
  chosen: I knew for certain
  alternatives:
  - I surely knew
  - I indeed knew
  - I certainly came to know
  lexicon: HALOT
  rationale: Infinitive absolute with finite verb intensifies certainty. 'Knew for
    certain' captures the emphatic force in natural English.
- source_word: כָלְתָה הָרָעָה
  chosen: evil had been determined
  alternatives:
  - the evil was complete
  - the harm was decided
  - disaster was fixed
  lexicon: HALOT
  rationale: The verb כלה with 'the evil' in this context conveys that the harmful
    plan had reached a settled point or was determined. 'Had been determined' best
    fits the following infinitive 'to come upon you' and the narrative context of
    Saul's intent.
- source_word: מֵעִם אָבִי
  chosen: by my father
  alternatives:
  - from my father
  - on my father's part
  lexicon: HALOT
  rationale: The preposition marks source/origin. 'By my father' is idiomatic in English
    for an intended act originating with him.
- source_word: לָבוֹא עָלֶיךָ
  chosen: to come upon you
  alternatives:
  - to come against you
  - to befall you
  lexicon: HALOT
  rationale: Retains the directional force of the Hebrew while allowing the threat
    to remain somewhat general, whether attack or harm.
- source_word: וְלֹא אֹתָהּ אַגִּיד לָךְ
  chosen: would I not tell you?
  alternatives:
  - and would I not report it to you?
  - and would I not declare it to you?
  lexicon: HALOT
  rationale: The Hebrew uses a rhetorical question expecting a positive answer. 'Tell
    you' is the most natural rendering of נגד in this interpersonal context; 'it'
    is implied from אֹתָהּ.
