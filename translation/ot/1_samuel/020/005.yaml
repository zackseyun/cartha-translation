id: 1SA.20.5
reference: 1 Samuel 20:5
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר דָּוִ֜ד אֶל יְהוֹנָתָ֗ן הִֽנֵּה חֹ֨דֶשׁ֙ מָחָ֔ר וְ/אָנֹכִ֛י יָשֹׁב
    אֵשֵׁ֥ב עִם הַ/מֶּ֖לֶךְ לֶ/אֱכ֑וֹל וְ/שִׁלַּחְתַּ֨/נִי֙ וְ/נִסְתַּרְתִּ֣י בַ/שָּׂדֶ֔ה
    עַ֖ד הָ/עֶ֥רֶב הַ/שְּׁלִשִֽׁית־־־־׃
translation:
  text: David said to Jonathan, “Look, tomorrow is the new moon, and I am supposed
    to sit with the king to eat. But let me go, so that I may hide myself in the field
    until the third evening.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “until the evening of the third day.” The Hebrew phrase is elliptical.
    reason: lexical_alternative
  - marker: b
    text: “New moon” refers to the monthly new moon observance, often marked by a
      special meal.
    reason: cultural_note
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces attention to the situation. 'Look' is natural modern English
    while preserving the deictic force better than omitting it.
- source_word: חֹדֶשׁ מָחָר
  chosen: tomorrow is the new moon
  alternatives:
  - tomorrow is the month/new moon festival
  - tomorrow is a new moon
  lexicon: HALOT
  rationale: חֹדֶשׁ can denote 'new moon' or by extension 'month.' In this court-meal
    context it refers to the new moon observance on the following day, not merely
    the calendar month.
- source_word: יָשֹׁב אֵשֵׁב
  chosen: I am supposed to sit
  alternatives:
  - I must surely sit
  - I should indeed sit
  - I am to sit
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the obligation/expectation.
    'I am supposed to sit' captures the expected attendance in idiomatic English without
    woodenly reproducing the Hebrew doubling.
- source_word: עִם הַמֶּלֶךְ לֶאֱכֹל
  chosen: with the king to eat
  alternatives:
  - with the king for the meal
  - with the king at table
  lexicon: HALOT
  rationale: Keeps the concrete imagery of sitting with the king for a meal. 'To eat'
    is straightforward and close to the Hebrew infinitive.
- source_word: וְשִׁלַּחְתַּנִי
  chosen: But let me go
  alternatives:
  - and send me away
  - and release me
  lexicon: HALOT
  rationale: Although literally 'send me,' in context David is asking Jonathan to
    permit his absence/departure. 'Let me go' is idiomatic and fits the request.
- source_word: וְנִסְתַּרְתִּי
  chosen: so that I may hide myself
  alternatives:
  - and I will hide myself
  - and let me hide myself
  lexicon: HALOT
  rationale: The form can be read with volitional nuance in sequence with the preceding
    request. 'So that I may hide myself' expresses the intended result of Jonathan's
    letting him go.
- source_word: בַשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the countryside
  - in the open country
  lexicon: HALOT
  rationale: The singular 'field' is retained as the natural rendering of the Hebrew
    noun here.
- source_word: עַד הָעֶרֶב הַשְּׁלִשִׁית
  chosen: until the third evening
  alternatives:
  - until the evening of the third day
  - until the third day at evening
  lexicon: HALOT
  rationale: The Hebrew is elliptical but points to the evening associated with 'the
    third.' English readers may understand this as the evening of the third day; the
    more literal phrasing is retained in the main text and clarified in a footnote.
