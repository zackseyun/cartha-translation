id: 1SA.20.24
reference: 1 Samuel 20:24
source:
  edition: WLC
  text: וַ/יִּסָּתֵ֥ר דָּוִ֖ד בַּ/שָּׂדֶ֑ה וַ/יְהִ֣י הַ/חֹ֔דֶשׁ וַ/יֵּ֧שֶׁב הַ/מֶּ֛לֶךְ
    על הַ/לֶּ֖חֶם לֶ/אֱכֽוֹל־׃
translation:
  text: So David hid himself in the field. When the new moon came, the king sat down
    at the meal to eat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'sat over the bread to eat'; 'bread' here stands for the meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסָּתֵר
  chosen: hid himself
  alternatives:
  - was hidden
  - hid
  lexicon: HALOT
  rationale: 'The Niphal form of סתר here is best rendered reflexively/intransitively
    in context: David concealed himself. ''Hid himself'' is natural English and preserves
    David''s intentional action better than the more passive ''was hidden''.'
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the countryside
  lexicon: HALOT
  rationale: שָׂדֶה normally means 'field.' The definite article is retained. 'Countryside'
    is possible contextually but less direct.
- source_word: וַיְהִי הַחֹדֶשׁ
  chosen: When the new moon came
  alternatives:
  - and it was the new moon
  - and the month began
  lexicon: HALOT
  rationale: In this narrative context הַחֹדֶשׁ refers to the new moon observance/occasion
    rather than merely 'the month.' Rendering it temporally as 'When the new moon
    came' gives clear modern English while reflecting the event marked in the story.
- source_word: וַיֵּשֶׁב
  chosen: sat down
  alternatives:
  - sat
  - took his seat
  lexicon: HALOT
  rationale: ישב literally means 'sat' or 'dwelt'; in meal context 'sat down' is idiomatic
    English and fits the action of taking one's place for a meal.
- source_word: עַל הַלֶּחֶם
  chosen: at the meal
  alternatives:
  - over the bread
  - at the bread
  lexicon: HALOT
  rationale: Literally 'upon/over the bread,' but in Hebrew 'bread' often stands metonymically
    for a meal. 'At the meal' communicates the sense in natural English without wooden
    literalism.
- source_word: לֶאֱכֹל
  chosen: to eat
  lexicon: HALOT
  rationale: 'Straightforward infinitive of purpose: the king sat down in order to
    eat.'
- source_word: דָּוִד
  chosen: David
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite title referring to Saul in context; translated rather than replaced
    with the proper name because the Hebrew uses the title.
