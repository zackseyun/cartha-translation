id: 1SA.20.39
reference: 1 Samuel 20:39
source:
  edition: WLC
  text: וְ/הַ/נַּ֖עַר לֹֽא יָדַ֣ע מְא֑וּמָה אַ֤ךְ יְהֽוֹנָתָן֙ וְ/דָוִ֔ד יָדְע֖וּ
    אֶת הַ/דָּבָֽר־־׃
translation:
  text: But the boy did not know anything; only Jonathan and David knew the matter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the thing' or 'the arrangement.' Hebrew דָּבָר is broad and can refer
      to a matter, affair, or thing under discussion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנַּעַר
  chosen: But the boy
  alternatives:
  - And the boy
  - the young man
  lexicon: HALOT
  rationale: נַעַר commonly denotes a boy, youth, or servant/attendant depending on
    context. Here it refers to Jonathan's young attendant in the signaling scene,
    so 'boy' is the most natural and contextually precise English rendering. The prefixed
    וְ is rendered adversatively as 'But' because the clause contrasts the boy's ignorance
    with Jonathan and David's knowledge.
- source_word: לֹא יָדַע
  chosen: did not know
  alternatives:
  - did not understand
  lexicon: HALOT
  rationale: יָדַע is the standard verb 'to know.' 'Did not know' preserves the straightforward
    cognitive sense without overinterpreting it as deeper understanding.
- source_word: מְאוּמָה
  chosen: anything
  alternatives:
  - a thing
  - something at all
  lexicon: HALOT
  rationale: In negative constructions מְאוּמָה means 'anything' or 'nothing at all.'
    With לֹא יָדַע, idiomatic English is 'did not know anything.'
- source_word: אַךְ
  chosen: only
  alternatives:
  - surely
  - indeed
  - except that
  lexicon: HALOT
  rationale: אַךְ here marks restriction/exclusivity, contrasting the boy with the
    two principals. 'Only' best captures that limiting force in natural English.
- source_word: יְהוֹנָתָן וְדָוִד
  chosen: Jonathan and David
  rationale: Personal names are transliterated by standard English conventions per
    project philosophy.
- source_word: יָדְעוּ
  chosen: knew
  alternatives:
  - understood
  lexicon: HALOT
  rationale: 'The same verb as earlier in the verse is kept with the same English
    gloss for consistency and to preserve the contrast: the boy did not know, but
    Jonathan and David knew.'
- source_word: אֶת־הַדָּבָר
  chosen: the matter
  alternatives:
  - the thing
  - the arrangement
  - what was going on
  lexicon: HALOT
  rationale: דָּבָר has a broad semantic range including 'word,' 'thing,' 'matter,'
    or 'affair.' In this context it refers to the underlying matter or arrangement
    known only to Jonathan and David. 'The matter' is idiomatic, sufficiently formal,
    and avoids overparaphrase.
