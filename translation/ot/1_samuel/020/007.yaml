id: 1SA.20.7
reference: 1 Samuel 20:7
source:
  edition: WLC
  text: אִם כֹּ֥ה יֹאמַ֛ר ט֖וֹב שָׁל֣וֹם לְ/עַבְדֶּ֑/ךָ וְ/אִם חָרֹ֤ה יֶֽחֱרֶה֙ ל֔/וֹ
    דַּ֕ע כִּֽי כָלְתָ֥ה הָ/רָעָ֖ה מֵ/עִמּֽ/וֹ־־־׃
translation:
  text: If he says, ‘Good,’ there will be peace for your servant; but if he becomes
    very angry, know that evil has been determined by him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'evil is fully determined from him,' that is, Saul has firmly resolved
      to do harm.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: Good
  alternatives:
  - It is good
  - Well
  lexicon: HALOT
  rationale: Used as Saul’s approving response in direct speech. The simple interjection-like
    'Good' fits the Hebrew predicate adjective used elliptically and sounds natural
    in English dialogue.
- source_word: שָׁלוֹם
  chosen: there will be peace
  alternatives:
  - it is well
  - peace
  lexicon: HALOT
  rationale: Shalom here indicates safety/well-being for David in the situation, not
    merely absence of conflict. 'There will be peace for your servant' brings out
    the predictive sense in context.
- source_word: לְעַבְדֶּךָ
  chosen: for your servant
  alternatives:
  - for your slave
  - for me, your servant
  lexicon: HALOT
  rationale: Jonathan is speaking of himself deferentially to David in the third person.
    'Servant' is the natural courtly/self-humbling sense here; the bonded nature signaled
    by 'slave' is not foregrounded in this context.
- source_word: חָרֹה יֶחֱרֶה לוֹ
  chosen: he becomes very angry
  alternatives:
  - his anger burns
  - it burns to him
  - he is enraged
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    'Becomes very angry' captures the Hebrew emphasis in readable modern English without
    losing force.
- source_word: דַּע
  chosen: know
  alternatives:
  - you shall know
  - be assured
  lexicon: HALOT
  rationale: Imperative to David drawing an inference from Saul’s reaction. 'Know'
    is direct and sufficiently formal.
- source_word: כָלְתָה
  chosen: has been determined
  alternatives:
  - is complete
  - is decided
  - is finished
  lexicon: HALOT
  rationale: From כלה in context of a settled intention. The point is not that evil
    is merely 'finished' but that Saul’s harmful intent is fully resolved. Passive
    English best conveys the resulting settled determination.
- source_word: הָרָעָה
  chosen: evil
  alternatives:
  - harm
  - disaster
  lexicon: HALOT
  rationale: Refers to Saul’s intended harmful action against David. 'Evil' preserves
    the moral weight of the Hebrew, though contextually it implies harmful intent.
- source_word: מֵעִמּוֹ
  chosen: by him
  alternatives:
  - from him
  - on his part
  lexicon: HALOT
  rationale: The preposition with 'with/from' idiomatically marks the source of the
    resolved evil, namely Saul. 'By him' is concise and idiomatic with the passive
    'has been determined.'
