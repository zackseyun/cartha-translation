theological_decisions:
- issue: Nature of חסד in covenant context
  chosen_reading: Render as 'steadfast love' with covenantal overtones, without narrowing
    it to a technical treaty term in the main text.
  alternative_readings:
  - covenant loyalty
  - loyal love
  - kindness
  rationale: The verse concerns Jonathan's covenant with David and his house, so חסד
    carries more than generic kindness. However, the text itself does not require
    a specialized legal gloss in the main text. 'Steadfast love' preserves both affection
    and loyalty while allowing the covenant context to supply the fuller sense.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Scope of Jonathan's request in the second clause
  chosen_reading: Jonathan asks that David's loyal love not be cut off from Jonathan's
    house even when the LORD eliminates David's enemies.
  alternative_readings:
  - A parenthetical statement about the LORD cutting off David's enemies without direct
    connection to the request
  rationale: The syntax links the second clause to the first as an emphatic extension
    of the plea. This preserves the tension of Jonathan seeking mercy for his house
    despite the future downfall of those opposed to David.
  doctrine_reference: Translation philosophy §3
- issue: Rendering אִישׁ distributively
  chosen_reading: Use 'every man' rather than a gender-neutral collective.
  alternative_readings:
  - every one
  - each one
  rationale: The Hebrew singular distributive is masculine and likely refers to David's
    enemies individually. Per the gender-accurate policy, the masculine form should
    be retained where it reflects the source's intent.
  doctrine_reference: Translation philosophy §4
