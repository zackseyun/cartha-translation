id: 1SA.20.15
reference: 1 Samuel 20:15
source:
  edition: WLC
  text: וְ/לֹֽא תַכְרִ֧ת אֶֽת חַסְדְּ/ךָ֛ מֵ/עִ֥ם בֵּיתִ֖/י עַד עוֹלָ֑ם וְ/לֹ֗א בְּ/הַכְרִ֤ת
    יְהוָה֙ אֶת אֹיְבֵ֣י דָוִ֔ד אִ֕ישׁ מֵ/עַ֖ל פְּנֵ֥י הָ/אֲדָמָֽה־־־־׃
translation:
  text: And you shall not cut off your steadfast love from my house forever—not even
    when the LORD cuts off David’s enemies, every man, from the face of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your covenant loyalty' / 'your loyal love.' The Hebrew חֶסֶד often carries
      the sense of faithful love within a covenant relationship.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַכְרִת / בְּהַכְרִת (כרת)
  chosen: cut off
  alternatives:
  - withdraw
  - remove
  - destroy
  lexicon: HALOT
  rationale: 'Using the same English verb for both occurrences preserves the Hebrew
    wordplay and covenantal force: Jonathan asks David not to ''cut off'' his covenant
    loyalty, even when the LORD ''cuts off'' David''s enemies.'
- source_word: חַסְדְּךָ
  chosen: your steadfast love
  alternatives:
  - your kindness
  - your covenant loyalty
  - your loyal love
  lexicon: HALOT
  rationale: חסד commonly denotes loyal, covenantal love rather than mere affection.
    'Steadfast love' is readable and weighty, while preserving the covenant nuance.
    Alternatives are viable, especially 'covenant loyalty,' but 'steadfast love' is
    more idiomatic in English.
- source_word: מֵעִם בֵּיתִי
  chosen: from my house
  alternatives:
  - from my household
  - from my family
  lexicon: HALOT
  rationale: '''House'' preserves the familial/dynastic sense of בית and matches the
    covenant context. ''Household'' or ''family'' are interpretive expansions; ''house''
    keeps the Hebrew compactness while remaining clear.'
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  - to eternity
  lexicon: HALOT
  rationale: A standard idiomatic rendering for enduring duration. 'Forever' is natural
    modern English and fits the solemn covenant request.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אֹיְבֵי דָוִד
  chosen: David’s enemies
  alternatives:
  - the enemies of David
  lexicon: HALOT
  rationale: The construct chain is naturally rendered with the possessive in English.
    This keeps the focus on those opposed to David.
- source_word: אִישׁ
  chosen: every man
  alternatives:
  - each one
  - every one of them
  lexicon: HALOT
  rationale: 'The singular distributive אִישׁ after a plural noun emphasizes individual
    elimination: ''every man.'' This follows the gender-accurate policy and preserves
    the Hebrew''s force better than a neutral paraphrase.'
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  chosen: from the face of the earth
  alternatives:
  - from upon the face of the ground
  - from the land
  lexicon: HALOT
  rationale: This is a conventional Hebrew idiom for removal from the world/earth.
    'From the face of the earth' is the most natural English equivalent and preserves
    the idiomatic solemnity.
- source_word: וְלֹא ... וְלֹא
  chosen: And ... not ... not even when
  alternatives:
  - and ... neither ... when not
  - and ... never ... even when
  lexicon: HALOT
  rationale: 'The second negative is best taken emphatically with the infinitive construct
    clause: Jonathan''s request extends even to the time when the LORD removes David''s
    enemies. ''Not even when'' captures the syntax and emphasis in clear English.'
