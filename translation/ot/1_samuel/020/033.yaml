id: 1SA.20.33
reference: 1 Samuel 20:33
source:
  edition: WLC
  text: וַ/יָּ֨טֶל שָׁא֧וּל אֶֽת הַ/חֲנִ֛ית עָלָ֖י/ו לְ/הַכֹּת֑/וֹ וַ/יֵּ֨דַע֙ יְה֣וֹנָתָ֔ן
    כִּֽי כָ֥לָה הִ֛יא מֵ/עִ֥ם אָבִ֖י/ו לְ/הָמִ֥ית אֶת דָּוִֽד־־־׃ס
translation:
  text: Then Saul hurled the spear at him to strike him, and Jonathan knew that his
    father was determined to put David to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his father had resolved' / 'it was settled by his father.' The Hebrew
      idiom expresses a fixed, completed decision on Saul's part.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּטֶל
  chosen: hurled
  alternatives:
  - threw
  - cast
  lexicon: HALOT
  rationale: The verb denotes throwing/casting. 'Hurled' best conveys the forceful,
    hostile action in context, more vivid than the flatter 'threw.'
- source_word: הַחֲנִית
  chosen: the spear
  alternatives:
  - the javelin
  lexicon: HALOT
  rationale: A standard weapon term often rendered 'spear.' 'Javelin' is possible
    in Saul narratives, but 'spear' is the broader, more natural modern English choice
    unless a lighter throwing weapon must be specified.
- source_word: עָלָיו
  chosen: at him
  alternatives:
  - toward him
  - against him
  lexicon: HALOT
  rationale: With a verb of throwing, English idiom prefers 'at him.' This makes explicit
    the hostile direction implied by the preposition.
- source_word: לְהַכֹּתוֹ
  chosen: to strike him
  alternatives:
  - to hit him
  - to smite him
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To strike him' is clear, natural,
    and preserves the violent intent without archaic diction.
- source_word: וַיֵּדַע
  chosen: knew
  alternatives:
  - realized
  - understood
  lexicon: HALOT
  rationale: The verb is the common 'know.' 'Knew' is sufficiently natural here and
    keeps close to the Hebrew.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here it introduces the content of Jonathan's knowledge rather than a
    causal clause, so 'that' is best.
- source_word: כָלָה הִיא מֵעִם אָבִיו
  chosen: his father was determined
  alternatives:
  - it was decided by his father
  - it was settled from his father
  - his father had resolved
  lexicon: HALOT
  rationale: The idiom conveys that the matter was complete/settled on the father's
    side. 'His father was determined' communicates the fixed resolve idiomatically
    in English while preserving the sense of settled intent.
- source_word: לְהָמִית אֶת דָּוִד
  chosen: to put David to death
  alternatives:
  - to kill David
  lexicon: HALOT
  rationale: Both are accurate. 'To put David to death' matches the gravity and deliberateness
    of Saul's intent slightly better than the more general 'kill.'
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  rationale: Standard English transliteration of the personal name.
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Standard English transliteration of the personal name.
- source_word: דָּוִד
  chosen: David
  rationale: Standard English transliteration of the personal name.
