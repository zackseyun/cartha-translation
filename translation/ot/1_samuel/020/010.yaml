id: 1SA.20.10
reference: 1 Samuel 20:10
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר דָּוִד֙ אֶל יְה֣וֹנָתָ֔ן מִ֖י יַגִּ֣יד לִ֑/י א֛וֹ מַה יַּעַנְ/ךָ֥
    אָבִ֖י/ךָ קָשָֽׁה־־׃ס
translation:
  text: Then David said to Jonathan, “Who will tell me if your father answers you
    harshly?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Who will tell me? Or what will your father answer you—harsh?'
      The Hebrew is compressed; the translation makes the sense explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force.
- source_word: דָּוִד
  chosen: David
  rationale: Standard English transliteration of the personal name.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Regular directional preposition; 'to' is the natural modern equivalent.
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  rationale: Standard English transliteration of the personal name.
- source_word: מִי
  chosen: Who
  alternatives:
  - Who is it that
  lexicon: HALOT
  rationale: Direct interrogative pronoun introducing David's question.
- source_word: יַגִּיד לִי
  chosen: will tell me
  alternatives:
  - will report to me
  - will inform me
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means 'declare, tell, report.' 'Tell me' is concise
    and idiomatic here.
- source_word: אוֹ
  chosen: if
  alternatives:
  - or
  - or if
  lexicon: HALOT
  rationale: Although או normally means 'or,' in this context the clause is elliptical
    and introduces the content/condition David is concerned about. Rendering it with
    'if' produces clear English without forcing a wooden disjunction that sounds incomplete.
- source_word: מַה יַּעַנְךָ אָבִיךָ
  chosen: your father answers you
  alternatives:
  - what your father answers you
  - your father responds to you
  lexicon: HALOT
  rationale: ענה in Qal means 'answer/respond.' English idiom prefers 'your father
    answers you' rather than the more wooden 'what your father answers you' in this
    compressed question.
- source_word: קָשָׁה
  chosen: harshly
  alternatives:
  - roughly
  - severely
  - with something harsh
  lexicon: HALOT
  rationale: The adjective 'hard/harsh' functions adverbially with the verb 'answer.'
    'Harshly' best captures the sense of a severe or hostile reply in context.
