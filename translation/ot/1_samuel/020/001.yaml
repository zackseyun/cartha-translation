id: 1SA.20.1
reference: 1 Samuel 20:1
source:
  edition: WLC
  text: וַ/יִּבְרַ֣ח דָּוִ֔ד מ/נוות בָּ/רָמָ֑ה וַ/יָּבֹ֞א וַ/יֹּ֣אמֶר לִ/פְנֵ֣י יְהוֹנָתָ֗ן
    מֶ֤ה עָשִׂ֨יתִי֙ מֶֽה עֲוֺנִ֤/י וּ/מֶֽה חַטָּאתִ/י֙ לִ/פְנֵ֣י אָבִ֔י/ךָ כִּ֥י
    מְבַקֵּ֖שׁ אֶת נַפְשִֽׁ/י׀־־־׃
translation:
  text: Then David fled from Naioth in Ramah and came before Jonathan and said, “What
    have I done? What is my guilt, and what is my sin before your father, that he
    is seeking my life?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from Naioth at Ramah.” The Hebrew likely refers to the known place-name
      Naioth associated with Ramah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְרַח
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: HALOT
  rationale: The verb ברח denotes fleeing/escaping. “Fled” is concise, natural English
    and preserves the urgency without overinterpreting the manner.
- source_word: מִנָּוֹת בָּרָמָה
  chosen: from Naioth in Ramah
  alternatives:
  - from the dwellings at Ramah
  - from Naioth at Ramah
  lexicon: HALOT
  rationale: This is a place name in context (cf. previous chapter), so it is transliterated
    as “Naioth,” with “in Ramah” preserving the locative relation. Personal/place
    names are transliterated by project philosophy.
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol of בוא. “Came” fits the deictic movement toward
    Jonathan in the following clause.
- source_word: לִפְנֵי יְהוֹנָתָן
  chosen: before Jonathan
  alternatives:
  - to Jonathan
  - into Jonathan’s presence
  lexicon: HALOT
  rationale: לִפְנֵי literally means “before/in the presence of.” “Before Jonathan”
    preserves the relational nuance better than the flatter “to Jonathan,” while remaining
    idiomatic.
- source_word: מֶה עָשִׂיתִי
  chosen: What have I done?
  alternatives:
  - What did I do?
  lexicon: HALOT
  rationale: A natural English rendering of the rhetorical question. The perfect can
    be represented idiomatically by the English present perfect here.
- source_word: עֲוֺנִי
  chosen: my guilt
  alternatives:
  - my iniquity
  - my wrongdoing
  lexicon: HALOT
  rationale: עָוֹן can denote guilt, iniquity, or the culpability attached to wrongdoing.
    “My guilt” best fits the forensic/self-defensive sequence of David’s questions
    in contemporary English.
- source_word: חַטָּאתִי
  chosen: my sin
  alternatives:
  - my offense
  lexicon: HALOT
  rationale: חַטָּאת commonly means sin/offense. “My sin” preserves the moral-religious
    force and pairs well with “my guilt” without collapsing the distinction between
    the two Hebrew nouns.
- source_word: לִפְנֵי אָבִיךָ
  chosen: before your father
  alternatives:
  - against your father
  - in your father’s sight
  lexicon: HALOT
  rationale: The phrase is literally “before your father.” This can imply in his sight
    or in relation to him; “before your father” preserves the Hebrew wording and rhetorical
    force.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content/result of the preceding question: what
    offense could justify Saul’s action. “That” is the most natural connector in English:
    “that he is seeking my life.”'
- source_word: מְבַקֵּשׁ אֶת־נַפְשִׁי
  chosen: he is seeking my life
  alternatives:
  - he seeks my life
  - he is trying to kill me
  lexicon: HALOT
  rationale: The idiom בקשׁ את־נפשׁ means to seek someone’s life, i.e., to try to
    kill them. The chosen rendering keeps the Hebrew idiom in understandable English
    without paraphrasing it away.
