id: 1SA.20.4
reference: 1 Samuel 20:4
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוֹנָתָ֖ן אֶל דָּוִ֑ד מַה תֹּאמַ֥ר נַפְשְׁ/ךָ֖ וְ/אֶֽעֱשֶׂה
    לָּֽ/ךְ־־־׃פ
translation:
  text: Then Jonathan said to David, “Whatever your soul says, I will do for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'Whatever you desire, I will do for you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving the sequential sense.
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אֶל
  chosen: to
  lexicon: HALOT
  rationale: Standard directional preposition introducing the addressee.
- source_word: דָּוִד
  chosen: David
  rationale: Personal name transliterated by standard English convention.
- source_word: מַה
  chosen: Whatever
  alternatives:
  - What
  lexicon: HALOT
  rationale: 'Although literally ''what,'' in this construction with the following
    verb and object it functions idiomatically as an open offer: ''whatever ... says.''
    This better reflects the sense in natural English than the stiffer ''what your
    soul says.'''
- source_word: תֹּאמַר
  chosen: says
  alternatives:
  - you say
  - desires
  lexicon: HALOT
  rationale: The verb is 3fs, agreeing with 'your soul' (נפשך), so a literal rendering
    is 'your soul says.' 'Says' preserves the speech metaphor. 'You say' would smooth
    the idiom but obscure the Hebrew subject; 'desires' captures sense but moves further
    from the lexical form.
- source_word: נַפְשְׁךָ
  chosen: your soul
  alternatives:
  - you
  - your desire
  lexicon: HALOT
  rationale: נפש often denotes the inner self, desire, or person. Here retaining 'your
    soul' preserves the Hebrew idiom and emotional force of Jonathan's pledge. Because
    this may sound unusual in English, a lexical alternative is preserved in a footnote.
- source_word: וְאֶעֱשֶׂה
  chosen: I will do
  alternatives:
  - and I will do
  - I will act
  lexicon: HALOT
  rationale: עשה is the common verb 'do/make.' 'I will do' is the most direct rendering.
    The conjunction is absorbed into smooth English dialogue.
- source_word: לָּךְ
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The preposition here is best rendered 'for you' in English, expressing
    benefit and commitment rather than mere direction.
