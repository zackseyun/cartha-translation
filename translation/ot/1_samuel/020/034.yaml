id: 1SA.20.34
reference: 1 Samuel 20:34
source:
  edition: WLC
  text: וַ/יָּ֧קָם יְהוֹנָתָ֛ן מֵ/עִ֥ם הַ/שֻּׁלְחָ֖ן בָּ/חֳרִי אָ֑ף וְ/לֹא אָכַ֞ל
    בְּ/יוֹם הַ/חֹ֤דֶשׁ הַ/שֵּׁנִי֙ לֶ֔חֶם כִּ֤י נֶעְצַב֙ אֶל דָּוִ֔ד כִּ֥י הִכְלִמ֖/וֹ
    אָבִֽי/ו־־־־׃ס
translation:
  text: Then Jonathan rose from the table in fierce anger, and he ate no food on the
    second day of the month, because he was grieved over David, because his father
    had humiliated him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'on the second day of the new moon.' The Hebrew חֹדֶשׁ can mean 'month'
      or 'new moon'; here the context is the royal new-moon meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: rose
  alternatives:
  - got up
  - stood up
  lexicon: HALOT
  rationale: Common narrative verb קום in wayyiqtol; 'rose' is natural and sufficiently
    formal in English narrative style.
- source_word: מֵעִם הַשֻּׁלְחָן
  chosen: from the table
  alternatives:
  - away from the table
  lexicon: HALOT
  rationale: מֵעִם marks movement away from association/location; with 'table' in
    meal context, 'from the table' is idiomatic English.
- source_word: בָּחֳרִי אָף
  chosen: in fierce anger
  alternatives:
  - in burning anger
  - in the heat of anger
  lexicon: HALOT
  rationale: The construct phrase literally evokes 'the burning/heat of anger.' 'Fierce
    anger' preserves the intensity without sounding wooden.
- source_word: וְלֹא אָכַל ... לֶחֶם
  chosen: he ate no food
  alternatives:
  - he did not eat bread
  - he ate no bread
  lexicon: HALOT
  rationale: לֶחֶם can mean 'bread' specifically or food more generally in meal contexts.
    Since the sense is abstaining from the meal, 'food' best conveys the idiom in
    natural English.
- source_word: בְּיוֹם הַחֹדֶשׁ הַשֵּׁנִי
  chosen: on the second day of the month
  alternatives:
  - on the second day of the new moon
  - on the second day of the lunar month
  lexicon: HALOT
  rationale: חֹדֶשׁ can denote 'month' or 'new moon.' In this narrative the feast
    began at the new moon, so either is possible. The Hebrew phrase most straightforwardly
    means 'the second day of the month,' while the festival setting can be preserved
    in a footnote.
- source_word: נֶעְצַב
  chosen: he was grieved
  alternatives:
  - he was distressed
  - he was hurt
  lexicon: HALOT
  rationale: The Niphal of עצב conveys being pained or grieved. 'Grieved' fits the
    emotional and relational context well.
- source_word: אֶל דָּוִד
  chosen: over David
  alternatives:
  - because of David
  - concerning David
  lexicon: HALOT
  rationale: The preposition here marks the object/cause of Jonathan's grief. 'Over
    David' is concise and idiomatic in English.
- source_word: הִכְלִמוֹ
  chosen: had humiliated him
  alternatives:
  - had shamed him
  - had dishonored him
  lexicon: HALOT
  rationale: The Hiphil of כלם means to shame or humiliate. 'Humiliated' captures
    the public and relational force of Saul's treatment in the immediate context.
- source_word: אָבִיו
  chosen: his father
  alternatives: []
  lexicon: HALOT
  rationale: The suffix refers to Jonathan's father, Saul. 'His father' preserves
    the Hebrew wording and the familial tension.
