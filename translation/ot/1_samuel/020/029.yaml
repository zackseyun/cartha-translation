id: 1SA.20.29
reference: 1 Samuel 20:29
source:
  edition: WLC
  text: וַ/יֹּ֡אמֶר שַׁלְּחֵ֣/נִי נָ֡א כִּ֣י זֶבַח֩ מִשְׁפָּחָ֨ה לָ֜/נוּ בָּ/עִ֗יר
    וְ/ה֤וּא צִוָּֽה לִ/י֙ אָחִ֔/י וְ/עַתָּ֗ה אִם מָצָ֤אתִי חֵן֙ בְּ/עֵינֶ֔י/ךָ אִמָּ֥לְטָה
    נָּ֖א וְ/אֶרְאֶ֣ה אֶת אֶחָ֑/י עַל כֵּ֣ן לֹא בָ֔א אֶל שֻׁלְחַ֖ן הַ/מֶּֽלֶךְ־־־־־־׃ס
translation:
  text: He said, ‘Please let me go, because we have a family sacrifice in the city,
    and my brother himself has commanded me. So now, if I have found favor in your
    eyes, please let me slip away and see my brothers.’ That is why he has not come
    to the king’s table.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “please let me escape and see my brothers.” The Hebrew verb can carry
      the sense of escaping or slipping away discreetly.
    reason: lexical_alternative
  - marker: b
    text: “My brothers” may refer to David’s literal brothers or, more broadly, his
      male kin within the family group.
    reason: cultural_note
lexical_decisions:
- source_word: שַׁלְּחֵנִי נָא
  chosen: Please let me go
  alternatives:
  - Please send me away
  - Please release me
  lexicon: HALOT
  rationale: The imperative of שלח with 1cs suffix asks permission to depart. 'Let
    me go' is idiomatic modern English and fits the polite particle נָא.
- source_word: זֶבַח מִשְׁפָּחָה
  chosen: a family sacrifice
  alternatives:
  - a family feast offering
  - a clan sacrifice
  lexicon: HALOT
  rationale: זֶבַח is specifically a sacrifice, not merely a meal, though such sacrifices
    involved communal eating. מִשְׁפָּחָה marks it as belonging to the family/clan.
    'Family sacrifice' preserves the cultic sense without overexpansion.
- source_word: בָּעִיר
  chosen: in the city
  alternatives:
  - at the city
  lexicon: HALOT
  rationale: Straightforward locative phrase; 'in the city' is natural English.
- source_word: וְהוּא צִוָּה לִי אָחִי
  chosen: and my brother himself has commanded me
  alternatives:
  - and my brother has instructed me
  - and he—my brother—has ordered me
  lexicon: HALOT
  rationale: The pronoun הוּא is emphatic; rendering it with 'himself' preserves emphasis.
    צוה can mean command/instruct; 'commanded' best reflects the stronger force while
    remaining natural.
- source_word: אִם מָצָאתִי חֵן בְּעֵינֶיךָ
  chosen: if I have found favor in your eyes
  alternatives:
  - if I have found favor with you
  - if I have found grace in your sight
  lexicon: HALOT
  rationale: This is a conventional Hebrew politeness formula. 'In your eyes' preserves
    the Hebrew imagery while remaining understandable.
- source_word: אִמָּלְטָה נָּא
  chosen: please let me slip away
  alternatives:
  - please let me escape
  - please let me get away
  lexicon: HALOT
  rationale: The cohortative of מלט conveys escaping or slipping away. In this social
    setting, 'slip away' captures the nuance of unobtrusive departure better than
    the stronger 'escape,' while preserving the sense of leaving discreetly.
- source_word: וְאֶרְאֶה אֶת אֶחָי
  chosen: and see my brothers
  alternatives:
  - and visit my brothers
  - and see my kinsmen
  lexicon: HALOT
  rationale: ראה literally means 'see.' Since the context is a family gathering, 'visit'
    is possible, but 'see' stays closer to the source. אֶחָי is literally 'my brothers';
    this likely refers to male siblings or close male kin, and the gendered term should
    be preserved.
- source_word: עַל כֵּן
  chosen: That is why
  alternatives:
  - Therefore
  - For this reason
  lexicon: HALOT
  rationale: This phrase introduces the explanation for David's absence. 'That is
    why' is idiomatic and clear in modern English.
- source_word: לֹא בָא
  chosen: he has not come
  alternatives:
  - he did not come
  - he has not arrived
  lexicon: HALOT
  rationale: The perfect here explains the present state of absence at the meal. English
    present perfect fits the discourse context better than simple past.
- source_word: אֶל שֻׁלְחַן הַמֶּלֶךְ
  chosen: to the king’s table
  alternatives:
  - to the table of the king
  lexicon: HALOT
  rationale: A natural rendering of the construct phrase, preserving the royal-meal
    setting.
