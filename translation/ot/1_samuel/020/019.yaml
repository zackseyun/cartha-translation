id: 1SA.20.19
reference: 1 Samuel 20:19
source:
  edition: WLC
  text: וְ/שִׁלַּשְׁתָּ֙ תֵּרֵ֣ד מְאֹ֔ד וּ/בָאתָ֙ אֶל הַ/מָּק֔וֹם אֲשֶׁר נִסְתַּ֥רְתָּ
    שָּׁ֖ם בְּ/י֣וֹם הַֽ/מַּעֲשֶׂ֑ה וְ/יָ֣שַׁבְתָּ֔ אֵ֖צֶל הָ/אֶ֥בֶן הָ/אָֽזֶל־־׃
translation:
  text: On the third day, go down quickly and come to the place where you hid yourself
    on the day of the deed, and remain beside the stone Ezel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'on the day of the deed'; possibly 'on the day of the matter' or
      'on the day of the business.' The phrase likely refers to the previously arranged
      affair or occasion.
    reason: lexical_alternative
  - marker: b
    text: '''Ezel'' is likely a place-name or fixed designation for the stone; the
      underlying Hebrew may be related to ''going'' or ''departure,'' but the exact
      sense is uncertain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּשְׁתָּ
  chosen: On the third day
  alternatives:
  - when you repeat this a third time
  - for three days
  lexicon: HALOT
  rationale: The piel of שלשׁ here is idiomatic and difficult in isolation. In context
    it points to the third day of the agreed sign sequence rather than a literal 'do
    a third time' in English. 'On the third day' gives the most natural sense in the
    narrative flow and matches the following instructions.
- source_word: תֵּרֵד מְאֹד
  chosen: go down quickly
  alternatives:
  - go down greatly
  - go far down
  lexicon: HALOT
  rationale: 'ירד means ''go down''; מְאֹד intensifies the action. In this context
    an adverb of manner in English is best: ''quickly'' conveys urgent movement without
    woodenly reproducing the Hebrew intensifier.'
- source_word: וּבָאתָ אֶל הַמָּקוֹם
  chosen: and come to the place
  alternatives:
  - and go to the place
  lexicon: HALOT
  rationale: בוא commonly means 'come' or 'enter.' 'Come to the place' fits direct
    instruction and reads naturally in English.
- source_word: אֲשֶׁר נִסְתַּרְתָּ שָּׁם
  chosen: where you hid yourself
  alternatives:
  - where you concealed yourself there
  - where you were hidden
  lexicon: HALOT
  rationale: The niphal here is reflexive/passive in sense; in context David intentionally
    concealed himself, so 'hid yourself' is the clearest idiomatic rendering.
- source_word: בְּיוֹם הַמַּעֲשֶׂה
  chosen: on the day of the deed
  alternatives:
  - on the day of the matter
  - on the day of the business
  lexicon: HALOT
  rationale: מַעֲשֶׂה is broadly 'deed, act, matter.' Because the phrase likely points
    back to the previously arranged affair/occasion, 'deed' preserves the Hebrew's
    concreteness while remaining somewhat open. The expression is obscure enough that
    a footnote preserving alternatives is warranted.
- source_word: וְיָשַׁבְתָּ
  chosen: and remain
  alternatives:
  - and sit
  - and stay
  lexicon: HALOT
  rationale: ישׁב literally means 'sit' or 'dwell/remain.' In an instruction about
    waiting in hiding, 'remain' communicates the intended action more clearly than
    the more physical 'sit,' while staying close to the source sense.
- source_word: אֵצֶל הָאֶבֶן הָאָזֶל
  chosen: beside the stone Ezel
  alternatives:
  - beside the stone of departure
  - beside the marker stone Ezel
  lexicon: HALOT
  rationale: אֶבֶן is 'stone.' הָאָזֶל is best taken as a place-name/appositional
    designation, traditionally 'Ezel.' Since the exact meaning is uncertain, transliterating
    the proper designation is preferable in the main text, with lexical uncertainty
    noted in a footnote.
