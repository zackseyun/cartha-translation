id: 1SA.20.14
reference: 1 Samuel 20:14
source:
  edition: WLC
  text: וְ/לֹ֖א אִם עוֹדֶ֣/נִּי חָ֑י וְ/לֹֽא תַעֲשֶׂ֧ה עִמָּדִ֛/י חֶ֥סֶד יְהוָ֖ה וְ/לֹ֥א
    אָמֽוּת־־׃
translation:
  text: And if I am still alive, will you not show me the LORD’s covenant faithfulness,
    so that I may not die?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'show me the kindness/steadfast love of the LORD.' The Hebrew phrase
      can also be taken as referring more directly to the LORD’s own loyal love rather
      than covenant faithfulness shown in the LORD’s name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא אִם
  chosen: And if
  alternatives:
  - And not if
  - If indeed
  lexicon: HALOT
  rationale: The sequence is idiomatic in this oath/request context rather than a
    simple negation plus conditional. Rendering it as 'And if' gives the natural English
    sense of Jonathan's continued plea across vv. 13–15.
- source_word: עוֹדֶנִּי חָי
  chosen: I am still alive
  alternatives:
  - I am yet alive
  - while I still live
  lexicon: HALOT
  rationale: Combines the adverbial sense of עוֹד with the predicate adjective חָי.
    'Still alive' is natural modern English and preserves the temporal nuance.
- source_word: תַעֲשֶׂה עִמָּדִי
  chosen: show me
  alternatives:
  - do with me
  - deal with me
  lexicon: HALOT
  rationale: עשה עם commonly means 'deal/do with.' In English, with חֶסֶד as object,
    'show me' best conveys the idiom without wooden phrasing.
- source_word: חֶסֶד
  chosen: covenant faithfulness
  alternatives:
  - steadfast love
  - kindness
  - loyalty
  lexicon: HALOT
  rationale: In this covenantal context between Jonathan and David under the witness
    of YHWH, חֶסֶד carries loyal, covenantal devotion rather than mere kindness. 'Covenant
    faithfulness' makes that relational obligation explicit.
- source_word: יְהוָה
  chosen: the LORD’s
  alternatives:
  - Yahweh’s
  - Jehovah’s
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.' The construct relationship here is best expressed as 'the LORD’s covenant
    faithfulness' rather than 'faithfulness of the LORD' because Jonathan is asking
    David to show a kind of faithfulness defined by the LORD/covenant before him.
- source_word: וְלֹא אָמוּת
  chosen: so that I may not die
  alternatives:
  - and I will not die
  - lest I die
  lexicon: HALOT
  rationale: The clause expresses intended result/purpose within Jonathan's plea.
    'So that I may not die' is smoother in English than a bare coordinate negative
    and fits the request context.
