theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יְהוָה is 'the LORD.' This follows the stated
    doctrine and standard English Bible convention while preserving reverential usage.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of חֶסֶד יְהוָה
  chosen_reading: the LORD’s covenant faithfulness
  alternative_readings:
  - the kindness of the LORD
  - steadfast love from the LORD
  - loyalty befitting the LORD
  rationale: 'The phrase is syntactically compact and somewhat ambiguous: it may mean
    faithfulness characterized by the LORD, owed under oath before the LORD, or shown
    in imitation of the LORD’s own loyal love. The chosen rendering preserves the
    covenantal force without over-specifying a theological mechanism.'
