id: 1SA.20.21
reference: 1 Samuel 20:21
source:
  edition: WLC
  text: וְ/הִנֵּה֙ אֶשְׁלַ֣ח אֶת הַ/נַּ֔עַר לֵ֖ךְ מְצָ֣א אֶת הַ/חִצִּ֑ים אִם אָמֹר֩
    אֹמַ֨ר לַ/נַּ֜עַר הִנֵּ֥ה הַ/חִצִּ֣ים מִמְּ/ךָ֣ וָ/הֵ֗נָּה קָחֶ֧/נּוּ וָ/בֹ֛אָ/ה
    כִּֽי שָׁל֥וֹם לְ/ךָ֛ וְ/אֵ֥ין דָּבָ֖ר חַי יְהוָֽה־־־׀׀־־׃
translation:
  text: And look, I will send the young man, saying, ‘Go, find the arrows.’ If I plainly
    say to the young man, ‘Look, the arrows are on this side of you; get them and
    come,’ then there is peace for you and no danger, as the LORD lives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, ‘the arrows are nearer than you’ or ‘the arrows are on this side of
      you.’ The Hebrew indicates the arrows have fallen short of the attendant, not
      beyond him.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ‘as the LORD lives,’ an oath formula affirming the truth of the
      statement.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - Now look
  lexicon: HALOT
  rationale: Introduces the next step in Jonathan's signal plan with deictic immediacy.
    'Look' preserves the attention-getting force in readable modern English better
    than the more archaic 'behold.'
- source_word: אֶשְׁלַח אֶת־הַנַּעַר
  chosen: I will send the young man
  alternatives:
  - I will send the boy
  - I will send the servant
  lexicon: HALOT
  rationale: נַעַר can mean boy, youth, young man, or servant/attendant depending
    on context. Here Jonathan's attendant is in view; 'young man' preserves the age/status
    term without over-specifying servile function.
- source_word: לֵךְ מְצָא אֶת־הַחִצִּים
  chosen: saying, ‘Go, find the arrows’
  alternatives:
  - Go, get the arrows
  - Go, discover the arrows
  lexicon: HALOT
  rationale: The infinitive/imperative sequence is naturally represented in English
    as quoted instruction. 'Find' matches מָצָא straightforwardly; 'arrows' is the
    concrete object of the signal.
- source_word: אִם אָמֹר אֹמַר
  chosen: If I plainly say
  alternatives:
  - If I indeed say
  - If I keep saying
  - If I say
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the speech act.
    'Plainly say' captures the emphatic certainty without awkward literalism.
- source_word: הִנֵּה הַחִצִּים מִמְּךָ וָהֵנָּה
  chosen: Look, the arrows are on this side of you
  alternatives:
  - the arrows are nearer than you
  - the arrows are short of you
  - the arrows are beside you, here
  lexicon: HALOT
  rationale: The phrase indicates the arrows are nearer to Jonathan's attendant than
    beyond him. 'On this side of you' best conveys the directional signal in idiomatic
    English and fits the narrative contrast with the next verse's 'beyond you.'
- source_word: קָחֶנּוּ
  chosen: get them
  alternatives:
  - take them
  - fetch them
  lexicon: HALOT
  rationale: Although the suffix is singular in form, the referent is the plural 'arrows';
    English regularizes to 'them.' 'Get' is natural in context of retrieving arrows.
- source_word: וָבֹאָה
  chosen: and come
  alternatives:
  - and bring them here
  - and return
  lexicon: HALOT
  rationale: The imperative with directional ending calls the attendant back. 'Come'
    is concise and preserves the motion toward the speaker without adding an object
    not explicit in the verb.
- source_word: כִּי שָׁלוֹם לְךָ
  chosen: then there is peace for you
  alternatives:
  - for it is well with you
  - for you are safe
  lexicon: HALOT
  rationale: שָׁלוֹם here signals David's safety/well-being. 'There is peace for you'
    preserves the Hebrew noun rather than collapsing it entirely into 'safe,' while
    still communicating the signal's meaning.
- source_word: וְאֵין דָּבָר
  chosen: and no danger
  alternatives:
  - and there is nothing
  - and there is no matter
  - and nothing is wrong
  lexicon: HALOT
  rationale: In context דָּבָר means no adverse matter or threat. 'No danger' makes
    the intended sense explicit for modern readers.
- source_word: חַי יְהוָה
  chosen: as the LORD lives
  alternatives:
  - by the life of the LORD
  - the LORD lives
  lexicon: HALOT
  rationale: Standard Hebrew oath formula. The divine name is rendered 'the LORD'
    per doctrine for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's prescribed default rendering for the divine name,
    preserving reverential convention and broad English Bible recognizability.
