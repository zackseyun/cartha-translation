id: 1SA.20.18
reference: 1 Samuel 20:18
source:
  edition: WLC
  text: וַ/יֹּֽאמֶר ל֥/וֹ יְהוֹנָתָ֖ן מָחָ֣ר חֹ֑דֶשׁ וְ/נִפְקַ֕דְתָּ כִּ֥י יִפָּקֵ֖ד
    מוֹשָׁבֶֽ/ךָ־׃
translation:
  text: Jonathan said to him, “Tomorrow is the new moon, and you will be missed, because
    your seat will be empty.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “you will be noticed … because your place will be missing/unoccupied.”
      The Hebrew repeats the verb פקד in both clauses, creating a wordplay that English
      cannot preserve neatly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר לּוֹ
  chosen: said to him
  alternatives:
  - said to him
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר with indirect object suffix; straightforwardly
    rendered as reported speech introduction.
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  rationale: Personal name is transliterated by standard English convention, following
    the translation philosophy to transliterate names.
- source_word: מָחָר
  chosen: Tomorrow
  alternatives:
  - tomorrow
  lexicon: HALOT
  rationale: Temporal adverb introducing the timing of the event.
- source_word: חֹדֶשׁ
  chosen: the new moon
  alternatives:
  - new moon
  - month
  lexicon: HALOT
  rationale: In this court-setting context, חֹדֶשׁ refers to the new moon observance/feast
    rather than merely 'month.' The following verses concern attendance at the royal
    meal associated with the new moon.
- source_word: וְנִפְקַדְתָּ
  chosen: you will be missed
  alternatives:
  - you will be noticed
  - your absence will be noted
  - you will be sought
  lexicon: HALOT
  rationale: Nifal of פקד here conveys that David's absence will draw attention. 'You
    will be missed' is idiomatic English that fits the immediate explanation about
    his seat being empty, while preserving the passive sense.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason David will be missed; 'because' is natural modern
    English.
- source_word: יִפָּקֵד
  chosen: will be empty
  alternatives:
  - will be missing
  - will be unoccupied
  lexicon: HALOT
  rationale: 'Although the verb is again פקד in the Nifal, the subject is מוֹשָׁבֶךָ
    (''your seat/place''). In English, the sense is best expressed by the result:
    the seat will be found empty. This avoids awkward repetition while preserving
    the logic of the Hebrew.'
- source_word: מוֹשָׁבֶךָ
  chosen: your seat
  alternatives:
  - your place
  - your dwelling place
  lexicon: HALOT
  rationale: In the banquet context, מוֹשָׁב refers to David's place at the table,
    hence 'seat' is more precise than the broader 'place.'
