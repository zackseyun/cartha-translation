id: 1SA.20.41
reference: 1 Samuel 20:41
source:
  edition: WLC
  text: הַ/נַּעַר֮ בָּא֒ וְ/דָוִ֗ד קָ֚ם מֵ/אֵ֣צֶל הַ/נֶּ֔גֶב וַ/יִּפֹּ֨ל לְ/אַפָּ֥י/ו
    אַ֛רְצָ/ה וַ/יִּשְׁתַּ֖חוּ שָׁלֹ֣שׁ פְּעָמִ֑ים וַֽ/יִּשְּׁק֣וּ אִ֣ישׁ אֶת רֵעֵ֗/הוּ
    וַ/יִּבְכּוּ֙ אִ֣ישׁ אֶת רֵעֵ֔/הוּ עַד דָּוִ֖ד הִגְדִּֽיל׀־־־׃
translation:
  text: When the boy had come, David rose from beside the mound and fell with his
    face to the ground and bowed three times. Then they kissed one another and wept
    with one another, until David wept the more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'from beside the Negeb/south'; the phrase is difficult, and many
      understand it as referring to the mound or stone near David's hiding place in
      the immediate context.
    reason: alternative_reading
  - marker: b
    text: Or 'until David wept more,' that is, his weeping exceeded Jonathan's or
      grew more intense.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּעַר בָּא
  chosen: When the boy had come
  alternatives:
  - When the young man came
  - After the boy came
  lexicon: HALOT
  rationale: נַעַר commonly means 'boy, youth, servant' depending on context. Here
    it refers to Jonathan's attendant from the preceding scene, so 'boy' is the most
    natural and contextually specific rendering. The clause is rendered temporally
    in English for smooth narrative flow.
- source_word: מֵאֵצֶל הַנֶּגֶב
  chosen: from beside the mound
  alternatives:
  - from beside the south side
  - from beside the Negeb
  - from the south side
  lexicon: HALOT
  rationale: The Hebrew phrase is difficult. While נֶגֶב often means 'south/Negeb,'
    in this context many understand a textual or contextual sense related to the stone/marker
    near which David was hiding (cf. surrounding verses and ancient versions). 'Beside
    the mound' best fits the immediate narrative setting and traditional understanding
    of David's hiding place, while preserving a concrete location rather than an abstract
    direction.
- source_word: וַיִּפֹּל לְאַפָּיו אַרְצָה
  chosen: fell with his face to the ground
  alternatives:
  - fell on his face to the ground
  - prostrated himself to the ground
  lexicon: HALOT
  rationale: The idiom literally denotes falling on one's face earthward. 'Fell with
    his face to the ground' is natural English and preserves the physical posture
    without over-paraphrasing.
- source_word: וַיִּשְׁתַּחוּ שָׁלֹשׁ פְּעָמִים
  chosen: and bowed three times
  alternatives:
  - and prostrated himself three times
  - and paid homage three times
  lexicon: HALOT
  rationale: The verb שׁחה in this stem often denotes bowing down. Since the subject
    here is effectively David in sequence after singular verbs, 'bowed three times'
    is the clearest rendering. 'Paid homage' would over-interpret the social meaning.
- source_word: וַיִּשְּׁקוּ אִישׁ אֶת רֵעֵהוּ
  chosen: Then they kissed one another
  alternatives:
  - and each kissed his friend
  - and they kissed each other
  lexicon: HALOT
  rationale: The reciprocal construction אִישׁ אֶת־רֵעֵהוּ is idiomatically rendered
    'one another.' 'Kissed' should be retained literally as a customary sign of affection
    and farewell; no euphemizing is warranted.
- source_word: וַיִּבְכּוּ אִישׁ אֶת רֵעֵהוּ
  chosen: and wept with one another
  alternatives:
  - and each wept with his friend
  - and they wept together
  lexicon: HALOT
  rationale: Again the reciprocal sense is best conveyed idiomatically. 'Wept with
    one another' preserves both mutuality and emotional force better than the flatter
    'wept together.'
- source_word: עַד דָּוִד הִגְדִּיל
  chosen: until David wept the more
  alternatives:
  - until David exceeded
  - until David wept most
  - until David became great
  lexicon: HALOT
  rationale: 'The verb גדל literally means ''became great/grew,'' but here functions
    idiomatically in context of weeping: David''s weeping surpassed Jonathan''s or
    intensified beyond it. ''Wept the more'' captures the comparative force in natural
    English without adding an explicit object absent from the Hebrew.'
