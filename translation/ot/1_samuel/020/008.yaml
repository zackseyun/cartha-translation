id: 1SA.20.8
reference: 1 Samuel 20:8
source:
  edition: WLC
  text: וְ/עָשִׂ֤יתָ חֶ֨סֶד֙ עַל עַבְדֶּ֔/ךָ כִּ֚י בִּ/בְרִ֣ית יְהוָ֔ה הֵבֵ֥אתָ אֶֽת
    עַבְדְּ/ךָ֖ עִמָּ֑/ךְ וְ/אִם יֶשׁ בִּ֤/י עָוֺן֙ הֲמִיתֵ֣/נִי אַ֔תָּה וְ/עַד אָבִ֖י/ךָ
    לָ/מָּה זֶּ֥ה תְבִיאֵֽ/נִי־־־־־־׃פ
translation:
  text: So show kindness to your servant, for you have brought your servant into the
    covenant of the LORD with yourself. But if there is guilt in me, put me to death
    yourself; why should you bring me to your father?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'show covenant loyalty to your servant.' The Hebrew חֶסֶד can carry the
      sense of loyal, covenantal kindness.
    reason: lexical_alternative
  - marker: b
    text: Or 'you have brought your servant with you into the covenant of the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָשִׂיתָ חֶסֶד
  chosen: show kindness
  alternatives:
  - deal kindly
  - show covenant loyalty
  - do steadfast love
  lexicon: HALOT
  rationale: חֶסֶד carries a range including kindness, loyal love, and covenantal
    faithfulness. In this immediate interpersonal plea, 'show kindness' is natural
    English while still allowing the covenantal backdrop to be supplied by the following
    clause about the covenant of the LORD.
- source_word: עַל עבדך
  chosen: to your servant
  alternatives:
  - for your servant
  - toward your servant
  lexicon: HALOT
  rationale: The preposition עַל after עשה חסד idiomatically expresses showing kindness
    toward someone. 'To your servant' is idiomatic English in direct address.
- source_word: עבדך
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, here it functions as a deferential
    self-reference in courtly speech between Jonathan and David. 'Servant' best matches
    the social-pragmatic force without overstating chattel status.
- source_word: בברית יהוה
  chosen: into the covenant of the LORD
  alternatives:
  - by the covenant of the LORD
  - in a covenant of the LORD
  lexicon: HALOT
  rationale: The phrase refers to the solemn covenant bond made before YHWH. 'Into
    the covenant of the LORD' captures the sense of being brought into covenant relationship
    under the LORD's witness and authority.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD'.
- source_word: הבאת את עבדך עמך
  chosen: you have brought your servant into the covenant of the LORD with yourself
  alternatives:
  - you have brought your servant with you into the covenant of the LORD
  - you have entered your servant with yourself into the covenant of the LORD
  lexicon: HALOT
  rationale: The Hiphil of בוא means 'bring.' With עמך, the sense is that Jonathan
    has brought David into covenant together with himself. English requires unpacking
    the relation, and 'with yourself' preserves the reflexive relational force.
- source_word: ואם יש בי עון
  chosen: But if there is guilt in me
  alternatives:
  - if there is iniquity in me
  - if I am guilty
  lexicon: HALOT
  rationale: עָוֹן can mean iniquity, guilt, or punishment for guilt. Here Jonathan
    invites David to act if he is actually culpable, so 'guilt' is the clearest idiomatic
    rendering.
- source_word: המיתני אתה
  chosen: put me to death yourself
  alternatives:
  - kill me yourself
  lexicon: HALOT
  rationale: '''Put me to death'' is slightly more formal and fits the gravity of
    the appeal, while preserving the emphatic אַתָּה with ''yourself.'''
- source_word: ועד אביך למה זה תביאני
  chosen: why should you bring me to your father?
  alternatives:
  - why bring me to your father?
  - why would you bring me as far as your father?
  lexicon: HALOT
  rationale: 'The clause is rhetorical: if David is guilty, Jonathan himself should
    execute judgment rather than hand him over to Saul. ''Why should you bring me
    to your father?'' communicates the rhetorical force clearly. The prefixed ועד
    is best taken idiomatically in the sense of ''as far as / on to,'' which English
    can omit without loss by simply saying ''to your father.'''
