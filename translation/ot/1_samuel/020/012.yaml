theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and does not introduce
    additional theological interpretation beyond the source text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Supplying an oath formula in an elliptical Hebrew clause
  chosen_reading: As the LORD, the God of Israel, lives
  alternative_readings:
  - The LORD, the God of Israel, [be witness]
  - By the LORD, the God of Israel
  rationale: The Hebrew as transmitted is elliptical after the divine invocation.
    Supplying the common oath sense is necessary for intelligible English and best
    fits the syntax and context of Jonathan's solemn pledge.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; original-language
    primacy'
