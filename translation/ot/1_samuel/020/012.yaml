id: 1SA.20.12
reference: 1 Samuel 20:12
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוֹנָתָ֜ן אֶל דָּוִ֗ד יְהוָ֞ה אֱלֹהֵ֤י יִשְׂרָאֵל֙ כִּֽי אֶחְקֹ֣ר
    אֶת אָבִ֗/י כָּ/עֵ֤ת מָחָר֙ הַ/שְּׁלִשִׁ֔ית וְ/הִנֵּה ט֖וֹב אֶל דָּוִ֑ד וְ/לֹֽא
    אָז֙ אֶשְׁלַ֣ח אֵלֶ֔י/ךָ וְ/גָלִ֖יתִי אֶת אָזְנֶֽ/ךָ־־־׀־־־־׃
translation:
  text: And Jonathan said to David, “As the LORD, the God of Israel, lives, when I
    sound out my father about this time tomorrow, or the third day, and behold, if
    it is favorable toward David, shall I not then send to you and uncover your ear?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “and uncover your ear,” an idiom meaning “tell you” or
      “disclose it to you.”
    reason: lexical_alternative
  - marker: b
    text: The Hebrew wording is elliptical and difficult; the sense is a solemn oath
      or pledge invoking the LORD as witness.
    reason: textual_variant
  - marker: c
    text: Or “about this time tomorrow, on the third day”; the Hebrew temporal expression
      is compressed.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible practice.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct phrase rendered straightforwardly and appositionally after
    the divine name.
- source_word: כִּי
  chosen: As ... lives
  alternatives:
  - indeed
  - surely
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces an oath-like formula after invocation of the LORD.
    English idiom requires supplying the sense of an oath, best captured as 'As ...
    lives,' rather than a wooden 'that.'
- source_word: אֶחְקֹר
  chosen: I sound out
  alternatives:
  - I search out
  - I investigate
  - I examine
  lexicon: HALOT
  rationale: In context Jonathan is probing Saul's disposition rather than conducting
    a formal investigation. 'Sound out' captures the interpersonal, exploratory sense
    naturally in English.
- source_word: אָבִי
  chosen: my father
  lexicon: HALOT
  rationale: Literal familial term; no reason to substitute 'Saul' in the main text.
- source_word: כָּעֵת מָחָר הַשְּׁלִשִׁית
  chosen: about this time tomorrow, or the third day
  alternatives:
  - about this time tomorrow, the third day
  - at this time tomorrow, on the third day
  lexicon: HALOT
  rationale: The Hebrew sequence is compressed and somewhat elliptical. In context
    with the surrounding narrative, Jonathan refers to checking by tomorrow or by
    the third day. 'Or the third day' makes the temporal progression intelligible
    without overparaphrasing.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and see
  - and if it turns out
  lexicon: HALOT
  rationale: Retains the discourse marker's vividness while fitting English narrative
    style.
- source_word: טוֹב אֶל דָּוִד
  chosen: it is favorable toward David
  alternatives:
  - there is good toward David
  - my father is well disposed toward David
  - it is good for David
  lexicon: HALOT
  rationale: The phrase concerns Saul's attitude toward David. 'Favorable toward David'
    expresses the relational sense of טוֹב + אֶל.
- source_word: וְלֹא אָז אֶשְׁלַח אֵלֶיךָ
  chosen: shall I not then send to you
  alternatives:
  - will I not then send to you
  - if not, then I will send to you
  lexicon: HALOT
  rationale: The Masoretic wording is difficult, and many understand it as part of
    an oath-like assurance with rhetorical force. Rendering it as a rhetorical question
    preserves the Hebrew form and flow.
- source_word: וְגָלִיתִי אֶת אָזְנֶךָ
  chosen: and uncover your ear
  alternatives:
  - and tell you
  - and disclose it to you
  - and reveal it to you
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'uncover the ear,' that is, reveal something
    confidentially. The main text keeps the metaphor for transparency; a footnote
    preserves the idiomatic sense.
