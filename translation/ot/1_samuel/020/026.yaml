theological_decisions:
- issue: Nature of impurity implied by טָהוֹר / not clean
  chosen_reading: ritual impurity connected with participation in the meal
  alternative_readings:
  - general moral impurity
  rationale: In the narrative setting of the New Moon meal and Saul's assumption about
    Jonathan's absence, the language most naturally refers to ceremonial/ritual uncleanness
    rather than moral defilement. The translation keeps the broader term 'clean' in
    the main text but documents the ritual sense in a footnote.
