id: 1SA.20.27
reference: 1 Samuel 20:27
source:
  edition: WLC
  text: וַ/יְהִ֗י מִֽ/מָּחֳרַ֤ת הַ/חֹ֨דֶשׁ֙ הַ/שֵּׁנִ֔י וַ/יִּפָּקֵ֖ד מְק֣וֹם דָּוִ֑ד
    וַ/יֹּ֤אמֶר שָׁאוּל֙ אֶל יְהוֹנָתָ֣ן בְּנ֔/וֹ מַדּ֜וּעַ לֹא בָ֧א בֶן יִשַׁ֛י גַּם
    תְּמ֥וֹל גַּם הַ/יּ֖וֹם אֶל הַ/לָּֽחֶםס־־־־־־׃
translation:
  text: And it happened on the next day, the second day of the new moon, that David’s
    place was empty. So Saul said to Jonathan his son, “Why has the son of Jesse not
    come to the meal either yesterday or today?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to the bread,' a common way of referring to the meal or table fellowship.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמָּחֳרַת
  chosen: on the next day
  alternatives:
  - the next day
  - on the morrow
  lexicon: HALOT
  rationale: Temporal expression meaning the day after the previously mentioned day.
    'On the next day' is natural modern English and preserves the sequence.
- source_word: הַחֹדֶשׁ הַשֵּׁנִי
  chosen: the second day of the new moon
  alternatives:
  - the second day of the month
  - the second day of the new moon festival
  lexicon: HALOT
  rationale: In context of the royal table and the preceding narrative, חֹדֶשׁ refers
    to the new moon observance rather than merely 'month.' 'The second day of the
    new moon' best captures the idiom while staying close to the Hebrew.
- source_word: וַיִּפָּקֵד מְקוֹם דָּוִד
  chosen: David’s place was empty
  alternatives:
  - David’s place was missing
  - David’s place was unoccupied
  - the place of David was noticed as absent
  lexicon: HALOT
  rationale: The Niphal of פקד here conveys that David's place was found lacking/absent
    at the table. 'Was empty' is idiomatic English in this meal setting and communicates
    the practical sense clearly.
- source_word: בְּנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: Straightforward filial designation; retained explicitly for clarity and
    fidelity.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Standard interrogative asking reason; 'Why' is the natural English equivalent.
- source_word: בֶן יִשַׁי
  chosen: the son of Jesse
  alternatives:
  - David
  lexicon: HALOT
  rationale: Saul deliberately refers to David by patronymic rather than personal
    name, likely with emotional distance or disdain. The translation preserves this
    rhetorical effect rather than smoothing to 'David.'
- source_word: גַּם תְּמוֹל גַּם הַיּוֹם
  chosen: either yesterday or today
  alternatives:
  - both yesterday and today
  lexicon: HALOT
  rationale: The Hebrew literally says 'also yesterday, also today.' In an English
    negative question, 'either yesterday or today' is the most idiomatic rendering
    while preserving the two-day scope of Saul's complaint.
- source_word: אֶל הַלָּחֶם
  chosen: to the meal
  alternatives:
  - to the bread
  - to the table
  lexicon: HALOT
  rationale: Although לֶחֶם literally means 'bread,' in this context it stands metonymically
    for the meal at Saul's table. 'To the meal' communicates the intended sense in
    readable English without over-literal awkwardness.
