id: 1SA.20.36
reference: 1 Samuel 20:36
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לְ/נַעֲר֔/וֹ רֻ֗ץ מְצָ֥א נָא֙ אֶת הַ֣/חִצִּ֔ים אֲשֶׁ֥ר אָנֹכִ֖י
    מוֹרֶ֑ה הַ/נַּ֣עַר רָ֔ץ וְ/הֽוּא יָרָ֥ה הַ/חֵ֖צִי לְ/הַעֲבִרֽ/וֹ־־׃
translation:
  text: He said to his young man, “Run, please, find the arrows that I am shooting.”
    The young man ran, and he shot the arrow beyond him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “past him,” that is, beyond the young man.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְנַעֲרוֹ / הַנַּעַר
  chosen: his young man / the young man
  alternatives:
  - his servant
  - his boy
  lexicon: HALOT
  rationale: נַעַר commonly denotes a youth, attendant, or servant. In this narrative
    context it refers to Jonathan’s attendant. 'Young man' preserves the age/status
    nuance without over-specifying servile status; the repeated noun is kept consistently
    in English.
- source_word: רוּץ
  chosen: Run
  alternatives:
  - hurry
  - run off
  lexicon: HALOT
  rationale: Imperative of רוץ is straightforwardly 'run.' A more dynamic 'hurry'
    is possible, but 'run' better preserves the concrete action.
- source_word: מְצָא נָא
  chosen: find, please
  alternatives:
  - please find
  - go find
  lexicon: HALOT
  rationale: מְצָא means 'find'; נָא adds politeness/urgency. Rendering with 'please'
    preserves the particle's softening force without paraphrase.
- source_word: הַחִצִּים
  chosen: the arrows
  lexicon: HALOT
  rationale: Plural noun; direct object of 'find.' 'Arrows' is the plain sense.
- source_word: אֲשֶׁר אָנֹכִי מוֹרֶה
  chosen: that I am shooting
  alternatives:
  - that I shoot
  - which I am about to shoot
  lexicon: HALOT
  rationale: The participle מוֹרֶה from ירה indicates ongoing/imminent action in context.
    'Am shooting' gives natural English for the present action as Jonathan sends the
    attendant to retrieve the arrows.
- source_word: וְהוּא יָרָה הַחֵצִי
  chosen: and he shot the arrow
  alternatives:
  - and he shot an arrow
  lexicon: HALOT
  rationale: The singular with article is best rendered literally as 'the arrow,'
    likely a representative singular after the earlier plural 'arrows.' English can
    sound slightly marked, but it preserves the Hebrew form.
- source_word: לְהַעֲבִירוֹ
  chosen: beyond him
  alternatives:
  - past him
  - to send it past him
  lexicon: HALOT
  rationale: Hiphil infinitive of עבר with 3ms suffix likely means causing the arrow
    to pass beyond the young man. 'Beyond him' is concise and idiomatic while preserving
    the directional signal crucial to the narrative.
