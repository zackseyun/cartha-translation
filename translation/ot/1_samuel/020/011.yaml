id: 1SA.20.11
reference: 1 Samuel 20:11
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהֽוֹנָתָן֙ אֶל דָּוִ֔ד לְכָ֖/ה וְ/נֵצֵ֣א הַ/שָּׂדֶ֑ה וַ/יֵּצְא֥וּ
    שְׁנֵי/הֶ֖ם הַ/שָּׂדֶֽה־׃ס
translation:
  text: Then Jonathan said to David, “Come, and let us go out into the field.” So
    both of them went out into the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Go, and let us go out to the field.” The imperative לְכָה can be rendered
      more literally as “go,” but in this invitational context “come” is more natural
      English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence better than a bare 'said.'
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  rationale: Personal name is transliterated by standard English convention, per translation
    philosophy.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural modern English
    equivalent.
- source_word: דָּוִד
  chosen: David
  rationale: Personal name is transliterated by standard English convention.
- source_word: לְכָה
  chosen: Come
  alternatives:
  - Go
  - Come now
  lexicon: HALOT
  rationale: As an idiomatic imperative inviting movement together, 'Come' fits the
    discourse context better than the more wooden 'Go.' Jonathan is summoning David
    to accompany him.
- source_word: וְנֵצֵא
  chosen: and let us go out
  alternatives:
  - and we will go out
  - and let us go
  lexicon: HALOT
  rationale: The cohortative first person plural expresses invitation/proposal. 'Let
    us go out' best captures the volitional nuance in English.
- source_word: הַשָּׂדֶה
  chosen: the field
  alternatives:
  - the countryside
  - the open field
  lexicon: HALOT
  rationale: שָׂדֶה normally denotes a field/open country. 'The field' is the most
    direct and contextually sufficient rendering here, and its repetition is preserved.
- source_word: וַיֵּצְאוּ
  chosen: So ... went out
  alternatives:
  - And ... went out
  - Then ... went out
  lexicon: HALOT
  rationale: Narrative waw marks the resulting action. 'So' communicates consequence
    from Jonathan's invitation in idiomatic English.
- source_word: שְׁנֵיהֶם
  chosen: both of them
  alternatives:
  - the two of them
  - both
  lexicon: HALOT
  rationale: The dual expression emphasizes that Jonathan and David went together.
    'Both of them' is clear, natural, and preserves the emphasis.
- source_word: הַשָּׂדֶה
  chosen: into the field
  alternatives:
  - to the field
  - the field
  lexicon: HALOT
  rationale: With the motion verb 'go out,' English idiom prefers 'into the field'
    to express movement toward and into the open area. The repeated destination is
    retained rather than omitted.
