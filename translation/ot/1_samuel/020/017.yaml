id: 1SA.20.17
reference: 1 Samuel 20:17
source:
  edition: WLC
  text: וַ/יּ֤וֹסֶף יְהֽוֹנָתָן֙ לְ/הַשְׁבִּ֣יעַ אֶת דָּוִ֔ד בְּ/אַהֲבָת֖/וֹ אֹת֑/וֹ
    כִּֽי אַהֲבַ֥ת נַפְשׁ֖/וֹ אֲהֵבֽ/וֹ־־׃ס
translation:
  text: And Jonathan made David swear again by his love for him, for he loved him
    as he loved his own soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Jonathan continued to make David swear' or 'Jonathan put David under
      oath again.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew, 'for he loved him with the love of his own soul,' an idiom expressing
      profound personal devotion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹסֶף
  chosen: made ... again
  alternatives:
  - continued
  - added
  lexicon: HALOT
  rationale: The verb יסף literally means 'added' or 'continued,' but with the following
    infinitive it idiomatically indicates repetition. In English, 'made David swear
    again' best captures the sense naturally and clearly.
- source_word: לְהַשְׁבִּיעַ
  chosen: made David swear
  alternatives:
  - caused David to swear
  - put David under oath
  lexicon: HALOT
  rationale: The Hiphil of שבע means to cause someone to swear or place under oath.
    'Made David swear' is concise and idiomatic while preserving the causative force.
- source_word: בְּאַהֲבָתוֹ אֹתוֹ
  chosen: by his love for him
  alternatives:
  - because of his love for him
  - in his love for him
  lexicon: HALOT
  rationale: The preposition ב with the noun 'love' here most naturally expresses
    the basis or motive of the oath-renewal. 'By his love for him' preserves the compact
    Hebrew phrasing and fits oath language in English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the explanation for Jonathan's action. 'For' gives
    a smooth explanatory connection in literary English.
- source_word: אַהֲבַת נַפְשׁוֹ
  chosen: as he loved his own soul
  alternatives:
  - with the love of his own life
  - as his own life
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, self, or life. In this idiom, 'his own soul' preserves
    the Hebrew expression and its emotional depth, while remaining understandable
    in English.
- source_word: אֲהֵבוֹ
  chosen: he loved him
  alternatives:
  - he had loved him
  lexicon: HALOT
  rationale: The qatal form states the explanatory fact of Jonathan's love. Simple
    past works well in English narrative context.
