theological_decisions:
- issue: Nature of Jonathan's love for David
  chosen_reading: Rendered as covenantal personal love without importing romantic
    or sexual implications not explicit in the text.
  alternative_readings:
  - Rendered with more interpretive language suggesting romantic attachment
  - Rendered with flattened language such as 'friendship' alone
  rationale: The repeated אהב language is strong and should remain 'love.' At the
    same time, the translation should not import claims beyond the Hebrew text. 'He
    loved him as he loved his own soul' preserves the intensity and covenantal depth
    without interpretive overreach.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never import doctrinal claims the text does not make.'
