id: 1SA.20.35
reference: 1 Samuel 20:35
source:
  edition: WLC
  text: וַ/יְהִ֣י בַ/בֹּ֔קֶר וַ/יֵּצֵ֧א יְהוֹנָתָ֛ן הַ/שָּׂדֶ֖ה לְ/מוֹעֵ֣ד דָּוִ֑ד
    וְ/נַ֥עַר קָטֹ֖ן עִמּֽ/וֹ׃
translation:
  text: In the morning, Jonathan went out to the field for the appointed meeting with
    David, and a young boy was with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the appointed time with David.' The Hebrew מוֹעֵד can mean either
      an appointed time or an appointed meeting; the context of their arranged rendezvous
      supports 'appointed meeting.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a small boy' or 'a young servant.' The Hebrew נַעַר can refer to a boy,
      youth, or servant depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: In the morning
  alternatives:
  - And it happened
  lexicon: HALOT
  rationale: The waw-consecutive plus היה introduces the next event in narrative sequence.
    In English, the idiomatic temporal opening is better carried by the following
    phrase rather than a wooden 'and it happened,' which adds little meaning.
- source_word: בַּבֹּקֶר
  chosen: In the morning
  alternatives:
  - when morning came
  lexicon: HALOT
  rationale: Temporal phrase marking the time of the action. 'In the morning' is natural
    modern English and preserves the straightforward temporal sense.
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - went
  lexicon: HALOT
  rationale: יצא commonly means 'go out/come out.' 'Went out' preserves the directional
    nuance present in the Hebrew narrative.
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  rationale: Standard English transliteration of the personal name.
- source_word: הַשָּׂדֶה
  chosen: to the field
  alternatives:
  - into the field
  - to the countryside
  lexicon: HALOT
  rationale: שָׂדֶה denotes an open field/country area. 'To the field' fits the definite
    noun and the narrative setting established in the surrounding context.
- source_word: לְמוֹעֵד דָּוִד
  chosen: for the appointed meeting with David
  alternatives:
  - at the appointed time for David
  - for David's appointment
  lexicon: HALOT
  rationale: מוֹעֵד can denote an appointed time or meeting. In this context, where
    Jonathan and David had arranged a signal and rendezvous, 'appointed meeting with
    David' best captures the relational and situational sense without over-paraphrasing.
- source_word: וְנַעַר קָטֹן
  chosen: and a young boy
  alternatives:
  - and a small boy
  - and a young servant
  lexicon: HALOT
  rationale: נַעַר means boy/youth/servant depending on context; קָטֹן marks him as
    young/small. Since the text emphasizes age/smallness rather than service role,
    'a young boy' is the clearest rendering.
- source_word: עִמּוֹ
  chosen: was with him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: English supplies 'was' for a complete clause. The phrase simply states
    accompaniment.
