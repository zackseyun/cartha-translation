id: 1SA.20.37
reference: 1 Samuel 20:37
source:
  edition: WLC
  text: וַ/יָּבֹ֤א הַ/נַּ֨עַר֙ עַד מְק֣וֹם הַ/חֵ֔צִי אֲשֶׁ֥ר יָרָ֖ה יְהוֹנָתָ֑ן וַ/יִּקְרָ֨א
    יְהוֹנָתָ֜ן אַחֲרֵ֤י הַ/נַּ֨עַר֙ וַ/יֹּ֔אמֶר הֲ/ל֥וֹא הַ/חֵ֖צִי מִמְּ/ךָ֥ וָ/הָֽלְאָה־׃
translation:
  text: When the boy came to the place of the arrow that Jonathan had shot, Jonathan
    called after the boy and said, “Is not the arrow beyond you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “farther than you” / “past you and beyond.” The Hebrew phrase literally
      means “from you and onward.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of בוא, best rendered with simple past 'came'
    in English narrative style.
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the young man
  - the servant
  lexicon: HALOT
  rationale: נַעַר can denote a youth, attendant, or servant. In this scene the figure
    is a young attendant sent by Jonathan; 'the boy' is natural English and fits the
    immediate context.
- source_word: עַד מְקוֹם הַחֵצִי
  chosen: to the place of the arrow
  alternatives:
  - as far as the place of the arrow
  - to the spot where the arrow was
  lexicon: HALOT
  rationale: מְקוֹם is 'place/spot' and עַד marks movement up to that location. 'To
    the place of the arrow' preserves the Hebrew structure while remaining readable.
- source_word: אֲשֶׁר יָרָה יְהוֹנָתָן
  chosen: that Jonathan had shot
  alternatives:
  - which Jonathan shot
  - that Jonathan had cast
  lexicon: HALOT
  rationale: ירה here refers to shooting an arrow. English past perfect 'had shot'
    clarifies the prior action relative to the boy's arrival.
- source_word: וַיִּקְרָא ... אַחֲרֵי
  chosen: called after
  alternatives:
  - called out after
  - cried out behind
  lexicon: HALOT
  rationale: קרא with אַחֲרֵי idiomatically means calling after someone who is ahead.
    'Called after' is concise and idiomatic.
- source_word: הֲלוֹא
  chosen: Is not
  alternatives:
  - Isn't
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Is not' preserves
    the rhetorical force with a slightly formal tone suitable to the scene.
- source_word: הַחֵצִי
  chosen: the arrow
  alternatives:
  - the shaft
  lexicon: HALOT
  rationale: Standard rendering of חֵץ in this context.
- source_word: מִמְּךָ וָהָלְאָה
  chosen: beyond you
  alternatives:
  - farther than you
  - past you and beyond
  lexicon: HALOT
  rationale: The phrase means 'from you and farther on / beyond.' In context Jonathan
    is signaling that the arrow lies beyond the boy, which also carries the coded
    message to David. 'Beyond you' is the most natural concise rendering.
