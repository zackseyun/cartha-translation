id: 1SA.20.2
reference: 1 Samuel 20:2
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר ל֣/וֹ חָלִילָ/ה֮ לֹ֣א תָמוּת֒ הִנֵּ֡ה ל/ו עשה אָבִ֜/י דָּבָ֣ר
    גָּד֗וֹל א֚וֹ דָּבָ֣ר קָטֹ֔ן וְ/לֹ֥א יִגְלֶ֖ה אֶת אָזְנִ֑/י וּ/מַדּוּעַ֩ יַסְתִּ֨יר
    אָבִ֥/י מִמֶּ֛/נִּי אֶת הַ/דָּבָ֥ר הַ/זֶּ֖ה אֵ֥ין זֹֽאת־־־׃
translation:
  text: He said to him, “Far from it! You will not die. Look, my father does nothing,
    great or small, without revealing it to me. So why would my father hide this matter
    from me? It is not so.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'does not uncover my ear,' an idiom meaning 'does not
      reveal it to me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלִילָה
  chosen: Far from it!
  alternatives:
  - By no means!
  - God forbid!
  lexicon: HALOT
  rationale: An idiomatic expression of strong denial or repudiation. 'Far from it'
    is natural modern English and avoids importing the divine element implied in traditional
    'God forbid,' which is not explicit here.
- source_word: לֹא תָמוּת
  chosen: You will not die
  alternatives:
  - You shall not die
  lexicon: HALOT
  rationale: Direct reassurance/prediction in context. 'Will not die' is idiomatic
    modern English; 'shall not' is more formal but less natural.
- source_word: הִנֵּה
  chosen: Look,
  alternatives:
  - Behold,
  - See,
  lexicon: HALOT
  rationale: Marks attention to the explanation that follows. 'Look' preserves the
    discourse function in readable modern English.
- source_word: דָּבָר גָּדוֹל א֚וֹ דָּבָר קָטֹן
  chosen: nothing, great or small
  alternatives:
  - anything, great or small
  - a great matter or a small matter
  lexicon: HALOT
  rationale: The Hebrew merism means 'anything at all.' 'Nothing, great or small'
    fits the English syntax after 'does nothing' and preserves the rhetorical force.
- source_word: וְלֹא יִגְלֶה אֶת אָזְנִי
  chosen: without revealing it to me
  alternatives:
  - and does not uncover my ear
  - and does not disclose it to me
  lexicon: HALOT
  rationale: The idiom 'uncover the ear' means to inform or disclose. The translation
    renders the sense rather than preserving an opaque Hebrew idiom in the main text.
- source_word: יַסְתִּיר
  chosen: hide
  alternatives:
  - conceal
  lexicon: HALOT
  rationale: Straightforward rendering of the Hiphil in context. 'Hide' is natural
    and matches the rhetorical question.
- source_word: הַדָּבָר הַזֶּה
  chosen: this matter
  alternatives:
  - this thing
  - this word
  lexicon: HALOT
  rationale: דבר here refers to the reported plan or affair, not merely a spoken word.
    'Matter' is idiomatic and contextually precise.
- source_word: אֵין זֹאת
  chosen: It is not so
  alternatives:
  - This is not so
  - There is nothing to it
  lexicon: HALOT
  rationale: A concluding denial of David's claim. 'It is not so' is concise, natural,
    and preserves the force of Jonathan's rejection.
- source_word: אָבִי
  chosen: my father
  lexicon: HALOT
  rationale: Repeated explicitly in Hebrew and retained in English for emphasis and
    relational clarity.
