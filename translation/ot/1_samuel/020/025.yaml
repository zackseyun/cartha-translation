id: 1SA.20.25
reference: 1 Samuel 20:25
source:
  edition: WLC
  text: וַ/יֵּ֣שֶׁב הַ֠/מֶּלֶךְ עַל מ֨וֹשָׁב֜/וֹ כְּ/פַ֣עַם בְּ/פַ֗עַם אֶל מוֹשַׁב֙
    הַ/קִּ֔יר וַ/יָּ֨קָם֙ יְה֣וֹנָתָ֔ן וַ/יֵּ֥שֶׁב אַבְנֵ֖ר מִ/צַּ֣ד שָׁא֑וּל וַ/יִּפָּקֵ֖ד
    מְק֥וֹם דָּוִֽד־׀־׃
translation:
  text: The king sat in his seat as at other times, by the wall-seat; and Jonathan
    rose, and Abner sat beside Saul, but David’s place was empty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “David’s place was missing,” that is, his assigned place at the meal
      was unoccupied.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun with article; contextually refers to Saul but the Hebrew
    uses the title rather than the personal name here, so 'the king' preserves the
    discourse form.
- source_word: מוֹשָׁבוֹ
  chosen: his seat
  alternatives:
  - his place
  - his dwelling place
  lexicon: HALOT
  rationale: In banquet context, מוֹשָׁב refers to a place of sitting rather than
    residence. 'Seat' is the most natural English equivalent here.
- source_word: כפעם בפעם
  chosen: as at other times
  alternatives:
  - as before
  - as time by time
  lexicon: HALOT
  rationale: Idiomatic expression meaning 'as on previous occasions' or 'as usual.'
    'As at other times' preserves the iterative sense without sounding wooden.
- source_word: אֶל מוֹשַׁב הַקִּיר
  chosen: by the wall-seat
  alternatives:
  - at the seat by the wall
  - toward the seat by the wall
  lexicon: HALOT
  rationale: The phrase identifies the location of the king's seat in relation to
    the wall. Although אֶל often means 'to/toward,' in this setting it functions locatively
    with the seat designation. 'By the wall-seat' is concise and natural while preserving
    the concrete image.
- source_word: וַיָּקָם
  chosen: rose
  alternatives:
  - stood up
  - got up
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol of קום. 'Rose' is idiomatic in formal narrative
    English.
- source_word: וַיֵּשֶׁב אַבְנֵר מִצַּד שָׁאוּל
  chosen: Abner sat beside Saul
  alternatives:
  - Abner sat at Saul's side
  - Abner sat next to Saul
  lexicon: HALOT
  rationale: מִצַּד means 'at the side of/beside.' 'Beside Saul' is straightforward
    and preserves the spatial relation.
- source_word: וַיִּפָּקֵד
  chosen: was empty
  alternatives:
  - was missing
  - was unoccupied
  - was absent
  lexicon: HALOT
  rationale: From פקד in the passive/nifal-like form, here idiomatically indicating
    that David's place lacked its expected occupant. English expresses this most naturally
    as 'was empty.' The sense is not that the place itself was counted, but that David
    was missing from it.
- source_word: מְקוֹם דָּוִד
  chosen: David’s place
  alternatives:
  - David's seat
  - the place of David
  lexicon: HALOT
  rationale: מָקוֹם is broader than 'seat,' but in this meal setting it refers to
    David's assigned place at table. 'Place' preserves the Hebrew term while fitting
    the context.
