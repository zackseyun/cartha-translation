id: 1SA.20.28
reference: 1 Samuel 20:28
source:
  edition: WLC
  text: וַ/יַּ֥עַן יְהוֹנָתָ֖ן אֶת שָׁא֑וּל נִשְׁאֹ֨ל נִשְׁאַ֥ל דָּוִ֛ד מֵ/עִמָּדִ֖/י
    עַד בֵּ֥ית לָֽחֶם־־׃
translation:
  text: Jonathan answered Saul, “David earnestly asked leave of me to go to Bethlehem.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “David repeatedly asked permission from me for Bethlehem.” The Hebrew
      uses an infinitive absolute with the finite verb for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - replied
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of ענה in dialogue contexts; 'answered'
    is the most direct and conventional rendering.
- source_word: אֶת שָׁאוּל
  chosen: Saul
  rationale: Direct-object marker plus proper name indicates the person addressed
    in response; in English, 'answered Saul' naturally conveys 'answered Saul/responded
    to Saul.'
- source_word: נִשְׁאֹל נִשְׁאַל
  chosen: earnestly asked leave
  alternatives:
  - asked repeatedly
  - asked permission
  - urgently requested
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of שאל intensifies the verbal
    idea. In this context, where David seeks permission to depart, English idiom is
    best captured by 'earnestly asked leave.' This preserves both the request and
    the emphatic force without awkward literalism.
- source_word: מֵעִמָּדִי
  chosen: of me
  alternatives:
  - from me
  - from being with me
  lexicon: HALOT
  rationale: The preposition with עִמָּד conveys source from Jonathan's presence/authority.
    'Of me' fits the English idiom 'asked leave of me'; 'from me' is possible but
    less natural here.
- source_word: עַד בֵּית לָחֶם
  chosen: to go to Bethlehem
  alternatives:
  - for Bethlehem
  - as far as Bethlehem
  lexicon: HALOT
  rationale: With שאל plus destination, the sense is request for permission to go
    to Bethlehem. Rendering the implied motion explicitly produces clear English while
    staying within the contextual sense. 'As far as Bethlehem' is overly literal and
    unnatural in this context.
- source_word: בֵּית לָחֶם
  chosen: Bethlehem
  rationale: Standard English transliteration of the place name.
