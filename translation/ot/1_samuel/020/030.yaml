id: 1SA.20.30
reference: 1 Samuel 20:30
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֤ף שָׁאוּל֙ בִּ/יה֣וֹנָתָ֔ן וַ/יֹּ֣אמֶר ל֔/וֹ בֶּֽן נַעֲוַ֖ת
    הַ/מַּרְדּ֑וּת הֲ/ל֣וֹא יָדַ֗עְתִּי כִּֽי בֹחֵ֤ר אַתָּה֙ לְ/בֶן יִשַׁ֔י לְ/בָ֨שְׁתְּ/ךָ֔
    וּ/לְ/בֹ֖שֶׁת עֶרְוַ֥ת אִמֶּֽ/ךָ־־־־׃
translation:
  text: Then Saul’s anger burned against Jonathan, and he said to him, “You son of
    a perverse, rebellious woman! Do I not know that you have chosen the son of Jesse,
    to your own shame and to the shame of your mother’s nakedness?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “You son of perversity and rebellion!” The Hebrew insult is difficult
      and highly idiomatic.
    reason: lexical_alternative
  - marker: b
    text: Or, “you are siding with the son of Jesse.”
    reason: lexical_alternative
  - marker: c
    text: The phrase “the shame of your mother’s nakedness” is a severe Hebrew expression
      of familial disgrace.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּחַר אַף
  chosen: Saul’s anger burned
  alternatives:
  - Saul became angry
  - Saul’s nose burned
  lexicon: HALOT
  rationale: The Hebrew idiom literally involves anger burning, with אַף ('nose/anger')
    functioning idiomatically for wrath. 'Anger burned' preserves the vividness without
    woodenly retaining 'nose.'
- source_word: בִּיהוֹנָתָן
  chosen: against Jonathan
  alternatives:
  - at Jonathan
  - with Jonathan
  lexicon: HALOT
  rationale: The preposition with חרה אף marks the object of anger. 'Against Jonathan'
    is natural English and reflects hostile direction.
- source_word: בֶּן נַעֲוַת הַמַּרְדּוּת
  chosen: You son of a perverse, rebellious woman
  alternatives:
  - You son of perversity and rebellion
  - You son of a rebellious perversion
  lexicon: HALOT
  rationale: This is an insult formula. נַעֲוַת likely conveys perversity/crookedness,
    and הַמַּרְדּוּת denotes rebellion. Supplying 'woman' makes the idiom intelligible
    in English while preserving the maternal insult implied by the Hebrew construction.
- source_word: הֲלוֹא יָדַעְתִּי
  chosen: Do I not know
  alternatives:
  - Do I not surely know
  - Surely I know
  lexicon: HALOT
  rationale: The interrogative-negative form is rhetorical. 'Do I not know' preserves
    the confrontational rhetorical question better than flattening it into an assertion.
- source_word: בֹחֵר אַתָּה לְבֶן יִשַׁי
  chosen: you have chosen the son of Jesse
  alternatives:
  - you are siding with the son of Jesse
  - you are choosing the son of Jesse
  lexicon: HALOT
  rationale: בחר is 'choose.' In context it implies taking David's side, but 'have
    chosen' keeps the lexical core while allowing the political sense to be inferred.
- source_word: לְבָשְׁתְּךָ
  chosen: to your own shame
  alternatives:
  - for your shame
  - to your disgrace
  lexicon: HALOT
  rationale: בֹּשֶׁת/בָּשְׁתְּ carries the sense of shame/disgrace. 'To your own shame'
    is idiomatic and reflects the lamed of result.
- source_word: וּלְבֹשֶׁת עֶרְוַת אִמֶּךָ
  chosen: and to the shame of your mother’s nakedness
  alternatives:
  - and to the shame of your mother’s exposure
  - and to the disgrace of your mother’s nakedness
  lexicon: HALOT
  rationale: עֶרְוָה is literally 'nakedness,' often with sexual or familial shame
    connotations. Retaining 'nakedness' preserves the force and offensiveness of Saul's
    insult better than softening to 'exposure,' while the phrase remains idiomatic
    enough in English.
