theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of the LORD being 'between' the two men
  chosen_reading: covenantal witness/guarantor between me and you
  alternative_readings:
  - mere spatial presence between us
  - general statement of divine awareness
  rationale: In context, Jonathan and David are reaffirming a solemn pact. The wording should preserve the covenantal force without over-expanding the text. 'The LORD is between me and you forever' leaves the witness/guarantor sense intact without paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
