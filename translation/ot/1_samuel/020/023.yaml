id: 1SA.20.23
reference: 1 Samuel 20:23
source:
  edition: WLC
  text: וְ/הַ֨/דָּבָ֔ר אֲשֶׁ֥ר דִּבַּ֖רְנוּ אֲנִ֣י וָ/אָ֑תָּה הִנֵּ֧ה יְהוָ֛ה בֵּינִ֥/י וּ/בֵינְ/ךָ֖ עַד עוֹלָֽם־׃ס
translation:
  text: And as for the matter that you and I have spoken of, behold, Yahweh is between me and you forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the word that you and I have spoken.' Hebrew דָּבָר can mean 'word,' 'matter,' or 'thing'; here it refers to the agreement just discussed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַדָּבָר
  chosen: And as for the matter
  alternatives:
  - And the matter
  - And concerning the matter
  - And the word
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' In this covenantal context, referring back to what Jonathan and David have agreed upon, 'matter' best conveys the agreed arrangement without sounding overly wooden. The prefixed conjunction is carried with 'And as for' to mark continuation and topical emphasis.
- source_word: אֲשֶׁר דִּבַּרְנוּ
  chosen: that ... have spoken of
  alternatives:
  - which ... have spoken
  - that ... said
  lexicon: HALOT
  rationale: The relative clause modifies 'matter.' English idiom prefers 'spoken of' with 'matter,' making explicit that the subject is the previously discussed agreement. 'Have spoken of' captures the completed prior conversation with present relevance.
- source_word: אֲנִי וָאָתָּה
  chosen: you and I
  alternatives:
  - I and you
  - me and you
  lexicon: HALOT
  rationale: Hebrew places 'I and you,' but natural English reverses to 'you and I' in subject position. This preserves the mutual personal reference without awkwardness.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - see
  - look
  - indeed
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing solemn attention. 'Behold' preserves the gravity and covenantal tone better than the more colloquial 'look' or the flatter 'indeed.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בֵּינִי וּבֵינְךָ
  chosen: between me and you
  alternatives:
  - between you and me
  lexicon: HALOT
  rationale: The phrase denotes the LORD as witness/guarantor between the two covenant partners. 'Between me and you' follows the Hebrew order and keeps the personal solemnity of Jonathan's statement.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - unto eternity
  - perpetually
  lexicon: HALOT
  rationale: The idiom expresses enduring duration. 'Forever' is clear modern English and suitably weighty in this covenant context.
