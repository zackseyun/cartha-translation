id: 1SA.20.31
reference: 1 Samuel 20:31
source:
  edition: WLC
  text: כִּ֣י כָל הַ/יָּמִ֗ים אֲשֶׁ֤ר בֶּן יִשַׁי֙ חַ֣י עַל הָ/אֲדָמָ֔ה לֹ֥א תִכּ֖וֹן
    אַתָּ֣ה וּ/מַלְכוּתֶ֑/ךָ וְ/עַתָּ֗ה שְׁלַ֨ח וְ/קַ֤ח אֹת/וֹ֙ אֵלַ֔/י כִּ֥י בֶן
    מָ֖וֶת הֽוּא־־־־׃ס
translation:
  text: For as long as the son of Jesse lives on the earth, neither you nor your kingdom
    will be established. So now, send and bring him to me, for he is a son of death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''a son of death,'' that is, one deserving death or doomed
      to die.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces Saul's explanation for his anger and command. 'For' fits the
    causal force in context better than the more ambiguous 'indeed'.
- source_word: כָל הַיָּמִים אֲשֶׁר
  chosen: as long as
  alternatives:
  - all the days that
  - for all the days that
  lexicon: HALOT
  rationale: This idiom expresses duration. 'As long as' is natural English while
    preserving the temporal force of the Hebrew.
- source_word: בֶּן יִשַׁי
  chosen: the son of Jesse
  alternatives:
  - David
  lexicon: HALOT
  rationale: Saul deliberately refers to David by patronymic rather than by name;
    preserving 'the son of Jesse' retains the rhetorical distancing and contempt.
- source_word: חַי עַל הָאֲדָמָה
  chosen: lives on the earth
  alternatives:
  - is alive on the earth
  - remains alive in the land
  lexicon: HALOT
  rationale: A straightforward rendering of the clause. 'On the earth' is more literal
    than 'in the land'; while 'land' is possible, the broader expression suits the
    idiom and avoids over-specifying territorial reference.
- source_word: לֹא תִכּוֹן
  chosen: will be established
  alternatives:
  - will stand firm
  - will be secure
  lexicon: HALOT
  rationale: The Niphal of כון conveys being established or made firm. 'Will be established'
    preserves the passive/resultative sense and fits both Jonathan and his kingdom.
- source_word: אַתָּה וּמַלְכוּתֶךָ
  chosen: neither you nor your kingdom
  alternatives:
  - you and your kingship
  - you or your kingdom
  lexicon: HALOT
  rationale: English idiom requires a coordinated negative expression. 'Kingdom' is
    the most natural rendering of מַלְכוּת here in dynastic-political context.
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - and now
  - now therefore
  lexicon: HALOT
  rationale: Marks an urgent inference from the preceding statement. 'So now' is readable
    modern English and preserves the discourse progression.
- source_word: שְׁלַח וְקַח אֹתוֹ אֵלַי
  chosen: send and bring him to me
  alternatives:
  - send and fetch him to me
  - send and take him to me
  lexicon: HALOT
  rationale: The paired imperatives mean to dispatch someone and have David brought.
    'Bring him to me' communicates the intended result more idiomatically than the
    overly literal 'take him to me.'
- source_word: בֶּן מָוֶת הוּא
  chosen: he is a son of death
  alternatives:
  - he deserves to die
  - he is doomed to die
  - he is a dead man
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'a son of death,' denoting one liable
    to death. The main text keeps the idiom for transparency; an English idiomatic
    alternative is preserved in a footnote.
