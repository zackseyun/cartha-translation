id: 1SA.20.22
reference: 1 Samuel 20:22
source:
  edition: WLC
  text: וְ/אִם כֹּ֤ה אֹמַר֙ לָ/עֶ֔לֶם הִנֵּ֥ה הַ/חִצִּ֖ים מִמְּ/ךָ֣ וָ/הָ֑לְאָה לֵ֕ךְ כִּ֥י שִֽׁלַּחֲ/ךָ֖ יְהוָֽה־׃
translation:
  text: But if I say this to the young man, ‘Look, the arrows are beyond you,’ then go, for Yahweh has sent you away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the arrows are farther than you.' The Hebrew expression means the arrows are past the young man, signaling that David must depart.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces the contrasting branch of Jonathan's signal to David. 'But if' captures the adversative force in context better than a bare 'if'.
- source_word: כֹּה
  chosen: this
  alternatives:
  - thus
  - like this
  lexicon: HALOT
  rationale: In idiomatic English within direct speech introduction, 'say this' is more natural than 'say thus' while preserving the demonstrative sense.
- source_word: אֹמַר
  chosen: I say
  alternatives:
  - I tell
  - I speak
  lexicon: HALOT
  rationale: Standard rendering of אמר in direct discourse introduction.
- source_word: לָעֶלֶם
  chosen: to the young man
  alternatives:
  - to the boy
  - to the servant
  lexicon: HALOT
  rationale: עֶלֶם denotes a youth/young man. Here it refers to Jonathan's attendant. 'Young man' is accurate and readable; 'boy' may sound too juvenile, while 'servant' imports a role not explicit in the noun itself.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: A discourse particle drawing attention. 'Look' is natural modern English and preserves the deictic force without archaic tone.
- source_word: הַחִצִּים
  chosen: the arrows
  lexicon: HALOT
  rationale: Straightforward plural of חֵץ.
- source_word: מִמְּךָ וָהָלְאָה
  chosen: are beyond you
  alternatives:
  - are farther than you
  - are on beyond you
  - are from you and onward
  lexicon: HALOT
  rationale: The phrase indicates location farther on past the hearer. 'Beyond you' is concise and idiomatic, matching the signal's meaning that David must leave.
- source_word: לֵךְ
  chosen: go
  alternatives:
  - be on your way
  - leave
  lexicon: HALOT
  rationale: Imperative of הלך. 'Go' is the direct and sufficient rendering; the context already implies departure.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'For' fits the explanatory tone.
- source_word: שִׁלַּחֲךָ
  chosen: has sent you away
  alternatives:
  - has sent you
  - has dismissed you
  lexicon: HALOT
  rationale: In this context of David's necessary departure, the verb carries the sense of sending away. Including 'away' makes the implication explicit from the Hebrew context without over-paraphrasing.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
