id: 1SA.14.34
reference: 1 Samuel 14:34
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שָׁא֣וּל פֻּ֣צוּ בָ/עָ֡ם וַ/אֲמַרְתֶּ֣ם לָ/הֶ֡ם הַגִּ֣ישׁוּ אֵלַ/י֩ אִ֨ישׁ שׁוֹר֜/וֹ וְ/אִ֣ישׁ שְׂיֵ֗/הוּ וּ/שְׁחַטְתֶּ֤ם בָּ/זֶה֙ וַ/אֲכַלְתֶּ֔ם וְ/לֹֽא תֶחֶטְא֥וּ לַֽ/יהוָ֖ה לֶ/אֱכֹ֣ל אֶל הַ/דָּ֑ם וַ/יַּגִּ֨שׁוּ כָל הָ/עָ֜ם אִ֣ישׁ שׁוֹר֧/וֹ בְ/יָד֛/וֹ הַ/לַּ֖יְלָה וַ/יִּשְׁחֲטוּ שָֽׁם־־־־׃
translation:
  text: And Saul said, “Disperse among the people and tell them, ‘Each man must bring me his ox and each man his sheep, and you must slaughter them here and eat, so that you may not sin against Yahweh by eating with the blood.’” So all the people brought, each man his ox in his hand that night, and they slaughtered them there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “by eating with/over the blood,” referring to eating meat before the blood was properly drained.
    reason: lexical_alternative
  - marker: b
    text: Or “each man leading his ox by hand.”
    reason: lexical_alternative
lexical_decisions:
- source_word: פֻּצוּ בָעָם
  chosen: Spread out among the people
  alternatives:
  - Disperse among the people
  - Go throughout the people
  lexicon: HALOT
  rationale: The imperative from פוץ calls for scattering or dispersing. In context Saul is commanding messengers or attendants to move throughout the camp. 'Spread out among the people' is natural English while preserving the concrete sense.
- source_word: הַגִּישׁוּ אֵלַי
  chosen: bring me
  alternatives:
  - present to me
  - bring near to me
  lexicon: HALOT
  rationale: נגשׁ in the Hiphil means to bring near/present. 'Bring me' is idiomatic and fits the command to bring animals for proper slaughter, without over-literal awkwardness.
- source_word: אִישׁ שׁוֹרוֹ וְאִישׁ שְׂיֵהוּ
  chosen: Each man his ox and each man his sheep
  alternatives:
  - every man his ox and his sheep
  - each one his ox and his small livestock
  lexicon: HALOT
  rationale: The repeated אִישׁ is distributive and should be reflected. שֶׂה can denote small livestock, sheep or goat, but 'sheep' is a clear and common rendering here; the singular possessive forms are represented distributively in English.
- source_word: וּשְׁחַטְתֶּם בָּזֶה
  chosen: you must slaughter them here
  alternatives:
  - slaughter them in this place
  - kill them here
  lexicon: HALOT
  rationale: שׁחט is specifically slaughter for food/sacrifice, not generic killing. בָּזֶה likely means 'in this place/on this [stone or spot].' 'Here' captures the locative force in readable English; the object 'them' is supplied from the animals just mentioned.
- source_word: וַאֲכַלְתֶּם
  chosen: and eat
  alternatives:
  - and then eat
  lexicon: HALOT
  rationale: Simple sequential command following slaughter. English imperative style is best preserved with 'and eat.'
- source_word: וְלֹא תֶחֶטְאוּ לַיהוָה
  chosen: so that you may not sin against the LORD
  alternatives:
  - and do not sin against the LORD
  - so that you will not sin against the LORD
  lexicon: HALOT
  rationale: The clause gives purpose/result of the command. 'So that you may not' best conveys the preventative intent. לַיהוָה here is ethically directional, well rendered 'against the LORD.' The divine name follows the doctrinal default 'the LORD' for יְהוָה.
- source_word: לֶאֱכֹל אֶל־הַדָּם
  chosen: by eating with the blood
  alternatives:
  - by eating over the blood
  - by eating the meat with the blood still in it
  lexicon: HALOT
  rationale: The idiom literally involves eating 'to/with/upon the blood.' In context it refers to consuming meat without properly draining the blood. 'By eating with the blood' stays close to the Hebrew while remaining intelligible; a more explanatory alternative is preserved in a footnote.
- source_word: וַיַּגִּשׁוּ כָל־הָעָם
  chosen: So all the people brought
  alternatives:
  - Then all the people brought near
  - So all the people presented
  lexicon: HALOT
  rationale: Same verb נגשׁ as above, now narrative wayyiqtol. 'Brought' is smooth and contextually clear.
- source_word: אִישׁ שׁוֹרוֹ בְיָדוֹ
  chosen: each man his ox in his hand
  alternatives:
  - each man leading his ox by hand
  - each man with his ox in hand
  lexicon: HALOT
  rationale: The Hebrew is literally 'each man his ox in his hand.' This likely means each person personally brought his animal. Retaining 'in his hand' preserves the vividness, though it is somewhat idiomatic in English.
- source_word: הַלַּיְלָה
  chosen: that night
  alternatives:
  - by night
  - during the night
  lexicon: HALOT
  rationale: Temporal accusative/adverbial use. 'That night' is the most natural narrative rendering.
- source_word: וַיִּשְׁחֲטוּ שָׁם
  chosen: and they slaughtered them there
  alternatives:
  - and they slaughtered there
  lexicon: HALOT
  rationale: The object is implicit from context and naturally supplied in English. 'Slaughtered' preserves the specific food-preparation sense of שׁחט.
