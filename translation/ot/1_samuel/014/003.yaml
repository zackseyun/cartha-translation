id: 1SA.14.3
reference: 1 Samuel 14:3
source:
  edition: WLC
  text: וַ/אֲחִיָּ֣ה בֶן אֲחִט֡וּב אֲחִ֡י אִיכָב֣וֹד בֶּן פִּינְחָ֨ס בֶּן עֵלִ֜י כֹּהֵ֧ן יְהוָ֛ה בְּ/שִׁל֖וֹ נֹשֵׂ֣א אֵפ֑וֹד וְ/הָ/עָם֙ לֹ֣א יָדַ֔ע כִּ֥י הָלַ֖ךְ יוֹנָתָֽן־׀־־׀׃
translation:
  text: Now Ahijah son of Ahitub, brother of Ichabod, son of Phinehas, son of Eli, priest of Yahweh at Shiloh, was carrying an ephod. And the people did not know that Jonathan had gone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was wearing an ephod.' The Hebrew literally says 'bearing/carrying an ephod.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/אֲחִיָּה
  chosen: Now Ahijah
  alternatives:
  - And Ahijah
  lexicon: HALOT
  rationale: The prefixed waw here advances the narrative. 'Now' gives natural English scene-setting while preserving the discourse function better than a mechanically repeated 'and.' The personal name is transliterated per project policy.
- source_word: בֶן אֲחִטוּב
  chosen: son of Ahitub
  lexicon: HALOT
  rationale: Standard genealogical construction; rendered formally and directly.
- source_word: אֲחִי אִיכָבוֹד
  chosen: brother of Ichabod
  alternatives:
  - kinsman of Ichabod
  lexicon: HALOT
  rationale: אֲחִי is the construct of 'brother.' In genealogical notices it can sometimes be broader, but the plain sense here is 'brother,' and nothing in the immediate context requires weakening it.
- source_word: בֶּן פִּינְחָס בֶּן עֵלִי
  chosen: son of Phinehas, son of Eli
  lexicon: HALOT
  rationale: The chain of descent is preserved explicitly in English to match the Hebrew genealogy.
- source_word: כֹּהֵן יְהוָה
  chosen: the priest of the LORD
  alternatives:
  - a priest of the LORD
  lexicon: HALOT
  rationale: The appositional phrase identifies Ahijah in relation to the preceding genealogy. The definite article in English is natural here because the phrase functions as a specific identification within the narrative. יְהוָה is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: בְּ/שִׁלֹה
  chosen: at Shiloh
  alternatives:
  - in Shiloh
  lexicon: HALOT
  rationale: The preposition ב commonly allows either 'in' or 'at'; 'at Shiloh' is more idiomatic for a sanctuary location in English.
- source_word: נֹשֵׂא אֵפוֹד
  chosen: was carrying an ephod
  alternatives:
  - was wearing an ephod
  - bearing an ephod
  lexicon: HALOT
  rationale: נשא fundamentally means 'carry/bear.' In this cultic context some English versions use 'wearing,' since an ephod is a priestly garment/object associated with priestly service. 'Was carrying' stays closer to the lexical core without over-interpreting the exact manner of bearing.
- source_word: וְ/הָעָם
  chosen: And the people
  alternatives:
  - Now the people
  lexicon: HALOT
  rationale: Simple conjunction plus definite noun. 'The people' refers to the troops/community with Saul in context.
- source_word: לֹא יָדַע
  chosen: did not know
  alternatives:
  - were unaware
  lexicon: HALOT
  rationale: A straightforward rendering of the negated perfect; 'did not know' is clear and sufficiently formal.
- source_word: כִּי הָלַךְ יוֹנָתָן
  chosen: that Jonathan had gone
  alternatives:
  - that Jonathan had left
  - that Jonathan had gone away
  lexicon: HALOT
  rationale: After ידע, כִּי introduces the content clause. The perfect of הלך is best rendered as past perfect in English because Jonathan's departure precedes the people's lack of awareness.
