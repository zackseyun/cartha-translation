id: 1SA.14.23
reference: 1 Samuel 14:23
source:
  edition: WLC
  text: וַ/יּ֧וֹשַׁע יְהוָ֛ה בַּ/יּ֥וֹם הַ/ה֖וּא אֶת יִשְׂרָאֵ֑ל וְ/הַ֨/מִּלְחָמָ֔ה עָבְרָ֖ה אֶת בֵּ֥ית אָֽוֶן־־׃
translation:
  text: So Yahweh saved Israel that day, and the battle passed beyond Beth-aven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the battle passed past Beth-aven' or 'the battle advanced beyond Beth-aven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹשַׁע
  chosen: saved
  alternatives:
  - gave victory to
  - delivered
  lexicon: HALOT
  rationale: From ישׁע in the Hiphil, indicating causing salvation/deliverance. 'Saved' is concise and preserves the theological weight of YHWH as the agent; 'gave victory' is interpretive and narrower, while 'delivered' is possible but less direct in modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Idiomatic temporal expression. 'That day' is natural English and fully conveys the Hebrew phrase without unnecessary formality.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Direct object marker plus the national name. 'Israel' here refers to the people/army of Israel collectively.
- source_word: וְהַמִּלְחָמָה
  chosen: and the battle
  alternatives:
  - and the fighting
  - and the war
  lexicon: HALOT
  rationale: מִלְחָמָה can denote war or battle; in this immediate narrative scene, 'battle' best fits the specific engagement in progress.
- source_word: עָבְרָה
  chosen: passed beyond
  alternatives:
  - crossed over to
  - went on beyond
  - advanced beyond
  lexicon: HALOT
  rationale: עבר commonly means pass over/by/beyond. With the following place name, the sense is that the course of the battle moved past Beth-aven. 'Passed beyond' preserves the spatial movement without overinterpreting military nuance.
- source_word: אֶת בֵּית אָוֶן
  chosen: beyond Beth-aven
  alternatives:
  - to Beth-aven
  - past Beth-aven
  lexicon: HALOT
  rationale: The object marker with עבר can mark the place traversed or passed. 'Beyond Beth-aven' best captures the likely sense that the battle extended past that location. 'Past Beth-aven' is also possible but slightly less formal; 'to Beth-aven' undertranslates the motion.
