theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretation of אֹתוֹ הֵחֵל לִבְנוֹת
  chosen_reading: it was the first altar he built to the LORD
  alternative_readings:
  - he began to build it as an altar to the LORD
  - he first began to build an altar to the LORD
  rationale: The Hebrew expression is syntactically awkward if taken woodenly as 'he began to build it.' In context and in common Hebrew usage, the clause is best understood as noting that this was Saul's first altar to the LORD. This avoids an unnatural English rendering while not importing extra theology.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source-text sense over tradition inertia'
