id: 1SA.14.35
reference: 1 Samuel 14:35
source:
  edition: WLC
  text: וַ/יִּ֧בֶן שָׁא֛וּל מִזְבֵּ֖חַ לַֽ/יהוָ֑ה אֹת֣/וֹ הֵחֵ֔ל לִ/בְנ֥וֹת מִזְבֵּ֖חַ לַֽ/יהוָֽה׃פ
translation:
  text: And Saul built an altar to Yahweh; this was the first altar he built to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'he began to build it as an altar to the LORD.' The Hebrew idiom is commonly understood to mean that this was Saul's first altar to the LORD.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: built
  alternatives:
  - constructed
  lexicon: HALOT
  rationale: The verb בנה in this context straightforwardly means to build or construct. 'Built' is the natural English rendering and fits altar-building idiom.
- source_word: מִזְבֵּחַ
  chosen: altar
  lexicon: HALOT
  rationale: Standard rendering for מזבח, the place of sacrifice/offering. 'Altar' is the established and precise English equivalent.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל here marks dedication or relation. 'To the LORD' is idiomatic in English for an altar dedicated to YHWH. Per doctrine, יהוה is rendered 'the LORD.'
- source_word: אֹתוֹ
  chosen: it
  alternatives:
  - this altar
  lexicon: HALOT
  rationale: The pronoun refers back to the altar. English requires an explicit subject for the following clause, and 'it' preserves the Hebrew resumptive sense without over-specifying.
- source_word: הֵחֵל
  chosen: was the first
  alternatives:
  - he began
  - he first began
  lexicon: HALOT
  rationale: Although החל commonly means 'began,' the idiom אֹתוֹ הֵחֵל לִבְנוֹת מִזְבֵּחַ לַיהוה in this context is widely understood to mean this was Saul's first altar to the LORD, not merely that he started building this one. Rendering 'was the first' captures the idiomatic sense in clear English.
- source_word: לִבְנוֹת
  chosen: he built
  alternatives:
  - to build
  lexicon: HALOT
  rationale: The infinitive 'to build' is absorbed into idiomatic English after rendering החל as 'was the first.' This makes the clause natural while preserving the sense that this altar marked Saul's first act of building such an altar.
- source_word: שָׁאוּל
  chosen: Saul
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name שאול.
