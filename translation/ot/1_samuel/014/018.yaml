theological_decisions:
- issue: Referent of 'ark of God' versus a possible variant tradition 'ephod' in the
    broader textual tradition/context
  chosen_reading: the ark of God
  alternative_readings:
  - the ephod
  rationale: The provided Hebrew text twice reads 'ark of God,' so the main text follows
    the source text given. Because some interpreters and textual traditions have noted
    'ephod' as an alternative in this context, that alternative is preserved in a
    footnote rather than adopted into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
