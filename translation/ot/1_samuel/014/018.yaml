id: 1SA.14.18
reference: 1 Samuel 14:18
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר שָׁאוּל֙ לַֽ/אֲחִיָּ֔ה הַגִּ֖ישָׁ/ה אֲר֣וֹן הָ/אֱלֹהִ֑ים כִּֽי
    הָיָ֞ה אֲר֧וֹן הָ/אֱלֹהִ֛ים בַּ/יּ֥וֹם הַ/ה֖וּא וּ/בְנֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: Then Saul said to Ahijah, “Bring the ark of God here,” for the ark of God
    was that day with the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some textual traditions and interpreters read “Bring the ephod” instead
      of “Bring the ark of God.” The Hebrew text here reads “ark of God.”
    reason: textual_variant
  - marker: b
    text: Or 'was there that day with the sons of Israel'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: לַאֲחִיָּה
  chosen: to Ahijah
  rationale: Personal name is transliterated per translation philosophy.
- source_word: הַגִּישָׁה
  chosen: Bring ... here
  alternatives:
  - Bring near
  - Present
  lexicon: HALOT
  rationale: Imperative of נגשׁ in the causative sense means to bring near/present.
    'Bring ... here' is idiomatic and fits the direct command context.
- source_word: אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  alternatives:
  - the ark of the covenant of God
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'ark of God,' not 'ark of the covenant.' The
    shorter rendering follows original-language primacy and avoids importing wording
    from other contexts.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - now
  lexicon: HALOT
  rationale: Introduces the narrator's explanatory clause. 'For' preserves the explanatory
    force concisely.
- source_word: הָיָה
  chosen: was there
  alternatives:
  - was
  - had been
  lexicon: HALOT
  rationale: Supplying 'there' makes the verbless location sense natural in English,
    since the clause explains the command by noting the ark's presence with Israel
    that day.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard temporal expression; 'that day' is natural English and semantically
    equivalent.
- source_word: וּבְנֵי יִשְׂרָאֵל
  chosen: with the sons of Israel
  alternatives:
  - with the Israelites
  - among the sons of Israel
  lexicon: HALOT
  rationale: The preposition is attached to 'sons of Israel.' 'With the sons of Israel'
    preserves the Hebrew wording and the gender-accurate form. 'Israelites' is possible
    but less formally transparent.
