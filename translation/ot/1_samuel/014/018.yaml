  from: was there that day with the sons of Israel
  to: was that day with the sons of Israel
  rationale: The Hebrew 'הָיָה' means 'was.' The location is specified by the phrase
    'with the sons of Israel.' Adding 'there' creates a redundancy ('was there with...')
    that is slightly awkward in English. Removing 'there' results in a more direct
    and natural rendering of the clause.
