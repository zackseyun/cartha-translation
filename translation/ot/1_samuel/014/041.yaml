theological_decisions:
- issue: Textual form of Saul's prayer in this verse
  chosen_reading: Use the Masoretic Text main line ('Give a perfect lot') in the translation, while preserving the longer reading reflected in the Septuagint and some modern reconstructions in a footnote.
  alternative_readings:
  - '''O LORD God of Israel, why have you not answered your servant today? If this guilt is in me or in Jonathan my son, O LORD God of Israel, give Urim; but if this guilt is in your people Israel, give Thummim.'''
  rationale: The provided source text is the MT, which is notably shorter and difficult. In keeping with original-language primacy and transparency, the main text follows the given Hebrew. Because the longer reading is ancient, well known, and helps explain the terse MT wording, it should be preserved in a footnote rather than silently adopted into the main text.
  doctrine_reference: Translation philosophy §§1, 3
