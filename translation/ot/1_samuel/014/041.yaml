id: 1SA.14.41
reference: 1 Samuel 14:41
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שָׁא֗וּל אֶל יְהוָ֛ה אֱלֹהֵ֥י יִשְׂרָאֵ֖ל הָ֣בָ/ה תָמִ֑ים וַ/יִּלָּכֵ֧ד יוֹנָתָ֛ן וְ/שָׁא֖וּל וְ/הָ/עָ֥ם יָצָֽאוּ־׃
translation:
  text: Then Saul said to Yahweh, the God of Israel, “Give a perfect lot.” And Jonathan and Saul were taken, but the people escaped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Give perfect/blameless.'' The sense is likely a request for an unimpeachable decision by lot; compare the longer ancient reading preserved in the Septuagint: ''Why have you not answered your servant today? If this guilt is in me or in Jonathan my son, O LORD God of Israel, give Urim; but if it is in your people Israel, give Thummim.'''
    reason: textual_variant
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הָבָה
  chosen: Give
  alternatives:
  - Grant
  - Bring
  lexicon: HALOT
  rationale: Imperative/request language addressed to God. 'Give' is the most direct and natural English equivalent here.
- source_word: תָמִים
  chosen: a perfect lot
  alternatives:
  - what is right
  - truth
  - an innocent/perfect decision
  lexicon: HALOT
  rationale: The Hebrew adjective literally means 'complete, whole, blameless/perfect,' but in this terse lot-casting context it likely asks for an unimpeachable or decisive result. Because 'lot' is implicit from the outcome and broader context, it is supplied in English for clarity. The more expansive MT/LXX-related sense is preserved in a footnote.
- source_word: וַיִּלָּכֵד
  chosen: were taken
  alternatives:
  - were selected
  - were caught
  lexicon: HALOT
  rationale: In lot-casting/judicial contexts, לכד can denote being identified or singled out. 'Were taken' preserves the idiom and the passive sense without overinterpreting.
- source_word: יָצָאוּ
  chosen: escaped
  alternatives:
  - went out
  - came out
  - were cleared
  lexicon: HALOT
  rationale: Given the contrast with Jonathan and Saul being taken, the people are those not selected by the lot. 'Escaped' communicates the contextual sense in idiomatic English better than the overly literal 'went out.'
