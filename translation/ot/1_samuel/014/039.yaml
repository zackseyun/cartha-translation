id: 1SA.14.39
reference: 1 Samuel 14:39
source:
  edition: WLC
  text: כִּ֣י חַי יְהוָ֗ה הַ/מּוֹשִׁ֨יעַ֙ אֶת יִשְׂרָאֵ֔ל כִּ֧י אִם יֶשְׁנ֛/וֹ בְּ/יוֹנָתָ֥ן בְּנִ֖/י כִּ֣י מ֣וֹת יָמ֑וּת וְ/אֵ֥ין עֹנֵ֖/הוּ מִ/כָּל הָ/עָֽם־־־־׃
translation:
  text: For as Yahweh lives, who saves Israel, even if it is in Jonathan my son, he shall surely die.” But not one of all the people answered him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''if it is in Jonathan my son''—the object is left implicit; context suggests the guilt or offense under inquiry.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי יְהוָה
  chosen: as the LORD lives
  alternatives:
  - by the life of the LORD
  - the LORD lives
  lexicon: HALOT
  rationale: Standard Hebrew oath formula. English idiom is best preserved with 'as the LORD lives.' YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Divine name rendered according to the project's default for יְהוָה.
- source_word: הַמּוֹשִׁיעַ אֶת יִשְׂרָאֵל
  chosen: who saves Israel
  alternatives:
  - the one who delivers Israel
  - who has saved Israel
  lexicon: HALOT
  rationale: The participle with article functions attributively of the LORD. 'Saves' preserves the participial sense and the ongoing characterization better than a simple past.
- source_word: כִּי אִם
  chosen: even if
  alternatives:
  - if indeed
  - surely if
  lexicon: HALOT
  rationale: 'In this oath context the combination introduces an extreme hypothetical case: even if the guilt is found in Jonathan. ''Even if'' communicates the force naturally in English.'
- source_word: יֶשְׁנוֹ בְּיוֹנָתָן בְּנִי
  chosen: it is in Jonathan my son
  alternatives:
  - he is Jonathan my son
  - the guilt is with Jonathan my son
  - it is found in Jonathan my son
  lexicon: HALOT
  rationale: The Hebrew is elliptical; the implied referent is the matter of guilt/offense under investigation from context. 'It is in Jonathan my son' stays close to the Hebrew while remaining intelligible, without over-specifying beyond the text.
- source_word: מוֹת יָמוּת
  chosen: he shall surely die
  alternatives:
  - he must certainly die
  - he will surely be put to death
  lexicon: HALOT
  rationale: Infinitive absolute plus imperfect intensifies certainty. 'He shall surely die' is a standard and clear rendering that preserves the solemn judicial force.
- source_word: וְאֵין עֹנֵהוּ
  chosen: But not one ... answered him
  alternatives:
  - and no one answered him
  - but no one responded to him
  lexicon: HALOT
  rationale: The clause reports the people's silence in response to Saul. 'Answered him' is the direct lexical equivalent; 'But' reflects the discourse contrast in English.
- source_word: מִכָּל הָעָם
  chosen: of all the people
  alternatives:
  - from all the people
  - among all the people
  lexicon: HALOT
  rationale: 'Partitive sense: not one person out of the whole people answered.'
