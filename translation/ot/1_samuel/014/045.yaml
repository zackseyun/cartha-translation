id: 1SA.14.45
reference: 1 Samuel 14:45
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר הָ/עָ֜ם אֶל שָׁא֗וּל הֲֽ/יוֹנָתָ֤ן יָמוּת֙ אֲשֶׁ֣ר עָ֠שָׂה הַ/יְשׁוּעָ֨ה הַ/גְּדוֹלָ֣ה הַ/זֹּאת֮ בְּ/יִשְׂרָאֵל֒ חָלִ֗ילָ/ה חַי יְהוָה֙ אִם יִפֹּ֞ל מִ/שַּׂעֲרַ֤ת רֹאשׁ/וֹ֙ אַ֔רְצָ/ה כִּֽי עִם אֱלֹהִ֥ים עָשָׂ֖ה הַ/יּ֣וֹם הַ/זֶּ֑ה וַ/יִּפְדּ֥וּ הָ/עָ֛ם אֶת יוֹנָתָ֖ן וְ/לֹא מֵֽת־׀־־־־־־׃ס
translation:
  text: But the people said to Saul, “Should Jonathan die, who has brought about this great deliverance in Israel? Far from it! As Yahweh lives, not one hair of his head shall fall to the ground, for he has worked with God this day.” So the people redeemed Jonathan, and he did not die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this great salvation' or 'this great victory.' The Hebrew יְשׁוּעָה can denote deliverance, salvation, or victory depending on context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Far be it!' A strong expression of rejection; traditionally also rendered 'Certainly not' or 'May it never be.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'for with God he has acted/worked today.' The wording emphasizes that Jonathan's action was carried out in concert with divine aid or favor.
    reason: lexical_alternative
  - marker: d
    text: Or 'redeemed Jonathan' or 'rescued Jonathan.' The verb carries the sense of securing release from a claim or sentence.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיוֹנָתָן יָמוּת
  chosen: Should Jonathan die
  alternatives:
  - Is Jonathan to die
  - Must Jonathan die
  lexicon: HALOT
  rationale: The interrogative הֲ with the imperfect expresses an indignant rhetorical question. 'Should Jonathan die' captures both the question form and the people's protest better than a flat future 'Will Jonathan die?'.
- source_word: הַיְשׁוּעָה הַגְּדוֹלָה הַזֹּאת
  chosen: this great deliverance
  alternatives:
  - this great salvation
  - this great victory
  lexicon: HALOT
  rationale: יְשׁוּעָה can denote salvation, deliverance, or victory. In this military context, 'deliverance' preserves the theological dimension of rescue without narrowing it merely to battlefield success.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - for Israel
  - among Israel
  lexicon: HALOT
  rationale: The preposition ב is most naturally retained as 'in.' This allows the phrase to describe the sphere in which the deliverance occurred, while still implying benefit to Israel.
- source_word: חָלִילָה
  chosen: Far from it
  alternatives:
  - Certainly not
  - May it never be
  - God forbid
  lexicon: HALOT
  rationale: חָלִילָה is a strong repudiation. 'Far from it' is idiomatic modern English and avoids importing the divine name into the expression as 'God forbid' does, since the Hebrew here does not explicitly say 'God'.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is a standard oath formula. 'As the LORD lives' is the most natural English equivalent and preserves the solemnity. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: אִם יִפֹּל מִשַּׂעֲרַת רֹאשׁוֹ אַרְצָה
  chosen: not one hair of his head shall fall to the ground
  alternatives:
  - if a hair of his head falls to the ground
  - not a single hair from his head will fall earthward
  lexicon: HALOT
  rationale: Following the oath formula, אִם introduces an emphatic negative sense in context. The idiom means complete protection. 'Not one hair of his head shall fall to the ground' is a clear and established English equivalent.
- source_word: כִּי עִם אֱלֹהִים עָשָׂה
  chosen: for he has worked with God
  alternatives:
  - for he has acted with God
  - for he has worked with God's help
  - for he has acted for God
  lexicon: HALOT
  rationale: The phrase literally says 'he has done/worked with God.' 'With God' should be preserved rather than paraphrased away, since it expresses divine concurrence or aid without over-specifying the relationship. 'Worked' fits עשה idiomatically in English here.
- source_word: וַיִּפְדּוּ הָעָם אֶת יוֹנָתָן
  chosen: So the people ransomed Jonathan
  alternatives:
  - So the people redeemed Jonathan
  - So the people rescued Jonathan
  lexicon: HALOT
  rationale: פדה commonly means redeem/ransom by paying or securing release. Here the people intervene to secure Jonathan from the death sentence. 'Ransomed' preserves the legal-deliverance nuance better than the more generic 'rescued.'
- source_word: וְלֹא מֵת
  chosen: and he did not die
  alternatives:
  - so that he did not die
  - and he was not put to death
  lexicon: HALOT
  rationale: The clause states the result plainly. 'And he did not die' is direct and faithful; 'was not put to death' is interpretive, though contextually implied.
