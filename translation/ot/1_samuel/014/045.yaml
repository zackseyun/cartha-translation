theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of עִם אֱלֹהִים in describing Jonathan's action
  chosen_reading: he has worked with God
  alternative_readings:
  - he has worked with God's help
  - he has acted for God
  rationale: 'The Hebrew preposition עִם most naturally means ''with.'' Preserving this wording maintains the text''s theological tension: Jonathan''s success is portrayed as in concert with God, without forcing a more explicit doctrinal explanation of agency than the Hebrew itself gives.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
