  from: answered Jonathan and his armor-bearer and said
  to: answered Jonathan and his armor-bearer, saying,
  rationale: The Hebrew uses a common narrative construction, וַיַּעֲנוּ... וַיֹּאמְרוּ (lit. 'and they answered... and they said'). While the literal rendering is not incorrect, it is slightly redundant in English. Translating this as 'answered..., saying,' is a standard and elegant way to handle this Semitic idiom, improving the narrative flow while remaining faithful to the source text.
