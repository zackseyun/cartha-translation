id: 1SA.14.12
reference: 1 Samuel 14:12
source:
  edition: WLC
  text: וַ/יַּעֲנוּ֩ אַנְשֵׁ֨י הַ/מַּצָּבָ֜ה אֶת יוֹנָתָ֣ן וְ/אֶת נֹשֵׂ֣א כֵלָ֗י/ו וַ/יֹּֽאמְרוּ֙ עֲל֣וּ אֵלֵ֔י/נוּ וְ/נוֹדִ֥יעָה אֶתְ/כֶ֖ם דָּבָ֑ר וַ/יֹּ֨אמֶר יוֹנָתָ֜ן אֶל נֹשֵׂ֤א כֵלָי/ו֙ עֲלֵ֣ה אַחֲרַ֔/י כִּֽי נְתָנָ֥/ם יְהוָ֖ה בְּ/יַ֥ד יִשְׂרָאֵֽל־׀־פ־־׃
translation:
  text: And the men of the garrison answered Jonathan and his armor-bearer and said, “Come up to us, and we will tell you something.” Then Jonathan said to his armor-bearer, “Come up after me, for Yahweh has given them into the hand of Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the men of the outpost.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew, “we will make known to you a thing.”
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew idiom: “has given them into the hand of Israel,” that is, into Israel’s power.'
    reason: lexical_alternative
  - marker: d
    text: Or 'answered Jonathan and his armor-bearer and said'.
    reason: previous_rendering
lexical_decisions:
- source_word: אַנְשֵׁי הַמַּצָּבָה
  chosen: the men of the garrison
  alternatives:
  - the men of the outpost
  - the men of the guard post
  lexicon: HALOT
  rationale: מַצָּבָה in this military context refers to a stationed military post or garrison, not a memorial pillar. 'Garrison' is concise and idiomatic in English for the Philistine military position.
- source_word: נֹשֵׂא כֵלָיו
  chosen: his armor-bearer
  alternatives:
  - the one carrying his weapons
  - his weapons-bearer
  lexicon: HALOT
  rationale: The idiom literally means 'bearer of his equipment/weapons' and is conventionally but accurately rendered 'armor-bearer' in military narrative.
- source_word: עֲלוּ אֵלֵינוּ
  chosen: Come up to us
  alternatives:
  - Go up to us
  - Climb up to us
  lexicon: HALOT
  rationale: עלה here reflects moving upward to the Philistines' elevated position. 'Come up to us' preserves the deictic force of the speakers' invitation better than 'go up.'
- source_word: וְנוֹדִיעָה אֶתְכֶם דָּבָר
  chosen: and we will let you know something
  alternatives:
  - and we will tell you something
  - and we will show you a thing
  lexicon: HALOT
  rationale: The hiphil of ידע means 'make known, inform.' 'Let you know something' is natural modern English and preserves the intentionally vague דָּבָר ('a thing/word/something').
- source_word: עֲלֵה אַחֲרַי
  chosen: Come up after me
  alternatives:
  - Go up after me
  - Follow me up
  lexicon: HALOT
  rationale: Jonathan addresses one person (2ms imperative). 'Come up after me' preserves both the upward movement and the sequence of following.
- source_word: כִּי נְתָנָם יְהוָה
  chosen: for the LORD has given them
  alternatives:
  - for the LORD has handed them over
  - for the LORD has delivered them
  lexicon: HALOT
  rationale: נתן with hostile object and following 'into the hand of' is a standard idiom for giving enemies over in battle. 'Has given them' is direct and keeps the Hebrew idiom intact.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּיַד יִשְׂרָאֵל
  chosen: into the hand of Israel
  alternatives:
  - into Israel's hand
  - into the power of Israel
  lexicon: HALOT
  rationale: '''Into the hand of'' is a common Hebrew idiom for being delivered into someone''s power. Retaining ''hand'' preserves the biblical idiom while remaining understandable.'
