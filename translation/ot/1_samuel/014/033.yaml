id: 1SA.14.33
reference: 1 Samuel 14:33
source:
  edition: WLC
  text: וַ/יַּגִּ֤ידוּ לְ/שָׁאוּל֙ לֵ/אמֹ֔ר הִנֵּ֥ה הָ/עָ֛ם חֹטִ֥אים לַֽ/יהוָ֖ה לֶ/אֱכֹ֣ל עַל הַ/דָּ֑ם וַ/יֹּ֣אמֶר בְּגַדְתֶּ֔ם גֹּֽלּוּ אֵלַ֥/י הַ/יּ֖וֹם אֶ֥בֶן גְּדוֹלָֽה־־׃
translation:
  text: Then they told Saul, saying, “Look, the people are sinning against Yahweh by eating over the blood.” And he said, “You have acted treacherously. Roll a large stone to me today.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, “by eating meat with the blood still in it.” The Hebrew literally says “by eating on/with the blood,” an idiom for consuming meat without properly draining the blood.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגִּידוּ
  chosen: Then they told
  alternatives:
  - And they reported
  - And they told
  lexicon: HALOT
  rationale: Wayyiqtol narrative verb from נגד introducing the next event in sequence. 'Then they told' preserves the narrative flow in natural English.
- source_word: לְשָׁאוּל
  chosen: Saul
  lexicon: HALOT
  rationale: Indirect object marked by ל; standard transliteration of the personal name.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - that
  lexicon: HALOT
  rationale: Common quotative infinitive; 'saying' keeps the Hebrew discourse structure without awkwardness.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention to the report. 'Look' is readable modern English and preserves the force better than archaic 'Behold.'
- source_word: הָעָם
  chosen: the people
  lexicon: HALOT
  rationale: Definite collective noun referring to Saul's troops/people in context.
- source_word: חֹטִאים לַיהוָה
  chosen: are sinning against the LORD
  alternatives:
  - are offending the LORD
  - are sinning to the LORD
  lexicon: HALOT
  rationale: חטא with ל can indicate sin against someone. In English, 'sinning against the LORD' best conveys the relational offense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: לֶאֱכֹל עַל־הַדָּם
  chosen: by eating with the blood
  alternatives:
  - by eating over the blood
  - by eating meat with the blood still in it
  lexicon: HALOT
  rationale: The idiom refers to consuming meat without properly draining the blood, prohibited in Torah. 'With the blood' is concise and idiomatic in English while preserving the underlying image; a more explicit interpretive expansion is preserved in a footnote.
- source_word: בְּגַדְתֶּם
  chosen: You have acted treacherously
  alternatives:
  - You have dealt faithlessly
  - You have transgressed
  lexicon: HALOT
  rationale: בגד commonly denotes acting faithlessly or treacherously. 'Acted treacherously' preserves the moral severity better than the more generic 'transgressed.'
- source_word: גֹּלּוּ
  chosen: Roll
  alternatives:
  - Bring
  - Roll over
  lexicon: HALOT
  rationale: Imperative plural from גלל, literally 'roll.' Since the object is a large stone, 'roll' is the most concrete and contextually fitting rendering.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - over to me
  lexicon: HALOT
  rationale: Simple directional phrase; 'to me' is sufficient in English.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - at once
  - this day
  lexicon: HALOT
  rationale: Temporal adverb. 'Today' is the direct rendering; in context it carries urgency without needing paraphrase.
- source_word: אֶבֶן גְּדוֹלָה
  chosen: a large stone
  alternatives:
  - a great stone
  - a big stone
  lexicon: HALOT
  rationale: Concrete object likely intended as a slaughtering surface to prevent further blood violation. 'Large stone' is natural modern English; 'great stone' sounds archaic.
