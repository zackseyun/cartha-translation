id: 1SA.14.10
reference: 1 Samuel 14:10
source:
  edition: WLC
  text: וְ/אִם כֹּ֨ה יֹאמְר֜וּ עֲל֤וּ עָלֵ֨י/נוּ֙ וְ/עָלִ֔ינוּ כִּֽי נְתָנָ֥/ם יְהוָ֖ה בְּ/יָדֵ֑/נוּ וְ/זֶה לָּ֖/נוּ הָ/אֽוֹת־־־׃
translation:
  text: But if they say this, ‘Come up to us,’ then we will go up, for Yahweh has given them into our hand, and this will be the sign for us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Come up against us.” The Hebrew may emphasize approach toward the Philistines’ position, with hostile force implied by context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “into our hand,” an idiom meaning into our power.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction links this clause with the previous conditional sign while marking contrast with the prior possibility in v. 9; 'But if' captures the discourse flow naturally in English.
- source_word: כֹּה
  chosen: this
  alternatives:
  - thus
  - like this
  lexicon: HALOT
  rationale: Introduces direct speech idiomatically. 'This' is more natural in contemporary English than the more wooden 'thus' while preserving the demonstrative force.
- source_word: יֹאמְרוּ
  chosen: they say
  alternatives:
  - they will say
  lexicon: HALOT
  rationale: 'The imperfect after the conditional can be rendered with present sense in English direct-speech setup: ''if they say.'' This is standard and avoids awkward futurity.'
- source_word: עֲלוּ עָלֵינוּ
  chosen: Come up to us
  alternatives:
  - Come up against us
  - Come up to meet us
  lexicon: HALOT
  rationale: The imperative plus preposition על with pronominal suffix here most naturally means movement upward toward the speakers. 'Against us' is possible in military context, but the immediate sense is an invitation/challenge to approach their elevated position; 'to us' preserves that without overinterpreting hostility already implied by context.
- source_word: וְעָלִינוּ
  chosen: then we will go up
  alternatives:
  - and we will go up
  - we will go up
  lexicon: HALOT
  rationale: The waw plus perfect here carries consequential force following the condition. 'Then' makes the sequence explicit in natural English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - surely
  lexicon: HALOT
  rationale: Introduces Jonathan's rationale for acting. 'For' is concise and fits explanatory discourse.
- source_word: נְתָנָם
  chosen: has given them
  alternatives:
  - will give them
  - has delivered them
  lexicon: HALOT
  rationale: The perfect expresses confident certainty from Jonathan's perspective after the sign. English present perfect conveys the settled nature of the divine action. 'Delivered' is possible, but 'given them' more closely reflects נתן and works well with the following idiom.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בידנו
  chosen: into our hand
  alternatives:
  - into our hands
  - into our power
  lexicon: HALOT
  rationale: The Hebrew idiom is singular, 'into our hand,' meaning into our power/control. Retaining the singular preserves the source image while remaining intelligible in English.
- source_word: וְזֶה לָּנוּ הָאוֹת
  chosen: and this will be the sign for us
  alternatives:
  - and this shall be the sign to us
  - and this is our sign
  lexicon: HALOT
  rationale: The clause identifies the event as the confirming sign. Supplying 'will be' is natural in English because the sign is prospective relative to the condition. 'For us' reflects לָנוּ without implying possession too strongly.
