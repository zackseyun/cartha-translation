id: 1SA.14.6
reference: 1 Samuel 14:6
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוֹנָתָ֜ן אֶל הַ/נַּ֣עַר נֹשֵׂ֣א כֵלָ֗י/ו לְכָ/ה֙ וְ/נַעְבְּרָ֗ה אֶל מַצַּב֙ הָ/עֲרֵלִ֣ים הָ/אֵ֔לֶּה אוּלַ֛י יַעֲשֶׂ֥ה יְהוָ֖ה לָ֑/נוּ כִּ֣י אֵ֤ין לַֽ/יהוָה֙ מַעְצ֔וֹר לְ/הוֹשִׁ֥יעַ בְּ/רַ֖ב א֥וֹ בִ/מְעָֽט־׀־׃
translation:
  text: Then Jonathan said to the young man who carried his armor, “Come, let us cross over to the garrison of these uncircumcised men. Perhaps Yahweh will act for us, for nothing can hinder Yahweh from saving by many or by few.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “outpost” for “garrison.”
    reason: lexical_alternative
  - marker: b
    text: Literally “these uncircumcised”; a covenantally charged term of reproach.
    reason: cultural_note
  - marker: c
    text: Or “there is no restraint for the LORD to save.”
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹשֵׂא כֵלָיו
  chosen: who carried his armor
  alternatives:
  - his armor-bearer
  - the bearer of his weapons
  lexicon: HALOT
  rationale: The participial phrase literally means 'bearing his equipment/weapons.' 'Who carried his armor' is natural modern English while preserving the military sense. 'Armor-bearer' is idiomatic and traditional, but the fuller phrase better reflects the Hebrew construction.
- source_word: לְכָה וְנַעְבְּרָה
  chosen: Come, let us cross over
  alternatives:
  - Come, let us go over
  - Come, and let us pass over
  lexicon: HALOT
  rationale: The pair combines an imperative with a cohortative, expressing invitation and resolve. 'Cross over' fits the immediate terrain and military movement better than the more generic 'go over.'
- source_word: מַצַּב
  chosen: garrison
  alternatives:
  - outpost
  - station
  lexicon: HALOT
  rationale: In this military context the noun refers to a Philistine military position. 'Garrison' is the clearest idiomatic rendering in English, though 'outpost' is possible.
- source_word: הָעֲרֵלִים
  chosen: these uncircumcised men
  alternatives:
  - these uncircumcised
  - these Philistines
  lexicon: HALOT
  rationale: The adjective is used substantivally and carries covenantal reproach. 'These uncircumcised men' preserves both the literal term and its polemical force without replacing it with the ethnic label 'Philistines,' which the Hebrew does not use here.
- source_word: אוּלַי
  chosen: Perhaps
  alternatives:
  - It may be that
  - Maybe
  lexicon: HALOT
  rationale: Jonathan expresses hope without presumption. 'Perhaps' is concise and preserves the uncertainty of the Hebrew.
- source_word: יַעֲשֶׂה יְהוָה לָנוּ
  chosen: the LORD will act for us
  alternatives:
  - the LORD will work for us
  - the LORD will do something for us
  lexicon: HALOT
  rationale: The verb is broad ('do/make'), but in context refers to decisive intervention. 'Act for us' is idiomatic and avoids over-specifying the nature of the action.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מַעְצוֹר
  chosen: nothing can hinder
  alternatives:
  - there is no restraint
  - there is no limitation
  - nothing can hold back
  lexicon: HALOT
  rationale: The Hebrew noun denotes restraint or impediment. Rendering the clause idiomatically as 'nothing can hinder' communicates the sense clearly in modern English while preserving the theological point of God's unrestricted power to save.
- source_word: לְהוֹשִׁיעַ
  chosen: from saving
  alternatives:
  - from delivering
  - to save
  lexicon: HALOT
  rationale: The infinitive expresses the action in view. 'Saving' is the broadest and most theologically resonant English equivalent, fitting both military deliverance and the wider biblical usage of the root.
- source_word: בְּרַב אוֹ בִמְעָט
  chosen: by many or by few
  alternatives:
  - with many or with few
  - through many or through few
  lexicon: HALOT
  rationale: The phrase contrasts means or numbers of agents. 'By many or by few' is concise, natural, and preserves the contrast central to Jonathan's statement.
