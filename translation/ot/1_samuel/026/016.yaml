id: 1SA.26.16
reference: 1 Samuel 26:16
source:
  edition: WLC
  text: לֹא ט֞וֹב הַ/דָּבָ֣ר הַ/זֶּה֮ אֲשֶׁ֣ר עָשִׂיתָ֒ חַי יְהוָ֗ה כִּ֤י בְנֵי מָ֨וֶת֙ אַתֶּ֔ם אֲשֶׁ֧ר לֹֽא שְׁמַרְתֶּ֛ם עַל אֲדֹנֵי/כֶ֖ם עַל מְשִׁ֣יחַ יְהוָ֑ה וְ/עַתָּ֣ה רְאֵ֗ה אֵֽי חֲנִ֥ית הַ/מֶּ֛לֶךְ וְ/אֶת צַפַּ֥חַת הַ/מַּ֖יִם אֲשֶׁ֥ר מראשת/ו־־־־־־׀־־׃
translation:
  text: This thing that you have done is not good. As Yahweh lives, you are sons of death, because you did not keep watch over your master, over Yahweh’s anointed. And now, look—where are the king’s spear and the water jar that were by his head?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'you are sons of death,' an idiom meaning that they are liable to the death penalty or deserve to die.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא טוֹב
  chosen: is not good
  alternatives:
  - is not right
  - is evil
  lexicon: HALOT
  rationale: A straightforward evaluative expression. 'Not good' preserves the Hebrew idiom without overstating it into 'evil,' though the context is severe.
- source_word: הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this matter
  - this deed
  lexicon: HALOT
  rationale: '''Thing'' keeps the broad sense of דָּבָר here, while the following relative clause specifies the deed in view.'
- source_word: אֲשֶׁר עָשִׂיתָ
  chosen: that you have done
  alternatives:
  - which you did
  - that you did
  lexicon: HALOT
  rationale: Natural English rendering of the relative clause with completed action.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: Standard oath formula in Hebrew. 'As the LORD lives' is idiomatic English and preserves the solemn force. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: בְנֵי מָוֶת אַתֶּם
  chosen: you deserve to die
  alternatives:
  - you are sons of death
  - you are worthy of death
  - you are doomed to die
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'sons of death,' meaning liable to death. 'You deserve to die' communicates the legal-judicial force in clear modern English while avoiding an opaque literalism.
- source_word: שְׁמַרְתֶּם עַל
  chosen: did not keep watch over
  alternatives:
  - did not guard
  - did not watch over
  lexicon: HALOT
  rationale: In this military context, the sense is protective vigilance. 'Keep watch over' best captures the failure of sentry duty.
- source_word: אֲדֹנֵיכֶם
  chosen: your master
  alternatives:
  - your lord
  - your lord/master
  lexicon: HALOT
  rationale: Refers to Saul as superior/master in relation to his attendants, not as a divine title. 'Master' avoids confusion with 'the LORD' in the same verse.
- source_word: מְשִׁיחַ יְהוָה
  chosen: the LORD’s anointed
  alternatives:
  - the anointed of the LORD
  lexicon: HALOT
  rationale: Established and transparent rendering of the royal-sacral title in Hebrew. It preserves the theological significance of Saul's status without importing later messianic claims into this immediate context.
- source_word: וְעַתָּה רְאֵה
  chosen: And now, look
  alternatives:
  - Now see
  - And now, see
  lexicon: HALOT
  rationale: Direct imperative drawing attention to the evidence. 'Look' is natural modern English.
- source_word: אֵי
  chosen: where are
  alternatives:
  - where is
  lexicon: HALOT
  rationale: Interrogative of location. English plural agrees with the two objects that follow.
- source_word: חֲנִית הַמֶּלֶךְ
  chosen: the king’s spear
  alternatives:
  - the spear of the king
  lexicon: HALOT
  rationale: Construct relationship rendered naturally in English. 'Spear' is the normal sense of חֲנִית.
- source_word: צַפַּחַת הַמַּיִם
  chosen: the water jar
  alternatives:
  - the jug of water
  - the water jug
  lexicon: HALOT
  rationale: A small vessel/container for water. 'Water jar' is clear and suitably neutral.
- source_word: אֲשֶׁר מראשתו
  chosen: that were by his head
  alternatives:
  - which was at his head
  - that were at the place of his head
  lexicon: HALOT
  rationale: The phrase means 'which were at/from near his head.' Because it modifies two items in English, 'were by his head' is the most natural rendering. The singular relative sense in Hebrew is accommodated idiomatically in English.
