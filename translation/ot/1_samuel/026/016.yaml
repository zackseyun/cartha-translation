- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering מְשִׁיחַ יְהוָה in a royal context
  chosen_reading: Yahweh’s anointed
  alternative_readings:
  - the anointed of the LORD
  rationale: This preserves the covenantal-sacral status of Saul as king without conflating the term with the later title 'Messiah' in a way the immediate context does not require.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 2, 3
