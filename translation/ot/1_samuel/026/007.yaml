id: 1SA.26.7
reference: 1 Samuel 26:7
source:
  edition: WLC
  text: וַ/יָּבֹא֩ דָוִ֨ד וַ/אֲבִישַׁ֥י אֶל הָ/עָם֮ לַיְלָה֒ וְ/הִנֵּ֣ה שָׁא֗וּל שֹׁכֵ֤ב
    יָשֵׁן֙ בַּ/מַּעְגָּ֔ל וַ/חֲנִית֥/וֹ מְעוּכָֽה בָ/אָ֖רֶץ מראשת/ו וְ/אַבְנֵ֣ר וְ/הָ/עָ֔ם
    שֹׁכְבִ֖ים סביבת/ו׀־־׃ס
translation:
  text: So David and Abishai came to the troops by night, and behold, Saul was lying
    asleep within the encampment, with his spear stuck in the ground at his head,
    and Abner and the troops were lying around him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the circle'—the Hebrew likely refers to the circular formation of
      the camp.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעָם
  chosen: the troops
  alternatives:
  - the people
  - the army
  lexicon: HALOT
  rationale: In this military context, עָם refers not to people in general but to
    Saul's force/camp. 'Troops' is natural modern English and fits both occurrences
    in the verse.
- source_word: לַיְלָה
  chosen: by night
  alternatives:
  - at night
  - in the night
  lexicon: HALOT
  rationale: The adverbial accusative indicates time when. 'By night' is concise and
    suitably literary without being archaic.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: Retains the vivid deictic force of the Hebrew narrative marker, signaling
    the surprising scene David sees.
- source_word: שֹׁכֵב יָשֵׁן
  chosen: was lying asleep
  alternatives:
  - was lying sleeping
  - lay asleep
  - was asleep
  lexicon: HALOT
  rationale: 'The combination preserves both posture and state: Saul is lying down
    and asleep. ''Was lying asleep'' communicates both without awkwardness.'
- source_word: בַּמַּעְגָּל
  chosen: within the encampment
  alternatives:
  - in the circle
  - in the camp-circle
  - in the wagon-rampart
  lexicon: HALOT
  rationale: מַעְגָּל here refers to the circular camp formation or protected area
    of the camp, not merely a geometric circle. 'Within the encampment' gives the
    contextual sense in readable English.
- source_word: חֲנִיתוֹ
  chosen: his spear
  alternatives:
  - his lance
  lexicon: HALOT
  rationale: Standard military term in English for the weapon mentioned in Saul narratives.
- source_word: מְעוּכָה בָאָרֶץ
  chosen: stuck in the ground
  alternatives:
  - thrust into the ground
  - fixed in the earth
  lexicon: HALOT
  rationale: The participial form indicates the spear was pressed/driven into the
    ground. 'Stuck in the ground' is idiomatic and accurate.
- source_word: מְרַאֲשֹׁתָיו
  chosen: at his head
  alternatives:
  - by his head
  - at his head-place
  lexicon: HALOT
  rationale: The plural form is an idiom for the place at someone's head. English
    naturally renders this as 'at his head'.
- source_word: סְבִיבֹתָיו
  chosen: around him
  alternatives:
  - all around him
  - surrounding him
  lexicon: HALOT
  rationale: Conveys the spatial arrangement of Abner and the troops sleeping around
    Saul.
