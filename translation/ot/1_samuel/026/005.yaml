id: 1SA.26.5
reference: 1 Samuel 26:5
source:
  edition: WLC
  text: וַ/יָּ֣קָם דָּוִ֗ד וַ/יָּבֹא֮ אֶֽל הַ/מָּקוֹם֮ אֲשֶׁ֣ר חָנָה שָׁ֣ם שָׁאוּל֒
    וַ/יַּ֣רְא דָּוִ֗ד אֶת הַ/מָּקוֹם֙ אֲשֶׁ֣ר שָֽׁכַב שָׁ֣ם שָׁא֔וּל וְ/אַבְנֵ֥ר
    בֶּן נֵ֖ר שַׂר צְבָא֑/וֹ וְ/שָׁאוּל֙ שֹׁכֵ֣ב בַּ/מַּעְגָּ֔ל וְ/הָ/עָ֖ם חֹנִ֥ים
    סביבת/ו־־־־־־׃
translation:
  text: Then David arose and came to the place where Saul had camped, and David saw
    the place where Saul lay, with Abner son of Ner, the commander of his army. Saul
    was lying within the encampment, and the people were camped around him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'within the encampment' is more literally 'in the circle,' likely
      referring to the inner ring or central area of the camp.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום commonly marks the next action in narrative. 'Arose'
    preserves the narrative sequence and slightly formal tone without overstating
    motion.
- source_word: וַיָּבֹא אֶל־הַמָּקוֹם
  chosen: came to the place
  alternatives:
  - went to the place
  - came to the location
  lexicon: HALOT
  rationale: בוא with אֶל is straightforward movement toward a place. 'Came to the
    place' is idiomatic and close to the Hebrew.
- source_word: חָנָה
  chosen: had camped
  alternatives:
  - was encamped
  - had encamped
  lexicon: HALOT
  rationale: 'The qatal after אֲשֶׁר describes the prior state of Saul at that place.
    English past perfect fits the relative clause naturally: ''where Saul had camped.'''
- source_word: וַיַּרְא ... אֶת־הַמָּקוֹם
  chosen: saw the place
  alternatives:
  - looked at the place
  - observed the place
  lexicon: HALOT
  rationale: ראה here introduces David's visual inspection of Saul's sleeping position.
    'Saw' is the plain lexical equivalent.
- source_word: שָׁכַב ... שֹׁכֵב
  chosen: lay ... was lying
  alternatives:
  - slept ... was sleeping
  - lay down ... lay
  lexicon: HALOT
  rationale: The verse uses both a perfect and a participle from שכב. Rendering the
    first as 'lay' and the second as 'was lying' preserves the distinction between
    identifying the spot and describing Saul's present posture.
- source_word: וְאַבְנֵר בֶּן־נֵר שַׂר צְבָאוֹ
  chosen: with Abner son of Ner, the commander of his army
  alternatives:
  - and Abner son of Ner, commander of his army
  - with Abner son of Ner, captain of his host
  lexicon: HALOT
  rationale: The Hebrew apposes Abner to Saul's sleeping place. English needs a smoother
    connection; 'with Abner...' conveys that Abner was there beside Saul. שַׂר צְבָאוֹ
    is best rendered in contemporary English as 'the commander of his army.'
- source_word: בַּמַּעְגָּל
  chosen: within the encampment
  alternatives:
  - in the circle
  - in the camp-circle
  - in the wagon-rampart
  lexicon: HALOT
  rationale: מַעְגָּל literally suggests a circular arrangement, here likely the inner
    ring or center of the camp's defensive formation. 'Within the encampment' communicates
    the sense clearly in modern English while avoiding an overly literal but opaque
    'circle.'
- source_word: חֹנִים סְבִיבֹתָיו
  chosen: were camped around him
  alternatives:
  - were encamped around him
  - camped all around him
  lexicon: HALOT
  rationale: The participle plus סביבתיו describes the surrounding troops. 'Were camped
    around him' is natural English and preserves the spatial detail.
