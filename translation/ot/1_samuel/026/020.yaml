id: 1SA.26.20
reference: 1 Samuel 26:20
source:
  edition: WLC
  text: וְ/עַתָּ֗ה אַל יִפֹּ֤ל דָּֽמִ/י֙ אַ֔רְצָ/ה מִ/נֶּ֖גֶד פְּנֵ֣י יְהוָ֑ה כִּֽי
    יָצָ֞א מֶ֣לֶךְ יִשְׂרָאֵ֗ל לְ/בַקֵּשׁ֙ אֶת פַּרְעֹ֣שׁ אֶחָ֔ד כַּ/אֲשֶׁ֛ר יִרְדֹּ֥ף
    הַ/קֹּרֵ֖א בֶּ/הָרִֽים־־־׃
translation:
  text: So now, do not let my blood fall to the ground away from before the LORD,
    for the king of Israel has come out to seek a single flea, like one hunting a
    partridge in the mountains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'far from the presence of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּמִי
  chosen: my blood
  alternatives:
  - my life
  lexicon: HALOT
  rationale: Literal 'my blood' is retained because the Hebrew idiom evokes violent
    death and bloodguilt; 'my life' would smooth the image too much.
- source_word: אַל יִפֹּל ... אַרצה
  chosen: do not let ... fall to the ground
  alternatives:
  - may ... not fall to the earth
  lexicon: HALOT
  rationale: Keeps the concrete imagery of blood being shed on the ground while using
    natural English syntax.
- source_word: מִנֶּגֶד פְּנֵי יְהוָה
  chosen: away from before the LORD
  alternatives:
  - far from the presence of the LORD
  - outside the presence of the LORD
  lexicon: HALOT
  rationale: Preserves the spatial and covenantal sense of being removed from the
    LORD's presence, likely tied to exile from the land and sanctuary context. 'The
    LORD' follows the doctrinal default for YHWH.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD'.
- source_word: יָצָא
  chosen: has come out
  alternatives:
  - has gone out
  lexicon: HALOT
  rationale: Idiomatic English for a king setting out on a pursuit; preserves the
    Hebrew movement verb without over-literal stiffness.
- source_word: לְבַקֵּשׁ
  chosen: to seek
  alternatives:
  - to search for
  - to hunt down
  lexicon: HALOT
  rationale: '''Seek'' is the broad lexical sense and leaves the irony to the context;
    ''hunt down'' would front-load interpretation.'
- source_word: פַּרְעֹשׁ אֶחָד
  chosen: a single flea
  alternatives:
  - one flea
  lexicon: HALOT
  rationale: Retains David's self-deprecating metaphor and the emphasis of אֶחָד.
- source_word: הַקֹּרֵא
  chosen: a partridge
  alternatives:
  - the caller bird
  lexicon: HALOT
  rationale: The noun is traditionally understood as 'partridge' in this context;
    this fits the hunting comparison and standard lexical treatment.
- source_word: יִרְדֹּף ... בֶּהָרִים
  chosen: hunting a partridge in the mountains
  alternatives:
  - chasing a partridge in the hills
  lexicon: HALOT
  rationale: Uses a natural English hunting expression while preserving the simile
    and the mountainous setting. 'Mountains' is closer to הָרִים than 'hills'.
