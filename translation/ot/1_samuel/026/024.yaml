id: 1SA.26.24
reference: 1 Samuel 26:24
source:
  edition: WLC
  text: וְ/הִנֵּ֗ה כַּ/אֲשֶׁ֨ר גָּדְלָ֧ה נַפְשְׁ/ךָ֛ הַ/יּ֥וֹם הַ/זֶּ֖ה בְּ/עֵינָ֑/י
    כֵּ֣ן תִּגְדַּ֤ל נַפְשִׁ/י֙ בְּ/עֵינֵ֣י יְהוָ֔ה וְ/יַצִּלֵ֖/נִי מִ/כָּל צָרָֽה־׃פ
translation:
  text: And look, just as your life was precious in my eyes this day, so may my life
    be precious in the eyes of the LORD, and may he deliver me from all distress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your life was great in my eyes ... so may my life be great in the eyes
      of the LORD.' The Hebrew idiom uses 'great' to express high value or preciousness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - See
  lexicon: HALOT
  rationale: Introduces emphatic attention to what follows. 'And look' preserves the
    discourse force in natural modern English better than the more archaic 'behold.'
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Marks comparison between the first clause and the wish/prayer in the
    second; 'just as' clearly signals the parallel.
- source_word: גָּדְלָה ... נַפְשְׁךָ ... בְּעֵינַי
  chosen: your life was precious in my eyes
  alternatives:
  - your life was great in my eyes
  - you were highly valued in my eyes
  lexicon: HALOT
  rationale: 'Although the verb is literally ''was great,'' in this idiom with ''life/soul''
    and ''in the eyes of'' it conveys value or preciousness. ''Your life was precious
    in my eyes'' best captures the sense in context: David spared Saul because he
    valued Saul''s life.'
- source_word: נֶפֶשׁ
  chosen: life
  alternatives:
  - soul
  - self
  lexicon: HALOT
  rationale: In this context of sparing and deliverance from danger, נֶפֶשׁ refers
    to one's life rather than the immaterial soul. 'Life' is the most contextually
    accurate English rendering in both occurrences.
- source_word: הַיּוֹם הַזֶּה
  chosen: this day
  alternatives:
  - today
  - on this day
  lexicon: HALOT
  rationale: A natural but still fairly formal rendering that preserves the temporal
    emphasis of the Hebrew.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Carries the apodosis of the comparison succinctly and naturally.
- source_word: תִּגְדַּל ... נַפְשִׁי ... בְּעֵינֵי יְהוָה
  chosen: may my life be precious in the eyes of the LORD
  alternatives:
  - may my life be great in the eyes of the LORD
  - may I be highly valued in the eyes of the LORD
  lexicon: HALOT
  rationale: The imperfect here expresses a wish/prayer. Repeating 'be precious' maintains
    the comparison with the first clause and conveys the idiomatic sense of being
    valued or regarded as precious by the LORD.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's mandated default for the divine name.
- source_word: וְיַצִּלֵנִי
  chosen: and may he deliver me
  alternatives:
  - and let him rescue me
  - and may he save me
  lexicon: HALOT
  rationale: Hiphil of נצל commonly means to deliver/rescue. 'Deliver' fits both the
    prayer-like tone and the broad scope of the following phrase.
- source_word: מִכָּל צָרָה
  chosen: from all distress
  alternatives:
  - from all trouble
  - from every adversity
  lexicon: HALOT
  rationale: צָרָה denotes trouble, distress, or adversity. 'Distress' preserves the
    seriousness without narrowing it to a single kind of danger.
