id: 1SA.26.8
reference: 1 Samuel 26:8
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֲבִישַׁי֙ אֶל דָּוִ֔ד סִגַּ֨ר אֱלֹהִ֥ים הַ/יּ֛וֹם אֶת אוֹיִבְ/ךָ֖
    בְּ/יָדֶ֑/ךָ וְ/עַתָּה֩ אַכֶּ֨/נּוּ נָ֜א בַּ/חֲנִ֤ית וּ/בָ/אָ֨רֶץ֙ פַּ֣עַם אַחַ֔ת
    וְ/לֹ֥א אֶשְׁנֶ֖ה לֽ/וֹ־־׃
translation:
  text: Then Abishai said to David, “God has delivered your enemy into your hand today.
    So now, please let me strike him with the spear into the ground in one blow, and
    I will not strike him a second time.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “has handed over your enemy into your power today.”
    reason: lexical_alternative
  - marker: b
    text: Literally “with the spear and into the earth, once”; the sense is that Abishai
      offers to pin him to the ground with a single thrust.
    reason: lexical_alternative
lexical_decisions:
- source_word: סִגַּר
  chosen: has delivered
  alternatives:
  - has handed over
  - has shut up
  lexicon: HALOT
  rationale: In context the verb means to give someone over into another's power.
    'Has delivered' is idiomatic modern English and fits the military context better
    than the more literal but opaque 'has shut up.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The singular verb and context indicate Israel's God acting providentially;
    'God' is the natural English rendering.
- source_word: אוֹיִבְךָ
  chosen: your enemy
  alternatives:
  - the one hostile to you
  lexicon: HALOT
  rationale: Standard contextual rendering of the noun with 2ms suffix.
- source_word: בְּיָדֶךָ
  chosen: into your hand
  alternatives:
  - into your power
  - in your hand
  lexicon: HALOT
  rationale: The idiom denotes being given into someone's power. 'Into your hand'
    preserves the Hebrew image while remaining clear in English.
- source_word: אַכֶּנּוּ נָא
  chosen: please let me strike him
  alternatives:
  - let me strike him, please
  - please, I will strike him
  lexicon: HALOT
  rationale: The cohortative expresses Abishai's request/volition. English idiom is
    best captured with 'please let me strike him.'
- source_word: בַּחֲנִית
  chosen: with the spear
  alternatives:
  - with a spear
  lexicon: HALOT
  rationale: The article is present in Hebrew. 'The spear' likely refers to the spear
    at hand, fitting the immediate scene.
- source_word: וּבָאָרֶץ
  chosen: into the ground
  alternatives:
  - to the earth
  - to the ground
  lexicon: HALOT
  rationale: With the preceding verb and instrument, the phrase describes pinning
    Saul to the ground with the spear. 'Into the ground' communicates the intended
    action clearly.
- source_word: פַּעַם אַחַת
  chosen: in one blow
  alternatives:
  - once
  - one time
  lexicon: HALOT
  rationale: The phrase here modifies the manner of the strike, not merely the number
    of attempts. 'In one blow' conveys Abishai's claim that a single thrust will suffice.
- source_word: וְלֹא אֶשְׁנֶה לוֹ
  chosen: and I will not strike him a second time
  alternatives:
  - and I will not do it to him twice
  - and I will not repeat it for him
  lexicon: HALOT
  rationale: The verb 'repeat/do again' is elliptical in English; the implied action
    is another strike. Supplying 'strike him' makes the sense explicit without over-paraphrasing.
- source_word: וַיֹּאמֶר ... אֶל
  chosen: Then Abishai said to David
  alternatives:
  - And Abishai said to David
  lexicon: HALOT
  rationale: Narrative waw commonly advances the story. 'Then' gives natural English
    flow while preserving sequence.
