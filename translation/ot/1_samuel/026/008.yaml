theological_decisions:
- issue: Divine agency in Saul's vulnerability
  chosen_reading: God has delivered your enemy into your hand today
  alternative_readings:
  - God has shut up your enemy today into your hand
  - God has handed over your enemy into your power today
  rationale: The verse reports Abishai's interpretation of providence without endorsing
    his proposed killing. The translation preserves the statement of divine agency
    as spoken by Abishai and does not add approval language not present in the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it.
