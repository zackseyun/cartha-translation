id: 1SA.26.13
reference: 1 Samuel 26:13
source:
  edition: WLC
  text: וַ/יַּעֲבֹ֤ר דָּוִד֙ הָ/עֵ֔בֶר וַ/יַּעֲמֹ֥ד עַל רֹאשׁ הָ/הָ֖ר מֵֽ/רָחֹ֑ק רַ֥ב
    הַ/מָּק֖וֹם בֵּינֵי/הֶֽם־־׃
translation:
  text: Then David crossed over to the other side and stood on the top of the mountain
    at a distance; there was a great space between them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the distance between them was great.' The Hebrew literally says 'great
      was the space/place between them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר
  chosen: crossed over
  alternatives:
  - went over
  - passed over
  lexicon: HALOT
  rationale: The verb עבר commonly denotes crossing from one side to another. 'Crossed
    over' is natural English and preserves the directional sense better than the more
    generic 'went over.'
- source_word: הָעֵבֶר
  chosen: the other side
  alternatives:
  - the side beyond
  - the opposite side
  lexicon: HALOT
  rationale: With the article, the noun refers to the far side/opposite side. 'The
    other side' is idiomatic English and fits the narrative geography.
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - took his stand
  lexicon: HALOT
  rationale: The basic sense is 'stood.' Although the context implies a deliberate
    position, the simple English verb adequately conveys the action without overinterpreting.
- source_word: עַל רֹאשׁ הָהָר
  chosen: on the top of the mountain
  alternatives:
  - on the summit of the hill
  - on the head of the mountain
  lexicon: HALOT
  rationale: ראשׁ literally means 'head,' but in topographical usage it means 'top'
    or 'summit.' 'Mountain' is retained for הָהָר, though 'hill' is possible in some
    contexts; here 'top of the mountain' is clear and natural.
- source_word: מֵרָחֹק
  chosen: at a distance
  alternatives:
  - from afar
  - far away
  lexicon: HALOT
  rationale: The phrase indicates spatial separation. 'At a distance' reads smoothly
    in modern English while preserving the sense of remoteness.
- source_word: רַב הַמָּקוֹם
  chosen: there was a great space
  alternatives:
  - the distance was great
  - there was much space
  lexicon: HALOT
  rationale: Literally, 'the place/space was great.' In context this describes substantial
    distance separating David from Saul's camp. 'There was a great space' preserves
    the concrete imagery while remaining idiomatic.
- source_word: בֵּינֵיהֶם
  chosen: between them
  alternatives:
  - separating them
  lexicon: HALOT
  rationale: The prepositional phrase straightforwardly marks the space as lying between
    David and the others.
