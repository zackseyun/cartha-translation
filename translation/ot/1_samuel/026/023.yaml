id: 1SA.26.23
reference: 1 Samuel 26:23
source:
  edition: WLC
  text: וַֽ/יהוָה֙ יָשִׁ֣יב לָ/אִ֔ישׁ אֶת צִדְקָת֖/וֹ וְ/אֶת אֱמֻנָת֑/וֹ אֲשֶׁר֩ נְתָנְ/ךָ֨ יְהוָ֤ה הַ/יּוֹם֙ בְּ/יָ֔ד וְ/לֹ֣א אָבִ֔יתִי לִ/שְׁלֹ֥חַ יָדִ֖/י בִּ/מְשִׁ֥יחַ יְהוָֽה־־׀׃
translation:
  text: And Yahweh will repay each man for his righteousness and his faithfulness, because Yahweh gave you into my hand today, but I was not willing to stretch out my hand against Yahweh’s anointed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD will return to each man his righteousness and his faithfulness.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD’s anointed'; that is, the king anointed by the LORD.
    reason: cultural_note
lexical_decisions:
- source_word: וַיהוָה
  chosen: And the LORD
  alternatives:
  - And may the LORD
  - Now the LORD
  lexicon: HALOT
  rationale: YHWH is rendered by the project default 'the LORD' per doctrine. The prefixed conjunction is carried as simple narrative/discourse linkage, 'And.'
- source_word: יָשִׁיב
  chosen: will repay
  alternatives:
  - will return
  - will recompense
  lexicon: HALOT
  rationale: Hiphil of שוב here has the sense of causing to return in recompense, i.e., repaying or rewarding according to conduct. 'Will repay' is idiomatic and fits the ethical context.
- source_word: לָאִישׁ
  chosen: each man
  alternatives:
  - the man
  - a man
  - each person
  lexicon: HALOT
  rationale: The singular noun with prefixed ל marks the individual recipient of recompense in a general sense. 'Each man' preserves the masculine singular/generic force in line with the gender-accurate policy; 'each person' would flatten that feature.
- source_word: צִדְקָתוֹ
  chosen: his righteousness
  alternatives:
  - his justice
  - his rightness
  lexicon: HALOT
  rationale: In this context the term refers to moral uprightness/integrity. 'Righteousness' is the most natural and theologically weighty rendering; 'justice' is possible but less fitting for an individual's character here.
- source_word: וְאֶת אֱמֻנָתוֹ
  chosen: and his faithfulness
  alternatives:
  - and his fidelity
  - and his trustworthiness
  lexicon: HALOT
  rationale: אֱמוּנָה here denotes reliability, fidelity, or faithfulness shown in conduct. 'Faithfulness' best matches David's refusal to harm Saul and pairs well with 'righteousness.'
- source_word: אֲשֶׁר נְתָנְךָ יְהוָה הַיּוֹם בְּיָד
  chosen: because the LORD gave you into my hand today
  alternatives:
  - when the LORD gave you into my hand today
  - though the LORD gave you into my hand today
  lexicon: HALOT
  rationale: The relative clause explains the concrete instance in which David's righteousness/faithfulness was displayed. Supplying 'my' with 'hand' is required by English from the first-person context established by 'I was not willing.' 'Because' makes the explanatory force clear.
- source_word: וְלֹא אָבִיתִי
  chosen: but I was not willing
  alternatives:
  - and I was not willing
  - but I refused
  lexicon: HALOT
  rationale: אבה expresses willingness/refusal. 'Was not willing' closely reflects the Hebrew nuance; 'refused' is possible but slightly stronger. 'But' captures the contrast between opportunity and restraint.
- source_word: לִשְׁלֹחַ יָדִי
  chosen: to stretch out my hand
  alternatives:
  - to lay my hand
  - to send my hand against
  lexicon: HALOT
  rationale: This idiom commonly means to act violently against or strike. 'Stretch out my hand' preserves the Hebrew imagery while remaining understandable in English.
- source_word: בִּמְשִׁיחַ יְהוָה
  chosen: against the LORD’s anointed
  alternatives:
  - against the LORD's Messiah
  - against the anointed of the LORD
  lexicon: HALOT
  rationale: מָשִׁיחַ literally means 'anointed one.' In this historical context it refers specifically to Saul as the king anointed by YHWH, not directly as a messianic title. 'The LORD’s anointed' is the clearest contextual rendering.
