theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Generic masculine אִישׁ
  chosen_reading: each man
  alternative_readings:
  - each person
  rationale: The Hebrew is grammatically masculine singular with representative force. Per the gender-accurate policy, the translation preserves that form rather than neutralizing it.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: מְשִׁיחַ in reference to Saul
  chosen_reading: the LORD’s anointed
  alternative_readings:
  - the LORD's Messiah
  rationale: Although the noun is cognate with 'Messiah,' here it functions as a royal designation for Saul, not as a direct christological title. Translating the sense avoids importing later messianic specificity the text does not require.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
