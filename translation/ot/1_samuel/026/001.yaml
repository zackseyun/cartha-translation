id: 1SA.26.1
reference: 1 Samuel 26:1
source:
  edition: WLC
  text: וַ/יָּבֹ֤אוּ הַ/זִּפִים֙ אֶל שָׁא֔וּל הַ/גִּבְעָ֖תָ/ה לֵ/אמֹ֑ר הֲ/ל֨וֹא דָוִ֤ד
    מִסְתַּתֵּר֙ בְּ/גִבְעַ֣ת הַ/חֲכִילָ֔ה עַ֖ל פְּנֵ֥י הַ/יְשִׁימֹֽן־׃
translation:
  text: Then the Ziphites came to Saul at Gibeah, saying, “Is not David hiding on
    the hill of Hachilah, east of the wasteland?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “before Jeshimon” or “opposite the wasteland.” The Hebrew place expression
      may be understood either as a common noun (“wasteland/desert”) or as the regional
      name Jeshimon.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: Then ... came
  alternatives:
  - And ... came
  - So ... came
  lexicon: HALOT
  rationale: Wayyiqtol of בוא advances the narrative. 'Then' gives natural English
    narrative progression without over-paraphrasing; 'came' preserves the basic motion
    verb.
- source_word: הַזִּפִים
  chosen: the Ziphites
  alternatives:
  - the men of Ziph
  lexicon: HALOT
  rationale: The gentilic/plural refers to inhabitants of Ziph. 'Ziphites' is the
    standard concise English rendering and preserves the ethnic/geographic identity.
- source_word: הַגִּבְעָתָה
  chosen: at Gibeah
  alternatives:
  - to Gibeah
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward Gibeah.
    In idiomatic English with 'came to Saul,' 'at Gibeah' best reflects that Saul
    was located there, avoiding awkward double 'to' phrasing while preserving the
    setting.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The infinitive construct introduces direct speech. 'Saying' is a transparent
    and natural equivalent.
- source_word: הֲלוֹא
  chosen: Is not
  alternatives:
  - Surely
  - Isn't
  lexicon: HALOT
  rationale: The particle introduces a rhetorical question expecting confirmation.
    'Is not' preserves the formal rhetorical force better than the more colloquial
    'Isn't'.
- source_word: מִסְתַּתֵּר
  chosen: hiding
  alternatives:
  - concealing himself
  - in hiding
  lexicon: HALOT
  rationale: The hitpael participle of סתר conveys reflexive/passive nuance of keeping
    oneself hidden. 'Hiding' is clear, idiomatic, and sufficiently close to the Hebrew
    aspect.
- source_word: בְּגִבְעַת הַחֲכִילָה
  chosen: on the hill of Hachilah
  alternatives:
  - in the hill country of Hachilah
  - at the hill of Hachilah
  lexicon: HALOT
  rationale: גבעה normally denotes a hill. 'On the hill of Hachilah' fits the topographical
    sense and the preposition ב in context.
- source_word: עַל פְּנֵי הַיְשִׁימֹן
  chosen: east of the wasteland
  alternatives:
  - before the Jeshimon
  - in front of the desert
  - opposite the wasteland
  lexicon: HALOT
  rationale: The idiom עַל־פְּנֵי in geographical contexts often means 'in front of/opposite/east
    of.' Given the known topography in this David narrative, 'east of' is the clearest
    idiomatic rendering. הַיְשִׁימֹן is a desolate region; 'the wasteland' translates
    the common noun sense accessibly, while a footnote preserves the place-name-like
    alternative 'Jeshimon'.
