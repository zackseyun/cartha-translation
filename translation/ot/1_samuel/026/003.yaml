id: 1SA.26.3
reference: 1 Samuel 26:3
source:
  edition: WLC
  text: וַ/יִּ֨חַן שָׁא֜וּל בְּ/גִבְעַ֣ת הַ/חֲכִילָ֗ה אֲשֶׁ֛ר עַל פְּנֵ֥י הַ/יְשִׁימֹ֖ן
    עַל הַ/דָּ֑רֶךְ וְ/דָוִד֙ יֹשֵׁ֣ב בַּ/מִּדְבָּ֔ר וַ/יַּ֕רְא כִּ֣י בָ֥א שָׁא֛וּל
    אַחֲרָ֖י/ו הַ/מִּדְבָּֽרָ/ה־־׃
translation:
  text: And Saul camped on the hill of Hachilah, which is opposite Jeshimon, by the
    road. But David was staying in the wilderness, and he saw that Saul had come after
    him into the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jeshimon may also be understood generically as 'the wasteland' or 'the desert.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַן
  chosen: camped
  alternatives:
  - encamped
  - pitched camp
  lexicon: HALOT
  rationale: The verb חנה in military/travel context commonly means to encamp or set
    up camp. 'Camped' is natural modern English and preserves the concrete sense.
- source_word: בְּגִבְעַת הַחֲכִילָה
  chosen: on the hill of Hachilah
  alternatives:
  - at Gibeath-hachilah
  - on Gibeah of Hachilah
  lexicon: HALOT
  rationale: גִּבְעָה means 'hill.' Since חֲכִילָה is a place name, translating the
    common noun and transliterating the proper name follows the project's philosophy
    to translate titles/common nouns and transliterate names. 'On' fits the topographical
    sense.
- source_word: אֲשֶׁר עַל פְּנֵי הַיְשִׁימֹן
  chosen: which is opposite Jeshimon
  alternatives:
  - which faces Jeshimon
  - which is east of Jeshimon
  - which is before the wasteland
  lexicon: HALOT
  rationale: עַל־פְּנֵי often denotes being opposite or facing. הַיְשִׁימֹן may function
    here as the proper place name Jeshimon rather than a generic 'wasteland'; transliteration
    best preserves the geographic reference.
- source_word: עַל הַדָּרֶךְ
  chosen: by the road
  alternatives:
  - beside the road
  - on the road
  lexicon: HALOT
  rationale: Although עַל can be 'on,' in this locational description 'by the road'
    better conveys proximity without implying Saul was literally positioned on the
    roadway.
- source_word: יֹשֵׁב
  chosen: was staying
  alternatives:
  - was dwelling
  - was sitting
  - remained
  lexicon: HALOT
  rationale: ישב can mean sit, dwell, remain. In narrative setting about location,
    'was staying' gives idiomatic English while preserving the durative sense of the
    participle.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר often denotes wilderness rather than sandy desert specifically.
    'Wilderness' is the standard and contextually accurate rendering.
- source_word: וַיַּרְא כִּי בָא שָׁאוּל אַחֲרָיו
  chosen: and he saw that Saul had come after him
  alternatives:
  - and he saw that Saul came after him
  - and he realized that Saul was pursuing him
  lexicon: HALOT
  rationale: The clause reports David's recognition that Saul had arrived in pursuit.
    'Had come after him' preserves the motion verb בוא plus the pursuit nuance of
    אַחֲרֵי without over-interpreting as a technical military pursuit term.
- source_word: הַמִּדְבָּרָה
  chosen: into the wilderness
  alternatives:
  - to the wilderness
  - toward the wilderness
  lexicon: HALOT
  rationale: The directional he on מִדְבָּר indicates motion toward/into the wilderness.
    'Into the wilderness' captures the directional nuance more clearly than simply
    repeating 'the wilderness'.
