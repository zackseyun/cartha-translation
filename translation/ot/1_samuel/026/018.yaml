id: 1SA.26.18
reference: 1 Samuel 26:18
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר לָ֥/מָּה זֶּ֛ה אֲדֹנִ֥/י רֹדֵ֖ף אַחֲרֵ֣י עַבְדּ֑/וֹ כִּ֚י מֶ֣ה
    עָשִׂ֔יתִי וּ/מַה בְּ/יָדִ֖/י רָעָֽה־׃
translation:
  text: And he said, “Why is this, my lord, pursuing his servant? For what have I
    done, and what evil is in my hand?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''his servant.'' Some translations read ''your servant'' to smooth
      the direct address, but the Masoretic Text has the third-person form.'
    reason: alternative_reading
  - marker: b
    text: '''In my hand'' is a Hebrew idiom for culpability, intent, or power to do
      harm.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing David’s speech. 'And he said'
    preserves Hebrew narrative flow without overinterpreting temporal sequence.
- source_word: לָמָּה זֶּה
  chosen: Why is this
  alternatives:
  - Why this
  - Why then
  lexicon: HALOT
  rationale: The combination expresses 'why is this?' or 'why thus?'. Rendering it
    as 'Why is this' preserves the slightly emphatic, idiomatic Hebrew rather than
    smoothing it too far.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: Here David addresses Saul respectfully with a human superior title, not
    a divine title. 'My lord' fits courtly address in context better than 'my master'
    in contemporary English.
- source_word: רֹדֵף אַחֲרֵי
  chosen: pursuing
  alternatives:
  - chasing after
  - persecuting
  lexicon: HALOT
  rationale: The participle plus preposition means 'pursuing after.' 'Pursuing' is
    concise and natural English, preserving the active hostile pursuit without importing
    the more interpretive 'persecuting.'
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - your servant
  - his slave
  lexicon: HALOT
  rationale: The consonantal text has 3ms suffix, literally 'his servant.' In direct
    address one might expect 'your servant,' and many English versions smooth in that
    direction, but the MT form is best preserved in the main text. 'Servant' is preferable
    to 'slave' here because the bonded status is not the salient point; the term functions
    as a deferential self-reference.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces David’s explanatory rhetorical question. 'For' best captures
    the discourse function in English.
- source_word: מֶה עָשִׂיתִי
  chosen: what have I done
  alternatives:
  - what did I do
  lexicon: HALOT
  rationale: A straightforward rhetorical question. Present perfect English idiomatically
    conveys the completed action with present relevance.
- source_word: וּמַה בְּיָדִי רָעָה
  chosen: and what evil is in my hand
  alternatives:
  - and what wrong is in my hand
  - and what evil have I in my hand
  lexicon: HALOT
  rationale: The idiom 'in my hand' refers to what one is capable of or guilty of
    doing. Keeping 'in my hand' preserves the Hebrew metaphor while remaining understandable.
    'Evil' is retained rather than weakened to 'wrong' because רָעָה is the stronger,
    broader term.
