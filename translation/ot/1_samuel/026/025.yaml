id: 1SA.26.25
reference: 1 Samuel 26:25
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר שָׁא֜וּל אֶל דָּוִ֗ד בָּר֤וּךְ אַתָּה֙ בְּנִ֣/י דָוִ֔ד גַּ֚ם עָשֹׂ֣ה
    תַעֲשֶׂ֔ה וְ/גַ֖ם יָכֹ֣ל תּוּכָ֑ל וַ/יֵּ֤לֶךְ דָּוִד֙ לְ/דַרְכּ֔/וֹ וְ/שָׁא֖וּל
    שָׁ֥ב לִ/מְקוֹמֽ/וֹ־׃פ
translation:
  text: Then Saul said to David, “Blessed are you, my son David. You will surely do
    great things, and you will surely prevail.” Then David went on his way, and Saul
    returned to his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'doing you will do, and being able you will be able'—a
      pair of infinitive absolute constructions intensifying the certainty of David's
      future success.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּר֤וּךְ אַתָּה
  chosen: Blessed are you
  alternatives:
  - May you be blessed
  - Blessed be you
  lexicon: HALOT
  rationale: Passive participial blessing formula addressed directly to David. 'Blessed
    are you' is natural English and preserves the declarative force better than a
    wish-prayer rendering.
- source_word: בְּנִי דָוִד
  chosen: my son David
  alternatives:
  - my son, David
  lexicon: HALOT
  rationale: Retains Saul's familial/patronal form of address without softening it.
    The appositional proper name is kept directly after 'my son'.
- source_word: גַּם עָשֹׂה תַעֲשֶׂה
  chosen: You will surely do great things
  alternatives:
  - You will surely act
  - You will indeed accomplish
  - You will surely do
  lexicon: HALOT
  rationale: 'The infinitive absolute plus imperfect intensifies the verb: ''surely
    do.'' In context Saul is affirming David''s future success and achievement, so
    ''do great things'' brings out the idiomatic force in readable English without
    straying from the Hebrew.'
- source_word: וְגַם יָכֹל תּוּכָל
  chosen: and you will surely prevail
  alternatives:
  - and you will surely be able
  - and you will surely succeed
  - and you will indeed overcome
  lexicon: HALOT
  rationale: Again an infinitive absolute plus imperfect for emphasis. While literally
    'being able you will be able,' in context it points to successful overcoming,
    so 'surely prevail' best captures the sense.
- source_word: וַיֵּלֶךְ דָּוִד לְדַרְכּוֹ
  chosen: Then David went on his way
  alternatives:
  - And David went his way
  - Then David went to his way
  lexicon: HALOT
  rationale: Idiomatic Hebrew for departing. 'Went on his way' is standard, natural
    English and preserves the narrative closure.
- source_word: וְשָׁאוּל שָׁב לִמְקוֹמוֹ
  chosen: and Saul returned to his place
  alternatives:
  - and Saul went back to his place
  - and Saul returned home
  lexicon: HALOT
  rationale: שׁוּב plus 'to his place' is straightforward. 'Returned to his place'
    is more textually precise than 'returned home,' since the Hebrew does not specify
    home.
