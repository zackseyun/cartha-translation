id: 1SA.26.10
reference: 1 Samuel 26:10
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר דָּוִד֙ חַי יְהוָ֔ה כִּ֥י אִם יְהוָ֖ה יִגָּפֶ֑/נּוּ אֽוֹ יוֹמ֤/וֹ
    יָבוֹא֙ וָ/מֵ֔ת א֧וֹ בַ/מִּלְחָמָ֛ה יֵרֵ֖ד וְ/נִסְפָּֽה־־־׃
translation:
  text: And David said, “As the LORD lives, surely the LORD will strike him, or his
    day will come and he will die, or he will go down into battle and perish.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the LORD will strike him down.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'his time will come and he will die.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'he will go down to battle and be swept away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is the standard Hebrew oath formula. 'As the LORD lives' is idiomatic,
    natural English that preserves the solemn force of the oath without paraphrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: כִּי אִם
  chosen: surely
  alternatives:
  - indeed
  - except that
  lexicon: HALOT
  rationale: In this oath context, כִּי אִם introduces the emphatic content of David's
    assertion rather than a strict exception. 'Surely' captures the asseverative force
    in clear English.
- source_word: יִגָּפֶנּוּ
  chosen: will strike him
  alternatives:
  - will smite him
  - will strike him down
  - will plague him
  lexicon: HALOT
  rationale: From נָגַף, the sense is that the LORD will inflict a decisive blow on
    Saul. 'Strike him' is natural modern English and leaves the exact mode of divine
    judgment open, as the Hebrew does.
- source_word: יוֹמוֹ יָבוֹא
  chosen: his day will come
  alternatives:
  - his time will come
  - his day will arrive
  lexicon: HALOT
  rationale: This idiom refers to the appointed time of death or judgment. 'His day
    will come' preserves the idiomatic and ominous force while remaining readable.
- source_word: וָמֵת
  chosen: and he will die
  alternatives:
  - and die
  - so that he dies
  lexicon: HALOT
  rationale: 'The sequence after ''his day will come'' is best made explicit in English
    with a subject: ''and he will die.'' This preserves the Hebrew sense without awkwardness.'
- source_word: בַמִּלְחָמָה יֵרֵד
  chosen: he will go down into battle
  alternatives:
  - he will go down to battle
  - he will descend into the battle
  lexicon: HALOT
  rationale: יָרַד ('go down') is retained because it is present in the Hebrew and
    is common in military movement language. 'Into battle' is smoother English than
    a more wooden rendering.
- source_word: וְנִסְפָּה
  chosen: and perish
  alternatives:
  - and be swept away
  - and be destroyed
  - and die
  lexicon: HALOT
  rationale: From סָפָה, the sense is being consumed or perishing, here likely in
    battle. 'Perish' preserves the distinct lexical nuance from the earlier מוּת ('die')
    and avoids flattening the parallel options.
