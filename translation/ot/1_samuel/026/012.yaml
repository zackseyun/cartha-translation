id: 1SA.26.12
reference: 1 Samuel 26:12
source:
  edition: WLC
  text: וַ/יִּקַּח֩ דָּוִ֨ד אֶֽת הַ/חֲנִ֜ית וְ/אֶת צַפַּ֤חַת הַ/מַּ֨יִם֙ מֵרַאֲשֹׁתֵ֣י שָׁא֔וּל וַ/יֵּלְכ֖וּ לָ/הֶ֑ם וְ/אֵ֣ין רֹאֶה֩ וְ/אֵ֨ין יוֹדֵ֜עַ וְ/אֵ֣ין מֵקִ֗יץ כִּ֤י כֻלָּ/ם֙ יְשֵׁנִ֔ים כִּ֚י תַּרְדֵּמַ֣ת יְהוָ֔ה נָפְלָ֖ה עֲלֵי/הֶֽם־־׃
translation:
  text: So David took the spear and the jar of water from beside Saul’s head, and they went away. No one saw it, and no one knew it, and no one awoke, for they were all sleeping, because a deep sleep from Yahweh had fallen on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from beside Saul’s head.' The Hebrew expression refers to the area at Saul’s head as he lay sleeping.
    reason: lexical_alternative
  - marker: b
    text: Or, 'a deep sleep of the LORD had fallen on them.' The phrase indicates that the sleep came by the LORD’s action.
    reason: alternative_reading
lexical_decisions:
- source_word: הַחֲנִית
  chosen: the spear
  alternatives:
  - the lance
  lexicon: HALOT
  rationale: חֲנִית denotes a spear or lance. 'Spear' is the more natural and common English military term here and fits the narrative context.
- source_word: צַפַּחַת הַמַּיִם
  chosen: the jar of water
  alternatives:
  - the water jug
  - the cruse of water
  lexicon: HALOT
  rationale: צַפַּחַת refers to a flask, jar, or jug. 'Jar of water' is clear modern English and avoids archaic 'cruse' while preserving the concrete object.
- source_word: מֵרַאֲשֹׁתֵי שָׁאוּל
  chosen: from Saul’s head
  alternatives:
  - from beside Saul’s head
  - from Saul’s head-place
  lexicon: HALOT
  rationale: The idiom refers to the place at or near Saul's head as he lay sleeping. 'From Saul’s head' is concise and idiomatic in English, though spatially it means from the area by his head rather than literally off his person.
- source_word: וַיֵּלְכוּ לָהֶם
  chosen: and they went away
  alternatives:
  - and they went off
  - and they went on their way
  lexicon: HALOT
  rationale: The plural verb refers to David and Abishai departing. לָהֶם adds the sense of going off for themselves; 'went away' captures the departure naturally without overtranslating.
- source_word: וְאֵין רֹאֶה
  chosen: No one saw
  alternatives:
  - there was no one seeing
  lexicon: HALOT
  rationale: 'The אין + participle construction is best rendered idiomatically in English as an indefinite negative: ''No one saw.'''
- source_word: וְאֵין יוֹדֵעַ
  chosen: and no one knew
  alternatives:
  - and no one noticed
  - and no one was aware
  lexicon: HALOT
  rationale: יָדַע here conveys awareness or knowledge of what happened. 'Knew' is the most direct rendering; the context supplies the sense of awareness.
- source_word: וְאֵין מֵקִיץ
  chosen: and no one awoke
  alternatives:
  - and no one stirred
  - and no one woke up
  lexicon: HALOT
  rationale: The participle from קיץ means to awake. 'Awoke' is slightly more literary but still natural and fits the narrative register.
- source_word: כִּי כֻלָּם יְשֵׁנִים
  chosen: for they were all sleeping
  alternatives:
  - for all of them were asleep
  lexicon: HALOT
  rationale: The clause gives the immediate explanation for the unnoticed departure. 'They were all sleeping' is smooth modern English and preserves the progressive state.
- source_word: תַּרְדֵּמַת יְהוָה
  chosen: a deep sleep from the LORD
  alternatives:
  - a deep sleep of the LORD
  - the LORD's deep sleep
  lexicon: HALOT
  rationale: תַּרְדֵּמָה denotes a deep sleep or trance-like sleep. The genitive with the divine name indicates source or causation. 'From the LORD' makes the causative sense explicit in natural English without implying possession alone.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נָפְלָה עֲלֵיהֶם
  chosen: had fallen on them
  alternatives:
  - had come upon them
  lexicon: HALOT
  rationale: 'The idiom ''fell upon them'' is preserved in understandable English. The pluperfect ''had fallen'' fits the narrative logic: their sleep was already in effect when David acted.'
