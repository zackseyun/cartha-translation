theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering of
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Agency in תַּרְדֵּמַת יְהוָה
  chosen_reading: a deep sleep from the LORD had fallen on them
  alternative_readings:
  - the LORD had caused a deep sleep to fall on them
  - the LORD's deep sleep had fallen on them
  rationale: The Hebrew attributes the sleep to the LORD without requiring an expanded
    paraphrase. 'From the LORD' preserves divine agency while staying close to the
    source and not overstating mechanism.
  doctrine_reference: Translation philosophy §1, §3
