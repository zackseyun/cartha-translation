id: 1SA.26.4
reference: 1 Samuel 26:4
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֥ח דָּוִ֖ד מְרַגְּלִ֑ים וַ/יֵּ֕דַע כִּֽי בָ֥א שָׁא֖וּל אֶל נָכֽוֹן־־׃
translation:
  text: So David sent out scouts, and he learned that Saul had indeed come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and he found out for certain that Saul had come.' The final Hebrew term
      likely adds a nuance of certainty or confirmation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent out
  alternatives:
  - sent
  lexicon: HALOT
  rationale: The verb שׁלח means 'send.' 'Sent out' fits the military/reconnaissance
    context naturally in English without adding content beyond the Hebrew narrative
    wayyiqtol.
- source_word: מְרַגְּלִים
  chosen: scouts
  alternatives:
  - spies
  - reconnaissance men
  lexicon: HALOT
  rationale: From רגל in the sense of spying out or reconnoitering. 'Scouts' is idiomatic
    modern English and suits the immediate tactical setting better than 'spies,' which
    can sound more covert/political than military reconnaissance.
- source_word: וַיֵּדַע
  chosen: he learned
  alternatives:
  - he knew
  - he found out
  lexicon: HALOT
  rationale: ידע commonly means 'know,' but in this sequence after sending scouts
    it denotes coming to know by report. 'He learned' expresses the result of the
    reconnaissance in natural English.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed that
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what David learned: ''that Saul
    had come.'' The asseverative nuance is reflected elsewhere in the clause rather
    than by making כִּי itself overly heavy in English.'
- source_word: בָא
  chosen: had come
  alternatives:
  - came
  - was coming
  lexicon: HALOT
  rationale: The perfect verb reports Saul's arrival as a completed fact relative
    to David's learning. English past perfect communicates that completed prior action
    smoothly in context.
- source_word: אֶל
  chosen: —
  alternatives:
  - to
  - into
  - at
  lexicon: HALOT
  rationale: The preposition is absorbed into the idiomatic rendering of the following
    noun phrase. English does not require a separate explicit equivalent once נָכוֹן
    is rendered adverbially.
- source_word: נָכוֹן
  chosen: indeed
  alternatives:
  - for certain
  - surely
  - to a fixed place
  lexicon: HALOT
  rationale: 'In this context נָכוֹן is best taken adverbially, conveying certainty/confirmation:
    Saul had really come. This matches the narrative point that David verified Saul''s
    presence. A locative sense (''to a fixed place'') is less likely here and yields
    awkward English.'
- source_word: דָּוִד
  chosen: David
  rationale: Standard English transliteration of the personal name.
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Standard English transliteration of the personal name.
