id: 1SA.26.2
reference: 1 Samuel 26:2
source:
  edition: WLC
  text: וַ/יָּ֣קָם שָׁא֗וּל וַ/יֵּ֨רֶד֙ אֶל מִדְבַּר זִ֔יף וְ/אִתּ֛/וֹ שְׁלֹֽשֶׁת אֲלָפִ֥ים אִ֖ישׁ בְּחוּרֵ֣י יִשְׂרָאֵ֑ל לְ/בַקֵּ֥שׁ אֶת דָּוִ֖ד בְּ/מִדְבַּר זִֽיף־־־־־׃
translation:
  text: Then Saul arose and went down to the wilderness of Ziph, and with him were three thousand chosen men of Israel, to seek David in the wilderness of Ziph.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with three thousand chosen men of Israel with him'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - set out
  - got up
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום often marks the beginning of decisive action in narrative. 'Arose' preserves the narrative idiom better than the flatter 'set out,' while remaining natural in English when paired with the following verb.
- source_word: וַיֵּרֶד
  chosen: went down
  alternatives:
  - descended
  lexicon: HALOT
  rationale: ירד commonly means 'go down/descend.' 'Went down' is idiomatic modern English and preserves the directional sense without sounding overly formal.
- source_word: אֶל מִדְבַּר זִיף
  chosen: to the wilderness of Ziph
  alternatives:
  - to the desert of Ziph
  - to the wilderness region of Ziph
  lexicon: HALOT
  rationale: מִדְבָּר denotes wilderness/open country rather than a sand desert specifically. 'Wilderness of Ziph' is the standard and most accurate geographic rendering.
- source_word: וְאִתּוֹ
  chosen: with him
  alternatives:
  - accompanied by him
  lexicon: HALOT
  rationale: Simple accompaniment is intended. 'With him' is direct and natural.
- source_word: שְׁלֹשֶׁת אֲלָפִים אִישׁ
  chosen: three thousand ... men
  alternatives:
  - three thousand soldiers
  - three thousand men
  lexicon: HALOT
  rationale: The Hebrew construction literally reads 'three thousand men.' Because בְּחוּרֵי further qualifies them, the translation keeps 'men' rather than importing 'soldiers,' though the military context is clear.
- source_word: בְּחוּרֵי יִשְׂרָאֵל
  chosen: chosen men of Israel
  alternatives:
  - select men of Israel
  - picked men of Israel
  lexicon: HALOT
  rationale: From בחר, this expression refers to selected elite troops. 'Chosen men' preserves the lexical connection to 'chosen/select' without over-paraphrasing.
- source_word: לְבַקֵּשׁ
  chosen: to seek
  alternatives:
  - to search for
  - to look for
  lexicon: HALOT
  rationale: בקש commonly means 'seek.' In this pursuit context, 'seek' is concise and suitably weighty; 'search for' is possible but less direct.
- source_word: אֶת דָּוִד
  chosen: David
  lexicon: HALOT
  rationale: Direct object marker אֶת is untranslated; the personal name is transliterated per translation policy.
- source_word: בְּמִדְבַּר זִיף
  chosen: in the wilderness of Ziph
  alternatives:
  - in the wilderness region of Ziph
  lexicon: HALOT
  rationale: The repeated phrase is retained rather than reduced, because the Hebrew repeats it for emphasis/location specificity. 'In' correctly renders בְּ in this search context.
