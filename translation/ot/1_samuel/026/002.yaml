  from: with three thousand chosen men of Israel with him
  to: and with him were three thousand chosen men of Israel
  rationale: The current rendering is redundant due to the repetition of 'with' and 'with him' to translate the single Hebrew concept of accompaniment. The Hebrew `וְאִתּוֹ` introduces a circumstantial clause. A more natural and faithful rendering that avoids the redundancy is 'and with him were three thousand chosen men of Israel,' which preserves the initial conjunction and the fronted prepositional phrase found in the Hebrew.
