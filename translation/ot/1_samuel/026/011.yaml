id: 1SA.26.11
reference: 1 Samuel 26:11
source:
  edition: WLC
  text: חָלִ֤ילָ/ה לִּ/י֙ מֵֽ/יהוָ֔ה מִ/שְּׁלֹ֥חַ יָדִ֖/י בִּ/מְשִׁ֣יחַ יְהוָ֑ה וְ֠/עַתָּה
    קַח נָ֨א אֶֽת הַ/חֲנִ֜ית אֲשֶׁ֧ר מראשת/ו וְ/אֶת צַפַּ֥חַת הַ/מַּ֖יִם וְ/נֵ֥לֲכָה
    לָּֽ/נוּ־־־׃
translation:
  text: Far be it from me, by the LORD, to stretch out my hand against the LORD’s
    anointed. But now, please take the spear that is at his head, and the jar of water,
    and let us go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Far be it from me from the LORD,' an idiom meaning strong refusal or
      abhorrence; 'by the LORD' reflects the oath-like force of the Hebrew.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD’s anointed.' The word is related to 'Messiah,' but here
      it refers to Saul as the king anointed by the LORD.
    reason: lexical_alternative
  - marker: c
    text: Or 'by the LORD,'.
    reason: previous_rendering
lexical_decisions:
- source_word: חָלִילָה לִּי
  chosen: Far be it from me
  alternatives:
  - May it be profane for me
  - God forbid
  lexicon: HALOT
  rationale: Idiomatic expression of strong repudiation or abhorrence. 'Far be it
    from me' is natural modern English and preserves the force without importing the
    more interpretive 'God forbid.'
- source_word: מֵיְהוָה
  chosen: by the LORD
  alternatives:
  - from the LORD
  - before the LORD
  lexicon: HALOT
  rationale: With חָלִילָה this preposition can mark an oath-like appeal or invocation.
    'By the LORD' best captures the idiomatic force in English. The divine name follows
    doctrine default as 'the LORD.'
- source_word: מִשְּׁלֹחַ יָדִי
  chosen: to stretch out my hand
  alternatives:
  - to send my hand
  - to lay my hand
  lexicon: HALOT
  rationale: Hebrew idiom for taking hostile action or striking. 'Stretch out my hand'
    is sufficiently literal and recognizable in English biblical style.
- source_word: בִּמְשִׁיחַ יְהוָה
  chosen: against the LORD’s anointed
  alternatives:
  - against Yahweh's anointed
  - against the LORD's Messiah
  lexicon: HALOT
  rationale: מָשִׁיחַ here refers to the king anointed by the LORD, not directly to
    the later messianic title. 'Anointed' preserves the lexical link while fitting
    the immediate historical context. 'Against' is the natural English sense with
    hostile extension of the hand.
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now then
  lexicon: HALOT
  rationale: Marks transition from refusal to instruction. 'But now' reflects the
    contrastive movement in context.
- source_word: קַח נָא
  chosen: please take
  alternatives:
  - take now
  - take, please
  lexicon: HALOT
  rationale: Imperative softened by particle נָא. 'Please take' is natural modern
    English and preserves the politeness/urgency.
- source_word: הַחֲנִית
  chosen: the spear
  alternatives:
  - the lance
  lexicon: HALOT
  rationale: Standard military weapon term; 'spear' is the clearest common English
    equivalent.
- source_word: אֲשֶׁר מראשתו
  chosen: that is by his head
  alternatives:
  - that is at his head
  - that is at his head-place
  lexicon: HALOT
  rationale: Refers to the spear positioned near Saul's head as he sleeps. 'By his
    head' is idiomatic and clear.
- source_word: צַפַּחַת הַמַּיִם
  chosen: the jar of water
  alternatives:
  - the water jug
  - the cruse of water
  lexicon: HALOT
  rationale: A small vessel or jar. 'Jar of water' is readable modern English; 'cruse'
    is archaic.
- source_word: וְנֵלֲכָה לָּנוּ
  chosen: and let us go
  alternatives:
  - and let us be going
  - and we will go away
  lexicon: HALOT
  rationale: Cohortative first person plural expressing proposed departure. 'Let us
    go' is the natural English rendering.
