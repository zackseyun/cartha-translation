theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH, preserving reverential
    convention and broad English readability.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering מְשִׁיחַ in this royal context
  chosen_reading: anointed
  alternative_readings:
  - Messiah
  rationale: Although the noun is lexically related to 'Messiah,' in this narrative
    it refers specifically to Saul as the king anointed by the LORD. Translating as
    'anointed' preserves the lexical sense without overstating messianic title usage
    in this context.
  doctrine_reference: DOCTRINE.md Translation philosophy §2; Contested terms table
    notes title-sensitive rendering
