  source_review: state/reviews/gemini/weighted_vocab/ot/1_samuel/026/011.job-10952.json
  category: awkward_english
  tier: 1
  from: by the LORD,
  to: before the LORD,
  rationale: The Hebrew `מֵיְהוָה` following `חָלִילָה` indicates that the action
    is abhorrent in God's sight or presence. While 'by the LORD' attempts to capture
    an oath-like force, the resulting English phrase 'Far be it from me, by the LORD,'
    is slightly awkward. 'before the LORD' is a more common and natural English biblical
    idiom for this concept (cf. Gen 10:9), avoiding the awkwardness while still conveying
    the solemnity of a statement made in God's presence.
