theological_decisions:
- issue: Rendering of מְשִׁיחַ in reference to Saul
  chosen_reading: the LORD’s anointed
  alternative_readings:
  - the LORD's Messiah
  rationale: Although the noun is the same root later associated with 'Messiah,' here it refers to Saul as the king anointed by YHWH. Translating it as 'anointed' preserves the immediate historical sense and avoids importing a christological claim the text does not make, while preserving the lexical connection in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; preserve theological tension rather than resolve it unnecessarily.'
