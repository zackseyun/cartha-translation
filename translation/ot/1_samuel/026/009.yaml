id: 1SA.26.9
reference: 1 Samuel 26:9
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר דָּוִ֛ד אֶל אֲבִישַׁ֖י אַל תַּשְׁחִיתֵ֑/הוּ כִּ֠י מִ֣י שָׁלַ֥ח יָד֛/וֹ בִּ/מְשִׁ֥יחַ יְהוָ֖ה וְ/נִקָּֽה־־׃פ
translation:
  text: But David said to Abishai, “Do not destroy him, for who can stretch out his hand against Yahweh’s anointed and remain guiltless?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the LORD’s anointed' uses the same word family later associated with 'Messiah.' Here it refers to Saul as the king anointed by the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But David said
  alternatives:
  - And David said
  - Then David said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' captures the adversative sense in context, since David is countering Abishai's implied proposal to kill Saul.
- source_word: אַל תַּשְׁחִיתֵהוּ
  chosen: Do not destroy him
  alternatives:
  - Do not kill him
  - Do not ruin him
  lexicon: HALOT
  rationale: The Hiphil of שׁחת can mean destroy/ruin. In this immediate context of a proposed lethal strike, 'destroy him' preserves the broader Hebrew verb while still fitting the life-and-death setting. 'Kill him' is possible but slightly more interpretive.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for David's prohibition. 'For' is concise and natural in English.
- source_word: מִי
  chosen: who can
  alternatives:
  - who
  - who has
  lexicon: HALOT
  rationale: The interrogative introduces a rhetorical question about possibility and moral impunity. 'Who can' brings out the force in idiomatic English, though the Hebrew is simply 'who'.
- source_word: שָׁלַח יָדוֹ
  chosen: stretch out his hand
  alternatives:
  - lay his hand
  - raise his hand
  lexicon: HALOT
  rationale: This Hebrew idiom commonly denotes taking action against someone, often violently. 'Stretch out his hand' preserves the idiom more transparently than the more interpretive 'raise his hand'.
- source_word: בִּמְשִׁיחַ יְהוָה
  chosen: against the LORD’s anointed
  alternatives:
  - against the anointed of the LORD
  - against the LORD's Messiah
  lexicon: HALOT
  rationale: מָשִׁיחַ means 'anointed one.' In this historical context it refers to the king consecrated by YHWH, not directly to the eschatological title 'Messiah.' The preposition with the idiom 'stretch out hand' is best rendered 'against.' YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: וְנִקָּה
  chosen: and remain guiltless
  alternatives:
  - and be innocent
  - and go unpunished
  lexicon: HALOT
  rationale: The verb נקה in this construction conveys being free from guilt or liability. 'Remain guiltless' fits the rhetorical question and avoids narrowing the sense merely to escaping punishment, though that implication is present.
