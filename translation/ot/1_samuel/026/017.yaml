theological_decisions:
- issue: Relational address בְּנִי in Saul’s speech
  chosen_reading: Render literally as 'my son'
  alternative_readings:
  - my child
  rationale: The term is not primarily theological here, but it carries narrative
    and relational weight. A literal rendering preserves the tension of Saul addressing
    David with familial language despite hostility. This also follows the gender-accurate
    principle rather than neutralizing the masculine noun.
