id: 1SA.26.17
reference: 1 Samuel 26:17
source:
  edition: WLC
  text: וַ/יַּכֵּ֤ר שָׁאוּל֙ אֶת ק֣וֹל דָּוִ֔ד וַ/יֹּ֕אמֶר הֲ/קוֹלְ/ךָ֥ זֶ֖ה בְּנִ֣/י
    דָוִ֑ד וַ/יֹּ֣אמֶר דָּוִ֔ד קוֹלִ֖/י אֲדֹנִ֥/י הַ/מֶּֽלֶךְ־׃
translation:
  text: Then Saul recognized David’s voice and said, “Is this your voice, my son David?”
    And David said, “It is my voice, my lord the king.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּכֵּר
  chosen: recognized
  alternatives:
  - identified
  - knew
  lexicon: HALOT
  rationale: The verb נכר here denotes recognizing or identifying by perception. In
    context Saul discerns that the voice is David's, so 'recognized' is natural modern
    English and fits the direct object 'David’s voice.'
- source_word: קוֹל
  chosen: voice
  alternatives:
  - sound
  lexicon: HALOT
  rationale: קוֹל can mean 'voice' or more broadly 'sound.' Since Saul is identifying
    a speaker and the dialogue repeats the term in direct address, 'voice' is the
    precise contextual sense.
- source_word: הֲקוֹלְךָ זֶה
  chosen: Is this your voice
  alternatives:
  - Is this your sound
  - Is that your voice
  lexicon: HALOT
  rationale: The Hebrew interrogative plus demonstrative is most directly rendered
    'Is this your voice?' English idiom allows this straightforwardly without adding
    interpretive material.
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: Saul addresses David as 'my son,' reflecting relational and royal language
    already established in the narrative. 'My child' would soften the masculine and
    familial specificity; the translation follows the gender-accurate principle.
- source_word: קוֹלִי
  chosen: It is my voice
  alternatives:
  - My voice
  - It is I
  lexicon: HALOT
  rationale: Literally 'my voice.' In English, a verbless reply can sound abrupt or
    unclear, so 'It is my voice' supplies the implied copula while preserving the
    lexical focus on 'voice' rather than shifting to 'I.'
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  - my lord, O king
  lexicon: HALOT
  rationale: אדני is a respectful human address here, not the divine title. 'My lord
    the king' preserves both the deferential address and the appositional royal title
    in natural English.
- source_word: דָּוִד / שָׁאוּל
  chosen: David / Saul
  rationale: Personal names are transliterated by standard English conventions in
    keeping with the translation philosophy.
