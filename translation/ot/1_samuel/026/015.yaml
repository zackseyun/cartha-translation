id: 1SA.26.15
reference: 1 Samuel 26:15
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ דָּוִ֨ד אֶל אַבְנֵ֜ר הֲ/לוֹא אִ֣ישׁ אַתָּ֗ה וּ/מִ֤י כָמ֨וֹ/ךָ֙
    בְּ/יִשְׂרָאֵ֔ל וְ/לָ֨/מָּה֙ לֹ֣א שָׁמַ֔רְתָּ אֶל אֲדֹנֶ֖י/ךָ הַ/מֶּ֑לֶךְ כִּי
    בָא֙ אַחַ֣ד הָ/עָ֔ם לְ/הַשְׁחִ֖ית אֶת הַ/מֶּ֥לֶךְ אֲדֹנֶֽי/ךָ־־־־־׃
translation:
  text: David said to Abner, “Are you not a man? And who is like you in Israel? So
    why have you not kept watch over your lord the king? For one of the people came
    to destroy the king your lord.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “And who is your equal in Israel?”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “one of the people,” meaning one person from among the camp.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא אִישׁ אַתָּה
  chosen: Are you not a man?
  alternatives:
  - Are you not a valiant man?
  - Are you not a man indeed?
  lexicon: HALOT
  rationale: אִישׁ literally means 'man.' In context David is shaming Abner's failure
    as a prominent warrior, but the text itself does not add an adjective such as
    'valiant.' The straightforward rhetorical question is preserved.
- source_word: וּמִי כָמוֹךָ בְּיִשְׂרָאֵל
  chosen: And who is like you in Israel?
  alternatives:
  - And who is your equal in Israel?
  lexicon: HALOT
  rationale: כָמוֹךָ expresses comparison, 'like you.' The idiomatic sense is uniqueness
    or peerlessness. 'Who is like you' keeps the Hebrew form while remaining natural
    English.
- source_word: וְלָמָּה לֹא שָׁמַרְתָּ אֶל
  chosen: So why have you not kept watch over
  alternatives:
  - Why have you not guarded
  - Why did you not watch over
  lexicon: HALOT
  rationale: שׁמר commonly means 'keep, guard, watch.' With אֶל and the object 'your
    lord the king,' the sense is protective vigilance. 'Kept watch over' captures
    both guarding and watchfulness in this military setting.
- source_word: אֲדֹנֶיךָ הַמֶּלֶךְ
  chosen: your lord the king
  alternatives:
  - your master the king
  - your lord, the king
  lexicon: HALOT
  rationale: אדון can mean 'lord' or 'master.' Here it denotes Abner's superior, Saul,
    in courtly-political address. 'Lord' preserves the hierarchical sense without
    sounding overly servile; apposition with 'the king' is retained.
- source_word: כִּי בָא אַחַד הָעָם
  chosen: For one of the people came
  alternatives:
  - For one of the men came
  - For someone from the people came
  lexicon: HALOT
  rationale: אַחַד הָעָם is literally 'one of the people.' In context it refers to
    one person from among the camp. 'One of the people' is slightly formal but preserves
    the Hebrew expression and avoids over-specifying 'soldiers' or 'men.'
- source_word: לְהַשְׁחִית
  chosen: to destroy
  alternatives:
  - to kill
  - to ruin
  lexicon: HALOT
  rationale: The Hiphil of שׁחת often means 'destroy' or 'bring to ruin.' In this
    context the intended result is the king's death, but 'destroy' is the lexical
    match and leaves the expression as stated in Hebrew.
- source_word: הַמֶּלֶךְ אֲדֹנֶיךָ
  chosen: the king your lord
  alternatives:
  - the king, your lord
  - your lord the king
  lexicon: HALOT
  rationale: The repeated designation intensifies Abner's culpability. Rendering it
    as 'the king your lord' preserves the Hebrew order and rhetorical emphasis rather
    than smoothing away the repetition.
