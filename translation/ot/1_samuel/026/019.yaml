theological_decisions:
- issue: Reference to the LORD stirring Saul up against David
  chosen_reading: Retained the conditional statement without resolving how divine
    causation relates to human agency.
  alternative_readings:
  - Interpreting it as direct divine incitement
  - Interpreting it as permissive providence only
  rationale: The Hebrew presents David's conditional appeal without explaining the
    metaphysics of divine involvement. The translation preserves that tension rather
    than importing a doctrinal resolution.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of exclusion from 'the LORD’s inheritance'
  chosen_reading: Rendered as exclusion from having a share in the LORD's inheritance,
    encompassing land and covenant community.
  alternative_readings:
  - Restriction to physical land only
  - Restriction to access to sanctuary worship only
  rationale: The phrase likely includes both territorial and covenantal-religious
    dimensions. The translation keeps the broader inheritance language rather than
    narrowing it.
