id: 1SA.26.19
reference: 1 Samuel 26:19
source:
  edition: WLC
  text: וְ/עַתָּ֗ה יִֽשְׁמַֽע נָא֙ אֲדֹנִ֣/י הַ/מֶּ֔לֶךְ אֵ֖ת דִּבְרֵ֣י עַבְדּ֑/וֹ
    אִם יְהוָ֞ה הֱסִֽיתְ/ךָ֥ בִ/י֙ יָרַ֣ח מִנְחָ֔ה וְ/אִ֣ם בְּנֵ֣י הָ/אָדָ֗ם אֲרוּרִ֥ים
    הֵם֙ לִ/פְנֵ֣י יְהוָ֔ה כִּֽי גֵרְשׁ֣וּ/נִי הַ/יּ֗וֹם מֵ/הִסְתַּפֵּ֜חַ בְּ/נַחֲלַ֤ת
    יְהוָה֙ לֵ/אמֹ֔ר לֵ֥ךְ עֲבֹ֖ד אֱלֹהִ֥ים אֲחֵרִֽים־־׀־׃
translation:
  text: And now, please let my lord the king hear the words of his servant. If the
    LORD has stirred you up against me, may he accept an offering; but if it is men,
    they are cursed before the LORD, because they have driven me out today from having
    a share in the LORD’s inheritance, saying, ‘Go, serve other gods.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'may he smell an offering,' an idiom for accepting a
      sacrifice or gift offering.
    reason: lexical_alternative
  - marker: b
    text: Or 'from joining myself to the LORD’s inheritance.' The Hebrew expression
      can emphasize being attached to or included within the LORD’s allotted people/land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Standard discourse transition introducing David's appeal; 'And now' preserves
    the connective force of ו plus the temporal adverb.
- source_word: יִשְׁמַע נָא
  chosen: please let ... hear
  alternatives:
  - please hear
  - let ... listen, please
  lexicon: HALOT
  rationale: Jussive with particle נָא expresses polite entreaty rather than bare
    imperative; 'please let ... hear' captures the deferential tone toward the king.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: my lord the king
  alternatives:
  - my master the king
  lexicon: HALOT
  rationale: Courtly address to Saul. 'Lord' is the natural English equivalent here
    and does not imply divinity.
- source_word: דִּבְרֵי עַבְדּוֹ
  chosen: the words of his servant
  alternatives:
  - your servant's words
  - the words of your servant
  lexicon: HALOT
  rationale: Literally 'the words of his servant.' Because David is speaking directly
    to Saul, English could idiomatically use 'your servant,' but retaining 'his servant'
    closely reflects the self-humbling third-person court style of the Hebrew.
- source_word: אִם יְהוָה הֱסִיתְךָ בִי
  chosen: If the LORD has stirred you up against me
  alternatives:
  - If the LORD has incited you against me
  - If the LORD has moved you against me
  lexicon: HALOT
  rationale: הסית can mean incite, instigate, or stir up. 'Stirred you up' is idiomatic
    and avoids overreading moral culpability while preserving the causative sense.
    YHWH rendered 'the LORD' per doctrine.
- source_word: יָרַח מִנְחָה
  chosen: may he accept an offering
  alternatives:
  - let him smell an offering
  - may he be pleased with an offering
  lexicon: HALOT
  rationale: The idiom literally involves smelling/accepting a gift offering. In sacrificial
    context, 'accept an offering' communicates the sense clearly in modern English
    without wooden anthropomorphism.
- source_word: וְאִם בְּנֵי הָאָדָם
  chosen: but if it is men
  alternatives:
  - but if it is human beings
  - but if they are sons of men
  lexicon: HALOT
  rationale: בני האדם here contrasts human agents with the LORD. 'Men' is gender-accurate
    and idiomatic for human opponents in context.
- source_word: אֲרוּרִים הֵם לִפְנֵי יְהוָה
  chosen: they are cursed before the LORD
  alternatives:
  - they are accursed before the LORD
  - may they be cursed before the LORD
  lexicon: HALOT
  rationale: Predicate adjective with pronoun is best read as a declaration, not a
    wish. 'Before the LORD' preserves the covenantal/judicial setting.
- source_word: גֵרְשׁוּנִי
  chosen: they have driven me out
  alternatives:
  - they have banished me
  - they have cast me out
  lexicon: HALOT
  rationale: Conveys forcible expulsion. 'Driven me out' fits David's exclusion from
    his homeland and worshiping community.
- source_word: מֵהִסְתַּפֵּחַ
  chosen: from having a share
  alternatives:
  - from joining myself
  - from attaching myself
  - from being joined
  lexicon: HALOT
  rationale: The hitpael of ספח here refers to being attached/associated with an allotted
    community or possession. In context of inheritance, 'having a share' best conveys
    exclusion from covenant land and people.
- source_word: בְּנַחֲלַת יְהוָה
  chosen: in the LORD’s inheritance
  alternatives:
  - in the LORD's portion
  - in the LORD's land
  lexicon: HALOT
  rationale: נחלה denotes inheritance/portion, here the land and covenant community
    belonging to the LORD. 'Inheritance' preserves the theological resonance.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as if saying
  lexicon: HALOT
  rationale: Introduces the effect or implication of their actions; 'saying' is sufficiently
    flexible in English.
- source_word: לֵךְ עֲבֹד אֱלֹהִים אֲחֵרִים
  chosen: Go, serve other gods
  alternatives:
  - Go, worship other gods
  lexicon: HALOT
  rationale: עבד with deities means serve/worship. 'Serve' is more formally aligned
    with the Hebrew and preserves the covenantal service motif.
