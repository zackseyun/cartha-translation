id: 1SA.26.14
reference: 1 Samuel 26:14
source:
  edition: WLC
  text: וַ/יִּקְרָ֨א דָוִ֜ד אֶל הָ/עָ֗ם וְ/אֶל אַבְנֵ֤ר בֶּן נֵר֙ לֵ/אמֹ֔ר הֲ/ל֥וֹא
    תַעֲנֶ֖ה אַבְנֵ֑ר וַ/יַּ֤עַן אַבְנֵר֙ וַ/יֹּ֔אמֶר מִ֥י אַתָּ֖ה קָרָ֥אתָ אֶל הַ/מֶּֽלֶךְ־־־־׃פ
translation:
  text: Then David called to the troops and to Abner son of Ner, saying, “Will you
    not answer, Abner?” Abner answered and said, “Who are you, calling to the king?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the people'; in context this refers to Saul's military camp, hence
      'the troops.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Who are you that call to the king?'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - cried out
  - shouted
  lexicon: HALOT
  rationale: The verb קרא commonly means 'call' or 'cry out.' Here David is addressing
    people at a distance across the camp, so 'called' is natural modern English and
    preserves the basic sense without overstating volume.
- source_word: הָעָם
  chosen: the troops
  alternatives:
  - the people
  - the army
  lexicon: HALOT
  rationale: Though literally 'the people,' in this military setting the referent
    is Saul's camp/forces. 'The troops' communicates the contextual sense more clearly
    than the overly broad 'the people,' while remaining close to the Hebrew.
- source_word: אַבְנֵר בֶּן נֵר
  chosen: Abner son of Ner
  alternatives:
  - Abner, the son of Ner
  lexicon: HALOT
  rationale: Personal names are transliterated. 'Son of Ner' is the standard direct
    rendering of the patronymic.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: This infinitive introduces direct speech. 'Saying' preserves the Hebrew
    discourse structure smoothly in English.
- source_word: הֲלוֹא
  chosen: Will you not
  alternatives:
  - Do you not
  - Are you not going to
  lexicon: HALOT
  rationale: The particle introduces a rhetorical question expecting a response. 'Will
    you not' fits the rebuking tone and works idiomatically with the following verb.
- source_word: תַעֲנֶה
  chosen: answer
  alternatives:
  - respond
  lexicon: HALOT
  rationale: ענה in this context means to answer or respond verbally. 'Answer' is
    the most direct and natural rendering.
- source_word: וַיַּעַן ... וַיֹּאמֶר
  chosen: answered and said
  alternatives:
  - replied
  - answered
  lexicon: HALOT
  rationale: The Hebrew uses the common narrative pair 'answered and said.' Retaining
    both verbs reflects the source text's style; although English can compress to
    'replied,' the fuller rendering remains readable.
- source_word: מִי אַתָּה
  chosen: Who are you
  lexicon: HALOT
  rationale: A straightforward interrogative plus pronoun. No expansion is needed.
- source_word: קָרָאתָ אֶל הַמֶּלֶךְ
  chosen: calling to the king
  alternatives:
  - who call to the king
  - calling out to the king
  lexicon: HALOT
  rationale: 'The Hebrew perfect after the interrogative can be rendered idiomatically
    in English as a participial phrase in direct speech: ''calling to the king.''
    ''To'' reflects אֶל directly. ''Calling out'' is possible but not necessary.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: The definite noun refers to Saul by title from Abner's perspective. 'The
    king' preserves the formal designation used in the Hebrew.
