id: 1SA.26.22
reference: 1 Samuel 26:22
source:
  edition: WLC
  text: וַ/יַּ֤עַן דָּוִד֙ וַ/יֹּ֔אמֶר הִנֵּ֖ה ה/חנית הַ/מֶּ֑לֶךְ וְ/יַעֲבֹ֛ר אֶחָ֥ד
    מֵֽ/הַ/נְּעָרִ֖ים וְ/יִקָּחֶֽ/הָ׃
translation:
  text: David answered and said, “Here is the king’s spear. Let one of the young men
    come over and take it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “cross over” instead of “come over”; the Hebrew verb literally means
      “pass/cross over.”
    reason: lexical_alternative
  - marker: b
    text: “Young men” may also be rendered “servants” or “attendants,” since the Hebrew
      term can refer either to age or to subordinate status depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative use of ענה introducing a reply. 'Answered' preserves
    the Hebrew idiom and pairs naturally with the following speech verb.
- source_word: וַיֹּאמֶר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Common Hebrew narrative sequence 'answered and said.' Retained in smooth
    English as 'answered and said' rather than collapsing the two verbs, since both
    are present in the source.
- source_word: הִנֵּה
  chosen: Here is
  alternatives:
  - Behold
  - Look
  lexicon: HALOT
  rationale: Deictic particle drawing attention to the spear's presence. 'Here is'
    is natural modern English and preserves the demonstrative force better than archaic
    'Behold.'
- source_word: הַחֲנִית
  chosen: the spear
  alternatives:
  - the lance
  lexicon: HALOT
  rationale: חֲנִית refers to a spear/lance. 'Spear' is the more common and accessible
    English term in this narrative context.
- source_word: הַמֶּלֶךְ
  chosen: the king’s
  alternatives:
  - of the king
  lexicon: HALOT
  rationale: 'Rendered as an English possessive for natural style: ''the king’s spear.''
    This preserves the genitive relationship without stiffness.'
- source_word: וְיַעֲבֹר
  chosen: come over
  alternatives:
  - cross over
  - pass over
  lexicon: HALOT
  rationale: עבר literally means 'pass/cross over.' In context David is inviting Saul's
    servant to move from Saul's side to David's location to retrieve the spear. 'Come
    over' is idiomatic English that fits the situational sense.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - someone
  lexicon: HALOT
  rationale: 'The numeral functions substantivally: ''one of the young men.'' This
    is more formally aligned to the Hebrew than the less specific ''someone.'''
- source_word: מֵהַנְּעָרִים
  chosen: of the young men
  alternatives:
  - of the servants
  - of the attendants
  lexicon: HALOT
  rationale: נַעַר can mean youth, young man, servant, or attendant depending on context.
    Here it refers to Saul's men in attendance. 'Young men' keeps the lexical sense
    while remaining natural; 'servants' would over-specify status not explicit in
    the immediate wording.
- source_word: וְיִקָּחֶהָ
  chosen: and take it
  alternatives:
  - and fetch it
  - and receive it
  lexicon: HALOT
  rationale: לקח is the common verb 'take.' The feminine suffix refers back to 'spear.'
    'Take it' is the most direct and contextually appropriate rendering.
