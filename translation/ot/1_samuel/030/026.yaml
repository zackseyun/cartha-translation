theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether בְּרָכָה should be rendered literally as 'blessing' or contextually as 'gift'
  chosen_reading: a gift
  alternative_readings:
  - a blessing
  rationale: The immediate context is David sending material goods from captured plunder. Rendering בְּרָכָה as 'gift' communicates the concrete referent in contemporary English, while the lexical alternative 'blessing' is preserved in a footnote because the Hebrew term itself carries that resonance.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
