id: 1SA.30.26
reference: 1 Samuel 30:26
source:
  edition: WLC
  text: וַ/יָּבֹ֤א דָוִד֙ אֶל צִ֣קְלַ֔ג וַ/יְשַׁלַּ֧ח מֵֽ/הַ/שָּׁלָ֛ל לְ/זִקְנֵ֥י יְהוּדָ֖ה לְ/רֵעֵ֣/הוּ לֵ/אמֹ֑ר הִנֵּ֤ה לָ/כֶם֙ בְּרָכָ֔ה מִ/שְּׁלַ֖ל אֹיְבֵ֥י יְהוָֽה־׃
translation:
  text: When David came to Ziklag, he sent some of the spoil to the elders of Judah, his friends, saying, “Behold, here is a gift for you from the spoil of the enemies of Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a blessing for you.” The Hebrew word can mean “blessing,” but here refers to a material gift sent from the plunder.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: When David came
  alternatives:
  - And David came
  - Now David came
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering with 'When' smoothly links the arrival at Ziklag with the following action in natural English while preserving temporal sequence.
- source_word: צִקְלַג
  chosen: Ziklag
  rationale: Proper place name; transliterated per translation philosophy.
- source_word: וַיְשַׁלַּח מֵהַשָּׁלָל
  chosen: he sent some of the plunder
  alternatives:
  - he sent from the spoil
  - he sent part of the plunder
  lexicon: HALOT
  rationale: The preposition מִן with 'the plunder/spoil' indicates that what was sent was a portion taken from the total booty, not necessarily all of it. 'Plunder' is more readable modern English than 'spoil' while preserving the military sense.
- source_word: לְזִקְנֵי יְהוּדָה
  chosen: to the elders of Judah
  lexicon: HALOT
  rationale: Straightforward dative phrase. 'Elders' here denotes recognized leaders among Judah.
- source_word: לְרֵעֵהוּ
  chosen: his friends
  alternatives:
  - his companions
  - his neighbors
  - his associates
  lexicon: HALOT
  rationale: Though רֵעַ can mean 'friend,' 'companion,' or 'neighbor,' in this context David is sending gifts to allied leaders with whom he has a favorable relationship. 'His friends' best captures the relational force in idiomatic English.
- source_word: לֵאמֹר
  chosen: saying
  rationale: Standard speech introducer.
- source_word: הִנֵּה לָכֶם
  chosen: Look, here is a gift for you
  alternatives:
  - Behold, for you
  - Here is for you
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. 'Look, here is' preserves the demonstrative force in readable English.
- source_word: בְּרָכָה
  chosen: a gift
  alternatives:
  - a blessing
  - a present
  lexicon: HALOT
  rationale: Although literally 'blessing,' in contexts of material distribution it often denotes a gift or present. 'Gift' communicates the concrete sense here without losing the favorable connotation. The more literal 'blessing' is worth preserving in a footnote because of its lexical and theological resonance.
- source_word: מִשְּׁלַל
  chosen: from the plunder
  alternatives:
  - from the spoil
  lexicon: HALOT
  rationale: Same military-booty term as earlier in the verse; consistency favors 'plunder.'
- source_word: אֹיְבֵי יְהוָה
  chosen: the enemies of the LORD
  alternatives:
  - the LORD's enemies
  lexicon: HALOT
  rationale: Construct chain indicating possession/relationship. The phrase likely reflects David's theological framing of Amalek as opposing the LORD and his people. 'The LORD' follows the doctrinal default for YHWH.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
