id: 1SA.30.13
reference: 1 Samuel 30:13
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר ל֤/וֹ דָוִד֙ לְֽ/מִי אַ֔תָּה וְ/אֵ֥י מִ/זֶּ֖ה אָ֑תָּה וַ/יֹּ֜אמֶר
    נַ֧עַר מִצְרִ֣י אָנֹ֗כִי עֶ֚בֶד לְ/אִ֣ישׁ עֲמָֽלֵקִ֔י וַ/יַּעַזְבֵ֧/נִי אֲדֹנִ֛/י
    כִּ֥י חָלִ֖יתִי הַ/יּ֥וֹם שְׁלֹשָֽׁה־׃
translation:
  text: David said to him, “Whose are you, and where are you from?” He said, “I am
    an Egyptian young man, a slave of an Amalekite man, and my master abandoned me
    because I became sick three days ago.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I am an Egyptian youth.”
    reason: lexical_alternative
  - marker: b
    text: Or “a servant of an Amalekite.” The Hebrew עֶבֶד can mean either “servant”
      or “slave”; here “slave” is used because the ownership relationship is foregrounded.
    reason: lexical_alternative
  - marker: c
    text: Literally, “today three [days],” a Hebrew idiom meaning “three days ago.”
    reason: cultural_note
lexical_decisions:
- source_word: לְמִי אַתָּה
  chosen: Whose are you
  alternatives:
  - To whom do you belong
  - Who do you belong to
  lexicon: HALOT
  rationale: The idiom asks about ownership or allegiance, not merely identity. 'Whose
    are you' preserves the terse Hebrew sense better than a more expanded paraphrase.
- source_word: וְאֵי מִזֶּה אָתָּה
  chosen: and where are you from
  alternatives:
  - and from where are you
  - and where do you come from
  lexicon: HALOT
  rationale: This is a straightforward inquiry about origin. 'Where are you from'
    is natural modern English while remaining close to the Hebrew.
- source_word: נַעַר מִצְרִי
  chosen: an Egyptian young man
  alternatives:
  - an Egyptian youth
  - an Egyptian servant-boy
  lexicon: HALOT
  rationale: נַעַר commonly denotes a young male, ranging from boy to young man depending
    on context. Here 'young man' avoids implying childhood while preserving age-related
    nuance.
- source_word: עֶבֶד
  chosen: a slave
  alternatives:
  - a servant
  lexicon: HALOT
  rationale: In line with the project's philosophy, 'slave' is preferred where bonded
    status is salient. Here the speaker belongs to a master who can abandon him, so
    the ownership dimension is explicit.
- source_word: לְאִישׁ עֲמָלֵקִי
  chosen: of an Amalekite man
  alternatives:
  - belonging to an Amalekite
  - of an Amalekite
  lexicon: HALOT
  rationale: אִישׁ here functions as 'man/person.' 'Of an Amalekite man' keeps the
    possessive relation with עֶבֶד and preserves the ethnic designation.
- source_word: וַיַּעַזְבֵנִי אֲדֹנִי
  chosen: my master abandoned me
  alternatives:
  - my master left me behind
  - my lord abandoned me
  lexicon: HALOT
  rationale: אדני in this social context refers to his human owner/master, not a divine
    title. 'Abandoned' captures the force of עזב in context; 'left me behind' is possible
    but slightly weaker.
- source_word: כִּי חָלִיתִי
  chosen: because I became sick
  alternatives:
  - because I was sick
  - because I fell ill
  lexicon: HALOT
  rationale: The perfect verb reports the onset/state of illness as the reason for
    abandonment. 'Became sick' preserves the eventive sense slightly better than the
    stative 'was sick.'
- source_word: הַיּוֹם שְׁלֹשָׁה
  chosen: three days ago
  alternatives:
  - today three days
  - for three days
  lexicon: HALOT
  rationale: This Hebrew idiom means that three days have elapsed up to the present.
    'Three days ago' is the clearest idiomatic English rendering.
