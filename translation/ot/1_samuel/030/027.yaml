id: 1SA.30.27
reference: 1 Samuel 30:27
source:
  edition: WLC
  text: לַ/אֲשֶׁ֧ר בְּ/בֵֽית אֵ֛ל וְ/לַ/אֲשֶׁ֥ר בְּ/רָמֽוֹת נֶ֖גֶב וְ/לַ/אֲשֶׁ֥ר בְּ/יַתִּֽר־־׃
translation:
  text: to those in Bethel, to those in Ramoth-negeb, and to those in Jattir—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in Ramoth of the Negeb,” that is, “in South Ramoth.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לַאֲשֶׁר
  chosen: to those
  alternatives:
  - for those
  - to the ones
  lexicon: HALOT
  rationale: 'The preposition ל plus the relative אֲשֶׁר functions idiomatically here
    in a distributive list of recipients: ''to those who were in...''. ''To those''
    is natural English and preserves the dative sense in context.'
- source_word: בְּבֵית אֵל
  chosen: in Bethel
  alternatives:
  - at Bethel
  - in Beth-el
  lexicon: HALOT
  rationale: This is a place name, not the common noun phrase 'house of God' in this
    context. Per translation philosophy, names are transliterated by standard convention.
    'In' reflects בְּ naturally for residence/location.
- source_word: בְּרָמוֹת נֶגֶב
  chosen: in Ramoth-negeb
  alternatives:
  - in Ramoth of the Negeb
  - in South Ramoth
  lexicon: HALOT
  rationale: The expression is best taken as a toponym. Retaining 'Ramoth-negeb' preserves
    the place name without overinterpreting whether נֶגֶב is an appositional qualifier
    ('Negeb') or an adjectival sense ('southern'). A more interpretive English equivalent
    is preserved in a footnote.
- source_word: בְּיַתִּר
  chosen: in Jattir
  alternatives:
  - at Jattir
  - in Yattir
  lexicon: HALOT
  rationale: A place name rendered by standard English transliteration. 'Jattir' is
    the conventional form in English Bible usage.
- source_word: וְ
  chosen: and
  lexicon: HALOT
  rationale: Simple coordination linking the final item in the recipient list.
