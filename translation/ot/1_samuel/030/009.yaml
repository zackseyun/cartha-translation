id: 1SA.30.9
reference: 1 Samuel 30:9
source:
  edition: WLC
  text: וַ/יֵּ֣לֶךְ דָּוִ֗ד ה֚וּא וְ/שֵׁשׁ מֵא֥וֹת אִישׁ֙ אֲשֶׁ֣ר אִתּ֔/וֹ וַ/יָּבֹ֖אוּ
    עַד נַ֣חַל הַ/בְּשׂ֑וֹר וְ/הַ/נּֽוֹתָרִ֖ים עָמָֽדוּ־־׃
translation:
  text: So David went, he and the six hundred men who were with him, and they came
    to the Brook Besor, where those left behind stayed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the remainder stayed there'; literally, 'the ones remaining stood.'
    reason: lexical_alternative
  - marker: b
    text: '''Brook Besor'' may also be rendered ''Wadi Besor,'' referring to a seasonal
      streambed or ravine.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: So David went
  alternatives:
  - Then David went
  - And David went
  lexicon: HALOT
  rationale: Wayyiqtol of הלך advances the narrative. 'So' gives natural English narrative
    progression without over-paraphrasing; 'went' is the plain sense.
- source_word: הוּא
  chosen: he
  alternatives:
  - — (implicit in English)
  lexicon: HALOT
  rationale: The independent pronoun is emphatic/appositional with David ('David,
    he and...'). English can retain this naturally as 'he and the six hundred men'.
- source_word: וְשֵׁשׁ מֵאוֹת אִישׁ אֲשֶׁר אִתּוֹ
  chosen: and the six hundred men who were with him
  alternatives:
  - and six hundred men who were with him
  - and the six hundred men that were with him
  lexicon: HALOT
  rationale: אִישׁ here is a collective/count noun referring to male fighting men;
    'men' is gender-accurate and contextually appropriate. The article is not explicit
    on the numeral phrase in English, but 'the six hundred men' reads naturally for
    the known group.
- source_word: וַיָּבֹאוּ
  chosen: and they came
  alternatives:
  - and came
  - and they arrived
  lexicon: HALOT
  rationale: Plural verb matches David and his men together. 'Came' is the straightforward
    narrative rendering of בוא.
- source_word: עַד נַחַל הַבְּשׂוֹר
  chosen: to the Brook Besor
  alternatives:
  - as far as the Wadi Besor
  - to the Besor Valley
  lexicon: HALOT
  rationale: נחל can denote a wadi/streambed or brook. 'Brook Besor' is a clear, established
    rendering and fits the context of a named watercourse. 'Wadi' is possible but
    less accessible for the target audience.
- source_word: וְהַנּוֹתָרִים
  chosen: those left behind
  alternatives:
  - the ones who remained
  - the remainder
  lexicon: HALOT
  rationale: The participial form from יתר/נותר denotes those remaining. In context,
    it refers to the subset that did not continue beyond the brook, clarified by the
    following verse. 'Those left behind' is idiomatic and contextually precise.
- source_word: עָמָדוּ
  chosen: stayed
  alternatives:
  - stood
  - remained
  lexicon: HALOT
  rationale: Although the verb literally means 'stood,' in this travel context it
    conveys stopping/remaining in place. 'Stayed' communicates the intended sense
    in natural English; 'stood' would sound overly literal and potentially misleading.
