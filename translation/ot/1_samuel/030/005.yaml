id: 1SA.30.5
reference: 1 Samuel 30:5
source:
  edition: WLC
  text: וּ/שְׁתֵּ֥י נְשֵֽׁי דָוִ֖ד נִשְׁבּ֑וּ אֲחִינֹ֨עַם֙ הַ/יִּזְרְעֵלִ֔ית וַ/אֲבִיגַ֕יִל
    אֵ֖שֶׁת נָבָ֥ל הַֽ/כַּרְמְלִֽי־׃
translation:
  text: 'And David’s two wives had been taken captive: Ahinoam the Jezreelitess and
    Abigail, the wife of Nabal the Carmelite.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Jezreelite woman" or "from Jezreel."
    reason: lexical_alternative
  - marker: b
    text: '"Carmelite" here means a man from Carmel, not a member of a later religious
      order.'
    reason: cultural_note
lexical_decisions:
- source_word: וּ/שְׁתֵּי
  chosen: And ... two
  alternatives:
  - Now ... two
  lexicon: HALOT
  rationale: The conjunction waw here links this verse to the preceding narrative,
    best rendered simply as "And" in natural English. שְׁתֵּי is the feminine construct
    form of "two," modifying "wives."
- source_word: נְשֵׁי דָוִד
  chosen: David’s ... wives
  alternatives:
  - the wives of David
  lexicon: HALOT
  rationale: Construct chain literally means "the wives of David." The possessive
    form "David’s wives" is natural English and preserves the sense.
- source_word: נִשְׁבּוּ
  chosen: had been taken captive
  alternatives:
  - were taken captive
  - had been captured
  lexicon: HALOT
  rationale: Nifal perfect of שׁבה denotes being taken as captives. The pluperfect
    English form fits the narrative context, referring to the prior raid's result
    now being reported.
- source_word: אֲחִינֹעַם
  chosen: Ahinoam
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: הַ/יִּזְרְעֵלִית
  chosen: the Jezreelitess
  alternatives:
  - the Jezreelite woman
  - from Jezreel
  lexicon: HALOT
  rationale: The gentilic feminine identifies Ahinoam by origin. "Jezreelitess" is
    a concise, traditional English gentilic that preserves the feminine form; alternatives
    are possible but less compact.
- source_word: וַ/אֲבִיגַיִל
  chosen: and Abigail
  rationale: Simple conjunction plus personal name; the name is transliterated.
- source_word: אֵשֶׁת נָבָל
  chosen: the wife of Nabal
  alternatives:
  - Nabal’s wife
  lexicon: HALOT
  rationale: Construct chain identifying Abigail by her former marriage. "The wife
    of Nabal" preserves the appositional identification clearly.
- source_word: הַֽ/כַּרְמְלִי
  chosen: the Carmelite
  alternatives:
  - the man from Carmel
  lexicon: HALOT
  rationale: Gentilic adjective describing Nabal as from Carmel. "Carmelite" here
    is geographic, not monastic; it is the standard concise rendering.
