id: 1SA.30.12
reference: 1 Samuel 30:12
source:
  edition: WLC
  text: וַ/יִּתְּנוּ ל/וֹ֩ פֶ֨לַח דְּבֵלָ֜ה וּ/שְׁנֵ֤י צִמֻּקִים֙ וַ/יֹּ֔אכַל וַ/תָּ֥שָׁב
    רוּח֖/וֹ אֵלָ֑י/ו כִּ֠י לֹֽא אָ֤כַל לֶ֨חֶם֙ וְ/לֹא שָׁ֣תָה מַ֔יִם שְׁלֹשָׁ֥ה יָמִ֖ים
    וּ/שְׁלֹשָׁ֥ה לֵילֽוֹת־־־׃ס
translation:
  text: They gave him a piece of pressed fig cake and two clusters of raisins, and
    he ate, and his spirit returned to him, for he had not eaten bread or drunk water
    for three days and three nights.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his strength returned to him' or 'he revived'; literally, 'his spirit
      returned to him.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term refers to a pressed cake made from figs.
    reason: cultural_note
  - marker: c
    text: Or possibly 'two cakes of raisins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶלַח דְּבֵלָה
  chosen: a piece of pressed fig cake
  alternatives:
  - a slice of fig cake
  - a portion of pressed figs
  lexicon: HALOT
  rationale: פֶלַח denotes a piece or slice, and דְּבֵלָה refers to a pressed cake
    of figs rather than fresh figs. 'Pressed fig cake' preserves the ancient food
    item more precisely than the traditional but less explicit 'cake of figs.'
- source_word: שְׁנֵי צִמֻּקִים
  chosen: two clusters of raisins
  alternatives:
  - two cakes of raisins
  - two bunches of raisins
  lexicon: HALOT
  rationale: צִמֻּקִים are raisins; the dual/count construction indicates two units.
    Because raisins in this context were commonly compressed or grouped, 'clusters'
    conveys a natural English equivalent without over-specifying manufacture. 'Cakes
    of raisins' is possible in some contexts but less certain here.
- source_word: וַתָּשָׁב רוּחוֹ אֵלָיו
  chosen: his spirit returned to him
  alternatives:
  - his strength returned to him
  - he revived
  lexicon: HALOT
  rationale: Literally, 'his spirit returned to him.' This idiom can imply revival
    or renewed strength, but the more literal rendering preserves the Hebrew imagery
    while remaining understandable in English.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: לֶחֶם literally means 'bread.' While it can sometimes stand more broadly
    for food, the paired expression with water works naturally as 'bread ... water,'
    and optimal equivalence favors retaining the concrete term.
- source_word: שָׁתָה מַיִם
  chosen: drunk water
  alternatives:
  - had anything to drink
  lexicon: HALOT
  rationale: 'The Hebrew is specific: ''drunk water.'' Retaining ''water'' preserves
    the concrete deprivation described in the text.'
- source_word: שְׁלֹשָׁה יָמִים וּשְׁלֹשָׁה לֵילוֹת
  chosen: three days and three nights
  lexicon: HALOT
  rationale: This is a straightforward temporal expression and should be translated
    directly without interpretive adjustment.
