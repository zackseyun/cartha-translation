id: 1SA.30.29
reference: 1 Samuel 30:29
source:
  edition: WLC
  text: וְ/לַ/אֲשֶׁ֣ר בְּ/רָכָ֗ל וְ/לַֽ/אֲשֶׁר֙ בְּ/עָרֵ֣י הַ/יְּרַחְמְאֵלִ֔י וְ/לַ/אֲשֶׁ֖ר
    בְּ/עָרֵ֥י הַ/קֵּינִֽי׃
translation:
  text: and to those in Rakal, and to those in the towns of the Jerahmeelites, and
    to those in the towns of the Kenites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rakal is also spelled 'Racal' in some English traditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלַאֲשֶׁר
  chosen: and to those
  alternatives:
  - and for those
  - and to whoever
  lexicon: HALOT
  rationale: The repeated construction waw + lamed + relative particle functions idiomatically
    in this gift-distribution list to mean 'and to those who were/in those at.' 'And
    to those' is natural English and preserves the dative/list sense without over-paraphrase.
- source_word: בְּרָכָל
  chosen: in Rakal
  alternatives:
  - in Racal
  lexicon: HALOT
  rationale: This is a place name, so it is transliterated rather than translated,
    per project philosophy. 'Rakal' reflects a standard direct transliteration from
    the Hebrew consonants; 'Racal' is a traditional spelling variant worth preserving.
- source_word: בְּעָרֵי
  chosen: in the towns of
  alternatives:
  - in the cities of
  lexicon: HALOT
  rationale: עִיר can denote either a city or town depending on scale. Here, in a
    regional list of settlements receiving spoil, 'towns' is more idiomatic and likely
    better matches the sense than the more formal 'cities,' while still remaining
    faithful.
- source_word: הַיְּרַחְמְאֵלִי
  chosen: the Jerahmeelites
  alternatives:
  - the Jerahmeelite
  lexicon: HALOT
  rationale: Although morphologically singular gentilic with article, after 'towns
    of' it functions collectively for the people group associated with those settlements.
    English naturally renders this as the plural ethnonym 'the Jerahmeelites.'
- source_word: הַקֵּינִי
  chosen: the Kenites
  alternatives:
  - the Kenite
  lexicon: HALOT
  rationale: As with 'Jerahmeelites,' the singular gentilic is best rendered collectively
    in English after 'towns of' as 'the Kenites,' referring to the clan/people group.
