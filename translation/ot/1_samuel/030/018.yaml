id: 1SA.30.18
reference: 1 Samuel 30:18
source:
  edition: WLC
  text: וַ/יַּצֵּ֣ל דָּוִ֔ד אֵ֛ת כָּל אֲשֶׁ֥ר לָקְח֖וּ עֲמָלֵ֑ק וְ/אֶת שְׁתֵּ֥י נָשָׁ֖י/ו
    הִצִּ֥יל דָּוִֽד־־׃
translation:
  text: David recovered all that Amalek had taken, and David rescued his two wives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'delivered' in both clauses; the Hebrew uses the same verb in each clause,
      but English idiom favors 'recovered' for what was taken and 'rescued' for his
      wives.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּצֵּל / הִצִּיל (נצל)
  chosen: recovered / rescued
  alternatives:
  - delivered
  - saved
  - snatched away
  lexicon: HALOT
  rationale: The same Hebrew root appears twice in the verse. In the first clause,
    with the object 'all that Amalek had taken,' English 'recovered' best fits the
    context of regaining plundered persons/property. In the second clause, with 'his
    two wives' as object, 'rescued' is the most natural contextual rendering. This
    is a documented contextual variation rather than strict identical glossing.
- source_word: כָּל אֲשֶׁר לָקְחוּ עֲמָלֵק
  chosen: all that Amalek had taken
  alternatives:
  - everything that Amalek took
  - all that the Amalekites had taken
  lexicon: HALOT
  rationale: כָּל אֲשֶׁר naturally means 'all that/ everything that.' The verb לָקְחוּ
    is best rendered as pluperfect-like 'had taken' in English narrative sequence.
    Although עֲמָלֵק can denote the people group, the singular collective 'Amalek'
    is retained because that is the Hebrew form here.
- source_word: עֲמָלֵק
  chosen: Amalek
  alternatives:
  - the Amalekites
  lexicon: HALOT
  rationale: The Hebrew uses the proper name in singular form, often functioning collectively
    for the Amalekite people. 'Amalek' preserves the source wording more closely,
    while English readers can still understand the collective sense from context.
- source_word: שְׁתֵּי נָשָׁיו
  chosen: his two wives
  alternatives:
  - both of his wives
  lexicon: HALOT
  rationale: The construct phrase explicitly states 'the two of his wives.' 'His two
    wives' is clear, natural, and preserves the numeral.
- source_word: דָּוִד ... דָּוִד
  chosen: David ... David
  alternatives:
  - David ... he
  rationale: The Hebrew repeats David's name at both the beginning and end of the
    verse for emphasis and clarity. Repeating 'David' in English preserves that emphasis
    better than replacing the second occurrence with a pronoun.
