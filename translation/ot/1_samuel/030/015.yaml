id: 1SA.30.15
reference: 1 Samuel 30:15
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלָי/ו֙ דָּוִ֔ד הֲ/תוֹרִדֵ֖/נִי אֶל הַ/גְּד֣וּד הַ/זֶּ֑ה וַ/יֹּ֡אמֶר
    הִשָּׁבְעָ/ה֩ לִּ֨/י בֵֽ/אלֹהִ֜ים אִם תְּמִיתֵ֗/נִי וְ/אִם תַּסְגִּרֵ֨/נִי֙ בְּ/יַד
    אֲדֹנִ֔/י וְ/אוֹרִֽדְ/ךָ֖ אֶל הַ/גְּד֥וּד הַ/זֶּֽה־־־־־׃
translation:
  text: David said to him, “Will you lead me down to this raiding party?” He said,
    “Swear to me by God that you will not kill me or hand me over into the hand of
    my master, and I will lead you down to this raiding party.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “band” or “troop”; the Hebrew term denotes a marauding group.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתוֹרִדֵנִי
  chosen: Will you lead me down
  alternatives:
  - Will you bring me down
  - Will you take me down
  lexicon: HALOT
  rationale: Hiphil of ירד is causative, literally 'cause me to go down.' In context
    of guiding David to the Amalekite group, 'lead me down' is natural English and
    preserves both causative force and directional nuance.
- source_word: הַגְּדוּד
  chosen: raiding party
  alternatives:
  - band
  - troop
  lexicon: HALOT
  rationale: גדוד here refers to a marauding military group, specifically the Amalekite
    force that had raided Ziklag. 'Raiding party' best captures the predatory, mobile
    character in contemporary English better than the vaguer 'band' or more formal
    'troop'.
- source_word: הִשָּׁבְעָה לִּי בֵאלֹהִים
  chosen: Swear to me by God
  alternatives:
  - Take an oath to me by God
  lexicon: HALOT
  rationale: The Niphal imperative with the prepositional phrase expresses a solemn
    oath. 'Swear to me by God' is direct, idiomatic, and preserves the explicit invocation
    of God.
- source_word: אִם תְּמִיתֵנִי
  chosen: that you will not kill me
  alternatives:
  - that you do not put me to death
  lexicon: HALOT
  rationale: Following the oath formula, English requires the negative sense to be
    made explicit for clarity. The Hebrew uses אִם in oath context elliptically; the
    request is plainly that David swear not to kill him.
- source_word: תַּסְגִּרֵנִי בְּיַד אֲדֹנִי
  chosen: hand me over into the hand of my master
  alternatives:
  - deliver me into the hand of my master
  - surrender me to my master
  lexicon: HALOT
  rationale: סגר in Hiphil here means to give someone over. Retaining 'into the hand
    of' preserves the Hebrew idiom and its force of power/control, while 'hand me
    over' makes the verbal action clear in English.
- source_word: אֲדֹנִי
  chosen: my master
  alternatives:
  - my lord
  lexicon: HALOT
  rationale: This refers to the Egyptian servant's human owner, not to God or a royal
    title. 'My master' avoids confusion and fits the servant-master relationship in
    context.
- source_word: וְאוֹרִדְךָ
  chosen: and I will lead you down
  alternatives:
  - and I will bring you down
  - and I will take you down
  lexicon: HALOT
  rationale: Again the Hiphil of ירד is causative with directional force. Using the
    same gloss as earlier preserves consistency within the verse.
