id: 1SA.30.6
reference: 1 Samuel 30:6
source:
  edition: WLC
  text: וַ/תֵּ֨צֶר לְ/דָוִ֜ד מְאֹ֗ד כִּֽי אָמְר֤וּ הָ/עָם֙ לְ/סָקְל֔/וֹ כִּֽי מָ֨רָה֙
    נֶ֣פֶשׁ כָּל הָ/עָ֔ם אִ֖ישׁ עַל בנ/ו וְ/עַל בְּנֹתָ֑י/ו וַ/יִּתְחַזֵּ֣ק דָּוִ֔ד
    בַּ/יהוָ֖ה אֱלֹהָֽי/ו־־־־־׃ס
translation:
  text: And David was greatly distressed, because the people spoke of stoning him,
    for the soul of all the people was bitter, each man because of his sons and his
    daughters. But David strengthened himself in the LORD his God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the spirit of all the people was bitter,' that is, all the people were
      deeply embittered.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּצֶר
  chosen: was greatly distressed
  alternatives:
  - was in great straits
  - was very distressed
  - it was very distressing to
  lexicon: HALOT
  rationale: From צרר in this impersonal construction with לְדָוִד, the sense is that
    matters became very difficult/distressing for David. 'Was greatly distressed'
    is idiomatic modern English and preserves the severity marked by מְאֹד.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very
  - exceedingly
  lexicon: HALOT
  rationale: Adverb intensifying David's distress; 'greatly' fits natural English
    with 'distressed'.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  - the men
  lexicon: HALOT
  rationale: Though the referent is David's fighting force, the Hebrew says 'the people.'
    Retaining 'the people' avoids over-specification while remaining clear in context.
- source_word: לְסָקְלוֹ
  chosen: of stoning him
  alternatives:
  - to stone him
  lexicon: HALOT
  rationale: After אָמְרוּ, the infinitive expresses intended action under discussion.
    'Spoke of stoning him' is natural English and reflects deliberation rather than
    immediate action.
- source_word: מָרָה נֶפֶשׁ
  chosen: the soul ... was bitter
  alternatives:
  - the spirit ... was bitter
  - they were embittered
  - their souls were bitter
  lexicon: HALOT
  rationale: The Hebrew is singular 'soul' with collective sense. Rendering 'the soul
    of all the people was bitter' preserves the concrete Hebrew idiom and emotional
    depth better than flattening it to a paraphrase.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the men
  - everyone
  lexicon: HALOT
  rationale: Keeps the collective emphasis explicit.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - each person
  lexicon: HALOT
  rationale: Per translation philosophy, gender-accurate rendering is preferred. Here
    אִישׁ distributively refers to each male member of the group, likely the fighting
    men, so 'each man' is appropriate.
- source_word: עַל בָּנָיו וְעַל בְּנֹתָיו
  chosen: because of his sons and his daughters
  alternatives:
  - over his sons and daughters
  - for his sons and daughters
  lexicon: HALOT
  rationale: עַל here marks the cause/object of grief. 'Because of' communicates the
    causal sense in idiomatic English while preserving the family reference.
- source_word: וַיִּתְחַזֵּק
  chosen: strengthened himself
  alternatives:
  - took courage
  - found strength
  - was strengthened
  lexicon: HALOT
  rationale: The hitpael form is reflexive or middle in force. 'Strengthened himself'
    preserves David's active response without over-interpreting the manner.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: Per doctrine table, יְהוָה is rendered 'the LORD.' 'In the LORD' preserves
    the covenant name convention and the preposition's sense of sphere/source.
- source_word: אֱלֹהָיו
  chosen: his God
  alternatives:
  - his own God
  lexicon: HALOT
  rationale: Straightforward possessive; 'his God' is sufficient and natural.
