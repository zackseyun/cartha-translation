id: 1SA.30.23
reference: 1 Samuel 30:23
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר דָּוִ֔ד לֹֽא תַעֲשׂ֥וּ כֵ֖ן אֶחָ֑/י אֵ֠ת אֲשֶׁר נָתַ֨ן יְהוָ֥ה
    לָ֨/נוּ֙ וַ/יִּשְׁמֹ֣ר אֹתָ֔/נוּ וַ/יִּתֵּ֗ן אֶֽת הַ/גְּד֛וּד הַ/בָּ֥א עָלֵ֖י/נוּ
    בְּ/יָדֵֽ/נוּ־־־׃
translation:
  text: But David said, “You must not do so, my brothers, with what the LORD has given
    us. He has preserved us and has given into our hand the raiding band that came
    against us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'regarding what the LORD has given us.' The Hebrew construction is somewhat
      compressed and introduces the matter David is discussing.
    reason: lexical_alternative
  - marker: b
    text: Or 'He has kept us' or 'He protected us.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'into our hand,' an idiom for giving someone into another's power.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא תַעֲשׂוּ כֵן
  chosen: You must not do so
  alternatives:
  - Do not do so
  - You shall not do thus
  lexicon: HALOT
  rationale: The Hebrew is a direct prohibition addressed to a plural audience. 'You
    must not do so' gives the force of David's rebuke in natural modern English without
    becoming overly paraphrastic.
- source_word: אֶחָי
  chosen: my brothers
  alternatives:
  - my brothers and companions
  - my kinsmen
  lexicon: HALOT
  rationale: Literally 'my brothers.' Per translation philosophy, gender-accurate
    language is preferred where it matches the source. Here David addresses his men
    with a fraternal term, so 'my brothers' is retained rather than neutralizing it.
- source_word: אֵת אֲשֶׁר נָתַן יְהוָה לָנוּ
  chosen: with what the LORD has given us
  alternatives:
  - regarding what the LORD has given us
  - as for what the LORD has given us
  lexicon: HALOT
  rationale: The particle אֵת before אֲשֶׁר is difficult but functions idiomatically
    to introduce the matter under discussion. 'With what the LORD has given us' fits
    the immediate context of dividing spoil and preserves the sense that their action
    concerns Yahweh's gift.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: וַיִּשְׁמֹר אֹתָנוּ
  chosen: He has preserved us
  alternatives:
  - He has kept us
  - He protected us
  lexicon: HALOT
  rationale: שׁמר here refers to guarding/preserving the group in battle. 'Preserved
    us' communicates successful divine protection and fits the retrospective sense
    of David's speech.
- source_word: וַיִּתֵּן
  chosen: has given
  alternatives:
  - gave
  - delivered
  lexicon: HALOT
  rationale: 'Although the Hebrew wayyiqtol is past narrative, in English direct speech
    recounting recent events can naturally use present perfect: ''has given.'' This
    also aligns with the preceding ''has preserved us'' and highlights ongoing relevance.'
- source_word: הַגְּדוּד
  chosen: the raiding band
  alternatives:
  - the troop
  - the marauding band
  - the company
  lexicon: HALOT
  rationale: גְּדוּד in this context refers to the hostile raiding force that attacked
    them. 'Raiding band' is more precise and idiomatic than the generic 'troop.'
- source_word: הַבָּא עָלֵינוּ
  chosen: that came against us
  alternatives:
  - that attacked us
  - that came upon us
  lexicon: HALOT
  rationale: The participial phrase identifies the enemy force by its hostile approach.
    'Came against us' preserves the directional and adversarial nuance without overinterpreting.
- source_word: בְּיָדֵנוּ
  chosen: into our hand
  alternatives:
  - into our power
  - into our hands
  lexicon: HALOT
  rationale: The singular 'hand' is idiomatic in Hebrew for power/control. 'Into our
    hand' preserves the biblical idiom while remaining understandable in English;
    plural 'hands' would be smoother but less formally aligned.
