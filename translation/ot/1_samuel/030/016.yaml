id: 1SA.30.16
reference: 1 Samuel 30:16
source:
  edition: WLC
  text: וַ/יֹּ֣רִדֵ֔/הוּ וְ/הִנֵּ֥ה נְטֻשִׁ֖ים עַל פְּנֵ֣י כָל הָ/אָ֑רֶץ אֹכְלִ֤ים
    וְ/שֹׁתִים֙ וְ/חֹ֣גְגִ֔ים בְּ/כֹל֙ הַ/שָּׁלָ֣ל הַ/גָּד֔וֹל אֲשֶׁ֥ר לָקְח֛וּ מֵ/אֶ֥רֶץ
    פְּלִשְׁתִּ֖ים וּ/מֵ/אֶ֥רֶץ יְהוּדָֽה־־׃
translation:
  text: When he had led him down, behold, they were spread out over the face of all
    the land, eating and drinking and celebrating because of all the great spoil that
    they had taken from the land of the Philistines and from the land of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scattered over all the land.' The Hebrew participle can emphasize either
      dispersion or broad spread.
    reason: lexical_alternative
  - marker: b
    text: Or 'celebrating over all the great spoil.' The preposition may be understood
      as indicating the occasion or basis of their revelry.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּרִדֵהוּ
  chosen: When he had led him down
  alternatives:
  - And he led him down
  - When he brought him down
  lexicon: HALOT
  rationale: The verb ירד in Hiphil means 'cause to go down/bring down/lead down.'
    Given the guide leading David to the raiders' location, 'led him down' is natural
    English and preserves the directional sense. 'When' smooths the Hebrew narrative
    sequence into readable English while retaining temporal force.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there they were
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing vivid attention to the scene. 'Behold'
    preserves that immediacy more transparently than omitting it, though it is somewhat
    elevated; here it suits the narrative reveal.
- source_word: נְטֻשִׁים עַל־פְּנֵי כָל־הָאָרֶץ
  chosen: they were spread out over the face of all the land
  alternatives:
  - they were scattered over all the land
  - they were strewn across the whole הארץ
  lexicon: HALOT
  rationale: נטשׁ in this passive participial form conveys being spread out/dispersed.
    'Over the face of all the land' closely reflects the Hebrew idiom עַל־פְּנֵי while
    remaining intelligible. 'All the land' is preferred over 'the whole earth,' since
    the context is local, referring to the area before David.
- source_word: אֹכְלִים וְשֹׁתִים וְחֹגְגִים
  chosen: eating and drinking and celebrating
  alternatives:
  - feasting
  - making merry
  lexicon: HALOT
  rationale: The three participles depict ongoing action. 'Eating and drinking and
    celebrating' preserves the sequence and avoids collapsing the actions into a single
    paraphrase. For חֹגְגִים, 'celebrating' is broader and more transparent than 'feasting,'
    since eating and drinking are already stated.
- source_word: בְּכֹל הַשָּׁלָל הַגָּדוֹל
  chosen: because of all the great spoil
  alternatives:
  - over all the great plunder
  - with all the great spoil
  lexicon: HALOT
  rationale: 'The preposition ב here is best taken in a causal or occasioning sense:
    they were celebrating on account of the spoil. ''Spoil'' and ''plunder'' are both
    viable; ''spoil'' fits the military context and traditional usage. ''Great'' straightforwardly
    renders גָּדוֹל.'
- source_word: אֲשֶׁר לָקְחוּ
  chosen: that they had taken
  alternatives:
  - which they took
  lexicon: HALOT
  rationale: English past perfect clarifies that the taking preceded the celebrating.
    This is a natural way to represent the Hebrew perfect in context.
- source_word: מֵאֶרֶץ פְּלִשְׁתִּים
  chosen: from the land of the Philistines
  alternatives:
  - from Philistine territory
  lexicon: HALOT
  rationale: אֶרֶץ here denotes territory/land. 'The land of the Philistines' is a
    transparent rendering that preserves the genitival construction.
- source_word: וּמֵאֶרֶץ יְהוּדָה
  chosen: and from the land of Judah
  alternatives:
  - and from Judah
  lexicon: HALOT
  rationale: Keeping 'land of' mirrors the parallel phrase with the Philistines and
    preserves the territorial sense of אֶרֶץ.
