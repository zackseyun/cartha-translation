id: 1SA.30.28
reference: 1 Samuel 30:28
source:
  edition: WLC
  text: וְ/לַ/אֲשֶׁ֧ר בַּ/עֲרֹעֵ֛ר וְ/לַ/אֲשֶׁ֥ר בְּ/שִֽׂפְמ֖וֹת וְ/לַ/אֲשֶׁ֥ר בְּ/אֶשְׁתְּמֹֽעַ׃ס
translation:
  text: and to those in Aroer, and to those in Siphmoth, and to those in Eshtemoa,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at Aroer ... at Siphmoth ... at Eshtemoa.' The Hebrew preposition can
      be rendered either way with town names in English.
    reason: lexical_alternative
  - marker: b
    text: Hebrew repeats the formula 'and to those in ...' before each place name,
      emphasizing the individual recipients in each town.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלַאֲשֶׁר
  chosen: and to those
  alternatives:
  - and to the ones who were
  - and to those who were
  lexicon: HALOT
  rationale: The repeated formula literally combines conjunction + preposition + relative
    particle ('and to/for that which/those who'). In this context it introduces recipients
    in a list of towns, so idiomatic English is 'and to those,' with the following
    place name supplying 'in'.
- source_word: בַּעֲרֹעֵר
  chosen: in Aroer
  alternatives:
  - at Aroer
  lexicon: HALOT
  rationale: Proper place name. The prefixed preposition indicates location; 'in Aroer'
    reads naturally for a town in a recipient list.
- source_word: בְּשִׂפְמוֹת
  chosen: in Siphmoth
  alternatives:
  - at Siphmoth
  lexicon: HALOT
  rationale: Proper place name, transliterated rather than translated per project
    philosophy. The preposition is rendered locatively as 'in' for consistency with
    the surrounding town names.
- source_word: בְּאֶשְׁתְּמֹעַ
  chosen: in Eshtemoa
  alternatives:
  - at Eshtemoa
  - in Eshtemoa
  lexicon: HALOT
  rationale: Proper place name. 'Eshtemoa' is a standard English transliteration of
    the Hebrew place name אֶשְׁתְּמֹעַ. 'In' is used as the natural locative in this
    list.
