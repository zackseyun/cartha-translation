id: 1SA.30.3
reference: 1 Samuel 30:3
source:
  edition: WLC
  text: וַ/יָּבֹ֨א דָוִ֤ד וַֽ/אֲנָשָׁי/ו֙ אֶל הָ/עִ֔יר וְ/הִנֵּ֥ה שְׂרוּפָ֖ה בָּ/אֵ֑שׁ
    וּ/נְשֵׁי/הֶ֛ם וּ/בְנֵי/הֶ֥ם וּ/בְנֹתֵי/הֶ֖ם נִשְׁבּֽוּ־׃
translation:
  text: When David and his men came to the city, behold, it had been burned with fire,
    and their wives, sons, and daughters had been taken captive.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Qal wayyiqtol of בוא in narrative sequence; 'came' is the natural English
    rendering and preserves the simple motion sense.
- source_word: וַאֲנָשָׁיו
  chosen: his men
  alternatives:
  - the men with him
  lexicon: HALOT
  rationale: אַנְשִׁים with 3ms suffix refers to David's fighting company. 'His men'
    is idiomatic, concise, and contextually accurate.
- source_word: אֶל הָעִיר
  chosen: to the city
  alternatives:
  - to the town
  lexicon: HALOT
  rationale: עִיר commonly means 'city' or 'town'; 'city' is the standard rendering
    and fits the likely reference to Ziklag without overinterpreting size.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - and look
  - and there it was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to a sudden or striking
    sight. 'Behold' preserves the vividness and surprise of the Hebrew better than
    a flattened omission.
- source_word: שְׂרוּפָה בָּאֵשׁ
  chosen: had been burned with fire
  alternatives:
  - was burned with fire
  - was burned
  lexicon: HALOT
  rationale: 'The feminine singular passive participle agrees with ''city.'' English
    pluperfect (''had been burned'') fits the narrative perspective: David arrives
    and finds the prior result. ''With fire'' preserves the explicit Hebrew phrase
    rather than reducing it to simply ''burned.'''
- source_word: וּנְשֵׁיהֶם
  chosen: their wives
  alternatives:
  - the women
  lexicon: HALOT
  rationale: נָשִׁים here, with the possessive suffix and family context, specifically
    means 'wives,' not women in general.
- source_word: וּבְנֵיהֶם וּבְנֹתֵיהֶם
  chosen: sons, and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly distinguishes male and female children. Rendering
    as 'sons and daughters' preserves that specificity rather than collapsing it into
    'children.'
- source_word: נִשְׁבּוּ
  chosen: had been taken captive
  alternatives:
  - were captured
  - had been carried off
  lexicon: HALOT
  rationale: Niphal of שׁבה denotes being taken into captivity. 'Taken captive' is
    the most precise English equivalent and preserves the wartime sense better than
    the broader 'captured.'
