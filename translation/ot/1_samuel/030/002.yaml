id: 1SA.30.2
reference: 1 Samuel 30:2
source:
  edition: WLC
  text: וַ/יִּשְׁבּ֨וּ אֶת הַ/נָּשִׁ֤ים אֲשֶׁר בָּ/הּ֙ מִ/קָּטֹ֣ן וְ/עַד גָּד֔וֹל
    לֹ֥א הֵמִ֖יתוּ אִ֑ישׁ וַ/יִּֽנְהֲג֔וּ וַ/יֵּלְכ֖וּ לְ/דַרְכָּֽ/ם־־־׃
translation:
  text: They took captive the women who were in it, from small to great. They did
    not kill anyone, but led them away and went on their way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from young to old.' The Hebrew idiom 'from small to great' can denote
      the whole range without exception.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁבּוּ
  chosen: They took captive
  alternatives:
  - They captured
  - They took as captives
  lexicon: HALOT
  rationale: The verb from שׁבה denotes taking people captive in war. 'Took captive'
    is natural English and preserves the military sense better than the more general
    'captured.'
- source_word: הַנָּשִׁים
  chosen: the women
  alternatives:
  - the wives
  lexicon: HALOT
  rationale: The plain lexical sense is 'women.' In context these include the women
    of Ziklag, likely including wives, but the Hebrew term itself is broader, so 'women'
    is preferred.
- source_word: אֲשֶׁר בָּהּ
  chosen: who were in it
  alternatives:
  - who were there
  - who were in the city
  lexicon: HALOT
  rationale: The feminine singular pronoun refers back to the city (Ziklag) in the
    previous verse. 'In it' preserves the anaphoric force without over-specifying
    beyond the immediate context.
- source_word: מִקָּטֹן וְעַד גָּדוֹל
  chosen: from small to great
  alternatives:
  - from young to old
  - from the least to the greatest
  lexicon: HALOT
  rationale: This idiom marks the full range of persons without exception. 'From small
    to great' stays close to the Hebrew while remaining understandable. 'Young to
    old' is interpretive, since the phrase can indicate status or size/rank as well
    as age.
- source_word: לֹא הֵמִיתוּ אִישׁ
  chosen: They did not kill anyone
  alternatives:
  - They killed no man
  - They did not put anyone to death
  lexicon: HALOT
  rationale: אִישׁ here functions idiomatically as an indefinite individual, not specifically
    an adult male. 'Anyone' best conveys the sense in natural English.
- source_word: וַיִּנְהֲגוּ
  chosen: led them away
  alternatives:
  - drove them along
  - conducted them
  lexicon: HALOT
  rationale: The verb נהג can mean to drive or lead along. Since the object is implied
    from the captives just mentioned, 'led them away' communicates the forced movement
    clearly in idiomatic English.
- source_word: וַיֵּלְכוּ לְדַרְכָּם
  chosen: went on their way
  alternatives:
  - went their way
  - went on their road
  lexicon: HALOT
  rationale: This is a common Hebrew idiom meaning they departed and continued on
    their course. 'Went on their way' is the most natural equivalent.
