id: 1SA.30.20
reference: 1 Samuel 30:20
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח דָּוִ֔ד אֶת כָּל הַ/צֹּ֖אן וְ/הַ/בָּקָ֑ר נָהֲג֗וּ לִ/פְנֵי֙ הַ/מִּקְנֶ֣ה
    הַ/ה֔וּא וַ/יֹּ֣אמְר֔וּ זֶ֖ה שְׁלַ֥ל דָּוִֽד־־׃
translation:
  text: David took all the flocks and the herds. They drove them ahead of that livestock,
    and said, “This is David’s spoil.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “This is David’s plunder.”
    reason: lexical_alternative
  - marker: b
    text: The Hebrew likely means that the animals just taken were driven in front
      of the previously recovered livestock as a public display, while the people
      declared them to be David’s spoil.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - seized
  - took possession of
  lexicon: HALOT
  rationale: The verb לקח in the waw-consecutive narrative form normally means 'took.'
    'Seized' would overstate force not explicit in the verb, while 'took possession
    of' is interpretive.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Retains the comprehensiveness of the Hebrew without expansion.
- source_word: הַצֹּאן וְהַבָּקָר
  chosen: the flocks and the herds
  alternatives:
  - the sheep and the cattle
  - the small livestock and the cattle
  lexicon: HALOT
  rationale: צאן commonly denotes small livestock, especially sheep/goats, and בקר
    denotes cattle. 'Flocks and herds' is idiomatic English that preserves the distinction
    between the two categories.
- source_word: נָהֲגוּ
  chosen: they drove
  alternatives:
  - they led
  - they drove along
  lexicon: HALOT
  rationale: נהג in this context refers to driving animals onward. 'Led' is possible,
    but 'drove' better fits the movement of livestock in a spoil procession.
- source_word: לִפְנֵי
  chosen: ahead of
  alternatives:
  - before
  - in front of
  lexicon: HALOT
  rationale: The preposition literally means 'before/in front of'; 'ahead of' is natural
    modern English in a movement context.
- source_word: הַמִּקְנֶה הַהוּא
  chosen: that livestock
  alternatives:
  - that herd
  - those possessions
  lexicon: HALOT
  rationale: מקנה is a collective noun for livestock/property in animals. Here 'livestock'
    best matches the immediate context. The demonstrative is preserved with 'that.'
    The phrase likely refers to the previously recovered livestock before which the
    newly taken animals were driven.
- source_word: וַיֹּאמְרוּ
  chosen: and said
  alternatives:
  - and they said
  lexicon: HALOT
  rationale: Standard narrative rendering. English can omit the explicit pronoun while
    preserving the plural sense from context.
- source_word: זֶה
  chosen: This is
  alternatives:
  - These are
  - This
  lexicon: HALOT
  rationale: The singular demonstrative is best rendered 'This is,' introducing the
    identification of the spoil as belonging to David. Some construe it collectively,
    but singular English is acceptable with a collective noun following.
- source_word: שְׁלַל דָּוִד
  chosen: David’s spoil
  alternatives:
  - the spoil of David
  - David’s plunder
  lexicon: HALOT
  rationale: שׁלל denotes spoil/plunder taken in war or raid. 'Spoil' is concise and
    natural here; 'plunder' is possible but slightly more vivid than necessary. The
    construct relationship is represented by the possessive 'David’s.'
