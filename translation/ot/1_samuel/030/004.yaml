id: 1SA.30.4
reference: 1 Samuel 30:4
source:
  edition: WLC
  text: וַ/יִּשָּׂ֨א דָוִ֜ד וְ/הָ/עָ֧ם אֲשֶׁר אִתּ֛/וֹ אֶת קוֹלָ֖/ם וַ/יִּבְכּ֑וּ
    עַ֣ד אֲשֶׁ֧ר אֵין בָּ/הֶ֛ם כֹּ֖חַ לִ/בְכּֽוֹת־־־׃
translation:
  text: Then David and the people who were with him raised their voices and wept until
    they had no strength left to weep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'lifted up their voice and wept.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא
  chosen: raised
  alternatives:
  - lifted up
  lexicon: HALOT
  rationale: The idiom נָשָׂא + קוֹל means to raise/lift the voice. 'Raised' is natural
    modern English while preserving the Hebrew idiom's force.
- source_word: קוֹלָם
  chosen: their voices
  alternatives:
  - their voice
  lexicon: HALOT
  rationale: 'Although Hebrew uses the singular noun קול in an idiomatic expression,
    English normally pluralizes: ''raised their voices.'' This best conveys the collective
    action idiomatically.'
- source_word: וַיִּבְכּוּ
  chosen: wept
  alternatives:
  - cried
  lexicon: HALOT
  rationale: בכה denotes weeping/crying. 'Wept' fits the solemn narrative tone and
    avoids ambiguity with merely vocal crying out.
- source_word: עַד אֲשֶׁר אֵין בָּהֶם כֹּחַ
  chosen: until they had no strength left
  alternatives:
  - until there was no strength in them
  - until they had no power
  lexicon: HALOT
  rationale: This clause expresses exhaustion. 'No strength left' is clear, natural
    English that preserves the sense of complete depletion.
- source_word: לִבְכּוֹת
  chosen: to weep
  alternatives:
  - to cry
  lexicon: HALOT
  rationale: Maintains lexical consistency with וַיִּבְכּוּ and preserves the repeated
    emphasis on weeping in the Hebrew.
- source_word: הָעָם אֲשֶׁר אִתּוֹ
  chosen: the people who were with him
  alternatives:
  - the troops who were with him
  - the men who were with him
  lexicon: HALOT
  rationale: עָם is broadly 'people.' Although the context involves David's fighting
    force, the Hebrew here does not specifically say 'men' or 'troops,' so 'the people
    who were with him' stays closer to the source.
