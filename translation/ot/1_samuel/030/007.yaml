theological_decisions:
- issue: Rendering of אֵפוֹד as a cultic object associated with priestly inquiry
  chosen_reading: Retain the transliteration 'ephod' in the main text
  alternative_readings:
  - priestly vestment
  - sacred vestment
  rationale: The Hebrew term refers to a specific Israelite priestly object, and in
    this narrative it is likely connected with seeking divine guidance in the following
    verse. Transliteration avoids over-specifying its function here while preserving
    the historical-religious texture of the text.
  doctrine_reference: Translation philosophy §1, §6
