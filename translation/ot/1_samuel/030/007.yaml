id: 1SA.30.7
reference: 1 Samuel 30:7
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר דָּוִ֗ד אֶל אֶבְיָתָ֤ר הַ/כֹּהֵן֙ בֶּן אֲחִימֶ֔לֶךְ הַגִּֽישָׁ/ה
    נָּ֥א לִ֖/י הָ/אֵפֹ֑ד וַ/יַּגֵּ֧שׁ אֶבְיָתָ֛ר אֶת הָ/אֵפֹ֖ד אֶל דָּוִֽד־־־־־׃
translation:
  text: Then David said to Abiathar the priest, the son of Ahimelech, “Please bring
    me the ephod.” So Abiathar brought the ephod to David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'present to me the ephod.' The Hebrew verb means 'bring near' or 'present.'
    reason: lexical_alternative
  - marker: b
    text: The 'ephod' was a priestly sacred object or garment used in Israel's worship.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - and ... said
  - so ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural modern English
    equivalent.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Definite title identifying Abiathar's office; straightforwardly rendered
    'the priest'.
- source_word: בֶּן אֲחִימֶלֶךְ
  chosen: the son of Ahimelech
  alternatives:
  - son of Ahimelech
  lexicon: HALOT
  rationale: The construct phrase marks lineage. Including 'the' fits smooth English
    apposition after 'the priest'.
- source_word: הַגִּישָׁה נָּא לִי
  chosen: Please bring me
  alternatives:
  - Bring me, please
  - Present to me, please
  lexicon: HALOT
  rationale: The Hiphil imperative of נגשׁ here means to bring near/present. 'Please
    bring me' captures both the causative sense and the politeness particle נָא in
    idiomatic English.
- source_word: הָאֵפֹד
  chosen: the ephod
  lexicon: HALOT
  rationale: A specific cultic object with no precise English equivalent, so transliteration
    is preferable to paraphrase. The article is retained.
- source_word: וַיַּגֵּשׁ
  chosen: So ... brought
  alternatives:
  - and ... brought near
  - and ... presented
  lexicon: HALOT
  rationale: Same verb root as the imperative. In context, English 'brought' best
    conveys the action naturally; 'So' reflects the narrative consequence.
- source_word: אֶל דָּוִד
  chosen: to David
  alternatives:
  - for David
  lexicon: HALOT
  rationale: The preposition marks movement toward David; 'to David' is the most direct
    rendering.
