id: 1SA.30.19
reference: 1 Samuel 30:19
source:
  edition: WLC
  text: וְ/לֹ֣א נֶעְדַּר לָ֠/הֶם מִן הַ/קָּטֹ֨ן וְ/עַד הַ/גָּד֜וֹל וְ/עַד בָּנִ֤ים
    וּ/בָנוֹת֙ וּ/מִ/שָּׁלָ֔ל וְ/עַ֛ד כָּל אֲשֶׁ֥ר לָקְח֖וּ לָ/הֶ֑ם הַ/כֹּ֖ל הֵשִׁ֥יב
    דָּוִֽד־־־־־׃
translation:
  text: Nothing of theirs was missing, from the small to the great, sons and daughters,
    spoil, or anything that had been taken from them; David brought back everything.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the least to the greatest.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all that they had taken for themselves'; the sense in context is
      what had been taken from David's people.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶעְדַּר
  chosen: was missing
  alternatives:
  - was lacking
  - was absent
  - was lost
  lexicon: HALOT
  rationale: The Niphal of עדר here denotes being missing or lacking after recovery.
    'Was missing' is natural modern English and fits the context of recovered persons
    and goods. 'Lost' is possible but can imply permanent loss rather than absence
    now remedied.
- source_word: לָהֶם
  chosen: of theirs
  alternatives:
  - to them
  - for them
  lexicon: HALOT
  rationale: 'The dative pronoun with נֶעְדַּר is best expressed idiomatically in
    English as possession: ''nothing of theirs was missing.'' This avoids awkward
    literalism while preserving the sense that none of their people or property was
    lacking.'
- source_word: מִן הַקָּטֹן וְעַד הַגָּדוֹל
  chosen: from the small to the great
  alternatives:
  - from the least to the greatest
  - from small to great
  lexicon: HALOT
  rationale: This merism likely refers comprehensively to persons of every status
    or age among what was recovered. 'From the small to the great' stays close to
    the Hebrew while remaining readable. 'Least to greatest' is a common English idiom
    but slightly interprets the adjectives.
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly names male and female children. Following the gender-accurate
    principle, 'sons and daughters' is preferred over the more generalized 'children.'
- source_word: מִשָּׁלָל
  chosen: spoil
  alternatives:
  - plunder
  - booty
  lexicon: HALOT
  rationale: The term refers to goods taken in raiding. 'Spoil' is concise and standard
    in biblical narrative. 'Plunder' is also possible, but 'spoil' fits the list structure
    well.
- source_word: כָּל אֲשֶׁר לָקְחוּ לָהֶם
  chosen: anything that had been taken from them
  alternatives:
  - all that they had taken for themselves
  - everything they had seized
  lexicon: HALOT
  rationale: The Hebrew literally says 'all that they had taken for themselves,' with
    the subject being the Amalekites from context. In English, making the victims
    explicit as 'taken from them' clarifies the sense without importing new content,
    since the preceding pronoun already identifies the owners.
- source_word: הַכֹּל הֵשִׁיב
  chosen: brought back everything
  alternatives:
  - restored everything
  - recovered everything
  lexicon: HALOT
  rationale: The Hiphil of שוב here means to cause to return, i.e., bring back or
    restore. 'Brought back everything' preserves the concrete narrative action of
    David returning all that had been taken.
- source_word: דָּוִד
  chosen: David
  rationale: Standard English transliteration of the personal name.
