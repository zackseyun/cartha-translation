id: 1SA.30.17
reference: 1 Samuel 30:17
source:
  edition: WLC
  text: וַ/יַּכֵּ֥/ם דָּוִ֛ד מֵ/הַ/נֶּ֥שֶׁף וְ/עַד הָ/עֶ֖רֶב לְ/מָֽחֳרָתָ֑/ם וְ/לֹֽא
    נִמְלַ֤ט מֵ/הֶם֙ אִ֔ישׁ כִּי֩ אִם אַרְבַּ֨ע מֵא֧וֹת אִֽישׁ נַ֛עַר אֲשֶׁר רָכְב֥וּ
    עַל הַ/גְּמַלִּ֖ים וַ/יָּנֻֽסוּ־־־־־־׃
translation:
  text: David struck them down from the twilight until the evening of the next day,
    and not a man of them escaped, except four hundred young men who rode on the camels
    and fled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from dawn'; the Hebrew word can refer to twilight at either end of the
      day. Some take the sense here as morning twilight rather than evening twilight.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכֵּם
  chosen: struck them down
  alternatives:
  - attacked them
  - smote them
  lexicon: HALOT
  rationale: נכה in this military context denotes violent striking/defeating. 'Struck
    them down' preserves the force of the verb without sounding archaic like 'smote,'
    and it fits the object suffix 'them.'
- source_word: מֵהַנֶּשֶׁף
  chosen: from the twilight
  alternatives:
  - from dawn
  - from dusk
  lexicon: HALOT
  rationale: נשף can denote twilight, either evening or morning twilight depending
    on context. Here the sequence 'from the twilight until the evening of the next
    day' most naturally points to the beginning of an overnight engagement, so 'twilight'
    preserves the lexical ambiguity better than forcing 'dawn' or 'dusk' in the main
    text.
- source_word: וְעַד הָעֶרֶב לְמָחֳרָתָם
  chosen: until the evening of the next day
  alternatives:
  - until evening, on the next day
  - until the next day's evening
  lexicon: HALOT
  rationale: The phrase indicates duration extending to the following day's evening.
    'Of the next day' is idiomatic English and preserves the temporal sense of למחרתם.
- source_word: נִמְלַט מֵהֶם אִישׁ
  chosen: not a man of them escaped
  alternatives:
  - not one of them escaped
  - no man escaped from them
  lexicon: HALOT
  rationale: The Hebrew is singular 'a man,' used distributively. 'Not a man of them
    escaped' preserves the masculine singular form and the emphatic totality, in line
    with the project's gender-accurate policy.
- source_word: כִּי אִם
  chosen: except
  alternatives:
  - but only
  - save
  lexicon: HALOT
  rationale: This idiom introduces the exception to the total statement. 'Except'
    is the clearest modern English equivalent.
- source_word: אַרְבַּע מֵאוֹת אִישׁ נַעַר
  chosen: four hundred young men
  alternatives:
  - four hundred youths
  - four hundred servant-boys
  lexicon: HALOT
  rationale: נַעַר can mean boy, youth, young man, or servant depending on context.
    Since these are combatants capable of riding camels and escaping, 'young men'
    best fits the context without implying childhood or servile status.
- source_word: רָכְבוּ עַל הַגְּמַלִּים
  chosen: rode on the camels
  alternatives:
  - mounted the camels
  - rode the camels
  lexicon: HALOT
  rationale: The Hebrew explicitly uses the preposition 'on.' 'Rode on the camels'
    is slightly more formal but closely reflects the source wording.
- source_word: וַיָּנֻסוּ
  chosen: and fled
  alternatives:
  - and escaped
  - and ran away
  lexicon: HALOT
  rationale: נס means to flee. Since 'escaped' has already been used for נמלט, 'fled'
    preserves the distinction between the verbs.
