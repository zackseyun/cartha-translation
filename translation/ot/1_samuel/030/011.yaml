id: 1SA.30.11
reference: 1 Samuel 30:11
source:
  edition: WLC
  text: וַֽ/יִּמְצְא֤וּ אִישׁ מִצְרִי֙ בַּ/שָּׂדֶ֔ה וַ/יִּקְח֥וּ אֹת֖/וֹ אֶל דָּוִ֑ד
    וַ/יִּתְּנוּ ל֥/וֹ לֶ֨חֶם֙ וַ/יֹּ֔אכַל וַ/יַּשְׁקֻ֖/הוּ מָֽיִם־־־׃
translation:
  text: They found an Egyptian man in the open field and brought him to David. They
    gave him bread, and he ate, and they gave him water to drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in the field.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'and took him to David.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'and they caused him to drink water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצְאוּ
  chosen: They found
  alternatives:
  - And they found
  lexicon: HALOT
  rationale: Wayyiqtol narrative form; simple past in English is natural, with the
    conjunction absorbed into normal narrative flow.
- source_word: אִישׁ מִצְרִי
  chosen: an Egyptian man
  alternatives:
  - an Egyptian
  - a man, an Egyptian
  lexicon: HALOT
  rationale: Retains both the noun אִישׁ ('man') and the gentilic adjective מִצְרִי
    ('Egyptian'), preserving the Hebrew's explicit identification of the person.
- source_word: בַּשָּׂדֶה
  chosen: in the open field
  alternatives:
  - in the field
  - in the countryside
  lexicon: HALOT
  rationale: שָׂדֶה commonly means 'field.' 'Open field' conveys the outdoor, uncultivated
    setting idiomatically in English without overinterpreting.
- source_word: וַיִּקְחוּ אֹתוֹ אֶל דָּוִד
  chosen: and brought him to David
  alternatives:
  - and took him to David
  lexicon: HALOT
  rationale: לקח with a person and destination can be rendered 'take' or 'bring.'
    Since the motion is toward David from the narrator's focus, 'brought' is smoother
    English.
- source_word: וַיִּתְּנוּ לוֹ לֶחֶם
  chosen: They gave him bread
  alternatives:
  - and they gave him food
  - and they gave him a loaf of bread
  lexicon: HALOT
  rationale: לֶחֶם is literally 'bread'; no contextual pressure requires the broader
    'food,' so the more specific term is retained.
- source_word: וַיֹּאכַל
  chosen: and he ate
  alternatives:
  - and he ate it
  lexicon: HALOT
  rationale: The Hebrew verb has no explicit object here; English can leave it implicit
    as in the source.
- source_word: וַיַּשְׁקֻהוּ מָיִם
  chosen: and they gave him water to drink
  alternatives:
  - and they made him drink water
  - and they gave him water
  lexicon: HALOT
  rationale: The Hiphil of שׁקה means 'give to drink' or 'make drink.' 'Gave him water
    to drink' is idiomatic and preserves the causative sense better than the flatter
    'gave him water.'
