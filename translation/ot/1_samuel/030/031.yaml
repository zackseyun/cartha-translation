id: 1SA.30.31
reference: 1 Samuel 30:31
source:
  edition: WLC
  text: וְ/לַ/אֲשֶׁ֖ר בְּ/חֶבְר֑וֹן וּֽ/לְ/כָל הַ/מְּקֹמ֛וֹת אֲשֶֽׁר הִתְהַלֶּךְ שָׁ֥ם
    דָּוִ֖ד ה֥וּא וַ/אֲנָשָֽׁי/ו־־־׃פ
translation:
  text: and to those in Hebron, and to all the places where David himself and his
    men had gone about.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had traveled' or 'had moved about.' The Hebrew verb suggests repeated
      movement from place to place.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לַ/אֲשֶׁר
  chosen: and to those
  alternatives:
  - and to him who
  - and to those who were
  lexicon: HALOT
  rationale: The preposition plus relative particle functions idiomatically here to
    continue the recipient list from the previous verse. English requires an implied
    plural personal object, best rendered 'those,' rather than a wooden 'to which'
    or singular 'to him who.'
- source_word: בְּ/חֶבְרוֹן
  chosen: in Hebron
  alternatives:
  - at Hebron
  lexicon: HALOT
  rationale: Standard locative rendering for the place name חֶבְרוֹן. 'In Hebron'
    is the most natural English equivalent.
- source_word: וּֽ/לְ/כָל הַ/מְּקֹמוֹת
  chosen: and to all the places
  alternatives:
  - and to every place
  lexicon: HALOT
  rationale: Retains the distributive sense of כָל with the plural noun 'places' and
    preserves the continuation of the gift-recipient list.
- source_word: אֲשֶׁר
  chosen: where
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: With a locative antecedent ('places'), English idiom prefers 'where'
    over the more literal but less natural 'which' or 'that.'
- source_word: הִתְהַלֶּךְ
  chosen: had gone about
  alternatives:
  - had walked about
  - had traveled
  - had moved about
  lexicon: HALOT
  rationale: The hitpael of הלך here conveys repeated or customary movement from place
    to place, not merely a single act of walking. 'Had gone about' captures the itinerant
    sense in readable English.
- source_word: שָׁם
  chosen: —
  alternatives:
  - there
  lexicon: HALOT
  rationale: The adverb is semantically absorbed into the English relative construction
    'where ... had gone about.' Rendering both 'where' and 'there' would be redundant
    in English.
- source_word: דָּוִד הוּא
  chosen: David himself
  alternatives:
  - David
  - David, he
  lexicon: HALOT
  rationale: The independent pronoun הוּא after the proper name is emphatic. 'David
    himself' preserves that emphasis more naturally than the awkward 'David, he.'
- source_word: וַ/אֲנָשָׁיו
  chosen: and his men
  alternatives:
  - and his people
  lexicon: HALOT
  rationale: אֲנָשִׁים here refers to David's male fighting band/companions. 'His
    men' is the natural and contextually precise rendering.
