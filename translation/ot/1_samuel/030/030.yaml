id: 1SA.30.30
reference: 1 Samuel 30:30
source:
  edition: WLC
  text: וְ/לַ/אֲשֶׁ֧ר בְּ/חָרְמָ֛ה וְ/לַ/אֲשֶׁ֥ר בְּ/בוֹר עָשָׁ֖ן וְ/לַ/אֲשֶׁ֥ר בַּ/עֲתָֽךְ־׃
translation:
  text: and to those in Hormah, and to those in Bor-ashan, and to those in Athach.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bor-ashan is a place name; literally the elements may suggest 'well/pit
      of smoke,' but the name is transliterated rather than translated.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלַאֲשֶׁר
  chosen: and to those
  alternatives:
  - and to the ones who were
  - and to those who were
  lexicon: HALOT
  rationale: The construction combines conjunction + preposition ל + relative אֲשֶׁר,
    functioning idiomatically in this distribution list as 'and to those [who were/in
    ...].' English omits an explicit relative clause for naturalness while preserving
    the dative sense of recipients.
- source_word: בְּחָרְמָה
  chosen: in Hormah
  alternatives:
  - at Hormah
  lexicon: HALOT
  rationale: A place name with prefixed ב, best rendered locatively. 'In Hormah' fits
    the repeated pattern of towns receiving David's gift.
- source_word: בְּבוֹר עָשָׁן
  chosen: in Bor-ashan
  alternatives:
  - in Bor Ashan
  - in Pit of Smoke
  lexicon: HALOT
  rationale: This is a toponym. Per translation philosophy, names are transliterated
    rather than translated. The two-part name is represented with a hyphen to signal
    a single place name in English.
- source_word: בַּעֲתָךְ
  chosen: in Athach
  alternatives:
  - at Athach
  lexicon: HALOT
  rationale: Another place name with prefixed ב. 'Athach' is a standard transliteration;
    the locative sense is preserved with 'in.'
