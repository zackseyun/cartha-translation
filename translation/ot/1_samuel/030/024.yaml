id: 1SA.30.24
reference: 1 Samuel 30:24
source:
  edition: WLC
  text: וּ/מִי֙ יִשְׁמַ֣ע לָ/כֶ֔ם לַ/דָּבָ֖ר הַ/זֶּ֑ה כִּ֞י כְּ/חֵ֣לֶק הַ/יֹּרֵ֣ד
    בַּ/מִּלְחָמָ֗ה וּֽ/כְ/חֵ֛לֶק הַ/יֹּשֵׁ֥ב עַל הַ/כֵּלִ֖ים יַחְדָּ֥ו יַחֲלֹֽקוּ׀־׃ס
translation:
  text: And who will listen to you in this matter? For as is the share of the one
    who goes down into the battle, so is the share of the one who stays by the supplies;
    together they shall divide.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will heed you'—the Hebrew verb can mean 'listen to,' 'heed,' or 'obey'
      depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the one who stays by the baggage/equipment.' The Hebrew term can refer
      broadly to articles, gear, or supplies.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִי
  chosen: And who
  alternatives:
  - But who
  - Who
  lexicon: HALOT
  rationale: The conjunction plus interrogative introduces David's rebuttal with a
    rhetorical question. 'And who' preserves the Hebrew linkage while remaining natural
    in English; 'But who' is possible contextually, but the simple connective is sufficient.
- source_word: יִשְׁמַע לָכֶם
  chosen: will listen to you
  alternatives:
  - will heed you
  - will obey you
  lexicon: HALOT
  rationale: שׁמע with ל can mean listen to, heed, or obey. In this rhetorical context
    David means that no one will accept or pay heed to their proposal. 'Listen to
    you' is idiomatic and broad enough, while 'heed you' is a viable alternative preserved
    in a footnote.
- source_word: לַדָּבָר הַזֶּה
  chosen: in this matter
  alternatives:
  - about this proposal
  - in this thing
  lexicon: HALOT
  rationale: דבר here refers not merely to a spoken 'word' but to the issue/proposal
    under dispute. 'In this matter' conveys the sense in readable modern English without
    over-paraphrasing.
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason for rejecting the selfish proposal. 'For' fits
    the explanatory force and the discourse flow.
- source_word: כְּחֵלֶק
  chosen: as is the share
  alternatives:
  - like the portion
  - according to the share
  lexicon: HALOT
  rationale: חלק denotes a portion/share, especially of spoil or allotted goods. 'Share'
    is concise and natural in this military-plunder context.
- source_word: הַיֹּרֵד בַּמִּלְחָמָה
  chosen: the one who goes down into the battle
  alternatives:
  - the one who goes down to the battle
  - the fighter
  lexicon: HALOT
  rationale: 'The participle is substantival: ''the one who goes down.'' Retaining
    ''goes down'' reflects the Hebrew idiom rather than flattening it to ''fighter.''
    ''Into the battle'' best conveys engagement in combat.'
- source_word: וּכְחֵלֶק הַיֹּשֵׁב עַל הַכֵּלִים
  chosen: so is the share of the one who stays by the supplies
  alternatives:
  - and the share of the one who sits by the baggage
  - and the share of the one who remains with the equipment
  lexicon: HALOT
  rationale: יֹשֵׁב literally 'sits/stays,' here meaning remains behind on guard duty.
    כֵּלִים can mean vessels, implements, gear, baggage, or equipment. In this context
    of men left behind with the goods, 'supplies' communicates the practical sense
    clearly; 'baggage' is a strong formal alternative preserved in a footnote.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - alike
  - equally
  lexicon: HALOT
  rationale: The adverb emphasizes joint or equal participation. 'Together' preserves
    the basic sense and works smoothly with the following verb.
- source_word: יַחֲלֹקוּ
  chosen: they shall divide
  alternatives:
  - they shall share
  - they shall apportion
  lexicon: HALOT
  rationale: The verb means divide/apportion. 'They shall divide' keeps the concrete
    action of distributing spoil, while the preceding syntax makes clear that the
    division is equal.
