id: 1SA.30.25
reference: 1 Samuel 30:25
source:
  edition: WLC
  text: וַ/יְהִ֕י מֵֽ/הַ/יּ֥וֹם הַ/ה֖וּא וָ/מָ֑עְלָ/ה וַ/יְשִׂמֶ֜/הָ לְ/חֹ֤ק וּ/לְ/מִשְׁפָּט֙
    לְ/יִשְׂרָאֵ֔ל עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה׃פ
translation:
  text: 'And it was so from that day onward: he made it a statute and an ordinance
    for Israel to this day.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he established it as a statute and a judgment for Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it was so
  alternatives:
  - And it happened
  - So it was
  lexicon: HALOT
  rationale: The idiom introduces the establishment of an ongoing state of affairs
    rather than merely narrating an event. 'And it was so' captures the resultative
    sense in context.
- source_word: מֵהַיּוֹם הַהוּא וָמָעְלָה
  chosen: from that day onward
  alternatives:
  - from that day and upward
  - from that day forward
  lexicon: HALOT
  rationale: This Hebrew temporal expression denotes continuation from a specific
    point into the future. 'Onward' is natural modern English and preserves the durative
    force.
- source_word: וַיְשִׂמֶהָ
  chosen: he made it
  alternatives:
  - he set it
  - he established it
  lexicon: HALOT
  rationale: The verb שׂים commonly means 'set, place, make.' With the feminine suffix
    referring back to the practice just described in context, 'he made it' is concise
    and idiomatic. The subject is David from the surrounding narrative.
- source_word: לְחֹק
  chosen: a statute
  alternatives:
  - a fixed rule
  - a decree
  lexicon: HALOT
  rationale: חֹק often denotes something prescribed or fixed. 'Statute' preserves
    the formal, normative sense without over-paraphrasing.
- source_word: וּלְמִשְׁפָּט
  chosen: and an ordinance
  alternatives:
  - and a judgment
  - and a rule
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, legal decision, or ordinance. In
    parallel with חֹק here it refers to a binding legal/customary norm, so 'ordinance'
    best fits the collocation.
- source_word: לְיִשְׂרָאֵל
  chosen: for Israel
  alternatives:
  - in Israel
  - for the Israelites
  lexicon: HALOT
  rationale: The preposition ל marks the people for whom the rule applies. 'For Israel'
    is both natural and sufficiently formal.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  - to the present day
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom indicating that the custom remained in
    force up to the narrator's present perspective. 'To this day' is the conventional
    and accurate English equivalent.
