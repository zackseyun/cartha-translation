id: 1SA.30.1
reference: 1 Samuel 30:1
source:
  edition: WLC
  text: וַ/יְהִ֞י בְּ/בֹ֨א דָוִ֧ד וַ/אֲנָשָׁ֛י/ו צִֽקְלַ֖ג בַּ/יּ֣וֹם הַ/שְּׁלִישִׁ֑י
    וַ/עֲמָלֵקִ֣י פָֽשְׁט֗וּ אֶל נֶ֨גֶב֙ וְ/אֶל צִ֣קְלַ֔ג וַ/יַּכּוּ֙ אֶת צִ֣קְלַ֔ג
    וַ/יִּשְׂרְפ֥וּ אֹתָ֖/הּ בָּ/אֵֽשׁ־־־׃
translation:
  text: Now when David and his men came to Ziklag on the third day, the Amalekites
    had made a raid against the Negev and against Ziklag, and they had struck Ziklag
    and burned it with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'had raided the South'; Hebrew negev can denote either the southern
      region in general or the specific area known as the Negev.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now when
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive plus היה introduces a new narrative circumstance.
    'Now when' preserves the temporal scene-setting function in natural modern English
    better than the more wooden traditional formulas.
- source_word: בְּבֹא
  chosen: came
  alternatives:
  - entered
  - arrived
  lexicon: HALOT
  rationale: The infinitive construct of בוא with prefixed ב marks the time of David's
    arrival. 'Came' is the most natural narrative rendering here; 'entered' is too
    literal and 'arrived' slightly more interpretive.
- source_word: וַאֲנָשָׁיו
  chosen: and his men
  alternatives:
  - and his people
  lexicon: HALOT
  rationale: אֲנָשִׁים here refers to David's fighting band/companions, not people
    in general. 'His men' is the contextually accurate and gender-accurate rendering.
- source_word: צִקְלַג
  chosen: Ziklag
  rationale: Place name transliterated according to standard English convention, consistent
    with the translation philosophy to transliterate names.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: on the third day
  alternatives:
  - by the third day
  lexicon: HALOT
  rationale: A straightforward temporal expression. 'On the third day' is the plain
    sense and standard English equivalent.
- source_word: וַעֲמָלֵקִי
  chosen: the Amalekites
  alternatives:
  - the Amalekite raiders
  lexicon: HALOT
  rationale: Though morphologically singular in form, the following plural verbs show
    a collective sense. English naturally renders the group as 'the Amalekites.'
- source_word: פָשְׁטוּ
  chosen: had made a raid against
  alternatives:
  - had raided
  - had invaded
  - had spread out against
  lexicon: HALOT
  rationale: פשט in this military context means to raid or make a raid. Because David
    arrives after the attack, the English past perfect clarifies the prior action
    relative to the main temporal frame.
- source_word: אֶל נֶגֶב
  chosen: against the Negev
  alternatives:
  - into the Negev
  - toward the Negev
  - against the south
  lexicon: HALOT
  rationale: נֶגֶב can mean 'south' or the southern region; here it refers to the
    geographic region, so 'the Negev' is preferable. 'Against' matches the hostile
    force implied by the raid.
- source_word: וְאֶל צִקְלַג
  chosen: and against Ziklag
  alternatives:
  - and on Ziklag
  lexicon: HALOT
  rationale: Parallel to the previous phrase, indicating the targets of the raid.
- source_word: וַיַּכּוּ אֶת צִקְלַג
  chosen: they had struck Ziklag
  alternatives:
  - they had attacked Ziklag
  - they had smitten Ziklag
  lexicon: HALOT
  rationale: נכה is broad ('strike, smite, attack'). 'Struck' preserves the lexical
    force without becoming archaic; the past perfect again reflects action completed
    before David's arrival.
- source_word: וַיִּשְׂרְפוּ אֹתָהּ בָּאֵשׁ
  chosen: and burned it with fire
  alternatives:
  - and burned it down
  - and set it on fire
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'burned it with fire.' Retaining 'with fire'
    preserves the emphatic Hebrew expression, even though English could compress it.
