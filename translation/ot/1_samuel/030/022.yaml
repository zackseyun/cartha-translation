id: 1SA.30.22
reference: 1 Samuel 30:22
source:
  edition: WLC
  text: וַ/יַּ֜עַן כָּל אִֽישׁ רָ֣ע וּ/בְלִיַּ֗עַל מֵֽ/הָ/אֲנָשִׁים֮ אֲשֶׁ֣ר הָלְכ֣וּ
    עִם דָּוִד֒ וַ/יֹּאמְר֗וּ יַ֚עַן אֲשֶׁ֣ר לֹֽא הָלְכ֣וּ עִמִּ֔/י לֹֽא נִתֵּ֣ן לָ/הֶ֔ם
    מֵ/הַ/שָּׁלָ֖ל אֲשֶׁ֣ר הִצַּ֑לְנוּ כִּֽי אִם אִ֤ישׁ אֶת אִשְׁתּ/וֹ֙ וְ/אֶת בָּנָ֔י/ו
    וְ/יִנְהֲג֖וּ וְ/יֵלֵֽכוּ־־־־־־־־־׃ס
translation:
  text: Then every wicked and worthless man from the men who had gone with David answered
    and said, “Because they did not go with me, we will not give them any of the spoil
    that we recovered, except that each man may take his wife and his children and
    lead them away and go.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plunder' for 'spoil.'
    reason: lexical_alternative
  - marker: b
    text: '''Worthless'' translates beliyyaal here as a descriptive term; alternatively,
      ''lawless.'''
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'with me'; the speakers are a group, but the quotation preserves
      the singular form in the source text.
    reason: textual_variant
lexical_decisions:
- source_word: וַיַּעַן
  chosen: Then ... answered
  alternatives:
  - And ... answered
  - Then ... responded
  lexicon: HALOT
  rationale: Narrative waw + ענה commonly advances the story and introduces a reply.
    'Then ... answered' preserves the Hebrew discourse function in readable English.
- source_word: כָּל אִישׁ רָע וּבְלִיַּעַל
  chosen: every wicked and worthless man
  alternatives:
  - every evil and base man
  - every wicked fellow
  lexicon: HALOT
  rationale: רָע denotes moral badness ('wicked/evil'), and בְלִיַּעַל here functions
    as a characterization of worthlessness or lawlessness. 'Worthless' is idiomatic
    and preserves the pejorative force without importing the later proper-name sense
    'Belial'.
- source_word: מֵהָאֲנָשִׁים אֲשֶׁר הָלְכוּ עִם דָּוִד
  chosen: from the men who had gone with David
  alternatives:
  - among the men who had gone with David
  lexicon: HALOT
  rationale: The phrase identifies these speakers as a subset of David's company.
    'From the men' is a close rendering of מִן with partitive force.
- source_word: וַיֹּאמְרוּ
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Standard narrative introduction to direct speech; retained for transparency
    to the Hebrew sequence.
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Since
  - Inasmuch as
  lexicon: HALOT
  rationale: The compound conjunction gives the stated reason for the refusal. 'Because'
    is natural modern English and adequately causal.
- source_word: לֹא הָלְכוּ עִמִּי
  chosen: they did not go with me
  alternatives:
  - they did not go with us
  lexicon: HALOT
  rationale: The consonantal text has first person singular suffix ('with me'), so
    the translation preserves the singular even though the following verb is first
    person plural. This likely reflects the speech of one representative voiced by
    the group, or a stylistic shift within the quotation.
- source_word: לֹא נִתֵּן לָהֶם
  chosen: we will not give them
  alternatives:
  - let us not give them
  - we shall not give them
  lexicon: HALOT
  rationale: First person plural imperfect expresses the group's resolve. English
    future best captures the volitional force in context.
- source_word: מֵהַשָּׁלָל
  chosen: any of the spoil
  alternatives:
  - any of the plunder
  lexicon: HALOT
  rationale: שָׁלָל denotes war booty/plunder. 'Spoil' is concise and idiomatic in
    military context; 'any of' reflects the partitive מִן.
- source_word: אֲשֶׁר הִצַּלְנוּ
  chosen: that we recovered
  alternatives:
  - that we rescued
  - that we delivered
  lexicon: HALOT
  rationale: The hiphil of נצל can mean rescue/deliver. In this context of reclaiming
    goods from raiders, 'recovered' communicates the practical sense more clearly
    in English while preserving the idea of retrieval.
- source_word: כִּי אִם
  chosen: except that
  alternatives:
  - except only
  - but only
  lexicon: HALOT
  rationale: The idiom introduces the sole concession. 'Except that' fits the syntax
    leading into the content of what they may take.
- source_word: אִישׁ אֶת אִשְׁתּוֹ וְאֶת בָּנָיו
  chosen: each man may take his wife and his children
  alternatives:
  - each man his wife and his sons
  - each one his wife and his children
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each man.' בָּנָיו can be 'sons' more narrowly,
    but in many contexts functions generically for children/offspring; 'children'
    best fits the family-recovery context in natural English.
- source_word: וְיִנְהֲגוּ וְיֵלֵכוּ
  chosen: and lead them away and go
  alternatives:
  - and drive them off and leave
  - and take them and depart
  lexicon: HALOT
  rationale: נהג means lead/drive along, often of persons or animals. Here it refers
    to taking their families and departing. 'Lead them away and go' preserves both
    verbs without over-paraphrase.
