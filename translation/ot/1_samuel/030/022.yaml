theological_decisions:
- issue: Rendering בְלִיַּעַל
  chosen_reading: worthless
  alternative_readings:
  - Belial
  - lawless
  rationale: In this context the term functions as a common noun/adjectival characterization,
    not a proper name for a demonic figure. Rendering it 'worthless' avoids importing
    later theological associations not demanded by the Hebrew text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; do not import doctrinal claims the text does not make.'
