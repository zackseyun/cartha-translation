id: 1SA.30.8
reference: 1 Samuel 30:8
source:
  edition: WLC
  text: וַ/יִּשְׁאַ֨ל דָּוִ֤ד בַּֽ/יהוָה֙ לֵ/אמֹ֔ר אֶרְדֹּ֛ף אַחֲרֵ֥י הַ/גְּדוּד הַ/זֶּ֖ה הַֽ/אַשִּׂגֶ֑/נּוּ וַ/יֹּ֤אמֶר ל/וֹ֙ רְדֹ֔ף כִּֽי הַשֵּׂ֥ג תַּשִּׂ֖יג וְ/הַצֵּ֥ל תַּצִּֽיל־־׃
translation:
  text: And David inquired of Yahweh, saying, “Should I pursue after this raiding party? Will I overtake it?” And he said to him, “Pursue, for you will surely overtake, and you will surely rescue.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Will I overtake it?' The singular pronoun refers to the collective noun 'raiding party'; English renders the sense as 'them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and you will surely deliver.' The Hebrew does not state the object explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַל
  chosen: inquired
  alternatives:
  - asked
  - consulted
  lexicon: HALOT
  rationale: The verb שׁאל with ביהוה in this context refers to seeking divine guidance, not merely asking a question. 'Inquired' preserves the formal sense of consulting the LORD.
- source_word: בַּיהוָה
  chosen: of the LORD
  alternatives:
  - of Yahweh
  - with the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition with שׁאל idiomatically yields 'inquired of the LORD.'
- source_word: אֶרְדֹּף
  chosen: Should I pursue
  alternatives:
  - Shall I pursue
  - Am I to pursue
  lexicon: HALOT
  rationale: Although formally an imperfect 'I will pursue,' in direct inquiry after לֵאמֹר it functions as a deliberative question. 'Should I pursue' gives natural English while preserving the consultative force.
- source_word: הַגְּדוּד
  chosen: raiding party
  alternatives:
  - troop
  - band
  - marauding band
  lexicon: HALOT
  rationale: גְּדוּד here refers to the Amalekite raiders who attacked Ziklag. 'Raiding party' is more contextually precise and readable than the broader 'troop' or 'band.'
- source_word: הַזֶּה
  chosen: this
  alternatives:
  - these
  lexicon: HALOT
  rationale: The demonstrative is singular and modifies גְּדוּד, so 'this' is the straightforward rendering.
- source_word: הַאַשִּׂגֶנּוּ
  chosen: Will I overtake them
  alternatives:
  - Will I catch up to it
  - Will I reach it
  lexicon: HALOT
  rationale: The suffix is formally singular ('it/him'), agreeing with singular גְּדוּד, but English naturally refers to the members of a raiding party as 'them.' This is an optimal-equivalence adjustment for idiomatic clarity.
- source_word: רְדֹף
  chosen: Pursue
  alternatives:
  - Go after them
  - Chase
  lexicon: HALOT
  rationale: The imperative directly answers David's question. 'Pursue' preserves the lexical link with the earlier verb and keeps the tone concise.
- source_word: כִּי הַשֵּׂג תַּשִּׂיג
  chosen: for you will surely overtake them
  alternatives:
  - for overtaking you will overtake
  - for you shall certainly catch them
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies certainty. 'Will surely overtake' is standard English for this emphatic construction. 'Them' again reflects the collective sense of the singular noun in context.
- source_word: וְהַצֵּל תַּצִּיל
  chosen: and you will surely rescue
  alternatives:
  - and you will surely deliver
  - and you will surely rescue all
  lexicon: HALOT
  rationale: The same infinitive absolute construction marks emphasis. The object is unstated in Hebrew, so the translation should not add 'all' in the main text, though the context implies recovery of captives and goods. 'Rescue' fits the immediate narrative context better than the broader 'deliver.'
