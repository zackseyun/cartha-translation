id: 1SA.30.10
reference: 1 Samuel 30:10
source:
  edition: WLC
  text: וַ/יִּרְדֹּ֣ף דָּוִ֔ד ה֖וּא וְ/אַרְבַּע מֵא֣וֹת אִ֑ישׁ וַ/יַּֽעַמְדוּ֙ מָאתַ֣יִם
    אִ֔ישׁ אֲשֶׁ֣ר פִּגְּר֔וּ מֵ/עֲבֹ֖ר אֶת נַ֥חַל הַ/בְּשֽׂוֹר־־׃
translation:
  text: So David pursued, he and four hundred men, while two hundred men stayed behind,
    who were too exhausted to cross the Brook Besor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who became faint' or 'who lagged behind from exhaustion' for the Hebrew
      expression.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Brook Besor'; נחל can refer to a brook, wadi, or seasonal streambed.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּרְדֹּף
  chosen: pursued
  alternatives:
  - went in pursuit
  - chased
  lexicon: HALOT
  rationale: רדף commonly means to pursue or chase. 'Pursued' is concise and natural
    in narrative English, preserving the military sense without over-paraphrase.
- source_word: הוּא וְאַרְבַּע מֵאוֹת אִישׁ
  chosen: he and four hundred men
  alternatives:
  - he with four hundred men
  lexicon: HALOT
  rationale: 'The pronoun הוּא is emphatic/appositional with David: ''he, and four
    hundred men.'' English idiom is best represented by ''he and four hundred men.''
    ''Men'' reflects אִישׁ in a counting expression.'
- source_word: וַיַּעַמְדוּ
  chosen: stayed behind
  alternatives:
  - remained
  - stopped
  lexicon: HALOT
  rationale: עמד literally means 'stood,' but in this context of a pursuing force
    and a subgroup not continuing, 'stayed behind' best conveys the narrative function
    in natural English. 'Remained' is possible but less vivid.
- source_word: מָאתַיִם אִישׁ
  chosen: two hundred men
  lexicon: HALOT
  rationale: Straightforward numerical expression; 'men' is appropriate for אִישׁ
    in military census-style usage.
- source_word: אֲשֶׁר פִּגְּרוּ
  chosen: who were too exhausted
  alternatives:
  - who lagged behind from exhaustion
  - who became faint
  lexicon: HALOT
  rationale: פגר in this stem/context conveys becoming faint, exhausted, or unable
    to continue. The following infinitive phrase explains the result, so 'were too
    exhausted' captures both condition and consequence in idiomatic English.
- source_word: מֵעֲבֹר
  chosen: to cross
  alternatives:
  - from crossing over
  lexicon: HALOT
  rationale: 'The Hebrew construction literally has ''from crossing,'' but English
    normally expresses the sense as inability: ''too exhausted to cross.'' This is
    an optimal-equivalence rendering of the infinitive with מן after פגרו.'
- source_word: נַחַל הַבְּשׂוֹר
  chosen: the Brook Besor
  alternatives:
  - the Besor Wadi
  - the valley of Besor
  lexicon: HALOT
  rationale: נחל often denotes a wadi, torrent-bed, or brook. 'Brook Besor' is established
    and readable English for a named watercourse. The proper name is transliterated
    as 'Besor' per policy on names.
