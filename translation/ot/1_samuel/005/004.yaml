id: 1SA.5.4
reference: 1 Samuel 5:4
source:
  edition: WLC
  text: וַ/יַּשְׁכִּ֣מוּ בַ/בֹּקֶר֮ מִֽ/מָּחֳרָת֒ וְ/הִנֵּ֣ה דָג֗וֹן נֹפֵ֤ל לְ/פָנָי/ו֙ אַ֔רְצָ/ה לִ/פְנֵ֖י אֲר֣וֹן יְהוָ֑ה וְ/רֹ֨אשׁ דָּג֜וֹן וּ/שְׁתֵּ֣י כַּפּ֣וֹת יָדָ֗י/ו כְּרֻתוֹת֙ אֶל הַ/מִּפְתָּ֔ן רַ֥ק דָּג֖וֹן נִשְׁאַ֥ר עָלָֽי/ו׀־׃
translation:
  text: When they rose early the next morning, behold, Dagon had fallen facedown on the ground before the ark of Yahweh, and the head of Dagon and both the palms of his hands were cut off on the threshold; only Dagon was left on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''only Dagon was left upon him,'' likely meaning only the idol''s body or trunk remained after its head and hands were cut off.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכִּמוּ
  chosen: When they rose early
  alternatives:
  - And they rose early
  - And they got up early
  lexicon: HALOT
  rationale: The verb means to rise early. Rendering with 'When' fits the narrative flow into the following temporal phrase in natural English without losing the sequential sense of the waw-consecutive.
- source_word: בַבֹּקֶר מִמָּחֳרָת
  chosen: the next morning
  alternatives:
  - in the morning on the next day
  - early in the morning the next day
  lexicon: HALOT
  rationale: The two expressions together indicate the morning of the following day. 'The next morning' is concise and accurate.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and behold
  lexicon: HALOT
  rationale: This discourse marker heightens surprise. 'Behold' preserves the suddenness and rhetorical force better than omitting it.
- source_word: נֹפֵל לְפָנָיו אַרְצָה
  chosen: had fallen facedown on the ground
  alternatives:
  - was fallen on the ground before it
  - had fallen to the ground
  lexicon: HALOT
  rationale: The participle in context describes the discovered state. English pluperfect conveys that Dagon was already fallen when they arrived. 'Facedown' captures לְפָנָיו with the idiomatic sense of falling before something, while 'on the ground' renders אַרְצָה.
- source_word: לִפְנֵי אֲרוֹן יְהוָה
  chosen: before the ark of the LORD
  alternatives:
  - in front of the ark of the LORD
  lexicon: HALOT
  rationale: Standard spatial rendering. יְהוָה follows the doctrinal default as 'the LORD'.
- source_word: וְרֹאשׁ דָּגוֹן
  chosen: the head of Dagon
  lexicon: HALOT
  rationale: Direct, formal rendering of the construct phrase.
- source_word: וּשְׁתֵּי כַּפּוֹת יָדָיו
  chosen: both the palms of his hands
  alternatives:
  - the two palms of his hands
  - both his hands
  lexicon: HALOT
  rationale: כַּף refers specifically to the palm or hollow of the hand, not merely the hand in general. 'Both the palms of his hands' preserves the specificity and the dual number.
- source_word: כְּרֻתוֹת
  chosen: were cut off
  alternatives:
  - were severed
  - had been cut off
  lexicon: HALOT
  rationale: The passive participle denotes a severed state. 'Were cut off' is clear, idiomatic, and preserves the violent imagery.
- source_word: אֶל הַמִּפְתָּן
  chosen: on the threshold
  alternatives:
  - at the threshold
  - onto the threshold
  lexicon: HALOT
  rationale: The phrase indicates the location where the severed parts lay. 'On the threshold' is the most natural English expression for the resulting position.
- source_word: רַק דָּגוֹן נִשְׁאַר עָלָיו
  chosen: only the trunk of Dagon was left to him
  alternatives:
  - only Dagon was left to him
  - only Dagon himself remained upon him
  lexicon: HALOT
  rationale: This clause is idiomatic and difficult if rendered woodenly. In context, after the head and hands are removed, what remains is the main body of the idol. Many English versions render the sense as 'trunk.' This best communicates the Hebrew idiom while avoiding nonsense in English. 'To him' preserves עָלָיו as a residual idiomatic element, though the sense is that only the torso remained.
