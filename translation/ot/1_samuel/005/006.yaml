id: 1SA.5.6
reference: 1 Samuel 5:6
source:
  edition: WLC
  text: וַ/תִּכְבַּ֧ד יַד יְהוָ֛ה אֶל הָ/אַשְׁדּוֹדִ֖ים וַ/יְשִׁמֵּ֑/ם וַ/יַּ֤ךְ אֹתָ/ם֙ ב/עפלים אֶת אַשְׁדּ֖וֹד וְ/אֶת גְּבוּלֶֽי/הָ־־־־׃
translation:
  text: And the hand of Yahweh was heavy against the people of Ashdod, and he devastated them and struck them with tumors, Ashdod and its territory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with swellings'; traditionally, some render this more specifically as 'with hemorrhoids.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּכְבַּד יַד יְהוָה
  chosen: the hand of the LORD was heavy
  alternatives:
  - the hand of the LORD was severe
  - the hand of the LORD weighed heavily
  lexicon: HALOT
  rationale: A Hebrew idiom for oppressive or forceful action/judgment. Retaining 'hand' preserves the concrete imagery, and 'was heavy' keeps the metaphor rather than flattening it to an abstract paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל הָאַשְׁדּוֹדִים
  chosen: against the people of Ashdod
  alternatives:
  - against the Ashdodites
  - upon Ashdod
  lexicon: HALOT
  rationale: The form refers to the inhabitants of Ashdod rather than merely the city as a location. 'Against' fits אֶל here in the sense of hostile direction.
- source_word: וַיְשִׁמֵּם
  chosen: he devastated them
  alternatives:
  - he ravaged them
  - he desolated them
  lexicon: HALOT
  rationale: The verb conveys bringing ruin or devastation. 'Devastated' is strong, natural English and fits the plague/judgment context.
- source_word: וַיַּךְ אֹתָם
  chosen: struck them
  alternatives:
  - smote them
  - afflicted them
  lexicon: HALOT
  rationale: A common judgment verb meaning to strike/smite. 'Struck' is modern and sufficiently direct without archaic tone.
- source_word: בַּעֳפָלִים
  chosen: with tumors
  alternatives:
  - with swellings
  - with hemorrhoids
  lexicon: HALOT
  rationale: The term denotes bodily swellings/tumors. 'Tumors' is the broadest defensible rendering in the main text; 'hemorrhoids' is a traditional interpretive option but too specific for the main line without certainty, so it is preserved in a footnote.
- source_word: אֶת אַשְׁדּוֹד וְאֶת גְּבוּלֶיהָ
  chosen: Ashdod and its territory
  alternatives:
  - Ashdod and its borders
  - Ashdod and its surrounding region
  lexicon: HALOT
  rationale: 'This appositional phrase likely specifies the extent of the affliction: the city and its dependent area. ''Territory'' is clear modern English for גְּבוּלֶיהָ.'
