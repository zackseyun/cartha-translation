id: 1SA.5.9
reference: 1 Samuel 5:9
source:
  edition: WLC
  text: וַ/יְהִ֞י אַחֲרֵ֣י הֵסַ֣בּוּ אֹת֗/וֹ וַ/תְּהִ֨י יַד יְהוָ֤ה בָּ/עִיר֙ מְהוּמָה֙ גְּדוֹלָ֣ה מְאֹ֔ד וַ/יַּךְ֙ אֶת אַנְשֵׁ֣י הָ/עִ֔יר מִ/קָּטֹ֖ן וְ/עַד גָּד֑וֹל וַ/יִּשָּׂתְר֥וּ לָ/הֶ֖ם עפלים׀־׀־־׃
translation:
  text: And after they had moved it around, the hand of Yahweh was against the city, causing a very great panic; and he struck the men of the city, from small to great, and tumors broke out on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they broke out with tumors.' The Hebrew expression describes the appearance or eruption of bodily swellings.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵסַבּוּ אֹתוֹ
  chosen: they had moved it around
  alternatives:
  - they had brought it around
  - they had turned it about
  lexicon: HALOT
  rationale: The Hiphil of סבב with the object pronoun refers to relocating the ark from place to place. 'Moved it around' is natural modern English and preserves the iterative sense without over-specifying direction.
- source_word: יַד יְהוָה
  chosen: the hand of the LORD
  alternatives:
  - the LORD's hand
  lexicon: HALOT
  rationale: A standard Hebrew idiom for active divine power or judgment. Retaining 'hand' preserves the metaphor and theological force rather than flattening it to mere action.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH in line with DOCTRINE.md.
- source_word: מְהוּמָה גְּדוֹלָה מְאֹד
  chosen: a very great panic
  alternatives:
  - a very great turmoil
  - a very great confusion
  lexicon: HALOT
  rationale: מְהוּמָה denotes panic, confusion, or tumult, often in contexts of divinely sent terror. 'Panic' best fits the immediate context of affliction in the city and reads naturally in English.
- source_word: וַיַּךְ
  chosen: he struck
  alternatives:
  - he afflicted
  - he smote
  lexicon: HALOT
  rationale: The singular verb refers back to the LORD as the acting subject. 'Struck' preserves the concrete force of the Hebrew while remaining readable modern English.
- source_word: אַנְשֵׁי הָעִיר
  chosen: the men of the city
  alternatives:
  - the people of the city
  - the inhabitants of the city
  lexicon: HALOT
  rationale: The Hebrew specifically says 'men,' not the more general 'people.' Per the project's gender-accurate policy, the masculine term is retained unless context clearly demands a generic rendering.
- source_word: מִקָּטֹן וְעַד גָּדוֹל
  chosen: from small to great
  alternatives:
  - from the least to the greatest
  - both small and great
  lexicon: HALOT
  rationale: This idiom expresses the full range of those affected. 'From small to great' is concise and close to the Hebrew; the English leaves open whether age, status, or social rank is in view.
- source_word: וַיִּשָּׂתְרוּ לָהֶם עפלים
  chosen: tumors broke out on them
  alternatives:
  - they broke out with tumors
  - emerods appeared on them
  lexicon: HALOT
  rationale: The rare verb and noun together describe the eruption or appearance of bodily swellings. 'Tumors broke out on them' communicates the affliction clearly in modern English. 'Emerods' is archaic; 'hemorrhoids' is possible in context but too specific for the Hebrew here without forcing the medical identification.
