id: 1SA.23.7
reference: 1 Samuel 23:7
source:
  edition: WLC
  text: וַ/יֻּגַּ֣ד לְ/שָׁא֔וּל כִּי בָ֥א דָוִ֖ד קְעִילָ֑ה וַ/יֹּ֣אמֶר שָׁא֗וּל נִכַּ֨ר
    אֹת֤/וֹ אֱלֹהִים֙ בְּ/יָדִ֔/י כִּ֚י נִסְגַּ֣ר לָ/ב֔וֹא בְּ/עִ֖יר דְּלָתַ֥יִם וּ/בְרִֽיחַ־׃
translation:
  text: And it was reported to Saul that David had come to Keilah. So Saul said, “God
    has delivered him into my hand, for he has shut himself in by entering a city
    with double doors and a bar.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'God has handed him over into my hand.' Saul interprets David's position
      as divine delivery into his power.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a city of double doors and bar,' referring to a fortified city secured
      by paired gate-leaves and a crossbar.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֻּגַּד
  chosen: it was reported
  alternatives:
  - it was told
  - word was brought
  lexicon: HALOT
  rationale: Passive/Hophal form of נגד indicates information being made known to
    Saul; 'it was reported' is natural English and preserves the passive sense.
- source_word: בָא
  chosen: had come
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: בוא commonly means 'come/enter.' With destination Keilah, 'had come to
    Keilah' fits the narrative report naturally.
- source_word: נִכַּר אֹתוֹ אֱלֹהִים בְּיָדִי
  chosen: God has delivered him into my hand
  alternatives:
  - God has handed him over into my hand
  - God has sold him into my hand
  lexicon: HALOT
  rationale: The verb is from נכר in a sense attested as 'hand over/deliver up.' In
    context Saul interprets David's movement as divine delivery into his power. 'Delivered
    him into my hand' is idiomatic English and matches the military sense.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the noun refers to Israel's God in Saul's speech, not to 'gods'
    generally; singular English is required by context.
- source_word: בְּיָדִי
  chosen: into my hand
  alternatives:
  - into my power
  - into my grasp
  lexicon: HALOT
  rationale: The idiom 'into my hand' is common in Hebrew for being given into someone's
    power. Retaining 'hand' preserves the biblical idiom while remaining clear.
- source_word: נִסְגַּר
  chosen: he has shut himself in
  alternatives:
  - he is confined
  - he has been shut in
  lexicon: HALOT
  rationale: The Niphal can be understood reflexively/passively. In this context Saul
    means David has trapped himself by entering a fortified city. 'Has shut himself
    in' best conveys Saul's inference.
- source_word: לָבוֹא
  chosen: by entering
  alternatives:
  - to enter
  - when he entered
  lexicon: HALOT
  rationale: The infinitive explains the manner/cause of being shut in. 'By entering'
    makes the causal nuance explicit in smooth English.
- source_word: בְּעִיר דְּלָתַיִם וּבְרִיחַ
  chosen: a city with double doors and a bar
  alternatives:
  - a city with gates and bars
  - a city with two doors and a bolt
  lexicon: HALOT
  rationale: דלתים is the dual/plural form referring to paired city doors/gate-leaves;
    בריח is a bar/bolt securing them. 'Double doors and a bar' preserves the concrete
    fortified-city imagery more closely than the generalized 'gates and bars.'
