theological_decisions:
- issue: Saul's attribution of David's vulnerability to divine action
  chosen_reading: 'Render Saul''s statement straightforwardly as his own claim: ''God
    has delivered him into my hand,'' without implying narrator endorsement.'
  alternative_readings:
  - Paraphrase to distance the claim, e.g., 'Saul thought God had delivered him'
  rationale: The Hebrew presents Saul's speech directly. The translation should not
    insert interpretive distance into the main text, though readers may infer from
    context that Saul's conclusion is mistaken.
  doctrine_reference: Preserve theological tension rather than resolve it.
