id: 1SA.23.13
reference: 1 Samuel 23:13
source:
  edition: WLC
  text: וַ/יָּקָם֩ דָּוִ֨ד וַ/אֲנָשָׁ֜י/ו כְּ/שֵׁשׁ מֵא֣וֹת אִ֗ישׁ וַ/יֵּצְאוּ֙ מִ/קְּעִלָ֔ה
    וַ/יִּֽתְהַלְּכ֖וּ בַּ/אֲשֶׁ֣ר יִתְהַלָּ֑כוּ וּ/לְ/שָׁא֣וּל הֻגַּ֗ד כִּֽי נִמְלַ֤ט
    דָּוִד֙ מִ/קְּעִילָ֔ה וַ/יֶּחְדַּ֖ל לָ/צֵֽאת־־׃
translation:
  text: Then David arose with his men, about six hundred men, and they went out from
    Keilah and moved about wherever they could go. And it was told to Saul that David
    had escaped from Keilah, so he stopped going out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and wandered wherever they could wander' / 'and went about wherever
      they went.' The Hebrew idiom emphasizes continual movement from place to place.
    reason: lexical_alternative
  - marker: b
    text: '''He stopped going out'' likely means Saul stopped going out in pursuit
      of David after learning David had escaped Keilah.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּקָם
  chosen: Then David arose
  alternatives:
  - Then David got up
  - Then David set out
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום commonly means 'arose/got up.' 'Arose' preserves
    the narrative register and the transition to action without over-interpreting
    it as immediate departure.
- source_word: וַאֲנָשָׁיו
  chosen: with his men
  alternatives:
  - and his men
  lexicon: HALOT
  rationale: The conjunction plus noun with pronominal suffix is naturally rendered
    with David as accompanying subject. 'Men' is gender-accurate and contextually
    refers to David's fighting band, not a mixed generic group.
- source_word: כְּשֵׁשׁ מֵאוֹת אִישׁ
  chosen: about six hundred men
  alternatives:
  - some six hundred men
  - approximately six hundred men
  lexicon: HALOT
  rationale: כְּ with a number often signals approximation, so 'about' is preferable
    to a bare 'six hundred.' אִישׁ here functions distributively/counting persons,
    best rendered 'men' in this military context.
- source_word: וַיֵּצְאוּ מִקְּעִלָה
  chosen: and they went out from Keilah
  alternatives:
  - and they left Keilah
  - and they departed from Keilah
  lexicon: HALOT
  rationale: יצא literally means 'go out.' 'Went out from Keilah' keeps the spatial
    imagery while remaining natural English.
- source_word: וַיִּתְהַלְּכוּ בַּאֲשֶׁר יִתְהַלָּכוּ
  chosen: and moved about wherever they could go
  alternatives:
  - and went about wherever they went
  - and wandered wherever they could wander
  - and moved from place to place wherever they could
  lexicon: HALOT
  rationale: The hithpael of הלך here conveys ongoing movement from place to place.
    The idiom בַּאֲשֶׁר יִתְהַלָּכוּ is awkward if rendered woodenly; 'wherever they
    could go' captures the sense of unsettled roaming under pressure without implying
    aimlessness beyond the text.
- source_word: וּלְשָׁאוּל הֻגַּד
  chosen: And it was told to Saul
  alternatives:
  - And Saul was told
  - And word was reported to Saul
  lexicon: HALOT
  rationale: 'The hophal of נגד is passive/causative passive: ''it was told/reported.''
    The impersonal passive is retained to mirror the Hebrew narrative style.'
- source_word: כִּי נִמְלַט דָּוִד מִקְּעִילָה
  chosen: that David had escaped from Keilah
  alternatives:
  - that David had slipped away from Keilah
  - that David had gotten away from Keilah
  lexicon: HALOT
  rationale: נמלט means 'escape, slip away, get away.' 'Escaped' best fits the pursuit
    context and explains Saul's subsequent cessation.
- source_word: וַיֶּחְדַּל לָצֵאת
  chosen: so he stopped going out
  alternatives:
  - so he refrained from going out
  - so he gave up the expedition
  - so he stopped marching out
  lexicon: HALOT
  rationale: חדל + infinitive means 'cease/stop doing.' 'Going out' likely refers
    to going out on the campaign against David; the translation keeps the Hebrew wording
    while remaining intelligible.
