id: 1SA.23.3
reference: 1 Samuel 23:3
source:
  edition: WLC
  text: וַ/יֹּ֨אמְר֜וּ אַנְשֵׁ֤י דָוִד֙ אֵלָ֔י/ו הִנֵּ֨ה אֲנַ֥חְנוּ פֹ֛ה בִּֽ/יהוּדָ֖ה
    יְרֵאִ֑ים וְ/אַף֙ כִּֽי נֵלֵ֣ךְ קְעִלָ֔ה אֶל מַֽעַרְכ֖וֹת פְּלִשְׁתִּֽים־־׃ס
translation:
  text: But David’s men said to him, “Look, we are afraid here in Judah; how much
    more, then, if we go to Keilah against the battle lines of the Philistines?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “let alone if we go to Keilah against the ranks of the Philistines.”
      The Hebrew idiom expresses an argument from lesser to greater.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: But ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the discourse
    context because the men respond hesitantly to the proposed action, marking contrast
    with the prior instruction more clearly than a bare 'and.'
- source_word: אַנְשֵׁי דָוִד
  chosen: David’s men
  alternatives:
  - the men of David
  lexicon: HALOT
  rationale: Construct phrase rendered idiomatically in natural English while preserving
    possession and group identity.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Straightforward pronominal prepositional phrase referring to David.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces the men's emphatic appeal. 'Look' preserves the deictic force
    in readable modern English; 'behold' is too archaic.
- source_word: אֲנַחְנוּ פֹה בִּיהוּדָה
  chosen: we are afraid here in Judah
  alternatives:
  - we are here in Judah, afraid
  lexicon: HALOT
  rationale: 'The adverbial phrase ''here in Judah'' is kept, but reordered slightly
    for natural English flow. The location is important to the argument: if they are
    fearful even in Judah, the danger will be greater at Keilah.'
- source_word: יְרֵאִים
  chosen: afraid
  alternatives:
  - fearful
  lexicon: HALOT
  rationale: Predicate adjective from ירא in a situational sense of fear. 'Afraid'
    is the most natural modern equivalent here.
- source_word: וְאַף כִּי
  chosen: how much more, then, if
  alternatives:
  - let alone if
  - and indeed if
  - especially if
  lexicon: HALOT
  rationale: 'This idiom heightens the argument from lesser to greater: if they are
    afraid in Judah, then all the more at Keilah. ''How much more, then, if'' makes
    the logic explicit. ''Let alone'' is possible but can sound elliptical in English.'
- source_word: נֵלֵךְ קְעִלָה
  chosen: we go to Keilah
  alternatives:
  - we go toward Keilah
  lexicon: HALOT
  rationale: הלך with a place name indicates movement to a destination. 'To Keilah'
    is idiomatic and sufficient.
- source_word: אֶל מַעַרְכוֹת פְּלִשְׁתִּים
  chosen: against the battle lines of the Philistines
  alternatives:
  - to the ranks of the Philistines
  - against the armies of the Philistines
  lexicon: HALOT
  rationale: מַעַרְכוֹת commonly refers to battle lines, battle array, or ranks. 'Against
    the battle lines' best fits the military context and the implied confrontation.
    'Armies' is broader and less precise.
