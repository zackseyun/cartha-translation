id: 1SA.23.28
reference: 1 Samuel 23:28
source:
  edition: WLC
  text: וַ/יָּ֣שָׁב שָׁא֗וּל מִ/רְדֹף֙ אַחֲרֵ֣י דָוִ֔ד וַ/יֵּ֖לֶךְ לִ/קְרַ֣את פְּלִשְׁתִּ֑ים
    עַל כֵּ֗ן קָֽרְאוּ֙ לַ/מָּק֣וֹם הַ/ה֔וּא סֶ֖לַע הַֽמַּחְלְקֽוֹת־׃
translation:
  text: So Saul returned from pursuing David and went to meet the Philistines. Therefore
    that place was called the Rock of Division.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Rock of Separations' or 'the Rock of Parting.' The place name likely
      refers to the breaking off of Saul's pursuit of David.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: HALOT
  rationale: The verb שוב in this narrative context indicates Saul's withdrawal from
    his current course of action. 'Returned' is natural English and fits the following
    phrase 'from pursuing David.'
- source_word: מִרְדֹף אַחֲרֵי
  chosen: from pursuing
  alternatives:
  - from chasing
  - from following after
  lexicon: HALOT
  rationale: The infinitive construct with מן expresses cessation or turning away
    from an activity. 'Pursuing' best captures רדף in a military/narrative setting
    without sounding overly colloquial.
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - to confront
  - to encounter
  lexicon: HALOT
  rationale: לקראת can mean going to meet someone, whether neutrally or for confrontation.
    Here Saul is responding to the Philistine threat, so 'to meet' preserves the Hebrew's
    breadth without over-specifying the manner.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration for the people group in English Bible usage.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - That is why
  lexicon: HALOT
  rationale: This formula introduces the explanation for the place name. 'Therefore'
    is concise and suitably formal while remaining readable.
- source_word: קָרְאוּ לַמָּקוֹם הַהוּא
  chosen: that place was called
  alternatives:
  - they called that place
  - people called that place
  lexicon: HALOT
  rationale: Hebrew often uses an indefinite plural for unnamed agents. The passive
    English rendering is idiomatic and avoids supplying an unnecessary subject.
- source_word: סֶלַע
  chosen: Rock
  alternatives:
  - crag
  - cliff
  lexicon: HALOT
  rationale: סלע denotes a rock formation or crag. 'Rock' is the most straightforward
    rendering in a place name and preserves the conventional force of the toponym.
- source_word: הַמַּחְלְקוֹת
  chosen: Division
  alternatives:
  - Separations
  - Partings
  - Escape
  lexicon: HALOT
  rationale: From חלק in a nominal form suggesting division or separation. In context
    the place commemorates the separation between Saul and David when Saul broke off
    pursuit. 'Division' is clear and fits the explanatory note. Because the exact
    nuance of the place name is somewhat uncertain, alternatives are preserved in
    a footnote.
