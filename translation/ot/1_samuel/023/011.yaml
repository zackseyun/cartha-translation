id: 1SA.23.11
reference: 1 Samuel 23:11
source:
  edition: WLC
  text: הֲ/יַסְגִּרֻ֣/נִי בַעֲלֵי֩ קְעִילָ֨ה בְ/יָד֜/וֹ הֲ/יֵרֵ֣ד שָׁא֗וּל כַּֽ/אֲשֶׁר֙ שָׁמַ֣ע עַבְדֶּ֔/ךָ יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל הַגֶּד נָ֖א לְ/עַבְדֶּ֑/ךָ וַ/יֹּ֥אמֶר יְהוָ֖ה יֵרֵֽד־ס׃
translation:
  text: Will the men of Keilah hand me over into his hand? Will Saul come down, as your servant has heard? O Yahweh, God of Israel, please tell your servant.” And Yahweh said, “He will come down.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''into his hand,'' an idiom meaning into Saul''s power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַסְגִּרֻנִי
  chosen: hand me over
  alternatives:
  - deliver me up
  - surrender me
  lexicon: HALOT
  rationale: The Hiphil of סגר here means to give someone over into another's power. 'Hand me over' is idiomatic modern English and preserves the hostile transfer implied by the verb.
- source_word: בַעֲלֵי קְעִילָה
  chosen: the men of Keilah
  alternatives:
  - the lords/masters of Keilah
  - the citizens of Keilah
  lexicon: HALOT
  rationale: Although בעלי can literally mean 'owners' or 'lords,' in this civic context it refers to the leading men/inhabitants of the town. 'The men of Keilah' is the most natural and established contextual sense.
- source_word: בְיָדוֹ
  chosen: into his hand
  alternatives:
  - to him
  - into his power
  lexicon: HALOT
  rationale: Retaining 'hand' preserves the Hebrew idiom of power/control while remaining intelligible in English. The pronoun refers to Saul.
- source_word: יֵרֵד
  chosen: come down
  alternatives:
  - go down
  - descend
  lexicon: HALOT
  rationale: The verb literally means 'go down/descend,' but from David's perspective asking about Saul's movement toward Keilah, 'come down' is natural English. The same rendering is kept in both question and answer for consistency.
- source_word: כַּאֲשֶׁר שָׁמַע עַבְדֶּךָ
  chosen: as your servant has heard
  alternatives:
  - just as your servant has heard
  - according to what your servant has heard
  lexicon: HALOT
  rationale: This clause appeals to the report David has received. 'As your servant has heard' is concise and faithful to the comparative particle plus perfect verb.
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: While עבד can denote slave or servant, in prayer language before God it is a conventional expression of humble self-reference rather than emphasizing chattel status. 'Your servant' best fits the register here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַגֶּד נָא
  chosen: please tell
  alternatives:
  - declare, please
  - make known, please
  lexicon: HALOT
  rationale: The imperative of נגד with particle נא is a polite urgent request for disclosure. 'Please tell' is natural modern English without loss of force.
- source_word: וַיֹּאמֶר יְהוָה
  chosen: And the LORD said
  alternatives:
  - Then the LORD said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing the divine response. 'And' preserves Hebrew narrative flow.
