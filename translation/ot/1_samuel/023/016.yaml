theological_decisions:
- issue: Rendering the divine term אֱלֹהִים without the article in this context
  chosen_reading: God
  alternative_readings:
  - the LORD
  rationale: The Hebrew text reads אֱלֹהִים, not the divine name YHWH. Therefore it
    should be translated 'God' rather than importing the covenant name 'the LORD.'
    This follows original-language primacy and avoids harmonization.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    contested term table for יְהוָה'
