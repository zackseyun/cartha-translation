id: 1SA.23.16
reference: 1 Samuel 23:16
source:
  edition: WLC
  text: וַ/יָּ֨קָם֙ יְהוֹנָתָ֣ן בֶּן שָׁא֔וּל וַ/יֵּ֥לֶךְ אֶל דָּוִ֖ד חֹ֑רְשָׁה וַ/יְחַזֵּ֥ק
    אֶת יָד֖/וֹ בֵּ/אלֹהִֽים־־־׃
translation:
  text: Then Jonathan son of Saul arose and went to David at Horesh, and strengthened
    his hand in God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'encouraged him in God'; literally, 'strengthened his hand in God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - set out
  - got up
  lexicon: HALOT
  rationale: The verb קום in wayyiqtol commonly marks the beginning of purposeful
    action. 'Arose' preserves the narrative sequence and formal flavor without over-paraphrasing.
- source_word: יְהוֹנָתָן בֶּן שָׁאוּל
  chosen: Jonathan son of Saul
  alternatives:
  - Jonathan, Saul's son
  rationale: Personal names are transliterated, and the filial construction is rendered
    straightforwardly. 'Son of Saul' preserves the Hebrew apposition and keeps the
    political/familial tension in view.
- source_word: וַיֵּלֶךְ אֶל
  chosen: went to
  alternatives:
  - came to
  - went toward
  lexicon: HALOT
  rationale: הלך אל is most naturally 'went to.' 'Came to' would shift perspective;
    'went toward' is weaker than the context, which implies arrival.
- source_word: חֹרְשָׁה
  chosen: Horesh
  alternatives:
  - the wooded place
  - the forest
  lexicon: HALOT
  rationale: Given the morphology as a proper noun and the narrative setting, this
    is best taken as the place name Horesh rather than translated as a common noun.
- source_word: וַיְחַזֵּק
  chosen: strengthened
  alternatives:
  - encouraged
  - made strong
  lexicon: HALOT
  rationale: חזק in the piel means to strengthen or make strong. 'Strengthened' is
    the most direct rendering; 'encouraged' captures effect but is more interpretive.
- source_word: אֶת יָדוֹ
  chosen: his hand
  alternatives:
  - him
  - his resolve
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'his hand.' Retaining 'his hand' preserves
    the source imagery and avoids flattening the expression into a paraphrase. The
    idiom conveys strengthening David's resolve or courage.
- source_word: בֵּאלֹהִים
  chosen: in God
  alternatives:
  - through God
  - by God
  lexicon: HALOT
  rationale: The preposition ב here is best rendered 'in,' indicating the sphere or
    ground in which David was strengthened. 'Through God' or 'by God' are possible
    interpretive expansions but less textually direct.
