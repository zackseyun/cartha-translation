id: 1SA.23.1
reference: 1 Samuel 23:1
source:
  edition: WLC
  text: וַ/יַּגִּ֥דוּ לְ/דָוִ֖ד לֵ/אמֹ֑ר הִנֵּ֤ה פְלִשְׁתִּים֙ נִלְחָמִ֣ים בִּ/קְעִילָ֔ה
    וְ/הֵ֖מָּה שֹׁסִ֥ים אֶת הַ/גֳּרָנֽוֹת־׃
translation:
  text: Then they told David, saying, “Look, the Philistines are fighting against
    Keilah, and they are plundering the threshing floors.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “are fighting in/at Keilah.” The Hebrew preposition is literally “in,”
      but in this military context it likely means the Philistines are attacking the
      city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגִּדוּ
  chosen: Then they told
  alternatives:
  - And they told
  - Then it was reported
  lexicon: HALOT
  rationale: Hiphil wayyiqtol of נגד introduces the next narrative event. 'Then they
    told' preserves the plural subject and the sequential force of the waw-consecutive
    in readable English.
- source_word: לְדָוִד
  chosen: David
  lexicon: HALOT
  rationale: Indirect object marked by ל; rendered naturally in English as the recipient
    of the report.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - that
  lexicon: HALOT
  rationale: Standard quotative infinitive construct introducing direct speech. 'Saying'
    keeps the Hebrew discourse structure without awkwardness.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention to urgent news. 'Look' is natural
    modern English and preserves the immediacy better than archaic 'Behold.'
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Definite reference to the known people group; English idiom normally
    includes the article for ethnonyms in this kind of military report.
- source_word: נִלְחָמִים
  chosen: are fighting against
  alternatives:
  - are attacking
  - are at war with
  lexicon: HALOT
  rationale: Niphal participle of לחם in military sense. 'Are fighting against' is
    broad enough to preserve the Hebrew without over-specifying the exact tactical
    action.
- source_word: בִּקְעִילָה
  chosen: against Keilah
  alternatives:
  - in Keilah
  - at Keilah
  lexicon: HALOT
  rationale: Although the preposition is ב ('in/at'), with לחם it can mark the party
    or place under attack. Here the sense is that Keilah is being attacked, not merely
    that fighting is occurring there. 'Against Keilah' best conveys the likely force
    in context, since David later goes to save the city.
- source_word: וְהֵמָּה
  chosen: and they
  alternatives:
  - while they
  - and as for them, they
  lexicon: HALOT
  rationale: Independent pronoun adds emphasis to the subject. English usually does
    not mark the emphasis strongly here, but 'and they' preserves the continuation
    and subject clarity.
- source_word: שֹׁסִים
  chosen: are plundering
  alternatives:
  - are raiding
  - are robbing
  lexicon: HALOT
  rationale: Participle of שסס/שסה in the sense of despoiling or pillaging. 'Plundering'
    fits the wartime agricultural context and the direct object that follows.
- source_word: אֶת הַגֳּרָנוֹת
  chosen: the threshing floors
  alternatives:
  - the grain heaps
  - the threshing places
  lexicon: HALOT
  rationale: גֹּרֶן normally denotes a threshing floor/place. In context the Philistines
    are seizing produce at harvest time, but the Hebrew names the location/installation
    itself. 'Threshing floors' preserves the concrete wording while allowing the implied
    grain-plunder context to be understood.
