id: 1SA.23.27
reference: 1 Samuel 23:27
source:
  edition: WLC
  text: וּ/מַלְאָ֣ךְ בָּ֔א אֶל שָׁא֖וּל לֵ/אמֹ֑ר מַהֲרָ֣/ה וְ/לֵ֔כָ/ה כִּֽי פָשְׁט֥וּ
    פְלִשְׁתִּ֖ים עַל הָ/אָֽרֶץ־־־׃
translation:
  text: But a messenger came to Saul, saying, “Hurry and come, for the Philistines
    have made a raid against the land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Hurry and go,” more formally reflecting the Hebrew verb.
    reason: lexical_alternative
  - marker: b
    text: Or “the Philistines have invaded the land.” The Hebrew verb can denote a
      raiding incursion or hostile advance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מַלְאָךְ
  chosen: But a messenger
  alternatives:
  - And a messenger
  - an envoy
  lexicon: HALOT
  rationale: מַלְאָךְ commonly means 'messenger' in human contexts. The prefixed conjunction
    is rendered 'But' rather than 'And' to reflect the narrative interruption and
    contrast with Saul's pursuit in the immediate context.
- source_word: בָּא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Simple qatal of בוא is naturally rendered 'came' in narrative sequence.
- source_word: אֶל שָׁאוּל
  chosen: to Saul
  alternatives:
  - to Shaul
  lexicon: HALOT
  rationale: Standard directional use of אֶל with the conventional English transliteration
    'Saul'.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - with the message
  lexicon: HALOT
  rationale: Infinitive construct introducing direct speech is idiomatically rendered
    'saying'.
- source_word: מַהֲרָה
  chosen: Hurry
  alternatives:
  - Quickly
  - Make haste
  lexicon: HALOT
  rationale: Imperative/adverbial form from מהר calls for urgent action. 'Hurry' is
    clear modern English without archaic tone.
- source_word: וְלֵכָה
  chosen: and come
  alternatives:
  - and go
  - and leave
  lexicon: HALOT
  rationale: הלך literally means 'go,' but in this context the messenger is summoning
    Saul away from his current location back toward the threatened area. English idiom
    from the speaker's perspective is better captured by 'come.' This is a context-driven
    optimal-equivalence choice; the more formal alternative 'go' is preserved in a
    footnote.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the urgent command.
- source_word: פָשְׁטוּ
  chosen: have made a raid
  alternatives:
  - have invaded
  - have spread out
  - have raided
  lexicon: HALOT
  rationale: פשט in military contexts often denotes making a raid or stripping/plundering
    in an incursion. 'Have made a raid' captures the hostile military action without
    overstating it as full conquest.
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard rendering of the people group name.
- source_word: עַל הָאָרֶץ
  chosen: against the land
  alternatives:
  - upon the land
  - into the land
  - against the country
  lexicon: HALOT
  rationale: עַל with פשט in a military setting conveys hostile movement against a
    territory. 'The land' is the most direct rendering of הָאָרֶץ here, likely referring
    to the territory under Saul's concern.
