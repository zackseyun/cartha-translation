id: 1SA.23.9
reference: 1 Samuel 23:9
source:
  edition: WLC
  text: וַ/יֵּ֣דַע דָּוִ֔ד כִּ֣י עָלָ֔י/ו שָׁא֖וּל מַחֲרִ֣ישׁ הָ/רָעָ֑ה וַ/יֹּ֨אמֶר֙
    אֶל אֶבְיָתָ֣ר הַ/כֹּהֵ֔ן הַגִּ֖ישָׁ/ה הָ/אֵפֽוֹד־׃ס
translation:
  text: When David learned that Saul was secretly plotting harm against him, he said
    to Abiathar the priest, “Bring the ephod here.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “was devising evil against him.”
    reason: lexical_alternative
  - marker: b
    text: The ephod was a priestly object associated with seeking guidance from God
      in this narrative context.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּדַע
  chosen: learned
  alternatives:
  - knew
  - became aware
  lexicon: HALOT
  rationale: The wayyiqtol of ידע can be rendered simply 'knew,' but in narrative
    English 'learned' better conveys coming to know at this point in the story.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what David learned, so 'that' is the most natural
    English complementizer.
- source_word: עָלָיו
  chosen: against him
  alternatives:
  - concerning him
  - upon him
  lexicon: HALOT
  rationale: With hostile intent and the following phrase about harm, על is best expressed
    idiomatically as 'against him.'
- source_word: מַחֲרִישׁ
  chosen: was secretly plotting
  alternatives:
  - was devising secretly
  - was planning
  - was acting secretly
  lexicon: HALOT
  rationale: The Hiphil participle of חרש in this context carries the sense of devising
    or plotting, often with secrecy. 'Was secretly plotting' captures both the conspiratorial
    nuance and the participial ongoing aspect.
- source_word: הָרָעָה
  chosen: harm
  alternatives:
  - evil
  - disaster
  lexicon: HALOT
  rationale: In this immediate context Saul intends injury to David, so 'harm' is
    clearer and more idiomatic than the broader 'evil,' while still preserving the
    hostile sense.
- source_word: אֶל אֶבְיָתָר הַכֹּהֵן
  chosen: to Abiathar the priest
  alternatives:
  - to Abiathar, the priest
  lexicon: HALOT
  rationale: Straightforward vocative/reporting construction identifying Abiathar
    by office.
- source_word: הַגִּישָׁה
  chosen: Bring ... here
  alternatives:
  - Bring near
  - Present
  lexicon: HALOT
  rationale: The Hiphil imperative of נגש means to bring near/present. In direct speech
    to a nearby attendant, 'Bring ... here' is natural modern English and preserves
    the directive force.
- source_word: הָאֵפוֹד
  chosen: the ephod
  lexicon: HALOT
  rationale: Retained as 'ephod,' the established transliteration for the priestly
    object/garment associated here with seeking divine guidance. Translating it more
    generically would lose specificity.
