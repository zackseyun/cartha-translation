theological_decisions:
- issue: Nature of Saul's intent in מַחֲרִישׁ הָרָעָה
  chosen_reading: Saul was secretly plotting harm against David
  alternative_readings:
  - Saul was devising evil against David
  - Saul was planning disaster for David
  rationale: The Hebrew expression denotes hostile scheming with a secrecy nuance.
    'Harm' avoids over-theologizing 'evil' while preserving the concrete threat in
    context.
