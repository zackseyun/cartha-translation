id: 1SA.23.15
reference: 1 Samuel 23:15
source:
  edition: WLC
  text: וַ/יַּ֣רְא דָוִ֔ד כִּֽי יָצָ֥א שָׁא֖וּל לְ/בַקֵּ֣שׁ אֶת נַפְשׁ֑/וֹ וְ/דָוִ֥ד
    בְּ/מִדְבַּר זִ֖יף בַּ/חֹֽרְשָׁה־־־׃ס
translation:
  text: David saw that Saul had come out to seek his life, while David was in the
    wilderness of Ziph at Horesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the forest' or 'in the wooded place.' The Hebrew may be understood
      as a common noun, but here it is likely a place name, Horesh.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - realized
  - learned
  lexicon: HALOT
  rationale: The verb ראה literally means 'saw,' but can extend to perception or realization.
    'Saw' preserves the Hebrew wording while still working idiomatically in English
    for recognizing Saul's action.
- source_word: כִּי
  chosen: that
  alternatives:
  - when
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what David perceived: ''that Saul
    had come out.'' ''That'' best reflects the clause function.'
- source_word: יָצָא
  chosen: had come out
  alternatives:
  - went out
  - set out
  lexicon: HALOT
  rationale: The verb יצא means 'go out/come out.' In context Saul has gone out in
    pursuit of David. 'Had come out' fits the English narrative flow after 'David
    saw that' and conveys active mobilization.
- source_word: לְבַקֵּשׁ אֶת נַפְשׁוֹ
  chosen: to seek his life
  alternatives:
  - to seek him
  - to kill him
  lexicon: HALOT
  rationale: The idiom 'seek the life/soul of' means to seek someone's life, often
    with intent to kill. 'Seek his life' preserves the Hebrew idiom and its threat
    without over-paraphrasing to the interpretive 'kill him.'
- source_word: בְּמִדְבַּר זִיף
  chosen: in the wilderness of Ziph
  alternatives:
  - in the desert of Ziph
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness or steppe. 'Wilderness' is the standard
    and suitably broad rendering in this narrative setting.
- source_word: בַּחֹרְשָׁה
  chosen: at Horesh
  alternatives:
  - in the wooded place
  - in the forest
  lexicon: HALOT
  rationale: Though חֹרְשָׁה can mean wooded area/forest, here the article plus form
    functions as a place name in context, traditionally understood as Horesh. Rendering
    it as a toponym avoids flattening a likely proper location into a generic landscape
    term.
- source_word: וְדָוִד
  chosen: while David was
  alternatives:
  - and David was
  - now David was
  lexicon: HALOT
  rationale: The conjunction links a circumstantial clause giving David's location.
    'While David was' makes the relationship clear in natural English without losing
    the Hebrew coordination.
