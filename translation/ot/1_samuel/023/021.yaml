id: 1SA.23.21
reference: 1 Samuel 23:21
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שָׁא֔וּל בְּרוּכִ֥ים אַתֶּ֖ם לַֽ/יהוָ֑ה כִּ֥י חֲמַלְתֶּ֖ם עָלָֽ/י׃
translation:
  text: Saul said, “May you be blessed by the LORD, because you have had compassion
    on me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Blessed are you of the LORD.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “you have had pity/compassion on me”; the verb can also carry the
      sense of sparing in some contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר in Hebrew prose; English idiom normally
    omits the conjunction in mainline narration.
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: בְּרוּכִים אַתֶּם
  chosen: May you be blessed
  alternatives:
  - Blessed are you
  - You are blessed
  lexicon: HALOT
  rationale: Predicate adjective with independent pronoun functions as a blessing
    formula. 'May you be blessed' best captures the performative/pronouncement force
    in natural English, rather than a mere statement of condition.
- source_word: לַיהוָה
  chosen: by the LORD
  alternatives:
  - of the LORD
  - to the LORD
  lexicon: HALOT
  rationale: In blessing formulas, ל with YHWH commonly marks relation/source, and
    English 'by the LORD' naturally expresses the one from whom the blessing comes.
    Per doctrine, יהוה is rendered 'the LORD,' not 'Yahweh' in the main text.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for Saul's blessing statement; 'because' is clearer
    in contemporary English than 'for' while preserving the causal sense.
- source_word: חֲמַלְתֶּם
  chosen: have had compassion
  alternatives:
  - have spared
  - have shown pity
  - have had mercy
  lexicon: HALOT
  rationale: חמל denotes pity/compassion, sometimes expressed in sparing action. Here
    the object is 'on me,' so the emotional-relational sense 'have had compassion'
    fits better than 'have spared,' which would imply direct power over Saul's life.
- source_word: עָלַי
  chosen: on me
  alternatives:
  - for me
  - toward me
  lexicon: HALOT
  rationale: The preposition על after חמל idiomatically yields 'have compassion on.'
    This is the most natural English rendering of the Hebrew construction.
