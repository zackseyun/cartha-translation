id: 1SA.23.20
reference: 1 Samuel 23:20
source:
  edition: WLC
  text: וְ֠/עַתָּה לְ/כָל אַוַּ֨ת נַפְשְׁ/ךָ֥ הַ/מֶּ֛לֶךְ לָ/רֶ֖דֶת רֵ֑ד וְ/לָ֥/נוּ
    הַסְגִּיר֖/וֹ בְּ/יַ֥ד הַ/מֶּֽלֶךְ־׃
translation:
  text: Now then, O king, come down according to all the desire of your soul to come
    down, and it is for us to hand him over into the king’s hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the desire of your soul,' an idiom meaning deep desire or strong
      wish; compare 'your heart’s desire.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew repeats the verb ''come down'' (infinitive + imperative) for emphasis:
      ''to come down, come down.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now then
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Introduces an immediate transition and appeal. 'Now then' captures both
    the conjunctive and the discourse-marking force in natural English.
- source_word: לְכָל
  chosen: according to all
  alternatives:
  - with all
  - for all
  lexicon: HALOT
  rationale: 'The preposition with כָּל here modifies the following noun phrase idiomatically:
    ''according to all the desire...'' rather than a wooden ''to all.'' This best
    reflects the sense of full accordance with the king''s wish.'
- source_word: אַוַּת נַפְשְׁךָ
  chosen: the desire of your soul
  alternatives:
  - your heart's desire
  - your every desire
  lexicon: HALOT
  rationale: Literally denotes desire/craving of the inner self. 'The desire of your
    soul' preserves the Hebrew imagery; alternatives are smoother but less transparent
    to the source.
- source_word: הַמֶּלֶךְ
  chosen: O king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: Though formally definite, in direct address Hebrew commonly uses the
    noun with article vocatively. English idiom requires 'O king' or simply 'king';
    'O king' preserves the address clearly.
- source_word: לָרֶדֶת רֵד
  chosen: come down ... to come down
  alternatives:
  - come down
  - descend
  lexicon: HALOT
  rationale: The infinitive plus imperative intensifies the request. Main text preserves
    the repetition by rendering both elements, while keeping idiomatic English. 'Descend'
    is too formal for the narrative register.
- source_word: וְלָנוּ
  chosen: and it is for us
  alternatives:
  - and for us
  - and our part is
  lexicon: HALOT
  rationale: 'The prefixed pronoun marks responsibility or assigned role. ''It is
    for us'' brings out the sense: the task belongs to us.'
- source_word: הַסְגִּירוֹ
  chosen: to hand him over
  alternatives:
  - to deliver him up
  - to surrender him
  lexicon: HALOT
  rationale: The Hiphil of סגר here means to give someone over into another's power.
    'Hand him over' is clear modern English and fits the hostile context.
- source_word: בְּיַד הַמֶּלֶךְ
  chosen: into the king’s hand
  alternatives:
  - into the hand of the king
  - to the king
  lexicon: HALOT
  rationale: '''Into the hand'' is a common Hebrew idiom for transfer into someone''s
    power. Preserving ''hand'' retains the idiom''s force better than flattening to
    merely ''to the king.'''
