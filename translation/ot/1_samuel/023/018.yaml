id: 1SA.23.18
reference: 1 Samuel 23:18
source:
  edition: WLC
  text: וַ/יִּכְרְת֧וּ שְׁנֵי/הֶ֛ם בְּרִ֖ית לִ/פְנֵ֣י יְהוָ֑ה וַ/יֵּ֤שֶׁב דָּוִד֙
    בַּ/חֹ֔רְשָׁה וִ/יהוֹנָתָ֖ן הָלַ֥ךְ לְ/בֵיתֽ/וֹ׃ס
translation:
  text: And the two of them made a covenant before the LORD. Then David remained in
    the wooded area, and Jonathan went to his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'cut a covenant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in Horesh'; the Hebrew may be understood either as a place name or as
      'the wooded area/forest.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכְרְתוּ
  chosen: made
  alternatives:
  - cut
  lexicon: HALOT
  rationale: The idiom כרת ברית is literally 'cut a covenant,' but standard English
    expresses the covenant-making act as 'made a covenant.' The more formal 'cut'
    is preserved as an alternative because it reflects the Hebrew idiom.
- source_word: שְׁנֵיהֶם
  chosen: the two of them
  alternatives:
  - both of them
  lexicon: HALOT
  rationale: This explicitly renders the dual sense and keeps the focus on David and
    Jonathan together.
- source_word: בְּרִית
  chosen: covenant
  alternatives:
  - treaty
  - agreement
  lexicon: HALOT
  rationale: '''Covenant'' best preserves the relational and solemn force of ברית
    in the David-Jonathan context; ''agreement'' would be too weak, and ''treaty''
    too political.'
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: This is the most natural concise rendering of the phrase while preserving
    its solemn, covenantal setting. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving
    reverential convention and broad English Bible recognizability.
- source_word: וַיֵּשֶׁב
  chosen: remained
  alternatives:
  - stayed
  - dwelt
  - sat
  lexicon: HALOT
  rationale: In context the verb indicates continued residence or staying in place,
    not literal sitting. 'Remained' is clear and idiomatic.
- source_word: בַּחֹרְשָׁה
  chosen: in the wooded area
  alternatives:
  - in Horesh
  - in the forest
  lexicon: HALOT
  rationale: The noun חֹרֶשׁ commonly denotes woodland or thicket. Since the form
    here can be understood as a common noun with article, 'the wooded area' best reflects
    the Hebrew as given. 'In Horesh' is preserved as an alternative because some take
    it as a place name from the surrounding context.
- source_word: הָלַךְ לְבֵיתוֹ
  chosen: went to his house
  alternatives:
  - went home
  lexicon: HALOT
  rationale: This is a straightforward rendering of the Hebrew. 'Went home' is idiomatic
    English, but 'went to his house' stays closer to the source wording.
