id: 1SA.23.2
reference: 1 Samuel 23:2
source:
  edition: WLC
  text: וַ/יִּשְׁאַ֨ל דָּוִ֤ד בַּֽ/יהוָה֙ לֵ/אמֹ֔ר הַ/אֵלֵ֣ךְ וְ/הִכֵּ֔יתִי בַּ/פְּלִשְׁתִּ֖ים הָ/אֵ֑לֶּה וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל דָּוִ֗ד לֵ֚ךְ וְ/הִכִּ֣יתָ בַ/פְּלִשְׁתִּ֔ים וְ/הוֹשַׁעְתָּ֖ אֶת קְעִילָֽהס־־׃
translation:
  text: So David inquired of Yahweh, saying, “Shall I go and strike these Philistines?” And Yahweh said to David, “Go and strike the Philistines, and save Keilah.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliver Keilah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַל
  chosen: inquired
  alternatives:
  - asked
  - consulted
  lexicon: HALOT
  rationale: The verb שׁאל with בַּיהוָה denotes seeking guidance from the LORD, not merely asking a casual question. 'Inquired' preserves the formal sense of consultation while remaining natural English.
- source_word: בַּיהוָה / יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the LORD,' following established reverential convention and the LXX/English Bible pattern.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - asking
  lexicon: HALOT
  rationale: The infinitive introduces the content of David's inquiry. 'Saying' is a standard and sufficiently transparent rendering.
- source_word: הַאֵלֵךְ
  chosen: Should I go
  alternatives:
  - Shall I go
  - Am I to go
  lexicon: HALOT
  rationale: The interrogative with the imperfect expresses deliberation about whether to proceed. 'Should I go' is idiomatic modern English and preserves the consultative force.
- source_word: וְהִכֵּיתִי
  chosen: and strike
  alternatives:
  - and attack
  - and defeat
  lexicon: HALOT
  rationale: נכה commonly means 'strike/smite.' 'Strike' keeps the military force without overinterpreting the outcome as guaranteed victory, unlike 'defeat.'
- source_word: בַּפְּלִשְׁתִּים הָאֵלֶּה
  chosen: these Philistines
  alternatives:
  - the Philistines here
  - these Philistine forces
  lexicon: HALOT
  rationale: The demonstrative הָאֵלֶּה is significant and is preserved as 'these.' The phrase refers to the specific Philistine raiders threatening Keilah.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Proceed
  - Go ahead
  lexicon: HALOT
  rationale: A direct imperative; 'Go' is the plain and forceful rendering.
- source_word: וְהִכִּיתָ
  chosen: and strike
  alternatives:
  - and attack
  - and defeat
  lexicon: HALOT
  rationale: The repeated verb mirrors David's question and the LORD's answer. Rendering it consistently as 'strike' preserves the verbal correspondence.
- source_word: וְהוֹשַׁעְתָּ
  chosen: and save
  alternatives:
  - and deliver
  - and rescue
  lexicon: HALOT
  rationale: From ישׁע, the verb means to save/deliver. 'Save' is concise and natural; in this military context it means deliver from danger, not necessarily spiritual salvation.
- source_word: אֶת קְעִילָה
  chosen: Keilah
  lexicon: HALOT
  rationale: Proper place name, transliterated according to the translation philosophy.
