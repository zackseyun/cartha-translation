id: 1SA.23.25
reference: 1 Samuel 23:25
source:
  edition: WLC
  text: וַ/יֵּ֨לֶךְ שָׁא֣וּל וַ/אֲנָשָׁי/ו֮ לְ/בַקֵּשׁ֒ וַ/יַּגִּ֣דוּ לְ/דָוִ֔ד וַ/יֵּ֣רֶד
    הַ/סֶּ֔לַע וַ/יֵּ֖שֶׁב בְּ/מִדְבַּ֣ר מָע֑וֹן וַ/יִּשְׁמַ֣ע שָׁא֔וּל וַ/יִּרְדֹּ֥ף
    אַחֲרֵֽי דָוִ֖ד מִדְבַּ֥ר מָעֽוֹן־׃
translation:
  text: So Saul and his men went to seek him. And they told David, so he went down
    to the rock and stayed in the wilderness of Maon. When Saul heard, he pursued
    David in the wilderness of Maon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the crag' or 'the cliff' for 'the rock.' The Hebrew likely refers to
      a notable rocky stronghold or formation.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבַקֵּשׁ
  chosen: to seek him
  alternatives:
  - to search for him
  - to look for him
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: Saul and his men went in order to
    seek David. English requires the object to be supplied from context. ''Seek''
    is concise and suitably formal without sounding archaic.'
- source_word: וַיַּגִּדוּ לְדָוִד
  chosen: And they told David
  alternatives:
  - And it was told to David
  - And they reported to David
  lexicon: HALOT
  rationale: The verb is active plural, so an impersonal passive ('it was told') is
    less direct than the Hebrew. The unspecified plural subject is retained as 'they.'
- source_word: וַיֵּרֶד
  chosen: he went down
  alternatives:
  - he descended
  lexicon: HALOT
  rationale: The verb commonly denotes downward movement. 'Went down' is natural modern
    English and preserves the spatial sense better than the more formal 'descended.'
    The subject is David from the immediate context.
- source_word: הַסֶּלַע
  chosen: the rock
  alternatives:
  - the crag
  - the cliff
  lexicon: HALOT
  rationale: The noun literally means 'the rock/crag.' 'The rock' preserves the Hebrew
    image and may refer to a known rocky stronghold in context. More interpretive
    options like 'crag' are possible but less transparent.
- source_word: וַיֵּשֶׁב
  chosen: stayed
  alternatives:
  - remained
  - dwelt
  - settled
  lexicon: HALOT
  rationale: In narrative context the verb indicates taking up residence or remaining
    in a place. 'Stayed' is idiomatic and readable while preserving the basic sense.
- source_word: בְּמִדְבַּר מָעוֹן / מִדְבַּר מָעוֹן
  chosen: in the wilderness of Maon
  alternatives:
  - in the desert of Maon
  - in the wasteland of Maon
  lexicon: HALOT
  rationale: מִדְבָּר often denotes wilderness/pastureland rather than sandy desert
    specifically. 'Wilderness' is the standard and contextually appropriate rendering.
    The place name Maon is transliterated per policy on names.
- source_word: וַיִּרְדֹּף אַחֲרֵי
  chosen: he pursued
  alternatives:
  - he chased after
  - he went after
  lexicon: HALOT
  rationale: The idiom means to pursue someone. English can absorb אַחֲרֵי into the
    verb naturally as 'pursued,' avoiding awkward literalism while preserving the
    action.
- source_word: וַיֵּלֶךְ שָׁאוּל וַאֲנָשָׁיו
  chosen: So Saul and his men went
  alternatives:
  - Then Saul and his men went
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' or 'Then' both work;
    'So' fits the immediate consequence from the prior verse.
