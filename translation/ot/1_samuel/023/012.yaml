id: 1SA.23.12
reference: 1 Samuel 23:12
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר דָּוִ֔ד הֲ/יַסְגִּ֜רוּ בַּעֲלֵ֧י קְעִילָ֛ה אֹתִ֥/י וְ/אֶת אֲנָשַׁ֖/י
    בְּ/יַד שָׁא֑וּל וַ/יֹּ֥אמֶר יְהוָ֖ה יַסְגִּֽירוּ־־׃ס
translation:
  text: Then David said, “Will the men of Keilah hand me and my men over into Saul’s
    hand?” And the LORD said, “They will hand you over.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “deliver me and my men over” / “surrender me and my men.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “into Saul’s hand,” an idiom meaning into Saul’s power.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew answer says literally, “They will hand you over,” using a singular
      object; David is addressed as the representative leader, with his men implied.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/יַסְגִּרוּ
  chosen: Will ... hand ... over
  alternatives:
  - deliver over
  - surrender
  lexicon: HALOT
  rationale: The Hiphil of סגר here means to give someone up into another's power.
    'Hand over' is natural modern English and preserves the transfer-to-an-enemy sense
    without sounding overly formal.
- source_word: בַּעֲלֵי קְעִילָה
  chosen: the men of Keilah
  alternatives:
  - the citizens of Keilah
  - the lords/masters of Keilah
  lexicon: HALOT
  rationale: Although בַּעֲלֵי literally can mean 'owners,' 'lords,' or 'masters,'
    in this civic context it refers to the inhabitants or leading men of the town.
    'The men of Keilah' is idiomatic and fits the narrative context better than the
    more wooden 'owners of Keilah.'
- source_word: אֹתִי וְאֶת אֲנָשַׁי
  chosen: me and my men
  alternatives:
  - me and my soldiers
  - me and my companions
  lexicon: HALOT
  rationale: אֲנָשַׁי literally means 'my men.' In context these are David's followers,
    likely armed, but 'my men' best preserves the Hebrew wording and avoids over-specifying
    their role.
- source_word: בְּיַד שָׁאוּל
  chosen: into Saul’s hand
  alternatives:
  - into the hand of Saul
  - to Saul
  lexicon: HALOT
  rationale: The idiom 'into the hand of' denotes being given into someone's power.
    Retaining 'hand' preserves the Hebrew imagery and the legal/military nuance of
    control.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint tradition.
- source_word: יַסְגִּירוּ
  chosen: They will hand you over
  alternatives:
  - They will deliver you over
  - They will surrender you
  lexicon: HALOT
  rationale: The verb repeats the earlier question and is best rendered consistently.
    The Hebrew object is singular ('you'), even though David had asked about himself
    and his men; the singular likely represents David as the leader, with the group
    implied. The translation preserves that singular form rather than smoothing it
    to 'you all' or 'you and your men.'
