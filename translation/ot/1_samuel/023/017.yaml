theological_decisions:
- issue: Degree of explicitness in Jonathan's prediction of David's kingship and his
    own subordinate role
  chosen_reading: Render as a straightforward political and providential expectation
    without adding covenantal or messianic language
  alternative_readings:
  - Interpret as an explicitly theological prophecy of divine appointment
  rationale: The verse itself states Jonathan's confidence that David will reign and
    that Jonathan will be second to him, but it does not explicitly mention the LORD
    in this sentence. The translation therefore preserves the statement as given without
    importing theological explanation beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
