id: 1SA.23.17
reference: 1 Samuel 23:17
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֵלָ֜י/ו אַל תִּירָ֗א כִּ֠י לֹ֤א תִֽמְצָאֲ/ךָ֙ יַ֚ד שָׁא֣וּל אָבִ֔/י
    וְ/אַתָּה֙ תִּמְלֹ֣ךְ עַל יִשְׂרָאֵ֔ל וְ/אָנֹכִ֖י אֶֽהְיֶה לְּ/ךָ֣ לְ/מִשְׁנֶ֑ה
    וְ/גַם שָׁא֥וּל אָבִ֖/י יֹדֵ֥עַ כֵּֽן־־־־׃
translation:
  text: He said to him, “Do not be afraid, for the hand of Saul my father will not
    find you. You will reign over Israel, and I will be second to you. Even Saul my
    father knows this.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the power of Saul my father will not reach you.' The Hebrew says, 'the
      hand of Saul my father will not find you,' using 'hand' as a figure for power
      or grasp.
    reason: lexical_alternative
  - marker: b
    text: Or, 'I will be your second-in-command.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּירָא
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the negative imperative with ירא. 'Do
    not be afraid' is natural modern English while preserving the force of the prohibition.
- source_word: לֹא תִמְצָאֲךָ יַד שָׁאוּל אָבִי
  chosen: the hand of Saul my father will not find you
  alternatives:
  - Saul my father will not get hold of you
  - the power of Saul my father will not reach you
  lexicon: HALOT
  rationale: Retains the Hebrew subject 'hand' as a metonym for power or grasp, while
    keeping the verbal image 'find you.' This preserves the concrete Hebrew idiom
    better than flattening it to 'capture' or 'harm,' though those are interpretive
    possibilities.
- source_word: וְאַתָּה תִּמְלֹךְ עַל יִשְׂרָאֵל
  chosen: You will reign over Israel
  alternatives:
  - You will be king over Israel
  lexicon: HALOT
  rationale: מלך as a verb is well rendered by 'reign.' This preserves the verbal
    form rather than converting it into a nominal title, while still clearly conveying
    kingship.
- source_word: וְאָנֹכִי אֶהְיֶה לְּךָ לְמִשְׁנֶה
  chosen: and I will be second to you
  alternatives:
  - and I will be next to you
  - and I will be your second-in-command
  lexicon: HALOT
  rationale: מִשְׁנֶה denotes second rank or subordinate status. 'Second to you' is
    concise, natural, and preserves the relational hierarchy without importing a modern
    bureaucratic title. 'Second-in-command' is possible but slightly more interpretive.
- source_word: וְגַם שָׁאוּל אָבִי יֹדֵעַ כֵּן
  chosen: Even Saul my father knows this
  alternatives:
  - And Saul my father also knows this is so
  - Saul my father knows it too
  lexicon: HALOT
  rationale: כֵּן here points back to the content of Jonathan's statement. 'Knows
    this' is idiomatic and sufficiently explicit in English; 'this is so' is a slightly
    fuller alternative but not necessary in the main text.
