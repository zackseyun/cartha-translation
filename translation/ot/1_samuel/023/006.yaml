id: 1SA.23.6
reference: 1 Samuel 23:6
source:
  edition: WLC
  text: וַ/יְהִ֗י בִּ֠/בְרֹחַ אֶבְיָתָ֧ר בֶּן אֲחִימֶ֛לֶךְ אֶל דָּוִ֖ד קְעִילָ֑ה אֵפ֖וֹד
    יָרַ֥ד בְּ/יָדֽ/וֹ־־׃
translation:
  text: Now when Abiathar son of Ahimelech fled to David at Keilah, he came down with
    an ephod in his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an ephod came down in his hand,' a more literal rendering of the Hebrew
      word order.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive plus היה functions as a narrative transition. 'Now'
    preserves the discourse move in readable modern English without the archaic feel
    of 'it came to pass.'
- source_word: בִּבְרֹחַ
  chosen: when ... fled
  alternatives:
  - as ... fled
  - in the fleeing of
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct marks temporal circumstance.
    English idiom is best conveyed by 'when ... fled.'
- source_word: אֶבְיָתָר
  chosen: Abiathar
  rationale: Standard English transliteration of the personal name.
- source_word: בֶּן אֲחִימֶלֶךְ
  chosen: son of Ahimelech
  rationale: A straightforward patronymic construction; retained formally.
- source_word: אֶל דָּוִד
  chosen: to David
  alternatives:
  - to be with David
  lexicon: HALOT
  rationale: אֶל marks motion toward David. 'To David' is the plain sense.
- source_word: קְעִילָה
  chosen: at Keilah
  alternatives:
  - to Keilah
  rationale: 'Although the place name follows ''to David,'' in English it most naturally
    specifies David''s location: Abiathar fled to David, who was at Keilah. ''At Keilah''
    avoids awkwardness while preserving the sense.'
- source_word: אֵפוֹד
  chosen: an ephod
  lexicon: HALOT
  rationale: The cultic object is best transliterated because no simple English equivalent
    captures its specific priestly significance.
- source_word: יָרַד
  chosen: he came down
  alternatives:
  - came down
  - went down
  - descended
  lexicon: HALOT
  rationale: ירד literally means 'went/came down.' Because the motion is toward David's
    location from the narrator's perspective, 'he came down' reads naturally in English
    while preserving the directional sense.
- source_word: בְּיָדוֹ
  chosen: with an ephod in his hand
  alternatives:
  - in his hand
  - in his possession
  - carrying it
  lexicon: HALOT
  rationale: The phrase literally means 'in his hand.' In English, 'with an ephod
    in his hand' preserves the concrete imagery and indicates that Abiathar brought
    it with him.
