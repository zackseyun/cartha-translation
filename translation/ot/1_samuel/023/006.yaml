theological_decisions:
- issue: Nature of אֵפוֹד in context
  chosen_reading: Retain 'ephod' as a transliterated cultic item without specifying
    more than the Hebrew states.
  alternative_readings:
  - priestly garment
  - sacred vest
  rationale: The verse signals the object's priestly and divinatory significance in
    the broader narrative, but the Hebrew term itself should not be over-interpreted
    here. Transliteration preserves the historical-religious specificity without importing
    a narrower doctrinal claim.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source text warrants.'
