id: 1SA.23.26
reference: 1 Samuel 23:26
source:
  edition: WLC
  text: וַ/יֵּ֨לֶךְ שָׁא֜וּל מִ/צַּ֤ד הָ/הָר֙ מִ/זֶּ֔ה וְ/דָוִ֧ד וַ/אֲנָשָׁ֛י/ו מִ/צַּ֥ד
    הָ/הָ֖ר מִ/זֶּ֑ה וַ/יְהִ֨י דָוִ֜ד נֶחְפָּ֤ז לָ/לֶ֨כֶת֙ מִ/פְּנֵ֣י שָׁא֔וּל וְ/שָׁא֣וּל
    וַ/אֲנָשָׁ֗י/ו עֹֽטְרִ֛ים אֶל דָּוִ֥ד וְ/אֶל אֲנָשָׁ֖י/ו לְ/תָפְשָֽׂ/ם־־׃
translation:
  text: Saul was going on one side of the mountain from this side, and David and his
    men were on the other side of the mountain. David was hurrying to go away from
    Saul, while Saul and his men were closing in on David and on his men to capture
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Saul was going on the side of the mountain from this
      side, and David and his men on the side of the mountain from this side.' The
      translation expresses the intended contrast as 'one side' and 'the other side.'
    reason: lexical_alternative
  - marker: b
    text: Or 'were surrounding David and his men.'
    reason: alternative_reading
  - marker: c
    text: Or 'to seize them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: was going on
  alternatives:
  - went
  - was moving along
  lexicon: HALOT
  rationale: The wayyiqtol of הלך advances the narrative. 'Was going on' fits the
    scene of simultaneous movement around the mountain better than the punctiliar
    'went.'
- source_word: מִצַּד הָהָר מִזֶּה
  chosen: on one side of the mountain from this side
  alternatives:
  - on this side of the mountain
  - along one side of the mountain
  lexicon: HALOT
  rationale: The phrase literally marks one side of the mountain 'from this side.'
    In idiomatic English, 'on one side of the mountain' conveys the spatial contrast,
    while retaining 'from this side' preserves the Hebrew's deictic vividness.
- source_word: וְדָוִד וַאֲנָשָׁיו מִצַּד הָהָר מִזֶּה
  chosen: and David and his men were on the other side of the mountain
  alternatives:
  - and David and his men were on this side of the mountain
  - and David and his men were on another side of the mountain
  lexicon: HALOT
  rationale: Although the Hebrew repeats 'from this side,' in English the contrast
    between Saul's position and David's is best expressed as 'the other side of the
    mountain.' This is an optimal-equivalence adjustment to communicate the opposing
    positions clearly.
- source_word: נֶחְפָּז
  chosen: was hurrying
  alternatives:
  - was hastening
  - was in haste
  - was anxious
  lexicon: HALOT
  rationale: The Niphal participle conveys urgent haste. 'Was hurrying' is natural
    modern English and preserves the sense of urgency without overinterpreting it
    as emotional panic.
- source_word: לָלֶכֶת מִפְּנֵי שָׁאוּל
  chosen: to go away from Saul
  alternatives:
  - to get away from Saul
  - to flee from Saul
  lexicon: HALOT
  rationale: Literally 'to go from before Saul.' 'Go away from Saul' preserves the
    verbal idea without intensifying it beyond the text. 'Flee' is possible but slightly
    stronger than the wording itself.
- source_word: עֹטְרִים
  chosen: were closing in on
  alternatives:
  - were surrounding
  - were encircling
  lexicon: HALOT
  rationale: The participle from עטר here describes Saul's forces drawing around David
    to trap him. 'Were closing in on' communicates the tactical movement in clear
    English; 'surrounding' is a viable more formal alternative.
- source_word: לְתָפְשָׂם
  chosen: to capture them
  alternatives:
  - to seize them
  - to take them
  lexicon: HALOT
  rationale: The infinitive with pronominal suffix expresses purpose. 'Capture them'
    fits the military pursuit context better than the broader 'take them.'
