id: 1SA.23.22
reference: 1 Samuel 23:22
source:
  edition: WLC
  text: לְכוּ נָ֞א הָכִ֣ינוּ ע֗וֹד וּ/דְע֤וּ וּ/רְאוּ֙ אֶת מְקוֹמ/וֹ֙ אֲשֶׁ֣ר תִּֽהְיֶ֣ה
    רַגְל֔/וֹ מִ֥י רָאָ֖/הוּ שָׁ֑ם כִּ֚י אָמַ֣ר אֵלַ֔/י עָר֥וֹם יַעְרִ֖ם הֽוּא־־׃
translation:
  text: Please go and make further preparations, and know and see his place where
    his foot is, who has seen him there; for it was said to me, ‘He is very cunning.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'where his foot is,' an idiom for his whereabouts or movements.
    reason: lexical_alternative
  - marker: b
    text: Or, 'for he said to me'; the Hebrew does not explicitly identify the subject
      of 'said.'
    reason: alternative_reading
  - marker: c
    text: Hebrew uses a cognate expression, literally something like 'cunningly he
      acts cunning,' for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָכִינוּ עוֹד
  chosen: make further preparations
  alternatives:
  - prepare further
  - establish again
  lexicon: HALOT
  rationale: הכין in the Hiphil commonly means to prepare or make ready. With עוֹד,
    the sense is to continue or do more in preparation. 'Make further preparations'
    fits Saul's instruction to intensify reconnaissance.
- source_word: וּדְעוּ וּרְאוּ
  chosen: know and see
  alternatives:
  - find out and see
  - learn and observe
  lexicon: HALOT
  rationale: The paired imperatives stress careful investigation. I retained both
    verbs rather than collapsing them, preserving the Hebrew's cumulative force.
- source_word: מְקוֹמוֹ
  chosen: his place
  alternatives:
  - his location
  - the place where he is
  lexicon: HALOT
  rationale: A straightforward rendering of מקום with 3ms suffix. 'His place' is slightly
    more formal but preserves the concrete noun.
- source_word: אֲשֶׁר תִּהְיֶה רַגְלוֹ
  chosen: where his foot is
  alternatives:
  - where he sets his foot
  - where he goes
  - where he is staying
  lexicon: HALOT
  rationale: Literally 'where his foot will be/is.' This idiom points to David's whereabouts
    or movements. I preserved the imagery with readable English rather than fully
    paraphrasing it away.
- source_word: מִי רָאָהוּ שָׁם
  chosen: who has seen him there
  alternatives:
  - who saw him there
  - who has observed him there
  lexicon: HALOT
  rationale: The clause asks for identification of witnesses or informants. The perfect
    can be rendered naturally in English as 'has seen.'
- source_word: כִּי אָמַר אֵלַי
  chosen: for it was said to me
  alternatives:
  - for he said to me
  - for they told me
  lexicon: HALOT
  rationale: The Hebrew has a 3ms verb without explicit subject. English can render
    this idiomatically as impersonal passive, which avoids over-specifying the speaker
    and fits the context of reported intelligence.
- source_word: עָרוֹם יַעְרִם הוּא
  chosen: He is very cunning
  alternatives:
  - he acts very shrewdly
  - he is exceedingly crafty
  - he surely deals cunningly
  lexicon: HALOT
  rationale: The adjective עָרוֹם with the cognate verb יַעְרִם intensifies the idea
    of shrewdness/cunning. Because English cannot reproduce the exact cognate construction
    smoothly, 'very cunning' conveys the emphatic force. 'Cunning' fits Saul's suspicious
    assessment better than the more positive 'shrewd.'
