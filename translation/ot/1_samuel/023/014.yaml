theological_decisions:
- issue: Reference of אֱלֹהִים in narrative providence
  chosen_reading: God did not give David into Saul's hand
  alternative_readings:
  - God did not hand him over to Saul
  rationale: The verse attributes David's preservation to divine action without expanding
    the theological claim beyond providential protection. The translation preserves
    that direct attribution while keeping the Hebrew idiom intact.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
