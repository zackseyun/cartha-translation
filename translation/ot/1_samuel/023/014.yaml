id: 1SA.23.14
reference: 1 Samuel 23:14
source:
  edition: WLC
  text: וַ/יֵּ֨שֶׁב דָּוִ֤ד בַּ/מִּדְבָּר֙ בַּ/מְּצָד֔וֹת וַ/יֵּ֥שֶׁב בָּ/הָ֖ר בְּ/מִדְבַּר
    זִ֑יף וַ/יְבַקְשֵׁ֤/הוּ שָׁאוּל֙ כָּל הַ/יָּמִ֔ים וְ/לֹֽא נְתָנ֥/וֹ אֱלֹהִ֖ים
    בְּ/יָדֽ/וֹ־־־׃
translation:
  text: David stayed in the wilderness strongholds, and he stayed in the hill country
    in the wilderness of Ziph. Saul sought him all the days, but God did not give
    him into his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''did not hand him over to Saul.'' Hebrew: ''did not give him into his
      hand.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: stayed
  alternatives:
  - lived
  - remained
  - dwelt
  lexicon: HALOT
  rationale: The verb ישׁב commonly means to sit, dwell, remain, or stay. In this
    narrative context, 'stayed' gives natural English while preserving the sense of
    continued residence without sounding overly formal like 'dwelt.'
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  - in the wasteland
  lexicon: HALOT
  rationale: מִדְבָּר often denotes uncultivated wilderness rather than a sandy desert
    specifically. 'Wilderness' is the most contextually accurate and biblically consistent
    rendering.
- source_word: בַּמְּצָדוֹת
  chosen: strongholds
  alternatives:
  - fortresses
  - mountain strongholds
  - refuges
  lexicon: HALOT
  rationale: מְצָדוֹת refers to defensible places or strongholds. 'Strongholds' fits
    David's fugitive setting and preserves the military-defensive nuance better than
    the broader 'refuges.'
- source_word: בָּהָר
  chosen: in the hill country
  alternatives:
  - in the mountain
  - in the mountains
  lexicon: HALOT
  rationale: הַר can mean mountain or hill country depending on terrain and idiom.
    Here 'in the hill country' is more idiomatic English for the region of Ziph and
    avoids implying a single peak.
- source_word: בְּמִדְבַּר זִיף
  chosen: in the wilderness of Ziph
  alternatives:
  - in the desert of Ziph
  lexicon: HALOT
  rationale: This construct phrase identifies the specific wilderness region associated
    with Ziph. 'Wilderness of Ziph' is the standard and accurate geographical rendering.
- source_word: וַיְבַקְשֵׁהוּ
  chosen: sought him
  alternatives:
  - searched for him
  - tried to find him
  lexicon: HALOT
  rationale: בקשׁ in this context means to seek or search for. 'Sought him' is concise,
    natural, and preserves the narrative tone of persistent pursuit.
- source_word: כָּל הַיָּמִים
  chosen: all the days
  alternatives:
  - continually
  - all that time
  - every day
  lexicon: HALOT
  rationale: The Hebrew is literally 'all the days.' Retaining this phrase preserves
    the idiomatic force of ongoing duration while remaining understandable in English.
- source_word: וְלֹא נְתָנוֹ
  chosen: did not give him
  alternatives:
  - did not hand him over
  - did not deliver him
  lexicon: HALOT
  rationale: נתן with 'into his hand' is a common idiom for handing someone over to
    another's power. 'Did not give him' keeps the Hebrew structure, with the fuller
    idiom completed by the following phrase.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Though morphologically plural, אֱלֹהִים here clearly takes singular verbal
    sense and refers to the God of Israel. 'God' is the correct English rendering.
- source_word: בְּיָדוֹ
  chosen: into his hand
  alternatives:
  - into his power
  - into Saul's hand
  lexicon: HALOT
  rationale: '''Into his hand'' is a standard Hebrew idiom for being delivered into
    someone''s control. It is transparent enough in English and preserves the biblical
    idiom better than flattening it to ''power.'''
