id: 1SA.23.4
reference: 1 Samuel 23:4
source:
  edition: WLC
  text: וַ/יּ֨וֹסֶף ע֤וֹד דָּוִד֙ לִ/שְׁאֹ֣ל בַּֽ/יהוָ֔ה וַֽ/יַּעֲנֵ֖/הוּ יְהוָ֑ה וַ/יֹּ֗אמֶר ק֚וּם רֵ֣ד קְעִילָ֔ה כִּֽי אֲנִ֥י נֹתֵ֛ן אֶת פְּלִשְׁתִּ֖ים בְּ/יָדֶֽ/ךָס־־׃
translation:
  text: David again inquired of Yahweh, and Yahweh answered him and said, “Arise, go down to Keilah, for I am giving the Philistines into your hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will give the Philistines into your hand.' The Hebrew participle can express imminent or certain future action.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹסֶף עוֹד
  chosen: again
  alternatives:
  - continued
  - added further
  lexicon: HALOT
  rationale: The idiom with יסף + עוד + infinitive means to do something another time or again. 'Again' is the most natural concise English rendering here.
- source_word: לִשְׁאֹל בַּיהוָה
  chosen: inquired of the LORD
  alternatives:
  - asked of the LORD
  - consulted the LORD
  lexicon: HALOT
  rationale: שׁאל with ב plus the divine name commonly means to seek an answer from God. 'Inquired of' preserves the formal sense of seeking divine guidance better than the flatter 'asked.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּעֲנֵהוּ
  chosen: answered him
  alternatives:
  - responded to him
  lexicon: HALOT
  rationale: ענה in this context is the standard verb for giving an answer to an inquiry. 'Answered him' is direct and idiomatic.
- source_word: קוּם
  chosen: Rise
  alternatives:
  - Get up
  - Arise
  lexicon: HALOT
  rationale: The imperative signals immediate action. 'Rise' is elevated but still natural in narrative divine speech; 'arise' would sound more archaic.
- source_word: רֵד
  chosen: go down
  alternatives:
  - descend
  lexicon: HALOT
  rationale: ירד literally means 'go down/descend.' 'Go down' is the natural modern English equivalent and preserves the directional nuance.
- source_word: קְעִילָה
  chosen: Keilah
  rationale: Proper place name, transliterated by standard English convention.
- source_word: כִּי אֲנִי נֹתֵן
  chosen: for I am giving
  alternatives:
  - for I will give
  - because I am giving
  lexicon: HALOT
  rationale: The participle נֹתֵן can express imminent or certain action. 'I am giving' preserves the Hebrew aspect and the sense of assured divine action better than smoothing it to a simple future.
- source_word: אֶת פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Direct object marker plus ethnonym; standard rendering is straightforward.
- source_word: בְּיָדֶךָ
  chosen: into your hand
  alternatives:
  - into your power
  - over to you
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for delivering someone into another's power. 'Into your hand' keeps the concrete biblical imagery while remaining understandable in English.
