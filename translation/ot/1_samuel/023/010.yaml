id: 1SA.23.10
reference: 1 Samuel 23:10
source:
  edition: WLC
  text: וַ/יֹּאמֶר֮ דָּוִד֒ יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל שָׁמֹ֤עַ שָׁמַע֙ עַבְדְּ/ךָ֔ כִּֽי מְבַקֵּ֥שׁ שָׁא֖וּל לָ/ב֣וֹא אֶל קְעִילָ֑ה לְ/שַׁחֵ֥ת לָ/עִ֖יר בַּ/עֲבוּרִֽ/י־־׃
translation:
  text: Then David said, “O Yahweh, God of Israel, your servant has surely heard that Saul is seeking to come to Keilah to destroy the city because of me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence; 'And' is possible but less idiomatic here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: God of Israel
  lexicon: HALOT
  rationale: A straightforward construct phrase; 'God of Israel' is the natural and formally accurate rendering.
- source_word: שָׁמֹעַ שָׁמַע
  chosen: has certainly heard
  alternatives:
  - has surely heard
  - has indeed heard
  - I have surely heard
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the verbal idea. 'Has certainly heard' preserves the emphasis in idiomatic English. The subject is 'your servant,' not an explicit first-person pronoun, so the clause is rendered in the third person as in Hebrew.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although the noun can denote a slave/servant, in direct address to God by a faithful petitioner it functions as a deferential self-designation. 'Your servant' best fits the register and context.
- source_word: מְבַקֵּשׁ
  chosen: is seeking
  alternatives:
  - plans
  - intends
  lexicon: HALOT
  rationale: The participle conveys ongoing or present intention. 'Is seeking' preserves the lexical sense without overinterpreting the degree of certainty.
- source_word: לָבוֹא אֶל קְעִילָה
  chosen: to come to Keilah
  alternatives:
  - to go to Keilah
  lexicon: HALOT
  rationale: Hebrew בוא commonly means 'come/enter.' In English either 'come' or 'go' could fit depending on viewpoint; 'come to Keilah' stays closer to the Hebrew wording.
- source_word: לְשַׁחֵת
  chosen: to destroy
  alternatives:
  - to ruin
  - to devastate
  lexicon: HALOT
  rationale: The verb denotes destruction/corruption. In this military context, 'to destroy' is the clearest and most natural rendering.
- source_word: לָעִיר
  chosen: the city
  alternatives:
  - the town
  lexicon: HALOT
  rationale: The definite noun refers to Keilah as an urban settlement. 'The city' is the standard rendering and matches the Hebrew article.
- source_word: בַּעֲבוּרִי
  chosen: because of me
  alternatives:
  - for my sake
  - on my account
  lexicon: HALOT
  rationale: The prepositional expression indicates cause or account. 'Because of me' is clear modern English and preserves the causal sense.
