id: 1SA.23.8
reference: 1 Samuel 23:8
source:
  edition: WLC
  text: וַ/יְשַׁמַּ֥ע שָׁא֛וּל אֶת כָּל הָ/עָ֖ם לַ/מִּלְחָמָ֑ה לָ/רֶ֣דֶת קְעִילָ֔ה
    לָ/צ֥וּר אֶל דָּוִ֖ד וְ/אֶל אֲנָשָֽׁי/ו־־־־׃
translation:
  text: So Saul summoned all the people to war, to go down to Keilah, to besiege David
    and his men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mustered all the people for battle.' The Hebrew verb can mean 'caused
      to hear,' and in this context likely refers to calling the people together for
      military action.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁמַּע
  chosen: summoned
  alternatives:
  - heard
  - caused to hear
  - called together
  - mustered
  lexicon: HALOT
  rationale: In the Hiphil, שׁמע can mean 'cause to hear,' and in military-administrative
    context it idiomatically means to call together or summon. 'Summoned' captures
    the causative sense and the mobilization context better than the overly literal
    'caused to hear' or the potentially ambiguous 'heard.'
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the troops
  - all the army
  - all the fighting men
  lexicon: HALOT
  rationale: Literally 'all the people.' In context this refers to those Saul mobilized
    for military action, but the Hebrew does not explicitly say 'army' here. 'All
    the people' preserves the wording while allowing the military sense to be clarified
    by 'to war.'
- source_word: לַמִּלְחָמָה
  chosen: to war
  alternatives:
  - for battle
  - for the war
  lexicon: HALOT
  rationale: 'The phrase marks purpose: Saul summoned them for military action. ''To
    war'' is concise and natural in English while preserving the broad military sense
    better than the narrower ''for battle.'''
- source_word: לָרֶדֶת
  chosen: to go down
  alternatives:
  - to descend
  lexicon: HALOT
  rationale: The infinitive of ירד commonly means 'to go down' and is standard for
    movement to a lower location or simply travel in biblical narrative. 'Go down'
    is the natural English equivalent.
- source_word: קְעִילָה
  chosen: Keilah
  rationale: Standard English transliteration of the place name.
- source_word: לָצוּר
  chosen: to besiege
  alternatives:
  - to shut in
  - to confine
  - to lay siege to
  lexicon: HALOT
  rationale: The verb צור in this stem and context refers to siege action against
    a person or place. Since the object is David and his men in Keilah, 'to besiege'
    best conveys the military intent. 'Lay siege to' is possible but less concise.
- source_word: אֶל דָּוִד וְאֶל אֲנָשָׁיו
  chosen: David and his men
  alternatives:
  - against David and against his men
  - David and his soldiers
  lexicon: HALOT
  rationale: Although אֶל is literally 'to/toward,' with צור it indicates the target
    of the siege. English idiom omits repeated prepositions after 'besiege.' 'His
    men' is preferable to 'his soldiers' because the Hebrew simply says 'his men,'
    though they are functioning as a fighting band.
