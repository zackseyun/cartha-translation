id: 1SA.2.12
reference: 1 Samuel 2:12
source:
  edition: WLC
  text: וּ/בְנֵ֥י עֵלִ֖י בְּנֵ֣י בְלִיָּ֑עַל לֹ֥א יָדְע֖וּ אֶת יְהוָֽה־׃
translation:
  text: Now Eli’s sons were worthless men; they did not know the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of worthlessness'; traditionally 'sons of Belial.'
    reason: lexical_alternative
  - marker: b
    text: Or 'did not acknowledge the LORD' / 'had no regard for the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: Now ... sons
  alternatives:
  - And ... sons
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply as 'and,' but at the start of
    a new narrative unit English often prefers 'now' to mark transition smoothly.
    בְנֵי is the construct plural 'sons of.'
- source_word: עֵלִי
  chosen: Eli
  rationale: Personal name transliterated by standard English convention.
- source_word: בְּנֵי בְלִיָּעַל
  chosen: worthless men
  alternatives:
  - worthless fellows
  - scoundrels
  - sons of worthlessness
  - sons of Belial
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'sons of worthlessness' and denotes
    morally corrupt, base men. 'Worthless men' preserves the force without importing
    the later personified sense of 'Belial' as a proper name. 'Sons of Belial' is
    traditional but less transparent in modern English.
- source_word: לֹא יָדְעוּ
  chosen: did not know
  alternatives:
  - did not acknowledge
  - had no regard for
  lexicon: HALOT
  rationale: יָדַע commonly means 'know,' and in covenantal contexts can imply relational
    acknowledgment. 'Did not know' keeps the Hebrew wording and preserves the theological
    weight; interpretive expansions are better left as alternatives.
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The direct-object marker
    אֶת is not translated in English.
