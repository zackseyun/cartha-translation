theological_decisions:
- issue: Whether בְלִיָּעַל should be treated as a common noun expression or as the
    proper name Belial
  chosen_reading: 'common noun idiom: ''worthless men'''
  alternative_readings:
  - '''sons of Belial'''
  rationale: In this context the phrase functions as a Hebrew characterization of
    moral worthlessness rather than clearly invoking a named demonic figure. Rendering
    the idiom communicates the plain sense while avoiding later theological overreading.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Readable modern English, not archaic or academic.'
- issue: Whether 'did not know the LORD' should be paraphrased to make the covenantal
    sense explicit
  chosen_reading: retain 'did not know the LORD' in the main text
  alternative_readings:
  - '''did not acknowledge the LORD'''
  - '''had no regard for the LORD'''
  rationale: The Hebrew verb 'know' carries covenantal and moral force, and preserving
    it maintains the theological tension between literal knowledge language and implied
    relational rebellion. A more interpretive gloss would narrow the expression beyond
    the source text.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
