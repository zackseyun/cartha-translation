theological_decisions:
- issue: Whether שִׁבְעָה ('seven') should be interpreted literally or symbolically
    as fullness/completeness
  chosen_reading: Retain 'seven' in the main text without interpretation
  alternative_readings:
  - a symbolic number expressing complete fruitfulness
  rationale: The Hebrew text gives the number directly, and the poetry may intentionally
    allow both literal and symbolic resonance. The translation preserves that tension
    rather than resolving it.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Whether בָּנִים should be generalized as 'children' for inclusivity
  chosen_reading: Render as 'sons'
  alternative_readings:
  - children
  rationale: The source noun is grammatically and lexically masculine plural. In this
    poetic contrast there is no compelling contextual reason to neutralize it, so
    the gendered term is retained in keeping with the stated philosophy.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
