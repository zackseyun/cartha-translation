id: 1SA.2.5
reference: 1 Samuel 2:5
source:
  edition: WLC
  text: שְׂבֵעִ֤ים בַּ/לֶּ֨חֶם֙ נִשְׂכָּ֔רוּ וּ/רְעֵבִ֖ים חָדֵ֑לּוּ עַד עֲקָרָה֙ יָלְדָ֣ה
    שִׁבְעָ֔ה וְ/רַבַּ֥ת בָּנִ֖ים אֻמְלָֽלָה־׃
translation:
  text: Those who were full have hired themselves out for bread, but those who were
    hungry have ceased to hunger. Even the barren woman has borne seven, but she who
    had many sons has withered away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'have ceased'—the Hebrew leaves the object unstated; the sense is that
      the hungry no longer hunger or no longer lack.
    reason: lexical_alternative
  - marker: b
    text: '''Seven'' may function as a literal number or as a poetic number of fullness/completeness.'
    reason: cultural_note
  - marker: c
    text: Hebrew 'sons'; some translations generalize to 'children.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂבֵעִים
  chosen: those who were full
  alternatives:
  - the satisfied
  - the well-fed
  lexicon: HALOT
  rationale: Adjectival participle used substantivally for people who had abundance.
    'Those who were full' is natural English and preserves the reversal motif.
- source_word: בַּלֶּחֶם
  chosen: for bread
  alternatives:
  - for food
  - for a loaf
  lexicon: HALOT
  rationale: לֶחֶם often means 'bread' literally and by extension food. Here 'for
    bread' preserves the concrete image of economic desperation while remaining idiomatic.
- source_word: נִשְׂכָּרוּ
  chosen: have hired themselves out
  alternatives:
  - hire themselves out
  - were hired out
  lexicon: HALOT
  rationale: Nifal of שׂכר in this context conveys entering hired labor. 'Have hired
    themselves out' captures the reflexive/passive nuance and the social reversal
    from abundance to dependence.
- source_word: וּרְעֵבִים
  chosen: those who were hungry
  alternatives:
  - the hungry
  lexicon: HALOT
  rationale: Parallel to שְׂבֵעִים; rendered substantivally to preserve the contrast.
- source_word: חָדֵלּוּ
  chosen: have ceased to hunger
  alternatives:
  - have ceased
  - are hungry no more
  - lack no more
  lexicon: HALOT
  rationale: The verb by itself means 'cease,' but in context the ellipsis is completed
    by the hunger condition of the parallel line. 'Have ceased to hunger' makes the
    sense explicit without over-paraphrasing.
- source_word: עַד
  chosen: even
  alternatives:
  - until
  - so that even
  lexicon: HALOT
  rationale: Here עַד introduces the extent of the reversal ('to the point that/even').
    'Even' communicates the idiomatic force in English better than a wooden 'until.'
- source_word: עֲקָרָה
  chosen: the barren woman
  alternatives:
  - the barren one
  - the infertile woman
  lexicon: HALOT
  rationale: The feminine singular adjective functions substantivally. 'Barren woman'
    is the standard biblical idiom and fits the poetic contrast.
- source_word: יָלְדָה שִׁבְעָה
  chosen: has borne seven
  alternatives:
  - has given birth to seven
  - has borne seven children
  lexicon: HALOT
  rationale: The Hebrew is concise and poetic. 'Has borne seven' preserves that compactness.
    'Seven' may be literal or symbolic of fullness/completeness; the translation leaves
    that open.
- source_word: וְרַבַּת בָּנִים
  chosen: she who had many sons
  alternatives:
  - the woman with many children
  - the mother of many sons
  lexicon: HALOT
  rationale: בָּנִים is specifically 'sons,' not a gender-neutral term. Per translation
    philosophy, the masculine term is preserved unless context requires otherwise.
- source_word: אֻמְלָלָה
  chosen: has withered away
  alternatives:
  - has languished
  - has become feeble
  - is forlorn
  lexicon: HALOT
  rationale: The verb conveys becoming weak, miserable, or wasted. 'Has withered away'
    fits the poetic imagery of decline in contrast to fruitfulness.
