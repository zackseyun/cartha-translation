id: 1SA.2.20
reference: 1 Samuel 2:20
source:
  edition: WLC
  text: וּ/בֵרַ֨ךְ עֵלִ֜י אֶת אֶלְקָנָ֣ה וְ/אֶת אִשְׁתּ֗/וֹ וְ/אָמַר֙ יָשֵׂם֩ יְהוָ֨ה
    לְ/ךָ֥ זֶ֨רַע֙ מִן הָ/אִשָּׁ֣ה הַ/זֹּ֔את תַּ֚חַת הַ/שְּׁאֵלָ֔ה אֲשֶׁ֥ר שָׁאַ֖ל
    לַֽ/יהוָ֑ה וְ/הָלְכ֖וּ לִ/מְקֹמֽ/וֹ־־־׃
translation:
  text: And Eli would bless Elkanah and his wife and say, “May the LORD give you offspring
    by this woman in place of the one she asked from the LORD.” Then they would go
    to his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in place of the request/loan that she asked from the LORD.''
      The wording echoes the root ''ask'' used repeatedly in the Samuel birth narrative
      and may allude specifically to Samuel as the child obtained by asking and then
      given to the LORD.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb in 'asked' is masculine singular, but the context points
      to Hannah as the one who asked for the child (see 1 Samuel 1:20, 27–28).
    reason: alternative_reading
lexical_decisions:
- source_word: וּבֵרַךְ
  chosen: would bless
  alternatives:
  - blessed
  lexicon: HALOT
  rationale: The qatal here in narrative with following habitual context (each yearly
    visit, cf. surrounding verses) is well represented by an iterative English form,
    'would bless,' rather than a simple past that could obscure the customary action.
- source_word: אֶת אֶלְקָנָה וְאֶת אִשְׁתּוֹ
  chosen: Elkanah and his wife
  alternatives:
  - Elkanah and Hannah
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'his wife,' not her personal name. Retaining
    'his wife' follows the source text more closely, while the referent remains clear
    from context.
- source_word: יָשֵׂם יְהוָה לְךָ
  chosen: May the LORD give you
  alternatives:
  - May the LORD appoint for you
  - May the LORD set for you
  lexicon: HALOT
  rationale: שׂים literally means 'set/place/appoint,' but in idiomatic blessing context
    with 'offspring' the sense is that the LORD grant or provide descendants. 'Give'
    is natural English and preserves the blessing force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    in keeping with established reverential convention and the translation's default
    policy.
- source_word: זֶרַע
  chosen: offspring
  alternatives:
  - seed
  - children
  - descendants
  lexicon: HALOT
  rationale: זֶרַע can denote seed, offspring, or descendants. In this immediate family-blessing
    context, 'offspring' is the most natural singular collective rendering, preserving
    the Hebrew's collective nuance better than 'children' while avoiding the overly
    literal 'seed'.
- source_word: מִן הָאִשָּׁה הַזֹּאת
  chosen: by this woman
  alternatives:
  - from this woman
  - through this woman
  lexicon: HALOT
  rationale: The phrase identifies Hannah as the mother through whom the offspring
    would come. 'By this woman' is idiomatic in English in a fertility/blessing context;
    'from this woman' is possible but less natural.
- source_word: תַּחַת
  chosen: in place of
  alternatives:
  - instead of
  - for
  lexicon: HALOT
  rationale: תחת commonly means 'under' or, idiomatically, 'in place of/in exchange
    for.' Here Eli asks that another child be granted as a replacement for the child
    dedicated to the LORD.
- source_word: הַשְּׁאֵלָה
  chosen: the one
  alternatives:
  - the request
  - the loan
  - the child lent
  lexicon: HALOT
  rationale: The noun derives from the root שׁאל ('ask') and is wordplay-rich in the
    Samuel birth narrative. In context it refers concretely to the child obtained
    by asking and then given over to the LORD. English requires an explicit object;
    'the one' captures the personal referent without over-paraphrasing. The lexical
    wordplay is worth preserving in a footnote.
- source_word: אֲשֶׁר שָׁאַל לַיהוָה
  chosen: she asked from the LORD
  alternatives:
  - he asked from the LORD
  - was asked for the LORD
  lexicon: HALOT
  rationale: The verb form is morphologically 3ms, but the contextual referent is
    Hannah, whose asking has dominated the preceding narrative (1 Sam 1). Many translations
    smooth to 'she asked'; this best reflects the sense. The masculine form may reflect
    attraction to an implicit subject or textual irregularity, but the contextual
    meaning is not seriously in doubt.
- source_word: וְהָלְכוּ לִמְקֹמוֹ
  chosen: Then they would go to his place
  alternatives:
  - and they went to his place
  - and they returned home
  - and he went to his place
  lexicon: HALOT
  rationale: The plural verb indicates Elkanah and Hannah departed; the suffix on
    'his place' is singular, most naturally referring to Elkanah as household head,
    hence 'his place.' Because the action appears customary in context, 'would go'
    fits the iterative sense. 'Returned home' is interpretive and less literal.
