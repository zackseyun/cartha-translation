theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for the Tetragrammaton and
    does not introduce a doctrinal claim beyond the source text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Subject of שָׁאַל in the relative clause
  chosen_reading: understood as Hannah ('she asked from the LORD')
  alternative_readings:
  - Elkanah as subject ('he asked from the LORD')
  - more literal but awkward 'which was asked from the LORD'
  rationale: Although the verb form is masculine singular, the narrative context strongly
    points to Hannah as the one who asked for Samuel. This is a contextual-grammatical
    decision, not a doctrinal one, but it affects interpretation and should be documented
    for auditability.
