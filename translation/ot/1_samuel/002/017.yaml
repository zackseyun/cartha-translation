id: 1SA.2.17
reference: 1 Samuel 2:17
source:
  edition: WLC
  text: וַ/תְּהִ֨י חַטַּ֧את הַ/נְּעָרִ֛ים גְּדוֹלָ֥ה מְאֹ֖ד אֶת פְּנֵ֣י יְהוָ֑ה כִּ֤י
    נִֽאֲצוּ֙ הָֽ/אֲנָשִׁ֔ים אֵ֖ת מִנְחַ֥ת יְהוָֽה־׃
translation:
  text: So the sin of the young men was very great before the LORD, because the men
    treated the LORD’s offering with contempt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'despised the LORD’s offering.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'before the face of the LORD,' an idiom meaning 'before the LORD'
      or 'in the LORD’s presence.'
    reason: lexical_alternative
  - marker: c
    text: '''Offering'' translates Hebrew minḥah, which can refer broadly to an offering
      and in some contexts more specifically to a grain offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַטַּאת
  chosen: sin
  alternatives:
  - offense
  - guilt
  lexicon: HALOT
  rationale: In this context the noun denotes the wrongdoing of Eli's sons, not a
    sin offering. 'Sin' is the plain and natural rendering.
- source_word: הַנְּעָרִים
  chosen: the young men
  alternatives:
  - the boys
  - the servants
  lexicon: HALOT
  rationale: Though נַעַר can range from 'boy' to 'servant/attendant,' Eli's sons
    are adult males acting in priestly service. 'Young men' preserves the lexical
    sense without sounding childish.
- source_word: גְּדוֹלָה מְאֹד
  chosen: very great
  alternatives:
  - exceedingly great
  - very severe
  lexicon: HALOT
  rationale: This is a straightforward intensification. 'Very great' keeps the Hebrew
    emphasis with readable English.
- source_word: אֶת־פְּנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - against the LORD
  lexicon: HALOT
  rationale: The idiom literally involves 'the face/presence of YHWH.' 'Before the
    LORD' is idiomatic English and preserves the covenantal setting. 'The LORD' follows
    the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per project doctrine, the default rendering of the divine name is 'the
    LORD.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the preceding assessment. 'Because'
    is the clearest modern English connector.
- source_word: נִאֲצוּ
  chosen: treated with contempt
  alternatives:
  - despised
  - scorned
  - spurned
  lexicon: HALOT
  rationale: The verb carries the sense of showing contempt or disdain. 'Treated with
    contempt' makes explicit the verbal force in natural English and fits the object
    that follows.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - these men
  - the people
  lexicon: HALOT
  rationale: The term is the common word for men/persons. Here it refers back to the
    offending priests. 'The men' preserves the lexical form and avoids over-interpretation.
- source_word: מִנְחַת יְהוָה
  chosen: the LORD’s offering
  alternatives:
  - the offering of the LORD
  - the grain offering of the LORD
  lexicon: HALOT
  rationale: מִנְחָה can denote an offering broadly, though in some contexts specifically
    a grain offering. In this narrative about sacrificial portions generally, 'the
    LORD’s offering' is broad enough to fit the context without over-specifying.
