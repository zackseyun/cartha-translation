theological_decisions:
- issue: Nature of the judgment on Eli's priestly line
  chosen_reading: The line is not totally extinguished from altar service immediately;
    instead, survivors remain to witness grief and ongoing judgment.
  alternative_readings:
  - The line is completely cut off from priestly service
  - The statement refers only to physical survival near the altar, not priestly function
  rationale: The negated 'I will not cut off every man of yours from beside my altar'
    indicates a remnant remains, and the purpose clauses show that this survival serves
    as a means of sorrow and judgment. This preserves the tension of mercy-in-judgment
    without importing later doctrinal conclusions.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
- issue: Meaning of אֲנָשִׁים at the end of the verse
  chosen_reading: Rendered literally as 'as men' in the main text, with the likely
    sense 'in the prime of life' preserved in a footnote.
  alternative_readings:
  - in the prime of life
  - as mortal men
  rationale: The phrase is ambiguous enough that the translation should not collapse
    it into a single interpretive gloss without note. A literal rendering in the text
    with an explanatory footnote best fits the stated philosophy.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
