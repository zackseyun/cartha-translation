id: 1SA.2.33
reference: 1 Samuel 2:33
source:
  edition: WLC
  text: וְ/אִ֗ישׁ לֹֽא אַכְרִ֤ית לְ/ךָ֙ מֵ/עִ֣ם מִזְבְּחִ֔/י לְ/כַלּ֥וֹת אֶת עֵינֶ֖י/ךָ
    וְ/לַ/אֲדִ֣יב אֶת נַפְשֶׁ֑/ךָ וְ/כָל מַרְבִּ֥ית בֵּיתְ/ךָ֖ יָמ֥וּתוּ אֲנָשִֽׁים־־־־׃
translation:
  text: But I will not cut off every man of yours from beside my altar, to make your
    eyes fail and your soul grieve; and all the increase of your house will die as
    men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'will die in the prime of life.' The Hebrew literally says 'will die
      as men.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאִישׁ
  chosen: every man
  alternatives:
  - a man
  - any man
  lexicon: HALOT
  rationale: 'With the following negation and verb, the phrase is idiomatic: not every
    individual will be cut off. ''Every man'' preserves the distributive force better
    than simply ''a man.'''
- source_word: לֹא אַכְרִית לְךָ מֵעִם מִזְבְּחִי
  chosen: I will not cut off every man of yours from beside my altar
  alternatives:
  - I will not destroy every one of yours from my altar
  - I will not cut off from you anyone from my altar
  lexicon: HALOT
  rationale: כרת in Hiphil commonly means 'cut off, remove, destroy.' 'From beside
    my altar' reflects מֵעִם more precisely than a simple 'from.' The sense is that
    Eli's line will not be entirely removed from priestly proximity/service, though
    it will remain under judgment.
- source_word: לְכַלּוֹת אֶת עֵינֶיךָ
  chosen: to make your eyes fail
  alternatives:
  - to consume your eyes
  - to wear out your eyes
  lexicon: HALOT
  rationale: כלה here is purposive/resultative and idiomatic. 'Make your eyes fail'
    conveys wasting away through grief more naturally in English while staying close
    to the Hebrew image.
- source_word: וְלַאֲדִיב אֶת נַפְשֶׁךָ
  chosen: and your soul grieve
  alternatives:
  - and to cause your soul sorrow
  - and to make your soul languish
  lexicon: HALOT
  rationale: The rare verb דיב/דאב in this form conveys causing pain, sorrow, or grief.
    'Your soul grieve' is concise and preserves the inner-life language of נֶפֶשׁ
    without over-paraphrase.
- source_word: נַפְשֶׁךָ
  chosen: your soul
  alternatives:
  - your life
  - your inner self
  lexicon: HALOT
  rationale: נפש can mean life, self, or soul depending on context. Here the parallel
    with failing eyes and emotional anguish favors 'soul' as the most natural way
    to preserve the anthropological idiom.
- source_word: וְכָל מַרְבִּית בֵּיתְךָ
  chosen: all the increase of your house
  alternatives:
  - all the descendants of your house
  - all the offspring of your house
  lexicon: HALOT
  rationale: מַרְבִּית literally denotes increase, abundance, or multiplication. In
    context it refers to the multiplying members of Eli's household/line. 'Increase
    of your house' keeps the Hebrew metaphor, with the following clause clarifying
    that persons are meant.
- source_word: יָמֻתוּ אֲנָשִׁים
  chosen: will die as men
  alternatives:
  - will die in the prime of life
  - will die as mortal men
  lexicon: HALOT
  rationale: The Hebrew is terse and somewhat idiomatic. אֲנָשִׁים may mean simply
    'men,' but in this judgment context it likely contrasts with dying at a ripe old
    age, i.e., dying in full manhood. I retained the more literal 'as men' in the
    main text and preserved the interpretive alternative in a footnote.
