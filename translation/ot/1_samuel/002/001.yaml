id: 1SA.2.1
reference: 1 Samuel 2:1
source:
  edition: WLC
  text: וַ/תִּתְפַּלֵּ֤ל חַנָּה֙ וַ/תֹּאמַ֔ר עָלַ֤ץ לִבִּ/י֙ בַּֽ/יהוָ֔ה רָ֥מָה קַרְנִ֖/י
    בַּֽ/יהוָ֑ה רָ֤חַב פִּ/י֙ עַל א֣וֹיְבַ֔/י כִּ֥י שָׂמַ֖חְתִּי בִּ/ישׁוּעָתֶֽ/ךָ־׃
translation:
  text: 'And Hannah prayed and said: “My heart exults in the LORD; my horn is lifted
    high in the LORD. My mouth is opened wide against my enemies, because I rejoice
    in your salvation.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'my horn,' a metaphor for strength, honor, or exalted status.
    reason: cultural_note
  - marker: b
    text: Or 'my mouth boasts over my enemies' / 'I speak boldly against my enemies.'
      The Hebrew literally says 'my mouth is opened wide against my enemies.'
    reason: lexical_alternative
  - marker: c
    text: Or 'deliverance.' The Hebrew term can mean salvation in a broad sense or
      concrete rescue from distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתְפַּלֵּל
  chosen: prayed
  alternatives:
  - prayed earnestly
  - uttered a prayer
  lexicon: HALOT
  rationale: The hitpael of פלל commonly means 'to pray.' Although what follows is
    poetic praise, the narrative verb frames it as prayer, so 'prayed' should be retained
    rather than weakened to merely 'spoke' or expanded beyond the source.
- source_word: וַתֹּאמַר
  chosen: said
  alternatives:
  - sang
  - declared
  lexicon: HALOT
  rationale: The verb is the standard 'said.' Even though the content is poetic and
    hymn-like, the Hebrew does not use a distinct verb for singing here, so 'said'
    best preserves the source wording.
- source_word: עָלַץ לִבִּי
  chosen: My heart exults
  alternatives:
  - My heart rejoices
  - My heart triumphs
  lexicon: HALOT
  rationale: עלץ conveys exuberant joy or exultation. 'Exults' preserves the elevated
    poetic force better than the flatter 'rejoices,' while keeping the subject 'my
    heart' explicit from the Hebrew.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - because of the LORD
  - through the LORD
  lexicon: HALOT
  rationale: The preposition ב here marks sphere/ground of rejoicing and exaltation.
    'In the LORD' is idiomatic and preserves the covenant name according to project
    policy for יהוה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: רָמָה קַרְנִי
  chosen: my horn is lifted high
  alternatives:
  - my horn is exalted
  - my strength is raised
  lexicon: HALOT
  rationale: '''Horn'' is a common Hebrew metaphor for strength, dignity, or honor.
    The image should be preserved in the main text rather than interpreted away as
    ''strength,'' while ''lifted high'' gives clear modern English.'
- source_word: רָחַב פִּי עַל אֹיְבַי
  chosen: My mouth is opened wide against my enemies
  alternatives:
  - My mouth boasts over my enemies
  - I speak boldly against my enemies
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of the mouth being widened/opened against
    enemies, expressing bold, triumphant speech. Preserving the bodily image respects
    the poetry; more interpretive alternatives are possible but less transparent.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Hannah's bold exultation. 'Because'
    is slightly more natural in contemporary English than 'for' while preserving the
    causal sense.
- source_word: שָׂמַחְתִּי
  chosen: I rejoice
  alternatives:
  - I have rejoiced
  - I am glad
  lexicon: HALOT
  rationale: The perfect can be rendered as a present state/result in English within
    poetic speech. 'I rejoice' reads naturally and matches the ongoing tone of praise.
- source_word: בִּישׁוּעָתֶךָ
  chosen: in your salvation
  alternatives:
  - in your deliverance
  - in your victory
  lexicon: HALOT
  rationale: ישועה can denote salvation or deliverance. 'Salvation' preserves the
    broader theological resonance while still fitting Hannah's immediate experience
    of divine rescue; 'deliverance' is a viable narrower alternative preserved here.
