theological_decisions:
- issue: Nature of the prior promise to Eli’s house
  chosen_reading: Render the earlier statement as a real prior divine declaration ('I indeed said ... would walk before me forever') followed by a present revocation in light of covenantal unfaithfulness.
  alternative_readings:
  - Treat 'forever' as hyperbolic from the outset
  - Soften the revocation into merely a limitation of privilege rather than a reversal
  rationale: The verse itself contrasts a genuine prior statement with 'But now ... far be it from me,' and grounds the reversal in the principle that God honors those who honor him. The translation preserves this tension without importing a broader systematic resolution.
  doctrine_reference: Preserve theological tension rather than resolve it.
