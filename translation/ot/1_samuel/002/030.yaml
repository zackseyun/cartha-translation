id: 1SA.2.30
reference: 1 Samuel 2:30
source:
  edition: WLC
  text: לָ/כֵ֗ן נְאֻם יְהוָה֮ אֱלֹהֵ֣י יִשְׂרָאֵל֒ אָמ֣וֹר אָמַ֔רְתִּי בֵּֽיתְ/ךָ֙ וּ/בֵ֣ית אָבִ֔י/ךָ יִתְהַלְּכ֥וּ לְ/פָנַ֖/י עַד עוֹלָ֑ם וְ/עַתָּ֤ה נְאֻם יְהוָה֙ חָלִ֣ילָ/ה לִּ֔/י כִּֽי מְכַבְּדַ֥/י אֲכַבֵּ֖ד וּ/בֹזַ֥/י יֵקָֽלּוּ־־־־׃
translation:
  text: 'Therefore, declares Yahweh, the God of Israel: I indeed said that your house and your father’s house would walk before me forever. But now, declares Yahweh: far be it from me! For those who honor me I will honor, but those who despise me will be lightly esteemed.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be dishonored' or 'will be treated as insignificant.' The Hebrew verb carries the sense of becoming light, slight, or of little account, in contrast to 'I will honor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential particle introducing the divine conclusion/judgment based on the preceding indictment.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Idiomatic prophetic formula best rendered in readable modern English as 'declares the LORD.' 'the LORD' follows the project’s default for YHWH.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows DOCTRINE.md contested-terms guidance for the divine name.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct chain identifying YHWH covenantally.
- source_word: אָמֹר אָמַרְתִּי
  chosen: I indeed said
  alternatives:
  - I surely said
  - I plainly said
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the assertion. 'Indeed' preserves the emphasis without sounding wooden.
- source_word: בֵּיתְךָ וּבֵית אָבִיךָ
  chosen: your house and your father’s house
  alternatives:
  - your household and your ancestral house
  lexicon: HALOT
  rationale: '''House'' preserves the familial/dynastic sense and echoes the Hebrew repetition.'
- source_word: יִתְהַלְּכוּ לְפָנַי
  chosen: would walk before me
  alternatives:
  - would minister before me
  - would live before me
  lexicon: HALOT
  rationale: הלך in the hitpael with 'before me' can denote ongoing conduct/service in God's presence. 'Walk before me' preserves the Hebrew idiom and its covenantal resonance better than narrowing it to priestly ministry alone.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for all time
  - perpetually
  lexicon: HALOT
  rationale: Natural English rendering of durative covenantal language; context later qualifies the permanence of the prior declaration.
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now therefore
  lexicon: HALOT
  rationale: Marks a sharp reversal from the prior statement; 'But now' makes the contrast explicit in English.
- source_word: חָלִילָה לִּי
  chosen: far be it from me!
  alternatives:
  - never!
  - it must not be so for me!
  lexicon: HALOT
  rationale: Strong repudiation formula. 'Far be it from me!' is idiomatic and preserves the force of divine rejection of the supposed unconditional continuation.
- source_word: מְכַבְּדַי אֲכַבֵּד
  chosen: those who honor me I will honor
  alternatives:
  - those who glorify me I will glorify
  lexicon: HALOT
  rationale: The repeated כבד wordplay is preserved with 'honor ... honor.' 'Glorify' would sound overly elevated here and less relationally reciprocal.
- source_word: וּבֹזַי
  chosen: those who despise me
  alternatives:
  - those who scorn me
  - those who treat me with contempt
  lexicon: HALOT
  rationale: בזה denotes contempt/disdain; 'despise' is concise and weighty.
- source_word: יֵקָלּוּ
  chosen: will be lightly esteemed
  alternatives:
  - will be despised
  - will be dishonored
  - will be treated as insignificant
  lexicon: HALOT
  rationale: From קלל/קלה in the sense of being light, insignificant, or dishonored. 'Will be lightly esteemed' preserves the contrastive wordplay with 'honor' and reflects the passive/resultative sense better than simply repeating 'despised'.
