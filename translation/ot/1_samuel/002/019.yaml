id: 1SA.2.19
reference: 1 Samuel 2:19
source:
  edition: WLC
  text: וּ/מְעִ֤יל קָטֹן֙ תַּעֲשֶׂה לּ֣/וֹ אִמּ֔/וֹ וְ/הַעַלְתָ֥ה ל֖/וֹ מִ/יָּמִ֣ים
    יָמִ֑ימָ/ה בַּֽ/עֲלוֹתָ/הּ֙ אֶת אִישָׁ֔/הּ לִ/זְבֹּ֖חַ אֶת זֶ֥בַח הַ/יָּמִֽים־׀־־׃
translation:
  text: And his mother would make for him a small robe and bring it up to him from
    year to year, when she went up with her husband to offer the yearly sacrifice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a small cloak' or 'a little mantle.' The Hebrew מְעִיל refers to an
      outer garment; 'robe' best fits the likely sanctuary setting here.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from days to days,' an idiom meaning 'from year to year' or 'year
      by year.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעִיל
  chosen: robe
  alternatives:
  - cloak
  - mantle
  lexicon: HALOT
  rationale: מְעִיל denotes an outer garment or robe. 'Robe' fits the likely priestly/liturgical
    garment context for Samuel better than the more generic 'cloak' or archaic 'mantle.'
- source_word: קָטֹן
  chosen: small
  alternatives:
  - little
  lexicon: HALOT
  rationale: The adjective marks the garment as sized for a child. 'Small' is natural
    modern English; 'little' is possible but slightly more idiomatic than lexical.
- source_word: תַּעֲשֶׂה
  chosen: would make
  alternatives:
  - made
  - used to make
  lexicon: HALOT
  rationale: The imperfect here expresses customary past action in narrative. 'Would
    make' captures the repeated practice smoothly in English.
- source_word: וְהַעַלְתָה לּוֹ
  chosen: and bring it up to him
  alternatives:
  - and take it up to him
  - and bring it to him
  lexicon: HALOT
  rationale: עלה in pilgrimage/sanctuary contexts often carries the sense of going
    up to the sanctuary. 'Bring it up to him' preserves both the motion and the cultic-geographical
    nuance.
- source_word: מִיָּמִים יָמִימָה
  chosen: from year to year
  alternatives:
  - year by year
  - from days to days
  lexicon: HALOT
  rationale: This idiom means at regular yearly intervals. A literal rendering with
    'days' would obscure the sense; 'from year to year' is a standard and accurate
    idiomatic equivalent.
- source_word: בַּעֲלוֹתָהּ
  chosen: when she went up
  alternatives:
  - when she came up
  lexicon: HALOT
  rationale: The infinitive construct with preposition gives the temporal sense 'when
    she went up.' 'Went up' preserves the pilgrimage language tied to ascent to the
    sanctuary.
- source_word: אִישָׁהּ
  chosen: her husband
  alternatives:
  - her man
  lexicon: HALOT
  rationale: In this relational context אִישׁ with pronominal suffix means 'husband,'
    not merely 'man.'
- source_word: לִזְבֹּחַ
  chosen: to offer
  alternatives:
  - to sacrifice
  - to slaughter
  lexicon: HALOT
  rationale: While the verb fundamentally means 'to sacrifice/slaughter,' in English
    'offer' communicates the cultic act naturally when followed by 'sacrifice.'
- source_word: זֶבַח הַיָּמִים
  chosen: the yearly sacrifice
  alternatives:
  - the sacrifice of the days
  - the annual sacrifice
  lexicon: HALOT
  rationale: The phrase refers to the regularly recurring annual sacrificial observance.
    'Yearly sacrifice' is clear, idiomatic, and contextually precise.
