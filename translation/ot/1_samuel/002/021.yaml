theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD,' following the
    stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of עִם יְהוָה in Samuel's growth
  chosen_reading: in the presence of the LORD
  alternative_readings:
  - with the LORD
  - before the LORD
  rationale: The phrase is not a doctrinal statement about mystical union but a narrative
    description of Samuel's growth in the sanctuary setting before God. The chosen
    rendering preserves that theological and cultic nuance in idiomatic English.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve tension rather
    than over-resolve
