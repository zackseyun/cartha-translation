- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of עִם יְהוָה in Samuel's growth
  chosen_reading: in the presence of Yahweh
  alternative_readings:
  - with the LORD
  - before the LORD
  rationale: The phrase is not a doctrinal statement about mystical union but a narrative description of Samuel's growth in the sanctuary setting before God. The chosen rendering preserves that theological and cultic nuance in idiomatic English.
