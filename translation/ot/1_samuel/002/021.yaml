id: 1SA.2.21
reference: 1 Samuel 2:21
source:
  edition: WLC
  text: כִּֽי פָקַ֤ד יְהוָה֙ אֶת חַנָּ֔ה וַ/תַּ֛הַר וַ/תֵּ֥לֶד שְׁלֹשָֽׁה בָנִ֖ים וּ/שְׁתֵּ֣י בָנ֑וֹת וַ/יִּגְדַּ֛ל הַ/נַּ֥עַר שְׁמוּאֵ֖ל עִם יְהוָֽה־־־־׃ס
translation:
  text: For Yahweh visited Hannah, and she conceived and bore three sons and two daughters. And the boy Samuel grew before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD attended to Hannah' or 'the LORD cared for Hannah.' The Hebrew verb can denote gracious intervention on someone's behalf.
    reason: lexical_alternative
  - marker: b
    text: Literally 'with the LORD'; in context, this likely means Samuel grew up in the LORD's presence at the sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Now
  lexicon: HALOT
  rationale: Introduces an explanation or continuation from the previous verse; 'For' best preserves the causal/explanatory force in readable English.
- source_word: פָקַד
  chosen: visited
  alternatives:
  - attended to
  - took note of
  - cared for
  lexicon: HALOT
  rationale: פָקַד here refers to the LORD's gracious intervention on Hannah's behalf, resulting in conception. 'Visited' preserves the idiomatic biblical sense without over-interpreting as merely 'blessed,' while allowing the context to show the favorable action.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַתַּהַר
  chosen: she conceived
  alternatives:
  - she became pregnant
  lexicon: HALOT
  rationale: A direct and natural rendering of the verb for becoming pregnant; 'conceived' is concise and fits the narrative style.
- source_word: וַתֵּלֶד
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: Standard English rendering for ילד in birth contexts; compact and idiomatic alongside 'conceived.'
- source_word: שְׁלֹשָׁה בָנִים וּשְׁתֵּי בָנוֹת
  chosen: three sons and two daughters
  lexicon: HALOT
  rationale: A straightforward numerical and familial rendering with no need for expansion.
- source_word: וַיִּגְדַּל
  chosen: grew
  alternatives:
  - continued to grow
  - became great
  lexicon: HALOT
  rationale: In context this refers to Samuel's growth/maturation. 'Grew' is the most natural English equivalent and matches the narrative progression.
- source_word: הַנַּעַר שְׁמוּאֵל
  chosen: the boy Samuel
  alternatives:
  - young Samuel
  - the child Samuel
  lexicon: HALOT
  rationale: נַעַר commonly denotes a boy/youth. 'The boy Samuel' preserves the Hebrew apposition and keeps the narrative tone.
- source_word: עִם יְהוָה
  chosen: in the presence of the LORD
  alternatives:
  - with the LORD
  - before the LORD
  lexicon: HALOT
  rationale: Literally 'with the LORD,' but in this sanctuary context the phrase conveys Samuel's growth while ministering before God at the tabernacle. 'In the presence of the LORD' communicates the relational/cultic sense clearly in modern English without flattening it to mere physical proximity.
