id: 1SA.2.7
reference: 1 Samuel 2:7
source:
  edition: WLC
  text: יְהוָ֖ה מוֹרִ֣ישׁ וּ/מַעֲשִׁ֑יר מַשְׁפִּ֖יל אַף מְרוֹמֵֽם־׃
translation:
  text: The LORD makes poor and makes rich; he brings low and also lifts up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD impoverishes'; the Hebrew verb can also carry the broader idea
      of causing loss or dispossession.
    reason: lexical_alternative
  - marker: b
    text: Or 'exalts' or 'raises up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as 'The LORD' per the project's default for the divine name,
    following established English convention that reflects Jewish reverence tradition
    and the LXX pattern.
- source_word: מוֹרִישׁ
  chosen: makes poor
  alternatives:
  - impoverishes
  - causes to possess/dispossesses
  lexicon: HALOT
  rationale: The Hiphil of ירשׁ can mean 'cause to inherit/dispossess,' but in this
    poetic parallel with 'makes rich' the sense is economic reduction or impoverishment.
    'Makes poor' is idiomatic, clear, and preserves the antithetical balance of the
    line.
- source_word: וּמַעֲשִׁיר
  chosen: and makes rich
  alternatives:
  - and enriches
  lexicon: HALOT
  rationale: From עשׁר in the Hiphil, meaning to make rich. 'Makes rich' mirrors the
    causative force and pairs naturally with 'makes poor' in English.
- source_word: מַשְׁפִּיל
  chosen: he brings low
  alternatives:
  - he humbles
  - he lowers
  lexicon: HALOT
  rationale: The verb denotes causing someone to be low or humbled. 'Brings low' preserves
    the vertical imagery that matches the following 'lifts up' and avoids narrowing
    the sense to inward humility alone.
- source_word: אַף
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: HALOT
  rationale: Here אַף adds emphasis/extension to the second clause. 'Also' is natural
    in modern English and preserves the additive force without overtranslation.
- source_word: מְרוֹמֵם
  chosen: lifts up
  alternatives:
  - exalts
  - raises up
  lexicon: HALOT
  rationale: From רום in a causative sense, meaning to raise or exalt. 'Lifts up'
    keeps the concrete vertical parallel with 'brings low' and remains readable modern
    English.
