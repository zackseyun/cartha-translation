theological_decisions:
- issue: Rendering of יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the divine name, preserving
    established reverential convention without altering meaning.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of מַעֲבִרִים עַם יְהוָה
  chosen_reading: you are causing the LORD’s people to transgress
  alternative_readings:
  - the LORD’s people are spreading the report
  - those who make the LORD’s people transgress
  rationale: The Hebrew syntax is compressed and debated. In the immediate context
    Eli rebukes his sons for grievous sin that affects Israel, and the following verse
    speaks of sinning against the LORD. Rendering the clause causatively best fits
    the Hiphil form and contextual logic, while preserving the report-related alternative
    in a footnote.
