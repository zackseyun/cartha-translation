id: 1SA.2.24
reference: 1 Samuel 2:24
source:
  edition: WLC
  text: אַ֖ל בָּנָ֑/י כִּ֠י לֽוֹא טוֹבָ֤ה הַ/שְּׁמֻעָה֙ אֲשֶׁ֣ר אָנֹכִ֣י שֹׁמֵ֔עַ מַעֲבִרִ֖ים עַם יְהוָֽה־־׃
translation:
  text: No, my sons; for the report that I hear is not good. You are making Yahweh’s people transgress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following another understanding of the Hebrew, 'the report that I hear the LORD’s people spreading.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל
  chosen: 'No'
  alternatives:
  - Do not
  - Nay
  lexicon: HALOT
  rationale: Used here as an exclamatory negative in direct rebuke rather than a simple prohibition. 'No' fits natural modern English while preserving Eli’s sharp disapproval.
- source_word: בָּנַי
  chosen: my sons
  alternatives:
  - my children
  lexicon: HALOT
  rationale: The addressees are Eli’s male sons specifically, so 'my sons' is both literal and gender-accurate.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for Eli’s rebuke. 'For' preserves the explanatory force in a concise way.
- source_word: לֹא טוֹבָה
  chosen: is not good
  alternatives:
  - is bad
  - is not favorable
  lexicon: HALOT
  rationale: A straightforward rendering of the evaluative phrase. 'Is not good' preserves the Hebrew idiom without overinterpreting.
- source_word: הַשְּׁמֻעָה
  chosen: the report
  alternatives:
  - the news
  - the rumor
  lexicon: HALOT
  rationale: Refers to what is being heard about the sons' conduct. 'Report' fits the context of a circulating account without implying uncertainty as strongly as 'rumor'.
- source_word: אֲשֶׁר אָנֹכִי שֹׁמֵעַ
  chosen: that I hear
  alternatives:
  - which I am hearing
  - that I keep hearing
  lexicon: HALOT
  rationale: Natural English rendering of the relative clause. The participle can suggest ongoing hearing, but simple present communicates the sense adequately in English.
- source_word: מַעֲבִרִים
  chosen: you are causing ... to transgress
  alternatives:
  - you are making ... pass over
  - you are leading ... into sin
  - those spreading are
  lexicon: HALOT
  rationale: The Hiphil of עבר here is difficult and has been understood in more than one way. In context, Eli rebukes his sons for behavior that causes the people to violate covenantal faithfulness, so 'you are causing ... to transgress' best fits the sense and the broader narrative. An alternative textual/syntactical understanding is preserved in a footnote.
- source_word: עַם יְהוָה
  chosen: the LORD’s people
  alternatives:
  - the people of the LORD
  lexicon: HALOT
  rationale: Construct phrase rendered naturally in English. 'the LORD' follows the project’s default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
