id: 1SA.2.10
reference: 1 Samuel 2:10
source:
  edition: WLC
  text: יְהוָ֞ה יֵחַ֣תּוּ מריב/ו על/ו בַּ/שָּׁמַ֣יִם יַרְעֵ֔ם יְהוָ֖ה יָדִ֣ין אַפְסֵי
    אָ֑רֶץ וְ/יִתֶּן עֹ֣ז לְ/מַלְכּ֔/וֹ וְ/יָרֵ֖ם קֶ֥רֶן מְשִׁיחֽ/וֹ־־׃פ
translation:
  text: The LORD’s adversaries will be shattered; he will thunder against them from
    heaven. The LORD will judge the ends of the earth; he will give strength to his
    king and lift up the horn of his Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “those who contend with him” for “the LORD’s adversaries.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “in heaven”; rendered “from heaven” in English to express the source
      of the thunder.
    reason: lexical_alternative
  - marker: c
    text: Or, “his anointed one.” Hebrew מְשִׁיחוֹ (meshicho) can denote the LORD’s
      anointed king and also carries messianic significance.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project’s default rendering for the divine name, preserving
    covenantal reference while matching established English Bible convention.
- source_word: יֵחַתּוּ
  chosen: will be shattered
  alternatives:
  - will be broken
  - will be dismayed
  lexicon: HALOT
  rationale: The Niphal of חתת here most naturally conveys being broken or shattered
    in defeat. 'Will be shattered' captures the forceful judgment context better than
    the weaker 'dismayed.'
- source_word: מְרִיבוֹ עָלָיו
  chosen: the LORD’s adversaries
  alternatives:
  - those who contend with him
  - his opponents
  lexicon: HALOT
  rationale: The ketiv/qere tradition yields the sense of those contending against
    him. Rendering as 'the LORD’s adversaries' makes explicit that the referent of
    the pronouns is the LORD and reads naturally in English without losing the adversarial
    nuance.
- source_word: בַּשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - in heaven
  - in the heavens
  lexicon: HALOT
  rationale: With the following verb 'thunder against them,' English idiom favors
    'from heaven' to express the source of the divine action, though the Hebrew preposition
    is literally 'in.'
- source_word: יַרְעֵם
  chosen: he will thunder against them
  alternatives:
  - he will thunder at them
  - he will cause them to tremble with thunder
  lexicon: HALOT
  rationale: From רעם, 'to thunder.' The Hiphil with object suffix here indicates
    directed divine thunder against the enemies. 'Against them' brings out the hostile
    judicial force in context.
- source_word: יָדִין
  chosen: will judge
  alternatives:
  - will govern
  - will vindicate
  lexicon: HALOT
  rationale: דין here is judicial in the broad sense of exercising judgment over the
    whole earth. 'Will judge' best fits the parallelism with divine warfare and universal
    rule.
- source_word: אַפְסֵי אָרֶץ
  chosen: the ends of the earth
  alternatives:
  - the farthest parts of the earth
  - the extremities of the earth
  lexicon: HALOT
  rationale: A standard idiom for the remotest reaches of the world. 'The ends of
    the earth' is clear, natural, and preserves the universal scope.
- source_word: וְיִתֶּן עֹז
  chosen: he will give strength
  alternatives:
  - he will grant might
  - he will give power
  lexicon: HALOT
  rationale: עֹז denotes strength or might. 'Give strength' is straightforward and
    preserves the concrete sense of divine empowerment.
- source_word: לְמַלְכּוֹ
  chosen: to his king
  alternatives:
  - to his ruler
  lexicon: HALOT
  rationale: Though spoken before the establishment of monarchy in Israel, the Hebrew
    plainly says 'his king.' The translation should preserve the royal term rather
    than flatten it.
- source_word: וְיָרֵם קֶרֶן
  chosen: lift up the horn
  alternatives:
  - exalt the horn
  - raise up the strength
  lexicon: HALOT
  rationale: The idiom 'lift up the horn' signifies exalting strength, dignity, or
    victorious power. Retaining 'horn' preserves the Hebrew metaphor and its literary
    connection to Hannah’s song.
- source_word: מְשִׁיחוֹ
  chosen: his Messiah
  alternatives:
  - his anointed one
  lexicon: HALOT
  rationale: The noun means 'anointed one,' but per project philosophy titles should
    be translated to preserve messianic significance where context supports it. In
    this climactic royal line, 'his Messiah' preserves the theological and canonical
    weight while remaining a faithful lexical rendering.
