theological_decisions:
- issue: Rendering מְשִׁיחוֹ in a royal-poetic context with possible immediate and
    forward-looking messianic reference
  chosen_reading: his Messiah
  alternative_readings:
  - his anointed one
  rationale: The Hebrew lexeme is the source of the title 'Messiah.' In Hannah’s song,
    paired with 'his king,' it refers at minimum to the LORD’s anointed king and canonically
    resonates beyond the immediate horizon. Following the doctrine guideline to translate
    titles, 'his Messiah' preserves that weight without denying the near-term royal
    sense. The more generic 'his anointed one' is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Contested
    terms: Χριστός/Christos → Messiah where title; original-language primacy over
    translation tradition.'
