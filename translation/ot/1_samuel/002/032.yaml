id: 1SA.2.32
reference: 1 Samuel 2:32
source:
  edition: WLC
  text: וְ/הִבַּטְתָּ֙ צַ֣ר מָע֔וֹן בְּ/כֹ֥ל אֲשֶׁר יֵיטִ֖יב אֶת יִשְׂרָאֵ֑ל וְ/לֹֽא
    יִהְיֶ֥ה זָקֵ֛ן בְּ/בֵיתְ/ךָ֖ כָּל הַ/יָּמִֽים־־־־׃
translation:
  text: You will look on the distress of the dwelling in all the good that he does
    for Israel, and there will never be an old man in your house all the days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an adversary in the dwelling,' 'distress at the sanctuary,' or similar;
      the Hebrew phrase is difficult.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִבַּטְתָּ
  chosen: you will look on
  alternatives:
  - you will behold
  - you will look with envy upon
  - you will see
  lexicon: HALOT
  rationale: Hiphil of נבט commonly means to look, regard, or behold. Here it introduces
    Eli's future perception of judgment. 'Look on' is natural English and preserves
    the directness without over-interpreting the emotional nuance.
- source_word: צַר
  chosen: distress
  alternatives:
  - adversary
  - rival
  - trouble
  lexicon: HALOT
  rationale: The noun can denote an adversary or distress/trouble. In this context,
    paired with מָעוֹן and followed by a clause about Israel's good and the cutting
    off of old age from Eli's house, the sense is affliction/distress experienced
    in relation to the sanctuary/dwelling rather than a personal rival.
- source_word: מָעוֹן
  chosen: the dwelling
  alternatives:
  - the habitation
  - the sanctuary
  - the abode
  lexicon: HALOT
  rationale: מָעוֹן denotes a dwelling place or habitation. Because the context concerns
    the priestly house and the place of worship, 'the dwelling' preserves the lexical
    sense while allowing the reader to hear the sanctuary reference without importing
    a more specific term than the Hebrew itself requires.
- source_word: בְּכֹל אֲשֶׁר יֵיטִיב אֶת־יִשְׂרָאֵל
  chosen: in all the good that he does for Israel
  alternatives:
  - amid all the prosperity he grants Israel
  - while he does good to Israel
  lexicon: HALOT
  rationale: The phrase is broad and refers to all the beneficial good granted to
    Israel. 'In all the good that he does for Israel' stays close to the Hebrew syntax
    and leaves the subject of 'does good' implicit as in the source, most naturally
    God in context.
- source_word: זָקֵן
  chosen: an old man
  alternatives:
  - an elder
  - one advanced in years
  lexicon: HALOT
  rationale: The adjective/noun here refers to an aged man, not an office-holder.
    'Old man' is the plain sense and matches the judgment that no male in Eli's house
    will reach old age.
- source_word: בְּבֵיתְךָ
  chosen: in your house
  alternatives:
  - in your household
  - among your descendants
  lexicon: HALOT
  rationale: '''House'' in Hebrew can denote household or lineage. Here the judgment
    concerns Eli''s family line, but ''house'' is the standard and sufficiently transparent
    rendering; the broader familial sense is carried idiomatically in English biblical
    usage.'
- source_word: כָּל הַיָּמִים
  chosen: all the days
  alternatives:
  - ever
  - for all time
  lexicon: HALOT
  rationale: This idiom literally means 'all the days.' Retaining it preserves the
    solemn cadence and avoids overstating the temporal force beyond the Hebrew idiom.
