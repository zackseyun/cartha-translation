theological_decisions:
- issue: Interpretation of the difficult phrase צַר מָעוֹן
  chosen_reading: distress of the dwelling
  alternative_readings:
  - an adversary in the dwelling
  - distress at the sanctuary
  - a rival of the habitation
  rationale: The Hebrew is notably difficult. The chosen rendering stays relatively
    formal and preserves the ambiguity rather than resolving it into a specific hostile
    person or a fully paraphrased sanctuary judgment. This aligns with the translation
    philosophy of preserving tension where the source is genuinely uncertain.
  doctrine_reference: Translation philosophy §3
