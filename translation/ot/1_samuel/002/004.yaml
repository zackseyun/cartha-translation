id: 1SA.2.4
reference: 1 Samuel 2:4
source:
  edition: WLC
  text: קֶ֥שֶׁת גִּבֹּרִ֖ים חַתִּ֑ים וְ/נִכְשָׁלִ֖ים אָ֥זְרוּ חָֽיִל׃
translation:
  text: The bows of the mighty are shattered, but those who stumble are girded with
    strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are broken.'
    reason: lexical_alternative
  - marker: b
    text: Or 'have girded themselves with strength.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קֶשֶׁת
  chosen: bows
  alternatives:
  - bow
  lexicon: HALOT
  rationale: Although singular in form, it functions collectively with the plural
    genitive 'of the mighty' and the plural predicate, so English plural 'bows' best
    reflects the sense.
- source_word: גִּבֹּרִים
  chosen: the mighty
  alternatives:
  - warriors
  - strong men
  - heroes
  lexicon: HALOT
  rationale: The noun denotes strong or valiant persons, often warriors. 'The mighty'
    preserves the broad poetic force without narrowing it only to soldiers.
- source_word: חַתִּים
  chosen: are shattered
  alternatives:
  - are broken
  - are dismayed
  lexicon: HALOT
  rationale: In context with 'bow,' the sense is of being broken or shattered rather
    than emotional dismay. 'Are shattered' gives vivid poetic force appropriate to
    Hannah's song.
- source_word: נִכְשָׁלִים
  chosen: those who stumble
  alternatives:
  - the stumbling
  - the weak
  - those who falter
  lexicon: HALOT
  rationale: The participle literally refers to those who stumble or totter. 'Those
    who stumble' preserves the metaphor and allows the reversal imagery to stand.
- source_word: אָזְרוּ
  chosen: are girded
  alternatives:
  - have girded themselves
  - are equipped
  - are clothed
  lexicon: HALOT
  rationale: The verb means to gird or bind on, often with armor or strength. Passive
    English 'are girded' fits the poetic parallel and avoids over-specifying reflexive
    force not explicit in the Hebrew form.
- source_word: חָיִל
  chosen: strength
  alternatives:
  - might
  - valor
  - power
  lexicon: HALOT
  rationale: The noun can mean strength, valor, or military might. Here 'strength'
    best matches the reversal theme broadly, not only martial prowess.
