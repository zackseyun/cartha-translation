theological_decisions:
- issue: Poetic reversal imagery in Hannah's song
  chosen_reading: Retain the concrete martial and bodily metaphors ('bows,' 'stumble,'
    'girded') rather than flattening them into abstract statements about social reversal.
  alternative_readings:
  - The weapons of warriors are broken, but the weak become strong.
  rationale: The verse is poetic and theological in its portrayal of the LORD's reversal
    of human strength and weakness. Preserving the imagery keeps the text's literary
    and theological force without adding interpretation.
  doctrine_reference: Translation philosophy §§1, 3, 6
