id: 1SA.2.8
reference: 1 Samuel 2:8
source:
  edition: WLC
  text: מֵקִ֨ים מֵ/עָפָ֜ר דָּ֗ל מֵֽ/אַשְׁפֹּת֙ יָרִ֣ים אֶבְי֔וֹן לְ/הוֹשִׁיב֙ עִם
    נְדִיבִ֔ים וְ/כִסֵּ֥א כָב֖וֹד יַנְחִלֵ֑/ם כִּ֤י לַֽ/יהוָה֙ מְצֻ֣קֵי אֶ֔רֶץ וַ/יָּ֥שֶׁת
    עֲלֵי/הֶ֖ם תֵּבֵֽל־׃
translation:
  text: He raises the poor from the dust; he lifts the needy from the ash heap, to
    seat them with nobles and give them an inheritance of a seat of honor. For the
    pillars of the earth belong to the LORD, and on them he has set the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a throne of honor.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the foundations of the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵקִים
  chosen: raises
  alternatives:
  - sets up
  - lifts up
  lexicon: HALOT
  rationale: Hiphil participle of קום here denotes causing someone lowly to rise.
    'Raises' is natural English and pairs well with the following parallel verb.
- source_word: מֵעָפָר
  chosen: from the dust
  alternatives:
  - out of the dust
  lexicon: HALOT
  rationale: Retains the concrete image of extreme lowliness and mortality; 'dust'
    is the standard rendering.
- source_word: דָּל
  chosen: the poor
  alternatives:
  - the weak
  - the lowly
  lexicon: HALOT
  rationale: In this context of social reversal, דל refers to one of low economic
    and social status; 'the poor' is the clearest idiomatic rendering.
- source_word: מֵאַשְׁפֹּת
  chosen: from the ash heap
  alternatives:
  - from the dunghill
  - from the garbage heap
  lexicon: HALOT
  rationale: The term refers to a refuse heap. 'Ash heap' preserves the traditional
    image without using the now less natural 'dunghill'; the image of degradation
    remains clear.
- source_word: יָרִים
  chosen: lifts
  alternatives:
  - raises up
  - exalts
  lexicon: HALOT
  rationale: Hiphil of רום in parallel with 'raises' emphasizes elevation from humiliation.
    'Lifts' avoids redundancy while preserving the metaphor.
- source_word: אֶבְיוֹן
  chosen: the needy
  alternatives:
  - the poor
  - the destitute
  lexicon: HALOT
  rationale: Keeps the poetic parallel with דל while varying the English to reflect
    the distinct Hebrew term for one in want.
- source_word: לְהוֹשִׁיב עִם נְדִיבִים
  chosen: to seat them with nobles
  alternatives:
  - to make them sit with princes
  - to seat them with the noble
  lexicon: HALOT
  rationale: Infinitive expresses purpose/result. נְדִיבִים denotes nobles or princes;
    'nobles' is readable modern English and fits the social-elevation theme.
- source_word: וְכִסֵּא כָבוֹד
  chosen: a seat of honor
  alternatives:
  - a throne of honor
  - an honorable throne
  lexicon: HALOT
  rationale: כִסֵּא can mean 'throne' or 'seat.' Because the beneficiaries are the
    poor/needy generally, 'seat of honor' communicates elevated status without implying
    royal office too strongly; the more literal 'throne of honor' is preserved in
    a footnote.
- source_word: יַנְחִלֵם
  chosen: give them an inheritance of
  alternatives:
  - cause them to inherit
  - grant them possession of
  lexicon: HALOT
  rationale: Hiphil of נחל commonly means to cause to inherit or give as an inheritance.
    The English phrasing is adjusted for smoothness with the following object while
    preserving the inheritance motif.
- source_word: מְצֻקֵי אֶרֶץ
  chosen: the pillars of the earth
  alternatives:
  - the foundations of the earth
  - the supports of the earth
  lexicon: HALOT
  rationale: The noun denotes supports or foundational structures. 'Pillars' preserves
    the vivid cosmological metaphor common in Hebrew poetry; 'foundations' is a viable
    interpretive alternative preserved in a footnote.
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  lexicon: HALOT
  rationale: Standard rendering for the ordered inhabited world; 'world' is concise
    and idiomatic.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
