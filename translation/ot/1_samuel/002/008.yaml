theological_decisions:
- issue: Cosmological imagery in מְצֻקֵי אֶרֶץ
  chosen_reading: Retain the poetic image 'the pillars of the earth' as metaphorical
    cosmological language.
  alternative_readings:
  - Render interpretively as 'the foundations of the earth'
  rationale: The verse uses ancient poetic world-structure imagery to ground the LORD's
    sovereign power. Preserving the metaphor is more transparent to the Hebrew than
    flattening it into a purely abstract statement.
  doctrine_reference: Translation philosophy §1, §3
- issue: Status term כִסֵּא כָבוֹד
  chosen_reading: Render as 'a seat of honor' in the main text.
  alternative_readings:
  - '''a throne of honor'''
  rationale: The Hebrew is literally 'throne/seat of glory-honor.' Because the verse
    speaks broadly of the poor and needy being elevated, 'seat of honor' communicates
    exalted status in natural English without over-specifying royal enthronement;
    the more formal alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §6
