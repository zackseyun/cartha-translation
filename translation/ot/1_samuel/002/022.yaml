theological_decisions:
- issue: Nature of the women's role at the sanctuary
  chosen_reading: Render הַצֹּבְאוֹת as women who served at the entrance to the tent
    of meeting.
  alternative_readings:
  - women who assembled at the entrance to the tent of meeting
  rationale: The Hebrew participle can suggest organized service or assembling. In
    this cultic context and in light of the parallel wording in Exodus 38:8, 'served'
    best reflects likely function without importing later institutional categories
    such as 'priestesses.'
  doctrine_reference: Translation philosophy §1, §5
- issue: How explicitly to render the sexual misconduct
  chosen_reading: Use the euphemistic but clear phrase 'sleeping with.'
  alternative_readings:
  - lay with
  - had sexual relations with
  rationale: The Hebrew itself uses a conventional euphemism. The translation should
    neither obscure the sin nor become more clinical or graphic than the source text
    warrants.
  doctrine_reference: Translation philosophy §6
