id: 1SA.2.22
reference: 1 Samuel 2:22
source:
  edition: WLC
  text: וְ/עֵלִ֖י זָקֵ֣ן מְאֹ֑ד וְ/שָׁמַ֗ע אֵת֩ כָּל אֲשֶׁ֨ר יַעֲשׂ֤וּ/ן בָּנָי/ו֙
    לְ/כָל יִשְׂרָאֵ֔ל וְ/אֵ֤ת אֲשֶֽׁר יִשְׁכְּבוּ/ן֙ אֶת הַ/נָּשִׁ֔ים הַ/צֹּ֣בְא֔וֹת
    פֶּ֖תַח אֹ֥הֶל מוֹעֵֽד־־־־׃
translation:
  text: Now Eli was very old, and he heard all that his sons were doing to all Israel,
    and that they were sleeping with the women who served at the entrance to the tent
    of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the women who assembled at the entrance to the tent of meeting.' The
      Hebrew participle can denote assembling or serving in an organized way.
    reason: lexical_alternative
lexical_decisions:
- source_word: זָקֵן מְאֹד
  chosen: was very old
  alternatives:
  - was exceedingly old
  - had become very old
  lexicon: HALOT
  rationale: Predicate adjective plus intensifier naturally yields an English stative
    expression. 'Very old' is idiomatic and preserves the emphasis without sounding
    archaic.
- source_word: וְשָׁמַע
  chosen: and he heard
  alternatives:
  - and he kept hearing
  - and he came to hear
  lexicon: HALOT
  rationale: The qatal form in narrative reports the fact that Eli heard these reports.
    Simple past fits the discourse better than an iterative paraphrase.
- source_word: כָּל אֲשֶׁר יַעֲשׂוּן
  chosen: all that ... were doing
  alternatives:
  - everything that ... did
  - all that ... used to do
  lexicon: HALOT
  rationale: The construction denotes the totality of the sons' actions. English past
    progressive works well in context because the verse summarizes ongoing misconduct.
- source_word: לְכָל יִשְׂרָאֵל
  chosen: to all Israel
  alternatives:
  - for all Israel
  - against all Israel
  lexicon: HALOT
  rationale: The preposition ל here is best taken with the sense of relation toward
    the people affected by their conduct. 'To all Israel' is a close rendering; 'against'
    would over-interpret the nuance.
- source_word: יִשְׁכְּבוּן אֶת־הַנָּשִׁים
  chosen: they were sleeping with the women
  alternatives:
  - they lay with the women
  - they had sexual relations with the women
  lexicon: HALOT
  rationale: שׁכב with a human object is a sexual euphemism. 'Sleeping with' communicates
    the sexual sense in clear modern English while retaining the euphemistic register
    better than the more explicit alternative.
- source_word: הַצֹּבְאוֹת
  chosen: who served
  alternatives:
  - who were serving
  - who assembled
  - who ministered
  lexicon: HALOT
  rationale: The participle from צבא can denote service in an organized capacity.
    In this sanctuary context, 'served' is the clearest natural English rendering.
    'Assembled' is possible but weaker in light of cultic usage and Exodus 38:8.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  chosen: at the entrance to the tent of meeting
  alternatives:
  - at the doorway of the tent of meeting
  - at the entrance of the meeting tent
  lexicon: HALOT
  rationale: This is the standard sanctuary expression. 'Entrance to the tent of meeting'
    is readable modern English and preserves the technical cultic reference.
