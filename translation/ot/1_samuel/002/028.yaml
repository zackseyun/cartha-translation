theological_decisions:
- issue: Rendering of sacrificial term אִשֵּׁי
  chosen_reading: food offerings
  alternative_readings:
  - offerings made by fire
  rationale: The Hebrew denotes offerings presented by fire in the sacrificial system.
    'Food offerings' is idiomatic and readable in modern English, while a footnote
    preserves the more formally literal alternative because the sacrificial nuance
    matters theologically and ritually.
  doctrine_reference: Translation philosophy §§5–6
- issue: Gendered expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - people of Israel
  - Israelites
  rationale: Per the gender-accurate policy, the masculine plural construct is preserved
    rather than neutralized. In this covenantal-national formula, 'sons of Israel'
    reflects the source form most closely.
  doctrine_reference: Translation philosophy §4
