id: 1SA.2.28
reference: 1 Samuel 2:28
source:
  edition: WLC
  text: וּ/בָחֹ֣ר אֹ֠ת/וֹ מִ/כָּל שִׁבְטֵ֨י יִשְׂרָאֵ֥ל לִ/י֙ לְ/כֹהֵ֔ן לַ/עֲל֣וֹת
    עַֽל מִזְבְּחִ֗/י לְ/הַקְטִ֥יר קְטֹ֛רֶת לָ/שֵׂ֥את אֵפ֖וֹד לְ/פָנָ֑/י וָֽ/אֶתְּנָ/ה֙
    לְ/בֵ֣ית אָבִ֔י/ךָ אֶת כָּל אִשֵּׁ֖י בְּנֵ֥י יִשְׂרָאֵֽל־־־־׃
translation:
  text: And did I not choose him from all the tribes of Israel to be my priest, to
    go up to my altar, to burn incense, to carry an ephod before me? And I gave to
    your father's house all the food offerings of the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'all the offerings made by fire of the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָחֹר
  chosen: did I not choose
  alternatives:
  - and I chose
  - indeed I chose
  lexicon: HALOT
  rationale: The infinitive absolute-like form in this rhetorical context functions
    idiomatically as an emphatic assertion framed as a question in the larger discourse.
    English renders the force naturally as 'did I not choose' rather than a bare infinitive.
- source_word: אֹתוֹ
  chosen: him
  lexicon: HALOT
  rationale: Direct object pronoun referring to Aaron/the priestly ancestor; simple
    personal pronoun is sufficient.
- source_word: מִכָּל שִׁבְטֵי יִשְׂרָאֵל
  chosen: from all the tribes of Israel
  alternatives:
  - out of all the tribes of Israel
  lexicon: HALOT
  rationale: Expresses selection from among the tribes. 'From' is natural and preserves
    the partitive sense.
- source_word: לִי לְכֹהֵן
  chosen: to be my priest
  alternatives:
  - for me as priest
  - to serve me as priest
  lexicon: HALOT
  rationale: The double lamed marks purpose/result and relationship to God. 'My priest'
    is concise and preserves covenantal possession and office.
- source_word: לַעֲלוֹת עַל מִזְבְּחִי
  chosen: to go up to my altar
  alternatives:
  - to ascend to my altar
  - to offer on my altar
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend.' 'To go up to my altar' preserves
    the concrete cultic language without over-interpreting it as the act of offering
    itself.
- source_word: לְהַקְטִיר קְטֹרֶת
  chosen: to burn incense
  alternatives:
  - to make incense smoke
  - to offer incense
  lexicon: HALOT
  rationale: Standard cultic idiom. 'Burn incense' is clear modern English and accurately
    reflects the ritual action.
- source_word: לָשֵׂאת אֵפוֹד לְפָנַי
  chosen: to carry an ephod before me
  alternatives:
  - to bear an ephod before me
  - to wear an ephod before me
  lexicon: HALOT
  rationale: נשא is literally 'carry/bear.' Although in priestly context it may imply
    wearing, 'carry' stays closer to the Hebrew while remaining intelligible. The
    cultic object 'ephod' is transliterated as a garment/title-specific item lacking
    a precise English equivalent.
- source_word: וָאֶתְּנָה
  chosen: And I gave
  alternatives:
  - And I granted
  lexicon: HALOT
  rationale: Simple past narrative verb; 'gave' is the most direct rendering.
- source_word: לְבֵית אָבִיךָ
  chosen: to your father's house
  alternatives:
  - to the house of your father
  - to your ancestral house
  lexicon: HALOT
  rationale: Refers to Eli's ancestral priestly line. 'Your father's house' is the
    standard idiom in readable English.
- source_word: אֶת כָּל אִשֵּׁי בְּנֵי יִשְׂרָאֵל
  chosen: all the food offerings of the sons of Israel
  alternatives:
  - all the offerings made by fire of the sons of Israel
  - all the burnt offerings of the sons of Israel
  - all the LORD's offerings by fire from the sons of Israel
  lexicon: HALOT
  rationale: אִשֵּׁי refers broadly to offerings made by fire, not specifically burnt
    offerings. For accessible modern English, 'food offerings' is a recognized rendering
    that avoids the misleading narrowing of 'burnt offerings.' 'Sons of Israel' is
    retained as a gender-accurate formal equivalent of the Hebrew ethnonymic expression.
