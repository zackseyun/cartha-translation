id: 1SA.2.15
reference: 1 Samuel 2:15
source:
  edition: WLC
  text: גַּם֮ בְּ/טֶרֶם֮ יַקְטִר֣וּ/ן אֶת הַ/חֵלֶב֒ וּ/בָ֣א נַ֣עַר הַ/כֹּהֵ֗ן וְ/אָמַר֙
    לָ/אִ֣ישׁ הַ/זֹּבֵ֔חַ תְּנָ֣/ה בָשָׂ֔ר לִ/צְל֖וֹת לַ/כֹּהֵ֑ן וְ/לֹֽא יִקַּ֧ח מִמְּ/ךָ֛
    בָּשָׂ֥ר מְבֻשָּׁ֖ל כִּ֥י אִם חָֽי־׀־־׃
translation:
  text: Even before they burned the fat, the priest’s servant would come and say to
    the man who was sacrificing, “Give meat for the priest to roast, because he will
    not take boiled meat from you, but only raw.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the priest’s young man' or 'the priest’s attendant'; the Hebrew נַעַר
      can denote a youth or a servant, and here likely refers to a subordinate acting
      for the priest.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטֶרֶם
  chosen: before
  alternatives:
  - even before
  - prior to
  lexicon: HALOT
  rationale: Temporal marker indicating the action happened prior to the proper ritual
    step. Rendered with 'before,' with 'Even' retained in English from גַּם for emphasis.
- source_word: גַּם
  chosen: Even
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: Adds emphasis to the misconduct described, not simple addition. 'Even'
    best conveys the aggravating force in context.
- source_word: יַקְטִרוּן אֶת־הַחֵלֶב
  chosen: they burned the fat
  alternatives:
  - they offered up the fat in smoke
  - they turned the fat into smoke
  lexicon: HALOT
  rationale: Refers to the sacrificial burning of the fat portions. 'Burned the fat'
    is natural modern English while still reflecting the cultic act.
- source_word: נַעַר הַכֹּהֵן
  chosen: the priest’s servant
  alternatives:
  - the priest's young man
  - the priest's attendant
  lexicon: HALOT
  rationale: נַעַר can mean youth, servant, or attendant. In this context it denotes
    a subordinate acting on the priest's behalf, so 'servant' best captures function.
- source_word: לָאִישׁ הַזֹּבֵחַ
  chosen: to the man who was sacrificing
  alternatives:
  - to the man sacrificing
  - to the sacrificer
  lexicon: HALOT
  rationale: Participial construction identifies the worshiper engaged in offering
    sacrifice. Expanded slightly for clear idiomatic English.
- source_word: תְּנָה
  chosen: Give
  alternatives:
  - Give here
  - Hand over
  lexicon: HALOT
  rationale: Imperative demand. 'Give' preserves the blunt force of the command without
    embellishment.
- source_word: בָשָׂר
  chosen: meat
  alternatives:
  - flesh
  lexicon: HALOT
  rationale: In sacrificial-food context, 'meat' is the natural English equivalent;
    'flesh' would sound overly literal and less idiomatic.
- source_word: לִצְלוֹת
  chosen: to roast
  alternatives:
  - for roasting
  lexicon: HALOT
  rationale: Infinitive of purpose indicating the requested meat was intended for
    roasting.
- source_word: וְלֹא יִקַּח מִמְּךָ
  chosen: because he will not take from you
  alternatives:
  - for he does not want to take from you
  - and he will not accept from you
  lexicon: HALOT
  rationale: Imperfect here expresses the priest's stated refusal as a general or
    immediate future claim. 'Will not take' is straightforward and fits the direct
    speech.
- source_word: מְבֻשָּׁל
  chosen: boiled
  alternatives:
  - cooked
  lexicon: HALOT
  rationale: Specifically denotes meat prepared by boiling, contrasted with raw meat.
    'Boiled' preserves the contrast more precisely than the broader 'cooked.'
- source_word: כִּי אִם חָי
  chosen: but only raw
  alternatives:
  - but rather raw
  - except raw meat
  lexicon: HALOT
  rationale: 'Idiomatic exceptive expression: not boiled meat, but raw. ''But only
    raw'' is concise and natural in English while preserving the contrast.'
