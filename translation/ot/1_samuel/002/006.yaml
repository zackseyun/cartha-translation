id: 1SA.2.6
reference: 1 Samuel 2:6
source:
  edition: WLC
  text: יְהוָ֖ה מֵמִ֣ית וּ/מְחַיֶּ֑ה מוֹרִ֥יד שְׁא֖וֹל וַ/יָּֽעַל׃
translation:
  text: Yahweh puts to death and makes alive; he brings down to Sheol and raises up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead.' The Hebrew term 'Sheol' refers to the abode of the dead and should not be reduced automatically to 'hell.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מֵמִית
  chosen: puts to death
  alternatives:
  - kills
  - causes to die
  lexicon: HALOT
  rationale: The Hiphil of מות is causative. 'Puts to death' preserves the causative force while sounding natural in English; it is slightly more formal and less blunt than 'kills' while still direct.
- source_word: וּמְחַיֶּה
  chosen: and makes alive
  alternatives:
  - and gives life
  - and keeps alive
  lexicon: HALOT
  rationale: The Piel of חיה here is best rendered causatively as 'makes alive,' matching the parallel causative structure with 'puts to death.' 'Gives life' is possible but slightly more interpretive.
- source_word: מוֹרִיד
  chosen: he brings down
  alternatives:
  - he causes to go down
  - he lowers
  lexicon: HALOT
  rationale: The Hiphil participle of ירד is causative. 'He brings down' is idiomatic English and preserves the active divine agency in the poetic parallelism.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  - hell
  lexicon: HALOT
  rationale: Retaining 'Sheol' avoids collapsing the Hebrew concept into later or narrower English categories. 'Hell' is misleading here, and 'grave' may be too narrow. Because readers may benefit from the alternative sense, it is preserved in a footnote.
- source_word: וַיָּעַל
  chosen: and raises up
  alternatives:
  - and brings up
  - and causes to ascend
  lexicon: HALOT
  rationale: From עלה in the Hiphil/causative sense within this poetic pair, 'raises up' is the most natural English counterpart to 'brings down' and can encompass restoration from death or the realm of the dead without over-specifying resurrection terminology.
