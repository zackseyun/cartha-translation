theological_decisions:
- issue: Whether the verse should be rendered with explicit resurrection language
  chosen_reading: 'Use broader language: ''makes alive'' and ''raises up'' without
    specifying bodily resurrection.'
  alternative_readings:
  - Use explicit resurrection wording such as 'raises from the dead'
  rationale: The verse affirms the LORD's sovereign power over death and Sheol, but
    the Hebrew wording itself is broader and poetic. Rendering it more specifically
    as bodily resurrection would import a theological precision beyond the immediate
    lexical data. The translation preserves the theological tension and breadth of
    the Hebrew expression.
  doctrine_reference: Preserve theological tension rather than resolve it.
