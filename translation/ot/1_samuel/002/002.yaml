id: 1SA.2.2
reference: 1 Samuel 2:2
source:
  edition: WLC
  text: אֵין קָד֥וֹשׁ כַּ/יהוָ֖ה כִּ֣י אֵ֣ין בִּלְתֶּ֑/ךָ וְ/אֵ֥ין צ֖וּר כֵּ/אלֹהֵֽי/נוּ־׃
translation:
  text: There is none holy like Yahweh, for there is none besides you, and there is no rock like our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: "Yahweh." The main text follows the project default of rendering the divine name יְהוָה as "the LORD."'
    reason: alternative_reading
lexical_decisions:
- source_word: אֵין
  chosen: There is none / there is no
  alternatives:
  - none is
  - there is not
  lexicon: HALOT
  rationale: The particle of nonexistence is best rendered idiomatically in English with existential phrasing. Repeating it across the verse preserves the Hebrew emphasis and parallelism.
- source_word: קָדוֹשׁ
  chosen: holy
  alternatives:
  - sacred
  lexicon: HALOT
  rationale: '"Holy" is the standard and theologically weighty rendering, expressing God''s uniqueness and separateness. "Sacred" is weaker and less personal in this context.'
- source_word: כַּיהוָה
  chosen: like the LORD
  alternatives:
  - like Yahweh
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, "like." Per doctrine, יְהוָה is rendered "the LORD" in the main text rather than "Yahweh."
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the ground for the preceding claim. "For" preserves the poetic and explanatory force cleanly.
- source_word: בִּלְתֶּךָ
  chosen: besides you
  alternatives:
  - except you
  - apart from you
  lexicon: HALOT
  rationale: 'The form expresses exclusion: there is none apart from/besides God. "Besides you" is natural English and preserves the direct second-person address in Hannah''s prayer.'
- source_word: צוּר
  chosen: rock
  alternatives:
  - crag
  - refuge
  lexicon: HALOT
  rationale: '"Rock" is the established literal metaphor for God as strength, stability, and protection. Rendering it more interpretively as "refuge" would narrow the image beyond the Hebrew.'
- source_word: כֵּאלֹהֵינוּ
  chosen: like our God
  alternatives:
  - like our gods
  lexicon: HALOT
  rationale: Although אֱלֹהִים is morphologically plural, with the 1cp suffix and in reference to Israel's deity it functions as a singular title, rightly rendered "our God." The prefixed כ again marks comparison.
