theological_decisions:
- issue: Sense of Eli's house coming 'to him'
  chosen_reading: The pronoun refers to the acting priestly authority before whom
    Eli's surviving descendants will humble themselves.
  alternative_readings:
  - The pronoun could be taken more generally as referring to whoever holds priestly
    power at the time.
  rationale: 'The text emphasizes reversal: Eli''s line, once privileged, will become
    dependent and supplicant before another. The translation keeps the singular ''him''
    without over-specifying identity.'
