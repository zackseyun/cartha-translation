id: 1SA.2.36
reference: 1 Samuel 2:36
source:
  edition: WLC
  text: וְ/הָיָ֗ה כָּל הַ/נּוֹתָר֙ בְּ/בֵ֣יתְ/ךָ֔ יָבוֹא֙ לְ/הִשְׁתַּחֲוֺ֣ת ל֔/וֹ
    לַ/אֲג֥וֹרַת כֶּ֖סֶף וְ/כִכַּר לָ֑חֶם וְ/אָמַ֗ר סְפָחֵ֥/נִי נָ֛א אֶל אַחַ֥ת הַ/כְּהֻנּ֖וֹת
    לֶ/אֱכֹ֥ל פַּת לָֽחֶם־־־־׃ס
translation:
  text: And everyone left in your house will come to bow down to him for a piece of
    silver and a loaf of bread, and will say, ‘Please assign me to one of the priestly
    offices, so that I may eat a morsel of bread.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a silver coin'; the Hebrew names a small unit of silver.
    reason: lexical_alternative
  - marker: b
    text: Or 'attach me to one of the priestly duties.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנּוֹתָר
  chosen: left
  alternatives:
  - remaining
  - surviving
  lexicon: HALOT
  rationale: The participle from יתר/נותר denotes one who remains after judgment or
    loss. 'Left' is concise modern English and fits the context of the surviving members
    of Eli's house.
- source_word: בְּבֵיתְךָ
  chosen: in your house
  alternatives:
  - of your house
  - in your household
  lexicon: HALOT
  rationale: '''House'' preserves the familial/dynastic sense while remaining natural
    in English. The context is Eli''s household line, not merely a building.'
- source_word: לְהִשְׁתַּחֲוֺת לוֹ
  chosen: to bow down to him
  alternatives:
  - to prostrate himself before him
  - to pay homage to him
  lexicon: HALOT
  rationale: The verb commonly means bowing down in submission or supplication. 'Bow
    down to him' preserves the physical and social sense without overformalizing.
- source_word: לַאֲגֹרַת כֶּסֶף
  chosen: for a piece of silver
  alternatives:
  - for a silver coin
  - for a small piece of silver
  lexicon: HALOT
  rationale: אֲגוֹרָה refers to a small monetary unit. 'Piece of silver' keeps the
    literal monetary image without forcing a possibly unfamiliar technical denomination
    into the main text.
- source_word: כִּכַּר לָחֶם
  chosen: a loaf of bread
  alternatives:
  - a round loaf of bread
  - a cake of bread
  lexicon: HALOT
  rationale: כִּכָּר here refers to a round loaf/unit of bread. 'Loaf of bread' is
    the clearest natural rendering in modern English.
- source_word: סְפָחֵנִי
  chosen: assign me
  alternatives:
  - attach me
  - join me
  - appoint me
  lexicon: HALOT
  rationale: The imperative from ספח carries the idea of attaching or annexing someone
    to a group or role. In context the speaker begs to be attached to a priestly post
    for sustenance; 'assign me' communicates that practical sense best.
- source_word: נָא
  chosen: Please
  alternatives:
  - I pray
  - please now
  lexicon: HALOT
  rationale: נָא marks entreaty. 'Please' is the natural modern equivalent.
- source_word: אַחַת הַכְּהֻנּוֹת
  chosen: one of the priestly offices
  alternatives:
  - one of the priesthoods
  - one of the priestly duties
  - one of the priests' positions
  lexicon: HALOT
  rationale: The plural of כְּהֻנָּה here is best understood as priestly functions
    or offices rather than multiple priesthoods in a theological sense. 'Priestly
    offices' conveys a subordinate role or post within priestly service.
- source_word: לֶאֱכֹל פַּת לָחֶם
  chosen: so that I may eat a morsel of bread
  alternatives:
  - to eat a piece of bread
  - to eat a bit of bread
  lexicon: HALOT
  rationale: פַּת denotes a piece or morsel. 'Morsel of bread' preserves the humble,
    meager request and the pathos of the judgment oracle.
