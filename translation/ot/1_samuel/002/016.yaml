theological_decisions:
- issue: Sacrificial procedure implied by the worshiper's protest
  chosen_reading: Render the request so that the fat is burned before the servant
    takes meat, reflecting the ritual order without adding explanatory theology to
    the main text.
  alternative_readings:
  - Translate more woodenly without making the sequence explicit
  rationale: The verse contrasts proper sacrificial practice with the servants' abuse.
    Making the sequence clear is necessary for intelligibility, but the translation
    avoids importing extra ritual explanation into the main text.
