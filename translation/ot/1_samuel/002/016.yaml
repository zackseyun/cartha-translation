id: 1SA.2.16
reference: 1 Samuel 2:16
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֵלָ֜י/ו הָ/אִ֗ישׁ קַטֵּ֨ר יַקְטִיר֤וּ/ן כַּ/יּוֹם֙ הַ/חֵ֔לֶב
    וְ/קַ֨ח לְ/ךָ֔ כַּ/אֲשֶׁ֥ר תְּאַוֶּ֖ה נַפְשֶׁ֑/ךָ וְ/אָמַ֥ר ל/ו כִּ֚י עַתָּ֣ה
    תִתֵּ֔ן וְ/אִם לֹ֖א לָקַ֥חְתִּי בְ/חָזְקָֽה־׀־׃
translation:
  text: And the man would say to him, “Let them first burn the fat today, and then
    take for yourself whatever your soul desires.” But he would say to him, “No, you
    must give it now; and if not, I will take it by force.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Let them surely burn the fat today, then take for yourself
      as your soul desires.' The Hebrew uses an emphatic verbal form.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the person
  lexicon: HALOT
  rationale: Definite singular noun referring to the worshiper/offerer in the narrative.
    'The man' is the natural English equivalent and preserves the masculine singular
    form.
- source_word: קַטֵּר יַקְטִירוּן
  chosen: Let them first burn
  alternatives:
  - They should surely burn
  - Let them burn completely
  lexicon: HALOT
  rationale: Infinitive absolute + imperfect of קטר gives emphatic verbal force. In
    context the speaker is requesting proper ritual sequence before the servant takes
    meat. 'Let them first burn' captures both the imperative sense and the implied
    priority; 'first' is supplied from context and the following demand sequence,
    not as a paraphrase beyond the text.
- source_word: כַּיּוֹם
  chosen: today
  alternatives:
  - as on this day
  - at once today
  lexicon: HALOT
  rationale: Idiomatic temporal expression. 'Today' is the clearest modern English
    rendering in this context.
- source_word: הַחֵלֶב
  chosen: the fat
  lexicon: HALOT
  rationale: Refers to the sacrificial fat portions that were to be burned for the
    LORD. 'The fat' is the standard and contextually precise rendering.
- source_word: וְקַח לְךָ
  chosen: and then take for yourself
  alternatives:
  - and take for yourself
  - then you may take
  lexicon: HALOT
  rationale: Imperative addressed to the priestly servant after the fat is burned.
    'Then' makes explicit the sequence implied by the preceding request without changing
    the sense.
- source_word: כַּאֲשֶׁר תְּאַוֶּה נַפְשֶׁךָ
  chosen: whatever your soul desires
  alternatives:
  - whatever you desire
  - whatever your appetite craves
  lexicon: HALOT
  rationale: Literally 'as your soul desires.' Retaining 'soul' preserves the Hebrew
    idiom and vividness while remaining understandable in English.
- source_word: וְאָמַר לוֹ
  chosen: But he would say to him
  alternatives:
  - and he said to him
  - then he said to him
  lexicon: HALOT
  rationale: The qatal here functions in narrative continuation after the prior imperfective
    description, reporting the servant's characteristic response. 'Would say' fits
    the repeated/customary sense in context; 'But' reflects the adversative force
    of the exchange.
- source_word: כִּי עַתָּה תִתֵּן
  chosen: No, you must give it now
  alternatives:
  - Rather, give it now
  - Indeed, now you shall give
  lexicon: HALOT
  rationale: The Hebrew lacks an explicit 'no,' but English idiom benefits from it
    to convey the blunt contradiction. 'You must give it now' reflects the forceful
    demand of the imperfect in direct speech.
- source_word: וְאִם לֹא
  chosen: and if not
  alternatives:
  - but if not
  - otherwise
  lexicon: HALOT
  rationale: Straightforward conditional phrase introducing the threat.
- source_word: לָקַחְתִּי
  chosen: I will take it
  alternatives:
  - I would take it
  - I am taking it
  lexicon: HALOT
  rationale: Although formally perfect, in this threat context it has modal/future
    force in English. 'I will take it' best conveys the intended meaning.
- source_word: בְחָזְקָה
  chosen: by force
  alternatives:
  - forcibly
  - with violence
  lexicon: HALOT
  rationale: Denotes seizure through strength or coercion. 'By force' is concise and
    idiomatic.
