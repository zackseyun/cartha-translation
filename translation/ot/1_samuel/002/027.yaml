theological_decisions:
- issue: Reference of 'your father's house'
  chosen_reading: Eli's ancestral priestly house within Israel, likely the line of Aaron
  alternative_readings:
  - a narrower reference to a more immediate ancestor of Eli
  rationale: The context that follows concerns priestly election and judgment on Eli's line, so the phrase is best understood corporately and ancestrally rather than merely of Eli's immediate father. The translation keeps the wording broad enough to preserve the textual scope without importing later genealogical precision into the main text.
