id: 1SA.2.27
reference: 1 Samuel 2:27
source:
  edition: WLC
  text: וַ/יָּבֹ֥א אִישׁ אֱלֹהִ֖ים אֶל עֵלִ֑י וַ/יֹּ֣אמֶר אֵלָ֗י/ו כֹּ֚ה אָמַ֣ר יְהוָ֔ה הֲ/נִגְלֹ֤ה נִגְלֵ֨יתִי֙ אֶל בֵּ֣ית אָבִ֔י/ךָ בִּֽ/הְיוֹתָ֥/ם בְּ/מִצְרַ֖יִם לְ/בֵ֥ית פַּרְעֹֽה־־־׃
translation:
  text: 'And a man of God came to Eli and said to him, “Thus says Yahweh: Did I indeed reveal myself to your father''s house when they were in Egypt, in Pharaoh''s house?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Did I truly appear to your father's house when they were in Egypt, under Pharaoh's house?'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אֱלֹהִים
  chosen: a man of God
  alternatives:
  - a prophet
  - a divine messenger
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'man of God' and is a recognized designation for a prophetic messenger. Retaining the idiom preserves the source wording and its narrative flavor better than flattening it to 'prophet.'
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. 'the LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֲנִגְלֹה נִגְלֵיתִי
  chosen: Did I indeed reveal myself
  alternatives:
  - Did I plainly reveal myself
  - Did I truly appear
  lexicon: HALOT
  rationale: The construction combines an interrogative with an infinitive absolute plus finite verb of גלה for emphasis. 'Did I indeed reveal myself' captures both the interrogative force and the emphatic repetition without sounding wooden. 'Appear' is possible in context but is less directly tied to the verb 'reveal.'
- source_word: בֵּית אָבִיךָ
  chosen: your father's house
  alternatives:
  - the house of your father
  - your ancestral house
  lexicon: HALOT
  rationale: This refers to Eli's priestly lineage/household. 'Your father's house' is the natural English equivalent and preserves the familial-household sense.
- source_word: בִּהְיוֹתָם בְּמִצְרַיִם
  chosen: when they were in Egypt
  alternatives:
  - while they were in Egypt
  lexicon: HALOT
  rationale: The infinitive construct with prefixed preposition marks temporal circumstance. 'When they were in Egypt' is clear modern English.
- source_word: לְבֵית פַּרְעֹה
  chosen: belonging to Pharaoh's house
  alternatives:
  - in the house of Pharaoh
  - as slaves to Pharaoh's house
  - under Pharaoh's house
  lexicon: HALOT
  rationale: 'The lamed here is best taken in relation/subordination: Israel, and specifically Eli''s ancestral line within Israel, were under Pharaoh''s household authority in Egypt. ''Belonging to Pharaoh''s house'' expresses that dependence more naturally than a wooden ''to the house of Pharaoh,'' while avoiding over-interpretation such as explicitly adding ''slaves''.'
