theological_decisions:
- issue: Referent of 'my anointed one'
  chosen_reading: Rendered generically as 'my anointed one' rather than 'my Messiah'
    in the main text.
  alternative_readings:
  - my Messiah
  - my king
  rationale: Although משיח can be rendered 'Messiah' when functioning as a title,
    here the immediate historical setting points first to the LORD's anointed ruler/priestly
    order in Israel. The translation preserves the lexical sense while avoiding an
    anachronistic narrowing. A messianic extension may be recognized canonically,
    but it is not forced into the main text.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; preserve
    theological tension rather than resolve it.'
