id: 1SA.2.35
reference: 1 Samuel 2:35
source:
  edition: WLC
  text: וַ/הֲקִימֹתִ֥י לִ/י֙ כֹּהֵ֣ן נֶאֱמָ֔ן כַּ/אֲשֶׁ֛ר בִּ/לְבָבִ֥/י וּ/בְ/נַפְשִׁ֖/י
    יַעֲשֶׂ֑ה וּ/בָנִ֤יתִי ל/וֹ֙ בַּ֣יִת נֶאֱמָ֔ן וְ/הִתְהַלֵּ֥ךְ לִ/פְנֵֽי מְשִׁיחִ֖/י
    כָּל הַ/יָּמִֽים־־׃
translation:
  text: And I will raise up for myself a faithful priest, who will do according to
    what is in my heart and in my soul. And I will build for him a faithful house,
    and he will walk before my anointed one all the days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an enduring house'—that is, a lasting household or line.
    reason: lexical_alternative
  - marker: b
    text: '''My anointed one'' could also be rendered ''my Messiah'' or, in context,
      ''my king.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַהֲקִימֹתִי
  chosen: I will raise up
  alternatives:
  - I will establish
  - I will appoint
  lexicon: HALOT
  rationale: הקים in this context denotes causing someone to arise/stand in office.
    'Raise up' preserves both the personal and vocational sense without over-specifying
    the mechanism.
- source_word: לִי
  chosen: for myself
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The dative with first-person suffix is best rendered emphatically as
    'for myself,' highlighting divine initiative and possession.
- source_word: כֹּהֵן
  chosen: priest
  lexicon: HALOT
  rationale: Standard rendering for the cultic office.
- source_word: נֶאֱמָן
  chosen: faithful
  alternatives:
  - reliable
  - trustworthy
  lexicon: HALOT
  rationale: נֶאֱמָן here describes dependability and covenantal fidelity. 'Faithful'
    best preserves both moral and vocational dimensions.
- source_word: כַּאֲשֶׁר
  chosen: according to what
  alternatives:
  - as
  - just as
  lexicon: HALOT
  rationale: Introduces the standard by which the priest will act. 'According to what'
    reads naturally in English and reflects the comparative force.
- source_word: בִּלְבָבִי
  chosen: in my heart
  alternatives:
  - according to my heart
  lexicon: HALOT
  rationale: The preposition and noun are retained more literally to preserve the
    anthropomorphic expression of divine will.
- source_word: וּבְנַפְשִׁי
  chosen: and in my soul
  alternatives:
  - and in my being
  - and in my desire
  lexicon: HALOT
  rationale: נפש with first-person divine suffix intensifies the expression alongside
    'heart.' 'Soul' preserves the lexical form and theological weight, even though
    'being' is possible.
- source_word: יַעֲשֶׂה
  chosen: he will do
  alternatives:
  - he will act
  lexicon: HALOT
  rationale: עשה is broad; 'do' is sufficiently literal and idiomatic with the following
    standard phrase.
- source_word: וּבָנִיתִי
  chosen: I will build
  alternatives:
  - I will establish
  lexicon: HALOT
  rationale: The verb is literally 'build.' Though metaphorical with 'house,' retaining
    'build' preserves the imagery and allows the object to define the metaphor.
- source_word: בַּיִת נֶאֱמָן
  chosen: a faithful house
  alternatives:
  - an enduring house
  - a secure house
  lexicon: HALOT
  rationale: '''House'' here likely refers to a lasting priestly line or household.
    ''Faithful house'' preserves the repeated adjective נֶאֱמָן and leaves the metaphor
    intact; an explanatory alternative is preserved in a footnote.'
- source_word: וְהִתְהַלֵּךְ
  chosen: he will walk
  alternatives:
  - he will minister
  - he will conduct himself
  lexicon: HALOT
  rationale: הלך in the hitpael often denotes ongoing manner of life or service. 'Walk'
    preserves the Hebrew idiom; the more interpretive 'minister' is possible but narrower
    than the source.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: Standard rendering that preserves both spatial and relational nuance.
- source_word: מְשִׁיחִי
  chosen: my anointed one
  alternatives:
  - my Messiah
  - my king
  lexicon: HALOT
  rationale: From משיח, literally 'anointed one.' In this historical context it most
    naturally refers to the LORD's anointed ruler rather than functioning as a fixed
    messianic title. 'My anointed one' preserves the lexical meaning without importing
    a later christological specificity.
- source_word: כָּל הַיָּמִים
  chosen: all the days
  alternatives:
  - continually
  - all his days
  - forever
  lexicon: HALOT
  rationale: A literal rendering preserves the idiom and avoids overstating it as
    'forever,' which would be more interpretive in this context.
