id: 1SA.2.14
reference: 1 Samuel 2:14
source:
  edition: WLC
  text: וְ/הִכָּ֨ה בַ/כִּיּ֜וֹר א֣וֹ בַ/דּ֗וּד א֤וֹ בַ/קַּלַּ֨חַת֙ א֣וֹ בַ/פָּר֔וּר
    כֹּ֚ל אֲשֶׁ֣ר יַעֲלֶ֣ה הַ/מַּזְלֵ֔ג יִקַּ֥ח הַ/כֹּהֵ֖ן בּ֑/וֹ כָּ֚כָה יַעֲשׂ֣וּ
    לְ/כָל יִשְׂרָאֵ֔ל הַ/בָּאִ֥ים שָׁ֖ם בְּ/שִׁלֹֽה־׃
translation:
  text: and he would thrust it into the basin, or the pot, or the kettle, or the cooking
    pan; all that the fork brought up, the priest would take with it. This is what
    they did to all Israel who came there to Shiloh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'flesh-hook' for 'fork.' The Hebrew term refers to the meat-hook used
      in the sacrificial pot.
    reason: lexical_alternative
  - marker: b
    text: The exact distinctions among the vessel names are uncertain; the Hebrew
      lists several kinds of cooking containers.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִכָּה
  chosen: and he would thrust it
  alternatives:
  - and he struck
  - and he jabbed
  lexicon: HALOT
  rationale: The Hiphil of נכה here describes driving the three-pronged fork into
    the vessel, not merely 'striking' in a generic sense. 'Would thrust it' captures
    the repeated customary action in context (vv. 13–14).
- source_word: בַכִּיּוֹר
  chosen: into the basin
  alternatives:
  - into the laver
  lexicon: HALOT
  rationale: כִּיּוֹר commonly denotes a basin/laver. In this domestic-sacrificial
    cooking context, 'basin' is more natural modern English than the more cultic-sounding
    'laver'.
- source_word: בַדּוּד
  chosen: or the pot
  alternatives:
  - or the cauldron
  lexicon: HALOT
  rationale: דּוּד refers to a cooking pot/cauldron. 'Pot' is clear and readable;
    'cauldron' is possible but sounds more marked in English.
- source_word: בַקַּלַּחַת
  chosen: or the kettle
  alternatives:
  - or the pan
  lexicon: HALOT
  rationale: The term denotes a cooking vessel; 'kettle' preserves differentiation
    from the other vessel terms in the list without over-specifying.
- source_word: בַפָּרוּר
  chosen: or the cooking pan
  alternatives:
  - or the bowl
  - or the pan
  lexicon: HALOT
  rationale: The exact vessel type is somewhat uncertain, but it is a cooking/container
    implement distinct from the preceding items. 'Cooking pan' communicates function
    while preserving the list's variety.
- source_word: כֹּל אֲשֶׁר יַעֲלֶה הַמַּזְלֵג
  chosen: all that the fork brought up
  alternatives:
  - whatever the fork pulled up
  - everything that came up with the fork
  lexicon: HALOT
  rationale: The clause refers to whatever meat was caught and lifted by the fork
    from the vessel. 'Brought up' is idiomatic and close to the Hebrew עלה.
- source_word: הַמַּזְלֵג
  chosen: the fork
  alternatives:
  - the flesh-hook
  lexicon: HALOT
  rationale: Though older English versions use 'fleshhook,' modern readers understand
    'fork' better. The preceding verse specifies it as a three-pronged implement,
    so 'fork' is sufficient here.
- source_word: יִקַּח הַכֹּהֵן בּוֹ
  chosen: the priest would take with it
  alternatives:
  - the priest would take for himself with it
  - the priest would take by it
  lexicon: HALOT
  rationale: 'בּוֹ most naturally refers to the instrumentality of the fork: the priest
    took the meat with it. English requires making the pronoun''s referent explicit
    enough for clarity.'
- source_word: כָּכָה יַעֲשׂוּ
  chosen: This is what they did
  alternatives:
  - Thus they did
  - So they would do
  lexicon: HALOT
  rationale: The plural verb refers to the priestly servants/household acting in this
    manner as a customary practice. 'This is what they did' is natural English and
    preserves the summary force.
- source_word: לְכָל יִשְׂרָאֵל הַבָּאִים שָׁם בְּשִׁלֹה
  chosen: to all Israel who came there to Shiloh
  alternatives:
  - to every Israelite who came there to Shiloh
  - to all the Israelites coming there at Shiloh
  lexicon: HALOT
  rationale: The phrase denotes the worshipers from Israel who came to the sanctuary
    at Shiloh. 'All Israel' is a natural collective rendering and preserves the representative
    national scope.
