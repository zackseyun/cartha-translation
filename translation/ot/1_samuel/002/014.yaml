theological_decisions:
- issue: Referent and number in the summary clause
  chosen_reading: Retain the singular 'the priest' in the main action clause, but
    render the summary as plural 'they did' to reflect the Hebrew shift.
  alternative_readings:
  - 'Harmonize everything to singular: ''the priest did'''
  - Interpret the plural as an impersonal/generalizing singular
  rationale: The verse itself shifts from singular (describing the priest's taking)
    to plural (summarizing the broader abusive practice of Eli's priestly house/servants).
    Preserving the shift avoids smoothing over the Hebrew narrative texture.
  doctrine_reference: Translation philosophy §3, §5
