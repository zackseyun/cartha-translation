theological_decisions:
- issue: Number and sense of חסידו
  chosen_reading: 'collective/plural sense: ''his faithful ones'''
  alternative_readings:
  - 'singular: ''his faithful one'''
  rationale: Although the consonantal form can be read as singular with a 3ms suffix,
    the broader poetic parallelism and ancient versional support favor a collective
    sense here. This preserves the general principle of God's protection of the faithful
    in Hannah's song.
  doctrine_reference: Translation philosophy §3, §5
- issue: Rendering of אִישׁ
  chosen_reading: '''a man'' as representative/generic masculine'
  alternative_readings:
  - '''a person'''
  - '''anyone'''
  rationale: The source uses masculine singular with generic force. Following the
    gender-accurate policy, the translation retains 'man' rather than neutralizing
    it, while understanding the statement proverbially.
  doctrine_reference: Translation philosophy §4
