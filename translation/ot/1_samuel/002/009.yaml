id: 1SA.2.9
reference: 1 Samuel 2:9
source:
  edition: WLC
  text: רַגְלֵ֤י חסיד/ו יִשְׁמֹ֔ר וּ/רְשָׁעִ֖ים בַּ/חֹ֣שֶׁךְ יִדָּ֑מּוּ כִּֽי לֹ֥א
    בְ/כֹ֖חַ יִגְבַּר אִֽישׁ־־׃
translation:
  text: He guards the feet of his faithful ones, but the wicked are silenced in darkness,
    for not by strength does a man prevail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew textual tradition may also be read as singular, 'his faithful one';
      the plural sense 'his faithful ones' is adopted because it fits the poetic parallelism
      and likely intended collective meaning.
    reason: textual_variant
  - marker: b
    text: Or 'are still' / 'are cut off'; the Hebrew verb can denote being silent
      or stilled.
    reason: lexical_alternative
  - marker: c
    text: '''A man'' renders the Hebrew masculine singular used generically here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַגְלֵי
  chosen: the feet of
  alternatives:
  - the steps of
  lexicon: HALOT
  rationale: Literal plural construct of 'feet.' 'Feet' preserves the concrete Hebrew
    image; 'steps' is a possible idiomatic alternative but is less direct.
- source_word: חסידו
  chosen: his faithful ones
  alternatives:
  - his faithful one
  - his godly one
  - his saints
  lexicon: HALOT
  rationale: The ketiv/qere tradition affects number here; the sense in context is
    collective, and many witnesses/readings support a plural understanding. 'Faithful
    ones' communicates covenant loyalty without importing later ecclesiastical overtones
    of 'saints.'
- source_word: יִשְׁמֹר
  chosen: he guards
  alternatives:
  - he keeps
  - he watches over
  lexicon: HALOT
  rationale: Common verb for guarding/keeping. 'Guards' is concise, natural English
    and preserves the protective force.
- source_word: וּרְשָׁעִים
  chosen: but the wicked
  alternatives:
  - and the wicked
  lexicon: HALOT
  rationale: The conjunction here is adversative in sense, contrasting the faithful
    with the wicked. 'But' best reflects the discourse function in English.
- source_word: בַּחֹשֶׁךְ
  chosen: in darkness
  alternatives:
  - in the darkness
  lexicon: HALOT
  rationale: The prefixed article can be rendered generically in English. 'In darkness'
    is idiomatic and preserves the image of judgment/obscurity.
- source_word: יִדָּמּוּ
  chosen: are silenced
  alternatives:
  - are cut off
  - are still
  - perish in silence
  lexicon: HALOT
  rationale: Nifal of דמם commonly conveys being silent or stilled. 'Are silenced'
    captures both passivity and the likely judgment context better than the flatter
    'are still.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the preceding contrast. 'For' fits the explanatory
    function.
- source_word: לֹא בְכֹחַ
  chosen: not by strength
  alternatives:
  - not by power
  - not through might
  lexicon: HALOT
  rationale: כֹּחַ denotes strength/power. 'Strength' is straightforward and fits
    the proverb-like statement.
- source_word: יִגְבַּר
  chosen: does ... prevail
  alternatives:
  - is strong
  - overcomes
  - triumphs
  lexicon: HALOT
  rationale: The verb means to be strong or prevail. In this clause, 'prevail' best
    conveys successful dominance rather than mere possession of strength.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  - anyone
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and carries representative
    force. Per translation philosophy, the gender-accurate rendering 'a man' is preferred
    over a gender-neutral substitute.
