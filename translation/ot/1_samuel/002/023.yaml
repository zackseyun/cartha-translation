id: 1SA.2.23
reference: 1 Samuel 2:23
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לָ/הֶ֔ם לָ֥/מָּה תַעֲשׂ֖וּ/ן כַּ/דְּבָרִ֣ים הָ/אֵ֑לֶּה אֲשֶׁ֨ר
    אָנֹכִ֤י שֹׁמֵ֨עַ֙ אֶת דִּבְרֵי/כֶ֣ם רָעִ֔ים מֵ/אֵ֖ת כָּל הָ/עָ֥ם אֵֽלֶּה־־׃
translation:
  text: And he said to them, “Why do you do these things? For I hear from all these
    people about your evil deeds.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'I hear your evil matters/words from all these people.'
      The sense in context is that Eli is hearing reports of his sons' wicked conduct.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - So he said
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And he said' preserves the Hebrew
    narrative flow without overinterpreting discourse sequence.
- source_word: לָהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Direct object of speech, referring to Eli's sons in context.
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Natural interrogative introducing Eli's rebuke.
- source_word: תַעֲשׂוּן
  chosen: do you do
  alternatives:
  - are you doing
  - will you do
  lexicon: HALOT
  rationale: 'Imperfect 2mp in direct rebuke is best rendered as present habitual/actional
    English: ''do you do.'' This fits Eli''s response to ongoing conduct.'
- source_word: כַּדְּבָרִים הָאֵלֶּה
  chosen: these things
  alternatives:
  - such things
  - things like these
  - these deeds
  lexicon: HALOT
  rationale: Although דְּבָרִים is literally 'words/things/matters,' here it refers
    broadly to actions or matters being done. 'These things' is idiomatic and sufficiently
    close to the Hebrew.
- source_word: אֲשֶׁר
  chosen: For
  alternatives:
  - that
  - which
  lexicon: HALOT
  rationale: The relative particle introduces the content grounding the rebuke. In
    English, an explicit connective such as 'For' best conveys the explanatory force
    rather than a wooden relative clause.
- source_word: אָנֹכִי שֹׁמֵעַ
  chosen: I hear
  alternatives:
  - I am hearing
  lexicon: HALOT
  rationale: The participle with independent pronoun expresses ongoing or current
    report; simple present English communicates this naturally.
- source_word: אֶת דִּבְרֵיכֶם רָעִים
  chosen: about your evil deeds
  alternatives:
  - your evil things
  - evil reports about you
  - your evil actions
  lexicon: HALOT
  rationale: 'Literally, the phrase is awkward: ''your words/matters evil.'' In context
    Eli refers to the sons'' wicked conduct reported by the people. ''Your evil deeds''
    captures the sense of the reported misconduct. ''About'' is supplied in English
    to make the reporting construction natural.'
- source_word: מֵאֵת כָּל הָעָם אֵלֶּה
  chosen: from all these people
  alternatives:
  - from all this people
  - from all the people
  - from all these folk
  lexicon: HALOT
  rationale: מֵאֵת marks source, כָּל הָעָם means 'all the people,' and אֵלֶּה adds
    deictic emphasis, likely 'these.' 'From all these people' preserves both the collective
    sense and the demonstrative emphasis in readable English.
