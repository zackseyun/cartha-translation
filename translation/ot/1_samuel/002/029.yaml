theological_decisions:
- issue: Referent and force of the accusation against Eli
  chosen_reading: The verse accuses Eli of honoring his sons more than God by permitting
    abuse of the sacrificial system and sharing in its benefits.
  alternative_readings:
  - The plural opening may address Eli and his house collectively rather than Eli
    alone throughout.
  - The final clause may stress the choicest portions rather than simply the first
    portions.
  rationale: 'The shift from plural (''do you all scorn'') to singular (''you honor
    your sons'') is best represented without flattening it: the rebuke begins broadly
    and then focuses on Eli personally. The translation preserves the direct moral
    contrast without importing later doctrinal conclusions.'
  doctrine_reference: Translation philosophy §§1, 3, 5
