id: 1SA.2.29
reference: 1 Samuel 2:29
source:
  edition: WLC
  text: לָ֣/מָּה תִבְעֲט֗וּ בְּ/זִבְחִ/י֙ וּ/בְ/מִנְחָתִ֔/י אֲשֶׁ֥ר צִוִּ֖יתִי מָע֑וֹן
    וַ/תְּכַבֵּ֤ד אֶת בָּנֶ֨י/ךָ֙ מִמֶּ֔/נִּי לְ/הַבְרִֽיאֲ/כֶ֗ם מֵ/רֵאשִׁ֛ית כָּל
    מִנְחַ֥ת יִשְׂרָאֵ֖ל לְ/עַמִּֽ/י־־׃
translation:
  text: Why do you scorn my sacrifice and my offering, which I commanded for my dwelling,
    and honor your sons above me, fattening yourselves from the first of every offering
    of Israel, my people?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kick at' or 'treat with contempt.' The Hebrew verb is vivid, literally
      suggesting a contemptuous kicking at what God commanded.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'which I commanded for/in the dwelling.' The final word may refer
      to the sanctuary as God's dwelling place.
    reason: alternative_reading
  - marker: c
    text: Or 'making yourselves fat' or 'feeding yourselves from the choicest part
      of every offering of Israel, my people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִבְעֲטוּ
  chosen: scorn
  alternatives:
  - kick at
  - treat with contempt
  - despise
  lexicon: HALOT
  rationale: The verb literally evokes 'kicking at,' but in this rebuke the idiomatic
    sense is contemptuous rejection. 'Scorn' preserves the force without sounding
    wooden, while still reflecting the metaphor's disdainful edge.
- source_word: זִבְחִי
  chosen: my sacrifice
  alternatives:
  - my slaughter-offering
  lexicon: HALOT
  rationale: זֶבַח commonly denotes a sacrifice, often involving slaughter. 'My sacrifice'
    is the most natural and sufficiently precise English in this context.
- source_word: מִנְחָתִי
  chosen: my offering
  alternatives:
  - my grain offering
  - my gift offering
  lexicon: HALOT
  rationale: מִנְחָה can be more specifically a grain offering, but here paired with
    זִבְחִי it functions broadly for sacrificial offering. 'Offering' keeps the pair
    readable while allowing the broader cultic sense.
- source_word: אֲשֶׁר צִוִּיתִי מָעוֹן
  chosen: which I commanded for my dwelling
  alternatives:
  - which I commanded in my dwelling
  - which I commanded at the dwelling place
  - which I commanded for the habitation
  lexicon: HALOT
  rationale: מָעוֹן is difficult here. In context it most naturally refers to the
    sanctuary/dwelling place associated with God's worship. 'For my dwelling' gives
    coherent sense in English and fits the rebuke concerning sanctuary abuse. The
    prepositional nuance is somewhat compressed in Hebrew, so a footnote preserves
    alternatives.
- source_word: וַתְּכַבֵּד
  chosen: and honor
  alternatives:
  - and glorify
  - and make weighty
  lexicon: HALOT
  rationale: כבד in the piel/qal semantic field often means 'honor.' This is the standard
    and contextually appropriate rendering in the contrast between honoring sons and
    honoring God.
- source_word: מִמֶּנִּי
  chosen: above me
  alternatives:
  - more than me
  - rather than me
  lexicon: HALOT
  rationale: 'The comparative sense is clear: Eli has given greater honor to his sons
    than to God. ''Above me'' is idiomatic and forceful.'
- source_word: לְהַבְרִיאֲכֶם
  chosen: fattening yourselves
  alternatives:
  - making yourselves fat
  - feeding yourselves richly
  lexicon: HALOT
  rationale: The hiphil infinitive from ברא here refers to becoming fat/well-fed from
    illicit priestly consumption. 'Fattening yourselves' preserves the concrete, accusatory
    imagery better than a softened paraphrase.
- source_word: מֵרֵאשִׁית
  chosen: from the first
  alternatives:
  - from the choicest part
  - from the best part
  - from the first portion
  lexicon: HALOT
  rationale: רֵאשִׁית can mean first/beginning and by extension firstfruits or best/choicest
    portion. In this sacrificial context it likely points to the prime portion. 'From
    the first' stays close to the Hebrew, with the more interpretive 'choicest part'
    preserved in a footnote.
- source_word: כָּל מִנְחַת יִשְׂרָאֵל
  chosen: every offering of Israel
  alternatives:
  - every gift-offering of Israel
  - every grain offering of Israel
  lexicon: HALOT
  rationale: Because מִנְחָה here may function broadly for offerings brought by Israel,
    'every offering of Israel' is the clearest rendering. A narrower 'grain offering'
    is possible but less likely in the immediate accusation about priestly abuse of
    offerings generally.
- source_word: לְעַמִּי
  chosen: my people
  alternatives:
  - for my people
  lexicon: HALOT
  rationale: The phrase appositionally identifies Israel as God's people. English
    reads naturally as 'Israel, my people.' The dative/prepositional nuance is difficult
    to preserve smoothly, so the appositional sense is preferred.
