id: 1SA.2.18
reference: 1 Samuel 2:18
source:
  edition: WLC
  text: וּ/שְׁמוּאֵ֕ל מְשָׁרֵ֖ת אֶת פְּנֵ֣י יְהוָ֑ה נַ֕עַר חָג֖וּר אֵפ֥וֹד בָּֽד־׃
translation:
  text: Now Samuel was ministering before Yahweh, a boy clothed with a linen ephod.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''before the face/presence of the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁמוּאֵל
  chosen: Now Samuel
  alternatives:
  - And Samuel
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply as 'and,' but here 'now' gives natural English narrative flow while preserving the connective sense. The personal name is transliterated per translation philosophy.
- source_word: מְשָׁרֵת
  chosen: was ministering
  alternatives:
  - was serving
  - ministered
  lexicon: HALOT
  rationale: The participle denotes ongoing action. 'Was ministering' preserves the durative sense and fits cultic/service context better than the more generic 'was serving.'
- source_word: אֶת פְּנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: The idiom literally involves 'the face/presence of YHWH' and commonly means service in God's presence. 'Before the LORD' is idiomatic, concise, and standard for this Hebrew construction. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: נַעַר
  chosen: a boy
  alternatives:
  - a youth
  - a young boy
  - a servant-boy
  lexicon: HALOT
  rationale: נַעַר identifies Samuel as young. 'A boy' is the most natural and age-accurate English in this context, without importing servant status already conveyed by the participle.
- source_word: חָגוּר
  chosen: clothed with
  alternatives:
  - girded with
  - wearing
  lexicon: HALOT
  rationale: The passive participle literally means 'girded.' 'Clothed with' communicates the sense clearly in modern English while retaining the idea of being dressed in a specific garment. 'Girded' is more formal but less natural for contemporary readers.
- source_word: אֵפוֹד
  chosen: ephod
  alternatives:
  - priestly vest
  - apron
  lexicon: HALOT
  rationale: '''Ephod'' is a specific Israelite cultic garment with no exact English equivalent, so transliteration best preserves the referent. More interpretive substitutes risk overspecification or flattening the term.'
- source_word: בָּד
  chosen: linen
  alternatives:
  - fine linen
  lexicon: HALOT
  rationale: בָּד refers to linen material in priestly/clothing contexts. 'Linen' is the straightforward rendering; 'fine linen' adds a nuance not explicit here.
