id: 1SA.2.34
reference: 1 Samuel 2:34
source:
  edition: WLC
  text: וְ/זֶה לְּ/ךָ֣ הָ/א֗וֹת אֲשֶׁ֤ר יָבֹא֙ אֶל שְׁנֵ֣י בָנֶ֔י/ךָ אֶל חָפְנִ֖י
    וּ/פִֽינְחָ֑ס בְּ/י֥וֹם אֶחָ֖ד יָמ֥וּתוּ שְׁנֵי/הֶֽם־־־׃
translation:
  text: 'And this will be the sign to you that will come upon your two sons, Hophni
    and Phinehas: both of them will die on one day.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that will happen to your two sons.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'on one day'; that is, both will die the same day.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאוֹת
  chosen: the sign
  alternatives:
  - the token
  - the proof
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign or confirming mark. 'Sign' is the most natural
    modern English rendering and fits the prophetic-confirmatory sense here.
- source_word: אֲשֶׁר יָבֹא אֶל
  chosen: that will come upon
  alternatives:
  - which will come to
  - that will happen to
  lexicon: HALOT
  rationale: The idiom 'come upon' conveys an event or judgment arriving upon someone.
    This is more idiomatic in English than the more literal 'come to' while staying
    close to the Hebrew.
- source_word: שְׁנֵי בָנֶיךָ
  chosen: your two sons
  alternatives:
  - both your sons
  lexicon: HALOT
  rationale: The construct explicitly identifies the two sons belonging to Eli. 'Your
    two sons' preserves the directness of the Hebrew.
- source_word: אֶל חָפְנִי וּפִינְחָס
  chosen: Hophni and Phinehas
  rationale: The second אֶל introduces apposition, specifying who the two sons are.
    English expresses this naturally by naming them directly after 'your two sons'.
- source_word: בְּיוֹם אֶחָד
  chosen: on one day
  alternatives:
  - in one day
  - on the same day
  lexicon: HALOT
  rationale: The phrase most directly means 'on one day.' This preserves the temporal
    specificity without over-interpreting whether emphasis falls on simultaneity or
    a single calendar day.
- source_word: יָמוּתוּ שְׁנֵיהֶם
  chosen: both of them will die
  alternatives:
  - the two of them will die
  lexicon: HALOT
  rationale: The Hebrew places emphasis on both sons dying. 'Both of them will die'
    is natural English and preserves the emphatic inclusion of each son.
