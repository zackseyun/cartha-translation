theological_decisions:
- issue: Nature of the 'sign'
  chosen_reading: A confirming sign of the announced judgment on Eli's house
  alternative_readings:
  - A mere predictive omen without confirmatory force
  rationale: In context, the sign functions as confirmation that the prophetic word
    against Eli's house will indeed occur. The translation keeps the broader term
    'sign' and does not narrow it further in the main text.
