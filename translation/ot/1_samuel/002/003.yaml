id: 1SA.2.3
reference: 1 Samuel 2:3
source:
  edition: WLC
  text: אַל תַּרְבּ֤וּ תְדַבְּרוּ֙ גְּבֹהָ֣ה גְבֹהָ֔ה יֵצֵ֥א עָתָ֖ק מִ/פִּי/כֶ֑ם כִּ֣י אֵ֤ל דֵּעוֹת֙ יְהוָ֔ה ו/לא נִתְכְּנ֖וּ עֲלִלֽוֹת־׃
translation:
  text: Do not keep speaking so very proudly; do not let arrogance come out of your mouth, for Yahweh is a God of knowledge, and by him actions are weighed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following the consonantal text more strictly, 'and actions are not weighed.' The main text follows the traditional reading that the LORD evaluates human deeds.
    reason: textual_variant
lexical_decisions:
- source_word: אַל תַּרְבּוּ תְדַבְּרוּ
  chosen: Do not keep speaking
  alternatives:
  - Do not multiply speaking
  - Do not speak so much
  lexicon: HALOT
  rationale: 'The combination of רבה with a following finite verb intensifies or continues the action: not merely ''do not speak,'' but ''do not keep speaking'' or ''do not speak repeatedly.'' This preserves the prohibitive force while sounding natural in English.'
- source_word: גְּבֹהָה גְבֹהָה
  chosen: so very proudly
  alternatives:
  - highly highly
  - very haughtily
  - proud things
  lexicon: HALOT
  rationale: The doubled adjective/adverb conveys emphatic loftiness or haughtiness in speech. Rendering it adverbially as 'so very proudly' captures the Hebrew repetition and the moral sense in context.
- source_word: יֵצֵא עָתָק מִפִּיכֶם
  chosen: do not let arrogance come out of your mouth
  alternatives:
  - let no insolence come from your mouth
  - let no proud speech go out from your mouth
  lexicon: HALOT
  rationale: 'Although the Hebrew clause is formally ''arrogance/insolence goes out from your mouth,'' English idiom benefits from carrying over the prohibition from the previous clause: ''do not let arrogance come out of your mouth.'' עָתָק denotes arrogant, presumptuous, or insolent speech.'
- source_word: אֵל דֵּעוֹת יְהוָה
  chosen: the LORD is a God of knowledge
  alternatives:
  - the LORD is a God who knows
  - the LORD is God of all knowledge
  lexicon: HALOT
  rationale: The construct phrase literally means 'a God of knowledges.' English normally expresses this as 'a God of knowledge.' The plural likely intensifies fullness or comprehensiveness rather than requiring a wooden plural in translation.
- source_word: וְלֹא נִתְכְּנוּ עֲלִלוֹת
  chosen: by him actions are weighed
  alternatives:
  - deeds are measured
  - actions are evaluated
  - not actions are weighed
  lexicon: HALOT
  rationale: The ketiv/qere issue and ancient versions affect this clause. The traditional and contextually coherent sense is that human deeds are assessed by the LORD. 'Weighed' preserves the metaphor of measuring/evaluating actions. 'By him' makes explicit the implied agent in idiomatic English.
