theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpreting וְלֹא נִתְכְּנוּ עֲלִלוֹת
  chosen_reading: and by him actions are weighed
  alternative_readings:
  - and actions are not weighed
  - and to him deeds are measured
  rationale: The consonantal text with לֹא can yield 'and actions are not weighed,' but the sense adopted by many translations and supported by contextual coherence and traditional reading is that the LORD evaluates deeds. Because the alternative is textually and interpretively significant, it is preserved in a footnote rather than silently excluded.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
