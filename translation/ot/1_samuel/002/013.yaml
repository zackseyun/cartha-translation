id: 1SA.2.13
reference: 1 Samuel 2:13
source:
  edition: WLC
  text: וּ/מִשְׁפַּ֥ט הַ/כֹּהֲנִ֖ים אֶת הָ/עָ֑ם כָּל אִ֞ישׁ זֹבֵ֣חַ זֶ֗בַח וּ/בָ֨א
    נַ֤עַר הַ/כֹּהֵן֙ כְּ/בַשֵּׁ֣ל הַ/בָּשָׂ֔ר וְ/הַ/מַּזְלֵ֛ג שְׁלֹ֥שׁ הַ/שִּׁנַּ֖יִם
    בְּ/יָדֽ/וֹ־־־׃
translation:
  text: 'Now the custom of the priests with the people was this: whenever any man
    was sacrificing a sacrifice, the priest’s servant would come while the meat was
    boiling, with the three-pronged fork in his hand.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “flesh-hook”; the Hebrew refers to a fork-like implement used to take
      meat from the pot.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִשְׁפַּט
  chosen: Now the custom
  alternatives:
  - And the custom
  - And the rule
  - And the משפט/right due
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, legal claim, ordinance, or customary due.
    In this narrative context introducing priestly practice, 'custom' best captures
    the sense of an established practice rather than a judicial act. 'Now' renders
    the prefixed conjunction smoothly in English as a scene-setting transition.
- source_word: הַכֹּהֲנִים אֶת־הָעָם
  chosen: of the priests with the people
  alternatives:
  - of the priests toward the people
  - of the priests with respect to the people
  lexicon: HALOT
  rationale: The phrase describes the priests' customary dealing in relation to the
    people. 'With the people' is idiomatic and preserves the relational force without
    overinterpreting אֶת as hostility or benefit.
- source_word: כָּל־אִישׁ
  chosen: any man
  alternatives:
  - anyone
  - every man
  lexicon: HALOT
  rationale: The Hebrew is singular masculine generic. Per gender-accurate policy,
    'man' is retained rather than neutralizing to 'anyone,' while 'any' fits the distributive
    sense in English.
- source_word: זֹבֵחַ זֶבַח
  chosen: was sacrificing a sacrifice
  alternatives:
  - offered a sacrifice
  - was offering a sacrifice
  lexicon: HALOT
  rationale: The cognate verb-object construction is preserved to reflect the Hebrew
    emphasis and rhythm. The progressive 'was sacrificing' fits the temporal setting
    for the following action.
- source_word: וּבָא
  chosen: would come
  alternatives:
  - came
  - comes
  lexicon: HALOT
  rationale: Given the verse describes repeated customary action, English habitual
    'would come' communicates the iterative sense better than a simple past.
- source_word: נַעַר הַכֹּהֵן
  chosen: the priest’s servant
  alternatives:
  - the priest's young man
  - the priest's attendant
  - the priest's boy
  lexicon: HALOT
  rationale: נַעַר often denotes a youth or servant/attendant. Here the function is
    service to the priest in sacrificial handling, so 'servant' best conveys role
    without implying childish age.
- source_word: כְּבַשֵּׁל הַבָּשָׂר
  chosen: while the meat was boiling
  alternatives:
  - as the meat was being cooked
  - when the flesh was boiling
  lexicon: HALOT
  rationale: The preposition כ with infinitive construct gives a temporal sense, 'while/when
    ... was boiling.' 'Meat' is more natural modern English here than 'flesh' for
    sacrificial animal meat.
- source_word: הַמַּזְלֵג
  chosen: the ... fork
  alternatives:
  - flesh-hook
  - fork
  lexicon: HALOT
  rationale: The implement is a fork used in sacrificial meat handling. 'Fork' is
    clear modern English; the more traditional 'flesh-hook' is accurate but archaic,
    so it is preserved in a footnote.
- source_word: שְׁלֹשׁ הַשִּׁנַּיִם
  chosen: three-pronged
  alternatives:
  - with three teeth
  - three-toothed
  lexicon: HALOT
  rationale: Literally 'three teeth' describes the fork's tines. 'Three-pronged' is
    idiomatic English for the same image.
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - in its hand
  lexicon: HALOT
  rationale: The suffix refers to the priest's servant carrying the fork. 'In his
    hand' is the natural English rendering.
