id: 1SA.2.11
reference: 1 Samuel 2:11
source:
  edition: WLC
  text: וַ/יֵּ֧לֶךְ אֶלְקָנָ֛ה הָ/רָמָ֖תָ/ה עַל בֵּית֑/וֹ וְ/הַ/נַּ֗עַר הָיָ֤ה מְשָׁרֵת֙
    אֶת יְהוָ֔ה אֶת פְּנֵ֖י עֵלִ֥י הַ/כֹּהֵֽן־־־׃
translation:
  text: Then Elkanah went to Ramah, to his house; and the boy was ministering to the
    LORD in the presence of Eli the priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "before Eli the priest"; the Hebrew literally says "at/in the presence
      of Eli the priest."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - returned
  - departed
  lexicon: HALOT
  rationale: The wayyiqtol of הלך normally advances the narrative with 'went.' 'Returned'
    is possible from context after the family had been at Shiloh, but the verb itself
    does not explicitly encode 'return,' so 'went' best reflects the Hebrew while
    remaining natural in English.
- source_word: הָרָמָתָה
  chosen: to Ramah
  alternatives:
  - toward Ramah
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward/into Ramah.
    'To Ramah' is the standard natural English rendering.
- source_word: עַל בֵּיתוֹ
  chosen: to his house
  alternatives:
  - to his home
  - upon his house
  lexicon: HALOT
  rationale: The preposition עַל in this idiom functions in the sense of movement
    to one's household/home. A literal 'upon his house' would be misleading in English.
    'To his house' preserves the destination sense with adequate formality.
- source_word: וְהַנַּעַר
  chosen: the boy
  alternatives:
  - the child
  - the young man
  lexicon: HALOT
  rationale: נַעַר can range from child to young man depending on context. Here Samuel
    is still presented as a young boy serving at the sanctuary, so 'the boy' best
    fits the narrative stage and keeps the concreteness of the Hebrew.
- source_word: הָיָה מְשָׁרֵת
  chosen: was ministering
  alternatives:
  - was serving
  - ministered
  lexicon: HALOT
  rationale: The היה + participle construction conveys ongoing or durative action.
    'Was ministering' captures that aspect better than the simple past 'ministered.'
    'Serving' is possible, but 'ministering' better reflects cultic/sanctuary service
    in this context.
- source_word: אֶת יְהוָה
  chosen: to the LORD
  alternatives:
  - before the LORD
  lexicon: HALOT
  rationale: With שׁרת, the object marker plus divine name indicates the one served.
    Following the doctrine guideline for יְהוָה, the divine name is rendered 'the
    LORD.' English idiom prefers 'ministering to the LORD' for this service relationship.
- source_word: אֶת פְּנֵי עֵלִי הַכֹּהֵן
  chosen: in the presence of Eli the priest
  alternatives:
  - before Eli the priest
  - under Eli the priest
  lexicon: HALOT
  rationale: The phrase literally involves 'the face/presence of' Eli. In this context
    it likely indicates Samuel's service was carried out before or under the oversight
    of Eli. 'In the presence of Eli the priest' is transparent and avoids over-interpreting
    the relationship as strictly hierarchical, while preserving the spatial-relational
    sense.
