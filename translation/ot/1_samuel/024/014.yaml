id: 1SA.24.14
reference: 1 Samuel 24:14
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֣ר יֹאמַ֗ר מְשַׁל֙ הַ/קַּדְמֹנִ֔י מֵ/רְשָׁעִ֖ים יֵ֣צֵא רֶ֑שַׁע וְ/יָדִ֖/י
    לֹ֥א תִֽהְיֶה בָּֽ/ךְ־׃
translation:
  text: As the ancient proverb says, ‘Wickedness comes out from the wicked,’ but my
    hand will not be against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'As the proverb of the ancients says.' The Hebrew adjective can be understood
      as 'ancient' or as referring to 'the ancients.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: As
  alternatives:
  - Just as
  - According as
  lexicon: HALOT
  rationale: Introduces a comparison or citation formula. 'As' is concise and natural
    in English before a quoted saying.
- source_word: יֹאמַר
  chosen: says
  alternatives:
  - will say
  - said
  lexicon: HALOT
  rationale: 'The imperfect here functions generically in a proverbial citation: ''as
    ... says.'' Present tense best conveys an ongoing, gnomic statement in English.'
- source_word: מְשַׁל
  chosen: proverb
  alternatives:
  - parable
  - saying
  - maxim
  lexicon: HALOT
  rationale: In this context the noun refers to a traditional wisdom saying, not an
    extended parable. 'Proverb' best matches the concise moral aphorism quoted.
- source_word: הַקַּדְמֹנִי
  chosen: ancient
  alternatives:
  - of the ancients
  - former
  - old
  lexicon: HALOT
  rationale: The adjective denotes what is ancient or from former times. 'Ancient
    proverb' is idiomatic English and preserves the sense of venerable antiquity.
- source_word: מֵרְשָׁעִים
  chosen: from the wicked
  alternatives:
  - out of wicked men
  - from wicked people
  lexicon: HALOT
  rationale: 'The preposition מִן marks source: wickedness proceeds from wicked persons.
    ''The wicked'' is a natural collective rendering and preserves the moral category.'
- source_word: יֵצֵא
  chosen: comes out
  alternatives:
  - proceeds
  - goes forth
  lexicon: HALOT
  rationale: The verb literally means 'goes out/comes out.' 'Comes out' is vivid,
    readable modern English and fits the proverb's imagery of evil issuing from evil
    people.
- source_word: רֶשַׁע
  chosen: wickedness
  alternatives:
  - evil
  - wrongdoing
  lexicon: HALOT
  rationale: The noun denotes wickedness or evil conduct. 'Wickedness' preserves the
    lexical connection with 'wicked' in the previous word and reflects the proverb's
    wordplay.
- source_word: וְיָדִי
  chosen: but my hand
  alternatives:
  - and my hand
  - yet my hand
  lexicon: HALOT
  rationale: '''Hand'' is retained literally as a Hebrew idiom for personal action
    or violence. The conjunction is rendered adversatively (''but'') because the clause
    contrasts David''s conduct with the proverb''s principle.'
- source_word: לֹא תִהְיֶה בָּךְ
  chosen: will not be against you
  alternatives:
  - shall not be upon you
  - will not touch you
  - will not be on you
  lexicon: HALOT
  rationale: Literally, 'will not be in/against you.' In context it means David will
    not act harmfully toward Saul. 'Will not be against you' preserves the metaphor
    of the hand while making the hostile sense clear in English.
