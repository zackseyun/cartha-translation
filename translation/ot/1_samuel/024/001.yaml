id: 1SA.24.1
reference: 1 Samuel 24:1
source:
  edition: WLC
  text: וַ/יַּ֥עַל דָּוִ֖ד מִ/שָּׁ֑ם וַ/יֵּ֖שֶׁב בִּ/מְצָד֥וֹת עֵֽין גֶּֽדִי־׃
translation:
  text: Then David went up from there and stayed in the strongholds of En-gedi.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - came up
  - ascended
  lexicon: HALOT
  rationale: עלה commonly denotes upward movement. 'Went up' is the natural narrative
    English equivalent and preserves the directional sense without sounding overly
    formal.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - from that place
  lexicon: HALOT
  rationale: A straightforward deictic adverb; 'from there' is the most idiomatic
    and precise rendering in context.
- source_word: וַיֵּשֶׁב
  chosen: stayed
  alternatives:
  - dwelt
  - settled
  - lived
  lexicon: HALOT
  rationale: ישב can mean sit, dwell, remain, or stay depending on context. Here in
    a movement narrative, 'stayed' best conveys that David took up residence there
    for a time without implying permanent settlement.
- source_word: בִּמְצָדוֹת
  chosen: in the strongholds
  alternatives:
  - in the fortresses
  - in the mountain strongholds
  - in the refuges
  lexicon: HALOT
  rationale: מצדות refers to defensible places or strongholds. 'Strongholds' is the
    standard and contextually apt rendering for David's wilderness refuges; 'fortresses'
    could suggest built military structures more strongly than the Hebrew requires.
- source_word: עֵין גֶּדִי
  chosen: En-gedi
  alternatives:
  - En Gedi
  lexicon: HALOT
  rationale: This is a place name and should be transliterated rather than translated,
    per translation philosophy. The hyphenated form is a standard English convention
    for the toponym.
