id: 1SA.24.3
reference: 1 Samuel 24:3
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח שָׁא֗וּל שְׁלֹ֧שֶׁת אֲלָפִ֛ים אִ֥ישׁ בָּח֖וּר מִ/כָּל יִשְׂרָאֵ֑ל
    וַ/יֵּ֗לֶךְ לְ/בַקֵּ֤שׁ אֶת דָּוִד֙ וַֽ/אֲנָשָׁ֔י/ו עַל פְּנֵ֖י צוּרֵ֥י הַ/יְּעֵלִֽים־־־׃
translation:
  text: Then Saul took three thousand chosen men from all Israel and went to seek
    David and his men on the face of the rocks of the wild goats.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the crags of the wild goats'; the animal may specifically be the ibex.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - selected
  - took with him
  lexicon: HALOT
  rationale: The verb לקח in this narrative context means Saul took or mustered men
    for the expedition. 'Took' is the most direct rendering and leaves the object
    relation intact.
- source_word: שְׁלֹשֶׁת אֲלָפִים אִישׁ
  chosen: three thousand men
  alternatives:
  - three thousand troops
  lexicon: HALOT
  rationale: The idiom literally combines the numeral with 'thousands' and singular
    אִישׁ, a common way to count persons. 'Three thousand men' is natural English
    and preserves the military sense without overinterpreting.
- source_word: בָּחוּר
  chosen: chosen
  alternatives:
  - select
  - picked
  lexicon: HALOT
  rationale: בָּחוּר here denotes selected or choice men. 'Chosen' is concise and
    idiomatic in military contexts.
- source_word: מִכָּל יִשְׂרָאֵל
  chosen: from all Israel
  alternatives:
  - out of all Israel
  - from throughout Israel
  lexicon: HALOT
  rationale: The phrase indicates selection from the whole nation. 'From all Israel'
    is a straightforward rendering.
- source_word: וַיֵּלֶךְ לְבַקֵּשׁ
  chosen: went to seek
  alternatives:
  - went to look for
  - set out to search for
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'Went to seek' preserves the formal
    structure and the seriousness of Saul's pursuit.
- source_word: אֶת דָּוִד וַאֲנָשָׁיו
  chosen: David and his men
  alternatives:
  - David and the men with him
  lexicon: HALOT
  rationale: This is the plain referential sense. 'His men' is the standard concise
    rendering for David's followers.
- source_word: עַל פְּנֵי
  chosen: on the face of
  alternatives:
  - in front of
  - by
  - near
  lexicon: HALOT
  rationale: Literally 'on the face of.' Although somewhat wooden, it preserves the
    topographical expression and avoids prematurely collapsing it into a looser spatial
    relation.
- source_word: צוּרֵי הַיְּעֵלִים
  chosen: the rocks of the wild goats
  alternatives:
  - the crags of the wild goats
  - the rocks of the ibexes
  lexicon: HALOT
  rationale: צוּרִים are rocky cliffs/crags; יְעֵלִים are wild goats, likely ibex.
    'Rocks of the wild goats' stays close to the Hebrew while remaining understandable.
    The more zoologically precise 'ibexes' is possible but less accessible in the
    main text.
