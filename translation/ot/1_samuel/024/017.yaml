theological_decisions:
- issue: Saul's address 'my son David'
  chosen_reading: Retained as relational and rhetorical language, not as a literal
    statement of sonship.
  alternative_readings:
  - A purely political term of favor or patronage
  rationale: The Hebrew plainly uses filial language. The translation preserves the
    emotional and covenantal-social nuance without importing any doctrinal significance.
  doctrine_reference: Translation philosophy §1, §3
