id: 1SA.24.17
reference: 1 Samuel 24:17
source:
  edition: WLC
  text: וַ/יְהִ֣י כְּ/כַלּ֣וֹת דָּוִ֗ד לְ/דַבֵּ֞ר אֶת הַ/דְּבָרִ֤ים הָ/אֵ֨לֶּה֙ אֶל
    שָׁא֔וּל וַ/יֹּ֣אמֶר שָׁא֔וּל הֲ/קֹלְ/ךָ֥ זֶ֖ה בְּנִ֣/י דָוִ֑ד וַ/יִּשָּׂ֥א שָׁא֛וּל
    קֹל֖/וֹ וַ/יֵּֽבְךְּ׀־־׃
translation:
  text: When David had finished speaking these words to Saul, Saul said, “Is this
    your voice, my son David?” Then Saul lifted up his voice and wept.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'David my son.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְּכַלּוֹת
  chosen: When ... had finished
  alternatives:
  - And it happened, when ... finished
  - As soon as ... finished
  lexicon: HALOT
  rationale: The waw + היה with כְ + infinitive construct forms a temporal clause
    introducing the next action. 'When ... had finished' is natural modern English
    and preserves the sequence without woodenly reproducing 'and it happened.'
- source_word: לְדַבֵּר
  chosen: speaking
  alternatives:
  - to speak
  lexicon: HALOT
  rationale: Used with כְּכַלּוֹת to express completion of David's speech. English
    idiom prefers 'had finished speaking.'
- source_word: אֶת־הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - these statements
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words' or 'matters/things.' In direct speech context,
    'these words' best reflects the immediate verbal content.
- source_word: אֶל־שָׁאוּל
  chosen: to Saul
  alternatives:
  - to/unto Saul
  lexicon: HALOT
  rationale: Standard directional use; 'to Saul' is clear modern English.
- source_word: הֲקֹלְךָ זֶה
  chosen: Is this your voice
  alternatives:
  - Is this your sound
  - Is that your voice
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice' in contexts of recognizable speech. The interrogative
    הֲ with demonstrative זֶה yields a direct recognition question. 'This' matches
    the proximal demonstrative more closely than 'that.'
- source_word: בְּנִי דָוִד
  chosen: my son David
  alternatives:
  - David my son
  lexicon: HALOT
  rationale: Retains Saul's paternal language toward David. Word order is adjusted
    for natural English while preserving the relational force.
- source_word: וַיִּשָּׂא ... קֹלוֹ
  chosen: lifted up his voice
  alternatives:
  - raised his voice
  - cried aloud
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for audible emotional expression. 'Lifted
    up his voice' preserves the idiom and suits the solemn narrative tone.
- source_word: וַיֵּבְךְּ
  chosen: wept
  alternatives:
  - cried
  lexicon: HALOT
  rationale: The verb specifically denotes weeping. 'Wept' is more precise than the
    broader 'cried,' especially following the idiom 'lifted up his voice.'
