id: 1SA.24.2
reference: 1 Samuel 24:2
source:
  edition: WLC
  text: וַ/יְהִ֗י כַּֽ/אֲשֶׁר֙ שָׁ֣ב שָׁא֔וּל מֵ/אַחֲרֵ֖י פְּלִשְׁתִּ֑ים וַ/יַּגִּ֤דוּ
    ל/וֹ֙ לֵ/אמֹ֔ר הִנֵּ֣ה דָוִ֔ד בְּ/מִדְבַּ֖ר עֵ֥ין גֶּֽדִי׃ס
translation:
  text: When Saul returned from pursuing the Philistines, they told him, saying, “Look,
    David is in the wilderness of En-gedi.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “they reported to him.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  chosen: When
  alternatives:
  - And it happened when
  - Now when
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces a temporal clause. Rendering
    it simply as 'When' preserves the function in natural modern English without unnecessary
    woodenness.
- source_word: שָׁב
  chosen: returned
  alternatives:
  - came back
  - turned back
  lexicon: HALOT
  rationale: In context שׁוּב refers to Saul's return from military pursuit, so 'returned'
    is the clearest idiomatic choice.
- source_word: מֵאַחֲרֵי פְּלִשְׁתִּים
  chosen: from pursuing the Philistines
  alternatives:
  - from following after the Philistines
  - from behind the Philistines
  lexicon: HALOT
  rationale: The idiom 'from after' with a hostile military context means Saul had
    been in pursuit of the Philistines. 'From pursuing' conveys the sense rather than
    reproducing the Hebrew preposition woodenly.
- source_word: וַיַּגִּדוּ לוֹ
  chosen: they told him
  alternatives:
  - it was told to him
  - they reported to him
  lexicon: HALOT
  rationale: The verb נגד in the Hiphil commonly means 'tell/report.' The plural subject
    is indefinite in Hebrew; English naturally renders this as 'they told him.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - that
  - as follows
  lexicon: HALOT
  rationale: Retaining 'saying' reflects the Hebrew quotative formula and keeps the
    transition into direct speech explicit.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה draws attention to the report. 'Look' is readable modern English
    and preserves the deictic force better than the archaic 'Behold.'
- source_word: בְּמִדְבַּר
  chosen: in the wilderness of
  alternatives:
  - in the desert of
  - in the wilds of
  lexicon: HALOT
  rationale: מִדְבָּר often denotes uncultivated wilderness rather than sandy desert
    specifically. 'Wilderness' is the most contextually appropriate and biblically
    consistent rendering.
- source_word: עֵין גֶּדִי
  chosen: En-gedi
  alternatives:
  - En Gedi
  lexicon: HALOT
  rationale: This is a place name and should be transliterated rather than translated,
    per project philosophy. Hyphenation follows common English convention for the
    toponym.
