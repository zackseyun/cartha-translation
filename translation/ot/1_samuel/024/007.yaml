theological_decisions:
- issue: Rendering מְשִׁיחַ in reference to Saul
  chosen_reading: the LORD’s anointed
  alternative_readings:
  - the LORD's Messiah
  rationale: Although the Hebrew noun is the same root later associated with 'Messiah,' here it refers to Saul's status as the king consecrated by the LORD. Rendering it as 'Messiah' in the main text would risk anachronistic christological associations not demanded by the context. The translation preserves the royal-sacral force without importing later doctrinal content.
  doctrine_reference: Translation philosophy §2; Contested terms table (Χριστός/Messiah principle applied analogically to Hebrew משיח)
