id: 1SA.24.7
reference: 1 Samuel 24:7
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר לַ/אֲנָשָׁ֜י/ו חָלִ֧ילָ/ה לִּ֣/י מֵֽ/יהוָ֗ה אִם אֶעֱשֶׂה֩ אֶת הַ/דָּבָ֨ר הַ/זֶּ֤ה לַֽ/אדֹנִ/י֙ לִ/מְשִׁ֣יחַ יְהוָ֔ה לִ/שְׁלֹ֥חַ יָדִ֖/י בּ֑/וֹ כִּֽי מְשִׁ֥יחַ יְהוָ֖ה הֽוּא־־־׃
translation:
  text: And he said to his men, “Far be it from me, from Yahweh, that I should do this thing to my lord, Yahweh’s anointed, to stretch out my hand against him, for he is Yahweh’s anointed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “The LORD forbid that I should do this.” The Hebrew idiom literally expresses strong abhorrence at such an act in relation to the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלִילָה לִּי מֵיְהוָה
  chosen: Far be it from me, because of the LORD
  alternatives:
  - Far be it from me from the LORD
  - The LORD forbid that I should
  lexicon: HALOT
  rationale: חָלִילָה is an idiomatic expression of abhorrence/prohibition ('far be it'). The phrase with מִן + YHWH grounds the refusal in relation to the LORD. 'Because of the LORD' preserves the sense that David's restraint is due to reverence for the LORD, while avoiding the more traditional but less literal 'The LORD forbid.'
- source_word: אִם אֶעֱשֶׂה
  chosen: that I should do
  alternatives:
  - if I do
  - that I would do
  lexicon: HALOT
  rationale: 'Although אִם is formally ''if,'' after חָלִילָה it functions idiomatically in an oath-like repudiation: ''far be it ... that I should do.'' This is standard English for the Hebrew construction.'
- source_word: הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this deed
  - this act
  lexicon: HALOT
  rationale: דבר here refers to the contemplated action. 'This thing' is slightly more formal and preserves the broad Hebrew term without over-specifying.
- source_word: לַאדֹנִי
  chosen: to my lord
  alternatives:
  - against my lord
  lexicon: HALOT
  rationale: אָדוֹן with 1cs suffix is a respectful designation for Saul. 'My lord' preserves David's deferential speech. The hostile sense is supplied later by 'against him,' so it need not be imported here.
- source_word: לִמְשִׁיחַ יְהוָה
  chosen: the LORD’s anointed
  alternatives:
  - the anointed of the LORD
  - the LORD's Messiah
  lexicon: HALOT
  rationale: מָשִׁיחַ literally means 'anointed one.' In this royal context, 'the LORD’s anointed' is the natural English rendering and preserves the covenantal/theocratic significance without importing later christological overtones into Saul's title.
- source_word: לִשְׁלֹחַ יָדִי בּוֹ
  chosen: by stretching out my hand against him
  alternatives:
  - to lay my hand on him
  - to strike him
  lexicon: HALOT
  rationale: The idiom literally involves extending one's hand against someone, often for violent action. 'Stretching out my hand against him' keeps the imagery and makes the hostile direction explicit.
- source_word: כִּי מְשִׁיחַ יְהוָה הוּא
  chosen: for he is the LORD’s anointed
  alternatives:
  - because he is the LORD's anointed
  lexicon: HALOT
  rationale: כִּי gives the reason for David's refusal. Repeating 'the LORD’s anointed' reflects the Hebrew emphasis and theological rationale.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
