id: 1SA.24.8
reference: 1 Samuel 24:8
source:
  edition: WLC
  text: וַ/יְשַׁסַּ֨ע דָּוִ֤ד אֶת אֲנָשָׁי/ו֙ בַּ/דְּבָרִ֔ים וְ/לֹ֥א נְתָנָ֖/ם לָ/ק֣וּם
    אֶל שָׁא֑וּל וְ/שָׁא֛וּל קָ֥ם מֵ/הַ/מְּעָרָ֖ה וַ/יֵּ֥לֶךְ בַּ/דָּֽרֶךְ־־׃ס
translation:
  text: David restrained his men with words and did not allow them to rise up against
    Saul. Then Saul rose from the cave and went on his way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'David rebuked his men sharply with words.' The Hebrew verb is rare and
      may carry a stronger sense than simple restraint.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁסַּע
  chosen: restrained
  alternatives:
  - rebuked sharply
  - tore apart
  - cut off
  lexicon: HALOT
  rationale: The verb is difficult and idiomatic here. In context David prevents his
    men from attacking Saul, so an English rendering that conveys forceful restraint
    fits best. 'Restrained' captures the practical outcome without importing excessive
    imagery, while the alternatives reflect the verb's harsher literal or extended
    senses.
- source_word: אֲנָשָׁיו
  chosen: his men
  alternatives:
  - his servants
  - his people
  lexicon: HALOT
  rationale: The noun commonly means 'men' and here refers specifically to David's
    male followers in the cave. 'His men' is the most natural and contextually precise
    rendering.
- source_word: בַּדְּבָרִים
  chosen: with words
  alternatives:
  - by words
  - with these words
  lexicon: HALOT
  rationale: 'The phrase indicates the means by which David restrained them: verbal
    intervention. ''With words'' is idiomatic and preserves the instrumental sense.'
- source_word: וְלֹא נְתָנָם
  chosen: did not allow them
  alternatives:
  - did not permit them
  - did not give them leave
  lexicon: HALOT
  rationale: נתן with infinitive can express allowing or permitting. 'Did not allow
    them' is clear modern English and accurately reflects the construction.
- source_word: לָקוּם אֶל־שָׁאוּל
  chosen: to rise up against Saul
  alternatives:
  - to attack Saul
  - to stand against Saul
  lexicon: HALOT
  rationale: קום plus אֶל in this hostile context implies taking action against Saul.
    'Rise up against' preserves the Hebrew verbal imagery and the adversative force
    without over-paraphrasing.
- source_word: קָם מֵהַמְּעָרָה
  chosen: rose from the cave
  alternatives:
  - got up from the cave
  - arose from the cave
  lexicon: HALOT
  rationale: The same verb קום is used again of Saul. 'Rose from the cave' keeps the
    narrative repetition and is natural English.
- source_word: וַיֵּלֶךְ בַּדָּרֶךְ
  chosen: went on his way
  alternatives:
  - went along the road
  - went on the road
  lexicon: HALOT
  rationale: Literally 'went on the way/road,' but in English narrative 'went on his
    way' best conveys departure and continuation of travel. This is a modest idiomatic
    adjustment consistent with optimal equivalence.
