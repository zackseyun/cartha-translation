id: 1SA.24.19
reference: 1 Samuel 24:19
source:
  edition: WLC
  text: ו/את הִגַּ֣דְתָּ הַ/יּ֔וֹם אֵ֛ת אֲשֶׁר עָשִׂ֥יתָה אִתִּ֖/י טוֹבָ֑ה אֵת֩ אֲשֶׁ֨ר סִגְּרַ֧/נִי יְהוָ֛ה בְּ/יָדְ/ךָ֖ וְ/לֹ֥א הֲרַגְתָּֽ/נִי־׃
translation:
  text: 'And you have declared today what good you have done to me: when Yahweh gave me into your hand, you did not kill me.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have made known today the kindness you have shown me.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'when the LORD gave me into your hand'; the verb can also be rendered 'delivered me' or 'handed me over.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִגַּדְתָּ
  chosen: have declared
  alternatives:
  - have made known
  - have shown
  lexicon: HALOT
  rationale: The verb נגד in Hiphil commonly means 'tell, declare, make known.' In this context Saul is speaking of David's action as publicly demonstrating or making evident his goodness. 'Have declared' preserves the verbal sense while fitting the idiom of the clause.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: A straightforward temporal adverb. 'Today' is modern English; 'this day' is possible but more archaic.
- source_word: עָשִׂיתָה אִתִּי טוֹבָה
  chosen: the good you have done to me
  alternatives:
  - how you have dealt well with me
  - the kindness you have shown me
  lexicon: HALOT
  rationale: Literally 'the good you did with/to me.' The phrase denotes beneficial action. 'The good you have done to me' stays close to the Hebrew while remaining natural. 'Kindness' is interpretive and slightly more dynamic.
- source_word: סִגְּרַנִי
  chosen: gave me
  alternatives:
  - delivered me
  - handed me over
  - shut me up
  lexicon: HALOT
  rationale: The verb סגר can mean 'hand over, deliver up' in contexts of one person being placed into another's power. 'Gave me into your hand' is idiomatic English and matches the sense here better than the more wooden 'shut me up.' 'Delivered me' is also viable.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּיָדְךָ
  chosen: into your hand
  alternatives:
  - into your power
  - in your hand
  lexicon: HALOT
  rationale: The idiom 'into your hand' is standard biblical English for being placed under someone's power. It preserves the Hebrew metaphor and remains understandable.
- source_word: וְלֹא הֲרַגְתָּנִי
  chosen: you did not kill me
  alternatives:
  - you did not put me to death
  - you did not slay me
  lexicon: HALOT
  rationale: A simple negated verb of killing. 'Kill' is the clearest modern equivalent; 'slay' is too archaic here.
