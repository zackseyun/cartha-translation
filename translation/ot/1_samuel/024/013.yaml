id: 1SA.24.13
reference: 1 Samuel 24:13
source:
  edition: WLC
  text: יִשְׁפֹּ֤ט יְהוָה֙ בֵּינִ֣/י וּ/בֵינֶ֔/ךָ וּ/נְקָמַ֥/נִי יְהוָ֖ה מִמֶּ֑/ךָּ וְ/יָדִ֖/י לֹ֥א תִֽהְיֶה בָּֽ/ךְ־׃
translation:
  text: May Yahweh judge between me and you, and may Yahweh avenge me on you; but my hand will not be against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and may the LORD take vengeance for me on you.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and my hand shall not be against you,' a Hebrew expression for refraining from hostile action.
    reason: cultural_note
  - marker: c
    text: Or 'avenge me against you'.
    reason: previous_rendering
lexical_decisions:
- source_word: יִשְׁפֹּט
  chosen: May ... judge
  alternatives:
  - let ... judge
  - will judge
  lexicon: HALOT
  rationale: The yiqtol here functions jussively in David's appeal, expressing a wish or invocation rather than a simple future. 'May ... judge' best captures the prayer-like force in natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בֵּינִי וּבֵינֶךָ
  chosen: between me and you
  alternatives:
  - between me and you both
  - between us
  lexicon: HALOT
  rationale: A direct rendering preserves the formal judicial language. 'Between us' is smoother but loses the explicit personal contrast present in the Hebrew.
- source_word: וּנְקָמַנִי
  chosen: and may ... avenge me
  alternatives:
  - and may ... vindicate me
  - and may ... take vengeance for me
  lexicon: HALOT
  rationale: From נקם, the sense is vengeance/avenging. 'Avenge me' preserves the lexical force while fitting the prayer context. 'Vindicate me' is too weak, while 'take vengeance for me' is more cumbersome.
- source_word: מִמֶּךָּ
  chosen: against you
  alternatives:
  - from you
  - on you
  lexicon: HALOT
  rationale: With נקם, the preposition marks the object from whom vengeance is exacted. In idiomatic English, 'against you' communicates this most clearly.
- source_word: וְיָדִי
  chosen: but my hand
  alternatives:
  - and my hand
  - yet my hand
  lexicon: HALOT
  rationale: '''Hand'' is retained literally because it is a common Hebrew idiom for personal action or violence. Rendering the conjunction as ''but'' brings out the contrast between divine action and David''s refusal to act personally.'
- source_word: לֹא תִהְיֶה בָּךְ
  chosen: will not be against you
  alternatives:
  - shall not be upon you
  - will not touch you
  - will not be on you
  lexicon: HALOT
  rationale: A literal-but-clear rendering preserves the idiom of hostile action without over-paraphrasing. 'Will not touch you' is interpretive; 'upon you' is less natural in modern English.
