theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nature of David's appeal for נקם
  chosen_reading: David appeals for the LORD to avenge him rather than taking personal vengeance himself
  alternative_readings:
  - David asks for vindication in a broader judicial sense
  rationale: The verse explicitly contrasts the LORD's judging/avenging with David's own hand not being against Saul. The translation preserves that tension without softening נקם into mere abstract vindication.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
