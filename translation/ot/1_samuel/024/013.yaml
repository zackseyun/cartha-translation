theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's doctrine,
    it is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nature of David's appeal for נקם
  chosen_reading: David appeals for the LORD to avenge him rather than taking personal
    vengeance himself
  alternative_readings:
  - David asks for vindication in a broader judicial sense
  rationale: The verse explicitly contrasts the LORD's judging/avenging with David's
    own hand not being against Saul. The translation preserves that tension without
    softening נקם into mere abstract vindication.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
