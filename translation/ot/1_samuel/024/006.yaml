id: 1SA.24.6
reference: 1 Samuel 24:6
source:
  edition: WLC
  text: וַֽ/יְהִי֙ אַֽחֲרֵי כֵ֔ן וַ/יַּ֥ךְ לֵב דָּוִ֖ד אֹת֑/וֹ עַ֚ל אֲשֶׁ֣ר כָּרַ֔ת
    אֶת כָּנָ֖ף אֲשֶׁ֥ר לְ/שָׁאֽוּל־־־׃ס
translation:
  text: Afterward David’s heart struck him, because he had cut off the corner of Saul’s
    robe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''David’s heart struck him,'' an idiom expressing a troubled conscience.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the edge' or 'the hem' of Saul’s robe; Hebrew 'corner' can refer to
      an extremity of a garment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי אַחֲרֵי כֵן
  chosen: Afterward
  alternatives:
  - After this
  - And it happened afterward
  lexicon: HALOT
  rationale: The sequence marker introduces what followed the prior action. 'Afterward'
    is natural modern English and preserves the temporal sense without the overly
    wooden narrative formula 'and it happened.'
- source_word: וַיַּךְ לֵב דָּוִד אֹתוֹ
  chosen: David’s heart struck him
  alternatives:
  - David was conscience-stricken
  - David’s heart smote him
  lexicon: HALOT
  rationale: Literally, 'the heart of David struck him.' Retaining the heart as subject
    preserves the Hebrew idiom and its vividness. 'Struck him' is more readable than
    archaic 'smote him,' while 'was conscience-stricken' is interpretive and less
    transparent to the source imagery.
- source_word: לֵב
  chosen: heart
  alternatives:
  - conscience
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly includes inner moral awareness, but the concrete
    term should be preserved in the main text. The more interpretive 'conscience'
    is better left implicit in context rather than substituted.
- source_word: עַל אֲשֶׁר
  chosen: because
  alternatives:
  - for
  - on account of the fact that
  lexicon: HALOT
  rationale: This construction gives the reason for David's inner blow. 'Because'
    is the clearest idiomatic English equivalent.
- source_word: כָּרַת
  chosen: had cut off
  alternatives:
  - cut
  - cut away
  lexicon: HALOT
  rationale: 'The verb means ''cut off/cut down.'' English past perfect fits the sequence:
    David''s heart struck him after the earlier act of cutting.'
- source_word: כָּנָף
  chosen: corner
  alternatives:
  - edge
  - skirt
  - hem
  lexicon: HALOT
  rationale: The noun literally means 'wing' and by extension an extremity, edge,
    or corner of a garment. 'Corner' fits the garment context well and matches the
    likely sense here. 'Hem' is possible but more specific than the Hebrew requires.
- source_word: אֶת כָּנָף אֲשֶׁר לְשָׁאוּל
  chosen: the corner of Saul’s robe
  alternatives:
  - the edge of Saul’s garment
  - the skirt of Saul’s robe
  lexicon: HALOT
  rationale: The Hebrew names only the 'corner' belonging to Saul, with 'robe/garment'
    supplied from the immediate context in the preceding verse. Supplying 'robe' in
    English avoids awkwardness and makes the referent explicit without materially
    adding new information.
