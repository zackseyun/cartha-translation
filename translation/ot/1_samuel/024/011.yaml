theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the covenant name as 'the LORD,' following
    Jewish reverence tradition and longstanding English convention while signaling
    the underlying divine name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering מְשִׁיחַ יְהוָה in a royal narrative
  chosen_reading: the LORD’s anointed
  alternative_readings:
  - the LORD's Messiah
  rationale: Although משיח can under some circumstances be rendered 'messiah/anointed
    one,' here it refers specifically to Saul as the presently consecrated king. Translating
    it as 'the LORD’s anointed' preserves the historical sense without importing later
    messianic specificity not demanded by the verse.
  doctrine_reference: DOCTRINE.md Translation philosophy §2; Contested terms table
    by analogy to title translation principles
