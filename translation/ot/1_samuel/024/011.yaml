id: 1SA.24.11
reference: 1 Samuel 24:11
source:
  edition: WLC
  text: הִנֵּה֩ הַ/יּ֨וֹם הַ/זֶּ֜ה רָא֣וּ עֵינֶ֗י/ךָ אֵ֣ת אֲשֶׁר נְתָנְ/ךָ֩ יְהוָ֨ה
    הַ/יּ֤וֹם בְּ/יָדִ/י֙ בַּ/מְּעָרָ֔ה וְ/אָמַ֥ר לַ/הֲרָגֲ/ךָ֖ וַ/תָּ֣חָס עָלֶ֑י/ךָ
    וָ/אֹמַ֗ר לֹא אֶשְׁלַ֤ח יָדִ/י֙ בַּֽ/אדֹנִ֔/י כִּי מְשִׁ֥יחַ יְהוָ֖ה הֽוּא־׀׀־־׃
translation:
  text: Look, this day your own eyes have seen that the LORD gave you today into my
    hand in the cave, and someone said to kill you, but I spared you. I said, ‘I will
    not stretch out my hand against my lord, for he is the LORD’s anointed.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he said to kill you,' 'and it was said to kill you,' or 'and one
      said that I should kill you.' The Hebrew has an unspecified singular verb.
    reason: alternative_reading
  - marker: b
    text: Or, 'but I had pity on you.' The Hebrew verb can express sparing out of
      compassion.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces emphatic attention. 'Look' is natural modern English while
    preserving the deictic force better than the more archaic 'Behold.'
- source_word: רָאוּ עֵינֶיךָ
  chosen: your own eyes have seen
  alternatives:
  - your eyes saw
  - you have seen
  lexicon: HALOT
  rationale: The Hebrew idiom literally mentions the eyes as witnesses; 'your own
    eyes have seen' preserves the emphatic eyewitness force in readable English.
- source_word: נְתָנְךָ יְהוָה ... בְּיָדִי
  chosen: the LORD gave you ... into my hand
  alternatives:
  - the LORD delivered you ... into my hand
  - the LORD put you in my hand
  lexicon: HALOT
  rationale: נתן plus 'into my hand' expresses giving someone over to another's power.
    'Gave you into my hand' is transparent and close to the Hebrew; 'delivered' is
    possible but slightly more interpretive.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: בַּמְּעָרָה
  chosen: in the cave
  alternatives:
  - inside the cave
  lexicon: HALOT
  rationale: Straightforward locative rendering.
- source_word: וְאָמַר לַהֲרָגְךָ
  chosen: and someone said to kill you
  alternatives:
  - and he said to kill you
  - and it was said to kill you
  - and one said that I should kill you
  lexicon: HALOT
  rationale: The singular verb with no explicit subject is difficult. English commonly
    supplies an indefinite subject. 'Someone said' preserves the Hebrew's unspecified
    agency without overcommitting to a textual emendation. The infinitive means 'to
    kill you.'
- source_word: וַתָּחָס עָלֶיךָ
  chosen: but I spared you
  alternatives:
  - but I had pity on you
  - but it spared you
  - but my eye spared you
  lexicon: HALOT
  rationale: The verb חסה/חוס here conveys sparing or showing pity. Given the first-person
    speech context and the following 'I said,' English makes the implied subject explicit
    as David. 'Spared you' fits the context of refraining from killing.
- source_word: לֹא אֶשְׁלַח יָדִי
  chosen: I will not stretch out my hand
  alternatives:
  - I will not raise my hand
  - I will not lay my hand
  lexicon: HALOT
  rationale: This is a Hebrew idiom for taking hostile action. 'Stretch out my hand'
    preserves the idiom while remaining understandable in English.
- source_word: בַּאדֹנִי
  chosen: against my lord
  alternatives:
  - against my master
  lexicon: HALOT
  rationale: Refers to Saul as David's human superior, not as a divine title. 'My
    lord' preserves the courtly and political sense better than 'master' here.
- source_word: מְשִׁיחַ יְהוָה
  chosen: the LORD’s anointed
  alternatives:
  - the anointed of the LORD
  - the LORD's Messiah
  lexicon: HALOT
  rationale: In this context the phrase refers to the king consecrated by the LORD,
    not directly to the eschatological title. 'The LORD’s anointed' is the clearest
    contextual rendering and preserves the theological significance of royal consecration.
