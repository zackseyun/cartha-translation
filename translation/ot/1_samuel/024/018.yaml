id: 1SA.24.18
reference: 1 Samuel 24:18
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ אֶל דָּוִ֔ד צַדִּ֥יק אַתָּ֖ה מִמֶּ֑/נִּי כִּ֤י אַתָּה֙ גְּמַלְתַּ֣/נִי
    הַ/טּוֹבָ֔ה וַ/אֲנִ֖י גְּמַלְתִּ֥י/ךָ הָ/רָעָֽה־׃
translation:
  text: And he said to David, “You are more righteous than I, for you have repaid
    me with good, while I have repaid you with evil.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “You are more in the right than I.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֶל־דָּוִד
  chosen: And he said to David
  alternatives:
  - And he said to Dawid
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol rendered with simple past. The indirect
    object marker אֶל is naturally expressed as 'to.' The speaker is Saul from context,
    but the Hebrew clause itself uses only 'he,' so the translation preserves that.
- source_word: צַדִּיק אַתָּה מִמֶּנִּי
  chosen: You are more righteous than I
  alternatives:
  - You are more just than I
  - You are in the right more than I am
  lexicon: HALOT
  rationale: צַדִּיק denotes being righteous/in the right. In this comparative construction
    with מִן, English idiom is best captured by 'more righteous than I.' 'Just' is
    possible but 'righteous' better preserves the moral dimension of Saul's confession.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for Saul's statement. 'For' fits the explanatory
    force in elevated but still natural English.
- source_word: גְּמַלְתַּנִי
  chosen: you have repaid me
  alternatives:
  - you have dealt with me
  - you have rewarded me
  lexicon: HALOT
  rationale: גמל commonly conveys dealing with or repaying someone according to an
    action. 'Repaid me' matches the reciprocal structure of the verse and prepares
    for the parallel second clause.
- source_word: הַטּוֹבָה
  chosen: with good
  alternatives:
  - good
  - kindness
  lexicon: HALOT
  rationale: The accusative/object complement after גמל is well represented by 'with
    good.' 'Kindness' is interpretive; 'good' preserves the broader Hebrew term and
    the antithesis with 'evil.'
- source_word: וַאֲנִי
  chosen: while I
  alternatives:
  - and I
  lexicon: HALOT
  rationale: Though literally 'and I,' English 'while I' brings out the contrastive
    force clearly in the paired clauses without adding content.
- source_word: גְּמַלְתִּיךָ
  chosen: have repaid you
  alternatives:
  - have dealt with you
  - have rewarded you
  lexicon: HALOT
  rationale: Using the same English verb as in the previous clause preserves the lexical
    repetition and rhetorical contrast in Hebrew.
- source_word: הָרָעָה
  chosen: with evil
  alternatives:
  - evil
  - harm
  - bad
  lexicon: HALOT
  rationale: The noun רָעָה here denotes moral evil/wrong done to David. 'With evil'
    mirrors 'with good' and preserves the stark contrast. 'Harm' is possible but narrows
    the moral sense.
