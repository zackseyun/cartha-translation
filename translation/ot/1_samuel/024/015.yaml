id: 1SA.24.15
reference: 1 Samuel 24:15
source:
  edition: WLC
  text: אַחֲרֵ֨י מִ֤י יָצָא֙ מֶ֣לֶךְ יִשְׂרָאֵ֔ל אַחֲרֵ֥י מִ֖י אַתָּ֣ה רֹדֵ֑ף אַֽחֲרֵי֙
    כֶּ֣לֶב מֵ֔ת אַחֲרֵ֖י פַּרְעֹ֥שׁ אֶחָֽד׃
translation:
  text: After whom has the king of Israel come out? Whom are you pursuing? After a
    dead dog, after a single flea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Against whom has the king of Israel come out? Whom are you hunting?'
      The Hebrew repeatedly uses 'after' in the sense of pursuit.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרֵי מִי
  chosen: After whom
  alternatives:
  - Against whom
  - In pursuit of whom
  lexicon: HALOT
  rationale: The preposition אַחֲרֵי literally means 'after,' and in this context
    introduces the object of pursuit. 'After whom' preserves the repeated rhetorical
    structure of the Hebrew better than smoothing both instances into a more interpretive
    phrase.
- source_word: יָצָא
  chosen: has ... come out
  alternatives:
  - has gone out
  - came out
  lexicon: HALOT
  rationale: The verb means 'go out/come out.' In English, with the speaker addressing
    Saul from the wilderness, 'come out' is idiomatic and preserves the sense of setting
    out on a campaign. Present perfect fits the rhetorical question naturally in English.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  alternatives:
  - Israel's king
  lexicon: HALOT
  rationale: A direct rendering preserves the formal dignity of the title, which heightens
    the irony of David's question.
- source_word: אַתָּה רֹדֵף
  chosen: are you pursuing
  alternatives:
  - are you chasing
  - do you pursue
  lexicon: HALOT
  rationale: '''Pursuing'' best matches רדף in a hostile, sustained sense and fits
    the military context better than the lighter ''chasing.'''
- source_word: כֶּלֶב מֵת
  chosen: a dead dog
  alternatives:
  - a dead dog carcass
  lexicon: HALOT
  rationale: This is a conventional self-humbling expression. The literal rendering
    is clear in modern English and preserves the force of David's self-abasement.
- source_word: פַּרְעֹשׁ אֶחָד
  chosen: a single flea
  alternatives:
  - one flea
  - a flea
  lexicon: HALOT
  rationale: אֶחָד adds emphasis to the insignificance of the object. 'A single flea'
    brings out that emphasis more naturally than the wooden 'one flea.'
- source_word: אַחֲרֵי ... אַחֲרֵי ... אַחֲרֵי
  chosen: After ... Whom ... After ... after ...
  alternatives:
  - Against ... whom ... against ... against ...
  lexicon: HALOT
  rationale: The repeated אַחֲרֵי creates a rhetorical cadence. The translation preserves
    this repetition where natural, especially in the final paired images, to reflect
    the Hebrew's emphatic mockery of the pursuit.
