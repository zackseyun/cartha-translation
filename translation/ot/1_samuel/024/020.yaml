theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD' in continuity with Jewish reverence tradition and the LXX pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Generic masculine אִישׁ
  chosen_reading: a man
  alternative_readings:
  - a person
  - someone
  rationale: The source uses a grammatically masculine singular noun with generic
    force. Per translation philosophy, gender-accurate rendering is preferred over
    neutral recasting unless context demands otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
