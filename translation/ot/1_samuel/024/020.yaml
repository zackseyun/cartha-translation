id: 1SA.24.20
reference: 1 Samuel 24:20
source:
  edition: WLC
  text: וְ/כִֽי יִמְצָ֥א אִישׁ֙ אֶת אֹ֣יְב֔/וֹ וְ/שִׁלְּח֖/וֹ בְּ/דֶ֣רֶךְ טוֹבָ֑ה וַֽ/יהוָה֙ יְשַׁלֶּמְ/ךָ֣ טוֹבָ֔ה תַּ֚חַת הַ/יּ֣וֹם הַ/זֶּ֔ה אֲשֶׁ֥ר עָשִׂ֖יתָה לִֽ/י־־׃
translation:
  text: For when a man finds his enemy and lets him go on his way safely, may Yahweh repay you with good for what you have done to me this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and sends him away in peace' / 'and lets him go safely.' The Hebrew literally says 'on a good way.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD will repay you with good.' The Hebrew form may be heard either as a wish/blessing or as a predictive statement.
    reason: alternative_reading
lexical_decisions:
- source_word: וְכִי
  chosen: For when
  alternatives:
  - Indeed when
  - If
  lexicon: HALOT
  rationale: Introduces Saul's rhetorical statement with an explanatory-causal nuance. 'For when' fits the flow from the previous verse better than a simple 'if,' while preserving the generalizing force of the clause.
- source_word: יִמְצָא אִישׁ
  chosen: a man finds
  alternatives:
  - someone finds
  - a person finds
  lexicon: HALOT
  rationale: The Hebrew is singular masculine and generic. Per gender-accurate philosophy, 'a man' preserves the source form and representative sense better than a neutral recast.
- source_word: אֹיְבוֹ
  chosen: his enemy
  alternatives:
  - the one hostile to him
  lexicon: HALOT
  rationale: Standard and natural rendering of the noun with 3ms suffix.
- source_word: וְשִׁלְּחוֹ
  chosen: and lets him go
  alternatives:
  - and sends him away
  - and releases him
  lexicon: HALOT
  rationale: '''Lets him go'' best captures the idiomatic sense in context: David had Saul in his power and released him rather than harming him.'
- source_word: בְּדֶרֶךְ טוֹבָה
  chosen: on a good way
  alternatives:
  - in peace
  - safely
  - on his way unharmed
  lexicon: HALOT
  rationale: More literal than the common idiom 'in peace,' preserving the imagery of sending someone away on a favorable/safe course. The phrase implies safe release, but the translation keeps the Hebrew wording visible.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: יְשַׁלֶּמְךָ
  chosen: may the LORD repay you
  alternatives:
  - the LORD will repay you
  - may the LORD reward you
  lexicon: HALOT
  rationale: The yiqtol here is naturally heard as a wish/blessing in Saul's speech. 'Repay' preserves the root's recompense sense, while the following 'with good' clarifies the positive nature.
- source_word: טוֹבָה
  chosen: with good
  alternatives:
  - with goodness
  - well
  lexicon: HALOT
  rationale: Keeps the lexical repetition of טובה in the verse and preserves the sense of beneficial recompense.
- source_word: תַּחַת הַיּוֹם הַזֶּה אֲשֶׁר עָשִׂיתָה לִי
  chosen: for what you have done to me this day
  alternatives:
  - in return for what you did for me today
  - because of what you have done for me this day
  lexicon: HALOT
  rationale: English idiom requires smoothing the literal 'under/in place of this day.' The phrase expresses recompense corresponding to David's action on that day. 'To me' is retained because Saul is the beneficiary of David's restraint.
