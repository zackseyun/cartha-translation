id: 1SA.24.23
reference: 1 Samuel 24:23
source:
  edition: WLC
  text: וַ/יִּשָּׁבַ֥ע דָּוִ֖ד לְ/שָׁא֑וּל וַ/יֵּ֤לֶךְ שָׁאוּל֙ אֶל בֵּית֔/וֹ וְ/דָוִד֙
    וַֽ/אֲנָשָׁ֔י/ו עָל֖וּ עַל הַ/מְּצוּדָֽה־־׃פ
translation:
  text: So David swore to Saul. Then Saul went to his house, but David and his men
    went up to the stronghold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and David and his men went up to the stronghold.' The Hebrew conjunction
      is simply 'and'; 'but' in the main text makes the narrative contrast explicit
      in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבַע
  chosen: swore
  alternatives:
  - gave his oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע here means to swear or take an oath. 'Swore' is the
    most natural and direct English rendering in narrative context.
- source_word: לְשָׁאוּל
  chosen: to Saul
  alternatives:
  - to/for Saul
  lexicon: HALOT
  rationale: The preposition ל marks the person to whom the oath was given. 'To Saul'
    is idiomatic English and fits the context of David's promise in the preceding
    verses.
- source_word: וַיֵּלֶךְ שָׁאוּל אֶל בֵּיתוֹ
  chosen: Then Saul went to his house
  alternatives:
  - and Saul went to his home
  lexicon: HALOT
  rationale: בית can mean house or household/home. 'House' preserves the concrete
    Hebrew expression while remaining natural in English.
- source_word: וְדָוִד וַאֲנָשָׁיו
  chosen: but David and his men
  alternatives:
  - and David and his men
  lexicon: HALOT
  rationale: The conjunction is formally 'and,' but English narrative style often
    uses 'but' to bring out the contrast between Saul's departure and David's different
    destination. 'Men' accurately reflects אֲנָשָׁיו in this military-followers context.
- source_word: עָלוּ
  chosen: went up
  alternatives:
  - ascended
  lexicon: HALOT
  rationale: עלה commonly means 'go up.' 'Went up' is idiomatic and preserves the
    directional sense without sounding archaic.
- source_word: הַמְּצוּדָה
  chosen: the stronghold
  alternatives:
  - the fortress
  - the mountain stronghold
  lexicon: HALOT
  rationale: מְצוּדָה denotes a stronghold or fortified refuge. 'Stronghold' best
    fits David's wilderness setting and is a standard rendering in Samuel.
