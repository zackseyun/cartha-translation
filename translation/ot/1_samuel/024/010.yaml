theological_decisions:
- issue: Rendering of אָדָם
  chosen_reading: a man
  alternative_readings:
  - humankind
  - people
  rationale: The Hebrew is singular and in this context refers to slanderous human
    speech directed at Saul. Per the doctrine's gender-accurate principle, the singular
    masculine/generic form should not be flattened unless context clearly demands
    a collective sense.
