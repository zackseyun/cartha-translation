id: 1SA.24.10
reference: 1 Samuel 24:10
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר דָּוִד֙ לְ/שָׁא֔וּל לָ֧/מָּה תִשְׁמַ֛ע אֶת דִּבְרֵ֥י אָדָ֖ם לֵ/אמֹ֑ר
    הִנֵּ֣ה דָוִ֔ד מְבַקֵּ֖שׁ רָעָתֶֽ/ךָ־׃
translation:
  text: And David said to Saul, “Why do you listen to the words of a man who says,
    ‘Look, David is seeking your harm’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the words of man / human words.” The Hebrew singular can sometimes
      carry a more general human sense, but here it is rendered “a man” to reflect
      the singular form and the likely reference to an accuser.
    reason: lexical_alternative
  - marker: b
    text: Or, “David seeks evil against you.” The Hebrew phrase can be rendered more
      literally with “evil,” but “harm” communicates the intended accusation in natural
      English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' preserves
    the Hebrew narrative flow in natural English without overinterpreting sequence.
- source_word: לְשָׁאוּל
  chosen: to Saul
  alternatives:
  - to Shaul
  lexicon: HALOT
  rationale: Standard English transliteration uses 'Saul.' The preposition ל marks
    the addressee of David's speech.
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative is best rendered simply as 'Why' in readable modern
    English.
- source_word: תִשְׁמַע
  chosen: do you listen
  alternatives:
  - do you hear
  - will you listen
  lexicon: HALOT
  rationale: שׁמע here means more than auditory perception; it conveys heeding or
    paying attention. 'Listen' fits the rebuke better than mere 'hear.' Present English
    captures the imperfect in direct discourse naturally.
- source_word: אֶת דִּבְרֵי אָדָם
  chosen: the words of a man
  alternatives:
  - human words
  - what a man says
  - the words of men
  lexicon: HALOT
  rationale: The singular אָדָם is best taken here as an indefinite singular, not
    collective. Following the doctrine's gender-accurate principle, 'a man' matches
    the source form and likely refers to some individual slanderer or type of accuser.
- source_word: לֵאמֹר
  chosen: who says
  alternatives:
  - saying
  - who are saying
  lexicon: HALOT
  rationale: The infinitive introduces the reported content. In smooth English after
    'the words of a man,' a relative clause ('who says') is more natural than a bare
    'saying' while preserving the sense.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a deictic attention-getter. 'Look' is natural modern English;
    'Behold' would be overly archaic.
- source_word: מְבַקֵּשׁ
  chosen: is seeking
  alternatives:
  - seeks
  - is looking for
  lexicon: HALOT
  rationale: The participle expresses ongoing or characteristic action. 'Is seeking'
    preserves that aspect better than a simple present.
- source_word: רָעָתֶךָ
  chosen: your harm
  alternatives:
  - evil against you
  - your hurt
  - to harm you
  lexicon: HALOT
  rationale: רָעָה can denote evil, injury, or harm. 'Your harm' keeps the object
    nominal as in Hebrew and avoids importing a stronger moral nuance than the immediate
    accusation requires.
