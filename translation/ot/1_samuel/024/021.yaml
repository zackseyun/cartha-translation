id: 1SA.24.21
reference: 1 Samuel 24:21
source:
  edition: WLC
  text: וְ/עַתָּה֙ הִנֵּ֣ה יָדַ֔עְתִּי כִּ֥י מָלֹ֖ךְ תִּמְל֑וֹךְ וְ/קָ֨מָה֙ בְּ/יָ֣דְ/ךָ֔
    מַמְלֶ֖כֶת יִשְׂרָאֵֽל׃
translation:
  text: And now, look, I know that you will surely reign, and the kingdom of Israel
    will be established in your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under your authority.' The Hebrew says literally 'in your hand,' an
      idiom for control or power.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Carries the discourse-forward sense of transition; 'And now' preserves
    the conjunction plus temporal marker naturally in English.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - indeed
  lexicon: HALOT
  rationale: Marks emphasis and draws attention to Saul's recognition. 'Look' is readable
    modern English and preserves the deictic force better than omitting it; 'behold'
    would sound archaic.
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I am certain
  lexicon: HALOT
  rationale: Perfect verb expresses Saul's settled recognition in context. Present
    English 'I know' best conveys current certainty without awkwardness.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Introduces the content of what Saul knows; 'that' is the most straightforward
    complementizer here.
- source_word: מָלֹךְ תִּמְלֹךְ
  chosen: you will surely reign
  alternatives:
  - you will certainly be king
  - you will indeed reign
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verbal idea. 'You
    will surely reign' preserves both the certainty and the verbal sense of reigning,
    rather than reducing it merely to status.
- source_word: וְקָמָה
  chosen: will be established
  alternatives:
  - will arise
  - will stand firm
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in future sense continues the prediction.
    For a kingdom, 'be established' best captures the idiomatic sense of becoming
    secure or firmly set, more naturally than the literal 'arise'.
- source_word: בְּיָדְךָ
  chosen: in your hand
  alternatives:
  - under your power
  - under your authority
  lexicon: HALOT
  rationale: The Hebrew idiom denotes possession/control. The main text keeps the
    concrete metaphor 'in your hand' for transparency to the source; the more interpretive
    alternatives are preserved as possible senses.
- source_word: מַמְלֶכֶת יִשְׂרָאֵל
  chosen: the kingdom of Israel
  alternatives:
  - the kingship over Israel
  lexicon: HALOT
  rationale: Refers to the royal realm/polity rather than merely the abstract act
    of ruling. 'The kingdom of Israel' is the most natural and contextually fitting
    rendering.
