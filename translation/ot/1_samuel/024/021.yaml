theological_decisions:
- issue: Nature of Saul's statement about David's future rule
  chosen_reading: A recognition/prediction that David will certainly reign and that
    Israel's kingdom will be firmly established under his control.
  alternative_readings:
  - A narrower statement that David will simply become king, without emphasis on the
    stability of the kingdom.
  rationale: The doubled verb intensifies certainty, and 'will be established in your
    hand' points beyond accession to secure rule. This is a contextual and lexical
    decision, not a doctrinal expansion.
  doctrine_reference: Translation philosophy §§1, 3, 5
