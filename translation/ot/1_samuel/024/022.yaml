theological_decisions:
- issue: Rendering the divine name יְהוָה in an oath formula
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name in a solemn oath context. Per project
    doctrine, the default rendering is 'the LORD,' following established reverential
    convention while preserving the oath's gravity.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
