id: 1SA.24.22
reference: 1 Samuel 24:22
source:
  edition: WLC
  text: וְ/עַתָּ֗ה הִשָּׁ֤בְעָ/ה לִּ/י֙ בַּֽ/יהוָ֔ה אִם תַּכְרִ֥ית אֶת זַרְעִ֖/י אַֽחֲרָ֑/י
    וְ/אִם תַּשְׁמִ֥יד אֶת שְׁמִ֖/י מִ/בֵּ֥ית אָבִֽ/י־־־־׃
translation:
  text: Now swear to me by the LORD that you will not cut off my descendants after
    me, and that you will not wipe out my name from my father's house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally uses 'if' in the oath formula; in context it introduces
      the content Saul asks David to swear, hence 'that ... not.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my offspring.'
    reason: lexical_alternative
  - marker: c
    text: '''My name'' here refers to Saul''s remembered family line or standing within
      his clan.'
    reason: cultural_note
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Discourse marker introducing Saul's concluding request. 'Now' is natural
    modern English; 'And now' is possible but not necessary in English.
- source_word: הִשָּׁבְעָה לִּי
  chosen: swear to me
  alternatives:
  - take an oath to me
  lexicon: HALOT
  rationale: Nifal imperative of שבע with indirect object 'to me' calls for an oath
    formula. 'Swear to me' is the most direct and idiomatic rendering.
- source_word: בַּיהוָה
  chosen: by the LORD
  alternatives:
  - by Yahweh
  lexicon: HALOT
  rationale: Oath formula invoking the divine name. Per doctrine, יְהוָה is rendered
    'the LORD' rather than transliterated.
- source_word: אִם
  chosen: that
  alternatives:
  - if
  lexicon: HALOT
  rationale: In oath contexts אִם can introduce the content of the oath/request rather
    than a simple conditional. Rendering it woodenly as 'if' in English would sound
    incomplete or misleading; 'that' conveys the requested sworn commitment.
- source_word: תַּכְרִית
  chosen: you will not cut off
  alternatives:
  - you do not cut off
  - you will not destroy
  lexicon: HALOT
  rationale: Hiphil of כרת commonly means 'cut off,' especially for eliminating a
    line or descendants. The negation is implied by the oath-request construction
    in context, and English requires it to make sense.
- source_word: זַרְעִי
  chosen: my descendants
  alternatives:
  - my seed
  - my offspring
  lexicon: HALOT
  rationale: זֶרַע here refers to posterity rather than literal seed. 'Descendants'
    is clear modern English and fits dynastic context.
- source_word: אַחֲרַי
  chosen: after me
  alternatives:
  - behind me
  - when I am gone
  lexicon: HALOT
  rationale: 'Temporal sense is primary here: Saul asks David not to eliminate his
    line after Saul''s death.'
- source_word: וְאִם
  chosen: and that
  alternatives:
  - and if
  lexicon: HALOT
  rationale: Parallel to the previous oath-content marker. 'And that' preserves the
    coordinated second clause in idiomatic English.
- source_word: תַּשְׁמִיד
  chosen: you will not wipe out
  alternatives:
  - you will not destroy
  - you will not exterminate
  lexicon: HALOT
  rationale: Hiphil of שמד denotes destruction/annihilation. 'Wipe out' is strong
    but readable modern English and suits the concern for erasing family memory.
- source_word: שְׁמִי
  chosen: my name
  lexicon: HALOT
  rationale: Retained literally because 'name' in Hebrew carries the sense of remembered
    identity and standing; this is important in family-line context.
- source_word: מִבֵּית אָבִי
  chosen: from my father's house
  alternatives:
  - from my ancestral house
  - from my family line
  lexicon: HALOT
  rationale: Literal familial expression referring to Saul's broader paternal household/clan.
    'My father's house' is understandable in English and preserves the kinship structure
    of the Hebrew.
