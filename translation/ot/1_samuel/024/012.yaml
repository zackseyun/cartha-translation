id: 1SA.24.12
reference: 1 Samuel 24:12
source:
  edition: WLC
  text: וְ/אָבִ֣/י רְאֵ֔ה גַּ֗ם רְאֵ֛ה אֶת כְּנַ֥ף מְעִילְ/ךָ֖ בְּ/יָדִ֑/י כִּ֡י בְּ/כָרְתִ/י֩
    אֶת כְּנַ֨ף מְעִֽילְ/ךָ֜ וְ/לֹ֣א הֲרַגְתִּ֗י/ךָ דַּ֤ע וּ/רְאֵה֙ כִּי֩ אֵ֨ין בְּ/יָדִ֜/י
    רָעָ֤ה וָ/פֶ֨שַׁע֙ וְ/לֹא חָטָ֣אתִי לָ֔/ךְ וְ/אַתָּ֛ה צֹדֶ֥ה אֶת נַפְשִׁ֖/י לְ/קַחְתָּֽ/הּ־־־־׃
translation:
  text: And, my father, see—yes, see the corner of your robe in my hand. For when
    I cut off the corner of your robe, I did not kill you. Know and see that there
    is no evil or rebellion in my hand, and I have not sinned against you, though
    you are hunting my life to take it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the edge of your robe' or 'the skirt of your robe.'
    reason: lexical_alternative
  - marker: b
    text: Or 'there is no evil or transgression in my hand.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'you are hunting my life to take it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָבִי
  chosen: And, my father
  alternatives:
  - And my father
  - Look, my father
  lexicon: HALOT
  rationale: Vocative address to Saul. Retaining 'my father' preserves David's deferential,
    familial-political form of address rather than flattening it to a mere honorific.
- source_word: רְאֵה גַּם רְאֵה
  chosen: see—yes, see
  alternatives:
  - look, indeed look
  - see, even see
  lexicon: HALOT
  rationale: The repetition with גַּם is emphatic. 'See—yes, see' preserves the urgency
    and insistence without sounding unnatural in English.
- source_word: כְּנַף מְעִילְךָ
  chosen: the corner of your robe
  alternatives:
  - the edge of your robe
  - the skirt of your robe
  lexicon: HALOT
  rationale: כָּנָף literally means 'wing' or extremity, here the edge/corner of a
    garment. 'Corner' is idiomatic and concrete; 'robe' is the standard rendering
    of מְעִיל in this narrative context.
- source_word: בְּיָדִי
  chosen: in my hand
  alternatives:
  - in my possession
  lexicon: HALOT
  rationale: Literal rendering fits the physical evidence David is displaying and
    also preserves the idiomatic force of 'hand' in the verse.
- source_word: כִּי בְּכָרְתִּי
  chosen: For when I cut off
  alternatives:
  - For in that I cut off
  - Because I cut off
  lexicon: HALOT
  rationale: כִּי introduces explanation; the infinitive-like sense of the prefixed
    preposition on the verb is best represented smoothly as 'when I cut off' in context.
- source_word: וְלֹא הֲרַגְתִּיךָ
  chosen: I did not kill you
  alternatives:
  - and I did not slay you
  lexicon: HALOT
  rationale: Straightforward negated perfect. 'Kill' is clear modern English; 'slay'
    would sound archaic.
- source_word: דַּע וּרְאֵה
  chosen: Know and see
  alternatives:
  - Understand and see
  - Know, then, and see
  lexicon: HALOT
  rationale: David calls Saul to recognize the evidence and draw the moral conclusion.
    Preserving both verbs reflects the Hebrew parallelism.
- source_word: אֵין בְּיָדִי רָעָה וָפֶשַׁע
  chosen: there is no evil or rebellion in my hand
  alternatives:
  - there is no evil or transgression in my hand
  - there is no wrong or revolt in my hand
  lexicon: HALOT
  rationale: בְּיָדִי is retained literally because it links with the earlier physical
    'in my hand' and conveys agency/power. פֶשַׁע can mean transgression or rebellion;
    here, in relation to the king, 'rebellion' best captures the political dimension
    of David's denial.
- source_word: וְלֹא חָטָאתִי לָךְ
  chosen: and I have not sinned against you
  alternatives:
  - and I have not wronged you
  lexicon: HALOT
  rationale: חטא with ל marks offense against a person. 'Sinned against you' preserves
    the moral-religious weight better than the flatter 'wronged you.'
- source_word: וְאַתָּה צֹדֶה אֶת נַפְשִׁי
  chosen: though you are hunting my life
  alternatives:
  - while you are lying in wait for my life
  - yet you are stalking my life
  lexicon: HALOT
  rationale: צדה evokes hunting or stalking prey. 'Hunting my life' preserves the
    metaphor and is natural English for seeking to kill someone.
- source_word: לְקַחְתָּהּ
  chosen: to take it
  alternatives:
  - to take my life
  - to seize it
  lexicon: HALOT
  rationale: The feminine suffix refers back to נַפְשִׁי ('my life'). 'Take it' is
    concise and preserves the Hebrew pronoun linkage; the antecedent remains clear
    in English.
