theological_decisions:
- issue: Moral-political nuance of פֶשַׁע in David's denial before Saul
  chosen_reading: rebellion
  alternative_readings:
  - transgression
  - crime
  rationale: In context David is not only denying personal wrongdoing but specifically
    denying treasonous intent against the anointed king. 'Rebellion' best preserves
    that political-theological nuance without overinterpreting beyond the text.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
