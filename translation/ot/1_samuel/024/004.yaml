id: 1SA.24.4
reference: 1 Samuel 24:4
source:
  edition: WLC
  text: וַ֠/יָּבֹא אֶל גִּדְר֨וֹת הַ/צֹּ֤אן עַל הַ/דֶּ֨רֶךְ֙ וְ/שָׁ֣ם מְעָרָ֔ה וַ/יָּבֹ֥א
    שָׁא֖וּל לְ/הָסֵ֣ךְ אֶת רַגְלָ֑י/ו וְ/דָוִד֙ וַ/אֲנָשָׁ֔י/ו בְּ/יַרְכְּתֵ֥י הַ/מְּעָרָ֖ה
    יֹשְׁבִֽים־־־׃
translation:
  text: He came to the sheepfolds by the road, where there was a cave, and Saul went
    in to relieve himself. Now David and his men were sitting in the innermost parts
    of the cave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to cover his feet,' a Hebrew idiom for relieving oneself.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּדְר֨וֹת הַצֹּאן
  chosen: the sheepfolds
  alternatives:
  - the sheep pens
  - the walls/enclosures of the sheep
  lexicon: HALOT
  rationale: גִּדְרוֹת denotes enclosures or folds; with הַצֹּאן the idiomatic sense
    is sheep enclosures. 'Sheepfolds' is natural English and preserves the concrete
    setting.
- source_word: עַל הַדֶּרֶךְ
  chosen: by the road
  alternatives:
  - on the way
  - along the road
  lexicon: HALOT
  rationale: The phrase locates the sheepfolds relative to the route Saul was taking.
    'By the road' is concise and idiomatic in context.
- source_word: מְעָרָה
  chosen: a cave
  lexicon: HALOT
  rationale: Standard rendering of the noun; no contextual reason to vary.
- source_word: לְהָסֵךְ אֶת רַגְלָיו
  chosen: to relieve himself
  alternatives:
  - to cover his feet
  - to ease himself
  lexicon: HALOT
  rationale: This is a Hebrew idiom. A formally literal rendering, 'to cover his feet,'
    would obscure the meaning for modern readers. 'To relieve himself' communicates
    the plain sense without unnecessary crudeness; the literal idiom is preserved
    in a footnote.
- source_word: בְּיַרְכְּתֵי הַמְּעָרָה
  chosen: in the innermost parts of the cave
  alternatives:
  - in the recesses of the cave
  - in the back of the cave
  lexicon: HALOT
  rationale: יַרְכְּתֵי refers to the farthest or remotest parts. 'Innermost parts'
    preserves the spatial force and explains why Saul did not notice them.
- source_word: יֹשְׁבִים
  chosen: were sitting
  alternatives:
  - were staying
  - were dwelling
  lexicon: HALOT
  rationale: Here the participle describes their immediate posture/location within
    the cave, not long-term residence. 'Were sitting' best fits the scene.
- source_word: וַיָּבֹא ... וַיָּבֹא
  chosen: He came ... Saul went in
  alternatives:
  - He came ... Saul entered
  lexicon: HALOT
  rationale: The first verb continues the narrative movement; the second specifies
    Saul's entry into the cave. Varying the English avoids awkward repetition while
    preserving the sequence.
