theological_decisions:
- issue: Rendering of David's act of obeisance before Saul
  chosen_reading: Physical posture of deep respect/submission, not worship in a theological
    sense
  alternative_readings:
  - worshiped him
  - paid homage to him
  rationale: The Hebrew verbs describe bodily bowing and prostration, which can be
    used for reverence toward humans as well as worship toward God depending on context.
    Here the object is Saul, so the translation should avoid implying divine worship
    while preserving the depth of David's deference.
  doctrine_reference: Translation philosophy §3, §6
