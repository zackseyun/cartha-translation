id: 1SA.24.9
reference: 1 Samuel 24:9
source:
  edition: WLC
  text: וַ/יָּ֨קָם דָּוִ֜ד אַחֲרֵי כֵ֗ן וַ/יֵּצֵא֙ מן ה/מערה וַ/יִּקְרָ֧א אַֽחֲרֵי
    שָׁא֛וּל לֵ/אמֹ֖ר אֲדֹנִ֣/י הַ/מֶּ֑לֶךְ וַ/יַּבֵּ֤ט שָׁאוּל֙ אַֽחֲרָ֔י/ו וַ/יִּקֹּ֨ד
    דָּוִ֥ד אַפַּ֛יִם אַ֖רְצָ/ה וַ/יִּשְׁתָּֽחוּ־־־׃ס
translation:
  text: After that David rose and went out of the cave, and called after Saul, saying,
    “My lord the king!” When Saul looked behind him, David bowed with his face to
    the ground and prostrated himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “bowed down” for “prostrated himself.” The Hebrew verb can denote deep
      obeisance or homage; here it refers to David’s posture before Saul, not divine
      worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: rose
  alternatives:
  - got up
  - stood up
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום commonly marks arising or getting up. 'Rose' is
    concise and natural in narrative English.
- source_word: אַחֲרֵי כֵן
  chosen: After that
  alternatives:
  - Afterward
  - After this
  lexicon: HALOT
  rationale: Temporal idiom indicating sequence. 'After that' preserves the straightforward
    narrative progression.
- source_word: וַיֵּצֵא מִן־הַמְּעָרָה
  chosen: went out of the cave
  alternatives:
  - came out of the cave
  lexicon: HALOT
  rationale: יצא means to go/come out. 'Went out' matches the Hebrew verb directly
    and fits the narrator's perspective.
- source_word: וַיִּקְרָא אַחֲרֵי שָׁאוּל
  chosen: called after Saul
  alternatives:
  - called out after Saul
  - called to Saul from behind
  lexicon: HALOT
  rationale: קרא with אַחֲרֵי conveys calling after someone who is moving away. 'Called
    after Saul' is idiomatic and close to the Hebrew.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: My lord the king
  alternatives:
  - My lord, the king
  - My master the king
  lexicon: HALOT
  rationale: אֲדֹנִי is a respectful address, here to the reigning king. 'My lord
    the king' preserves both the personal deference and royal title without overinterpreting.
- source_word: וַיַּבֵּט שָׁאוּל אַחֲרָיו
  chosen: When Saul looked behind him
  alternatives:
  - Saul looked behind him
  - Saul turned and looked behind him
  lexicon: HALOT
  rationale: נבט means to look. The clause is best rendered temporally in English
    to connect naturally with David's following action. 'Behind him' reflects אַחֲרָיו.
- source_word: וַיִּקֹּד
  chosen: bowed
  alternatives:
  - stooped low
  - bowed down
  lexicon: HALOT
  rationale: קדד denotes bowing or inclining the body. 'Bowed' distinguishes this
    action from the following verb while remaining natural.
- source_word: אַפַּיִם אַרְצָה
  chosen: with his face to the ground
  alternatives:
  - with his nostrils to the ground
  - to the ground
  lexicon: HALOT
  rationale: Literally 'nostrils/faces earthward,' an idiom for deep obeisance. 'With
    his face to the ground' conveys the idiomatic sense in clear English.
- source_word: וַיִּשְׁתָּחוּ
  chosen: prostrated himself
  alternatives:
  - bowed down
  - paid homage
  lexicon: HALOT
  rationale: שׁחה in the Hishtaphel/Hithpael often denotes prostration in reverence
    or submission. 'Prostrated himself' preserves the physical intensity and avoids
    collapsing it into the previous 'bowed'.
