id: 1SA.24.5
reference: 1 Samuel 24:5
source:
  edition: WLC
  text: וַ/יֹּאמְרוּ֩ אַנְשֵׁ֨י דָוִ֜ד אֵלָ֗י/ו הִנֵּ֨ה הַ/יּ֜וֹם אֲֽשֶׁר אָמַ֧ר יְהוָ֣ה
    אֵלֶ֗י/ךָ הִנֵּ֨ה אָנֹכִ֜י נֹתֵ֤ן אֶת איבי/ך בְּ/יָדֶ֔/ךָ וְ/עָשִׂ֣יתָ לּ֔/וֹ
    כַּ/אֲשֶׁ֖ר יִטַ֣ב בְּ/עֵינֶ֑י/ךָ וַ/יָּ֣קָם דָּוִ֗ד וַ/יִּכְרֹ֛ת אֶת כְּנַֽף
    הַ/מְּעִ֥יל אֲשֶׁר לְ/שָׁא֖וּל בַּ/לָּֽט־־־־־׃
translation:
  text: Then David’s men said to him, “Look, this is the day of which the LORD said
    to you, ‘Look, I am giving your enemy into your hand, and you may do to him as
    seems good in your eyes.’” Then David arose and secretly cut off the corner of
    Saul’s robe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, “as seems good to you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: אַנְשֵׁי דָוִד
  chosen: David’s men
  alternatives:
  - the men of David
  lexicon: HALOT
  rationale: Construct phrase referring to David's followers. 'David’s men' is idiomatic
    and sufficiently formal.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Used twice for deictic emphasis. 'Look' preserves the force in readable
    modern English better than archaic 'Behold.'
- source_word: הַיּוֹם
  chosen: the day
  alternatives:
  - this day
  - today
  lexicon: HALOT
  rationale: With the demonstrative force supplied by הִנֵּה, 'this is the day' best
    captures the sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: נֹתֵן
  chosen: I am giving
  alternatives:
  - I give
  - I will give
  lexicon: HALOT
  rationale: The participle conveys imminent or vivid present/future action in direct
    speech. 'I am giving' preserves that aspectual vividness.
- source_word: איבי/ך
  chosen: your enemy
  alternatives:
  - your enemies
  lexicon: HALOT
  rationale: Although the consonantal form can look plural in spelling, the context
    clearly refers to Saul individually; singular is required by the following pronouns
    and narrative situation.
- source_word: בידך
  chosen: into your hand
  alternatives:
  - in your hand
  - into your power
  lexicon: HALOT
  rationale: This is a common idiom for delivering someone into another's power. 'Into
    your hand' keeps the Hebrew imagery while remaining clear.
- source_word: וְעָשִׂיתָ לּוֹ
  chosen: you may do to him
  alternatives:
  - you shall do to him
  - you will do to him
  lexicon: HALOT
  rationale: In this context the clause expresses permitted action once the enemy
    is delivered over, not a command prediction. 'May do' best reflects the sense
    in English.
- source_word: כַּאֲשֶׁר יִטַב בְּעֵינֶיךָ
  chosen: as seems good in your eyes
  alternatives:
  - as is good in your eyes
  - as pleases you
  - as seems good to you
  lexicon: HALOT
  rationale: This Hebrew idiom means what appears good or right to someone. The chosen
    rendering stays close to the Hebrew while remaining natural. A smoother English
    alternative is preserved in a footnote.
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - rose
  lexicon: HALOT
  rationale: Narrative verb of movement. 'Arose' is concise and suitably literary
    without being archaic.
- source_word: וַיִּכְרֹת
  chosen: cut off
  alternatives:
  - cut
  lexicon: HALOT
  rationale: The verb commonly means cut off/cut down. 'Cut off' fits the object and
    the completed action.
- source_word: כְּנַף
  chosen: the corner
  alternatives:
  - the edge
  - the skirt
  - the wing
  lexicon: HALOT
  rationale: For a garment, כָּנָף denotes an extremity such as a corner or edge.
    'Corner' is the most established and contextually precise rendering here.
- source_word: הַמְּעִיל
  chosen: robe
  alternatives:
  - cloak
  - mantle
  lexicon: HALOT
  rationale: מְעִיל refers to an outer garment. 'Robe' is clear and conventional in
    this narrative context.
- source_word: בַּלָּט
  chosen: secretly
  alternatives:
  - stealthily
  - in secret
  lexicon: HALOT
  rationale: The adverb indicates covert action. 'Secretly' is natural modern English
    and preserves the sense.
