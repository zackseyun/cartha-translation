theological_decisions:
- issue: Whether the reported divine saying should be presented as an actual prior
    oracle from the LORD or as the interpretation of David's men
  chosen_reading: 'The main text preserves the men''s claim without endorsing it beyond
    the narrative report: ''the day of which the LORD said to you.'''
  alternative_readings:
  - A paraphrastic rendering that distances the claim, e.g., 'the day the LORD promised
    about'
  - A rendering that more strongly implies a specific known oracle
  rationale: The Hebrew simply reports what David's men said. The translation should
    neither deny nor overstate that the LORD had spoken such words elsewhere. Preserving
    the direct report maintains the narrative tension without importing a theological
    judgment.
  doctrine_reference: Preserve theological tension rather than resolve it.
