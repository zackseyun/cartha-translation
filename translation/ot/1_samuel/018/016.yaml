id: 1SA.18.16
reference: 1 Samuel 18:16
source:
  edition: WLC
  text: וְ/כָל יִשְׂרָאֵל֙ וִ/יהוּדָ֔ה אֹהֵ֖ב אֶת דָּוִ֑ד כִּֽי ה֛וּא יוֹצֵ֥א וָ/בָ֖א
    לִ/פְנֵי/הֶֽם־־־׃פ
translation:
  text: But all Israel and Judah loved David, because he went out and came in before
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he led them out and brought them in,' that is, he acted as their public
      leader, especially in battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  chosen: But all
  alternatives:
  - And all
  - Now all
  lexicon: HALOT
  rationale: The conjunction links this verse contrastively with Saul's fear and hostility
    in the preceding context, so 'But' brings out the discourse force better than
    a bare 'And,' while preserving the inclusive sense of כָל as 'all'.
- source_word: יִשְׂרָאֵל וִ/יהוּדָה
  chosen: Israel and Judah
  alternatives:
  - all Israel and all Judah
  lexicon: HALOT
  rationale: The text distinguishes the northern tribal body ('Israel') and Judah,
    a common idiom in Samuel. Rendering both names directly preserves the political-social
    distinction without overexplaining it in the main text.
- source_word: אֹהֵב
  chosen: loved
  alternatives:
  - was loving
  - liked
  lexicon: HALOT
  rationale: The singular participle with a compound subject expresses an ongoing/general
    state. English simple past 'loved' is the most natural narrative rendering and
    adequately conveys the durative sense in context.
- source_word: אֶת דָּוִד
  chosen: David
  lexicon: HALOT
  rationale: Direct object marker אֶת is not translated; 'David' is transliterated
    as a personal name per translation philosophy.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי gives the reason for the people's love. 'Because' is clear
    modern English and preserves the causal force.
- source_word: הוּא
  chosen: he
  lexicon: HALOT
  rationale: The independent pronoun is retained in English as the explicit subject
    of the following verbal pair.
- source_word: יוֹצֵא וָ/בָא
  chosen: went out and came in
  alternatives:
  - led them out and brought them in
  - went out and came back
  lexicon: HALOT
  rationale: The idiom can denote public leadership, especially in military or civic
    activity, but the Hebrew here lacks explicit objects such as 'them.' The more
    formally transparent 'went out and came in' preserves the idiom in the main text
    without importing an object not stated. A footnote preserves the leadership-oriented
    alternative sense.
- source_word: לִ/פְנֵי/הֶם
  chosen: before them
  alternatives:
  - in their presence
  - at their head
  lexicon: HALOT
  rationale: Literally 'before them.' This can imply visible public leadership, but
    'before them' best preserves the Hebrew wording while allowing the idiomatic nuance
    to remain available.
