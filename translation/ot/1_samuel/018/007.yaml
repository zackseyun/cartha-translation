id: 1SA.18.7
reference: 1 Samuel 18:7
source:
  edition: WLC
  text: וַֽ/תַּעֲנֶ֛ינָה הַ/נָּשִׁ֥ים הַֽ/מְשַׂחֲק֖וֹת וַ/תֹּאמַ֑רְןָ הִכָּ֤ה שָׁאוּל֙
    ב/אלפ/ו וְ/דָוִ֖ד בְּ/רִבְבֹתָֽי/ו׃
translation:
  text: And the women who were celebrating sang responsively, saying, “Saul has struck
    down his thousands, and David his tens of thousands.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “answered one another,” with the sense here likely being antiphonal or
      responsive singing.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew participle can also suggest festive play, dancing, or merrymaking.
    reason: lexical_alternative
  - marker: c
    text: Or “has slain”; the Hebrew verb literally means “has struck,” here in a
      military sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעֲנֶינָה
  chosen: sang responsively
  alternatives:
  - answered
  - responded
  - sang in response
  lexicon: HALOT
  rationale: From ענה in a context of song/performance, the sense is not merely verbal
    'answering' but antiphonal or responsive singing. English 'sang responsively'
    captures the performative nuance in context.
- source_word: הַנָּשִׁים
  chosen: the women
  lexicon: HALOT
  rationale: Straightforward plural noun; retained explicitly rather than generalized.
- source_word: הַמְשַׂחֲקוֹת
  chosen: who were celebrating
  alternatives:
  - playing
  - making merry
  - dancing
  lexicon: HALOT
  rationale: The participle from שׂחק can denote playful celebration in festive settings.
    In this victory-song context, 'celebrating' is natural modern English and broad
    enough to include music/dance without over-specifying one action.
- source_word: וַתֹּאמַרְןָ
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Rendered as 'saying' to connect smoothly with the quoted refrain in English
    while preserving the narrative sequence.
- source_word: הִכָּה
  chosen: has struck down
  alternatives:
  - has slain
  - has killed
  - struck
  lexicon: HALOT
  rationale: נכה commonly means 'strike/smite,' and in military tally contexts implies
    killing/defeating. 'Has struck down' preserves the martial force without sounding
    archaic like 'slain.'
- source_word: באלפו
  chosen: his thousands
  alternatives:
  - by his thousand
  - among his thousands
  lexicon: HALOT
  rationale: The preposition with numeral here is idiomatic for a tally or measure
    of military success. Traditional and contextually clear English is 'his thousands.'
- source_word: בְּרִבְבֹתָיו
  chosen: his tens of thousands
  alternatives:
  - his myriads
  lexicon: HALOT
  rationale: רבבה denotes a very large number, often 'ten thousand.' The plural possessive
    in this poetic parallelism is best rendered 'his tens of thousands,' preserving
    the contrast with Saul's 'thousands.'
