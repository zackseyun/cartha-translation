id: 1SA.18.6
reference: 1 Samuel 18:6
source:
  edition: WLC
  text: וַ/יְהִ֣י בְּ/בוֹאָ֗/ם בְּ/שׁ֤וּב דָּוִד֙ מֵ/הַכּ֣וֹת אֶת הַ/פְּלִשְׁתִּ֔י
    וַ/תֵּצֶ֨אנָה הַ/נָּשִׁ֜ים מִ/כָּל עָרֵ֤י יִשְׂרָאֵל֙ ל/שור וְ/הַ/מְּחֹל֔וֹת לִ/קְרַ֖את
    שָׁא֣וּל הַ/מֶּ֑לֶךְ בְּ/תֻפִּ֥ים בְּ/שִׂמְחָ֖ה וּ/בְ/שָׁלִשִֽׁים־־׃
translation:
  text: And it happened, as they were coming in, when David returned from striking
    down the Philistine, that the women came out from all the cities of Israel, singing
    and dancing, to meet King Saul with tambourines, with joy, and with three-stringed
    instruments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew שָׁלִשִׁים is uncertain. It may refer to three-stringed instruments,
      lutes, or another musical accompaniment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new scene. 'And it happened'
    preserves the Hebrew discourse function without archaic English.
- source_word: בְּבוֹאָם
  chosen: as they were coming in
  alternatives:
  - when they came
  - as they came
  lexicon: HALOT
  rationale: Infinitive construct with prefixed ב and 3mp suffix indicates a temporal
    clause, literally 'in their coming.' The plural suffix is retained with the generic
    'they,' even though the specific referent is not restated in the verse.
- source_word: בְּשׁוּב דָּוִד
  chosen: when David returned
  alternatives:
  - as David returned
  - at David's return
  lexicon: HALOT
  rationale: Temporal infinitive construct of שוב with explicit subject David. 'Returned'
    is the natural English equivalent in this narrative setting.
- source_word: מֵהַכּוֹת אֶת־הַפְּלִשְׁתִּי
  chosen: from striking down the Philistine
  alternatives:
  - from killing the Philistine
  - after striking the Philistine
  lexicon: HALOT
  rationale: The idiom with נכה plus direct object commonly means to strike/defeat/kill.
    Given the immediate context of Goliath, 'striking down' preserves the force without
    over-specifying beyond the verb itself. 'The Philistine' is singular in the Hebrew
    and likely refers to the champion already mentioned.
- source_word: וַתֵּצֶאנָה הַנָּשִׁים
  chosen: the women came out
  alternatives:
  - the women went out
  lexicon: HALOT
  rationale: יצא in this context describes women coming out from the cities to greet
    the king. 'Came out' fits the viewpoint of the narrative scene.
- source_word: מִכָּל עָרֵי יִשְׂרָאֵל
  chosen: from all the cities of Israel
  alternatives:
  - out of every city of Israel
  lexicon: HALOT
  rationale: The phrase is distributive/collective; 'from all the cities of Israel'
    is the most straightforward English rendering.
- source_word: לָשׁוּר
  chosen: singing
  alternatives:
  - to sing
  lexicon: HALOT
  rationale: Infinitive construct after motion verb expresses purpose or attendant
    action. In idiomatic English, 'singing' works smoothly with the paired expression
    'singing and dancing.'
- source_word: וְהַמְּחֹלוֹת
  chosen: and dancing
  alternatives:
  - and with dances
  - and with dancing
  lexicon: HALOT
  rationale: Although formally a noun ('dances/dancings'), English idiom favors the
    verbal pair 'singing and dancing.' This is an optimal-equivalence adjustment for
    naturalness while preserving content.
- source_word: לִקְרַאת שָׁאוּל הַמֶּלֶךְ
  chosen: to meet King Saul
  alternatives:
  - to meet Saul the king
  - to greet King Saul
  lexicon: HALOT
  rationale: לקראת denotes movement to meet someone. 'King Saul' is the natural English
    order for the title plus name.
- source_word: בְּתֻפִּים
  chosen: with tambourines
  alternatives:
  - with timbrels
  - with hand drums
  lexicon: HALOT
  rationale: תֹּף refers to a frame drum/tambourine-like percussion instrument. 'Tambourines'
    is modern and accessible; 'timbrels' is traditional but archaic.
- source_word: בְּשִׂמְחָה
  chosen: with joy
  alternatives:
  - with rejoicing
  - joyfully
  lexicon: HALOT
  rationale: The noun denotes gladness/rejoicing. 'With joy' preserves the nominal
    form and coordinates well with the surrounding instrumental phrases.
- source_word: וּבְשָׁלִשִׁים
  chosen: with three-stringed instruments
  alternatives:
  - with lutes
  - with triangles
  - with musical instruments
  lexicon: HALOT
  rationale: The term is difficult and debated. A likely sense is a three-part or
    three-stringed musical instrument; older versions vary widely. The chosen rendering
    keeps the probable musical reference while avoiding anachronistic certainty. Because
    the meaning is uncertain, alternatives are preserved in a footnote.
