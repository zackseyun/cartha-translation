id: 1SA.18.11
reference: 1 Samuel 18:11
source:
  edition: WLC
  text: וַ/יָּ֤טֶל שָׁאוּל֙ אֶֽת הַ/חֲנִ֔ית וַ/יֹּ֕אמֶר אַכֶּ֥ה בְ/דָוִ֖ד וּ/בַ/קִּ֑יר
    וַ/יִּסֹּ֥ב דָּוִ֛ד מִ/פָּנָ֖י/ו פַּעֲמָֽיִם־׃
translation:
  text: Saul hurled the spear and said, “I will pin David to the wall.” But David
    dodged away from him twice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “I will strike David and the wall,” that is, pin him
      to the wall with the spear.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּטֶל
  chosen: hurled
  alternatives:
  - cast
  - threw
  lexicon: HALOT
  rationale: The verb denotes throwing/casting. 'Hurled' best fits the violent context
    of a spear attack and is more vivid than the flatter 'threw' while remaining faithful
    to the action.
- source_word: הַחֲנִית
  chosen: the spear
  alternatives:
  - the javelin
  lexicon: HALOT
  rationale: A standard rendering for חֲנִית is 'spear.' 'Javelin' is possible in
    some contexts, but 'spear' is the broader and more natural English term here.
- source_word: אַכֶּה
  chosen: I will pin
  alternatives:
  - I will strike
  - I will smite
  lexicon: HALOT
  rationale: The underlying verb נכה normally means 'strike,' but in this construction
    with 'David' and 'the wall' the sense is to strike David into/against the wall.
    'I will pin' brings out the intended result of the spear-throw without over-paraphrasing.
- source_word: בְדָוִד וּבַקִּיר
  chosen: David to the wall
  alternatives:
  - David and the wall
  - David against the wall
  - through David into the wall
  lexicon: HALOT
  rationale: The paired prepositional phrases express the intended impact involving
    both David and the wall. English idiom requires a more natural rendering than
    a wooden 'in David and in the wall.' 'Pin David to the wall' captures the force
    of the construction.
- source_word: וַיִּסֹּב
  chosen: dodged away
  alternatives:
  - turned aside
  - moved away
  - evaded
  lexicon: HALOT
  rationale: The verb literally means to turn aside or go around. In this immediate
    context of avoiding a thrown spear, 'dodged away' communicates the concrete action
    clearly in modern English.
- source_word: מִפָּנָיו
  chosen: from him
  alternatives:
  - from before him
  - from his presence
  lexicon: HALOT
  rationale: Literally 'from his face/presence,' but in narrative English 'from him'
    is the natural equivalent and preserves the sense of escaping Saul's attack.
- source_word: פַּעֲמָיִם
  chosen: twice
  alternatives:
  - two times
  lexicon: HALOT
  rationale: The dual adverb straightforwardly means 'twice.' This is the idiomatic
    English rendering.
