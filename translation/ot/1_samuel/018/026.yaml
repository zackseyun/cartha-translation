id: 1SA.18.26
reference: 1 Samuel 18:26
source:
  edition: WLC
  text: וַ/יַּגִּ֨דוּ עֲבָדָ֤י/ו לְ/דָוִד֙ אֶת הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה וַ/יִּשַׁ֤ר
    הַ/דָּבָר֙ בְּ/עֵינֵ֣י דָוִ֔ד לְ/הִתְחַתֵּ֖ן בַּ/מֶּ֑לֶךְ וְ/לֹ֥א מָלְא֖וּ הַ/יָּמִֽים־׃
translation:
  text: So his servants told David these words, and the matter seemed right in David’s
    eyes, to become the king’s son-in-law; and the days had not yet been completed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the thing pleased David.' The Hebrew idiom literally says 'the matter
      was right in David’s eyes.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'to marry into the king’s family.' The Hebrew expression is literally
      'to become related by marriage with the king.'
    reason: lexical_alternative
  - marker: c
    text: That is, the allotted time had not yet expired.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּגִּדוּ
  chosen: told
  alternatives:
  - reported
  - declared
  lexicon: HALOT
  rationale: The Hiphil of נגד here means to make known or tell. 'Told' is natural
    modern English and fits the direct-object construction with 'these words.'
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his attendants
  - his officials
  lexicon: HALOT
  rationale: Refers to Saul's servants in context. 'Servants' is the most direct rendering
    of עבדים here and does not require the stronger bonded nuance of 'slaves' in this
    royal-court setting.
- source_word: הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - this proposal
  lexicon: HALOT
  rationale: Although the phrase can mean either words or matters, here the servants
    are relaying Saul's proposal verbally, so 'these words' preserves the immediate
    speech context.
- source_word: וַיִּשַׁר הַדָּבָר בְּעֵינֵי דָוִד
  chosen: the matter seemed right in David’s eyes
  alternatives:
  - the thing pleased David
  - the proposal was agreeable to David
  lexicon: HALOT
  rationale: The idiom ישר בעיני means to be right, pleasing, or acceptable in someone's
    judgment. 'Seemed right in David’s eyes' preserves the Hebrew idiom while remaining
    readable.
- source_word: לְהִתְחַתֵּן בַּמֶּלֶךְ
  chosen: to become the king’s son-in-law
  alternatives:
  - to marry into the king's family
  - to make a marriage alliance with the king
  lexicon: HALOT
  rationale: The hitpael of חתן with ב can denote entering into a marriage relationship
    with someone. In this narrative context, the specific sense is David becoming
    Saul's son-in-law, which is clearer in English than a more literal but awkward
    'to intermarry with the king.'
- source_word: וְלֹא מָלְאוּ הַיָּמִים
  chosen: and the days had not yet been completed
  alternatives:
  - before the time had expired
  - and the days were not fulfilled
  lexicon: HALOT
  rationale: The idiom מלאו הימים refers to the allotted time reaching completion.
    'Had not yet been completed' keeps the temporal sense and reflects that the deadline
    mentioned in context had not yet run out.
