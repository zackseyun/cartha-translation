theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God directly. Following the project's
    stated default for יְהוָה, the main text uses 'the LORD' rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Implication of divine departure from Saul
  chosen_reading: The text states that the LORD had departed from Saul without expanding
    the theological mechanism.
  alternative_readings:
  - The Spirit of the LORD had departed from Saul
  - The LORD's favor had departed from Saul
  rationale: This verse itself says only that the LORD was with David and had departed
    from Saul. It should not import the fuller wording of nearby passages ('the Spirit
    of the LORD') or reduce the statement merely to favor. The translation preserves
    the text's own formulation and theological tension.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
