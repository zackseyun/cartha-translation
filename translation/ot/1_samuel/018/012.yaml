id: 1SA.18.12
reference: 1 Samuel 18:12
source:
  edition: WLC
  text: וַ/יִּרָ֥א שָׁא֖וּל מִ/לִּ/פְנֵ֣י דָוִ֑ד כִּֽי הָיָ֤ה יְהוָה֙ עִמּ֔/וֹ וּ/מֵ/עִ֥ם
    שָׁא֖וּל סָֽר־׃
translation:
  text: Saul was afraid of David, because the LORD was with him and had departed from
    Saul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Saul feared David.' The Hebrew literally says 'Saul was afraid from
      before David,' an idiom meaning that David was the object or cause of Saul's
      fear.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרָא
  chosen: was afraid
  alternatives:
  - feared
  lexicon: HALOT
  rationale: From ירא, denoting fear. 'Was afraid' is natural modern English and fits
    the narrative sense better than the more wooden 'feared,' while preserving the
    emotional force.
- source_word: מִלִּפְנֵי
  chosen: of
  alternatives:
  - before
  - because of
  - from before
  lexicon: HALOT
  rationale: Literally 'from before/in the presence of,' but in this idiom with ירא
    and a person it conveys the object/cause of fear. English 'afraid of David' best
    captures the sense without awkwardness.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: Introduces the reason for Saul's fear. 'Because' is the clearest causal
    rendering in contemporary English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the LXX/English Bible
    pattern.
- source_word: עִמּוֹ
  chosen: with him
  alternatives:
  - with David
  lexicon: HALOT
  rationale: The pronoun most naturally refers to David in context. 'With him' preserves
    the Hebrew pronominal form while the surrounding clause makes the referent clear.
- source_word: וּמֵעִם שָׁאוּל סָר
  chosen: and had departed from Saul
  alternatives:
  - and turned away from Saul
  - and was removed from Saul
  lexicon: HALOT
  rationale: סר means 'turn aside, depart, withdraw.' In context it refers to the
    LORD's presence having left Saul. English pluperfect 'had departed' clarifies
    the state underlying Saul's fear and matches the narrative context established
    earlier.
