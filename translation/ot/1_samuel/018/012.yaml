theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Implication of divine departure from Saul
  chosen_reading: The text states that the LORD had departed from Saul without expanding the theological mechanism.
  alternative_readings:
  - The Spirit of the LORD had departed from Saul
  - The LORD's favor had departed from Saul
  rationale: This verse itself says only that the LORD was with David and had departed from Saul. It should not import the fuller wording of nearby passages ('the Spirit of the LORD') or reduce the statement merely to favor. The translation preserves the text's own formulation and theological tension.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
