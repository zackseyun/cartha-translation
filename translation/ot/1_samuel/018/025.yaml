id: 1SA.18.25
reference: 1 Samuel 18:25
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר שָׁא֜וּל כֹּֽה תֹאמְר֣וּ לְ/דָוִ֗ד אֵֽין חֵ֤פֶץ לַ/מֶּ֨לֶךְ֙ בְּ/מֹ֔הַר
    כִּ֗י בְּ/מֵאָה֙ עָרְל֣וֹת פְּלִשְׁתִּ֔ים לְ/הִנָּקֵ֖ם בְּ/אֹיְבֵ֣י הַ/מֶּ֑לֶךְ
    וְ/שָׁא֣וּל חָשַׁ֔ב לְ/הַפִּ֥יל אֶת דָּוִ֖ד בְּ/יַד פְּלִשְׁתִּֽים־־־־׃
translation:
  text: 'Then Saul said, “This is what you shall say to David: ‘The king has no desire
    for a bride-price except a hundred Philistine foreskins, to be avenged on the
    king’s enemies.’” But Saul intended to make David fall by the hand of the Philistines.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “but only a hundred foreskins of the Philistines.”
    reason: lexical_alternative
  - marker: b
    text: “Bride-price” renders Hebrew mohar, the payment customarily given in connection
      with marriage; it is not the same as a dowry in the modern English sense.
    reason: cultural_note
  - marker: c
    text: “To make David fall” likely means to bring about his death, but the Hebrew
      expression is left less explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֹהַר
  chosen: bride-price
  alternatives:
  - dowry
  - marriage payment
  lexicon: HALOT
  rationale: מוֹהַר refers to the payment given in connection with marriage, typically
    from the groom or his family to the bride's family, so 'bride-price' is more precise
    than the common but misleading English 'dowry.'
- source_word: אֵין חֵפֶץ לַמֶּלֶךְ
  chosen: The king has no desire
  alternatives:
  - The king takes no pleasure
  - The king has no delight
  lexicon: HALOT
  rationale: חֵפֶץ denotes desire, delight, or pleasure. 'Has no desire' fits the
    transactional context of what Saul says he does not want as the marriage payment.
- source_word: בְּמֵאָה עָרְלוֹת פְּלִשְׁתִּים
  chosen: except a hundred Philistine foreskins
  alternatives:
  - but only a hundred foreskins of the Philistines
  lexicon: HALOT
  rationale: The phrase specifies the demanded substitute for a normal marriage payment.
    'Philistine foreskins' is direct, natural English and preserves the shocking concreteness
    of the Hebrew.
- source_word: לְהִנָּקֵם
  chosen: to be avenged
  alternatives:
  - to take vengeance
  - for vengeance
  lexicon: HALOT
  rationale: The Niphal infinitive of נקם here expresses the stated purpose/result
    of the demanded act. 'To be avenged on the king’s enemies' preserves the passive/reflexive
    nuance better than a simple active 'to take vengeance.'
- source_word: בְּאֹיְבֵי הַמֶּלֶךְ
  chosen: on the king’s enemies
  alternatives:
  - against the king’s enemies
  lexicon: HALOT
  rationale: English idiom with 'avenged' most naturally takes 'on.' The phrase keeps
    Saul's self-referential royal diction.
- source_word: חָשַׁב
  chosen: intended
  alternatives:
  - planned
  - thought
  lexicon: HALOT
  rationale: In context חָשַׁב conveys deliberate intent or scheming, not mere cognition.
    'Intended' is concise and idiomatic.
- source_word: לְהַפִּיל אֶת־דָּוִד
  chosen: to make David fall
  alternatives:
  - to bring David down
  - to cause David to fall
  lexicon: HALOT
  rationale: The Hiphil of נפל means to cause to fall. Here it likely implies bringing
    about David's death or downfall. 'Make David fall' preserves the metaphor without
    over-interpreting it as explicit death.
- source_word: בְּיַד פְּלִשְׁתִּים
  chosen: by the hand of the Philistines
  alternatives:
  - at the hand of the Philistines
  - through the Philistines
  lexicon: HALOT
  rationale: '''By the hand of'' is a standard English rendering of the Hebrew idiom
    ביד, expressing agency while retaining biblical texture.'
