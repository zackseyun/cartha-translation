id: 1SA.18.19
reference: 1 Samuel 18:19
source:
  edition: WLC
  text: וַ/יְהִ֗י בְּ/עֵ֥ת תֵּ֛ת אֶת מֵרַ֥ב בַּת שָׁא֖וּל לְ/דָוִ֑ד וְ/הִ֧יא נִתְּנָ֛ה
    לְ/עַדְרִיאֵ֥ל הַ/מְּחֹלָתִ֖י לְ/אִשָּֽׁה־־׃
translation:
  text: But when the time came to give Merab, Saul’s daughter, to David, she was given
    to Adriel the Meholathite as a wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and she was given to Adriel the Meholathite for a wife.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: But when ... came
  alternatives:
  - And it happened
  - Now it happened
  lexicon: HALOT
  rationale: The waw-consecutive plus היה introduces a narrative development. In English,
    'But when ... came' captures both the temporal transition and the contrast with
    the expectation that Merab would be given to David.
- source_word: בְּעֵת
  chosen: when the time came
  alternatives:
  - at the time
  - when
  lexicon: HALOT
  rationale: The phrase בְּעֵת with the infinitive construct תֵּת is idiomatically
    temporal. 'When the time came' is natural modern English and preserves the sense
    of an appointed moment.
- source_word: תֵּת
  chosen: to give
  alternatives:
  - for giving
  lexicon: HALOT
  rationale: Infinitive construct of נתן governed by בְּעֵת. 'To give' is the straightforward
    lexical sense and fits the temporal construction.
- source_word: אֶת מֵרַב בַּת שָׁאוּל
  chosen: Merab, Saul’s daughter
  alternatives:
  - Merab the daughter of Saul
  lexicon: HALOT
  rationale: Appositional rendering keeps the identification clear and readable while
    preserving the familial designation.
- source_word: לְדָוִד
  chosen: to David
  alternatives:
  - for David
  lexicon: HALOT
  rationale: The preposition marks the intended recipient in marriage arrangement
    language. 'To David' is the most direct rendering.
- source_word: וְהִיא נִתְּנָה
  chosen: she was given
  alternatives:
  - but she was given
  - and she was given
  lexicon: HALOT
  rationale: The pronoun plus passive of נתן emphasizes the unexpected outcome regarding
    Merab. English passive preserves the Hebrew focus on what happened to her.
- source_word: לְעַדְרִיאֵל
  chosen: to Adriel
  lexicon: HALOT
  rationale: Standard transliteration of the personal name.
- source_word: הַמְּחֹלָתִי
  chosen: the Meholathite
  alternatives:
  - from Meholah
  lexicon: HALOT
  rationale: The gentilic form is best represented by the standard English adjectival/nominal
    form 'Meholathite.'
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - for a wife
  - in marriage
  lexicon: HALOT
  rationale: This is standard Hebrew marriage idiom. 'As a wife' is clear, idiomatic,
    and close to the source.
