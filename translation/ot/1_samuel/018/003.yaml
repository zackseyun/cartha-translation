theological_decisions:
- issue: Referent of the third-person pronouns in 'because he loved him as his own
    soul'
  chosen_reading: Jonathan loved David as his own soul
  alternative_readings:
  - David loved Jonathan as his own soul
  - the wording is formally ambiguous apart from context
  rationale: Although the Hebrew pronouns are formally third-person singular and could
    be ambiguous in isolation, the immediate context (especially 18:1 and 18:3) strongly
    indicates Jonathan as the subject of the love and David as the object. The translation
    follows the contextual referent without importing additional theological claims
    about the nature of the relationship.
  doctrine_reference: Preserve theological tension rather than resolve it; ambiguity
    is acknowledged in documentation, but context here sufficiently favors Jonathan
    as subject.
