id: 1SA.18.3
reference: 1 Samuel 18:3
source:
  edition: WLC
  text: וַ/יִּכְרֹ֧ת יְהוֹנָתָ֛ן וְ/דָוִ֖ד בְּרִ֑ית בְּ/אַהֲבָת֥/וֹ אֹת֖/וֹ כְּ/נַפְשֽׁ/וֹ׃
translation:
  text: Then Jonathan and David made a covenant, because he loved him as his own soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'cut a covenant.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''in his love for him''; the Hebrew pronouns are formally ambiguous,
      but the context favors: Jonathan loved David as his own soul.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכְרֹת
  chosen: made
  alternatives:
  - cut
  - entered into
  lexicon: HALOT
  rationale: The idiom כרת ברית literally means 'cut a covenant,' but in natural English
    'made a covenant' best conveys the established idiom without obscuring meaning.
    'Cut' is preserved as an alternative because it reflects the Hebrew form more
    formally.
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  rationale: Personal names are transliterated by standard English convention.
- source_word: וְדָוִד
  chosen: and David
  rationale: The conjunction is straightforwardly additive, and the personal name
    is transliterated by standard English convention.
- source_word: בְּרִית
  chosen: covenant
  alternatives:
  - treaty
  - agreement
  lexicon: HALOT
  rationale: בְּרִית regularly denotes a formal binding pact or covenant. 'Covenant'
    preserves the relational and solemn force better than the flatter 'agreement'
    or the more political 'treaty'.
- source_word: בְּאַהֲבָתוֹ
  chosen: because he loved
  alternatives:
  - in his love for
  - when he loved
  lexicon: HALOT
  rationale: 'The prefixed ב here is best taken in a causal or circumstantial sense
    in context: the covenant is grounded in love. Rendering it ''because he loved''
    gives clear English while preserving the sense. The phrase is syntactically linked
    to the following object and comparison.'
- source_word: אֹתוֹ
  chosen: him
  rationale: Direct object pronoun referring to David in context.
- source_word: כְּנַפְשׁוֹ
  chosen: as his own soul
  alternatives:
  - as himself
  - as his own life
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean 'soul,' 'self,' or 'life.' Here the comparison expresses
    depth of personal attachment. 'As his own soul' preserves the Hebrew imagery and
    intertextual resonance, while 'as himself' is a viable smoother alternative.
