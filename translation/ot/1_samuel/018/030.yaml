id: 1SA.18.30
reference: 1 Samuel 18:30
source:
  edition: WLC
  text: וַ/יֵּצְא֖וּ שָׂרֵ֣י פְלִשְׁתִּ֑ים וַ/יְהִ֣י מִ/דֵּ֣י צֵאתָ֗/ם שָׂכַ֤ל דָּוִד֙
    מִ/כֹּל֙ עַבְדֵ֣י שָׁא֔וּל וַ/יִּיקַ֥ר שְׁמ֖/וֹ מְאֹֽד׀׃ס
translation:
  text: Then the commanders of the Philistines went out, and whenever they went out,
    David acted more wisely than all the servants of Saul, so that his name was highly
    esteemed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as often as they went out.'
    reason: lexical_alternative
  - marker: b
    text: Or 'David prospered more' or 'David had more success.' The Hebrew verb can
      denote prudent action that results in success.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'his name was very precious/honored,' that is, his reputation
      was highly esteemed.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי פְלִשְׁתִּים
  chosen: the commanders of the Philistines
  alternatives:
  - the princes of the Philistines
  - the leaders of the Philistines
  lexicon: HALOT
  rationale: שָׂרִים denotes officials, rulers, or military leaders. In this battle
    context, 'commanders' best captures the likely military sense in natural English.
- source_word: וַיֵּצְאוּ
  chosen: went out
  alternatives:
  - came out
  - marched out
  lexicon: HALOT
  rationale: יצא literally means 'go out/come out.' 'Went out' preserves the Hebrew
    idiom and likely military movement without over-specifying 'marched.'
- source_word: מִדֵּי צֵאתָם
  chosen: whenever they went out
  alternatives:
  - as often as they went out
  - every time they went out
  lexicon: HALOT
  rationale: 'The construction conveys repeated occurrence: each time or whenever
    they went out. ''Whenever they went out'' is idiomatic and preserves the iterative
    force.'
- source_word: שָׂכַל
  chosen: acted more wisely
  alternatives:
  - prospered more
  - had more success
  - behaved more prudently
  lexicon: HALOT
  rationale: The verb can denote acting wisely, prospering, or succeeding through
    prudence. In this context of David's repeated effectiveness in contrast to Saul's
    servants, 'acted more wisely' preserves the core semantic link to prudence while
    implying successful conduct. The comparative force comes from the following מִכֹּל.
- source_word: מִכֹּל עַבְדֵי שָׁאוּל
  chosen: than all the servants of Saul
  alternatives:
  - more than all Saul's servants
  - than all Saul's officials
  lexicon: HALOT
  rationale: עֲבָדִים here refers broadly to Saul's court servants/officials rather
    than slaves. 'Servants of Saul' is a standard and sufficiently broad rendering
    that fits royal service.
- source_word: וַיִּיקַר שְׁמוֹ
  chosen: his name was highly esteemed
  alternatives:
  - his name became very precious
  - his name was greatly honored
  - his reputation became very great
  lexicon: HALOT
  rationale: יקר in this form conveys becoming precious, weighty, honored, or esteemed.
    With 'his name,' the sense is reputation or renown. 'His name was highly esteemed'
    preserves the Hebrew expression while communicating honor and reputation clearly.
- source_word: מְאֹד
  chosen: highly
  alternatives:
  - very
  - greatly
  lexicon: HALOT
  rationale: מְאֹד intensifies the clause. 'Highly' fits smoothly with 'esteemed'
    in English while retaining the strong degree.
