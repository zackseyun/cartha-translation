id: 1SA.18.18
reference: 1 Samuel 18:18
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר דָּוִ֜ד אֶל שָׁא֗וּל מִ֤י אָֽנֹכִי֙ וּ/מִ֣י חַיַּ֔/י מִשְׁפַּ֥חַת
    אָבִ֖/י בְּ/יִשְׂרָאֵ֑ל כִּֽי אֶהְיֶ֥ה חָתָ֖ן לַ/מֶּֽלֶךְ־־׃
translation:
  text: And David said to Saul, “Who am I, and who are my relatives, my father’s family
    in Israel, that I should become the king’s son-in-law?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and what is my life?' The Hebrew expression may emphasize
      David's insignificance; the main text renders it in light of the following phrase,
      'my father's family in Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And ... said' preserves Hebrew
    narrative flow in readable English.
- source_word: מִי אָנֹכִי
  chosen: Who am I
  lexicon: HALOT
  rationale: Direct idiomatic self-deprecating question; formal and natural in English.
- source_word: וּמִי חַיַּי
  chosen: and who are my relatives
  alternatives:
  - and what is my life
  - and who is my clan
  lexicon: HALOT
  rationale: The consonantal text literally reads 'and who are my lives/life,' but
    in context with the following apposition 'my father's family in Israel' it functions
    as a reference to David's kin or social standing. 'My relatives' best captures
    the sense of family status without forcing an awkward literalism. The alternative
    'what is my life' is possible if taken as an idiom of insignificance, but the
    immediate family language favors a kinship-oriented rendering.
- source_word: מִשְׁפַּחַת אָבִי
  chosen: my father’s family
  alternatives:
  - my father's clan
  - my paternal family
  lexicon: HALOT
  rationale: מִשְׁפָּחָה denotes family/clan grouping. 'My father's family' is clear
    modern English and preserves the patrilineal sense.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: 'Locative/social setting: David speaks of his family''s standing within
    Israel.'
- source_word: כִּי אֶהְיֶה
  chosen: that I should become
  alternatives:
  - that I should be
  - that I would become
  lexicon: HALOT
  rationale: After the rhetorical questions, כִּי introduces the result/purpose-like
    sense. 'Should become' fits the humility of the statement and the prospective
    force of אֶהְיֶה.
- source_word: חָתָן לַמֶּלֶךְ
  chosen: the king’s son-in-law
  alternatives:
  - son-in-law to the king
  - the king's bridegroom relation
  lexicon: HALOT
  rationale: חָתָן in this context means one related by marriage, specifically the
    man marrying the king's daughter. 'The king's son-in-law' is the natural English
    equivalent.
