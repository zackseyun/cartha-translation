id: 1SA.18.5
reference: 1 Samuel 18:5
source:
  edition: WLC
  text: וַ/יֵּצֵ֨א דָוִ֜ד בְּ/כֹל֩ אֲשֶׁ֨ר יִשְׁלָחֶ֤/נּוּ שָׁאוּל֙ יַשְׂכִּ֔יל וַ/יְשִׂמֵ֣/הוּ
    שָׁא֔וּל עַ֖ל אַנְשֵׁ֣י הַ/מִּלְחָמָ֑ה וַ/יִּיטַב֙ בְּ/עֵינֵ֣י כָל הָ/עָ֔ם וְ/גַ֕ם
    בְּ/עֵינֵ֖י עַבְדֵ֥י שָׁאֽוּל־׃פ
translation:
  text: David went out wherever Saul sent him, and he acted wisely. So Saul appointed
    him over the men of war, and this was good in the eyes of all the people and also
    in the eyes of Saul’s servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he prospered' / 'he had success' for 'he acted wisely' (Hebrew שׂכל
      in the Hiphil can carry both prudence and resulting success).
    reason: lexical_alternative
  - marker: b
    text: Or 'it pleased all the people and also Saul’s servants.' The Hebrew may
      refer either to David himself, to his appointment, or to the whole situation
      just described.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - went forth
  - went
  lexicon: HALOT
  rationale: The verb יצא literally means 'go out.' In this narrative context it introduces
    David's going out on missions or campaigns at Saul's command. 'Went out' preserves
    the Hebrew idiom without over-paraphrasing to 'went on campaign,' though that
    nuance is contextually present.
- source_word: בְּכֹל אֲשֶׁר יִשְׁלָחֶנּוּ
  chosen: wherever Saul sent him
  alternatives:
  - in everything that Saul sent him to do
  - everywhere Saul sent him
  lexicon: HALOT
  rationale: The phrase is literally 'in all that Saul would send him.' English idiom
    is smoother with 'wherever Saul sent him,' which captures the distributive sense
    in context of repeated assignments. 'In everything' is possible but less natural
    here.
- source_word: יַשְׂכִּיל
  chosen: he acted wisely
  alternatives:
  - he prospered
  - he had success
  - he behaved prudently
  lexicon: HALOT
  rationale: The Hiphil of שׂכל can denote acting wisely/prudently and, by extension,
    succeeding. Here the emphasis is on David's prudent conduct in carrying out Saul's
    assignments, which explains his favorable reception and promotion. 'Acted wisely'
    preserves the lexical core while allowing the success nuance to remain implicit.
- source_word: וַיְשִׂמֵהוּ
  chosen: appointed him
  alternatives:
  - set him
  - placed him
  lexicon: HALOT
  rationale: The verb שׂים literally means 'set/place,' but in administrative context
    with עַל it commonly means appointing someone over others. 'Appointed him' communicates
    the official nature of Saul's action in clear modern English.
- source_word: עַל אַנְשֵׁי הַמִּלְחָמָה
  chosen: over the men of war
  alternatives:
  - over the fighting men
  - over the soldiers
  - over the warriors
  lexicon: HALOT
  rationale: The phrase literally means 'over the men of the war.' 'Men of war' is
    a transparent and dignified rendering that preserves the masculine collective
    and military sense. 'Soldiers' is possible but slightly more interpretive and
    modernized.
- source_word: וַיִּיטַב
  chosen: this was good
  alternatives:
  - it pleased
  - it was pleasing
  - he was pleasing
  lexicon: HALOT
  rationale: The verb טוב in this construction with 'in the eyes of' means something
    was good/pleasing in someone's judgment. Because the Hebrew verb is masculine
    singular and can refer to the situation just described (David's conduct and appointment),
    'this was good' avoids narrowing the referent too much. 'It pleased' is also possible
    but slightly more dynamic.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - to
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for evaluation or favor. 'In the eyes of'
    keeps the idiom visible in English while remaining understandable. A more idiomatic
    reduction to 'to' would lose the Hebrew texture.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - all the troops
  - all the nation
  lexicon: HALOT
  rationale: עם here most naturally refers to the people generally, not merely the
    army, especially since Saul's servants are then mentioned separately. 'All the
    people' is the broadest and least restrictive rendering.
- source_word: עַבְדֵי שָׁאוּל
  chosen: Saul’s servants
  alternatives:
  - Saul’s officials
  - Saul’s attendants
  - Saul’s servants/courtiers
  lexicon: HALOT
  rationale: עבדים can denote servants in a royal court, including officials. 'Servants'
    is the most direct rendering and preserves the social hierarchy. 'Officials' is
    contextually plausible but narrows the term beyond what the Hebrew explicitly
    states.
