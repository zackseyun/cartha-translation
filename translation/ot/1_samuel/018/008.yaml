id: 1SA.18.8
reference: 1 Samuel 18:8
source:
  edition: WLC
  text: וַ/יִּ֨חַר לְ/שָׁא֜וּל מְאֹ֗ד וַ/יֵּ֤רַע בְּ/עֵינָי/ו֙ הַ/דָּבָ֣ר הַ/זֶּ֔ה
    וַ/יֹּ֗אמֶר נָתְנ֤וּ לְ/דָוִד֙ רְבָב֔וֹת וְ/לִ֥/י נָתְנ֖וּ הָ/אֲלָפִ֑ים וְ/ע֥וֹד
    ל֖/וֹ אַ֥ךְ הַ/מְּלוּכָֽה׃
translation:
  text: Then Saul became very angry, and this matter displeased him. He said, “They
    have given David ten thousands, but to me they have given the thousands; what
    more can he have but the kingdom?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “They have ascribed ten thousands to David, but to me
      they have ascribed the thousands.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew is compressed: “and still to him only the kingdom,” meaning that
      in Saul’s view the only thing left for David to receive is the kingdom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר
  chosen: became very angry
  alternatives:
  - burned with anger
  - was angry
  lexicon: HALOT
  rationale: The verb literally conveys burning anger. In natural English, 'became
    very angry' captures the idiom clearly, with מְאֹד supplying the intensifier.
    'Burned with anger' is possible but slightly more idiomatic/literary than needed
    here.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: Standard adverbial intensifier; 'very' is the most natural modern English
    equivalent.
- source_word: וַיֵּרַע בְּעֵינָיו
  chosen: displeased him
  alternatives:
  - was evil in his eyes
  - seemed wrong to him
  - was displeasing in his sight
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'was bad/evil in his eyes.' In context
    it expresses Saul's negative reaction to the women's saying, so 'displeased him'
    communicates the sense idiomatically without over-literal awkwardness.
- source_word: הַדָּבָר הַזֶּה
  chosen: this matter
  alternatives:
  - this thing
  - this saying
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'thing.' Here it refers to the reported
    matter/song just mentioned, and 'this matter' is a natural, sufficiently broad
    rendering.
- source_word: נָתְנוּ
  chosen: they have given
  alternatives:
  - they gave
  - they ascribed
  lexicon: HALOT
  rationale: The verb is 'give.' In context Saul is reacting to the public attribution
    in the song, so English present perfect ('have given') fits his immediate complaint.
    'Ascribed' interprets the sense but moves away from the Hebrew wording.
- source_word: רְבָבוֹת
  chosen: ten thousands
  alternatives:
  - myriads
  - tens of thousands
  lexicon: HALOT
  rationale: The plural denotes units of ten thousand. 'Ten thousands' preserves the
    Hebrew numerical contrast with 'the thousands' more closely than the smoother
    but less formally parallel 'tens of thousands.'
- source_word: הָאֲלָפִים
  chosen: the thousands
  alternatives:
  - thousands
  lexicon: HALOT
  rationale: The article is present in Hebrew, and retaining 'the thousands' preserves
    the rhetorical contrast with 'ten thousands' in Saul's complaint.
- source_word: וְעוֹד לוֹ אַךְ
  chosen: what more can he have but
  alternatives:
  - and still for him only
  - there remains for him only
  - only the kingdom is left for him
  lexicon: HALOT
  rationale: This compressed Hebrew clause expresses Saul's conclusion that only one
    thing remains for David to receive. The chosen rendering makes the implied rhetorical
    force explicit in idiomatic English while staying close to the sense.
- source_word: הַמְּלוּכָה
  chosen: the kingdom
  alternatives:
  - the kingship
  - the royal power
  lexicon: HALOT
  rationale: The noun can denote kingship or kingdom. Here Saul fears David's accession
    to rule; 'the kingdom' is the most idiomatic English rendering and fits the narrative
    context.
