id: 1SA.18.24
reference: 1 Samuel 18:24
source:
  edition: WLC
  text: וַ/יַּגִּ֜דוּ עַבְדֵ֥י שָׁא֛וּל ל֖/וֹ לֵ/אמֹ֑ר כַּ/דְּבָרִ֥ים הָ/אֵ֖לֶּה דִּבֶּ֥ר
    דָּוִֽד׃פ
translation:
  text: Saul’s servants told him, saying, “David spoke these words.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'according to these words David spoke.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגִּדוּ
  chosen: told
  alternatives:
  - reported
  - informed
  lexicon: HALOT
  rationale: The Hifil of נגד commonly means to tell or report. 'Told' is natural
    modern English and fits the direct-object-plus-recipient construction here.
- source_word: עַבְדֵי שָׁאוּל
  chosen: Saul’s servants
  alternatives:
  - Saul’s attendants
  - Saul’s officials
  lexicon: HALOT
  rationale: עבד can denote servants, attendants, or officials depending on context.
    In the royal court setting, 'servants' is a standard and sufficiently broad rendering
    that preserves the source wording without over-specifying rank.
- source_word: לוֹ
  chosen: him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The pronominal object refers back to Saul. English idiom with 'told'
    naturally renders this as 'told him' rather than the more wooden 'told to him.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  - ':'
  lexicon: HALOT
  rationale: The infinitive introduces the content of the report. 'Saying' preserves
    the Hebrew discourse marker in readable English.
- source_word: כַּדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - like these words
  - these things
  - in this way
  lexicon: HALOT
  rationale: Literally 'according to these words' or 'like these words.' In context
    it introduces the substance of David's reply just reported in the previous verse.
    'These words' is concise and idiomatic while staying close to the Hebrew.
- source_word: דִּבֶּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The verb דבר is well represented by 'spoke.' 'Said' is possible, but
    'spoke' better reflects the lexical distinction from אמר while remaining natural.
- source_word: דָּוִד
  chosen: David
  rationale: Standard English transliteration of the personal name.
