id: 1SA.18.17
reference: 1 Samuel 18:17
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר שָׁא֜וּל אֶל דָּוִ֗ד הִנֵּה֩ בִתִּ֨/י הַ/גְּדוֹלָ֤ה מֵרַב֙ אֹתָ/הּ֙ אֶתֶּן לְ/ךָ֣ לְ/אִשָּׁ֔ה אַ֚ךְ הֱיֵה לִּ֣/י לְ/בֶן חַ֔יִל וְ/הִלָּחֵ֖ם מִלְחֲמ֣וֹת יְהוָ֑ה וְ/שָׁא֣וּל אָמַ֗ר אַל תְּהִ֤י יָדִ/י֙ בּ֔/וֹ וּ/תְהִי ב֖/וֹ יַד פְּלִשְׁתִּֽים־־־־־־־׃ס
translation:
  text: Then Saul said to David, “Here is my older daughter Merab; I will give her to you as a wife. Only be a valiant man for me, and fight Yahweh’s battles.” For Saul said, “Let not my hand be against him, but let the hand of the Philistines be against him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “be a man of valor for me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces Saul’s proposal with deictic force. 'Look' preserves the attention-getting function in readable modern English better than the more archaic 'Behold.'
- source_word: בִתִּי הַגְּדוֹלָה
  chosen: my older daughter
  alternatives:
  - my eldest daughter
  - my great/older daughter
  lexicon: HALOT
  rationale: הַגְּדוֹלָה marks relative age/status among daughters. 'Older daughter' is natural English and avoids overstating with 'eldest' unless exclusivity is emphasized.
- source_word: מֵרַב
  chosen: Merab
  rationale: Personal name is transliterated per translation philosophy.
- source_word: אֶתֶּן לְךָ לְאִשָּׁה
  chosen: I will give her to you as a wife
  alternatives:
  - I will give her to you for a wife
  - I will give her to you in marriage
  lexicon: HALOT
  rationale: This preserves the idiomatic marriage formula while remaining natural in modern English. 'As a wife' keeps the formal structure of the Hebrew.
- source_word: אַךְ
  chosen: Only
  alternatives:
  - But only
  - Surely only
  - However
  lexicon: HALOT
  rationale: Marks the condition attached to Saul’s offer. 'Only' is concise and fits the Hebrew adversative/limiting force.
- source_word: הֱיֵה לִּי לְבֶן חַיִל
  chosen: be a valiant man for me
  alternatives:
  - be a man of valor for me
  - prove yourself a worthy man for me
  - be a mighty man for me
  lexicon: HALOT
  rationale: בֶן חַיִל is an idiom for a man characterized by valor, strength, or worth. 'Valiant man' best captures the military context here without becoming wooden. 'For me' preserves Saul’s self-interested framing.
- source_word: וְהִלָּחֵם
  chosen: and fight
  alternatives:
  - and wage war
  - and do battle
  lexicon: HALOT
  rationale: Straightforward imperative/volitional sense in context; 'fight' is the most natural equivalent.
- source_word: מִלְחֲמוֹת יְהוָה
  chosen: the LORD’s battles
  alternatives:
  - the battles of the LORD
  - the LORD’s wars
  lexicon: HALOT
  rationale: Construct phrase referring to battles undertaken on behalf of Israel’s covenant God. 'The LORD’s battles' is idiomatic and preserves the covenant name according to doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project’s stated default for the divine name.
- source_word: אַל תְּהִי יָדִי בוֹ
  chosen: Let not my hand be against him
  alternatives:
  - May my hand not be on him
  - Let my hand not come upon him
  lexicon: HALOT
  rationale: '''Hand'' here is a Hebrew idiom for agency or power used harmfully. The translation keeps the metaphor while making the hostile sense explicit with ''against him.'''
- source_word: וּתְהִי בוֹ יַד פְּלִשְׁתִּים
  chosen: but let the hand of the Philistines be against him
  alternatives:
  - but let the Philistines strike him
  - but let the hand of the Philistines come upon him
  lexicon: HALOT
  rationale: Maintains the parallelism with 'my hand' and preserves the idiom of hostile power. 'Be against him' makes the intended harm clear.
- source_word: וְשָׁאוּל אָמַר
  chosen: For Saul said
  alternatives:
  - Now Saul had said
  - And Saul said to himself
  lexicon: HALOT
  rationale: This clause explains Saul’s motive. 'For' brings out the explanatory force in English better than a simple 'and.'
