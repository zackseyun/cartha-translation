id: 1SA.18.23
reference: 1 Samuel 18:23
source:
  edition: WLC
  text: וַֽ/יְדַבְּר֞וּ עַבְדֵ֤י שָׁאוּל֙ בְּ/אָזְנֵ֣י דָוִ֔ד אֶת הַ/דְּבָרִ֖ים הָ/אֵ֑לֶּה
    וַ/יֹּ֣אמֶר דָּוִ֗ד הַֽ/נְקַלָּ֤ה בְ/עֵֽינֵי/כֶם֙ הִתְחַתֵּ֣ן בַּ/מֶּ֔לֶךְ וְ/אָנֹכִ֖י
    אִֽישׁ רָ֥שׁ וְ/נִקְלֶֽה־־׃
translation:
  text: So Saul’s servants spoke these words in David’s hearing, and David said, “Does
    it seem to you a small thing to become the king’s son-in-law, when I am a poor
    and lightly regarded man?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do you regard it as insignificant to become related by marriage to
      the king?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבְּרוּ
  chosen: spoke
  alternatives:
  - said
  - told
  lexicon: HALOT
  rationale: Standard rendering of דבר in narrative context. 'Spoke' fits the plural
    subject and preserves the simple verbal action without overinterpreting it as
    a formal message.
- source_word: בְּאָזְנֵי דָוִד
  chosen: in David’s hearing
  alternatives:
  - in David’s ears
  - to David
  lexicon: HALOT
  rationale: The idiom literally refers to the ears, but in English 'in David’s hearing'
    naturally conveys that the words were spoken so David could hear them, preserving
    the idiomatic force.
- source_word: אֶת־הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - this message
  lexicon: HALOT
  rationale: '''These words'' is a natural and fairly formal rendering of the phrase
    in this immediate-speech context.'
- source_word: הַנְקַלָּה
  chosen: Does it seem to you a small thing
  alternatives:
  - Is it a light thing in your eyes
  - Do you regard it as insignificant
  lexicon: HALOT
  rationale: The Hebrew uses the adjective/root קלל in an idiomatic rhetorical question
    with 'in your eyes.' This rendering preserves the rhetorical force while using
    idiomatic English.
- source_word: בְעֵינֵיכֶם
  chosen: to you
  alternatives:
  - in your eyes
  lexicon: HALOT
  rationale: The underlying idiom is preserved in sense rather than woodenly. 'To
    you' communicates evaluation from the hearers' perspective in natural English.
- source_word: הִתְחַתֵּן בַּמֶּלֶךְ
  chosen: to become the king’s son-in-law
  alternatives:
  - to marry into the king
  - to make a marriage alliance with the king
  lexicon: HALOT
  rationale: The hitpael of חתן here refers specifically to entering a marriage relationship
    with the king by marrying his daughter. 'Become the king’s son-in-law' makes the
    implied relation explicit and is the clearest English equivalent in context.
- source_word: וְאָנֹכִי
  chosen: when I am
  alternatives:
  - and I am
  - while I am
  lexicon: HALOT
  rationale: The conjunction introduces David’s contrasting self-assessment as grounds
    for his response. 'When I am' reads naturally in English while preserving the
    contrast.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: Gender-accurate rendering is appropriate here because David is speaking
    of himself specifically as a man, not humanity in general.
- source_word: רָשׁ
  chosen: poor
  alternatives:
  - needy
  - impoverished
  lexicon: HALOT
  rationale: '''Poor'' is the most direct and natural rendering, matching David’s
    statement about his low social and economic standing.'
- source_word: וְנִקְלֶה
  chosen: lightly regarded
  alternatives:
  - of little account
  - insignificant
  - despised
  lexicon: HALOT
  rationale: The term denotes being slight, lightly esteemed, or socially insignificant.
    'Lightly regarded' preserves the semantic link with the earlier 'small/light thing'
    while fitting David’s self-deprecating statement. 'Despised' would be too strong
    in this context.
