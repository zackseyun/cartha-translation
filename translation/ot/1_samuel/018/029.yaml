id: 1SA.18.29
reference: 1 Samuel 18:29
source:
  edition: WLC
  text: וַ/יֹּ֣אסֶף שָׁא֗וּל לֵ/רֹ֛א מִ/פְּנֵ֥י דָוִ֖ד ע֑וֹד וַ/יְהִ֥י שָׁא֛וּל אֹיֵ֥ב
    אֶת דָּוִ֖ד כָּל הַ/יָּמִֽים־־׃ס
translation:
  text: Saul continued to fear David even more, and Saul was David’s enemy all his
    days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Saul continued to fear David still/further.' The Hebrew idiom combines
      'added/continued' with 'to fear,' and עוֹד intensifies the sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'Saul was an enemy to David all the days,' that is, continually. The
      Hebrew phrase may emphasize ongoing duration rather than strictly Saul's lifetime.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאסֶף
  chosen: continued
  alternatives:
  - added
  - again
  lexicon: HALOT
  rationale: The idiom יָסַף + infinitive often means to continue or do further. In
    English, 'continued' best captures the verbal force naturally here.
- source_word: לֵרֹא
  chosen: to fear
  alternatives:
  - to be afraid
  lexicon: HALOT
  rationale: From ירא. 'Fear' preserves the broader semantic range, including dread
    and apprehension, and fits the narrative escalation.
- source_word: מִפְּנֵי דָוִד
  chosen: David
  alternatives:
  - because of David
  - before David
  lexicon: HALOT
  rationale: With ירא, the phrase literally 'from/before the face of David' functions
    idiomatically for fearing David. English does not require a literal rendering
    of פָּנִים here.
- source_word: עוֹד
  chosen: even more
  alternatives:
  - still
  - again
  - further
  lexicon: HALOT
  rationale: In context עוֹד intensifies the prior fear noted in the surrounding narrative.
    'Even more' communicates the comparative escalation more clearly than a bare 'still'.
- source_word: וַיְהִי
  chosen: was
  alternatives:
  - became
  lexicon: HALOT
  rationale: Though היה can mean 'became,' the clause summarizes Saul's settled posture
    toward David. 'Was' reads naturally in English while preserving the state description.
- source_word: אֹיֵב
  chosen: enemy
  alternatives:
  - hostile
  - an adversary
  lexicon: HALOT
  rationale: The noun denotes an enemy/adversary. 'Enemy' is the most direct and idiomatic
    rendering.
- source_word: אֶת דָּוִד
  chosen: David’s enemy
  alternatives:
  - an enemy to David
  - enemy of David
  lexicon: HALOT
  rationale: The construction marks David as the object of Saul's enmity. The possessive
    form is natural English.
- source_word: כָּל הַיָּמִים
  chosen: all his days
  alternatives:
  - all the days
  - continually
  lexicon: HALOT
  rationale: The phrase can mean 'all the time' or 'all his days.' Given the singular
    subject Saul and the narrative summary, 'all his days' best conveys enduring lifelong
    hostility.
