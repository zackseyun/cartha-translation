id: 1SA.18.2
reference: 1 Samuel 18:2
source:
  edition: WLC
  text: וַ/יִּקָּחֵ֥/הוּ שָׁא֖וּל בַּ/יּ֣וֹם הַ/ה֑וּא וְ/לֹ֣א נְתָנ֔/וֹ לָ/שׁ֖וּב
    בֵּ֥ית אָבִֽי/ו׃
translation:
  text: Saul took him that day and did not allow him to return to his father's house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not permit him to return.' The Hebrew literally says 'did not give
      him to return,' using נתן idiomatically for permission.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּחֵהוּ
  chosen: took him
  alternatives:
  - received him
  - took him into his service
  lexicon: HALOT
  rationale: לקח literally means 'take.' In this context Saul is taking David into
    his court/service, but 'took him' preserves the Hebrew wording without over-paraphrasing.
    The fuller implication can be inferred from context.
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Standard English transliteration of the personal name.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: The phrase means 'on/that day.' 'That day' is natural modern English
    and preserves the temporal specificity.
- source_word: וְלֹא נְתָנוֹ
  chosen: did not allow him
  alternatives:
  - did not give him
  - did not permit him
  lexicon: HALOT
  rationale: נתן with an infinitive here is an idiom meaning to allow/permit someone
    to do something. Rendering it woodenly as 'did not give him to return' would be
    unnatural and obscure the sense.
- source_word: לָשׁוּב
  chosen: to return
  alternatives:
  - to go back
  lexicon: HALOT
  rationale: שׁוב commonly means 'return.' This is the most direct and natural rendering
    here.
- source_word: בֵּית אָבִיו
  chosen: to his father's house
  alternatives:
  - to the house of his father
  - home to his father’s house
  lexicon: HALOT
  rationale: בית אביו is a standard familial expression meaning his paternal household/home.
    'His father's house' preserves the idiom while remaining readable.
