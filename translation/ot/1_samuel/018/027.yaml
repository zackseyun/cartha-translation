id: 1SA.18.27
reference: 1 Samuel 18:27
source:
  edition: WLC
  text: וַ/יָּ֨קָם דָּוִ֜ד וַ/יֵּ֣לֶךְ ה֣וּא וַ/אֲנָשָׁ֗י/ו וַ/יַּ֣ךְ בַּ/פְּלִשְׁתִּים֮
    מָאתַ֣יִם אִישׁ֒ וַ/יָּבֵ֤א דָוִד֙ אֶת עָרְלֹ֣תֵי/הֶ֔ם וַ/יְמַלְא֣וּ/ם לַ/מֶּ֔לֶךְ
    לְ/הִתְחַתֵּ֖ן בַּ/מֶּ֑לֶךְ וַ/יִּתֶּן ל֥/וֹ שָׁא֛וּל אֶת מִיכַ֥ל בִּתּ֖/וֹ לְ/אִשָּֽׁה׀־־־׃ס
translation:
  text: So David arose and went, he and his men, and struck down two hundred Philistine
    men. Then David brought their foreskins, and they counted them out in full to
    the king, so that he might become the king’s son-in-law. And Saul gave him Michal
    his daughter as a wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they presented the full number to the king.' The Hebrew verb is difficult
      and may refer either to counting them out or to completing the required tally
      before the king.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום often marks the beginning of decisive action in
    narrative. 'Arose' preserves the idiomatic narrative force better than the flatter
    'got up.'
- source_word: וַיֵּלֶךְ הוּא וַאֲנָשָׁיו
  chosen: went, he and his men
  alternatives:
  - went with his men
  - he and his men went
  lexicon: HALOT
  rationale: The pronoun הוּא is explicit for emphasis; rendering it appositionally
    as 'he and his men' preserves the Hebrew emphasis and narrative cadence.
- source_word: וַיַּךְ בַּפְּלִשְׁתִּים
  chosen: struck down ... Philistine men
  alternatives:
  - killed ... Philistines
  - attacked ... Philistines
  lexicon: HALOT
  rationale: נכה in military contexts commonly means to strike/kill. 'Struck down'
    is vivid and faithful without over-specifying beyond the context; the following
    count of foreskins implies lethal action.
- source_word: מָאתַיִם אִישׁ
  chosen: two hundred Philistine men
  alternatives:
  - two hundred men
  - two hundred of the Philistines
  lexicon: HALOT
  rationale: אִישׁ after a number means 'men/persons.' Including 'Philistine' in English
    makes the object clear and natural.
- source_word: עָרְלֹתֵיהֶם
  chosen: their foreskins
  lexicon: HALOT
  rationale: A direct anatomical term is required by the Hebrew. Euphemizing would
    obscure the text's plain sense and the nature of Saul's bride-price demand in
    context.
- source_word: וַיְמַלְאוּם
  chosen: they counted them out in full
  alternatives:
  - they fulfilled the number of them
  - they presented them in full number
  - they completed them
  lexicon: HALOT
  rationale: The plural verb with 3mp suffix is syntactically difficult, but in context
    it refers to the tallying/presentation of the foreskins to satisfy the required
    number. 'Counted them out in full' captures the idiom and the transactional setting
    before the king.
- source_word: לַמֶּלֶךְ
  chosen: to the king
  lexicon: HALOT
  rationale: Straightforward dative of recipient.
- source_word: לְהִתְחַתֵּן בַּמֶּלֶךְ
  chosen: so that he might become the king’s son-in-law
  alternatives:
  - to marry into the king's family
  - to become related by marriage to the king
  lexicon: HALOT
  rationale: The hitpael of חתן means to enter into a marriage alliance. In this context,
    with Saul giving Michal afterward, 'become the king's son-in-law' is the most
    precise and idiomatic English rendering.
- source_word: וַיִּתֶּן לוֹ שָׁאוּל אֶת מִיכַל בִּתּוֹ לְאִשָּׁה
  chosen: And Saul gave him Michal his daughter as a wife
  alternatives:
  - And Saul gave his daughter Michal to him as a wife
  - And Saul gave Michal, his daughter, to him for a wife
  lexicon: HALOT
  rationale: This preserves the formal marriage-giving idiom while using readable
    modern English. 'As a wife' is more natural than archaic 'to wife' or 'for a wife.'
