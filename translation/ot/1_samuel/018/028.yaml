id: 1SA.18.28
reference: 1 Samuel 18:28
source:
  edition: WLC
  text: וַ/יַּ֤רְא שָׁאוּל֙ וַ/יֵּ֔דַע כִּ֥י יְהוָ֖ה עִם דָּוִ֑ד וּ/מִיכַ֥ל בַּת שָׁא֖וּל אֲהֵבַֽתְ/הוּ־־׃
translation:
  text: Saul saw and knew that Yahweh was with David, and that Michal the daughter of Saul loved him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Michal daughter of Saul''; English may also be rendered ''Michal, Saul’s daughter.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - realized
  - perceived
  lexicon: HALOT
  rationale: The verb ראה is the ordinary verb 'to see.' In narrative sequence with וַיֵּדַע, 'saw and knew' preserves the Hebrew progression from observation to recognition better than collapsing both into a single cognitive verb.
- source_word: וַיֵּדַע
  chosen: knew
  alternatives:
  - recognized
  - understood
  lexicon: HALOT
  rationale: ידע commonly means 'know.' Here it expresses Saul's settled recognition based on what he observed. 'Knew' keeps the formal force and pairs naturally with 'saw.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: In this context כִּי introduces the content of what Saul knew. English 'that' best represents the content clause.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עִם
  chosen: was with
  alternatives:
  - was alongside
  - was in support of
  lexicon: HALOT
  rationale: The preposition עִם with a person commonly denotes presence or association. 'Was with David' is the natural English rendering and preserves the theological sense of divine favor/presence without overinterpreting it.
- source_word: וּמִיכַל בַּת שָׁאוּל
  chosen: and that Michal daughter of Saul
  alternatives:
  - and Michal, Saul's daughter
  - and that Michal, Saul's daughter
  lexicon: HALOT
  rationale: The Hebrew lacks an explicit second כִּי, but the clause is naturally understood as a second object of Saul's knowledge. Supplying 'that' in English clarifies the syntax. 'Michal daughter of Saul' is a close rendering of the construct phrase, kept without the possessive apostrophe form to stay nearer the Hebrew wording.
- source_word: אֲהֵבַתְהוּ
  chosen: loved him
  alternatives:
  - was loving him
  - had fallen in love with him
  lexicon: HALOT
  rationale: The participial form with pronominal suffix conveys ongoing or characteristic action/state, but idiomatic English in narrative is best served by the simple past 'loved him.' 'Had fallen in love with him' overstates the lexical content.
