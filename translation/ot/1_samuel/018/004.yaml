id: 1SA.18.4
reference: 1 Samuel 18:4
source:
  edition: WLC
  text: וַ/יִּתְפַּשֵּׁ֣ט יְהוֹנָתָ֗ן אֶֽת הַ/מְּעִיל֙ אֲשֶׁ֣ר עָלָ֔י/ו וַֽ/יִּתְּנֵ֖/הוּ
    לְ/דָוִ֑ד וּ/מַדָּ֕י/ו וְ/עַד חַרְבּ֥/וֹ וְ/עַד קַשְׁתּ֖/וֹ וְ/עַד חֲגֹרֽ/וֹ־־־־׃
translation:
  text: Then Jonathan stripped off the robe that was on him and gave it to David,
    along with his armor, and even his sword, his bow, and his belt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his garments' or 'his military attire' for 'his armor'; the Hebrew term
      can denote clothing, often in an official or military sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפַּשֵּׁט
  chosen: stripped off
  alternatives:
  - took off
  - divested himself of
  lexicon: HALOT
  rationale: The hitpael of פשט here denotes removing clothing from oneself. 'Stripped
    off' preserves the reflexive force and the vividness of the action better than
    the flatter 'took off,' without implying total nakedness in context.
- source_word: הַמְּעִיל
  chosen: the robe
  alternatives:
  - the cloak
  - the outer garment
  lexicon: HALOT
  rationale: מְעִיל commonly refers to an outer robe or mantle. 'Robe' is a natural
    English equivalent and fits the likely status-signifying garment in this narrative.
- source_word: אֲשֶׁר עָלָיו
  chosen: that was on him
  alternatives:
  - which he was wearing
  - that was upon him
  lexicon: HALOT
  rationale: This relative clause specifies the robe Jonathan was wearing. 'That was
    on him' is close to the Hebrew while remaining idiomatic.
- source_word: וַיִּתְּנֵהוּ לְדָוִד
  chosen: and gave it to David
  alternatives:
  - and gave it over to David
  lexicon: HALOT
  rationale: Simple narrative נתן is best rendered straightforwardly. The pronoun
    refers back to the robe.
- source_word: וּמַדָּיו
  chosen: along with his armor
  alternatives:
  - and his garments
  - and his military attire
  lexicon: HALOT
  rationale: מַדִּים often denotes garments, especially official or military dress.
    Given the immediate mention of sword, bow, and belt, 'armor' best captures the
    martial context, though the term can more broadly mean attire.
- source_word: וְעַד
  chosen: and even
  alternatives:
  - and as far as
  - including
  lexicon: HALOT
  rationale: The repeated עַד in this list is idiomatic, extending the scope of what
    Jonathan gave. In English, 'and even' conveys the climactic sense that he gave
    not only the robe and armor but also his weapons and belt.
- source_word: חַרְבּוֹ
  chosen: his sword
  lexicon: HALOT
  rationale: Standard rendering of חֶרֶב in this context.
- source_word: קַשְׁתּוֹ
  chosen: his bow
  lexicon: HALOT
  rationale: Standard rendering of קֶשֶׁת in this context.
- source_word: חֲגֹרוֹ
  chosen: his belt
  alternatives:
  - his girdle
  - his waistbelt
  lexicon: HALOT
  rationale: חֲגוֹר denotes something girded around the waist. 'Belt' is clear modern
    English; 'girdle' is archaic.
