theological_decisions:
- issue: Narrative significance of Jonathan's gift-giving
  chosen_reading: Render the verse descriptively without making explicit in the main
    text whether the act symbolizes covenantal submission, royal transfer, or friendship
    alone.
  alternative_readings:
  - The gifts symbolize Jonathan's recognition of David as future king
  - The gifts are primarily tokens of covenant friendship
  rationale: The Hebrew text reports the concrete actions but does not explicitly
    interpret their symbolic meaning in this verse. To preserve theological and narrative
    tension, the translation remains descriptive and leaves fuller interpretation
    to context rather than importing it into the wording.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
