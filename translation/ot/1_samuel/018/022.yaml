id: 1SA.18.22
reference: 1 Samuel 18:22
source:
  edition: WLC
  text: וַ/יְצַ֨ו שָׁא֜וּל אֶת עֲבָדָ֗/ו דַּבְּר֨וּ אֶל דָּוִ֤ד בַּ/לָּט֙ לֵ/אמֹ֔ר
    הִנֵּ֨ה חָפֵ֤ץ בְּ/ךָ֙ הַ/מֶּ֔לֶךְ וְ/כָל עֲבָדָ֖י/ו אֲהֵב֑וּ/ךָ וְ/עַתָּ֖ה הִתְחַתֵּ֥ן
    בַּ/מֶּֽלֶךְ־־־׃
translation:
  text: So Saul commanded his servants, “Speak to David privately, saying, ‘Look,
    the king delights in you, and all his servants love you. So now become the king’s
    son-in-law.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “secretly” or “quietly” for “privately.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “be related by marriage with the king” or “become allied by marriage
      with the king.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: HALOT
  rationale: The verb צוה commonly denotes giving a command or charge. 'Commanded'
    best reflects the directive force in context.
- source_word: עֲבָדוֹ
  chosen: his servants
  alternatives:
  - his attendants
  - his officials
  lexicon: HALOT
  rationale: עבד can mean servant, attendant, or official depending on court context.
    'Servants' is a natural rendering and matches the royal setting without overstating
    rank.
- source_word: דַּבְּרוּ
  chosen: Speak
  alternatives:
  - Tell
  - Talk
  lexicon: HALOT
  rationale: The imperative of דבר here introduces the content Saul wants conveyed.
    'Speak' preserves the verbal form and works smoothly with the following indirect
    quotation.
- source_word: בַּלָּט
  chosen: privately
  alternatives:
  - secretly
  - quietly
  lexicon: HALOT
  rationale: בלט denotes secrecy or concealment. 'Privately' fits the social situation
    and idiomatic English; 'secretly' is possible but slightly stronger.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הנה is a discourse marker drawing attention. 'Look' gives readable modern
    English while preserving the rhetorical force better than archaic 'Behold.'
- source_word: חָפֵץ בְּךָ
  chosen: delights in you
  alternatives:
  - takes pleasure in you
  - is pleased with you
  - desires you
  lexicon: HALOT
  rationale: חפץ with ב often expresses taking pleasure in or delighting in someone.
    'Delights in you' is idiomatic and avoids the potentially misleading English nuance
    of romantic or possessive 'desires you.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: The noun is definite and refers to Saul in his royal capacity. 'The king'
    preserves the formal courtly framing of the speech.
- source_word: אֲהֵבוּךָ
  chosen: love you
  alternatives:
  - are fond of you
  - like you
  lexicon: HALOT
  rationale: אהב normally means 'love.' In this court context it may denote favor
    or affection, but 'love you' is the most direct lexical equivalent and remains
    natural English.
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - and now
  - now then
  lexicon: HALOT
  rationale: The phrase marks a transition from reported favor to urged action. 'So
    now' captures the inferential and exhortatory flow in idiomatic English.
- source_word: הִתְחַתֵּן
  chosen: become the king’s son-in-law
  alternatives:
  - marry into the king's family
  - ally yourself by marriage with the king
  lexicon: HALOT
  rationale: The hitpael of חתן means to enter into a marriage relationship, here
    specifically with the king's household. Since the complement is 'with the king,'
    English requires the more explicit idiom 'become the king’s son-in-law' to convey
    the intended sense.
- source_word: בַּמֶּלֶךְ
  chosen: the king’s
  alternatives:
  - with the king
  lexicon: HALOT
  rationale: 'Literally the Hebrew says ''with the king,'' but in English the idiomatic
    expression for this marriage relation is possessive: ''the king’s son-in-law.''
    This is an optimal-equivalence adjustment demanded by English usage.'
