id: 1SA.18.9
reference: 1 Samuel 18:9
source:
  edition: WLC
  text: וַ/יְהִ֥י שָׁא֖וּל עון אֶת דָּוִ֑ד מֵ/הַ/יּ֥וֹם הַ/ה֖וּא וָ/הָֽלְאָה־׃ס
translation:
  text: And Saul kept a jealous eye on David from that day forward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "And Saul eyed David from that day on," with the sense of watching him
      with envy or suspicion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... kept
  alternatives:
  - and it came to pass
  - and he was
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the clause idiomatically. In English,
    a simple narrative connector plus the following durative sense reads naturally.
    The verb combines with עון to express an ongoing stance, not merely punctiliar
    existence.
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Standard transliteration of the personal name.
- source_word: עון
  chosen: kept a jealous eye on
  alternatives:
  - eying
  - watched
  - was looking at
  - envied
  lexicon: HALOT
  rationale: The written form reflects a rare/defective spelling associated with the
    verb meaning to look at with hostility or envy in this context. Given the immediate
    narrative of Saul's resentment after the women's song (vv. 8–9), the sense is
    not neutral observation but suspicious, envious regard. 'Kept a jealous eye on'
    captures the ongoing hostile watchfulness more idiomatically than the wooden 'eyed.'
- source_word: אֶת
  chosen: 'on'
  alternatives:
  - —
  rationale: Direct object marker in Hebrew; not translated directly. English 'on'
    is supplied as part of the idiom 'keep an eye on' required by the chosen rendering
    of עון.
- source_word: דָּוִד
  chosen: David
  rationale: Standard transliteration of the personal name.
- source_word: מֵהַיּוֹם הַהוּא
  chosen: from that day
  alternatives:
  - from that day on
  - since that day
  lexicon: HALOT
  rationale: Temporal prepositional phrase marking the starting point of Saul's ongoing
    attitude.
- source_word: וָהָלְאָה
  chosen: forward
  alternatives:
  - onward
  - and beyond
  lexicon: HALOT
  rationale: Adverb meaning onward/thereafter. Combined with the previous phrase,
    'from that day forward' is natural modern English and preserves the durative temporal
    force.
