id: 1SA.18.20
reference: 1 Samuel 18:20
source:
  edition: WLC
  text: וַ/תֶּאֱהַ֛ב מִיכַ֥ל בַּת שָׁא֖וּל אֶת דָּוִ֑ד וַ/יַּגִּ֣דוּ לְ/שָׁא֔וּל וַ/יִּשַׁ֥ר
    הַ/דָּבָ֖ר בְּ/עֵינָֽי/ו־־׃
translation:
  text: Now Michal, Saul's daughter, loved David, and they told Saul, and the matter
    pleased him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the matter was right/pleasing in his eyes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֶּאֱהַב
  chosen: loved
  alternatives:
  - fell in love with
  lexicon: HALOT
  rationale: The verb from אהב straightforwardly denotes love. 'Loved' is the most
    direct and least interpretively loaded rendering; 'fell in love with' is possible
    in context but adds an inceptive nuance not explicit in the verb form.
- source_word: מִיכַל
  chosen: Michal
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: בַּת שָׁאוּל
  chosen: Saul's daughter
  alternatives:
  - the daughter of Saul
  lexicon: HALOT
  rationale: Construct chain rendered naturally in modern English as a possessive.
    This preserves the familial identification without unnecessary stiffness.
- source_word: אֶת דָּוִד
  chosen: David
  rationale: Direct-object marker אֶת is untranslated; the object is represented by
    normal English word order. 'David' is transliterated by standard convention.
- source_word: וַיַּגִּדוּ לְשָׁאוּל
  chosen: they told Saul
  alternatives:
  - it was reported to Saul
  - they informed Saul
  lexicon: HALOT
  rationale: The verb נגד in Hiphil commonly means 'tell, report, declare.' The subject
    is third person plural and indefinite/unspecified in Hebrew narrative, so 'they
    told Saul' preserves the form better than the passive 'it was reported to Saul,'
    though that is a viable English alternative.
- source_word: וַיִּשַׁר
  chosen: pleased
  alternatives:
  - was right
  - seemed good
  lexicon: HALOT
  rationale: From ישר, here in the idiom 'was pleasing/right in someone's eyes.' In
    idiomatic English, 'pleased' best conveys the evaluative sense in context.
- source_word: הַדָּבָר
  chosen: the matter
  alternatives:
  - the thing
  - this
  lexicon: HALOT
  rationale: דבר here refers to the reported situation/news rather than a spoken 'word.'
    'The matter' is natural English for the circumstance under discussion.
- source_word: בְּעֵינָיו
  chosen: him
  alternatives:
  - in his eyes
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'in his eyes,' meaning in Saul's judgment
    or estimation. The main text uses idiomatic English ('pleased him'), while the
    literal idiom is worth preserving in a footnote for transparency.
