id: 1SA.18.10
reference: 1 Samuel 18:10
source:
  edition: WLC
  text: וַ/יְהִ֣י מִֽ/מָּחֳרָ֗ת וַ/תִּצְלַ֣ח רוּחַ֩ אֱלֹהִ֨ים רָעָ֤ה אֶל שָׁאוּל֙ וַ/יִּתְנַבֵּ֣א בְ/תוֹךְ הַ/בַּ֔יִת וְ/דָוִ֛ד מְנַגֵּ֥ן בְּ/יָד֖/וֹ כְּ/י֣וֹם בְּ/י֑וֹם וְ/הַ/חֲנִ֖ית בְּ/יַד שָׁאֽוּל׀׀־־׀־׃
translation:
  text: And it happened on the next day that an evil spirit from God rushed upon Saul, and he raved within the house while David was playing with his hand, as he did day by day; and the spear was in Saul’s hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a harmful spirit from God'; Hebrew literally, 'an evil spirit of God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he prophesied' or 'he was in a prophetic frenzy'; the verb can denote ecstatic behavior, but here the context suggests deranged ravings rather than true prophecy.
    reason: alternative_reading
  - marker: c
    text: The instrument is not named in this verse, though it is identified elsewhere in the context.
    reason: cross_reference
  - marker: d
    text: Or 'as day by day'.
    reason: previous_rendering
lexical_decisions:
- source_word: מִמָּחֳרָת
  chosen: on the next day
  alternatives:
  - the next day
  - on the following day
  lexicon: HALOT
  rationale: Temporal expression indicating the day after the preceding events. 'On the next day' is natural English and preserves the narrative sequence.
- source_word: וַתִּצְלַח
  chosen: rushed upon
  alternatives:
  - came powerfully upon
  - prospered upon
  lexicon: HALOT
  rationale: With רוּחַ as subject and אֶל introducing Saul, the verb denotes a forceful onset or overpowering coming. 'Rushed upon' captures the sudden, intense action better than a weaker 'came upon.'
- source_word: רוּחַ אֱלֹהִים רָעָה
  chosen: an evil spirit from God
  alternatives:
  - a harmful spirit from God
  - an evil spirit of God
  lexicon: HALOT
  rationale: The Hebrew construct can be rendered literally 'an evil/harmful spirit of God.' In English, 'from God' best communicates source/permission without implying that God is morally evil. 'Evil spirit' is retained as the most direct rendering of רָעָה, with the theological nuance documented separately.
- source_word: וַיִּתְנַבֵּא
  chosen: he raved
  alternatives:
  - he prophesied
  - he acted like a prophet in frenzy
  - he was in a prophetic frenzy
  lexicon: HALOT
  rationale: In this context Saul is under the influence of the harmful spirit and later attempts violence; the verb is used ironically or for ecstatic frenzy rather than true prophetic speech. 'He raved' communicates the disturbed, uncontrolled behavior in idiomatic English.
- source_word: בְּתוֹךְ הַבַּיִת
  chosen: within the house
  alternatives:
  - inside the house
  - in the midst of the house
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'Within the house' is slightly more formal and fits the narrative tone.
- source_word: מְנַגֵּן בְּיָדוֹ
  chosen: was playing with his hand
  alternatives:
  - was playing music with his hand
  - was playing the lyre with his hand
  lexicon: HALOT
  rationale: The verb means to play music, and 'with his hand' is explicitly present in the Hebrew. The instrument is not named in this verse, so it should not be supplied in the main text.
- source_word: כְּיוֹם בְּיוֹם
  chosen: as day by day
  alternatives:
  - as he did day by day
  - as usual
  - daily
  lexicon: HALOT
  rationale: The idiom indicates customary repetition. 'As day by day' stays close to the Hebrew form, though somewhat wooden; it preserves the sense that David was doing this habitually.
- source_word: הַחֲנִית
  chosen: the spear
  alternatives:
  - the lance
  lexicon: HALOT
  rationale: Standard rendering for the weapon in Saul's hand; 'spear' is the normal English equivalent.
- source_word: בְּיַד שָׁאוּל
  chosen: in Saul’s hand
  alternatives:
  - in the hand of Saul
  lexicon: HALOT
  rationale: Idiomatic English rendering of the possession/location phrase, preserving the ominous detail for the following verse.
