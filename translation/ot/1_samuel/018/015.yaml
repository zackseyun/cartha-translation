id: 1SA.18.15
reference: 1 Samuel 18:15
source:
  edition: WLC
  text: וַ/יַּ֣רְא שָׁא֔וּל אֲשֶׁר ה֖וּא מַשְׂכִּ֣יל מְאֹ֑ד וַ/יָּ֖גָר מִ/פָּנָֽי/ו־׃
translation:
  text: When Saul saw that he was very successful, he stood in fear of him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'acted very wisely' or 'prospered greatly.' The Hebrew verb can denote
      prudent conduct and the success that results from it.
    reason: lexical_alternative
  - marker: b
    text: Literally 'was afraid from before him,' a Hebrew idiom meaning he feared
      him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: When Saul saw
  alternatives:
  - And Saul saw
  - Saul saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering with 'When Saul
    saw' captures the temporal force in English and sets up the resulting action in
    the second clause.
- source_word: אֲשֶׁר הוּא
  chosen: that he
  alternatives:
  - how he
  - that he was
  lexicon: HALOT
  rationale: Introduces the content of Saul's perception. 'That he' is natural English
    and preserves the subordinate relationship.
- source_word: מַשְׂכִּיל
  chosen: was very successful
  alternatives:
  - acted wisely
  - prospered
  - behaved prudently
  lexicon: HALOT
  rationale: The Hiphil participle of שׂכל can denote acting wisely or prospering/succeeding
    as the result of prudent action. In this David context, the term repeatedly carries
    the sense of prospering or succeeding in his undertakings. 'Was very successful'
    communicates the observable outcome Saul feared, while remaining within the semantic
    range.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - exceedingly
  lexicon: HALOT
  rationale: Standard intensifier; 'very' is clear modern English.
- source_word: וַיָּגָר
  chosen: he stood in fear
  alternatives:
  - he was afraid
  - he dreaded
  - he feared
  lexicon: HALOT
  rationale: The verb גור in this stem/context conveys fear or dread. 'Stood in fear'
    reflects a more durative or settled sense than a momentary fright and fits the
    narrative portrayal of Saul's ongoing fear of David.
- source_word: מִפָּנָיו
  chosen: of him
  alternatives:
  - before him
  - because of him
  - from before him
  lexicon: HALOT
  rationale: Literally 'from before him,' an idiom expressing fear in relation to
    a person. In idiomatic English, 'of him' best conveys the sense here.
