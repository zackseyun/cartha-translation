id: 1SA.18.1
reference: 1 Samuel 18:1
source:
  edition: WLC
  text: וַ/יְהִ֗י כְּ/כַלֹּת/וֹ֙ לְ/דַבֵּ֣ר אֶל שָׁא֔וּל וְ/נֶ֨פֶשׁ֙ יְה֣וֹנָתָ֔ן
    נִקְשְׁרָ֖ה בְּ/נֶ֣פֶשׁ דָּוִ֑ד ו/יאהבו יְהוֹנָתָ֖ן כְּ/נַפְשֽׁ/וֹ־׃
translation:
  text: And it happened, when he had finished speaking to Saul, that Jonathan’s soul
    was bound to David’s soul, and Jonathan loved him as his own soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jonathan’s soul was knit to David’s soul.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew repeatedly uses ''soul'' (nephesh) in this verse: ''Jonathan’s soul
      ... David’s soul ... his own soul.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new scene. 'And it happened'
    preserves the Hebrew narrative formula in readable modern English without archaic
    tone.
- source_word: כְּכַלֹּתוֹ לְדַבֵּר
  chosen: when he had finished speaking
  alternatives:
  - as soon as he finished speaking
  - when he finished speaking
  lexicon: HALOT
  rationale: The preposition כְ with infinitive construct plus suffix marks temporal
    sequence. The pluperfect-like English 'had finished speaking' fits the narrative
    flow into the next event.
- source_word: אֶל שָׁאוּל
  chosen: to Saul
  alternatives:
  - with Saul
  lexicon: HALOT
  rationale: אֶל normally indicates direction toward; 'to Saul' is the most direct
    rendering in this speech context.
- source_word: נֶפֶשׁ
  chosen: soul
  alternatives:
  - life
  - self
  - being
  lexicon: HALOT
  rationale: The verse repeats נֶפֶשׁ three times in a relational idiom. Rendering
    it consistently as 'soul' preserves the lexical repetition and the intensity of
    personal attachment better than flattening to 'life' or 'self.'
- source_word: נִקְשְׁרָה
  chosen: was bound
  alternatives:
  - was knit
  - was tied
  lexicon: HALOT
  rationale: From קשר, 'to bind/tie.' 'Was bound' is transparent modern English and
    preserves the metaphor of strong attachment. 'Was knit' is traditional but less
    natural for contemporary readers.
- source_word: בְּנֶפֶשׁ דָּוִד
  chosen: to David’s soul
  alternatives:
  - with David’s soul
  - to David
  lexicon: HALOT
  rationale: The idiom expresses Jonathan's inner life being closely joined to David's.
    'To David’s soul' keeps the repeated noun explicit rather than reducing it to
    a simpler but less textually transparent 'to David.'
- source_word: וַיֶּאֱהָבוֹ
  chosen: Jonathan loved him
  alternatives:
  - Jonathan came to love him
  - he loved him
  lexicon: HALOT
  rationale: The verb אהב with 3ms object suffix indicates Jonathan as subject and
    David as object. 'Loved him' is the straightforward lexical equivalent; no euphemistic
    or romantic expansion is warranted by the Hebrew alone.
- source_word: כְּנַפְשׁוֹ
  chosen: as his own soul
  alternatives:
  - as himself
  - as his own life
  lexicon: HALOT
  rationale: The comparison explicitly uses נֶפֶשׁ again. 'As his own soul' preserves
    the repeated Hebrew term and the depth of identification; 'as himself' is idiomatic
    but obscures the lexical pattern.
