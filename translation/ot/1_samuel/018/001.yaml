theological_decisions:
- issue: Nature of Jonathan's love for David
  chosen_reading: 'Render the text with the ordinary language of covenantal personal
    attachment: ''Jonathan loved him as his own soul,'' without importing sexual or
    romantic implications.'
  alternative_readings:
  - Interpret the language as primarily political alliance
  - Interpret the language as romantic/sexual love
  rationale: The Hebrew uses נפשׁ and אהב in a way that clearly communicates profound
    personal bond and affection. The verse itself does not specify erotic content,
    so the translation should neither suppress the strength of the bond nor import
    claims beyond the text.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never import doctrinal claims the text does not make.'
