id: 1SA.18.13
reference: 1 Samuel 18:13
source:
  edition: WLC
  text: וַ/יְסִרֵ֤/הוּ שָׁאוּל֙ מֵֽ/עִמּ֔/וֹ וַ/יְשִׂמֵ֥/הוּ ל֖/וֹ שַׂר אָ֑לֶף וַ/יֵּצֵ֥א
    וַ/יָּבֹ֖א לִ/פְנֵ֥י הָ/עָֽם־׃פ
translation:
  text: So Saul removed him from his presence and appointed him commander of a thousand,
    and he went out and came in before the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'went out and came in,' an idiom for carrying out public or military
      activity, possibly with the sense of leading the people.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְסִרֵהוּ
  chosen: removed him
  alternatives:
  - took him away
  - dismissed him
  lexicon: HALOT
  rationale: From סוּר in the causative sense, meaning to remove or take away. 'Removed
    him' preserves the concrete action without overinterpreting motive.
- source_word: מֵעִמּוֹ
  chosen: from his presence
  alternatives:
  - from with him
  - away from him
  lexicon: HALOT
  rationale: Literally 'from with him.' 'From his presence' is idiomatic English that
    preserves the relational/court setting better than the wooden 'from with him.'
- source_word: וַיְשִׂמֵהוּ לוֹ
  chosen: appointed him
  alternatives:
  - set him for himself
  - made him
  lexicon: HALOT
  rationale: שׂוּם + indirect object here indicates assigning David to an office.
    'Appointed him' best captures official placement in readable English.
- source_word: שַׂר אָלֶף
  chosen: commander of a thousand
  alternatives:
  - captain of a thousand
  - leader of a thousand
  lexicon: HALOT
  rationale: שַׂר denotes an official leader or commander. 'Commander of a thousand'
    is clear modern English and preserves the military-administrative sense.
- source_word: וַיֵּצֵא וַיָּבֹא
  chosen: went out and came in
  alternatives:
  - led campaigns
  - went about among
  lexicon: HALOT
  rationale: This Hebrew idiom can denote regular public/military activity or leadership.
    The more literal 'went out and came in' preserves the source wording and lets
    the context supply the sense.
- source_word: לִפְנֵי הָעָם
  chosen: before the people
  alternatives:
  - in the sight of the people
  - at the head of the people
  lexicon: HALOT
  rationale: Literally 'before the people.' This can imply visibility or leadership,
    but the base phrase is best preserved in the main text without narrowing it.
