id: 1SA.18.21
reference: 1 Samuel 18:21
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר שָׁא֜וּל אֶתְּנֶ֤/נָּה לּ/וֹ֙ וּ/תְהִי ל֣/וֹ לְ/מוֹקֵ֔שׁ וּ/תְהִי
    ב֖/וֹ יַד פְּלִשְׁתִּ֑ים וַ/יֹּ֤אמֶר שָׁאוּל֙ אֶל דָּוִ֔ד בִּ/שְׁתַּ֛יִם תִּתְחַתֵּ֥ן
    בִּ֖/י הַ/יּֽוֹם־־־־׃
translation:
  text: Then Saul said, “I will give her to him, so that she may become a snare to
    him and the hand of the Philistines may be against him.” So Saul said to David,
    “By the second one you may become my son-in-law today.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “For the second time you may become my son-in-law today.” The Hebrew
      phrase is elliptical and may refer either to Saul’s second daughter or to a
      second opportunity for David to marry into Saul’s family.
    reason: alternative_reading
lexical_decisions:
- source_word: אֶתְּנֶנָּה לּוֹ
  chosen: I will give her to him
  alternatives:
  - I will give her to him in marriage
  - I will give her to him as wife
  lexicon: HALOT
  rationale: נתן with a female object and indirect object in a marriage context means
    to give a daughter in marriage. The shorter rendering preserves the Hebrew wording
    while allowing the marriage sense to be supplied by context.
- source_word: וּתְהִי לוֹ לְמוֹקֵשׁ
  chosen: so that she may become a snare to him
  alternatives:
  - and let her be a snare to him
  - that she may be a trap for him
  lexicon: HALOT
  rationale: מוֹקֵשׁ commonly denotes a snare or trap. 'Snare' preserves the metaphor
    and matches common biblical usage. The prefixed verb is rendered with purposive
    force in context, reflecting Saul's intent.
- source_word: וּתְהִי בוֹ יַד פְּלִשְׁתִּים
  chosen: and the hand of the Philistines may be against him
  alternatives:
  - and let the hand of the Philistines be upon him
  - and the Philistines may get him
  lexicon: HALOT
  rationale: '''Hand'' is a common Hebrew idiom for power or hostile action. Retaining
    ''hand'' keeps the imagery, while ''be against him'' makes the hostile sense clear
    in natural English.'
- source_word: בִּשְׁתַּיִם
  chosen: By the second one
  alternatives:
  - Through the second one
  - With the second one
  - For the second time
  lexicon: HALOT
  rationale: 'The phrase is difficult and elliptical. In context Saul is speaking
    of his second daughter after Merab was not given to David. ''By the second one''
    best captures the instrumental sense: through the second daughter David may become
    Saul''s son-in-law. ''For the second time'' is possible but less likely because
    the immediate context centers on the second daughter, not merely a repeated opportunity.'
- source_word: תִּתְחַתֵּן בִּי
  chosen: you may become my son-in-law
  alternatives:
  - you shall become related to me by marriage
  - you may marry into my family
  lexicon: HALOT
  rationale: The hitpael of חתן with ב marks entering a marriage alliance with someone,
    here specifically becoming Saul's son-in-law. This is more idiomatic and precise
    than a wooden 'make yourself a bridegroom with me.'
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  - now
  lexicon: HALOT
  rationale: הַיּוֹם normally means 'today' or 'this day.' Here it likely has an immediate,
    rhetorical force in Saul's speech, so 'today' is retained.
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  chosen: Then Saul said ... So Saul said
  alternatives:
  - And Saul said ... and Saul said
  lexicon: HALOT
  rationale: 'The repeated narrative verb is preserved with slight English variation
    for readability while maintaining the twofold speech structure: Saul''s internal
    intention and his direct speech to David.'
