theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Counterfactual force of the clause כִּי עַתָּה הֵכִין יְהוָה...
  chosen_reading: for now Yahweh would have established your kingdom over Israel forever
  alternative_readings:
  - for now the LORD had established your kingdom over Israel forever
  rationale: The broader discourse makes clear Samuel is describing the forfeited outcome of Saul's disobedience, not stating that the kingdom had in fact already been permanently established. English therefore uses a counterfactual conditional sense to convey the Hebrew in context without adding doctrinal content.
