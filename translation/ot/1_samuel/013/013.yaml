id: 1SA.13.13
reference: 1 Samuel 13:13
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר שְׁמוּאֵ֛ל אֶל שָׁא֖וּל נִסְכָּ֑לְתָּ לֹ֣א שָׁמַ֗רְתָּ אֶת מִצְוַ֞ת יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ אֲשֶׁ֣ר צִוָּ֔/ךְ כִּ֣י עַתָּ֗ה הֵכִ֨ין יְהוָ֧ה אֶת מַֽמְלַכְתְּ/ךָ֛ אֶל יִשְׂרָאֵ֖ל עַד עוֹלָֽם־־־־־׃
translation:
  text: And Samuel said to Saul, “You have acted foolishly. You have not kept the command of Yahweh your God, which he commanded you; for now Yahweh would have established your kingdom over Israel forever.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “You have done foolishly.”
    reason: lexical_alternative
lexical_decisions:
- source_word: נִסְכָּלְתָּ
  chosen: You have acted foolishly
  alternatives:
  - You have done foolishly
  - You have been foolish
  lexicon: HALOT
  rationale: From סכל in the nifal, expressing foolish action/behavior rather than merely a state. 'Acted foolishly' is idiomatic modern English and preserves the moral evaluation.
- source_word: שָׁמַרְתָּ
  chosen: have not kept
  alternatives:
  - have not observed
  - have not obeyed
  lexicon: HALOT
  rationale: שׁמר commonly means 'keep, guard, observe.' 'Kept' preserves the covenantal-command sense without over-paraphrasing to 'obeyed,' though obedience is implied.
- source_word: מִצְוַת
  chosen: the command
  alternatives:
  - the commandment
  lexicon: HALOT
  rationale: 'Singular construct with the divine name: a specific command in view. ''Command'' is clearer modern English than ''commandment'' while retaining the force.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Straightforward possessive construction following the divine name: ''the LORD your God.'''
- source_word: צִוָּךְ
  chosen: he commanded you
  alternatives:
  - he gave you
  - he ordered you
  lexicon: HALOT
  rationale: צוה is the standard verb 'command.' The morphology note appears irregular in person/gender tagging, but context clearly yields 'which he commanded you,' referring to the LORD's prior instruction to Saul.
- source_word: כִּי עַתָּה
  chosen: for now
  alternatives:
  - for by now
  - because now
  - indeed now
  lexicon: HALOT
  rationale: Introduces the consequence of Saul's failure. 'For now' fits the explanatory force in context.
- source_word: הֵכִין
  chosen: would have established
  alternatives:
  - had established
  - would now have established
  - made firm
  lexicon: HALOT
  rationale: In context this refers to what would have happened had Saul obeyed; English counterfactual idiom is best conveyed by 'would have established' rather than a simple past perfect.
- source_word: מַמְלַכְתְּךָ
  chosen: your kingdom
  alternatives:
  - your reign
  - your kingship
  lexicon: HALOT
  rationale: ממלכה most naturally denotes kingdom/royal dominion. 'Your kingdom' is the most direct and idiomatic rendering here.
- source_word: אֶל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - for Israel
  - unto Israel
  lexicon: HALOT
  rationale: Although אֶל is literally 'to/toward,' with verbs of establishing rule and a kingdom object, English idiom requires 'over Israel' to express dominion.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for all time
  - perpetually
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the phrase indicating enduring duration.
