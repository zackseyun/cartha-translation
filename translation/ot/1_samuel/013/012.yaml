id: 1SA.13.12
reference: 1 Samuel 13:12
source:
  edition: WLC
  text: וָ/אֹמַ֗ר עַ֠תָּה יֵרְד֨וּ פְלִשְׁתִּ֤ים אֵלַ/י֙ הַ/גִּלְגָּ֔ל וּ/פְנֵ֥י יְהוָ֖ה לֹ֣א חִלִּ֑יתִי וָֽ/אֶתְאַפַּ֔ק וָ/אַעֲלֶ֖ה הָ/עֹלָֽה׃ס
translation:
  text: So I said, ‘Now the Philistines will come down against me at Gilgal, and I have not sought the favor of Yahweh.’ So I forced myself and offered up the burnt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''I have not sought the favor of the LORD,'' literally, ''I have not entreated the face of the LORD.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'I restrained myself.' The Hebrew verb can carry the sense of holding oneself in or mastering oneself; here it likely means Saul compelled himself to act.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: So I said
  alternatives:
  - And I said
  - Then I said
  lexicon: HALOT
  rationale: The waw-consecutive advances Saul's explanation in narrative sequence. 'So I said' reads naturally in English while preserving the inferential/sequential force.
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - at this point
  - as things are
  lexicon: HALOT
  rationale: Temporal adverb marking urgency in Saul's reasoning; 'Now' is concise and idiomatic.
- source_word: יֵרְדוּ
  chosen: will come down
  alternatives:
  - will go down
  - are coming down
  lexicon: HALOT
  rationale: ירד literally means 'go down/descend.' In military movement toward Gilgal, 'come down' preserves the directional sense from Saul's perspective better than a flat 'attack.'
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard ethnic designation.
- source_word: אֵלַי
  chosen: against me
  alternatives:
  - to me
  - upon me
  lexicon: HALOT
  rationale: Although literally 'to me,' in this military context English idiom requires 'against me' to convey hostile movement.
- source_word: הַגִּלְגָּל
  chosen: at Gilgal
  alternatives:
  - to Gilgal
  - at the Gilgal
  lexicon: HALOT
  rationale: Place name transliterated per policy. With the movement verb and context, 'at Gilgal' best captures the anticipated confrontation there.
- source_word: וּפְנֵי יְהוָה
  chosen: the favor of the LORD
  alternatives:
  - the face/presence of the LORD
  - the LORD's face
  lexicon: HALOT
  rationale: The idiom involving 'face' with the following verb חלּה means to appease, entreat, or seek favor from someone. Rendering the idiom woodenly as 'the face of the LORD' would obscure the sense. 'the LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: לֹא חִלִּיתִי
  chosen: I have not sought
  alternatives:
  - I have not entreated
  - I have not appeased
  - I have not sought the favor of
  lexicon: HALOT
  rationale: With פְּנֵי as object, the phrase means to seek favor/entreat. In the running English sentence, 'I have not sought the favor of the LORD' expresses the full idiom clearly. The auxiliary 'have' reflects Saul's retrospective explanation.
- source_word: וָאֶתְאַפַּק
  chosen: So I forced myself
  alternatives:
  - So I restrained myself
  - So I compelled myself
  lexicon: HALOT
  rationale: The hitpael of אפק conveys self-restraint or forcing oneself to act despite reluctance. In context Saul is justifying an action he felt pressured into; 'I forced myself' captures that nuance better than the potentially misleading 'restrained myself.'
- source_word: וָאַעֲלֶה
  chosen: and offered up
  alternatives:
  - and I offered
  - and I caused to ascend
  lexicon: HALOT
  rationale: עלה with עולה is sacrificial language for offering. 'Offered up' preserves the cultic idiom without awkward literalism.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: Standard rendering for עולה in sacrificial contexts; clear and conventional without being archaic.
