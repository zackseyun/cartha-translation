id: 1SA.13.14
reference: 1 Samuel 13:14
source:
  edition: WLC
  text: וְ/עַתָּ֖ה מַמְלַכְתְּ/ךָ֣ לֹא תָק֑וּם בִּקֵּשׁ֩ יְהוָ֨ה ל֜/וֹ אִ֣ישׁ כִּ/לְבָב֗/וֹ וַ/יְצַוֵּ֨/הוּ יְהוָ֤ה לְ/נָגִיד֙ עַל עַמּ֔/וֹ כִּ֚י לֹ֣א שָׁמַ֔רְתָּ אֵ֥ת אֲשֶֽׁר צִוְּ/ךָ֖ יְהוָֽה־־־׃פ
translation:
  text: But now your kingdom will not endure. Yahweh has sought for himself a man according to his own heart, and Yahweh has appointed him ruler over his people, because you have not kept what Yahweh commanded you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after his own heart.' The Hebrew phrase literally reads 'according to his heart.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will not stand.'
    reason: lexical_alternative
  - marker: c
    text: '''His people'' refers to the LORD''s people.'
    reason: cross_reference
lexical_decisions:
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Introduces a sharp transition from Saul's prior situation to the announced judgment. 'But now' captures the adversative force in context better than a bare 'now.'
- source_word: מַמְלַכְתְּךָ
  chosen: your kingdom
  alternatives:
  - your kingship
  - your reign
  lexicon: HALOT
  rationale: Refers to Saul's royal rule/dynasty. 'Kingdom' is the most natural English rendering here and fits the following statement that it 'will not endure.'
- source_word: לֹא תָקוּם
  chosen: will not endure
  alternatives:
  - will not stand
  - will not continue
  lexicon: HALOT
  rationale: The verb literally means 'arise/stand,' but in this context of royal stability it idiomatically means to remain established. 'Will not endure' communicates the sense clearly in modern English.
- source_word: בִּקֵּשׁ יְהוָה לוֹ
  chosen: The LORD has sought for himself
  alternatives:
  - The LORD has sought out for himself
  - The LORD has looked for himself
  lexicon: HALOT
  rationale: The perfect verb presents the action as accomplished. 'Sought for himself' preserves the reflexive לּוֹ and the sense that the LORD is selecting a king for his own purposes.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and refers in context to a specific male successor. Per project philosophy, gender-accurate rendering is preferred.
- source_word: כִּלְבָבוֹ
  chosen: according to his own heart
  alternatives:
  - after his own heart
  - in accord with his heart
  lexicon: HALOT
  rationale: Literally 'according to his heart,' with the pronoun referring most naturally to the LORD in context. 'According to his own heart' is clear modern English while preserving the Hebrew sense without importing later theological interpretations.
- source_word: וַיְצַוֵּהוּ יְהוָה
  chosen: and the LORD has appointed him
  alternatives:
  - and the LORD has commanded him
  - and the LORD has commissioned him
  lexicon: HALOT
  rationale: Although the verb often means 'command,' with לְנָגִיד it carries the sense of commissioning/appointing someone to office. 'Appointed him' best fits the construction and context of royal designation.
- source_word: לְנָגִיד
  chosen: ruler
  alternatives:
  - prince
  - leader
  lexicon: HALOT
  rationale: נָגִיד denotes one placed in authority, often a leader or prince. 'Ruler' is clear and suitably weighty in contemporary English without sounding archaic.
- source_word: עַל עַמּוֹ
  chosen: over his people
  alternatives:
  - over his own people
  - over the LORD's people
  lexicon: HALOT
  rationale: The suffix most immediately refers to the LORD, so 'his people' means the LORD's people. The translation preserves the pronoun while allowing the antecedent to be inferred from context.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for Saul's loss of dynasty. 'Because' is the clearest causal connector in modern English.
- source_word: לֹא שָׁמַרְתָּ
  chosen: you have not kept
  alternatives:
  - you did not keep
  - you have not obeyed
  lexicon: HALOT
  rationale: שׁמר here means to keep/observe a command. 'Kept' preserves the lexical link to covenantal obedience; 'obeyed' is interpretive and therefore left as an alternative.
- source_word: אֵת אֲשֶׁר צִוְּךָ יְהוָה
  chosen: what the LORD commanded you
  alternatives:
  - that which the LORD commanded you
  - the command of the LORD to you
  lexicon: HALOT
  rationale: 'Smoothly renders the object clause in natural English while preserving the content: Saul failed to keep what the LORD had commanded.'
