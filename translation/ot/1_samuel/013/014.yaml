theological_decisions:
- issue: Referent of 'his own heart' in כִּלְבָבוֹ
  chosen_reading: 'The pronoun refers to the LORD: ''a man according to his own heart.'''
  alternative_readings:
  - The pronoun refers to the man sought, yielding 'a man according to his heart' in a less explicit sense.
  rationale: In the immediate syntax, the nearest and most coherent antecedent is the LORD, and this matches the broader narrative sense that the LORD is choosing a king aligned with his will. The wording avoids overexpanding into 'who will do all his will,' which belongs to later interpretive tradition rather than this verse's explicit wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of נָגִיד
  chosen_reading: Rendered as 'ruler' rather than a dynastic or messianic title.
  alternative_readings:
  - prince
  - leader
  rationale: The term denotes appointed leadership over the people here and should not be loaded with later christological or monarchical technical nuance beyond the immediate context.
