theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Pronoun for the ark in וְיָבֹא ... וְיֹשִׁעֵנוּ
  chosen_reading: it may come into our midst and save us
  alternative_readings:
  - he may come into our midst and save us
  rationale: The Hebrew grammar makes 'ark' the immediate subject of the singular verbs, and Hebrew often uses such language for sacred objects without requiring a personal pronoun in English. Using 'it' avoids importing a stronger identification of the ark with the personal presence of God than the syntax itself demands, while still reflecting the elders' superstitious expectation that the ark's arrival would bring deliverance.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
