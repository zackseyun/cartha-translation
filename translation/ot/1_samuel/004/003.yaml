id: 1SA.4.3
reference: 1 Samuel 4:3
source:
  edition: WLC
  text: וַ/יָּבֹ֣א הָ/עָם֮ אֶל הַֽ/מַּחֲנֶה֒ וַ/יֹּֽאמְרוּ֙ זִקְנֵ֣י יִשְׂרָאֵ֔ל לָ֣/מָּה נְגָפָ֧/נוּ יְהוָ֛ה הַ/יּ֖וֹם לִ/פְנֵ֣י פְלִשְׁתִּ֑ים נִקְחָ֧ה אֵלֵ֣י/נוּ מִ/שִּׁלֹ֗ה אֶת אֲרוֹן֙ בְּרִ֣ית יְהוָ֔ה וְ/יָבֹ֣א בְ/קִרְבֵּ֔/נוּ וְ/יֹשִׁעֵ֖/נוּ מִ/כַּ֥ף אֹיְבֵֽי/נוּ־־׃
translation:
  text: When the people came into the camp, the elders of Israel said, “Why has Yahweh struck us down today before the Philistines? Let us bring here from Shiloh the ark of the covenant of Yahweh, so that it may come into our midst and save us from the hand of our enemies.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “that he may come into our midst and save us,” taking the singular verbs as referring more directly to the LORD whose presence is associated with the ark.
    reason: alternative_reading
lexical_decisions:
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  lexicon: HALOT
  rationale: The noun commonly means 'people' and here refers to the Israelite force returning to camp. 'The people' preserves the Hebrew wording without over-specifying a military gloss, since the camp context already implies the army.
- source_word: הַמַּחֲנֶה
  chosen: the camp
  alternatives:
  - the encampment
  lexicon: HALOT
  rationale: Standard rendering for military context; concise and natural in English.
- source_word: זִקְנֵי יִשְׂרָאֵל
  chosen: the elders of Israel
  lexicon: HALOT
  rationale: Conventional and accurate rendering for the recognized leaders of the people.
- source_word: נְגָפָנוּ
  chosen: has struck us down
  alternatives:
  - has defeated us
  - has smitten us
  lexicon: HALOT
  rationale: The verb נגע/נגף in this context denotes being struck in battle. 'Has struck us down' preserves both divine agency and the force of military defeat better than the flatter 'defeated us.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לִפְנֵי פְלִשְׁתִּים
  chosen: before the Philistines
  alternatives:
  - in the presence of the Philistines
  - by the Philistines
  lexicon: HALOT
  rationale: The Hebrew preposition is literally 'before.' In battle context it conveys defeat in the face of the Philistines. 'Before the Philistines' keeps the source wording while remaining intelligible.
- source_word: נִקְחָה אֵלֵינוּ
  chosen: Let us bring to ourselves
  alternatives:
  - Let us take to ourselves
  - Let us fetch for ourselves
  lexicon: HALOT
  rationale: First person cohortative expressing proposal. 'Bring to ourselves' fits the movement of the ark from Shiloh to the camp and preserves the reflexive benefit nuance of אֵלֵינוּ.
- source_word: מִשִּׁלֹה
  chosen: from Shiloh
  lexicon: HALOT
  rationale: Straightforward place-name transliteration.
- source_word: אֲרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  lexicon: HALOT
  rationale: This more formal phrasing closely reflects the Hebrew construct chain and preserves the covenantal significance of the ark.
- source_word: וְיָבֹא בְקִרְבֵּנוּ
  chosen: so that it may come into our midst
  alternatives:
  - and let it come among us
  - that he may come into our midst
  lexicon: HALOT
  rationale: The verb is singular with the ark as grammatical subject. 'It' matches the immediate grammatical antecedent, while 'into our midst' preserves the covenantal-spatial sense of בקרבנו. The purpose nuance is brought out by 'so that' in coordination with the following verb.
- source_word: וְיֹשִׁעֵנוּ
  chosen: and save us
  alternatives:
  - and deliver us
  - and give us victory
  lexicon: HALOT
  rationale: The Hiphil of ישׁע commonly means 'save/deliver.' 'Save us' is the broadest and most theologically resonant choice, with the following phrase specifying deliverance from enemies.
- source_word: מִכַּף אֹיְבֵינוּ
  chosen: from the hand of our enemies
  alternatives:
  - from the grasp of our enemies
  lexicon: HALOT
  rationale: '''From the hand of'' is a standard Hebrew idiom for power or control. Retaining ''hand'' preserves the idiom and biblical texture in readable English.'
