theological_decisions:
- issue: Rendering the divine name יְהוָה in the title יְהוָה צְבָאוֹת
  chosen_reading: Yahweh of hosts
  alternative_readings:
  - Yahweh of hosts
  - the LORD of armies
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering יֹשֵׁב הַכְּרֻבִים as an enthronement formula
  chosen_reading: who is enthroned above the cherubim
  alternative_readings:
  - who sits enthroned between the cherubim
  rationale: The phrase is a cultic description of the LORD's royal presence associated with the ark. 'Enthroned' preserves the theological weight of divine kingship while 'above' avoids specifying a spatial detail beyond what the Hebrew requires.
