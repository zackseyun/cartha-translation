id: 1SA.4.4
reference: 1 Samuel 4:4
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח הָ/עָם֙ שִׁלֹ֔ה וַ/יִּשְׂא֣וּ מִ/שָּׁ֗ם אֵ֣ת אֲר֧וֹן בְּרִית יְהוָ֛ה צְבָא֖וֹת יֹשֵׁ֣ב הַ/כְּרֻבִ֑ים וְ/שָׁ֞ם שְׁנֵ֣י בְנֵֽי עֵלִ֗י עִם אֲרוֹן֙ בְּרִ֣ית הָ/אֱלֹהִ֔ים חָפְנִ֖י וּ/פִֽינְחָֽס־־־׃
translation:
  text: So the people sent to Shiloh, and they carried from there the ark of the covenant of Yahweh of hosts, who is enthroned above the cherubim. And the two sons of Eli, Hophni and Phinehas, were there with the ark of the covenant of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD of armies.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''who sits enthroned between the cherubim'' or ''who is enthroned above the cherubim.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלַח הָעָם
  chosen: So the people sent to Shiloh
  alternatives:
  - So the people sent men to Shiloh
  - Then the people sent to Shiloh
  lexicon: HALOT
  rationale: The Hebrew has singular וַיִּשְׁלַח with collective subject הָעָם ('the people'). English smooths this as a plural collective action. An object such as 'men' is implied by context but not explicit, so it is not supplied in the main text.
- source_word: שִׁלֹה
  chosen: Shiloh
  rationale: Proper place name; transliterated per translation philosophy.
- source_word: וַיִּשְׂאוּ מִשָּׁם
  chosen: and they carried from there
  alternatives:
  - and they brought from there
  - and they took from there
  lexicon: HALOT
  rationale: נשא here refers to lifting/carrying the ark from Shiloh. 'Carried' preserves the physical sense better than the more generic 'brought' or 'took'.
- source_word: אֲרוֹן בְּרִית
  chosen: the ark of the covenant
  alternatives:
  - the covenant ark
  lexicon: HALOT
  rationale: Standard transparent rendering of the construct chain; preserves both the object ('ark') and its covenantal association.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the divine title יְהוָה צְבָאוֹת, 'hosts' is the established and semantically broad rendering, encompassing heavenly armies without over-specifying.
- source_word: יֹשֵׁב הַכְּרֻבִים
  chosen: who is enthroned above the cherubim
  alternatives:
  - who sits enthroned between the cherubim
  - dwelling among the cherubim
  lexicon: HALOT
  rationale: The participle יֹשֵׁב in this cultic-divine formula conveys enthronement rather than mere sitting. 'Above the cherubim' fits the ark imagery and avoids overcommitting to 'between,' which is interpretive.
- source_word: וְשָׁם
  chosen: And ... were there
  alternatives:
  - and there were
  - now there
  lexicon: HALOT
  rationale: The adverb marks location and scene-setting. In English it is most natural to render it with the clause 'were there' rather than a bare initial 'and there'.
- source_word: שְׁנֵי בְנֵי עֵלִי
  chosen: the two sons of Eli
  alternatives:
  - Eli's two sons
  lexicon: HALOT
  rationale: Direct rendering of the construct phrase; both English options are equivalent, but this one stays closer to Hebrew order.
- source_word: עִם אֲרוֹן בְּרִית הָאֱלֹהִים
  chosen: with the ark of the covenant of God
  alternatives:
  - beside the ark of the covenant of God
  lexicon: HALOT
  rationale: עִם normally means 'with.' The phrase indicates accompaniment/presence with the ark, not necessarily a more specific spatial relation.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the God of Israel, not 'gods'; singular 'God' is required by context.
- source_word: חָפְנִי וּפִינְחָס
  chosen: Hophni and Phinehas
  rationale: Proper personal names; transliterated by standard English conventions.
