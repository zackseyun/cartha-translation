id: 1SA.4.5
reference: 1 Samuel 4:5
source:
  edition: WLC
  text: וַ/יְהִ֗י כְּ/ב֨וֹא אֲר֤וֹן בְּרִית יְהוָה֙ אֶל הַֽ/מַּחֲנֶ֔ה וַ/יָּרִ֥עוּ כָל יִשְׂרָאֵ֖ל תְּרוּעָ֣ה גְדוֹלָ֑ה וַ/תֵּהֹ֖ם הָ/אָֽרֶץ־־־׃
translation:
  text: When the ark of the covenant of Yahweh came into the camp, all Israel shouted with a great shout, and the earth resounded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and the earth shook.' The Hebrew verb can denote tumult or trembling; 'resounded' was chosen to avoid implying a definite earthquake where the text may simply describe the force of the shout.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְּבוֹא
  chosen: When ... came
  alternatives:
  - And it happened, when ... came
  - As ... came
  lexicon: HALOT
  rationale: The waw-consecutive plus temporal infinitive construct introduces a narrative time clause. 'When ... came' gives natural English while preserving the temporal sense without the wooden 'and it happened.'
- source_word: אֲרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  lexicon: HALOT
  rationale: This preserves the construct chain explicitly. 'The LORD' follows the project's default rendering for יְהוָה. Either English order is possible; this one stays close to the Hebrew form.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַמַּחֲנֶה
  chosen: the camp
  alternatives:
  - the encampment
  lexicon: HALOT
  rationale: In this military narrative context, 'camp' is the natural and sufficiently precise rendering.
- source_word: וַיָּרִיעוּ
  chosen: shouted
  alternatives:
  - raised a shout
  - gave a battle cry
  - cheered
  lexicon: HALOT
  rationale: The verb denotes raising a loud cry or shout. 'Shouted' is concise and idiomatic; 'cheered' is too weak, while 'battle cry' may over-specify the nuance here.
- source_word: תְּרוּעָה גְדוֹלָה
  chosen: with a great shout
  alternatives:
  - a loud shout
  - a mighty shout
  lexicon: HALOT
  rationale: The cognate accusative intensifies the verbal idea. 'With a great shout' preserves both the Hebrew construction's force and the adjective's weight. 'Loud shout' is possible but slightly flattens the grandeur.
- source_word: וַתֵּהֹם
  chosen: resounded
  alternatives:
  - shook
  - was in an uproar
  - echoed
  lexicon: HALOT
  rationale: The verb conveys making a loud noise or tumult. With 'the earth' as subject, 'resounded' captures the effect of the shout on the land without overstating it as a literal seismic event. 'Shook' is traditional but may imply physical earthquake more strongly than the Hebrew requires.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  - the ground
  lexicon: HALOT
  rationale: '''Earth'' is the most direct rendering and works idiomatically with ''resounded.'' ''Land'' is possible, but here the sense is the ground/earth responding to the noise rather than a geopolitical territory.'
