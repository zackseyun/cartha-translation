theological_decisions:
- issue: Potential over-specification of the nature of Saul's feared mistreatment
  chosen_reading: Rendered וְהִתְעַלְּלוּ בִי as 'abuse me' without specifying torture,
    mockery, or sexual violation.
  alternative_readings:
  - make sport of me
  - mock me
  - mistreat me shamefully
  rationale: The verb indicates humiliating, abusive treatment, but the text does
    not define the exact form. The translation preserves the gravity and ambiguity
    rather than importing a more specific scenario.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
