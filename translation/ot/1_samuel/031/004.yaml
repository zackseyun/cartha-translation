id: 1SA.31.4
reference: 1 Samuel 31:4
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שָׁאוּל֩ לְ/נֹשֵׂ֨א כֵלָ֜י/ו שְׁלֹ֥ף חַרְבְּ/ךָ֣ וְ/דָקְרֵ֣/נִי
    בָ֗/הּ פֶּן יָ֠בוֹאוּ הָ/עֲרֵלִ֨ים הָ/אֵ֤לֶּה וּ/דְקָרֻ֨/נִי֙ וְ/הִתְעַלְּלוּ
    בִ֔/י וְ/לֹ֤א אָבָה֙ נֹשֵׂ֣א כֵלָ֔י/ו כִּ֥י יָרֵ֖א מְאֹ֑ד וַ/יִּקַּ֤ח שָׁאוּל֙
    אֶת הַ/חֶ֔רֶב וַ/יִּפֹּ֖ל עָלֶֽי/הָ׀־־־׃
translation:
  text: Then Saul said to his armor-bearer, “Draw your sword and thrust me through
    with it, lest these uncircumcised men come and thrust me through and abuse me.”
    But his armor-bearer was not willing, because he was very afraid. So Saul took
    the sword and fell on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make sport of me,' 'mistreat me,' or 'deal shamefully with me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹשֵׂא כֵלָיו
  chosen: his armor-bearer
  alternatives:
  - the one carrying his weapons
  - his weapons-bearer
  lexicon: HALOT
  rationale: The idiom refers to the royal military attendant who carried a warrior's
    equipment. 'Armor-bearer' is the established and accurate English equivalent and
    is more natural than a mechanically literal rendering.
- source_word: שְׁלֹף
  chosen: Draw
  alternatives:
  - Pull out
  - Unsheathe
  lexicon: HALOT
  rationale: The imperative calls for drawing the sword from its sheath. 'Draw' is
    concise, idiomatic, and fits martial context.
- source_word: וְדָקְרֵנִי בָהּ
  chosen: and thrust me through with it
  alternatives:
  - and pierce me with it
  - and stab me with it
  lexicon: HALOT
  rationale: דקר denotes piercing or running through with a weapon. 'Thrust me through'
    best conveys lethal intent and matches the repeated verb later in the verse.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that not
  lexicon: HALOT
  rationale: Introduces Saul's feared outcome. 'Lest' is slightly elevated but still
    clear and compact in modern English for this warning construction.
- source_word: הָעֲרֵלִים הָאֵלֶּה
  chosen: these uncircumcised men
  alternatives:
  - these uncircumcised ones
  - these Philistines
  lexicon: HALOT
  rationale: The Hebrew literally says 'these uncircumcised [ones],' a derogatory
    covenantal designation. 'Men' is supplied naturally in English; 'Philistines'
    would over-interpret, though they are contextually in view.
- source_word: וּדְקָרֻנִי
  chosen: and thrust me through
  alternatives:
  - and pierce me
  - and stab me
  lexicon: HALOT
  rationale: Using the same English verb as earlier preserves the repetition of דקר
    in Saul's speech.
- source_word: וְהִתְעַלְּלוּ בִי
  chosen: and abuse me
  alternatives:
  - and make sport of me
  - and mistreat me
  - and deal shamefully with me
  lexicon: HALOT
  rationale: The hitpael of עלל here conveys abusive, humiliating treatment. 'Abuse
    me' is broad enough to preserve the threat of degrading mistreatment without specifying
    a narrower form the text does not state.
- source_word: וְלֹא אָבָה
  chosen: was not willing
  alternatives:
  - would not
  - refused
  lexicon: HALOT
  rationale: The verb expresses unwillingness or refusal. 'Was not willing' stays
    close to the Hebrew while remaining natural.
- source_word: כִּי יָרֵא מְאֹד
  chosen: because he was very afraid
  alternatives:
  - for he feared greatly
  - because he was terrified
  lexicon: HALOT
  rationale: This gives the reason for the armor-bearer's unwillingness. 'Very afraid'
    is straightforward modern English and preserves the intensifier מְאֹד.
- source_word: וַיִּפֹּל עָלֶיהָ
  chosen: and fell on it
  alternatives:
  - and threw himself on it
  lexicon: HALOT
  rationale: The Hebrew says literally 'fell upon it.' English idiom for suicide by
    sword is 'fell on it,' which is both accurate and concise; 'threw himself on it'
    is interpretive expansion.
