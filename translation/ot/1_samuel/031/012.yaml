id: 1SA.31.12
reference: 1 Samuel 31:12
source:
  edition: WLC
  text: וַ/יָּק֜וּמוּ כָּל אִ֣ישׁ חַיִל֮ וַ/יֵּלְכ֣וּ כָל הַ/לַּיְלָה֒ וַ/יִּקְח֞וּ
    אֶת גְּוִיַּ֣ת שָׁא֗וּל וְ/אֵת֙ גְּוִיֹּ֣ת בָּנָ֔י/ו מֵ/חוֹמַ֖ת בֵּ֣ית שָׁ֑ן וַ/יָּבֹ֣אוּ
    יָבֵ֔שָׁ/ה וַ/יִּשְׂרְפ֥וּ אֹתָ֖/ם שָֽׁם־־־׃
translation:
  text: Then all the valiant men arose and went all night, and they took the body
    of Saul and the bodies of his sons from the wall of Beth-shan, and they came to
    Jabesh and burned them there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'corpse' and 'corpses.' The Hebrew term refers specifically to dead bodies.
    reason: lexical_alternative
  - marker: b
    text: Jabesh here refers to Jabesh-gilead in the broader context.
    reason: cross_reference
lexical_decisions:
- source_word: כָּל אִישׁ חַיִל
  chosen: all the valiant men
  alternatives:
  - every mighty man
  - all the men of valor
  - all the warriors
  lexicon: HALOT
  rationale: The idiom אִישׁ חַיִל commonly denotes a valiant or capable fighting
    man. In this military-rescue context, 'valiant men' is natural English and preserves
    the masculine plural sense represented by the singular collective אִישׁ with כָּל.
- source_word: וַיָּק֜וּמוּ
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: The verb literally means 'rose' or 'arose.' 'Arose' preserves the narrative
    sequence and slightly elevated tone without becoming archaic.
- source_word: וַיֵּלְכ֣וּ כָל הַלַּיְלָה
  chosen: went all night
  alternatives:
  - walked all night
  - traveled all night
  lexicon: HALOT
  rationale: The phrase indicates continuing travel through the night. 'Went all night'
    is a close, readable rendering that avoids over-specifying the mode of travel.
- source_word: גְּוִיַּת ... גְּוִיֹּת
  chosen: the body ... the bodies
  alternatives:
  - corpse ... corpses
  - remains ... remains
  lexicon: HALOT
  rationale: גְּוִיָּה refers to a dead body or corpse. 'Body/bodies' is idiomatic
    and readable; 'corpse/corpses' is possible but harsher than necessary in English
    narrative style.
- source_word: מֵחוֹמַת
  chosen: from the wall
  alternatives:
  - off the wall
  - from the city wall
  lexicon: HALOT
  rationale: The preposition מִן with חוֹמָה straightforwardly means 'from the wall.'
    'Off the wall' is possible idiomatically, but 'from the wall' stays closer to
    the Hebrew.
- source_word: בֵּית שָׁן
  chosen: Beth-shan
  alternatives:
  - Beth Shan
  - Beit-shean
  lexicon: HALOT
  rationale: Personal and place names are transliterated by standard English convention.
    'Beth-shan' is a familiar and clear transliteration.
- source_word: יָבֵשָׁה
  chosen: to Jabesh
  alternatives:
  - to Jabesh-gilead
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Jabesh. The Hebrew here
    reads simply 'Jabesh'; since the immediate context identifies the city, 'to Jabesh'
    is sufficient in the main text without importing the fuller place-name.
- source_word: וַיִּשְׂרְפוּ אֹתָם שָׁם
  chosen: and burned them there
  alternatives:
  - and cremated them there
  - and burned the bodies there
  lexicon: HALOT
  rationale: The verb means 'burned.' 'Burned them there' is direct and leaves the
    object pronoun as in Hebrew. More interpretive expansions are unnecessary in the
    main text.
