theological_decisions:
- issue: Rendering the masculine collective expression for the rescuers
  chosen_reading: all the valiant men
  alternative_readings:
  - all the valiant warriors
  - all the brave men
  rationale: Following the gender-accurate principle, the Hebrew uses masculine forms
    and refers to male fighting men in a military setting. A gender-neutral rendering
    would blur the source-text specificity.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
