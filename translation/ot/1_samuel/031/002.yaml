id: 1SA.31.2
reference: 1 Samuel 31:2
source:
  edition: WLC
  text: וַ/יַּדְבְּק֣וּ פְלִשְׁתִּ֔ים אֶת שָׁא֖וּל וְ/אֶת בָּנָ֑י/ו וַ/יַּכּ֣וּ פְלִשְׁתִּ֗ים
    אֶת יְהוֹנָתָ֧ן וְ/אֶת אֲבִינָדָ֛ב וְ/אֶת מַלְכִּי שׁ֖וּעַ בְּנֵ֥י שָׁאֽוּל־־־־־־׃
translation:
  text: The Philistines overtook Saul and his sons, and the Philistines struck down
    Jonathan, Abinadab, and Malchi-shua, the sons of Saul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'caught up with Saul and his sons' or 'pressed hard after Saul and his
      sons.' The Hebrew verb conveys close pursuit that reaches its target.
    reason: lexical_alternative
  - marker: b
    text: Or 'killed Jonathan, Abinadab, and Malchi-shua.' The Hebrew verb literally
      means 'struck,' but in this battle context it likely implies death.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּדְבְּקוּ
  chosen: overtook
  alternatives:
  - caught up with
  - pressed hard after
  - pursued closely
  lexicon: HALOT
  rationale: The verb דבק in this context conveys close pursuit that results in catching
    up to someone in battle. 'Overtook' communicates the military sense naturally
    in English better than the more wooden 'clung to' or the weaker 'pursued.'
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration for the people group; the article is natural
    in English for a known national enemy.
- source_word: אֶת שָׁאוּל וְאֶת בָּנָיו
  chosen: Saul and his sons
  alternatives:
  - Saul and his children
  lexicon: HALOT
  rationale: בָּנָיו specifically means 'his sons,' not the broader 'children.' This
    is confirmed by the naming of male sons in the next clause.
- source_word: וַיַּכּוּ
  chosen: struck down
  alternatives:
  - killed
  - smote
  - struck
  lexicon: HALOT
  rationale: נכה is a broad verb meaning 'strike/beat/smite,' but in battle contexts
    with named casualties it commonly implies lethal force. 'Struck down' preserves
    the violent action while fitting the narrative context; 'killed' is possible but
    slightly more interpretive.
- source_word: יְהוֹנָתָן
  chosen: Jonathan
  rationale: Standard English transliteration of the personal name.
- source_word: אֲבִינָדָב
  chosen: Abinadab
  rationale: Standard English transliteration of the personal name.
- source_word: מַלְכִּי שׁוּעַ
  chosen: Malchi-shua
  alternatives:
  - Malki-shua
  rationale: Standard English convention typically renders the name as 'Malchi-shua';
    the hyphen helps reflect the compound form.
- source_word: בְּנֵי שָׁאוּל
  chosen: the sons of Saul
  alternatives:
  - Saul's sons
  lexicon: HALOT
  rationale: This appositional phrase identifies the three named men. 'The sons of
    Saul' preserves the Hebrew structure and emphasis.
