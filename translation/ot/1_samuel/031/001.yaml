id: 1SA.31.1
reference: 1 Samuel 31:1
source:
  edition: WLC
  text: וּ/פְלִשְׁתִּ֖ים נִלְחָמִ֣ים בְּ/יִשְׂרָאֵ֑ל וַ/יָּנֻ֜סוּ אַנְשֵׁ֤י יִשְׂרָאֵל֙
    מִ/פְּנֵ֣י פְלִשְׁתִּ֔ים וַ/יִּפְּל֥וּ חֲלָלִ֖ים בְּ/הַ֥ר הַ/גִּלְבֹּֽעַ׃
translation:
  text: Now the Philistines were fighting against Israel, and the men of Israel fled
    from before the Philistines and fell slain on Mount Gilboa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from before the Philistines.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פְלִשְׁתִּים
  chosen: Now the Philistines
  alternatives:
  - And the Philistines
  - The Philistines
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply 'and,' but at the start of a
    narrative unit in English, 'now' often better conveys discourse continuity without
    sounding wooden. 'Philistines' is the standard transliteration of the people-group
    name.
- source_word: נִלְחָמִים בְּ/יִשְׂרָאֵל
  chosen: were fighting against Israel
  alternatives:
  - were battling Israel
  - fought against Israel
  lexicon: HALOT
  rationale: The participle נִלְחָמִים presents ongoing action/backgrounded circumstance,
    so 'were fighting' fits better than a simple past. The preposition ב with לחם
    in this construction is adversative, hence 'against Israel.'
- source_word: וַ/יָּנֻסוּ
  chosen: fled
  alternatives:
  - ran away
  - took flight
  lexicon: HALOT
  rationale: A straightforward rendering of נוּס in military context is 'fled.' It
    preserves the battle setting and avoids colloquial phrasing.
- source_word: אַנְשֵׁי יִשְׂרָאֵל
  chosen: the men of Israel
  alternatives:
  - the Israelites
  - the men of Israel's army
  lexicon: HALOT
  rationale: אַנְשֵׁי is explicitly 'men of,' and the doctrine calls for gender-accurate
    rendering over unnecessary neutralization. 'The Israelites' is smoother but loses
    the masculine lexical form present in the Hebrew.
- source_word: מִ/פְּנֵי פְלִשְׁתִּים
  chosen: from before the Philistines
  alternatives:
  - before the Philistines
  - from the presence of the Philistines
  - from the Philistines
  lexicon: HALOT
  rationale: Literally 'from the face/presence of.' 'From before' preserves the idiom's
    force of retreat in the enemy's presence while remaining intelligible in English.
    A more idiomatic shortening to 'from the Philistines' is possible but less transparent
    to the source.
- source_word: וַ/יִּפְּל֥וּ חֲלָלִ֖ים
  chosen: fell slain
  alternatives:
  - fell dead
  - were struck down
  - fell as casualties
  lexicon: HALOT
  rationale: The collocation means they fell as slain/dead men in battle. 'Fell slain'
    is concise, natural in military narrative, and preserves the vividness of the
    Hebrew better than the flatter 'died.'
- source_word: בְּ/הַר הַ/גִּלְבֹּעַ
  chosen: on Mount Gilboa
  alternatives:
  - in the hill country of Gilboa
  - on the mountain of Gilboa
  lexicon: HALOT
  rationale: הַר with a proper place name is naturally rendered 'Mount Gilboa.' 'On'
    is the normal English preposition for a mountain location in narrative.
