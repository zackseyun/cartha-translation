id: 1SA.31.5
reference: 1 Samuel 31:5
source:
  edition: WLC
  text: וַ/יַּ֥רְא נֹשֵֽׂא כֵלָ֖י/ו כִּ֣י מֵ֣ת שָׁא֑וּל וַ/יִּפֹּ֥ל גַּם ה֛וּא עַל
    חַרְבּ֖/וֹ וַ/יָּ֥מָת עִמּֽ/וֹ־־־׃
translation:
  text: When his armor-bearer saw that Saul was dead, he too fell on his sword and
    died with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had died' for 'was dead.' The Hebrew permits either a stative description
      or a completed event viewed as the basis for the armor-bearer's action.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹשֵׂא כֵלָיו
  chosen: his armor-bearer
  alternatives:
  - the one carrying his equipment
  - his weapons-bearer
  lexicon: HALOT
  rationale: The construct phrase literally means 'the bearer of his gear/weapons.'
    'Armor-bearer' is the established and natural English equivalent in this military
    context and accurately conveys the role without unnecessary awkwardness.
- source_word: כִּי
  chosen: that
  alternatives:
  - when
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what the armor-bearer saw: he saw
    that Saul was dead. Rendering it as ''that'' best reflects the syntax and avoids
    implying causation beyond the immediate narrative sequence.'
- source_word: מֵת
  chosen: was dead
  alternatives:
  - had died
  - was dying
  lexicon: HALOT
  rationale: The qatal form with stative sense is well represented by English 'was
    dead.' 'Had died' is possible, but 'was dead' matches the Hebrew predicate adjective/verb
    sense and the immediate observation of Saul's condition.
- source_word: גַּם הוּא
  chosen: he too
  alternatives:
  - he also
  - even he
  lexicon: HALOT
  rationale: The phrase marks the armor-bearer's corresponding action after Saul's
    death. 'He too' is concise, natural English and preserves the additive emphasis.
- source_word: עַל חַרְבּוֹ
  chosen: on his sword
  alternatives:
  - upon his sword
  - onto his sword
  lexicon: HALOT
  rationale: The idiom 'fell on his sword' is both literal and idiomatic in English
    for this mode of suicide, matching the Hebrew preposition עַל and preserving the
    narrative force.
- source_word: וַיָּמָת עִמּוֹ
  chosen: and died with him
  alternatives:
  - and died along with him
  - and died beside him
  lexicon: HALOT
  rationale: עִם denotes accompaniment. 'Died with him' is the most direct rendering
    and leaves the phrase at the level of shared death without adding spatial detail
    not explicit in the Hebrew.
- source_word: וַיַּרְא
  chosen: When ... saw
  alternatives:
  - And ... saw
  - Now ... saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. In English, 'When ... saw'
    smoothly connects the observation to the consequent action in the same sentence,
    preserving the temporal flow more naturally than a rigidly formal 'And ... saw.'
