id: 1SA.31.8
reference: 1 Samuel 31:8
source:
  edition: WLC
  text: וַֽ/יְהִי֙ מִֽ/מָּחֳרָ֔ת וַ/יָּבֹ֣אוּ פְלִשְׁתִּ֔ים לְ/פַשֵּׁ֖ט אֶת הַ/חֲלָלִ֑ים
    וַֽ/יִּמְצְא֤וּ אֶת שָׁאוּל֙ וְ/אֶת שְׁלֹ֣שֶׁת בָּנָ֔י/ו נֹפְלִ֖ים בְּ/הַ֥ר הַ/גִּלְבֹּֽעַ־־־׃
translation:
  text: The next day, the Philistines came to strip the slain, and they found Saul
    and his three sons fallen on Mount Gilboa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to strip the dead' or 'to despoil the slain.' The Hebrew verb refers
      to removing clothing or armor from battle casualties.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמָּחֳרָת
  chosen: The next day
  alternatives:
  - On the next day
  - On the following day
  - the day after
  lexicon: HALOT
  rationale: Temporal idiom meaning the day following the battle events just narrated.
    'The next day' is natural modern English and preserves the sequence.
- source_word: לְפַשֵּׁט
  chosen: to strip
  alternatives:
  - to plunder
  - to strip the dead
  - to despoil
  lexicon: HALOT
  rationale: The verb פשט in this context refers specifically to stripping clothing/armor
    from corpses after battle. 'To strip' is the most direct rendering; the object
    'the slain' makes the sense clear without overexpansion.
- source_word: הַחֲלָלִים
  chosen: the slain
  alternatives:
  - the dead
  - the corpses
  - the casualties
  lexicon: HALOT
  rationale: Refers to those killed in battle. 'The slain' is idiomatic, concise,
    and preserves the martial context better than the more generic 'the dead.'
- source_word: וַיִּמְצְאוּ
  chosen: they found
  alternatives:
  - they came upon
  - they discovered
  lexicon: HALOT
  rationale: Simple narrative verb; 'they found' best matches the Hebrew wayyiqtol
    sequence.
- source_word: נֹפְלִים
  chosen: fallen
  alternatives:
  - lying fallen
  - dead
  - having fallen
  lexicon: HALOT
  rationale: The participle literally means 'fallen' and in battle narrative commonly
    denotes those struck down. 'Fallen' preserves the Hebrew imagery and avoids flattening
    it to merely 'dead.'
- source_word: בְּהַר הַגִּלְבֹּעַ
  chosen: on Mount Gilboa
  alternatives:
  - in the hill country of Gilboa
  - on the mountain of Gilboa
  lexicon: HALOT
  rationale: Standard English rendering for the place name construction. 'On Mount
    Gilboa' is idiomatic and geographically appropriate.
- source_word: שְׁלֹשֶׁת בָּנָיו
  chosen: his three sons
  alternatives:
  - the three sons of his
  - his three male children
  lexicon: HALOT
  rationale: Straightforward construct phrase. 'His three sons' is natural English
    and preserves the familial relation.
