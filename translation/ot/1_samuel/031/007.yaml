id: 1SA.31.7
reference: 1 Samuel 31:7
source:
  edition: WLC
  text: וַ/יִּרְא֣וּ אַנְשֵֽׁי יִ֠שְׂרָאֵל אֲשֶׁר בְּ/עֵ֨בֶר הָ/עֵ֜מֶק וַ/אֲשֶׁ֣ר
    בְּ/עֵ֣בֶר הַ/יַּרְדֵּ֗ן כִּֽי נָ֨סוּ֙ אַנְשֵׁ֣י יִשְׂרָאֵ֔ל וְ/כִי מֵ֖תוּ שָׁא֣וּל
    וּ/בָנָ֑י/ו וַ/יַּעַזְב֤וּ אֶת הֶֽ/עָרִים֙ וַ/יָּנֻ֔סוּ וַ/יָּבֹ֣אוּ פְלִשְׁתִּ֔ים
    וַ/יֵּֽשְׁב֖וּ בָּ/הֶֽן־־׀־־־׃ס
translation:
  text: When the men of Israel who were on the other side of the valley, and those
    on the other side of the Jordan, saw that the men of Israel had fled and that
    Saul and his sons were dead, they abandoned the cities and fled; and the Philistines
    came and lived in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'settled in them.' The Hebrew verb can denote dwelling or settling.
    reason: lexical_alternative
  - marker: b
    text: Or 'across the valley' / 'across the Jordan.' The Hebrew expression means
      'on the far side of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  chosen: saw
  alternatives:
  - realized
  lexicon: HALOT
  rationale: The verb ראה literally means 'see.' Here it introduces perception based
    on observable events, and 'saw' preserves the narrative concreteness without over-interpreting.
- source_word: אַנְשֵׁי יִשְׂרָאֵל
  chosen: the men of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: The construct phrase is literally 'men of Israel.' In this military context
    it likely refers to Israelite inhabitants/men in the affected regions. 'Men of
    Israel' preserves the gendered and formal wording of the Hebrew better than the
    more generalized 'Israelites.'
- source_word: בְּעֵבֶר הָעֵמֶק
  chosen: on the other side of the valley
  alternatives:
  - across the valley
  - beyond the valley
  lexicon: HALOT
  rationale: עֵבֶר denotes the far side or region across from a reference point. 'On
    the other side of the valley' is idiomatic and spatially clear.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  chosen: on the other side of the Jordan
  alternatives:
  - across the Jordan
  - beyond the Jordan
  lexicon: HALOT
  rationale: The same spatial term עֵבֶר is used again. 'On the other side of the
    Jordan' keeps the repetition and geographic sense.
- source_word: כִּי נָסוּ
  chosen: that ... had fled
  alternatives:
  - that ... fled
  - that ... were fleeing
  lexicon: HALOT
  rationale: The clause gives the content of what they saw. English past perfect ('had
    fled') fits the sequence from the observers' standpoint and clarifies prior action.
- source_word: מֵתוּ
  chosen: were dead
  alternatives:
  - had died
  - were killed
  lexicon: HALOT
  rationale: מות states death, not necessarily the manner of death. 'Were dead' matches
    the stative/resultative sense in context and avoids adding 'were killed,' which
    the Hebrew does not explicitly say here.
- source_word: וּבָנָיו
  chosen: and his sons
  alternatives:
  - with his sons
  lexicon: HALOT
  rationale: Simple coordination is most natural. The Hebrew conjunction joins Saul
    with his sons as also dead.
- source_word: וַיַּעַזְבוּ אֶת־הֶעָרִים
  chosen: they abandoned the cities
  alternatives:
  - they left the cities
  - they forsook the towns
  lexicon: HALOT
  rationale: עזב conveys leaving behind or abandoning. 'Abandoned' best reflects the
    urgency and loss of control in the military setting. 'Cities' is a standard rendering
    of עָרִים, though these may include smaller settlements.
- source_word: וַיָּנֻסוּ
  chosen: and fled
  alternatives:
  - and ran away
  lexicon: HALOT
  rationale: נוס is the standard verb for fleeing. 'Fled' is concise and appropriately
    formal for narrative prose.
- source_word: וַיָּבֹאוּ פְלִשְׁתִּים
  chosen: and the Philistines came
  alternatives:
  - and Philistines came in
  - and the Philistines entered
  lexicon: HALOT
  rationale: בוא is broad ('come/enter'). 'Came' is sufficient because the following
    clause specifies settlement in the cities; adding 'entered' is possible but less
    directly tied to the Hebrew wording.
- source_word: וַיֵּשְׁבוּ בָּהֶן
  chosen: and lived in them
  alternatives:
  - and settled in them
  - and dwelt in them
  lexicon: HALOT
  rationale: ישב commonly means to sit, dwell, or settle. In the context of occupying
    abandoned cities, 'lived in them' is readable modern English; 'settled in them'
    is also possible and slightly more interpretive toward permanent occupation.
