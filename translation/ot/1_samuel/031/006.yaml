id: 1SA.31.6
reference: 1 Samuel 31:6
source:
  edition: WLC
  text: וַ/יָּ֣מָת שָׁא֡וּל וּ/שְׁלֹ֣שֶׁת בָּנָי/ו֩ וְ/נֹשֵׂ֨א כֵלָ֜י/ו גַּ֧ם כָּל
    אֲנָשָׁ֛י/ו בַּ/יּ֥וֹם הַ/ה֖וּא יַחְדָּֽו־׃
translation:
  text: So Saul died, and his three sons, and his armor-bearer, and indeed all his
    men, together on that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all his soldiers.' The Hebrew says 'all his men,' which in this battle
      context likely refers to Saul's fighting force or retainers rather than every
      person associated with him.
    reason: lexical_alternative
  - marker: b
    text: Some Greek witnesses read 'all his armor' instead of 'all his men.' The
      Hebrew text supports 'all his men.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיָּמָת
  chosen: So ... died
  alternatives:
  - And ... died
  - '... died'
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' gives natural English
    narrative flow while preserving the resultative progression from the preceding
    account.
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Standard English transliteration of the personal name.
- source_word: וּשְׁלֹשֶׁת בָּנָיו
  chosen: and his three sons
  alternatives:
  - and the three of his sons
  lexicon: HALOT
  rationale: Straightforward rendering of the numeral plus noun with suffix; idiomatic
    English prefers 'his three sons.'
- source_word: וְנֹשֵׂא כֵלָיו
  chosen: and his armor-bearer
  alternatives:
  - and the bearer of his weapons
  - and his weapons-bearer
  lexicon: HALOT
  rationale: The participial expression literally means 'the bearer of his equipment/weapons.'
    'Armor-bearer' is the established and accurate English equivalent in this military
    context.
- source_word: גַּם
  chosen: and indeed
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: Adds emphasis to the final element in the list. 'Indeed' preserves the
    intensifying force better than a flat 'also' in this context.
- source_word: כָּל אֲנָשָׁיו
  chosen: all his men
  alternatives:
  - all his people
  - all his soldiers
  lexicon: HALOT
  rationale: אֲנָשִׁים here refers to Saul's male fighting force/retainers in the
    battle narrative. 'Men' is gender-accurate and contextually appropriate; 'soldiers'
    is interpretive, while 'people' is too broad.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that day
  lexicon: HALOT
  rationale: Standard temporal expression; 'on that day' is clear and natural.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - all together
  lexicon: HALOT
  rationale: Preserves the adverbial sense that these deaths occurred in conjunction
    on the same day.
