id: 1SA.31.13
reference: 1 Samuel 31:13
source:
  edition: WLC
  text: וַ/יִּקְחוּ֙ אֶת עַצְמֹ֣תֵי/הֶ֔ם וַ/יִּקְבְּר֥וּ תַֽחַת הָ/אֶ֖שֶׁל בְּ/יָבֵ֑שָׁ/ה
    וַ/יָּצֻ֖מוּ שִׁבְעַ֥ת יָמִֽים־־׃פ
translation:
  text: They took their bones and buried them under the tamarisk tree in Jabesh, and
    they fasted seven days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply 'the tamarisk'; Hebrew names the species specifically.
    reason: lexical_alternative
  - marker: b
    text: Jabesh here abbreviates Jabesh-gilead from the preceding context.
    reason: cross_reference
lexical_decisions:
- source_word: עַצְמֹתֵיהֶם
  chosen: their bones
  alternatives:
  - their remains
  lexicon: HALOT
  rationale: The noun עֶצֶם literally means 'bone.' In this context, after the bodies
    had been burned (v. 12), 'bones' is the plain and concrete sense and should be
    preserved rather than generalized to 'remains.'
- source_word: וַיִּקְבְּרוּ
  chosen: and buried
  alternatives:
  - and interred
  lexicon: HALOT
  rationale: קבר is the standard verb 'to bury.' 'Buried' is the most natural modern
    English equivalent and preserves the straightforward narrative style.
- source_word: תַחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: תחת commonly means 'under' or 'beneath.' 'Under' is idiomatic and clear
    in modern English.
- source_word: הָאֶשֶׁל
  chosen: the tamarisk tree
  alternatives:
  - the tamarisk
  - the tree
  lexicon: HALOT
  rationale: אֶשֶׁל refers to a tamarisk. Including 'tree' makes the referent immediately
    clear in English, since 'tamarisk' alone may be unfamiliar to some readers.
- source_word: בְּיָבֵשָׁה
  chosen: in Jabesh
  alternatives:
  - at Jabesh
  lexicon: HALOT
  rationale: This is the place name Jabesh, referring to Jabesh-gilead by abbreviation
    from the immediate context. 'In Jabesh' is a natural locative rendering.
- source_word: וַיָּצֻמוּ
  chosen: and they fasted
  alternatives:
  - and they observed a fast
  lexicon: HALOT
  rationale: צום means 'to fast.' The simple verbal rendering matches the Hebrew narrative
    sequence.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  lexicon: HALOT
  rationale: This is the standard cardinal-number expression and is best rendered
    directly as 'seven days.'
- source_word: וַיִּקְחוּ
  chosen: They took
  alternatives:
  - Then they took
  lexicon: HALOT
  rationale: לקח means 'to take.' The simple past fits the Hebrew wayyiqtol narrative
    sequence without over-translating the conjunction.
