id: 1SA.31.10
reference: 1 Samuel 31:10
source:
  edition: WLC
  text: וַ/יָּשִׂ֨מוּ֙ אֶת כֵּלָ֔י/ו בֵּ֖ית עַשְׁתָּר֑וֹת וְ/אֶת גְּוִיָּת/וֹ֙ תָּקְע֔וּ
    בְּ/חוֹמַ֖ת בֵּ֥ית שָֽׁן־־׃
translation:
  text: They put his armor in the house of Ashtaroth, and they fastened his body to
    the wall of Beth-shan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his weapons' or more generally 'his equipment'; the Hebrew term can
      refer broadly to military gear.
    reason: lexical_alternative
  - marker: b
    text: Or 'the temple of Ashtaroth.' Literally, 'the house of Ashtaroth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they impaled his body on the wall of Beth-shan.' The Hebrew verb can
      mean 'drive in' or 'fasten,' and the exact manner of display is not specified
      with precision.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂמוּ
  chosen: They put
  alternatives:
  - They placed
  - They set
  lexicon: HALOT
  rationale: The verb שׂוּם commonly means 'put, place, set.' 'Put' is the most natural
    modern English rendering and fits the straightforward narrative style.
- source_word: כֵּלָיו
  chosen: his armor
  alternatives:
  - his weapons
  - his equipment
  - his articles
  lexicon: HALOT
  rationale: כְּלִי can denote implements, vessels, weapons, or gear depending on
    context. In the context of a defeated warrior whose corpse is displayed, 'armor'
    best captures the military sense in idiomatic English, though 'weapons' is possible.
    The parallel in 1 Chronicles 10:10 distinguishes armor from skull, supporting
    a military-gear sense rather than generic 'articles.'
- source_word: בֵּית עַשְׁתָּרוֹת
  chosen: the house of Ashtaroth
  alternatives:
  - the temple of Ashtaroth
  - the house of the Ashtoreths
  lexicon: HALOT
  rationale: בֵּית literally means 'house,' but in cultic context it refers to a temple
    or shrine. The proper name עַשְׁתָּרוֹת is preserved by transliteration per project
    philosophy. 'House of Ashtaroth' keeps the Hebrew form transparent while remaining
    understandable.
- source_word: גְּוִיָּתוֹ
  chosen: his body
  alternatives:
  - his corpse
  - his dead body
  lexicon: HALOT
  rationale: The noun refers to a body, often a dead body/corpse. Since Saul is already
    known to be dead from the context, 'his body' is sufficiently clear and reads
    naturally; 'corpse' would be slightly more explicit but harsher than necessary.
- source_word: תָּקְעוּ
  chosen: they fastened
  alternatives:
  - they impaled
  - they drove
  - they fixed
  lexicon: HALOT
  rationale: תקע has the sense of thrusting, driving in, or fastening. In this context
    it describes attaching the body to the wall. 'Fastened' communicates the result
    without over-specifying the exact method. 'Impaled' is possible but may suggest
    a more precise mode of execution/display than the Hebrew explicitly states.
- source_word: בְּחוֹמַת
  chosen: to the wall of
  alternatives:
  - on the wall of
  - in the wall of
  lexicon: HALOT
  rationale: חוֹמָה means 'wall.' With תקע and the preposition ב, English idiom is
    best expressed as 'to the wall of,' indicating attachment.
- source_word: בֵּית שָׁן
  chosen: Beth-shan
  alternatives:
  - Beth Shean
  - Beit-shan
  lexicon: HALOT
  rationale: This is a place name and is transliterated according to standard English
    biblical convention. Hyphenation improves readability.
