id: 1SA.31.3
reference: 1 Samuel 31:3
source:
  edition: WLC
  text: וַ/תִּכְבַּ֤ד הַ/מִּלְחָמָה֙ אֶל שָׁא֔וּל וַ/יִּמְצָאֻ֥/הוּ הַ/מּוֹרִ֖ים אֲנָשִׁ֣ים בַּ/קָּ֑שֶׁת וַ/יָּ֥חֶל מְאֹ֖ד מֵ/הַ/מּוֹרִֽים־׃
translation:
  text: And the battle grew heavy against Saul, and the archers found him, and he was greatly wounded by the archers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he was in great anguish/distress because of the archers.' The Hebrew verb here is difficult and may denote severe pain, trembling, or anguish rather than explicit physical wounding.
    reason: lexical_alternative
  - marker: b
    text: Or 'the archers found him, men with the bow,'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַתִּכְבַּד
  chosen: grew heavy
  alternatives:
  - became severe
  - pressed hard
  lexicon: HALOT
  rationale: The verb literally denotes becoming heavy. In battle context it idiomatically conveys intensification or severe pressure. 'Grew heavy' preserves the Hebrew image while remaining intelligible in English.
- source_word: הַמִּלְחָמָה
  chosen: the battle
  alternatives:
  - the fighting
  - the war
  lexicon: HALOT
  rationale: Standard rendering for the concrete military engagement in context.
- source_word: אֶל
  chosen: against
  alternatives:
  - upon
  - toward
  lexicon: HALOT
  rationale: With hostile force directed at Saul, 'against' best expresses the relational sense in idiomatic English.
- source_word: וַיִּמְצָאֻהוּ
  chosen: found him
  alternatives:
  - overtook him
  - reached him
  lexicon: HALOT
  rationale: The verb is literally 'found.' In battle narrative it can imply coming upon or reaching a target, but 'found him' is both faithful and natural.
- source_word: הַמּוֹרִים אֲנָשִׁים בַּקָּשֶׁת
  chosen: the archers, men with the bow
  alternatives:
  - the shooters, men with the bow
  - the bowmen
  lexicon: HALOT
  rationale: מוֹרִים derives from 'shoot' and refers to those who shoot; the following phrase specifies 'men with the bow.' Rendering both elements preserves the Hebrew fullness rather than collapsing immediately to a single English term, though 'archers' communicates the sense clearly.
- source_word: וַיָּחֶל
  chosen: he was greatly wounded
  alternatives:
  - he was in great anguish
  - he trembled greatly
  - he was greatly distressed
  lexicon: HALOT
  rationale: The verb חלל/חול in this form is difficult and has been understood as either physical wounding or severe anguish. Given the immediate context of archers striking Saul and the parallel in 1 Chronicles 10:3, 'he was greatly wounded' best fits the narrative flow, while alternatives are preserved in a footnote.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - severely
  - very much
  lexicon: HALOT
  rationale: Standard intensifier; 'greatly' fits the elevated narrative tone.
- source_word: מֵהַמּוֹרִים
  chosen: by the archers
  alternatives:
  - because of the archers
  - from the archers/shooters
  lexicon: HALOT
  rationale: The preposition marks source or agency. In English, 'by the archers' most naturally expresses the cause of Saul's condition.
