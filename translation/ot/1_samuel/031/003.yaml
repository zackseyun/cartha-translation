  from: the archers found him, men with the bow,
  to: the archers found him,
  rationale: The Hebrew phrase `הַמּוֹרִים אֲנָשִׁים בַּקָּשֶׁת` ('the shooters, men with the bow') uses apposition for clarification. The draft's rendering, 'the archers..., men with the bow,' is redundant in English because the meaning of 'men with the bow' is fully contained within the word 'archers.' This literal adherence to the source text's structure results in an awkward phrase that hinders readability. Collapsing the appositive into the single term 'the archers' is more natural for an English reader and loses no essential information.
