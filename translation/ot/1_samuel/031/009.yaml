theological_decisions:
- issue: Rendering of Philistine cultic site and objects
  chosen_reading: house of their idols
  alternative_readings:
  - temple of their idols
  - house of their images
  rationale: The Hebrew uses ordinary cultic language without endorsing the reality
    of the gods. 'Idols' appropriately conveys the polemical sense common in English
    Bible usage while remaining lexically grounded in עֲצַבִּים.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English'
