id: 1SA.31.9
reference: 1 Samuel 31:9
source:
  edition: WLC
  text: וַֽ/יִּכְרְתוּ֙ אֶת רֹאשׁ֔/וֹ וַ/יַּפְשִׁ֖יטוּ אֶת כֵּלָ֑י/ו וַ/יְשַׁלְּח֨וּ
    בְ/אֶֽרֶץ פְּלִשְׁתִּ֜ים סָבִ֗יב לְ/בַשֵּׂ֛ר בֵּ֥ית עֲצַבֵּי/הֶ֖ם וְ/אֶת הָ/עָֽם־־־־׃
translation:
  text: They cut off his head and stripped off his armor, and sent messengers throughout
    the land of the Philistines to proclaim the news in the house of their idols and
    among the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the temple of their idols.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and to the people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְרְתוּ
  chosen: They cut off
  alternatives:
  - they cut down
  - they severed
  lexicon: HALOT
  rationale: With רֹאשׁוֹ as the object, the verb clearly means to cut off/sever the
    head, not merely to cut in general.
- source_word: רֹאשׁוֹ
  chosen: his head
  lexicon: HALOT
  rationale: Straightforward anatomical sense; the suffix refers to Saul from the
    prior context.
- source_word: וַיַּפְשִׁיטוּ
  chosen: stripped off
  alternatives:
  - stripped
  - despoiled
  lexicon: HALOT
  rationale: The verb commonly means to strip off clothing or equipment. 'Stripped
    off' fits the direct object and the violent context.
- source_word: כֵּלָיו
  chosen: his armor
  alternatives:
  - his weapons
  - his equipment
  lexicon: HALOT
  rationale: כֵּלִים can mean vessels, implements, weapons, or equipment. In this
    battle-death context, 'armor' is the most idiomatic and contextually precise rendering
    in English, though broader 'equipment' is possible.
- source_word: וַיְשַׁלְּחוּ
  chosen: sent messengers
  alternatives:
  - sent word
  - sent
  lexicon: HALOT
  rationale: The Hebrew verb is simply 'sent,' but the context of proclamation throughout
    Philistine territory implies dispatching envoys or messengers. Supplying 'messengers'
    makes the English natural while staying within the sense of the verb.
- source_word: בְאֶרֶץ פְּלִשְׁתִּים סָבִיב
  chosen: throughout the land of the Philistines
  alternatives:
  - around the land of the Philistines
  - through the Philistine land all around
  lexicon: HALOT
  rationale: The phrase denotes circulation broadly through Philistine territory.
    'Throughout' captures the distributive force of סָבִיב in idiomatic English.
- source_word: לְבַשֵּׂר
  chosen: to proclaim the news
  alternatives:
  - to announce
  - to bring news
  lexicon: HALOT
  rationale: The infinitive means to announce good or significant news. Here it is
    triumphal news from the Philistine perspective; 'proclaim the news' preserves
    the verbal force without implying moral approval.
- source_word: בֵּית עֲצַבֵּיהֶם
  chosen: in the house of their idols
  alternatives:
  - in the temple of their idols
  - in the house of their images
  lexicon: HALOT
  rationale: בֵּית is literally 'house,' often temple/shrine in cultic contexts. עֲצַבִּים
    refers to idols/images. 'House of their idols' stays close to the Hebrew while
    remaining clear.
- source_word: וְאֶת הָעָם
  chosen: and among the people
  alternatives:
  - and to the people
  lexicon: HALOT
  rationale: The direct-object marker with 'the people' is elliptical after 'to proclaim
    the news'; the sense is that the news was proclaimed also to the populace. 'Among
    the people' is idiomatic and reflects the scope of the proclamation.
