id: 1SA.31.11
reference: 1 Samuel 31:11
source:
  edition: WLC
  text: וַ/יִּשְׁמְע֣וּ אֵלָ֔י/ו יֹשְׁבֵ֖י יָבֵ֣ישׁ גִּלְעָ֑ד אֵ֛ת אֲשֶׁר עָשׂ֥וּ
    פְלִשְׁתִּ֖ים לְ/שָׁאֽוּל־׃
translation:
  text: When the inhabitants of Jabesh-gilead heard about what the Philistines had
    done to Saul,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heard of what the Philistines had done to Saul.' The Hebrew prepositional
      phrase after 'heard' is idiomatic and indicates the matter reported.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  chosen: heard
  alternatives:
  - heard about
  - came to hear
  lexicon: HALOT
  rationale: 'The verb שׁמע in the waw-consecutive narrative form introduces the next
    event: the people received news. English ''heard'' is the core sense; ''heard
    about'' is supplied in idiomatic English because the following object clause specifies
    the content of the report.'
- source_word: אֵלָיו
  chosen: about
  alternatives:
  - of it
  - concerning it
  - to him
  lexicon: HALOT
  rationale: Although the consonantal form can be read literally as 'to him,' in this
    context after שׁמע and before the content clause it functions idiomatically to
    indicate the matter heard of/concerning. Rendering it woodenly as 'to him' would
    be misleading in English. 'About' captures the sense of reported information.
- source_word: יֹשְׁבֵי
  chosen: the inhabitants of
  alternatives:
  - those dwelling in
  - the residents of
  lexicon: HALOT
  rationale: The participle of ישׁב used substantivally refers to those who live in
    a place. 'Inhabitants of' is natural modern English and preserves the collective
    sense.
- source_word: יָבֵישׁ גִּלְעָד
  chosen: Jabesh-gilead
  alternatives:
  - Jabesh Gilead
  rationale: Standard English transliteration of the place name; hyphenation is conventional
    and clarifies the compound toponym.
- source_word: אֵת אֲשֶׁר
  chosen: what
  alternatives:
  - that which
  - the thing that
  lexicon: HALOT
  rationale: 'This combination introduces the content of what was heard: ''what ...
    had done.'' ''What'' is the most natural equivalent in contemporary English.'
- source_word: עָשׂוּ
  chosen: had done
  alternatives:
  - did
  lexicon: HALOT
  rationale: 'English past perfect fits the relation to the hearing event: the Philistines''
    action preceded the report being heard.'
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard rendering of the ethnic/national name.
- source_word: לְשָׁאוּל
  chosen: to Saul
  alternatives:
  - against Saul
  - with Saul
  lexicon: HALOT
  rationale: The preposition ל with עשה can mark the person affected by the action.
    'To Saul' is the most direct rendering; in English the phrase 'what the Philistines
    had done to Saul' is idiomatic and clear.
