id: 1SA.11.12
reference: 1 Samuel 11:12
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הָ/עָם֙ אֶל שְׁמוּאֵ֔ל מִ֣י הָ/אֹמֵ֔ר שָׁא֖וּל יִמְלֹ֣ךְ עָלֵ֑י/נוּ
    תְּנ֥וּ הָ/אֲנָשִׁ֖ים וּ/נְמִיתֵֽ/ם־׃
translation:
  text: Then the people said to Samuel, “Who was it that said, ‘Shall Saul reign over
    us?’ Hand over the men, and we will put them to death.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, “Will Saul reign over us?” The Hebrew imperfect can be rendered either
      as a future-like question or, less likely here, as a statement: “Saul shall
      reign over us.”'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: Standard rendering for עָם in this context, referring collectively to
    Israel's people present.
- source_word: אֶל שְׁמוּאֵל
  chosen: to Samuel
  alternatives:
  - to Shmuel
  lexicon: HALOT
  rationale: אֶל marks direction of speech. The personal name is transliterated by
    standard English convention as 'Samuel.'
- source_word: מִי
  chosen: Who was it
  alternatives:
  - Who
  lexicon: HALOT
  rationale: The interrogative introduces an identifying question. 'Who was it' is
    idiomatic English that preserves the force of demanding identification.
- source_word: הָאֹמֵר
  chosen: that said
  alternatives:
  - who said
  - the one saying
  lexicon: HALOT
  rationale: 'The article plus participle functions substantivally: ''the one who
    said.'' In English, ''that said'' after ''Who was it'' is the most natural equivalent.'
- source_word: שָׁאוּל יִמְלֹךְ עָלֵינוּ
  chosen: ‘Shall Saul reign over us?’
  alternatives:
  - ‘Will Saul reign over us?’
  - ‘Saul shall reign over us’
  lexicon: HALOT
  rationale: The quoted objection recalls earlier resistance to Saul's kingship. Rendering
    as a question best fits the context and common use of the imperfect here. 'Reign
    over us' preserves the royal nuance of מלך better than simply 'be king over us.'
- source_word: תְּנוּ
  chosen: Hand over
  alternatives:
  - Give
  - Deliver
  lexicon: HALOT
  rationale: The imperative calls for producing the offenders for judgment. 'Hand
    over' is more idiomatic and contextually precise than bare 'give.'
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - those men
  - the people
  lexicon: HALOT
  rationale: אֲנָשִׁים specifically denotes men/persons here, namely the dissenters
    just mentioned. 'The men' is sufficiently definite from context.
- source_word: וּנְמִיתֵם
  chosen: and we will put them to death
  alternatives:
  - and we will kill them
  lexicon: HALOT
  rationale: The Hiphil of מות means to cause to die, hence 'put to death.' This preserves
    the judicial/executive sense better than the blunter 'kill.'
