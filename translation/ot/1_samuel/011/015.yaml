theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Per DOCTRINE.md contested
    terms table, the default rendering is 'the LORD,' following Jewish reverence tradition
    and LXX-influenced English convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered expression אַנְשֵׁי יִשְׂרָאֵל
  chosen_reading: all the men of Israel
  alternative_readings:
  - all the Israelites
  - all the people of Israel
  rationale: The Hebrew is grammatically and lexically masculine ('men of Israel').
    Per the gender-accurate policy, the translation preserves the masculine form rather
    than flattening it to a neutral collective.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4: Gender-accurate over
    gender-neutral'
