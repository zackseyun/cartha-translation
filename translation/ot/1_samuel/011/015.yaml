id: 1SA.11.15
reference: 1 Samuel 11:15
source:
  edition: WLC
  text: וַ/יֵּלְכ֨וּ כָל הָ/עָ֜ם הַ/גִּלְגָּ֗ל וַ/יַּמְלִכוּ֩ שָׁ֨ם אֶת שָׁא֜וּל לִ/פְנֵ֤י
    יְהוָה֙ בַּ/גִּלְגָּ֔ל וַ/יִּזְבְּחוּ שָׁ֛ם זְבָחִ֥ים שְׁלָמִ֖ים לִ/פְנֵ֣י יְהוָ֑ה
    וַ/יִּשְׂמַ֨ח שָׁ֥ם שָׁא֛וּל וְ/כָל אַנְשֵׁ֥י יִשְׂרָאֵ֖ל עַד מְאֹֽד־־־־־׃פ
translation:
  text: So all the people went to Gilgal, and there they made Saul king before the
    LORD at Gilgal. There they sacrificed peace offerings before the LORD, and there
    Saul and all the men of Israel rejoiced greatly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' or 'offerings of well-being.' The Hebrew term
      refers to a category of communal sacrificial offerings associated with peace,
      wholeness, and shared celebration.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: went
  alternatives:
  - came
  - proceeded
  lexicon: HALOT
  rationale: הלך in the wayyiqtol narrative sequence is the ordinary verb for movement;
    'went' is the natural English rendering in context.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - all the nation
  - all the troops
  lexicon: HALOT
  rationale: עָם here refers to the gathered populace corporately, not specifically
    soldiers only. 'All the people' best matches the narrative setting.
- source_word: הַגִּלְגָּל / בַּגִּלְגָּל
  chosen: Gilgal
  lexicon: HALOT
  rationale: Proper place name, transliterated per translation philosophy.
- source_word: וַיַּמְלִכוּ ... אֶת שָׁאוּל
  chosen: they made Saul king
  alternatives:
  - they proclaimed Saul king
  - they anointed Saul king
  lexicon: HALOT
  rationale: The Hiphil of מלך means to cause someone to reign / make king. 'Made
    Saul king' is direct and avoids importing 'anointed,' which the Hebrew does not
    state here.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי denotes presence before God in a cultic/public sense. 'Before
    the LORD' is idiomatic and preserves the covenantal force. YHWH is rendered 'the
    LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Contested divine name; rendered 'the LORD' according to the stated default
    in DOCTRINE.md.
- source_word: וַיִּזְבְּחוּ
  chosen: they sacrificed
  alternatives:
  - they offered sacrifices
  - they slaughtered sacrificially
  lexicon: HALOT
  rationale: The verb זבח in sacrificial context is well rendered 'sacrificed'; the
    object immediately specifies the kind of sacrifices.
- source_word: זְבָחִים שְׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: This standard sacrificial term refers to שְׁלָמִים. 'Peace offerings'
    is the most familiar concise rendering, while alternatives are viable and worth
    preserving in a footnote.
- source_word: וַיִּשְׂמַח
  chosen: rejoiced
  alternatives:
  - was glad
  - celebrated
  lexicon: HALOT
  rationale: Though singular in form, the verb is naturally construed with the compound
    subject that follows in English. 'Rejoiced' preserves the sense without overinterpreting
    the syntax.
- source_word: וְכָל אַנְשֵׁי יִשְׂרָאֵל
  chosen: and all the men of Israel
  alternatives:
  - and all the people of Israel
  - and all the Israelites
  lexicon: HALOT
  rationale: אַנְשֵׁי is specifically 'men of.' In keeping with gender-accurate policy,
    the masculine form is retained rather than neutralized.
- source_word: עַד מְאֹד
  chosen: greatly
  alternatives:
  - exceedingly
  - very much
  lexicon: HALOT
  rationale: The idiom intensifies the rejoicing. 'Greatly' is natural modern English
    and preserves the force.
