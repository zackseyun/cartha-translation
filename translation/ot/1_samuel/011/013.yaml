theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God as the one who effected the deliverance.
    Following the project's doctrine, the tetragrammaton is rendered 'the LORD' rather
    than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering of תְּשׁוּעָה in a military-deliverance context
  chosen_reading: salvation
  alternative_readings:
  - deliverance
  - victory
  rationale: The immediate context is military rescue from the Ammonites, so 'victory'
    or 'deliverance' are contextually viable. However, 'salvation' preserves the theological
    breadth of the Hebrew term and highlights that the rescue is attributed to the
    LORD, not merely to military success.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
