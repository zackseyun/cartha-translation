id: 1SA.11.13
reference: 1 Samuel 11:13
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שָׁא֔וּל לֹֽא יוּמַ֥ת אִ֖ישׁ בַּ/יּ֣וֹם הַ/זֶּ֑ה כִּ֥י הַ/יּ֛וֹם
    עָשָֽׂה יְהוָ֥ה תְּשׁוּעָ֖ה בְּ/יִשְׂרָאֵֽל־־׃ס
translation:
  text: But Saul said, “Not a man shall be put to death on this day, for today the
    LORD has brought salvation in Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD has accomplished deliverance' or 'the LORD has given victory
      in Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But Saul said
  alternatives:
  - And Saul said
  - Then Saul said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the immediate
    contrast with the people's proposal in the prior verse, while still preserving
    the basic sense of simple narrative progression.
- source_word: לֹא יוּמַת אִישׁ
  chosen: Not a man shall be put to death
  alternatives:
  - No man shall die
  - No one shall be executed
  lexicon: HALOT
  rationale: יוּמַת is a causative/passive legal formula from מות, naturally rendered
    'be put to death' rather than merely 'die.' אִישׁ is singular but distributive/generic,
    so 'a man' preserves the Hebrew form and legal tone.
- source_word: בַּיּוֹם הַזֶּה
  chosen: on this day
  alternatives:
  - today
  - on this very day
  lexicon: HALOT
  rationale: The prepositional phrase is most naturally 'on this day.' This keeps
    the formal temporal expression, while the following הַיּוֹם is rendered separately
    as 'today' for natural English variation.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces Saul's reason for sparing the men. 'For' is concise
    and preserves the explanatory force.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Rendered 'today' for idiomatic English and to distinguish it slightly
    from the earlier fuller phrase בַּיּוֹם הַזֶּה without changing meaning.
- source_word: עָשָׂה יְהוָה תְּשׁוּעָה
  chosen: the LORD has brought salvation
  alternatives:
  - the LORD has worked salvation
  - the LORD has accomplished deliverance
  - the LORD has given victory
  lexicon: HALOT
  rationale: The idiom 'עשה תשועה' means to effect rescue/deliverance. 'Has brought
    salvation' is clear modern English and preserves divine agency. 'Victory' is contextually
    possible in a military setting, but 'salvation' better reflects the broader theological
    sense of תְּשׁוּעָה and keeps the Hebrew's God-centered wording.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the LXX/English Bible pattern.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - for Israel
  - among Israel
  lexicon: HALOT
  rationale: The preposition ב is straightforwardly locative here. 'In Israel' preserves
    the Hebrew form; 'for Israel' would foreground beneficiary sense, which is interpretively
    possible but less direct.
