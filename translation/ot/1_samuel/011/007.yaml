id: 1SA.11.7
reference: 1 Samuel 11:7
source:
  edition: WLC
  text: וַ/יִּקַּח֩ צֶ֨מֶד בָּקָ֜ר וַֽ/יְנַתְּחֵ֗/הוּ וַ/יְשַׁלַּ֞ח בְּ/כָל גְּב֣וּל
    יִשְׂרָאֵל֮ בְּ/יַ֣ד הַ/מַּלְאָכִ֣ים לֵ/אמֹר֒ אֲשֶׁר֩ אֵינֶ֨/נּוּ יֹצֵ֜א אַחֲרֵ֤י
    שָׁאוּל֙ וְ/אַחַ֣ר שְׁמוּאֵ֔ל כֹּ֥ה יֵעָשֶׂ֖ה לִ/בְקָר֑/וֹ וַ/יִּפֹּ֤ל פַּֽחַד
    יְהוָה֙ עַל הָ/עָ֔ם וַ/יֵּצְא֖וּ כְּ/אִ֥ישׁ אֶחָֽד־׀־־׃
translation:
  text: Then he took a yoke of oxen and cut them in pieces, and sent them throughout
    all the territory of Israel by the hand of the messengers, saying, “Whoever does
    not come out after Saul and after Samuel, so shall it be done to his oxen.” Then
    the dread of the LORD fell on the people, and they came out as one man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a pair of oxen.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “by the hand of the messengers,” an idiom meaning “by means of the
      messengers.”
    reason: cultural_note
  - marker: c
    text: Or “the fear of the LORD fell on the people.” Here the sense is likely a
      divinely sent dread that moved them to act.
    reason: alternative_reading
  - marker: d
    text: Hebrew “as one man,” an idiom for unified action.
    reason: lexical_alternative
lexical_decisions:
- source_word: צֶמֶד בָּקָר
  chosen: a yoke of oxen
  alternatives:
  - a pair of oxen
  lexicon: HALOT
  rationale: צֶמֶד denotes a pair/yoke; with בָּקָר it refers to a yoked pair of cattle
    used for plowing. 'A yoke of oxen' is idiomatic English and preserves the agricultural
    image.
- source_word: וַיְנַתְּחֵהוּ
  chosen: cut them in pieces
  alternatives:
  - dismembered it
  - cut it up
  lexicon: HALOT
  rationale: The verb נתּח means to cut into pieces. Although the suffix is singular,
    it refers collectively to the yoke/pair of oxen. English naturally renders the
    resulting sense with plural reference to the animals.
- source_word: בְּכָל גְּבוּל יִשְׂרָאֵל
  chosen: throughout all the territory of Israel
  alternatives:
  - throughout all the border of Israel
  - throughout all Israel
  lexicon: HALOT
  rationale: גְּבוּל can mean border, territory, or region. Here the sense is distributive
    across the land, not merely along the border line, so 'throughout all the territory
    of Israel' best reflects the idiom.
- source_word: בְּיַד הַמַּלְאָכִים
  chosen: by the hand of the messengers
  alternatives:
  - by messengers
  - through the messengers
  lexicon: HALOT
  rationale: The idiom בְּיַד literally means 'by the hand of' and often denotes agency.
    Retaining 'by the hand of' keeps the Hebrew flavor while remaining understandable.
- source_word: אַחֲרֵי שָׁאוּל וְאַחַר שְׁמוּאֵל
  chosen: after Saul and after Samuel
  alternatives:
  - to follow Saul and Samuel
  - behind Saul and behind Samuel
  lexicon: HALOT
  rationale: אַחֲרֵי/אַחַר with 'go out' conveys following leaders into battle. 'After
    Saul and after Samuel' is formally close and preserves the rhetorical force of
    naming both king and prophet.
- source_word: כֹּה יֵעָשֶׂה לִבְקָרוֹ
  chosen: so shall it be done to his oxen
  alternatives:
  - thus it shall be done to his cattle
  lexicon: HALOT
  rationale: בָּקָר can denote cattle generally, but in this context the threat mirrors
    the dismembered oxen just mentioned. 'Oxen' makes the connection vivid and specific
    in English.
- source_word: פַּחַד יְהוָה
  chosen: the dread of the LORD
  alternatives:
  - the fear of the LORD
  - terror from the LORD
  lexicon: HALOT
  rationale: פַּחַד can mean fear, dread, or terror. Here it is a divinely induced
    overwhelming fear that compels response. 'The dread of the LORD' preserves both
    the source genitive and the force of the phrase without overinterpreting it as
    merely reverential fear.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD'.
- source_word: כְּאִישׁ אֶחָד
  chosen: as one man
  alternatives:
  - as one
  - with one accord
  lexicon: HALOT
  rationale: The idiom means unitedly, with a single purpose. 'As one man' is the
    standard, transparent rendering and preserves the masculine singular imagery present
    in the Hebrew.
