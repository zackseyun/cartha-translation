theological_decisions:
- issue: Meaning of פַּחַד יְהוָה
  chosen_reading: a fear/dread sent by the LORD that came upon the people
  alternative_readings:
  - the people's reverential fear of the LORD
  rationale: In context the phrase explains the people's immediate mobilization after
    Saul's threat. The narrative sense favors a divinely imposed dread rather than
    a general statement about piety. The translation preserves the genitive construction
    without importing a stronger doctrinal claim than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it; יְהוָה
    default rendering as 'the LORD'.
- issue: Rendering of כְּאִישׁ אֶחָד
  chosen_reading: as one man
  alternative_readings:
  - with one accord
  rationale: The Hebrew is grammatically masculine singular and functions idiomatically
    for unified action. Per the gender-accurate guideline, the masculine form is retained
    rather than neutralized in the main text.
  doctrine_reference: Gender-accurate over gender-neutral.
