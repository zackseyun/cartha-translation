id: 1SA.11.2
reference: 1 Samuel 11:2
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲלֵי/הֶ֗ם נָחָשׁ֙ הָ/עַמּוֹנִ֔י בְּ/זֹאת֙ אֶכְרֹ֣ת לָ/כֶ֔ם בִּ/נְק֥וֹר
    לָ/כֶ֖ם כָּל עֵ֣ין יָמִ֑ין וְ/שַׂמְתִּ֥י/הָ חֶרְפָּ֖ה עַל כָּל יִשְׂרָאֵֽל־־־׃
translation:
  text: 'Nahash the Ammonite said to them, “On this condition I will make a treaty
    with you: that every right eye of yours be gouged out, and I will make it a disgrace
    upon all Israel.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'I will cut a covenant with you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a reproach upon all Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/זֹאת
  chosen: On this condition
  alternatives:
  - By this
  - With this
  lexicon: HALOT
  rationale: The preposition ב plus demonstrative זאת introduces the terms or condition
    under which Nahash will act. 'On this condition' is idiomatic English that preserves
    the conditional force better than the more wooden 'by this.'
- source_word: אֶכְרֹת לָכֶם
  chosen: I will make a treaty with you
  alternatives:
  - I will cut a covenant with you
  - I will make a covenant with you
  lexicon: HALOT
  rationale: כרת with covenantal objects is the standard idiom 'cut/make a covenant.'
    In this military-political setting, 'make a treaty with you' communicates the
    sense clearly in modern English while staying close to the Hebrew. 'Cut a covenant'
    is more formal but less natural for contemporary readers.
- source_word: בִּנְקֹר
  chosen: be gouged out
  alternatives:
  - by gouging out
  - when I gouge out
  lexicon: HALOT
  rationale: The infinitive construct of נקר expresses the means/condition of the
    treaty. Rendering it with a passive infinitive-like clause in English ('that ...
    be gouged out') makes the demand explicit and natural. 'Gouged out' accurately
    conveys the violent physical action.
- source_word: כָּל עֵין יָמִין
  chosen: every right eye
  alternatives:
  - the right eye of every one of you
  - every one’s right eye
  lexicon: HALOT
  rationale: 'The phrase is distributive: each person’s right eye. ''Every right eye''
    is concise and faithful; the following ''of yours'' clarifies the second-person
    plural reference.'
- source_word: וְשַׂמְתִּיהָ
  chosen: and I will make it
  alternatives:
  - and I will set it
  - and I will place it
  lexicon: HALOT
  rationale: שׂים commonly means 'put/set,' but here with חֶרְפָּה עַל it carries
    the sense of causing or making something into a reproach/disgrace. The feminine
    suffix refers back to the act/condition just described; 'make it' is the most
    natural English expression.
- source_word: חֶרְפָּה
  chosen: a disgrace
  alternatives:
  - a reproach
  - an insult
  - a humiliation
  lexicon: HALOT
  rationale: חֶרְפָּה denotes public shame or reproach. 'Disgrace' is readable modern
    English and fits the national-honor context. 'Reproach' is possible but less natural
    for the target audience.
- source_word: עַל כָּל יִשְׂרָאֵל
  chosen: upon all Israel
  alternatives:
  - on all Israel
  - against all Israel
  lexicon: HALOT
  rationale: עַל here marks the disgrace as resting upon or affecting the whole nation.
    'Upon all Israel' preserves the elevated tone and the metaphor of shame laid on
    the people.
- source_word: נָחָשׁ הָעַמּוֹנִי
  chosen: Nahash the Ammonite
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy, while the gentilic
    is translated. This is the standard and clear English form.
