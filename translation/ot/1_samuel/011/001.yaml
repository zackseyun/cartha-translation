id: 1SA.11.1
reference: 1 Samuel 11:1
source:
  edition: WLC
  text: וַ/יַּ֗עַל נָחָשׁ֙ הָֽ/עַמּוֹנִ֔י וַ/יִּ֖חַן עַל יָבֵ֣שׁ גִּלְעָ֑ד וַ/יֹּ֨אמְר֜וּ
    כָּל אַנְשֵׁ֤י יָבֵישׁ֙ אֶל נָחָ֔שׁ כְּרָת לָ֥/נוּ בְרִ֖ית וְ/נַעַבְדֶֽ/ךָּ־־־־׃
translation:
  text: Then Nahash the Ammonite went up and encamped against Jabesh-gilead. And all
    the men of Jabesh said to Nahash, “Make a covenant with us, and we will serve
    you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “cut a covenant with us.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - came up
  - advanced
  lexicon: HALOT
  rationale: עלה in narrative commonly means 'went up/came up,' often with military
    movement or ascent. 'Went up' preserves the Hebrew idiom without over-interpreting
    the direction from the narrator's standpoint.
- source_word: נָחָשׁ הָעַמּוֹנִי
  chosen: Nahash the Ammonite
  alternatives:
  - Nahash of Ammon
  lexicon: HALOT
  rationale: Personal name is transliterated per project policy; the gentilic is translated
    straightforwardly as 'the Ammonite.'
- source_word: וַיִּחַן עַל
  chosen: encamped against
  alternatives:
  - camped against
  - laid siege to
  lexicon: HALOT
  rationale: חנה with עַל in military context indicates pitching camp against an opponent.
    'Encamped against' is natural English and avoids the stronger inference 'laid
    siege to,' which the verb itself does not require.
- source_word: יָבֵשׁ גִּלְעָד
  chosen: Jabesh-gilead
  alternatives:
  - Jabesh of Gilead
  lexicon: HALOT
  rationale: Standard English transliteration of the place name; hyphenated form is
    conventional and readable.
- source_word: כָּל אַנְשֵׁי יָבֵישׁ
  chosen: all the men of Jabesh
  alternatives:
  - all the people of Jabesh
  - all the citizens of Jabesh
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' Per gender-accurate policy, 'men' is
    retained rather than neutralizing to 'people,' especially in a civic-military
    negotiation context.
- source_word: כְּרָת לָנוּ בְרִית
  chosen: Make a covenant with us
  alternatives:
  - Cut a covenant with us
  - Make a treaty with us
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'cut a covenant.' 'Make a covenant' preserves
    the covenantal sense in natural English. 'Treaty' is possible in political context
    but weakens the lexical link to ברית.
- source_word: וְנַעַבְדֶךָּ
  chosen: and we will serve you
  alternatives:
  - and we will become your servants
  - and we will submit to you
  lexicon: HALOT
  rationale: עבד with a personal object commonly means 'serve.' 'Serve you' is the
    most direct rendering; 'submit to you' is interpretive, and 'become your servants'
    adds a nuance not explicit in the verb form.
