id: 1SA.11.6
reference: 1 Samuel 11:6
source:
  edition: WLC
  text: וַ/תִּצְלַ֤ח רֽוּחַ אֱלֹהִים֙ עַל שָׁא֔וּל ב/שמע/ו אֶת הַ/דְּבָרִ֣ים הָ/אֵ֑לֶּה
    וַ/יִּ֥חַר אַפּ֖/וֹ מְאֹֽד־־־׃
translation:
  text: And the Spirit of God rushed upon Saul when he heard these words, and his
    anger burned greatly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came powerfully upon Saul.' The Hebrew verb can denote a forceful coming
      of the Spirit upon someone.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'his nose burned greatly,' a Hebrew idiom meaning intense anger.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּצְלַח
  chosen: rushed upon
  alternatives:
  - came powerfully upon
  - came upon
  - prospered upon
  lexicon: HALOT
  rationale: In contexts involving the Spirit and a person, צלח commonly conveys a
    forceful onset or empowerment rather than simple arrival. 'Rushed upon' captures
    the sudden, powerful action in idiomatic modern English.
- source_word: רוּחַ אֱלֹהִים
  chosen: the Spirit of God
  alternatives:
  - God's Spirit
  lexicon: HALOT
  rationale: The construct phrase straightforwardly denotes the divine Spirit. 'The
    Spirit of God' is the most natural and recognizable English rendering here and
    preserves the theological weight of divine empowerment.
- source_word: עַל
  chosen: upon
  alternatives:
  - 'on'
  lexicon: HALOT
  rationale: '''Upon'' fits the idiom of the Spirit coming on a person in English
    biblical style and pairs naturally with ''rushed.'''
- source_word: בְּשָׁמְעוֹ
  chosen: when he heard
  alternatives:
  - on hearing
  - as he heard
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct plus suffix is temporal here.
    'When he heard' is clear, natural English and preserves the sequence of events.
- source_word: הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - this report
  lexicon: HALOT
  rationale: Though דְּבָרִים can mean 'things' or 'matters,' in this immediate speech-report
    context 'words' best reflects the lexical form and discourse setting.
- source_word: וַיִּחַר אַפּוֹ
  chosen: his anger burned
  alternatives:
  - his nose burned
  - he became very angry
  - his anger flared
  lexicon: HALOT
  rationale: This Hebrew idiom literally refers to the burning of the nose/anger.
    'His anger burned' preserves the metaphor while remaining natural English; it
    is preferable to a flat paraphrase like 'he became angry.'
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: HALOT
  rationale: מְאֹד intensifies the preceding clause. 'Greatly' works smoothly with
    'his anger burned' and avoids awkwardness such as 'burned very much.'
