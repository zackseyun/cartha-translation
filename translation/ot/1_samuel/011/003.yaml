theological_decisions:
- issue: Potentially interpretive military/surrender nuance in וְיָצָאנוּ אֵלֶיךָ
  chosen_reading: we will come out to you
  alternative_readings:
  - we will surrender to you
  rationale: The context suggests capitulation if no rescuer appears, but the Hebrew
    wording is simply 'go/come out to you.' To preserve the narrative's lexical restraint
    and avoid adding an explicit doctrinally irrelevant but interpretively stronger
    claim, the main text keeps the more literal expression.
  doctrine_reference: Translation philosophy §1, §3, §5
