id: 1SA.11.3
reference: 1 Samuel 11:3
source:
  edition: WLC
  text: וַ/יֹּאמְר֨וּ אֵלָ֜י/ו זִקְנֵ֣י יָבֵ֗ישׁ הֶ֤רֶף לָ֨/נוּ֙ שִׁבְעַ֣ת יָמִ֔ים
    וְ/נִשְׁלְחָה֙ מַלְאָכִ֔ים בְּ/כֹ֖ל גְּב֣וּל יִשְׂרָאֵ֑ל וְ/אִם אֵ֥ין מוֹשִׁ֛יעַ
    אֹתָ֖/נוּ וְ/יָצָ֥אנוּ אֵלֶֽי/ךָ־׃
translation:
  text: The elders of Jabesh said to him, “Leave us alone for seven days, and we will
    send messengers throughout all the territory of Israel. Then, if there is no one
    to save us, we will come out to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “we will surrender to you.” The Hebrew more literally says “we will come/go
      out to you,” which in context likely implies capitulation.
    reason: lexical_alternative
lexical_decisions:
- source_word: זִקְנֵי יָבֵישׁ
  chosen: the elders of Jabesh
  alternatives:
  - Jabesh’s elders
  - the leaders of Jabesh
  lexicon: HALOT
  rationale: זִקְנֵי is the construct plural 'elders of.' In this narrative context
    it refers to the recognized civic leaders of Jabesh. 'Elders' preserves the social-political
    role without over-interpreting as merely old men or generically 'leaders.'
- source_word: הֶרֶף לָנוּ
  chosen: Leave us alone
  alternatives:
  - Grant us respite
  - Give us a reprieve
  - Let us be
  lexicon: HALOT
  rationale: The imperative from רפה here asks Nahash to desist or hold off temporarily.
    'Leave us alone' is idiomatic modern English and fits the request for a seven-day
    delay. 'Grant us respite' is possible but sounds more formal and less direct.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  lexicon: HALOT
  rationale: A straightforward temporal expression. 'For seven days' is the natural
    English rendering.
- source_word: וְנִשְׁלְחָה מַלְאָכִים
  chosen: and we will send messengers
  alternatives:
  - and let us send messengers
  - and we may send messengers
  lexicon: HALOT
  rationale: The cohortative form expresses intended action following the request.
    In English, 'we will send' best conveys their proposed course of action in sequence.
    מַלְאָכִים here means human envoys/messengers, not angels.
- source_word: בְּכֹל גְּבוּל יִשְׂרָאֵל
  chosen: throughout all the territory of Israel
  alternatives:
  - through all the border of Israel
  - throughout all Israel
  lexicon: HALOT
  rationale: גְּבוּל can mean border, territory, or region. Here the sense is the
    whole extent of Israelite land, not merely the frontier line. 'Throughout all
    the territory of Israel' preserves the geographic scope more explicitly than the
    smoother but slightly less literal 'throughout all Israel.'
- source_word: וְאִם אֵין מוֹשִׁיעַ אֹתָנוּ
  chosen: Then, if there is no one to save us
  alternatives:
  - and if there is no deliverer for us
  - if no one rescues us
  lexicon: HALOT
  rationale: מוֹשִׁיעַ is an active participle from ישׁע, 'one saving/delivering.'
    'No one to save us' is clear modern English and preserves the personal sense of
    a rescuer/deliverer without importing later theological overtones.
- source_word: וְיָצָאנוּ אֵלֶיךָ
  chosen: we will come out to you
  alternatives:
  - we will surrender to you
  - we will go out to you
  lexicon: HALOT
  rationale: יצא literally means 'go/come out.' In siege context it likely implies
    yielding themselves up, but the Hebrew does not explicitly say 'surrender.' 'Come
    out to you' preserves the literal action while allowing the contextual implication
    to remain implicit.
