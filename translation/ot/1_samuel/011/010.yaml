id: 1SA.11.10
reference: 1 Samuel 11:10
source:
  edition: WLC
  text: וַֽ/יֹּאמְרוּ֙ אַנְשֵׁ֣י יָבֵ֔ישׁ מָחָ֖ר נֵצֵ֣א אֲלֵי/כֶ֑ם וַ/עֲשִׂיתֶ֣ם לָּ֔/נוּ
    כְּ/כָל הַ/טּ֖וֹב בְּ/עֵינֵי/כֶֽם־׃ס
translation:
  text: So the men of Jabesh said, “Tomorrow we will come out to you, and you may
    do to us whatever seems good in your eyes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we will go out to you'; the Hebrew does not explicitly say 'surrender,'
      though the context implies submission.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: So ... said
  alternatives:
  - And ... said
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' gives natural English
    flow while preserving sequence and consequence in context.
- source_word: אַנְשֵׁי יָבֵישׁ
  chosen: the men of Jabesh
  alternatives:
  - the men of Jabesh-gilead
  - the people of Jabesh
  lexicon: HALOT
  rationale: אַנְשֵׁי is specifically 'men of.' 'Jabesh' is the place name as written
    in this verse; 'Jabesh-gilead' is the fuller identification from context but is
    not spelled out here, so the shorter form is retained.
- source_word: מָחָר
  chosen: Tomorrow
  alternatives:
  - tomorrow
  lexicon: HALOT
  rationale: Temporal adverb indicating the next day; straightforwardly rendered 'Tomorrow.'
- source_word: נֵצֵא אֲלֵיכֶם
  chosen: we will come out to you
  alternatives:
  - we will go out to you
  - we will surrender to you
  lexicon: HALOT
  rationale: יצא means 'go/come out.' In English, from the perspective of the addressees,
    'come out to you' is idiomatic. 'Surrender' is an interpretive inference from
    context, but the Hebrew does not explicitly state surrender, so it is avoided
    in the main text.
- source_word: וַעֲשִׂיתֶם לָּנוּ
  chosen: and you may do to us
  alternatives:
  - and you shall do to us
  - then do to us
  lexicon: HALOT
  rationale: עשה here expresses what the besiegers are permitted or expected to do
    once the men come out. 'May do' fits the speech-act nuance in English without
    overstating command force.
- source_word: כְּכָל הַטּוֹב בְּעֵינֵיכֶם
  chosen: whatever seems good in your eyes
  alternatives:
  - according to all that is good in your eyes
  - whatever is good in your sight
  - whatever pleases you
  lexicon: HALOT
  rationale: This Hebrew idiom denotes what appears good or right from the addressees'
    perspective. 'Seems good in your eyes' preserves the idiom more closely than 'pleases
    you,' which could sound overly subjective or colloquial.
