id: 1SA.11.8
reference: 1 Samuel 11:8
source:
  edition: WLC
  text: וַֽ/יִּפְקְדֵ֖/ם בְּ/בָ֑זֶק וַ/יִּהְי֤וּ בְנֵֽי יִשְׂרָאֵל֙ שְׁלֹ֣שׁ מֵא֣וֹת
    אֶ֔לֶף וְ/אִ֥ישׁ יְהוּדָ֖ה שְׁלֹשִׁ֥ים אָֽלֶף־׃
translation:
  text: He mustered them at Bezek, and the sons of Israel were three hundred thousand,
    and the men of Judah thirty thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְקְדֵם
  chosen: He mustered them
  alternatives:
  - He numbered them
  - He reviewed them
  lexicon: HALOT
  rationale: The verb פקד in military contexts commonly refers to taking a muster
    or enrolling troops, not merely counting in an abstract sense. 'Mustered' best
    fits the immediate context of assembling forces for battle.
- source_word: בְּבָזֶק
  chosen: at Bezek
  alternatives:
  - in Bezek
  lexicon: HALOT
  rationale: As a place name, Bezek is transliterated. The preposition ב can be rendered
    'at' or 'in'; 'at Bezek' is idiomatic for a muster location.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the men of Israel
  lexicon: HALOT
  rationale: Following the gender-accurate principle, the literal familial expression
    is preserved. Here it functions as the corporate designation for Israel distinct
    from Judah, and 'sons of Israel' keeps that nuance more transparently than 'Israelites'.
- source_word: שְׁלֹשׁ מֵאוֹת אֶלֶף
  chosen: three hundred thousand
  lexicon: HALOT
  rationale: This is the straightforward cardinal number construction and is rendered
    directly.
- source_word: וְאִישׁ יְהוּדָה
  chosen: the men of Judah
  alternatives:
  - each man of Judah
  - Judah
  lexicon: HALOT
  rationale: Although איש is singular in form, it is a collective usage meaning the
    men belonging to Judah. 'The men of Judah' conveys the distributive collective
    sense naturally in English.
- source_word: שְׁלֹשִׁים אָלֶף
  chosen: thirty thousand
  lexicon: HALOT
  rationale: This is the straightforward cardinal number construction and is rendered
    directly.
