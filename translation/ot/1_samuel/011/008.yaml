theological_decisions:
- issue: Rendering of the tribal/corporate expression בְנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  rationale: No doctrinal issue is at stake, but the translation philosophy prefers
    gender-accurate renderings where the source uses a masculine representative expression.
    Preserving 'sons of Israel' also highlights the literary distinction between Israel
    and Judah in this verse.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
