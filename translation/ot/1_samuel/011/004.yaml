id: 1SA.11.4
reference: 1 Samuel 11:4
source:
  edition: WLC
  text: וַ/יָּבֹ֤אוּ הַ/מַּלְאָכִים֙ גִּבְעַ֣ת שָׁא֔וּל וַ/יְדַבְּר֥וּ הַ/דְּבָרִ֖ים
    בְּ/אָזְנֵ֣י הָ/עָ֑ם וַ/יִּשְׂא֧וּ כָל הָ/עָ֛ם אֶת קוֹלָ֖/ם וַ/יִּבְכּֽוּ־־׃
translation:
  text: When the messengers came to Gibeah of Saul and spoke these words in the hearing
    of the people, all the people lifted up their voice and wept.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'raised their voices and wept.' The Hebrew idiom is literally 'lifted
      up their voice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָכִים
  chosen: the messengers
  alternatives:
  - the envoys
  lexicon: HALOT
  rationale: מַלְאָךְ commonly means 'messenger' in human contexts; here these are
    the men sent from Jabesh, not angelic beings. 'Messengers' is the plain contextual
    sense.
- source_word: גִּבְעַת שָׁאוּל
  chosen: Gibeah of Saul
  alternatives:
  - Saul's Gibeah
  - Gibeah
  lexicon: HALOT
  rationale: The construct phrase identifies the town associated with Saul. 'Gibeah
    of Saul' preserves the Hebrew form and avoids over-paraphrasing.
- source_word: וַיְדַבְּרוּ הַדְּבָרִים
  chosen: spoke these words
  alternatives:
  - reported these matters
  - spoke the message
  lexicon: HALOT
  rationale: The idiom literally involves speaking 'the words.' 'Spoke these words'
    keeps the concreteness of the Hebrew while remaining natural English.
- source_word: בְּאָזְנֵי הָעָם
  chosen: in the hearing of the people
  alternatives:
  - in the ears of the people
  - to the people
  lexicon: HALOT
  rationale: The Hebrew idiom 'in the ears of' means publicly within hearing. 'In
    the hearing of' is idiomatic English that preserves the public-auditory nuance
    better than simply 'to the people.'
- source_word: וַיִּשְׂאוּ ... אֶת קוֹלָם
  chosen: lifted up their voice
  alternatives:
  - raised their voices
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for crying out or beginning loud lament.
    Singular 'voice' with plural subject reflects the collective expression and closely
    follows the Hebrew.
- source_word: וַיִּבְכּוּ
  chosen: and wept
  alternatives:
  - and cried
  lexicon: HALOT
  rationale: The verb denotes weeping/crying in grief. 'Wept' best conveys lament
    rather than mere vocal crying.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - the whole people
  lexicon: HALOT
  rationale: This straightforwardly renders the distributive force of כָל with the
    collective noun.
