id: 1SA.11.11
reference: 1 Samuel 11:11
source:
  edition: WLC
  text: וַ/יְהִ֣י מִֽ/מָּחֳרָ֗ת וַ/יָּ֨שֶׂם שָׁא֣וּל אֶת הָ/עָם֮ שְׁלֹשָׁ֣ה רָאשִׁים֒
    וַ/יָּבֹ֤אוּ בְ/תוֹךְ הַֽ/מַּחֲנֶה֙ בְּ/אַשְׁמֹ֣רֶת הַ/בֹּ֔קֶר וַ/יַּכּ֥וּ אֶת
    עַמּ֖וֹן עַד חֹ֣ם הַ/יּ֑וֹם וַ/יְהִ֤י הַ/נִּשְׁאָרִים֙ וַ/יָּפֻ֔צוּ וְ/לֹ֥א נִשְׁאֲרוּ
    בָ֖/ם שְׁנַ֥יִם יָֽחַד־־־־־׃
translation:
  text: And it happened on the next day that Saul set the people in three groups,
    and they came into the midst of the camp during the morning watch and struck Ammon
    until the heat of the day. And it happened that the survivors were scattered,
    so that no two of them were left together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'three heads,' an idiom for three divisions or companies.
    reason: lexical_alternative
  - marker: b
    text: Or 'at the morning watch.' This refers to the early-morning military watch
      period.
    reason: cultural_note
  - marker: c
    text: Or 'until the day grew hot,' likely meaning toward midday.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמָּחֳרָת
  chosen: on the next day
  alternatives:
  - the next day
  - on the morrow
  lexicon: HALOT
  rationale: Temporal expression meaning the day after the preceding events. 'On the
    next day' is natural modern English and preserves the narrative sequence.
- source_word: וַיָּשֶׂם ... שְׁלֹשָׁה רָאשִׁים
  chosen: set the people in three groups
  alternatives:
  - divided the people into three companies
  - appointed the people in three heads/divisions
  lexicon: HALOT
  rationale: The idiom literally uses 'three heads,' meaning divisions or detachments.
    'Three groups' communicates the military arrangement clearly in contemporary English
    without wooden literalism.
- source_word: בְתוֹךְ הַמַּחֲנֶה
  chosen: into the midst of the camp
  alternatives:
  - into the middle of the camp
  - within the camp
  lexicon: HALOT
  rationale: בְתוֹךְ plus 'camp' indicates penetration into the interior of the enemy
    encampment. 'Into the midst of the camp' preserves the force and vividness of
    the Hebrew.
- source_word: בְּאַשְׁמֹרֶת הַבֹּקֶר
  chosen: during the morning watch
  alternatives:
  - at the morning watch
  - in the watch of the morning
  lexicon: HALOT
  rationale: Refers to the watch period before or around dawn. 'During the morning
    watch' is idiomatic and preserves the military time reference.
- source_word: וַיַּכּוּ אֶת עַמּוֹן
  chosen: struck Ammon
  alternatives:
  - struck down the Ammonites
  - attacked Ammon
  - defeated Ammon
  lexicon: HALOT
  rationale: The object is the proper name 'Ammon,' functioning for the Ammonite force.
    'Struck Ammon' stays close to the Hebrew while allowing the collective-national
    sense.
- source_word: עַד חֹם הַיּוֹם
  chosen: until the heat of the day
  alternatives:
  - until the day grew hot
  - until midday
  lexicon: HALOT
  rationale: Literally 'until the heat of the day.' This likely denotes late morning
    toward noon, but the Hebrew image is worth preserving in the main text.
- source_word: הַנִּשְׁאָרִים
  chosen: the survivors
  alternatives:
  - those who remained
  - the remnant
  lexicon: HALOT
  rationale: Context is military survival after defeat. 'The survivors' is the clearest
    contextual rendering.
- source_word: וַיָּפֻצוּ
  chosen: were scattered
  alternatives:
  - were dispersed
  - fled in all directions
  lexicon: HALOT
  rationale: The passive-like sense in context is dispersal after rout. 'Were scattered'
    is concise and faithful.
- source_word: וְלֹא נִשְׁאֲרוּ בָם שְׁנַיִם יָחַד
  chosen: so that no two of them were left together
  alternatives:
  - and not two of them remained together
  - with not even two left together among them
  lexicon: HALOT
  rationale: Idiomatic statement emphasizing total dispersal. The chosen rendering
    preserves both the negative and the image of complete breakup of the enemy force.
- source_word: וַיְהִי ... וַיְהִי
  chosen: And it happened ... And it happened
  alternatives:
  - And it came to pass ... and it came to pass
  - The next day ... and
  lexicon: HALOT
  rationale: The repeated narrative formula is retained in a readable way to reflect
    Hebrew storytelling rhythm, though in modern English it could be smoothed out
    more.
