theological_decisions:
- issue: Sense of renewing המלוכה
  chosen_reading: publicly reaffirming or confirming Saul's royal office
  alternative_readings:
  - inaugurating the kingdom anew
  - renewing the national monarchy in a broader institutional sense
  rationale: The verse follows Saul's deliverance of Jabesh-gilead and the people's
    renewed support. The Hebrew 'renew the kingship' preserves the text's wording
    without over-specifying a coronation ritual, while still indicating reaffirmation
    of Saul's rule.
  doctrine_reference: Translation philosophy §3, §5
