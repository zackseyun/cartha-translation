id: 1SA.11.14
reference: 1 Samuel 11:14
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר שְׁמוּאֵל֙ אֶל הָ/עָ֔ם לְכ֖וּ וְ/נֵלְכָ֣ה הַ/גִּלְגָּ֑ל וּ/נְחַדֵּ֥שׁ
    שָׁ֖ם הַ/מְּלוּכָֽה־׃
translation:
  text: Then Samuel said to the people, “Come, let us go to Gilgal, and there renew
    the kingship.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “confirm the kingship” or “renew the kingdom.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence better than a bare 'and said.'
- source_word: שְׁמוּאֵל
  chosen: Samuel
  rationale: Standard English transliteration of the personal name.
- source_word: אֶל הָעָם
  chosen: to the people
  alternatives:
  - to the army
  - to the populace
  lexicon: HALOT
  rationale: עָם commonly means 'people' here, referring to the gathered Israelites.
    'People' is the plain contextual sense.
- source_word: לְכוּ
  chosen: Come
  alternatives:
  - Go
  - Come on
  lexicon: HALOT
  rationale: Though from הלך ('go/walk'), the imperative in invitation formulas is
    often idiomatically rendered 'come' in English when followed by a cohortative
    ('let us go'). This avoids the awkward 'Go, and let us go' while preserving the
    summons.
- source_word: וְנֵלְכָה
  chosen: let us go
  alternatives:
  - and let us go
  - let us proceed
  lexicon: HALOT
  rationale: First person plural cohortative expressing joint action. 'Let us go'
    is the natural English equivalent.
- source_word: הַגִּלְגָּל
  chosen: Gilgal
  rationale: Standard transliteration of the place name with the article absorbed
    idiomatically in English proper-name usage.
- source_word: וּנְחַדֵּשׁ
  chosen: renew
  alternatives:
  - confirm
  - restore
  - make new again
  lexicon: HALOT
  rationale: חדש in the piel means 'renew' or 'make anew.' In context, the kingship
    is not being created from nothing but publicly reaffirmed after Saul's victory,
    so 'renew' best fits.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Locative adverb pointing to Gilgal; straightforwardly rendered 'there.'
- source_word: הַמְּלוּכָה
  chosen: the kingship
  alternatives:
  - the kingdom
  - the monarchy
  - the royal rule
  lexicon: HALOT
  rationale: מְלוּכָה denotes kingship/royal rule. 'Kingship' fits the immediate context
    of reaffirming Saul's royal office better than 'kingdom,' which can suggest the
    realm rather than the institution or office.
