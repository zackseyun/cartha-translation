id: 1SA.11.5
reference: 1 Samuel 11:5
source:
  edition: WLC
  text: וְ/הִנֵּ֣ה שָׁא֗וּל בָּ֣א אַחֲרֵ֤י הַ/בָּקָר֙ מִן הַ/שָּׂדֶ֔ה וַ/יֹּ֣אמֶר
    שָׁא֔וּל מַה לָּ/עָ֖ם כִּ֣י יִבְכּ֑וּ וַ/יְסַ֨פְּרוּ ל֔/וֹ אֶת דִּבְרֵ֖י אַנְשֵׁ֥י
    יָבֵֽישׁ־־־־׃
translation:
  text: And behold, Saul was coming in from the field behind the cattle, and Saul
    said, “What is wrong with the people, that they are weeping?” And they told him
    the words of the men of Jabesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “following the oxen.” The Hebrew phrase אַחֲרֵי הַבָּקָר can be understood
      as Saul coming along after the bovines from the field.
    reason: lexical_alternative
  - marker: b
    text: Or “the message of the men of Jabesh.” Literally, “the words of the men
      of Jabesh.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - Now behold
  - And look
  lexicon: HALOT
  rationale: Retains the discourse-marking and scene-shifting force of הִנֵּה rather
    than omitting it. 'Behold' is still readable here and preserves the narrative
    vividness better than a flat 'now'.
- source_word: בָּא
  chosen: was coming in
  alternatives:
  - came
  - was coming
  lexicon: HALOT
  rationale: The participle depicts ongoing action/background circumstance. 'Was coming
    in' reflects the participial sense in natural English better than a simple preterite
    'came'.
- source_word: אַחֲרֵי הַבָּקָר
  chosen: behind the cattle
  alternatives:
  - following the oxen
  - after the herd
  lexicon: HALOT
  rationale: אַחֲרֵי is spatially 'behind/after.' With cattle returning from the field,
    'behind the cattle' gives the concrete picture of Saul coming along after them.
    'Oxen' is possible, but בָּקָר is broader bovine livestock, so 'cattle' is preferable.
- source_word: מִן הַשָּׂדֶה
  chosen: from the field
  alternatives:
  - in from the field
  lexicon: HALOT
  rationale: This phrase marks Saul's origin point. In the final English line it is
    incorporated as 'coming in from the field' for naturalness while preserving the
    locative sense.
- source_word: מַה לָעָם
  chosen: What is wrong with the people
  alternatives:
  - What troubles the people
  - What is the matter with the people
  lexicon: HALOT
  rationale: This idiom asks what is the matter with someone. 'What is wrong with
    the people' is idiomatic modern English and preserves the force of Saul's question.
- source_word: כִּי יִבְכּוּ
  chosen: that they are weeping
  alternatives:
  - that they weep
  - for they are crying
  lexicon: HALOT
  rationale: Here כִּי introduces the content/explanation of Saul's question. 'That
    they are weeping' fits the idiom 'What is wrong ... that they are weeping?' and
    preserves the imperfect's ongoing sense.
- source_word: וַיְסַפְּרוּ לוֹ
  chosen: And they told him
  alternatives:
  - And they reported to him
  - And they recounted to him
  lexicon: HALOT
  rationale: A straightforward narrative verb. 'Told him' is the most natural English
    equivalent in context.
- source_word: דִּבְרֵי אַנְשֵׁי יָבֵישׁ
  chosen: the words of the men of Jabesh
  alternatives:
  - the message of the men of Jabesh
  - what the men of Jabesh had said
  lexicon: HALOT
  rationale: דִּבְרֵי is literally 'words of.' 'Message' is possible dynamically,
    but 'words' preserves the formal link to the reported speech without obscuring
    meaning. אַנְשֵׁי is rendered 'men of' in keeping with gender-accurate policy
    and the likely reference to the male representatives/citizens of Jabesh.
