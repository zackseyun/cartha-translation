id: 1SA.11.9
reference: 1 Samuel 11:9
source:
  edition: WLC
  text: וַ/יֹּאמְר֞וּ לַ/מַּלְאָכִ֣ים הַ/בָּאִ֗ים כֹּ֤ה תֹֽאמְרוּ/ן֙ לְ/אִישׁ֙ יָבֵ֣ישׁ
    גִּלְעָ֔ד מָחָ֛ר תִּהְיֶֽה לָ/כֶ֥ם תְּשׁוּעָ֖ה ב/חם הַ/שָּׁ֑מֶשׁ וַ/יָּבֹ֣אוּ
    הַ/מַּלְאָכִ֗ים וַ/יַּגִּ֛ידוּ לְ/אַנְשֵׁ֥י יָבֵ֖ישׁ וַ/יִּשְׂמָֽחוּ־׃
translation:
  text: 'They said to the messengers who were coming, “This is what you shall say
    to the men of Jabesh-gilead: Tomorrow, by the heat of the sun, deliverance will
    be yours.” So the messengers came and told the men of Jabesh, and they rejoiced.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the man of Jabesh-gilead”; the Hebrew singular likely functions collectively
      for the inhabitants of the city.
    reason: lexical_alternative
  - marker: b
    text: Or “when the sun is hot,” that is, around the hottest part of the day.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  - angels
  lexicon: HALOT
  rationale: In this narrative context מלאכים refers to human bearers of a message,
    not heavenly beings. 'Messengers' is the most natural and contextually precise
    English rendering.
- source_word: הַבָּאִים
  chosen: who were coming
  alternatives:
  - who had come
  - who came
  lexicon: HALOT
  rationale: The participle modifies 'messengers' and describes them as the ones arriving/presenting
    themselves. 'Who were coming' preserves the participial sense, though English
    could also compress it to 'who had come.'
- source_word: כֹּה תֹאמְרוּן
  chosen: This is what you shall say
  alternatives:
  - Thus you shall say
  - You shall say this
  lexicon: HALOT
  rationale: This idiom introduces direct speech. 'This is what you shall say' is
    clear modern English while remaining close to the Hebrew formula.
- source_word: לְאִישׁ יָבֵישׁ גִּלְעָד
  chosen: to the men of Jabesh-gilead
  alternatives:
  - to the man of Jabesh-gilead
  - to the people of Jabesh-gilead
  lexicon: HALOT
  rationale: Although איש is singular in form, it functions collectively here, as
    shown by the later plural reference to the inhabitants and the context of a city
    under threat. Rendering it collectively avoids misleading English singularity
    while preserving the gender-accurate sense of the Hebrew base term.
- source_word: מָחָר
  chosen: Tomorrow
  alternatives:
  - By tomorrow
  lexicon: HALOT
  rationale: Straightforward temporal adverb introducing the promised timing of rescue.
- source_word: תִּהְיֶה לָכֶם תְּשׁוּעָה
  chosen: deliverance will be yours
  alternatives:
  - you will have salvation
  - there will be deliverance for you
  - you will have victory
  lexicon: HALOT
  rationale: תשועה here denotes rescue from military threat. 'Deliverance' communicates
    concrete rescue without importing later theological overtones that 'salvation'
    may carry in English, while still preserving the core sense.
- source_word: בְּחֹם הַשָּׁמֶשׁ
  chosen: by the heat of the sun
  alternatives:
  - when the sun is hot
  - by midday
  - in the heat of the day
  lexicon: HALOT
  rationale: The phrase literally refers to the sun's heat, likely indicating the
    hottest part of the day. 'By the heat of the sun' keeps the imagery and temporal
    force. A more interpretive rendering like 'by midday' is possible but less textually
    transparent.
- source_word: וַיַּגִּידוּ
  chosen: told
  alternatives:
  - reported
  - announced
  lexicon: HALOT
  rationale: A standard narrative verb for making the message known. 'Told' is idiomatic
    and sufficient in context.
- source_word: לְאַנְשֵׁי יָבֵישׁ
  chosen: the men of Jabesh
  alternatives:
  - the people of Jabesh
  - the inhabitants of Jabesh
  lexicon: HALOT
  rationale: אנשי is literally 'men of,' often idiomatically 'people of' or 'inhabitants
    of.' Here 'men of Jabesh' matches the Hebrew expression and the gender-accurate
    translation philosophy, while still being understandable in context.
- source_word: וַיִּשְׂמָחוּ
  chosen: they rejoiced
  alternatives:
  - they were glad
  - they celebrated
  lexicon: HALOT
  rationale: A common verb for joy or gladness. 'They rejoiced' preserves the narrative
    tone and emotional force.
