id: 1SA.17.1
reference: 1 Samuel 17:1
source:
  edition: WLC
  text: וַ/יַּאַסְפ֨וּ פְלִשְׁתִּ֤ים אֶת מַֽחֲנֵי/הֶם֙ לַ/מִּלְחָמָ֔ה וַ/יֵּאָ֣סְפ֔וּ
    שֹׂכֹ֖ה אֲשֶׁ֣ר לִ/יהוּדָ֑ה וַֽ/יַּחֲנ֛וּ בֵּין שׂוֹכֹ֥ה וּ/בֵין עֲזֵקָ֖ה בְּ/אֶ֥פֶס
    דַּמִּֽים־־־׃
translation:
  text: Now the Philistines gathered their camps for battle, and they assembled at
    Socoh, which belongs to Judah, and camped between Socoh and Azekah, at Ephes-dammim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their forces' for 'their camps'; the Hebrew term can refer to military
      camps or armies.
    reason: lexical_alternative
  - marker: b
    text: Socoh was a town in the territory of Judah.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּאַסְפוּ
  chosen: gathered
  alternatives:
  - assembled
  - mustered
  lexicon: HALOT
  rationale: אָסַף in the waw-consecutive narrative form commonly means 'gather' or
    'assemble.' 'Gathered' is natural English and fits the object 'their camps/forces'
    without overinterpreting military nuance.
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration for the people group; the article is supplied
    in English for idiomatic reference to the known national group.
- source_word: מַחֲנֵיהֶם
  chosen: their camps
  alternatives:
  - their forces
  - their encampments
  lexicon: HALOT
  rationale: מַחֲנֶה can denote a camp or an army/encampment. Here the plural with
    'for battle' points to military encampments/forces. 'Camps' stays closer to the
    Hebrew while still making sense in context.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  lexicon: HALOT
  rationale: מִלְחָמָה is 'war/battle.' In this immediate scene of troop movement,
    'for battle' is more idiomatic and specific than the broader 'for war.'
- source_word: וַיֵּאָסְפוּ
  chosen: they assembled
  alternatives:
  - they gathered
  lexicon: HALOT
  rationale: The second use of אסף is rendered with slight English variation to avoid
    awkward repetition while preserving the same core sense. The shift also reflects
    the change from gathering forces to assembling at a location.
- source_word: שֹׂכֹה
  chosen: Socoh
  alternatives:
  - Sokhoh
  - Sochoh
  lexicon: HALOT
  rationale: A standard English transliteration of the place name. The same spelling
    is maintained consistently within the verse.
- source_word: אֲשֶׁר לִיהוּדָה
  chosen: which belongs to Judah
  alternatives:
  - which is in Judah
  - which was Judah's
  lexicon: HALOT
  rationale: The lamed construction indicates association or belonging. 'Belongs to
    Judah' preserves the territorial affiliation clearly; 'in Judah' is possible but
    slightly less explicit.
- source_word: וַיַּחֲנוּ
  chosen: camped
  alternatives:
  - encamped
  lexicon: HALOT
  rationale: חנה means to camp/encamp. 'Camped' is readable modern English and matches
    the translation philosophy better than the slightly more formal 'encamped.'
- source_word: בֵּין ... וּבֵין
  chosen: between ... and
  lexicon: HALOT
  rationale: Straightforward spatial expression best rendered by the standard English
    correlative 'between ... and.'
- source_word: עֲזֵקָה
  chosen: Azekah
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: בְּאֶפֶס דַּמִּים
  chosen: at Ephes-dammim
  alternatives:
  - in Ephes-dammim
  lexicon: HALOT
  rationale: This is best taken as a place name rather than translated lexically.
    'At' fits a campsite location in English better than 'in,' though either is possible.
