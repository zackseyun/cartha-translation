id: 1SA.17.50
reference: 1 Samuel 17:50
source:
  edition: WLC
  text: וַ/יֶּחֱזַ֨ק דָּוִ֤ד מִן הַ/פְּלִשְׁתִּי֙ בַּ/קֶּ֣לַע וּ/בָ/אֶ֔בֶן וַ/יַּ֥ךְ
    אֶת הַ/פְּלִשְׁתִּ֖י וַ/יְמִיתֵ֑/הוּ וְ/חֶ֖רֶב אֵ֥ין בְּ/יַד דָּוִֽד־־־׃
translation:
  text: So David prevailed over the Philistine with a sling and with a stone; he struck
    the Philistine and killed him, though there was no sword in David’s hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and there was no sword in David’s hand.' The Hebrew conjunction can
      be read more formally as simple 'and'; the main text uses 'though' to bring
      out the clause’s concessive sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחֱזַק
  chosen: prevailed over
  alternatives:
  - was stronger than
  - overcame
  lexicon: HALOT
  rationale: The verb חזק in this construction with מִן conveys prevailing or proving
    stronger than someone, not merely becoming strong. 'Prevailed over' is idiomatic
    English and fits the combat context.
- source_word: מִן הַפְּלִשְׁתִּי
  chosen: over the Philistine
  alternatives:
  - than the Philistine
  - against the Philistine
  lexicon: HALOT
  rationale: With חזק, מִן marks the opponent over whom David gains the advantage.
    English expresses this most naturally as 'over the Philistine.'
- source_word: בַּקֶּלַע
  chosen: with a sling
  alternatives:
  - by the sling
  lexicon: HALOT
  rationale: The preposition ב marks means/instrument here. 'With a sling' is the
    natural instrumental rendering.
- source_word: וּבָאֶבֶן
  chosen: and with a stone
  alternatives:
  - and by a stone
  lexicon: HALOT
  rationale: 'Again instrumental ב. The singular should be preserved: David used a
    single stone.'
- source_word: וַיַּךְ
  chosen: he struck
  alternatives:
  - he hit
  - he smote
  lexicon: HALOT
  rationale: נכה commonly means to strike/smite. 'He struck' is clear modern English
    and preserves the force without archaic diction.
- source_word: וַיְמִיתֵהוּ
  chosen: and killed him
  alternatives:
  - and put him to death
  lexicon: HALOT
  rationale: מות in the Hiphil means to cause to die/kill. 'Killed him' is the straightforward
    rendering.
- source_word: וְחֶרֶב אֵין בְּיַד דָּוִד
  chosen: though there was no sword in David’s hand
  alternatives:
  - and there was no sword in David's hand
  - but there was no sword in David's hand
  lexicon: HALOT
  rationale: The clause is circumstantial, highlighting the surprising means of victory.
    'Though there was no sword in David’s hand' communicates the concessive force
    naturally in English while preserving the literal image 'in David's hand.'
- source_word: בְּיַד דָּוִד
  chosen: in David’s hand
  alternatives:
  - in David's possession
  lexicon: HALOT
  rationale: '''Hand'' is retained rather than generalized to ''possession'' because
    the physical combat setting makes the literal expression vivid and natural in
    English.'
