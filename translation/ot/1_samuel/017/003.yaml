id: 1SA.17.3
reference: 1 Samuel 17:3
source:
  edition: WLC
  text: וּ/פְלִשְׁתִּ֞ים עֹמְדִ֤ים אֶל הָ/הָר֙ מִ/זֶּ֔ה וְ/יִשְׂרָאֵ֛ל עֹמְדִ֥ים אֶל
    הָ/הָ֖ר מִ/זֶּ֑ה וְ/הַ/גַּ֖יְא בֵּינֵי/הֶֽם־־׃
translation:
  text: Now the Philistines were standing on the mountain on one side, and Israel
    was standing on the mountain on the other side, with the valley between them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hill' instead of 'mountain' in both occurrences of הָהָר; Hebrew הַר
      can refer to either depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'ravine' for 'valley'; Hebrew גַּיְא can denote a valley with steep sides.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְלִשְׁתִּים
  chosen: Now the Philistines
  alternatives:
  - And the Philistines
  - The Philistines
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply as 'and,' but in narrative English
    'now' can naturally mark scene-setting without adding content. 'Philistines' is
    the standard transliteration of the people-group name.
- source_word: עֹמְדִים
  chosen: were standing
  alternatives:
  - stood
  - were stationed
  lexicon: HALOT
  rationale: The participle conveys a durative or descriptive posture in the scene,
    so 'were standing' best reflects the ongoing state. 'Were stationed' is possible
    contextually but is more interpretive than the basic verb.
- source_word: אֶל הָהָר מִזֶּה
  chosen: on the mountain on one side
  alternatives:
  - toward the mountain on this side
  - by the mountain on this side
  - on the hill on this side
  lexicon: HALOT
  rationale: Although אֶל often means 'to/toward,' with עמד in spatial descriptions
    it can indicate position relative to a place. 'On the mountain' fits the military
    topography. הָר can be 'mountain' or 'hill'; 'mountain' is retained as the more
    direct gloss, while 'on one side' idiomatically renders מִזֶּה in contrast with
    the following phrase.
- source_word: וְיִשְׂרָאֵל
  chosen: and Israel
  alternatives:
  - and the Israelites
  lexicon: HALOT
  rationale: The Hebrew names the collective entity 'Israel.' In English, 'Israel'
    can naturally denote the army/people as a corporate body. 'The Israelites' is
    a valid alternative but slightly less formally aligned with the source wording.
- source_word: עֹמְדִים
  chosen: was standing
  alternatives:
  - stood
  - were standing
  lexicon: HALOT
  rationale: Although morphologically plural, the subject 'Israel' is a collective
    singular in English, so 'was standing' is the most natural agreement while preserving
    the same durative sense as the first clause.
- source_word: אֶל הָהָר מִזֶּה
  chosen: on the mountain on the other side
  alternatives:
  - toward the mountain on that side
  - by the mountain on that side
  - on the hill on the other side
  lexicon: HALOT
  rationale: The repeated phrase is rendered in parallel with the first occurrence.
    'The other side' captures the contrastive force in idiomatic English.
- source_word: וְהַגַּיְא
  chosen: with the valley
  alternatives:
  - and the valley
  - with the ravine
  lexicon: HALOT
  rationale: גַּיְא denotes a valley or ravine. 'Valley' is the more accessible and
    likely sense in this battle description. 'With' smooths the final clause into
    natural English while preserving the conjunction's connective force.
- source_word: בֵּינֵיהֶם
  chosen: between them
  alternatives:
  - between the two of them
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase indicating the
    valley's location between the two forces.
