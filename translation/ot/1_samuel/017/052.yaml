id: 1SA.17.52
reference: 1 Samuel 17:52
source:
  edition: WLC
  text: וַ/יָּקֻ֣מוּ אַנְשֵׁי֩ יִשְׂרָאֵ֨ל וִ/יהוּדָ֜ה וַ/יָּרִ֗עוּ וַֽ/יִּרְדְּפוּ֙
    אֶת הַ/פְּלִשְׁתִּ֔ים עַד בּוֹאֲ/ךָ֣ גַ֔יְא וְ/עַ֖ד שַׁעֲרֵ֣י עֶקְר֑וֹן וַֽ/יִּפְּל֞וּ
    חַֽלְלֵ֤י פְלִשְׁתִּים֙ בְּ/דֶ֣רֶךְ שַׁעֲרַ֔יִם וְ/עַד גַּ֖ת וְ/עַד עֶקְרֽוֹן־־־־׃
translation:
  text: Then the men of Israel and Judah rose up and shouted, and they pursued the
    Philistines as far as the entrance to the valley and as far as the gates of Ekron.
    The slain Philistines fell along the road to Shaaraim, as far as Gath and as far
    as Ekron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'as far as the entrance to the valley.' The phrase is textually and
      syntactically difficult; some understand it as a place name or render it more
      literally but less clearly.
    reason: textual_variant
  - marker: b
    text: Or 'raised a war cry.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  chosen: rose up
  alternatives:
  - got up
  - arose
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום in narrative sequence; 'rose up' preserves the sudden
    mobilization after Goliath's fall without sounding overly archaic.
- source_word: אַנְשֵׁי יִשְׂרָאֵל וִיהוּדָה
  chosen: the men of Israel and Judah
  alternatives:
  - the men of Israel and of Judah
  - the Israelites and the men of Judah
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' This is gender-accurate and reflects
    the military context; the construct phrase governs both Israel and Judah.
- source_word: וַיָּרִיעוּ
  chosen: shouted
  alternatives:
  - raised a war cry
  - gave a shout
  lexicon: HALOT
  rationale: The verb רוע here denotes a loud battle shout. 'Shouted' is natural modern
    English; the martial nuance is supplied by context.
- source_word: וַיִּרְדְּפוּ
  chosen: they pursued
  alternatives:
  - chased
  - pressed after
  lexicon: HALOT
  rationale: רדף commonly means 'pursue' in military contexts. This is the most standard
    and precise rendering.
- source_word: עַד בּוֹאֲךָ גַיְא
  chosen: as far as the entrance to the valley
  alternatives:
  - as far as your coming to the valley
  - as far as Gai
  - as far as the valley entrance
  lexicon: HALOT
  rationale: The ketiv-like form בּוֹאֲךָ is difficult. In context it is best taken
    idiomatically as 'the entrance/approach to the valley,' a common sense reflected
    in many translations. Rendering it woodenly as 'your coming' is unintelligible
    in English and likely does not reflect the intended sense.
- source_word: וְעַד שַׁעֲרֵי עֶקְרוֹן
  chosen: and as far as the gates of Ekron
  alternatives:
  - even to the gates of Ekron
  lexicon: HALOT
  rationale: Straightforward spatial limit; 'gates' is literal and fits an urban destination.
- source_word: וַיִּפְּלוּ חַלְלֵי פְלִשְׁתִּים
  chosen: The slain Philistines fell
  alternatives:
  - the Philistine wounded fell
  - the corpses of the Philistines fell
  - Philistine casualties fell
  lexicon: HALOT
  rationale: חַלְלֵי denotes those pierced/slain, not merely wounded. Fronting it
    as 'The slain Philistines' yields clear English while preserving the sense of
    battlefield dead.
- source_word: בְּדֶרֶךְ שַׁעֲרַיִם
  chosen: along the road to Shaaraim
  alternatives:
  - on the way to Shaaraim
  - by the road of Shaaraim
  lexicon: HALOT
  rationale: בדרך plus place name naturally means the route leading toward that place.
    'Along the road to Shaaraim' is idiomatic and geographically clear.
- source_word: שַׁעֲרַיִם
  chosen: Shaaraim
  lexicon: HALOT
  rationale: Place name; per philosophy, names are transliterated rather than translated.
- source_word: וְעַד גַּת וְעַד עֶקְרוֹן
  chosen: as far as Gath and as far as Ekron
  alternatives:
  - to Gath and to Ekron
  lexicon: HALOT
  rationale: The repeated עַד is preserved for emphasis on the extent of the Philistine
    losses across the route.
