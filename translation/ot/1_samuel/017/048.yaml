id: 1SA.17.48
reference: 1 Samuel 17:48
source:
  edition: WLC
  text: וְ/הָיָה֙ כִּֽי קָ֣ם הַ/פְּלִשְׁתִּ֔י וַ/יֵּ֥לֶךְ וַ/יִּקְרַ֖ב לִ/קְרַ֣את
    דָּוִ֑ד וַ/יְמַהֵ֣ר דָּוִ֔ד וַ/יָּ֥רָץ הַ/מַּעֲרָכָ֖ה לִ/קְרַ֥את הַ/פְּלִשְׁתִּֽי־׃
translation:
  text: And when the Philistine rose and came and drew near to meet David, David hurried
    and ran toward the battle line to meet the Philistine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "toward the ranks." The Hebrew noun can refer to a battle line or battle
      array.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  chosen: And when
  alternatives:
  - Now it happened that
  - And it happened when
  lexicon: HALOT
  rationale: This narrative formula introduces the next event. 'And when' preserves
    the temporal force naturally in English without the wooden 'and it happened.'
- source_word: קָם
  chosen: rose
  alternatives:
  - arose
  - stood up
  lexicon: HALOT
  rationale: The verb denotes getting up or rising. 'Rose' is concise, idiomatic,
    and fits the narrative movement.
- source_word: הַפְּלִשְׁתִּי
  chosen: the Philistine
  alternatives:
  - the Philistine champion
  lexicon: HALOT
  rationale: The text simply says 'the Philistine.' 'Champion' would import context
    from surrounding verses rather than translate this verse directly.
- source_word: וַיֵּלֶךְ
  chosen: came
  alternatives:
  - went
  - advanced
  lexicon: HALOT
  rationale: Although the basic sense is 'went,' in English narrative with the following
    'drew near to meet David,' 'came' better reflects motion toward David from the
    narrator's perspective.
- source_word: וַיִּקְרַב
  chosen: drew near
  alternatives:
  - approached
  - came near
  lexicon: HALOT
  rationale: '''Drew near'' preserves the concrete movement and pairs well with the
    following infinitive ''to meet.'''
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - toward
  - against
  lexicon: HALOT
  rationale: The prepositional infinitive indicates movement in encounter with someone.
    'To meet' is the most direct rendering in both occurrences.
- source_word: וַיְמַהֵר
  chosen: hurried
  alternatives:
  - hastened
  - quickened his pace
  lexicon: HALOT
  rationale: The verb conveys acting quickly. 'Hurried' is modern, readable English
    without archaic tone.
- source_word: וַיָּרָץ
  chosen: ran
  alternatives:
  - rushed
  lexicon: HALOT
  rationale: The verb straightforwardly means 'ran.' 'Rushed' is possible but slightly
    more interpretive.
- source_word: הַמַּעֲרָכָה
  chosen: toward the battle line
  alternatives:
  - to the battle line
  - toward the ranks
  - to the array
  lexicon: HALOT
  rationale: The noun can denote battle line or battle array. Here David runs from
    his position toward the line of engagement to meet the Philistine. 'Toward the
    battle line' best captures the military setting and the directional sense in idiomatic
    English.
