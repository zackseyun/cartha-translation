id: 1SA.17.10
reference: 1 Samuel 17:10
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ הַ/פְּלִשְׁתִּ֔י אֲנִ֗י חֵרַ֛פְתִּי אֶת מַעַרְכ֥וֹת יִשְׂרָאֵ֖ל
    הַ/יּ֣וֹם הַ/זֶּ֑ה תְּנוּ לִ֣/י אִ֔ישׁ וְ/נִֽלָּחֲמָ֖ה יָֽחַד־־׃
translation:
  text: Then the Philistine said, “I have defied the ranks of Israel this day. Give
    me a man, and let us fight together.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the battle lines of Israel” or, by extension, “the armies of Israel.”
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb can also be rendered “taunted,” “reproached,” or “mocked”;
      “defied” best fits the military challenge in context.
    reason: lexical_alternative
  - marker: c
    text: Literally “this day”; many English versions render “today.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפְּלִשְׁתִּי
  chosen: the Philistine
  alternatives:
  - the Philistine champion
  lexicon: HALOT
  rationale: The noun with article identifies Goliath by ethnicity/national affiliation.
    'The Philistine' is the plain sense here; 'champion' is not present in this word
    and would import context from surrounding verses.
- source_word: חֵרַפְתִּי
  chosen: I have defied
  alternatives:
  - I have taunted
  - I have reproached
  - I have mocked
  lexicon: HALOT
  rationale: חרף in this military-challenge context conveys open scorn and insult
    directed at Israel's battle lines. 'Defied' best captures the hostile challenge
    in idiomatic English while preserving the affront implied by the Hebrew.
- source_word: מַעַרְכוֹת
  chosen: the ranks
  alternatives:
  - the battle lines
  - the armies
  lexicon: HALOT
  rationale: The plural refers to arranged battle formations/lines. 'Ranks' is concise
    and natural in English. 'Armies' is possible by metonymy, but the Hebrew more
    specifically evokes military array.
- source_word: הַיּוֹם הַזֶּה
  chosen: this day
  alternatives:
  - today
  lexicon: HALOT
  rationale: A relatively formal but still natural rendering that preserves the demonstrative
    emphasis of the Hebrew phrase. 'Today' is possible, but 'this day' better matches
    the rhetorical force of Goliath's declaration.
- source_word: תְּנוּ לִי אִישׁ
  chosen: Give me a man
  alternatives:
  - Send me a man
  - Provide me a man
  lexicon: HALOT
  rationale: נתן plus indirect object is literally 'give to me.' In context it is
    a challenge to produce a representative fighter. 'Give me a man' is direct and
    forceful, fitting the taunt.
- source_word: וְנִלָּחֲמָה
  chosen: and let us fight
  alternatives:
  - that we may fight
  - and we will fight
  lexicon: HALOT
  rationale: The cohortative expresses volition/invitation-challenge. 'Let us fight'
    captures the cohortative force better than a simple future.
- source_word: יָחַד
  chosen: together
  alternatives:
  - with each other
  lexicon: HALOT
  rationale: יחד marks mutual engagement. 'Together' is idiomatic after 'let us fight,'
    though the sense is specifically against one another in single combat.
