id: 1SA.17.17
reference: 1 Samuel 17:17
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יִשַׁ֜י לְ/דָוִ֣ד בְּנ֗/וֹ קַח נָ֤א לְ/אַחֶ֨י/ךָ֙ אֵיפַ֤ת הַ/קָּלִיא֙
    הַ/זֶּ֔ה וַ/עֲשָׂרָ֥ה לֶ֖חֶם הַ/זֶּ֑ה וְ/הָרֵ֥ץ הַֽ/מַּחֲנֶ֖ה לְ/אַחֶֽי/ךָ־׃
translation:
  text: And Jesse said to David his son, “Please take to your brothers this ephah
    of roasted grain and these ten loaves, and run to the camp to your brothers.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: An ephah was an ancient dry measure, roughly 22 liters (about 5.8 gallons).
    reason: cultural_note
  - marker: b
    text: Or “parched grain.”
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח נָא
  chosen: Please take
  alternatives:
  - Take, please
  - Now take
  lexicon: HALOT
  rationale: Imperative קַח with particle נָא softens the command and adds politeness/urgency.
    'Please take' conveys this naturally in modern English better than a wooden 'take,
    please.'
- source_word: לְאַחֶיךָ
  chosen: to your brothers
  alternatives:
  - for your brothers
  lexicon: HALOT
  rationale: The preposition ל here marks the indirect object/recipient. 'To your
    brothers' is the most straightforward rendering in context.
- source_word: אֵיפַת
  chosen: this ephah of
  alternatives:
  - about an ephah of
  - this measure of
  lexicon: HALOT
  rationale: אֵיפָה is a dry measure. Retaining 'ephah' preserves the concrete ancient
    unit and avoids flattening the text into an approximation.
- source_word: הַקָּלִיא
  chosen: roasted grain
  alternatives:
  - parched grain
  - toasted grain
  lexicon: HALOT
  rationale: The noun refers to grain prepared by roasting/parching. 'Roasted grain'
    is clear modern English; 'parched grain' is traditional but less transparent to
    contemporary readers.
- source_word: וַעֲשָׂרָה לֶחֶם
  chosen: and these ten loaves
  alternatives:
  - and ten breads
  - and ten loaves of bread
  lexicon: HALOT
  rationale: Though לֶחֶם can mean bread generally, with a numeral in this provisioning
    context 'loaves' is idiomatic and specific in English.
- source_word: וְהָרֵץ
  chosen: and run
  alternatives:
  - and hurry
  - and carry quickly
  lexicon: HALOT
  rationale: The Hiphil imperative from רוץ here functions as an urgent command to
    go quickly. 'Run' preserves the vividness of the Hebrew better than the more interpretive
    'hurry.'
- source_word: הַמַּחֲנֶה
  chosen: the camp
  alternatives:
  - the encampment
  lexicon: HALOT
  rationale: In military context מַחֲנֶה is naturally 'camp.' 'Encampment' is possible
    but less readable and not necessary.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - his own son
  lexicon: HALOT
  rationale: The appositional phrase identifies David in relation to Jesse. 'His son'
    is sufficient and natural.
