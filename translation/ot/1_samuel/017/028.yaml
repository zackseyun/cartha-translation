id: 1SA.17.28
reference: 1 Samuel 17:28
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֤ע אֱלִיאָב֙ אָחִ֣י/ו הַ/גָּד֔וֹל בְּ/דַבְּר֖/וֹ אֶל הָ/אֲנָשִׁ֑ים
    וַ/יִּֽחַר אַף֩ אֱלִיאָ֨ב בְּ/דָוִ֜ד וַ/יֹּ֣אמֶר לָ/מָּה זֶּ֣ה יָרַ֗דְתָּ וְ/עַל
    מִ֨י נָטַ֜שְׁתָּ מְעַ֨ט הַ/צֹּ֤אן הָ/הֵ֨נָּה֙ בַּ/מִּדְבָּ֔ר אֲנִ֧י יָדַ֣עְתִּי
    אֶת זְדֹנְ/ךָ֗ וְ/אֵת֙ רֹ֣עַ לְבָבֶ֔/ךָ כִּ֗י לְמַ֛עַן רְא֥וֹת הַ/מִּלְחָמָ֖ה
    יָרָֽדְתָּ־־׀־־־׃
translation:
  text: Now Eliab his oldest brother heard him speaking to the men, and Eliab’s anger
    burned against David, and he said, “Why have you come down here? And with whom
    have you left those few sheep in the wilderness? I know your presumption and the
    evil of your heart, for you have come down to see the battle.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your pride' / 'your insolence' for 'your presumption.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the wickedness of your heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/דַבְּר֖/וֹ
  chosen: him speaking
  alternatives:
  - as he spoke
  - when he spoke
  lexicon: HALOT
  rationale: 'Infinitive construct with prefixed ב plus 3ms suffix gives a temporal/circumstantial
    sense: Eliab heard David in the act of speaking. ''Him speaking'' is natural English
    and preserves the ongoing action.'
- source_word: הָ/אֲנָשִׁ֑ים
  chosen: the men
  alternatives:
  - the soldiers
  - the people
  lexicon: HALOT
  rationale: The noun normally means 'men.' In context these are the men present in
    the camp, but the Hebrew does not specify 'soldiers,' so 'the men' is retained.
- source_word: וַ/יִּֽחַר אַף
  chosen: anger burned
  alternatives:
  - became angry
  - his anger flared
  lexicon: HALOT
  rationale: This idiom literally refers to anger burning. 'Anger burned' preserves
    the vivid Hebrew image while remaining readable in English.
- source_word: לָ/מָּה זֶּה יָרַ֗דְתָּ
  chosen: Why have you come down here?
  alternatives:
  - Why did you come down?
  - Why have you come down?
  lexicon: HALOT
  rationale: ירד means 'go/come down.' Since David has arrived at Eliab's location,
    English deictic usage favors 'come down.' 'Here' makes explicit the demonstrative
    force of זֶּה in idiomatic English.
- source_word: וְ/עַל מִ֨י נָטַ֜שְׁתָּ
  chosen: with whom have you left
  alternatives:
  - upon whom have you abandoned
  - to whom have you entrusted
  lexicon: HALOT
  rationale: נטשׁ often means 'leave, abandon, forsake.' In this rebuke Eliab accuses
    David of leaving the flock in someone else's care; 'with whom have you left' captures
    the practical sense without overstating total abandonment.
- source_word: מְעַ֨ט הַ/צֹּ֤אן
  chosen: those few sheep
  alternatives:
  - the little flock
  - that small number of sheep
  lexicon: HALOT
  rationale: מְעַט denotes smallness/fewness. 'Those few sheep' reflects Eliab's dismissive
    tone better than a neutral 'little flock.'
- source_word: הָ/הֵ֨נָּה֙
  chosen: those
  alternatives:
  - these
  - there
  lexicon: HALOT
  rationale: The feminine plural demonstrative points to the sheep. In English, 'those'
    works naturally with the preceding noun phrase.
- source_word: בַּ/מִּדְבָּ֔ר
  chosen: in the wilderness
  alternatives:
  - in the pastureland
  - in the open country
  lexicon: HALOT
  rationale: מִדְבָּר commonly means 'wilderness' or uncultivated grazing land. 'Wilderness'
    is the standard rendering and fits the shepherding setting.
- source_word: זְדֹנְ/ךָ֗
  chosen: your presumption
  alternatives:
  - your pride
  - your insolence
  - your arrogance
  lexicon: HALOT
  rationale: זָדוֹן conveys presumptuousness, arrogance, or insolence. 'Presumption'
    best captures the sense of overbold self-assertion in Eliab's accusation.
- source_word: רֹ֣עַ לְבָבֶ֔/ךָ
  chosen: the evil of your heart
  alternatives:
  - the wickedness of your heart
  - your bad heart
  - the malice of your heart
  lexicon: HALOT
  rationale: The phrase denotes moral badness located in the inner person. 'The evil
    of your heart' is both literal enough and idiomatic.
- source_word: לְמַ֛עַן רְא֥וֹת
  chosen: to see
  alternatives:
  - for the purpose of seeing
  - just to watch
  lexicon: HALOT
  rationale: The construction expresses purpose. 'To see' is concise and natural;
    adding 'just' would overinterpret Eliab's scorn, which is already conveyed by
    context.
- source_word: הַ/מִּלְחָמָ֖ה
  chosen: the battle
  alternatives:
  - the fighting
  - the war
  lexicon: HALOT
  rationale: In this immediate scene, the singular refers to the present military
    confrontation. 'Battle' is more specific and contextually apt than 'war'.
