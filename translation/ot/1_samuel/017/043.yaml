theological_decisions:
- issue: Rendering of אֱלֹהִים with 3ms suffix in a Philistine context
  chosen_reading: his gods
  alternative_readings:
  - his god
  rationale: Although אֱלֹהִים can sometimes function as a singular, in this non-Israelite
    context the plural sense is most natural and reflects Philistine polytheism. This
    avoids importing monotheistic assumptions into the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
