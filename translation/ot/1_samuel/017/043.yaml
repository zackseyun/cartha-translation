id: 1SA.17.43
reference: 1 Samuel 17:43
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הַ/פְּלִשְׁתִּי֙ אֶל דָּוִ֔ד הֲ/כֶ֣לֶב אָנֹ֔כִי כִּֽי אַתָּ֥ה
    בָֽא אֵלַ֖/י בַּ/מַּקְל֑וֹת וַ/יְקַלֵּ֧ל הַ/פְּלִשְׁתִּ֛י אֶת דָּוִ֖ד בֵּ/אלֹהָֽי/ו־־־־׃
translation:
  text: And the Philistine said to David, “Am I a dog, that you come to me with sticks?”
    And the Philistine cursed David by his gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “with staffs.” The Hebrew word can refer to rods, staffs, or sticks;
      here it conveys the Philistine’s contempt.
    reason: lexical_alternative
  - marker: b
    text: Or, “in the name of his gods.”
    reason: alternative_reading
lexical_decisions:
- source_word: הַפְּלִשְׁתִּי
  chosen: the Philistine
  alternatives:
  - the Philistine warrior
  lexicon: HALOT
  rationale: The noun denotes the ethnic identity of Goliath. 'The Philistine' is
    the plain and conventional rendering and fits the narrative style without adding
    interpretive material such as 'warrior.'
- source_word: הֲכֶלֶב אָנֹכִי
  chosen: Am I a dog
  alternatives:
  - Am I some dog
  lexicon: HALOT
  rationale: A rhetorical question expressing insult and indignation. 'Dog' should
    be retained literally rather than paraphrased, since the image is culturally and
    narratively important.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content/grounds of the rhetorical question:
    ''that you come to me...'' English ''that'' is the most natural connector in this
    construction.'
- source_word: בָא אֵלַי
  chosen: you come to me
  alternatives:
  - you are coming to me
  lexicon: HALOT
  rationale: The participle with pronoun conveys present action. Simple present in
    English is idiomatic in direct speech and preserves the immediacy.
- source_word: בַּמַּקְלוֹת
  chosen: with sticks
  alternatives:
  - with clubs
  - with staffs
  lexicon: HALOT
  rationale: The plural of מַקֵּל refers to rods/staves. Since David carries a staff
    and likely sling equipment, the Philistine speaks contemptuously and exaggerates.
    'Sticks' best captures the scornful tone in natural English; 'clubs' overstates
    weaponry and 'staffs' sounds too formal.
- source_word: וַיְקַלֵּל
  chosen: cursed
  alternatives:
  - reviled
  lexicon: HALOT
  rationale: The verb קלל in this context means to invoke a curse, not merely to insult.
    'Cursed' preserves the stronger religious sense.
- source_word: בֵּאלֹהָיו
  chosen: by his gods
  alternatives:
  - in the name of his gods
  - with his gods
  lexicon: HALOT
  rationale: 'The beth preposition here is instrumental or associative: the Philistine
    invokes his gods in cursing David. ''By his gods'' is concise and idiomatic, while
    preserving the polytheistic reference in the Hebrew plural.'
