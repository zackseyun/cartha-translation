id: 1SA.17.21
reference: 1 Samuel 17:21
source:
  edition: WLC
  text: וַ/תַּעֲרֹ֤ךְ יִשְׂרָאֵל֙ וּ/פְלִשְׁתִּ֔ים מַעֲרָכָ֖ה לִ/קְרַ֥את מַעֲרָכָֽה׃
translation:
  text: And Israel and the Philistines drew up battle line against battle line.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'array against array' or 'battle array facing battle array.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעֲרֹךְ
  chosen: drew up
  alternatives:
  - arrayed themselves
  - set in order
  lexicon: HALOT
  rationale: From ערך in military context, referring to arranging troops for battle.
    'Drew up' is natural modern English for forming ranks, preserving the military
    sense without archaic wording.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper national name; transliterated per translation philosophy.
- source_word: וּפְלִשְׁתִּים
  chosen: and the Philistines
  rationale: Ethnic/national group name; standard English rendering.
- source_word: מַעֲרָכָה
  chosen: battle line
  alternatives:
  - battle array
  - formation
  lexicon: HALOT
  rationale: In this context the noun denotes an arranged military line or array.
    'Battle line' is clear, contemporary, and fits the repeated construction.
- source_word: לִקְרַאת
  chosen: against
  alternatives:
  - to meet
  - facing
  lexicon: HALOT
  rationale: Literally 'to meet/toward meeting,' but in military context with repeated
    מַעֲרָכָה it expresses opposing lines facing one another. 'Against' captures the
    adversarial force idiomatically.
- source_word: מַעֲרָכָה
  chosen: battle line
  alternatives:
  - battle array
  - formation
  lexicon: HALOT
  rationale: Repeated for emphasis in the idiom 'battle line against battle line';
    keeping the same English gloss preserves the Hebrew repetition and military imagery.
