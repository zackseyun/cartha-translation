id: 1SA.17.26
reference: 1 Samuel 17:26
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר דָּוִ֗ד אֶֽל הָ/אֲנָשִׁ֞ים הָ/עֹמְדִ֣ים עִמּ/וֹ֮ לֵ/אמֹר֒ מַה
    יֵּעָשֶׂ֗ה לָ/אִישׁ֙ אֲשֶׁ֤ר יַכֶּה֙ אֶת הַ/פְּלִשְׁתִּ֣י הַלָּ֔ז וְ/הֵסִ֥יר חֶרְפָּ֖ה
    מֵ/עַ֣ל יִשְׂרָאֵ֑ל כִּ֣י מִ֗י הַ/פְּלִשְׁתִּ֤י הֶֽ/עָרֵל֙ הַ/זֶּ֔ה כִּ֣י חֵרֵ֔ף
    מַעַרְכ֖וֹת אֱלֹהִ֥ים חַיִּֽים־־־׃
translation:
  text: And David said to the men standing with him, “What will be done for the man
    who strikes down this Philistine and removes disgrace from Israel? For who is
    this uncircumcised Philistine, this one who has defied the battle lines of the
    living God?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “takes away reproach from Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “the ranks” or “the armies of the living God.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֹמְדִים עִמּוֹ
  chosen: standing with him
  alternatives:
  - who were standing with him
  - standing by him
  lexicon: HALOT
  rationale: The participial phrase is best carried straightforwardly in English as
    a descriptive clause modifying 'the men.' 'With him' is the plain sense of עִם
    + suffix.
- source_word: מַה יֵּעָשֶׂה לָאִישׁ
  chosen: What will be done for the man
  alternatives:
  - What shall be done for the man
  - What will be given to the man
  lexicon: HALOT
  rationale: The Niphal of עשה here is an idiom for what will be done on someone's
    behalf, likely implying reward, but the Hebrew does not explicitly say 'given,'
    so the more literal wording is retained.
- source_word: יַכֶּה
  chosen: strikes down
  alternatives:
  - kills
  - defeats
  lexicon: HALOT
  rationale: נכה commonly means strike/smite and in battle contexts can imply killing.
    'Strikes down' preserves the martial force without over-specifying beyond the
    verb itself.
- source_word: הַפְּלִשְׁתִּי הַלָּז
  chosen: this Philistine
  alternatives:
  - that Philistine
  - this Philistine here
  lexicon: HALOT
  rationale: הַלָּז is a demonstrative with a somewhat vivid or slightly dismissive
    force. 'This Philistine' is natural English and preserves the deictic sense without
    awkwardness.
- source_word: וְהֵסִיר חֶרְפָּה מֵעַל יִשְׂרָאֵל
  chosen: and removes disgrace from Israel
  alternatives:
  - and takes away reproach from Israel
  - and removes the taunt from Israel
  lexicon: HALOT
  rationale: חרפה denotes reproach, disgrace, or public shame. 'Disgrace' communicates
    the communal dishonor clearly in modern English. 'From Israel' reflects מֵעַל
    idiomatically.
- source_word: הֶעָרֵל
  chosen: uncircumcised
  alternatives:
  - foreskinned
  lexicon: HALOT
  rationale: The adjective is a covenantal insult marking the Philistine as outside
    Israel's covenant sign. 'Uncircumcised' is the established and accurate rendering.
- source_word: כִּי מִי ... הַזֶּה
  chosen: For who is this uncircumcised Philistine, this one
  alternatives:
  - For who is this uncircumcised Philistine
  - Indeed, who is this uncircumcised Philistine
  lexicon: HALOT
  rationale: The first כִּי is taken as explanatory ('for'), grounding David's question.
    Repeating the demonstrative force with 'this one' helps reflect the emphatic הַזֶּה
    before the following clause.
- source_word: חֵרֵף
  chosen: has defied
  alternatives:
  - has taunted
  - has reproached
  lexicon: HALOT
  rationale: The verb חרף can mean reproach, taunt, or defy. In this military-theological
    context, 'has defied' best captures the hostile challenge against God and Israel.
- source_word: מַעַרְכוֹת
  chosen: the battle lines
  alternatives:
  - the armies
  - the ranks
  lexicon: HALOT
  rationale: The noun refers to battle formations or arranged ranks. 'Battle lines'
    is more precise than 'armies' and fits the immediate military scene.
- source_word: אֱלֹהִים חַיִּים
  chosen: the living God
  alternatives:
  - the living gods
  - God who lives
  lexicon: HALOT
  rationale: Though אֱלֹהִים is morphologically plural, with the adjective and context
    it refers to Israel's singular God. 'The living God' is the standard singular
    sense and preserves the theological contrast with idols.
