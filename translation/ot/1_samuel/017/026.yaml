theological_decisions:
- issue: Covenantal force of 'uncircumcised'
  chosen_reading: Retained the literal term 'uncircumcised' rather than softening
    it to a generic insult.
  alternative_readings:
  - godless Philistine
  - pagan Philistine
  rationale: David's language is not merely abusive; it invokes covenant identity
    and the outsider status of Goliath relative to Israel's God. Preserving the literal
    term maintains that theological dimension.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering אֱלֹהִים חַיִּים as singular
  chosen_reading: the living God
  alternative_readings:
  - the living gods
  rationale: The phrase is a conventional singular designation for Israel's God. Rendering
    it as plural would misrepresent the Hebrew idiom and theology of the passage.
  doctrine_reference: Affirmations; Translation philosophy §1
