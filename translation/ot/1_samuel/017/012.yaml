id: 1SA.17.12
reference: 1 Samuel 17:12
source:
  edition: WLC
  text: וְ/דָוִד֩ בֶּן אִ֨ישׁ אֶפְרָתִ֜י הַ/זֶּ֗ה מִ/בֵּ֥ית לֶ֨חֶם֙ יְהוּדָ֔ה וּ/שְׁמ֣/וֹ
    יִשַׁ֔י וְ/ל֖/וֹ שְׁמֹנָ֣ה בָנִ֑ים וְ/הָ/אִישׁ֙ בִּ/ימֵ֣י שָׁא֔וּל זָקֵ֖ן בָּ֥א
    בַ/אֲנָשִֽׁים־׃
translation:
  text: Now David was the son of an Ephrathite from Bethlehem of Judah, whose name
    was Jesse, and he had eight sons. In the days of Saul, the man was old, advanced
    among men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more idiomatically, ''the man was old, advanced in years.'' The Hebrew
      expression is unusual: literally, ''old, come among men.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפְרָתִי
  chosen: Ephrathite
  alternatives:
  - Ephraimite
  - man of Ephrathah
  lexicon: HALOT
  rationale: In this context, connected with Bethlehem of Judah, the term refers to
    an inhabitant of Ephrathah/Bethlehem rather than a member of the tribe of Ephraim.
    'Ephrathite' preserves the ethnic/geographic designation without over-paraphrasing.
- source_word: מִבֵּית לֶחֶם יְהוּדָה
  chosen: from Bethlehem of Judah
  alternatives:
  - from Bethlehem in Judah
  lexicon: HALOT
  rationale: A straightforward geographic expression. 'Of Judah' preserves the genitival
    relation and distinguishes this Bethlehem from other locations of the same name.
- source_word: וּשְׁמוֹ יִשַׁי
  chosen: whose name was Jesse
  alternatives:
  - and his name was Jesse
  lexicon: HALOT
  rationale: English smooths the Hebrew coordination naturally with a relative clause
    while preserving the identifying function.
- source_word: וְלוֹ שְׁמֹנָה בָנִים
  chosen: and he had eight sons
  alternatives:
  - and to him were eight sons
  lexicon: HALOT
  rationale: Idiomatic English rendering of possession; no meaning is lost.
- source_word: בִּימֵי שָׁאוּל
  chosen: In the days of Saul
  alternatives:
  - During Saul's days
  - in Saul's time
  lexicon: HALOT
  rationale: This is the standard temporal idiom and is clear in modern English.
- source_word: זָקֵן
  chosen: was old
  alternatives:
  - was elderly
  - had become old
  lexicon: HALOT
  rationale: The verb denotes being old/aged. 'Was old' is the most direct and natural
    rendering.
- source_word: בָּא בָאֲנָשִׁים
  chosen: advanced among men
  alternatives:
  - advanced in years among men
  - entered among men
  - well along among men
  lexicon: HALOT
  rationale: This difficult idiom is commonly understood to mean advanced in age.
    The chosen rendering stays close to the Hebrew imagery ('come/advanced among men')
    while signaling age. Because the phrase is unusual and somewhat opaque, a clarifying
    alternative is preserved in a footnote.
- source_word: וְהָאִישׁ
  chosen: the man
  alternatives:
  - that man
  - he
  lexicon: HALOT
  rationale: The Hebrew repeats 'the man' referring to Jesse. Retaining it preserves
    the discourse texture, though English could have simplified to 'he'.
