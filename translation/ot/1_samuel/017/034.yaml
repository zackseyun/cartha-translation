id: 1SA.17.34
reference: 1 Samuel 17:34
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר דָּוִד֙ אֶל שָׁא֔וּל רֹעֶ֨ה הָיָ֧ה עַבְדְּ/ךָ֛ לְ/אָבִ֖י/ו בַּ/צֹּ֑אן
    וּ/בָ֤א הָֽ/אֲרִי֙ וְ/אֶת הַ/דּ֔וֹב וְ/נָשָׂ֥א שֶׂ֖ה מֵ/הָ/עֵֽדֶר־־׃
translation:
  text: David said to Saul, “Your servant was a shepherd for his father among the
    flock, and the lion or the bear would come and carry off a lamb from the flock.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more formally, ''the lion and the bear''; the Hebrew uses ''and,''
      but the sense is likely distributive: either predator would come.'
    reason: lexical_alternative
  - marker: b
    text: '''A lamb'' may also be rendered ''a sheep'' or ''one animal of the flock,''
      since the Hebrew term can be broader than a young lamb.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹעֶה
  chosen: a shepherd
  alternatives:
  - shepherding
  - one who tended sheep
  lexicon: HALOT
  rationale: The participle functions predicatively with הָיָה, describing David’s
    ongoing role. 'A shepherd' is natural English and preserves the occupational sense.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: In direct address to the king, this is a conventional humble self-reference.
    Although עבד can denote a slave, here 'your servant' best reflects courtly deference
    without importing bonded-status emphasis not foregrounded in the context.
- source_word: לְאָבִיו
  chosen: for his father
  alternatives:
  - to his father
  - belonging to his father
  lexicon: HALOT
  rationale: 'The ל marks relation/service: David served as shepherd for his father.
    ''For his father'' is the most idiomatic rendering in context.'
- source_word: בַּצֹּאן
  chosen: among the flock
  alternatives:
  - with the flock
  - over the flock
  lexicon: HALOT
  rationale: The phrase locates David in his shepherding work with the sheep. 'Among
    the flock' reads naturally and fits the pastoral setting.
- source_word: וּבָא
  chosen: would come
  alternatives:
  - came
  - comes
  lexicon: HALOT
  rationale: Following the past descriptive setup, the qatal here likely has habitual
    force in narrative recollection. 'Would come' conveys repeated past occurrence
    better than a simple preterite.
- source_word: הָאֲרִי
  chosen: the lion
  alternatives:
  - a lion
  lexicon: HALOT
  rationale: The Hebrew has the article. In English, 'the lion' can represent the
    class in a vivid narrative recollection; it also pairs well with 'the bear.'
- source_word: וְאֶת הַדּוֹב
  chosen: or the bear
  alternatives:
  - and the bear
  lexicon: HALOT
  rationale: 'Though the Hebrew conjunction is formally ''and,'' the sense in context
    is distributive: either predator might come. English idiom prefers ''the lion
    or the bear,'' especially since the singular verb ''would come'' governs the pair
    as alternatives.'
- source_word: וְנָשָׂא
  chosen: carry off
  alternatives:
  - take
  - snatch away
  - lift and carry
  lexicon: HALOT
  rationale: נשא here means taking away prey. 'Carry off' captures predatory seizure
    more vividly and idiomatically than the generic 'take'.
- source_word: שֶׂה
  chosen: a lamb
  alternatives:
  - a sheep
  - one of the sheep
  lexicon: HALOT
  rationale: שֶׂה can denote a member of the flock generally, whether sheep or goat,
    often a young one. In this pastoral-predation context, 'a lamb' is the most natural
    and traditional English rendering, though broader 'sheep' is possible.
- source_word: מֵהָעֵדֶר
  chosen: from the flock
  alternatives:
  - from the herd
  lexicon: HALOT
  rationale: For sheep, 'flock' is the appropriate English term; 'herd' would be less
    precise in this context.
