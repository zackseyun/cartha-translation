id: 1SA.17.36
reference: 1 Samuel 17:36
source:
  edition: WLC
  text: גַּ֧ם אֶֽת הָ/אֲרִ֛י גַּם הַ/דּ֖וֹב הִכָּ֣ה עַבְדֶּ֑/ךָ וְֽ֠/הָיָה הַ/פְּלִשְׁתִּ֨י
    הֶ/עָרֵ֤ל הַ/זֶּה֙ כְּ/אַחַ֣ד מֵ/הֶ֔ם כִּ֣י חֵרֵ֔ף מַעַרְכֹ֖ת אֱלֹהִ֥ים חַיִּֽים־־׃ס
translation:
  text: Your servant struck down both the lion and the bear, and this uncircumcised
    Philistine will be like one of them, because he has defied the battle lines of
    the living God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the armies of the living God.' The Hebrew term can mean 'battle lines,'
      'ranks,' or by extension 'armies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכָּה
  chosen: struck down
  alternatives:
  - killed
  - smote
  lexicon: HALOT
  rationale: The verb נכה commonly means to strike, smite, or strike down. In this
    context David refers to defeating lethal predators, so 'struck down' preserves
    the concrete force without overcommitting to a narrower gloss than the verb itself.
    'Killed' is possible by implication, but 'struck down' better reflects the Hebrew
    wording while remaining natural English.
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: In direct address to Saul, עבד commonly functions as a deferential self-reference,
    'your servant.' Although the underlying term can denote a slave/servant relationship,
    here the courtly idiom is primary rather than bonded-status emphasis.
- source_word: הָאֲרִי ... הַדּוֹב
  chosen: the lion ... the bear
  alternatives:
  - a lion ... a bear
  lexicon: HALOT
  rationale: Both nouns are articular in Hebrew. English idiom in this kind of generic-but-specific
    recollection naturally uses 'the lion and the bear,' referring to the representative
    predators David encountered.
- source_word: וְהָיָה
  chosen: will be
  alternatives:
  - shall become
  - will become
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction here functions predictively in context.
    'Will be' is idiomatic and concise in English, expressing David's confidence about
    the outcome.
- source_word: הֶעָרֵל
  chosen: uncircumcised
  alternatives:
  - foreskinned
  - outside the covenant
  lexicon: HALOT
  rationale: The adjective literally means 'uncircumcised.' Retaining the physical
    covenantal marker preserves the rhetorical and theological force of David's insult
    without paraphrasing it into an interpretation.
- source_word: כְּאַחַד מֵהֶם
  chosen: like one of them
  alternatives:
  - as one of them
  - like either of them
  lexicon: HALOT
  rationale: This phrase compares Goliath's fate to that of the lion and bear. 'Like
    one of them' is the most natural English rendering and preserves the singular
    distributive sense.
- source_word: חֵרֵף
  chosen: has defied
  alternatives:
  - has reproached
  - has taunted
  - has reviled
  lexicon: HALOT
  rationale: The verb חרף can denote reproaching, taunting, or defying. In this military-theological
    setting, 'has defied' best captures hostile contempt directed against God and
    his people.
- source_word: מַעַרְכֹת
  chosen: the battle lines
  alternatives:
  - the armies
  - the ranks
  lexicon: HALOT
  rationale: The noun מערכה refers to battle array, ranks, or battle lines. 'Battle
    lines' reflects the concrete military image and explains why the plural is used.
    'Armies' is traditional but less precise to the Hebrew term.
- source_word: אֱלֹהִים חַיִּים
  chosen: the living God
  alternatives:
  - God who lives
  - the God of life
  lexicon: HALOT
  rationale: This is a standard Hebrew expression emphasizing God's reality and vitality
    over against idols. Singular 'God' is required by sense despite the plural form
    אֱלֹהִים.
