theological_decisions:
- issue: Covenantal force of 'uncircumcised' in David's description of Goliath
  chosen_reading: Retain the literal term 'uncircumcised' in the main text
  alternative_readings:
  - outside the covenant
  - godless Philistine
  rationale: The Hebrew uses the physical covenant marker as a theological insult.
    A paraphrase would import interpretation and weaken the text's rhetoric. The literal
    rendering preserves the covenantal contrast without expanding it beyond the source.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
- issue: Meaning of מַעַרְכֹת in relation to God
  chosen_reading: Translate as 'battle lines' rather than 'armies'
  alternative_readings:
  - armies of the living God
  - ranks of the living God
  rationale: The phrase likely refers to Israel's battle formations as belonging to
    the living God. 'Battle lines' preserves the military image in the Hebrew noun
    and avoids smoothing it into a broader institutional term.
  doctrine_reference: 'Translation philosophy: optimal equivalence; consistency of
    key terms or documented exception.'
