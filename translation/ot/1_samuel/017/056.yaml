id: 1SA.17.56
reference: 1 Samuel 17:56
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר הַ/מֶּ֑לֶךְ שְׁאַ֣ל אַתָּ֔ה בֶּן מִי זֶ֖ה הָ/עָֽלֶם־־׃ס
translation:
  text: And the king said, “You, find out whose son this young man is.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “ask whose son this young man is.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' preserves
    the Hebrew narrative flow without overinterpreting discourse nuance.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun with article; straightforwardly refers to Saul in context,
    but the Hebrew uses the title rather than the personal name here.
- source_word: שְׁאַל
  chosen: find out
  alternatives:
  - ask
  - inquire
  lexicon: HALOT
  rationale: Imperative of שׁאל can mean 'ask' or 'inquire.' In English, because the
    object is an indirect question ('whose son this young man is'), 'find out' communicates
    the intended sense naturally while remaining faithful to the command to inquire.
- source_word: אַתָּה
  chosen: You
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: The independent pronoun is explicit in Hebrew and adds emphasis to the
    command. Rendering it as 'You' preserves that emphasis in natural English.
- source_word: בֶּן מִי
  chosen: whose son
  alternatives:
  - the son of whom
  - who the father of
  lexicon: HALOT
  rationale: This Hebrew idiom asks about paternal lineage. 'Whose son' is the most
    direct and idiomatic English equivalent.
- source_word: זֶה
  chosen: this
  alternatives:
  - that
  lexicon: HALOT
  rationale: Demonstrative masculine singular; 'this' best matches the deictic force
    in context, likely referring to David who is present or immediately in view.
- source_word: הָעָלֶם
  chosen: young man
  alternatives:
  - youth
  - lad
  lexicon: HALOT
  rationale: The noun denotes a young male. 'Young man' is clear modern English and
    avoids the slightly archaic tone of 'lad' while being more natural than 'youth'
    in direct speech.
