id: 1SA.17.53
reference: 1 Samuel 17:53
source:
  edition: WLC
  text: וַ/יָּשֻׁ֨בוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל מִ/דְּלֹ֖ק אַחֲרֵ֣י פְלִשְׁתִּ֑ים וַ/יָּשֹׁ֖סּוּ
    אֶת מַחֲנֵי/הֶֽם־׃
translation:
  text: The sons of Israel returned from pursuing the Philistines, and they plundered
    their camps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The Israelites returned from chasing after the Philistines, and they
      looted their camp(s).'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  chosen: returned
  alternatives:
  - came back
  - turned back
  lexicon: HALOT
  rationale: From שוב, the basic sense is 'return.' In narrative English, 'returned'
    is the most natural rendering and preserves the movement back from the pursuit.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: The sons of Israel
  alternatives:
  - The Israelites
  - The people of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Per the translation philosophy's gender-accurate
    principle, the masculine plural is preserved where it refers to the covenant people
    in a representative sense. 'The sons of Israel' is transparent to the Hebrew,
    though 'Israelites' is a viable idiomatic alternative.
- source_word: מִדְּלֹק אַחֲרֵי
  chosen: from pursuing
  alternatives:
  - from chasing after
  - from following hard after
  lexicon: HALOT
  rationale: The construction combines the infinitive of דלק ('pursue/chase closely')
    with אַחֲרֵי ('after'). 'From pursuing' gives smooth English after 'returned'
    while retaining the sense of active chase.
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration of the people-group name.
- source_word: וַיָּשֹׁסּוּ
  chosen: they plundered
  alternatives:
  - they spoiled
  - they looted
  lexicon: HALOT
  rationale: From שסס, meaning to plunder or despoil. 'Plundered' is clear modern
    English and fits military context better than the archaic 'spoiled.'
- source_word: מַחֲנֵיהֶם
  chosen: their camps
  alternatives:
  - their camp
  - their encampments
  lexicon: HALOT
  rationale: The plural construct with pronominal suffix naturally yields 'their camps.'
    In context this refers to the Philistine encampment(s) left vulnerable after the
    rout.
