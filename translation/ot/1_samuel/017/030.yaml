id: 1SA.17.30
reference: 1 Samuel 17:30
source:
  edition: WLC
  text: וַ/יִּסֹּ֤ב מֵֽ/אֶצְל/וֹ֙ אֶל מ֣וּל אַחֵ֔ר וַ/יֹּ֖אמֶר כַּ/דָּבָ֣ר הַ/זֶּ֑ה
    וַ/יְשִׁבֻ֤/הוּ הָ/עָם֙ דָּבָ֔ר כַּ/דָּבָ֖ר הָ/רִאשֽׁוֹן־׃
translation:
  text: Then he turned away from him toward another and said the same thing, and the
    people answered him as before.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the people answered him a word like the first word,' that is,
      they gave him the same answer as before.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסֹּב
  chosen: turned away
  alternatives:
  - turned
  - turned aside
  lexicon: HALOT
  rationale: The verb סבב here describes David physically turning from Eliab to someone
    else. 'Turned away' captures both the motion and the disengagement from the previous
    speaker.
- source_word: מֵאֶצְלוֹ
  chosen: from him
  alternatives:
  - from beside him
  - from his side
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'from beside him,' referring
    to Eliab. In natural English, 'from him' communicates the sense clearly without
    overloading the line.
- source_word: אֶל מוּל אַחֵר
  chosen: toward another
  alternatives:
  - to another
  - toward someone else
  lexicon: HALOT
  rationale: The phrase indicates turning to face another person. 'Toward another'
    preserves the directional nuance of מוּל while remaining idiomatic.
- source_word: וַיֹּאמֶר כַּדָּבָר הַזֶּה
  chosen: said the same thing
  alternatives:
  - spoke according to this word
  - said this same word
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'thing.' In context David repeats his
    earlier question, so 'said the same thing' is the most natural optimal-equivalence
    rendering.
- source_word: וַיְשִׁבֻהוּ
  chosen: answered him
  alternatives:
  - responded to him
  - returned him an answer
  lexicon: HALOT
  rationale: The Hiphil of שוב can mean 'answer' in the sense of returning a response.
    'Answered him' is the standard and clearest English equivalent here.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the men
  - the troops
  lexicon: HALOT
  rationale: The noun עם broadly means 'people.' In this military setting it refers
    to those present among the ranks, but 'the people' best matches the Hebrew without
    narrowing the reference beyond the text.
- source_word: דָּבָר כַּדָּבָר הָרִאשׁוֹן
  chosen: as before
  alternatives:
  - according to the first word
  - with the same answer as the first time
  lexicon: HALOT
  rationale: Literally, the phrase is 'word like the first word,' meaning the response
    matched the earlier one. 'As before' is concise and faithful to the sense.
