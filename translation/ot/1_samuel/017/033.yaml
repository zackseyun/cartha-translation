id: 1SA.17.33
reference: 1 Samuel 17:33
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר שָׁא֜וּל אֶל דָּוִ֗ד לֹ֤א תוּכַל֙ לָ/לֶ֨כֶת֙ אֶל הַ/פְּלִשְׁתִּ֣י
    הַ/זֶּ֔ה לְ/הִלָּחֵ֖ם עִמּ֑/וֹ כִּֽי נַ֣עַר אַ֔תָּה וְ/ה֛וּא אִ֥ישׁ מִלְחָמָ֖ה
    מִ/נְּעֻרָֽי/ו־־־׃ס
translation:
  text: Saul said to David, “You are not able to go against this Philistine to fight
    with him, because you are a young man, and he has been a man of war from his youth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You cannot go out against this Philistine to fight him.'
    reason: lexical_alternative
  - marker: b
    text: '''Young man'' translates Hebrew naʿar, which can also mean ''youth'' or,
      in some contexts, ''boy.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא תוּכַל
  chosen: You are not able
  alternatives:
  - You cannot
  - You are unable
  lexicon: HALOT
  rationale: The Hebrew expresses inability rather than mere prohibition. 'You are
    not able' preserves the semantic force of יכל while remaining natural enough in
    English; 'cannot' is possible but slightly less transparent to the underlying
    wording.
- source_word: לָלֶכֶת אֶל
  chosen: to go against
  alternatives:
  - to go to
  - to go out against
  lexicon: HALOT
  rationale: הלך with אֶל in this military context means more than simple movement
    toward; it implies advancing against an opponent. 'Go against' communicates the
    hostile/martial sense without overexpanding the text.
- source_word: הַפְּלִשְׁתִּי הַזֶּה
  chosen: this Philistine
  alternatives:
  - this Philistine man
  lexicon: HALOT
  rationale: The demonstrative plus ethnic designation is naturally rendered 'this
    Philistine.' Adding 'man' would be unnecessary in English.
- source_word: לְהִלָּחֵם עִמּוֹ
  chosen: to fight with him
  alternatives:
  - to fight him
  - to battle with him
  lexicon: HALOT
  rationale: The infinitive plus עִם is straightforwardly 'to fight with him' in the
    sense of engaging him in combat. This keeps the prepositional nuance visible,
    though idiomatic English could also say 'fight him.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces Saul's reason for David's inability. 'Because' is
    the clearest modern English connector.
- source_word: נַעַר
  chosen: a young man
  alternatives:
  - a youth
  - a boy
  lexicon: HALOT
  rationale: נַעַר can range from boy to young man depending on context. Since David
    is old enough to speak and volunteer for combat, 'young man' best fits the context
    without making him sound like a child; 'youth' is also possible but slightly less
    natural in contemporary English.
- source_word: אִישׁ מִלְחָמָה
  chosen: a man of war
  alternatives:
  - a warrior
  - a fighting man
  lexicon: HALOT
  rationale: The phrase is a stock martial expression. 'Man of war' preserves the
    Hebrew imagery and gravity better than the more interpretive 'warrior,' while
    remaining intelligible.
- source_word: מִנְּעֻרָיו
  chosen: from his youth
  alternatives:
  - since his youth
  - from his young age
  lexicon: HALOT
  rationale: The preposition מִן with the plural abstract noun conveys duration beginning
    in youth. 'From his youth' is the standard and accurate rendering; in English
    it implies longstanding experience.
