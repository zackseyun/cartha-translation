id: 1SA.17.44
reference: 1 Samuel 17:44
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר הַ/פְּלִשְׁתִּ֖י אֶל דָּוִ֑ד לְכָ֣/ה אֵלַ֔/י וְ/אֶתְּנָה֙ אֶת
    בְּשָׂ֣רְ/ךָ֔ לְ/ע֥וֹף הַ/שָּׁמַ֖יִם וּ/לְ/בֶהֱמַ֥ת הַ/שָּׂדֶֽה־־׃ס
translation:
  text: And the Philistine said to David, “Come to me, and I will give your flesh
    to the birds of the heavens and to the beasts of the field.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the birds of the sky.”
    reason: lexical_alternative
  - marker: b
    text: Or “the animals of the field.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפְּלִשְׁתִּי
  chosen: the Philistine
  alternatives:
  - the Philistine warrior
  lexicon: HALOT
  rationale: The noun with article refers specifically to Goliath as representative
    of his people. 'The Philistine' is the plain and conventional rendering and matches
    the Hebrew without adding 'warrior,' which is implied by context but not explicit
    here.
- source_word: לְכָה
  chosen: Come
  alternatives:
  - Come on
  - Approach
  lexicon: HALOT
  rationale: Imperative of הלך used idiomatically as an invitation/challenge. 'Come'
    is the most direct and natural English equivalent in this taunting speech.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - here to me
  lexicon: HALOT
  rationale: The preposition plus 1cs suffix is straightforwardly directional. 'To
    me' preserves the challenge's directness.
- source_word: וְאֶתְּנָה
  chosen: and I will give
  alternatives:
  - and let me give
  - that I may give
  lexicon: HALOT
  rationale: Here the cohortative-like form functions as a strong first-person resolve/future
    in direct speech. In English, 'and I will give' best captures the threat naturally.
- source_word: בְּשָׂרְךָ
  chosen: your flesh
  alternatives:
  - your body
  - your carcass
  lexicon: HALOT
  rationale: בשר literally means 'flesh.' 'Your flesh' preserves the vivid, brutal
    imagery of corpse desecration better than the more interpretive 'body' or 'carcass.'
- source_word: לְעוֹף הַשָּׁמַיִם
  chosen: to the birds of the heavens
  alternatives:
  - to the birds of the sky
  - to the birds of heaven
  lexicon: HALOT
  rationale: עוֹף denotes flying creatures/birds; in this context 'birds' is the natural
    English rendering. 'Of the heavens' closely reflects the Hebrew genitive הַשָּׁמַיִם
    and preserves the elevated biblical diction without becoming archaic.
- source_word: וּלְבֶהֱמַת הַשָּׂדֶה
  chosen: and to the beasts of the field
  alternatives:
  - and to the animals of the field
  - and to the wild beasts of the field
  lexicon: HALOT
  rationale: בְּהֵמָה can mean beast/animal; in this threat context 'beasts' better
    conveys scavenging animals. 'Of the field' is the standard rendering of the Hebrew
    phrase and echoes biblical idiom.
