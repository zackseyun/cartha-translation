id: 1SA.17.22
reference: 1 Samuel 17:22
source:
  edition: WLC
  text: וַ/יִּטֹּשׁ֩ דָּוִ֨ד אֶת הַ/כֵּלִ֜ים מֵ/עָלָ֗י/ו עַל יַד֙ שׁוֹמֵ֣ר הַ/כֵּלִ֔ים
    וַ/יָּ֖רָץ הַ/מַּעֲרָכָ֑ה וַ/יָּבֹ֕א וַ/יִּשְׁאַ֥ל לְ/אֶחָ֖י/ו לְ/שָׁלֽוֹם־־׃
translation:
  text: So David left the supplies with the keeper of the supplies, and ran to the
    battle line. When he arrived, he asked his brothers how they were.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the baggage' / 'the equipment' for 'the supplies' (Hebrew כֵּלִים),
      a broad term for articles or gear. Here it likely refers to the provisions David
      was carrying.
    reason: lexical_alternative
  - marker: b
    text: Or 'the ranks' for 'the battle line' (Hebrew מַעֲרָכָה), referring to the
      arranged line or formation of troops.
    reason: lexical_alternative
  - marker: c
    text: Literally 'asked his brothers for peace'; this Hebrew idiom means he inquired
      about their welfare or well-being.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּטֹּשׁ
  chosen: left
  alternatives:
  - abandoned
  - set down
  lexicon: HALOT
  rationale: The verb can mean leave, forsake, or abandon. In this narrative context
    David is not deserting the items but entrusting them temporarily, so 'left' is
    the most natural and accurate English rendering.
- source_word: הַכֵּלִים
  chosen: the supplies
  alternatives:
  - the baggage
  - the equipment
  - the things
  lexicon: HALOT
  rationale: כְּלִים is broad ('articles, vessels, gear, equipment'). In this context
    David has brought provisions from home and is arriving at the camp, so 'supplies'
    best fits the immediate narrative sense. A more military-sounding 'equipment'
    could mislead readers into thinking of weapons or armor.
- source_word: מֵעָלָיו
  chosen: '[implicit in English, not separately rendered]'
  alternatives:
  - from on him
  - that were on him
  lexicon: HALOT
  rationale: The Hebrew explicitly says David left the items 'from upon him,' indicating
    what he had been carrying. English normally absorbs this into 'left the supplies'
    without awkwardness. The sense is preserved though not translated word-for-word.
- source_word: עַל יַד שֹׁמֵר הַכֵּלִים
  chosen: with the keeper of the supplies
  alternatives:
  - in the care of the keeper of the baggage
  - into the hand of the keeper of the supplies
  lexicon: HALOT
  rationale: The idiom עַל יַד literally means 'at/by the hand of' and commonly conveys
    entrusting something to someone's care. 'With the keeper of the supplies' is idiomatic
    modern English while preserving the custodial sense.
- source_word: שֹׁמֵר
  chosen: keeper
  alternatives:
  - guard
  - caretaker
  lexicon: HALOT
  rationale: The participle denotes one who keeps/watches over something. 'Keeper'
    is concise and fits the camp-storage context better than 'guard,' which could
    imply armed defense.
- source_word: וַיָּרָץ
  chosen: ran
  alternatives:
  - hurried
  - rushed
  lexicon: HALOT
  rationale: The verb straightforwardly means 'ran.' The more literal rendering also
    preserves the urgency of David's action.
- source_word: הַמַּעֲרָכָה
  chosen: the battle line
  alternatives:
  - the ranks
  - the battle array
  - the camp line
  lexicon: HALOT
  rationale: In this chapter the term refers to the arranged battle formation/line
    of troops. 'Battle line' is clear modern English and avoids the somewhat archaic
    'ranks' while preserving the military setting.
- source_word: וַיָּבֹא
  chosen: When he arrived
  alternatives:
  - and he came
  - and he went in
  lexicon: HALOT
  rationale: 'The Hebrew narrative sequence can be rendered more naturally in English
    by subordinating this verb: ''When he arrived.'' This preserves the temporal flow
    without wooden repetition.'
- source_word: וַיִּשְׁאַל לְאֶחָיו לְשָׁלוֹם
  chosen: he asked his brothers how they were
  alternatives:
  - he asked his brothers about their welfare
  - he greeted his brothers
  - he asked his brothers for peace
  lexicon: HALOT
  rationale: The idiom שׁאל לְשָׁלוֹם means to inquire about someone's well-being,
    not merely to say hello or to ask for peace. 'Asked his brothers how they were'
    is natural modern English that accurately conveys the idiom.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his brothers and fellow kinsmen
  lexicon: HALOT
  rationale: The referent in context is David's literal brothers serving in Saul's
    army, so the straightforward familial term should be retained.
