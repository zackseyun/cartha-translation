id: 1SA.17.55
reference: 1 Samuel 17:55
source:
  edition: WLC
  text: וְ/כִ/רְא֨וֹת שָׁא֜וּל אֶת דָּוִ֗ד יֹצֵא֙ לִ/קְרַ֣את הַ/פְּלִשְׁתִּ֔י אָמַ֗ר
    אֶל אַבְנֵר֙ שַׂ֣ר הַ/צָּבָ֔א בֶּן מִי זֶ֥ה הַ/נַּ֖עַר אַבְנֵ֑ר וַ/יֹּ֣אמֶר אַבְנֵ֔ר
    חֵֽי נַפְשְׁ/ךָ֥ הַ/מֶּ֖לֶךְ אִם יָדָֽעְתִּי־־־־־־׃
translation:
  text: When Saul saw David going out to meet the Philistine, he said to Abner, the
    commander of the army, “Whose son is this young man, Abner?” And Abner said, “As
    your soul lives, O king, I do not know.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew oath formula: ''As your soul lives''; more idiomatically, ''As surely
      as you live.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִ/רְא֨וֹת
  chosen: When ... saw
  alternatives:
  - And when ... saw
  - Now when ... saw
  lexicon: HALOT
  rationale: The conjunction plus infinitive construct introduces a temporal clause.
    'When Saul saw' is natural English and preserves the sequence without over-literal
    awkwardness.
- source_word: יֹצֵא
  chosen: going out
  alternatives:
  - coming out
  - going forth
  lexicon: HALOT
  rationale: The participle of יצא denotes David's movement outward toward combat.
    'Going out' is idiomatic and retains the vividness of the participial action.
- source_word: לִ/קְרַ֣את
  chosen: to meet
  alternatives:
  - to encounter
  - to confront
  lexicon: HALOT
  rationale: לקראת commonly means 'to meet' or 'to encounter.' In this battle context
    'to meet' is sufficiently direct without adding interpretive force beyond the
    Hebrew.
- source_word: הַ/פְּלִשְׁתִּ֔י
  chosen: the Philistine
  alternatives:
  - the Philistine champion
  lexicon: HALOT
  rationale: The Hebrew simply has the ethnic singular with article. 'Champion' is
    contextually true from the broader narrative but is not present in this clause,
    so it is not added.
- source_word: שַׂ֣ר הַ/צָּבָ֔א
  chosen: the commander of the army
  alternatives:
  - the captain of the army
  - the commander of the host
  lexicon: HALOT
  rationale: This title denotes military leadership. 'Commander of the army' is clear
    modern English and preserves the official sense better than the archaic 'captain
    of the host.'
- source_word: בֶּן מִי זֶה הַ/נַּעַר
  chosen: Whose son is this young man
  alternatives:
  - Whose son is this boy
  - This young man is whose son
  lexicon: HALOT
  rationale: The Hebrew asks literally 'son of whom is this young man?' The idiomatic
    English equivalent is 'Whose son is this young man?' 'Young man' fits נַעַר here
    better than 'boy,' since David is youthful but functioning as a combatant.
- source_word: חֵֽי נַפְשְׁ/ךָ
  chosen: As your soul lives
  alternatives:
  - By your life
  - As surely as you live
  lexicon: HALOT
  rationale: This is a Hebrew oath formula literally invoking the life of the addressed
    person's soul/life. 'As your soul lives' preserves the Semitic flavor while remaining
    understandable. A more idiomatic alternative is preserved in a footnote.
- source_word: אִם יָדָֽעְתִּי
  chosen: I do not know
  alternatives:
  - if I know
  - surely I do not know
  lexicon: HALOT
  rationale: In oath contexts אִם can function elliptically in a negative asseveration.
    Rendering the sense as 'I do not know' communicates the force in natural English;
    a more literal form would be obscure without explanation.
