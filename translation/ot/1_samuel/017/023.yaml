id: 1SA.17.23
reference: 1 Samuel 17:23
source:
  edition: WLC
  text: וְ/ה֣וּא מְדַבֵּ֣ר עִמָּ֗/ם וְ/הִנֵּ֣ה אִ֣ישׁ הַ/בֵּנַ֡יִם עוֹלֶ֞ה גָּלְיָת֩
    הַ/פְּלִשְׁתִּ֨י שְׁמ֤/וֹ מִ/גַּת֙ מ/מערות פְּלִשְׁתִּ֔ים וַ/יְדַבֵּ֖ר כַּ/דְּבָרִ֣ים
    הָ/אֵ֑לֶּה וַ/יִּשְׁמַ֖ע דָּוִֽד׀׃
translation:
  text: While he was speaking with them, behold, the champion was coming up—the Philistine
    named Goliath, from Gath, from the ranks of the Philistines—and he spoke these
    words, and David heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the man between [the two sides/lines],' an idiom for
      a representative warrior in single combat.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression likely refers to the Philistine battle lines or ranks;
      some render 'from the camps of the Philistines.'
    reason: alternative_reading
lexical_decisions:
- source_word: מְדַבֵּר
  chosen: was speaking
  alternatives:
  - spoke
  - was talking
  lexicon: HALOT
  rationale: 'The participle with הוּא gives ongoing action in progress, best rendered
    with the English past progressive: David was in the act of speaking.'
- source_word: עִמָּם
  chosen: with them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The preposition עִם normally means 'with'; in context David is conversing
    with the men, not merely addressing them one-way.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and behold
  lexicon: HALOT
  rationale: Retained as a discourse marker signaling sudden vividness. 'Behold' preserves
    the narrative force without paraphrase.
- source_word: אִישׁ הַבֵּנַיִם
  chosen: the champion
  alternatives:
  - the man between the lines
  - the middleman
  lexicon: HALOT
  rationale: This idiom refers to the representative warrior who stands between the
    two armies for single combat. 'Champion' is the established and contextually accurate
    English equivalent; the more literal alternative is preserved in a footnote.
- source_word: עוֹלֶה
  chosen: was coming up
  alternatives:
  - came up
  - was going up
  lexicon: HALOT
  rationale: The participle again suggests action in progress. 'Coming up' fits the
    battlefield perspective and English idiom better than the more wooden 'going up.'
- source_word: הַפְּלִשְׁתִּי
  chosen: the Philistine
  lexicon: HALOT
  rationale: Straightforward gentilic/title identifying Goliath.
- source_word: שְׁמוֹ
  chosen: named
  alternatives:
  - whose name was
  lexicon: HALOT
  rationale: Compressed into natural English while preserving the identification formula.
- source_word: מִגַּת
  chosen: from Gath
  lexicon: HALOT
  rationale: Standard place-name transliteration.
- source_word: ממערות פְּלִשְׁתִּים
  chosen: from the ranks of the Philistines
  alternatives:
  - from the battle lines of the Philistines
  - from the camps of the Philistines
  lexicon: HALOT
  rationale: The ketiv/qere tradition here is difficult, but the sense in context
    is that Goliath came up from the Philistine battle formation. 'Ranks' is concise
    and natural; an alternative is preserved in a footnote.
- source_word: וַיְדַבֵּר כַּדְּבָרִים הָאֵלֶּה
  chosen: and he spoke these words
  alternatives:
  - and he spoke according to these words
  - and he said the same words
  lexicon: HALOT
  rationale: The phrase points back to Goliath's previously described taunt/challenge.
    'These words' is idiomatic and sufficiently formal.
- source_word: וַיִּשְׁמַע דָּוִד
  chosen: and David heard
  alternatives:
  - and David listened
  - and David heard him
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol. The object is implicit from context, so English
    can leave it unstated as Hebrew does.
