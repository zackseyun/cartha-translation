id: 1SA.17.16
reference: 1 Samuel 17:16
source:
  edition: WLC
  text: וַ/יִּגַּ֥שׁ הַ/פְּלִשְׁתִּ֖י הַשְׁכֵּ֣ם וְ/הַעֲרֵ֑ב וַ/יִּתְיַצֵּ֖ב אַרְבָּעִ֥ים
    יֽוֹם׃פ
translation:
  text: The Philistine came forward morning and evening and took his stand for forty
    days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'approached ... and stationed himself for forty days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּשׁ
  chosen: came forward
  alternatives:
  - approached
  - came near
  lexicon: HALOT
  rationale: The verb נגשׁ commonly means to approach or come near. In this military
    narrative context, 'came forward' naturally conveys Goliath's repeated advance
    into the space between the armies without sounding overly wooden.
- source_word: הַפְּלִשְׁתִּי
  chosen: The Philistine
  alternatives:
  - the Philistine champion
  lexicon: HALOT
  rationale: The Hebrew here simply says 'the Philistine.' Although the referent is
    Goliath, adding 'champion' would import wording from nearby verses rather than
    translate this verse directly.
- source_word: הַשְׁכֵּם
  chosen: morning
  alternatives:
  - early in the morning
  lexicon: HALOT
  rationale: This adverbial infinitive conveys an early-morning time reference. 'Morning'
    is concise and idiomatic in the paired expression 'morning and evening,' while
    still reflecting the temporal sense.
- source_word: וְהַעֲרֵב
  chosen: and evening
  alternatives:
  - and at evening
  - and in the evening
  lexicon: HALOT
  rationale: The form denotes evening time. 'Morning and evening' is the most natural
    English pairing and preserves the repeated daily rhythm.
- source_word: וַיִּתְיַצֵּב
  chosen: and took his stand
  alternatives:
  - and presented himself
  - and stationed himself
  lexicon: HALOT
  rationale: The hitpael of יצב often means to station oneself or take one's stand.
    'Took his stand' fits the scene of formal challenge and preserves the reflexive
    nuance better than a flatter 'stood'.
- source_word: אַרְבָּעִים יוֹם
  chosen: for forty days
  alternatives:
  - forty days
  lexicon: HALOT
  rationale: The phrase marks duration. English idiom normally supplies 'for' to express
    the span over which this repeated action occurred.
