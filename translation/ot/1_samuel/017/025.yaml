id: 1SA.17.25
reference: 1 Samuel 17:25
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אִ֣ישׁ יִשְׂרָאֵ֗ל הַ/רְּאִיתֶם֙ הָ/אִ֤ישׁ הָֽ/עֹלֶה֙ הַ/זֶּ֔ה
    כִּ֛י לְ/חָרֵ֥ף אֶת יִשְׂרָאֵ֖ל עֹלֶ֑ה וְֽ֠/הָיָה הָ/אִ֨ישׁ אֲשֶׁר יַכֶּ֜/נּוּ
    יַעְשְׁרֶ֥/נּוּ הַ/מֶּ֣לֶךְ עֹ֣שֶׁר גָּד֗וֹל וְ/אֶת בִּתּ/וֹ֙ יִתֶּן ל֔/וֹ וְ/אֵת֙
    בֵּ֣ית אָבִ֔י/ו יַעֲשֶׂ֥ה חָפְשִׁ֖י בְּ/יִשְׂרָאֵֽל׀־־׀־־׃
translation:
  text: And the men of Israel said, “Have you seen this man who is coming up? Surely
    he is coming up to defy Israel. And it shall be that the man who strikes him down,
    the king will enrich him with great riches, and will give him his daughter, and
    will make his father’s house free in Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “will exempt his father’s house in Israel,” likely meaning freedom from
      taxes or other royal service obligations.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ יִשְׂרָאֵל
  chosen: the men of Israel
  alternatives:
  - a man of Israel
  - an Israelite man
  lexicon: HALOT
  rationale: Although אִישׁ is morphologically singular, in context it functions collectively/generically
    for the Israelite soldiers speaking among themselves. English plural best reflects
    the discourse sense without awkwardness.
- source_word: הַרְּאִיתֶם
  chosen: Have you seen
  alternatives:
  - Did you see
  - Do you see
  lexicon: HALOT
  rationale: The form is a second masculine plural perfect with interrogative force.
    'Have you seen' fits the immediate conversational setting and preserves the rhetorical
    question.
- source_word: הָאִישׁ הָעֹלֶה הַזֶּה
  chosen: this man who is coming up
  alternatives:
  - this man coming up
  - this man who comes up
  lexicon: HALOT
  rationale: The participle עֹלֶה conveys ongoing or characteristic action. 'Who is
    coming up' gives natural English while preserving the participial sense.
- source_word: כִּי
  chosen: Surely
  alternatives:
  - for
  - indeed
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces an emphatic explanation rather than strict causation.
    'Surely' captures the force in idiomatic English.
- source_word: לְחָרֵף
  chosen: to defy
  alternatives:
  - to taunt
  - to reproach
  - to disgrace
  lexicon: HALOT
  rationale: In the David and Goliath context, חרף denotes scornful challenge against
    Israel. 'Defy' best captures the hostile public reproach.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the armies of Israel
  lexicon: HALOT
  rationale: The text says simply 'Israel'; expanding to 'the armies of Israel' would
    import wording from nearby verses rather than this verse itself.
- source_word: וְהָיָה
  chosen: And it shall be
  alternatives:
  - And it will be
  - Now it will happen
  lexicon: HALOT
  rationale: This formula introduces the announced consequence or reward. 'And it
    shall be' preserves the formal declarative tone.
- source_word: יַכֶּנּוּ
  chosen: strikes him down
  alternatives:
  - kills him
  - defeats him
  - strikes him
  lexicon: HALOT
  rationale: נכה can mean strike, strike down, or kill depending on context. Since
    the reward concerns overcoming Goliath decisively, 'strikes him down' preserves
    the force without over-specifying beyond the verb itself.
- source_word: יַעְשְׁרֶנּוּ ... עֹשֶׁר גָּדוֹל
  chosen: the king will enrich him with great riches
  alternatives:
  - the king will make him very rich
  - the king will reward him with great wealth
  lexicon: HALOT
  rationale: The Hiphil of עשר means to make rich/enrich, and the cognate noun עֹשֶׁר
    intensifies the promise. 'Enrich him with great riches' preserves the Hebrew emphasis,
    though slightly idiomatic in English.
- source_word: בִּתּוֹ יִתֶּן לוֹ
  chosen: will give him his daughter
  alternatives:
  - will give his daughter to him
  lexicon: HALOT
  rationale: A straightforward rendering of the marriage reward; English word order
    is smoothed while retaining the sense.
- source_word: בֵּית אָבִיו
  chosen: his father’s house
  alternatives:
  - his family household
  - his ancestral house
  lexicon: HALOT
  rationale: The phrase denotes the wider paternal household/family unit. 'His father’s
    house' is a standard and transparent rendering.
- source_word: יַעֲשֶׂה חָפְשִׁי בְּיִשְׂרָאֵל
  chosen: will make his father’s house free in Israel
  alternatives:
  - will exempt his father’s house in Israel
  - will grant freedom to his father’s house in Israel
  lexicon: HALOT
  rationale: חָפְשִׁי here likely denotes exemption from royal obligations such as
    taxes or service. The main text keeps the more literal 'free,' while a footnote
    preserves the probable administrative sense.
