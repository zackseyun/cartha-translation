id: 1SA.17.13
reference: 1 Samuel 17:13
source:
  edition: WLC
  text: וַ/יֵּ֨לְכ֜וּ שְׁלֹ֤שֶׁת בְּנֵֽי יִשַׁי֙ הַ/גְּדֹלִ֔ים הָלְכ֥וּ אַחֲרֵי שָׁא֖וּל
    לַ/מִּלְחָמָ֑ה וְ/שֵׁ֣ם שְׁלֹ֣שֶׁת בָּנָ֗י/ו אֲשֶׁ֤ר הָלְכוּ֙ בַּ/מִּלְחָמָ֔ה
    אֱלִיאָ֣ב הַ/בְּכ֗וֹר וּ/מִשְׁנֵ֨/הוּ֙ אֲבִ֣ינָדָ֔ב וְ/הַ/שְּׁלִשִׁ֖י שַׁמָּֽה־־׀׃
translation:
  text: The three oldest sons of Jesse had gone after Saul to the battle. And the
    names of his three sons who had gone to the battle were Eliab the firstborn, his
    second Abinadab, and the third Shammah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'after Saul' can also be understood as 'following Saul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ / הָלְכוּ
  chosen: had gone
  alternatives:
  - went
  - followed
  lexicon: HALOT
  rationale: הלך here denotes going in the sense of accompanying Saul to the military
    campaign. The English pluperfect 'had gone' fits the narrative backgrounding relative
    to the surrounding account.
- source_word: שְׁלֹשֶׁת בְּנֵי יִשַׁי הַגְּדֹלִים
  chosen: the three oldest sons of Jesse
  alternatives:
  - the three elder sons of Jesse
  - three of Jesse's older sons
  lexicon: HALOT
  rationale: הַגְּדֹלִים in this family context refers to age/seniority, not physical
    size or social greatness. 'Oldest sons' is the clearest natural English rendering.
- source_word: אַחֲרֵי שָׁאוּל
  chosen: after Saul
  alternatives:
  - behind Saul
  - following Saul
  lexicon: HALOT
  rationale: אַחֲרֵי literally means 'after/behind.' In context it indicates accompanying
    Saul into campaign. 'After Saul' preserves the Hebrew image while remaining idiomatic
    enough in English.
- source_word: לַמִּלְחָמָה / בַּמִּלְחָמָה
  chosen: to the battle
  alternatives:
  - to war
  - to the war
  - into battle
  lexicon: HALOT
  rationale: מִלְחָמָה can mean war or battle. In this immediate narrative scene of
    a specific military engagement, 'battle' is more concrete and natural than 'war.'
- source_word: וְשֵׁם
  chosen: And the names ... were
  alternatives:
  - Now the names ... were
  - And the name ... was
  lexicon: HALOT
  rationale: Though שֵׁם is singular, the idiom with a following plural list is naturally
    rendered in English as 'the names ... were.'
- source_word: בָּנָיו
  chosen: his three sons
  alternatives:
  - Jesse's three sons
  lexicon: HALOT
  rationale: The suffix refers back to Jesse. Retaining 'his' follows the Hebrew cohesion;
    Jesse is close enough in context to avoid ambiguity.
- source_word: אֲשֶׁר הָלְכוּ בַּמִּלְחָמָה
  chosen: who had gone to the battle
  alternatives:
  - who went to the battle
  - who had gone to war
  lexicon: HALOT
  rationale: This relative clause identifies the three sons in view. 'To the battle'
    matches the earlier phrase for consistency and keeps the specific military setting.
- source_word: הַבְּכוֹר
  chosen: the firstborn
  alternatives:
  - the eldest
  lexicon: HALOT
  rationale: בכור is a status term meaning 'firstborn,' not merely oldest. The more
    precise familial term should be preserved.
- source_word: וּמִשְׁנֵהוּ
  chosen: his second
  alternatives:
  - the second to him
  - next to him was
  lexicon: HALOT
  rationale: The term denotes the one second in order after the firstborn. 'His second'
    is concise and reflects the possessive suffix tied to the sibling sequence.
- source_word: וְהַשְּׁלִשִׁי
  chosen: and the third
  alternatives:
  - and third
  lexicon: HALOT
  rationale: Ordinal sequence is being listed formally; 'and the third' preserves
    that structure in clear English.
- source_word: שַׁמָּה
  chosen: Shammah
  alternatives:
  - Shamma
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
