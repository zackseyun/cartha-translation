id: 1SA.17.4
reference: 1 Samuel 17:4
source:
  edition: WLC
  text: וַ/יֵּצֵ֤א אִֽישׁ הַ/בֵּנַ֨יִם֙ מִ/מַּחֲנ֣וֹת פְּלִשְׁתִּ֔ים גָּלְיָ֥ת שְׁמ֖/וֹ
    מִ/גַּ֑ת גָּבְה֕/וֹ שֵׁ֥שׁ אַמּ֖וֹת וָ/זָֽרֶת־׃
translation:
  text: Then a champion came out from the camps of the Philistines; his name was Goliath,
    from Gath. His height was six cubits and a span.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''a man of the between,'' likely referring to a representative
      fighter who steps out between the battle lines; hence ''champion.'''
    reason: lexical_alternative
  - marker: b
    text: Six cubits and a span is approximately 9 feet 9 inches (about 3.0 meters),
      depending on the cubit used.
    reason: cultural_note
lexical_decisions:
- source_word: אִישׁ הַבֵּנַיִם
  chosen: a champion
  alternatives:
  - a man of the space between
  - an intermediary warrior
  - a man between the lines
  lexicon: HALOT
  rationale: The idiom literally refers to a 'man of the between/two spaces,' likely
    the fighter who steps out between battle lines for representative combat. 'Champion'
    is the established and contextually clear English rendering, while the more literal
    alternatives are preserved as lexical possibilities.
- source_word: וַיֵּצֵא
  chosen: came out
  alternatives:
  - went out
  lexicon: HALOT
  rationale: The verb means 'went out/came out.' In English narrative from the observer's
    perspective, 'came out' reads naturally and fits the scene of a warrior emerging
    from the Philistine side.
- source_word: מִמַּחֲנוֹת פְּלִשְׁתִּים
  chosen: from the camps of the Philistines
  alternatives:
  - from the Philistine camp
  - from the ranks of the Philistines
  lexicon: HALOT
  rationale: The Hebrew noun is plural ('camps'). Retaining the plural reflects the
    source text more closely than the smoother singular. 'Philistines' is the standard
    transliteration of the people-group name.
- source_word: גָּלְיָת
  chosen: Goliath
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: שְׁמוֹ
  chosen: his name was
  alternatives:
  - named
  lexicon: HALOT
  rationale: This is the straightforward nominal expression introducing the figure
    by name. 'His name was' preserves the Hebrew structure naturally.
- source_word: מִגַּת
  chosen: from Gath
  alternatives:
  - the Gittite
  lexicon: HALOT
  rationale: The Hebrew gives the place of origin directly, 'from Gath.' Rendering
    it this way is more literal than converting it to the gentilic 'the Gittite.'
- source_word: גָּבְהוֹ
  chosen: his height was
  alternatives:
  - he was tall to the measure of
  lexicon: HALOT
  rationale: The noun with suffix denotes his height/stature. 'His height was' is
    the natural English equivalent.
- source_word: שֵׁשׁ אַמּוֹת וָזָרֶת
  chosen: six cubits and a span
  alternatives:
  - about nine feet nine inches
  - about three meters
  lexicon: HALOT
  rationale: The Hebrew uses ancient units. The main text preserves the source measurements
    for transparency and precision; approximate modern equivalents are better suited
    to a footnote.
