id: 1SA.17.24
reference: 1 Samuel 17:24
source:
  edition: WLC
  text: וְ/כֹל֙ אִ֣ישׁ יִשְׂרָאֵ֔ל בִּ/רְאוֹתָ֖/ם אֶת הָ/אִ֑ישׁ וַ/יָּנֻ֨סוּ֙ מִ/פָּנָ֔י/ו
    וַ/יִּֽירְא֖וּ מְאֹֽד־׃
translation:
  text: And every man of Israel, when they saw the man, fled from before him and were
    very afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from before him,'' an idiom meaning ''from his presence'' or
      simply ''from him.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כֹל אִישׁ יִשְׂרָאֵל
  chosen: And every man of Israel
  alternatives:
  - And all the men of Israel
  - And every Israelite man
  lexicon: HALOT
  rationale: כֹל with singular אִישׁ yields a distributive sense, 'every man.' This
    preserves the masculine singular form in line with the gender-accurate policy,
    while still conveying the collective reference to Israel's fighting men.
- source_word: בִּרְאוֹתָם
  chosen: when they saw
  alternatives:
  - at the sight of
  - when seeing
  lexicon: HALOT
  rationale: 'The preposition ב with infinitive construct of ראה plus 3mp suffix is
    naturally temporal here: ''when they saw.'' This is smoother in English than a
    more wooden ''in their seeing'' while remaining close to the Hebrew.'
- source_word: אֶת הָאִישׁ
  chosen: the man
  alternatives:
  - him
  lexicon: HALOT
  rationale: The phrase literally reads 'the man,' referring contextually to Goliath.
    Retaining 'the man' preserves the Hebrew wording and the dramatic emphasis, rather
    than replacing it immediately with a pronoun.
- source_word: וַיָּנֻסוּ
  chosen: fled
  alternatives:
  - ran away
  - took flight
  lexicon: HALOT
  rationale: נוּס commonly means 'flee.' 'Fled' is concise, natural, and preserves
    the force of the verb without colloquial weakening.
- source_word: מִפָּנָיו
  chosen: from before him
  alternatives:
  - from him
  - from his presence
  lexicon: HALOT
  rationale: Literally 'from his face/presence.' 'From before him' keeps the Hebrew
    idiom visible in understandable English; 'from him' would be smoother but less
    transparent.
- source_word: וַיִּירְאוּ מְאֹד
  chosen: were very afraid
  alternatives:
  - were greatly afraid
  - feared greatly
  lexicon: HALOT
  rationale: ירא with מְאֹד expresses intense fear. 'Were very afraid' is idiomatic
    modern English and preserves the emotional force.
