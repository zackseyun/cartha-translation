id: 1SA.17.54
reference: 1 Samuel 17:54
source:
  edition: WLC
  text: וַ/יִּקַּ֤ח דָּוִד֙ אֶת רֹ֣אשׁ הַ/פְּלִשְׁתִּ֔י וַ/יְבִאֵ֖/הוּ יְרוּשָׁלִָ֑ם
    וְ/אֶת כֵּלָ֖י/ו שָׂ֥ם בְּ/אָהֳלֽ/וֹ־־׃ס
translation:
  text: David took the head of the Philistine and brought it to Jerusalem, but he
    put his weapons in his tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his gear' or 'his equipment'; the Hebrew term is broad and can include
      weapons, armor, or military articles.
    reason: lexical_alternative
  - marker: b
    text: Some readers see a chronological tension in 'brought it to Jerusalem,' since
      Jerusalem was not yet fully under Israelite control at this point in the broader
      narrative. The translation preserves the Hebrew wording rather than harmonizing
      it.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - seized
  - carried off
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of לקח; 'took' is the plain, natural English
    equivalent in this context.
- source_word: רֹאשׁ
  chosen: head
  lexicon: HALOT
  rationale: Literal body-part sense is clearly intended after Goliath's death; no
    need for figurative rendering.
- source_word: הַפְּלִשְׁתִּי
  chosen: the Philistine
  alternatives:
  - the Philistine man
  lexicon: HALOT
  rationale: Ethnic designation used substantivally for Goliath; standard English
    rendering is 'the Philistine.'
- source_word: וַיְבִאֵהוּ
  chosen: brought it
  alternatives:
  - carried it
  - brought him
  lexicon: HALOT
  rationale: The 3ms suffix refers back to 'the head' (a masculine noun in Hebrew).
    English uses 'it' for the severed head. 'Brought' fits בוא in causative usage
    here.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: כֵּלָיו
  chosen: his weapons
  alternatives:
  - his gear
  - his equipment
  - his armor
  lexicon: HALOT
  rationale: כְּלִי is broad ('article, vessel, implement, weapon, gear'). In this
    battle context, Goliath's military equipment is in view. 'Weapons' is concise
    and contextually appropriate, though broader than only sword/spear. The possessive
    refers to the Philistine's equipment.
- source_word: שָׂם
  chosen: put
  alternatives:
  - placed
  - set
  lexicon: HALOT
  rationale: Simple verb of placing; 'put' is idiomatic modern English.
- source_word: בְּאָהֳלוֹ
  chosen: in his tent
  alternatives:
  - in the tent
  - in his dwelling
  lexicon: HALOT
  rationale: אָהֶל normally means 'tent.' The suffix is formally ambiguous in context,
    but the most natural reading is David's tent, contrasting with the Philistine's
    weapons. English keeps the straightforward possessive.
