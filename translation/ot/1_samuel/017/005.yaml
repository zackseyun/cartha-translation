id: 1SA.17.5
reference: 1 Samuel 17:5
source:
  edition: WLC
  text: וְ/כ֤וֹבַע נְחֹ֨שֶׁת֙ עַל רֹאשׁ֔/וֹ וְ/שִׁרְי֥וֹן קַשְׂקַשִּׂ֖ים ה֣וּא לָב֑וּשׁ
    וּ/מִשְׁקַל֙ הַ/שִּׁרְי֔וֹן חֲמֵשֶׁת אֲלָפִ֥ים שְׁקָלִ֖ים נְחֹֽשֶֽׁת־־׃
translation:
  text: He had a bronze helmet on his head, and he was clothed with a coat of scale
    armor; and the weight of the coat was five thousand shekels of bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a coat of mail.' The Hebrew more specifically describes armor made of
      overlapping scales.
    reason: lexical_alternative
  - marker: b
    text: Five thousand shekels is approximately 125 pounds, or about 57 kilograms.
    reason: cultural_note
lexical_decisions:
- source_word: כּוֹבַע
  chosen: helmet
  alternatives:
  - cap
  - helm
  lexicon: HALOT
  rationale: In military context this denotes protective headgear. 'Helmet' is the
    clear modern English equivalent; 'helm' is archaic and 'cap' too weak.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In biblical material culture this term often refers broadly to copper/bronze
    metalwork. 'Bronze' is the conventional and likely sense for armor here, fitting
    the military context better than the more chemically precise but less idiomatic
    'copper'.
- source_word: שִׁרְיוֹן
  chosen: coat
  alternatives:
  - armor
  - breastplate
  - corslet
  lexicon: HALOT
  rationale: The noun denotes body armor. Because the verse immediately qualifies
    it as 'scale armor,' rendering the base noun as 'coat' avoids redundancy ('armor
    of scales armor') while preserving the sense of a wearable body covering. 'Breastplate'
    is too narrow, and 'corslet' is dated.
- source_word: קַשְׂקַשִּׂים
  chosen: scale armor
  alternatives:
  - scales
  - coat of mail
  - scale-mail
  lexicon: HALOT
  rationale: The plural literally refers to scales. In context it describes armor
    made of overlapping scales. 'Scale armor' communicates the construction clearly
    in modern English. Traditional 'coat of mail' can suggest chain mail, which is
    less precise.
- source_word: הוּא לָבוּשׁ
  chosen: he was clothed with
  alternatives:
  - he wore
  - he was wearing
  lexicon: HALOT
  rationale: The construction states his state of being dressed in the armor. 'He
    was clothed with' preserves the stative nuance more closely than the simpler but
    less formal 'he wore.'
- source_word: מִשְׁקַל
  chosen: weight
  alternatives:
  - mass
  lexicon: HALOT
  rationale: Standard rendering for the noun in descriptions of measured heaviness.
    'Mass' is scientifically precise but unnatural in this literary context.
- source_word: חֲמֵשֶׁת אֲלָפִים שְׁקָלִים
  chosen: five thousand shekels
  alternatives:
  - about 125 pounds
  - about 57 kilograms
  lexicon: HALOT
  rationale: The text gives the ancient unit directly. Following optimal equivalence
    and transparency, the main text preserves 'shekels' rather than converting into
    modern units; approximate modern equivalents are better suited to a footnote if
    needed.
