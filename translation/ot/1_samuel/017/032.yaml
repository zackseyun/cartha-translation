id: 1SA.17.32
reference: 1 Samuel 17:32
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר דָּוִד֙ אֶל שָׁא֔וּל אַל יִפֹּ֥ל לֵב אָדָ֖ם עָלָ֑י/ו עַבְדְּ/ךָ֣
    יֵלֵ֔ךְ וְ/נִלְחַ֖ם עִם הַ/פְּלִשְׁתִּ֥י הַ/זֶּֽה־־־־׃
translation:
  text: And David said to Saul, “Let no man's heart fail because of him. Your servant
    will go and fight with this Philistine.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more explicitly, 'because of this Philistine.' The Hebrew reads 'because
      of him,' with the referent supplied by context.
    reason: alternative_reading
  - marker: b
    text: Or 'Let no man lose heart.' The Hebrew idiom is literally 'let not the heart
      of a man fall.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural,
    sufficiently formal rendering in English narrative style.
- source_word: דָּוִד
  chosen: David
  rationale: Personal name is transliterated by standard English convention, per translation
    philosophy.
- source_word: אַל יִפֹּל לֵב אָדָם
  chosen: Let no man's heart fail
  alternatives:
  - Let no one's heart fail
  - Let no man lose heart
  lexicon: HALOT
  rationale: The idiom literally involves the 'heart' falling; 'heart fail' preserves
    the Hebrew image while remaining clear in English. 'Lose heart' is idiomatic English
    but slightly more interpretive. 'Man' is retained because אָדָם here is singular/generic
    and the project prefers gender-accurate rendering over flattening to gender-neutral
    language.
- source_word: אָדָם
  chosen: man
  alternatives:
  - person
  - one
  lexicon: HALOT
  rationale: In line with the doctrine table, אָדָם is rendered 'man / humankind'
    according to context. Here the singular generic sense is well represented by 'man'
    in the idiom 'no man's heart.'
- source_word: עָלָיו
  chosen: because of him
  alternatives:
  - on account of him
  - over him
  - because of this Philistine
  lexicon: HALOT
  rationale: The pronoun most naturally refers to Goliath/the Philistine in context.
    'Because of him' preserves the pronominal reference without over-specifying in
    the main text. A more explicit alternative is worth preserving in a footnote because
    the antecedent is contextual rather than repeated.
- source_word: עַבְדְּךָ
  chosen: Your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in this courtly self-reference
    to the king, 'your servant' is the most natural and contextually accurate English
    rendering. The bonded-status emphasis is not foregrounded here.
- source_word: יֵלֵךְ
  chosen: will go
  alternatives:
  - shall go
  lexicon: HALOT
  rationale: Imperfect here expresses David's resolve/intention. 'Will go' is natural
    modern English and fits the immediate pledge.
- source_word: וְנִלְחַם
  chosen: and fight
  alternatives:
  - and do battle
  - and will fight
  lexicon: HALOT
  rationale: Coordinated with 'will go,' English idiom prefers 'will go and fight.'
    This preserves the sense without awkward repetition of the auxiliary.
- source_word: עִם הַפְּלִשְׁתִּי הַזֶּה
  chosen: with this Philistine
  alternatives:
  - against this Philistine
  lexicon: HALOT
  rationale: The preposition עִם literally means 'with,' and in combat contexts can
    denote engagement with an opponent. 'With this Philistine' is formally closer
    to the Hebrew; 'against' is a possible dynamic alternative but less literal.
