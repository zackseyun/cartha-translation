id: 1SA.17.20
reference: 1 Samuel 17:20
source:
  edition: WLC
  text: וַ/יַּשְׁכֵּ֨ם דָּוִ֜ד בַּ/בֹּ֗קֶר וַ/יִּטֹּ֤שׁ אֶת הַ/צֹּאן֙ עַל שֹׁמֵ֔ר
    וַ/יִּשָּׂ֣א וַ/יֵּ֔לֶךְ כַּ/אֲשֶׁ֥ר צִוָּ֖/הוּ יִשָׁ֑י וַ/יָּבֹא֙ הַ/מַּעְגָּ֔לָ/ה
    וְ/הַ/חַ֗יִל הַ/יֹּצֵא֙ אֶל הַ/מַּ֣עֲרָכָ֔ה וְ/הֵרֵ֖עוּ בַּ/מִּלְחָמָֽה־־־׃
translation:
  text: So David rose early in the morning, left the sheep with a keeper, took the
    supplies, and went, just as Jesse had commanded him. He came to the encampment
    as the army was going out to the battle line and raising the war cry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the camp-circle' or 'the wagon-rampart'; the Hebrew term may refer more
      specifically to the camp's circular formation or defensive perimeter.
    reason: lexical_alternative
  - marker: b
    text: Literally 'and they shouted in/for the battle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  chosen: rose early
  alternatives:
  - got up early
  - started early
  lexicon: HALOT
  rationale: The verb means to rise early/start early. 'Rose early' is idiomatic English
    and preserves the narrative emphasis on prompt action.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - that morning
  lexicon: HALOT
  rationale: Standard temporal expression; paired with 'rose early' it yields natural
    English without losing the Hebrew sense.
- source_word: וַיִּטֹּשׁ אֶת־הַצֹּאן עַל שֹׁמֵר
  chosen: left the sheep with a keeper
  alternatives:
  - entrusted the sheep to a keeper
  - left the flock with a guard
  lexicon: HALOT
  rationale: The idiom conveys leaving the sheep in another's care. 'Keeper' fits
    pastoral context better than 'guard' and is more natural than a more formal paraphrase.
- source_word: וַיִּשָּׂא
  chosen: took the supplies
  alternatives:
  - carried them
  - lifted up and took
  lexicon: HALOT
  rationale: The verb literally means 'lifted/carried,' but the object is omitted
    here and supplied from the immediate context (the provisions from the previous
    verse). 'Took the supplies' makes the implied object explicit in clear English
    without over-paraphrasing.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - set out
  lexicon: HALOT
  rationale: Simple narrative verb of motion; 'went' preserves the straightforward
    Hebrew style.
- source_word: כַּאֲשֶׁר צִוָּהוּ יִשָׁי
  chosen: just as Jesse had commanded him
  alternatives:
  - as Jesse instructed him
  - according to Jesse's command
  lexicon: HALOT
  rationale: צוה is 'command.' 'Just as' reflects כַאֲשֶׁר well and highlights David's
    obedience.
- source_word: הַמַּעְגָּלָה
  chosen: the encampment
  alternatives:
  - the camp-circle
  - the wagon-rampart
  lexicon: HALOT
  rationale: The noun likely refers to the camp area, possibly arranged in a circle
    or protected by wagons/earthworks. 'Encampment' communicates the referent clearly
    in modern English, while a footnote preserves the more concrete alternatives.
- source_word: הַחַיִל
  chosen: the army
  alternatives:
  - the force
  - the troops
  lexicon: HALOT
  rationale: In this military context the term refers to the fighting force. 'Army'
    is the clearest natural rendering.
- source_word: הַיֹּצֵא אֶל־הַמַּעֲרָכָה
  chosen: was going out to the battle line
  alternatives:
  - was going out to the line of battle
  - was marching out to the ranks
  lexicon: HALOT
  rationale: The participle gives background action contemporaneous with David's arrival.
    מַעֲרָכָה refers to battle array/line. 'Battle line' is concise and natural.
- source_word: וְהֵרֵעוּ
  chosen: raising the war cry
  alternatives:
  - shouting
  - sounding the battle shout
  lexicon: HALOT
  rationale: The Hiphil of רוע here denotes making a loud shout in battle. 'Raising
    the war cry' captures the military sense better than generic 'shouting'.
- source_word: בַּמִּלְחָמָה
  chosen: the war cry
  alternatives:
  - for battle
  - in the battle
  lexicon: HALOT
  rationale: 'With the preceding verb, the phrase functions adverbially/instrumentally
    in context: they were shouting for battle. In English, ''raising the war cry''
    best conveys the combined sense, while the more literal alternatives are preserved
    in a footnote.'
