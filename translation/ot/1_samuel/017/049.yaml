id: 1SA.17.49
reference: 1 Samuel 17:49
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֩ דָּוִ֨ד אֶת יָד֜/וֹ אֶל הַ/כֶּ֗לִי וַ/יִּקַּ֨ח מִ/שָּׁ֥ם אֶ֨בֶן֙
    וַ/יְקַלַּ֔ע וַ/יַּ֥ךְ אֶת הַ/פְּלִשְׁתִּ֖י אֶל מִצְח֑/וֹ וַ/תִּטְבַּ֤ע הָ/אֶ֨בֶן֙
    בְּ/מִצְח֔/וֹ וַ/יִּפֹּ֥ל עַל פָּנָ֖י/ו אָֽרְצָ/ה־־־־־׃
translation:
  text: Then David reached his hand into the bag, took a stone from there, slung it,
    and struck the Philistine on his forehead. The stone sank into his forehead, and
    he fell facedown to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'into the pouch.' The Hebrew term for the container is broad and contextually
      refers to the receptacle holding David's stones.
    reason: lexical_alternative
  - marker: b
    text: Or, 'The stone embedded itself in his forehead.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'he fell on his face to the ground.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח ... אֶת יָדוֹ אֶל הַכֶּלִי
  chosen: reached his hand into the bag
  alternatives:
  - put his hand into the bag
  - sent his hand toward the bag
  - reached into the pouch
  lexicon: HALOT
  rationale: The idiom literally says 'sent his hand to/into the כלי.' In context,
    natural English is 'reached his hand into.' 'Bag' fits the immediate narrative
    of David's shepherd's equipment better than the overly broad 'equipment' or wooden
    'vessel.'
- source_word: הַכֶּלִי
  chosen: the bag
  alternatives:
  - the pouch
  - the equipment
  - the vessel
  lexicon: HALOT
  rationale: כְּלִי is a broad term ('vessel, implement, article, gear'), but here
    it refers to the container holding the stones. 'Bag' is the clearest contextual
    rendering in modern English.
- source_word: אֶבֶן
  chosen: a stone
  alternatives:
  - a rock
  lexicon: HALOT
  rationale: '''Stone'' is the standard and suitably precise rendering for the projectile
    David selected.'
- source_word: וַיְקַלַּע
  chosen: slung it
  alternatives:
  - hurled it with the sling
  - swung and cast it
  lexicon: HALOT
  rationale: The verb denotes using a sling. 'Slung it' is concise, natural, and preserves
    the specific action without unnecessary expansion.
- source_word: וַיַּךְ אֶת הַפְּלִשְׁתִּי אֶל מִצְחוֹ
  chosen: struck the Philistine on his forehead
  alternatives:
  - hit the Philistine in his forehead
  - struck the Philistine at his forehead
  lexicon: HALOT
  rationale: English idiom prefers 'on his forehead' after 'struck.' The Hebrew preposition
    אֶל here marks the point of impact.
- source_word: וַתִּטְבַּע הָאֶבֶן בְּמִצְחוֹ
  chosen: The stone sank into his forehead
  alternatives:
  - The stone embedded itself in his forehead
  - The stone penetrated his forehead
  lexicon: HALOT
  rationale: The verb conveys sinking/embedding. 'Sank into' is vivid and close to
    the Hebrew without overstating anatomical detail.
- source_word: וַיִּפֹּל עַל פָּנָיו אַרְצָה
  chosen: he fell facedown to the ground
  alternatives:
  - he fell on his face to the ground
  - he fell with his face to the earth
  lexicon: HALOT
  rationale: The Hebrew is literally 'he fell on his face earthward/to the ground.'
    'Facedown to the ground' is natural modern English and preserves the posture.
