id: 1SA.17.15
reference: 1 Samuel 17:15
source:
  edition: WLC
  text: וְ/דָוִ֛ד הֹלֵ֥ךְ וָ/שָׁ֖ב מֵ/עַ֣ל שָׁא֑וּל לִ/רְע֛וֹת אֶת צֹ֥אן אָבִ֖י/ו
    בֵּֽית לָֽחֶם־־׃
translation:
  text: Now David would go back and forth from Saul to shepherd his father's flock
    at Bethlehem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'David went and returned from Saul to pasture his father's
      flock at Bethlehem.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹלֵךְ וָשָׁב
  chosen: would go back and forth
  alternatives:
  - went and returned
  - kept going and returning
  lexicon: HALOT
  rationale: The paired participle/qal forms of הלך and שוב express repeated or customary
    movement rather than a single trip. 'Would go back and forth' captures the iterative
    sense in natural English better than a wooden 'went and returned.'
- source_word: מֵעַל שָׁאוּל
  chosen: from Saul
  alternatives:
  - from being with Saul
  - from Saul's presence
  lexicon: HALOT
  rationale: The preposition מֵעַל literally means 'from upon/from over,' but in this
    context idiomatically indicates departure from Saul's service or presence. 'From
    Saul' is concise and natural, while the iterative verb phrase already implies
    repeated movement between locations.
- source_word: לִרְעוֹת
  chosen: to shepherd
  alternatives:
  - to tend
  - to pasture
  lexicon: HALOT
  rationale: The infinitive of רעה refers to the work of a shepherd. 'To shepherd'
    preserves the verbal force and pastoral nuance more precisely than the broader
    'to tend.'
- source_word: צֹאן
  chosen: flock
  alternatives:
  - sheep
  - small livestock
  lexicon: HALOT
  rationale: צֹאן can denote small livestock collectively, often sheep and goats.
    'Flock' is the best collective English equivalent here, especially with the shepherding
    context.
- source_word: אָבִיו
  chosen: his father's
  alternatives:
  - of his father
  lexicon: HALOT
  rationale: The construct phrase naturally becomes the English possessive 'his father's'
    in idiomatic translation.
- source_word: בֵּית לָחֶם
  chosen: Bethlehem
  lexicon: HALOT
  rationale: This is the standard English transliteration of the place name בֵּית
    לָחֶם, following the translation philosophy of transliterating personal and place
    names.
- source_word: וְ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: HALOT
  rationale: The conjunction introduces a parenthetical explanatory note in the narrative
    flow. 'Now' signals this smoothly in modern English better than a mechanically
    repeated 'And.'
