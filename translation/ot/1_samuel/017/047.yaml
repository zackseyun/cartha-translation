theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.' This also aligns with the verse's covenantal-theological emphasis
    without introducing a transliterated form.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of יְהוֹשִׁיעַ in a military context
  chosen_reading: save
  alternative_readings:
  - deliver
  - give victory
  rationale: The verse concerns military deliverance, but the Hebrew verb ישׁע has
    broader theological resonance than mere battlefield success. 'Save' preserves
    that resonance while remaining intelligible in context.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
