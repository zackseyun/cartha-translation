id: 1SA.17.47
reference: 1 Samuel 17:47
source:
  edition: WLC
  text: וְ/יֵֽדְעוּ֙ כָּל הַ/קָּהָ֣ל הַ/זֶּ֔ה כִּֽי לֹ֛א בְּ/חֶ֥רֶב וּ/בַ/חֲנִ֖ית
    יְהוֹשִׁ֣יעַ יְהוָ֑ה כִּ֤י לַֽ/יהוָה֙ הַ/מִּלְחָמָ֔ה וְ/נָתַ֥ן אֶתְ/כֶ֖ם בְּ/יָדֵֽ/נוּ־־׃
translation:
  text: and all this assembly will know that the LORD does not save by sword or by
    spear; for the battle belongs to the LORD, and he will give you into our hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does not deliver by sword and spear.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the battle is the LORD's.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'into our hand'; the idiom means 'into our power' or 'over to us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵדְעוּ
  chosen: and ... will know
  alternatives:
  - and ... shall know
  - and ... may know
  lexicon: HALOT
  rationale: 'Qal imperfect 3mp of ידע here is best rendered as a future/result statement
    in David''s speech: the assembly will come to know. ''Will know'' is natural modern
    English while preserving the predictive force.'
- source_word: כָּל הַקָּהָל הַזֶּה
  chosen: all this assembly
  alternatives:
  - all this congregation
  - this whole assembly
  lexicon: HALOT
  rationale: קהל denotes the gathered body present. 'Assembly' is more natural and
    less ecclesiastically loaded than 'congregation' in this battle context. Word
    order 'all this assembly' closely reflects the Hebrew.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  lexicon: HALOT
  rationale: The first כִּי introduces the content of what the assembly will know,
    so 'that' fits better than causal 'for'.
- source_word: לֹא בְּחֶרֶב וּבַחֲנִית
  chosen: does not save by sword or by spear
  alternatives:
  - does not deliver with sword and spear
  - does not save by means of sword and spear
  lexicon: HALOT
  rationale: The paired weapons express means/instrument. 'By sword or by spear' is
    idiomatic English and preserves the sense that victory is not achieved through
    conventional weaponry. 'Or' reads naturally in English for a negated pair without
    materially changing sense.
- source_word: יְהוֹשִׁיעַ
  chosen: does not save
  alternatives:
  - does not deliver
  - does not give victory
  lexicon: HALOT
  rationale: Hiphil of ישׁע commonly means save/deliver. 'Save' preserves the lexical
    connection and theological breadth better than the narrower 'give victory,' while
    still fitting the military setting.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: כִּי לַיהוָה הַמִּלְחָמָה
  chosen: for the battle belongs to the LORD
  alternatives:
  - for the battle is the LORD's
  - because the war belongs to the LORD
  lexicon: HALOT
  rationale: The second כִּי is causal/explanatory. The lamed construction expresses
    possession or belonging. 'The battle belongs to the LORD' is clear, natural, and
    preserves the theological claim that the outcome is his.
- source_word: הַמִּלְחָמָה
  chosen: the battle
  alternatives:
  - the war
  - the fighting
  lexicon: HALOT
  rationale: In this immediate single-combat context, 'battle' is more idiomatic than
    'war,' though the Hebrew term can cover either.
- source_word: וְנָתַן
  chosen: and he will give
  alternatives:
  - and he has given
  - and he shall deliver
  lexicon: HALOT
  rationale: 'Though formally a qatal, in this speech context after a future-oriented
    declaration it functions predictively. Rendering as future in English best captures
    the sense: the LORD will hand over the enemy.'
- source_word: אֶתְכֶם בְּיָדֵנוּ
  chosen: you into our hand
  alternatives:
  - you into our hands
  - you over to us
  - you into our power
  lexicon: HALOT
  rationale: The idiom 'give into the hand of' means hand over into someone's power.
    'Into our hand' preserves the Hebrew idiom closely; singular 'hand' matches the
    Hebrew form, though English also allows plural.
