id: 1SA.17.58
reference: 1 Samuel 17:58
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלָי/ו֙ שָׁא֔וּל בֶּן מִ֥י אַתָּ֖ה הַ/נָּ֑עַר וַ/יֹּ֣אמֶר דָּוִ֔ד
    בֶּֽן עַבְדְּ/ךָ֥ יִשַׁ֖י בֵּ֥ית הַלַּחְמִֽי־־׃
translation:
  text: Saul said to him, “Whose son are you, young man?” And David said, “I am the
    son of your servant Jesse the Bethlehemite.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “The son of your servant Jesse, the Bethlehemite.” The
      Hebrew reply omits the explicit verb “I am.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן מִי
  chosen: Whose son
  alternatives:
  - Son of whom
  - Who is your father
  lexicon: HALOT
  rationale: The Hebrew idiom literally asks for paternal lineage. 'Whose son' is
    natural English and preserves the genealogical focus better than the more interpretive
    'Who is your father.'
- source_word: הַנָּעַר
  chosen: young man
  alternatives:
  - boy
  - youth
  lexicon: HALOT
  rationale: נַעַר can denote a boy, youth, or young man depending on context. Given
    David's role in the narrative as old enough for military service yet still youthful,
    'young man' best balances accuracy and natural English.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עֶבֶד can denote a slave or servant, here it functions as a
    deferential self-lowering expression in courtly speech. 'Your servant' best reflects
    the idiomatic politeness without importing the stronger bonded-status emphasis.
- source_word: בֵּית הַלַּחְמִי
  chosen: the Bethlehemite
  alternatives:
  - from Bethlehem
  - of Bethlehem
  lexicon: HALOT
  rationale: The gentilic form identifies Jesse by origin. 'The Bethlehemite' is concise
    and closely matches the Hebrew adjectival/national designation.
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  chosen: said ... said
  alternatives:
  - asked ... answered
  lexicon: HALOT
  rationale: Both clauses use the common verb 'say.' Retaining 'said' in both places
    stays closer to the Hebrew; the question itself makes Saul's speech function as
    an inquiry without needing to substitute 'asked.'
- source_word: בֶּן עַבְדְּךָ יִשַׁי
  chosen: I am the son of your servant Jesse
  alternatives:
  - The son of your servant Jesse
  - I am your servant Jesse's son
  lexicon: HALOT
  rationale: The Hebrew lacks an explicit copula, but English requires one for a complete
    reply. 'I am' is implied and makes the response idiomatic while preserving the
    filial identification.
