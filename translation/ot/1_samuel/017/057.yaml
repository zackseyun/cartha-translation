id: 1SA.17.57
reference: 1 Samuel 17:57
source:
  edition: WLC
  text: וּ/כְ/שׁ֣וּב דָּוִ֗ד מֵֽ/הַכּוֹת֙ אֶת הַ/פְּלִשְׁתִּ֔י וַ/יִּקַּ֤ח אֹת/וֹ֙
    אַבְנֵ֔ר וַ/יְבִאֵ֖/הוּ לִ/פְנֵ֣י שָׁא֑וּל וְ/רֹ֥אשׁ הַ/פְּלִשְׁתִּ֖י בְּ/יָדֽ/וֹ־׃
translation:
  text: When David returned from striking down the Philistine, Abner took him and
    brought him before Saul, with the Philistine’s head in his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and the Philistine’s head was in his hand.' The Hebrew
      uses a verbless clause that can be rendered either as a circumstantial phrase
      or as a more literal coordinate clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְשׁוּב
  chosen: When ... returned
  alternatives:
  - And when ... returned
  - as ... returned
  lexicon: HALOT
  rationale: The conjunction plus infinitive construct of שוב introduces a temporal
    clause. 'When ... returned' is natural modern English and preserves the sequence
    without over-literal awkwardness.
- source_word: מֵהַכּוֹת
  chosen: from striking down
  alternatives:
  - from killing
  - after defeating
  lexicon: HALOT
  rationale: נכה commonly means 'strike, smite,' and in context refers to David's
    lethal defeat of Goliath. 'Striking down' preserves the concrete verbal force
    better than the flatter 'defeating' while avoiding unnecessary repetition of 'killing.'
- source_word: הַפְּלִשְׁתִּי
  chosen: the Philistine
  alternatives:
  - the Philistine champion
  - Goliath
  lexicon: HALOT
  rationale: The Hebrew text says simply 'the Philistine.' Although the referent is
    Goliath, the translation preserves the source wording rather than substituting
    the proper name.
- source_word: וַיִּקַּח אֹתוֹ
  chosen: Abner took him
  alternatives:
  - Abner seized him
  - Abner brought him along
  lexicon: HALOT
  rationale: לקח with the object pronoun straightforwardly means 'took him.' 'Seized'
    is too forceful, and 'brought him along' anticipates the next verb.
- source_word: וַיְבִאֵהוּ לִפְנֵי שָׁאוּל
  chosen: brought him before Saul
  alternatives:
  - led him before Saul
  - brought him into Saul's presence
  lexicon: HALOT
  rationale: בוא in the hiphil means 'bring.' 'Before Saul' is the standard and clear
    rendering of לִפְנֵי here.
- source_word: וְרֹאשׁ הַפְּלִשְׁתִּי בְּיָדוֹ
  chosen: with the Philistine’s head in his hand
  alternatives:
  - and the Philistine's head was in his hand
  - while holding the Philistine's head
  lexicon: HALOT
  rationale: This verbless clause is naturally rendered in English as a circumstantial
    phrase. 'With ... in his hand' preserves the vivid image and likely refers to
    David as the nearest antecedent, while remaining idiomatic.
