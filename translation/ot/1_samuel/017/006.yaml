id: 1SA.17.6
reference: 1 Samuel 17:6
source:
  edition: WLC
  text: וּ/מִצְחַ֥ת נְחֹ֖שֶׁת עַל רַגְלָ֑י/ו וְ/כִיד֥וֹן נְחֹ֖שֶׁת בֵּ֥ין כְּתֵפָֽי/ו־׃
translation:
  text: And he had bronze greaves on his legs, and a bronze javelin slung between
    his shoulders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a bronze spear'; the Hebrew term may refer to a lighter spear-like weapon.
      Some have also understood it as another kind of weapon, but 'javelin' best fits
      the context here.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִצְחַת
  chosen: greaves
  alternatives:
  - shin guards
  - leg armor
  lexicon: HALOT
  rationale: The noun denotes protective armor for the lower legs. 'Greaves' is the
    standard precise English term for this piece of armor; 'shin guards' is more colloquial
    but less historically fitting.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  - brass
  lexicon: HALOT
  rationale: In ancient military contexts נְחֹשֶׁת commonly refers to bronze as the
    practical alloy used for weapons and armor. 'Brass' is anachronistic in many biblical
    contexts, and 'copper' is possible but less likely for armor here.
- source_word: עַל רַגְלָיו
  chosen: on his legs
  alternatives:
  - on his feet
  lexicon: HALOT
  rationale: Although רֶגֶל can refer broadly to foot/leg, with greaves the sense
    is clearly the lower legs rather than merely the feet.
- source_word: כִידוֹן
  chosen: javelin
  alternatives:
  - spear
  - scimitar
  - dagger
  lexicon: HALOT
  rationale: The term can denote a weapon associated with throwing or a lighter spear.
    In this context, 'javelin' best fits the likely distinction from the larger spear
    mentioned elsewhere in the passage. Some interpreters have proposed a curved sword
    or similar weapon, but that is less certain.
- source_word: בֵּין כְּתֵפָיו
  chosen: slung between his shoulders
  alternatives:
  - between his shoulders
  - on his back
  lexicon: HALOT
  rationale: The Hebrew is literally 'between his shoulders,' which in idiomatic English
    likely describes a weapon carried across the back. 'Slung between his shoulders'
    preserves the imagery while making the carrying position intelligible.
