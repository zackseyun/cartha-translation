id: 1SA.17.29
reference: 1 Samuel 17:29
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר דָּוִ֔ד מֶ֥ה עָשִׂ֖יתִי עָ֑תָּה הֲ/ל֖וֹא דָּבָ֥ר הֽוּא׃
translation:
  text: David said, “What have I done now? Was it not only a word?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Was it not just a matter?” The Hebrew word דָּבָר can mean “word,”
      “matter,” or “thing.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - answered
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר introducing direct speech; 'said'
    is the natural English narrative equivalent.
- source_word: דָּוִד
  chosen: David
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: מֶה עָשִׂיתִי עָתָּה
  chosen: What have I done now?
  alternatives:
  - What did I do now?
  - What have I done this time?
  lexicon: HALOT
  rationale: מֶה introduces the protest question; עָשִׂיתִי is first person singular
    'I have done/did'; עָתָּה here functions idiomatically in the exchange as 'now,'
    conveying David's exasperated response to Eliab's rebuke. Present perfect in English
    captures the immediate relevance of the action.
- source_word: הֲלוֹא
  chosen: Was it not
  alternatives:
  - Is it not
  - Surely
  lexicon: HALOT
  rationale: Interrogative particle expecting an affirmative answer. 'Was it not'
    fits the past-oriented protest in context and preserves the rhetorical force.
- source_word: דָּבָר
  chosen: only a word
  alternatives:
  - a word
  - a matter
  - just talk
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' In this context David appears
    to minimize his action as mere speech rather than some serious offense. 'Only
    a word' makes that sense explicit in natural English without overparaphrasing.
- source_word: הוּא
  chosen: it
  alternatives:
  - this
  - that
  lexicon: HALOT
  rationale: The pronoun refers back to the situation under discussion and is naturally
    rendered by English dummy subject 'it' in the idiom 'Was it not only a word?'
