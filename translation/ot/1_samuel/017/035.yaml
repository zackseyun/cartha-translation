id: 1SA.17.35
reference: 1 Samuel 17:35
source:
  edition: WLC
  text: וְ/יָצָ֧אתִי אַחֲרָ֛י/ו וְ/הִכִּתִ֖י/ו וְ/הִצַּ֣לְתִּי מִ/פִּ֑י/ו וַ/יָּ֣קָם
    עָלַ֔/י וְ/הֶחֱזַ֨קְתִּי֙ בִּ/זְקָנ֔/וֹ וְ/הִכִּתִ֖י/ו וַ/הֲמִיתִּֽי/ו׃
translation:
  text: I went out after it and struck it and rescued it from its mouth; and when
    it rose up against me, I seized it by its beard and struck it and killed it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after him' / 'from his mouth'; the Hebrew uses masculine singular suffixes
      for the animal.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'by its beard'; some translations render this more interpretively
      as 'by its mane' or 'by its jaw.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָאתִי
  chosen: I went out
  alternatives:
  - I went forth
  lexicon: HALOT
  rationale: The verb יצא in the qatal with prefixed conjunction here narrates David’s
    action in sequence. 'I went out' is natural modern English and preserves the concrete
    movement without archaic tone.
- source_word: אַחֲרָיו
  chosen: after it
  alternatives:
  - after him
  lexicon: HALOT
  rationale: The suffix is grammatically masculine singular, referring back to the
    predator (lion or bear) from the previous verse. English idiom commonly uses 'it'
    for an animal in narrative unless personification is intended; this avoids implying
    a human referent.
- source_word: וְהִכִּתִיו
  chosen: struck it
  alternatives:
  - smote it
  - attacked it
  - hit it
  lexicon: HALOT
  rationale: נכה is a broad verb for striking/striking down. 'Struck it' is sufficiently
    literal and leaves open whether the blow was immediately lethal, which matters
    because a later verb explicitly states killing.
- source_word: וְהִצַּלְתִּי
  chosen: rescued
  alternatives:
  - delivered
  - snatched away
  lexicon: HALOT
  rationale: נצל in the Hiphil commonly means to deliver or rescue. 'Rescued' is clear
    modern English and fits the context of saving the lamb from the predator.
- source_word: מִפִּיו
  chosen: from its mouth
  alternatives:
  - out of its mouth
  - from his mouth
  lexicon: HALOT
  rationale: Literally 'from its mouth.' 'Mouth' should be retained rather than generalized
    to 'jaws' to stay close to the Hebrew image, while 'its' matches the animal referent.
- source_word: וַיָּקָם עָלַי
  chosen: when it rose up against me
  alternatives:
  - and it arose against me
  - and it turned on me
  lexicon: HALOT
  rationale: קום על can denote rising against someone in hostile action. 'When it
    rose up against me' captures the temporal sense in context and the adversarial
    force without overinterpreting.
- source_word: וְהֶחֱזַקְתִּי
  chosen: I seized
  alternatives:
  - I took hold
  - I grabbed
  lexicon: HALOT
  rationale: The Hiphil of חזק here conveys taking firm hold. 'Seized' expresses decisive
    force in readable English.
- source_word: בִּזְקָנוֹ
  chosen: by its beard
  alternatives:
  - by its jaw
  - by the hair of its neck
  lexicon: HALOT
  rationale: זקן normally means 'beard.' Since the referent is an animal, some translations
    smooth this to 'mane' or 'jaw,' but the Hebrew specifically says 'beard,' which
    can naturally describe the shaggy chin area of a lion or bear. Retaining 'beard'
    preserves the vividness of the source.
- source_word: וְהִכִּתִיו
  chosen: struck it
  alternatives:
  - struck it down
  - hit it
  lexicon: HALOT
  rationale: The repeated נכה is rendered consistently as 'struck it.' The following
    verb 'killed it' carries the explicit lethal sense, so this verb should not be
    overloaded.
- source_word: וַהֲמִיתִּיו
  chosen: killed it
  alternatives:
  - put it to death
  - slew it
  lexicon: HALOT
  rationale: מות in the Hiphil means to cause to die, hence 'kill.' This is the climactic
    and explicit lethal action, distinguished from the earlier 'struck it'.
