id: 1SA.17.27
reference: 1 Samuel 17:27
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר ל/וֹ֙ הָ/עָ֔ם כַּ/דָּבָ֥ר הַ/זֶּ֖ה לֵ/אמֹ֑ר כֹּ֣ה יֵעָשֶׂ֔ה לָ/אִ֖ישׁ
    אֲשֶׁ֥ר יַכֶּֽ/נּוּ׃
translation:
  text: The people told him the same thing, saying, “This is what will be done for
    the man who strikes him down.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “who kills him.” The Hebrew verb can denote striking down in battle and
      may imply a fatal blow in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר לּוֹ הָעָם
  chosen: The people told him
  alternatives:
  - The people said to him
  - The troops told him
  lexicon: HALOT
  rationale: Though אמר commonly means 'say,' in English 'told him' fits the indirect-object
    construction naturally. הָעָם here refers to the people/soldiers present, not
    necessarily the nation as a whole; 'people' is the broadest accurate rendering.
- source_word: כַּדָּבָר הַזֶּה
  chosen: the same thing
  alternatives:
  - according to this word
  - like this statement
  lexicon: HALOT
  rationale: The idiom means they repeated the matter in the same terms. 'The same
    thing' communicates the sense idiomatically in modern English while staying close
    to the Hebrew.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - namely
  - as follows
  lexicon: HALOT
  rationale: Standard rendering introducing direct discourse or quoted content.
- source_word: כֹּה יֵעָשֶׂה
  chosen: This is what will be done
  alternatives:
  - Thus it shall be done
  - So shall it be done
  lexicon: HALOT
  rationale: Passive/imperfect construction indicates what will happen for the victor.
    'This is what will be done' is natural modern English and preserves the passive
    sense.
- source_word: לָאִישׁ
  chosen: for the man
  alternatives:
  - for the האיש
  - for the person
  lexicon: HALOT
  rationale: אִישׁ is singular masculine. Per translation philosophy, gender-accurate
    language is preferred where the source is masculine. Here 'man' fits the immediate
    context of a male warrior.
- source_word: אֲשֶׁר יַכֶּנּוּ
  chosen: who strikes him down
  alternatives:
  - who kills him
  - who defeats him
  lexicon: HALOT
  rationale: נכה can mean strike, smite, defeat, or kill depending on context. In
    the Goliath narrative the intended outcome is lethal combat, but the verb itself
    is broader than an explicit 'kill.' 'Strikes him down' preserves the martial force
    without over-specifying beyond the Hebrew form.
