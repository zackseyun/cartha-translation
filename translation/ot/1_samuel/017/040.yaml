id: 1SA.17.40
reference: 1 Samuel 17:40
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח מַקְל֜/וֹ בְּ/יָד֗/וֹ וַ/יִּבְחַר ל֣/וֹ חֲמִשָּׁ֣ה חַלֻּקֵֽי אֲבָנִ֣ים
    מִן הַ/נַּ֡חַל וַ/יָּ֣שֶׂם אֹ֠תָ/ם בִּ/כְלִ֨י הָ/רֹעִ֧ים אֲשֶׁר ל֛/וֹ וּ/בַ/יַּלְק֖וּט
    וְ/קַלְּע֣/וֹ בְ/יָד֑/וֹ וַ/יִּגַּ֖שׁ אֶל הַ/פְּלִשְׁתִּֽי־־׀־־־׃
translation:
  text: He took his staff in his hand and chose for himself five smooth stones from
    the wadi, and put them in the shepherd’s bag that he had, in the pouch; and his
    sling was in his hand. Then he approached the Philistine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brook' or 'streambed' for 'wadi' (Hebrew נַחַל), a term often used for
      a ravine or seasonal watercourse.
    reason: lexical_alternative
  - marker: b
    text: Or 'wallet' for 'pouch' (Hebrew יַלְקוּט), a small bag or satchel used for
      carrying items.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַקְלוֹ
  chosen: his staff
  alternatives:
  - his stick
  - his rod
  lexicon: HALOT
  rationale: מַקֵּל commonly denotes a staff or stick. 'Staff' is natural English
    and fits a shepherding context better than the more generic 'stick' or the weightier
    'rod'.
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - with him in hand
  lexicon: HALOT
  rationale: A straightforward locative/instrumental expression. Rendering it literally
    preserves the concrete action and the repeated emphasis on David's readiness.
- source_word: וַיִּבְחַר לוֹ
  chosen: chose for himself
  alternatives:
  - selected for himself
  - picked out for himself
  lexicon: HALOT
  rationale: The reflexive nuance of לּוֹ is preserved by 'for himself,' indicating
    deliberate personal selection rather than a bare 'chose.'
- source_word: חֲמִשָּׁה חַלֻּקֵי אֲבָנִים
  chosen: five smooth stones
  alternatives:
  - five smooth stone pieces
  - five polished stones
  lexicon: HALOT
  rationale: חַלֻּקֵי refers to smoothness/slipperiness; in context of stones from
    a streambed, 'smooth stones' is the idiomatic and precise rendering.
- source_word: מִן הַנַּחַל
  chosen: from the wadi
  alternatives:
  - from the brook
  - from the streambed
  - from the valley stream
  lexicon: HALOT
  rationale: נַחַל often denotes a seasonal watercourse or ravine rather than a perennial
    brook. 'Wadi' better reflects the Hebrew landscape term, in line with original-language
    primacy, while remaining understandable in modern English.
- source_word: בִּכְלִי הָרֹעִים
  chosen: in the shepherd’s bag
  alternatives:
  - in the shepherd's gear
  - in the shepherd's vessel
  lexicon: HALOT
  rationale: כְּלִי is broad ('article, vessel, implement'), but here the context
    of carrying stones points to a bag or container used by a shepherd. 'Bag' gives
    the likely sense in readable English.
- source_word: אֲשֶׁר לוֹ
  chosen: that he had
  alternatives:
  - that belonged to him
  - which was his
  lexicon: HALOT
  rationale: This relative clause simply identifies the bag as his own. 'That he had'
    is idiomatic and avoids overformal English.
- source_word: וּבַיַּלְקוּט
  chosen: in the pouch
  alternatives:
  - even in the pouch
  - namely, in the shepherd's pouch
  - and in the wallet
  lexicon: HALOT
  rationale: יַלְקוּט denotes a bag or pouch. Because it follows the broader כְּלִי
    phrase, it likely specifies the particular container. 'In the pouch' preserves
    the appositional clarification without awkwardness.
- source_word: וְקַלְּעוֹ בְיָדוֹ
  chosen: and his sling was in his hand
  alternatives:
  - with his sling in his hand
  - and his sling in his hand
  lexicon: HALOT
  rationale: The clause is verbless in Hebrew, so English supplies 'was' for clarity.
    This keeps the vivid inventory-like style while remaining grammatical.
- source_word: וַיִּגַּשׁ אֶל הַפְּלִשְׁתִּי
  chosen: Then he approached the Philistine
  alternatives:
  - and he came near to the Philistine
  - and he advanced toward the Philistine
  lexicon: HALOT
  rationale: נגשׁ means to approach or come near. 'Approached' is concise and natural;
    'Then' reflects the narrative progression of the waw-consecutive.
