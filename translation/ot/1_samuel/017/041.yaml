id: 1SA.17.41
reference: 1 Samuel 17:41
source:
  edition: WLC
  text: וַ/יֵּ֨לֶךְ֙ הַ/פְּלִשְׁתִּ֔י הֹלֵ֥ךְ וְ/קָרֵ֖ב אֶל דָּוִ֑ד וְ/הָ/אִ֛ישׁ נֹשֵׂ֥א
    הַ/צִּנָּ֖ה לְ/פָנָֽי/ו־׃
translation:
  text: And the Philistine came on, coming closer to David, with the man carrying
    the shield before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'advanced, going and drawing near to David.' The Hebrew uses a finite
      verb followed by participles to portray continued forward movement.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word for 'shield' (צִנָּה) can refer specifically to a large
      shield.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: came on
  alternatives:
  - went
  - advanced
  - came
  lexicon: HALOT
  rationale: הלך literally means 'went,' but in battle narrative with the following
    participles it describes forward movement toward an opponent. 'Came on' captures
    hostile advance in natural English without over-paraphrasing.
- source_word: הַפְּלִשְׁתִּי
  chosen: the Philistine
  alternatives:
  - the Philistine champion
  lexicon: HALOT
  rationale: The noun/adjectival ethnic designation is definite and singular. 'The
    Philistine' is the plain sense and matches the narrative's established referent
    without importing 'champion,' which is not present in this verse.
- source_word: הֹלֵךְ וְקָרֵב
  chosen: coming closer
  alternatives:
  - going and drawing near
  - advancing and drawing near
  - steadily approaching
  lexicon: HALOT
  rationale: 'The infinitive-like participial sequence intensifies and extends the
    motion: he was going/advancing and drawing near. ''Coming closer'' renders the
    progressive approach idiomatically in English while preserving the sense of continued
    movement.'
- source_word: אֶל דָּוִד
  chosen: to David
  alternatives:
  - toward David
  lexicon: HALOT
  rationale: אל marks direction toward David. 'To David' is straightforward and idiomatic
    here.
- source_word: וְהָאִישׁ
  chosen: with the man
  alternatives:
  - and the man
  lexicon: HALOT
  rationale: The clause is circumstantial rather than introducing a separate main
    action. Rendering with 'with the man' makes clear that the shield-bearer's position
    accompanies the Philistine's advance.
- source_word: נֹשֵׂא הַצִּנָּה
  chosen: carrying the shield
  alternatives:
  - bearing the shield
  - carrying the large shield
  lexicon: HALOT
  rationale: נשא means 'carry/bear.' צנה denotes a large shield. 'Carrying the shield'
    is clear modern English; 'large shield' is possible but not necessary in the main
    text since 'shield' suffices unless contrast is needed.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in front of him
  lexicon: HALOT
  rationale: The prepositional phrase indicates position ahead of the Philistine.
    'Before him' is concise and natural in narrative English.
