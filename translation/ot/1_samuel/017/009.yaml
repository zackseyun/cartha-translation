id: 1SA.17.9
reference: 1 Samuel 17:9
source:
  edition: WLC
  text: אִם יוּכַ֞ל לְ/הִלָּחֵ֤ם אִתִּ/י֙ וְ/הִכָּ֔/נִי וְ/הָיִ֥ינוּ לָ/כֶ֖ם לַ/עֲבָדִ֑ים
    וְ/אִם אֲנִ֤י אֽוּכַל ל/וֹ֙ וְ/הִכִּיתִ֔י/ו וִ/הְיִ֤יתֶם לָ֨/נוּ֙ לַ/עֲבָדִ֔ים
    וַ/עֲבַדְתֶּ֖ם אֹתָֽ/נוּ־־־׃
translation:
  text: If he is able to fight with me and strike me down, then we will be your slaves.
    But if I prevail against him and strike him down, then you will be our slaves
    and serve us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants' in both occurrences of עֲבָדִים; here 'slaves' is used because
      the context is national subjugation and bonded service after combat.
    reason: lexical_alternative
  - marker: b
    text: The verb יכל in 'if I prevail against him' can more literally express ability
      ('if I am able against him'), but in this combat context it carries the sense
      of overcoming or prevailing.
    reason: lexical_alternative
  - marker: c
    text: The verb נכה in both clauses may also be rendered 'kill' or 'defeat'; 'strike
      down' preserves the decisive force while leaving the wording closer to the Hebrew.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוּכַל
  chosen: is able
  alternatives:
  - can
  - prevails
  lexicon: HALOT
  rationale: From יכל, denoting ability or capability. 'Is able' preserves the conditional
    challenge more formally than the simpler 'can.'
- source_word: לְהִלָּחֵם אִתִּי
  chosen: to fight with me
  alternatives:
  - to fight me
  - to do battle with me
  lexicon: HALOT
  rationale: The Niphal infinitive of לחם with אֵת marks mutual combat. 'Fight with
    me' preserves the duel sense without overexpanding.
- source_word: וְהִכָּנִי
  chosen: and strike me down
  alternatives:
  - and kill me
  - and defeat me
  lexicon: HALOT
  rationale: From נכה, which can mean strike, smite, or kill depending on context.
    In this duel context the blow is decisive, so 'strike me down' captures the lethal/resultative
    sense without stating more than the Hebrew explicitly does.
- source_word: וְהָיִינוּ לָכֶם לַעֲבָדִים
  chosen: then we will be your slaves
  alternatives:
  - then we will be your servants
  lexicon: HALOT
  rationale: עֲבָדִים is best rendered 'slaves' here because the context is subjugation
    of one people to another after combat, making bonded status salient. This aligns
    with the project's guidance to use 'slave' where bonded nature is prominent.
- source_word: אֲנִי אוּכַל לוֹ
  chosen: I prevail against him
  alternatives:
  - I am able against him
  - I can overcome him
  lexicon: HALOT
  rationale: יכל with ל can express prevailing over someone, not merely abstract ability.
    'I prevail against him' fits the combat context better than a wooden 'I am able
    for him/against him.'
- source_word: וְהִכִּיתִיו
  chosen: and strike him down
  alternatives:
  - and kill him
  - and defeat him
  lexicon: HALOT
  rationale: Again from נכה. 'Strike him down' mirrors the first clause and preserves
    the decisive combat result without overcommitting to an explicit gloss of 'kill.'
- source_word: וִהְיִיתֶם לָנוּ לַעֲבָדִים
  chosen: then you will be our slaves
  alternatives:
  - then you will be our servants
  lexicon: HALOT
  rationale: Parallel to the earlier clause; consistency favors 'slaves' in this military-subjugation
    setting.
- source_word: וַעֲבַדְתֶּם אֹתָנוּ
  chosen: and serve us
  alternatives:
  - and work for us
  - and become subject to us
  lexicon: HALOT
  rationale: From עבד, the verbal expression of service rendered by slaves/subjugated
    people. 'Serve us' is the most natural English rendering and complements 'be our
    slaves' without redundancy.
