id: 1SA.17.46
reference: 1 Samuel 17:46
source:
  edition: WLC
  text: הַ/יּ֣וֹם הַ/זֶּ֡ה יְסַגֶּרְ/ךָ֩ יְהוָ֨ה בְּ/יָדִ֜/י וְ/הִכִּיתִ֗/ךָ וַ/הֲסִרֹתִ֤י
    אֶת רֹֽאשְׁ/ךָ֙ מֵ/עָלֶ֔י/ךָ וְ/נָ֨תַתִּ֜י פֶּ֣גֶר מַחֲנֵ֤ה פְלִשְׁתִּים֙ הַ/יּ֣וֹם
    הַ/זֶּ֔ה לְ/ע֥וֹף הַ/שָּׁמַ֖יִם וּ/לְ/חַיַּ֣ת הָ/אָ֑רֶץ וְ/יֵֽדְעוּ֙ כָּל הָ/אָ֔רֶץ
    כִּ֛י יֵ֥שׁ אֱלֹהִ֖ים לְ/יִשְׂרָאֵֽל־־׃
translation:
  text: This day Yahweh will deliver you into my hand, and I will strike you down
    and remove your head from you. And this day I will give the corpses of the Philistine
    camp to the birds of the sky and to the wild animals of the earth, so that all
    the earth may know that there is a God for Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that there is a God in Israel.' The Hebrew reads literally 'for Israel,'
      which may express covenantal relation or advocacy.
    reason: alternative_reading
lexical_decisions:
- source_word: יְסַגֶּרְךָ
  chosen: will deliver you into my hand
  alternatives:
  - will hand you over into my hand
  - will shut you up into my hand
  lexicon: HALOT
  rationale: The Hiphil of סגר here carries the sense of handing someone over to another's
    power. 'Deliver you into my hand' is idiomatic English and preserves the military/judicial
    force of the expression.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration
    of the divine name — rather than the traditional 'the LORD' substitution. This
    preserves the personal name God revealed to Israel rather than substituting a
    title.
- source_word: בְּיָדִי
  chosen: into my hand
  alternatives:
  - in my hand
  - into my power
  lexicon: HALOT
  rationale: The idiom denotes being given over to someone's power. 'Into my hand'
    keeps the Hebrew imagery while remaining natural in English.
- source_word: וְהִכִּיתִךָ
  chosen: I will strike you down
  alternatives:
  - I will strike you
  - I will kill you
  lexicon: HALOT
  rationale: נכה can mean strike, smite, or kill depending on context. 'Strike you
    down' fits the combat setting and anticipates death without over-paraphrasing.
- source_word: וַהֲסִרֹתִי אֶת רֹאשְׁךָ מֵעָלֶיךָ
  chosen: remove your head from you
  alternatives:
  - cut off your head
  - take your head from you
  lexicon: HALOT
  rationale: The Hebrew uses סור ('remove/turn aside') rather than the more explicit
    'cut off.' 'Remove your head from you' stays closer to the source while still
    clearly conveying decapitation in context.
- source_word: פֶּגֶר
  chosen: corpses
  alternatives:
  - carcasses
  - dead bodies
  lexicon: HALOT
  rationale: Although singular in form here, the following collective phrase and context
    support a collective sense. 'Corpses' is vivid, natural, and suitable for human
    bodies in battle.
- source_word: מַחֲנֵה פְלִשְׁתִּים
  chosen: the Philistine camp
  alternatives:
  - the camp of the Philistines
  - the Philistine army
  lexicon: HALOT
  rationale: The construct phrase most directly means 'camp of the Philistines.' In
    context it refers to the Philistine force as encamped. 'Philistine camp' is concise
    and faithful.
- source_word: לְעוֹף הַשָּׁמַיִם
  chosen: to the birds of the sky
  alternatives:
  - to the birds of heaven
  - to the birds
  lexicon: HALOT
  rationale: This is a standard Hebrew expression. 'Birds of the sky' preserves the
    imagery more closely than the more traditional 'fowls of the air' while remaining
    readable.
- source_word: וּלְחַיַּת הָאָרֶץ
  chosen: to the wild animals of the earth
  alternatives:
  - to the beasts of the earth
  - to the animals of the land
  lexicon: HALOT
  rationale: חַיָּה in this collocation refers to wild land animals. 'Wild animals
    of the earth' is clear modern English and preserves the scope of the phrase.
- source_word: וְיֵדְעוּ כָּל הָאָרֶץ
  chosen: so that all the earth may know
  alternatives:
  - and all the earth will know
  - that all the earth may know
  lexicon: HALOT
  rationale: The conjunction plus imperfect here expresses intended result/purpose
    in the flow of David's declaration. 'So that ... may know' makes that force explicit
    in natural English.
- source_word: כָּל הָאָרֶץ
  chosen: all the earth
  alternatives:
  - all the land
  - the whole world
  lexicon: HALOT
  rationale: In this context the phrase reaches beyond local territory to a wider
    public recognition of Israel's God. 'All the earth' preserves the Hebrew wording
    and rhetorical breadth.
- source_word: יֵשׁ אֱלֹהִים לְיִשְׂרָאֵל
  chosen: there is a God for Israel
  alternatives:
  - there is a God in Israel
  - Israel has a God
  lexicon: HALOT
  rationale: The preposition ל can indicate relation or possession. 'For Israel' is
    the most direct rendering of the Hebrew as given and emphasizes God's covenantal
    commitment to Israel. The common alternative 'in Israel' is worth preserving in
    a footnote because it is idiomatic and traditional.
