theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine,
    the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant
    name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relation expressed in לְיִשְׂרָאֵל
  chosen_reading: there is a God for Israel
  alternative_readings:
  - there is a God in Israel
  - Israel has a God
  rationale: The Hebrew preposition ל most directly means 'for/to,' and this wording
    highlights God's covenantal advocacy for Israel without importing more than the
    text states. Because 'in Israel' is a longstanding and plausible idiomatic rendering,
    it is preserved in a footnote rather than excluded.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve theological
    tension rather than resolve it)
