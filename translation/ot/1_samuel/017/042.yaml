id: 1SA.17.42
reference: 1 Samuel 17:42
source:
  edition: WLC
  text: וַ/יַּבֵּ֧ט הַ/פְּלִשְׁתִּ֛י וַ/יִּרְאֶ֥ה אֶת דָּוִ֖ד וַ/יִּבְזֵ֑/הוּ כִּֽי
    הָיָ֣ה נַ֔עַר וְ/אַדְמֹנִ֖י עִם יְפֵ֥ה מַרְאֶֽה־־־׃
translation:
  text: When the Philistine looked and saw David, he despised him, because he was
    a youth, ruddy and handsome in appearance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'red-haired'; the Hebrew adjective can denote reddish coloring more generally,
      not necessarily hair color alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּבֵּט
  chosen: looked
  alternatives:
  - gazed
  - looked closely
  lexicon: HALOT
  rationale: The verb נבט conveys directing one's gaze or looking. 'Looked' is natural
    English and sufficient here; the following verb 'saw' preserves the Hebrew sequence
    without overtranslating the first verb.
- source_word: הַפְּלִשְׁתִּי
  chosen: the Philistine
  alternatives:
  - the Philistine champion
  lexicon: HALOT
  rationale: The noun is simply 'the Philistine.' Although context identifies Goliath,
    the Hebrew here uses the ethnic designation, so the translation preserves it.
- source_word: וַיִּרְאֶה אֶת־דָּוִד
  chosen: saw David
  alternatives:
  - caught sight of David
  lexicon: HALOT
  rationale: ראה is the common verb 'see.' 'Saw David' is the plain sense and keeps
    the narrative progression from looking to seeing.
- source_word: וַיִּבְזֵהוּ
  chosen: he despised him
  alternatives:
  - he disdained him
  - he treated him with contempt
  lexicon: HALOT
  rationale: בזה denotes despising or holding in contempt. 'Despised him' is concise,
    idiomatic, and preserves the personal object suffix.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Goliath's contempt. 'Because' is
    clearer in modern English than the more formal 'for.'
- source_word: הָיָה נַעַר
  chosen: he was a youth
  alternatives:
  - he was a boy
  - he was young
  lexicon: HALOT
  rationale: נַעַר can mean boy, youth, or young man depending on context. 'Youth'
    best captures David's relative youngness without implying small childhood.
- source_word: אַדְמֹנִי
  chosen: ruddy
  alternatives:
  - red-haired
  - reddish
  lexicon: HALOT
  rationale: The adjective describes a reddish complexion or coloring. 'Ruddy' is
    the standard concise rendering in English Bible style and fits the likely sense
    better than the more specific 'red-haired,' which the Hebrew does not require.
- source_word: עִם יְפֵה מַרְאֶה
  chosen: and handsome in appearance
  alternatives:
  - with a handsome appearance
  - and of handsome appearance
  - and good-looking
  lexicon: HALOT
  rationale: The phrase literally combines 'with' plus 'beautiful/fair of appearance.'
    In idiomatic English, 'handsome in appearance' preserves the descriptive force
    without awkwardness. 'Handsome' fits a male subject better than 'beautiful' in
    contemporary English.
