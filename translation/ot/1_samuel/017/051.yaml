id: 1SA.17.51
reference: 1 Samuel 17:51
source:
  edition: WLC
  text: וַ/יָּ֣רָץ דָּ֠וִד וַ/יַּעֲמֹ֨ד אֶל הַ/פְּלִשְׁתִּ֜י וַ/יִּקַּ֣ח אֶת חַ֠רְבּ/וֹ
    וַֽ/יִּשְׁלְפָ֤/הּ מִ/תַּעְרָ/הּ֙ וַ/יְמֹ֣תְתֵ֔/הוּ וַ/יִּכְרָת בָּ֖/הּ אֶת רֹאשׁ֑/וֹ
    וַ/יִּרְא֧וּ הַ/פְּלִשְׁתִּ֛ים כִּֽי מֵ֥ת גִּבּוֹרָ֖/ם וַ/יָּנֻֽסוּ־־־־־׃
translation:
  text: Then David ran and stood over the Philistine, took his sword, drew it from
    its sheath, and killed him; then he cut off his head with it. When the Philistines
    saw that their champion was dead, they fled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stood by the Philistine.' The Hebrew expression can denote taking one's
      position near him; 'stood over' reflects the likely scene of David standing
      above the fallen Goliath.
    reason: lexical_alternative
  - marker: b
    text: Or 'their mighty man' or 'their warrior.' The translation 'champion' reflects
      Goliath's role in representative combat earlier in the chapter.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרָץ
  chosen: ran
  alternatives:
  - rushed
  lexicon: HALOT
  rationale: Basic narrative verb from רוץ, best rendered simply as 'ran' in fluent
    English.
- source_word: וַיַּעֲמֹד אֶל הַפְּלִשְׁתִּי
  chosen: stood over the Philistine
  alternatives:
  - stood by the Philistine
  - came to the Philistine
  lexicon: HALOT
  rationale: The idiom with עמד אל after David's approach suggests taking position
    over or beside the fallen Goliath. 'Stood over' fits the immediate context of
    seizing the sword from the defeated man.
- source_word: חַרְבּוֹ
  chosen: his sword
  lexicon: HALOT
  rationale: 'Straightforward possessive: the Philistine''s own sword.'
- source_word: וַיִּשְׁלְפָהּ מִתַּעְרָהּ
  chosen: drew it from its sheath
  alternatives:
  - pulled it from its sheath
  lexicon: HALOT
  rationale: שלף commonly means draw a weapon; 'sheath' is the natural rendering of
    תער in this context.
- source_word: וַיְמֹתְתֵהוּ
  chosen: killed him
  alternatives:
  - put him to death
  lexicon: HALOT
  rationale: Causative/intensive form from מות. Although Goliath had already been
    mortally struck in the prior verse, this clause narrates the finishing act with
    the sword. 'Killed him' is the most natural English rendering, with the narrative
    sequence preserved.
- source_word: וַיִּכְרָת בָּהּ אֶת רֹאשׁוֹ
  chosen: he cut off his head with it
  alternatives:
  - he severed his head with it
  lexicon: HALOT
  rationale: כרת with ראשׁ denotes cutting off the head; 'with it' clearly refers
    back to the sword.
- source_word: גִּבּוֹרָם
  chosen: their champion
  alternatives:
  - their mighty man
  - their warrior
  - their hero
  lexicon: HALOT
  rationale: גבור can mean mighty man/warrior, but in this battle context 'champion'
    best captures Goliath's representative-combat role established in the chapter.
- source_word: וַיָּנֻסוּ
  chosen: they fled
  alternatives:
  - they ran away
  lexicon: HALOT
  rationale: Standard military-flight verb; 'fled' is concise and idiomatic.
