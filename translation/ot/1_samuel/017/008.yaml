theological_decisions:
- issue: Rendering עֲבָדִים in a politically and socially charged taunt
  chosen_reading: slaves of Saul
  alternative_readings:
  - servants of Saul
  rationale: No doctrinal controversy is at stake, but the translation philosophy
    prefers stronger bonded-language where the subordinate status is salient. In Goliath's
    insult, the term is intentionally degrading, so 'slaves' best conveys the force.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος by analogy of bonded-status rendering
- issue: Gendered term אִישׁ
  chosen_reading: a man
  alternative_readings:
  - someone
  - a warrior
  rationale: The Hebrew explicitly uses the masculine singular noun and the context
    is representative single combat. Per the project's gender-accurate policy, the
    masculine should be retained rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
