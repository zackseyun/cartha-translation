id: 1SA.17.8
reference: 1 Samuel 17:8
source:
  edition: WLC
  text: וַֽ/יַּעֲמֹ֗ד וַ/יִּקְרָא֙ אֶל מַעַרְכֹ֣ת יִשְׂרָאֵ֔ל וַ/יֹּ֣אמֶר לָ/הֶ֔ם
    לָ֥/מָּה תֵצְא֖וּ לַ/עֲרֹ֣ךְ מִלְחָמָ֑ה הֲ/ל֧וֹא אָנֹכִ֣י הַ/פְּלִשְׁתִּ֗י וְ/אַתֶּם֙
    עֲבָדִ֣ים לְ/שָׁא֔וּל בְּרוּ לָ/כֶ֥ם אִ֖ישׁ וְ/יֵרֵ֥ד אֵלָֽ/י־־׃
translation:
  text: He stood and called out to the battle lines of Israel and said to them, “Why
    do you come out to line up for battle? Am I not the Philistine, and are you not
    slaves of Saul? Choose a man for yourselves, and let him come down to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “servants of Saul.” The Hebrew עֲבָדִים can denote either servants or
      slaves; here “slaves” preserves the insulting force of Goliath’s taunt.
    reason: lexical_alternative
  - marker: b
    text: Or “draw up for battle.” The Hebrew expression literally refers to arranging
      or lining up for combat.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד
  chosen: He stood
  alternatives:
  - He took his stand
  - He stood up
  lexicon: HALOT
  rationale: The verb עמד in narrative commonly means 'stand' or 'take one's stand.'
    'He stood' is concise and natural, while preserving the physical and confrontational
    posture.
- source_word: וַיִּקְרָא
  chosen: called out
  alternatives:
  - cried out
  - called
  lexicon: HALOT
  rationale: קרא here introduces a loud public address across opposing lines. 'Called
    out' captures the elevated, confrontational sense better than the flatter 'called.'
- source_word: מַעַרְכוֹת יִשְׂרָאֵל
  chosen: the battle lines of Israel
  alternatives:
  - the ranks of Israel
  - the armies of Israel
  lexicon: HALOT
  rationale: מַעַרְכוֹת refers to arranged battle formations. 'Battle lines' preserves
    the military formation sense more precisely than the broader 'armies.'
- source_word: לָמָּה תֵצְאוּ
  chosen: Why do you come out
  alternatives:
  - Why are you coming out
  - Why do you go out
  lexicon: HALOT
  rationale: The imperfect addresses their present action in vivid speech. 'Come out'
    is idiomatic in direct taunt and fits the immediate scene.
- source_word: לַעֲרֹךְ מִלְחָמָה
  chosen: to line up for battle
  alternatives:
  - to arrange battle
  - to fight
  - to draw up for battle
  lexicon: HALOT
  rationale: ערך with מלחמה is literally to arrange or draw up for battle. 'Line up
    for battle' is readable modern English that retains the formation imagery.
- source_word: הֲלוֹא
  chosen: Am I not ... and are you not ...?
  alternatives:
  - Is it not that I am ... and you are ...?
  lexicon: HALOT
  rationale: The particle introduces a rhetorical assertion expecting agreement. Rendering
    it with English rhetorical questions preserves the taunting force.
- source_word: אָנֹכִי הַפְּלִשְׁתִּי
  chosen: Am I not the Philistine
  alternatives:
  - Am I not a Philistine
  lexicon: HALOT
  rationale: 'The definite article is significant in context: Goliath presents himself
    as the representative champion of the Philistines. ''The Philistine'' preserves
    that representative force.'
- source_word: עֲבָדִים לְשָׁאוּל
  chosen: slaves of Saul
  alternatives:
  - servants of Saul
  lexicon: HALOT
  rationale: עֲבָדִים can mean servants or slaves, but in this taunt Goliath is belittling
    Israel as subordinates under Saul. Following the project's philosophy, 'slaves'
    better preserves the demeaning bonded sense here.
- source_word: בְּרוּ לָכֶם אִישׁ
  chosen: Choose a man for yourselves
  alternatives:
  - Select a man for yourselves
  - Choose yourselves a man
  lexicon: HALOT
  rationale: ברה in the imperative means choose/select. 'A man' should be retained
    rather than neutralized, since the Hebrew is singular masculine and refers to
    a male combatant.
- source_word: וְיֵרֵד אֵלַי
  chosen: and let him come down to me
  alternatives:
  - and let him go down to me
  - and he shall come down to me
  lexicon: HALOT
  rationale: The jussive sense after the imperative is well represented by 'let him.'
    'Come down' is more natural in English direct speech than 'go down,' while preserving
    the directional ירד.
