id: 1SA.17.31
reference: 1 Samuel 17:31
source:
  edition: WLC
  text: וַ/יְּשָּֽׁמְעוּ֙ הַ/דְּבָרִ֔ים אֲשֶׁ֖ר דִּבֶּ֣ר דָּוִ֑ד וַ/יַּגִּ֥דוּ לִ/פְנֵֽי
    שָׁא֖וּל וַ/יִּקָּחֵֽ/הוּ־׃
translation:
  text: When the words that David had spoken were heard, they reported them before
    Saul, and he had him brought.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and he took him.' The Hebrew likely means Saul had
      David brought before him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְּשָּׁמְעוּ
  chosen: were heard
  alternatives:
  - they heard
  lexicon: HALOT
  rationale: The verb שמע in this form can be rendered actively ('they heard') or
    with an impersonal/passive sense in English. Given the following plural verb 'they
    reported,' rendering this clause as 'were heard' avoids introducing an unspecified
    subject and matches natural English narrative style.
- source_word: הַדְּבָרִים
  chosen: the words
  alternatives:
  - the things
  - the statements
  lexicon: HALOT
  rationale: דבר commonly means 'word(s),' 'matter,' or 'thing(s).' Here it refers
    to David's spoken remarks, so 'words' best preserves the speech context.
- source_word: אֲשֶׁר דִּבֶּר דָּוִד
  chosen: that David had spoken
  alternatives:
  - which David spoke
  - that David said
  lexicon: HALOT
  rationale: This relative clause identifies the content just mentioned. 'Had spoken'
    fits the English narrative sequence smoothly and preserves the verbal sense without
    over-paraphrase.
- source_word: וַיַּגִּדוּ
  chosen: they reported
  alternatives:
  - they told
  - they declared
  lexicon: HALOT
  rationale: נגד often carries the sense of making something known or reporting it.
    'Reported' fits the context of relaying David's words to Saul.
- source_word: לִפְנֵי שָׁאוּל
  chosen: before Saul
  alternatives:
  - to Saul
  - in Saul's presence
  lexicon: HALOT
  rationale: Literally 'before Saul.' This can idiomatically mean in his presence
    or to him. 'Before Saul' preserves the Hebrew expression while remaining clear
    in English.
- source_word: וַיִּקָּחֵהוּ
  chosen: he had him brought
  alternatives:
  - he took him
  - he brought him
  lexicon: HALOT
  rationale: Although לקח literally means 'take,' in this court setting with Saul
    as subject and David as object, the sense is that Saul caused David to be brought
    into his presence. 'Had him brought' conveys the likely idiomatic force more accurately
    than the overly literal 'took him.'
