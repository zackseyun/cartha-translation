id: 1SA.17.7
reference: 1 Samuel 17:7
source:
  edition: WLC
  text: ו/חץ חֲנִית֗/וֹ כִּ/מְנוֹר֙ אֹֽרְגִ֔ים וְ/לַהֶ֣בֶת חֲנִית֔/וֹ שֵׁשׁ מֵא֥וֹת
    שְׁקָלִ֖ים בַּרְזֶ֑ל וְ/נֹשֵׂ֥א הַ/צִּנָּ֖ה הֹלֵ֥ךְ לְ/פָנָֽי/ו־׃
translation:
  text: The shaft of his spear was like a weaver’s beam, and the iron head of his
    spear weighed six hundred shekels; and the bearer of the shield went before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the large shield'; the Hebrew term can denote a full-sized body shield
      rather than a smaller buckler.
    reason: lexical_alternative
lexical_decisions:
- source_word: חץ
  chosen: shaft
  alternatives:
  - wooden shaft
  - staff
  lexicon: HALOT
  rationale: In context with 'his spear' and the comparison to a weaver’s beam, the
    term refers to the spear’s shaft rather than an arrow. 'Shaft' is the most natural
    modern English term for the long pole of the weapon.
- source_word: חֲנִיתוֹ
  chosen: his spear
  alternatives:
  - his lance
  lexicon: HALOT
  rationale: Standard rendering for the weapon named here. 'Spear' is idiomatic and
    fits the military description.
- source_word: כמנור ארגים
  chosen: like a weaver’s beam
  alternatives:
  - like the beam of weavers
  - like a loom-beam
  lexicon: HALOT
  rationale: This is a conventional comparison describing the thickness or heaviness
    of the spear shaft. 'Weaver’s beam' is clear, natural English and preserves the
    image.
- source_word: להבת חניתו
  chosen: the iron head of his spear
  alternatives:
  - the blade of his spear
  - the point of his spear
  lexicon: HALOT
  rationale: להבת literally denotes a blade/flame-like edge, but for a spear in English
    'head' best communicates the metal striking part without implying a sword-like
    blade. 'Iron' is carried forward from ברזל to specify the material of the spearhead.
- source_word: שש מאות שקלים ברזל
  chosen: weighed six hundred shekels
  alternatives:
  - was six hundred shekels of iron
  - was of six hundred shekels of iron
  lexicon: HALOT
  rationale: 'The Hebrew is elliptical: ''six hundred shekels of iron.'' In English,
    supplying ''weighed'' makes the sense explicit while remaining faithful. The material
    ''iron'' modifies the spearhead.'
- source_word: נשא הצנה
  chosen: the bearer of the shield
  alternatives:
  - the shield-bearer
  - the one carrying the large shield
  lexicon: HALOT
  rationale: The phrase denotes the person carrying Goliath’s large shield. 'Bearer
    of the shield' stays close to the Hebrew structure while remaining readable.
- source_word: צנה
  chosen: shield
  alternatives:
  - large shield
  lexicon: HALOT
  rationale: צנה often refers to a large body shield. The simple 'shield' is retained
    in the main text for readability, with the more specific nuance preserved in a
    footnote.
- source_word: הלך לפניו
  chosen: went before him
  alternatives:
  - walked in front of him
  - went ahead of him
  lexicon: HALOT
  rationale: A straightforward rendering of the participial clause indicating attendant
    movement in front of Goliath.
