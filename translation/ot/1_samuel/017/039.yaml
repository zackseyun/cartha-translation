id: 1SA.17.39
reference: 1 Samuel 17:39
source:
  edition: WLC
  text: וַ/יַּחְגֹּ֣ר דָּוִ֣ד אֶת חַ֠רְבּ/וֹ מֵ/עַ֨ל לְ/מַדָּ֜י/ו וַ/יֹּ֣אֶל לָ/לֶכֶת֮
    כִּ֣י לֹֽא נִסָּה֒ וַ/יֹּ֨אמֶר דָּוִ֜ד אֶל שָׁא֗וּל לֹ֥א אוּכַ֛ל לָ/לֶ֥כֶת בָּ/אֵ֖לֶּה
    כִּ֣י לֹ֣א נִסִּ֑יתִי וַ/יְסִרֵ֥/ם דָּוִ֖ד מֵ/עָלָֽי/ו־־־׃
translation:
  text: And David strapped his sword over his armor and tried to go, for he had not
    tested them. But David said to Saul, “I cannot go with these, for I have not tested
    them.” So David removed them from himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for he had not tried them”; the Hebrew verb can denote testing by use
      or experience.
    reason: lexical_alternative
  - marker: b
    text: “Armor” renders a term that can more broadly mean garments or attire, but
      here the military context favors armor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחְגֹּר
  chosen: strapped
  alternatives:
  - girded
  - fastened on
  lexicon: HALOT
  rationale: The verb חגר refers to girding or fastening on equipment, especially
    a weapon. 'Strapped' is natural modern English for putting a sword on over armor
    while preserving the concrete action.
- source_word: חַרְבּוֹ
  chosen: his sword
  lexicon: HALOT
  rationale: Standard rendering of חֶרֶב with 3ms suffix. No contextual reason to
    broaden or narrow the sense.
- source_word: מֵעַל לְמַדָּיו
  chosen: over his armor
  alternatives:
  - over his garments
  - over his clothes
  lexicon: HALOT
  rationale: לְמַדִּים can denote military attire/armor in this context, not ordinary
    clothing. Since the surrounding verses describe Saul's armor being placed on David,
    'armor' best matches the immediate context and avoids undertranslating the military
    setting.
- source_word: וַיֹּאֶל לָלֶכֶת
  chosen: tried to go
  alternatives:
  - was willing to go
  - undertook to go
  - ventured to go
  lexicon: HALOT
  rationale: The idiom with יאל plus infinitive can mean to undertake, consent, or
    venture to do something. Here David attempts movement in the unfamiliar armor
    before objecting, so 'tried to go' best fits the narrative flow.
- source_word: כִּי לֹא נִסָּה
  chosen: for he had not tested them
  alternatives:
  - for he had not tried them
  - for he was not accustomed to them
  lexicon: HALOT
  rationale: נסה in the piel commonly means to test or try. The plural object is implicit
    from the equipment just mentioned. 'Tested them' preserves the experiential sense
    without importing the interpretive expansion 'accustomed to them' into the main
    text.
- source_word: לֹא אוּכַל לָלֶכֶת בָּאֵלֶּה
  chosen: I cannot go with these
  alternatives:
  - I cannot walk in these
  - I am not able to go with these
  lexicon: HALOT
  rationale: הלך here means to go/move, and בָּאֵלֶּה refers to the armor/weapons.
    'Go with these' is idiomatic and broad enough to include movement into battle,
    not merely walking.
- source_word: לֹא נִסִּיתִי
  chosen: I have not tested them
  alternatives:
  - I have not tried them
  - I am not used to them
  lexicon: HALOT
  rationale: Repeats the same verb as earlier in first person. For consistency, the
    same core gloss is maintained. The object remains implicit in Hebrew but explicit
    in English for clarity.
- source_word: וַיְסִרֵם ... מֵעָלָיו
  chosen: removed them from himself
  alternatives:
  - took them off
  - put them off
  lexicon: HALOT
  rationale: סור in the hiphil means remove/turn aside. 'Removed them from himself'
    closely follows the Hebrew construction and makes the referent of 'them' clear
    as the armor and gear. 'Took them off' is possible but slightly more colloquial
    and less formally transparent.
