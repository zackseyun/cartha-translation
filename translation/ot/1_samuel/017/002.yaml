id: 1SA.17.2
reference: 1 Samuel 17:2
source:
  edition: WLC
  text: וְ/שָׁא֤וּל וְ/אִֽישׁ יִשְׂרָאֵל֙ נֶאֶסְפ֔וּ וַֽ/יַּחֲנ֖וּ בְּ/עֵ֣מֶק הָאֵלָ֑ה
    וַ/יַּעַרְכ֥וּ מִלְחָמָ֖ה לִ/קְרַ֥את פְּלִשְׁתִּֽים־׃
translation:
  text: And Saul and the men of Israel gathered together and camped in the Valley
    of Elah, and they drew up for battle against the Philistines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to meet the Philistines' / 'facing the Philistines.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁאוּל
  chosen: And Saul
  alternatives:
  - Now Saul
  - Saul
  lexicon: HALOT
  rationale: The conjunction links this verse to the preceding narrative, so 'And
    Saul' preserves Hebrew narrative flow without overinterpreting the conjunction.
- source_word: וְאִישׁ יִשְׂרָאֵל
  chosen: and the men of Israel
  alternatives:
  - and every man of Israel
  - and the army of Israel
  - and the Israelites
  lexicon: HALOT
  rationale: The singular אִישׁ with a collective sense commonly means 'men.' 'The
    men of Israel' is gender-accurate and reflects the Hebrew more closely than the
    more interpretive 'army of Israel' or the more generalized 'Israelites.'
- source_word: נֶאֶסְפוּ
  chosen: gathered together
  alternatives:
  - assembled
  - were gathered
  lexicon: HALOT
  rationale: The Niphal form conveys being gathered/assembling. 'Gathered together'
    is idiomatic English and preserves the collective military mustering sense.
- source_word: וַיַּחֲנוּ
  chosen: camped
  alternatives:
  - encamped
  - pitched camp
  lexicon: HALOT
  rationale: The verb refers to setting up camp. 'Camped' is clear modern English;
    'encamped' is more formal but less natural.
- source_word: בְּעֵמֶק הָאֵלָה
  chosen: in the Valley of Elah
  alternatives:
  - in the vale of Elah
  - in Elah Valley
  lexicon: HALOT
  rationale: עֵמֶק is best rendered 'valley.' הָאֵלָה is a place name here, so it
    is transliterated as 'Elah' in keeping with the philosophy of transliterating
    names.
- source_word: וַיַּעַרְכוּ מִלְחָמָה
  chosen: they drew up for battle
  alternatives:
  - they arranged the battle line
  - they set the battle in order
  - they prepared for war
  lexicon: HALOT
  rationale: The idiom means to arrange troops in battle formation. 'Drew up for battle'
    captures the military sense in natural English better than a wooden rendering
    like 'arranged battle.'
- source_word: לִקְרַאת פְּלִשְׁתִּים
  chosen: against the Philistines
  alternatives:
  - to meet the Philistines
  - opposite the Philistines
  - facing the Philistines
  lexicon: HALOT
  rationale: Literally 'to meet/facing the Philistines,' but in this military context
    the sense is adversative. 'Against the Philistines' communicates the intended
    battle posture clearly.
