id: 1SA.17.45
reference: 1 Samuel 17:45
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר דָּוִד֙ אֶל הַ/פְּלִשְׁתִּ֔י אַתָּה֙ בָּ֣א אֵלַ֔/י בְּ/חֶ֖רֶב
    וּ/בַ/חֲנִ֣ית וּ/בְ/כִיד֑וֹן וְ/אָנֹכִ֣י בָֽא אֵלֶ֗י/ךָ בְּ/שֵׁם֙ יְהוָ֣ה צְבָא֔וֹת
    אֱלֹהֵ֛י מַעַרְכ֥וֹת יִשְׂרָאֵ֖ל אֲשֶׁ֥ר חֵרַֽפְתָּ־־׃
translation:
  text: Then David said to the Philistine, “You come to me with a sword, with a spear,
    and with a javelin, but I come to you in the name of the LORD of Armies, the God
    of the ranks of Israel, whom you have defied.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the LORD of hosts.”
    reason: lexical_alternative
  - marker: b
    text: Or “the God of the armies of Israel” or “the God of Israel’s battle lines.”
    reason: lexical_alternative
  - marker: c
    text: “Defied” may also be rendered “reproached” or “taunted,” but here it carries
      the sense of contemptuous challenge against the God of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force.
- source_word: הַפְּלִשְׁתִּי
  chosen: the Philistine
  alternatives:
  - the Philistine warrior
  lexicon: HALOT
  rationale: The noun identifies Goliath by ethnicity/national affiliation. 'The Philistine'
    is the plain and established sense without adding 'warrior,' which is contextually
    true but not explicit here.
- source_word: בָּא אֵלַי / בָא אֵלֶיךָ
  chosen: come to me / come to you
  alternatives:
  - are coming against me / am coming against you
  lexicon: HALOT
  rationale: The participial form conveys present/imminent action. 'Come to' is the
    most direct rendering; the hostile sense is already supplied by context, so 'against'
    is not necessary in the main text.
- source_word: בְּחֶרֶב
  chosen: with a sword
  alternatives:
  - by a sword
  lexicon: HALOT
  rationale: The preposition ב marks means/instrument. 'With a sword' is idiomatic
    English for weaponry.
- source_word: וּבַחֲנִית
  chosen: with a spear
  alternatives:
  - with a lance
  lexicon: HALOT
  rationale: חֲנִית commonly denotes a spear/lance. 'Spear' is the clearest modern
    English term.
- source_word: וּבְכִידוֹן
  chosen: with a javelin
  alternatives:
  - with a dart
  - with a short spear
  lexicon: HALOT
  rationale: כִּידוֹן denotes a thrown or lighter spear-type weapon. 'Javelin' best
    distinguishes it from חֲנִית while remaining natural English.
- source_word: בְּשֵׁם
  chosen: in the name of
  alternatives:
  - by the name of
  - under the authority of
  lexicon: HALOT
  rationale: The phrase carries agency/authority and representation. 'In the name
    of' preserves the biblical idiom and its theological weight better than a paraphrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and the Septuagintal pattern.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  lexicon: HALOT
  rationale: צְבָאוֹת refers to armies/hosts. 'Of Armies' is more transparent to modern
    readers than the traditional but less immediately clear 'of hosts.'
- source_word: אֱלֹהֵי מַעַרְכוֹת יִשְׂרָאֵל
  chosen: the God of the ranks of Israel
  alternatives:
  - the God of the armies of Israel
  - the God of Israel's battle lines
  lexicon: HALOT
  rationale: מַעַרְכוֹת refers to battle lines, ranks, or arranged forces. 'Ranks'
    preserves the military arrangement sense and echoes the immediate battlefield
    context without collapsing it into a generic 'armies.'
- source_word: אֲשֶׁר חֵרַפְתָּ
  chosen: whom you have defied
  alternatives:
  - whom you have reproached
  - whom you have taunted
  lexicon: HALOT
  rationale: The verb חרף in this context is not mere insult but contemptuous challenge
    against God. 'Defied' best captures the covenantal and confrontational force in
    natural English.
