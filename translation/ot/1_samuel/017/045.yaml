theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves reverential convention while remaining transparent in
    English Bible style.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering יְהוָה צְבָאוֹת
  chosen_reading: the LORD of Armies
  alternative_readings:
  - the LORD of hosts
  rationale: The title is translated rather than left in traditional ecclesiastical
    form. 'Of Armies' communicates the Hebrew meaning clearly to modern readers while
    preserving the martial and sovereign sense of the title.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
