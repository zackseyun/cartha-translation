id: 1SA.17.19
reference: 1 Samuel 17:19
source:
  edition: WLC
  text: וְ/שָׁא֤וּל וְ/הֵ֨מָּה֙ וְ/כָל אִ֣ישׁ יִשְׂרָאֵ֔ל בְּ/עֵ֖מֶק הָֽאֵלָ֑ה נִלְחָמִ֖ים
    עִם פְּלִשְׁתִּֽים־־׃
translation:
  text: Now Saul and they and every man of Israel were in the Valley of Elah, fighting
    with the Philistines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against the Philistines.' The Hebrew preposition is literally 'with,'
      but in battle contexts it can denote hostile engagement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/שָׁאוּל
  chosen: Now Saul
  alternatives:
  - And Saul
  - Saul
  lexicon: HALOT
  rationale: The conjunction waw here continues the narrative. Rendering it as 'Now'
    gives natural English narrative flow while still marking continuation. 'Saul'
    is transliterated as a personal name per translation philosophy.
- source_word: וְ/הֵמָּה
  chosen: and they
  alternatives:
  - and them
  - and he/they
  lexicon: HALOT
  rationale: The independent pronoun refers back to Jesse's sons/Israelite forces
    mentioned in context. Keeping 'and they' preserves the explicit Hebrew pronoun
    rather than smoothing it away.
- source_word: וְ/כָל אִישׁ יִשְׂרָאֵל
  chosen: and every man of Israel
  alternatives:
  - and all the men of Israel
  - and every Israelite
  lexicon: HALOT
  rationale: Literally 'and every man of Israel.' This preserves the distributive
    force of כָּל plus אִישׁ and follows the project's gender-accurate policy. 'Every
    Israelite' is possible but less formally tied to the Hebrew wording.
- source_word: בְּ/עֵמֶק הָאֵלָה
  chosen: in the Valley of Elah
  alternatives:
  - in the vale of Elah
  - at the Valley of Elah
  lexicon: HALOT
  rationale: עֵמֶק denotes a valley. 'Valley of Elah' is the standard transliteration
    of the place name and is clear modern English.
- source_word: נִלְחָמִים
  chosen: were ... fighting
  alternatives:
  - were at war
  - were battling
  lexicon: HALOT
  rationale: The participle conveys ongoing action. 'Were fighting' captures the durative
    sense in idiomatic English.
- source_word: עִם פְּלִשְׁתִּים
  chosen: with the Philistines
  alternatives:
  - against the Philistines
  lexicon: HALOT
  rationale: The preposition עִם literally means 'with,' but in warfare contexts English
    idiom can imply opposition. Here 'fighting with the Philistines' preserves the
    Hebrew preposition while the verb makes the adversarial sense clear.
