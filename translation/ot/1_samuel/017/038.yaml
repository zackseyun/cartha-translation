id: 1SA.17.38
reference: 1 Samuel 17:38
source:
  edition: WLC
  text: וַ/יַּלְבֵּ֨שׁ שָׁא֤וּל אֶת דָּוִד֙ מַדָּ֔י/ו וְ/נָתַ֛ן ק֥וֹבַע נְחֹ֖שֶׁת
    עַל רֹאשׁ֑/וֹ וַ/יַּלְבֵּ֥שׁ אֹת֖/וֹ שִׁרְיֽוֹן־־׃
translation:
  text: Then Saul clothed David with his own garments, put a bronze helmet on his
    head, and clothed him with armor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his military attire.' The Hebrew term for Saul's clothing can refer
      to garments associated with rank or battle dress.
    reason: lexical_alternative
  - marker: b
    text: Or 'coat of mail' or 'body armor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּלְבֵּשׁ
  chosen: clothed
  alternatives:
  - dressed
  - put on
  lexicon: HALOT
  rationale: The verb לבשׁ in the hiphil here means to cause someone to wear something.
    'Clothed' is natural English and preserves the causative sense better than a looser
    paraphrase.
- source_word: מַדָּיו
  chosen: his own garments
  alternatives:
  - his armor
  - his clothes
  - his military attire
  lexicon: HALOT
  rationale: מַד can denote garments, often official or military attire. In this context
    Saul is outfitting David for combat, but since the verse separately mentions helmet
    and armor, rendering it broadly as 'garments' avoids collapsing distinct items
    into one term. 'His own' reflects the 3ms suffix referring to Saul.
- source_word: קוֹבַע נְחֹשֶׁת
  chosen: a bronze helmet
  alternatives:
  - a copper helmet
  lexicon: HALOT
  rationale: קוֹבַע is a helmet, and נְחֹשֶׁת in this context is best rendered 'bronze'
    in standard English Bible usage for ancient metal armor.
- source_word: עַל רֹאשׁוֹ
  chosen: on his head
  alternatives:
  - upon his head
  lexicon: HALOT
  rationale: A straightforward prepositional phrase; 'on his head' is idiomatic modern
    English.
- source_word: שִׁרְיוֹן
  chosen: armor
  alternatives:
  - coat of mail
  - breastplate
  - scale armor
  lexicon: HALOT
  rationale: The term denotes body armor. Traditional 'coat of mail' is archaic, while
    the exact construction is not explicit enough here to require a more technical
    term. 'Armor' is clear, modern, and sufficiently precise in context.
