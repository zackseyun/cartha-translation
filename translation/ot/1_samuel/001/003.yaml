theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering יְהוָה צְבָאוֹת
  chosen_reading: Yahweh of Armies
  alternative_readings:
  - the LORD of Hosts
  - the LORD Almighty
  rationale: The title is translated rather than left in traditional ecclesiastical form to preserve source-language meaning for modern readers. 'Of Armies' is the most transparent lexical rendering of צְבָאוֹת in this title.
