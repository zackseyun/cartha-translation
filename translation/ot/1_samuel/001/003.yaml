id: 1SA.1.3
reference: 1 Samuel 1:3
source:
  edition: WLC
  text: וְ/עָלָה֩ הָ/אִ֨ישׁ הַ/ה֤וּא מֵֽ/עִיר/וֹ֙ מִ/יָּמִ֣ים יָמִ֔ימָ/ה לְ/הִֽשְׁתַּחֲוֺ֧ת וְ/לִ/זְבֹּ֛חַ לַ/יהוָ֥ה צְבָא֖וֹת בְּ/שִׁלֹ֑ה וְ/שָׁ֞ם שְׁנֵ֣י בְנֵֽי עֵלִ֗י חָפְנִי֙ וּ/פִ֣נְחָ֔ס כֹּהֲנִ֖ים לַ/יהוָֽה׀־׃
translation:
  text: That man used to go up from his city year after year to worship and to sacrifice to Yahweh of Armies at Shiloh. And the two sons of Eli, Hophni and Phinehas, were there as priests of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the LORD of Hosts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָלָה
  chosen: used to go up
  alternatives:
  - went up
  - would go up
  lexicon: HALOT
  rationale: The qatal with prefixed waw in this narrative setting describes customary past action. 'Used to go up' communicates habitual pilgrimage more naturally in English than a simple past, while preserving the literal 'go up' sense of עלה.
- source_word: הָאִישׁ הַהוּא
  chosen: that man
  alternatives:
  - the man
  - this man
  lexicon: HALOT
  rationale: The demonstrative adds specificity/anaphoric reference to Elkanah already introduced. 'That man' preserves the Hebrew force better than simply 'the man.'
- source_word: מֵעִירוֹ
  chosen: from his city
  alternatives:
  - from his town
  lexicon: HALOT
  rationale: עִיר commonly means 'city/town.' 'City' is the more direct rendering; no contextual pressure requires the softer 'town.'
- source_word: מִיָּמִים יָמִימָה
  chosen: year after year
  alternatives:
  - from days to days
  - annually
  - from one year to the next
  lexicon: HALOT
  rationale: This idiom denotes regular recurrence from year to year. 'Year after year' is idiomatic modern English and preserves the repeated annual sense better than a wooden rendering.
- source_word: לְהִשְׁתַּחֲוֺת
  chosen: to worship
  alternatives:
  - to bow down
  lexicon: HALOT
  rationale: The verb literally denotes prostration/bowing, but in cultic context before the LORD it functions as worship. 'To worship' best captures the intended act in readable English.
- source_word: וְלִזְבֹּחַ
  chosen: to sacrifice
  alternatives:
  - to offer sacrifice
  lexicon: HALOT
  rationale: The infinitive refers to sacrificial offering. 'To sacrifice' is concise and accurate in this cultic setting.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.' This follows the stated translation policy and established reverential convention.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of Hosts
  - Almighty
  lexicon: HALOT
  rationale: The title literally refers to armies/hosts. 'Of Armies' translates the Hebrew meaning transparently; 'of Hosts' is traditional but less immediately clear to modern readers, and 'Almighty' is interpretive rather than lexical.
- source_word: בְּשִׁלֹה
  chosen: at Shiloh
  alternatives:
  - in Shiloh
  lexicon: HALOT
  rationale: For a pilgrimage destination and sanctuary location, 'at Shiloh' is idiomatic English.
- source_word: וְשָׁם
  chosen: were there
  alternatives:
  - and there were
  lexicon: HALOT
  rationale: English requires an explicit verbal connection in the second clause. 'Were there' naturally renders the locative statement.
- source_word: שְׁנֵי בְנֵי עֵלִי
  chosen: the two sons of Eli
  alternatives:
  - Eli's two sons
  lexicon: HALOT
  rationale: This preserves the Hebrew order and emphasis on the pair.
- source_word: חָפְנִי וּפִנְחָס
  chosen: Hophni and Phinehas
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English conventions per translation philosophy.
- source_word: כֹּהֲנִים לַיהוָה
  chosen: as priests of the LORD
  alternatives:
  - priests to the LORD
  - the LORD's priests
  lexicon: HALOT
  rationale: This construction identifies their office in relation to YHWH. 'As priests of the LORD' reads naturally in English while preserving the covenantal relation.
