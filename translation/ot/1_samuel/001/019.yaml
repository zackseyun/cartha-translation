id: 1SA.1.19
reference: 1 Samuel 1:19
source:
  edition: WLC
  text: וַ/יַּשְׁכִּ֣מוּ בַ/בֹּ֗קֶר וַ/יִּֽשְׁתַּחֲווּ֙ לִ/פְנֵ֣י יְהוָ֔ה וַ/יָּשֻׁ֛בוּ וַ/יָּבֹ֥אוּ אֶל בֵּיתָ֖/ם הָ/רָמָ֑תָ/ה וַ/יֵּ֤דַע אֶלְקָנָה֙ אֶת חַנָּ֣ה אִשְׁתּ֔/וֹ וַ/יִּֽזְכְּרֶ֖/הָ יְהוָֽה־־׃
translation:
  text: They rose early in the morning and bowed down before Yahweh. Then they returned and came to their house at Ramah, and Elkanah knew Hannah his wife, and Yahweh remembered her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'knew,' a customary euphemism for marital sexual relations.
    reason: lexical_alternative
  - marker: b
    text: '''Remembered'' in Hebrew often means more than mental recollection; it can imply that God turned toward someone in faithful, effective regard.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּשְׁכִּמוּ
  chosen: They rose early
  alternatives:
  - They got up early
  - They arose early
  lexicon: HALOT
  rationale: The Hiphil of שׁכם commonly means to rise early. 'Rose early' is natural modern English and preserves the temporal emphasis without unnecessary archaism.
- source_word: בַבֹּקֶר
  chosen: in the morning
  alternatives:
  - at morning
  - early in the morning
  lexicon: HALOT
  rationale: בוקר denotes morning. Combined with the previous verb, the phrase is idiomatically rendered 'early in the morning'; the timing nuance is preserved in smooth English.
- source_word: וַיִּשְׁתַּחֲווּ לִפְנֵי יְהוָה
  chosen: and bowed down before the LORD
  alternatives:
  - and worshiped before the LORD
  - and prostrated themselves before the LORD
  lexicon: HALOT
  rationale: השתחוה literally denotes bowing/prostration. 'Bowed down' preserves the bodily action, while 'before the LORD' conveys the object of reverence. 'Worshiped' is possible but less concrete.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיָּשֻׁבוּ
  chosen: they returned
  alternatives:
  - they went back
  lexicon: HALOT
  rationale: שׁוב in this narrative sequence is straightforwardly 'return.' This keeps the movement clear and formal enough for the context.
- source_word: וַיָּבֹאוּ אֶל בֵּיתָם הָרָמָתָה
  chosen: and came to their house at Ramah
  alternatives:
  - and came to their house in Ramah
  - and went to their house at Ramah
  lexicon: HALOT
  rationale: The clause indicates arrival at their home located in Ramah. 'Came to their house at Ramah' is a natural rendering of the directional phrase with the place name retained by standard transliteration.
- source_word: הָרָמָתָה
  chosen: Ramah
  lexicon: HALOT
  rationale: Proper place name, transliterated according to the translation philosophy.
- source_word: וַיֵּדַע ... אֶת חַנָּה אִשְׁתּוֹ
  chosen: and Elkanah knew Hannah his wife
  alternatives:
  - and Elkanah had relations with Hannah his wife
  - and Elkanah was intimate with Hannah his wife
  lexicon: HALOT
  rationale: ידע here is the standard Hebrew euphemism for sexual relations. Retaining 'knew' preserves the source-text idiom and literary register; the meaning can be clarified in a footnote rather than flattening the euphemism in the main text.
- source_word: וַיִּזְכְּרֶהָ יְהוָה
  chosen: and the LORD remembered her
  alternatives:
  - and the LORD took notice of her
  - and the LORD acted for her in remembrance
  lexicon: HALOT
  rationale: '''Remembered'' is the standard rendering of זכר and preserves the covenantal nuance that God turned toward Hannah in effective regard, not mere recollection. The idiom is important enough to retain in the main text.'
