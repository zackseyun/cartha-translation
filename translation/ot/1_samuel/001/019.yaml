theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make the sexual euphemism explicit
  chosen_reading: Retain the Hebrew euphemism 'knew' in the main text
  alternative_readings:
  - had relations with
  - was intimate with
  rationale: The Hebrew intentionally uses ידע as a modest euphemism. Preserving it respects the source text's register while allowing clarification in a footnote for modern readers.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5, 6
- issue: Meaning of 'the LORD remembered her'
  chosen_reading: Preserve 'remembered' rather than interpretively expanding it
  alternative_readings:
  - took notice of her
  - granted her request
  rationale: The text states divine remembrance, which in Hebrew narrative implies effective regard leading to action, but the verse itself does not yet specify the outcome. Preserving the idiom avoids importing more than the text says.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3
