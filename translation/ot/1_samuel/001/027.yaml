id: 1SA.1.27
reference: 1 Samuel 1:27
source:
  edition: WLC
  text: אֶל הַ/נַּ֥עַר הַ/זֶּ֖ה הִתְפַּלָּ֑לְתִּי וַ/יִּתֵּ֨ן יְהוָ֥ה לִ/י֙ אֶת שְׁאֵ֣לָתִ֔/י אֲשֶׁ֥ר שָׁאַ֖לְתִּי מֵ/עִמּֽ/וֹ־־׃
translation:
  text: For this boy I prayed, and Yahweh has given me the petition that I asked of him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'About this boy I prayed.' The Hebrew preposition can mark the matter concerning which she prayed.
    reason: lexical_alternative
  - marker: b
    text: Or 'my request' instead of 'my petition.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל הַנַּעַר הַזֶּה
  chosen: For this boy
  alternatives:
  - About this boy
  - For this child
  lexicon: HALOT
  rationale: The preposition אֶל with התפלל can indicate the object or concern of prayer. In idiomatic English, 'for this boy' best conveys that Hannah prayed concerning/requesting this child. 'Boy' fits נַעַר here because Samuel has just been weaned and is presented as a young male child; 'child' is possible but less specific.
- source_word: הִתְפַּלָּלְתִּי
  chosen: I prayed
  alternatives:
  - I have prayed
  lexicon: HALOT
  rationale: Simple past fits the narrative context and English style. The hitpael of פלל here clearly means 'to pray.'
- source_word: וַיִּתֵּן
  chosen: has given
  alternatives:
  - gave
  lexicon: HALOT
  rationale: Although the Hebrew wayyiqtol is a past narrative form, English present perfect works naturally here in Hannah's direct speech, emphasizing the present result of the LORD's action as she presents Samuel.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שְׁאֵלָתִי
  chosen: my petition
  alternatives:
  - my request
  - what I asked for
  lexicon: HALOT
  rationale: The noun denotes a request or petition. 'Petition' preserves the formal prayer context and echoes the wordplay with the following verb שָׁאַלְתִּי ('I asked').
- source_word: אֲשֶׁר שָׁאַלְתִּי מֵעִמּוֹ
  chosen: that I asked from him
  alternatives:
  - which I asked of him
  - that I requested from him
  lexicon: HALOT
  rationale: This clause specifies the content of the petition and preserves the repetition of the שאל root. 'From him' makes explicit that the request was made to the LORD.
