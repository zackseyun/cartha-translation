- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Possible Nazirite implication of 'no razor shall come upon his head'
  chosen_reading: Retain the concrete vow language without importing the label 'Nazirite' into the main text
  alternative_readings:
  - Explicitly identify Samuel here as a Nazirite
  rationale: The wording strongly evokes Nazirite consecration, but the verse itself states only the razor prohibition and lifelong giving to the LORD. To avoid importing a doctrinal or interpretive conclusion beyond the text, the translation keeps the concrete language and notes the cultural background in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Never import doctrinal claims the text does not make'
