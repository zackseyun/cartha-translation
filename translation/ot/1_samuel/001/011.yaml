id: 1SA.1.11
reference: 1 Samuel 1:11
source:
  edition: WLC
  text: וַ/תִּדֹּ֨ר נֶ֜דֶר וַ/תֹּאמַ֗ר יְהוָ֨ה צְבָא֜וֹת אִם רָאֹ֥ה תִרְאֶ֣ה בָּ/עֳנִ֣י אֲמָתֶ֗/ךָ וּ/זְכַרְתַּ֨/נִי֙ וְ/לֹֽא תִשְׁכַּ֣ח אֶת אֲמָתֶ֔/ךָ וְ/נָתַתָּ֥ה לַ/אֲמָתְ/ךָ֖ זֶ֣רַע אֲנָשִׁ֑ים וּ/נְתַתִּ֤י/ו לַֽ/יהוָה֙ כָּל יְמֵ֣י חַיָּ֔י/ו וּ/מוֹרָ֖ה לֹא יַעֲלֶ֥ה עַל רֹאשֽׁ/וֹ־׀־־־־־׃
translation:
  text: She made a vow and said, “O Yahweh of hosts, if you will indeed look on the affliction of your female servant, and remember me, and not forget your female servant, but give your female servant a male child, then I will give him to Yahweh all the days of his life, and no razor shall come upon his head.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'seed/offspring of men,' an idiom here meaning a male child.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'no razor shall come upon his head' echoes the language of special consecration associated with a Nazirite vow; the text here states the hair restriction explicitly without using the Nazirite label.
    reason: cultural_note
lexical_decisions:
- source_word: וַתִּדֹּר נֶדֶר
  chosen: She made a vow
  alternatives:
  - She vowed a vow
  lexicon: HALOT
  rationale: The Hebrew uses a cognate accusative ('vowed a vow') for emphasis. Natural English expresses this as 'made a vow' while preserving the formal act.
- source_word: יְהוָה צְבָאוֹת
  chosen: O LORD of hosts
  alternatives:
  - O LORD Almighty
  - O Yahweh of hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than paraphrased, preserving the military/cosmic title 'of hosts.' The vocative 'O' reflects prayer address.
- source_word: אִם רָאֹה תִרְאֶה
  chosen: if you will indeed look on
  alternatives:
  - if you will surely look on
  - if you will truly see
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the action. 'Will indeed look on' captures the emphasis in idiomatic English.
- source_word: בָּעֳנִי
  chosen: the affliction
  alternatives:
  - the misery
  - the humiliation
  lexicon: HALOT
  rationale: עֳנִי denotes affliction/distress/humiliation. 'Affliction' is broad enough to include Hannah's suffering and social reproach without over-specifying.
- source_word: אֲמָתֶךָ / לַאֲמָתְךָ
  chosen: your female servant
  alternatives:
  - your maidservant
  - your servant
  lexicon: HALOT
  rationale: The term specifically denotes a female servant/slave. 'Female servant' preserves the gender explicitly, in line with the gender-accurate policy, while remaining readable modern English. 'Maidservant' is possible but more archaic.
- source_word: וּזְכַרְתַּנִי
  chosen: remember me
  alternatives:
  - call me to mind
  lexicon: HALOT
  rationale: Standard covenantal/prayer language; 'remember me' is both literal and idiomatic.
- source_word: וְלֹא תִשְׁכַּח אֶת אֲמָתֶךָ
  chosen: and not forget your female servant
  alternatives:
  - and do not forget your female servant
  lexicon: HALOT
  rationale: Retains the parallelism with 'remember me' and preserves the petition's cumulative structure.
- source_word: וְנָתַתָּה לַאֲמָתְךָ זֶרַע אֲנָשִׁים
  chosen: but give your female servant a male child
  alternatives:
  - give your female servant offspring of men
  - give your female servant a son
  lexicon: HALOT
  rationale: זֶרַע אֲנָשִׁים is literally 'seed/offspring of men.' In context it refers to a male child. 'Male child' preserves the explicit male sense more transparently than the more idiomatic but slightly interpretive 'son.'
- source_word: וּנְתַתִּיו לַיהוָה
  chosen: then I will give him to the LORD
  alternatives:
  - I will dedicate him to the LORD
  lexicon: HALOT
  rationale: The verb is simply 'give.' 'Dedicate' captures the sense but adds interpretive coloring; 'give him to the LORD' stays closer to the Hebrew while still clear.
- source_word: כָּל יְמֵי חַיָּיו
  chosen: all the days of his life
  alternatives:
  - for all his life
  lexicon: HALOT
  rationale: A straightforward formal rendering that preserves the totality and duration of the vow.
- source_word: וּמוֹרָה לֹא יַעֲלֶה עַל רֹאשׁוֹ
  chosen: and no razor shall come upon his head
  alternatives:
  - and a razor shall never touch his head
  lexicon: HALOT
  rationale: This is the conventional and literal idiom for abstaining from haircutting, associated with Nazirite-like consecration. 'Come upon his head' preserves the Hebrew image; 'razor' is the most likely sense of מוֹרָה in context.
