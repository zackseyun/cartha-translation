id: 1SA.1.9
reference: 1 Samuel 1:9
source:
  edition: WLC
  text: וַ/תָּ֣קָם חַנָּ֔ה אַחֲרֵ֛י אָכְלָ֥ה בְ/שִׁלֹ֖ה וְ/אַחֲרֵ֣י שָׁתֹ֑ה וְ/עֵלִ֣י הַ/כֹּהֵ֗ן יֹשֵׁב֙ עַל הַ/כִּסֵּ֔א עַל מְזוּזַ֖ת הֵיכַ֥ל יְהוָֽה־־׃
translation:
  text: After they had eaten in Shiloh, and after they had drunk, Hannah rose. Now Eli the priest was sitting on the seat by the doorpost of the temple of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the sanctuary of the LORD."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּקָם
  chosen: rose
  alternatives:
  - got up
  - stood up
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום commonly marks standing up or arising to act. 'Rose' is concise, natural English and preserves the narrative movement.
- source_word: אַחֲרֵי אָכְלָה
  chosen: After they had eaten
  alternatives:
  - After eating
  - After she had eaten
  lexicon: HALOT
  rationale: The infinitive/verb form with אַחֲרֵי gives a temporal clause, 'after eating.' Because the surrounding scene involves the family meal and the following verb 'they had drunk' is naturally collective, English idiom is best represented with 'they had eaten' rather than the more ambiguous bare infinitive. 'She had eaten' is possible if read with Hannah as the implied subject, but the broader meal context favors a collective sense.
- source_word: בְשִׁלֹה
  chosen: in Shiloh
  alternatives:
  - at Shiloh
  lexicon: HALOT
  rationale: The preposition ב normally means 'in.' 'In Shiloh' is straightforward and idiomatic enough in English.
- source_word: וְאַחֲרֵי שָׁתֹה
  chosen: and after they had drunk
  alternatives:
  - and after drinking
  - and after she had drunk
  lexicon: HALOT
  rationale: Parallel to the previous temporal phrase. 'They had drunk' preserves the likely collective meal setting and yields smooth English. The singular reading is possible but less likely in context.
- source_word: וְעֵלִי הַכֹּהֵן
  chosen: Now Eli the priest
  alternatives:
  - And Eli the priest
  lexicon: HALOT
  rationale: The conjunction introduces a circumstantial/background clause rather than a simple next event. 'Now' signals the scene-setting function in natural English.
- source_word: יֹשֵׁב
  chosen: was sitting
  alternatives:
  - sat
  - was seated
  lexicon: HALOT
  rationale: The participle describes Eli's ongoing posture as background information. English past progressive best captures this durative sense.
- source_word: עַל הַכִּסֵּא
  chosen: on the seat
  alternatives:
  - on the chair
  - on the throne
  lexicon: HALOT
  rationale: כִּסֵּא can denote a seat, chair, or throne depending on context. Here Eli is stationed at the sanctuary entrance, so 'seat' is suitably general and avoids overreading royal connotations.
- source_word: עַל מְזוּזַת
  chosen: by the doorpost
  alternatives:
  - beside the doorpost
  - at the doorpost
  lexicon: HALOT
  rationale: מְזוּזָה refers to a doorpost. With עַל in this locative setting, idiomatic English is 'by' rather than a wooden 'on.'
- source_word: הֵיכַל יְהוָה
  chosen: the temple of the LORD
  alternatives:
  - the sanctuary of the LORD
  - the palace of the LORD
  lexicon: HALOT
  rationale: הֵיכָל denotes a large sacred building or temple/sanctuary. Although this is pre-Solomonic and refers to the shrine at Shiloh, 'temple' is a well-established and intelligible rendering for the sanctuary structure here. The divine name follows project policy as 'the LORD' for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
