  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for the Tetragrammaton and does not introduce a doctrinal claim beyond the source text.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering הֵיכַל at Shiloh
  chosen_reading: temple
  alternative_readings:
  - sanctuary
  rationale: The term can denote temple or sanctuary. 'Temple' is retained in the main text as a natural rendering of הֵיכָל, while the alternative is preserved in a footnote because some readers may expect 'sanctuary' in the pre-monarchic setting.
