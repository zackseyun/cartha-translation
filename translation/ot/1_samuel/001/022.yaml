theological_decisions:
- issue: Subject of 'appear before the LORD' and 'stay there'
  chosen_reading: The subject is Samuel ('he may appear... and stay there'), not Hannah ('I may appear... and stay').
  alternative_readings:
  - Hannah as the subject of 'appear'
  - 'Text-critical reading reflected in some traditions: ''and I will appear before the LORD, and he will stay there'''
  rationale: 'The sequence after ''I will bring him'' most naturally continues with the boy as subject: once brought, he will appear before the LORD and remain there. This also fits the narrative aim of dedicating Samuel to sanctuary service. Some textual traditions and translations construe the first verb differently, but the MT as pointed supports the chosen reading well enough for the main text.'
  doctrine_reference: Preserve theological tension rather than resolve it; document alternatives in footnotes where meaningful.
