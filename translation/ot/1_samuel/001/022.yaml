id: 1SA.1.22
reference: 1 Samuel 1:22
source:
  edition: WLC
  text: וְ/חַנָּ֖ה לֹ֣א עָלָ֑תָה כִּֽי אָמְרָ֣ה לְ/אִישָׁ֗/הּ עַ֣ד יִגָּמֵ֤ל הַ/נַּ֨עַר֙ וַ/הֲבִאֹתִ֗י/ו וְ/נִרְאָה֙ אֶת פְּנֵ֣י יְהוָ֔ה וְ/יָ֥שַׁב שָׁ֖ם עַד עוֹלָֽם־־־׃
translation:
  text: But Hannah did not go up, for she said to her husband, “Not until the boy is weaned will I bring him, so that he may appear before Yahweh and remain there forever.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following another construal/textual tradition: “and I will appear before the LORD, and he will stay there forever.”'
    reason: alternative_reading
  - marker: b
    text: “Forever” here refers to Samuel’s permanent dedication to the LORD’s service, that is, for the rest of his life.
    reason: cultural_note
lexical_decisions:
- source_word: עָלָתָה
  chosen: did not go up
  alternatives:
  - did not come up
  - did not make the pilgrimage
  lexicon: HALOT
  rationale: עלה commonly means 'go up,' and in this narrative context refers to going up to the sanctuary at Shiloh. 'Go up' preserves the idiom without over-paraphrasing.
- source_word: כִּי אָמְרָה
  chosen: for she said
  alternatives:
  - because she said
  lexicon: HALOT
  rationale: Introduces the reason Hannah did not go. 'For' is natural English and keeps the explanatory force.
- source_word: לְאִישָׁהּ
  chosen: to her husband
  alternatives:
  - to her man
  lexicon: HALOT
  rationale: אִישׁ with pronominal suffix here clearly means her husband, not merely 'man.' This is the idiomatic and contextually precise rendering.
- source_word: עַד יִגָּמֵל הַנַּעַר
  chosen: When the boy is weaned
  alternatives:
  - until the boy is weaned
  lexicon: HALOT
  rationale: The Hebrew literally has 'until the boy is weaned,' but in direct speech English often expresses the intended timing more naturally as 'When the boy is weaned.' This preserves the sense of postponement until weaning.
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the child
  - the lad
  lexicon: HALOT
  rationale: נַעַר can mean boy, youth, servant, or child depending on context. Here Samuel is a young child, and 'boy' is natural, readable English.
- source_word: וַהֲבִאֹתִיו
  chosen: then I will bring him
  alternatives:
  - and I will bring him
  lexicon: HALOT
  rationale: The prefixed conjunction plus cohortative expresses Hannah's intended next action after weaning. 'Then I will bring him' makes the sequence explicit in idiomatic English.
- source_word: וְנִרְאָה אֶת־פְּנֵי יְהוָה
  chosen: so that he may appear before the LORD
  alternatives:
  - and he shall appear before the LORD
  - and he shall be seen before the LORD
  - and he shall see the face of the LORD
  lexicon: HALOT
  rationale: The Niphal of ראה in this idiom means 'appear before' in worship context. The subject is best taken as the boy, matching the following singular verbs. 'Before the LORD' follows the covenant-name policy for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְיָשַׁב שָׁם
  chosen: and stay there
  alternatives:
  - and dwell there
  - and remain there
  lexicon: HALOT
  rationale: ישב means sit, dwell, remain, or stay depending on context. Here it refers to Samuel's continuing residence/service at the sanctuary. 'Stay there' is clear modern English.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for life
  - perpetually
  lexicon: HALOT
  rationale: עוֹלָם often denotes an indefinite enduring duration. In this context of lifelong dedication, 'forever' is the conventional concise rendering, while the practical sense is lifelong permanence.
