id: 1SA.1.7
reference: 1 Samuel 1:7
source:
  edition: WLC
  text: וְ/כֵ֨ן יַעֲשֶׂ֜ה שָׁנָ֣ה בְ/שָׁנָ֗ה מִ/דֵּ֤י עֲלֹתָ/הּ֙ בְּ/בֵ֣ית יְהוָ֔ה כֵּ֖ן תַּכְעִסֶ֑/נָּה וַ/תִּבְכֶּ֖ה וְ/לֹ֥א תֹאכַֽל׃
translation:
  text: 'And so it happened year after year: whenever she went up to the house of Yahweh, Peninnah would provoke her, and she would weep and not eat.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he would do so year after year.' The Hebrew verb is literally singular masculine ('he would do'), often understood of Elkanah, but the clause can also function idiomatically to summarize the recurring situation.
    reason: alternative_reading
  - marker: b
    text: Or, 'in the house of the LORD.' The Hebrew preposition is literally 'in/at,' though English commonly says 'went up to the house of the LORD' with a verb of motion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֵן
  chosen: And so
  alternatives:
  - Thus
  - So
  lexicon: HALOT
  rationale: Introduces the summary of a repeated pattern. 'And so' preserves the connective force of ו plus the adverbial כֵן in natural English.
- source_word: יַעֲשֶׂה
  chosen: it would happen
  alternatives:
  - he would do so
  - this is what he did
  lexicon: HALOT
  rationale: Although the verb is literally 'he would do,' the subject is not explicitly restated and the clause summarizes a recurring situation. 'It would happen' communicates the idiomatic sense in context without forcing an awkward English subject. Some take the implied subject as Elkanah ('he did so'), but the broader clause describes the recurring family situation rather than only his action.
- source_word: שָׁנָה בְשָׁנָה
  chosen: year after year
  alternatives:
  - from year to year
  - every year
  lexicon: HALOT
  rationale: This Hebrew distributive expression denotes repeated annual occurrence. 'Year after year' is idiomatic and preserves the iterative force.
- source_word: מִדֵּי עֲלֹתָהּ
  chosen: whenever she went up
  alternatives:
  - as often as she went up
  - from the time of her going up
  lexicon: HALOT
  rationale: 'מִדֵּי with infinitive construct expresses repeated occasions: ''whenever/as often as.'' The suffix on עֲלֹתָהּ is feminine singular, referring to Hannah.'
- source_word: בְּבֵית יְהוָה
  chosen: to the house of the LORD
  alternatives:
  - in the house of the LORD
  lexicon: HALOT
  rationale: With the verb 'go up,' English naturally uses 'to the house of the LORD,' even though the preposition is ב. This reflects destination in context while preserving the cultic phrase 'house of the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in that way
  lexicon: HALOT
  rationale: 'The second כֵּן resumes and intensifies the repeated pattern: in that same way Peninnah would act. ''So'' is concise and natural.'
- source_word: תַּכְעִסֶנָּה
  chosen: would provoke her
  alternatives:
  - would vex her
  - would irritate her
  - would make her angry
  lexicon: HALOT
  rationale: The Hiphil of כעס here means to provoke or vex someone, especially in a hostile relational sense. 'Provoke her' fits the context of Peninnah's antagonism and aligns with the nearby emotional result.
- source_word: וַתִּבְכֶּה
  chosen: and she would weep
  alternatives:
  - and she wept
  lexicon: HALOT
  rationale: Although formally a wayyiqtol, in this summary context it describes customary result. 'Would weep' matches the iterative frame established earlier in the verse.
- source_word: וְלֹא תֹאכַל
  chosen: and not eat
  alternatives:
  - and would not eat
  lexicon: HALOT
  rationale: This continues the habitual consequence of Peninnah's provocation. The compressed English 'and not eat' is natural after 'would weep'; the sense is iterative.
