id: 1SA.1.21
reference: 1 Samuel 1:21
source:
  edition: WLC
  text: וַ/יַּ֛עַל הָ/אִ֥ישׁ אֶלְקָנָ֖ה וְ/כָל בֵּית֑/וֹ לִ/זְבֹּ֧חַ לַֽ/יהוָ֛ה אֶת זֶ֥בַח הַ/יָּמִ֖ים וְ/אֶת נִדְרֽ/וֹ־־־׃
translation:
  text: Then the man Elkanah went up with all his household to sacrifice to Yahweh the yearly sacrifice and his vow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and his vow,' with the verb 'to sacrifice' understood elliptically; the sense is that he went up also to discharge what he had vowed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - went
  - ascended
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' In pilgrimage context to the sanctuary at Shiloh, 'went up' preserves the idiomatic and geographic sense better than the flatter 'went.'
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the husband
  lexicon: HALOT
  rationale: אִישׁ literally means 'man.' Here it identifies Elkanah as the male head of the household. 'The husband' is contextually possible because of the family setting, but 'the man' more closely follows the Hebrew wording without over-interpreting.
- source_word: אֶלְקָנָה
  chosen: Elkanah
  rationale: Personal names are transliterated by standard convention per translation philosophy.
- source_word: וְכָל בֵּיתוֹ
  chosen: with all his household
  alternatives:
  - and all his house
  - and all his family
  lexicon: HALOT
  rationale: בַּיִת in this construct often denotes household members, not merely the physical house. 'Household' is natural modern English and preserves the familial/corporate sense.
- source_word: לִזְבֹּחַ
  chosen: to sacrifice
  alternatives:
  - to offer sacrifice
  lexicon: HALOT
  rationale: The infinitive of זבח means to slaughter/sacrifice in cultic context. 'To sacrifice' is concise and idiomatic here.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: זֶבַח הַיָּמִים
  chosen: the yearly sacrifice
  alternatives:
  - the sacrifice of the days
  - the annual sacrifice
  - the customary sacrifice
  lexicon: HALOT
  rationale: This expression refers to the recurring annual sacrificial observance described in the context. 'Yearly sacrifice' communicates the idiomatic sense in clear English better than a wooden rendering.
- source_word: וְאֶת נִדְרוֹ
  chosen: and to fulfill his vow
  alternatives:
  - and his vow
  - and to pay his vow
  lexicon: HALOT
  rationale: The Hebrew object marker leaves the governing infinitive 'to sacrifice' to carry over elliptically, but in English the sense is that Elkanah went up also to discharge/fulfill a vow. 'Fulfill his vow' makes the implied action explicit and readable without adding foreign content.
