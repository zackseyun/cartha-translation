id: 1SA.1.12
reference: 1 Samuel 1:12
source:
  edition: WLC
  text: וְ/הָיָה֙ כִּ֣י הִרְבְּתָ֔ה לְ/הִתְפַּלֵּ֖ל לִ/פְנֵ֣י יְהוָ֑ה וְ/עֵלִ֖י שֹׁמֵ֥ר אֶת פִּֽי/הָ־׃
translation:
  text: And as she continued praying before Yahweh, Eli was watching her mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And it happened, when she prayed at length before the LORD, that Eli was watching her mouth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  chosen: And as
  alternatives:
  - And it happened when
  - Now it came about that when
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces the circumstance of the next action. A more literal 'and it happened when' is possible, but in natural modern English 'And as' preserves the temporal force without wooden style.
- source_word: הִרְבְּתָה
  chosen: she kept
  alternatives:
  - she multiplied
  - she continued
  - she prayed at length
  lexicon: HALOT
  rationale: From רבה in the Hiphil, here idiomatically expressing increase/continuance in the action that follows. 'Kept' captures iterative or prolonged action in readable English.
- source_word: לְהִתְפַּלֵּל
  chosen: praying
  alternatives:
  - to pray
  lexicon: HALOT
  rationale: Infinitive with preceding verb forms the sense 'continued/prayed much.' English participial 'praying' fits the temporal clause smoothly.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard idiom for prayer offered in God's presence. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: שֹׁמֵר
  chosen: was watching
  alternatives:
  - was observing
  - was keeping watch on
  lexicon: HALOT
  rationale: Qal participle gives ongoing action. 'Was watching' is natural and fits Eli's attentive observation of Hannah's mouth.
- source_word: אֶת פִּיהָ
  chosen: her mouth
  alternatives:
  - her lips
  lexicon: HALOT
  rationale: The Hebrew noun is literally 'mouth.' Since the next verse explains that only her lips were moving, retaining 'mouth' here is more textually precise, while 'lips' is preserved as a lexical alternative.
