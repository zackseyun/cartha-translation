id: 1SA.1.6
reference: 1 Samuel 1:6
source:
  edition: WLC
  text: וְ/כִֽעֲסַ֤תָּ/ה צָֽרָתָ/הּ֙ גַּם כַּ֔עַס בַּ/עֲב֖וּר הַרְּעִמָ֑/הּ כִּֽי סָגַ֥ר יְהוָ֖ה בְּעַ֥ד רַחְמָֽ/הּ־־׃
translation:
  text: And her rival would provoke her bitterly in order to irritate her, because Yahweh had closed her womb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her co-wife'; the Hebrew term refers to a woman in a rival marital relationship within the household.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִעֲסַתָּה
  chosen: would provoke
  alternatives:
  - provoked
  - vexed
  - angered
  lexicon: HALOT
  rationale: From כעס in the Piel/causative sense of provoking or vexing. The verbal form in context is best represented as iterative/customary ('would provoke'), matching the narrative description of repeated action.
- source_word: צָרָתָהּ
  chosen: her rival
  alternatives:
  - her adversary
  - her co-wife
  lexicon: HALOT
  rationale: צָרָה here refers specifically to Peninnah as Hannah's domestic rival, likely a co-wife. 'Her rival' is natural English and preserves the relational hostility without requiring the culturally specific term in the main text.
- source_word: גַּם כַּעַס
  chosen: bitterly
  alternatives:
  - also grievously
  - even to anger
  - greatly
  lexicon: HALOT
  rationale: The combination intensifies the provoking action. Rather than a wooden repetition ('provoked her also with provocation'), 'bitterly' captures the emphatic force in idiomatic English. The lexical idea of anger/vexation is still preserved by 'provoke' and 'irritate' in the clause.
- source_word: בַּעֲבוּר
  chosen: in order to
  alternatives:
  - because of
  - for the sake of
  lexicon: HALOT
  rationale: 'Here the preposition introduces purpose: Peninnah''s provoking was aimed at producing distress. ''In order to'' best fits the syntax with the following infinitive-like verbal idea.'
- source_word: הַרְּעִמָהּ
  chosen: irritate her
  alternatives:
  - trouble her
  - make her thunder/tremble
  - disturb her
  lexicon: HALOT
  rationale: The rare verb is commonly understood here as causing agitation or distress. 'Irritate her' fits the immediate context of taunting over barrenness and pairs well with 'provoke' without collapsing the two verbs into one identical English gloss.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: 'Introduces the reason Peninnah could exploit Hannah: the LORD had closed her womb.'
- source_word: סָגַר
  chosen: had closed
  alternatives:
  - closed
  - shut
  lexicon: HALOT
  rationale: A straightforward rendering of סגר. The pluperfect-like English sense ('had closed') fits the backgrounded causal clause in narrative.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּעַד רַחְמָהּ
  chosen: her womb
  alternatives:
  - the womb behind/within her
  lexicon: HALOT
  rationale: רֶחֶם means womb. The preposition בְּעַד with סגר yields the idiom 'close the womb,' meaning to withhold conception. English naturally expresses the idiom as 'closed her womb.'
