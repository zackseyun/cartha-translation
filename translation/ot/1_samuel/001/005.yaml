id: 1SA.1.5
reference: 1 Samuel 1:5
source:
  edition: WLC
  text: וּ/לְ/חַנָּ֕ה יִתֵּ֛ן מָנָ֥ה אַחַ֖ת אַפָּ֑יִם כִּ֤י אֶת חַנָּה֙ אָהֵ֔ב וַֽ/יהוָ֖ה סָגַ֥ר רַחְמָֽ/הּ־׃
translation:
  text: But to Hannah he would give a double portion, because he loved Hannah, though Yahweh had closed her womb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'one portion of two faces/nostrils'; the phrase is difficult and may mean 'a double portion' or 'a special portion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/חַנָּה
  chosen: But to Hannah
  alternatives:
  - And to Hannah
  - Now to Hannah
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally means 'and/to Hannah.' In English, 'But to Hannah' best captures the contrast with the previous verse, where Peninnah and her children receive portions.
- source_word: יִתֵּן
  chosen: he would give
  alternatives:
  - he gave
  - he gives
  lexicon: HALOT
  rationale: The imperfect here functions in past habitual/narrative context, referring to Elkanah's customary action at the sacrifice. 'Would give' conveys repeated past action naturally in English.
- source_word: מָנָה
  chosen: portion
  alternatives:
  - share
  - serving
  lexicon: HALOT
  rationale: The noun refers to an allotted share of the sacrificial meal. 'Portion' is the most natural and sufficiently formal rendering.
- source_word: אַחַת אַפָּיִם
  chosen: a double portion
  alternatives:
  - one portion for two persons
  - a special portion
  - one portion of two faces
  lexicon: HALOT
  rationale: This idiom is difficult literally ('one portion of two nostrils/faces') and is commonly understood to mean a double or choice portion. 'A double portion' best communicates the likely sense in readable English while avoiding an opaque literalism. The alternative understanding is preserved in a footnote because the phrase is lexically debated.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Here the conjunction introduces the reason for Elkanah's special treatment of Hannah.
- source_word: אֶת חַנָּה אָהֵב
  chosen: he loved Hannah
  alternatives:
  - he was loving Hannah
  lexicon: HALOT
  rationale: The clause straightforwardly states Elkanah's love for Hannah as the reason for the special portion.
- source_word: וַֽ/יהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD' in the main text, with transliteration not used as the default.
- source_word: סָגַר רַחְמָהּ
  chosen: had closed her womb
  alternatives:
  - closed her womb
  - had shut up her womb
  lexicon: HALOT
  rationale: The verb means 'shut/close.' The clause gives the background circumstance explaining Hannah's childlessness. 'Had closed her womb' is idiomatic modern English and reflects the likely pluperfect sense in context.
