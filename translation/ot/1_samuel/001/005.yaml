theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Understanding Hannah's barrenness
  chosen_reading: though the LORD had closed her womb
  alternative_readings:
  - and the LORD had closed her womb
  rationale: 'Using ''though'' in English makes explicit the concessive force implied by the juxtaposition: Elkanah loved Hannah despite her barrenness. This does not alter the underlying claim that the LORD is sovereign over her condition; it clarifies the relationship between the clauses for natural English.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source meaning without importing doctrine'
