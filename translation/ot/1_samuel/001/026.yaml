id: 1SA.1.26
reference: 1 Samuel 1:26
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר֙ בִּ֣י אֲדֹנִ֔/י חֵ֥י נַפְשְׁ/ךָ֖ אֲדֹנִ֑/י אֲנִ֣י הָ/אִשָּׁ֗ה הַ/נִּצֶּ֤בֶת עִמְּ/כָה֙ בָּ/זֶ֔ה לְ/הִתְפַּלֵּ֖ל אֶל יְהוָֽה־׃
translation:
  text: And she said, “Please, my lord, as surely as you live, my lord, I am the woman who stood here beside you, praying to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by your life'' or more literally, ''as your soul lives,'' an oath formula expressing earnest appeal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּי
  chosen: Please
  alternatives:
  - Pardon me
  - Excuse me
  - Oh
  lexicon: HALOT
  rationale: In direct address, בִּי functions as a polite particle of entreaty rather than its more literal spatial sense. 'Please' gives natural modern English while preserving the deferential tone.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  - sir
  lexicon: HALOT
  rationale: Here the term is a respectful address to Eli, not a divine title. 'My lord' preserves the social deference of the Hebrew better than the flatter modern 'sir,' while avoiding confusion with the divine name because the referent is clear from context.
- source_word: חֵי נַפְשְׁךָ
  chosen: as surely as you live
  alternatives:
  - by your life
  - as your soul lives
  lexicon: HALOT
  rationale: This is an oath formula invoking the life of the person addressed. 'As surely as you live' communicates the idiomatic force in clear English; 'as your soul lives' is more literal but less natural in contemporary usage.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - that woman
  lexicon: HALOT
  rationale: The definite noun identifies Hannah as the specific woman Eli had previously seen. 'The woman' is the straightforward rendering.
- source_word: הַנִּצֶּבֶת
  chosen: who was standing
  alternatives:
  - standing
  - stationed
  lexicon: HALOT
  rationale: The participle describes her prior posture/location in relation to Eli. Rendering it as a relative clause in English is natural and preserves the ongoing sense.
- source_word: עִמְּכָה
  chosen: beside you
  alternatives:
  - with you
  - near you
  lexicon: HALOT
  rationale: In this context the preposition marks proximity rather than companionship. 'Beside you' best fits the scene of Hannah standing near Eli at the sanctuary.
- source_word: בָּזֶה
  chosen: here
  alternatives:
  - in this place
  - at this place
  lexicon: HALOT
  rationale: The demonstrative with preposition points to the location where the earlier event occurred. 'Here' is idiomatic and sufficiently specific in English.
- source_word: לְהִתְפַּלֵּל
  chosen: praying
  alternatives:
  - to pray
  lexicon: HALOT
  rationale: Following 'who was standing here beside you,' the infinitive is best rendered in English as a participial phrase, 'praying,' to express her activity at that time.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
