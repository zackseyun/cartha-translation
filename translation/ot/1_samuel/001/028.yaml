theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Subject of וַיִּשְׁתַּחוּ
  chosen_reading: he worshiped the LORD there
  alternative_readings:
  - they worshiped the LORD there
  rationale: The ketiv-like consonantal form and morphology here are commonly taken as singular in the MT tradition, and many translations understand Elkanah or Samuel as the subject. Because the referent is not explicit and some versions render the verb as plural, the alternative is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
