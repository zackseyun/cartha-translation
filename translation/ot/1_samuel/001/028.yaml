id: 1SA.1.28
reference: 1 Samuel 1:28
source:
  edition: WLC
  text: וְ/גַ֣ם אָנֹכִ֗י הִשְׁאִלְתִּ֨/הוּ֙ לַֽ/יהוָ֔ה כָּל הַ/יָּמִים֙ אֲשֶׁ֣ר הָיָ֔ה ה֥וּא שָׁא֖וּל לַֽ/יהוָ֑ה וַ/יִּשְׁתַּ֥חוּ שָׁ֖ם לַ/יהוָֽה־׃פ
translation:
  text: So I also have given him to Yahweh; all the days that he lives, he is given to Yahweh.” And he worshiped Yahweh there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I have given/dedicated him to the LORD.' The Hebrew uses the same root as 'asked' earlier in the chapter, creating a wordplay that is partly preserved by 'lent.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'they worshiped the LORD there.' The Hebrew form has been understood differently in translation tradition.
    reason: alternative_reading
lexical_decisions:
- source_word: הִשְׁאִלְתִּהוּ
  chosen: have lent him
  alternatives:
  - have given him
  - have dedicated him
  - have granted him
  lexicon: HALOT
  rationale: From שׁאל in the Hiphil, echoing the wordplay with Samuel/Saul and Hannah's earlier request. 'Lent' preserves the reciprocal/request nuance better than the flatter 'given,' though in context it denotes dedicating the child to the LORD.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Directional/dative sense fits Hannah's act of entrusting Samuel to YHWH. Per doctrine, יהוה is rendered 'the LORD.'
- source_word: כָּל הַיָּמִים אֲשֶׁר הָיָה
  chosen: all the days that he lives
  alternatives:
  - all the days that he exists
  - all his days
  - for as long as he lives
  lexicon: HALOT
  rationale: Idiomatic English for a lifetime expression. This balances formal correspondence with readability.
- source_word: שָׁאוּל
  chosen: is lent
  alternatives:
  - is asked for
  - is dedicated
  - is granted upon request
  lexicon: HALOT
  rationale: Passive participial/adjectival form from the same root שׁאל. 'Is lent' preserves the lexical repetition with הִשְׁאִלְתִּהוּ and the narrative wordplay, though the sense is consecratory.
- source_word: וַיִּשְׁתַּחוּ
  chosen: he worshiped
  alternatives:
  - he bowed down
  - they worshiped
  - he prostrated himself
  lexicon: HALOT
  rationale: The verb denotes bowing in worship. Singular morphology favors 'he worshiped,' though the subject is somewhat ambiguous in context. 'Worshiped' conveys the religious act more clearly than the more physical 'bowed down' in English.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' is the natural English equivalent.
