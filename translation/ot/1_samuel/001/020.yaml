id: 1SA.1.20
reference: 1 Samuel 1:20
source:
  edition: WLC
  text: וַ/יְהִי֙ לִ/תְקֻפ֣וֹת הַ/יָּמִ֔ים וַ/תַּ֥הַר חַנָּ֖ה וַ/תֵּ֣לֶד בֵּ֑ן וַ/תִּקְרָ֤א אֶת שְׁמ/וֹ֙ שְׁמוּאֵ֔ל כִּ֥י מֵ/יְהוָ֖ה שְׁאִלְתִּֽי/ו־׃
translation:
  text: And in due time Hannah conceived and bore a son, and she called his name Samuel, for she said, “I asked for him from Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''at the turning/cycle of the days,'' an idiom meaning when the proper time had come.'
    reason: lexical_alternative
  - marker: b
    text: 'The name ''Samuel'' is explained here by a wordplay with the Hebrew verb ''asked'' (שׁאל): ''I asked for him from the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לִתְקֻפוֹת הַיָּמִים
  chosen: in due time
  alternatives:
  - at the turn of the days
  - when the time had come
  - after some time
  lexicon: HALOT
  rationale: The idiom literally refers to the cycle or turning of days, meaning the arrival of the appropriate time. 'In due time' is natural English that preserves the temporal sense without over-literal awkwardness.
- source_word: וַתַּהַר
  chosen: conceived
  alternatives:
  - became pregnant
  lexicon: HALOT
  rationale: Standard rendering of הרה in birth narratives. 'Conceived' is concise and idiomatic in English.
- source_word: וַתֵּלֶד בֵּן
  chosen: bore a son
  alternatives:
  - gave birth to a son
  lexicon: HALOT
  rationale: A conventional and accurate rendering of ילד + בן in narrative style; slightly more literary while remaining clear.
- source_word: וַתִּקְרָא אֶת־שְׁמוֹ
  chosen: she called his name
  alternatives:
  - she named him
  lexicon: HALOT
  rationale: This preserves the Hebrew naming formula more transparently than the more idiomatic 'she named him,' while still reading naturally enough in English.
- source_word: שְׁמוּאֵל
  chosen: Samuel
  rationale: Personal names are transliterated by standard convention per translation philosophy.
- source_word: כִּי מֵיְהוָה שְׁאִלְתִּיו
  chosen: for she said, “I asked for him from the LORD.”
  alternatives:
  - for from the LORD I asked him
  - because I asked him of the LORD
  - because I have asked him from the LORD
  lexicon: HALOT
  rationale: The clause explains the name by wordplay with שאל ('ask'). The supplied 'she said' makes explicit the naming explanation implied by the Hebrew. 'Asked for him from the LORD' preserves both the petitionary sense and the source of the child. The perfect is rendered with simple past in narrative context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name.
