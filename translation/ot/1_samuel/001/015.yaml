id: 1SA.1.15
reference: 1 Samuel 1:15
source:
  edition: WLC
  text: וַ/תַּ֨עַן חַנָּ֤ה וַ/תֹּ֨אמֶר֙ לֹ֣א אֲדֹנִ֔/י אִשָּׁ֤ה קְשַׁת ר֨וּחַ֙ אָנֹ֔כִי וְ/יַ֥יִן וְ/שֵׁכָ֖ר לֹ֣א שָׁתִ֑יתִי וָ/אֶשְׁפֹּ֥ךְ אֶת נַפְשִׁ֖/י לִ/פְנֵ֥י יְהוָֽה־־׃
translation:
  text: But Hannah answered and said, “No, my lord. I am a woman troubled in spirit. I have drunk neither wine nor strong drink, but I have poured out my soul before Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a woman of sorrowful spirit.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “before Yahweh.”
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא אֲדֹנִי
  chosen: No, my lord
  alternatives:
  - No, sir
  lexicon: HALOT
  rationale: אֲדֹנִי is a respectful form of address to Eli, not a divine title here. 'My lord' preserves the social deference and matches the singular possessive form better than the flatter 'sir.'
- source_word: אִשָּׁה קְשַׁת רוּחַ
  chosen: a woman troubled in spirit
  alternatives:
  - a woman of sorrowful spirit
  - a woman hard of spirit
  - a deeply troubled woman
  lexicon: HALOT
  rationale: The phrase denotes inner distress or anguish rather than stubbornness. 'Troubled in spirit' is natural modern English and preserves the metaphor of רוח as the inner life/spirit. 'Sorrowful in spirit' is possible and traditional, but 'troubled' better captures her emotional distress in context.
- source_word: וְיַיִן וְשֵׁכָר
  chosen: wine nor strong drink
  alternatives:
  - wine or beer
  - wine or intoxicating drink
  lexicon: HALOT
  rationale: שֵׁכָר refers broadly to intoxicating drink other than wine. 'Strong drink' is the standard concise rendering and preserves the distinction between the two beverages without over-specifying the ancient referent.
- source_word: לֹא שָׁתִיתִי
  chosen: I have drunk neither
  alternatives:
  - I have not drunk
  lexicon: HALOT
  rationale: In English, 'neither ... nor' fits the paired objects 'wine' and 'strong drink' smoothly and clearly. The perfect sense is well represented by 'I have drunk.'
- source_word: וָאֶשְׁפֹּךְ אֶת נַפְשִׁי
  chosen: I have poured out my soul
  alternatives:
  - I poured out myself
  - I have poured out my heart
  lexicon: HALOT
  rationale: The idiom expresses intense prayerful self-disclosure before God. 'Soul' closely follows נֶפֶשׁ and preserves the biblical idiom; 'heart' would be more interpretive and less formally tied to the Hebrew.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - before Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'Before' accurately reflects לִפְנֵי as indicating prayer in God's presence.
- source_word: וַתַּעַן חַנָּה וַתֹּאמֶר
  chosen: But Hannah answered and said
  alternatives:
  - Hannah answered
  - Then Hannah answered and said
  lexicon: HALOT
  rationale: The double verb is a common Hebrew narrative formula. Retaining both verbs gives a slightly more formal cadence without sounding unnatural; 'But' reflects the adversative force in context as Hannah responds to Eli's accusation.
