id: 1SA.1.23
reference: 1 Samuel 1:23
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לָ/הּ֩ אֶלְקָנָ֨ה אִישָׁ֜/הּ עֲשִׂ֧י הַ/טּ֣וֹב בְּ/עֵינַ֗יִ/ךְ שְׁבִי֙ עַד גָּמְלֵ֣/ךְ אֹת֔/וֹ אַ֛ךְ יָקֵ֥ם יְהוָ֖ה אֶת דְּבָר֑/וֹ וַ/תֵּ֤שֶׁב הָֽ/אִשָּׁה֙ וַ/תֵּ֣ינֶק אֶת בְּנָ֔/הּ עַד גָּמְלָ֖/הּ אֹתֽ/וֹ־־־־׃
translation:
  text: And Elqanah her husband said to her, “Do what seems good in your eyes. Stay until you have weaned him; only may Yahweh establish his word.” So the woman stayed and nursed her son until she had weaned him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'confirm' or 'fulfill his word.' The Hebrew may refer to the LORD's promise or to the matter just spoken of in context.
    reason: alternative_reading
lexical_decisions:
- source_word: אִישָׁהּ
  chosen: her husband
  alternatives:
  - her man
  lexicon: HALOT
  rationale: In context אִישׁ with the pronominal suffix refers to Hannah's marital relation to Elqanah, so 'her husband' is the natural and precise English rendering.
- source_word: עֲשִׂי הַטּוֹב בְּעֵינַיִךְ
  chosen: Do what seems good in your eyes
  alternatives:
  - Do what is good in your eyes
  - Do what you think is best
  lexicon: HALOT
  rationale: This idiom literally means 'do the good in your eyes,' expressing personal judgment or what appears best to someone. 'Seems good in your eyes' preserves the Hebrew idiom while remaining readable.
- source_word: שְׁבִי
  chosen: Stay
  alternatives:
  - Remain
  - Dwell
  lexicon: HALOT
  rationale: The imperative from ישׁב here means to remain where she is rather than to sit physically. 'Stay' is idiomatic modern English.
- source_word: עַד גָּמְלֵךְ אֹתוֹ / עַד גָּמְלָהּ אֹתוֹ
  chosen: until you have weaned him / until she had weaned him
  alternatives:
  - until you have dealt fully with him
  lexicon: HALOT
  rationale: In this child-nurture context גמל clearly refers to weaning a child, not the broader senses of dealing out or repaying. Using 'weaned' keeps the maternal context explicit.
- source_word: אַךְ
  chosen: only
  alternatives:
  - surely
  - however
  - indeed
  lexicon: HALOT
  rationale: אַךְ here marks a limitation or qualification to the preceding permission. 'Only' best captures that discourse function.
- source_word: יָקֵם
  chosen: may ... establish
  alternatives:
  - confirm
  - fulfill
  - perform
  lexicon: HALOT
  rationale: 'The jussive nuance fits Elqanah''s wish or prayer: ''may the LORD establish.'' ''Establish'' reflects the causative sense of קום in relation to a word or promise, while leaving open whether the emphasis is confirmation or fulfillment.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: דְּבָרוֹ
  chosen: his word
  alternatives:
  - his promise
  - his matter
  lexicon: HALOT
  rationale: דבר can mean word, matter, or promise. 'His word' is the most textually direct and preserves the ambiguity of whether Elqanah refers to the LORD's prior word/promise or to the matter Hannah has spoken before him.
- source_word: וַתֵּינֶק
  chosen: nursed
  alternatives:
  - breastfed
  - suckled
  lexicon: HALOT
  rationale: The verb denotes nursing a child. 'Nursed' is clear, natural English without sounding clinical or archaic.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - Hannah
  lexicon: HALOT
  rationale: The Hebrew uses the common noun with article, not the proper name. 'The woman' preserves the source wording while remaining understandable in context.
