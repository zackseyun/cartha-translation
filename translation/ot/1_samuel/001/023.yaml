theological_decisions:
- issue: Reference of 'his word' in Elqanah's statement
  chosen_reading: Kept as 'his word' without specifying whether it means the LORD's promise or the word/vow just spoken in context
  alternative_readings:
  - his promise
  - the word concerning the child
  - your word/vow as confirmed by the LORD
  rationale: The Hebrew text reads 'his word' and is somewhat ambiguous in context. The translation preserves that ambiguity rather than resolving it interpretively, in keeping with the principle of preserving theological or interpretive tension where the source is not explicit.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
