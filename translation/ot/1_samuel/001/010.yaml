id: 1SA.1.10
reference: 1 Samuel 1:10
source:
  edition: WLC
  text: וְ/הִ֖יא מָ֣רַת נָ֑פֶשׁ וַ/תִּתְפַּלֵּ֥ל עַל יְהוָ֖ה וּ/בָכֹ֥ה תִבְכֶּֽה־׃
translation:
  text: And she was bitter in soul, and she prayed to Yahweh and wept bitterly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'bitter in soul,' an idiom for deep inner anguish.
    reason: lexical_alternative
  - marker: b
    text: Or 'wept bitterly' / 'kept on weeping'; Hebrew uses an intensified verbal form, literally 'weeping she wept.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָרַת נָפֶשׁ
  chosen: bitter in soul
  alternatives:
  - deeply distressed
  - bitter of soul
  - in bitterness of soul
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'bitter of soul.' 'Bitter in soul' preserves the metaphor and emotional intensity while remaining natural English. 'Deeply distressed' is possible but flattens the idiomatic imagery.
- source_word: וַתִּתְפַּלֵּל
  chosen: she prayed
  alternatives:
  - she prayed earnestly
  lexicon: HALOT
  rationale: The hitpael of פלל here straightforwardly means 'to pray.' The earnestness is conveyed by the surrounding context and weeping, so it need not be imported into the verb itself.
- source_word: עַל יְהוָה
  chosen: to the LORD
  alternatives:
  - before the LORD
  - concerning the LORD
  lexicon: HALOT
  rationale: Although עַל commonly means 'on/upon' or 'concerning,' with התפלל it can function idiomatically for directing prayer toward someone. In English, 'prayed to the LORD' is the clearest and most natural rendering. 'Before the LORD' is possible but less direct here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וּבָכֹה תִבְכֶּה
  chosen: wept greatly
  alternatives:
  - wept bitterly
  - kept on weeping
  - surely wept
  lexicon: HALOT
  rationale: 'This is an infinitive absolute plus finite verb construction intensifying the action: ''weeping she wept.'' ''Wept greatly'' captures the emphatic force in readable English without overinterpreting the emotional quality. ''Wept bitterly'' is attractive in context but risks importing the earlier ''bitter'' into the verb.'
