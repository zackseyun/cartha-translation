theological_decisions:
- issue: Rendering divine נִחַמְתִּי in relation to God
  chosen_reading: I regret
  alternative_readings:
  - I repent
  - I am sorry
  - I relent
  rationale: This preserves the text's anthropopathic force and theological tension without importing a claim that God sinned or erred. The verse should sound like genuine divine grief/regret while remaining consistent with orthodox theology's distinction between God's moral perfection and his responsive dealings in history.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Samuel's emotional response in וַיִּחַר לִשְׁמוּאֵל
  chosen_reading: Samuel burned with anger
  alternative_readings:
  - Samuel was grieved
  - Samuel was displeased
  rationale: The Hebrew idiom lexically points to anger, even though the narrative context also supports grief. The translation keeps the lexical force in the main text and preserves the contextual alternative in a footnote rather than smoothing the tension.
  doctrine_reference: Translation philosophy §1 and §3
