id: 1SA.15.11
reference: 1 Samuel 15:11
source:
  edition: WLC
  text: נִחַ֗מְתִּי כִּֽי הִמְלַ֤כְתִּי אֶת שָׁאוּל֙ לְ/מֶ֔לֶךְ כִּֽי שָׁב֙ מֵ/אַֽחֲרַ֔/י וְ/אֶת דְּבָרַ֖/י לֹ֣א הֵקִ֑ים וַ/יִּ֨חַר֙ לִ/שְׁמוּאֵ֔ל וַ/יִּזְעַ֥ק אֶל יְהוָ֖ה כָּל הַ/לָּֽיְלָה־־־־־־׃
translation:
  text: I regret that I made Saul king, because he has turned back from following me and has not carried out my words. And Samuel burned with anger, and he cried out to Yahweh all night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I am sorry' or 'I relent'; Hebrew 'I regret/was moved to regret.' The wording expresses the LORD's grief over Saul's kingship.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'he has turned back from after me,' an idiom for turning away from following the LORD.
    reason: lexical_alternative
  - marker: c
    text: Or, 'has not fulfilled my words' or 'has not obeyed my words.'
    reason: lexical_alternative
  - marker: d
    text: 'Hebrew idiom: ''Samuel burned with anger.'' Some understand the sense here as grief or deep displeasure in context.'
    reason: alternative_reading
lexical_decisions:
- source_word: נִחַמְתִּי
  chosen: I regret
  alternatives:
  - I am sorry
  - I repent
  - I relent
  lexicon: HALOT
  rationale: The Niphal of נחם here expresses divine regret/grief over Saul's kingship. 'I regret' communicates the emotional and evaluative force in clear modern English without implying moral fault in God. 'Repent' is too misleading in contemporary English, while 'relent' fits contexts of changing intended action more than this statement of grief.
- source_word: הִמְלַכְתִּי אֶת־שָׁאוּל לְמֶלֶךְ
  chosen: I made Saul king
  alternatives:
  - I made Saul reign
  - I appointed Saul as king
  lexicon: HALOT
  rationale: The Hiphil of מלך with לְמֶלֶךְ denotes causing/installing someone as king. 'Made Saul king' is idiomatic and sufficiently formal.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the divine regret. 'Because' is the clearest causal rendering in English.
- source_word: שָׁב מֵאַחֲרַי
  chosen: he has turned back from following me
  alternatives:
  - he has turned away from me
  - he has turned from after me
  lexicon: HALOT
  rationale: The idiom שׁוּב מֵאַחַר means to turn away from following someone. 'Turned back from following me' preserves the imagery of discipleship/allegiance better than the flatter 'turned away from me.'
- source_word: וְאֶת־דְּבָרַי לֹא הֵקִים
  chosen: and has not carried out my words
  alternatives:
  - and has not established my words
  - and has not obeyed my words
  - and has not fulfilled my words
  lexicon: HALOT
  rationale: הקים with 'words' means to establish/confirm by doing, i.e., to carry out or fulfill. 'Carried out my words' preserves the concrete sense of putting the command into effect better than the more interpretive 'obeyed.'
- source_word: וַיִּחַר לִשְׁמוּאֵל
  chosen: Samuel burned with anger
  alternatives:
  - it was kindled to Samuel
  - Samuel was angry
  - Samuel was grieved
  lexicon: HALOT
  rationale: The idiom חרה ל expresses burning anger. The subject is best understood as Samuel, not an impersonal 'it.' 'Burned with anger' preserves the vivid Hebrew idiom. Although some translations render Samuel's reaction as grief/displeasure from context, the lexical sense is anger.
- source_word: וַיִּזְעַק אֶל־יְהוָה
  chosen: he cried out to the LORD
  alternatives:
  - he cried to the LORD
  - he called out to the LORD
  lexicon: HALOT
  rationale: זעק denotes a strong cry, often in distress or urgent appeal. 'Cried out' captures the intensity.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כָּל־הַלַּיְלָה
  chosen: all night
  alternatives:
  - the whole night
  - throughout the night
  lexicon: HALOT
  rationale: Idiomatic English prefers 'all night,' which accurately conveys the duration.
