id: 1SA.15.14
reference: 1 Samuel 15:14
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שְׁמוּאֵ֔ל וּ/מֶ֛ה קֽוֹל הַ/צֹּ֥אן הַ/זֶּ֖ה בְּ/אָזְנָ֑/י וְ/ק֣וֹל
    הַ/בָּקָ֔ר אֲשֶׁ֥ר אָנֹכִ֖י שֹׁמֵֽעַ־׃
translation:
  text: But Samuel said, “Then what is this sound of sheep in my ears, and the sound
    of cattle that I hear?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “voice” instead of “sound” for both occurrences of Hebrew qol; here it
      refers to the audible noise made by the animals.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But Samuel said
  alternatives:
  - And Samuel said
  - Then Samuel said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' best captures the adversative
    force in context, since Samuel's reply challenges Saul's preceding claim of obedience.
    'Said' is the standard rendering of אמר.
- source_word: וּמֶה
  chosen: Then what is
  alternatives:
  - And what is
  - What then is
  lexicon: HALOT
  rationale: The interrogative asks for an explanation. Rendering with 'Then' reflects
    the connective force and the rhetorical challenge in natural English.
- source_word: קוֹל
  chosen: sound
  alternatives:
  - voice
  - noise
  lexicon: HALOT
  rationale: Though קול can mean 'voice' or 'sound,' here it refers to the audible
    bleating/lowing of animals, so 'sound' is the most natural and accurate English
    choice in both occurrences.
- source_word: הַצֹּאן
  chosen: sheep
  alternatives:
  - flock
  - small livestock
  lexicon: HALOT
  rationale: The noun commonly denotes sheep/goats collectively, but in this context
    'sheep' is the conventional and sufficiently precise rendering, especially paired
    with cattle.
- source_word: הַזֶּה
  chosen: this
  alternatives:
  - this here
  lexicon: HALOT
  rationale: The demonstrative points to the immediately perceptible sound; simple
    'this' preserves the deictic force.
- source_word: בְּאָזְנָי
  chosen: in my ears
  alternatives:
  - in my hearing
  - that reaches my ears
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the vividness of Samuel's accusation.
    'In my hearing' is possible, but 'in my ears' better reflects the Hebrew image
    while remaining idiomatic enough.
- source_word: וְקוֹל הַבָּקָר
  chosen: and the sound of cattle
  alternatives:
  - and the sound of oxen
  - and the sound of the herd
  lexicon: HALOT
  rationale: בקר is a collective term for cattle/herd animals. 'Cattle' is broad and
    natural in modern English; 'oxen' would be too narrow.
- source_word: אֲשֶׁר אָנֹכִי שֹׁמֵעַ
  chosen: that I hear
  alternatives:
  - which I am hearing
  - that I myself hear
  lexicon: HALOT
  rationale: The relative clause identifies the audible evidence. English simple present
    is the most natural equivalent. The explicit pronoun אָנֹכִי adds emphasis, but
    English need not mark it overtly here because the rhetorical force is already
    clear.
