theological_decisions:
- issue: Rendering of חרם in a holy-war/judgment context
  chosen_reading: devoted to destruction
  alternative_readings:
  - utterly destroyed
  - put under the ban
  rationale: The verb carries more than ordinary destruction; it denotes consecration
    to destruction under divine judgment. The chosen rendering preserves that theological
    nuance without archaic jargon in the main text.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Rendering of the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and LXX pattern.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
