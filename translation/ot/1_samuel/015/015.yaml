id: 1SA.15.15
reference: 1 Samuel 15:15
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר שָׁא֜וּל מֵ/עֲמָלֵקִ֣י הֱבִיא֗וּ/ם אֲשֶׁ֨ר חָמַ֤ל הָ/עָם֙ עַל
    מֵיטַ֤ב הַ/צֹּאן֙ וְ/הַ/בָּקָ֔ר לְמַ֥עַן זְבֹ֖חַ לַ/יהוָ֣ה אֱלֹהֶ֑י/ךָ וְ/אֶת
    הַ/יּוֹתֵ֖ר הֶחֱרַֽמְנוּ־־׃ס
translation:
  text: And Saul said, “They brought them from the Amalekites, because the people
    spared the best of the sheep and the cattle, in order to sacrifice them to the
    LORD your God; but the rest we devoted to destruction.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “we utterly destroyed”; Hebrew has a form of חָרַם, a technical term
      for devoting something to destruction under the ban.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֱבִיאוּם
  chosen: they brought them
  alternatives:
  - they have brought them
  lexicon: HALOT
  rationale: Hiphil of בוא with 3mp object suffix; straightforward causative/ingressive
    sense. English simple past fits the narrative sequence.
- source_word: מֵעֲמָלֵקִי
  chosen: from the Amalekites
  alternatives:
  - from Amalek
  lexicon: HALOT
  rationale: The gentilic form naturally refers to the people group rather than the
    territory; 'Amalekites' is the clearest English rendering here.
- source_word: חָמַל ... עַל
  chosen: spared
  alternatives:
  - had compassion on
  - showed pity toward
  lexicon: HALOT
  rationale: In this military/judgment context, חמל על means refraining from destroying
    what was under ban. 'Spared' captures the concrete action better than an emotive
    gloss.
- source_word: מֵיטַב
  chosen: the best
  alternatives:
  - the choicest
  - the finest
  lexicon: HALOT
  rationale: Construct with the following nouns indicates the select or superior portion.
    'The best' is idiomatic and sufficiently precise.
- source_word: הַצֹּאן וְהַבָּקָר
  chosen: the sheep and the cattle
  alternatives:
  - the flock and the herd
  lexicon: HALOT
  rationale: Specific animal terms are preferable here because the verse contrasts
    categories of livestock intended for sacrifice.
- source_word: לְמַעַן זְבֹחַ
  chosen: in order to sacrifice them
  alternatives:
  - to sacrifice
  - for sacrificing
  lexicon: HALOT
  rationale: למען marks purpose. Supplying 'them' in English makes explicit that the
    spared animals are the intended sacrificial objects, which is implicit in Hebrew.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.'
- source_word: אֱלֹהֶיךָ
  chosen: your God
  alternatives:
  - your god
  lexicon: HALOT
  rationale: 'Second masculine singular suffix is significant in context: Saul says
    ''your God'' to Samuel, creating rhetorical distance. This should be preserved.'
- source_word: הַיּוֹתֵר
  chosen: the rest
  alternatives:
  - what was left over
  - the remainder
  lexicon: HALOT
  rationale: Refers to the remainder beyond the spared best animals. 'The rest' is
    natural and concise.
- source_word: הֶחֱרַמְנוּ
  chosen: we devoted to destruction
  alternatives:
  - we utterly destroyed
  - we put under the ban
  lexicon: HALOT
  rationale: Hiphil of חרם in holy-war context denotes placing under the ban for destruction.
    'Devoted to destruction' preserves the technical theological force better than
    merely 'destroyed.'
