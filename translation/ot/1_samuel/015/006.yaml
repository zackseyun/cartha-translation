id: 1SA.15.6
reference: 1 Samuel 15:6
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שָׁא֣וּל אֶֽל הַ/קֵּינִ֡י לְכוּ֩ סֻּ֨רוּ רְד֜וּ מִ/תּ֣וֹךְ עֲמָלֵקִ֗י
    פֶּן אֹֽסִפְ/ךָ֙ עִמּ֔/וֹ וְ/אַתָּ֞ה עָשִׂ֤יתָה חֶ֨סֶד֙ עִם כָּל בְּנֵ֣י יִשְׂרָאֵ֔ל
    בַּ/עֲלוֹתָ֖/ם מִ/מִּצְרָ֑יִם וַ/יָּ֥סַר קֵינִ֖י מִ/תּ֥וֹךְ עֲמָלֵֽק־־־־׃
translation:
  text: Then Saul said to the Kenite, “Go, turn aside, go down from among the Amalekites,
    lest I sweep you away with them. For you showed covenant loyalty to all the sons
    of Israel when they came up from Egypt.” So the Kenite turned aside from among
    Amalek.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''kindness'' or ''loyalty'' for ''covenant loyalty'' (Hebrew: hesed).'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all the sons of Israel,' a standard national expression for the
      people of Israel.
    reason: lexical_alternative
  - marker: c
    text: Or 'lest I destroy you with them'; the Hebrew verb can carry the sense of
      being removed or swept away together in judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקֵּינִי / קֵינִי
  chosen: the Kenite / the Kenite
  alternatives:
  - the Kenites
  lexicon: HALOT
  rationale: 'The singular gentilic is used in the Hebrew, likely as a collective
    or representative singular for the Kenite group. English can preserve the singular
    naturally here: Saul addresses ''the Kenite,'' and the narrative concludes ''the
    Kenite turned aside.'' A plural is possible interpretively, but the singular better
    reflects the source form.'
- source_word: לְכוּ
  chosen: Go
  alternatives:
  - Come on
  - Leave
  lexicon: HALOT
  rationale: Imperative of הלך used as an initial command. 'Go' is the most direct
    and idiomatic English equivalent.
- source_word: סֻּרוּ
  chosen: turn aside
  alternatives:
  - withdraw
  - depart
  lexicon: HALOT
  rationale: סור commonly means to turn aside or depart. 'Turn aside' preserves the
    directional nuance and fits the military context of moving away from Amalek.
- source_word: רְדוּ
  chosen: go down
  alternatives:
  - descend
  lexicon: HALOT
  rationale: ירד literally means 'go down.' Even if topographical nuance may be muted
    in English, retaining 'go down' preserves the Hebrew's concrete movement language.
- source_word: מִתּוֹךְ עֲמָלֵקִי
  chosen: from among the Amalekites
  alternatives:
  - out of the midst of Amalek
  - from the midst of the Amalekites
  lexicon: HALOT
  rationale: מִתּוֹךְ means 'from the midst of, from among.' The gentilic form here
    refers to the Amalekite people. 'From among the Amalekites' is clear modern English
    and preserves the separation motif.
- source_word: פֶּן אֹסִפְךָ עִמּוֹ
  chosen: lest I sweep you away with them
  alternatives:
  - lest I destroy you with him
  - lest I gather you with him
  lexicon: HALOT
  rationale: The verb אסף in judgment contexts can mean to remove or sweep away together
    with others, not merely 'gather.' Because the warning concerns being caught in
    Amalek's destruction, 'sweep you away' best conveys the idiomatic force. The suffix
    is singular, matching the collective singular addressee; English plural 'them'
    reflects the Amalekites as a people.
- source_word: חֶסֶד
  chosen: covenant loyalty
  alternatives:
  - kindness
  - steadfast love
  - loyalty
  lexicon: HALOT
  rationale: חסד here denotes more than generic kindness; it is loyal, faithful benevolence
    shown to Israel. 'Covenant loyalty' captures the relational and morally weighty
    sense without flattening it to mere niceness. Since the Kenites are not necessarily
    formal covenant members, this rendering still works as loyalty shown toward the
    covenant people.
- source_word: כָּל בְּנֵי יִשְׂרָאֵל
  chosen: all the sons of Israel
  alternatives:
  - all the people of Israel
  - all the Israelites
  lexicon: HALOT
  rationale: Per the project's gender-accurate philosophy, בְּנֵי is retained as 'sons'
    rather than neutralized. In this national expression, 'sons of Israel' is natural
    enough in English and reflects the Hebrew form.
- source_word: בַּעֲלוֹתָם מִמִּצְרָיִם
  chosen: when they came up from Egypt
  alternatives:
  - when they went up from Egypt
  - at their coming up from Egypt
  lexicon: HALOT
  rationale: עלה with Egypt is the standard idiom for Israel's exodus movement. 'Came
    up from Egypt' is idiomatic in narrative English while preserving the Hebrew ascent
    language.
- source_word: וַיָּסַר
  chosen: turned aside
  alternatives:
  - withdrew
  - departed
  lexicon: HALOT
  rationale: The same root as the earlier imperative (סור) creates verbal cohesion.
    Rendering it 'turned aside' preserves that connection and shows the Kenite obeyed
    Saul's command.
- source_word: עֲמָלֵק
  chosen: Amalek
  alternatives:
  - the Amalekites
  lexicon: HALOT
  rationale: The final phrase uses the proper name 'Amalek.' In English, 'from among
    Amalek' is acceptable as a collective national designation and mirrors the Hebrew
    more closely than expanding to 'the Amalekites.'
