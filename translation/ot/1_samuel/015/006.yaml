theological_decisions:
- issue: Rendering of חֶסֶד in a non-divine, historically significant context
  chosen_reading: covenant loyalty
  alternative_readings:
  - kindness
  - steadfast love
  - loyalty
  rationale: The verse grounds Saul's sparing of the Kenites in their past faithful
    benevolence toward Israel during the exodus period. 'Covenant loyalty' preserves
    the moral and relational depth of חסד better than the thinner 'kindness,' while
    avoiding importing a specifically divine attribute. This is a lexical-theological
    choice rather than a doctrinally contested one.
  doctrine_reference: Translation philosophy §5, consistency of key terms; §6, readable
    modern English
- issue: Gendered national expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - people of Israel
  - Israelites
  rationale: The Hebrew is grammatically masculine plural in a standard national designation.
    Following the project's gender-accurate policy, the masculine form is preserved
    rather than neutralized, since the phrase is conventional and the source wording
    is explicit.
  doctrine_reference: Translation philosophy §4, gender-accurate over gender-neutral
