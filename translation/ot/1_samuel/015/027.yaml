id: 1SA.15.27
reference: 1 Samuel 15:27
source:
  edition: WLC
  text: וַ/יִּסֹּ֥ב שְׁמוּאֵ֖ל לָ/לֶ֑כֶת וַ/יַּחֲזֵ֥ק בִּ/כְנַף מְעִיל֖/וֹ וַ/יִּקָּרַֽע־׃
translation:
  text: As Samuel turned to go, he seized the edge of his robe, and it tore.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the corner of his robe' or 'the hem of his robe.' The Hebrew word can
      denote an extremity of a garment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסֹּב
  chosen: turned
  alternatives:
  - turned around
  - turned away
  lexicon: HALOT
  rationale: The verb from סבב here denotes turning in preparation to depart. 'Turned'
    is concise and natural in English, and the following infinitive 'to go' supplies
    the movement sense.
- source_word: לָלֶכֶת
  chosen: to go
  alternatives:
  - to leave
  - to depart
  lexicon: HALOT
  rationale: הלך in the infinitive construct after 'turned' expresses Samuel's intention
    to depart. 'To go' is the most direct rendering; the broader departure sense is
    conveyed by the clause as a whole.
- source_word: וַיַּחֲזֵק
  chosen: he seized
  alternatives:
  - he grasped
  - he took hold of
  lexicon: HALOT
  rationale: חזק in the Hiphil commonly means to seize or take hold firmly. 'Seized'
    best conveys the sudden, forceful action in context.
- source_word: בִּכְנַף
  chosen: the edge of
  alternatives:
  - the corner of
  - the hem of
  lexicon: HALOT
  rationale: כָּנָף literally means 'wing' and by extension the extremity or corner
    of a garment. For a robe, 'edge' is idiomatic and broad enough; 'hem' is possible
    but slightly more interpretive.
- source_word: מְעִילוֹ
  chosen: his robe
  alternatives:
  - his cloak
  - his mantle
  lexicon: HALOT
  rationale: מְעִיל denotes an outer garment or robe. 'Robe' is clear modern English
    and fits the narrative setting better than the more archaic 'mantle'.
- source_word: וַיִּקָּרַע
  chosen: and it tore
  alternatives:
  - and it was torn
  - and it ripped
  lexicon: HALOT
  rationale: 'The Niphal form is passive/intransitive: the garment edge was torn.
    English idiom favors ''it tore'' here, with ''it'' referring to the robe/its edge.
    This preserves the event without over-specifying the subject.'
