theological_decisions:
- issue: Rendering of the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the LXX pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Saul's wording אֱלֹהֶיךָ ('your God')
  chosen_reading: your God
  alternative_readings:
  - our God
  - God
  rationale: 'The Hebrew explicitly uses the second-person singular suffix. Preserving
    ''your God'' maintains the narrative and theological tension: Saul requests Samuel''s
    presence for public honor and speaks of the LORD as Samuel''s God rather than
    explicitly as his own.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 (preserve theological
    tension rather than resolve it)'
