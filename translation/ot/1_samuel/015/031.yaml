theological_decisions:
- issue: Whether וַיִּשְׁתַּחוּ should be rendered as an explicitly cultic act ('worshiped') or as the bodily act ('bowed down')
  chosen_reading: Rendered as 'bowed down' in the main text
  alternative_readings:
  - worshiped the LORD
  - prostrated himself before the LORD
  rationale: The Hebrew verb can denote worship or prostration depending on context. Since the text explicitly names the LORD as the object, worship is certainly involved, but the verb itself foregrounds the bodily act. To preserve the textual nuance and avoid over-specification, the main text uses 'bowed down,' with 'worshiped' preserved as a lexical alternative.
  doctrine_reference: Translation philosophy §3, §6; Contested terms entry for יְהוָה
