id: 1SA.15.31
reference: 1 Samuel 15:31
source:
  edition: WLC
  text: וַ/יָּ֥שָׁב שְׁמוּאֵ֖ל אַחֲרֵ֣י שָׁא֑וּל וַ/יִּשְׁתַּ֥חוּ שָׁא֖וּל לַֽ/יהוָֽה׃ס
translation:
  text: So Samuel went back after Saul, and Saul bowed down to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worshiped the LORD.' The Hebrew verb can denote bowing down or worship, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: went back
  alternatives:
  - returned
  - turned back
  lexicon: HALOT
  rationale: From שוב, here in narrative sequence with Samuel as subject. 'Went back' gives natural English for movement in context after Samuel had said he would not return with Saul (v. 26), while preserving the reversal implied by the verb.
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - behind
  - with
  lexicon: HALOT
  rationale: The preposition literally means 'after/behind.' In this context it indicates Samuel's going after Saul, i.e., accompanying him back. 'After' preserves the Hebrew wording without over-interpreting.
- source_word: וַיִּשְׁתַּחוּ
  chosen: bowed down
  alternatives:
  - worshiped
  - prostrated himself
  lexicon: HALOT
  rationale: From שׁחה, denoting bowing/prostration. 'Bowed down' preserves the physical act and avoids prematurely specifying whether the emphasis is cultic worship or bodily obeisance. Because the object is 'to the LORD,' the act is directed reverentially to God, but the more concrete rendering is preferable in the main text.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יהוה is rendered 'the LORD' rather than transliterated. The prefixed ל marks direction/object of Saul's bowing.
- source_word: שְׁמוּאֵל
  chosen: Samuel
  rationale: Standard English transliteration of the personal name.
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Standard English transliteration of the personal name.
