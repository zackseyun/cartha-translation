theological_decisions:
- issue: Rendering of חרם warfare language
  chosen_reading: devoted all the people to destruction
  alternative_readings:
  - utterly destroyed all the people
  - put all the people under the ban
  rationale: The verse uses covenant-war terminology with theological weight. The
    chosen rendering preserves that weight without paraphrase, and avoids flattening
    the term into mere military killing. An alternative is worth preserving because
    'utterly destroyed' is common in English tradition, while 'put under the ban'
    is more technical but less accessible.
  doctrine_reference: Translation philosophy §1, §3, §6
