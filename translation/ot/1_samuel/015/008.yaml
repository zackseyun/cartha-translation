id: 1SA.15.8
reference: 1 Samuel 15:8
source:
  edition: WLC
  text: וַ/יִּתְפֹּ֛שׂ אֶת אֲגַ֥ג מֶֽלֶךְ עֲמָלֵ֖ק חָ֑י וְ/אֶת כָּל הָ/עָ֖ם הֶחֱרִ֥ים
    לְ/פִי חָֽרֶב־־־־־׃
translation:
  text: He captured Agag king of Amalek alive, and devoted all the people to destruction
    with the edge of the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'utterly destroyed all the people'; the Hebrew verb refers to devoting
      something to destruction under the ban.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפֹּשׂ
  chosen: captured
  alternatives:
  - seized
  - took
  lexicon: HALOT
  rationale: The verb denotes laying hold of or capturing. 'Captured' fits the military
    context and reads naturally in English.
- source_word: אֲגַג
  chosen: Agag
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: מֶלֶךְ עֲמָלֵק
  chosen: king of Amalek
  alternatives:
  - the Amalekite king
  lexicon: HALOT
  rationale: The construct chain is most directly rendered 'king of Amalek.' This
    preserves the formal relation while remaining natural English.
- source_word: חָי
  chosen: alive
  alternatives:
  - living
  lexicon: HALOT
  rationale: Predicate adjective indicating Agag was taken alive rather than killed.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the troops
  - all the populace
  lexicon: HALOT
  rationale: עָם commonly means 'people.' In this war context it refers to the Amalekite
    people encountered in the campaign; 'people' is broad enough to preserve the Hebrew
    without over-specifying.
- source_word: הֶחֱרִים
  chosen: devoted ... to destruction
  alternatives:
  - utterly destroyed
  - put under the ban
  lexicon: HALOT
  rationale: The hiphil of חרם carries the sense of placing under ḥerem, devoting
    to destruction. 'Devoted to destruction' preserves the theological and lexical
    force better than the smoother but less transparent 'utterly destroyed.'
- source_word: לְפִי חָרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the mouth of the sword
  - with the sword
  lexicon: HALOT
  rationale: This is a Hebrew idiom literally 'to the mouth of the sword.' 'With the
    edge of the sword' is the established idiomatic equivalent in English that preserves
    the image better than the flatter 'with the sword.'
