theological_decisions:
- issue: Rendering of חרם in holy-war context
  chosen_reading: devote to destruction
  alternative_readings:
  - utterly destroy
  - put under the ban
  rationale: The verse hinges on Saul's failure to carry out what had been placed
    under חרם. 'Devote to destruction' preserves the covenantal/judicial force without
    softening the severity or reducing it to mere military killing.
  doctrine_reference: Translation philosophy §1, §5
