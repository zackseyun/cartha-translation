id: 1SA.15.9
reference: 1 Samuel 15:9
source:
  edition: WLC
  text: וַ/יַּחְמֹל֩ שָׁא֨וּל וְ/הָ/עָ֜ם עַל אֲגָ֗ג וְ/עַל מֵיטַ֣ב הַ/צֹּאן֩ וְ/הַ/בָּקָ֨ר
    וְ/הַ/מִּשְׁנִ֤ים וְ/עַל הַ/כָּרִים֙ וְ/עַל כָּל הַ/טּ֔וֹב וְ/לֹ֥א אָב֖וּ הַחֲרִימָ֑/ם
    וְ/כָל הַ/מְּלָאכָ֛ה נְמִבְזָ֥ה וְ/נָמֵ֖ס אֹתָ֥/הּ הֶחֱרִֽימוּ־־־־־־׃פ
translation:
  text: But Saul and the people spared Agag and the best of the sheep and the cattle,
    and the second-born, and the rams, and all that was good, and they were not willing
    to devote them to destruction. But every despised and worthless thing they devoted
    to destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fatlings.' The Hebrew term מִשְׁנִים is difficult; the traditional
      rendering is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'devote to destruction,' a technical term for placing something under
      the ban for destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחְמֹל
  chosen: spared
  alternatives:
  - had compassion on
  - pitied
  lexicon: HALOT
  rationale: In this context the verb describes refraining from carrying out the commanded
    destruction, not merely an internal feeling. 'Spared' captures the practical outcome
    while still implying misplaced pity.
- source_word: עַל אֲגָג
  chosen: Agag
  rationale: Personal name is transliterated per translation philosophy.
- source_word: מֵיטַב
  chosen: the best of
  alternatives:
  - the choicest of
  lexicon: HALOT
  rationale: The construct indicates the finest or best portion among the livestock.
    'The best of' is natural modern English and preserves the evaluative sense.
- source_word: הַצֹּאן
  chosen: the sheep
  alternatives:
  - the flock
  lexicon: HALOT
  rationale: A specific livestock term is preferable here because it is paired with
    cattle and other animals.
- source_word: הַבָּקָר
  chosen: the cattle
  alternatives:
  - the herd
  lexicon: HALOT
  rationale: Standard rendering for bovine livestock; coordinates naturally with 'sheep'.
- source_word: הַמִּשְׁנִים
  chosen: the second-born
  alternatives:
  - the fatlings
  - the choice animals of the second rank
  lexicon: HALOT
  rationale: The Hebrew term is difficult and comparatively rare. Morphologically
    and etymologically it is related to 'second' or 'double.' Rather than importing
    the traditional but uncertain 'fatlings,' this draft keeps a more transparent
    rendering tied to the Hebrew form, while preserving the common alternative in
    a footnote.
- source_word: הַכָּרִים
  chosen: the rams
  alternatives:
  - the lambs
  - the pasture-fed sheep
  lexicon: HALOT
  rationale: Commonly refers to rams or male lambs; 'rams' best fits the livestock
    inventory.
- source_word: כָּל הַטּוֹב
  chosen: all that was good
  alternatives:
  - everything good
  - all the good things
  lexicon: HALOT
  rationale: The phrase broadens beyond the listed animals to anything considered
    desirable. 'All that was good' preserves the qualitative sense.
- source_word: לֹא אָבוּ
  chosen: they were not willing
  alternatives:
  - they refused
  - they did not consent
  lexicon: HALOT
  rationale: The verb expresses volition or willingness. 'They were not willing' makes
    explicit that this was deliberate disobedience rather than inability.
- source_word: הַחֲרִימָם / הֶחֱרִימוּ
  chosen: devote them to destruction / devoted to destruction
  alternatives:
  - utterly destroy
  - put under the ban
  lexicon: HALOT
  rationale: חרם in this warfare context denotes placing persons or things under a
    ban for destruction. 'Devote to destruction' preserves the technical force better
    than the flatter 'destroy' and avoids archaic jargon in the main text.
- source_word: כָּל הַמְּלָאכָה
  chosen: every thing
  alternatives:
  - all the property
  - all the possessions
  - all the goods
  lexicon: HALOT
  rationale: Although מְלָאכָה often means 'work,' in this context it refers to what
    was acquired or handled as spoil/property. Because the following adjectives are
    singular feminine, an English singular collective is suitable; 'thing' is broad
    enough to fit the context without over-specifying.
- source_word: נְמִבְזָה
  chosen: despised
  alternatives:
  - despicable
  - contemptible
  lexicon: HALOT
  rationale: The participial/adjectival form denotes something treated as insignificant
    or held in contempt. 'Despised' keeps the evaluative nuance and pairs well with
    the next term.
- source_word: נָמֵס
  chosen: worthless
  alternatives:
  - feeble
  - melted away
  - of no value
  lexicon: HALOT
  rationale: The term is difficult; in context it contrasts with 'all that was good'
    and refers to what was weak or of little value. 'Worthless' communicates the practical
    sense in the spoil-selection context.
