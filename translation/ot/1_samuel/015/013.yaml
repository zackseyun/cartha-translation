id: 1SA.15.13
reference: 1 Samuel 15:13
source:
  edition: WLC
  text: וַ/יָּבֹ֥א שְׁמוּאֵ֖ל אֶל שָׁא֑וּל וַ/יֹּ֧אמֶר ל֣/וֹ שָׁא֗וּל בָּר֤וּךְ אַתָּה֙ לַֽ/יהוָ֔ה הֲקִימֹ֖תִי אֶת דְּבַ֥ר יְהוָֽה־־׃
translation:
  text: Then Samuel came to Saul, and Saul said to him, “Blessed are you to Yahweh; I have carried out the word of Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Blessed are you of the LORD.” The Hebrew blessing formula can be rendered more literally this way, but “by the LORD” better communicates the sense in contemporary English.
    reason: lexical_alternative
  - marker: b
    text: Or “I have fulfilled” or “I have performed” the word of the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: The wayyiqtol of בוא here narrates simple movement into Saul's presence. 'Came' is the most natural English narrative equivalent in this context.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is clear modern English.
- source_word: וַיֹּאמֶר לוֹ
  chosen: said to him
  alternatives:
  - said
  lexicon: HALOT
  rationale: The indirect object is explicit in Hebrew and should be retained for clarity in English.
- source_word: בָּרוּךְ אַתָּה לַיהוָה
  chosen: Blessed are you by the LORD
  alternatives:
  - Blessed are you of the LORD
  - May you be blessed by the LORD
  - Blessed are you to the LORD
  lexicon: HALOT
  rationale: This blessing formula most naturally expresses Saul pronouncing Samuel blessed with the LORD as source or agent of blessing. 'By the LORD' is idiomatic modern English and reflects the lamed construction in blessing contexts better than the archaic 'of the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֲקִימֹתִי
  chosen: I have carried out
  alternatives:
  - I have established
  - I have fulfilled
  - I have performed
  lexicon: HALOT
  rationale: The hiphil of קום with 'the word of the LORD' means to make it stand, i.e., to carry it into effect. 'Carried out' is natural English and conveys claimed obedience without wooden literalism.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the command of the LORD
  - the matter of the LORD
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'command.' Here Saul refers to the divine instruction he claims to have obeyed. 'Word of the LORD' preserves the Hebrew expression and its broader resonance, while the context already implies command.
