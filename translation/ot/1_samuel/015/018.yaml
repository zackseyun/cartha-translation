id: 1SA.15.18
reference: 1 Samuel 15:18
source:
  edition: WLC
  text: וַ/יִּשְׁלָחֲ/ךָ֥ יְהוָ֖ה בְּ/דָ֑רֶךְ וַ/יֹּ֗אמֶר לֵ֣ךְ וְ/הַחֲרַמְתָּ֞ה אֶת הַֽ/חַטָּאִים֙ אֶת עֲמָלֵ֔ק וְ/נִלְחַמְתָּ֣ ב֔/וֹ עַ֥ד כַּלּוֹתָ֖/ם אֹתָֽ/ם־־׃
translation:
  text: And Yahweh sent you on a mission and said, ‘Go and devote the sinners, the Amalekites, to destruction, and fight against them until they are consumed.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'utterly destroy'; the Hebrew verb refers to devoting something to destruction under the ban.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sinners, Amalek,' with 'Amalek' functioning as an appositional identification of 'the sinners.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלָחֲךָ
  chosen: sent you
  alternatives:
  - dispatched you
  lexicon: HALOT
  rationale: The verb שלח in the waw-consecutive narrative form straightforwardly means 'sent.' 'Sent you' is natural English and preserves the commissioning sense without overinterpreting.
- source_word: בְּדָרֶךְ
  chosen: on a mission
  alternatives:
  - on the way
  - on a journey
  - by a road
  lexicon: HALOT
  rationale: Although דרך literally means 'way/road,' in this idiom after 'sent' it denotes the course or mission on which Saul was commissioned. 'On a mission' best captures the sense in readable English without flattening the idiom into mere travel.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Go on
  lexicon: HALOT
  rationale: Imperative of הלך; 'Go' is the direct and idiomatic rendering.
- source_word: וְהַחֲרַמְתָּה
  chosen: devote ... to destruction
  alternatives:
  - utterly destroy
  - put under the ban
  lexicon: HALOT
  rationale: חרם in the Hiphil here refers to placing under the ban for destruction. 'Devote ... to destruction' preserves the technical force better than the traditional but less transparent 'utterly destroy.'
- source_word: הַחַטָּאִים
  chosen: the sinners
  alternatives:
  - those sinners
  - the sinful ones
  lexicon: HALOT
  rationale: The adjective/substantive identifies Amalek morally as 'the sinners.' Retaining the appositional moral label reflects the Hebrew emphasis rather than smoothing it away.
- source_word: אֶת עֲמָלֵק
  chosen: Amalek
  alternatives:
  - the Amalekites
  lexicon: HALOT
  rationale: The Hebrew names the people/group as 'Amalek.' English can preserve this collective singular, especially since the following pronouns become plural in sense. 'The Amalekites' is possible, but 'Amalek' stays closer to the source.
- source_word: וְנִלְחַמְתָּ בוֹ
  chosen: fight against them
  alternatives:
  - make war against him/it
  - battle against Amalek
  lexicon: HALOT
  rationale: Though the suffix on בוֹ is singular, it refers to the collective entity Amalek. English idiom prefers plural reference for the people group in this context, especially since the next suffix is plural. 'Fight against them' communicates the sense clearly.
- source_word: עַד כַּלּוֹתָם אֹתָם
  chosen: until you have wiped them out
  alternatives:
  - until they are finished
  - until you have consumed them
  - until you have completely destroyed them
  lexicon: HALOT
  rationale: כלה here expresses bringing them to an end. 'Wiped them out' is a natural modern rendering that conveys totality; the preceding 'devote ... to destruction' already preserves the technical חרם language, so some stylistic variation here avoids redundancy while keeping the force.
