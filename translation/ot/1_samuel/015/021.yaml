theological_decisions:
- issue: Rendering of חֵרֶם in a holy-war context
  chosen_reading: what had been devoted to destruction
  alternative_readings:
  - the devoted things
  - what was under the ban
  rationale: The phrase must preserve the theological force that these animals were
    not ordinary spoil but items placed under divine ban for destruction. The chosen
    rendering is transparent and understandable while retaining the gravity of the
    concept.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; consistency of key terms, or documented exception.'
- issue: Rendering of יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
