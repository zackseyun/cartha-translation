id: 1SA.15.21
reference: 1 Samuel 15:21
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח הָ/עָ֧ם מֵ/הַ/שָּׁלָ֛ל צֹ֥אן וּ/בָקָ֖ר רֵאשִׁ֣ית הַ/חֵ֑רֶם לִ/זְבֹּ֛חַ
    לַֽ/יהוָ֥ה אֱלֹהֶ֖י/ךָ בַּ/גִּלְגָּֽל׃
translation:
  text: But the people took from the spoil sheep and cattle, the best of what had
    been devoted to destruction, to sacrifice to the LORD your God at Gilgal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the plunder.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the best/first of what had been devoted to destruction'; the phrase
      refers to animals that were under the ban and should not have been kept.
    reason: lexical_alternative
  - marker: c
    text: '''The LORD'' renders the divine name YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - took away
  - seized
  lexicon: HALOT
  rationale: The verb לקח in this narrative context straightforwardly means 'took.'
    English singular 'took' is retained though the subject is collective ('the people').
    The prefixed waw is represented by the discourse-sensitive 'But' in context, reflecting
    contrast with Saul's prior claim.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  - the army
  lexicon: HALOT
  rationale: עם commonly means 'people.' Here it refers to Saul's men, but 'the people'
    preserves the Hebrew wording and the rhetorical force of shifting blame onto them.
- source_word: מֵהַשָּׁלָל
  chosen: from the spoil
  alternatives:
  - from the plunder
  lexicon: HALOT
  rationale: שׁלל denotes war booty. 'Spoil' is concise and idiomatic in biblical
    war contexts; 'plunder' is a viable modern alternative.
- source_word: צֹאן וּבָקָר
  chosen: sheep and cattle
  alternatives:
  - flocks and herds
  lexicon: HALOT
  rationale: The pair names small and large livestock specifically. 'Sheep and cattle'
    is more concrete than the somewhat broader 'flocks and herds.'
- source_word: רֵאשִׁית
  chosen: the best
  alternatives:
  - the first
  - the choicest
  - the chief part
  lexicon: HALOT
  rationale: Although רֵאשִׁית often means 'first/beginning,' in this context with
    spoil animals it idiomatically refers to the choicest or best portion. This matches
    the sense of selecting prime animals for sacrifice.
- source_word: הַחֵרֶם
  chosen: what had been devoted to destruction
  alternatives:
  - the devoted things
  - what was under the ban
  lexicon: HALOT
  rationale: חֵרֶם is a theologically charged term for persons or things devoted to
    God for destruction. 'What had been devoted to destruction' makes the sense clear
    in modern English without importing later jargon like 'the ban.'
- source_word: לִזְבֹּחַ
  chosen: to sacrifice
  alternatives:
  - for sacrificing
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To sacrifice' is the natural English
    rendering.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD' rather than transliterated.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'The 2ms suffix is significant: Saul says ''your God'' to Samuel rather
    than ''our God,'' which may suggest distance. The translation preserves this exactly.'
- source_word: בַּגִּלְגָּל
  chosen: at Gilgal
  alternatives:
  - in Gilgal
  lexicon: HALOT
  rationale: For a place name in this setting, 'at Gilgal' is idiomatic English.
