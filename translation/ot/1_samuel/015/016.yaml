id: 1SA.15.16
reference: 1 Samuel 15:16
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר שְׁמוּאֵל֙ אֶל שָׁא֔וּל הֶ֚רֶף וְ/אַגִּ֣ידָה לְּ/ךָ֔ אֵת֩ אֲשֶׁ֨ר
    דִּבֶּ֧ר יְהוָ֛ה אֵלַ֖/י הַ/לָּ֑יְלָה ו/יאמרו ל֖/וֹ דַּבֵּֽר־׃ס
translation:
  text: Then Samuel said to Saul, “Stop, and I will tell you what the LORD said to
    me last night.” And he said to him, “Speak.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew written form has ''and they said to him''; context indicates the
      speaker is Saul, so the sense is singular: ''and he said to him.'''
    reason: textual_variant
lexical_decisions:
- source_word: הֶרֶף
  chosen: Stop
  alternatives:
  - Wait
  - Enough
  - Hold back
  lexicon: HALOT
  rationale: Imperative of רפה in this context functions as a sharp command to cease
    speaking or desist. 'Stop' is concise, natural English and fits the rebuking tone
    better than the more archaic 'Stay' or the softer 'Wait.'
- source_word: וְאַגִּידָה לְּךָ
  chosen: and I will tell you
  alternatives:
  - and let me tell you
  - that I may tell you
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means 'declare/tell.' In sequence with the imperative,
    English future 'I will tell you' best conveys Samuel's intention without sounding
    stilted.
- source_word: אֵת אֲשֶׁר דִּבֶּר
  chosen: what ... said
  alternatives:
  - that which ... spoke
  - the word that ... spoke
  lexicon: HALOT
  rationale: This construction introduces the content of divine speech. 'What ...
    said' is idiomatic English and preserves the sense without unnecessary literalism.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name is rendered 'the LORD' rather
    than transliterated.
- source_word: הַלָּיְלָה
  chosen: last night
  alternatives:
  - tonight
  - during the night
  - this night
  lexicon: HALOT
  rationale: With the preceding perfect 'said to me,' the temporal expression refers
    to the immediately preceding night from the narrative standpoint. 'Last night'
    is the most natural English rendering here.
- source_word: וַיֹּאמְרוּ לוֹ
  chosen: And he said to him
  alternatives:
  - And they said to him
  lexicon: HALOT
  rationale: Although the consonantal form is plural ('and they said'), the context
    clearly requires singular Saul as the respondent, and many understand this as
    an orthographic/textual irregularity reflected in the ketiv/qere tradition. The
    singular is necessary for coherent translation.
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Go on
  - Say it
  lexicon: HALOT
  rationale: Simple imperative inviting Samuel to continue. 'Speak' is direct and
    preserves the brevity of the Hebrew.
