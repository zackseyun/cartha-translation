theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Reciprocal use of מאס ('reject') for Saul and the LORD
  chosen_reading: Use 'rejected' in both clauses
  alternative_readings:
  - Use different English verbs such as 'despised' and 'rejected'
  rationale: 'The Hebrew intentionally repeats the same root to underscore a measured reciprocity: Saul rejected the LORD''s word; the LORD rejected Saul as king. Preserving the repetition is both lexically and theologically important.'
