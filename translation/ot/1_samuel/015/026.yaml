id: 1SA.15.26
reference: 1 Samuel 15:26
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר שְׁמוּאֵל֙ אֶל שָׁא֔וּל לֹ֥א אָשׁ֖וּב עִמָּ֑/ךְ כִּ֤י מָאַ֨סְתָּה֙ אֶת דְּבַ֣ר יְהוָ֔ה וַ/יִּמְאָסְ/ךָ֣ יְהוָ֔ה מִ/הְי֥וֹת מֶ֖לֶךְ עַל יִשְׂרָאֵֽל־־־׃ס
translation:
  text: And Samuel said to Saul, “I will not return with you, because you have rejected the word of Yahweh, and Yahweh has rejected you from being king over Israel.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural, sufficiently formal rendering in English narrative style.
- source_word: לֹא אָשׁוּב
  chosen: I will not return
  alternatives:
  - I will not go back
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return/turn back.' 'Return' fits the immediate context of Samuel refusing to accompany Saul.
- source_word: עִמָּךְ
  chosen: with you
  alternatives:
  - with you along
  lexicon: HALOT
  rationale: Simple comitative preposition; 'with you' is the natural English equivalent.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for Samuel's refusal. 'Because' is clearer in modern English than the more formal 'for.'
- source_word: מָאַסְתָּה
  chosen: you have rejected
  alternatives:
  - you have despised
  - you have spurned
  lexicon: HALOT
  rationale: מאס denotes rejecting or refusing with disdain. 'Rejected' is clear, idiomatic, and preserves the judicial/covenantal force without overstating emotional nuance.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the command of the LORD
  - the message of the LORD
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'message.' Here it refers to the LORD's communicated command. 'The word of the LORD' preserves the familiar biblical expression while remaining accurate.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיִּמְאָסְךָ
  chosen: and the LORD has rejected you
  alternatives:
  - and the LORD has despised you
  - so the LORD has rejected you
  lexicon: HALOT
  rationale: 'The same Hebrew root מאס appears again; rendering it again as ''rejected'' preserves the deliberate wordplay and reciprocity: Saul rejected the LORD''s word, and the LORD rejected Saul.'
- source_word: מֵהְיוֹת
  chosen: from being
  alternatives:
  - from serving as
  - so that you are no longer
  lexicon: HALOT
  rationale: The preposition מִן with the infinitive of היה expresses removal from a state or role. 'From being' is the most direct and formally transparent rendering.
- source_word: מֶלֶךְ עַל יִשְׂרָאֵל
  chosen: king over Israel
  alternatives:
  - king of Israel
  lexicon: HALOT
  rationale: The Hebrew preposition עַל is literally 'over.' 'King over Israel' preserves the source wording and the sense of rule, while remaining natural English.
