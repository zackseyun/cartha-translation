theological_decisions:
- issue: Rendering divine immutability language without overstating philosophical
    claims
  chosen_reading: Use 'will not lie, nor will he relent' in the immediate covenant-judgment
    context
  alternative_readings:
  - will not repent
  - will not change his mind
  rationale: The verse asserts God's reliability and non-reversal regarding Saul's
    rejection. 'Relent' communicates the contextual sense of נחם without importing
    a broader abstract doctrine beyond what the verse states, while still preserving
    the theological force that God is unlike fallen human beings in unreliability
    or vacillation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
- issue: Choice of divine title נצח ישראל
  chosen_reading: the Glory of Israel
  alternative_readings:
  - the Eternal One of Israel
  - the Strength of Israel
  rationale: Because נצח has a debated semantic range here, the translation preserves
    a dignified title in the main text and notes alternatives rather than collapsing
    the ambiguity into a single doctrinally loaded concept such as absolute timelessness.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
