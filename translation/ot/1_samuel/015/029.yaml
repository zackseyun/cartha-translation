id: 1SA.15.29
reference: 1 Samuel 15:29
source:
  edition: WLC
  text: וְ/גַם֙ נֵ֣צַח יִשְׂרָאֵ֔ל לֹ֥א יְשַׁקֵּ֖ר וְ/לֹ֣א יִנָּחֵ֑ם כִּ֣י לֹ֥א אָדָ֛ם
    ה֖וּא לְ/הִנָּחֵֽם׃
translation:
  text: Moreover, the Glory of Israel will not lie, nor will he relent, for he is
    not a man, that he should relent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Eternal One of Israel,' 'the Strength of Israel,' or 'the Victory
      of Israel.' The Hebrew title has a broad semantic range.
    reason: lexical_alternative
  - marker: b
    text: Or 'nor will he change his mind' / 'nor will he be sorry.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: Moreover
  alternatives:
  - And also
  - Indeed
  lexicon: HALOT
  rationale: Introduces an additional emphatic assertion building on the preceding
    rebuke. 'Moreover' captures both conjunction and additive emphasis in natural
    English.
- source_word: נֵצַח יִשְׂרָאֵל
  chosen: the Glory of Israel
  alternatives:
  - the Eternal One of Israel
  - the Strength of Israel
  - the Victory of Israel
  lexicon: HALOT
  rationale: נֵצַח can denote enduring splendor, eminence, strength, or perpetuity
    depending on context. Here as a divine title parallel to God's unchangeability,
    'the Glory of Israel' preserves the elevated, titular force without over-specifying
    metaphysical eternity. Alternatives are viable and worth preserving because the
    semantic range is broad.
- source_word: יְשַׁקֵּר
  chosen: will not lie
  alternatives:
  - will not deceive
  - will not prove false
  lexicon: HALOT
  rationale: The piel of שקר commonly means 'to lie' or 'deal falsely.' 'Will not
    lie' is the most direct rendering and fits the contrast with human unreliability.
- source_word: וְלֹא יִנָּחֵם
  chosen: nor will he relent
  alternatives:
  - nor will he change his mind
  - nor will he be sorry
  lexicon: HALOT
  rationale: נחם in the nifal can mean to relent, be sorry, or change one's mind.
    'Relent' fits the immediate context of Saul's rejected kingship and avoids implying
    fickleness while still expressing reversal withheld.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding assertion; 'for' is concise and
    natural in elevated prose.
- source_word: לֹא אָדָם הוּא
  chosen: he is not a man
  alternatives:
  - he is not human
  lexicon: HALOT
  rationale: Per doctrine, אָדָם should be rendered 'man / humankind' according to
    context. Here the singular predicate contrasts God with a human being in general,
    so 'man' is the most natural gender-accurate rendering.
- source_word: לְהִנָּחֵם
  chosen: that he should relent
  alternatives:
  - that he should change his mind
  - to relent
  lexicon: HALOT
  rationale: 'The infinitive completes the comparison: unlike man, God is not one
    to reverse himself in this way. Repeating ''relent'' preserves lexical consistency
    with the earlier יִנָּחֵם.'
