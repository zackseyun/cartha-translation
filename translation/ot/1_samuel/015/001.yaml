id: 1SA.15.1
reference: 1 Samuel 15:1
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר שְׁמוּאֵל֙ אֶל שָׁא֔וּל אֹתִ֨/י שָׁלַ֤ח יְהוָה֙ לִ/מְשָׁחֳ/ךָ֣
    לְ/מֶ֔לֶךְ עַל עַמּ֖/וֹ עַל יִשְׂרָאֵ֑ל וְ/עַתָּ֣ה שְׁמַ֔ע לְ/ק֖וֹל דִּבְרֵ֥י
    יְהוָֽה־־־׃ס
translation:
  text: Then Samuel said to Saul, “The LORD sent me to anoint you as king over his
    people, over Israel. So now, listen to the voice of the words of the LORD.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hear the voice of the words of the LORD.' The Hebrew expression is more
      literal than the smoother English rendering and carries an implicit call not
      only to hear but to heed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative progression without over-literal repetition of 'and.'
- source_word: שְׁמוּאֵל
  chosen: Samuel
  rationale: Standard English transliteration of the personal name.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Normal directional preposition in speech reporting; 'to' is idiomatic
    modern English.
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Standard English transliteration of the personal name.
- source_word: אֹתִי
  chosen: me
  lexicon: HALOT
  rationale: Direct-object pronoun fronted for emphasis in Hebrew; English expresses
    the sense naturally as 'The LORD sent me...' without attempting to reproduce the
    fronting mechanically.
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - has sent
  lexicon: HALOT
  rationale: Qatal in direct speech here refers to a completed past commissioning;
    simple past is the clearest English rendering.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: לִמְשָׁחֳךָ
  chosen: to anoint you
  alternatives:
  - to consecrate you
  lexicon: HALOT
  rationale: The infinitive of משׁח denotes anointing for office. 'Anoint you' preserves
    the royal-installation sense and biblical terminology.
- source_word: לְמֶלֶךְ
  chosen: as king
  alternatives:
  - for king
  - to be king
  lexicon: HALOT
  rationale: The lamed marks result/role. 'As king' is idiomatic and conveys appointment
    to office.
- source_word: עַל עַמּוֹ
  chosen: over his people
  alternatives:
  - for his people
  lexicon: HALOT
  rationale: עַל with royal office indicates rule over. The suffix on 'people' refers
    to the LORD, so 'his people' is retained.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - namely, Israel
  lexicon: HALOT
  rationale: The repeated עַל appositionally specifies the people as Israel. Keeping
    'over Israel' preserves the Hebrew emphasis and cadence.
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Marks transition from reminder of Saul's commissioning to present exhortation.
    'So now' captures both continuity and inferential force in natural English.
- source_word: שְׁמַע
  chosen: listen
  alternatives:
  - hear
  - obey
  lexicon: HALOT
  rationale: שׁמע can imply hearing with obedience, but here the immediate object
    is 'the voice of the words,' so 'listen' best fits the immediate speech-act while
    leaving the obedience implication implicit.
- source_word: לְקוֹל
  chosen: to the voice
  alternatives:
  - to the sound
  - to
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'to the voice'; retaining 'voice' preserves
    the concrete idiom and solemnity better than flattening to simply 'to.'
- source_word: דִּבְרֵי
  chosen: the words
  alternatives:
  - the message
  - the commands
  lexicon: HALOT
  rationale: Although the phrase can function idiomatically as 'message,' 'words'
    more closely reflects the Hebrew and avoids importing a narrower sense than the
    text states.
