theological_decisions:
- issue: Anthropopathic language for God in נִחָם
  chosen_reading: regretted
  alternative_readings:
  - was sorry
  - relented
  rationale: The verse explicitly attributes נִחָם to the LORD. To preserve theological
    tension rather than resolve it, the translation keeps the personal, affective
    language instead of softening it into a merely administrative change of plan.
    'Regretted' fits the immediate context ('that he had made Saul king') and avoids
    importing a denial of divine constancy into the translation itself.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it); Contested terms table for יְהוָה
