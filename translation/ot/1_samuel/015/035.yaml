id: 1SA.15.35
reference: 1 Samuel 15:35
source:
  edition: WLC
  text: וְ/לֹא יָסַ֨ף שְׁמוּאֵ֜ל לִ/רְא֤וֹת אֶת שָׁאוּל֙ עַד י֣וֹם מוֹת֔/וֹ כִּֽי
    הִתְאַבֵּ֥ל שְׁמוּאֵ֖ל אֶל שָׁא֑וּל וַ/יהוָ֣ה נִחָ֔ם כִּֽי הִמְלִ֥יךְ אֶת שָׁא֖וּל
    עַל יִשְׂרָאֵֽל־־־־־־־־׃פ
translation:
  text: And Samuel did not see Saul again until the day of his death, for Samuel mourned
    over Saul. And the LORD regretted that he had made Saul king over Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was sorry' or 'relented.' The Hebrew verb can carry a range of senses
      depending on context; here it expresses the LORD's grief/regret over having
      made Saul king.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָסַף ... לִרְאוֹת
  chosen: did not see ... again
  alternatives:
  - did not continue to see
  - did not add to see
  lexicon: HALOT
  rationale: The idiom יָסַף + infinitive with negation means to do something no more
    / again. 'Did not see ... again' is natural English and preserves the sense without
    woodenly reproducing the Hebrew idiom.
- source_word: לִרְאוֹת אֶת שָׁאוּל
  chosen: see Saul
  alternatives:
  - meet with Saul
  - appear before Saul
  lexicon: HALOT
  rationale: ראה here is the ordinary verb 'see.' In context it implies no further
    personal encounter, but 'see Saul' best preserves the lexical form while allowing
    the contextual implication.
- source_word: עַד יוֹם מוֹתוֹ
  chosen: until the day of his death
  alternatives:
  - until the day he died
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the Hebrew genitival construction
    and keeps the solemn tone.
- source_word: הִתְאַבֵּל
  chosen: mourned
  alternatives:
  - grieved
  - lamented
  lexicon: HALOT
  rationale: The Hitpael of אבל denotes mourning. 'Mourned' is the most direct equivalent
    and fits Samuel's grief over Saul's downfall.
- source_word: אֶל שָׁאוּל
  chosen: over Saul
  alternatives:
  - for Saul
  - concerning Saul
  lexicon: HALOT
  rationale: Although the preposition is אֶל ('to/toward'), with verbs of mourning
    English idiom normally uses 'over' or 'for.' 'Over Saul' communicates mourning
    concerning Saul's condition and fate.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and Jewish reverence tradition.
- source_word: נִחָם
  chosen: regretted
  alternatives:
  - was sorry
  - relented
  lexicon: HALOT
  rationale: In this context, where the object clause is 'that he had made Saul king,'
    the sense is divine regret/grief rather than relenting from a threatened action.
    'Regretted' best matches the contextual force while preserving the anthropopathic
    tension.
- source_word: הִמְלִיךְ
  chosen: had made ... king
  alternatives:
  - had appointed ... king
  - had caused ... to reign
  lexicon: HALOT
  rationale: The Hiphil of מלך means to make someone king. 'Had made Saul king' is
    straightforward and idiomatic English.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - upon Israel
  lexicon: HALOT
  rationale: '''Over Israel'' is the normal English expression for royal rule and
    accurately reflects עַל in this context.'
