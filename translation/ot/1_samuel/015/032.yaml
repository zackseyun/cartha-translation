id: 1SA.15.32
reference: 1 Samuel 15:32
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שְׁמוּאֵ֗ל הַגִּ֤ישׁוּ אֵלַ/י֙ אֶת אֲגַג֙ מֶ֣לֶךְ עֲמָלֵ֔ק וַ/יֵּ֣לֶךְ
    אֵלָ֔י/ו אֲגַ֖ג מַעֲדַנֹּ֑ת וַ/יֹּ֣אמֶר אֲגָ֔ג אָכֵ֖ן סָ֥ר מַר הַ/מָּֽוֶת־־׃ס
translation:
  text: Then Samuel said, “Bring Agag king of Amalek to me.” And Agag came to him
    cheerfully, and Agag said, “Surely the bitterness of death has turned aside.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “delicately”; the Hebrew word מַעֲדַנֹּת is uncertain. Some understand
      it to mean Agag came in a pleasant or confident manner; others, following a
      different interpretation, render “in chains.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגִּישׁוּ
  chosen: Bring
  alternatives:
  - Bring near
  - Present
  lexicon: HALOT
  rationale: Hiphil imperative plural of נגשׁ, here a command to attendants to cause
    Agag to come before Samuel. 'Bring' is natural modern English and preserves the
    directive force.
- source_word: אֲגַג מֶלֶךְ עֲמָלֵק
  chosen: Agag king of Amalek
  alternatives:
  - Agag, the king of Amalek
  rationale: Personal name is transliterated; the construct phrase identifies his
    royal status over Amalek. The appositional English phrase is straightforward.
- source_word: וַיֵּלֶךְ אֵלָיו
  chosen: came to him
  alternatives:
  - went to him
  lexicon: HALOT
  rationale: Although the verb is literally 'went,' English idiom from the narrator's
    perspective is better as 'came to him' since Samuel has just said 'to me.' This
    is a standard optimal-equivalence adjustment without changing sense.
- source_word: מַעֲדַנֹּת
  chosen: cheerfully
  alternatives:
  - delicately
  - daintily
  - in chains
  lexicon: HALOT
  rationale: The Hebrew form is difficult and debated. Traditional English versions
    often render 'delicately' or, by a different understanding, 'in chains.' In context
    Agag's following statement expresses confidence that danger has passed, which
    supports an adverbial sense such as 'cheerfully' or 'confidently.' 'Cheerfully'
    communicates his demeanor in readable English while preserving the narrative contrast
    with Samuel's coming execution.
- source_word: אָכֵן
  chosen: Surely
  alternatives:
  - Indeed
  - Truly
  lexicon: HALOT
  rationale: Marks Agag's confident assertion. 'Surely' fits the tone of self-assurance.
- source_word: סָר
  chosen: has turned aside
  alternatives:
  - has departed
  - is gone
  lexicon: HALOT
  rationale: Qal perfect of סור, 'turn aside/depart.' 'Has turned aside' preserves
    the metaphorical movement away from Agag.
- source_word: מַר הַמָּוֶת
  chosen: the bitterness of death
  alternatives:
  - death's bitterness
  - the bitter fate of death
  lexicon: HALOT
  rationale: Construct-like phrase expressing the bitter experience or threat of death.
    'The bitterness of death' is clear and fairly formal without over-paraphrase.
