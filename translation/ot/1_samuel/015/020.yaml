theological_decisions:
- issue: Rendering of חרם in a holy-war context
  chosen_reading: I devoted Amalek to destruction
  alternative_readings:
  - I utterly destroyed Amalek
  - I put Amalek under the ban
  rationale: The verse concerns Saul's claim to have carried out the LORD's command of total destruction. 'Devoted to destruction' preserves the covenantal/judicial force of חרם without importing extra explanation into the main text. Alternatives are preserved because English tradition often uses 'utterly destroyed' and some readers may recognize 'under the ban.'
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Saul's emphatic self-defense
  chosen_reading: But I did obey the voice of the LORD
  alternative_readings:
  - I obeyed the voice of the LORD
  - Indeed, I obeyed the voice of the LORD
  rationale: The particle אֲשֶׁר here functions idiomatically in Saul's rebuttal, and the context is argumentative. 'But I did obey' captures the contrastive, defensive force in readable English without adding content beyond the discourse sense.
  doctrine_reference: Translation philosophy §6
