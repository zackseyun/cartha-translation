id: 1SA.15.20
reference: 1 Samuel 15:20
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר שָׁא֜וּל אֶל שְׁמוּאֵ֗ל אֲשֶׁ֤ר שָׁמַ֨עְתִּי֙ בְּ/ק֣וֹל יְהוָ֔ה וָ/אֵלֵ֕ךְ בַּ/דֶּ֖רֶךְ אֲשֶׁר שְׁלָחַ֣/נִי יְהוָ֑ה וָ/אָבִ֗יא אֶת אֲגַג֙ מֶ֣לֶךְ עֲמָלֵ֔ק וְ/אֶת עֲמָלֵ֖ק הֶחֱרַֽמְתִּי־־־־׃
translation:
  text: Saul said to Samuel, “But I did obey the voice of Yahweh, and I went on the way that Yahweh sent me, and I brought Agag king of Amalek, and I devoted Amalek to destruction.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I utterly destroyed Amalek” or “I put Amalek under the ban.” The Hebrew verb carries the sense of devoting something to destruction.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “I obeyed/listened to the voice of the LORD.”
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתִּי בְּקוֹל
  chosen: I did obey the voice of
  alternatives:
  - I obeyed
  - I listened to the voice of
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל commonly means 'obey/listen to the voice of.' The emphatic English auxiliary 'did' reflects Saul's defensive insistence in context, while retaining the idiom 'voice of' rather than flattening it completely.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וָאֵלֵךְ בַּדֶּרֶךְ
  chosen: I went on the way
  alternatives:
  - I went in the way
  - I went on the mission
  lexicon: HALOT
  rationale: The Hebrew is literally 'I went on/in the way.' 'On the way' preserves the metaphor of the assigned course while remaining natural English. 'Mission' would be more interpretive than the source requires.
- source_word: אֲשֶׁר שְׁלָחַנִי יְהוָה
  chosen: that the LORD sent me
  alternatives:
  - on which the LORD sent me
  - where the LORD sent me
  lexicon: HALOT
  rationale: This relative clause modifies 'the way.' English idiom is smoother with 'that the LORD sent me,' conveying commission without over-literal awkwardness.
- source_word: וָאָבִיא
  chosen: I brought
  alternatives:
  - I brought back
  - I led back
  lexicon: HALOT
  rationale: The hiphil of בוא here indicates causing to come/bringing. 'Brought' is the most direct rendering; 'brought back' is possible from context but not explicit in the verb itself.
- source_word: אֲגַג מֶלֶךְ עֲמָלֵק
  chosen: Agag king of Amalek
  alternatives:
  - Agag, the king of Amalek
  lexicon: HALOT
  rationale: A straightforward appositional rendering preserves the Hebrew identification.
- source_word: הֶחֱרַמְתִּי
  chosen: I devoted ... to destruction
  alternatives:
  - I utterly destroyed
  - I put under the ban
  lexicon: HALOT
  rationale: חרם in the hiphil denotes devoting something to destruction under a ban. 'Devoted to destruction' preserves the theological and cultic force better than the traditional but less transparent 'utterly destroyed.'
- source_word: וְאֶת עֲמָלֵק
  chosen: Amalek
  alternatives:
  - the Amalekites
  lexicon: HALOT
  rationale: The text has the singular proper name 'Amalek,' which can stand metonymically for the people/nation. Retaining 'Amalek' is closer to the Hebrew; the collective sense is clear from context.
