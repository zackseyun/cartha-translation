id: 1SA.15.19
reference: 1 Samuel 15:19
source:
  edition: WLC
  text: וְ/לָ֥/מָּה לֹא שָׁמַ֖עְתָּ בְּ/ק֣וֹל יְהוָ֑ה וַ/תַּ֨עַט֙ אֶל הַ/שָּׁלָ֔ל וַ/תַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֥י יְהוָֽה־־׃ס
translation:
  text: Why then did you not obey the voice of Yahweh, but rush upon the spoil and do what was evil in the eyes of Yahweh?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pounce on the plunder' or 'swoop down on the spoil'; the Hebrew verb suggests eager, grasping movement toward the war booty.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָמָּה
  chosen: Why then
  alternatives:
  - And why
  - Why
  lexicon: HALOT
  rationale: Introduces Samuel's rebuke with an interrogative. 'Then' captures the connective force of וְ in context without woodenly preserving 'and' in English.
- source_word: שָׁמַעְתָּ בְּקוֹל
  chosen: obey the voice
  alternatives:
  - listen to the voice
  - heed the voice
  lexicon: HALOT
  rationale: In this covenantal/command context, שׁמע with בְּקוֹל means more than auditory hearing; it denotes obedience to what was commanded. 'Obey the voice' preserves both the idiom and the concrete Hebrew wording.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַתַּעַט אֶל
  chosen: rush upon
  alternatives:
  - pounce on
  - swoop down on
  - turn to eagerly
  lexicon: HALOT
  rationale: The verb conveys greedy, impulsive movement toward the plunder. 'Rush upon' is vivid and natural English while preserving the sense of wrongful eagerness better than a flatter 'turn to'.
- source_word: הַשָּׁלָל
  chosen: the spoil
  alternatives:
  - the plunder
  - the booty
  lexicon: HALOT
  rationale: '''Spoil'' is a standard military term in English and fits the narrative register. ''Booty'' is potentially distracting in modern English; ''plunder'' is possible, but ''spoil'' pairs well with the idiom here.'
- source_word: וַתַּעַשׂ הָרַע
  chosen: do what was evil
  alternatives:
  - do evil
  - do the evil
  lexicon: HALOT
  rationale: This idiom commonly means to act wickedly. 'Do what was evil' is idiomatic English and reflects the article on רַע without sounding unnatural.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: A common Hebrew evaluative idiom. 'In the eyes of the LORD' preserves the metaphor transparently and remains readable in modern English.
