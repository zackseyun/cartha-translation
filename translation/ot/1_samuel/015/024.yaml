theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Following the project's doctrinal
    and stylistic standard, it is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Idiomatic expression פִּי יְהוָה
  chosen_reading: the command of the LORD
  alternative_readings:
  - the mouth of the LORD
  - the word of the LORD
  rationale: A literal rendering would be awkward in English and obscure the sense
    of violated divine instruction. 'Command' best fits the narrative context of Saul
    failing to carry out a direct order, while avoiding doctrinal overstatement.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
