theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Idiomatic expression פִּי יְהוָה
  chosen_reading: the command of Yahweh
  alternative_readings:
  - the mouth of the LORD
  - the word of the LORD
  rationale: A literal rendering would be awkward in English and obscure the sense of violated divine instruction. 'Command' best fits the narrative context of Saul failing to carry out a direct order, while avoiding doctrinal overstatement.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
