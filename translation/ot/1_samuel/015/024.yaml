id: 1SA.15.24
reference: 1 Samuel 15:24
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר שָׁא֤וּל אֶל שְׁמוּאֵל֙ חָטָ֔אתִי כִּֽי עָבַ֥רְתִּי אֶת פִּֽי יְהוָ֖ה וְ/אֶת דְּבָרֶ֑י/ךָ כִּ֤י יָרֵ֨אתִי֙ אֶת הָ/עָ֔ם וָ/אֶשְׁמַ֖ע בְּ/קוֹלָֽ/ם־־־־־־׃
translation:
  text: Then Saul said to Samuel, “I have sinned, for I transgressed the command of Yahweh and your words, for I feared the people and listened to their voice.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “the mouth of the LORD.”
    reason: lexical_alternative
  - marker: b
    text: Or “and obeyed them”; Hebrew literally, “and listened to their voice.”
    reason: lexical_alternative
lexical_decisions:
- source_word: חָטָאתִי
  chosen: I have sinned
  alternatives:
  - I sinned
  lexicon: HALOT
  rationale: The Hebrew perfect here is a present confession of completed wrongdoing. English present perfect communicates Saul’s admission naturally while preserving the force of personal culpability.
- source_word: עָבַרְתִּי
  chosen: I transgressed
  alternatives:
  - I went beyond
  - I violated
  - I disobeyed
  lexicon: HALOT
  rationale: The verb literally means 'to pass over/beyond.' In this context of violating divine instruction, 'transgressed' best preserves the formal moral-legal sense without flattening it to the more generic 'disobeyed.'
- source_word: פִּי יְהוָה
  chosen: the command of the LORD
  alternatives:
  - the mouth of the LORD
  - the word of the LORD
  lexicon: HALOT
  rationale: Literally 'the mouth of YHWH,' an idiom for what the LORD has spoken/commanded. 'The command of the LORD' brings the idiomatic sense into clear English in this context, where Saul has failed to carry out a specific divine directive.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: דְּבָרֶיךָ
  chosen: your words
  alternatives:
  - your word
  - what you said
  lexicon: HALOT
  rationale: The plural construct with second masculine singular suffix is most naturally 'your words.' This preserves the Hebrew form and includes Samuel’s spoken instructions alongside the LORD’s command.
- source_word: יָרֵאתִי
  chosen: I feared
  alternatives:
  - I was afraid of
  lexicon: HALOT
  rationale: The verb denotes fear. 'I feared' is concise and preserves the moral weight of Saul’s explanation; 'was afraid of' is possible but slightly more interpretive.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  - the army
  lexicon: HALOT
  rationale: The noun ordinarily means 'the people.' In context it refers to the people under Saul’s leadership, likely including the fighting men, but the broader term should be retained unless context requires narrowing.
- source_word: וָאֶשְׁמַע בְּקוֹלָם
  chosen: and listened to their voice
  alternatives:
  - and obeyed them
  - and listened to them
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'listened to their voice.' Retaining 'voice' preserves the Hebrew expression and its resonance with the earlier contrast between obeying the LORD’s voice and the people’s voice. 'Obeyed them' captures implication but loses the verbal parallel.
