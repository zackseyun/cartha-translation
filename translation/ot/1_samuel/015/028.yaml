theological_decisions:
- issue: Rendering the divine judgment as completed or future
  chosen_reading: 'completed/decretive: ''has torn ... has given'''
  alternative_readings:
  - 'future-oriented: ''will tear ... will give'''
  rationale: The Hebrew perfects in this prophetic pronouncement present the loss and transfer of kingship as an accomplished divine act, even if its full historical outworking unfolds later. Rendering them as completed preserves the force of irrevocable judgment in context.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
