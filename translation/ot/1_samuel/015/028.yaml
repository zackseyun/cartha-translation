id: 1SA.15.28
reference: 1 Samuel 15:28
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלָי/ו֙ שְׁמוּאֵ֔ל קָרַ֨ע יְהוָ֜ה אֶֽת מַמְלְכ֧וּת יִשְׂרָאֵ֛ל מֵ/עָלֶ֖י/ךָ הַ/יּ֑וֹם וּ/נְתָנָ֕/הּ לְ/רֵעֲ/ךָ֖ הַ/טּ֥וֹב מִמֶּֽ/ךָּ־׃
translation:
  text: And Samuel said to him, “Yahweh has torn the kingdom of Israel away from you today and has given it to your neighbor, who is better than you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to your companion' or 'to your fellow.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'better than you,' describing the one to whom the kingdom is given.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלָיו
  chosen: And Samuel said to him
  alternatives:
  - Then Samuel said to him
  - So Samuel said to him
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And' is a natural, sufficiently formal rendering in English narrative style without overstating temporal sequence.
- source_word: קָרַע
  chosen: has torn ... away
  alternatives:
  - has torn
  - has ripped away
  - has torn off
  lexicon: HALOT
  rationale: The verb literally means 'tear/rend' and echoes the symbolic tearing in the immediate context (Samuel's robe torn in v. 27). 'Has torn ... away' preserves both the vivid metaphor and the sense of removal from Saul.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מַמְלְכוּת יִשְׂרָאֵל
  chosen: the kingdom of Israel
  alternatives:
  - the kingship over Israel
  - the royal rule of Israel
  lexicon: HALOT
  rationale: מַמְלְכוּת can denote kingship or kingdom. Here the object being removed and given to another is best expressed as 'the kingdom of Israel' in idiomatic English, while still conveying royal authority.
- source_word: מֵעָלֶיךָ
  chosen: away from you
  alternatives:
  - from upon you
  - from you
  lexicon: HALOT
  rationale: The prepositional phrase marks removal from Saul's possession/authority. 'Away from you' makes the force of separation clear in natural English.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is the natural modern English equivalent and preserves the immediacy of the judgment.'
- source_word: וּנְתָנָהּ
  chosen: and has given it
  alternatives:
  - and given it
  - and will give it
  lexicon: HALOT
  rationale: The perfect form in prophetic/judgment speech can describe an action as decisively accomplished. 'Has given it' matches the completed force alongside 'has torn' and fits the context of divine decree already pronounced.
- source_word: לְרֵעֲךָ
  chosen: to your neighbor
  alternatives:
  - to your companion
  - to your fellow
  lexicon: HALOT
  rationale: רֵעַ commonly means neighbor, friend, or associate. Here it refers to another person in relation to Saul, not necessarily an intimate friend. 'Neighbor' is a standard and sufficiently broad rendering.
- source_word: הַטּוֹב מִמֶּךָּ
  chosen: who is better than you
  alternatives:
  - better than you
  - who is more worthy than you
  lexicon: HALOT
  rationale: The adjective with comparative מן straightforwardly means 'better than you.' Adding 'who is' yields smooth English and makes explicit that the phrase modifies 'neighbor'.
