id: 1SA.15.10
reference: 1 Samuel 15:10
source:
  edition: WLC
  text: וַֽ/יְהִי֙ דְּבַר יְהוָ֔ה אֶל שְׁמוּאֵ֖ל לֵ/אמֹֽר־־׃
translation:
  text: Then the word of the LORD came to Samuel, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: Then ... came
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a new narrative development. In
    idiomatic modern English, 'Then ... came' captures the sequential force without
    the archaic 'it came to pass.'
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - a word
  - message
  lexicon: HALOT
  rationale: In the prophetic formula דְּבַר יְהוָה, 'the word' is the standard and
    most transparent rendering, preserving the formal link to divine revelation language.
    'Message' is possible but less textually anchored.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following longstanding English convention and the stated translation
    policy.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks the recipient of the divine word; 'to' is the natural
    English equivalent here.
- source_word: שְׁמוּאֵל
  chosen: Samuel
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: This infinitive introduces the content of the divine speech in standard
    Hebrew narrative style. 'Saying' is the conventional and clear English rendering.
