id: 1SA.15.22
reference: 1 Samuel 15:22
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שְׁמוּאֵ֗ל הַ/חֵ֤פֶץ לַֽ/יהוָה֙ בְּ/עֹל֣וֹת וּ/זְבָחִ֔ים כִּ/שְׁמֹ֖עַ
    בְּ/ק֣וֹל יְהוָ֑ה הִנֵּ֤ה שְׁמֹ֨עַ֙ מִ/זֶּ֣בַח ט֔וֹב לְ/הַקְשִׁ֖יב מֵ/חֵ֥לֶב אֵילִֽים׃
translation:
  text: And Samuel said, “Does the LORD delight in burnt offerings and sacrifices
    as much as in obeying the voice of the LORD? Look, to obey is better than sacrifice,
    and to listen than the fat of rams.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'hearing/listening'; in this context the verb often carries the sense
      of hearing with obedience.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֵפֶץ
  chosen: delight
  alternatives:
  - take pleasure
  - desire
  lexicon: HALOT
  rationale: The noun with interrogative force asks whether YHWH has pleasure in sacrifices.
    'Delight' is natural modern English and preserves the affective sense better than
    the flatter 'desire.'
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD.'
- source_word: בְּעֹלוֹת וּזְבָחִים
  chosen: in burnt offerings and sacrifices
  alternatives:
  - with burnt offerings and sacrifices
  lexicon: HALOT
  rationale: The preposition ב here marks the sphere/object of delight. 'In burnt
    offerings and sacrifices' is idiomatic and keeps the sacrificial categories distinct.
- source_word: כִּשְׁמֹעַ
  chosen: as much as in obeying
  alternatives:
  - as in listening to
  - compared with obeying
  lexicon: HALOT
  rationale: The infinitive of שׁמע here carries the covenantal sense of hearing with
    responsive obedience, not mere auditory reception. 'As much as in obeying' brings
    out the contrast Samuel intends.
- source_word: בְּקוֹל יְהוָה
  chosen: the voice of the LORD
  alternatives:
  - the LORD's voice
  lexicon: HALOT
  rationale: A close rendering preserves the Hebrew idiom 'voice of the LORD,' which
    in context means his spoken command.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces emphatic attention to the maxim that follows. 'Look' is readable
    modern English without archaic tone.
- source_word: שְׁמֹעַ
  chosen: to obey
  alternatives:
  - to hear
  - to listen
  lexicon: HALOT
  rationale: In this context שׁמע again means responsive obedience to God's command.
    Rendering it 'obey' in the main clause makes the ethical force explicit and matches
    the contrast with sacrifice.
- source_word: מִזֶּבַח טוֹב
  chosen: is better than sacrifice
  alternatives:
  - is better than a sacrifice
  lexicon: HALOT
  rationale: The comparative construction with טוב expresses superiority. English
    idiom prefers the generic singular 'sacrifice' here.
- source_word: לְהַקְשִׁיב
  chosen: to listen
  alternatives:
  - to pay attention
  - to heed
  lexicon: HALOT
  rationale: קשׁב emphasizes attentive listening. Since שׁמע has already been rendered
    'obey,' varying this as 'listen' preserves the parallelism while distinguishing
    the verbs.
- source_word: מֵחֵלֶב אֵילִים
  chosen: than the fat of rams
  alternatives:
  - than fat from rams
  lexicon: HALOT
  rationale: Refers to the choicest sacrificial portion. 'The fat of rams' is the
    standard and clear rendering.
