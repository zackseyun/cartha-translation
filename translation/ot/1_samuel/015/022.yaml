theological_decisions:
- issue: Rendering of obedience language in relation to sacrifice
  chosen_reading: Use 'obey' for שׁמע in the main comparison and 'listen' for הקשׁיב
    in the parallel line.
  alternative_readings:
  - Use 'hear'/'listen' in both clauses to preserve tighter lexical repetition
  rationale: The verse contrasts ritual offering with responsive submission to God's
    command. In English, 'obey' best communicates the covenantal force of שׁמע here,
    while 'listen' for הקשׁיב preserves the poetic parallel without flattening both
    verbs into mere auditory hearing. This preserves the text's theological emphasis
    that covenant faithfulness outranks ritual performance.
  doctrine_reference: Translation philosophy §§1, 5, 6
