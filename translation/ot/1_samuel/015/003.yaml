theological_decisions:
- issue: Rendering of חרם warfare language
  chosen_reading: devote to destruction
  alternative_readings:
  - utterly destroy
  - put under the ban
  rationale: The verse uses cultically charged judgment language, not merely ordinary
    military destruction. The chosen rendering preserves that theological weight without
    importing explanatory paraphrase into the main text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Retention of the singular 'Amalek'/'him'
  chosen_reading: Amalek ... him
  alternative_readings:
  - the Amalekites ... them
  rationale: The Hebrew uses singular forms for the corporate entity. Preserving the
    singular maintains source-text form while remaining intelligible in English.
  doctrine_reference: Translation philosophy §1, §5
- issue: Gender-accurate human pair
  chosen_reading: man and woman
  alternative_readings:
  - men and women
  - people
  rationale: The Hebrew explicitly names male and female categories. Following the
    gender-accurate policy, the translation preserves those terms rather than neutralizing
    them.
  doctrine_reference: Translation philosophy §4
