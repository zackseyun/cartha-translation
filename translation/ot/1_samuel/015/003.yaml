id: 1SA.15.3
reference: 1 Samuel 15:3
source:
  edition: WLC
  text: עַתָּה֩ לֵ֨ךְ וְ/הִכִּֽיתָ֜ה אֶת עֲמָלֵ֗ק וְ/הַֽחֲרַמְתֶּם֙ אֶת כָּל אֲשֶׁר
    ל֔/וֹ וְ/לֹ֥א תַחְמֹ֖ל עָלָ֑י/ו וְ/הֵמַתָּ֞ה מֵ/אִ֣ישׁ עַד אִשָּׁ֗ה מֵֽ/עֹלֵל֙
    וְ/עַד יוֹנֵ֔ק מִ/שּׁ֣וֹר וְ/עַד שֶׂ֔ה מִ/גָּמָ֖ל וְ/עַד חֲמֽוֹר־־־־־־־־׃ס
translation:
  text: Now go and strike Amalek, and devote to destruction all that belongs to him.
    Do not spare him, but put to death man and woman, child and nursing infant, ox
    and sheep, camel and donkey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'utterly destroy' or 'put under the ban.' The Hebrew verb carries the
      sense of devoting something irrevocably to destruction under divine judgment.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Amalek' and throughout this verse 'him'; the singular refers to
      the Amalekite people as a corporate entity.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - So now
  - At this time
  lexicon: HALOT
  rationale: Temporal/discourse marker introducing the command sequence; 'Now' is
    natural and sufficiently direct.
- source_word: לֵךְ
  chosen: go
  alternatives:
  - set out
  - proceed
  lexicon: HALOT
  rationale: Simple imperative of הלך; 'go' preserves the directness of the command.
- source_word: וְהִכִּיתָה
  chosen: strike
  alternatives:
  - attack
  - defeat
  lexicon: HALOT
  rationale: נכה commonly means 'strike/smite.' 'Strike' is more formally aligned
    with the Hebrew than 'attack,' while avoiding archaic 'smite.'
- source_word: עֲמָלֵק
  chosen: Amalek
  alternatives:
  - the Amalekites
  lexicon: HALOT
  rationale: The singular proper name appears in the text. In context it denotes the
    Amalekite people/polity, but retaining 'Amalek' follows the Hebrew form closely.
- source_word: וְהַחֲרַמְתֶּם
  chosen: devote to destruction
  alternatives:
  - utterly destroy
  - put under the ban
  lexicon: HALOT
  rationale: חרם in the Hiphil denotes placing under ḥerem, that is, devoting something
    irrevocably to destruction. 'Devote to destruction' preserves the technical-sacral
    nuance better than the flatter 'utterly destroy.'
- source_word: כָּל אֲשֶׁר לוֹ
  chosen: all that belongs to him
  alternatives:
  - everything that he has
  - all that is his
  lexicon: HALOT
  rationale: This phrase refers comprehensively to Amalek's possessions and dependents.
    'All that belongs to him' is idiomatic and broad enough to cover the scope.
- source_word: וְלֹא תַחְמֹל עָלָיו
  chosen: Do not spare him
  alternatives:
  - Do not have pity on him
  - Do not show compassion to him
  lexicon: HALOT
  rationale: חמל means to spare or have compassion. 'Do not spare him' is the most
    concise and contextually fitting in a warfare/judgment command.
- source_word: וְהֵמַתָּה
  chosen: put to death
  alternatives:
  - kill
  - slay
  lexicon: HALOT
  rationale: מות in the Hiphil means cause to die/put to death. 'Put to death' is
    precise and grave without archaic coloring.
- source_word: מֵאִישׁ עַד אִשָּׁה
  chosen: man and woman
  alternatives:
  - from man to woman
  - men and women
  lexicon: HALOT
  rationale: The construction marks totality across categories. 'Man and woman' preserves
    the singular distributive force and the Hebrew pairing.
- source_word: מֵעֹלֵל וְעַד יוֹנֵק
  chosen: child and nursing infant
  alternatives:
  - little child and infant
  - young child and suckling
  lexicon: HALOT
  rationale: עולל denotes a small child; יונק denotes a nursing infant. 'Child and
    nursing infant' is clear modern English and preserves the distinction.
- source_word: מִשּׁוֹר וְעַד שֶׂה
  chosen: ox and sheep
  alternatives:
  - cattle and sheep
  - bull and lamb
  lexicon: HALOT
  rationale: שור is a head of cattle, often ox; שה is a small livestock animal, sheep/goat.
    'Ox and sheep' is a conventional, sufficiently precise rendering here.
- source_word: מִגָּמָל וְעַד חֲמוֹר
  chosen: camel and donkey
  alternatives:
  - camels and donkeys
  lexicon: HALOT
  rationale: Singular distributive forms continue the totalizing list; English naturally
    renders them as category terms without needing plurals.
