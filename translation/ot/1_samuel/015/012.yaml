id: 1SA.15.12
reference: 1 Samuel 15:12
source:
  edition: WLC
  text: וַ/יַּשְׁכֵּ֧ם שְׁמוּאֵ֛ל לִ/קְרַ֥את שָׁא֖וּל בַּ/בֹּ֑קֶר וַ/יֻּגַּ֨ד לִ/שְׁמוּאֵ֜ל
    לֵ/אמֹ֗ר בָּֽא שָׁא֤וּל הַ/כַּרְמֶ֨לָ/ה֙ וְ/הִנֵּ֨ה מַצִּ֥יב ל/וֹ֙ יָ֔ד וַ/יִּסֹּב֙
    וַֽ/יַּעֲבֹ֔ר וַ/יֵּ֖רֶד הַ/גִּלְגָּֽל־׃
translation:
  text: Samuel rose early to meet Saul in the morning, and it was reported to Samuel,
    saying, “Saul came to Carmel, and look, he has set up a monument for himself;
    then he turned, passed on, and went down to Gilgal.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “a hand for himself.” Here “hand” is an idiom for a memorial
      marker or monument.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  chosen: rose early
  alternatives:
  - got up early
  - started early
  lexicon: HALOT
  rationale: The Hiphil/waw-consecutive form idiomatically means to rise early. 'Rose
    early' is natural English and preserves the temporal emphasis without over-paraphrase.
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - to encounter
  - to go to meet
  lexicon: HALOT
  rationale: 'The infinitive with ל conveys purpose: Samuel rose early for the purpose
    of meeting Saul. ''To meet'' is concise and accurate.'
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - that morning
  - at morning
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'In the morning' preserves the Hebrew
    expression naturally.
- source_word: וַיֻּגַּד לִשְׁמוּאֵל לֵאמֹר
  chosen: and it was reported to Samuel, saying
  alternatives:
  - and Samuel was told
  - and word was brought to Samuel
  lexicon: HALOT
  rationale: The passive/Hophal form leaves the reporter unspecified. 'It was reported
    to Samuel' preserves that impersonal sense better than supplying an agent.
- source_word: בָּא שָׁאוּל הַכַּרְמֶלָה
  chosen: Saul came to Carmel
  alternatives:
  - Saul went to Carmel
  - Saul arrived at Carmel
  lexicon: HALOT
  rationale: Although the directional he marks motion toward Carmel, English idiom
    with place names commonly uses 'came to' in reported speech. This keeps close
    to the Hebrew without awkwardness.
- source_word: וְהִנֵּה
  chosen: and look
  alternatives:
  - and behold
  - and see
  lexicon: HALOT
  rationale: This discourse particle draws attention. 'And look' is readable modern
    English, while retaining the deictic force better than omitting it.
- source_word: מַצִּיב
  chosen: has set up
  alternatives:
  - was setting up
  - set up
  lexicon: HALOT
  rationale: The participle after הִנֵּה often conveys an action in progress or vivid
    present. In English reported narrative, 'has set up' communicates the resulting
    state naturally.
- source_word: יָד
  chosen: a monument
  alternatives:
  - a memorial
  - a hand
  lexicon: HALOT
  rationale: Literally 'hand,' but in this context the idiom refers to a memorial
    marker or monument. Rendering it literally would obscure the sense. 'Monument'
    best fits the likely referent of a commemorative marker.
- source_word: לּוֹ
  chosen: for himself
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The dative pronoun indicates the monument was erected for Saul's own
    honor. 'For himself' makes the reflexive sense explicit in idiomatic English.
- source_word: וַיִּסֹּב
  chosen: then he turned
  alternatives:
  - then he turned around
  - then he changed direction
  lexicon: HALOT
  rationale: The verb denotes turning or circling. 'Then he turned' is sufficiently
    precise and fits the travel sequence.
- source_word: וַיַּעֲבֹר
  chosen: passed on
  alternatives:
  - passed by
  - went on
  lexicon: HALOT
  rationale: In the sequence of travel verbs, 'passed on' conveys continued movement
    from Carmel toward the next destination.
- source_word: וַיֵּרֶד הַגִּלְגָּל
  chosen: went down to Gilgal
  alternatives:
  - descended to Gilgal
  lexicon: HALOT
  rationale: ירד commonly reflects topographical descent. 'Went down to Gilgal' is
    standard, natural English and preserves the directional nuance.
