id: 1SA.15.7
reference: 1 Samuel 15:7
source:
  edition: WLC
  text: וַ/יַּ֥ךְ שָׁא֖וּל אֶת עֲמָלֵ֑ק מֵֽ/חֲוִילָה֙ בּוֹאֲ/ךָ֣ שׁ֔וּר אֲשֶׁ֖ר עַל
    פְּנֵ֥י מִצְרָֽיִם־־׃
translation:
  text: Then Saul struck Amalek, from Havilah as you go to Shur, which is opposite
    Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Amalekites'; the Hebrew reads 'Amalek,' a collective use of the
      ancestor-name for the people.
    reason: lexical_alternative
  - marker: b
    text: Or 'which is east of Egypt' or 'which is before Egypt'; the Hebrew expression
      can denote a location facing or opposite Egypt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - defeated
  - attacked
  - smote
  lexicon: HALOT
  rationale: The verb נכה broadly means to strike/smite/defeat. 'Struck' preserves
    the concrete verbal force without overinterpreting the extent of the victory in
    this clause. 'Defeated' is possible contextually, but the Hebrew verb itself is
    more directly 'struck.'
- source_word: עֲמָלֵק
  chosen: Amalek
  alternatives:
  - the Amalekites
  lexicon: HALOT
  rationale: The singular proper name can denote the people group collectively. Rendering
    it as 'Amalek' stays closest to the Hebrew form while still naturally referring
    to the Amalekite people in context.
- source_word: מֵחֲוִילָה
  chosen: from Havilah
  alternatives:
  - beginning at Havilah
  lexicon: HALOT
  rationale: The preposition מִן marks the starting point of the geographical range.
    'From Havilah' is the most direct English equivalent.
- source_word: בּוֹאֲךָ
  chosen: as you go
  alternatives:
  - toward
  - on the way to
  - at the entrance to
  lexicon: HALOT
  rationale: The infinitive construct with 2ms suffix of בוא is an idiomatic geographical
    expression meaning 'as one goes' or 'on the way to.' 'As you go' preserves the
    idiom in readable English.
- source_word: שׁוּר
  chosen: Shur
  lexicon: HALOT
  rationale: Proper place name, transliterated according to the translation philosophy.
- source_word: אֲשֶׁר עַל־פְּנֵי מִצְרַיִם
  chosen: which is opposite Egypt
  alternatives:
  - which is east of Egypt
  - which is before Egypt
  - which is adjacent to Egypt
  lexicon: HALOT
  rationale: The phrase עַל־פְּנֵי often denotes being in front of, opposite, or facing
    a place. 'Opposite Egypt' is a standard and sufficiently neutral geographical
    rendering that does not over-specify direction beyond the Hebrew.
- source_word: שָׁאוּל
  chosen: Saul
  lexicon: HALOT
  rationale: Proper personal name, transliterated by standard English convention.
