id: 1SA.15.34
reference: 1 Samuel 15:34
source:
  edition: WLC
  text: וַ/יֵּ֥לֶךְ שְׁמוּאֵ֖ל הָ/רָמָ֑תָ/ה וְ/שָׁא֛וּל עָלָ֥ה אֶל בֵּית֖/וֹ גִּבְעַ֥ת
    שָׁאֽוּל־׃
translation:
  text: Then Samuel went to Ramah, and Saul went up to his house at Gibeah of Saul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Saul’s Gibeah.' The Hebrew preserves the place name in the form 'Gibeah
      of Saul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - departed
  - went away
  lexicon: HALOT
  rationale: הלך in the wayyiqtol narrative form normally advances the storyline with
    the simple sense 'went.' 'Went' is the most natural modern English rendering here.
- source_word: הָרָמָתָה
  chosen: to Ramah
  alternatives:
  - Ramahward
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward Ramah. English
    idiom expresses this naturally as 'to Ramah' rather than the more formal 'Ramahward.'
- source_word: עָלָה
  chosen: went up
  alternatives:
  - ascended
  - went
  lexicon: HALOT
  rationale: עלה commonly means 'go up' and often retains a topographical nuance.
    Here it is preserved as 'went up' rather than flattened to 'went,' since English
    can bear the expression naturally.
- source_word: בֵּיתוֹ
  chosen: his house
  alternatives:
  - his home
  lexicon: HALOT
  rationale: בית with 3ms suffix is straightforwardly 'his house.' 'House' is slightly
    more formal and closer to the Hebrew than 'home.'
- source_word: גִּבְעַת שָׁאוּל
  chosen: Gibeah of Saul
  alternatives:
  - Saul's Gibeah
  - Gibeah
  lexicon: HALOT
  rationale: The place name is best transliterated and the genitive preserved. 'Gibeah
    of Saul' reflects the Hebrew form directly and avoids over-interpreting whether
    the phrase is possessive or simply the established place name.
