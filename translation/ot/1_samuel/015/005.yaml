id: 1SA.15.5
reference: 1 Samuel 15:5
source:
  edition: WLC
  text: וַ/יָּבֹ֥א שָׁא֖וּל עַד עִ֣יר עֲמָלֵ֑ק וַ/יָּ֖רֶב בַּ/נָּֽחַל־׃
translation:
  text: Saul came to the city of Amalek and lay in wait in the wadi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set an ambush in the wadi'; the Hebrew verb here is difficult and has
      also been understood as 'contended' or 'strove,' but the context favors an ambush-like
      sense.
    reason: lexical_alternative
  - marker: b
    text: '''Wadi'' refers to a streambed or ravine that may be dry except in the
      rainy season.'
    reason: cultural_note
  - marker: c
    text: Or 'the city of the Amalekites.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come/go/enter' depending on viewpoint. 'Came'
    is a natural English narrative rendering and fits the sequential movement toward
    the objective.
- source_word: עַד
  chosen: to
  alternatives:
  - as far as
  - up to
  lexicon: HALOT
  rationale: With a destination, עַד can mean 'as far as/up to.' In idiomatic English
    with a motion verb, 'came to' best conveys the sense without awkwardness.
- source_word: עִיר עֲמָלֵק
  chosen: the city of Amalek
  alternatives:
  - Amalek's city
  - the city of the Amalekites
  lexicon: HALOT
  rationale: The construct phrase is most straightforwardly rendered 'the city of
    Amalek.' Since עֲמָלֵק can denote the people/group by eponym, 'the city of the
    Amalekites' is possible, but the more literal construct is retained in the main
    text.
- source_word: וַיָּרֶב
  chosen: lay in wait
  alternatives:
  - set an ambush
  - contended
  - strove
  lexicon: HALOT
  rationale: In this context the verb is best understood in the sense attested by
    many interpreters and ancient versions as tactical positioning/ambush rather than
    'contended.' 'Lay in wait' is clear modern English and preserves the military
    nuance without over-specifying the exact maneuver.
- source_word: בַּנָּחַל
  chosen: in the wadi
  alternatives:
  - in the valley
  - by the brook
  - in the ravine
  lexicon: HALOT
  rationale: נחל denotes a wadi/seasonal watercourse, often a ravine or torrent-bed.
    'Wadi' is the most geographically precise term; alternatives are possible but
    either too generic ('valley') or potentially misleading ('brook') in this setting.
