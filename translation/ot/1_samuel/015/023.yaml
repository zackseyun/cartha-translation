id: 1SA.15.23
reference: 1 Samuel 15:23
source:
  edition: WLC
  text: כִּ֤י חַטַּאת קֶ֨סֶם֙ מֶ֔רִי וְ/אָ֥וֶן וּ/תְרָפִ֖ים הַפְצַ֑ר יַ֗עַן מָאַ֨סְתָּ֙
    אֶת דְּבַ֣ר יְהוָ֔ה וַ/יִּמְאָסְ/ךָ֖ מִ/מֶּֽלֶךְ־־׃ס
translation:
  text: For rebellion is like the sin of divination, and stubbornness is like wickedness
    and household idols. Because you have rejected the word of the LORD, he has also
    rejected you from being king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sin of witchcraft.' The Hebrew קֶסֶם refers more broadly to divination
      or seeking hidden knowledge by forbidden means.
    reason: lexical_alternative
  - marker: b
    text: Hebrew תְּרָפִים (teraphim), household cult images or idols.
    reason: lexical_alternative
  - marker: c
    text: Or 'he has rejected you as king.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces Samuel's explanatory ground for the preceding rebuke. 'For'
    fits the proverbial explanation that follows, while the later יַעַן carries the
    more specific causal 'because' clause.
- source_word: חַטַּאת קֶסֶם
  chosen: the sin of divination
  alternatives:
  - sin of witchcraft
  - divination is a sin
  lexicon: HALOT
  rationale: Construct chain most naturally rendered 'the sin of divination.' 'Divination'
    is clearer and less anachronistic than 'witchcraft,' and preserves the comparison
    between rebellion and a forbidden occult practice.
- source_word: מֶרִי
  chosen: rebellion
  alternatives:
  - rebelliousness
  - insubordination
  lexicon: HALOT
  rationale: Denotes defiance against authority, here Saul's refusal to obey the LORD's
    command. 'Rebellion' is idiomatic and weighty in English.
- source_word: וְאָוֶן
  chosen: wickedness
  alternatives:
  - iniquity
  - trouble
  - vanity
  lexicon: HALOT
  rationale: In this collocation with teraphim, the term points to moral evil or iniquity
    rather than mere trouble. 'Wickedness' is accessible modern English and preserves
    the ethical force.
- source_word: וּתְרָפִים
  chosen: household idols
  alternatives:
  - teraphim
  - idols
  lexicon: HALOT
  rationale: Teraphim were domestic cult objects; translating the sense helps modern
    readers. The more technical transliteration is preserved in a footnote.
- source_word: הַפְצַר
  chosen: stubbornness
  alternatives:
  - presumption
  - arrogant insistence
  - self-will
  lexicon: HALOT
  rationale: The form denotes obstinate pressing or insolent insistence. In context,
    Samuel parallels Saul's refusal to yield with idolatrous evil; 'stubbornness'
    best captures the practical sense in natural English.
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - inasmuch as
  lexicon: HALOT
  rationale: Marks the explicit causal clause explaining the judgment on Saul. 'Because'
    is the clearest modern equivalent.
- source_word: מָאַסְתָּ אֶת דְּבַר יְהוָה
  chosen: you have rejected the word of the LORD
  alternatives:
  - you have despised the word of the LORD
  lexicon: HALOT
  rationale: מָאַס conveys rejection or despising. 'Rejected' matches the repeated
    verb in the second half of the verse and preserves the rhetorical symmetry.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: וַיִּמְאָסְךָ מִמֶּלֶךְ
  chosen: he has also rejected you from being king
  alternatives:
  - he has rejected you as king
  - he has rejected you from kingship
  lexicon: HALOT
  rationale: Keeps the repetition of מָאַס and reflects the preposition מן with the
    sense of removal from royal status. 'From being king' is slightly more explicit
    for modern readers than the compressed 'as king.'
