theological_decisions:
- issue: Comparison structure in the first colon
  chosen_reading: rebellion is compared to divination, and stubbornness is compared
    to wickedness and household idols
  alternative_readings:
  - rebellion is the sin of divination, and stubbornness is iniquity and teraphim
  rationale: The Hebrew omits an explicit second 'is like,' but the parallelism strongly
    supports carrying the comparative force across both halves. This avoids a wooden
    rendering that sounds unnatural in English while preserving the proverb-like equivalence
    Samuel draws.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without unnecessary paraphrase.'
