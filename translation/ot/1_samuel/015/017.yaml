id: 1SA.15.17
reference: 1 Samuel 15:17
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שְׁמוּאֵ֔ל הֲ/ל֗וֹא אִם קָטֹ֤ן אַתָּה֙ בְּ/עֵינֶ֔י/ךָ רֹ֛אשׁ שִׁבְטֵ֥י יִשְׂרָאֵ֖ל אָ֑תָּה וַ/יִּמְשָׁחֲ/ךָ֧ יְהוָ֛ה לְ/מֶ֖לֶךְ עַל יִשְׂרָאֵֽל־־׃
translation:
  text: And Samuel said, “Though you were small in your own eyes, were you not the head of the tribes of Israel? And Yahweh anointed you king over Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Even if you were small in your own eyes.' The Hebrew can be taken with slightly different nuance, but the sense is that Saul once regarded himself as insignificant.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא
  chosen: were you not
  alternatives:
  - is it not
  - surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. In English, 'were you not' naturally carries the force in this past-oriented context.
- source_word: אִם קָטֹן אַתָּה בְּעֵינֶיךָ
  chosen: Though you were small in your own eyes
  alternatives:
  - Even if you were small in your own eyes
  - When you were small in your own eyes
  lexicon: HALOT
  rationale: The clause recalls Saul's former self-estimation. 'Small in your own eyes' preserves the Hebrew idiom of low self-regard or humility. 'Though' best captures the concessive sense in context.
- source_word: קָטֹן
  chosen: small
  alternatives:
  - little
  - insignificant
  lexicon: HALOT
  rationale: '''Small'' is the most direct and idiomatic rendering here, preserving the metaphor of low status or self-estimation without over-interpreting it as purely psychological or social.'
- source_word: בְּעֵינֶיךָ
  chosen: in your own eyes
  alternatives:
  - in your eyes
  lexicon: HALOT
  rationale: This Hebrew idiom refers to one's own estimation or perception. 'Your own eyes' makes the reflexive sense explicit in natural English.
- source_word: רֹאשׁ שִׁבְטֵי יִשְׂרָאֵל
  chosen: the head of the tribes of Israel
  alternatives:
  - chief of the tribes of Israel
  - leader of the tribes of Israel
  lexicon: HALOT
  rationale: '''Head'' preserves the concrete Hebrew metaphor רֹאשׁ while remaining understandable in English. It also fits the rhetorical contrast between Saul''s self-estimation and his actual elevated position.'
- source_word: וַיִּמְשָׁחֲךָ
  chosen: anointed you
  alternatives:
  - appointed you
  lexicon: HALOT
  rationale: The verb משׁח specifically denotes anointing, an important royal and theological act in Israel. 'Appointed' would flatten the ritual and covenantal significance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְמֶלֶךְ עַל יִשְׂרָאֵל
  chosen: king over Israel
  alternatives:
  - as king over Israel
  - to be king over Israel
  lexicon: HALOT
  rationale: This expresses the result of the anointing. 'King over Israel' is concise, natural, and faithful to the Hebrew construction.
