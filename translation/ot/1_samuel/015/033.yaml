theological_decisions:
- issue: Rendering the violent execution formula in a way that neither softens nor
    sensationalizes the text
  chosen_reading: 'Samuel personally executed Agag, rendered with a vivid verb: ''hacked
    Agag to pieces.'''
  alternative_readings:
  - Samuel cut Agag in pieces
  - Samuel hewed Agag in pieces
  - Samuel put Agag to death
  rationale: The Hebrew explicitly attributes the act to Samuel and uses a forceful
    verb. The translation should preserve the text's severity without importing extra
    theological justification or muting the violence. 'Hacked ... to pieces' is strong
    but still lexical rather than interpretive.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering the divine name
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    יְהוָה, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
