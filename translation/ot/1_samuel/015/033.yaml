id: 1SA.15.33
reference: 1 Samuel 15:33
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שְׁמוּאֵ֔ל כַּ/אֲשֶׁ֨ר שִׁכְּלָ֤ה נָשִׁים֙ חַרְבֶּ֔/ךָ כֵּן תִּשְׁכַּ֥ל
    מִ/נָּשִׁ֖ים אִמֶּ֑/ךָ וַ/יְשַׁסֵּ֨ף שְׁמוּאֵ֧ל אֶת אֲגָ֛ג לִ/פְנֵ֥י יְהוָ֖ה בַּ/גִּלְגָּֽל־־׃ס
translation:
  text: Samuel said, “As your sword has made women childless, so your mother will
    be childless among women.” And Samuel hacked Agag to pieces before the LORD at
    Gilgal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “has bereaved women … your mother will be bereaved among women.” The
      Hebrew uses the same verb in both clauses, emphasizing measured retribution.
    reason: lexical_alternative
  - marker: b
    text: Or “cut Agag in pieces” or traditionally “hewed Agag in pieces.”
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁכְּלָה / תִּשְׁכַּל
  chosen: has made women childless / will be childless
  alternatives:
  - has bereaved women / your mother will be bereaved among women
  - has deprived women of children / your mother will be deprived of children
  lexicon: HALOT
  rationale: The root שׁכל in this context refers specifically to bereavement through
    loss of children. 'Childless' communicates the result in idiomatic modern English
    and preserves the wordplay between Agag's actions and the judgment on his mother.
    'Bereaved' is possible, but 'childless' better matches the Hebrew idiom here and
    reads more naturally in English.
- source_word: חַרְבֶּךָ
  chosen: your sword
  lexicon: HALOT
  rationale: A straightforward literal rendering; the sword stands metonymically for
    Agag's violent acts, and English preserves that naturally.
- source_word: מִנָּשִׁים
  chosen: among women
  alternatives:
  - from among women
  lexicon: HALOT
  rationale: The preposition מן here is best rendered idiomatically as 'among' in
    the comparative expression 'childless among women,' rather than the more wooden
    'from among women.'
- source_word: וַיְשַׁסֵּף
  chosen: hacked ... to pieces
  alternatives:
  - cut ... in pieces
  - hewed ... in pieces
  - put ... to death
  lexicon: HALOT
  rationale: The verb שׁסף is vivid and violent, denoting dismembering or cutting
    up. 'Hacked ... to pieces' preserves the severity more clearly for modern readers
    than the archaic 'hewed ... in pieces.' 'Put to death' is too weak and loses the
    lexical force.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: This is the standard and natural rendering of לִפְנֵי in cultic/judicial
    contexts. Per doctrine guidelines, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving
    the traditional reverential substitution pattern.
- source_word: בַּגִּלְגָּל
  chosen: at Gilgal
  alternatives:
  - in Gilgal
  lexicon: HALOT
  rationale: For a named location of event, 'at Gilgal' is the most idiomatic English
    rendering.
