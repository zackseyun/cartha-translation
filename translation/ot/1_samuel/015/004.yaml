id: 1SA.15.4
reference: 1 Samuel 15:4
source:
  edition: WLC
  text: וַ/יְשַׁמַּ֤ע שָׁאוּל֙ אֶת הָ/עָ֔ם וַֽ/יִּפְקְדֵ/ם֙ בַּ/טְּלָאִ֔ים מָאתַ֥יִם
    אֶ֖לֶף רַגְלִ֑י וַ/עֲשֶׂ֥רֶת אֲלָפִ֖ים אֶת אִ֥ישׁ יְהוּדָֽה־־׃
translation:
  text: 'So Saul summoned the people and mustered them at Telaim: two hundred thousand
    foot soldiers, and ten thousand men of Judah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'with lambs,' if בַּטְּלָאִים is taken literally rather than
      as the place name Telaim.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְשַׁמַּע
  chosen: summoned
  alternatives:
  - caused to hear
  - assembled
  lexicon: HALOT
  rationale: The Hiphil of שׁמע here idiomatically means to call together or summon
    the people, not merely to make them hear. 'Summoned' fits the military context
    and prepares for the following muster.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  - the army
  lexicon: HALOT
  rationale: The noun is literally 'the people.' In context it refers to those Saul
    gathered for war, but the Hebrew does not explicitly say 'army,' so 'the people'
    preserves the source wording while remaining natural.
- source_word: וַיִּפְקְדֵם
  chosen: mustered them
  alternatives:
  - numbered them
  - took stock of them
  lexicon: HALOT
  rationale: פקד in military contexts commonly means to muster or review troops. 'Mustered'
    is more contextually precise than the more wooden 'numbered.'
- source_word: בַּטְּלָאִים
  chosen: at Telaim
  alternatives:
  - with lambs
  - in Telaim
  lexicon: HALOT
  rationale: Although the form is identical to 'lambs,' in this context it is best
    taken as the place name Telaim, the traditional and contextually coherent reading
    for the location of the muster.
- source_word: מָאתַיִם אֶלֶף
  chosen: two hundred thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number construction.
- source_word: רַגְלִי
  chosen: foot soldiers
  alternatives:
  - infantry
  - on foot
  lexicon: HALOT
  rationale: Literally 'foot' or 'footman'; in military census context it denotes
    troops on foot. 'Foot soldiers' is clear modern English and slightly more formal
    than 'infantry' while preserving the image.
- source_word: וַעֲשֶׂרֶת אֲלָפִים
  chosen: and ten thousand
  lexicon: HALOT
  rationale: Straightforward number phrase coordinated with the previous total.
- source_word: אֶת אִישׁ יְהוּדָה
  chosen: men of Judah
  alternatives:
  - the men of Judah
  - Judahite men
  lexicon: HALOT
  rationale: אִישׁ with a collective/genitival sense here refers to members of the
    tribe of Judah. 'Men of Judah' is idiomatic English and preserves the tribal identification.
