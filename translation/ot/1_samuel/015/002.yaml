id: 1SA.15.2
reference: 1 Samuel 15:2
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת פָּקַ֕דְתִּי אֵ֛ת אֲשֶׁר עָשָׂ֥ה עֲמָלֵ֖ק לְ/יִשְׂרָאֵ֑ל
    אֲשֶׁר שָׂ֥ם ל/וֹ֙ בַּ/דֶּ֔רֶךְ בַּ/עֲלֹת֖/וֹ מִ/מִּצְרָֽיִם־־׃
translation:
  text: 'Thus says the LORD of hosts: ‘I have taken note of what Amalek did to Israel,
    how he set himself against him on the way when he came up from Egypt.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I have punished for what Amalek did to Israel,” or “I have remembered
      what Amalek did to Israel.” The Hebrew verb can carry the sense of attending
      to, remembering, or visiting with judgment.
    reason: lexical_alternative
  - marker: b
    text: Or, “how he opposed him on the way”; possibly, “how he lay in wait for him
      on the way.” The Hebrew expression refers to Amalek’s hostile action against
      Israel during the exodus journey.
    reason: lexical_alternative
  - marker: c
    text: “Him” refers to Israel as a collective singular.
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - So says
  lexicon: HALOT
  rationale: Standard prophetic/messenger formula. 'Thus says' preserves the formal
    force and recognizable discourse pattern without sounding archaic beyond normal
    biblical style.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD'.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - of heavenly armies
  lexicon: HALOT
  rationale: '''Hosts'' is the established concise rendering for the divine title
    and preserves its breadth, including heavenly and earthly forces, without over-specifying.'
- source_word: פָּקַדְתִּי
  chosen: I have taken note of
  alternatives:
  - I have punished
  - I have remembered
  - I have attended to
  lexicon: HALOT
  rationale: פקד can denote visiting, attending to, remembering with intent, or punishing
    depending on context. Here it introduces impending judgment on Amalek because
    of past actions, so 'I have taken note of' preserves the evaluative remembrance
    without importing the punishment explicitly into this verb, since the next verse
    carries out the judgment.
- source_word: אֵת אֲשֶׁר עָשָׂה עֲמָלֵק לְיִשְׂרָאֵל
  chosen: what Amalek did to Israel
  alternatives:
  - that which Amalek did to Israel
  - what Amalek did against Israel
  lexicon: HALOT
  rationale: Natural English rendering of the object clause. 'Did to' is broad enough
    to cover hostile action without over-interpretation.
- source_word: אֲשֶׁר שָׂם לוֹ בַּדֶּרֶךְ
  chosen: how he set himself against him on the way
  alternatives:
  - how he opposed him on the way
  - how he lay in wait for him on the way
  lexicon: HALOT
  rationale: The idiom with שׂוּם + ל + בדרך is compressed and contextually refers
    to Amalek's hostile opposition to Israel during the exodus journey (cf. Exod 17;
    Deut 25). 'Set himself against' captures adversarial intent while avoiding an
    overly narrow tactical sense like 'ambush' in the main text.
- source_word: לוֹ
  chosen: him
  alternatives:
  - them
  - Israel
  lexicon: HALOT
  rationale: The pronoun is morphologically singular masculine, referring back to
    the collective singular 'Israel.' English can preserve this with 'him,' though
    the antecedent is corporate.
- source_word: בַּעֲלֹתוֹ מִמִּצְרַיִם
  chosen: when he came up from Egypt
  alternatives:
  - at his coming up from Egypt
  - when Israel came up from Egypt
  lexicon: HALOT
  rationale: עלה from Egypt is the standard idiom 'come up from Egypt.' 'When he came
    up' preserves the singular collective reference to Israel and reads naturally
    in English.
