theological_decisions:
- issue: Rendering the divine title יְהוָה צְבָאוֹת
  chosen_reading: the LORD of hosts
  alternative_readings:
  - Yahweh of hosts
  - the LORD of armies
  rationale: This follows the doctrinal default for YHWH and preserves the traditional
    title without narrowing its scope to merely human military forces.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of divine remembrance/judgment in פָּקַדְתִּי
  chosen_reading: I have taken note of
  alternative_readings:
  - I have punished
  - I have remembered
  rationale: The verse announces God's attention to Amalek's past offense as the basis
    for the command in the following verse. The chosen wording preserves the tension
    between remembrance and impending judgment without collapsing the verb into either
    concept alone.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension
    rather than resolve it
