theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of Samuel's quotation of the people's request
  chosen_reading: ‘No, set a king over us.’
  alternative_readings:
  - ‘But you said to him, “A king you shall set over us.”’
  - ‘For you said to him, “Set a king over us.”’
  rationale: The Hebrew can be rendered more woodenly, but the context is a rebuke contrasting God's saving kingship with the people's demand. Including 'No' makes the adversative insistence explicit without adding doctrinal content.
