id: 1SA.10.19
reference: 1 Samuel 10:19
source:
  edition: WLC
  text: וְ/אַתֶּ֨ם הַ/יּ֜וֹם מְאַסְתֶּ֣ם אֶת אֱלֹהֵי/כֶ֗ם אֲשֶׁר ה֣וּא מוֹשִׁ֣יעַ לָ/כֶם֮ מִ/כָּל רָעוֹתֵי/כֶ֣ם וְ/צָרֹֽתֵי/כֶם֒ וַ/תֹּ֣אמְרוּ ל֔/וֹ כִּי מֶ֖לֶךְ תָּשִׂ֣ים עָלֵ֑י/נוּ וְ/עַתָּ֗ה הִֽתְיַצְּבוּ֙ לִ/פְנֵ֣י יְהוָ֔ה לְ/שִׁבְטֵי/כֶ֖ם וּ/לְ/אַלְפֵי/כֶֽם־־־־׃
translation:
  text: But today you have rejected your God, who himself saves you from all your calamities and distresses, and you have said to him, ‘No, but set a king over us.’ So now present yourselves before Yahweh by your tribes and by your thousands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from all your calamities and distresses.' The Hebrew terms can refer to evils suffered, calamities, troubles, or afflictions.
    reason: lexical_alternative
  - marker: b
    text: Or 'by your clans' or 'by your units of a thousand.' The Hebrew 'thousands' can denote social or military subdivisions, not only a literal number.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְאַסְתֶּם
  chosen: have rejected
  alternatives:
  - have despised
  - have refused
  lexicon: HALOT
  rationale: מָאַס commonly denotes rejecting or spurning. 'Have rejected' is natural modern English and preserves the covenantal force better than the more emotive 'despised' here.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, אֱלֹהִים with singular reference and possessive suffix here clearly refers to Israel's one God. Singular English is required by context.
- source_word: מוֹשִׁיעַ
  chosen: saves
  alternatives:
  - delivers
  - is delivering
  lexicon: HALOT
  rationale: The participle expresses characteristic or ongoing action. 'Saves' communicates habitual divine rescue in concise English; 'delivers' is possible but less broad in modern usage.
- source_word: מִכָּל רָעוֹתֵיכֶם
  chosen: from all your evils
  alternatives:
  - from all your calamities
  - from all your troubles
  lexicon: HALOT
  rationale: רָעוֹת can denote evils, harms, or calamities suffered. 'Evils' keeps the lexical link to רַע while allowing the following paired noun to add nuance. Because 'evils' may sound unusual in English, an alternative is preserved in a footnote.
- source_word: וְצָרֹתֵיכֶם
  chosen: and distresses
  alternatives:
  - and troubles
  - and adversities
  lexicon: HALOT
  rationale: צָרוֹת refers to states of distress, trouble, or adversity. 'Distresses' preserves the sense of affliction and pairs well with the previous term without collapsing the two nouns into one idea.
- source_word: כִּי
  chosen: 'No'
  alternatives:
  - Indeed
  - Rather
  - Surely
  lexicon: HALOT
  rationale: 'In this direct-speech context, כִּי introduces the content emphatically after a contrast: ''No, set a king over us.'' This reflects the adversative force implied by the people''s insistence in context better than a bare ''that'' in English.'
- source_word: תָּשִׂים
  chosen: set
  alternatives:
  - appoint
  - place
  lexicon: HALOT
  rationale: שׂוּם is a common verb meaning put, set, or appoint. 'Set a king over us' is idiomatic and close to the Hebrew; 'appoint' is possible but slightly more interpretive.
- source_word: הִתְיַצְּבוּ
  chosen: present yourselves
  alternatives:
  - take your stand
  - stand
  lexicon: HALOT
  rationale: The hitpael here calls for formal positioning before YHWH for the selection process. 'Present yourselves' captures the reflexive/formal nuance better than the simpler 'stand'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְשִׁבְטֵיכֶם
  chosen: by your tribes
  alternatives:
  - according to your tribes
  lexicon: HALOT
  rationale: The ל preposition here marks arrangement or grouping. 'By your tribes' is concise and natural for the procedural setting.
- source_word: וּלְאַלְפֵיכֶם
  chosen: and by your thousands
  alternatives:
  - and by your clans
  - and by your military units of a thousand
  lexicon: HALOT
  rationale: אֶלֶף in such administrative contexts can denote a thousand-unit, clan, or subdivision. 'Thousands' keeps the Hebrew term transparent in the main text, while a footnote preserves the likely social/military nuance.
