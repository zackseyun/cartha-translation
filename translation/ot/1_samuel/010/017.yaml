id: 1SA.10.17
reference: 1 Samuel 10:17
source:
  edition: WLC
  text: וַ/יַּצְעֵ֤ק שְׁמוּאֵל֙ אֶת הָ/עָ֔ם אֶל יְהוָ֖ה הַ/מִּצְפָּֽה־־׃
translation:
  text: Then Samuel called the people together to Yahweh at Mizpah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'summoned the people to the LORD at Mizpah.' The Hebrew verb can denote calling or summoning an assembly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּצְעֵק
  chosen: called ... together
  alternatives:
  - summoned
  - assembled
  - called
  lexicon: HALOT
  rationale: The verb צעק commonly means 'cry out,' but in this Hiphil-like narrative usage with a direct object ('the people') and destination phrase, it denotes summoning or convening. 'Called ... together' captures the gathering sense in natural English better than the more wooden 'cried out to.'
- source_word: אֶת הָעָם
  chosen: the people
  alternatives:
  - the assembly
  lexicon: HALOT
  rationale: עם here refers to the gathered people of Israel. 'The people' is the most direct and contextually appropriate rendering.
- source_word: אֶל
  chosen: to
  alternatives:
  - before
  - at
  lexicon: HALOT
  rationale: The preposition normally means 'to/toward.' In this context it introduces the relation of the assembled people to the LORD, likely in a cultic or covenantal setting. 'To the LORD' preserves the Hebrew form while remaining intelligible in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַמִּצְפָּה
  chosen: at Mizpah
  alternatives:
  - to Mizpah
  - at the watchtower
  lexicon: HALOT
  rationale: מִצְפָּה is a place name here, so it is transliterated as 'Mizpah.' Although the Hebrew sequence could be read woodenly as 'to the LORD, to Mizpah,' idiomatic English expresses the location of the assembly as 'at Mizpah.' This preserves the sense without awkwardness.
