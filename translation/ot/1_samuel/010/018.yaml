id: 1SA.10.18
reference: 1 Samuel 10:18
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֶל בְּנֵ֣י יִשְׂרָאֵ֗ל כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל אָנֹכִ֛י הֶעֱלֵ֥יתִי אֶת יִשְׂרָאֵ֖ל מִ/מִּצְרָ֑יִם וָ/אַצִּ֤יל אֶתְ/כֶם֙ מִ/יַּ֣ד מִצְרַ֔יִם וּ/מִ/יַּד֙ כָּל הַ/מַּמְלָכ֔וֹת הַ/לֹּחֲצִ֖ים אֶתְ/כֶֽם׀־פ־־־׃
translation:
  text: 'And he said to the sons of Israel, “Thus says Yahweh, the God of Israel: I brought Israel up from Egypt, and I delivered you from the hand of the Egyptians and from the hand of all the kingdoms that were oppressing you.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites” or traditionally “the children of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Formally, the Hebrew is 'sons of Israel.' Because the project prefers gender-accurate renderings and this is a conventional ethnonym, I retained the formal expression rather than smoothing to 'Israelites.' 'Children of Israel' is traditional but less precise to the masculine plural construct.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic/messenger formula. 'Thus says' preserves the solemn declarative force and recognizable discourse form.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase identifying YHWH covenantally.
- source_word: הֶעֱלֵיתִי
  chosen: I brought ... up
  alternatives:
  - I led ... up
  lexicon: HALOT
  rationale: The Hiphil of עלה in exodus contexts commonly means 'bring up' from a land. This preserves the exodus idiom better than a flatter 'led out,' especially since the source explicitly says 'from Egypt' rather than using יצא.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the Israelites
  lexicon: HALOT
  rationale: The object is singular collective 'Israel.' Rendering it as 'Israel' preserves the collective-national sense and matches the Hebrew wording.
- source_word: וָאַצִּיל
  chosen: I delivered
  alternatives:
  - I rescued
  - I snatched away
  lexicon: HALOT
  rationale: נצל in Hiphil often carries the sense of deliverance/rescue from hostile power. 'Delivered' fits the covenant-historical register and pairs naturally with 'from the hand of.'
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  lexicon: HALOT
  rationale: The idiom literally means 'from the hand of' and denotes power/control. I kept the idiom in English because it remains understandable and preserves the Hebrew imagery.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard place-name rendering. In 'from the hand of Egypt,' the nation stands metonymically for Egyptian power.
- source_word: כָּל הַמַּמְלָכוֹת
  chosen: all the kingdoms
  alternatives:
  - all the kingdoms around you
  - every kingdom
  lexicon: HALOT
  rationale: ממלכות is plural and broad. 'All the kingdoms' preserves the comprehensive scope without adding contextual words not present in the text.
- source_word: הַלֹּחֲצִים אֶתְכֶם
  chosen: that were oppressing you
  alternatives:
  - that oppressed you
  - pressing you hard
  lexicon: HALOT
  rationale: The participle denotes ongoing or characteristic oppression. 'Were oppressing you' captures the durative force better than a simple past and reads naturally in English narrative discourse.
