id: 1SA.10.1
reference: 1 Samuel 10:1
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח שְׁמוּאֵ֜ל אֶת פַּ֥ךְ הַ/שֶּׁ֛מֶן וַ/יִּצֹ֥ק עַל רֹאשׁ֖/וֹ וַ/יִּשָּׁקֵ֑/הוּ וַ/יֹּ֕אמֶר הֲ/ל֗וֹא כִּֽי מְשָׁחֲ/ךָ֧ יְהוָ֛ה עַל נַחֲלָת֖/וֹ לְ/נָגִֽיד־־־־׃
translation:
  text: Then Samuel took the flask of oil and poured it on his head and kissed him, and said, “Has not Yahweh anointed you as ruler over his inheritance?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “leader” or “prince” for “ruler.” The Hebrew term refers to one appointed to govern and is not identical in nuance to the later title “king.”
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּךְ הַשֶּׁמֶן
  chosen: the flask of oil
  alternatives:
  - the vial of oil
  - the jar of oil
  lexicon: HALOT
  rationale: פַּךְ denotes a small container or flask. 'Flask' is natural modern English and preserves the concrete image better than the more archaic 'vial.'
- source_word: וַיִּצֹק עַל רֹאשׁוֹ
  chosen: poured it on his head
  alternatives:
  - poured it over his head
  lexicon: HALOT
  rationale: The verb יצק means 'pour.' 'On his head' closely follows the Hebrew עַל רֹאשׁוֹ and fits English idiom.
- source_word: וַיִּשָּׁקֵהוּ
  chosen: kissed him
  lexicon: HALOT
  rationale: The verb נשׁק in this stem plainly means 'kiss.' No euphemizing is warranted; the gesture is part of the anointing scene.
- source_word: הֲלוֹא כִּי
  chosen: Has not
  alternatives:
  - Surely
  - Is it not that
  lexicon: HALOT
  rationale: The combination introduces a rhetorical affirmation. 'Has not' preserves the interrogative-rhetorical force in idiomatic English.
- source_word: מְשָׁחֲךָ
  chosen: anointed you
  lexicon: HALOT
  rationale: The verb משׁח is the standard term for anointing, especially in royal commissioning contexts. 'Anointed you' preserves both the ritual and political significance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נַחֲלָתוֹ
  chosen: his inheritance
  alternatives:
  - his heritage
  - his possession
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes an inheritance or allotted possession. 'His inheritance' preserves the covenantal sense that Israel belongs to the LORD.
- source_word: לְנָגִיד
  chosen: ruler
  alternatives:
  - prince
  - leader
  lexicon: HALOT
  rationale: נָגִיד denotes one set over others as leader or ruler, often in royal contexts but not identical to the later, more formal 'king.' 'Ruler' preserves that nuance better than the tradition-bound 'captain' and is more accessible than 'prince,' which can mislead modern readers toward filial royalty.
