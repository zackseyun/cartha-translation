id: 1SA.19.12
reference: 1 Samuel 19:12
source:
  edition: WLC
  text: וַ/תֹּ֧רֶד מִיכַ֛ל אֶת דָּוִ֖ד בְּעַ֣ד הַ/חַלּ֑וֹן וַ/יֵּ֥לֶךְ וַ/יִּבְרַ֖ח
    וַ/יִּמָּלֵֽט־׃
translation:
  text: So Michal lowered David through the window, and he went and fled and escaped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let David down through the window.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּרֶד
  chosen: lowered
  alternatives:
  - let down
  - brought down
  lexicon: HALOT
  rationale: The Hiphil/causative sense of ירד here indicates that Michal caused David
    to go down from an elevated place. 'Lowered' is natural modern English and fits
    the context of escape through a window.
- source_word: בְּעַד הַחַלּוֹן
  chosen: through the window
  alternatives:
  - by the window
  - out through the window
  lexicon: HALOT
  rationale: בְּעַד commonly conveys movement through or out by way of an opening.
    In this escape context, 'through the window' best captures the spatial sense without
    unnecessary expansion.
- source_word: וַיֵּלֶךְ
  chosen: he went
  alternatives:
  - he departed
  - he was on his way
  lexicon: HALOT
  rationale: הלך is a common motion verb. Retaining 'he went' preserves the Hebrew
    narrative sequence rather than collapsing the verbs into a single English action.
- source_word: וַיִּבְרַח
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: HALOT
  rationale: ברח specifically denotes fleeing from danger. 'Fled' is concise and preserves
    the urgency of the escape.
- source_word: וַיִּמָּלֵט
  chosen: escaped
  alternatives:
  - got away
  - was delivered
  lexicon: HALOT
  rationale: 'מלט in the Niphal here denotes successful escape or deliverance from
    danger. ''Escaped'' distinguishes it from the prior act of fleeing and preserves
    the progression: he went, fled, and ultimately escaped.'
- source_word: מִיכַל
  chosen: Michal
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: דָּוִד
  chosen: David
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
